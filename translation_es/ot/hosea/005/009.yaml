translation:
  language: es
  text: Efraín se convertirá en una desolación[a] en el día de reprensión[b]; entre las tribus de Israel he dado a conocer lo que es seguro[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «objeto de horror» para «desolación». El término hebreo puede abarcar la devastación que produce asombro.
    reason: lexical_alternative
  - marker: b
    text: O «en el día de castigo» o «en el día de juicio» para «en el día de reprensión».
    reason: lexical_alternative
  - marker: c
    text: O «he dado a conocer lo cierto». La frase final subraya la certeza y fiabilidad del juicio anunciado.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraím
  lexicon: HALOT
  rationale: Se conserva el nombre propio como en el hebreo, sin expandirlo interpretativamente a 'Israel' o 'el reino del norte' en el texto principal.
- source_word: לְשַׁמָּה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - un horror
  - ruina
  - devastación
  lexicon: HALOT
  rationale: שַׁמָּה expresa desolación/devastación; 'desolación' es natural en español y mantiene el tono profético sin sobreparafrasear.
- source_word: תִהְיֶה
  english_pob_choice: will become
  chosen_spanish: se convertirá
  alternatives_spanish:
  - será
  lexicon: HALOT
  rationale: El hebreo con לְ sugiere pasar a un estado; 'se convertirá' refleja mejor ese devenir que el más estático 'será'.
- source_word: בְּיוֹם תּוֹכֵחָה
  english_pob_choice: in the day of rebuke
  chosen_spanish: en el día de reprensión
  alternatives_spanish:
  - en el día de rebuke
  - en el día de corrección
  - en el día de juicio
  - en el día de castigo
  lexicon: HALOT
  rationale: תּוֹכֵחָה puede significar reprensión/reproche, con fuerza judicial en contexto profético. 'Reprensión' conserva cercanía léxica y deja que el contexto aporte el peso punitivo.
- source_word: בְּשִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: among the tribes of Israel
  chosen_spanish: entre las tribus de Israel
  alternatives_spanish:
  - entre las tribus de Israel
  - en medio de las tribus de Israel
  - contra las tribus de Israel
  lexicon: HALOT
  rationale: El ב funciona en sentido locativo/esférico; 'entre' es idiomático en español y refleja bien la ubicación del anuncio.
- source_word: הוֹדַעְתִּי
  english_pob_choice: I have made known
  chosen_spanish: he dado a conocer
  alternatives_spanish:
  - he hecho saber
  - he anunciado
  - di a conocer
  lexicon: HALOT
  rationale: El hiphil de ידע significa 'hacer conocer/ dar a conocer'. 'He dado a conocer' suena natural y mantiene el valor de declaración consumada.
- source_word: נֶאֱמָנָה
  english_pob_choice: what is sure
  chosen_spanish: lo seguro
  alternatives_spanish:
  - lo seguro y firme
  - lo cierto
  - lo confiable
  lexicon: HALOT
  rationale: נֶאֱמָנָה expresa firmeza, confiabilidad y certeza; aquí funciona como sustantivo. 'Lo seguro' conserva la idea de una palabra/jucio fiable y estable.
theological_decisions:
- issue: Si conviene explicitar que Efraín representa al reino del norte
  english_pob_reading: Retain 'Ephraim' without expansion
  chosen_spanish_reading: Mantener 'Efraín' sin expansión interpretativa
  alternative_spanish_readings:
  - El reino del norte/Israel se convertirá en una desolación
  rationale: El hebreo nombra directamente a Efraín. La equivalencia transparente favorece conservar el nombre y dejar que el contexto profético sugiera su valor metonímico.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo rendir תּוֹכֵחָה sin borrar su matiz judicial
  english_pob_reading: rebuke
  chosen_spanish_reading: reprensión
  alternative_spanish_readings:
  - reprueba
  - corrección
  - juicio
  - castigo
  rationale: '''Reprensión'' está más cerca del valor léxico primario que ''castigo'' o ''juicio'', pero en contexto permite oír la severidad judicial sin resolverla por paráfrasis.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El inglés POB fue revisado de 'certain' a 'sure' para נֶאֱמָנָה; la versión española sigue esa decisión con 'lo seguro', manteniendo la naturalidad y la idea de certeza firme. También se preservó la tensión entre el valor léxico de תּוֹכֵחָה ('reprensión') y su fuerza judicial contextual.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque no aparece el tetragrámaton ni κύριος en este versículo.
  - '''Efraín'' se mantuvo como nombre propio, sin explicitar la metonimia en el cuerpo del texto.'
  - '''Lo seguro'' traduce el sustantivo implícito de נֶאֱמָנָה sin cargarlo con terminología doctrinal ajena al contexto.'
  - La puntuación sigue el ritmo profético breve del hebreo, con la primera cola y la declaración final claramente separadas.
