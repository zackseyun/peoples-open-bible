    issue: '''la carga'' puede sonar como el objeto o peso, no como la tarea de transportar'
    rationale: El audit trail inglés escoge 'the carrying' precisamente para expresar la acción de llevar. En español, 'la carga' desplaza el foco semántico y puede reducir fidelidad al hebreo contextual.
  - severity: medium
    issue: '''era entendido en ella'' es poco natural y no expresa bien pericia práctica'
    rationale: מֵבִין הוּא aquí significa competente/experto. 'Entendido' puede entenderse, pero suena rígido y ambiguo en español contemporáneo.
  - severity: low
