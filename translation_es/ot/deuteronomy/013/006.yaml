base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/013/006.yaml
  text: But that prophet[a], or that dreamer of dreams, shall be put to death, because he has spoken rebellion against Yahweh your God, who brought you out from the land of Egypt and redeemed you from the house of slavery, to drive you from the way in which Yahweh your God commanded you to walk[b]. So you shall purge the evil from your midst.
  footnotes:
