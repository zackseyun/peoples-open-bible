lexical_decisions:
- source_word: אֲזַי
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - en ese momento
  - entonces, en tal caso
  lexicon: HALOT
  rationale: Adverbio temporal y consecutivo que mantiene el avance hipotético del contexto. «Entonces» es natural en español y conserva la relación con la condición implícita del versículo anterior.
- source_word: עָבַר
  english_pob_choice: passed over
  chosen_spanish: habrían pasado sobre
  alternatives_spanish:
  - habrían cruzado sobre
  - habrían atravesado sobre
  lexicon: HALOT
  rationale: Se conserva el verbo básico «pasar» para reflejar la correspondencia verbal directa con el hebreo עָבַר, sin perder la imagen de las aguas sobrepasando la víctima. El auxiliar condicional compuesto expresa bien el carácter contrafactual.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por encima de
  lexicon: HALOT
  rationale: Preposición espacial estándar en español para el complemento con עבר; mantiene la imagen de las aguas cubriendo o rebasando el objeto.
- source_word: נַפְשֵׁנוּ
  english_pob_choice: our soul
  chosen_spanish: nuestra alma
  alternatives_spanish:
  - nosotros
  - nuestras vidas
  - nuestro ser
  lexicon: HALOT
  rationale: POB revisó el inglés hacia «our soul» para reflejar נֶפֶשׁ sin reducirlo a un mero pronombre. En español, «alma» conserva la singularidad hebrea y es más natural que una solución puramente pronominal, aunque sigue siendo una traducción interpretativa de la persona/vida.
- source_word: הַמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El plural hebreo se mantiene con plural español, respetando la imagen poética de aguas embravecidas.
- source_word: הַזֵּידוֹנִים
  english_pob_choice: raging
  chosen_spanish: arrogantes
  alternatives_spanish:
  - insolentes
  - presuntuosas
  - altivas
  lexicon: HALOT
  rationale: El adjetivo hebreo procede de una raíz asociada con orgullo insolente o presunción. A diferencia del inglés POB, donde «raging» interpreta la fuerza violenta de las aguas, en español se prefirió conservar el valor léxico documentado con «arrogantes», que mantiene la tensión metafórica de aguas personificadas sin introducir una intensidad no explicitada por el término mismo.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente reintrodujo la estructura más cercana al hebreo: «then», «passed over», «our soul», y mantuvo el carácter metafórico de las aguas. La presente redacción sigue esa línea, pero en español conserva el valor léxico del adjetivo hebreo con «arrogantes» en lugar de trasladar la interpretación dinámica de «raging», para no borrar la tensión documentada entre el sentido literal del adjetivo y su fuerza metafórica en contexto.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u այլ masking conventions porque el versículo no contiene el nombre divino.
  - «nuestra alma» mantiene la singularidad de נַפְשֵׁנוּ, aunque en español bíblico puede sonar más interpretativo que «nosotros»; se prefirió por fidelidad semántica al audit trail.
  - «las aguas» conserva el plural poético del hebreo.
  - La nota de pie de página se ancla en «arrogantes» para explicitar la alternativa léxica sin duplicar marcadores.
