    issue: La traducción principal de רוּחַ הַטֻּמְאָה invierte la preferencia léxica auditada.
    rationale: El inglés POB eligió «the unclean spirit» como texto principal por su fuerza idiomática y personal, con «the spirit of uncleanness» como alternativa. El borrador español pone «espíritu de impureza» en el texto y «espíritu inmundo» en nota, alterando esa jerarquía sin necesidad.
  - severity: low
