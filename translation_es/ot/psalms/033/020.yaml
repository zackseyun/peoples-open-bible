review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: sujeto corporativo singular («nuestra alma»), espera dirigida a Yahvé, y la cláusula nominal «él es nuestra ayuda y nuestro escudo». Sin embargo, «espera en Yahvé» no representa con suficiente precisión el uso de ל con חכה, que aquí se entiende mejor como espera dirigida hacia Yahvé, es decir, «espera a Yahvé» o «espera en Yahvé» según tradición; en este contexto, la opción más fiel y natural es «espera a Yahvé».'
  spanish_quality_summary: El español es claro y digno. «Nuestra alma» es comprensible en registro bíblico y la nota ayuda adecuadamente. La frase suena natural, pero «espera en Yahvé» resulta menos idiomática para este verbo y puede sugerir confiar en vez de esperar a alguien. Cambiar a «espera a Yahvé» mejora la precisión y la legibilidad.
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יהוה → «Yahvé», עֵזֶר → «ayuda», מָגֵן → «escudo». También conserva correctamente «alma» para נֶפֶשׁ con nota explicativa. La única desalineación menor es preposicional/idiomática, no de glosario.'
  issues:
  - severity: medium
    issue: «espera en Yahvé» para חִכְּתָה לַיהוָה
    rationale: Aunque en español bíblico existe «esperar en», aquí puede leerse más como confiar que como aguardar. El hebreo expresa espera dirigida hacia Yahvé; «espera a Yahvé» comunica mejor el sentido básico y evita introducir un matiz distinto.
  revised_spanish_text: Nuestra alma espera a Yahvé[a]; él es nuestra ayuda y nuestro escudo.
  revised_footnotes:
