  text: כִּֽי יִתֵּן֩ אִ֨ישׁ אֶל רֵעֵ֜/הוּ חֲמ֨וֹר אוֹ שׁ֥וֹר אוֹ שֶׂ֛ה וְ/כָל בְּהֵמָ֖ה לִ/שְׁמֹ֑ר וּ/מֵ֛ת אוֹ נִשְׁבַּ֥ר אוֹ נִשְׁבָּ֖ה אֵ֥ין רֹאֶֽה־־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/022/009.yaml
  text: If a man gives his neighbor a donkey[a], or an ox, or a sheep, or any animal to keep, and it dies, or is injured, or is carried off, with no one seeing it[c][b],
  footnotes:
  - marker: a
    text: Or 'a sheep or a goat'; the Hebrew שֶׂה can refer more broadly to one of the flock.
    reason: lexical_alternative
  - marker: b
    text: Literally 'is broken.'
    reason: lexical_alternative
  - marker: c
    text: That is, there is no eyewitness to what happened.
    reason: lexical_alternative
