translation:
  language: es
  text: 'Pero uno de los que estaban recostados[a] a la mesa con él, al oír estas cosas, le dijo: «Bienaventurado el que comerá pan en el reino de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «recostados a la mesa»; conserva la imagen cultural de la comida compartida.
    reason: cultural_note
lexical_decisions:
- source_word: Ἀκούσας
  english_pob_choice: when ... heard
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oyó
  - habiendo oído
  lexicon: BDAG
  rationale: El participio aoristo funciona con valor temporal; en español, «al oír» expresa con naturalidad la secuencia sin perder la relación inmediata con lo dicho antes.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca una transición leve y reactiva en el relato; «Pero» comunica bien el giro discursivo en español.
- source_word: τις
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - alguien
  - un cierto
  lexicon: BDAG
  rationale: El indefinido singular se refiere a una persona no identificada del grupo; «uno» es conciso y natural en este contexto.
- source_word: τῶν συνανακειμένων
  english_pob_choice: of those reclining at the table with him
  chosen_spanish: de los que estaban recostados a la mesa con él
  alternatives_spanish:
  - de los que comían con él
  - de los comensales que estaban con él
  lexicon: BDAG
  rationale: Conservar «recostados a la mesa» refleja el trasfondo cultural de la escena y mantiene la imagen corporal del griego, a la vez que es comprensible en español.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - lo que dijo
  lexicon: BDAG
  rationale: El demostrativo plural apunta a las afirmaciones previas de Jesús; «estas cosas» reproduce el alcance referencial sin especificarlo de más.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: he said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo a él
  lexicon: BDAG
  rationale: La fórmula narrativa es directa; en español, el dativo indirecto se expresa con naturalidad mediante «le dijo».
- source_word: Μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Bendito
  - Feliz
  lexicon: BDAG
  rationale: En un dicho de carácter escatológico, «Bienaventurado» preserva la fuerza de dicha/favor divino y su registro tradicional sin reducirlo a un mero estado emocional.
- source_word: ὅστις
  english_pob_choice: whoever
  chosen_spanish: el que
  alternatives_spanish:
  - quienquiera que
  - quien
  lexicon: BDAG
  rationale: El relativo indefinido tiene fuerza genérica; «el que» suena natural en español y mantiene la referencia abierta a cualquiera que cumpla la condición.
- source_word: φάγεται
  english_pob_choice: will eat
  chosen_spanish: comerá
  alternatives_spanish:
  - irá a comer
  - estará comiendo
  lexicon: BDAG
  rationale: El futuro griego indica una acción futura en el banquete escatológico; «comerá» lo expresa de manera directa y clara en español.
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - un pan
  - alimento
  lexicon: BDAG
  rationale: «ἄρτος» significa literalmente pan; en español, «pan» conserva la imagen concreta y el valor idiomático de una comida compartida.
- source_word: ἐν τῇ βασιλείᾳ τοῦ θεοῦ
  english_pob_choice: in the kingdom of God
  chosen_spanish: en el reino de Dios
  alternatives_spanish:
  - dentro del reino de Dios
  - en el reino de Dios
  lexicon: BDAG
  rationale: La frase se traduce de forma directa. «Reino de Dios» mantiene la terminología bíblica estándar y el sentido escatológico del pasaje.
theological_decisions:
- issue: Beatitud de Μακάριος en un dicho escatológico sobre la mesa del reino
  english_pob_reading: Blessed is whoever will eat bread in the kingdom of God
  chosen_spanish_reading: ¡Bienaventurado el que comerá pan en el reino de Dios!
  alternative_spanish_readings:
  - ¡Feliz el que comerá pan en el reino de Dios!
  - ¡Bendito el que comerá pan en el reino de Dios!
  rationale: «Bienaventurado» conserva el peso teológico de la bienaventuranza sin reducirla a mera felicidad subjetiva; además, encaja bien con el tono proclamativo del dicho.
  doctrine_reference: Translation philosophy §6; mantener el peso teológico sin sacrificar claridad.
translation_notes:
  revision_awareness: Se ajustó la puntuación y la estructura para que la nota de lectura mantenga un anclaje visible en el texto; se optó por una formulación idiomática que conserva la imagen cultural de los comensales reclinados y la beatitud escatológica del dicho. No se siguió una traducción mecánica desde el inglés; se verificó la sintaxis griega y el valor del participio aoristo, del relativo indefinido y del futuro verbal.
  spanish_consistency_notes:
  - Se mantiene «reino de Dios» según el término teológico estándar del proyecto.
  - Se usa «Bienaventurado» para Μακάριος, preservando el registro de beatitud escatológica.
  - Se traduce ἄρτον como «pan» para conservar la literalidad e imagen idiomática.
  - La referencia a los que estaban «recostados a la mesa» reproduce el trasfondo cultural del texto griego.
