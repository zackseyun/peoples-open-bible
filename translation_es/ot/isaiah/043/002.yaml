translation:
  language: es
  text: Cuando pases por las aguas[a], yo estaré contigo; y por los ríos, no te arrastrarán. Cuando camines por el fuego, no te chamuscarás[b], y la llama no te abrasará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "no te abrumarán". El hebreo puede denotar desbordar, arrasar o llevarse por delante.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "no serás quemado". El hebreo distingue esta cláusula de la siguiente, que dice más directamente que la llama no te abrasará.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Porque
  - Si
  lexicon: HALOT
  rationale: En este contexto introduce una circunstancia temporal, no una causa ni una mera hipótesis; por eso 'Cuando' conserva mejor el sentido y el paralelismo del verso.
- source_word: תַעֲבֹר
  english_pob_choice: you pass through
  chosen_spanish: pases por
  alternatives_spanish:
  - cruces
  - atravieses
  lexicon: HALOT
  rationale: עבר expresa pasar o atravesar; 'pasar por' es natural en español y mantiene la imagen de tránsito peligroso sin perder el movimiento implícito.
- source_word: בַּמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  - las aguas
  lexicon: HALOT
  rationale: El plural hebreo se conserva como 'las aguas' para retener la imagen poética y amenazante, no un sustantivo genérico singular.
- source_word: אִתְּךָ אָ֔נִי
  english_pob_choice: I am with you
  chosen_spanish: yo estaré contigo
  alternatives_spanish:
  - estoy contigo
  - yo estoy contigo
  lexicon: HALOT
  rationale: El hebreo expresa presencia divina de acompañamiento. En español, el futuro 'estaré' comunica con naturalidad la promesa y mantiene el énfasis personal de 'yo'.
- source_word: וּבַנְּהָרוֹת
  english_pob_choice: and through the rivers
  chosen_spanish: y por los ríos
  alternatives_spanish:
  - y entre los ríos
  - y a través de los ríos
  lexicon: HALOT
  rationale: La preposición hebrea puede ser literalmente 'en', pero con el verbo de pasar, 'por' suena más idiomático en español y conserva el avance a través del peligro.
- source_word: לֹא יִשְׁטְפוּךָ
  english_pob_choice: they will not sweep over you
  chosen_spanish: no te arrastrarán
  alternatives_spanish:
  - no te sobrepasarán
  - no te inundarán
  - no te barrerán
  lexicon: HALOT
  rationale: שטף puede implicar desbordar, arrollar o arrastrar con la corriente. 'No te arrastrarán' preserva la fuerza concreta de la imagen sin volverla demasiado abstracta.
- source_word: תֵלֵךְ
  english_pob_choice: you walk
  chosen_spanish: camines
  alternatives_spanish:
  - vayas
  - andes
  lexicon: HALOT
  rationale: הלך es más amplio que caminar, pero 'caminar por el fuego' mantiene el paralelismo poético con 'pasar por las aguas' y funciona con naturalidad en español.
- source_word: בְּמוֹ אֵשׁ
  english_pob_choice: through fire
  chosen_spanish: por el fuego
  alternatives_spanish:
  - en el fuego
  - a través del fuego
  lexicon: HALOT
  rationale: La expresión señala tránsito dentro de un medio peligroso; 'por el fuego' conserva la fuerza de la imagen y evita una construcción demasiado pesada.
- source_word: לֹא תִכָּוֶה
  english_pob_choice: you will not be scorched
  chosen_spanish: no te quemarás
  alternatives_spanish:
  - no te chamuscarás
  - no serás quemado
  lexicon: HALOT
  rationale: כוה refiere a ser quemado o chamuscado. 'No te quemarás' es la opción más clara y natural en español, aunque deja sin marcar la distinción léxica que el inglés explicitó con 'scorched'.
- source_word: וְלֶהָבָה
  english_pob_choice: and the flame
  chosen_spanish: y la llama
  alternatives_spanish:
  - y la flama
  - y la llama del fuego
  lexicon: HALOT
  rationale: לֶהָבָה es 'llama' o 'flama'; 'llama' es el equivalente más estándar y digno para el registro bíblico en español.
- source_word: לֹא תִבְעַר בָּךְ
  english_pob_choice: will not burn you
  chosen_spanish: no te abrasará
  alternatives_spanish:
  - no te quemará
  - no arderá en ti
  - no prenderá en ti
  lexicon: HALOT
  rationale: בער con ב expresa arder o quemar sobre alguien. 'No te abrasará' mantiene la intensidad y ayuda a distinguir esta cláusula de la anterior, como hace el texto inglés.
theological_decisions:
- issue: Naturaleza de la promesa en las imágenes de aguas y fuego
  english_pob_reading: A divine promise of God's presence and protection through severe trials, expressed in concrete poetic imagery without guaranteeing the absence of all suffering.
  chosen_spanish_reading: Una promesa divina de presencia y preservación en medio de pruebas severas, expresada en imágenes concretas sin convertirla en una garantía de ausencia total de dolor o daño.
  alternative_spanish_readings:
  - Una promesa solo de pruebas espirituales
  - Una garantía absoluta de que nunca habrá daño físico
  rationale: El verso usa imágenes reales de aguas, ríos, fuego y llama para afirmar la presencia de Dios en el peligro. La traducción conserva esa concreción y no la reduce a una metáfora exclusivamente espiritual ni la exagera como invulnerabilidad total.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Coincide con la evaluación de alta concordancia del registro inglés; no se requirieron revisiones adicionales. Se mantuvo la distinción poética entre la combustión general y la acción específica de la llama.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exija; este versículo no contiene el tetragrámaton.
  - Se preserva el plural poético 'las aguas' y 'los ríos' para mantener la imaginería hebrea.
  - Se evita 'SEÑOR' como sustituto teológico aquí porque el verso no contiene el nombre divino explícito.
  - '''Abrasará'' distingue mejor la última cláusula de la anterior que repetir ''quemará''.'
