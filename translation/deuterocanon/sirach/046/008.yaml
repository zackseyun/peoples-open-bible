translation:
  text: Therefore those two also were spared[a], out of six hundred thousand foot soldiers, to bring them into an inheritance[b], into a land flowing with milk and honey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'among the years' is difficult; it may mean that the two were preserved through the years or into old age. The Greek parallel instead reads more simply, 'being two, they were saved.'
    reason: textual_variant
  - marker: b
    text: 'The Greek parallel continues: ''to bring them into an inheritance, into a land flowing with milk and honey.'' This likely preserves the fuller sense of the verse where the Hebrew witness is shorter.'
    reason: alternative_reading
lexical_decisions:
- source_word: לכן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks an inference from the preceding line about turning back wrath and stopping evil report; 'Therefore' preserves the causal connection clearly.
- source_word: גם הם
  chosen: those two also
  alternatives:
  - they too
  - even they
  lexicon: HALOT
  rationale: The Hebrew points to two persons previously mentioned (Joshua and Caleb); 'those two also' makes the dual reference explicit in natural English. The Greek likewise has καὶ αὐτοὶ δύο, supporting the explicit 'two'.
- source_word: בשנים
  chosen: among the years
  alternatives:
  - for years
  - in their lifetime
  - through the years
  lexicon: HALOT
  rationale: The Hebrew wording is difficult and somewhat uncertain. A literal rendering would be obscure in English, but the phrase appears to indicate preservation over time/into advanced age. Because the Greek lacks a direct equivalent and instead simply says 'being two, they were saved,' the main text keeps a restrained rendering that reflects the Hebrew without over-interpreting.
- source_word: נאצלו
  chosen: were delivered
  alternatives:
  - were spared
  - were rescued
  - were preserved
  lexicon: HALOT
  rationale: Conveys being saved from destruction. 'Delivered' fits both the Hebrew verb and the Greek διεσώθησαν, while avoiding overly narrow rescue imagery.
- source_word: משש מאות אלף רגלי
  chosen: out of six hundred thousand foot soldiers
  alternatives:
  - from six hundred thousand on foot
  - from among six hundred thousand infantry
  lexicon: HALOT
  rationale: רגלי literally relates to those on foot; in this census/military context 'foot soldiers' is the clearest idiomatic rendering. The Greek πεζῶν confirms the military sense.
- source_word: εἰσαγαγεῖν αὐτοὺς εἰς κληρονομίαν
  chosen: to bring them into an inheritance
  alternatives:
  - to lead them into their inheritance
  - to bring them into possession
  lexicon: BDAG
  rationale: This clause is present in the Greek parallel and supplies the continuation absent from the extant Hebrew line. 'Bring them into an inheritance' preserves the covenant-land sense without paraphrase.
- source_word: εἰς γῆν ῥέουσαν γάλα καὶ μέλι
  chosen: into a land flowing with milk and honey
  alternatives:
  - to a land flowing with milk and honey
  lexicon: BDAG
  rationale: Standard idiom for the promised land, well established in biblical English and directly supported by the Greek.
