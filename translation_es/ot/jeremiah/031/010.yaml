    rationale: No es un error de fidelidad, pero mejora ligeramente el tono profético y la legibilidad en español.
  revised_spanish_text: 'Oigan la palabra de Yahvé, oh naciones, y declárenla en las costas lejanas[a]; digan: «El que dispersó a Israel lo reunirá[b] y lo guardará[b] como un pastor guarda su rebaño».

