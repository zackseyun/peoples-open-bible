  text: אֶֽעֱבֹ֨ר בְּ/כָל צֹֽאנְ/ךָ֜ הַ/יּ֗וֹם הָסֵ֨ר מִ/שָּׁ֜ם כָּל שֶׂ֣ה נָקֹ֣ד וְ/טָל֗וּא וְ/כָל שֶׂה חוּם֙ בַּ/כְּשָׂבִ֔ים וְ/טָל֥וּא וְ/נָקֹ֖ד בָּ/עִזִּ֑ים וְ/הָיָ֖ה שְׂכָרִֽ/י־־׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/030/032.yaml
  text: Let me pass through all your flock today[a], removing from there every speckled and spotted sheep, every dark-colored lamb among the sheep, and every spotted and speckled one among the goats[b]; and that will be my wages.
  footnotes:
  - marker: a
    text: Or 'brown' for 'dark-colored' (חוּם). The Hebrew refers to a dark or brown coloration among the sheep.
    reason: lexical_alternative
  - marker: b
    text: '''Speckled'' (נָקֹד) and ''spotted'' (טָלוּא) are both patterned-color terms; the exact distinction may overlap, so the pair could also be rendered ''spotted and patchy'' or similar.'
    reason: lexical_alternative
