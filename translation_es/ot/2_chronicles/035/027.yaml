translation:
  language: es
  text: Sus hechos[a], los primeros y los últimos, he aquí[b], están escritos en el libro[c] de los reyes de Israel y Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'sus palabras' o 'sus asuntos'; el término hebreo puede abarcar palabras, asuntos o hechos. En este resumen real, 'hechos' expresa mejor el sentido.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''he aquí'', una partícula enfática que llama la atención sobre la fuente escrita.'
    reason: lexical_alternative
  - marker: c
    text: O 'sobre el rollo/libro de los reyes de Israel y Judá'. La preposición hebrea es literalmente 'sobre', pero en español suele decirse 'en' para los registros escritos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְבָרָיו
  english_pob_choice: his acts
  chosen_spanish: sus hechos
  alternatives_spanish:
  - sus palabras
  - sus asuntos
  - sus actos
  lexicon: HALOT
  rationale: El sustantivo דָּבָר puede abarcar 'palabra', 'asunto' o, por extensión, 'hecho/acto'. En este resumen real, el contexto favorece una referencia a las acciones o acontecimientos del rey; 'hechos' comunica bien ese campo semántico en español sin reducirlo a 'palabras'.
- source_word: הָרִאשֹׁנִים וְהָאַחֲרֹנִים
  english_pob_choice: first and last
  chosen_spanish: los primeros y los últimos
  alternatives_spanish:
  - los de antes y los de después
  - los primeros y postreros
  - los anteriores y los posteriores
  lexicon: HALOT
  rationale: La expresión idiomática hebrea abarca toda la extensión de la historia del sujeto. 'Los primeros y los últimos' conserva la fórmula de manera natural en español y refleja mejor el paralelismo que una paráfrasis explicativa.
- source_word: הִנָּם
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - ciertamente
  - en efecto
  lexicon: HALOT
  rationale: La partícula es enfática y dirige la atención al registro escrito. 'He aquí' mantiene ese valor deíctico y solemne en un registro bíblico claro para el español contemporáneo.
- source_word: כְּתוּבִים
  english_pob_choice: are written
  chosen_spanish: están escritos
  alternatives_spanish:
  - están registrados
  - se hallan escritos
  lexicon: HALOT
  rationale: El participio pasivo de כתב se traduce de forma directa como 'están escritos'. En este contexto documental, esa forma es precisa y suficientemente idiomática.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - sobre el libro
  - en el rollo
  - en el libro
  lexicon: HALOT
  rationale: Aunque עַל es literalmente 'sobre/encima de', el español documental prefiere 'en' para registros escritos. 'Libro' se mantiene como renderización natural de סֵפֶר en este tipo de cita archivística.
- source_word: מַלְכֵי יִשְׂרָאֵל וִיהוּדָה
  english_pob_choice: the Kings of Israel and Judah
  chosen_spanish: de los Reyes de Israel y de Judá
  alternatives_spanish:
  - de los reyes de Israel y de Judá
  - de los monarcas de Israel y de Judá
  lexicon: HALOT
  rationale: La frase funciona como título del documento citado. Mantener 'Reyes' con mayúscula respeta el valor titular del texto fuente y reproduce la referencia documental sin añadir interpretación.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con la auditoría inglesa; no se requieren revisiones textuales adicionales. Se mantuvo la estructura resumida del original y la tensión semántica de דבר como 'hechos/asuntos/palabras' mediante nota.
  spanish_consistency_notes:
  - Se usó 'Yahvé' por norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conservó el carácter documental del enunciado sin convertir 'Libro' en una paráfrasis interpretativa.
  - Se mantuvo el paralelismo 'los primeros y los últimos' para reflejar el hebreo idiomático.
  - '''He aquí'' conserva la función enfática de הִנָּם en un registro bíblico comprensible.'
