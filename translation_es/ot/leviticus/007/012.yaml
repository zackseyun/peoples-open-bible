  text: אִ֣ם עַל תּוֹדָה֮ יַקְרִיבֶ/נּוּ֒ וְ/הִקְרִ֣יב עַל זֶ֣בַח הַ/תּוֹדָ֗ה חַלּ֤וֹת מַצּוֹת֙ בְּלוּלֹ֣ת בַּ/שֶּׁ֔מֶן וּ/רְקִיקֵ֥י מַצּ֖וֹת מְשֻׁחִ֣ים בַּ/שָּׁ֑מֶן וְ/סֹ֣לֶת מֻרְבֶּ֔כֶת חַלֹּ֖ת בְּלוּלֹ֥ת בַּ/שָּֽׁמֶן־׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/007/012.yaml
  text: If he offers it as a thanksgiving offering[a], then with the sacrifice of thanksgiving he shall offer unleavened loaves mixed with oil, unleavened wafers anointed with oil[c][b], and cakes of fine flour well mixed with oil.
  footnotes:
  - marker: a
    text: Or 'thank offering.' The Hebrew תּוֹדָה refers to an offering brought in thanksgiving.
    reason: lexical_alternative
  - marker: b
    text: Or 'anointed with oil.' Here the phrase refers to oil applied to the unleavened wafers in food preparation, not a ritual anointing of persons or objects.
    reason: lexical_alternative
  - marker: c
    text: The exact preparation implied by the Hebrew term rendered 'well mixed' is uncertain; it may refer to cakes made from fine flour thoroughly worked or mixed with oil.
    reason: cultural_note
