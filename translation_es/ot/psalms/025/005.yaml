translation:
  language: es
  text: Guíame en tu verdad y enséñame, porque tú eres el Dios de mi salvación; te espero[a] todo el día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te aguardo»; o «en ti espero». El verbo hebreo incluye la idea de esperar con expectativa o esperanza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדְרִיכֵנִי
  english_pob_choice: Lead me
  chosen_spanish: Llévame
  alternatives_spanish:
  - Llévame por el camino
  - Guíame
  lexicon: HALOT
  rationale: El hifil de דרך expresa hacer avanzar o conducir a alguien por un camino. En español, 'Llévame' conserva la imagen direccional de conducción y suena natural en este contexto poético; 'Guíame' también es posible, pero puede sonar un poco más general.
- source_word: בַאֲמִתֶּךָ
  english_pob_choice: in your truth
  chosen_spanish: en tu verdad
  alternatives_spanish:
  - por tu verdad
  - en tu fidelidad
  lexicon: HALOT
  rationale: אֱמֶת puede significar verdad, fiabilidad o fidelidad. La frase con enseñanza y guía favorece 'verdad' como ámbito o norma en que se pide ser conducido. 'Fidelidad' es viable, pero desplaza el énfasis hacia la confiabilidad divina más que hacia la verdad como contenido y camino.
- source_word: וְלַמְּדֵנִי
  english_pob_choice: and teach me
  chosen_spanish: y enséñame
  alternatives_spanish:
  - e instrúyeme
  lexicon: HALOT
  rationale: El piel de למד significa claramente 'enseñar'. 'Enséñame' es la equivalencia más directa e idiomática en español; 'instrúyeme' es aceptable, pero algo más formal y menos natural aquí.
- source_word: אֱלֹהֵי יִשְׁעִי
  english_pob_choice: the God of my salvation
  chosen_spanish: el Dios de mi salvación
  alternatives_spanish:
  - mi Dios salvador
  - el Dios que me salva
  lexicon: HALOT
  rationale: La construcción en hebreo es un genitivo nominal que se refleja con claridad en español como 'el Dios de mi salvación'. Mantiene tanto la relación posesiva como el peso teológico de Dios como fuente de liberación.
- source_word: קִוִּיתִי
  english_pob_choice: I wait
  chosen_spanish: espero
  alternatives_spanish:
  - aguardo
  - espero con confianza
  lexicon: HALOT
  rationale: קוה incluye la idea de esperar con expectativa. En español, 'espero' comunica bien esa espera confiada sin añadir explicación; 'aguardo' es posible, pero menos natural en registro devocional moderno.
- source_word: אוֹתְךָ
  english_pob_choice: for you
  chosen_spanish: en ti
  alternatives_spanish:
  - por ti
  - a ti
  lexicon: HALOT
  rationale: Con קוה, el complemento se entiende como esperar en/por alguien. Dado el español bíblico y la lectura devocional del salmo, 'en ti espero' expresa la confianza implícita del hebreo sin perder naturalidad. La alternativa 'por ti' enfatizaría más el esperar a una persona, pero suena menos estable en esta formulación.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - a lo largo de todo el día
  - durante todo el día
  lexicon: HALOT
  rationale: El modismo indica la totalidad del día. 'Todo el día' es la forma más natural y fiel en español, preservando la duración continua.
theological_decisions:
- issue: Renderizado de אֱמֶת en un contexto de guía e instrucción
  english_pob_reading: Rendered as 'truth' rather than 'faithfulness.'
  chosen_spanish_reading: '''verdad'' en vez de ''fidelidad'''
  alternative_spanish_readings:
  - fidelidad
  - lealtad
  rationale: La combinación con 'llévame' y 'enséñame' apunta a la verdad como esfera o norma de la instrucción divina. 'Fidelidad' sigue siendo lexicamente posible, pero desplaza el foco hacia el carácter confiable de Dios más que hacia la verdad que guía y enseña.
  doctrine_reference: Translation philosophy §3, §5
- issue: Matiz de קוה en la oración
  english_pob_reading: Rendered as 'I wait' in the main text.
  chosen_spanish_reading: '''espero'''
  alternative_spanish_readings:
  - aguardo
  - espero con confianza
  rationale: El verbo hebreo combina espera y esperanza. 'Espero' conserva la acción de esperar con una carga de confianza suficientemente implícita para el español moderno, sin convertir el texto en una paráfrasis explicativa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El pasaje concuerda ampliamente con la revisión más reciente: no se reportan cambios aplicados y el cotejo indica alto acuerdo. La redacción española mantiene las decisiones léxicas principales del POB inglés, adaptándolas a un español natural y conservando las alternativas documentadas en notas.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים, sin sustitución por fórmulas eclesiales más tradicionales.
  - '''verdad'' se conserva como término principal para אֱמֶת, con nota de ''fidelidad'' para reflejar la tensión léxica.'
  - '''espero'' refleja el verbo קוה sin perder el matiz de espera confiada.'
  - La frase final 'todo el día' preserva el valor durativo del hebreo.
  - No se introduce 'Señor' ni otras máscaras para el nombre divino, ya que este versículo no contiene יהוה.
