translation:
  language: es
  text: Tomó a los suyos y los hizo pasar el arroyo[a], e hizo pasar lo que le pertenecía[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el uadi' o 'el torrente'. El hebreo נחל puede referirse a un arroyo, una cañada o un cauce estacional.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'lo que era para él'; es decir, lo que le pertenecía o sus posesiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּחֵם
  english_pob_choice: He took them
  chosen_spanish: Él los tomó
  alternatives_spanish:
  - Él los llevó consigo
  - Él los tomó consigo
  lexicon: HALOT
  rationale: לקח en esta forma narrativa suele significar 'tomar'. En español, 'los tomó' reproduce con naturalidad la acción directa de Jacob sin añadir una relación explícita de acompañamiento que el hebreo no exige.
- source_word: וַיַּעֲבִרֵם
  english_pob_choice: brought them across
  chosen_spanish: los hizo pasar
  alternatives_spanish:
  - los trajo al otro lado
  - los pasó
  lexicon: HALOT
  rationale: 'El hifil de עבר es causativo: Jacob hace que crucen. ''Los hizo pasar'' conserva esa causalidad mejor que un simple ''cruzaron'' y suena natural en español.'
- source_word: הַנָּחַל
  english_pob_choice: the stream
  chosen_spanish: el arroyo
  alternatives_spanish:
  - el torrente
  - el río de temporada
  - el uadi
  lexicon: HALOT
  rationale: נחל puede referirse a un curso de agua estacional, una cañada o un torrente. 'Arroyo' es una opción clara y comprensible en español; mantiene la imagen de paso por agua sin imponer una precisión geográfica excesiva.
- source_word: וַיַּעֲבֵר
  english_pob_choice: he brought across
  chosen_spanish: hizo pasar
  alternatives_spanish:
  - lo cruzó
  - lo pasó al otro lado
  lexicon: HALOT
  rationale: Se conserva el valor causativo del hifil, ahora aplicado a los bienes de Jacob. 'Hizo pasar' mantiene la misma construcción verbal que el primer miembro del versículo.
- source_word: אֲשֶׁר לוֹ
  english_pob_choice: what belonged to him
  chosen_spanish: lo que le pertenecía
  alternatives_spanish:
  - lo que era suyo
  - sus posesiones
  - todo lo que tenía
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente 'lo que era para él'. En español, 'lo que le pertenecía' conserva la relación posesiva sin forzar una lista de bienes que el texto no especifica.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran alta concordancia y no requieren corrección sustancial. Se mantuvo el sentido causativo de los dos verbos hifil y la ambigüedad léxica de נחל mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usó 'hizo pasar' para ambos verbos causativos de עבר, preservando la repetición enfática del hebreo.
  - Se eligió 'arroyo' como término principal por claridad, dejando en nota las alternativas topográficas reconocidas por el POB inglés.
  - '''Lo que le pertenecía'' evita sobreespecificar ''posesiones'' y sigue de cerca la construcción relativa del hebreo.'
