translation:
  language: es
  text: Así seguíamos haciendo la obra, mientras la mitad de ellos sostenía las lanzas, desde la salida del alba hasta la salida de las estrellas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más idiomáticamente: «desde el amanecer hasta que salieron las estrellas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשִׂים
  english_pob_choice: kept doing
  chosen_spanish: seguíamos haciendo
  alternatives_spanish:
  - estábamos haciendo
  - continuábamos haciendo
  - seguíamos trabajando
  lexicon: HALOT
  rationale: El participio hebreo con וַ- comunica acción continua en el relato. «Seguíamos haciendo» conserva esa continuidad de manera natural en español y refleja mejor la duratividad que un simple pretérito puntual.
- source_word: בַּמְּלָאכָה
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la labor
  - la construcción
  lexicon: HALOT
  rationale: מְלָאכָה puede ser «trabajo» o «labor», pero en este contexto de reconstrucción y vigilancia «la obra» es una equivalencia natural en español bíblico moderno y no restringe indebidamente el sentido a mera construcción técnica.
- source_word: וְחֶצְיָם
  english_pob_choice: while half of them
  chosen_spanish: mientras la mitad de ellos
  alternatives_spanish:
  - y la mitad de ellos
  - con la mitad de ellos
  lexicon: HALOT
  rationale: La conjunción marca simultaneidad entre dos acciones. «Mientras la mitad de ellos» expresa mejor la coordinación temporal que un simple «y», que en español podría sonar solo aditivo.
- source_word: מַחֲזִיקִים
  english_pob_choice: held
  chosen_spanish: estaba sosteniendo
  alternatives_spanish:
  - sostenía
  - tenía en la mano
  - empuñaba
  lexicon: HALOT
  rationale: El participio denota una acción sostenida. «Estaba sosteniendo» conserva el aspecto continuo y, con «las lanzas», deja claro el porte armado sin sobreinterpretar un matiz técnico no explícito.
- source_word: בָּרְמָחִים
  english_pob_choice: the spears
  chosen_spanish: las lanzas
  alternatives_spanish:
  - las picas
  - las armas arrojadizas
  - las spears
  lexicon: HALOT
  rationale: רְמָחִים refiere a armas de asta, habitualmente traducibles como «lanzas» o «picas». «Lanzas» es natural y fiel en español; «spears» no es aceptable como término meta. Se evita «espadas» por no corresponder al hebreo.
- source_word: מֵעֲלוֹת הַשַּׁחַר
  english_pob_choice: from the rising of the dawn
  chosen_spanish: desde la salida del alba
  alternatives_spanish:
  - desde el amanecer
  - desde que despuntaba el alba
  - desde la salida de la aurora
  lexicon: HALOT
  rationale: La frase es literalmente «desde el subir/surgir del alba». «Desde la salida del alba» preserva la imagen del movimiento ascendente y mantiene la transparencia del hebreo mejor que una versión puramente idiomática.
- source_word: עַד צֵאת הַכּוֹכָבִים
  english_pob_choice: until the coming out of the stars
  chosen_spanish: hasta la salida de las estrellas
  alternatives_spanish:
  - hasta que salían las estrellas
  - hasta la aparición de las estrellas
  - hasta anochecer
  lexicon: HALOT
  rationale: El hebreo dice «hasta la salida/aparición de las estrellas». «Hasta la salida de las estrellas» reproduce esa imagen concreta. Se evita «anochecer» porque interpreta más de lo que el hebreo expresa de forma literal.
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en mantener la continuidad verbal, la coordinación simultánea y la imagen concreta del alba y las estrellas. Se ajusta el español para sonar natural sin perder transparencia semántica.
  spanish_consistency_notes:
  - Se mantiene «la obra» para מְלָאכָה en coherencia con un registro bíblico claro y no técnico.
  - Se usa «lanzas» para רְמָחִים de forma consistente con el valor militar del término.
  - Se preserva la secuencia temporal concreta «desde... hasta...» sin reemplazarla por un equivalente interpretativo como «desde el amanecer hasta anochecer».
