translation:
  language: es
  text: 'El siervo corrió a su encuentro y dijo: «Por favor, déjame beber[a] un poco de agua de tu cántaro».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dame de beber un poco de agua de tu cántaro». El imperativo hebreo puede expresarse como «déjame beber» o «dame de beber».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֶבֶד
  english_pob_choice: the servant
  chosen_spanish: el esclavo
  alternatives_spanish:
  - el siervo
  - el criado
  lexicon: HALOT
  rationale: El hebreo עֶבֶד puede significar 'siervo' o 'esclavo'. Aquí el POB inglés escogió 'servant' por el papel de agente doméstico, pero en español 'esclavo' conserva mejor la fuerza lexical de עֶבֶד sin forzar una lectura eclesiástica. Como el contexto narrativo subraya su condición de dependiente y enviado, 'esclavo' mantiene la tensión semántica documentada.
- source_word: וַיָּרָץ
  english_pob_choice: ran
  chosen_spanish: corrió
  alternatives_spanish:
  - se apresuró
  - echó a correr
  lexicon: HALOT
  rationale: El verbo רוץ en wayyiqtol narra una acción simple e inmediata. 'Corrió' es el equivalente natural en español y preserva la rapidez de la escena.
- source_word: לִקְרָאתָהּ
  english_pob_choice: to meet her
  chosen_spanish: a recibirla
  alternatives_spanish:
  - a encontrarse con ella
  - para ir a su encuentro
  lexicon: HALOT
  rationale: La construcción expresa movimiento hacia una persona para encontrarla. 'A recibirla' comunica bien el acercamiento intencional en español narrativo, aunque 'a ir a su encuentro' también sería posible; se prefiere la forma más breve sin perder el sentido direccional.
- source_word: הַגְמִיאִינִי
  english_pob_choice: let me drink / give me a drink
  chosen_spanish: dame a beber
  alternatives_spanish:
  - déjame beber
  - dame un poco de agua
  - hazme beber
  lexicon: HALOT
  rationale: El hifil imperativo de גמא permite tanto 'dejar beber' como 'dar de beber'. En español, 'dame a beber' reproduce con naturalidad la petición y conserva la ambigüedad verbal del hebreo entre permitir y proporcionar el agua.
- source_word: מְעַט מַיִם
  english_pob_choice: a little water
  chosen_spanish: un poco de agua
  alternatives_spanish:
  - algo de agua
  - una pequeña cantidad de agua
  lexicon: HALOT
  rationale: מְעַט con מַיִם pide una cantidad modesta. 'Un poco de agua' es la equivalencia idiomática más natural y fiel.
- source_word: מִכַּדֵּךְ
  english_pob_choice: from your jar
  chosen_spanish: de tu cántaro
  alternatives_spanish:
  - de tu jarra
  - de tu jarro
  lexicon: HALOT
  rationale: כַּד designa un recipiente para agua; en español 'cántaro' suele ser más preciso y vívido que 'jarra' o 'jarro'. El posesivo femenino se mantiene con 'tu' por el sufijo de segunda femenina singular.
theological_decisions:
- issue: Condición social de הָעֶבֶד
  english_pob_reading: servant
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - criado
  rationale: No hay razón contextual suficiente para suavizar עֶבֶד a un oficio neutro; el término hebreo conserva una relación de dependencia fuerte. El español 'esclavo' hace visible esa fuerza léxica y evita reemplazarla por terminología eclesiástica posterior.
  doctrine_reference: Lexical fidelity / social-historical semantics
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético de Génesis 24:17 y el audit trail inglés. No se detectaron cambios textuales ni revisiones posteriores que alteren la lectura base; la principal decisión de versión fue lexical, especialmente עֶבֶד y la ambigüedad de הַגְמִיאִינִי.
  spanish_consistency_notes:
  - Se mantiene un registro narrativo sobrio y bíblico, sin arcaísmos innecesarios.
  - Se evita 'SEÑOR' o terminología litúrgica ajena al versículo.
  - '''Cántaro'' se usa para un recipiente de agua reconocible y natural en español bíblico contemporáneo.'
