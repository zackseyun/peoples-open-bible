translation:
  language: es
  text: 'Entonces Ahimaas, hijo de Sadoc, dijo: «Por favor, permíteme correr y llevar noticias[a] al rey, porque Yahvé lo ha librado[b] de la mano de sus enemigos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y anunciar la buena noticia al rey», porque el verbo hebreo puede incluir el sentido de traer una noticia favorable.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque Yahvé lo ha juzgado a su favor» / «le ha hecho justicia», subrayando la vindicación judicial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲחִימַעַץ
  english_pob_choice: Then Ahimaaz
  chosen_spanish: Entonces Ahimaas
  alternatives_spanish:
  - Y Ahimaas
  - Luego Ahimaas
  lexicon: HALOT
  rationale: El waw narrativo avanza la acción; «Entonces» mantiene la secuencia y suena natural en español narrativo sin perder el valor conectivo.
- source_word: בֶּן צָדוֹק
  english_pob_choice: the son of Zadok
  chosen_spanish: hijo de Sadoc
  alternatives_spanish:
  - el hijo de Sadoc
  - hijo de Zadoc
  lexicon: HALOT
  rationale: Se conserva la filiación directa. «Sadoc» sigue la transliteración usual en español bíblico y evita una adaptación innecesaria.
- source_word: אָמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: Introducción estándar de discurso directo; «dijo» es la opción más natural y precisa.
- source_word: אָרוּצָה נָּא
  english_pob_choice: Please let me run
  chosen_spanish: Por favor, permíteme correr
  alternatives_spanish:
  - Por favor, déjame correr
  - Te ruego que me dejes correr
  lexicon: HALOT
  rationale: El cohortativo con נָא expresa petición cortés. «Permíteme correr» conserva la voluntariedad y la súplica sin forzar un giro más literal que suene artificial.
- source_word: וַאֲבַשְּׂרָה
  english_pob_choice: and bring news
  chosen_spanish: y llevar noticias
  alternatives_spanish:
  - y anunciar la buena noticia
  - y dar aviso
  lexicon: HALOT
  rationale: בשר aquí tiene el sentido de anunciar o traer noticias favorables. «Llevar noticias» mantiene el contenido sin introducir lenguaje técnico posterior que el contexto no exige.
- source_word: אֶת הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - ante el rey
  - para el rey
  lexicon: HALOT
  rationale: Aunque el hebreo marca objeto directo, en español la relación idiomática con «llevar noticias» se expresa naturalmente con «al rey».
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del anuncio. «Porque» es claro y fiel al valor explicativo de la cláusula.
- source_word: שְׁפָטוֹ
  english_pob_choice: has delivered him
  chosen_spanish: lo ha librado
  alternatives_spanish:
  - lo ha vindicado
  - le ha hecho justicia
  - lo ha juzgado a su favor
  lexicon: HALOT
  rationale: En este contexto de rescate de enemigos, el verbo lleva una fuerza de liberación/judicial favorable. «Lo ha librado» refleja bien el resultado de salvación que el inglés POB finalmente prioriza, sin perder la posibilidad judicial que queda subyacente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrama: transliteración del nombre divino, no sustitución por un título.'
- source_word: מִיַּד אֹיְבָיו
  english_pob_choice: from the hand of his enemies
  chosen_spanish: de la mano de sus enemigos
  alternatives_spanish:
  - del poder de sus enemigos
  - de sus enemigos
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «mano» como poder/control, manteniendo la metáfora transparente en español.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama. La política del POB en español pide transliterarlo como «Yahvé» para preservar el nombre personal del pacto en vez de ocultarlo con un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de שׁפט en el contexto
  english_pob_reading: has delivered him
  chosen_spanish_reading: lo ha librado
  alternative_spanish_readings:
  - lo ha vindicado
  - le ha hecho justicia
  - lo ha juzgado a su favor
  rationale: Aunque el verbo puede tener matiz judicial, aquí la cláusula «de la mano de sus enemigos» orienta el sentido hacia rescate/liberación. «Lo ha librado» mantiene esa tensión sin borrar el trasfondo forense.
  doctrine_reference: Lexical-theological context in 2 Samuel 18:19
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió «for» por un registro más formal y cambió de una formulación más judicial a otra que enfatiza la liberación. En español, se mantiene ese equilibrio con «porque» por claridad y con «lo ha librado» para reflejar el matiz de rescate, sin eliminar la alternativa judicial documentada en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se usa «Ahimaas» y «Sadoc» como transliteraciones habituales en español bíblico.
  - Se conserva la imagen de «la mano» para no desactivar la metáfora hebrea.
  - «Llevar noticias» evita introducir por defecto lenguaje de «evangelio» donde el contexto es un informe de victoria y vindicación.
