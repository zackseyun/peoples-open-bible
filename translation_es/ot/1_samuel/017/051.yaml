translation:
  language: es
  text: Entonces David corrió y se plantó sobre el filisteo[a], tomó su espada, la desenvainó de su vaina y lo mató; luego le cortó la cabeza con ella. Cuando los filisteos vieron que su campeón[b] estaba muerto, huyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se puso junto al filisteo». La expresión hebrea puede indicar que David tomó posición cerca de él; «se plantó sobre» refleja la escena probable de David de pie por encima del Goliat caído.
    reason: lexical_alternative
  - marker: b
    text: O «su guerrero» o «su hombre fuerte». «Campeón» conserva la idea de combatiente representativo que viene del contexto previo del capítulo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרָץ
  english_pob_choice: ran
  chosen_spanish: corrió
  alternatives_spanish:
  - se apresuró
  - echó a correr
  lexicon: HALOT
  rationale: El verbo narrativo básico de רוץ se expresa de forma natural en español con «corrió», que conserva la acción rápida sin añadir matiz no sustentado.
- source_word: וַיַּעֲמֹד אֶל הַפְּלִשְׁתִּי
  english_pob_choice: stood over the Philistine
  chosen_spanish: se puso sobre el filisteo
  alternatives_spanish:
  - se puso junto al filisteo
  - se colocó sobre el filisteo
  lexicon: HALOT
  rationale: El inglés POB opta por «stood over» para reflejar la escena de David ya dominante sobre el caído. En español, «se puso sobre» conserva esa relación espacial y el tono narrativo, sin perder la alternativa de cercanía física sugerida por el hebreo.
- source_word: חַרְבּוֹ
  english_pob_choice: his sword
  chosen_spanish: su espada
  alternatives_spanish:
  - la espada de él
  lexicon: HALOT
  rationale: La forma posesiva simple refleja que era la espada del filisteo, y en español «su espada» es la manera natural y fiel de expresarlo.
- source_word: וַיִּשְׁלְפָהּ מִתַּעְרָהּ
  english_pob_choice: drew it from its sheath
  chosen_spanish: la desenvainó de su vaina
  alternatives_spanish:
  - la sacó de su vaina
  - la arrancó de su vaina
  lexicon: HALOT
  rationale: שלף con un arma pide un verbo como «desenvainó», y תער se corresponde bien con «vaina». La traducción mantiene el movimiento del arma con precisión y naturalidad.
- source_word: וַיְמֹתְתֵהוּ
  english_pob_choice: killed him
  chosen_spanish: lo mató
  alternatives_spanish:
  - le dio muerte
  - lo puso a muerte
  lexicon: HALOT
  rationale: Aunque el contexto inmediato ya lo presentaba como herido de muerte, la forma verbal narra el acto final. «Lo mató» reproduce con sobriedad el cierre de la acción sin sobreexplicar.
- source_word: וַיִּכְרָת בָּהּ אֶת רֹאשׁוֹ
  english_pob_choice: he cut off his head with it
  chosen_spanish: le cortó la cabeza con ella
  alternatives_spanish:
  - le cercenó la cabeza con ella
  - le seccionó la cabeza con ella
  lexicon: HALOT
  rationale: כרת con ראשׁ exige un verbo de corte fuerte; «le cortó la cabeza» es claro y directo en español, y «con ella» mantiene la referencia a la espada.
- source_word: גִּבּוֹרָם
  english_pob_choice: their champion
  chosen_spanish: su campeón
  alternatives_spanish:
  - su guerrero
  - su hombre fuerte
  - su héroe
  lexicon: HALOT
  rationale: El inglés POB privilegia «champion» por el marco de combate representativo en el capítulo. En español, «campeón» transmite bien ese papel de representante en duelo, aunque conserva una resonancia algo moderna; por eso se señala la alternativa «guerrero».
- source_word: וַיָּנֻסוּ
  english_pob_choice: they fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - salieron huyendo
  - escaparon
  lexicon: HALOT
  rationale: El verbo militar de huida se expresa con el castellano común «huyeron», que es breve, idiomático y acorde con la escena.
translation_notes:
  revision_awareness: El borrador sigue la lectura verificada del texto hebreo y coincide con el audit trail inglés, sin cambios respecto del pase revisado más reciente; se preserva la equivalencia óptima en la escena narrativa y en el término representativo גִּבּוֹרָם.
  spanish_consistency_notes:
  - Se mantiene «filisteo» en minúscula para el singular y «filisteos» para el plural, como etiqueta étnica contextual.
  - Se usa «Yahvé» solo cuando el texto lo requiere; este versículo no contiene el nombre divino.
  - «Campeón» se conserva como término de combate representativo, en continuidad con la decisión inglesa auditada.
  - La secuencia verbal respeta el hebreo narrativo con acciones encadenadas y sin añadir explicaciones interpretativas.
