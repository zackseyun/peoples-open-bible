id: TIT.1.13
reference: Titus 1:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἡ μαρτυρία αὕτη ἐστὶν ἀληθής. δι’ ἣν αἰτίαν ἔλεγχε αὐτοὺς ἀποτόμως, ἵνα ὑγιαίνωσιν ἐν τῇ πίστει,
base_translation:
  language: en
  yaml_path: translation/nt/titus/001/013.yaml
  text: This testimony is true. For this reason[a], rebuke them sharply, so that they may be sound in the faith,
  footnotes:
  - marker: a
    text: Or "sound in faith." The Greek phrase can refer either to being healthy in their faith or to being sound in the Christian faith as a body of belief.
    reason: lexical_alternative
translation:
  language: ko
  text: 이 증언은 참됩니다. 그러므로 그들을 엄하게 책망하여, 그들이 그 믿음[a] 안에서 건전하게 되도록 하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「믿음 안에서」. 헬라어는 그들 개인의 믿음이 건강해지는 의미와, 기독교 신앙이라는 신조 전체 안에서 건전해지는 의미 모두로 읽힐 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡ μαρτυρία αὕτη ἐστὶν ἀληθής
  english_pob_choice: This testimony is true
  chosen_korean: 이 증언은 참됩니다
  alternatives_korean:
  - 이 증거는 참되다
  - 이 증언은 진실하다
  lexicon: BDAG
  rationale: μαρτυρία의 표준 한국어 등가어 「증언」. 합쇼체 종결로 「참됩니다」.
- source_word: δι’ ἣν αἰτίαν
  english_pob_choice: For this reason
  chosen_korean: 그러므로
  alternatives_korean:
  - 이러한 이유로
  - 이런 까닭에
  lexicon: BDAG
  rationale: 인과적 도입구. 「그러므로」가 자연스러운 합쇼체 연결.
- source_word: ἔλεγχε αὐτοὺς ἀποτόμως
  english_pob_choice: rebuke them sharply
  chosen_korean: 그들을 엄하게 책망하여
  alternatives_korean:
  - 그들을 준엄히 꾸짖어
  - 그들을 단호히 논박하여
  lexicon: BDAG
  rationale: ἀποτόμως는 「잘라내듯이 엄정하게」. 1:9의 ἐλέγχω가 「논박」으로 옮겨졌으나, 여기서는 디도가 직접 행해야 할 권면적 행위로서 「엄하게 책망하다」가 자연스럽다. 「엄하게」가 ἀποτόμως의 강도를 살린다.
- source_word: ὑγιαίνωσιν ἐν τῇ πίστει
  english_pob_choice: be sound in the faith
  chosen_korean: 그 믿음 안에서 건전하게 되도록
  alternatives_korean:
  - 믿음 안에서 건강하게 되도록
  - 신앙 안에서 건전해지도록
  lexicon: BDAG
  rationale: ὑγιαίνω(건강하다)는 목회서신의 핵심 은유. 「건전하다」가 거짓 가르침과 대비된 신앙적 건강의 의미를 잘 살린다. 「그 믿음」으로 정관사를 살려, 사도적으로 전수된 신앙을 가리키는 어감을 보존한다.
