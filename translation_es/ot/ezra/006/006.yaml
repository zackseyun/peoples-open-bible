base_translation:
  language: en
  yaml_path: translation/ot/ezra/006/006.yaml
  text: Now Tattenai[a], governor of Beyond the River, Shethar-bozenai, and your associates, the officials who are beyond the River[c][b], keep far away from there.
  footnotes:
  - marker: a
    text: Or, more literally, 'be far from there.'
    reason: lexical_alternative
  - marker: b
    text: '''Beyond the River'' is the Persian administrative name for the province west of the Euphrates.'
    reason: cultural_note
  - marker: c
    text: The term rendered 'officials of Persia' may also be transliterated as 'Apharsachites.'
    reason: alternative_reading
