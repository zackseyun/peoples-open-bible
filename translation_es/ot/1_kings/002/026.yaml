translation:
  language: es
  text: 'Y al sacerdote Abiatar el rey le dijo: «Ve a Anatot, a tu campo, porque eres un hombre digno de muerte[a]; pero hoy no te daré muerte, porque llevaste el arca de Yahvé, el Señor, delante de David, mi padre, y porque compartiste toda la aflicción con que mi padre fue afligido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo idiomático: literalmente, «un hombre de muerte», es decir, alguien que merece la muerte o está sujeto a ejecución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבְיָתָר / Abiathar
  english_pob_choice: Abiathar
  chosen_spanish: Abiatar
  alternatives_spanish:
  - Abiatar
  lexicon: nombre propio
  rationale: Nombre propio transliterado al español de forma estable y reconocible, sin intentar traducirlo.
- source_word: עֲנָתֹת
  english_pob_choice: Anathoth
  chosen_spanish: Anatot
  alternatives_spanish:
  - Anatot
  lexicon: nombre propio
  rationale: Topónimo transliterado al español. Se evita una adaptación al castellano histórico para mantener uniformidad con el nombre hebreo.
- source_word: עַל שָׂדֶיךָ
  english_pob_choice: to your field
  chosen_spanish: a tu campo
  alternatives_spanish:
  - a tu tierra
  - a tu heredad
  - sobre tu campo
  lexicon: HALOT
  rationale: La frase hebrea es literalmente sobre/para tu campo, pero en contexto comunica el lugar o propiedad a la que debe ir. ‘Campo’ mantiene el concreto del término sin ampliar indebidamente a ‘tierra’ o ‘heredad’.
- source_word: אִישׁ מָוֶת
  english_pob_choice: a man deserving death
  chosen_spanish: un hombre merecedor de muerte
  alternatives_spanish:
  - un hombre digno de muerte
  - un hombre que merece la muerte
  lexicon: HALOT
  rationale: Se conserva la fuerza idiomática judicial del hebreo sin volverlo demasiado idiomático en español. ‘Merecedor de muerte’ refleja la idea de alguien legalmente expuesto a ejecución.
- source_word: לֹא אֲמִיתֶךָ
  english_pob_choice: I will not put you to death
  chosen_spanish: no te daré muerte
  alternatives_spanish:
  - no te mataré
  - no te haré morir
  lexicon: HALOT
  rationale: El verbo causativo expresa causar la muerte; ‘dar muerte’ es una fórmula española digna y suficientemente literal, con matiz judicial más claro que ‘matar’.
- source_word: נָשָׂאתָ אֶת אֲרוֹן אֲדֹנָי יְהוִה
  english_pob_choice: you carried the ark of the Lord GOD
  chosen_spanish: llevaste el arca del Señor Yahvé
  alternatives_spanish:
  - llevaste el arca del Señor Dios
  - llevaste el arca de Yahvé, el Señor
  lexicon: HALOT
  rationale: Se conserva ‘llevaste’ para el acto físico de portar el arca. Se traduce יהוה como ‘Yahvé’ según el estándar del proyecto; aquí va unido a ‘Señor’ para reflejar el título compuesto אֲדֹנָי יְהוִה. El orden elegido evita una repetición extraña y mantiene la reverencia del título.
- source_word: לִפְנֵי דָוִד אָבִי
  english_pob_choice: before David my father
  chosen_spanish: delante de David, mi padre
  alternatives_spanish:
  - en presencia de David, mi padre
  - ante David, mi padre
  lexicon: HALOT
  rationale: ‘Delante de’ preserva la relación espacial/relacional de לִפְנֵי y suena natural en español. Se mantiene la aposición ‘mi padre’ como en el hebreo.
- source_word: הִתְעַנִּיתָ ... הִתְעַנָּה
  english_pob_choice: you shared in all the affliction with which my father was afflicted
  chosen_spanish: compartiste toda la aflicción con que mi padre fue afligido
  alternatives_spanish:
  - sufriste toda la aflicción con que mi padre sufrió
  - participaste en toda la aflicción con que mi padre fue afligido
  lexicon: HALOT
  rationale: Se mantiene el eco verbal del hebreo mediante ‘aflicción... fue afligido’. ‘Compartiste’ expresa solidaridad concreta con David, como la lectura inglesa, sin perder el paralelismo de los dos hitpael.
- source_word: כִּי ... וְכִי
  english_pob_choice: because ... and because
  chosen_spanish: porque ... y porque
  alternatives_spanish:
  - pues ... y porque
  - ya que ... y porque
  lexicon: HALOT
  rationale: Las dos cláusulas funcionan como razones para la clemencia de Salomón; ‘porque ... y porque’ reproduce con claridad la relación causal duplicada.
theological_decisions:
- issue: Representación del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: El hebreo contiene el título compuesto con el Nombre divino. Conforme al estándar del proyecto, YHWH se vierte ‘Yahvé’. Se mantiene además ‘Señor’ para reflejar אֲדֹנָי en la combinación titulada, evitando ocultar el nombre divino detrás de una sustitución genérica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Expresión idiomática hebrea אִישׁ מָוֶת
  english_pob_reading: a man deserving death
  chosen_spanish_reading: un hombre merecedor de muerte
  alternative_spanish_readings:
  - un hombre digno de muerte
  - un hombre condenado a muerte
  rationale: La frase hebrea no describe la identidad moral de la persona, sino su responsabilidad penal. ‘Merecedor de muerte’ conserva esa tensión judicial sin suavizarla a una mera valoración moral.
  doctrine_reference: Nota lexical de la frase idiomática; sin implicación doctrinal directa
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail en la expresión de אִישׁ מָוֶת, optando por una formulación española natural que conserva la fuerza jurídica de la expresión. También se preservó el doble motivo causal y el paralelismo de ‘aflicción/afligido’.
  spanish_consistency_notes:
  - Se usó ‘Abiatar’ y ‘Anatot’ como transliteraciones estables al español.
  - Se mantuvo ‘Yahvé’ para יהוה, incluso dentro del título compuesto con ‘Señor’, según el estándar del proyecto.
  - Se eligió un registro bíblico claro y moderno, evitando arcaísmos innecesarios como ‘he aquí’ o ‘matarte’ donde la cláusula judicial pedía ‘dar muerte’.
