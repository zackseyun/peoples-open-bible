translation:
  language: es
  text: Los hombres de Joab, los keretitas[a], los peletitas y todos los valientes salieron tras él. Salieron de Jerusalén para perseguir a Sheba hijo de Bicrí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma tradicional en español suele decir “quereteos” o “cereteos”; aquí se conserva una transliteración más directa del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי יוֹאָב
  english_pob_choice: Joab’s men
  chosen_spanish: sus hombres
  alternatives_spanish:
  - los hombres de Joab
  - la gente de Joab
  lexicon: HALOT
  rationale: La construcción hebrea expresa pertenencia o adscripción a Joab. En español, dentro de la frase coordinada, “sus hombres” evita una repetición torpe y mantiene la referencia relacional ya establecida por el nombre propio de Joab al inicio de la lista.
- source_word: וְהַכְּרֵתִי
  english_pob_choice: the Kerethites
  chosen_spanish: los keretitas
  alternatives_spanish:
  - los cereteos
  - los quereteos
  lexicon: HALOT
  rationale: Se conserva el nombre de grupo con transliteración directa más cercana al hebreo. El inglés POB opta por Kerethites y anota la forma tradicional “Cherethites”; en español, “keretitas” mantiene esa decisión transliterada sin imponer la forma tradicional castellana.
- source_word: וְהַפְּלֵתִי
  english_pob_choice: the Pelethites
  chosen_spanish: los peletitas
  alternatives_spanish:
  - los peleteos
  lexicon: HALOT
  rationale: Es un nombre grupal paralelo a los keretitas, por lo que conviene conservarlo como transliteración. “Peletitas” sigue de cerca la forma hebrea y conserva la simetría del listado militar.
- source_word: וְכָל הַגִּבֹּרִים
  english_pob_choice: all the mighty men
  chosen_spanish: todos los valientes
  alternatives_spanish:
  - todos los guerreros
  - todos los hombres valientes
  lexicon: HALOT
  rationale: גִּבּוֹרִים puede referirse a guerreros/valientes. En español, “valientes” transmite el valor marcial sin forzar una fórmula demasiado técnica; se evita “mighty men” calcado y también “guerreros” porque el foco del término es la calidad de valor, no solo la función bélica.
- source_word: וַיֵּצְאוּ ... לִרְדֹּף אַחֲרֵי
  english_pob_choice: went out ... to pursue
  chosen_spanish: salieron ... para perseguir
  alternatives_spanish:
  - salieron ... a perseguir
  - salieron ... en persecución de
  lexicon: HALOT
  rationale: El hebreo usa el verbo de salida seguido del infinitivo de persecución. “Para perseguir” preserva la relación final sin repetir innecesariamente “tras/de” en una fórmula menos natural en español.
- source_word: מִירוּשָׁלִַם
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  lexicon: HALOT
  rationale: Ambas opciones son posibles; “de Jerusalén” sigue con naturalidad el verbo de movimiento en español y mantiene la simplicidad del hebreo.
- source_word: שֶׁבַע בֶּן בִּכְרִי
  english_pob_choice: Sheba son of Bichri
  chosen_spanish: Sheba hijo de Biqurí
  alternatives_spanish:
  - Seba hijo de Biqurí
  - Sheba, hijo de Biqurí
  lexicon: HALOT
  rationale: Se conserva el nombre propio como “Sheba”, de acuerdo con la práctica de la POB inglesa, y se vierte el patronímico con “hijo de”. “Biqurí” adapta la transliteración al español y evita la forma inglesa final en -ri sin fundamento en el patrón español.
theological_decisions:
- issue: Designación del grupo militar del rey David
  english_pob_reading: the Kerethites / the Pelethites as named royal troops
  chosen_spanish_reading: los keretitas / los peletitas como tropas nombradas del séquito real
  alternative_spanish_readings:
  - los cereteos / los peleteos
  - la guardia real
  rationale: El texto presenta nombres de grupo específicos; no conviene convertirlos en una designación genérica como “guardia real” porque eso borra la forma lexical del hebreo. La transliteración conserva la identidad del contingente y su carácter técnico/histórico.
  doctrine_reference: 2 Samuel 8:18; 15:18; 20:7
translation_notes:
  revision_awareness: 'El inglés auditado fue revisado para quitar una expansión innecesaria (“along with”) y dejar una enumeración más directa. La versión española sigue esa forma compacta: una sola lista coordinada, seguida por la segunda oración con el movimiento desde Jerusalén para perseguir a Sheba hijo de Biqurí.'
  spanish_consistency_notes:
  - Se mantuvo la transliteración de nombres de grupo (keretitas, peletitas) en lugar de sustituirlos por equivalentes tradicionales, por coherencia con la decisión inglesa de transliterar.
  - Se prefirió “hijo de” para el patronímico, siguiendo el valor relacional del hebreo y la práctica estable del proyecto.
  - “Salieron” se repite en la segunda oración porque el hebreo repite el verbo; se conserva esa duplicación para respetar el ritmo y la secuencia de acciones.
