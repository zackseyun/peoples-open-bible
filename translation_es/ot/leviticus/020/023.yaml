translation:
  language: es
  text: Y no andarán en los estatutos de la nación[a] que yo expulso de delante de ustedes[b], porque hicieron todas estas cosas, y los aborrecí[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘costumbres’ para ‘estatutos’; el término hebreo puede denotar prácticas prescritas o normas fijas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘enviando lejos de delante de ustedes’; aquí el sentido es expulsar o echar fuera.
    reason: lexical_alternative
  - marker: c
    text: O ‘los abominé’.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵלְכוּ
  english_pob_choice: shall not walk
  chosen_spanish: no caminarán
  alternatives_spanish:
  - no andarán
  - no vivirán
  lexicon: HALOT
  rationale: הלך conserva la imagen de conducta o forma de vida. En español, ‘caminar’ mantiene esa imagen de manera natural y comprensible, sin convertirla en una paráfrasis abstracta.
- source_word: בְּחֻקֹּת
  english_pob_choice: in the statutes
  chosen_spanish: en los estatutos
  alternatives_spanish:
  - según los estatutos
  - en las costumbres
  - en las ordenanzas
  lexicon: HALOT
  rationale: חֻקּוֹת puede referirse a normas establecidas o prácticas fijadas. ‘Estatutos’ preserva mejor el peso legal-ético que ‘costumbres’, y encaja bien con la imagen de ‘caminar en’.
- source_word: הַגּוֹי
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la nación gentílica
  lexicon: HALOT
  rationale: El singular hebreo apunta a la población cananea como colectivo. ‘Nación’ es natural en español y evita cargar el término con sentidos posteriores ajenos al contexto.
- source_word: מְשַׁלֵּחַ
  english_pob_choice: am driving out
  chosen_spanish: expulso
  alternatives_spanish:
  - voy expulsando
  - echo fuera
  - desalojo
  lexicon: HALOT
  rationale: Con מִפְּנֵיכֶם, el verbo comunica expulsión desde la presencia de Israel. ‘Expulso’ transmite el acto de remoción con fuerza y concisión en español.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: de delante de ustedes
  alternatives_spanish:
  - de su presencia
  - ante ustedes
  lexicon: HALOT
  rationale: 'La expresión hebrea es literalmente espacial: ‘de delante de su rostro/presencia’. ‘De delante de ustedes’ conserva el idioma semítico y hace explícita la direccionalidad.'
- source_word: כִּי אֶת כָּל אֵלֶּה עָשׂוּ
  english_pob_choice: because they did all these things
  chosen_spanish: porque hicieron todas estas cosas
  alternatives_spanish:
  - pues hicieron todas estas cosas
  - porque practicaron todas estas cosas
  lexicon: HALOT
  rationale: La causalidad de כִּי es directa. ‘Hicieron todas estas cosas’ es fiel y suficientemente amplio para abarcar las prácticas prohibidas ya enumeradas.
- source_word: וָאָקֻץ
  english_pob_choice: I loathed
  chosen_spanish: los aborrecí
  alternatives_spanish:
  - los abominé
  - los detesté
  - me repelieron
  lexicon: HALOT
  rationale: קוץ expresa repulsión/aborrecimiento intenso. ‘Aborrecer’ mantiene la fuerza afectiva sin suavizarla, y en español bíblico resulta claro y digno.
- source_word: בָּם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - por ellos
  lexicon: HALOT
  rationale: Con el verbo de repulsión, el objeto se expresa naturalmente en español con complemento directo. ‘Los’ mantiene la relación verbal y evita una construcción más pesada.
theological_decisions:
- issue: Mantener la fuerza moral de la repulsión divina sin diluirla en mera desaprobación
  english_pob_reading: and I loathed them
  chosen_spanish_reading: y los aborrecí
  alternative_spanish_readings:
  - y los abominé
  - y los detesté
  rationale: El hebreo usa lenguaje afectivo fuerte para la reacción divina ante las prácticas de la nación. ‘Aborrecí’ preserva esa intensidad sin añadir explicaciones doctrinales ajenas al verso.
  doctrine_reference: Sant 1:13; Sal 5:5
- issue: Conservar la imagen covenantal de ‘caminar’ como conducta
  english_pob_reading: shall not walk in the statutes
  chosen_spanish_reading: no caminarán en los estatutos
  alternative_spanish_readings:
  - no seguirán los estatutos
  - no vivirán según los estatutos
  rationale: La metáfora de andar/caminar en conducta moral es bíblica y debe mantenerse para reflejar el hebreo. En español, ‘caminar en’ suena idiomático y conserva el marco ético.
  doctrine_reference: Deut 5:33; Sal 1:1
- issue: No suavizar el acto de juicio histórico sobre la nación expulsada
  english_pob_reading: the nation that I am driving out before you
  chosen_spanish_reading: la nación que yo expulso de delante de ustedes
  alternative_spanish_readings:
  - la nación que yo saco de delante de ustedes
  - la nación que estoy echando fuera de su presencia
  rationale: El texto presenta una acción judicial concreta de remoción. ‘Expulso’ conserva ese sentido más claramente que un verbo meramente neutral como ‘sacar’.
  doctrine_reference: Lev 18:24-28
translation_notes:
  revision_awareness: Se siguió de cerca el sentido del texto hebreo y el recorrido auditado del POB en inglés. No hubo revisiones aplicadas en el paquete de auditoría; por eso se mantuvo la estructura causal y el contraste entre la prohibición de conducta, la expulsión de la nación y la reacción divina de aborrecimiento.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera explícitamente; en este verso no aparece el Tetragrámaton.
  - ‘Caminar’ se conserva como metáfora conductual, en línea con el uso bíblico del hebreo.
  - ‘Estatutos’ se mantiene como término jurídico-ético, no se reduce a ‘costumbres’ en el texto principal.
  - ‘Aborrecí’ se escogió para reflejar la fuerza del hebreo קוץ sin introducir un tono más técnico o más débil.
