id: 2PE.3.2
reference: 2 Peter 3:2
source:
  edition: SBLGNT
  text: μνησθῆναι τῶν προειρημένων ῥημάτων ὑπὸ τῶν ἁγίων προφητῶν καὶ τῆς τῶν ἀποστόλων ὑμῶν ἐντολῆς τοῦ κυρίου καὶ σωτῆρος,
translation:
  text: to remember the words spoken beforehand by the holy prophets and the commandment of your apostles from the Lord and Savior[b][a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the command of the Lord and Savior through your apostles.' The Greek genitives can be represented in more than one natural English way.
    reason: alternative_reading
  - marker: b
    text: Or 'the previously spoken words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μνησθῆναι
  chosen: to remember
  alternatives:
  - to recall
  - to be mindful of
  lexicon: BDAG
  rationale: Aorist passive infinitive of μιμνῄσκομαι functions here as the content of the author's purpose in v.1; idiomatic English uses the active infinitive 'to remember.' 'Recall' is possible, but 'remember' is more natural and broad.
- source_word: προειρημένων ῥημάτων
  chosen: the words spoken beforehand
  alternatives:
  - the previously spoken words
  - the words foretold
  lexicon: BDAG
  rationale: προλέγω here means 'say beforehand' rather than specifically predictive 'foretell' in a narrow prophetic sense. 'Words spoken beforehand' preserves both temporal priority and the verbal nature of ῥήματα.
- source_word: ῥημάτων
  chosen: words
  alternatives:
  - sayings
  - utterances
  lexicon: BDAG
  rationale: ῥῆμα commonly denotes spoken words or sayings. 'Words' is the clearest modern English rendering and fits the parallel with apostolic commandment.
- source_word: ὑπὸ τῶν ἁγίων προφητῶν
  chosen: by the holy prophets
  alternatives:
  - by the prophets who are holy
  lexicon: BDAG
  rationale: Standard attributive construction. 'Holy prophets' is the natural English order and preserves the consecrated status of the prophetic witnesses.
- source_word: ἐντολῆς
  chosen: the commandment
  alternatives:
  - the command
  - the instruction
  lexicon: BDAG
  rationale: ἐντολή often denotes an authoritative command. Singular is retained because the Greek is singular. 'Commandment' preserves the formal authority and possible echo of divine command language better than the flatter 'instruction.'
- source_word: τῶν ἀποστόλων ὑμῶν
  chosen: of your apostles
  alternatives:
  - of the apostles to you
  - given by your apostles
  lexicon: BDAG
  rationale: The genitive ὑμῶν most naturally modifies ἀποστόλων, yielding 'your apostles'—the apostles associated with or sent to the readers. This is more straightforward than attaching ὑμῶν elsewhere.
- source_word: τοῦ κυρίου καὶ σωτῆρος
  chosen: from the Lord and Savior
  alternatives:
  - of the Lord and Savior
  - of our Lord and Savior
  lexicon: BDAG
  rationale: 'This genitive most naturally depends on ἐντολῆς: the apostolic commandment is derived from or belongs to ''the Lord and Savior.'' ''From'' makes the source relationship clear in English. ''Our'' is not in the Greek and should not be supplied.'
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' This preserves both authority and established NT title usage.
- source_word: σωτῆρος
  chosen: Savior
  alternatives:
  - deliverer
  lexicon: BDAG
  rationale: σωτήρ in this christological context is best rendered 'Savior,' the standard and theologically weighty English equivalent.
