translation:
  text: Copies were made for them from the twenty-fifth of Pachon until the fourth of Epiphi[a], over forty days; and they appointed their destruction from the fifth of Epiphi until the seventh[b], in three days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pachon and Epiphi are Egyptian month names used in the administrative dating of the narrative.
    reason: cultural_note
  - marker: b
    text: The Greek verb behind 'Copies were made out' can suggest written copies or official documents being prepared; the object is not stated explicitly in the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀντιγράφονται
  chosen: Copies were made out
  alternatives:
  - They were registered
  - They were copied out
  - They were transcribed
  lexicon: LSJ
  rationale: The passive of ἀντιγράφω most naturally refers to making written copies/documents. In context of royal administrative action, this likely means written orders or lists were prepared. 'Copies were made out' preserves the documentary sense without over-specifying the object.
- source_word: αὐτοῖς
  chosen: for them
  alternatives:
  - for these people
  - for them concerning these matters
  lexicon: BDAG
  rationale: The dative pronoun is retained simply as 'for them,' referring to the Jews under discussion. The Greek does not explicitly restate the noun.
- source_word: ἀπὸ πέμπτης τοῦ Παχὼν καὶ εἰκάδος
  chosen: from the twenty-fifth of Pachon
  alternatives:
  - from Pachon twenty-five
  - from the fifth and twentieth of Pachon
  lexicon: LSJ
  rationale: πέμπτης ... καὶ εἰκάδος is the standard way to express the twenty-fifth day. A natural English date rendering is preferable.
- source_word: ἕως τῆς τετάρτης τοῦ Ἐπιφὶ
  chosen: until the fourth of Epiphi
  alternatives:
  - up to the fourth day of Epiphi
  lexicon: LSJ
  rationale: A straightforward calendrical rendering. The Egyptian month name is transliterated rather than translated.
- source_word: ἐπʼ ἡμέρας τεσσαράκοντα
  chosen: over forty days
  alternatives:
  - for forty days
  - during forty days
  lexicon: BDAG
  rationale: The phrase marks duration spanning the period. 'Over forty days' reads naturally in English while preserving the temporal sense.
- source_word: συνίστανται
  chosen: they scheduled
  alternatives:
  - they arranged
  - they appointed
  - they set in place
  lexicon: BDAG
  rationale: In this administrative context, the verb conveys arranging or fixing a plan. 'Scheduled' captures the official, time-setting force in idiomatic modern English.
- source_word: τὴν ἀπώλειαν
  chosen: their destruction
  alternatives:
  - their ruin
  - their annihilation
  - their loss
  lexicon: BDAG
  rationale: ἀπώλεια here refers to intended extermination, not mere loss. 'Destruction' is strong and clear without adding interpretive flourish.
- source_word: ἀπὸ πέμπτης τοῦ Ἐπιφὶ ἕως ἑβδόμης
  chosen: from the fifth of Epiphi until the seventh
  alternatives:
  - from Epiphi five to seven
  - from the fifth day of Epiphi to the seventh
  lexicon: LSJ
  rationale: This is another date range; the concise English form preserves the sequence clearly.
- source_word: ἡμέραις τρισίν
  chosen: in three days
  alternatives:
  - for three days
  - within three days
  lexicon: BDAG
  rationale: The dative expresses the time span involved. 'In three days' is idiomatic and fits the scheduling sense of the clause.
