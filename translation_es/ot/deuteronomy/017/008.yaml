translation:
  language: es
  text: Si un caso para juicio te resulta demasiado difícil —entre un derramamiento de sangre y otro[a], entre una causa legal y otra, y entre una lesión y otra[b], asuntos de controversia dentro de tus puertas[c]—, entonces te levantarás y subirás al lugar que Yahvé tu Dios escogerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''entre sangre y sangre''. La expresión se refiere a distinguir un caso de derramamiento de sangre de otro, probablemente incluso casos de homicidio o de culpa de sangre.'
    reason: lexical_alternative
  - marker: b
    text: O 'entre una aflicción y otra' o 'entre una plaga y otra'.
    reason: lexical_alternative
  - marker: c
    text: '''Dentro de tus puertas'' alude a los tribunales locales de la ciudad, ya que las puertas eran lugares habituales de juicio.'
    reason: cultural_note
lexical_decisions:
- source_word: יִפָּלֵא
  english_pob_choice: is too difficult
  chosen_spanish: te resulta demasiado difícil
  alternatives_spanish:
  - es demasiado difícil para ti
  - te sobrepasa
  - te es imposible resolver
  lexicon: HALOT
  rationale: En contexto judicial, el niphal de פלא expresa que el caso excede la capacidad de decisión local. En español, 'te resulta demasiado difícil' conserva la idea práctica de dificultad sin perder la relación directa con el sujeto implícito 'para ti'.
- source_word: דָבָר לַמִּשְׁפָּט
  english_pob_choice: a matter for judgment
  chosen_spanish: un asunto para juicio
  alternatives_spanish:
  - un caso para juicio
  - un asunto de juicio
  - una causa para decisión
  lexicon: HALOT
  rationale: דָבָר es amplio ('asunto, caso, cosa') y con לַמִּשְׁפָּט apunta a una controversia judicial. 'Asunto para juicio' mantiene la amplitud del hebreo y la función forense sin hacer el texto excesivamente técnico.
- source_word: בֵּין דָּם לְדָם
  english_pob_choice: between bloodshed and bloodshed
  chosen_spanish: entre sangre y sangre
  alternatives_spanish:
  - entre derramamiento de sangre y derramamiento de sangre
  - entre un caso de sangre y otro
  - entre homicidio y homicidio
  lexicon: HALOT
  rationale: Sigo de cerca la imagen hebrea literal porque el POB inglés también la conservó con 'bloodshed and bloodshed'. En español, 'sangre y sangre' mantiene el eco idiomático y la carga legal de casos de sangre o sangre derramada.
- source_word: בֵּין דִּין לְדִין
  english_pob_choice: between one legal claim and another
  chosen_spanish: entre una causa y otra
  alternatives_spanish:
  - entre un reclamo legal y otro
  - entre una pretensión legal y otra
  - entre un caso y otro
  lexicon: HALOT
  rationale: דִּין puede referirse a pleito, causa o reclamo jurídico. 'Causa' funciona naturalmente en español jurídico-bíblico y preserva la idea de controversia o litigio entre partes.
- source_word: וּבֵין נֶגַע לָנֶגַע
  english_pob_choice: between one injury and another
  chosen_spanish: entre una lesión y otra
  alternatives_spanish:
  - entre una aflicción y otra
  - entre un golpe y otro
  - entre una plaga y otra
  lexicon: HALOT
  rationale: נֶגַע puede abarcar lesión, golpe, aflicción o plaga. Dado el marco de disputas judiciales locales, 'lesión' comunica bien el posible caso de daño corporal sin imponer de antemano una lectura ritual o médica.
- source_word: דִּבְרֵי רִיבֹת
  english_pob_choice: matters of dispute
  chosen_spanish: asuntos de controversia
  alternatives_spanish:
  - asuntos de disputa
  - casos de contienda
  - materias litigiosas
  lexicon: HALOT
  rationale: La construcción intensifica la naturaleza conflictiva de los casos. 'Asuntos de controversia' suena natural en español y conserva el peso polémico/legal del sintagma hebreo.
- source_word: בִּשְׁעָרֶיךָ
  english_pob_choice: within your gates
  chosen_spanish: dentro de tus puertas
  alternatives_spanish:
  - en tus puertas
  - dentro de tus ciudades
  - en tus poblados
  lexicon: HALOT
  rationale: '''Puertas'' refleja literalmente el hebreo y, como en el texto inglés, mantiene la alusión al lugar de juicio local. ''Dentro de tus puertas'' es entendible en español bíblico moderno y conserva el valor cultural del idioma original.'
- source_word: וְקַמְתָּ וְעָלִיתָ
  english_pob_choice: you shall arise and go up
  chosen_spanish: te levantarás y subirás
  alternatives_spanish:
  - te pondrás de pie y subirás
  - te levantarás y ascenderás
  - te alzarás y subirás
  lexicon: HALOT
  rationale: La secuencia verbal marca acción deliberada hacia el santuario central. 'Te levantarás y subirás' reproduce la cadencia del hebreo y la lógica de movimiento ascendente.
- source_word: הַמָּקוֹם אֲשֶׁר יִבְחַר
  english_pob_choice: the place that ... will choose
  chosen_spanish: el lugar que ... escogerá
  alternatives_spanish:
  - el lugar que ... elegirá
  - el lugar que ... habrá escogido
  - el sitio que ... escogerá
  lexicon: HALOT
  rationale: '''Lugar'' y ''escogerá'' mantienen la formulación futura del texto y la referencia al sitio central designado por Dios. ''Escogerá'' es claro y fiel al verbo de elección.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' conforme al estándar del proyecto en español. Conserva el nombre divino propio en vez de sustituirlo por un título.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa el nombre de pacto de Dios, no un título genérico. En español se adopta 'Yahvé' para preservar la distinción del nombre revelado y seguir la terminología doctrinal del proyecto; se evita 'SEÑOR' porque enmascara el tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de 'בֵּין דָּם לְדָם'
  english_pob_reading: between bloodshed and bloodshed
  chosen_spanish_reading: entre sangre y sangre
  alternative_spanish_readings:
  - entre derramamiento de sangre y derramamiento de sangre
  - entre homicidio y homicidio
  - entre un caso de sangre y otro
  rationale: 'Se conserva la tensión lexicológica del hebreo: el texto habla literalmente de ''sangre'', aunque el sentido probable sea jurídico (casos de sangre, homicidio o sangre derramada). La traducción española no borra esa concreción ni la reduce demasiado pronto a una abstracción.'
  doctrine_reference: HALOT; audit trail lexical note on idiom
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés y no introduce revisiones no atestiguadas. Se conserva la lista judicial del hebreo, el movimiento ascendente al lugar elegido por Dios y el nombre divino como Yahvé, con equivalencia óptima para un español bíblico moderno y claro.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''Puertas'' se conserva por la imagen cultural de las cortes locales; no se reduce a ''ciudades''.'
  - '''Entre sangre y sangre'' preserva la concreción hebrea; la nota aclara el posible valor idiomático.'
  - '''Asunto para juicio'' y ''asuntos de controversia'' mantienen el registro legal sin tecnicismos innecesarios.'
