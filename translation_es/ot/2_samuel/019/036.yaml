  yaml_path: translation/ot/2_samuel/019/036.yaml
  text: I am eighty years old today[a]. Can I still distinguish between good and evil? Can your servant taste what I eat and what I drink? Can I still hear the voice of male singers and female singers? Why then should your servant still be a burden to my lord the king?
  footnotes:
