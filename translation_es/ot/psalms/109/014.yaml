translation:
  language: es
  text: Sea recordada la culpa de sus padres[a][b] ante Yahvé, y no sea borrado el pecado de su madre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la iniquidad de sus padres’. El hebreo עָוֹן puede significar iniquidad, culpa o la responsabilidad que resulta del pecado.
    reason: lexical_alternative
  - marker: b
    text: O ‘sus antepasados’ o ‘sus antecesores’; el hebreo dice literalmente ‘sus padres’.
    reason: lexical_alternative
  - marker: c
    text: O ‘y que el pecado de su madre no sea borrado’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִזָּכֵר
  english_pob_choice: be remembered
  chosen_spanish: Se recuerde
  alternatives_spanish:
  - sea recordado
  - venga a la memoria
  lexicon: HALOT
  rationale: El nifal en este contexto expresa un deseo o ruego imprecatorio; en español, el subjuntivo pasivo refleja bien esa fuerza jussiva sin perder el matiz de memoria/registro.
- source_word: עֲוֺן
  english_pob_choice: guilt
  chosen_spanish: la culpa
  alternatives_spanish:
  - la iniquidad
  - la culpa por su pecado
  lexicon: HALOT
  rationale: '''Culpa'' comunica la carga moral o responsabilidad derivada del pecado, preservando la amplitud semántica de עָוֹן sin usar un término arcaico.'
- source_word: אֲבֹתָיו
  english_pob_choice: his fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - sus progenitores
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus padres'; en español 'padres' suena natural y conserva la referencia a los varones antepasados, mientras que 'antepasados' amplía más de lo necesario.
- source_word: אֶל יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - delante de Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: La preposición hebrea aquí sugiere comparecencia o referencia a Dios en su presencia; 'ante Yahvé' conserva la imagen judicial y mantiene el nombre divino según la directriz del proyecto.
- source_word: וְחַטַּאת
  english_pob_choice: and ... the sin
  chosen_spanish: y ... el pecado
  alternatives_spanish:
  - y ... la falta
  - y ... la culpa
  lexicon: HALOT
  rationale: חַטָּאת aquí es 'pecado', en paralelo con עָוֹן; en español el masculino 'pecado' es la forma más transparente y estable para este uso.
- source_word: אִמּוֹ
  english_pob_choice: his mother
  chosen_spanish: de su madre
  alternatives_spanish:
  - de la madre de él
  lexicon: HALOT
  rationale: Se conserva el posesivo de forma natural en español mediante 'de su madre', que transmite claramente la relación de pertenencia sin forzar la sintaxis.
- source_word: אַ ל תִּמָּח
  english_pob_choice: may ... not be blotted out
  chosen_spanish: no sea borrado
  alternatives_spanish:
  - no sea borrado de la memoria
  - no sea borrado del registro
  lexicon: HALOT
  rationale: '''Borrado'' conserva la imagen bíblica de borrar/erradicar de un registro o memoria; en español suena más natural que ''borrado de la memoria'' y deja intacta la metáfora.'
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto fuente contiene el Tetragrámaton directamente; según la política del proyecto, se translitera como 'Yahvé' en el texto principal, evitando el reemplazo por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota al texto español mediante [a], [b] y [c], y se mantuvo la lectura fuente sin añadir glosa innecesaria.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme al estándar del proyecto.
  - Se conserva el paralelismo poético con 'culpa' / 'pecado' y el pasivo jussivo en ambos miembros.
  - '''Padres'' se usa en sentido genealógico masculino, alineado con el hebreo literal.'
  - No se introdujeron términos eclesiásticos tradicionales que oscurezcan el valor léxico del hebreo.
