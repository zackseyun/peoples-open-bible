translation:
  language: es
  text: Así que David se levantó muy de mañana, dejó las ovejas con un cuidador, tomó los víveres y se fue, tal como Isaí le había mandado. Llegó al campamento[a] mientras el ejército salía a la línea de batalla y lanzando el grito de guerra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la disposición circular del campamento’ o ‘el perímetro defensivo del campamento’; el término hebreo puede referirse más específicamente a la forma del campamento o a su cerco.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: ‘y gritaban en/para la batalla’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  english_pob_choice: rose early
  chosen_spanish: se levantó muy de mañana
  alternatives_spanish:
  - se levantó temprano
  - se levantó al amanecer
  lexicon: HALOT
  rationale: El verbo expresa levantarse temprano; ‘muy de mañana’ conserva el énfasis narrativo sin sonar rígido en español.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: de mañana
  alternatives_spanish:
  - por la mañana
  - en la mañana
  lexicon: HALOT
  rationale: La expresión temporal acompaña naturalmente a ‘se levantó’; ‘de mañana’ mantiene la concisión del hebreo.
- source_word: וַיִּטֹּשׁ אֶת־הַצֹּאן עַל שֹׁמֵר
  english_pob_choice: left the sheep with a keeper
  chosen_spanish: dejó las ovejas con un cuidador
  alternatives_spanish:
  - dejó el rebaño con un guarda
  - encomendó las ovejas a un cuidador
  lexicon: HALOT
  rationale: El sentido es dejar el rebaño al cuidado de otra persona. ‘Cuidador’ comunica la función con naturalidad; ‘guarda’ o ‘encomendó’ son posibles pero menos naturales aquí.
- source_word: וַיִּשָּׂא
  english_pob_choice: took the supplies
  chosen_spanish: tomó los víveres
  alternatives_spanish:
  - llevó los víveres
  - cargó con los víveres
  lexicon: HALOT
  rationale: El objeto está implícito por el contexto inmediato; ‘víveres’ hace explícito el referente de manera sobria y fiel al flujo narrativo.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: se fue
  alternatives_spanish:
  - fue
  - partió
  lexicon: HALOT
  rationale: Verbo narrativo simple de movimiento; ‘se fue’ es natural en español y conserva el avance de la acción.
- source_word: כַּאֲשֶׁר צִוָּהוּ יִשָׁי
  english_pob_choice: just as Jesse had commanded him
  chosen_spanish: tal como Isaí le había mandado
  alternatives_spanish:
  - como Isaí le había ordenado
  - según Isaí le había mandado
  lexicon: HALOT
  rationale: צוה implica mandar/ordenar. ‘Mandado’ reproduce bien la relación de obediencia y evita una paráfrasis excesiva.
- source_word: הַמַּעְגָּלָה
  english_pob_choice: the encampment
  chosen_spanish: el campamento
  alternatives_spanish:
  - la formación circular del campamento
  - el círculo del campamento
  lexicon: HALOT
  rationale: El término puede aludir a la disposición del campamento o a su perímetro defensivo; ‘campamento’ es la opción más clara para el texto principal en español.
- source_word: הַחַיִל
  english_pob_choice: the army
  chosen_spanish: el ejército
  alternatives_spanish:
  - la tropa
  - la fuerza armada
  lexicon: HALOT
  rationale: En este contexto militar, el sustantivo denota la fuerza combatiente; ‘ejército’ es la traducción más natural y precisa.
- source_word: הַיֹּצֵא אֶל־הַמַּעֲרָכָה
  english_pob_choice: was going out to the battle line
  chosen_spanish: salía a la línea de batalla
  alternatives_spanish:
  - marchaba hacia la línea de batalla
  - salía al orden de batalla
  lexicon: HALOT
  rationale: El participio describe acción simultánea de fondo; ‘línea de batalla’ comunica bien מַעֲרָכָה en español sin tecnicismos innecesarios.
- source_word: וְהֵרֵעוּ
  english_pob_choice: shouting the war cry
  chosen_spanish: lanzaba el grito de guerra
  alternatives_spanish:
  - daba el grito de guerra
  - clamaba para la batalla
  lexicon: HALOT
  rationale: La forma verbal expresa un clamor militar; ‘lanzaba el grito de guerra’ conserva el sentido bélico y la intensidad del acto.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: the war cry
  chosen_spanish: el grito de guerra
  alternatives_spanish:
  - para la guerra
  - en la guerra
  lexicon: HALOT
  rationale: La frase funciona adverbialmente con el verbo anterior; en español, ‘grito de guerra’ une ambos elementos con claridad y sin pérdida del matiz militar.
translation_notes:
  revision_awareness: Se siguió de cerca el auditor inglés de la POB, preservando la secuencia narrativa y los términos militares. Se adoptó una solución más natural en español para וַיִּשָּׂא con un objeto implícito (‘los víveres’), siguiendo la misma decisión contextual del inglés. También se mantuvo la ambigüedad de הַמַּעְגָּלָה en nota, como en el trail inglés, pero con una formulación española más idiomática.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ no porque aparezca explícitamente aquí, sino como norma general del proyecto; este versículo no lo contiene.
  - ‘Campamento’ se eligió como forma principal para הַמַּעְגָּלָה, dejando en nota las alternativas más concretas.
  - ‘Grito de guerra’ preserva la fuerza militar de הֵרֵעוּ + בַּמִּלְחָמָה sin sobretraducirlo a una expresión litúrgica o tradicional.
