translation:
  language: es
  text: Y Nabucodonosor, rey de Babilonia, vino contra la ciudad, mientras sus siervos la sitiaban[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras sus siervos la estaban sitiando».'
    reason: alternative_reading
  - marker: b
    text: «Sus siervos» puede referirse a los oficiales, agentes o fuerzas al servicio del rey de Babilonia.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se presentó
  lexicon: HALOT
  rationale: El wayyiqtol de בוא funciona aquí como verbo narrativo simple. En español, «vino contra» reproduce de forma natural el movimiento hostil que en inglés se expresa con «came against».
- source_word: נְבוּכַדְנֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor/Nabucodrezar
  lexicon: Convención española tradicional del nombre propio
  rationale: El nombre del rey babilónico se vierte con la forma castellana asentada y reconocible para lectores hispanos, manteniendo identificación clara del personaje.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - rey de Babel
  lexicon: HALOT
  rationale: La cadena constructa expresa cargo y dominio. «Rey de Babilonia» conserva la relación de pertenencia/autoridad sin añadir matices ajenos al hebreo.
- source_word: עַל הָעִיר
  english_pob_choice: against the city
  chosen_spanish: contra la ciudad
  alternatives_spanish:
  - hacia la ciudad
  - sobre la ciudad
  lexicon: HALOT
  rationale: En contexto de asedio, עַל tiene sentido hostil. «Contra» es el equivalente español más natural y fiel, evitando un calco como «sobre».
- source_word: וַעֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus oficiales
  - sus tropas
  lexicon: HALOT
  rationale: Aunque el inglés POB retiene «servants» por la forma léxica, en español «siervos» conserva mejor el valor de dependencia al rey y suena más digno en registro bíblico. No se especifica más de lo que el hebreo dice.
- source_word: צָרִים
  english_pob_choice: were besieging
  chosen_spanish: sitiaban
  alternatives_spanish:
  - estaban sitiando
  - asediaban
  lexicon: HALOT
  rationale: El participio de צור en este contexto describe actividad de asedio continua. «Sitiaban» comunica el proceso militar de forma clara y natural en español.
- source_word: עָלֶיהָ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - contra ella
  lexicon: HALOT
  rationale: El pronombre retoma «la ciudad» en femenino. En español, el objeto directo anafórico se expresa naturalmente con «la», sin perder la referencia al femenino hebreo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y concuerda con el control de calidad del inglés POB: verbo narrativo de llegada en contexto hostil, preposición de ataque con «contra», y participio durativo para la acción de asedio. Se mantiene la referencia al rey y a su comitiva sin expandir indebidamente el rol de «siervos».'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada cuando corresponda, aunque este versículo no la contiene.
  - Se mantiene un registro bíblico moderno y claro, evitando un calco rígido de la sintaxis inglesa.
  - No se añade puntuación interpretativa más allá de la necesaria para fluidez en español.
