review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: uno de los guardias crueles golpea repetidamente a la víctima en los costados para obligarla a volver a ponerse en pie. También preserva correctamente la nota de que «levantarse de nuevo» no se refiere a resurrección. Sin embargo, dos elecciones debilitan la precisión: «saltando hacia sus costados» suena como movimiento dirigido hacia ellos, no como acometida/asalto contra ellos; y «cuando cayera» introduce un matiz potencial o iterativo menos natural que el sentido narrativo de contemporaneidad o hecho puntual del participio.'
  spanish_quality_summary: El español es claro y legible, pero «saltando hacia sus costados» resulta algo torpe y poco idiomático en una escena de violencia física. «Cuando cayera» también suena algo literario y menos natural que «al caer» o «cuando caía». Una revisión menor puede hacer el texto más fluido y más fiel al dinamismo del original sin cambiar su contenido.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto en este versículo. «Guardias» para δορυφόρων es aceptable con nota léxica; «crueles» para πικρῶν está bien; y la nota sobre «levantarse de nuevo» preserva la decisión de no leer resurrección aquí.
  issues:
  - severity: medium
    issue: «saltando hacia sus costados» atenúa o desvía la fuerza de ἐναλλόμενος
    rationale: El participio describe una acometida física brusca contra la víctima. «Hacia» expresa dirección, pero no el impacto o agresión sobre los costados. «lanzándose contra sus costados» o similar comunica mejor la violencia del gesto.
  - severity: low
    issue: «cuando cayera» suena menos natural y puede introducir matiz no deseado
    rationale: πίπτων es participio contemporáneo en una escena narrativa. En español, «al caer» expresa mejor la inmediatez física del derrumbe sin sugerir una condición hipotética o repetida.
  revised_spanish_text: Entonces, en efecto, uno de los guardias crueles[a], lanzándose contra sus costados, lo golpeaba sin cesar, para que, al caer[b], se levantara de nuevo.
  revised_footnotes:
  - marker: a
    text: O «de los duros guardias de escolta». El griego dice literalmente «portadores de lanza», es decir, guardias armados al servicio del gobernante.
    reason: lexical_alternative
  - marker: b
    text: «Levantarse de nuevo» aquí significa recuperar físicamente la postura tras la caída, no resucitar.
    reason: lexical_alternative
  revision_rationale: 'La revisión ajusta dos puntos para mayor fidelidad y naturalidad: «lanzándose contra sus costados» refleja mejor la acometida violenta de ἐναλλόμενος que «saltando hacia», y «al caer» representa de forma más idiomática e inmediata el participio πίπτων en este contexto narrativo. Se conservan las notas léxicas y teológicas pertinentes.'
