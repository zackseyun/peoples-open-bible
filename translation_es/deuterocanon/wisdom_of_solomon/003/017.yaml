lexical_decisions:
- source_word: ἐὰν τε γὰρ
  english_pob_choice: For even if
  chosen_spanish: Porque, aun si
  alternatives_spanish:
  - Porque si
  - Aun si, porque
  lexicon: BDAG
  rationale: La combinación condicional y enfática de las partículas griegas se expresa de manera natural en español con «porque, aun si», conservando el valor concesivo sin volver la frase rígida.
- source_word: μακρόβιοι
  english_pob_choice: long-lived
  chosen_spanish: longevos
  alternatives_spanish:
  - de larga vida
  - de vida larga
  lexicon: LSJ
  rationale: «Longevos» comunica con precisión la idea de larga duración de vida y suena más natural en español que una paráfrasis literal.
- source_word: γένωνται
  english_pob_choice: they become
  chosen_spanish: llegan a ser
  alternatives_spanish:
  - se vuelven
  - se hacen
  lexicon: BDAG
  rationale: El aoristo subjuntivo de γίνομαι en la cláusula condicional expresa la posibilidad de alcanzar esa condición; «llegan a ser» conserva ese matiz de resultado o llegada a un estado.
- source_word: εἰς οὐθὲν
  english_pob_choice: as nothing
  chosen_spanish: por nada
  alternatives_spanish:
  - como nada
  - en nada
  - como de ningún valor
  lexicon: LSJ
  rationale: El giro griego indica ser contado como nada o de ningún valor; en español, «ser tenidos por nada» reproduce bien ese juicio evaluativo sin añadir contenido ajeno.
- source_word: λογισθήσονται
  english_pob_choice: will be counted
  chosen_spanish: serán tenidos
  alternatives_spanish:
  - serán contados
  - serán considerados
  lexicon: BDAG
  rationale: El futuro pasivo de λογίζομαι aquí implica evaluación o estimación; «serán tenidos» mantiene la pasividad y suena idiomático en español con el complemento «por nada».
- source_word: ἄτιμον
  english_pob_choice: dishonored
  chosen_spanish: deshonrada
  alternatives_spanish:
  - sin honra
  - sin honor
  - afrentada
  lexicon: LSJ
  rationale: ἄτιμον expresa carencia de honor y vergüenza pública; «deshonrada» sigue de cerca el sentido directo que la revisión inglesa prefirió frente a una fórmula más vaga.
- source_word: ἐπʼ ἐσχάτων
  english_pob_choice: in the end
  chosen_spanish: al final
  alternatives_spanish:
  - al cabo
  - en lo último
  - al último
  lexicon: LSJ
  rationale: La expresión señala el desenlace o etapa final; «al final» transmite bien la idea temporal y conclusiva en español contemporáneo.
- source_word: τὸ γῆρας αὐτῶν
  english_pob_choice: their old age
  chosen_spanish: su vejez
  alternatives_spanish:
  - su ancianidad
  - su edad avanzada
  lexicon: BDAG
  rationale: γῆρας designa la vejez; «su vejez» es claro, directo y conserva el sustantivo concreto del original.
theological_decisions:
- issue: Valuación moral y social de la longevidad
  english_pob_reading: Even a long life does not secure worth or honor for the ungodly in context.
  chosen_spanish_reading: Aun una larga vida no asegura honra ni valor a quienes el contexto contrasta como impíos.
  alternative_spanish_readings:
  - Solo describe la mala reputación social en la vejez
  - La longevidad en sí es presentada como negativa
  rationale: El versículo no se limita a una observación sociológica; dentro del marco de Sabiduría 3, conserva el contraste evaluativo del griego sin añadir explícitamente «ante Dios» en esta línea.
  doctrine_reference: Mantener la tensión teológica del pasaje y la primacía del texto original frente a una resolución interpretativa excesiva.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, especialmente el giro evaluativo de ἄτιμον como «deshonrada», y adapta con naturalidad la construcción concesiva y pasiva al español sin perder el contraste de honor/deshonra del griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero esta cita no contiene el nombre divino.
  - Se evita «Cristo»/«Mesías» porque no aparece terminología cristológica en el verso.
  - «Longevos» y «vejez» conservan el campo semántico de duración de vida y ancianidad sin suavizar el juicio del texto.
  - La pasiva evaluativa «serán tenidos por nada» preserva la fuerza de λογισθήσονται y la alternativa en nota recoge la posibilidad de «ser considerados de ningún valor».
