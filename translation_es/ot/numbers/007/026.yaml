    issue: «platillo» para כַּף
    rationale: Aunque posible, «platillo» en español moderno suena diminutivo o cotidiano. En contexto de inventario sacrificial, «fuente» comunica mejor un recipiente cultual pequeño sin banalizarlo.
  - severity: medium
    issue: Discordancia en «lleno de»
    rationale: El referente expreso en español debe ser femenino si se usa «fuente». Incluso con «platillo», la decisión léxica propuesta en el borrador sobre la concordancia con el sustantivo no está bien cuidada a nivel de revisión final. Debe quedar «llena de» con la revisión recomendada.
  - severity: low
    issue: Redacción de la nota al pie algo rígida
    rationale: Puede pulirse ligeramente para sonar más natural en español sin cambiar el contenido auditado del inglés.
