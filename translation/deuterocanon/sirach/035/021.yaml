translation:
  text: A devious heart causes grief[b][a], and an experienced man will repay him in kind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final clause is difficult. Hebrew literally reads something like, 'and a seasoned man will return/answer it in/with him/it.' Possible senses include 'will answer it in kind' or 'will repay him accordingly.' The Greek parallel for this verse differs substantially, indicating a likely variant Vorlage or textual corruption.
    reason: alternative_reading
  - marker: b
    text: The Greek parallel in Swete reads, 'Do not trust in a road without stumbling,' which does not closely match the surviving Hebrew here.
    reason: textual_variant
lexical_decisions:
- source_word: לב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: In Hebrew wisdom literature, לב commonly denotes the inner person, including thought and intention. 'Heart' preserves the idiomatic and moral sense without over-interpreting it as merely intellect.
- source_word: עקוב
  chosen: devious
  alternatives:
  - crooked
  - perverse
  - deceitful
  lexicon: HALOT
  rationale: The adjective conveys twisted or crooked moral character. 'Devious' captures the sense of inward crookedness in readable modern English. 'Deceitful' is possible, but the term is broader than mere dishonesty.
- source_word: יתן
  chosen: brings
  alternatives:
  - gives
  - causes
  lexicon: HALOT
  rationale: 'Literally ''gives,'' but in English the idiom here is causative: the heart produces or brings about grief. ''Brings'' preserves the causal force naturally.'
- source_word: עצבת
  chosen: grief
  alternatives:
  - sorrow
  - pain
  - vexation
  lexicon: HALOT
  rationale: The noun denotes sorrow or distress. 'Grief' is concise and idiomatic, fitting the wisdom context. 'Vexation' is possible but sounds narrower and more irritative than sorrowful.
- source_word: ואיש
  chosen: and a man
  alternatives:
  - and a person
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular. Per project philosophy, the gendered form should be preserved unless context clearly demands neutralization. In the running English line, 'man' is retained in the lexical record even though the phrase is idiomatically expanded with the adjective.
- source_word: ותיק
  chosen: seasoned
  alternatives:
  - experienced
  - mature
  - veteran
  lexicon: HALOT
  rationale: The term denotes one who is tried, experienced, or mature. 'Seasoned' is natural modern English and fits wisdom literature well. 'Experienced' is also possible, but 'seasoned' better suggests tested discernment.
- source_word: ישיבנה
  chosen: will answer it
  alternatives:
  - will repay it
  - will return it
  - will respond to it
  lexicon: HALOT
  rationale: From שוב in a causative/returning sense, the phrase likely means to return or answer something back. Given the object suffix and the surrounding moral aphorism, 'will answer it' preserves the responsive sense while allowing the idiom 'in kind' to carry the reciprocal nuance.
- source_word: בו
  chosen: in kind
  alternatives:
  - against him
  - with it
  - by it
  lexicon: HALOT
  rationale: 'The preposition with pronominal suffix is terse and somewhat difficult in Hebrew. In context it most plausibly marks reciprocal correspondence: the seasoned man responds back correspondingly. ''In kind'' communicates this compactly in English. The Greek parallel is quite divergent and does not control the Hebrew here, but it reinforces that the line is textually difficult.'
