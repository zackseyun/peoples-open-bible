translation:
  language: es
  text: Mi hueso[a] se adhiere a mi piel y a mi carne, y he escapado con la piel de mis dientes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hueso» está en singular en el hebreo, probablemente como singular colectivo para el armazón óseo de Job; algunas versiones lo suavizan con «huesos».
    reason: lexical_alternative
  - marker: b
    text: O «por la piel de mis dientes». El hebreo expresa un escape sumamente estrecho.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעוֹרִי
  english_pob_choice: to my skin
  chosen_spanish: a mi piel
  alternatives_spanish:
  - con mi piel
  - en mi piel
  lexicon: HALOT
  rationale: עוֹר significa ‘piel’. En español, con דבק (‘se pega’), la construcción natural es ‘se pega a mi piel’; ‘piel’ es más idiomático y fiel que calcar preposiciones menos naturales.
- source_word: וּבִבְשָׂרִי
  english_pob_choice: and to my flesh
  chosen_spanish: y a mi carne
  alternatives_spanish:
  - y a mi cuerpo
  - y a mi tejido
  lexicon: HALOT
  rationale: בָּשָׂר en este contexto corporal literal se traduce con más precisión como ‘carne’, manteniendo el paralelismo con ‘piel’ y la imagen de extrema delgadez.
- source_word: דָּבְקָה עַצְמִי
  english_pob_choice: My bone clings
  chosen_spanish: Mi hueso se pega
  alternatives_spanish:
  - Mis huesos se pegan
  - Mi osamenta se pega
  lexicon: HALOT
  rationale: El hebreo tiene el singular ‘mi hueso’, probablemente colectivo. En español puede conservarse el singular para reflejar la forma del texto, aunque ‘huesos’ sería una suavización posible.
- source_word: וָאֶתְמַלְּטָה
  english_pob_choice: and I have escaped
  chosen_spanish: y he escapado
  alternatives_spanish:
  - y escapo
  - y he sido librado
  - y apenas he escapado
  lexicon: HALOT
  rationale: מלט expresa escapar o librarse. El perfecto compuesto ‘he escapado’ comunica bien el estado resultante de haber sobrevivido, sin añadir explícitamente ‘apenas’ al texto principal.
- source_word: בְּעוֹר שִׁנָּי
  english_pob_choice: with the skin of my teeth
  chosen_spanish: con la piel de mis dientes
  alternatives_spanish:
  - por la piel de mis dientes
  lexicon: HALOT
  rationale: La expresión reproduce de cerca el hebreo y conserva el carácter idiomático de escape extremadamente estrecho. ‘Con’ refleja mejor בְּ que ‘por’, aunque ambas suenan posibles en español.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo poético y mantiene la imagen corporal extrema. Se preserva el singular de «hueso» y la locución idiomática final sin explicitar en la línea principal la intensidad de «apenas», reservada para la nota.
  spanish_consistency_notes:
  - Se usa «piel» para עוֹר y «carne» para בָּשָׂר, manteniendo el paralelismo corporal literal.
  - Se conserva el singular «hueso» por fidelidad a la forma hebrea, con nota sobre el valor colectivo.
  - La locución final se deja idiomática en español; la nota aclara el sentido de escape mínimo.
