  to: Y el sacerdote pondrá parte de la sangre sobre los cuernos del altar del incienso aromático[b], delante de Yahvé, que está en la tienda de reunión; y derramará toda la sangre del toro[a] en la base del altar del holocausto, que está a la entrada de la tienda de reunión.
  rationale: Se revisa para restaurar la correspondencia correcta de las notas con el expediente POB inglés, mejorar la precisión léxica de פָּר con «toro», y suavizar la sintaxis española con «que». También se ajusta «en la base» para reflejar mejor יְסוֹד y la decisión léxica auditada.
