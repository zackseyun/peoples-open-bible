translation:
  language: es
  text: Y cuando le hablaban día tras día, él no les escuchaba; y se lo dijeron a Amán, para ver si las palabras de Mardoqueo[a] se mantendrían, porque les había dicho que era judío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "si la explicación de Mardoqueo se sostendría". El hebreo literalmente dice "si las palabras de Mardoqueo se mantendrían", lo cual puede referirse tanto a la razón que él dio para no inclinarse como a si su postura resistiría la presión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בְאָמְרָם
  english_pob_choice: And when they spoke
  chosen_spanish: Y cuando le hablaban
  alternatives_spanish:
  - Y cuando le decían
  - Y ocurrió que, al hablarle
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce una acción repetida en el tiempo; en español, “Y cuando le hablaban” conserva la transición temporal y la idea de insistencia sin una calca dura de la fórmula.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Mardoqueo
  lexicon: HALOT
  rationale: El pronombre se refiere claramente a Mardoqueo por el contexto inmediato. El clítico español evita redundancia y mantiene el flujo natural.
- source_word: יוֹם וָיוֹם
  english_pob_choice: day after day
  chosen_spanish: día tras día
  alternatives_spanish:
  - día por día
  - cada día
  lexicon: HALOT
  rationale: La expresión idiomática comunica repetición persistente. “Día tras día” es la equivalencia natural más cercana en español.
- source_word: וְלֹא שָׁמַע אֲלֵיהֶם
  english_pob_choice: and he would not listen to them
  chosen_spanish: él no les escuchaba
  alternatives_spanish:
  - él no los escuchaba
  - él no les hacía caso
  lexicon: HALOT
  rationale: שׁמע con אֶל aquí es “escuchar/obedecer a”. En español, el imperfecto “no les escuchaba” refleja la negativa continuada en un contexto de insistencia repetida.
- source_word: וַיַּגִּידוּ לְהָמָן
  english_pob_choice: they told Haman
  chosen_spanish: entonces se lo dijeron a Amán
  alternatives_spanish:
  - entonces informaron a Amán
  - entonces le dijeron a Amán
  lexicon: HALOT
  rationale: El verbo נגד en esta forma es “decir, informar”. “Se lo dijeron a Amán” conserva el complemento implícito y el movimiento narrativo hacia un tercer destinatario.
- source_word: לִרְאוֹת
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para comprobar
  - a fin de ver
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. “Para ver” es una equivalencia directa y natural en español, sin sobreinterpretar la intención.
- source_word: הֲיַעַמְדוּ דִּבְרֵי מָרְדֳּכַי
  english_pob_choice: whether Mordecai’s words would stand
  chosen_spanish: si las palabras de Mardoqueo se mantendrían
  alternatives_spanish:
  - si las palabras de Mardoqueo se sostendrían
  - si la declaración de Mardoqueo prevalecería
  lexicon: HALOT
  rationale: עָמַד con “palabras” mantiene la imagen de algo que permanece firme. “Se mantendrían” conserva esa metáfora en un español claro, y deja abierta la misma amplitud semántica del hebreo.
- source_word: כִּי הִגִּיד לָהֶם
  english_pob_choice: for he had told them
  chosen_spanish: porque les había dicho
  alternatives_spanish:
  - pues les había dicho
  - ya que les había dicho
  lexicon: HALOT
  rationale: 'La relación causal se expresa de forma natural con “porque”. El pluscuamperfecto “había dicho” respeta la secuencia temporal: su declaración previa explica la reacción de ellos.'
- source_word: אֲשֶׁר הוּא יְהוּדִי
  english_pob_choice: that he was a Jew
  chosen_spanish: que era judío
  alternatives_spanish:
  - que era un judío
  - que pertenecía al pueblo judío
  lexicon: HALOT
  rationale: יְהוּדִי es un identificador étnico-religioso. En español, “judío” funciona como predicado nominal natural y fiel al hebreo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo WLC y coincide con la solución inglesa POB en los puntos clave: repetición insistente, negativa continuada, propósito de la acción y la ambigüedad de “las palabras de Mardoqueo”. No se detectan revisiones posteriores que requieran ajuste adicional.'
  spanish_consistency_notes:
  - Se mantiene Amán como forma española habitual del nombre.
  - Se conserva “Mardoqueo” como equivalente estándar en español para Mordecai.
  - Se usa “judío” como identidad nominal, no como adjetivo, para corresponder al hebreo.
  - La puntuación reproduce una sola oración narrativa fluida, acorde con el hebreo y con la POB inglesa.
