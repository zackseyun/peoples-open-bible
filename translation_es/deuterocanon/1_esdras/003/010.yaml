translation:
  language: es
  text: Uno escribió[a], «El vino es el más fuerte».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «El vino prevalece» o «El vino es más fuerte». El verbo griego puede significar «prevalece», «es más fuerte» o, en este contexto de comparación, «es el más fuerte».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ εἷς
  english_pob_choice: One
  chosen_spanish: Uno
  alternatives_spanish:
  - El uno
  - Un hombre
  lexicon: LSJ
  rationale: La expresión griega significa literalmente «el uno», pero en este contexto narrativo se refiere a uno de los participantes. En español, «Uno» al inicio de la oración suena natural y conserva la indefinición referencial sin añadir un sustantivo innecesario.
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - había escrito
  lexicon: LSJ
  rationale: Es un aoristo narrativo; el pretérito simple «escribió» reproduce con claridad la acción puntual del relato.
- source_word: Ὑπερισχύει
  english_pob_choice: is strongest
  chosen_spanish: prevalece
  alternatives_spanish:
  - es más fuerte
  - triunfa
  - tiene la ventaja
  lexicon: LSJ
  rationale: El verbo puede significar «ser más fuerte», «prevalecer» o «tener superior fuerza». En español, «prevalece» conserva bien la idea de superioridad/ventaja sin forzar un superlativo explícito que el griego no marca morfológicamente.
- source_word: ὁ οἶνος
  english_pob_choice: Wine
  chosen_spanish: el vino
  alternatives_spanish:
  - vino
  lexicon: LSJ
  rationale: 'Aunque el artículo griego puede tener valor genérico, en español la forma más natural y fiel es mantener el artículo: «el vino». Esto evita una generalización demasiado desnuda y preserva el matiz de categoría o fuerza discutida en la frase.'
translation_notes:
  revision_awareness: El texto inglés pasó de «stronger» a «strongest» en una revisión posterior para expresar mejor Ὑπερισχύει en este contexto de competencia. En español se optó por «prevalece», que refleja la misma amplitud semántica sin depender de un superlativo que el griego no exige formalmente.
  spanish_consistency_notes:
  - Se mantiene «vino» como sustantivo común, no como nombre propio ni término litúrgico.
  - No se introdujo «Cristo», «Señor» ni otra terminología teológica ajena al verso.
  - La puntuación con dos puntos reproduce bien la estructura introductoria seguida de la cita directa.
