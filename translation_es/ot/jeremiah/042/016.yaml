translation:
  language: es
  text: Entonces la espada que ustedes temen los alcanzará allí, en la tierra de Egipto, y la hambruna que ustedes temen[a] los seguirá de cerca allí, en Egipto[b]; y allí morirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'les preocupa'. El hebreo דֹּאֲגִים puede expresar ansiedad o preocupación; aquí se traduce 'temen' para mantener el paralelismo con 'la espada que ustedes temen'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'se pegará detrás de ustedes'. La imagen hebrea comunica una persecución persistente e ineludible.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: Then ... will
  chosen_spanish: Entonces ...
  alternatives_spanish:
  - Y sucederá que ...
  - Y será que ...
  lexicon: HALOT
  rationale: La forma hebrea introduce la consecuencia de la advertencia anterior; en español, 'Entonces' comunica con naturalidad ese valor consecutivo sin perder el sentido predictivo.
- source_word: הַחֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - la espada de guerra
  - la guerra
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de חֶרֶב, que en este contexto profético funciona como amenaza de muerte violenta. 'La espada' mantiene la fuerza y la literalidad del hebreo.
- source_word: יְרֵאִים מִמֶּנָּה
  english_pob_choice: you fear
  chosen_spanish: ustedes temen
  alternatives_spanish:
  - ustedes tienen miedo de
  - ustedes se asustan de
  lexicon: HALOT
  rationale: '''Temer'' reproduce bien ירא con מן en un registro bíblico sobrio y natural para el español, sin intensificar ni suavizar indebidamente la amenaza.'
- source_word: תַּשִּׂיג אֶתְכֶם
  english_pob_choice: will overtake you
  chosen_spanish: los alcanzará
  alternatives_spanish:
  - los sobrevendrá
  - los dará alcance
  lexicon: HALOT
  rationale: '''Alcanzará'' conserva la idea de llegar hasta ellos pese a su huida; evita un calco duro y sigue la imagen de persecución inevitable que el inglés POB expresó con ''will overtake you''.'
- source_word: בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: there in the land of Egypt
  chosen_spanish: allí, en la tierra de Egipto
  alternatives_spanish:
  - allí, en Egipto
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: '''Tierra de Egipto'' preserva la fórmula geográfica del hebreo. ''Allí'' mantiene el énfasis de שָׁם y refuerza la ironía: el lugar buscado como refugio será el lugar del juicio.'
- source_word: הָרָעָב
  english_pob_choice: the famine
  chosen_spanish: el hambre
  alternatives_spanish:
  - el hambre / la hambruna
  - la escasez
  lexicon: HALOT
  rationale: Aunque el inglés POB usa 'famine', en español 'hambre' puede comunicar el mismo juicio con mayor naturalidad; aquí se mantiene una nota de severidad sin necesidad de escoger una forma más técnica como 'hambruna'.
- source_word: דֹּאֲגִים מִמֶּנּוּ
  english_pob_choice: you dread
  chosen_spanish: temen
  alternatives_spanish:
  - se preocupan por
  - les inquieta
  lexicon: HALOT
  rationale: El hebreo puede expresar preocupación ansiosa; sin embargo, en este paralelismo con 'la espada que temen', repetir 'temen' en español conserva mejor el paralelismo y la tensión del oráculo. Se evita introducir una distinción no exigida por el texto.
- source_word: יִדְבַּק אַחֲרֵיכֶם
  english_pob_choice: will follow close after you
  chosen_spanish: se les pegará atrás
  alternatives_spanish:
  - los seguirá de cerca
  - se les pegará detrás
  lexicon: HALOT
  rationale: דבק transmite la imagen de algo que se adhiere y no los suelta. 'Se les pegará atrás' intenta preservar esa metáfora de persecución persistente, aunque en español suena menos idiomático; se conserva deliberadamente la imagen del hebreo.
- source_word: מִצְרַיִם
  english_pob_choice: there in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  - Egipto
  lexicon: HALOT
  rationale: La repetición de Egipto en el verso se mantiene para subrayar que el juicio los alcanzará precisamente en el lugar al que huyen.
- source_word: וְשָׁם תָּמֻתוּ
  english_pob_choice: and there you will die
  chosen_spanish: y allí morirán
  alternatives_spanish:
  - y allí ustedes morirán
  - y allí van a morir
  lexicon: HALOT
  rationale: Se conserva la sencillez del cierre hebreo y el énfasis locativo de 'allí'. El futuro directo en español comunica con claridad la sentencia final.
theological_decisions:
- issue: Concreción de los instrumentos de juicio ('espada' y 'hambre')
  english_pob_reading: Retain the concrete images 'sword' and 'famine' rather than interpret them abstractly.
  chosen_spanish_reading: Mantener 'espada' y 'hambre' como imágenes concretas de juicio, sin convertirlas en paráfrasis abstractas.
  alternative_spanish_readings:
  - violencia y escasez
  - muerte violenta y hambruna
  rationale: 'El hebreo usa términos proféticos-covenantales muy concretos. Mantenerlos en español preserva la tensión teológica del anuncio: el juicio no es sólo una idea general, sino una amenaza histórica y localizada.'
  doctrine_reference: Principio de primacía del texto original; preservar la imaginería profética y el peso judicial del pasaje.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó la segunda mitad de la imagen de דבק para sonar más natural sin perder la idea de persecución continua. En español se optó por una solución que conserve esa imaginería dependiente del hebreo, aun si resulta ligeramente marcada, para no borrar la tensión lexical documentada.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' por norma proyectual cuando el pasaje lo requiriera, pero este versículo no contiene el nombre divino explícito.
  - Se prefirió 'la espada' y 'el hambre' como términos concretos de juicio, siguiendo la línea auditada del POB inglés.
  - Se evitó 'Cristo', 'Señor' u otras sustituciones no presentes en el texto fuente.
  - Se conservó el paralelismo entre 'temen' y 'temen' para que la estructura retórica del hebreo siga visible en español.
