revisions:
- from: Contra ti, contra ti solo[a], he pecado, y he hecho lo malo a tus ojos[b], para que seas justificado en tus palabras y seas hallado limpio en tu juicio.
  to: Contra ti —y contra ti solo[a]— he pecado, y he hecho lo malo a tus ojos[b], para que seas justificado en tus palabras y quedes sin culpa en tu juicio.
  rationale: Se revisa el inicio para conservar el énfasis hebreo con una puntuación más natural en español ('Contra ti —y contra ti solo—'). Se cambia 'seas hallado limpio' por 'quedes sin culpa', que refleja mejor el valor judicial-moral de תִזְכֶּה, se alinea mejor con el audit trail inglés ('blameless') y mejora notablemente la legibilidad. Se conservan el perfecto confesional, 'lo malo a tus ojos', y la estructura final de vindicación divina.
