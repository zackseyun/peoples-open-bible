review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: la duración temporal («Mientras aún vivas»), el paralelismo con «aliento en ti», y la advertencia ética de μὴ ἀλλάξῃς σεαυτὸν como no cederse a otros. Sin embargo, «a toda carne» no corresponde bien a πάσῃ σαρκί en este contexto, porque suena distributivo/universal («a toda la humanidad») más que indefinido («a cualquier mortal» / «a ninguna carne»). Además, la nota dice «ninguna carne» mientras el texto dice «toda carne», creando tensión innecesaria.'
  spanish_quality_summary: El español es claro y digno, pero «no te entregues a toda carne» resulta poco natural y ambiguo en español eclesial moderno. «Toda carne» suele leerse como colectivo humano general, no como «cualquier ser humano». Una formulación como «no te entregues a ningún mortal» o «no cedas ante ninguna carne» sería más clara. Dado el criterio del proyecto de preservar «carne» cuando sea posible, conviene mantenerla en nota y usar una forma principal más idiomática.
  glossary_alignment: 'Buena alineación general con los criterios del proyecto: πνοή → «aliento» está bien; σάρξ no se interpreta como «naturaleza pecaminosa»; no hay conflicto con terminología divina o cristológica. La principal corrección léxica es ajustar πάσῃ σαρκί para evitar que «toda carne» distorsione el valor de «any flesh / mere mortals».'
  issues:
  - severity: medium
    issue: «a toda carne» distorsiona el alcance de πάσῃ σαρκί
    rationale: En español, «toda carne» suele entenderse como colectivo totalizante, mientras que el griego aquí, según el expediente inglés, apunta a «any flesh», es decir, cualquier ser humano/mortal. La traducción actual puede sugerir «entrégate a toda la humanidad», lo contrario de la advertencia.
  - severity: medium
    issue: La frase completa «no te entregues a toda carne» suena antinatural y ambigua
    rationale: Aunque literal en parte, no comunica con claridad la advertencia sapiencial contra someterse a los meros mortales. El lector hispano probablemente no entenderá el sentido sin acudir a la nota.
  - severity: low
    issue: La nota al pie no armoniza del todo con el texto principal
    rationale: La nota usa «ninguna carne», pero el texto principal dice «toda carne». Esa diferencia de polaridad complica innecesariamente la relación entre texto y nota.
  revised_spanish_text: Mientras aún vivas y haya aliento en ti[a], no te entregues a ningún mortal.
  revised_footnotes:
  - marker: a
    text: O, más formalmente, «no te cambies por ninguna carne». La formulación griega es idiomática y puede implicar «no te entregues a los simples mortales».
    reason: lexical_alternative
