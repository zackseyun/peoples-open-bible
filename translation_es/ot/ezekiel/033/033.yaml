    rationale: הָיָה בְּתוֹכָם apunta a que un profeta estuvo/ha estado entre ellos, no solo a la existencia pasada de uno. «Ha habido un profeta entre ellos» preserva mejor la relevancia resultante después del cumplimiento, en línea con el English POB «has been among them».
