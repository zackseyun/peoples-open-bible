translation:
  language: es
  text: Guardarás la fiesta de los panes sin levadura[a]. Durante siete días comerás panes sin levadura, como te mandé, en el tiempo señalado, en el mes de Abib[b]; porque en el mes de Abib saliste de Egipto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «festividad de los panes sin levadura». חַג puede designar una fiesta o festividad sagrada.'
    reason: lexical_alternative
  - marker: b
    text: «Abib» es el mes de primavera temprana asociado con el éxodo de Egipto.
    reason: cultural_note
  - marker: c
    text: 'O: «saliste de la tierra de Egipto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַג הַמַּצּוֹת
  english_pob_choice: the Feast of Unleavened Bread
  chosen_spanish: la fiesta de los panes sin levadura
  alternatives_spanish:
  - la festividad de los panes sin levadura
  - la fiesta de los ázimos
  lexicon: HALOT
  rationale: חַג nombra una fiesta o festividad sagrada; en español, «fiesta» conserva bien el tono de observancia institucional. מַצּוֹת designa panes sin levadura; «panes sin levadura» es claro y fiel, mientras que «ázimos» es más técnico y menos transparente para lectura pública.
- source_word: תִּשְׁמֹר
  english_pob_choice: you shall keep
  chosen_spanish: Guardarás
  alternatives_spanish:
  - Observarás
  - Mantendrás
  lexicon: HALOT
  rationale: שׁמר en contexto pactual y cultual puede significar guardar/observar. «Guardarás» conserva el valor de cumplimiento fiel de una orden establecida, sin volverlo demasiado eclesiástico.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: For seven days
  chosen_spanish: Durante siete días
  alternatives_spanish:
  - Siete días
  - Por siete días
  lexicon: HALOT
  rationale: La expresión marca la duración de la práctica. «Durante siete días» fluye de forma natural en español y mantiene el sentido temporal continuo.
- source_word: תֹּאכַל מַצּוֹת
  english_pob_choice: you shall eat unleavened bread
  chosen_spanish: comerás panes sin levadura
  alternatives_spanish:
  - comerás pan sin levadura
  - comerás ázimos
  lexicon: HALOT
  rationale: Aunque el hebreo usa un plural, en español «panes sin levadura» comunica el mismo sentido sin sonar forzado. Se evita singularizar en exceso porque el plural hebreo tiene fuerza colectiva/distributiva.
- source_word: אֲשֶׁר צִוִּיתִךָ
  english_pob_choice: as I commanded you
  chosen_spanish: como te he mandado
  alternatives_spanish:
  - como te mandé
  - tal como te he ordenado
  lexicon: HALOT
  rationale: La cláusula expresa conformidad con un mandato previo. «Como te he mandado» conserva el valor de mandato divino y su relación con la observancia prescrita.
- source_word: לְמוֹעֵד
  english_pob_choice: at the appointed time
  chosen_spanish: en el tiempo señalado
  alternatives_spanish:
  - en el momento señalado
  - en la fecha señalada
  lexicon: HALOT
  rationale: מוֹעֵד es un tiempo establecido o señalado para una cita/observancia sagrada. «Tiempo señalado» conserva la idea de una cita divina sin reducirla solo a fecha de calendario.
- source_word: חֹדֶשׁ הָאָבִיב
  english_pob_choice: the month of Abib
  chosen_spanish: en el mes de Abib
  alternatives_spanish:
  - en el mes de Aviv
  - en el mes primaveral de Abib
  lexicon: HALOT
  rationale: Abib funciona aquí como nombre propio tradicional del mes en el contexto del éxodo. Se mantiene la transliteración «Abib» por fidelidad histórica y para evitar reemplazarla por una equivalencia interpretativa.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: כִּי introduce la razón del mandato. «Porque» expresa con claridad la base explicativa en español, sin perder la relación causal.
- source_word: יָצָאתָ מִמִּצְרָיִם
  english_pob_choice: you came out from Egypt
  chosen_spanish: saliste de Egipto
  alternatives_spanish:
  - saliste de entre Egipto
  - saliste de la tierra de Egipto
  lexicon: HALOT
  rationale: יצא se traduce naturalmente como «salir». «Saliste de Egipto» es idiomático y mantiene el movimiento del éxodo sin añadir palabras ajenas al texto.
theological_decisions:
- issue: Terminología del festival sagrado
  english_pob_reading: Use 'Feast of Unleavened Bread' as a formal covenant observance title
  chosen_spanish_reading: «la fiesta de los panes sin levadura» como título de la observancia
  alternative_spanish_readings:
  - «la festividad de los panes sin levadura»
  - «la fiesta de los ázimos»
  rationale: El texto presenta una institución cultual ligada al éxodo. «Fiesta» conserva el carácter de observancia sagrada y evita un estilo excesivamente técnico, mientras que «panes sin levadura» hace visible el objeto ritual sin ambigüedad.
  doctrine_reference: Translation philosophy §1, §5
- issue: Segunda persona singular en el mandato
  english_pob_reading: Retain singular 'you' throughout
  chosen_spanish_reading: Conservar el singular implícito de 2.ª persona en español
  alternative_spanish_readings:
  - pluralizar a «ustedes»
  - explicitar «Israel»
  rationale: El hebreo usa singular masculino para dirigirse a Israel corporativamente. El español mantiene ese valor con formas verbales singulares, preservando la forma del original sin necesidad de pluralizar.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la línea de auditoría inglesa. No se observaron revisiones aplicadas en el pasaje fuente; se mantiene la lectura estable sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Abib» como transliteración estable del nombre del mes, coherente con el contexto del éxodo.
  - Se usa «panes sin levadura» en lugar de «ázimos» para maximizar claridad pública sin perder precisión.
  - Se conserva el mandato en segunda persona singular, en paralelo con el hebreo.
  - Se evita sustituir el lenguaje cultual por términos eclesiásticos posteriores que no están exigidos por la fuente.
