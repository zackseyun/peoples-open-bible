translation:
  language: es
  text: 'Y la palabra de Yahvé vino a mí, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y ... vino
  alternatives_spanish:
  - Y ... llegó
  - Y aconteció
  lexicon: HALOT
  rationale: En esta fórmula profética, el hebreo introduce un nuevo oráculo con una secuencia narrativa. En español, «vino» reproduce de manera natural y fiel la idea de que la palabra se acercó o fue recibida; «aconteció» sería más literal pero menos idiomático en este contexto.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - una palabra
  lexicon: HALOT
  rationale: El sustantivo en este marco profético alude a la comunicación divina recibida por el profeta. «La palabra» conserva la fórmula bíblica y evita diluir el sentido concreto de una revelación recibida.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración directa de YHWH. «Yahvé» sigue la convención editorial de la POB en español y evita sustituir el nombre por un título como «SEÑOR».
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona singular se expresa de forma directa y natural en español como «a mí».
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'con estas palabras:'
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el discurso directo que sigue. «Diciendo:» preserva la función de introducción al oráculo sin añadir contenido interpretativo.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton, no un título genérico. Se traduce con el nombre propio divino para mantener la transparencia textual y la distinción teológica de la POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado no presenta notas ni revisiones que requieran reflejo especial. La decisión principal es el nombre divino, mantenido con el estándar español de la POB como «Yahvé» y con sintaxis natural para la fórmula profética.
  spanish_consistency_notes:
  - Se mantiene el registro profético sobrio y bíblico.
  - No se usan sustituciones litúrgicas como «el SEÑOR».
  - La puntuación con dos puntos refleja la introducción del discurso directo en español.
