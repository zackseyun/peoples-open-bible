revisions:
- from: Y rociará parte de la sangre de la ofrenda por el pecado[a] sobre el lado del altar, y el resto de la sangre será drenado a la base del altar; es ofrenda por el pecado.
  to: Y rociará parte de la sangre de la ofrenda por el pecado[a] en el costado del altar, y el resto de la sangre será escurrido en la base del altar; es una ofrenda por el pecado.
  rationale: 'Se ajustaron dos giros para mayor fidelidad idiomática al hebreo y mejor español: «en el costado del altar» representa más naturalmente la superficie lateral de קִיר הַמִּזְבֵּחַ, y «será escurrido en la base del altar» comunica mejor el valor ritual de יִמָּצֵה que «será drenado a la base». También se añadió el artículo en «es una ofrenda por el pecado» para una cláusula final más natural en español.'
