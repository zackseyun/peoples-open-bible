id: MAT.16.17
reference: Matthew 16:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸂ἀποκριθεὶς δὲ⸃ ὁ Ἰησοῦς εἶπεν αὐτῷ· Μακάριος εἶ, Σίμων Βαριωνᾶ, ὅτι σὰρξ καὶ αἷμα οὐκ ἀπεκάλυψέν σοι ἀλλ’ ὁ πατήρ μου ὁ ἐν τοῖς οὐρανοῖς·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/016/017.yaml
  text: 'And Jesus answered him[a], "Blessed are you, Simon Bar-Jonah, because flesh and blood did not reveal this to you[c][b], but my Father who is in heaven did."'
translation:
  language: ko
  text: '예수께서 그에게 대답하여 말씀하셨습니다. 「복되도다, 시몬 바요나여, 너에게 이것을 계시한 것은 혈과 육이 아니라 하늘에 계신 내 아버지이시기 때문이다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「요나의 아들 시몬」. 헬라어는 아람어식 부칭(父稱) 형태를 보존하며, 여기서는 「바요나」로 음역한다.
    reason: lexical_alternative
  - marker: b
    text: 문자적으로 「혈과 육」, 인간 또는 단순히 인간적 근원을 가리키는 관용 표현.
    reason: lexical_alternative
  - marker: c
    text: 헬라어 「하늘들에」, 한국어 자연스러움을 위해 「하늘에」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σίμων Βαριωνᾶ
  english_pob_choice: Simon Bar-Jonah
  chosen_korean: 시몬 바요나
  alternatives_korean:
  - 요나의 아들 시몬
  lexicon: BDAG
  rationale: 아람어 부칭 「바요나(요나의 아들)」를 음역하여 본문의 아람어적 색채를 보존한다.
- source_word: σὰρξ καὶ αἷμα
  english_pob_choice: flesh and blood
  chosen_korean: 혈과 육
  alternatives_korean:
  - 살과 피
  - 사람
  lexicon: BDAG
  rationale: 「혈과 육」은 한국 성경 정착어로, 인간적 근원의 한계를 가리키는 셈어 관용구의 무게를 살린다.
- source_word: ὁ πατήρ μου ὁ ἐν τοῖς οὐρανοῖς
  english_pob_choice: my Father who is in heaven
  chosen_korean: 하늘에 계신 내 아버지
  lexicon: BDAG
  rationale: 마태 특유의 정형 표현.
