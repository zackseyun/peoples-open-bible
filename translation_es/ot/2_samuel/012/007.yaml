translation:
  language: es
  text: 'Entonces Natán dijo a David[a]: «¡Tú eres el hombre! Así dice Yahvé, el Dios de Israel: Yo te ungí como rey sobre Israel, y te libré de la mano de Saúl».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tú eres ese hombre». El hebreo, de manera literal, dice: «Tú eres el hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «entonces» conserva esa secuencia de forma natural en español y mantiene el tono narrativo del pasaje.
- source_word: אַתָּה הָאִישׁ
  english_pob_choice: You are the man!
  chosen_spanish: Tú eres el hombre
  alternatives_spanish:
  - Tú eres ese hombre
  - Tú eres aquel hombre
  lexicon: HALOT
  rationale: La cláusula hebrea es enfática y punzante. «Tú eres el hombre» refleja con fidelidad la literalidad que el audit trail inglés preserva, sin añadir un demostrativo que el hebreo no exige.
- source_word: כֹה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: Es la fórmula profética estándar. «Así dice» conserva el registro formal y el valor introductorio de la cita divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», preservando el nombre propio y no sustituyéndolo por un título.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios de Israel
  lexicon: HALOT
  rationale: 'La construcción en español reproduce de manera directa el título de pacto: «el Dios de Israel». «De Israel» mantiene la relación posesiva/covenantal del hebreo.'
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. En español, la repetición explícita de «yo» en ambas cláusulas conserva ese relieve sin sobrecargar el estilo.
- source_word: מְשַׁחְתִּיךָ
  english_pob_choice: I anointed you
  chosen_spanish: te ungí
  alternatives_spanish:
  - te consagré
  lexicon: HALOT
  rationale: En contexto real/entronización, משׁח se traduce con el verbo de unción. «Te ungí» mantiene la fuerza histórica y teológica de la investidura.
- source_word: לְמֶלֶךְ
  english_pob_choice: king
  chosen_spanish: como rey
  alternatives_spanish:
  - rey
  - para rey
  lexicon: HALOT
  rationale: En español, «ungir como rey» suena más natural que una apposición desnuda y expresa con claridad el nombramiento para oficio.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - para Israel
  lexicon: HALOT
  rationale: La preposición conserva el matiz de autoridad y gobierno sobre el pueblo, tal como en el inglés auditado.
- source_word: הִצַּלְתִּיךָ
  english_pob_choice: I delivered you
  chosen_spanish: te libré
  alternatives_spanish:
  - te rescaté
  - te salvé
  lexicon: HALOT
  rationale: נצל expresa liberación de peligro o poder hostil. «Te libré» es idiomático en español y evita cargar el término con connotaciones soteriológicas no requeridas aquí.
- source_word: מִיַּד שָׁאוּל
  english_pob_choice: from the hand of Saul
  chosen_spanish: de la mano de Saúl
  alternatives_spanish:
  - del poder de Saúl
  - de Saúl
  lexicon: HALOT
  rationale: Se conserva el hebraísmo «de la mano de» para mantener el texture source-grounded y el matiz de poder/control.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La política del proyecto exige representar el Tetragrámaton con el nombre propio divino. «Yahvé» conserva esa decisión y evita la sustitución por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula profética con autoridad divina
  english_pob_reading: Thus says Yahweh, the God of Israel
  chosen_spanish_reading: Así dice Yahvé, el Dios de Israel
  alternative_spanish_readings:
  - Así ha dicho Yahvé, el Dios de Israel
  - Esto dice Yahvé, el Dios de Israel
  rationale: La frase introduce un oráculo con solemnidad profética. «Así dice» preserva la fórmula sin alejarse del uso natural del español.
  doctrine_reference: Uso profético estándar en la tradición bíblica; sin cambio doctrinal
- issue: «El hombre» en la reprensión de Natán
  english_pob_reading: You are the man!
  chosen_spanish_reading: Tú eres el hombre
  alternative_spanish_readings:
  - ¡Tú eres ese hombre!
  - ¡Tú eres aquel hombre!
  rationale: Se mantiene la literalidad que deja la acusación en forma directa y contundente, sin introducir un demostrativo que el hebreo no obliga a leer.
  doctrine_reference: Decisión lexical del texto fuente; nota de alternativa permitida
translation_notes:
  revision_awareness: El audit trail inglés no requirió revisiones textuales; la versión española sigue la misma decisión principal para יְהוָה, la fórmula profética y el hebraísmo «de la mano de».
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se mantuvo «de la mano de» para conservar el idiomatismo hebreo y la transparencia fuente-texto.
  - Se prefirió «te libré» sobre «te salvé» para evitar una connotación soteriológica no marcada en este contexto.
  - La nota al pie se ancla en «Tú eres el hombre» porque en español surge la misma alternativa interpretativa que en el audit trail inglés.
