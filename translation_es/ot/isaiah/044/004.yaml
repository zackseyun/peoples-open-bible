translation:
  language: es
  text: Y brotarán entre la hierba, como sauces junto a corrientes de agua[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como álamos junto a cursos de agua». El hebreo עֲרָבִים suele traducirse «sauces», aunque algunos lo entienden de manera más amplia como un árbol ribereño parecido al álamo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצָמְחוּ
  english_pob_choice: And they will spring up
  chosen_spanish: Y brotarán
  alternatives_spanish:
  - y crecerán
  - y florecerán
  - y surgirán
  lexicon: HALOT
  rationale: צמח en qal expresa brotar o salir con vigor, especialmente en imágenes vegetales. «Brotarán» conserva esa vivacidad y el sentido futuro sin volverse demasiado interpretativo.
- source_word: בְּבֵין
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - entre medio de
  - en medio de
  - entre la
  lexicon: HALOT
  rationale: El valor locativo de בְּבֵין se expresa naturalmente en español con «entre». Mantiene la imagen espacial sin forzar un calco torpe.
- source_word: חָצִיר
  english_pob_choice: the grass
  chosen_spanish: la hierba
  alternatives_spanish:
  - el pasto
  - la grama
  - la hierba seca
  lexicon: HALOT
  rationale: חָצִיר designa hierba o vegetación herbácea. «Hierba» es un equivalente amplio y natural en español bíblico moderno; «la» ayuda a sonar idiomático en la escena.
- source_word: כַּעֲרָבִים
  english_pob_choice: like willows
  chosen_spanish: como sauces
  alternatives_spanish:
  - como álamos
  - como chopos
  - como sauces del agua
  lexicon: HALOT
  rationale: La identificación tradicional de עֲרָבִים favorece «sauces», sobre todo por el contexto acuático inmediato. Se conserva la posibilidad alternativa en nota porque la equivalencia botánica no es absolutamente segura.
- source_word: עַל יִבְלֵי מָיִם
  english_pob_choice: by streams of water
  chosen_spanish: junto a corrientes de agua
  alternatives_spanish:
  - junto a arroyos de agua
  - al borde de corrientes de agua
  - junto a cursos de agua
  lexicon: HALOT
  rationale: יִבְלֵי מָיִם refiere canales o corrientes de agua. «Corrientes de agua» conserva el plural y el movimiento del hebreo; «junto a» expresa bien el valor locativo de עַל en esta imagen.
translation_notes:
  revision_awareness: El texto inglés auditable mantiene la imagen vegetal y la opción léxica tradicional «willows», con una nota que preserva la alternativa «poplars by watercourses». No se registran revisiones aplicadas; por eso la propuesta española sigue de cerca esa decisión, conservando la nota de alternativa botánica en forma equivalente.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este versículo no contiene el Tetragrámaton.
  - Se prefirió «brotarán» sobre «crecerán» para reflejar la imagen dinámica de צמח.
  - «Corrientes de agua» preserva el plural de יִבְלֵי מָיִם y sugiere canales o cursos de agua, no agua abstracta.
  - La nota mantiene la tensión lexical entre «sauces» y la posible lectura más amplia tipo «álamos».
