translation:
  language: es
  text: 'En la altivez de su rostro[a], el impío no busca; todos sus pensamientos son: «No hay Dios»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En la altivez de su nariz/rostro». El hebreo dice literalmente «en la altura de su nariz/rostro», un modismo de arrogancia o porte altanero.'
    reason: cultural_note
  - marker: b
    text: 'O: «Dios no está en ninguno de sus pensamientos». El hebreo también puede entenderse como una afirmación de que Dios está ausente de todo su pensar, en vez de una cita directa de sus palabras.'
    reason: alternative_reading
lexical_decisions:
- source_word: רָשָׁע
  english_pob_choice: the wicked man
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el hombre impío
  lexicon: HALOT
  rationale: El hebreo usa un adjetivo con función sustantiva para un referente singular. «El impío» conserva la fuerza personal y representativa sin añadir un sustantivo innecesario.
- source_word: כְּגֹבַהּ אַפּוֹ
  english_pob_choice: In the pride of his face
  chosen_spanish: En la altivez de su rostro
  alternatives_spanish:
  - En el orgullo de su rostro
  - En la altivez de su semblante
  - En su arrogante porte
  lexicon: HALOT
  rationale: La imagen hebrea es idiomática y concreta. «Altivez» comunica la idea de altura/arrogancia; «rostro» mantiene el término corporal sin convertirlo en una paráfrasis abstracta. Se evita «ira» porque aquí el contexto favorece orgullo de porte, no enojo.
- source_word: בַּל
  english_pob_choice: does not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no va a
  - jamás
  lexicon: HALOT
  rationale: En poesía, la partícula negativa con el imperfecto expresa una negación característica o habitual. «No» es la forma más natural en español y conserva ese valor.
- source_word: יִדְרֹשׁ
  english_pob_choice: seek
  chosen_spanish: busca
  alternatives_spanish:
  - busca a Dios
  - indaga
  lexicon: HALOT
  rationale: דרשׁ puede significar buscar o inquirir. Como el objeto no aparece expresado en el hebreo de esta cola, se deja el verbo sin complemento; así se respeta la economía del original y la apertura interpretativa.
- source_word: אֵין אֱלֹהִים
  english_pob_choice: There is no God
  chosen_spanish: No hay Dios
  alternatives_spanish:
  - Dios no existe
  - No existe Dios
  lexicon: HALOT
  rationale: La negación existencial se traduce de forma directa y natural. «No hay Dios» conserva el golpe retórico y puede funcionar como contenido del pensamiento citado o como resumen de la ausencia de Dios en su pensar.
- source_word: כָּל מְזִמּוֹתָיו
  english_pob_choice: all his thoughts are
  chosen_spanish: todos sus pensamientos son
  alternatives_spanish:
  - todas sus maquinaciones son
  - todos sus planes son
  lexicon: HALOT
  rationale: מְזִמּוֹת puede abarcar pensamientos, planes o maquinaciones. Aquí, siguiendo la lectura auditada del inglés POB y la ambigüedad del hebreo, «pensamientos» permite que la cláusula final funcione naturalmente como contenido citado.
theological_decisions:
- issue: Relación sintáctica de la cláusula final
  english_pob_reading: 'The verse concludes with the content of the wicked man''s thinking: ''all his thoughts are, “There is no God.”'' The alternative ''God is in none of his thoughts'' is preserved as a valid reading.'
  chosen_spanish_reading: 'todos sus pensamientos son: «No hay Dios»'
  alternative_spanish_readings:
  - «Dios no está en ninguno de sus pensamientos»
  - «Dios no ocupa sus pensamientos»
  rationale: El hebreo permite tanto una cita del contenido mental como una afirmación de ausencia de Dios en el pensar del impío. Se mantiene la lectura más directa al orden de palabras, sin borrar la alternativa documentada; la nota conserva la tensión interpretativa.
  doctrine_reference: Preservar ambigüedad textual y teológica documentada; no resolverla por armonización.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión auditada del inglés POB: se omitió cualquier objeto explícito después de «buscar», porque el hebreo no lo expresa. También se mantuvo la cláusula final como contenido citado, con la lectura alternativa preservada en nota.'
  spanish_consistency_notes:
  - Se mantiene «impío» para רָשָׁע y «Dios» para אֱלֹהִים, conforme a los criterios del proyecto.
  - «Rostro» se usa para conservar la imagen corporal del modismo hebreo; la nota aclara la posibilidad de «nariz/rostro».
  - La puntuación con dos puntos antes de la cita refleja la función de contenido de la cláusula final sin cerrar la alternativa interpretativa.
