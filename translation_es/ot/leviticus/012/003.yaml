translation:
  language: es
  text: Y al octavo día será circuncidada la carne de su prepucio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más dinámica: «deberá ser circuncidado al octavo día». El hebreo es formalmente pasivo («será circuncidada»), y el texto principal conserva esa forma.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/יּוֹם
  english_pob_choice: And on the ... day
  chosen_spanish: Y en el ... día
  alternatives_spanish:
  - Y el ... día
  - Ahora, en el ... día
  lexicon: HALOT
  rationale: La combinación de conjunción y preposición se expresa naturalmente en español con un enlace simple temporal. 'Y en el octavo día' conserva el valor secuencial de la instrucción legal sin sonar forzado.
- source_word: הַ/שְּׁמִינִי
  english_pob_choice: eighth
  chosen_spanish: octavo
  alternatives_spanish:
  - octava
  lexicon: HALOT
  rationale: Es un adjetivo ordinal que modifica 'día'; 'octavo' es la forma natural y precisa en español.
- source_word: יִמּוֹל
  english_pob_choice: shall be circumcised
  chosen_spanish: se circuncidará
  alternatives_spanish:
  - deberá ser circuncidado
  - será circuncidado
  lexicon: HALOT
  rationale: El hebreo está en pasivo/reflexivo formal (Niphal). 'Se circuncidará' preserva esa forma impersonal y mantiene el tono prescriptivo. 'Deberá ser circuncidado' enfatiza obligación, pero altera más el matiz formal del verbo.
- source_word: בְּשַׂר
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la carne de
  - la piel
  lexicon: HALOT
  rationale: '''Besar'' significa ''carne''. En español, ''la carne de su prepucio'' reproduce la estructura del constructo de modo claro y sin suavizar el término técnico.'
- source_word: עָרְלָתוֹ
  english_pob_choice: of his foreskin
  chosen_spanish: de su prepucio
  alternatives_spanish:
  - de su foreskin
  lexicon: HALOT
  rationale: '''Prepucio'' es el equivalente español estándar y claro para el sustantivo, manteniendo la referencia anatómica precisa del hebreo.'
translation_notes:
  revision_awareness: El texto base en inglés presenta alta concordancia con la fuente hebrea y no muestra revisiones sustantivas; se conservó la voz pasiva/reflexiva del Niphal y la estructura legal de la instrucción.
  spanish_consistency_notes:
  - Se mantiene 'circuncidará' en voz media/pasiva con 'se' para reflejar el hebreo Niphal.
  - '''Prepucio'' se usa por claridad y precisión anatómica en español bíblico contemporáneo.'
  - La coordinación inicial con 'Y' conserva el enlace narrativo-legal del hebreo.
