    rationale: El English POB nota «Or 'one lamb in its first year.'»; por tanto, la nota debe ir en «de un año» y no ofrecer «para un holocausto» como variante principal.
  - severity: low
    issue: «Para holocausto» suena algo elíptico en español.
    rationale: «Para un holocausto» mantiene el término técnico y mejora la naturalidad sin alterar el sentido.
  - severity: low
    issue: La nota a dice «de la manada», que no es la mejor explicación en este contexto bovino.
    rationale: «Hato» o «ganado» explican mejor el modismo hebreo בֶּן בָּקָר para animales vacunos.
