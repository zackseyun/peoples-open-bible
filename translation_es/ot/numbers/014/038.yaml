translation:
  language: es
  text: Pero Josué hijo de Nun y Caleb hijo de Jefone permanecieron con vida de entre aquellos hombres que habían ido a reconocer la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘a explorar la tierra’ o ‘a reconocer la tierra’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיהוֹשֻׁעַ
  english_pob_choice: But Joshua
  chosen_spanish: Pero Josué
  alternatives_spanish:
  - Y Josué
  - Ahora Josué
  lexicon: HALOT
  rationale: La conjunción inicial se entiende en contexto como contraste con la muerte de los demás exploradores; por eso ‘Pero’ comunica mejor la oposición narrativa que un simple ‘Y’. El nombre propio se normaliza como ‘Josué’.
- source_word: בִּן נוּן
  english_pob_choice: son of Nun
  chosen_spanish: hijo de Nun
  alternatives_spanish:
  - hijo de Nún
  lexicon: HALOT
  rationale: Se mantiene la construcción filiativa de manera formal y natural en español. ‘Nun’ se conserva como nombre propio transliterado.
- source_word: וְכָלֵב בֶּן יְפֻנֶּה
  english_pob_choice: and Caleb son of Jephunneh
  chosen_spanish: y Caleb hijo de Jefone
  alternatives_spanish:
  - y Caleb hijo de Jeфunne
  lexicon: HALOT
  rationale: La coordinación suma al segundo sobreviviente sin añadir matiz extra. ‘Jefone’ es la forma española más estable y legible del nombre.
- source_word: חָיוּ
  english_pob_choice: remained alive
  chosen_spanish: permanecieron con vida
  alternatives_spanish:
  - vivieron
  - sobrevivieron
  lexicon: HALOT
  rationale: El verbo hebreo expresa que siguieron vivos frente a los que murieron. ‘Permanecieron con vida’ conserva ese valor resultativo sin volverlo demasiado interpretativo.
- source_word: מִן הָאֲנָשִׁים הָהֵם
  english_pob_choice: from among those men
  chosen_spanish: de entre aquellos hombres
  alternatives_spanish:
  - entre aquellos hombres
  - de aquellos hombres
  lexicon: HALOT
  rationale: ‘מִן’ aquí marca separación respecto del grupo; ‘de entre’ reproduce bien la idea de excepción dentro del conjunto. ‘Aquellos hombres’ mantiene la referencia específica al grupo ya mencionado.
- source_word: הַהֹלְכִים
  english_pob_choice: who had gone
  chosen_spanish: que habían ido
  alternatives_spanish:
  - que iban
  - que fueron
  lexicon: HALOT
  rationale: El participio se vuelve una relativa retrospectiva en español; el pluscuamperfecto expresa bien que la misión de exploración ya había ocurrido antes del hecho narrado.
- source_word: לָתוּר אֶת הָאָרֶץ
  english_pob_choice: to spy out the land
  chosen_spanish: a reconocer la tierra
  alternatives_spanish:
  - a explorar la tierra
  - a espiar la tierra
  - a reconocer la tierra
  lexicon: HALOT
  rationale: תור en este contexto es una misión de reconocimiento/reconnaissance. ‘Reconocer la tierra’ evita un ‘espiar’ demasiado técnico o connotativamente fuerte, sin perder el sentido de inspección del territorio.
theological_decisions:
- issue: Matiz de contraste en la conjunción inicial
  english_pob_reading: But Joshua ...
  chosen_spanish_reading: Pero Josué ...
  alternative_spanish_readings:
  - Y Josué ...
  - Ahora Josué ...
  rationale: 'No hay una cuestión doctrinal, pero sí una decisión de lectura narrativa: el contraste con la muerte de los demás espías está implícito en el contexto inmediato. ‘Pero’ lo hace visible en español sin añadir contenido ajeno.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y mantiene la decisión auditada del inglés POB de expresar la misión con un verbo de reconocimiento/reconnaissance. En español se eligió ‘reconocer la tierra’ como equivalente natural y formal, preservando el matiz de exploración sin imponer ‘espiar’ como única opción.
  spanish_consistency_notes:
  - Se mantiene ‘Josué’ y ‘Caleb’ como nombres propios normalizados en español.
  - ‘Tierra’ traduce הָאָרֶץ de forma consistente con el registro bíblico; no se capitaliza.
  - La expresión ‘de entre aquellos hombres’ conserva la idea de excepción dentro del grupo, alineada con el ‘from among’ del audit trail inglés.
  - No se introduce ‘SEÑOR’ ni terminología doctrinal ajena al verso.
