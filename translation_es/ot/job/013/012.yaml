translation:
  language: es
  text: Sus máximas son proverbios de cenizas[a]; sus defensas son defensas de barro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sus recuerdos son proverbios de cenizas; sus baluartes son baluartes de barro». El hebreo es muy terso y la frase final es difícil; «defensas» refleja una lectura contextual del sustantivo repetido.'
    reason: alternative_reading
lexical_decisions:
- source_word: זִכְרֹנֵיכֶם
  english_pob_choice: your maxims
  chosen_spanish: sus máximas
  alternatives_spanish:
  - sus remembranzas
  - sus dichos memorables
  - sus memoriales
  lexicon: HALOT
  rationale: El sustantivo derivado de זכר puede significar recuerdo, memoria o lo recordado; en este contexto acusatorio, la idea es la de afirmaciones que pretenden valer como sabiduría autorizada. «Máximas» conserva el valor de sentencia breve y pretendidamente sabia, y evita una traducción demasiado literal pero poco natural como «remembranzas».
- source_word: מִשְׁלֵי
  english_pob_choice: proverbs of
  chosen_spanish: proverbios de
  alternatives_spanish:
  - como proverbios de
  - parábolas de
  - refranes de
  lexicon: HALOT
  rationale: מָשָׁל en poesía sapiencial suele ser «proverbio», «dicho» o «comparación». «Proverbios de» preserva la construcción nominal tersa del hebreo y el matiz sapiencial del texto.
- source_word: אֵפֶר
  english_pob_choice: ashes
  chosen_spanish: ceniza
  alternatives_spanish:
  - cenizas
  - polvo
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo común para «ceniza/ashes». En español singular colectivo «ceniza» funciona bien en esta metáfora y mantiene la sensación de algo sin valor; «polvo» sería más libre y menos preciso.
- source_word: לְגַבֵּי / גַּבֵּיכֶם
  english_pob_choice: your defenses
  chosen_spanish: sus defensas
  alternatives_spanish:
  - sus espaldas
  - sus baluartes
  - sus murallas
  lexicon: HALOT
  rationale: גַּב literalmente puede ser «espalda» o «lado elevado», pero el contexto poético permite un sentido de soporte o protección. Como el inglés POB documenta una lectura contextual de «defenses/bulwarks», «defensas» comunica la fuerza de la imagen sin imponer una metáfora oscura en español. Se evita «espaldas» porque, aunque literal, no expresa bien la acusación de fragilidad retórica.
- source_word: חֹמֶר
  english_pob_choice: clay
  chosen_spanish: barro
  alternatives_spanish:
  - arcilla
  - barro arcilloso
  - lodo
  lexicon: HALOT
  rationale: חֹמֶר puede referirse a barro, arcilla o material semejante. «Barro» es la opción más natural en español para una imagen de debilidad y fragilidad; «arcilla» sería más técnica y menos expresiva aquí.
theological_decisions:
- issue: La línea hebrea es muy breve y admite una tensión entre una lectura literal de «espaldas» y una lectura contextual de «defensas»/«baluartes».
  english_pob_reading: Your defenses are defenses of clay.
  chosen_spanish_reading: Sus defensas son defensas de barro.
  alternative_spanish_readings:
  - Sus espaldas son espaldas de barro.
  - Sus baluartes son baluartes de barro.
  rationale: Se conserva la decisión contextual del POB inglés de entender גַּבֵּי como algo defensivo. En español, «defensas» comunica la misma idea de fragilidad argumental o protección endeble sin borrar la ambigüedad del hebreo, que sigue siendo difícil y terso.
  doctrine_reference: Sin referencia doctrinal específica; decisión de semántica poética y exegética.
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin cambios en la revisión más reciente; se mantiene la decisión óptima del inglés POB y se la traslada al español con equivalentes naturales y una nota para la ambigüedad final del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se preserva la tensión léxica entre una lectura más literal de זִכְרֹנֵיכֶם («recuerdos») y la lectura contextual de «máximas», mediante nota alternativa.
  - «Barro» se usa para חֹמֶר por naturalidad idiomática; no se optó por «arcilla» porque suena más técnico y menos directo en este juicio poético.
  - La puntuación y el paralelismo imitan la concisión del hebreo sin añadir explicaciones al cuerpo del texto.
