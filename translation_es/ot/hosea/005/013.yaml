translation:
  language: es
  text: Cuando Efraín vio su enfermedad, y Judá su herida, entonces Efraín fue a Asiria y envió al rey Jareb[a]; pero él no puede curarlos, ni puede curar su herida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente ‘al rey vengador’ o ‘al gran rey’; el hebreo ‘Jareb’ puede entenderse como un título más que como un nombre personal.
    reason: alternative_reading
lexical_decisions:
- source_word: חָלְיוֹ
  english_pob_choice: his sickness
  chosen_spanish: su enfermedad
  alternatives_spanish:
  - su dolencia
  - su mal
  lexicon: HALOT
  rationale: חֳלִי denota enfermedad o dolencia; en este contexto es metáfora de la condición de Israel. ‘Enfermedad’ conserva la imagen médica con claridad natural en español.
- source_word: מְזֹרוֹ / מָזוֹר
  english_pob_choice: his wound / the wound
  chosen_spanish: su herida
  alternatives_spanish:
  - su llaga
  - su lesión
  lexicon: HALOT
  rationale: מָזוֹר puede referirse a herida, llaga o lesión. ‘Herida’ es la opción más natural en español y mantiene la metáfora corporal sin precisar de más.
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - Asur
  lexicon: HALOT
  rationale: En contexto geopolítico, ‘Asiria’ es la forma clara y estándar en español.
- source_word: מֶלֶךְ יָרֵב
  english_pob_choice: King Jareb
  chosen_spanish: el rey Jareb
  alternatives_spanish:
  - el rey vengador
  - el rey litigante
  - el gran rey
  lexicon: HALOT
  rationale: El hebreo permite entenderlo como nombre/título. Se mantiene ‘Jareb’ en el texto principal para no borrar esa posibilidad; las alternativas descriptivas se conservan como posibilidades semánticas.
- source_word: וַיִּשְׁלַח אֶל
  english_pob_choice: sent to
  chosen_spanish: envió a
  alternatives_spanish:
  - mandó a
  - despachó a
  lexicon: HALOT
  rationale: El verbo simplemente expresa enviar. ‘Envió a’ es fiel y no añade ‘mensajeros’ que el hebreo no explicita.
- source_word: לִרְפֹּא
  english_pob_choice: heal
  chosen_spanish: sanar
  alternatives_spanish:
  - curar
  lexicon: HALOT
  rationale: לרפא significa sanar/curar. ‘Sanar’ resulta natural y más amplio en español; ‘curar’ queda como alternativa válida.
- source_word: יִגְהֶה מִכֶּם מָזוֹר
  english_pob_choice: nor can he cure your wound
  chosen_spanish: ni puede quitar de ustedes su mal
  alternatives_spanish:
  - ni puede sanar su herida
  - ni puede curar su herida
  lexicon: HALOT
  rationale: El verbo es raro y el contexto combina lenguaje de curación con la idea de retirar el mal. ‘Quitar de ustedes su mal’ refleja ese gesto de remover la aflicción sin volverlo opaco en español. Se agrega un matiz de ‘mal’ porque el término puede abarcar la dolencia completa.
theological_decisions:
- issue: Identidad y función de ‘rey Jareb’
  english_pob_reading: The Hebrew is best taken as a proper name/title-like designation; the term may also be understood descriptively ('avenging/contending king').
  chosen_spanish_reading: Se mantiene ‘rey Jareb’ como forma principal, sin resolver definitivamente si es nombre propio o título.
  alternative_spanish_readings:
  - rey vengador
  - rey litigante
  - gran rey
  rationale: La ambigüedad del hebreo debe permanecer visible. El texto español no debe cerrar indebidamente una decisión que el testimonio fuente deja abierta.
  doctrine_reference: Principio de transparencia textual y respeto por la ambigüedad léxica del original
- issue: Referente del pronombre singular en ‘pero él no puede sanarlos’
  english_pob_reading: The pronoun refers to King Jareb / the Assyrian ruler as the immediate antecedent.
  chosen_spanish_reading: ‘él’ se entiende como referencia inmediata al rey Jareb.
  alternative_spanish_readings:
  - él como referencia a Asiria como poder/nación
  rationale: Aunque el antecedente gramatical inmediato es singular, el sentido retórico también puede abarcar a Asiria como potencia. El español conserva esa tensión sin explicitarla en exceso.
  doctrine_reference: Gramática del antecedente cercano y sentido retórico del pasaje
translation_notes:
  revision_awareness: 'He seguido el pasaje hebreo de Oseas 5:13 y he alineado la redacción española con la auditoría inglesa: se mantiene la metáfora médica (‘enfermedad’, ‘herida’), la ambigüedad de ‘Jareb’, y el cierre con un verbo español natural para el raro יִגְהֶה (‘quitar de ustedes su mal’), sin suavizar la dependencia política que el versículo critica.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como terminología estándar del proyecto solo cuando el texto lo requiera; en este versículo no aparece el tetragrámaton.
  - Se conserva ‘Asiria’ y no ‘Asur’ para claridad geopolítica en español.
  - ‘Sanar’ y ‘curar’ quedan como alternativas recogidas en notas, siguiendo la tensión léxica del original.
  - La frase ‘de ustedes’ refleja el plural hebreo y evita una singularización injustificada.
