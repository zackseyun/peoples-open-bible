review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo y sigue la línea del POB en cuanto al contexto levirático: Onán sabe que la descendencia no será legalmente suya, actúa repetidamente cuando se une a la esposa de su hermano, y lo hace con el propósito de no dar descendencia a su hermano. Sin embargo, dos elecciones debilitan la fidelidad fina: ''el descendiente'' suena demasiado singular y menos natural que una referencia colectiva/progenitiva, y ''derramaba el semen'' sobre-explicita más que el texto hebreo y más que la auditoría inglesa, que prefirió mantener ''it'' con nota.'
  spanish_quality_summary: El español es generalmente claro, pero 'cada vez que se llegaba' resulta poco idiomático por el uso pronominal impersonal aplicado a un sujeto explícito; 'cada vez que se unía' o 'cuando se llegaba' sería más natural. Además, 'en tierra' suena bíblico pero algo rígido; 'en el suelo' o 'en tierra' ambos son posibles, pero con el resto de la frase conviene una formulación más natural. La combinación actual mezcla un eufemismo tradicional ('llegarse a') con una explicitación muy clínica ('el semen'), lo que rompe un poco el registro.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías/esclavo. Sí importa la consistencia de זרע: el POB inglés decidió ''offspring'' en las cláusulas legal-familiares y una referencia pronominal para el acto físico, con nota explicativa. En español, ''descendencia'' refleja mejor ese valor que ''descendiente'', y ''lo derramaba'' conserva mejor la reserva del original con apoyo de la nota.'
  issues:
  - severity: medium
    issue: '''el descendiente no sería suyo'''
    rationale: Aunque no es incorrecto, 'descendiente' en singular suena menos natural en español para זרע en contexto levirático y puede sugerir un individuo concreto más que la noción de posteridad/heredero legal. 'La descendencia no sería suya' comunica mejor el sentido contextual.
  - severity: medium
    issue: '''cada vez que se llegaba a la mujer de su hermano'''
    rationale: Con sujeto explícito ('Onán'), la forma pronominal 'se llegaba' suena extraña en español actual. Es mejor 'cada vez que se unía a la mujer de su hermano' o 'cada vez que llegaba a la mujer de su hermano'. La primera mantiene el eufemismo y mejora la fluidez.
  - severity: medium
    issue: '''derramaba el semen en tierra'' sobre-explicita el hebreo'
    rationale: El hebreo no nombra explícitamente 'semen' aquí, y la auditoría inglesa preserva esa reserva en el texto principal, dejando la aclaración a la nota. En español conviene 'lo derramaba en el suelo' con nota, para mantener fidelidad y dignidad de registro.
  revised_spanish_text: Pero Onán sabía que la descendencia no sería suya[a]; así que, cada vez que se unía a la mujer de su hermano, lo derramaba en el suelo[b], para no dar descendencia a su hermano.
