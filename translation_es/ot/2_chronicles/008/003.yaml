translation:
  language: es
  text: Entonces Salomón fue a Hamat-zobá[a] y prevaleció contra ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «prevaleció sobre ella» o «tomó control de ella». El modismo hebreo dice literalmente: «fue fuerte sobre ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - fue a
  - marchó a
  - se dirigió a
  lexicon: HALOT
  rationale: El verbo הלך en narrativa con waw consecutiva expresa el desplazamiento básico. En español, «fue a» comunica el movimiento sin añadir hostilidad que el hebreo no marca en este verbo.
- source_word: חֲמָת צוֹבָה
  english_pob_choice: Hamath-zobah
  chosen_spanish: Hamat-zobá
  alternatives_spanish:
  - Hamat de Zobá
  - Hamat-Zobá
  - Jamat-zobá
  lexicon: HALOT
  rationale: Se conserva el compuesto toponímico como nombre propio unido. «Hamat-zobá» reproduce la estructura hebrea de forma legible en español y evita expandir la relación constructa más de lo que el texto exige.
- source_word: וַיֶּחֱזַק עָלֶיהָ
  english_pob_choice: prevailed against it
  chosen_spanish: prevaleció contra ella
  alternatives_spanish:
  - se fortaleció sobre ella
  - prevaleció sobre ella
  - tomó control de ella
  lexicon: HALOT
  rationale: El modismo חזק על comunica ganar fuerza sobre, imponerse o dominar. «Prevaleció contra ella» conserva la fuerza militar/política del giro y sigue de cerca la decisión inglesa de «prevailed against it», sin suavizarla con una paráfrasis demasiado libre.
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «subdued» por «prevailed against» para reflejar con más precisión ויחזק עליה («se hizo fuerte contra / prevaleció sobre»). La redacción española sigue esa revisión y mantiene el matiz de imposición sin convertirlo en una explicación interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se usa «contra ella» para conservar el referente femenino implícito del lugar/región y la dirección adversativa del hebreo.
  - La puntuación y el tono son bíblicos y publicables, sin arcaísmos innecesarios.
