revisions:
- from: 'Hay un hombre[a], y no tiene segundo; no tiene ni hijo ni hermano, y no hay fin a todo su trabajo. Sus ojos[b] tampoco se sacian de riqueza: «¿Y para quién trabajo, y me privo de lo bueno?» También esto es vanidad[c] y un asunto malo.'
  to: 'Hay un hombre[a], y no tiene segundo; no tiene ni hijo ni hermano, y no hay fin de todo su trabajo. Sus ojos tampoco quedan satisfechos con la riqueza: «¿Y para quién trabajo y me privo de lo bueno?» También esto es vanidad[b] y una empresa desdichada.'
  rationale: Se quitó la nota sobre «ojos» por innecesaria; se mantuvo una formulación española natural para la insaciabilidad con la riqueza; se mejoró la expresión final a «una empresa desdichada» para reflejar mejor עִנְיַן רָע en contexto; y se pulió ligeramente la sintaxis para mayor naturalidad sin apartarse del hebreo ni del POB inglés.
