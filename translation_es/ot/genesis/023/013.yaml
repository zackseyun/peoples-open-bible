base_translation:
  language: en
  yaml_path: translation/ot/genesis/023/013.yaml
  text: 'And he spoke to Ephron in the hearing of the people of the land[a], saying, “If only you would hear me: I give the silver for the field; take it from me[b], so that I may bury my dead there.”'
  footnotes:
