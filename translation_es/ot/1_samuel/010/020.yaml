translation:
  language: es
  text: Entonces Samuel hizo acercarse a todas las tribus de Israel[a], y fue tomada la tribu de Benjamín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fue seleccionada'. El hebreo dice literalmente 'fue tomada', refiriéndose aquí a una selección por sorteo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  english_pob_choice: brought near
  chosen_spanish: hizo acercarse
  alternatives_spanish:
  - trajo cerca
  - presentó
  - hizo venir delante
  lexicon: HALOT
  rationale: El causativo de קרב expresa poner algo o a alguien en posición de acercarse o ser presentado. En este contexto de sorteo, Samuel hace que las tribus comparezcan ante Yahvé; 'hizo acercarse' conserva esa fuerza causativa sin sonar rígido en español.
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  alternatives_spanish:
  - Samuél
  lexicon: Transliteración estándar
  rationale: Nombre propio bíblico de uso estable en español.
- source_word: כָּל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: all the tribes of Israel
  chosen_spanish: todas las tribus de Israel
  alternatives_spanish:
  - cada tribu de Israel
  lexicon: HALOT
  rationale: La cadena constructa con כָּל indica la totalidad del conjunto tribal. En español, 'todas las tribus de Israel' es natural y conserva el alcance colectivo.
- source_word: וַיִּלָּכֵד
  english_pob_choice: was taken
  chosen_spanish: fue tomada
  alternatives_spanish:
  - fue seleccionada
  - fue tomada por sorteo
  lexicon: HALOT
  rationale: El nifal de לכד significa literalmente 'ser tomada/capturada'. La POB inglesa preserva esa literalidad y aclara en nota el valor de selección por sorteo; en español, 'fue tomada' mantiene la tensión entre la forma verbal y el contexto de elección.
- source_word: שֵׁבֶט בִּנְיָמִן
  english_pob_choice: the tribe of Benjamin
  chosen_spanish: la tribu de Benjamín
  alternatives_spanish:
  - la casa de Benjamín
  lexicon: HALOT
  rationale: El sustantivo singular con el nombre propio identifica una tribu particular dentro de las tribus. 'La tribu de Benjamín' es la forma más clara y fiel en español.
theological_decisions:
- issue: Selección por sorteo frente a captura literal
  english_pob_reading: '''was taken'' with note: ''referring here to selection by lot.'''
  chosen_spanish_reading: '''fue tomada'' con nota que explica que aquí se refiere a la selección por sorteo'
  alternative_spanish_readings:
  - fue seleccionada
  - salió escogida por sorteo
  rationale: La redacción principal conserva el valor literal de 'tomar' y no borra la ambigüedad textual. La nota mantiene la interpretación contextual sin sustituirla en el cuerpo principal.
  doctrine_reference: 1 Samuel 10:20; cf. el uso de suertes para discernir la elección divina
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto español sigue la lectura estable de la edición auditada sin necesitar ajuste adicional.
  spanish_consistency_notes:
  - Se usó 'Yahvé' en la oración de la rationale, pero no se añadió al texto porque el hebreo de este verso no lo menciona explícitamente.
  - Se evitó 'escogida' en el texto principal para no diluir la literalidad de וַיִּלָּכֵד, siguiendo el respeto de la POB por la tensión léxica documentada.
  - '''Hizo acercarse'' refleja mejor el causativo hebreo que una simple traducción con ''presentó'', aunque ambas quedan como alternativas posibles.'
