  source_alignment_summary: 'El borrador español refleja fielmente el hebreo: וַיְדַבֵּר = «habló», יְהוָה = «Yahvé», doble destinatario «a Moisés y a Aarón», y לֵאמֹר = «diciendo». La estructura y el sentido están bien preservados.'
  spanish_quality_summary: 'El texto principal es natural, claro y digno en español bíblico moderno. La única corrección necesaria está en la nota al pie: presenta como alternativa exactamente la misma forma ya usada en el texto («Yahvé»), por lo que no funciona como verdadera alternativa.'
  glossary_alignment: La terminología del proyecto está bien seguida, especialmente «Yahvé» para יְהוָה. No hay conflictos de glosario en el texto principal. La nota debe alinearse mejor con la rationale inglesa, que ofrece una transliteración alternativa real («Jehová»), no una repetición de la forma escogida.
  issues:
  - severity: low
    issue: La nota al pie sobre el Tetragrama ofrece una alternativa redundante.
    rationale: 'Dice: «Hebreo: “YHWH”; también puede transliterarse “Yahvé”», pero «Yahvé» ya es la forma usada en el texto principal. Debe ofrecer una alternativa real o eliminarse. Dado que el inglés conserva una nota de lectura alternativa, conviene mantenerla con «Jehová». '
  - severity: low
    issue: Ligera desalineación con el audit trail inglés en la nota alternativa.
    rationale: 'La nota inglesa documenta una transliteración alternativa genuina. En español, «Jehová» es la alternativa más natural y documentada frente a «Yahvé». '
  revised_spanish_text: Yahvé habló a Moisés y a Aarón[a], diciendo,
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; alternativamente transliterado «Jehová».'
