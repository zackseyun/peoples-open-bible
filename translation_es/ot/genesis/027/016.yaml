translation:
  language: es
  text: Y puso las pieles de los cabritos sobre sus manos y sobre la parte lisa de su cuello.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: עֹרֹת
  english_pob_choice: skins
  chosen_spanish: pieles
  alternatives_spanish:
  - cueros
  - hides
  lexicon: HALOT
  rationale: El plural constructo se refiere a pieles de animales usadas como cobertura. «Pieles» es natural en español y conserva la imagen concreta sin introducir un matiz más técnico o pesado como «cueros».
- source_word: גְּדָיֵי הָעִזִּים
  english_pob_choice: the young goats
  chosen_spanish: los cabritos
  alternatives_spanish:
  - los cabritos de las cabras
  - los jóvenes de las cabras
  lexicon: HALOT
  rationale: La expresión alude a crías de cabra; «cabritos» comunica con claridad el referente y es idiomático en español. Mantiene la precisión referencial sin la literalidad forzada de «jóvenes de las cabras».
- source_word: הִלְבִּישָׁה
  english_pob_choice: put ... on
  chosen_spanish: puso ... sobre
  alternatives_spanish:
  - vistió
  - colocó ... sobre
  lexicon: HALOT
  rationale: El verbo hiphil de לבש puede significar vestir o poner sobre alguien algo. Aquí se trata de aplicar pieles a partes del cuerpo; «puso ... sobre» refleja mejor la acción concreta que «vistió».
- source_word: עַל יָדָיו
  english_pob_choice: on his hands
  chosen_spanish: sobre sus manos
  alternatives_spanish:
  - en sus manos
  - encima de sus manos
  lexicon: HALOT
  rationale: «Sobre» reproduce con naturalidad el valor espacial de עַל en este contexto de cobertura física. «Manos» es la traducción directa y clara de יָדָיו.
- source_word: חֶלְקַת צַוָּארָיו
  english_pob_choice: the smooth part of his neck
  chosen_spanish: la parte lisa de su cuello
  alternatives_spanish:
  - la parte suave de su cuello
  - el cuello liso
  lexicon: HALOT
  rationale: חֶלְקַת expresa la idea de una superficie lisa o suave. «La parte lisa de su cuello» conserva la concreción corporal y la intención narrativa de cubrir la zona sin pelo; «cuello» es la equivalencia natural de צַוָּארָיו.
