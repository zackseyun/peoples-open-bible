review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte la secuencia imperativa y el sentido cultual del hebreo: conserva ''Ceñíos'', distingue ''mi Dios'', y mantiene la referencia a la ofrenda y la libación retenidas. Sin embargo, introduce varios desajustes significativos: ''Entrad'' cambia בֹּאוּ (''venid/vengan'') por una noción de entrar no exigida por el texto; ''de la casa de su Dios'' pierde la segunda persona explícita de אֱלֹהֵיכֶם (''vuestro/su Dios'' dirigido a los sacerdotes) y puede sonar como tercera persona; y ''se ha retenido'' no concuerda bien con el sujeto compuesto femenino/masculino singular coordinado, además de sonar menos natural que una formulación plural o impersonal más clara.'
  spanish_quality_summary: El español es generalmente digno y legible, pero tiene puntos poco naturales o poco adecuados al registro bíblico amplio. 'Aullad' suena demasiado zoológico en español eclesial general; 'gemid' o 'lamentaos/clamad' comunicaría mejor el lamento intenso. 'Ofrenda vegetal' y 'libación' son precisas pero menos transparentes; pueden mantenerse si el registro formal lo tolera, aunque 'ofrenda de grano' y 'ofrenda de bebida' serían más accesibles. La mayor necesidad de reparación está en la posesión final y en 'Entrad'.
  glossary_alignment: No hay conflicto con los términos troncales del proyecto como 'Dios' o el tratamiento de nombres divinos. Sí hay que respetar la decisión teológica documentada de preservar el contraste 'mi Dios' / 'vuestro Dios'; el borrador lo debilita con 'su Dios'. También conviene seguir más de cerca la decisión inglesa 'Come' con 'Venid' o 'Vengan', no 'Entrad'.
  issues:
  - severity: high
    issue: La cláusula final cambia 'vuestro Dios' por 'su Dios'.
    rationale: El hebreo אֱלֹהֵיכֶם es segunda persona plural. La decisión teológica auditada exige preservar el contraste entre 'mi Dios' y 'vuestro Dios'. 'Su Dios' introduce ambigüedad de tercera persona y debilita el efecto retórico.
  - severity: medium
    issue: '''Entrad'' sobretraduce בֹּאוּ.'
    rationale: El imperativo hebreo significa 'venid/vengan' como marcador discursivo y de movimiento. 'Entrad' añade la idea de ingresar a un espacio, no exigida por el texto fuente.
  - severity: medium
    issue: '''Se ha retenido'' no encaja bien con el sujeto compuesto y suena menos natural.'
    rationale: El hebreo tiene sentido pasivo de impedimento/restricción respecto de dos ofrendas. En español, 'han sido retenidas' o 'se han retenido' concuerda mejor con 'la ofrenda... y la libación'.
  - severity: low
    issue: '''Aullad'' suena poco idiomático para lamento humano en español bíblico general.'
    rationale: Aunque busca intensidad, en español contemporáneo eclesial suele asociarse a animales o a un registro demasiado brusco. 'Gemid' conserva intensidad de duelo con mejor legibilidad.
  revised_spanish_text: Ceñíos y lamentad[a], sacerdotes; gemid, ministros del altar. Venid, pasad la noche en cilicio, ministros de mi Dios, porque la ofrenda de grano y la ofrenda de bebida han sido retenidas de la casa de vuestro Dios[b].
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: ''Ceñíos''. Aquí la idea es ceñirse para el duelo; el cilicio se menciona explícitamente más adelante en el versículo.'
    reason: lexical_alternative
  - marker: b
    text: 'O ''del templo de vuestro Dios''. Hebreo literalmente: ''de la casa de vuestro Dios''.'
    reason: lexical_alternative
  revision_rationale: Se corrige 'Entrad' a 'Venid' para reflejar mejor בֹּאוּ; 'su Dios' a 'vuestro Dios' para preservar la segunda persona y la distinción teológica documentada con 'mi Dios'; y la cláusula pasiva a 'han sido retenidas' para concordar naturalmente con el sujeto compuesto. También se ajusta 'aullad' a 'gemid' por mejor español eclesial, y se emplean 'ofrenda de grano' / 'ofrenda de bebida' por mayor claridad sin perder el sentido cultual. Se añaden notas que reflejan las alternativas preservadas en el inglés auditado y la literalidad de 'casa'.
