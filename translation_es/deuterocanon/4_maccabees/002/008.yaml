base_translation:
  language: en
  yaml_path: translation/deuterocanon/4_maccabees/002/008.yaml
  text: Therefore[a], even if someone is money-loving, by living according to the law he constrains his own way, lending to those in need without interest, and when the seventh year comes[b], canceling the debt.
  footnotes:
  - marker: a
    text: Literally, 'when the sevens/weeks arrive,' an allusion to the law's cycle of debt release in the seventh year.
    reason: cross_reference
  - marker: b
    text: Or 'suffering loss on the loan'; the Greek participle can emphasize bearing the financial loss involved in remitting the debt.
    reason: lexical_alternative
