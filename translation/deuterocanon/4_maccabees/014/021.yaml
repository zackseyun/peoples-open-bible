id: 4MA.14.21
reference: 4 Maccabees 14:21
source:
  edition: lxx-swete-1909
  text: Ὦ λογισμὲ τέκνων παθῶν τύραννε, καὶ εὐσέβεια μητρὶ τέκνων ποθεινοτέρα.
  language: Greek
