review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general la estructura y el sentido del hebreo, pero contiene varios problemas de fidelidad y naturalidad: «han causado problemas en mí» no corresponde bien a עֲכַרְתֶּם אֹתִי, «Como soy pocos» rompe la concordancia, y «haciéndome hediondo» suena poco natural como predicado causativo en español. También «mi casa» queda más estrecho que בֵּיתִי en este contexto, donde la unidad doméstica/familiar está en vista.'
  spanish_quality_summary: 'La redacción actual es comprensible, pero varias expresiones suenan forzadas o incorrectas en español bíblico natural: «problemas en mí», «soy pocos», y el anclaje de notas a palabras separadas produce confusión. Conviene una formulación más idiomática y digna, conservando la imagen literal de «hacer apestar/hediondo» mediante una construcción española natural.'
  glossary_alignment: 'No hay términos del glosario de alto impacto teológico involucrados. Sí importa mantener las decisiones léxicas auditadas: עכר como «causar/traer problemas sobre alguien», באש con imagen literal y nota idiomática, מתי מספר como «pocos en número», נֶאֶסְפוּ como reunión hostil, y בֵּיתִי mejor como «mi casa» solo si el español no pierde el sentido de household; aquí «mi familia» o «los de mi casa» es más claro. Se prefiere conservar el etnónimo tradicional «ferezeos» o el más transparente «perizitas»; el borrador ya documenta «ferezeos».'
  issues:
  - severity: high
    issue: «han causado[b] problemas[a] en mí» traduce mal עֲכַרְתֶּם אֹתִי
    rationale: La preposición «en» es incorrecta; el hebreo expresa que han traído problemas sobre Jacob. Además, las notas a y b están invertidas respecto a las decisiones auditadas y crean una lectura extraña.
  - severity: high
    issue: «Como soy pocos en número» tiene concordancia incorrecta
    rationale: Jacob habla en primera persona singular; en español debe ser «como somos pocos en número» si incluye su casa, o mejor «como somos pocos»/«puesto que somos pocos en número» para reflejar el sentido colectivo implícito.
  - severity: medium
    issue: «haciéndome hediondo» es poco natural en español
    rationale: Aunque preserva el literalismo, en español suena como cambio de cualidad física más que de reputación. «haciendo que yo apeste» conserva la imagen literal con mejor naturalidad; las alternativas idiomáticas pueden quedar en nota.
  - severity: medium
    issue: «me golpearán» es demasiado físico y algo débil en contexto militar
    rationale: וְהִכּוּנִי en este contexto hostil se expresa mejor como «me atacarán» o «me derribarán». «Me atacarán» es más natural y suficientemente fiel sin exagerar.
  - severity: medium
    issue: «mi casa» puede sonar al edificio más que al household
    rationale: Aunque posible, aquí Jacob teme por su unidad doméstica. «mi familia» o «los de mi casa» comunica mejor el alcance de בֵּיתִי en español contemporáneo legible para iglesia.
