revisions:
- from: Entonces Jonatán se quitó el manto que llevaba puesto y se lo dio a David[a], con su vestidura[b], su espada, su arco y su cinturón.
  to: Entonces Jonatán se quitó el manto que llevaba puesto y se lo dio a David, junto con su armadura[a], e incluso su espada, su arco y su cinturón.
  rationale: Se corrige el anclaje de la nota para que recaiga sobre el término pertinente, se alinea el texto principal con la decisión léxica inglesa de privilegiar el contexto militar de וּמַדָּיו, se conservan las alternativas semánticas en una sola nota clara, y se añade 'e incluso' para reflejar mejor el valor acumulativo de עַד sin volver la frase rígida en español.
