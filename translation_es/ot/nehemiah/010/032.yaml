translation:
  language: es
  text: En cuanto a los pueblos de la tierra que traen mercancías y todo grano en día de sábado para vender, no les compraremos en sábado ni en día santo; y dejaremos el séptimo año y toda deuda[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda reclamación» o «toda exacción»; la frase hebrea dice literalmente «la carga/exacción de toda mano».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמֵּי הָאָרֶץ
  english_pob_choice: the peoples of the land
  chosen_spanish: los pueblos de la tierra
  alternatives_spanish:
  - el pueblo de la tierra
  - los pueblos del país
  lexicon: HALOT
  rationale: Se conserva el plural עַמֵּי y la expresión fija con הָאָרֶץ sin reducirla a un singular colectivo. «De la tierra» refleja de manera natural la fórmula hebrea y mantiene el contraste con Judá.
- source_word: הַמְבִיאִים
  english_pob_choice: who bring
  chosen_spanish: que traen
  alternatives_spanish:
  - que están trayendo
  lexicon: HALOT
  rationale: El participio atributivo describe a esos pueblos por su acción habitual. En español, el presente simple comunica bien esa caracterización sin sobrecargar la frase.
- source_word: הַמַּקָּחוֹת
  english_pob_choice: goods
  chosen_spanish: mercancías
  alternatives_spanish:
  - bienes
  - productos
  - géneros
  lexicon: HALOT
  rationale: El término hebreo apunta a artículos de comercio. «Mercancías» es claro, natural y suficientemente amplio para el contexto mercantil.
- source_word: שֶׁבֶר
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - grano de cereal
  - cereal
  lexicon: HALOT
  rationale: En contexto comercial, שֶׁבֶר suele referirse a grano como mercancía básica. «Grano» conserva esa precisión sin volver la frase técnica o extraña.
- source_word: בְּיוֹם הַשַּׁבָּת ... לִמְכּוֹר
  english_pob_choice: on the Sabbath day to sell
  chosen_spanish: en el día de sábado para vender
  alternatives_spanish:
  - en sábado para vender
  - el día de reposo para vender
  lexicon: HALOT
  rationale: Se preserva la relación temporal y el propósito de venta. «Día de sábado» sigue de cerca la estructura hebrea y es comprensible en español bíblico contemporáneo.
- source_word: לֹא נִקַּח מֵהֶם
  english_pob_choice: we will not buy from them
  chosen_spanish: no compraremos de ellos
  alternatives_spanish:
  - no tomaremos de ellos
  - no les compraremos
  lexicon: HALOT
  rationale: Aunque לקח puede significar «tomar», aquí el contexto comercial hace que «comprar» sea la equivalencia más fiel al sentido. «De ellos» mantiene el origen de la mercancía, aunque «les compraremos» sería otra posibilidad idiomática.
- source_word: וּבְיוֹם קֹדֶשׁ
  english_pob_choice: or on a holy day
  chosen_spanish: ni en día santo
  alternatives_spanish:
  - o en día santo
  - ni en una fiesta santa
  lexicon: HALOT
  rationale: Después de la prohibición principal, «ni» expresa naturalmente la extensión de la negativa. «Día santo» traduce de forma transparente יום קֹדֶשׁ sin imponer una festividad específica.
- source_word: וְנִטֹּשׁ
  english_pob_choice: we will forego
  chosen_spanish: dejaremos pasar
  alternatives_spanish:
  - dejaremos descansar
  - abandonaremos
  lexicon: HALOT
  rationale: El verbo comunica renuncia o desistimiento. «Dejaremos pasar» funciona bien en español para expresar la observancia de no ejercer un derecho o no continuar con una práctica, sin decidir demasiado pronto el matiz agrícola o jurídico.
- source_word: הַשָּׁנָה הַשְּׁבִיעִית
  english_pob_choice: the seventh year
  chosen_spanish: el séptimo año
  alternatives_spanish:
  - el año séptimo
  - el año sabático
  lexicon: HALOT
  rationale: Se ofrece una traducción directa del hebreo. «Séptimo año» deja al contexto la identificación con el año sabático, sin sustituirla por un término interpretativo en el texto principal.
- source_word: מַשָּׁא כָל יָד
  english_pob_choice: every debt
  chosen_spanish: toda deuda
  alternatives_spanish:
  - toda reclamación
  - todo gravamen
  - la carga de toda mano
  lexicon: HALOT
  rationale: La expresión hebrea es breve y discutida; en el contexto de la legislación del año sabático, «toda deuda» comunica bien la probable referencia jurídico-económica. Se conserva la tensión interpretativa en la nota.
theological_decisions:
- issue: Alcance del compromiso en el séptimo año
  english_pob_reading: The verse includes both letting the seventh year lie fallow and remitting debts/claims, rendered succinctly as 'we will forego the seventh year and every debt.'
  chosen_spanish_reading: El texto compromete a dejar pasar el séptimo año y a remitir toda deuda.
  alternative_spanish_readings:
  - dejaremos descansar el séptimo año y toda reclamación
  - dejaremos el séptimo año y toda exacción
  rationale: 'La formulación española mantiene juntos los dos elementos: la renuncia asociada al séptimo año y la cancelación de la carga económica. «Toda deuda» sigue la lectura probable sin borrar que el hebreo es idiomático y debatido.'
  doctrine_reference: Deuteronomio 15; Levítico 25; principio de conservar ambigüedad genuina en cláusulas legales difíciles.
translation_notes:
  revision_awareness: La base inglesa POB mantiene la ambigüedad final con una nota; el español sigue esa línea, conservando una traducción principal clara («toda deuda») y una nota que deja abiertas las alternativas léxicas del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; aquí no ocurre.
  - Se mantuvo «día de sábado» en correspondencia con el patrón hebreo y con el valor de observancia, no como mera designación semanal moderna.
  - Se conservó el matiz legal-económico del cierre sin forzar una lectura dogmática adicional.
