translation:
  language: es
  text: Todo ser que se mueve y que está vivo les servirá de alimento. Como les di[a] las plantas verdes, les he dado todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Todo ser que se arrastra y vive». El sustantivo hebreo רֶמֶשׂ suele referirse a criaturas que se arrastran o se mueven en grupo, pero aquí probablemente funciona de manera amplia en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: Every
  chosen_spanish: Todo
  alternatives_spanish:
  - Cada
  - Todo ser
  lexicon: HALOT
  rationale: El hebreo usa כָּל de modo distributivo con רֶמֶשׂ en singular; en español, «Todo» expresa bien el alcance total sin sonar forzado. «Cada» sería más idiomático en algunos contextos, pero aquí el sentido colectivo y totalizante queda mejor con «Todo».
- source_word: רֶמֶשׂ
  english_pob_choice: moving thing
  chosen_spanish: ser que se mueve
  alternatives_spanish:
  - creatura que se arrastra
  - ser que se arrastra
  - animal que se mueve
  lexicon: HALOT
  rationale: El término puede referirse a seres que se mueven cerca del suelo o que se desplazan con movimiento reptante/aglomerado. «Ser que se mueve» conserva la amplitud del inglés POB («moving thing») sin restringir indebidamente a «reptantes» o «arrastrándose».
- source_word: אֲשֶׁר הוּא חַי
  english_pob_choice: that is alive
  chosen_spanish: que está vivo
  alternatives_spanish:
  - que vive
  - viviente
  lexicon: HALOT
  rationale: La cláusula relativa califica a רֶמֶשׂ y distingue criaturas vivas de cadáveres. «Que está vivo» es claro, natural y conserva el valor adjetival de חַי.
- source_word: לָכֶם יִהְיֶה לְאָכְלָה
  english_pob_choice: shall be food for you
  chosen_spanish: les servirá de alimento
  alternatives_spanish:
  - será alimento para ustedes
  - les será para alimento
  - será comida para ustedes
  lexicon: HALOT
  rationale: En español, la construcción con «servir de alimento» comunica de modo natural la idea de provisión/comida permitida. Mantiene el valor del predicado sin caer en una literalidad torpe como «será para alimento».
- source_word: כְּיֶרֶק עֵשֶׂב
  english_pob_choice: As I gave you the green plants
  chosen_spanish: Como les di las plantas verdes
  alternatives_spanish:
  - Como les di la vegetación verde
  - Como les di los vegetales verdes
  - Como les di la hierba verde
  lexicon: HALOT
  rationale: La expresión alude a la vegetación/crecimiento vegetal dado previamente como alimento. «Plantas verdes» conserva la imagen y es comprensible en español moderno; evita el arcaísmo de «hierba» o la ambigüedad de «vegetación».
- source_word: נָתַתִּי
  english_pob_choice: I have given
  chosen_spanish: he dado
  alternatives_spanish:
  - di
  - les di
  lexicon: HALOT
  rationale: El perfecto hebreo puede expresar un acto ya realizado con vigencia presente. «He dado» refleja bien la concesión ya efectuada y en vigor; se mantiene la correspondencia con la formulación del inglés POB.
- source_word: אֶת כֹּל
  english_pob_choice: everything
  chosen_spanish: todo se lo he dado
  alternatives_spanish:
  - les he dado todo
  - se lo he dado todo
  - todo lo he dado
  lexicon: HALOT
  rationale: El objeto totalizador כֹּל exige una expresión global. «Todo se lo he dado» suena natural en español y preserva la fuerza inclusiva de «everything».
theological_decisions:
- issue: Alcance del permiso alimentario tras el diluvio
  english_pob_reading: A universal grant of animal life for human food is expressed without narrowing it to only certain classes of animals in this verse.
  chosen_spanish_reading: El versículo expresa una concesión amplia de seres vivientes como alimento humano, sin reducirla solo a una clase estrecha de animales.
  alternative_spanish_readings:
  - Solo se refiere a animales pequeños o reptantes por el sentido de רֶמֶשׂ.
  - Limita el permiso a criaturas que se arrastran.
  rationale: Aunque רֶמֶשׂ puede denotar criaturas que se arrastran o se mueven cerca del suelo, el contexto favorece una declaración amplia, reforzada por «todo se lo he dado». La traducción preserva esa amplitud y no estrecha artificialmente el alcance del permiso.
  doctrine_reference: Génesis 9:3; coherencia contextual con la provisión divina posterior al diluvio
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó con alto grado de acuerdo entre las evaluaciones, con solo observaciones menores. Se mantiene la decisión de traducir רֶמֶשׂ de forma amplia y no restrictiva, junto con un español natural para la concesión alimentaria.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en la primera persona divina del versículo, sin sustituirlo por un título eclesiástico.
  - «He dado» se conserva para reflejar el perfecto con vigencia presente; no se simplifica a pretérito simple.
  - La nota a pie marca la alternativa lexical sin alterar el texto principal.
  - La frase principal evita el calco rígido, pero conserva el paralelismo semántico del hebreo.
