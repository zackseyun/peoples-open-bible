translation:
  language: es
  text: Pídeme, y yo te daré las naciones como tu herencia, y los confines[a] de la tierra como tu posesión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las partes más lejanas de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאַל
  english_pob_choice: Ask
  chosen_spanish: Pídeme
  alternatives_spanish:
  - Pide
  - Solicítame
  lexicon: HALOT
  rationale: El imperativo de שׁאל pide una solicitud directa. En español, «Pídeme» conserva el tono breve y mandatorio del hebreo y suena natural en un registro solemne.
- source_word: מִמֶּנִּי
  english_pob_choice: of me
  chosen_spanish: me
  alternatives_spanish:
  - de mí
  lexicon: HALOT
  rationale: Con el verbo pedir, el complemento es idiomático en español como objeto indirecto («pídeme»). «De mí» sería más literal, pero menos natural y menos ajustado al giro solicitado en este contexto.
- source_word: וְאֶתְּנָה
  english_pob_choice: and I will give
  chosen_spanish: y yo te daré
  alternatives_spanish:
  - y daré
  - y te daré
  lexicon: HALOT
  rationale: La forma volitiva/promisoria se vierte de modo natural como promesa futura. Se explicita «yo» para hacer claro el sujeto divino en español y se mantiene el destinatario con «te».
- source_word: גּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - naciones
  - los pueblos
  lexicon: HALOT
  rationale: «Las naciones» reproduce el valor colectivo-político de גוים sin introducir la carga eclesiástica o étnica que a veces sugiere «gentiles».
- source_word: נַחֲלָתֶךָ
  english_pob_choice: as your inheritance
  chosen_spanish: como tu herencia
  alternatives_spanish:
  - como tu heredad
  - como tu posesión heredada
  lexicon: HALOT
  rationale: נחלה designa una herencia asignada. «Herencia» mantiene la relación posesiva y el eco de heredad pactal sin sobrerreformular.
- source_word: וַאֲחֻזָּתְךָ
  english_pob_choice: as your possession
  chosen_spanish: como tu posesión
  alternatives_spanish:
  - como tu propiedad
  - como tu tenencia
  lexicon: HALOT
  rationale: אֲחֻזָּה indica una posesión o tenencia. «Posesión» conserva el paralelismo con «herencia» y el doble matiz de derecho y dominio.
- source_word: אַפְסֵי אָרֶץ
  english_pob_choice: the ends of the earth
  chosen_spanish: los confines de la tierra
  alternatives_spanish:
  - los extremos de la tierra
  - las partes más lejanas de la tierra
  lexicon: HALOT
  rationale: La expresión idiomática se vierte con una fórmula española natural y solemne. «Confines» preserva la idea de límite/extensión sin perder el carácter proverbial del hebreo.
theological_decisions:
- issue: Alcance real y mesiánico de la promesa
  english_pob_reading: Translate the verse straightforwardly as a divine promise to the king/son without making the messianic interpretation explicit in the wording.
  chosen_spanish_reading: Traducirlo como una promesa divina directa al rey/hijo, sin explicitar en la redacción la lectura mesiánica posterior.
  alternative_spanish_readings:
  - hacer explícita una paráfrasis mesiánica
  - usar «Cristo» en el texto principal
  rationale: El hebreo presenta una promesa de dominio universal al destinatario. La traducción conserva esa apertura interpretativa y no resuelve en el texto principal una tensión que el propio salmo deja abierta; la lectura cristológica queda para la recepción canónica, no para la redacción base.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción principal.
translation_notes:
  revision_awareness: El texto inglés auditado no requería revisiones posteriores; se mantiene la misma lectura básica y se adapta al español con equivalencia óptima, cuidando el paralelismo poético y el registro solemne.
  spanish_consistency_notes:
  - Se prefirió «las naciones» para גוים, en línea con el valor semántico colectivo del hebreo.
  - Se evitó «SEÑOR» y «Cristo» porque no aparecen en este verso y el audit trail pide no imponer interpretaciones no explicitadas.
  - «Confines de la tierra» conserva la idiomaticidad española del hebraísmo final sin volverlo una paráfrasis excesiva.
