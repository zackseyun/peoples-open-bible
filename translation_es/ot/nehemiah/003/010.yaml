    issue: «trabajó» para הֶחֱזִיק
    rationale: El hebreo en Nehemías 3 no describe solo actividad general, sino participación en reparar/reconstruir una sección. «Trabajó» pierde especificidad y se aparta del razonamiento léxico documentado por el POB.
  - severity: low
    issue: Nota al pie con «en frente de»
    rationale: Aunque comprensible, «en frente de» es menos elegante y menos recomendable en español cuidado que «delante de» como alternativa a «frente a».
  revised_spanish_text: Junto a ellos hizo reparaciones Jedaías hijo de Harumaf, frente a su casa[a], y junto a él hizo reparaciones Hatús hijo de Hasabnías.
  revised_footnotes:
