translation:
  language: es
  text: 'Y me dijeron[a]: «El remanente allí en la provincia, los que sobrevivieron del cautiverio, están en gran calamidad y en oprobio[b]; y el muro de Jerusalén está derribado, y sus puertas han sido quemadas por fuego».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del exilio». La frase hebrea puede traducirse «del cautiverio» o «del exilio».
    reason: lexical_alternative
  - marker: b
    text: O «en gran angustia y oprobio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ לִי
  english_pob_choice: And they said to me
  chosen_spanish: Y me dijeron
  alternatives_spanish:
  - Entonces me dijeron
  lexicon: WLC; HALOT
  rationale: El hebreo narrativo introduce el informe de forma directa. «Y me dijeron» conserva el encadenamiento simple sin añadir una inferencia temporal que el texto no exige.
- source_word: הַנִּשְׁאָרִים / נִשְׁאֲרוּ
  english_pob_choice: the remnant ... who survived
  chosen_spanish: Los que quedaron, los sobrevivientes
  alternatives_spanish:
  - el remanente ... que sobrevivió
  - los restantes ... que quedaron
  lexicon: WLC; HALOT
  rationale: La repetición de la raíz שׁאר señala a los que quedaron después de la catástrofe. En español, «los que quedaron» y «los sobrevivientes» reproducen ese doble énfasis sin forzar una sola etiqueta teológica donde el hebreo aún es descriptivo.
- source_word: מִן הַשְּׁבִי
  english_pob_choice: the captivity
  chosen_spanish: del cautiverio
  alternatives_spanish:
  - del exilio
  - de la deportación
  lexicon: WLC; HALOT
  rationale: La expresión puede referirse al estado de cautiverio o al exilio. «Cautiverio» mantiene el valor nominal del hebreo y encaja con el contexto histórico de los retornados; la nota conserva la alternativa «exilio».
- source_word: בַּמְּדִינָה
  english_pob_choice: in the province
  chosen_spanish: en la provincia
  alternatives_spanish:
  - en el distrito
  lexicon: WLC; HALOT
  rationale: En el periodo persa, מְדִינָה designa una unidad administrativa. «Provincia» es el equivalente más claro y reconocible en español contemporáneo.
- source_word: בְּרָעָה גְדֹלָה
  english_pob_choice: in great trouble
  chosen_spanish: en gran calamidad
  alternatives_spanish:
  - en gran angustia
  - en gran aflicción
  - en gran miseria
  lexicon: WLC; HALOT
  rationale: רָעָה aquí no es maldad moral, sino una situación de desastre o aflicción severa. «Calamidad» comunica bien la gravedad del estado; «gran calamidad» preserva el adjetivo intensificador del hebreo.
- source_word: וּבְחֶרְפָּה
  english_pob_choice: and disgrace
  chosen_spanish: y en oprobio
  alternatives_spanish:
  - y en deshonra
  - y en vergüenza
  - y en afrenta
  lexicon: WLC; HALOT
  rationale: חֶרְפָּה expresa vergüenza pública y deshonra social. «Oprobio» mantiene ese peso de reproche visible y puede funcionar como equivalente más formal de «disgrace».
- source_word: חוֹמַת יְרוּשָׁלִַם
  english_pob_choice: the wall of Jerusalem
  chosen_spanish: el muro de Jerusalén
  alternatives_spanish:
  - la muralla de Jerusalén
  lexicon: WLC; HALOT
  rationale: Aunque «muralla» también es natural, «muro» sigue de cerca el término singular del hebreo y corresponde al uso habitual de la serie tradicional en este pasaje. Se evita suavizar la imagen arquitectónica.
- source_word: מְפֹרָצֶת
  english_pob_choice: is broken down
  chosen_spanish: está derribado
  alternatives_spanish:
  - está roto
  - está abierto en brechas
  - está destruido
  lexicon: WLC; HALOT
  rationale: El participio indica una estructura quebrada o abierta en brechas. «Derribado» comunica ruina visible y conserva el estado resultante que el inglés POB expresa con «broken down».
- source_word: וּשְׁעָרֶיהָ נִצְּתוּ בָאֵשׁ
  english_pob_choice: and its gates have been burned with fire
  chosen_spanish: y sus puertas han sido quemadas a fuego
  alternatives_spanish:
  - y sus puertas fueron quemadas con fuego
  - y sus puertas han sido incendiadas
  lexicon: WLC; HALOT
  rationale: 'La construcción hebrea es enfática: el incendio es el medio de destrucción. «Han sido quemadas a fuego» conserva la formulación casi literal y la relación instrumental del hebreo, como en la auditoría inglesa.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta versión mantiene alta concordancia con el texto fuente y con la auditoría inglesa, preservando las alternativas léxicas documentadas sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «cautiverio» en el texto principal y se documenta «exilio» en nota, siguiendo la ambigüedad reconocida por la auditoría inglesa.
  - «Oprobio» se elige por su fuerza de deshonra pública, en línea con el valor social de חֶרְפָּה.
  - No se introduce terminología eclesiástica adicional; el pasaje conserva un registro histórico y descriptivo.
