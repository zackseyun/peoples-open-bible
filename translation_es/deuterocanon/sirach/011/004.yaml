- from: No hagas burla[a] de un hombre pobre, ni te engrías en días amargos.
  to: No te burles de un hombre pobre,[a] ni te jactes en días amargos.
  rationale: Se ajusta el primer verbo a una formulación más idiomática en español ('no te burles de') y el segundo a una equivalencia más precisa de autogloria ('no te jactes'). También se naturaliza la redacción de la nota textual griega sin alterar su sentido. No se requiere adjudicación adicional porque son mejoras de estilo y precisión léxica, no un caso doctrinal ni de incertidumbre textual irresoluble.
