review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la secuencia hebrea y preserva la distinción entre וַיִּגְוַע ('exhaló su último aliento') y וַיָּמָת ('murió'). También mantiene adecuadamente la fórmula ambigua 'fue reunido con su pueblo' y conserva la estructura final sobre el entierro por Esaú y Jacob. La nota al pie refleja bien las alternativas documentadas en el rastro inglés.
  spanish_quality_summary: La redacción es generalmente clara y fiel, pero 'viejo' suena algo brusco o poco digno en una nota mortuoria patriarcal; 'anciano' o 'ya anciano' resulta más natural y eclesial sin perder el sentido. Además, 'lleno de días' es comprensible, pero en español bíblico-natural 'colmado de días' suena más idiomático y digno que un calco más rígido. Son ajustes menores de estilo y naturalidad, no de sentido.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. ''Esaú'', ''Jacob'', ''murió'', y ''fue reunido con su pueblo'' están bien alineados. La decisión principal a corregir es estilística: evitar ''viejo'' en favor de ''anciano'' y preferir ''colmado de días'' para una mejor realización del modismo hebreo en español.'
  issues:
  - severity: medium
    issue: Uso de 'viejo' para זָקֵן
    rationale: Aunque semánticamente correcto, en español neutral eclesial 'viejo' puede sonar áspero o poco digno en un obituario patriarcal. 'Anciano' preserva mejor el tono elevado y la legibilidad.
  - severity: low
    issue: '''lleno de días'' suena algo calcado'
    rationale: El hebraísmo debe preservarse, pero 'colmado de días' comunica el modismo de manera más natural y literaria en español bíblico sin aplanarlo.
  revised_spanish_text: Entonces Isaac exhaló su último aliento y murió[a], y fue reunido con su pueblo, anciano y colmado de días. Y Esaú y Jacob, sus hijos, lo enterraron.
  revised_footnotes:
