    rationale: «Por su razonamiento» refleja bien el inglés auditado y la idea de חשבון. Alternativas como «según su razonamiento» o «por su modo de pensar» podrían sonar más idiomáticas, pero «por su razonamiento» conserva mejor la concisión y el matiz evaluativo.
  revised_spanish_text: Una vasija de alfarero se prueba en un horno, y así un hombre por su razonamiento.
  revision_rationale: Se corrige el versículo para alinearlo con la revisión aplicada del POB inglés, que sustituyó la lectura exhortativa griega por la imagen hebrea del horno y la prueba del hombre. «Vasija de alfarero» reproduce con naturalidad כלי יוצר; «se prueba en un horno» expresa la idea de examen en el fuego; y «por su razonamiento» conserva el valor de חשבון sin paraprasear en exceso.
