lexical_decisions:
- source_word: וְ/אַרְבַּע
  english_pob_choice: And four
  chosen_spanish: Y cuatro
  alternatives_spanish:
  - Entonces cuatro
  lexicon: HALOT
  rationale: La conjunción con el numeral introduce la siguiente escena de visión de manera simple. 'Y cuatro' preserva la conexión sin añadir una relación temporal que el hebreo no exige.
- source_word: חֵיוָן
  english_pob_choice: beasts
  chosen_spanish: bestias
  alternatives_spanish:
  - criaturas vivientes
  - animales
  lexicon: HALOT
  rationale: En el contexto apocalíptico de Daniel, el término designa seres monstruosos con carga simbólica política. 'Bestias' comunica mejor ese sentido ominoso que una opción neutral.
- source_word: רַבְרְבָן
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - grandes y poderosas
  - enormes
  lexicon: HALOT
  rationale: El adjetivo expresa tamaño o grandeza. 'Grandes' es natural en español y mantiene el valor descriptivo sin exagerar más allá del texto.
- source_word: סָלְקָן
  english_pob_choice: were coming up
  chosen_spanish: subían
  alternatives_spanish:
  - subían hacia arriba
  - ascendían
  lexicon: HALOT
  rationale: La forma verbal presenta el movimiento ascendente en la visión. 'Subían' conserva la imagen de ascenso con fluidez en español.
- source_word: מִן יַמָּא
  english_pob_choice: from the sea
  chosen_spanish: del mar
  alternatives_spanish:
  - desde el mar
  - fuera del mar
  lexicon: HALOT
  rationale: Aunque el inglés opta por 'sea', en español 'mar' es la correspondencia natural y digna para el elemento acuático de la visión. La preposición indica procedencia.
- source_word: שָׁנְיָן
  english_pob_choice: different
  chosen_spanish: distintas
  alternatives_spanish:
  - diferentes
  - diversas
  lexicon: HALOT
  rationale: El término expresa diferencia o alteridad entre las bestias. 'Distintas' es claro y mantiene la comparación recíproca.
- source_word: דָּא מִן דָּא
  english_pob_choice: from one another
  chosen_spanish: la una de la otra
  alternatives_spanish:
  - una de otra
  - entre sí
  lexicon: HALOT
  rationale: El hebreo arameizado expresa diferenciación mutua. 'La una de la otra' es una fórmula idiomática precisa y elegante en español.
theological_decisions:
- issue: Carga simbólica de חֵיוָן en un contexto apocalíptico
  english_pob_reading: Rendered as 'beasts' rather than a neutral zoological term
  chosen_spanish_reading: '''bestias'''
  alternative_spanish_readings:
  - criaturas vivientes
  - animales
  rationale: Mantiene el tono apocalíptico y la fuerza simbólica del pasaje, sin suavizarlo con un término más neutro.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve the plain apocalyptic force of the text.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al texto con el marcador [l] y evitando notas huérfanas. La redacción sigue el sentido del original arameo con apoyo en el audit trail inglés.
  spanish_consistency_notes:
  - Se prefirió 'mar' en vez de 'sea' por naturalidad del español, sin alterar la fuente.
  - '''Bestias'' conserva el registro apocalíptico del pasaje.'
  - Se mantuvo la relación mutua con 'la una de la otra' para reflejar דָּא מִן דָּא.
