translation:
  language: es
  text: Porque a tus siervos[a] les agradan sus piedras, y muestran favor a su polvo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tus esclavos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se compadecen de su polvo».'
