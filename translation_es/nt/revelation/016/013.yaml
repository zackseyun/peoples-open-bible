review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: Juan ve tres espíritus inmundos, comparados con ranas, procedentes de la boca del dragón, la bestia y el falso profeta. La reestructuración española es fiel al orden de sentido aunque no al orden superficial griego, en línea con el POB inglés. Sin embargo, la nota al pie alternativa no ofrece realmente la alternativa documentada, porque repite casi exactamente el texto principal en vez de mostrar la opción más literal con las frases de origen antes de «tres espíritus inmundos».'
  spanish_quality_summary: El español principal es claro, natural y eclesialmente legible. «Inmundos» funciona bien para ἀκάθαρτα y «que salían de la boca de» expresa con claridad la procedencia implícita. La única reparación necesaria es la redacción de la nota al pie para que sea idiomática y corresponda al motivo indicado.
  glossary_alignment: 'No hay conflicto con los términos del proyecto: «dragón», «bestia», «falso profeta», «espíritus», y «inmundos» están bien elegidos. No aparece terminología sensible como Yahvé/Mesías. La decisión de no añadir «demoníacos» en el texto principal concuerda con la justificación teológica auditada.'
  issues:
  - severity: medium
    issue: La nota al pie alternativa está mal formulada y no representa la alternativa del POB inglés.
    rationale: El POB inglés preserva como alternativa una formulación más literal con las frases «de la boca de...» antes de «tres espíritus inmundos». La nota española actual repite sustancialmente el texto principal y por eso no documenta la diferencia de orden/sintaxis que pretende explicar.
  revised_spanish_text: Y vi tres espíritus inmundos[a] como ranas que salían de la boca del dragón, de la boca de la bestia y de la boca del falso profeta.
  revised_footnotes:
  - marker: a
    text: 'O: «de la boca del dragón, de la boca de la bestia y de la boca del falso profeta vi tres espíritus inmundos como ranas». El griego coloca las frases repetidas de origen antes de «tres espíritus inmundos».'
    reason: lexical_alternative
  revision_rationale: El texto principal puede conservarse. Se corrige únicamente la nota al pie para que exprese la alternativa real documentada por el POB inglés y explique con precisión el orden griego.
