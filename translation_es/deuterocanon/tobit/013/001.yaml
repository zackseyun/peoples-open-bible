translation:
  language: es
  text: 'Entonces Tobit escribió una oración de alegría y dijo[a]: «Bendito es el Dios viviente por los siglos, y su reino».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego termina abruptamente con «y su reino». Algunas traducciones añaden un predicado implícito, como «es bendito», o unen la frase con «por los siglos». Se conserva aquí la formulación breve para no introducir más de lo que el original dice explícitamente.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔγραφεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - compuso
  - redactó
  lexicon: LSJ
  rationale: El imperfecto de γράφω introduce una oración puesta por escrito. «Escribió» es la forma más directa y natural en español; «compuso» añade un matiz literario que no exige el griego.
- source_word: προσευχὴν
  english_pob_choice: a prayer
  chosen_spanish: una oración
  alternatives_spanish:
  - una plegaria
  - una oración de súplica
  lexicon: LSJ
  rationale: προσευχή aquí designa una oración dirigida a Dios. «Oración» es fiel y natural en español bíblico; «plegaria» también sería posible, pero no aporta una precisión mayor.
- source_word: εἰς ἀγαλλίασιν
  english_pob_choice: of rejoicing
  chosen_spanish: de alegría
  alternatives_spanish:
  - de regocijo
  - con exultación
  lexicon: LSJ
  rationale: La frase caracteriza la clase o tono de la oración. «De alegría» conserva el sentido celebrativo sin sobrecargarlo; «de regocijo» es válido pero algo más marcado, y «con exultación» interpreta más la construcción.
- source_word: Εὐλογητὸς
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Alabado
  - Bendito sea
  lexicon: LSJ
  rationale: En una fórmula doxológica, «Bendito» reproduce bien la exclamación bíblica y la alabanza dirigida a Dios. «Bendito sea» sería una expansión verbal que el griego no expresa explícitamente.
- source_word: ὁ θεὸς ὁ ζῶν
  english_pob_choice: the living God
  chosen_spanish: el Dios viviente
  alternatives_spanish:
  - el Dios que vive
  - el Dios vivo
  lexicon: LSJ
  rationale: «El Dios viviente» es la equivalencia bíblica más estable y natural para ὁ θεὸς ὁ ζῶν. Mantiene el rasgo atributivo sin forzar una paráfrasis.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: LSJ
  rationale: La expresión griega de duración continua se puede verter con «por los siglos», que es solemne y fiel. Se prefirió esta forma porque conserva mejor el plural temporal del griego que «para siempre».
- source_word: βασιλεία
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - soberanía
  lexicon: LSJ
  rationale: En este contexto doxológico, «reino» es la correspondencia más directa y tradicional para βασιλεία. «Reinado» o «soberanía» aclaran la idea de ejercicio de gobierno, pero cambian el sustantivo base.
theological_decisions:
- issue: 'Construcción final elíptica: καὶ ἡ βασιλεία αὐτοῦ'
  english_pob_reading: 'Render as an elliptical doxological continuation: ''and his kingdom.'''
  chosen_spanish_reading: 'Mantener la clausula elíptica: «y su reino».'
  alternative_spanish_readings:
  - y su reino es bendito
  - y su reino vive por los siglos
  - y bendito sea su reino
  rationale: El griego termina de manera abrupta y no presenta verbo ni predicado explícito. En español conviene conservar esa concisión doxológica, sin añadir una predicación que el texto no formula. Así se preserva la tensión textual señalada por la POB inglesa.
  doctrine_reference: Preservar la tensión teológica/textual en lugar de resolverla interpretativamente.
translation_notes:
  revision_awareness: El texto base muestra alta concordancia con el control inglés y no requiere ajustes mayores; se mantuvo la clausula final breve para respetar la elipsis del griego y la nota auditada de la POB.
  spanish_consistency_notes:
  - Se usó «Dios viviente» para ὁ θεὸς ὁ ζῶν, siguiendo la equivalencia bíblica estable y evitando una paráfrasis.
  - Se prefirió «reino» para βασιλεία, en coherencia con el valor nominal del griego y con el registro doxológico.
  - No se añadió verbo en la cláusula final, para conservar la misma tensión textual documentada en el inglés POB.
