translation:
  language: es
  text: El que le quita a su prójimo el sustento[a] lo está asesinando[b], y el que retiene el salario de un trabajador está derramando sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la subsistencia». El término griego apunta a los medios por los que una persona vive.'
    reason: lexical_alternative
  - marker: b
    text: El texto expresa la equivalencia moral directamente, no solo una comparación con un homicida.
    reason: alternative_reading
lexical_decisions:
- source_word: φονεύων
  english_pob_choice: is murdering
  chosen_spanish: es homicida
  alternatives_spanish:
  - está asesinando
  - está matando
  lexicon: BDAG
  rationale: El participio presente expresa una acción caracterizadora y gnómica. En español, «es homicida» conserva la equivalencia moral directa sin volver forzosamente verbal lo que en griego funciona como predicado. Evita suavizar la fuerza ética del texto.
- source_word: τὸν πλησίον
  english_pob_choice: a neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a un prójimo
  - a su vecino
  lexicon: BDAG
  rationale: πλησίον aquí es el prójimo en sentido ético/social. «Prójimo» comunica mejor ese alcance bíblico que «vecino», y el posesivo «su» fluye naturalmente en español sin cerrar indebidamente el valor general del proverbio.
- source_word: ὁ ἀφαιρούμενος συμβίωσιν
  english_pob_choice: whoever takes away a neighbor’s livelihood
  chosen_spanish: el que le quita ... el sustento
  alternatives_spanish:
  - el que le quita el medio de vivir
  - el que le quita la subsistencia
  lexicon: BDAG
  rationale: ἀφαιρέω es «quitar, arrebatar, privar». συμβίωσις, en este contexto, apunta al medio por el cual alguien vive. «Sustento» transmite de forma natural esa idea de medios de vida y mantiene el paralelismo con el salario retenido.
- source_word: ἐκχέων αἷμα
  english_pob_choice: is shedding blood
  chosen_spanish: está derramando sangre
  alternatives_spanish:
  - derrama sangre
  - está vertiendo sangre
  lexicon: BDAG
  rationale: Es un modismo bíblico de culpabilidad violenta. «Derramando sangre» conserva el giro idiomático y la carga moral del griego.
- source_word: ὁ ἀποστερῶν
  english_pob_choice: whoever withholds
  chosen_spanish: el que retiene
  alternatives_spanish:
  - el que defrauda
  - el que priva
  lexicon: BDAG
  rationale: En relación con salarios, ἀποστερέω puede expresar privar o retener injustamente. «Retiene» es claro en español y mantiene la idea de no entregar lo debido, sin perder el matiz de injusticia del contexto.
- source_word: μισθὸν μισθωτοῦ
  english_pob_choice: a hired worker’s wages
  chosen_spanish: el salario de un trabajador
  alternatives_spanish:
  - el salario de un jornalero
  - la paga de un trabajador contratado
  lexicon: BDAG
  rationale: μισθός es salario/paga y μισθωτός es un trabajador asalariado o contratado. «Trabajador» es amplio y natural; «salario» refleja bien μισθός en español y encaja con el paralelismo económico del versículo.
theological_decisions:
- issue: Equivalencia moral entre privar de sustento o salario y cometer homicidio
  english_pob_reading: Render the statement as a direct moral equivalence rather than softening it into mere comparison.
  chosen_spanish_reading: 'Traducirlo como una afirmación directa: el que quita el sustento ... es homicida; el que retiene el salario ... derrama sangre.'
  alternative_spanish_readings:
  - es como homicida
  - es semejante a un homicida
  rationale: El griego presenta dos participios predicativos en paralelo, sin marca comparativa. Por eso conviene conservar la dureza ética del texto en lugar de rebajarla a mera analogía.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish without flattening theological weight.'
translation_notes:
  revision_awareness: La versión española sigue de cerca el griego de Sirácides 34:23 y conserva la equivalencia moral destacada en el audit trail inglés. No se detectaron revisiones posteriores que alteren la decisión de fondo; el estado final coincide con la lectura revisada más reciente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no lo contiene.
  - Se evita «SEÑOR» y otras sustituciones no requeridas por el texto.
  - «Prójimo», «sustento», «salario» y «derramando sangre» sostienen un registro bíblico claro y contemporáneo.
  - La fraseología conserva el paralelismo económico-moral del original sin introducir una comparación explícita que el griego no marca.
