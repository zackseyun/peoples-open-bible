translation:
  language: es
  text: Porque ustedes no estuvieron allí la primera vez[a], Yahvé nuestro Dios irrumpió contra nosotros[b], porque no lo buscamos conforme a la ordenanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque al principio Yahvé nuestro Dios hizo una brecha contra nosotros». El inicio del hebreo es condensado y también puede implicar que los levitas no participaron en el primer intento de llevar el arca.'
    reason: alternative_reading
  - marker: b
    text: 'O: «porque no lo consultamos conforme a la regla prescrita».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַ בָּרִאשׁוֹנָה
  english_pob_choice: you were not there the first time
  chosen_spanish: ustedes no estuvieron allí la primera vez
  alternatives_spanish:
  - porque al principio
  - porque la primera vez
  - porque ustedes no estaban allí al principio
  lexicon: HALOT
  rationale: La secuencia hebrea es elíptica y depende del contexto inmediato. En español conviene hacer explícita la ausencia de los levitas en el intento anterior, manteniendo el valor causal de la frase temporal inicial sin añadir más de lo que el contexto autoriza.
- source_word: פָּרַץ
  english_pob_choice: broke out against
  chosen_spanish: se desató contra
  alternatives_spanish:
  - irrumpió contra
  - hizo una brecha contra
  - se quebrantó sobre
  lexicon: HALOT
  rationale: En contexto de juicio divino, פרץ expresa un estallido repentino de acción punitiva. ‘Se desató contra’ comunica bien en español la violencia súbita del acto y conserva la relación hostil con el objeto directo/preposicional.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del Nombre divino según la convención del proyecto, evitando la sustitución por un título. ‘Yahvé’ es la forma establecida para el Tetragrámaton en el texto principal.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  lexicon: HALOT
  rationale: Construcción posesiva directa; se conserva el vínculo de pacto y pertenencia sin alterar el sentido.
- source_word: בָּנוּ
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - sobre nosotros
  - entre nosotros
  lexicon: HALOT
  rationale: Con פרץ en un marco de juicio, ‘contra nosotros’ comunica mejor el impacto adverso que una localización neutral.
- source_word: דְרַשְׁנֻהוּ
  english_pob_choice: we did not seek him
  chosen_spanish: no lo buscamos
  alternatives_spanish:
  - no inquirimos de él
  - no lo consultamos
  lexicon: HALOT
  rationale: ‘Buscar’ conserva el alcance religioso-relacional de דרשׁ y suena natural en español. En esta cláusula el verbo no se limita a indagar información, sino a acudir debidamente a Yahvé en la acción cultual.
- source_word: כַּמִּשְׁפָּט
  english_pob_choice: according to the ordinance
  chosen_spanish: conforme al estatuto
  alternatives_spanish:
  - según el mandato
  - de acuerdo con la norma
  - conforme al orden establecido
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí refiere a la disposición prescrita para el traslado del arca. ‘Estatuto’ preserva el matiz normativo/legal en un registro bíblico claro, sin caer en una formulación demasiado técnica.
theological_decisions:
- issue: Frase inicial elíptica y participación de los levitas
  english_pob_reading: The clause is interpreted as referring to the Levites' absence in the first attempt to bring up the ark.
  chosen_spanish_reading: La cláusula se entiende como referencia a la ausencia de los levitas en el primer intento de trasladar el arca.
  alternative_spanish_readings:
  - porque al principio ustedes no eran los encargados
  - porque ustedes no llevaban el arca la primera vez
  rationale: El hebreo es compacto y admite más de una expansión. La versión española explicita la idea de ausencia sin introducir innecesariamente el detalle de ‘llevaban el arca’ en el texto principal, conservando la tensión interpretativa documentada.
  doctrine_reference: Translation philosophy §1, §3
- issue: Naturaleza del acto divino expresado por פרץ
  english_pob_reading: A sudden outbreak of judgment by the LORD against Israel
  chosen_spanish_reading: Una irrupción súbita de juicio de Yahvé contra Israel
  alternative_spanish_readings:
  - una brecha hecha por Yahvé entre nosotros
  - un estallido de Yahvé contra nosotros
  rationale: La expresión debe conservar el peso de la santidad divina y del juicio narrativo, sin neutralizar la severidad del episodio. ‘Se desató contra’ en el texto principal mantiene esa fuerza.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se siguió la lectura auditada del inglés POB como guía de desambiguación del hebreo comprimido, sin copiar mecánicamente su sintaxis. No se detectaron revisiones posteriores en el paquete fuente; la redacción española mantiene la misma decisión interpretativa principal con adaptación idiomática al español.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se mantuvo ‘nuestro Dios’ y ‘contra nosotros’ para preservar el tono de pacto y juicio.
  - ‘Buscar’ se empleó para דרשׁ en sentido cultual-relacional, no como mera consulta informativa.
  - ‘Estatuto’ conserva el matiz prescriptivo de מִשְׁפָּט en este contexto ritual.
