  timestamp: '2026-05-07T21:49:53Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: negación futura de heredar con ellos, referencia al Jordán, y afirmación de que la herencia ya les ha llegado. Sin embargo, dos puntos requieren ajuste. Primero, «más lejos» para וָהָלְאָה suena poco idiomático en este contexto territorial; «más adelante» o «más allá» funciona mejor. Segundo, la nota al pie no preserva la alternativa documentada en inglés, que contrasta «ha venido» con «ha recaído/caído en suerte», no una mera variación preposicional.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «más allá del Jordán y más lejos» resulta algo forzado. Además, «ha venido a nosotros» suena comprensible pero un poco rígido; puede mantenerse por fidelidad, aunque «nos ha tocado» sería más idiomático y más interpretativo. La expresión final «del lado oriental del Jordán» es inteligible, pero «de este lado del Jordán, al este» refleja mejor la perspectiva del hablante y el contraste del versículo.
  glossary_alignment: 'No hay términos del glosario mayor en conflicto. «Herencia» para נַחֲלָה y «heredaremos» para נִנְחַל están bien. La revisión propuesta mejora la correspondencia con la decisión inglesa sobre la perspectiva espacial: primero «más allá del Jordán y más adelante», luego «de este lado del Jordán, al este».'
  issues:
  - severity: medium
    issue: «más lejos» no suena natural para וָהָלְאָה en un reparto territorial
    rationale: El hebreo añade una idea de prolongación espacial/onward, pero en español bíblico-natural «más lejos» suena coloquial o física-distancial; «más adelante» preserva mejor la progresión geográfica.
  - severity: medium
    issue: La nota al pie no refleja la alternativa léxica auditada
    rationale: La nota inglesa ofrece la alternativa «has fallen to us», es decir, una forma idiomática de asignación de herencia. La nota española actual solo cambia «del» por «en el lado oriental», lo cual no corresponde al motivo léxico documentado.
  - severity: low
    issue: La ubicación final puede reflejar mejor la perspectiva del hablante
    rationale: El inglés POB ya resolvió la ambigüedad de מֵעֵבֶר הַיַּרְדֵּן מִזְרָחָה con «on this side of the Jordan, to the east». «De este lado del Jordán, al este» conserva ese contraste de manera más explícita que «del lado oriental del Jordán».
  revised_spanish_text: Porque no heredaremos con ellos más allá del Jordán y más adelante, porque nuestra herencia ha venido a nosotros de este lado del Jordán, al este.[a]
  revised_footnotes:
  - marker: a
    text: 'O: «nuestra herencia nos ha recaído al este del Jordán» o «nuestra herencia nos ha caído en suerte al este del Jordán».'
    reason: lexical_alternative
  revision_rationale: Se ajusta «más lejos» a «más adelante» para un español más natural y más fiel al matiz espacial de וָהָלְאָה. Se explicita «de este lado del Jordán, al este» para reflejar mejor la perspectiva geográfica del hebreo y del POB inglés. Se reemplaza la nota al pie por una alternativa léxica real para בָאָה en contexto de reparto de herencia.
