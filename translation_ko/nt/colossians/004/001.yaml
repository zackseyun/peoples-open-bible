id: COL.4.1
reference: Colossians 4:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἱ κύριοι, τὸ δίκαιον καὶ τὴν ἰσότητα τοῖς δούλοις παρέχεσθε, εἰδότες ὅτι καὶ ὑμεῖς ἔχετε κύριον ἐν ⸀οὐρανῷ.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/004/001.yaml
  text: Masters, provide your slaves with what is right and fair, knowing that you also have a Lord in heaven.
translation:
  language: ko
  text: 주인들이여, 여러분의 노예들[a]에게 옳은 것과 공정한 것[b]을 베푸십시오. 여러분 자신도 하늘에 주를 모시고 있음을 알기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 δοῦλος. 본 가정 윤리 문맥에서 「주인-노예」 대조는 매임의 의미를 두드러지게 하므로, DOCTRINE.md에 따라 「노예」로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「옳은 것과 평등」. 헬라어 ἰσότης는 「공정·동등」을 함께 담는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ κύριοι
  english_pob_choice: Masters
  chosen_korean: 주인들
  alternatives_korean:
  - 상전들
  - 노예 소유주들
  lexicon: BDAG
  rationale: 노예 소유주를 가리키는 「주인」.
- source_word: τὸ δίκαιον
  english_pob_choice: what is right
  chosen_korean: 옳은 것
  alternatives_korean:
  - 정의
  - 의로운 것
  lexicon: BDAG
  rationale: 명사화된 「옳은 것」.
- source_word: τὴν ἰσότητα
  english_pob_choice: fair
  chosen_korean: 공정한 것
  alternatives_korean:
  - 공평함
  - 평등
  lexicon: BDAG
  rationale: ἰσότης의 「공정·공평」을 살린다. 「평등」 가능성은 각주.
- source_word: τοῖς δούλοις
  english_pob_choice: your slaves
  chosen_korean: 여러분의 노예들
  alternatives_korean:
  - 너희 종들
  lexicon: BDAG
  rationale: 3:22, 3:11과 어휘적 일관성. 매임의 어감 살림.
- source_word: παρέχεσθε
  english_pob_choice: provide
  chosen_korean: 베푸십시오
  alternatives_korean:
  - 제공하십시오
  - 베풀어 주십시오
  lexicon: BDAG
  rationale: 중간 명령. 「베풀다」가 한국 교회의 정립된 표현.
- source_word: εἰδότες ὅτι καὶ ὑμεῖς ἔχετε κύριον
  english_pob_choice: knowing that you also have a Lord
  chosen_korean: 여러분 자신도 ... 주를 모시고 있음을 알기 때문입니다
  alternatives_korean:
  - 여러분도 주를 가지고 있음을 알기 때문에
  - 여러분도 ... 주가 계심을 알기 때문에
  lexicon: BDAG
  rationale: ἔχω + 주를 「주를 모시다」로 한국어 경어 어감을 살린다.
- source_word: ἐν οὐρανῷ
  english_pob_choice: in heaven
  chosen_korean: 하늘에
  alternatives_korean:
  - 하늘에서
  - 천상에
  lexicon: BDAG
  rationale: 단수 οὐρανῷ를 「하늘에」로 옮긴다.
theological_decisions:
- issue: δοῦλος → 「노예」 (가정 윤리 문맥)
  chosen_reading: 노예
  alternative_readings:
  - 종
  rationale: 주인-노예의 사회적 대조가 명시되므로 매임의 어감을 살린다. 3:22, 3:11과 일관.
  doctrine_reference: 'DOCTRINE.md: Contested terms for δοῦλος'
