translation:
  language: es
  text: y las ofrendas de Yahvé estaban en sus manos[a], delante de toda la asamblea de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ofrendas por fuego de Yahvé»; el paralelo griego tiene el más amplio «ofrenda del Señor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִשֵּׁי / προσφορὰ
  english_pob_choice: and the offerings of / offering of the Lord
  chosen_spanish: las ofrendas de Yahvé
  alternatives_spanish:
  - las ofrendas ígneas de Yahvé
  - las ofrendas por fuego de Yahvé
  lexicon: HALOT; LXX προσφορὰ
  rationale: El hebreo apunta a ofrendas hechas por fuego, pero el paralelo griego amplía a un término más general de ofrenda. En español, «ofrendas» conserva el sentido cultual sin introducir una precisión técnica que el contexto inmediato no exige; «ígneas» o «por fuego» se reservan como alternativas más específicas.
- source_word: יְהֹוָה / Κυρίου
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT; proyecto POB
  rationale: Según la terminología del proyecto, el Tetragrámaton se vierte como «Yahvé». El paralelo griego con Κυρίου funciona aquí como referencia al mismo nombre divino, no como un título independiente que deba ocultar el nombre.
- source_word: בְּיָדָם / ἐν χερσὶν αὐτῶν
  english_pob_choice: were in their hands
  chosen_spanish: estaban en sus manos
  alternatives_spanish:
  - estaban en sus manos sujetas
  - las llevaban en las manos
  lexicon: HALOT; griego paralelo
  rationale: La frase conserva la imagen concreta de tenencia ritual. «Estaban en sus manos» sigue de cerca el original y suena natural en español, sin perder el matiz físico de que los sacerdotes las sostenían.
- source_word: נֶגֶד / ἔναντι
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT; LXX
  rationale: «Delante de» transmite bien la visibilidad pública y el carácter litúrgico de la escena. Es natural en español y mantiene la relación espacial del hebreo y del griego.
- source_word: כָּל קְהַל יִשְׂרָאֵל / πάσης ἐκκλησίας Ἰσραήλ
  english_pob_choice: all the assembly of Israel
  chosen_spanish: toda la asamblea de Israel
  alternatives_spanish:
  - toda la congregación de Israel
  - todo el pueblo reunido de Israel
  lexicon: HALOT; LXX
  rationale: «Asamblea» reproduce bien קהל y evita la carga eclesiástica moderna de otras opciones. «Toda la asamblea de Israel» conserva el sentido público y colectivo del pasaje.
theological_decisions:
- issue: Tensión entre el hebreo específico y el griego más general para la ofrenda
  english_pob_reading: offerings of Yahweh
  chosen_spanish_reading: las ofrendas de Yahvé
  alternative_spanish_readings:
  - las ofrendas ígneas de Yahvé
  - las ofrendas por fuego de Yahvé
  rationale: Se mantiene el término general en el texto principal porque el griego paralelo usa προσφορὰ y el propio audit trail inglés ya resolvió la línea hacia una formulación no sobredeterminada. La especificidad de «por fuego» queda preservada como alternativa, no absorbida en el cuerpo del texto.
  doctrine_reference: Principio POB de equivalencia óptima y preservación de tensiones textuales
translation_notes:
  revision_awareness: 'El texto sigue el acuerdo alto entre hebreo y griego: se conserva la imagen sacerdotal de las ofrendas en las manos y la escena pública delante de la asamblea. No hay revisiones textuales adicionales en el expediente, y la única tensión significativa es la amplitud del término de ofrenda, resuelta en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el Tetragrámaton.
  - «Asamblea» se usa de modo consistente para קהל en contexto litúrgico.
  - Se evita «SEÑOR» como máscara y «Cristo» no aplica en este versículo.
  - La puntuación refleja la división sintáctica del griego y la clausura final del hebreo.
