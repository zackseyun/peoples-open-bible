translation:
  language: es
  text: Y los de la ciudad se juntaron en medio de la ciudad[a], unos ciento veinte mil hombres, y querían matar al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «doce miríadas de hombres», es decir, 120.000 hombres.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισυνώχθησαν
  english_pob_choice: gathered
  chosen_spanish: se juntaron
  alternatives_spanish:
  - se congregaron
  - se reunieron
  lexicon: LSJ
  rationale: El verbo expresa una reunión o congregación colectiva. «Se juntaron» es natural en español actual y conserva la acción conjunta sin volverla rígida.
- source_word: οἱ ἐκ τῆς πόλεως
  english_pob_choice: those from the city
  chosen_spanish: los de la ciudad
  alternatives_spanish:
  - los hombres de la ciudad
  - la gente de la ciudad
  lexicon: LSJ
  rationale: El griego dice literalmente «los de la ciudad». En español, «los de la ciudad» reproduce bien la referencia sin añadir explícitamente «hombres» o «gente», que no están en la forma griega.
- source_word: εἰς τὸ μέσον τῆς πόλεως
  english_pob_choice: in the middle of the city
  chosen_spanish: en medio de la ciudad
  alternatives_spanish:
  - en el centro de la ciudad
  - en medio de la ciudad
  lexicon: LSJ
  rationale: La frase señala ubicación espacial central. «En medio de la ciudad» es clara y fiel al sentido locativo del griego.
- source_word: εἰς ἄνδρας δώδεκα μυριάδας
  english_pob_choice: about one hundred twenty thousand men
  chosen_spanish: unos ciento veinte mil hombres
  alternatives_spanish:
  - como ciento veinte mil hombres
  - doce miríadas de hombres
  lexicon: LSJ
  rationale: «Δώδεκα μυριάδες» equivale a 120,000. Se mantiene la cifra en forma idiomática en español. «Hombres» refleja que ἄνδρας es masculino explícito; «unos» conserva el matiz aproximado del inglés POB.
- source_word: ἠβούλοντο
  english_pob_choice: they wanted
  chosen_spanish: querían
  alternatives_spanish:
  - intentaban
  - estaban dispuestos a
  lexicon: LSJ
  rationale: El imperfecto de βούλομαι expresa voluntad o intención. «Querían» es el equivalente más directo y natural; no exagera hacia una determinación más fuerte de la que el griego exige.
- source_word: ἀνελεῖν
  english_pob_choice: to kill
  chosen_spanish: matar
  alternatives_spanish:
  - quitar la vida a
  - dar muerte a
  lexicon: LSJ
  rationale: En este contexto el infinitivo significa quitar la vida. «Matar» es la opción más clara y fiel en español moderno.
translation_notes:
  revision_awareness: El texto inglés auditado no requiere cambios de sentido; se preserva la equivalencia óptima y la nota numérica explícita en español para reflejar la alternativa literal del griego.
  spanish_consistency_notes:
  - Se conservó el valor masculino de ἄνδρας con «hombres», como en la decisión inglesa.
  - La cifra se expresó de modo natural en español, manteniendo la aproximación implícita de «unos».
  - No hay términos teológicos sensibles en este versículo; la traducción se limita a la narración histórica.
