translation:
  language: es
  text: 'Acérquense a mí; oigan esto: desde el principio no hablé en secreto; desde el tiempo en que llegó a ser[a], yo estaba allí. Y ahora el Señor Yahvé me ha enviado[b], y su Espíritu[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde el tiempo en que aconteció» o «desde el tiempo en que existió»; el hebreo dice literalmente: «desde el tiempo de su ser».'
    reason: lexical_alternative
  - marker: b
    text: La identidad del hablante no se explicita en el hebreo. En lectura cristiana, a menudo se entiende como el Siervo o el Mesías, pero el texto mismo la deja implícita.
    reason: alternative_reading
  - marker: c
    text: 'O: «y su espíritu». La frase hebrea puede leerse como un sujeto coordinado distinto («y su Espíritu») o entenderse de manera menos específica.'
    reason: alternative_reading
lexical_decisions:
- source_word: קִרְבוּ אֵלַי
  english_pob_choice: Come near to me
  chosen_spanish: Acérquense a mí
  alternatives_spanish:
  - Vengan cerca de mí
  - Arrímense a mí
  lexicon: HALOT
  rationale: El imperativo plural exige una invitación directa y el pronombre de primera persona debe conservarse. «Acérquense» suena natural en español bíblico moderno y mantiene la fuerza de aproximación del hebreo.
- source_word: שִׁמְעוּ זֹאת
  english_pob_choice: hear this
  chosen_spanish: oigan esto
  alternatives_spanish:
  - escuchen esto
  - atiendan esto
  lexicon: HALOT
  rationale: El hebreo combina imperativo plural con demostrativo. «Oigan esto» es breve, idiomático y conserva el tono profético de exhortación.
- source_word: מֵרֹאשׁ
  english_pob_choice: From the beginning ... not
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - no desde el principio
  lexicon: HALOT
  rationale: 'רֹאשׁ aquí denota el inicio u origen. En español conviene adelantar la expresión temporal: «desde el principio no hablé...», manteniendo el contraste del hebreo.'
- source_word: בַּסֵּתֶר
  english_pob_choice: in secret
  chosen_spanish: en secreto
  alternatives_spanish:
  - a escondidas
  - ocultamente
  lexicon: HALOT
  rationale: סֵתֶר expresa ocultamiento o secreto. «En secreto» es la equivalencia más directa y natural en este contexto.
- source_word: דִּבַּרְתִּי
  english_pob_choice: I have not spoken
  chosen_spanish: no hablé
  alternatives_spanish:
  - no he hablado
  - no hablaba
  lexicon: HALOT
  rationale: El perfecto hebreo puede verse como acción pasada con vigencia discursiva; sin embargo, en español «no hablé» conserva bien la afirmación retrospectiva del verso y evita sobrecargar el estilo.
- source_word: מֵעֵת הֱיוֹתָהּ
  english_pob_choice: from the time it came to be
  chosen_spanish: desde el tiempo de su venir a ser
  alternatives_spanish:
  - desde el tiempo de que existió
  - desde el tiempo en que llegó a ser
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «desde el tiempo de su ser». «Venir a ser» preserva la noción verbal de aparición/existencia sin fijar demasiado el referente del sufijo femenino. Se deja un matiz más literal en nota.
- source_word: שָׁם אָנִי
  english_pob_choice: I was there
  chosen_spanish: allí estaba yo
  alternatives_spanish:
  - estaba allí
  - yo estaba allí
  lexicon: HALOT
  rationale: Aunque literalmente «allí yo», el contexto retrospectivo pide en español una formulación natural que conserve la presencia del hablante en el momento indicado.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor YHWH
  - el Señor Dios
  lexicon: HALOT
  rationale: Según la terminología del proyecto, יְהוָה se vierte «Yahvé», no como máscara litúrgica. En la combinación אֲדֹנָי יְהוִה se mantiene la distinción titulativa con «Señor» + el nombre divino.
- source_word: שְׁלָחַנִי
  english_pob_choice: has sent me
  chosen_spanish: me ha enviado
  alternatives_spanish:
  - me envió
  - me envía
  lexicon: HALOT
  rationale: El perfecto 3ms con sufijo de primera persona expresa una comisión vigente sobre una acción completada. «Me ha enviado» es claro y conserva ese valor.
- source_word: וְרוּחוֹ
  english_pob_choice: and his Spirit
  chosen_spanish: y su Espíritu
  alternatives_spanish:
  - y su espíritu
  - y con su Espíritu
  lexicon: HALOT
  rationale: רוּחַ con sufijo puede significar espíritu, aliento o viento. En este marco de envío y comisión, «Espíritu» es la lectura más probable en clave canónica cristiana, aunque la ambigüedad se preserva en nota.
theological_decisions:
- issue: Identidad del hablante en la primera persona del verso
  english_pob_reading: The speaker is not explicitly identified in the Hebrew. Christian readers have often understood this as the Servant/Messiah speaking, but the text itself leaves the identification implicit.
  chosen_spanish_reading: La traducción conserva la primera persona sin identificar explícitamente al hablante.
  alternative_spanish_readings:
  - Identificar al Siervo/Mesías en el cuerpo del texto
  - Agregar una aclaración interpretativa en la traducción principal
  rationale: El hebreo no nombra de manera explícita al hablante. Para respetar esa tensión, la versión española mantiene la voz en primera persona y deja la identificación como una posibilidad interpretativa, no como decisión impuesta por la traducción.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Sentido de וְרוּחוֹ
  english_pob_reading: Or, 'and his spirit.' The Hebrew phrase may be read as a distinct accompanying subject ('and his Spirit') or understood less specifically.
  chosen_spanish_reading: «y su Espíritu» en el texto principal, con la posibilidad de una lectura menos específica preservada en nota.
  alternative_spanish_readings:
  - y su espíritu
  - y con su Espíritu
  rationale: 'El hebreo permite más de una relación semántica: sujeto coordinado, referencia más genérica, o incluso sentido acompañante. La traducción principal conserva la lectura fuerte «Espíritu» sin cerrar el debate interpretativo, y la nota expone la alternativa.'
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Tratamiento del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor YHWH
  rationale: El proyecto prescribe Yahvé para יהוה en el texto principal. En la expresión compuesta, «Señor Yahvé» preserva la diferencia entre el título adonai y el nombre propio divino, sin recurrir a la convención de ocultamiento.
  doctrine_reference: 'Contested terms: יהוה YHWH'
translation_notes:
  revision_awareness: Se revisó la redacción frente al audit trail inglés y no se detectaron cambios posteriores sustantivos; la versión española sigue de cerca las decisiones léxicas y la tensión teológica preservada en el original.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה de acuerdo con el estándar del proyecto.
  - Se mantiene «Espíritu» con mayúscula en la lectura canónica principal, pero la nota conserva la alternativa en minúscula.
  - Se evita identificar explícitamente al hablante en el texto principal para no resolver una ambigüedad del hebreo.
  - La sintaxis española reordena ligeramente el orden hebreo para fluidez, sin añadir contenido interpretativo.
