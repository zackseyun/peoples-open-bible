translation:
  language: es
  text: Por tanto, tan cierto como que yo vivo, declara el Señor Yahvé, ciertamente porque has profanado mi santuario con todas tus cosas detestables y con todas tus abominaciones, yo también te[a] disminuiré; mi ojo no perdonará, y yo tampoco tendré piedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te cortaré» o «te menguaré». El verbo hebreo es breve y su objeto queda implícito; la idea general es la de reducir o abatir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Conserva el valor inferencial que introduce el juicio anunciado a partir del contexto previo, con un español natural y solemne.
- source_word: חַי אָ֗נִי
  english_pob_choice: as I live
  chosen_spanish: vivo yo
  alternatives_spanish:
  - como vivo yo
  - por mi vida
  lexicon: HALOT
  rationale: Mantiene la fórmula de juramento divino sin sonar forzada en español; coloca el pronombre de forma enfática, como en el hebreo.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - declara el Señor Dios
  lexicon: HALOT
  rationale: Se conserva el valor fórmulario de נְאֻם como 'declara'. Se usa 'Yahvé' para יְהוִה según el criterio del proyecto, y 'Señor' para אֲדֹנָי.
- source_word: אִם לֹא
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - en verdad
  - seguro que
  lexicon: HALOT
  rationale: En contexto juramentado, la expresión no funciona como condicional literal, sino como aseveración enfática.
- source_word: מִקְדָּשִׁי
  english_pob_choice: my sanctuary
  chosen_spanish: mi santuario
  alternatives_spanish:
  - mi lugar santo
  - mi templo
  lexicon: HALOT
  rationale: '''Santuario'' preserva el sentido cultual amplio sin reducirlo innecesariamente al edificio.'
- source_word: טִמֵּאת
  english_pob_choice: have defiled
  chosen_spanish: has profanado
  alternatives_spanish:
  - has contaminado
  - has hecho impuro
  lexicon: HALOT
  rationale: '''Profanar'' comunica bien la ofensa contra lo sagrado en español bíblico y evita la torpeza de un calco, manteniendo la fuerza ritual/moral del verbo.'
- source_word: שִׁקּוּצַיִךְ
  english_pob_choice: your detestable things
  chosen_spanish: tus cosas detestables
  alternatives_spanish:
  - tus detestables objetos
  - tus ídolos abominables
  lexicon: HALOT
  rationale: Se preserva el campo semántico amplio del término sin estrecharlo de modo indebido; 'cosas detestables' mantiene la relación con el paralelo siguiente.
- source_word: תּוֹעֲבֹתָיִךְ
  english_pob_choice: your abominations
  chosen_spanish: todas tus abominaciones
  alternatives_spanish:
  - todas tus cosas abominables
  - tus prácticas abominables
  lexicon: HALOT
  rationale: '''Abominaciones'' conserva el registro bíblico fuerte y distingue este término del anterior, como hace el inglés POB.'
- source_word: אֶגְרַע
  english_pob_choice: I also will diminish you
  chosen_spanish: te disminuiré
  alternatives_spanish:
  - te cortaré
  - te menguaré
  lexicon: HALOT
  rationale: 'Se adopta la lectura revisada del POB: el verbo hebreo es terso y aquí implica una acción divina de reducción o mermar al destinatario. El objeto queda expresado de modo natural en español.'
- source_word: לֹא תָחוֹס עֵינִי
  english_pob_choice: my eye will not spare
  chosen_spanish: no se compadecerá mi ojo
  alternatives_spanish:
  - mi ojo no perdonará
  - mi ojo no se apiadará
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea del 'ojo' y el verbo de compasión/perdón en forma idiomática para el español.
- source_word: לֹא אֶחְמוֹל
  english_pob_choice: I also will show no pity
  chosen_spanish: yo tampoco tendré piedad
  alternatives_spanish:
  - yo tampoco me compadeceré
  - yo tampoco mostraré compasión
  lexicon: HALOT
  rationale: '''Tener piedad'' expresa bien el paralelismo con la negación anterior y evita redundancia excesiva.'
theological_decisions:
- issue: Renderización del nombre divino יְהוִה en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: Se sigue el criterio del proyecto de traducir el Tetragrammatón como 'Yahvé'. Al estar precedido por אֲדֹנָי, se mantiene 'Señor' para el título y no se oculta el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Intensidad y objeto implícito de אֶגְרַע
  english_pob_reading: I also will diminish you
  chosen_spanish_reading: te disminuiré
  alternative_spanish_readings:
  - te cortaré
  - te mermaré
  rationale: El hebreo es breve y deja implícito el objeto; en español conviene expresarlo con objeto directo para claridad, sin perder la idea de reducción o abatimiento judicial.
  doctrine_reference: Audit trail revision on Ezekiel 5:11; lexical note for אֶגְרַע
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que prefirió 'I also will diminish you' para reflejar mejor אֶגְרַע con objeto implícito. La presente versión española sigue esa revisión y hace explícito el objeto directo por claridad natural.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al criterio del proyecto para יְהוִה, manteniendo 'Señor' para אֲדֹנָי.
  - Se conservó el paralelo semántico entre 'cosas detestables' y 'abominaciones' para no nivelar los dos términos hebreos.
  - Se mantuvo la imagen de 'mi ojo' para לֹא תָחוֹס עֵינִי, evitando una paráfrasis que borrara el hebraísmo.
  - Se evitó 'esclavo/siervo' porque no aparece en este versículo.
  - No se introdujo 'Mesías/Cristo' ni otros términos no presentes en el texto.
