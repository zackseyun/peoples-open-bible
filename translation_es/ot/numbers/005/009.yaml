revisions:
- from: Y toda contribución[a] de todas las cosas santas[b] de los hijos de Israel[c], que presenten[d] al sacerdote, será suya.
  to: Y toda contribución de todas las ofrendas santas[a] de los hijos de Israel[b], que traigan[c] al sacerdote, será suya.
  rationale: Se corrige el aparato de notas para que cada marcador corresponda al término correcto y se elimina la duplicación sobre «hijos de Israel». En el texto principal, «ofrendas santas» mejora la naturalidad y sigue mejor la decisión auditada detrás de «holy gifts», mientras se conserva «cosas santas» como alternativa en nota. También se ajusta «presenten» a «traigan» para alinearse con la revisión inglesa más reciente, manteniendo el matiz cultual en la nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:30:34Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en general la estructura y el sentido del hebreo: תְּרוּמָה como «contribución», לַכֹּהֵן como «al sacerdote» y לוֹ יִהְיֶה como «será suya» están bien encaminados. «Presenten» para יַקְרִיבוּ es aceptable en contexto cultual. Sin embargo, hay problemas en el manejo de notas y en la representación de קָדְשֵׁי. El inglés auditado eligió «holy gifts» y dejó «holy things / sacred offerings» como alternativas; el borrador pone en texto «cosas santas», que es posible pero menos natural y menos alineado con la decisión documentada. Además, las notas [a] y [c] duplican el mismo asunto, y la nota [a] está anclada a «contribución» aunque su contenido corresponde a «hijos de Israel».'
  spanish_quality_summary: El español es legible, pero necesita reparación menor para claridad y buena disciplina editorial. «Cosas santas» suena algo torpe en este contexto legal-cultual; «ofrendas santas» o «dones santos» fluye mejor. También conviene ordenar las notas para que cada marcador corresponda al término correcto y no haya duplicación. Fuera de eso, la sintaxis «Y toda ... será suya» funciona bien en registro bíblico contemporáneo y digno.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías, Espíritu, etc. La decisión «los hijos de Israel» sí concuerda con la política documentada de conservar בְנֵי. «Sacerdote» y «contribución» son compatibles con el rastro POB. La principal desalineación está en preferir «cosas santas» en el texto principal frente a la rationale inglesa que favorece un equivalente más idiomático como «holy gifts».
