translation:
  language: es
  text: Yoram se acostó con sus padres[a], y fue sepultado con sus padres en la Ciudad de David[b], y Ahazías, su hijo, reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'durmió con sus padres'. El hebreo usa una fórmula real convencional para decir que murió.
    reason: lexical_alternative
  - marker: b
    text: Yoram es una forma hebrea; en algunas versiones castellanas tradicionales aparece como 'Jehoram'.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: lay down
  chosen_spanish: durmió
  alternatives_spanish:
  - se acostó
  - murió
  lexicon: HALOT
  rationale: En los avisos regios de muerte, el hebreo usa una fórmula convencional que literalmente dice 'se acostó' pero significa que murió. En español, 'durmió' conserva la fórmula idiomática tradicional sin explicarla de más; 'murió' aclararía el sentido pero perdería la forma heredada del hebreo.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  lexicon: HALOT
  rationale: La construcción hebrea es una fórmula dinástica fija. 'Padres' reproduce la expresión tradicional en español bíblico y mantiene el paralelismo familiar/real; 'antepasados' explicaría el sentido pero suavizaría la fórmula establecida.
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  lexicon: HALOT
  rationale: El pasivo niphal expresa el acto de enterrar/sepultar. 'Sepultado' es más acorde con el registro bíblico y litúrgico, y conserva mejor la dignidad del contexto regio que 'enterrado'.
- source_word: בְּעִיר דָּוִד
  english_pob_choice: in the City of David
  chosen_spanish: en la Ciudad de David
  alternatives_spanish:
  - en la ciudad de David
  lexicon: HALOT
  rationale: '''Ciudad de David'' funciona en español como nombre propio de lugar histórico-bíblico. Mantener la mayúscula preserva su valor topográfico y evita volverlo una descripción genérica.'
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: En fórmulas de sucesión, מלך se traduce naturalmente por 'reinar'. 'Reinó' reproduce el aviso regnal breve y estándar sin añadir aspecto no expresado explícitamente en el hebreo.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: En contexto sucesorio, תַּחַת significa 'en lugar de'. 'En su lugar' es la forma española más natural y exacta; 'en vez de él' suena más marcado, y 'después de él' desplaza el énfasis de sustitución.
- source_word: יוֹרָם
  english_pob_choice: Yoram
  chosen_spanish: Yoram
  alternatives_spanish:
  - Jehoram
  lexicon: transliteration
  rationale: Se conserva la forma hebrea Yoram, coherente con la primacía de la fuente original y con la decisión auditada del POB en inglés. 'Jehoram' es la forma tradicional en algunas versiones, pero no refleja aquí la forma textual hebrea.
- source_word: אֲחַזְיָהוּ
  english_pob_choice: Ahaziah
  chosen_spanish: Ahazías
  alternatives_spanish:
  - Ocozías
  lexicon: transliteration
  rationale: El hebreo corresponde al nombre normalmente transliterado en español como 'Ahazías'. 'Ocozías' es la forma tradicional en varias Biblias, pero 'Ahazías' sigue más de cerca la forma original y la práctica de transliteración directa.
theological_decisions:
- issue: 'Fórmula de muerte real: ''durmió con sus padres'''
  english_pob_reading: And Yoram lay down with his fathers ...
  chosen_spanish_reading: Yoram durmió con sus padres ...
  alternative_spanish_readings:
  - Yoram murió
  - Yoram se acostó con sus padres
  rationale: 'La POB inglesa retiene la fórmula convencional sin convertirla en explicación. En español, ''durmió con sus padres'' conserva la ambigüedad reverencial del hebreo: puede leerse como eufemismo de muerte, sin imponer una glosa interpretativa que borre la forma del texto.'
  doctrine_reference: 2 Samuel 7; 1 Reyes 1–2 (fórmulas regias de sucesión)
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/vocalizado del WLC y la auditoría inglesa del POB, sin cambios relevantes respecto del sentido regnal estándar del versículo. No se detectaron revisiones textuales o decisiones de traducción adicionales en el expediente aplicado.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un sustituto contextual.
  - Se conserva la transliteración directa de nombres propios cuando la auditoría inglesa la favorece; 'Ahazías' se usa aquí por proximidad al hebreo, mientras 'Yoram' sigue la decisión auditada.
  - '''Padres'' se usa en el sentido bíblico-dinástico de la fórmula, no en el sentido moderno inmediato de progenitores biológicos solamente.'
