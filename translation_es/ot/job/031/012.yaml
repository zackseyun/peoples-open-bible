translation:
  language: es
  text: Porque es un fuego que consume hasta la destrucción[a], y arrancaría de raíz toda mi cosecha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta Abadón». El hebreo אֲבַדּוֹן puede significar «destrucción» o, en algunos contextos, el reino o la personificación de la destrucción.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación anterior. «Porque» conserva el valor explicativo de manera natural en español moderno.
- source_word: אֵשׁ
  english_pob_choice: a fire
  chosen_spanish: un fuego
  alternatives_spanish:
  - fuego
  lexicon: HALOT
  rationale: Se mantiene la imagen literal. El artículo indefinido ayuda a que la metáfora suene natural en español sin perder la concreción.
- source_word: עַד אֲבַדּוֹן
  english_pob_choice: to destruction
  chosen_spanish: hasta la destrucción
  alternatives_spanish:
  - hasta Abadón
  - hasta el Abadón
  - hasta el exterminio
  lexicon: HALOT
  rationale: La frase intensifica el carácter devorador del fuego. «Hasta la destrucción» expresa el sentido común del sustantivo en este contexto y conserva la posibilidad alternativa mediante nota.
- source_word: תֹּאכֵל
  english_pob_choice: consumes
  chosen_spanish: consume
  alternatives_spanish:
  - devora
  - come
  lexicon: HALOT
  rationale: «Consume» reproduce bien la metáfora del fuego y mantiene el valor destructivo del verbo sin sonar arcaico.
- source_word: וּבְכָל
  english_pob_choice: and all
  chosen_spanish: toda
  alternatives_spanish:
  - y toda
  - en toda
  lexicon: HALOT
  rationale: El prefijo preposicional no requiere calco rígido en español; el sentido es la extensión total del daño sobre el producto entero. «Toda» comunica esa amplitud de forma idiomática.
- source_word: תְּבוּאָתִי
  english_pob_choice: my produce
  chosen_spanish: mi cosecha
  alternatives_spanish:
  - mi produce
  - mi fruto
  - mi rendimiento
  lexicon: HALOT
  rationale: El término hebreo designa el producto o rendimiento del campo y, por extensión, del trabajo. «Cosecha» es una opción natural y comprensible en español para este campo semántico agrícola.
- source_word: תְשָׁרֵשׁ
  english_pob_choice: would root out
  chosen_spanish: arrancaría de raíz
  alternatives_spanish:
  - desarraigaría
  - extirparía
  - arrancaría
  lexicon: HALOT
  rationale: El verbo intensivo conserva la imagen agrícola de arrancar desde la raíz. «Arrancaría de raíz» es fiel y fluido en español, y refleja el matiz potencial/hipotético del contexto.
theological_decisions:
- issue: Sentido de אֲבַדּוֹן
  english_pob_reading: common noun 'destruction' with a footnoted alternative 'Abaddon'
  chosen_spanish_reading: sentido común 'destrucción' con nota de alternativa 'Abadón'
  alternative_spanish_readings:
  - Abadón como nombre propio
  - ruina
  rationale: En este pasaje sapiencial, el contexto favorece el sentido común de destrucción más que una alusión a un ser o reino personificado. Se preserva la alternativa por la ambigüedad real del hebreo.
  doctrine_reference: Job 31:12; uso léxico de אבדון en el AT
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se mantuvo la metáfora del fuego, el valor explicativo de כִּי, el sentido intensivo de תֹאכֵל y la imagen agrícola de תְשָׁרֵשׁ. La decisión sobre אֲבַדּוֹן conserva la tensión entre «destrucción» y «Abadón» mediante nota, como en el inglés POB.'
  spanish_consistency_notes:
  - Se prefirió «Porque» para el valor causal/explicativo de כִּי.
  - Se evitó «SEÑOR» o cualquier ocultamiento teológico, ya que este versículo no contiene el Tetragrámaton.
  - «Cosecha» comunica el campo semántico agrícola de תְּבוּאָה de forma natural para lectores hispanohablantes.
  - «Arrancaría de raíz» preserva la imagen de raíz y el tono hipotético del contexto o de la obertura de juramento implícita en la serie de declaraciones de Job.
