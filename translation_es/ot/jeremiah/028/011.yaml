base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/028/011.yaml
  text: 'And Hananiah said before the eyes of all the people[a], saying[b], “Thus says Yahweh: In this way I will break the yoke of Nebuchadnezzar king of Babylon from upon the neck of all the nations within two years.” Then Jeremiah the prophet went his way.'
  footnotes:
