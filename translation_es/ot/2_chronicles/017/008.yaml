translation:
  language: es
  text: 'Y con ellos estaban los levitas: Semaías, Netanías, Zebadías, Asael, Semiramot, Jehonatán[b], Adonías, Tobiyá[c], y Tob-Adonías[a]; y con ellos estaban Elisama y Jehoram[d], los sacerdotes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «Tob Adonías» probablemente funciona como un solo nombre compuesto; algunas traducciones lo presentan de otra manera.
    reason: lexical_alternative
  - marker: b
    text: «Jehonatán» refleja la forma hebrea más plena del nombre; algunas versiones la acortan a «Jonatán».
    reason: lexical_alternative
  - marker: c
    text: «Tobiyá» refleja más explícitamente la forma hebrea plena del nombre; muchas versiones españolas lo simplifican a «Tobías».
    reason: lexical_alternative
  - marker: d
    text: «Jehoram» refleja la forma hebrea más plena del nombre; algunas versiones la acortan a «Joram».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעִמָּהֶם
  english_pob_choice: And with them were
  chosen_spanish: Y con ellos estaban
  alternatives_spanish:
  - Y con ellos
  - Y acompañándolos estaban
  lexicon: HALOT
  rationale: La frase preposicional introduce a los integrantes que acompañan al grupo principal. En español, ‘estaban’ comunica con naturalidad la presencia acompañante sin perder el valor relacional de ‘con ellos’.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los Levitas
  - levitas
  lexicon: HALOT
  rationale: El artículo definido se conserva con ‘los levitas’. Es el nombre de la orden tribal/cultual, no un sustantivo genérico.
- source_word: שְׁמַעְיָהוּ
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Shemaías
  lexicon: transliteración convencional
  rationale: Se sigue la forma bíblica usual en español, que ajusta la transliteración al sistema fonológico y ortográfico español sin alterar el nombre propio.
- source_word: נְתַנְיָהוּ
  english_pob_choice: Nethaniah
  chosen_spanish: Netanías
  alternatives_spanish:
  - Natanías
  lexicon: transliteración convencional
  rationale: Nombre propio con forma bíblica estable en español. Se mantiene la terminación -ías, habitual en la tradición hispana, sin forzar una transliteración cruda del hebreo.
- source_word: זְבַדְיָהוּ
  english_pob_choice: Zebadiah
  chosen_spanish: Zebadías
  alternatives_spanish:
  - Zabadías
  lexicon: transliteración convencional
  rationale: Se conserva la correspondencia sonora y la forma de nombre propio bíblico reconocible en español.
- source_word: עֲשָׂהאֵל
  english_pob_choice: Asahel
  chosen_spanish: Asael
  alternatives_spanish:
  - Asahel
  lexicon: transliteración convencional
  rationale: La forma española habitual es Asael; refleja el nombre propio sin añadir una h final que no es necesaria en español.
- source_word: שמרימות
  english_pob_choice: Shemiramoth
  chosen_spanish: Semiramot
  alternatives_spanish:
  - Shemiramot
  lexicon: transliteración convencional
  rationale: Se adopta una forma española legible del nombre propio. La terminación -ot preserva mejor la consonancia del hebreo que una adaptación excesivamente anglicada.
- source_word: וִֽ/יהוֹנָתָן
  english_pob_choice: Jehonathan
  chosen_spanish: Jehonatán
  alternatives_spanish:
  - Jonatán
  lexicon: transliteración convencional
  rationale: El hebreo presenta la forma larga יהונתן, por lo que se conserva el elemento inicial ‘Jeho-’ reflejado en el inglés POB. Se mantiene el acento gráfico español.
- source_word: וַ/אֲדֹ֨נִיָּ֧הוּ
  english_pob_choice: Adonijah
  chosen_spanish: Adonías
  alternatives_spanish:
  - Adoníahu
  lexicon: transliteración convencional
  rationale: Se usa la forma española bíblica tradicional del nombre, suficientemente reconocible y acorde con la práctica hispanohablante.
- source_word: וְ/טֽוֹבִיָּ֛הוּ
  english_pob_choice: Tobijah
  chosen_spanish: Tobías
  alternatives_spanish:
  - Tobías
  lexicon: transliteración convencional
  rationale: La forma española natural y reconocible es Tobías. Aunque el inglés POB preserva el final -jiah/-jah, en español la forma heredada transmite mejor el nombre propio sin perder identificación.
- source_word: וְ/ט֥וֹב אֲדוֹנִיָּ֖ה
  english_pob_choice: Tob-adonijah
  chosen_spanish: Tob-Adonías
  alternatives_spanish:
  - Tob Adonías
  - Tob-Adoníahu
  lexicon: HALOT
  rationale: El texto hebreo parece presentar un nombre compuesto. El guion conserva la unidad del nombre y, al mismo tiempo, hace visible su composición. En español se mantiene la forma bíblica ‘Adonías’ para naturalidad y reconocimiento.
- source_word: אֱלִישָׁמָע
  english_pob_choice: Elishama
  chosen_spanish: Elisama
  alternatives_spanish:
  - Elishama
  lexicon: transliteración convencional
  rationale: Se adopta la forma española bíblica estable, más natural para publicación y lectura pública.
- source_word: וִֽ/יהוֹרָ֖ם
  english_pob_choice: Jehoram
  chosen_spanish: Joram
  alternatives_spanish:
  - Jehoram
  lexicon: transliteración convencional
  rationale: Aunque el hebreo es la forma larga, en español la forma tradicional y más asentada es Joram. Se prioriza la inteligibilidad y el uso bíblico hispano.
- source_word: הַ/כֹּהֲנִֽים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes
  - los presbíteros
  lexicon: HALOT
  rationale: En español bíblico, ‘sacerdotes’ comunica correctamente la categoría cultual indicada por el hebreo. ‘Presbíteros’ sería inadecuado aquí por cambio de campo semántico.
theological_decisions:
- issue: Distinción entre levitas y sacerdotes
  english_pob_reading: 'Render both groups explicitly and separately: ''the Levites'' ... ''the priests.'''
  chosen_spanish_reading: 'Se distinguen explícitamente dos grupos: ‘los levitas’ ... ‘los sacerdotes’.'
  alternative_spanish_readings:
  - Unificar a todos como levitas
  - Omitir la identificación final como sacerdotes
  rationale: La sintaxis hebrea separa a los levitas nombrados primero y, luego, a Elisama y Joram como ‘los sacerdotes’. Mantener la distinción preserva un dato institucional importante del pasaje.
  doctrine_reference: Orden cultual levítica en el Antiguo Testamento; distinción funcional entre levitas y sacerdotes.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y su nota sobre nombres propios, especialmente la forma compuesta de Tob-adonijah y la distinción entre levitas y sacerdotes. No se detectaron revisiones posteriores que requirieran ajuste adicional.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiere explícitamente; este versículo no lo contiene.
  - Los nombres propios se adaptan a formas bíblicas españolas reconocibles, evitando una transliteración mecánica del inglés.
  - Se conserva la estructura del hebreo con dos menciones de ‘con ellos estaban’ para reflejar el paralelismo del verso.
  - ‘Sacerdotes’ se mantiene como término cultual preciso, paralelo a ‘levitas’.
