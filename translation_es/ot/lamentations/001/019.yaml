  to: Llamé a mis amantes[a]; ellos me engañaron. Mis sacerdotes y mis ancianos perecieron en la ciudad mientras buscaban alimento para sí mismos para recobrar la vida[b].
  rationale: Se ajustó la cláusula final para un español más natural y fiel al sentido de restaurar/recobrar la vida, y se reubicó la nota [b] al lugar textual correspondiente a la alternativa causal documentada en el English POB.
