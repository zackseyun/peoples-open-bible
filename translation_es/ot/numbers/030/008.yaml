base_translation:
  language: en
  yaml_path: translation/ot/numbers/030/008.yaml
  text: And if her husband hears of it on the day he hears[a], and is silent toward her, then her vows shall stand[b], and her binding obligations that she bound on herself shall stand.
  footnotes:
