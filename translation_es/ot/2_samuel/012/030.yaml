base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/012/030.yaml
  text: He took the crown of their king from his head[a]. Its weight was a talent of gold, and it had a precious stone, and it was placed on David’s head[b]. He brought out the spoil of the city in very great quantity.
  footnotes:
  - marker: a
    text: Or 'the crown of Milcom' (also spelled 'Malcam'), taking מַלְכָּם as the name of the Ammonite deity rather than 'their king.'
    reason: alternative_reading
  - marker: b
    text: A talent was a very large unit of weight, often estimated at roughly 75 pounds (34 kilograms), though exact ancient standards varied.
    reason: cultural_note
