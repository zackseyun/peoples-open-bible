review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva gran parte del sentido fuente: Abram oye que su pariente fue tomado cautivo, despliega a sus hombres entrenados nacidos en su casa, y lo persigue hasta Dan. Sin embargo, introduce una expansión no expresada en el hebreo al traducir וַיִּרְדֹּף como «persiguió a los invasores» en lugar de dejar el objeto implícito o usar «los persiguió». También la nota [b] no corresponde al dato léxico debatido del inglés POB, que documenta el verbo וַיָּרֶק, no el número.'
  spanish_quality_summary: El español es claro y natural, pero «persiguió a los invasores» interpreta de más el referente. «Nacidos en su casa» funciona, aunque «nacidos en su hogar/casa» puede mantenerse sin problema. La estructura general es legible y digna.
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. La elección «pariente» sigue el rastro auditado en inglés, aunque el expediente fuente también documenta que el hebreo literal es «hermano»; la nota actual lo preserva adecuadamente. El principal desajuste está en la nota [b], que debería reflejar la alternativa léxica de וַיָּרֶק («sacó», «sacó para fuera», «movilizó», «armó»), no una variante numérica.
  issues:
  - severity: medium
    issue: Expansión interpretativa en «persiguió a los invasores»
    rationale: El hebreo solo dice «y persiguió»; el objeto es implícito por contexto. «A los invasores» añade una identificación no presente en el texto fuente y va más allá del inglés POB.
  - severity: medium
    issue: La nota [b] está anclada al número, pero la cuestión léxica debatida recae en וַיָּרֶק
    rationale: El inglés POB documenta la nota alternativa para el verbo difícil («mustered/led out/drew out/armed»), no para «three hundred and eighteen». En español, la nota debe ir sobre «sacó» o equivalente.
  - severity: low
    issue: Leve tensión entre la nota y la política fuente sobre אָחִיו
    rationale: La auditoría inglesa original favorecía preservar «his brother» en el texto principal, aunque la revisión aplicada cambió a «kinsman». Dado que el rastro aplicado vigente usa «kinsman», «pariente» es aceptable; la nota compensa bien al conservar «hermano» como alternativa.
  revised_spanish_text: Cuando Abram oyó que su pariente[a] había sido hecho cautivo, sacó[b] a sus hombres entrenados, nacidos en su casa, trescientos dieciocho, y los persiguió hasta Dan.
  revised_footnotes:
  - marker: a
    text: O «su hermano»; el hebreo אָחִיו puede referirse a un pariente cercano, no solo a un hermano literal.
    reason: lexical_alternative
  - marker: b
    text: El verbo también puede entenderse como «sacó para fuera», «movilizó» o posiblemente «armó».
    reason: lexical_alternative
  revision_rationale: Se corrige una expansión interpretativa innecesaria («a los invasores») para mantener el objeto implícito del hebreo, y se realinea la nota [b] con el verdadero punto léxico debatido en וַיָּרֶק, conforme al expediente auditado en inglés. El resto del texto puede mantenerse con mínimos ajustes.
