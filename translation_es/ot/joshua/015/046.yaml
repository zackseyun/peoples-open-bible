review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: מֵעֶקְרוֹן = «desde Ecrón», וָיָמָּה = dirección occidental, כֹּל אֲשֶׁר = totalidad de lo incluido, עַל יַד אַשְׁדּוֹד = proximidad a Asdod, y וְחַצְרֵיהֶן = «y sus aldeas». Sin embargo, la nota b no preserva adecuadamente la literalidad documentada en el rastro inglés, que explica la expresión literalmente como «a la mano de Asdod» y luego su sentido idiomático.'
  spanish_quality_summary: El español es claro y natural. La frase principal funciona bien como catálogo territorial. El único ajuste necesario es mejorar la nota b para reflejar con más precisión la base léxica del hebreo; «al lado de Asdod» no representa la literalidad mencionada en la auditoría inglesa.
  glossary_alignment: No hay términos teológicos sensibles aquí. Los topónimos «Ecrón» y «Asdod» son adecuados; «hacia el oeste», «junto a» y «aldeas» concuerdan con las decisiones léxicas documentadas. La revisión mantiene la legibilidad y la fidelidad al modismo hebreo.
  issues:
  - severity: medium
    issue: La nota b no conserva la literalidad del modismo עַל יַד.
    rationale: La auditoría inglesa documenta explícitamente «Literally, 'at the hand of Ashdod'». La nota española actual dice «Literalmente, “al lado de Asdod”», que ya es interpretación, no literalidad. Conviene reflejar «a la mano de Asdod» y luego explicar el sentido idiomático de proximidad.
  revised_spanish_text: desde Ecrón hacia el oeste[a], todo lo que está junto a Asdod[b], y sus aldeas.
  revised_footnotes:
  - marker: a
    text: O «hacia el mar», es decir, «hacia el oeste».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a la mano de Asdod»; es un modismo que significa «junto a» o «cerca de Asdod».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural en español. Solo se corrige la nota b para que preserve la literalidad hebrea documentada en la auditoría inglesa antes de explicar su sentido idiomático.
