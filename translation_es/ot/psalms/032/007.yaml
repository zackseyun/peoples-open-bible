review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del hebreo: Dios como lugar de protección, preservación frente a la angustia, y el cerco de expresiones de liberación. Sin embargo, se aparta del rastro auditado en dos puntos: (1) סֵתֶר se rebajó de la imagen más concreta de ''hiding place'' a ''refugio'', que es aceptable pero menos fiel a la metáfora de ocultamiento/protección que el inglés POB quiso preservar; (2) la nota de ''Selah'' del inglés POB se perdió y fue sustituida por una nota léxica en ''gritos de liberación'', cuando el inglés ya conservaba la alternativa en la nota a ''hiding place'' y reservaba la otra nota para la incertidumbre de ''Selah''.'
  spanish_quality_summary: El español es claro, natural y ampliamente legible. 'Me preservas de la angustia' y 'me rodeas con gritos de liberación' funcionan bien. No obstante, 'mi escondite' o 'un escondite para mí' preserva mejor la imaginería original sin volverse extraño en contexto poético. También conviene restaurar la nota cultural sobre 'Selah' y evitar introducir una distribución de notas distinta de la auditada sin necesidad.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías, Espíritu, etc. Las decisiones principales son compatibles con la filosofía POB, pero 'refugio' suaviza la concreción de סֵתֶר frente al audit trail, y la omisión de la nota sobre 'Selah' no sigue la práctica documentada de transliterar con aclaración mínima en nota.
  issues:
  - severity: medium
    issue: סֵתֶר se tradujo como 'refugio' en lugar de una expresión que preserve la idea de escondite/lugar de ocultamiento.
    rationale: Aunque 'refugio' comunica protección, el hebreo y la decisión inglesa enfatizan un lugar de ocultamiento protector. En poesía española, 'escondite' o 'escondedero' puede sonar más concreto; 'escondite para mí' mantiene naturalidad razonable y se acerca mejor al source evidence.
  - severity: medium
    issue: La nota del borrador en [b] no corresponde a la nota auditada del inglés POB, que explica 'Selah'.
    rationale: El inglés POB ya ubicó la alternativa léxica en la primera nota y reservó la segunda para la incertidumbre litúrgico-musical de 'Selah'. Cambiar esa estructura sin necesidad debilita la trazabilidad del audit trail.
  - severity: low
    issue: La nota [a] del borrador ofrece solo 'lugar de refugio', que no preserva bien la alternativa auditada de 'songs/shouts/cries' ni la de 'hiding place/shelter/secret place'.
    rationale: Si se mantiene una nota léxica en el primer sintagma, conviene reflejar mejor las alternativas documentadas para סֵתֶר, como 'refugio' o 'lugar secreto', según el audit trail.
  revised_spanish_text: Tú eres un escondite para mí[a]; de la angustia me preservas; me rodeas con gritos de liberación. Selah[b]
  revised_footnotes:
  - marker: a
    text: O 'refugio' o 'lugar secreto'.
    reason: lexical_alternative
  - marker: b
    text: '''Selah'' probablemente es una notación musical o litúrgica; su significado preciso es incierto.'
    reason: cultural_note
  revision_rationale: Se ajusta סֵתֶר a una imagen más concreta y fiel al hebreo y al audit trail ('escondite' en vez de 'refugio' como texto principal), manteniendo una nota con alternativas españolas naturales. También se restaura la nota de 'Selah' conforme al inglés POB y se evita desplazarla innecesariamente a 'gritos de liberación'. El resto del versículo es sólido y no requiere adjudicación compleja.
