translation:
  language: es
  text: 'No digas[a]: «Mira, he hecho lo que deseaba; ¿y qué me faltará ahora?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Antes del fin no llames dichoso a nadie, y por sus hijos se conocerá un hombre». El testimonio hebreo aquí, en cambio, advierte: «No digas: “Mira, he hecho lo que deseaba; ¿y qué me faltará ahora?”».'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תֹּאמַר
  english_pob_choice: Do not say
  chosen_spanish: No digas
  alternatives_spanish:
  - No hables
  - Nunca digas
  lexicon: HALOT
  rationale: La prohibición directa se expresa con naturalidad en español mediante un imperativo negativo breve y claro.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: Conserva el gesto deíctico e introducción enfática de la autoafirmación sin recurrir a un calco arcaico.
- source_word: עָשִׂיתִי
  english_pob_choice: I have done
  chosen_spanish: he hecho
  alternatives_spanish:
  - hice
  - he realizado
  lexicon: HALOT
  rationale: El perfecto hebreo se refleja bien con perfecto compuesto español para expresar acción concluida con relevancia presente.
- source_word: חֶפְצִי
  english_pob_choice: what I desired
  chosen_spanish: lo que deseaba
  alternatives_spanish:
  - mi deseo
  - lo que quise
  - lo que me agradaba
  lexicon: HALOT
  rationale: «Deseaba» conserva el matiz de anhelo o voluntad personal y suena más natural que una traducción sustantivada rígida.
- source_word: וּמֶה עַתָּה
  english_pob_choice: and what now
  chosen_spanish: ¿y qué me faltará ahora?
  alternatives_spanish:
  - ¿y qué habrá ahora que me falte?
  - ¿qué me faltará ahora?
  lexicon: HALOT
  rationale: Sigue el sentido del hebreo transmitido, que pregunta por la carencia futura, y mantiene la conjunción explícita con «y» como revisó el audit trail.
- source_word: יֵעָזֵב לִי
  english_pob_choice: will be lacking to me
  chosen_spanish: me faltará
  alternatives_spanish:
  - se me dejará
  - me quedará por falta
  lexicon: HALOT
  rationale: En este contexto de autosatisfacción, «me faltará» comunica de modo idiomático la idea de carencia o insuficiencia, sin perder la tensión semántica del hebreo transmitido.
theological_decisions:
- issue: Relación entre la lectura hebrea conservada y el paralelo griego divergente
  english_pob_reading: Translate the extant Hebrew directly, while allowing the Greek to confirm the verse's admonitory thrust rather than importing the Greek's substantially different wording into the main text.
  chosen_spanish_reading: Traducir directamente el hebreo conservado y dejar el paralelo griego solo en nota como lectura alternativa significativa.
  alternative_spanish_readings:
  - 'Adoptar la formulación griega: «Antes del fin no llames dichoso a nadie, y por sus hijos se conocerá un hombre».'
  - Fusionar hebreo y griego en una sola redacción ecléctica.
  rationale: El testimonio hebreo aquí es explícito y, según el audit trail, tiene primacía donde está conservado. El griego presenta una advertencia afín, pero verbalmente distinta; por eso no debe reemplazar la lectura hebrea en el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo cuando se conserva; usar el paralelo griego como apoyo y nota de variante cuando diverge sustancialmente.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail, que añadió explícitamente la conjunción correspondiente a וּמֶה (‘y qué’) y mantuvo la formulación del hebreo transmitido, mientras conserva el paralelo griego únicamente en nota.
  spanish_consistency_notes:
  - Se mantiene el tono sapiencial admonitorio con un imperativo negativo directo.
  - Se evita sustituir la lectura hebrea por la griega en el cuerpo del texto, conforme a la prioridad del testimonio conservado.
  - La nota preserva la tensión textual entre hebreo y griego sin armonizarlos artificialmente.
  - El verbo «deseaba» y la pregunta final con «me faltará» reflejan la autoconfianza criticada en el hebreo.
