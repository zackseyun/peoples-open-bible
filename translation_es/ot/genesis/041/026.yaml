translation:
  language: es
  text: Las siete vacas buenas son siete años, y las siete espigas[a] buenas son siete años; es un solo sueño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espigas de grano». El término hebreo se refiere a la parte superior de la planta que porta el grano.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּרֹת
  english_pob_choice: cows
  chosen_spanish: vacas
  alternatives_spanish:
  - ganado
  - reses
  lexicon: HALOT
  rationale: El hebreo se refiere específicamente a hembras bovinas, como en el sueño de Faraón. «Vacas» conserva esa precisión con naturalidad en español.
- source_word: הַטֹּבֹת
  english_pob_choice: good
  chosen_spanish: buenas
  alternatives_spanish:
  - buenas de aspecto
  - finas
  - sanas
  lexicon: HALOT
  rationale: El adjetivo expresa bondad/qualidad general; «buenas» reproduce directamente el valor del término sin añadir una interpretación secundaria.
- source_word: שָׁנִים
  english_pob_choice: years
  chosen_spanish: años
  alternatives_spanish:
  - tiempos
  lexicon: HALOT
  rationale: La interpretación del sueño identifica explícitamente las vacas y espigas como «años»; «años» es el equivalente directo y claro.
- source_word: שִׁבֳּלִים
  english_pob_choice: ears of grain
  chosen_spanish: espigas
  alternatives_spanish:
  - espigas de grano
  - cabezas de grano
  lexicon: HALOT
  rationale: El término hebreo designa la parte superior portadora del grano. En español, «espigas» es breve, natural y suficientemente preciso; el contexto ya aclara que son espigas de cereal.
- source_word: חֲלוֹם אֶחָד הוּא
  english_pob_choice: it is one dream
  chosen_spanish: es un solo sueño
  alternatives_spanish:
  - es un sueño único
  - es el mismo sueño
  lexicon: HALOT
  rationale: La construcción hebrea subraya la unidad del mensaje. «Un solo sueño» conserva esa fuerza singular sin sonar forzado en español.
- source_word: הֵנָּה
  english_pob_choice: are
  chosen_spanish: son
  alternatives_spanish:
  - son ellas
  lexicon: HALOT
  rationale: La forma hebrea funciona como cópula implícita en plural femenino; en español se expresa naturalmente con «son».
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la lectura auditada del POB en inglés y conserva la misma resolución semántica para los símbolos del sueño: vacas/espigas = años, con la unidad del sueño expresada de forma explícita.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo exige; este versículo no contiene el nombre divino.
  - Se mantiene «espigas» como equivalente natural de שִׁבֳּלִים, con nota para la alternativa más literal «espigas de grano».
  - La frase final conserva el singular enfático «un solo sueño», paralelo al inglés auditado.
