base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/017/013.yaml
  text: And if he withdraws into a city[a], then all Israel will bring ropes to that city[b], and we will drag it to the wadi until not even a small stone is found there.
  footnotes:
  - marker: a
    text: Or 'brook' or 'stream' for 'wadi' (Heb. naḥal), a seasonal watercourse or ravine.
    reason: lexical_alternative
  - marker: b
    text: Or 'not even a small stone.' The Hebrew says 'not even a pebble/stone' as a hyperbolic image of total destruction.
    reason: lexical_alternative
