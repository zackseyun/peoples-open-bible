review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo: el lugar elegido por Yahvé, el motivo de que su nombre habite allí, el mandato de llevar allí todas las ofrendas enumeradas, y el uso de Yahvé para יְהוָה. Sin embargo, hay dos desajustes relevantes con el texto fuente y con la auditoría inglesa: (1) לְשַׁכֵּן שְׁמוֹ שָׁם se puso en el texto principal con el causativo explícito (''hacer que... habite''), cuando la decisión POB para el texto principal preserva la imagen de morar sin explicitar el causativo y reserva la forma más formal para nota; (2) אֲשֶׁר תִּדְּרוּ לַיהוָה no significa ''que ustedes harán a Yahvé'' sino ''que ustedes harán/votarán como votos a Yahvé'' o más naturalmente ''que ustedes le harán a Yahvé'' / ''que ustedes prometerán a Yahvé''; el borrador actual omite el matiz verbal de ''votar/hacer voto''.'
  spanish_quality_summary: El español es mayormente claro y digno, pero conviene pulirlo para mayor naturalidad bíblica y precisión. 'su Dios' dirigido a plural puede sonar ambiguo; 'Yahvé su Dios' o 'Yahvé, el Dios de ustedes' funciona mejor. 'Para hacer que allí habite su nombre' suena más pesado de lo necesario en texto principal. 'Que ustedes harán a Yahvé' con antecedente 'votos' es poco idiomático y puede sonar a simple realización de actos, no a formular votos. Una redacción más natural y fiel mejora sustancialmente la lectura.
  glossary_alignment: Se alinea bien con los términos del proyecto en 'Yahvé', 'holocaustos', 'sacrificios' y 'diezmos'. 'La contribución de su mano' preserva adecuadamente el hebraísmo. 'Votos' es aceptable para נדרים conforme a la revisión inglesa que evitó añadir 'ofrendas', pero la cláusula relativa debe conservar el verbo de hacer voto. La nota debe quedar asociada al giro principal 'para que su nombre habite allí', con la alternativa formal causativa en nota.
  issues:
  - severity: high
    issue: El texto principal explicita el causativo en לְשַׁכֵּן שְׁמוֹ שָׁם en vez de reservarlo para nota.
    rationale: La auditoría inglesa documenta como texto principal 'for his name to dwell there' y preserva 'to cause his name to dwell there' como alternativa más formal en nota. En español, 'para que su nombre habite allí' corresponde mejor a esa decisión.
  - severity: high
    issue: La cláusula 'que ustedes harán a Yahvé' no refleja con precisión אֲשֶׁר תִּדְּרוּ לַיהוָה.
    rationale: El verbo נדר significa hacer/votar un voto. 'Harán a Yahvé' es demasiado genérico y puede perder el sentido de promesa votiva. Debe expresarse 'que le harán a Yahvé' o 'que ustedes harán como votos a Yahvé'; la opción más natural es 'que le harán a Yahvé' con antecedente explícito 'votos'.
  - severity: medium
    issue: El pronombre en 'Yahvé, su Dios' puede resultar menos claro en segunda persona plural.
    rationale: Aunque posible, en español bíblico actual suele leerse mejor 'Yahvé su Dios' sin coma, o 'Yahvé, el Dios de ustedes'. Evita ambigüedad referencial innecesaria.
  revised_spanish_text: 'Entonces, el lugar que Yahvé su Dios escogerá para que su nombre habite allí[a], a ese lugar llevarán todo lo que yo les mando: sus holocaustos, sus sacrificios, sus diezmos, la contribución de su mano y todo lo mejor de sus votos, que le harán a Yahvé.'
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «para hacer que su nombre habite allí».'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto principal a la decisión POB sobre la teología del nombre: se mantiene la imagen de que el nombre habite allí, mientras el causativo formal queda en nota. También se corrige la cláusula final para conservar el sentido de hacer votos a Yahvé sin la formulación poco idiomática ''harán a Yahvé''. Se mejora además la claridad de ''Yahvé su Dios'' en español.'
