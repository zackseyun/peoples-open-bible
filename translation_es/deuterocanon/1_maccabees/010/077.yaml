base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/010/077.yaml
  text: And Apollonius heard[a], and he encamped with three thousand cavalry and a large force, and went to Azotus as though passing through, and at the same time advanced into the plain[b], because he had a multitude of cavalry and trusted in it.
  footnotes:
  - marker: a
    text: Or 'as if merely passing by.' The Greek suggests that Apollonius presented his movement as a transit rather than an overt attack.
    reason: lexical_alternative
  - marker: b
    text: The Greek uses 'horse' collectively for mounted troops; hence 'cavalry.'
    reason: cultural_note
