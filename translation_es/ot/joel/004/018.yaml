translation:
  language: es
  text: Y en aquel día, los montes destilarán vino dulce, y los collados rebosarán de leche, y todos los cauces de Judá fluirán con agua; y un manantial saldrá de la casa de Yahvé y regará el Valle de Sitim[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el valle de las acacias» o «el Wadi de las Acacias».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה בַּיּוֹם הַהוּא
  english_pob_choice: And in that day
  chosen_spanish: Y en aquel día
  alternatives_spanish:
  - Y sucederá en aquel día
  - Y será en aquel día
  lexicon: HALOT
  rationale: La fórmula hebrea introduce un escenario futuro de carácter profético. «En aquel día» conserva el giro idiomático con naturalidad en español y sin añadir más de lo que el texto expresa.
- source_word: יִטְּפוּ
  english_pob_choice: will drip
  chosen_spanish: destilarán
  alternatives_spanish:
  - gotearán
  - manarán
  lexicon: HALOT
  rationale: El verbo transmite la imagen de un goteo o flujo tenue. «Destilarán» preserva esa metáfora con buena naturalidad en español y comunica abundancia sin suavizarla demasiado.
- source_word: עָסִיס
  english_pob_choice: sweet wine
  chosen_spanish: vino dulce
  alternatives_spanish:
  - vino nuevo
  - mosto
  lexicon: HALOT
  rationale: La palabra designa jugo de uva recién prensado o vino joven con matiz de dulzura/abundancia. «Vino dulce» sigue de cerca la decisión inglesa y comunica la imagen de fertilidad del texto; «mosto» sería más técnico y «vino nuevo» puede sonar ambiguo.
- source_word: וְהַגְּבָעוֹת תֵּלַכְנָה חָלָב
  english_pob_choice: and the hills will flow with milk
  chosen_spanish: y los collados fluirán con leche
  alternatives_spanish:
  - y los collados irán con leche
  - y los collados correrán leche
  lexicon: HALOT
  rationale: El hebreo usa «irán/andarán» de modo idiomático, pero el sentido es de movimiento abundante. «Fluirán con leche» reproduce la imagen en español con claridad y mantiene el paralelismo poético.
- source_word: וְכָל אֲפִיקֵי יְהוּדָה יֵלְכוּ מָיִם
  english_pob_choice: and all the streambeds of Judah will flow with water
  chosen_spanish: y todos los cauces de Judá irán llenos de agua
  alternatives_spanish:
  - y todos los torrentes de Judá fluirán con agua
  - y todos los cauces de Judá fluirán con agua
  lexicon: HALOT
  rationale: אֲפִיקִים son canales, barrancos o lechos de corrientes; «cauces» es una equivalencia concreta y comprensible. «Irán llenos de agua» conserva el uso idiomático de יֵלְכוּ sin sonar forzado en español.
- source_word: מַעְיָן
  english_pob_choice: a spring
  chosen_spanish: una fuente
  alternatives_spanish:
  - un manantial
  - una fuente de agua
  lexicon: HALOT
  rationale: El término puede referirse a un surgente natural de agua. «Fuente» es una equivalencia clara y bíblicamente natural en español; «manantial» también sería posible, pero «fuente» enlaza bien con la imagen del texto sin perder el sentido.
- source_word: מִבֵּית יְהוָה
  english_pob_choice: from the house of Yahweh
  chosen_spanish: de la casa de Yahvé
  alternatives_spanish:
  - del templo de Yahvé
  - de la casa de Yahveh
  lexicon: HALOT
  rationale: La base hebrea dice literalmente «casa», y el contexto cultual hace referencia al santuario. Se conserva «casa de Yahvé» para mantener la cercanía al hebreo sin sustituirla por «templo», que sería más interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde con el nombre divino transliterado, conforme al criterio del proyecto. «Yahvé» preserva el nombre propio del pacto en lugar de ocultarlo con un título.
- source_word: וְהִשְׁקָה
  english_pob_choice: will water
  chosen_spanish: regará
  alternatives_spanish:
  - dará de beber a
  - irr igará
  lexicon: HALOT
  rationale: El causativo expresa hacer beber o suministrar agua. «Regará» es natural en español y encaja con la imagen de un manantial que nutre un valle.
- source_word: נַחַל הַשִּׁטִּים
  english_pob_choice: the Valley of Shittim
  chosen_spanish: el Valle de Sitim
  alternatives_spanish:
  - el valle de las acacias
  - el Wadi de las Acacias
  lexicon: HALOT
  rationale: Se conserva el topónimo probable para no diluir la referencia geográfica y simbólica. «Sitim» es una transliteración española más accesible; las alternativas descriptivas quedan abiertas como lectura posible del término relacionado con acacias.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se mantiene el principio de no reemplazar el nombre personal divino por una sustitución honorífica. «Yahvé» conserva la referencia al nombre del pacto revelado en el texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tratamiento de נַחַל הַשִּׁטִּים
  english_pob_reading: the Valley of Shittim
  chosen_spanish_reading: el Valle de Sitim
  alternative_spanish_readings:
  - el valle de las acacias
  - el Wadi de las Acacias
  rationale: El hebreo puede entenderse como un nombre propio de lugar o como una expresión vinculada a acacias. Se preserva la lectura toponímica para no borrar la tensión semántica; la alternativa descriptiva sigue siendo válida como posibilidad interpretativa.
  doctrine_reference: 'Footnote policy: preserve meaningful alternatives when the source allows a lexical tension'
translation_notes:
  revision_awareness: El pasaje no muestra revisiones aplicadas en el paquete de auditoría; la versión inglesa más reciente permanece sin cambios y con alta concordancia del revisor. Por eso, la redacción española sigue de cerca las decisiones léxicas ya auditadas y no introduce variantes no respaldadas por la fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, coherente con el criterio general del proyecto.
  - «Casa de Yahvé» conserva el hebreo בַּיִת sin sustituirlo por «templo» salvo necesidad interpretativa.
  - «Sitim» se usa como transliteración española del topónimo, con nota para la lectura alternativa de acacias.
  - 'La imagen poética de abundancia se preserva con verbos de flujo: «destilarán», «fluirán», «irán llenos», «regará».'
