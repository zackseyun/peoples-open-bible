    changes_summary: Changed 'troubled' to 'grudging' for better lexical accuracy of לֹא יֵרַע לְבָבְךָ ('your heart shall not be resentful/grieved'). Simplified 'this thing' to 'this' for more natural English while preserving meaning.
translation:
  language: es
  text: Ciertamente le darás[a], y tu corazón no será mezquino[b] cuando le des; porque por causa de esto Yahvé tu Dios te bendecirá en toda tu obra y en todo lo que emprendas con tu mano[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «darás, sí darás»; el infinitivo absoluto intensifica el mandato.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «tu corazón no se resentirá» o «no darás de mala gana» al darle.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «en todo envío de tu mano»; es decir, en todo lo que emprendas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתוֹן תִּתֵּן
  english_pob_choice: You shall surely give
  chosen_spanish: Darás sin falta
  alternatives_spanish:
  - Darás con certeza
  - Ciertamente darás
  lexicon: HALOT
  rationale: El infinitivo absoluto con el imperfecto intensifica el mandato. «Sin falta» conserva la fuerza enfática sin añadir un matiz ajeno como «generosamente».
- source_word: לּוֹ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - a él/ella
  - al necesitado
  lexicon: HALOT
  rationale: El sufijo masculino singular se conserva como referencia al hermano necesitado del contexto inmediato. «A él» mantiene la correspondencia formal con el hebreo.
- source_word: וְלֹא יֵרַע לְבָבְךָ
  english_pob_choice: your heart shall not be grudging
  chosen_spanish: no se entristecerá tu corazón
  alternatives_spanish:
  - no resentirá tu corazón
  - no se amargará tu corazón
  lexicon: HALOT
  rationale: יֵרַע expresa una reacción interior negativa. En español, «se entristecerá» refleja la afección interna sin forzar una lectura moralizante; se preserva así la tensión entre dolor interior y generosidad requerida.
- source_word: בְּתִתְּךָ לוֹ
  english_pob_choice: when you give to him
  chosen_spanish: cuando le des
  alternatives_spanish:
  - al dar le
  - cuando das a él
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo se vierte naturalmente como «cuando le des», manteniendo la circunstancia de la acción sin calco excesivo.
- source_word: כִּי בִּגְלַל הַדָּבָר הַזֶּה
  english_pob_choice: because on account of this
  chosen_spanish: porque por causa de esto
  alternatives_spanish:
  - porque a causa de esto
  - porque por este motivo
  lexicon: HALOT
  rationale: בִּגְלַל indica causalidad. «Por causa de esto» es claro y cercano al hebreo, conservando el enlace causal con el acto de dar.
- source_word: יְבָרֶכְךָ
  english_pob_choice: will bless you
  chosen_spanish: te bendecirá
  alternatives_spanish:
  - te dará bendición
  - te colmará de bendición
  lexicon: HALOT
  rationale: בָּרַךְ se traduce de forma directa como «bendecir». No se amplía el verbo, para no diluir la promesa explícita.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el Señor
  lexicon: Project default for YHWH
  rationale: 'Se sigue el término base del proyecto para יהוה: «Yahvé», preservando el nombre propio divino y evitando la sustitución por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La fórmula pactual se vierte de manera directa como «tu Dios», manteniendo la relación de pertenencia del pacto.
- source_word: בְּכָל מַעֲשֶׂךָ
  english_pob_choice: in all your work
  chosen_spanish: en toda tu obra
  alternatives_spanish:
  - en todo tu trabajo
  - en todas tus labores
  lexicon: HALOT
  rationale: מַעֲשֶׂה es amplio y puede abarcar lo hecho o realizado. «Obra» conserva esa amplitud mejor que un término exclusivamente laboral.
- source_word: וּבְכֹל מִשְׁלַח יָדֶךָ
  english_pob_choice: in every undertaking of your hand
  chosen_spanish: en todo lo que emprendas con tu mano
  alternatives_spanish:
  - en toda empresa de tu mano
  - en todo lo que pongas por obra
  lexicon: HALOT
  rationale: La expresión idiomática hebrea describe lo que la mano «envía» a hacer. «Emprendas con tu mano» mantiene la imagen y comunica bien la idea de toda empresa o actividad.
theological_decisions:
- issue: Renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el Señor
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Se conserva el nombre propio divino en español con la forma estable del proyecto, en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Matiz de לֹא יֵרַע לְבָבְךָ
  english_pob_reading: your heart shall not be grudging
  chosen_spanish_reading: no se entristecerá tu corazón
  alternative_spanish_readings:
  - no resentirá tu corazón
  - tu corazón no estará disgustado
  rationale: La hebra apunta a una reacción interior negativa ante el dar. «Entristecerá» conserva el componente afectivo sin convertirlo en una paráfrasis demasiado interpretativa; además deja visible la tensión entre dar y la reacción del corazón.
  doctrine_reference: 'Lexical/theological tension in Deut 15:10: inward reluctance vs. generosity'
- issue: Pronombre singular masculino para el receptor
  english_pob_reading: to him
  chosen_spanish_reading: a él
  alternative_spanish_readings:
  - a ellos
  - a la persona
  rationale: El sufijo hebreo es masculino singular y el contexto inmediato habla del hermano necesitado. Se mantiene la concordancia con el sujeto implícito del texto fuente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión inglesa en dos puntos relevantes: mantiene la intensidad de la obligación con un equivalente enfático y opta por una expresión española natural para la reacción interior del corazón; también conserva la causalidad breve de «because on account of this» sin expandirla innecesariamente. Se adopta Yahvé conforme al estándar del proyecto y se preserva el masculino singular del destinatario.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה de forma consistente con el proyecto.
  - Se mantiene «tu Dios» como fórmula pactual directa.
  - «Obra» y «emprendas con tu mano» conservan la amplitud del hebreo sin sobreespecificar.
  - Las notas a pie de página señalan alternativas léxicas reales sin duplicar marcadores.
