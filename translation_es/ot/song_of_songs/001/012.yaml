translation:
  language: es
  text: Mientras el rey estaba[a] en su mesa, mi nardo[b] dio su fragancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su banquete» o «sobre su lecho». El término hebreo puede referirse más ampliamente a un banquete o a la compañía reclinada.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, «mi espicanardo».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  english_pob_choice: While
  chosen_spanish: Mientras
  alternatives_spanish:
  - Hasta
  - Tan pronto como
  lexicon: HALOT
  rationale: En este contexto poético, la función temporal es circunstancial; «Mientras» reproduce bien la simultaneidad indicada por la lectura inglesa y suena natural en español sin volver la frase terminativa como «hasta».
- source_word: שֶׁהַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el Rey
  lexicon: HALOT
  rationale: El hebreo presenta un sustantivo definido y la POB inglesa lo entiende como el amante real dentro de la imaginería del poema, no como título teológico. En español, minúscula conserva ese sentido literario.
- source_word: בִּמְסִבּוֹ
  english_pob_choice: at his table
  chosen_spanish: en su mesa
  alternatives_spanish:
  - en su banquete
  - en su lecho
  - en su círculo de convidados reclinados
  lexicon: HALOT
  rationale: La raíz puede referirse a mesa/banquete/reunión de comensales reclinados. «En su mesa» es una solución concreta y idiomática que mantiene la imagen de comida o banquete sin sobreespecificar.
- source_word: נִרְדִּי
  english_pob_choice: my nard
  chosen_spanish: mi nardo
  alternatives_spanish:
  - mi espicanardo
  lexicon: HALOT
  rationale: «Nardo» es el equivalente directo y reconocido en español; conserva el valor léxico del aromático sin depender de una forma más tradicional pero menos actual.
- source_word: נָתַן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - despidió
  - emitió
  lexicon: HALOT
  rationale: El verbo hebreo común se conserva con el verbo español básico «dio», que en esta construcción idiomática permite expresar naturalmente la emisión de aroma.
- source_word: רֵיחוֹ
  english_pob_choice: its fragrance
  chosen_spanish: su fragancia
  alternatives_spanish:
  - su aroma
  - su olor
  lexicon: HALOT
  rationale: El sufijo posesivo se vierte como «su» referido a «mi nardo». «Fragancia» conserva el matiz positivo y poético del contexto amoroso mejor que «olor».
theological_decisions:
- issue: Si «el rey» debe leerse como título teológico o tipológico
  english_pob_reading: lowercase 'the king' as poetic/literary referent within Song of Songs
  chosen_spanish_reading: «el rey» en minúscula como referente poético dentro del Cantar
  alternative_spanish_readings:
  - «el Rey» con capitalización devocional
  - una lectura alegórica/mesiánica explícita
  rationale: El hebreo no exige una lectura teológica aquí, y la POB inglesa evita imponerla. Mantener minúscula respeta el sentido literal-poético y no borra la tensión interpretativa, pero tampoco la fuerza hacia una tipología no documentada en el texto.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; por eso esta propuesta mantiene la solución estable del sentido principal y solo explicita en español las alternativas léxicas documentadas en la auditoría inglesa.
  spanish_consistency_notes:
  - Se conserva el tratamiento poético de «el rey» en minúscula, coherente con la lectura literaria del pasaje.
  - «Nardo» se usa como término léxico directo y no se sustituye por una forma eclesiástica tradicional sin necesidad contextual.
  - La frase «dio su fragancia» sigue de cerca la construcción verbal hebrea sin forzar una paráfrasis amplia.
  - 'La nota al pie sobre בִּמְסִבּוֹ preserva la ambigüedad registrada por la POB: mesa, banquete o lecho reclinado.'
