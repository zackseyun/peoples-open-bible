base_translation:
  language: en
  yaml_path: translation/ot/1_kings/002/044.yaml
  text: Then the king said to Shimei[a], “You know all the evil that your heart knows, which you did to David my father[b]; and Yahweh has returned your evil on your own head.”
  footnotes:
  - marker: a
    text: Or, “that you know in your heart.” The Hebrew literally says, “that your heart knows,” emphasizing Shimei’s inward awareness of his guilt.
    reason: lexical_alternative
  - marker: b
    text: Or, “has returned” or “has repaid.” The Hebrew verb carries the sense of causing Shimei’s evil to come back upon him.
    reason: lexical_alternative
