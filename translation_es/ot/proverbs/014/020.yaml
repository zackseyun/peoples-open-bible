  text: גַּם לְ֭/רֵעֵ/הוּ יִשָּׂ֣נֵא רָ֑שׁ וְ/אֹהֲבֵ֖י עָשִׁ֣יר רַבִּֽים־׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/014/020.yaml
  text: Even his neighbor hates a poor man[b][a], but the friends of a rich man are many.
  footnotes:
  - marker: a
    text: Or 'Even his friend hates a poor man.' The Hebrew רֵעַ can mean 'friend,' 'companion,' or 'neighbor.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and the lovers of a rich man are many,' meaning many people attach themselves to the rich.
    reason: lexical_alternative
