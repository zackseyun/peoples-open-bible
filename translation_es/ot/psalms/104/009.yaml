translation:
  language: es
  text: Pusiste un límite[a] que no pasarán; no volverán para cubrir la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “frontera” o “borde”.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, las aguas no volverán a cubrir la tierra.
    reason: cross_reference
lexical_decisions:
- source_word: גְּבוּל
  english_pob_choice: boundary
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - linde
  - borde
  lexicon: HALOT
  rationale: גְּבוּל nombra una delimitación fija. En español, 'límite' comunica bien la idea de una línea fijada por Dios para contener las aguas. 'Frontera' y 'borde' son posibles, pero 'límite' suena más natural en este contexto cósmico.
- source_word: שַׂמְתָּ
  english_pob_choice: you set
  chosen_spanish: pusiste
  alternatives_spanish:
  - colocaste
  - estableciste
  - pusiste como
  lexicon: HALOT
  rationale: שׂוּם significa 'poner, colocar, establecer'. 'Pusiste' mantiene la sencillez y la concreción del verbo hebreo; 'estableciste' sería más interpretativo y solemne, pero menos directo.
- source_word: בַּל
  english_pob_choice: may not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no podrán
  - no deben
  - no les será posible
  lexicon: HALOT
  rationale: 'En español, el valor prohibitivo/constriñente de בַּל puede expresarse con una negación simple en futuro o presente proyectado: ''no pasarán'', ''no volverán''. No hace falta añadir un modal equivalente a ''may not'' para que el sentido sea claro.'
- source_word: יַעֲבֹרוּ
  english_pob_choice: they may not cross
  chosen_spanish: pasarán
  alternatives_spanish:
  - cruzarán
  - pasarán por encima
  - traspasarán
  lexicon: HALOT
  rationale: עָבַר en este marco de aguas y límite se entiende como 'pasar' o 'cruzar'. 'Pasarán' con la negación previa reproduce bien el sentido de una barrera fijada por Dios sin forzar un calco pesado.
- source_word: יְשׁוּבוּ
  english_pob_choice: they may not return
  chosen_spanish: volverán
  alternatives_spanish:
  - regresarán
  - volverán atrás
  - retornarán
  lexicon: HALOT
  rationale: שׁוּב es 'volver/retornar'. 'Volverán' es la forma más natural y directa en español para el movimiento de regreso de las aguas.
- source_word: לְכַסּוֹת
  english_pob_choice: to cover
  chosen_spanish: para cubrir
  alternatives_spanish:
  - a cubrir
  - para inundar
  - para tapar
  lexicon: HALOT
  rationale: כּסה significa 'cubrir'. Se conserva el infinitivo de propósito con 'para cubrir', manteniendo el vínculo con la imagen de las aguas que cubren la tierra.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  - el suelo
  lexicon: HALOT
  rationale: En poesía hebrea, הָאָרֶץ puede abarcar la tierra como esfera habitada. Aquí 'la tierra' es la equivalencia más natural y suficientemente amplia para el contexto de creación.
theological_decisions:
- issue: Referente plural de los verbos
  english_pob_reading: The plural pronouns refer to the waters constrained by God's decree.
  chosen_spanish_reading: Los verbos en plural se refieren a las aguas contenidas por el decreto de Dios.
  alternative_spanish_readings:
  - Se refiere de modo más general a las aguas del caos.
  - Puede entenderse como las aguas del diluvio en lectura tipológica.
  rationale: El contexto inmediato habla de las aguas que retroceden y quedan delimitadas. La traducción no introduce un sujeto nuevo; deja implícito que son las aguas las que no cruzarán ni volverán a cubrir la tierra.
  doctrine_reference: Salmo 104; Génesis 1:9-10; Génesis 9:11-15
- issue: Valor de la negación בַּל
  english_pob_reading: may not
  chosen_spanish_reading: no pasarán / no volverán
  alternative_spanish_readings:
  - no pueden pasar / no pueden volver
  - no deberán pasar / no deberán volver
  rationale: El hebreo expresa una restricción impuesta por Dios. En español, el futuro negativo transmite bien la certeza del límite divino sin introducir matices voluntaristas ajenos al texto.
  doctrine_reference: Salmo 104:9
translation_notes:
  revision_awareness: El texto inglés POB ya dejó establecida la lectura de las aguas como sujeto implícito y mantuvo la ambigüedad léxica de גְּבוּל mediante una nota. La versión española conserva ese sentido, pero opta por un futuro negativo natural ('no pasarán; no volverán') para reflejar con claridad la prohibición/limitación del hebreo sin perder la imagen de las aguas contenidas. No se requiere revisión adicional frente al audit trail disponible.
  spanish_consistency_notes:
  - Se usa 'límite' para גְּבוּל, en coherencia con el valor semántico del término y con el estilo bíblico contemporáneo del proyecto.
  - Se evita 'SEÑOR' porque el versículo no contiene el Tetragrámaton; el hablante implícito es Dios por contexto.
  - '''La tierra'' conserva el alcance cósmico del pasaje mejor que una restricción local como ''la tierra'' en sentido agrícola; aquí funciona como equivalente estándar de הָאָרֶץ.'
  - Se mantiene una sintaxis breve y poética, sin añadir explicaciones al cuerpo del versículo; la aclaración va en la nota b.
