translation:
  language: es
  text: Acaz, su hijo[a], Ezequías, su hijo, Manasés, su hijo.
  philosophy: formal
  footnotes:
  - marker: a
    text: En genealogías, el hebreo «hijo» puede funcionar en ocasiones como «descendiente»; aquí se conserva «hijo» porque el texto usa la fórmula genealógica directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָחָז
  english_pob_choice: Ahaz
  chosen_spanish: Acaz
  alternatives_spanish:
  - Ahaz
  lexicon: HALOT
  rationale: Nombre propio. En español bíblico de uso amplio, la forma tradicional y reconocible es «Acaz», que preserva la identidad del personaje sin traducirlo.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  lexicon: HALOT
  rationale: El constructo בן con sufijo posesivo de 3ms significa de manera directa «su hijo». En una genealogía puede abarcar un descendiente más remoto, pero la fórmula del texto aquí es la sucesión genealógica estándar, por lo que «su hijo» mantiene la transparencia formal.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Hizquías
  lexicon: HALOT
  rationale: Nombre propio; «Ezequías» es la transliteración bíblica establecida en español y resulta más natural para el lector que una transliteración más literal.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  lexicon: HALOT
  rationale: La repetición del patrón genealógico se conserva en español con la misma expresión para reflejar la estructura del hebreo.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: HALOT
  rationale: Nombre propio; la forma española consolidada es «Manasés».
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  lexicon: HALOT
  rationale: Se mantiene la misma equivalencia para la tercera ocurrencia a fin de preservar la cadencia y la fórmula genealógica del texto fuente.
translation_notes:
  revision_awareness: El texto base en inglés no requirió revisiones y mostró alto acuerdo con la fuente hebrea; por eso la versión española sigue de cerca la estructura tripartita del original y mantiene el sentido genealógico directo sin ampliar ni suavizar el contenido.
  spanish_consistency_notes:
  - Se conservaron tres repeticiones de «su hijo» para reflejar la secuencia hebrea sin introducir variación estilística innecesaria.
  - Los nombres propios se adaptaron a las formas bíblicas habituales en español para legibilidad y reconocimiento.
  - La nota al pie marca únicamente la posible amplitud semántica de «hijo» en genealogías, tal como lo documenta el audit trail en inglés.
