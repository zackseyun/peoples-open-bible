translation:
  language: es
  text: Pero seguían difundiendo el rumor acerca del desacuerdo sobre los actos de homenaje[a] y los alimentos, diciendo que esos hombres no estarían de acuerdo ni con el rey ni con las autoridades, sino que eran hostiles y se oponían mucho a los asuntos públicos[b]; y les impusieron un temor nada común[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adoración» o «reverencias». El griego de προσκυνήσεων puede abarcar gestos de homenaje cortesano o reverencia religiosa, y aquí se conserva esa ambigüedad.
    reason: lexical_alternative
  - marker: b
    text: Lit., «se oponían mucho a los asuntos». El giro griego se refiere al orden o a los asuntos públicos del reino; por eso se expresa así en español.
    reason: lexical_alternative
  - marker: c
    text: Lit., «les adhirieron no un temor cualquiera». La expresión significa que les cargaron una fuerte sospecha o temor público.
    reason: lexical_alternative
lexical_decisions:
- source_word: διάστασιν
  english_pob_choice: disagreement
  chosen_spanish: discordia
  alternatives_spanish:
  - desacuerdo
  - división
  - disensión
  lexicon: LSJ
  rationale: El término puede señalar separación o conflicto. «Discordia» comunica bien la tensión social y religiosa del contexto sin exagerarlo como rebelión abierta.
- source_word: προσκυνήσεων
  english_pob_choice: acts of homage
  chosen_spanish: actos de homenaje
  alternatives_spanish:
  - adoración
  - postraciones
  - reverencias
  lexicon: LSJ
  rationale: La palabra griega admite reverencia cultual o cortesana. «Actos de homenaje» conserva esa ambigüedad mejor que «adoración», que sería más restringido.
- source_word: τροφῶν
  english_pob_choice: foods
  chosen_spanish: los alimentos
  alternatives_spanish:
  - las prácticas alimentarias
  - las leyes alimentarias
  - la comida
  lexicon: LSJ
  rationale: El griego dice literalmente «alimentos». En español, «los alimentos» mantiene la referencia directa sin añadir una interpretación más amplia de la que el texto exige.
- source_word: ἐθρύλουν
  english_pob_choice: kept spreading talk
  chosen_spanish: seguían difundiendo el rumor
  alternatives_spanish:
  - seguían chismeando
  - circulaban rumores
  - repetían públicamente
  lexicon: LSJ
  rationale: El imperfecto indica acción continua y el verbo tiene un matiz de rumor o habladuría. «Seguían difundiendo el rumor» reproduce la continuidad y el tono despectivo.
- source_word: φάσκοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - afirmando
  - alegando
  lexicon: LSJ
  rationale: Introduce el contenido de la acusación de manera idiomática y sin añadir más fuerza que la del propio contexto.
- source_word: ὁμοτρόπως ... γίνεσθαι
  english_pob_choice: be in accord
  chosen_spanish: estarían en armonía
  alternatives_spanish:
  - serían del mismo modo
  - se conformarían igual
  - tendrían la misma conducta
  lexicon: LSJ
  rationale: La expresión apunta a compartir una misma manera o disposición. «Estar en armonía» es natural en español y conserva la idea de concordancia sin reducirla solo a opiniones.
- source_word: ταῖς δυνάμεσιν
  english_pob_choice: the authorities
  chosen_spanish: las autoridades
  alternatives_spanish:
  - las potestades
  - las fuerzas
  - el poder real
  lexicon: LSJ
  rationale: En este contexto la expresión puede referirse al aparato de poder del rey. «Las autoridades» es una forma natural y amplia que mantiene la referencia política sin precisar de más.
- source_word: δυσμενεῖς
  english_pob_choice: hostile
  chosen_spanish: hostiles
  alternatives_spanish:
  - mal dispuestos
  - enemigos
  - desfavorables
  lexicon: LSJ
  rationale: El adjetivo implica mala voluntad activa. «Hostiles» comunica mejor la gravedad de la acusación.
- source_word: μέγα τι τοῖς πράγμασιν ἐναντιουμένους
  english_pob_choice: greatly opposed to public affairs
  chosen_spanish: se oponían mucho a los asuntos públicos
  alternatives_spanish:
  - se oponían gravemente a los asuntos del Estado
  - se resistían mucho al orden público
  - se oponían fuertemente a los asuntos del reino
  lexicon: LSJ
  rationale: τοῖς πράγμασιν se refiere a los asuntos públicos o al orden político establecido. «Asuntos públicos» conserva la amplitud del griego y evita sobreinterpretar con un tecnicismo moderno.
- source_word: οὐ τῷ τυχόντι ... φόβῳ
  english_pob_choice: no ordinary fear
  chosen_spanish: un temor nada común
  alternatives_spanish:
  - un temor no pequeño
  - un gran temor
  - un temor considerable
  lexicon: LSJ
  rationale: La expresión idiomática significa literalmente que no era un temor cualquiera. «Un temor nada común» mantiene el énfasis y suena natural en español.
- source_word: περιήψαντο
  english_pob_choice: brought upon them
  chosen_spanish: les echaron encima
  alternatives_spanish:
  - les impusieron
  - les cargaron
  - les atribuyeron
  lexicon: LSJ
  rationale: El verbo sugiere colgar o fijar algo sobre alguien; en contexto, significa imponer o cargar una sensación pública de temor. «Les echaron encima» conserva la imagen de imposición.
theological_decisions:
- issue: Cómo traducir προσκυνήσεων en un contexto de acusación política y religiosa
  english_pob_reading: acts of homage
  chosen_spanish_reading: actos de homenaje
  alternative_spanish_readings:
  - adoración
  - reverencias
  - postraciones
  rationale: El contexto mezcla reverencia cortesana y posible carga cultual. «Actos de homenaje» preserva esa tensión en lugar de decidir prematuramente por un sentido exclusivamente religioso.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3
- issue: Cómo expresar τοῖς πράγμασιν sin perder su referencia pública/política
  english_pob_reading: public affairs
  chosen_spanish_reading: los asuntos públicos
  alternative_spanish_readings:
  - los asuntos del Estado
  - el orden público
  - los asuntos del reino
  rationale: La acusación apunta al ámbito público del reino. «Asuntos públicos» es suficientemente amplio y no añade una precisión política que el griego no obliga a poner en primer plano.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión final del audit trail en puntos clave: evita una calca extraña para ὁμοτρόπως γίνεσθαι, mantiene la amplitud de ταῖς δυνάμεσιν con «las autoridades», y expresa περιήψαντο con un verbo español que conserve la idea de imponer/cargar un temor público. También preserva la ambigüedad de προσκυνήσεων documentada por el POB en inglés.'
  spanish_consistency_notes:
  - Se usa «homenaje» para προσκυνήσεις, en línea con el criterio POB de preservar la ambigüedad entre reverencia cortesana y culto.
  - Se evita «SEÑOR» u otra sustitución no presente aquí, porque el versículo no contiene el nombre divino.
  - «Asuntos públicos» se mantiene como equivalente amplio de τοῖς πράγμασιν, sin convertirlo en un tecnicismo ajeno al registro.
  - «Temor nada común» refleja el idiomático οὐ τῷ τυχόντι ... φόβῳ sin volverlo excesivamente interpretativo.
