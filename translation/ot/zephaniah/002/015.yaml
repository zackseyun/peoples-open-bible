id: ZEP.2.15
reference: Zephaniah 2:15
source:
  edition: WLC
  text: זֹ֞֠את הָ/עִ֤יר הָ/עַלִּיזָה֙ הַ/יּוֹשֶׁ֣בֶת לָ/בֶ֔טַח הָ/אֹֽמְרָה֙ בִּ/לְבָבָ֔/הּ אֲנִ֖י וְ/אַפְסִ֣/י ע֑וֹד אֵ֣יךְ הָיְתָ֣ה לְ/שַׁמָּ֗ה מַרְבֵּץ֙ לַֽ/חַיָּ֔ה כֹּ֚ל עוֹבֵ֣ר עָלֶ֔י/הָ יִשְׁרֹ֖ק יָנִ֥יעַ יָדֽ/וֹ׀׃ס
translation:
  text: This is the exultant city that lived securely[a], that said in her heart, ‘I am, and there is none besides me.’ How she has become a desolation[b], a resting place for wild animals! Everyone who passes by her will hiss and wave his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “an object of horror.” The Hebrew term can include the sense of appalling devastation, not only physical desolation.
    reason: lexical_alternative
  - marker: b
    text: Or, “will whistle.” The Hebrew verb can denote a sharp sound of astonishment or derision.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעִיר
  chosen: city
  alternatives:
  - town
  lexicon: HALOT
  rationale: The standard sense is an urban center or city. 'City' fits Nineveh's scale and the prophetic taunt context.
- source_word: הָעַלִּיזָה
  chosen: exultant
  alternatives:
  - joyful
  - carefree
  - rejoicing
  lexicon: HALOT
  rationale: The adjective conveys jubilant, self-satisfied revelry. 'Exultant' preserves both the city's pride and celebratory arrogance better than the flatter 'joyful' or the narrower 'carefree'.
- source_word: הַיּוֹשֶׁבֶת לָבֶטַח
  chosen: lived securely
  alternatives:
  - dwelt in security
  - sat securely
  - lived in safety
  lexicon: HALOT
  rationale: The participial construction describes an ongoing state of secure habitation. 'Lived securely' is idiomatic modern English while preserving the durative sense.
- source_word: הָאֹמְרָה בִּלְבָבָהּ
  chosen: that said in her heart
  alternatives:
  - that said to herself
  - that said in her mind
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to inward self-talk. 'Said in her heart' preserves the biblical idiom and the personification of the city as feminine.
- source_word: אֲנִי וְאַפְסִי עוֹד
  chosen: I am, and there is none besides me
  alternatives:
  - I am, and there is nothing else
  - I am, and none else exists
  lexicon: HALOT
  rationale: This formula expresses exclusive self-exaltation. 'There is none besides me' is the most natural English equivalent and preserves the intertextual echo of divine exclusivity language used ironically of a proud city.
- source_word: אֵיךְ
  chosen: How
  alternatives:
  - Alas, how
  - How indeed
  lexicon: HALOT
  rationale: Introduces an exclamatory lament/astonishment. 'How' is concise and preserves the prophetic exclamation without adding interpretive material.
- source_word: לְשַׁמָּה
  chosen: a desolation
  alternatives:
  - an object of horror
  - a wasteland
  lexicon: HALOT
  rationale: The noun often denotes devastation that evokes horror. 'A desolation' is the broadest fitting rendering here; the stronger nuance is worth preserving in a footnote.
- source_word: מַרְבֵּץ
  chosen: a resting place
  alternatives:
  - a lair
  - a place to lie down
  lexicon: HALOT
  rationale: The noun denotes a place where animals lie down. 'Resting place' is clear and natural; 'lair' is possible but can sound too predatory or specific.
- source_word: לַחַיָּה
  chosen: for wild animals
  alternatives:
  - for beasts
  - for animals
  lexicon: HALOT
  rationale: In this desolation context, the term refers to wild creatures inhabiting ruins. 'Wild animals' communicates the sense more clearly than the archaic 'beasts'.
- source_word: יִשְׁרֹק
  chosen: will hiss
  alternatives:
  - will whistle
  - will jeer with a hiss
  lexicon: HALOT
  rationale: The verb can denote whistling or hissing. In judgment contexts with passing observers, 'hiss' better conveys derision and astonishment in English, though 'whistle' remains a lexical possibility.
- source_word: יָנִיעַ יָדוֹ
  chosen: wave his hand
  alternatives:
  - shake his hand
  - gesture with his hand
  lexicon: HALOT
  rationale: The idiom describes a visible gesture of scorn or astonishment. 'Wave his hand' is a natural rendering that avoids over-specifying the exact gesture while preserving the action.
