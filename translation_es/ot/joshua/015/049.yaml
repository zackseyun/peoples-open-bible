lexical_decisions:
- source_word: דַנָּה
  english_pob_choice: Dannah
  chosen_spanish: Dannah
  alternatives_spanish:
  - Dana
  - Dánna
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se conserva en transliteración para mantener la forma toponímica y la correspondencia con la tradición de nombres en el texto fuente.
- source_word: קִרְיַת סַנָּה
  english_pob_choice: Kiriath-sannah
  chosen_spanish: Kiriat-sana
  alternatives_spanish:
  - Kiriath-sannah
  - Kiriat Sanna
  - Ciudad de Sana
  lexicon: HALOT
  rationale: Se mantiene el elemento קִרְיַת con transliteración breve y naturalizada como 'Kiriat' en español, y 'sannah' se adapta como 'sana' para evitar una grafía demasiado pesada; no se traduce como 'ciudad de' para no perder el carácter de nombre propio compuesto.
- source_word: הִיא
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - es
  - o sea
  lexicon: HALOT
  rationale: En una identificación appositiva entre dos nombres de lugar, 'es decir' comunica en español la equivalencia de forma clara y idiomática.
- source_word: דְבִר
  english_pob_choice: Debir
  chosen_spanish: Debir
  alternatives_spanish:
  - Débir
  lexicon: HALOT
  rationale: Nombre propio de lugar; se conserva transliterado para identificar la ciudad mencionada como nombre alterno de Kiriat-sana.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: HALOT
  rationale: La conjunción coordinante se mantiene como 'y' para reproducir la secuencia de la lista de ciudades sin añadir matiz interpretativo.
translation_notes:
