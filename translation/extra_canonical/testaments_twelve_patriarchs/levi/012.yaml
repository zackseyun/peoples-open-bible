id: T12P.LEV.12
reference: Testament of Levi 12
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: XII. Καὶ ἔλαβεν ὁ¹ Γερσὰμ² γυναῖκα³ καὶ ἔτεκεν⁴ *ἐξ αὐτῆς⁵ τὸν Λομνὴ⁶ καὶ Σεμεῆ⁷. 2. *Οἱ δὲ⁸ υἱοὶ Καὰθ⁹ Ἀβραάμ¹⁰, Ἰσαχάρ¹¹, Χεβρών¹² καὶ¹³ Ὀζηήλ¹⁴. 3. ⸢Καὶ οἱ¹⁵ υἱοὶ Μεραρεῖ Μοολὶ¹⁶ καὶ Μωυσής¹⁷⸣. 4. Καὶ Γἐν¹⁸⸥ τῷ¹⁹ *ἐνενηκοστῷ τετάρτῳ μου ἔτει²⁰ ἔλαβεν ὁ²¹ Ἀβραὰμ²² τὴν Ἰωχαβὲδ²³ τὴν²⁴ θυγατέρα μου ἑαυτῷ²⁵ εἰς γυναῖκα ὅτι ἐν μιᾷ ἡμέρᾳ²⁶ ἐγεννήθησαν²⁷ αὐτὸς καὶ ἡ θυγάτηρ μου. 5. Ὀκτὼ²⁸ ἐτῶν ἤμην ὅτε εἰσῆλθον²⁹ εἰς γῆν³⁰ Χανάαν³¹, καὶ *δέκα καὶ ὀκτὼ³² ἐτῶν³³ ὅτε³⁴ ἀπέκτεινα *τὸν Συχέμ³⁵, καὶ *δέκα καὶ ἐννέα³⁶ ἐτῶν³⁷ ἱεράτευσα³⁸, καὶ *εἴκοσι καὶ ὀκτὼ³⁹ ἐτῶν⁴⁰ ἔλαβον⁴¹ γυναῖκα· καὶ τεσσαράκοντα⁴² (καὶ ὀκτὼ)⁴³ ἐτῶν⁴⁴ εἰσῆλθον εἰς Αἴγυπτον. 6. *Καὶ ἰδού ἐστε, τέκνα μου, τρίτη γενεά⁴⁵. 7. Ἰωσὴφ⁴⁶ ἑκατοστῷ *ὀγδόῳ καὶ δεκάτῳ μου ἔτει⁴⁷ ἀπέθανεν.
  language: Greek
  source_pages:
  - 118
  - 119
translation:
  text: 1[12:2]. And Gersam took a wife, and she bore to him Lomne and Semee. 2. And the sons of Kaath were Ambram, Isachar, Chebron[12:3], and Ozeel. 3. And the sons of Merari were Mooli and Mouses. 4. And in the sixty-fourth year of my life, Ambram took Jochebed my daughter as a wife for himself, because he and my daughter were born on one and the same day. 5. I was eight years old when I entered the land of Canaan, and eighteen years old when I killed Shechem, and nineteen years old when I served as priest, and twenty-eight years old when I took a wife, and forty-eight years old when I entered Egypt. 6. And behold, my children, you are the third generation. 7[12:5][12:4]. Joseph died in the one hundred eighteenth year of my life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '12:2'
    text: The Greek witness gives the names in forms that differ from more familiar biblical spellings; the translation preserves the Greek forms rather than harmonizing them.
    reason: textual_variant
  - marker: '12:3'
    text: The names here likely correspond to the Merarite line known from biblical genealogies, but the Greek forms are translated as transmitted.
    reason: textual_variant
  - marker: '12:4'
    text: The statement 'Jochebed my daughter' creates a genealogical tension with more familiar biblical lineage traditions. The translation follows the Greek text as it stands.
    reason: alternative_reading
  - marker: '12:5'
    text: '''Served as priest'' renders the Greek verb for performing priestly service.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβεν ... γυναῖκα
  chosen: took a wife
  alternatives:
  - married
  - took a woman
  lexicon: LSJ
  rationale: A standard idiom for marriage. 'Took a wife' preserves the elevated, genealogical register better than the flatter 'married,' while remaining clear in English.
- source_word: ἔτεκεν ... ἐξ αὐτῆς
  chosen: by her he fathered
  alternatives:
  - she bore from him
  - he begot by her
  lexicon: LSJ
  rationale: The Greek combines childbirth language with the prepositional phrase 'from her.' In English, 'by her he fathered' preserves the paternal genealogical focus of the surrounding list without sounding overly archaic.
- source_word: υἱοί
  chosen: sons
  alternatives:
  - children
  - descendants
  lexicon: LSJ
  rationale: In this genealogical context the term specifically marks male lineage, so 'sons' is the most accurate and consistent rendering.
- source_word: θυγατέρα μου
  chosen: my daughter
  alternatives:
  - daughter of mine
  lexicon: LSJ
  rationale: Straightforward kinship language should remain direct and unflattened.
- source_word: εἰς γυναῖκα
  chosen: as a wife
  alternatives:
  - for a wife
  - in marriage
  lexicon: LSJ
  rationale: This is the natural English equivalent of the marital formula and keeps the formal tone.
- source_word: ἐν μιᾷ ἡμέρᾳ ἐγεννήθησαν
  chosen: were born on one and the same day
  alternatives:
  - were born in one day
  - were born on one day
  lexicon: LSJ
  rationale: The idiom points to shared birthday rather than duration of labor. 'One and the same day' makes the sense explicit in idiomatic English.
- source_word: ἱεράτευσα
  chosen: served as priest
  alternatives:
  - performed priestly service
  - was priest
  lexicon: LSJ
  rationale: The verb denotes priestly ministry. 'Served as priest' is clear, dignified, and avoids the awkwardness of 'priested' while preserving the active sense.
- source_word: ἰδού
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: LSJ
  rationale: The testamentary voice often uses solemn attention-markers. 'Behold' preserves that elevated rhetorical force better than a colloquial alternative.
- source_word: τέκνα μου
  chosen: my children
  alternatives:
  - my sons
  lexicon: LSJ
  rationale: Although the audience is likely male descendants, the Greek here is broader than υἱοί. 'My children' preserves the direct patriarchal address without over-specifying.
- source_word: τρίτη γενεά
  chosen: the third generation
  alternatives:
  - a third generation
  lexicon: LSJ
  rationale: The phrase identifies the descendants standing before Levi in relation to himself. The definite expression reads most naturally in English.
