translation:
  language: es
  text: Pero ustedes no se detengan; persigan a sus enemigos y golpeen su retaguardia[a]. No les permitan entrar en sus ciudades, porque Yahvé su Dios los ha entregado en su mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'golpeen su parte trasera' / 'ataquen a los rezagados'; el verbo hebreo se refiere a golpear la parte final de una fuerza que huye.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתֶּם
  english_pob_choice: But as for you
  chosen_spanish: Pero ustedes[a]
  alternatives_spanish:
  - Y ustedes
  - Pero en cuanto a ustedes
  lexicon: HALOT
  rationale: La construcción hebrea es contrastiva y enfática; en español, 'Pero ustedes' comunica mejor el giro frente a la acción previa que un simple 'y ustedes'. Incluyo la nota para señalar la fuerza discursiva del contraste.
- source_word: אַֽל תַּעֲמֹדוּ
  english_pob_choice: do not stand still
  chosen_spanish: no se detengan
  alternatives_spanish:
  - no se queden quietos
  - no se paren
  lexicon: HALOT
  rationale: En contexto militar, el mandato no prohíbe solo 'estar de pie', sino suspender la persecución. 'No se detengan' transmite con naturalidad esa fuerza imperativa sin perder el sentido de pausa/alto.
- source_word: רִדְפוּ אַחֲרֵי אֹיְבֵיכֶם
  english_pob_choice: pursue your enemies
  chosen_spanish: persigan a sus enemigos
  alternatives_spanish:
  - sigan a sus enemigos
  - corran tras sus enemigos
  lexicon: HALOT
  rationale: רדף אחרי es el idiomático 'perseguir'. 'Persigan' mantiene el tono militar y el valor verbal sin volverse explicativo de más.
- source_word: וְזִנַּבְתֶּם אוֹתָם
  english_pob_choice: strike their rear guard
  chosen_spanish: golpeen su retaguardia
  alternatives_spanish:
  - golpeen su parte trasera
  - ataquen a los rezagados
  - ataquen su retaguardia
  lexicon: HALOT
  rationale: El hebreo alude al extremo trasero de una fuerza en fuga. 'Retaguardia' es una solución española clara y militarmente natural; conserva la imagen corporal de 'cola' sin caer en una literalidad extraña. Prefiero 'golpeen' frente a 'ataquen' para mantener la correspondencia con el verbo de golpear.
- source_word: אַֽל תִּתְּנוּם לָבוֹא
  english_pob_choice: Do not let them enter
  chosen_spanish: No les permitan entrar
  alternatives_spanish:
  - No los dejen entrar
  - No permitan que entren
  lexicon: HALOT
  rationale: נתן + infinitivo funciona como 'permitir'. 'No les permitan entrar' expresa de manera directa y natural la prohibición sin alterar el sujeto plural implícito.
- source_word: אֶל עָרֵי הֶם
  english_pob_choice: their cities
  chosen_spanish: en sus ciudades
  alternatives_spanish:
  - a sus ciudades
  - dentro de sus ciudades
  lexicon: HALOT
  rationale: Aunque el inglés POB dice 'their cities', el hebreo con אֶל enfatiza dirección/movimiento hacia la ciudad. En español, con 'entrar', la preposición más natural es 'en'; el sentido direccional ya queda incluido en el verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton. 'Yahvé' es la forma de uso principal en el texto español, conservando el nombre divino y evitando la sustitución por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - vuestro Dios
  lexicon: HALOT
  rationale: El sufijo plural de segunda persona pide una referencia posesiva plural. En español bíblico neutral, 'su Dios' con contexto plural evita arcaísmo y permanece claro.
- source_word: בְּיֶדְכֶם
  english_pob_choice: into your hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en sus manos
  - en su poder
  lexicon: HALOT
  rationale: La idiomática hebrea 'mano' expresa control/poder. En español, 'en su mano' conserva la metáfora bíblica y la relación posesiva plural ya queda resuelta por el contexto; 'en sus manos' sería más explícito pero menos ceñido al singular hebreo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. La política del proyecto exige transliteración del nombre propio divino, no su sustitución por un título. 'Yahvé' es la forma escogida para el texto español principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido militar de וְזִנַּבְתֶּם אוֹתָם
  english_pob_reading: strike their rear guard
  chosen_spanish_reading: golpeen su retaguardia
  alternative_spanish_readings:
  - golpeen a los rezagados
  - ataquen su parte trasera
  rationale: El verbo hebreo tiene un campo de sentido ligado a la 'cola' o el extremo posterior de una fuerza en retirada. La traducción española debe conservar ese matiz táctico sin reducirlo a una expresión demasiado libre. 'Retaguardia' comunica la idea de la parte posterior del ejército.
  doctrine_reference: Lexical decision affecting military narrative, not a separate doctrinal locus
- issue: Metáfora de בְּיֶדְכֶם
  english_pob_reading: into your hand
  chosen_spanish_reading: en su mano
  alternative_spanish_readings:
  - en sus manos
  - en su poder
  rationale: La metáfora de la 'mano' expresa dominio concedido por Dios. Mantenerla ayuda a conservar la imagen bíblica de entrega y control. El español permite el singular colectivo sin perder inteligibilidad.
  doctrine_reference: Biblical idiom of divine grant/control
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB que ajustó 'cut off their rear guard' a 'strike their rear guard' para mayor precisión verbal. La versión española refleja esa misma precisión con 'golpeen su retaguardia', evitando una paráfrasis más interpretativa. También se preservó la decisión establecida de traducir יְהוָה como 'Yahweh', adaptada al estándar español del proyecto como 'Yahvé'.
  spanish_consistency_notes:
  - Se mantuvo el tono imperativo militar y conciso del hebreo.
  - Se conservó la metáfora de la 'mano' para בְּיֶדְכֶם, conforme al uso bíblico de dominio/entrega.
  - Se evitó 'Señor' para יְהוָה conforme a la política del proyecto y al expediente inglés.
  - '''Retaguardia'' funciona mejor en español que una traducción demasiado literal de ''cola'' o ''hindmost''.'
