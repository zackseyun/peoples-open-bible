  text: Τῷ δὲ θεῷ χάρις τῷ πάντοτε θριαμβεύοντι ἡμᾶς ἐν τῷ Χριστῷ καὶ τὴν ὀσμὴν τῆς γνώσεως αὐτοῦ φανεροῦντι δι’ ἡμῶν ἐν παντὶ τόπῳ·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/002/014.yaml
  text: But thanks be to God, who always leads us in triumphal procession in the Messiah and makes the fragrance of the knowledge of him known through us in every place.
  footnotes:
  - marker: a
    text: Or, “who always triumphs over us in the Messiah.”
    reason: alternative_reading
  - marker: b
    text: Or “aroma” for “fragrance.”
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 우리를 항상 메시아 안에서 개선 행렬로 이끄시고, 우리를 통하여 그분을 아는 지식의 향기를 곳곳에 드러내시는 하나님께 감사를 드립니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θριαμβεύοντι
  english_pob_choice: leads us in triumphal procession
  chosen_korean: 개선 행렬로 이끌다
  alternatives_korean:
