translation:
  language: es
  text: Aun hasta el Príncipe del ejército se engrandeció, y de él[b] fue quitado el sacrificio regular[a], y el lugar de su santuario[c] fue derribado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sacrificio continuo» o «el sacrificio diario»; en contexto del templo, הַתָּמִיד se refiere al servicio sacrificial regular y continuo, tradicionalmente entendido como la ofrenda regular quemada.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de él»; el antecedente del pronombre es debatido.
    reason: alternative_reading
  - marker: c
    text: O «la base de su santuario»; מְכוֹן puede significar lugar, sitio o fundamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַד
  english_pob_choice: even ... up to
  chosen_spanish: Hasta
  alternatives_spanish:
  - y hasta
  - incluso hasta
  lexicon: HALOT
  rationale: עַד expresa extensión o alcance; en este contexto, con el valor intensificador de la construcción, «Hasta» comunica de modo natural que la acción llegó al máximo límite indicado por el sintagma siguiente.
- source_word: שַׂר הַצָּבָא
  english_pob_choice: the Prince of the host
  chosen_spanish: el Príncipe del ejército
  alternatives_spanish:
  - el príncipe del ejército
  - el comandante del ejército
  - el príncipe de las huestes
  lexicon: HALOT
  rationale: שַׂר puede ser «príncipe», «jefe» o «comandante». Se conserva «Príncipe» para mantener el título elevado del hebreo y «ejército» para reflejar צָבָא en un sentido amplio y militar, sin resolver la identidad del referente.
- source_word: הִגְדִּיל
  english_pob_choice: magnified itself
  chosen_spanish: se engrandeció
  alternatives_spanish:
  - se magnificó
  - se hizo grande
  - se exaltó
  lexicon: HALOT
  rationale: En este pasaje, גדל en hifil expresa autoexaltación arrogante. «Se engrandeció» preserva el valor reflexivo y suena natural en español bíblico contemporáneo.
- source_word: וּמִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de ello
  - de él mismo
  - desde él
  lexicon: HALOT
  rationale: El sufijo masculino singular se conserva con «de él», manteniendo la ambigüedad del antecedente tal como permite el hebreo y como hace la tradición auditada en inglés.
- source_word: הרים
  english_pob_choice: was taken away
  chosen_spanish: fue quitado
  alternatives_spanish:
  - fue removido
  - fue quitado de en medio
  - se apartó
  lexicon: HALOT
  rationale: Aunque la forma verbal procede de רום, el contexto del culto pide el sentido de remoción. «Fue quitado» transmite la pérdida efectiva del sacrificio regular sin sobreexplicar el giro idiomático.
- source_word: הַתָּמִיד
  english_pob_choice: the regular offering
  chosen_spanish: el sacrificio regular
  alternatives_spanish:
  - el sacrificio continuo
  - la ofrenda diaria
  - el sacrificio perpetuo
  lexicon: HALOT
  rationale: תמיד en contexto cultual alude al servicio sacrificial regular del templo. «Sacrificio regular» conserva el valor de continuidad/regularidad y evita añadir «holocausto» donde el sustantivo no está explícito.
- source_word: וְהֻשְׁלַךְ
  english_pob_choice: was cast down
  chosen_spanish: fue derribado
  alternatives_spanish:
  - fue arrojado abajo
  - fue echado por tierra
  - fue abatido
  lexicon: HALOT
  rationale: El hophal da voz pasiva con imagen de violencia. «Fue derribado» comunica bien la caída/destrucción del lugar sin perder la fuerza del verbo.
- source_word: מְכוֹן
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el fundamento
  - el sitio
  - el establecimiento
  lexicon: HALOT
  rationale: מכון puede significar lugar, sitio o fundamento establecido. En combinación con «su santuario», «el lugar» es la opción más clara y más fiel al alcance semántico sin forzar una interpretación estructural.
- source_word: מִקְדָּשׁוֹ
  english_pob_choice: his sanctuary
  chosen_spanish: su santuario
  alternatives_spanish:
  - su lugar santo
  - su templo
  - su santuario santo
  lexicon: HALOT
  rationale: מקדש designa el espacio sagrado del culto. «Su santuario» preserva el registro bíblico y la referencia cultual amplia mejor que «templo», que podría estrechar el sentido.
theological_decisions:
- issue: Identidad del «Príncipe del ejército»
  english_pob_reading: Rendered neutrally as 'the Prince of the host' without identifying the figure in the main text.
  chosen_spanish_reading: Se mantiene «el Príncipe del ejército» sin identificar en el texto principal.
  alternative_spanish_readings:
  - un príncipe celestial
  - Dios mismo
  - el sumo sacerdote Onias III
  - el Mesías
  rationale: El hebreo presenta un título elevado, pero no fuerza una identificación unívoca. La traducción conserva la tensión interpretativa y evita introducir una lectura doctrinal particular en el cuerpo del texto.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
- issue: Antecedente de «de él»
  english_pob_reading: Kept as 'from him' in the main text.
  chosen_spanish_reading: Se conserva «de él» en el texto principal.
  alternative_spanish_readings:
  - de ello, si se entendiera que remite al ejército
  - de él, con valor impersonal
  - desde él
  rationale: El sufijo masculino singular admite más de un antecedente en el discurso. Mantener «de él» preserva la ambigüedad del hebreo y la decisión auditada en inglés.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Se siguió el pasaje de referencia con alta concordancia entre el texto hebreo y el auditor de inglés; no hubo revisiones aplicadas en la última pasada, y la redacción española conserva la ambigüedad clave del referente y del pronombre.
  spanish_consistency_notes:
  - Se usó «sacrificio regular» para reflejar el valor cultual de הַתָּמִיד sin añadir términos no explícitos.
  - Se preservó «Príncipe» como título elevado para שַׂר, en coherencia con la decisión auditada de no identificar al referente en el texto principal.
  - Se mantuvo el paralelismo pasivo de las dos últimas cláusulas con «fue quitado» y «fue derribado».
  - Se evitó sustituir el nombre divino por una convención tipográfica porque este versículo no contiene el tetragrámaton.
