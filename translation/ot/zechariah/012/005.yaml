id: ZEC.12.5
reference: Zechariah 12:5
source:
  edition: WLC
  text: וְ/אָֽמְר֛וּ אַלֻּפֵ֥י יְהוּדָ֖ה בְּ/לִבָּ֑/ם אַמְצָ֥ה לִ/י֙ יֹשְׁבֵ֣י יְרוּשָׁלִַ֔ם בַּ/יהוָ֥ה צְבָא֖וֹת אֱלֹהֵי/הֶֽם׃
translation:
  text: Then the clans of Judah will say in their hearts[a], ‘The inhabitants of Jerusalem are my strength in Yahweh of Armies[b], their God.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the leaders of Judah” or “the chiefs of Judah.” The Hebrew אַלֻּפֵי can refer either to clan units or to their chiefs.
    reason: lexical_alternative
  - marker: b
    text: Or, “The inhabitants of Jerusalem are strength for me in the LORD of Armies, their God.” The preposition can be understood as expressing sphere (“in”) or means/ground (“through”).
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָמְרוּ
  chosen: Then ... will say
  alternatives:
  - And ... will say
  lexicon: HALOT
  rationale: The conjunction plus qatal in prophetic narrative can be rendered simply as 'and,' but 'then' brings out the sequence within the oracle without over-paraphrasing.
- source_word: אַלֻּפֵי יְהוּדָה
  chosen: the clans of Judah
  alternatives:
  - the leaders of Judah
  - the chiefs of Judah
  lexicon: HALOT
  rationale: אַלּוּף can denote clan/chieftain. In this context, where Judah is contrasted corporately with Jerusalem, 'clans' best captures the representative social units rather than only individual rulers.
- source_word: בְּלִבָּם
  chosen: in their hearts
  alternatives:
  - within themselves
  - in their heart
  lexicon: HALOT
  rationale: Hebrew idiom for inward speech or conviction. English plural 'hearts' matches the plural subject naturally.
- source_word: אַמְצָה
  chosen: strength
  alternatives:
  - strong support
  - strengthening
  - courage
  lexicon: HALOT
  rationale: The noun denotes strength or strong support. 'Strength' is concise and preserves the somewhat compressed Hebrew expression.
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  - for us
  lexicon: HALOT
  rationale: 'The Hebrew is first person singular. Retaining ''for me'' preserves the distributive sense: each clan says this individually. ''For us'' would smooth the English but alter the number.'
- source_word: יֹשְׁבֵי יְרוּשָׁלַם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - those who dwell in Jerusalem
  - the residents of Jerusalem
  lexicon: HALOT
  rationale: Standard rendering of the participial construction for people living in a place.
- source_word: בַּיהוָה צְבָאוֹת
  chosen: through the LORD of Armies
  alternatives:
  - in the LORD of Armies
  - by the LORD of Armies
  lexicon: HALOT
  rationale: 'The beth here likely marks the ground or means of the inhabitants'' strength. ''Through'' communicates derived strength from the LORD while remaining natural English. The divine name follows doctrine default: YHWH rendered ''the LORD.'' ''Armies'' translates צְבָאוֹת rather than preserving the traditional but less transparent ''hosts.'''
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  alternatives:
  - God of them
  lexicon: HALOT
  rationale: Straightforward possessive construction referring to the inhabitants of Jerusalem.
