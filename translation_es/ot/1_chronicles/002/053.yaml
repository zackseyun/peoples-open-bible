  to: 'Y las familias de Quiriat-jearim: los itritas[a], los futitas, los sumatitas y los misraítas[b]. De estos salieron los zoratitas y los estaolitas.'
  rationale: Se conservó la sintaxis y el sentido del borrador, pero se ajustaron gentilicios para una lectura española más natural y digna. 'Futitas' evita la distracción grave de 'putitas' sin abandonar la transliteración básica; 'sumatitas' adapta mejor al español una forma que el propio expediente ya reconocía como alternativa. Se mantuvieron 'familias' y la nota correspondiente porque siguen siendo defendibles en este contexto genealógico.
