revisions:
- from: y, aunque fue compelida a sentir compasión por ellos[a] a causa de los muchos dolores que cada uno de ellos sufría, por el temor de Dios desatendió la seguridad temporal de sus hijos.
  to: y, aunque se vio obligada a sentir compasión por ellos[a] a causa de los muchos dolores que cada uno de ellos sufría, por el temor de Dios desatendió el rescate momentáneo[b] de sus hijos.
  rationale: Se ajustó una expresión calcada ('fue compelida') a un español más natural ('se vio obligada') sin perder la fuerza de necesidad. También se reemplazó 'seguridad temporal' por 'rescate momentáneo' para representar con mayor precisión la σωτηρία física e inmediata del contexto, manteniendo la nota de alternativa léxica.
