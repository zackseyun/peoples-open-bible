translation:
  language: es
  text: Y recubrió la casa[a] con piedras preciosas para belleza, y el oro era oro de Parvaim[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo» por «la casa»; el hebreo dice literalmente «la casa», una designación común del templo en Crónicas.
    reason: lexical_alternative
  - marker: b
    text: Parvaim es un nombre de lugar de identificación incierta; la frase puede significar «oro de Parvaim» o «oro procedente de Parvaim».
    reason: cultural_note
lexical_decisions:
- source_word: וַיְצַף
  english_pob_choice: He overlaid
  chosen_spanish: recubrió
  alternatives_spanish:
  - cubrió
  - revistió
  lexicon: HALOT
  rationale: El verbo hebreo expresa cubrir una estructura con una capa de material; en español, «recubrió» comunica bien esa idea de revestimiento ornamental en contexto arquitectónico.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: Se conserva la forma literal del hebreo, «la casa», que en Crónicas designa de manera común el templo. Mantenerla preserva la huella del texto fuente sin perder inteligibilidad.
- source_word: אֶבֶן יְקָרָה
  english_pob_choice: precious stones
  chosen_spanish: piedras preciosas
  alternatives_spanish:
  - piedras costosas
  - piedras valiosas
  lexicon: HALOT
  rationale: El singular hebreo tiene valor colectivo en este contexto. En español, el plural «piedras preciosas» es la forma natural para materiales decorativos y refleja bien el valor ornamental.
- source_word: לְתִפְאָרֶת
  english_pob_choice: for beauty
  chosen_spanish: para hermosura
  alternatives_spanish:
  - para belleza
  - para esplendor
  - para adorno
  lexicon: HALOT
  rationale: «Hermosura» mantiene el sentido estético del término hebreo y suena digno en registro bíblico, sin cargar innecesariamente el matiz de «gloria».
- source_word: וְהַזָּהָב
  english_pob_choice: and the gold
  chosen_spanish: y el oro
  alternatives_spanish:
  - y cuanto al oro
  lexicon: HALOT
  rationale: La coordinación hebrea se conserva de manera directa en español.
- source_word: זְהַב פַּרְוָיִם
  english_pob_choice: gold from Parvaim
  chosen_spanish: oro de Parvaim
  alternatives_spanish:
  - oro procedente de Parvaim
  - oro de Parvaím
  lexicon: HALOT
  rationale: La construcción en español más natural es «oro de Parvaim», que deja abierta la relación de procedencia o asociación, acorde con la incertidumbre del topónimo.
theological_decisions:
- issue: Retener «la casa» en lugar de sustituirlo por «el templo»
  english_pob_reading: the Hebrew literally says 'the house,' a common designation for the temple in Chronicles.
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  rationale: Se preserva la literalidad del hebreo y la designación característica de Crónicas, evitando resolver en traducción una equivalencia contextual ya reconocible para el lector.
  doctrine_reference: Uso bíblico del templo como «la casa» de Yahvé en Crónicas
- issue: Relación entre «oro de Parvaim» y «oro from Parvaim»
  english_pob_reading: Parvaim is a place name of uncertain identification; the phrase may mean 'gold of Parvaim' or 'Parvaim gold.'
  chosen_spanish_reading: oro de Parvaim
  alternative_spanish_readings:
  - oro procedente de Parvaim
  - oro parvaimita
  rationale: Se mantiene la ambigüedad documental del topónimo sin forzar una identificación geográfica no asegurada por el texto.
  doctrine_reference: Precaución ante lecturas toponímicas inciertas en el texto bíblico
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto hebreo recibido y con la solución auditada del POB en inglés; se han conservado las decisiones principales: literalidad de «la casa», valor colectivo de «piedras preciosas» y la ambigüedad de Parvaim. No se requieren revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se usa «oro» y no «oro dorado» para no añadir matiz inexistente en el hebreo.
  - «Hermosura» funciona como equivalente digno y bíblico de תפארת en este contexto ornamental.
  - La puntuación refleja una sola cláusula coordinada con dos miembros, como en el hebreo.
