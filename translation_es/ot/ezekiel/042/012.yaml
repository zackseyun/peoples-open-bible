translation:
  language: es
  text: Y en correspondencia con las entradas de las cámaras que estaban hacia el sur, había una entrada al comienzo del camino[a], el camino frente a la muralla protectora[b], hacia el oriente, al entrar en ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al comienzo del pasaje» o «al inicio de la vía». El hebreo repite varias veces «camino/vía», y la precisión arquitectónica exacta es incierta.'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo traducido «protectora» es raro y también puede sugerir una muralla envolvente o de resguardo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְפִתְחֵי
  english_pob_choice: And corresponding to the doorways of
  chosen_spanish: Y, correspondientes a las entradas de
  alternatives_spanish:
  - Y como las entradas de
  - Y en correspondencia con las entradas de
  lexicon: HALOT
  rationale: El prefijo conjuntivo con כ expresa comparación o correspondencia, no solo suma. «Correspondientes a» conserva esa relación estructural y suena natural en español.
- source_word: הַלְּשָׁכוֹת
  english_pob_choice: the chambers
  chosen_spanish: las cámaras
  alternatives_spanish:
  - las habitaciones
  - los aposentos
  lexicon: HALOT
  rationale: En contexto arquitectónico del templo, לשכה se refiere a dependencias laterales. «Cámaras» es un término sobrio y técnico en español bíblico, cercano a «chambers».
- source_word: אֲשֶׁר דֶּרֶךְ הַדָּרוֹם
  english_pob_choice: that were toward the south
  chosen_spanish: que estaban hacia el sur
  alternatives_spanish:
  - que estaban del lado sur
  - que daban al sur
  lexicon: HALOT
  rationale: La frase indica orientación o ubicación. «Hacia el sur» preserva la dirección sin sobreinterpretar la geometría exacta.
- source_word: פֶּתַח
  english_pob_choice: a doorway
  chosen_spanish: una entrada
  alternatives_spanish:
  - una abertura
  - un portal
  lexicon: HALOT
  rationale: פתח designa una abertura o acceso. «Entrada» es claro en español y evita sugerir una puerta física.
- source_word: בְּרֹאשׁ דָּרֶךְ
  english_pob_choice: at the head of the way
  chosen_spanish: al comienzo del camino
  alternatives_spanish:
  - al inicio del camino
  - a la cabeza del camino
  lexicon: HALOT
  rationale: רֹאשׁ con דרך funciona idiomáticamente como inicio o principio del trayecto. «Al comienzo del camino» comunica bien la idea y mantiene la imagen espacial.
- source_word: דֶּרֶךְ
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la vía
  - el pasaje
  lexicon: HALOT
  rationale: Se conserva la repetición de דרך con «camino», una forma natural en español para el acceso o recorrido dentro del complejo.
- source_word: בִּפְנֵי הַגְּדֶרֶת
  english_pob_choice: in front of the wall
  chosen_spanish: frente a la muralla
  alternatives_spanish:
  - delante de la cerca
  - ante el muro
  lexicon: HALOT
  rationale: בפני expresa posición frontal. גדרת puede ser cerca, muro o vallado; «muralla» mantiene el carácter arquitectónico visible del cierre, aunque el término no determine con certeza su altura o material.
- source_word: הֲגִינָה
  english_pob_choice: protective
  chosen_spanish: protectora
  alternatives_spanish:
  - de protección
  - resguardadora
  lexicon: HALOT
  rationale: El término es raro y puede sugerir función de protección o resguardo. «Protectora» preserva la ambigüedad funcional sin endurecerla excesivamente.
- source_word: דֶּרֶךְ הַקָּדִים
  english_pob_choice: toward the east
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - hacia el este
  - al oriente
  lexicon: HALOT
  rationale: Se trata de una dirección espacial. «Oriente» es un equivalente bíblico y formal en español, apropiado para el registro del pasaje.
- source_word: בְּבוֹאָן
  english_pob_choice: as one enters them
  chosen_spanish: al entrar en ellas
  alternatives_spanish:
  - cuando se entra en ellas
  - mientras se entra en ellas
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo femenino plural apunta a las cámaras. «Al entrar en ellas» conserva la referencia pronominal y la acción de ingreso sin añadir elementos ajenos al hebreo.
translation_notes:
  revision_awareness: Se mantiene el valor de correspondencia del inicio, la repetición de דרך y la ambigüedad de גדרת הֲגִינָה. Se optó por un español natural sin perder el trazado espacial del hebreo ni la nota de incertidumbre arquitectónica documentada en el audit trail inglés.
  spanish_consistency_notes:
  - Se usó «Y» inicial para reflejar la conexión del versículo con el contexto inmediato.
  - Se prefirió «oriente» en vez de «este» por coherencia con registro bíblico-formal.
  - «Entradas» y «entrada» se mantuvieron distintos para reflejar פתחי plural y פתח singular.
  - «Muralla protectora» conserva la función indicada por el inglés auditable, sin afirmar más de lo que permite el hebreo.
  - Se evitó suavizar la repetición de «camino», porque parece deliberada en el texto fuente.
