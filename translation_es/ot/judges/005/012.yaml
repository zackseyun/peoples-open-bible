  source_alignment_summary: 'El borrador español conserva bien la estructura imperativa repetida, los nombres propios y el sentido general del verso. También preserva adecuadamente el modismo hebreo «take captive your captives» mediante una formulación literal con nota. Sin embargo, hay dos puntos que conviene ajustar para mayor fidelidad y mejor español: «canta un canto» suena algo forzado en español, y la nota ya documenta bien que el hebreo es literalmente «habla/di un canto»; además, «toma cautivos a tus cautivos» resulta menos natural que una formulación más directa sin perder el giro hebreo.'
