translation:
  language: es
  text: Partieron del monte Hor y acamparon en Zalmoná.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en camino
  - Salieron
  lexicon: HALOT
  rationale: En los notices itinerarios del desierto, נסע indica reanudar la marcha o levantar el campamento. «Partieron» comunica bien ese movimiento sin sonar tan técnico como «viajaron» ni tan coloquial como «salieron».
- source_word: מֵהֹר הָהָר
  english_pob_choice: from Mount Hor
  chosen_spanish: de el monte Hor
  alternatives_spanish:
  - del monte Hor
  - de Hor, el monte
  lexicon: HALOT
  rationale: El hebreo presenta el topónimo tradicionalmente entendido como «Mount Hor». En español, el nombre se conserva como «monte Hor». Se mantiene la preposición de procedencia del hebreo; la forma contraída «del» sería más idiomática, pero aquí se prefiere dejar visible la relación con el sintagma original.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y levantaron campamento
  lexicon: HALOT
  rationale: חנה en estos listados de viaje significa establecer el campamento. «Acamparon» es claro y natural en español; conserva la acción concreta sin añadir matices no presentes en el hebreo.
- source_word: בְּצַלְמֹנָה
  english_pob_choice: at Zalmonah
  chosen_spanish: en Zalmoná
  alternatives_spanish:
  - a Zalmoná
  - en Zalmonah
  lexicon: HALOT
  rationale: Como nombre propio de lugar, בְּ marca ubicación. «En Zalmoná» expresa bien el valor locativo en español y conserva el topónimo con adaptación mínima de acento para la lectura.
translation_notes:
  revision_awareness: El texto inglés auditado no presenta notas ni revisiones aplicadas; el versículo muestra una concordancia alta y no requiere ajustes textuales ni variantes críticas.
  spanish_consistency_notes:
