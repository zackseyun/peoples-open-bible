translation:
  language: es
  text: Pero Timoteo mismo, habiendo caído en manos de los que estaban con Dositeo y Sosípatro, rogaba con mucha astucia[a] que lo dejaran ir ileso, porque tenía en su poder a los padres de muchos de ellos, y de otros a sus hermanos[b], y sucedería que estos serían tenidos en poco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con mucho engaño» o «con mucha treta»; el griego γοητία aquí probablemente se refiere a una súplica astuta o engañosa, no a hechicería literal.
    reason: lexical_alternative
  - marker: b
    text: 'El griego es condensado: Timoteo sostiene que tiene en su poder a los padres de muchos de ellos y a los hermanos de otros, de modo que, si lo matan, esos parientes serían tratados como de poco valor.'
    reason: source_note
lexical_decisions:
- source_word: αὐτὸς δὲ ὁ Τιμόθεος
  english_pob_choice: But Timothy himself
  chosen_spanish: Pero Timoteo mismo
  alternatives_spanish:
  - Pero el mismo Timoteo
  - Pero Timoteo por su parte
  lexicon: LSJ
  rationale: Se conserva el énfasis del pronombre intensivo αὐτός con «mismo», sin añadir contenido ajeno al griego.
- source_word: ἐμπεσὼν
  english_pob_choice: having fallen into the hands of
  chosen_spanish: habiendo caído en manos de
  alternatives_spanish:
  - habiendo caído entre
  - habiendo caído en poder de
  lexicon: LSJ
  rationale: La imagen de caída en captura se expresa de forma natural en español con «en manos de», que comunica la idea implícita de estar bajo control ajeno.
- source_word: τοῖς περὶ τὸν Δωσίθεον καὶ Σωσίπατρον
  english_pob_choice: those with Dositheus and Sosipater
  chosen_spanish: los que estaban con Dositheo y Sosípater
  alternatives_spanish:
  - los hombres de Dositheo y Sosípater
  - los del entorno de Dositheo y Sosípater
  lexicon: LSJ
  rationale: La construcción οἱ περὶ + acusativo se vierte como un grupo asociado a esos dos personajes. «Los que estaban con» es claro y cercano al griego.
- source_word: ἠξίου
  english_pob_choice: begged
  chosen_spanish: pedía
  alternatives_spanish:
  - suplicaba
  - rogaba
  lexicon: LSJ
  rationale: Aquí el verbo introduce una súplica insistente; «pedía» mantiene el valor de petición sin sobreactuarla, apoyado por el contexto de cautiverio.
- source_word: μετὰ πολλῆς γοητίας
  english_pob_choice: with much cunning
  chosen_spanish: con mucha astucia
  alternatives_spanish:
  - con mucho engaño
  - con mucha treta
  lexicon: LSJ
  rationale: γoητία en este contexto apunta a una persuasión astuta o engañosa, no a magia literal. «Astucia» recoge bien esa manipulación verbal en español.
- source_word: ἐξαφεῖναι
  english_pob_choice: to be let go
  chosen_spanish: que lo dejaran ir
  alternatives_spanish:
  - que lo soltarán
  - que lo liberaran
  lexicon: LSJ
  rationale: La petición de ser soltado se expresa en español con una formulación natural y directa, sin perder el sentido de liberación de la captura.
- source_word: ὡς σῷον αὐτόν
  english_pob_choice: unharmed
  chosen_spanish: ileso
  alternatives_spanish:
  - sano y salvo
  - sin daño
  lexicon: LSJ
  rationale: «Ileso» concentra la idea de estar sin lesión o daño, correspondiente al griego σῷος en este contexto de liberación.
- source_word: διὰ τὸ πλειόνων μὲν γονεῖς, ὧν δὲ ἀδελφοὺς ἔχειν
  english_pob_choice: because he had the parents of many of them, and of others their brothers
  chosen_spanish: porque tenía en su poder a los padres de muchos de ellos, y de otros a sus hermanos
  alternatives_spanish:
  - porque tenía a los padres de muchos de ellos, y de otros a sus hermanos bajo su control
  - porque muchos de ellos tenían padres, y otros hermanos, en su poder
  lexicon: LSJ
  rationale: Se mantiene la estructura comprimida del griego y se explicita la fuerza posesiva de ἔχειν como control o retención, no mera relación familiar.
- source_word: ἀλογηθῆναι
  english_pob_choice: be disregarded
  chosen_spanish: serían tenidos en poco
  alternatives_spanish:
  - serían ignorados
  - serían tratados como de nada
  lexicon: LSJ
  rationale: «Tener en poco» reproduce bien la idea de ser considerados sin valor o sin atención, en un español bíblico claro y natural.
- source_word: συμβήσεται
  english_pob_choice: it would happen
  chosen_spanish: sucedería
  alternatives_spanish:
  - ocurriría
  - se daría
  lexicon: LSJ
  rationale: Se vierte el valor futuritivo de consecuencia con una forma simple y idiomática en español.
translation_notes:
  revision_awareness: Se siguió el sentido del texto griego de Swete 1909 y el audit trail inglés, manteniendo la ambigüedad controlada de γοητία como astucia/engaño y la elipsis de ἔχειν como posesión o control sobre los familiares mencionados. No se aplicaron revisiones adicionales.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde al nombre divino; aquí no aparece.
  - Se prefirió «astucia» para γοητία, coherente con el tratamiento auditado en inglés.
  - Se evitó «Mesías/Cristo» por no ser pertinente en este versículo.
  - «Tenidos en poco» mantiene el tono de valoración negativa sin reinterpretar el pasaje.
