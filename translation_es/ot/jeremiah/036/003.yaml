    text: O 'todo el desastre'; el hebreo dice literalmente 'todo el mal/desastre'. En este contexto se refiere al juicio que Dios amenaza con traer sobre Judá, no a mal moral en Dios.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''cada hombre''. La forma masculina singular se usa de modo representativo para los miembros de Judá.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el español para reflejar mejor el hebreo y la revisión inglesa auditada: ''oiga de'' reproduce con naturalidad el sentido de recibir noticia del juicio venidero, y ''pienso traer sobre ellos'' expresa de forma idiomática la calamidad que Dios planea ejecutar. También se mejora el registro con ''calamidad'' en el texto principal y se limpia la puntuación, manteniendo la distinción entre ''iniquidad'' y ''pecado'' y la forma representativa ''cada hombre''.'
