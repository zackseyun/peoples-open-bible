  to: Y los sacerdotes que llevaban el arca permanecieron en medio del Jordán hasta que se cumplió todo lo que Yahvé había mandado a Josué hablar al pueblo[a], conforme a todo lo que Moisés había mandado a Josué. Y el pueblo se apresuró y cruzó.
  rationale: Se revisa para reflejar con mayor precisión לְדַבֵּר como 'hablar' en vez de 'decir', y para mejorar el español idiomático de עַד תֹּם כָּל הַדָּבָר con 'hasta que se cumplió todo'. Se conserva 'Yahvé' según la política terminológica del proyecto y se mantiene la nota léxica, ajustada al nuevo texto.
  reviewer_model: gpt-5.4
