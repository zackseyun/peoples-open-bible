  to: 'Así que el cocinero tomó la pierna[a] y lo que estaba sobre ella[b], y la puso delante de Saúl. Y dijo: «Mira, lo que ha sido reservado[c] está puesto delante de ti. Come, porque ha sido reservado para ti para el tiempo señalado, cuando dije[d]: “He invitado al pueblo”». Así que Saúl comió con Samuel aquel día.'
  rationale: 'La revisión hace ajustes menores para mejorar la naturalidad y precisión del español sin apartarse del expediente fuente: «reservado» comunica mejor una porción apartada para alguien; «cuando dije» evita un calco torpe del inglés; «el pueblo» representa mejor הָעָם en este registro. No se requieren cambios doctrinales ni una nueva adjudicación compleja.'
