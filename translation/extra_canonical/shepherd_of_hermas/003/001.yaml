translation:
  text: But it is not for this that God is angry with you, but so that you may turn back your household,
    which has sinned against the Lord and against us, their parents. Yet, being fond of your children,
    you did not admonish your household, but you let it be grievously ruined; for this the Lord is angry
    with you. But he will heal all the past evils in your household; for because of their sins and lawless
    deeds you yourself were ruined by worldly affairs.
