    rationale: El proyecto pide conservar en español las alternativas significativas cuando el inglés POB las mantuvo. Aquí la nota explica que la repetición intensifica el regateo y ofrece alternativas interpretativas útiles.
  - severity: low
    issue: «cuando se va, entonces» suena algo pesado en español.
    rationale: Aunque es correcto, «pero cuando se va, después se jacta» o una formulación equivalente suena más natural y proverbial sin alterar el sentido ni la secuencia temporal.
  revised_spanish_text: «Malo, malo[a]», dice el comprador; pero cuando se va, después se jacta.
