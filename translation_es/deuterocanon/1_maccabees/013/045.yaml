  yaml_path: translation/deuterocanon/1_maccabees/013/045.yaml
  text: And those in the city went up onto the wall with their wives and children[a], having torn their garments, and they cried out with a loud voice[b], asking Simon to give them pledges of peace.
  footnotes:
  - marker: a
    text: Or, 'give them a pledge' or 'grant them terms of peace.' The Greek literally says 'give right hands,' an idiom for offering a pledge of good faith or peaceful terms.
    reason: lexical_alternative
  - marker: b
    text: Tearing one's garments was a customary sign of grief, distress, or urgent supplication.
    reason: cultural_note
