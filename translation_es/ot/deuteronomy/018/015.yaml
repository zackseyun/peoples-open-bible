translation:
  language: es
  text: Yahvé tu Dios te levantará un profeta como yo[b], de en medio de ti[a], de entre tus hermanos[a]; a él deben escucharlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de tu medio, de entre tus compatriotas'. El hebreo 'de entre tus hermanos' usa un término de parentesco masculino que aquí se refiere a los miembros de Israel en general.
    reason: lexical_alternative
  - marker: b
    text: Este versículo se aplica más tarde al Mesías en el Nuevo Testamento; sin embargo, el hebreo aquí dice simplemente 'un profeta como yo'.
    reason: cross_reference
lexical_decisions:
- source_word: נָבִיא
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - un profeta
  lexicon: HALOT
  rationale: El hebreo presenta un singular indefinido; en español, 'un profeta' conserva esa indefinición sin añadir identificación mesiánica en el texto principal.
- source_word: מִקִּרְבְּךָ
  english_pob_choice: from among you
  chosen_spanish: de en medio de ti
  alternatives_spanish:
  - de tu medio
  - de entre ti
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente 'de tu interior / de tu medio'. 'De en medio de ti' transmite bien el origen interno dentro de Israel y suena natural en español bíblico moderno.
- source_word: מֵאַחֶיךָ
  english_pob_choice: from your brothers
  chosen_spanish: de entre tus hermanos
  alternatives_spanish:
  - de entre tus parientes
  - de entre tus compatriotas
  - de entre tus hermanos de Israel
  lexicon: HALOT
  rationale: Se mantiene el sustantivo masculino plural 'hermanos', porque el hebreo usa un término de parentesco masculino con valor representativo para los miembros de Israel. 'De entre' ayuda a reflejar el origen comunitario y la relación interna del pueblo.
- source_word: כָּמֹנִי
  english_pob_choice: like me
  chosen_spanish: como yo
  alternatives_spanish:
  - semejante a mí
  - igual que yo
  lexicon: HALOT
  rationale: '''Como yo'' es la correspondencia directa y natural al hebreo, preservando la comparación con Moisés sin sobreinterpretarla.'
- source_word: יָקִים לְךָ
  english_pob_choice: will raise up for you
  chosen_spanish: te levantará
  alternatives_spanish:
  - te hará surgir
  - te suscitará
  - levantaré para ti
  lexicon: HALOT
  rationale: El hiphil de קום puede expresar 'levantar / suscitar / hacer surgir'. En español, 'te levantará' es breve, fiel e inteligible; el objeto indirecto 'te' conserva el sentido benefactivo de לְךָ.
- source_word: יְהוָה אֱלֹהֶיךָ
  english_pob_choice: Yahweh your God
  chosen_spanish: Yahvé tu Dios
  alternatives_spanish:
  - Yahvé, tu Dios
  - el Yahvé tu Dios
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir יהוה como 'Yahvé' en el texto principal. 'Tu Dios' reproduce la fórmula pactual sin recurrir a 'SEÑOR' como sustituto.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - a él mismo
  - escuchadle
  lexicon: HALOT
  rationale: El hebreo explicita la preposición; en español conviene mantenerla. 'A él' evita ambigüedad y prepara naturalmente el verbo de escuchar.
- source_word: תִּשְׁמָעוּן
  english_pob_choice: you must listen
  chosen_spanish: escucharéis
  alternatives_spanish:
  - tenéis que escucharlo
  - debéis escucharlo
  - le obedeceréis
  lexicon: HALOT
  rationale: שׁמע puede abarcar escuchar, prestar atención y obedecer. En este contexto, la POB inglesa prefirió 'listen' sin cargar el mandato con 'obey'; en español, el futuro exhortativo 'escucharéis' conserva el mandato con un tono bíblico natural y no añade una paráfrasis más fuerte que el hebreo.
theological_decisions:
- issue: Alcance mesiánico de 'un profeta como yo'
  english_pob_reading: El texto principal mantiene 'a prophet like me' y deja la aplicación mesiánica posterior para nota/cross-reference, sin introducirla en la redacción principal.
  chosen_spanish_reading: El texto principal conserva 'un profeta como yo'; la posible lectura mesiánica queda fuera del cuerpo del versículo.
  alternative_spanish_readings:
  - el Profeta como yo
  - el Mesías-profeta
  - un profeta, el Mesías
  rationale: El hebreo dice simplemente 'un profeta como yo'. La traducción no debe insertar una identificación doctrinal que el versículo no formula explícitamente. La posible aplicación canónica posterior puede anotarse aparte sin alterar el sentido inmediato.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Valor representativo de 'hermanos'
  english_pob_reading: Retener 'brothers' con nota que explica su referencia a los israelitas en general.
  chosen_spanish_reading: Retener 'hermanos' en el texto y aclarar su alcance en una nota.
  alternative_spanish_readings:
  - israelitas
  - compatriotas
  - parientes
  rationale: El hebreo usa una forma masculina plural con referencia representativa. 'Hermanos' preserva la forma léxica y la relación de alianza; la nota evita que el lector lo limite a hermanos biológicos.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue de cerca la última revisión aprobada, que no registró cambios. Se mantiene el sentido inmediato del hebreo y la distinción auditada entre la referencia textual original y la aplicación canónica posterior.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se mantiene 'hermanos' por la forma masculina representativa del hebreo, con aclaración en nota.
  - Se evita 'SEÑOR' y no se introduce 'Cristo' en el texto principal, en línea con la evidencia fuente y el audit trail.
  - '''Escucharéis'' mantiene el mandato de שׁמע sin intensificarlo a ''obedecer'' en el cuerpo principal.'
