id: COL.1.15
reference: Colossians 1:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅς ἐστιν εἰκὼν τοῦ θεοῦ τοῦ ἀοράτου, πρωτότοκος πάσης κτίσεως,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/015.yaml
  text: He is the image of the invisible God, the firstborn of all creation.
translation:
  language: ko
  text: 그분은 보이지 아니하시는 하나님의 형상이시며, 모든 피조물의 먼저 나신 분[a]이십니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 πρωτότοκος는 「먼저 태어난 자」를 뜻하나, 성경적 용법에서는 지위·상속의 우선권을 가리키는 경우가 많다. 본문은 아들이 피조물에 속한다는 뜻이 아니며, 다음 절들이 그 의미를 설명한다. 「모든 피조물보다 먼저 나신 분」 또는 「모든 피조물 위에 뛰어나신 분」으로도 옮길 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅς ἐστιν
  english_pob_choice: He is
  chosen_korean: 그분은 ... 이시며
  alternatives_korean:
  - 그분은 ~ 이신
  - ~이신 분
  lexicon: BDAG
  rationale: 관계대명사가 앞 절의 「아들」을 받는다. 그리스도-찬가의 격조 있는 흐름을 위해 「그분은 ~ 이시며」로 옮긴다.
- source_word: εἰκὼν
  english_pob_choice: image
  chosen_korean: 형상
  alternatives_korean:
  - 모상
  - 표상
  lexicon: BDAG
  rationale: 글로사리 기본값. 「형상」은 한국 교회의 정립된 표현이며 표상·계시의 의미를 담는다.
- source_word: τοῦ θεοῦ τοῦ ἀοράτου
  english_pob_choice: of the invisible God
  chosen_korean: 보이지 아니하시는 하나님의
  alternatives_korean:
  - 보이지 않는 하나님의
  - 보이지 않으시는 하나님의
  lexicon: BDAG
  rationale: 합쇼체 격조에 맞춰 「보이지 아니하시는」 어형을 사용한다. 형용 관계를 자연스러운 한국어 관형사로 옮긴다.
- source_word: πρωτότοκος
  english_pob_choice: firstborn
  chosen_korean: 먼저 나신 분
  alternatives_korean:
  - 처음 나신 분
  - 으뜸이신 분
  - 장자
  lexicon: BDAG
  rationale: 「먼저 나신 분」은 πρωτότοκος의 어휘적 형태(앞서 태어남)와 신학적 함의(상속·우위)를 함께 담는다. 「장자」는 한국 전통이나 「아들」이 창조에 속하는 듯한 오해를 피하기 위해 본문은 「먼저 나신 분」으로 옮기고, 각주로 의미를 설명한다.
- source_word: πάσης κτίσεως
  english_pob_choice: of all creation
  chosen_korean: 모든 피조물의
  alternatives_korean:
  - 모든 창조의
  - 모든 피조물보다 앞선
  lexicon: BDAG
  rationale: 영어 POB 현재 본문이 「of all creation」(속격 직역)을 채택하므로 한국어도 「모든 피조물의」로 옮긴다. 「위에·앞선」 의미는 각주와 다음 절들의 설명으로 보존한다.
theological_decisions:
- issue: πρωτότοκος πάσης κτίσεως의 의미(그리스도-찬가의 핵심 어구)
  chosen_reading: 모든 피조물의 먼저 나신 분
  alternative_readings:
  - 모든 피조물보다 먼저 나신 분
  - 모든 피조물 위에 으뜸이신 분
  rationale: πρωτότοκος는 어휘적으로 「먼저 태어난」을 뜻하나, 성경적·유대적 배경에서는 지위·상속의 우선권을 가리키는 일이 흔하다. DOCTRINE.md와 니케아 신경의 영원한 아들 신학을 따르면, 본 구절은 아들이 피조물에 속한다는 뜻이 아니라 모든 피조물에 대한 우위와 상속권을 가리킨다(16-17절이 그 의미를 풀이한다). 본문은 「먼저 나신 분」으로 옮겨 어휘 형태를 보존하되, 각주로 신학적 의미를 명시한다. 영어 POB의 현재 본문(「of all creation」)과 일관성을 유지한다.
  doctrine_reference: 'DOCTRINE.md: Nicene affirmation; Preserve theological tension; Translate titles'
- issue: 그리스도-찬가(1:15-20) 도입의 문체적 무게
  chosen_reading: 합쇼체 격조 있는 어형 「~이시며 ... ~이십니다」
  alternative_readings:
  - 평이한 합쇼체
  rationale: 1:15-20은 초기 그리스도 찬가로 식별되며, 그리스도의 위격과 사역을 송영적으로 선포한다. 한국어 번역도 합쇼체의 격조 있는 어형을 채택하여 찬가의 무게를 보존한다.
  doctrine_reference: 'DOCTRINE.md: Maintain authorial register'
