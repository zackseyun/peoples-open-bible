  text: εἰ γὰρ ἡ προθυμία πρόκειται, καθὸ ἐὰν ⸀ἔχῃ εὐπρόσδεκτος, οὐ καθὸ οὐκ ἔχει.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/008/012.yaml
  text: For if the readiness is present[a], it is acceptable according to what one has[b], not according to what one does not have.
translation:
  language: ko
  text: 자원하는 마음[a]만 있으면, 가진 것이 없는 것을 따라서가 아니라 가진 것을 따라 받으실 만한 것이 됩니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「준비된 마음」, 「열심」.
    reason: lexical_alternative
lexical_decisions:
- source_word: προθυμία
  english_pob_choice: readiness
  chosen_korean: 자원하는 마음
  lexicon: BDAG
  rationale: 앞 절과 동일하게 일관성 있게 옮긴다.
  alternatives_korean:
  - 준비된 마음
  - 열심
- source_word: εὐπρόσδεκτος
  english_pob_choice: acceptable
  chosen_korean: 받으실 만한 것
  lexicon: BDAG
  rationale: 하나님 앞에서 합당하게 받아들여지는 상태. 한국어 표준 등가어 「받으실 만한」.
  alternatives_korean:
  - 기꺼이 받아들여지는
- source_word: καθὸ ἐὰν ἔχῃ
  english_pob_choice: according to what one has
  chosen_korean: 가진 것을 따라
  lexicon: BDAG
  rationale: '카토 + 가정법: 각자가 가진 분량의 기준. 「가진 것을 따라」가 분명하다.'
  alternatives_korean:
  - 형편대로
