translation:
  language: es
  text: Los que trabajan el lino peinado[a] quedarán avergonzados, y los que tejen tela blanca[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lino fino»; el hebreo probablemente se refiere a lino especialmente preparado, peinado o cardado.
    reason: lexical_alternative
  - marker: b
    text: O «lino blanco»; el hebreo probablemente se refiere a material textil blanqueado o a tela de lino blanco.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֹשׁוּ
  english_pob_choice: will be ashamed
  chosen_spanish: serán avergonzados
  alternatives_spanish:
  - quedarán avergonzados
  - serán confundidos
  lexicon: HALOT
  rationale: El hebreo בוש expresa vergüenza o humillación por fracaso o ruina. En español, «serán avergonzados» conserva esa fuerza directa y pasiva, acorde con un juicio económico.
- source_word: עֹבְדֵי
  english_pob_choice: those who work with
  chosen_spanish: los que trabajan
  alternatives_spanish:
  - los trabajadores de
  - los que procesan
  lexicon: HALOT
  rationale: El participio describe personas ocupadas en una labor o oficio. «Los que trabajan» mantiene la estructura ocupacional del verso y funciona naturalmente en español.
- source_word: פִשְׁתִּים
  english_pob_choice: flax
  chosen_spanish: el lino
  alternatives_spanish:
  - el lino de la planta de lino
  - la fibra de lino
  lexicon: HALOT
  rationale: Aunque el término hebreo nombra propiamente el flax/lino como materia prima, en español «lino» comunica bien el material textil relacionado y evita una expresión pesada. La nota preserva la alternativa «lino peinado» como preparación del material.
- source_word: שְׂרִיקוֹת
  english_pob_choice: combed
  chosen_spanish: peinado
  alternatives_spanish:
  - cardado
  - fino
  lexicon: HALOT
  rationale: La raíz es difícil, pero el audit trail inglés la entiende como lino especialmente preparado, probablemente peinado o cardado. «Peinado» conserva esa idea de procesamiento previo sin sobreinterpretar.
- source_word: וְאֹרְגִים
  english_pob_choice: and those who weave
  chosen_spanish: y los que tejen
  alternatives_spanish:
  - y los tejedores
  lexicon: HALOT
  rationale: El participio de ארג denota el oficio de tejer. «Los que tejen» reproduce el paralelismo con la primera cola y mantiene el tono descriptivo.
- source_word: חוֹרָי
  english_pob_choice: white cloth
  chosen_spanish: tela blanca
  alternatives_spanish:
  - lino blanco
  - tela blanqueada
  - tela de blancura
  lexicon: HALOT
  rationale: El término se vincula con blancura o tejido blanco, probablemente tela fina blanqueada. «Tela blanca» es claro y fiel al sentido básico sin fijar innecesariamente «lino» en el texto principal.
translation_notes:
  revision_awareness: El borrador sigue la lectura estable del texto hebreo y el audit trail inglés, sin cambios de revisión relevantes. Se conservó la tensión léxica entre el material de entrada (lino/flax) y el producto textil blanqueado (tela blanca), reflejándola en el texto y en notas alternativas.
  spanish_consistency_notes:
  - Se usa «lino» para פשתים porque en español es la designación textil más natural; la nota aclara que el término puede implicar la planta/fibra de lino.
  - Se evita «SEÑOR» o terminología teológica ajena, ya que este verso no contiene nombres divinos.
  - 'Se mantiene el paralelismo de dos oficios: trabajar/preparar lino y tejer tela blanca.'
