    issue: '''Agostado'' no es la mejor opción para יֶחֱרַב aplicado a un río.'
    rationale: Aunque intenta distinguir el verbo de יָבֵשׁ, en español 'agostado' se asocia más naturalmente con vegetación, cultivos o paisaje, no con un río. Puede sonar forzado y menos fiel al campo semántico de desecación del cauce.
  - severity: medium
    issue: Falta la nota contextual sobre 'el río' como probable referencia al Nilo.
    rationale: 'El inglés POB conservó esta información como nota cultural/interpretativa importante: el hebreo usa el nombre común, no el propio. Esa matización debe preservarse también en español.'
