revisions:
- from: Después de estas cosas[a], cuando se había apaciguado la ira del rey Asuero, se acordó de Vasti, de lo que ella había hecho[b] y de lo que había sido decretado contra ella.
  to: Después de esto[a], cuando la ira del rey Asuero se había calmado, recordó a Vasti, lo que ella había hecho y lo que había sido decretado contra ella[b].
  rationale: Se ajustó la apertura a un español más natural («Después de esto»), se reemplazó «se acordó de» por «recordó a» para corresponder mejor a זָכַר, y se corrigió el anclaje de la nota [b] para que acompañe la cláusula sobre lo decretado contra Vasti, que es donde realmente aplica la alternativa preservada en el expediente inglés.
