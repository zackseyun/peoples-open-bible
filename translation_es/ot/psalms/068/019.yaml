translation:
  language: es
  text: Subiste a lo alto; llevaste cautiva la cautividad; recibiste dones entre los hombres[a], aun entre los rebeldes, para que Yah Dios habitara allí.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de parte de los hombres»; la preposición hebrea en «dones entre los hombres» también puede entenderse como indicación de origen, dando «recibiste dones de parte de los hombres».
    reason: lexical_alternative
  - marker: b
    text: O «para que Yah Dios habitara entre ellos» o «como morada para Yah Dios»; la cláusula final hebrea es compacta y admite más de una construcción sintáctica.
    reason: alternative_reading
lexical_decisions:
- source_word: עָלִיתָ
  english_pob_choice: you ascended
  chosen_spanish: Subiste
  alternatives_spanish:
  - Ascendiste
  - Subiste hacia arriba
  lexicon: HALOT
  rationale: עלה en perfecto 2ms expresa ascenso en tono poético y triunfal. En español, «subiste» es natural, directo y conserva la imagen vertical sin sonar más litúrgico de lo que exige el hebreo.
- source_word: לַמָּרוֹם
  english_pob_choice: on high
  chosen_spanish: a lo alto
  alternatives_spanish:
  - en lo alto
  - a las alturas
  lexicon: HALOT
  rationale: מָרוֹם indica altura o lugar elevado. «A lo alto» mantiene el movimiento ascendente del verbo previo y evita fijar innecesariamente un lugar concreto.
- source_word: שָׁבִיתָ שֶּׁבִי
  english_pob_choice: you led captivity captive
  chosen_spanish: llevaste cautiva la cautividad
  alternatives_spanish:
  - llevaste cautivos los cautivos
  - capturaste cautividad
  lexicon: HALOT
  rationale: La construcción de acusativo cognado merece conservarse en su fuerza retórica. La opción española reproduce la redundancia expresiva mejor que una reducción a «tomaste cautivos», aunque queda más marcada que el español ordinario.
- source_word: לָקַחְתָּ
  english_pob_choice: you received
  chosen_spanish: recibiste
  alternatives_spanish:
  - tomaste
  - recogiste
  lexicon: HALOT
  rationale: Aunque לקח suele ser «tomar», con «dones» el sentido direccional de recibir tributo o presentes es el más natural y coincide con la decisión auditada del inglés POB.
- source_word: מַתָּנוֹת
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - regalos
  - ofrendas
  - tributos
  lexicon: HALOT
  rationale: מַתָּנוֹת puede ser «dones», «regalos» o «tributos» según contexto. «Dones» conserva el carácter solemne y funciona bien en registro bíblico sin decidir de antemano si se trata de obsequios o tributo.
- source_word: בָּאָדָם
  english_pob_choice: among men
  chosen_spanish: entre los hombres
  alternatives_spanish:
  - de parte de los hombres
  - entre la humanidad
  lexicon: HALOT
  rationale: La preposición ב con אָדָם admite lectura de esfera o procedencia. «Entre los hombres» preserva la ambigüedad básica del hebreo y sigue de cerca la solución del inglés POB, sin cerrar la posibilidad de fuente ('de parte de').
- source_word: וְאַף
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - incluso
  - y aun
  lexicon: HALOT
  rationale: La partícula agrega énfasis y ampliación. «Aun» transmite bien el escalamiento retórico y encaja con el ritmo del verso.
- source_word: סוֹרְרִים
  english_pob_choice: the rebellious
  chosen_spanish: los rebeldes
  alternatives_spanish:
  - los obstinados
  - los contumaces
  lexicon: HALOT
  rationale: El participio describe a quienes resisten con rebeldía obstinada. «Los rebeldes» es claro, natural y suficientemente fuerte en español para conservar el valor moral del término.
- source_word: לִשְׁכֹּן
  english_pob_choice: so that ... might dwell
  chosen_spanish: para que ... habitara
  alternatives_spanish:
  - para morar
  - a fin de que ... habitara
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad. «Para que habitara» hace inteligible la cláusula en español y mantiene el sentido telico sin sobreexplicar el objeto del verbo.
- source_word: יָהּ אֱלֹהִים
  english_pob_choice: Yah God
  chosen_spanish: Yah Dios
  alternatives_spanish:
  - Yahvé Dios
  - Dios, Yah
  lexicon: HALOT
  rationale: יָהּ es la forma breve del nombre divino y no el tetragrámaton completo. Se conserva «Yah» por fidelidad textual; «Dios» traduce אֱלֹהִים de manera directa y evita sustituir la forma breve por la convención «SEÑOR».
theological_decisions:
- issue: Ambigüedad de בָּאָדָם en la cláusula de los dones
  english_pob_reading: among men
  chosen_spanish_reading: entre los hombres
  alternative_spanish_readings:
  - de parte de los hombres
  - entre la humanidad
  rationale: El hebreo permite entender la preposición como esfera («entre») o procedencia («de parte de»). Se conserva la ambigüedad sin resolverla dogmáticamente, siguiendo la cautela del audit trail inglés.
  doctrine_reference: Preservar tensión lexical y hermenéutica sin cerrar una lectura única.
- issue: Destino y referencia de la cláusula final לִשְׁכֹּן יָהּ אֱלֹהִים
  english_pob_reading: so that Yah God might dwell there
  chosen_spanish_reading: para que Yah Dios habitara allí
  alternative_spanish_readings:
  - para que Yah Dios habitara entre ellos
  - como morada para Yah Dios
  rationale: El hebreo es compacto y permite varias relaciones sintácticas. «Allí» evita especificar indebidamente si el destino es un lugar, un pueblo o la condición de residencia, manteniendo la tensión interpretativa documentada.
  doctrine_reference: Preservar tensión textual y teológica en lugar de resolverla prematuramente.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso auditado sigue siendo de acuerdo moderado con solo observaciones menores. Se mantuvieron la ambigüedad de בָּאָדָם y la compacidad de la cláusula final, y se evitó el reemplazo de יָהּ por una convención de máscara litúrgica.
  spanish_consistency_notes:
  - Se usó «Yah» de forma consistente para יָהּ, en lugar de «SEÑOR», conforme al criterio del proyecto.
  - Se prefirió «Dios» para אֱלֹהִים y no se añadió capitalización devocional innecesaria fuera de la forma fija «Yah Dios».
  - Se mantuvo el registro poético con verbos simples y paralelismo visible.
  - Las notas al pie conservan las alternativas relevantes donde el hebreo y el audit trail inglés dejan abierta la lectura.
