- from: Sus hijos iban y hacían un banquete[a], cada uno en su propia casa, en su día; y enviaban e invitaban a sus tres hermanas a comer y a beber con ellos.
  to: Sus hijos varones iban y hacían un festín[a], cada uno en su propia casa en su día, y enviaban e invitaban a sus tres hermanas a comer y a beber con ellos.
  rationale: Se ajusta «sus hijos» a «sus hijos varones» para preservar la referencia masculina específica de בָנָיו frente a las hermanas mencionadas después. Se cambia «banquete» por «festín» para una equivalencia más natural y menos formal de מִשְׁתֶּה. Se mantiene «en su día» y su nota porque conservan correctamente la ambigüedad del hebreo. No se requiere adjudicación adicional.
