    issue: Puntuación de la lista final
    rationale: La serie enumerativa queda más natural y consistente como '..., Tubal, Mesec, y Tiras' o, en español más estándar sin coma de Oxford, '..., Tubal, Mesec y Tiras'. Dado que ya hay comas en toda la lista, una revisión menor puede uniformar la presentación. El contenido no cambia.
  revised_spanish_text: 'Los hijos de Jafet: Gomer, Magog, Madai, Javán, Tubal, Mesec y Tiras.'
