id: 2CO.1.22
reference: 2 Corinthians 1:22
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ καὶ σφραγισάμενος ἡμᾶς καὶ δοὺς τὸν ἀρραβῶνα τοῦ πνεύματος ἐν ταῖς καρδίαις ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/001/022.yaml
  text: who also sealed us and gave the down payment of the Spirit in our hearts.
  footnotes:
  - marker: a
    text: Or 'deposit' or 'guarantee' of the Spirit.
    reason: lexical_alternative
translation:
  language: ko
  text: 하나님께서 또한 우리에게 인 치시고 우리 마음에 영을 보증으로 주셨습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σφραγισάμενος
  english_pob_choice: sealed
  chosen_korean: 인 치다
  alternatives_korean:
  - 도장 찍다
  lexicon: BDAG
  rationale: 소유권의 표시로 도장을 찍는 행위. 한국어 「인 치다」가 신학 정립 어휘.
- source_word: ἀρραβῶνα
  english_pob_choice: down payment
  chosen_korean: 보증
  alternatives_korean:
  - 보증금
  - 계약금
  lexicon: BDAG
  rationale: 셈어 어원의 상업 용어로 「선금·계약금」을 의미. 종말의 완성을 보증하는 첫 분량. 한국어 「보증」으로 옮긴다.
- source_word: τοῦ πνεύματος
  english_pob_choice: of the Spirit
  chosen_korean: 영
  alternatives_korean:
  - 성령
  lexicon: BDAG
  rationale: 본 절에서는 분명히 하나님의 영을 가리키나, DOCTRINE.md의 1세기 비-대문자화 정책에 따라 「영」으로 옮기되 문맥상 신적 영임이 자명하다.
