translation:
  language: es
  text: 'Maldito sea el que pervierta[a] la justicia debida[b] al forastero[c], al huérfano[d] y a la viuda. Y todo el pueblo dirá: «Amén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desvíe». El hebreo sugiere torcer o apartar la justicia de su curso recto.
    reason: lexical_alternative
  - marker: b
    text: O «el derecho que les corresponde». Aquí מִשְׁפָּט apunta a la causa o reclamo legal debido a estas personas vulnerables.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo ger: persona no nativa que vive entre Israel y ocupa una posición social vulnerable.'
    reason: cultural_note
  - marker: d
    text: O «sin padre».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed
  chosen_spanish: Maldito sea
  alternatives_spanish:
  - Cursed sea
  - Sea maldito
  lexicon: HALOT
  rationale: El hebreo abre una fórmula de maldición de pacto. En español, «Maldito sea» transmite esa fuerza con naturalidad y solemnidad; evita un calco demasiado rígido y conserva el tono jurídico-ritual.
- source_word: מַטֶּה
  english_pob_choice: perverts
  chosen_spanish: pervierta
  alternatives_spanish:
  - desvíe
  - torzca
  - tuerta
  lexicon: HALOT
  rationale: El verbo en este contexto legal expresa torcer o corromper la justicia. «Pervierta» recoge bien la idea de desviar de su curso recto y mantiene la gravedad moral y jurídica.
- source_word: מִשְׁפַּט
  english_pob_choice: the justice due to
  chosen_spanish: el derecho
  alternatives_spanish:
  - la justicia
  - el juicio
  - el debido derecho
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט no se limita a «justicia» abstracta, sino al derecho/causa legal de personas vulnerables. «El derecho» funciona en español como término jurídico compacto y preserva la idea de lo que les corresponde.
- source_word: גֵּר
  english_pob_choice: the sojourner
  chosen_spanish: el forastero
  alternatives_spanish:
  - el extranjero
  - el residente forastero
  - el forastero residente
  lexicon: HALOT
  rationale: El término designa a una persona no nativa que vive dentro de Israel y queda socialmente vulnerable. «Forastero» comunica esa alteridad personal sin sonar técnico; se prefiere aquí sobre «extranjero», que en español moderno puede sugerir sobre todo nacionalidad o inmigración contemporánea.
- source_word: יָתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: el huérfano
  alternatives_spanish:
  - el desamparado
  - el sin padre
  lexicon: HALOT
  rationale: Aunque el inglés POB conserva «fatherless», en español «huérfano» es la equivalencia natural y clara. Captura la categoría social de vulnerabilidad sin necesidad de una paráfrasis incómoda.
- source_word: אַלְמָנָה
  english_pob_choice: the widow
  chosen_spanish: la viuda
  lexicon: HALOT
  rationale: Correspondencia directa y estable para la categoría legal-social de vulnerabilidad.
- source_word: וְאָמַר כָּל הָעָם
  english_pob_choice: And all the people shall say
  chosen_spanish: Y todo el pueblo dirá
  alternatives_spanish:
  - Entonces todo el pueblo dirá
  - Y todo el pueblo responderá
  lexicon: HALOT
  rationale: La secuencia funciona como respuesta litúrgica dentro del rito del pacto. «Dirá» reproduce adecuadamente la fórmula sin forzar un futuro modal excesivamente marcado en español.
- source_word: אָמֵן
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  - Verdaderamente
  lexicon: HALOT
  rationale: Se preserva la forma litúrgica estable en español. «Amén» mantiene la respuesta ritual y su valor confesional.
theological_decisions:
- issue: Triada legal de vulnerables sin importar categorías modernas ajenas al texto
  english_pob_reading: the sojourner, the fatherless, and the widow
  chosen_spanish_reading: el forastero, el huérfano y la viuda
  alternative_spanish_readings:
  - el extranjero, el huérfano y la viuda
  - el residente forastero, el huérfano y la viuda
  rationale: La frase denuncia una corrupción de justicia contra grupos socialmente expuestos dentro del marco de la ley del pacto. «Forastero» conserva la idea de no pertenencia local sin convertir el texto en una categoría política moderna, y «huérfano» comunica con claridad la vulnerabilidad del término hebreo.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable modern Spanish; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el audit trail inglés y no requiere revisión adicional: se conservaron la fórmula de maldición, la triada legal de vulnerables y la respuesta litúrgica final, ajustando solo a un español más natural y jurídicamente claro.'
  spanish_consistency_notes:
  - Se mantuvo «Amén» como respuesta litúrgica fija.
  - Se eligió «forastero» para גֵּר por coherencia con la nota cultural y para evitar una lectura anacrónica.
  - Se usó «huérfano» como equivalente natural de «fatherless», manteniendo la categoría de vulnerabilidad sin sobreexplicación.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el hebreo de este versículo.
