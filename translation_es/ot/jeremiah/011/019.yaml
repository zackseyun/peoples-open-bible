  text: וַ/אֲנִ֕י כְּ/כֶ֥בֶשׂ אַלּ֖וּף יוּבַ֣ל לִ/טְב֑וֹחַ וְ/לֹֽא יָדַ֜עְתִּי כִּֽי עָלַ֣/י חָשְׁב֣וּ מַחֲשָׁב֗וֹת נַשְׁחִ֨יתָה עֵ֤ץ בְּ/לַחְמ/וֹ֙ וְ/נִכְרְתֶ֨/נּוּ֙ מֵ/אֶ֣רֶץ חַיִּ֔ים וּ/שְׁמ֖/וֹ לֹֽא יִזָּכֵ֥ר עֽוֹד־־׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/011/019.yaml
  text: 'But I was like a gentle lamb led to the slaughter[a], and I did not know that they had devised plans against me: ‘Let us destroy the tree with its food, and let us cut him off from the land of the living[b], so that his name will be remembered no more.’'
  footnotes:
  - marker: a
    text: Or 'like a tame lamb' or 'like a lamb familiar with humans'; the Hebrew adjective is difficult.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew obscure: ''Let us destroy the tree with its bread/food.'' Many understand the sense as total destruction of the tree together with its produce.'
    reason: lexical_alternative
