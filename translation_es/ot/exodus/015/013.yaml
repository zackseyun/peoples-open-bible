translation:
  language: es
  text: En tu amor constante has llevado al pueblo que redimiste[a]; en tu fuerza los has guiado a tu santa morada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a este pueblo que redimiste».'
    reason: lexical_alternative
  - marker: b
    text: «Tu santa morada» puede referirse ampliamente al lugar de la presencia santa de Dios; los intérpretes la entienden de manera diversa como el Sinaí, la tierra prometida o Sion/el templo.
    reason: alternative_reading
lexical_decisions:
- source_word: נָחִ֥יתָ
  english_pob_choice: you have led
  chosen_spanish: has guiado
  alternatives_spanish:
  - has llevado
  - has conducido
  lexicon: HALOT
  rationale: El verbo en Hifil expresa dirigir o guiar. 'Has guiado' mantiene el sentido de conducción cuidadosa y suena natural en español bíblico actual.
- source_word: בְחַסְדְּךָ
  english_pob_choice: in your steadfast love
  chosen_spanish: en tu amor constante
  alternatives_spanish:
  - en tu amor fiel
  - en tu lealtad de pacto
  - en tu misericordia constante
  lexicon: HALOT
  rationale: חֶסֶד combina amor, lealtad y fidelidad pactual. 'Amor constante' conserva esa mezcla sin volver el español demasiado técnico.
- source_word: עַם זוּ
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a este pueblo
  - al pueblo este
  lexicon: HALOT
  rationale: El hebreo tiene fuerza demostrativa ('este pueblo'), pero en español la forma más natural y clara en este contexto es 'al pueblo', con el referente ya identificado por la cláusula relativa.
- source_word: גָּאָ֑לְתָּ
  english_pob_choice: you redeemed
  chosen_spanish: redimiste
  alternatives_spanish:
  - rescataste
  - reclamaste como redentor
  lexicon: HALOT
  rationale: גאל es un término clave de redención. 'Redimiste' preserva la carga teológica y el registro bíblico sin forzar una paráfrasis.
- source_word: נֵהַ֥לְתָּ
  english_pob_choice: you have guided
  chosen_spanish: has conducido
  alternatives_spanish:
  - has guiado
  - has llevado
  lexicon: HALOT
  rationale: נהל puede expresar conducir con cuidado. Aquí se distingue de נחה mediante 'has conducido', que mantiene la diferencia semántica y el paralelismo poético.
- source_word: בְעָזְּךָ
  english_pob_choice: in your strength
  chosen_spanish: en tu fuerza
  alternatives_spanish:
  - con tu poder
  - por tu poder
  lexicon: HALOT
  rationale: עֹז significa fuerza o poder. 'En tu fuerza' conserva la construcción poética paralela a 'en tu amor constante'.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: hasta
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: En este contexto de destino alcanzado, 'hasta' comunica el movimiento hacia la meta con el matiz de llegada implícito en el hebreo.
- source_word: נְוֵה קָדְשֶׁךָ
  english_pob_choice: your holy dwelling
  chosen_spanish: tu morada santa
  alternatives_spanish:
  - tu santa morada
  - tu habitación santa
  - tu santo lugar de morada
  lexicon: HALOT
  rationale: נָוֶה puede denotar morada o habitación. 'Morada santa' es clara y digna en español, y conserva la amplitud del referente sin resolverlo.
theological_decisions:
- issue: Referente de 'tu morada santa'
  english_pob_reading: A deliberately broad reference to the place of God's holy presence, without specifying whether Sinai, Canaan, Zion, or the heavenly dwelling is exclusively intended.
  chosen_spanish_reading: Una referencia amplia al lugar de la presencia santa de Dios, sin precisar de modo exclusivo si se trata de Sinaí, la tierra prometida, Sion o la morada celestial.
  alternative_spanish_readings:
  - Sinaí como destino inmediato
  - la tierra prometida como destino
  - Sion o el templo como cumplimiento final
  rationale: El hebreo no identifica de manera inequívoca el lugar. La traducción española conserva esa amplitud con 'morada santa' y no resuelve la tensión teológica en el texto principal.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se corrigió la anclaje de las notas para que cada marcador aparezca exactamente en el texto español y quede auditoría transparente de las alternativas léxicas y del referente teológico.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no necesario aquí porque el verso usa sufijos posesivos dirigidos a Dios; la referencia divina está implícita en el discurso.
  - Se eligieron formas verbales en perfecto compuesto/pretérito perfecto simple para reflejar el carácter narrativo-poético del canto, sin rigidizar el aspecto hebreo.
  - '''Morada santa'' evita resolver el alcance del destino y conserva la ambigüedad documentada por la traducción inglesa auditada.'
