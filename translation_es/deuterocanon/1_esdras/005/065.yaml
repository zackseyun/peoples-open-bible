  language: en
  yaml_path: translation/deuterocanon/1_esdras/005/065.yaml
  text: And coming to Zerubbabel and Jeshua and the heads of the fathers’ houses[a], they said to them, “We will build with you.”
  footnotes:
  - marker: a
    text: Or, “We will join you in building.” The Greek verb means to build together with someone, not merely to offer general support.
