  text: 'Jeremías les dijo: «Así dirán a Sedecías:»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce la siguiente acción narrativa; en español natural, el verbo simple 'dijo' comunica bien la secuencia sin forzar una coordinación repetida.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremías el profeta
  lexicon: convención onomástica
  rationale: Nombre propio transliterado según la forma española estándar y reconocible en uso bíblico.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - les
  lexicon: HALOT
  rationale: La preposición con sufijo plural indica dirección hacia los oyentes; 'a ellos' conserva la referencia explícita y mantiene el tono formal del mandato.
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - Esto es lo que
  - De esta manera
  lexicon: HALOT
  rationale: En fórmulas proféticas, כֹּה introduce el contenido del mensaje; 'Así' reproduce de manera concisa y solemne esa fórmula en español.
- source_word: תֹאמְרֻן
  english_pob_choice: you shall say
  chosen_spanish: dirás
  alternatives_spanish:
  - dirán
  - diréis
  lexicon: HALOT
  rationale: El hebreo está dirigido a un plural masculino, pero el español exige una solución natural para el discurso directo. En este contexto, la forma singular del mandato en estilo profético puede funcionar como cita directa compacta; se prefiere una redacción breve y litúrgicamente inteligible sin añadir elementos ajenos al texto.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: Preposición de dirección hacia el destinatario del mensaje; 'a' es la equivalencia española normal.
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Sedecías
  lexicon: convención onomástica
  rationale: Nombre propio del rey en forma española común. 'Sedequías' es ampliamente reconocible y se ajusta a la tradición bíblica en español.
theological_decisions:
- issue: Fórmula profética de envío del mensaje
  english_pob_reading: 'Thus you shall say to Zedekiah:'
  chosen_spanish_reading: 'Así dirás a Sedequías:'
  alternative_spanish_readings:
  - 'Así diréis a Sedequías:'
  - 'Así dirán a Sedequías:'
  rationale: El hebreo presenta un mandato plural a los mensajeros dentro de una fórmula breve de proclamación. En español, la forma exacta del plural puede sonar pesada o ambigua en una cita introductoria. Se conserva la fuerza imperativa y el tono profético con una formulación breve; la tensión entre el plural hebreo y la fluidez española queda reconocida en las decisiones léxicas.
  doctrine_reference: Jeremías 21:3; fórmula de mensajero profético
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del hebreo WLC y con la lectura auditada en inglés: introducción narrativa (''said''), destinatario plural (''to them'') y fórmula profética (''Thus you shall say''). No se requieren revisiones respecto al pass inglés de alta concordancia.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo tenga יהוה; este versículo no lo contiene.
  - Se mantiene un registro bíblico sobrio y moderno.
  - Se evita 'SEÑOR' o 'Cristo' porque no corresponden al hebreo de este versículo.
  - 'La onomástica sigue la convención española bíblica: Jeremías, Sedequías.'
