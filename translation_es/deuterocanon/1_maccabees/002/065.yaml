review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en conjunto: conserva el vocativo de atención de καὶ ἰδοὺ, el nombre Simeón, la caracterización ἀνὴρ βουλῆς como «hombre de consejo», el mandato αὐτοῦ ἀκούετε como «escúchalo», y la metáfora εἰς πατέρα como función paternal. Sin embargo, hay un desajuste de número en los pronombres: el griego usa ὑμῶν/ὑμῖν y el inglés POB «your brother ... to you» se dirige a varios oyentes, mientras que el español alterna singular («tu», «ti») con una referencia implícitamente plural. Además, «todos tus días» suena poco natural en español en este contexto.'
  spanish_quality_summary: El texto es legible, pero «Y mira» resulta algo coloquial para el registro y «todos tus días» suena forzado. También conviene corregir la concordancia de tratamiento a plural para coherencia interna y mayor fidelidad al original. «Y he aquí» da un tono más digno y cercano a ἰδού sin volverse ininteligible.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Simeón», «hombre de consejo» y «será para ustedes un padre» están alineados con las decisiones auditadas. No se requieren notas léxicas adicionales.
  issues:
  - severity: medium
    issue: Inconsistencia de número/persona en los pronombres
    rationale: 'El griego se dirige a varios destinatarios (ὑμῶν, ὑμῖν), pero el borrador usa singular: «tu hermano ... para ti». Debe ser plural en español para reflejar el original.'
  - severity: low
    issue: «Todos tus días» suena poco natural
    rationale: Aunque literal, en español bíblico natural suena mejor «todos los días» o «todos los días de su vida». Aquí «todos los días» conserva bien la fuerza durativa sin rigidez innecesaria.
  - severity: low
    issue: Registro algo coloquial en «Y mira»
    rationale: La opción es defendible, pero para un estilo digno y para acompañar el inglés auditado revisado a «And behold», «Y he aquí» encaja mejor que «Y mira».
  revised_spanish_text: Y he aquí, Simeón su hermano; sé que es un hombre de consejo. Escúchenlo todos los días; él será para ustedes un padre.
  revision_rationale: Se ajusta el tratamiento al plural para reflejar el griego, se mejora la naturalidad de «πάσας τὰς ἡμέρας» con «todos los días», y se eleva ligeramente el registro de καὶ ἰδοὺ con «Y he aquí». No hacen falta notas.
