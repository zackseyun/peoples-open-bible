translation:
  language: es
  text: ¡Despierta, despierta! Vístete de tu fuerza, Sion; vístete de tus vestiduras hermosas[a], Jerusalén, la ciudad santa. Porque nunca más entrará en ti el incircunciso y el impuro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Vístete de tus vestiduras de esplendor».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «el incircunciso y el impuro» conserva el lenguaje hebreo de pacto y pureza; la frase puede referirse en sentido amplio a quienes quedan excluidos de la santidad de Jerusalén.
    reason: cultural_note
lexical_decisions:
- source_word: עוּרִי עוּרִי
  english_pob_choice: Awake, awake
  chosen_spanish: ¡Despierta[a], despierta[a]!
  alternatives_spanish:
  - ¡Levántate, levántate!
  - ¡Despiértate, despiértate!
  lexicon: HALOT
  rationale: El hebreo usa dos imperativos femeninos singulares repetidos para urgencia poética. «Despierta» conserva la fuerza exhortativa y suena natural en español bíblico moderno; la repetición mantiene el énfasis. Se ancla la nota porque el español admite también un matiz de ‘levántate’ o ‘despiértate’.
- source_word: לִבְשִׁי עֻזֵּךְ
  english_pob_choice: put on your strength
  chosen_spanish: Vístete de tu fuerza
  alternatives_spanish:
  - Cúbrete con tu fuerza
  - Ponte tu fuerza
  lexicon: HALOT
  rationale: Se conserva la metáfora de vestirse con fuerza, que en español se expresa con naturalidad como «vístete de». «De tu fuerza» reproduce el complemento posesivo del hebreo sin volverlo explicativo.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  lexicon: HALOT
  rationale: Se emplea la forma española tradicional y ampliamente reconocible «Sion» para el nombre propio geográfico-personificado. Mantiene la referencia al monte/ciudad en un registro bíblico natural.
- source_word: לִבְשִׁי בִּגְדֵי תִפְאַרְתֵּךְ
  english_pob_choice: put on your beautiful garments
  chosen_spanish: vístete de tus vestidos hermosos
  alternatives_spanish:
  - vístete de tus vestidos de esplendor
  - cúbrete con tus prendas gloriosas
  lexicon: HALOT
  rationale: «Vestidos hermosos» recoge בִּגְדֵי תִפְאַרְתֵּךְ de manera transparente y natural. La alternativa «de esplendor» preserva el posible matiz de תִפְאֶרֶת, pero «hermosos» evita oscurecer el sentido básico en español.
- source_word: יְרוּשָׁלִַם עִיר הַקֹּדֶשׁ
  english_pob_choice: Jerusalem, the holy city
  chosen_spanish: Jerusalén, la ciudad santa[b]
  alternatives_spanish:
  - Jerusalén, la ciudad santa
  - Jerusalén, ciudad santa
  lexicon: HALOT
  rationale: 'Se mantiene la aposición con artículo en español: «la ciudad santa». Esto reproduce el valor definido del hebreo y su tono vocativo. Se ancla la nota porque la expresión también puede percibirse como una simple designación honorífica; la nota aclara la carga de santidad y pertenencia.'
- source_word: כִּי לֹא יוֹסִיף יָבֹא בָךְ עוֹד
  english_pob_choice: For no longer shall ... enter you again
  chosen_spanish: Porque nunca más entrará en ti
  alternatives_spanish:
  - Porque ya no volverá a entrar en ti
  - Pues no volverá a entrar en ti jamás
  lexicon: HALOT
  rationale: «Nunca más» comunica la idea de cese definitivo que en inglés POB se expresó con «no longer ... again». El verbo «entrar en ti» conserva el hebraísmo de movimiento hacia la ciudad. Se evita sobrerrepresentar el sujeto, que el hebreo no explicita aquí.
- source_word: יָבֹא בָךְ
  english_pob_choice: enter you
  chosen_spanish: entrará en ti
  alternatives_spanish:
  - vendrá a ti
  - entrará dentro de ti
  lexicon: HALOT
  rationale: El hebreo usa בוא + ב con la ciudad como destino. «Entrará en ti» es una forma española concisa y fiel; mantiene el sentido de entrada en la ciudad sin añadir carga interpretativa.
- source_word: עָרֵל
  english_pob_choice: the uncircumcised
  chosen_spanish: el incircunciso
  alternatives_spanish:
  - el no circuncidado
  - los incircuncisos
  lexicon: HALOT
  rationale: Se opta por el singular colectivo, como en el inglés POB, para conservar la categoría covenantal de exclusión. «Incircunciso» es el término bíblico normal en español y evita una explicación perifrástica.
- source_word: וְטָמֵא
  english_pob_choice: and the unclean
  chosen_spanish: y el impuro
  alternatives_spanish:
  - y el inmundo
  - y el contaminado ritualmente
  lexicon: HALOT
  rationale: «Impuro» conserva el campo semántico de טָמֵא y resulta claro en español contemporáneo. Aunque «inmundo» es tradicional, «impuro» comunica mejor el valor ritual/moral amplio sin cargar el texto con arcaísmo.
theological_decisions:
- issue: Alcance de la exclusión final de Jerusalén
  english_pob_reading: Retain the covenantal and purity language without specifying whether the reference is ethnic, ritual, moral, or eschatological beyond what the text states.
  chosen_spanish_reading: Mantener el lenguaje de pacto y pureza sin concretar si la referencia es étnica, ritual, moral o escatológica más allá de lo que dice el texto.
  alternative_spanish_readings:
  - Interpretarlo como exclusión de invasores extranjeros
  - Interpretarlo como exclusión de personas ritualmente impuras
  - Interpretarlo como imagen escatológica de santidad consumada
  rationale: El versículo conserva categorías bíblicas de santidad y pureza, pero no define por sí mismo el alcance exacto. La traducción española preserva esa tensión en lugar de resolverla prematuramente.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del POB en inglés que añade el artículo antes de «the holy city». En español se refleja de forma natural con «la ciudad santa». También se preserva el paralelismo imperativo repetido y el cierre con exclusión definitiva («nunca más»), acorde con la revisión y el audit trail.
  spanish_consistency_notes:
  - Se usa «Sion» de forma consistente como nombre propio bíblico español.
  - Se mantiene «Jerusalén» con aposición definida «la ciudad santa» para reproducir el tono del hebreo.
  - «Impuro» se emplea como equivalente de טָמֵא para conservar amplitud ritual y moral.
  - La repetición de los imperativos se conserva con signos de exclamación para reflejar urgencia poética sin añadir contenido no presente en el hebreo.
