translation:
  language: es
  text: Sin embargo, ni el rey ni ninguno de sus siervos que oyeron todas estas palabras tuvieron temor, ni rasgaron sus vestidos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rasgarse las vestiduras era una señal acostumbrada de dolor, horror o arrepentimiento en el antiguo Cercano Oriente.
    reason: cultural_note
  - marker: b
    text: 'O: rasgar sus ropas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא / וְכָל
  english_pob_choice: Yet neither ... nor any of his servants
  chosen_spanish: Sin embargo, ni el rey ni ninguno de sus siervos
  alternatives_spanish:
  - Y no el rey ni todos sus siervos
  - Pero ni el rey ni sus servidores
  lexicon: HALOT
  rationale: El hebreo acumula negación y coordinación; en español, «Sin embargo, ni ... ni ...» reproduce la fuerza adversativa y la doble negación sin forzar una sintaxis extraña.
- source_word: פָחֲדוּ
  english_pob_choice: were afraid
  chosen_spanish: tuvieron temor
  alternatives_spanish:
  - temieron
  - estuvieron aterrados
  lexicon: HALOT
  rationale: El verbo expresa miedo/dread. «Tuvieron temor» mantiene un registro digno y natural en español, sin intensificar más allá del texto.
- source_word: קָרְעוּ אֶת־בִּגְדֵיהֶם
  english_pob_choice: tear their garments
  chosen_spanish: rasgaron sus vestidos
  alternatives_spanish:
  - rasgaron sus ropas
  - rompieron sus vestidos
  lexicon: HALOT
  rationale: «Vestidos» conserva el valor cultural-literario del gesto ritual; «rasgaron» refleja bien el verbo hebreo y evita la banalidad de una simple referencia a ropa cotidiana.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Correspondencia directa y transparente del sustantivo definido.
- source_word: וְכָל־עֲבָדָיו
  english_pob_choice: nor any of his servants
  chosen_spanish: ni ninguno de sus siervos
  alternatives_spanish:
  - ni ninguno de sus servidores
  - ni todos sus siervos
  lexicon: HALOT
  rationale: «Siervos» puede conservar la referencia a funcionarios de corte sin cargar con «esclavos» en un contexto donde el énfasis no es la esclavitud literal. El paralelo con la negación previa pide «ni ninguno de sus ...».
- source_word: הַשֹּׁמְעִים
  english_pob_choice: who heard
  chosen_spanish: que oyeron
  alternatives_spanish:
  - que escucharon
  - los que oían
  lexicon: HALOT
  rationale: El participio identifica a los siervos por su acción pasada de oír la lectura. «Oyeron» es breve, natural y fiel.
- source_word: אֵת כָּל־הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todas estas cosas
  - todos estos dichos
  lexicon: HALOT
  rationale: En el contexto de la lectura del rollo, «palabras» preserva el foco textual del hebreo y coincide con la decisión auditada en inglés.
theological_decisions:
- issue: El gesto de rasgar las vestiduras como señal de reacción ante el mensaje divino
  english_pob_reading: Tearing one's garments was a customary sign of grief, horror, or repentance in the ancient Near East.
  chosen_spanish_reading: Rasgar sus vestidos se entiende como un gesto cultural de duelo, horror o arrepentimiento, no solo como una acción física.
  alternative_spanish_readings:
  - Era simplemente un detalle narrativo sin carga simbólica
  - Solo indica enojo
  rationale: Conviene conservar el valor ceremonial del gesto, porque el hebreo y la nota inglesa lo tratan como señal cultural compartida en el antiguo Cercano Oriente.
  doctrine_reference: Comentario cultural y contexto narrativo del AT
translation_notes:
  revision_awareness: 'El texto sigue el acuerdo alto del audit trail inglés y no requiere cambios respecto de la lectura base: mantiene la doble negación, conserva el valor idiomático de «rasgar las vestiduras» y refleja «all these words» como «todas estas palabras».'
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología por defecto solo cuando el texto lo exigiera; aquí no aparece el nombre divino.
  - «Siervos» se eligió por el contexto cortesano, evitando «esclavos» porque no está en foco la servidumbre servil literal.
  - «Palabras» preserva el paralelismo con la lectura del rollo y evita desdibujar דְּבָרִים como «cosas».
