- from: 'Entonces el rey dijo a Amán[a]: «La plata[b] te es dada, y también el pueblo, para hacer con él[c] lo que bien te parezca[d]».'
  to: 'Entonces el rey dijo a Amán: «La plata[a] te es dada, y también el pueblo[b], para hacer con ellos[c] lo que bien te parezca[d]».'
