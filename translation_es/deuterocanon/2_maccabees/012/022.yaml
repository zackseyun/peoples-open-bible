translation:
  language: es
  text: Pero cuando la compañía de Judas apareció[a] primero, y cayó sobre los enemigos un gran temor —y también miedo por la aparición del que observa todas las cosas, que cayó sobre ellos—, se lanzaron a la huida, llevados cada uno por distinto rumbo, de modo que muchas veces resultaban heridos por los suyos y atravesados por las puntas de sus espadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la aparición». El griego repite el mismo lenguaje de aparición usado antes en el versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιφανείσης
  english_pob_choice: appeared / appearing
  chosen_spanish: apareció
  alternatives_spanish:
  - se hizo visible
  - fue manifestada
  - aparición
  lexicon: LSJ
  rationale: El aoristo participial de ἐπιφαίνω expresa hacerse visible o presentarse de pronto. En español, 'apareció' conserva la inmediatez narrativa; en la nota se puede mantener 'aparición' para reflejar la repetición del lexema griego.
- source_word: σπείρης
  english_pob_choice: company
  chosen_spanish: compañía
  alternatives_spanish:
  - banda
  - tropa
  - cohorte
  lexicon: LSJ
  rationale: σπεῖρα puede designar una unidad militar, pero 'compañía' transmite el sentido de grupo armado sin precisar indebidamente una formación romana técnica.
- source_word: δέους
  english_pob_choice: dread
  chosen_spanish: gran temor
  alternatives_spanish:
  - pavor
  - espanto
  - temor reverente
  lexicon: LSJ
  rationale: δέος expresa temor intenso y puede rozar el asombro reverente. 'Gran temor' mantiene la fuerza sin añadir una matización devocional no explícita en el contexto bélico.
- source_word: πολεμίους
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - fieles
  - adversarios
  - contrarios
  lexicon: LSJ
  rationale: Término militar directo; 'enemigos' es la equivalencia natural y clara en español.
- source_word: φόβου
  english_pob_choice: fear
  chosen_spanish: miedo
  alternatives_spanish:
  - temor
  - pavor
  lexicon: LSJ
  rationale: φόβος es el sustantivo común para miedo/temor. Aquí 'miedo' funciona bien junto con 'gran temor' para evitar monotonía y preservar la distinción con δέος.
- source_word: τοῦ τὰ πάντα ἐφορῶντος
  english_pob_choice: the One who watches over all things
  chosen_spanish: del que observa todas las cosas
  alternatives_spanish:
  - del que ve todas las cosas
  - del que vela por todas las cosas
  - del que todo lo ve
  lexicon: LSJ
  rationale: ἐφοράω significa mirar, observar o vigilar. 'Observa todas las cosas' conserva la idea de visión total; en combinación con el contexto, deja abierta la nota providencial sin sobretraducir 'watches over' como si fuera un tecnicismo.
- source_word: εἰς φυγὴν ὥρμησαν
  english_pob_choice: they rushed into flight
  chosen_spanish: se lanzaron a la huida
  alternatives_spanish:
  - huyeron precipitadamente
  - se precipitaron en fuga
  - corrieron a huir
  lexicon: LSJ
  rationale: ὁρμάω aporta impulso repentino; con εἰς φυγήν forma una imagen de fuga súbita. 'Se lanzaron a la huida' conserva el movimiento brusco y el tono narrativo.
- source_word: ἄλλος ἀλλαχῇ φερόμενος
  english_pob_choice: each man being driven a different way
  chosen_spanish: llevados cada uno por distinto rumbo
  alternatives_spanish:
  - cada uno arrastrado en distinta dirección
  - uno por un lado y otro por otro
  - cada uno llevado a otra parte
  lexicon: LSJ
  rationale: La construcción distributiva indica dispersión caótica, con sentido pasivo de ser llevados. 'Llevados cada uno por distinto rumbo' preserva tanto la pasividad como la diversidad direccional.
- source_word: βλάπτεσθαι
  english_pob_choice: were injured
  chosen_spanish: eran dañados
  alternatives_spanish:
  - eran heridos
  - sufrían daño
  - resultaban lesionados
  lexicon: LSJ
  rationale: βλάπτω es un verbo amplio de dañar o perjudicar. 'Eran dañados' reproduce esa amplitud sin especificar una herida más concreta que la del griego.
- source_word: ἀναπείρεσθαι
  english_pob_choice: run through
  chosen_spanish: atravesados
  alternatives_spanish:
  - pasados de parte a parte
  - empuñalados
  - ensartados
  lexicon: LSJ
  rationale: El verbo expresa ser atravesado o traspasado por un arma. 'Atravesados' mantiene el valor básico y se integra bien con 'por las puntas de sus espadas'.
- source_word: ταῖς τῶν ξιφῶν ἀκμαῖς
  english_pob_choice: by the points of their swords
  chosen_spanish: por las puntas de sus espadas
  alternatives_spanish:
  - por los filos de sus espadas
  - por las hojas de sus espadas
  - por las puntas de las espadas
  lexicon: LSJ
  rationale: ἀκμή aquí remite a la punta o extremo agudo. 'Puntas de sus espadas' reproduce la imagen de ser heridos por la parte aguda del arma.
theological_decisions:
- issue: Cómo traducir τοῦ τὰ πάντα ἐφορῶντος sin neutralizar la referencia a la mirada divina
  english_pob_reading: the One who watches over all things
  chosen_spanish_reading: del que observa todas las cosas
  alternative_spanish_readings:
  - del que todo lo ve
  - del que vela por todas las cosas
  - del que ve todas las cosas
  rationale: El griego atribuye a Dios una visión u observación universal. 'Observa todas las cosas' es fiel y natural; la nota de lectura alternativa permite conservar la posibilidad de una implicación providencial sin imponerla como glosa principal.
  doctrine_reference: Transparencia del nombre y atributos divinos; providencia y omnisciencia en la narración
- issue: Cómo reflejar la doble secuencia de temor en δέος y φόβος
  english_pob_reading: dread ... fear
  chosen_spanish_reading: gran temor ... miedo
  alternative_spanish_readings:
  - pavor ... temor
  - temor reverente ... miedo
  - espanto ... temor
  rationale: El griego usa dos términos cercanos pero no idénticos. En español, 'gran temor' y 'miedo' mantienen el paralelismo sin colapsar ambos en un solo vocablo; no se introduce 'temor reverente' porque el contexto es de terror militar, no de adoración.
  doctrine_reference: Precisión semántica en vocabulario afectivo; distinción entre temor y miedo en contexto narrativo
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente sin cambios sustantivos; la redacción conserva la duplicación de lenguaje de aparición y el contraste entre δέος y φόβος, con ajuste natural al español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se evita 'Cristo' y otras fórmulas tradicionales no pertinentes.
  - '''Compañía'' se usa en sentido militar general, no como término técnico romano.'
  - La nota a conserva la alternativa semántica de 'aparición' para reflejar la repetición del griego ἐπιφανείσης/ἐπιφανίας.
