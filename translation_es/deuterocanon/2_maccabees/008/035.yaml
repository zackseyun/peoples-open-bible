translation:
  language: es
  text: Habiendo sido humillado por aquellos que él había considerado los menos importantes entre los suyos, y con la ayuda del Señor, habiendo dejado su vestidura espléndida, se hizo un fugitivo solitario por el interior del país[a] y llegó a Antioquía, habiendo prosperado sobremanera[b] en la destrucción de su ejército.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «por el interior». El griego se refiere al territorio interior, no al mar Mediterráneo.
    reason: lexical_alternative
  - marker: b
    text: 'La frase es irónica: «habiendo prosperado sobremanera» solo se dice en relación con la destrucción de su propio ejército.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταπεινωθεὶς
  english_pob_choice: having been humbled
  chosen_spanish: habiendo sido humillado
  alternatives_spanish:
  - habiendo sido abatido
  - habiendo sido humillado
  lexicon: LSJ
  rationale: El aoristo pasivo exige una forma pasiva en español. «Humillado» conserva la idea de rebajamiento y vergüenza/reverso de honor que encaja con el contexto narrativo.
- source_word: ὑπὸ τῶν καθʼ αὑτὸν νομιζομένων ἐλαχίστων εἶναι
  english_pob_choice: by those whom he had considered the least
  chosen_spanish: por aquellos que él había considerado los menos importantes entre los suyos
  alternatives_spanish:
  - por aquellos que él había considerado los más pequeños entre los suyos
  - por aquellos que se pensaba que eran los menos importantes entre los suyos
  lexicon: LSJ
  rationale: 'La frase griega es comprimida y presenta ironía: los que se consideraban mínimos resultan agentes de su humillación. «Los menos importantes entre los suyos» conserva esa ironía sin sonar antinatural en español.'
- source_word: τῇ τοῦ κυρίου βοηθείᾳ
  english_pob_choice: with the Lord’s help
  chosen_spanish: con la ayuda del Señor
  alternatives_spanish:
  - por la ayuda del Señor
  - mediante la ayuda del Señor
  lexicon: LSJ
  rationale: El dativo expresa medio/ayuda. «Con la ayuda del Señor» es natural en español y mantiene la atribución explícita al Señor.
- source_word: τὴν δοξικὴν ἀποθέμενος ἐσθῆτα
  english_pob_choice: having laid aside his splendid robe
  chosen_spanish: habiendo dejado su vestidura espléndida
  alternatives_spanish:
  - habiendo quitado su ropa gloriosa
  - habiendo desechado su magnífica vestidura
  lexicon: LSJ
  rationale: «Vestidura espléndida» refleja el valor de rango y ostentación de δοξικήν; «vestidura» evita una reducción demasiado moderna de ἐσθῆτα a simple ropa.
- source_word: διὰ τῆς μεσογείου
  english_pob_choice: through the inland country
  chosen_spanish: por el interior del país
  alternatives_spanish:
  - por el interior
  - a través del territorio interior
  lexicon: LSJ
  rationale: μεσόγειος aquí designa el territorio interior, no el mar Mediterráneo. «Por el interior del país» es claro y evita la ambigüedad geográfica.
- source_word: δραπέτου τρόπον
  english_pob_choice: like a fugitive
  chosen_spanish: como un fugitivo
  alternatives_spanish:
  - a manera de fugitivo
  - como un fugitivo fugitivo
  lexicon: LSJ
  rationale: La comparación adverbial transmite una huida vergonzosa. «Como un fugitivo» conserva el sentido sin introducir innecesariamente la carga específica de «esclavo fugitivo».
- source_word: ἔρημον ἑαυτὸν ποιήσας
  english_pob_choice: he made himself a solitary fugitive
  chosen_spanish: se hizo un fugitivo solitario
  alternatives_spanish:
  - se hizo solitario
  - se volvió un fugitivo apartado
  lexicon: LSJ
  rationale: ἔρημον + ἑαυτόν indica hacerse solo/desolado. «Fugitivo solitario» integra la idea de aislamiento con la de huida vergonzosa.
- source_word: ἧκεν εἰς Ἀντιόχειαν
  english_pob_choice: came to Antioch
  chosen_spanish: llegó a Antioquía
  alternatives_spanish:
  - vino a Antioquía
  - arribó a Antioquía
  lexicon: LSJ
  rationale: Verbo de movimiento simple; «llegó a Antioquía» es la formulación más natural y fiel.
- source_word: ὑπὲρ ἅπαν εὐημερηκὼς
  english_pob_choice: having fared exceedingly well
  chosen_spanish: habiendo salido muy favorecido
  alternatives_spanish:
  - habiendo prosperado sobremanera
  - habiendo tenido gran éxito
  lexicon: LSJ
  rationale: εὐημερέω expresa prosperar o ir bien. «Salir muy favorecido» comunica el sentido y permite mantener la ironía contextual sin sonar forzado.
- source_word: ἐπὶ τῇ τοῦ στρατοῦ διαφθορᾷ
  english_pob_choice: in the destruction of his army
  chosen_spanish: en la destrucción de su ejército
  alternatives_spanish:
  - en la ruina de su ejército
  - con motivo de la destrucción de su ejército
  lexicon: LSJ
  rationale: διαφθορά es destrucción/ruina. Se conserva la referencia posesiva contextual a su ejército y el contraste irónico del versículo.
theological_decisions:
- issue: Referencia de κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor
  rationale: En este contexto narrativo, κύριος se refiere al Dios de Israel. «Señor» respeta la convención de título divino en español sin introducir paráfrasis.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Ironía de εὐημερηκὼς ἐπὶ τῇ τοῦ στρατοῦ διαφθορᾷ
  english_pob_reading: having fared exceedingly well in the destruction of his army
  chosen_spanish_reading: habiendo salido muy favorecido en la destrucción de su ejército
  alternative_spanish_readings:
  - habiendo prosperado extraordinariamente en la destrucción de su ejército
  - habiendo tenido mucho éxito en la destrucción de su ejército
  rationale: 'La construcción griega es irónica: «salir muy favorecido» no indica aprobación moral, sino contraste entre aparente prosperidad y la ruina militar real. La traducción conserva esa tensión.'
  doctrine_reference: POB audit trail, lexical note on irony in εὐημερέω + ἐπὶ τῇ διαφθορᾷ
translation_notes:
  revision_awareness: Se siguió el último pase de revisión del auditable inglés, que ajustó la frase de humillación para reflejar mejor al sujeto, simplificó la expresión de huida para acercarla más al griego y reforzó el matiz irónico de εὐημερηκὼς. La versión española refleja esas decisiones, evitando tanto la paráfrasis excesiva como la calca rígida.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme a la política del proyecto y al contexto teológico del pasaje.
  - Se usa «Antioquía» con acento español estándar.
  - Se evita «Mediterráneo» para διὰ τῆς μεσογείου, porque aquí no se refiere al mar sino al interior del territorio.
  - Se conserva la ironía final sin suavizarla a una lectura moralizante.
  - «Fugitivo» se usa por el valor comparativo de δραπέτου τρόπον; no se introduce «esclavo fugitivo» porque el contexto inmediato no lo exige.
