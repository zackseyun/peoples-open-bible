translation:
  language: es
  text: Al que acababa de entrar en el tesoro[a] con mucho alboroto y toda su escolta, lo sacaron indefenso, totalmente incapacitado[b], habiendo reconocido claramente el poder soberano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘cámara del tesoro’ o ‘tesoro previamente mencionado’; el griego τὸ προειρημένον indica que se trata del tesoro ya citado antes en el relato.
    reason: lexical_alternative
  - marker: b
    text: La expresión griega es idiomática y difícil; comunica que quedó totalmente postrado o incapacitado por completo.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν ἄρτι ... εἰσελθόντα
  english_pob_choice: The man who had just entered
  chosen_spanish: Al que acababa de entrar
  alternatives_spanish:
  - al hombre que acababa de entrar
  - al que acababa de entrar allí
  lexicon: LSJ
  rationale: El artículo con participio funciona de manera sustantiva. En español, ‘al que acababa de entrar’ conserva la referencia personal sin añadir más de lo que el griego exige; el sujeto es identificable por el contexto narrativo.
- source_word: μετὰ πολλῆς παραδρομῆς
  english_pob_choice: with much rushing about
  chosen_spanish: con mucho alboroto
  alternatives_spanish:
  - con gran bullicio
  - con mucha agitación
  - con mucho correr de un lado a otro
  lexicon: LSJ
  rationale: παραδρομή sugiere movimiento apresurado, bullicio o despliegue. ‘Alboroto’ comunica bien la idea de entrada ostentosa y tumultuosa en español natural, sin perder el matiz de movimiento y ruido.
- source_word: πάσης δορυφορίας
  english_pob_choice: all his guard
  chosen_spanish: toda su escolta
  alternatives_spanish:
  - toda su guardia
  - todo su cuerpo de escolta
  - todo su séquito armado
  lexicon: LSJ
  rationale: δορυφορία denota una escolta armada o cuerpo de guardia. ‘Escolta’ es claro y suficientemente formal en español; el posesivo ‘su’ se sobreentiende por el contexto del personaje que entra.
- source_word: τὸ προειρημένον ... γαζοφυλάκιον
  english_pob_choice: the treasury
  chosen_spanish: el tesoro
  alternatives_spanish:
  - el tesoro ya mencionado
  - la cámara del tesoro
  - el tesoro previamente mencionado
  lexicon: LSJ
  rationale: γαζοφυλάκιον puede ser ‘tesoro’ o ‘cámara del tesoro’. ‘Tesoro’ es el equivalente más natural en español; se mantiene la referencia contextual sin forzar una perífrasis pesada. El valor de προειρημένον queda implícito por el contexto y se explicita en nota.
- source_word: ἔφερον
  english_pob_choice: they carried out
  chosen_spanish: lo sacaron
  alternatives_spanish:
  - lo llevaron fuera
  - lo arrastraron fuera
  - lo sacaban
  lexicon: LSJ
  rationale: El imperfecto narrativo en español puede expresarse con un pretérito simple fluido. ‘Lo sacaron’ comunica la salida forzada del recinto, que es el sentido contextual del verbo en la escena.
- source_word: ἀβοήθητον
  english_pob_choice: helpless
  chosen_spanish: sin ayuda
  alternatives_spanish:
  - indefenso
  - desamparado
  - sin auxilio
  lexicon: LSJ
  rationale: El adjetivo significa ‘sin ayuda’. ‘Sin ayuda’ conserva la literalidad básica; ‘completamente abatido’ en la frase siguiente desarrolla el efecto narrativo de su estado, evitando una duplicación poco natural.
- source_word: τοῖς ὅλοις καθεστῶτα
  english_pob_choice: being completely incapacitated
  chosen_spanish: completamente abatido
  alternatives_spanish:
  - totalmente incapacitado
  - completamente postrado
  - reducido por completo
  lexicon: LSJ
  rationale: La expresión es idiomática y difícil. ‘Completamente abatido’ transmite el estado resultante y el descenso total sin sonar mecánico; mantiene la tensión entre una traducción más literal y una más idiomática.
- source_word: φανερῶς
  english_pob_choice: plainly
  chosen_spanish: claramente
  alternatives_spanish:
  - manifiestamente
  - a todas luces
  - evidentemente
  lexicon: LSJ
  rationale: El adverbio indica que la percepción del hecho fue evidente. ‘Claramente’ es directo y neutral, apto para un registro bíblico moderno.
- source_word: τὴν δυναστείαν
  english_pob_choice: the sovereign power
  chosen_spanish: el poder soberano
  alternatives_spanish:
  - el dominio soberano
  - la soberana potestad
  - el poder dominador
  lexicon: LSJ
  rationale: δυναστεία puede significar poder, dominio o señorío. ‘Poder soberano’ conserva el componente de autoridad y fuerza; en español permite mantener la ambigüedad teológica del texto sin nombrar explícitamente a Dios donde el griego no lo hace.
- source_word: ἐπεγνωκότα
  english_pob_choice: having come to recognize
  chosen_spanish: habiendo reconocido claramente
  alternatives_spanish:
  - habiendo llegado a reconocer
  - habiendo reconocido plenamente
  - tras reconocer
  lexicon: LSJ
  rationale: El perfecto de ἐπιγινώσκω aquí expresa reconocimiento pleno surgido de la experiencia. ‘Habiendo reconocido claramente’ respeta esa culminación del entendimiento y enlaza bien con el adverbio anterior.
theological_decisions:
- issue: Referencia implícita al poder divino
  english_pob_reading: understood as divine power displayed in protection of the temple, without over-specifying beyond the text
  chosen_spanish_reading: entendido como el poder soberano manifestado en defensa del templo, sin añadir explícitamente ‘de Dios’ al texto
  alternative_spanish_readings:
  - el poder de Dios
  - la potencia de Dios
  - el poder del Señor del templo
  rationale: El griego usa un sustantivo abstracto sin nombrar a Dios directamente. En español se conserva esa reserva con ‘poder soberano’; el contexto narrativo permite identificarlo como poder divino sin resolver la tensión del texto.
  doctrine_reference: Preservar la tensión exegética sin sobreexplicarla en la línea principal.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: ‘much rushing about’ se reflejó como ‘mucho alboroto’ para una naturalidad equivalente en español; ‘completely incapacitated’ se vertió con una expresión idiomática (‘completamente abatido’) para conservar fluidez; y ‘having plainly recognized’ se mantuvo con un valor de reconocimiento claro y consumado.'
  spanish_consistency_notes:
  - Se preservó la reserva teológica del sustantivo δυναστεία sin sustituirlo por una formulación más explícita que el griego.
  - Se evitó traducir mecánicamente ‘guard’ como ‘guardia’ cuando ‘escolta’ resulta más natural y acorde con δορυφορία.
  - Se mantuvo un registro sobrio y bíblico moderno, sin arcaismos innecesarios.
  - La nota a marca el valor contextual de προειρημένον; la nota c explica la ambigüedad teológica sin resolverla en exceso.
