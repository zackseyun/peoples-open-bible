translation:
  language: es
  text: Yahvé ha quebrado la vara de los malvados[a], el cetro de los gobernantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «vara de los malvados». El hebreo emplea dos términos paralelos para un instrumento de autoridad: «vara» y «cetro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁבַר
  english_pob_choice: has broken
  chosen_spanish: ha quebrado
  alternatives_spanish:
  - ha roto
  - ha quebrantado
  lexicon: HALOT
  rationale: El qal perfecto expresa una acción completada con vigencia presente, y en español 'ha quebrado' comunica bien esa ruptura definitiva sin volverse demasiado coloquial. 'Ha roto' es posible, pero 'quebrar' conserva mejor el tono poético y solemne del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como nombre propio en español, siguiendo la práctica del proyecto de traducir el Tetragrámaton como 'Yahvé'. 'Jehová' queda descartado por ser una forma tradicional menos adecuada al criterio auditable del proyecto.
- source_word: מַטֵּה
  english_pob_choice: staff
  chosen_spanish: vara
  alternatives_spanish:
  - bastón
  - cetro
  lexicon: HALOT
  rationale: En paralelo con שֵׁבֶט, el término puede referirse a un instrumento de autoridad. 'Vara' es natural en español y conserva la posibilidad de un objeto de mando o disciplina, sin resolver prematuramente la imagen hacia 'cetro'.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los injustos
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural denota personas malvadas o impías. 'Los malvados' es claro y mantiene el sentido moral colectivo sin introducir un matiz teológico adicional.
- source_word: שֵׁבֶט
  english_pob_choice: scepter
  chosen_spanish: cetro
  alternatives_spanish:
  - vara
  - bastón
  lexicon: HALOT
  rationale: Aquí el paralelismo con 'gobernantes' favorece la idea de un emblema de autoridad. 'Cetro' comunica bien ese sentido en español y preserva la imagen regia del hebreo.
- source_word: מֹשְׁלִים
  english_pob_choice: rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los que gobiernan
  - los que dominan
  lexicon: HALOT
  rationale: El participio plural de משל nombra a quienes ejercen gobierno. 'Gobernantes' es una equivalencia natural y directa, más precisa y menos interpretativa que 'los que dominan'.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrámaton, y el criterio del proyecto es conservar el nombre divino en español. 'Yahvé' es la forma preferida para mantener esa referencia personal al Dios del pacto sin sustituirla por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de los dos términos paralelos de autoridad
  english_pob_reading: staff / scepter
  chosen_spanish_reading: vara / cetro
  alternative_spanish_readings:
  - vara / vara
  - bastón / cetro
  rationale: 'El hebreo presenta dos términos paralelos distintos: מַטֵּה y שֵׁבֶט. En español, ''vara'' y ''cetro'' permiten distinguirlos sin borrar la paronomasia ni imponer una sola imagen. La primera expresión conserva la amplitud semántica de instrumento de autoridad; la segunda explicita el emblema de gobierno.'
  doctrine_reference: Principio poético de paralelismo hebreo y preservación de distinciones léxicas
translation_notes:
  revision_awareness: La versión inglesa POB más reciente se mantuvo sin cambios tras revisión, con acuerdo alto en la verificación cruzada; por eso la redacción española sigue de cerca las decisiones léxicas ya auditadas, preservando el paralelismo hebreo y el nombre divino.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de manera consistente para יְהוָה.
  - Se distingue entre 'vara' para מַטֵּה y 'cetro' para שֵׁבֶט para no borrar el paralelismo.
  - '''Gobernantes'' conserva el participio plural con valor nominal.'
  - El tono es sobrio y poético, adecuado para un versículo profético.
