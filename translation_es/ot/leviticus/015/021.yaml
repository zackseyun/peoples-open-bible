    rationale: «Su lecho» es casi sinónimo de «su cama», mientras que la alternativa preservada en inglés distingue también 'lugar donde yace' y 'ropa de cama'. Conviene alinearla mejor con el expediente auditado.
  revised_spanish_text: Y cualquiera que toque su cama[a] lavará su ropa y se bañará en agua, y quedará impuro hasta la tarde.
