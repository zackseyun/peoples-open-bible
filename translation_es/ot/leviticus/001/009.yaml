revisions:
- from: Pero lavará con agua sus entrañas y sus piernas; y el sacerdote hará subir todo ello en humo sobre el altar, como holocausto, una ofrenda encendida[a], de aroma agradable[b] para Yahvé[c].
  to: Pero lavará con agua sus entrañas y sus patas, y el sacerdote hará subir todo ello en humo sobre el altar, holocausto, ofrenda de alimento[a], aroma agradable[b] para Yahvé[c].
  rationale: 'Se ajusta el texto para reflejar más fielmente el hebreo y el expediente auditado: «patas» por contexto animal; eliminación de «como» para conservar la serie appositiva; restitución de la decisión principal del proyecto para אִשֵּׁה como «ofrenda de alimento», dejando las opciones relacionadas con fuego en nota; y puntuación más natural y cercana al original.'
