translation:
  language: es
  text: 'Y David consultó a Yahvé[a], diciendo: «¿Debo ir tras esta banda de saqueadores? ¿La alcanzaré?» Y él le respondió: «Persigue, porque ciertamente la alcanzarás, y ciertamente rescatarás[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La consulta se dirige a Yahvé: el hebreo usa el verbo de inquirir con la preposición correspondiente, no una pregunta casual.'
    reason: source_note
  - marker: b
    text: También puede entenderse «librarás» o «salvarás»; el hebreo no explicita el objeto del verbo en esta cláusula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל
  english_pob_choice: inquired
  chosen_spanish: consultó
  alternatives_spanish:
  - inquirió
  - preguntó
  lexicon: HALOT
  rationale: El verbo שׁאל con ביהוה en este contexto no es una pregunta ordinaria, sino una búsqueda de guía divina. «Consultó» comunica bien esa idea en español y mantiene el sentido formal de acudir a Yahvé para orientación.
- source_word: בַּיהוָה
  english_pob_choice: of Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - de Yahvé
  - con Yahvé
  lexicon: HALOT
  rationale: La preposición con שׁאל expresa relación de consulta, por lo que en español «consultó a Yahvé» suena natural y fiel. Se conserva el nombre divino «Yahvé» según el criterio del proyecto.
- source_word: אֶרְדֹּף אַחֲרֵי
  english_pob_choice: Should I pursue after
  chosen_spanish: ¿Debo perseguir tras
  alternatives_spanish:
  - ¿Debo perseguir a
  - ¿Debo ir tras
  lexicon: HALOT
  rationale: אַחֲרֵי añade la idea de ir detrás de algo o alguien. «Perseguir tras» conserva esa doblez sin volver la frase pesada; en español también podría omitirse, pero aquí se mantiene por fidelidad lexical.
- source_word: הַגְּדוּד הַזֶּה
  english_pob_choice: this raiding party
  chosen_spanish: esta banda de saqueadores
  alternatives_spanish:
  - este grupo de saqueadores
  - esta partida de saqueadores
  lexicon: HALOT
  rationale: גְּדוּד puede referirse a un grupo armado; en este contexto los amalecitas son saqueadores. «Banda de saqueadores» transmite el matiz de incursión hostil y conserva la referencia colectiva del sustantivo.
- source_word: הַאַשִּׂגֶנּוּ
  english_pob_choice: Will I overtake it
  chosen_spanish: ¿La alcanzaré?
  alternatives_spanish:
  - ¿La tomaré alcance?
  - ¿Le daré alcance?
  lexicon: HALOT
  rationale: El sufijo hebreo es singular, aunque el referente sea colectivo; por eso se traduce con un singular pronominal («la»). «Alcanzar» expresa bien la idea de dar alcance sin añadir contenido no explicitado.
- source_word: רְדֹף
  english_pob_choice: Pursue
  chosen_spanish: Persigue
  alternatives_spanish:
  - Sigue
  - Ve tras ella
  lexicon: HALOT
  rationale: La forma imperativa responde directamente a la consulta de David. «Persigue» preserva el paralelismo con el verbo anterior y mantiene un tono conciso y enérgico.
- source_word: כִּי הַשֵּׂג תַּשִּׂיג
  english_pob_choice: for you will surely overtake
  chosen_spanish: porque ciertamente la alcanzarás
  alternatives_spanish:
  - porque de seguro la alcanzarás
  - porque sin duda la alcanzarás
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + verbo finito intensifica la certeza. En español se refleja con «ciertamente»; el objeto se expresa con «la» para mantener la referencia singular del hebreo y la coherencia con la pregunta anterior.
- source_word: וְהַצֵּל תַּצִּיל
  english_pob_choice: and you will surely rescue
  chosen_spanish: y ciertamente rescatarás
  alternatives_spanish:
  - y ciertamente librarás
  - y seguramente salvarás
  lexicon: HALOT
  rationale: El hebreo omite el objeto, así que el español no debe añadirlo en el texto principal. «Rescatarás» funciona bien en el contexto narrativo, sin precisar indebidamente quién o qué será rescatado.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la terminología del proyecto, se conserva la forma «Yahvé» en español para no ocultar el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La redacción incorpora la revisión más reciente del POB: se conserva אַחֲרֵי con un equivalente explícito («tras»), se respeta el singular del sufijo en «la alcanzaré»/«la alcanzarás», y no se añade un objeto al último verbo porque el hebreo carece de él.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino.
  - Se conserva la repetición léxica de «alcanzar» para reflejar el paralelismo hebreo בין הַשֵּׂג תַּשִּׂיג y el verbo inicial.
  - Se usa un singular colectivo («la») para el sustantivo de grupo, conforme al hebreo singular.
  - El imperativo y la respuesta divina se presentan con puntuación española estándar, sin alterar el contenido semántico.
