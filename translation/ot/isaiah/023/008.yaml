id: ISA.23.8
reference: Isaiah 23:8
source:
  edition: WLC
  text: מִ֚י יָעַ֣ץ זֹ֔את עַל צֹ֖ר הַ/מַּֽעֲטִירָ֑ה אֲשֶׁ֤ר סֹחֲרֶ֨י/ה֙ שָׂרִ֔ים כִּנְעָנֶ֖י/הָ נִכְבַּדֵּי אָֽרֶץ־־׃
translation:
  text: Who has planned this against Tyre[a], the bestower of crowns, whose merchants are princes[b], whose traders are the honored ones of the earth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “the bestower of crowns.” The Hebrew portrays Tyre as one that confers royal status or wealth.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “Canaanites”; in this context the term likely means “merchants” or “traders.”
    reason: alternative_reading
lexical_decisions:
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Interrogative pronoun introducing the rhetorical question.
- source_word: יָעַץ
  chosen: has planned
  alternatives:
  - has purposed
  - has counseled
  - has devised
  lexicon: HALOT
  rationale: The verb can denote advising, planning, or purposing. In context of divine judgment against Tyre, 'planned' communicates intentional design without the archaic feel of 'counseled'.
- source_word: זֹאת
  chosen: this
  lexicon: HALOT
  rationale: Demonstrative referring to the announced judgment/oracle against Tyre.
- source_word: עַל
  chosen: against
  alternatives:
  - concerning
  - upon
  lexicon: HALOT
  rationale: In this hostile context, 'against' best reflects the force of the preposition with the verb of planning.
- source_word: צֹר
  chosen: Tyre
  lexicon: HALOT
  rationale: Standard English transliteration of the city name.
- source_word: הַמַּעֲטִירָה
  chosen: the crowning city
  alternatives:
  - the bestower of crowns
  - the crowning one
  lexicon: HALOT
  rationale: From עטר, 'to crown.' The feminine participial form modifies Tyre. The phrase likely portrays Tyre as one that confers crowns, i.e., installs or enriches rulers/colonies. 'The crowning city' is readable English and preserves the metaphor, while a footnote preserves the more literal alternative 'bestower of crowns'.
- source_word: אֲשֶׁר
  chosen: whose
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle introducing descriptive clauses about Tyre; 'whose' is idiomatic in English because possessive suffixes follow.
- source_word: סֹחֲרֶיהָ
  chosen: merchants
  alternatives:
  - traders
  lexicon: HALOT
  rationale: Denotes those engaged in commerce. 'Merchants' fits the elevated economic-political portrait of Tyre.
- source_word: שָׂרִים
  chosen: princes
  alternatives:
  - officials
  - rulers
  lexicon: HALOT
  rationale: Commonly denotes princes or high officials. 'Princes' preserves the social rank imagery and matches the poetic parallelism.
- source_word: כִּנְעָנֶיהָ
  chosen: traders
  alternatives:
  - Canaanites
  - merchants
  lexicon: HALOT
  rationale: Though formally 'Canaanites,' the term can metonymically mean merchants in prophetic/poetic usage. Here parallelism with 'merchants' and the context of Tyre's commerce strongly support 'traders' in the main text. The ethnic reading is preserved in a footnote.
- source_word: נִכְבַּדֵּי אָרֶץ
  chosen: the honored ones of the earth
  alternatives:
  - the honored of the land
  - the noble ones of the earth
  lexicon: HALOT
  rationale: Passive participial expression meaning those who are weighty/honored. 'Of the earth' is preferable here to 'of the land' because the verse emphasizes Tyre's international stature.
