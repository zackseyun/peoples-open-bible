translation:
  language: es
  text: Y Zabdiel el árabe cortó la cabeza de Alejandro, y la envió a Ptolomeo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀφεῖλεν
  english_pob_choice: cut off
  chosen_spanish: cortó
  alternatives_spanish:
  - quitó
  - cercenó
  - decapitó
  lexicon: BDAG
  rationale: With τὴν κεφαλήν as direct object, the verb denotes severing. Spanish 'cortó' (from cortar) is the most natural and transparent equivalent for this decapitation context. 'Cercenó' (lop off) would also be precise but is less familiar to modern readers. 'Decapitó' would render the combined verbal phrase into a single verb, slightly paraphrasing; it is avoided to keep the structure close to the source. 'Quitó' is too weak, paralleling the rejected English alternative 'removed'.
- source_word: ὁ Ἀραβ
  english_pob_choice: the Arab
  chosen_spanish: el árabe
  alternatives_spanish:
  - el Árabe
  - el arabio
  lexicon: LSJ
  rationale: The Greek ὁ Ἀραβ functions as an ethnic appositive identifying Zabdiel. Spanish renders nationalities and ethnic identifiers in lowercase by grammatical convention, so 'el árabe' is correct. Capitalizing 'el Árabe' would suggest a title or epithet, which the Greek does not support. 'El arabio' is archaic and unnecessary.
- source_word: τὴν κεφαλὴν Ἀλεξάνδρου
  english_pob_choice: Alexander's head
  chosen_spanish: la cabeza de Alejandro
  alternatives_spanish:
  - la cabeza de Alexander
  lexicon: BDAG
  rationale: Spanish uses the prepositional genitive 'de' rather than a possessive clitic; 'la cabeza de Alejandro' is the natural Spanish structure. 'Alejandro' is the standard Spanish equivalent of the Greek Ἀλεξάνδρου / Latin Alexander, used consistently in Spanish historical and biblical literature.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: la envió
  alternatives_spanish:
  - la mandó
  - la despachó
  lexicon: BDAG
  rationale: Standard narrative aorist for sending. Spanish 'envió' is the plain and sufficient equivalent, matching the English POB choice. The clitic pronoun 'la' is required in Spanish to refer back to 'la cabeza' (feminine antecedent); the Greek ellipsis is resolved by this obligatory pronoun. 'Mandó' is possible but slightly more colloquial; 'despachó' is acceptable but adds a connotation of urgency not present in the source.
- source_word: τῷ Πτολεμαίῳ
  english_pob_choice: to Ptolemy
  chosen_spanish: a Ptolomeo
  alternatives_spanish:
  - al rey Ptolomeo
  lexicon: BDAG
  rationale: The Greek names Ptolemy without any title in this verse. Following the English POB's documented decision not to supply 'king,' Spanish likewise renders 'a Ptolomeo' without adding 'rey.' 'Ptolomeo' is the standard Spanish form of the name.
