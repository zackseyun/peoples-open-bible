id: 1PE.5.2
reference: 1 Peter 5:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ποιμάνατε τὸ ἐν ὑμῖν ποίμνιον τοῦ θεοῦ, ἐπισκοποῦντες μὴ ἀναγκαστῶς ἀλλὰ ἑκουσίως κατὰ θεόν, μηδὲ αἰσχροκερδῶς ἀλλὰ προθύμως,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/005/002.yaml
  text: 'Shepherd the flock of God among you, exercising oversight not under compulsion but willingly, according to God; nor for shameful gain, but eagerly.'
translation:
  language: ko
  text: '여러분 가운데 있는 하나님의 양 무리를 치십시오. 곧 감독하기를 억지로 하지 말고 하나님의 뜻을 따라 자원하여 하며, 부끄러운 이득을 위하여 하지 말고 기꺼이 하십시오.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ποιμάνατε
  english_pob_choice: Shepherd
  chosen_korean: 양 무리를 치십시오
  alternatives_korean:
  - 목양하십시오
  - 양 떼를 치십시오
  lexicon: BDAG
  rationale: ποιμαίνω를 한국 성서 전통의 「치다」로 옮긴다.
- source_word: ποίμνιον τοῦ θεοῦ
  english_pob_choice: the flock of God
  chosen_korean: 하나님의 양 무리
  alternatives_korean:
  - 하나님의 양 떼
  lexicon: BDAG
  rationale: ποίμνιον은 「양 무리」.
- source_word: ἐπισκοποῦντες
  english_pob_choice: exercising oversight
  chosen_korean: 감독하기를
  alternatives_korean:
  - 돌봄을 베풀기를
  - 살피기를
  lexicon: BDAG
  rationale: 2:25의 ἐπίσκοπος(감독자)와 어근 동일. 「감독」으로 옮긴다. 일부 사본은 이 분사를 생략한다.
- source_word: ἀναγκαστῶς ... ἑκουσίως
  english_pob_choice: under compulsion ... willingly
  chosen_korean: 억지로 ... 자원하여
  alternatives_korean:
  - 강제로 ... 스스로 원하여
  lexicon: BDAG
  rationale: 대조 강조를 살린다.
- source_word: αἰσχροκερδῶς ... προθύμως
  english_pob_choice: for shameful gain ... eagerly
  chosen_korean: 부끄러운 이득을 위하여 ... 기꺼이
  alternatives_korean:
  - 더러운 이익으로 ... 즐겨
  lexicon: BDAG
  rationale: αἰσχροκερδής의 「수치스러운 이득 추구」를 「부끄러운 이득」으로 옮긴다.
