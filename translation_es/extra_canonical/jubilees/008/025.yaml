base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/025.yaml
  text: The thoughts and desire of man imagine vanity and evil continually, and the Lord destroyed everything from the face of the earth because of their evil deeds and because of blood.
  footnotes:
  - marker: a
    text: Or 'were evil continually'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:52Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that matches the Ge''ez source: rendered the statement about human thoughts/desire being evil continually and the Lord destroying everything from the face of the earth because of their evil deeds and blood.'
translation:
  language: es
  text: Los pensamientos y el deseo del hombre imaginan vanidad y mal continuamente, y Yahvé destruyó todo de la faz de la tierra por causa de sus malas obras y por causa de la sangre.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ሕሊናሁ / ወፈቃዱ
  english_pob_choice: The thoughts and desire of man
  chosen_spanish: Los pensamientos y el deseo del hombre
  alternatives_spanish:
  - Los pensamientos y el deseo del ser humano
  - La mente y el deseo del hombre
  lexicon: thoughts / desire
  rationale: Mantiene el paralelismo del original entre pensamiento y deseo. 'Hombre' conserva el valor genérico humano del inglés POB y del contexto, sin masculinizar de forma exclusiva.
- source_word: ይኄሊ
  english_pob_choice: imagine
  chosen_spanish: imaginan
  alternatives_spanish:
  - piensan
  - conciben
  - maquinan
  lexicon: imagine/think
  rationale: '''Imaginan'' conserva el matiz de actividad mental creativa o proyectiva que la revisión inglesa señaló, sin reducirlo a mera opinión.'
- source_word: ከንተ
  english_pob_choice: vanity
  chosen_spanish: vanidad
  alternatives_spanish:
  - vaciedad
  - futilidad
  - nada
  lexicon: vanity/emptiness
  rationale: '''Vanidad'' reproduce bien el campo semántico de vacuidad, inutilidad o futilidad que la revisión inglesa identificó en el ge''ez.'
- source_word: እኩየ
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - lo malo
  - malvado
  lexicon: evil
  rationale: '''Mal'' es breve y natural en español, y permite conservar el contraste con ''vanidad'' sin cargar excesivamente la frase.'
- source_word: በኵሉ መዋዕል
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - sin cesar
  - de continuo
  lexicon: continually
  rationale: Equivale de manera directa al adverbio de continuidad del texto y mantiene el ritmo de la sentencia.
- source_word: ወደምሰሰ
  english_pob_choice: destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - arruinó
  - borró
  - acabó con
  lexicon: destroy
  rationale: '''Destruyó'' es la correspondencia más directa y solemne para la acción divina en el pasaje.'
- source_word: እምነ ገጸ ምድር
  english_pob_choice: from the face of the earth
  chosen_spanish: de sobre la faz de la tierra
  alternatives_spanish:
  - de la faz de la tierra
  - de sobre la superficie de la tierra
  lexicon: face of the earth
  rationale: Conserva la imagen bíblica tradicional de 'faz de la tierra' y el valor intensivo de 'from upon' mediante 'de sobre'.
- source_word: እኩይ ምግባሮሙ
  english_pob_choice: their evil deeds
  chosen_spanish: sus malas obras
  alternatives_spanish:
  - sus obras malas
  - sus hechos perversos
  - sus obras perversas
  lexicon: evil deeds
  rationale: '''Malas obras'' es idiomático en español y refleja la evaluación moral del texto sin sobreinterpretar el grado de perversidad.'
- source_word: ደም
  english_pob_choice: blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - sangre derramada
  - derramamiento de sangre
  - sangre inocente
  lexicon: blood
  rationale: Se mantiene 'la sangre' de forma literal, dejando intacta la acusación general del texto y evitando especificaciones no presentes en el ge'ez.
theological_decisions:
- issue: Descripción de la interioridad humana como mal continua
  english_pob_reading: The thoughts and desire of man imagine vanity and evil continually
  chosen_spanish_reading: Los pensamientos y el deseo del hombre imaginan vanidad y mal continuamente
  alternative_spanish_readings:
  - Los pensamientos y el deseo del hombre son vanidad y mal continuamente
  - Los pensamientos y el deseo del hombre conciben vanidad y mal continuamente
  rationale: La formulación conserva la tensión entre interioridad, imaginación y moralidad. No se reduce a un simple estado de maldad, porque la revisión textual destacó el verbo de imaginar y el sustantivo de vanidad.
  doctrine_reference: Antropología bíblica; inclinación interior al mal
- issue: Causa del juicio divino
  english_pob_reading: the Lord destroyed everything from the face of the earth because of their evil deeds and because of blood
  chosen_spanish_reading: el Señor destruyó todo de sobre la faz de la tierra por causa de sus malas obras y por causa de la sangre
  alternative_spanish_readings:
  - el Señor destruyó todo de la faz de la tierra por sus malas obras y por la sangre
  - Yahvé destruyó todo de sobre la faz de la tierra por causa de sus malas obras y por causa de la sangre
  rationale: '''Señor'' sigue el patrón del texto inglés POB en esta cláusula y evita introducir una decisión de tetragrámaton no atestiguada aquí. La doble causalidad (''malas obras'' y ''sangre'') se conserva explícitamente.'
  doctrine_reference: Juicio divino; culpa por violencia y corrupción
translation_notes:
  revision_awareness: La revisión más reciente corrigió un borrador ajeno al texto y la revisión posterior señaló que el ge'ez incluye la idea de 'imaginar/pensar' y el sustantivo 'vanidad'. Por eso el español no reduce la frase a 'eran malos continuamente', sino que conserva el movimiento mental y la carga de vacuidad moral. También se mantiene la segunda causa del juicio ('la sangre'), tal como aparece en el testimonio ge'ez y en la lectura inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y publicable, sin arcaísmos innecesarios.
  - '''Señor'' se usa aquí como correspondencia del audit trail inglés; no se sustituye por ''Yahvé'' sin una base textual específica en este registro.'
  - '''Hombre'' funciona como genérico humano, coherente con el inglés auditado.'
  - La puntuación conserva dos miembros coordinados en la primera cláusula y la causalidad doble en la segunda.
