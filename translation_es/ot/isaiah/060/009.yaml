revisions:
- from: Ciertamente, las costas[a] me esperan, y las naves de Tarsis, las primeras, para traer tus hijos de lejos, con su plata y su oro con ellos, para el nombre de Yahvé tu Dios y para el Santo de Israel[b], porque te ha glorificado.
  to: Ciertamente, las costas lejanas[a] me esperan, y las naves de Tarsis, primero, para traer a tus hijos varones de lejos, con su plata y su oro consigo, por el nombre de Yahvé tu Dios y por el Santo de Israel, porque él te ha glorificado[b].
  rationale: La revisión corrige la principal desviación respecto del expediente auditado al hacer explícito el masculino de בָנַיִךְ con 'tus hijos varones'. También mejora la fidelidad semántica de אִיִּים con 'las costas lejanas', vuelve más natural בָּרִאשֹׁנָה con 'primero', y ajusta expresiones españolas para mayor legibilidad sin apartarse del hebreo ni de las decisiones del POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:26:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo: espera de las costas/islas, naves de Tarsis, retorno desde lejos, riqueza acompañante, honra al nombre de Yahvé y al Santo de Israel, y la razón final de que él la ha glorificado. Sin embargo, no preserva plenamente dos decisiones auditadas importantes: בָנַיִךְ fue documentado en el POB inglés como ''your sons'' por exactitud de género, pero el español lo neutraliza a ''tus hijos''; además, ''las costas'' estrecha algo el alcance marítimo/geográfico de אִיִּים, donde ''las costas lejanas'' o ''las costas distantes'' sería más fiel al matiz amplio reflejado en la nota.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay varios giros poco naturales o mejorables: ''las primeras'' suena algo rígido frente a ''primero''; ''con su plata y su oro con ellos'' reproduce bien el énfasis hebreo pero puede suavizarse a ''con su plata y su oro consigo'' sin perder sentido; y ''para el nombre de Yahvé'' suena menos idiomático que ''por el nombre de Yahvé'' o ''por causa del nombre de Yahvé''. El conjunto necesita un ajuste menor, no una reescritura mayor.'
  glossary_alignment: Se alinea correctamente con 'Yahvé' y 'el Santo de Israel'. La principal desviación terminológica es בָנַיִךְ, que debe reflejar el masculino plural explícito con 'tus hijos varones' o, mejor en registro bíblico claro, 'tus hijos'. Pero dado que el POB inglés documentó una decisión de exactitud de género hacia 'sons', conviene hacerlo visible en español con 'tus hijos varones'. También conviene reforzar el valor amplio de אִיִּים con 'las costas lejanas' en vez de solo 'las costas'.
  issues:
  - severity: medium
    issue: Neutralización de בָנַיִךְ como 'tus hijos'
    rationale: El expediente inglés documenta explícitamente 'your sons' por exactitud de género frente a la alternativa neutralizada. En español, 'hijos' puede ser colectivo e introduce ambigüedad; para preservar la decisión auditada conviene 'tus hijos varones'.
  - severity: low
    issue: אִיִּים como 'las costas' puede sonar demasiado estrecho
    rationale: El término en Isaías suele abarcar islas/costas/tierras marítimas lejanas. 'Las costas lejanas' conserva mejor el matiz geográfico amplio sin perder naturalidad.
  - severity: low
    issue: '''las primeras'' para בָּרִאשֹׁנָה es menos natural'
    rationale: El hebreo adverbial se expresa mejor en español como 'primero' o 'en primer lugar' que como adjetivo femenino plural aplicado a las naves.
  - severity: low
    issue: '''para el nombre de Yahvé'' suena poco idiomático en español'
    rationale: Aunque es cercano al hebreo, en español bíblico natural 'por el nombre de Yahvé' o 'por causa del nombre de Yahvé' comunica mejor el sentido honorífico/final.
  revised_spanish_text: Ciertamente, las costas lejanas[a] me esperan, y las naves de Tarsis, primero, para traer a tus hijos varones de lejos, con su plata y su oro consigo, por el nombre de Yahvé tu Dios y por el Santo de Israel, porque él te ha glorificado[b].
  revised_footnotes:
  - marker: a
    text: O «las islas» o «las costas distantes»; el hebreo suele referirse en sentido amplio a tierras marítimas o costas lejanas.
    reason: lexical_alternative
  - marker: b
    text: O «porque él te ha embellecido» o «porque él te ha honrado».
    reason: lexical_alternative
  revision_rationale: La revisión corrige la principal desviación respecto del expediente auditado al hacer explícito el masculino de בָנַיִךְ con 'tus hijos varones'. También mejora la fidelidad semántica de אִיִּים con 'las costas lejanas', vuelve más natural בָּרִאשֹׁנָה con 'primero', y ajusta expresiones españolas para mayor legibilidad sin apartarse del hebreo ni de las decisiones del POB.
