id: ISA.53.1
reference: Isaiah 53:1
source:
  edition: WLC
  text: מִ֥י הֶאֱמִ֖ין לִ/שְׁמֻעָתֵ֑/נוּ וּ/זְר֥וֹעַ יְהוָ֖ה עַל מִ֥י נִגְלָֽתָה־׃
translation:
  text: Who has believed our report[a], and to whom has the arm of Yahweh been revealed?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our report' or 'our message.' The Hebrew can refer to what has been heard, reported, or proclaimed.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question; 'who' is the direct and natural English equivalent.
- source_word: הֶאֱמִין
  chosen: has believed
  alternatives:
  - believed
  lexicon: HALOT
  rationale: Hiphil of אמן here means 'to believe' or 'to trust.' English present perfect ('has believed') fits the rhetorical force of asking whether anyone has in fact believed.
- source_word: לִשְׁמֻעָתֵנוּ
  chosen: what we have heard
  alternatives:
  - our report
  - our message
  - that which we heard
  lexicon: HALOT
  rationale: שְׁמוּעָה can mean 'report,' 'news,' or 'that which is heard.' The prefixed ל here is best taken with the verb 'believe' ('believe what we have heard' / 'believe our report'). 'What we have heard' reflects the underlying noun's relation to hearing and avoids importing a more technical sense than the Hebrew requires, while remaining idiomatic.
- source_word: וּזְרוֹעַ
  chosen: and ... the arm
  alternatives:
  - and the power
  lexicon: HALOT
  rationale: זְרוֹעַ literally means 'arm.' In prophetic usage it often metaphorically denotes strength or saving power, but the metaphor should be preserved in the main text rather than interpreted away.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַל מִי
  chosen: to whom
  alternatives:
  - upon whom
  - on whom
  lexicon: HALOT
  rationale: Although עַל is often 'upon/on,' with נִגְלָתָה in this context English idiom is better served by 'to whom ... been revealed,' expressing the recipient of revelation naturally.
- source_word: נִגְלָתָה
  chosen: has been revealed
  alternatives:
  - was revealed
  - been disclosed
  - been uncovered
  lexicon: HALOT
  rationale: Niphal of גלה means 'to be revealed/uncovered.' The passive 'has been revealed' matches the Hebrew form and pairs well with the first clause's present-perfect rhetorical question.
