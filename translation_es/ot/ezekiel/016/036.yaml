translation:
  language: es
  text: 'Así dice el Señor Dios Yahvé: Porque se derramó tu lujuria[a], y quedó descubierta tu desnudez en tus prostituciones con tus amantes, y por todos los ídolos de tus abominaciones[b], y por la sangre de tus hijos[c] que les diste,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente 'tu bronce' o 'tu riqueza'; el hebreo puede funcionar metafóricamente para la riqueza gastada en amantes ilícitos, aunque esta revisión sigue el valor contextual de 'lujuria'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''los ídolos de tus abominaciones''; es decir, tus ídolos detestables.'
    reason: lexical_alternative
  - marker: c
    text: Es decir, los hijos que les diste en sacrificio a los ídolos.
    reason: cultural_note
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: HALOT
  rationale: En español, 'Señor Yahvé' conserva la distinción del título doble de Ezequiel sin ocultar el nombre divino. Se evita 'Señor Dios' porque borra el valor propio de יהוה que el proyecto normalmente representa como 'Yahvé'.
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Porque
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: Introduce con naturalidad la base causal del juicio y mantiene la fuerza explicativa del hebreo.
- source_word: הִשָּׁפֵךְ
  english_pob_choice: was poured out
  chosen_spanish: se derramó
  alternatives_spanish:
  - se derramó
  - fue derramado
  - se vertió
  lexicon: HALOT
  rationale: El pasivo hebreo se expresa de forma natural en español con 'se derramó'. Conserva la imagen de derramamiento sin añadir una interpretación específica de manera prematura.
- source_word: נְחֻשְׁתֵּךְ
  english_pob_choice: your lust
  chosen_spanish: tu lujuria[a]
  alternatives_spanish:
  - tu lujuria
  - tu bronce
  - tu riqueza
  lexicon: HALOT
  rationale: La auditoría inglesa revisó 'bronze' hacia 'lust' por la fuerza contextual del término. En español, 'lujuria' comunica mejor el valor contextual adoptado por la revisión, mientras la nota conserva la tensión con el sentido léxico posible de 'bronce/riqueza'.
- source_word: וַתִּגָּלֶה עֶרְוָתֵךְ
  english_pob_choice: your nakedness was uncovered
  chosen_spanish: quedó descubierta tu desnudez
  alternatives_spanish:
  - quedó descubierta tu desnudez
  - se descubrió tu desnudez
  - fue descubierta tu vergüenza
  lexicon: HALOT
  rationale: '''Desnudez'' preserva la imagen hebrea de exposición sexual y vergüenza. ''Quedó descubierta'' reproduce bien el resultado pasivo y suena natural en español.'
- source_word: בְּתַזְנוּתַיִךְ
  english_pob_choice: in your prostitutions
  chosen_spanish: en tus prostituciones
  alternatives_spanish:
  - en tus prostituciones
  - en tus actos de prostitución
  - en tus fornicaciones
  lexicon: HALOT
  rationale: '''Prostituciones'' mantiene el plural del hebreo y el carácter reiterado de la infidelidad figurada. Se evita suavizarlo con términos menos precisos.'
- source_word: עַל מְאַהֲבָיִךְ
  english_pob_choice: with your lovers
  chosen_spanish: con tus amantes
  alternatives_spanish:
  - con tus amantes
  - ante tus amantes
  - sobre tus amantes
  lexicon: HALOT
  rationale: Aunque la preposición hebrea admite varios matices, en este contexto relacional y sexual el español idiomático es 'con tus amantes'. 'Amantes' sigue el valor de relación ilícita ya asumido por la auditoría inglesa.
- source_word: גִּלּוּלֵי תוֹעֲבוֹתַיִךְ
  english_pob_choice: the idols of your abominations
  chosen_spanish: los ídolos de tus abominaciones[b]
  alternatives_spanish:
  - los ídolos de tus abominaciones
  - todos tus ídolos detestables
  - los ídolos inmundos de tus abominaciones
  lexicon: HALOT
  rationale: Se conserva la estructura hebrea 'ídolos de tus abominaciones' para no resolver demasiado el sintagma. La nota explica la posible equivalencia más libre que la auditoría inglesa preservó.
- source_word: וְכִדְמֵי בָנַיִךְ
  english_pob_choice: and because of the blood of your children
  chosen_spanish: y por la sangre de tus hijos[c]
  alternatives_spanish:
  - y por la sangre de tus hijos
  - y por la sangre de tus hijos sacrificados
  - y por la sangre de tus niños
  lexicon: HALOT
  rationale: '''Sangre de tus hijos'' sigue de cerca el hebreo y comunica el crimen sin introducir ''sacrificados'' en el texto principal. La interpretación sacrificial queda documentada en la nota.'
- source_word: אֲשֶׁר נָתַתְּ לָהֶם
  english_pob_choice: whom you gave to them
  chosen_spanish: que les diste
  alternatives_spanish:
  - que les diste
  - que se los diste
  - que les entregaste
  lexicon: HALOT
  rationale: '''Les diste'' refleja directamente el verbo hebreo נתן sin sobretraducir a ''ofreciste''. El referente humano de ''hijos'' hace natural ''que les diste''.'
theological_decisions:
- issue: Sentido de נְחֻשְׁתֵּךְ en contexto de juicio por prostitución e idolatría
  english_pob_reading: The revised English POB reading takes the term as 'your lust' in the main text, while earlier audit context preserved 'your bronze' as a literal lexical possibility.
  chosen_spanish_reading: '''tu lujuria'' en el texto principal, con nota que recuerda ''tu bronce'' / ''tu riqueza'' como alternativas léxicas.'
  alternative_spanish_readings:
  - tu bronce
  - tu riqueza
  - tu vergüenza
  rationale: La revisión inglesa privilegia el sentido contextual fuerte. En español, 'lujuria' transmite el valor resultante adoptado por el equipo, mientras la nota mantiene visible la tensión con el sentido lexical más concreto del sustantivo hebreo.
  doctrine_reference: Translation philosophy §1; §3; §5
- issue: Lenguaje de sacrificio infantil
  english_pob_reading: The blood of your children whom you gave to them; the context implies child sacrifice to idols.
  chosen_spanish_reading: La sangre de tus hijos que les diste, con nota explícita sobre el sentido de sacrificio infantil a ídolos.
  alternative_spanish_readings:
  - la sangre de tus hijos que sacrificaste a ellos
  - la sangre de tus hijos que ofreciste a esos ídolos
  rationale: El hebreo dice 'diste' y la traducción principal conserva ese verbo. La nota protege la inferencia contextual de sacrificio sin sustituirla en el cuerpo del texto.
  doctrine_reference: Translation philosophy §1; §3
- issue: Preservación de la tensión en el sintagma 'ídolos de tus abominaciones'
  english_pob_reading: the idols of your abominations; that is, your detestable idols.
  chosen_spanish_reading: los ídolos de tus abominaciones, sin colapsarlo en una sola glosa dentro del texto principal.
  alternative_spanish_readings:
  - tus ídolos detestables
  - los ídolos inmundos de tus abominaciones
  rationale: Ezequiel usa acumulación retórica. Mantener la sintaxis del hebreo ayuda a conservar el tono profético y evita borrar el énfasis insultante del original.
  doctrine_reference: Translation philosophy §3; §5
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió el sustantivo hebreo נְחֻשְׁתֵּךְ de 'bronze' a 'lust' por razones contextuales y afinó 'that you gave' a 'whom you gave'. Esta versión española sigue esa revisión en el texto principal, pero conserva en nota la tensión léxica documentada entre 'bronce/riqueza' y la lectura contextual adoptada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה en lugar de una máscara como 'SEÑOR'.
  - Se conserva el plural 'prostituciones' para reflejar el plural hebreo.
  - '''Amantes'' traduce de forma idiomática מְאַהֲבָיִךְ dentro del marco metafórico de infidelidad.'
  - La nota sobre 'sangre de tus hijos' preserva la inferencia contextual de sacrificio sin imponerla en el texto principal.
