base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/050/007.yaml
  text: All who found them devoured them[a], and their adversaries said, “We are not guilty, because they sinned against Yahweh, the habitation of righteousness[b], the hope of their fathers—Yahweh.”
  footnotes:
  - marker: a
    text: Or “the habitation of righteousness.” The Hebrew נְוֵה can denote a pasture, abode, or dwelling place.
    reason: lexical_alternative
  - marker: b
    text: Or “the expectation of their fathers.”
    reason: lexical_alternative
