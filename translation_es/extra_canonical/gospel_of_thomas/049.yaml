base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/049.yaml
  text: Jesus said[solitary], "Blessed are the solitary and chosen, for you will find the kingdom. For you are from it[from it][find the kingdom], and you will go there again."
  footnotes:
  - marker: solitary
    text: The Greek loanword μοναχός (monachos) in Thomas denotes someone who is 'single' or 'undivided' in a spiritual sense, rather than carrying the later institutional meaning of a 'monk'.
    reason: lexical_alternative
  - marker: find the kingdom
    text: The Coptic uses the preposition ⲁ (a) instead of the standard Sahidic ⲉ (e) after the verb ϩⲉ ('to find'), a regional dialectal feature common in this manuscript.
    reason: dialect_note
  - marker: from it
    text: Literally 'ones out of it' (plural indefinite article ϩⲉⲛ- + ⲉⲃⲟⲗ).
    reason: register_note
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:47Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Jesús dijo: «Bienaventurados los solitarios[a] y los escogidos[b], porque encontrarán el reino[c]. Pues ustedes proceden de él[d], y de nuevo irán allí».'
  philosophy: formal
  footnotes:
  - marker: a
    text: El cóptico ⲙⲟⲛⲁⲭⲟⲥ aquí designa a quienes son espiritualmente «solitarios» o indivisos, no necesariamente a monjes en sentido institucional posterior.
    reason: lexical_alternative
  - marker: b
    text: «Escogidos» traduce la forma relativa pasiva de ⲥⲱⲧⲡ; no significa que ellos se escogieron a sí mismos.
    reason: theological_note
  - marker: c
    text: El manuscrito usa una forma dialectal de la preposición después de «encontrar»; el sentido sigue siendo «hallarán el reino».
    reason: textual_variant
  - marker: d
    text: 'Literalmente, la expresión indica procedencia: «son de fuera de él» o «provienen de él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙⲟⲛⲁⲭⲟⲥ
  english_pob_choice: solitary
  chosen_spanish: solitarios
  alternatives_spanish:
  - monjes
  - únicos
  - personas solas
  lexicon: Crum 175a; uso del préstamo griego μοναχός en Tomás
  rationale: El inglés POB evita «monks» por su sentido institucional tardío. En español, «solitarios» conserva la idea de singularidad/indivisión espiritual sin introducir un anacronismo monástico.
- source_word: ⲥⲱⲧⲡ
  english_pob_choice: chosen
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  - electos
  lexicon: Crum 365a
  rationale: La forma relativa pasiva/stativa pide un adjetivo en plural. «Escogidos» es claro y fiel; «electos» suena más técnico, y «elegidos» también sería posible, pero «escogidos» mantiene un registro sobrio.
- source_word: ϩⲉ
  english_pob_choice: find
  chosen_spanish: encontrarán
  alternatives_spanish:
  - hallarán
  - descubrirán
  lexicon: Crum 651a
  rationale: El sentido básico es «find». En español, «encontrarán» es natural y directo, y preserva el matiz de hallazgo del reino.
- source_word: ⲙⲛⲧⲉⲣⲟ
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - soberanía
  lexicon: Crum 298a
  rationale: «Reino» es la equivalencia española más estable para ⲙⲛⲧⲉⲣⲟ y conserva el término que el texto contrasta con el origen y retorno de los hablantes.
- source_word: ⲟⲩⲉⲃⲟⲗ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - proceden de él
  - son de él
  lexicon: Crum 509a; valor preposicional de ⲉⲃⲟⲗ con artículo indefinido plural
  rationale: 'El griego/cóptico subraya procedencia: literalmente «son de fuera/son provenientes de él». En español, «proceden de él» transmite mejor esa idea sin sonar forzado; se mantiene el vínculo de origen con el reino.'
theological_decisions:
- issue: Naturaleza de "los solitarios"
  english_pob_reading: solitary refers to spiritual singleness/undividedness, not later institutional monasticism
  chosen_spanish_reading: «los solitarios» como quienes tienen una unidad interior y una separación espiritual del mundo, no como monjes institucionales
  alternative_spanish_readings:
  - los monjes
  - los únicos
  - los de corazón sencillo
  rationale: 'Se preserva la tensión documentada por el POB inglés: el término no debe leerse con el peso posterior de la vida monástica. «Solitarios» es suficientemente amplio para expresar la indivisión espiritual sin imponer una institución posterior.'
  doctrine_reference: historia de la recepción; sensibilidad lexical al contexto tomasino
- issue: Estructura plural de la bienaventuranza
  english_pob_reading: Blessed are the solitary and chosen
  chosen_spanish_reading: Bienaventurados los solitarios y los escogidos
  alternative_spanish_readings:
  - Bienaventurado el solitario y el escogido
  - Dichosos los solitarios y los escogidos
  rationale: 'El testimonio coptico es plural: la bienaventuranza se dirige a un grupo. Se mantiene el plural para reflejar la gramática del original y la revisión auditada.'
  doctrine_reference: gramática coptica; auditoría textual
- issue: Sentido del reino como origen y destino
  english_pob_reading: you are from it, and you will go there again
  chosen_spanish_reading: proceden de él, y de nuevo irán allí
  alternative_spanish_readings:
  - son de él, y volverán allí
  - proceden de él, y volverán allí
  rationale: El texto dice que los destinatarios «son/de fuera de» ese reino y luego volverán. «Proceden de él» conserva la relación de origen; «irán allí de nuevo» preserva el retorno. No se reduce a una mera promesa futura apocalíptica.
  doctrine_reference: teología del reino en Tomás; lectura de origen/retorno
translation_notes:
  revision_awareness: 'La versión inglesa auditada corrigió una lectura previa singular: el copto es plural («bienaventurados...», no «bienaventurado...»). También confirmó que ⲉⲧⲥⲟⲧⲡ es pasivo/stativo («escogidos»), y que ⲙⲟⲛⲁⲭⲟⲥ debe evitar un sentido monástico institucional. Esta propuesta española sigue esas revisiones y conserva la nota dialectal del verbo «encontrar».'
  spanish_consistency_notes:
  - 'Mantengo el plural en toda la bienaventuranza: «Bienaventurados» / «los solitarios y los escogidos».'
  - Uso «reino» para ⲙⲛⲧⲉⲣⲟ, no «reinado» ni «soberanía», para conservar la terminología estable del texto.
  - Reservo «escogidos» para la pasividad del participio; no lo convierto en una acción reflexiva.
  - «Proceden de él» comunica la idea de origen sin añadir una interpretación doctrinal externa.
  - Las notas al pie marcan solo las alternativas relevantes presentes en el audit trail y en la ambigüedad española creada por la traducción.
