translation:
  language: es
  text: Hicieron frente a los enemigos y se defendieron de los adversarios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «resistieron a los enemigos y rechazaron a los adversarios». El griego usa dos pares casi sinónimos para oponentes hostiles y resistencia defensiva.'
