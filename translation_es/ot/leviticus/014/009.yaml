translation:
  language: es
  text: 'Y el séptimo día se rasurará[a] todo su vello: la cabeza, la barba y las cejas. Se rasurará todo su vello, lavará su ropa y lavará su cuerpo[b] en agua; y quedará limpio.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se afeitará». El hebreo usa un verbo de rasurar o remover el vello por completo, no solo recortar.
    reason: lexical_alternative
  - marker: b
    text: O «su carne». El hebreo dice literalmente «su carne», una manera común aquí de referirse al cuerpo de la persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה בַיּוֹם הַשְּׁבִיעִי
  english_pob_choice: And on the seventh day
  chosen_spanish: Y en el séptimo día
  alternatives_spanish:
  - Y será en el séptimo día
  - Y sucederá en el séptimo día
  lexicon: HALOT
  rationale: La fórmula introduce una secuencia ritual; en español, 'en el séptimo día' conserva el valor temporal sin calco innecesario.
- source_word: יְגַלַּח
  english_pob_choice: he shall shave off
  chosen_spanish: se rasurará
  alternatives_spanish:
  - se afeitará
  - se rapará
  lexicon: HALOT
  rationale: El verbo expresa remoción completa del vello en contexto ritual. 'Se rasurará' es claro y puede abarcar la acción total, sin la resonancia moderna de arreglo personal que tendría 'afeitarse'.
- source_word: כָּל שְׂעָרוֹ
  english_pob_choice: all his hair
  chosen_spanish: todo su cabello
  alternatives_spanish:
  - todo su pelo
  - todo el vello de su cuerpo
  lexicon: HALOT
  rationale: En español, 'cabello' funciona bien para el conjunto del pelo corporal en esta enumeración ritual, mientras que 'pelo' puede sonar menos formal. Se mantiene la totalidad del hebreo.
- source_word: רֹאשׁוֹ
  english_pob_choice: his head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - la cabeza de su cabello
  - el cabello de su cabeza
  lexicon: HALOT
  rationale: El inglés POB entiende aquí la parte del cuerpo en aposición al cabello. En español, 'la cabeza' comunica naturalmente la zona a rasurar sin sobreexplicar.
- source_word: זְקָנוֹ
  english_pob_choice: his beard
  chosen_spanish: la barba
  alternatives_spanish:
  - su barba
  lexicon: HALOT
  rationale: Término léxico directo y natural para זָקָן en este contexto.
- source_word: גַּבֹּת עֵינָיו
  english_pob_choice: his eyebrows
  chosen_spanish: las cejas
  alternatives_spanish:
  - los arcos de sus ojos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; 'cejas' es el equivalente natural y fiel en español.
- source_word: וְאֶת כָּל שְׂעָרוֹ יְגַלֵּחַ
  english_pob_choice: He shall shave off all his hair
  chosen_spanish: Se rasurará todo su cabello
  alternatives_spanish:
  - rasurará todo su cabello
  - se afeitará todo su cabello
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del hebreo y del POB inglés. El reflexivo impersonal mantiene el valor prescriptivo sin forzar un sujeto repetido.
- source_word: וְכִבֶּס אֶת בְּגָדָיו
  english_pob_choice: wash his clothes
  chosen_spanish: lavará su ropa
  alternatives_spanish:
  - lavará sus vestiduras
  - limpiará su ropa
  lexicon: HALOT
  rationale: כִּבֵּס es lavar prendas; 'ropa' es natural y clara en español, sin perder el sentido de purificación ritual.
- source_word: וְרָחַץ אֶת בְּשָׂרוֹ בַּמַּיִם
  english_pob_choice: bathe his body in water
  chosen_spanish: lavará su cuerpo en agua
  alternatives_spanish:
  - lavará su carne en agua
  - se bañará en agua
  lexicon: HALOT
  rationale: POB traduce בָּשָׂר como 'body' en este contexto ritual. En español, 'cuerpo' expresa esa referencia de forma natural y evita una lectura corporal demasiado cruda de 'carne', sin eliminar la imagen física del texto.
- source_word: וְטָהֵר
  english_pob_choice: then he shall be clean
  chosen_spanish: y quedará limpio
  alternatives_spanish:
  - y será limpio
  - y quedará purificado
  lexicon: HALOT
  rationale: Se conserva el estado resultante de pureza ritual. 'Limpio' reproduce bien la categoría cultual sin cargarla de moralidad; 'quedará' marca el resultado.
theological_decisions:
- issue: Estado ritual de pureza al final del versículo
  english_pob_reading: then he shall be clean
  chosen_spanish_reading: y quedará limpio
  alternative_spanish_readings:
  - y será limpio
  - y quedará purificado
  rationale: El contexto es legislación de pureza levítica; no se trata de inocencia moral. 'Limpio' mantiene la categoría ritual accesible en español y evita introducir un matiz doctrinal ajeno.
  doctrine_reference: 'Purity legislation in Leviticus; translation principle: preserve cultic status terminology without moralizing it'
- issue: וְרָחַץ אֶת בְּשָׂרוֹ בַּמַּיִם
  english_pob_reading: bathe his body in water
  chosen_spanish_reading: lavará su cuerpo en agua
  alternative_spanish_readings:
  - lavará su carne en agua
  - se bañará en agua
  rationale: La POB anglófona deja ver la ambigüedad entre 'flesh' y 'body' mediante nota. En español, 'cuerpo' comunica el referente idiomático con claridad, mientras que 'carne' conserva la literalidad más dura. Se mantiene la tensión léxica sin borrarla.
  doctrine_reference: Lexical ambiguity in ritual washing formula; maintain source-grounded ambiguity in note
translation_notes:
  revision_awareness: La versión en inglés POB no muestra cambios en la pasada de revisión más reciente; se mantiene la lectura estable de alta concordancia, incluida la repetición enfática de la acción de rasurar y la nota lexical sobre בָּשָׂר.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene 'limpio' para טהר en sentido ritual, coherente con el tratamiento POB de pureza cultual.
  - '''Se rasurará'' conserva mejor que ''se afeitará'' la remoción completa del vello en un contexto ceremonial.'
