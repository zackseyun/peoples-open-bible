review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: Rubén sigue siendo el primogénito biológico de Israel, pero por profanar el lecho de su padre su primogenitura fue transferida a los hijos de José, con la cláusula final preservando la tensión entre privilegio de primogenitura y registro genealógico. Sin embargo, hay un problema de sintaxis/discurso en español: la secuencia ''—porque él era el primogénito—, pero al profanar...'' combina torpemente la parentética explicativa con ''pero'', y conviene ajustar la redacción para que el contraste/causalidad quede claro y natural.'
  spanish_quality_summary: La redacción es mayormente digna y comprensible, con buenos equivalentes como 'primogénito', 'lecho' y 'primogenitura'. No obstante, la puntuación y la articulación del contraste resultan poco naturales en español. Además, conviene hacer explícita con nota la alternativa literal de 'lechos/camas', ya preservada en el rastro inglés, porque en español también puede ser relevante para transparencia lexical.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Los términos clave se manejan adecuadamente: ''Rubén'', ''Israel'', ''José'', ''primogénito'', ''primogenitura''. ''Profanar'' es aceptable, aunque ''contaminar'' o ''deshonrar'' serían posibles; no es necesario cambiarlos. La cláusula final debe seguir manteniendo el matiz genealógico sin colapsarlo en ''como primogénito''.'
  issues:
  - severity: medium
    issue: Construcción discursiva poco natural con '—porque él era el primogénito—, pero al profanar...'
    rationale: El hebreo tiene una explicación parentética seguida de una cláusula causal/circunstancial. En español, insertar 'pero' después de la parentética con esa puntuación suena trabado. 'Aunque él era el primogénito, al profanar...' o una reestructuración equivalente comunica mejor la relación lógica sin perder el matiz.
  - severity: low
    issue: Falta la nota lexical sobre 'lecho' frente al plural literal hebreo
    rationale: El inglés POB conserva la alternativa 'beds/couches' como transparencia lexical. En español, una nota breve ayuda a mostrar que 'lecho' traduce un plural idiomático referido al lecho matrimonial, sin recargar el texto principal.
