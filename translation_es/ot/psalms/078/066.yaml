    text: 'O: «hirió a sus enemigos hacia atrás». El hebreo אָחוֹר puede entenderse como indicación del lugar golpeado («por la espalda») o adverbialmente («hacia atrás»).'
    reason: lexical_alternative
  revision_rationale: Se revisa אָחוֹר a 'por la espalda' en el texto principal porque es una opción legítima del hebreo y produce una frase idiomática en español, mientras la lectura adverbial se conserva en nota. También se cambia 'vergüenza perpetua' por 'oprobio perpetuo' para reflejar mejor el matiz de reproche público y mantener un registro bíblico claro y digno.
