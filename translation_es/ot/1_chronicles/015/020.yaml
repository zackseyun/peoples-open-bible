translation:
  language: es
  text: y Zacarías, Aziel, Semiramot, Jehiel, Uní, Eliab, Maasías, y Benaías, con arpas según Alamot[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con arpas en un registro agudo»; el término hebreo «Alamot» puede ser una indicación musical asociada con doncellas o con una tesitura semejante a la de soprano.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/זְכַרְיָה
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zequerías
  - Zacarías
  lexicon: transliteración onomástica estándar
  rationale: Se conserva el nombre propio en forma reconocible y natural para el español bíblico; Zacarías es la adaptación usual de Zechariah.
- source_word: וַ/עֲזִיאֵל
  english_pob_choice: Aziel
  chosen_spanish: Aziel
  alternatives_spanish:
  - Asiel
  - Aziel
  lexicon: transliteración onomástica estándar
  rationale: El nombre se translitera de manera directa, manteniendo la forma cercana al hebreo y al inglés POB.
- source_word: וּ/שְׁמִירָמוֹת
  english_pob_choice: Shemiramoth
  chosen_spanish: Semiramot
  alternatives_spanish:
  - Shemiramot
  - Semiramot
  lexicon: transliteración onomástica estándar
  rationale: Se adapta la transliteración al sistema gráfico español, suprimiendo la h muda inicial inglesa y conservando la terminación nominal.
- source_word: וִֽ/יחִיאֵל
  english_pob_choice: Jehiel
  chosen_spanish: Jehiel
  alternatives_spanish:
  - Yehiel
  - Jehiel
  lexicon: transliteración onomástica estándar
  rationale: Se conserva la forma bíblica ya establecida en español para este nombre, compatible con la transliteración del hebreo.
- source_word: וְ/עֻנִּי
  english_pob_choice: Unni
  chosen_spanish: Uni
  alternatives_spanish:
  - Uni
  - Unni
  lexicon: transliteración onomástica estándar
  rationale: Se ajusta la duplicación consonántica al español, manteniendo el nombre propio sin añadir letras innecesarias.
- source_word: וֶֽ/אֱלִיאָב
  english_pob_choice: Eliab
  chosen_spanish: Eliab
  alternatives_spanish:
  - Eliab
  lexicon: transliteración onomástica estándar
  rationale: Se conserva la forma breve y ya naturalizada del nombre.
- source_word: וּ/מַעֲשֵׂיָהוּ
  english_pob_choice: Maaseiah
  chosen_spanish: Maasías
  alternatives_spanish:
  - Maasías
  - Maasiah
  lexicon: transliteración onomástica estándar
  rationale: La forma española sigue el nombre hebreo con ajuste ortográfico y acentuación natural del español; Maasías es una adaptación bíblica comprensible.
- source_word: וּ/בְנָיָהוּ
  english_pob_choice: Benaiah
  chosen_spanish: Benaías
  alternatives_spanish:
  - Benaías
  - Benaía
  lexicon: transliteración onomástica estándar
  rationale: Se adapta el nombre al español bíblico estándar, conservando el final -ías frecuente en estas transliteraciones.
- source_word: בִּ/נְבָלִ֖ים
  english_pob_choice: with harps
  chosen_spanish: con arpas
  alternatives_spanish:
  - con liras
  - con arpas
  lexicon: HALOT
  rationale: נְבָלִים designa instrumentos de cuerda; 'arpas' es la equivalencia española más natural y fiel en este contexto musical, reflejando el valor instrumental del prefijo ב.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - según
  - de acuerdo con
  - sobre
  lexicon: HALOT
  rationale: En este contexto musical, עַל introduce una indicación de modo o registro más que ubicación física; 'según' preserva esa flexibilidad sin forzar una lectura espacial.
- source_word: עֲלָמוֹת
  english_pob_choice: Alamoth
  chosen_spanish: Alamot
  alternatives_spanish:
  - Alamot
  - Alamot
  lexicon: HALOT
  rationale: Se translitera el término técnico en vez de traducirlo como 'doncellas' o resolverlo como 'registro agudo', porque el sentido exacto es incierto y la fuente inglesa también lo preserva como término especial.
theological_decisions:
- issue: Tratamiento del término musical técnico עֲלָמוֹת
  english_pob_reading: Alamoth may be a musical direction associated with maidens or soprano-like pitch; the exact sense is uncertain, so the term is preserved with a note.
  chosen_spanish_reading: Alamot se mantiene transliterado como término técnico incierto, con nota de posible sentido musical de registro agudo o relación con doncellas.
  alternative_spanish_readings:
  - con registro agudo
  - con las doncellas
  - en tono de soprano
  rationale: La evidencia no permite fijar con seguridad un único valor. Mantener el término evita borrar la tensión lexical y permite ofrecer las alternativas atestiguadas en la nota.
  doctrine_reference: Principio de honestidad textual y preservación de ambigüedad léxica cuando el hebreo no es decisivo.
translation_notes:
  revision_awareness: El texto inglés POB fue revisado y quedó sin cambios; el presente borrador español sigue esa lectura estable, conservando el inventario de nombres propios y la ambigüedad musical de עֲלָמוֹת sin sobretraducirla.
  spanish_consistency_notes:
  - Se prefirió 'con arpas' por el valor instrumental de בִּנְבָלִים, en paralelo con la decisión inglesa.
  - '''Alamot'' se translitera de manera uniforme para mantener la incertidumbre del término técnico.'
  - Los nombres propios se adaptan al uso bíblico español cuando existe forma asentada (Zacarías, Eliab, Benaías) y se transliteran de forma directa cuando no la hay clara (Aziel, Semiramot, Jehiel, Uni).
