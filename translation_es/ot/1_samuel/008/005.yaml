translation:
  language: es
  text: 'Ellos le dijeron: «Mira, has envejecido, y tus hijos no han andado en tus caminos. Ahora, nómbranos un rey para que nos juzgue[a], como todas las naciones».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para gobernarnos» o «para regirnos»; el verbo hebreo «juzgar» puede incluir una autoridad de gobierno más amplia en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Ve
  lexicon: HALOT
  rationale: «Mira» preserva la fuerza deíctica y el tono directo de confrontación de הִנֵּה con español natural y digno; evita un calco arcaico como «He aquí» sin perder el énfasis.
- source_word: זָקַנְתָּ
  english_pob_choice: you have grown old
  chosen_spanish: ya eres viejo
  alternatives_spanish:
  - has envejecido
  - ya has envejecido
  lexicon: HALOT
  rationale: El hebreo expresa un estado resultante; en español, «ya eres viejo» comunica de forma clara la condición presente sin volverla mecánica. Se conserva el matiz de constatación que tiene el verbo perfecto.
- source_word: הָלְכוּ בִּדְרָכֶיךָ
  english_pob_choice: have not walked in your ways
  chosen_spanish: no han andado en tus caminos
  alternatives_spanish:
  - no han seguido tus caminos
  - no han vivido conforme a tus caminos
  lexicon: HALOT
  rationale: Se mantiene la metáfora bíblica de «andar en caminos», ampliamente atestiguada, porque expresa conducta y orientación moral sin explicitarla en exceso.
- source_word: שִׂימָה לָּנוּ
  english_pob_choice: appoint for us
  chosen_spanish: ponnos
  alternatives_spanish:
  - designa para nosotros
  - establecenos
  lexicon: HALOT
  rationale: El imperativo causal aquí pide instaurar/colocar un rey; «ponnos» es breve y natural en español, y refleja la idea de establecer una figura real. No se usa «dar» porque sería demasiado general.
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: El sustantivo común se traduce de manera directa e indefinida, acorde con el hebreo anartro y la sintaxis española.
- source_word: לְשָׁפְטֵנוּ
  english_pob_choice: to judge us
  chosen_spanish: para que nos juzgue
  alternatives_spanish:
  - para gobernarnos
  - para regirnos
  lexicon: HALOT
  rationale: Se conserva «juzgar» como traducción principal, siguiendo la decisión del POB inglés de mantener el valor básico de שׁפט. El contexto político queda implícito en la petición de un rey y puede abarcar gobierno, pero el texto principal no lo expande.
- source_word: כְּכָל הַגּוֹיִם
  english_pob_choice: like all the nations
  chosen_spanish: como todas las naciones
  alternatives_spanish:
  - como los demás pueblos
  - igual que todas las naciones
  lexicon: HALOT
  rationale: «Naciones» reproduce el contraste covenantal del hebreo y evita introducir «gentiles», que en español suele sonar a categoría neotestamentaria ajena a este contexto.
theological_decisions:
- issue: Alcance político de שׁפט en el pedido de un rey
  english_pob_reading: to judge us, with broader governing authority possible in context
  chosen_spanish_reading: para que nos juzgue
  alternative_spanish_readings:
  - para que nos gobierne
  - para que nos rija
  rationale: 'La traducción principal conserva la literalidad semántica de שׁפט y no borra la tensión del pasaje: el pueblo pide un rey con función judicial que en la práctica incluye gobierno. Las alternativas se mantienen implícitas por contexto, no en el cuerpo principal.'
  doctrine_reference: Translation philosophy §1, §6
- issue: Comparación con las demás naciones y su carga covenantal
  english_pob_reading: like all the nations
  chosen_spanish_reading: como todas las naciones
  alternative_spanish_readings:
  - como los demás pueblos
  - como los gentiles
  rationale: «Naciones» preserva la comparación política y teológica con los pueblos vecinos sin importar un vocabulario posterior. Se evita «gentiles» porque desplaza el contraste al uso neotestamentario.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el criterio auditado del POB inglés. Se preservó la metáfora de «andar en tus caminos», la exigencia política de «ponnos un rey» y la ambigüedad funcional de שׁפט, con una nota alternativa donde el hebreo puede abarcar más que juicio estrictamente judicial.
  spanish_consistency_notes:
  - Se usó «Mira» para הִנֵּה por naturalidad moderna y claridad retórica.
  - Se mantuvo «rey» y «naciones» como términos consistentes con el trasfondo político del pasaje.
  - Se evitó «SEÑOR» o «gentiles» porque no corresponden al léxico de este versículo ni al criterio auditado.
