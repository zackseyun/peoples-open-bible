translation:
  language: es
  text: Y el día quince de Chislev, en el año ciento cuarenta y cinco[b], edificaron la abominación de desolación[a] sobre el altar; y en las ciudades aledañas de Judá edificaron altares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "la abominación desoladora" o "la abominación que causa desolación". La frase griega es compacta y puede entenderse como un título fijo o como una expresión descriptiva.'
    reason: lexical_alternative
  - marker: b
    text: La referencia al "año ciento cuarenta y cinco" corresponde al cómputo de la era seléucida.
    reason: cultural_note
lexical_decisions:
- source_word: πεντεκαιδεκάτῃ ἡμέρᾳ
  english_pob_choice: on the fifteenth day
  chosen_spanish: el día quince
  alternatives_spanish:
  - el quince
  - en el día quince
  lexicon: LSJ
  rationale: La fecha temporal se expresa de manera natural en español con 'el día quince'. Conserva el valor temporal del dativo griego sin añadir interpretación.
- source_word: Χασελεὺ
  english_pob_choice: Chislev
  chosen_spanish: Chislev
  alternatives_spanish:
  - Kislev
  - Casleu
  lexicon: LSJ
  rationale: Se conserva la transliteración del nombre del mes como en el texto inglés auditado. 'Chislev' es reconocible y refleja la forma griega usada en la fuente.
- source_word: τῷ πέμπτῳ καὶ τεσσερακοστῷ ἔτει
  english_pob_choice: in the one hundred forty-fifth year
  chosen_spanish: en el año ciento cuarenta y cinco
  alternatives_spanish:
  - en el año ciento cuarenta y quinto
  - en el año 145
  lexicon: LSJ
  rationale: La datación seléucida se mantiene de forma clara y directa. En español, 'en el año ciento cuarenta y cinco' conserva la estructura formal de la referencia cronológica.
- source_word: ᾠκοδόμησαν
  english_pob_choice: they built
  chosen_spanish: edificaron
  alternatives_spanish:
  - construyeron
  - levantaron
  lexicon: LSJ
  rationale: '''Edificaron'' mantiene el paralelismo verbal de la frase y suena digno en español bíblico sin caer en un calco demasiado duro. ''Construyeron'' sería posible, pero menos solemne; ''levantaron'' puede sonar más idiomático pero pierde algo de la repetición verbal.'
- source_word: βδέλυγμα ἐρημώσεως
  english_pob_choice: the abomination of desolation
  chosen_spanish: la abominación de desolación
  alternatives_spanish:
  - una abominación desoladora
  - la abominación que causa desolación
  lexicon: LSJ
  rationale: Se preserva la expresión marcada y su fuerza intertextual. 'De desolación' sigue de cerca el genitivo griego y evita resolver la tensión entre título fijo y frase descriptiva.
- source_word: ἐπὶ τὸ θυσιαστήριον
  english_pob_choice: upon the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - encima del altar
  - sobre el ara
  lexicon: LSJ
  rationale: '''Sobre el altar'' expresa bien la colocación física del objeto y es natural en español. ''Ara'' sería más litúrgico y menos transparente para el lector moderno.'
- source_word: πόλεσιν Ἰούδα κύκλῳ
  english_pob_choice: in the surrounding cities of Judah
  chosen_spanish: en las ciudades circunvecinas de Judá
  alternatives_spanish:
  - en las ciudades alrededor de Judá
  - en las ciudades de Judá alrededor
  lexicon: LSJ
  rationale: '''Circunvecinas'' refleja el sentido de κύκλῳ como distribución alrededor y mantiene una forma bíblica clara. ''Alrededor de Judá'' puede sonar menos precisa respecto de las ciudades; ''de Judá alrededor'' sería más forzado.'
- source_word: βωμούς
  english_pob_choice: altars
  chosen_spanish: altares
  alternatives_spanish:
  - aras
  - santuarios
  lexicon: LSJ
  rationale: '''Altares'' es el equivalente directo y corresponde al uso de βωμούς. No se sustituye por ''aras'' porque esa forma puede sonar arcaizante y menos transparente; ''santuarios'' excedería el sentido.'
theological_decisions:
- issue: Conservar la expresión apocalíptica/cultual βδέλυγμα ἐρημώσεως sin explicarla en el texto principal
  english_pob_reading: the abomination of desolation
  chosen_spanish_reading: la abominación de desolación
  alternative_spanish_readings:
  - una abominación desoladora
  - la abominación que causa desolación
  rationale: La frase tiene resonancia bíblica posterior y funciona como designación marcada. Mantenerla en forma compacta preserva la tensión textual y la continuidad intertextual; la nota recoge una alternativa interpretativa sin reemplazar el texto base.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Swete 1909 y el audit trail inglés, manteniendo la construcción temporal, la datación seléucida, la repetición verbal de ᾠκοδόμησαν y la expresión marcada βδέλυγμα ἐρημώσεως. Se adoptó 'ciudades circunvecinas de Judá' para reflejar κύκλῳ con naturalidad en español y sin perder el sentido distributivo del griego.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general solo cuando el original lo exija; este versículo no contiene el nombre divino.
  - Se conserva 'Chislev' como transliteración del mes, en coherencia con el registro bíblico del libro.
  - '''Abominación de desolación'' se mantiene como expresión fija y no se parafrasea en el texto principal.'
  - '''Altares'' traduce βωμούς de manera directa y distingue estos altares del altar singular mencionado antes.'
