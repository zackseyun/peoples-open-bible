translation:
  language: es
  text: 'Entonces Moisés llamó a todos los ancianos de Israel y les dijo: «Saquen[a] y tomen para ustedes animales del rebaño[b] según sus familias, y degüellen la Pascua[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Saquen» también puede entenderse como «elijan» o «saquen del rebaño». El hebreo conserva la imagen concreta de extraer el animal para apartarlo.
    reason: lexical_alternative
  - marker: b
    text: El hebreo צֹאן es más amplio que «corderos» y puede referirse al ganado menor del rebaño, incluyendo ovejas o cabras.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «la Pascua»; aquí funciona como metonimia de la víctima o del sacrificio pascual.'
    reason: theological_note
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called for
  chosen_spanish: llamó a
  alternatives_spanish:
  - convocó a
  - llamó para
  lexicon: HALOT
  rationale: El hebreo expresa que Moisés reúne a los ancianos para darles instrucciones. En español, «llamó a» comunica bien esa acción sin añadir formalidad innecesaria; «convocó a» sería posible, pero suena algo más administrativo que el contexto narrativo.
- source_word: זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: the elders of Israel
  chosen_spanish: los ancianos de Israel
  alternatives_spanish:
  - los líderes de Israel
  - los ancianos de Israel
  lexicon: HALOT
  rationale: «Ancianos» es la correspondencia natural y tradicional para זִקְנֵי, y mantiene la referencia a los representantes reconocidos del pueblo.
- source_word: מִשְׁכוּ
  english_pob_choice: Draw out
  chosen_spanish: Sáquenlo
  alternatives_spanish:
  - Sáquenlo
  - Arrástrenlo
  - Elíjanlo
  lexicon: HALOT
  rationale: El imperativo hebreo conserva una imagen física de sacar o extraer un animal de entre el rebaño. En español, «Sáquenlo» preserva el movimiento concreto sin sonar forzado; el pronombre anticipa el animal implícito en el contexto.
- source_word: וּקְחוּ
  english_pob_choice: take
  chosen_spanish: tomen
  alternatives_spanish:
  - tomen
  - agarren
  - tengan
  lexicon: HALOT
  rationale: לקח se traduce de forma directa con «tomen». Mantiene la segunda orden, paralela a «Sáquenlo», sin fusionar ambas acciones.
- source_word: לָכֶם
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para ustedes
  - para sí
  lexicon: HALOT
  rationale: 'El dativo tiene fuerza reflexiva o posesiva: el animal debe ser tomado para el uso propio de cada casa. «Para ustedes» expresa bien esa dirección en español contemporáneo.'
- source_word: צֹאן
  english_pob_choice: sheep according to your families
  chosen_spanish: corderos
  alternatives_spanish:
  - ovejas
  - animales del rebaño
  - ganado menor
  lexicon: HALOT
  rationale: צֹאן designa ganado menor, no siempre restringido a una sola especie. En este contexto pascual, el contexto inmediato permite una referencia concreta al animal sacrificial; «corderos» sigue la decisión inglesa de hacer explícito el animal del sacrificio, aunque el hebreo sea más amplio. Se conserva la tensión léxica en la nota.
- source_word: לְמִשְׁפְּחֹתֵיכֶם
  english_pob_choice: according to your families
  chosen_spanish: según sus familias
  alternatives_spanish:
  - según sus familias
  - por sus familias
  - de acuerdo con sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה se refiere a unidades familiares o clanicas. «Según sus familias» es una traducción natural y fiel al reparto por grupos domésticos.
- source_word: וְשַׁחֲטוּ
  english_pob_choice: slaughter
  chosen_spanish: degüellen
  alternatives_spanish:
  - degüellen
  - sacrifiquen
  - maten
  lexicon: HALOT
  rationale: El verbo apunta al sacrificio ritual de un animal. «Degüellen» conserva la violencia física concreta del término hebreo; «sacrifiquen» sería más interpretativo y podría ocultar el acto de matar al animal.
- source_word: הַפָּסַח
  english_pob_choice: the Passover lamb
  chosen_spanish: la Pascua
  alternatives_spanish:
  - la Pascua
  - el sacrificio de Pascua
  - el cordero pascual
  lexicon: HALOT
  rationale: El hebreo usa «la Pascua» metonímicamente para el sacrificio/víctima pascual. En español, aquí se conserva esa forma breve y se deja explícito en la nota que el referente es el animal sacrificial; esto evita fijar innecesariamente «cordero» cuando el propio contexto hebreo puede ser más amplio.
theological_decisions:
- issue: Referente de הַפָּסַח
  english_pob_reading: the term refers to the Passover sacrificial animal, rendered explicitly as 'the Passover lamb' in idiomatic English
  chosen_spanish_reading: «la Pascua» como metonimia del sacrificio o víctima pascual, sin imponer en el texto principal una especie concreta
  alternative_spanish_readings:
  - el cordero pascual
  - el sacrificio de Pascua
  - la Pascua
  rationale: La fuente hebrea nombra literalmente «la Pascua», pero el contexto exige entender una víctima sacrificial. En español, «la Pascua» permite mantener la metonimia original y, a la vez, la nota aclara el sentido sacrificial. Esto evita cerrar el referente a «cordero» cuando el propio audit trail inglés reconoce que צֹאן es más amplio.
  doctrine_reference: Éxodo 12:5; Éxodo 12:21
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó «from the flock» porque no está en el hebreo, y mantuvo la secuencia «Draw out and take» para מִשְׁכוּ וּקְחוּ. En el español se evitó añadir un equivalente de «from the flock» en el texto principal, se conservaron dos imperativos distintos («Sáquenlo» y «tomen») y se mantuvo la metonimia «la Pascua» con aclaración en nota, siguiendo el mismo criterio de no sobreespecificar el referente animal en el cuerpo del versículo.
  spanish_consistency_notes:
  - Se usa «Moisés» y «Israel» de manera estándar y estable.
  - Se mantiene «ancianos» para זִקְנֵי, evitando «líderes» por ser más interpretativo.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - El registro es sobrio y bíblico, sin arcaísmos innecesarios.
  - Las notas distinguen entre el texto principal y las decisiones de claridad, sin introducir lecturas doctrinales ajenas al pasaje.
