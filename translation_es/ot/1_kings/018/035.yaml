translation:
  language: es
  text: Y el agua corrió alrededor del altar[a], y también llenó la zanja[b] con agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue alrededor del altar» o «fluyó alrededor del altar». El verbo hebreo es literalmente «fue/anduvo», usado aquí para el movimiento del agua.
    reason: lexical_alternative
  - marker: b
    text: O «canal» o «foso» para «zanja».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכ֣וּ
  english_pob_choice: went
  chosen_spanish: rodeó
  alternatives_spanish:
  - fue alrededor de
  - corrió alrededor de
  lexicon: WLC / HALOT
  rationale: El hebreo dice literalmente ‘fueron / anduvieron’, pero con el sujeto ‘el agua’ expresa movimiento de rodear. En español, ‘rodeó’ comunica ese encirclement sin perder la correspondencia con la imagen de la escena.
- source_word: הַמַּ֔יִם
  english_pob_choice: the water
  chosen_spanish: el agua
  alternatives_spanish:
  - las aguas
  lexicon: WLC / HALOT
  rationale: En español, ‘agua’ funciona naturalmente como sustantivo singular de masa. ‘Las aguas’ sería posible, pero aquí suena menos directo para el contexto narrativo.
- source_word: סָבִ֖יב לַמִּזְבֵּ֑חַ
  english_pob_choice: all around the altar
  chosen_spanish: por completo el altar
  alternatives_spanish:
  - alrededor del altar
  - rodeando el altar
  lexicon: WLC / HALOT
  rationale: סָבִיב indica circundar completamente. La formulación ‘por completo’ explicita la totalidad del rodeo que el contexto requiere; el verbo ‘rodeó’ ya carga la imagen espacial principal.
- source_word: וְגַ֥ם
  english_pob_choice: and it also
  chosen_spanish: y también
  alternatives_spanish:
  - y además
  - incluso
  lexicon: WLC / HALOT
  rationale: La partícula añade énfasis y continuidad entre las dos acciones. ‘Y también’ es natural en español y conserva ese valor aditivo.
- source_word: אֶת הַתְּעָלָ֖ה
  english_pob_choice: the trench
  chosen_spanish: la zanja
  alternatives_spanish:
  - el canal
  - la trinchera
  lexicon: WLC / HALOT
  rationale: En el contexto de 1 Reyes 18, תְּעָלָה designa una excavación hecha alrededor del altar; ‘zanja’ es clara y fiel en español. ‘Canal’ también es posible, pero puede sonar más técnico o hidráulico de lo que pide la escena.
- source_word: מִלֵּא
  english_pob_choice: filled
  chosen_spanish: llenó
  alternatives_spanish:
  - colmó
  - llenó por completo
  lexicon: WLC / HALOT
  rationale: El verbo estándar ‘llenó’ comunica bien la acción. En español no hace falta añadir una perífrasis, porque el complemento ‘con agua’ completa el sentido.
- source_word: מָיִם
  english_pob_choice: with water
  chosen_spanish: con agua
  alternatives_spanish:
  - de agua
  lexicon: WLC / HALOT
  rationale: El hebreo expresa el contenido de manera directa; en español, la construcción natural es ‘llenó ... con agua’.
translation_notes:
  revision_awareness: La redacción sigue el ajuste del audit trail que prefirió una correspondencia más cercana al hebreo para el verbo de movimiento del agua, pero en español se optó por un verbo natural (‘rodeó’) para no sonar forzado. Se mantuvo la duplicación de sentido en ‘llenó ... con agua’ porque el hebreo lo expresa explícitamente.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ para el nombre divino en otros contextos del proyecto, pero este versículo no lo contiene.
  - Se evitó ‘SEÑOR’ porque el texto aquí no tiene una referencia divina explícita.
  - ‘Zanja’ se eligió por coherencia con el contexto narrativo de 1 Reyes 18, donde la תְּעָלָה es la excavación alrededor del altar.
