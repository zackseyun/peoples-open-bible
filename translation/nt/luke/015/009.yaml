id: LUK.15.9
reference: Luke 15:9
source:
  edition: SBLGNT
  text: καὶ εὑροῦσα ⸀συγκαλεῖ τὰς φίλας ⸀καὶ γείτονας λέγουσα· Συγχάρητέ μοι ὅτι εὗρον τὴν δραχμὴν ἣν ἀπώλεσα.
translation:
  text: And when she has found it[a], she calls together her women friends and neighbors, saying, ‘Rejoice with me, because I found the drachma that I had lost.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A drachma was a Greek silver coin, roughly equivalent to a laborer’s daily wage in many contexts.
    reason: cultural_note
lexical_decisions:
- source_word: εὑροῦσα
  chosen: when she found it
  alternatives:
  - having found it
  - after finding it
  lexicon: BDAG
  rationale: Aorist participle feminine singular referring to the woman; rendered temporally in natural English. The object 'it' is supplied from context, referring to the lost coin.
- source_word: συγκαλεῖ
  chosen: she calls together
  alternatives:
  - she summons
  - she gathers together
  lexicon: BDAG
  rationale: Present indicative gives vivid narrative force; 'calls together' preserves the compound sense of summoning people to oneself without sounding overly formal.
- source_word: φίλας
  chosen: women friends
  alternatives:
  - friends
  lexicon: BDAG
  rationale: The adjective/noun is feminine plural, matching the female subject and preserving the gendered reference. 'Women friends' is more explicit than generic 'friends' and aligns with the gender-accurate philosophy.
- source_word: γείτονας
  chosen: neighbors
  alternatives:
  - neighbor women
  - female neighbors
  lexicon: BDAG
  rationale: Although the form here is accusative plural and can denote neighbors generally, in this context it is coordinated with feminine φίλας and refers to the woman's social circle. 'Neighbors' is idiomatic English; making it explicitly feminine in English would overtranslate.
- source_word: λέγουσα
  chosen: saying
  alternatives:
  - and says
  lexicon: BDAG
  rationale: Present participle introducing direct speech; 'saying' is the standard concise English equivalent.
- source_word: Συγχάρητέ μοι
  chosen: Rejoice with me
  alternatives:
  - Celebrate with me
  - Share my joy
  lexicon: BDAG
  rationale: Aorist passive/deponent imperative plural from συγχαίρω means to rejoice together with someone. 'Rejoice with me' is the most direct and transparent rendering; alternatives are more idiomatic but less formally tied to the Greek.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Introduces the reason for the rejoicing. 'Because' is clearer in contemporary English than 'for' and more idiomatic here than a bare 'that'.
- source_word: εὗρον
  chosen: I found
  alternatives:
  - I have found
  lexicon: BDAG
  rationale: Aorist indicative first singular; simple past fits the narrative and direct speech naturally in English.
- source_word: δραχμὴν
  chosen: drachma
  alternatives:
  - silver coin
  lexicon: BDAG
  rationale: The specific coin name is retained rather than generalized, since the translation philosophy prefers preserving source-language specificity where understandable. A cultural note can clarify that it is a coin.
- source_word: ἣν ἀπώλεσα
  chosen: that I lost
  alternatives:
  - which I had lost
  lexicon: BDAG
  rationale: Relative clause identifying the coin. Simple past is natural English and sufficiently conveys the prior loss without requiring pluperfect.
