base_translation:
  language: en
  yaml_path: translation/ot/1_kings/021/004.yaml
  text: So Ahab went into his house sullen and angry because of the word that Naboth the Jezreelite had spoken to him[a], saying, “I will not give you the inheritance of my fathers.” And he lay down on his bed and turned his face away[c][b], and he would not eat bread.
  footnotes:
  - marker: a
    text: Or “because of what Naboth the Jezreelite had said to him.” The Hebrew word can mean “word,” “matter,” or “thing.”
    reason: lexical_alternative
  - marker: b
    text: 'Or “the inheritance of my ancestors.” Hebrew: “my fathers.”'
    reason: lexical_alternative
  - marker: c
    text: Hebrew “eat bread,” an idiom that can mean taking food generally.
    reason: lexical_alternative
