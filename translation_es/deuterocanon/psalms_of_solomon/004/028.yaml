translation:
  language: es
  text: Que Dios quite a los que cometen toda clase de injusticia con soberbia[a][b], porque el Señor nuestro Dios es un juez grande y poderoso en justicia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'toda injusticia' para 'toda clase de injusticia'.
    reason: lexical_alternative
  - marker: b
    text: 'El verbo inicial puede entenderse más literalmente como ''Dios quitar'', con tono de ruego o imprecación: ''Que Dios quite ...''.'
    reason: alternative_reading
  - marker: c
    text: O 'en rectitud' para 'en justicia'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξᾶραι
  english_pob_choice: May God remove
  chosen_spanish: Que Dios quite
  alternatives_spanish:
  - Que Dios remueva
  - Que Dios aparte
  - Que Dios quite de en medio
  lexicon: LSJ
  rationale: El infinitivo aoristo tiene fuerza optativa/suplicatoria en este contexto; en español, 'Que Dios quite' expresa bien la petición imprecatoria sin añadir violencia innecesaria.
- source_word: τοὺς ποιοῦντας
  english_pob_choice: those who do
  chosen_spanish: a los que hacen
  alternatives_spanish:
  - a los que practican
  - a los que cometen
  - a los que obran
  lexicon: BDAG
  rationale: El participio señala acción habitual o característica. 'A los que hacen' mantiene amplitud y fluidez en español sin reducir el matiz reiterativo.
- source_word: ἐν ὑπερηφανίᾳ
  english_pob_choice: in arrogance
  chosen_spanish: en arrogancia
  alternatives_spanish:
  - con soberbia
  - en orgullo
  - arrogantemente
  lexicon: LSJ
  rationale: La construcción con sustantivo se conserva de manera natural en español, y 'arrogancia' mantiene el peso moral del término griego.
- source_word: πᾶσαν ἀδικίαν
  english_pob_choice: every kind of unrighteousness
  chosen_spanish: toda injusticia
  alternatives_spanish:
  - toda maldad
  - toda iniquidad
  - toda clase de injusticia
  lexicon: BDAG
  rationale: Aquí ἀδικία puede significar 'injusticia' de forma amplia. En español, 'toda injusticia' comunica bien la totalidad de πᾶσαν sin forzar una perífrasis.
- source_word: κριτὴς
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - juez
  - juzgador
  - árbitro
  lexicon: BDAG
  rationale: '''Juez'' es el equivalente natural y directo en español para el sentido judicial primario.'
- source_word: κραταιὸς
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - fuerte
  - mighty
  lexicon: LSJ
  rationale: '''Poderoso'' suena solemne y bíblico en español moderno, y comunica adecuadamente la fuerza del adjetivo sin caer en arcaísmo.'
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor
  - Dueño
  lexicon: BDAG
  rationale: Aunque el proyecto suele usar 'Yahvé' para יהוה, aquí el texto griego presenta Κύριος como título divino; 'Señor' respeta el texto recibido y la formulación litúrgica tradicional del título en español.
- source_word: ἐν δικαιοσύνῃ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - con justicia
  - justamente
  lexicon: BDAG
  rationale: El contexto judicial hace que 'justicia' funcione con claridad en español, y además conserva el valor moral/legal de δικαιοσύνη sin sonar forzado.
theological_decisions:
- issue: Cómo renderizar Κύριος cuando no aparece יהוה en el griego del verso, pero sí un título divino
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: Dado que el versículo cita directamente Κύριος y no el tetragrámaton hebreo, la mejor opción auditada en español es 'Señor'. Usar 'Yahvé' aquí introduciría una decisión no apoyada por el griego visible del pasaje.
  doctrine_reference: Project default for κύριος as divine title; distinction between explicit YHWH and Greek Κύριος titles
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando en el texto español todos los marcadores de nota requeridos; ahora [a], [b] y [c] aparecen exactamente en la línea principal. La redacción sigue de cerca el griego y el audit trail inglés, sin introducir vocabulario no sustentado.
  spanish_consistency_notes:
  - Se mantuvo la petición/imprecación con 'Que Dios quite' en lugar de un indicativo neutral.
  - '''Injusticia'' se usó como equivalente amplio de ἀδικία, coherente con la nota alternativa preservada.'
  - '''Señor'' se reservó para Κύριος en este verso, por tratarse del título divino explícito en griego.'
  - '''Justicia'' se eligió para δικαιοσύνη por claridad judicial, con nota alternativa a ''rectitud''.'
