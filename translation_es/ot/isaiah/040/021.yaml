translation:
  language: es
  text: ¿No saben? ¿No oyen? ¿No se les ha dicho desde el principio? ¿No han entendido desde los cimientos de la tierra?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿No han entendido los cimientos de la tierra?»'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Do you not / Has it not / Have you not
  chosen_spanish: ¿No... ?
  alternatives_spanish:
  - ¿Acaso no... ?
  - ¿No es cierto que... ?
  lexicon: HALOT
  rationale: La partícula interrogativa con negación conserva en español el valor retórico de pregunta que espera respuesta afirmativa. El simple «¿No...?» suena natural y mantiene la repetición enfática del hebreo.
- source_word: תֵדְעוּ
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - conocen
  - reconocen
  lexicon: HALOT
  rationale: ידע en este contexto expresa conocimiento/conciencia. «Saben» es directo, natural y sostiene el paralelismo con «oyen».
- source_word: תִשְׁמָעוּ
  english_pob_choice: hear
  chosen_spanish: oyen
  alternatives_spanish:
  - escuchan
  - atienden
  lexicon: HALOT
  rationale: שׁמע aquí es «oír» en sentido básico; «oyen» preserva mejor la fuerza léxica sin introducir la idea adicional de atención que tendría «escuchan».
- source_word: הֻגַּד
  english_pob_choice: been told
  chosen_spanish: se les ha dicho
  alternatives_spanish:
  - se les ha anunciado
  - se les ha declarado
  lexicon: HALOT
  rationale: El pasivo de נגד comunica algo que fue transmitido a los destinatarios. En español, la pasiva refleja «se les ha dicho» conserva el valor informativo y el destinatario marcado por לָכֶם.
- source_word: מֵרֹאשׁ
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el inicio
  lexicon: HALOT
  rationale: רֹאשׁ con מן expresa un punto temporal inicial. «Desde el principio» es idiomático en español y reproduce el valor temporal del hebreo.
- source_word: הֲבִינֹתֶם
  english_pob_choice: understood
  chosen_spanish: han entendido
  alternatives_spanish:
  - han comprendido
  - han discernido
  lexicon: HALOT
  rationale: בין en hifil denota entender/discernir. «Han entendido» mantiene el tono cognitivo del verso y encaja con la serie de preguntas retóricas.
- source_word: מוֹסְדֹת
  english_pob_choice: foundations
  chosen_spanish: fundaciones
  alternatives_spanish:
  - cimientos
  - bases
  lexicon: HALOT
  rationale: El sustantivo designa fundamentos o bases. «Fundaciones» conserva el plural hebreo y permite una referencia clara al orden de la creación, aunque «cimientos» también sería posible en español.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: En este contexto cósmico, «la tierra» es la opción más natural en español y refleja el ámbito de la creación.
theological_decisions:
- issue: Relación sintáctica de la cláusula final
  english_pob_reading: Have you not understood from the foundations of the earth?
  chosen_spanish_reading: ¿No han entendido desde las fundaciones de la tierra?[b]
  alternative_spanish_readings:
  - ¿No han entendido las fundaciones de la tierra?
  rationale: El hebreo no lleva preposición explícita antes de מוֹסְדֹת הָאָרֶץ, por lo que la frase puede leerse como complemento directo de «entendido» o como expresión de fuente/ámbito temporal paralelo a «desde el principio». La lectura principal refleja la interpretación auditada de POB; la alternativa literal se conserva en nota porque sigue siendo viable.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Sin revisiones aplicadas; el texto base y el control cruzado muestran acuerdo alto y sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» sin necesidad de ocurrencia aquí; no hay término divino explícito en este versículo.
  - Se preserva el paralelismo retórico con cuatro preguntas breves en español.
  - Se usa «la tierra» en sentido cósmico, no territorial.
  - La nota [a] aclara la opción léxica de «fundaciones» frente a «cimientos» sin alterar el texto principal.
