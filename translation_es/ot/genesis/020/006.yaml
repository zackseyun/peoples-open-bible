translation:
  language: es
  text: 'Entonces Dios le dijo en el sueño[a]: «Sí, yo sé que hiciste esto con la integridad de tu corazón, y también yo te contuve para que no pecaras contra mí[b]. Por eso no te permití tocarla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un sueño». El hebreo puede leerse de manera indefinida, aunque el artículo favorece «en el sueño» en este contexto.
    reason: lexical_alternative
  - marker: b
    text: «Tocarla» es una expresión sobria que aquí alude al contacto sexual.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֲלוֹם
  english_pob_choice: in the dream
  chosen_spanish: en el sueño
  alternatives_spanish:
  - en un sueño
  lexicon: HALOT
  rationale: El hebreo lleva artículo, y en este contexto narrativo apunta al sueño concreto en curso; por eso se prefiere «en el sueño». «En un sueño» queda como alternativa posible si se desea reflejar la indefinición del sustantivo sin artículo en otros contextos.
- source_word: גַּם אָנֹכִי
  english_pob_choice: Yes, I
  chosen_spanish: Sí, yo
  alternatives_spanish:
  - También yo
  - Ciertamente yo
  lexicon: HALOT
  rationale: La partícula intensifica la afirmación divina. «Sí, yo» mantiene el énfasis de manera natural en español sin sonar forzado. La repetición posterior se resuelve con «también yo» para conservar el paralelismo.
- source_word: יָדַעְתִּי
  english_pob_choice: know
  chosen_spanish: sé
  alternatives_spanish:
  - he sabido
  - sabía
  lexicon: HALOT
  rationale: En discurso directo, el presente «sé» comunica mejor la afirmación inmediata de Dios. El perfecto español «he sabido» sería más pesado y «sabía» debilitaría la viveza del diálogo.
- source_word: בְתָם לְבָבְךָ
  english_pob_choice: in the integrity of your heart
  chosen_spanish: con la integridad de tu corazón
  alternatives_spanish:
  - en la integridad de tu corazón
  - con la rectitud de tu corazón
  - con la inocencia de tu corazón
  lexicon: HALOT
  rationale: תֹּם expresa integridad, entereza, probidad. «Con la integridad de tu corazón» conserva el sentido moral y la metáfora del corazón como centro interior. «Rectitud» o «inocencia» estrechan o desplazan el matiz.
- source_word: עָשִׂיתָ זֹּאת
  english_pob_choice: you did this
  chosen_spanish: hiciste esto
  alternatives_spanish:
  - has hecho esto
  - hiciste esa cosa
  lexicon: HALOT
  rationale: El pretérito simple es el equivalente más natural del pasado narrativo en la cita divina. «Has hecho» introduce un aspecto que el contexto no exige.
- source_word: וָאֶחְשֹׂךְ ... אֽוֹתְךָ
  english_pob_choice: I also kept you
  chosen_spanish: también yo te contuve
  alternatives_spanish:
  - también yo te retuve
  - también yo te aparté
  - también yo te preservé
  lexicon: HALOT
  rationale: חָשַׂךְ aquí es impedir, retener, frenar. «Te contuve» mantiene la fuerza de restricción y suena más cercano al hebreo que «te preservé», que sugiere otra imagen. La coordinación con «también yo» preserva el paralelismo enfático.
- source_word: מֵחֲטוֹא לִי
  english_pob_choice: from sinning against me
  chosen_spanish: para que no pecaras contra mí
  alternatives_spanish:
  - de pecar contra mí
  - para no pecar contra mí
  - para que no pecaras ante mí
  lexicon: HALOT
  rationale: El infinitivo con מן expresa prevención. En español, «para que no pecaras contra mí» comunica con claridad la relación ética directa que el hebreo marca con לִי. Se evita «ofenderme» porque atenúa la noción de pecado.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: La fórmula causal-consecutiva se vierte con una expresión breve y natural. «Por eso» mantiene la relación lógica sin elevar el registro de forma innecesaria.
- source_word: לֹא נְתַתִּי/ךָ
  english_pob_choice: I did not let you
  chosen_spanish: no te permití
  alternatives_spanish:
  - no te dejé
  - no te autoricé
  - no te consentí
  lexicon: HALOT
  rationale: נָתַן con infinitivo funciona aquí como «permitir/autorizar». «No te permití» es idiomático y preciso en español, aunque «no te dejé» también sería posible en un registro más coloquial.
- source_word: לִנְגֹּעַ אֵלֶיהָ
  english_pob_choice: touch her
  chosen_spanish: tocarla
  alternatives_spanish:
  - llegar a ella
  - tener contacto con ella
  - acostarte con ella
  lexicon: HALOT
  rationale: נגע se usa como eufemismo sobrio para contacto sexual. «Tocarla» conserva la restricción del hebreo y la misma contención decorosa del POB inglés. «Acostarte con ella» explicita más de lo que el texto dice.
theological_decisions:
- issue: El pecado se define como contra Dios
  english_pob_reading: The offense is described as sin against God, not merely against Sarah or Abraham.
  chosen_spanish_reading: El acto es presentado como pecado contra Dios, no solo como una falta interpersonal.
  alternative_spanish_readings:
  - pecar contra mí como ofenderme
  - pecar contra mí como incurrir en culpa ante mí
  rationale: La mención de לִי señala a Dios como el agraviado último en el marco moral del pasaje. La traducción conserva esa tensión teológica sin reemplazarla por una formulación moralizante o suavizada.
  doctrine_reference: Preservar la tensión teológica del texto; primacía del lenguaje original sobre la tradición devocional.
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en la última revisión; el control cruzado informó alta concordancia y no hubo observaciones pendientes, por lo que esta propuesta sigue de cerca las decisiones léxicas y teológicas ya validadas.
  spanish_consistency_notes:
  - Se mantiene Yahvé solo cuando el hebreo tenga יהוה; aquí el versículo usa אֱלֹהִים, por lo que corresponde «Dios».
  - 'Se conserva el paralelismo enfático de גַּם אָנֹכִי con dos miembros distintos: «Sí, yo» / «también yo».'
  - «Corazón» se mantiene como sede interior de la integridad, en coherencia con el uso bíblico habitual y con el audit trail inglés.
  - Se evita «Señor» como sustituto de אֱלֹהִים y no se introduce vocabulario eclesiástico ajeno al hebreo.
  - La restricción sexual se deja en forma sobria («tocarla») sin explicitar más de lo que el texto y la nota inglesa autorizan.
