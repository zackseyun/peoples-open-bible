translation:
  language: es
  text: En todas tus obras, sé sobresaliente[a]; no causes una mancha[b] a tu honra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «excelente» o «sobresaliente en grado sumo».
    reason: lexical_alternative
  - marker: b
    text: O «tacha»; lit. «no des una mancha a tu honra».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν πᾶσι τοῖς ἔργοις σου
  english_pob_choice: In all your works
  chosen_spanish: En todas tus obras
  alternatives_spanish:
  - En todo lo que hagas
  - En todas tus acciones
  lexicon: LSJ
  rationale: ἔργα puede referirse a obras, hechos o acciones. «Obras» conserva la amplitud total del plural con πᾶσι y mantiene una correspondencia formal y natural en español.
- source_word: γίνου
  english_pob_choice: be
  chosen_spanish: sé
  alternatives_spanish:
  - vuélvete
  - muéstrate
  - llega a ser
  lexicon: LSJ
  rationale: El imperativo exhortativo de γίνομαι funciona aquí como llamada a comportarse de cierta manera. «Sé» reproduce con naturalidad la fuerza imperativa sin perder el matiz ético.
- source_word: ὑπεράγων
  english_pob_choice: outstanding
  chosen_spanish: sobresaliente
  alternatives_spanish:
  - excelente
  - sobresaliente en grado sumo
  - excelso
  lexicon: LSJ
  rationale: El participio/adjetivo expresa excelencia que sobresale. «Sobresaliente» es claro y fiel; «excelente» es posible, pero menos marcado como algo que supera a otros.
- source_word: μὴ δῷς
  english_pob_choice: do not give
  chosen_spanish: no pongas
  alternatives_spanish:
  - no des
  - no causes
  - no permitas
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «no des», el uso idiomático apunta a no ocasionar ni traer sobre uno mismo una mancha. «No pongas» comunica mejor en español la idea de no introducir esa mancha en la conducta o reputación.
- source_word: μῶμον
  english_pob_choice: a blemish
  chosen_spanish: una mancha
  alternatives_spanish:
  - una mancha
  - un defecto
  - una tacha
  - un reproche
  lexicon: LSJ
  rationale: μῶμος/μῶμον designa defecto, mancha o motivo de culpa. «Mancha» preserva la imagen de un deterioro visible de la honra o reputación; «tacha» también sería posible.
- source_word: ἐν τῇ δόξῃ σου
  english_pob_choice: to your honor
  chosen_spanish: en tu honra
  alternatives_spanish:
  - en tu gloria
  - en tu reputación
  - en tu honor
  lexicon: LSJ
  rationale: δώξα puede ser gloria, honor o reputación. En este contexto sapiencial, «honra» conserva el valor social de estima y dignidad. Se evita «gloria» porque en español puede sonar más teológica de lo que el contexto requiere.
theological_decisions:
- issue: δόξα como honor/reputación, no gloria teológica
  english_pob_reading: to your honor
  chosen_spanish_reading: en tu honra
  alternative_spanish_readings:
  - en tu gloria
  - en tu reputación
  rationale: El contexto exhorta sobre conducta y buen nombre; no introduce una afirmación doctrinal sobre la gloria divina. Por eso se prefiere un término de honra/reputación, manteniendo la ambigüedad sapiencial sin teologizarla en exceso.
  doctrine_reference: Sabiduría sapiencial; ética del buen nombre
translation_notes:
  revision_awareness: Se siguió el pasaje tal como está atestiguado en el griego de Swete (alta concordancia). El POB inglés ya había resuelto ὑπεράγων como una exhortación a la excelencia y μῶμον/δόξα como una imagen de mancha sobre el honor; en español se mantuvieron esas decisiones, ajustando la idiomaticidad con ‘sé’ y ‘no pongas’. No se detectaron revisiones textuales relevantes en el expediente más reciente.
  spanish_consistency_notes:
  - Se mantiene el registro sapiencial y exhortativo con segunda persona singular.
  - Se conserva la distinción entre excelencia moral («sobresaliente») y buen nombre («honra»).
  - «Honra» se usa aquí como equivalente de δόξα en sentido social, no litúrgico.
  - Las notas alternativas reflejan el mismo rango semántico documentado en el audit trail inglés, sin ampliar el sentido más allá del griego.
