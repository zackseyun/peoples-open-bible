translation:
  language: es
  text: El justo perece, y nadie lo toma a pecho; los hombres de amor leal son recogidos, sin que nadie entienda que el justo es recogido a causa del mal.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a causa de la calamidad» o «a causa del desastre que viene».
    reason: alternative_reading
lexical_decisions:
- source_word: הַצַּדִּיק
  english_pob_choice: the righteous man
  chosen_spanish: el justo
  alternatives_spanish:
  - el hombre justo
  - el recto
  lexicon: HALOT
  rationale: El hebreo usa un adjetivo substantivado en singular. En español, «el justo» reproduce con naturalidad esa substantivación y conserva la fuerza representativa del singular masculino sin añadir «hombre» de manera innecesaria.
- source_word: אָבָד
  english_pob_choice: perishes
  chosen_spanish: perece
  alternatives_spanish:
  - ha perecido
  - se pierde
  - desaparece
  lexicon: HALOT
  rationale: El perfecto qal puede expresar perecer o desaparecer. «Perece» mantiene el tono profético de lamentación y evita especificar más de lo que el hebreo exige.
- source_word: שָׂם עַל לֵב
  english_pob_choice: takes it to heart
  chosen_spanish: lo toma en cuenta
  alternatives_spanish:
  - lo toma a pecho
  - lo considera
  - lo guarda en el corazón
  lexicon: HALOT
  rationale: El modismo apunta a prestar atención interior y seriamente. «Lo toma en cuenta» es un equivalente idiomático natural en español; el pronombre neutro «lo» recoge el hecho de la pérdida o la situación lamentada.
- source_word: אַנְשֵׁי חֶסֶד
  english_pob_choice: men of faithful love
  chosen_spanish: los hombres de amor leal
  alternatives_spanish:
  - hombres misericordiosos
  - hombres fieles
  - hombres de bondad
  lexicon: HALOT
  rationale: חֶסֶד incluye lealtad pactual, bondad y amor fiel. «Amor leal» intenta conservar esa densidad semántica sin reducirla a simple «misericordia». Se conserva el plural masculino por la forma hebrea y la política de precisión de género.
- source_word: נֶאֱסָפִים / נֶאֱסַף
  english_pob_choice: are gathered away / is gathered away
  chosen_spanish: son llevados / es llevado
  alternatives_spanish:
  - son recogidos / es recogido
  - son arrebatados / es arrebatado
  - son reunidos
  lexicon: HALOT
  rationale: El nifal de אסף puede funcionar como eufemismo de muerte o retiro por muerte. «Son llevados» / «es llevado» comunica remoción sin hacer demasiado explícita la metáfora, y permite la repetición entre el plural y el singular.
- source_word: בְּאֵין מֵבִין
  english_pob_choice: with no one understanding
  chosen_spanish: y nadie entiende
  alternatives_spanish:
  - sin que nadie entienda
  - y nadie comprende
  - sin que nadie lo discierna
  lexicon: HALOT
  rationale: La construcción expresa una circunstancia acompañante. «Y nadie entiende» es fluido en español y conserva la idea de ausencia de discernimiento en el momento del hecho.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que nadie entiende. «Que» funciona naturalmente en español para una cláusula explicativa dependiente.
- source_word: מִפְּנֵי הָרָעָה
  english_pob_choice: because of evil
  chosen_spanish: a causa del mal
  alternatives_spanish:
  - por causa del mal
  - por el mal
  - a causa de la calamidad
  lexicon: HALOT
  rationale: La preposición con «rostro/presencia» puede indicar motivo o alejamiento ante un mal que se aproxima. «A causa del mal» mantiene abierta la amplitud semántica de רָעָה entre mal moral y mal adverso, como en el inglés auditado.
theological_decisions:
- issue: Cómo reflejar la tensión de רָעָה en Isaías 57:1
  english_pob_reading: evil, with the note that calamity/disaster is an alternative reading
  chosen_spanish_reading: el mal
  alternative_spanish_readings:
  - la calamidad
  - el desastre
  - el mal que viene
  rationale: El hebreo admite tanto mal moral como desastre/calamidad. «El mal» conserva esa amplitud sin resolver artificialmente la tensión; la nota puede explicitar la posibilidad de «calamidad» o «desastre» como lectura alternativa.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión léxica y teológica cuando el hebreo la permite'
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión auditada del inglés POB, que ajustó la relación de מִפְּנֵי הָרָעָה a «because of evil». En español se optó por «a causa del mal» para reflejar esa relación causal y conservar la ambigüedad semántica de רָעָה entre mal moral y calamidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evita «Cristo»/«Mesías» porque no aplica al pasaje.
  - Se conserva un registro bíblico sobrio y público, sin arcaísmos innecesarios.
  - «Llevados» reproduce el campo semántico de ser recogidos/retirados sin sobreinterpretar la imagen.
