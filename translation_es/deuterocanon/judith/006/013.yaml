review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del griego: descenso, atadura, abandono de Ajior en la base del monte y regreso al superior humano. Sin embargo, «después de bajar debajo del monte» suena torpe y puede sugerir estar físicamente bajo el monte, mientras que ὑποδύσαντες ὑποκάτω τοῦ ὄρους expresa bajar a la parte inferior del monte. Además, la nota [a] está mal anclada: la alternativa léxica documentada corresponde a ἐρριμμένον, no a «monte».'
  spanish_quality_summary: El español es generalmente claro, pero «bajar debajo del monte» no es idiomático; «bajar al pie del monte» o «bajar a la parte baja del monte» sería natural. También conviene anclar la nota en «tendido», donde realmente aplica la alternativa «arrojado abajo/echado abajo». El resto fluye bien y mantiene un registro digno y legible.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Su señor» para κύριος humano es aceptable en este contexto. «Ajior» es una transliteración española defendible. El problema principal no es glosarial sino sintáctico y de colocación de la nota.
  issues:
  - severity: medium
    issue: «después de bajar debajo del monte» es poco natural y potencialmente equívoco
    rationale: La combinación de «bajar» + «debajo del monte» suena calcada y puede insinuar una ubicación subterránea o bajo un saliente, en vez de descender a la parte baja del monte, que es la idea del griego.
  - severity: medium
    issue: La nota [a] está anclada en «monte» pero comenta ἐρριμμένον
    rationale: El English POB y las decisiones léxicas muestran que la nota alternativa corresponde al participio «thrown down/cast down», no a la expresión topográfica del monte. Debe moverse al término español que traduzca esa idea.
  - severity: low
    issue: El texto pierde ligeramente la relación entre «below the mountain» y «at the foot of the mountain»
    rationale: Usar «debajo del monte» seguido de «al pie del monte» introduce una diferencia en español que no ayuda. Una primera frase más idiomática puede conservar mejor la geografía narrativa sin redundancia extraña.
  revised_spanish_text: Y después de bajar al pie del monte, ataron a Ajior y lo dejaron tendido[a] al pie del monte, y se fueron a su señor.
  revised_footnotes:
  - marker: a
    text: O «arrojado abajo». El participio griego subraya que Ajior quedó en la condición de haber sido echado abajo.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «bajar debajo del monte» por «bajar al pie del monte» para expresar de manera idiomática la bajada a la parte inferior del monte. Se mueve la nota al término «tendido», porque la alternativa documentada corresponde a ἐρριμμένον, no a «monte». No se requieren cambios doctrinales ni una adjudicación adicional.
