review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura de súplica del hebreo: dos prohibiciones/peticiones paralelas («No me…», «no estés…»), con vocativo doble «Yahvé, mi Dios» y el sentido de distancia en la segunda cola. Sin embargo, la nota al pie no preserva fielmente la lógica del expediente inglés: allí la nota existe para señalar una lectura alternativa histórica («LORD») frente al texto principal «Yahweh». En español, como el texto principal ya usa «Yahvé», la nota actual no aporta una alternativa real y desinforma sobre el motivo de la nota.'
  spanish_quality_summary: El español es claro, natural y digno. «No me abandones… no estés lejos de mí» es plenamente legible y fiel. La puntuación y el registro son adecuados. El único problema práctico es la nota innecesaria/defectuosa anclada en «abandones[a]», que además está colocada en una palabra distinta del nombre divino al que pretende comentar.
  glossary_alignment: La decisión principal «Yahvé» para יהוה está bien alineada con la política del proyecto en español. «mi Dios» para אֱלֹהַי y «lejos de mí» para מִמֶּנִי / תִּרְחַק también están bien. «abandones» es aceptable para עזב, aunque «desampares» sería más tradicional; no hace falta cambiarlo.
  issues:
  - severity: medium
    issue: La nota al pie no corresponde al contenido ni al propósito del expediente auditado.
    rationale: La nota inglesa documenta la diferencia entre «Yahweh» y la convención anterior «LORD». La nota española actual dice simplemente que el estándar del proyecto usa «Yahvé», lo cual no es una lectura alternativa y no justifica una nota.
  - severity: medium
    issue: El anclaje de la nota está en «abandones[a]» en vez de en «Yahvé».
    rationale: Si se mantuviera una nota sobre el nombre divino, el marcador debería aparecer junto a «Yahvé», no junto al verbo «abandones». Tal como está, induce confusión sobre qué elemento comenta la nota.
  - severity: low
    issue: La nota es prescindible en español dado el texto principal adoptado.
    rationale: Como el estándar español ya usa «Yahvé» en el cuerpo del texto, no hay necesidad de una nota si no se documenta una alternativa significativa para este registro.
  revised_spanish_text: No me abandones, Yahvé, mi Dios; no estés lejos de mí.
  revision_rationale: 'Se aprueba el texto base con una reparación menor: eliminar la nota al pie y su marcador, porque no preservan adecuadamente la razón documentada en el expediente inglés y además están mal anclados. El texto español mismo es fiel, natural y alineado con la terminología del proyecto.'
