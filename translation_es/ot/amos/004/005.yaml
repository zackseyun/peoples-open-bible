    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de Israel».'
    reason: lexical_alternative
  revision_rationale: Se hizo una reparación mínima para la fórmula נְאֻם אֲדֹנָי יְהוִה, cambiando «Yahvé Dios» por «el Señor Yahvé», que en español conserva ambos títulos, respeta la política de usar «Yahvé» para יְהוָה y suena más natural y fiel al orden del hebreo. Se mantuvo el resto del verso porque refleja adecuadamente el sentido fuente y las decisiones auditadas.
