translation:
  language: es
  text: Tus padres descendieron a Egipto con setenta personas[a][b], y ahora Yahvé tu Dios te ha multiplicado hasta ser tan numeroso como las estrellas del cielo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con setenta almas». נֶפֶשׁ («alma/persona») aquí funciona como un modismo de conteo para personas.
    reason: lexical_alternative
  - marker: b
    text: O «tus antepasados». El hebreo dice específicamente «tus padres».
    reason: lexical_alternative
  - marker: c
    text: O «como las estrellas de los cielos» o «como las estrellas del cielo». El sentido es la abundancia numérica.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשִׁבְעִים נֶפֶשׁ
  english_pob_choice: with seventy persons
  chosen_spanish: con setenta personas
  alternatives_spanish:
  - con setenta almas
  - en setenta personas
  lexicon: HALOT
  rationale: El hebreo usa נֶפֶשׁ como término de conteo para personas. En español, «personas» conserva el valor idiomático sin introducir el sentido moderno e impreciso de «almas». Se mantiene «con» para reflejar la construcción preposicional.
- source_word: יָרְדוּ
  english_pob_choice: went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - fueron hacia abajo
  lexicon: HALOT
  rationale: El verbo ירד expresa descenso; en este contexto de viaje a Egipto, «descendieron» es fiel y natural, y conserva el matiz direccional tradicional del relato.
- source_word: אֲבֹתֶיךָ
  english_pob_choice: your fathers
  chosen_spanish: tus padres
  alternatives_spanish:
  - tus antepasados
  - tus padres varones
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tus padres» en masculino plural. En español, «padres» comunica de forma natural el referente patriarcal de los antepasados sin neutralizar el género que el hebreo marca.
- source_word: מִצְרָיְמָה
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  - a tierra de Egipto
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia Egipto. En español, «a Egipto» es la forma más natural y directa, y evita una expansión innecesaria.
- source_word: וְעַתָּה
  english_pob_choice: and now
  chosen_spanish: y ahora
  alternatives_spanish:
  - pero ahora
  - ahora
  lexicon: HALOT
  rationale: Se conserva la coordinación hebrea con «y»; no se fuerza un matiz adversativo que el texto no expresa de manera explícita.
- source_word: שָׂמְךָ
  english_pob_choice: has made you
  chosen_spanish: te ha hecho
  alternatives_spanish:
  - te ha puesto
  - te ha colocado
  lexicon: HALOT
  rationale: Aunque el verbo בסיסamente significa «poner/colocar», aquí el contexto es de resultado y multiplicación. «Te ha hecho» expresa mejor en español el estado producido por Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el valor editorial del proyecto para el Tetragrámaton: «Yahvé». Es la forma recomendada para preservar el nombre divino en español, en lugar de una sustitución por título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La construcción posesiva directa se traduce de modo simple y claro con «tu Dios», que corresponde al hebreo sin añadidos interpretativos.
- source_word: כְּכוֹכְבֵי הַשָּׁמַיִם לָרֹב
  english_pob_choice: as numerous as the stars of the heavens
  chosen_spanish: tan numeroso como las estrellas de los cielos
  alternatives_spanish:
  - como las estrellas del cielo en multitud
  - tan abundante como las estrellas del cielo
  lexicon: HALOT
  rationale: El texto compara la multiplicación del pueblo con las estrellas por abundancia numérica. «Tan numeroso como» expresa el valor cuantitativo del símil y mantiene la imagen de «las estrellas de los cielos». Se conserva el plural «cielos» porque refleja el hebreo שָׁמַיִם.
- source_word: לָרֹב
  english_pob_choice: as numerous
  chosen_spanish: tan numeroso
  alternatives_spanish:
  - en abundancia
  - para multitud
  lexicon: HALOT
  rationale: La expresión final refuerza la idea de abundancia. En español, «tan numeroso» integra naturalmente la comparación y transmite la fuerza numérica del hebreo sin sobreexplicar.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El versículo contiene el Tetragrámaton de forma explícita. Siguiendo la práctica del proyecto en español, se usa «Yahvé» para preservar el nombre propio del Dios del pacto, en vez de sustituirlo por un título como «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Mantenimiento del carácter masculino de אֲבֹתֶיךָ
  english_pob_reading: your fathers
  chosen_spanish_reading: tus padres
  alternative_spanish_readings:
  - tus antepasados
  - tus padres varones
  rationale: El hebreo marca un plural masculino específico. En consonancia con la política de precisión de género del proyecto, se conserva esa forma en la traducción principal en vez de generalizarla a un término neutro.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'El texto base y la revisión más reciente coinciden en que no hacía falta corregir el contenido: se mantiene el sentido del hebreo, la terminología del nombre divino y la comparación de abundancia. La única adaptación fue formular el español de manera fluida y publicable, sin perder las distinciones auditadas del original.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto en español.
  - Se conserva el plural de «cielos» para reflejar el hebreo שָׁמַיִם.
  - Se traduce נֶפֶשׁ como «personas» en el texto principal, y se deja la alternativa «almas» en nota por la ambigüedad lexical.
  - Se conserva el referente masculino explícito de אֲבֹתֶיךָ en el texto principal.
  - La comparación con las estrellas se expresa como abundancia numérica, no solo como semejanza visual.
