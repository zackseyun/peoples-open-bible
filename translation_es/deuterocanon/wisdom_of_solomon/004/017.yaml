review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: verán el fin del sabio, no comprenderán el propósito divino respecto de él, ni el propósito de la seguridad que Dios le dio. También conserva correctamente la amplitud de τελευτή con «fin» y la indeterminación de ἠσφαλίσατο. Sin embargo, no sigue la terminología por defecto del proyecto para κύριος, que aquí debe revisarse a «Yahvé» en el texto principal salvo razón de excepción suficientemente fuerte, la cual no queda justificada por la evidencia fuente.'
  spanish_quality_summary: 'El español es claro y de buen registro. «Porque verán…» suena natural, y la sintaxis es fiel. No obstante, «lo hizo seguro» es comprensible pero algo poco idiomático en español bíblico actual; «lo puso a salvo» sería más natural, pero estrecha un poco el sentido. Dado que el inglés auditado preserva la amplitud de «made him secure», puede mantenerse «lo hizo seguro» por fidelidad semántica, aunque con ligera rigidez estilística. El ajuste imprescindible es terminológico: «el Señor» -> «Yahvé».'
  glossary_alignment: Alinea bien con «fin», «sabio», «no entenderán», «planeó», «acerca de él». No alinea con la directriz principal del proyecto para יהוה / YHWH -> «Yahvé» en el texto principal; el propio borrador reconoce la excepción, pero la justificación no es suficiente para apartarse del estándar en este contexto de κύριος con referencia divina.
  issues:
  - severity: high
    issue: Uso de «el Señor» en lugar de «Yahvé»
    rationale: La guía del proyecto exige «Yahvé» en el texto principal para el nombre divino / κύριος con referencia al Dios de Israel, salvo excepción documentada fuerte. Aquí no hay una razón textual o doctrinal suficientemente específica para mantener «el Señor».
  - severity: low
    issue: «Lo hizo seguro» suena algo poco idiomático
    rationale: Es fiel a la causalidad implícita de ἠσφαλίσατο, pero en español resulta algo tieso. Aun así, no requiere cambio obligatorio porque preserva mejor la amplitud semántica que alternativas más naturales pero más estrechas.
  revised_spanish_text: Porque verán el fin del sabio[a], y no entenderán lo que Yahvé planeó acerca de él[b], ni con qué propósito lo hizo seguro.
  revised_footnotes:
  - marker: a
    text: O «la muerte del sabio». El griego τελευτή puede significar «fin» o «muerte»; se conserva «fin» en el texto principal para mantener el alcance más amplio del contexto.
    reason: lexical_alternative
  - marker: b
    text: O «para qué fin Yahvé lo mantuvo a salvo» / «lo protegió». El griego deja implícita la forma precisa de esa seguridad.
    reason: lexical_alternative
  revision_rationale: 'Se revisa únicamente la referencia divina para ajustarla a la terminología por defecto del proyecto: «Yahvé» en lugar de «el Señor». Se conservan «fin» y «lo hizo seguro» porque reflejan adecuadamente las decisiones léxicas auditadas del griego y del POB inglés.'
