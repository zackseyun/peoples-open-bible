translation:
  language: es
  text: Había seis escalones al trono[a], y un escabel de oro unido al trono, y apoyabrazos a este lado y al otro, junto al asiento, y dos leones de pie junto a los apoyabrazos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «una rampa/escalinata de oro unida al trono». La palabra hebrea כבשׁ puede entenderse de otra manera, aunque «escabel» encaja bien en el contexto del trono.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲלוֹת
  english_pob_choice: steps
  chosen_spanish: escalones
  alternatives_spanish:
  - peldaños
  - gradas
  lexicon: HALOT
  rationale: En el contexto de un trono, el plural se refiere a la subida física hacia el asiento real. «Escalones» comunica con naturalidad la idea de ascenso sin perder el detalle arquitectónico.
- source_word: כֶּבֶשׁ
  english_pob_choice: footstool
  chosen_spanish: escabel
  alternatives_spanish:
  - reposapiés
  - rampa
  - escalera
  lexicon: HALOT
  rationale: El audit trail en inglés opta por «footstool» por el contexto del trono. En español, «escabel» conserva la idea de soporte asociado al trono y evita decidir en exceso por «rampa» o «escalera», que serían más interpretativos en este pasaje.
- source_word: מָאֳחָזִים
  english_pob_choice: attached
  chosen_spanish: unido
  alternatives_spanish:
  - sujeto
  - fijado
  - adherido
  lexicon: HALOT
  rationale: El participio pasivo expresa que el objeto de oro estaba asegurado al trono. «Unido» es claro y suficientemente literal para el detalle de fabricación.
- source_word: יָדוֹת
  english_pob_choice: armrests
  chosen_spanish: apoyabrazos
  alternatives_spanish:
  - brazos
  - soportes laterales
  - descansabrazos
  lexicon: HALOT
  rationale: En mobiliario, el sentido funcional es el de piezas donde descansan los brazos. «Apoyabrazos» transmite bien la función sin sonar arcaico.
- source_word: מִזֶּה וּמִזֶּה
  english_pob_choice: on this side and on that
  chosen_spanish: a este lado y a aquel
  alternatives_spanish:
  - a ambos lados
  - a un lado y al otro
  lexicon: HALOT
  rationale: La fórmula marca disposición bilateral. «A este lado y a aquel» sigue de cerca la estructura hebrea y conserva el paralelismo descriptivo.
- source_word: מְקוֹם הַשָּׁבֶת
  english_pob_choice: beside the seat
  chosen_spanish: junto al asiento
  alternatives_spanish:
  - al lado del asiento
  - junto al lugar para sentarse
  lexicon: HALOT
  rationale: La expresión alude al lugar del asiento del trono. «Asiento» es natural en español y mantiene la referencia al sitio de sentarse sin sobreexplicar.
- source_word: אֲרָיוֹת
  english_pob_choice: lions
  chosen_spanish: leones
  alternatives_spanish:
  - leones esculpidos
  - leones tallados
  lexicon: HALOT
  rationale: El hebreo dice simplemente «leones»; no conviene añadir «esculpidos» o «tallados» sin que el texto lo exprese explícitamente. El contexto arquitectónico ya sugiere su carácter decorativo.
- source_word: עֹמְדִים
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - erguidos
  - estando de pie
  lexicon: HALOT
  rationale: El participio describe posición/u ubicación estable. «De pie» es la forma más natural en español y conserva la imagen de los leones colocados verticalmente.
- source_word: אֵצֶל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - cerca de
  lexicon: HALOT
  rationale: Indica proximidad inmediata. «Junto a» es breve, clara y corresponde bien al estilo descriptivo del versículo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo de WLC y el audit trail en inglés. Se conservó la misma tensión lexical documentada para כֶּבֶשׁ: en lugar de fijar sin más «rampa» o «escalera», se eligió un equivalente español compatible con la función de apoyo asociada al trono, y se mantuvo una nota con la alternativa posible. No hay cambios relevantes en la evaluación de revisión inglesa más reciente (sin modificaciones).'
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca aquí, sino como convención general del proyecto cuando corresponda; este versículo no contiene el Tetragrámaton.
  - Se mantuvo el orden descriptivo del original para preservar la imaginería del trono.
  - No se explicitó «esculpidos» para los leones, siguiendo la sobriedad del hebreo.
  - La nota de pie marca la ambigüedad de כֶּבֶשׁ sin resolverla de forma excesiva.
