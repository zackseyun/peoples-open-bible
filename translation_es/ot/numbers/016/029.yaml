- from: Si estos hombres mueren la muerte de todos los hombres[a], y si la suerte de todos los hombres cae sobre ellos, entonces Yahvé no me ha enviado.
  to: Si estos hombres mueren como muere toda la humanidad, y la suerte[a] de toda la humanidad les sobreviene, entonces Yahvé no me ha enviado.
