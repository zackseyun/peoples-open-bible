translation:
  language: es
  text: Porque he aquí[a] que Yahvé manda, y la casa grande será hecha fragmentos, y la casa pequeña, pedazos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y golpeará la casa grande en fragmentos, y la casa pequeña en fisuras o pedazos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o consecuencia del contexto anterior; «Porque» comunica bien la conexión discursiva sin forzar una paráfrasis.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - ve
  lexicon: HALOT
  rationale: Conserva el tono profético de atención inmediata. «He aquí» es la forma más transparente y tradicional en español bíblico sin ocultar el énfasis del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Sigue el estándar del proyecto para el Nombre divino. «Yahvé» preserva la referencia al Tetragrámaton sin sustituirlo por una convención de máscara.
- source_word: מְצַוֶּה
  english_pob_choice: commands
  chosen_spanish: manda
  alternatives_spanish:
  - ordena
  - está mandando
  lexicon: HALOT
  rationale: El participio expresa acción autoritativa en curso o inminente. «Manda» es natural en español y mantiene la fuerza de decreto divino.
- source_word: וְהִכָּה
  english_pob_choice: will be struck
  chosen_spanish: será hecha pedazos
  alternatives_spanish:
  - será golpeada
  - será quebrada
  lexicon: HALOT
  rationale: El hebreo deja implícito el agente inmediato tras el mandato de Yahvé, pero el efecto es destrucción violenta. «Será hecha pedazos» preserva el resultado pasivo y encaja con el sustantivo siguiente «fragmentos/pedazos».
- source_word: הַבַּיִת הַגָּדוֹל
  english_pob_choice: the great house
  chosen_spanish: la casa grande
  alternatives_spanish:
  - la gran casa
  - la casa importante
  lexicon: HALOT
  rationale: Se conserva «casa» para no diluir la imagen concreta. «Grande» mantiene tanto tamaño como posible prominencia social, como en el audit trail inglés.
- source_word: רְסִיסִים
  english_pob_choice: fragments
  chosen_spanish: pedazos
  alternatives_spanish:
  - fragmentos
  - astillas
  lexicon: HALOT
  rationale: El término sugiere ruptura violenta en múltiples partes. «Pedazos» es claro y vigoroso en español; mantiene la idea de desmembramiento sin sonar técnico.
- source_word: וְהַבַּיִת הַקָּטֹן
  english_pob_choice: the small house
  chosen_spanish: la casa pequeña
  alternatives_spanish:
  - la casa menor
  - la casa chica
  lexicon: HALOT
  rationale: Mantiene el paralelismo con «la casa grande». «Pequeña» es la opción más directa y natural en español bíblico contemporáneo.
- source_word: בְּקִעִים
  english_pob_choice: pieces
  chosen_spanish: en fragmentos
  alternatives_spanish:
  - en hendiduras
  - en fisuras
  lexicon: HALOT
  rationale: El hebreo puede referirse a fisuras o partes quebradas. En este contexto de juicio, «en fragmentos» preserva la imagen de ruptura y equilibra el paralelismo con la primera cola.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Nombre propio divino. La forma «Yahvé» mantiene la decisión terminológica del proyecto y evita ocultar el Nombre bajo un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Implicit agent in וְהִכָּה
  english_pob_reading: the houses are rendered as receiving the strike ('will be struck')
  chosen_spanish_reading: las casas reciben el golpe mediante una pasiva impersonal ('será hecha pedazos')
  alternative_spanish_readings:
  - Yahvé golpeará la casa grande ...
  - uno golpeará la casa grande ...
  rationale: El hebreo no explicita el agente inmediato en la forma verbal; la pasiva en español conserva ese rasgo y deja que el contexto siga atribuyendo el juicio a Yahvé.
  doctrine_reference: 'DOCTRINE.md: Syntax and agency in prophetic judgment language'
- issue: Force of the destruction imagery
  english_pob_reading: fragments / pieces
  chosen_spanish_reading: pedazos / fragmentos
  alternative_spanish_readings:
  - astillas / hendiduras
  - trozos / grietas
  rationale: Ambos sustantivos hebreos expresan ruptura intensa, pero con matices distintos. La combinación elegida conserva el paralelismo y la tensión semántica entre desmenuzamiento y fisuras.
  doctrine_reference: 'DOCTRINE.md: Poetic parallelism and concrete destruction imagery'
translation_notes:
  revision_awareness: No se detectaron revisiones posteriores que exigieran cambios respecto del texto fuente y del audit trail inglés; se siguió el último pasaje sin alteraciones sustantivas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma del Nombre divino, conforme al estándar del proyecto.
  - Se preservó la imagen concreta de «casa» en ambas cláusulas para respetar el paralelismo hebreo.
  - La primera cola usa una pasiva resultativa; la nota conserva la alternativa más literal con agente explícito implícito.
  - «Fragmentos» y «pedazos» se eligieron para reflejar la violencia poética del hebreo sin suavizarla.
