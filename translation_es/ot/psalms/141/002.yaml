translation:
  language: es
  text: Que mi oración sea afirmada[a] delante de ti como incienso, el alzar de mis manos como la ofrenda de la tarde[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sea puesta en orden» o «sea preparada» delante de ti; el hebreo expresa que la oración quede firmemente colocada en la presencia de Dios.
    reason: lexical_alternative
  - marker: b
    text: «Ofrenda de la tarde» traduce el sentido general del hebreo; más específicamente, el término puede denotar una ofrenda vegetal o de cereal.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּכּוֹן
  english_pob_choice: be established
  chosen_spanish: sea establecida
  alternatives_spanish:
  - sea puesta en orden
  - sea preparada
  - sea aceptada
  lexicon: HALOT
  rationale: El hebreo expresa un deseo/jussivo de que la oración quede firme o establecida delante de Dios. «Sea establecida» conserva la formalidad y la idea de fijación sin reducirlo a una mera aceptación.
- source_word: תְּפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  lexicon: HALOT
  rationale: Es el equivalente directo y natural del sustantivo con sufijo de primera persona singular.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume
  - ofrenda de incienso
  lexicon: HALOT
  rationale: En contexto cultual, el término designa el incienso quemado ante Dios. «Incienso» mantiene la imagen sacrificial explícita.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  lexicon: HALOT
  rationale: La expresión hebrea es relacional y espacial; «delante de ti» reproduce bien el sentido y suena natural en español.
- source_word: מַשְׂאַת
  english_pob_choice: the lifting up of
  chosen_spanish: el alzar de
  alternatives_spanish:
  - la elevación de
  - el levantamiento de
  lexicon: HALOT
  rationale: El sustantivo derivado de נשׂא apunta al acto de levantar. «El alzar de» preserva la imagen corporal de la oración con las manos levantadas.
- source_word: כַּפַּי
  english_pob_choice: my hands
  chosen_spanish: mis manos
  alternatives_spanish:
  - mis palmas
  lexicon: HALOT
  rationale: Aunque כף puede referirse a la palma, en esta locución el español natural es «mis manos», como gesto de oración.
- source_word: מִנְחַת עָרֶב
  english_pob_choice: the evening offering
  chosen_spanish: la ofrenda de la tarde
  alternatives_spanish:
  - la ofrenda vespertina
  - la ofrenda de la tarde, es decir, la ofrenda de cereal
  lexicon: HALOT
  rationale: «Ofrenda de la tarde» conserva el sentido temporal del hebreo y el valor cultual sin imponer un tecnicismo innecesario. Se mantiene la posibilidad, documentada por el inglés POB, de la matiz de ofrenda cereal/grano.
theological_decisions:
- issue: Imagen cultual aplicada a la oración
  english_pob_reading: The verse compares prayer and uplifted hands to temple offerings without collapsing the metaphor into a doctrinal claim about replacement of sacrifice.
  chosen_spanish_reading: El versículo compara la oración y el alzar de las manos con ofrendas del templo, sin convertir la metáfora en una afirmación doctrinal de sustitución del sacrificio.
  alternative_spanish_readings:
  - La oración como equivalente espiritual del sacrificio
  - La oración solo como imagen poética sin resonancia cultual
  rationale: El hebreo usa lenguaje sacrificial explícito («incienso», «ofrenda de la tarde») en forma comparativa. La traducción conserva la resonancia litúrgica sin añadir una teología de reemplazo que el verso no formula.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El inglés POB fue revisado de «like» a «as» para una comparación más directa y formal; en español se reflejó con «como». También se integró la alternativa léxica sobre la ofrenda vespertina sin sobrecargar el texto principal.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el Tetragrámaton explícito, por lo que no se introdujo.
  - Se mantuvo el paralelismo formal del verso y la imaginería cultual sin volverla paráfrasis.
  - «Incienso» y «ofrenda de la tarde» preservan el campo ritual del original hebreo.
  - La comparación se expresó con «como», acorde con la revisión auditada del inglés POB.
