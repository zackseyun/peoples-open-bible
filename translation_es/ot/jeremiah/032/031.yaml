translation:
  language: es
  text: Porque esta ciudad ha sido para mí motivo de mi ira y de mi furor[a], desde el día en que la edificaron hasta este día, para que yo la quitara de delante de mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «sobre mi ira y sobre mi furor»; es un giro idiomático que significa que la ciudad provocó u ocasionó la ira de Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de mi presencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la declaración de juicio anterior; en español, «porque» expresa con naturalidad la relación explicativa sin perder la fuerza causal.
- source_word: עַל אַפִּי וְעַל חֲמָתִי
  english_pob_choice: a cause of my anger and my wrath
  chosen_spanish: motivo de mi ira y de mi furor
  alternatives_spanish:
  - causa de mi ira y de mi furor
  - sobre mi ira y sobre mi furor
  lexicon: HALOT
  rationale: Se conserva el sentido idiomático de provocación o causa, evitando una traducción demasiado literal de la preposición. «Ira» y «furor» mantienen el paralelo intensivo de los dos términos hebreos.
- source_word: הָיְתָה לִּי
  english_pob_choice: has been to me
  chosen_spanish: ha sido para mí
  alternatives_spanish:
  - ha estado para mí
  - me ha sido
  lexicon: HALOT
  rationale: El perfecto expresa una situación continua desde el origen de la ciudad hasta el presente; el presente perfecto español comunica bien esa duración.
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - la ciudad esta
  - la ciudad, ésta
  lexicon: HALOT
  rationale: Correspondencia directa y natural del demostrativo hebreo.
- source_word: לְמִן הַיּוֹם אֲשֶׁר בָּנוּ אוֹתָהּ
  english_pob_choice: from the day they built it
  chosen_spanish: desde el día en que la edificaron
  alternatives_spanish:
  - desde el día que la edificaron
  - desde el día que la construyeron
  lexicon: HALOT
  rationale: «Edificaron» mantiene el registro de fundación urbana y refleja el verbo con dignidad; el sujeto indefinido en plural se conserva con «la edificaron».
- source_word: וְעַד הַיּוֹם הַזֶּה
  english_pob_choice: even to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - y hasta este día
  - aun hasta este día
  lexicon: HALOT
  rationale: «Hasta este día» reproduce con claridad el alcance temporal; el valor enfático de continuidad queda suficientemente expresado en español sin añadir partículas innecesarias.
- source_word: לַהֲסִירָהּ
  english_pob_choice: so that I should remove it
  chosen_spanish: para que yo la quitara
  alternatives_spanish:
  - para removerla
  - para sacarla
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad o resultado; «para que yo la quitara» conserva ese matiz y evita sobreinterpretar la intención. «Quitar» es idiomático y suficientemente fuerte en español.
- source_word: מֵעַל פָּנָי
  english_pob_choice: from before my face
  chosen_spanish: de delante de mi rostro
  alternatives_spanish:
  - de mi presencia
  - de ante mi rostro
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal y relacional del hebreo. «De delante de mi rostro» es transparente y evita neutralizar la expresión en un abstracto como «presencia».
theological_decisions:
- issue: Lenguaje antropomórfico de ira y presencia divina
  english_pob_reading: Retain the anthropomorphic expressions in idiomatic but transparent English ('anger,' 'wrath,' 'before my face') rather than flattening them into abstract theological language.
  chosen_spanish_reading: Conservar las expresiones antropomórficas («ira», «furor», «de delante de mi rostro») en español claro y reverente, sin convertirlas en lenguaje abstracto.
  alternative_spanish_readings:
  - provocación contra mí... de mi presencia
  - motivo de indignación... de mi presencia
  rationale: El hebreo presenta la reacción divina y la expulsión como imágenes corporales y relacionales. La versión española debe preservar esa tensión, porque forma parte del contenido teológico y literario del texto.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La fuente inglesa y el texto hebreo están sustancialmente de acuerdo; el ajuste principal en español consiste en conservar la imagen idiomática de עַל אַפִּי וְעַל חֲמָתִי sin sonar forzado, y en mantener la expresión espacial/relacional de מֵעַל פָּנָי con una fórmula transparente para el lector hispano.
  spanish_consistency_notes:
  - Se usa «Yahvé» en la serie editorial general cuando corresponde, pero en este versículo no aparece el tetragrámaton explícito.
  - «Ira» y «furor» preservan el paralelismo semántico sin introducir términos doctrinalmente más técnicos como «indignación».
  - «De delante de mi rostro» mantiene la concreción del original mejor que una simple «presencia», aunque se ofrece la alternativa en nota.
  - El tono es formal y bíblico, pero evita arcaísmos innecesarios para lectura pública contemporánea.
