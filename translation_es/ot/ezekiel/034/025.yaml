translation:
  language: es
  text: Haré un pacto de paz[a] con ellos, y quitaré de la tierra a los animales salvajes peligrosos[b], para que habiten seguros en el desierto y duerman en los bosques.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "un pacto de bienestar". "Paz" aquí puede incluir bienestar, plenitud y seguridad, no solo ausencia de conflicto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "haré cesar de la tierra a los animales salvajes peligrosos". El hebreo permite la idea de hacer cesar su presencia, además de quitarlos del lugar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָרַתִּי
  english_pob_choice: I will make
  chosen_spanish: haré
  alternatives_spanish:
  - haré un pacto
  - estableceré
  lexicon: HALOT
  rationale: El hebreo usa el idiomático 'cortar un pacto'. En español, para mantener naturalidad sin perder el acto de concertar el pacto, 'haré' funciona bien con 'un pacto de paz'. 'Estableceré' también es posible, pero suena menos directo para esta fórmula.
- source_word: בְּרִית שָׁלוֹם
  english_pob_choice: a covenant of peace
  chosen_spanish: un pacto de paz
  alternatives_spanish:
  - un pacto de bienestar
  - un pacto de paz y seguridad
  lexicon: HALOT
  rationale: '''Pacto'' conserva el valor jurídico-relacional de בְּרִית. ''Paz'' mantiene la amplitud de שָׁלוֹם sin reducirla a ausencia de conflicto. En español, ''pacto de paz'' es claro y digno, aunque ''pacto de bienestar'' explicitaría parte de la amplitud.'
- source_word: הִשְׁבַּתִּי
  english_pob_choice: I will remove
  chosen_spanish: quitaré
  alternatives_spanish:
  - haré cesar
  - pondré fin a
  lexicon: HALOT
  rationale: 'El verbo causativo expresa hacer cesar o retirar. ''Quitaré'' comunica de forma natural el resultado en contexto: quitar del territorio a los animales peligrosos. ''Haré cesar'' preserva más literalmente la causación, pero suena más técnico.'
- source_word: חַיָּה רָעָה
  english_pob_choice: harmful wild animals
  chosen_spanish: animales salvajes dañinos
  alternatives_spanish:
  - bestias salvajes dañinas
  - animales feroces
  lexicon: HALOT
  rationale: '''Animales salvajes dañinos'' conserva el sentido concreto de animales silvestres que causan daño, evitando el arcaísmo de ''bestias'' y el posible matiz moral de ''malos''. ''Dañinos'' refleja bien רָעָה en este contexto.'
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: Aunque 'la tierra' puede sonar más amplio que 'el país', en este contexto profético-territorial funciona bien en español y preserva la referencia geográfica-covenantal sin especificarla indebidamente.
- source_word: יָשְׁבוּ
  english_pob_choice: they may dwell
  chosen_spanish: habitarán
  alternatives_spanish:
  - vivirán
  - morarán
  lexicon: HALOT
  rationale: El verbo expresa residencia estable. 'Habitarán' es digno y acorde al registro profético; además mantiene el tono de permanencia de 'dwell' sin sonar demasiado coloquial.
- source_word: בַמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto/estepa
  - en la soledad
  lexicon: HALOT
  rationale: Aunque מִדְבָּר puede abarcar desierto/estepa, 'desierto' es el equivalente más inmediato y natural en español. Se conserva la imagen sorprendente de seguridad en un lugar normalmente inhóspito.
- source_word: לָבֶטַח
  english_pob_choice: securely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - seguramente
  - en paz
  lexicon: HALOT
  rationale: La expresión adverbial denota seguridad y ausencia de temor. 'Con seguridad' suena natural con 'habitarán' y mantiene el valor de estabilidad protegida.
- source_word: יָשְׁנוּ
  english_pob_choice: sleep
  chosen_spanish: dormirán
  alternatives_spanish:
  - reposarán
  - se dormirán
  lexicon: HALOT
  rationale: El verbo significa dormir de manera directa. 'Dormirán' conserva la imagen vívida y simple del texto, sin suavizarla con un equivalente más general como 'reposarán'.
- source_word: בַּיְּעָרִים
  english_pob_choice: in the forests
  chosen_spanish: en los bosques
  alternatives_spanish:
  - en los montes arbolados
  - en las selvas
  lexicon: HALOT
  rationale: '''Bosques'' es el equivalente natural de יערים en español moderno y preserva la imagen de descanso seguro incluso entre árboles y zonas silvestres.'
theological_decisions:
- issue: Alcance teológico de 'pacto de paz'
  english_pob_reading: Retain the covenantal phrase without narrowing it to merely absence of war or expanding it into a later doctrinal system.
  chosen_spanish_reading: Mantener 'pacto de paz' sin reducirlo a simple ausencia de guerra ni ampliarlo en el texto principal a una formulación doctrinal posterior.
  alternative_spanish_readings:
  - pacto de bienestar
  - pacto de salvación total
  rationale: '''Pacto de paz'' conserva la carga bíblica de שָׁלוֹם como paz, bienestar, plenitud y seguridad, sin imponer una expansión interpretativa. La nota puede aclarar esa amplitud para el lector español.'
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: La revisión más reciente indica que el texto base en inglés no requirió cambios y que la revisión externa mostró alta concordancia; por eso el español sigue de cerca las decisiones léxicas ya auditadas sin introducir matices nuevos no respaldados por el hebreo.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo verbal del versículo con dos acciones divinas seguidas de dos acciones/resultados para el pueblo.
  - '''Pacto de paz'' se conservó como fórmula estable; no se sustituyó por ''alianza'' ni por ''convenio'' para mantener coherencia bíblica en español.'
  - '''Tierra'' se eligió para הָאָרֶץ siguiendo el uso territorial profético, y ''desierto''/''bosques'' reproducen el contraste espacial del hebreo.'
  - Se evitó 'señor' o 'SEÑOR' porque el versículo no contiene el nombre divino explícito en esta unidad textual.
