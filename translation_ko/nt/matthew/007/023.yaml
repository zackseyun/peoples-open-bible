  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ τότε ὁμολογήσω αὐτοῖς ὅτι Οὐδέποτε ἔγνων ὑμᾶς· ἀποχωρεῖτε ἀπ’ ἐμοῦ οἱ ἐργαζόμενοι τὴν ἀνομίαν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/007/023.yaml
  text: And then I will declare to them[a], ‘I never knew you; depart from me[b], you who practice lawlessness.’
  footnotes:
  - marker: a
    text: Or 'I never acknowledged you.' The Greek 'knew' can carry relational recognition, not merely intellectual awareness.
    reason: lexical_alternative
  - marker: b
    text: Or 'you who work iniquity' / 'you who do wickedness.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그때에 내가 그들에게 분명히 말하겠습니다. 『나는 너희를 도무지 알지 못한다. 불법을 행하는 자들아, 내게서 떠나가라.』
  philosophy: optimal-equivalence
