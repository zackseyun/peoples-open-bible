translation:
  language: es
  text: Así que murmuraron[a] en sus tiendas; no escucharon la voz[b] de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se quejaron» o «refunfuñaron». El verbo hebreo transmite un murmullo descontento.
    reason: lexical_alternative
  - marker: b
    text: O «no obedecieron la voz de Yahvé». El hebreo «escuchar la voz» también puede implicar hacer caso u obedecer.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּרָגְנוּ
  english_pob_choice: So they grumbled
  chosen_spanish: Así que murmuraron
  alternatives_spanish:
  - Así que se quejaron
  - Así que refunfuñaron
  lexicon: HALOT
  rationale: El verbo רגן expresa murmullo descontento o queja; «murmuraron» preserva ese matiz negativo sin sonar excesivamente coloquial. «Así que» refleja la secuencia narrativa del waw consecutivo de forma natural en español.
- source_word: בְאָהֳלֵיהֶם
  english_pob_choice: in their tents
  chosen_spanish: en sus tiendas
  alternatives_spanish:
  - en sus moradas
  - en sus campamentos
  lexicon: HALOT
  rationale: «Tienda» mantiene la imagen concreta del contexto del desierto y corresponde al sentido literal de אֹהֶל. En español bíblico, «tiendas» es claro y fiel.
- source_word: שָׁמְעוּ
  english_pob_choice: listen
  chosen_spanish: escucharon
  alternatives_spanish:
  - oyeron
  - obedecieron
  lexicon: HALOT
  rationale: Con בְּקוֹל, שׁמע puede implicar prestar atención o hacer caso. «Escucharon» conserva la imagen auditiva sin forzar de inmediato la idea interpretativa de obedecer.
- source_word: בְּקוֹל
  english_pob_choice: to the voice of
  chosen_spanish: la voz de
  alternatives_spanish:
  - el llamado de
  - la palabra de
  lexicon: HALOT
  rationale: La expresión idiomática se conserva literalmente como «la voz de», porque el hebreo usa precisamente la imagen de oír la voz. Esto deja abierta la implicación de obedecer sin sustituirla por una interpretación más explícita.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El nombre divino יְהוָה se vierte «Yahvé» conforme al estándar del proyecto para el Tetragrámaton, preservando el nombre personal de Dios en lugar de una sustitución titulada.
theological_decisions:
- issue: Si שָׁמְעוּ בְּקוֹל debe explicitar obediencia o mantener la imagen de escuchar
  english_pob_reading: The Hebrew idiom 'listen to the voice' can also carry the sense of heeding or obeying.
  chosen_spanish_reading: «escucharon la voz de Yahvé», dejando implícita la falta de obediencia.
  alternative_spanish_readings:
  - «obedecieron la voz de Yahvé»
  - «hicieron caso a la voz de Yahvé»
  rationale: La versión inglesa conserva la imagen auditiva y nota la posibilidad de obediencia implícita. En español, «escucharon» mantiene esa tensión sin cerrar el sentido sólo en obediencia, aunque el contexto claramente la implica.
  doctrine_reference: Principio POB de conservar imágenes idiomáticas cuando son auditivamente/teológicamente significativas
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: se preserva el matiz de רגן como murmuración descontenta, la imagen concreta de אָהֶל como «tiendas», la idiomática de שׁמע בְּקוֹל como escuchar la voz, y el Tetragrámaton se rinde como «Yahvé» según la doctrina del proyecto. No se introdujeron cambios textuales ni decisiones revisionadas en el paquete fuente.'
  spanish_consistency_notes:
  - 'Se mantiene la misma estrategia para el nombre divino: «Yahvé».'
  - «Murmuraron» es consistente con un registro bíblico moderno sin arcaísmo excesivo.
  - Se conserva la imagen hebrea de «la voz» en vez de sustituirla por «mandato», para no cerrar la ambigüedad del original.
