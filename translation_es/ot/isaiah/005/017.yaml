revisions:
- from: Entonces los corderos pastarán como en su pastizal, y los forasteros comerán entre las ruinas de los engordados.[a][b][c][d]
  to: Entonces los corderos[a] pastarán como en su pastizal[b], y los residentes temporales[d] comerán entre las ruinas de los bien alimentados[c].
  rationale: Se revisa principalmente para reflejar mejor גרים como «residentes temporales», en línea con la revisión inglesa a 'sojourners', eliminar el anglicismo de la nota, mejorar la naturalidad de מֵחִים con «los bien alimentados», y reubicar los marcadores de nota junto a las palabras correspondientes.
