translation:
  language: es
  text: 'Los cielos, por su altura[a], y la tierra, por su profundidad, y el corazón de los reyes: es inescrutable[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en altura» o «con respecto a la altura»; el hebreo usa una preposición de referencia.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «no hay escudriñamiento» o «no hay manera de descubrirlo»; el hebreo dice literalmente «no hay búsqueda/finding out».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: En español bíblico, «los cielos» conserva el plural hebreo y el registro elevado de «the heavens». «El cielo» perdería parte de esa amplitud y del paralelismo con «la tierra».
- source_word: לָרוּם
  english_pob_choice: for height
  chosen_spanish: para la altura
  alternatives_spanish:
  - en altura
  - con respecto a la altura
  - para la elevación
  lexicon: HALOT
  rationale: La partícula ל en este contexto indica referencia o respecto. «Para la altura» preserva la relación comparativa y suena natural en español sin convertir el sintagma en una explicación más larga.
- source_word: וָאָרֶץ
  english_pob_choice: and the earth
  chosen_spanish: y la tierra
  alternatives_spanish:
  - y la tierra
  lexicon: HALOT
  rationale: «Tierra» comunica mejor el contraste cósmico con «los cielos» en español que «el mundo» o «la tierra firme»; mantiene el paralelismo de amplitud y profundidad.
- source_word: לָעֹמֶק
  english_pob_choice: for depth
  chosen_spanish: para la profundidad
  alternatives_spanish:
  - en profundidad
  - con respecto a la profundidad
  - para el fondo
  lexicon: HALOT
  rationale: «Profundidad» expresa de forma clara y digna el valor comparativo del hebreo y evita una posible ambigüedad de «fondo» en español moderno.
- source_word: לֵב
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - la mente
  - el interior
  - el corazón
  lexicon: HALOT
  rationale: Se conserva «corazón» porque en hebreo incluye pensamiento, intención y disposición interior; «mente» estrecharía indebidamente el campo semántico.
- source_word: מְלָכִים
  english_pob_choice: of kings
  chosen_spanish: de los reyes
  alternatives_spanish:
  - de reyes
  - de los reyes
  lexicon: HALOT
  rationale: «Reyes» reproduce con precisión el sustantivo específico del hebreo, manteniendo el marco real del proverbio.
- source_word: אֵין חֵקֶר
  english_pob_choice: there is no searching out
  chosen_spanish: no hay quien lo escudriñe
  alternatives_spanish:
  - es inescrutable
  - no hay forma de sondearlo
  - no se puede averiguar
  lexicon: HALOT
  rationale: El hebreo expresa la ausencia de búsqueda/indagación exitosa. «No hay quien lo escudriñe» conserva la idea de inaccesibilidad al examen humano y mantiene un español bíblico claro sin ocultar la tensión semántica con alternativas más interpretativas.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el audit trail inglés y el hebreo: conserva el paralelismo entre cielos/tierra y la cláusula final como una negación de la posibilidad de escudriñar, sin suavizarla a una mera idea de «incomprensibilidad».'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y contemporáneo.
  - Se prefirió «los cielos» para corresponder al plural hebreo y al estilo POB.
  - La cláusula final evita una paráfrasis doctrinal y conserva la tensión de la búsqueda imposible.
