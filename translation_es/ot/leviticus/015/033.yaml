  glossary_alignment: No hay conflicto con los glosarios mayores del proyecto. ‘Impureza menstrual’ e ‘impura’ preservan la distinción ritual, no moral. ‘Se acueste con’ mantiene el registro eufemístico. La única mejora léxica recomendada es preferir ‘flujo’ sobre ‘descarga’ para זוֹב.
