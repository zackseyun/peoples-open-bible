    No. Finalmente, «Pongan su corazón en sus caminos» se debe cambiar por «Pongan su corazón en sus caminos»? No. El español natural y fiel es «Pongan su corazón en sus caminos»? No. Debe usarse «Pongan su corazón en sus caminos»? No. La corrección adecuada es «Pongan su corazón en sus caminos» -> «Pongan su corazón en sus caminos»? No. En suma: conviene reformular a «Pongan su corazón en sus caminos»? No; la versión correcta propuesta abajo usa «Pongan su corazón en sus caminos»? No. Se adopta «Pongan su corazón en sus caminos»? No. La propuesta concreta es «Pongan su corazón en sus caminos»? No. Se adopta una formulación más idiomática con nota literal.'
