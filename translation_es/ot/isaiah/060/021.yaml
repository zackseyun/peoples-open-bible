    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''el brote de su plantación''. Algunos intérpretes o tradiciones textuales suavizan esto a ''mi plantación'' porque la frase siguiente dice ''la obra de mis manos'', pero el texto masorético preserva este cambio de persona.'
    reason: textual_variant
