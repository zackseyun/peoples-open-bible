  yaml_path: translation/ot/psalms/017/001.yaml
  text: A prayer of David. Hear[a], O Yahweh, a just cause; attend to my cry; give ear to my prayer from lips without deceit.
  footnotes:
  - marker: a
    text: Or 'Hear righteousness'—that is, hear what is right or just. The Hebrew צֶדֶק can denote righteousness, justice, or a just cause; here it likely refers to the psalmist's righteous case.
