translation:
  language: es
  text: Porque Yahvé su Dios secó las aguas del Jordán delante de ustedes, hasta que pasaron, tal como Yahvé su Dios hizo con el mar de los Juncos[a], el cual secó delante de nosotros hasta que pasamos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente, «el mar Rojo».
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹבִישׁ
  english_pob_choice: dried up
  chosen_spanish: secó
  alternatives_spanish:
  - secó completamente
  - hizo secar
  lexicon: HALOT
  rationale: El hifil de יבש expresa quitar el agua de manera milagrosa para permitir el paso. En español, «secó» es natural, claro y conserva la repetición verbal del versículo sin exagerar el proceso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el nombre del pacto. En español, «Yahvé» mantiene el nombre divino en vez de sustituirlo por un título, en línea con la política del proyecto.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios, Dios de ustedes
  - su Dios personal
  lexicon: HALOT
  rationale: La forma es singular y se refiere a Yahvé como Dios del pueblo. «Su Dios» comunica la relación posesiva/covenantal sin forzar una paráfrasis.
- source_word: מֵי הַיַּרְדֵּן
  english_pob_choice: the waters of the Jordan
  chosen_spanish: las aguas del Jordán
  alternatives_spanish:
  - las aguas del río Jordán
  - el agua del Jordán
  lexicon: HALOT
  rationale: Se conserva el sustantivo plural y la imagen concreta del río en crecida/caudal, como en el hebreo.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - ante ustedes
  - frente a ustedes
  lexicon: HALOT
  rationale: La expresión idiomática hebrea literalmente dice «de delante de su presencia». En español, «delante de ustedes» mantiene el sentido espacial y el tono narrativo.
- source_word: עַד עָבְרְכֶם
  english_pob_choice: until you crossed over
  chosen_spanish: hasta que ustedes pasaron
  alternatives_spanish:
  - hasta que cruzaron
  - hasta su paso
  lexicon: HALOT
  rationale: Se conserva el verbo de cruce/paso con un español natural. «Pasaron» es breve y fiel al movimiento de עבר; «cruzaron» también es posible, pero «pasaron» enlaza bien con la formulación narrativa del pasaje.
- source_word: כַּאֲשֶׁר עָשָׂה
  english_pob_choice: just as ... did
  chosen_spanish: tal como ... hizo
  alternatives_spanish:
  - como ... hizo
  - así como ... hizo
  lexicon: HALOT
  rationale: La comparación explícita entre Jordán y mar se expresa con una forma clara y directa en español.
- source_word: יַם סוּף
  english_pob_choice: the Sea of Reeds
  chosen_spanish: el mar de Reeds
  alternatives_spanish:
  - el mar de los Juncos
  - el mar Rojo
  lexicon: HALOT
  rationale: 'Se sigue la primacía del hebreo: סוּף se relaciona con «reeds»/juncos, no con el nombre tradicional. Se conserva «Reeds» como forma identificable con la decisión inglesa del POB.'
- source_word: מִפָּנֵינוּ
  english_pob_choice: before us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - ante nosotros
  - frente a nosotros
  lexicon: HALOT
  rationale: Se mantiene la misma imagen espacial, ahora en primera persona plural, para reflejar la identificación del hablante con la generación del éxodo.
- source_word: עַד עָבְרֵנוּ
  english_pob_choice: until we crossed over
  chosen_spanish: hasta que pasamos
  alternatives_spanish:
  - hasta que cruzamos
  - hasta nuestro paso
  lexicon: HALOT
  rationale: Se preserva la repetición deliberada del verbo de paso/cruce y se evita una construcción artificial en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo usa el Tetragrámaton directamente. La traducción conserva el nombre propio divino para no ocultarlo tras un título, siguiendo la primacía del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: יַם סוּף
  english_pob_reading: the Sea of Reeds
  chosen_spanish_reading: el mar de Reeds
  alternative_spanish_readings:
  - el mar Rojo
  - el mar de los Juncos
  rationale: Aunque «mar Rojo» es la forma tradicional, el hebreo apunta más directamente a «reeds/juncos». La redacción principal sigue la fuente, y no borra la tensión entre tradición e ինտención del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 Original-language primacy over translation tradition
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y ningún cambio necesario; se mantiene la decisión de usar una equivalencia óptima con primacía del hebreo y un registro bíblico claro en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el paralelismo verbal «secó ... secó» para reflejar la repetición hebrea.
  - Se usa «delante de» para מִפְּנֵי/מִפָּנֵי en ambos miembros del versículo.
  - «Pasaron» reproduce de forma natural el valor de עבר sin perder el sentido de cruce.
  - La nota sobre «mar de Reeds» preserva la tensión entre la lectura tradicional y la más literal; se evita sustituirla por «mar Rojo» en el texto principal.
