    issue: «no cargarás sobre él pecado» distorsiona el sentido probable de תִשָּׂא עָלָיו חֵטְא
    rationale: En español, «cargar sobre él pecado» se entiende fácilmente como ponerle o atribuirle pecado a otra persona. Pero el hebreo, según el propio expediente inglés, apunta a cargar/incurrir culpa por causa de él o compartir responsabilidad por no reprenderlo.
  - severity: low
    issue: La nota al pie empieza con una comilla sobrante
    rationale: El texto de la nota comienza con "'O también...", lo que es tipográficamente incorrecto en español y debe limpiarse.
