translation:
  language: es
  text: 'Y he aquí[a], todas las mujeres que quedaban en la casa del rey de Judá eran sacadas a los oficiales del rey de Babilonia, y ellas decían: «Los que estaban en paz contigo[c] te engañaron y prevalecieron contra ti; tus pies se hundieron en el lodo[b]; se volvieron atrás».”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «he aquí»; conserva la interjección de atención del original.'
    reason: lexical_alternative
  - marker: b
    text: O «fango»; el hebreo permite una imagen equivalente de lodo, pantano o cieno.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «los hombres de tu paz», un modismo para los que estaban en buenos términos contigo, es decir, tus aliados o allegados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Mira
  - Y mira
  lexicon: HALOT
  rationale: Conserva el valor deíctico y de llamada de atención del hebreo. «He aquí» es una fórmula reverente y reconocible en español bíblico, sin perder el golpe narrativo del original.
- source_word: נִשְׁאֲרוּ
  english_pob_choice: remain
  chosen_spanish: quedaban
  alternatives_spanish:
  - permanecían
  - habían quedado
  lexicon: HALOT
  rationale: El nifal expresa a los que permanecen o quedan atrás. «Quedaban» comunica bien ese estado en el relato y suena natural en español actual.
- source_word: מוּצָאוֹת
  english_pob_choice: are being brought out
  chosen_spanish: eran sacadas
  alternatives_spanish:
  - estaban siendo sacadas
  - eran llevadas fuera
  lexicon: HALOT
  rationale: 'El participio hofal tiene valor causativo-pasivo: eran hechas salir. «Eran sacadas» mantiene esa pasividad causativa de modo claro y fluido.'
- source_word: שָׂרֵי מֶלֶךְ בָּבֶל
  english_pob_choice: the officials of the king of Babylon
  chosen_spanish: los oficiales del rey de Babilonia
  alternatives_spanish:
  - los príncipes del rey de Babilonia
  - los jefes del rey de Babilonia
  lexicon: HALOT
  rationale: «Oficiales» es amplio y no fuerza un rango nobiliario o militar más específico de lo que el término hebreo exige en este contexto.
- source_word: הִסִּיתוּךָ
  english_pob_choice: have deceived you
  chosen_spanish: te engañaron
  alternatives_spanish:
  - te han engañado
  - te incitaron
  - te sedujeron
  lexicon: HALOT
  rationale: El hifil de סות puede abarcar incitar, seducir o desviar mediante engaño. En este reproche político, «te engañaron» preserva la fuerza de la acusación sin restringirla indebidamente.
- source_word: וְיָכְלוּ לְךָ
  english_pob_choice: and prevailed against you
  chosen_spanish: y prevalecieron contra ti
  alternatives_spanish:
  - y te vencieron
  - y triunfaron sobre ti
  - y pudieron contigo
  lexicon: HALOT
  rationale: «Prevalecieron contra ti» refleja bien la idea de imponerse o tener la ventaja sobre alguien, con registro bíblico digno y preciso.
- source_word: אַנְשֵׁי שְׁלֹמֶךָ
  english_pob_choice: The men at peace with you
  chosen_spanish: Tus amigos
  alternatives_spanish:
  - los hombres de tu paz
  - los que estaban en paz contigo
  - tus aliados
  lexicon: HALOT
  rationale: El hebreo es literalmente «los hombres de tu paz», un modismo para allegados, aliados o personas de confianza. En el cuerpo principal, «Tus amigos» comunica la relación de cercanía con naturalidad; la nota conserva la literalidad idiomática.
- source_word: הָטְבְּעוּ בַבֹּץ רַגְלֶךָ
  english_pob_choice: your feet have sunk into the mud
  chosen_spanish: tus pies se hundieron en el lodo
  alternatives_spanish:
  - tus pies se hundieron en el fango
  - tus pies están hundidos en el lodazal
  - tus pies se hundieron en el barro
  lexicon: HALOT
  rationale: La imagen metafórica se conserva directamente. «Lodo» funciona bien en español bíblico y mantiene el cuadro de atrapamiento o impotencia.
- source_word: נָסֹגוּ אָחוֹר
  english_pob_choice: they have turned back
  chosen_spanish: dieron la vuelta atrás
  alternatives_spanish:
  - se volvieron atrás
  - retrocedieron
  - se echaron atrás
  lexicon: HALOT
  rationale: La expresión hebrea indica retroceso o retirada. «Dieron la vuelta atrás» conserva el movimiento direccional de modo claro en español, aunque suene menos idiomático que otras opciones.
translation_notes:
  revision_awareness: 'El texto español sigue el ajuste final del audit trail inglés: הִסִּיתוּךָ se entiende con fuerza de engaño/desvío, y וְיָכְלוּ לְךָ con la idea de prevalecer contra alguien. Se mantuvo la imagen corporal y tañida del reproche sin suavizarla.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se mantiene un registro bíblico sobrio pero moderno, evitando arcaísmos innecesarios.
  - «Oficiales» se usa de forma consistente para שָׂרִים en este contexto de corte imperial.
  - La frase citada se traduce con segunda persona singular («ti», «tus»), según el hebreo con sufijos de 2ms.
