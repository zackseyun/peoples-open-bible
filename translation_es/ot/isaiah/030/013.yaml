translation:
  language: es
  text: Por tanto, esta iniquidad les será como una brecha[a] que está por caer, abombándose en un muro alto, cuya ruptura vendrá de repente, en un instante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «culpa» o «castigo por la iniquidad»; el término hebreo puede denotar el pecado mismo, la culpa que acarrea o su castigo resultante.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: La partícula inferencial introduce consecuencia lógica y profética; «Por tanto» conserva el enlace con lo anterior en un registro natural y solemne.
- source_word: יִהְיֶה לָכֶם
  english_pob_choice: will be to you
  chosen_spanish: les será
  alternatives_spanish:
  - será para ustedes
  - les llegará a ser
  lexicon: HALOT
  rationale: El giro idiomático expresa cómo esto funcionará para el destinatario; «les será» es breve, claro y fiel al sentido relacional del hebreo.
- source_word: הֶעָוֹן הַזֶּה
  english_pob_choice: this iniquity
  chosen_spanish: esta iniquidad
  alternatives_spanish:
  - esta culpa
  - este pecado
  - este castigo por la iniquidad
  lexicon: HALOT
  rationale: עוֹן admite el rango de iniquidad, culpa o castigo. Mantengo «iniquidad» en el texto principal para conservar la carga moral sin resolver la tensión semántica que el inglés POB preservó.
- source_word: כְּפֶרֶץ
  english_pob_choice: like a breach
  chosen_spanish: como una brecha
  alternatives_spanish:
  - como una grieta
  - como una rotura
  lexicon: HALOT
  rationale: «Brecha» comunica el quiebre en una pared y prepara la imagen de derrumbe mejor que «grieta», que sería más débil en español.
- source_word: נֹפֵל
  english_pob_choice: about to fall
  chosen_spanish: que está por caer
  alternatives_spanish:
  - a punto de caer
  - que cae
  lexicon: HALOT
  rationale: El participio expresa inestabilidad e inminencia. «Que está por caer» refleja bien ese matiz sin forzar un tiempo verbal extraño en español.
- source_word: נִבְעֶה
  english_pob_choice: bulging out
  chosen_spanish: abultada
  alternatives_spanish:
  - hinchada
  - sobresaliente
  - abombada
  lexicon: HALOT
  rationale: El verbo describe algo que se hincha o sobresale hacia afuera. «Abultada» conserva la imagen física de un muro que se deforma y cede.
- source_word: בְּחוֹמָה נִשְׂגָּבָה
  english_pob_choice: in a high wall
  chosen_spanish: en un muro alto
  alternatives_spanish:
  - en una pared alta
  - en un muro elevado
  lexicon: HALOT
  rationale: «Muro» transmite mejor la imagen defensiva que «pared» en este contexto; «alto» conserva la altura/exaltación del adjetivo sin añadir una fortificación no explicitada.
- source_word: אֲשֶׁר
  english_pob_choice: whose
  chosen_spanish: cuya
  alternatives_spanish:
  - que
  - del cual
  lexicon: HALOT
  rationale: La relativa enlaza el muro con su ruptura. «Cuya» da una relación natural en español y mantiene la personificación implícita del texto.
- source_word: פִּתְאֹם לְפֶתַע
  english_pob_choice: suddenly, in an instant
  chosen_spanish: de repente, en un instante
  alternatives_spanish:
  - súbitamente, en un momento
  - de pronto, al instante
  lexicon: HALOT
  rationale: Los dos adverbios intensifican la rapidez del colapso. Conservar ambos evita aplanar la duplicación enfática hebrea.
- source_word: יָבוֹא שִׁבְרָהּ
  english_pob_choice: its breaking comes
  chosen_spanish: vendrá su ruptura
  alternatives_spanish:
  - llegará su quiebre
  - vendrá su quebranto
  - su ruptura vendrá
  lexicon: HALOT
  rationale: שֶׁבֶר puede ser ruptura, quiebre o derrumbe. «Ruptura» mantiene el sentido de fractura estructural y funciona con fluidez en español.
theological_decisions:
- issue: Rango semántico de עָוֹן
  english_pob_reading: Rendered as 'iniquity' in the main text, while the English footnote preserves alternatives 'guilt' and 'punishment for iniquity'.
  chosen_spanish_reading: «Iniquidad» en el texto principal, con nota que preserva «culpa» y «castigo por la iniquidad».
  alternative_spanish_readings:
  - culpa
  - castigo por la iniquidad
  rationale: El término puede señalar el pecado mismo, la culpa que acarrea o el castigo resultante. El texto principal conserva la ambigüedad moral y la nota expone las alternativas sin resolver la tensión.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión inglesa corrigió «a falling breach» a «a breach about to fall» para expresar mejor la inminencia del derrumbe. La versión española sigue esa lectura con «una brecha que está por caer», manteniendo la imagen de colapso inminente y la duplicación de rapidez («de repente, en un instante»).
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando el contexto lo requiera; este versículo no lo contiene.
  - Se mantiene «iniquidad» para preservar el rango semántico de עָוֹן sin trivializarlo en un sinónimo más débil.
  - «Brecha», «muro» y «ruptura» sostienen la metáfora estructural del texto sin introducir explicación añadida.
