translation:
  language: es
  text: 'que mandé a sus padres el día en que los saqué de la tierra de Egipto[a], del horno de hierro[c], diciendo: «Escuchen mi voz[b] y cumplan esas palabras, conforme a todo lo que les mando; y ustedes serán mi pueblo, y yo seré su Dios»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus antepasados». El hebreo dice «sus padres».
    reason: lexical_alternative
  - marker: b
    text: «Escuchen mi voz» también puede traducirse «Obedezcan mi voz», porque esta expresión hebrea a menudo incluye la idea de oír con obediencia.
    reason: lexical_alternative
  - marker: c
    text: «El horno de hierro» es una metáfora de Egipto como lugar de dura opresión y aflicción.
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: lo que
  alternatives_spanish:
  - que
  - el cual
  lexicon: HALOT
  rationale: El relativo introduce la cláusula que remite al mandato del pacto anterior. En español, «lo que» da una referencia natural al contenido mandado sin forzar un antecedente personal.
- source_word: צִוִּיתִי
  english_pob_choice: I commanded
  chosen_spanish: mandé
  alternatives_spanish:
  - ordené
  - di mandato
  lexicon: HALOT
  rationale: צוה expresa un mandato con autoridad. «Mandé» es claro y digno en español, y conserva la fuerza normativa sin sonar artificioso.
- source_word: אֲבֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - sus padres antecesores
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus padres». En español, «sus padres» conserva la forma masculina y el vínculo generacional. Se evita neutralizar a «antepasados» en el texto principal porque el original no lo hace.
- source_word: בְּיוֹם הוֹצִיאִי
  english_pob_choice: on the day I brought
  chosen_spanish: el día en que los saqué
  alternatives_spanish:
  - el día que los saqué
  - cuando los saqué
  lexicon: HALOT
  rationale: La expresión temporal del éxodo se entiende de modo natural en español con «el día en que». «Saqué» refleja היטב el acto divino de sacar a Israel de Egipto.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: out from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - fuera de la tierra de Egipto
  - de la tierra egipcia
  lexicon: HALOT
  rationale: «Tierra de Egipto» reproduce la fórmula solemne del pacto; en español, la preposición «de» expresa bien el origen sin recargar la frase.
- source_word: מִכּוּר הַבַּרְזֶל
  english_pob_choice: from the iron furnace
  chosen_spanish: del horno de hierro
  alternatives_spanish:
  - del crisol de hierro
  - del horno ferroso
  lexicon: HALOT
  rationale: La metáfora para Egipto se conserva con «horno de hierro», que suena natural en español y mantiene la imagen de opresión y aflicción sin explicitarla en el cuerpo del verso.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: Es la introducción estándar del discurso citado; «diciendo» preserva la relación sintáctica con el mandato anterior.
- source_word: שִׁמְעוּ בְקוֹלִי
  english_pob_choice: Listen to my voice
  chosen_spanish: Escuchen mi voz
  alternatives_spanish:
  - Obedezcan mi voz
  - Oigan mi voz
  lexicon: HALOT
  rationale: Se conserva la imagen auditiva del hebreo. La posible idea de obediencia queda reforzada por el mandato siguiente, por lo que no se la carga toda en el verbo principal.
- source_word: וַעֲשִׂיתֶם אֹתָם
  english_pob_choice: and do them
  chosen_spanish: y háganlos
  alternatives_spanish:
  - y háganlas
  - y pónganlos por obra
  lexicon: HALOT
  rationale: El plural del objeto se mantiene de forma breve y directa. «Háganlos» conserva la referencia a los mandatos/estatutos sin volverlo una paráfrasis extensa.
- source_word: כְּכֹל אֲשֶׁר אֲצַוֶּה אֶתְכֶם
  english_pob_choice: according to all that I command you
  chosen_spanish: conforme a todo lo que les mando
  alternatives_spanish:
  - según todo lo que les mando
  - de acuerdo con todo lo que les mando
  lexicon: HALOT
  rationale: La expresión de totalidad normativa se comunica con una fórmula natural en español. El presente «mando» puede funcionar como presente histórico en discurso directo y evita una repetición áspera del pretérito.
- source_word: וִהְיִיתֶם לִי לְעָם
  english_pob_choice: and you shall be my people
  chosen_spanish: y ustedes serán mi pueblo
  alternatives_spanish:
  - y me serán por pueblo
  - y serán un pueblo para mí
  lexicon: HALOT
  rationale: Se conserva la fórmula de pacto. «Mi pueblo» reproduce la relación posesiva-covenantal sin necesidad de calcar la preposición hebrea.
- source_word: וְאָנֹכִי אֶהְיֶה לָכֶם לֵאלֹהִים
  english_pob_choice: and I will be your God
  chosen_spanish: y yo seré su Dios
  alternatives_spanish:
  - y yo les seré Dios
  - y yo seré Dios para ustedes
  lexicon: HALOT
  rationale: Cierra la fórmula del pacto en español idiomático. «Seré su Dios» conserva la relación de alianza y la reciprocidad del hebreo.
theological_decisions:
- issue: Tratamiento de la fórmula de pacto «serán mi pueblo / seré su Dios»
  english_pob_reading: and you shall be my people, and I will be your God
  chosen_spanish_reading: y ustedes serán mi pueblo, y yo seré su Dios
  alternative_spanish_readings:
  - y serán un pueblo para mí, y yo seré Dios para ustedes
  rationale: Se mantiene la fórmula clásica del pacto sin diluirla. En español, «mi pueblo» y «su Dios» comunican claramente la pertenencia relacional y el compromiso pactal del texto hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: La expresión «escuchen mi voz» y la posible inferencia de obediencia
  english_pob_reading: Listen to my voice
  chosen_spanish_reading: Escuchen mi voz
  alternative_spanish_readings:
  - Obedezcan mi voz
  - Oigan mi voz
  rationale: Se preserva la imagen de escuchar la voz divina, dejando que el mandato inmediato «y háganlos» explicite la obediencia. Esto evita cargar en el verbo principal una equivalencia interpretativa más fuerte de la necesaria.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Metáfora de «horno de hierro» aplicada a Egipto
  english_pob_reading: the iron furnace is a metaphor for Egypt as a place of harsh oppression and affliction
  chosen_spanish_reading: del horno de hierro
  alternative_spanish_readings:
  - del crisol de hierro
  - del horno ferroso
  rationale: Se conserva la metáfora sin ampliarla interpretativamente en el texto principal. La imagen permite al lector captar la dureza de Egipto como lugar de opresión; la nota puede explicitar el sentido metafórico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: El pasaje coincide en lo esencial con la versión inglesa auditada y con el hebreo masorético. La única tensión interpretativa relevante es la de שִׁמְעוּ בְקוֹלִי, que en la tradición semántica puede implicar obediencia; se preserva la imagen auditiva en el texto principal y se explicita la alternativa en nota. También se mantiene la fórmula de pacto con lenguaje natural en español.
  spanish_consistency_notes:
  - Se preserva «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Se mantiene la metáfora «horno de hierro» sin sustituirla por una glosa explicativa en el cuerpo del texto.
  - Se conserva el plural «háganlos» para reflejar el objeto plural del hebreo.
  - El posesivo de segunda persona plural se expresa con «sus / su» por concordancia de cortesía y claridad en español bíblico.
