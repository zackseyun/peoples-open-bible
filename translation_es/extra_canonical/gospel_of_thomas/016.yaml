base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/016.yaml
  text: 'Jesus said[1], "Perhaps people think that I have come to cast peace upon the world, and they do not know that I have come to cast divisions upon the earth: fire, sword, war. For there will be five in a house: there will be three against two, and two against three, father against son, and son against father[3][2]. And they will stand as solitary ones."'
  footnotes:
  - marker: '1'
    text: The manuscript spells the infinitive 'to cast' as ⲁⲛⲟⲩϫⲉ instead of the standard Sahidic ⲉⲛⲟⲩϫⲉ, a common vowel interchange in this text.
    reason: dialect_note
  - marker: '2'
    text: Compare with Luke 12:51-53 and Matthew 10:34-35. Thomas shares the Synoptic themes of division and the sword but uniquely concludes with the fractured family members standing as 'solitary ones' (monachos).
    reason: cross_reference
  - marker: '3'
    text: Greek loanword monachos. In Thomas, this denotes not a later Christian monk, but a 'single one' or 'solitary'—one who has achieved spiritual unity and stands undivided, even when earthly family is fractured.
    reason: theological_note
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:46Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Jesús dijo[a]: «Tal vez la gente cree que he venido a arrojar paz sobre el mundo, y no saben que he venido a arrojar divisiones sobre la tierra: fuego, espada, guerra. Porque habrá cinco en una casa: habrá tres contra dos, y dos contra tres; padre contra hijo, e hijo contra padre[b]. Y se pondrán en pie como solitarios[c]»'
  philosophy: formal
  footnotes:
  - marker: a
    text: El manuscrito escribe el infinitivo 'arrojar' como ⲁⲛⲟⲩϫⲉ en lugar del sahídico estándar ⲉⲛⲟⲩϫⲉ, una alternancia vocálica común en este texto.
    reason: dialect_note
  - marker: b
    text: Compárese con Lucas 12:51-53 y Mateo 10:34-35. Thomas comparte los temas sinópticos de división y espada, pero concluye de manera singular con los miembros de la familia fracturada llegando a estar como 'solitarios'.
    reason: cross_reference
  - marker: c
    text: 'Préstamo griego monachos. En Thomas no designa a un monje cristiano posterior, sino a un ''solitario'' o ''singular'': alguien que ha alcanzado unidad espiritual y permanece no dividido, aun cuando la familia terrenal se fracture.'
    reason: theological_note
lexical_decisions:
- source_word: ⲧⲁⲭⲁ
  english_pob_choice: Perhaps
  chosen_spanish: Tal vez
  alternatives_spanish:
  - Quizá
  - Quizás
  lexicon: BDAG 992
  rationale: Expresa la misma cautela especulativa que el inglés POB y evita volver afirmativo lo que en el original es una conjetura de la gente.
- source_word: ⲛⲟⲩϫⲉ
  english_pob_choice: cast
  chosen_spanish: arrojar
  alternatives_spanish:
  - lanzar
  - echar
  lexicon: Crum 240a
  rationale: Mantiene la fuerza verbal de 'throw/cast' que el audit trail subraya; 'arrojar' suena más natural en español que un calco mecánico y preserva la imagen enérgica.
- source_word: ⲡⲱⲣϫ
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - separaciones
  - rupturas
  lexicon: Crum 269a
  rationale: Conserva el sustantivo abstracto plural que el texto usa para oponer paz/divisiones, sin suavizar la tensión.
- source_word: ⲥⲉⲛⲁⲱϩⲉ ⲉⲣⲁⲧⲟⲩ
  english_pob_choice: stand
  chosen_spanish: se pondrán en pie
  alternatives_spanish:
  - estarán en pie
  - se mantendrán firmes
  lexicon: Crum 514b
  rationale: Reproduce el idiomático 'stand' de modo idiomático en español, sin convertirlo en una interpretación doctrinal adicional; deja abierta la idea de permanecer de pie o presentarse así.
- source_word: ⲙⲟⲛⲁⲭⲟⲥ
  english_pob_choice: solitary ones
  chosen_spanish: solitarios
  alternatives_spanish:
  - solos
  - singulares
  - únicos
  lexicon: BDAG 656
  rationale: En español, 'solitarios' comunica la idea de singularidad/no divididos sin introducir el anacronismo de 'monjes'; corresponde al matiz que el POB documenta para Thomas.
theological_decisions:
- issue: Sentido de monachos en Thomas
  english_pob_reading: solitary ones; not later Christian monks, but a spiritually unified single one
  chosen_spanish_reading: solitarios; no 'monjes', sino personas singulares/no divididas
  alternative_spanish_readings:
  - monjes
  - singulares
  - personas únicas
  rationale: Se evita la asociación tardía con vida monástica institucional. 'Solitarios' conserva el sentido de unidad interior y de estar 'sin división', en línea con la nota doctrinal inglesa.
  doctrine_reference: Thomasine anthropology / singleness of heart
- issue: Enumeración y contraste familiar
  english_pob_reading: 'For there will be five in a house: there will be three against two, and two against three, father against son, and son against father'
  chosen_spanish_reading: 'Porque habrá cinco en una casa: tres estarán contra dos, y dos contra tres; padre contra hijo, e hijo contra padre'
  alternative_spanish_readings:
  - Porque habrá cinco en una casa; tres contra dos y dos contra tres
  - Porque en una casa habrá cinco
  rationale: Sigue de cerca la secuencia del coptó, conservando la progresión numérica y el contraste familiar que el expediente revisado corrigió frente a una mala lectura previa.
  doctrine_reference: Synoptic parallel tradition (Luke 12:51-53; Matthew 10:34-35)
translation_notes:
  revision_awareness: 'El texto en inglés fue revisado para corregir la numeración del dicho: ''cinco en una casa'' y no ''tres''. También se preservó el verbo fuerte ''cast''/''arrojar'' para ⲛⲟⲩϫⲉ, porque el informe de revisión señaló que ''bring'' suavizaba indebidamente el original. La redacción española sigue esas correcciones y mantiene la culminación en ⲙⲟⲛⲁⲭⲟⲥ como ''solitarios''.'
  spanish_consistency_notes:
  - Se mantiene 'Jesús' para ⲓⲏⲥⲟⲩⲥ.
  - Se usa 'Dios' solo implícitamente no presente aquí; no se introduce terminología ajena.
  - '''Arrojar'' se usa de modo coherente para el mismo verbo en paz/divisiones.'
  - '''Solitarios'' se reserva para el valor técnico de monachos en Thomas, evitando ''monjes''.'
