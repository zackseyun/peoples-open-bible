translation:
  language: es
  text: Presta oído a mis palabras, oh Yahvé; comprende mi gemido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi meditación» o «mi murmullo». El término hebreo puede referirse a la reflexión interior o a una emisión baja de voz; aquí se vierte como «mi gemido» para ajustarse al contexto de lamentación.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲמָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - lo que digo
  - mi habla
  lexicon: HALOT
  rationale: El plural constructo con sufijo de primera persona se refiere a las palabras habladas del salmista. «Mis palabras» es natural en español y conserva el valor plural y directo del hebreo.
- source_word: הַאֲזִינָה
  english_pob_choice: Give ear
  chosen_spanish: Dale oído
  alternatives_spanish:
  - escucha
  - atiende
  lexicon: HALOT
  rationale: El hebreo expresa una petición vívida de atención auditiva. «Dale oído» mantiene la imagen idiomática mejor que un simple «escucha».
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - Yahvé
  - oh el Señor
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio en español según la convención del proyecto. «Oh Yahvé» corresponde al vocativo del hebreo y evita la sustitución por un título.
- source_word: בִּינָה
  english_pob_choice: understand
  chosen_spanish: comprende
  alternatives_spanish:
  - discierne
  - considera
  lexicon: HALOT
  rationale: El verbo pide percepción con entendimiento. «Comprende» transmite bien el matiz cognitivo en español moderno y mantiene la petición dirigida a Dios.
- source_word: הֲגִיגִי
  english_pob_choice: my groaning
  chosen_spanish: mi gemido
  alternatives_spanish:
  - mi meditación
  - mi murmullo
  lexicon: HALOT
  rationale: En este contexto de lamento, el término apunta a una emisión interior o baja con carga de aflicción. «Mi gemido» comunica mejor esa fuerza emotiva en español que «mi meditación», sin perder el vínculo con la ambigüedad léxica.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: Se conserva el nombre personal de Dios en vez de sustituirlo por una designación genérica. La forma vocativa española «oh Yahvé» refleja el mismo valor reverencial y directo del hebreo y sigue la norma terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés reciente mantiene sin cambios la elección «groaning» para הֲגִיגִי y conserva la traducción del nombre divino como Yahweh. La versión española sigue ese mismo criterio, adaptándolo a la sintaxis natural del español sin suavizar la carga de lamento del verso.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma española del nombre divino, coherente con la terminología del proyecto.
  - «Mis palabras» conserva el plural del hebreo y evita singularizar indebidamente el sustantivo.
  - «Mi gemido» prioriza el tono de lamentación del contexto, pero la nota preserva las alternativas léxicas documentadas.
  - 'La estructura del verso sigue de cerca el orden retórico del hebreo: petición de atención, vocativo divino y segunda petición cognitiva.'
