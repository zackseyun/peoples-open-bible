translation:
  language: es
  text: Allí claman, pero él no responde[a], a causa de la soberbia[b] de los hombres malvados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo no nombra explícitamente al sujeto de «responde»; el contexto apunta a Dios.
    reason: alternative_reading
  - marker: b
    text: O «la arrogancia».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁם
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - Entonces
  lexicon: HALOT
  rationale: La partícula es principalmente locativa. «Allí» conserva la referencia al lugar o situación ya mencionada sin convertirla innecesariamente en un mero valor temporal.
- source_word: יִ֭צְעֲקוּ
  english_pob_choice: they cry out
  chosen_spanish: claman
  alternatives_spanish:
  - gritan
  - claman con angustia
  lexicon: HALOT
  rationale: צעק expresa un clamor en necesidad o aflicción. «Claman» es natural en español bíblico actual y mantiene la urgencia del verbo sin suavizarlo.
- source_word: וְ/לֹ֣א
  english_pob_choice: but ... not
  chosen_spanish: pero ... no
  alternatives_spanish:
  - y ... no
  lexicon: HALOT
  rationale: El waw marca contraste entre el clamor y la falta de respuesta. «Pero» comunica mejor ese contraste en español que una simple coordinación.
- source_word: יַעֲנֶ֑ה
  english_pob_choice: he does not answer
  chosen_spanish: él no responde
  alternatives_spanish:
  - no responde
  - Dios no responde
  lexicon: HALOT
  rationale: El hebreo no explicita el sujeto; el verbo es 3ms. «Él» preserva esa referencia implícita sin nombrarla, y en contexto apunta a Dios sin forzarlo en el texto principal.
- source_word: מִ֝/פְּנֵ֗י
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  lexicon: HALOT
  rationale: La preposición expresa causa u ocasión. «A causa de» es claro y fiel al valor causal del hebreo.
- source_word: גְּא֣וֹן
  english_pob_choice: the pride
  chosen_spanish: la soberbia
  alternatives_spanish:
  - el orgullo
  - la arrogancia
  lexicon: HALOT
  rationale: En este contexto negativo, גאון no comunica majestad sino altivez culpable. «Soberbia» mantiene bien ese matiz en español.
- source_word: רָעִֽים
  english_pob_choice: evil men
  chosen_spanish: los hombres malos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: El plural masculino se refiere a personas culpables. «Hombres malos» conserva la referencia masculina explícita y evita neutralizarla; «malvados» sería más idiomático pero menos transparente respecto de la forma.
theological_decisions:
- issue: Sujeto implícito de la negación verbal
  english_pob_reading: The Hebrew does not explicitly name the subject of 'does not answer'; context implies God.
  chosen_spanish_reading: él no responde
  alternative_spanish_readings:
  - Dios no responde
  - no responde
  rationale: Se conserva la reserva del hebreo sin introducir «Dios» en la línea principal. El contexto permite entender el referente implícito, pero el versículo no lo nombra de forma explícita.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de גְּא֣וֹן con רָעִֽים
  english_pob_reading: the pride of evil men
  chosen_spanish_reading: la soberbia de los hombres malos
  alternative_spanish_readings:
  - la arrogancia de los hombres malos
  - la soberbia de los malvados
  rationale: La construcción expresa una cualidad moral negativa de los culpables. «Soberbia» comunica mejor el tono reprochable que una neutralidad como «exaltación» o una lectura más abstracta.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Coincide con el pasaje revisado de alta concordancia; no se registraron cambios posteriores en el texto fuente auditado.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en el proyecto, pero este versículo no lo expresa de forma explícita.
  - Se mantiene el masculino plural en «los hombres malos» para conservar la referencia gramatical del hebreo.
  - «Claman» y «responde» sostienen un registro bíblico natural sin volver al castellano arcaizante.
