translation:
  language: es
  text: Te ruego[a], hijo, que alces la vista al cielo y a la tierra y veas todo lo que hay en ellos, y sepas que Dios los hizo no a partir de cosas existentes, y que el género humano llega a existir de la misma manera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más interpretativamente: «de la nada». El griego dice literalmente «no de cosas existentes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀξιῶ σε
  english_pob_choice: I beg you
  chosen_spanish: Te ruego
  alternatives_spanish:
  - Te suplico
  - Te imploro
  - Te pido
  lexicon: LSJ
  rationale: En este contexto de una madre que exhorta a su hijo antes del martirio, la fuerza es de súplica urgente y afectuosa. "Te ruego" comunica bien esa insistencia sin sonar excesivamente moderna o rígida.
- source_word: τέκνον
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - niño
  - hijo mío
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente "hijo/niño/descendiente" en un sentido amplio, aquí el hablante se dirige a su propio hijo. "Hijo" preserva la relación inmediata y suena natural en español bíblico.
- source_word: ἀναβλέψαντα
  english_pob_choice: look at
  chosen_spanish: alces la vista
  alternatives_spanish:
  - mires
  - levantes los ojos
  - alzando la vista
  lexicon: LSJ
  rationale: El participio implica levantar la mirada hacia arriba. "Alces la vista" conserva ese matiz mejor que un simple "mira" y sigue siendo idiomático en español.
- source_word: οὐρανὸν
  english_pob_choice: the heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el firmamento
  - el cielo
  lexicon: LSJ
  rationale: En español bíblico y actual, "cielo" expresa de forma natural el singular cósmico del griego. "Firmamento" sería más técnico y podría estrechar el sentido.
- source_word: τὴν γῆν
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  lexicon: LSJ
  rationale: La pareja "cielo y tierra" reproduce con claridad el binomio cósmico del griego.
- source_word: τὰ ἐν αὐτοῖς πάντα
  english_pob_choice: everything in them
  chosen_spanish: todo lo que hay en ellos
  alternatives_spanish:
  - todas las cosas que están en ellos
  - todo cuanto hay en ellos
  lexicon: LSJ
  rationale: La expresión griega abarca la totalidad de lo contenido en cielo y tierra. "Todo lo que hay en ellos" conserva la amplitud sin sonar forzado.
- source_word: γνῶναι
  english_pob_choice: know
  chosen_spanish: sepas
  alternatives_spanish:
  - conozcas
  - entiendas
  - llegues a saber
  lexicon: LSJ
  rationale: 'El infinitivo de resultado depende del ver y mirar: llegar a reconocer una verdad. En español, "sepas" enlaza de manera natural con la exhortación previa.'
- source_word: οὐκ ἐξ ὄντων
  english_pob_choice: not out of existing things
  chosen_spanish: no de cosas existentes
  alternatives_spanish:
  - no de lo que ya existía
  - no a partir de cosas existentes
  - no de cosas que existían
  lexicon: LSJ
  rationale: La frase griega dice literalmente "no a partir de cosas existentes". "Cosas existentes" mantiene la tensión lexical y evita introducir de entrada la fórmula interpretativa "de la nada" en el cuerpo principal.
- source_word: ἐποίησεν
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - creó
  - formó
  - realizó
  lexicon: LSJ
  rationale: El verbo griego es el común "hacer". "Hizo" sigue de cerca el source y, en este contexto, comunica la acción creadora sin imponer una terminología más técnica.
- source_word: τὸ τῶν ἀνθρώπων γένος
  english_pob_choice: the human race
  chosen_spanish: la raza humana
  alternatives_spanish:
  - el género humano
  - la humanidad
  - el linaje humano
  lexicon: LSJ
  rationale: La frase colectiva apunta a la humanidad como conjunto. "Raza humana" refleja bien el valor genérico del griego y mantiene una formulación clara en español.
- source_word: οὕτω γίγνεται
  english_pob_choice: comes to be in the same way
  chosen_spanish: llega a ser de la misma manera
  alternatives_spanish:
  - así llega a existir
  - de esa manera llega a ser
  - así sucede
  lexicon: LSJ
  rationale: οὕτω remite al modo en que Dios hizo el mundo. "Llega a ser de la misma manera" conserva la referencia comparativa y el sentido de llegar a existir.
theological_decisions:
- issue: οὐκ ἐξ ὄντων y la formulación doctrinal sobre la creación
  english_pob_reading: not out of existing things
  chosen_spanish_reading: no de cosas existentes
  alternative_spanish_readings:
  - de la nada
  - no a partir de cosas existentes
  rationale: La redacción principal sigue de cerca el griego y preserva la formulación no técnica. La nota permite expresar la lectura doctrinal tradicional de creación sin materia preexistente, sin reemplazar el texto por una paráfrasis dogmática.
  doctrine_reference: Creación ex nihilo; primacía del texto fuente sobre la síntesis doctrinal en la traducción.
- issue: Relación entre la manera en que Dios hace y la manera en que llega a existir la humanidad
  english_pob_reading: the human race comes to be in the same way
  chosen_spanish_reading: la raza humana llega a ser de la misma manera
  alternative_spanish_readings:
  - la humanidad llega a existir así
  - el género humano llega a ser de ese modo
  rationale: Se conserva la comparación implícita del griego entre el acto creador de Dios y el origen humano. No se suaviza la relación porque forma parte del argumento del versículo.
  doctrine_reference: Antropología bíblica; creación y generación humana en paralelo retórico.
translation_notes:
  revision_awareness: El borrador inglés revisado eliminó los artículos antes de "heaven and earth" para ajustarse mejor al griego y a la naturalidad estilística. En español se siguió esa misma preferencia con «cielo y la tierra» no; mejor, con la pareja fija «el cielo y la tierra», manteniendo naturalidad y el binomio cósmico esperado en español bíblico.
  spanish_consistency_notes:
  - Se emplea "Dios" como equivalente de θεός, en concordancia con el estándar del proyecto.
  - Se usa "cielo y tierra" como binomio cosmológico natural en español, equivalente al singular griego con artículo.
  - '"Hizo" se conserva para ἐποίησεν por fidelidad léxica; no se sustituye por "creó" en el texto principal.'
  - La nota de pie conserva la tensión entre la literalidad griega y la fórmula teológica tradicional.
