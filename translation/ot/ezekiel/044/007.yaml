id: EZK.44.7
reference: Ezekiel 44:7
source:
  edition: WLC
  text: בַּ/הֲבִיאֲ/כֶ֣ם בְּנֵֽי נֵכָ֗ר עַרְלֵי לֵב֙ וְ/עַרְלֵ֣י בָשָׂ֔ר לִ/הְי֥וֹת בְּ/מִקְדָּשִׁ֖/י לְ/חַלְּל֣/וֹ אֶת בֵּיתִ֑/י בְּ/הַקְרִֽיבְ/כֶ֤ם אֶת לַחְמִ/י֙ חֵ֣לֶב וָ/דָ֔ם וַ/יָּפֵ֨רוּ֙ אֶת בְּרִיתִ֔/י אֶ֖ל כָּל תּוֹעֲבוֹתֵי/כֶֽם־־־־־־׃
translation:
  text: when you brought in foreigners[a], uncircumcised in heart and uncircumcised in flesh, to be in my sanctuary, to profane it—my house—when you presented my food, the fat and the blood, and they broke my covenant[c][b], along with all your abominations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sons of a foreign land' / 'foreign sons'; Hebrew literally 'sons of foreignness.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my bread'; in sacrificial context this means God's food offering.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew shifts to 'they broke my covenant,' likely referring to the foreigners just mentioned; some take the sense more generally as continuing the accusation against 'you.'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּהֲבִיאֲכֶם
  chosen: when you brought in
  alternatives:
  - in your bringing in
  - when you brought
  lexicon: HALOT
  rationale: 'The prefixed ב on the infinitive construct with 2mp suffix is temporal here: ''when you brought in.'' ''Brought in'' preserves the causative sense of בוא in Hiphil.'
- source_word: בְּנֵי נֵכָר
  chosen: foreigners
  alternatives:
  - sons of a foreign land
  - foreign sons
  - aliens
  lexicon: HALOT
  rationale: The phrase literally means 'sons of foreignness/foreign land,' an idiom for foreigners. 'Foreigners' is natural modern English and preserves the outsider status without wooden literalism.
- source_word: עַרְלֵי לֵב
  chosen: uncircumcised in heart
  alternatives:
  - foreskinned of heart
  lexicon: HALOT
  rationale: This is a fixed prophetic expression for inward spiritual uncleanness or rebellion. The idiomatic English 'uncircumcised in heart' preserves both the metaphor and its covenantal force.
- source_word: וְעַרְלֵי בָשָׂר
  chosen: uncircumcised in flesh
  alternatives:
  - uncircumcised in body
  lexicon: HALOT
  rationale: Pairs with 'uncircumcised in heart' and refers to literal bodily uncircumcision. 'In flesh' keeps the Hebrew wording and the rhetorical parallelism.
- source_word: לִהְיוֹת בְּמִקְדָּשִׁי
  chosen: to be in my sanctuary
  alternatives:
  - to enter my sanctuary
  - to be within my holy place
  lexicon: HALOT
  rationale: The infinitive 'to be' with 'in my sanctuary' is retained rather than paraphrased as 'to enter,' since the Hebrew emphasizes their presence within the sanctuary precincts.
- source_word: לְחַלְּלוֹ
  chosen: to profane it
  alternatives:
  - to defile it
  lexicon: HALOT
  rationale: חלל in Piel commonly means to profane or desecrate what is holy. 'Profane' best matches the sanctuary context. The suffix most naturally refers back to 'my sanctuary,' though the following apposition 'my house' restates the object.
- source_word: אֶת בֵּיתִי
  chosen: my house
  alternatives:
  - my temple
  lexicon: HALOT
  rationale: בַּיִת in temple contexts can mean temple/house. 'My house' preserves the metaphor and echoes common biblical temple language; the appositional dash clarifies relation to the prior suffix.
- source_word: בְּהַקְרִיבְכֶם
  chosen: when you presented
  alternatives:
  - when you offered
  - in your bringing near
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts means to present/offer. 'Presented' is slightly broader and works well with the direct object 'my food'; sacrificial nuance remains clear from context.
- source_word: לַחְמִי
  chosen: my food
  alternatives:
  - my bread
  - my offering-food
  lexicon: HALOT
  rationale: Though literally 'my bread,' in sacrificial contexts this idiom refers more broadly to God's food offering. 'My food' communicates the idiom's sense in clear English.
- source_word: חֵלֶב וָדָם
  chosen: the fat and the blood
  alternatives:
  - fat and blood
  lexicon: HALOT
  rationale: The pair names sacrificial elements. Including the articles in English gives a natural reference to the specific cultic portions being offered.
- source_word: וַיָּפֵרוּ
  chosen: and they broke
  alternatives:
  - and they violated
  - and they annulled
  lexicon: HALOT
  rationale: The 3mp verb has the foreigners as its nearest and most natural subject. הפר ברית is a standard collocation meaning to break/violate a covenant. 'Broke' is direct and idiomatic.
- source_word: בְּרִיתִי
  chosen: my covenant
  lexicon: HALOT
  rationale: Standard rendering; no contextual reason to vary.
- source_word: אֶל כָּל תּוֹעֲבוֹתֵיכֶם
  lemma: אֶל
  chosen: along with all your abominations
  alternatives:
  - in addition to all your abominations
  - besides all your abominations
  lexicon: HALOT
  rationale: The preposition אֶל after 'they broke my covenant' is somewhat idiomatic, adding this offense to the catalogue of prior offenses. 'Along with' captures the additive force in natural English.
