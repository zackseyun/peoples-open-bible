translation:
  language: es
  text: Pues las naciones insultaron a Jerusalén en su pisoteo[a]; derribó su esplendor del trono de gloria[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pues las naciones vieron a Jerusalén pisoteada». La traducción sigue la revisión auditada que entiende el verbo como «insultaron/reprocharon».'
    reason: textual_variant
  - marker: b
    text: Lit. «del trono de gloria»; también puede entenderse «de un trono glorioso».
    reason: lexical_alternative
lexical_decisions:
- source_word: συνείδισαν
  english_pob_choice: insulted
  chosen_spanish: insultaron
  alternatives_spanish:
  - reprocharon
  - afrentaron
  - avergonzaron
  lexicon: LSJ
  rationale: La revisión inglesa corrige la lectura previa de 'vieron' y entiende el verbo como ὀνειδίζω/insultar, reprochar. En español, 'insultaron' comunica con naturalidad esa acción de afrenta pública sin suavizarla.
- source_word: ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: LSJ
  rationale: '''Las naciones'' conserva el referente colectivo y solemne del texto griego y coincide con el valor habitual de ἔθνη en este tipo de literatura.'
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: N/A
  rationale: Nombre propio estándar en español bíblico.
- source_word: ἐν καταπατήσει
  english_pob_choice: in her trampling
  chosen_spanish: en su humillación
  alternatives_spanish:
  - en su pisoteo
  - mientras era hollada
  - cuando era pisoteada
  lexicon: LSJ
  rationale: El sustantivo expresa la condición de ser pisoteada o aplastada. 'En su humillación' conserva el sentido de abatimiento público en un español más fluido, sin borrar la imagen de menosprecio corporal implícita en el verbo de la primera cláusula.
- source_word: κατέσπασεν
  english_pob_choice: pulled ... down
  chosen_spanish: derribaron
  alternatives_spanish:
  - arrancaron
  - tiraron abajo
  - descolgaron
  lexicon: LSJ
  rationale: El verbo describe una acción fuerte de arrastre hacia abajo. En plural español concuerda con 'las naciones' y 'derribaron' mantiene la fuerza de la imagen de caída.
- source_word: τὸ κάλλος αὐτῆς
  english_pob_choice: her splendor
  chosen_spanish: su esplendor
  alternatives_spanish:
  - su belleza
  - su hermosura
  - su magnificencia
  lexicon: LSJ
  rationale: '''Esplendor'' sigue la decisión inglesa de evitar un sentido meramente estético de κάλλος y expresa mejor la dignidad visible de Jerusalén.'
- source_word: θρόνου δόξης
  english_pob_choice: the throne of glory
  chosen_spanish: trono de gloria
  alternatives_spanish:
  - trono glorioso
  - trono de esplendor
  lexicon: LSJ
  rationale: Se conserva la construcción casi literal por su fuerza imagética y para mantener la posible ambigüedad entre un 'trono de gloria' y un 'trono glorioso'.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión crítica del texto griego: la primera lectura basada en ''vieron'' fue corregida, y la versión inglesa más reciente estabiliza el verbo como ''insulted''. Por eso el español evita la lectura perceptiva y refleja la afrenta pública, manteniendo también la imagen de humillación y descenso del trono.'
  spanish_consistency_notes:
  - Se preservó 'Jerusalén' como nombre propio bíblico estándar.
  - '''Las naciones'' se mantuvo en plural con verbo plural para seguir el sujeto gramatical y semántico del griego.'
  - Se evitó 'SEÑOR' u otras sustituciones teológicas no presentes en el verso.
  - '''Esplendor'' fue preferido a ''belleza'' para no reducir κάλλος a apariencia física.'
