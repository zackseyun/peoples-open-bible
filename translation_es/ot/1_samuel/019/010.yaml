translation:
  language: es
  text: Saúl buscó herir a David con la lanza contra la pared[a], pero se le escapó de la presencia de Saúl, y golpeó la lanza contra la pared. Entonces David huyó y escapó esa noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «buscar herir con la lanza a David y a la pared»; la idea es que Saúl quería clavar a David contra la pared con la lanza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבַקֵּשׁ
  english_pob_choice: sought
  chosen_spanish: buscó
  alternatives_spanish:
  - intentó
  - trató de
  lexicon: HALOT
  rationale: בקש puede expresar 'buscar' o 'intentar'. En este contexto narrativo de agresión, 'buscó' conserva la forma verbal del hebreo y comunica intención hostil de manera natural en español.
- source_word: לְהַכּוֹת
  english_pob_choice: to strike
  chosen_spanish: herir
  alternatives_spanish:
  - golpear
  - dar un golpe a
  lexicon: HALOT
  rationale: El infinitivo de נכה es literalmente 'golpear' o 'herir'. Dado el contexto de la lanza dirigida a David, 'herir' expresa mejor el intento de causar daño sin sonar excesivamente mecánico.
- source_word: בַּֽחֲנִית
  english_pob_choice: with the spear
  chosen_spanish: con la lanza
  alternatives_spanish:
  - con la jabalina
  - por medio de la lanza
  lexicon: HALOT
  rationale: El hebreo usa ב de modo instrumental. 'Lanza' es una opción clara y bíblicamente adecuada en español para חנית; 'jabalina' sería menos natural aquí.
- source_word: בְּדָוִד וּבַקִּיר
  english_pob_choice: David to the wall
  chosen_spanish: David contra la pared
  alternatives_spanish:
  - David y la pared
  - David a la pared
  lexicon: HALOT
  rationale: La construcción hebrea es comprimida y alude al intento de empalar o fijar a David contra la pared. 'Contra la pared' comunica la relación espacial y el sentido del ataque sin perder la tensión del texto.
- source_word: וַיִּפְטַר
  english_pob_choice: he slipped away
  chosen_spanish: él se apartó
  alternatives_spanish:
  - él se deslizó
  - él se libró
  lexicon: HALOT
  rationale: פטר aquí transmite la idea de soltarse o salir libremente de una situación peligrosa. 'Se apartó' evita sobreinterpretar el matiz y funciona bien con la frase 'de la presencia de Saúl'.
- source_word: מִפְּנֵי שָׁאוּל
  english_pob_choice: from Saul’s presence
  chosen_spanish: de la presencia de Saúl
  alternatives_spanish:
  - de delante de Saúl
  - de Saúl
  lexicon: HALOT
  rationale: La expresión literal hebrea es 'de la faz/presencia de Saúl'. 'De la presencia de Saúl' preserva el idioma bíblico y sigue siendo transparente para el lector.
- source_word: וַיַּךְ אֶת הַחֲנִית בַּקִּיר
  english_pob_choice: he struck the spear into the wall
  chosen_spanish: clavó la lanza en la pared
  alternatives_spanish:
  - golpeó la lanza contra la pared
  - hirió la lanza en la pared
  lexicon: HALOT
  rationale: El hebreo repite נכה para describir el impacto de la lanza en la pared. 'Clavó' refleja el resultado del golpe —la lanza quedó fija en la pared— y expresa bien la escena, que en el inglés POB se explica como el intento de empalar a David.
- source_word: נָס
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - fledió
  - corrió
  lexicon: HALOT
  rationale: נוס es el verbo normal de huida. 'Huyó' es el equivalente natural en español y conserva la fuerza narrativa.
- source_word: וַיִּמָּלֵט
  english_pob_choice: escaped
  chosen_spanish: escapó
  alternatives_spanish:
  - se libró
  - logró escapar
  lexicon: HALOT
  rationale: מלט expresa escapar o ser librado. 'Escapó' mantiene el paralelismo con 'huyó' y comunica el desenlace sin añadir matices no presentes.
- source_word: בַּלַּיְלָה הוּא
  english_pob_choice: that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - esa noche
  - esa misma noche
  lexicon: HALOT
  rationale: La expresión idiomática narrativa se reproduce de forma natural con 'aquella noche', que conserva la referencia temporal inmediata del hebreo.
translation_notes:
  revision_awareness: 'El auditorio inglés revisó una paráfrasis más interpretativa (''pin David to the wall'') hacia una redacción más literal (''strike David with the spear against the wall''). La versión española sigue esa revisión: mantiene el impulso literal del hebreo, pero usa una formulación idiomática en español (''herir... contra la pared'') que conserva la escena y el paralelismo verbal de נכה. No se introducen decisiones doctrinales adicionales.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - '''Lanza'' se usa de forma consistente para חנית en este contexto bélico.'
  - Se conserva la distinción narrativa entre 'huyó' (movimiento de fuga) y 'escapó' (resultado consumado).
  - Se evita 'siervo' o terminología eclesiástica ajena al texto; el pasaje es estrictamente narrativo.
