    issue: Forma principal «Malluc» en lugar de «Malluk»
    rationale: El control inglés eligió «Malluk» como forma principal y relegó «Malluch» a nota. En español, «Malluc» puede mencionarse como variante de transliteración, pero cambiar la forma principal sin necesidad debilita la trazabilidad con el audit trail.
  - severity: medium
    issue: «Baaná» altera innecesariamente la transliteración de בַּעֲנָה
    rationale: La forma con tilde final no está respaldada por el audit trail y adapta más de la cuenta un nombre propio. «Baanah» preserva mejor la forma hebrea y coincide con la decisión inglesa documentada.
  - severity: low
