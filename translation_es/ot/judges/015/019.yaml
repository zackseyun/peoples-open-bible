  language: en
  yaml_path: translation/ot/judges/015/019.yaml
  text: Then God split open the hollow place that is at Lehi[a], and water came out from it. When he drank, his spirit returned and he revived. Therefore he called its name En-hakkore[b], which is at Lehi to this day.
  footnotes:
  - marker: a
    text: En-hakkore likely means 'Spring of the Caller' or 'Spring of the one who called,' referring to Samson's cry to God.
    reason: lexical_alternative
  - marker: b
    text: Or, according to another reading of the scene, 'God split open the hollow in the jawbone, and water came out of it.'
    reason: alternative_reading
