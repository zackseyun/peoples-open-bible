  text: 그리하여 그들이 다시 위협한 뒤에 사도들을 놓아 보냈으니, 그들을 처벌할 방법을 찾지 못하였기 때문이고, 또 백성을 두려워하였기 때문입니다. 모든 사람이 그 일어난 일에 대하여 하나님께 영광을 돌리고 있었기 때문입니다.
