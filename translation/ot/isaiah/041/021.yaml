  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Forensic imagery in the divine challenge
  chosen_reading: courtroom language ('Present your case ... bring forward your arguments')
  alternative_readings:
  - more literal spatial language ('Come near your dispute ... bring near your strong things')
  rationale: The verse is part of a legal challenge scene in which the LORD summons opposing claimants to state their case. Optimal equivalence favors explicit courtroom English where the Hebrew legal idiom would otherwise sound opaque.
