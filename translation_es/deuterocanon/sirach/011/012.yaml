translation:
  language: es
  text: Hijo mío[a], si no corres, no alcanzarás; y si no buscas, no hallarás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testigo griego en este punto difiere notablemente: habla de una persona perezosa, falta de fuerzas y abundante en pobreza, a quien los ojos del Señor miran para bien y levantan de su humillación. Por eso, aquí se sigue el hebreo como testigo principal, conservando el griego como una tradición textual alternativa significativa.'
    reason: textual_variant
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Mi hijo
  - Hijo mío
  lexicon: HALOT
  rationale: El vocativo filial masculino se conserva de manera natural en español con «Hijo mío». Mantiene el tono sapiencial de instrucción de padre a hijo sin neutralizar el género del original.
- source_word: תָּרוּץ
  english_pob_choice: run
  chosen_spanish: corres
  alternatives_spanish:
  - corres deprisa
  - te apresuras
  - corres
  lexicon: HALOT
  rationale: «Correr» reproduce la imagen concreta y proverbial del hebreo. En español, el futuro «si no corres» comunica la condición de esfuerzo/acción sin añadir interpretación ajena.
- source_word: תַגִּיעַ
  english_pob_choice: attain
  chosen_spanish: llegarás
  alternatives_spanish:
  - alcanzarás
  - obtendrás
  - llegarás
  lexicon: HALOT
  rationale: El hebreo expresa llegar a una meta o alcanzar el resultado previsto. «Llegarás» conserva la imagen espacial del original y funciona bien en paralelo con «buscar/hallar».
- source_word: תְּבַקֵּשׁ
  english_pob_choice: seek
  chosen_spanish: buscas
  alternatives_spanish:
  - buscas
  - procures
  - andas buscando
  lexicon: HALOT
  rationale: «Buscar» es el equivalente más natural de בקש y preserva la pareja proverbial buscar/hallar. En español, evita una paráfrasis más teológica o abstracta.
- source_word: תִמְצָא
  english_pob_choice: find
  chosen_spanish: hallarás
  alternatives_spanish:
  - encontrarás
  - hallarás
  lexicon: HALOT
  rationale: «Hallar» mantiene el paralelismo tradicional con «buscar» y suena sobrio y bíblico en español, sin perder claridad.
theological_decisions:
- issue: Elección del testigo principal frente al paralelo griego muy distinto
  english_pob_reading: The Hebrew here is therefore followed as the primary witness, with the Greek preserved as a significant alternative textual tradition.
  chosen_spanish_reading: Se sigue el hebreo como testigo principal; el griego se reconoce como una tradición textual alternativa importante.
  alternative_spanish_readings:
  - Traducir según el sentido griego sobre debilidad, pobreza y elevación divina.
  - Unir en el texto principal el proverbio hebreo con la idea griega de humillación y restauración.
  rationale: El hebreo conservado ofrece un proverbio claro de exhortación; el griego, en cambio, presenta un contenido sustancialmente diferente. Para transparencia textual, la traducción principal sigue el hebreo y deja constancia de la divergencia griega.
  doctrine_reference: 'PHILOSOPHY.md ''What we are translating'' y DOCTRINE.md §Translation philosophy #1'
- issue: Tono sapiencial y vocativo filial
  english_pob_reading: My son
  chosen_spanish_reading: Hijo mío
  alternative_spanish_readings:
  - Mi hijo
  - Hijo mío
  rationale: La dirección sapiencial del texto requiere un vocativo filial directo y masculino. «Hijo mío» conserva el tono instructivo tradicional sin caer en una neutralización no respaldada por el hebreo.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
translation_notes:
  revision_awareness: Se revisó el cruce hebreo-griego y no se incorporó la lectura griega al texto principal, porque el hebreo transmitido ofrece un proverbio coherente y el audit trail ya identifica la divergencia como sustancial; no hubo cambios respecto del pase más reciente.
  spanish_consistency_notes:
  - Se mantiene «Hijo mío» para el vocativo sapiencial, en coherencia con la política de preservar el masculino singular cuando el hebreo lo marca explícitamente.
  - Se prefirió «hallar» junto a «buscar» por su paralelismo bíblico y su claridad en español.
  - No se usó un equivalente genérico como «niño» o «hijo/a», porque el testimonio base es masculinosingular y el contexto literario es el de instrucción sapiencial.
