review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general el sentido del griego: mantiene la afirmación directa de que la limosna rescata de la muerte y limpia el pecado, y conserva la promesa final de vida. Sin embargo, contiene un error textual grave (''toda pecad[a]''), una nota mal anclada y una formulación poco natural en español para δικαιοσύνας.'
  spanish_quality_summary: La redacción es mayormente comprensible, pero 'toda pecad[a]' es incorrecto, 'ella' suena innecesariamente enfático, y 'justicias' resulta poco natural y poco eclesial en este contexto. 'Serán llenados de vida' es aceptable, aunque 'serán llenos de vida' o 'serán colmados de vida' serían más idiomáticos; no es necesario forzar ese cambio si se prioriza cercanía formal.
  glossary_alignment: '''Limosna'' para ἐλεημοσύνη y ''rescata'' para ῥύεται están bien. Para δικαιοσύνας, el proyecto favorece normalmente ''justicia/rectitud'' según contexto; aquí el plural práctico puede expresarse mejor en español como ''obras justas'' en vez de ''justicias'', preservando la fuerza concreta sin sonar extraño. La tensión teológica del versículo se conserva correctamente.'
  issues:
  - severity: high
    issue: Error de texto en 'toda pecad[a]'
    rationale: No es español válido y distorsiona πᾶσαν ἁμαρτίαν, que debe traducirse como 'todo pecado' o 'cada pecado'.
  - severity: high
    issue: La nota [a] está anclada en 'muerte' pero su contenido corresponde a toda la cláusula final
    rationale: El marcador debe aparecer donde la alternativa aplica. La nota alternativa ofrece una relectura de la segunda oración completa, no de 'muerte'.
  - severity: medium
    issue: '''Justicias'' es una elección poco natural en español para δικαιοσύνας'
    rationale: Aunque intenta reflejar el plural griego, en español bíblico general suena extraña y puede confundir. 'Obras justas' comunica mejor la concreción práctica reconocida por el propio expediente inglés.
  - severity: low
    issue: Uso innecesario de 'ella' en 'y ella limpiará'
    rationale: El pronombre explícito no es necesario en español y suena pesado; 'y limpiará' preserva bien la referencia a la limosna.
  revised_spanish_text: La limosna rescata de la muerte y limpiará todo pecado. Los que practican limosnas y obras justas[a] serán llenados de vida.
  revised_footnotes:
  - marker: a
    text: 'O: «Los que practican limosna y justicia serán llenados de vida».'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el error textual ''toda pecad[a]'' a ''todo pecado'', se elimina el pronombre innecesario ''ella'', se reemplaza ''justicias'' por ''obras justas'' para una lectura natural y fiel al sentido práctico del plural δικαιοσύνας, y se reubica la única nota para que ancle correctamente en la cláusula donde aplica la alternativa inglesa preservada. No hace falta adjudicación adicional: el ajuste es claro, textual y estilístico, no una disputa doctrinal irresoluble.'
