translation:
  language: es
  text: Y darás la plata a Aarón y a sus hijos, como el precio de redención[a] por los que están en exceso entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «por los redimidos de los que están en exceso entre ellos». El hebreo comprime la idea en una cadena constructa; el texto principal la desglosa para que se lea con claridad en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה
  english_pob_choice: And you shall give
  chosen_spanish: Y darás
  alternatives_spanish:
  - Y deberás dar
  - Entonces darás
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal directiva en contexto instructivo. En español, el futuro simple mantiene bien la fuerza exhortativa y la secuencia narrativa sin volverla más pesada con un auxiliar como «deberás».
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: el dinero
  alternatives_spanish:
  - la plata
  - la plata monetaria
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice «la plata», en este contexto se trata del pago monetario. «Dinero» comunica con naturalidad la función del objeto en español, sin perder la referencia a una compensación real.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  english_pob_choice: to Aaron and to his sons
  chosen_spanish: a Aarón y a sus hijos
  alternatives_spanish:
  - a Aarón y a sus hijos varones
  - a Aarón y a su descendencia
  lexicon: HALOT
  rationale: Se conserva la repetición del destinatario en forma natural en español. «Hijos» refleja con precisión el sentido genealógico y sacerdotal del hebreo, sin introducir una reinterpretación más abstracta.
- source_word: פְּדוּיֵי
  english_pob_choice: as the redemption price for
  chosen_spanish: como precio de redención
  alternatives_spanish:
  - como rescate
  - como pago de redención
  lexicon: HALOT
  rationale: El constructo de פדה concentra la idea de redención vinculada a una suma entregada. «Precio de redención» mantiene la relación entre el pago y la liberación, preservando la tensión lexical entre acto redentor y monto pagado.
- source_word: הָעֹדְפִים
  english_pob_choice: those among them who are in excess
  chosen_spanish: los que exceden entre ellos
  alternatives_spanish:
  - los que sobran entre ellos
  - los excedentes entre ellos
  - los que están en exceso entre ellos
  lexicon: HALOT
  rationale: El participio de עודף señala a los que quedan por encima del número correspondiente. «Los que exceden entre ellos» conserva la idea de excedente sin expandir demasiado la construcción hebrea compacta.
- source_word: בָּהֶם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - de entre ellos
  lexicon: HALOT
  rationale: La preposición con pronombre expresa aquí relación interna al grupo censado. «Entre ellos» es la forma más clara y natural en español para ese valor distributivo/relacional.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés: la decisión clave sigue siendo cómo desglosar en español la cadena constructa פְּדוּיֵי הָעֹדְפִים בָּהֶם. No se documentan revisiones posteriores ni cambios textuales, y el estado de concordancia es alto.'
  spanish_consistency_notes:
  - Se mantiene «Aarón» como nombre propio y «hijos» para el grupo sacerdotal masculino, conforme al paralelismo del hebreo y al audit trail inglés.
  - Se eligió «dinero» en lugar de «plata» por claridad idiomática, aunque la nota preserva la alternativa más literal.
  - La nota al pie conserva la alternativa formal que mantiene más de cerca la sintaxis constructa del hebreo sin sobrecargar el texto principal.
