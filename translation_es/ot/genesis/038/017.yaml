translation:
  language: es
  text: 'Y él dijo: «Yo enviaré un cabrito del rebaño». Y ella dijo: «Si das una prenda[a] hasta que lo envíes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un depósito» o «una garantía» para «una prenda» (עֵרָבוֹן).
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּדִי עִזִּים
  english_pob_choice: a young goat
  chosen_spanish: un cabrito
  alternatives_spanish:
  - un cabrito de las cabras
  - un macho cabrío joven
  lexicon: HALOT
  rationale: La expresión hebrea nombra un animal joven del rebaño caprino. «Cabrito» comunica de manera natural y breve la idea de un macho joven de las cabras, sin añadir matices innecesarios. Se conserva la referencia específica al animal pedido en el diálogo.
- source_word: מִן הַצֹּאן
  english_pob_choice: from the flock
  chosen_spanish: de las ovejas
  alternatives_spanish:
  - del rebaño
  - de la majada
  lexicon: HALOT
  rationale: צֹאן puede abarcar ganado menor, especialmente ovejas y cabras. Como el animal ya está especificado como cabrito, «de las ovejas» sigue la solución inglesa de evitar redundancia y mantiene un español natural, aunque con una leve concretización del colectivo.
- source_word: עֵרָבוֹן
  english_pob_choice: a pledge
  chosen_spanish: una prenda
  alternatives_spanish:
  - un depósito
  - una garantía
  - un empeño
  lexicon: HALOT
  rationale: El sustantivo designa algo entregado como seguridad o garantía hasta el cumplimiento posterior. «Prenda» conserva ese valor jurídico-comercial en español bíblico y deja abierta la alternativa semántica documentada en la nota.
- source_word: אִם תִּתֵּן
  english_pob_choice: If you will give
  chosen_spanish: Si das
  alternatives_spanish:
  - Si vas a dar
  - Si dieras
  lexicon: HALOT
  rationale: El hebreo introduce una condición directa. En español, el presente de subjuntivo/indicativo simple en condicionales directas puede sonar más natural que un futuro perifrástico; «Si das» mantiene la fuerza condicional sin sobretraducir.
- source_word: עַד שָׁלְחֶךָ
  english_pob_choice: until you send it
  chosen_spanish: hasta que lo envíes
  alternatives_spanish:
  - hasta que lo mandes
  - hasta tu enviarlo
  lexicon: HALOT
  rationale: El sufijo verbal indica «tu enviar». En español, «lo» restituye el objeto implícito por el contexto (el cabrito prometido) y «hasta que lo envíes» expresa con claridad la condición temporal.
- source_word: אָנֹכִי אֲשַׁלַּח
  english_pob_choice: I will send
  chosen_spanish: Yo enviaré
  alternatives_spanish:
  - Yo mismo enviaré
  - Enviaré
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis. Se conserva con «Yo» para reflejar el relieve discursivo, aunque el español podría omitirlo sin pérdida de sentido.
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el audit trail inglés. No se introdujeron revisiones textuales ni cambios doctrinales; la única decisión sensible es la equivalencia contextual de עֵרָבוֹן, preservando la alternativa semántica documentada por la POB inglesa.
  spanish_consistency_notes:
  - Se usó «Yahvé» en otros pasajes por norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «cabrito» como equivalente idiomático de גְּדִי עִזִּים y se evitó un calco rígido.
  - La marca de nota [a] aparece en el sintagma «una prenda[a]» para reflejar la alternativa lexical documentada.
