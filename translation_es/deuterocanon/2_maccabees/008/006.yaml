translation:
  language: es
  text: Y llegando de improviso a ciudades y al campo, los incendiaba; y, apoderándose de lugares estratégicos[a], ponía en fuga a no pocos de los enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «posiciones ventajosas» para ἐπικαίρους τόπους.
    reason: lexical_alternative
lexical_decisions:
- source_word: πόλεις
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - pueblos
  - villas
  lexicon: LSJ
  rationale: En este contexto militar, πόλεις se refiere a centros urbanos; «ciudades» conserva el contraste con χώρας y es natural en español.
- source_word: χώρας
  english_pob_choice: countryside
  chosen_spanish: campos
  alternatives_spanish:
  - campo
  - regiones rurales
  - tierras
  lexicon: LSJ
  rationale: La pareja πόλεις / χώρας contrasta lo urbano con lo rural. «Campos» comunica de forma clara el territorio no urbano sin imponer el matiz político de «regiones».
- source_word: ἀπροσδοκήτως
  english_pob_choice: unexpectedly
  chosen_spanish: inesperadamente
  alternatives_spanish:
  - de improviso
  - sin aviso
  - súbitamente
  lexicon: LSJ
  rationale: El adverbio expresa llegada no prevista; «inesperadamente» es fiel y sobrio en español contemporáneo.
- source_word: ἐρχόμενος
  english_pob_choice: coming upon
  chosen_spanish: al venir sobre
  alternatives_spanish:
  - al presentarse contra
  - al acercarse
  - al caer sobre
  lexicon: LSJ
  rationale: El participio describe la acción continua del avance hostil. «Al venir sobre» mantiene el movimiento hacia los lugares y la fuerza de irrupción del contexto.
- source_word: ἐνεπίμπρα
  english_pob_choice: set them on fire
  chosen_spanish: las incendiaba
  alternatives_spanish:
  - las prendía fuego
  - las quemaba
  lexicon: LSJ
  rationale: 'El verbo es causativo: no solo quemar, sino incendiar. «Las incendiaba» expresa bien la acción repetida e iterativa del imperfecto.'
- source_word: ἐπικαίρους τόπους
  english_pob_choice: strategic places
  chosen_spanish: lugares estratégicos
  alternatives_spanish:
  - posiciones estratégicas
  - lugares oportunos
  - posiciones ventajosas
  lexicon: LSJ
  rationale: La decisión inglesa optó por una equivalencia militar interpretativa. En español, «lugares estratégicos» conserva esa lectura y resulta idiomático; «oportunos/ventajosos» quedaría menos claro en este contexto bélico.
- source_word: ἀπολαμβάνων
  english_pob_choice: seizing
  chosen_spanish: apoderándose de
  alternatives_spanish:
  - ocupando
  - tomando posesión de
  - capturando
  lexicon: LSJ
  rationale: Aplicado a lugares, el verbo implica tomar control. «Apoderándose de» mantiene la fuerza activa y militar del participio.
- source_word: οὐκ ὀλίγους
  english_pob_choice: not a few
  chosen_spanish: a no pocos
  alternatives_spanish:
  - a muchos
  - a bastantes
  - a un buen número de
  lexicon: LSJ
  rationale: Se preserva la litotes del griego y de la decisión inglesa. «A no pocos» suena natural en español y deja visible la forma retórica.
- source_word: τῶν πολεμίων
  english_pob_choice: of the enemies
  chosen_spanish: de los enemigos
  alternatives_spanish:
  - del enemigo
  lexicon: LSJ
  rationale: El plural griego se conserva en plural español para no borrar la referencia a múltiples adversarios.
- source_word: τροπούμενος
  english_pob_choice: put to flight
  chosen_spanish: ponía en fuga
  alternatives_spanish:
  - rutinaba
  - hacía huir
  - derrotaba
  lexicon: LSJ
  rationale: El sentido es hacer retroceder o huir al enemigo. «Ponía en fuga» preserva el matiz militar mejor que un verbo más genérico como «derrotaba».
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el ajuste revisado del inglés auditado: el participio inicial se refleja con una construcción española que expresa acción simultánea y continua («al venir sobre...»), se mantiene el orden natural del español sin perder la litotes de οὐκ ὀλίγους, y se conserva el matiz militar de ἐπικαίρους τόπους con una nota de alternativa lexical.'
  spanish_consistency_notes:
  - Se prefirió «Y» al inicio para reflejar la continuidad narrativa del griego.
  - Se mantuvo el imperfecto («incendiaba», «ponía») para expresar acción repetida o habitual en la secuencia narrativa.
  - «Campos» se eligió como equivalente funcional de χώρας sin borrar el contraste urbano-rural.
  - No se usó «SEÑOR» ni terminología teológica ajena al versículo.
  - La nota al pie marca una alternativa real de traducción, no una glosa doctrinal.
