revisions:
- from: Y llevó a Jehoiaquín a Babilonia, junto con la madre del rey, las esposas del rey, sus oficiales y los guerreros poderosos[a][b][c]; los llevó en exilio desde Jerusalén a Babilonia.
  to: Y llevó a Jehoiaquín a Babilonia, junto con la madre del rey[a], las esposas del rey, sus oficiales[b] y los poderosos de la tierra[c]; los llevó al exilio desde Jerusalén a Babilonia.
  rationale: Se corrigió una sobreinterpretación semántica ('guerreros poderosos' → 'los poderosos de la tierra'), se mejoró la naturalidad y fidelidad idiomática de la cláusula final ('en exilio' → 'al exilio'), y se reubicaron las notas para que cada marcador corresponda al término que explica.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:54:34Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: deportación de Jehoiaquín a Babilonia, enumeración de los acompañantes, y resumen final del traslado de Jerusalén a Babilonia. Sin embargo, dos decisiones no preservan con suficiente fidelidad el sentido fuente/documentado: (1) אולי הארץ no justifica ''guerreros poderosos'', que introduce un matiz militar más estrecho que el hebreo y que las notas inglesas mantienen abierto como ''mighty men'' / ''nobles''; (2) ''los llevó en exilio'' es poco idiomático en español y no reproduce tan bien como ''al exilio'' la construcción הוֹלִיךְ גּוֹלָה.'
  spanish_quality_summary: 'El texto es mayormente claro y legible, pero suena algo forzado en dos puntos: la colocación de las notas [a][b][c] al final de ''guerreros poderosos'' no corresponde a sus anclajes semánticos, y ''en exilio'' resulta antinatural en español bíblico contemporáneo. ''Junto con la madre del rey...'' funciona bien, aunque conviene anclar cada nota al término pertinente.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. ''Jehoiaquín'', ''Babilonia'', ''Jerusalén'' y ''oficiales'' son adecuados. La principal desviación está en אולי הארץ: conviene ''los poderosos de la tierra'' o similar, no ''guerreros poderosos''. También debe conservarse la alternativa de ''eunucos'' para סָרִיסָיו en nota, pero anclada a ''oficiales''.'
  issues:
  - severity: medium
    issue: '''los guerreros poderosos'' sobredetermina אולי הארץ'
    rationale: El hebreo describe una élite/poderosos del país, pero no especifica 'guerreros'. La POB inglesa conserva alternativas 'mighty men' / 'nobles of the land'. En español, 'los poderosos de la tierra' mantiene mejor la amplitud semántica.
  - severity: medium
    issue: '''los llevó en exilio'' es poco idiomático'
    rationale: Aunque busca reflejar גּוֹלָה como sustantivo, en español natural la construcción correcta es 'los llevó al exilio' o 'los llevó desterrados'. 'Al exilio' conserva explícitamente el motivo del destierro y mejora la legibilidad.
  - severity: low
    issue: Las notas [a][b][c] están ancladas en un solo lugar incorrecto
    rationale: La nota sobre 'eunucos' corresponde a 'sus oficiales'; la de 'la madre del rey' corresponde a esa frase; y la de 'los poderosos/nobles de la tierra' corresponde al grupo final. La ubicación actual puede confundir al lector.
  revised_spanish_text: Y llevó a Jehoiaquín a Babilonia, junto con la madre del rey[a], las esposas del rey, sus oficiales[b] y los poderosos de la tierra[c]; los llevó al exilio desde Jerusalén a Babilonia.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: ''la madre del rey''; también podría expresarse como ''la reina madre'', pero aquí se conserva la formulación familiar del texto.'
    reason: lexical_alternative
  - marker: b
    text: O 'sus eunucos'; el término hebreo puede referirse específicamente a eunucos o, de manera más general, a oficiales de la corte.
    reason: lexical_alternative
  - marker: c
    text: O 'los hombres poderosos de la tierra' o 'los nobles de la tierra'.
    reason: lexical_alternative
  revision_rationale: Se corrigió una sobreinterpretación semántica ('guerreros poderosos' → 'los poderosos de la tierra'), se mejoró la naturalidad y fidelidad idiomática de la cláusula final ('en exilio' → 'al exilio'), y se reubicaron las notas para que cada marcador corresponda al término que explica.
