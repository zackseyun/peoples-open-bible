translation:
  language: es
  text: Y las ciudades en la extremidad de la tribu de los hijos de Judá[a], hacia la frontera de Edom, en el Néguev[b], fueron Kabzeel, Eder y Jagur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde el extremo de la tribu de los hijos de Judá»; la expresión hebrea se refiere a la extremidad o borde exterior del territorio de Judá.
    reason: lexical_alternative
  - marker: b
    text: «Néguev» también puede traducirse como «sur» o «región meridional». Aquí probablemente se refiere al distrito sureño específico de Judá.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - y fueron
  lexicon: HALOT
  rationale: El hebreo introduce la lista con una forma narrativa del verbo ser/estar. En español, «fueron» conserva el arranque listado y suena natural antes de enumerar topónimos.
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - estas eran las ciudades
  - las poblaciones
  lexicon: HALOT
  rationale: Se mantiene el sustantivo definido plural para respetar la estructura formal del hebreo y preparar la enumeración de lugares.
- source_word: מִקְצֵה
  english_pob_choice: at the extremity of
  chosen_spanish: en la extremidad de
  alternatives_spanish:
  - desde el extremo de
  - en el extremo de
  lexicon: HALOT
  rationale: «מִקְצֵה» expresa borde, extremo o extremidad territorial. «En la extremidad de» conserva el sentido espacial formal del POB inglés sin volverlo demasiado libre.
- source_word: לְמַטֵּה
  english_pob_choice: of the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - pertenecientes a la tribu de
  - para la tribu de
  lexicon: HALOT
  rationale: «מַטֶּה» aquí es la división tribal. «De la tribu de» es el equivalente español más claro y fiel para un contexto territorial.
- source_word: בְנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - el pueblo de Judá
  - los descendientes de Judá
  lexicon: HALOT
  rationale: Se preserva la formulación literal «hijos de Judá», como hace el POB inglés, porque es una designación tribal estable y el plural masculino no plantea problema de claridad en español bíblico.
- source_word: אֶל גְּבוּל אֱדוֹם
  english_pob_choice: toward the border of Edom
  chosen_spanish: hacia la frontera de Edom
  alternatives_spanish:
  - junto a la frontera de Edom
  - al borde de Edom
  lexicon: HALOT
  rationale: La preposición «אֶל» aporta orientación. «Hacia la frontera de Edom» reproduce esa direccionalidad sin afirmar contacto exacto.
- source_word: בַּנֶּגְבָּה
  english_pob_choice: in the Negev
  chosen_spanish: en el Néguev
  alternatives_spanish:
  - en el sur
  - en la región meridional
  lexicon: HALOT
  rationale: Aquí נֶגֶב parece señalar la región geográfica del sur de Judá, no solo la dirección cardinal. Se conserva el nombre regional «Néguev» como en el POB inglés.
- source_word: קַבְצְאֵל
  english_pob_choice: Kabzeel
  chosen_spanish: Cabseel
  alternatives_spanish:
  - Kabzeel
  lexicon: HALOT
  rationale: Se translitera el topónimo con adaptación ortográfica española más natural, manteniendo la forma reconocible del nombre propio.
- source_word: וְעֵדֶר
  english_pob_choice: Eder
  chosen_spanish: Eder
  alternatives_spanish:
  - Éder
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma simple y estándar en español bíblico.
- source_word: וְיָגוּר
  english_pob_choice: Jagur
  chosen_spanish: Jagur
  alternatives_spanish:
  - Yagur
  lexicon: HALOT
  rationale: Se sigue la convención del POB inglés para el topónimo, usando «Jagur» como forma más asentada en español bíblico.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «extremity» por encima de una expresión más libre; por eso el español usa una solución formal equivalente («en la extremidad de») y evita añadir puntuación innecesaria antes de la lista de nombres.
  spanish_consistency_notes:
  - 'Se mantiene la terminología territorial de forma consistente: «tribu», «frontera», «Néguev».'
  - Los nombres propios se transliteran con criterio español legible, sin perder identificabilidad.
  - La nota textual/lexical conserva la tensión entre un valor locativo («en la extremidad de») y una posible lectura de procedencia («desde el extremo de»).
