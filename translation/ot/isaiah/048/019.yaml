id: ISA.48.19
reference: Isaiah 48:19
source:
  edition: WLC
  text: וַ/יְהִ֤י כַ/חוֹל֙ זַרְעֶ֔/ךָ וְ/צֶאֱצָאֵ֥י מֵעֶ֖י/ךָ כִּ/מְעֹתָ֑י/ו לֹֽא יִכָּרֵ֧ת וְֽ/לֹא יִשָּׁמֵ֛ד שְׁמ֖/וֹ מִ/לְּ/פָנָֽ/י־־׃
translation:
  text: Your offspring would have been like the sand[a], and the descendants from your body like its grains[b]; their name would not have been cut off or destroyed from before me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like its particles' or 'like its pebbles'; the Hebrew refers to the small units of the sand.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his name'; the singular may personify the offspring as a collective line. Some translations render 'their name' or 'its name.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: would have been
  alternatives:
  - would be
  - became
  lexicon: HALOT
  rationale: In context this continues the unrealized result of the preceding conditional lament (v. 18), so an English counterfactual perfect best conveys the force rather than a simple past 'became.'
- source_word: כַחוֹל
  chosen: like the sand
  alternatives:
  - as the sand
  lexicon: HALOT
  rationale: חוֹל commonly denotes sand. 'Like the sand' is idiomatic modern English and preserves the simile of innumerable abundance.
- source_word: זַרְעֶךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: זֶרַע can mean seed literally or offspring/descendants metaphorically. Here the human lineage sense is clear. 'Offspring' is natural English while preserving the collective singular force.
- source_word: וְצֶאֱצָאֵי
  chosen: and the descendants
  alternatives:
  - and your offspring
  - and those who come forth
  lexicon: HALOT
  rationale: The noun refers to progeny issuing forth from someone. 'Descendants' distinguishes it from the prior זֶרַע while keeping the parallelism of posterity.
- source_word: מֵעֶיךָ
  chosen: from your body
  alternatives:
  - from your loins
  - from your inward parts
  - from your womb
  lexicon: HALOT
  rationale: Literally from the inward parts/bowels, but in genealogical contexts it denotes physical descent. 'From your body' is clear, dignified, and avoids archaic 'loins' while preserving corporeal origin.
- source_word: כִּמְעֹתָיו
  chosen: like its grains
  alternatives:
  - like its pebbles
  - like its particles
  lexicon: HALOT
  rationale: The suffix most naturally refers back to the sand; the noun denotes small units/particles. 'Grains' fits the image of sand in English better than the more literal but less natural alternatives.
- source_word: לֹא יִכָּרֵת
  chosen: would not have been cut off
  alternatives:
  - would not be cut off
  - would not have perished
  lexicon: HALOT
  rationale: כרת in the Niphal often means to be cut off, especially of a name or line. The counterfactual sense matches the verse's syntax and context.
- source_word: וְלֹא יִשָּׁמֵד
  chosen: or destroyed
  alternatives:
  - or annihilated
  - or wiped out
  lexicon: HALOT
  rationale: שׁמד in the Niphal denotes being destroyed or exterminated. 'Destroyed' is straightforward and preserves the intensifying parallel with 'cut off.'
- source_word: שְׁמוֹ
  chosen: his name
  alternatives:
  - its name
  - their name
  lexicon: HALOT
  rationale: The Hebrew singular with masculine suffix is retained as 'his name.' It likely personifies the collective offspring/line in singular form. This is more gender-accurate to the source than flattening to a plural.
- source_word: מִלְּפָנַי
  chosen: from before me
  alternatives:
  - from my presence
  - before me
  lexicon: HALOT
  rationale: Literally 'from before my face/presence.' 'From before me' preserves the Hebrew idiom and solemnity; 'from my presence' is possible but slightly more interpretive.
