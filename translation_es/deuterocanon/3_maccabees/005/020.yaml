revisions:
- from: Teniendo una crueldad peor que la de Fálaris[a], dijo que debían estar agradecidos por el descanso de hoy en el sueño[b]; pero, habiendo sido conservados con vida hasta el día que se acerca, prepara de la misma manera a los elefantes para la destrucción de los judíos impíos[c].
  to: Con una crueldad peor que Fálaris[a], dijo que ellos debían agradecer el respiro de hoy en el sueño[b]; pero, después de haberlos mantenido con vida hasta el día que se acerca, prepara de la misma manera a los elefantes para la destrucción de los judíos sin ley[c].
  rationale: 'Se ajusta el texto para reflejar mejor el sentido del griego y la racionalidad documentada del POB: se sustituye el giro forzado «Teniendo» por «Con», se mejora la naturalidad de la expresión sobre el sueño de hoy, y se corrige ἀθεμίτων a «sin ley», en línea con la decisión auditada «lawless». También se simplifica la comparación con Fálaris para evitar una elipsis innecesaria.'
