review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: halago en presencia seguido de hostilidad posterior. Conserva adecuadamente ἀπέναντι τῶν ὀφθαλμῶν σου, ἐκθαυμάσει, ὕστερον δὲ y la imaginería corporal de διαστρέψει τὸ στόμα αὐτοῦ. Sin embargo, el cierre «a tus palabras, se ofenderá» no suena natural en español y no expresa con claridad la relación ocasional/instrumental de ἐν τοῖς λόγοις σου. Además, el anclaje de nota en «dulcemente[a]» no corresponde al verdadero punto de ambigüedad léxica, que está en σκάνδαλον.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta dos problemas de calidad: 1) «a tus palabras, se ofenderá» es una construcción poco idiomática; «por tus palabras» o «ante tus palabras» lee mejor. 2) La nota al pie está colocada en el segmento equivocado; crea confusión porque la alternativa «se escandalizará» no comenta «dulcemente», sino el verbo final. También hay pequeños indicios de descuido en las decisiones léxicas (caracteres corruptos), aunque no afectan directamente el texto principal.'
  glossary_alignment: No hay términos del glosario principal comprometidos aquí. La decisión «se ofenderá» para σκάνδαλον es defendible según la revisión inglesa final, pero en español conviene apoyarla con una nota anclada en el verbo correspondiente. La preservación de la imagen de «boca» está bien alineada con la racionalidad documentada.
  issues:
  - severity: medium
    issue: La frase «a tus palabras, se ofenderá» es poco natural en español.
    rationale: Aunque intenta reflejar la flexibilidad de ἐν τοῖς λόγοις σου, en español suena forzada. «Por tus palabras» conserva bien la idea de ocasión o causa y mejora notablemente la legibilidad.
  - severity: medium
    issue: La nota al pie está anclada en «dulcemente» en vez de en el término relacionado con σκάνδαλον.
    rationale: La nota explica una alternativa para el verbo final («se escandalizará» / tropiezo), no para γλυκανεῖ. El marcador debe moverse al segmento final para mantener precisión editorial.
  - severity: low
    issue: Hay caracteres corruptos en algunas alternativas/racionales de las decisiones léxicas.
    rationale: No afectan el texto bíblico publicado, pero muestran descuido en el registro auxiliar y confirman que conviene una revisión menor del paquete.
  revised_spanish_text: Delante de tus ojos su boca hablará dulcemente, y admirará tus palabras; pero después torcerá su boca y, por tus palabras, se ofenderá[a].
