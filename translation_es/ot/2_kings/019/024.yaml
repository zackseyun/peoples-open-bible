translation:
  language: es
  text: Yo mismo he cavado y he bebido aguas extranjeras[a], y con la planta de mis pies seco todas las corrientes de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los canales» o «todos los canales del Nilo de Egipto». El término hebreo puede referirse específicamente a vías fluviales del Nilo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I myself
  chosen_spanish: Yo mismo
  alternatives_spanish:
  - Yo
  - Yo mismo
  lexicon: HALOT
  rationale: El pronombre explícito lleva énfasis de autoafirmación arrogante; «Yo mismo» conserva ese énfasis mejor que un simple «Yo».
- source_word: קַרְתִּי
  english_pob_choice: have dug
  chosen_spanish: he cavado
  alternatives_spanish:
  - he excavado
  - he cavado un pozo
  lexicon: HALOT
  rationale: El verbo expresa la acción de cavar en este contexto de fuentes de agua; «he cavado» mantiene la tersura del primer miembro sin añadir «pozo», que no aparece en el hebreo.
- source_word: מַיִם זָרִים
  english_pob_choice: foreign waters
  chosen_spanish: aguas extranjeras
  alternatives_spanish:
  - aguas extrañas
  - aguas forasteras
  lexicon: HALOT
  rationale: זָרִים tiene el sentido de «ajenas/extranjeras». «Aguas extranjeras» comunica mejor la idea de aguas halladas en territorios no propios, manteniendo el tono de jactancia imperial.
- source_word: וְאַחְרִב
  english_pob_choice: I dry up
  chosen_spanish: seco
  alternatives_spanish:
  - devasto
  - dejo secas
  lexicon: HALOT
  rationale: En relación con canales y corrientes de agua, el hifil de חרב puede significar «secar». «Seco» reproduce directamente esa fuerza contextual en español.
- source_word: בְּכַף פְּעָמַי
  english_pob_choice: with the sole of my feet
  chosen_spanish: con la planta de mis pies
  alternatives_spanish:
  - con la suela de mis pies
  - con el pisar de mis pies
  lexicon: HALOT
  rationale: כַּף referido al pie designa la planta o suela; «planta de mis pies» es natural en español y conserva la imagen de dominio sinforzado.
- source_word: יְאֹרֵי
  english_pob_choice: streams
  chosen_spanish: canales
  alternatives_spanish:
  - corrientes
  - canales del Nilo
  - ríos
  lexicon: HALOT
  rationale: יְאֹר suele referirse a canales o cauces asociados con el Nilo. «Canales» refleja bien esa especificidad; la nota conserva la amplitud posible del término.
- source_word: מָצוֹר
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - Mazor
  - la fortaleza
  - el sitio
  lexicon: HALOT
  rationale: En esta combinación poética con los יְאֹרִים, מָצוֹר se entiende mejor como una designación de Egipto. Traducirlo «Egipto» hace explícita la referencia geográfica que el contexto exige.
theological_decisions:
- issue: Voz jactanciosa del rey asirio en primera persona
  english_pob_reading: Render as an arrogant royal boast without softening or theological interpretation in the translation itself.
  chosen_spanish_reading: Mantener la jactancia real en primera persona sin explicarla ni suavizarla en el texto principal.
  alternative_spanish_readings:
  - Interpretarlo como mera hipérbole militar
  - Añadir una aclaración explícita de que habla el rey asirio
  rationale: El versículo forma parte de la burla del rey asirio. La traducción debe preservar la voz, el tono y la imagen sin insertar explicación interpretativa en la línea principal.
  doctrine_reference: Principio de primacía del texto original; conservar la tensión retórica y teológica sin resolverla en traducción.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto coincide con el consenso alto del control cruzado, con una sola observación léxica menor sobre la especificidad de יְאֹרֵי.
  spanish_consistency_notes:
  - Se mantiene «Egipto» como referencia geográfica explícita, en línea con la lectura contextual del pasaje.
  - Se evita «SEÑOR» o equivalentes porque el versículo no contiene el nombre divino.
  - Se conserva un registro sobrio y bíblico, pero con español actual y no arcaizante.
