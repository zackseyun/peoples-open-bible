id: PHP.4.13
reference: Philippians 4:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πάντα ἰσχύω ἐν τῷ ἐνδυναμοῦντί ⸀με.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/013.yaml
  text: I am able to do all things through the one who strengthens me.
translation:
  language: ko
  text: 나는 나를 강하게 하시는 분[a] 안에서 모든 것을 할 수 있습니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 본문은 「나를 강하게 하시는 분」으로만 표현하며 「그리스도」를 명시하지 않는다. 문맥상 메시아 예수를 가리키지만, 본문이 명시한 그대로를 옮긴다.
    reason: alternative_reading
  - marker: b
    text: 또는 「모든 일에 능히 감당합니다」. 헬라어 πάντα ἰσχύω는 「모든 일에 강하다 / 능력이 있다」를 뜻한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  english_pob_choice: in all things
  chosen_korean: 모든 것을
  alternatives_korean:
  - 모든 일에
  - 무엇이든
  lexicon: BDAG
  rationale: 중성 복수 대격을 「모든 것을」로 옮겨 11–12절의 빈천·풍부 모든 처지를 가리키는 본문 폭을 보존한다. 한국 교회에서 가장 외워진 구절 중 하나이지만, 개역개정의 「모든 것을 할 수 있느니라」(보통체)는 합쇼체 일관성을 위해 사용하지 않는다.
- source_word: ἰσχύω
  english_pob_choice: I am able
  chosen_korean: 할 수 있습니다
  alternatives_korean:
  - 능히 감당합니다
  - 능력이 있습니다
  lexicon: BDAG
  rationale: ἰσχύω의 「능력 있음·할 수 있음」을 합쇼체 「할 수 있습니다」로 자연스럽게 옮긴다. 「감당합니다」는 좀 더 무겁고, 본문의 능력 함의는 동일하게 유지된다.
- source_word: ἐν τῷ ἐνδυναμοῦντί με
  english_pob_choice: through the one who strengthens me
  chosen_korean: 나를 강하게 하시는 분 안에서
  alternatives_korean:
  - 나를 능하게 하시는 분 안에서
  - 나에게 능력 주시는 분으로 말미암아
  lexicon: BDAG
  rationale: 헬라어 ἐν은 직역 「~안에서」이며, 영어 POB의 「through」보다 「안에서」가 본 번역의 ἐν 정형 옮김에 부합한다. 능동 분사를 「~하시는 분」으로 옮기되 본문이 명시하지 않은 「그리스도」를 본문에 더하지 않는다.
- source_word: ἐνδυναμοῦντι
  english_pob_choice: strengthens
  chosen_korean: 강하게 하시는
  alternatives_korean:
  - 능하게 하시는
  - 힘을 주시는
  lexicon: BDAG
  rationale: ἐνδυναμόω의 「힘을 부어 강하게 함」을 자연스럽게 「강하게 하시는」으로 옮긴다.
theological_decisions:
- issue: '「나를 강하게 하시는 분」의 지시 대상'
  chosen_reading: 본문이 명시하지 않은 「그리스도」를 본문에 보충하지 않고, 「~하시는 분」으로 헬라어 분사구의 무지시성을 그대로 보존한다.
  alternative_readings:
  - 「그리스도」를 본문에 명시
  - 「메시아」를 본문에 명시
  rationale: 직접·넓은 문맥은 메시아 예수를 강하게 가리키지만, 본 절의 헬라어 자체는 그분을 명시하지 않는다. 원어 우선성에 따라 본문에 보충하지 않고 각주에 명시한다.
  doctrine_reference: 'Original-language primacy over translation tradition; do not import doctrinal claims the text does not make.'
