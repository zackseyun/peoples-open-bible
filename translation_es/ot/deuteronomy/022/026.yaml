    text: 'O: «la joven no es culpable de ningún delito capital».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «así es este asunto»; es decir, este caso es comparable a un asesinato cometido por agresión.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el español para reflejar mejor el sentido jurídico natural de חֵטְא מָוֶת, se restaura la fuerza de רצח con ‘lo asesina’, y se recoloca la nota b donde corresponde según el rastro POB inglés. También se mejora el registro legal con ‘este caso’.
