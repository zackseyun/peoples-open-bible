revisions:
- from: Así el rey y Amán vinieron a beber con la reina Ester[a].
  to: Entonces el rey y Amán vinieron a beber con la reina Ester[a].
  rationale: Se ajusta el conector narrativo a un español más natural ('Entonces'), se expresa la aposición con el título junto al nombre ('la reina Ester') y se pule la nota al pie para reflejar con claridad la alternativa formal/literal documentada en la auditoría inglesa.
