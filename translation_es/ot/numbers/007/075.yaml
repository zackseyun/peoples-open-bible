translation:
  language: es
  text: un toro del ganado, un carnero, un cordero macho de un año, para holocausto;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פַּר
  english_pob_choice: bull
  chosen_spanish: toro
  alternatives_spanish:
  - buey
  - novillo
  lexicon: HALOT
  rationale: El hebreo פַּר designa un toro/joven toro sacrificial. En español, «toro» comunica bien el animal sin forzar una edad más precisa de la que ofrece el texto.
- source_word: בֶּן בָּקָר
  english_pob_choice: from the herd
  chosen_spanish: del ganado
  alternatives_spanish:
  - de la manada
  - de reses
  lexicon: HALOT
  rationale: La construcción hebrea especifica un bovino procedente del ganado. «Del ganado» conserva la relación genitiva de forma natural en español y evita la literalidad rígida de «hijo de ganado».
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho adulto de oveja
  - ram
  lexicon: HALOT
  rationale: אַיִל es el término sacrificial para el macho adulto de oveja. «Carnero» es el equivalente español directo, claro y litúrgicamente comprensible.
- source_word: כֶּבֶשׂ
  english_pob_choice: male lamb
  chosen_spanish: cordero macho
  alternatives_spanish:
  - cordero
  - borrego
  lexicon: HALOT
  rationale: כֶּבֶשׂ se refiere a un cordero, y en contexto sacrificial la especificación masculina es pertinente. «Cordero macho» refleja esa precisión sin oscurecer el sustantivo principal.
- source_word: בֶּן שְׁנָתוֹ
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - en su primer año
  lexicon: HALOT
  rationale: El modismo indica un animal de un año. «De un año» es la formulación española más natural y fiel en un inventario sacrificial.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para un holocausto
  lexicon: HALOT
  rationale: עֹלָה se traduce tradicionalmente como «holocausto» en español bíblico; aquí se conserva ese término porque es preciso y ampliamente reconocido para la ofrenda completamente quemada.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un / una
  alternatives_spanish:
  - uno
  - una
  lexicon: HALOT
  rationale: El numeral se preserva en cada animal de la lista. En español, el artículo numeral concuerda naturalmente con el sustantivo de cada elemento.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el inventario sacrificial del hebreo y la solución inglesa auditada: mantiene la secuencia numérica, conserva la distinción entre toro, carnero y cordero macho, y refleja el término cultual עֹלָה con «holocausto» sin añadir expansión interpretativa.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o «Cristo» porque el versículo no contiene esas formas.
  - «Holocausto» se usa en su sentido técnico cultual, no en su uso moderno no bíblico.
  - La frase nominal está ajustada a la sintaxis española para un listado ritual breve, sin alterar el contenido del hebreo.
