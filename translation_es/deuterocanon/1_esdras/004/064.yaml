translation:
  language: es
  text: 'Entonces el rey le dijo: «Pide lo que quieras, más allá de lo que está escrito, y te lo daremos, porque has sido hallado más sabio; y te sentarás junto a mí[b], y serás llamado mi pariente[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: «Junto a mí» traduce la idea de cercanía física y de rango en la corte; también puede entenderse como «a mi lado».
    reason: lexical_alternative
  - marker: c
    text: O «mi deudo». El término puede funcionar como un apelativo honorífico de cercanía real, no necesariamente como afirmación de parentesco biológico literal.
    reason: alternative_reading
lexical_decisions:
- source_word: Αἴτησαι
  english_pob_choice: Ask for
  chosen_spanish: Pide
  alternatives_spanish:
  - Pide algo
  - Solicita
  lexicon: LSJ
  rationale: El imperativo aoristo de αἰτέω invita a formular una petición. En español, «Pide» suena natural y directo, y conserva el valor exhortativo de la orden real.
- source_word: ὃ θέλεις
  english_pob_choice: whatever you want
  chosen_spanish: lo que quieras
  alternatives_spanish:
  - lo que desees
  - cualquier cosa que quieras
  lexicon: LSJ
  rationale: La expresión relativa con θέλω expresa amplitud sin restricción. «Lo que quieras» mantiene esa amplitud en español sin volverse pesada.
- source_word: πλείω τῶν γεγραμμένων
  english_pob_choice: beyond what has been written
  chosen_spanish: más allá de lo que está escrito
  alternatives_spanish:
  - más de lo que está escrito
  - por encima de lo escrito
  lexicon: LSJ
  rationale: πλείω expresa «más/further» y τῶν γεγραμμένων remite a lo ya escrito. «Más allá de lo que está escrito» conserva el sentido comparativo sin precisar indebidamente si se trata de decreto, registro o promesa.
- source_word: δώσομέν σοι
  english_pob_choice: we will give it to you
  chosen_spanish: te lo daremos
  alternatives_spanish:
  - te lo concederemos
  - te lo entregaremos
  lexicon: LSJ
  rationale: El futuro de δίδωμι se vierte con naturalidad como «daremos». El pronombre «lo» se sobreentiende por el objeto pedido y evita la repetición innecesaria.
- source_word: ὃν τρόπον
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - puesto que
  - ya que
  lexicon: LSJ
  rationale: La frase funciona causalmente en este contexto, como ya indica el audit trail inglés. «Porque» expresa de modo claro y directo la base de la concesión real.
- source_word: εὑρέθης σοφώτερος
  english_pob_choice: you have been found wiser
  chosen_spanish: has sido hallado más sabio
  alternatives_spanish:
  - has resultado más sabio
  - te han encontrado más sabio
  lexicon: LSJ
  rationale: El pasivo de εὑρίσκω con el comparativo σοφώτερος señala reconocimiento de una sabiduría superior. «Has sido hallado» conserva el pasivo y «más sabio» el comparativo.
- source_word: ἐχόμενός μου καθήσῃ
  english_pob_choice: you shall sit next to me
  chosen_spanish: te sentarás junto a mí
  alternatives_spanish:
  - te sentarás a mi lado
  - te sentarás cerca de mí
  lexicon: LSJ
  rationale: ἐχόμενος con genitivo indica cercanía; en contexto cortesano, la cercanía implica honor y rango. «Junto a mí» comunica esa proximidad de manera natural.
- source_word: συγγενής μου κληθήσῃ
  english_pob_choice: you shall be called my kinsman
  chosen_spanish: serás llamado mi pariente cercano
  alternatives_spanish:
  - serás llamado mi pariente
  - serás llamado mi deudos
  lexicon: LSJ
  rationale: συγγενής designa a un pariente o miembro del mismo linaje, pero aquí también funciona como apelativo honorífico de favor real. «Pariente cercano» conserva el matiz familiar sin forzar una lectura literal excesiva.
theological_decisions:
- issue: Valor honorífico de συγγενής μου
  english_pob_reading: my kinsman
  chosen_spanish_reading: mi pariente cercano
  alternative_spanish_readings:
  - mi pariente
  - mi familia
  rationale: El contexto es de elevación cortesana, no de afirmación doctrinal o genealógica literal. «Pariente cercano» preserva la metáfora de cercanía/favor y evita imponer una relación de sangre más fuerte que la del griego.
  doctrine_reference: Translation philosophy §6 (lenguaje claro y reverente sin aplanar el matiz)
- issue: Sentido causal de ὃν τρόπον en la concesión real
  english_pob_reading: because
  chosen_spanish_reading: porque
  alternative_spanish_readings:
  - puesto que
  - ya que
  rationale: La revisión inglesa ya resolvió la frase como causal. En español, «porque» refleja mejor ese vínculo lógico que una lectura estrictamente modal.
  doctrine_reference: Source-driven syntax and discourse clarity
translation_notes:
  revision_awareness: He seguido la revisión más reciente del audit trail inglés, que prefirió «because» frente a «since» para ὃν τρόπον. No hay otros cambios sustantivos en el sentido; la versión española mantiene esa lectura causal y conserva el honorífico de συγγενής con una fórmula que suena natural en español.
  spanish_consistency_notes:
  - He usado «Yahvé» como norma general del proyecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - He mantenido un registro sobrio y bíblico, sin arcaísmos innecesarios.
  - He evitado «Cristo» y otras terminologías no pertinentes al pasaje.
  - La puntuación y comillas siguen el uso editorial del español moderno.
