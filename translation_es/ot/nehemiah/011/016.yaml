- from: Y Shabetai y Jozabad[a], de entre los jefes de los levitas, estaban sobre la obra exterior de la casa de Dios.
  to: Y Shabetai y Jozabad[a], de entre los jefes de los levitas, estaban a cargo de la obra exterior de la casa de Dios.
  rationale: Se reemplaza ‘estaban sobre’ por ‘estaban a cargo de’ para expresar con español natural el sentido administrativo de עַל. Se conserva ‘obra exterior’ como texto principal por su dignidad y claridad, pero se ajusta la nota para reflejar mejor la alternativa auditada de ‘trabajo de afuera / para la casa de Dios’.
