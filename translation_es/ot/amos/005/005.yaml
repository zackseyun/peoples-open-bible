    reason: lexical_alternative
  revision_rationale: Se corrige «pasen por» a «crucen hasta» para reflejar mejor la fuerza de עבר en contexto de peregrinación y evitar una lectura de simple tránsito. Se ajusta «vendrá a ser nada» a «llegará a ser nada» por mayor naturalidad en español, manteniendo intacta la decisión léxica del POB sobre אָוֶן y la nota del juego de palabras.
