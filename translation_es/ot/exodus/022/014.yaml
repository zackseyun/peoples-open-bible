translation:
  language: es
  text: Si su dueño está con él,[a] no hará restitución; si es un trabajador contratado, vino por su paga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si es algo alquilado, vino por su alquiler». El hebreo es breve y puede entenderse ya sea de un trabajador contratado o de un bien/animal alquilado; en este contexto de responsabilidad por propiedad prestada, algunos entienden la cláusula del objeto alquilado.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּעָלָיו
  english_pob_choice: its owner
  chosen_spanish: su dueño
  alternatives_spanish:
  - su propietario
  - el dueño de él
  lexicon: HALOT
  rationale: בַּעַל designa al poseedor o dueño. En un contexto legal sobre responsabilidad por bienes prestados o alquilados, «dueño» es natural en español y conserva la relación posesiva del sufijo con el objeto implícito.
- source_word: עִמּוֹ
  english_pob_choice: is with it
  chosen_spanish: está con él
  alternatives_spanish:
  - está con ello
  - está presente con él
  lexicon: HALOT
  rationale: El referente inmediato en el contexto jurídico es el animal o bien tratado en la cláusula anterior. En español, «con él» mantiene la referencia a ese antecedente masculino gramatical implícito en el sustantivo subyacente y refleja la concisión del hebreo.
- source_word: לֹא יְשַׁלֵּם
  english_pob_choice: he shall not make restitution
  chosen_spanish: no hará restitución
  alternatives_spanish:
  - no pagará
  - no repondrá
  lexicon: HALOT
  rationale: El piel de שלם en lenguaje legal expresa compensación o restitución, no solo pago ordinario. «Hará restitución» preserva el valor jurídico específico mejor que «pagará».
- source_word: שָׂכִיר
  english_pob_choice: a hired worker
  chosen_spanish: un jornalero
  alternatives_spanish:
  - un trabajador contratado
  - un asalariado
  lexicon: HALOT
  rationale: שָׂכִיר suele significar trabajador asalariado o contratado. Dado que el paralelo inglés opta por una persona contratada, «jornalero» comunica bien la idea de alguien que trabaja por salario y mantiene el matiz de relación laboral remunerada.
- source_word: בָּא בִּשְׂכָרוֹ
  english_pob_choice: it came for his hire
  chosen_spanish: vino por su jornal
  alternatives_spanish:
  - vino por su salario
  - vino para su salario
  - llegó por su jornal
  lexicon: HALOT
  rationale: La frase hebrea es breve y ambigua. «Vino por su jornal» conserva la tersura del original y puede leerse de modo que el objeto o la situación «vienen» dentro de una relación de pago ya cubierta por el jornal, sin forzar una paráfrasis más larga.
theological_decisions:
- issue: 'Ambigüedad del sujeto en la segunda cláusula: persona o bien alquilado'
  english_pob_reading: The main text takes it as referring to the hired item in the legal context, while the footnote preserves the alternative that the subject may be a hired worker.
  chosen_spanish_reading: La cláusula principal sigue la lectura legal del bien/al animal en contexto, pero la redacción española conserva la tersura que permite la ambigüedad del hebreo.
  alternative_spanish_readings:
  - si él es un jornalero, vino por su jornal
  - si es un objeto alquilado, vino por su jornal
  rationale: El hebreo es elíptico y puede entenderse de más de una manera. Como el entorno inmediato es de responsabilidad sobre propiedad prestada, la lectura principal permanece anclada en ese marco; aun así, el español no debe borrar la tensión textual, por lo que se mantiene una formulación que no cierra artificialmente la ambigüedad.
  doctrine_reference: Ex 22:14; lectura contextual de la ley de restitución
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó de una lectura más genérica de ‘a hired thing’ a ‘a hired worker’ en la segunda cláusula, para reflejar mejor el sujeto personal explícito del hebreo. La versión española mantiene esa tensión: usa «jornalero» en la cláusula condicional, pero conserva una frase final breve que no elimina la posibilidad de una lectura contextual del bien/animal en la situación legal.'
  spanish_consistency_notes:
  - Se mantuvo «restitución» por coherencia con el valor jurídico de שלם en leyes de compensación.
  - Se evitó «SEÑOR» o equivalentes no pertinentes porque el versículo no contiene el nombre divino.
  - Se prefirió «dueño» sobre «amo» o «señor» para el registro legal de propiedad.
  - Se conservó la ambigüedad textual en una nota, según el audit trail inglés.
