  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὗτος γάρ ἐστιν ὁ ῥηθεὶς ⸀διὰ Ἠσαΐου τοῦ προφήτου λέγοντος· Φωνὴ βοῶντος ἐν τῇ ἐρήμῳ· Ἑτοιμάσατε τὴν ὁδὸν κυρίου, εὐθείας ποιεῖτε τὰς τρίβους αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/003/003.yaml
  text: 'For this is the one spoken of through Isaiah the prophet[a], saying: “A voice of one crying in the wilderness: ‘Prepare the way of the Lord[b]; make his paths straight.’”'
  footnotes:
  - marker: a
    text: Or “Prepare the way of the LORD”; the quotation echoes Isaiah 40:3, where the Hebrew text has the divine name YHWH.
    reason: alternative_reading
  - marker: b
    text: Or 'in the wilderness,'.
    reason: previous_rendering
translation:
  language: ko
  text: 이 사람은 예언자 이사야를 통하여 「광야에서 외치는 자의 소리. 주의 길을 예비하라. 그분의 길을 곧게 하라」고 말씀하신 그 사람입니다.
  philosophy: optimal-equivalence
