translation:
  language: es
  text: Cuando entren en la tienda de reunión[a], se lavarán con agua, para que no mueran; o cuando se acerquen al altar para ministrar, para quemar una ofrenda de alimento a Yahvé[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'tienda del encuentro'.
    reason: lexical_alternative
  - marker: b
    text: O, 'una ofrenda por fuego'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבֹאָם
  english_pob_choice: When they enter
  chosen_spanish: Cuando entren
  alternatives_spanish:
  - Cuando vayan a entrar
  - Al entrar
  lexicon: HALOT
  rationale: 'El infinitivo constructo con preposición y sufijo expresa tiempo: ''cuando entren''. ''Entren'' es natural en español y conserva el movimiento hacia el interior.'
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - la Tienda de Reunión
  lexicon: HALOT
  rationale: La expresión cultual designa el santuario donde Dios se encuentra con Israel. 'Tienda de reunión' es transparente y fiel; mantengo minúscula por estilo castellano moderno.
- source_word: יִרְחֲצוּ מַיִם
  english_pob_choice: they shall wash with water
  chosen_spanish: se lavarán con agua
  alternatives_spanish:
  - lavarán sus manos con agua
  - deberán lavarse con agua
  lexicon: HALOT
  rationale: El verbo רחץ con מים pide el complemento explícito 'con agua'. En español, el reflexivo 'se lavarán' comunica bien la acción ritual sin añadir detalles no presentes.
- source_word: וְלֹא יָמֻתוּ
  english_pob_choice: so that they may not die
  chosen_spanish: para que no mueran
  alternatives_spanish:
  - para que no mueran de muerte
  - y no mueran
  lexicon: HALOT
  rationale: La cláusula expresa efecto/purpose ligado al lavamiento. 'Para que no mueran' conserva la advertencia sin suavizarla ni convertirla en mera coordinación.
- source_word: בְגִשְׁתָּם אֶל־הַמִּזְבֵּחַ
  english_pob_choice: when they come near the altar
  chosen_spanish: cuando se acerquen al altar
  alternatives_spanish:
  - cuando lleguen al altar
  - cuando se aproximen al altar
  lexicon: HALOT
  rationale: נגשׁ en contexto cultual equivale a acercarse para un servicio sagrado. 'Se acerquen' es natural y mantiene el matiz ritual.
- source_word: לְשָׁרֵת
  english_pob_choice: to minister
  chosen_spanish: para ministrar
  alternatives_spanish:
  - para servir
  - para prestar servicio
  lexicon: HALOT
  rationale: En el contexto sacerdotal, 'ministrar' conserva el servicio formal al santuario mejor que el genérico 'servir'.
- source_word: לְהַקְטִיר
  english_pob_choice: to burn
  chosen_spanish: para quemar
  alternatives_spanish:
  - para ofrecer en humo
  - para hacer humear
  lexicon: HALOT
  rationale: La forma causativa de קטר se refiere a hacer subir en humo la ofrenda. 'Quemar' es conciso y natural en español, con el objeto cultual que ya delimita el sentido.
- source_word: אִשֶּׁה
  english_pob_choice: a food offering
  chosen_spanish: una ofrenda encendida
  alternatives_spanish:
  - una ofrenda por fuego
  - una ofrenda hecha por fuego
  lexicon: HALOT
  rationale: POB eligió una equivalencia explicativa en inglés para preservar la dimensión sacrificial. En español, 'ofrenda encendida' mantiene la relación con el fuego/consumo ritual y evita introducir 'comida' como interpretación secundaria.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יהוה: ''Yahvé'' en el texto principal, preservando el nombre divino en vez de una máscara como ''SEÑOR''.'
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: La instrucción del proyecto fija 'Yahvé' para יהוה. Esto conserva el nombre del pacto y evita la sustitución litúrgica tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Advertencia de muerte en וְלֹא יָמֻתוּ
  english_pob_reading: so that they may not die
  chosen_spanish_reading: para que no mueran
  alternative_spanish_readings:
  - y no mueran
  - para no morir
  rationale: 'La frase no se diluye: conserva el vínculo entre pureza ritual y sanción real. La traducción expresa propósito/resultado sin añadir explicación doctrinal externa.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
translation_notes:
  revision_awareness: La redacción final conserva el valor de continuidad de la coma final del texto inglés auditado, reflejando que el versículo se enlaza con la cláusula siguiente en el hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el Tetragrámaton conforme al estándar del proyecto.
  - Se evitó 'SEÑOR' para no ocultar el nombre divino en el texto principal.
  - '''Tienda de reunión'' y ''ministrar'' mantienen el registro cultual sin arcaísmos innecesarios.'
  - '''Ofrenda encendida'' se usa para captar el componente de fuego de אִשֶּׁה sin forzar ''alimento'' en español.'
