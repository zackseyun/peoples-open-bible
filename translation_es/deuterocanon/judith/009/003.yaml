translation:
  language: es
  text: Por tanto, diste a sus gobernantes[a] a la matanza, y su lecho, que se avergonzó de su engaño, fue engañado hasta la sangre; y golpeaste a esclavos contra gobernantes, y a gobernantes en sus tronos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jefes». El griego ἄρχοντας es un término amplio de autoridad política; se traduce aquí con «gobernantes» para mantener un registro claro y neutral.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθʼ ὧν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: LSJ
  rationale: Expresa bien la relación consecuencial del griego sin introducir una explicación causal más fuerte de la que el texto exige.
- source_word: ἔδωκας ... εἰς φόνον
  english_pob_choice: you gave ... over to slaughter
  chosen_spanish: entregaste ... para la matanza
  alternatives_spanish:
  - entregaste ... a la muerte
  - los diste ... a la matanza
  lexicon: LSJ
  rationale: «Entregaste» conserva el valor de dar/entregar en un marco de acción divina soberana, y «para la matanza» mantiene el registro violento de φόνος sin suavizarlo.
- source_word: ἄρχοντας
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - rulers
  - jefes
  lexicon: LSJ
  rationale: «Gobernantes» es un equivalente natural en español y mantiene el sentido amplio de autoridad política sin estrecharlo demasiado.
- source_word: στρωμνή
  english_pob_choice: bed
  chosen_spanish: lecho
  alternatives_spanish:
  - cama
  - couche
  lexicon: LSJ
  rationale: «Lecho» funciona mejor que «cama» para conservar el tono elevado y la posible carga sexual del contexto.
- source_word: ᾐδέσατο
  english_pob_choice: was ashamed of
  chosen_spanish: se avergonzó de
  alternatives_spanish:
  - sintió vergüenza por
  - tuvo vergüenza de
  lexicon: LSJ
  rationale: Refleja el matiz de αἰδέομαι como vergüenza o recato, manteniendo la personificación del lecho sin resolverla interpretativamente.
- source_word: ἀπάτην
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - decepción
  - treta
  lexicon: LSJ
  rationale: «Engaño» es claro y suficientemente general para el término griego, sin perder la carga moral negativa.
- source_word: ἀπατηθεῖσαν εἰς αἷμα
  english_pob_choice: was deceived into blood
  chosen_spanish: fue engañado hasta la sangre
  alternatives_spanish:
  - fue traicionado hasta la sangre
  - fue engañado para derramar sangre
  lexicon: LSJ
  rationale: La frase griega es muy comprimida; «hasta la sangre» conserva la brevedad y el final sangriento sin borrar la rareza sintáctica. Se mantiene la tensión del original en vez de explicitarla por completo.
- source_word: ἐπάταξας
  english_pob_choice: you struck
  chosen_spanish: golpeaste
  alternatives_spanish:
  - heriste
  - azotaste
  lexicon: LSJ
  rationale: «Golpeaste» reproduce el golpe violento de πατάσσω con un verbo natural en español.
- source_word: δούλους
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  lexicon: LSJ
  rationale: Se conserva la fuerza social de δοῦλος, siguiendo la preferencia del proyecto cuando la subordinación es parte del contraste retórico.
- source_word: δυνάσταις
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - poderosos
  - rulers
  lexicon: LSJ
  rationale: «Gobernantes» mantiene la idea de autoridad y permite el paralelismo con el primer uso, aunque el griego también sugiere los poderosos/influyentes.
- source_word: θρόνους
  english_pob_choice: thrones
  chosen_spanish: tronos
  alternatives_spanish:
  - asientos de poder
  - sillas de gobierno
  lexicon: LSJ
  rationale: «Tronos» preserva la imagen regia y política de forma literal y literaria.
theological_decisions:
- issue: La cláusula difícil sobre el lecho y el engaño personificado
  english_pob_reading: 'Retain the personified imagery: ''their bed, which was ashamed of their deceit, was deceived into blood'''
  chosen_spanish_reading: 'Conservar la imagen personificada: «su lecho, que se avergonzó de su engaño, fue engañado hasta la sangre»'
  alternative_spanish_readings:
  - «su lecho, avergonzado de su engaño, fue contaminado con sangre»
  - «el lecho conyugal, que conoció su engaño, terminó en derramamiento de sangre»
  rationale: El griego es compacto y ambivalente. La versión española conserva la personificación y el juego entre ἀπάτην / ἀπατηθεῖσαν sin disipar la extrañeza del texto. No se resuelve el giro en una paráfrasis más suave.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: El audit trail inglés revisó la segunda referencia de «princes» a «rulers» para alinearla con ἄρχοντας/δυνάστας. La redacción española sigue esa alineación con «gobernantes» en ambas apariciones, y conserva la dureza e irregularidad del tramo central sobre el lecho y el engaño.
  spanish_consistency_notes:
  - Se mantiene «esclavos» para δούλους, conforme al valor social fuerte del término.
  - Se usa «gobernantes» de manera consistente para ἄρχοντας y δυνάστας, evitando alternar con equivalentes más ornamentales.
  - «Lecho» se elige por su tono elevado y su mejor ajuste a la personificación del verso.
  - No se suaviza «fue engañado hasta la sangre»; la rareza busca reflejar la compresión del griego.
