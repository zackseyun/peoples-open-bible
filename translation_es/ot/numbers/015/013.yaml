translation:
  language: es
  text: Toda persona nativa[a] hará estas cosas de esta manera, para presentar una ofrenda de alimento[b], aroma agradable para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Todo nativo»; el hebreo usa una forma masculina singular con fuerza representativa en instrucción legal.
    reason: lexical_alternative
  - marker: b
    text: 'También: «ofrenda de fuego» u «ofrenda hecha por fuego».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: Every
  chosen_spanish: Todo
  alternatives_spanish:
  - Cada
  - Todo el
  lexicon: HALOT
  rationale: El distributivo hebreo exige una formulación que abarque a cada miembro del grupo; en español, 'Todo nacido en la tierra' comunica la generalidad sin forzar un plural ajeno al singular legal del hebreo.
- source_word: הָאֶזְרָח
  english_pob_choice: native-born person
  chosen_spanish: nacido en la tierra
  alternatives_spanish:
  - nativo
  - ciudadano
  - persona nacida en la tierra
  lexicon: HALOT
  rationale: El término designa al israelita autóctono en contraste con el forastero del contexto. 'Nacido en la tierra' mantiene la idea de origen local sin introducir un masculino que el hebreo aquí no exige de manera explícita.
- source_word: יַעֲשֶׂה
  english_pob_choice: shall do
  chosen_spanish: hará
  alternatives_spanish:
  - deberá hacer
  - ha de hacer
  lexicon: HALOT
  rationale: En material legal el imperfecto tiene fuerza prescriptiva; 'hará' preserva esa obligación normativa en español bíblico moderno y suena menos explicativo que 'deberá hacer'.
- source_word: כָּכָה
  english_pob_choice: in this way
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - de este modo
  lexicon: HALOT
  rationale: Adverbio de modo con valor procedimental; 'así' es breve y natural, y conserva la referencia al patrón ya establecido.
- source_word: אֶת אֵלֶּה
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas
  - estas ofrendas
  lexicon: HALOT
  rationale: El demostrativo retoma acciones o elementos prescritos en el contexto. 'Estas cosas' es suficientemente explícito sin añadir 'ofrendas', que el hebreo no repite aquí.
- source_word: לְהַקְרִיב
  english_pob_choice: to present
  chosen_spanish: para presentar
  alternatives_spanish:
  - para ofrecer
  - para llevar
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo expresa presentar una ofrenda delante de Dios. 'Presentar' evita la repetición con el sustantivo sacrificial y conserva la dirección cultual.
- source_word: אִשֵּׁה
  english_pob_choice: food offering
  chosen_spanish: ofrenda encendida
  alternatives_spanish:
  - ofrenda hecha por fuego
  - ofrenda de fuego
  lexicon: HALOT
  rationale: El término alude a una ofrenda consumida por fuego. 'Ofrenda encendida' reproduce la fuerza del fuego sin recurrir a un calco torpe, y mantiene la ambigüedad cultual del hebreo.
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: aroma agradable
  alternatives_spanish:
  - aroma placentero
  - aroma de reposo
  lexicon: HALOT
  rationale: La expresión es un modismo sacrificial de aceptación. 'Aroma agradable' comunica la valoración positiva sin sugerir una lectura demasiado interpretativa.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para Yahveh
  - para el Señor
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ''Yahvé'' nombra el nombre divino de forma audible y transparente, sin sustituirlo por una mayúscula reverencial.'
theological_decisions:
- issue: Alcance representativo de הָאֶזְרָח
  english_pob_reading: native-born person with representative masculine force
  chosen_spanish_reading: nacido en la tierra como referencia colectiva representativa
  alternative_spanish_readings:
  - persona nacida en la tierra
  - nativo de la tierra
  rationale: El hebreo usa una forma singular masculina, pero el contexto legal es representativo y no exige marcar varón biológico. La versión española conserva el singular y evita imponer un masculino no necesario, manteniendo la fuerza normativa universal dentro de Israel.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton; por coherencia con el marco doctrinal del proyecto, se lo vierte como 'Yahvé' y no como un sustituto reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Valor sacrificial de אִשֵּׁה
  english_pob_reading: food offering / offering by fire
  chosen_spanish_reading: ofrenda encendida
  alternative_spanish_readings:
  - ofrenda de fuego
  - ofrenda hecha por fuego
  rationale: No se elimina la tensión léxica entre alimento, fuego y ofrenda; se conserva la dimensión de combustión sacrificial mediante una forma española idiomática que sigue remitiendo al acto de quemar la ofrenda.
  doctrine_reference: HALOT, campo sacrificial de אִשֵּׁה
translation_notes:
  revision_awareness: La redacción sigue de cerca el cierre revisado del audit trail, pero ajusta el referente de הָאֶזְרָח para conservar el singular representativo sin imponer masculino biológico. Se mantuvo la decisión doctrinal reciente de usar 'Yahvé' para el Tetragrámaton, y se preservó la ambigüedad cultual de אִשֵּׁה con una solución española idiomática.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino conforme al criterio del proyecto.
  - Se evita 'SEÑOR' como sustituto reverencial.
  - '''Ofrenda encendida'' mantiene el campo semántico sacrificial de fuego sin borrar la base nominal de la expresión.'
  - El singular legal se conserva en español para reflejar la estructura hebrea representativa.
