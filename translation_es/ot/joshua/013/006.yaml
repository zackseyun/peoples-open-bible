translation:
  language: es
  text: 'Todos los habitantes de la región montañosa desde el Líbano hasta Misrefot-maim[a], todos los sidonios: yo mismo[b] los expulsaré de delante de los hijos de Israel. Solo repártela[c] a Israel como heredad, como te he mandado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Misrefot-maim es un nombre de lugar; el nombre puede significar algo como «quemazones de agua», pero su sentido exacto es incierto.
    reason: cultural_note
  - marker: b
    text: O «yo mismo los desposeeré de delante de los hijos de Israel».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «repártela» refleja el giro idiomático de asignar la tierra, a menudo por sorteo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשְׁבֵי הָהָר
  english_pob_choice: the inhabitants of the hill country
  chosen_spanish: los habitantes de la región montañosa
  alternatives_spanish:
  - los que habitan la montaña
  - los habitantes de la montaña
  lexicon: HALOT
  rationale: יֹשְׁבֵי es un participio con sentido de ‘habitantes / los que habitan’, y הָהָר en contexto territorial se refiere mejor a una zona montañosa que a un solo monte. ‘Región montañosa’ suena natural en español y conserva el sentido geográfico.
- source_word: מִן הַלְּבָנוֹן עַד מִשְׂרְפֹת מַיִם
  english_pob_choice: from Lebanon to Misrephoth-maim
  chosen_spanish: desde el Líbano hasta Misrefot-maim
  alternatives_spanish:
  - desde el Líbano hasta Misrefot-Maim
  - desde el Líbano en dirección a Misrefot-maim
  lexicon: HALOT
  rationale: ‘Líbano’ se conserva como topónimo transliterado. Misrefot-maim también se trata como nombre de lugar en el contexto; por eso se translitera en el texto principal en vez de traducir especulativamente su posible sentido.
- source_word: כָּל צִידֹנִים
  english_pob_choice: all the Sidonians
  chosen_spanish: a todos los sidonios
  alternatives_spanish:
  - a todos los sidonios y sidonias
  - a todos los habitantes de Sidón
  lexicon: HALOT
  rationale: La expresión designa al colectivo sidonio. ‘Sidonios’ preserva el valor étnico/geográfico y reproduce bien el alcance de כָּל.
- source_word: אָֽנֹכִי֙ אוֹרִישֵׁ֔ם
  english_pob_choice: I myself will drive them out
  chosen_spanish: yo mismo los expulsaré
  alternatives_spanish:
  - yo mismo los desalojaré
  - yo mismo los sacaré de allí
  lexicon: HALOT
  rationale: אָנֹכִי añade énfasis, reflejado con ‘yo mismo’. El hifil de ירשׁ aquí implica sacar/desposeer a los habitantes de la tierra; ‘expulsaré’ comunica con claridad esa fuerza en español.
- source_word: מִפְּנֵי בְּנֵי יִשְׂרָאֵל
  english_pob_choice: before the sons of Israel
  chosen_spanish: de delante de los hijos de Israel
  alternatives_spanish:
  - ante los hijos de Israel
  - de la presencia de los hijos de Israel
  lexicon: HALOT
  rationale: La preposición reproduce el modismo espacial hebreo de remoción ‘de delante de’. Se conserva ‘hijos de Israel’ por fidelidad formal y por consistencia con el uso del original.
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solamente
  - Pero
  lexicon: HALOT
  rationale: רַק expresa restricción o excepción. ‘Solo’ comunica bien que, pese a la expulsión prometida, Joshua todavía debe realizar el reparto de la tierra.
- source_word: הַפִּלֶהָ
  english_pob_choice: allot it
  chosen_spanish: repártela
  alternatives_spanish:
  - distribúyela
  - asígnala por sorteo
  lexicon: HALOT
  rationale: El verbo está en una construcción causativa idiomática vinculada al reparto por sorteo de la tierra. ‘Repártela’ transmite ese sentido distributivo sin sobrecargar el verso con una explicación técnica.
- source_word: לְיִשְׂרָאֵל בְּנַחֲלָה
  english_pob_choice: to Israel as an inheritance
  chosen_spanish: a Israel como heredad
  alternatives_spanish:
  - para Israel como herencia
  - a Israel como posesión
  lexicon: HALOT
  rationale: נַחֲלָה en contexto de reparto de la tierra tiene fuerte matiz de posesión heredada. ‘Heredad’ conserva el valor de bien heredado y su resonancia teológica mejor que una simple ‘posesión’.
- source_word: כַּאֲשֶׁר צִוִּיתִיךָ
  english_pob_choice: as I have commanded you
  chosen_spanish: como te he mandado
  alternatives_spanish:
  - tal como te he mandado
  - como yo te he mandado
  lexicon: HALOT
  rationale: El perfecto remite a una orden ya dada y aún vigente. ‘Te he mandado’ es un equivalente natural en español que conserva esa anterioridad con validez continua.
theological_decisions:
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: El hebreo es literalmente filial y masculino plural. En coherencia con la fidelidad formal del proyecto, se conserva ‘hijos de Israel’ en vez de neutralizar la expresión.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering נַחֲלָה in land-allotment context
  english_pob_reading: inheritance
  chosen_spanish_reading: heredad
  alternative_spanish_readings:
  - herencia
  - posesión
  rationale: En este contexto la tierra no es solo un territorio, sino una posesión concedida y transmitida por pacto. ‘Heredad’ conserva mejor ese matiz jurídico y teológico que una palabra más general.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto fue confirmado sin modificaciones, y el cotejo posterior mostró alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ en los casos en que el nombre divino aparece; este versículo no lo contiene.
  - Se preservó la distinción entre topónimos transliterados y términos de reparto de tierra.
  - ‘Hijos de Israel’ y ‘heredad’ siguen la terminología consistente del proyecto para este pasaje.
