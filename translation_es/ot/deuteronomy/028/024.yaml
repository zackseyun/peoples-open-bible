review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: Yahvé como sujeto, la lluvia de la tierra convertida en materia seca, el descenso desde los cielos y el resultado final de destrucción. Sin embargo, «arena» para וְעָפָר no refleja bien el valor léxico de עָפָר, que se acerca más a «tierra», «suelo» o «polvo/tierra suelta» que a arena. La nota al pie ya conserva la alternativa correcta, lo que confirma que el texto principal necesita ajuste.'
  spanish_quality_summary: 'El español es claro y natural, con buen registro bíblico moderno. No obstante, hay un problema de formato: el marcador debe ir pegado al término relevante como `[a]`, no separado como ` [a]arena`. Además, «polvo y tierra» suena más fiel y suficientemente natural en este contexto de maldición pactual.'
  glossary_alignment: Se alinea bien con las directrices del proyecto en «Yahvé», «cielos» y el tono general. La principal desviación es la elección de «arena» para עָפָר, que no sigue adecuadamente la decisión léxica documentada en inglés («powder» con nota alternativa 'dirt/earth') ni el campo semántico hebreo. Conviene volver a una opción como «tierra» en el texto y conservar la nota explicativa.
  issues:
  - severity: medium
    issue: «arena» para וְעָפָר es demasiado específica y semánticamente inexacta
    rationale: עָפָר normalmente denota tierra, suelo, polvo o material terroso suelto, no arena en sentido propio. «Arena» puede desviar la imagen hacia granos arenosos en vez de la maldición de sequedad y polvo terroso.
  - severity: low
    issue: El marcador de nota está mal anclado y formateado
    rationale: El proyecto exige marcadores exactos en formato `[a]` en el punto relevante del texto. El borrador tiene ` y [a]arena`, con separación incorrecta respecto al término.
  revised_spanish_text: Yahvé hará que la lluvia de tu tierra sea polvo y tierra[a]; desde los cielos caerá sobre ti hasta que seas destruido.
  revised_footnotes:
