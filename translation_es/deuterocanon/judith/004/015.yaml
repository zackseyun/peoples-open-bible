translation:
  language: es
  text: Y Joakim, el sumo sacerdote[a], y todos los que estaban en presencia del Señor—los sacerdotes y los que ministraban al Señor, ceñidos de cilicio alrededor de la cintura—ofrecían el holocausto regular, y las oraciones[b], y las ofrendas voluntarias del pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el gran sacerdote»; el griego ὁ ἱερεὺς ὁ μέγας designa el cargo de sumo sacerdote.
    reason: lexical_alternative
  - marker: b
    text: O «los votos»; en este contexto sacrificial, εὐχάς también puede aludir a votos u ofrendas votivas.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰωακεὶμ
  english_pob_choice: Joakim
  chosen_spanish: Joakim
  alternatives_spanish:
  - Joaquín
  - Joaquim
  lexicon: Nombre propio transliterado
  rationale: Se conserva la forma griega breve Ἰωακεὶμ mediante la transliteración habitual 'Joakim', en vez de sustituirla por una forma más tradicional que no refleja tan de cerca el texto fuente.
- source_word: ὁ ἱερεὺς ὁ μέγας
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  - el sacerdote principal
  lexicon: Expresión sacerdotal del griego bíblico
  rationale: Aunque literalmente puede leerse 'el sacerdote, el grande', el sentido establecido en el contexto cultual es el título de oficio 'sumo sacerdote'. En español es la forma más natural y fiel a la función del término.
- source_word: οἱ παρεστηκότες ἐνώπιον Κυρίου
  english_pob_choice: those who stood before the Lord
  chosen_spanish: los que estaban en presencia del Señor
  alternatives_spanish:
  - los que estaban de pie ante el Señor
  - los que asistían ante el Señor
  lexicon: LSJ / uso cultual
  rationale: '''Estaban en presencia'' conserva la idea reverente de estar ante Dios sin forzar una calca dura. ''Señor'' mantiene el tratamiento del griego κύριος en este contexto deuterocanónico.'
- source_word: οἱ λειτουργοῦντες Κυρίῳ
  english_pob_choice: those ministering to the Lord
  chosen_spanish: los que ministraban al Señor
  alternatives_spanish:
  - los que servían al Señor
  - los ministros del Señor
  lexicon: LSJ / lenguaje cultual
  rationale: '''Ministrar'' conserva el matiz de servicio sagrado propio de λειτουργέω en contexto litúrgico, sin reducirlo al sentido general de ''servir''.'
- source_word: σάκκους περιεζωσμένοι τὰς ὀσφύας αὐτῶν
  english_pob_choice: with sackcloth girded around their waists
  chosen_spanish: ceñidos con sacos alrededor de sus cinturas
  alternatives_spanish:
  - ceñidos con cilicio alrededor de sus cinturas
  - con sacos ceñidos a sus lomos
  lexicon: LSJ / idiomática española
  rationale: '''Sacos'' comunica el material penitencial del griego σάκκους y ''cinturas'' evita el arcaísmo de ''lomos'' o ''riñones''. ''Ceñidos'' preserva la imagen concreta de estar atados/ajustados con tela de duelo.'
- source_word: προσέφερον
  english_pob_choice: were offering
  chosen_spanish: ofrecían
  alternatives_spanish:
  - estaban ofreciendo
  - presentaban
  lexicon: Aspecto imperfectivo
  rationale: El imperfecto griego indica una acción en curso o habitual; en español 'ofrecían' reproduce bien ese aspecto sin sonar pesado.
- source_word: τὴν ὁλοκαύτωσιν
  english_pob_choice: the regular whole burnt offering
  chosen_spanish: el holocausto regular
  alternatives_spanish:
  - el holocausto continuo
  - el holocausto perpetuo
  lexicon: LSJ / término sacrificial
  rationale: '''Holocausto'' preserva el término sacrificial de quemado total. ''Regular'' expresa aquí la continuidad o reiteración del sacrificio sin imponer ''diario'' ni exagerar con ''perpetuo''.'
- source_word: τοῦ ἐνδελεχισμοῦ
  english_pob_choice: regular
  chosen_spanish: regular
  alternatives_spanish:
  - continuo
  - perpetuo
  - diario
  lexicon: LSJ
  rationale: La idea es de repetición o permanencia ritual. En español, 'regular' transmite esa constancia de manera clara y no excesivamente interpretativa.
- source_word: τὰς εὐχὰς
  english_pob_choice: the prayers
  chosen_spanish: las oraciones[b]
  alternatives_spanish:
  - los votos
  - las súplicas
  - las plegarias
  lexicon: LSJ / contexto sacrificial
  rationale: El audit trail inglés finalmente optó por 'prayers', y el español sigue esa lectura. Se mantiene, sin embargo, la tensión de que en contexto sacrificial εὐχαί puede referirse a votos u ofrendas votivas; por eso se deja nota alternativa en pie de página.
- source_word: τὰ ἑκούσια δόματα
  english_pob_choice: the freewill gifts
  chosen_spanish: los dones voluntarios
  alternatives_spanish:
  - las ofrendas voluntarias
  - los regalos voluntarios
  lexicon: LSJ / español culto
  rationale: '''Dones voluntarios'' conserva el valor de δόματα como regalos/ofrendas y el matiz de ἑκούσια como espontáneo, libremente dado, sin cerrar en exceso la forma cultual exacta.'
theological_decisions:
- issue: Tratamiento de κύριος en griego deuterocanónico
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - el Señor
  - Yahvé
  rationale: El texto fuente griego usa κύριος sin escribir el Tetragrámaton; por eso se traduce como 'Señor'. Se evita importar 'Yahvé' al texto principal en ausencia de una base textual directa aquí, aunque se conserva el tono reverente y cultual.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord / Señor'
- issue: Sentido de εὐχαί en contexto sacrificial
  english_pob_reading: the prayers
  chosen_spanish_reading: las oraciones
  alternative_spanish_readings:
  - los votos
  - las ofrendas votivas
  rationale: Aunque el contexto sacrificial permite una lectura votiva, el testigo inglés revisado de la POB decidió 'prayers'. El español sigue esa decisión, mientras una nota preserva la alternativa cultual para no borrar la ambigüedad documentada.
  doctrine_reference: Lexical note on εὐχαί in sacrificial context
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail inglés que cambió 'vows' por 'prayers' para εὐχαί. El español refleja esa decisión final ('las oraciones') pero mantiene en nota la alternativa cultual documentada para no perder la tensión lexical del griego. También se respetó la continuidad imperfectiva con 'ofrecían' y el valor ritual de τοῦ ἐνδελεχισμοῦ con 'regular'.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος, en consonancia con el griego deuterocanónico y con la convención POB.
  - '''Holocausto'' se usa como término sacrificial técnico, no como metáfora general.'
  - '''Dones voluntarios'' se deja en plural para seguir τὰ ἑκούσια δόματα y su sentido de ofrendas del pueblo.'
  - '''Ministraban'' preserva el registro litúrgico sin reemplazarlo por un término más general.'
