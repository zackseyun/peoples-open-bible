id: ROM.14.8
reference: Romans 14:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐάν τε γὰρ ζῶμεν, τῷ κυρίῳ ζῶμεν, ἐάν τε ἀποθνῄσκωμεν, τῷ κυρίῳ ἀποθνῄσκομεν. ἐάν τε οὖν ζῶμεν ἐάν τε ἀποθνῄσκωμεν, τοῦ κυρίου ἐσμέν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/008.yaml
  text: For if we live, we live to the Lord, and if we die, we die to the Lord. So then, whether we live or whether we die, we are the Lord's.
translation:
  language: ko
  text: 우리가 살아도 주께 살고, 죽어도 주께 죽기 때문입니다. 그러므로 우리가 살든지 죽든지 우리는 주의 것입니다[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「우리는 주께 속해 있다」.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ κυρίῳ ζῶμεν / τῷ κυρίῳ ἀποθνῄσκομεν
  english_pob_choice: we live to the Lord / we die to the Lord
  chosen_korean: 주께 살다 / 주께 죽다
  alternatives_korean:
  - 주를 위하여 살다 / 주를 위하여 죽다
  lexicon: BDAG
  rationale: 관계·지향의 여격. 한국 성경 관행 「주께」로 옮겨 14:7의 「자기 자신을 위하여」와 대조하면서도 더 함축적 어휘를 유지.
- source_word: τοῦ κυρίου ἐσμέν
  english_pob_choice: we are the Lord's
  chosen_korean: 우리는 주의 것입니다
  alternatives_korean:
  - 우리는 주께 속한다
  lexicon: BDAG
  rationale: 소유 속격. 「주의 것」이 간결하고 강한 소속의 의미를 살린다.
theological_decisions:
- issue: 본문 κύριος의 지시 대상과 의미의 폭
  chosen_reading: 「주」로 보존; 문맥상 예수를 가리키되 칭호의 신학적 무게를 한정하지 않는다
  alternative_readings:
  - 「하나님」으로 폭넓게
  - 「주인」으로 권위 강조
  rationale: 직후 14:9가 메시아를 가리키지만, 본문이 단지 κύριος라 할 때 한국어도 「주」로 보존한다.
  doctrine_reference: 'DOCTRINE.md: κύριος→주; 신학적 긴장을 보존하라'
