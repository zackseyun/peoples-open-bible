translation:
  language: es
  text: Y Mesa, rey de Moab, era criador de ovejas, y solía pagar al rey de Israel cien mil corderos y la lana[a] de cien mil carneros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «cien mil carneros, lana». La frase es elíptica; puede significar «cien mil carneros con lana» o, más probablemente en este contexto, «la lana de cien mil carneros».
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹקֵד
  english_pob_choice: sheep breeder
  chosen_spanish: criador de ovejas
  alternatives_spanish:
  - pastor de ovejas
  - ganadero de ovejas
  - criador de ganado ovino
  lexicon: HALOT
  rationale: El término designa a alguien dedicado a la crianza/cuidado de ovejas; en español, "criador de ovejas" transmite de forma clara la ocupación económica sin introducir un título demasiado técnico o arcaico.
- source_word: וְהֵשִׁיב
  english_pob_choice: used to pay
  chosen_spanish: solía pagar
  alternatives_spanish:
  - pagaba
  - entregaba regularmente
  - acostumbraba a pagar
  lexicon: HALOT
  rationale: El hifil de שוב aquí expresa el acto habitual de rendir tributo. "Solía pagar" conserva el valor iterativo/habitual mejor que un simple pretérito puntual.
- source_word: מֵאָה אֶלֶף כָּרִים
  english_pob_choice: one hundred thousand lambs
  chosen_spanish: cien mil corderos
  alternatives_spanish:
  - cien mil carneros jóvenes
  - cien mil corderos machos
  lexicon: HALOT
  rationale: כָּרִים se refiere a corderos o carneros jóvenes macho; "corderos" es natural en español y mantiene la claridad del tributo.
- source_word: אֵילִים צָמֶר
  english_pob_choice: the wool of one hundred thousand rams
  chosen_spanish: la lana de cien mil carneros
  alternatives_spanish:
  - la lana de cien mil carneros machos
  - cien mil carneros, lana
  lexicon: HALOT
  rationale: El hebreo es elíptico y coloca "lana" después de "carneros". En español, la construcción más natural y fiel al sentido es entenderla como la lana procedente de esos carneros.
- source_word: מֶלֶךְ מוֹאָב / מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Moab / king of Israel
  chosen_spanish: rey de Moab / rey de Israel
  alternatives_spanish:
  - monarca de Moab / monarca de Israel
  lexicon: standard construct rendering
  rationale: Se conserva la estructura de constructo con los títulos en español estándar y los nombres propios transliterados/adaptados según la convención del proyecto.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y el trasfondo económico del tributo, manteniendo la solución del POB en inglés para נֹקֵד como oficio pastoral y para la elipsis de צָמֶר como lana perteneciente a los carneros.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma general del proyecto, aunque este versículo no lo contiene.
  - Se usó "cien mil" dos veces para reflejar la repetición del hebreo sin simplificación.
  - '"Corderos" y "carneros" se distinguen para conservar el contraste del original y la solución auditada en inglés.'
