- from: '[a] Cántico de ascensos. En mi angustia clamé a Yahvé, y él me respondió.'
  to: Cántico de subidas[a]. En mi angustia llamé a Yahvé, y él me respondió.
  rationale: Se ajusta la rúbrica a una formulación más natural en español («Cántico de subidas») sin perder la literalidad básica, y se conserva la alternativa en nota. Se cambia «clamé» por «llamé» para seguir más de cerca el valor léxico de קָרָאתִי según la auditoría inglesa. También se recoloca la marca de nota en la frase pertinente.
