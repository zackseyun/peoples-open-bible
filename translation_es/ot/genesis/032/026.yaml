translation:
  language: es
  text: Cuando vio que no podía prevalecer[a] sobre él[c], tocó la coyuntura de su muslo[b], y la coyuntura del muslo de Jacob se dislocó mientras luchaba con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no podía vencerlo».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la coyuntura/cavidad de su muslo»; tradicionalmente, «el hueco de su muslo».'
    reason: lexical_alternative
  - marker: c
    text: Los pronombres hebreos siguen siendo ambiguos; el versículo no vuelve a nombrar explícitamente al oponente de Jacob.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: When he saw
  chosen_spanish: Cuando vio
  alternatives_spanish:
  - Y vio
  - Al ver
  lexicon: HALOT
  rationale: El waw consecutivo introduce el avance narrativo; «Cuando vio» conserva el valor temporal natural en español sin perder la continuidad del relato.
- source_word: לֹא יָכֹל לוֹ
  english_pob_choice: he could not prevail against him
  chosen_spanish: no podía prevalecer contra él
  alternatives_spanish:
  - no podía vencerlo
  - no podía imponerse a él
  lexicon: HALOT
  rationale: La construcción expresa incapacidad frente a un oponente. «Prevalecer contra» mantiene bien la idea competitiva de la lucha sin volverla demasiado abstracta.
- source_word: וַיִּגַּע
  english_pob_choice: he touched
  chosen_spanish: tocó
  alternatives_spanish:
  - golpeó
  - rozó
  lexicon: HALOT
  rationale: El verbo básico es «tocar»; aunque el efecto es contundente, el hebreo usa un verbo de contacto, no uno explícito de golpe.
- source_word: בְּכַף יְרֵכוֹ
  english_pob_choice: the socket of his thigh
  chosen_spanish: la coyuntura de su muslo
  alternatives_spanish:
  - el hueco de su muslo
  - la cavidad de su muslo
  - la cadera
  lexicon: HALOT
  rationale: כף + ירך designa la zona de unión del muslo/cadera. «Coyuntura» comunica la idea de articulación o unión, evitando un tecnicismo excesivo y manteniendo la imagen corporal.
- source_word: וַתֵּקַע
  english_pob_choice: was dislocated
  chosen_spanish: se dislocó
  alternatives_spanish:
  - se salió de su lugar
  - quedó descoyuntada
  lexicon: HALOT
  rationale: El verbo expresa que algo fue sacado de su posición; «se dislocó» transmite de forma clara el resultado de la lesión en español moderno.
- source_word: כַּף יֶרֶךְ יַעֲקֹב
  english_pob_choice: the socket of Jacob’s thigh
  chosen_spanish: la coyuntura del muslo de Jacob
  alternatives_spanish:
  - el hueco del muslo de Jacob
  - la cadera de Jacob
  lexicon: HALOT
  rationale: Se conserva la repetición léxica del hebreo para no perder la correspondencia entre ambas frases del versículo y para mantener el mismo campo semántico.
- source_word: בְּהֵאָבְקוֹ עִמּוֹ
  english_pob_choice: as he wrestled with him
  chosen_spanish: mientras luchaba con él
  alternatives_spanish:
  - mientras forcejeaba con él
  - en su lucha con él
  lexicon: HALOT
  rationale: El infinitivo con preposición marca simultaneidad. «Mientras luchaba con él» es natural y respeta la ambigüedad pronominal del hebreo sin resolverla.
theological_decisions:
- issue: Ambigüedad del referente en los pronombres («él / con él»)
  english_pob_reading: Retain the Hebrew narrative ambiguity in English pronouns rather than identifying the figure explicitly.
  chosen_spanish_reading: Conservar la ambigüedad narrativa del hebreo en los pronombres españoles, sin identificar explícitamente al personaje.
  alternative_spanish_readings:
  - mientras luchaba con Jacob
  - mientras luchaba con un hombre
  rationale: El texto hebreo no repite la identidad del oponente en esta cláusula. La traducción debe preservar esa tensión narrativa y no resolverla más allá de lo que el versículo dice.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se revisó el borrador a la luz del contexto hebreo y del aparato auditado en inglés; no se requirieron cambios adicionales tras la última pasada de revisión, y se mantuvo la ambigüedad pronominal del original.
  spanish_consistency_notes:
  - Se eligió «Yahvé» en otros contextos del proyecto cuando el tetragrámaton está en juego; este versículo no lo contiene.
  - Se mantuvo la misma red semántica para כף/ירך en ambas apariciones, evitando alternar entre «coyuntura», «hueco» o «cadera» dentro del mismo versículo.
  - «Luchar» se prefirió sobre «forcejear» por ser más natural en español y suficientemente amplio para el hebreo de este contexto.
