translation:
  language: es
  text: Por tanto[a], si esta ciudad es reconstruida y los muros quedan terminados, no continuarán pagando tributo[b], sino que incluso se opondrán a reyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces, si». El griego usa οὖν para enlazar con una inferencia; «Por tanto» conserva ese valor conclusivo.'
    reason: lexical_alternative
  - marker: b
    text: El testimonio griego de este versículo es la fuente principal. Su redacción no coincide de cerca con el material paralelo semítico suministrado, por lo que la traducción sigue directamente el griego y mantiene el trasfondo de restauración señalado por la tradición paralela.
    reason: textual_variant
lexical_decisions:
- source_word: ἐὰν οὖν
  english_pob_choice: Therefore, if
  chosen_spanish: Por tanto, si
  alternatives_spanish:
  - Así que, si
  - Entonces, si
  lexicon: LSJ
  rationale: οὖν introduce una conclusión inferida; «Por tanto» conserva ese enlace argumentativo en español sin sonar artificial.
- source_word: ἡ πόλις αὕτη
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - aquella ciudad
  lexicon: LSJ
  rationale: El demostrativo griego es proximal; «esta ciudad» reproduce bien la perspectiva de cercanía del hablante.
- source_word: οἰκοδομηθῇ
  english_pob_choice: is rebuilt
  chosen_spanish: es reedificada
  alternatives_spanish:
  - es reconstruida
  - es edificada
  lexicon: LSJ
  rationale: En el contexto de restauración, «reedificada» comunica con precisión la idea de construir de nuevo, no de una construcción inicial.
- source_word: τὰ τείχη συντελεσθῇ
  english_pob_choice: the walls are completed
  chosen_spanish: los muros son terminados
  alternatives_spanish:
  - los muros son completados
  - los muros quedan terminados
  lexicon: LSJ
  rationale: συντελέω expresa llevar a término. «Son terminados» mantiene la idea de finalización sin añadir matices no presentes en el griego.
- source_word: φορολογίαν
  english_pob_choice: tribute
  chosen_spanish: tributo
  alternatives_spanish:
  - impuesto
  - tributación
  lexicon: LSJ
  rationale: En este marco político-imperial, φορολογία se refiere mejor a una obligación de tributo que a un impuesto ordinario; «tributo» conserva ese sentido.
- source_word: οὐ μὴ ὑπομείνωσιν δοῦναι
  english_pob_choice: they will certainly not continue to pay
  chosen_spanish: no continuarán pagando
  alternatives_spanish:
  - de ningún modo seguirán pagando
  - ciertamente no seguirán pagando
  lexicon: LSJ
  rationale: La negación enfática οὐ μὴ se traduce de forma natural con «no continuarán», que en español expresa una negativa firme y sostenida. Se evita una calca demasiado pesada, sin borrar el énfasis.
- source_word: ἀλλὰ καὶ
  english_pob_choice: but will even
  chosen_spanish: sino que incluso
  alternatives_spanish:
  - pero además
  - y aun
  lexicon: LSJ
  rationale: La construcción intensifica la acusación. «Sino que incluso» preserva esa progresión en español.
- source_word: βασιλεῦσιν ἀντιστήσονται
  english_pob_choice: oppose kings
  chosen_spanish: se opondrán a reyes
  alternatives_spanish:
  - resistirán a reyes
  - se alzarán contra reyes
  lexicon: LSJ
  rationale: ἀνθίστημι significa ponerse en contra o resistir. «Se opondrán a reyes» es claro y mantiene el tono político de rebelión o resistencia.
theological_decisions:
- issue: Fuente principal griega frente al paralelo semítico/MT aproximado
  english_pob_reading: The Greek source for this verse is the primary witness. Its wording here does not closely match the supplied MT-parallel material, so the translation follows the Greek directly while reflecting the broader restoration context signaled by the parallel tradition.
  chosen_spanish_reading: Se traduce directamente del griego, reconociendo que el paralelo semítico suministrado no coincide de cerca con esta formulación.
  alternative_spanish_readings:
  - Seguir el paralelo semítico para armonizar la redacción
  - mezclar ambos testimonios en una sola frase
  rationale: La decisión metodológica prioriza el testimonio griego, que es el ancla principal del versículo. Esto evita introducir armonizaciones no sustentadas por el texto fuente inmediato.
  doctrine_reference: Principio textual de prioridad del testimonio base y respeto por variantes/documentación de fuentes
translation_notes:
  revision_awareness: Se corrigió la anclaje de notas al incluir [b] en el texto principal junto a «tributo», resolviendo el error de validación anterior. La redacción se mantiene alineada con la revisión inglesa más reciente, que prefirió una negación de continuidad más natural que una expresión de mera capacidad de soportar.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aparece en el versículo; no se requiere decisión terminológica aquí.
  - «Tributo» se conserva por su fuerza política y fiscal; no se rebaja a «impuesto».
  - «Se opondrán a reyes» conserva la carga de resistencia política sin añadir rebeldía explícita no presente en el griego.
