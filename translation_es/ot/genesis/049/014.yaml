review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: Isacar comparado con un asno robusto, en reposo, entre apriscos/rediles. También preserva correctamente la nota sobre la rareza y debate de הַמִּשְׁפְּתָיִם. Sin embargo, hay un pequeño problema de estilo y naturalidad en la nota, y conviene ajustar el anclaje de la nota para que recaiga sobre el término debatido, no sobre ''asno''.'
  spanish_quality_summary: 'El texto principal es claro, fiel y de registro bíblico natural. ''Asno'', ''de fuertes huesos'', ''echado'' y ''apriscos'' funcionan bien en español eclesial amplio. La única reparación necesaria es menor: mejorar la nota al pie por gramática (''la bendición'') y por mayor naturalidad léxica (''alforjas'' en vez de ''bolsos de aparejo''), además de mover la marca al vocablo discutido.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La elección de 'asno' para חֲמוֹר y 'apriscos' para הַמִּשְׁפְּתָיִם concuerda con la evidencia y con la racionalidad documentada en la auditoría inglesa.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en 'asno' en lugar de 'apriscos'.
    rationale: La alternativa documentada ('saddlebags') corresponde al término hebreo הַמִּשְׁפְּתָיִם, no a חֲמוֹר. En español, el marcador debe ir sobre la palabra o frase debatida para mantener precisión auditiva y editorial.
  - severity: low
    issue: 'La redacción de la nota usa una expresión poco natural: ''bolsos de aparejo''.'
    rationale: Para la alternativa 'saddlebags', 'alforjas' es una opción más idiomática y clara en español bíblico/general que 'bolsos de aparejo'.
  - severity: low
    issue: 'Error gramatical en la nota: ''el bendición poética''.'
    rationale: Debe decir 'la bendición poética'.
  revised_spanish_text: Isacar es un asno de fuertes huesos, echado entre los apriscos[a].
  revised_footnotes:
  - marker: a
    text: O «entre las alforjas». El término hebreo es raro y su sentido es debatido; aquí se mantiene la lectura pastoral tradicional que mejor encaja con la bendición poética.
