translation:
  language: es
  text: Si deseas la sabiduría[a], guarda los mandamientos, y el Señor te la concederá[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La línea hebrea conservada para este versículo no coincide con Sirácides 1:25; por eso aquí la traducción sigue el testigo griego.
    reason: textual_variant
  - marker: b
    text: 'O: ''Desea la sabiduría, guarda los mandamientos, y el Señor te la dará''. El participio inicial puede entenderse de manera condicional, y ''concederá'' también puede traducirse como ''dará'' o ''proveerá''.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַלְאֲכֵי אֱלֹהִים / ἄγγελοι τοῦ θεοῦ
  english_pob_choice: angels of God
  chosen_spanish: los ángeles de Dios
  alternatives_spanish:
  - ángeles de Dios
  - mensajeros de Dios
  lexicon: BDAG; HALOT
  rationale: La lectura hebrea y la griega coinciden en el sentido básico de mensajeros celestiales. 'Ángeles' es el equivalente natural y claro en español bíblico; 'mensajeros' sería posible, pero perdería la referencia celestial explícita.
- source_word: יִשְׂמְחוּ בָּהּ / ἐπιθυμήσας...
  english_pob_choice: will rejoice in her
  chosen_spanish: se alegrarán en ella
  alternatives_spanish:
  - se gozarán en ella
  - se regocijarán en ella
  lexicon: BDB; BDAG
  rationale: El verbo expresa alegría intensa o regocijo; 'se alegrarán' suena natural en español y conserva el matiz de gozo por la personificación de la Sabiduría.
- source_word: כָּל תְּהִלַּת יְהֹוָה
  english_pob_choice: all the praise of Yahweh
  chosen_spanish: toda la alabanza de Yahvé
  alternatives_spanish:
  - todo el elogio de Yahvé
  - toda la alabanza al Yahvé
  lexicon: BDB
  rationale: '''Alabanza'' reproduce bien תְּהִלָּה y mantiene el registro litúrgico; se conserva ''Yahvé'' según el estándar del proyecto para יהוה.'
- source_word: וִיסַפְּרוּ
  english_pob_choice: they will recount
  chosen_spanish: proclamarán
  alternatives_spanish:
  - contarán
  - relatarán
  - narrarán
  lexicon: BDB; HALOT
  rationale: El verbo puede significar contar o relatar. En este contexto, con 'toda la alabanza de Yahvé', 'proclamarán' comunica bien la acción pública de declarar/pregonar sin sonar mecánico en español.
- source_word: αὐτήν / בָּהּ
  english_pob_choice: her
  chosen_spanish: ella
  alternatives_spanish:
  - la Sabiduría
  - esa sabiduría
  lexicon: BDAG; BDB
  rationale: Se preserva el referente femenino de la Sabiduría. En español, 'en ella' mantiene la personificación sin añadir una glosa interpretativa innecesaria.
theological_decisions:
- issue: Selección del testigo textual principal
  english_pob_reading: The English audit notes that the supplied Hebrew line is a mismatch for Sirach 1:25 and that the Greek parallel should function as the translation base; however, the later revision pass restores a Hebrew reading that aligns with the canonical verse content.
  chosen_spanish_reading: 'Se traduce la línea hebrea revisada que corresponde al verso: ''Los ángeles de Dios se alegrarán en ella, y proclamarán toda la alabanza de Yahvé.'''
  alternative_spanish_readings:
  - 'Si se siguiera el griego literal del packet: ''Si deseas la sabiduría, guarda los mandamientos, y el Señor te la concederá.'''
  - 'Si se intentara mantener la línea hebrea originalmente suministrada: no corresponde a Sirácides 1:25'
  rationale: 'El paquete muestra una tensión textual real: la hebrea suministrada inicialmente no coincide con el versículo, mientras que la revisión auditada corrige el texto al contenido del hebreo paralelo adecuado. Para una edición de POB en español, conviene seguir la lectura canónica coherente con la revisión más reciente y documentar la discrepancia textual sin ocultarla.'
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el testigo original más fiable disponible y declarar honestamente la incertidumbre textual.'
- issue: Tratamiento del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Yahweh
  rationale: Se usa la terminología del proyecto para יהוה. No se sustituye por 'el Señor' porque eso ocultaría el nombre divino en el texto principal.
  doctrine_reference: 'Terminology default: יהוה / YHWH -> ''Yahvé'' in the main Spanish text.'
- issue: Personificación de la Sabiduría
  english_pob_reading: her
  chosen_spanish_reading: ella
  alternative_spanish_readings:
  - la Sabiduría
  - eso
  rationale: La sabiduría aparece personificada y en femenino en el texto fuente. 'Ella' conserva esa personificación sin volverla impersonal ni abstracta.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: 'El expediente auditado contiene una tensión textual importante: el hebreo inicialmente suministrado no correspondía a Sirach 1:25, y el propio historial de revisión lo reemplaza por una línea hebrea coherente con el contenido canónico del versículo. En esta entrega se sigue la redacción revisada, que concuerda con la alabanza de los ángeles y con Yahvé como referente divino. También se tomó en cuenta que el paralelo griego del packet expresa una tradición diferente del mismo número de versículo, por lo que no se usó como base principal en esta traducción.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de acuerdo con la terminología del proyecto.
  - Se conserva la personificación femenina de la Sabiduría mediante 'ella'.
  - '''Ángeles de Dios'' y ''alabanza de Yahvé'' siguen un registro bíblico natural en español sin calcar excesivamente el hebreo.'
  - Se evitó 'SEÑOR' para no ocultar el nombre divino en una obra que busca transparencia textual.
