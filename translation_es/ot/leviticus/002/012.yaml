  rationale: Se corrigió el objeto directo a plural («los presentaréis») para reflejar fielmente אֹתָם y mantener concordancia con «no subirán». También se ajustó «sobre el altar» a «al altar» por naturalidad e idiomaticidad. Se conservaron la terminología cultual y el nombre divino del proyecto.
