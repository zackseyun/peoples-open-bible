review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido hebreo general y respeta las principales decisiones del POB inglés: concretiza מַפַּלְתּוֹ como imagen arbórea, mantiene futuro profético, y traduce פֹּארֹתָיו con una opción natural en español. Sin embargo, omite las dos alternativas léxicas preservadas en el rastro inglés, que aquí siguen siendo pertinentes: la alternativa abstracta para מַפַּלְתּוֹ y la alternativa ''ramas'' para פֹּארֹתָיו según la distribución de notas del POB.'
  spanish_quality_summary: 'El español es claro y digno. ''Sobre su tronco caído habitarán...'' suena natural. No obstante, ''estarán todas las bestias del campo'' es menos idiomático para ocupación espacial que ''estarán/andarán por'' o una reformulación. Aun así, por cercanía al POB y al hebreo, basta un ajuste menor: introducir las notas y mantener la frase principal con una leve mejora de anclaje. También conviene reflejar en nota la posibilidad ''caída'' para evitar perder la alternativa auditada.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Aves de los cielos' y 'bestias del campo' encajan bien con el registro bíblico. 'Ramas' es aceptable como equivalente español natural de 'boughs', pero debe conservarse la alternativa lexical auditada mediante nota. No hay asuntos teológicos especiales.
  issues:
  - severity: medium
    issue: Faltan las notas léxicas preservadas por el POB inglés.
    rationale: 'El rastro auditado conserva dos alternativas significativas: מַפַּלְתּוֹ como ''su caída'' y פֹּארֹתָיו como ''sus ramas/ramajes'' frente a una opción principal más específica. El español no debe perder esas alternativas cuando siguen siendo relevantes.'
  - severity: low
    issue: La correspondencia de notas del inglés está invertida respecto de los anclajes semánticos esperables en español.
    rationale: En el inglés, la marca junto a 'dwell' remite a la nota sobre 'branches', y la de 'trunk' remite a 'downfall'. En español es preferible anclar cada nota en la palabra o frase pertinente para evitar confusión del lector.
  - severity: low
    issue: '''Estarán todas las bestias del campo'' es algo rígido en español.'
    rationale: No es incorrecto, pero suena menos natural que otras formulaciones. Sin embargo, al no requerirse una reescritura mayor, puede mantenerse con el añadido de notas y una puntuación limpia.
  revised_spanish_text: Sobre su tronco caído[a] habitarán todas las aves de los cielos, y sobre sus ramas[b] estarán todas las bestias del campo.
  revised_footnotes:
