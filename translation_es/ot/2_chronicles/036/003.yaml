base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/036/003.yaml
  text: And the king of Egypt deposed him in Jerusalem and imposed on the land a tribute of a hundred talents of silver and a talent of gold[a][b][c].
  footnotes:
  - marker: a
    text: Or 'deposed him'; the Hebrew verb can mean to remove someone from position or to take him away.
    reason: alternative_reading
  - marker: b
    text: Or 'imposed a fine on the land'; the verb refers to levying a monetary penalty.
    reason: lexical_alternative
  - marker: c
    text: A talent was a large unit of weight; the text preserves the ancient measure rather than converting it.
    reason: cultural_note
