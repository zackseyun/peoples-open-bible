    text: Or "farewell gifts"; the Hebrew may also carry the sense of gifts given when sending someone away, possibly with an echo of divorce imagery.
    reason: lexical_alternative
  - marker: b
    text: 'Achzib sounds like the Hebrew word for "deception" or "disappointment," creating a wordplay: the town''s houses will prove deceptive to Israel''s kings.'
