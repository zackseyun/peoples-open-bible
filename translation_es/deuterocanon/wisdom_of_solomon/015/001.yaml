translation:
  language: es
  text: Pero tú, nuestro Dios, eres bondadoso y verdadero, paciente y gobiernas todo con misericordia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Σὺ δὲ
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Mas tú
  lexicon: contraste discursivo en griego koiné
  rationale: δὲ introduce contraste con el contexto anterior; en español, 'Pero tú' conserva la oposición directa sin volver la frase demasiado literaria. 'Mas tú' es posible, pero menos natural en español moderno.
- source_word: ὁ θεὸς ἡμῶν
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  - Dios nuestro
  lexicon: sintaxis posesiva del griego bíblico
  rationale: El posesivo de primera persona plural se expresa de forma natural como 'nuestro Dios'. Mantiene la relación de pertenencia/culto sin añadir una lectura teológica ajena al texto.
- source_word: χρηστὸς
  english_pob_choice: kind
  chosen_spanish: bondadoso
  alternatives_spanish:
  - amable
  - benigno
  - bueno
  lexicon: BDAG
  rationale: '''Bondadoso'' comunica la benevolencia y amabilidad activa de χρηστός en un registro digno y natural en español. ''Amable'' puede sonar más interpersonal y ''bueno'' es demasiado general.'
- source_word: ἀληθής
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - fiel
  - veraz
  - auténtico
  lexicon: BDAG
  rationale: '''Verdadero'' preserva el sentido amplio de autenticidad y confiabilidad de Dios. ''Veraz'' enfatiza más la veracidad en el hablar; ''fiel'' sería una posible expansión relacional, pero no es la opción principal aquí.'
- source_word: μακρόθυμος
  english_pob_choice: patient
  chosen_spanish: paciente
  alternatives_spanish:
  - longánime
  - tardo para la ira
  - longánimo
  lexicon: BDAG
  rationale: '''Paciente'' reproduce bien la idea de lentitud para la ira y perseverancia. ''Longánime'' es más tradicional pero menos transparente para lectores actuales.'
- source_word: ἐλέει
  english_pob_choice: with mercy
  chosen_spanish: con misericordia
  alternatives_spanish:
  - por misericordia
  - en misericordia
  - misericordiosamente
  lexicon: BDAG
  rationale: El dativo expresa modo/medio en relación con διοικῶν. 'Con misericordia' conserva el sustantivo 'misericordia' y suena idiomático en español, sin convertir prematuramente la frase en un adverbio.
- source_word: διοικῶν
  english_pob_choice: govern
  chosen_spanish: gobiernas
  alternatives_spanish:
  - ordenas
  - administras
  - diriges
  lexicon: BDAG
  rationale: Para Dios y 'todas las cosas', 'gobiernas' expresa la acción providencial de manera clara y sobria. 'Ordenas' o 'administras' son posibles, pero 'gobiernas' recoge mejor el alcance soberano del verbo.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - el universo entero
  - todo cuanto existe
  lexicon: BDAG
  rationale: '''Todas las cosas'' mantiene la amplitud total del griego y suena más formal y escritural que ''todo''.'
theological_decisions:
- issue: Relación entre atributos divinos y gobierno providencial
  english_pob_reading: God is kind and true, patient, and governs all things with mercy.
  chosen_spanish_reading: Dios es bondadoso y verdadero, paciente, y gobierna todas las cosas con misericordia.
  alternative_spanish_readings:
  - Dios es bondadoso y fiel, paciente, y gobierna todo con misericordia
  - Dios es bueno y verdadero, paciente, y administra todas las cosas con misericordia
  rationale: La oración mantiene la serie atributiva del texto griego sin resolver tensiones conceptuales. 'Gobierna todas las cosas con misericordia' conserva tanto la soberanía divina como el modo misericordioso de su acción, tal como lo hace la lectura inglesa auditable.
  doctrine_reference: 'DOCTRINE.md: conservar la tensión teológica, evitando suavizar o sistematizar en exceso.'
translation_notes:
  revision_awareness: La versión española sigue de cerca la última lectura inglesa auditada ('kind and true, patient, and govern all things with mercy') y mantiene el paralelismo atributivo del griego. Se eligieron equivalentes naturales en español sin introducir matices no sustentados por χρηστός, ἀληθής, μακρόθυμος y διοικῶν.
  spanish_consistency_notes:
  - Se usa 'Dios' en lugar de 'Señor' porque el griego tiene ὁ θεὸς ἡμῶν, no κύριος.
  - Se prefirió 'bondadoso' sobre 'gracioso' para evitar confusión con χάρις, que no aparece aquí.
  - La construcción verbal 'gobiernas' hace explícita la segunda persona del griego y resulta más fluida que un participio español pesado.
  - No se añadió nota textual porque el testimonio griego proporcionado es estable y la auditabilidad se mantiene con las decisiones léxicas documentadas.
