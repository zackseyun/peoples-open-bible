translation:
  language: es
  text: Porque allí hay tronos puestos para juicio[a][b], tronos para la casa de David[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se sientan para juicio»; el verbo hebreo literalmente significa «sentarse» y puede describir tronos establecidos para uso judicial.'
    reason: lexical_alternative
  - marker: b
    text: «Juicio» también puede traducirse «justicia», destacando la función de estos tronos como tribunales.
    reason: lexical_alternative
  - marker: c
    text: 'O: «tronos de la casa de David»; «para la casa de David» conserva con más transparencia el valor de לְ en el hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduces la razón dada por el salmo. «Porque» conserva la fuerza explicativa de כִּי sin volver la frase artificial en español.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - en ese lugar
  lexicon: HALOT
  rationale: Refiere a Jerusalén, mencionada en el contexto inmediato. «Allí» es natural y mantiene el valor locativo.
- source_word: יָשְׁבוּ
  english_pob_choice: sit
  chosen_spanish: se sientan
  alternatives_spanish:
  - están puestos
  - están establecidos
  - se colocan
  lexicon: HALOT
  rationale: El verbo hebreo literalmente significa «sentarse/dwelling». Con «tronos» como sujeto, «se sientan» conserva la imagen concreta y la función establecida sin forzar una paráfrasis.
- source_word: כִסְא֣וֹת
  english_pob_choice: thrones
  chosen_spanish: tronos
  alternatives_spanish:
  - asientos
  lexicon: HALOT
  rationale: El término designa tronos reales/judiciales, no asientos comunes. «Tronos» preserva el matiz político y judicial.
- source_word: לְמִשְׁפָּט
  english_pob_choice: for judgment
  chosen_spanish: para el juicio
  alternatives_spanish:
  - para justicia
  - para la sentencia
  lexicon: HALOT
  rationale: מִשְׁפָּט puede ser «juicio» o «justicia». Aquí el contexto es la función judicial de los tronos; «juicio» mantiene cercanía al hebreo y su valor forense.
- source_word: כִּסְא֗וֹת לְבֵ֣ית דָּוִֽיד
  english_pob_choice: thrones for the house of David
  chosen_spanish: tronos para la casa de David
  alternatives_spanish:
  - tronos de la casa de David
  - tronos pertenecientes a la casa de David
  - tronos davídicos
  lexicon: HALOT
  rationale: La construcción relaciona esos tronos con la casa real davídica. «Para la casa de David» refleja mejor el לְ señalado en el audit trail inglés y evita cerrar el sentido en una posesión más rígida de lo que el hebreo exige.
theological_decisions:
- issue: Referencia davídica y función judicial
  english_pob_reading: The verse refers to the royal/judicial thrones associated with the Davidic dynasty in Jerusalem.
  chosen_spanish_reading: El versículo alude a tronos reales y judiciales ligados a la dinastía davídica en Jerusalén.
  alternative_spanish_readings:
  - Una referencia más general a los tribunales civiles de Jerusalén
  - Una lectura mesiánica explícita incorporada en la traducción
  rationale: El hebreo menciona explícitamente «tronos» y «la casa de David». La traducción conserva ese sentido histórico y dinástico sin importar una interpretación mesiánica más amplia al texto principal.
  doctrine_reference: Conservar la tensión teológica y no resolverla por adelantado; no introducir afirmaciones doctrinales que el texto no expresa.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente ajustó el orden para reflejar de manera más literal el hebreo («there thrones sit») y modificó la relación de לְ en «for the house of David». La versión española sigue esa misma línea: mantiene el orden locativo-concreto y conserva «para» en ambos casos para reflejar el paralelismo del original.'
  spanish_consistency_notes:
  - Se usa «tronos» de forma consistente para כִסְאוֹת, evitando «asientos».
  - Se usa «casa de David» y no «de la casa de David» para conservar la relación constructa natural en español.
  - «Juicio» se mantiene para מִשְׁפָּט, con nota para la alternativa semántica «justicia».
  - La puntuación reproduce el paralelismo poético del hebreo con dos miembros coordinados.
