revisions:
- from: En sus días, Hiel de Betel reedificó Jericó[a]. A costa de Abiram, su primogénito, puso sus cimientos, y a costa de Segub, su hijo menor, levantó sus puertas[b], conforme a la palabra de Yahvé que había hablado por medio de Josué hijo de Nun.
