translation:
  language: es
  text: 'Entonces el rey dijo[a]: «Esta dice: “Este es mi hijo, el que vive, y tu hijo es el muerto”; y esta dice: “No, porque tu hijo es el muerto, y mi hijo es el que vive”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «Esta mujer dice ... y aquella mujer dice ...». El hebreo usa demostrativos femeninos, literalmente «esta ... y esta», refiriéndose a las dos mujeres.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y entonces ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; en español, «Entonces ... dijo» comunica con naturalidad la secuencia sin perder el valor discursivo.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El hebreo usa el título común; «el rey» es la equivalencia directa y clara en español.
- source_word: זֹאת ... וְזֹאת
  english_pob_choice: This one ... and this one
  chosen_spanish: Esta ... y ésta
  alternatives_spanish:
  - Esta mujer ... y aquella mujer
  - Una ... y la otra
  lexicon: HALOT
  rationale: El hebreo emplea demostrativos femeninos, literalmente «esta ... y esta». En español, el uso de «esta» y «ésta» conserva la referencia deíctica a las dos mujeres sin añadir sustantivos no expresados en el hebreo.
- source_word: אֹמֶרֶת
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - está diciendo
  - dijo
  lexicon: HALOT
  rationale: El participio funciona como presente vivaz en el discurso referido; «dice» reproduce ese valor inmediato y natural en español.
- source_word: זֶה ... בְּנִי הַחַי
  english_pob_choice: This is my son, the living one
  chosen_spanish: Este es mi hijo, el que vive
  alternatives_spanish:
  - Este es mi hijo, el vivo
  - Este es mi hijo, el que está vivo
  lexicon: HALOT
  rationale: La apposición hebrea une el demostrativo con «mi hijo» y luego «el vivo/el que vive». «El que vive» conserva mejor la forma sustantivada de הַחַי que un adjetivo suelto en español.
- source_word: בְּנִי / בְּנֵךְ
  english_pob_choice: my son / your son
  chosen_spanish: mi hijo / tu hijo
  alternatives_spanish:
  - mi hijo / su hijo
  - mi niño / tu niño
  lexicon: HALOT
  rationale: «Hijo» refleja con precisión בֵּן y su fuerza filial en el contexto; «niño» no conserva tan bien la relación de parentesco.
- source_word: הַמֵּת
  english_pob_choice: the dead one
  chosen_spanish: el muerto
  alternatives_spanish:
  - el que murió
  - el muerto
  lexicon: HALOT
  rationale: El sustantivo/adjetivo hebreo funciona substantivamente; «el muerto» conserva la oposición directa con «el que vive».
- source_word: לֹא כִי
  english_pob_choice: No, for
  chosen_spanish: No, porque
  alternatives_spanish:
  - No, pues
  - No, sino que
  lexicon: HALOT
  rationale: La secuencia expresa negación seguida de corrección/explicación. «No, porque» transmite la fuerza justificativa de כִי en un español claro y digno.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión final inglesa que ajustó la primera cláusula para reflejar mejor el orden hebreo y la aposición: «Este es mi hijo, el que vive» en lugar de una inversión menos natural en español.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «el muerto / el que vive» para conservar la simetría substantiva del hebreo.
  - Se evitó introducir «mujer» en el texto principal porque el hebreo solo emplea demostrativos femeninos; esa clarificación queda en la nota.
  - Se usó «hijo» en lugar de «niño» para respetar la relación filial explícita del hebreo.
