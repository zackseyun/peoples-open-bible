translation:
  language: es
  text: Entonces Amasías reunió a Judá y los puso por casas paternas, bajo jefes de millares y jefes de centenas, para todo Judá y Benjamín. Les pasó revista desde los veinte años de edad en adelante, y halló que eran trescientos mil hombres escogidos, que salían a la guerra, capaces de manejar lanza y escudo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקְבֹּץ
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - agrupó
  lexicon: HALOT
  rationale: קבץ expresa reunir personas; 'reunió' es natural en español y mantiene la acción concreta sin añadir matiz ceremonial.
- source_word: וַיַּעֲמִידֵם
  english_pob_choice: appointed them
  chosen_spanish: los organizó
  alternatives_spanish:
  - los नियुक्तó
  - los puso en su lugar
  - los estableció
  lexicon: HALOT
  rationale: En este contexto administrativo-militar, עמד en Hiphil puede implicar poner en orden o disponer. 'Los organizó' comunica la estructuración de las tropas sin forzar una traducción demasiado literal que sonaría extraña en español.
- source_word: לְבֵית אָבוֹת
  english_pob_choice: by fathers’ houses
  chosen_spanish: por casas paternas
  alternatives_spanish:
  - según las casas de sus padres
  - por linajes paternos
  lexicon: HALOT
  rationale: La expresión nombra divisiones de clan o casa paterna. 'Casas paternas' conserva la estructura social del hebreo y es comprensible en español bíblico contemporáneo.
- source_word: לְשָׂרֵי הָאֲלָפִים וּלְשָׂרֵי הַמֵּאוֹת
  english_pob_choice: under commanders of thousands and commanders of hundreds
  chosen_spanish: bajo jefes de millares y jefes de centenas
  alternatives_spanish:
  - bajo comandantes de mil y comandantes de cien
  - bajo capitanes de millares y capitanes de centenas
  lexicon: HALOT
  rationale: שׂרים son jefes o oficiales. 'Jefes' evita el arcaísmo de 'capitanes' y mantiene la jerarquía numérica del pasaje.
- source_word: לְכָל יְהוּדָה וּבִנְיָמִן
  english_pob_choice: for all Judah and Benjamin
  chosen_spanish: para todo Judá y Benjamín
  alternatives_spanish:
  - para todo Judá y Benjamín
  - en todo Judá y Benjamín
  lexicon: HALOT
  rationale: La frase marca el alcance de la organización y el censo; 'para' conserva bien el sentido administrativo del hebreo.
- source_word: וַיִּפְקְדֵם
  english_pob_choice: He mustered them
  chosen_spanish: Los pasó revista
  alternatives_spanish:
  - los pasó lista
  - los censó
  lexicon: HALOT
  rationale: פקד en contexto militar puede significar revisar o pasar revista a las tropas. 'Los pasó revista' comunica tanto el conteo como la inspección militar, sin reducirlo al mero número.
- source_word: לְמִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: desde los veinte años de edad en adelante
  alternatives_spanish:
  - desde los veinte años y más
  - a partir de los veinte años
  lexicon: HALOT
  rationale: Es una fórmula estándar de elegibilidad militar. La versión elegida es idiomática y precisa en español.
- source_word: וַיִּמְצָאֵם
  english_pob_choice: found them to be
  chosen_spanish: halló que eran
  alternatives_spanish:
  - encontró que eran
  - los halló
  lexicon: HALOT
  rationale: מצא introduce el resultado del recuento. 'Halló que eran' expresa claramente el resultado numérico sin sobreexplicar.
- source_word: בָּחוּר
  english_pob_choice: choice men
  chosen_spanish: hombres escogidos
  alternatives_spanish:
  - jóvenes escogidos
  - hombres selectos
  lexicon: HALOT
  rationale: בָּחוּר puede referirse a jóvenes, pero aquí probablemente subraya hombres seleccionados/aptos para el servicio militar. 'Hombres escogidos' preserva esa valoración.
- source_word: יוֹצֵא צָבָא
  english_pob_choice: going out to war
  chosen_spanish: que salían a la guerra
  alternatives_spanish:
  - aptos para la guerra
  - que iban a la guerra
  lexicon: HALOT
  rationale: La expresión es un modismo militar hebreo. 'Que salían a la guerra' sigue de cerca la imagen y conserva la fuerza del idioma original.
- source_word: אֹחֵז רֹמַח וְצִנָּה
  english_pob_choice: able to handle spear and shield
  chosen_spanish: que empuñaban lanza y escudo
  alternatives_spanish:
  - que sostenían lanza y escudo
  - capaces de manejar lanza y escudo
  lexicon: HALOT
  rationale: אֹחֵז es literalmente 'que sostiene/agarra'. 'Empuñaban' suena natural en español para armas y preserva la competencia marcial; 'lanza' corresponde a רֹמַח y 'escudo' a צִנָּה.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del POB en inglés, que reemplazó 'fit for war' por el modismo más directo 'going out to war'; por eso el español mantiene el equivalente idiomático 'que salían a la guerra' y evita una paráfrasis más interpretativa como 'aptos para la guerra'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino en otros contextos del proyecto, pero este versículo no contiene el Tetragrámaton.
  - '''Casas paternas'' conserva la terminología de organización tribal/clánica sin reemplazarla por ''familias'', que sería menos preciso.'
  - '''Jefes de millares y jefes de centenas'' mantiene el paralelismo numérico del hebreo y la estructura militar administrativa.'
  - No se introducen notas al pie porque no hay una alternativa textual o teológica que deba señalarse en este versículo más allá de la elección principal ya explicada en las decisiones léxicas.
