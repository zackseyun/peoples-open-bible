translation:
  language: es
  text: Sus hijos Isaac e Ismael lo enterraron en la cueva de Macpelá[a], en el campo de Efrón, hijo de Zóhar el hitita, que está frente a Mamre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “que está delante de Mamre” o “que está frente a Mamre”. La expresión hebrea puede denotar un lugar delante de un punto de referencia o en oposición a él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבְּרוּ
  english_pob_choice: buried
  chosen_spanish: lo enterraron
  alternatives_spanish:
  - y lo enterraron
  - sepultaron a él
  lexicon: HALOT
  rationale: El verbo קבר en esta narración expresa la acción de enterrar/sepultar en pasado narrativo. En español, 'lo enterraron' comunica con naturalidad el evento secuencial sin perder el sentido básico.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El sufijo de objeto directo de tercera masculina singular retoma a Abraham del contexto inmediato; en español el clítico 'lo' es la forma más natural y clara.
- source_word: יִצְחָק וְיִשְׁמָעֵאל בָּנָיו
  english_pob_choice: His sons Isaac and Ishmael
  chosen_spanish: Sus hijos Isaac e Ismael
  alternatives_spanish:
  - Isaac e Ismael, sus hijos
  - Isaac e Ismael
  lexicon: HALOT
  rationale: Se conserva la relación posesiva implícita en el sufijo de 'sus hijos' y se mantiene el orden natural del español con el genitivo posesivo delante del sustantivo.
- source_word: אֶל מְעָרַת הַמַּכְפֵּלָה
  english_pob_choice: in the cave of Machpelah
  chosen_spanish: en la cueva de Macpela
  alternatives_spanish:
  - en la cueva de Machpelá
  - a la cueva de Macpela
  lexicon: HALOT
  rationale: En contexto de sepultura, el hebreo usa אֶל con valor locativo; en español resulta idiomático 'en la cueva'. Se translitera el nombre propio como 'Macpela' según el criterio de nombres propios del proyecto.
- source_word: אֶל שְׂדֵה עֶפְרֹן
  english_pob_choice: in the field of Ephron
  chosen_spanish: en el campo de Efrón
  alternatives_spanish:
  - al campo de Efrón
  - en el terreno de Efrón
  lexicon: HALOT
  rationale: El segundo אֶל especifica el lugar del entierro; 'en el campo' preserva la relación locativa y el constructo posesivo de forma clara en español.
- source_word: בֶּן צֹחַר
  english_pob_choice: son of Zohar
  chosen_spanish: hijo de Zojar
  alternatives_spanish:
  - hijo de Zójar
  - hijo de Zojar
  lexicon: HALOT
  rationale: La fórmula genealógica בן + nombre propio se rinde de forma directa como 'hijo de'. Se usa 'Zojar' para la transliteración coherente del nombre personal.
- source_word: הַחִתִּי
  english_pob_choice: the Hittite
  chosen_spanish: el hitita
  alternatives_spanish:
  - el heteo
  - el hiteo
  lexicon: HALOT
  rationale: El etnónimo se expresa con la forma española tradicional y ampliamente reconocible 'hitita', que corresponde al gentilicio hebreo sin introducir una denominación menos común.
- source_word: אֲשֶׁר עַל פְּנֵי מַמְרֵא
  english_pob_choice: which is opposite Mamre
  chosen_spanish: que está frente a Mamre
  alternatives_spanish:
  - que está opuesto a Mamre
  - que está delante de Mamre
  - que está frente al lado de Mamre
  lexicon: HALOT
  rationale: La expresión עַל־פְּנֵי admite el sentido espacial de 'frente a/opuesto a'. 'Está frente a' conserva la ambigüedad direccional que el inglés POB notó con 'opposite' y resulta natural en español.
theological_decisions:
- issue: Valor espacial de עַל־פְּנֵי מַמְרֵא
  english_pob_reading: which is opposite Mamre / which is before Mamre / which is facing Mamre
  chosen_spanish_reading: que está frente a Mamre
  alternative_spanish_readings:
  - que está opuesto a Mamre
  - que está delante de Mamre
  rationale: La frase hebrea puede señalar ubicación en frente de un hito, sin precisar una orientación cardinal. Se conserva esa tensión semántica mediante 'frente a', evitando una precisión direccional no garantizada por el texto.
  doctrine_reference: No aplica; decisión de sentido locativo y topográfico.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto fuente y con la audit trail inglesa; no se detectaron revisiones aplicadas en el expediente inglés. La versión española conserva la misma estructura informativa y la nota de ambigüedad locativa de עַל־פְּנֵי.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se usa 'Macpela' para el nombre propio del sepulcro, coherente con transliteración simple y sin adición de vocalización tradicional.
  - '''Hitita'' conserva el etnónimo estándar en español.'
  - Se conserva el orden narrativo simple para reflejar el hebreo sin sobrecargar la sintaxis española.
