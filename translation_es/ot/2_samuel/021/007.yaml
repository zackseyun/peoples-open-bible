translation:
  language: es
  text: Pero el rey le perdonó la vida a Mefiboset[a], hijo de Jonatán, hijo de Saúl, por el juramento de Yahvé que había entre ellos, entre David y Jonatán, hijo de Saúl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el juramento hecho en nombre de Yahvé'; es decir, un juramento hecho invocando a Yahvé como testigo entre David y Jonatán.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְמֹל
  english_pob_choice: spared
  chosen_spanish: perdonó
  alternatives_spanish:
  - lo libró
  - lo dejó con vida
  - tuvo compasión de él
  lexicon: HALOT
  rationale: En este contexto narrativo, el verbo expresa abstenerse de ejecutar o entregar para muerte. En español, 'perdonó' comunica la decisión concreta de no castigarlo con la muerte sin sonar forzado; 'tuvo compasión de él' sería más general y menos preciso para la escena.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Se conserva el título definido del hebreo. El contexto identifica a David, pero la forma española mantiene la referencia formal del texto fuente.
- source_word: מְפִיבֹשֶׁת
  english_pob_choice: Mephibosheth
  chosen_spanish: Mefiboset
  alternatives_spanish:
  - Mefibosheth
  lexicon: nombre propio transliterado
  rationale: Se translitera el nombre al español con forma readable y coherente con la fonología española, conservando la identificación del personaje sin traducir el nombre.
- source_word: בֶּן יְהוֹנָתָן בֶּן שָׁאוּל
  english_pob_choice: son of Jonathan, son of Saul
  chosen_spanish: hijo de Jonatán, hijo de Saúl
  alternatives_spanish:
  - hijo de Jonatán, nieto de Saúl
  - hijo de Jonatán, descendiente de Saúl
  lexicon: HALOT
  rationale: La estructura genealógica repetida del hebreo se preserva con 'hijo de... hijo de...', manteniendo la transparencia del vínculo textual. 'Nieto de Saúl' sería idiomático, pero resolvería una relación que el hebreo formula de manera explícita.
- source_word: עַל
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - por motivo de
  - en atención a
  lexicon: HALOT
  rationale: Aquí la preposición introduce la razón del acto. 'Por' es natural en español y conserva la causalidad; evita sobredeterminación y mantiene la brevedad del original.
- source_word: שְׁבֻעַת יְהוָה
  english_pob_choice: the oath of Yahweh
  chosen_spanish: el juramento de Yahvé
  alternatives_spanish:
  - el juramento de Yahvé
  - el juramento de Yahvé hecho en su nombre
  - el juramento de Yahvé como testigo
  lexicon: HALOT
  rationale: Se mantiene 'Yahvé' para el nombre divino según la política del proyecto. 'Juramento' refleja bien שְׁבֻעָה en español; 'de Yahvé' preserva la ambigüedad de si se trata de un juramento invocando a Yahvé o perteneciente a él, sin resolverla de antemano.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se aplica la terminología estándar del proyecto para el Tetragrámaton, manteniendo el nombre divino en vez de una sustitución litúrgica.
- source_word: אֲשֶׁר בֵּינֹתָם
  english_pob_choice: that was between them
  chosen_spanish: que había entre ellos
  alternatives_spanish:
  - que estaba entre ellos
  - existente entre ellos
  lexicon: HALOT
  rationale: La cláusula relativa describe la existencia del juramento entre dos partes. 'Había entre ellos' suena natural en español y conserva la relación bilateral sin añadir interpretación.
- source_word: בֵּין דָּוִד וּבֵין יְהוֹנָתָן
  english_pob_choice: between David and Jonathan
  chosen_spanish: entre David y Jonatán
  alternatives_spanish:
  - entre David y entre Jonatán
  lexicon: HALOT
  rationale: Se suaviza la repetición de preposición propia del hebreo para lograr español natural, sin perder la estructura relacional del pacto/juramento.
theological_decisions:
- issue: Naturaleza del 'juramento de Yahvé'
  english_pob_reading: an oath made in the LORD's name / under the LORD's witness between David and Jonathan
  chosen_spanish_reading: un juramento hecho bajo la invocación de Yahvé, entre David y Jonatán
  alternative_spanish_readings:
  - un juramento pronunciado por Yahvé mismo
  - el juramento perteneciente a Yahvé
  rationale: La traducción principal conserva la forma literal 'el juramento de Yahvé' para no cerrar el sentido. En el trasfondo narrativo, el valor más probable es un juramento hecho invocando a Yahvé como testigo, pero el español no lo explicita en el texto principal para preservar la tensión documentada.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
- issue: Referente de 'el rey'
  english_pob_reading: David
  chosen_spanish_reading: David en el contexto narrativo, sin reemplazar el título del texto
  alternative_spanish_readings:
  - el rey David
  rationale: El contexto identifica al rey como David, pero el texto hebreo usa el título. La versión española mantiene 'el rey' en el cuerpo para respetar la forma del fuente; la identificación contextual queda implícita.
  doctrine_reference: Principio de transparencia textual del POB
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y el registro del POB inglés. No se detectaron revisiones aplicadas en el pasaje de base; se mantuvo la lectura estable con una nota para la ambigüedad de 'juramento de Yahvé'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para el Tetragrámaton.
  - Se conserva la estructura genealógica 'hijo de... hijo de...' por transparencia.
  - Se translitera 'Mefiboset' con ortografía española coherente, sin alterar la identificación del nombre propio.
  - No se introduce 'Señor' como sustituto litúrgico; la referencia divina permanece explícita.
