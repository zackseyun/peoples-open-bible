id: LUK.2.49
reference: Luke 2:49
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ εἶπεν πρὸς αὐτούς· Τί ὅτι ἐζητεῖτέ με; οὐκ ᾔδειτε ὅτι ἐν τοῖς τοῦ πατρός μου δεῖ εἶναί με;
base_translation:
  language: en
  yaml_path: translation/nt/luke/002/049.yaml
  text: And he said to them[a], “Why were you looking for me? Did you not know that I must be in my Father’s house?”
  footnotes:
  - marker: a
    text: Or, 'that I must be about my Father’s affairs' / 'in the things of my Father.' The Greek expression is elliptical and can refer either to the Father’s house or to the Father’s concerns.
    reason: alternative_reading
translation:
  language: ko
  text: 그가 그들에게 말했습니다. 「왜 저를 찾으셨습니까? 제가 제 아버지의 일에 있어야 함을 알지 못하셨습니까?」
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「제 아버지의 집에」. 헬라어 속격 구문은 「집」 또는 「일·소관」 양쪽으로 해석 가능하다.
    reason: alternative_reading
theological_decisions:
- issue: 2:49 「ἐν τοῖς τοῦ πατρός μου」의 모호한 속격
  chosen_reading: 제 아버지의 일에
  alternative_readings:
  - 제 아버지의 집에
  - 제 아버지께 속한 것들 가운데
  rationale: 속격 복수는 「집」(처소) 또는 「일」(소관·소속) 양쪽으로 읽을 수 있다. 누가 본문 흐름에서 어린 예수가 성전에서 가르치는 일에 몰두한 정황은 「일에」가 더 풍성한 함의를 보존한다. 각주로 「집에」 가능성을 둔다.
  doctrine_reference: 'DOCTRINE.md: Preserve ambiguity'
