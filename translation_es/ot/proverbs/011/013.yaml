translation:
  language: es
  text: El chismoso revela un secreto[a][b], pero el que es fiel en espíritu oculta un asunto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El que anda como chismoso revela un secreto».'
    reason: alternative_reading
  - marker: b
    text: 'Lit.: «fiel de espíritu».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלֵךְ רָכִיל
  english_pob_choice: A gossip
  chosen_spanish: El chismoso
  alternatives_spanish:
  - El que anda como chismoso
  - El chismoso que anda de un lado a otro
  - El talebearer
  lexicon: HALOT
  rationale: La expresión hebrea describe a una persona que va difundiendo chismes; en español, "chismoso" comunica bien el tipo de persona sin forzar la imagen literal de "andar". Mantiene el tono proverbial y la fuerza caracterizadora del original.
- source_word: מְגַלֶּה
  english_pob_choice: reveals
  chosen_spanish: revela
  alternatives_spanish:
  - descubre
  - da a conocer
  - desvela
  lexicon: HALOT
  rationale: El participio expresa hacer conocido algo oculto. "Revela" es natural en español y corresponde de cerca al valor del hebreo en este contexto.
- source_word: סּוֹד
  english_pob_choice: a secret
  chosen_spanish: un secreto
  alternatives_spanish:
  - un asunto confidencial
  - un consejo íntimo
  - una confidencia
  lexicon: HALOT
  rationale: Aquí el término apunta a información privada o reservada. "Un secreto" es la equivalencia más clara y transparente en español.
- source_word: נֶאֱמַן רוּחַ
  english_pob_choice: one who is faithful in spirit
  chosen_spanish: el que es fiel en espíritu
  alternatives_spanish:
  - una persona digna de confianza
  - el fiel de espíritu
  - el que es confiable en espíritu
  lexicon: HALOT
  rationale: Conservo la referencia explícita a רוּחַ como "espíritu" para no borrar el matiz antropológico del hebreo. "El que es fiel en espíritu" suena natural en español bíblico y preserva la tensión entre carácter interior y confiabilidad.
- source_word: מְכַסֶּה
  english_pob_choice: conceals
  chosen_spanish: oculta
  alternatives_spanish:
  - cubre
  - mantiene en secreto
  - encubre
  lexicon: HALOT
  rationale: El verbo usa la metáfora de cubrir, pero en español "oculta" transmite con claridad el sentido figurado de mantener algo no expuesto. Evita un literalismo que sonaría menos natural.
- source_word: דָבָר
  english_pob_choice: a matter
  chosen_spanish: un asunto
  alternatives_spanish:
  - una cosa
  - un tema
  - una cuestión
  lexicon: HALOT
  rationale: En este paralelismo sapiencial, דבר abarca más que "palabra" y más que un objeto; "un asunto" comunica bien la idea de algo que puede ser expuesto u ocultado.
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo masorético y concuerda con el POB inglés: el sujeto negativo es un hablador de chismes, y el positivo es alguien confiable por dentro que guarda confidencias. Se mantiene la imagen de רוּחַ como "espíritu" y la metáfora de cubrir/ocultar como verbo natural en español.'
  spanish_consistency_notes:
  - Se usó "Yahvé" cuando corresponde, pero este versículo no contiene el nombre divino.
  - Se evitó "siervo" para δοῦλος porque no aplica aquí; no hay lenguaje de esclavitud en el versículo.
  - '"Secreto" y "asunto" mantienen la pareja semántica del paralelismo sin introducir una interpretación doctrinal ajena.'
  - Las notas al pie reproducen la alternativa lexical marcada en el POB inglés y conservan la tensión entre naturalidad y literalidad.
