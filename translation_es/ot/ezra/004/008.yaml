translation:
  language: es
  text: Rehum el comandante[a] y Shimshai el escriba escribieron una sola carta contra Jerusalén al rey Artajerjes, como sigue:[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "el canciller". El título arameo בְּעֵל טְעֵם designa una función administrativa cuyo equivalente persa exacto no es seguro.
    reason: lexical_alternative
  - marker: b
    text: '"Como sigue" introduce el texto de la carta que continúa en el versículo siguiente.'
    reason: source_note
lexical_decisions:
- source_word: בְּעֵל טְעֵם
  english_pob_choice: the commander
  chosen_spanish: el comandante
  alternatives_spanish:
  - el canciller
  - el señor/maestro de consejo
  - el oficial a cargo
  lexicon: HALOT
  rationale: El título arameo designa un cargo oficial; 'el comandante' comunica autoridad administrativa de forma clara en español moderno sin fijar indebidamente un equivalente persa específico. 'Canciller' existe como alternativa tradicional, pero puede sonar demasiado institucional o ambiguo para lectores actuales.
- source_word: סָפְרָא
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  lexicon: HALOT
  rationale: '''Escriba'' conserva el vínculo léxico con el oficio de escribir/registrar y es transparente en español bíblico. ''Secretario'' sería posible, pero desplaza el matiz tradicional del término.'
- source_word: כְּתַבוּ
  english_pob_choice: wrote
  chosen_spanish: escribieron
  alternatives_spanish:
  - redactaron
  - compusieron
  - enviaron por escrito
  lexicon: HALOT
  rationale: El pasado simple 'escribieron' refleja directamente el verbo sin añadir matices que el hebreo/arameo no exige. 'Redactaron' o 'compusieron' resultarían más interpretativos.
- source_word: אִגְּרָה חֲדָה
  english_pob_choice: one letter
  chosen_spanish: una carta
  alternatives_spanish:
  - una sola carta
  - una carta única
  lexicon: HALOT
  rationale: La secuencia introduce un documento como 'una' carta; en español, 'una carta' comunica naturalmente el valor de חֲדָה sin recargar la frase con 'una sola', que enfatizaría más de lo necesario el número.
- source_word: עַל יְרוּשְׁלֶם
  english_pob_choice: against Jerusalem
  chosen_spanish: contra Jerusalén
  alternatives_spanish:
  - acerca de Jerusalén
  - sobre Jerusalén
  lexicon: HALOT
  rationale: El contexto es hostil y acusatorio, por lo que 'contra Jerusalén' reproduce mejor la fuerza adversativa que un neutral 'acerca de/sobre'. En español también suena natural con la carta de denuncia.
- source_word: לְאַרְתַּחְשַׁשְׂתְּא מַלְכָּא
  english_pob_choice: to King Artaxerxes
  chosen_spanish: al rey Artajerjes
  alternatives_spanish:
  - al rey Artajerjes
  - a Artajerjes el rey
  lexicon: HALOT
  rationale: Se mantiene el nombre propio en forma española habitual y el orden natural 'al rey Artajerjes', preservando a la vez el título real y la identificación personal.
- source_word: כְּנֵמָא
  english_pob_choice: 'as follows:'
  chosen_spanish: 'así:'
  alternatives_spanish:
  - 'de la siguiente manera:'
  - 'como sigue:'
  lexicon: HALOT
  rationale: El marcador discursivo introduce el contenido citado en el versículo siguiente. 'Así:' es breve, idiomático y deja abierta la continuación sin añadir más explicación de la necesaria.
- source_word: רְחוּם
  english_pob_choice: Rehum
  chosen_spanish: Rehum
  alternatives_spanish:
  - Rejún
  lexicon: transliteration
  rationale: Se translitera el nombre propio conforme al texto fuente y al uso bíblico habitual.
- source_word: שִׁמְשַׁי
  english_pob_choice: Shimshai
  chosen_spanish: Shimshai
  alternatives_spanish:
  - Shimshay
  lexicon: transliteration
  rationale: Se conserva la transliteración del nombre propio según el uso estándar del proyecto.
- source_word: אַרְתַּחְשַׁשְׂתְּא
  english_pob_choice: Artaxerxes
  chosen_spanish: Artajerjes
  alternatives_spanish:
  - Artajerjes
  - Artaxerjes
  lexicon: transliteration
  rationale: En español bíblico, 'Artajerjes' es la forma asentada y natural; mantiene la referencia histórica sin depender del calco del inglés.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'a letter' a 'one letter' para reflejar חֲדָה ('one'). En español, la elección 'una carta' conserva ese valor indefinido/numeral sin forzar una marca de énfasis que suena menos natural en este contexto. Se mantuvo además la lectura hostil de עַל יְרוּשְׁלֶם como 'contra Jerusalén', coherente con el pasaje y con la decisión inglesa.
  spanish_consistency_notes:
  - 'Se siguió la terminología proyectada: ''Yahvé'' no aparece en este versículo; ''Mesías/Cristo'' no aplica.'
  - Se prefirió 'escriba' por coherencia léxica con el oficio textual del arameo.
  - '''Artajerjes'' se usa por consistencia con el español bíblico y la transliteración tradicional en castellano.'
  - La puntuación con dos puntos en 'así:' señala el discurso directo que continúa en el siguiente versículo.
