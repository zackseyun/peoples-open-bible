review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo con apoyo del griego: Josué como figura militar, su relación de servicio con Moisés, y su designación para traer una gran salvación/liberación. Sin embargo, las notas están desalineadas con la auditoría inglesa: la nota [a] debería preservar la alternativa griega sobre sucesión con Moisés, mientras que la nota [b] debería tratar la amplitud léxica de «gran salvación». Además, «siervo de Moisés» es posible, pero «asistente de Moisés» refleja mejor משרת y la decisión POB de evitar connotaciones más fuertes o menos precisas.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse levemente para ajustarse mejor al estilo moderno y a la base léxica del POB. «Valiente guerrero» es natural; «fue designado» funciona bien. El punto principal de calidad es preferir «asistente de Moisés» sobre «siervo de Moisés» para una lectura más precisa y menos cargada en español contemporáneo bíblico.
  glossary_alignment: 'No hay conflictos con la terminología de proyecto mayor. Las decisiones clave quedan bien encaminadas: «salvación» para תשועה/σωτηρία, y «Josué» para יהושע. La principal corrección es de matiz léxico en משרת («asistente» mejor que «siervo») y de preservación fiel de las notas del expediente inglés.'
  issues:
  - severity: medium
    issue: Las notas al pie no corresponden a las del expediente inglés.
    rationale: La auditoría inglesa pone una nota sobre la lectura griega de sucesión respecto de Moisés y otra sobre las alternativas de «gran salvación». El borrador español en cambio pone [a] sobre el sentido militar y [b] sobre la profecía, alterando qué información auditada se preserva.
  - severity: medium
    issue: «Siervo de Moisés» no refleja tan bien la decisión léxica POB para משרת.
    rationale: Aunque es defendible, «siervo» en español puede sonar más servil o teológicamente cargado. La decisión inglesa prefirió ‘attendant’; «asistente de Moisés» conserva mejor la función oficial de apoyo y evita asociaciones innecesarias.
  - severity: low
    issue: Falta una nota para la amplitud de «salvación».
    rationale: El POB inglés preserva explícitamente que תשועה/σωτηρία también puede significar «liberación» o «victoria». Esa información debe mantenerse en español por fidelidad al expediente.
  revised_spanish_text: Josué, hijo de Nun, fue un valiente guerrero, asistente de Moisés en la profecía[a]; fue designado en sus días para ser una gran salvación[b] para sus escogidos.
