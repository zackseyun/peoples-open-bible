translation:
  language: es
  text: Tenía veinticinco años cuando comenzó a reinar, y reinó veintinueve años en Jerusalén. El nombre de su madre era Jehoaddín[a], de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jehoaddín refleja la forma hebrea del nombre; la tradición inglesa suele escribir Jehoaddan.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  english_pob_choice: twenty-five years old
  chosen_spanish: veinticinco años
  alternatives_spanish:
  - de veinticinco años
  - veinticinco años de edad
  lexicon: HALOT
  rationale: En español, la fórmula de edad más natural es 'veinticinco años'; el sentido idiomático del hebreo se conserva sin calcar literalmente 'hijo de'. La omisión de 'edad' mantiene el registro bíblico sobrio y fluido.
- source_word: הָיָה בְמָלְכֹו
  english_pob_choice: when he became king
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando llegó a ser rey
  - al comenzar a reinar
  lexicon: HALOT
  rationale: La construcción regnal hebrea pide un equivalente idiomático en español. 'Comenzó a reinar' expresa el momento de la entronización con naturalidad y fidelidad al valor verbal del contexto.
- source_word: וְעֶשְׂרִים וָתֵשַׁע שָׁנָה
  english_pob_choice: twenty-nine years
  chosen_spanish: veintinueve años
  alternatives_spanish:
  - por veintinueve años
  lexicon: HALOT
  rationale: Corresponde directamente al numeral y al sustantivo 'años' dentro de la fórmula de duración del reinado.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  lexicon: HALOT
  rationale: '''Reinó'' es el equivalente normal y preciso para la duración del oficio real en una nota regnal.'
- source_word: בִּירוּשָׁלָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa se vierte de forma directa y natural como 'en Jerusalén'.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: El nombre de su madre era
  alternatives_spanish:
  - Su madre se llamaba
  - Y el nombre de su madre era
  lexicon: HALOT
  rationale: La fórmula hebrea se mantiene casi literalmente, pero con orden más natural en español. 'El nombre de su madre era' conserva el tono genealógico y documental.
- source_word: יהועדין
  english_pob_choice: Jehoaddin
  chosen_spanish: Jehoaddín
  alternatives_spanish:
  - Jehoaddin
  lexicon: HALOT
  rationale: Se translitera el nombre propio, y se adapta la acentuación al español para lectura pública. Se preserva así la forma consonántica del hebreo a la vez que se hace pronunciable en español.
- source_word: מִן יְרוּשָׁלִָם
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  lexicon: HALOT
  rationale: En esta identificación materna, la preposición hebrea מִן puede señalar procedencia u origen. En español, 'de Jerusalén' suena más natural y conserva la relación de origen/adscripción sin forzar una localización redundante.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el trazado auditado en inglés, sin cambios de sentido respecto de la revisión más reciente; solo se ajustó la formulación al español natural y se conservó la alternativa tradicional del nombre propio en nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton en todo el proyecto; aquí no aparece.
  - '''Reinó'' se usa coherentemente para la fórmula regnal.'
  - Los nombres propios se transliteran en forma española legible, sin sustituirlos por equivalentes tradicionales no requeridos por el texto.
