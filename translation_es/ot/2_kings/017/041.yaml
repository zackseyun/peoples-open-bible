review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: estas naciones temían a Yahvé y a la vez servían sus imágenes talladas, y esa práctica continuó en sus descendientes hasta el tiempo del redactor. También respeta la tensión teológica documentada sin resolverla indebidamente. Sin embargo, dos giros españoles suenan poco naturales para un texto bíblico claro: «estaban sirviendo» y «así están haciendo». Además, la cadena generacional puede expresarse de forma más natural y fiel al inglés auditado con «sus hijos también, y los hijos de sus hijos».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero presenta un par de perífrasis progresivas demasiado calcadas del inglés/hebreo. En español bíblico natural, «servían» y «así lo hacen» comunican mejor la habitualidad/continuidad sin pérdida de sentido. También conviene cerrar la oración con puntuación completa y usar una raya de manera tipográfica consistente.
  glossary_alignment: 'Alineado en lo esencial con la terminología del proyecto: יְהוָה -> «Yahvé», פְּסִילִים -> «imágenes talladas» con nota alternativa «ídolos». No hay conflictos doctrinales ni léxicos mayores. La única mejora es estilística, no de glosario.'
  issues:
  - severity: medium
    issue: «pero estaban sirviendo» suena forzado en español
    rationale: Aunque intenta reflejar la perífrasis hebrea, en español moderno y digno la acción habitual/cúltica se expresa mejor con «pero servían», que sigue preservando el sentido continuo sin calco incómodo.
  - severity: medium
    issue: «así están haciendo» es poco idiomático
    rationale: La estructura replica demasiado literalmente el inglés «so they are doing» y el hebreo. «Así lo hacen hasta el día de hoy» o «así siguen haciendo» comunica mejor la continuidad en español.
  - severity: low
    issue: La cadena generacional puede fluir mejor
    rationale: «También sus hijos y los hijos de sus hijos» es comprensible, pero «Sus hijos también, y los hijos de sus hijos» mejora el ritmo y conserva la sucesión generacional del original.
  revised_spanish_text: Así, estas naciones temían a Yahvé[a], pero servían a sus imágenes talladas. Sus hijos también, y los hijos de sus hijos, como hicieron sus padres, así lo hacen hasta el día de hoy.
  revised_footnotes:
  - marker: a
    text: O «sus ídolos» para «sus imágenes talladas». El hebreo se refiere específicamente a imágenes hechas por talla.
    reason: lexical_alternative
  revision_rationale: 'Se mantiene íntegramente el contenido fuente y las decisiones léxicas del POB, pero se ajustan dos expresiones demasiado literales para lograr un español más natural y eclesialmente legible: «servían» en lugar de «estaban sirviendo» y «así lo hacen» en lugar de «así están haciendo». También se mejora levemente el flujo sintáctico de la cláusula generacional.'
