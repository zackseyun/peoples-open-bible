revisions:
- from: Por tanto, ya no devorarás gente[a], ni harás tropezar más a tu nación, dice Yahvé, el Señor.
  to: Por tanto, ya no devorarás personas[a], y ya no harás tropezar a tu nación, declara el Señor Yahvé.
  rationale: Se ajusta la cláusula final a «declara el Señor Yahvé» para representar con más fidelidad y naturalidad נְאֻם אֲדֹנָי יְהוִה y el estándar del proyecto sobre Yahvé. Se cambia «gente» por «personas» para una referencia colectiva más precisa y digna. Se armoniza la repetición de עוֹד con «y ya no» en ambos miembros.
