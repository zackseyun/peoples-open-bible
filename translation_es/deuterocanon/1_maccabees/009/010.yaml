translation:
  language: es
  text: 'Y Judas dijo[a]: «¡Lejos de mí hacer tal cosa: huir de ellos! Y si nuestro tiempo se ha acercado, muramos con valentía[b] por causa de nuestros hermanos, y no dejemos un motivo de reproche a nuestra gloria»[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Que no sea así para mí!». El giro griego expresa una fuerte negativa personal, no solo una simple prohibición.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con coraje»; más literalmente, «varonilmente». El término griego lleva la idea de valentía o arrojo.'
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse «a nuestra honra» o «a nuestra reputación». Aquí se mantiene «gloria» para conservar δόξα, con el matiz de honor en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μή μοι γένοιτο
  english_pob_choice: Far be it from me
  chosen_spanish: ¡Lejos de mí!
  alternatives_spanish:
  - ¡Que no sea así para mí!
  - ¡De ningún modo!
  lexicon: LSJ
  rationale: Expresa la fuerte repulsión personal del optativo de rechazo sin sonar rígido en español.
- source_word: ποιῆσαι τὸ πρᾶγμα τοῦτο
  english_pob_choice: to do this thing
  chosen_spanish: hacer esta cosa
  alternatives_spanish:
  - hacer este acto
  - hacer esto
  lexicon: LSJ
  rationale: Mantiene el objeto explícito πρᾶγμα sin volverlo más abstracto de lo que permite el griego.
- source_word: φυγεῖν ἀπʼ αὐτῶν
  english_pob_choice: to flee from them
  chosen_spanish: huir de ellos
  alternatives_spanish:
  - escapar de ellos
  - salir huyendo de ellos
  lexicon: LSJ
  rationale: «Huir» reproduce bien el sentido militar de φυγεῖν y suena natural en español.
- source_word: ἤγγικεν ὁ καιρὸς ἡμῶν
  english_pob_choice: our time has drawn near
  chosen_spanish: nuestro tiempo ha llegado
  alternatives_spanish:
  - nuestro tiempo se ha acercado
  - nuestra hora está cerca
  lexicon: LSJ
  rationale: «Tiempo» conserva la amplitud de καιρός; «ha llegado» es idiomático y conserva la solemnidad del anuncio.
- source_word: ἀποθάνωμεν ἀνδρίᾳ
  english_pob_choice: let us die bravely
  chosen_spanish: muramos con valentía
  alternatives_spanish:
  - muramos bravamente
  - muramos con valor
  lexicon: LSJ
  rationale: En español, «con valentía» transmite el matiz de ἀνδρίᾳ sin la dureza o ambigüedad de un calco como «virilmente» o «varonilmente».
- source_word: χάριν τῶν ἀδελφῶν ἡμῶν
  english_pob_choice: for the sake of our brothers
  chosen_spanish: por causa de nuestros hermanos
  alternatives_spanish:
  - por el bien de nuestros hermanos
  - por nuestros hermanos
  lexicon: LSJ
  rationale: «Por causa de» conserva bien la relación de finalidad/causa de χάριν con genitivo, y «hermanos» mantiene el plural masculino del griego.
- source_word: μὴ καταλίπωμεν αἰτίαν
  english_pob_choice: let us not leave a cause for reproach
  chosen_spanish: no dejemos un motivo de reproche
  alternatives_spanish:
  - no dejemos una causa de reproche
  - no dejemos base para acusación
  lexicon: LSJ
  rationale: «Motivo de reproche» comunica el valor de αἰτία como fundamento de censura u oprobio en este contexto de honor.
- source_word: τῇ δόξῃ ἡμῶν
  english_pob_choice: to our glory
  chosen_spanish: para nuestra gloria
  alternatives_spanish:
  - a nuestra gloria
  - contra nuestra gloria
  lexicon: LSJ
  rationale: Se conserva δόξα como «gloria» siguiendo la preferencia documental del POB; «para» refleja naturalmente la relación del dativo en español, sin borrar la tensión honorífica del contexto.
theological_decisions:
- issue: Renderizado del término masculino ἀδελφῶν
  english_pob_reading: brothers
  chosen_spanish_reading: nuestros hermanos
  alternative_spanish_readings:
  - nuestros hermanos y hermanas
  - nuestros compatriotas
  rationale: Se conserva el masculino plural del griego y el sentido fraterno/militar del pasaje, sin neutralizar el término.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: δόξα en contexto de honor y reproche
  english_pob_reading: glory
  chosen_spanish_reading: gloria
  alternative_spanish_readings:
  - honor
  - reputación
  rationale: Se retiene «gloria» para mantener la continuidad léxica con δόξα, mientras «motivo de reproche» explicita la carga honorífica del contexto.
  doctrine_reference: DOCTRINE.md §5 Consistency of key terms, or documented exception
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés al reflejar καὶ con «Y»/«Y si» en lugar de una oposición con «pero», y al conservar el dativo final con una construcción española natural («para nuestra gloria»). También se evita depender mecánicamente del inglés, priorizando los valores del griego: rechazo enfático, cercanía del tiempo decisivo, valentía en batalla y el campo semántico honorífico de δόξα.'
  spanish_consistency_notes:
  - Se mantuvo un estilo bíblico sobrio, pero con sintaxis española moderna y legible.
  - No se sustituyó «gloria» por «honor» en el texto principal para respetar la consistencia con δόξα documentada en el POB.
  - Los marcadores de nota [a], [b], [c] aparecen exactamente en el texto principal y corresponden uno a uno con sus notas.
