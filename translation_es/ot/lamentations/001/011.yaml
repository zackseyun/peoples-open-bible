base_translation:
  language: en
  yaml_path: translation/ot/lamentations/001/011.yaml
  text: All her people groan[a], seeking bread; they have given their precious things for food to restore life. Look, O Yahweh, and see[c][b], for I have become despised.
  footnotes:
