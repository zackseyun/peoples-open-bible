review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: καὶ νῦν = ''Y ahora'', ἔγνωμεν ταῦτα = ''hemos sabido estas cosas'', καλῶς ποιήσετε = ''harán bien'', y περὶ τῆς εἰρήνης ὑμῶν = ''acerca de su paz'' con nota adecuada sobre ''bienestar''. La principal debilidad está en ἀφʼ οὗ, donde ''desde que'' introduce un matiz temporal continuo menos natural aquí que el valor causal-temporal de ''puesto que'' o ''ya que''.'
  spanish_quality_summary: 'El español es claro y digno, pero ''desde que hemos sabido estas cosas'' suena algo forzado en esta carta. También conviene ajustar la concordancia de tratamiento: ''harán bien'' con ''su paz'' mezcla ustedeo plural y singular reverencial; en contexto epistolar dirigido a una colectividad, ''harán bien en escribirnos acerca de su paz'' es entendible, pero ''de la paz de ustedes'' o mantener ''su'' puede aceptarse. La mejora principal necesaria es la naturalidad de ἀφʼ οὗ.'
  glossary_alignment: No hay términos del glosario mayor en juego salvo εἰρήνη, que se ha mantenido correctamente como 'paz' en el texto principal, con alternativa de 'bienestar' en nota, en línea con la justificación del POB inglés.
  issues:
  - severity: medium
    issue: ἀφʼ οὗ traducido como 'desde que'
    rationale: Aunque posible, aquí el giro griego funciona mejor como base causal-temporal para la exhortación presente. En español epistolar, 'puesto que' o 'ya que' comunica con más naturalidad 'since we have learned these things'.
  - severity: low
    issue: La nota al pie añade 'prosperidad'
    rationale: El rastro inglés documenta 'peace' / 'welfare' o 'well-being'; 'prosperidad' amplía un poco más el campo semántico de lo necesario. Conviene ceñirse a 'bienestar' para reflejar mejor la auditoría.
  revised_spanish_text: Y ahora, puesto que hemos sabido estas cosas, harán bien en escribirnos acerca de su paz[a].
  revised_footnotes:
  - marker: a
    text: O 'acerca de su bienestar'. El griego para 'paz' también puede tener el sentido de bienestar.
    reason: lexical_alternative
