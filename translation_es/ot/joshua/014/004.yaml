translation:
  language: es
  text: Porque los hijos de José eran dos tribus[a], Manasés y Efraín; y no dieron parte a los levitas en la tierra, sino ciudades para habitar, con sus tierras de pastoreo[b] para su ganado y para sus posesiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque los descendientes de José eran dos tribus».'
    reason: lexical_alternative
  - marker: b
    text: «Tierras de pastoreo» se refiere a los terrenos abiertos alrededor de las ciudades levíticas, usados especialmente para el pastoreo.
    reason: cultural_note
lexical_decisions:
- source_word: בְנֵי יוֹסֵף
  english_pob_choice: the sons of Joseph
  chosen_spanish: los hijos de José
  alternatives_spanish:
  - los descendientes de José
  - los hijos de José
  lexicon: HALOT
  rationale: Conserva la expresión genealógica/familiar del hebreo y funciona naturalmente en español bíblico. "Descendientes" explicitaría el sentido tribal, pero suaviza el paralelismo con la forma del original.
- source_word: שְׁנֵי מַטּוֹת
  english_pob_choice: two tribes
  chosen_spanish: dos tribus
  alternatives_spanish:
  - dos varas
  - dos grupos tribales
  lexicon: HALOT
  rationale: En este contexto מַטּוֹת no son varas literales sino divisiones tribales. "Tribus" transmite el valor contextual sin perder la referencia a la organización de Israel.
- source_word: וְלֹא נָתְנוּ חֵלֶק
  english_pob_choice: and they gave no portion
  chosen_spanish: y no dieron parte
  alternatives_spanish:
  - y no dieron porción
  - y no asignaron una herencia
  lexicon: HALOT
  rationale: '"Parte" es una forma natural en español para la porción de reparto; mantiene el matiz de asignación territorial sin introducir un término más técnico que el hebreo no exige aquí.'
- source_word: לַלְוִיִּם
  english_pob_choice: to the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - a la tribu de Leví
  - a los levitas
  lexicon: HALOT
  rationale: El plural gentilicio se refiere al grupo levítico. "Levitas" es claro y fiel al referente colectivo.
- source_word: כִּי אִם
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - sino solamente
  lexicon: HALOT
  rationale: En español, la construcción negativa con "sino" expresa con precisión la excepción que introduce el hebreo. Aquí sería menos natural usar "excepto" dentro de la sintaxis global de la oración.
- source_word: עָרִים לָשֶׁבֶת
  english_pob_choice: cities to dwell in
  chosen_spanish: ciudades para habitar
  alternatives_spanish:
  - ciudades para morar
  - ciudades para vivir
  lexicon: HALOT
  rationale: Conserva el sentido de destino/propósito de la frase hebrea. "Habitar" mantiene dignidad bíblica y evita la impresión de mera residencia incidental.
- source_word: מִגְרְשֵׁיהֶם
  english_pob_choice: their pasturelands
  chosen_spanish: sus ejidos
  alternatives_spanish:
  - sus pastizales
  - sus tierras de pasto
  lexicon: HALOT
  rationale: '"Ejidos" refleja el terreno abierto alrededor de las ciudades levíticas, como espacio de uso comunal y de apoyo. Aunque no es idéntico a un término moderno de catastro, comunica bien la función territorial del hebreo; el contexto del ganado ayuda a delimitarlo.'
- source_word: לְמִקְנֵיהֶם
  english_pob_choice: for their livestock
  chosen_spanish: para su ganado
  alternatives_spanish:
  - para sus animales
  - para su ganado mayor
  lexicon: HALOT
  rationale: '"Ganado" reproduce de modo sobrio el valor de מִקְנֶה como animales de cría o riqueza pecuaria. Es más preciso y bíblicamente estable que un término genérico como "animales".'
- source_word: וּלְקִנְיָנָם
  english_pob_choice: and for their possessions
  chosen_spanish: y para sus posesiones
  alternatives_spanish:
  - y para sus bienes
  - y para su propiedad
  lexicon: HALOT
  rationale: '"Posesiones" sigue la revisión inglesa y conserva un sentido amplio de bienes/propiedad sin estrechar el término a bienes inmuebles o al lenguaje jurídico moderno.'
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de "property" a "possessions" para el término final; la redacción española adopta directamente "posesiones" para reflejar esa decisión revisada. También se mantiene la estructura concesiva/exceptiva del hebreo, con sintaxis española natural.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el tetragrámaton.
  - Se mantiene "levitas" para לְוִיִּם por tratarse del grupo sacerdotal/tribal, no de Levi como ancestro.
  - '"Ejidos" es una elección funcional para מִגְרְשֵׁיהֶם; se preserva en nota la referencia cultural al terreno abierto alrededor de las ciudades.'
  - No se introduce terminología eclesiástica ajena al pasaje; el vocabulario sigue el reparto territorial del texto hebreo.
