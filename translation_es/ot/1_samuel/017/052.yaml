base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/017/052.yaml
  text: Then the men of Israel and Judah rose up and shouted[a], and they pursued the Philistines as far as Gai and as far as the gates of Ekron. The slain Philistines fell along the road to Shaaraim[b], as far as Gath and as far as Ekron.
  footnotes:
