translation:
  language: es
  text: Entonces Eliacim hijo de Hilcías, que estaba a cargo de la casa real, y Sebna el escriba, y Joah hijo de Asaf, el cronista, vinieron a Ezequías con sus vestidos rasgados, y le informaron las palabras del Rabsaqué[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rabsaqué es un título oficial asirio, a menudo entendido como algo así como «jefe de coperos» u otro alto funcionario de la corte.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vinieron
  alternatives_spanish:
  - Y ... vinieron
  - Luego ... vinieron
  lexicon: WLC / HALOT
  rationale: El wayyiqtol marca secuencia narrativa; ‘Entonces’ comunica bien el avance del relato en español sin perder el valor temporal del hebreo.
- source_word: אֲשֶׁר עַל הַבַּיִת
  english_pob_choice: who was over the household
  chosen_spanish: que estaba sobre la casa
  alternatives_spanish:
  - que estaba sobre el palacio
  - que estaba a cargo de la casa
  lexicon: HALOT
  rationale: Conservo la expresión administrativa hebrea de modo cercano. ‘Sobre la casa’ refleja el giro original sin reemplazarlo por una paráfrasis más interpretativa.
- source_word: הַסֹּפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  lexicon: HALOT
  rationale: ‘Escriba’ es el equivalente directo y conserva el término oficial sin imponer una equivalencia más funcional que el hebreo no exige.
- source_word: הַמַּזְכִּיר
  english_pob_choice: the recorder
  chosen_spanish: el registrador
  alternatives_spanish:
  - el cronista
  - el recordador
  lexicon: HALOT
  rationale: ‘Registrador’ comunica la función de funcionario de corte que recuerda o registra asuntos oficiales. En español evita el arcaísmo de ‘recordador’ y mantiene la idea administrativa.
- source_word: קְרוּעֵי בְגָדִים
  english_pob_choice: with their clothes torn
  chosen_spanish: con sus vestidos rasgados
  alternatives_spanish:
  - con sus ropas rasgadas
  - con sus vestidos rotos
  lexicon: HALOT
  rationale: ‘Rasgados’ conserva la imagen de duelo o consternación. ‘Vestidos’ es un término digno y bíblicamente adecuado; no se reduce a una expresión meramente coloquial.
- source_word: וַיַּגִּידוּ ל֔וֹ
  english_pob_choice: and told him
  chosen_spanish: y le informaron
  alternatives_spanish:
  - y le dijeron
  - y le reportaron
  lexicon: HALOT
  rationale: ‘Informaron’ refleja mejor el carácter de comunicación formal de estos funcionarios ante el rey, sin perder el sentido básico de ‘decir/relatar’.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - el mensaje de
  - el relato de
  lexicon: HALOT
  rationale: ‘Palabras’ reproduce con exactitud el sustantivo constructo y deja visible que lo transmitido es el contenido verbal del emisario asirio.
- source_word: רַב שָׁקֵה
  english_pob_choice: the Rabshakeh
  chosen_spanish: Rabsaqué
  alternatives_spanish:
  - el Rabsaqué
  - el jefe de coperos
  lexicon: HALOT
  rationale: Sigo la transliteración tradicional del título como designación fija del oficial asirio, en vez de convertirlo en una paráfrasis funcional que podría borrar su carácter de título.
theological_decisions:
- issue: Tratamiento del título asirio רַב שָׁקֵה
  english_pob_reading: Retains 'Rabshakeh' as a fixed historical title/name, with a note that it is an Assyrian official title.
  chosen_spanish_reading: Rabsaqué como título propio transliterado.
  alternative_spanish_readings:
  - el jefe de coperos
  - el copero principal
  rationale: 'No hay una decisión doctrinal aquí, pero sí una elección traductológica importante: mantener el título evita imponer una glosa funcional que podría oscurecer el uso narrativo del término en Isaías.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa auditada no requiere revisión adicional; el texto hebreo y la traducción inglesa concuerdan en la secuencia narrativa, los títulos oficiales y la referencia al estado de duelo de los mensajeros. Se corrigió la validación anterior eliminando una nota sin anclaje en el texto.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y bíblico, pero en español natural.
  - ‘Escriba’ y ‘registrador’ preservan los títulos oficiales sin forzar equivalentes eclesiásticos.
  - ‘Rabsaqué’ se dejó sin nota porque la validación exige que todo marcador aparezca explícitamente en el texto; no era necesario anclar una glosa adicional para este versículo.
