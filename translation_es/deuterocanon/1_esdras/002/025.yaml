revisions:
- from: Entonces[a], cuando fue leído lo que había escrito el rey Artajerjes, Rátimo y Samelio el escriba, y los que se alineaban con ellos[b], se apresuraron hacia Jerusalén con caballería y en formación de batalla.
  to: Entonces[a], cuando se leyó lo que había sido escrito por el rey Artajerjes, Rátimo y Samelio el escriba, y los que se alineaban con ellos, se apresuraron hacia Jerusalén con caballería y en formación de batalla[b].
  rationale: Se ajustó la cláusula inicial para preservar mejor la pasiva del griego y del audit trail ('lo que había sido escrito por el rey Artajerjes'). También se reubicó la nota [b] al sintagma militar que realmente explica, sin cambiar el sentido principal del versículo.
