base_translation:
  language: en
  yaml_path: translation/ot/ezra/004/002.yaml
  text: Then they approached Zerubbabel and the heads of the fathers’ houses and said to them[a], “Let us build with you, for like you we seek your God, and we have been sacrificing to him since the days of Esar-haddon king of Assyria[b], who brought us up here.”
  footnotes:
  - marker: a
    text: Hebrew reads 'and not we are sacrificing'; many understand this as a scribal form for 'and to him we are sacrificing' or otherwise take it idiomatically in a positive sense from the context.
    reason: textual_variant
  - marker: b
    text: Or 'we worship your God' / 'we inquire of your God.' The Hebrew verb 'seek' can carry religious overtones.
    reason: lexical_alternative
