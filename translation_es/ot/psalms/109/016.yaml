  glossary_alignment: 'No hay conflictos con los términos troncales del proyecto. La principal decisión léxica es חָסֶד, donde conviene alinearse con la explicación inglesa: bondad concreta hacia vulnerables, no una formulación rígida como «hacer misericordia».'
