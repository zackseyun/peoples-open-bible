id: ROM.8.2
reference: Romans 8:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ γὰρ νόμος τοῦ πνεύματος τῆς ζωῆς ἐν Χριστῷ Ἰησοῦ ἠλευθέρωσέν ⸀σε ἀπὸ τοῦ νόμου τῆς ἁμαρτίας καὶ τοῦ θανάτου.
base_translation:
  language: en
  yaml_path: translation/nt/romans/008/002.yaml
  text: For the law of the Spirit of life in Messiah Jesus has set you free from the law of sin and death[a][b][c].
translation:
  language: ko
  text: 메시아 예수 안에서 생명을 주시는 성령의 법이 죄와 죽음의 법에서 당신을 자유롭게 하였기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ νόμος τοῦ πνεύματος τῆς ζωῆς
  english_pob_choice: the law of the Spirit of life
  chosen_korean: 생명을 주시는 성령의 법
  alternatives_korean:
  - 생명의 영의 법
  - 생명을 주는 영의 원리
  lexicon: BDAG
  rationale: '본 과제 정책: 8장에서 πνεῦμα는 명백한 신적 성령. 「성령」 채택. νόμος는 모세 율법 아닌 「법/원리」지만, 「죄와 죽음의 법」과의 평행을 위해 「법」 유지.'
- source_word: ἠλευθέρωσέν
  english_pob_choice: has set ... free
  chosen_korean: 자유롭게 하였기
  lexicon: BDAG
  rationale: 6:18, 22 일관.
- source_word: ἀπὸ τοῦ νόμου τῆς ἁμαρτίας καὶ τοῦ θανάτου
  english_pob_choice: from the law of sin and death
  chosen_korean: 죄와 죽음의 법에서
  lexicon: BDAG
  rationale: 7:23, 25 연속.
theological_decisions:
- issue: 8:2의 두 νόμος — 「성령의 법」/「죄와 죽음의 법」
  chosen_reading: 양쪽 모두 「법」(작동 원리)으로 옮김
  alternative_readings:
  - 「율법」 통일
  - 「원리」 통일
  rationale: 7:21, 23 정책 연속. 8:2의 νόμος는 모세 율법과 다른 작동 원리/체제이며, 「율법」으로 옮기면 모세 율법과 혼동된다. 두 「법」의 대조를 보존.
  doctrine_reference: 본 과제 용어집
