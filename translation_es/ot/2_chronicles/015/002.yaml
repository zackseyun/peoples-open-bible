translation:
  language: es
  text: 'Y salió al encuentro de Asa y le dijo: «Escúchenme, Asa, y todo Judá y Benjamín: Yahvé está con ustedes mientras ustedes estén con él. Si lo buscan, se dejará encontrar[a] por ustedes; pero si lo abandonan, él los abandonará».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más sencillamente, «será hallado por ustedes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: He went out
  chosen_spanish: Y salió
  alternatives_spanish:
  - Y fue
  - Y se presentó
  lexicon: HALOT
  rationale: El verbo יצא en narrativa marca avance de acción y en español natural se rinde con «salió». Mantiene la sencillez verbal sin introducir matices ajenos.
- source_word: לִפְנֵי אָסָא
  english_pob_choice: to meet Asa
  chosen_spanish: al encuentro de Asa
  alternatives_spanish:
  - ante Asa
  - delante de Asa
  lexicon: HALOT
  rationale: Aunque literalmente es «delante de», en este contexto de movimiento la idea es ir a salir al encuentro. «Al encuentro de Asa» conserva el valor idiomático sin sobreexplicar.
- source_word: שְׁמָעוּנִי
  english_pob_choice: Hear me
  chosen_spanish: Escúchenme
  alternatives_spanish:
  - Oiganme
  - Atiéndanme
  lexicon: HALOT
  rationale: El imperativo plural con sufijo de primera persona pide una apelación directa a varios oyentes. «Escúchenme» es claro y mantiene el tono profético.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma española de uso del proyecto, sin sustituirlo por una glosa como «el SEÑOR».
- source_word: עִמָּכֶם ... עִמּוֹ
  english_pob_choice: is with you ... you are with him
  chosen_spanish: está con ustedes ... estén con él
  alternatives_spanish:
  - está con ustedes ... ustedes están con él
  - está con ustedes ... permanezcan con él
  lexicon: HALOT
  rationale: 'Se preserva la simetría de עם y la reciprocidad del dicho. En español, la segunda cláusula funciona mejor como exhortación/condición explícita: «mientras ustedes estén con él».'
- source_word: בִּהְיֹתְכֶם
  english_pob_choice: while you are
  chosen_spanish: mientras ustedes estén
  alternatives_spanish:
  - cuando ustedes estén
  - al estar ustedes
  lexicon: HALOT
  rationale: El infinitivo constructo con prefijo temporal expresa contemporaneidad durativa. «Mientras ustedes estén» reproduce bien ese valor condicional-temporal.
- source_word: תִּדְרְשֻׁהוּ
  english_pob_choice: seek him
  chosen_spanish: lo buscan
  alternatives_spanish:
  - lo buscan diligentemente
  - lo procuran
  lexicon: HALOT
  rationale: En contexto de alianza y culto, דרש puede traducirse «buscar». Aquí se mantiene el objeto directo pronominal para enlazar con la forma breve del dicho; el sentido devocional queda claro por el contexto.
- source_word: יִמָּצֵא לָכֶם
  english_pob_choice: he will be found by you
  chosen_spanish: él será hallado por ustedes
  alternatives_spanish:
  - ustedes lo hallarán
  - él se dejará hallar por ustedes
  lexicon: HALOT
  rationale: 'El nifal de מצא se conserva como pasivo: «ser hallado». Esta formulación refleja la disponibilidad divina sin añadir un giro interpretativo innecesario.'
- source_word: תַּעַזְבֻהוּ ... יַעֲזֹב אֶתְכֶם
  english_pob_choice: if you forsake him, he will forsake you
  chosen_spanish: si lo abandonan, él los abandonará
  alternatives_spanish:
  - si lo dejan, él los dejará
  - si lo desamparan, él los desamparará
  lexicon: HALOT
  rationale: עזב se rinde con «abandonar» para conservar la reciprocidad verbal y la fuerza de la advertencia. Es natural en español y mantiene el paralelismo del hebreo.
theological_decisions:
- issue: Nombre divino y cita de YHWH
  english_pob_reading: Yahweh is with you
  chosen_spanish_reading: Yahvé está con ustedes
  alternative_spanish_readings:
  - el SEÑOR está con ustedes
  - Dios está con ustedes
  rationale: Se preserva el nombre propio divino en lugar de una sustitución titulada, siguiendo la política del proyecto y el valor identificable del Tetragrámaton en el hebreo.
  doctrine_reference: Tetragrámaton / transliteración del nombre divino
- issue: Reciprocidad pactual condicional
  english_pob_reading: If you seek him, he will be found by you; but if you forsake him, he will forsake you.
  chosen_spanish_reading: Si lo buscan, él será hallado por ustedes; pero si lo abandonan, él los abandonará.
  alternative_spanish_readings:
  - Si lo buscan, ustedes lo hallarán; pero si lo abandonan, él los abandonará.
  - Si lo buscan, él se dejará hallar por ustedes; pero si lo abandonan, él los dejará.
  rationale: La versión mantiene la condición explícita y la reciprocidad verbal del hebreo sin resolverla en una formulación doctrinal más amplia. Se conserva la tensión entre la disponibilidad divina y la responsabilidad humana.
  doctrine_reference: Covenant reciprocity; preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés, pero adopta el ajuste de la revisión más reciente al preferir «ser hallado» sobre una expansión como «dejarse hallar». También mantiene el paralelismo verbal de seek/forsake con «buscar/abandonar», y conserva el nombre divino como Yahvé conforme a la política del proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene el tratamiento plural de cortesía/lectura comunitaria con «ustedes» por dirigirse a Asa, Judá y Benjamín.
  - «Ser hallado» conserva la voz pasiva del nifal sin añadir interpretación.
  - No se introduce «Mesías» ni otras equivalencias ajenas, porque el versículo no las contiene.
  - La apelación plural «Escúchenme» respeta el hebreo שְׁמָעוּנִי con sufijo singular aplicado a un auditorio plural.
