    issue: «Marcos» para קֶרֶשׁ
    rationale: Aunque refleja el inglés «frames», en español común aplicado al tabernáculo puede sonar impropio o confuso. «Tableros» comunica mejor piezas estructurales verticales y coincide con la alternativa ya preservada en la nota inglesa.
  - severity: low
    issue: Nota anclada en «lado» innecesaria
    rationale: La nota no explica «lado», sino la alternativa «tableros»/«marcos». Debe anclarse en el término relevante para evitar ambigüedad editorial.
  revised_spanish_text: Hizo cinco barras de madera de acacia para los tableros[a] de un lado del tabernáculo.
