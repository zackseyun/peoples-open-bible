review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura retórica del hebreo y preserva el cambio de עבד a היה en la última cláusula. También mantiene la nota cultural sobre לִפְנֵי. Sin embargo, traduce לִפְנֵי repetidamente como «antes de», lo cual en español moderno se entiende temporalmente y no transmite bien el sentido espacial/cortesano de «ante / en presencia de». Eso afecta de forma directa la fidelidad al modismo fuente y a la revisión inglesa que restauró explícitamente «before his son».
  spanish_quality_summary: El texto es legible, pero «¿No es antes de su hijo?» y «estaré antes de ti» suenan poco naturales y potencialmente confusos en español, porque «antes de» se oye como prioridad o anterioridad temporal. «Ante» conserva la dignidad del registro, es claro para lectura eclesial amplia, y reproduce mejor el paralelismo. La nota puede simplificarse levemente sin perder contenido.
  glossary_alignment: 'No hay términos del glosario mayor en juego. La decisión clave es idiomática: לִפְנֵי debe representarse con «ante» aquí, no «antes de». «Servir» está bien para עבד en contexto cortesano, y «estaré ante ti» respeta el cambio formal de היה sin introducir «serviré».'
  issues:
  - severity: high
    issue: Uso de «antes de» para לִפְנֵי
    rationale: En español, «antes de» expresa normalmente tiempo o prioridad, no presencia/comparecencia cortesana. Esto distorsiona «before his son ... before your father ... before you» y produce frases poco idiomáticas.
  - severity: medium
    issue: «Como he servido» frente a pasado simple
    rationale: El perfecto compuesto no es incorrecto, pero «como serví ante tu padre» suena más directo y narrativo en un contexto histórico bíblico. Aun así, es ajuste estilístico menor comparado con el problema principal.
  - severity: low
    issue: Anclaje de nota en «en segundo lugar»
    rationale: La nota explica el modismo repetido «ante... ante... ante...», no el ordinal «en segundo lugar». Conviene mover el marcador a la primera aparición relevante del modismo para mejor correspondencia entre texto y nota.
  revised_spanish_text: Y en segundo lugar, ¿a quién he de servir? ¿No ha de ser ante su hijo[a]? Como serví ante tu padre, así estaré ante ti.
  revised_footnotes:
