translation:
  language: es
  text: Y Tobit salió al encuentro de su nuera[a], gozoso y bendiciendo a Dios, junto a la puerta de Nínive. Y los que lo veían caminar se asombraban[b], porque podía ver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «su νύμφη»; este término puede significar «novia» o «nuera». En este contexto se refiere a Sara como la esposa de su hijo, por lo que se traduce «nuera».'
    reason: lexical_alternative
  - marker: b
    text: La forma griega del nombre aquí es Τωβείας, pero el contexto indica a Tobit, el padre ya sanado, porque los observadores se maravillan de que pueda ver.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue
  - se fue
  lexicon: BDAG
  rationale: El aoristo narra una acción puntual de movimiento. En español, «salió» es natural, preciso y mantiene el valor narrativo sin sobrecargar el verso.
- source_word: Τωβείας
  english_pob_choice: Tobit
  chosen_spanish: Tobías
  alternatives_spanish:
  - Tobit
  lexicon: Tradición griega del nombre propio
  rationale: Aunque el audita inglés opta por «Tobit» para evitar identificarlo erróneamente con el hijo, aquí la forma griega Τωβείας se refleja mejor como «Tobías». La aclaración contextual de que se trata del padre queda sostenida por la nota y por la cláusula final sobre la recuperación de la vista.
- source_word: εἰς συνάντησιν
  english_pob_choice: to meet
  chosen_spanish: al encuentro
  alternatives_spanish:
  - para encontrarse con
  - para recibir
  lexicon: BDAG
  rationale: La expresión idiomática se vierte de forma natural con «al encuentro de», que conserva la idea de salir a recibir a alguien.
- source_word: τῇ νύμφῃ αὐτοῦ
  english_pob_choice: his daughter-in-law
  chosen_spanish: su nuera
  alternatives_spanish:
  - su novia
  - su esposa joven
  lexicon: BDAG
  rationale: νύμφη puede significar «novia/esposa joven» o «nuera». En este contexto familiar, el sentido correcto es el de la esposa del hijo, por lo que «nuera» es la opción transparente en español.
- source_word: χαίρων
  english_pob_choice: rejoicing
  chosen_spanish: gozoso
  alternatives_spanish:
  - alegre
  - regocijándose
  lexicon: BDAG
  rationale: El participio expresa su estado anímico mientras sale. «Gozoso» preserva el matiz de alegría verbal sin sonar excesivamente literal o pesado.
- source_word: εὐλογῶν τὸν θεόν
  english_pob_choice: blessing God
  chosen_spanish: bendiciendo a Dios
  alternatives_spanish:
  - alabando a Dios
  - bendiciendo Dios
  lexicon: BDAG
  rationale: El griego dice literalmente «bendiciendo a Dios». En español, la forma transitiva con «a Dios» es la más clara y fiel.
- source_word: πρὸς τῇ πύλῃ Νινευή
  english_pob_choice: at the gate of Nineveh
  chosen_spanish: junto a la puerta de Nínive
  alternatives_spanish:
  - en la puerta de Nínive
  - cerca de la puerta de Nínive
  lexicon: BDAG
  rationale: «Πρὸς» permite un matiz locativo de proximidad. «Junto a» reproduce bien esa cercanía y evita sonar demasiado rígido.
- source_word: ἐθαύμαζον
  english_pob_choice: were amazed
  chosen_spanish: se admiraban
  alternatives_spanish:
  - se asombraban
  - quedaban maravillados
  lexicon: BDAG
  rationale: El imperfecto describe la reacción continua de los observadores. «Se admiraban» es natural en español y conserva el carácter de asombro.
- source_word: οἱ θεωροῦντες αὐτὸν πορευόμενον
  english_pob_choice: those who saw him walking
  chosen_spanish: los que lo veían caminar
  alternatives_spanish:
  - los que lo observaban ir
  - los que lo veían andar
  lexicon: BDAG
  rationale: La construcción participial se vierte de modo claro y corriente. «Lo veían caminar» comunica la escena sin añadir interpretaciones.
- source_word: ὅτι ἔβλεψεν
  english_pob_choice: because he could see
  chosen_spanish: porque podía ver
  alternatives_spanish:
  - porque veía
  - porque había recobrado la vista
  lexicon: BDAG
  rationale: La revisión inglesa prefirió una forma más cercana al griego. «Podía ver» sigue esa misma línea, evitando expandir el sentido a «recobrado la vista».
theological_decisions:
- issue: Identificación del personaje nombrado por Τωβείας
  english_pob_reading: The subject is Tobit, the healed father, not Tobias the son.
  chosen_spanish_reading: Se mantiene el nombre griego como «Tobías», con una nota que identifica al personaje como el padre sanado, no el hijo.
  alternative_spanish_readings:
  - «Tobit» para armonizar con la identificación narrativa
  - «Tobías» sin nota explicativa
  rationale: El texto griego presenta Τωβείας, pero la escena posterior indica que el hombre que vuelve caminando es el que recuperó la vista. Para respetar la forma griega y, a la vez, evitar una identificación confusa, se conserva «Tobías» y se explica el referente en la nota.
  doctrine_reference: Principio de primacía del texto original y claridad referencial en la traducción.
- issue: Valor semántico de ὅτι ἔβλεψεν
  english_pob_reading: because he could see
  chosen_spanish_reading: porque podía ver
  alternative_spanish_readings:
  - porque había recobrado la vista
  - porque veía
  rationale: La clausula griega expresa el hecho de ver, no una glosa interpretativa sobre el proceso de sanidad. «Podía ver» conserva esa sobriedad y coincide con la revisión inglesa más ajustada al original.
  doctrine_reference: Evitar expansión interpretativa más allá del valor léxico del griego.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del audit trail inglés, que ajustó ὅτι ἔβλεψεν de una expansión interpretativa («had regained his sight») a una equivalencia más cercana («could see»). La versión española sigue esa decisión con «podía ver», y también refleja la tensión nominal entre la forma griega Τωβείας y la identificación narrativa del personaje mediante nota explicativa.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y «nuera» para νύμφη en este contexto familiar.
  - Se mantiene un registro bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - La puntuación sigue el español editorial estándar y conserva la coordinación del original griego.
