translation:
  language: es
  text: Prueben y vean que Yahvé es bueno[a]; dichoso el hombre que en él se refugia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el hombre»; la forma masculina singular se usa aquí con valor representativo para cualquiera que se refugia en Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טַעֲמוּ
  english_pob_choice: Taste
  chosen_spanish: Prueben
  alternatives_spanish:
  - Prueben y gusten
  - Gusten
  lexicon: HALOT
  rationale: El verbo hebreo es literal y sensorial, pero en español «prueben» conserva la imagen de saborear y también funciona de manera natural en una exhortación poética. Evita la dureza de un calco como «gusten» sin perder el impulso experiencial.
- source_word: וּרְאוּ
  english_pob_choice: and see
  chosen_spanish: y vean
  alternatives_spanish:
  - y miren
  - y perciban
  lexicon: HALOT
  rationale: Mantiene el paralelismo sensorial con «prueben» y reproduce el valor de observación experiencial del imperativo plural hebreo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: 'En este contexto introduce el contenido de lo que se debe comprobar por experiencia: «que Yahvé es bueno».'
- source_word: ט֣וֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - benigno
  lexicon: HALOT
  rationale: «Bueno» es la equivalencia más amplia y fiel para la afirmación sobre el carácter y la beneficencia de Yahvé; preserva el alcance teológico del hebreo sin restringirlo a una sola cualidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal conforme al criterio del proyecto, evitando la sustitución por un título. «Yahvé» es la forma establecida en español para el Tetragrámaton.
- source_word: אַשְׁרֵי
  english_pob_choice: blessed
  chosen_spanish: dichoso
  alternatives_spanish:
  - bienaventurado
  - feliz
  lexicon: HALOT
  rationale: La fórmula hebrea es una exclamación de dicha/florecimiento. «Dichoso» conserva el tono sapiencial y beatitudinal en español moderno, sin depender del registro eclesiástico más marcado de «bienaventurado».
- source_word: הַגֶּבֶר
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el varón
  lexicon: HALOT
  rationale: Se preserva la forma masculina singular del hebreo, con valor representativo. «El hombre» es fiel al paralelismo y a la nota auditada del POB; el sentido inclusivo queda implícito en la construcción representativa.
- source_word: יֶחֱסֶה
  english_pob_choice: takes refuge
  chosen_spanish: se refugia
  alternatives_spanish:
  - busca refugio
  - halla refugio
  lexicon: HALOT
  rationale: El verbo חסה expresa la imagen de refugiarse/procurar abrigo. «Se refugia» transmite con naturalidad la metáfora de protección sin ampliar indebidamente el sentido.
- source_word: בּוֹ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en Yahvé
  - en él mismo
  lexicon: HALOT
  rationale: El sufijo pronominal retoma a Yahvé. «En él» conserva la cohesión hebrea y fluye mejor en español que repetir el nombre divino en la segunda cola.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton; el proyecto pide reflejarlo como nombre propio y no ocultarlo tras una sustitución. «Yahvé» es la forma española correspondiente y mantiene la transparencia auditada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor representativo de הַגֶּבֶר
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la persona
  - el varón
  rationale: La forma hebrea es masculina singular y el POB la conserva por fidelidad formal. En español, «el hombre» refleja esa forma y permite la lectura representativa sin borrar la señal gramatical del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo y el expediente inglés sin cambios recientes en la revisión más nueva; no se observan revisiones aplicadas ni discrepancias abiertas en el resumen de concordancia.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino.
  - Se conserva el paralelismo sensorial con «prueben y vean».
  - «Dichoso» mantiene el tono sapiencial breve de אַשְׁרֵי sin cargarlo de formulación litúrgica.
  - La nota al pie explica la masculinidad gramatical de «el hombre» sin alterar el texto principal.
