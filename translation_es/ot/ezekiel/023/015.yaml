translation:
  language: es
  text: con cinturones ceñidos a la cintura, con turbantes colgantes sobre sus cabezas, todos ellos con apariencia de oficiales[a], la semejanza de los hijos de Babilonia[b], caldeos, la tierra de su nacimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «capitanes». El hebreo שָׁלִשִׁים puede denotar hombres militares de élite o oficiales de alto rango; «oficiales» se usa aquí como una traducción más amplia.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de Babilonia», una expresión filial para referirse a los babilonios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲגוֹרֵי אֵזוֹר
  english_pob_choice: with belts fastened
  chosen_spanish: con cinturones ceñidos
  alternatives_spanish:
  - con cinturones ajustados
  - ceñidos con cinturones
  lexicon: HALOT
  rationale: La construcción participial describe vestimenta concreta. «Ceñidos» conserva la imagen corporal de ir con el cinturón ajustado, con español natural y fiel al valor del hebreo.
- source_word: בְּמָתְנֵיהֶם
  english_pob_choice: at their waists
  chosen_spanish: a sus cinturas
  alternatives_spanish:
  - a sus lomos
  - en sus cinturas
  lexicon: HALOT
  rationale: מָתְנַיִם apunta a la zona de la cintura/lomos. «Cinturas» es claro en español moderno y evita un arcaísmo innecesario.
- source_word: סְרוּחֵי טְבוּלִים
  english_pob_choice: with flowing turbans
  chosen_spanish: con turbantes sueltos
  alternatives_spanish:
  - con turbantes colgantes
  - con tocados que caen
  lexicon: HALOT
  rationale: El conjunto describe un adorno para la cabeza con caída o amplitud. «Sueltos» transmite la idea de algo no ceñido o que cuelga, sin forzar un término más técnico de lo que permite el hebreo.
- source_word: בְּרָאשֵׁיהֶם
  english_pob_choice: on their heads
  chosen_spanish: sobre sus cabezas
  alternatives_spanish:
  - en sus cabezas
  - encima de sus cabezas
  lexicon: HALOT
  rationale: Es una locución locativa directa; «sobre sus cabezas» suena natural y conserva la precisión espacial.
- source_word: מַרְאֵה שָׁלִשִׁים
  english_pob_choice: having the appearance of officers
  chosen_spanish: con apariencia de oficiales
  alternatives_spanish:
  - con aspecto de capitanes
  - con apariencia de altos mandos
  lexicon: HALOT
  rationale: שָׁלִשִׁים puede referir a hombres militares de alto rango. «Oficiales» mantiene la amplitud del término, como en la decisión inglesa, sin imponer una identificación más específica.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - todos los cuales
  lexicon: HALOT
  rationale: Se explicita el valor distributivo del hebreo y se mantiene el énfasis colectivo.
- source_word: דְּמוּת בְּנֵי בָבֶל
  english_pob_choice: the likeness of the sons of Babylon
  chosen_spanish: la semejanza de los hijos de Babilonia
  alternatives_spanish:
  - la apariencia de los hijos de Babilonia
  - la imagen de los hijos de Babilonia
  lexicon: HALOT
  rationale: דְּמוּת pide un sustantivo de semejanza/analogía. «Hijos de Babilonia» conserva el giro filial hebreo, y «semejanza» preserva mejor la estructura appositiva que una paráfrasis más libre.
- source_word: כַּשְׂדִּים
  english_pob_choice: Chaldeans
  chosen_spanish: caldeos
  alternatives_spanish:
  - chaldeos
  - los caldeos
  lexicon: HALOT
  rationale: La designación étnica se mantiene separada de Babilonia. «Caldeos» es el equivalente español estándar y no fusiona indebidamente los dos referentes.
- source_word: אֶרֶץ מוֹלַדְתָּם
  english_pob_choice: the land of their birth
  chosen_spanish: la tierra de su nacimiento
  alternatives_spanish:
  - su tierra natal
  - la tierra donde nacieron
  lexicon: HALOT
  rationale: La frase appositiva identifica el origen. «Tierra de su nacimiento» sigue de cerca el hebreo y es plenamente comprensible en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el paso revisado del inglés, manteniendo la estructura appositiva de דְּמוּת («la semejanza de…») y separando «Babilonia» de «caldeos», como en el texto hebreo y la auditoría inglesa. Se evitó traducir mecánicamente desde el inglés cuando el hebreo permitía una imagen más concreta en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «caldeos» como etnónimo distinto de «Babilonia», según la distinción del hebreo.
  - «Hijos de Babilonia» se conservó por su valor idiomático y se explicó en nota para evitar una lectura literalista incorrecta.
