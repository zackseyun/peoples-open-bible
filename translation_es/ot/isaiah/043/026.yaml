revisions:
- from: Hazme recordar[a]; entremos en juicio juntos. Expón tu causa, para que seas declarado justo[b].
  to: Recuérdame; entremos en juicio juntos[a]. Expón tu causa, para que se demuestre que tienes razón[b].
  rationale: Se reemplaza 'Hazme recordar' por 'Recuérdame' para reflejar de manera natural e idiomática el imperativo hebreo. Se mueve la nota [a] al segmento forense que realmente comenta. Se ajusta la cláusula final a 'para que se demuestre que tienes razón' para expresar mejor el sentido jurídico de צדק ('ser hallado en lo correcto') sin cargar el texto principal con resonancias doctrinales de 'justificado'.
