translation:
  language: es
  text: Entonces Jotam huyó y escapó, y fue a Beer[a], y vivió allí lejos de Abimelec su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Beera». El nombre hebreo בְּאֵרָה puede representarse en español como «Beer» o «Beera».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּנָס
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - fue huyendo
  - salió huyendo
  lexicon: HALOT
  rationale: נוס expresa huida ante peligro; en español, «huyó» es natural, conciso y narrativamente fiel.
- source_word: וַיִּבְרַח
  english_pob_choice: escaped
  chosen_spanish: escapó
  alternatives_spanish:
  - huyó
  - salió escapando
  lexicon: HALOT
  rationale: ברח repite la idea de fuga con matiz de escape; «escapó» conserva la doble acción sin volverla torpemente repetitiva.
- source_word: בְּאֵרָה
  english_pob_choice: Beer
  chosen_spanish: Beer
  alternatives_spanish:
  - Beera
  - Beerah
  lexicon: HALOT
  rationale: Es un nombre de lugar. Se conserva la transliteración breve «Beer», acorde con la forma consonántica y con la decisión auditada del POB inglés.
- source_word: וַיֵּשֶׁב שָׁם
  english_pob_choice: he lived there
  chosen_spanish: vivió allí
  alternatives_spanish:
  - se quedó allí
  - habitó allí
  lexicon: HALOT
  rationale: ישב puede significar residir o habitar; «vivió allí» comunica residencia asentada en español actual de forma clara y natural.
- source_word: מִפְּנֵי
  english_pob_choice: away from
  chosen_spanish: lejos de
  alternatives_spanish:
  - apartado de
  - alejado de
  lexicon: HALOT
  rationale: La expresión literal «de delante de / de la presencia de» aquí indica separación respecto de Abimelec; «lejos de» refleja bien ese alejamiento sin añadir causalidad no explicitada.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su propio hermano
  lexicon: HALOT
  rationale: El sufijo posesivo simple se refleja con «su hermano», manteniendo la relación familiar que intensifica la tensión narrativa.
theological_decisions:
- issue: Sentido de מִפְּנֵי en el contexto narrativo
  english_pob_reading: away from Abimelech his brother
  chosen_spanish_reading: lejos de Abimelec su hermano
  alternative_spanish_readings:
  - por causa de Abimelec su hermano
  - apartado de Abimelec su hermano
  rationale: La preposición hebrea puede ser espacial o relacional; el contexto favorece la idea de retirada/separación. «Lejos de» evita introducir una causalidad que el hebreo no exige explícitamente.
  doctrine_reference: No aplica; decisión de sintaxis y pragmática narrativa.
translation_notes:
  revision_awareness: Se siguió la revisión auditada del POB inglés que prefirió «away from» en lugar de «because of» para מִפְּנֵי; en español se reflejó como «lejos de» para mantener la relación de alejamiento sin sobrecargar el sentido causal. No se introdujeron variantes textuales porque el hebreo y el inglés coinciden sustancialmente.
  spanish_consistency_notes:
  - Se mantuvo «Jotam» para יוֹתָם y «Abimelec» para אֲבִימֶלֶךְ, con transliteración consistente en todo el versículo.
  - Se conservó la doble secuencia verbal de huida («huyó y escapó») para respetar el paralelismo retórico del hebreo.
  - Se evitó el calco «de delante de» por resultar menos natural en español, aunque permanece reconocido como trasfondo semántico en la decisión léxica.
