  glossary_alignment: 'No hay términos del glosario mayor en juego salvo la fidelidad léxica general. «Vanidad» para הֶבֶל y «perecerán» para יֹאבֵדוּ concuerdan bien con el proyecto. La principal desalineación está en el manejo de las notas léxicas: debe conservarse la alternativa de «visitación» para פְּקֻדָּתָם, y no inventarse una alternativa imprecisa como «mera neblina».'
