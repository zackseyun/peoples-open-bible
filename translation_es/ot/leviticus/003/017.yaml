  - marker: a
    text: O «estatuto permanente» o «estatuto eterno». En contextos legales, el hebreo עוֹלָם suele indicar validez duradera y continua.
    reason: lexical_alternative
  revision_rationale: Se conserva la fidelidad léxica y teológica del borrador, pero se mejora la naturalidad y legibilidad del español. «A lo largo de sus generaciones» expresa mejor la continuidad de לְדֹרֹתֵיכֶם, y «en todas sus moradas» reemplaza una expresión poco idiomática sin pérdida de sentido respecto de בְּכֹל מוֹשְׁבֹתֵיכֶם.
