  to: Entonces todos los hombres de Israel se levantaron de su lugar y se dispusieron en orden de batalla en Baal-tamar, mientras los que estaban en emboscada de Israel irrumpieron desde su lugar, desde Maareh-geba[a].
  rationale: Se corrigió la ubicación de la nota para que ancle el término realmente discutido por la evidencia fuente. Se reemplazó «los de la emboscada» por «los que estaban en emboscada» para reflejar con más claridad el participio hebreo אֹרֵב. Se sustituyó «salieron corriendo» por «irrumpieron» para mantener el sentido de salida súbita con un registro más digno. Se normalizó el topónimo principal a «Maareh-geba» conforme a la decisión documentada de transliterar el probable nombre de lugar.
