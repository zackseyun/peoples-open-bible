translation:
  language: es
  text: 'Entonces tu siervo[a], mi padre, nos dijo: «Ustedes saben que mi esposa me dio dos hijos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mi esposa me dio a luz dos». El sustantivo «hijos» queda implícito por el contexto y se hace explícito en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... nos dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... nos dijo
  lexicon: WLC/HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» preserva la secuencia con naturalidad en español, y «nos dijo» mantiene el complemento explícito de dirección a los oyentes.
- source_word: עַבְדְּךָ אָבִי
  english_pob_choice: your servant, my father
  chosen_spanish: tu siervo, mi padre
  alternatives_spanish:
  - mi padre, tu siervo
  - tu esclavo, mi padre
  lexicon: WLC/HALOT
  rationale: «Tu siervo» conserva el tono de deferencia del hebreo sin sustituirlo por una fórmula eclesiástica más interpretativa. «Mi padre» identifica al referente inmediato. Se evita «esclavo» porque el contexto aquí es honorífico cortesano, no una afirmación léxica de esclavitud literal.
- source_word: אֵלֵינוּ
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  - para nosotros
  lexicon: WLC/HALOT
  rationale: El complemento pronominal se expresa de forma natural en español con el dativo/objeto indirecto «nos», que corresponde a la dirección comunicativa del hebreo.
- source_word: אַתֶּם יְדַעְתֶּם
  english_pob_choice: You know
  chosen_spanish: ustedes saben
  alternatives_spanish:
  - ustedes conocen
  - vosotros sabéis
  lexicon: WLC/HALOT
  rationale: El perfecto hebreo con valor vigente se vierte mejor con presente español. «Ustedes» da una forma neutral y clara para el registro latinoamericano.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: WLC/HALOT
  rationale: Aquí introduce el contenido conocido; «que» es la conexión más directa y idiomática en español.
- source_word: שְׁנַיִם
  english_pob_choice: two sons
  chosen_spanish: dos hijos
  alternatives_spanish:
  - dos
  - dos varones
  lexicon: WLC/HALOT
  rationale: En hebreo queda implícito el sustantivo; el contexto de Rachel/Jacob exige la referencia a los hijos. «Hijos» reproduce el sentido sin forzar una explicitación más específica que el texto hebreo inmediato no da.
- source_word: יָלְדָה לִּי
  english_pob_choice: bore me
  chosen_spanish: me dio a luz
  alternatives_spanish:
  - me parió
  - me alumbró
  lexicon: WLC/HALOT
  rationale: «Me dio a luz» mantiene el valor de ילד con el complemento indirecto. Es más natural y reverente en español bíblico contemporáneo que un calco como «me bore».
- source_word: אִשְׁתִּי
  english_pob_choice: my wife
  chosen_spanish: mi esposa
  alternatives_spanish:
  - mi mujer
  lexicon: WLC/HALOT
  rationale: «Esposa» es un equivalente claro y digno en español moderno. Aunque «mujer» sería más literal en algunos contextos, aquí «esposa» comunica con precisión la relación matrimonial sin ambigüedad.
theological_decisions:
- issue: Tratamiento honorífico de עַבְדְּךָ
  english_pob_reading: your servant
  chosen_spanish_reading: tu siervo
  alternative_spanish_readings:
  - tu esclavo
  - su servidor
  rationale: La escena expresa sumisión cortesana y respeto ante una autoridad; no exige la carga social extrema de «esclavo». «Siervo» preserva la postura de humildad sin desplazar el sentido por una equivalencia más fuerte de la necesaria.
  doctrine_reference: Ética del lenguaje bíblico; pragmática honorífica en narrativas del AT
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece exactamente en el texto principal donde corresponde. Se mantuvo la explicitación de «hijos» en español por exigencia contextual, siguiendo la nota auditada del inglés POB, sin añadir otros pies de página no anclados.'
  spanish_consistency_notes:
  - Se mantuvo «tu siervo» para עַבְדְּךָ, consistente con el tono deferente del pasaje.
  - Se optó por presente «saben» para reflejar la vigencia pragmática del conocimiento citado.
  - «Mi esposa»/«mi esposa me dio a luz» conserva la relación matrimonial y el evento de nacimiento sin recargar el español.
  - No se introdujo «Mesías», «SEÑOR» ni terminología doctrinal ajena al verso.
