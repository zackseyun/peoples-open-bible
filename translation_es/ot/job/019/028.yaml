translation:
  language: es
  text: 'Si dicen[a]: «¿Cómo lo perseguiremos, puesto que la raíz del asunto se halla en mí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo es difícil. La cláusula final también puede entenderse como «la raíz del asunto se halla en él», según cómo se ponderen el texto consonántico y las versiones antiguas; algunos intérpretes también entienden «perseguiremos» en el sentido más fuerte de «acosaremos» o «perseguiremos» con hostilidad.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Porque
  - Cuando
  - Cierto que
  lexicon: HALOT
  rationale: Aquí כִּי introduce una cláusula condicional que encabeza el dicho hipotético. En español, «si» reproduce mejor esa fuerza que un causal como «porque».
- source_word: תֹאמְרוּ
  english_pob_choice: you say
  chosen_spanish: decís
  alternatives_spanish:
  - deciréis
  - diréis
  - ustedes dicen
  lexicon: HALOT
  rationale: El imperfecto 2mp en este contexto funciona como cita hipotética. «Decís» conserva la inmediatez del discurso directo y evita una forma demasiado pesada en español.
- source_word: מַה
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿Qué
  - ¿De qué manera
  lexicon: HALOT
  rationale: En la construcción interrogativa con verbo, מַה expresa modo o manera; por eso «¿Cómo?» es la equivalencia más natural y fiel.
- source_word: נִּרְדָּף
  english_pob_choice: shall we pursue
  chosen_spanish: lo perseguiremos
  alternatives_spanish:
  - lo seguiremos
  - lo perseguiremos con hostilidad
  - lo perseguiremos/perseguiremos
  lexicon: HALOT
  rationale: רָדַף significa perseguir, seguir o acosar. «Perseguir» conserva el valor básico y deja oír la posible fuerza hostil señalada en la nota inglesa.
- source_word: לוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - contra él
  - le
  lexicon: HALOT
  rationale: 'Aunque el hebreo usa לֹו, en español la referencia directa al objeto de «perseguir» se expresa con objeto directo: «lo». Esto suena natural y mantiene la relación personal del pronombre.'
- source_word: וְשֹׁרֶשׁ
  english_pob_choice: since the root
  chosen_spanish: si la raíz
  alternatives_spanish:
  - y la raíz
  - porque la raíz
  - pues la raíz
  lexicon: HALOT
  rationale: El hebreo enlaza la segunda cláusula con וְ; en este contexto la relación es explicativa o causal. En español, «si» introduce la condición interna del dicho, y «raíz» conserva la metáfora de fundamento o origen.
- source_word: דָּבָר
  english_pob_choice: the matter
  chosen_spanish: del asunto
  alternatives_spanish:
  - de la cosa
  - del caso
  - de la palabra
  lexicon: HALOT
  rationale: דָּבָר aquí no significa «palabra» en sentido estrecho, sino el tema o caso en cuestión. «Asunto» comunica mejor esa amplitud en español.
- source_word: נִמְצָא
  english_pob_choice: is found
  chosen_spanish: se halla
  alternatives_spanish:
  - es hallada
  - está hallada
  - se encuentra
  lexicon: HALOT
  rationale: El nifal expresa estado/resultación. «Se halla» es idiomático en español y preserva la idea de algo encontrado o localizado sin forzar una lectura más interpretativa.
- source_word: בִי
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - dentro de mí
  - conmigo
  - en él
  lexicon: HALOT
  rationale: 'La lectura base sigue el hebreo consonántico tal como fue reflejado en la POB inglesa: la raíz del asunto está en Job mismo. Se conserva «en mí» para no suavizar la dificultad textual.'
translation_notes:
  revision_awareness: Se siguió la lectura de la POB inglesa sin cambios de revisión posteriores; el pasaje conserva su dificultad sintáctica y textual, especialmente en la cláusula final y en el matiz de רדף.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en este proyecto, pero no aparece en este versículo.
  - «Raíz del asunto» conserva la metáfora del hebreo y la opción inglesa auditada, evitando explicitarla como «causa» para no perder la imagen.
  - El objeto pronominal «lo» refleja de forma natural el valor de לֹו en español, aunque el hebreo sea formalmente diferente.
