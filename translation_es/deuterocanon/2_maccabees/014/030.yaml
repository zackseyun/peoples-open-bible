revisions:
- from: Pero Macabeo[a], al percibir por las acciones de Nicanor hacia él que había asumido una manera más áspera de lo habitual, y al entender que esta severidad no procedía del mejor camino, reunió no a pocos de los que estaban con él y se mantuvo oculto de Nicanor.
  to: Pero Macabeo[a], al percibir por el trato de Nicanor hacia él que había adoptado una manera más áspera de lo habitual, y al entender que esta severidad no era para lo mejor, reunió a no pocos de los suyos y se mantuvo oculto de Nicanor.
  rationale: La revisión suaviza dos giros poco naturales en español sin apartarse del griego ni del audit trail inglés. «Trato» expresa mejor el comportamiento de Nicanor hacia Macabeo, y «no era para lo mejor» ofrece un castellano más idiomático para la frase griega ambigua, preservando la alternativa más literal en nota. También se mejora la fluidez de la litotes con «a no pocos de los suyos».
