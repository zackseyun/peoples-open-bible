  language: en
  yaml_path: translation/ot/genesis/021/012.yaml
  text: But God said to Abraham[a], “Do not let it be grievous in your sight because of the boy and because of your slave woman. Whatever Sarah says to you, listen to her voice[d][c][b], for through Isaac your offspring will be called.”
