translation:
  language: es
  text: 'Y al otro lado del Jordán, junto a Jericó, al oriente del Jordán, de la tribu de Rubén: Bezer, en el desierto, con sus pastizales, y Jahzah[a], con sus pastizales.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jahzah también se traduce como «Jahaz» en algunas versiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵעֵבֶר
  english_pob_choice: And beyond
  chosen_spanish: Y al otro lado de
  alternatives_spanish:
  - Y más allá de
  - Y desde al otro lado de
  lexicon: HALOT
  rationale: El hebreo introduce una localización geográfica de referencia; «al otro lado de» conserva la relación espacial de מעבר de forma natural en español sin perder la orientación del texto.
- source_word: לְיַרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: Como nombre geográfico conocido, en español basta «el Jordán»; agregar «río» es posible, pero no requerido por el hebreo ni por la claridad del pasaje.
- source_word: יְרֵחוֹ
  english_pob_choice: at Jericho
  chosen_spanish: junto a Jericó
  alternatives_spanish:
  - en Jericó
  - cerca de Jericó
  lexicon: HALOT
  rationale: La función es locativa y apposicional; «junto a Jericó» comunica la ubicación de manera idiomática y evita una traducción demasiado rígida.
- source_word: לְמִזְרַח הַיַּרְדֵּן
  english_pob_choice: east of the Jordan
  chosen_spanish: al oriente del Jordán
  alternatives_spanish:
  - al este del Jordán
  - del lado oriental del Jordán
  lexicon: HALOT
  rationale: מִזְרָח indica la dirección del oriente; «al oriente del Jordán» es claro, digno y conserva el registro bíblico sin arcaizar en exceso.
- source_word: מִמַּטֵּה רְאוּבֵן
  english_pob_choice: from the tribe of Reuben
  chosen_spanish: de la tribu de Rubén
  alternatives_spanish:
  - de la casa de Rubén
  lexicon: HALOT
  rationale: מַטֶּה en este contexto es la unidad tribal, por lo que «tribu» es la equivalencia precisa y estándar en español.
- source_word: בֶּצֶר
  english_pob_choice: Bezer
  chosen_spanish: Bezer
  alternatives_spanish:
  - Bezér
  lexicon: HALOT
  rationale: Nombre propio de lugar; se mantiene la transliteración habitual sin adaptar innecesariamente la forma.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - en la estepa
  lexicon: HALOT
  rationale: Aunque «wilderness» puede rendirse como «desierto» o «despoblado», aquí el contraste geográfico favorece «desierto», que es claro para el lector español.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: con sus pastizales
  alternatives_spanish:
  - con sus terrenos comunes
  - con sus tierras de pasto
  lexicon: HALOT
  rationale: מִגְרָשׁ en listas levíticas alude al terreno abierto asociado a la ciudad; «pastizales» comunica bien esa función espacial y pastoral en español.
- source_word: יַהְצָה
  english_pob_choice: Jahzah
  chosen_spanish: Jahzá
  alternatives_spanish:
  - Jahaza
  - Jahaz
  lexicon: HALOT
  rationale: Se conserva la forma del nombre con una acentuación española para facilitar la lectura. La variante inglesa documentada «Jahaz» queda como alternativa conocida.
translation_notes:
  revision_awareness: El texto base en inglés y la evaluación de revisión muestran alta concordancia y no requieren cambios sustantivos. La adaptación española sigue el mismo perfil de equivalencia óptima, conservando la secuencia geográfica y los nombres propios, con una decisión léxica explícita para מִגְרָשֶׁיהָ y la variante de transliteración de יַהְצָה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Jordán» se usa como nombre propio geográfico sin añadir «río» salvo necesidad contextual.
  - Se conserva la distinción entre nombres propios y términos comunes; no se introduce terminología eclesiástica ajena al hebreo.
  - «Pastizales» se eligió para reflejar el espacio abierto asociado a los poblados levíticos, en línea con la lectura de «pasturelands».
