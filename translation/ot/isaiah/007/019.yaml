id: ISA.7.19
reference: Isaiah 7:19
source:
  edition: WLC
  text: וּ/בָ֨אוּ וְ/נָח֤וּ כֻלָּ/ם֙ בְּ/נַחֲלֵ֣י הַ/בַּתּ֔וֹת וּ/בִ/נְקִיקֵ֖י הַ/סְּלָעִ֑ים וּ/בְ/כֹל֙ הַ/נַּ֣עֲצוּצִ֔ים וּ/בְ/כֹ֖ל הַ/נַּהֲלֹלִֽים׃
translation:
  text: And they will all come and settle in the steep ravines[a], in the clefts of the rocks, in all the thornbushes[c][b], and in all the watering places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rest' for 'settle'; the verb can denote coming to rest or alighting.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the steep ravines' reflects a difficult expression, traditionally rendered in various ways such as 'desolate valleys' or 'ravines of precipices.'
    reason: lexical_alternative
  - marker: c
    text: The final term is rare and uncertain; it may also mean 'watering places' or 'meadows.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאוּ
  chosen: And they will come
  alternatives:
  - And they shall come
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic sequence functions futurally in English context; 'come' is the plain sense of בוא.
- source_word: וְנָחוּ
  chosen: and settle
  alternatives:
  - and rest
  - and alight
  lexicon: HALOT
  rationale: From נוח, here of swarms/invaders coming to rest in locations. 'Settle' communicates taking up position better than the more passive 'rest,' while remaining natural English.
- source_word: כֻלָּם
  chosen: they will all
  alternatives:
  - all of them
  lexicon: HALOT
  rationale: 'Explicitly preserves the distributive totality of the Hebrew: the whole swarm/host previously described.'
- source_word: בְּנַחֲלֵי הַבַּתּוֹת
  chosen: in the steep ravines
  alternatives:
  - in the wadis of desolation
  - in the valleys of precipices
  - in the ravines of the daughters
  lexicon: HALOT
  rationale: נחלי are wadis/ravines. הבתות is a difficult term; context favors rugged, cut, precipitous terrain rather than a literal 'daughters.' 'Steep ravines' gives a clear geographic sense in idiomatic English.
- source_word: וּבִנְקִיקֵי הַסְּלָעִים
  chosen: in the clefts of the rocks
  alternatives:
  - in the fissures of the crags
  lexicon: HALOT
  rationale: נְקִיקִים are clefts/fissures; סלעים are rocks/crags. 'Clefts of the rocks' is natural and sufficiently concrete.
- source_word: וּבְכֹל הַנַּעֲצוּצִים
  chosen: in all the thornbushes
  alternatives:
  - among all the thorn thickets
  - in all the thorn trees
  lexicon: HALOT
  rationale: The noun denotes thorny growth; 'thornbushes' is accessible modern English and fits the image of swarms settling everywhere.
- source_word: וּבְכֹל הַנַּהֲלֹלִים
  chosen: in all the pastures
  alternatives:
  - in all the watering places
  - in all the meadows
  lexicon: HALOT
  rationale: This rare term is uncertain. In context it names another class of places where the invaders settle. 'Pastures' fits common scholarly understanding and balances the wild/cultivated spread of the image. Because the term is uncertain, alternatives are preserved in a footnote.
