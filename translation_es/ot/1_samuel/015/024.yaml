translation:
  language: es
  text: 'Entonces Saúl dijo a Samuel: «He pecado, pues he transgredido el mandamiento[a] de Yahvé y tus palabras, pues temí al pueblo y escuché su voz[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «la boca de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y les obedecí»; el hebreo literalmente dice: «y escuché su voz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָטָאתִי
  english_pob_choice: I have sinned
  chosen_spanish: He pecado
  alternatives_spanish:
  - Pecé
  - He cometido pecado
  lexicon: HALOT
  rationale: El hebreo es una confesión personal de falta ya cometida. En español, «He pecado» comunica de modo natural el valor de confesión completa y mantiene la responsabilidad moral de Saúl.
- source_word: עָבַרְתִּי
  english_pob_choice: I transgressed
  chosen_spanish: he transgredido
  alternatives_spanish:
  - he traspasado
  - he violado
  - he desobedecido
  lexicon: HALOT
  rationale: El verbo hebreo literalmente es «pasar más allá», pero en este contexto jurídico-moral expresa infracción de un mandato. «He transgredido» conserva esa fuerza formal sin reducirla solo a «desobedecí».
- source_word: פִּי יְהוָה
  english_pob_choice: the command of Yahweh
  chosen_spanish: el mandamiento de Yahvé
  alternatives_spanish:
  - la boca de Yahvé
  - la palabra de Yahvé
  - la orden de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «la boca de Yahvé», pero funciona como un giro idiomático para lo que Dios ha dicho o mandado. En español, «mandamiento» comunica bien la idea de una instrucción divina concreta sin perder el carácter de mandato.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como nombre propio, conforme a la convención del proyecto. «Yahvé» preserva el Tetragrámaton en vez de sustituirlo por un título.
- source_word: דְּבָרֶיךָ
  english_pob_choice: your words
  chosen_spanish: tus palabras
  alternatives_spanish:
  - tu palabra
  - lo que dijiste
  lexicon: HALOT
  rationale: El hebreo está en plural con sufijo de segunda persona masculina singular. «Tus palabras» respeta esa pluralidad y abarca las instrucciones dichas por Samuel.
- source_word: יָרֵאתִי
  english_pob_choice: I feared
  chosen_spanish: temí
  alternatives_spanish:
  - tuve miedo de
  - me asusté de
  lexicon: HALOT
  rationale: El verbo expresa temor real. «Temí» es breve, solemne y suficiente; conserva la carga moral de la explicación de Saúl.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - al ejército
  lexicon: HALOT
  rationale: El sustantivo es el genérico «el pueblo». En este contexto de liderazgo, «al pueblo» mantiene amplitud sin estrechar indebidamente el referente.
- source_word: וָאֶשְׁמַע בְּקוֹלָם
  english_pob_choice: and listened to their voice
  chosen_spanish: y escuché su voz
  alternatives_spanish:
  - y les obedecí
  - y atendí a su voz
  lexicon: HALOT
  rationale: La frase hebrea conserva el paralelismo entre oír la voz de Yahvé y oír la voz del pueblo. «Escuché su voz» preserva ese eco verbal; «obedecí» explicaría la implicación, pero perdería la imagen idiomática.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. La lectura «Yahvé» conserva el nombre propio divino en español y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Expresión idiomática פִּי יְהוָה
  english_pob_reading: the command of Yahweh
  chosen_spanish_reading: el mandamiento de Yahvé
  alternative_spanish_readings:
  - la boca de Yahvé
  - la palabra de Yahvé
  - la orden de Yahvé
  rationale: La literalidad «la boca de Yahvé» sería comprensible pero poco natural en español. «Mandamiento» expresa con claridad la instrucción divina específica que Saúl quebrantó, sin borrar la base idiomática del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado en inglés y la revisión más reciente: se mantuvo el registro formal con «porque» en ambas cláusulas, equivalente natural del inglés revisado con «for», y se conservó la estructura paralela entre el mandamiento de Yahvé, las palabras de Samuel y la voz del pueblo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al criterio del proyecto para el Tetragrámaton.
  - Se prefirió «mandamiento» para פִּי יְהוָה por adecuación idiomática en español.
  - Se mantuvo el paralelismo verbal con «escuché su voz» para reflejar la tensión entre la voz de Yahvé y la del pueblo.
  - «He pecado» y «he transgredido» conservan el tono confesional y jurídico-moral del hebreo.
