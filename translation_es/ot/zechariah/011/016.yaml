    reason: alternative_reading
  - marker: b
    text: O «los que desaparecen» / «los destruidos» para «los que perecen».
    reason: lexical_alternative
  - marker: c
    text: O «la que está de pie» para «la sana». El hebreo es literalmente «la que está en pie».
    reason: lexical_alternative
  revision_rationale: Se hicieron ajustes menores para mejorar la fidelidad imagética y la naturalidad del español sin cambiar la decisión exegética principal del audit trail inglés. «La quebrantada» y «la sana» reflejan mejor el contexto del rebaño y la forma hebrea; «las más gordas» reemplaza una expresión poco idiomática; y la puntuación se suavizó para mayor fluidez.
