translation:
  language: es
  text: Tus oídos atienden la súplica del pobre con esperanza; tus juicios se extienden sobre toda la tierra con misericordia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπακούει
  english_pob_choice: heed
  chosen_spanish: atienden
  alternatives_spanish:
  - escuchan
  - oyen
  - prestan atención a
  lexicon: BDAG
  rationale: El verbo griego expresa una escucha activa y respondiente, no solo percepción auditiva. «Atienden» conserva esa respuesta sin sonar forzado en español.
- source_word: δέησιν
  english_pob_choice: plea
  chosen_spanish: súplica
  alternatives_spanish:
  - plegaria
  - ruego
  - oración
  lexicon: BDAG
  rationale: El sustantivo denota una petición urgente. «Súplica» mantiene ese matiz intenso y funciona bien en registro bíblico actual.
- source_word: πτωχοῦ
  english_pob_choice: the poor
  chosen_spanish: del pobre
  alternatives_spanish:
  - de un pobre
  - del necesitado
  - de la persona pobre
  lexicon: BDAG
  rationale: Aunque el griego es masculino singular, el uso puede ser genérico. En español, «del pobre» preserva la singularidad sin forzar un masculino marcado o una colectivización abstracta.
- source_word: ἐν ἐλπίδι
  english_pob_choice: in hope
  chosen_spanish: en esperanza
  alternatives_spanish:
  - con esperanza
  - esperando
  - con confianza
  lexicon: BDAG
  rationale: La preposición y el sustantivo compactos del griego se reflejan de modo directo. «En esperanza» mantiene la forma breve y la orientación de confianza del texto.
- source_word: κρίματά
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - sentencias
  - decretos
  - actos de juicio
  lexicon: BDAG
  rationale: «Juicios» es la correspondencia más directa y natural en español para κρίματα, y conserva el doble valor de evaluación y gobierno divino.
- source_word: ἐπὶ πᾶσαν τὴν γῆν
  english_pob_choice: over all the earth
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - sobre toda la tierra
  - por toda la tierra
  - en toda la tierra
  lexicon: BDAG
  rationale: «Sobre» comunica alcance y soberanía de forma natural en español, manteniendo la relación espacial/metafórica del griego.
- source_word: μετὰ ἐλέους
  english_pob_choice: with mercy
  chosen_spanish: con misericordia
  alternatives_spanish:
  - con compasión
  - misericordiosamente
  lexicon: BDAG
  rationale: La frase modifica el carácter de los juicios. «Con misericordia» preserva el sustantivo y la tensión teológica entre juicio y misericordia.
theological_decisions:
- issue: Relación entre juicio y misericordia
  english_pob_reading: your judgments are over all the earth with mercy
  chosen_spanish_reading: tus juicios están sobre toda la tierra con misericordia
  alternative_spanish_readings:
  - tus juicios están sobre toda la tierra misericordiosamente
  - tus decretos recorren toda la tierra con misericordia
  rationale: 'Se conserva la tensión del griego: el acto judicial divino no se niega, sino que aparece caracterizado por misericordia. Evito suavizarlo a una paráfrasis que diluya el juicio.'
  doctrine_reference: Salmo 89:14; Salmo 103:8-10; Santiago 2:13
translation_notes:
  revision_awareness: El contexto inglés pasó por una revisión que corrigió 'listen to' por 'heed' para capturar la respuesta activa de ἐπακούει, y mantuvo 'the poor' como genérico singular. La versión española refleja esa misma decisión semántica con «atienden» y «del pobre», sin necesidad de nota al pie porque la forma española ya evita la ambigüedad del inglés.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - «Misericordia» se conserva como sustantivo para no convertir el cierre en adverbio ni perder la tensión juicio/misericordia.
  - No se añadió nota textual porque el verso puede traducirse de forma transparente sin marcar variantes no necesarias en español.
