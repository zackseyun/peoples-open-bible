translation:
  language: es
  text: Porque, pensando que estaban ocultos en sus pecados secretos, quedaron dispersos bajo el oscuro velo del olvido, terriblemente sobrecogidos y sacudidos por apariciones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fantasmas» o «espectros». El término griego puede denotar una imagen o una aparición de tipo fantasmal.
    reason: lexical_alternative
lexical_decisions:
- source_word: λανθάνειν
  english_pob_choice: to remain hidden
  chosen_spanish: permanecerían ocultos
  alternatives_spanish:
  - escaparían a la vista
  - estarían escondidos
  lexicon: LSJ
  rationale: 'La construcción con νομίζοντες expresa lo que ellos suponían de sí mismos: que no serían advertidos. «Permanecerían ocultos» conserva la idea de ocultamiento con una formulación natural en español.'
- source_word: κρυφαίοις ἁμαρτήμασιν
  english_pob_choice: their secret sins
  chosen_spanish: sus pecados secretos
  alternatives_spanish:
  - sus pecados ocultos
  - sus faltas secretas
  lexicon: LSJ
  rationale: κρυφαίοις indica lo oculto o secreto, y ἁμαρτήμασιν conserva fuerza moral de «pecados». «Pecados secretos» mantiene esa carga mejor que «faltas», que sería más débil.
- source_word: ἀφεγγεῖ
  english_pob_choice: dark
  chosen_spanish: oscuro
  alternatives_spanish:
  - sin luz
  - tenebroso
  - sombrío
  lexicon: LSJ
  rationale: El adjetivo describe ausencia de luz. «Oscuro» es idiomático en español y preserva la imagen de cobertura sombría sin sonar forzado.
- source_word: λήθης
  english_pob_choice: forgetfulness
  chosen_spanish: del olvido
  alternatives_spanish:
  - de la olvidanza
  - de la memoria perdida
  lexicon: LSJ
  rationale: 'Se conserva el genitivo como relación de pertenencia o cualidad: «el velo del olvido». «Olvido» es el equivalente más natural y fiel; «oblivión» sería más abstracto o literario de más.'
- source_word: παρακαλύμματι
  english_pob_choice: veil
  chosen_spanish: velo
  alternatives_spanish:
  - cobertura
  - capa
  - cobertor
  lexicon: LSJ
  rationale: El término denota un cubrimiento figurado. «Velo» preserva la metáfora y la construcción tradicional del pasaje sin introducir la idea concreta de una prenda.
- source_word: ἐσκορπίσθησαν
  english_pob_choice: they were scattered
  chosen_spanish: quedaron dispersos
  alternatives_spanish:
  - fueron dispersados
  - se esparcieron
  lexicon: LSJ
  rationale: El pasivo de σκορπίζω normalmente significa ser esparcido o dispersado. «Quedaron dispersos» comunica el resultado y suena natural en contexto narrativo.
- source_word: θαμβούμενοι δεινῶς
  english_pob_choice: terribly aghast
  chosen_spanish: terriblemente aterrados
  alternatives_spanish:
  - grandemente asombrados
  - profundamente atónitos
  - severamente sobrecogidos
  lexicon: LSJ
  rationale: θαμβέω puede significar quedar atónito o sobrecogido; aquí el contexto es de miedo y juicio. «Terriblemente aterrados» transmite mejor la intensidad y la carga de temor que «asombrados».
- source_word: ἰνδάλμασιν
  english_pob_choice: apparitions
  chosen_spanish: apariciones
  alternatives_spanish:
  - fantasmas
  - espectros
  - imágenes
  lexicon: LSJ
  rationale: ἴνδαλμα puede denotar imagen, fantasma o aparición. «Apariciones» mantiene la ambigüedad entre visión subjetiva y forma espectral objetiva, como en el inglés auditado.
- source_word: ἐκταρασσόμενοι
  english_pob_choice: shaken
  chosen_spanish: sacudidos
  alternatives_spanish:
  - conmovidos
  - perturbados
  - turbados
  lexicon: LSJ
  rationale: El participio expresa agitación profunda. «Sacudidos» conserva la fuerza física/metafórica del verbo y encaja bien con la serie de participios de terror.
theological_decisions:
- issue: Naturaleza de las ἰνδάλμασιν (apariciones)
  english_pob_reading: Render as 'apparitions' to preserve ambiguity between subjective visions and objective phantasmal appearances.
  chosen_spanish_reading: Traducir «apariciones» para preservar la ambigüedad entre visiones subjetivas y manifestaciones espectrales.
  alternative_spanish_readings:
  - fantasmas
  - espectros
  - imágenes
  rationale: El griego no obliga a precisar ontológicamente qué eran esas formas. «Apariciones» conserva la indeterminación del texto y evita resolver la tensión interpretativa.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La redacción sigue la revisión final que añadió el artículo en «el oscuro velo del olvido» para reflejar mejor la construcción griega. Se mantuvo la estructura general del borrador auditado y se ajustó el español para sonar natural sin perder las tensiones léxicas documentadas.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde al nombre divino; este versículo no contiene el Tetragrámaton ni κύριος con referencia directa.
  - Se mantuvo un registro bíblico contemporáneo y digno, evitando calcos innecesarios.
  - «Pecados secretos» conserva la fuerza moral de ἁμαρτήματα sin suavizarla a «faltas».
  - «Apariciones» conserva la ambigüedad semántica del término griego y no la resuelve teológicamente.
  - La puntuación sigue el flujo del griego con una principal causal inicial y una serie de participios descriptivos.
