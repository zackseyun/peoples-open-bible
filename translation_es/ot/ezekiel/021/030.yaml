review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del rastro POB: vocativo contra el príncipe de Israel, llegada de su día de juicio, y la frase difícil עֲוֺן קֵץ reflejada con nota. Sin embargo, la colocación de notas está invertida respecto al inglés auditado y el principal problema es léxico-estilístico: «muerto» para חָלָל suena demasiado llano y estático en español, mientras que el contexto judicial-profético favorece «herido de muerte» o «muerto» con mejor apoyo contextual. Además, la nota a «muerto» debe preservar la alternativa «profanado» pero con español más natural.'
  spanish_quality_summary: El español es claro y mayormente natural, con tono digno. «Impío, príncipe de Israel» funciona. No obstante, «muerto, impío» resulta algo brusco y menos preciso que «herido de muerte, impío» en este contexto profético; mejora la legibilidad y preserva mejor la fuerza de חָלָל sin cerrar tanto la imagen. También conviene alinear marcadores y notas con sus anclajes semánticos correctos.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Príncipe de Israel» y «impío» están bien. La decisión sobre עֲוֺן como «castigo» es aceptable y la nota conserva «iniquidad». La excepción necesaria es preferir «herido de muerte» sobre «muerto» para חָלָל por fidelidad contextual y mejor español.
  issues:
  - severity: medium
    issue: «Muerto» para חָלָל es menos adecuado que «herido de muerte» en este contexto
    rationale: Aunque «muerto» no es imposible, el inglés POB eligió 'slain' con nota alternativa 'mortally wounded'. En español, «muerto» suena más plano y menos marcado que el hebreo judicial-vocativo; «herido de muerte» conserva mejor la idea de herida mortal/sentencia y suena más natural junto con la nota alternativa «profanado».
  - severity: medium
    issue: Los marcadores de notas están asignados al revés respecto al contenido semántico
