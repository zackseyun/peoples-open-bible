lexical_decisions:
- source_word: קִרְיָתַיִם
  english_pob_choice: Kiriathaim
  chosen_spanish: Quiriataim
  alternatives_spanish:
  - Kiriataim
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español conviene transliterarlo de forma estable. «Quiriataim» refleja la pronunciación habitual en español bíblico y mantiene la identificación geográfica sin traducir el topónimo.
- source_word: שִׂבְמָה
  english_pob_choice: Sibmah
  chosen_spanish: Sibmá
  alternatives_spanish:
  - Sibma
  lexicon: HALOT
  rationale: También es un topónimo; se conserva como nombre propio. La acentuación española «Sibmá» ayuda a la lectura natural sin cambiar el referente.
- source_word: צֶרֶת הַשַּׁחַר
  english_pob_choice: Zereth-shahar
  chosen_spanish: Ceres-hajar
  alternatives_spanish:
  - Ceret-hájar
  - Zéret-hajar
  - Ceres del alba
  lexicon: HALOT
  rationale: El hebreo puede leerse como un nombre compuesto de lugar; por eso se preserva como topónimo y no se vierte semánticamente en el cuerpo principal. «Hajar» refleja el artículo hebreo integrado en la forma del nombre, y «Ceres» sigue la transliteración del primer elemento.
- source_word: בְּהַר הָעֵמֶק
  english_pob_choice: on the hill of the valley
  chosen_spanish: en el monte del valle
  alternatives_spanish:
  - sobre el monte del valle
  - en la colina del valle
  - en el monte en el valle
  lexicon: HALOT
  rationale: La preposición locativa ב se expresa naturalmente con «en». הַר se rinde como «monte» para conservar mejor la imagen topográfica del hebreo en español, y הָעֵמֶק se traduce «del valle» para mantener la relación constructa sin sobreinterpretarla.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones y conserva la decisión de tratar קִרְיָתַיִם y שִׂבְמָה como topónimos, así como de mantener צֶרֶת הַשַּׁחַר como nombre compuesto con una nota alternativa semántica. La versión española sigue esa misma lectura, adaptando la transliteración a la ortografía y acentuación del español.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de la lista con repetición de «y».
  - Se preservó el carácter de lista toponímica sin añadir verbos ni explicaciones ajenas al hebreo.
  - Se evitó traducir «Ceres-hajar» como frase semántica en el cuerpo principal para respetar la decisión auditada de tratarlo como topónimo.
