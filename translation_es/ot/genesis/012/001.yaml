review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: Yahvé habla a Abram y le ordena salir de su tierra, su círculo de origen y la casa de su padre hacia la tierra que le mostrará. También preserva correctamente el nombre divino como ''Yahvé'' y mantiene la nota sobre לֶךְ־לְךָ. Sin embargo, la formulación española principal tiene un problema de naturalidad/sintaxis en ''Ve de tu tierra'', donde el verbo ''ir'' normalmente pide ''vete de'' o una reestructuración más fluida.'
  spanish_quality_summary: El español es claro y digno, pero 'Ve de tu tierra' suena forzado en español general. Además, en una cita continua, la coma antes de 'a la tierra' no es necesaria y entorpece levemente el ritmo. 'Parentela' y 'la casa de tu padre' son aceptables y fieles.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → ''Yahvé''; אֶרֶץ → ''tierra''; מוֹלֶדֶת → ''parentela''; בֵּית אָבִיךָ → ''la casa de tu padre''. La única excepción práctica es que לֶךְ לְךָ quedó como ''Ve'', pero al combinarse con ''de tu tierra'' produce una construcción menos idiomática en español que ''Sal de'' o ''Vete de''.'
  issues:
  - severity: medium
    issue: 'Construcción poco natural: ''Ve de tu tierra'''
    rationale: Aunque intenta seguir la decisión inglesa 'Go from', en español neutral 've de' no es idiomático aquí. 'Sal de tu tierra' expresa con claridad el mandato de partida sin sobreinterpretar el hebreo.
  - severity: low
    issue: Coma innecesaria antes de 'a la tierra'
    rationale: 'La serie de complementos fluye mejor sin esa coma en español: ''... y de la casa de tu padre a la tierra...''.'
  revised_spanish_text: 'Entonces Yahvé dijo a Abram[a]: «Sal de tu tierra, de tu parentela y de la casa de tu padre a la tierra que te mostraré».'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «Ve para ti» o «Ve tú mismo»; un mandato idiomático de partida.'
    reason: lexical_alternative
  revision_rationale: Se cambió 'Ve de tu tierra' por 'Sal de tu tierra' para lograr un español natural y fiel al mandato de partida de לֶךְ־לְךָ. Se mantuvo la nota que preserva la alternativa más literal. También se eliminó la coma antes de 'a la tierra' para mejorar la fluidez.
