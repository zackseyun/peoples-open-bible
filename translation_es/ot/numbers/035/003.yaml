translation:
  language: es
  text: Las ciudades serán para que vivan en ellas, y sus terrenos abiertos[a] serán para su ganado, para sus posesiones y para todos sus animales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus pastizales», «su terreno común» o «su tierra abierta». El término hebreo se refiere al espacio abierto alrededor de las ciudades, aquí especialmente apto para el pastoreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - las poblaciones
  - las villas
  lexicon: HALOT
  rationale: עִיר designa aquí asentamientos urbanos dentro de un reparto legal; «ciudades» conserva el término estándar y el tono administrativo del contexto.
- source_word: לָשָׁבֶת
  english_pob_choice: to live in
  chosen_spanish: para que habiten en ellas
  alternatives_spanish:
  - para vivir en ellas
  - para morar en ellas
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad; en español, «para que habiten en ellas» comunica con naturalidad la función de residencia sin perder el sentido de morar/inhabitar.
- source_word: מִגְרְשֵׁיהֶם
  english_pob_choice: their pasturelands
  chosen_spanish: sus ejidos
  alternatives_spanish:
  - sus terrenos comunes
  - sus tierras abiertas
  - sus pastizales
  lexicon: HALOT
  rationale: מִגְרָשׁ se refiere al terreno abierto alrededor de la ciudad, no solo a pasto. «Ejidos» conserva esa amplitud de uso comunal y abierto; aunque es un término regional, aquí transmite bien la zona adyacente de la ciudad.
- source_word: לִבְהֶמְתָּם
  english_pob_choice: for their livestock
  chosen_spanish: para su ganado
  alternatives_spanish:
  - para sus animales de cría
  - para su bestiame
  lexicon: HALOT
  rationale: בְּהֵמָה puede abarcar animales domésticos; en este contexto de uso del terreno, «ganado» es la forma española más natural y colectiva.
- source_word: לִרְכֻשָׁם
  english_pob_choice: for their possessions
  chosen_spanish: para sus posesiones
  alternatives_spanish:
  - para sus bienes
  - para su propiedad
  lexicon: HALOT
  rationale: רְכוּשׁ denota bienes/posesiones; «posesiones» sigue de cerca la elección auditada del inglés y mantiene el registro jurídico sin sonar excesivamente técnico.
- source_word: וּלְכֹל חַיָּתָם
  english_pob_choice: and for all their animals
  chosen_spanish: y para todos sus animales
  alternatives_spanish:
  - y para todas sus bestias
  - y para todo ser viviente suyo
  lexicon: HALOT
  rationale: חַיָּה aquí amplía el alcance más allá del ganado; «animales» evita una traducción demasiado arcaica como «bestias» y es suficientemente amplia para el sentido del hebreo.
translation_notes:
  revision_awareness: La versión inglesa auditada revisó «property» a «possessions» para רְכֻשָׁם; la redacción española adopta «posesiones» para reflejar esa precisión revisada y mantener el contraste con ganado/animales. También se preservó la amplitud semántica de מִגְרָשׁ mediante «ejidos», con nota alternativa por su posible lectura como terreno común o abierto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no porque aparezca en este versículo, sino por norma del proyecto cuando el Tetragrama esté presente en el contexto inmediato de la obra.
  - Se evitó «SEÑOR» y «Cristo» por no corresponder al contenido de este versículo.
  - «Ganado» se usa aquí por naturalidad española, sin reducir indebidamente el campo semántico general de בְּהֵמָה, que la nota deja abierto a animales domésticos.
