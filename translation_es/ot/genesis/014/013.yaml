  source_alignment_summary: 'El borrador español sigue bien el sentido básico del hebreo: llega un escapado, informa a Abram, se identifica a Abram como «el hebreo», se describe su residencia junto a los árboles de Mamre el amorreo, y se cierra con la idea de alianza con Abram. Sin embargo, hay un desajuste importante en las notas: la nota [a] está anclada a «hebreo» pero el contenido de la nota corresponde a una alternativa para אֵלֹנֵי («robles/encinas/terebintos»), no para הָעִבְרִי. Además, el inglés auditado preserva una nota sobre el alcance semántico de «hermano» que el español omitió; conviene mantenerla también en español por fidelidad al rastro de auditoría.'
