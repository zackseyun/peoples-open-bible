  - severity: low
    issue: «de un mes de edad y arriba» es un giro poco natural
    rationale: El hebreo indica el umbral de edad «de un mes ... y arriba». En español moderno y digno, «de un mes de edad en adelante» preserva el sentido con mayor fluidez.
