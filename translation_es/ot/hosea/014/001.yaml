translation:
  language: es
  text: Samaria cargará con su culpa[a], porque se ha rebelado contra su Dios. Caerán a espada; sus niños pequeños serán estrellados[b], y sus mujeres encinta serán desgarradas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Samaria será tenida por culpable» o «Samaria sufrirá por su culpa».
    reason: alternative_reading
  - marker: b
    text: O «sus infantes serán estrellados».
    reason: alternative_reading
lexical_decisions:
- source_word: תֶּאְשַׁם
  english_pob_choice: shall bear her guilt
  chosen_spanish: cargará con su culpa
  alternatives_spanish:
  - será hallada culpable
  - sufrirá por su culpa
  - será tenida por culpable
  lexicon: HALOT
  rationale: אשם puede expresar incurrir en culpa o cargar con la responsabilidad y sus consecuencias. «Cargará con su culpa» conserva tanto la culpabilidad como el resultado judicial, sin reducirlo a un simple estado abstracto de culpa.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Somerón
  - Shomrón
  lexicon: HALOT
  rationale: El nombre propio se traduce con la forma histórica y transparente «Samaria», ya establecida en español bíblico y claramente reconocible.
- source_word: מָרְתָה
  english_pob_choice: has rebelled
  chosen_spanish: se ha rebelado
  alternatives_spanish:
  - ha sido rebelde
  - ha desafiado
  - se ha sublevado
  lexicon: HALOT
  rationale: מרה expresa rebelión o desafío contra autoridad; «se ha rebelado» es directo y mantiene el matiz de ruptura contra Dios.
- source_word: בֵּאלֹהֶיהָ
  english_pob_choice: against her God
  chosen_spanish: contra su Dios
  alternatives_spanish:
  - contra Dios
  - contra sus dioses
  lexicon: HALOT
  rationale: La preposición con מרה señala el objeto contra el cual se rebela. El singular con sufijo femenino se refleja con «su Dios», preservando la acusación de pacto contra la deidad propia de Samaria/Israel.
- source_word: בַּחֶרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - con la espada
  lexicon: HALOT
  rationale: La locución española más natural en contexto bélico es «a espada», que conserva el valor instrumental y la idea de muerte violenta.
- source_word: יִפֹּלוּ
  english_pob_choice: shall fall
  chosen_spanish: Caerán
  alternatives_spanish:
  - serán derribados
  - morirán
  lexicon: HALOT
  rationale: El verbo hebreo es simple y en contexto militar implica muerte. «Caerán» sigue de cerca la imagen sin explicitar más de lo que el texto dice.
- source_word: עֹלְלֵיהֶם
  english_pob_choice: their little children
  chosen_spanish: sus niños pequeños
  alternatives_spanish:
  - sus infantes
  - sus pequeños niños
  - sus hijos pequeños
  lexicon: HALOT
  rationale: עולל designa niños muy pequeños. «Niños pequeños» comunica la edad con naturalidad en español y evita restringir excesivamente a recién nacidos.
- source_word: יְרֻטָּשׁוּ
  english_pob_choice: shall be dashed to pieces
  chosen_spanish: serán estrellados
  alternatives_spanish:
  - serán despedazados
  - serán hechos pedazos
  - serán estrellados contra el suelo
  lexicon: HALOT
  rationale: El pasivo violento debe mantenerse explícito. «Estrellados» transmite el golpe brutal del verbo con fuerza idiomática en español, sin atenuar la crudeza del juicio.
- source_word: וְהָרִיּוֹתָיו
  english_pob_choice: their pregnant women
  chosen_spanish: sus mujeres encinta
  alternatives_spanish:
  - sus mujeres embarazadas
  - sus preñadas
  lexicon: HALOT
  rationale: La forma verbal/sufijada en el contexto se entiende colectivamente. «Mujeres encinta» es bíblico pero claro; evita la ambigüedad de un giro demasiado moderno y conserva el referente femenino adulto.
- source_word: יְבֻקָּעוּ
  english_pob_choice: ripped open
  chosen_spanish: serán abiertas
  alternatives_spanish:
  - serán rasgadas
  - serán rajadas
  - serán abiertas en canal
  lexicon: HALOT
  rationale: בקע aquí describe una violencia extrema contra mujeres embarazadas. «Serán abiertas» mantiene el sentido básico de apertura violenta; es suficientemente sobrio y fiel sin añadir un matiz idiomático que el hebreo no exige.
theological_decisions:
- issue: Personificación de Samaria y transición al plural
  english_pob_reading: Render Samaria as a personified feminine city with 'her' in the first sentence, then shift to plural victims in the judgment details.
  chosen_spanish_reading: Conservar a Samaria como sujeto personificado en singular al inicio («cargará con su culpa»), y luego pasar al plural para describir a los habitantes y víctimas («Caerán... sus niños... sus mujeres»).
  alternative_spanish_readings:
  - Mantener todo en singular con referencias continuas a Samaria
  - Eliminar la personificación y reescribir todo en plural
  rationale: El hebreo personifica a Samaria como entidad femenina culpable, pero las acciones siguientes afectan a su población. La alternancia singular/plural evita borrar ese recurso literario y mantiene claros los referentes.
  doctrine_reference: Translation philosophy §§3, 4, 6
- issue: Violencia gráfica del oráculo de juicio
  english_pob_reading: Retain the explicit violence in the main text without euphemism.
  chosen_spanish_reading: Conservar la violencia explícita en el texto principal, sin suavizarla.
  alternative_spanish_readings:
  - Atenuar la imagen para hacerla más aceptable
  - Reformular en términos generales de destrucción
  rationale: El hebreo es deliberadamente brutal; la equivalencia óptima requiere mantener el peso retórico y moral del anuncio de juicio, no diluirlo con eufemismos.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La versión se alinea con el último pase de revisión, que indicó que no eran necesarios cambios; por ello se conservan las decisiones léxicas principales del audit trail en español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general para el tetragrámaton, aunque este versículo no lo contiene.
  - Se usa «Dios» para אֱלֹהִים, siguiendo el estándar del proyecto y el contexto de alianza.
  - Se preserva la fuerza violenta de los verbos finales sin introducir eufemismos ni ampliar el referente más allá del hebreo.
  - «Samaria» se conserva como nombre propio reconocible en español bíblico, con personificación femenina reflejada por el posesivo singular inicial.
