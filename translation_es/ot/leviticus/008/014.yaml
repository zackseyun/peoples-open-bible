  to: Entonces presentó el toro del sacrificio por el pecado[a], y Aarón y sus hijos pusieron las manos sobre la cabeza del toro del sacrificio por el pecado.
  rationale: Se revisa únicamente וַיַּגֵּשׁ para evitar una construcción española rígida. «Presentó» expresa con naturalidad el acto ritual de acercar la víctima ante Yahvé y está respaldado por las alternativas ya documentadas en la auditoría inglesa. No se requieren cambios teológicos ni terminológicos adicionales.
