review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva bien varios elementos clave del hebreo y del rastro POB: «Yahvé», «mi alma», «Seol» y «me mantuviste con vida». Sin embargo, en la cláusula final adopta en el texto principal la lectura alternativa «para que no descendiera al pozo», mientras que el inglés auditado eligió como texto base la lectura separativa «from among those going down to the pit» y relegó la otra a nota. Eso altera la alineación con la decisión sintáctica documentada y reduce la transparencia frente a מִיּוֹרְדֵי בוֹר.'
  spanish_quality_summary: 'El español es claro y digno, pero «tú hiciste subir mi alma desde Seol» suena algo calcado. Una formulación como «sacaste mi alma del Seol» o «hiciste subir mi alma del Seol» es más natural. Además, las notas están desancladas: la nota [a] explica «Seol» pero está colocada en «Yahvé», y la [c] debería anclarse en la frase final donde se discute la lectura alternativa. También conviene evitar el marcador de exclamación inicial si no se va a cerrar tras el vocativo completo.'
  glossary_alignment: Buena alineación con la terminología del proyecto en «Yahvé», «Seol», «alma» y la preservación de la imaginería de muerte sin resolverla doctrinalmente. No obstante, la decisión principal sobre מִיּוֹרְדֵי בוֹר debe volver a «de entre los que descienden al pozo/fosa» para seguir el POB auditado; la lectura «para que no descendiera» puede conservarse en nota como alternativa.
  issues:
  - severity: high
    issue: La cláusula final del texto principal usa la lectura alternativa en vez de la lectura base auditada.
    rationale: El hebreo מִיּוֹרְדֵי בוֹר fue traducido en el POB inglés como «from among those going down to the pit». El borrador español pone «para que no descendiera al pozo», que corresponde a la construal alternativa documentada en nota, no a la principal.
  - severity: medium
    issue: Los marcadores de notas no están anclados al lugar correcto del texto.
    rationale: La nota [a] define «Seol» pero está puesta en «Yahvé». La [c] explica la lectura alternativa de la cláusula final pero está anclada a «me mantuviste con vida». Esto incumple la disciplina de notas y puede confundir al lector.
  - severity: low
    issue: «Hiciste subir mi alma desde Seol» es algo rígido en español.
    rationale: Aunque es defendible por transparencia formal, «sacaste mi alma del Seol» suena más natural y sigue preservando la imagen de ascenso/rescate desde abajo.
  revised_spanish_text: Yahvé, sacaste mi alma del Seol[a][b]; me mantuviste con vida de entre los que descienden al pozo[c].
