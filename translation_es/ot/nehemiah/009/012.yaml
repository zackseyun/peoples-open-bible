translation:
  language: es
  text: Con una columna de nube los guiaste de día, y con una columna de fuego de noche para alumbrarles[a] el camino por el que habían de ir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para darles luz respecto al camino»; el hebreo dice literalmente «para darles luz [respecto] al camino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/עַמּוּד עָנָן
  english_pob_choice: By a pillar of cloud
  chosen_spanish: Con una columna de nube
  alternatives_spanish:
  - En una columna de nube
  - Mediante una columna de nube
  lexicon: HALOT
  rationale: La preposición hebrea con עַמּוּד expresa medio/instrumento o acompañamiento; en español, «con» comunica bien la idea de guía por medio de esa columna sin forzar una localización demasiado literal.
- source_word: הִנְחִיתָם
  english_pob_choice: you led them
  chosen_spanish: los guiaste
  alternatives_spanish:
  - los condujiste
  - los dirigiste
  lexicon: HALOT
  rationale: El verbo en hifil de נחה aquí expresa conducir/guíar en el contexto del desierto. «Guiaste» es natural en español y conserva la fuerza directiva del hebreo.
- source_word: יוֹמָם
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - durante el día
  - en el día
  lexicon: HALOT
  rationale: Es una expresión adverbial temporal. «De día» mantiene la simetría con «de noche» y suena natural en español.
- source_word: וּ/בְ/עַמּוּד אֵשׁ
  english_pob_choice: and by a pillar of fire
  chosen_spanish: y con una columna de fuego
  alternatives_spanish:
  - y en una columna de fuego
  - y mediante una columna de fuego
  lexicon: HALOT
  rationale: Se conserva el paralelismo con «columna de nube». «Columna de fuego» refleja directamente el sustantivo hebreo y la preposición se vierte de forma equivalente con «con».
- source_word: לַיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - durante la noche
  - en la noche
  lexicon: HALOT
  rationale: Corresponde al complemento temporal paralelo a «de día». «De noche» es la pareja natural en español y mantiene el ritmo del versículo.
- source_word: לְהָאִיר לָהֶם
  english_pob_choice: to give them light
  chosen_spanish: para alumbrarles
  alternatives_spanish:
  - para darles luz
  - para iluminarles
  lexicon: HALOT
  rationale: 'El infinitivo causativo de אור expresa finalidad: hacer que reciban luz. «Alumbrarles» es idiomático y conserva el sentido benefactivo de לָהֶם sin volver la frase pesada.'
- source_word: אֶת הַדֶּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - la ruta
  lexicon: HALOT
  rationale: 'Aunque el hebreo marca el objeto directo «el camino», en español resulta más natural integrar esa idea como objeto de la iluminación: «el camino». Se evita la estructura inglesa «sobre el camino» porque no es necesaria para la fidelidad semántica.'
- source_word: אֲשֶׁר יֵלְכוּ בָהּ
  english_pob_choice: in which they should go
  chosen_spanish: por el que habían de ir
  alternatives_spanish:
  - en el que debían ir
  - por donde debían ir
  lexicon: HALOT
  rationale: La relativa especifica el trayecto que debían seguir. «Habían de ir» comunica obligación/itinerario previsto sin añadir modalización ajena al texto; «por el que» refleja mejor el movimiento por una ruta que «en el que».
theological_decisions:
- issue: Guía histórica de Israel mediante nube y fuego
  english_pob_reading: Render the verse straightforwardly as God's historical guidance of Israel by cloud and fire, without importing additional typological interpretation into the main text.
  chosen_spanish_reading: Presentar el versículo como la guía histórica de Dios a Israel mediante nube y fuego, sin añadir tipología explícita en el cuerpo del texto.
  alternative_spanish_readings:
  - Resaltar la presencia divina más que la guía
  - Introducir lectura tipológica en la redacción
  rationale: El hebreo enfatiza acción concreta de conducción e iluminación en el desierto. La redacción española mantiene ese sentido histórico y deja las inferencias teológicas mayores para notas o lectura del conjunto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido del hebreo y conserva el paralelismo de nube/fuego, día/noche e iluminación/camino. Se integra la observación auditada del inglés POB sobre la finalidad de לְהָאִיר לָהֶם, pero se adapta a una sintaxis española natural. También se evita la coma innecesaria después de «noche», en línea con la revisión auditada.
  spanish_consistency_notes:
  - Se usa «Yahvé» no porque aparezca explícitamente en este verso, sino porque el versículo presupone la acción divina en la narrativa de Éxodo/Nehemías; no hace falta introducir el nombre aquí.
  - Se conserva «columna de nube / columna de fuego» como forma estable y transparente.
  - Se elige «alumbrar» como equivalente de «to give them light» por su naturalidad y porque mantiene el matiz causativo/benefactivo.
  - «Habían de ir» preserva la obligación o destino de la marcha sin hacerla meramente potencial.
