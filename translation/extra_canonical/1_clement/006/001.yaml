translation:
  text: To these men, who had conducted themselves in holiness, there was gathered a great multitude of the elect, who, having suffered many outrages and tortures because of jealousy, became a most beautiful example among us.
  philosophy: optimal-equivalence
status: revised
lexical_decisions:
- source_word: ὁσίως πολιτευσαμενοις
  chosen: who had conducted themselves in holiness
  alternatives:
  - who had lived devoutly
  - who had behaved in a holy way
  lexicon: LSJ
  rationale: πολιτεύομαι carries the sense of conducting one's life or living as a citizen; 'conducted themselves' preserves the ethical-public nuance better than a flat 'lived.' ὁσίως is rendered 'in holiness' to retain the sacred moral register.
- source_word: ἐκλεκτῶν
  chosen: the elect
  alternatives:
  - chosen ones
  lexicon: LSJ
  rationale: The term has strong communal and theological force in early Christian usage. 'The elect' preserves that ecclesial resonance better than the more generic 'chosen ones.'
- source_word: αἰκίαις
  chosen: outrages
  alternatives:
  - abuses
  - ill-treatment
  lexicon: LSJ
  rationale: The word denotes shameful mistreatment or violence. 'Outrages' preserves both the severity and rhetorical force of Clement's paraenesis.
- source_word: βασάνοις
  chosen: tortures
  alternatives:
  - torments
  lexicon: LSJ
  rationale: The term commonly denotes severe torment, often judicial or coercive. 'Tortures' best conveys the intensity of suffering in context.
- source_word: ὑπόδειγμα κάλλιστον
  chosen: a most beautiful example
  alternatives:
  - a finest example
  - a noble pattern
  lexicon: LSJ
  rationale: ὑπόδειγμα is 'example' or 'pattern'; κάλλιστον is literally 'most beautiful' or 'fairest.' Retaining 'beautiful' preserves the rhetorical texture rather than reducing it to a merely utilitarian moral example.
- source_word: Δαναΐδες καὶ Δίρκαι
  chosen: Danaids and Dirces
  alternatives:
  - Danaids and Dirce-like women
  lexicon: LSJ
  rationale: These are mythological allusions used as labels for forms of persecution or spectacle. Transliteration preserves the historical-literary texture; explanation belongs in a footnote rather than the main text.
- source_word: αἰκίσματα δεινὰ καὶ ἀνόσια παθοῦσαι
  chosen: after suffering terrible and unholy abuses
  alternatives:
  - after suffering dreadful and impious outrages
  - after enduring terrible and profane mistreatment
  lexicon: LSJ
  rationale: αἰκίσματα denotes acts of abuse or maltreatment; δεινά intensifies them; ἀνόσια adds the sense of impious or unholy violation. 'Unholy abuses' keeps both the moral and religious force.
- source_word: τὸν τῆς πίστεως βέβαιον δρόμον
  chosen: the sure course of faith
  alternatives:
  - the firm race of faith
  - the secure path of faith
  lexicon: LSJ
  rationale: δρόμος can mean race-course or course/path. 'Course' preserves the metaphor without over-specifying an athletic image in English, while βέβαιον is captured by 'sure.'
- source_word: γέρας γενναῖον
  chosen: a noble reward
  alternatives:
  - a glorious prize
  - a brave reward
  lexicon: LSJ
  rationale: γέρας denotes an honor, prize, or reward; γενναῖον carries nobility rather than mere courage here. 'Noble reward' fits the commendatory tone.
- source_word: ἀσθενεῖς τῷ σώματι
  chosen: though weak in body
  alternatives:
  - being weak in body
  lexicon: LSJ
  rationale: The phrase marks bodily weakness in contrast with steadfast faith. 'Though weak in body' brings out the concessive force implied by the context.
- source_word: ἀπηλλοτρίωσεν
  chosen: estranged
  alternatives:
  - alienated
  - separated
  lexicon: LSJ
  rationale: The verb means to make foreign or alienate. 'Estranged' is idiomatic in relation to wives and husbands and preserves the relational damage caused by jealousy.
- source_word: ἠλλοίωσεν
  chosen: altered
  alternatives:
  - changed
  - distorted
  lexicon: LSJ
  rationale: The verb means to change or alter. 'Altered' is restrained and close to the Greek, leaving the rhetorical force to the context.
- source_word: ἔρις
  chosen: strife
  alternatives:
  - contention
  lexicon: LSJ
  rationale: A standard rendering that preserves the moral and communal sense of divisive conflict.
- source_word: ἐξερίζωσεν
  chosen: uprooted
  alternatives:
  - torn out by the roots
  - destroyed
  lexicon: LSJ
  rationale: The agricultural metaphor is vivid and should be preserved; 'uprooted' is both accurate and rhetorically strong.
theological_decisions:
- issue: Meaning of γυναῖκες Δαναΐδες καὶ Δίρκαι
  chosen_reading: The phrase is retained as a mythological allusion in transliteration rather than converted into an explanatory paraphrase.
  alternative_readings:
  - women dressed as Danaids and Dirces
  - women treated like Danaids and Dirce
  rationale: The Greek is compressed and allusive. A paraphrase would import interpretive detail not explicit in the text. Transliteration preserves ambiguity and literary texture, with explanation deferred to a footnote.
  doctrine_reference: Original-language primacy over translation tradition; preserve ambiguity where genuine.
- issue: Force of ἀνόσια in verse 2
  chosen_reading: Rendered 'unholy' rather than merely 'shameful' or omitted.
  alternative_readings:
  - impious
  - profane
  rationale: Clement's moral exhortation is not only about cruelty but about acts violating what is holy. The translation preserves that theological register.
  doctrine_reference: Preserve theological weight; do not flatten ecclesial texture.
