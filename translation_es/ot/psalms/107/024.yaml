translation:
  language: es
  text: Ellos vieron las obras de Yahvé[a], y sus maravillas en lo profundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en las profundidades'. El hebreo se refiere a las aguas profundas, en consonancia con el contexto marítimo del salmo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  english_pob_choice: They
  chosen_spanish: Ellos
  alternatives_spanish:
  - Estos
  - Aquellos
  lexicon: HALOT
  rationale: El pronombre independiente de tercera persona plural conserva el sujeto explícito. En español, 'Ellos' reproduce la referencia sin agregar énfasis artificial ni sonar forzado en el verso poético.
- source_word: רָאוּ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - han visto
  - miraron
  - observaron
  lexicon: HALOT
  rationale: El perfecto qal narra una experiencia ya ocurrida; en español, el pretérito simple 'vieron' comunica de manera natural el hecho narrado, como en la audición poética del salmo.
- source_word: מַעֲשֵׂי
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - actos
  lexicon: HALOT
  rationale: '''Obras'' es el equivalente más natural para las acciones poderosas de Dios y preserva bien el paralelismo con ''maravillas''. ''Hechos'' o ''actos'' son posibles, pero menos fluidos en esta línea poética.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del hebreo con la forma española 'Yahvé', siguiendo el criterio del proyecto de no sustituirlo por un título. 'Jehová' y 'el SEÑOR' no se adoptan aquí por no reflejar de forma directa el Tetragrámaton.
- source_word: וְנִפְלְאוֹתָיו
  english_pob_choice: and his wonders
  chosen_spanish: y sus maravillas
  alternatives_spanish:
  - y sus obras maravillosas
  - y sus actos portentosos
  lexicon: HALOT
  rationale: El sustantivo plural de פלא con sufijo posesivo se vierte naturalmente como 'maravillas'. 'Sus' mantiene explícito el sufijo de tercera persona masculina singular.
- source_word: בִּמְצוּלָה
  english_pob_choice: in the deep
  chosen_spanish: en lo profundo
  alternatives_spanish:
  - en las profundidades
  - en el abismo marino
  lexicon: HALOT
  rationale: El término alude a las aguas profundas; 'en lo profundo' suena natural en español y preserva la imagen marítima sin exagerar hacia 'abismo'. Las alternativas 'profundidades' o 'abismo marino' son posibles, pero menos sobrias.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El verso usa directamente el Tetragrámaton. La forma 'Yahvé' preserva el nombre personal de Dios con una convención española reconocible y coherente con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión auditada: no se registran cambios posteriores que requieran ajuste. La versión inglesa aprobada mantiene ''Yahweh'' y ''in the deep''; la presente redacción española conserva esas decisiones con equivalentes naturales.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético entre 'obras' y 'maravillas'.
  - '''Yahvé'' se usa como nombre propio, no como título sustituido.'
  - '''En lo profundo'' conserva la ambigüedad controlada entre profundidad marina y las profundidades del mar, sin ampliar el sentido más allá del hebreo.'
