translation:
  language: es
  text: Un corazón alegre[a] alegra el rostro, pero por la tristeza del corazón el espíritu es quebrantado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ilumina el rostro». El hebreo dice literalmente «hace bien al rostro», un modismo para mejorar la expresión externa.
    reason: lexical_alternative
  - marker: b
    text: O «un espíritu quebrantado».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - ser interior
  lexicon: HALOT
  rationale: En Proverbios, לֵב designa el centro interior de la persona, incluyendo emociones y disposición. «Corazón» es el equivalente natural y transparente en español, y conserva el paralelismo con «espíritu».
- source_word: שָׂמֵחַ
  english_pob_choice: joyful
  chosen_spanish: alegre
  alternatives_spanish:
  - gozoso
  - contento
  - lleno de gozo
  lexicon: HALOT
  rationale: El adjetivo expresa un estado de alegría. «Alegre» es claro, idiomático y adecuado para un proverbio sapiencial sin volverlo informal.
- source_word: יֵיטִב פָּנִים
  english_pob_choice: makes the face cheerful
  chosen_spanish: alegra el rostro
  alternatives_spanish:
  - mejora el rostro
  - ilumina el rostro
  - vuelve alegre el rostro
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hace bien al rostro», una expresión idiomática para el efecto visible de la alegría interior. «Alegra el rostro» conserva la causa y el resultado visible en un español natural.
- source_word: פָּנִים
  english_pob_choice: face
  chosen_spanish: rostro
  alternatives_spanish:
  - cara
  - faz
  lexicon: HALOT
  rationale: «Rostro» es una forma digna y natural en español bíblico para el hebreo פָּנִים, y evita la dureza de «cara» en este contexto poético.
- source_word: וּבְעַצְּבַת
  english_pob_choice: but by the sorrow of
  chosen_spanish: pero con la tristeza de
  alternatives_spanish:
  - pero por la tristeza de
  - y con la tristeza de
  - pero a causa de la tristeza de
  lexicon: HALOT
  rationale: La preposición ב puede tener sentido causal o instrumental aquí; en español, «con la tristeza de» reproduce de manera sobria esa relación dentro del paralelismo antitético, y «pero» expresa con claridad el contraste.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - ser interior
  lexicon: HALOT
  rationale: 'La repetición del término mantiene el paralelismo hebreo: corazón alegre / tristeza del corazón.'
- source_word: רוּחַ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - ánimo
  - aliento
  - temperamento
  lexicon: HALOT
  rationale: Aquí רוּחַ se refiere a la disposición interior animadora de la persona. «Espíritu» preserva mejor esa profundidad antropológica que alternativas más interpretativas.
- source_word: נְכֵאָה
  english_pob_choice: crushed
  chosen_spanish: se abate
  alternatives_spanish:
  - se quiebra
  - queda aplastado
  - está quebrantado
  lexicon: HALOT
  rationale: El adjetivo expresa estar golpeado o abatido. «Se abate» comunica bien el estado resultante en un español natural, aunque la imagen subyacente también permite «quebrantado»; por eso se preserva la alternativa en nota.
theological_decisions:
- issue: Imagen del rostro como indicador visible del estado interior
  english_pob_reading: A joyful heart makes the face cheerful.
  chosen_spanish_reading: Un corazón alegre alegra el rostro.
  alternative_spanish_readings:
  - Un corazón alegre ilumina el rostro.
  - Un corazón alegre mejora el semblante.
  rationale: El verso no plantea una doctrina abstracta sino una observación sapiencial sobre la manifestación externa del gozo interior. La traducción conserva esa relación sin suavizarla en exceso.
  doctrine_reference: Sabiduría proverbial; antropología bíblica implícita.
- issue: Sentido de רוּחַ נְכֵאָה
  english_pob_reading: the spirit is crushed / a broken spirit
  chosen_spanish_reading: el espíritu se abate
  alternative_spanish_readings:
  - el espíritu es quebrantado
  - el espíritu queda aplastado
  rationale: La audit trail inglesa conserva una tensión entre estado pasivo/resultativo y posible lectura atributiva. «Se abate» comunica el resultado interno de estar afligido sin perder el peso del hebreo; la nota mantiene la alternativa «quebrantado».
  doctrine_reference: Antropología bíblica; lenguaje poético sapiencial.
translation_notes:
  revision_awareness: Se siguió la lectura de alta concordancia del POB inglés sin introducir cambios sustantivos. La única decisión de estilo relevante fue preferir «rostro» y «espíritu se abate» por naturalidad española, manteniendo en nota la alternativa «quebrantado» que refleja la tensión lexical del hebreo.
  spanish_consistency_notes:
  - Se conservó el paralelismo corazón/espíritu para reflejar la estructura hebrea.
  - Se evitó «semblante» para no alejarse del sustantivo concreto de פָּנִים, aunque sería posible en un registro más literario.
  - Se mantuvo «pero» para marcar claramente la antítesis del proverbio.
  - No se usó «SEÑOR» ni terminología de sustitución, porque el versículo no contiene el nombre divino.
