  timestamp: '2026-05-07T22:20:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: una pregunta retórica sobre tomar fuego cerca del cuerpo y la imposibilidad de que la ropa no resulte quemada. Conserva correctamente «un hombre», «fuego» y la estructura proverbial. La nota sobre חֵיקוֹ también preserva adecuadamente las alternativas léxicas.'
  spanish_quality_summary: La redacción es clara y digna, pero «tomará» enfatiza más el acto de tomar que el de llevar/sostener fuego junto al cuerpo, que es el matiz destacado en el expediente inglés. Además, «sus vestidos» es comprensible, pero «su ropa» suena más natural en español actual y corresponde mejor a «his clothes».
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. La decisión «un hombre» concuerda con la preferencia por mantener el masculino singular genérico. «En su seno» es defendible para חֵיקוֹ, con nota de alternativa bien formulada.
  issues:
  - severity: medium
    issue: «Tomará» debilita el matiz de llevar/sostener fuego cerca del cuerpo
    rationale: El hebreo יַחְתֶּה aquí, según la justificación auditada, no se limita a ‘tomar’ sino a tomar de modo que se lleva o sostiene el fuego pegado al cuerpo. «Llevará» comunica mejor esa imagen práctica en español.
  - severity: low
    issue: «Sus vestidos» suena más tradicional que natural para el sentido básico de בגדיו
    rationale: Aunque no es incorrecto, el expediente inglés eligió «clothes» por naturalidad moderna. En español neutral, «su ropa» transmite mejor ese mismo nivel de naturalidad sin pérdida de dignidad.
