source:
  edition: SBLGNT
  text: Μετὰ ταῦτα εἶδον, καὶ ἰδοὺ ὄχλος πολύς, ὃν ἀριθμῆσαι ⸀αὐτὸν οὐδεὶς ἐδύνατο, ἐκ παντὸς ἔθνους καὶ φυλῶν καὶ λαῶν καὶ γλωσσῶν, ⸀ἑστῶτες ἐνώπιον τοῦ θρόνου καὶ ἐνώπιον τοῦ ἀρνίου, περιβεβλημένους στολὰς λευκάς, καὶ ⸀φοίνικες ἐν ταῖς χερσὶν αὐτῶν·
base_translation:
  language: en
  yaml_path: translation/nt/revelation/007/009.yaml
  text: 'After these things I looked[a], and behold, a great multitude that no one was able to count, from every nation and tribe and people and language, standing before the throne and before the Lamb, clothed in white robes, with palm branches in their hands.'
  footnotes:
  - marker: a
    text: Or, more smoothly, 'from every nation, tribe, people, and language.' The main text preserves the Greek's shift from singular 'nation' to plural terms.
    reason: lexical_alternative
translation:
  language: ko
  text: 이 일들 후에 내가 보니, 보라, 아무도 셀 수 없는 큰 무리가 모든 나라와 족속과 백성과 언어에서 나와, 보좌 앞과 어린 양 앞에 서서, 흰 두루마기를 입고 손에 종려나무 가지를 들고 있었습니다.
  philosophy: optimal-equivalence
theological_decisions:
- issue: '큰 무리(7:9)의 보편성 정형 보존'
  chosen_reading: '「모든 나라와 족속과 백성과 언어」 네 어휘 순서 그대로'
  alternative_readings:
  - 네 어휘를 통합
  rationale: '사중 보편 정형은 5:9의 「족속과 언어와 백성과 나라」와 짝을 이루며, 어린 양의 피로 사신 모든 백성의 종말론적 완성을 가리킨다. 한국어로도 네 어휘를 그대로 보존한다.'
  doctrine_reference: 'DOCTRINE.md: 본문 형식 보존'
