    rationale: «¿Y condenarías tú al justo Poderoso?» o «¿Y condenarías al Poderoso justo?» fluye mejor en español eclesial neutral que «al Justo Poderoso».
  revised_spanish_text: ¿Podrá gobernar[a] uno que odia la justicia? ¿Y condenarías tú al justo Poderoso?[b]
