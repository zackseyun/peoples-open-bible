translation:
  language: es
  text: 'Así dice Yahvé, que da el sol para luz de día, el orden fijo[a] de la luna y las estrellas para luz de noche, que agita el mar para que sus olas bramen—Yahvé de los ejércitos es su nombre:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las ordenanzas de la luna y las estrellas». El hebreo חֻקּוֹת puede denotar estatutos u orden establecido; aquí se refiere a la regularidad establecida de los astros.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice el SEÑOR
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética estándar en español se expresa con naturalidad como «Así dice». Se mantiene «Yahvé» para el nombre divino según la política del proyecto, en vez de sustituirlo por un título.
- source_word: נֹתֵן
  english_pob_choice: who gives
  chosen_spanish: que da
  alternatives_spanish:
  - que otorga
  - dando
  lexicon: HALOT
  rationale: El participio hebreo funciona atributivamente describiendo la acción continua de Yahvé. «Que da» conserva esa función en español con naturalidad.
- source_word: שֶׁמֶשׁ לְאוֹר יוֹמָם
  english_pob_choice: the sun for light by day
  chosen_spanish: el sol para luz de día
  alternatives_spanish:
  - el sol como luz de día
  - el sol para alumbrar de día
  lexicon: HALOT
  rationale: «לְאוֹר» expresa finalidad o función. «Para luz de día» reproduce bien el paralelo con la segunda línea y evita añadir un sujeto verbal no presente en el hebreo.
- source_word: חֻקֹּת יָרֵחַ וְכוֹכָבִים
  english_pob_choice: the fixed order of the moon and stars
  chosen_spanish: los estatutos de la luna y de las estrellas
  alternatives_spanish:
  - el orden fijo de la luna y de las estrellas
  - las ordenanzas de la luna y de las estrellas
  lexicon: HALOT
  rationale: En este contexto cósmico, חֻקּוֹת puede referirse a estatutos, ordenanzas o a un orden establecido. Para no perder la tensión léxica que el inglés POB dejó abierta con nota, se conserva «estatutos», con una nota que explica el sentido de orden fijo/establecido.
- source_word: לְאוֹר לָיְלָה
  english_pob_choice: for light by night
  chosen_spanish: para luz de noche
  alternatives_spanish:
  - para alumbrar de noche
  - como luz nocturna
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la cláusula diurna y una formulación breve y natural en español.
- source_word: רֹגַע הַיָּם
  english_pob_choice: who stirs up the sea
  chosen_spanish: que agita el mar
  alternatives_spanish:
  - que calma el mar
  - que aquieta el mar
  lexicon: HALOT
  rationale: Aunque el verbo puede significar calmar en otros contextos, el miembro siguiente («sus olas bramen») favorece aquí la idea de agitar. Se preserva así la lectura contextual del inglés POB.
- source_word: וַיֶּהֱמוּ גַלָּיו
  english_pob_choice: so that its waves roar
  chosen_spanish: para que sus olas bramen
  alternatives_spanish:
  - y sus olas bramen
  - de modo que sus olas bramen
  lexicon: HALOT
  rationale: La cláusula final expresa el efecto de la acción divina sobre el mar. «Bramen» reproduce el matiz sonoro de הָמָה sin suavizarlo.
- source_word: יְהוָה צְבָאוֹת שְׁמוֹ
  english_pob_choice: Yahweh of hosts is his name
  chosen_spanish: Yahvé de los ejércitos es su nombre
  alternatives_spanish:
  - Yahvé de los ejércitos es su nombre
  - Yahvé Sebaot es su nombre
  lexicon: HALOT
  rationale: צְבָאוֹת se traduce de forma tradicional y transparente como «de los ejércitos», preservando la amplitud del título divino. La construcción nominal final se vierte con «es su nombre» para sonar natural en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. Se sigue la norma del proyecto de verterlo como «Yahvé», manteniendo el nombre personal del pacto en vez de ocultarlo tras un sustituto titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de חֻקֹּת en el marco cósmico
  english_pob_reading: the fixed order of the moon and stars
  chosen_spanish_reading: los estatutos de la luna y de las estrellas
  alternative_spanish_readings:
  - el orden fijo de la luna y de las estrellas
  - las ordenanzas de la luna y de las estrellas
  rationale: El hebreo admite tanto la idea de estatutos como la de orden establecido. En español se conserva «estatutos» en el texto, pero la nota aclara que aquí se trata del orden regular de los astros, manteniendo la tensión léxica documentada.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: Sentido de רֹגַע respecto al mar
  english_pob_reading: who stirs up the sea
  chosen_spanish_reading: que agita el mar
  alternative_spanish_readings:
  - que calma el mar
  - que aquieta el mar
  rationale: La cola inmediata («sus olas bramen») orienta la lectura hacia la agitación del mar, no hacia su quietud. La traducción conserva esa relación poética y causal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: 'Se revisó el antecedente en inglés y la última pasada indica que no hubo cambios necesarios. La versión española sigue esa lectura aprobada y conserva las dos tensiones documentadas: el nombre divino como Yahvé y el valor contextual de חֻקּוֹת / רֹגַע en el marco cósmico y marino.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva un paralelismo breve y poético entre día/noche y sol/luna-estrellas.
  - «Mar» y «olas» mantienen el campo semántico del hebreo sin reinterpretaciones.
  - La nota de חֻקֹּת evita sustituir el término por una explicación en el cuerpo del texto, preservando la tensión léxica documentada.
