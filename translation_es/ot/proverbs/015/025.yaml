translation:
  language: es
  text: Yahvé derriba[a] la casa de los soberbios, pero afirma el límite[b] de la viuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arranca la casa de los soberbios». El verbo hebreo puede implicar quitar, arrancar o desplazar, no solo demoler.
    reason: lexical_alternative
  - marker: b
    text: O «afirma el lindero de la viuda» o «la línea de propiedad». La imagen sugiere que Yahvé protege los derechos de propiedad de la persona vulnerable.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית
  english_pob_choice: house of
  chosen_spanish: la casa de
  alternatives_spanish:
  - el hogar de
  - la casa/hogar de
  lexicon: HALOT
  rationale: La forma constructa expresa posesión o pertenencia. En español, «la casa de» conserva la imagen concreta de la POB en inglés y deja abierta la extensión a casa, linaje o patrimonio sin explicar más de lo que el texto requiere.
- source_word: גֵּאִים
  english_pob_choice: the proud
  chosen_spanish: los soberbios
  alternatives_spanish:
  - los orgullosos
  - los arrogantes
  lexicon: HALOT
  rationale: El término hebreo apunta a personas altivas y autosuficientes. «Soberbios» es natural en español bíblico y preserva mejor el matiz moral de altivez que «orgullosos», que puede sonar más amplio o neutro.
- source_word: יִסַּח
  english_pob_choice: tears down
  chosen_spanish: derriba
  alternatives_spanish:
  - arranca
  - destruye
  - arrastra fuera
  lexicon: HALOT
  rationale: El verbo puede implicar remover, arrancar o demoler. Con «casa» como objeto, «derriba» expresa con naturalidad la acción destructiva y mantiene la fuerza del hebreo sin imponer una sola imagen técnica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino según la convención del proyecto en español. «Yahvé» corresponde a la transliteración usada en el texto meta, en lugar de sustituir el nombre por un título.
- source_word: וְיַצֵּב
  english_pob_choice: but he sets firm
  chosen_spanish: pero afirma
  alternatives_spanish:
  - y establece
  - pero establece
  - y hace firme
  lexicon: HALOT
  rationale: La conjunción hebrea es formalmente «y», pero la relación en el proverbio es contrastiva. «Pero» comunica esa oposición discursiva, y «afirma» reproduce bien la idea de hacer firme o establecer con solidez.
- source_word: גְּב֣וּל
  english_pob_choice: the boundary
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el lindero
  - la línea divisoria
  lexicon: HALOT
  rationale: El término puede referirse a borde, límite o linde de propiedad. «Límite» es suficientemente amplio para abarcar la imagen de protección patrimonial sin obligar a una equivalencia demasiado técnica.
- source_word: אַלְמָנָה
  english_pob_choice: the widow
  chosen_spanish: la viuda
  alternatives_spanish:
  - la viuda desamparada
  - la viuda
  lexicon: HALOT
  rationale: Se mantiene el sustantivo simple en singular, como figura representativa de vulnerabilidad social. «La viuda» preserva la fuerza del contraste sapiencial con los soberbios.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton, no un título genérico. Mantener «Yahvé» evita ocultar el nombre personal de Dios y sigue la decisión doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre las dos cláusulas
  english_pob_reading: but he sets firm
  chosen_spanish_reading: pero afirma
  alternative_spanish_readings:
  - y afirma
  - y establece
  rationale: 'Aunque el hebreo usa la conjunción simple, la estructura sentenciosa es antitética: destrucción de la casa de los soberbios frente a la protección de la viuda. «Pero» refleja la función discursiva sin añadir contenido nuevo.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el pasaje mantiene alta concordancia con la evaluación previa y no requiere cambios respecto del paquete fuente y la auditoría inglesa.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme a la terminología del proyecto para יהוה.
  - Se conserva el contraste proverbial con «pero» para reflejar la oposición entre las dos mitades del verso.
  - «Soberbios» y «viuda» mantienen un registro bíblico claro y comprensible en español latinoamericano.
  - Las notas al pie preservan la alternativa léxica principal para el verbo y para el sustantivo גבול, sin sobreexplicar el sentido.
