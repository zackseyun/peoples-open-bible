translation:
  language: es
  text: El conocimiento del médico levantará su cuerno[a], y delante de nobles estará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «delante de magnates será admirado».'
    reason: alternative_reading
lexical_decisions:
- source_word: דעת / ἐπιστήμη
  english_pob_choice: knowledge
  chosen_spanish: ciencia
  alternatives_spanish:
  - conocimiento
  - saber
  - pericia
  lexicon: HALOT; LSJ
  rationale: El hebreo דעת y el griego ἐπιστήμη apuntan aquí a conocimiento experto o competencia aprendida. En español, 'ciencia' comunica bien ese saber técnico en un contexto de medicina y mantiene el registro sapiencial sin volver la frase pesada. 'Conocimiento' también sería posible, pero 'ciencia' conserva mejor la idea de saber especializado.
- source_word: רופא / ἰατροῦ
  english_pob_choice: physician
  chosen_spanish: médico
  alternatives_spanish:
  - doctor
  - sanador
  - físico
  lexicon: HALOT; LSJ
  rationale: El término designa al practicante de la medicina. 'Médico' es la forma natural y digna en español actual. 'Doctor' puede sonar más moderno, pero es menos preciso en algunas regiones; 'sanador' amplía indebidamente el sentido.
- source_word: תרים קרנו / ἀνυψώσει κεφαλὴν αὐτοῦ
  english_pob_choice: will raise his horn
  chosen_spanish: levantará su cuerno
  alternatives_spanish:
  - alzará su cuerno
  - elevará su honra
  - levantará su cabeza
  lexicon: HALOT; LXX Greek parallel
  rationale: Se conserva la imagen idiomática de 'cuerno' para reflejar con fidelidad el hebreo תרים קרנו. Aunque el paralelo griego dice literalmente 'levantará su cabeza', la tradición fuente hebrea aquí mantiene la metáfora de honor/alta posición. 'Su cuerno' preserva esa tensión idiomática en vez de sustituirla por una explicación interpretativa.
- source_word: נדיבים / μεγιστάνων
  english_pob_choice: nobles
  chosen_spanish: nobles
  alternatives_spanish:
  - magnates
  - grandes
  - príncipes
  lexicon: HALOT; LSJ
  rationale: '''Nobles'' comunica el rango social de personas prominentes y encaja bien con el registro sapiencial. ''Magnates'' sería más cercano al griego μεγιστάνων, pero suena más marcado en español; ''nobles'' mantiene claridad y dignidad.'
- source_word: יתיצב / θαυμασθήσεται
  english_pob_choice: he will stand
  chosen_spanish: se presentará
  alternatives_spanish:
  - estará de pie
  - se pondrá de pie
  - será admirado
  lexicon: HALOT; LXX Greek parallel
  rationale: El hebreo יתיצב significa ponerse de pie o presentarse, mientras que el griego ofrece 'será admirado'. Para el texto principal se sigue el hebreo, y en español 'se presentará' expresa la idea de comparecer ante los nobles sin añadir una interpretación excesiva. 'Será admirado' se reserva para la nota del paralelo griego.
theological_decisions:
- issue: Divergencia entre el hebreo y el griego en el segundo hemistiquio
  english_pob_reading: 'before nobles he will stand; Greek footnote: before magnates he will be admired'
  chosen_spanish_reading: delante de los nobles se presentará
  alternative_spanish_readings:
  - delante de magnates será admirado
  - delante de los nobles estará
  rationale: Como en el audit trail inglés, el texto principal sigue el hebreo alto en confianza, y la variante griega se conserva en nota porque desplaza el énfasis de la presencia honrosa ante élites hacia la admiración pública por parte de ellas. Esa diferencia es importante y no debe borrarse.
  doctrine_reference: 'PHILOSOPHY.md: priorizar el hebreo donde se conserva; usar el griego como control y como variante significativa cuando introduce un matiz distinto.'
translation_notes:
  revision_awareness: El texto español sigue la última revisión inglesa en cuanto a mantener la metáfora de honor del hebreo ('cuerno') y la lectura principal del segundo hemistiquio con base en el hebreo, mientras preserva la alternativa griega en nota. Se evitó traducir mecánicamente el inglés y se volvió al hebreo y al paralelo griego para decisiones léxicas clave.
  spanish_consistency_notes:
  - Se mantuvo 'cuerno' para la metáfora de honor, en coherencia con la decisión inglesa revisada.
  - '''Nobles'' se usó como equivalente natural y transparente de נדיבים / μεγιστάνων.'
  - El verbo reflexivo 'se presentará' conserva la idea de comparecer ante los poderosos sin introducir lectura interpretativa adicional.
  - La nota reproduce la variante griega significativa sin desplazar el texto principal.
