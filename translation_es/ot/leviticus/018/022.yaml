translation:
  language: es
  text: No te acostarás con un varón como con una mujer[a]; es una abominación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los acostamientos de una mujer», un giro idiomático que se refiere al acto sexual con una mujer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכָר
  english_pob_choice: a male
  chosen_spanish: un varón
  alternatives_spanish:
  - un macho
  - un hombre
  lexicon: HALOT
  rationale: זָכָר designa a un individuo masculino en cuanto sexo. En español, «varón» comunica ese valor de forma natural y digna, sin restringirlo a la edad adulta como podría sugerir «hombre» en ciertos contextos.
- source_word: תִשְׁכַּב
  english_pob_choice: you shall not lie
  chosen_spanish: No te acostarás
  alternatives_spanish:
  - No yacerás
  - No tendrás relaciones sexuales
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo sexual. «Acostarse» conserva ese carácter idiomático en español, con suficiente claridad en una prohibición legal. «Tener relaciones sexuales» explicita más de lo que el hebreo formula.
- source_word: מִשְׁכְּבֵי אִשָּׁה
  english_pob_choice: as with a woman
  chosen_spanish: como se acuesta con una mujer
  alternatives_spanish:
  - como con una mujer
  - los acostamientos de una mujer
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y alude al acto sexual. La versión elegida mantiene la comparación sin volverla oscura en español. «Como con una mujer» sería más breve, pero la forma elegida refleja mejor el paralelo verbal implícito.
- source_word: תּוֹעֵבָה
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo detestable
  - una cosa detestable
  lexicon: HALOT
  rationale: «Abominación» preserva la fuerza moral y ritual del término hebreo en el código de santidad. Otras opciones suavizan demasiado el juicio del texto.
- source_word: הִוא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - eso es
  - esto es
  lexicon: HALOT
  rationale: El pronombre femenino retoma el acto prohibido y en español puede quedar naturalmente expresado con la cópula impersonal «es».
theological_decisions:
- issue: Alcance de la prohibición
  english_pob_reading: Direct prohibition of male-male sexual intercourse without narrowing it to a specific exploitative subset not stated in the Hebrew.
  chosen_spanish_reading: Prohibición directa de acostarse sexualmente con un varón, sin añadir una limitación interpretativa que no aparece en el hebreo.
  alternative_spanish_readings:
  - Prohibición de ciertas prácticas homosexuales específicas
  - Prohibición de relaciones entre personas del mismo sexo
  rationale: El texto hebreo nombra el acto prohibido de manera directa y lo califica como abominación. La traducción debe decir lo que el texto dice, sin introducir restricciones o ampliaciones no presentes en la formulación.
  doctrine_reference: Primacía del texto original; no importar precisiones doctrinales o sociológicas ajenas al versículo.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del expediente inglés, que afinó la comparación desde una formulación explicativa hacia una más literal. Por eso la línea española conserva una comparación breve y formal («como se acuesta con una mujer») y evita expandir el sentido más allá del paralelo hebreo.
  spanish_consistency_notes:
  - Se mantiene «varón» para זָכָר, en consonancia con el valor sexual/masculino del hebreo.
  - Se preserva el eufemismo verbal con «acostarse», evitando una paráfrasis demasiado explícita.
  - «Abominación» reproduce el tono fuerte del hebreo תּוֹעֵבָה sin suavizarlo.
  - La nota al pie aclara el giro idiomático del hebreo y su referencia al acto sexual.
