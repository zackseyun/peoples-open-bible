review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el sentido general del hebreo y la decisión del POB de enfatizar la reunificación de Judá e Israel. 'En aquellos días', 'la casa de Judá', 'con la casa de Israel', 'vendrán juntos', 'desde la tierra del norte' y 'que di en herencia' son fieles al texto fuente y al razonamiento auditado. Sin embargo, el pronombre final debe conservar la segunda persona del hebreo אֲבוֹתֵיכֶם ('vuestros/sus' según tratamiento coherente), no cambiar de referente de forma ambigua.
  spanish_quality_summary: 'El español es claro y digno, pero hay un problema de coherencia pronominal: el texto va implícitamente dirigido al pueblo en segunda persona según el original (''your fathers''), mientras que el borrador usa ''sus padres'', lo que suena como tercera persona y puede confundir el referente. Además, la nota b debe corresponder a esa corrección. El resto es natural y legible.'
  glossary_alignment: No hay conflictos con los términos globales del proyecto. No aparece el nombre divino ni títulos mesiánicos. 'Casa de Judá/Israel', 'tierra', y 'herencia' están bien alineados con la filosofía del POB. La principal desalineación es no preservar con precisión la segunda persona de אֲבוֹתֵיכֶם.
  issues:
  - severity: medium
    issue: '''sus padres'' no preserva claramente la segunda persona de אֲבוֹתֵיכֶם'
    rationale: El hebreo dice 'vuestros padres'/'sus padres' solo si todo el pasaje estuviera reformulado coherentemente para tratamiento de ustedes. Aquí el cambio introduce ambigüedad referencial y se aparta del English POB audit trail, que preserva 'your fathers' en texto principal.
  - severity: low
    issue: La nota b debe ajustarse al texto corregido
    rationale: Si el texto principal usa 'sus antepasados' como alternativa o 'vuestros padres' en la línea principal, la nota debe reflejar exactamente esa relación para evitar inconsistencia entre ancla y glosa.
  revised_spanish_text: En aquellos días la casa de Judá irá con la casa de Israel[a], y vendrán juntos desde la tierra del norte a la tierra que di en herencia a vuestros padres[b].
  revised_footnotes:
  - marker: a
    text: 'O: «la casa de Judá irá hacia la casa de Israel». El hebreo puede leerse de modo más literal con la preposición עַל, pero aquí probablemente expresa unión y no oposición.'
    reason: alternative_reading
  - marker: b
    text: 'O: «a vuestros antepasados». El hebreo dice literalmente «a vuestros padres».'
    reason: lexical_alternative
  revision_rationale: Se corrige 'sus padres' a 'vuestros padres' para preservar la segunda persona del hebreo y la decisión auditada del POB. También se ajusta la nota correspondiente para mantener coherencia exacta con el texto principal. No se requieren otros cambios.
