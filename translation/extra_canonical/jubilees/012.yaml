  - winter
  rationale: The phrase refers to the rainy season months. 'Rainy months' is natural English and preserves the climatic reference.
theological_decisions:
- issue: Divine name rendering for እግዚአብሔር
  chosen_reading: the LORD
  alternative_readings:
  - God
  - Lord
  rationale: Follows project doctrine for covenantal divine-name language and preserves continuity with biblical idiom.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → the LORD'
- issue: Abram's prayer about astral signs
  chosen_reading: Rendered as rejection of dependence on astral observation, not denial that heavenly bodies function as signs
  alternative_readings:
  - A total repudiation of celestial signs
  - An endorsement of astrology
  rationale: The Ge'ez says the signs are in the LORD's hand and asks why Abram should keep searching. This preserves Jubilees's anti-idolatrous, anti-astrological thrust without erasing the language of signs.
- issue: Hebrew as primordial language
  chosen_reading: '''Hebrew, in the language of creation'''
  alternative_readings:
  - '''the language of creatures'''
  - '''the original language'''
  rationale: Jubilees presents Hebrew as the restored primordial language. The translation keeps the claim explicit rather than softening it into a generic linguistic note.
- issue: Mediated revelation in v.22
  chosen_reading: '''the word of the LORD to him by my hand'''
  alternative_readings:
  - '''through me'''
  - omitting the mediation
  rationale: The first-person angelic narrator is integral to Jubilees's Sinai/apocalyptic framing and must be preserved.
