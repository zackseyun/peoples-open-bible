translation:
  language: es
  text: 'Y daré prodigios en el cielo, arriba, y señales sobre la tierra, abajo: sangre y fuego y vapor de humo.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: δώσω
  english_pob_choice: I will give
  chosen_spanish: daré
  alternatives_spanish:
  - mostraré
  - concederé
  lexicon: BDAG
  rationale: El futuro de δίδωμι se expresa de manera más directa con «daré». Mantiene la fuerza verbal del griego y el tono profético de que Dios dispone o concede estos signos.
- source_word: τέρατα
  english_pob_choice: wonders
  chosen_spanish: prodigios
  alternatives_spanish:
  - maravillas
  - portentos
  lexicon: BDAG
  rationale: τέρατα designa fenómenos extraordinarios que inspiran asombro. «Prodigios» conserva ese valor y suena natural en español bíblico. «Maravillas» también sería posible, pero puede sonar un poco más genérico; «portentos» es más marcado y menos común.
- source_word: ἐν τῷ οὐρανῷ ἄνω
  english_pob_choice: in the heaven above
  chosen_spanish: en el cielo arriba
  alternatives_spanish:
  - en el cielo de arriba
  - en el cielo superior
  lexicon: BDAG
  rationale: οὐρανός puede significar «cielo» o «cielo/heaven» según contexto. En esta cita de Joel con contraste vertical y cósmico, «cielo» comunica bien el alcance espacial; «arriba» conserva ἄνω sin sonar forzado en español.
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - indicios
  lexicon: BDAG
  rationale: «Señales» es la equivalencia más natural en español bíblico para σημεῖα y mantiene el paralelismo con «prodigios». «Signos» es posible, pero en español común puede sonar más técnico.
- source_word: ἐπὶ τῆς γῆς κάτω
  english_pob_choice: on the earth below
  chosen_spanish: en la tierra abajo
  alternatives_spanish:
  - sobre la tierra abajo
  - en la tierra de abajo
  lexicon: BDAG
  rationale: γῆ puede ser «tierra» o «tierra/terreno», y aquí el contraste con «cielo arriba» favorece una expresión simple y simétrica. «En la tierra abajo» preserva el paralelo vertical sin añadir connotaciones ajenas.
- source_word: ἀτμίδα καπνοῦ
  english_pob_choice: vapor of smoke
  chosen_spanish: vapor de humo
  alternatives_spanish:
  - vaho de humo
  - vapor humeante
  lexicon: BDAG
  rationale: El griego combina ἀτμίς («vapor, neblina, exhalación») con καπνός («humo»). «Vapor de humo» sigue de cerca la forma y conserva la tensión léxica del original, que la POB inglesa también preservó con una nota alternativa. No se opta por una expresión más interpretativa como «nube de humo» porque suavizaría la rareza del griego.
theological_decisions:
- issue: Cómo traducir el contraste cósmico del pasaje de Joel citado en Hechos
  english_pob_reading: heaven above ... earth below
  chosen_spanish_reading: cielo arriba ... tierra abajo
  alternative_spanish_readings:
  - cielo de arriba ... tierra de abajo
  - cielo ... tierra
  rationale: La cita presenta signos en una esfera celeste y otra terrestre, con lenguaje apocalíptico y no meramente meteorológico. «Cielo arriba» y «tierra abajo» conserva el paralelismo vertical y el alcance cósmico sin normalizar la imagen.
  doctrine_reference: Principio de primacía del texto original; preservar el tono profético-apocalíptico sin resolverlo en una lectura más suave
- issue: Si ἀτμίδα καπνοῦ debe verterse de modo más natural o más literal
  english_pob_reading: vapor of smoke
  chosen_spanish_reading: vapor de humo
  alternative_spanish_readings:
  - nube de humo
  - vapor humeante
  rationale: La traducción literal mantiene la tensión del original y evita sustituirla por una imagen más idiomática que borre la combinación inusual de términos. Se conserva así la rareza semántica que el audit trail inglés decidió no eliminar.
  doctrine_reference: Transparencia textual; mantener ambigüedades o durezas léxicas cuando el original las presenta
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que prefirió una expresión más cercana a ἀτμίδα καπνοῦ y sustituyó la puntuación de dos puntos por una coma para reflejar mejor el fluir del griego. En español se mantiene esa línea con «vapor de humo» y una coma antes de la enumeración final.
  spanish_consistency_notes:
  - Se usa «Yahvé» sólo cuando el texto lo requiere explícitamente; aquí no aparece.
  - Se mantiene el paralelismo «cielo arriba / tierra abajo» para reflejar οὐρανῷ ἄνω / γῆς κάτω.
  - «Prodigios» y «señales» conservan el binomio bíblico sin introducir un lenguaje excesivamente técnico.
  - La nota [a] se ancla en la frase final porque la alternativa léxica afecta directamente a ἀτμίδα καπνοῦ.
