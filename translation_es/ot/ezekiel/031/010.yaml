  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה יַ֕עַן אֲשֶׁ֥ר גָּבַ֖הְתָּ בְּ/קוֹמָ֑ה וַ/יִּתֵּ֤ן צַמַּרְתּ/וֹ֙ אֶל בֵּ֣ין עֲבוֹתִ֔ים וְ/רָ֥ם לְבָב֖/וֹ בְּ/גָבְהֽ/וֹ־׃
