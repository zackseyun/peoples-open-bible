translation:
  language: es
  text: Entonces tomaron todas las posesiones de Sodoma y Gomorra[a], y todo su alimento, y se fueron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus provisiones». El término hebreo puede referirse a comida en general o a suministros para un viaje o una campaña.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - se llevaron
  - capturaron
  lexicon: HALOT
  rationale: El qal wayyiqtol de לקח expresa la acción narrativa básica de tomar. «Tomaron» conserva la sencillez y la neutralidad del inglés POB sin añadir la fuerza interpretativa de «se llevaron» o «capturaron».
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas / todo
  alternatives_spanish:
  - la totalidad de
  - todo el
  lexicon: HALOT
  rationale: 'El cuantificador se repite para abarcar tanto las posesiones como el alimento. En español conviene concordarlo con el sustantivo correspondiente: «todas las posesiones» y «todo su alimento».'
- source_word: רְכֻשׁ
  english_pob_choice: possessions
  chosen_spanish: posesiones
  alternatives_spanish:
  - bienes
  - propiedades
  - riquezas
  lexicon: HALOT
  rationale: רְכֻשׁ refiere a bienes muebles o propiedad acumulable. «Posesiones» es amplio y natural en español, y no restringe indebidamente el botín a riqueza monetaria.
- source_word: סְדֹם וַעֲמֹרָה
  english_pob_choice: Sodom and Gomorrah
  chosen_spanish: Sodoma y Gomorra
  lexicon: transliteration convention
  rationale: Se conservan los nombres propios bíblicos en su forma tradicional española, que es estable y plenamente reconocible.
- source_word: אָכְלָם
  english_pob_choice: their food
  chosen_spanish: su alimento
  alternatives_spanish:
  - sus provisiones
  - lo que tenían para comer
  lexicon: HALOT
  rationale: La forma nominal puede denotar comida o provisiones. «Su alimento» mantiene la amplitud semántica sin forzar una especificación logística que el hebreo no exige.
- source_word: וַיֵּלֵכוּ
  english_pob_choice: went away
  chosen_spanish: se fueron
  alternatives_spanish:
  - partieron
  - se marcharon
  lexicon: HALOT
  rationale: En este contexto narrativo de saqueo, «se fueron» comunica el alejamiento posterior de forma natural y cercana al valor básico de הלך, sin añadir matices demasiado interpretativos.
translation_notes:
  revision_awareness: El texto base inglés y la revisión más reciente coinciden sustancialmente; no se documentaron cambios textuales ni tensiones adicionales en este versículo. La versión española sigue de cerca el sentido directo del hebreo y conserva la única alternativa léxica relevante para אָכְלָם.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en esta serie cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «posesiones» para רְכֻשׁ, coherente con la decisión inglesa de «possessions» y con el estilo POB.
  - La nota a pie de página se ancla en «alimento» para reflejar la ambigüedad semántica de אָכְלָם sin recargar el texto principal.
