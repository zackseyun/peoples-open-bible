translation:
  language: es
  text: Harán, Canneh[a], Edén, los mercaderes de Sabá, y Asur[b] y Kilmad comerciaron contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Calneh» para Canneh.
    reason: lexical_alternative
  - marker: b
    text: O «Asiria» para Asur.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָרָן
  english_pob_choice: Haran
  chosen_spanish: Harán
  alternatives_spanish:
  - Jarán
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera para preservar la referencia geográfica y la serie de socios comerciales.
- source_word: כַנֵּה
  english_pob_choice: Canneh
  chosen_spanish: Canneh
  alternatives_spanish:
  - Calneh
  lexicon: HALOT
  rationale: El POB inglés conserva la forma directa del hebreo y anota la alternativa tradicional. En español se mantiene 'Canneh' como forma más cercana al texto base, con la variante tradicional en nota.
- source_word: עֶדֶן
  english_pob_choice: Eden
  chosen_spanish: Edén
  alternatives_spanish:
  - Eden
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio de lugar, no como el Edén del relato del jardín. La acentuación española 'Edén' evita ambigüedad fonética y conserva la transliteración.
- source_word: רֹכְלֵי
  english_pob_choice: the merchants of
  chosen_spanish: los mercaderes de
  alternatives_spanish:
  - los comerciantes de
  - los traficantes de
  lexicon: HALOT
  rationale: El plural constructo de רכל refiere a actividad comercial. 'Mercaderes' es un equivalente natural en español bíblico sin perder el sentido de negocio/comercio.
- source_word: שְׁבָא
  english_pob_choice: Sheba
  chosen_spanish: Sabá
  alternatives_spanish:
  - Sheba
  lexicon: HALOT
  rationale: Nombre propio bien asentado en español bíblico. 'Sabá' es la forma idiomática más clara y reconocible.
- source_word: אַשּׁוּר
  english_pob_choice: Asshur
  chosen_spanish: Asur
  alternatives_spanish:
  - Asshur
  - Asiria
  lexicon: HALOT
  rationale: Se sigue de cerca la forma hebrea del nombre propio. 'Asiria' es una lectura contextual posible, pero el POB inglés preserva la forma Asshur para mantener la secuencia de nombres comerciales.
- source_word: כִּלְמַד
  english_pob_choice: Kilmad
  chosen_spanish: Kilmad
  alternatives_spanish:
  - Kilmad
  lexicon: HALOT
  rationale: Nombre propio raro e incierto; se translitera para no sobreinterpretar el topónimo.
- source_word: רֹכַלְתֵּךְ
  english_pob_choice: traded with you
  chosen_spanish: comerciaban contigo
  alternatives_spanish:
  - traficaban contigo
  - hacían negocios contigo
  lexicon: HALOT
  rationale: El verbo רכל expresa transacciones comerciales. 'Comerciaban contigo' conserva la relación de intercambio y funciona de manera natural en español; el imperfecto refleja el valor narrativo habitual en este tipo de lista.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el texto fuente y con el audit trail inglés. No hubo revisiones aplicadas; se mantuvo la lista de nombres propios y la idea comercial general, ajustando solo la naturalidad del español y la transliteración idiomática de algunos topónimos.
  spanish_consistency_notes:
  - Se preserva la secuencia de nombres propios y la relación comercial sin convertirla en una paráfrasis explicativa.
  - '''Harán'' y ''Edén'' se acentúan según ortografía española, mientras que otros topónimos se mantienen transliterados para no añadir identificación geográfica no explicitada por el texto.'
  - '''Mercaderes'' traduce el matiz comercial de רֹכְלֵי; ''comerciaban contigo'' conserva la idea de intercambio recíproco en el contexto oracular.'
