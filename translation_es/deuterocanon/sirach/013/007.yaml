translation:
  language: es
  text: Mientras le seas útil[a], se burlará de ti; dos o tres veces te halagará. Luego te mirará como para pasar de largo[b], y sacudirá la cabeza ante ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo יְהָתֵל puede sugerir burlarse, jugar con alguien o tratarlo como un objeto; «se burlará de ti» busca conservar ese rango sin reducirlo a una broma inocente.
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula media hebrea es difícil. El testigo griego amplía la idea: después de usarte, más tarde te ve y te deja. La traducción sigue el hebreo y mantiene a la vista el paralelo griego.'
    reason: textual_variant
lexical_decisions:
- source_word: עַד אֲשֶׁר תּוֹעִיל
  english_pob_choice: As long as you are useful
  chosen_spanish: Mientras le seas útil
  alternatives_spanish:
  - Mientras le sirvas
  - Hasta que dejes de serle útil
  lexicon: HALOT
  rationale: La cláusula expresa duración condicionada por la utilidad de la persona explotada. "Mientras le seas útil" conserva ese valor temporal/condicional en un español natural y directo.
- source_word: יְהָתֵל בָּךְ
  english_pob_choice: he will make sport of you
  chosen_spanish: te hará bromas
  alternatives_spanish:
  - te se burlará
  - te tomará el pelo
  - jugará contigo
  lexicon: HALOT
  rationale: El hebreo puede abarcar burla, jugar con alguien o tratarlo como objeto. "Te hará bromas" mantiene el tono de trato frívolo y despectivo sin volver la frase más fuerte de lo que el hebreo exige.
- source_word: פַעֲמַיִם שָׁלֹשׁ
  english_pob_choice: two or three times
  chosen_spanish: dos o tres veces
  alternatives_spanish:
  - dos o tres ocasiones
  - dos o tres veces nada más
  lexicon: HALOT
  rationale: Es un modismo numérico simple; "dos o tres veces" conserva la repetición limitada y suena natural en español.
- source_word: יַעֲרִיצֶךָ
  english_pob_choice: he will flatter you
  chosen_spanish: te halagará
  alternatives_spanish:
  - te adulará
  - te encomiará
  - te alabará
  lexicon: HALOT
  rationale: En este contexto no se trata de honra genuina sino de una elevación interesada. "Halagará" preserva la falsedad cortés que sugiere el hebreo y armoniza con el griego, que habla de prometer esperanza y hablar bien.
- source_word: וּבְכֵן
  english_pob_choice: Then
  chosen_spanish: Luego
  alternatives_spanish:
  - Entonces
  - Después
  lexicon: HALOT
  rationale: Marca el giro de la falsa amabilidad al desprecio posterior. "Luego" es breve y fluido en español.
- source_word: יִרְאֲךָ לְהִתְעַבֵּר בָּךְ
  english_pob_choice: he will look at you as if to pass beyond you
  chosen_spanish: te mirará como para pasar de largo
  alternatives_spanish:
  - te mirará como para ignorarte
  - te mirará con desdén y seguirá su camino
  - te mirará para apartarse de ti
  lexicon: HALOT
  rationale: La construcción hebrea es difícil; el griego paralelo añade la idea de ver y abandonar. "Como para pasar de largo" conserva la imagen de movimiento sin fijar demasiado una interpretación única.
- source_word: וּבְרֹאשׁוֹ יָנִיעַ אֵלֶיךָ
  english_pob_choice: he will shake his head at you
  chosen_spanish: y moverá la cabeza hacia ti
  alternatives_spanish:
  - y sacudirá la cabeza en tu dirección
  - y meneará la cabeza hacia ti
  - y asentirá con la cabeza hacia ti
  lexicon: HALOT
  rationale: Es un gesto de desprecio o rechazo; el griego lo corrobora casi literalmente. "Moverá la cabeza hacia ti" conserva el hebraísmo y la ambigüedad del gesto, aunque en español puede sonar más sobrio que "sacudirá".
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo de Kahana como base principal, con el griego de Swete como control paralelo para la cláusula media y el gesto final. Se conserva la tensión entre burla/falsedad amistosa y rechazo posterior.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y publicable, evitando arcaísmos innecesarios.
  - '"Te hará bromas" se usa en sentido despectivo, no humorístico, por exigencia del contexto.'
  - La secuencia "Luego..." conserva el giro narrativo de la estrofa sin añadir contenido interpretativo.
