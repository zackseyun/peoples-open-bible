translation:
  language: es
  text: Procura escuchar todo discurso[a], y no dejes que un proverbio de entendimiento se te escape.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Ponte en pie entre los ancianos; y si alguien es sabio, júntate con él». El testimonio hebreo conservado difiere sustancialmente aquí; el texto principal sigue el hebreo, ya que para este versículo el hebreo sobrevive.'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל
  english_pob_choice: every
  chosen_spanish: todo
  alternatives_spanish:
  - cada
  - todo tipo de
  lexicon: HALOT
  rationale: El valor distributivo de כָּל se puede expresar naturalmente en español con «todo», que aquí suena bien junto a «discurso» y mantiene la amplitud de la exhortación.
- source_word: שִׂיחָה
  english_pob_choice: discourse
  chosen_spanish: discurso
  alternatives_spanish:
  - conversación
  - habla
  - plática
  - discusión
  lexicon: HALOT
  rationale: «Discurso» preserva el campo amplio de habla/instrucción sin reducirlo a conversación casual y encaja con un contexto sapiencial.
- source_word: חֲפוֹץ
  english_pob_choice: Be eager
  chosen_spanish: Desea
  alternatives_spanish:
  - Apresúrate a oír
  - Ten deseo de
  lexicon: HALOT
  rationale: El imperativo exhortativo se transmite con un verbo de voluntad en español. «Desea» conserva la idea de disposición interna; en una lectura más marcada podría ser «ten deseo de», pero esa forma resulta menos fluida.
- source_word: לִשְׁמֹעַ
  english_pob_choice: to hear
  chosen_spanish: escuchar
  alternatives_spanish:
  - oír
  - prestar atención a
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «oír», en español «escuchar» expresa mejor la atención activa requerida por el contexto sapiencial. Se mantiene la diferencia entre oír pasivamente y escuchar con intención.
- source_word: וּמְשַׁל
  english_pob_choice: a proverb
  chosen_spanish: un proverbio
  alternatives_spanish:
  - un dicho
  - una máxima
  - una parábola
  lexicon: HALOT
  rationale: En literatura sapiencial, מָשָׁל/מְשַׁל suele equivaler a «proverbio». Es la opción más clara y estable en español.
- source_word: בִּינָה
  english_pob_choice: of understanding
  chosen_spanish: de entendimiento
  alternatives_spanish:
  - de discernimiento
  - de sabiduría
  - entendido
  lexicon: HALOT
  rationale: «Entendimiento» reproduce bien el sustantivo abstracto y evita decidir en exceso entre comprensión, discernimiento o sabiduría. Conserva la relación genitiva del hebreo.
- source_word: אַ ל יֵצְאֶךָּ
  english_pob_choice: do not let ... escape you
  chosen_spanish: no dejes que ... se te escape
  alternatives_spanish:
  - no permitas que ... te pase de largo
  - no lo pierdas de vista
  - no dejes que ... salga de ti
  lexicon: HALOT
  rationale: La idiomática hebrea de «salir» o «pasar» se comunica en español con la expresión natural «se te escape», que mantiene el sentido de no dejar perder una enseñanza valiosa.
theological_decisions:
- issue: Mismatched Hebrew and Greek witnesses in Sirach 6:34
  english_pob_reading: The main English text follows the Hebrew witness; the Greek parallel is noted in a footnote as a distinct but related wisdom exhortation.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado y deja constancia, en nota, de la lectura griega paralela como testimonio diferente.
  alternative_spanish_readings:
  - «Ponte en pie entre los ancianos; y si alguien es sabio, júntate con él»
  - «Quédate entre los mayores y únete al sabio»
  rationale: El expediente indica una discrepancia mayor entre el hebreo y el griego. Dado que el hebreo está presente con alta confianza, gobierna la línea principal. La versión griega se preserva solo como nota de variante paralela, sin importarla al texto principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácida desde el hebreo donde sobrevive; usar el griego como testimonio paralelo sin desplazar la lectura principal.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador se mantiene conforme al pass final sin ajustes pendientes.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el Nombre divino.
  - Se mantiene «proverbio» para מְשַׁל conforme al uso sapiencial.
  - Se evita una traducción literal rígida de «oír» para no perder la fuerza exhortativa en español.
  - La nota al pie conserva la tensión textual entre hebreo y griego sin mezclar ambos en el cuerpo principal.
