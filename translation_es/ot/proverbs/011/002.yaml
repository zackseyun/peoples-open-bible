translation:
  language: es
  text: Cuando viene la arrogancia[a], viene también la deshonra, pero con los humildes hay sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando viene el orgullo, viene también la vergüenza»'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּא
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - entra
  lexicon: HALOT
  rationale: En un proverbio gnómico, el perfecto hebreo expresa una verdad general; en español, el presente atemporal «viene» reproduce mejor ese valor que un pasado. «Viene» además mantiene la brevedad y la naturalidad del paralelismo.
- source_word: זָדוֹן
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - orgullo
  - presunción
  - insolencia
  lexicon: HALOT
  rationale: El término apunta a soberbia presuntuosa, no solo a una autoestima elevada. «Arrogancia» expresa con claridad la falta moral y conserva el contraste con «humildes».
- source_word: וַיָּבֹא
  english_pob_choice: comes also
  chosen_spanish: viene también
  alternatives_spanish:
  - entonces viene
  - y viene
  lexicon: HALOT
  rationale: La secuencia waw-consecutiva continúa la segunda mitad del dicho como resultado correlativo. «Viene también» conserva la idea de acompañamiento y la simetría del proverbio.
- source_word: קָלוֹן
  english_pob_choice: disgrace
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - ignominia
  - desprestigio
  lexicon: HALOT
  rationale: Aunque puede implicar deshonra pública, en español «vergüenza» comunica de forma más natural el efecto moral y social del término dentro del paralelismo proverbial. Se mantiene la tensión con «arrogancia» sin forzar un registro excesivamente técnico.
- source_word: וְאֶת
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - entre
  - junto con
  lexicon: HALOT
  rationale: La función relacional de אֶת en esta construcción se expresa de manera natural como «con», siguiendo el valor asociativo que la POB inglesa documenta. En español, «con los humildes» preserva la antítesis del proverbio.
- source_word: צְנוּעִים
  english_pob_choice: the humble
  chosen_spanish: los humildes
  alternatives_spanish:
  - los modestos
  - los sencillos
  - los discretos
  lexicon: HALOT
  rationale: El adjetivo describe a personas modestas, no ostentosas, y en este contexto ético se corresponde mejor con «humildes». «Los humildes» es idiomático y retiene el contraste moral con la arrogancia.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - buena conducta
  lexicon: HALOT
  rationale: Es el término sapiencial estándar. «Sabiduría» conserva el sustantivo de forma directa y mantiene la brevedad sentenciosa del hebreo.
translation_notes:
  revision_awareness: La fuente hebrea y el audit trail inglés están en alto acuerdo; no se documentan revisiones textuales ni cambios sustantivos. La versión española sigue la misma lectura proverbial y conserva el paralelismo antitético sin introducir interpretaciones adicionales.
  spanish_consistency_notes:
  - Se mantiene el presente gnómico para reflejar el valor proverbial del hebreo.
  - Se traduce אֶת como relación asociativa («con») siguiendo la decisión auditada en inglés.
  - Se preserva la antítesis semántica entre la soberbia inicial y la sabiduría final sin suavizarla.
  - El pie de nota recoge la alternativa léxica principal documentada en el audit trail inglés.
