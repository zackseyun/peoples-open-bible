  text: אִם לֹ֣א יָ֭שׁוּב חַרְבּ֣/וֹ יִלְט֑וֹשׁ קַשְׁתּ֥/וֹ דָ֝רַ֗ךְ וַֽ/יְכוֹנְנֶֽ/הָ־׃
