  revision_rationale: Se ajustó ‘corredores’ a ‘mensajeros’ en el texto principal para evitar ambigüedad en español, preservando el literal en nota. Se añadió la nota sobre la intensificación de la tríada verbal, presente en la auditoría inglesa. Se reemplazó ‘apoderarse de sus bienes’ por ‘saquear sus bienes’ para reflejar el matiz de botín/despojo del hebreo. Se refinó levemente la fecha para mayor claridad y tono bíblico natural.
