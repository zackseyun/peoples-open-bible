  chosen_spanish: Abimael
  lexicon: HALOT
  rationale: Nombre propio transliterado conforme al uso establecido; no se descompone ni se traduce su sentido interno en una genealogía.
- source_word: שְׁבָא
  english_pob_choice: Sheba
  chosen_spanish: Seba
  alternatives_spanish:
  - Sheba
  lexicon: HALOT
  rationale: El contexto apunta al nombre hebreo שְׁבָא. En español, «Seba» es una transliteración más natural y consistente con el valor de la forma hebrea; se evita confundirlo con otros nombres bíblicos similares.
