review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: hay una hambruna en la tierra, distinta de la anterior en tiempos de Abraham, e Isaac va a Abimelec, rey de los filisteos. Sin embargo, no sigue del todo el rastro auditado del POB en dos puntos: el anclaje de la nota [a] está puesto en «tierra» cuando la alternativa textual corresponde a la frase final sobre Gerar, y la nota española presenta la forma «Gerará», que no es una forma española natural ni necesaria. Además, «a Gerar» en el texto principal es defendible desde el hebreo, pero el POB inglés eligió «at Gerar» como lectura principal con nota alternativa; conviene reflejar esa misma decisión salvo razón fuerte en contra.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene dos giros poco naturales en registro bíblico moderno: «el primer hambre» suena menos idiomático que «la primera hambruna» o «la primera hambre», y «que había habido» es gramatical pero pesado. También «Ahora bien» funciona, aunque «Hubo» o «Y hubo» sería más sobrio; no es un error. La revisión propuesta mejora naturalidad sin apartarse del hebreo ni del audit trail.'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé, Mesías o esclavo. «Filisteos» y «Abimelec» están bien. La cuestión principal es sintáctica/lexical: conviene alinear la decisión sobre גְּרָרָה con la lectura principal auditada («en Gerar») y reservar «a Gerar» para la nota alternativa.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en «tierra», pero su contenido trata sobre Gerar.
    rationale: Las instrucciones requieren que cada nota se ancle exactamente en la palabra o frase pertinente. Aquí la alternativa «a Gerar / en Gerar» corresponde al topónimo final, no a «la tierra».
  - severity: medium
    issue: La forma principal «a Gerar» no sigue la decisión principal del POB inglés.
    rationale: El hebreo permite dirección hacia Gerar, pero el audit trail documenta que la lectura principal inglesa es locativa («at Gerar»), dejando la direccional en nota. El español debe preservar esa decisión salvo necesidad fuerte, que aquí no se demuestra.
  - severity: medium
    issue: La nota dice «Gerará».
    rationale: Aunque intenta reflejar גְּרָרָה con he direccional, «Gerará» no es una forma española establecida ni ayuda a la legibilidad. Basta explicar que la forma hebrea de «Gerar» lleva terminación direccional.
  - severity: low
    issue: «el primer hambre» y «que había habido» suenan algo forzados en español.
    rationale: No distorsionan el sentido, pero un ajuste a «la primera hambruna» y «que hubo» mejora legibilidad. Si se desea conservar más de cerca «hambre», también podría decirse «la primera hambre que hubo».
  revised_spanish_text: Ahora bien, hubo hambre en la tierra, además de la primera hambruna que hubo en los días de Abraham. Así que Isaac fue a Abimelec, rey de los filisteos, en Gerar[a].
  revised_footnotes:
  - marker: a
    text: O «a Gerar». La forma hebrea de «Gerar» incluye una terminación direccional, que puede señalar movimiento hacia Gerar.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al lugar correcto, se alinea la lectura principal de Gerar con el POB auditado («en Gerar») y se mejora la naturalidad del español sin perder el sentido del hebreo.
