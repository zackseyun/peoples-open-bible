translation:
  language: es
  text: Los sidonios, Amalec[a] y Maón[b] los oprimieron, y ustedes clamaron a mí, y yo los salvé de su mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los amalecitas». El hebreo dice «Amalec», que puede representar al pueblo en conjunto.
    reason: lexical_alternative
  - marker: b
    text: O «los maonitas». El hebreo dice «Maón», probablemente con referencia a un grupo de personas asociado con ese lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: צִידוֹנִים
  english_pob_choice: The Sidonians
  chosen_spanish: los sidonios
  alternatives_spanish:
  - la gente de Sidón
  lexicon: HALOT
  rationale: El hebreo usa un plural gentilicio; en español, «sidonios» conserva el valor étnico y la concisión del nombre de pueblo, igual que «Sidonians» en la revisión inglesa.
- source_word: עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - los amalecitas
  lexicon: HALOT
  rationale: El texto hebreo nombra «Amalec» como nombre propio que puede designar al grupo. Mantener «Amalec» sigue de cerca el texto fuente; «los amalecitas» explicita el colectivo, pero añade interpretación que el hebreo no expresa de forma obligatoria.
- source_word: מָעוֹן
  english_pob_choice: Maon
  chosen_spanish: Maón
  alternatives_spanish:
  - los maonitas
  lexicon: HALOT
  rationale: La forma hebrea presenta un nombre propio. «Maón» respeta esa forma; la alternativa «los maonitas» puede aclarar un grupo de personas asociado con Maón, pero no es la lectura más cercana al texto consonántico.
- source_word: לָחֲצוּ
  english_pob_choice: oppressed
  chosen_spanish: los oprimieron
  alternatives_spanish:
  - los apremiaron
  - los afligieron
  lexicon: HALOT
  rationale: El verbo expresa presión hostil, opresión o aflicción. «Oprimieron» es natural en español y mantiene la fuerza histórica y teológica del dominio enemigo.
- source_word: וַתִּצְעֲקוּ אֵלַי
  english_pob_choice: you cried out to me
  chosen_spanish: clamaron a mí
  alternatives_spanish:
  - clamaron a mí en su angustia
  - gritaron a mí
  lexicon: HALOT
  rationale: En español, «clamar» conserva la fuerza de súplica desesperada y el movimiento dirigido hacia Dios. Uso «a mí» para reflejar el hebreo y evitar una paráfrasis más libre.
- source_word: וָאוֹשִׁיעָה
  english_pob_choice: I saved
  chosen_spanish: yo los salvé
  alternatives_spanish:
  - yo los libré
  lexicon: HALOT
  rationale: El verbo ישׁע se traduce con «salvar» para preservar la conexión bíblica de salvación/liberación. «Libré» es posible, pero «salvé» sigue mejor la decisión inglesa y la raíz original.
- source_word: מִיָּדָם
  english_pob_choice: from their hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de su poder
  - de sus manos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. «De su mano» mantiene el giro bíblico y permite conservar el matiz de poder o dominio sin explicitarlo demasiado en el texto principal.
translation_notes:
  revision_awareness: Se verificó el pasaje contra el hebreo WLC y el trazado auditado en inglés. No hubo revisiones aplicadas en la última pasada; la versión inglesa fue confirmada con alto acuerdo, así que la traducción española sigue de cerca el texto fuente y conserva las alternativas léxicas documentadas en notas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando aparezca el nombre divino; aquí no ocurre.
  - 'Se conserva el paralelismo verbal del original: opresión → clamor → salvación.'
  - Se preserva el valor de nombres propios y etnónimos sin expandir innecesariamente a formas interpretativas en el texto principal.
