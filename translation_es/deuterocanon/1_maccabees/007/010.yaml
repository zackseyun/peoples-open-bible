translation:
  language: es
  text: Y partió y llegó a la tierra de Judá con una gran fuerza, y envió mensajeros a Judas y a sus hermanos con palabras de paz[a], pero con engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «palabras de paz... con engaño». El griego contrapone una comunicación exteriormente pacífica con una intención engañosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθεν
  english_pob_choice: departed
  chosen_spanish: partió
  alternatives_spanish:
  - se fue
  - salió
  lexicon: LSJ
  rationale: El aoristo de ἀπέρχομαι marca salida o partida desde un lugar previo. «Partió» conserva ese movimiento sin añadir detalles no presentes en el griego.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: LSJ
  rationale: Emparejado con «partió», el verbo indica la llegada al destino. «Llegó» es natural en español y mantiene la secuencia narrativa simple.
- source_word: μετὰ δυνάμεως πολλῆς
  english_pob_choice: with a large force
  chosen_spanish: con un gran ejército
  alternatives_spanish:
  - con una gran fuerza
  - con mucho poder
  lexicon: LSJ
  rationale: En contexto militar, δύναμις puede referirse a tropas o fuerza armada. «Ejército» explicita el sentido militar que el contexto exige; «gran» conserva πολλῆς.
- source_word: γῆν Ἰούδα
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - el territorio de Judá
  - Judá
  lexicon: LSJ
  rationale: El griego incluye γῆ, por lo que conviene conservar el matiz territorial con «la tierra de Judá».
- source_word: ἀπέστειλεν ἀγγέλους
  english_pob_choice: sent messengers
  chosen_spanish: envió mensajeros
  alternatives_spanish:
  - envió enviados
  - mandó mensajeros
  lexicon: LSJ
  rationale: Aquí ἀγγέλους se refiere a emisarios humanos, no a seres celestiales. «Mensajeros» es preciso y natural en español.
- source_word: πρὸς Ἰούδαν
  english_pob_choice: to Judas
  chosen_spanish: a Judas
  alternatives_spanish:
  - hacia Judas
  lexicon: LSJ
  rationale: La construcción con πρός y acusativo tras «envió» se traduce idiomáticamente con «a».
- source_word: τοὺς ἀδελφοὺς αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus parientes varones
  - a sus hermanos de sangre
  lexicon: LSJ
  rationale: El griego dice literalmente «sus hermanos»; se conserva esa lectura sin suavizarla a un término más amplio.
- source_word: λόγους εἰρηνικοὺς
  english_pob_choice: peaceful words
  chosen_spanish: con palabras de paz
  alternatives_spanish:
  - con palabras pacíficas
  - con palabras conciliadoras
  lexicon: LSJ
  rationale: La expresión describe el contenido aparente del mensaje. «Palabras de paz» refleja bien εἰρηνικούς y suena natural en español bíblico moderno.
- source_word: μετὰ δόλου
  english_pob_choice: but with deceit
  chosen_spanish: pero con engaño
  alternatives_spanish:
  - con fraude
  - con dolo
  - con astucia
  lexicon: LSJ
  rationale: El griego contrapone la apariencia pacífica con la intención engañosa. «Pero con engaño» comunica el contraste; se conserva la tensión del texto entre paz aparente y fraude real.
theological_decisions:
- issue: Contraste entre intención pacífica aparente e intención engañosa
  english_pob_reading: The Greek contrasts outwardly peaceful speech with deceptive intent.
  chosen_spanish_reading: 'El español mantiene el contraste: «palabras de paz, pero con engaño».'
  alternative_spanish_readings:
  - palabras de paz... con engaño
  - palabras pacíficas, pero con engaño
  - palabras de paz, pero con dolo
  rationale: No hay que suavizar el choque semántico del versículo. La coordinación adversativa preserva la idea de una embajada verbalmente pacífica, pero fraudulentamente motivada.
  doctrine_reference: Ética bíblica sobre la verdad y la falsedad; cf. Prov 12:22; Sal 55:21.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete 1909 y el audit trail inglés sin cambios necesarios; no se introdujeron revisiones posteriores. La decisión principal fue resolver δυνάμεως como «ejército» por el contexto militar, manteniendo la ambigüedad relativa del original solo en la medida en que el español lo permite.
  spanish_consistency_notes:
  - Se mantiene «Judá» para el territorio histórico, coherente con el uso de nombres propios bíblicos en español.
  - Se usó «palabras de paz» en lugar de «palabras pacíficas» para conservar el sustantivo explícito del griego.
  - «Engaño» se prefirió a «dolo» por claridad moderna, aunque se preserva la nota alternativa.
  - No se emplea «SEÑOR» ni terminología cristológica; el versículo no contiene nombres divinos ni títulos mesiánicos.
