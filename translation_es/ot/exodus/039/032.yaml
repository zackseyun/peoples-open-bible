translation:
  language: es
  text: Así quedó terminada toda la obra del tabernáculo, la tienda de reunión, y los hijos de Israel[a] hicieron conforme a todo lo que Yahvé[b] había mandado a Moisés; así hicieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas».
    reason: lexical_alternative
  - marker: b
    text: «Yahvé» representa el nombre divino YHWH; alternativamente, «Yahweh».
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֵּכֶל
  english_pob_choice: was finished
  chosen_spanish: fue terminada
  alternatives_spanish:
  - quedó terminada
  - se completó
  lexicon: HALOT
  rationale: El hebreo expresa la conclusión de la obra. En español, la pasiva perifrástica 'fue terminada' conserva el foco en la obra concluida y suena natural en registro bíblico moderno.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - todo el
  - la totalidad de
  lexicon: HALOT
  rationale: '''Toda'' transmite la fuerza inclusiva de כָּל sin volver la frase pesada en español.'
- source_word: עֲבֹדַת
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la labor
  lexicon: HALOT
  rationale: En este contexto se trata del trabajo de construcción del santuario, no de servicio litúrgico. 'Obra' comunica bien el conjunto de labores realizadas y mantiene dignidad estilística.
- source_word: מִשְׁכַּן
  english_pob_choice: tabernacle
  chosen_spanish: tabernáculo
  alternatives_spanish:
  - morada
  - dwellling place
  lexicon: HALOT
  rationale: '''Tabernáculo'' es el término castellano establecido para el santuario portátil de Éxodo y corresponde al valor contextual del hebreo.'
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda de encuentro
  - la tienda del encuentro
  lexicon: HALOT
  rationale: El hebreo designa el lugar señalado para la reunión con Dios. 'Tienda de reunión' reproduce con fidelidad la expresión y es comprensible en español sin forzar una paráfrasis.
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - cumplieron
  - realizaron
  lexicon: HALOT
  rationale: Aquí עשה resume la obediencia de Israel a la orden divina. 'Hicieron' mantiene la relación con la cláusula siguiente y evita añadir una noción más interpretativa que 'cumplieron'.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión filiar del hebreo, siguiendo la preferencia por precisión morfológica y la práctica de POB de exponer la forma original.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  lexicon: HALOT
  rationale: '''Conforme a'' refleja bien la conformidad total expresada por la construcción hebrea y suena natural en español bíblico actual.'
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había commandado
  lexicon: HALOT
  rationale: '''Mandado'' preserva la fuerza de la orden divina en un castellano claro y idiomático. El pluscuamperfecto ayuda a mostrar que el mandato precedía a la obra terminada.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El nombre divino se vierte como 'Yahvé' en español, siguiendo la convención terminológica del proyecto para conservar el nombre propio del pacto, no una sustitución titulada.
- source_word: כֵּן עָשׂוּ
  english_pob_choice: so they did
  chosen_spanish: así hicieron
  alternatives_spanish:
  - así lo hicieron
  - de ese modo lo hicieron
  lexicon: HALOT
  rationale: La repetición final enfatiza la obediencia exacta. 'Así hicieron' conserva la concisión y el énfasis del hebreo sin perder naturalidad.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrama. En la edición española se mantiene el nombre divino como 'Yahvé', preservando la referencia personal del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión corporativa בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la forma familiar masculina del hebreo para no borrar la huella textual, entendiendo la expresión en sentido corporativo nacional.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta propuesta mantiene la misma lectura de fondo, ajustándola al español con equivalentes directos y registro publicable. El único desvío deliberado respecto del inglés de contexto es el uso de 'Yahvé' conforme a la terminología española del proyecto.
  spanish_consistency_notes:
  - 'Se mantiene la secuencia de la oración hebrea: conclusión de la obra, obediencia de Israel y clausula enfática final.'
  - '''Tienda de reunión'' se usa de forma consistente para אֹהֶל מוֹעֵד.'
  - El nombre divino se uniforma como 'Yahvé' en el texto principal; la nota aclara la relación con la forma inglesa de audición.
  - '''Hijos de Israel'' se conserva por fidelidad morfológica, aunque ''israelitas'' quedaría como alternativa idiomática.'
  - La nota al pie se ancla en 'Yahvé' para transparentar la decisión sobre el Tetragrama.
