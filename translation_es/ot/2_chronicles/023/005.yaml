translation:
  language: es
  text: una tercera parte estará en la casa del rey, otra tercera parte en la Puerta del Fundamento[a], y todo el pueblo en los atrios de la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la puerta del fundamento». El hebreo puede conservar un nombre específico de puerta; por eso se traduce aquí como «Puerta del Fundamento».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשְּׁלִשִׁית
  english_pob_choice: one third
  chosen_spanish: una tercera parte
  alternatives_spanish:
  - un tercio
  - la tercera parte
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo ordinal con artículo en sentido distributivo. En español, «una tercera parte» comunica con claridad la división del grupo y evita un calco rígido.
- source_word: בְּבֵית הַמֶּלֶךְ
  english_pob_choice: at the king’s house
  chosen_spanish: en la casa del rey
  alternatives_spanish:
  - en la casa real
  - en el palacio del rey
  lexicon: HALOT
  rationale: «Casa» conserva la literalidad del hebreo בַּיִת y, en este contexto, designa la residencia o complejo real. «Palacio» sería más interpretativo.
- source_word: בְּשַׁעַר הַיְסוֹד
  english_pob_choice: at the Foundation Gate
  chosen_spanish: en la Puerta del Fundamento
  alternatives_spanish:
  - en la puerta del fundamento
  - en la Puerta de los cimientos
  lexicon: HALOT
  rationale: La POB inglesa trata la expresión como posible nombre propio de una puerta. En español, la capitalización de «Puerta del Fundamento» mantiene esa posibilidad sin forzar una paráfrasis.
- source_word: וְכָל הָעָם
  english_pob_choice: and all the people
  chosen_spanish: y todo el pueblo
  alternatives_spanish:
  - y toda la gente
  - y toda la asamblea
  lexicon: HALOT
  rationale: «Pueblo» es el equivalente más natural y fiel para עָם en este contexto narrativo. «Asamblea» introduciría una carga más técnica de la que el hebreo exige aquí.
- source_word: בְּחַצְרֹת
  english_pob_choice: in the courts
  chosen_spanish: en los atrios
  alternatives_spanish:
  - en los patios
  - en los recintos
  lexicon: HALOT
  rationale: En contexto del templo, חַצְרוֹת se refiere a espacios cerrados de acceso/culto. «Atrios» es el término español más adecuado y tradicionalmente inteligible para esos espacios.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahveh
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva «casa» para בֵּית y «Yahvé» para יְהוָה, conforme al estándar del proyecto. Se evita «templo» porque el hebreo dice literalmente «casa» y ese matiz debe quedar visible.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo contiene el Tetragrama directamente. Siguiendo la norma del proyecto en español, se traduce como «Yahvé» para preservar el nombre del pacto, no como una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Posible nombre propio en שַׁעַר הַיְסוֹד
  english_pob_reading: Foundation Gate
  chosen_spanish_reading: Puerta del Fundamento
  alternative_spanish_readings:
  - puerta del fundamento
  - puerta de los cimientos
  rationale: La evidencia permite leer la expresión como nombre de puerta. Mantenerla con mayúsculas en español preserva esa posibilidad y evita decidir indebidamente entre nombre propio y descripción común.
  doctrine_reference: English audit footnote a; lexical alternative for gate name
translation_notes:
  revision_awareness: El pasaje muestra acuerdo alto entre la fuente hebrea y la auditoría inglesa; no se registran revisiones posteriores que alteren la segmentación, el orden de cláusulas ni la identificación de la Puerta del Fundamento. La decisión española sigue esa lectura estable, conservando la ambigüedad del topónimo mediante una nota breve.
  spanish_consistency_notes:
  - Se mantiene «casa de Yahvé» de forma consistente con la terminología del proyecto y con el valor literal de בֵּית יְהוָה.
  - Se evita «SEÑOR» como sustituto del nombre divino, ya que el versículo contiene explícitamente יְהוָה.
  - «Atrios» se usa en sentido templario, no como simple patio doméstico, para reflejar el contexto cultual del pasaje.
  - La numeración distributiva se expresa con «una tercera parte» para un español natural y preciso.
