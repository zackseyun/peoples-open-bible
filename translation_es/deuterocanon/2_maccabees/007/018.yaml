  yaml_path: translation/deuterocanon/2_maccabees/007/018.yaml
  text: After him they brought the sixth[a], and as he was about to die he said, “Do not be deceived; for we are suffering these things because of ourselves, having sinned against our own God[b]. Astonishing things have happened.”
  footnotes:
