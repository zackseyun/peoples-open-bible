base_translation:
  language: en
  yaml_path: translation/ot/leviticus/012/006.yaml
  text: And when the days of her purification are completed[a], whether for a son or for a daughter, she shall bring a year-old lamb for a burnt offering, and a young pigeon or a turtledove for a sin offering, to the priest at the entrance of the tent of meeting.
  footnotes:
  - marker: a
    text: Or 'for a purification offering.' The Hebrew term can denote the offering used to remove ritual impurity, not only an offering for moral transgression.
    reason: lexical_alternative
