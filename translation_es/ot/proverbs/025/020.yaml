base_translation:
  language: en
  yaml_path: translation/ot/proverbs/025/020.yaml
  text: Like one who takes off a garment on a cold day[a], and like vinegar on soda[b], is one who sings songs to a troubled heart.
  footnotes:
  - marker: a
    text: Or 'vinegar on natron'—that is, on a mineral alkali. The image is of an irritating or disruptive reaction.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to/over a bad heart'; here 'bad' refers to a distressed or sorrowful inner condition, not necessarily moral evil.
    reason: lexical_alternative
