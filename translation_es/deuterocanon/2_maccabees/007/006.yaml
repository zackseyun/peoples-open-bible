    reason: lexical_alternative
  - marker: b
    text: La cita evoca Deuteronomio 32:36, donde se dice que Yahvé se mueve respecto de sus siervos o esclavos.
    reason: cross_reference
  - marker: c
    text: O «que da testimonio de frente». El giro griego κατὰ πρόσωπον expresa la idea de manera directa o abierta.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota c corrupta, se alinea κύριος con la política del proyecto usando «Yahvé», y se mejora la naturalidad y precisión del español en la cláusula final. También se ajusta «es movido a compasión» a «se mueve a compasión» por mejor legibilidad española sin cambiar la decisión semántica central del pasaje.
