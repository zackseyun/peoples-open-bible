base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/002/011.yaml
  text: Then I turned to consider all the works that my hands had done[a], and the labor at which I had labored to do them; and behold, all was vanity and a striving after wind[c][b], and there was no profit under the sun.
