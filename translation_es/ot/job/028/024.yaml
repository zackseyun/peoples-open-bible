translation:
  language: es
  text: Porque él mira hasta los confines de la tierra[a]; ve debajo de todos los cielos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta las más lejanas regiones de la tierra».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «debajo de todos los cielos», con «cielos» en plural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en efecto
  lexicon: HALOT
  rationale: Introduce la razón o explicación del enunciado anterior; «Porque» conserva la fuerza explicativa de כִּי con un español natural y directo.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - Él
  lexicon: HALOT
  rationale: El pronombre retoma a Dios en el contexto inmediato. En español, «él» mantiene la referencia personal sin añadir nada al texto.
- source_word: לִקְצוֹת הָאָרֶץ
  english_pob_choice: to the ends of the earth
  chosen_spanish: hasta los confines de la tierra
  alternatives_spanish:
  - hasta los extremos de la tierra
  - hasta los últimos rincones de la tierra
  lexicon: HALOT
  rationale: La expresión hebrea señala los límites remotos de la tierra. «Los confines de la tierra» es idiomático, solemne y mantiene la imagen de amplitud total. La preposición «hasta» expresa bien la dirección del mirar.
- source_word: יַבִּיט
  english_pob_choice: looks
  chosen_spanish: mira
  alternatives_spanish:
  - observa
  - dirige la mirada
  lexicon: HALOT
  rationale: El verbo indica mirar con dirección hacia algo. «Mira» conserva la sencillez del hebreo y evita intensificar sin necesidad.
- source_word: תַּחַת כָּל הַשָּׁמַיִם
  english_pob_choice: under all the heavens
  chosen_spanish: debajo de todos los cielos
  alternatives_spanish:
  - bajo todos los cielos
  - debajo de todo el cielo
  lexicon: HALOT
  rationale: Se preserva la imagen espacial y el plural hebreo «los cielos». «Debajo de todos los cielos» refleja la amplitud distributiva de כָּל y evita neutralizar el plural.
- source_word: יִרְאֶה
  english_pob_choice: he sees
  chosen_spanish: ve
  alternatives_spanish:
  - ve claramente
  - observa
  lexicon: HALOT
  rationale: ראה es el verbo común «ver». «Ve» mantiene el paralelismo con «mira» y la correspondencia léxica básica sin sobreinterpretar.
theological_decisions:
- issue: Referencia del sujeto implícito a Dios
  english_pob_reading: The subject is God, continuing the description of his exhaustive knowledge.
  chosen_spanish_reading: El sujeto implícito se entiende como Dios, continuando la descripción de su conocimiento exhaustivo.
  alternative_spanish_readings:
  - El pronombre se refiere al hombre sabio mencionado antes.
  - El texto deja el referente abierto.
  rationale: En el contexto de Job 28, la línea continúa la afirmación sobre quien conoce la sabiduría y examina toda la creación. La identificación con Dios se deriva del contexto y no añade contenido ajeno al versículo.
  doctrine_reference: Preservar la identificación contextual del sujeto sin resolver tensiones inexistentes.
translation_notes:
  revision_awareness: El inglés POB mantiene una nota para «the ends of the earth» y otra para el hebreo «under all the heavens»; la versión española conserva ambas distinciones y respeta el plural de «cielos». No se registran revisiones posteriores que alteren esta lectura.
  spanish_consistency_notes:
  - Se emplea «Yahvé» en este proyecto cuando el hebreo lo exija; aquí el sujeto se identifica por contexto como Dios sin nombrarlo explícitamente.
  - «Cielos» se mantiene en plural para reflejar el hebreo y la nota auditada.
  - 'La sintaxis conserva el paralelismo verbal: «mira ... ve».'
