translation:
  language: es
  text: 'Ahora, en el duodécimo mes[a], es decir, el mes de Adar, el día trece de ese mes, cuando debía cumplirse la palabra del rey y su decreto, el día en que los enemigos de los judíos habían esperado tener dominio sobre ellos, sucedió lo contrario[b]: los judíos mismos tuvieron dominio sobre los que los odiaban.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el mes duodécimo».
    reason: lexical_alternative
  - marker: b
    text: 'También: «se revirtió» o «se volvió al revés».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִשְׁנֵים עָשָׂר חֹדֶשׁ
  english_pob_choice: Now in the twelfth month
  chosen_spanish: Ahora, en el duodécimo mes
  alternatives_spanish:
  - Y en el duodécimo mes
  - En el duodécimo mes
  lexicon: HALOT
  rationale: El hebreo abre con una transición temporal narrativa. «Ahora» comunica bien el giro del relato en español moderno sin perder el valor temporal de la construcción.
- source_word: הוּא חֹדֶשׁ אֲדָר
  english_pob_choice: that is, the month Adar
  chosen_spanish: es decir, el mes de Adar
  alternatives_spanish:
  - que es el mes de Adar
  - o sea, el mes de Adar
  lexicon: HALOT
  rationale: La construcción explicativa identifica el duodécimo mes. «Es decir» conserva el matiz apposicional de clarificación y suena natural en español.
- source_word: בִּשְׁלוֹשָׁה עָשָׂר יוֹם בּוֹ
  english_pob_choice: on the thirteenth day of it
  chosen_spanish: el día trece de él
  alternatives_spanish:
  - el día trece de ese mes
  - el trece de ese mes
  lexicon: HALOT
  rationale: Se conserva el sufijo pronominal con una referencia explícita al mes. «De él» refleja el hebreo con fidelidad y sigue siendo comprensible en español.
- source_word: אֲשֶׁר הִגִּיעַ דְּבַר הַמֶּלֶךְ וְדָתוֹ לְהֵעָשׂוֹת
  english_pob_choice: when the king’s word and his decree were to be carried out
  chosen_spanish: cuando debía cumplirse la palabra del rey y su decreto
  alternatives_spanish:
  - cuando llegó la palabra del rey y su decreto para ejecutarse
  - cuando había llegado la palabra del rey y su decreto para ser cumplidos
  lexicon: HALOT
  rationale: El hebreo usa «llegar» idiomáticamente para el momento de ejecución. En español, «debía cumplirse» expresa de manera natural el tiempo señalado para la implementación, y «palabra»/«decreto» conserva la distinción léxica entre דְּבַר y דָת.
- source_word: בַּיּוֹם אֲשֶׁר
  english_pob_choice: on the day when
  chosen_spanish: en el día en que
  alternatives_spanish:
  - el día en que
  - en el mismo día en que
  lexicon: HALOT
  rationale: La relación temporal se expresa de forma directa y legible. «En el día en que» mantiene el énfasis del hebreo sin sobredeterminarlo.
- source_word: שִׂבְּרוּ
  english_pob_choice: had hoped
  chosen_spanish: habían esperado
  alternatives_spanish:
  - habían confiado
  - esperaban
  lexicon: HALOT
  rationale: El verbo hebreo expresa expectativa/esperanza. «Habían esperado» conserva el sentido y el contraste irónico del contexto.
- source_word: אֹיְבֵי הַיְּהוּדִים
  english_pob_choice: the enemies of the Jews
  chosen_spanish: los enemigos de los judíos
  alternatives_spanish:
  - los enemigos de los judíos
  - los enemigos del pueblo judío
  lexicon: HALOT
  rationale: Se mantiene la relación posesiva del hebreo de forma transparente y sin suavizar la referencia.
- source_word: לִשְׁלֹט בָּהֶם
  english_pob_choice: to rule over them
  chosen_spanish: dominar sobre ellos
  alternatives_spanish:
  - gobernar sobre ellos
  - tener dominio sobre ellos
  lexicon: HALOT
  rationale: שׁלט admite la idea de dominio/autoridad. Dado el paralelismo con el siguiente miembro y la carga de poder, «dominar sobre» preserva el alcance semántico fuerte que el inglés auditado también retuvo.
- source_word: וְנַהֲפוֹךְ הוּא
  english_pob_choice: the opposite happened
  chosen_spanish: sucedió lo contrario
  alternatives_spanish:
  - todo se invirtió
  - fue lo contrario
  lexicon: HALOT
  rationale: La expresión idiomática anuncia una inversión sorpresiva. «Sucedió lo contrario» comunica bien el giro narrativo sin perder la fuerza idiomática.
- source_word: אֲשֶׁר יִשְׁלְטוּ הַיְּהוּדִים הֵמָּה
  english_pob_choice: the Jews themselves ruled
  chosen_spanish: los judíos mismos dominaron
  alternatives_spanish:
  - los judíos mismos gobernaron
  - los mismos judíos dominaron
  lexicon: HALOT
  rationale: «Ellos mismos»/«los judíos mismos» conserva el énfasis de הֵמָּה. «Dominaron» mantiene la correspondencia con שׁלט en el contexto de supremacía sobre los enemigos.
- source_word: בְּשֹׂנְאֵיהֶם
  english_pob_choice: over those who hated them
  chosen_spanish: a los que los odiaban
  alternatives_spanish:
  - sobre los que los odiaban
  - sobre sus odiadores
  lexicon: HALOT
  rationale: El participio verbal se traduce como una relativa natural en español. Se integra el complemento de gobierno por el contexto sin forzar una construcción pesada.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail en inglés y no se detectaron revisiones posteriores que alteraran el sentido base. La redacción española intenta conservar la cronología, la distinción entre «palabra» y «decreto», y la ironía de la inversión final.
  spanish_consistency_notes:
  - Se mantuvo «judíos» para coherencia con el texto fuente y con el audit trail en inglés.
  - Se evitó «SEÑOR» u otras sustituciones, porque el versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se preservó el contraste verbal entre el plan de los enemigos y la inversión culminante mediante «sucedió lo contrario».
