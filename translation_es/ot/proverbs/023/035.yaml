translation:
  language: es
  text: Me golpearon[a], pero no quedé herido; me pegaron, pero no lo supe. ¿Cuándo despertaré? Lo[b] buscaré otra vez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Me golpearon, pero no lo sentí; me pegaron, pero no fui consciente». El hebreo permite matices ligeramente distintos de lesión, dolor o percepción.'
    reason: lexical_alternative
  - marker: b
    text: El pronombre de «Lo buscaré otra vez» probablemente se refiere al vino o a la bebida fuerte por el contexto cercano.
    reason: cross_reference
lexical_decisions:
- source_word: הִכּוּנִי
  english_pob_choice: They struck me
  chosen_spanish: Me golpearon
  alternatives_spanish:
  - Me hirieron
  - Me pegaron
  lexicon: HALOT
  rationale: נכה expresa un golpe violento o un acto de pegar. En español, «me golpearon» transmite bien la acción física sin especificar más de lo que el hebreo exige.
- source_word: בַל
  english_pob_choice: but ... not
  chosen_spanish: pero ... no
  alternatives_spanish:
  - y no
  - sin
  lexicon: HALOT
  rationale: La partícula negativa adquiere valor adversativo por el contexto. En español, «pero ... no» reproduce de forma natural la oposición entre la agresión y la negación del efecto.
- source_word: חָלִיתִי
  english_pob_choice: I was not hurt
  chosen_spanish: no quedé herido
  alternatives_spanish:
  - no sentí dolor
  - no me lastimé
  - no estuve enfermo
  lexicon: HALOT
  rationale: חלה puede abarcar debilidad, enfermedad o daño. Aquí, por el contexto de golpes y embriaguez, la idea central es que no sintió el daño; «no quedé herido» conserva esa fuerza sin sonar excesivamente médica.
- source_word: הֲלָמֻנִי
  english_pob_choice: they beat me
  chosen_spanish: me dieron una paliza
  alternatives_spanish:
  - me golpearon
  - me apalearon
  lexicon: HALOT
  rationale: הלם refuerza la segunda agresión y permite diferenciarla de la primera. «Me dieron una paliza» comunica bien la repetición y la intensidad del ataque en español actual.
- source_word: יָדָעְתִּי
  english_pob_choice: I did not know it
  chosen_spanish: no lo supe
  alternatives_spanish:
  - no me di cuenta
  - no lo advertí
  - no era consciente
  lexicon: HALOT
  rationale: ידע aquí expresa falta de conciencia o percepción por la borrachera. «No lo supe» es breve y fiel al verbo, aunque en español también puede entenderse como desconocimiento o falta de percepción; esa ambigüedad refleja la del hebreo y del audit trail inglés.
- source_word: מָתַי אָקִיץ
  english_pob_choice: When shall I awake?
  chosen_spanish: ¿Cuándo despertaré?
  alternatives_spanish:
  - ¿Cuándo me despertaré?
  - ¿Cuándo habré de despertar?
  lexicon: HALOT
  rationale: קיץ en hifil es despertar/arrousar. En español, «¿Cuándo despertaré?» conserva la pregunta directa con registro formal suficiente, sin añadir la interpretación de «recobrar el juicio».
- source_word: אוֹסִיף
  english_pob_choice: I will
  chosen_spanish: Lo
  alternatives_spanish:
  - de nuevo
  - otra vez
  - otra vez lo
  lexicon: HALOT
  rationale: יסף aporta la idea de añadir/continuar, que en el contexto se traduce mejor con la repetición expresada en la frase final. El valor iterativo no se marca con una palabra separada, sino con «otra vez».
- source_word: אֲבַקְשֶׁנּוּ
  english_pob_choice: seek it
  chosen_spanish: lo buscaré
  alternatives_spanish:
  - lo procuraré
  - lo volveré a buscar
  - lo buscaré de nuevo
  lexicon: HALOT
  rationale: בקש significa buscar/andar tras algo. El sufijo masculino singular, como en el inglés POB, se entiende mejor por el contexto como referencia a vino o bebida fuerte; «lo buscaré» mantiene esa referencia implícita.
- source_word: עֽוֹד
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  - todavía
  lexicon: HALOT
  rationale: עוֹד aquí marca repetición. «Otra vez» conserva la intención de volver a beber o buscar bebida, en línea con la nota cruzada del inglés.
translation_notes:
  revision_awareness: Se tomó como base el texto inglés auditado, incluyendo la revisión que prefirió un registro más formal en la pregunta final («When shall I awake?»). En español se mantuvo ese tono con una interrogativa directa y formal («¿Cuándo despertaré?»), sin introducir interpretaciones ajenas al hebreo.
  spanish_consistency_notes:
  - Se preservó la distinción entre los dos verbos de agresión con dos soluciones distintas en español.
  - Se mantuvo la referencia implícita del objeto buscado como bebida, conforme al contexto y a la nota cruzada del audit trail inglés.
  - El tono general es moderno y digno, evitando calcos innecesarios y sin borrar la ambigüedad semántica del hebreo en חָלִיתִי y יָדָעְתִּי.
