translation:
  language: es
  text: Pero no te reirás de mí con esta risa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te burlarás de mí con esta risa». El griego conserva la expresión cognada «reír esta risa», que probablemente comunica risa despectiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλʼ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: LSJ
  rationale: El adversativo introduce un giro directo y en español 'Pero' suena natural y suficientemente fuerte sin añadir matiz no indicado por el griego.
- source_word: οὐ
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - ciertamente no
  - de ningún modo
  lexicon: LSJ
  rationale: La negación simple se conserva sin intensificación extra, como en el audit trail inglés.
- source_word: γελάσεις
  english_pob_choice: you will laugh
  chosen_spanish: te reirás
  alternatives_spanish:
  - te reirás burlonamente
  - te burlarás
  lexicon: LSJ
  rationale: El futuro de γελάω es 'reírse'; en español, la construcción reflexiva expresa mejor el verbo natural. El contexto hostil se mantiene por la frase siguiente y la nota, sin sustituir el verbo base por otro más interpretativo.
- source_word: κατʼ ἐμοῦ
  english_pob_choice: at me
  chosen_spanish: de mí
  alternatives_spanish:
  - contra mí
  - sobre mí
  lexicon: LSJ
  rationale: Con risa burlona, el griego indica una acción dirigida contra alguien. En español, 'reírse de mí' es la expresión idiomática más clara y fiel.
- source_word: τοῦτον τὸν γέλωτα
  english_pob_choice: this laugh
  chosen_spanish: esta risa
  alternatives_spanish:
  - esta risa burlona
  - esta carcajada
  lexicon: LSJ
  rationale: Se conserva el sustantivo singular y el demostrativo enfático. 'Risa' evita forzar una interpretación y mantiene el efecto cognado del griego, aunque en la nota se aclara la posible fuerza despectiva.
translation_notes:
  revision_awareness: El texto griego recibido es breve y de alta confianza; el inglés POB optó por una equivalencia óptima que conserva el giro cognado «laugh this laugh». La presente versión mantiene esa fuerza retórica en español mediante una construcción idiomática natural, con nota para no perder la posible carga de burla.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se evita 'Cristo' y cualquier terminología cristológica porque el pasaje no la presenta.
  - Se conserva el tono directo de segunda persona y la brevedad sentenciosa del original.
