translation:
  language: es
  text: Mira y respóndeme, Yahvé mi Dios; da luz a mis ojos[a], no sea que duerma el sueño de la muerte[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ilumina mis ojos» o «haz brillar mis ojos». La imagen hebrea puede apuntar a vigor renovado, claridad o esperanza.
    reason: lexical_alternative
  - marker: b
    text: Lit. «no sea que duerma muerte» o «no sea que duerma en la muerte»; tradicionalmente, «no sea que duerma el sueño de la muerte».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבִּיטָה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira atentamente
  - Contempla
  lexicon: HALOT
  rationale: El imperativo pide la atención activa de Dios. En español, "mira" es natural, directo y conserva la súplica inmediata mejor que una forma más abstracta.
- source_word: עֲנֵנִי
  english_pob_choice: answer me
  chosen_spanish: respóndeme
  alternatives_spanish:
  - contéstame
  - atiéndeme
  lexicon: HALOT
  rationale: En contexto de oración, el verbo expresa una respuesta personal de Dios. "Respóndeme" mantiene la relación directa sin añadir la idea de una respuesta favorable como glosa principal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se usa el nombre divino transliterado según el criterio del proyecto para preservar el Tetragrámaton y evitar la sustitución por un título.
- source_word: אֱלֹהָי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios mío
  lexicon: HALOT
  rationale: La forma posesiva expresa la apelación personal y de pacto. "Mi Dios" es fiel y natural en español.
- source_word: הָאִירָה
  english_pob_choice: give light
  chosen_spanish: da luz
  alternatives_spanish:
  - ilumina
  - haz brillar
  lexicon: HALOT
  rationale: El causativo de אור puede expresar dar luz, hacer brillar o iluminar. "Da luz" conserva la imagen corporal y no la reduce a una abstracción intelectual.
- source_word: עֵינַי
  english_pob_choice: my eyes
  chosen_spanish: mis ojos
  alternatives_spanish:
  - mi vista
  lexicon: HALOT
  rationale: La traducción literal preserva la metáfora hebrea, que puede aludir a vitalidad, claridad o esperanza sin cerrarla a una sola interpretación.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - lest
  lexicon: HALOT
  rationale: Introduce el resultado temido. "No sea que" suena natural y solemne en español bíblico actual.
- source_word: אִישַׁן
  english_pob_choice: I sleep
  chosen_spanish: yo duerma
  alternatives_spanish:
  - me duerma
  - duerma
  lexicon: HALOT
  rationale: El imperfecto tras פֶּן expresa un desenlace temido. "Yo duerma" mantiene la estructura y el tono poético.
- source_word: הַמָּוֶת
  english_pob_choice: the sleep of death / in death
  chosen_spanish: el sueño de la muerte
  alternatives_spanish:
  - en la muerte
  - el dormir de la muerte
  lexicon: HALOT
  rationale: Se sigue la revisión del POB que recupera la forma más formal del hebreo y la imagen poética tradicional. "El sueño de la muerte" reproduce de manera clara el giro idiomático sin borrar la metáfora de dormir ligada a la muerte.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: O Yahweh my God
  chosen_spanish_reading: Yahvé mi Dios
  alternative_spanish_readings:
  - SEÑOR mi Dios
  - Jehová mi Dios
  rationale: Se mantiene el nombre propio divino como transliteración, de acuerdo con la doctrina del proyecto, en lugar de ocultarlo tras un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metáfora de luz en los ojos
  english_pob_reading: give light to my eyes
  chosen_spanish_reading: da luz a mis ojos
  alternative_spanish_readings:
  - ilumina mis ojos
  - restaura mi vigor
  rationale: Se conserva la imagen abierta del hebreo, que puede sugerir vigor renovado, claridad o esperanza, sin resolverla en una sola paráfrasis interpretativa.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Cláusula final sobre la muerte
  english_pob_reading: lest I sleep the sleep of death
  chosen_spanish_reading: no sea que yo duerma el sueño de la muerte
  alternative_spanish_readings:
  - no sea que duerma en la muerte
  - no sea que duerma hasta la muerte
  rationale: La versión española sigue la revisión que privilegia la fuerza poética y formal del hebreo, manteniendo la redundancia expresiva del giro 'sueño de la muerte'.
  doctrine_reference: 'DOCTRINE.md: Preserve poetic and lexical form where warranted'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del POB que pasó de 'sleep in death' a 'sleep the sleep of death'; por eso la cláusula final en español conserva la redundancia poética ('el sueño de la muerte') en vez de simplificarla a 'en la muerte'.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme al estándar del proyecto.
  - Se conserva la metáfora corporal 'mis ojos' en lugar de 'mi vista' para no cerrar el alcance semántico del hebreo.
  - El tono es de súplica poética, con puntuación y orden natural en español bíblico contemporáneo.
