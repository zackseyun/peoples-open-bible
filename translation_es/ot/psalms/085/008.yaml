lexical_decisions:
- source_word: הַרְאֵנוּ
  english_pob_choice: Show us
  chosen_spanish: Muéstranos
  alternatives_spanish:
  - Haz que veamos
  - Permítenos ver
  lexicon: HALOT
  rationale: El hifil imperativo de ראה con sufijo de 1cp expresa literalmente 'haz que veamos'. En español, 'Muéstranos' conserva la fuerza imperativa y la petición dirigida a Dios sin sonar forzado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del tetragrámaton con la forma de uso del proyecto en español, 'Yahvé', en lugar de sustituirlo por un título como 'el SEÑOR'.
- source_word: חַסְדֶּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor leal
  alternatives_spanish:
  - tu misericordia
  - tu amor constante
  - tu bondad fiel
  lexicon: HALOT
  rationale: חסד denota amor comprometido, leal y de pacto. 'Amor leal' conserva el vínculo entre afecto y fidelidad sin perder la densidad relacional del término.
- source_word: וְיֶשְׁעֲךָ
  english_pob_choice: and your salvation
  chosen_spanish: tu salvación
  alternatives_spanish:
  - tu liberación
  - tu rescate
  - tu victoria
  lexicon: HALOT
  rationale: ישע puede abarcar salvación o liberación. 'Salvación' mantiene el registro teológico y amplio del salmo y es natural en español bíblico contemporáneo.
- source_word: תִּתֶּן לָנוּ
  english_pob_choice: grant us
  chosen_spanish: concédenos
  alternatives_spanish:
  - danos
  - otórganos
  lexicon: HALOT
  rationale: נתן con objeto indirecto significa literalmente 'dar'. 'Concédenos' reproduce bien el matiz peticional y reverente del ruego dirigido a Dios.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrámaton, y la política del POB en español evita la sustitución por un título. 'Yahvé' preserva el nombre del pacto y la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado no introdujo revisiones posteriores; el pasaje quedó estable en la última pasada y la concordancia de revisión fue alta, sin cambios pendientes.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al criterio del proyecto.
  - Se eligió 'amor leal' para חסד por su capacidad de expresar fidelidad de pacto sin caer en un calco rígido.
  - '''Salvación'' se mantiene por continuidad semántica y tonal con el registro del salmo.'
  - La nota al pie preserva la alternativa verbal 'Haz que veamos', equivalente funcional de 'Cause us to see'.
