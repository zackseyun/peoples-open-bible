translation:
  language: es
  text: Oh, Yahvé nuestro Dios, otros señores además de ti han dominado sobre nosotros, pero solo por ti[a] hacemos mención de tu nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «solo en ti hacemos mención de tu nombre». La preposición hebrea en «por/en ti» puede entenderse de más de una manera.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Oh Yahvé
  alternatives_spanish:
  - Oh Yahvé
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con la forma española estándar del proyecto, 'Yahvé', y se conserva la exclamación vocativa 'Oh' por el tono de súplica/directa invocación del hebreo.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  - nuestros dioses
  lexicon: HALOT
  rationale: En este contexto, el sustantivo singular funciona como título del Dios de pacto; el sufijo de 1ª plural se refleja naturalmente como 'nuestro'.
- source_word: בְּעָלוּנוּ
  english_pob_choice: have ruled over us
  chosen_spanish: han dominado sobre nosotros
  alternatives_spanish:
  - han gobernado sobre nosotros
  - han sido señores sobre nosotros
  - nos han poseído
  lexicon: HALOT
  rationale: El verbo בעל expresa dominio/exercicio de señorío. 'Han dominado sobre nosotros' conserva la idea de sometimiento y el tono opresivo sin forzar una literalidad extraña en español.
- source_word: אֲדֹנִים
  english_pob_choice: lords
  chosen_spanish: señores
  alternatives_spanish:
  - señores
  - amos
  lexicon: HALOT
  rationale: '''Señores'' reproduce el rango semántico de poder y liderazgo humano o político con naturalidad en español, y mantiene el contraste con Yahvé.'
- source_word: זֽוּלָתֶךָ
  english_pob_choice: besides you
  chosen_spanish: además de ti
  alternatives_spanish:
  - fuera de ti
  - aparte de ti
  lexicon: HALOT
  rationale: La partícula de exclusión se expresa con una locución natural en español. 'Además de ti' conserva la idea de excepción/alteridad sin perder fluidez.
- source_word: לְבַד
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  lexicon: HALOT
  rationale: El adverbio de exclusividad se traduce de forma directa y idiomática. Unido a בְּךָ refuerza la lectura de exclusión total.
- source_word: בְּךָ
  english_pob_choice: through you
  chosen_spanish: en ti
  alternatives_spanish:
  - por ti
  - a través de ti
  - en relación contigo
  lexicon: HALOT
  rationale: La preposición ב permite varias lecturas. Se eligió 'en ti' para conservar la ambigüedad potencial del hebreo con una formulación sobria y natural; el sentido instrumental o relacional queda disponible en nota.
- source_word: נַזְכִּיר
  english_pob_choice: we make mention of
  chosen_spanish: hacemos mención de
  alternatives_spanish:
  - mencionamos
  - recordamos
  - proclamamos
  lexicon: HALOT
  rationale: La forma causativa de זכר puede significar 'mencionar'. 'Hacemos mención de' es una equivalencia cercana, formal y apta para el registro litúrgico.
- source_word: שְׁמֶךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu nombre
  lexicon: HALOT
  rationale: Se mantiene la expresión simple 'tu nombre', que en contexto bíblico conserva su peso de presencia, reputación y relación de pacto sin añadir explicación innecesaria.
theological_decisions:
- issue: Relación entre 'otros señores' y Yahvé
  english_pob_reading: The verse contrasts Israel's covenant God with human or foreign rulers who had exercised dominion over them.
  chosen_spanish_reading: El versículo contrasta al Dios de pacto con otros señores que han ejercido dominio sobre el pueblo.
  alternative_spanish_readings:
  - El contraste puede referirse también a poderes políticos extranjeros
  - Podría aludir a ídolos o falsos dioses personificados como señores
  rationale: El hebreo permite más de una identificación para esos 'señores'. La traducción evita cerrar la referencia y conserva el contraste abierto entre Yahvé y poderes dominantes.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sentido de בך לבד
  english_pob_reading: Rendered as 'through you alone' in the main text, with 'in you alone' preserved as an alternative.
  chosen_spanish_reading: Se deja 'solo en ti' como forma breve que conserva la ambigüedad de la preposición.
  alternative_spanish_readings:
  - solo por ti
  - solo a través de ti
  - solo en relación contigo
  rationale: La preposición ב admite matiz locativo, instrumental o de esfera. En español, 'solo en ti' mantiene una lectura sobria y deja espacio para la nota sobre el posible sentido 'por/mediante' o 'en'.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se siguió el paquete fuente hebreo y el auditor inglés POB. No hubo revisiones aplicadas en el último pase; la traducción española conserva la tensión semántica de בְּךָ לבד mediante una formulación breve en el texto principal y una nota de alternativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se traduce אֲדֹנִים como 'señores' para mantener el valor de dominio sin recurrir a lenguaje eclesiástico no pedido por el hebreo.
  - La nota mantiene la ambigüedad de בְּךָ sin resolverla dogmáticamente.
  - '''Hacemos mención de'' conserva el matiz cultual/litúrgico de נזכיר.'
