translation:
  language: es
  text: Eligió a David, su siervo, y lo tomó de los rediles[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los apriscos» o «de los corrales».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְחַר
  english_pob_choice: He chose
  chosen_spanish: Eligió
  alternatives_spanish:
  - Escogió
  - Seleccionó
  lexicon: HALOT
  rationale: El wayyiqtol de בחר expresa una acción pasada narrativa. En español, «eligió» comunica bien la elección divina sin añadir matices que el verbo no exige.
- source_word: בְּדָוִד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: Nombre propio
  rationale: Nombre propio transliterado de forma estándar en español.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su esclavo
  lexicon: HALOT
  rationale: Aquí עבד describe a David como perteneciente a Dios y en relación de servicio. En español, «siervo» conserva ese tono honorífico/covenantal mejor que «esclavo», que sonaría demasiado coercitivo para este contexto.
- source_word: וַיִּקָּחֵהוּ
  english_pob_choice: and took him
  chosen_spanish: y lo tomó
  alternatives_spanish:
  - y lo llevó
  - y lo sacó
  lexicon: HALOT
  rationale: לקח se rinde de modo directo con «tomó», manteniendo la sencillez del hebreo y el movimiento desde el pastoreo hacia la elección real.
- source_word: מִמִּכְלְאֹת
  english_pob_choice: from the sheepfolds
  chosen_spanish: de los rediles
  alternatives_spanish:
  - de los apriscos
  - de los corrales
  lexicon: HALOT
  rationale: El sustantivo designa lugares cerrados para el ganado. «Rediles» es natural en español bíblico y pastoral, y mantiene la imagen sin depender de una paráfrasis más amplia.
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: rediles
  alternatives_spanish:
  - ovejas
  - ganado menor
  lexicon: HALOT
  rationale: En esta construcción, צאן no necesita destacarse por separado en español porque la frase compuesta ya evoca el ámbito ovino/pastoral. Por eso se integra en «de los rediles» siguiendo el valor idiomático del conjunto hebreo.
theological_decisions:
- issue: Cómo traducir עבד aplicado a David en relación con Yahvé
  english_pob_reading: his servant
  chosen_spanish_reading: su siervo
  alternative_spanish_readings:
  - su esclavo
  rationale: El contexto resalta la elección y la pertenencia de David a Yahvé, no la idea de servidumbre forzada. «Siervo» preserva la relación de servicio y honor sin borrar la tensión lexical existente en עבד.
  doctrine_reference: 'DOCTRINE.md: tratamiento contextual de servant/slave; fidelidad a la relación de pacto sin imponer una carga semántica más fuerte que la del contexto.'
translation_notes:
  revision_awareness: 'El contexto auditado en inglés mantiene una solución estable: «from the sheepfolds» con nota léxica alternativa, y no registra revisiones aplicadas. La versión española sigue esa misma decisión de fondo, conservando la imagen pastoral y la designación relacional de David como siervo.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico natural y transparente en español, evitando «SEÑOR» para el nombre divino porque este versículo no lo contiene explícitamente.
  - Se evitó traducir mecánicamente «sheepfolds» como un calco duro; «rediles» comunica la escena pastoral de forma idiomática.
  - La nota al pie preserva la alternativa léxica documentada en el audit trail inglés.
