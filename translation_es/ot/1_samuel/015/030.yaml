    text: 'O: «y me postraré a Yahvé, tu Dios». El hebreo puede entenderse como una continuación simple («y me postraré») o como expresión de finalidad tras la petición anterior («para que yo me postre»).'
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor para alinear mejor la cláusula final con לַיהוָה: «me postre a Yahvé» en lugar de «ante Yahvé». Se mantiene la nota de alternativa verbal, ajustada al mismo régimen preposicional para coherencia.'
