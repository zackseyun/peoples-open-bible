base_translation:
  language: en
  yaml_path: translation/ot/zechariah/006/013.yaml
  text: Yes[a], he will build the temple of Yahweh, and he will bear majesty, and he will sit and rule on his throne. And he will be a priest on his throne[c][b], and the counsel of peace will be between the two of them.
  footnotes:
  - marker: a
    text: Or 'and there will be a priest on his throne'; the Hebrew allows some to distinguish the priest from the enthroned ruler.
    reason: alternative_reading
  - marker: b
    text: '''Between the two of them'' may refer to the kingly and priestly roles, or to two distinct figures such as ruler and priest.'
    reason: alternative_reading
  - marker: c
    text: Or 'will bear honor' or 'will bear splendor.'
    reason: lexical_alternative
