translation:
  language: es
  text: y todo hombre armado entre ustedes cruzará el Jordán delante de Yahvé, hasta que haya expulsado[a] a sus enemigos de delante de él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta que haya desposeído a sus enemigos de delante de él». El verbo hebreo puede significar «expulsar» o «desposeer».'
    reason: lexical_alternative
  - marker: b
    text: Los pronombres en «haya expulsado a sus enemigos de delante de él» se entienden más naturalmente como referidos a Yahvé, aunque algunos los toman con referencia a la fuerza de combate de Israel.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָבַר
  english_pob_choice: and ... crosses
  chosen_spanish: cruzará
  alternatives_spanish:
  - cruza
  - deberá cruzar
  lexicon: HALOT
  rationale: El verbo con valor futuro en este contexto condicional se expresa naturalmente en español con futuro simple. 'Cruzará' conserva el sentido estipulativo sin sonar forzado.
- source_word: לָכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - para ustedes
  - de ustedes
  lexicon: HALOT
  rationale: 'Con כָּל חָלוּץ, la relación con los destinatarios se expresa mejor en español como pertenencia al grupo: ''entre ustedes''. Mantiene el matiz distributivo sin literalismo duro.'
- source_word: כָּל חָלוּץ
  english_pob_choice: every armed man
  chosen_spanish: todo hombre armado
  alternatives_spanish:
  - cada hombre armado
  - todo guerrero
  - todo equipado para la batalla
  lexicon: HALOT
  rationale: חָלוּץ designa a uno equipado/armado para la batalla. 'Todo hombre armado' conserva la fuerza militar y la distribución de כָּל, con un registro natural en español.
- source_word: אֶת הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: En español bíblico y geográfico, 'el Jordán' es claro y suficiente. No hace falta añadir 'río' salvo necesidad de precisión adicional.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma POB 'Yahvé'. 'Delante de' reproduce bien el valor espacial y ceremonial de לִפְנֵי.
- source_word: הוֹרִישׁוֹ
  english_pob_choice: he has driven out
  chosen_spanish: haya expulsado
  alternatives_spanish:
  - haya desalojado
  - haya desposeído
  - haya echado
  lexicon: HALOT
  rationale: El hiphil de ירשׁ puede significar expulsar o desposeer. 'Expulsado' comunica con claridad la acción de quitar de la tierra, sin perder la tensión lexical reconocida por el POB en inglés.
- source_word: אֹיְבָיו
  english_pob_choice: his enemies
  chosen_spanish: a sus enemigos
  alternatives_spanish:
  - a los enemigos de él
  lexicon: HALOT
  rationale: 'Se conserva el sufijo posesivo como en el hebreo y en la lectura del POB: ''sus enemigos''.'
- source_word: מִפָּנָיו
  english_pob_choice: from before him
  chosen_spanish: de delante de él
  alternatives_spanish:
  - de su presencia
  - ante él
  lexicon: HALOT
  rationale: La expresión idiomática se mantiene con 'de delante de él', que refleja mejor el hebreo repetido de פנים y evita borrar el paralelismo con 'delante de Yahvé'.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton; el estándar del proyecto en español es 'Yahvé'. Se preserva así el nombre de pacto sin sustituirlo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Referencia de los pronombres en הוֹרִישׁוֹ / אֹיְבָיו / מִפָּנָיו
  english_pob_reading: the pronouns refer to the LORD
  chosen_spanish_reading: los pronombres se refieren a Yahvé
  alternative_spanish_readings:
  - se refieren a Israel
  - se refieren a la fuerza armada de Israel
  rationale: La cadena 'delante de Yahvé ... hasta que haya expulsado a sus enemigos de delante de él' es más coherente si el sujeto implícito sigue siendo Yahvé. Mantener 'de él' preserva esa referencia singular y la tensión del hebreo.
  doctrine_reference: Gramática y contexto inmediato de Números 32:21; lectura auditable del POB en inglés
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios; el acuerdo de revisión fue alto y estable. Esta redacción sigue la lectura auditada del POB en inglés y conserva la tensión léxica sobre הוֹרִישׁוֹ, además de la ambigüedad pronominal señalada en la nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva 'delante de' para לִפְנֵי / מִפְּנֵי a fin de mantener el paralelismo espacial del hebreo.
  - '''Todo hombre armado'' refleja el valor militar de חָלוּץ sin introducir términos eclesiásticos o interpretativos.'
  - La ambigüedad pronominal se mantiene explícita en la nota para no borrar una tensión documentada por el audit trail.
