review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia ritual del hebreo: el sacerdote lleva el ave al altar, ejecuta la acción técnica de מלק sobre la cabeza, la quema en el altar y la sangre es exprimida/escurrida sobre el costado o pared del altar. Sin embargo, «le arrancará la cabeza» sobredetermina la acción y sugiere una decapitación violenta más libre que el término técnico hebreo; además, la nota «le torcerá el cuello» no corresponde bien al inglés auditado («wring off its head») ni a אֶת רֹאשׁוֹ. También conviene evitar el cambio de puntuación fuerte con punto y coma cuando el hebreo mantiene una cadena coordinada simple.'
  spanish_quality_summary: El español es claro y bastante natural. «Lo acercará al altar» y «su sangre será escurrida» son legibles. No obstante, «arrancará la cabeza» suena brusco e impreciso para un tecnicismo sacrificial, y «le torcerá el cuello» introduce «cuello», ausente del texto base y menos fiel que una referencia directa a la cabeza. «Costado del altar» funciona bien; la nota literal sobre «pared» también es adecuada.
  glossary_alignment: No hay conflictos con la terminología de proyecto. Las decisiones principales son consistentes con el POB inglés, salvo la necesidad de ajustar la expresión de מלק para reflejar mejor el valor técnico y el objeto explícito «su cabeza».
  issues:
  - severity: medium
    issue: «le arrancará la cabeza» para וּמָלַק אֶת רֹאשׁוֹ
    rationale: Aunque comunica separación de la cabeza, «arrancar» añade una imagen más violenta y menos técnica que el hebreo. Una formulación como «le desprenderá la cabeza» o «le pellizcará la cabeza» sería más cercana al enfoque del POB; en español bíblico-natural, «le desprenderá la cabeza» equilibra fidelidad y legibilidad.
  - severity: medium
    issue: La nota [a] dice «le torcerá el cuello»
    rationale: El inglés auditado conserva «wring off its head», no «twist its neck». Además, el hebreo tiene explícitamente «su cabeza». La nota debe mantener la alternativa en torno a la cabeza, no sustituirla por «cuello».
  revised_spanish_text: Y el sacerdote lo acercará al altar[a], y le desprenderá la cabeza y lo hará arder sobre el altar[b], y su sangre será escurrida sobre el costado del altar.
  revised_footnotes:
  - marker: a
    text: O «le retorcerá la cabeza»; el verbo hebreo es un término técnico para la acción sacerdotal de matar un ave de sacrificio.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre la pared del altar».
    reason: lexical_alternative
  revision_rationale: Se ajusta מלק para evitar la sobretraducción de «arrancar» y reflejar mejor el carácter técnico del verbo con un español claro. También se corrige la nota para que la alternativa se refiera a «la cabeza», como en el texto hebreo y en la auditoría inglesa, no al «cuello».
