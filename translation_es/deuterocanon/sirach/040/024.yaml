    rationale: La nota textual sobre צדק frente a ἐλεημοσύνη debe anclarse en «justicia», no en «angustia», porque allí ocurre la variante significativa.
  - severity: medium
    issue: Notas duplicadas sobre la misma variante
    rationale: Las notas [a] y [b] repiten esencialmente la misma información. El proyecto pide preservar alternativas significativas, no multiplicar notas redundantes.
  - severity: low
    issue: Giro ligeramente poco natural en español
    rationale: «son para el tiempo de angustia» es comprensible, pero «son para un tiempo de angustia» fluye mejor en español general y conserva el sentido indefinido de crisis.
  revised_spanish_text: Un hermano y un compañero son para un tiempo de angustia, pero la justicia[a] libra más que ambos.
