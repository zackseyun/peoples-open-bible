translation:
  language: es
  text: Pero los dientes de serpientes venenosas no pudieron vencer a tus hijos[a], porque tu misericordia vino en su ayuda y los sanó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus niños». El griego dice «tus hijos», y aquí se conserva esa forma para reflejar el masculino plural del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοὺς ... υἱούς σου
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus hijos
  lexicon: LSJ
  rationale: El griego dice literalmente «tus hijos/varones»; en español, «hijos» puede conservar la relación de pertenencia y, en este contexto colectivo, no exige una marca masculina tan explícita como en inglés. Se evita «hijos varones» por sobreexplicitar el matiz.
- source_word: ἰοβόλων
  english_pob_choice: venomous
  chosen_spanish: venenosas
  alternatives_spanish:
  - ponzoñosas
  - venenosas
  lexicon: LSJ
  rationale: El compuesto apunta a veneno o ponzoña. «Venenosas» es natural y claro en español bíblico contemporáneo, sin perder la fuerza del daño mortal.
- source_word: δρακόντων
  english_pob_choice: serpents
  chosen_spanish: serpientes
  alternatives_spanish:
  - serpientes
  - dragones
  lexicon: LSJ
  rationale: En este contexto de mordedura y veneno, «serpientes» comunica el referente de forma directa; «dragones» sonaría engañoso para lectores modernos.
- source_word: ἐνίκησαν
  english_pob_choice: did not overcome
  chosen_spanish: no pudieron vencer
  alternatives_spanish:
  - no vencieron
  - no pudieron vencer
  lexicon: LSJ
  rationale: El verbo expresa vencer o prevalecer. «No pudieron vencer» conserva el sentido de que el ataque no logró imponerse sobre ellos.
- source_word: ἀντιπαρῆλθεν
  english_pob_choice: came to their aid
  chosen_spanish: salió a su encuentro
  alternatives_spanish:
  - vino en su ayuda
  - salió a su encuentro
  - intervino a favor de ellos
  lexicon: LSJ
  rationale: El verbo es poco común y sugiere una acción de la misericordia que se acerca frente al peligro. «Salió a su encuentro» mantiene esa imagen de movimiento hacia ellos sin volverla demasiado abstracta.
- source_word: ἰάσατο
  english_pob_choice: healed
  chosen_spanish: los sanó
  alternatives_spanish:
  - los sanó
  - los curó
  - los restauró
  lexicon: LSJ
  rationale: Es el verbo normal de sanar. «Los sanó» es la forma más natural y directa en español.
theological_decisions:
- issue: Referencia de «tus hijos» en lugar de neutralizar a «tus niños» o «tus hijos varones»
  english_pob_reading: A covenantal address to God about Israel ('your sons') is retained.
  chosen_spanish_reading: Se conserva el trato de pacto con Dios mediante «tus hijos», sin neutralizar el masculino explícito del griego más allá de lo que permite el español.
  alternative_spanish_readings:
  - tus niños
  - tus hijos varones
  rationale: El texto remite al pueblo de Dios en el desierto. «Tus hijos» conserva la relación de pertenencia y evita diluir el valor lexical del griego; «tus niños» sería demasiado restrictivo, y «tus hijos varones» cargaría innecesariamente el matiz de sexo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: Se siguió el texto griego de la edición Swete 1909 y el rastro auditado en inglés. La decisión clave es conservar la imagen de la misericordia que se aproxima frente al peligro, pero en un español natural. No se introdujeron cambios por variantes textuales, y el ajuste de «sons/children» se resolvió de forma conservadora con «tus hijos».
  spanish_consistency_notes:
  - Se mantuvo «Dios» implícito por el posesivo de segunda persona, como en el original.
  - «Misericordia» traduce τὸ ἔλεος con el valor personal/actuante que el contexto exige.
  - La puntuación separa la primera cláusula adversativa de la causal, respetando la estructura del griego.
