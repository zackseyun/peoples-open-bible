  text: אַל יָנ֣וּס הַ/קַּ֔ל וְ/אַל יִמָּלֵ֖ט הַ/גִּבּ֑וֹר צָפ֨וֹנָ/ה֙ עַל יַ֣ד נְהַר פְּרָ֔ת כָּשְׁל֖וּ וְ/נָפָֽלוּ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/046/006.yaml
  text: Let not the swift flee[a], and let not the mighty man escape; in the north, by the bank of the Euphrates River[c][b], they have stumbled and fallen.
  footnotes:
  - marker: a
    text: Or 'northward' or 'to the north.' The Hebrew form צָפוֹנָה can be understood directionally as well as locationally.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by the hand of the Euphrates River,' a Hebrew idiom meaning 'beside' or 'along the side of' the river.
    reason: lexical_alternative
  - marker: c
    text: Or 'the warrior' for 'the mighty man.' The Hebrew גִּבּוֹר often refers to a strong or valiant fighter.
    reason: lexical_alternative
