review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia narrativa del hebreo: וַיָּמ֥וּתוּ + גַם + שְׁנֵיהֶם se refleja adecuadamente en «Entonces también murieron los dos», y וַתִּשָּׁאֵר ... מִ... וּמֵ... se transmite con naturalidad como estado de privación. «La mujer» preserva correctamente הָאִשָּׁה. El punto principal a corregir es מִשְּׁנֵי יְלָדֶיהָ: el inglés POB documenta «her two children» con nota alternativa «sons», mientras el español principal puso «sus dos hijos» y además la nota a dice erróneamente «O «sin sus dos hijos»» anclada a «murieron».'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos problemas de calidad editorial: la nota [a] está anclada en un lugar incorrecto y contradice el texto principal, y la nota [b] sobre «quedó» no corresponde a una alternativa preservada por el POB ni resuelve una ambigüedad nueva en español. Conviene simplificar y alinear con el expediente inglés.'
  glossary_alignment: No hay términos teológicos mayores en juego. «Mahlón y Quelión» es aceptable como adaptación ortográfica española. «Marido» es natural para אִישָׁהּ en este contexto. Debe alinearse יְלָדֶיהָ con la decisión auditada «children» → «hijos/descendencia» en nota, mejor como «hijos» principal o «hijos[a]» con nota que preserve la alternativa más amplia «descendientes/niños»; pero dado el POB inglés, la mejor alineación es usar «sus dos hijos[a]» o preferiblemente «sus dos hijos[a]» con nota aclarando que el hebreo dice literalmente «sus dos hijos/niños/descendencia».
  issues:
  - severity: high
    issue: La nota [a] está colocada en «murieron» pero comenta «sin sus dos hijos».
    rationale: Viola la disciplina de anclaje de notas y puede confundir al lector sobre qué palabra o frase está siendo aclarada.
  - severity: high
    issue: La nota [a] invierte la relación entre texto principal y alternativa del expediente inglés.
    rationale: El inglés principal traduce «her two children» y la alternativa es «sons»; el español puso «sus dos hijos» como principal y luego la nota dice «O «sin sus dos hijos»», que además repite el texto en vez de ofrecer una alternativa real.
  - severity: medium
    issue: La nota [b] sobre «quedó» es innecesaria.
    rationale: No preserva una alternativa significativa del expediente inglés ni responde a una nueva ambigüedad en español; sobrecarga el aparato sin necesidad.
  revised_spanish_text: Entonces también murieron los dos, Mahlón y Quelión; y la mujer quedó sin sus dos hijos[a] y sin su marido.
