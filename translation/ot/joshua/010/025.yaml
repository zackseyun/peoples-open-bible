id: JOS.10.25
reference: Joshua 10:25
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֲלֵי/הֶם֙ יְהוֹשֻׁ֔עַ אַל תִּֽירְא֖וּ וְ/אַל תֵּחָ֑תּוּ חִזְק֣וּ וְ/אִמְצ֔וּ כִּ֣י כָ֗כָה יַעֲשֶׂ֤ה יְהוָה֙ לְ/כָל אֹ֣יְבֵי/כֶ֔ם אֲשֶׁ֥ר אַתֶּ֖ם נִלְחָמִ֥ים אוֹתָֽ/ם־־־׃
translation:
  text: And Joshua said to them[a], “Do not fear and do not be dismayed. Be strong and courageous, for thus Yahweh will do to all your enemies against whom you are fighting.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not be afraid and do not be shattered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֲלֵיהֶם
  chosen: And Joshua said to them
  alternatives:
  - Then Joshua said to them
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said to them' is a natural, sufficiently formal rendering in English narrative style.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal names are transliterated by standard English convention.
- source_word: אַל תִּירְאוּ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: ירא in the negative imperative commonly means 'fear' or 'be afraid.' 'Do not fear' is slightly more formal and preserves the lexical connection to common biblical exhortation formulas.
- source_word: וְאַל תֵּחָתּוּ
  chosen: and do not be dismayed
  alternatives:
  - and do not be shattered
  - and do not be discouraged
  lexicon: HALOT
  rationale: חתת in this Niphal/jussive-like prohibition carries the sense of being broken, dismayed, or terrified. 'Be dismayed' is idiomatic in English and pairs well with 'do not fear' without collapsing the two verbs into one idea.
- source_word: חִזְקוּ וְאִמְצוּ
  chosen: Be strong and courageous
  alternatives:
  - Be strong and resolute
  - Be strong and firm
  lexicon: HALOT
  rationale: This fixed exhortation formula appears repeatedly in Joshua. 'Be strong and courageous' is the most natural and contextually established rendering, preserving the distinction between strength and bold resolve.
- source_word: כִּי כָכָה
  chosen: for this is what
  alternatives:
  - for thus
  - because in this way
  lexicon: HALOT
  rationale: The combination introduces the ground for the exhortation and points forward to the LORD's action. 'For this is what' is idiomatic modern English that preserves the demonstrative force better than the stiffer 'for thus.'
- source_word: יַעֲשֶׂה יְהוָה
  chosen: the LORD will do
  alternatives:
  - the LORD does
  - the LORD shall do
  lexicon: HALOT
  rationale: The yiqtol here is naturally future in context, referring to what God will do to future enemies. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: This follows the project's default rendering for the divine name, preserving reverential convention and consistency with the stated doctrine.
- source_word: לְכָל אֹיְבֵיכֶם
  chosen: to all your enemies
  alternatives:
  - against all your enemies
  lexicon: HALOT
  rationale: With עשה plus ל, the sense is what will be done to the enemies. 'To all your enemies' is the most direct rendering in English.
- source_word: אֲשֶׁר אַתֶּם נִלְחָמִים אוֹתָם
  chosen: against whom you are fighting
  alternatives:
  - whom you are fighting
  - with whom you are at war
  lexicon: HALOT
  rationale: The Hebrew literally says 'whom you are fighting them,' with the object marker and pronoun reflecting normal Hebrew syntax. English requires smoothing; 'against whom you are fighting' preserves the adversative sense of the conflict.
