  revision_rationale: Se corrige la ubicación de la nota para que corresponda a בְּנֵי יִשְׂרָאֵל, se elimina 'Así que' por no estar marcado en el hebreo, y se ajusta 'en aquel día' a 'ese día' por mayor naturalidad sin alterar el significado. Se conserva 'cántico' y 'los hijos de Israel' por fidelidad al registro y a las decisiones léxicas documentadas.
