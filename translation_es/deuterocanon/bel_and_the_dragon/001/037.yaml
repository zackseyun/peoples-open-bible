  spanish_consistency_notes:
  - Se usa «Dios» para θεός, en coherencia con la terminología POB.
  - Se conserva el vocativo repetido «Daniel, Daniel» sin expandirlo.
  - «Habacuc» sigue la forma bíblica usual en español, no una transliteración mecánica del griego.
