translation:
  language: es
  text: Y lo exhortaba a los que estaban con él a no temer[a] el ataque de las naciones, sino a tener presentes los auxilios que antes les habían venido del cielo, y ahora a esperar la victoria que les vendría del Todopoderoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «temer» traduce aquí el verbo griego en su sentido práctico de no encogerse ante el peligro; también podría expresarse como «acobardarse», pero eso intensifica el matiz moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεκάλει
  english_pob_choice: urged
  chosen_spanish: lo exhortaba
  alternatives_spanish:
  - lo animaba
  - lo instaba
  - lo urgía
  lexicon: BDAG
  rationale: El imperfecto expresa una acción continua; «lo exhortaba» conserva ese matiz de exhortación insistente y resulta natural en español bíblico moderno.
- source_word: τοὺς σὺν αὐτῷ
  english_pob_choice: those with him
  chosen_spanish: a los que estaban con él
  alternatives_spanish:
  - a sus compañeros
  - a los que iban con él
  lexicon: BDAG
  rationale: La frase griega es relacional y circunstancial; en español, «a los que estaban con él» es claro y no añade un matiz social no explícito en el texto.
- source_word: μὴ δειλιᾷν
  english_pob_choice: not to fear
  chosen_spanish: a no temer
  alternatives_spanish:
  - a no desanimarse
  - a no acobardarse
  lexicon: BDAG
  rationale: El verbo puede implicar miedo o cobardía. Aquí, por el contexto militar, «no temer» comunica bien la exhortación sin cargar el texto con una interpretación más fuerte que la del griego.
- source_word: τὴν τῶν ἐθνῶν ἔφοδον
  english_pob_choice: the attack of the nations
  chosen_spanish: el ataque de las naciones
  alternatives_spanish:
  - el asalto de las naciones
  - el ímpetu de las naciones
  lexicon: BDAG
  rationale: ἔφοδος es un avance hostil o ataque. «Ataque» mantiene esa fuerza; «naciones» conserva la referencia a pueblos extranjeros sin introducir «gentiles» como término teológico más marcado.
- source_word: ἔχοντας δὲ κατὰ νοῦν
  english_pob_choice: but to keep in mind
  chosen_spanish: sino a tener presentes
  alternatives_spanish:
  - pero a tener en mente
  - sino a recordar
  lexicon: BDAG
  rationale: La construcción participial pide una expresión natural en español que conserve la idea de memoria activa. «Tener presentes» es idiomático y fiel al sentido cognitivo.
- source_word: τὰ προγεγονότα αὐτοῖς ἀπʼ οὐρανοῦ βοηθήματα
  english_pob_choice: the help that had previously come to them from heaven
  chosen_spanish: los auxilios que antes les habían venido del cielo
  alternatives_spanish:
  - la ayuda que antes les había venido del cielo
  - los anteriores auxilios del cielo recibidos por ellos
  lexicon: BDAG
  rationale: βοηθήματα denota ayudas, auxilios o socorros. «Auxilios» refleja bien el plural conceptual del griego y mantiene el sentido de intervenciones divinas pasadas; «del cielo» sigue de cerca ἀπʼ οὐρανοῦ.
- source_word: τὰ νῦν προσδοκᾶν
  english_pob_choice: and now to expect
  chosen_spanish: y ahora a esperar
  alternatives_spanish:
  - y ahora a aguardar
  - y ahora a esperar con confianza
  lexicon: BDAG
  rationale: El infinitivo retoma la exhortación; «esperar» en español puede expresar espera confiada sin añadir demasiado. El contexto justifica una expectativa activa de victoria.
- source_word: τὴν παρὰ τοῦ παντοκράτορος ἐσομένην αὐτοῖς νίκην
  english_pob_choice: the victory that would come to them from the Almighty
  chosen_spanish: la victoria que les vendría del Todopoderoso
  alternatives_spanish:
  - la victoria que les vendría del Omnipotente
  - la victoria que les habría de venir del Todopoderoso
  lexicon: BDAG
  rationale: «Todopoderoso» es la traducción natural de παντοκράτωρ en un título divino, y «les vendría» conserva la procedencia y el valor futuro de ἐσομένην sin sonar artificial.
theological_decisions:
- issue: Título divino παντοκράτωρ
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Todopoderoso
  alternative_spanish_readings:
  - el Omnipotente
  - el Soberano de todo
  rationale: Se mantiene el título divino con una forma transparente y común en español. «Todopoderoso» preserva la fuerza teológica del griego sin desplazarla hacia una paráfrasis más interpretativa.
  doctrine_reference: Translate titles; transliterate names.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés muestran una exhortación continua con tres movimientos: no temer el ataque, recordar ayudas previas del cielo y esperar la victoria futura del Dios supremo. La redacción española sigue esa secuencia sin añadir elementos narrativos ajenos.'
  spanish_consistency_notes:
  - Se mantiene «Todopoderoso» para παντοκράτωρ, en coherencia con el valor titulado del griego y con el estándar POB para títulos divinos.
  - «Auxilios» conserva el plural conceptual de βοηθήματα, evitando reducirlo a una ayuda genérica si el griego sugiere varias intervenciones.
  - «Las naciones» sigue el uso del inglés POB «the nations» y no introduce «gentiles», que en español podría cargar el texto con una resonancia religiosa distinta.
