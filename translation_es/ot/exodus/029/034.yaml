    rationale: El hebreo בָּאֵשׁ admite ambas posibilidades, pero el inglés auditado prefirió «with fire» y en español bíblico-jurídico «quemar con fuego» suena más natural y estable.
  revised_spanish_text: Y si queda algo de la carne de la ofrenda de ordenación[a] o del pan hasta la mañana, entonces quemarás con fuego lo que haya quedado. No se comerá, porque es santo.
  revised_footnotes:
  - marker: a
    text: O «la ofrenda de consagración». El término hebreo se refiere al rito sacerdotal de instalación.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores de estilo y naturalidad sin cambiar el sentido: «con fuego» mejora la idiomaticidad de בָּאֵשׁ en este contexto, y «porque es santo» expresa קֹדֶשׁ הוּא con español más claro y digno. No hay cambio sustantivo en la exégesis ni en la terminología principal.'
