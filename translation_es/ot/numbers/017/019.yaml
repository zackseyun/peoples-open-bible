translation:
  language: es
  text: Y los pondrás[a] en el tabernáculo de reunión, delante del testimonio[b], donde me encontraré con ustedes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los colocarás’ o ‘los dejarás’. El hebreo expresa una acción de poner o colocar con objeto plural.
    reason: lexical_alternative
  - marker: b
    text: O ‘delante del testimonio del pacto’. El hebreo puede referirse al testimonio asociado al pacto, sin especificar más aquí.
    reason: lexical_alternative
  - marker: c
    text: O ‘donde me manifestaré a ustedes’ o ‘donde he fijado encontrarme con ustedes’. El hebreo admite la idea de un encuentro señalado.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִנַּחְתָּם
  english_pob_choice: And you shall place them
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - Y los pondrás
  - Y los colocarás
  - Y los dejarás
  lexicon: HALOT
  rationale: 'El hebreo expresa una acción causativa en segunda persona masculina singular con sufijo plural: ‘harás que queden puestos’. En español, ‘pondrás’ mantiene la fuerza directiva y suena natural; el objeto plural queda recuperable por el contexto inmediato.'
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en el tabernáculo de reunión
  alternatives_spanish:
  - en la tienda de reunión
  - en el tabernáculo del encuentro
  lexicon: HALOT
  rationale: ‘אֹהֶל מוֹעֵד’ es la designación estable del santuario. ‘Tabernáculo de reunión’ comunica bien el referente bíblico y evita una traducción demasiado literal que sonaría menos natural en español.
- source_word: לִפְנֵי הָעֵדוּת
  english_pob_choice: before the testimony
  chosen_spanish: delante del testimonio
  alternatives_spanish:
  - ante el testimonio
  - frente al testimonio
  - delante del testimonio del pacto
  lexicon: HALOT
  rationale: ‘לִפְנֵי’ pide una relación espacial de ‘delante de/ante’. Se preserva ‘testimonio’ para no cerrar el sentido hacia ‘las tablas’ o ‘el arca’, siguiendo la tensión léxica documentada.
- source_word: אֲשֶׁר אִוָּעֵד לָכֶם
  english_pob_choice: where I meet with you
  chosen_spanish: donde me encontraré con ustedes
  alternatives_spanish:
  - donde me reuniré con ustedes
  - donde me daré a conocer a ustedes
  - donde me citaré con ustedes
  lexicon: HALOT
  rationale: El nifal de יעד en este contexto tiene la idea de encuentro señalado/appoint meeting. ‘Me encontraré con ustedes’ conserva el sentido relacional y locativo del hebreo, sin forzar una paráfrasis explicativa.
theological_decisions:
- issue: Alcance de ‘el testimonio’
  english_pob_reading: Retain the literal phrase 'the testimony' without specifying whether it refers directly to the tablets, the ark, or the covenant witness more broadly.
  chosen_spanish_reading: Mantener ‘el testimonio’ sin aclarar si se refiere a las tablas, al arca o al testimonio del pacto en sentido más amplio.
  alternative_spanish_readings:
  - las tablas del testimonio
  - el arca del testimonio
  - el testimonio del pacto
  rationale: El hebreo es intencionalmente denso y no explicita el referente aquí. La versión española conserva esa amplitud semántica para no resolver una tensión documental que el texto no resuelve.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el audit trail inglés; no se aplicaron revisiones posteriores en el registro base, y el estado de concordancia es alto.
  spanish_consistency_notes:
  - Se conserva ‘testimonio’ para mantener la ambigüedad documental del hebreo.
  - Se usa ‘tabernáculo de reunión’ como equivalente culto y readable de אֹהֶל מוֹעֵד.
  - Se prefiere ‘ustedes’ para un español neutro y reverente en segunda persona plural.
