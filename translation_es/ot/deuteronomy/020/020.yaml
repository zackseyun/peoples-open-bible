  text: רַ֞ק עֵ֣ץ אֲשֶׁר תֵּדַ֗ע כִּֽי לֹא עֵ֤ץ מַאֲכָל֙ ה֔וּא אֹת֥/וֹ תַשְׁחִ֖ית וְ/כָרָ֑תָּ וּ/בָנִ֣יתָ מָצ֗וֹר עַל הָ/עִיר֙ אֲשֶׁר הִ֨וא עֹשָׂ֧ה עִמְּ/ךָ֛ מִלְחָמָ֖ה עַ֥ד רִדְתָּֽ/הּ־־־־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/020/020.yaml
  text: Only the trees that you know are not trees for food[a], those you may destroy and cut down, and build siegeworks against the city that is making war with you[b], until you bring it down.
  footnotes:
  - marker: a
    text: Or 'build a siege ramp' or 'construct siegeworks.' The Hebrew מָצוֹר can refer broadly to siege fortifications rather than one specific structure.
    reason: lexical_alternative
  - marker: b
    text: Or 'until it falls.' The Hebrew literally says 'until you bring it down,' using a verb of descent for the city's defeat.
    reason: lexical_alternative
