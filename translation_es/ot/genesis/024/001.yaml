translation:
  language: es
  text: Ahora bien, Abraham era viejo, de edad avanzada[a], y Yahvé había bendecido a Abraham en todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «entrado en días», un modismo que significa que alguien ha llegado a edad avanzada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַבְרָהָם
  english_pob_choice: Now Abraham
  chosen_spanish: Ahora bien, Abraham
  alternatives_spanish:
  - Y Abraham
  - Ahora Abraham
  lexicon: HALOT
  rationale: La waw abre una nueva unidad narrativa; «Ahora bien» conserva el valor discursivo introductorio en un español natural y digno.
- source_word: זָקֵן
  english_pob_choice: was old
  chosen_spanish: era viejo
  alternatives_spanish:
  - estaba viejo
  - era anciano
  - había envejecido
  lexicon: HALOT
  rationale: El hebreo expresa edad avanzada de modo directo. «Era viejo» mantiene la sencillez y la fuerza semántica sin añadir matices no presentes.
- source_word: בָּא בַּיָּמִים
  english_pob_choice: advanced in years
  chosen_spanish: avanzado en años
  alternatives_spanish:
  - entrado en días
  - de muchos días
  - muy anciano
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de edad avanzada. «Avanzado en años» comunica el sentido idiomático con claridad y sin literalismo forzado; se conserva la nota del modismo en la nota a.
- source_word: וַֽ/יהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio del pacto, יהוה. En español, la convención del proyecto es «Yahvé», no una sustitución por «SEÑOR».
- source_word: בֵּרַךְ
  english_pob_choice: had blessed
  chosen_spanish: había bendecido
  alternatives_spanish:
  - bendijo
  - bendecía
  lexicon: HALOT
  rationale: El perfecto hebreo aquí resume un estado ya vigente antes de la escena narrativa; el pluscuamperfecto español refleja bien esa anterioridad.
- source_word: בַּכֹּל
  english_pob_choice: in all things
  chosen_spanish: en todo
  alternatives_spanish:
  - en todas las cosas
  - en todo aspecto
  - en todas las cosas
  lexicon: HALOT
  rationale: La frase hebrea señala bendición comprehensiva. «En todo» es breve, idiomático y mantiene el alcance global del original sin restringirlo a bienes materiales.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre del pacto en forma auditable y acorde con la terminología del proyecto. No se lo mascara con un título genérico, ya que el hebreo usa el Tetragrámaton directamente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Modismo hebreo בָּא בַּיָּמִים
  english_pob_reading: advanced in years
  chosen_spanish_reading: avanzado en años
  alternative_spanish_readings:
  - entrado en días
  - de edad avanzada
  rationale: Se conserva el valor idiomático sin traducir de forma demasiado literal, pero sin perder la tensión expresiva del hebreo. La nota señala el sentido literal subyacente.
  doctrine_reference: HALOT, בוא + ימים como modismo de vejez
translation_notes:
  revision_awareness: El audit trail inglés pasó de «in everything» a «in all things» por ajuste de formalidad y cercanía al hebreo. La versión española adopta «en todo», que mantiene la amplitud total de בַּכֹּל con naturalidad y brevedad, y sigue la decisión revisionada de preservar un registro formal sin volverse pesado.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה según el estándar del proyecto.
  - Se eligió «era viejo» / «avanzado en años» para reflejar tanto la edad como el modismo hebreo.
  - «En todo» evita limitar la bendición a posesiones y mantiene la totalidad del hebreo בַּכֹּל.
  - La nota a está anclada únicamente en «avanzado en años» para señalar el modismo original sin duplicar explicaciones.
