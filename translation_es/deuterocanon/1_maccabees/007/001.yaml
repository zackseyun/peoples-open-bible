translation:
  language: es
  text: En el año ciento cincuenta y uno, Demetrio hijo de Seleuco salió de Roma, y subió con pocos hombres a una ciudad junto al mar[a], y reinó allí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a una ciudad costera». El griego dice literalmente: «a una ciudad junto al mar».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se hizo rey allí». El verbo griego puede denotar tanto entrar en la realeza como reinar como rey, según el contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἔτους ἑνὸς καὶ πεντηκοστοῦ
  english_pob_choice: In the one hundred fifty-first year
  chosen_spanish: En el año ciento cincuenta y uno
  alternatives_spanish:
  - En el año ciento cincuenta y primero
  - En el año 151
  lexicon: LSJ
  rationale: La fórmula cronológica griega se expresa de manera natural en español como una datación absoluta con 'En el año ciento cincuenta y uno'. Evita un orden demasiado calcado y conserva el valor histórico de la referencia temporal.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - salió de
  lexicon: LSJ
  rationale: El verbo aoristo de ἐξέρχομαι pide un verbo simple de movimiento. 'Salió' reproduce bien la idea de salida desde Roma sin añadir matices de huida o partida formal que el griego no exige.
- source_word: Δημήτριος ὁ τοῦ Σελεύκου
  english_pob_choice: Demetrius son of Seleucus
  chosen_spanish: Demetrio, hijo de Seleuco
  alternatives_spanish:
  - Demetrio, el hijo de Seleuco
  - Demetrio de Seleuco
  lexicon: LSJ
  rationale: El patronímico griego se vuelve de forma natural 'hijo de Seleuco'. Mantiene explícita la relación familiar y es idiomático en español bíblico contemporáneo.
- source_word: ἀνέβη
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - subió a
  - ascendió
  lexicon: LSJ
  rationale: Se conserva el verbo de movimiento ascendente. Aunque el destino sea costero, el griego usa el verbo narrativo estándar y 'subió' preserva esa elección sin forzar una reinterpretación.
- source_word: σὺν ἀνδράσιν ὀλίγοις
  english_pob_choice: with a few men
  chosen_spanish: con pocos hombres
  alternatives_spanish:
  - acompañado de pocos hombres
  - con un pequeño grupo de hombres
  lexicon: LSJ
  rationale: '''Con pocos hombres'' expresa con claridad el reducido número de su comitiva y corresponde de manera directa al sintagma griego.'
- source_word: εἰς πόλιν παραθαλασσίαν
  english_pob_choice: to a city by the sea
  chosen_spanish: a una ciudad junto al mar
  alternatives_spanish:
  - a una ciudad costera
  - a una ciudad a la orilla del mar
  lexicon: LSJ
  rationale: Se mantiene la relación espacial literal 'by the sea' con una construcción natural en español. 'Junto al mar' conserva la imagen sin imponer una clasificación técnica como 'costera'.
- source_word: ἐβασίλευσεν
  english_pob_choice: reigned there
  chosen_spanish: reinó allí
  alternatives_spanish:
  - se hizo rey allí
  - gobernó allí como rey
  lexicon: LSJ
  rationale: El aoristo puede resumir el ejercicio o inicio de la realeza. 'Reinó allí' preserva el sentido regio sin decidir innecesariamente entre entronización y ejercicio continuado del cargo.
theological_decisions:
- issue: Nuance of ἐβασίλευσεν as kingship vs. enthronement
  english_pob_reading: reigned there
  chosen_spanish_reading: reinó allí
  alternative_spanish_readings:
  - se hizo rey allí
  - gobernó allí como rey
  rationale: No hay un problema doctrinal, pero sí una decisión histórica/semántica. El español 'reinó allí' conserva la realeza explícita y deja abierta la posibilidad de que el aoristo resuma el comienzo del reinado o su ejercicio, como en el audit trail inglés.
  doctrine_reference: 'Translation philosophy §5: consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: 'Se ha seguido el control auditado del inglés POB sin depender mecánicamente de él: se mantuvo la datación, el patronímico, el verbo de salida, el movimiento ascendente, la pequeña comitiva, la localización marítima y el valor regio de ἐβασίλευσεν. No hubo revisiones aplicadas en el pase más reciente, y el texto final conserva las alternativas semánticas relevantes en nota.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto base lo requiera; aquí no aparece el nombre divino.
  - '''Reinó'' mantiene la fuerza real de ἐβασίλευσεν sin introducir ''se hizo rey'' en el texto principal.'
  - '''Junto al mar'' evita estrechar el sentido a una categoría geográfica técnica y conserva la transparencia del griego.'
