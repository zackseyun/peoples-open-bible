translation:
  language: es
  text: Pero los hombres de la tropa[a], a quienes Amasías había hecho volver de ir con él a la guerra, hicieron incursiones contra las ciudades de Judá, desde Samaria hasta Bet-horón[b], y mataron a tres mil de ellos[c] y tomaron mucho botín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Tropa” traduce el sentido militar de גְּדוּד; en español no se mantiene el literal “hijos de”.
    reason: lexical_alternative
  - marker: b
    text: O “desde Samaria hasta Bet-horón”; la expresión hebrea marca la extensión geográfica de la incursión.
    reason: lexical_alternative
  - marker: c
    text: O “derribaron a tres mil de ellos”. El verbo hebreo puede expresarse de forma menos explícita, aunque en contexto de batalla implica muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי הַגְּדוּד
  english_pob_choice: the men of the troop
  chosen_spanish: los hombres de la tropa
  alternatives_spanish:
  - los hijos de la banda
  - los soldados de la unidad
  - los miembros del grupo de incursión
  lexicon: HALOT
  rationale: בְנֵי הַגְּדוּד es literalmente “hijos de la banda/tropa”, pero en español bíblico natural resulta mejor “los hombres de la tropa”, que conserva el sentido militar del grupo sin calcar “hijos”.
- source_word: אֲשֶׁר הֵשִׁיב אֲמַצְיָהוּ
  english_pob_choice: whom Amaziah had sent back
  chosen_spanish: a quienes Amasías había hecho volver
  alternatives_spanish:
  - a quienes Amasías había enviado de regreso
  - a quienes Amasías había apartado
  - a quienes Amasías había despachado de vuelta
  lexicon: HALOT
  rationale: הֵשִׁיב, en hiphil de שוב, expresa causar que regresen. “Hizo volver” reproduce bien esa acción causal y suena natural en español.
- source_word: מִלֶּכֶת עִמּוֹ לַמִּלְחָמָה
  english_pob_choice: from going with him to battle
  chosen_spanish: de ir con él a la guerra
  alternatives_spanish:
  - de acompañarlo a la guerra
  - de salir con él a la batalla
  - de ir con él al combate
  lexicon: HALOT
  rationale: El infinitivo con preposición indica impedir que lo acompañaran en la campaña. “Ir con él a la guerra” mantiene la referencia a la campaña militar y evita una sobreespecificación.
- source_word: וַיִּפְשְׁטוּ
  english_pob_choice: raided
  chosen_spanish: irrumpieron
  alternatives_spanish:
  - hicieron una incursión
  - saquearon
  - asaltaron
  lexicon: HALOT
  rationale: פשט puede expresar una incursión o raid militar. “Irrumpieron” transmite la entrada hostil e intempestiva; el contexto ya deja claro que fue un ataque de saqueo.
- source_word: בְּעָרֵי יְהוּדָה
  english_pob_choice: the cities of Judah
  chosen_spanish: en las ciudades de Judá
  alternatives_spanish:
  - en las ciudades de Judá
  - en los poblados de Judá
  lexicon: HALOT
  rationale: עָרִים se traduce de forma directa y sobria como “ciudades”.
- source_word: מִשֹּׁמְרוֹן וְעַד בֵּית חוֹרוֹן
  english_pob_choice: from Samaria to Beth-horon
  chosen_spanish: desde Samaria hasta Bet-horón
  alternatives_spanish:
  - de Samaria hasta Bet-horón
  - desde Samaria y hasta Bet-horón
  - desde Samaria as a Bet-horón
  lexicon: HALOT
  rationale: La construcción marca la extensión geográfica del saqueo. Se mantienen los topónimos con transliteración común en español bíblico, y “desde... hasta...” preserva el alcance.
- source_word: וַיַּכּוּ מֵהֶם
  english_pob_choice: struck down three thousand of them
  chosen_spanish: mataron a tres mil de ellos
  alternatives_spanish:
  - hirieron a tres mil de ellos
  - derribaron a tres mil de ellos
  - golpearon a tres mil de ellos
  lexicon: HALOT
  rationale: נכה es más amplio que “matar”, pero en este contexto bélico el resultado letal es el sentido más natural y explícito en español. La alternativa “hirieron/derribaron” sería menos precisa para el efecto narrativo.
- source_word: שְׁלֹשֶׁת אֲלָפִים
  english_pob_choice: three thousand
  chosen_spanish: tres mil
  alternatives_spanish:
  - tres millares
  lexicon: HALOT
  rationale: Traducción numérica directa.
- source_word: וַיָּבֹזּוּ בִּזָּה רַבָּה
  english_pob_choice: took much plunder
  chosen_spanish: recogieron mucho botín
  alternatives_spanish:
  - tomaron mucho botín
  - saquearon abundantemente
  - se llevaron gran botín
  lexicon: HALOT
  rationale: El hebreo intensifica la acción con un cognado verbal-sustantivo. “Recogieron mucho botín” comunica el resultado del saqueo en un español claro, sin perder el matiz de acumulación de despojos.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el sentido auditado en la POB inglesa: incursión militar posterior al despido de la tropa, extensión geográfica del saqueo y resultado letal seguido de botín abundante. No se requieren revisiones adicionales respecto del contexto auditado.'
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el texto lo requiera explícitamente; en este versículo no aparece el nombre divino.
  - Se mantiene “Bet-horón” como topónimo transliterado, coherente con el registro bíblico español.
  - Se prefieren verbos de acción militar naturales en español (“irrumpieron”, “mataron”, “recogieron”) sin diluir el sentido de incursión y saqueo.
