id: 1CO.10.16
reference: 1 Corinthians 10:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὸ ποτήριον τῆς εὐλογίας ὃ εὐλογοῦμεν, οὐχὶ κοινωνία ⸂ἐστὶν τοῦ αἵματος τοῦ Χριστοῦ⸃; τὸν ἄρτον ὃν κλῶμεν, οὐχὶ κοινωνία τοῦ σώματος τοῦ Χριστοῦ ἐστιν;
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/010/016.yaml
  text: The cup of blessing that we bless—is it not a sharing in the blood of Messiah? The bread that we break—is it not a sharing in the body of Messiah?[a][b]
  footnotes:
  - marker: a
    text: Or "participation in"; also traditionally "communion of."
    reason: lexical_alternative
  - marker: b
    text: Greek "Christou"; rendered "Messiah" here because Χριστός functions as a title. Traditionally, "Christ."
    reason: alternative_reading
translation:
  language: ko
  text: 우리가 축복하는 축복의 잔, 그것은 메시아의 피에 참여함이 아닙니까? 우리가 떼는 빵, 그것은 메시아의 몸에 참여함이 아닙니까?
  philosophy: optimal-equivalence
