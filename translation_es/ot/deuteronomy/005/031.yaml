translation:
  language: es
  text: Pero tú, quédate de pie[a] aquí conmigo, y yo te hablaré todo el mandamiento y los estatutos y los juicios que tú les enseñarás, para que ellos los hagan en la tierra que yo les doy para poseerla[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "permanece aquí conmigo" o "quédate aquí conmigo". El hebreo usa un verbo concreto de postura: "estar de pie".'
    reason: lexical_alternative
  - marker: b
    text: O "para heredarla" o "para tomar posesión de ella".
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה פֹּה עֲמֹד עִמָּדִי
  english_pob_choice: stand here with me
  chosen_spanish: ponte aquí conmigo
  alternatives_spanish:
  - permanece aquí conmigo
  - quédate aquí conmigo
  - ponte de pie aquí conmigo
  lexicon: HALOT
  rationale: עָמַד conserva la imagen concreta de ponerse o mantenerse de pie; en español, “ponte aquí conmigo” comunica la postura y la cercanía relacional sin sonar rígido. “Aquí” y “conmigo” preservan פֹּה y עִמָּדִי.
- source_word: וַאֲדַבְּרָה אֵלֶיךָ
  english_pob_choice: and I will speak to you
  chosen_spanish: y yo te hablaré
  alternatives_spanish:
  - y hablaré contigo
  - y te hablaré
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención/volición divina en secuencia con el imperativo. “Yo te hablaré” mantiene claridad y dignidad, y el pronombre explícito ayuda a conservar el énfasis del hebreo.
- source_word: אֵת כָּל הַמִּצְוָה
  english_pob_choice: all the commandment
  chosen_spanish: todo el mandamiento
  alternatives_spanish:
  - el mandamiento completo
  - todo el mandato
  lexicon: HALOT
  rationale: Se conserva el singular hebreo מִצְוָה como “mandamiento”, siguiendo la decisión auditada de no pluralizar ni aplanar la forma. “Todo” refleja כָּל sin perder la unidad del sustantivo.
- source_word: הַחֻקִּים
  english_pob_choice: the statutes
  chosen_spanish: los estatutos
  alternatives_spanish:
  - los decretos
  - las normas
  lexicon: HALOT
  rationale: “Estatutos” es un término jurídico-covenantal claro en español y mantiene la distinción respecto de מִשְׁפָּטִים.
- source_word: הַמִּשְׁפָּטִים
  english_pob_choice: the judgments
  chosen_spanish: los juicios
  alternatives_spanish:
  - las sentencias
  - las ordenanzas
  lexicon: HALOT
  rationale: Se mantiene la raíz judicial del término. “Juicios” reproduce mejor el campo semántico de decisiones legales que opciones más generalizadas como “ordenanzas”.
- source_word: אֲשֶׁר תְּלַמְּדֵם
  english_pob_choice: that you shall teach them
  chosen_spanish: que tú les enseñarás
  alternatives_spanish:
  - que les enseñarás
  - que tú debes enseñarles
  lexicon: HALOT
  rationale: La relación de relativo con valor instruccional se traduce de forma directa. “Enseñarás” preserva el tono de comisión futura y “les” conserva el destinatario plural.
- source_word: וְעָשׂוּ
  english_pob_choice: so that they may do them
  chosen_spanish: para que ellos los hagan
  alternatives_spanish:
  - y ellos los hagan
  - de modo que los hagan
  lexicon: HALOT
  rationale: El hebreo expresa finalidad/resultados de la enseñanza. “Para que” comunica esa relación sin añadir inferencias; el pronombre “los” retoma los mandamientos, estatutos y juicios.
- source_word: בָאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra prometida
  lexicon: HALOT
  rationale: En español, “tierra” preserva el valor bíblico-covenantal de בָאָרֶץ mejor que “país”. El contexto de herencia/promesa hace natural esta opción.
- source_word: אֲשֶׁר אָנֹכִי נֹתֵן לָהֶם
  english_pob_choice: that I am giving them
  chosen_spanish: que yo les doy
  alternatives_spanish:
  - que yo les estoy dando
  - que yo les daré
  lexicon: HALOT
  rationale: Aunque el participio puede sugerir acción en curso, en español “les doy” transmite con naturalidad la donación divina en contexto de promesa vigente. Se evita forzar una perífrasis menos idiomática.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess
  chosen_spanish: para poseerla
  alternatives_spanish:
  - para tomar posesión de ella
  - para heredarlo
  lexicon: HALOT
  rationale: “Poseerla” conserva el sentido de adquirir/ocupar la tierra como herencia concreta. El sufijo femenino se refleja en “la”, referido a “la tierra”.
theological_decisions:
- issue: Tríada legal מִצְוָה / חֻקִּים / מִשְׁפָּטִים
  english_pob_reading: Retain distinct terms as 'commandment,' 'statutes,' and 'judgments' rather than collapsing them into a generic phrase like 'laws and rules.'
  chosen_spanish_reading: Conservar la distinción como “mandamiento, estatutos y juicios” en vez de reducirla a “leyes” o “normas”.
  alternative_spanish_readings:
  - mandato, decretos y ordenanzas
  - ley, estatutos y reglas
  rationale: El versículo subraya la integridad y variedad de la instrucción del pacto. Mantener los tres términos evita homogeneizar lo que el hebreo distingue y conserva la textura jurídica del texto.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Singular de מִצְוָה
  english_pob_reading: Use singular 'commandment' in the main text.
  chosen_spanish_reading: Usar singular “mandamiento” en el texto principal.
  alternative_spanish_readings:
  - mandato
  - ley
  rationale: El hebreo presenta un singular colectivo. En español, el singular “mandamiento” respeta mejor la forma fuente y permite que la pluralidad se exprese en los términos siguientes sin perder la unidad inicial.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Sentido de בָאָרֶץ y la herencia de la tierra
  english_pob_reading: '''in the land ... to possess it'''
  chosen_spanish_reading: “en la tierra ... para poseerla”
  alternative_spanish_readings:
  - en la tierra ... para heredarlo
  - en la tierra ... para tomar posesión de ella
  rationale: La fórmula mantiene el lenguaje de promesa y herencia del Pentateuco sin introducir explicaciones ajenas al verso. “Poseerla” es breve, bíblico y transparente en español.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que ajustó la puntuación y cambió el relativo a una forma más natural. En español se mantuvo una sintaxis igualmente directa, conservando la tríada legal, la relación de finalidad y la referencia a la tierra como herencia, sin añadir elementos no presentes en el hebreo.
  spanish_consistency_notes:
  - Se conserva la distinción entre mandamiento, estatutos y juicios, evitando términos genéricos que borren la estructura del hebreo.
  - Se usa “tierra” para בָאָרֶץ por su resonancia bíblica y covenantal; “poseerla” mantiene el matiz de herencia/ocupación.
  - Se mantiene un registro formal y bíblico, pero con español natural de lectura pública.
  - Se respeta el singular de “mandamiento” para reflejar el hebreo, acompañado de sustantivos plurales en la segunda mitad del sintagma.
