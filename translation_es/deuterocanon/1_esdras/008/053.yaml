translation:
  language: es
  text: Porque habíamos dicho al rey que la fuerza de nuestro Señor estaría con los que lo buscan para toda restauración[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para toda restauración»; la expresión griega es inusual, y algunos intérpretes la entienden de manera más amplia como «para el éxito» o «para un buen resultado».
    reason: lexical_alternative
  - marker: b
    text: El paralelo hebreo en este punto difiere de manera sustancial, pues habla de ayunar y buscar a Dios en vez de repetir el informe al rey. Esta traducción sigue el texto griego de 1 Esdras como testimonio principal.
    reason: textual_variant
lexical_decisions:
- source_word: εἴπαμεν
  english_pob_choice: we had told
  chosen_spanish: habíamos dicho
  alternatives_spanish:
  - habíamos hablado
  - habíamos dicho al rey
  lexicon: BDAG
  rationale: El perfecto anterior español expresa bien que la declaración ya había ocurrido antes del evento narrado. «Habíamos dicho» conserva el carácter de comunicación dirigida sin volverlo excesivamente literal ni más coloquial que el griego.
- source_word: Ἰσχὺς
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  lexicon: BDAG
  rationale: Ἰσχύς nombra fuerza o vigor. «Fuerza» es natural en español y mantiene el sentido de capacidad divina para sostener, sin desplazarlo hacia una abstracción más amplia como «poder».
- source_word: τοῦ κυρίου ἡμῶν
  english_pob_choice: of our Lord
  chosen_spanish: de nuestro Señor
  alternatives_spanish:
  - de nuestro Dueño
  - de nuestro Maestro
  lexicon: BDAG
  rationale: Se conserva «Señor» por la convención del proyecto para κύριος referido a Dios. En este contexto de griego judío reverencial, «nuestro Señor» comunica adecuadamente la relación confesional.
- source_word: μετὰ τῶν ἐπιζητούντων αὐτόν
  english_pob_choice: with those who seek him
  chosen_spanish: con los que lo buscan
  alternatives_spanish:
  - con los que lo buscan con diligencia
  - con los que lo buscan intensamente
  lexicon: BDAG
  rationale: ἐπιζητέω intensifica la idea de buscar, pero en español «los que lo buscan» ya transmite la acción de manera clara y idiomática. Se evita forzar un adverbio de intensidad que el español podría oír como interpretativo.
- source_word: εἰς πᾶσαν ἐπανόρθωσιν
  english_pob_choice: for every restoration
  chosen_spanish: para toda restauración
  alternatives_spanish:
  - para toda rectificación
  - para completa restauración
  - para todo restablecimiento
  lexicon: LSJ
  rationale: ἐπανόρθωσις puede abarcar restauración, enderezamiento o restablecimiento. «Toda restauración» preserva la concreción léxica del griego y mantiene la apertura semántica que la nota inglesa reconoce por tratarse de una frase inusual.
theological_decisions:
- issue: Cómo rendir κύριος aplicado a Dios en 1 Esdras
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: La política del proyecto para el texto principal es traducir κύριος como «Señor» cuando refiere a Dios. En este versículo la referencia es reverencial al Dios de Israel, por lo que «nuestro Señor» conserva continuidad teológica y naturalidad eclesial en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Cómo reflejar ἐπανόρθωσις sin armonizar con el paralelo hebreo
  english_pob_reading: for every restoration
  chosen_spanish_reading: para toda restauración
  alternative_spanish_readings:
  - para prosperidad
  - para éxito
  - para un buen resultado
  rationale: El testimonio griego es la base primaria de 1 Esdras en este expediente, aunque el paralelo hebreo difiera notablemente. Por eso la traducción mantiene la idea de restauración/enderezamiento en vez de sustituirla por una paráfrasis más amplia como «éxito» o «prosperidad».
  doctrine_reference: 'PHILOSOPHY.md: Original-language primacy over translation tradition; use MT parallel as sanity check, but Greek remains primary source'
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó la coma antes de «for every restoration» para reflejar mejor que la frase modifica de manera continua a «would be with those who seek him». En español se mantuvo la misma relación sintáctica con «para toda restauración» como complemento final unido al verbo «estaría».
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος conforme al uso doctrinal del proyecto.
  - Se prefirió «restauración» sobre «prosperidad» o «éxito» para no suavizar la tensión léxica del griego.
  - «Los que lo buscan» conserva el sentido básico de ἐπιζητούντων sin añadir un matiz interpretativo excesivo.
  - La puntuación evita separar innecesariamente «para toda restauración» del verbo principal, siguiendo la revisión auditada del texto inglés.
