    text: The Greek term rendered 'furnishings' (ὅλκια) is rare and uncertain; possible narrower senses include 'hangings' or other tent appurtenances.
    reason: lexical_alternative
  - marker: b
    text: The repeated pronouns in the final clause likely mean that Judith piled the goods onto the wagons, though the Greek wording is somewhat compressed.
    reason: lexical_alternative
