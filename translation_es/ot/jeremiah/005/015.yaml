review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: anuncia que Yahvé trae una nación lejana contra Israel, enfatiza su fuerza/antigüedad y su incomprensibilidad lingüística. También preserva correctamente «Yahvé» para יְהוָה y «contra ustedes» para el matiz hostil de עֲלֵיכֶם. Sin embargo, hay un problema de concordancia pronominal: el verso se dirige a «ustedes»/«casa de Israel», pero luego pasa a «no conoces / no entiendes» en singular. En español esto suena inconsistente y debilita la fidelidad discursiva del plural colectivo del anuncio.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «¡Miren!» seguido de «Yo estoy trayendo» resulta algo forzado; «Miren» puede mantenerse, aunque la secuencia mejora si se mantiene la concordancia posterior en plural. Además, «cuyo hablar no entiendes» es comprensible, pero «cuyo hablar no entienden» sigue siendo algo menos natural que «cuyo idioma no conocen, y cuya habla no entienden» o similar. Aun así, con una corrección mínima de número y un leve ajuste de fluidez, el texto queda plenamente legible.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; גּוֹי → «nación» correctamente; מֵעוֹלָם → «antigua» aceptablemente con nota alternativa; la nota sobre לְשׁוֹנוֹ / מַה יְדַבֵּר conserva el hebreo subyacente. No hay conflicto teológico significativo.'
  issues:
  - severity: medium
    issue: Inconsistencia de número entre «ustedes» y «no conoces / no entiendes».
    rationale: El hebreo usa 2ms como singular colectivo dirigido a Israel, pero en español, una vez elegido «ustedes», lo natural y fiel al referente colectivo es mantener plural en los verbos subsiguientes.
  - severity: low
    issue: «Cuyo hablar» suena algo poco natural en español contemporáneo.
    rationale: Aunque es entendible y cercano al original, en español eclesial general «lo que habla» o «su habla» suele sonar más natural. Puede repararse sin perder fidelidad.
  revised_spanish_text: ¡Miren![a] Yo estoy trayendo contra ustedes una nación desde lejos, oh casa de Israel, declara Yahvé. Es una nación poderosa; es una nación antigua[b], una nación cuya lengua no conocen[c], y cuya habla no entienden.
  revised_footnotes:
