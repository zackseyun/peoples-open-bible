translation:
  language: es
  text: y olvidaste a Yahvé, tu hacedor, que extendió los cielos y fundó la tierra; y temiste continuamente todo el día por causa de la furia del opresor, cuando[a] se disponía a destruir. Pero ¿dónde está la furia del opresor?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como si estuviera listo para destruir» para la cláusula «cuando se disponía a destruir».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּשְׁכַּח
  english_pob_choice: you forgot
  chosen_spanish: olvidaste
  alternatives_spanish:
  - has olvidado
  - olvidaste
  lexicon: HALOT
  rationale: El wayyiqtol acusa una acción pasada/completiva en tono profético. En español, 'olvidaste' suena natural y conserva la reprensión sin volverla más interpretativa de lo necesario.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: ''Yahvé''. Mantiene el nombre divino propio en vez de una sustitución titular como ''SEÑOR''.'
- source_word: עֹשֶׂךָ
  english_pob_choice: your Maker
  chosen_spanish: tu Hacedor
  alternatives_spanish:
  - el que te hizo
  - tu Creador
  lexicon: HALOT
  rationale: El participio con sufijo funciona como título relacional. 'Hacedor' conserva el tono bíblico conciso y reproduce la fuerza de 'Maker' sin perder naturalidad en español.
- source_word: נוֹטֶה שָׁמַיִם
  english_pob_choice: who stretched out the heavens
  chosen_spanish: que extiende los cielos
  alternatives_spanish:
  - que extendió los cielos
  - que despliega los cielos
  lexicon: HALOT
  rationale: נטה en contexto cosmológico admite la idea de 'extender'. En español, 'extiende los cielos' preserva la imagen creadora y encaja bien con la serie de participios/títulos.
- source_word: וְיֹסֵד אָרֶץ
  english_pob_choice: and founded the earth
  chosen_spanish: y funda la tierra
  alternatives_spanish:
  - y fundó la tierra
  - y estableció la tierra
  lexicon: HALOT
  rationale: יסד comunica el acto de asentar/fundar. Se opta por presente gnómico 'funda' para mantener la cadencia del título creador en español, sin alterar el sentido de acción fundacional.
- source_word: וַתְּפַחֵד
  english_pob_choice: and you feared
  chosen_spanish: temiste
  alternatives_spanish:
  - tuviste miedo
  - temiste continuamente
  lexicon: HALOT
  rationale: פחד puede expresarse como 'temer' o 'tener miedo'. 'Temiste' conserva la relación verbal con el sustantivo 'furia' y evita una intensificación no requerida como 'temblaste'.
- source_word: תָּמִיד כָּל הַיּוֹם
  english_pob_choice: continually all day long
  chosen_spanish: continuamente todo el día
  alternatives_spanish:
  - constantemente todo el día
  - todo el día sin cesar
  lexicon: HALOT
  rationale: La combinación intensifica duración. 'Continuamente todo el día' reproduce ambas piezas adverbiales de forma fluida y pública en español.
- source_word: מִפְּנֵי חֲמַת הַמֵּצִיק
  english_pob_choice: because of the fury of the oppressor
  chosen_spanish: por causa de la furia del opresor
  alternatives_spanish:
  - a causa de la furia del opresor
  - por el furor del opresor
  lexicon: HALOT
  rationale: מִפְּנֵי aquí expresa motivo/causa. 'Por causa de' es claro y solemne; 'furia' mantiene la fuerza de חֲמָה, y 'opresor' traduce מֵצִיק con fuerza lexical directa.
- source_word: כַּאֲשֶׁר כּוֹנֵן לְהַשְׁחִית
  english_pob_choice: when he set himself to destroy
  chosen_spanish: cuando se disponía a destruir
  alternatives_spanish:
  - cuando se preparaba para destruir
  - como si estuviera listo para destruir
  lexicon: HALOT
  rationale: כּוֹנֵן implica prepararse/ponerse en disposición. 'Se disponía a destruir' mantiene la idea de preparación intencional sin decidir demasiado entre lectura temporal o modal.
- source_word: וְאַיֵּה חֲמַת הַמֵּצִיק
  english_pob_choice: But where is the fury of the oppressor?
  chosen_spanish: Pero ¿dónde está la furia del opresor?
  alternatives_spanish:
  - ¿Y dónde está la furia del opresor?
  - Pero ¿dónde quedó la furia del opresor?
  lexicon: HALOT
  rationale: אַיֵּה formula una pregunta retórica que subraya la desaparición/impotencia de la amenaza. 'Pero' conserva el contraste con el miedo anterior, y la formulación es idiomática en español.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Nombre divino. Se mantiene 'Yahvé' para preservar la identidad personal del pacto, conforme a la convención del proyecto y al auditable trabajo de transliteración del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Scope of the clause כַּאֲשֶׁר כּוֹנֵן לְהַשְׁחִית
  english_pob_reading: when he set himself to destroy
  chosen_spanish_reading: cuando se disponía a destruir
  alternative_spanish_readings:
  - como si estuviera listo para destruir
  - cuando se preparaba para destruir
  rationale: La frase puede entenderse temporalmente con el opresor como sujeto, o con una matización de disposición/intención. 'Se disponía a destruir' conserva la ambigüedad razonable y sigue el antecedente más cercano sin exagerar la certeza del matiz.
  doctrine_reference: 'Hermenéutica textual: preservación de ambigüedad controlada cuando el hebreo admite lectura temporal o circunstancial'
translation_notes:
  revision_awareness: Se integró la revisión del audit trail que prefirió 'Yahweh/Yahvé' sobre 'the LORD/SEÑOR' y ajustó el verbo de temor para reflejar יותר directamente פחד. También se respetó la nota alternativa sobre la cláusula final de destrucción, manteniendo una redacción española que preserve la ambigüedad del hebreo sin resolverla en exceso.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el Nombre divino, en coherencia con la terminología del proyecto.
  - '''Hacedor'' se usó como equivalente natural de ''Maker'' y como título relacional.'
  - '''Furia'' traduce חֲמָה con intensidad comparable a la del registro inglés POB.'
  - '''Opresor'' traduce מֵצִיק de forma directa y consistente con el campo semántico de opresión/aflicción.'
  - La nota al pie se ancla únicamente en la cláusula con ambigüedad lexical/sintáctica del hebreo.
