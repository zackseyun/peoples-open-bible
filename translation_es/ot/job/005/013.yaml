translation:
  language: es
  text: Él atrapa a los sabios en su astucia[a], y el consejo de los torcidos[b] es precipitado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por su astucia» / «en su astucia». El hebreo puede denotar prudencia en algunos contextos, pero aquí el sentido es negativo.
    reason: lexical_alternative
  - marker: b
    text: O «los retorcidos» o «los perversos» para «los torcidos».
    reason: lexical_alternative
  - marker: c
    text: O «es llevado con prisa» o «es apresurado». La idea es que su consejo es empujado hacia una ejecución prematura y fallida.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹכֵד
  english_pob_choice: catches
  chosen_spanish: atrapa
  alternatives_spanish:
  - captura
  - prende
  lexicon: HALOT
  rationale: El participio qal funciona verbalmente con sujeto implícito del contexto. «Atrapa» conserva la imagen de caer en una trampa y suena natural en español actual.
- source_word: חֲכָמִים
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - los prudentes
  - los sabios y prudentes
  lexicon: HALOT
  rationale: 'El sustantivo plural conserva la ironía: quienes se tienen por sabios son alcanzados. «Sabios» es la forma más directa y clara en español.'
- source_word: בְּעָרְמָם
  english_pob_choice: in their craftiness
  chosen_spanish: en su astucia
  alternatives_spanish:
  - por su astucia
  - en su sagacidad
  lexicon: HALOT
  rationale: Aquí עָרְמָה lleva sentido negativo según el contexto. «Astucia» preserva la carga pejorativa sin endurecer demasiado el matiz.
- source_word: וַעֲצַת
  english_pob_choice: and the counsel
  chosen_spanish: y el consejo
  alternatives_spanish:
  - y el plan
  - y la consulta
  lexicon: HALOT
  rationale: עֵצָה puede ser consejo, plan o designio. «Consejo» mantiene el tono sapiencial y encaja bien con el paralelismo.
- source_word: נִפְתָּלִים
  english_pob_choice: the twisted
  chosen_spanish: de los torcidos
  alternatives_spanish:
  - de los devesos
  - de los retorcidos
  lexicon: HALOT
  rationale: La forma alude a personas retorcidas/deviadas moralmente. «Torcidos» conserva la metáfora sin convertirla en una paráfrasis explicativa.
- source_word: נִמְהָרָה
  english_pob_choice: is hurried along
  chosen_spanish: es apresurado
  alternatives_spanish:
  - es precipitado
  - es llevado de prisa
  lexicon: HALOT
  rationale: El niphal expresa ser hecho ir con prisa. En español, «es apresurado» mantiene la pasiva y evita añadir la imagen de ruina inmediata que no está explícita en el hebreo.
theological_decisions:
- issue: Sujeto implícito de לֹכֵד
  english_pob_reading: He catches, referring to God from the surrounding context.
  chosen_spanish_reading: Él atrapa, con referencia a Dios por el contexto inmediato.
  alternative_spanish_readings:
  - Atrapa
  - Uno atrapa
  rationale: El hebreo no nombra el sujeto en el versículo, pero el contexto de Job 5:9–16 habla de la acción de Dios. En español se hace explícito con «Él» para evitar ambigüedad, sin añadir un referente nuevo.
  doctrine_reference: Translation philosophy §1, §6
- issue: Carga moral de עָרְמָה y נִפְתָּלִים
  english_pob_reading: Both are rendered with negative moral force ('craftiness,' 'the twisted').
  chosen_spanish_reading: 'Ambos se rinden con fuerza moral negativa: «astucia» y «los torcidos».'
  alternative_spanish_readings:
  - «prudencia» y «los complicados»
  - «sagacidad» y «los de mente torcida»
  rationale: El paralelismo del verso muestra que no se trata de prudencia neutral, sino de maquinación y deformación moral. La traducción conserva esa tensión negativa que el contexto exige.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La traducción sigue la revisión más reciente del inglés POB en la segunda cláusula: se evita una intensificación añadida como «de cabeza» o «precipitado en ruina», y se conserva una pasiva sobria con «es apresurado».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplicable aquí por ausencia del nombre divino explícito en el versículo.
  - Se usó un registro bíblico moderno y claro, evitando calcos arcaizantes.
  - «Astucia» y «torcidos» conservan la negatividad del paralelismo hebreo sin sobreexplicar.
  - La pasiva «es apresurado» mantiene el valor verbal del niphal y su ritmo breve paralelo al hebreo.
