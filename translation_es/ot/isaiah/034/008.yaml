translation:
  language: es
  text: Porque Yahvé tiene un día de venganza[a], un año de recompensa por la causa de Sión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque hay un día de venganza para Yahvé, un año de recompensa por la causa de Sión». «Causa» también puede entenderse como «caso» o «pleito» judicial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa con el juicio anunciado antes. En español, «Porque» conserva bien el valor causal/expositivo del hebreo sin añadir matices ajenos.
- source_word: יוֹם
  english_pob_choice: day
  chosen_spanish: día
  alternatives_spanish:
  - jornada
  lexicon: HALOT
  rationale: Equivalente directo y natural para la expresión idiomática «día de venganza».
- source_word: נָקָם
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - retribución
  - revancha
  lexicon: HALOT
  rationale: «Venganza» comunica mejor en español la fuerza judicial/punitiva del sustantivo y mantiene la expresión fija «día de venganza».
- source_word: לַֽיהוָה
  english_pob_choice: the LORD has
  chosen_spanish: Yahvé tiene
  alternatives_spanish:
  - para Yahvé
  - pertenece a Yahvé
  lexicon: HALOT
  rationale: Se sigue la decisión doctrinal del POB de traducir יהוה como «Yahvé». La preposición ל expresa aquí relación/posesión; «tiene» hace explícita esa relación de manera natural en español.
- source_word: שְׁנַת
  english_pob_choice: a year
  chosen_spanish: un año
  alternatives_spanish:
  - el año
  lexicon: HALOT
  rationale: El constructo admite artículo indefinido en español para reflejar la paralela expresión temporal y la fluidez de la frase.
- source_word: שִׁלּוּמִים
  english_pob_choice: recompense
  chosen_spanish: recompensas
  alternatives_spanish:
  - retribuciones
  - recompensa
  lexicon: HALOT
  rationale: El plural hebreo puede tener valor intensivo/abstracto. «Recompensas» mantiene el plural del original y la idea de pago judicial; «retribución» sería una alternativa más abstracta.
- source_word: לְרִיב
  english_pob_choice: for ... cause
  chosen_spanish: por la causa de
  alternatives_spanish:
  - por el caso de
  - en el pleito de
  - por la querella de
  lexicon: HALOT
  rationale: רִיב puede significar disputa, caso o demanda judicial. «La causa de Sión» conserva el sentido forense en un español claro y digno, sin estrecharlo demasiado a un tecnicismo legal.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sión
  alternatives_spanish:
  - Zion
  lexicon: HALOT
  rationale: Nombre propio bíblico tradicional en español; se conserva la forma consagrada «Sión».
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar «Yahvé» en el texto principal. Esto preserva el nombre del pacto y evita la sustitución por un título.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación de לַיהוָה con el sustantivo «día»
  english_pob_reading: 'possessive/relational: ''the LORD has a day of vengeance'''
  chosen_spanish_reading: 'relación posesiva/relacional: «Yahvé tiene un día de venganza»'
  alternative_spanish_readings:
  - «para Yahvé hay un día de venganza»
  - «un día de venganza pertenece a Yahvé»
  rationale: El hebreo admite una relación posesiva o relacional. En español, la solución verbal «tiene» conserva la idea de que el día está dispuesto/adscrito a Yahvé sin forzar una construcción poco natural.
  doctrine_reference: 'DOCTRINE.md: Contested terms — prepositional ל with possessive force'
translation_notes:
  revision_awareness: El pasaje fue revisado previamente en inglés y quedó sin cambios tras dos pasadas; el acuerdo fue alto. No se observan revisiones textuales adicionales que afecten la transferencia al español, así que la presente propuesta sigue de cerca las decisiones auditadas del inglés y las adapta a un español natural.
  spanish_consistency_notes:
  - 'Se mantiene la equivalencia del nombre divino conforme a la pauta del proyecto: Yahvé.'
  - Se conserva el valor forense de רִיב con «causa», evitando una paráfrasis demasiado general.
  - 'Se preserva la correspondencia de la estructura temporal: «un día... un año...» para reflejar el paralelismo hebreo.'
  - La nota al pie marca la alternativa léxica principal en torno a לְרִיב, que en español abre la posibilidad de «caso» o «pleito».
