    II. *Καὶ οὗτος [¹ὁ ἀρχιμάγειρος Φαραὼ]¹ ἐπίστευσέ μοι τὸν οἶκον αὐτοῦ. 2. Καὶ ἠγωνισάμην πρὸς γυναῖκα ἀναιδῆ ἐπείγουσάν² με παρανομεῖν μετʼ αὐτῆς, ἀλλʼ ὁ Θεὸς *τοῦ πατρός μου³ ἐρρύσατό⁴ με ἐκ⁵ φλογὸς καιομένης. 3. Ἐφυλακίσθην⁶, ἐτύφθην⁷, ⸢ἐξεμυκτηρίσθην⸣⁸, καὶ ἔδωκέ με⁹ ὁ¹⁰ Κύριος¹¹ εἰς οἰκτιρμοὺς ἐνώπιον τοῦ δεσμοφύλακος. 4. Οὐ γὰρ¹² ἐγκαταλείπει¹³ Κύριος¹⁴ τοὺς φοβουμένους αὐτόν, *Οὐκ ἐν σκότει, ἢ δεσμοῖς¹⁵, ἢ θλίψεσιν, ἢ ἀνάγκαις. 5. Οὐ γὰρ ὡς ἄνθρωπος ἐπαισχύνεται ὁ Θεός, Οὔτε¹⁶ ὡς υἱὸς ἀνθρώπου δειλιᾷ, Οὔτε¹⁷ ὡς γηγενὴς [ἀσθενεῖ ἢ]¹⁸ πτοεῖται¹⁹, 6. Ἐν²⁰ πᾶσι δὲ τούτοις²¹ προΐσταται²² Καὶ ἐν διαφόροις τρόποις²³ παρακαλεῖ²⁴. Ἐν βραχεῖ²⁵ ἀφίσταται²⁶ *εἰς τὸ²⁷ δοκιμάσαι τῆς ψυχῆς τὸ διαβούλιον. 7. *Ἐν δέκα²⁸ πειρασμοῖς *δόκιμον ἀπέδειξέ με²⁹ Καὶ ἐν πᾶσιν αὐτοῖς³⁰ ἐμακροθύμησα³¹. Ὅτι³² μέγα φάρμακόν ἐστιν *ἡ μακροθυμία³³ Καὶ πολλὰ³⁴ ἀγαθὰ δίδωσιν *ἡ ὑπομονή³⁵.
