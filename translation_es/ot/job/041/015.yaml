  to: Los pliegues de su carne se adhieren entre sí[a]; están fundidos sobre él y no se pueden mover.
  rationale: Se ajustó el registro y la naturalidad del español sin apartarse del hebreo ni de la auditoría inglesa. «Se adhieren entre sí» mejora «se pegan», y «están fundidos sobre él» conserva mejor la imagen metafórica de יָצוּק que una forma poco idiomática como «están echados firmemente».
