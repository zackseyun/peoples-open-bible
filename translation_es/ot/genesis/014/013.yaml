translation:
  language: es
  text: Entonces vino un fugitivo y le contó a Abram el hebreo. Y él vivía junto a los robles[a] de Mamre el amorreo, hermano[b] de Escol y hermano de Aner; estos eran aliados[c] de Abram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las encinas» o «los terebintos» de Mamre. El término hebreo puede referirse a árboles grandes, no a una especie única con total seguridad.
    reason: lexical_alternative
  - marker: b
    text: O «pariente de Escol y pariente de Aner». La palabra hebrea para «hermano» también puede referirse a una relación familiar más amplia.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «dueños/poseedores de un pacto» con Abram; es decir, hombres ligados a él por tratado o alianza.
    reason: cultural_note
lexical_decisions:
- source_word: הַפָּלִיט
  english_pob_choice: a fugitive
  chosen_spanish: un fugitivo
  alternatives_spanish:
  - el sobreviviente
  - el que había escapado
  lexicon: HALOT
  rationale: El sustantivo designa a alguien que ha escapado del peligro o de la batalla. «Fugitivo» conserva esa idea de escape y suena natural en español bíblico contemporáneo.
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: le informó
  alternatives_spanish:
  - le contó
  - le reportó
  lexicon: HALOT
  rationale: El verbo puede significar decir o comunicar una noticia. En este contexto narrativo, «le informó» comunica bien el sentido de transmitir una noticia sin perder el tono formal.
- source_word: הָעִבְרִי
  english_pob_choice: the Hebrew
  chosen_spanish: el hebreo
  alternatives_spanish:
  - el ebreo
  - el eberita
  lexicon: HALOT
  rationale: La designación étnica tradicional es «el hebreo». Se conserva como rótulo identitario directo, igual que en la línea auditada en inglés.
- source_word: שֹׁכֵן
  english_pob_choice: was dwelling
  chosen_spanish: estaba habitando
  alternatives_spanish:
  - estaba viviendo
  - moraba
  lexicon: HALOT
  rationale: El participio expresa residencia continua. «Estaba habitando» conserva el aspecto durativo de manera clara y digna.
- source_word: בְּאֵלֹנֵי מַמְרֵא
  english_pob_choice: by the oaks of Mamre
  chosen_spanish: junto a los robles de Mamre
  alternatives_spanish:
  - junto a las encinas de Mamre
  - junto a los terebintos de Mamre
  - entre los grandes árboles de Mamre
  lexicon: HALOT
  rationale: אֵלֹנֵי puede referirse a árboles grandes, especialmente robles o terebintos. «Robles» es una opción natural en español; se preserva la alternativa botánica en la nota.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorite
  chosen_spanish: el amorreo
  alternatives_spanish:
  - el amorita
  lexicon: HALOT
  rationale: «Amorreo» mantiene la etnónimo bíblico tradicional y es plenamente comprensible en español bíblico.
- source_word: אֲחִי אֶשְׁכֹּל וַאֲחִי עָנֵר
  english_pob_choice: brother of Eshcol and brother of Aner
  chosen_spanish: hermano de Escol y hermano de Aner
  alternatives_spanish:
  - pariente de Escol y pariente de Aner
  - consanguíneo de Escol y consanguíneo de Aner
  lexicon: HALOT
  rationale: אָח puede designar hermano literal o una relación de parentesco más amplia. Se conserva «hermano» como el valor directo del término, dejando abierta la alternativa de parentesco más amplio.
- source_word: בַּעֲלֵי בְרִית
  english_pob_choice: allies
  chosen_spanish: aliados
  alternatives_spanish:
  - confederados
  - los que estaban ligados por un pacto
  - socios de un pacto
  lexicon: HALOT
  rationale: 'La expresión es literalmente idiomática: «poseedores/dueños de pacto». «Aliados» comunica de forma clara la relación político-covenantal que el inglés POB explicó en su nota.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el pasaje hebreo y armoniza con la decisión auditada en inglés: mantiene el orden narrativo, el epíteto étnico de Abram, la residencia continua junto a los árboles de Mamre y la relación de pacto expresada como «aliados». No se introdujeron revisiones posteriores en el expediente auditado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se prefiere «hebreo» como designación étnica estable, en línea con el expediente inglés.
  - «Robles» se eligió por naturalidad; la nota preserva las alternativas botánicas necesarias.
  - «Aliados» evita calco rígido y conserva el sentido covenantal sin perder claridad en español.
