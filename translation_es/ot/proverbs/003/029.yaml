translation:
  language: es
  text: No maquines daño contra tu prójimo[a] cuando él habita seguro contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No trames mal contra tu prójimo cuando él habita en seguridad contigo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחֲרֹשׁ
  english_pob_choice: devise
  chosen_spanish: maquines
  alternatives_spanish:
  - planees
  - maquines un plan
  - urdis
  lexicon: HALOT
  rationale: En este dicho, חרשׁ no describe arar literalmente, sino planear en secreto. «Maquines» comunica bien la acción deliberada e interior de tramar sin sonar demasiado técnico; mantiene el matiz de intención oculta que el audit trail inglés preserva con ‘devise’.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - hacia
  lexicon: HALOT
  rationale: Con חרשׁ רעה, la preposición marca una dirección hostil. «Contra» reproduce mejor esa orientación adversarial en español.
- source_word: רֵעֲךָ
  english_pob_choice: your neighbor
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu vecino
  - tu amigo
  - tu compañero
  lexicon: HALOT
  rationale: רֵעַ puede abarcar amigo, compañero o prójimo. En instrucción sapiencial y ética, «prójimo» expresa el alcance social y moral sin restringirse a cercanía afectiva, y es un equivalente natural en español bíblico contemporáneo.
- source_word: רָעָה
  english_pob_choice: harm
  chosen_spanish: daño
  alternatives_spanish:
  - mal
  - malicia
  - daño alguno
  lexicon: HALOT
  rationale: Aquí רָעָה apunta a perjuicio concreto e intencional contra otra persona. «Daño» comunica ese efecto nocivo de forma directa en español, sin cargarlo de una abstracción más amplia como «mal».
- source_word: יוֹשֵׁב
  english_pob_choice: dwells
  chosen_spanish: habita
  alternatives_spanish:
  - vive
  - reside
  - permanece
  lexicon: HALOT
  rationale: El participio de ישׁב expresa residencia estable. «Habita» conserva mejor el tono sobrio y bíblico del hebreo que «vive», a la vez que sigue siendo claro para el lector moderno.
- source_word: לָבֶטַח
  english_pob_choice: securely
  chosen_spanish: confiado
  alternatives_spanish:
  - con seguridad
  - en seguridad
  - sin temor
  lexicon: HALOT
  rationale: בֶּטַח denota seguridad o confianza. Opté por «confiado» para reflejar la condición de confianza/sin recelo del vecino en la relación, aunque la noción de seguridad sigue presente; el español ofrece aquí una síntesis natural del sentido adverbial.
- source_word: אִתָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con tu presencia
  - junto a ti
  - a tu lado
  lexicon: HALOT
  rationale: La frase señala cercanía relacional y espacial. «Contigo» es la forma natural y fiel en español, sin introducir una imagen más interpretativa que el hebreo no exige.
translation_notes:
  revision_awareness: El texto español sigue de cerca la lectura hebrea y mantiene la tensión léxica de חרשׁ como planificación oculta, sin diluirla en una generalidad moral. También conserva el valor relacional de רֵעַ con «prójimo» y la seguridad implícita de לָבֶטַח con una formulación española natural.
  spanish_consistency_notes:
  - He evitado «SEÑOR» u otras máscaras porque este versículo no contiene el nombre divino.
  - Mantuve un estilo sobrio y proverbial, con verbos y sustantivos de registro bíblico natural en español.
  - La nota al pie preserva la alternativa léxica documentada por el audit trail inglés («plot evil» / «in safety»), adaptándola al español sin ampliar el sentido.
