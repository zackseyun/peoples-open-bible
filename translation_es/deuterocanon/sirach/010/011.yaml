review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva la estructura general del hebreo: marco temporal de la muerte, idea de herencia, y lista de criaturas humildes asociadas con la descomposición. Sin embargo, varias elecciones léxicas debilitan la precisión del testigo hebreo y del audit trail inglés: ''insectos'' es demasiado amplio para כִּנִּים, ''reptiles'' estrecha indebidamente רֶמֶשׂ, y la nota [a] documenta algo innecesario mientras omite la incertidumbre léxica principal que sí pide el expediente.'
  spanish_quality_summary: El español es comprensible, pero 'En la muerte de un hombre' suena algo calcado; 'A la muerte de un hombre' es más natural y mantiene el tono formal. 'Gusanos y lombrices' es legible, pero la combinación puede sonar redundante; aun así sirve para distinguir רִמָּה y תוֹלֵעָה. La frase final mejora mucho con 'mosquitos o piojos y seres que se arrastran' o equivalente; en el cuerpo principal conviene mantener una opción clara y dejar la incertidumbre en nota.
  glossary_alignment: 'No hay conflictos con términos teológicos mayores del glosario del proyecto. Sí hay un problema de alineación léxica con la política de preservar fuerza semántica: רֶמֶשׂ debe evitarse como ''reptiles'' cuando el sentido es más amplio, y la incertidumbre de כִּנִּים debe reflejarse en nota como en el POB inglés.'
  issues:
  - severity: medium
    issue: La apertura 'En la muerte de un hombre' suena poco idiomática en español.
    rationale: Aunque formalmente posible, 'A la muerte de un hombre' es más natural y conserva el sentido temporal del hebreo sin sonar a calco.
  - severity: high
    issue: '''Insectos'' para כִּנִּים es demasiado genérico y pierde la incertidumbre específica documentada por el POB.'
    rationale: El audit trail inglés eligió 'gnats' y exigió preservar en nota las alternativas 'lice/vermin'. 'Insectos' diluye demasiado el referente y omite la nota léxica clave.
  - severity: high
    issue: '''Reptiles'' para רֶמֶשׂ es demasiado estrecho.'
    rationale: רֶמֶשׂ denota seres que se arrastran o criaturas reptantes/crawling things, no solamente reptiles en sentido biológico. La versión actual restringe el campo semántico.
  - severity: medium
    issue: La distribución de notas no sigue bien las prioridades del expediente.
    rationale: La nota [a] explica una literalidad prescindible, mientras que debería anclarse la incertidumbre de כִּנִּים. También conviene separar claramente la nota léxica hebrea de la variante griega.
  revised_spanish_text: A la muerte de un hombre, su herencia es gusanos y lombrices, mosquitos[a] y seres que se arrastran[b].
