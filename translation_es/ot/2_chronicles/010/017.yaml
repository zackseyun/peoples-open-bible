lexical_decisions:
- source_word: וּ/בְנֵי יִשְׂרָאֵל
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל es un etnónimo estable; en español, «los hijos de Israel» conserva con fidelidad la forma relacional del hebreo. Se prefirió esta opción sobre «los israelitas» para seguir de cerca la decisión inglesa revisada hacia mayor consistencia formal con el hebreo.
- source_word: הַיֹּשְׁבִים
  english_pob_choice: who lived
  chosen_spanish: que habitaban
  alternatives_spanish:
  - que vivían
  - que moraban
  lexicon: HALOT
  rationale: El participio de ישב expresa residencia continua. «Habitaban» mantiene ese sentido durativo con dignidad literaria y suena natural en español bíblico moderno.
- source_word: בְּעָרֵי יְהוּדָה
  english_pob_choice: in the cities of Judah
  chosen_spanish: en las ciudades de Judá
  alternatives_spanish:
  - en las ciudades de Judá
  - en las ciudades de Judá
  lexicon: HALOT
  rationale: La relación locativa y el genitivo territorial se preservan directamente con «en las ciudades de Judá». No se requiere ajuste idiomático adicional.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - llegó a reinar
  lexicon: HALOT
  rationale: El wayyiqtol de מלך describe el ejercicio real del poder. «Reinó» reproduce de forma natural y precisa el valor narrativo del verbo.
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - sobre ellos
  - sobre ese pueblo
  lexicon: HALOT
  rationale: La preposición על con sufijo pronominal indica dominio o gobierno sobre un grupo. «Sobre ellos» conserva el referente pronominal sin sobreinterpretar ni omitir el matiz de dominio.
- source_word: רְחַבְעָם
  english_pob_choice: Rehoboam
  chosen_spanish: Roboam
  alternatives_spanish:
  - Roboam
  lexicon: Conventional Spanish biblical transliteration
  rationale: Se usa la transliteración habitual en español bíblico, «Roboam», que corresponde al nombre propio del rey en la tradición castellana y es plenamente inteligible.
translation_notes:
  revision_awareness: El texto inglés revisado volvió de «Israelites» a «children of Israel» para reflejar con mayor cercanía el hebreo. La versión española sigue esa misma decisión formal y conserva la estructura participial y locativa del original, con una sola nota para la alternativa literal del hebreo.
  spanish_consistency_notes:
  - Se mantuvo el orden narrativo con «Pero» al inicio para reflejar el contraste del contexto inmediato, como en el audit trail inglés.
  - Se prefirió «los hijos de Israel» sobre «los israelitas» para alinear la salida española con la revisión inglesa y con la forma hebrea explícita.
  - No se añadió contenido interpretativo; la cláusula se traduce de manera sobria y directa.
  - La nota al pie documenta la alternativa literal del hebreo sin desplazar la redacción principal.
