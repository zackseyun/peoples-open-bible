translation:
  language: es
  text: Y yo quedé solo[a] y vi esta gran visión, y ninguna fuerza quedó en mí; mi esplendor se volvió ruina en mí[b], y no retuve fuerza alguna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quedé solo», «fui dejado solo» o «permanecí solo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mi apariencia fue cambiada a ruina» o «mi vigor fue vuelto a ruina».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁאַרְתִּי לְבַדִּי
  english_pob_choice: I alone was left
  chosen_spanish: yo solo quedé
  alternatives_spanish:
  - quedé solo
  - yo quedé solo
  - solo quedé
  lexicon: HALOT
  rationale: Mantiene el sentido pasivo/de resultado de נִשְׁאַרְתִּי y la fuerza de לְבַדִּי como énfasis de soledad. 'Quedé' suena natural en español para el contexto narrativo, y 'yo solo' conserva el énfasis personal del hebreo.
- source_word: הַמַּרְאָה הַגְּדֹלָה הַזֹּאת
  english_pob_choice: this great vision
  chosen_spanish: esta gran visión
  alternatives_spanish:
  - esta gran apariencia
  - esta gran visión revelada
  - esta gran escena
  lexicon: HALOT
  rationale: En el contexto de Daniel, מַרְאָה remite a una experiencia revelatoria; 'visión' preserva el valor apocalíptico que el inglés POB documentó. 'Gran' mantiene הַגְּדֹלָה sin sobrecargar el texto.
- source_word: כֹּחַ
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - energía
  - poder
  lexicon: HALOT
  rationale: En ambos usos el contexto es la capacidad física de Daniel. 'Fuerza' es natural en español y reproduce bien la pérdida total de capacidad.
- source_word: וְלֹא נִשְׁאַר בִּי כֹּחַ
  english_pob_choice: and no strength remained in me
  chosen_spanish: y ninguna fuerza quedó en mí
  alternatives_spanish:
  - y no quedó fuerza en mí
  - y no me quedó ninguna fuerza
  lexicon: HALOT
  rationale: Conserva el sentido de 'no quedó' para נִשְׁאַר y la relación interna expresada por בִּי. 'Ninguna fuerza' subraya la totalidad de la pérdida, de modo fiel y idiomático.
- source_word: הוֹדִי
  english_pob_choice: my splendor
  chosen_spanish: mi esplendor
  alternatives_spanish:
  - mi majestad
  - mi apariencia
  - mi vigor
  lexicon: HALOT
  rationale: '''הוד'' designa brillo, esplendor o majestad visible. ''Esplendor'' es el equivalente más directo y permite conservar la tensión entre apariencia externa y dignidad corporal sin reducirlo a una paráfrasis explicativa.'
- source_word: נֶהְפַּךְ עָלַי לְמַשְׁחִית
  english_pob_choice: was turned to ruin upon me
  chosen_spanish: fue vuelto a ruina sobre mí
  alternatives_spanish:
  - fue cambiado en mí para ruina
  - se volvió ruina sobre mí
  - fue transformado en ruina sobre mí
  lexicon: HALOT
  rationale: '''Fue vuelto'' refleja נֶהְפַּךְ y ''a ruina'' reproduce לְמַשְׁחִית sin atenuar su fuerza destructiva. ''Sobre mí'' conserva עָלַי, aunque en español suena algo más literal; se mantiene para no perder la imagen del cambio que recae sobre Daniel.'
- source_word: וְלֹא עָצַרְתִּי כֹּחַ
  english_pob_choice: and I retained no strength
  chosen_spanish: y no retuve fuerza alguna
  alternatives_spanish:
  - y no conservé fuerza
  - y no mantuve fuerza
  - y no tuve fuerza alguna
  lexicon: HALOT
  rationale: עָצַר en esta construcción tiene el sentido de retener o conservar. 'No retuve fuerza alguna' conserva la idea de que Daniel no pudo mantener ninguna capacidad física.
theological_decisions:
- issue: Valor de מַרְאָה en un contexto apocalíptico
  english_pob_reading: vision
  chosen_spanish_reading: visión
  alternative_spanish_readings:
  - apariencia
  - sight
  rationale: La palabra puede referirse a una apariencia visible, pero el contexto de Daniel 10 es claramente visionario. 'Visión' comunica correctamente el género apocalíptico sin introducir contenido doctrinal adicional.
  doctrine_reference: Principios de traducción §1, §6
- issue: Sentido de הוֹדִי al describir el efecto de la revelación
  english_pob_reading: my splendor
  chosen_spanish_reading: mi esplendor
  alternative_spanish_readings:
  - mi apariencia
  - mi vigor
  rationale: El hebreo apunta a esplendor/majestad, probablemente la apariencia externa vivificada de Daniel. 'Esplendor' conserva el núcleo léxico y deja visible la tensión entre dignidad y deterioro físico.
  doctrine_reference: Principios de traducción §1, §5
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del POB inglés, que ajustó el orden de la cláusula sobre el esplendor para reflejar más de cerca el hebreo: ''was turned to ruin upon me''. Por eso se eligió una estructura equivalente en español (''fue vuelto a ruina sobre mí'') que conserva el orden y la fuerza de la imagen.'
  spanish_consistency_notes:
  - Se mantiene 'visión' para מַרְאָה conforme al criterio del POB inglés en contexto apocalíptico.
  - Se usa 'esplendor' para הוֹדִי, respetando la tensión entre brillo/majestad y deterioro visible.
  - Se conserva 'fuerza' para כֹּחַ en ambas ocurrencias, coherente con la pérdida física total descrita por el versículo.
  - Se prefiere 'ruina' para לְמַשְׁחִית, evitando suavizar el matiz destructivo del hebreo.
