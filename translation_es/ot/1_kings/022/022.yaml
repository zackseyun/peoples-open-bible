    text: O «un espíritu de falsedad».
    reason: lexical_alternative
  - marker: b
    text: O «lo engañarás» o «lo persuadirás». El verbo hebreo puede abarcar inducir, persuadir o engañar según el contexto.
    reason: lexical_alternative
