translation:
  language: es
  text: tal como hizo con los hijos de Esaú que habitan en Seír[a], cuando destruyó a los horeos de delante de ellos[b], y ellos los desposeyeron[c] y habitaron en su lugar hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que moran en Seír».
    reason: lexical_alternative
  - marker: b
    text: O «de delante de ellos», hebraísmo que significa que quitó a los horeos de su presencia o de su territorio.
    reason: lexical_alternative
  - marker: c
    text: O «tomaron posesión de ellos»; el sentido es que los descendientes de Esaú desposeyeron a los horeos y ocuparon su tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - de la misma manera que
  lexicon: HALOT
  rationale: Expresa con naturalidad la comparación del hebreo sin perder la relación con el contexto anterior.
- source_word: עָשָׂה
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - obró
  lexicon: HALOT
  rationale: El verbo es amplio y retoma la acción previa de Yahvé; en español, «hizo» conserva esa referencia sin sobreespecificar.
- source_word: לִבְנֵי עֵשָׂו
  english_pob_choice: for the sons of Esau
  chosen_spanish: con los hijos de Esaú
  alternatives_spanish:
  - para los hijos de Esaú
  - con los descendientes de Esaú
  lexicon: HALOT
  rationale: «Hijos de Esaú» conserva la expresión genealógica/étnica del hebreo; «con» se ajusta al giro idiomático de la acción divina en este contexto narrativo.
- source_word: הַיֹּשְׁבִים בְּשֵׂעִיר
  english_pob_choice: who dwell in Seir
  chosen_spanish: que habitan en Seír
  alternatives_spanish:
  - que moran en Seír
  - que viven en Seír
  lexicon: HALOT
  rationale: «Habitan» mantiene un registro bíblico digno y refleja el participio de residencia estable; se evita debilitar el tono con «viven».
- source_word: הִשְׁמִיד
  english_pob_choice: destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - exterminó
  - aniquiló
  lexicon: HALOT
  rationale: «Destruyó» conserva la fuerza del verbo sin añadir intensidad interpretativa mayor que la sustentada por el hebreo.
- source_word: הַחֹרִי
  english_pob_choice: the Horites
  chosen_spanish: a los horeos
  alternatives_spanish:
  - a los horitas
  - al pueblo horeo
  lexicon: HALOT
  rationale: Se usa la transliteración habitual en español bíblico para el pueblo mencionado, concordando con la tradición de nombres propios etnolingüísticos.
- source_word: מִפְּנֵיהֶם
  english_pob_choice: from before them
  chosen_spanish: de delante de ellos
  alternatives_spanish:
  - de su presencia
  - ante ellos
  lexicon: HALOT
  rationale: Preserva el hebraísmo espacial de desplazamiento desde la presencia/territorio de alguien; «de delante de ellos» es transparente en español bíblico.
- source_word: וַיִּירָשֻׁם
  english_pob_choice: they dispossessed them
  chosen_spanish: ellos los desposeyeron
  alternatives_spanish:
  - ellos tomaron posesión de ellos
  - ellos los expulsaron y ocuparon su tierra
  lexicon: HALOT
  rationale: «Desposeyeron» comunica la pérdida de posesión de la tierra y corresponde al sentido de ירשׁ en contexto de conquista; conserva la tensión entre expulsión y ocupación sin explicitar de más.
- source_word: וַיֵּשְׁבוּ תַחְתָּם
  english_pob_choice: dwelt in their place
  chosen_spanish: habitaron en su lugar
  alternatives_spanish:
  - se establecieron en su lugar
  - moraron en su lugar
  lexicon: HALOT
  rationale: «Habitaron en su lugar» mantiene el paralelismo con el hebreo y el registro sobrio del texto; «se establecieron» sería más interpretativo.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Equivale de forma idiomática y natural al hebreo temporal estándar, con tono bíblico claro en español.
theological_decisions:
- issue: Sujeto implícito de la acción de destrucción y desposesión
  english_pob_reading: The implicit subject is God ('he did... he destroyed'), matching the immediate context.
  chosen_spanish_reading: Se mantiene el sujeto implícito por el verbo anterior, sin añadir «Yahvé» en este verso.
  alternative_spanish_readings:
  - tal como Yahvé hizo con los hijos de Esaú...
  - tal como él hizo con los hijos de Esaú...
  rationale: El hebreo presenta verbos en tercera persona masculina singular, pero el verso funciona como continuación sintáctica del contexto inmediato. En español, el sujeto implícito evita duplicación innecesaria y preserva la fluidez, sin negar la referencia teológica al acto providencial de Dios.
  doctrine_reference: Providencia divina y continuidad contextual del sujeto verbal en la narración
- issue: Sentido de וַיִּירָשֻׁם en contexto de conquista
  english_pob_reading: Or 'they took possession of them'; the sense is that the descendants of Esau dispossessed the Horites and occupied their land.
  chosen_spanish_reading: «Desposeyeron» conserva la idea de quitar posesión y ocupar el territorio por conquista.
  alternative_spanish_readings:
  - tomaron posesión de ellos
  - heredaron a ellos
  rationale: El hebreo no habla de herencia en sentido patrimonial simple, sino de tomar posesión expulsando a los ocupantes previos. «Desposeyeron» preserva esa tensión jurídica y territorial sin suavizarla.
  doctrine_reference: Lenguaje de posesión de la tierra en Deuteronomio
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del inglés auditado, que prefirió un registro más formal («dwell», «dwelt») sin cambiar el sentido. Por eso el español adopta «habitan»/«habitaron» para reflejar ese tono elevado, pero mantiene la claridad moderna. También se conservó la estructura comparativa y la secuencia verbal del original hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma editorial del proyecto cuando el texto explícitamente lo requiere; en este verso el sujeto queda implícito por continuidad contextual.
  - «Hijos de Esaú» se conserva como expresión étnica/genealógica estándar.
  - «Horeos» sigue la transliteración bíblica habitual en español para el grupo étnico.
  - «Desposeyeron» se usa para mantener el matiz de conquista y posesión territorial sin reemplazarlo por un término más débil.
