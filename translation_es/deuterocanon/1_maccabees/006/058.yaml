translation:
  language: es
  text: Ahora, pues, demos la mano derecha[a] a estos hombres, y hagamos la paz con ellos y con toda su nación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «dar la mano derecha» traduce literalmente el griego, que usa un modismo para ofrecer una prenda de paz o de alianza.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν οὖν
  english_pob_choice: Now then
  chosen_spanish: Ahora, pues
  alternatives_spanish:
  - Ahora entonces
  - Pues ahora
  lexicon: LSJ
  rationale: La combinación introduce una transición inferencial e inmediata. «Ahora, pues» conserva ese giro discursivo con naturalidad en español.
- source_word: δῶμεν δεξιὰν
  english_pob_choice: let us give our right hand
  chosen_spanish: demos la mano derecha
  alternatives_spanish:
  - extendamos la mano derecha
  - demos un juramento
  - demos una prenda
  lexicon: LSJ
  rationale: Se mantiene la imagen literal de la «mano derecha» como gesto idiomático de alianza o garantía de paz, evitando una paráfrasis que borre la metáfora fuente.
- source_word: τοῖς ἀνθρώποις τούτοις
  english_pob_choice: to these men
  chosen_spanish: a estos hombres
  alternatives_spanish:
  - a estas personas
  - a estos varones
  lexicon: LSJ
  rationale: En este contexto militar-político, ἄνθρωποι se refiere a un grupo masculino concreto. «Hombres» conserva esa referencia sin sonar artificial.
- source_word: ποιήσωμεν ... εἰρήνην
  english_pob_choice: let us make peace
  chosen_spanish: hagamos paz
  alternatives_spanish:
  - hagamos la paz
  - establezcamos paz
  - concluyamos paz
  lexicon: LSJ
  rationale: «Hagamos paz» reproduce con concisión la construcción verbal griega y comunica la idea de entrar en relaciones pacíficas. Se evita sobredeterminar con una formulación más jurídica de lo que el griego exige.
- source_word: μετʼ αὐτῶν
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - con éstos
  - junto con ellos
  lexicon: LSJ
  rationale: Correspondencia directa y natural de la preposición griega.
- source_word: μετὰ παντὸς ἔθνους αὐτῶν
  english_pob_choice: with their whole nation
  chosen_spanish: con toda su nación
  alternatives_spanish:
  - con todo su pueblo
  - con toda la nación de ellos
  lexicon: LSJ
  rationale: ἔθνος aquí denota el grupo nacional al que pertenecen. «Toda su nación» conserva el alcance total de παντός y la referencia colectiva del sustantivo.
translation_notes:
  revision_awareness: Ajusté la marca de nota al texto español para que el ancla [a] aparezca exactamente donde corresponde en la frase «mano derecha[a]».
  spanish_consistency_notes:
  - Se conservó la imagen idiomática de la mano derecha para mantener transparencia respecto del griego.
  - «Paz» se usa en sentido relacional y diplomático, no como abstracción teológica.
  - «Nación» traduce ἔθνος de forma coherente con el contexto colectivo y político.
