translation:
  language: es
  text: Y asignaron su sepultura con los impíos, y con un hombre rico en sus muertes[a], aunque no había hecho violencia, y no había engaño en su boca.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “en sus muertes”; muchas traducciones lo vierten idiomáticamente como “en su muerte” o “al morir”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “su sepultura fue asignada con los impíos”. El verbo hebreo literalmente significa “dio/puso/estableció”, y el sujeto no es explícito.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: they assigned
  chosen_spanish: y ellos asignaron
  alternatives_spanish:
  - y fue asignada
  - y se le asignó
  - y asignaron
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal 3ms sin sujeto explícito; el POB inglés opta por un sujeto impersonal (“they assigned”) para no resolver la ambigüedad. En español, “ellos asignaron” conserva ese valor impersonal mejor que introducir un sujeto teológico o pasivo explícito.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los malhechores
  - los perversos
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural designa personas moralmente perversas. “Impíos” es claro, bíblico y mantiene la categoría moral sin añadir matices ajenos.
- source_word: קִבְרוֹ
  english_pob_choice: his grave
  chosen_spanish: su sepultura
  alternatives_spanish:
  - su tumba
  - su sepulcro
  - su sepultura
  lexicon: HALOT
  rationale: קבר puede ser “grave”, “tomb” o “burial place”. “Sepultura” funciona bien en español bíblico y suena natural en contexto funerario, preservando el sentido de lugar de entierro.
- source_word: עָשִׁיר
  english_pob_choice: a rich man
  chosen_spanish: un hombre rico
  alternatives_spanish:
  - un rico
  - un rico hombre
  - un hombre adinerado
  lexicon: HALOT
  rationale: El hebreo singular apunta a una persona concreta. “Un hombre rico” conserva esa referencia personal con un español más natural y preciso que un sustantivo abstracto.
- source_word: בְּמֹתָיו
  english_pob_choice: in his deaths
  chosen_spanish: en sus muertes
  alternatives_spanish:
  - en su muerte
  - al morir
  - en su muerte[s]
  lexicon: HALOT
  rationale: La forma hebrea es plural (“muertes”), y el POB inglés preserva esa rareza en el texto principal. En español, “en sus muertes” mantiene el rasgo formal sin normalizarlo prematuramente; la alternativa idiomática singular queda implícita por el contexto.
- source_word: עַל
  english_pob_choice: although
  chosen_spanish: aunque
  alternatives_spanish:
  - porque
  - por cuanto
  - a pesar de que
  lexicon: HALOT
  rationale: 'En esta cláusula la partícula introduce una relación concesiva. “Aunque” reproduce con naturalidad la fuerza contextual: pese a la situación descrita, la afirmación de inocencia sigue en pie.'
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - agravio
  - injusticia
  - daño violento
  lexicon: HALOT
  rationale: חמס suele denotar violencia o agravio violento. “Violencia” es el equivalente directo más transparente y preserva el peso jurídico-moral del término.
- source_word: מִרְמָה
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - deceit
  - fraude
  - astucia
  lexicon: HALOT
  rationale: מִרמה expresa engaño, fraude o falsedad. “Engaño” es idiomático en español y mantiene el paralelismo con “violencia” sin perder la idea de falta moral.
- source_word: בְּפִיו
  english_pob_choice: was in his mouth
  chosen_spanish: en su boca
  alternatives_spanish:
  - estaba en su boca
  - se halló en su boca
  - salía de su boca
  lexicon: HALOT
  rationale: La imagen hebrea se conserva mejor con una construcción breve y literal. “En su boca” mantiene el foco en el habla y evita añadir una pasiva o un verbo no expresado.
theological_decisions:
- issue: Tratamiento del plural inusual בְּמֹתָיו en un contexto profético con posible lectura mesiánica
  english_pob_reading: Retain the formally plural expression 'in his deaths' in the main text, with singular idiomatic alternative footnoted.
  chosen_spanish_reading: Mantener “en sus muertes” en el texto principal, sin suavizarlo a singular dentro del versículo.
  alternative_spanish_readings:
  - en su muerte
  - al morir
  rationale: El hebreo es morfológicamente plural, y el POB inglés decide no borrar ese rasgo. En español, conservar el plural evita homogeneizar el texto con una lectura interpretativa posterior; la extrañeza queda visible para el lector y respeta la tensión del original.
  doctrine_reference: Principios POB de transparencia textual y prioridad del dato original
- issue: Sujetación implícita de וַיִּתֵּן
  english_pob_reading: Use impersonal English 'they assigned' rather than specifying God or the servant as subject.
  chosen_spanish_reading: Usar un impersonal humano (“y ellos asignaron”) en lugar de identificar a Dios, al siervo o a otro sujeto.
  alternative_spanish_readings:
  - y fue asignada
  - y asignó
  - y se le asignó
  rationale: El hebreo no expresa sujeto; resolverlo tendría implicaciones interpretativas no exigidas por el texto. La opción impersonal conserva la ambigüedad sintáctica y evita cerrar una cuestión que el original deja abierta.
  doctrine_reference: Principios POB de ambigüedad preservada y restricción interpretativa
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que indica que no hubo cambios necesarios tras la pasada final; por ello se mantiene la solución del texto fuente con la misma gestión de ambigüedades principales.
  spanish_consistency_notes:
  - Se usa “Yahvé” como forma reservada para el Tetragrámaton cuando aparezca; en este versículo no ocurre.
  - Se mantiene “impíos” para רְשָׁעִים por consistencia bíblica y por su valor moral-jurídico.
  - Se conserva la rareza plural de “sus muertes” para reflejar el hebreo sin normalización.
  - No se introduce “Mesías” ni “Cristo” porque el versículo no lo requiere explícitamente.
  - “Engaño” se prefiere a “fraude” o “astucia” por claridad y paralelismo con “violencia”.
