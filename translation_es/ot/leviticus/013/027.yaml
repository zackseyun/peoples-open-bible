base_translation:
  language: en
  yaml_path: translation/ot/leviticus/013/027.yaml
  text: And the priest shall examine him on the seventh day. If it has indeed spread in the skin[a], the priest shall pronounce him unclean; it is an infection of leprosy.
  footnotes:
  - marker: a
    text: Traditionally rendered 'leprosy.' The Hebrew term refers more broadly to a serious skin condition in Israel's purity laws, not necessarily modern leprosy (Hansen's disease).
    reason: lexical_alternative
