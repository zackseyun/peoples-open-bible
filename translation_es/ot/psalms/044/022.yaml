translation:
  language: es
  text: ¿No escudriñará Dios esto? Porque él conoce las cosas ocultas del corazón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los secretos del corazón».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/לֹא
  english_pob_choice: Would not
  chosen_spanish: ¿No…?
  alternatives_spanish:
  - ¿Acaso no…?
  - ¿No sería que…?
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta retórica que espera respuesta afirmativa. En español, «¿No…?» conserva esa fuerza interrogativa sin volverla una mera afirmación ni añadir matices no presentes.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: Aquí el plural formal funciona como título singular del Dios de Israel. «Dios» es el equivalente natural y fiel en español.
- source_word: יַחֲקָר
  english_pob_choice: search
  chosen_spanish: escudriñará
  alternatives_spanish:
  - investigará
  - buscará
  lexicon: HALOT
  rationale: El verbo expresa examinar a fondo o pesquisar con rigor. «Escudriñar» mantiene mejor la intensidad judicial y la imagen de examen minucioso que «buscará», y suena más solemne que «investigará» en este contexto poético.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - este asunto
  lexicon: HALOT
  rationale: El demostrativo retoma el asunto del que se habla. «Esto» reproduce bien la concisión hebrea sin expandir innecesariamente el referente.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón que fundamenta la pregunta retórica. «Porque» conserva esa relación explicativa de manera clara en español.
- source_word: יֹדֵעַ
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - está al tanto de
  lexicon: HALOT
  rationale: El participio expresa el conocimiento característico de Dios. «Conoce» comunica esa realidad continua de forma natural y digna en español.
- source_word: תַּעֲלֻמוֹת
  english_pob_choice: the hidden things
  chosen_spanish: las cosas ocultas
  alternatives_spanish:
  - los secretos
  - las profundidades ocultas
  lexicon: HALOT
  rationale: La palabra puede referirse a cosas escondidas o secretos. «Las cosas ocultas» sigue de cerca el sentido básico y evita restringirlo sólo a una esfera psicológica; se conserva la alternativa «secretos» como posibilidad léxica.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: HALOT
  rationale: En la antropología hebrea, el «corazón» abarca pensamiento, voluntad y afectos. «Corazón» preserva el idiomatismo bíblico y el alcance teológico sin reducirlo a una sola facultad.
theological_decisions:
- issue: Alcance antropológico de לֵב
  english_pob_reading: heart
  chosen_spanish_reading: corazón
  alternative_spanish_readings:
  - mente
  - interior
  rationale: Se conserva el lenguaje bíblico del «corazón» para no estrechar el sentido a mera emoción o intelecto. En este versículo, el foco está en el centro interior de la persona, sin resolver la amplitud antropológica del término hebreo.
  doctrine_reference: Translation philosophy §6; §5
translation_notes:
  revision_awareness: El texto base en inglés y el control cruzado coinciden de forma alta, sin revisiones aplicadas en la fuente auditada; por eso la versión española sigue de cerca el sentido del hebreo y conserva la misma alternativa léxica principal en nota.
  spanish_consistency_notes:
  - Se mantuvo el registro reverente y poético propio de los Salmos.
  - Se evitó «SEÑOR» para el tetragrámaton porque aquí el hebreo dice אֱלֹהִים, no יהוה.
  - La nota reproduce la alternativa léxica documentada para תַּעֲלֻמוֹת sin crear nuevas ambigüedades.
