revisions:
- from: Porque aunque tu pueblo, Israel, sea como la arena del mar, un remanente de él[a] volverá. Una destrucción[b] está decretada, que se desborda en justicia.
  to: Porque aunque tu pueblo, Israel, sea como la arena del mar, solo un remanente de ellos[a] volverá. Una destrucción decretada,[b] desbordante de rectitud.
  rationale: 'Se ajusta el texto para reflejar mejor el rastro auditado del POB: 1) se hace explícita la exclusividad de שְׁאָר con «solo», como en el inglés; 2) se usa «de ellos» para una lectura partitiva natural en español, manteniendo en nota la singularidad hebrea de בּוֹ; 3) se corrige צְדָקָה a «rectitud» en el texto principal para preservar la decisión documentada de «righteousness», dejando «justicia» como alternativa en nota; 4) se simplifica la cláusula final a una formulación más idiomática y cercana al hebreo.'
  reviewer_model: gpt-5.4
