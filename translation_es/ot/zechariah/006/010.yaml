  to: Toma de entre los exiliados[a] —de Heldai, de Tobías[d] y de Jedaías—, e irás tú aquel mismo día y entrarás en la casa de Josías, hijo de Sofonías[c][b], adonde ellos han venido desde Babilonia.
  rationale: Se ajusta הַגּוֹלָה a «exiliados» para reflejar mejor la comunidad desterrada. Se reemplaza «donde han venido» por «adonde ellos han venido» para preservar el plural documentado y evitar una relativa locativa confusa. También se mejora levemente la fluidez y se conserva el énfasis de אַתָּה con «irás tú».
