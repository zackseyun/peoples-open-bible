    text: Or 'volunteer growth' or 'self-grown crop' for 'aftergrowth.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the grapes of your separated/unpruned vine'; the Hebrew refers to a vine left untended during the sabbatical year.
    reason: lexical_alternative
  - marker: c
    text: Or 'a sabbath year' or 'a year of solemn rest.'
    reason: lexical_alternative
