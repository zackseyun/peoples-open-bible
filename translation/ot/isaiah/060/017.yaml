theological_decisions:
- issue: How to render the transformed civic terms in the final colon
  chosen_reading: 'A future restoration in which peace and righteousness characterize Jerusalem''s governing authorities: ''I will make peace your overseers, and righteousness your taskmasters.'''
  alternative_readings:
  - I will make your government peace, and your rulers righteousness.
  - I will appoint peace as your administration, and righteousness as your overseers.
  rationale: The Hebrew allows either abstract nouns for the administration itself or metonymic predicates describing the officials. The chosen rendering preserves the poetic personification and the parallelism of personal authority figures, without flattening the imagery into an abstract political slogan. It also avoids overinterpreting the verse as a technical statement about governmental structure.
  doctrine_reference: 'Translation philosophy #3, preserve theological tension rather than resolve it'
