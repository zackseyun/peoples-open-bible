revisions:
- from: Mira[a], estoy poniendo un vellón de lana sobre la era. Si hubiera rocío sobre el vellón solo, y sequedad sobre toda la tierra, entonces sabré que salvarás a Israel por mi mano, como has hablado.
  to: Mira, estoy poniendo un vellón de lana sobre la era. Si hay rocío sobre el vellón solo, y sequedad sobre todo el suelo[a], entonces sabré que salvarás a Israel por mi mano, como has hablado.
  rationale: 'Se requiere una reparación menor para alinear el español con la evidencia fuente y la auditoría POB: mover la nota al término que realmente comenta, y ajustar הָאָרֶץ a ‘suelo’ en el texto principal por el contexto local de la señal. También se simplifica ‘Si hubiera rocío’ a ‘Si hay rocío’ para una lectura más natural y directa sin perder fidelidad. No hace falta adjudicación adicional.'
