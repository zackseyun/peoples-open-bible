  - severity: medium
    issue: '''Pon una emboscada para ti'' suena antinatural en español.'
    rationale: Aunque לְךָ tiene matiz reflexivo, en español esa expresión no funciona bien con 'emboscada'. Es mejor 'Tiende una emboscada' o 'Prepara una emboscada', sin perder el sentido imperativo.
  - severity: low
