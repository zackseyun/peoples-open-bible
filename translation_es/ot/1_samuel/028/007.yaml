translation:
  language: es
  text: 'Entonces Saúl dijo a sus siervos: «Búsquenme una mujer médium[a], para que yo vaya a ella y consulte por medio de ella». Y sus siervos le dijeron: «He aquí, hay una mujer médium[a] en Endor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «una mujer, señora/poseedora de un ʾov»; tradicionalmente, «una mujer con espíritu familiar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַעֲבָדָיו / עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus criados
  - sus sirvientes
  lexicon: HALOT
  rationale: En un contexto real-cortesano, עֲבָדִים puede referirse a siervos/servidores del rey. 'Siervos' conserva esa relación subordinada sin forzar 'esclavos', que aquí no es el foco contextual.
- source_word: בַּקְּשׁוּ לִי
  english_pob_choice: Seek for me
  chosen_spanish: Busquen para mí
  alternatives_spanish:
  - Busquen por mí
  - Busquenme
  - Busquen para mí una mujer
  lexicon: HALOT
  rationale: La forma imperativa plural pide localizar a alguien. 'Busquen para mí' comunica bien la fuerza práctica del mandato y mantiene un registro sobrio y natural en español.
- source_word: אֵשֶׁת בַּעֲלַת אוֹב
  english_pob_choice: a woman who is a medium
  chosen_spanish: una mujer que sea médium
  alternatives_spanish:
  - una mujer con espíritu familiar
  - una nigromante
  - una mujer con un espíritu familiar
  lexicon: HALOT
  rationale: El sintagma hebreo identifica a la practicante, no solo al supuesto espíritu. 'Médium' es el equivalente moderno más claro y conciso para el papel ocultista descrito, sin suavizarlo ni arcaizarlo innecesariamente.
- source_word: וְאֵלְכָה אֵלֶיהָ
  english_pob_choice: so that I may go to her
  chosen_spanish: para que yo vaya a ella
  alternatives_spanish:
  - y yo iré a ella
  - para ir a ella
  - para que vaya hacia ella
  lexicon: HALOT
  rationale: La cohortativa expresa intención/purpose. 'Para que yo vaya a ella' conserva el valor de finalidad y evita una paráfrasis más libre.
- source_word: וְאֶדְרְשָׁה בָּהּ
  english_pob_choice: and inquire of her
  chosen_spanish: y consulte por medio de ella
  alternatives_spanish:
  - y consulte de ella
  - y averigüe por medio de ella
  - y la consulte
  lexicon: HALOT
  rationale: דרש con ב puede denotar buscar/inquirir por medio de alguien. 'Consultar por medio de ella' preserva el sentido mediador del acto de consultar una médium, mejor que reducirlo a un simple 'consultarle'.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mire
  alternatives_spanish:
  - Miren
  - Vea
  - He aquí
  lexicon: HALOT
  rationale: En la respuesta de los siervos, הִנֵּה tiene función deíctica. 'Mire' comunica esa llamada de atención en español moderno; 'He aquí' sería más literal pero menos natural.
- source_word: בְּעֵין דּוֹר
  english_pob_choice: at En-dor
  chosen_spanish: en Endor
  alternatives_spanish:
  - en En-dor
  - en la localidad de Endor
  lexicon: HALOT
  rationale: Como topónimo, עֵין דּוֹר se translitera de forma convencional como Endor. La preposición ב se expresa naturalmente con 'en' en español con nombres de lugar.
theological_decisions:
- issue: Terminología para la practicante ocultista sin atenuar el carácter del texto
  english_pob_reading: Translate אֵשֶׁת בַּעֲלַת אוֹב as 'a woman who is a medium'
  chosen_spanish_reading: una mujer que sea médium / una mujer que es médium
  alternative_spanish_readings:
  - una mujer con espíritu familiar
  - una nigromante
  rationale: El texto presenta a Saúl buscando una consultante de los muertos o de espíritus. 'Médium' transmite el oficio ocultista de modo comprensible hoy, sin importar una glosa tradicional más cargada ('espíritu familiar') ni añadir el tecnicismo 'nigromante' si suena más interpretativo para este verso.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'El texto español sigue el ajuste de la revisión más reciente del audit trail: registro más formal, correspondencia más estrecha con ''Seek'' y ''Behold'', y mantenimiento de la misma decisión léxica para בַּעֲלַת אוֹב en ambas menciones del versículo.'
  spanish_consistency_notes:
  - Se mantiene 'médium' en las dos apariciones de אֵשֶׁת בַּעֲלַת אוֹב para conservar consistencia terminológica.
  - Se traduce הִנֵּה con 'Mire' en lugar de 'He aquí' por claridad moderna, aunque se reconoce la alternativa más literal.
  - '''Endor'' se deja como topónimo usual en español bíblico; no se introduce guion innecesario.'
