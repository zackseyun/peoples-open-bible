    issue: '''el espino'' puede sonar demasiado específico botánicamente'
    rationale: El hebreo חוֹחַ designa una planta espinosa de especie incierta. 'Espino' en español suele evocar una planta/árbol concreto, mientras que el inglés auditado eligió una referencia más genérica ('thornbush').
  - severity: low
    issue: '''envió a Amasías'' es menos idiomático en español que ''envió un mensaje a Amasías'''
    rationale: Aunque 'envió ... a' calca razonablemente la estructura hebrea, en español moderno la elipsis del mensaje suena dura. Añadir 'un mensaje' aclara el acto comunicativo sin cambiar el sentido.
  revised_spanish_text: 'Entonces Joás, rey de Israel, envió un mensaje a Amasías, rey de Judá, diciendo: “El arbusto espinoso[a] que estaba en el Líbano envió al cedro que estaba en el Líbano, diciendo: ‘Da tu hija a mi hijo por esposa.’ Entonces pasó una bestia del campo que estaba en el Líbano, y pisoteó al arbusto espinoso.”'
  revised_footnotes:
