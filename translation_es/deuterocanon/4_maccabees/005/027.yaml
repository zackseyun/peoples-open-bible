  to: Pero, en tu tiranía, no solo nos obligas a quebrantar la ley, sino también a comer, para que todavía más te burles de nosotros con esta contaminación por la comida[a], tan odiosa.
  rationale: Se reemplazó 'defilección' por 'contaminación por la comida' para dar un español claro y fiel al compuesto griego μιεροφαγίᾳ, conservando en nota las alternativas que preservan la rareza léxica y el matiz ritual/moral. Se eliminó la nota estilística que defendía una forma no idiomática. También se ajustó 'todavía' a 'todavía más' para reflejar mejor ἔτι como intensificación de la burla adicional. Se mantuvo 'en tu tiranía' y 'quebrantar la ley' como opciones aceptables y naturales.
