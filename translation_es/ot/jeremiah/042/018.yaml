review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura principal del hebreo: fórmula profética, título divino, paralelo ''como... así...'', derramamiento de ira/furor, entrada en Egipto y pérdida definitiva de ''este lugar''. Sin embargo, hay dos desajustes importantes. Primero, בְּבֹאֲכֶם מִצְרָיִם se auditó como ''when you go into Egypt''; ''cuando entren en Egipto'' es posible, pero ''cuando vayan a Egipto'' o ''cuando vayan a entrar en Egipto'' refleja mejor el movimiento sin introducir el matiz puntual de cruce ya consumado. Segundo, la serie לְאָלָה ... לִקְלָלָה está diferenciada en la evidencia inglesa; en español ''para maldición ... para imprecación'' es defendible, pero conviene marcar en nota la ambigüedad de אָלָה, ya que el inglés la preservó explícitamente y la nota actual está en otro término.'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse para mayor naturalidad y mejor paralelismo bíblico. 'Porque así ha dicho' suena menos directo que 'Porque así dice' o 'Porque así ha dicho' según contexto; dado el inglés auditado y la fórmula profética habitual, 'Porque así dice' fluye mejor. La secuencia 'serán para maldición, para horror, para imprecación y para afrenta' es comprensible, aunque 'objeto de maldición' resulta más claro para el primer sustantivo y evita que dos términos cercanos parezcan sinónimos indistintos. La nota actual sobre 'de los ejércitos' no era necesaria; la necesidad real de nota está en אָלָה.
  glossary_alignment: Se alinea bien con las pautas del proyecto en 'Yahvé', 'Dios', y en la preservación de dos términos distintos para אַף / חֵמָה. 'De los ejércitos' es aceptable para צְבָאוֹת, aunque 'de las huestes' sigue siendo alternativa tradicional. No hay conflicto doctrinal. Sí falta reflejar en nota la razón léxica documentada para לְאָלָה ('objeto de maldición' / 'juramento de maldición').
  issues:
  - severity: medium
    issue: La nota está anclada en 'de los ejércitos' en vez de en לְאָלָה.
    rationale: La auditoría inglesa preserva una alternativa léxica importante para אָלָה; la nota actual sobre צְבָאוֹת es opcional y no responde a la ambigüedad destacada en el expediente.
  - severity: medium
    issue: '''Para maldición'' puede sonar abstracto y no refleja con suficiente claridad el valor de byword/objeto de maldición.'
    rationale: En este contexto la gente llega a ser ejemplo o fórmula de maldición; 'objeto de maldición' expresa mejor la función resultativa y armoniza con la nota requerida.
  - severity: low
    issue: '''Cuando entren en Egipto'' es correcto, pero menos cercano a la revisión auditada ''when you go into Egypt''.'
    rationale: '''Cuando vayan a Egipto'' o ''cuando vayan a entrar en Egipto'' mantiene mejor la idea de movimiento hacia Egipto sin endurecerla como cruce ya efectuado.'
  - severity: low
    issue: '''Ha dicho'' en la fórmula profética suena menos natural que ''dice'' en español bíblico actual.'
    rationale: No es error de sentido, pero 'Porque así dice Yahvé...' es la formulación más idiomática y sobria para un texto profético.
  revised_spanish_text: 'Porque así dice Yahvé de los ejércitos, Dios de Israel: así como mi ira y mi furor se derramaron sobre los habitantes de Jerusalén, así se derramará mi furor sobre ustedes cuando vayan a Egipto; y llegarán a ser objeto de maldición[a], de horror, de imprecación y de afrenta, y no volverán a ver este lugar.'
  revised_footnotes:
