review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: riquezas/honor, procedencia desde la presencia divina, gobierno universal, y el poder de engrandecer y fortalecer. Sin embargo, «a todos» estrecha indebidamente לַכֹּל, que en el verso mantiene la amplitud de «todo / todos» y corresponde al repetido כֹּל anterior. También hay desajuste en las notas: la nota b en español comenta «fuerza», pero la nota correspondiente en el rastro inglés es sobre «honor/gloria», mientras que la alternativa de «engrandecer/exaltar» debe quedar en una nota aparte anclada en ese verbo.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. «Proceden de delante de ti» es algo literal, pero aceptable y defendible dado el propósito de preservar la imagen hebrea. La frase final suena mejor y más fiel con «a todo» que con «a todos», porque evita limitar el referente a personas. También conviene corregir la distribución y contenido de las notas para que coincidan con los anclajes y con las decisiones auditadas.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones «riquezas», «honor», «en tu mano», «poder», «fuerza», «engrandecer» y «fortalecer» son aceptables. La principal corrección léxica es לַכֹּל -> «a todo» en vez de «a todos» para preservar la amplitud comprehensiva del hebreo.
  issues:
  - severity: high
    issue: «a todos» restringe לַכֹּל
    rationale: El hebreo לַכֹּל es amplio y no se limita a personas. Dado el paralelismo con «sobre todo» y la nota léxica inglesa, «a todo» preserva mejor la comprehensividad sin especificar indebidamente.
  - severity: high
    issue: La nota b está asignada al término equivocado
    rationale: En el rastro inglés, la alternativa «glory» corresponde a הַכָּבוֹד / «honor», no a גְבוּרָה / «fuerza». La nota española actual crea un desajuste con la evidencia y con la lógica lexical del pasaje.
  - severity: medium
    issue: Falta anclar la alternativa de «honor»
    rationale: Si se conserva la alternativa auditada «gloria», debe aparecer una nota en «honor» para preservar la decisión léxica documentada.
  - severity: medium
    issue: La nota sobre «engrandecer» necesita marcador propio tras reordenar las notas
    rationale: Los marcadores deben ser únicos y aparecer exactamente en el texto revisado; al corregir la nota de «honor», la de «engrandecer/exaltar» debe pasar a un marcador posterior.
