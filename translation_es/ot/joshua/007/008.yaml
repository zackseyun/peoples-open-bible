  glossary_alignment: «Señor» para אֲדֹנָי es correcto aquí, y no debe cambiarse a «Yahvé» porque el nombre divino no aparece. El modismo con עֹרֶף está bien resuelto con «volver la espalda». No hay conflicto con la terminología por defecto del proyecto.
