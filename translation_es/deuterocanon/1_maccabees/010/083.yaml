review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la mayoría de las decisiones del griego: ἡ ἵππος como colectivo militar (''la caballería''), ἐσκορπίσθη como pasivo, ἐν τῷ πεδίῳ como ''en la llanura'', Ἄζωτον como ''Azoto'', y τοῦ σωθῆναι como propósito (''para salvarse''). Sin embargo, la nota al pie está anclada incorrectamente en ''llanura[a]'' cuando el contenido de la nota corresponde a ''Bet-dagón, su ídolo''. Además, dejar ''su ídolo'' en el texto principal sin anclar la aclaración en ese punto perjudica la fidelidad comunicativa, porque en español suena como si hubieran entrado en un objeto, no en un santuario o templo asociado al ídolo.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la colocación actual de la nota crea confusión de lectura. También conviene hacer explícito en el texto principal que Bet-dagón es un santuario/templo asociado a su ídolo, tal como ya hizo el POB inglés, porque el español literal 'entraron en Bet-dagón, su ídolo' resulta poco natural y semánticamente extraño. Una formulación como 'el templo de su ídolo' conserva la carga polémica de εἴδωλον y mejora la inteligibilidad.
  glossary_alignment: No hay conflicto con la terminología marco del proyecto. El término εἴδωλον debe seguir reflejándose como 'ídolo', no neutralizarse. La revisión propuesta mantiene 'ídolo' dentro de 'el templo de su ídolo', alineándose con la rationale teológica inglesa.
  issues:
  - severity: high
    issue: La nota al pie está anclada en el lugar equivocado.
    rationale: El marcador [a] aparece en 'llanura[a]', pero la nota explica la aposición griega de 'Bet-dagón, su ídolo'. Esto rompe la trazabilidad nota-texto exigida y puede inducir a error al lector.
  - severity: medium
    issue: '''Entraron en Bet-dagón, su ídolo'' es poco natural y ambiguo en español.'
    rationale: Aunque reproduce la literalidad griega, en español sugiere físicamente entrar en un ídolo. El contexto exige un recinto cultual. El POB inglés ya explicitó ese sentido en el texto principal; el español debe hacer lo mismo para preservar el sentido fuente con buena legibilidad.
  revised_spanish_text: Y la caballería fue dispersada en la llanura, y huyeron a Azoto, y entraron en Bet-dagón[a], el templo de su ídolo, para salvarse.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «entraron en Bet-dagón, su ídolo». La aposición griega es muy condensada; el sentido es que entraron en el santuario asociado con su ídolo.'
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda al lugar textual relevante y se ajusta el texto principal a una formulación española natural que conserva tanto el sentido contextual como la fuerza polémica de εἴδωλον. 'El templo de su ídolo' comunica claramente que Bet-dagón es el recinto cultual al que entran, mientras la nota preserva la alternativa más literal documentada en el audit trail inglés.
