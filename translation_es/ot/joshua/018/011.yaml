translation:
  language: es
  text: Y la suerte para la tribu de los hijos de Benjamín, por sus clanes, salió, y el límite de su suerte[a] salió entre los hijos de Judá y los hijos de José[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el límite de su asignación salió entre los hijos de Judá y los hijos de José».'
    reason: lexical_alternative
  - marker: b
    text: «Los hijos de José» se refiere colectivamente a las tribus descendientes de José, especialmente Efraín y Manasés.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: came up
  chosen_spanish: salió
  alternatives_spanish:
  - subió
  - ascendió
  - salió en suerte
  lexicon: HALOT
  rationale: En el contexto del sorteo, el hebreo mantiene la imagen concreta de la suerte que ‘sube’ o ‘sale’. En español, ‘salió’ conserva la idea de aparición/resultó en el sorteo sin forzar una calca poco natural; ‘salió en suerte’ sería más explícito pero más pesado.
- source_word: גּוֹרָל
  english_pob_choice: lot
  chosen_spanish: suerte
  alternatives_spanish:
  - lote
  - sorteo
  - porción
  lexicon: HALOT
  rationale: Aquí el término se refiere al medio de asignación por sorteo y también al resultado asignado. ‘Suerte’ es natural en español bíblico para este campo semántico y permite conservar el doble valor de procedimiento y asignación; ‘lote’ puede sonar más a objeto físico o porción.
- source_word: מַטֵּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - vara
  - cetro
  lexicon: HALOT
  rationale: En contextos de distribución territorial, el hebreo designa la unidad tribal. ‘Tribu’ es el equivalente contextual directo y claro.
- source_word: בְנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los benjaminitas
  - la gente de Benjamín
  lexicon: HALOT
  rationale: Se conserva la expresión filial del hebreo, que el POB inglés también preserva. ‘Benjaminitas’ sería más idiomático, pero menos transparente respecto de la forma fuente.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - para sus clanes
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת indica agrupaciones de clan dentro de la tribu. ‘Por sus clanes’ mantiene la estructura social y suena natural en español; ‘según sus familias’ sería más amplio y menos preciso.
- source_word: וַיֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió a dar
  - se extendió
  lexicon: HALOT
  rationale: El verbo describe el resultado del sorteo y la delimitación subsiguiente. ‘Salió’ reproduce bien la secuencia del acontecimiento y la concreción del hebreo.
- source_word: גְּבוּל
  english_pob_choice: boundary
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  - territorio
  lexicon: HALOT
  rationale: La revisión inglesa corrigió ‘territory’ a ‘boundary’ para reflejar mejor גְּבוּל. En español, ‘límite’ conserva ese valor de borde delimitador sin desplazarlo a la extensión territorial.
- source_word: גְּבוּל גּוֹרָלָם
  english_pob_choice: the boundary of their lot
  chosen_spanish: el límite de su suerte
  alternatives_spanish:
  - el límite de su lote
  - la frontera de su suerte
  lexicon: HALOT
  rationale: La construcción hebrea enlaza la delimitación con la suerte asignada. ‘El límite de su suerte’ refleja ambos elementos con buena fluidez; ‘lote’ es posible, pero ‘suerte’ preserva mejor el campo semántico del sorteo.
- source_word: בֵּין ... וּבֵין
  english_pob_choice: between ... and ...
  chosen_spanish: entre ... y ...
  alternatives_spanish:
  - en medio de ... y ...
  lexicon: HALOT
  rationale: La preposición coordinada se traduce de manera directa, sin añadir matices espaciales no requeridos.
- source_word: בְנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - Judá
  - la gente de Judá
  lexicon: HALOT
  rationale: Se mantiene la formulación genealógica del hebreo y del POB inglés.
- source_word: בְנֵי יוֹסֵף
  english_pob_choice: the sons of Joseph
  chosen_spanish: los hijos de José
  alternatives_spanish:
  - los descendientes de José
  - José
  lexicon: HALOT
  rationale: El hebreo alude colectivamente a las tribus de José. ‘Los hijos de José’ conserva la expresión fuente y su alcance colectivo.
theological_decisions:
- issue: Referencia colectiva de “los hijos de José”
  english_pob_reading: '''The sons of Joseph'' refers collectively to the tribes descended from Joseph, especially Ephraim and Manasseh.'
  chosen_spanish_reading: ‘Los hijos de José’ se entiende colectivamente como las tribus descendientes de José, especialmente Efraín y Manasés.
  alternative_spanish_readings:
  - ‘José’
  - ‘los descendientes de José’
  rationale: No se debe perder la referencia tribal colectiva que el POB inglés anotó. La frase principal se mantiene literal, y la nota aclara que no se trata solo de una persona sino de un conjunto tribal.
  doctrine_reference: nota cultural / histórico-tribal
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'territory' por 'boundary' para reflejar mejor גְּבוּל. La redacción española sigue esa revisión con 'límite' en lugar de una expresión territorial, manteniendo la imagen del reparto por suerte.
  spanish_consistency_notes:
  - Se preservó la expresión filial ‘los hijos de…’ para mantener transparencia con el hebreo y coherencia interna con el contexto tribal.
  - ‘Suerte’ se usó para גּוֹרָל por su valor de sorteo/porción y por alinearse con el lenguaje bíblico español sin depender de ‘lote’ en exceso.
  - ‘Límite’ traduce גְּבוּל de forma más exacta que ‘territorio’, acorde con la revisión auditada del inglés.
