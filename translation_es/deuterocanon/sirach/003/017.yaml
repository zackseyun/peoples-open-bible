translation:
  language: es
  text: Hijo mío[a], en tu prosperidad anda en humildad, y serás amado más que quien da regalos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Hijo, en mansedumbre lleva a cabo tus obras, y serás amado por un hombre aceptable». El testimonio hebreo, en cambio, dice: «Hijo mío, en tu prosperidad anda en humildad, y serás amado más que quien da regalos».'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo
  - Hijo mío, hijo
  lexicon: HALOT
  rationale: La expresión hebrea es un vocativo filial con sufijo de primera persona. En español, «Hijo mío» conserva la relación afectiva y la dirección personal del discurso sin añadir información no presente en el texto.
- source_word: בְּעָשְׁרְךָ
  english_pob_choice: in your prosperity
  chosen_spanish: en tu prosperidad
  alternatives_spanish:
  - en tu riqueza
  - cuando seas rico
  lexicon: HALOT
  rationale: עֹשֶׁר puede referirse a riqueza o prosperidad. «Prosperidad» mantiene el sentido de estado favorable con bienes, y evita reducir el verso solo a acumulación material.
- source_word: הִתְהַלֵּךְ
  english_pob_choice: walk
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - conducta tu vida
  lexicon: HALOT
  rationale: El hitpael de הלך funciona aquí como exhortación a la manera de vivir. «Anda» preserva la metáfora de conducta y suena natural en español bíblico contemporáneo.
- source_word: בַּעֲנָוָה
  english_pob_choice: in humility
  chosen_spanish: en humildad
  alternatives_spanish:
  - con humildad
  - en mansedumbre
  lexicon: HALOT
  rationale: ענוה combina humildad y mansedumbre; «en humildad» es la opción más directa y equilibrada para el español, sin desplazar el matiz ético principal.
- source_word: וְתֵאָהֵב
  english_pob_choice: and you will be loved
  chosen_spanish: y serás amado
  alternatives_spanish:
  - y te amarán
  - y llegarás a ser amado
  lexicon: HALOT
  rationale: La forma pasiva/futura se refleja con «serás amado», que conserva bien la relación de resultado prometido por el proverbio.
- source_word: מִנּוֹתֵן מַתָּנוֹת
  english_pob_choice: more than one who gives gifts
  chosen_spanish: más que uno que da regalos
  alternatives_spanish:
  - más que un dador de regalos
  - más que quien da regalos
  lexicon: HALOT
  rationale: El comparativo מן con participio expresa comparación con una persona caracterizada por dar presentes. «Uno que da regalos» mantiene la función sustantiva del participio y su valor comparativo.
theological_decisions:
- issue: Texto hebreo frente al paralelo griego divergente
  english_pob_reading: 'Follow the Hebrew wording as the main text: prosperity/wealth, humility, and being loved more than a giver of gifts; preserve the Greek as an alternative note.'
  chosen_spanish_reading: 'Seguir el hebreo como texto principal: prosperidad, humildad, y ser amado más que uno que da regalos; registrar el griego en nota.'
  alternative_spanish_readings:
  - «Hijo, en mansedumbre realiza tus obras, y serás amado por un hombre aceptable».
  rationale: Sirácides suele leerse desde el hebreo cuando está conservado; aquí el hebreo es de alta confianza y difiere de manera real del griego. La nota mantiene transparente la tensión textual sin resolverla silenciosamente.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando sobreviva; DOCTRINE.md: preservar la tensión textual e interpretativa en vez de ocultarla.'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del POB inglés: se mantiene la comparación con «uno que da regalos» y no con una forma más vaga. También se conservó la prioridad del hebreo frente al paralelo griego, registrando la diferencia en nota para transparencia textual.'
  spanish_consistency_notes:
  - Se usó «Hijo mío» para reflejar el vocativo hebreo con sufijo posesivo.
  - Se prefirió «prosperidad» sobre «riqueza» para mantener el campo semántico amplio del hebreo עֹשֶׁר.
  - «Anda en humildad» conserva la imagen de conducta continua y suena natural en español.
  - Se evitó «Señor» u otra adaptación litúrgica porque no corresponde a este versículo.
  - La nota distingue claramente entre la lectura hebrea y el paralelo griego, como exige el archivo auditado.
