base_translation:
  language: en
  yaml_path: translation/ot/hosea/009/004.yaml
  text: They will not pour out wine offerings to Yahweh[a], and their sacrifices will not please him. They will be like mourners’ bread to them; all who eat it will become unclean. For their bread will be for themselves alone[b]; it will not enter the house of Yahweh.
  footnotes:
  - marker: a
    text: Or 'like bread of mourners.' The phrase likely refers to food associated with mourning and therefore conveying ritual uncleanness.
    reason: lexical_alternative
  - marker: b
    text: Or 'for their appetite' or 'for themselves.' The Hebrew phrase means the bread is only for their own use, not fit to be brought into the house of the LORD.
    reason: lexical_alternative
