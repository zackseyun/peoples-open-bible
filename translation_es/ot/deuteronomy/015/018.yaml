translation:
  language: es
  text: No te parecerá difícil cuando lo envíes libre[a], porque por seis años te ha servido por el doble del salario de un jornalero; y Yahvé tu Dios te bendecirá en todo lo que hagas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando lo envíes libre de ti». El hebreo expresa la liberación legal del siervo y añade literalmente la separación «de ti», es decir, de tu casa o autoridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקְשֶׁה בְעֵינֶיךָ
  english_pob_choice: shall not seem hard to you
  chosen_spanish: No te parecerá difícil
  alternatives_spanish:
  - No será difícil a tus ojos
  - No te resultará gravoso
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática (“ser duro en tus ojos”). En español, “te parecerá difícil” conserva el valor evaluativo sin volver literal una imagen extraña; “a tus ojos” sería más calco y “gravoso” introduce un matiz más técnico.
- source_word: בְּשַׁלֵּחֲךָ אֹתוֹ חָפְשִׁי
  english_pob_choice: when you send him away free
  chosen_spanish: cuando lo dejes ir libre de ti
  alternatives_spanish:
  - cuando lo envíes libre
  - cuando lo liberes
  lexicon: HALOT
  rationale: La construcción marca la circunstancia de la liberación. “Dejarlo ir libre de ti” expresa el sentido relacional de מֵעִמָּךְ y mantiene el matiz legal de emancipación; “liberes” sería correcto pero menos cercano al verbo de envío.
- source_word: מֵעִמָּךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de tu lado
  - de tu servicio
  lexicon: HALOT
  rationale: La preposición indica separación personal y relacional, no solo salida de una esfera laboral. “De ti” es directo y fiel; “de tu servicio” añade una interpretación no explicitada por el hebreo.
- source_word: מִשְׁנֶה שְׂכַר שָׂכִיר
  english_pob_choice: double the wages of a hired worker
  chosen_spanish: el doble del salario de un jornalero
  alternatives_spanish:
  - el doble del pago de un trabajador contratado
  - el equivalente a dos salarios de jornalero
  lexicon: HALOT
  rationale: מִשְׁנֶה expresa duplicación. “Salario” corresponde bien a שְׂכַר; “jornalero” comunica el estatus de trabajo remunerado y funciona mejor en español que una calca más larga. Se conserva el valor comparativo sin resolver en exceso la ambigüedad del hebreo.
- source_word: עֲבָדְךָ
  english_pob_choice: he has served you
  chosen_spanish: te ha servido
  alternatives_spanish:
  - ha sido tu esclavo
  - te ha trabajado
  lexicon: HALOT
  rationale: Aunque el lexema se relaciona con esclavitud/servicio, aquí la forma verbal enfatiza la labor rendida. “Te ha servido” sigue el valor verbal del pasaje y evita forzar el sustantivo “esclavo” donde el texto subraya la prestación de servicio; el contexto legal ya fija el marco de servidumbre.
- source_word: שֵׁשׁ שָׁנִים
  english_pob_choice: for six years
  chosen_spanish: por seis años
  alternatives_spanish:
  - durante seis años
  - seis años
  lexicon: HALOT
  rationale: La frase temporal expresa duración. “Por seis años” es natural en español y mantiene la idea de período completo de servicio.
- source_word: וּבֵרַכְךָ יְהוָה אֱלֹהֶיךָ
  english_pob_choice: and Yahweh your God will bless you
  chosen_spanish: Yahvé tu Dios te bendecirá
  alternatives_spanish:
  - y Yahvé tu Dios te bendecirá
  - entonces Yahvé tu Dios te bendecirá
  lexicon: HALOT
  rationale: El hebreo presenta una promesa/resultante futura. Se conserva el nombre divino “Yahvé” según la política del proyecto, y “te bendecirá” mantiene el valor prospectivo.
- source_word: בְּכֹל אֲשֶׁר תַּעֲשֶׂה
  english_pob_choice: in all that you do
  chosen_spanish: en todo lo que hagas
  alternatives_spanish:
  - en todo cuanto emprendas
  - en toda tu obra
  lexicon: HALOT
  rationale: La expresión abarca la totalidad de las acciones o empresas. “En todo lo que hagas” es idiomático, amplio y suficientemente literal.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton, no un sustituto. En español del proyecto, la forma establecida es “Yahvé”, manteniendo el nombre del pacto y evitando la máscara litúrgica “SEÑOR”.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Bonded labor term in עבד-context
  english_pob_reading: he has served you
  chosen_spanish_reading: te ha servido
  alternative_spanish_readings:
  - ha sido tu esclavo
  - te ha trabajado
  rationale: La cláusula está en un contexto legal de liberación, pero la forma verbal subraya el servicio prestado como motivo de la compensación implícita. En español, “te ha servido” preserva ese enfoque sin borrar el trasfondo de servidumbre del capítulo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Coincide sustancialmente con la revisión más reciente: no hubo cambios necesarios en el contenido base. La presente redacción ajusta al español del proyecto la decisión onomástica (Yahvé) y afina la fluidez de la cláusula inicial sin alterar el sentido auditado.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” para el Tetragrámaton, conforme a la terminología del proyecto.
  - “Jornalero” se usa para שָׂכִיר como equivalente funcional de trabajador contratado/remunerado.
  - Se conserva la tensión entre “servir” y el trasfondo de esclavitud mediante nota, sin eliminar el matiz legal.
  - La puntuación reproduce una sola oración compleja con dos cláusulas causales/resultativas, acorde con el hebreo.
