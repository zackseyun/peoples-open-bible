  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente el sentido básico del hebreo: comer la carne esa noche, asada al fuego, con panes sin levadura y hierbas amargas. Conserva bien la estructura prescriptiva y el énfasis en el método de cocción. Sin embargo, hay un ajuste menor de fidelidad estilística y naturalidad: ''aquella noche'' suena más distante de lo que pide בַּלַּיְלָה הַזֶּה (''en/esta noche'') y el propio rastro inglés lo usa como solución idiomática inglesa, no como exigencia para español. En español, ''esa noche'' comunica mejor la noche específica en vista sin alejarla innecesariamente.'
  spanish_quality_summary: El texto es claro, publicable y de buen registro bíblico moderno. La puntuación con punto y coma funciona bien. La frase 'con panes sin levadura y con hierbas amargas' es correcta, pero puede aligerarse a 'con panes sin levadura y hierbas amargas' sin pérdida. La nota a contiene comillas y formulación algo torpes ('en/esta noche'); conviene normalizarla.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''la carne'', ''asada al fuego'', ''panes sin levadura'' y ''hierbas amargas'' concuerdan con las decisiones léxicas documentadas. No aparecen términos sensibles del glosario mayor. La principal mejora es contextual: preferir ''esa noche'' frente a ''aquella noche''.'
  issues:
  - severity: medium
    issue: '''aquella noche'' introduce una distancia referencial innecesaria'
    rationale: El hebreo dice literalmente 'en/esta noche', y el inglés 'that night' responde a la idiomaticidad inglesa. En español bíblico natural, 'esa noche' preserva la referencia específica sin alejarla tanto como 'aquella noche'.
  - severity: low
    issue: La nota [a] está redactada de forma poco natural
    rationale: 'La formulación actual (''O: «en esta noche». El hebreo dice literalmente «en/esta noche»'') suena poco pulida. Conviene expresarla con español natural y consistente con la explicación léxica.'
  - severity: low
    issue: Redundancia leve en 'y con hierbas amargas'
    rationale: Tras 'con panes sin levadura', repetir 'con' antes de 'hierbas amargas' no es incorrecto, pero resulta más pesado de lo necesario en español.
  revised_spanish_text: Comerán la carne esa noche[a], asada al fuego[b]; con panes sin levadura y hierbas amargas la comerán.
  revised_footnotes:
  - marker: a
    text: 'O: «en esta noche». El hebreo dice literalmente «en esta noche», pero en español «esa noche» expresa de forma natural la noche específica de la comida pascual.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «asada de fuego» o «asada con fuego», enfatizando que debe cocinarse por asado y no por otro método.
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para mejorar la fidelidad contextual y la naturalidad del español: ''esa noche'' refleja mejor la referencia específica del hebreo que ''aquella noche''. También se pulió la nota [a] y se simplificó levemente la coordinación final sin cambiar el sentido.'
