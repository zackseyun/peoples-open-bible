translation:
  language: es
  text: Esto será el castigo de Egipto[a], y el castigo de todas las naciones que no suban para celebrar la Fiesta de las Cabañas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pena». El hebreo חטאת también puede significar «pecado» en otros contextos, pero aquí se refiere al juicio o sanción en que se incurre por no subir a la fiesta.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, «la Fiesta de los Tabernáculos».
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This
  chosen_spanish: Esto
  alternatives_spanish:
  - Esta
  - Esto será
  lexicon: HALOT
  rationale: El demostrativo hebreo introduce el anuncio de la consecuencia; en español, «Esto» conserva la deixis sin forzar un sustantivo femenino como «esta» cuando el referente inmediato es toda la sanción anunciada.
- source_word: תִּהְיֶה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - va a ser
  - shall be
  lexicon: HALOT
  rationale: El imperfecto expresa futuro/resultativo; «será» es natural y fiel al valor prospectivo del hebreo.
- source_word: חַטַּאת
  english_pob_choice: punishment
  chosen_spanish: culpa
  alternatives_spanish:
  - castigo
  - pena
  - pecado
  lexicon: HALOT
  rationale: 'El POB inglés opta por «punishment» para el sentido judicial del contexto. En español, «culpa» conserva la tensión semántica de חטאת: puede designar la falta o la condición de responsabilidad/pena derivada de ella, sin borrar la conexión léxica con «pecado» que el contexto no permite anular del todo. Se evita «pecado» como traducción principal porque aquí no describe una ofensa moral aislada, sino la consecuencia judicial de no subir a la fiesta.'
- source_word: מִצְרָיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar.
- source_word: וְחַטַּאת
  english_pob_choice: and the punishment
  chosen_spanish: y la culpa
  alternatives_spanish:
  - y el castigo
  - y la pena
  - y el pecado
  lexicon: HALOT
  rationale: Se mantiene la misma decisión léxica para la repetición del sustantivo, preservando coherencia y la tensión hebrea entre falta y juicio.
- source_word: כָּל הַגּוֹיִם
  english_pob_choice: of all the nations
  chosen_spanish: de todas las naciones
  alternatives_spanish:
  - de todos los pueblos
  - de todos los gentiles
  lexicon: HALOT
  rationale: «Naciones» es la equivalencia natural y más amplia para גּוֹיִם en este contexto escatológico.
- source_word: אֲשֶׁר לֹא יַעֲלוּ
  english_pob_choice: that do not go up
  chosen_spanish: que no suban
  alternatives_spanish:
  - que no irán
  - que no vayan a subir
  lexicon: HALOT
  rationale: «Subir» conserva el modismo peregrino de ascender a Jerusalén; el subjuntivo tras el relativo de caracterización es idiomático en español.
- source_word: לָחֹג
  english_pob_choice: to celebrate
  chosen_spanish: para celebrar
  alternatives_spanish:
  - para guardar
  - para observar como fiesta
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad; «celebrar» comunica adecuadamente el sentido festivo sin perder el acto cultual.
- source_word: אֶת חַג הַסֻּכּוֹת
  english_pob_choice: the Festival of Booths
  chosen_spanish: la Fiesta de las Cabañas
  alternatives_spanish:
  - la Fiesta de los Tabernáculos
  - la Fiesta de las Enramadas
  lexicon: HALOT
  rationale: Se traduce el nombre festivo con un término transparente y digno en español. «Cabañas» refleja la imagen de sukwot con claridad; se evita «Tabernáculos» por ser tradicional pero menos transparente para lectores modernos.
theological_decisions:
- issue: Sentido de חטאת en contexto judicial escatológico
  english_pob_reading: punishment
  chosen_spanish_reading: culpa
  alternative_spanish_readings:
  - castigo
  - pena
  - pecado
  rationale: El contexto de Zacarías 14:18–19 describe la sanción que recae sobre quienes no suben a adorar. «Culpa» permite conservar la ambigüedad hebrea entre falta y responsabilidad judicial, mientras que «castigo» explicita demasiado el resultado y «pecado» sugiere incorrectamente una mera cualidad moral en vez de la penalidad incurrida.
  doctrine_reference: Translation philosophy §1, §5
- issue: Título de la fiesta חַג הַסֻּכּוֹת
  english_pob_reading: Festival of Booths
  chosen_spanish_reading: Fiesta de las Cabañas
  alternative_spanish_readings:
  - Fiesta de los Tabernáculos
  - Fiesta de las Enramadas
  rationale: Se privilegia una denominación traducida y comprensible. «Cabañas» preserva el elemento imagético de sucot y evita depender de un término eclesiástico más tradicional que transparente.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El borrador sigue el acuerdo alto del audit trail inglés y conserva la decisión contextual sobre חטאת como consecuencia judicial, a la vez que ajusta la forma española para sonar natural y publicable. No se introdujeron revisiones adicionales respecto del contexto fuente.
  spanish_consistency_notes:
  - Se mantiene «subir» para el idioma peregrino, coherente con el hebreo y con el audit trail inglés.
  - Se evita «SEÑOR»; el versículo no contiene el Tetragrámaton explícito en este segmento.
  - La repetición de חטאת se refleja con la misma elección léxica para no diluir la tensión semántica.
  - «Fiesta de las Cabañas» es uniforme con la decisión de traducir el nombre de la festividad de modo transparente.
