  yaml_path: translation/ot/numbers/005/015.yaml
  text: 'Then the man shall bring his wife to the priest[a], and he shall bring her offering for her: a tenth of an ephah of barley meal. He shall pour no oil on it and put no frankincense on it, because it is a grain offering of jealousy[b], a memorial offering bringing iniquity to remembrance.'
  footnotes:
