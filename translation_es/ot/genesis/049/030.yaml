revisions:
- from: en la cueva que está en el campo de Macpela[a], la cual está frente a Mamre, en la tierra de Canaán, que Abraham compró junto con el campo de manos de Efrón el hitita, como posesión funeraria[b].
  to: en la cueva que está en el campo de Macpela, que está frente a Mamre[a], en la tierra de Canaán, que Abraham compró junto con el campo de Efrón el hitita, como propiedad para sepultura[b].
  rationale: Se corrigió el anclaje de la nota sobre עַל־פְּנֵי מַמְרֵא para que aparezca en «frente a Mamre». Se sustituyó «de manos de Efrón» por «de Efrón» por mayor fidelidad y naturalidad. Se ajustó «posesión funeraria» a «propiedad para sepultura» para reflejar mejor el matiz jurídico de לַאֲחֻזַּת קָבֶר. También se simplificó «la cual» a «que» para una lectura más fluida.
