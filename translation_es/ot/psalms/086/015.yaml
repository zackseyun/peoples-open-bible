translation:
  language: es
  text: Pero tú, Señor, eres un Dios compasivo y clemente, lento para enojarte y abundante en amor leal y fidelidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'verdad'. En esta fórmula de pacto, la palabra hebrea suele tener el sentido de fidelidad o confiabilidad más que de verdad abstracta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Mas tú
  lexicon: HALOT
  rationale: El valor contrastivo del prefijo וְ y del pronombre enfático se conserva mejor con 'Pero tú', que expresa oposición natural en español y mantiene el énfasis personal del hebreo.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  - Señor Dios
  lexicon: HALOT
  rationale: Aquí אֲדֹנָי funciona como título reverencial divino. 'Señor' es la forma idiomática y digna en español; 'mi Señor' sugeriría posesión literal y no refleja el uso reverencial.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios poderoso
  - dios
  lexicon: HALOT
  rationale: En esta fórmula confesional, אֵל identifica al Señor como Dios. 'Dios' es la equivalencia directa y natural; 'Dios poderoso' añadiría un matiz no exigido por el contexto.
- source_word: רַחוּם
  english_pob_choice: compassionate
  chosen_spanish: compasivo
  alternatives_spanish:
  - misericordioso
  - lleno de compasión
  lexicon: HALOT
  rationale: '''Compasivo'' comunica bien la cualidad de profunda compasión y funciona con equilibrio junto a ''clemente''. ''Misericordioso'' también es posible, pero ''compasivo'' evita repetir el campo semántico de gracia/clemencia de la siguiente palabra.'
- source_word: וְחַנּוּן
  english_pob_choice: and gracious
  chosen_spanish: y clemente
  alternatives_spanish:
  - y gracioso
  - y lleno de gracia
  - y favorable
  lexicon: HALOT
  rationale: En español, 'clemente' expresa bien la disposición benigna e indulgente del hebreo חַנּוּן, especialmente en la fórmula teológica asociada a Ex 34:6. 'Gracioso' sería ambiguo y menos natural en registro bíblico actual.
- source_word: אֶרֶךְ אַפַּיִם
  english_pob_choice: slow to anger
  chosen_spanish: lento para la ira
  alternatives_spanish:
  - paciente
  - tardo en airarse
  lexicon: HALOT
  rationale: 'El modismo hebreo se traduce idiomáticamente para no perder claridad: ''lento para la ira'' conserva la fuerza semántica de la paciencia ante la provocación mejor que una traducción literal.'
- source_word: וְרַב חֶסֶד
  english_pob_choice: abounding in steadfast love
  chosen_spanish: abundante en amor leal
  alternatives_spanish:
  - rico en misericordia
  - abundante en amor constante
  - abundante en lealtad de pacto
  lexicon: HALOT
  rationale: חֶסֶד en este formulario de pacto se entiende mejor como amor leal/covenantal que como mera emoción o benevolencia general. 'Amor leal' mantiene la fidelidad relacional y el compromiso de pacto sin recurrir a una expresión demasiado técnica.
- source_word: וֶאֱמֶת
  english_pob_choice: and faithfulness
  chosen_spanish: y fidelidad
  alternatives_spanish:
  - y verdad
  - y confiabilidad
  lexicon: HALOT
  rationale: En esta pareja formulística con חֶסֶד, אֱמֶת suele significar fiabilidad o fidelidad más que verdad abstracta. 'Fidelidad' reproduce bien la lectura de pacto y el equilibrio del paralelismo.
theological_decisions:
- issue: Fórmula de auto-descripción divina que alude a Éxodo 34:6
  english_pob_reading: compassionate and gracious ... abounding in steadfast love and faithfulness
  chosen_spanish_reading: compasivo y clemente ... abundante en amor leal y fidelidad
  alternative_spanish_readings:
  - misericordioso y bondadoso ... abundante en misericordia y verdad
  - compasivo y lleno de gracia ... abundante en amor constante y verdad
  rationale: La traducción conserva el eco pactal de la fórmula clásica sin volverla arcaizante. 'Amor leal y fidelidad' comunica mejor en español contemporáneo la lealtad de pacto y la confiabilidad relacional que subyacen a חֶסֶד y אֱמֶת.
  doctrine_reference: Éxodo 34:6; filosofía de traducción §§1, 5, 6
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando cualquier nota al pie no anclada. La frase se entrega sin marcadores de nota, manteniendo toda la información lexical y teológica en los campos de decisiones.
  spanish_consistency_notes:
  - Se usó 'Señor' para אֲדֹנָי como título reverencial, no como posesivo.
  - '''Dios'' traduce אֵל en sentido confesional y no se añade intensificación no sustentada.'
  - '''Amor leal'' y ''fidelidad'' preservan el tono de pacto de חֶסֶד y אֱמֶת sin imponer ''verdad'' abstracta.'
  - El registro busca ser bíblico y publicable en español neutro, evitando calcos innecesarios.
