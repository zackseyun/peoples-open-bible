translation:
  language: es
  text: Donde hay oyentes,[b] no derrames palabras, y no presumas de sabio a destiempo.[a][c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo suministrado en el paquete fuente no corresponde a Sirácida 35:4; por eso la traducción sigue el paralelo griego, que contiene una advertencia sobre hablar y exhibir sabiduría en un momento inapropiado.
    reason: textual_variant
  - marker: b
    text: '''Oyentes'' puede entenderse también como ''auditorio''. El griego ἀκρόαμα admite tanto la idea de escucha como la de un público que oye.'
    reason: lexical_alternative
  - marker: c
    text: O 'no te hagas el sabio a destiempo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου ἀκρόαμα
  english_pob_choice: Where there is listening / audience
  chosen_spanish: Donde hay escucha
  alternatives_spanish:
  - Donde hay un auditorio
  - Donde hay quienes escuchan
  lexicon: LSJ; BDAG
  rationale: La imagen griega sitúa la advertencia en el contexto de una situación de escucha o de un público. 'Escucha' conserva la ambigüedad útil entre el acto de oír y la presencia de oyentes, sin obligar a una especificación que el griego no exige.
- source_word: μὴ ἐκχέῃς
  english_pob_choice: do not pour out
  chosen_spanish: no derrames
  alternatives_spanish:
  - no viertas
  - no desbordes
  lexicon: BDAG
  rationale: El verbo mantiene una metáfora física de derramar. 'Derrames' reproduce esa imagen de forma natural en español y conserva la fuerza expresiva de la advertencia.
- source_word: λαλιάν
  english_pob_choice: speech
  chosen_spanish: discurso
  alternatives_spanish:
  - habla
  - palabrería
  - charla
  lexicon: BDAG
  rationale: '''Discurso'' da un tono más sobrio y sapiencial que ''charla'', sin caer en una expresión demasiado coloquial. Evita también reducir el sentido a ''palabrería'', que añadiría un juicio no explicitado por el griego.'
- source_word: ἀκαίρως
  english_pob_choice: at the wrong time
  chosen_spanish: a destiempo
  alternatives_spanish:
  - en mal momento
  - fuera de tiempo
  - a deshora
  lexicon: BDAG
  rationale: '''A destiempo'' es la equivalencia española más idiomática para la idea de oportunidad inapropiada, y conserva el matiz sapiencial de adecuación al momento.'
- source_word: σοφίζου
  english_pob_choice: do not show off wisdom / do not play the wise man
  chosen_spanish: no presumas de sabio
  alternatives_spanish:
  - no te hagas el sabio
  - no juegues al sabio
  - no te exhibas como sabio
  lexicon: BDAG
  rationale: El verbo medio sugiere el acto de presentarse como sabio o exhibir sabiduría. 'Presumas de sabio' recoge bien esa ostentación, más fielmente que un simple 'no seas sabio', que suavizaría demasiado la advertencia.
theological_decisions:
- issue: Selección de testigo base para la traducción de Sirácida 35:4
  english_pob_reading: Translate from the Greek parallel because the supplied Hebrew text does not correspond to Sirach 35:4.
  chosen_spanish_reading: Traducir desde el paralelo griego, porque el hebreo suministrado no corresponde a este versículo.
  alternative_spanish_readings:
  - Traducir como si el hebreo suministrado perteneciera al versículo
  - Ignorar la discrepancia textual
  rationale: El hebreo del paquete fuente dice otra cosa distinta ('y sabrán... no hay Dios fuera de ti'), por lo que no puede ser la base de una traducción coherente de Sirácida 35:4. La decisión de seguir el griego preserva la honestidad textual y evita fusionar dos pasajes distintos.
  doctrine_reference: 'PHILOSOPHY.md: traducir directamente del testigo original disponible y declarar honestamente la incertidumbre de la fuente'
translation_notes:
  revision_awareness: La revisión más reciente sustituyó un borrador que no correspondía al griego de Sirácida 35:4 por una traducción alineada con el paralelo griego. Esta versión mantiene esa corrección y la declara explícitamente en nota textual.
  spanish_consistency_notes:
  - Se preserva el tono sapiencial y admonitorio del griego, con español natural y digno.
  - Se evita imponer terminología eclesiástica tradicional donde el texto no la requiere.
  - La metáfora de 'derramar' se conserva para reflejar el griego, en vez de suavizarla a una simple referencia abstracta a hablar.
  - Se mantiene la advertencia sobre la oportunidad adecuada ('a destiempo') como elemento central del versículo.
