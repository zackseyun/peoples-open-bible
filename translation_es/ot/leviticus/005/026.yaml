translation:
  language: es
  text: Y el sacerdote hará expiación por él delante de Yahvé[a], y será perdonado por cualquiera de todas las cosas con las que uno pueda incurrir en culpa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «por una de todas las cosas que uno pueda hacer para incurrir en culpa por ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִפֶּר
  english_pob_choice: shall make atonement
  chosen_spanish: hará expiación
  alternatives_spanish:
  - hará atonamiento
  - hará propiciación
  lexicon: HALOT
  rationale: El Piel de כפר en contexto sacrificial expresa la acción cultual de expiar. En español, «hará expiación» conserva el campo sacrificial sin forzar una teoría más estrecha que el hebreo no explicita.
- source_word: עָלָיו
  english_pob_choice: for him
  chosen_spanish: por él
  alternatives_spanish:
  - en favor de él
  - a favor de él
  lexicon: HALOT
  rationale: Con כפר, על indica la persona en cuyo favor se realiza la expiación. «Por él» es natural en español y mantiene la relación beneficiaria.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiando
  - el ministro sacrificial
  lexicon: HALOT
  rationale: El término hebreo designa al sacerdote cultual; «sacerdote» es la equivalencia directa y estable en español bíblico contemporáneo.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se preserva el nombre divino como «Yahvé» según la política del proyecto. «Delante de» reproduce adecuadamente el valor espacial/cultual de לִפְנֵי.
- source_word: וְנִסְלַח לוֹ
  english_pob_choice: and he shall be forgiven
  chosen_spanish: y le será perdonado
  alternatives_spanish:
  - y será perdonado
  - y se le perdonará
  lexicon: HALOT
  rationale: El nifal de סלח expresa perdón recibido. «Le será perdonado» mantiene la pasiva/resultativa y suena natural en español formal.
- source_word: עַל אַחַת מִכֹּל
  english_pob_choice: for any one of all the things
  chosen_spanish: por cualquiera de todas las cosas
  alternatives_spanish:
  - por una cualquiera de todas las cosas
  - por cualquiera de todos los actos
  lexicon: HALOT
  rationale: La expresión distributiva enfatiza cualquier instancia individual dentro del conjunto. «Cualquiera de todas las cosas» conserva esa amplitud sin reinterpretarla.
- source_word: אֲשֶׁר יַעֲשֶׂה
  english_pob_choice: one may incur
  chosen_spanish: por las cuales uno puede
  alternatives_spanish:
  - por las cuales él puede
  - que uno puede
  lexicon: HALOT
  rationale: El hebreo usa una relativa general; «uno puede» mantiene el valor impersonal y evita concretar innecesariamente el sujeto.
- source_word: לְאַשְׁמָה בָהּ
  english_pob_choice: incur guilt
  chosen_spanish: incurrir en culpa
  alternatives_spanish:
  - hacerse culpable
  - contraer culpa
  lexicon: HALOT
  rationale: La construcción expresa llegar a ser culpable por medio del acto. «Incurrir en culpa» preserva el sentido forense y evita confundirlo con la ofrenda por la culpa.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton. Conforme a la terminología del proyecto, se vierte como «Yahvé» y no se sustituye por un título anónimo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Perdón y expiación en contexto sacrificial
  english_pob_reading: the priest shall make atonement ... and he shall be forgiven
  chosen_spanish_reading: el sacerdote hará expiación ... y le será perdonado
  alternative_spanish_readings:
  - el sacerdote hará propiciación ... y se le perdonará
  - el sacerdote expiará ... y será perdonado
  rationale: 'El versículo mantiene dos actos relacionados pero distintos: la acción cultual del sacerdote y el resultado del perdón. La redacción española conserva esa tensión sin fusionarlos.'
  doctrine_reference: Levítico 5:26; cf. doctrina léxica sobre כפר y סלח
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés al reflejar la modalidad formal («será/sea» expresado en español con futuro resultativo/pasiva perifrástica) y la lectura impersonal de la relativa («uno»). También conserva la decisión revisada de mantener una formulación más concisa para la cláusula de culpa sin añadir explicaciones interpretativas.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con el estándar del proyecto para יְהוָה.
  - Se mantiene «expiación» para כפר en contexto sacrificial, en vez de «propiciación» o una paráfrasis explicativa.
  - «Culpa» traduce אַשְׁמָה en sentido forense, sin convertirlo en nombre de una ofrenda.
  - La pasiva «le será perdonado» conserva el resultado del acto sin nombrar explícitamente al agente, como en el hebreo.
  - La nota al pie se ancla en «incurrir en culpa», donde reside la ambigüedad léxica principal del final del versículo.
