  to: 'Y tú, habla a los hijos[b] de Israel, diciendo: «Ciertamente[a] deben guardar mis sábados, porque es una señal entre mí y ustedes por todas sus generaciones, para que sepan que yo soy Yahvé, que los santifica[c]».'
  rationale: Se corrigió la gramática española en «entre mí y ustedes», se movió la nota de אַךְ al lugar correcto («Ciertamente»), se eliminó una nota que defendía una construcción no publicable y se mantuvo la terminología teológica y lexical del proyecto. «Deben guardar» expresa de modo natural el mandato hebreo en español contemporáneo sin perder fuerza covenantal.
