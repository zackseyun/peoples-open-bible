translation:
  language: es
  text: Con un aroma agradable[a] yo los aceptaré, cuando los saque de entre los pueblos y los reúna de las tierras donde han sido dispersados, y seré santificado entre ustedes[b] delante de los ojos de las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con/como un aroma agradable», lenguaje sacrificial de una ofrenda aceptable.'
    reason: cultural_note
  - marker: b
    text: 'O: «me mostraré santo entre ustedes delante de los ojos de las naciones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרֵיחַ נִיחֹחַ
  english_pob_choice: With a pleasing aroma
  chosen_spanish: Con un aroma agradable
  alternatives_spanish:
  - Con un aroma grato
  - Con un aroma suave
  lexicon: HALOT
  rationale: La expresión hebrea es lenguaje sacrificial de aceptación. En español, «con un aroma agradable» conserva la imagen cultual sin volverse rígida ni desplazar el sentido hacia una emoción subjetiva.
- source_word: אֶרְצֶה אֶתְכֶם
  english_pob_choice: I will accept you
  chosen_spanish: yo los aceptaré
  alternatives_spanish:
  - los recibiré con agrado
  - me agradaré de ustedes
  lexicon: HALOT
  rationale: רצה en este contexto expresa aceptación favorable, especialmente en marco de sacrificio. «Aceptar» comunica bien esa relación de aprobación divina sin introducir una tonalidad devocional ajena al pasaje.
- source_word: בְּהוֹצִיאִי אֶתְכֶם מִן הָעַמִּים
  english_pob_choice: when I bring you out from the peoples
  chosen_spanish: cuando los saque de entre los pueblos
  alternatives_spanish:
  - cuando los saque de los pueblos
  - cuando los haga salir de entre los pueblos
  lexicon: HALOT
  rationale: «De entre los pueblos» expresa con naturalidad el hebreo מִן הָעַמִּים y mantiene la idea de extracción desde el medio de otros pueblos, no solo de un territorio.
- source_word: וְקִבַּצְתִּי אֶתְכֶם
  english_pob_choice: and gather you
  chosen_spanish: y los reúna
  alternatives_spanish:
  - y los congregue
  - y los juntaré
  lexicon: HALOT
  rationale: קבץ aquí es el verbo de reunión/ingathering del exilio. «Reúna» es claro y sobrio en español, y conserva la idea de restauración colectiva.
- source_word: מִן הָאֲרָצוֹת
  english_pob_choice: from the lands
  chosen_spanish: de las tierras
  alternatives_spanish:
  - de los países
  - de las regiones
  lexicon: HALOT
  rationale: אֲרָצוֹת puede referirse a tierras o países; «tierras» es más amplio y evita anacronismos políticos modernos.
- source_word: אֲשֶׁר נְפֹצֹתֶם בָּם
  english_pob_choice: where you have been scattered
  chosen_spanish: donde han sido dispersados
  alternatives_spanish:
  - donde fueron esparcidos
  - en las cuales han sido dispersados
  lexicon: HALOT
  rationale: El pasivo de נָפַץ expresa dispersión/exilio. «Dispersados» es el equivalente natural en español y conserva la resonancia bíblica del exilio.
- source_word: וְנִקְדַּשְׁתִּי בָכֶם
  english_pob_choice: I will show myself holy among you
  chosen_spanish: y seré santificado entre ustedes
  alternatives_spanish:
  - y me mostraré santo entre ustedes
  - y seré mostrado santo entre ustedes
  lexicon: HALOT
  rationale: El nifal de קדשׁ en esta fórmula expresa la manifestación pública de la santidad divina. «Seré santificado entre ustedes» mantiene la tensión teológica del original y evita sustituirla por una paráfrasis interpretativa más fuerte.
- source_word: לְעֵינֵי הַגּוֹיִם
  english_pob_choice: before the eyes of the nations
  chosen_spanish: delante de los ojos de las naciones
  alternatives_spanish:
  - a la vista de las naciones
  - en presencia de las naciones
  lexicon: HALOT
  rationale: La expresión idiomática señala visibilidad pública. «Delante de los ojos de las naciones» sigue muy de cerca el hebreo y conserva la fuerza de testimonio ante los gentiles.
theological_decisions:
- issue: Cómo traducir la auto-santificación de Yahvé sin borrar la tensión teológica
  english_pob_reading: I will show myself holy among you before the eyes of the nations.
  chosen_spanish_reading: y seré santificado entre ustedes delante de los ojos de las naciones.
  alternative_spanish_readings:
  - y me mostraré santo entre ustedes delante de los ojos de las naciones
  - y seré reconocido como santo entre ustedes delante de los ojos de las naciones
  rationale: El hebreo no implica que Israel haga a Dios más santo en esencia, sino que su santidad será públicamente manifestada y vindicada. La opción elegida conserva la forma verbal pasiva/reflexiva del original y deja visible la tensión teológica en vez de resolverla demasiado pronto.
  doctrine_reference: Translation philosophy §§3, 6
- issue: Valor cultual de «aroma agradable»
  english_pob_reading: With a pleasing aroma
  chosen_spanish_reading: Con un aroma agradable
  alternative_spanish_readings:
  - Con un aroma grato
  - Como un aroma agradable
  rationale: La frase proviene del lenguaje de ofrenda aceptable. «Con un aroma agradable» comunica el valor cultual del hebreo sin convertirlo en una explicación excesiva o en una metáfora psicológica.
  doctrine_reference: Translation philosophy §§2, 5
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el texto hebreo y la solución inglesa final: mantiene el marco sacrificial de בְּרֵיחַ נִיחֹחַ, la temporalidad de בְּהוֹצִיאִי, la reunión desde las tierras del exilio y la fórmula teológica de santificación pública de Yahvé. También refleja la revisión auditada que prefirió una expresión más próxima al hebreo para el aroma agradable y a la vez conservó la visibilidad pública ante las naciones.'
  spanish_consistency_notes:
  - Yahvé no aparece explícitamente en este versículo; se conserva la referencia implícita del hablante divino mediante la primera persona.
  - Se usa «pueblos» para הָעַמִּים y «naciones» para הַגּוֹיִם, preservando la distinción observada en el audit trail inglés.
  - «Dispersados» mantiene la imagen de exilio sin introducir una lectura política moderna.
  - La puntuación separa la cláusula temporal para reflejar la estructura hebrea del versículo.
