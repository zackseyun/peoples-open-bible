review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y la línea del POB inglés: la pregunta retórica de exclusividad en el cielo y la afirmación de que aparte de Dios no se desea nada en la tierra. También preserva adecuadamente la elipsis del segundo hemistiquio mediante nota. Sin embargo, «fuera de ti» suena menos idiomático y ligeramente espacial en español bíblico moderno; «aparte de ti» comunica mejor la exclusividad relacional documentada por el POB. Además, «en los cielos» es posible, pero «en el cielo» suena más natural en español general sin perder el contraste cielo/tierra.'
  spanish_quality_summary: El texto es claro y comprensible, pero puede pulirse para sonar más natural y digno en español eclesial amplio. «¿A quién tengo yo en los cielos, sino a ti?» es entendible, pero «en el cielo» mejora la fluidez. «Y fuera de ti» es menos idiomático que «Y aparte de ti». La nota al pie es útil, pero conviene cambiar «contigo» por «con ti», que es incorrecto, a «contigo» si se mencionara; en el borrador actual la nota ya usa «contigo» correctamente.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La elección de «deseo» para חָפַצְתִּי concuerda con la decisión lexical auditada. La revisión propuesta mantiene la fuerza exclusiva del hebreo y la nota alternativa documentada.
  issues:
  - severity: medium
    issue: «Fuera de ti» no es la mejor opción idiomática para וְעִמְּךָ en este contexto
    rationale: Aunque transmite exclusión, en español puede oírse espacial o menos natural. El POB inglés justificó «besides you / apart from you» por la fuerza idiomática del paralelismo; «aparte de ti» la refleja mejor.
  - severity: low
    issue: «En los cielos» es menos natural que «en el cielo» en español contemporáneo
    rationale: El hebreo usa plural formal, pero el propio POB inglés optó por el equivalente idiomático singular. En español, «en el cielo» conserva bien el contraste con «en la tierra».
  revised_spanish_text: ¿A quién tengo yo en el cielo, sino a ti? Y aparte de ti[a], no deseo nada en la tierra.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «Y contigo no he deseado nada en la tierra». El hebreo es elíptico; el sentido es que, aparte de Dios, el salmista no desea nada en la tierra.'
    reason: alternative_reading
  revision_rationale: 'Se ajusta la redacción para mayor naturalidad y fidelidad idiomática al sentido exclusivo del hebreo y de la auditoría inglesa: «aparte de ti» expresa mejor la exclusividad que «fuera de ti», y «en el cielo» suena más natural en español sin perder el paralelismo cielo/tierra. La nota conserva la alternativa más literal y explica la elipsis del original.'
