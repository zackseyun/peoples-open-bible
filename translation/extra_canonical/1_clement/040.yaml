id: 1CLEM.40
reference: 1 Clement 40
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Προδήλων οὖν ἡμῖν ὄντων τούτων, καὶ ἐγκεχυφότες εἰς τὰ βάθη τῆς θείας γνώσεως, πάντα τάξει ποιεῖν ὀφείλομεν, ὅσα ὁ δεσπότης ἐπιτελεῖν ἐκέλευσεν κατὰ καιροὺς τεταγμένους. 2. τὰς τε προσφορὰς καὶ λειτουργίας ἐπιτελεῖσθαι, καὶ οὐκ εἰκῇ ἢ ἀτάκτως ἐκέλευσεν γίνεσθαι, ἀλλʼ ὡρισμένοις καιροῖς καὶ ὥραις. 3. ποῦ τε καὶ διὰ τίνων ἐπιτελεῖσθαι θέλει, αὐτὸς ὥρισεν τῇ ὑπερτάτῃ αὐτοῦ βουλήσει, ἵνʼ ὁσίως πάντα γινόμενα ἐν εὐδοκήσει εὐπρόσδεκτα εἴη τῷ θελήματι αὐτοῦ. 4. οἱ οὖν τοῖς προστεταγμένοις καιροῖς ποιοῦντες τὰς προσφορὰς αὐτῶν εὐπρόσδεκτοί τε καὶ μακάριοί· τοῖς γὰρ νομίμοις τοῦ δεσπότου ἀκολουθοῦντες οὐ διαμαρτάνουσιν. 5. τῷ γὰρ ἀρχιερεῖ ἴδιαι λειτουργίαι δεδομέναι εἰσίν, καὶ τοῖς ἱερεῦσιν ἴδιος ὁ τόπος προστέτακται, καὶ λευΐταις ἴδιαι διακονίαι ἐπίκεινται· ὁ λαϊκὸς ἄνθρωπος τοῖς λαϊκοῖς προστάγμασιν δέδεται.
  language: Greek
  pages:
  - 313
  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: Therefore[a], since these things are clear to us, and since we have looked into the depths of the divine knowledge, we ought to do everything in order that the Master commanded to be done at the appointed times. He commanded that both the offerings and the ministries be performed, and not take place casually or disorderly, but at fixed times and hours. And where and through whom he wants them to be performed, he himself determined by his supreme will, so that, all things being done in holiness[b], they might be acceptable to his will with approval. Therefore those who make their offerings at the appointed times are both acceptable and blessed; for by following the lawful ordinances of the Master they do not go astray. For to the high priest his own ministries have been given, and to the priests their own place has been assigned, and upon the Levites their own services are laid[c][d][e]; the layman is bound by the lay ordinances.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'well-pleasing and acceptable to his will.' The Greek expression is emphatic, combining favorable regard and acceptability.
    reason: lexical_alternative
    anchor_ref: '40:3'
  - marker: b
    text: The verb can also mean 'do not miss the mark' or 'do not transgress.'
    reason: lexical_alternative
    anchor_ref: '40:4'
  - marker: e
    text: Clement appeals to the ordered roles of Israel's worship—high priest, priests, Levites, and layman—as an analogy for proper order in the community.
    reason: cross_reference
    anchor_ref: '40:5'
  - marker: d
    text: Or 'do everything in order that the Master commanded'.
    reason: previous_rendering
  - marker: c
    text: Or 'at the appointed times that have been prescribed'.
    reason: previous_rendering
lexical_decisions:
- source_word: Προδήλων
  chosen: plain
  alternatives:
  - manifest
  - evident
  - clear
  lexicon: LSJ
  rationale: Conveys that the matters are evident or made plain, while keeping the rhetorical force of the opening participial clause.
- source_word: ἐγκεχυφότες
  chosen: have peered into
  alternatives:
  - have bent over into
  - have looked closely into
  - have stooped into
  lexicon: LSJ
  rationale: The verb is vivid and bodily, suggesting intent scrutiny into depth. 'Have peered into' preserves the image better than a flatter 'understood.'
- source_word: τὰ βάθη τῆς θείας γνώσεως
  chosen: the depths of the divine knowledge
  alternatives:
  - the depths of divine knowledge
  - the deep things of divine knowledge
  lexicon: LSJ
  rationale: Retains the elevated theological diction and the genitival structure without over-paraphrasing.
- source_word: πάντα τάξει ποιεῖν
  chosen: do everything in order
  alternatives:
  - do all things orderly
  - perform everything according to order
  lexicon: LSJ
  rationale: Captures both the comprehensive scope and the emphasis on proper order, important to the chapter's paraenetic and ecclesial argument.
- source_word: ὁ δεσπότης
  chosen: the Master
  alternatives:
  - the Lord
  - the Sovereign
  lexicon: LSJ
  rationale: Despotēs is stronger and more specific than kyrios. 'Master' preserves authority and command without importing the covenantal/title associations of 'Lord' by default.
- source_word: κατὰ καιροὺς τεταγμένους
  chosen: at the appointed times
  alternatives:
  - according to the appointed seasons
  - at the ordered times
  lexicon: LSJ
  rationale: Kairos here refers to fixed, proper occasions. 'Appointed times' is idiomatic and preserves the sense of divine ordering.
- source_word: προσφορὰς
  chosen: offerings
  alternatives:
  - oblations
  - presentations
  lexicon: LSJ
  rationale: A standard and accessible rendering for cultic offerings, preserving sacrificial/cultic texture.
- source_word: λειτουργίας
  chosen: ministries
  alternatives:
  - services
  - liturgical services
  lexicon: LSJ
  rationale: The term can denote public or sacred service. 'Ministries' preserves ecclesial resonance while allowing the cultic context to remain visible.
- source_word: οὐκ εἰκῇ ἢ ἀτάκτως
  chosen: not happen casually or disorderly
  alternatives:
  - not be done at random or out of order
  - not occur thoughtlessly or irregularly
  lexicon: LSJ
  rationale: Keeps the contrast with divinely fixed order. 'Casually' renders εἰκῇ as aimlessly or without due regard; 'disorderly' reflects ἀτάκτως.
- source_word: ὡρισμένοις καιροῖς καὶ ὥραις
  chosen: at fixed times and hours
  alternatives:
  - at appointed seasons and hours
  - at determined times and moments
  lexicon: LSJ
  rationale: Preserves the doubled temporal precision of the Greek.
- source_word: διὰ τίνων
  chosen: through whom
  alternatives:
  - by whom
  - through which persons
  lexicon: LSJ
  rationale: The phrase concerns designated human agents for cultic action; 'through whom' preserves instrumentality and personal reference.
- source_word: τῇ ὑπερτάτῃ αὐτοῦ βουλήσει
  chosen: by his supreme will
  alternatives:
  - by his highest counsel
  - by his sovereign purpose
  lexicon: LSJ
  rationale: Retains the superlative force of ὑπερτάτῃ and the deliberative sense of βουλήσει, while remaining readable.
- source_word: ὁσίως
  chosen: in holiness
  alternatives:
  - holily
  - in a holy manner
  - piously
  lexicon: LSJ
  rationale: Avoids awkward adverbial English while preserving the sacred and morally fitting character of the action.
- source_word: ἐν εὐδοκήσει εὐπρόσδεκτα
  chosen: acceptable with approval
  alternatives:
  - well-pleasing and acceptable
  - acceptable in favor
  - favorably acceptable
  lexicon: LSJ
  rationale: The phrase is somewhat emphatic and overlapping. This rendering preserves both acceptance and favorable regard without collapsing the double expression entirely.
- source_word: τοῖς προστεταγμένοις καιροῖς
  chosen: at the appointed times that have been prescribed
  alternatives:
  - at the prescribed times
  - at the commanded times
  lexicon: LSJ
  rationale: Makes explicit the passive sense of times already ordered or prescribed.
- source_word: νομίμοις
  chosen: lawful ordinances
  alternatives:
  - legal requirements
  - appointed rules
  - customary statutes
  lexicon: LSJ
  rationale: In this cultic context the word points to what is in accordance with established rule. 'Lawful ordinances' preserves normative and ordered force.
- source_word: οὐ διαμαρτάνουσιν
  chosen: they do not go astray
  alternatives:
  - they do not sin
  - they do not miss the mark
  - they do not transgress
  lexicon: LSJ
  rationale: The verb literally suggests missing or erring. 'Do not go astray' fits the ordered-obedience context without overstating as explicit moral transgression.
- source_word: ἀρχιερεῖ
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: LSJ
  rationale: Standard cultic rendering; the Jewish sacrificial analogy is central to Clement's argument.
- source_word: ἴδιαι λειτουργίαι
  chosen: his own ministries
  alternatives:
  - his own services
  - his own liturgical duties
  lexicon: LSJ
  rationale: Preserves the distinction of assigned sacred functions.
- source_word: ἴδιος ὁ τόπος προστέτακται
  chosen: their own place has been assigned
  alternatives:
  - their proper station has been appointed
  - their own position has been ordered
  lexicon: LSJ
  rationale: Topos here is more than physical location; it includes appointed sphere or station. 'Place has been assigned' keeps both possibilities open.
- source_word: λευΐταις ἴδιαι διακονίαι ἐπίκεινται
  chosen: upon Levites their own services are laid
  alternatives:
  - the Levites have their own duties imposed
  - their own ministries are assigned to the Levites
  lexicon: LSJ
  rationale: The passive-plus-epikeintai imagery suggests duties laid upon them. This preserves the weight of obligation.
- source_word: ὁ λαϊκὸς ἄνθρωπος
  chosen: the layman
  alternatives:
  - the common man
  - the member of the laity
  lexicon: LSJ
  rationale: The contrast is between cultic officers and the non-officiating member of the people. 'Layman' preserves ecclesial texture and the masculine singular of the Greek.
- source_word: τοῖς λαϊκοῖς προστάγμασιν δέδεται
  chosen: is bound by the layman's ordinances
  alternatives:
  - is bound by lay regulations
  - is subject to the commands for the laity
  lexicon: LSJ
  rationale: Dédetai conveys being bound or constrained. 'Ordinances' keeps the formal, ordered character of the commands applying to the non-priestly person.
theological_decisions:
- issue: Rendering δεσπότης in a chapter about divinely ordered worship
  chosen_reading: the Master
  alternative_readings:
  - the Lord
  - the Sovereign
  rationale: Using 'Master' distinguishes δεσπότης from κύριος and preserves the emphasis on authority and command in Clement's argument about ordered worship.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; consistency of key terms, or documented exception.'
- issue: Cultic language in relation to Christian ecclesial order
  chosen_reading: Retain explicit sacrificial and priestly terminology ('offerings,' 'high priest,' 'priests,' 'Levites,' 'layman')
  alternative_readings:
  - Generalize into 'worship practices' and 'leaders'
  - Christianize all terms into later church offices
  rationale: Clement's argument depends on analogy with Israel's ordered cultus. Flattening the cultic vocabulary would obscure the rhetorical force and theological structure of the passage.
  doctrine_reference: 'PHILOSOPHY.md: Preserve auditable reasoning and avoid paraphrase beyond the source.'
- issue: Rendering λαϊκὸς ἄνθρωπος
  chosen_reading: the layman
  alternative_readings:
  - the lay person
  - the common man
  - the member of the laity
  rationale: The Greek is masculine singular and contrasts a non-priestly man with specific cultic offices. Per the project's gender-accurate policy, the masculine form is retained rather than neutralized.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
