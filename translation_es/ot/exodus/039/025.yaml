translation:
  language: es
  text: Hicieron campanillas de oro puro[a], y pusieron las campanillas entre las granadas, sobre el dobladillo del manto, alrededor, entre las granadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en medio de las granadas'. La expresión hebrea dice literalmente 'en medio de las granadas' y describe la ubicación de las campanillas con respecto a los adornos en forma de granada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: They made
  chosen_spanish: Hicieron
  alternatives_spanish:
  - y hicieron
  - fabricaron
  - elaboraron
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se vierte naturalmente con un pretérito simple en español. 'Hicieron' conserva la secuencia directa de la acción sin añadir matices técnicos no exigidos por el hebreo.
- source_word: פַעֲמֹנֵי
  english_pob_choice: bells
  chosen_spanish: campanillas
  alternatives_spanish:
  - campanas
  - sonajas
  lexicon: HALOT
  rationale: פעמון denota un objeto sonoro pequeño; en el contexto del adorno sacerdotal, 'campanillas' comunica mejor la idea que 'campanas' en español y evita una imagen demasiado grande.
- source_word: זָהָב טָהוֹר
  english_pob_choice: of pure gold
  chosen_spanish: de oro puro
  alternatives_spanish:
  - de oro refinado
  - de oro puro
  lexicon: HALOT
  rationale: La construcción posesiva se expresa con naturalidad como 'de oro puro'. Mantiene explícitos el material y su calidad, sin introducir una paráfrasis interpretativa.
- source_word: וַיִּתְּנוּ
  english_pob_choice: and they put
  chosen_spanish: pusieron
  alternatives_spanish:
  - colocaron
  - oyeron
  lexicon: HALOT
  rationale: נתן en este contexto tiene el sentido de colocar/poner en posición. 'Pusieron' es idiomático y preciso en español.
- source_word: בְּתוֹךְ הָרִמֹּנִים
  english_pob_choice: among the pomegranates
  chosen_spanish: entre las granadas
  alternatives_spanish:
  - en medio de las granadas
  - entre los adornos de granadas
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'en medio de'; en español, 'entre' conserva bien la relación espacial. 'Granadas' mantiene la forma del término, mientras el contexto ornamental deja claro que son adorno(s), no fruto comestible.
- source_word: הָרִמֹּנִים
  english_pob_choice: the pomegranates
  chosen_spanish: las granadas
  alternatives_spanish:
  - las granadas ornamentales
  - los adornos de granadas
  lexicon: HALOT
  rationale: Se preserva el sustantivo literal del hebreo, porque el texto no añade un término explicativo; el contexto del vestuario sacerdotal sugiere su función decorativa.
- source_word: עַל שׁוּלֵי הַמְּעִיל
  english_pob_choice: on the hem of the robe
  chosen_spanish: sobre el borde del manto
  alternatives_spanish:
  - sobre el ruedo del manto
  - en el orillo del manto
  lexicon: HALOT
  rationale: שׁוּלִים puede referirse al borde inferior o al remate/ruedo. 'Borde' es claro y natural; 'manto' es adecuado para מְעִיל en este contexto sacerdotal.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - todo alrededor
  - en derredor
  lexicon: HALOT
  rationale: Marca la distribución circular de los adornos. 'Alrededor' es la forma más natural y sobria en español.
- source_word: בְּתוֹךְ הָרִמֹּנִים (repeated)
  english_pob_choice: among the pomegranates
  chosen_spanish: entre las granadas
  alternatives_spanish:
  - en medio de las granadas
  - entre los adornos de granadas
  lexicon: HALOT
  rationale: Se conserva la repetición del hebreo para respetar la estructura y el énfasis de la disposición de las campanillas respecto de las granadas.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el texto base hebreo y con la lectura auditada en inglés. No se requieren cambios de fondo; la única tensión relevante es espacial: בְּתוֹךְ puede reflejarse literalmente como ''en medio de'' o de manera más natural como ''entre''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo exija; este versículo no contiene el Tetragrámaton.
  - Se conserva la imagen ornamental literal ('granadas') sin explicitar 'ornamentos' en el texto principal para no exceder el hebreo.
  - '''Campanillas'' se eligió por adecuación contextual al adorno sacerdotal y por ser más natural en español que ''campanas''.'
  - La repetición final de 'entre las granadas' se conserva para reflejar la duplicación enfática del hebreo.
