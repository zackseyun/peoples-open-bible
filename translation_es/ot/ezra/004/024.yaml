base_translation:
  language: en
  yaml_path: translation/ot/ezra/004/024.yaml
  text: Then the work on the house of God that is in Jerusalem stopped[c][b][a], and it remained stopped until the second year of the reign of Darius king of Persia.
  footnotes:
  - marker: a
    text: Or 'ceased' / 'was stopped' for the first verb; the Aramaic root בטל carries the sense of stopping or ceasing.
    reason: lexical_alternative
  - marker: b
    text: Or 'the temple of God.' Literally, 'the house of God.'
    reason: lexical_alternative
  - marker: c
    text: The clause 'and it remained stopped' expresses an ongoing state, not merely a second mention of the stoppage.
    reason: lexical_alternative
