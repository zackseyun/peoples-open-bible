  text: וְ/נָסַ֗ע דֶּ֚גֶל מַחֲנֵ֣ה בְנֵי דָ֔ן מְאַסֵּ֥ף לְ/כָל הַֽ/מַּחֲנֹ֖ת לְ/צִבְאֹתָ֑/ם וְ/עַל צְבָא֔/וֹ אֲחִיעֶ֖זֶר בֶּן עַמִּישַׁדָּֽי־־־־׃
