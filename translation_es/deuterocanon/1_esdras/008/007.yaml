translation:
  language: es
  text: Porque Apsaras tenía gran conocimiento[a], de modo que no omitía nada de la ley de Yahvé y de los mandamientos[b], enseñando a todo Israel los estatutos y los juicios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: Ἀψάρας. El paralelo hebreo corresponde a Esdras, pero el testimonio primario griego preserva esta forma del nombre.'
    reason: alternative_reading
  - marker: b
    text: 'La sintaxis griega final es comprimida; literalmente corre algo como ''no omitir nada de las cosas de la ley de Yahvé y de los mandamientos, todo Israel, estatutos y juicios''. La traducción hace explícito el sentido probable: que enseñaba a todo Israel sobre estas materias legales.'
    reason: textual_variant
lexical_decisions:
- source_word: Ἀψάρας
  english_pob_choice: Apsaras
  chosen_spanish: Apsaras
  alternatives_spanish:
  - Esdras
  lexicon: transliteración del nombre propio en el testimonio griego
  rationale: El testimonio primario griego conserva Ἀψάρας, y el POB inglés opta por transliterarlo en vez de armonizarlo con el paralelo hebreo. En español se mantiene la misma forma para respetar la fuente principal y la tensión textual documentada.
- source_word: πολλὴν ἐπιστήμην περιεῖχεν
  english_pob_choice: had great learning
  chosen_spanish: tenía gran conocimiento
  alternatives_spanish:
  - poseía mucho saber
  - tenía gran instrucción
  lexicon: LSJ
  rationale: ἐπιστήμη puede expresar conocimiento, comprensión o saber adquirido. 'Gran conocimiento' comunica bien la competencia intelectual sin sonar artificial; 'tenía' refleja el valor de περιεῖχεν como posesión o estar dotado de algo.
- source_word: εἰς τὸ μηδὲν παραλείπειν
  english_pob_choice: so as to omit nothing
  chosen_spanish: de modo que no omitiera nada
  alternatives_spanish:
  - para no omitir nada
  - a fin de no dejar nada fuera
  lexicon: LSJ
  rationale: La construcción indica finalidad o resultado. 'No omitiera nada' preserva el matiz de παραλείπειν como omitir o dejar fuera, y encaja con el tono formal del pasaje.
- source_word: τῶν ἐκ τοῦ νόμου Κυρίου
  english_pob_choice: from the law of the Lord
  chosen_spanish: de la ley de Yahvé
  alternatives_spanish:
  - de la ley del Señor
  - de la ley de Yahvé
  lexicon: LSJ
  rationale: Aunque el inglés usa 'Lord', el proyecto pide traducir יהוה/YHWH como 'Yahvé'. Aquí el griego κύριος funciona como equivalente reverencial del nombre divino en un contexto legal bíblico, por lo que se vierte 'Yahvé' para no ocultar el nombre divino.
- source_word: καὶ ἐκ τῶν ἐντολῶν
  english_pob_choice: and from the commandments
  chosen_spanish: y de los mandamientos
  alternatives_spanish:
  - y de las órdenes
  - y de los preceptos
  lexicon: LSJ
  rationale: ἐντολαί son mandamientos en registro bíblico-jurídico. 'Mandamientos' es la opción natural y más fiel al campo semántico legal del pasaje.
- source_word: πάντα τὸν Ἰσραήλ
  english_pob_choice: all Israel
  chosen_spanish: a todo Israel
  alternatives_spanish:
  - a todo el Israel
  - a todos los israelitas
  lexicon: LSJ
  rationale: El griego está comprimido y el sentido resulta de la cláusula explicativa final. En español, 'a todo Israel' permite expresar el alcance del acto de enseñanza implícito sin forzar la sintaxis.
- source_word: δικαιώματα καὶ κρίματα
  english_pob_choice: the statutes and the judgments
  chosen_spanish: los estatutos y los juicios
  alternatives_spanish:
  - los estatutos y las sentencias
  - las ordenanzas y los juicios
  lexicon: LSJ
  rationale: Son términos legales bíblicos. 'Estatutos y juicios' conserva el registro formal y distingue estas categorías sin sustituirlas por vocabulario eclesiástico ajeno al texto.
theological_decisions:
- issue: Tratamiento del nombre divino en κύριος
  english_pob_reading: from the law of the Lord
  chosen_spanish_reading: de la ley de Yahvé
  alternative_spanish_readings:
  - de la ley del Señor
  rationale: El proyecto español establece Yahvé como forma principal para el nombre divino. Aunque el griego dice κύριος, aquí funciona como equivalente reverencial del nombre en un contexto de Escritura. Por eso se evita el sustitutivo 'Señor' como convención de ocultamiento, manteniendo la transparencia exigida por el POB.
  doctrine_reference: YHWH -> Yahvé (project terminology default)
- issue: Sintaxis comprimida del final del versículo
  english_pob_reading: teaching all Israel the statutes and the judgments
  chosen_spanish_reading: enseñando a todo Israel los estatutos y los juicios
  alternative_spanish_readings:
  - para enseñar a todo Israel los estatutos y los juicios
  - enseñando todos los estatutos y los juicios a Israel
  rationale: El griego transmite de forma comprimida el contenido legal que Apsaras impartía. La solución española explicita la relación de enseñanza, tal como hace el POB inglés, sin añadir doctrina ajena ni borrar la dificultad sintáctica del original.
  doctrine_reference: 'Translation philosophy: optimal-equivalence; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: Se siguió el anclaje principal del griego de Swete, con conciencia de la divergencia mayor respecto del paralelo hebreo/MT. También se tuvo en cuenta la revisión inglesa reciente que prefirió 'omit' y mantuvo la explicación de enseñanza final; en español se conserva esa elección semántica con un registro formal y transparente.
  spanish_consistency_notes:
  - Se mantuvo Yahvé para κύριος conforme a la terminología del proyecto.
  - Se tradujo δικαιώματα καὶ κρίματα por 'los estatutos y los juicios' para conservar el registro legal bíblico.
  - Se respetó la tensión textual entre Apsaras y el paralelo hebreo sin armonización.
  - Se optó por una solución española que explicita la enseñanza implícita en la cláusula final, sin borrar la compresión del griego.
