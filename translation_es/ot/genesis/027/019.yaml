translation:
  language: es
  text: 'Y Jacob dijo a su padre: «Yo soy Esaú, tu primogénito. He hecho como me dijiste. Levántate, por favor, siéntate y come de mi caza[b], para que tu alma[a] me bendiga».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «que tu alma me bendiga»; hebreo נֶפֶשׁ («alma/ser/persona») funciona aquí de manera idiomática para la persona.
    reason: lexical_alternative
  - marker: b
    text: O «presa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And Jacob said
  chosen_spanish: Y Jacob dijo
  alternatives_spanish:
  - Entonces Jacob dijo
  - Así dijo Jacob
  lexicon: HALOT
  rationale: La waw narrativa se expresa naturalmente en español con «Y», manteniendo la secuencia sin añadir una matización discursiva que el hebreo no exige.
- source_word: אֶל אָבִיו
  english_pob_choice: to his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su padre, Isaac
  - para su padre
  lexicon: HALOT
  rationale: Con אֶל, el sentido es direccional («a»). El posesivo español conserva la relación filial de forma clara y sobria.
- source_word: אָנֹכִי עֵשָׂו בְּכֹרֶךָ
  english_pob_choice: I am Esau your firstborn
  chosen_spanish: Yo soy Esaú, tu primogénito
  alternatives_spanish:
  - Yo soy Esaú, el primogénito tuyo
  - Yo soy Esaú, tu hijo primogénito
  lexicon: HALOT
  rationale: «Yo soy» reproduce con naturalidad la cláusula nominal; «tu primogénito» conserva la identificación apposicional. Se evita una formulación más explicativa para no debilitar la pretensión engañosa del hablante.
- source_word: עָשִׂיתִי כַּאֲשֶׁר דִּבַּרְתָּ אֵלַי
  english_pob_choice: I have done as you told me
  chosen_spanish: He hecho como me dijiste
  alternatives_spanish:
  - He hecho tal como me hablaste
  - Hice como me dijiste
  lexicon: HALOT
  rationale: «Decir» en español comunica de forma idiomática la instrucción recibida; mantiene el valor de obediencia implícita sin volverse literalista con «hablaste».
- source_word: קוּם נָא
  english_pob_choice: Please rise
  chosen_spanish: Levántate, por favor
  alternatives_spanish:
  - Por favor, levántate
  - Te ruego, levántate
  lexicon: HALOT
  rationale: El imperativo con נָא pide una entonación de súplica/cortesía. «Levántate, por favor» lo expresa de manera natural en español.
- source_word: שְׁבָה
  english_pob_choice: sit
  chosen_spanish: siéntate
  alternatives_spanish:
  - toma asiento
  - séntate
  lexicon: HALOT
  rationale: El mandato es literalmente «sentarse»; en español «siéntate» es la forma directa y normal de la acción solicitada.
- source_word: וְאָכְלָה מִצֵּידִי
  english_pob_choice: and eat from my game
  chosen_spanish: y come de mi caza
  alternatives_spanish:
  - y come de lo que he cazado
  - y come de mi presa
  lexicon: HALOT
  rationale: צַיִד puede referirse a caza/presa. «Caza» conserva la relación con la actividad de obtener alimento y evita el anglicismo semántico de «game».
- source_word: בַּעֲבוּר
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: Introduce la cláusula de propósito/resulto. «Para que» es la equivalencia más natural y fiel en español.
- source_word: תְּבָרֲכַנִּי נַפְשֶׁךָ
  english_pob_choice: your soul may bless me
  chosen_spanish: tu alma me bendiga
  alternatives_spanish:
  - tú me bendigas
  - tu ser me bendiga
  lexicon: HALOT
  rationale: Se conserva el valor literal de נֶפֶשׁ con «alma», como reflejo de la decisión inglesa de mantener explícita la expresión hebrea. En español, «alma» sigue siendo comprensible y preserva la tensión idiomática sin neutralizarla.
theological_decisions:
- issue: Interpretación de נַפְשֶׁךָ en la cláusula final
  english_pob_reading: Rendered explicitly as 'your soul may bless me' rather than omitting the phrase.
  chosen_spanish_reading: «tu alma me bendiga»
  alternative_spanish_readings:
  - «tú me bendigas»
  - «tu ser me bendiga»
  rationale: El hebreo usa נֶפֶשׁ de manera idiomática para la persona. Sin embargo, en esta escena la tradición auditada del POB decidió mantener la expresión explícita. En español, «alma» conserva esa literalidad con inteligibilidad, y la nota puede advertir el valor idiomático.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Efecto retórico de la falsa identidad de Jacob
  english_pob_reading: I am Esau your firstborn.
  chosen_spanish_reading: «Yo soy Esaú, tu primogénito.»
  alternative_spanish_readings:
  - «Soy Esaú, tu primogénito.»
  - «Yo soy Esaú, el primogénito tuyo.»
  rationale: La frase debe sonar directa y verosímil como engaño narrativo. «Tu primogénito» mantiene la fuerza de la afirmación sin suavizar la mentira ni convertirla en comentario explicativo.
  doctrine_reference: Narrative fidelity; translation philosophy §§2, 4
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más literal que conservó «your soul may bless me», pero en español se opta por una equivalencia que preserve la misma tensión lexical con «alma». También se mantiene la secuencia imperativa más literal («Levántate... siéntate») y la referencia a la caza/presa sin convertirla en una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en todo el proyecto, pero este versículo no lo contiene.
  - Se emplea «alma» para נֶפֶשׁ en correspondencia con la decisión auditada de mantener la expresión explícita, con nota idiomática.
  - «caza» traduce צֵיד de modo neutro y narrativamente claro; la nota ofrece «presa» como alternativa válida.
  - Se mantiene el registro sobrio y bíblico sin volver a formulaciones eclesiásticas más tradicionales que no son requeridas por el hebreo.
