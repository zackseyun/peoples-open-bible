  to: En cuanto a su padre[a], porque practicó extorsión, despojó a su hermano[b], e hizo lo que no era bueno entre su pueblo, he aquí[c], morirá[d] en su iniquidad.
  rationale: Se ajusta la expresión de גָּזַל גֵּזֶל אָח a un español más natural y preciso («despojó a su hermano») y se corrige la nota sobre מֵת para que conserve las alternativas aspectuales documentadas en el audit trail inglés, en lugar de repetir la traducción principal. El resto del versículo puede mantenerse tal como está por su buena fidelidad y legibilidad.
