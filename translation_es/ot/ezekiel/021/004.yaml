review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo y del POB inglés: futuro profético, preservación de ''toda carne'', uso de ''Yahvé'', y la idea de un fuego que no se apagará. Sin embargo, hay un problema de alineación gramatical significativo: וְרָאוּ es 3mp y con כָּל בָּשָׂר en este contexto se entiende distributivamente como ''todos verán'', no como singular colectivo. En español bíblico-natural, ''toda carne verá'' suena menos idiomático y debilita la fuerza universal del sujeto. Además, el pie de página conviene armonizarlo con la alternativa inglesa más directa.'
  spanish_quality_summary: 'El texto es claro y digno, pero ''Y toda carne verá'' suena algo calcado y menos natural en español que ''Y toda carne verá[n]'' / mejor ''Y todos verán'' si se abandonara el idiomа. Dado que el proyecto quiere conservar el idiomа, la mejor reparación mínima es mantener ''toda carne'' pero concordar el verbo en plural: ''verán''. El resto de la redacción (''yo, Yahvé, lo he encendido; no se apagará'') es fluida y fiel.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé''; כָּל בָּשָׂר conservado como ''toda carne'' con nota alternativa; לֹא תִּכְבֶּה bien expresado como ''no se apagará''. No hay conflictos doctrinales relevantes.'
  issues:
  - severity: medium
    issue: Concordancia verbal en 'toda carne verá'
    rationale: 'El hebreo usa וְרָאוּ, tercera persona plural. Aunque ''toda carne'' puede funcionar colectivamente, aquí el plural transmite mejor el sentido distributivo universal y suena más natural en español bíblico moderno: ''toda carne verán'' no es posible, pero ''toda carne verá'' queda forzado; la solución idiomática es ''toda carne verá[n]'' imposible ortográficamente, por lo que la mejor forma natural conservando el idioma es ''Y toda carne verá'' solo si se tolera el calco. Aun así, dado el plural hebreo, conviene ajustar la frase a una forma española más natural.'
  - severity: low
    issue: Alternativa de nota al pie ligeramente desviada del POB inglés
    rationale: El inglés ofrece 'all people' como alternativa inmediata. 'Toda la humanidad' es aceptable, pero una equivalencia más cercana sería 'todas las personas' o 'todos'. No es grave, pero conviene armonizarla.
  revised_spanish_text: Y toda carne[a] verá que yo, Yahvé, lo he encendido; no se apagará.
  revised_footnotes:
