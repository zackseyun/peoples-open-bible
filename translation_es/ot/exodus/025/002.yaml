review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo en casi todos los elementos clave: «Habla», «los hijos de Israel», «ofrenda» para תְּרוּמָה, y el modismo de impulso interior del corazón. Sin embargo, la cláusula final תִּקְחוּ אֶת תְּרוּמָתִי es 2mp dirigida a Moisés y/o a los administradores, no 3mp; por eso «tomarán mi ofrenda» desalinéa la persona verbal. Debe ser «tomarán ustedes/ustedes tomarán» o mejor una forma natural imperativa-futura como «tomarán mi ofrenda» solo si el sujeto sigue siendo ustedes, pero en español el antecedente inmediato induce lectura de «ellos». Conviene explicitar con «ustedes tomarán» o reestructurar.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos detalles de calidad: 1) la segunda oración cambia inadvertidamente el sujeto percibido; 2) la nota a usa «covenantal», anglicismo poco natural en español eclesial amplio. «Pactual» o «del pacto» suena mejor. Además, «para que tomen» es aceptable, aunque «que tomen» sería un poco más directo; no es necesario corregirlo si se mantiene el sentido.'
  glossary_alignment: 'La terminología principal está alineada con el proyecto: no aparece el nombre divino en este versículo; תְּרוּמָה → «ofrenda» está bien justificado; בְּנֵי יִשְׂרָאֵל → «los hijos de Israel» preserva la decisión documentada; el modismo del corazón se maneja de forma consistente con la auditoría inglesa. La única desalineación importante es sintáctico-personal en תִּקְחוּ.'
  issues:
  - severity: high
    issue: La forma verbal final «tomarán mi ofrenda» induce sujeto de tercera persona y no preserva el 2mp hebreo.
    rationale: 'תִּקְחוּ es segunda persona plural: «ustedes tomarán/recogerán». En el borrador, tras «De todo hombre cuyo corazón lo mueva», el lector entiende naturalmente que «tomarán» sigue refiriéndose a «ellos», no a Moisés/los receptores de la ofrenda.'
  - severity: low
    issue: La nota [a] usa «covenantal», anglicismo poco natural.
    rationale: En español neutral y eclesial amplio, «del pacto» o «pactual» comunica mejor la idea sin calcado innecesario del inglés.
  revised_spanish_text: Habla a los hijos de Israel[a], que tomen para mí una ofrenda. De todo hombre cuyo corazón lo mueva[b], ustedes tomarán mi ofrenda.
  revised_footnotes:
