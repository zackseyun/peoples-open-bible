base_translation:
  language: en
  yaml_path: translation/ot/judges/011/017.yaml
  text: Then Israel sent messengers to the king of Edom[a], saying, ‘Please let us pass through your land,’ but the king of Edom did not listen. And he also sent to the king of Moab, but he was unwilling[b], so Israel remained at Kadesh.
  footnotes:
  - marker: a
    text: Hebrew 'Please let me pass' uses a first-person singular form, with Israel speaking corporately as a single entity; some English translations render it 'let us pass.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he refused' / 'he did not consent' for 'he was unwilling.'
    reason: lexical_alternative
