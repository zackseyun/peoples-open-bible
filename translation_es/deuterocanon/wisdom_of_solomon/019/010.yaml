translation:
  language: es
  text: 'Porque todavía recordaban lo sucedido durante su estancia como extranjeros[a]: cómo, en vez del nacimiento de los animales, la tierra produjo jejenes[b], y en vez de las criaturas del agua, el río vomitó una multitud de ranas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «su condición de forasteros» o «su residencia como extranjeros». El griego παροικία se refiere a vivir en un lugar como extranjero.
    reason: lexical_alternative
  - marker: b
    text: El insecto exacto denotado por el griego puede entenderse de manera más amplia que «jejenes»; también se sugieren «mosquitos» u otros insectos pequeños que pican.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμέμνηντο
  english_pob_choice: they still remembered
  chosen_spanish: todavía recordaban
  alternatives_spanish:
  - seguían recordando
  - aún tenían presente
  lexicon: LSJ
  rationale: El imperfecto con ἔτι expresa memoria continua; «todavía recordaban» conserva esa continuidad sin sonar forzado en español.
- source_word: παροικίᾳ
  english_pob_choice: during their sojourn
  chosen_spanish: peregrinación
  alternatives_spanish:
  - sojourn
  - residencia como extranjeros
  - estancia como forasteros
  lexicon: LSJ
  rationale: παροικία tiene el sentido de vivir como forasteros o residentes temporales. «Peregrinación» comunica bien la condición de residencia no propia en español eclesial; se evita «exilio» porque sería más fuerte de lo que pide el término.
- source_word: γενέσεως ζῴων
  english_pob_choice: the birth of animals
  chosen_spanish: el nacimiento de los animales
  alternatives_spanish:
  - la generación de los animales
  - la producción de los animales
  lexicon: LSJ
  rationale: γενέσεως aquí contrasta con la producción extraordinaria de plagas; «nacimiento» sigue de cerca la elección inglesa y conserva la idea de la generación ordinaria de animales.
- source_word: ἐξήγαγεν
  english_pob_choice: brought forth
  chosen_spanish: produjo
  alternatives_spanish:
  - sacó
  - hizo salir
  - trajo
  lexicon: LSJ
  rationale: Aplicado a la tierra, el verbo expresa que de ella salieron estas criaturas. «Produjo» es natural en español y mantiene la idea de emanación desde la tierra.
- source_word: σκνῖπα
  english_pob_choice: gnats
  chosen_spanish: jejenes
  alternatives_spanish:
  - mosquitos
  - mosquitas
  - jejenes o mosquitos pequeños
  lexicon: LSJ
  rationale: El insecto exacto no es seguro; como el inglés anota cierta amplitud semántica, «jejenes» ofrece un pequeño insecto picador y mantiene la cautela taxonómica mejor que un término más específico.
- source_word: ἐνύδρων
  english_pob_choice: water creatures
  chosen_spanish: las criaturas del agua
  alternatives_spanish:
  - los animales acuáticos
  - las criaturas acuáticas
  lexicon: LSJ
  rationale: La forma griega se refiere a seres que viven en el agua. «Las criaturas del agua» reproduce el sentido de modo claro y conserva el paralelismo con el hemistiquio anterior.
- source_word: ἐξηρεύξατο
  english_pob_choice: spewed out
  chosen_spanish: vomitó
  alternatives_spanish:
  - arrojó
  - expulsó
  - brotó
  lexicon: LSJ
  rationale: El verbo es vívido y fuerte; «vomitó» preserva esa aspereza imagística mejor que un verbo neutral como «produjo».
- source_word: πλῆθος βατράχων
  english_pob_choice: a multitude of frogs
  chosen_spanish: una multitud de ranas
  alternatives_spanish:
  - una gran cantidad de ranas
  - muchas ranas
  - una muchedumbre de ranas
  lexicon: LSJ
  rationale: πλῆθος expresa gran número; «multitud» es directo, elevado y paralelo al original.
theological_decisions:
- issue: Sentido de παροικία como residencia extranjera
  english_pob_reading: during their sojourn
  chosen_spanish_reading: peregrinación
  alternative_spanish_readings:
  - estancia como extranjeros
  - sojornación
  - residencia como forasteros
  rationale: El texto mira retrospectivamente a Israel en Egipto como pueblo que habita fuera de su patria. «Peregrinación» transmite esa condición sin añadir la carga histórica-teológica de «exilio».
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve source force without over-interpreting'
- issue: Fuerza retórica del verbo para el río
  english_pob_reading: the river spewed out a multitude of frogs
  chosen_spanish_reading: el río vomitó una multitud de ranas
  alternative_spanish_readings:
  - el río arrojó una multitud de ranas
  - el río expulsó una multitud de ranas
  - el río brotó con una multitud de ranas
  rationale: La imagen del griego es deliberadamente intensa. «Vomitó» conserva el tono violento y no diluye la fuerza del verbo.
  doctrine_reference: 'DOCTRINE.md: preserve source meaning; readable modern Spanish'
translation_notes:
  revision_awareness: 'Se incorporó la advertencia de validación anterior: el marcador [a] aparece ahora exactamente en el texto principal. La nota se ancla en «su [a] peregrinación» para que la alternativa léxica quede respaldada. También se mantuvo la cautela sobre σκνῖπα como insecto no identificado con total precisión.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma del proyecto solo cuando aparezca el nombre divino; en este versículo no aplica.
  - «Jejenes» evita una identificación demasiado precisa del insecto y sigue la cautela del aparato inglés.
  - Se mantuvo el paralelismo sintáctico de dos miembros con «en vez de... y en vez de...» para reflejar el griego.
  - «Las criaturas del agua» conserva el sustantivo plural y la amplitud semántica del original.
