translation:
  language: es
  text: Y mientras vaciaban sus sacos, he aquí, el atado de plata de cada uno estaba en su saco[a]; y vieron sus atados de plata, ellos y su padre, y tuvieron miedo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bolsa de dinero» para «atado de plata». El término hebreo se refiere a algo atado o envuelto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció que
  alternatives_spanish:
  - Y sucedió que
  - Y fue así que
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce un nuevo giro en la historia. «Aconteció que» conserva ese valor introductorio sin sonar excesivamente arcaico.
- source_word: מְרִיקִים
  english_pob_choice: emptying
  chosen_spanish: vaciaban
  alternatives_spanish:
  - estaban vaciando
  - desocupaban
  lexicon: HALOT
  rationale: El participio expresa la acción en curso de sacar el contenido de los sacos. «Vaciaban» es natural en español y mantiene la imagen de vaciar el saco.
- source_word: שַׂקֵּיהֶם
  english_pob_choice: their sacks
  chosen_spanish: sus costales
  alternatives_spanish:
  - sus sacos
  - sus bolsas
  lexicon: HALOT
  rationale: Se eligió «costales» porque en español latinoamericano comunica bien un saco de carga y evita una posible asociación moderna de «saco» con ropa. El término sigue siendo fiel al objeto referido.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - miren
  lexicon: HALOT
  rationale: La partícula marca sorpresa y descubrimiento repentino. «He aquí» preserva esa fuerza narrativa de manera breve y reconocible en español bíblico moderno.
- source_word: אִישׁ צְרוֹר כַּסְפּוֹ
  english_pob_choice: each man’s bundle of silver
  chosen_spanish: el atado de plata de cada uno
  alternatives_spanish:
  - la bolsa de dinero de cada uno
  - el bulto de plata de cada uno
  lexicon: HALOT
  rationale: צְרוֹר designa algo atado o envuelto; por eso «atado» conserva la idea central mejor que «bolsa». «Plata» sigue el valor monetario del hebreo כֶּסֶף sin suavizarlo a «dinero».
- source_word: בְּשַׂקּוֹ
  english_pob_choice: in his sack
  chosen_spanish: en el costal
  alternatives_spanish:
  - dentro de su costal
  - en su saco
  lexicon: HALOT
  rationale: La construcción distributiva ya está clara por «de cada uno», así que «en el costal» fluye bien en español y evita repetir pronombres innecesariamente; el contexto mantiene la referencia singular.
- source_word: צְרֹרוֹת כַּסְפֵּיהֶם
  english_pob_choice: their bundles of silver
  chosen_spanish: sus atados de plata
  alternatives_spanish:
  - sus fardos de plata
  - sus bolsas de plata
  lexicon: HALOT
  rationale: Se conserva la repetición del sustantivo para reflejar el hebreo y mantener la concreción material del hallazgo. «Atados» corresponde a צְרוֹר y evita una abstracción como «su dinero».
- source_word: הֵמָּה וַאֲבִיהֶם
  english_pob_choice: they and their father
  chosen_spanish: ellos y su padre
  alternatives_spanish:
  - ellos junto con su padre
  - tanto ellos como su padre
  lexicon: HALOT
  rationale: La frase enfatiza quiénes vieron el hallazgo y reaccionaron. «Ellos y su padre» conserva la estructura del hebreo con claridad natural en español.
- source_word: וַיִּירָאוּ
  english_pob_choice: and they were afraid
  chosen_spanish: y tuvieron miedo
  alternatives_spanish:
  - y temieron
  - y se asustaron
  lexicon: HALOT
  rationale: El verbo ירא expresa miedo real ante la situación. «Tuvieron miedo» es idiomático y directo, y mantiene el impacto emocional sin suavizarlo.
translation_notes:
  revision_awareness: El inglés auditado fue revisado para evitar una calca incómoda en la apertura; por eso la estructura se vertió en español con una subordinada temporal natural («mientras vaciaban») y la partícula de sorpresa («he aquí») se mantuvo como marcador narrativo separado. No hay cambios textuales posteriores que afecten el sentido de esta línea.
  spanish_consistency_notes:
  - Se mantuvo «plata» para כֶּסֶף conforme al valor monetario del hebreo, en lugar de neutralizarlo como «dinero».
  - 'Se preservó la repetición de la imagen material del texto: «atado(s) de plata», en vez de convertirla en un término abstracto.'
  - 'El tono es bíblico moderno: digno, claro y sin arcaísmos innecesarios.'
