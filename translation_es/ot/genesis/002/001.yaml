- from: Así fueron terminados[a] los cielos y la tierra, y todo su ejército[b].
  to: Así fueron terminados[a] los cielos y la tierra, y todas sus huestes[b].
  rationale: Se reemplaza «todo su ejército» por «todas sus huestes» para preservar mejor el sentido de צְבָאָם en contexto cosmológico, alinearse con la revisión auditada del inglés («hosts»), y mejorar la naturalidad y precisión en español sin perder la imagen léxica tradicional.
