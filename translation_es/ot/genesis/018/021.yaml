translation:
  language: es
  text: Bajaré ahora y veré si han obrado por completo conforme a su clamor que ha llegado hasta mí[a]; y, si no[b], sabré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si han hecho completamente conforme al clamor que ha llegado hasta mí». El modismo hebreo con «hacer» y «completitud» expresa si la maldad reportada corresponde por completo al clamor.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «si han obrado por completo conforme a».'
    reason: previous_rendering
lexical_decisions:
- source_word: אֵרֲדָה
  english_pob_choice: I will go down
  chosen_spanish: Descenderé
  alternatives_spanish:
  - Bajaré
  - Iré a descender
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención resoluta; «descenderé» conserva el movimiento hacia abajo y el tono volitivo sin volver la frase pesada en español.
- source_word: נָּא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - pues
  - por favor
  lexicon: HALOT
  rationale: Aquí funciona como marcador de inmediatez con la cohortativa. «Ahora» mantiene ese matiz mejor que «por favor», que sonaría a ruego dirigido a otro.
- source_word: וְאֶרְאֶה
  english_pob_choice: and see
  chosen_spanish: y veré
  alternatives_spanish:
  - y examinaré
  - y miraré
  lexicon: HALOT
  rationale: «Ver» conserva el hebraísmo y el valor de constatar o verificar sin explicitar más de lo que el texto dice.
- source_word: הַכְּצַעֲקָתָהּ
  english_pob_choice: its outcry
  chosen_spanish: su clamor
  alternatives_spanish:
  - su grito
  - el clamor contra ella
  lexicon: HALOT
  rationale: צעקה es un clamor o grito de aflicción/injusticia; «clamor» reproduce bien esa fuerza. El sufijo femenino se refleja con «su» referido a la ciudad/territorio implícito.
- source_word: הַבָּאָה אֵלַי
  english_pob_choice: that has come to me
  chosen_spanish: que ha llegado hasta mí
  alternatives_spanish:
  - que ha venido a mí
  - que me ha alcanzado
  lexicon: HALOT
  rationale: El participio hebreo modifica «clamor» con una cláusula relativa. «Ha llegado hasta mí» comunica el alcance del clamor sin forzar más la imagen.
- source_word: עָשׂוּ כָּלָה
  english_pob_choice: they have done altogether according to
  chosen_spanish: han hecho totalmente conforme a
  alternatives_spanish:
  - han actuado completamente conforme a
  - han hecho por completo
  lexicon: HALOT
  rationale: 'Se preserva la estructura idiomática difícil del hebreo: עשׂו + כָּלָה con valor de plenitud/completitud en relación con el clamor. «Totalmente conforme a» mantiene la correspondencia sin resolver la tensión interpretativa.'
- source_word: וְאִם לֹא
  english_pob_choice: and if not
  chosen_spanish: y si no
  alternatives_spanish:
  - pero si no
  - si no
  lexicon: HALOT
  rationale: La construcción condicional se expresa de forma directa y natural, manteniendo la relación adversativa implícita.
- source_word: אֵדָעָה
  english_pob_choice: I will know
  chosen_spanish: sabré
  alternatives_spanish:
  - conoceré
  - me daré cuenta
  lexicon: HALOT
  rationale: ידע aquí es conocer/averiguar. «Sabré» es la forma más natural y sobria en español, sin convertirlo en una explicación interpretativa.
theological_decisions:
- issue: Antropomorfismo divino de ir, ver y saber
  english_pob_reading: Retain the language of God 'going down' and 'seeing' without paraphrasing it into mere omniscient awareness.
  chosen_spanish_reading: Conservar el lenguaje de Dios que desciende, ve y sabe, sin convertirlo en una paráfrasis doctrinal.
  alternative_spanish_readings:
  - Examinaré la situación
  - Investigaré y juzgaré
  rationale: El hebreo presenta una expresión antropomórfica deliberada. La traducción debe preservar esa tensión narrativa en vez de resolverla por explicación.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió mantener la fuerza del modismo hebreo con una redacción más natural. La versión española conserva esa misma tensión idiomática con «han hecho totalmente conforme a», evitando suavizar el pasaje en una explicación interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el tetragrámaton está explícito; aquí no aparece.
  - Se evitó «Señor» por no corresponder a este versículo.
  - «Sabré» conserva el valor de ידע sin añadir una glosa.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal y corresponden a las notas adjuntas.
