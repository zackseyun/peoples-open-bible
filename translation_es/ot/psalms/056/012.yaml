translation:
  language: es
  text: En Dios he confiado; no temeré[a]. ¿Qué puede hacerme el hombre?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué puede hacerme un ser humano?» El hebreo tiene אָדָם en singular, usado aquí de manera representativa para un ser humano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאלֹהִים
  english_pob_choice: In God
  chosen_spanish: En Yahvé
  alternatives_spanish:
  - En Dios
  - En el Dios
  lexicon: HALOT
  rationale: El hebreo usa ב + אֱלֹהִים en una fórmula de confianza dirigida al Dios de Israel. Siguiendo el criterio del proyecto, se preserva el nombre divino explícito como «Yahvé» en lugar de una máscara reverencial. «En Yahvé» comunica la esfera/objeto de la confianza de manera natural en español.
- source_word: בָּטַחְתִּי
  english_pob_choice: I have trusted
  chosen_spanish: he confiado
  alternatives_spanish:
  - confío
  - he puesto mi confianza
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una confianza establecida. En español, «he confiado» conserva bien ese valor perfecto sin sonar forzado. «Confío» sería posible como presente gnómico, pero suaviza el matiz aspectual del hebreo.
- source_word: לֹא אִירָא
  english_pob_choice: I will not fear
  chosen_spanish: no temeré
  alternatives_spanish:
  - no tengo miedo
  - no temeré nunca
  lexicon: HALOT
  rationale: El imperfecto con לֹא en este contexto transmite resolución o consecuencia confiada. «No temeré» reproduce mejor esa fuerza volitiva que un presente simple como «no temo».
- source_word: מַה
  english_pob_choice: What can
  chosen_spanish: ¿Qué puede
  alternatives_spanish:
  - ¿Qué hará
  - ¿Qué
  lexicon: HALOT
  rationale: El valor retórico del hebreo pide una formulación española natural que conserve la idea modal implícita. «¿Qué puede...?» refleja la pregunta desafiante sin añadir más interpretación de la necesaria.
- source_word: יַּעֲשֶׂה
  english_pob_choice: do
  chosen_spanish: hacerme
  alternatives_spanish:
  - hacer
  - hacer contra mí
  lexicon: HALOT
  rationale: עָשָׂה con לִי se expresa en español de modo natural como «hacerme» dentro de la pregunta retórica. Se mantiene el verbo básico «hacer» sin sobrecargarlo con una paráfrasis.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un ser humano
  - un hombre
  lexicon: HALOT
  rationale: El hebreo usa אָדָם en singular y de manera representativa para cualquier adversario humano. «El hombre» conserva la singularidad y la fuerza contrastiva frente a Dios, como en la decisión inglesa por «man».
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - contra mí
  - para mí
  lexicon: HALOT
  rationale: 'Con «hacer» en español, el dativo לִי se expresa de forma idiomática como objeto indirecto: «hacerme». Esto mantiene la relación básica del hebreo sin introducir una lectura más restrictiva como «contra mí».'
theological_decisions:
- issue: Nombre divino en la fórmula de confianza
  english_pob_reading: In God
  chosen_spanish_reading: En Yahvé
  alternative_spanish_readings:
  - En Dios
  rationale: El texto hebreo contiene אֱלֹהִים dentro de una declaración de confianza, pero el marco del proyecto exige no enmascarar el nombre divino cuando el contexto lo identifica. «Yahvé» hace explícita la referencia al Dios del pacto sin perder el sentido de la fórmula.
  doctrine_reference: 'Project terminology default: יהוה / YHWH -> Yahvé'
- issue: אָדָם como singular representativo
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - un ser humano
  - la humanidad
  rationale: La línea contrasta la confianza en Dios con la incapacidad de cualquier opositor humano. «El hombre» preserva el singular hebreo y su valor representativo, evitando convertirlo en un plural abstracto.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; contested אָדָם in representative singular'
translation_notes:
  revision_awareness: El material revisado muestra acuerdo alto y no requiere cambios sustantivos; la presente redacción sigue de cerca el hebreo, preserva el paralelismo de confianza y mantiene la alternativa representativa de אָדָם en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de acuerdo con la terminología del proyecto para el nombre divino.
  - Se conserva el paralelismo breve y retórico del verso con un orden natural en español.
  - «El hombre» mantiene el singular representativo sin introducir lenguaje colectivo que no está en el hebreo.
  - La nota al pie ofrece la alternativa «ser humano» como equivalente español de la nota inglesa sobre אָדָם.
