translation:
  language: es
  text: Pues vayan ahora a mi lugar, que estaba en Silo[a], donde hice habitar mi nombre al principio, y vean lo que le hice a causa de la maldad de mi pueblo, Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «donde hice morar mi nombre» o, más tradicionalmente, «donde puse mi nombre». El hebreo conserva la imagen de que el nombre de Dios moraba allí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento del llamado anterior; 'Porque' preserva bien el valor causal del hebreo en español natural.
- source_word: לְכוּ נָא
  english_pob_choice: go now
  chosen_spanish: vayan ahora
  alternatives_spanish:
  - vayan, por favor
  - vayan ya
  lexicon: HALOT
  rationale: El plural imperativo con נָא expresa apremio; 'ahora' comunica urgencia mejor que una mera cortesía en español.
- source_word: מְקוֹמִי
  english_pob_choice: my place
  chosen_spanish: mi lugar
  alternatives_spanish:
  - mi sitio
  - el lugar que me pertenece
  lexicon: HALOT
  rationale: '''Lugar'' es el equivalente más directo y natural para מָקוֹם en este contexto de santuario asociado con Yahvé.'
- source_word: אֲשֶׁר בְּשִׁלוֹ
  english_pob_choice: that was in Shiloh
  chosen_spanish: el que estaba en Silo
  alternatives_spanish:
  - que estaba en Silo
  - el que está en Silo
  lexicon: HALOT
  rationale: La cláusula relativa identifica retrospectivamente el antiguo santuario; el pasado ayuda a reflejar el argumento histórico del pasaje.
- source_word: שִׁכַּנְתִּי שְׁמִי שָׁם
  english_pob_choice: where I made my name dwell
  chosen_spanish: donde hice habitar mi nombre allí
  alternatives_spanish:
  - donde hice morar mi nombre allí
  - donde puse mi nombre
  lexicon: HALOT
  rationale: '''Hice habitar'' conserva la metáfora verbal de שכן y evita reducirla a una fórmula más plana como ''puse mi nombre''. Se mantiene ''allí'' para reproducir el énfasis locativo del hebreo, aunque su duplicación es estilísticamente marcada.'
- source_word: בָּרִאשׁוֹנָה
  english_pob_choice: at first
  chosen_spanish: al principio
  alternatives_spanish:
  - primeramente
  - antes
  lexicon: HALOT
  rationale: Expresa con naturalidad que Silo fue el lugar anterior de elección/uso sagrado.
- source_word: וּרְאוּ
  english_pob_choice: and see
  chosen_spanish: y vean
  alternatives_spanish:
  - y miren
  - y observen
  lexicon: HALOT
  rationale: Imperativo de invitación a considerar la evidencia histórica; 'vean' es claro y sobrio.
- source_word: אֵת אֲשֶׁר עָשִׂיתִי לוֹ
  english_pob_choice: what I did to it
  chosen_spanish: lo que hice con él
  alternatives_spanish:
  - lo que hice a ello
  - lo que le hice
  lexicon: HALOT
  rationale: El pronombre puede referirse al lugar/santuario de Silo; en español 'él' evita el neutro no disponible y mantiene la referencia al sitio como entidad gramatical.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  lexicon: HALOT
  rationale: Marca con precisión la relación causal del juicio.
- source_word: רָעַת עַמִּי יִשְׂרָאֵל
  english_pob_choice: the evil of my people Israel
  chosen_spanish: la maldad de mi pueblo Israel
  alternatives_spanish:
  - la maldad de mi pueblo, Israel
  - la malicia de mi pueblo Israel
  lexicon: HALOT
  rationale: '''Maldad'' preserva el juicio moral de רָעָה en este contexto, sin suavizarlo a ''calamidad''. ''Pueblo Israel'' sigue el genitivo hebreo de cercanía sin añadir interpretación.'
theological_decisions:
- issue: Lenguaje de la presencia divina en שִׁכַּנְתִּי שְׁמִי שָׁם
  english_pob_reading: where I made my name dwell
  chosen_spanish_reading: donde hice habitar mi nombre allí
  alternative_spanish_readings:
  - donde hice morar mi nombre
  - donde puse mi nombre
  rationale: La expresión conserva la imagen bíblica de la presencia vinculada al nombre de Yahvé sin localizar de modo craso su esencia. Se mantiene el verbo dinámico 'habitar' para reflejar el hebreo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referencia histórica a Silo como santuario anterior
  english_pob_reading: that was in Shiloh
  chosen_spanish_reading: el que estaba en Silo
  alternative_spanish_readings:
  - que estaba en Silo
  - el que fue en Silo
  rationale: 'El pasado sostiene el argumento profético: Silo sirve como ejemplo histórico de juicio sobre un lugar antes favorecido.'
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto inglés auditado mantiene sin cambios su lectura óptima-equivalente; la versión española sigue el mismo perfil, conservando la metáfora de 'habitar mi nombre' y la referencia histórica a Silo sin suavizar la carga moral de 'ra'ah'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en el proyecto, pero en este versículo el nombre divino no aparece explícitamente en el hebreo ni en el texto base español, por lo que no se introduce.
  - '''Silo'' sigue la forma española común del topónimo bíblico.'
  - Se evita 'SEÑOR' como sustituto del nombre divino; no es necesario aquí.
  - Se conserva el tono exhortativo y la relación causal del hebreo sin expandir el sentido.
