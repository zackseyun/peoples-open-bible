translation:
  language: es
  text: Hijo mío[a], dame tu corazón, y que tus ojos se deleiten en mis caminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «que tus ojos observen mis caminos». El verbo hebreo puede incluir atención cuidadosa, pero aquí probablemente abarca también aprobación gozosa y aceptación del estilo de vida del padre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנָה
  english_pob_choice: give
  chosen_spanish: dame
  alternatives_spanish:
  - da
  - entrégame
  lexicon: HALOT
  rationale: El imperativo de נתן pide una orden directa. En español, "dame" conserva la fuerza inmediata y natural del mandato, sin volverlo más débil o más formal de lo necesario.
- source_word: בְנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Mi hijo
  - Hijo
  lexicon: HALOT
  rationale: La vocación hebrea masculina singular se preserva con una apelación afectuosa y natural en español. "Hijo mío" comunica cercanía paternal sin perder el matiz de dirección personal.
- source_word: לִבְּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu ser interior
  lexicon: HALOT
  rationale: '"Corazón" conserva el valor hebreo del centro interior de la persona: voluntad, afectos y decisiones. Mantiene la metáfora sin explicarla de forma excesiva.'
- source_word: לִי
  english_pob_choice: me
  chosen_spanish: dame...
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: El dativo se expresa de forma natural en el verbo español "dame", evitando una construcción más pesada como "da tu corazón a mí".
- source_word: וְעֵינֶיךָ
  english_pob_choice: and let your eyes
  chosen_spanish: y que tus ojos
  alternatives_spanish:
  - y tus ojos
  - y puedan tus ojos
  lexicon: HALOT
  rationale: El hebreo introduce una segunda cláusula con matiz volitivo/jusivo. "Y que tus ojos" reproduce ese valor en un español claro y digno.
- source_word: דְּרָכַי
  english_pob_choice: my ways
  chosen_spanish: mis caminos
  alternatives_spanish:
  - mis sendas
  - mis modos de vida
  lexicon: HALOT
  rationale: '"Caminos" es la equivalencia más natural para דרך en lenguaje sapiencial. Conserva la imagen de conducta y estilo de vida sin desplazarse a una paráfrasis.'
- source_word: תרצנה
  english_pob_choice: delight in
  chosen_spanish: se deleiten en
  alternatives_spanish:
  - observen
  - se complazcan en
  - se fijen con agrado en
  lexicon: HALOT
  rationale: El verbo puede admitir un sentido de atención favorable u observancia. En este contexto sapiencial, la lectura que incluye agrado y aceptación queda mejor reflejada por "se deleiten en", sin excluir la idea de atención.
translation_notes:
  revision_awareness: No se requirieron cambios respecto del último pase auditado; la propuesta mantiene la alta concordancia con la revisión fuente y conserva la alternativa lexical señalada por el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene "Hijo mío" como vocativo afectuoso y masculino, coherente con el hebreo.
  - '"Corazón" conserva el sentido bíblico de centro interior personal, no solo emoción.'
  - '"Mis caminos" preserva la metáfora sapiencial de conducta o modo de vida.'
  - La nota al pie recoge la alternativa semántica importante para תרצנה, sin borrar la lectura preferida de deleite/aceptación.
