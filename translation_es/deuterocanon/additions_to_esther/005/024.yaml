review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido global del griego: la totalidad distributiva de «toda ciudad o región», la referencia a obedecer el mandato, el instrumento «lanza», la destrucción por fuego, la genericidad de «los hombres» y la duración prolongada. Sin embargo, varias elecciones españolas atenúan o vuelven menos precisos matices clave del original y del POB inglés: ἄβατος se acerca mejor a «intransitable/impasable» que a «inaccesible»; μετʼ ὀργῆς suena poco natural como «en ira» en este contexto; y «la más odiosa para los animales salvajes y las aves» resulta torpe y semánticamente menos claro que una formulación con «detestable» u «odiada».'
  spanish_quality_summary: 'El español es generalmente comprensible y digno, pero contiene giros poco naturales: «en ira[a]», «por todo el tiempo» y sobre todo «será hecha, por todo el tiempo, la más odiosa para los animales salvajes y las aves». La oración final necesita fluidez y ajuste idiomático sin perder el superlativo ni la fuerza judicial del original. «Intransitable» funciona mejor que «inaccesible» para un lugar devastado. También conviene armonizar la nota [a] con el texto principal: si el texto dice «con lanza y fuego», la alternativa debe ser «por lanza y fuego», no repetir lo mismo.'
  glossary_alignment: No hay conflictos con la terminología de proyecto principal. «Lanza» respeta la decisión sobre δόρατι, y «los hombres» preserva el masculino genérico documentado para ἀνθρώποις. No hay términos divinos o cristológicos aquí. Los ajustes propuestos son léxicos y estilísticos, no doctrinales.
  issues:
  - severity: medium
    issue: «inaccesible» no refleja tan bien ἄβατος como «intransitable» o «impasable».
    rationale: El griego describe algo que no puede recorrerse o atravesarse; «inaccesible» puede sugerir simplemente difícil de alcanzar, no necesariamente impracticable para el paso.
  - severity: medium
    issue: «en ira[a]» es poco natural en español para μετʼ ὀργῆς.
    rationale: Aunque formalmente cercano, suena forzado. «con ira» o «con furor» expresa mejor el acompañamiento/modo de la destrucción en español bíblico moderno.
  - severity: high
    issue: La cláusula final «será hecha, por todo el tiempo, la más odiosa para los animales salvajes y las aves» es torpe y semánticamente inestable.
    rationale: «La más odiosa para...» suena poco idiomático en español y debilita la maldición. Conviene reformular como «quedará hecha... detestable aun para...» o similar, preservando el superlativo ἔχθιστος y la amplitud temporal.
  - severity: low
    issue: La nota [a] no ofrece una alternativa real al texto principal.
    rationale: El texto principal ya dice «con lanza y fuego»; la nota debe ofrecer la variante instrumental «por lanza y fuego» o explicar «espada» como generalización tradicional.
  - severity: low
    issue: «por todo el tiempo» es demasiado literal y poco natural.
    rationale: «Para siempre» sobreinterpreta un poco; «por todo tiempo» o «por todo tiempo venidero» suena más natural y conserva solemnidad.
  revised_spanish_text: Pero toda ciudad o región en su totalidad que no obre conforme a estas órdenes será consumida con lanza y fuego, con ira[a]; no solo quedará intransitable para los hombres[b], sino que también será hecha sumamente detestable, aun para los animales salvajes y las aves, por todo tiempo.
  revised_footnotes:
  - marker: a
    text: O «por lanza y fuego». El griego δόρατι significa literalmente «lanza»; algunas traducciones lo generalizan a «espada».
    reason: lexical_alternative
  - marker: b
    text: «Los hombres» traduce un plural masculino usado de modo genérico para los seres humanos.
    reason: lexical_alternative
  revision_rationale: 'Se revisa para mejorar fidelidad y naturalidad del español sin apartarse del griego ni del audit trail inglés: «intransitable» refleja mejor ἄβατος; «con ira» expresa de forma idiomática μετʼ ὀργῆς; y la cláusula final se reordena para preservar el pasivo resultativo y la fuerza superlativa de ἔχθιστος κατασταθήσεται. También se corrige la nota [a] para que realmente presente una alternativa distinta del texto principal.'
