  from: of the heart that is within me—
  to: of the heart, existing within me—
  rationale: In Coptic, the relative clause ⲉⲥϣⲟⲟⲡ ('which exists') uses the feminine
    singular prefix ⲉⲥ-, meaning it must modify the feminine nouns ϩⲟⲣⲁⲥⲓⲥ (vision)
    or ⲧⲉⲅⲕⲣⲁⲧⲓⲁ (self-control). It cannot modify ⲡϩⲏⲧ (the heart), which is masculine
    and would require ⲉϥϣⲟⲟⲡ. The current English grammatically attaches the relative
    clause to 'heart', losing the author's syntactic link. Using 'existing within
    me' (or 'which exist within me') restores the correct modification to the preceding
    feminine nouns.
