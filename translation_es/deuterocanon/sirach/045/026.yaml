    issue: La nota textual está anclada a «Yahvé» en lugar de al enunciado completo.
    rationale: La nota [a] explica que el hebreo entero difiere sustancialmente del griego; no es una nota específica sobre el nombre divino. El marcador debe colocarse al final de la cláusula o frase relevante.
