    issue: «un líder» suena algo moderno y menos idiomático en una lista administrativa bíblica.
    rationale: Aunque fiel al inglés POB, para נָשִׂיא en este contexto «jefe» resulta más natural en español bíblico contemporáneo y mantiene el sentido de representante tribal sin connotaciones monárquicas.
  - severity: low
    issue: 'La puntuación «un líder: Kemuel, hijo de Shiphtan» está demasiado calcada del inglés.'
    rationale: En español fluye mejor «el jefe es Kemuel hijo de Shiphtan» o una estructura equivalente sin coma entre nombre y patronímico.
