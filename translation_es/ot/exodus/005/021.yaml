translation:
  language: es
  text: 'Y les dijeron: «Que Yahvé los mire y juzgue, porque ustedes nos han hecho apestar[a] ante los ojos de Faraón y ante los ojos de sus siervos, al poner una espada en sus manos para matarnos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «han hecho apestar nuestro olor», es decir, «nos han vuelto repulsivos» o «han hecho que parezcamos fétidos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y ellos les dijeron
  alternatives_spanish:
  - Entonces les dijeron
  lexicon: HALOT
  rationale: La forma narrativa hebrea se conserva de manera natural con «Y ellos les dijeron». Mantiene el flujo del relato sin añadir una relación temporal más fuerte de la que exige el hebreo.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a Moisés y a Aarón
  lexicon: HALOT
  rationale: El hebreo usa solo el pronombre. En español, el dativo «les» comunica la referencia sin suplir los nombres en el texto principal.
- source_word: יֵרֶא יְהוָה עֲלֵיכֶם
  english_pob_choice: May Yahweh look on you
  chosen_spanish: Que Yahvé los mire
  alternatives_spanish:
  - Que Yahvé los vea
  - Yahvé los mirará
  lexicon: HALOT
  rationale: El imperfecto tiene valor jussivo en esta imprecación. «Mire» preserva la idea de atención/observación divina. Se usa «Yahvé» por la norma del proyecto para יהוה.
- source_word: וְיִשְׁפֹּט
  english_pob_choice: and judge
  chosen_spanish: y juzgue
  alternatives_spanish:
  - y haga justicia
  - y dicte juicio
  lexicon: HALOT
  rationale: «Juzgue» reproduce la petición de adjudicación divina en paralelo con «mire». En español mantiene el alcance general del verbo sin estrecharlo indebidamente.
- source_word: הִבְאַשְׁתֶּם אֶת רֵיחֵנוּ
  english_pob_choice: have made us stink
  chosen_spanish: nos han hecho apestar
  alternatives_spanish:
  - nos han vuelto repulsivos
  - han hecho malo nuestro olor
  lexicon: HALOT
  rationale: El hebreo conserva una metáfora corporal muy vívida. «Apestar» recoge esa fuerza mejor que una paráfrasis suavizada como «volver repulsivos». La construcción con «nos» refleja el valor idiomático de «nuestro olor» sin volverla torpe en español.
- source_word: בְּעֵינֵי פַרְעֹה וּבְעֵינֵי עֲבָדָיו
  english_pob_choice: in the sight of Pharaoh and in the sight of his servants
  chosen_spanish: en los ojos de Faraón y en los ojos de sus siervos
  alternatives_spanish:
  - ante Faraón y ante sus siervos
  - a la vista de Faraón y a la vista de sus siervos
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de evaluación percibida. «En los ojos de» suena natural en español bíblico y mantiene la imagen del texto fuente; «a la vista de» sería una alternativa más idiomática pero menos literal.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus esclavos
  - sus servidores
  lexicon: HALOT
  rationale: «Siervos» es el término más amplio y convencional para el entorno cortesano de Faraón en español. Aunque la raíz puede admitir «esclavos», aquí el contexto administrativo/cortesano favorece «siervos».
- source_word: לָתֵת חֶרֶב בְּיָדָם
  english_pob_choice: putting a sword in their hand
  chosen_spanish: al poner una espada en sus manos
  alternatives_spanish:
  - al darles una espada
  - al entregar una espada en sus manos
  lexicon: HALOT
  rationale: La imagen de armar a otros para matar se conserva con «poner una espada en sus manos». El singular «espada» sigue el singular colectivo del hebreo y el dativo plural refleja el sujeto implícito del contexto.
- source_word: לְהָרְגֵנוּ
  english_pob_choice: to kill us
  chosen_spanish: para matarnos
  alternatives_spanish:
  - para matarnos a nosotros
  - para asesinarnos
  lexicon: HALOT
  rationale: «Matar» es claro y directo en español moderno; no añade intensidad que el hebreo no obligue a poner en el texto principal.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: Se sigue la norma del proyecto para preservar el nombre propio divino en español. «Yahvé» mantiene la distinción entre el nombre personal de Dios y un título, y evita la sustitución litúrgica «Señor» que enmascara el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de la imprecación en «Que Yahvé los mire y juzgue»
  english_pob_reading: May Yahweh look on you and judge
  chosen_spanish_reading: Que Yahvé los mire y juzgue
  alternative_spanish_readings:
  - Que Yahvé los vea y los juzgue
  - Yahvé los mire y los juzgue
  rationale: El hebreo usa un jussivo con sentido de invocación/imprecación. La forma con «Que» reproduce bien esa fuerza exhortativa sin convertirla en simple futuro ni en una oración menos directa.
  doctrine_reference: Uso aspectual y modal del imperfecto jussivo en hebreo bíblico
translation_notes:
  revision_awareness: 'El audit trail inglés mantuvo la metáfora de «stink» y corrigió la ubicación idiomática de «in the sight of» para conservar naturalidad formal. La versión española sigue esa decisión: mantiene la imagen corporal fuerte con «apestar», preserva la fórmula de evaluación «en los ojos de», y refleja el nombre divino como «Yahvé» conforme a la política del proyecto.'
  spanish_consistency_notes:
  - 'Se mantiene una sola solución para יהוה: «Yahvé».'
  - «Siervos» se usa por el contexto de corte faraónica; no se fuerza «esclavos» donde el español bíblico sonaría menos preciso.
  - Se conserva la metáfora de repugnancia corporal en vez de suavizarla a una lectura puramente reputacional.
  - La estructura de cita directa y la puntuación siguen un registro bíblico contemporáneo, legible en español.
