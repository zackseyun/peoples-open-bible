translation:
  language: es
  text: Porque por este sufrimiento y esta perseverancia[a], ciertamente nos llevaremos los premios de la virtud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «paciencia». El griego ὑπομονή tiene el sentido de resistencia firme y perseverante bajo presión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς μὲν γὰρ
  english_pob_choice: For ... we will indeed
  chosen_spanish: Porque ... ciertamente nosotros
  alternatives_spanish:
  - Pues ... nosotros
  - Así que ... ciertamente nosotros
  lexicon: BDAG
  rationale: γάρ pide una conexión explicativa; μὲν aporta énfasis discursivo que en español se comunica bien con la colocación de «nosotros» y el adverbio «ciertamente». «Porque» conserva el enlace lógico sin sonar forzado.
- source_word: διὰ τῆσδε τῆς κακοπαθείας
  english_pob_choice: through this suffering
  chosen_spanish: por este sufrimiento
  alternatives_spanish:
  - por esta dureza
  - a través de este sufrimiento
  lexicon: BDAG
  rationale: κακοπάθεια expresa sufrimiento o penuria dolorosa. «Por este sufrimiento» mantiene el valor instrumental de διά y la fuerza concreta del demostrativo τῆσδε.
- source_word: ὑπομονῆς
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - paciencia
  - constancia
  - resistencia
  lexicon: BDAG
  rationale: En este contexto de prueba y virtud, «perseverancia» comunica mejor la resistencia firme y sostenida que el texto sugiere. «Paciencia» podría sonar pasiva en español, mientras que ὑπομονή aquí es activa y tenaz.
- source_word: τὰ τῆς ἀρετῆς ἆθλα
  english_pob_choice: the prizes of virtue
  chosen_spanish: los premios de la virtud
  alternatives_spanish:
  - los galardones de la virtud
  - los premios del valor moral
  - las recompensas de la virtud
  lexicon: LSJ
  rationale: ἆθλα son premios de competencia; «premios» conserva la imagen agonística sin perder claridad. ἀρετή en 4 Macabeos apunta a la excelencia moral; «virtud» es la forma española más estable y transparente para ese campo semántico.
- source_word: οἴσομεν
  english_pob_choice: we will ... carry off
  chosen_spanish: nos llevaremos
  alternatives_spanish:
  - cargaremos con
  - ganaremos
  - obtendremos
  lexicon: BDAG
  rationale: El futuro de φέρω con ἆθλα sugiere «llevarse» un premio, es decir, «carry off»/ganar por contienda. «Nos llevaremos» conserva esa metáfora competitiva de modo natural en español.
theological_decisions:
- issue: ἀρετή en un contexto de martirio y exhortación ética
  english_pob_reading: virtue
  chosen_spanish_reading: virtud
  alternative_spanish_readings:
  - excelencia moral
  - rectitud
  rationale: El discurso de 4 Macabeos es fuertemente ético y filosófico; «virtud» reproduce mejor el término clave sin importar categorías doctrinales ajenas. «Excelencia moral» es válida como glosa, pero sería más explicativa que el término principal.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Relación entre sufrimiento y recompensa
  english_pob_reading: through this suffering and endurance, we will indeed carry off the prizes of virtue
  chosen_spanish_reading: por este sufrimiento y esta perseverancia, ciertamente nos llevaremos los premios de la virtud
  alternative_spanish_readings:
  - por este sufrimiento y esta constancia, ciertamente ganaremos los premios de la virtud
  - por este padecimiento y esta perseverancia, ciertamente obtendremos los premios de la virtud
  rationale: La frase mantiene la lógica causal/instrumental del griego y la metáfora atlética de la recompensa. No se suaviza la tensión entre padecer y ganar, porque es central al argumento del pasaje.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió «carry off» para οἴσομεν con ἆθλα; en español se reflejó con «nos llevaremos» para conservar la metáfora de premio ganado en contienda. También se mantuvo la combinación de sufrimiento + endurance/perseverance como unidad conceptual.
  spanish_consistency_notes:
  - Se mantuvo «virtud» para ἀρετή, conforme al uso estable de 4 Macabeos en la literatura ética helenística.
  - Se evitó «SEÑOR» u otras sustituciones innecesarias, ya que este versículo no contiene el Tetragrámaton ni un título divino.
  - «Premios» conserva la imagen agonística del texto; no se reemplazó por una recompensa genérica más interpretativa.
