    issue: La frase «he aquí[b], están escritos» suena poco natural en español contemporáneo.
    rationale: Aunque «he aquí» puede conservar el valor presentativo de הִנָּם, en esta posición con coma antes de «están escritos» resulta rígido. «he aquí que están escritos» reproduce mejor la función discursiva sin perder fidelidad.
  - severity: high
    issue: 'La nota c contiene texto corrupto: «արձivo».'
    rationale: Es un error visible de codificación/tecleo que afecta la legibilidad y debe corregirse a «archivo».
  - severity: low
    issue: 'Hay una errata en el material explicativo asociado: «registo».'
    rationale: Aunque no forma parte del texto bíblico principal, conviene normalizarlo a «registro» para mantener calidad editorial.
