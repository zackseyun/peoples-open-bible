translation:
  language: es
  text: 'Al cuarto día, se levantaron temprano por la mañana, y él se levantó para irse. Pero el padre de la joven dijo a su yerno: «Refresca[a] tu corazón con un bocado de pan, y después podrán irse[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Fortalece tu corazón con un bocado de pan». El modismo significa reanimarse o sostenerse comiendo.'
    reason: lexical_alternative
  - marker: b
    text: El verbo final está en plural en hebreo («ustedes todos pueden irse»), probablemente refiriéndose al grupo que viajaba, aunque el padre se dirige directamente a su yerno.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּיּוֹם הָרְבִיעִי
  english_pob_choice: On the fourth day
  chosen_spanish: Al cuarto día
  alternatives_spanish:
  - El cuarto día
  - En el cuarto día
  lexicon: HALOT
  rationale: La expresión temporal es directa y no requiere ampliación. «Al cuarto día» conserva el orden narrativo natural en español sin añadir información implícita.
- source_word: וַיַּשְׁכִּימוּ בַבֹּקֶר
  english_pob_choice: they rose early in the morning
  chosen_spanish: se levantaron de mañana
  alternatives_spanish:
  - se levantaron temprano por la mañana
  - se alzaron muy de mañana
  lexicon: HALOT
  rationale: El plural del hebreo se refleja con un sujeto implícito plural. «De mañana» transmite el inicio temprano de manera natural y digna en español, sin sobrecargar la frase.
- source_word: וַיָּקָם לָלֶכֶת
  english_pob_choice: and he got up to go
  chosen_spanish: él se dispuso a partir
  alternatives_spanish:
  - él se levantó para irse
  - él se levantó a ir
  - él se puso en camino
  lexicon: HALOT
  rationale: El hebreo expresa levantarse con propósito de irse. «Se dispuso a partir» comunica la intención de salida de forma clara y estilísticamente fluida, evitando una repetición pesada de «irse».
- source_word: אֲבִי הַנַּעֲרָה
  english_pob_choice: the young woman’s father
  chosen_spanish: el padre de la joven
  alternatives_spanish:
  - el padre de la muchacha
  - el padre de la muchacha joven
  lexicon: HALOT
  rationale: נַעֲרָה denota una joven mujer; «joven» es más exacto y natural que «muchacha» en este contexto, y evita una reducción innecesaria a «niña».
- source_word: חֲתָנוֹ
  english_pob_choice: his son-in-law
  chosen_spanish: su yerno
  alternatives_spanish:
  - su consuegro
  - su pariente político
  lexicon: HALOT
  rationale: El parentesco inmediato y claro en español es «yerno». Mantiene la relación social señalada por el hebreo y coincide con la decisión auditada en inglés.
- source_word: סְעָד לִבְּךָ
  english_pob_choice: Refresh your heart
  chosen_spanish: Da refrigerio a tu corazón
  alternatives_spanish:
  - Refresca tu corazón
  - Sustenta tu corazón
  - Fortalece tu corazón
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea del corazón, pero «dar refrigerio» suena más natural y fiel al gesto de hospitalidad del contexto que un calco mecánico. La alternativa «fortalece» preserva fuerza semántica, pero «refrigerio» refleja mejor la idea de alimento que reanima.
- source_word: פַּת לֶחֶם
  english_pob_choice: a morsel of bread
  chosen_spanish: un bocado de pan
  alternatives_spanish:
  - un pedazo de pan
  - un bocado de comida
  - un mendrugo de pan
  lexicon: HALOT
  rationale: «Bocado» mantiene la concreción de una porción pequeña y el tono hospitalario. «Pan» reproduce la imagen básica sin expandirla a «alimento», que sería más general que el hebreo.
- source_word: וְאַחַר תֵּלֵכוּ
  english_pob_choice: and afterward you may go
  chosen_spanish: y después podrán irse
  alternatives_spanish:
  - y después podrán marcharse
  - y luego podrán ir
  - y después irán
  lexicon: HALOT
  rationale: El verbo hebreo está en plural; en español conviene reflejarlo con «podrán» para conservar la referencia al grupo, tal como documenta la POB inglesa. «Irse» mantiene el sentido de despedida permisiva.
theological_decisions:
- issue: Tratamiento del nombre divino y lenguaje de pacto
  english_pob_reading: No occurs in this verse
  chosen_spanish_reading: No aplica en este versículo
  alternative_spanish_readings:
  - —
  rationale: El versículo no contiene יהוה, אֱלֹהים ni κύριος en sentido divino. No se introduce ninguna convención especial sobre el nombre divino.
  doctrine_reference: N/A
- issue: Tensión entre singular y plural en la despedida final
  english_pob_reading: The final verb is plural in Hebrew ('you all may go'), likely referring to the traveling party as a whole, though the father addresses his son-in-law directly.
  chosen_spanish_reading: «y después podrán irse»
  alternative_spanish_readings:
  - «y después podrás irte»
  - «y después podrán marcharse»
  rationale: 'Se conserva la tensión documentada: el padre habla al yerno en singular, pero el hebreo usa plural al cerrar la frase. El español con «podrán» mantiene el plural explícito y deja ver que se trata del grupo viajero.'
  doctrine_reference: Gramática del hebreo bíblico; observación textual en la nota auditada de la POB
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «Strengthen your heart» por «Refresh your heart» para reflejar mejor סְעָד לִבְּךָ. La versión española sigue esa corrección con «Da refrigerio a tu corazón», manteniendo la metáfora del corazón y el tono de hospitalidad. También se preserva la observación auditada sobre el plural final del verbo hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se prefirió «joven» para נַעֲרָה por ser más neutral y adecuado en español que «muchacha» o «muchacha joven».
  - Se mantuvo la metáfora de «corazón» para לֵב, siguiendo la decisión auditada de no desliteralizarla a «ánimo» salvo necesidad contextual.
  - «Podrán irse» conserva el plural hebreo y la cortesía de despedida implícita en el contexto.
