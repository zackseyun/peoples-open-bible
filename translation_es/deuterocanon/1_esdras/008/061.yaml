translation:
  language: es
  text: Y después de partir del lugar de Tera[a] el día doce del primer mes, llegaron a Jerusalén por la mano poderosa de nuestro Señor que estaba sobre nosotros; y nos libró de todo enemigo desde el principio[b], y llegaron a Jerusalén[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego nombra el punto de partida como «Tera». El paralelo hebreo de Esdras 8:31 lee «el río Ahava». Como 1 Esdras se traduce aquí desde el griego, se conserva «Tera» en el texto principal.
    reason: alternative_reading
  - marker: b
    text: La expresión griega es difícil y literalmente sugiere algo como «desde la entrada» o «desde el comienzo». El paralelo hebreo menciona «la mano del enemigo y la emboscada en el camino», lo que apoya la idea de libramiento durante el viaje.
    reason: textual_variant
  - marker: c
    text: 'El griego recibido muestra una irregularidad de persona y repetición al final: primero «nos», luego «llegaron». La traducción mantiene la cláusula final tal como está transmitida, sin armonizarla por completo.'
    reason: textual_variant
lexical_decisions:
- source_word: ἀναζεύξαντες
  english_pob_choice: after setting out
  chosen_spanish: después de partir
  alternatives_spanish:
  - después de ponerse en camino
  - después de levantar el campamento
  lexicon: LSJ
  rationale: El participio expresa salida / partida para un viaje. En español, «después de partir» conserva la temporalidad y el movimiento sin sonar mecánico.
- source_word: τοῦ τόπου Θερὰ
  english_pob_choice: the place Thera
  chosen_spanish: del lugar de Tera
  alternatives_spanish:
  - del lugar Thera
  - de Tera
  lexicon: LSJ
  rationale: El griego nombra el punto de partida como un lugar llamado Θερὰ. Se conserva el topónimo transliterado en forma breve y natural en español, manteniendo la tensión con el paralelo hebreo sin resolverla en el cuerpo del texto.
- source_word: τῇ δωδεκάτῃ τοῦ πρώτου μηνὸς
  english_pob_choice: on the twelfth day of the first month
  chosen_spanish: el día doce del primer mes
  alternatives_spanish:
  - el doce del primer mes
  - en el día doce del primer mes
  lexicon: LSJ
  rationale: Es una fecha calendárica directa. «El día doce del primer mes» es claro y fiel al valor del dativo temporal.
- source_word: κατὰ τὴν κραταιὰν χεῖρα τοῦ κυρίου ἡμῶν τὴν ἐφʼ ἡμῖν
  english_pob_choice: by the mighty hand of our Lord that was upon us
  chosen_spanish: por la mano poderosa de nuestro Señor que estaba sobre nosotros
  alternatives_spanish:
  - por la mano fuerte de nuestro Señor que estaba sobre nosotros
  - según la mano poderosa de nuestro Señor sobre nosotros
  lexicon: LSJ
  rationale: Se conserva la imagen bíblica de «mano» como agencia protectora. «Poderosa» transmite κραταιὰν con dignidad; «Señor» sigue el valor de κύριος en este contexto de acción divina.
- source_word: ἐρύσατο
  english_pob_choice: he rescued us
  chosen_spanish: nos libró
  alternatives_spanish:
  - nos rescató
  - nos salvó
  lexicon: LSJ
  rationale: El verbo significa librar / rescatar de peligro. «Nos libró» es idiomático en español bíblico y evita cargar el verso con un matiz soteriológico más amplio de lo que exige el contexto.
- source_word: ἀπὸ τῆς εἰσόδου ἀπὸ παντὸς ἐχθροῦ
  english_pob_choice: from every enemy from the outset
  chosen_spanish: de todo enemigo desde el comienzo
  alternatives_spanish:
  - de todo enemigo desde la entrada
  - de todo enemigo desde el inicio
  lexicon: LSJ
  rationale: 'El griego transmitido es difícil: literalmente habla de «la entrada» o «el comienzo» y luego de «todo enemigo». Siguiendo la nota inglesa sobre la tensión textual, se conserva la literalidad relativa de «desde el comienzo» para no borrar el problema, pero se expresa en español de manera entendible.'
- source_word: καὶ ἤλθον εἰς Ἰερουσαλήμ
  english_pob_choice: and we came to Jerusalem
  chosen_spanish: y llegaron a Jerusalén
  alternatives_spanish:
  - y llegamos a Jerusalén
  - y vinieron a Jerusalén
  lexicon: LSJ
  rationale: El griego recibido presenta una oscilación de persona; el audit trail inglés señala la irregularidad. Se mantiene la pluralidad del texto griego final con «llegaron», preservando la lectura transmitida sin suavizarla.
theological_decisions:
- issue: Renderización de κύριος en referencia narrativa a Dios
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: En este contexto κύριος designa al Dios de Israel actuando en favor del pueblo. «Señor» es la equivalencia estable en español para este uso y evita rebajar el título a un sentido meramente humano.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord / Señor'
- issue: Lectura de la protección divina en la frase de la mano poderosa
  english_pob_reading: by the mighty hand of our Lord that was upon us
  chosen_spanish_reading: por la mano poderosa de nuestro Señor que estaba sobre nosotros
  alternative_spanish_readings:
  - por el poder de nuestro Señor sobre nosotros
  - bajo la mano poderosa de nuestro Señor
  rationale: La frase conserva la metáfora bíblica de la mano como poder protector y guía providencial. No se reemplaza por una abstracción más explicativa para no perder la imagen del original.
  doctrine_reference: Uso bíblico de la metáfora de la mano de Dios como poder providencial
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail inglés, que prefirió una lectura más literal de ἀπὸ τῆς εἰσόδου y conservó la clausula final repetida. En español se mantuvo la tensión textual: se preservó la salida desde Tera, se tradujo la acción protectora con lenguaje bíblico natural, y se dejó visible la irregularidad final con el cambio a tercera persona plural.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en la serie POB general cuando el texto lo requiera; aquí el griego tiene κύριος y, siguiendo el audit trail, se traduce «Señor».
  - Se conserva «Jesusalén» como topónimo fijo en español bíblico.
  - «Nos libró» mantiene el valor de rescate/deliverance sin introducir una formulación doctrinal más amplia.
  - La repetición final de «llegaron a Jerusalén» se conserva para reflejar la forma transmitida del griego.
