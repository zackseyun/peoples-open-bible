translation:
  language: es
  text: 'Y cuando este pueblo[a], o un profeta, o un sacerdote te pregunte, diciendo: «¿Cuál es la carga de Yahvé?», entonces les dirás[b]: «¿Qué carga? Yo los abandonaré», declara Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo מַשָּׂא (massaʾ) puede significar «carga» o, por extensión, «oráculo» o «mensaje». El versículo probablemente usa un juego de palabras con ese doble sentido.
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Qué carga?». El hebreo de la respuesta es difícil, y algunos entienden que rechaza la expresión «la carga de Yahvé» más que identificar directamente al interlocutor como la carga.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y si
  - Porque cuando
  lexicon: HALOT
  rationale: En este contexto introduce una situación recurrente, no una mera hipótesis. «Y cuando» conserva la relación discursiva y suena natural en español.
- source_word: יִשְׁאָלְךָ
  english_pob_choice: asks you
  chosen_spanish: te pregunte
  alternatives_spanish:
  - te consulte
  - te inquiera
  lexicon: HALOT
  rationale: El verbo שאל cubre preguntar e inquirir. «Te pregunte» es idiomático en español y funciona bien en la escena de respuesta profética directa.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - este pueblo aquí
  lexicon: HALOT
  rationale: «Pueblo» conserva el singular colectivo y el tono de distancia profética que marca la expresión hebrea.
- source_word: הַנָּבִיא ... כֹהֵן
  english_pob_choice: a prophet, or a priest
  chosen_spanish: un profeta, o un sacerdote
  alternatives_spanish:
  - el profeta, o el sacerdote
  - un profeta o un sacerdote
  lexicon: HALOT
  rationale: El hebreo permite valor distributivo; el español natural aquí pide indefinidos para cualquier miembro de esas categorías.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - preguntando
  - con estas palabras
  lexicon: HALOT
  rationale: Es la fórmula quotativa habitual y mantiene la introducción del discurso directo.
- source_word: מַה מַשָּׂא יְהוָה
  english_pob_choice: What is the burden of Yahweh?
  chosen_spanish: ¿Cuál es el peso de Yahvé?
  alternatives_spanish:
  - ¿Cuál es la carga de Yahvé?
  - ¿Qué es la carga de Yahvé?
  lexicon: HALOT
  rationale: Se preserva el campo semántico de מַשָּׂא con «peso» para mantener la posible ambivalencia de «carga/burden» y la fuerza del juego de palabras; «carga» sería más literal, pero «peso» resulta igualmente comprensible y más natural en español en una pregunta nominal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención española del proyecto para el Tetragrama: «Yahvé».'
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  english_pob_choice: then you shall say to them
  chosen_spanish: entonces les dirás
  alternatives_spanish:
  - y les dirás
  - entonces dirás a ellos
  lexicon: HALOT
  rationale: «Entonces» explicita la secuencia; «les dirás» es la formulación española más natural y directa.
- source_word: אֶת מַה מַשָּׂא
  english_pob_choice: What burden?
  chosen_spanish: ¿Qué peso?
  alternatives_spanish:
  - ¿Qué carga?
  - ¿Cuál peso?
  lexicon: HALOT
  rationale: La respuesta hebrea es difícil y el hebreo permite una réplica elíptica. En español, «¿Qué peso?» conserva el enlace verbal con la pregunta previa y deja abierta la misma tensión interpretativa que documenta el POB en inglés.
- source_word: וְנָטַשְׁתִּי אֶתְכֶם
  english_pob_choice: I will cast you off
  chosen_spanish: Yo los desecharé
  alternatives_spanish:
  - yo los abandonaré
  - yo los rechazaré
  lexicon: HALOT
  rationale: נטשׁ puede significar dejar, abandonar o desechar. «Desecharé» es fuerte, judicial y encaja con la ironía del pasaje; se mantiene el futuro divino explícito con «Yo».
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Fórmula profética breve y publicable en español moderno; «declara» conserva solemnidad sin sobrerretórica.
theological_decisions:
- issue: Tratamiento del Tetragrama יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se preserva el nombre divino propio en la línea editorial del proyecto, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión semántica de מַשָּׂא
  english_pob_reading: burden / oracle-message wordplay
  chosen_spanish_reading: peso / carga con posible juego de palabras
  alternative_spanish_readings:
  - carga
  - mensaje
  - oráculo
  rationale: El POB inglés retiene «burden» para la ironía profética; en español, «peso» permite mantener el valor concreto y la alusión a carga sin colapsar el doble sentido. La nota conserva la alternativa y la dificultad.
  doctrine_reference: Jer 23:33; lexical play documented in English POB audit trail
- issue: Traducción de la réplica breve e incierta
  english_pob_reading: What burden?
  chosen_spanish_reading: ¿Qué peso?
  alternative_spanish_readings:
  - ¿Qué carga?
  - ¿Cuál es el peso?
  rationale: La sintaxis hebrea es elíptica. Se opta por una pregunta breve que refleje la corrección revisionada en el POB inglés y mantenga la ambigüedad sin explicarla de más.
  doctrine_reference: English revision pass noted in audit trail
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó la réplica de «You are the burden» a «What burden?» por mayor fidelidad al hebreo. La versión española sigue esa decisión y evita una identificación explícita no exigida por el texto.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrama.
  - Se preserva la ambigüedad semántica de מַשָּׂא con «peso» y nota explicativa.
  - Se evita un lenguaje eclesiástico arcaizante; la dicción es moderna y reverente.
  - La puntuación y el discurso directo siguen el uso editorial español.
  - Los corchetes de notas aparecen exactamente en los lugares anclados del texto.
