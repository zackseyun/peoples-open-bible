    text: O 'las cosas dedicadas', o de manera más formal 'el anatema'. El hebreo חֵרֶם se refiere a personas o cosas apartadas para Dios para destrucción o para ser quitadas del uso humano ordinario.
    reason: lexical_alternative
  revision_rationale: Se corrige la anclación de notas para cumplir la disciplina del proyecto, se normaliza el formato [a], y se mejora la claridad de חֵרֶם en español principal con 'cosas consagradas a la destrucción', dejando 'anatema' como alternativa en nota. También se hace más idiomático el partitivo con 'tomó algo de'.
