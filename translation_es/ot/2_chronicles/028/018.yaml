review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del hebreo: incursión filistea, captura de ciudades específicas, mención de sus poblados dependientes y establecimiento allí. También conserva adecuadamente el sentido de וַיֵּשְׁבוּ שָׁם como residencia/ocupación posterior. Sin embargo, la nota al pie quedó invertida respecto al rastro auditado inglés: el texto principal usa «Soco», mientras que la alternativa documentada en inglés es «Soco» para un texto principal «Soko».'
  spanish_quality_summary: El español es claro y publicable, con buen registro bíblico moderno. «Habían hecho incursiones», «capturaron» y «se establecieron allí» son naturales. Los topónimos son mayormente legibles en español. La única reparación necesaria es alinear el nombre «Soko/Soco» y su nota, para que el texto principal y la alternativa no dupliquen la misma forma.
  glossary_alignment: No hay términos teológicos del glosario principal en juego. La conservación de «Sefelá» y «Négueb» está justificada por el rastro léxico y funciona bien en español. Los demás nombres propios están transliterados de manera razonable.
  issues:
  - severity: medium
    issue: La variante de «Soko/Soco» está mal distribuida entre texto y nota
    rationale: El POB en inglés tiene texto principal «Soko» con nota «Or “Soco.”». En español, el borrador pone «Soco[a]» y la nota «O «Soco»», lo que hace que la nota repita la misma forma del texto principal en vez de preservar una alternativa real.
  revised_spanish_text: Y los filisteos habían hecho incursiones en las ciudades de la Sefelá y del Négueb de Judá, y capturaron Bet-semes, Ajalón, Gederot, Soko[a] y sus aldeas, Timna y sus aldeas, y Gimzo y sus aldeas; y se establecieron allí.
  revised_footnotes:
