translation:
  language: es
  text: Una generación va, y otra generación viene, pero la tierra permanece[a] para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «está de pie». El verbo hebreo es literalmente «permanece de pie» o «está firme», una imagen concreta de estabilidad duradera.
    reason: lexical_alternative
  - marker: b
    text: «Para siempre» traduce un modismo hebreo de continuidad duradera; en contexto resalta el contraste entre las generaciones pasajeras y la permanencia relativa de la tierra.
    reason: cultural_note
lexical_decisions:
- source_word: דּוֹר
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - edad
  - cohorte de personas
  - generación de personas
  lexicon: HALOT
  rationale: דּוֹר designa aquí una unidad humana de personas que viven en el mismo tramo del tiempo. «Generación» conserva el paralelismo con la generación que se va y la que viene, sin añadir matices ajenos al hebreo.
- source_word: הֹלֵךְ
  english_pob_choice: goes
  chosen_spanish: va
  alternatives_spanish:
  - se va
  - pasa
  - se marcha
  lexicon: HALOT
  rationale: El participio expresa acción continua o habitual. «Va» mantiene la imagen concreta del movimiento sin intensificarla con «pasa» o «se marcha», que podrían sonar más interpretativos.
- source_word: בָּא
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - arriba
  lexicon: HALOT
  rationale: «Viene» reproduce con naturalidad el contraste breve y equilibrado con הֹלֵךְ. «Llega» añade una idea de destino que el hebreo no exige.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra habitada
  - el mundo
  - la tierra/ el mundo
  lexicon: HALOT
  rationale: En este contexto sapiencial y de alcance general, אֶרֶץ puede referir al mundo/tierras. «La tierra» conserva el lenguaje bíblico amplio y es suficientemente natural en español sin precisar indebidamente «el mundo».
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - por los siglos
  - de continuo
  lexicon: HALOT
  rationale: La expresión hebrea es un idiom a de duración continua. «Para siempre» es la equivalencia idiomática más directa en español y mantiene el contraste retórico con las generaciones pasajeras.
- source_word: עֹמָדֶת
  english_pob_choice: stands
  chosen_spanish: permanece
  alternatives_spanish:
  - está en pie
  - se mantiene
  - está
  lexicon: HALOT
  rationale: El verbo literalmente significa «estar de pie / estar firme». En español, «permanece» comunica la estabilidad duradera con naturalidad; «está en pie» preservaría más literalmente la metáfora, pero suena menos fluido en el verso.
theological_decisions:
- issue: 'Valor de לְעוֹלָם en un contexto de sabiduría: permanencia observacional o afirmación absoluta metafísica'
  english_pob_reading: Rendered as 'forever' in the main text as the natural English equivalent of the Hebrew idiom in this wisdom context.
  chosen_spanish_reading: «Para siempre» en el texto principal, como equivalente idiomático natural, sin resolver la tensión literaria sobre la permanencia relativa de la tierra frente a la transitoriedad humana.
  alternative_spanish_readings:
  - por largo tiempo
  - de manera duradera
  - por los siglos
  rationale: 'El contraste del versículo es observacional y retórico: las generaciones van y vienen, mientras la tierra permanece. «Para siempre» conserva la fuerza idiomática del hebreo y deja intacta la tensión literaria, sin convertir el enunciado en una definición cosmológica técnica.'
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; este borrador sigue de cerca el acuerdo alto entre el texto fuente, la traducción inglesa auditada y las decisiones léxicas registradas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el Tetragrámaton.
  - Se conserva el paralelismo verbal breve «va / viene» para reflejar el hebreo participial.
  - Se evita «se va» en el texto principal para no intensificar el matiz más allá del hebreo.
  - «La tierra» se eligió por fidelidad y naturalidad; no se fuerza «el mundo» porque el contexto admite una referencia más amplia sin exigirla.
