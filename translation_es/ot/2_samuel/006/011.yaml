translation:
  language: es
  text: Y el arca de Yahvé permaneció en la casa de Obed-edom el geteo[a] por tres meses, y Yahvé bendijo a Obed-edom y a toda su casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el geteo», es decir, un hombre asociado con Gat.'
    reason: cultural_note
  - marker: b
    text: O «toda su casa». El hebreo puede referirse ampliamente a su casa-hogar, su familia y su establecimiento doméstico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: remained
  chosen_spanish: permaneció
  alternatives_spanish:
  - se quedó
  - habitó
  - estuvo
  lexicon: HALOT
  rationale: El verbo ישׁב puede expresar sentarse, habitar o permanecer. Con el arca como sujeto y una duración explícita, «permaneció» comunica continuidad de presencia sin sugerir que el arca «habitó» de modo demasiado antropomórfico.
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of Yahweh
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca de Yahvé
  - el arca de YHWH
  lexicon: HALOT
  rationale: «Arca» es el equivalente natural de אֲרוֹן aquí. Se mantiene el nombre divino «Yahvé» conforme a la convención del proyecto, en lugar de sustituirlo por un título como «SEÑOR».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: La forma elegida reproduce la transliteración del nombre divino establecida por el proyecto y evita la sustitución litúrgica por un título.
- source_word: בֵּית
  english_pob_choice: the house of
  chosen_spanish: la casa de
  alternatives_spanish:
  - el hogar de
  - la familia de
  lexicon: HALOT
  rationale: Aquí בֵּית con nombre propio denota la casa o residencia donde estuvo el arca; «la casa de» conserva esa referencia concreta. Más adelante, con כָּל בֵּיתוֹ, el sentido se amplía a la esfera doméstica.
- source_word: עֹבֵד אֱדֹם
  english_pob_choice: Obed-edom
  chosen_spanish: Obed-edom
  lexicon: HALOT
  rationale: Nombre propio conservado por transliteración estándar.
- source_word: הַגִּתִּי
  english_pob_choice: the Gittite
  chosen_spanish: el guitita
  alternatives_spanish:
  - el de Gat
  - el gadita
  lexicon: HALOT
  rationale: El gentilicio se traduce con un equivalente español transparente. «El guitita» preserva el valor adjetival de pertenencia a Gat sin expandirlo innecesariamente.
- source_word: שְׁלֹשָׁה חֳדָשִׁים
  english_pob_choice: for three months
  chosen_spanish: por tres meses
  alternatives_spanish:
  - durante tres meses
  - tres meses
  lexicon: HALOT
  rationale: La preposición expresa con naturalidad la duración del estado indicado por וַיֵּשֶׁב y sigue el sentido del inglés auditado sin endurecerlo.
- source_word: וַיְבָרֶךְ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - dio bendición a
  - mostró favor a
  lexicon: HALOT
  rationale: ברך se rinde con el verbo normal «bendecir/bendijo», que conserva la formulación bíblica y evita una paráfrasis interpretativa.
- source_word: אֶת עֹבֵד אֱדֹם וְאֶת כָּל בֵּיתוֹ
  english_pob_choice: Obed-edom and all his household
  chosen_spanish: a Obed-edom y a toda su casa
  alternatives_spanish:
  - a Obed-edom y a toda su familia
  - a Obed-edom y a toda su casa-hogar
  lexicon: HALOT
  rationale: «Toda su casa» preserva la amplitud hebrea de בֵּיתוֹ y permite incluir tanto familia como establecimiento doméstico. Se mantiene la posible oscilación semántica en una nota.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: Se conserva el nombre propio del pacto, conforme a la línea editorial del proyecto. No se sustituye por un título reverencial, porque el texto hebreo usa el Tetragramatón de forma explícita.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de כָּל בֵּיתוֹ
  english_pob_reading: all his household
  chosen_spanish_reading: toda su casa
  alternative_spanish_readings:
  - toda su familia
  - todo su hogar
  rationale: La expresión hebrea puede abarcar la unidad doméstica completa, no solo el edificio físico. «Toda su casa» mantiene esa amplitud sin reducirla indebidamente a una sola dimensión.
  doctrine_reference: HALOT, בַּיִת / בֵּית
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado en inglés sin depender mecánicamente de él: se preservó el nombre divino como Yahvé, se optó por una duración natural en español («por tres meses») y se mantuvo la amplitud semántica de בֵּיתוֹ con una nota alternativa. No se registraron revisiones pendientes en el expediente inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - «Casa» se emplea para בֵּית cuando el contexto es doméstico o residencial; una nota aclara la amplitud de «toda su casa».
  - El gentilicio «guitita» se mantiene como forma breve y legible para הַגִּתִּי.
  - La puntuación española y el orden de los sintagmas buscan una lectura pública fluida sin perder correspondencia con el hebreo.
