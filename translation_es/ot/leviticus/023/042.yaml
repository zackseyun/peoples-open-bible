revisions:
- from: En las enramadas vivirán[a] durante siete días; todo nacido en Israel vivirá en enramadas.
  to: Habitarán en cabañas[a] durante siete días; todo nativo de Israel habitará en cabañas.
  rationale: Se corrige la persona verbal para reflejar el mandato dirigido al pueblo («habitarán»), se mantiene la repetición de ישׁב con un verbo de residencia más cercano a 'dwell', se reemplaza «enramadas» por «cabañas» por mayor claridad interregional, y se mejora הָאֶזְרָח con «todo nativo de Israel», que suena natural y conserva el contraste comunitario del hebreo. La nota léxica se conserva con alternativas útiles.
