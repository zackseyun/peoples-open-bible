translation:
  language: es
  text: 'Y de los hijos de Azgad: Johanán, hijo de Hakatán[a][b], y con él 110 varones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de Azgad». La expresión hebrea «hijos de» puede abarcar una línea familiar más amplia, no solo hijos inmediatos.
    reason: lexical_alternative
  - marker: b
    text: O «hijo de Hakkatan» si הַקָּטָן se toma como nombre propio o designación tradicional, en vez de entenderlo como «el menor».
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  english_pob_choice: And from the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y de los descendientes de
  - Y de la familia de
  lexicon: HALOT
  rationale: La construcción מִן + בְּנֵי introduce a otro grupo/clan en la lista. «Hijos de» conserva la estructura genealógica del hebreo y la formulación auditada del POB en inglés; en español también puede abarcar descendientes, sin perder la literalidad formal.
- source_word: עַזְגָּד
  english_pob_choice: Azgad
  chosen_spanish: Azgad
  lexicon: Nombre propio
  rationale: Nombre propio/familiar transliterado; no requiere adaptación semántica.
- source_word: יוֹחָנָן
  english_pob_choice: Johanan
  chosen_spanish: Johanán
  alternatives_spanish:
  - Jehohanán
  - Juan
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio con transliteración directa al español. «Johanán» refleja mejor el hebreo y evita el equivalente anglicizado «John/Juan».
- source_word: בֶּן הַ/קָּטָן
  english_pob_choice: son of Hakkatan
  chosen_spanish: hijo de Hakatán
  alternatives_spanish:
  - hijo del menor
  - hijo de Katan
  lexicon: HALOT
  rationale: En la lista genealógica, la secuencia funciona mejor como patronímico y no como adjetivo comparativo. Por eso se conserva como nombre propio tradicionalizado en español, «Hakatán», en línea con la decisión auditada de tratarlo como Hakkatan más que como «el menor».
- source_word: וְ/עִמּוֹ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - con él
  lexicon: HALOT
  rationale: Fórmula normal de acompañamiento en los listados de Esdras. «Y con él» mantiene el nexo conjuntivo y el ritmo del registro.
- source_word: מֵאָה וַ/עֲשָׂרָה
  english_pob_choice: '110'
  chosen_spanish: '110'
  alternatives_spanish:
  - ciento diez
  lexicon: HALOT
  rationale: El valor cardinal es ciento diez. En español, el dígito es claro y natural en un contexto de lista; no cambia el sentido.
- source_word: הַ/זְּכָרִים
  english_pob_choice: males
  chosen_spanish: varones
  alternatives_spanish:
  - males
  - hombres
  lexicon: HALOT
  rationale: זְכָרִים señala sexo masculino; en español bíblico administrativo, «varones» comunica bien la referencia a varones varones/male persons y preserva la especificidad de la lista mejor que «hombres», que podría sonar más restringido por edad o rol. Se evita «males» por resultar poco idiomático en este registro.
translation_notes:
  revision_awareness: La versión sigue de cerca el texto hebreo y el audit trail en inglés, sin cambios de revisión reportados en el paquete y con acuerdo alto en la verificación cruzada.
  spanish_consistency_notes:
  - Se mantiene «Azgad» como nombre familiar y «Johanán» como transliteración directa al español.
  - Se usa «Hakatán» para reflejar la decisión auditada de tratar הַקָּטָן como nombre/título propio en el contexto de lista, evitando una paráfrasis como «el menor» en el texto principal.
  - «Varones» se emplea para conservar el valor sexado de זְכָרִים en un español natural de registro bíblico.
  - La nota a pie de página [a] se ancla en «hijos de» porque ahí aparece la posible amplitud semántica; la nota [b] se ancla en «Hakatán» para preservar la lectura alternativa documentada.
