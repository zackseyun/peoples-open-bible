review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva la mayor parte del sentido hebreo y sigue bien las decisiones del POB: «Yahvé», «estatutos», «mandamientos», «prolongues tus días» y la cláusula final están sustancialmente alineadas. Sin embargo, hay un problema importante de alineación semántica en la cláusula de resultado: el hebreo y el inglés POB dicen «para que te vaya bien a ti y a tus hijos después de ti», pero el español draft dice «para que te vaya bien con tus hijos después de ti», lo cual cambia la relación y sugiere una buena relación con los hijos en vez de bienestar para ambas generaciones. Además, las notas al pie están mal ancladas respecto de las alternativas documentadas del POB.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «con tus hijos» suena antinatural y semánticamente desviado en este contexto. «Por todos tus días» es comprensible, aunque «todos tus días» suena más natural en español; no obstante, no requiere cambio obligatorio. También conviene ajustar las notas para que correspondan exactamente a los puntos léxicos relevantes y a sus anclajes en el texto.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; מִצְוֹת/חֻקִּים distinguidos como «mandamientos/estatutos»; no hay conflictos doctrinales relevantes. La única desviación significativa no es de glosario sino de sintaxis/semántica en «con tus hijos».'
  issues:
  - severity: high
    issue: La frase «para que te vaya bien con tus hijos después de ti» no refleja el hebreo.
    rationale: El hebreo לְךָ וּלְבָנֶיךָ אַחֲרֶיךָ expresa bienestar para ti y para tus hijos/descendencia después de ti, no bienestar 'con' ellos. La preposición «con» altera el sentido.
  - severity: medium
    issue: Las notas al pie no corresponden a los lugares adecuados del texto.
    rationale: La nota [b] está anclada tras «con», pero comenta el modismo «te vaya bien». Además, el POB inglés preserva una alternativa para «tus hijos» y otra para «sobre/en la tierra», mientras el borrador omite la primera y reemplaza la segunda por una nota no necesaria sobre el modismo ya tratado.
  - severity: low
    issue: «Por todos tus días» es menos natural que «todos tus días» o «por todos los días de tu vida».
    rationale: No es incorrecto, pero en español bíblico corriente suena algo forzado. Aun así, puede mantenerse por cercanía formal al hebreo y al inglés auditado.
  revised_spanish_text: Así que guardarás sus estatutos y sus mandamientos, que hoy yo te estoy mandando[a], para que te vaya bien[b] a ti y a tus hijos[c] después de ti, y para que prolongues tus días sobre la tierra[d] que Yahvé tu Dios te da por todos tus días.
  revised_footnotes:
