translation:
  language: es
  text: Y aconteció en el segundo año, en el segundo mes, el día veinte del mes, que la nube se levantó[a] de sobre el tabernáculo del testimonio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «subió» o «ascendió» para «se levantó».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tabernáculo del testimonio»; también puede verterse «tienda del testimonio».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y fue
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce un nuevo episodio en secuencia. «Y aconteció» conserva ese avance narrativo con un registro natural y digno en español.
- source_word: בַּשָּׁנָה הַשֵּׁנִית
  english_pob_choice: in the second year
  chosen_spanish: en el segundo año
  alternatives_spanish:
  - en el año segundo
  lexicon: HALOT
  rationale: Es una expresión temporal directa. «En el segundo año» comunica con claridad el conteo cronológico sin alterar el orden básico del hebreo.
- source_word: בַּחֹדֶשׁ הַשֵּׁנִי
  english_pob_choice: in the second month
  chosen_spanish: en el segundo mes
  alternatives_spanish:
  - en el mes segundo
  lexicon: HALOT
  rationale: Se mantiene la referencia calendárica literal y natural en español.
- source_word: בְּעֶשְׂרִים בַּחֹדֶשׁ
  english_pob_choice: on the twentieth day of the month
  chosen_spanish: el día veinte del mes
  alternatives_spanish:
  - el veinte del mes
  - el día veinte de ese mes
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en veinte en el mes». En español, hace falta explicitar «día» para expresar correctamente el valor idiomático del ordinal temporal.
- source_word: נַעֲלָה
  english_pob_choice: lifted
  chosen_spanish: se levantó
  alternatives_spanish:
  - subió
  - ascendió
  lexicon: HALOT
  rationale: Con el sujeto «la nube», עלה describe movimiento hacia arriba y salida de su posición anterior. «Se levantó» reproduce bien ese valor y es idiomático en español.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube de nube
  lexicon: HALOT
  rationale: Es el sustantivo definido y conocido del relato del desierto; «la nube» es la forma clara y directa.
- source_word: מֵעַל
  english_pob_choice: from over
  chosen_spanish: de sobre
  alternatives_spanish:
  - desde arriba de
  - de encima de
  lexicon: HALOT
  rationale: La preposición marca alejamiento desde una posición superior al tabernáculo. «De sobre» conserva mejor la relación espacial precisa que una simple «de».
- source_word: מִשְׁכַּן
  english_pob_choice: tabernacle
  chosen_spanish: tabernáculo
  alternatives_spanish:
  - tienda
  - morada
  lexicon: HALOT
  rationale: En el contexto cultual del Pentateuco, «tabernáculo» es el equivalente establecido y exacto para el santuario portátil.
- source_word: הָעֵדֻת
  english_pob_choice: of the testimony
  chosen_spanish: del testimonio
  alternatives_spanish:
  - del testimonio del pacto
  - del testimonio
  lexicon: HALOT
  rationale: Se conserva la expresión técnica «testimonio», sin convertirla en «pacto», que sería más interpretativo que léxico. La frase completa queda como designación cultual tradicional y fiel al hebreo.
theological_decisions:
- issue: Designación cultual מִשְׁכַּן הָעֵדֻת
  english_pob_reading: the tabernacle of the testimony
  chosen_spanish_reading: el tabernáculo del testimonio
  alternative_spanish_readings:
  - la tienda del testimonio
  - el tabernáculo del pacto
  rationale: La frase es descriptiva y cultual, no doctrinalmente controvertida. «Tabernáculo del testimonio» mantiene la estructura del hebreo y la resonancia canónica de עֵדוּת, mientras que «del pacto» introduce una interpretación no exigida por el término.
  doctrine_reference: Consistencia terminológica del Pentateuco; primacía del texto fuente
- issue: Valor del movimiento de la nube
  english_pob_reading: the cloud lifted
  chosen_spanish_reading: la nube se levantó
  alternative_spanish_readings:
  - la nube subió
  - la nube ascendió
  rationale: El inglés POB conserva la idea de elevación/desplazamiento. En español, «se levantó» comunica el mismo movimiento ascendente sin perder la fuerza narrativa ni introducir una paráfrasis excesiva.
  doctrine_reference: Lectura narrativa literal con equivalencia funcional moderada
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incluyendo los marcadores [a] y [b] exactamente en el texto principal, en los lugares correspondientes a las notas. La redacción mantiene la cronología y el vocabulario cultual del hebreo, con las notas ancladas para las alternativas léxicas y de lectura.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva «tabernáculo» como término cultual estable para מִשְׁכַּן.
  - Se traduce עֵדוּת como «testimonio» en coherencia con el repertorio del proyecto.
  - Se evita una paráfrasis como «morada» o «casa de reunión», porque no está sustentada por este texto.
  - La puntuación sigue la norma española y el tono es bíblico pero contemporáneo.
