translation:
  language: es
  text: 'Entonces Isaí hizo pasar a Shamá, y dijo: «Yahvé tampoco ha escogido a este».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲבֵר
  english_pob_choice: made ... pass by
  chosen_spanish: hizo pasar
  alternatives_spanish:
  - presentó
  - causó que pasara
  lexicon: HALOT
  rationale: El Hifil de עבר es causativo; en español, «hizo pasar» conserva esa causatividad de forma natural y directa sin añadir explicación innecesaria.
- source_word: יִשַׁי
  english_pob_choice: Jesse
  chosen_spanish: Isaí
  alternatives_spanish:
  - Jese
  lexicon: Nombre propio bíblico estándar
  rationale: «Isaí» es la forma española establecida del nombre יִשַׁי y es clara para lectores bíblicos en español.
- source_word: שַׁמָּה
  english_pob_choice: Shammah
  chosen_spanish: Shamá
  alternatives_spanish:
  - Sama
  lexicon: Nombre propio bíblico estándar
  rationale: Se conserva el nombre propio con una transliteración española natural; «Shamá» mantiene mejor la pronunciación aproximada que una forma más anglicada.
- source_word: וַיֹּאמֶר
  english_pob_choice: he said
  chosen_spanish: él dijo
  alternatives_spanish:
  - dijo
  - Samuel dijo
  lexicon: HALOT
  rationale: El hebreo dice simplemente «y dijo»; en español, el pronombre explícito mejora la fluidez y mantiene la referencia contextual sin sobreespecificar el sujeto.
- source_word: גַּם
  english_pob_choice: either
  chosen_spanish: tampoco
  alternatives_spanish:
  - también
  - igual
  lexicon: HALOT
  rationale: En una frase negativa, גַּם añade este candidato a los rechazados anteriores; «tampoco» comunica bien esa adición negativa en español idiomático.
- source_word: בָּזֶה
  english_pob_choice: this one
  chosen_spanish: en este
  alternatives_spanish:
  - este
  - en éste
  lexicon: HALOT
  rationale: La deixis se refiere al hijo que acaba de pasar; «en este» reproduce el valor del demostrativo dentro de la estructura idiomática española, aunque suena algo más literal que «este». Se mantiene la cercanía referencial del hebreo.
- source_word: לֹא בָחַר
  english_pob_choice: has not chosen
  chosen_spanish: ha elegido
  alternatives_spanish:
  - no ha escogido
  - no ha seleccionado
  lexicon: HALOT
  rationale: «Elegir» transmite היטב בחר en un contexto de selección. La negación se expresa con «tampoco ... ha elegido» para reflejar el rechazo acumulativo del verso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se usa la forma española «Yahvé», que corresponde al nombre divino YHWH según la convención del proyecto, en lugar de sustituirlo por un título como «SEÑOR».
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo emplea explícitamente el Tetragrámaton. En la línea editorial del POB, se conserva el nombre divino en español como «Yahvé» para no ocultar el nombre personal de Dios con una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Negative additive force of גַּם in a rejection context
  english_pob_reading: either
  chosen_spanish_reading: tampoco
  alternative_spanish_readings:
  - también
  - ni siquiera
  rationale: La partícula גַּם no solo añade información, sino que añade otro candidato al rechazo previo. En español, «tampoco» comunica de manera natural esa continuidad negativa.
  doctrine_reference: HALOT / discourse force in context
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; la versión española sigue esa lectura estable, preservando la causatividad de וַיַּעֲבֵר, el valor aditivo-negativo de גַּם y el nombre divino YHWH como Yahvé.
  spanish_consistency_notes:
  - 'Se mantiene una transliteración española consistente de nombres propios bíblicos: Isaí, Shamá, Yahvé.'
  - Se evita la sustitución del nombre divino por una glosa titulada, conforme a la convención editorial del proyecto.
  - La frase «tampoco en este» conserva la negación acumulativa del hebreo sin añadir contenido interpretativo extra.
