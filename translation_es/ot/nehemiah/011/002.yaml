translation:
  language: es
  text: Y el pueblo bendijo a todos los hombres que se ofrecieron voluntariamente para vivir en Jerusalén[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘que se ofrecieron como voluntarios para vivir en Jerusalén’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרֲכוּ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - elogió
  - alabó
  lexicon: HALOT
  rationale: ברך en piel puede significar ‘bendecir’. Como el objeto aquí son personas, no Dios, el sentido es que el pueblo pronunció bendición/afirmación sobre ellas. ‘Bendijo’ conserva el vínculo léxico y la forma verbal directa.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la población
  lexicon: HALOT
  rationale: עם es el colectivo estándar ‘pueblo’. ‘El pueblo’ es natural en español y mantiene la correspondencia formal.
- source_word: לְכֹל הָאֲנָשִׁים
  english_pob_choice: all the men
  chosen_spanish: a todos los hombres
  alternatives_spanish:
  - a todas las personas
  - a todos
  lexicon: HALOT
  rationale: אנשים es el sustantivo masculino plural ‘hombres’; se conserva el valor de género del hebreo, en línea con la decisión inglesa de no neutralizarlo.
- source_word: הַמִּתְנַדְּבִים
  english_pob_choice: who willingly offered themselves
  chosen_spanish: que se ofrecieron voluntariamente
  alternatives_spanish:
  - que se voluntariaron
  - que se ofrecieron libremente
  lexicon: HALOT
  rationale: El hitpael de נדב expresa ofrecerse de manera voluntaria o con disposición propia. ‘Se ofrecieron voluntariamente’ comunica bien la idea reflexiva sin perder dignidad estilística.
- source_word: לָשֶׁבֶת
  english_pob_choice: to live
  chosen_spanish: para habitar
  alternatives_spanish:
  - para vivir
  - para morar
  lexicon: HALOT
  rationale: ישב puede significar residir, habitar o vivir. En un contexto de establecer residencia en Jerusalén, ‘habitar’ conserva mejor el tono bíblico y sigue siendo claro en español.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa y el topónimo se traducen de modo estándar y transparente.
theological_decisions:
- issue: Tensión entre ‘bendecir’ aplicado a personas y el sentido de aprobación/elogio
  english_pob_reading: the people blessed all the men
  chosen_spanish_reading: el pueblo bendijo a todos los hombres
  alternative_spanish_readings:
  - el pueblo elogió a todos los hombres
  - el pueblo expresó bendición sobre todos los hombres
  rationale: Se mantiene ‘bendijo’ porque preserva el verbo hebreo ברך y la lectura de la POB. En español, el verbo admite el uso interpersonal de pronunciar bendición o benevolencia sobre alguien; no se reemplaza por ‘elogió’ para no perder la tensión semántica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura revisada de la POB en inglés, sin cambios detectados en el pasaje auditado; la traducción española conserva el sujeto colectivo, el complemento masculino plural y la idea reflexiva de ofrecimiento voluntario.
  spanish_consistency_notes:
  - Se mantiene ‘Jerusalén’ como topónimo estándar y no se añade artículo.
  - Se conserva el verbo ‘bendijo’ para reflejar ברך, evitando una paráfrasis que diluya el paralelismo con el hebreo.
  - ‘Se ofrecieron voluntariamente’ reproduce la voluntariedad del hitpael sin introducir matices ajenos.
  - La traducción evita neutralizar ‘hombres’ porque el hebreo usa אנשים de forma masculina explícita.
