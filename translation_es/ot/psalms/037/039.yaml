translation:
  language: es
  text: La salvación[a] de los justos viene de Yahvé[b]; él es su fortaleza[c] en tiempo de angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «liberación»; el término hebreo puede denotar rescate o victoria, además de salvación.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
  - marker: c
    text: O «refugio» o «baluarte».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּתְשׁוּעַת
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - rescate
  - victoria
  lexicon: HALOT
  rationale: תְּשׁוּעָה puede expresar salvación, liberación o rescate. «Salvación» conserva el alcance teológico y la tonalidad general del salmo sin perder la idea de auxilio concreto.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos
  lexicon: HALOT
  rationale: El sustantivo plural adjetival se refiere a una clase de personas caracterizadas por justicia. En español, «los justos» es natural y mantiene bien el valor colectivo.
- source_word: מֵיְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: viene de Yahvé
  alternatives_spanish:
  - proviene de Yahvé
  - es de Yahvé
  lexicon: HALOT
  rationale: La preposición מִן marca procedencia. Como el texto base nombra a יְהוָה directamente, se conserva «Yahvé» en el texto principal, y «viene de» comunica la fuente de manera clara y fiel.
- source_word: מָעוּזָּם
  english_pob_choice: their stronghold
  chosen_spanish: su fortaleza
  alternatives_spanish:
  - su refugio
  - su baluarte
  - su fortaleza
  lexicon: HALOT
  rationale: מָעוֹז designa un lugar o fuente de protección y fuerza. «Fortaleza» mantiene la imagen defensiva mejor que «refugio» y suena natural en español bíblico actual. El posesivo plural hebreo queda integrado en «su» según el antecedente plural.
- source_word: בְּעֵת צָרָה
  english_pob_choice: in a time of trouble
  chosen_spanish: en tiempo de angustia
  alternatives_spanish:
  - en un tiempo de angustia
  - en tiempo de aflicción
  - en tiempo de angustia
  lexicon: HALOT
  rationale: La expresión temporal hebrea se vierte con naturalidad como «en tiempo de». צָרָה abarca angustia, aflicción o adversidad; «angustia» conserva bien la presión y la aflicción implícitas.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita. Conforme al criterio del proyecto, se translitera como «Yahvé» en vez de ocultarlo tras un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Cláusula nominal con verbo copulativo implícito
  english_pob_reading: he is their stronghold
  chosen_spanish_reading: él es su fortaleza
  alternative_spanish_readings:
  - su fortaleza
  - él será su fortaleza
  rationale: El hebreo presenta una cláusula nominal. En español conviene explicitar el verbo copulativo para hacer la relación sujeto-predicado clara sin añadir contenido nuevo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
- issue: Sentido de צָרָה
  english_pob_reading: trouble
  chosen_spanish_reading: angustia
  alternative_spanish_readings:
  - aflicción
  - adversidad
  - tribulación
  rationale: «Angustia» comunica bien la idea de aflicción apremiante y encaja con el tono pastoral del versículo. Se evita un término demasiado técnico o eclesiástico.
  doctrine_reference: HALOT semantic range for צָרָה
translation_notes:
  revision_awareness: 'El pasaje sigue de cerca la versión inglesa auditada y la evidencia hebrea: se conserva el nombre divino como Yahvé, se mantiene el valor de fuente en מִן con «viene de», y se reproduce la cláusula nominal con un verbo copulativo explícito en español. No se detectaron revisiones textuales adicionales en el audit trail más reciente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - «Justos» mantiene el sentido colectivo del plural hebreo.
  - «Fortaleza» conserva la imagen defensiva de מָעוֹז sin sobreinterpretarla.
  - «Angustia» traduce el campo semántico de צָרָה con un registro natural y pastoral.
