translation:
  language: es
  text: La palabra del piadoso es sabiduría[a] en todo tiempo, pero el necio cambia[b] como la luna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la conversación del piadoso es sabiduría en todo tiempo»; el griego διήγησις también puede tener el matiz de “discurso” o “relato”, pero aquí la idea es el hablar continuo del justo.'
    reason: lexical_alternative
  - marker: b
    text: 'La comparación con la luna sugiere sus fases cambiantes: el necio es inconstante o variable.'
    reason: cultural_note
lexical_decisions:
- source_word: διήγησις
  english_pob_choice: speech
  chosen_spanish: la palabra
  alternatives_spanish:
  - el discurso
  - el habla
  - la conversación
  lexicon: LSJ
  rationale: En este dicho sapiencial, διήγησις no exige un sentido de “narración” formal; el énfasis está en lo que la persona dice de manera habitual. “La palabra” suena natural en español y conserva la referencia al hablar del justo sin sobrerrepresentar la forma del género.
- source_word: εὐσεβοῦς
  english_pob_choice: the godly
  chosen_spanish: del piadoso
  alternatives_spanish:
  - del devoto
  - del justo
  - del hombre piadoso
  lexicon: LSJ
  rationale: El genitivo sustantivado apunta a una persona caracterizada por piedad/reverencia. “Piadoso” comunica bien ese matiz moral-religioso en español, sin forzar una terminología más eclesiástica que el griego no exige aquí.
- source_word: διὰ παντός
  english_pob_choice: always
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - continuamente
  - a toda hora
  lexicon: LSJ
  rationale: La expresión significa continuidad constante. “En todo tiempo” mantiene el sentido idiomático y evita que “siempre” resulte demasiado absoluto en un proverbio que describe una cualidad estable.
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - palabras sabias
  - habla sabia
  lexicon: LSJ
  rationale: El griego presenta un predicado nominal simple. “Sabiduría” conserva esa forma sentenciosa y permite la misma tensión breve del original, en vez de convertirlo en una paráfrasis adjetival.
- source_word: ἄφρων
  english_pob_choice: the fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el insensato
  - el tonto
  - el imprudente
  lexicon: LSJ
  rationale: En literatura sapiencial, ἄφρων designa al que carece de discernimiento moral y práctico. “Necio” es el equivalente español más tradicional y preciso para ese valor sapiencial, mejor que “tonto”, que sería demasiado coloquial.
- source_word: ἀλλοιοῦται
  english_pob_choice: changes
  chosen_spanish: cambia
  alternatives_spanish:
  - se altera
  - es cambiante
  - se vuelve diferente
  lexicon: LSJ
  rationale: El verbo indica volverse distinto o variar. “Cambia” preserva la fuerza verbal y el paralelismo con la comparación lunar, manteniendo la idea de inconstancia sin añadir explicaciones.
- source_word: ὡς σελήνη
  english_pob_choice: like the moon
  chosen_spanish: como la luna
  alternatives_spanish:
  - como la luna en sus fases
  - como la luna cambiante
  lexicon: LSJ
  rationale: La comparación con la luna es directa. “Como la luna” reproduce la imagen básica con naturalidad; las fases quedan implícitas, como en el audit trail inglés, sin introducir una expansión innecesaria en el verso principal.
translation_notes:
  revision_awareness: Coincide con la lectura griega de Swete (1909) y con el audit trail inglés; no se detectan revisiones textuales ni cambios editoriales relevantes en este pasaje.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa “piadoso” para εὐσεβής/εὐσεβοῦς por claridad y por ser un equivalente sobrio en español; no se fuerza “devoto” ni “justo” porque desplazarían el matiz sapiencial.
  - Se conserva el paralelismo breve del hebraísmo proverbial sin añadir glosas al cuerpo del texto.
