theological_decisions:
- issue: Whether to make explicit that the testimony concerns Jesus' self-incriminating claim
  chosen_reading: 'Kept the statement formally general: ''we ourselves have heard it from his own mouth'''
  alternative_readings:
  - we ourselves have heard the testimony from his mouth
  - we ourselves have heard his claim from his own mouth
  rationale: The Greek does not explicitly supply an object after 'heard.' Adding 'claim' or 'testimony' would interpret the nature of what was heard. The translation preserves the terseness and judicial force without importing explanatory wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
