translation:
  language: es
  text: 'Proclamen a las fortalezas en Asdod[a] y a las fortalezas en la tierra de Egipto, y digan: «Reúnanse sobre los montes[b] de Samaria, y vean los muchos tumultos[c] dentro de ella, y las opresiones[d] en medio de ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «palacios» para «fortalezas». El hebreo puede denotar residencias grandiosas y fortificadas.
    reason: lexical_alternative
  - marker: b
    text: O «las colinas de Samaria».
    reason: lexical_alternative
  - marker: c
    text: O «gran desorden» / «muchos disturbios» para «los muchos tumultos».
    reason: lexical_alternative
  - marker: d
    text: O «los oprimidos»; el hebreo puede leerse de manera más abstracta, pero «los oprimidos» puede ajustarse mejor a la forma y al contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: הַשְׁמִיעוּ
  english_pob_choice: Proclaim
  chosen_spanish: Proclamen
  alternatives_spanish:
  - Anuncien
  - Hagan oír
  lexicon: HALOT
  rationale: El imperativo hifil de שׁמע funciona aquí como convocatoria pública. «Proclamen» conserva bien la fuerza exhortativa y el carácter de anuncio solemne sin volverlo demasiado literal o pesado.
- source_word: אַרְמְנוֹת
  english_pob_choice: citadels
  chosen_spanish: fortalezas
  alternatives_spanish:
  - palacios
  - ciudadelas
  lexicon: HALOT
  rationale: El término puede referirse a residencias elevadas y fortificadas. En español, «fortalezas» comunica mejor la idea de estructuras fuertes y defensivas; evita imponer la noción de lujo que tendría «palacios» en muchos contextos.
- source_word: בְּאַשְׁדּוֹד
  english_pob_choice: in Ashdod
  chosen_spanish: de Asdod
  alternatives_spanish:
  - en Asdod
  lexicon: HALOT
  rationale: Con un sustantivo como «fortalezas», el genitivo español («las fortalezas de Asdod») suena natural y conserva el referente local. La preposición hebrea es locativa, pero esta equivalencia resulta idiomática y fiel.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  - en Egipto
  lexicon: HALOT
  rationale: Se conserva la frase más completa para reflejar el tenor formal del hebreo y la cadencia profética. «Tierra de Egipto» mantiene el paralelismo con Asdod y no reduce innecesariamente la expresión.
- source_word: הֵאָסְפוּ
  english_pob_choice: Assemble
  chosen_spanish: Congrécense
  alternatives_spanish:
  - Reúnanse
  - Asambléense
  lexicon: HALOT
  rationale: El niphal imperativo de אסף es una convocatoria a reunirse. «Congrécense» mantiene el matiz colectivo y solemne. Es menos coloquial que «reúnanse» y más acorde con el tono profético.
- source_word: הָרֵי שֹׁמְרוֹן
  english_pob_choice: the mountains of Samaria
  chosen_spanish: los montes de Samaria
  alternatives_spanish:
  - las colinas de Samaria
  - las montañas de Samaria
  lexicon: HALOT
  rationale: «הר» puede ser «monte/montes» o «colina/colinas». «Montes» preserva la elevación del lugar de observación y evita forzar una precisión topográfica que el hebreo no exige.
- source_word: מְהוּמוֹת רַבּוֹת
  english_pob_choice: the many tumults
  chosen_spanish: los muchos tumultos
  alternatives_spanish:
  - el gran desorden
  - las muchas perturbaciones
  lexicon: HALOT
  rationale: La expresión indica alboroto, confusión o convulsión social. «Los muchos tumultos» conserva el plural y el carácter visible del desorden, en línea con la decisión inglesa.
- source_word: בְּתוֹכָהּ
  english_pob_choice: within her
  chosen_spanish: dentro de ella
  alternatives_spanish:
  - en medio de ella
  - dentro de la ciudad
  lexicon: HALOT
  rationale: Se mantiene el idioma de la ciudad personificada en femenino singular. «Dentro de ella» es natural en español y conserva la referencia interna a Samaria.
- source_word: וַעֲשׁוּקִים
  english_pob_choice: the oppressions
  chosen_spanish: las opresiones
  alternatives_spanish:
  - los oprimidos
  - los actos de opresión
  lexicon: HALOT
  rationale: 'Sigo la lectura sustantiva documentada por la revisión inglesa más reciente: el plural nominal puede referirse a opresiones/actos opresivos. «Las opresiones» mantiene la forma plural y no desplaza el foco al grupo de personas oprimidas.'
- source_word: בְּקִרְבָּהּ
  english_pob_choice: in her midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - dentro de ella
  - en su interior
  lexicon: HALOT
  rationale: Es un casi sinónimo espacial de la frase anterior. «En medio de ella» evita una repetición demasiado mecánica y conserva el interior de la ciudad-persona.
theological_decisions:
- issue: Naturaleza de lo que se pide observar en Samaria
  english_pob_reading: The verse describes social disorder and oppressed people within Samaria, not merely abstract sins.
  chosen_spanish_reading: El versículo describe desórdenes visibles y opresiones dentro de Samaria, no solo faltas abstractas.
  alternative_spanish_readings:
  - El versículo habla de personas oprimidas dentro de Samaria
  - El versículo se refiere solo a actos abstractos de opresión
  rationale: 'La lectura inglesa subraya que el texto presenta realidades sociales observables. El español mantiene esa tensión: «tumultos» y «opresiones» pueden verse como hechos concretos dentro de la ciudad, sin convertirlo en una simple abstracción moral.'
  doctrine_reference: Justicia social y denuncia profética en Amos; cf. la preocupación profética por la opresión visible.
translation_notes:
  revision_awareness: La revisión inglesa más reciente desplazó la redacción desde «the oppressed» a «the oppressions» para ajustarse mejor a la forma hebrea y al paralelismo. Esta versión española sigue esa línea, manteniendo el plural sustantivo «opresiones» y evitando convertirlo en un sujeto humano explícito.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en el proyecto, aunque este versículo no lo contiene.
  - Se evita «SEÑOR» como sustituto no presente en el texto fuente.
  - «Montes» se conserva para הָרֵי, con nota alternativa a «colinas».
  - La combinación «dentro de ella / en medio de ella» reproduce la doble localización interna del hebreo sin aplanarla.
