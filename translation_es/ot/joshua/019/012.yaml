translation:
  language: es
  text: Entonces volvió de Sarid hacia el oriente[a], hacia la salida del sol, hasta el límite de Kislot-tabor; salió a Daberat y subió hasta Jafía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "hacia el este, hacia el este"; literalmente, "hacia el oriente, la salida del sol".
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁב
  english_pob_choice: Then it turned back
  chosen_spanish: Entonces volvió
  alternatives_spanish:
  - y volvió
  - entonces se volvió
  - y dio vuelta
  lexicon: HALOT
  rationale: En descripciones de linderos, שוב marca un cambio de dirección del trazado. "Volvió" conserva la idea de giro del límite sin sonar rígido en español; "entonces" refleja la secuencia narrativa del hebreo y del inglés POB.
- source_word: מִשָּׂרִיד
  english_pob_choice: from Sarid
  chosen_spanish: desde Sarid
  alternatives_spanish:
  - de Sarid
  - desde la ciudad de Sarid
  lexicon: HALOT
  rationale: Nombre propio de lugar; "desde" expresa con claridad el punto de partida del tramo fronterizo, en línea con el valor direccional de מן.
- source_word: קֵדְמָה מִזְרַח הַשֶּׁמֶשׁ
  english_pob_choice: eastward, toward the sunrise
  chosen_spanish: hacia el oriente, hacia la salida del sol
  alternatives_spanish:
  - hacia el este, hacia la salida del sol
  - al oriente, al nacimiento del sol
  - hacia el este, al nacimiento del sol
  lexicon: HALOT
  rationale: La combinación intensifica la dirección oriental. "Oriente" es natural y digno en español bíblico; "salida del sol" conserva la imagen de מזרח השמש sin reducirla a un mero punto cardinal.
- source_word: עַל גְּבוּל
  english_pob_choice: to the border of
  chosen_spanish: hasta el límite de
  alternatives_spanish:
  - hasta la frontera de
  - junto al límite de
  - sobre el límite de
  lexicon: HALOT
  rationale: En este contexto topográfico, עַל con גבול señala el alcance del trazado hasta un punto limítrofe. "Hasta el límite de" comunica bien la extensión territorial sin introducir un matiz impropio de "sobre".
- source_word: כִּסְלֹת תָּבֹר
  english_pob_choice: Kisloth-tabor
  chosen_spanish: Kislot-tabor
  alternatives_spanish:
  - Kislot Tabor
  - Quislot-tabor
  lexicon: HALOT
  rationale: Topónimo transliterado. Se prefiere la forma breve y clara "Kislot-tabor" para mantener la convención del nombre compuesto sin añadir una adaptación innecesaria.
- source_word: וְיָצָא
  english_pob_choice: and went out
  chosen_spanish: y salió
  alternatives_spanish:
  - y se extendió
  - y fue hasta
  - y avanzó
  lexicon: HALOT
  rationale: En descripciones territoriales, יצא puede señalar que el límite "sale" hacia otro punto. "Salió" conserva la imagen concreta del hebreo y evita sobreinterpretar el movimiento como mera extensión abstracta.
- source_word: אֶל הַדָּבְרַת
  english_pob_choice: to Daberath
  chosen_spanish: a Daberat
  alternatives_spanish:
  - a la ciudad de Daberat
  - hasta Daberat
  lexicon: HALOT
  rationale: Nombre propio de lugar; en español se omite normalmente el artículo hebreo ante topónimos. Se usa "Daberat" para una transliteración más fluida en español.
- source_word: וְעָלָה
  english_pob_choice: and up to
  chosen_spanish: y subió
  alternatives_spanish:
  - y ascendió
  - y fue subiendo
  - y subió hasta
  lexicon: HALOT
  rationale: עלה en contextos geográficos suele indicar ascenso. "Subió" mantiene la noción de elevación y, con el complemento siguiente, queda claro el destino del movimiento.
- source_word: יָפִיעַ
  english_pob_choice: Japhia
  chosen_spanish: Jafía
  alternatives_spanish:
  - Yafía
  - Jafía
  lexicon: HALOT
  rationale: Nombre propio de lugar; se opta por la transliteración española "Jafía", que conserva la pronunciación aproximada y es más natural para lectores hispanohablantes que "Japhia".
theological_decisions:
- issue: Imágenes direccionales y topográficas del texto
  english_pob_reading: The verse is read as a boundary description moving from Sarid eastward, then to Kisloth-tabor, Daberath, and Japhia.
  chosen_spanish_reading: La frase se vierte como descripción de linderos, no como relato de viaje personal.
  alternative_spanish_readings:
  - Lectura narrativa de desplazamiento personal
  - Lectura abstracta de expansión territorial
  rationale: El hebreo y la traducción inglesa muestran una secuencia geográfica de frontera. El español conserva esa lectura topográfica para no borrar el género del pasaje.
  doctrine_reference: Joshua 19; boundary allotment passages
- issue: Tratamiento de los nombres propios sin domesticación excesiva
  english_pob_reading: Proper place names are transliterated, with English convention smoothing orthography.
  chosen_spanish_reading: Se mantienen los topónimos con transliteración española moderada, sin traducirlos ni añadir equivalentes tradicionales.
  alternative_spanish_readings:
  - Adaptación plena a la ortografía inglesa
  - Sustitución por formas tradicionales latinas
  rationale: La política POB evita ocultar el texto fuente detrás de nomenclaturas eclesiásticas tradicionales. En español, la transliteración moderada conserva auditabilidad y legibilidad.
  doctrine_reference: Translation philosophy / source transparency
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con el control de revisión más reciente; no se reportan cambios aplicados en el audit trail inglés, y la versión española sigue la misma lectura sin introducir decisiones no respaldadas.
  spanish_consistency_notes:
  - Se preserva el contraste direccional "oriente / salida del sol" para reflejar tanto קֵדְמָה como מִזְרַח הַשֶּׁמֶשׁ.
  - '"Límite" traduce גבול en sentido fronterizo territorial, consistente con el contexto de reparto de territorio.'
  - 'Los topónimos se transliteran de modo uniforme en español: Sarid, Kislot-tabor, Daberat y Jafía.'
