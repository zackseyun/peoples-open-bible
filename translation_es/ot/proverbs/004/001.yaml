translation:
  language: es
  text: Oigan[a], hijos, la instrucción de un padre, y presten atención para llegar a entender.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos e hijas». El hebreo dice «hijos», preservando el marco de instrucción de padre a hijo típico de Proverbios.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oigan atentamente
  lexicon: HALOT
  rationale: El imperativo plural de שׁמע exige una apertura atenta y obediente. «Oigan» conserva la concisión proverbial y el tono directo; evita el carácter algo más interpretativo de «escuchen atentamente».
- source_word: בָנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos e hijas
  - niños
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «hijos varones», en español «hijos» puede funcionar como término filial amplio sin perder el marco pedagógico paterno. Se mantiene la referencia familiar del texto, con una nota sobre el matiz masculino cuando es relevante.
- source_word: מוּסַר
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - corrección
  lexicon: HALOT
  rationale: En literatura sapiencial, מוּסַר abarca disciplina, corrección e instrucción formativa. «Instrucción» comunica bien el sentido didáctico inmediato en español sin ocultar el trasfondo formativo.
- source_word: אָב
  english_pob_choice: a father's
  chosen_spanish: de un padre
  alternatives_spanish:
  - paterna
  - de su padre
  lexicon: HALOT
  rationale: El constructo hebreo es indefinido; «de un padre» evita introducir una posesión específica no presente en el hebreo. En español, la estructura nominal mantiene la naturalidad y la precisión semántica.
- source_word: וְהַקְשִׁיבוּ
  english_pob_choice: and pay attention
  chosen_spanish: y atiendan
  alternatives_spanish:
  - y presten atención
  - y escuchen con atención
  lexicon: HALOT
  rationale: 'הקשיבו implica más que oír: pide enfoque deliberado. «Atiendan» conserva la fuerza imperativa y distingue este verbo del primero, manteniendo la progresión retórica del versículo.'
- source_word: לָדַעַת
  english_pob_choice: to know
  chosen_spanish: para conocer
  alternatives_spanish:
  - para saber
  - a fin de conocer
  lexicon: HALOT
  rationale: La l- infinitiva expresa finalidad; «para conocer» reproduce ese valor de propósito de manera natural en español, siguiendo la revisión inglesa que optó por una redacción más directa.
- source_word: בִּינָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - insight
  lexicon: HALOT
  rationale: בינה es un término sapiencial clave para discernimiento/entendimiento. «Entendimiento» es la equivalencia amplia y clara en español, compatible con el paralelismo del verso.
theological_decisions:
- issue: Alcance representativo de «hijos» en un marco de instrucción paterna
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos varones
  - muchachos
  rationale: El hebreo es masculino plural y el contexto refleja una instrucción de padre a hijo típica de Proverbios. En español, «hijos» conserva el vínculo filial sin rigidizar el verso con un marcaje de género más pesado que el que exige la lectura pública del texto. La tensión entre forma masculina y aplicación amplia queda reconocible sin neutralizar el original.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del texto inglés que mantuvo «to know understanding» sin «so as», por lo que el español usa «para conocer» como expresión directa de finalidad, sin sobreexplicar el infinitivo. También se preserva la progresión retórica de dos imperativos: oír/atender.'
  spanish_consistency_notes:
  - Se mantiene «entendimiento» para בינה en línea con el vocabulario sapiencial.
  - Se evita «disciplina» como opción principal para מוּסר porque en español podría sonar más correctiva que formativa en este contexto.
  - No se usa «SEÑOR» ni otras sustituciones teológicas no pertinentes, ya que el verso no contiene el nombre divino.
