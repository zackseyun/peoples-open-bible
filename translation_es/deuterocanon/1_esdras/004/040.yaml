revisions:
- from: Y en su juicio no hay nada injusto[a]. Y suya es la fuerza, y el reino, y la autoridad, y la majestad de todos los siglos. Bendito sea el Dios de la verdad.
  to: Y en su juicio no hay nada injusto[a]. Y suya es la fuerza y el reino y la autoridad y la majestad por todos los siglos. Bendito sea el Dios de la verdad.
  rationale: Se revisa solo la segunda oración para evitar que «de todos los siglos» modifique únicamente «majestad» y para expresar de manera natural en español el valor temporal de τῶν πάντων αἰώνων. Se mantiene una nota breve con la alternativa más literal, ya que la auditoría inglesa preservó esa posibilidad. No se requieren cambios doctrinales ni una relectura compleja del pasaje.
