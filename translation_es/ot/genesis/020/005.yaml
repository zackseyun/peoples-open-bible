translation:
  language: es
  text: '¿No fue él mismo quien me dijo: «Ella es mi hermana»? Y ella misma también dijo: «Él es mi hermano». Con integridad de mi corazón y con inocencia de mis manos[a] he hecho esto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con integridad de corazón y con manos inocentes». El hebreo emplea modismos morales-legales para expresar sinceridad e inocencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Did ... not
  chosen_spanish: ¿No fue ...?
  alternatives_spanish:
  - ¿Acaso no fue ...?
  - ¿No ...?
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta con expectativa de respuesta afirmativa. En español, «¿No fue él mismo quien...?» conserva esa función interrogativa sin volverla torpe.
- source_word: הוּא
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - ese mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis; «él mismo» reproduce ese valor enfático de manera natural en español.
- source_word: אָמַר לִי
  english_pob_choice: say to me
  chosen_spanish: me dijo
  alternatives_spanish:
  - me habló
  - me dijo a mí
  lexicon: HALOT
  rationale: Aunque el audit trail inglés usa «say to me», en español el verbo más idiomático aquí es «decir» en pasado simple. No se pierde el sentido de comunicación directa.
- source_word: אֲחֹתִי הִוא
  english_pob_choice: She is my sister
  chosen_spanish: Ella es mi hermana
  alternatives_spanish:
  - Es mi hermana
  - Ella es mi propia hermana
  lexicon: HALOT
  rationale: Es una predicación directa de parentesco; no requiere ampliación ni intensificación adicional.
- source_word: וְהִיא גַם הִוא אָמְרָה
  english_pob_choice: And she herself also said
  chosen_spanish: Y ella misma también dijo
  alternatives_spanish:
  - Y ella también dijo
  - Y también ella misma dijo
  lexicon: HALOT
  rationale: Se preserva el valor acumulativo de «גם» y del pronombre enfático con «ella misma también».
- source_word: אָחִי הוּא
  english_pob_choice: He is my brother
  chosen_spanish: Él es mi hermano
  alternatives_spanish:
  - Es mi hermano
  - Él mismo es mi hermano
  lexicon: HALOT
  rationale: Traducción directa de la afirmación de parentesco, manteniendo la simplicidad del original.
- source_word: בְּתָם לְבָבִי
  english_pob_choice: In the integrity of my heart
  chosen_spanish: Con integridad de corazón
  alternatives_spanish:
  - Con la integridad de mi corazón
  - En la integridad de mi corazón
  - Con sinceridad de corazón
  lexicon: HALOT
  rationale: El hebreo usa un modismo moral de sinceridad e integridad. «Con integridad de corazón» comunica bien el sentido idiomático sin volverlo excesivamente literal.
- source_word: וּבְנִקְיֹן כַּפַּי
  english_pob_choice: and the innocence of my hands
  chosen_spanish: y con inocencia de mis manos
  alternatives_spanish:
  - y con limpieza de manos
  - y con manos inocentes
  lexicon: HALOT
  rationale: Se mantiene la metáfora de las «manos» como acciones/inculpabilidad. «Inocencia» refleja adecuadamente el valor moral-legal del término.
- source_word: עָשִׂיתִי זֹאת
  english_pob_choice: I have done this
  chosen_spanish: he hecho esto
  alternatives_spanish:
  - hice esto
  - lo he hecho
  lexicon: HALOT
  rationale: El perfecto hebreo puede sonar bien en español con presente perfecto, especialmente en una defensa inmediata ante Dios o ante un interlocutor.
theological_decisions:
- issue: Idiomas morales de inocencia e integridad
  english_pob_reading: Rendered the paired expressions as a claim of personal integrity and innocence without implying absolute sinlessness.
  chosen_spanish_reading: Se expresa como una reivindicación de integridad de corazón e inocencia de manos, sin convertirla en una afirmación de perfección moral absoluta.
  alternative_spanish_readings:
  - Con la limpieza de mis manos y la integridad de mi corazón
  - Soy completamente inocente
  rationale: El contexto muestra una defensa respecto a este incidente concreto. La traducción conserva la fuerza moral de los modismos hebreos sin sobrerreclamar el alcance teológico del enunciado.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente
translation_notes:
  revision_awareness: La versión española sigue de cerca el sentido y el énfasis del audit trail inglés, pero reordena levemente la sintaxis para que suene natural en español. No se detectaron revisiones pendientes en el expediente de origen.
  spanish_consistency_notes:
  - Se usa «Dios» para la referencia divina contextual implícita del discurso, sin necesidad de máscara reverencial en este versículo.
  - Se mantuvo «integridad de corazón» / «inocencia de manos» como equivalentes idiomáticos, evitando suavizar la tensión moral-legal del hebreo.
  - El énfasis pronominal se conserva con «él mismo» y «ella misma», coherente con el valor del pronombre independiente en hebreo.
