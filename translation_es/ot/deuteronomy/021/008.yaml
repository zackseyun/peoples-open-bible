revisions:
- from: Haz expiación por tu pueblo Israel[a], a quien redimiste, Yahvé, y no pongas sangre inocente[b] en medio de tu pueblo Israel. Entonces se hará expiación por ellos respecto de la sangre.
  to: Haz expiación por tu pueblo Israel, a quien redimiste, Yahvé, y no pongas sangre inocente en medio de tu pueblo Israel. Y así quedarán absueltos de la culpa de esa sangre[a].
  rationale: Se elimina la nota [a] espuria. Se reformula la cláusula final para expresar en español natural el valor jurídico de הַדָּם sin perder el sentido pasivo/resultativo de וְנִכַּפֵּר. La nota conserva el literal importante del hebreo, tal como hace el POB inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:34:25Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la mayor parte del hebreo: «Haz expiación», «por tu pueblo Israel», «a quien redimiste», «Yahvé», «no pongas sangre inocente en medio de tu pueblo Israel» reflejan adecuadamente כפר, לְעַמְּךָ, פדה, יְהוָה, נתן, דם נקי y בקרב. La principal debilidad está en la cláusula final וְנִכַּפֵּר לָהֶם הַדָּם, donde «se hará expiación por ellos respecto de la sangre» suena poco natural y no comunica con suficiente claridad el sentido jurídico-resultativo que el contexto exige.'
  spanish_quality_summary: 'El español general es claro, pero hay dos problemas de calidad editorial: (1) la nota [a] no corresponde a una alternativa significativa; solo repite una frase incompleta y no preserva una nota del inglés, y (2) la construcción «respecto de la sangre» es rígida y poco idiomática para lectura bíblica pública. Conviene una formulación más natural como «y así quedarán absueltos de la culpa de esa sangre», con nota que preserve el literal hebreo «la sangre».'
  glossary_alignment: Buen alineamiento con la terminología del proyecto en «Yahvé», «redimiste» y «expiación». No hay conflicto con glosario mayor. La excepción necesaria es explicitar «culpa» en la cláusula final para comunicar el modismo jurídico de הַדָּם; esto está respaldado por el rastro inglés y mejora la inteligibilidad en español.
  issues:
  - severity: medium
    issue: La cláusula final «Entonces se hará expiación por ellos respecto de la sangre» es poco natural y semánticamente débil.
    rationale: El hebreo usa «la sangre» como expresión legal por la responsabilidad de sangre derramada. En español, «respecto de la sangre» no transmite bien esa carga jurídica ni suena idiomático.
  - severity: medium
    issue: La nota [a] es inadecuada y prescindible.
    rationale: No refleja una alternativa preservada por el POB inglés ni aclara una ambigüedad real del español; además repite de forma truncada parte del texto principal.
  - severity: low
    issue: La nota sobre «sangre» debe anclarse a la cláusula final, no a «sangre inocente».
    rationale: La observación del inglés POB se refiere específicamente a הַדָּם en la cláusula final, no a דָּם נָקִי en la cláusula media.
  revised_spanish_text: Haz expiación por tu pueblo Israel, a quien redimiste, Yahvé, y no pongas sangre inocente en medio de tu pueblo Israel. Y así quedarán absueltos de la culpa de esa sangre[a].
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «y la sangre será expiada por ellos». El hebreo usa «la sangre» como expresión legal para la responsabilidad surgida por derramamiento de sangre.'
    reason: lexical_alternative
  revision_rationale: Se elimina la nota [a] espuria. Se reformula la cláusula final para expresar en español natural el valor jurídico de הַדָּם sin perder el sentido pasivo/resultativo de וְנִכַּפֵּר. La nota conserva el literal importante del hebreo, tal como hace el POB inglés.
