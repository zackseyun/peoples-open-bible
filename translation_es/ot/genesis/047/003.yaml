review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro auditado en inglés: Faraón pregunta por el oficio de los hermanos, y ellos responden con una autodesignación deferente y una descripción profesional que incluye continuidad generacional. Sin embargo, en español hay un problema de tratamiento pronominal: «sus hermanos» y «su ocupación» usan trato de tercera persona/plural cortés, mientras la respuesta usa «Tus siervos», de segunda persona singular. Dado que el hebreo usa 2mp en la pregunta y 2ms en la respuesta a Faraón, conviene unificar el español con trato directo a plural para la pregunta y a singular para la respuesta al rey.'
  spanish_quality_summary: El texto es claro y natural, pero la combinación «sus hermanos» / «su ocupación» dentro de diálogo directo dirigido por Faraón suena inconsistente en español moderno. «¿Cuál es su ocupación?» puede entenderse como tratamiento de cortesía singular o plural, pero aquí Faraón habla a varios hermanos; «¿Cuál es la ocupación de ustedes?» o «¿A qué se dedican?» evita ambigüedad. También conviene ajustar la puntuación española eliminando el punto extra tras la cita interrogativa antes de cerrar la oración marco.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Siervos» para עֲבָדֶיךָ está bien justificado por el uso cortesano; no aplica la preferencia general por «esclavo». «Pastores de rebaños» refleja bien רֹעֵה צֹאן y preserva la nota léxica. No aparecen Yahvé/Mesías ni otros términos de glosario sensibles.
  issues:
  - severity: medium
    issue: Inconsistencia de tratamiento pronominal en el diálogo
    rationale: La pregunta de Faraón usa «su» mientras la respuesta usa «Tus». En español esto mezcla registros y enturbia quién habla a quién. El hebreo muestra que Faraón se dirige a varios hermanos; una formulación explícita para plural mejora fidelidad y claridad.
  - severity: low
    issue: Puntuación poco natural tras cita interrogativa
    rationale: En español, tras una cita que ya termina con signo de interrogación, no se añade un punto extra antes de continuar con el verbo de habla o cerrar la oración principal.
