translation:
  text: Better is a poor man who is alive in himself than a rich man stricken in his flesh[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Better is a poor man, healthy and strong in constitution, than a rich man scourged in his body.'' The Hebrew witness is shorter and says literally ''alive in himself'' and ''stricken in his flesh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: טוב
  chosen: Better is
  alternatives:
  - Good is
  - It is better
  lexicon: HALOT
  rationale: Comparative evaluative opening in Hebrew wisdom style; English idiom is best conveyed with 'Better is' rather than a flat adjectival 'good is.' The Greek κρείσσων confirms a comparative sense.
- source_word: מסכן
  chosen: poor man
  alternatives:
  - poor person
  - needy man
  - destitute man
  lexicon: HALOT
  rationale: The term denotes one who is poor or needy. 'Poor man' preserves the masculine singular form and wisdom-style contrast with 'rich man.' 'Poor person' is possible but less gender-accurate to the Hebrew phrasing.
- source_word: וחי
  chosen: who is alive
  alternatives:
  - and living
  - yet alive
  - living
  lexicon: HALOT
  rationale: 'Taken predicatively with the preceding noun: the poor man is alive. The Greek ὑγιὴς καὶ ἰσχύων suggests a fuller sense of bodily well-being in the parallel tradition, but the Hebrew directly says ''alive,'' so the main text stays anchored there.'
- source_word: בעצמו
  chosen: in himself
  alternatives:
  - in his own person
  - in his body
  - by himself
  lexicon: HALOT
  rationale: The Hebrew literally points to the man's own self/person. 'In himself' preserves the idiom while allowing the bodily sense implied by the Greek parallel. 'By himself' would wrongly suggest solitude or self-sufficiency.
- source_word: מעשיר
  chosen: than a rich man
  alternatives:
  - than one who is rich
  - than the rich man
  lexicon: HALOT
  rationale: The comparative contrast requires supplying 'than' in English. The form denotes a rich person; 'rich man' matches the singular masculine contrast with מסכן.
- source_word: ונגע
  chosen: stricken
  alternatives:
  - afflicted
  - plagued
  - smitten
  lexicon: HALOT
  rationale: The root conveys being touched/struck with an affliction. 'Stricken' is concise, natural English and fits the bodily-injury context. The Greek μεμαστιγωμένος ('scourged/whipped') reflects severe bodily affliction and supports a strong rendering.
- source_word: בבשרו
  chosen: in his flesh
  alternatives:
  - in his body
  - in his own flesh
  lexicon: HALOT
  rationale: בשר is literally 'flesh.' Because the phrase is bodily and concrete, 'flesh' should be preserved rather than generalized to 'body,' while still sounding natural in English.
