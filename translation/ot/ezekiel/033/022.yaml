theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Agency in 'he opened my mouth'
  chosen_reading: The subject is the LORD
  alternative_readings:
  - Impersonal/passive sense implied by context
  rationale: Although the verb's subject is not restated explicitly, the nearest and most coherent antecedent is 'the hand of the LORD,' that is, the LORD acting upon Ezekiel. This also matches the broader context of Ezekiel's divinely imposed and divinely removed muteness.
