translation:
  language: es
  text: Y ella dio al rey ciento veinte talentos de oro, y especias en gran abundancia, y piedras preciosas. Nunca había habido especias como aquellas[a] que la reina de Sabá dio al rey Salomón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nunca volvieron a haber especias como aquellas que la reina de Sabá dio al rey Salomón». El hebreo puede entenderse como una afirmación de calidad sin igual hasta ese momento, o más ampliamente como un regalo sin paralelo en la memoria de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֵּן
  english_pob_choice: And she gave
  chosen_spanish: Y ella dio
  alternatives_spanish:
  - Entonces dio
  - Y dio
  lexicon: HALOT 5414
  rationale: El wayyiqtol marca avance narrativo; en español, 'Y ella dio' conserva la secuencia sin forzar una perífrasis innecesaria.
- source_word: לַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey,
  - para el rey
  lexicon: HALOT 4428
  rationale: El destinatario se expresa naturalmente con 'al rey' en español, manteniendo el objeto indirecto del verbo dar.
- source_word: מֵאָה וְעֶשְׂרִים כִּכַּר זָהָב
  english_pob_choice: one hundred twenty talents of gold
  chosen_spanish: ciento veinte talentos de oro
  alternatives_spanish:
  - ciento veinte medidas de oro
  - ciento veinte cargas de oro
  lexicon: HALOT 3603
  rationale: כִּכָּר es una unidad de peso; 'talentos' es el equivalente técnico tradicional y preciso en español bíblico.
- source_word: וּבְשָׂמִים
  english_pob_choice: and spices
  chosen_spanish: y especias
  alternatives_spanish:
  - y aromas
  - y perfumes
  lexicon: HALOT 1314
  rationale: El término abarca aromáticos/especias; 'especias' es la opción más clara y amplia en español, sin estrechar el sentido a perfume.
- source_word: לָרֹב מְאֹד
  english_pob_choice: in great abundance
  chosen_spanish: en gran abundancia
  alternatives_spanish:
  - en mucha abundancia
  - en extremo abundancia
  lexicon: HALOT 7230; 3966
  rationale: La frase intensifica cantidad; 'en gran abundancia' transmite la fuerza enfática de לָרֹב מְאֹד con español natural.
- source_word: וְאֶבֶן יְקָרָה
  english_pob_choice: and precious stones
  chosen_spanish: y piedras preciosas
  alternatives_spanish:
  - y piedra preciosa
  - y gemas
  lexicon: HALOT 68; 3368
  rationale: Aunque el hebreo usa singular colectivo, el español idiomático requiere plural para la lista de obsequios lujosos.
- source_word: וְלֹא הָיָה
  english_pob_choice: There had never been
  chosen_spanish: No había habido
  alternatives_spanish:
  - Nunca había habido
  - No hubo habido
  lexicon: HALOT 1961
  rationale: El hebreo expresa inexistencia hasta ese momento; el pluscuamperfecto español 'No había habido' refleja bien la comparación retrospectiva.
- source_word: כַּבֹּשֶׂם הַהוּא
  english_pob_choice: spices like those
  chosen_spanish: especias como aquellas
  alternatives_spanish:
  - tal especia
  - especias semejantes
  lexicon: HALOT 1314
  rationale: El כ comparative se conserva con 'como'; 'aquellas' remite claramente al referente previo sin añadir matiz inexistente.
- source_word: אֲשֶׁר נָתְנָה מַלְכַּת שְׁבָא
  english_pob_choice: that the queen of Sheba gave
  chosen_spanish: que la reina de Sabá dio
  alternatives_spanish:
  - que había dado la reina de Sabá
  - que entregó la reina de Sabá
  lexicon: HALOT 4436; 7614; 5414
  rationale: La relativa identifica las especias incomparables; el pretérito simple es natural en español tras la referencia retrospectiva del inicio del versículo.
- source_word: לַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: to King Solomon
  chosen_spanish: al rey Salomón
  alternatives_spanish:
  - a Salomón, el rey
  - al rey, Salomón
  lexicon: HALOT 8010
  rationale: En español bíblico moderno, 'el rey Salomón' es claro y fluido, preservando el título y el nombre sin artificio.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo WLC y concuerda con el audit trail inglés POB en la estructura del versículo, la unidad de peso 'talentos', el valor colectivo de 'especias' y la ambigüedad temporal/comparativa del cierre, preservada mediante nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - '''Talentos'' mantiene la equivalencia metrológica tradicional para כִּכָּר.'
  - Se evita 'Cristo' y cualquier terminología confesional no presente en el verso.
  - '''Español'' mantiene ''especias'' y no ''perfumes'' para no restringir el campo semántico de בְשָׂמִים.'
