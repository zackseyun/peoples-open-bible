    text: Or 'When he is tried, let him go out wicked.' The Hebrew רָשָׁע can mean 'wicked,' but in this courtroom context it likely carries the sense 'guilty.'
    reason: lexical_alternative
  - marker: b
    text: Or 'let his prayer be counted as sin.'
    reason: lexical_alternative
