translation:
  language: es
  text: Cuando David y sus hombres llegaron a Siclag el tercer día[a], los amalecitas habían hecho una incursión contra el Néguev y contra Siclag, habían atacado a Siclag y la habían quemado con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «contra el sur»; el hebreo נֶגֶב puede designar tanto la región meridional en general como la zona específica del Néguev.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now when
  chosen_spanish: Y aconteció que, cuando
  alternatives_spanish:
  - Y sucedió que, cuando
  - Y fue que, cuando
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce un nuevo marco circunstancial. En español, «Y aconteció que, cuando» conserva ese arranque narrativo sin sonar mecánico y mantiene el carácter de transición temporal.
- source_word: בְּבֹא
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - entraron
  lexicon: HALOT
  rationale: El infinitivo constructo con ב marca el momento de la llegada de David y sus hombres. En español, «llegaron» expresa con naturalidad ese punto de llegada al lugar.
- source_word: וַאֲנָשָׁיו
  english_pob_choice: and his men
  chosen_spanish: y sus hombres
  alternatives_spanish:
  - y su gente
  - y sus compañeros
  lexicon: HALOT
  rationale: En este contexto militar, אֲנָשִׁים se refiere al grupo de combatientes/seguidores de David. «Hombres» preserva la referencia concreta del texto.
- source_word: צִקְלַג
  english_pob_choice: Ziklag
  chosen_spanish: Siclag
  alternatives_spanish:
  - Ziclag
  - Ziklag
  lexicon: HALOT
  rationale: Se usa la transliteración española tradicional «Siclag», que es clara para lectores bíblicos en español y corresponde al topónimo del original.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - el tercer día
  lexicon: HALOT
  rationale: La expresión temporal hebrea se vierte de forma idiomática en español como «al tercer día», conservando el valor de marco temporal.
- source_word: וַעֲמָלֵקִי
  english_pob_choice: the Amalekites
  chosen_spanish: los amalecitas
  alternatives_spanish:
  - los amalecitas raidores
  - los de Amalec
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular colectiva, el verbo plural muestra un sujeto grupal. En español, el plural «los amalecitas» expresa mejor la referencia colectiva.
- source_word: פָשְׁטוּ
  english_pob_choice: had made a raid against
  chosen_spanish: habían hecho una incursión contra
  alternatives_spanish:
  - habían asaltado
  - habían saqueado
  lexicon: HALOT
  rationale: El verbo en contexto militar denota una acción de incursión/raid. «Hacer una incursión» conserva el matiz de ataque organizado sin reducirlo solo a saqueo.
- source_word: אֶל נֶגֶב
  english_pob_choice: against the Negev
  chosen_spanish: contra el Néguev
  alternatives_spanish:
  - hacia el Néguev
  - contra el sur
  lexicon: HALOT
  rationale: נֶגֶב puede significar el sur en general o la región del Néguev. Aquí se conserva el topónimo regional «Néguev», y la preposición «contra» refleja el movimiento hostil del raid.
- source_word: וְאֶל צִקְלַג
  english_pob_choice: and against Ziklag
  chosen_spanish: y contra Siclag
  alternatives_spanish:
  - y sobre Siclag
  - y contra Ziklag
  lexicon: HALOT
  rationale: La segunda יעד del ataque repite la preposición de hostilidad. Se mantiene la paralela «contra Siclag» para reflejar la estructura del hebreo.
- source_word: וַיַּכּוּ אֶת צִקְלַג
  english_pob_choice: they had struck Ziklag
  chosen_spanish: habían atacado a Siclag
  alternatives_spanish:
  - habían herido a Siclag
  - habían golpeado a Siclag
  lexicon: HALOT
  rationale: 'נכה es amplio: ''golpear, herir, atacar''. En este contexto, «atacado» comunica mejor la agresión militar general que el golpe físico aislado.'
- source_word: וַיִּשְׂרְפוּ אֹתָהּ בָּאֵשׁ
  english_pob_choice: and burned it with fire
  chosen_spanish: y la habían incendiado con fuego
  alternatives_spanish:
  - y la habían quemado con fuego
  - y la habían prendido fuego
  lexicon: HALOT
  rationale: El hebreo enfatiza la quema usando «con fuego». «Incendiado con fuego» preserva ese énfasis y suena natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: 'El draft sigue el sentido narrativo del hebreo y coincide sustancialmente con el auditorial inglés: llegada de David y sus hombres al tercer día, incursión amalecita previa, ataque a Siclag y quema con fuego. Se conserva la ambigüedad léxica de נֶגֶב mediante nota, como en el POB inglés.'
  spanish_consistency_notes:
  - Se prefirió «Siclag» para el topónimo, en línea con uso bíblico habitual en español.
  - Se mantuvo el contraste temporal con pluscuamperfecto compuesto («habían hecho», «habían atacado», «habían incendiado») para reflejar acción anterior a la llegada de David.
  - «Incursión» se eligió para פָשְׁטוּ por precisión militar y por armonía con el registro bíblico moderno.
