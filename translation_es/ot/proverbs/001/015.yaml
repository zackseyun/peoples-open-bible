translation:
  language: es
  text: Hijo mío[a], no vayas por el camino con ellos; aparta tu pie de su senda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''no vayas por el camino con ellos''. El hebreo usa lenguaje de ''camino'' propio de la sabiduría para un curso de vida, no solo una ruta literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Mi hijo
  - Hijo mío
  lexicon: HALOT
  rationale: El vocativo בן con sufijo de primera persona singular se expresa de manera natural en español como 'Hijo mío'. Conserva el tono paternal de exhortación sapiencial y mantiene el masculino singular del hebreo.
- source_word: אַל תֵּלֵךְ
  english_pob_choice: do not walk
  chosen_spanish: no vayas
  alternatives_spanish:
  - no camines
  - no andes
  lexicon: HALOT
  rationale: הלך puede ser 'ir' o 'caminar'. Dado que el español 'no vayas por el camino' transmite bien la prohibición y su posible sentido figurado de conducta, se eligió una forma idiomática sin perder la imagen.
- source_word: בְּדֶרֶךְ
  english_pob_choice: in the way
  chosen_spanish: por el camino
  alternatives_spanish:
  - en el camino
  - en la senda
  - por la senda
  lexicon: HALOT
  rationale: דרך puede referirse tanto a una ruta literal como a un curso de vida. 'Por el camino' conserva la imagen espacial y permite la resonancia sapiencial de manera/conducta sin sonar forzado en español.
- source_word: אִתָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  - acompañándolos
  lexicon: HALOT
  rationale: La preposición más directa y natural para el valor de la expresión es 'con ellos'. Preserva la advertencia contra la asociación con los impíos del contexto inmediato.
- source_word: מְנַע
  english_pob_choice: keep
  chosen_spanish: aparta
  alternatives_spanish:
  - retrae
  - contén
  - mantén alejado
  lexicon: HALOT
  rationale: El imperativo de מנע pide una acción de restricción. En español, 'aparta tu pie' comunica con claridad la idea de retirar deliberadamente el pie del peligro, manteniendo el paralelismo con la imagen corporal del hebreo.
- source_word: רַגְלְךָ
  english_pob_choice: your foot
  chosen_spanish: tu pie
  alternatives_spanish:
  - tus pies
  - tu paso
  lexicon: HALOT
  rationale: El hebreo usa singular; por eso se conserva 'tu pie' en singular. En español es una imagen comprensible y fiel, con fuerza exhortativa.
- source_word: מִנְּתִיבָתָם
  english_pob_choice: from their path
  chosen_spanish: de su senda
  alternatives_spanish:
  - de su camino
  - de su ruta
  - de su vereda
  lexicon: HALOT
  rationale: נתיבה es 'senda' o 'camino trazado'. 'Senda' evita repetir exactamente 'camino' y reproduce bien el paralelo poético con דרך, manteniendo la metáfora del andar moral.
translation_notes:
  revision_awareness: El inglés POB opta por una equivalencia óptima con 'walk in the way' y añade una nota sobre el valor sapiencial de 'way'. La versión española mantiene esa misma tensión entre imagen literal y curso de vida, pero ajusta el verbo a una forma más natural en español ('no vayas') y conserva la advertencia con paralelo corporal ('aparta tu pie').
  spanish_consistency_notes:
  - Se mantiene el vocativo en masculino singular como en el hebreo.
  - Se preserva la metáfora sapiencial de 'camino/senda' sin convertirla en una explicación interpretativa dentro del texto.
  - '''Pie'' se deja en singular para reflejar el hebreo y el paralelismo poético.'
  - La nota a[a] recoge la alternativa literal sin perder la lectura figurada principal.
