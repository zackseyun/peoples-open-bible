revisions:
- from: 'Así que contendí con ellos y los maldije[a]; golpeé a algunos de los hombres y les arranqué el cabello, y los hice jurar por Dios: «No darán sus hijas a los hijos de ellos[b], ni tomarán las hijas de ellos para sus hijos ni para ustedes mismos».'
  to: 'Así que contendí con ellos y los maldije; golpeé a algunos de los hombres y les arranqué el cabello, y los hice jurar por Dios[a]: «No darán sus hijas a sus hijos[b], ni tomarán a ninguna de sus hijas para sus hijos o para ustedes mismos».'
  rationale: 'Se reubica la nota [a] al verbo correcto («los hice jurar por Dios»), que es donde pertenece la alternativa léxica documentada. Además, se suavizan dos giros poco naturales del español sin apartarse del hebreo ni del rastro de auditoría inglés: «a sus hijos / a ninguna de sus hijas» mejora la fluidez, y «o para ustedes mismos» expresa mejor la extensión final de la prohibición.'
