revisions:
- from: 'Y todo el pueblo quedó sobremanera asombrado, y, inclinándose, adoraron a Dios y dijeron unánimemente: «Bendito eres tú, nuestro Dios, que hoy has reducido a nada[a] a los enemigos de tu pueblo».'
  to: 'Todo el pueblo quedó sobremanera asombrado y, inclinándose, adoró a Dios y dijo unánimemente: «Bendito eres tú, nuestro Dios, que hoy has reducido a nada[a] a los enemigos de tu pueblo».'
  rationale: Se ajusta la concordancia para que el colectivo «pueblo» rija verbos en singular de manera consistente, mejorando la naturalidad sin apartarse del griego. También se mejora la alternativa de la nota al pie para que el español sea idiomático y siga reflejando la amplitud semántica de ἐξουδενώσας.
