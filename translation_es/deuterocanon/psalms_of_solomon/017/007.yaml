review_pass:
  verdict: revise
  source_alignment_summary: 'La base del borrador sigue bien el griego: «no glorificaron» refleja οὐκ ἐδόξασαν, «un reino» refleja βασίλειον, y «en lugar de su exaltación» conserva la compacidad de ἀντὶ ὕψους αὐτῶν conforme a la revisión final del audit trail. Sin embargo, dos elecciones españolas no representan de la mejor manera el matiz fuente: «nombre honorable» suena como cualidad ética del nombre más que como nombre honrado/estimado por otros para τὸ ἔντιμον, y «con gloria» es menos fiel y menos natural que «en gloria» para ἐν δόξῃ.'
  spanish_quality_summary: El texto es mayormente claro, pero «tu nombre honorable» resulta algo tieso y poco idiomático en español bíblico actual. «Con gloria establecieron» también suena ligeramente forzado. Un ajuste menor mejora naturalidad y precisión sin apartarse del griego ni del historial POB.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. La revisión propuesta mantiene «glorificaron», evita paráfrasis interpretativas como «arrogancia», y conserva el sentido compacto del original. Se prefiere «tu nombre honrado» por mejor correspondencia con ἔντιμον en español.
  issues:
  - severity: medium
    issue: «tu nombre honorable» no es la mejor equivalencia de τὸ ὄνομά σου τὸ ἔντιμον
    rationale: En español, «honorable» suele describir a alguien digno de honor, mientras que el griego ἔντιμον aquí encaja mejor como «honrado» o «estimado», es decir, un nombre tenido en honra. «Nombre honrado» suena más natural y más cercano al matiz pasivo/relacional preservado en el inglés POB «honored name».
  - severity: low
    issue: «con gloria» para ἐν δόξῃ es menos natural que «en gloria»
    rationale: La preposición ἐν se refleja más directamente con «en», y la propia revisión inglesa final volvió a «in glory». «En gloria» conserva la compacidad del original y evita un giro instrumental menos exacto.
  - severity: low
    issue: La nota alternativa actual no prioriza la mejor opción española
    rationale: Si el texto principal se corrige a «tu nombre honrado», la alternativa más útil pasa a ser «tu nombre estimado». Conviene alinear la nota con la decisión léxica revisada.
  revised_spanish_text: Y no glorificaron tu nombre honrado[a]; en gloria establecieron un reino en lugar de su exaltación.
  revised_footnotes:
