translation:
  language: es
  text: 'Y dije[a]: «Oigan ahora, jefes de Jacob y gobernantes de la casa de Israel: ¿no les corresponde a ustedes conocer la justicia?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juicio». El hebreo mishpat puede denotar juicio legal, justicia o lo recto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: And I said
  chosen_spanish: Y dije
  alternatives_spanish:
  - Entonces dije
  - Dije
  lexicon: HALOT
  rationale: El waw consecutivo enlaza el discurso con la escena anterior sin exigir un matiz de secuencia fuerte en español. «Y dije» conserva la conexión narrativa de forma natural y fiel.
- source_word: שִׁמְעוּ נָא
  english_pob_choice: Hear now
  chosen_spanish: Oigan ahora
  alternatives_spanish:
  - Escuchen ahora
  - Oigan, por favor
  lexicon: HALOT
  rationale: El imperativo plural pide atención profética. «Oigan» comunica el valor de שׁמע en español actual; «ahora» refleja la urgencia de נָא mejor que una fórmula de cortesía.
- source_word: רָאשֵׁי יַעֲקֹב
  english_pob_choice: heads of Jacob
  chosen_spanish: cabezas de Jacob
  alternatives_spanish:
  - líderes de Jacob
  - jefes de Jacob
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de «cabezas», que designa a quienes están a la cabeza del pueblo. Mantenerla evita borrar el color figurado del texto fuente.
- source_word: וּקְצִינֵי בֵּית יִשְׂרָאֵל
  english_pob_choice: and rulers of the house of Israel
  chosen_spanish: y gobernantes de la casa de Israel
  alternatives_spanish:
  - y jefes de la casa de Israel
  - y oficiales de la casa de Israel
  lexicon: HALOT
  rationale: קצין puede abarcar líder, oficial o gobernante. «Gobernantes» comunica bien la autoridad pública implicada en el reproche profético, y «casa de Israel» conserva la fórmula nacional/covenantal.
- source_word: הֲלוֹא לָכֶם
  english_pob_choice: is it not for you
  chosen_spanish: ¿no les corresponde a ustedes
  alternatives_spanish:
  - ¿no es asunto de ustedes
  - ¿no les toca a ustedes
  lexicon: HALOT
  rationale: La construcción expresa deber o incumbencia, no mera posesión. «Les corresponde a ustedes» en español transmite con naturalidad la idea de responsabilidad propia del cargo.
- source_word: לָדַעַת
  english_pob_choice: to know
  chosen_spanish: conocer
  alternatives_spanish:
  - saber
  - entender
  lexicon: HALOT
  rationale: En este contexto judicial y de liderazgo, «conocer» suena más idiomático que un infinitivo abstracto como «saber», y conserva la amplitud de ידע sin reducirla a solo comprensión intelectual.
- source_word: הַמִּשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - lo justo
  lexicon: HALOT
  rationale: En este reproche a dirigentes, מִשְׁפָּט apunta a la justicia que deben administrar. «La justicia» mantiene el sentido ético-jurídico que el audit trail inglés prioriza, sin perder la posible resonancia de «juicio».
theological_decisions:
- issue: Alcance de מִשְׁפָּט en un contexto de liderazgo y juicio
  english_pob_reading: justice
  chosen_spanish_reading: la justicia
  alternative_spanish_readings:
  - el juicio
  - lo justo
  rationale: La frase no trata solo de un acto judicial aislado, sino de la obligación de gobernar rectamente. «La justicia» expresa mejor la responsabilidad pública y ética que se les reprocha a los líderes.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con la revisión más reciente: no se identificaron cambios necesarios respecto del criterio aprobado en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre «cabezas de Jacob» y «gobernantes de la casa de Israel» para reflejar el hebreo.
  - Se evitó reemplazar la metáfora de «cabezas» por una glosa explicativa en el texto principal.
  - El tratamiento de מִשְׁפָּט conserva la tensión semántica con una nota breve, siguiendo el precedente del texto inglés.
  - Se usó puntuación de cita y pregunta acorde al español contemporáneo y al tono profético del pasaje.
