translation:
  language: es
  text: 'Y le dijeron: «Dinos, ¿con qué autoridad haces estas cosas? ¿O quién es el que te dio esta autoridad?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ / εἶπαν ⸂λέγοντες πρὸς αὐτόν⸃
  english_pob_choice: And they said to him
  chosen_spanish: Y le dijeron
  alternatives_spanish:
  - Entonces le dijeron
  - Y dijeron a él
  lexicon: BDAG
  rationale: La coordinación simple preserva el flujo narrativo. El participio λέγοντες funciona como introducción redundante al discurso; en español natural se integra en «le dijeron» sin perder el sentido de habla dirigida a Jesús.
- source_word: Εἰπὸν ἡμῖν
  english_pob_choice: Tell us
  chosen_spanish: Dinos
  alternatives_spanish:
  - Háblanos
  - Di a nosotros
  lexicon: BDAG
  rationale: El imperativo aoristo de λέγω se expresa de forma natural como «dinos» en español actual, manteniendo el tono directo y desafiante del original.
- source_word: ἐν ποίᾳ ἐξουσίᾳ
  english_pob_choice: by what authority
  chosen_spanish: con qué autoridad
  alternatives_spanish:
  - por qué autoridad
  - en qué autoridad
  lexicon: BDAG
  rationale: Aunque ἐν con dativo puede expresar base o esfera de acción, en español la pregunta se formula idiomáticamente como «con qué autoridad». «Por qué autoridad» suena menos natural aquí y puede insinuar causa más que autorización.
- source_word: ταῦτα ποιεῖς
  english_pob_choice: are you doing these things
  chosen_spanish: haces estas cosas
  alternatives_spanish:
  - estás haciendo estas cosas
  - realizas estas cosas
  lexicon: BDAG
  rationale: Se conserva el plural demostrativo «estas cosas» para reflejar ταῦτα. El presente simple español es suficiente en esta pregunta inmediata y evita una progresividad innecesaria.
- source_word: τίς ἐστιν ὁ δούς σοι τὴν ἐξουσίαν ταύτην
  english_pob_choice: who is the one who gave you this authority
  chosen_spanish: quién es el que te dio esta autoridad
  alternatives_spanish:
  - quién fue el que te dio esta autoridad
  - quién te dio esta autoridad
  lexicon: BDAG
  rationale: 'El participio sustantivado ὁ δούς se vierte con una construcción explícita: «el que te dio». Esto preserva su fuerza nominal sin sonar forzado en español. Se mantiene «esta autoridad» para reproducir τὴν ἐξουσίαν ταύτην.'
theological_decisions:
- issue: Sentido de ἐξουσία en la confrontación del templo
  english_pob_reading: authority
  chosen_spanish_reading: autoridad
  alternative_spanish_readings:
  - poder
  - derecho
  rationale: El contexto trata de legitimidad y autorización para actuar, no meramente de capacidad. «Autoridad» conserva mejor el peso institucional y teológico de la pregunta.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: 'El texto inglés auditado coincide plenamente con el griego: mantiene la introducción narrativa, la doble formulación de la pregunta y el foco en la fuente de la autoridad. No se documentaron revisiones ni notas textuales, así que la propuesta española sigue de cerca la estructura del original con adaptación idiomática natural.'
  spanish_consistency_notes:
  - Se usa «autoridad» de manera consistente para ἐξουσία.
  - Se conserva el plural «estas cosas» para ταῦτα.
  - Se evita el calco «en qué autoridad» porque no es idiomático en español.
  - La forma verbal «dijo/dijeron» se mantiene sobria y directa, adecuada al tono de interrogatorio.
