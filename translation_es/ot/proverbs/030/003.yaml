translation:
  language: es
  text: Y no he aprendido sabiduría, ni conozco el conocimiento del Santo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el conocimiento de seres santos». La forma hebrea es plural, pero en Proverbios puede referirse a Dios como «el Santo».'
    reason: alternative_reading
lexical_decisions:
- source_word: לָמַדְתִּי
  english_pob_choice: have not learned
  chosen_spanish: no he aprendido
  alternatives_spanish:
  - no aprendí
  lexicon: HALOT
  rationale: El perfecto hebreo expresa aquí una carencia vigente en el hablante; el pretérito perfecto compuesto español conserva bien ese valor de resultado presente, en paralelo con el inglés POB.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría práctica
  - prudencia
  lexicon: HALOT
  rationale: En Proverbios, חָכְמָה designa de manera estándar la sabiduría moral y práctica; 'sabiduría' es la opción más directa y natural en español.
- source_word: דַעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - saber
  lexicon: HALOT
  rationale: '''Conocimiento'' refleja mejor el sustantivo y mantiene la correspondencia con el verbo ידע (''conocer'') en la segunda mitad del versículo.'
- source_word: קְדֹשִׁים
  english_pob_choice: the Holy One
  chosen_spanish: el Santo
  alternatives_spanish:
  - los santos
  - los santos seres
  - el Santísimo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, en este contexto sapiencial puede funcionar como referencia singular a Dios. 'El Santo' preserva esa lectura sin ocultar la tensión del plural hebreo; el plural queda reconocido en la nota.
- source_word: אֵדָע
  english_pob_choice: do I know
  chosen_spanish: conozco
  alternatives_spanish:
  - sé
  - llego a conocer
  lexicon: HALOT
  rationale: El imperfecto 1cs hebreo aquí expresa una afirmación negativa presente coordinada con la primera cláusula. 'Conozco' en presente mantiene la paralelización natural del español con 'no he aprendido'.
theological_decisions:
- issue: 'Sentido de קְדֹשִׁים: singular divino o plural literal'
  english_pob_reading: 'singular reference to God: ''the Holy One'''
  chosen_spanish_reading: 'referencia singular a Dios: ''el Santo'''
  alternative_spanish_readings:
  - '''los santos'''
  - '''seres santos'''
  rationale: La forma plural hebrea es real y debe permanecer auditable, pero el contexto de Proverbios favorece una referencia a Dios. Traducir 'el Santo' mantiene esa lectura probable sin borrar la ambigüedad textual documentada.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente; el pasaje mostró alta concordancia en la verificación cruzada y quedó sin cambios en la pasada más reciente.
  spanish_consistency_notes:
  - Se mantuvo 'sabiduría' y 'conocimiento' para conservar el paralelismo léxico del hebreo.
  - '''El Santo'' evita introducir terminología eclesiástica ajena al hebreo y sigue la decisión auditada del POB inglés.'
  - El uso de 'no he aprendido' y 'conozco' procura un español natural que conserve el valor confesional presente del original.
