  to: Entonces todos los pueblos de la tierra verán que el nombre de Yahvé[a] ha sido proclamado sobre ti, y te temerán.
  rationale: Se hace una reparación pequeña para mejorar la legibilidad española del modismo נִקְרָא עָלֶיךָ sin perder su imagen teológica. «Ha sido proclamado sobre ti» conserva la idea de que el nombre divino está públicamente sobre Israel, mientras la nota preserva tanto la literalidad hebrea como la alternativa idiomática tradicional.
