base_translation:
  language: en
  yaml_path: translation/ot/1_kings/020/036.yaml
  text: Then he said to him[a], “Because you have not listened to the voice of Yahweh, behold, when you depart from me, the lion will strike you down.” And when he departed from him[c][b], the lion found him and struck him down.
  footnotes:
  - marker: a
    text: 'Hebrew: ''have not listened to the voice of the LORD''; the phrase can also carry the sense ''have not obeyed the voice of the LORD.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'the lion will kill you' / 'the lion killed him'; the Hebrew verb means 'strike' and in this context implies a fatal blow.
    reason: lexical_alternative
  - marker: c
    text: '''the LORD'' renders the divine name YHWH.'
    reason: alternative_reading
