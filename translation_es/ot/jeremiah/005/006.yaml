base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/005/006.yaml
  text: Therefore a lion from the forest strikes them down[a]; a wolf of the deserts devastates them; a leopard keeps watch over their cities. Everyone who goes out from them will be torn apart, because their transgressions are many[b]; their apostasies have grown strong.
  footnotes:
  - marker: a
    text: Or 'a wolf of the evenings.' The Hebrew phrase זְאֵב עֲרָבוֹת has also been understood in connection with evening-time predation, but here it is rendered 'a wolf of the deserts' following the more straightforward sense of the noun as desert plains/steppe regions.
    reason: lexical_alternative
  - marker: b
    text: Or 'their backslidings.' The Hebrew term refers to repeated turnings away from covenant faithfulness.
    reason: lexical_alternative
