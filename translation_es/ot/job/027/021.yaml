translation:
  language: es
  text: El viento del oriente lo arrastra[a], y se va; lo barre de su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «lo arremolina de su lugar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׂאֵהוּ
  english_pob_choice: carries him away
  chosen_spanish: lo arrastra
  alternatives_spanish:
  - lo lleva
  - lo transporta
  - lo arrebata
  lexicon: HALOT
  rationale: נשׂא expresa llevar/cargar; en este contexto poético de juicio, «lo arrastra» comunica desplazamiento forzado con naturalidad en español, manteniendo la imagen de ser llevado por una fuerza externa.
- source_word: קָדִים
  english_pob_choice: the east wind
  chosen_spanish: el viento del oriente
  alternatives_spanish:
  - el viento de oriente
  - el viento oriental
  - un viento del oriente
  lexicon: HALOT
  rationale: קדים se refiere aquí al viento del este, no solo a la dirección. «Viento del oriente» preserva el agente meteorológico y el matiz destructivo del hebreo poético.
- source_word: וְיֵלַךְ
  english_pob_choice: and he is gone
  chosen_spanish: y desaparece
  alternatives_spanish:
  - y se va
  - y se aleja
  - y se marcha
  lexicon: HALOT
  rationale: 'הלך aquí sigue al ser arrebatado por el viento y funciona como resultado: ya no está. «Desaparece» expresa esa fuerza resultativa en español sin añadir contenido ajeno.'
- source_word: וישׂערהוּ
  english_pob_choice: it sweeps him away
  chosen_spanish: lo barre lejos
  alternatives_spanish:
  - lo arremolina lejos
  - lo lleva en remolino
  - lo sacude lejos
  lexicon: HALOT
  rationale: סער connota agitación, arrebato y movimiento violento de tipo tempestuoso. «Lo barre lejos» conserva la violencia del movimiento y se ajusta al inglés auditado «sweeps him away», evitando una paráfrasis excesiva.
- source_word: ממקומו
  english_pob_choice: from his place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - desde su lugar
  - de su sitio
  - fuera de su lugar
  lexicon: HALOT
  rationale: מקום es «lugar» de forma directa. «De su lugar» es la equivalencia más transparente y natural en español, manteniendo la referencia espacial concreta.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo WLC y el audit trail inglés, conservando la progresión poética: viento del oriente → arrastre → desaparición → expulsión desde su lugar. Se adopta «barre» en la segunda cola para reflejar el hebreo סער y la revisión inglesa final «sweeps him away».'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o cualquier sustitución teológica innecesaria porque el versículo no contiene el nombre divino.
  - «Viento del oriente» conserva el valor meteorológico del hebreo קדים, en línea con el POB inglés.
  - «Desaparece» traduce el resultado de וְיֵלַךְ de manera idiomática en español, sin borrar el movimiento implícito.
  - «Lo barre lejos» mantiene la violencia del verbo סער y deja abierta la alternativa de remolino indicada en la nota.
