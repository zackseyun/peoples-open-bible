translation:
  language: es
  text: Él guarda sana sabiduría[a] para los rectos; es escudo para los que andan en integridad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juicio sólido», o «sabiduría eficaz», o «recursos para el buen resultado»; el término hebreo puede incluir la idea de sabiduría eficaz que conduce al bienestar.
    reason: lexical_alternative
  - marker: b
    text: O «intachabilidad» o «plenitud» para «integridad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצָפַן
  english_pob_choice: stores up
  chosen_spanish: guarda
  alternatives_spanish:
  - atesora
  - reserva
  - guarda en depósito
  lexicon: HALOT
  rationale: צפן expresa la idea de guardar o reservar algo para después. En español, «guarda» comunica bien la acción de conservar para un uso futuro y evita una formulación demasiado pesada.
- source_word: לַיְשָׁרִים
  english_pob_choice: for the upright
  chosen_spanish: para los rectos
  alternatives_spanish:
  - para los upright
  - para los justos
  - para los honestos
  lexicon: HALOT
  rationale: יְשָׁרִים describe a personas moralmente rectas. «Rectos» preserva el valor ético del término y funciona de manera natural en español bíblico contemporáneo.
- source_word: תּוּשִׁיָּה
  english_pob_choice: sound wisdom
  chosen_spanish: sabiduría sólida
  alternatives_spanish:
  - sabiduría sana
  - buen juicio
  - sabiduría eficaz
  - recursos de sabiduría
  lexicon: HALOT
  rationale: תושיה puede abarcar sabiduría eficaz, buen juicio o capacidad que produce bienestar. «Sabiduría sólida» intenta conservar la fuerza de la expresión sin reducirla solo a juicio práctico ni volverla demasiado abstracta.
- source_word: מָגֵן
  english_pob_choice: a shield
  chosen_spanish: escudo
  alternatives_spanish:
  - protección
  - defensa
  - escudo protector
  lexicon: HALOT
  rationale: 'El sustantivo es literal: «escudo». Mantener la imagen concreta respeta la metáfora del texto y su paralelismo poético.'
- source_word: לְהֹלְכֵי
  english_pob_choice: to those who walk
  chosen_spanish: para los que andan
  alternatives_spanish:
  - para los que caminan
  - para quienes viven
  - para los que se conducen
  lexicon: HALOT
  rationale: הלך en participio describe un modo habitual de vida. «Andan» conserva la metáfora ética del caminar como conducta.
- source_word: תֹם
  english_pob_choice: integrity
  chosen_spanish: integridad
  alternatives_spanish:
  - blamelessness
  - entereza
  - plenitud
  - rectitud
  lexicon: HALOT
  rationale: תֹם denota integridad, completitud o blamelessness en la conducta. «Integridad» es claro en español y mantiene la fuerza ética del sustantivo.
theological_decisions:
- issue: Relación entre las dos cláusulas
  english_pob_reading: The verse presents the LORD as both storing up wisdom for the upright and being a shield to those who live with integrity.
  chosen_spanish_reading: El versículo presenta a Yahvé como quien guarda sabiduría sólida para los rectos y como escudo para los que andan en integridad.
  alternative_spanish_readings:
  - Un escudo está guardado para los que andan en integridad.
  - Él guarda sabiduría sólida para los rectos; un escudo para los que andan en integridad.
  rationale: El hebreo coloca מָגֵן de manera appositiva tras la primera cláusula, y el contexto sapiencial favorece entender a Yahvé como sujeto implícito de ambas acciones. En español, explicitarlo da una lectura fluida sin perder el paralelismo ni la tensión sintáctica del hebreo.
  doctrine_reference: Prov 2:7; sabiduría divina y protección de Yahvé
translation_notes:
  revision_awareness: La revisión más reciente del texto fuente inglés indicó que no se requirieron cambios; por eso este borrador español sigue de cerca el sentido ya auditado, manteniendo la misma estructura semántica y las alternativas léxicas relevantes.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al criterio del proyecto para יהוה.
  - Se prefirió «rectos» y «integridad» por ser equivalentes éticos naturales en español bíblico contemporáneo.
  - Se mantuvo la metáfora concreta de «escudo» y el verbo de acción «guarda» para conservar el paralelismo poético.
  - La nota de pie a sobre תּוּשִׁיָּה se ancla en «sabiduría sólida» porque el español requiere una formulación explicativa para no perder la amplitud semántica del término.
