translation:
  language: es
  text: Yahvé hizo conforme a la palabra de Moisés, y quitó el enjambre[a] de Faraón, de sus siervos y de su pueblo; no quedó ni uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la plaga de enjambres de moscas'. El hebreo עָרֹב designa la plaga de insectos voladores en masa, pero no precisa la especie.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: DOCTRINE.md contested terms / Tetragrammaton
  rationale: Se conserva el nombre propio divino y no se sustituye por un título. En español, 'Yahvé' es la forma estándar del proyecto para יְהוָה, en continuidad con el razonamiento auditado del inglés POB.
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - obró
  - realizó
  lexicon: HALOT
  rationale: עשה es un verbo amplio ('hacer'). En la construcción 'hacer conforme a la palabra de...' el español natural y fiel es 'hizo conforme a', que conserva la relación con la palabra de Moisés sin sobretraducir.
- source_word: כִּדְבַר מֹשֶׁה
  english_pob_choice: according to Moses' word
  chosen_spanish: conforme a la palabra de Moisés
  alternatives_spanish:
  - según la palabra de Moisés
  - como dijo Moisés
  lexicon: HALOT
  rationale: דבר funciona aquí como 'palabra' o 'declaración'. 'Conforme a la palabra de Moisés' mantiene el paralelismo formal del hebreo y la lectura auditada en inglés, evitando una paráfrasis más libre.
- source_word: וַיָּסַר
  english_pob_choice: removed
  chosen_spanish: quitó
  alternatives_spanish:
  - retiró
  - apartó
  - eliminó
  lexicon: HALOT
  rationale: סור en causativo puede expresar 'quitar/retirar'. 'Quitó' es natural en español y conserva la idea de apartar la plaga de la zona afectada.
- source_word: הֶעָרֹב
  english_pob_choice: the swarm
  chosen_spanish: el enjambre
  alternatives_spanish:
  - el swarm
  - la plaga de insectos
  - el enjambre de moscas
  lexicon: HALOT
  rationale: El término hebreo designa la plaga de insectos o insectos voladores en masa, sin precisar especie. 'Enjambre' mantiene la indeterminación del original; la especificación 'de moscas' queda como alternativa interpretativa, no como certeza del texto.
- source_word: מִפַּרְעֹה מֵעֲבָדָיו וּמֵעַמּוֹ
  english_pob_choice: from Pharaoh, from his servants, and from his people
  chosen_spanish: de Faraón, de sus siervos y de su pueblo
  alternatives_spanish:
  - de Faraón, de sus servidores y de su pueblo
  - apartándolo de Faraón, de sus siervos y de su pueblo
  lexicon: HALOT
  rationale: Se conserva la repetición preposicional del hebreo de manera fluida en español. 'Siervos' sigue el registro bíblico del conjunto social bajo Faraón y evita introducir un matiz administrativo más moderno.
- source_word: לֹא נִשְׁאַר אֶחָד
  english_pob_choice: not one remained
  chosen_spanish: no quedó ni uno
  alternatives_spanish:
  - no quedó uno
  - no permaneció ninguno
  - no quedó ninguno
  lexicon: HALOT
  rationale: La negación con énfasis en אֶחָד pide una formulación idiomática que preserve la fuerza singular. 'No quedó ni uno' refleja mejor el golpe retórico que una simple 'no quedó ninguno'.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La decisión doctrinal del POB inglés es preservar el nombre propio divino. En español, 'Yahvé' comunica ese mismo principio sin recurrir a una sustitución titular.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
- issue: Valor semántico de הֶעָרֹב
  english_pob_reading: the swarm; exact species not specified
  chosen_spanish_reading: el enjambre
  alternative_spanish_readings:
  - el enjambre de moscas
  - la plaga de insectos
  rationale: El texto hebreo no identifica con precisión la especie; por eso se evita fijarla en el cuerpo principal. La ambigüedad se mantiene para no sobrepasar la evidencia lexical.
  doctrine_reference: Exodus 8 plague terminology / lexical caution
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que prefiere la forma posesiva/relacional más formal en inglés; en español se resolvió con 'de Moisés' dentro de una construcción natural ('conforme a la palabra de Moisés'). No se introdujeron ampliaciones interpretativas fuera del consenso alto del registro fuente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene 'Faraón' como forma bíblica estable.
  - 'Se traduce el singular enfático final con una locución idiomática española: ''no quedó ni uno''.'
  - No se convierte עָרֹב en una especie concreta en el texto principal; la precisión queda en nota.
