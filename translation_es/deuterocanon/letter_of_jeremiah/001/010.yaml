translation:
  language: es
  text: 'Incluso dan parte de sus cosas[a] a las prostitutas en la azotea[b]. Y las adornan con vestiduras como seres humanos: dioses de plata, dioses de oro y de madera.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'de ellas'; el pronombre probablemente se refiere a cosas asociadas con los ídolos en el contexto circundante.
    reason: lexical_alternative
  - marker: b
    text: Algunos intérpretes entienden 'las prostitutas en la azotea' como prostitutas asociadas al culto, pero el griego no dice explícitamente 'prostitutas del templo'.
    reason: alternative_reading
lexical_decisions:
- source_word: δώσουσιν
  english_pob_choice: they give
  chosen_spanish: dan
  alternatives_spanish:
  - darán
  - entregan
  lexicon: LSJ
  rationale: El futuro griego puede funcionar con valor descriptivo; en español, el presente histórico 'dan' conserva la fuerza de costumbre o escena viva sin añadir futuricidad innecesaria.
- source_word: ἀπʼ αὐτῶν
  english_pob_choice: some of their things
  chosen_spanish: parte de sus cosas
  alternatives_spanish:
  - de ellas
  - de sus posesiones
  - algunas de sus cosas
  lexicon: LSJ
  rationale: Sigo la decisión auditada de entender la referencia como cosas asociadas a los ídolos o a sus ofrendas. 'Parte de sus cosas' evita la vaguedad de 'de ellas' y no especifica más de lo que el griego garantiza.
- source_word: ταῖς ἐπὶ τοῦ στέγους πόρναις
  english_pob_choice: the prostitutes on the roof
  chosen_spanish: las prostitutas en el techo
  alternatives_spanish:
  - las prostitutas en la azotea
  - las prostitutas sobre el techo
  - las prostitutas del techo
  lexicon: LSJ
  rationale: πόρναι se traduce por 'prostitutas' sin añadir 'templo'. ἐπὶ τοῦ στέγους se expresa de modo natural como 'en el techo'; 'azotea' sería posible, pero 'techo' mantiene mayor cercanía semántica al griego y es ampliamente entendible.
- source_word: κοσμοῦσί
  english_pob_choice: they adorn
  chosen_spanish: adornan
  alternatives_spanish:
  - decoran
  - visten con adornos
  lexicon: LSJ
  rationale: κοσμέω aquí tiene el sentido de embellecer u ornamentar. 'Adornan' conserva el registro y el paralelismo con el catálogo irónico de los ídolos.
- source_word: ὡς ἀνθρώπους
  english_pob_choice: like human beings
  chosen_spanish: como seres humanos
  alternatives_spanish:
  - como personas
  - como hombres
  lexicon: LSJ
  rationale: ἀνθρώπους es genérico, no masculino específico. 'Seres humanos' mantiene esa neutralidad y evita el posible sesgo de 'hombres'.
- source_word: τοῖς ἐνδύμασιν
  english_pob_choice: with clothing
  chosen_spanish: con vestiduras
  alternatives_spanish:
  - con ropa
  - con vestidos
  lexicon: LSJ
  rationale: El dativo instrumental indica el medio de adornamiento. 'Vestiduras' suena más digno y bíblico en español que 'ropa', y se ajusta al acto de vestir/adornar imágenes.
- source_word: θεοὺς ἀργυροῦς καὶ θεοὺς χρυσοῦς καὶ ξυλίνους
  english_pob_choice: silver gods and gold gods and wooden ones
  chosen_spanish: dioses de plata, dioses de oro y de madera
  alternatives_spanish:
  - dioses plateados y dorados y de madera
  - ídolos de plata, de oro y de madera
  - dioses de plata y oro y madera
  lexicon: LSJ
  rationale: Conservo el catálogo repetitivo y despectivo del griego. 'De plata', 'de oro' y 'de madera' reproduce con naturalidad la materialidad de los ídolos; en español, repetir 'dioses' ante los dos primeros miembros mantiene el énfasis del original sin forzar una construcción extraña.
theological_decisions:
- issue: πόρναι sin especificación cultual explícita
  english_pob_reading: prostitutes
  chosen_spanish_reading: prostitutas
  alternative_spanish_readings:
  - prostitutas del templo
  - prostitutas cultuales
  rationale: El griego nombra πόρναι y ubica a estas mujeres en el techo, pero no dice de forma explícita 'del templo'. Por fidelidad al texto, la versión principal no introduce una calificación cultual que la fuente no enuncia.
  doctrine_reference: Principio de primacía del texto fuente; evitar añadir especificaciones religiosas no explícitas.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y la auditoría inglesa. En particular, ἀπʼ αὐτῶν se resuelve como una referencia a cosas pertenecientes a los ídolos o asociadas con ellos, y πόρναι se mantiene sin añadir una especificación cultual que el griego no explicita. También se conserva el tono irónico del catálogo final de materiales.
  spanish_consistency_notes:
  - Se emplea 'Dios' solo como traducción general de θεός en contextos no polémicos; aquí el contexto exige 'dioses' por el plural y el sarcasmo del pasaje.
  - '''Techo'' se usa para ἐπὶ τοῦ στέγους por naturalidad y cercanía semántica; ''azotea'' sería una alternativa válida si se prefiriera un matiz más doméstico.'
  - Se evita 'señor' o 'ídolos' como sustituto de θεούς en el texto principal para no desplazar la ironía nominal del original.
