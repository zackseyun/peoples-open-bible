id: GEN.2.23
reference: Genesis 2:23
source:
  edition: WLC
  text: וַ/יֹּאמֶר֮ הָֽ/אָדָם֒ זֹ֣את הַ/פַּ֗עַם עֶ֚צֶם מֵֽ/עֲצָמַ֔/י וּ/בָשָׂ֖ר מִ/בְּשָׂרִ֑/י לְ/זֹאת֙ יִקָּרֵ֣א אִשָּׁ֔ה כִּ֥י מֵ/אִ֖ישׁ לֻֽקֳחָה זֹּֽאת־׃
translation:
  text: Then the man said[a], “This at last is bone of my bones and flesh of my flesh; this one will be called woman[b], because from man she was taken.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “At last, bone of my bones and flesh of my flesh.”
    reason: lexical_alternative
  - marker: b
    text: Or 'This time, this one is bone from my bones'.
    reason: previous_rendering
lexical_decisions:
- source_word: הָאָדָם
  chosen: the man
  alternatives:
  - the human
  - the human being
  lexicon: HALOT
  rationale: Here אָדָם refers to the male human in distinction from אִשָּׁה/אִישׁ in the wordplay that follows, so 'the man' best preserves the immediate context and the gendered contrast. This aligns with the doctrine guideline to render adam as 'man / humankind' according to context.
- source_word: זֹאת הַפַּעַם
  chosen: This time, this one
  alternatives:
  - At last
  - This at last
  lexicon: HALOT
  rationale: הַפַּעַם means 'this time/occasion.' Retaining 'this time' reflects the Hebrew more directly than the traditional idiomatic 'at last,' while the following זֹאת is carried forward as 'this one' to preserve the demonstrative emphasis.
- source_word: עֶצֶם מֵעֲצָמַי
  chosen: bone from my bones
  alternatives:
  - bone of my bones
  lexicon: HALOT
  rationale: The preposition מִן is most basically 'from,' and rendering it so keeps the Hebrew imagery transparent. 'Bone of my bones' is traditional and idiomatic in English, but 'bone from my bones' more closely reflects the source structure.
- source_word: וּבָשָׂר מִבְּשָׂרִי
  chosen: and flesh from my flesh
  alternatives:
  - and flesh of my flesh
  lexicon: HALOT
  rationale: As with the previous phrase, preserving מִן as 'from' maintains formal correspondence and the parallelism of the Hebrew expression.
- source_word: לְזֹאת
  chosen: this one
  alternatives:
  - she
  - for this one
  lexicon: HALOT
  rationale: The preposition plus demonstrative introduces the naming statement with emphasis on the newly presented counterpart. 'This one' preserves the demonstrative force better than simply 'she,' while remaining natural in English.
- source_word: יִקָּרֵא
  chosen: will be called
  alternatives:
  - shall be called
  - is to be called
  lexicon: HALOT
  rationale: The Niphal of קרא here is passive/reflexive in a naming formula. 'Will be called' is natural modern English and preserves the sense of designation.
- source_word: אִשָּׁה
  chosen: woman
  alternatives: []
  lexicon: HALOT
  rationale: '''Woman'' is the standard and contextually correct rendering. It also preserves the Hebrew wordplay with אִישׁ (''man''), which English can mirror with ''woman'' and ''man''.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the naming. 'Because' is clearer in contemporary English than 'for' while preserving the causal sense.
- source_word: מֵאִישׁ
  chosen: from man
  alternatives:
  - out of man
  - from a man
  lexicon: HALOT
  rationale: The phrase grounds the wordplay and derivation motif. 'From man' is concise and preserves both the preposition and the lexical pairing with אִשָּׁה.
- source_word: לֻקֳחָה
  chosen: she was taken
  alternatives:
  - this one was taken
  lexicon: HALOT
  rationale: The passive verbal form is feminine singular, referring to the woman. English requires an explicit subject for clarity; 'she was taken' communicates the sense naturally, while the final זֹאת is represented earlier in the clause.
- source_word: זֹאת (final)
  chosen: represented earlier in the clause
  alternatives:
  - this one
  lexicon: HALOT
  rationale: The final demonstrative reiterates the referent for emphasis in Hebrew. Because English becomes awkward if every demonstrative is repeated, its force is preserved by the earlier 'this one' in both halves of the verse rather than by a wooden final repetition.
