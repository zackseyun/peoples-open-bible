base_translation:
  language: en
  yaml_path: translation/ot/numbers/003/004.yaml
  text: But Nadab and Abihu died before Yahweh when they offered strange fire before Yahweh in the wilderness of Sinai[a], and they had no sons[b]; and Eleazar and Ithamar served as priests in the presence of Aaron their father.
  footnotes:
  - marker: a
    text: Or 'strange fire' or 'foreign fire.' The Hebrew likely refers to fire that was not authorized for the offering.
    reason: lexical_alternative
  - marker: b
    text: Or 'before Aaron their father'; the Hebrew may also carry the sense that Eleazar and Ithamar served during Aaron's lifetime.
    reason: lexical_alternative
