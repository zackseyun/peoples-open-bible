review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura distributiva del hebreo, conserva «Sur» como nombre propio y mantiene la literalidad de הָרָצִים con una nota útil. También reproduce adecuadamente el sentido funcional revisado de מַסָּח como prevención de entrada no autorizada. Sin embargo, la frase «guardarán la custodia» suena poco natural en español y no expresa tan bien como podría la construcción cognada וּשְׁמַרְתֶּם אֶת מִשְׁמֶרֶת. Además, las notas están ancladas en lugares mejorables: [a] debería señalar «corredores» y [b] la frase final incierta.'
  spanish_quality_summary: La redacción es generalmente clara, pero «guardarán la custodia de la casa» resulta torpe y poco idiomática para un español bíblico natural. «Mantendrán vigilancia sobre la casa» o «vigilarán la casa» comunica mejor el sentido. También es preferible evitar anclar la nota [a] en «Sur», ya que la alternativa léxica corresponde a «los corredores», no al nombre propio «Sur».
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. El borrador sigue bien la política de transliterar nombres propios («Sur») y de conservar la literalidad de הָרָצִים en el texto principal con alternativa explicativa en nota. La única desviación relevante es estilística/lexical en «guardarán la custodia», que conviene ajustar por fidelidad idiomática al valor de vigilancia.
  issues:
  - severity: medium
    issue: «guardarán la custodia» es poco natural en español
    rationale: Aunque intenta reflejar la construcción cognada hebrea, en español suena forzado y menos claro que «mantendrán la vigilancia» o «vigilarán». La fidelidad se preserva mejor con una formulación natural.
  - severity: medium
    issue: La nota [a] está anclada en «Sur» pero explica «los corredores»
    rationale: El contenido de la nota no corresponde al nombre propio «Sur», sino al término הָרָצִים / «corredores». Debe moverse al lugar correcto para mantener trazabilidad lexical.
  - severity: low
    issue: «la puerta de Sur» puede mejorarse a «la puerta Sur»
    rationale: Ambas opciones son posibles, pero «puerta Sur» suena más natural si se entiende como nombre de puerta. No obstante, dado que el inglés auditado usa transliteración nominal, «puerta de Sur» sigue siendo aceptable. No es necesario forzar este cambio.
  revised_spanish_text: y un tercio estará en la puerta de Sur, y un tercio en la puerta detrás de los corredores[a]; y ustedes mantendrán vigilancia sobre la casa para impedir la intrusión[b].
