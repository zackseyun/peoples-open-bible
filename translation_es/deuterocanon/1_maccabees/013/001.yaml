translation:
  language: es
  text: Y Simón oyó que Trifón estaba reuniendo una gran fuerza para venir a la tierra de Judá y destruirla[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra de Judea». El griego dice «la tierra de Judá», que puede designar el territorio históricamente asociado con Judá y no la terminología administrativa posterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró de
  lexicon: BDAG
  rationale: El aoristo de ἀκούω introduce información recibida. «Oyó» es natural en español y conserva la simple recepción del reporte sin añadir matices interpretativos.
- source_word: συνῆγεν
  english_pob_choice: was gathering
  chosen_spanish: estaba reuniendo
  alternatives_spanish:
  - reunía
  - estaba juntando
  lexicon: BDAG
  rationale: El imperfecto comunica acción en curso. «Estaba reuniendo» preserva bien ese aspecto y mantiene el sentido militar de juntar tropas o fuerzas.
- source_word: δύναμιν πολλὴν
  english_pob_choice: a large force
  chosen_spanish: una gran fuerza
  alternatives_spanish:
  - un gran ejército
  - muchas tropas
  lexicon: BDAG
  rationale: En contexto militar, δύναμις puede referirse a fuerza armada. «Una gran fuerza» sigue de cerca la amplitud del griego sin forzar una estructura militar más específica de la que el texto ofrece.
- source_word: τοῦ ἐλθεῖν
  english_pob_choice: to come
  chosen_spanish: para venir
  alternatives_spanish:
  - para ir
  - para llegar
  lexicon: BDAG
  rationale: El infinitivo articular expresa propósito. «Para venir» refleja adecuadamente el movimiento hacia la tierra de Judá desde el punto de vista del narrador y del destino señalado.
- source_word: γῆν Ἰούδα
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - el país de Judá
  - la región de Judá
  lexicon: BDAG
  rationale: Se conserva la relación estrecha con el griego γῆν Ἰούδα. «Tierra de Judá» mantiene la formulación geográfica-histórica y evita sustituirla por una terminología más administrativa como «Judea».
- source_word: τοῦ ἐκτρῖψαι αὐτήν
  english_pob_choice: and destroy it
  chosen_spanish: y destruirla
  alternatives_spanish:
  - y arrasarla
  - y borrarla
  lexicon: BDAG
  rationale: ἐκτρίβω aquí expresa destrucción total o arrasamiento. «Destruirla» es claro y fiel; conserva el peso del verbo sin introducir una imagen más específica de la que exige el griego.
translation_notes:
  revision_awareness: El texto griego y el registro inglés están en alto acuerdo y no muestran revisiones aplicadas; la versión española sigue esa línea sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Judá» en lugar de «Judea» siguiendo la preferencia documental del inglés POB y la forma griega.
  - «Trifón» se adapta al uso español habitual para el nombre propio griego.
  - No se añadió artículo ni glosa teológica ajena al pasaje; la oración conserva su sintaxis narrativa simple.
