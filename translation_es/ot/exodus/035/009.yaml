translation:
  language: es
  text: piedras de ónice[a], y piedras para engaste, para el efod y para el pectoral.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo שֹׁהַם (shoham): la identificación exacta de la piedra es incierta. ''Ónice'' es la equivalencia tradicional más extendida; también se ha propuesto berilo o dejar el término como ''shoham''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַבְנֵי שֹׁהַם
  english_pob_choice: onyx stones
  chosen_spanish: piedras de ónice
  alternatives_spanish:
  - piedras de shoham
  - piedras de berilo
  lexicon: HALOT
  rationale: שֹׁהַם designa una piedra preciosa cuya identificación exacta no es segura; sin embargo, en la tradición de traducción de este contexto cultual, 'ónice' es la equivalencia más asentada y natural en español. Mantiene la referencia a una gema real sin convertir el término en una paráfrasis.
- source_word: אַבְנֵי מִלֻּאִים
  english_pob_choice: stones for setting
  chosen_spanish: piedras para engaste
  alternatives_spanish:
  - piedras de engaste
  - piedras de montaje
  - piedras para incrustar
  lexicon: HALOT
  rationale: מִלֻּאִים en este marco sacerdotal se refiere a piedras destinadas a ser colocadas en una montura o encaje. 'Para engaste' comunica la función de manera natural en español y conserva el sentido técnico de piedras preparadas para ser montadas.
- source_word: לָאֵפֹד
  english_pob_choice: for the ephod
  chosen_spanish: para el efod
  alternatives_spanish:
  - para el efod sacerdotal
  lexicon: HALOT
  rationale: אֵפֹד es un término técnico del atuendo sacerdotal y conviene transliterarlo como 'efod'. No se sustituye por una explicación más amplia para no perder la especificidad cultual del texto.
- source_word: וְלַחֹשֶׁן
  english_pob_choice: and for the breastpiece
  chosen_spanish: y para el pectoral
  alternatives_spanish:
  - y para el pectoral del efod
  - y para la pieza pectoral
  lexicon: HALOT
  rationale: חֹשֶׁן nombra la pieza pectoral sacerdotal donde iban las piedras. 'Pectoral' es el equivalente español más claro y digno; evita 'coraza' o 'breastplate', que sugerirían armadura militar y desviarían el sentido ritual.
theological_decisions:
- issue: Terminología sacerdotal del santuario
  english_pob_reading: The verse lists materials for the ephod and the breastpiece without interpretive expansion.
  chosen_spanish_reading: Se conserva la lista material y la terminología técnica ('efod', 'pectoral') sin amplificar el texto.
  alternative_spanish_readings:
  - paráfrasis explicativa de las prendas sacerdotales
  - sustituir 'efod' por una glosa descriptiva
  rationale: El hebreo presenta una enumeración breve y técnica. En español, mantener los nombres cultuales preserva la precisión histórica y teológica del santuario, y evita introducir interpretación no presente en el texto.
  doctrine_reference: Éxodo 28; Éxodo 35:9; precisión cultual en la instrucción del tabernáculo
translation_notes:
  revision_awareness: El contexto auditado en inglés no requirió revisiones sustantivas; se siguió la lectura estable de la lista de materiales y se mantuvo la cautela sobre la identificación mineral de שֹׁהַם.
  spanish_consistency_notes:
  - Se usó 'efod' y no 'éfod' para conservar la transliteración técnica habitual y la consistencia interna.
  - '''Pectoral'' se eligió por claridad cultual; no se usó ''breastpiece/breastplate'' ni ''coraza''.'
  - '''Piedras de ónice'' mantiene el sustantivo plural con genitivo español natural, acorde con la lista de materiales.'
