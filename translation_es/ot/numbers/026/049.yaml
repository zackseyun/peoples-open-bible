lexical_decisions:
- source_word: לְ/יֵצֶר
  english_pob_choice: of Iezer
  chosen_spanish: de Iezer
  alternatives_spanish:
  - para Iezer
  - a Iezer
  lexicon: HALOT
  rationale: En esta fórmula censal, la preposición ל funciona de manera genealógica/relacional, no direccional; en español, 'de' reproduce de forma natural la pertenencia o procedencia del linaje. El nombre propio se translitera sin traducirse.
- source_word: מִשְׁפַּחַת
  english_pob_choice: the clan of
  chosen_spanish: la clan de
  alternatives_spanish:
  - la familia de
  - el clan de
  lexicon: HALOT
  rationale: En contextos tribales y censales, מִשְׁפָּחָה designa una subdivisión de parentesco más amplia que 'familia' en sentido moderno. 'Clan' conserva mejor esa realidad social. Se mantiene el género y artículo según el sustantivo español adoptado.
- source_word: הַ/יִּצְרִי
  english_pob_choice: the Iezerites
  chosen_spanish: los iezeritas
  alternatives_spanish:
  - la clan iezerita
  - los descendientes de Iezer
  lexicon: HALOT
  rationale: El gentilicio hebreo indica a los descendientes de Iezer. 'Iezeritas' preserva la relación transparente con el nombre Iezer y sigue el patrón usual de etnónimos en español bíblico.
- source_word: לְ/שִׁלֵּם
  english_pob_choice: of Shillem
  chosen_spanish: de Shillem
  alternatives_spanish:
  - para Shillem
  - a Shillem
  lexicon: HALOT
  rationale: La misma preposición genealógica ל se vierte aquí como 'de' por la misma razón que en la primera mitad del verso. El nombre propio se translitera.
- source_word: הַשִּׁלֵּמִי
  english_pob_choice: the Shillemites
  chosen_spanish: los shillemitas
  alternatives_spanish:
  - la clan shillemita
  - los descendientes de Shillem
  lexicon: HALOT
  rationale: El gentilicio deriva del nombre Shillem y designa a la familia/clan descendiente. 'Shillemitas' mantiene la relación morfológica y resulta comprensible en español bíblico.
translation_notes:
  revision_awareness: El texto inglés de POB y el hebreo concuerdan en una fórmula genealógica breve sin variantes textuales relevantes; no se observan cambios de sentido en la auditoría disponible. La única decisión sensible es mantener el valor relacional de ל como 'de' y el valor sociológico de מִשְׁפָּחָה como 'clan'.
  spanish_consistency_notes:
  - 'Se conserva transliteración de nombres propios: Iezer, Shillem.'
  - Se usa 'clan' para מִשְׁפָּחָה en contexto censal tribal.
  - Se prefieren etnónimos españoles formados con '-itas' para los gentilicios hebreos.
  - No se añaden notas ni variantes porque el pasaje es estable y no presenta tensión textual significativa.
