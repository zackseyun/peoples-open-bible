translation:
  language: es
  text: Y el que sea tomado con el objeto dedicado[a] será quemado con fuego, él y todo lo que le pertenece, porque ha transgredido el pacto de Yahvé y porque ha hecho una cosa infame en Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «anatema»; el hebreo dice literalmente «con el objeto dedicado» (ḥerem), refiriéndose a lo puesto bajo el ban y destinado a destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּלְכָּד
  english_pob_choice: the one who is taken
  chosen_spanish: el que sea tomado
  alternatives_spanish:
  - el que sea capturado
  - quien sea atrapado
  lexicon: HALOT
  rationale: El participio pasivo en este contexto judicial se refiere al individuo señalado por el proceso sagrado. «Tomado» conserva la pasividad sin sugerir necesariamente captura militar, y funciona bien en español contemporáneo.
- source_word: בַּחֵרֶם
  english_pob_choice: with the devoted thing
  chosen_spanish: con el objeto dedicado
  alternatives_spanish:
  - con la cosa dedicada
  - con lo consagrado
  - bajo el anatema
  lexicon: HALOT
  rationale: חֵרֶם expresa la idea de algo puesto aparte para destrucción/jucio por dedicación sagrada. «Objeto dedicado» intenta preservar esa noción de dedicación sin imponer la lectura tradicional «anatema», que puede ocultar el sentido de consagración al juicio. El artículo neutro «el» ayuda a mantener la referencia al elemento del ḥerem.
- source_word: יִשָּׂרֵף בָּאֵשׁ
  english_pob_choice: shall be burned with fire
  chosen_spanish: será quemado con fuego
  alternatives_spanish:
  - será quemado en el fuego
  - será consumido por el fuego
  lexicon: HALOT
  rationale: La forma verbal expresa una acción pasiva futura de destrucción por fuego. «Quemado con fuego» reproduce de manera natural el valor instrumental del hebreo y coincide con la lectura auditada en inglés.
- source_word: אֹתוֹ וְאֶת כָּל אֲשֶׁר לֹו
  english_pob_choice: he and all that belongs to him
  chosen_spanish: él y todo lo que le pertenece
  alternatives_spanish:
  - él y todo lo que es suyo
  - él y todo lo que posee
  lexicon: HALOT
  rationale: La construcción incluye tanto al culpable como a sus bienes. «Le pertenece» mantiene la amplitud del posesivo hebreo, sin limitarlo solo a objetos ni introducir matices no presentes en el texto.
- source_word: עָבַר אֶת בְּרִית יְהוָה
  english_pob_choice: has transgressed the covenant of Yahweh
  chosen_spanish: ha transgredido el pacto de Yahvé
  alternatives_spanish:
  - ha violado el pacto de Yahvé
  - ha quebrantado el pacto de Yahvé
  lexicon: HALOT
  rationale: «Transgredido» conserva el sentido jurídico-covenantal de עבר con pacto, y «pacto» es la forma más clara y estándar en español bíblico para בְּרִית. Se mantiene «Yahvé» según el criterio editorial del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio doctrinal del proyecto para el Tetragrámaton: «Yahvé» reproduce el nombre divino en lugar de sustituirlo por un título.'
- source_word: נְבָלָה
  english_pob_choice: an outrageous thing
  chosen_spanish: una cosa abominable
  alternatives_spanish:
  - una cosa vergonzosa
  - una cosa infame
  - una acción abominable
  lexicon: HALOT
  rationale: נְבָלָה señala una acción moralmente escandalosa y vergonzosa. «Cosa abominable» comunica el peso ético del término en español bíblico sin reducirlo a simple torpeza o locura.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - dentro de Israel
  - contra Israel
  lexicon: HALOT
  rationale: 'La preposición tiene valor locativo: el acto ocurrió dentro de la comunidad de Israel. «En Israel» es la forma más directa y natural en español.'
theological_decisions:
- issue: Rendering of חֵרֶם in a judgment-consecration context
  english_pob_reading: devoted thing
  chosen_spanish_reading: objeto dedicado
  alternative_spanish_readings:
  - anatema
  - cosa consagrada
  - lo dedicado a destrucción
  rationale: 'La lectura elegida intenta conservar la tensión teológica: no es simplemente algo «maldito», sino algo puesto aparte bajo dedicación/jucio. «Objeto dedicado» refleja esa consagración violada, aunque se deja abierta la posibilidad de explicación en nota si se quiere preservar la alternativa tradicional.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Render the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se mantiene la forma de nombre propio del proyecto para el Tetragrámaton, evitando la sustitución por un título. Esto conserva la identidad personal del Dios del pacto en el texto español.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El pasaje fue revisado en inglés con alta concordancia y sin cambios sustantivos; por eso esta versión española sigue de cerca las decisiones léxicas auditadas (especialmente חֵרֶם, יְהוָה, y נְבָלָה) sin introducir reinterpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino conforme al estándar del proyecto.
  - Se usa «pacto» para בְּרִית, con registro bíblico claro y natural en español.
  - «Objeto dedicado» conserva la tensión de חֵרֶם sin borrar la posibilidad tradicional de «anatema», indicada en nota.
  - «Cosa abominable» busca reproducir el valor moral fuerte de נְבָלָה sin suavizarlo.
