  text: Λέγει ὁ μαρτυρῶν ταῦτα· Ναί· ἔρχομαι ταχύ. Ἀμήν· ⸀ἔρχου, κύριε Ἰησοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/022/020.yaml
  text: The one who testifies to these things says[a], “Yes, I am coming soon.” Amen. Come, Lord Jesus.
  footnotes:
  - marker: a
    text: Or “I am coming quickly.” The Greek adverb can emphasize either nearness in time or swiftness of arrival/action.
    reason: lexical_alternative
translation:
  language: ko
  text: '이것들을 증언하시는 분이 말씀하십니다. 「그렇다, 내가 속히 오리라.」 아멘. 「주 예수여, 오시옵소서.」[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '헬라어 ἔρχου κύριε Ἰησοῦ는 초대 교회의 「마라나타」(고전 16:22) 기도의 헬라어 형태로, 합쇼체의 격식 안에서도 직접 호격 기도의 어조를 살린다.'
    reason: liturgical_context
