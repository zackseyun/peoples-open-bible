translation:
  language: es
  text: entonces oye en el cielo[a] su oración y su ruego, y defiende su causa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los cielos». Aquí se traduce «en el cielo» por naturalidad idiomática en esta fórmula de oración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַעְתָּ
  english_pob_choice: then hear
  chosen_spanish: entonces oye
  alternatives_spanish:
  - y oye
  - entonces escucha
  lexicon: HALOT
  rationale: El imperfecto perfecto consecutivo en este contexto de ruego se expresa naturalmente en español con una orden/petición dirigida a Dios. «Oye» conserva la fuerza directa de la súplica; «entonces» reproduce el valor consecutivo de la conjunción sin volver la frase mecánica.
- source_word: הַשָּׁמַיִם
  english_pob_choice: in heaven
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - desde los cielos
  - los cielos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «los cielos». En este formulario de oración, «en los cielos» mantiene la referencia al ámbito celestial sin forzar una equivalencia idiomática demasiado libre ni introducir una preposición inexistente en el hebreo.
- source_word: תְּפִלָּתָם
  english_pob_choice: their prayer
  chosen_spanish: su oración
  alternatives_spanish:
  - su plegaria
  - su oración colectiva
  lexicon: HALOT
  rationale: תְּפִלָּה es el término general para oración. El singular con sufijo plural se vierte de manera colectiva en español con «su oración».
- source_word: תְּחִנָּתָם
  english_pob_choice: their plea
  chosen_spanish: su ruego
  alternatives_spanish:
  - su súplica
  - su petición insistente
  lexicon: HALOT
  rationale: תְּחִנָּה expresa un ruego apremiante por favor o misericordia. «Ruego» conserva ese matiz de petición humilde y urgente mejor que un término más técnico o eclesiástico.
- source_word: וְעָשִׂיתָ מִשְׁפָּטָם
  english_pob_choice: and uphold their cause
  chosen_spanish: y defiende su causa
  alternatives_spanish:
  - y hazles justicia
  - y ejecuta justicia para ellos
  - y mantén su derecho
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «hacer su juicio/justicia», es decir, actuar en favor de ellos como vindicación. «Defiende su causa» comunica ese sentido forense y relacional en español natural, sin borrar la tensión idiomática del hebreo.
theological_decisions:
- issue: Idiom of divine vindication in the final clause
  english_pob_reading: The clause is a request for God to vindicate or grant justice to his people ('uphold their cause').
  chosen_spanish_reading: La cláusula pide que Dios defienda y haga valer la causa de su pueblo.
  alternative_spanish_readings:
  - que haga justicia por ellos
  - que mantenga su derecho
  - que ejecute justicia para ellos
  rationale: El hebreo מִשְׁפָּטָם no debe suavizarse hasta perder su trasfondo judicial. La traducción elegida conserva el sentido de vindicación en favor de los que oran, en línea con el audit trail inglés y sin convertirlo en una fórmula doctrinal más estrecha.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El control de revisión indica alta concordancia y no requirió cambios adicionales; por ello la propuesta mantiene el sentido auditado del inglés POB y del hebreo WLC sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma por defecto solo cuando el texto lo requiera explícitamente; aquí el versículo usa una fórmula de oración dirigida a Dios sin el tetragrámaton en la superficie.
  - Se preserva el paralelismo entre «oración» y «ruego» para reflejar תְּפִלָּה y תְּחִנָּה como términos cercanos pero no idénticos.
  - «Defiende su causa» conserva la idiomaticidad judicial de מִשְׁפָּטָם sin recurrir a una calca demasiado dura como «haz su justicia».
