  rationale: Se corrigen los anclajes de notas para que coincidan exactamente con el contenido documentado; se mueve la nota sobre 'hijos' junto a 'hijos' y la nota sobre 'ha prometido' a la cláusula final. Además, se ajusta el par ético a 'rectitud y justicia' para reflejar mejor צְדָקָה וּמִשְׁפָּט y la racionalidad léxica del audit trail, manteniendo el resto de la redacción que ya era fiel y legible.
