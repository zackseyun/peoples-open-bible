translation:
  language: es
  text: Seis jóvenes[a] han derribado tu tiranía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «jóvenes» traduce el diminutivo plural μειράκια y conserva la idea de edad y vigor sin rebajar su agencia moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἓξ
  english_pob_choice: Six
  chosen_spanish: Seis
  alternatives_spanish:
  - Seis
  lexicon: LSJ
  rationale: Número cardinal directo; en español no requiere adaptación interpretativa.
- source_word: μειράκια
  english_pob_choice: young men
  chosen_spanish: jóvenes
  alternatives_spanish:
  - muchachos
  - jóvenes varones
  - mozos
  lexicon: LSJ
  rationale: El diminutivo plural griego señala juventud masculina. «Jóvenes» conserva la edad y la dignidad del sujeto sin infantilizarlo; «muchachos» podría sonar más juvenil de lo que el contexto retórico exige.
- source_word: κατελύσαμέν
  english_pob_choice: have overthrown
  chosen_spanish: han derribado
  alternatives_spanish:
  - han destruido
  - han derrocado
  - han abatido
  lexicon: LSJ
  rationale: El aoristo expresa una acción concluida y efectiva. «Han derribado» comunica la caída de un poder tiránico con fuerza verbal, sin imponer de más una imagen política específica que el contexto no obliga a precisar.
- source_word: τὴν τυραννίδα
  english_pob_choice: tyranny
  chosen_spanish: tiranía
  alternatives_spanish:
  - gobierno tiránico
  - despotismo
  lexicon: LSJ
  rationale: «Tiranía» es el equivalente más directo de τυραννίς y mantiene el tono acusatorio del original.
theological_decisions:
- issue: Valor retórico del aoristo en una afirmación de victoria contra el perseguidor
  english_pob_reading: 'Rendered as present-result English perfect: ''have overthrown'''
  chosen_spanish_reading: 'Presente resultado en perfecto compuesto: «han derribado»'
  alternative_spanish_readings:
  - «derribaron»
  - «han derrocado»
  - «han puesto fin a»
  rationale: El griego presenta una acción ya consumada con efecto presente. El perfecto compuesto español conserva bien ese resultado sin reducir la frase a un simple pasado narrativo ni suavizar la afirmación triunfal.
  doctrine_reference: Mantener la tensión retórica del texto; equivalencia óptima
translation_notes:
  revision_awareness: El texto griego es breve y claro; la versión española sigue de cerca su estructura sin depender mecánicamente del inglés, y conserva el tono de desafío del enunciado.
  spanish_consistency_notes:
  - Se mantiene «tiranía» para τυραννίς, en línea con el valor léxico directo del griego.
  - «Han derribado» se eligió para reflejar la consumación del aoristo sin añadir interpretación doctrinal ajena al contexto.
  - Se evita «Cristo» u այլ terminología no pertinente; no hay nombres divinos ni cristológicos en este versículo.
