    rationale: El arameo סָגְדִין puede incluir la idea de postración, pero la decisión inglesa principal fue preservar el sentido cultual más amplio como ‘worship’, manteniendo la alternativa física en nota. En español, «adoran» alinea mejor con esa decisión sin perder el contraste con «sirven».
