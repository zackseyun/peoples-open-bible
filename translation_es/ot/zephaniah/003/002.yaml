    text: Or 'did not listen to the voice' or 'did not heed the voice.' The Hebrew idiom can emphasize obedient listening.
    reason: lexical_alternative
  - marker: b
    text: Or 'did not receive discipline' or 'did not take instruction.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'YHWH'; rendered 'the LORD' in keeping with the translation's standard practice.
    reason: alternative_reading
  - marker: d
    text: Or 'did not approach.' 'Draw near' may carry both relational and worship-related overtones.
    reason: lexical_alternative
