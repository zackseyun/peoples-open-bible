translation:
  language: es
  text: 'Y le habló, diciendo: «Si hoy te haces siervo[a] de este pueblo, y les sirves, y les respondes, y les hablas buenas palabras[b], entonces serán tus siervos todos tus días».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esclavo».
    reason: lexical_alternative
  - marker: b
    text: O «palabras amables».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶבֶד
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: HALOT
  rationale: El hebreo עֶבֶד puede significar ‘esclavo’ o ‘siervo’. El POB inglés eligió ‘servant’ para preservar el matiz de servicio político y relacional. En español, ‘esclavo’ mantiene con más fuerza la reciprocidad del texto y la tensión semántica de עֶבֶד, aunque suene más fuerte que ‘siervo’; por eso se conserva y se anota la alternativa.
- source_word: וַעֲבַדְתָּם
  english_pob_choice: serve them
  chosen_spanish: les sirves
  alternatives_spanish:
  - los sirves
  - les sirvas
  lexicon: HALOT
  rationale: El verbo עבד conserva el vínculo léxico con עֶבֶד. ‘Les sirves’ reproduce ese paralelismo en español de forma natural y mantiene la idea de servicio hacia el pueblo.
- source_word: וַעֲנִיתָם
  english_pob_choice: answer them
  chosen_spanish: les respondes
  alternatives_spanish:
  - les contestas
  - les respondas
  lexicon: HALOT
  rationale: Aquí ענה significa responder, no afligir. ‘Les respondes’ es la opción más directa y clara en español, preservando la relación con la petición del pueblo.
- source_word: דְּבָרִים טוֹבִים
  english_pob_choice: good words
  chosen_spanish: palabras buenas
  alternatives_spanish:
  - palabras amables
  - buenas palabras
  lexicon: HALOT
  rationale: Se traduce de manera bastante literal para conservar la valoración de la speech sin introducir una interpretación excesiva. ‘Palabras buenas’ mantiene la correspondencia con el hebreo y sigue siendo comprensible en español.
- source_word: וְהָיוּ לְךָ עֲבָדִים
  english_pob_choice: they will be your servants
  chosen_spanish: serán tus esclavos
  alternatives_spanish:
  - serán tus siervos
  - te servirán
  lexicon: HALOT
  rationale: Se conserva el sustantivo עֲבָדִים para no suavizar la reciprocidad del versículo. ‘Serán tus esclavos’ refleja con más fuerza la estructura hebrea ‘serán para ti esclavos’, manteniendo la relación de intercambio político del texto.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all your days
  chosen_spanish: todos tus días
  alternatives_spanish:
  - siempre
  - todos los días
  lexicon: HALOT
  rationale: El hebreo tiene el matiz posesivo de לְךָ junto con el idiomatismo de כָּל הַיָּמִים. ‘Todos tus días’ conserva la posesión y la temporalidad de forma natural en español.
- source_word: אִם הַיּוֹם
  english_pob_choice: If today
  chosen_spanish: Si hoy
  alternatives_spanish:
  - Si este día
  - Si ahora
  lexicon: HALOT
  rationale: ‘Hoy’ reproduce la urgencia inmediata del hebreo. En español, la secuencia ‘si hoy’ comunica con claridad el énfasis temporal del original.
- source_word: וַיְדַבֵּר אֵלָיו לֵאמֹר
  english_pob_choice: And he spoke to him, saying
  chosen_spanish: Y le habló, diciendo
  alternatives_spanish:
  - Y le dijo, diciendo
  - Y habló con él, diciendo
  lexicon: HALOT
  rationale: Se sigue la fórmula narrativa hebrea de modo directo. ‘Le habló, diciendo’ conserva el valor introductorio de לֵאמֹר sin perder naturalidad en español.
theological_decisions:
- issue: Lenguaje de servicio y reciprocidad política
  english_pob_reading: Render the language straightforwardly as service/servanthood without softening or importing later theological overtones.
  chosen_spanish_reading: Traducir el campo semántico de servicio con ‘esclavo/esclavos’ para preservar la dureza y la reciprocidad del consejo político.
  alternative_spanish_readings:
  - usar ‘siervo/siervos’
  - usar ‘súbditos’
  rationale: El pasaje es consejo político concreto, no una reflexión doctrinal. Mantener ‘esclavo’ evita suavizar el contraste entre la postura inicial de servicio del rey y la respuesta futura del pueblo.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó ‘all the days’ a ‘all your days’ para reflejar el sentido posesivo de לְךָ. En español se refleja con ‘todos tus días’. También se preserva la decisión auditada de no debilitar el lenguaje de servicio del texto.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el paralelismo verbal entre ‘esclavo’, ‘sirves’ y ‘esclavos’ para reflejar עֶבֶד / עבדים.
  - El registro es bíblico contemporáneo, sin arcaísmos innecesarios, pero con suficiente solemnidad para lectura pública.
