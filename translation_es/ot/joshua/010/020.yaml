  to: Y aconteció que, cuando Josué y los hijos de Israel terminaron de herirlos con una matanza muy grande, hasta que fueron exterminados, y los sobrevivientes[a] de entre ellos sobrevivieron y entraron en las ciudades fortificadas,
  rationale: Se corrigen las notas para alinearlas con el hebreo y con el texto español realmente presentado. Se elimina la nota errónea sobre una supuesta literalidad de «matanza» y se conserva una sola nota útil sobre la repetición enfática de «sobrevivientes… sobrevivieron». El texto principal solo recibe un ajuste menor de anclaje de nota y mantiene la fidelidad al original y a la auditoría inglesa.
