translation:
  language: es
  text: En el quinto mes, a los diez días del mes —que era el año diecinueve del rey Nabucodonosor, rey de Babilonia— vino Nebuzaradán, el jefe de la guardia[a], que estaba delante del rey de Babilonia[b], a Jerusalén[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «jefe de los verdugos» o «jefe de los carniceros»; el título probablemente designa a un alto oficial sobre la guardia.
    reason: lexical_alternative
  - marker: b
    text: «Estaba delante del rey de Babilonia» es una expresión cortesana para servir en presencia del rey.
    reason: cultural_note
  - marker: c
    text: El hebreo dice «en Jerusalén»; con el verbo de movimiento, en español normalmente se traduce «a Jerusalén».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/חֹדֶשׁ הַֽ/חֲמִישִׁי
  english_pob_choice: Now in the fifth month
  chosen_spanish: En el mes quinto
  alternatives_spanish:
  - Ahora, en el quinto mes
  - En el quinto mes
  lexicon: HALOT
  rationale: El hebreo introduce una nueva referencia temporal con valor narrativo de continuación. En español, «En el mes quinto» conserva la fórmula sobria y evita un «ahora» que no está explícito en el hebreo.
- source_word: בֶּ/עָשׂ֣וֹר לַ/חֹ֔דֶשׁ
  english_pob_choice: on the tenth day of the month
  chosen_spanish: a los diez días del mes
  alternatives_spanish:
  - el día diez del mes
  - el décimo día del mes
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula fechada. «A los diez días del mes» es natural en español bíblico contemporáneo y mantiene el valor cronológico sin añadir elementos no requeridos.
- source_word: הִ֗יא שְׁנַת֙ תְּשַֽׁע עֶשְׂרֵ֣ה שָׁנָ֔ה לַ/מֶּ֖לֶךְ נְבוּכַדְרֶאצַּ֣ר
  english_pob_choice: which was the nineteenth year of King Nebuchadnezzar
  chosen_spanish: esto era el año diecinueve del rey Nabucodonosor
  alternatives_spanish:
  - que era el año diecinueve del rey Nabucodonosor
  - era el año diecinueve del rey Nabucodonosor
  lexicon: HALOT
  rationale: El pronombre hebreo resume la fecha. En español, «esto era» funciona como enlace explicativo natural y preserva la relación con la fecha anterior sin forzar una subordinación más pesada.
- source_word: מֶֽלֶךְ בָּבֶ֑ל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - monarca de Babilonia
  lexicon: HALOT
  rationale: La construcción de genitivo se vierte de forma directa y estable como «rey de Babilonia», que transmite correctamente la relación de gobierno.
- source_word: בָּ֗א
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: HALOT
  rationale: El verbo de movimiento se traduce con «vino» para conservar la sencillez narrativa y el desplazamiento hacia Jerusalén implícito en el contexto.
- source_word: נְבֽוּזַרְאֲדָן֙
  english_pob_choice: Nebuzaradan
  chosen_spanish: Nebuzaradán
  alternatives_spanish:
  - Nabuzaradán
  lexicon: transliteration
  rationale: Se sigue una transliteración castellana coherente del nombre propio, ajustando la acentuación a la pronunciación española.
- source_word: רַב טַבָּחִ֔ים
  english_pob_choice: the captain of the guard
  chosen_spanish: el jefe de la guardia
  alternatives_spanish:
  - el capitán de la guardia
  - el jefe de los verdugos
  - el jefe de los ejecutores
  lexicon: HALOT
  rationale: 'Se conserva la decisión funcional de la POB inglesa: el título designa a un alto oficial de la corte. «Jefe de la guardia» es claro en español y evita reducirlo sin necesidad a un sentido meramente literal de «verdugos» o «carniceros».'
- source_word: עָמַ֛ד לִ/פְנֵ֥י מֶֽלֶךְ בָּבֶ֖ל
  english_pob_choice: who stood before the king of Babylon
  chosen_spanish: que estaba delante del rey de Babilonia
  alternatives_spanish:
  - que servía delante del rey de Babilonia
  - que comparecía ante el rey de Babilonia
  lexicon: HALOT
  rationale: La expresión courtésa hebrea se conserva con «estaba delante», que mantiene el matiz de presencia/servicio en la corte sin reinterpretar demasiado el giro.
- source_word: בִּ/ירוּשָׁלִָֽם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - en Jerusalén
  lexicon: HALOT
  rationale: Con el verbo de movimiento, el español natural exige «a Jerusalén». El hebreo usa la preposición «en», pero la equivalencia idiomática correcta en español es direccional.
theological_decisions:
- issue: Expresión cortesana «estar delante del rey»
  english_pob_reading: A court expression for serving in the king’s presence.
  chosen_spanish_reading: Una expresión cortesana que indica servicio o comparecencia ante el rey.
  alternative_spanish_readings:
  - simplemente estar físicamente presente ante el rey
  - servir como funcionario en la corte
  rationale: La frase hebrea no se reduce a ubicación física. La redacción española conserva la ambigüedad funcional de presencia/servicio, tal como lo hace la nota inglesa.
  doctrine_reference: Ninguna doctrina en particular; observación histórico-lingüística del texto.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el control de revisión más reciente: no hubo cambios necesarios y el acuerdo general fue alto. La versión española refleja la misma estructura cronológica y narrativa del original, incluyendo el título oficial y la fórmula cortesana, con adaptación idiomática mínima para español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el tetragrama; en este versículo no aparece.
  - Se conserva «rey de Babilonia» como genitivo estable y no se sustituye por una formulación interpretativa.
  - «Nebuzaradán» se translitera de forma uniforme y con acento español.
  - La nota sobre «estar delante del rey» preserva el matiz cortesano sin convertirlo en una paráfrasis amplia.
