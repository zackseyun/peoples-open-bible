    reason: alternative_reading
  revision_rationale: 'Se conserva el texto principal casi íntegro porque es fiel y legible, pero se corrigen las notas para alinearlas con la evidencia fuente y el expediente inglés: la nota sobre la antigua redacción «para mí» vuelve a «mi libertador», y la variante «pueblos» se mueve a «mi pueblo», donde realmente pertenece. No se requiere adjudicación adicional porque es una corrección editorial clara y de bajo riesgo doctrinal.'
