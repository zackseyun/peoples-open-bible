lexical_decisions:
- source_word: קַטָּת
  english_pob_choice: Kattath
  chosen_spanish: Kattath
  alternatives_spanish:
  - Kattat
  lexicon: topónimo propio
  rationale: Se translitera el nombre propio del lugar; en español se conserva la misma forma base que la del inglés POB para mantener uniformidad y reconocibilidad del topónimo.
- source_word: נַהֲלָל
  english_pob_choice: Nahalal
  chosen_spanish: Nahalal
  alternatives_spanish:
  - Nahalal
  lexicon: topónimo propio
  rationale: Nombre de lugar; se mantiene transliterado sin traducir.
- source_word: שִׁמְרוֹן
  english_pob_choice: Shimron
  chosen_spanish: Shimrón
  alternatives_spanish:
  - Shimron
  lexicon: topónimo propio
  rationale: Nombre propio transliterado; se ajusta la acentuación gráfica al español para reflejar la sílaba tónica final sin alterar el valor del nombre.
- source_word: יִדְאֲלָה
  english_pob_choice: Idalah
  chosen_spanish: Idalá
  alternatives_spanish:
  - Idalah
  - Yidalá
  lexicon: topónimo propio
  rationale: Se translitera el topónimo; en español se usa acento gráfico para marcar la pronunciación natural. Se evita traducir o adaptar semánticamente el nombre.
- source_word: בֵית לָחֶם
  english_pob_choice: Bethlehem
  chosen_spanish: Belén
  alternatives_spanish:
  - Bethlehem
  - Casa de pan
  lexicon: topónimo propio
  rationale: Se trata del nombre de lugar, no de una frase traducible. En español el topónimo establecido es Belén; se preserva como nombre propio y no como traducción literal.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - poblados
  - pueblos
  lexicon: HALOT
  rationale: En listas de repartición territorial, el sustantivo se refiere a asentamientos con estatus de ciudad; 'ciudades' transmite bien el valor administrativo y geográfico.
- source_word: שְׁתֵּים עֶשְׂרֵה
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - '12'
  lexicon: numeral cardinal
  rationale: Se vierte como cardinal natural en español, concordando con 'ciudades'.
- source_word: חַצְרֵיהֶן
  english_pob_choice: their villages
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus pueblos
  - sus asentamientos
  lexicon: HALOT
  rationale: En listas de repartición, חַצְרֵי puede referirse a aldeas o asentamientos dependientes; 'aldeas' conserva la idea de poblados menores sin sobrerrecargar el texto.
theological_decisions:
- issue: Tratamiento del topónimo bíblico 'Bethlehem' / בֵית לָחֶם
  english_pob_reading: Bethlehem is a place name here, not a translated phrase meaning 'house of bread.'
  chosen_spanish_reading: Belén es un nombre propio de lugar, no una frase traducida como 'casa de pan'.
  alternative_spanish_readings:
  - Casa de pan
  - Belén (sin nota)
  rationale: La decisión del POB inglés evita una traducción semántica engañosa. En español se conserva el topónimo establecido 'Belén' y se explicita, mediante nota, que no se debe leer como expresión descriptiva.
  doctrine_reference: Principio de fidelidad onomástica y no-etimologización de topónimos bíblicos
translation_notes:
  revision_awareness: 'Coincide con el expediente inglés actual: no hay revisiones aplicadas y el control cruzado reporta alta concordancia (1.0). No se introducen cambios de sentido ni se añade material interpretativo ajeno al texto fuente.'
  spanish_consistency_notes:
  - 'Se mantiene el orden enumerativo del hebreo y del POB inglés: cuatro topónimos, luego Belén, después la cláusula cuantitativa.'
  - Se usa 'ciudades' y 'aldeas' para reflejar la distinción territorial del listado sin introducir matices eclesiales.
  - Se conserva la transliteración de los nombres propios, con acento gráfico solo donde ayuda a la lectura española sin alterar la identificación del lugar.
  - La nota sobre Belén preserva la tensión lexical documentada entre topónimo y traducción literal.
