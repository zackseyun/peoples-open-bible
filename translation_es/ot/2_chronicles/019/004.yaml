translation:
  language: es
  text: Así, Josafat vivió en Jerusalén[a], y volvió a salir entre el pueblo desde Beerseba hasta la región montañosa de Efraín, y los hizo volver a Yahvé[b], el Dios de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «volvió y salió entre el pueblo»; el hebreo repite el verbo «volver» antes de «salir», probablemente para indicar que Josafat reanudó esta actividad después de regresar a Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: «Yahvé» traduce el nombre divino YHWH; alternativamente, «Yahweh».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: lived
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - residió
  - se estableció
  lexicon: HALOT
  rationale: El verbo ישׁב aquí expresa residencia estable en Jerusalén, no el acto literal de sentarse. «Habitó» conserva el sentido de permanencia y suena natural en español bíblico actual.
- source_word: וַיָּשָׁב
  english_pob_choice: went out again
  chosen_spanish: volvió a salir
  alternatives_spanish:
  - volvió y salió
  - salió de nuevo
  - regresó y salió otra vez
  lexicon: HALOT
  rationale: La secuencia hebrea repite la idea de retorno antes de salir, indicando reanudación de la actividad. «Volvió a salir» preserva ese matiz de acción retomada sin sonar forzado.
- source_word: וַיֵּצֵא בָעָם
  english_pob_choice: went out again among the people
  chosen_spanish: entre el pueblo
  alternatives_spanish:
  - entre la gente
  - por el pueblo
  - entre los habitantes
  lexicon: HALOT
  rationale: El ב con עָם comunica movimiento en medio del pueblo, no solo hacia él. «Entre el pueblo» conserva la imagen de recorrerlo personalmente.
- source_word: מִבְּאֵר שֶׁבַע עַד הַר אֶפְרַיִם
  english_pob_choice: from Beersheba to the hill country of Ephraim
  chosen_spanish: desde Beerseba hasta la región montañosa de Efraín
  alternatives_spanish:
  - desde Beerseba hasta el monte de Efraín
  - desde Beerseba hasta la serranía de Efraín
  - desde Beerseba hasta la región montañosa de Efraín
  lexicon: HALOT
  rationale: La expresión funciona como merismo para abarcar la extensión territorial. «Región montañosa» comunica היטב el valor geográfico de הַר אֶפְרַיִם en español moderno.
- source_word: וַיְשִׁיבֵם
  english_pob_choice: brought them back
  chosen_spanish: los hizo volver
  alternatives_spanish:
  - los volvió
  - los condujo de vuelta
  - los restauró
  lexicon: HALOT
  rationale: El hiphil de שוב indica causar el regreso. «Los hizo volver» mantiene la fuerza causativa y deja abierta la referencia tanto al retorno físico como al regreso a la fidelidad al pacto.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al Dios Yahvé
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino según el criterio del proyecto: «Yahvé». La preposición «a» refleja la dirección de retorno o adhesión hacia el Dios del pacto.'
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - el Dios de sus padres y antepasados
  lexicon: HALOT
  rationale: La fórmula covenantal se conserva de manera idiomática en español. «Sus padres» preserva el vínculo ancestral del texto y la resonancia bíblica tradicional sin perder claridad.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. En la POB española, el nombre se vierte como «Yahvé» para mantener la transparencia del original y la continuidad terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de וַיְשִׁיבֵם אֶל יְהוָה
  english_pob_reading: brought them back to Yahweh
  chosen_spanish_reading: los hizo volver a Yahvé
  alternative_spanish_readings:
  - los convirtió a Yahvé
  - los trajo de vuelta a Yahvé
  - los hizo regresar a Yahvé
  rationale: El hebreo expresa una acción causativa de retorno. «Los hizo volver» conserva el movimiento de restauración sin introducir de manera explícita una glosa doctrinal como «convirtió», aunque esa lectura sigue siendo posible contextualmente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el rastro de auditoría en inglés, conservando la repetición verbal de וַיָּשָׁב + וַיֵּצֵא mediante «volvió a salir» y manteniendo la decisión del proyecto para el nombre divino como «Yahvé». No se detectaron revisiones aplicadas en el paquete fuente, y la formulación propuesta busca reflejar ese estado estable.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar español del proyecto.
  - «Dios de sus padres» conserva la fórmula bíblica tradicional sin sustituirla por una paráfrasis más moderna.
  - «Volvió a salir» mantiene la duplicación aspectual del hebreo mejor que una simple traducción de movimiento único.
  - «Región montañosa de Efraín» evita una calca rígida de «monte» cuando el contexto geográfico pide una designación territorial.
