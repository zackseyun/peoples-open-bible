  yaml_path: translation/deuterocanon/1_esdras/008/010.yaml
  text: And having judged what is humane[a], I ordered that those of the nation of the Jews who are willing, and of their own choice, and the priests and the Levites and these others in our kingdom[b], should go with you to Jerusalem.
  footnotes:
