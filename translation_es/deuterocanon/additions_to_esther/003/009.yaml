  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Redimí» preserva correctamente λυτρόω. «Porción» es una buena elección para μερίς. No aparecen términos sensibles como Yahvé/Mesías. La única desalineación relevante está en la nota, que debe reflejar la lectura reflexiva «para mí mismo / como posesión mía».
