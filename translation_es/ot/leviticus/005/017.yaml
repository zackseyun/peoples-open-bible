translation:
  language: es
  text: Y si una persona peca y hace alguna de todas las cosas que, según los mandamientos de Yahvé, no deben hacerse, sin saberlo, será culpable y llevará su iniquidad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: נֶפֶשׁ
  english_pob_choice: a person
  chosen_spanish: una persona
  alternatives_spanish:
  - un alma
  - alguien
  lexicon: HALOT
  rationale: En este contexto legal, נֶפֶשׁ designa a un individuo, no al alma como entidad interior. «Una persona» conserva el sentido jurídico y es natural en español.
- source_word: תֶחֱטָא
  english_pob_choice: sins
  chosen_spanish: peca
  alternatives_spanish:
  - comete un pecado
  - falta
  lexicon: HALOT
  rationale: El verbo חטא en este marco sacerdotal/legal se expresa con claridad por «peca», que es directo y fiel al valor básico del verbo.
- source_word: וְעָשְׂתָה אַחַת מִכָּל
  english_pob_choice: does any one of all the things
  chosen_spanish: hace cualquiera de todas las cosas
  alternatives_spanish:
  - hace una cualquiera de todas las cosas
  - hace una de todas las cosas
  lexicon: HALOT
  rationale: 'La construcción hebrea es distributiva: una acción concreta dentro del conjunto prohibido. «Cualquiera de todas las cosas» reproduce esa amplitud sin perder la relación con el plural del hebreo.'
- source_word: מִצְוֺת יְהוָה
  english_pob_choice: the LORD’s commandments
  chosen_spanish: los mandamientos de Yahvé
  alternatives_spanish:
  - los mandamientos del Señor
  - los mandatos de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé» según el criterio del proyecto, y «mandamientos» conserva el marco covenantal/legal del sustantivo מצוֹת.
- source_word: אֲשֶׁר לֹא תֵעָשֶׂינָה
  english_pob_choice: that ... must not be done
  chosen_spanish: que no deben hacerse
  alternatives_spanish:
  - que no han de hacerse
  - que no se deben hacer
  lexicon: HALOT
  rationale: La pasiva/niphal con negación expresa prohibición normativa. «No deben hacerse» comunica bien la fuerza legal en español moderno.
- source_word: וְלֹא יָדַע
  english_pob_choice: though he did not know it
  chosen_spanish: sin saberlo
  alternatives_spanish:
  - aunque no lo supo
  - y no lo sabía
  lexicon: HALOT
  rationale: La cláusula indica ignorancia del hecho. «Sin saberlo» es una equivalencia idiomática natural que mantiene el valor adverbial del hebreo.
- source_word: וְאָשֵׁם
  english_pob_choice: then he is guilty
  chosen_spanish: será culpable
  alternatives_spanish:
  - queda culpable
  - incurrirá en culpa
  lexicon: HALOT
  rationale: אָשֵׁם puede expresar quedar sujeto a culpa o responsabilidad. «Será culpable» comunica ese estado resultante de manera clara y sobria.
- source_word: וְנָשָׂא עֲוֺנוֹ
  english_pob_choice: shall bear his iniquity
  chosen_spanish: llevará su iniquidad
  alternatives_spanish:
  - llevará su culpa
  - cargará con su iniquidad
  lexicon: HALOT
  rationale: Se conserva el giro forense «llevará su iniquidad», que preserva la densidad legal del hebreo נשׂא עון sin diluirlo en una paráfrasis.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente; la política del proyecto pide «Yahvé» en el texto principal para no ocultar el nombre divino mediante un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Liability/guilt in וְאָשֵׁם
  english_pob_reading: then he is guilty / incurs guilt
  chosen_spanish_reading: será culpable
  alternative_spanish_readings:
  - incurrirá en culpa
  - queda culpable
  rationale: El hebreo puede señalar tanto culpa moral como estado de responsabilidad legal. «Será culpable» deja esa tensión abierta sin perder la idea de responsabilidad resultante.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Idiom of bearing iniquity
  english_pob_reading: shall bear his iniquity
  chosen_spanish_reading: llevará su iniquidad
  alternative_spanish_readings:
  - cargará con su iniquidad
  - llevará su culpa
  rationale: Se preserva la expresión idiomática hebrea para mantener la resonancia jurídica y teológica del pasaje, en lugar de reducirla a una explicación más interpretativa.
  doctrine_reference: HALOT / doctrinal policy on maintaining legal idioms
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del inglés auditado, que afinó la distribución de «any one of all the things» para reflejar mejor el hebreo. En español se resolvió con una construcción igualmente distributiva: «hace cualquiera de todas las cosas».'
  spanish_consistency_notes:
  - Se conserva el nombre divino como «Yahvé» conforme al estándar del proyecto.
  - «Iniquidad» se mantiene para reflejar el paralelismo legal del hebreo עָוֹן, en lugar de suavizarlo a un término más genérico.
  - No se añadieron notas al pie porque la elección española principal puede expresar el sentido sin introducir una alternativa textual necesaria.
