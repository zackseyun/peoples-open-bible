translation:
  language: es
  text: En la multitud del pueblo está el esplendor del rey, pero sin pueblo, la ruina[a] del gobernante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «terror» o «desmayo» por «ruina»; el término hebreo también puede denotar espanto o colapso destructivo. El texto principal elige «ruina» porque el proverbio contrasta la fuerza que un pueblo numeroso da al rey con la caída del gobernante que carece de ese pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרָב
  english_pob_choice: In a multitude of
  chosen_spanish: En la multitud de
  alternatives_spanish:
  - Con mucha gente
  - En la abundancia de
  lexicon: HALOT
  rationale: La construcción con ב + רָב expresa circunstancia o ámbito de abundancia. «En la multitud de» conserva el paralelismo proverbial y la idea de gran número sin añadir una interpretación ajena.
- source_word: עָם
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - población
  - súbditos
  lexicon: HALOT
  rationale: עָם designa al pueblo como colectividad. «Pueblo» es natural en español y mantiene el sentido político-social general; «súbditos» estrecharía demasiado el alcance.
- source_word: הַדְרַת
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - gloria
  - majestad
  - honor
  lexicon: HALOT
  rationale: El sustantivo puede abarcar adorno, honor o majestad. «Esplendor» comunica bien la dignidad visible que rodea al rey gracias a la multitud de su pueblo.
- source_word: מֶלֶךְ
  english_pob_choice: king’s
  chosen_spanish: del rey
  alternatives_spanish:
  - de un rey
  lexicon: HALOT
  rationale: 'La relación de constructo se expresa naturalmente en español como posesión: «del rey».'
- source_word: וּבְאֶפֶס
  english_pob_choice: but without
  chosen_spanish: pero sin
  alternatives_spanish:
  - y en ausencia de
  - pero en falta de
  lexicon: HALOT
  rationale: אֶפֶס aquí expresa carencia o ausencia. «Pero sin» reproduce la contraposición del proverbio con una formulación idiomática en español.
- source_word: לְאֹם
  english_pob_choice: a nation
  chosen_spanish: pueblo
  alternatives_spanish:
  - nación
  - populacho
  - colectividad
  lexicon: HALOT
  rationale: לְאֹם puede referirse a un grupo humano colectivo. Para no introducir la idea moderna de Estado-nación, y para mantener la correspondencia con עָם, se traduce aquí también como «pueblo».
- source_word: מְחִתַּת
  english_pob_choice: ruin
  chosen_spanish: ruina
  alternatives_spanish:
  - terror
  - dismayo
  - destrucción
  lexicon: HALOT
  rationale: El término puede denotar temor o derrumbe. En este contexto sapiencial-político, el contraste apunta al fracaso o caída del gobernante; «ruina» recoge bien esa fuerza.
- source_word: רָזוֹן
  english_pob_choice: a ruler’s
  chosen_spanish: del gobernante
  alternatives_spanish:
  - del príncipe
  - del noble
  - del jefe
  lexicon: HALOT
  rationale: El término se refiere a quien ejerce autoridad. «Gobernante» es amplio y natural en español, y evita restringir innecesariamente el sentido del hebreo.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del inglés: se mantiene la antítesis entre la multitud del pueblo y la carencia de pueblo, evitando introducir «nación» como equivalente fuerte. Se conservó la ambigüedad léxica de מְחִתַּת como resultado de ruina/caída, no solo como miedo.'
  spanish_consistency_notes:
  - Se preservó el paralelismo entre los dos miembros del proverbio con sintaxis breve y simétrica.
  - Se evitó «SEÑOR» y otras sustituciones no requeridas; el versículo no contiene el tetragrámaton.
  - Se usó «pueblo» para ambos colectivos hebreos para mantener la correspondencia semántica y la sencillez proverbial.
  - «Gobernante» se eligió por amplitud semántica, sin forzar una distinción de rango no explicitada por el hebreo.
