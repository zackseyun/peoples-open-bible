revisions:
- from: ¿No ha hecho esto venir sobre ti[a], porque has abandonado a Yahvé, tu Dios, cuando él te estaba guiando en el camino[b]?
  to: ¿No ha traído esto sobre ti[a], porque has abandonado a Yahvé, tu Dios, cuando él te estaba guiando en el camino[b]?
  rationale: Se reemplaza la expresión principal por una formulación española más natural que conserva el sentido causal de la calamidad sobrevenida. También se ajustan las notas para que reflejen mejor las alternativas documentadas en el audit trail inglés, especialmente la literalidad de la primera cláusula y la variante «por el camino».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:42:27Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: pregunta retórica de reprensión, causalidad por haber abandonado a Yahvé, y la acción continua de él guiando a su pueblo. Sin embargo, la expresión principal para תַּעֲשֶׂה לָּךְ no suena natural en español bíblico actual y además choca con la nota alternativa, que repite casi lo mismo que el texto principal en lugar de preservar mejor la literalidad documentada.'
  spanish_quality_summary: La redacción es mayormente clara, pero «ha hecho esto venir sobre ti» es torpe y poco idiomática en español. «Te ha traído esto sobre ti» duplicaría el complemento, así que conviene una solución natural como «ha traído esto sobre ti». También la nota [b] no ofrece una alternativa real, porque «cuando él te estaba guiando» y «mientras él te estaba guiando» son demasiado cercanas; es mejor reflejar la alternativa auditada «por el camino».
  glossary_alignment: Se alinea correctamente con la terminología del proyecto en «Yahvé» y «tu Dios». No hay conflictos teológicos relevantes. «En el camino» es aceptable, pero la nota debería preservar la alternativa «por el camino» que corresponde mejor al audit trail inglés.
  issues:
  - severity: medium
    issue: 'Expresión poco natural: «ha hecho esto venir sobre ti»'
    rationale: Aunque intenta conservar la forma hebrea, en español resulta forzada. El sentido idiomático documentado es que la calamidad se la ha acarreado la propia persona; «ha traído esto sobre ti» comunica bien ese valor sin paráfrasis excesiva.
  - severity: medium
    issue: La nota [a] no preserva adecuadamente la alternativa literal documentada
    rationale: El audit trail inglés distingue entre la redacción idiomática principal y la alternativa más literal «Has not this done this to you?». La nota española actual repite de manera confusa «ha hecho esto venir sobre ti» y luego añade «para/contra ti», pero no refleja claramente la opción «¿No te ha hecho esto esto?» o equivalente más literal.
  - severity: low
    issue: La nota [b] es demasiado cercana al texto principal
    rationale: «Cuando él te estaba guiando» frente a «mientras él te estaba guiando» aporta muy poca diferencia. El inglés conserva también la alternativa preposicional «on the way», que en español se puede reflejar mejor con «por el camino».
  revised_spanish_text: ¿No ha traído esto sobre ti[a], porque has abandonado a Yahvé, tu Dios, cuando él te estaba guiando en el camino[b]?
  revised_footnotes:
  - marker: a
    text: 'O: «¿No te ha hecho esto esto?». El hebreo es más literalmente «¿No ha hecho esto para/a ti…?».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mientras él te estaba guiando por el camino».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza la expresión principal por una formulación española más natural que conserva el sentido causal de la calamidad sobrevenida. También se ajustan las notas para que reflejen mejor las alternativas documentadas en el audit trail inglés, especialmente la literalidad de la primera cláusula y la variante «por el camino».
