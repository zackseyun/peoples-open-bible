translation:
  language: es
  text: Aunque yo escribí para él muchas cosas de mi ley[a], fueron consideradas como algo ajeno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aunque yo escribiría para él las miríadas de mi instrucción/Torá, serían consideradas como algo ajeno». El verbo hebreo puede entenderse con valor imperfectivo, y «mi ley» también puede traducirse «mi instrucción» o «mi Torá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אכתוב
  english_pob_choice: Though I wrote
  chosen_spanish: Aunque yo le escribí
  alternatives_spanish:
  - Yo escribiría
  - Yo escribo
  lexicon: HALOT
  rationale: La forma verbal hebrea puede leerse con valor imperfectivo o como pasado retórico. En español, «Aunque yo le escribí» conserva bien el contraste concesivo del verso y suena natural en el contexto profético.
- source_word: לוֹ
  english_pob_choice: for him
  chosen_spanish: le
  alternatives_spanish:
  - para él
  - a él
  lexicon: HALOT
  rationale: El dativo en español se expresa con mayor naturalidad con el clítico «le», que mantiene el referente singular corporativo de Israel/Efraín sin cargar innecesariamente la frase.
- source_word: רבו
  english_pob_choice: the many things
  chosen_spanish: las muchas cosas
  alternatives_spanish:
  - las muchas
  - multitudes de cosas
  - myriadas
  lexicon: HALOT
  rationale: Rendimos la multiplicidad de modo idiomático en español. «Las muchas cosas» conserva el sentido de abundancia sin introducir una literalidad extraña como «myriadas».
- source_word: תורתי
  english_pob_choice: my law
  chosen_spanish: de mi ley
  alternatives_spanish:
  - de mi instrucción
  - de mi Torá
  lexicon: HALOT
  rationale: «Ley» reproduce bien el valor pactual de תּוֹרָה en este contexto profético y es la opción más transparente para el lector. Se conserva el posesivo divino «mi».
- source_word: כמו
  english_pob_choice: as something
  chosen_spanish: como
  alternatives_spanish:
  - como algo
  - como si fuera
  lexicon: HALOT
  rationale: El hebreo introduce la comparación de forma breve. En español, la combinación con el adjetivo siguiente funciona naturalmente como «como algo ajeno».
- source_word: זר
  english_pob_choice: foreign
  chosen_spanish: ajeno
  alternatives_spanish:
  - extraño
  - foráneo
  - ajeno a ellos
  lexicon: HALOT
  rationale: «Ajeno» comunica bien la idea de algo tratado como no perteneciente al pueblo, sin limitarse solo a la geografía. Mantiene la carga de extrañeza/alteridad del término hebreo.
- source_word: נחשבו
  english_pob_choice: were regarded
  chosen_spanish: fueron consideradas
  alternatives_spanish:
  - fueron tenidas
  - fueron contadas
  - se las consideró
  lexicon: HALOT
  rationale: La pasiva española expresa de manera clara la evaluación sufrida por «las muchas cosas de mi ley». «Fueron consideradas» conserva el valor de ser estimadas o evaluadas como algo distinto.
theological_decisions:
- issue: Valor de תּוֹרָה en contexto profético-covenantal
  english_pob_reading: my law
  chosen_spanish_reading: mi ley
  alternative_spanish_readings:
  - mi instrucción
  - mi Torá
  rationale: En español bíblico, «ley» comunica con claridad la dimensión pactal y normativa que el pasaje presupone. Se evita reemplazarlo por un término más explicativo que debilite esa fuerza.
  doctrine_reference: Torá como instrucción/canon pactual de Yahvé para Israel
- issue: Referencia del singular en לוֹ
  english_pob_reading: corporate singular referring to Israel/Ephraim
  chosen_spanish_reading: le
  alternative_spanish_readings:
  - a él
  - para él
  rationale: Se mantiene el singular gramatical sin forzar una explicitación que rompa el paralelismo poético. El contexto sigue indicando que el destinatario es el pueblo como unidad.
  doctrine_reference: Uso profético del singular corporativo
translation_notes:
  revision_awareness: Se siguió el acuerdo textual del contexto inglés sin cambios sustantivos; la decisión principal en español fue naturalizar el dativo y la comparación final sin perder la tensión entre la abundancia de la instrucción divina y el trato de extrañeza recibido.
  spanish_consistency_notes:
  - Se preservó «Yahvé» como forma estándar del proyecto solo cuando el texto lo requiera explícitamente; este versículo no la menciona.
  - Se evitó «Cristo/Mesías» por no ser pertinente al pasaje.
  - «Ley» se usó como equivalente principal de תּוֹרָה en coherencia con la línea pactual del contexto.
  - «Ajeno» se eligió para mantener la nota de alteridad sin añadir una interpretación más fuerte que la del hebreo.
