- from: Y fortificó Quedrón[a] y puso allí caballería y fuerzas, para que, saliendo[b], patrullaran las rutas de Judea[c], tal como el rey le había ordenado.
  to: Y fortificó Quedrón[a] y puso allí caballería[b] y fuerzas, para que, saliendo[c], patrullaran los caminos de Judea[d], tal como el rey le había ordenado.
  rationale: Se conserva el texto base con ajustes mínimos. Se añade la nota faltante para ‘caballería’ = ‘jinetes’, se reemplaza la nota sobre ‘rutas/caminos’ por la nota correcta sobre el matiz de ‘patrullaran’, y se afina ‘rutas’ a ‘caminos’ para reflejar mejor el griego ὁδοὺς y la documentación inglesa.
