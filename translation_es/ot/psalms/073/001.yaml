translation:
  language: es
  text: Salmo de Asaf. Ciertamente[a], Dios es bueno para Israel[b], para los de corazón limpio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Verdaderamente».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para los puros de corazón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Melodía
  lexicon: HALOT
  rationale: En los encabezados de los Salmos, מִזְמוֹר funciona como término técnico literario; «Salmo» es el equivalente castellano establecido y comunica el género sin forzar una paráfrasis.
- source_word: לְאָסָף
  english_pob_choice: of Asaph
  chosen_spanish: de Asaf
  alternatives_spanish:
  - para Asaf
  - perteneciente a Asaf
  lexicon: HALOT
  rationale: La preposición ל en superscripciones puede señalar autoría, asociación o dedicación. «De Asaf» preserva esa ambigüedad de manera natural en español, como hace el audit trail inglés.
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Verdaderamente
  - Solo
  - En verdad
  lexicon: HALOT
  rationale: אַךְ aquí introduce una afirmación enfática. «Ciertamente» transmite bien el valor aseverativo/discursivo sin resolverlo injustificadamente como un adverbio restrictivo.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - benigno
  - bondadoso
  - bondadoso y bueno
  lexicon: HALOT
  rationale: El predicado sobre Dios abarca bondad moral y beneficencia. «Bueno» es el equivalente más amplio y fiel; evita estrechar el sentido a una sola matiz como «benigno».
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: to Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - a Israel
  - hacia Israel
  lexicon: HALOT
  rationale: Con טוֹב, la ל marca relación benefactora. En español, «para Israel» expresa de forma idiomática ese beneficio, manteniendo la fuerza dativa sin sonar forzado.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים es singular en sentido y refiere al Dios de Israel; «Dios» es la traducción directa y clara.
- source_word: לְבָרֵי לֵבָב
  english_pob_choice: to those pure in heart
  chosen_spanish: para los de corazón limpio
  alternatives_spanish:
  - para los puros de corazón
  - para los limpios de corazón
  lexicon: HALOT
  rationale: בָּרֵי expresa pureza/limpieza y לֵבָב alude al centro interior de la persona. «De corazón limpio» es un español natural y fiel; conserva el sentido ético-interior sin volverlo demasiado técnico. La formulación sigue la lectura del inglés de un grupo caracterizado por pureza interior.
theological_decisions:
- issue: Relación entre «Israel» y «los de corazón limpio»
  english_pob_reading: 'Appositional/specifying: the second phrase identifies the true character of Israel in view'
  chosen_spanish_reading: 'Aposicional/especificadora: la segunda frase caracteriza o delimita al Israel aludido'
  alternative_spanish_readings:
  - 'Dos grupos coordinados: Israel en general y, además, los de corazón limpio'
  - 'Israel y luego otra clase distinta: los de corazón limpio'
  rationale: La sintaxis poética con dos frases en ל permite leer la segunda como especificación del primero, sin cerrar la tensión teológica. Mantengo ambas expresiones para no borrar la posible amplitud del hebreo.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla de antemano.
translation_notes:
  revision_awareness: Coincide con el contexto auditado en la decisión de mantener el valor aseverativo de אַךְ, la ambigüedad de לְאָסָף y la posible lectura aposicional de לְבָרֵי לֵבָב; no se requieren revisiones adicionales respecto del texto base en inglés.
  spanish_consistency_notes:
  - Se mantiene «Asaf» como transliteración estándar del nombre propio.
  - Se usa «Dios» sin mayúscula adicional interna ni sustitución por una convención de ocultamiento del nombre divino, porque el hebreo aquí tiene אֱלֹהִים.
  - «Corazón limpio» conserva el campo semántico de pureza interior sin introducir lenguaje de pureza ritual.
  - La puntuación separa la aseveración inicial de la cláusula principal, reflejando el carácter introductorio de אַךְ.
