translation:
  language: es
  text: El rico y el pobre se encuentran[a]; Yahvé es el que hizo a ambos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más interpretativamente: «El rico y el pobre tienen esto en común: Yahvé es el que hizo a ambos».'
    reason: alternative_reading
lexical_decisions:
- source_word: עָשִׁיר
  english_pob_choice: the rich
  chosen_spanish: el rico
  alternatives_spanish:
  - el hombre rico
  - la persona rica
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo/adjetivo substantivado para una clase social. «El rico» conserva la referencia genérica y la brevedad sapiencial sin cargar el texto con un sujeto más explícito que el original.
- source_word: וָרָשׁ
  english_pob_choice: and the poor
  chosen_spanish: y el pobre
  alternatives_spanish:
  - y el necesitado
  - y la persona pobre
  lexicon: HALOT
  rationale: Mantiene el contraste par de clases sociales con עָשִׁיר. «El pobre» es natural en español y conserva la concisión del proverbio.
- source_word: נִפְגָּשׁוּ
  english_pob_choice: meet together
  chosen_spanish: se encuentran
  alternatives_spanish:
  - se hallan juntos
  - tienen esto en común
  - se encuentran mutuamente
  lexicon: HALOT
  rationale: El nifal de פגשׁ expresa un encuentro recíproco. «Se encuentran» preserva el verbo concreto sin resolverlo por completo en una paráfrasis explicativa; la lectura más interpretativa queda reservada para la nota.
- source_word: עֹשֵׂה
  english_pob_choice: the maker of
  chosen_spanish: el hacedor de
  alternatives_spanish:
  - el que hace
  - el creador de
  lexicon: HALOT
  rationale: 'El participio qal funciona como sustantivo: «el que hace / el hacedor». «El hacedor de» reproduce el valor participial y suena natural en español bíblico sin reemplazarlo por un verbo finito.'
- source_word: כֻלָּם
  english_pob_choice: them all
  chosen_spanish: todos ellos
  alternatives_spanish:
  - a todos ellos
  - todos
  lexicon: HALOT
  rationale: Retoma de forma inclusiva a rico y pobre. «Todos ellos» mantiene la referencia colectiva y evita ambigüedad en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton según el criterio del proyecto, en lugar de sustituirlo por un título.
theological_decisions:
- issue: 'Sentido del primer colon: encuentro concreto o lectura más interpretativa de la condición compartida'
  english_pob_reading: The rich and the poor meet together; Yahweh is the maker of them all.
  chosen_spanish_reading: El texto conserva el encuentro concreto entre ricos y pobres, sin convertirlo en paráfrasis explicativa en la línea principal.
  alternative_spanish_readings:
  - 'El rico y el pobre tienen esto en común: Yahvé es el hacedor de todos ellos'
  - El rico y el pobre se hallan en la misma condición humana
  rationale: El hebreo permite una lectura proverbial más amplia, pero el verbo primario sigue siendo «encontrarse». La redacción principal mantiene la imagen verbal y la nota preserva la alternativa interpretativa sin borrar la tensión.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El paquete fuente indica alta concordancia y que la última revisión quedó sin cambios; por eso se mantiene la estructura semántica del inglés POB y se adapta al español con mínima intervención necesaria para fluidez.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה.
  - Se conservó «hacedor» para reflejar el participio substantivado de עֹשֵׂה.
  - «El rico / el pobre» mantiene el contraste categorial del hebreo sapiencial sin singularizar indebidamente.
