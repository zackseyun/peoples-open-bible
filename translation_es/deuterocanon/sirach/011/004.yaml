    text: 'Variante griega: «No te jactes por la ropa que llevas, ni te enaltezcas en un día de gloria; porque las obras del Señor son maravillosas, y sus obras entre los hombres están ocultas».'
    reason: textual_variant
  revision_rationale: Se ajusta el primer verbo a una formulación más idiomática en español ('no te burles de') y el segundo a una equivalencia más precisa de autogloria ('no te jactes'). También se naturaliza la redacción de la nota textual griega sin alterar su sentido. No se requiere adjudicación adicional porque son mejoras de estilo y precisión léxica, no un caso doctrinal ni de incertidumbre textual irresoluble.
