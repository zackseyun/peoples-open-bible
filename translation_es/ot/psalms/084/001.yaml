translation:
  language: es
  text: Para el director musical[a], según la Guitit[b][c]. Salmo de los hijos de Coré[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo lənaṣṣéaḥ; en encabezamientos de salmos suele referirse al responsable de la ejecución musical.
    reason: lexical_alternative
  - marker: b
    text: Hebreo Guitit; el término probablemente designa una melodía, estilo o instrumento, pero su significado preciso es incierto.
    reason: lexical_alternative
  - marker: c
    text: O simplemente «Guitit».
    reason: previous_rendering
  - marker: d
    text: O «para los hijos de Coré»; la preposición hebrea puede indicar autoría, asociación o dedicación en los títulos de los salmos.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director musical
  alternatives_spanish:
  - Para el director del coro
  - Para el maestro de música
  - Para el líder
  lexicon: HALOT
  rationale: En encabezamientos de salmos, el participio se refiere al responsable de la ejecución musical. «Director musical» comunica bien la función sin sonar demasiado moderno ni sobreespecificar si se trata de coro, culto o composición.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - sobre
  - con arreglo a
  - al son de
  lexicon: HALOT
  rationale: En superscripciones musicales, la preposición introduce una indicación de melodía, estilo o instrumento. «Según» conserva esa amplitud mejor que una opción más concreta en español.
- source_word: הַגִּתִּית
  english_pob_choice: The Gittith
  chosen_spanish: la Guitit
  alternatives_spanish:
  - la Guitita
  - el instrumento guitita
  - la melodía Guitit
  lexicon: HALOT
  rationale: Se mantiene la transliteración para no resolver de manera artificial un término cuyo referente exacto es incierto. En español se adapta la forma al sistema gráfico con artículo femenino, ya que el hebreo lleva artículo definido.
- source_word: לִבְנֵי קֹרַח
  english_pob_choice: of the sons of Korah
  chosen_spanish: de los hijos de Coré
  alternatives_spanish:
  - para los hijos de Coré
  - de parte de los hijos de Coré
  - perteneciente a los hijos de Coré
  lexicon: HALOT
  rationale: «De los hijos de Coré» preserva la ambigüedad del hebreo sobre autoría, asociación o dedicación, tal como lo hace la traducción inglesa auditada.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - canto
  - poema
  - melodía
  lexicon: HALOT
  rationale: Es el término genérico establecido para este género literario y funciona naturalmente en español bíblico.
theological_decisions:
- issue: Ambigüedad de la relación en לִבְנֵי קֹרַח
  english_pob_reading: Or 'for the sons of Korah'; the Hebrew preposition can indicate authorship, association, or dedication in psalm headings.
  chosen_spanish_reading: «de los hijos de Coré» mantiene abierta la relación exacta.
  alternative_spanish_readings:
  - para los hijos de Coré
  - de parte de los hijos de Coré
  - perteneciente a los hijos de Coré
  rationale: El encabezamiento no especifica si indica autoría, procedencia, dedicación o asociación. La traducción principal conserva esa tensión sin forzar una interpretación.
  doctrine_reference: Psalm headings; hermenéutica de títulos litúrgicos
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la incertidumbre de עַל הַגִּתִּית con «according to the Gittith» y conserva una nota alternativa para el término; también preserva la ambigüedad de לִבְנֵי קֹרַח. La versión española sigue esas mismas decisiones sin resolver el término técnico ni la relación de pertenencia.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se evita «SEÑOR» o «maestro» como sustitutos automáticos para no ocultar el valor técnico del encabezamiento.
  - «Coré» sigue la forma española habitual del nombre propio bíblico.
  - La puntuación reproduce el valor de encabezamiento poético-litúrgico con dos frases breves.
