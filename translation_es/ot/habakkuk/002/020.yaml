translation:
  language: es
  text: Pero Yahvé está en su santo templo[a]; guarde silencio[b] delante de él toda la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Templo» traduce הֵיכָל; también podría entenderse como «palacio» o «santuario».
    reason: lexical_alternative
  - marker: b
    text: La interjección hebrea implica silencio reverente; también puede verterse «calle» o «hush».
    reason: lexical_alternative
  - marker: c
    text: «Toda la tierra» sigue el hebreo; en un contexto más estrecho podría entenderse «toda la región» o «todo el país».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  english_pob_choice: But Yahweh
  chosen_spanish: Pero Yahvé
  alternatives_spanish:
  - Yahvé
  - Pero el SEÑOR
  - Yahvé, pues
  lexicon: HALOT
  rationale: El hebreo lleva la conjunción וַ, que aquí funciona con matiz contrastivo; por eso se refleja con «Pero». El nombre divino יהוה se vierte como «Yahvé», conforme al estándar del proyecto en español y preservando el nombre del pacto sin sustituirlo por una convención de máscara.
- source_word: בְּהֵיכַל קָדְשׁוֹ
  english_pob_choice: is in his holy temple
  chosen_spanish: está en su santo templo
  alternatives_spanish:
  - está en su templo santo
  - está en su sagrado templo
  - está en su santo santuario
  lexicon: HALOT
  rationale: הֵיכָל admite «templo», «palacio» o «santuario»; «templo» conserva mejor el campo cultual y la oposición con los ídolos del contexto. «Santo» refleja קָדְשׁוֹ de forma natural en español bíblico, sin perder la fuerza reverente del genitivo posesivo.
- source_word: הַס
  english_pob_choice: be silent
  chosen_spanish: calle
  alternatives_spanish:
  - guarde silencio
  - esté en silencio
  - calla
  lexicon: HALOT
  rationale: La interjección imperativa pide silencio reverente. «Calle» suena natural y digno en español, y mantiene el sentido exhortativo sin añadir matices ajenos. Se evita una paráfrasis como «guarde silencio» porque la forma breve del hebreo tiene fuerza solemne.
- source_word: מִפָּנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  - de delante de él
  lexicon: HALOT
  rationale: El hebreo literalmente alude al rostro/presencia. «Delante de él» conserva esa relación espacial y reverente con un español claro; «en su presencia» sería posible, pero suaviza un poco la imagen directa.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra
  - toda la región
  - todo el país
  lexicon: HALOT
  rationale: Aquí אָרֶץ tiene alcance universal en el marco profético. «Toda la tierra» reproduce esa amplitud sin limitarlo a «la tierra de Israel» ni diluir la solemnidad universal del llamado al silencio.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio del pacto en vez de una sustitución litúrgica. En español, «Yahvé» es la forma coherente con la política terminológica del proyecto y con el valor auditivo/identitario del tetragrama en el texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de הֵיכָל en el marco del contraste con los ídolos
  english_pob_reading: temple
  chosen_spanish_reading: templo
  alternative_spanish_readings:
  - palacio
  - santuario
  rationale: «Templo» preserva el marco cultual y la antítesis con la idolatría del pasaje sin forzar una interpretación más técnica de la morada divina. Se conserva la tensión entre la trascendencia de Yahvé y su presencia sagrada.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando todas las notas con marcadores presentes en el texto; ahora cada marcador [a]-[d] aparece exactamente en la línea traducida. No se han introducido cambios textuales respecto al sentido del hebreo ni se han añadido notas sin anclaje.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma española del tetragrama, coherente con los lineamientos del proyecto.
  - Se usa «templo» por su valor cultual y por la decisión ya auditada en el inglés POB.
  - Se conserva una sintaxis sobria y publicable en español bíblico contemporáneo.
  - No se añade puntuación explicativa dentro del versículo más allá de los marcadores requeridos.
