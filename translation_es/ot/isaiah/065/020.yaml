translation:
  language: es
  text: No habrá más de allí un[a] infante de días, ni un anciano[b] que no complete sus días; porque el joven morirá a los cien años, y el pecador, a los cien años, será maldito[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «un infante que vive solo unos pocos días». El hebreo dice literalmente «un infante de días».
    reason: lexical_alternative
  - marker: b
    text: O, «un anciano que no viva sus días completos».
    reason: lexical_alternative
  - marker: c
    text: O, «será maldecido».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: allí
  alternatives_spanish:
  - desde allí
  - de allí
  lexicon: HALOT
  rationale: El hebreo expresa origen/lugar con מִן, pero en español la combinación natural en esta frase es 'allí'. 'Desde allí' conserva más explícitamente el valor direccional, aunque suena un poco más pesado; por eso se deja como alternativa.
- source_word: עוּל יָמִים
  english_pob_choice: an infant of days
  chosen_spanish: infante de días
  alternatives_spanish:
  - un infante que vive solo unos pocos días
  - un niño que muere temprano
  lexicon: HALOT
  rationale: Se conserva la imagen literal del hebreo, como en el POB inglés, para no diluir la expresión idiomática. La alternativa más natural explica el sentido, pero pierde la figura original.
- source_word: זָקֵן אֲשֶׁר לֹא יְמַלֵּא אֶת יָמָיו
  english_pob_choice: an old man who does not fill out his days
  chosen_spanish: un anciano que no complete sus días
  alternatives_spanish:
  - un anciano que no viva sus días completos
  - un anciano que no llegue al término de sus días
  lexicon: HALOT
  rationale: '''Completar sus días'' refleja bien מלא + ימים sin sonar tan rígido como un calco absoluto. El subjuntivo relativo mantiene la construcción condicional/descriptiva del hebreo en español natural.'
- source_word: הַנַּעַר
  english_pob_choice: the youth
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el muchacho joven
  lexicon: HALOT
  rationale: '''Joven'' comunica el contraste con ''anciano'' sin precisar más edad o rango de madurez de lo que el hebreo exige. ''Muchacho'' podría ser demasiado estrecho.'
- source_word: בֶּן־מֵאָה שָׁנָה
  english_pob_choice: a hundred years old
  chosen_spanish: a los cien años
  alternatives_spanish:
  - de cien años
  - con cien años
  lexicon: HALOT
  rationale: La expresión española estándar para la edad en este contexto es 'a los cien años'. Preserva el valor idiomático de la construcción hebrea de edad sin forzar una literalidad extraña.
- source_word: יָמוּת
  english_pob_choice: will die
  chosen_spanish: morirá
  alternatives_spanish:
  - morirá ciertamente
  - morirá de todos modos
  lexicon: HALOT
  rationale: El imperfecto profético se vierte naturalmente como futuro. No se atenúa la afirmación, porque el POB inglés conserva la fuerza directa del verbo.
- source_word: הַחוֹטֵא
  english_pob_choice: the sinner
  chosen_spanish: el pecador
  alternatives_spanish:
  - el que peca
  - la persona que peca
  lexicon: HALOT
  rationale: El participio designa a la persona caracterizada por el pecado; 'pecador' es conciso y natural en español, y mantiene la fuerza de categoría moral del hebreo.
- source_word: יְקֻלָּל
  english_pob_choice: will be accursed
  chosen_spanish: será maldito
  alternatives_spanish:
  - será maldecido
  - quedará bajo maldición
  lexicon: HALOT
  rationale: '''Maldito'' comunica la idea de estar bajo maldición de manera directa y fuerte. ''Maldecido'' suena menos idiomático en español; ''quedará bajo maldición'' explicita el estado, pero pierde concisión.'
theological_decisions:
- issue: La tensión bíblica entre longevidad extraordinaria y muerte en la profecía de nueva creación
  english_pob_reading: Translate the statements straightforwardly as describing extraordinary longevity and the continued disgrace of sin, without harmonizing them with later theological systems in the wording.
  chosen_spanish_reading: Traducir de manera directa que habrá longevidad extraordinaria, pero que el pecado seguirá teniendo desenlace de muerte y maldición, sin suavizar la tensión del texto.
  alternative_spanish_readings:
  - Reformular para sugerir una muerte simbólica
  - Ajustar el versículo para armonizarlo con otras descripciones escatológicas
  rationale: El hebreo dice explícitamente 'morirá' y 'será maldito'. La traducción española debe dejar visible esa tensión teológica en vez de resolverla con paráfrasis o reinterpretación anticipada.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se requirieron revisiones aplicadas; el pasaje quedó estable en la última pasada revisada, con acuerdo general alto y solo observaciones menores. Se mantuvo la lectura directa del hebreo y la puntuación/segmentación compatible con el audit trail inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exija explícitamente; este versículo no lo contiene.
  - '''Maldito'' se conserva por su fuerza jurídica/covenantal, en línea con la elección inglesa ''accursed''.'
  - '''Infante de días'' mantiene la imagen hebrea, y la nota ofrece la alternativa explicativa sin reemplazarla en el texto principal.'
  - La edad se expresa con la construcción idiomática española 'a los cien años' para preservar claridad sin perder el contenido fuente.
