review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: aviso a los habitantes de Gaza, llegada de Sansón, cerco/acecho nocturno en la puerta de la ciudad, silencio sigiloso y plan de matarlo al amanecer. Sin embargo, hay un desajuste gramatical importante en «lo tendieron una emboscada», que no es español correcto para וַיֶּאֶרְבוּ ל֥וֹ y debe corregirse a «le tendieron una emboscada» o mejor «se apostaron contra él / lo acecharon».'
  spanish_quality_summary: La lectura es clara y digna, pero «Samson» debe normalizarse a «Sansón» en español, y «lo tendieron una emboscada» es incorrecto e interfiere con la legibilidad. «Gazitas» es defendible por cercanía al audit trail, aunque en español suena algo marcado; con nota aclaratoria puede mantenerse. El resto del verso suena natural y fiel.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Se observa buena alineación general con las decisiones léxicas del POB. Se recomienda ajustar el nombre propio a «Sansón» y la construcción de ארב + ל a un español idiomático: «le tendieron una emboscada» o «lo acecharon».'
  issues:
  - severity: high
    issue: 'Construcción no idiomática: «lo tendieron una emboscada»'
    rationale: En español estándar no se dice «tender una emboscada» con objeto directo de persona introducido como «lo». La construcción correcta es «le tendieron una emboscada» o, más sencillamente, «lo acecharon». Esto afecta fidelidad y legibilidad.
  - severity: medium
    issue: 'Nombre propio no adaptado al español: «Samson»'
    rationale: La forma bíblica normal y ampliamente inteligible en español es «Sansón». Mantener «Samson» parece un arrastre del inglés y reduce la naturalidad del texto meta.
  - severity: low
    issue: «Gazitas» es algo poco usual en español
    rationale: No es incorrecto, y la nota lo justifica, pero suena menos natural que «los de Gaza» o «los habitantes de Gaza». Aun así, puede conservarse por fidelidad al gentilicio del audit trail si se desea preservar la forma técnica.
  revised_spanish_text: 'A los gazitas[a] les dijeron: «Sansón ha venido aquí». Entonces lo rodearon y le tendieron una emboscada toda la noche junto a la puerta de la ciudad. Toda la noche guardaron silencio[b], diciendo: «Hasta la luz de la mañana[c], entonces lo mataremos».'
