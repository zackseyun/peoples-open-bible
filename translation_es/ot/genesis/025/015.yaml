  glossary_alignment: 'No hay términos teológicos relevantes aquí. En nombres propios, la alineación es mayormente buena: Hadad, Tema y Jetur están correctos; «Nafish» es una adaptación española razonable; «Kedemá» debería revisarse a «Kedemah» para respetar la decisión auditada y una transliteración más estable.'
