translation:
  language: es
  text: Harás en su dobladillo granadas de azul, púrpura y carmesí[a], alrededor de su dobladillo, y campanillas de oro entre ellas, todo alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adornos con forma de granada». El hebreo dice literalmente «granadas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: You shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Y harás
  - Harás tú
  lexicon: HALOT
  rationale: En una instrucción cultual, el hebreo funciona como mandato. «Harás» expresa el valor directivo de manera natural en español y conserva la segunda persona singular dirigida a Moisés.
- source_word: שׁוּלָיו
  english_pob_choice: its hem
  chosen_spanish: su borde
  alternatives_spanish:
  - su orilla
  - su dobladillo
  lexicon: HALOT
  rationale: El término designa el extremo inferior de la prenda. «Borde» es claro y natural en español para una vestidura; «dobladillo» sería más específico, pero puede sonar más estrecho que el hebreo.
- source_word: רִמֹּנֵי
  english_pob_choice: pomegranates
  chosen_spanish: granadas
  alternatives_spanish:
  - granadas ornamentales
  - adornos en forma de granada
  lexicon: HALOT
  rationale: El hebreo dice literalmente «granadas»; el texto no añade la explicación ornamental en la forma nominal. Se conserva el término básico y se evita paraphrasear más allá de lo que el hebreo dice.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul teñido
  - azul de tela
  lexicon: HALOT
  rationale: Es el color/material azul de los tejidos del santuario. En español, «azul» comunica con claridad el valor básico del término sin forzar una glosa técnica innecesaria en el cuerpo del verso.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - púrpura teñida
  lexicon: HALOT
  rationale: Es el color púrpura asociado a textiles de lujo y del tabernáculo. «Púrpura» es el equivalente más estable y digno en español bíblico contemporáneo.
- source_word: תוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: carmesí
  alternatives_spanish:
  - escarlata
  - hilo carmesí
  - lana escarlata
  lexicon: HALOT
  rationale: La expresión hebrea apunta al material teñido de rojo intenso. Como el texto hebreo aquí enumera colores/materiales para las granadas y no explicita «hilo» en la forma española, «carmesí» preserva el valor cromático sin añadir una concreción que el verso no exige.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - todo alrededor
  - en derredor
  lexicon: HALOT
  rationale: Indica distribución perimetral. «Alrededor» reproduce bien la repetición enfática del hebreo y su movimiento circular.
- source_word: וּפַעֲמֹנֵי זָהָב
  english_pob_choice: with bells of gold
  chosen_spanish: campanillas de oro
  alternatives_spanish:
  - campanas de oro
  - y campanillas de oro
  lexicon: HALOT
  rationale: El sustantivo puede referirse a pequeños cascabeles o campanillas. «Campanillas de oro» refleja el tamaño sugerido y el material. Se omite una conjunción explícita inicial en la línea principal porque el español fluye mejor dentro de la serie descriptiva, sin perder la coordinación semántica.
- source_word: בְּתוֹכָם
  english_pob_choice: between them
  chosen_spanish: entre ellas
  alternatives_spanish:
  - en medio de ellas
  - entre medio de ellas
  lexicon: HALOT
  rationale: La relación espacial es alternante/intercalada entre las granadas. «Entre ellas» es la forma más natural en español para expresar esa disposición alternada.
translation_notes:
  revision_awareness: Coincide con la última revisión del audit trail en que no se requieren cambios de fondo; se mantiene la lectura literal de «granadas» y la disposición circular de los adornos y campanillas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable en este versículo.
  - 'Se conserva el paralelismo de dos elementos decorativos: granadas y campanillas.'
  - La opción «carmesí» evita añadir «hilo» o «lana» porque el hebreo de este verso enumera los materiales coloreados sin desarrollar la textura en español principal.
  - «Campanillas» se usa para no exagerar el tamaño con «campanas» y para adecuarse al contexto ornamental de la vestidura.
