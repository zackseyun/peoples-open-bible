review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: una generación se va, otra viene, y la tierra permanece en contraste. Sin embargo, la anotación de notas al pie quedó desalineada con el texto y con el rastro de auditoría en inglés: la nota [a] en inglés comenta una alternativa para el verbo final עֹמָדֶת (''stands/remains''), mientras que en español se ancló en «va»; y la nota [b] en inglés explica «forever» como modismo de continuidad, mientras que en español se ancló erróneamente al verbo final con contenido distinto.'
  spanish_quality_summary: El español es claro y natural, pero «Una generación va» suena algo brusco en español bíblico corriente; «pasa» sería posible, aunque el inglés auditado prefirió evitar esa interpretación en el texto principal. La estructura más fiel y legible es mantener «va» o mejorar a «se va», pero dado el énfasis del rastro léxico conviene conservar la imagen básica sin intensificarla. La puntuación con punto y coma no es necesaria; una coma o «pero» basta. La principal reparación necesaria es corregir y reanclar las notas.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Generación», «la tierra» y «para siempre» concuerdan bien con las decisiones auditadas. Para עֹמָדֶת, el inglés POB favorece la imagen concreta «stands»; en español «permanece» es aceptable en el texto principal por naturalidad, siempre que una nota preserve la alternativa más literal «está de pie»/«se mantiene en pie».
  issues:
  - severity: high
    issue: Las notas al pie están intercambiadas y mal ancladas respecto al audit trail en inglés.
    rationale: La nota [a] del inglés corresponde a עֹמָדֶת ('stands' / 'remains forever'), no a הֹלֵךְ. La nota [b] del inglés corresponde a לְעוֹלָם ('forever' como modismo), no al verbo final. Tal como está, el lector español recibe información léxica incorrecta en lugares incorrectos.
  - severity: medium
    issue: El contenido de la nota [b] española no refleja la razón documentada del inglés POB.
    rationale: El inglés conserva una nota cultural/idiomática sobre «forever»; el español la reemplazó por una nota léxica sobre «está de pie», perdiendo la explicación del modismo hebreo לְעוֹלָם.
  - severity: low
    issue: «Va» puede sonar algo seco en español.
    rationale: Aunque es defendible por fidelidad al hebreo y al inglés 'goes', en español algunos lectores esperarían «se va». No obstante, no es un error y puede mantenerse para no añadir matiz interpretativo.
  revised_spanish_text: Una generación va, y otra generación viene, pero la tierra permanece[a] para siempre[b].
  revised_footnotes:
  - marker: a
    text: O «está de pie». El verbo hebreo es literalmente «permanece de pie» o «está firme», una imagen concreta de estabilidad duradera.
    reason: lexical_alternative
  - marker: b
    text: «Para siempre» traduce un modismo hebreo de continuidad duradera; en contexto resalta el contraste entre las generaciones pasajeras y la permanencia relativa de la tierra.
    reason: cultural_note
  revision_rationale: 'Se conserva el texto principal casi intacto porque comunica bien el sentido del hebreo y suena natural en español. La revisión corrige el problema principal: reubicar y rehacer las notas para que correspondan a las decisiones léxicas y teológicas del audit trail inglés. También se simplifica la puntuación para una lectura más fluida.'
