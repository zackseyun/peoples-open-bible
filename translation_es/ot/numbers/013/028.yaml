translation:
  language: es
  text: Sin embargo, el pueblo que habita en la tierra es fuerte, y las ciudades están fortificadas y son muy grandes; y también vimos allí a los descendientes de Anac[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hijos de Anac». La expresión hebrea se refiere a los descendientes de Anac.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפֶס כִּי
  english_pob_choice: However
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Pero
  lexicon: HALOT
  rationale: La expresión introduce una contraposición fuerte con respecto al informe favorable del versículo anterior. «Sin embargo» reproduce bien ese giro adversativo en español moderno sin añadir matices que el hebreo no exige.
- source_word: עַז
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - poderoso
  - feroz
  lexicon: HALOT
  rationale: El contexto describe la condición del pueblo como formidable. «Fuerte» comunica la idea de capacidad o vigor sin intensificar indebidamente hacia «feroz».
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la población
  lexicon: HALOT
  rationale: En este contexto colectivo, «el pueblo» conserva el sentido grupal e idiomático del hebreo.
- source_word: הַיֹּשֵׁב בָּאָרֶץ
  english_pob_choice: who dwell in the land
  chosen_spanish: que habita en la tierra
  alternatives_spanish:
  - que vive en la tierra
  - que mora en la tierra
  lexicon: HALOT
  rationale: El participio se vierte como relativa natural en español. «Habita» mantiene un registro sobrio y formal, y «tierra» refleja el término básico del hebreo sin necesidad de especificar «la tierra prometida».
- source_word: וְהֶעָרִים
  english_pob_choice: and the cities
  chosen_spanish: y las ciudades
  alternatives_spanish:
  - y los poblados
  lexicon: HALOT
  rationale: Traducción directa y natural del sustantivo plural con la conjunción.
- source_word: בְּצֻרוֹת
  english_pob_choice: fortified
  chosen_spanish: fortificadas
  alternatives_spanish:
  - amuralladas
  - defendidas
  lexicon: HALOT
  rationale: «Fortificadas» conserva el sentido militar general del término. «Amuralladas» sería más específico y podría estrechar demasiado el alcance del hebreo.
- source_word: גְּדֹלֹת מְאֹד
  english_pob_choice: very large
  chosen_spanish: muy grandes
  alternatives_spanish:
  - sumamente grandes
  - enormes
  lexicon: HALOT
  rationale: La coordinación hebrea entre tamaño y énfasis se refleja con una formulación natural. «Muy grandes» sigue de cerca el valor intensivo de מְאֹד sin exagerar.
- source_word: וְגַם
  english_pob_choice: and we also
  chosen_spanish: y también
  alternatives_spanish:
  - además
  - y además
  lexicon: HALOT
  rationale: El hebreo añade otro elemento al reporte. En español, «y también» comunica esa adición de forma fluida sin forzar la inclusión explícita del sujeto, ya presente en el verbo.
- source_word: יְלִדֵי הָעֲנָק
  english_pob_choice: the descendants of Anak
  chosen_spanish: los descendientes de Anac
  alternatives_spanish:
  - los hijos de Anac
  - la descendencia de Anac
  lexicon: HALOT
  rationale: El constructo indica linaje. «Descendientes» reproduce la idea genealógica con claridad y evita la literalidad menos natural de «hijos», que en español puede sonar más restringida.
- source_word: רָאִינוּ שָׁם
  english_pob_choice: saw ... there
  chosen_spanish: vimos allí
  alternatives_spanish:
  - los vimos allí
  - allí vimos
  lexicon: HALOT
  rationale: El perfecto narrativo se vierte en pasado simple. «Allí» mantiene la referencia locativa enfática del hebreo; se coloca después del verbo para una lectura natural en español.
theological_decisions:
- issue: 'El sentido de יְלִדֵי הָעֲנָק: descendencia o filiación literal'
  english_pob_reading: The Hebrew expression refers to those descended from Anak.
  chosen_spanish_reading: «los descendientes de Anac»
  alternative_spanish_readings:
  - «los hijos de Anac»
  - «los de la estirpe de Anac»
  rationale: La POB inglesa aclaró que la expresión refiere a linaje, no necesariamente a hijos literales. «Descendientes» preserva esa tensión semántica y evita reducir el hebreo a una filiación inmediata.
  doctrine_reference: Ninguna doctrina particular; decisión léxico-semántica sobre genealogía.
translation_notes:
  revision_awareness: El texto inglés revisado ajustó la coordinación entre «fortified» y «very large» para reflejar mejor el hebreo; por eso el español conserva una coordinación simple con «y» entre «fortificadas» y «muy grandes», evitando una pausa excesiva.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque no aparece en este versículo.
  - Se usa «Anac» para el nombre propio, siguiendo la forma habitual en español bíblico y la transliteración del hebreo.
  - Se conserva el valor colectivo de «el pueblo» y el valor militar de «fortificadas» sin introducir explicaciones ajenas al versículo.
