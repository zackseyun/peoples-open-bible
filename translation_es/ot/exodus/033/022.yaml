  source_alignment_summary: 'El borrador español refleja fielmente el hebreo y el rastro de auditoría inglés: la cláusula temporal «Y cuando pase mi gloria» representa bien וְהָיָה בַּעֲבֹר כְּבֹדִי; «te pondré en una hendidura de la roca» conserva el sentido concreto de וְשַׂמְתִּיךָ בְּנִקְרַת הַצּוּר; y «te cubriré con mi mano hasta que yo haya pasado» mantiene tanto la imagen antropomórfica como la secuencia temporal de וְשַׂכֹּתִי כַפִּי עָלֶיךָ עַד עָבְרִי.'
