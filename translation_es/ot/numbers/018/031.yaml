translation:
  language: es
  text: Ustedes y su hogar[b] pueden comerlo en cualquier lugar,[c][a] porque es su salario[c] en compensación por su servicio en la tienda del encuentro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo comerán» o «deben comerlo»; la forma hebrea en este contexto legal puede expresar instrucción o acción permitida, no simplemente tiempo pasado.
    reason: lexical_alternative
  - marker: b
    text: «Hogar» se refiere a la unidad doméstica, no meramente a la casa como edificio.
    reason: cultural_note
  - marker: c
    text: O «recompensa», «pago» o «compensación».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲכַלְתֶּם אֹתוֹ
  english_pob_choice: may eat it
  chosen_spanish: pueden comerlo
  alternatives_spanish:
  - deben comerlo
  - comerán de él
  lexicon: HALOT
  rationale: El hebreo en este contexto jurídico expresa permiso o instrucción, no simple futuro narrativo. «Pueden comerlo» conserva ese matiz de autorización sin forzar un mandato más duro que el texto no exige.
- source_word: בְּכָל מָקוֹם
  english_pob_choice: in any place
  chosen_spanish: en cualquier lugar
  alternatives_spanish:
  - en todo lugar
  - dondequiera
  lexicon: HALOT
  rationale: La idea es distributiva y no limita la comida al espacio del santuario. «En cualquier lugar» suena natural en español y mantiene la amplitud espacial del hebreo.
- source_word: אַתֶּם וּבֵיתְכֶם
  english_pob_choice: you and your household
  chosen_spanish: ustedes y su casa
  alternatives_spanish:
  - ustedes y su hogar
  - ustedes y su familia
  lexicon: HALOT
  rationale: «Casa» conserva bien בית como unidad doméstica. Aunque «hogar» o «familia» pueden funcionar, «su casa» evita restringir el sentido solo a parentesco biológico y mantiene el alcance doméstico del término.
- source_word: שָׂכָר
  english_pob_choice: wages
  chosen_spanish: salario
  alternatives_spanish:
  - pago
  - recompensa
  - compensación
  lexicon: HALOT
  rationale: El término denota remuneración por trabajo. «Salario» comunica de forma clara la idea de pago debido por servicio, y en español moderno conserva la fuerza económica de la palabra hebrea.
- source_word: חֵלֶף
  english_pob_choice: in return for
  chosen_spanish: en compensación por
  alternatives_spanish:
  - a cambio de
  - en retorno por
  - en lugar de
  lexicon: HALOT
  rationale: Aquí el término marca correspondencia remunerativa con el servicio prestado. «En compensación por» hace explícita esa relación sin reducirla a mera sustitución.
- source_word: עֲבֹדַתְכֶם
  english_pob_choice: your service
  chosen_spanish: su servicio
  alternatives_spanish:
  - su labor
  - su trabajo
  lexicon: HALOT
  rationale: En el contexto levítico se trata de servicio cultual. «Servicio» preserva la tonalidad ministerial y evita rebajar el término a trabajo genérico.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en la tienda del encuentro
  alternatives_spanish:
  - en el tabernáculo de reunión
  - en la tienda de reunión
  lexicon: HALOT
  rationale: «Tienda del encuentro» refleja el sentido del nombre del santuario y mantiene una traducción transparente del hebreo. Se evita sustituirlo por una fórmula eclesiástica más tradicional que no es la base directa del texto.
theological_decisions:
- issue: Naturaleza del alimento permitido para los sacerdotes/levitas
  english_pob_reading: The verse presents the edible portion as legitimate compensation for Levitical sanctuary service, without implying a sacrificial meal restricted to a holy place.
  chosen_spanish_reading: El versículo presenta la porción comestible como compensación legítima por el servicio levítico, sin imponer que deba comerse dentro de un espacio sagrado restringido.
  alternative_spanish_readings:
  - La porción podría entenderse como una comida sacra que exige comerla en un lugar cultual.
  - Podría leerse como una norma de consumo ligada al santuario.
  rationale: La frase «en cualquier lugar» debe conservar su fuerza legal y teológica. Por eso la traducción evita introducir una restricción espacial que el hebreo explícitamente niega, y mantiene la distinción con otras ofrendas de consumo sagrado más limitado.
  doctrine_reference: Números 18:31; contraste legal con ofrendas de santidad restringida
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene en alto acuerdo y sin revisiones aplicadas; la versión española sigue de cerca las decisiones léxicas documentadas y conserva el contraste jurídico de libertad de consumo fuera del recinto sagrado.
  spanish_consistency_notes:
  - Se usa «ustedes» como tratamiento plural neutral y contemporáneo.
  - «Tienda del encuentro» se mantiene de forma consistente para אֹהֶל מוֹעֵד.
  - «Servicio» conserva el matiz cultual y ministerial.
  - No se usa «SEÑOR» para YHWH porque este versículo no contiene el Tetragrámaton.
