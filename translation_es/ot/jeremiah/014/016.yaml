translation:
  language: es
  text: 'Y el pueblo para el que ellos profetizan será arrojado en las calles de Jerusalén, a causa del hambre y de la espada, y no habrá quien los sepulte: ellos, sus esposas, sus hijos y sus hijas. Y derramaré sobre ellos su mal.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su maldad»; o «el desastre» / «la calamidad que les sobreviene». El hebreo רָעָה puede referirse tanto al mal moral como al desastre resultante, por lo que la traducción conserva la ambigüedad.'
    reason: alternative_reading
lexical_decisions:
- source_word: נִבְּאִים לָהֶם
  english_pob_choice: prophesy to them
  chosen_spanish: profetizan
  alternatives_spanish:
  - están profetizando a ellos
  - profetizan para ellos
  lexicon: HALOT
  rationale: El participio hebreo expresa acción profética dirigida al pueblo. En español, el presente simple 'profetizan' transmite bien la relación durativa sin sobrecargar con perífrasis, y evita una traducción demasiado mecánica.
- source_word: מֻשְׁלָכִים
  english_pob_choice: cast out
  chosen_spanish: arrojados
  alternatives_spanish:
  - echados
  - expulsados
  lexicon: HALOT
  rationale: El pasivo hebreo comunica ser lanzados/despojados con vergüenza. 'Arrojados' conserva la violencia y el deshonor del verbo mejor que un término más suave.
- source_word: בְּחֻצוֹת יְרוּשָׁלַםִ
  english_pob_choice: into the streets of Jerusalem
  chosen_spanish: en las calles de Jerusalén
  alternatives_spanish:
  - por las calles de Jerusalén
  - en los espacios abiertos de Jerusalén
  lexicon: HALOT
  rationale: חוצות designa calles o espacios públicos abiertos. 'En las calles de Jerusalén' es natural en español y preserva el lugar de exposición de los cadáveres.
- source_word: מִפְּנֵי הָרָעָב וְהַחֶרֶב
  english_pob_choice: because of the famine and the sword
  chosen_spanish: a causa del hambre y de la espada
  alternatives_spanish:
  - por causa del hambre y de la espada
  - debido al hambre y a la espada
  lexicon: HALOT
  rationale: La preposición expresa causa. Se mantiene 'la espada' como imagen concreta del juicio militar, sin generalizarla a 'guerra'.
- source_word: וְאֵין מְקַבֵּר לָהֵמָּה
  english_pob_choice: with no one to bury them
  chosen_spanish: y no habrá quien los sepulte
  alternatives_spanish:
  - y no habrá quien los entierre
  - y nadie los sepultará
  lexicon: HALOT
  rationale: La construcción existencial hebrea se expresa de forma natural con 'no habrá quien'. 'Sepultar' conserva el registro elevado y funerario del contexto.
- source_word: הֵמָּה נְשֵׁיהֶם וּבְנֵיהֶם וּבְנֹתֵיהֶם
  english_pob_choice: them, their wives, their sons, and their daughters
  chosen_spanish: ellos, sus esposas, sus hijos y sus hijas
  alternatives_spanish:
  - ellos, sus mujeres, sus hijos y sus hijas
  - ellos, sus esposas, sus hijos y sus hijas
  lexicon: HALOT
  rationale: El pronombre enfático se conserva con 'ellos'. 'Esposas' corresponde al sentido relacional del sustantivo y mantiene el paralelismo familiar del hebreo.
- source_word: וְשָׁפַכְתִּי
  english_pob_choice: I will pour out
  chosen_spanish: derramaré
  alternatives_spanish:
  - vaciaré
  - verteré
  lexicon: HALOT
  rationale: שׁפך en contexto judicial funciona como verbo de derramar/verter. 'Derramaré' es la forma española más idiomática para este acto de juicio divino.
- source_word: אֶת רָעָתָם
  english_pob_choice: their evil
  chosen_spanish: su mal
  alternatives_spanish:
  - su maldad
  - su calamidad
  - el mal que les corresponde
  lexicon: HALOT
  rationale: רָעָה conserva una ambigüedad entre mal moral y desastre/calamidad. 'Su mal' mantiene esa tensión en español sin resolverla demasiado pronto, y sigue siendo suficientemente literal.
theological_decisions:
- issue: Ambigüedad de רָעָתָם en el oráculo de juicio
  english_pob_reading: their evil, with footnoted alternatives for wickedness / disaster / calamity
  chosen_spanish_reading: su mal, con nota sobre maldad, desastre o calamidad
  alternative_spanish_readings:
  - su maldad
  - su calamidad
  - el desastre debido a ellos
  rationale: El hebreo permite tanto retribución de la maldad como el sentido de calamidad sufrida. La redacción principal conserva la tensión con 'su mal', y la nota recoge las alternativas interpretativas sin cerrar el pasaje de manera prematura.
  doctrine_reference: 'Translation philosophy §3: preservar tensiones teológicas y semánticas documentadas.'
translation_notes:
  revision_awareness: El audit trail inglés revisó 'are prophesying' a 'prophesy' para un participio más natural y 'thrown out' a 'cast out' por registro. En español, se optó por el presente simple 'profetizan' y por 'arrojados' para conservar el sentido de expulsión violenta sin depender de un calco sintáctico del inglés. También se mantuvo la tensión de רָעָתָם con una nota explicativa, siguiendo la decisión del POB inglés de no resolver por completo la ambigüedad.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en el corpus, pero este versículo no contiene el nombre divino explícito.
  - '''Espada'' se conserva como metonimia de juicio bélico, conforme al patrón del texto hebreo.'
  - '''Sepultar'' mantiene un registro digno y funerario acorde al contexto de cadáveres sin enterrador.'
  - No se sustituye la imagen concreta por una paráfrasis de 'guerra' o 'castigo'; se conserva el paralelismo con 'hambre' y 'espada'.
