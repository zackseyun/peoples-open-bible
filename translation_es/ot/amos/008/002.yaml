- from: 'Y dijo[a]: «¿Qué ves, Amós?» Y dije: «Una cesta de fruto de verano». Entonces Yahvé me dijo: «Ha llegado el fin[b] a mi pueblo Israel; no volveré a pasar por él[c]».'
  to: 'Y dijo[a]: «¿Qué ves, Amós?» Y dije: «Una cesta de fruta de verano». Entonces Yahvé me dijo: «Ha llegado el fin sobre mi pueblo Israel; no volveré a pasar por ellos[b]».'
  rationale: Se corrige la nota del juego de palabras para reflejar con exactitud el hebreo, se mejora la naturalidad de «fruta de verano», se adopta «sobre mi pueblo Israel» para reflejar mejor el matiz de juicio de בוא אל en este contexto, y se sustituye «por él» por «por ellos» para un español más claro sin perder la tensión léxica de עֲבוֹר.
