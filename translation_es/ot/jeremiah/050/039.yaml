review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: consecuencia inferencial, fauna del desierto, personificación femenina de Babilonia y desolación permanente. Sin embargo, en בְּנוֹת יַעֲנָה el texto principal no sigue la decisión auditada del POB inglés, que usa el sentido idiomático «ostriches» en el texto y reserva la literalidad para nota. Además, la última cláusula repite «ser habitada», lo cual es aceptable semánticamente, pero puede mejorarse para reflejar mejor la variación verbal hebrea entre ישב y שׁכן.'
  spanish_quality_summary: El español es claro y digno, pero «las hijas del avestruz» en el texto principal suena innecesariamente semitizante y menos natural para lectura eclesial amplia. También conviene unir la oración con punto y coma, como en el inglés auditado, para mantener mejor la continuidad del verso. «Ni vivirá nadie en ella» suena más natural y preserva mejor la idea de residencia en la segunda negación.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. La personificación femenina se mantiene correctamente con «en ella». La decisión zoológica incierta para אִיִּים se maneja bien con «hienas» y nota alternativa. La principal desalineación es estilístico-lexical: el POB inglés eligió «ostriches» en el texto principal, por lo que en español corresponde «avestruces» con nota que preserve la literalidad «hijas del avestruz».'
  issues:
  - severity: medium
    issue: «las hijas del avestruz» en el texto principal
    rationale: El hebreo es un modismo para «avestruces». El rastro auditado del POB inglés coloca la literalidad en nota, no en el texto principal. En español, dejar el hebraísmo en el cuerpo del verso reduce naturalidad y se aparta de la decisión documentada.
  - severity: low
    issue: Repetición de «ser habitada» en ambas cláusulas finales
    rationale: Aunque comunica bien la desolación, el hebreo usa dos verbos distintos. Una formulación como «ni vivirá nadie en ella de generación en generación» preserva mejor el matiz de residencia y mejora la fluidez española.
  - severity: low
    issue: Puntuación menos integrada que el modelo auditado
    rationale: Separar con punto después de «en ella[c]» funciona, pero un punto y coma mantiene mejor la continuidad poética y argumentativa del verso.
  revised_spanish_text: Por tanto, criaturas del desierto habitarán allí con hienas[a], y avestruces[b] habitarán en ella[c]; no volverá a ser habitada, ni vivirá nadie en ella de generación en generación.
  revised_footnotes:
