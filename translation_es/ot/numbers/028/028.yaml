revisions:
- from: 'Y su ofrenda vegetal será flor de harina amasada con aceite: tres décimas[a] para el becerro[b] uno, y dos décimas para el carnero uno.'
  to: 'Y su ofrenda de grano será flor de harina mezclada con aceite: tres décimas[a] para el toro, y dos décimas para el carnero.'
  rationale: Se ajusta «ofrenda vegetal» a «ofrenda de grano» para reflejar con más claridad מִנְחָה en este contexto y alinearse mejor con el audit trail inglés. Se cambia «amasada con aceite» por «mezclada con aceite», más fiel al hebreo. Se corrige פַּר como «toro» en lugar de «becerro». Se elimina la construcción poco idiomática «uno» tras los animales, manteniendo la distribución prescrita en español natural. Se simplifican las notas a la única nota metrológica necesaria.
