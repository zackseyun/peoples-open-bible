id: 1CO.11.10
reference: 1 Corinthians 11:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: διὰ τοῦτο ὀφείλει ἡ γυνὴ ἐξουσίαν ἔχειν ἐπὶ τῆς κεφαλῆς διὰ τοὺς ἀγγέλους.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/011/010.yaml
  text: For this reason the woman ought to have authority on her head[b][a], because of the angels.
  footnotes:
  - marker: a
    text: Or, more interpretively, 'ought to wear a sign of authority on her head.' The Greek text says 'authority' and does not explicitly include 'sign' or 'covering.'
    reason: alternative_reading
  - marker: b
    text: Or 'because of the messengers,' though 'angels' is the more likely sense here.
    reason: lexical_alternative
translation:
  language: ko
  text: 이런 까닭에 여자는 천사들로 인해 자기 머리에 권위를 두어야 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 본문은 「권위(ἐξουσία)」라고 말할 뿐 「표시」나 「가리개」를 명시하지 않는다. 전통적으로 「권위의 표시」로 풀어 옮긴 번역도 있으나, 본문 자체는 의도적으로 모호하다.
    reason: alternative_reading
  - marker: b
    text: 「천사들」(ἀγγέλους)이 누구를 가리키는지(예배에 참여하는 천사들/창세기 6장의 타락한 영적 존재 등) 본문은 특정하지 않는다.
    reason: lexical_alternative
