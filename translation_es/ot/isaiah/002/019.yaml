review_pass:
  verdict: revise
  source_alignment_summary: El borrador español acierta en la estructura general, en 'Yahvé', en la imaginería de escondite, y en 'cuando se levante para aterrar la tierra'. Sin embargo, no preserva bien el valor de מִפְּנֵי ... וּמֵהֲדַר, que en el hebreo expresa huida 'de delante de / ante' la presencia aterradora y la majestad de Yahvé, no meramente causa con 'por'.
  spanish_quality_summary: El español es mayormente claro y digno. 'Las cuevas de las peñas' y 'los agujeros del polvo' son aceptables, aunque este último es deliberadamente áspero. El problema principal de legibilidad/fidelidad es 'por[a] el terror... y por el esplendor...', que además suena algo forzado en secuencia doble. 'Ante el terror... y ante el esplendor...' o 'de delante del terror...' mejora la naturalidad y conserva mejor la escena de huida.
  glossary_alignment: Buena alineación con la terminología del proyecto en 'Yahvé'. No hay otros términos doctrinales conflictivos. La nota alternativa sobre 'agujeros del polvo' está bien conservada y bien anclada.
  issues:
  - severity: high
    issue: מִפְּנֵי / וּמֵהֲדַר se tradujo como 'por ... y por'
    rationale: El hebreo expresa alejamiento/huida ante la presencia terrorífica y la majestad de Yahvé ('from before ... and from ...'), no solo causa. 'Por' reduce el matiz espacial-presencial y debilita la imagen del juicio que hace huir a la gente a escondites.
  - severity: low
    issue: La nota [a] está anclada en 'por' en vez de en la frase problemática 'agujeros del polvo'
    rationale: La nota explica una alternativa léxica para וּבִמְחִלּוֹת עָפָר, así que el marcador debe aparecer junto a 'agujeros del polvo', no junto a 'por'.
  revised_spanish_text: Y entrarán en las cuevas de las peñas y en los agujeros del polvo[a], ante el terror de Yahvé y ante el esplendor de su majestad, cuando se levante para aterrar la tierra.
  revised_footnotes:
  - marker: a
    text: O 'los agujeros de la tierra' o 'las madrigueras del polvo'.
    reason: alternative_reading
  revision_rationale: Se cambia 'por ... y por' a 'ante ... y ante' para reflejar mejor מִפְּנֵי y וּמֵהֲדַר como huida ante la presencia aterradora y la majestad de Yahvé. Se mueve la nota [a] para anclarla correctamente a 'agujeros del polvo', que es la expresión para la cual se documentan alternativas léxicas. El resto del borrador puede mantenerse.
