review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la secuencia de mandatos, la referencia a la comunidad exiliada, la expresión filial/corporativa y la fórmula profética. También acierta al distinguir אֲדֹנָי y יהוה como «Señor Yahvé». Sin embargo, la cláusula final no refleja con suficiente precisión la estructura correlativa «si... y si...» entendida como «ya sea... o ya sea... / sea que... o sea que...», y «dejan de hacerlo» queda demasiado vaga porque el hebreo contrasta oír/escuchar con rehusar o abstenerse de atender.
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «entra a los desterrados» suena menos natural que «ve a los desterrados» o «ve a los exiliados», y «dejan de hacerlo» introduce ambigüedad referencial innecesaria. Además, la única nota al pie está mal anclada: el marcador [a] aparece sobre «diles» aunque la nota explica «hijos».'
  glossary_alignment: Alineación parcial. «Yahvé» cumple la política del proyecto para יהוה. «Los hijos de tu pueblo» respeta la decisión de mantener la expresión de parentesco. No obstante, la nota de alternativa debe anclarse en «hijos», y la cláusula final debe reflejar mejor el valor de alternativa correlativa y el matiz contextual de חדל como rehusar atender.
  issues:
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota explica la expresión «los hijos de tu pueblo», pero el marcador aparece en «diles[a]». Esto incumple la disciplina de notas y confunde al lector.
  - severity: medium
    issue: «Entra a los desterrados» es poco natural en español para este contexto.
    rationale: Aunque בוא puede tener matiz de entrar, aquí la combinación «ve, entra» ante un grupo personal suena forzada. «Ve a los desterrados» comunica mejor el movimiento hacia la comunidad exiliada sin sobreespecificar.
  - severity: high
    issue: «Si escuchan, o si dejan de hacerlo» no expresa bien el sentido final.
    rationale: La estructura hebrea expresa alternativas correlativas, no una mera condición. Además, «dejan de hacerlo» es demasiado impreciso; el contexto profético contrasta escuchar con rehusar atender. Una formulación como «ya sea que escuchen o que se nieguen» es más fiel y legible.
  revised_spanish_text: 'Y ve, ve a los desterrados, a los hijos[a] de tu pueblo, y háblales y diles: «Así dice el Señor Yahvé: “Ya sea que escuchen o que se nieguen”».

    '
  revised_footnotes:
