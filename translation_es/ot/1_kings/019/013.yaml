translation:
  language: es
  text: 'Y sucedió que, cuando Elías lo oyó[a], cubrió su rostro con su manto, salió y se puso a la entrada de la cueva. Y he aquí, una voz vino a él y dijo: «¿Qué haces aquí, Elías?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El objeto de «oyó» queda implícito en hebreo; por el contexto inmediato, puede referirse a lo que acaba de preceder, a menudo entendido como el sonido o la voz del versículo anterior.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּשְׁמֹעַ
  english_pob_choice: when ... heard it
  chosen_spanish: al oírlo[a]
  alternatives_spanish:
  - cuando lo oyó
  - tan pronto como lo oyó
  lexicon: HALOT
  rationale: La construcción temporal se expresa con naturalidad en español mediante «al oírlo», que conserva la relación inmediata con el contexto previo. El pronombre lo reproduce el objeto implícito que el hebreo no menciona, sin precisar más de la cuenta qué fue exactamente lo oído.
- source_word: וַיָּלֶט פָּנָיו
  english_pob_choice: he wrapped his face
  chosen_spanish: se cubrió el rostro
  alternatives_spanish:
  - envolvió su rostro
  - veló su rostro
  lexicon: HALOT
  rationale: El verbo indica cubrir o envolver estrechamente. En español, «se cubrió el rostro» comunica la acción de forma natural y preserva el gesto corporal narrativo. «Veló» sería más literal en tono religioso, pero menos transparente para el lector moderno.
- source_word: בְּאַדַּרְתּוֹ
  english_pob_choice: in his cloak
  chosen_spanish: con su manto
  alternatives_spanish:
  - en su manto
  - con su capa
  lexicon: HALOT
  rationale: אַדֶּרֶת designa una prenda exterior, a menudo un manto. «Con su manto» mantiene la referencia a esa prenda y su función de cubrir el rostro; «capa» es posible, pero menos ajustada al registro bíblico y a la tradición de este personaje.
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - salió afuera
  lexicon: HALOT
  rationale: El movimiento fuera de la cueva se expresa con el verbo simple «salió», que es el equivalente narrativo natural y no añade dirección o énfasis ajenos al hebreo.
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se quedó
  alternatives_spanish:
  - se puso de pie
  - se detuvo
  lexicon: HALOT
  rationale: Aunque literalmente significa «se puso de pie» o «se detuvo», en el contexto de situarse en un lugar fijo junto a la entrada, «se quedó» comunica bien la postura adoptada sin sonar rígido en español. Se mantiene la idea de permanencia en el umbral.
- source_word: פֶּתַח הַמְּעָרָה
  english_pob_choice: the entrance of the cave
  chosen_spanish: a la entrada de la cueva
  alternatives_spanish:
  - en la entrada de la cueva
  - en el umbral de la cueva
  lexicon: HALOT
  rationale: «Entrada» reproduce פֶּתַח de manera clara e idiomática. «Cueva» traduce מְעָרָה con sencillez. La combinación conserva la escena espacial sin recurrir a una expresión demasiado literaria como «boca» o «umbral».
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí[b]
  alternatives_spanish:
  - Y mirad
  - Y entonces he aquí
  lexicon: HALOT
  rationale: «Y he aquí» preserva el efecto discursivo de sorpresa y presentación vívida que marca la partícula hebrea. Es una fórmula tradicional pero todavía inteligible en español bíblico.
- source_word: אֵלָיו קוֹל
  english_pob_choice: a voice came to him
  chosen_spanish: una voz le habló
  alternatives_spanish:
  - una voz vino a él
  - le llegó una voz
  lexicon: HALOT
  rationale: El hebreo expresa una voz que se dirige a él. En español, «una voz le habló» comunica mejor la función comunicativa del giro que una traducción más literal pero menos natural como «una voz vino a él». Se mantiene la presencia auditiva sin sobreexplicar su naturaleza.
- source_word: מַה לְּךָ פֹה
  english_pob_choice: What are you doing here
  chosen_spanish: ¿Qué haces aquí, Elías?
  alternatives_spanish:
  - ¿Qué te va aquí, Elías?
  - ¿Qué haces tú aquí, Elías?
  lexicon: HALOT
  rationale: Se conserva la fuerza idiomática de la pregunta sin volverla opaca. «¿Qué haces aquí?» comunica de modo natural la cuestión de propósito o asunto que plantea el hebreo, mientras que «¿qué te va aquí?» sería demasiado extraño para el español contemporáneo.
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elías
  lexicon: Standard transliteration tradition
  rationale: Nombre propio bíblico en la forma española habitual y reconocible.
theological_decisions:
- issue: Objeto implícito de «oír»
  english_pob_reading: heard it
  chosen_spanish_reading: al oírlo
  alternative_spanish_readings:
  - al oír la voz
  - al oír el sonido
  rationale: El hebreo no explicita el objeto de lo oído en este verso. Siguiendo el criterio de la POB inglesa, se conserva esa ambigüedad con un pronombre neutro («lo») en vez de identificarlo como «voz» o «sonido». Así no se resuelve artificialmente la referencia del contexto inmediato.
  doctrine_reference: 'Translation philosophy §3: preservar tensiones textuales y no sobreespecificar lo implícito'
- issue: Pregunta idiomática «מַה לְּךָ פֹה»
  english_pob_reading: What are you doing here
  chosen_spanish_reading: ¿Qué haces aquí?
  alternative_spanish_readings:
  - ¿Qué es para ti aquí?
  - ¿Por qué estás aquí?
  rationale: La pregunta hebrea indaga el asunto o propósito de Elías en ese lugar. «¿Qué haces aquí?» conserva esa fuerza interrogativa sin convertirla indebidamente en una mera pregunta de ubicación o motivo.
  doctrine_reference: HALOT; equivalencia funcional con preservación del matiz idiomático
translation_notes:
  revision_awareness: 'Se revisó el pasaje con alta concordancia respecto del audit trail inglés: se mantuvieron la ambigüedad del objeto de «oír» y la fuerza idiomática de la pregunta final, sin introducir precisiones no presentes en el hebreo. No hubo revisiones aplicadas en la pasada más reciente del texto fuente, y la lectura inglesa se mantuvo estable.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefiere el título narrativo «Elías» sin añadir «el profeta», siguiendo el hebreo.
  - «Manto» se mantiene para אַדֶּרֶת por coherencia con el personaje y el gesto de cubrirse el rostro.
  - La puntuación reproduce el ritmo narrativo con dos segmentos principales y cierre interrogativo directo.
