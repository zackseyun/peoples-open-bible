    reason: lexical_alternative
  - marker: b
    text: Hebrew Asherim; likely wooden cult objects associated with the goddess Asherah.
    reason: cultural_note
  - marker: c
    text: Or 'their idols'; Hebrew more specifically 'their carved images.'
