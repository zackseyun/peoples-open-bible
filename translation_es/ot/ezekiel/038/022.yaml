    reason: lexical_alternative
  - marker: c
    text: O «sus bandas» o «sus ejércitos»; el término hebreo se refiere a las fuerzas que lo acompañan.
    reason: lexical_alternative
  revision_rationale: Se corrigió 'sangre' a 'derramamiento de sangre' para reflejar mejor el valor metonímico de דָּם en contexto de juicio. Se reemplazó 'derramaré' por 'haré llover' para preservar la fuerza de אַמְטִיר. Se reubicó la nota [a] al sintagma correcto y se reformuló la nota [b] para que refleje fielmente la observación del POB inglés sin atribuir erróneamente 'tradicional' al hebreo.
