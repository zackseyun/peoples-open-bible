translation:
  language: es
  text: y el candelabro para la luz[a], y sus utensilios, y sus lámparas, y el aceite para la luz,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «el candelabro de la luz» y «el aceite de la luz».
    reason: lexical_alternative
lexical_decisions:
- source_word: מְנֹרַת הַמָּאוֹר
  english_pob_choice: the lampstand for the light
  chosen_spanish: el candelabro de la luz
  alternatives_spanish:
  - el candelabro para la luz
  - el candelabro de iluminación
  lexicon: HALOT
  rationale: מְנוֹרָה designa aquí el candelabro ritual del tabernáculo. En español, "candelabro" es claro y digno; "de la luz" conserva el vínculo constructo con הַמָּאוֹר sin volverlo demasiado explicativo. "Para la luz" sería más funcional, pero menos fiel a la relación nominal visible en el hebreo.
- source_word: כֵּלֶיהָ
  english_pob_choice: its utensils
  chosen_spanish: sus utensilios
  alternatives_spanish:
  - sus vasos
  - sus implementos
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para artículos, recipientes o utensilios. En el contexto del tabernáculo, "utensilios" mantiene esa amplitud con naturalidad en español sin restringir innecesariamente el sentido.
- source_word: נֵרֹתֶיהָ
  english_pob_choice: its lamps
  chosen_spanish: sus lámparas
  alternatives_spanish:
  - sus lámparas/bujías
  - sus mechas
  lexicon: HALOT
  rationale: נֵר refiere a lámpara o luz de lámpara. "Lámparas" es la equivalencia más clara y aceptada en español para este conjunto del candelabro.
- source_word: שֶׁמֶן הַמָּאוֹר
  english_pob_choice: the oil for the light
  chosen_spanish: el aceite para la luz
  alternatives_spanish:
  - el aceite de la luz
  - el aceite para alumbrar
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente "aceite de la luz/iluminación". "Para la luz" reproduce bien la relación funcional y suena natural en español, manteniendo visible el paralelismo con la frase anterior.
- source_word: וְאֶת ... וְאֶת ... וְאֶת ... וְאֵת
  english_pob_choice: and ... and ... and ... and
  chosen_spanish: y ... y ... y ... y
  alternatives_spanish:
  - y ... y ... y ... e
  lexicon: Hebrew grammar
  rationale: La cadena repetida de marcadores de objeto directo con waw construye un inventario. Repetir "y" en español preserva el ritmo enumerativo del hebreo y la transparencia de la lista.
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con el auditable inglés POB: mantiene la enumeración de objetos y la opción funcional para מְנֹרַת הַמָּאוֹר y שֶׁמֶן הַמָּאוֹר. La principal adaptación es escoger "candelabro" como equivalente español natural para el objeto ritual, sin perder la relación constructa indicada en la nota.'
  spanish_consistency_notes:
  - Se conserva la repetición de "y" para reflejar la lista hebrea.
  - '"Luz" traduce consistentemente הַמָּאוֹר en el cuerpo del texto; la nota ofrece la alternativa más formal, cercana a la estructura nominal del hebreo.'
  - No se introduce terminología eclesiástica tradicional que oscurezca el inventario del tabernáculo.
