revisions:
- from: Que Dios apresure[a] su misericordia sobre Israel. Él nos rescatará de la impureza de enemigos profanos[b][c]. El Señor mismo es nuestro rey por siempre y para siempre.
  to: Que Dios apresure[a] su misericordia sobre Israel. Él nos rescatará de la impureza de enemigos profanos[c][b]. El Señor mismo es nuestro rey por siempre jamás.
  rationale: Se mantiene la estructura y las elecciones léxicas principales del borrador, pero se corrige la clausula final a «por siempre jamás» para lograr una expresión española solemne y natural que comunique mejor la duración intensificada del griego. También se ajustan las notas b y c para que presenten alternativas léxicas reales, en línea con el POB inglés. No se requiere una relectura doctrinal ni una adjudicación compleja.
  reviewer_model: gpt-5.4
