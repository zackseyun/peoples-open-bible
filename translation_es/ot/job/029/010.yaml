translation:
  language: es
  text: La voz de los nobles fue acallada[a], y su lengua se pegó al paladar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la voz de los príncipes fue acallada».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «su lengua se pegó a su paladar»; es un modismo para indicar que no podían o no querían hablar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  lexicon: HALOT
  rationale: «Voz» conserva el matiz humano y discursivo del contexto; aquí no se trata de un sonido genérico, sino de la expresión de hombres prominentes que queda en silencio.
- source_word: נְגִידִים
  english_pob_choice: nobles
  chosen_spanish: nobles
  alternatives_spanish:
  - príncipes
  - líderes
  - gobernantes
  lexicon: HALOT
  rationale: «Nobles» transmite dignidad social y prominencia sin restringir innecesariamente el término a una forma específica de monarquía.
- source_word: נֶחְבָּאוּ
  english_pob_choice: was hushed
  chosen_spanish: fue acallada
  alternatives_spanish:
  - se escondió
  - fue escondida
  - calló
  lexicon: HALOT
  rationale: Aunque el verbo básico es «ocultar/esconder», con «voz» el sentido idiomático es que dejó de oírse. «Fue acallada» expresa bien ese silencio impuesto o producido en español natural.
- source_word: וּלְשׁוֹנָם
  english_pob_choice: and their tongue
  chosen_spanish: y su lengua
  alternatives_spanish:
  - y sus lenguas
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo singular colectivo con sufijo plural. El singular «su lengua» conserva mejor el giro poético e idiomático que un plural literal.
- source_word: לְחִכָּם
  english_pob_choice: to the roof of their mouth
  chosen_spanish: al paladar
  alternatives_spanish:
  - al techo de su boca
  - al paladar de su boca
  lexicon: HALOT
  rationale: «Paladar» comunica de manera clara y digna la imagen idiomática. Es más natural en español bíblico que una perífrasis más pesada, sin perder el sentido corporal del original.
- source_word: דָּבֵקָה
  english_pob_choice: stuck
  chosen_spanish: se pegó
  alternatives_spanish:
  - se adhirió
  - quedó pegada
  - se aferró
  lexicon: HALOT
  rationale: «Se pegó» refleja de forma directa la idea de adherirse/pegarse y resulta idiomático en español. Mantiene la imagen de incapacidad para hablar.
theological_decisions:
- issue: Imagen idiomática de silencio / imposibilidad de hablar
  english_pob_reading: their tongue stuck to the roof of their mouth, an idiom for being unable or unwilling to speak
  chosen_spanish_reading: su lengua se pegó al paladar
  alternative_spanish_readings:
  - su lengua quedó callada
  - su lengua se adhirió al paladar
  rationale: No hay una cuestión doctrinal, pero sí una tensión entre traducción literal e idiomática. La redacción elegida conserva la imagen corporal y deja claro el efecto de silencio, sin convertirla en mera paráfrasis.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se revisó el dato de validación previo: ahora ambos marcadores de nota, [a] y [b], aparecen exactamente en el texto español en los lugares correspondientes. No se añadieron notas sin anclaje.'
  spanish_consistency_notes:
  - Se mantuvo la equivalencia idiomática de la primera cola poética con «voz de los nobles fue acallada».
  - Se conservó el singular colectivo «su lengua» para reflejar el hebreo y la economía poética.
  - «Paladar» funciona en español como término claro y reverente para el hebreo חִךְ en este modismo.
