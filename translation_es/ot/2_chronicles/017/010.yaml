translation:
  language: es
  text: Y vino pavor de Yahvé sobre todos los reinos de las tierras que estaban alrededor de Judá[a], y no hicieron guerra contra Josafat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «terror de Yahvé» o «temor de Yahvé». La expresión hebrea puede denotar un miedo asociado con Yahvé o producido por él; aquí probablemente indica un pavor enviado divinamente sobre los reinos vecinos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: hubo
  alternatives_spanish:
  - vino
  - llegó a haber
  lexicon: HALOT
  rationale: El hebreo וַיְהִי con un sustantivo abstracto expresa la irrupción o existencia de un estado. En español, «hubo» conserva ese inicio factual sin sonar forzado; «vino» sería menos natural aquí y «llegó a haber» resulta más pesado.
- source_word: פַּחַד
  english_pob_choice: the fear
  chosen_spanish: pavor
  alternatives_spanish:
  - temor
  - terror
  lexicon: HALOT
  rationale: פַּחַד puede abarcar temor, terror o pavor. Dado el contexto militar y la idea de un miedo impuesto por intervención divina, «pavor» comunica mejor la intensidad que un simple «temor», sin convertirlo en una paráfrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé». No se usa la sustitución tradicional «el SEÑOR» porque el texto fuente identifica explícitamente el nombre propio de Dios.'
- source_word: עַל
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - encima de
  lexicon: HALOT
  rationale: Con un sustantivo como פַּחַד, עַל marca la esfera o el objeto afectado. «Sobre» mantiene ese valor de caída/incidencia del miedo; «contra» sería demasiado interpretativo y «encima de» sonaría menos idiomático.
- source_word: כָּל מַמְלְכֹת הָאֲרָצוֹת
  english_pob_choice: all the kingdoms of the lands
  chosen_spanish: todos los reinos de las tierras
  alternatives_spanish:
  - todos los reinos de los países
  - todos los reinos de las regiones
  lexicon: HALOT
  rationale: 'Se preservan ambos sustantivos del hebreo: מַמְלְכֹת = «reinos» y הָאֲרָצוֹת = «las tierras». «Tierras» es más fiel que reducirlo a «países» o «regiones», que suavizarían la amplitud geográfica del original.'
- source_word: אֲשֶׁר סְבִיבוֹת יְהוּדָה
  english_pob_choice: that were around Judah
  chosen_spanish: que estaban alrededor de Judá
  alternatives_spanish:
  - que rodeaban a Judá
  - que estaban circundantes a Judá
  lexicon: HALOT
  rationale: La cláusula relativa localiza los reinos vecinos. «Que estaban alrededor de Judá» es natural y conserva el sentido locativo de סְבִיבוֹת sin forzar una construcción más técnica o menos española.
- source_word: וְלֹא נִלְחֲמוּ עִם
  english_pob_choice: and they did not make war against
  chosen_spanish: y no pelearon contra
  alternatives_spanish:
  - y no hicieron guerra contra
  - y no combatieron contra
  lexicon: HALOT
  rationale: נִלְחֲמוּ עִם indica combatir o hacer guerra con/contra. «Pelearon contra» es claro y breve en español; «hicieron guerra contra» preservaría más explícitamente el matiz bélico, pero suena más pesado.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Jehosafat
  lexicon: Standard biblical Spanish transliteration
  rationale: En español bíblico ampliamente recibido, el nombre se translitera «Josafat». Se prefiere esta forma asentada para legibilidad y reconocimiento eclesial.
theological_decisions:
- issue: Sentido de פַּחַד יְהוָה en este contexto
  english_pob_reading: objective/genitival sense expressing dread associated with or sent by the LORD upon surrounding kingdoms
  chosen_spanish_reading: pavor enviado por Yahvé sobre los reinos vecinos
  alternative_spanish_readings:
  - temor reverente de Yahvé
  - terror procedente de Yahvé
  rationale: 'El contexto es político-militar: el efecto del sintagma es impedir la guerra. Por eso la traducción española mantiene la idea de un pavor causado por Dios, sin convertirlo en reverencia devocional. A la vez, se preserva la tensión semántica del hebreo, que puede abarcar temor, pavor o terror.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; original-language primacy'
translation_notes:
  revision_awareness: Se ha mantenido la lectura de alta concordancia del audit trail inglés sin cambios sustanciales. La principal adaptación al español fue elegir una formulación natural para וַיְהִי פַּחַד יְהוָה, conservando el sentido de irrupción de un estado de miedo divinamente causado.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme a la política del proyecto.
  - Se mantiene «Josafat» como transliteración bíblica usual en español para mayor claridad lectora.
  - No se colapsó «reinos de las tierras» en una sola idea para respetar la duplicación hebrea.
  - «Pelearon contra» conserva el sentido bélico sin expandir innecesariamente el verbo hebreo.
