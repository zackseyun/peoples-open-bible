translation:
  language: es
  text: Y pusieron las porciones de grasa sobre las pechugas[a], y él quemó las porciones de grasa sobre el altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'hizo subir en humo las porciones de grasa sobre el altar'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂימוּ
  english_pob_choice: They placed
  chosen_spanish: pusieron
  alternatives_spanish:
  - colocaron
  - pusieron allí
  - la pusieron
  lexicon: HALOT
  rationale: שׂים expresa poner/colocar. En español, 'pusieron' reproduce la acción ritual de manera natural y directa sin añadir matiz interpretativo.
- source_word: הַחֲלָבִים
  english_pob_choice: the fat pieces
  chosen_spanish: la grasa
  alternatives_spanish:
  - los pedazos de grasa
  - las porciones de grasa
  - la gordura
  lexicon: HALOT
  rationale: En este contexto sacrificial, חֵלֶב designa la grasa destinada a la ofrenda. 'La grasa' es fiel y natural en español; el plural inglés se resuelve sin forzar una fragmentación innecesaria.
- source_word: עַל הֶחָזוֹת
  english_pob_choice: on the breasts
  chosen_spanish: sobre los pechos
  alternatives_spanish:
  - sobre los pechos del animal
  - sobre el pecho
  - sobre las pechugas
  lexicon: HALOT
  rationale: חָזֶה aquí es la pieza anatómica sacrificial, literalmente la zona del pecho. 'Pechos' conserva la referencia corporal del texto fuente y mantiene la imagen cultual, aunque en español pueda sonar más general que el término técnico.
- source_word: וַיַּקְטֵר
  english_pob_choice: he burned
  chosen_spanish: quemó
  alternatives_spanish:
  - hizo humear
  - ofreció en humo
  - quemó sobre el altar
  lexicon: HALOT
  rationale: קטר en el lenguaje ritual implica quemar la ofrenda en el altar, con el resultado de humo. 'Quemó' sigue la decisión inglesa por claridad, sin perder el sentido sacrificial.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - del altar
  lexicon: HALOT
  rationale: El sufijo direccional con מזבח se vierte de modo idiomático como ubicación en el altar. 'Sobre el altar' es la expresión natural en español para el contexto de sacrificio.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece exactamente en el texto principal junto a ''pechos''. No se introdujeron notas sin anclaje.'
  spanish_consistency_notes:
  - Se mantiene 'altar' y no 'ara' por coherencia cultual y claridad moderna.
  - Se conserva una traducción verbal simple ('quemó') para reflejar la acción ritual sin sobrecargar el verso con explicación interpretativa.
  - '''Pechos'' se usa como equivalente funcional de la pieza sacrificial del hebreo, en línea con la decisión inglesa de ''breasts''.'
