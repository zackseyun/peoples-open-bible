- from: 'Habla[a] a ellos: «Así dice el Señor Yahvé: “Miren, yo estoy tomando el palo de José, el que está en la mano de Efraín, y las tribus de Israel unidas con él; y las pondré con él, con el palo de Judá, y las haré un solo palo, y serán uno en mi mano”».'
  to: 'Diles: «Así dice el Señor Dios Yahvé: “Miren, yo estoy tomando el palo de José, el que está en la mano de Efraín, y las tribus de Israel unidas con él[a]; y las pondré con él[b], con el palo de Judá, y las haré un solo palo, y serán uno en mi mano”».'
  rationale: Se corrige la fórmula divina para reflejar tanto אֲדֹנָי como יְהוִה conforme a la política del proyecto, se mejora la naturalidad del imperativo inicial en español, y se restauran en notas las alternativas léxicas relevantes conservadas por la auditoría inglesa.
