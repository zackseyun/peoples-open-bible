  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Hijo de hombre' concuerda con la decisión auditada. No aparecen términos como Yahvé/Mesías/Cristo que requieran control especial. 'Casa rebelde' preserva adecuadamente בֵּית מְרִי.
