translation:
  language: es
  text: 'Porque desde hace mucho te quebré el yugo[a]; rompí tus coyundas. Pero dijiste: «No serviré». Sí, en toda colina alta y bajo todo árbol frondoso[b][c] te echabas como prostituta.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde antiguo». La expresión hebrea puede señalar un pasado remoto; aquí probablemente alude a la historia temprana de liberación de Israel.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «bajo todo árbol frondoso», una expresión profética fija para lugares asociados con el culto idolátrico.'
    reason: cultural_note
  - marker: c
    text: El hebreo tiene un verbo raro y difícil. Otras posibilidades son «te inclinabas» o «te tendías»; la imagen exacta es incierta, pero la idea de postura sexualmente disponible debe mantenerse.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעוֹלָם
  english_pob_choice: for long ago
  chosen_spanish: desde hace mucho
  alternatives_spanish:
  - desde antiguo
  - desde hace mucho tiempo
  - de antiguo
  lexicon: HALOT
  rationale: La frase hebrea señala un pasado remoto aplicado aquí a la liberación histórica de Israel, no una eternidad abstracta. «Desde hace mucho» conserva ese valor temporal y suena natural en español.
- source_word: שָׁבַרְתִּי עֻלֵּךְ
  english_pob_choice: I broke your yoke
  chosen_spanish: te quebré el yugo
  alternatives_spanish:
  - te rompí el yugo
  - te destrocé el yugo
  lexicon: HALOT
  rationale: «Quebré» mantiene la imagen concreta de liberación y el paralelismo con las coyundas. Es suficientemente fuerte sin añadir más fuerza de la que el texto exige.
- source_word: נִתַּקְתִּי מוֹסְרֹתַיִךְ
  english_pob_choice: I tore off your bonds
  chosen_spanish: rompí tus coyundas
  alternatives_spanish:
  - arranqué tus ligaduras
  - rompí tus ataduras
  - desaté tus coyundas
  lexicon: HALOT
  rationale: מוֹסְרֹת son bandas o ligaduras asociadas al yugo. «Coyundas» conserva la metáfora agrícola y la relación con «yugo» mejor que un término más general como «ataduras».
- source_word: לֹא אעבד
  english_pob_choice: I will not serve
  chosen_spanish: No serviré
  alternatives_spanish:
  - No seré esclavo
  - No obedeceré
  - No me someteré
  lexicon: HALOT
  rationale: עבד puede significar servir o, por contexto, servir como esclavo. Aquí el hilo inmediato del yugo favorece «servir» como base, y el contexto posterior de infidelidad cultual mantiene la amplitud de sentido sin especificar más de lo debido.
- source_word: עַל כָּל גִּבְעָה גְּבֹהָה וְתַחַת כָּל עֵץ רַעֲנָן
  english_pob_choice: on every high hill and under every green tree
  chosen_spanish: sobre toda colina alta y debajo de todo árbol frondoso
  alternatives_spanish:
  - en toda colina alta y bajo todo árbol frondoso
  - sobre todo monte alto y debajo de todo árbol frondoso
  - en cada colina alta y bajo cada árbol verde
  lexicon: HALOT
  rationale: La expresión es una fórmula profética estereotipada para lugares de culto idolátrico. «Árbol frondoso» comunica bien רַעֲנָן en español y evita la extrañeza de «verde» cuando se refiere a un árbol.
- source_word: צֹעָה
  english_pob_choice: you sprawled out
  chosen_spanish: te echabas
  alternatives_spanish:
  - te tendías
  - te revolcabas
  - te postrabas
  lexicon: HALOT
  rationale: El verbo es raro y difícil. En español, «te echabas» reproduce la postura corporal sugerida por el contexto sin forzar una precisión que el hebreo no permite con certeza total.
- source_word: זֹנָה
  english_pob_choice: as a prostitute
  chosen_spanish: como prostituta
  alternatives_spanish:
  - como ramera
  - como adúltera
  - como prostituta pública
  lexicon: HALOT
  rationale: Se conserva la imaginería sexual explícita del profeta, necesaria para no suavizar la acusación de infidelidad de pacto.
theological_decisions:
- issue: Metáfora sexual de la idolatría
  english_pob_reading: Retain explicit prostitution imagery in the main text
  chosen_spanish_reading: Conservar la imagen explícita de prostitución en el texto principal
  alternative_spanish_readings:
  - Suavizarla como «fuiste infiel»
  - Explicitarla solo en nota
  rationale: Jeremías usa la metáfora sexual para denunciar la ruptura de pacto y la idolatría. Suavizarla borraría la fuerza profética y la tensión teológica del pasaje.
  doctrine_reference: Principio de primacía del texto original; mantener la tensión teológica en lugar de resolverla
- issue: Valor de עבד en «לֹא אעבד»
  english_pob_reading: I will not serve
  chosen_spanish_reading: No serviré
  alternative_spanish_readings:
  - No seré esclavo
  - No adoraré
  rationale: El contexto del yugo y las coyundas favorece el sentido de servicio/obediencia. «No serviré» deja abierta la relación entre servicio y lealtad cultual sin imponer una glosa más específica.
  doctrine_reference: Léxico bíblico contextual; evitar sobreinterpretación doctrinal en el verbo
translation_notes:
  revision_awareness: Se siguió el último estado de revisión indicado como sin cambios, con alta concordancia entre los controles de calidad; no se registraron revisiones aplicadas adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el nombre divino explícito.
  - Se prefirió «prostituta» por claridad contemporánea y fidelidad a la metáfora profética.
  - Se optó por «coyundas» para preservar la relación semántica con «yugo» y el lenguaje agrícola del hebreo.
  - Se evitó «árbol verde» por ser menos natural en español que «árbol frondoso», sin perder el valor literal y simbólico.
