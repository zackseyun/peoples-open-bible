translation:
  language: es
  text: Y sucederá que, en la tribu en la que reside el extranjero residente[a], allí le darán su heredad, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «forastero»; el hebreo גֵּר designa a una persona no nativa que vive establemente entre Israel bajo su orden comunitario, no simplemente a un viajero temporal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be that
  chosen_spanish: Y sucederá que
  alternatives_spanish:
  - Y será que
  - Y acontecerá que
  lexicon: HALOT
  rationale: La fórmula introduce una disposición futura en tono legal-profético. «Sucederá que» conserva ese valor formal sin sonar tan arcaica como otras opciones.
- source_word: בַשֵּׁבֶט
  english_pob_choice: in the tribe
  chosen_spanish: en la tribu
  alternatives_spanish:
  - dentro de la tribu
  - entre la tribu
  lexicon: HALOT
  rationale: שֵׁבֶט aquí designa la unidad tribal en el reparto de la tierra, no el sentido de vara o cetro. «En la tribu» es natural en español y respeta el contexto de asignación territorial.
- source_word: אֲשֶׁר גָּר הַגֵּר אִתּוֹ
  english_pob_choice: with which the sojourner resides
  chosen_spanish: con la cual habite el forastero
  alternatives_spanish:
  - donde el extranjero reside con ella
  - con la cual mora el residente forastero
  lexicon: HALOT
  rationale: גֵּר nombra a un extranjero residente integrado al orden comunitario de Israel, no a un viajero temporal. «Forastero» comunica la extranjería; el verbo «habite» mantiene el matiz de residencia estable. Se evita «extranjero residente» en el texto principal para no hacerlo pesado, pero esa precisión queda implicada por el contexto y la nota.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ese lugar
  lexicon: HALOT
  rationale: 'Adverbio locativo que enfatiza el punto preciso del reparto: la heredad debe darse en la misma tribu donde reside el forastero.'
- source_word: תִּתְּנוּ
  english_pob_choice: you shall give
  chosen_spanish: le darán
  alternatives_spanish:
  - ustedes le darán
  - le asignarán
  lexicon: HALOT
  rationale: El plural legal de segunda persona en español se expresa con naturalidad como futuro con valor de mandato/estipulación. «Dar» preserva la sencillez del verbo נתן en el lenguaje de reparto de herencia.
- source_word: נַחֲלָת֔וֹ
  english_pob_choice: his inheritance
  chosen_spanish: su heredad
  alternatives_spanish:
  - su herencia
  - su parte heredada
  lexicon: HALOT
  rationale: En este contexto נַחֲלָה es el lote heredado en la tierra. «Heredad» es un término bíblico español claro y preciso; evita la posible restricción de «herencia» a bienes muebles o abstractos.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - declara el Señor, Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética como declaración solemne. Conforme a la convención del proyecto, יְהוָה se rinde como «Yahvé». «Señor Yahvé» refleja los dos títulos divinos del hebreo sin ocultar el Nombre; se evita la duplicación extraña de «Señor DIOS» o la sustitución por «SEÑOR».
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה en la fórmula final אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé / declara el Señor Yahvé
  alternative_spanish_readings:
  - el Señor DIOS
  - declara el Señor, Yahvé
  rationale: La pauta del proyecto exige traducir יְהוָה como «Yahvé» y no enmascararlo como «SEÑOR». Dado que אֲדֹנָי precede al Tetragrámaton, «Señor Yahvé» preserva ambos títulos y evita la redundancia artificial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto sigue el acuerdo alto del auditor inglés sin cambios sustanciales. La única tensión importante es la fórmula divina final: se ha aplicado la convención del proyecto para יְהוָה como «Yahvé», manteniendo además la distinción con אֲדֹנָי mediante «Señor Yahvé».'
  spanish_consistency_notes:
  - Se conserva el tono jurídico-profético del versículo.
  - «Heredad» se usa con sentido de reparto territorial, no en sentido general de herencia.
  - El marcador de nota [a] corresponde únicamente a la alternativa lexical de גֵּר y no introduce una variante textual.
