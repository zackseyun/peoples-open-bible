revisions:
- from: Quien da al pobre no tendrá falta[a], pero el que oculta sus ojos tendrá muchas maldiciones.
  to: Quien da al pobre no le faltará nada[a], pero el que oculta sus ojos tendrá muchas maldiciones.
  rationale: Se reemplaza «no tendrá falta» por «no le faltará nada» para lograr un español natural y claro sin perder el sentido de ausencia de carencia del hebreo. Se pule la nota al pie para mejorar la legibilidad y mantener las alternativas léxicas ya documentadas para el modismo «oculta sus ojos».
