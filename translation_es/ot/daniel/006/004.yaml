translation:
  language: es
  text: Entonces este Daniel se distinguía por encima de los altos oficiales y los sátrapas, porque había en él un espíritu extraordinario[a], y el rey pensó en ponerlo sobre todo el reino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu excelente estaba en él». La frase puede referirse en sentido amplio a la cualidad interior excepcional de Daniel, a su sabiduría o a su disposición.
    reason: lexical_alternative
  - marker: b
    text: O «el rey tenía la intención de ponerlo sobre todo el reino». El arameo expresa propósito o intención, no una acción ya realizada.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  - Y entonces
  lexicon: HALOT
  rationale: El adverbio temporal introduce la continuación narrativa. «Entonces» conserva la secuencia y suena natural en español contemporáneo.
- source_word: דָּנִיֵּאל דְּנָה
  english_pob_choice: this Daniel
  chosen_spanish: este Daniel
  alternatives_spanish:
  - Daniel
  - este mismo Daniel
  lexicon: HALOT
  rationale: El demostrativo añade énfasis identificatorio. «Este Daniel» reproduce mejor ese matiz que un simple nombre propio.
- source_word: הֲוָא מִתְנַצַּח
  english_pob_choice: distinguished himself
  chosen_spanish: se distinguía
  alternatives_spanish:
  - sobresalía
  - se destacaba
  - iba sobresaliendo
  lexicon: HALOT
  rationale: La forma aramea expresa una superioridad característica o en desarrollo. «Se distinguía» mantiene el valor de excelencia sin forzar una acción puntual.
- source_word: עַל
  english_pob_choice: above
  chosen_spanish: entre
  alternatives_spanish:
  - por encima de
  - sobre
  - más que
  lexicon: HALOT
  rationale: En este contexto la comparación es relativa a los demás funcionarios. «Entre» expresa la posición de preeminencia dentro del grupo, evitando una repetición torpe de «sobre» antes del listado y sin perder la idea de superioridad.
- source_word: סָרְכַיָּא
  english_pob_choice: the high officials
  chosen_spanish: los altos oficiales
  alternatives_spanish:
  - los comisarios
  - los administradores
  - los gobernadores
  lexicon: HALOT
  rationale: El término arameo designa altos funcionarios del imperio. «Altos oficiales» conserva la referencia administrativa sin adoptar una denominación demasiado técnica o cargada de tradición eclesiástica.
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  english_pob_choice: the satraps
  chosen_spanish: los sátrapas
  alternatives_spanish:
  - los gobernadores provinciales
  lexicon: HALOT
  rationale: «Sátrapas» es el título histórico específico y reconocido para esta función persa, y preserva mejor la precisión del texto.
- source_word: כָּל־קֳבֵל דִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - puesto que
  - ya que
  - pues
  lexicon: HALOT
  rationale: La expresión introduce la causa de la superioridad de Daniel. «Porque» comunica de forma directa y clara esa relación causal.
- source_word: רוּחַ יַתִּירָא
  english_pob_choice: an extraordinary spirit
  chosen_spanish: un espíritu extraordinario
  alternatives_spanish:
  - un espíritu excelente
  - un espíritu excepcional
  lexicon: HALOT
  rationale: Se conserva la imagen de «espíritu», porque el hebreo/arameo no la reduce a mera habilidad. «Extraordinario» refleja היטב la cualidad destacada sin cerrar su alcance a sabiduría, disposición interior o dotación excepcional.
- source_word: בֵּהּ
  english_pob_choice: was in him
  chosen_spanish: había en él
  alternatives_spanish:
  - estaba en él
  - moraba en él
  lexicon: HALOT
  rationale: La frase indica presencia o cualidad interna. «Había en él» es una forma natural en español y mantiene la relación interior del espíritu con Daniel.
- source_word: וּמַלְכָּא עֲשִׁית
  english_pob_choice: and the king planned
  chosen_spanish: y el rey pensó en
  alternatives_spanish:
  - y el rey planeó
  - y el rey tenía la intención de
  - y el rey se propuso
  lexicon: HALOT
  rationale: El arameo expresa intención/propósito, no acción consumada. «Pensó en» conserva la idea de intención proyectada de manera idiomática en español.
- source_word: לַהֲקָמוּתֵהּ
  english_pob_choice: to set him
  chosen_spanish: ponerlo
  alternatives_spanish:
  - nombrarlo
  - establecerlo
  - colocarlo
  lexicon: HALOT
  rationale: El causativo tiene sentido de hacerlo ocupar una posición. «Ponerlo» evita sobredeterminar el procedimiento administrativo y mantiene la amplitud del verbo original.
- source_word: עַל כָּל מַלְכוּתָא
  english_pob_choice: over the whole kingdom
  chosen_spanish: sobre todo el reino
  alternatives_spanish:
  - sobre el reino entero
  - en todo el reino
  lexicon: HALOT
  rationale: La expresión señala autoridad total sobre el dominio real. «Sobre todo el reino» es fiel, claro y conserva la relación de gobierno.
theological_decisions:
- issue: Naturaleza del 'espíritu extraordinario' en Daniel
  english_pob_reading: Retain 'spirit' as the text's wording for Daniel's exceptional inner quality, without specifying whether it refers to temperament, wisdom, or divine enablement.
  chosen_spanish_reading: Mantener «espíritu» como término del texto para la cualidad interior excepcional de Daniel, sin precisar si se trata de disposición, sabiduría o ayuda divina.
  alternative_spanish_readings:
  - «un espíritu excelente»
  - «una capacidad excepcional»
  - «un carácter sobresaliente»
  rationale: El arameo deja la afirmación abierta. Preservar «espíritu» evita resolver la tensión entre cualidad humana, sabiduría concedida o posible intervención divina, en línea con la lectura auditada en inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios según el seguimiento auditado; se preserva la misma lectura base y la misma cautela teológica respecto de רוּחַ יַתִּירָא.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - «Sátrapas» conserva el título administrativo específico; no se sustituye por un término eclesiástico o genérico.
  - «Espíritu» se conserva con mayúscula/minúscula no teológica aquí, porque no se identifica explícitamente con el Espíritu Santo.
  - Se evita traducir mecánicamente «over» con «sobre» en la primera cláusula para no sonar redundante; el sentido comparativo se explica en la nota.
  - La última cláusula se entiende como intención real del rey, no como designación ya ejecutada.
