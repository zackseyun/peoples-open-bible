    rationale: El hebreo y el POB inglés apuntan a una condición intensamente inmunda/ofensiva; «sucias» puede sonar a mera suciedad ordinaria. «Inmundas» o una formulación equivalente preserva mejor la carga léxica sin sobreinterpretar.
  - severity: low
    issue: La nota [a] no refleja con precisión la alternativa principal documentada
    rationale: El POB inglés da «Or 'And Joshua.'»; la nota española ofrece solo «Entonces Josué», que desplaza la alternativa hacia un adverbio discursivo distinto. Conviene incluir «Y Josué» como alternativa directa.
