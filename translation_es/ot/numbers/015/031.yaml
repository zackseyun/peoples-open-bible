review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: mantiene la causalidad de כִּי con «Porque», traduce correctamente «la palabra de Yahvé», preserva el singular de «su mandamiento», y conserva el idiomático judicial de כרת sin sobreinterpretarlo. También respeta la decisión teológica del proyecto al usar «Yahvé». Sin embargo, la colocación de notas no sigue bien el rastro de auditoría en un punto clave: la nota [a] está anclada a «mandamiento» pero su contenido explica una alternativa para «ha despreciado la palabra de Yahvé», no para «mandamiento».'
  spanish_quality_summary: 'El español es claro y digno, pero hay una mejora pequeña de naturalidad y consistencia jurídica: «esa persona ciertamente será cortada» suena menos idiomático que «esa persona ciertamente será excluida» si se interpretara, pero como el proyecto exige conservar «cut off», conviene mantener «será cortada». La frase es aceptable. «Su culpa quedará sobre él» comunica bien la responsabilidad judicial futura. El problema principal es técnico-editorial de notas, no de legibilidad general.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé»; מִצְוָתוֹ -> «su mandamiento»; עֲוֺן -> «culpa» con alternativa «iniquidad»; נֶפֶשׁ en contexto legal -> «persona». No hay conflictos mayores de glosario. La única corrección necesaria es reubicar y completar notas para reflejar adecuadamente las alternativas preservadas por el inglés POB, incluyendo la nota cultural sobre «será cortada».'
  issues:
  - severity: medium
    issue: La nota [a] está anclada al lugar equivocado.
    rationale: En el texto español, [a] aparece después de «mandamiento», pero la nota dice «O 'ha tratado con desprecio la palabra de Yahvé'», que corresponde a בָּזָה / «ha despreciado la palabra de Yahvé». Esto incumple la exigencia de que el marcador aparezca en la palabra o frase relevante.
  - severity: medium
    issue: Falta una nota para el idiomático «ciertamente será cortada».
    rationale: El inglés POB conserva una nota cultural explicando que «shall surely be cut off» preserva el modismo hebreo y no especifica la forma exacta del juicio. Dado que el español también preserva el idiomático, conviene mantener esa aclaración en español.
  - severity: low
    issue: La nota sobre «su culpa» podría formularse con mejor correspondencia al audit trail.
    rationale: El inglés ofrece como alternativa «his iniquity is upon him». En español, «su iniquidad quedará sobre él» es aceptable, pero la redacción principal y la nota deben mantenerse claramente ligadas al segmento final, con marcador correctamente anclado.
  revised_spanish_text: Porque ha despreciado[a] la palabra de Yahvé y ha quebrantado su mandamiento, esa persona[b] ciertamente será cortada[c]; su culpa[d] quedará sobre él.
  revised_footnotes:
