review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: repetición de «damos gracias», mantenimiento del modismo «tu nombre», y una forma impersonal para סִפְּרוּ. Sin embargo, «Les damos gracias a ti» es gramaticalmente incorrecto en español para dirigirse a Dios en segunda persona; debe ser «Te damos gracias». Además, faltan en español las notas que el rastro POB conserva para la ambigüedad de «tu nombre está cerca» y para la alternativa de sujeto/voz en סִפְּרוּ.'
  spanish_quality_summary: La legibilidad es generalmente buena y el tono es digno, pero el inicio actual suena antinatural e incorrecto por el uso de «Les» con «a ti». «Oh Dios» es aceptable, pero «Te damos gracias, Dios» o «Te damos gracias, oh Dios» resulta más natural. «Cercano está tu nombre» es comprensible, aunque «tu nombre está cerca» suena más natural en español contemporáneo sin perder el matiz poético. «Se cuentan tus maravillas» es adecuado, pero «se relatan» también sería posible; no hace falta cambiarlo.
  glossary_alignment: 'No hay conflicto con la glosa del proyecto: אֱלֹהִים se traduce correctamente como «Dios»; no aparecen términos sensibles como Yahvé/Mesías. Se preserva bien «nombre» para שְׁמֶךָ y la indefinición de סִפְּרוּ mediante «se cuentan». La principal corrección es idiomática y de fidelidad sintáctica en el pronombre objeto de «te damos gracias».'
  issues:
  - severity: high
    issue: Pronombre incorrecto en «Les damos gracias a ti»
    rationale: El hebreo לְּךָ exige segunda persona singular dirigida a Dios. En español, «les» contradice esa referencia y produce una frase agramatical junto con «a ti». Debe ser «Te damos gracias».
  - severity: medium
    issue: Faltan notas de ambigüedad preservadas en el POB inglés
    rationale: El POB inglés documenta la ambigüedad de «tu nombre está cerca» y la falta de sujeto explícito en סִפְּרוּ. Dado que el español mantiene esas decisiones, conviene conservar notas equivalentes para no perder la justificación auditada.
  - severity: low
    issue: Orden «cercano está tu nombre» algo rígido
    rationale: Es fiel, pero en español general «tu nombre está cerca» es más natural y mantiene el modismo hebreo sin resolverlo interpretativamente.
  revised_spanish_text: Te damos gracias, oh Dios; damos gracias, porque tu nombre está cerca[a]; se cuentan[b] tus maravillas.
