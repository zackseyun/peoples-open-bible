  lexicon: BDAG
  rationale: 9:35의 διάκονος는 자발적 섬김의 자세를 가리키며, 10:44의 δοῦλος(매여 있음의 무게)와 구별하기 위해 「섬기는 자」로 옮긴다. 10:43-44에서 이 구별을 다시 명시한다.
theological_decisions:
- issue: 9:35의 διάκονος와 10:44의 δοῦλος의 의도적 어휘 구별
  chosen_reading: διάκονος = 섬기는 자, δοῦλος = 노예
  alternative_readings:
  - 둘 다 「종」
  - 둘 다 「섬기는 자」
  rationale: 마가는 9:35에서 διάκονος, 10:43에서 διάκονος, 10:44에서 δοῦλος로 단계적으로 강화한다. 한국어 번역에서도 이 점층 구조를 보존하기 위해 διάκονος는 「섬기는 자」로, δοῦλος는 「노예」로 옮긴다. 한국 전통의 「종」은 두 단어 모두를 평탄화하여 매임의 무게를 약화시킨다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Contested terms table for δοῦλος'
