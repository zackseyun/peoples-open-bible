id: T12P.DAN.5.4
reference: Testament of Dan 5:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: '*Ἐγὼ οἶδα²⁷ ὅτι ἐν ταῖς²⁸ ἐσχάταις ἡμέραις ἀποστήσεσθε²⁹ τοῦ Κυρίου, καὶ προσοχθιεῖτε³⁰ τῷ³¹ Λευί, καὶ πρὸς τῷ³² Ἰουδὰ³³ παρατάξεσθε³⁴, ἀλλ᾽ οὐ δυνήσεσθε³⁵ πρὸς αὐτούς³⁶. *ἄγγελος γὰρ Κυρίου ὁδηγεῖ ἑκατέρους³⁷, ὅτι ἐν αὐτοῖς³⁸ στήσεται ὁ³⁹ Ἰσραήλ.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/005/004.yaml
  text: I know that in the last days you will depart from the Lord, and you will provoke Levi to anger, and you will array yourselves against Judah, but you will not prevail against them. For an angel of the Lord guides them both, because by them Israel will stand.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:35Z'
    unchanged: false
    changes_summary: Replaced 'set yourselves in battle array against Judah' with the more natural and sufficiently precise 'array yourselves against Judah.' No other changes needed.
translation:
  language: es
  text: Sé que en los últimos días se apartarán del Señor, y provocarán a ira a Leví, y se pondrán en formación contra Judá, pero no podrán contra ellos. Pues un ángel del Señor guía a ambos, porque por ellos se mantendrá Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐγὼ οἶδα
  english_pob_choice: I know
  chosen_spanish: Sé
  alternatives_spanish:
  - Yo sé
  lexicon: LSJ
  rationale: El pronombre enfático Ἐγώ se conserva en español por la conjugación; añadir 'yo' sonaría redundante salvo para énfasis.
- source_word: ἐσχάταις ἡμέραις
  english_pob_choice: the last days
  chosen_spanish: los últimos días
  alternatives_spanish:
  - los días postreros
  lexicon: LSJ
  rationale: Forma escatológica estándar en español bíblico moderno.
- source_word: ἀποστήσεσθε τοῦ Κυρίου
  english_pob_choice: depart from the Lord
  chosen_spanish: se apartarán del Señor
  alternatives_spanish:
  - se alejarán del Señor
  lexicon: LSJ
  rationale: Conserva el sentido de apostasía/separación implícito en ἀφίσταμαι.
- source_word: προσοχθιεῖτε τῷ Λευί
  english_pob_choice: provoke Levi to anger
  chosen_spanish: provocarán a ira a Leví
  alternatives_spanish:
  - irritarán a Leví
  - ofenderán a Leví
  lexicon: LSJ
  rationale: προσοχθίζω en LXX se usa con frecuencia para provocar la ira; conserva la fuerza emotiva.
- source_word: παρατάξεσθε
  english_pob_choice: array yourselves against
  chosen_spanish: se pondrán en formación contra
  alternatives_spanish:
  - se formarán en línea de batalla contra
  - se opondrán en orden de batalla a
  lexicon: LSJ
  rationale: Refleja el sentido militar de παρατάσσομαι sin caer en el arcaísmo de 'orden de batalla'. La revisión inglesa simplificó a 'array yourselves'.
- source_word: οὐ δυνήσεσθε πρὸς αὐτούς
  english_pob_choice: you will not prevail against them
  chosen_spanish: no podrán contra ellos
  alternatives_spanish:
  - no prevalecerán contra ellos
  lexicon: LSJ
  rationale: 'Idiomático y literal: ''no podrán contra'' es la forma natural en español neutro.'
- source_word: ὁδηγεῖ ἑκατέρους
  english_pob_choice: guides them both
  chosen_spanish: guía a ambos
  alternatives_spanish:
  - dirige a ambos
  - conduce a ambos
  lexicon: LSJ
  rationale: Conserva el sentido pastoral-direccional de ὁδηγέω.
- source_word: στήσεται ὁ Ἰσραήλ
  english_pob_choice: Israel will stand
  chosen_spanish: se mantendrá Israel
  alternatives_spanish:
  - Israel se sostendrá
  - Israel permanecerá firme
  lexicon: LSJ
  rationale: ἵστημι en futuro medio aquí significa 'sostenerse, mantenerse firme'; 'mantendrá' es más natural en español neutro que 'estará en pie'.
theological_decisions:
- issue: Designación 'ángel del Señor' guía dual de Leví y Judá
  chosen_reading: un ángel del Señor guía a ambos
  alternative_readings:
  - el ángel del Señor (con artículo definido)
  rationale: El griego ἄγγελος γὰρ Κυρίου carece de artículo; por convención del proyecto se conserva la indefinición.
  doctrine_reference: 'DOCTRINE.md: titles and proper nouns'
translation_notes:
  revision_awareness: El inglés POB simplificó 'set yourselves in battle array against Judah' a 'array yourselves against Judah'. El español refleja esa simplificación con 'se pondrán en formación contra Judá'.
  spanish_consistency_notes:
  - Κύριος → Señor.
  - ἄγγελος Κυρίου → 'ángel del Señor' (sin artículo, refleja anarthrous griego).
