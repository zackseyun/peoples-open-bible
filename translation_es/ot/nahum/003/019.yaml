revisions:
- from: No hay sanidad para tu fractura[a]; tu herida es gravísima. Todos los que oyen la noticia acerca de ti baten palmas sobre ti[b], porque ¿sobre quién no ha pasado continuamente tu maldad?
  to: No hay curación para tu fractura[a]; tu herida es grave. Todos los que oyen la noticia acerca de ti aplauden por tu caída[b], porque ¿sobre quién no ha pasado continuamente tu maldad?
