id: SIR.33.14
reference: Sirach 33:14
source:
  edition: lxx-swete-1909
  text: ἀπέναντι τοῦ κακοῦ τὸ ἀγαθόν, καὶ ἀπέναντι τοῦ θανάτου ἡ ζωή· οὕτως ἀπέναντι εὐσεβοῦς ἁμαρτωλός.
