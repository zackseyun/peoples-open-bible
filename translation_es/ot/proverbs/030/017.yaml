review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del hebreo y sigue de cerca las decisiones auditadas en inglés: ojo singular proverbial, burla al padre, desprecio de lo debido a la madre, cuervos del valle y el ave נשר con nota de alternativa. Sin embargo, dos giros no preservan óptimamente el matiz verbal ni la naturalidad española: יִקְּרוּהָ se expresa mejor con imagen de picar/sacar el ojo que con el más genérico ''arrancarán'', y ''los hijos del águila'' es demasiado calcado frente a una opción española natural como ''las crías del águila'' o ''los aguiluchos''.'
  spanish_quality_summary: El texto es claro y legible, pero el uso de dos puntos donde el inglés y el hebreo marcan una ruptura enfática funciona peor que una raya, y 'los hijos del águila' suena rígido en español bíblico moderno. También conviene evitar que 'lo comerán' parezca referirse a todo el ojo después de 'arrancarán'; una formulación con 'le sacarán el ojo' mantiene la referencia más transparente.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. La elección 'obediencia' para לִיקֲּהַת אֵם concuerda con el audit trail, con nota adecuada para 'mandato/instrucción'. 'Águila' con nota sobre 'buitre' también sigue correctamente la decisión documentada.
  issues:
  - severity: medium
    issue: יִקְּרוּהָ quedó como 'lo arrancarán'
    rationale: El verbo hebreo describe aves que pican/sacan el ojo. 'Arrancar' comunica violencia, pero pierde la imaginería aviaria específica que el inglés preservó con 'peck it out'.
  - severity: medium
    issue: בְנֵי נָשֶׁר quedó como 'los hijos del águila'
    rationale: Es demasiado literal y poco idiomático en español actual. Una forma como 'las crías del águila' preserva el sentido de descendencia/jóvenes sin sonar calcada.
  - severity: low
    issue: Puntuación con dos puntos en vez de raya enfática
    rationale: La estructura proverbial contrasta mejor con una raya, y además se alinea con la pausa fuerte reflejada en el audit trail inglés.
