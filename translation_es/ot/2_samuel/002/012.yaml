review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: avance narrativo con «Entonces», sujeto compuesto, procedencia «de Mahanaim» y destino hacia Gabaón/Gibeón. También conserva correctamente la nota sobre la variante del nombre de Is-bóset. Sin embargo, hay un desajuste léxico importante en וְעַבְדֵי: el inglés auditado eligió «servants» precisamente para no sobre-especificar rango, mientras que «esclavos» en este contexto político-militar español suena demasiado fuerte y menos fiel a la intención documentada.'
  spanish_quality_summary: El español es generalmente claro y natural, pero «los esclavos de Is-bóset» resulta poco idiomático para una comitiva militar o cortesana y puede inducir una imagen social más rígida de la que el texto pretende. «Gabaón» es aceptable en español bíblico, y «hacia Gabaón» es legible, aunque «a Gabaón» sería más directo. La puntuación funciona, pero no se necesita coma tras el marcador de nota en aposición simple.
  glossary_alignment: 'No hay conflicto con Yahvé/Mesías u otros términos troncales del proyecto. La principal cuestión terminológica es עבד: aunque el proyecto permite «esclavo» cuando el inglés POB escogió «slave», aquí el inglés escogió «servants», así que en español conviene «siervos» o «servidores»; por contexto y dignidad bíblica, «siervos» encaja mejor.'
  issues:
  - severity: high
    issue: «los esclavos de Is-bóset» sobretraduce וְעַבְדֵי frente al audit trail inglés
    rationale: El inglés POB documenta «servants» para preservar el vínculo léxico sin sobre-especificar rango. «Esclavos» introduce una fuerza semántica mayor y menos apropiada para un entorno político-militar de retenedores o subordinados.
  - severity: low
    issue: La nota al pie puede mejorar su español y puntuación editorial
    rationale: '«Hebreo: «Ish-bosheth»» suena algo calcado; «Hebreo “Ish-bosheth”» o «El hebreo dice…» sería más natural. No afecta el sentido, pero conviene pulirlo.'
  - severity: low
    issue: La coma después de «Ner[a]» es prescindible
    rationale: En español, el sujeto compuesto no requiere esa coma y la lectura fluye mejor sin ella.
  revised_spanish_text: Entonces Abner hijo de Ner[a] y los siervos de Is-bóset hijo de Saúl salieron de Mahanaim hacia Gabaón.
  revised_footnotes:
  - marker: a
    text: Hebreo “Ish-bosheth”; el mismo hombre es llamado “Esh-baal” en 1 Crónicas 8:33; 9:39.
    reason: alternative_reading
  revision_rationale: Se cambia «esclavos» por «siervos» para ajustarse mejor al hebreo עַבְדֵי y, sobre todo, a la decisión lexical auditada en inglés («servants»), que evita imponer la idea más fuerte de esclavitud. También se pule la puntuación y la redacción de la nota para un español más natural, sin alterar el contenido textual ni la referencia a la variante de Crónicas.
