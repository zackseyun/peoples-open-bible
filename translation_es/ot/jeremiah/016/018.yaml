review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo y sigue de cerca la auditoría inglesa: retribución judicial futura, prioridad temporal de «primero», «doble», la distinción «iniquidad / pecado», la causalidad de עַל, la contaminación cultual de la tierra, la explicitación contextual de שִׁקּוּצִים como ídolos con nota alternativa, y «mi heredad» para נַחֲלָתִי. La principal mejora necesaria es estilística y de naturalidad en español bíblico legible.'
  spanish_quality_summary: El texto es mayormente claro y digno. Sin embargo, «Y primero pagaré» suena algo brusco y menos idiomático que una formulación con complemento indirecto expreso. «Les pagaré primero el doble...» o «Primero les pagaré el doble...» comunica mejor la idea de retribución. Además, «cadáveres de sus ídolos» puede mantenerse, pero en español «ídolos detestables» suena un poco menos natural que «ídolos abominables» o «ídolos detestables»; como la POB inglesa ya fijó «detestable idols», puede conservarse. El resto es legible y adecuado.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. «Iniquidad», «pecado», «profanado», «abominaciones» y «heredad» concuerdan con el registro y con la racionalidad léxica documentada. La nota lexical alternativa está bien preservada.
  issues:
  - severity: medium
    issue: «Y primero pagaré doble su iniquidad y su pecado» suena poco natural en español
    rationale: Aunque semánticamente correcto, omite un objeto indirecto que en español ayuda a expresar la idea de retribución personal de וְשִׁלַּמְתִּי. «Primero les pagaré el doble de su iniquidad y de su pecado» conserva mejor la fuerza judicial y mejora la fluidez.
  - severity: low
    issue: La construcción «pagaré doble su iniquidad» puede resultar ambigua
    rationale: Podría entenderse como 'pagar su iniquidad' más que 'retribuirles en doble medida por su iniquidad'. Añadir «les» y «el doble de» despeja la relación semántica sin alejarse del hebreo ni de la POB inglesa.
  revised_spanish_text: Y primero les pagaré el doble de su iniquidad y de su pecado[a], porque han profanado mi tierra con los cadáveres de sus ídolos detestables y han llenado mi heredad con sus abominaciones.
  revised_footnotes:
  - marker: a
    text: O «con los cadáveres de sus cosas detestables»; el término hebreo suele referirse a ídolos en contextos proféticos.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la primera cláusula para que el español exprese con más naturalidad y precisión la idea de retribución judicial dirigida a ellos: «les pagaré el doble de su iniquidad y de su pecado». Se conserva el resto, incluida la explicitación contextual de «ídolos» y la nota alternativa, porque representa fielmente la evidencia fuente y la auditoría inglesa.'
