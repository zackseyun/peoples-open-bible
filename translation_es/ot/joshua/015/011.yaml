revisions:
- from: Entonces el límite se extendió hasta el hombro de Ecrón hacia el norte[a], y el límite se desvió hacia Sicerón[b], y pasó sobre el monte Baalá, y salió a Jabneel; y los extremos del límite estaban junto al mar[c].
  to: Y el límite salió hacia el hombro de Ecrón hacia el norte[a], y el límite se desvió hacia Shiquerón[b], y pasó sobre el monte Baalá, y salió a Jabneel; y los extremos del límite estaban junto al mar[c].
  rationale: Se ajusta el primer verbo para reflejar mejor el patrón repetido de יָצָא en descripciones de fronteras, se acerca el topónimo שִׁכְּרוֹנָה a la forma fuente documentada, y se suaviza la apertura para reproducir mejor la coordinación narrativa hebrea sin afectar la claridad del español.
