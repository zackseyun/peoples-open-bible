translation:
  language: es
  text: Pero si no, que salga fuego de Abimelec y consuma a los líderes[a] de Siquem y a Bet-milo[b]; y que salga fuego de los líderes[a] de Siquem y de Bet-milo, y consuma a Abimelec.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los señores de Siquem». El hebreo designa a los hombres prominentes o gobernantes de la ciudad.
    reason: lexical_alternative
  - marker: b
    text: Bet-milo también puede traducirse «la casa de Milo», probablemente un lugar o grupo asociado con Siquem.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם אַיִן
  english_pob_choice: But if not
  chosen_spanish: Pero si no
  alternatives_spanish:
  - Mas si no
  - Pero si no
  lexicon: HALOT
  rationale: La expresión introduce una condición adversativa en la maldición de Jotam. «Pero si no» conserva el enlace con el contexto anterior y suena natural en español sin añadir contenido.
- source_word: תֵּצֵא אֵשׁ
  english_pob_choice: let fire come out
  chosen_spanish: que salga fuego
  alternatives_spanish:
  - que salga fuego
  - salga fuego
  lexicon: HALOT
  rationale: El yiqtol funciona con valor jussivo en una imprecación. «Que salga fuego» preserva el valor de deseo/maldición y la imagen concreta del fuego sin convertirlo en simple futuro.
- source_word: מֵאֲבִימֶלֶךְ
  english_pob_choice: from Abimelech
  chosen_spanish: de Abimelec
  alternatives_spanish:
  - de Abimelec
  - desde Abimelec
  lexicon: HALOT
  rationale: La preposición indica procedencia o fuente del daño. «De Abimelec» es la forma más natural y mantiene la imagen de un juicio que procede de él.
- source_word: וְתֹאכַל
  english_pob_choice: and consume
  chosen_spanish: y consuma
  alternatives_spanish:
  - y consuma
  - y devore
  lexicon: HALOT
  rationale: אכל aplicado al fuego conserva la fuerza destructiva de «consumir/devorar». «Consuma» funciona bien en español bíblico contemporáneo y mantiene el paralelismo.
- source_word: בַּעֲלֵי שְׁכֶם
  english_pob_choice: the leaders of Shechem
  chosen_spanish: los señores de Siquem
  alternatives_spanish:
  - los señores de Siquem
  - los líderes de Siquem
  - los notables de Siquem
  lexicon: HALOT
  rationale: El hebreo se refiere a los varones dominantes o notables de la ciudad. «Señores» conserva el matiz de autoridad/rango que el POB inglés retuvo con «leaders» y evita reducirlo a mera ciudadanía.
- source_word: בֵּית מִלּוֹא
  english_pob_choice: Beth-millo
  chosen_spanish: Bet-milo
  alternatives_spanish:
  - Bet-milo
  - la casa de Milo
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado como topónimo. «Bet-milo» es claro para lectura bíblica en español y preserva la opción nominal del texto fuente.
- source_word: וְתֵצֵא אֵשׁ מִבַּעֲלֵי שְׁכֶם וּמִבֵּית מִלּוֹא
  english_pob_choice: and let fire come out from the leaders of Shechem and from Beth-millo
  chosen_spanish: y que salga fuego de los señores de Siquem y de Bet-milo
  alternatives_spanish:
  - y que salga fuego de los señores de Siquem y de Bet-milo
  - y salga fuego de los señores de Siquem y de Bet-milo
  lexicon: HALOT
  rationale: Se mantiene la simetría del segundo miembro de la maldición. «De» refleja la procedencia del fuego sin resolver la imagen en un sentido metafórico exclusivo.
- source_word: אֶת אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: a Abimelec
  alternatives_spanish:
  - a Abimelec
  - a Abimelec
  lexicon: HALOT
  rationale: El objeto directo del verbo final cierra el paralelismo de destrucción mutua. «A Abimelec» deja clara la relación verbal en español y conserva la estructura del hebreo.
theological_decisions:
- issue: La imagen del fuego en la maldición
  english_pob_reading: Retain 'fire' as the literal lexical image within an imprecatory curse, without interpreting it in the main text as purely metaphorical or as direct divine fire.
  chosen_spanish_reading: Conservar «fuego» como imagen concreta de la maldición, sin explicarla en el texto principal como metáfora pura ni como fuego divino explícito.
  alternative_spanish_readings:
  - Interpretar el fuego como metáfora de guerra o violencia
  - Interpretar el fuego como juicio divino explícito
  rationale: El hebreo usa el término concreto «fuego» en una fórmula imprecatoria. La traducción debe preservar esa tensión y no resolver de antemano si la imagen es literal, metafórica o ambas cosas a la vez.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios; el borrador español sigue de cerca la lectura aprobada del POB inglés y conserva sus decisiones léxicas y la tensión teológica sobre el «fuego».
  spanish_consistency_notes:
  - Se usa «Siquem» de forma consistente para Shechem.
  - Se mantiene la transliteración «Bet-milo» para el topónimo/constructo.
  - «Señores» se usa como equivalente funcional de la autoridad local, en línea con el valor lexical documentado.
  - La sintaxis conserva el paralelismo del doble encadenamiento de fuego y consumo.
