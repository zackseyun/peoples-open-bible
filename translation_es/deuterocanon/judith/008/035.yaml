    text: O «para la vindicación contra nuestros enemigos» / «para vengarse de nuestros enemigos». El término griego puede denotar acción punitiva o vindicación; aquí el contexto bélico favorece «venganza».
    reason: lexical_alternative
  revision_rationale: Se corrige la relación semántica de ἐκδίκησις con «contra nuestros enemigos», que en español expresa claramente que la acción recae sobre ellos. También se mejora la naturalidad con «Ve en paz» y «Yahvé Dios», y se mueve la nota al término discutido.
