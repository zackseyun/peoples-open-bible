  yaml_path: translation/ot/deuteronomy/011/006.yaml
  text: and what he did to Dathan and Abiram[a], sons of Eliab son of Reuben—how the earth opened its mouth and swallowed them, their households, their tents, and every living thing at their feet[b], in the midst of all Israel.
  footnotes:
