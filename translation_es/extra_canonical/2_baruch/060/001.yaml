translation:
  language: es
  text: Y las quintas aguas negras que viste caer son las obras que hicieron los amorreos, y las hechicerías de sus encantamientos que practicaron, y la maldad de sus misterios, y la mezcla de su impureza.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ܡ̈ܝܐ ܐܘܟܡ̈ܐ / ܚܫ̈ܟܐ
  english_pob_choice: black waters
  chosen_spanish: aguas negras
  alternatives_spanish:
  - aguas oscuras
  lexicon: Payne Smith
  rationale: ‘Negras’ preserva la fuerza visual y apocalíptica del contraste, igual que la elección inglesa, mejor que ‘oscuras’ para una imagen más débil.
- source_word: ܥܡܘܪ̈ܝܐ
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - los amoritas
  lexicon: Payne Smith
  rationale: ‘Amorreos’ es la forma bíblica natural en español y corresponde al etnónimo del original; ‘amorit a’ es menos idiomática.
- source_word: ܚܪ̈ܫܐ / ܪܘܩܝ̈ܐ (control-backed sense)
  english_pob_choice: the sorceries of their enchantments
  chosen_spanish: las hechicerías de sus encantamientos
  alternatives_spanish:
  - los hechizos de sus encantamientos
  - las artes mágicas de sus encantamientos
  lexicon: Payne Smith
  rationale: ‘Hechicerías’ conserva el campo léxico de prácticas ilícitas y ‘encantamientos’ mantiene la duplicación enfática del original, como en la lectura inglesa.
- source_word: ܐܪ̈ܙܐ / ܪ̈ܐܙܐ (control-backed sense)
  english_pob_choice: their mysteries
  chosen_spanish: sus misterios
  alternatives_spanish:
  - sus ritos secretos
  - sus secretos
  lexicon: Payne Smith
  rationale: ‘Misterios’ reproduce el sentido de prácticas rituales secretas sin neutralizarlas; el contexto inmediato ya las marca como malas.
- source_word: ܛܢܦܘܬܐ / ܛܢܦܐ (control-backed sense)
  english_pob_choice: uncleanness
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia
  - contaminación ritual
  lexicon: Payne Smith
  rationale: ‘Impureza’ es el equivalente más natural en español para la contaminación cultual/moral del pasaje; aquí conserva bien la carga bíblica de ‘uncleanness’.
theological_decisions:
- issue: La atribución de culpa a los amorreos en contraste con la contaminación de Israel
  english_pob_reading: The verse lists the Amorites’ works while the surrounding context continues the vision of corruption and judgment.
  chosen_spanish_reading: La traducción mantiene la acusación concreta contra los amorreos y la imaginería de contaminación sin suavizarla.
  alternative_spanish_readings:
  - Una lectura más general que diluya la referencia étnica
  - Una paráfrasis que atenúe la carga moral
  rationale: El texto distingue de forma explícita las obras de los amorreos; no debe convertirse en una referencia genérica ni atenuarse la evaluación moral.
  doctrine_reference: 'Cartha project doctrine: preserve original-witness theological force without smoothing'
translation_notes:
  revision_awareness: Se corrigió el problema de validación asegurando que el marcador de nota [a] aparece exactamente en el texto español y que no hay notas sin anclaje.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparece el nombre divino; aquí no aplica.
  - Se mantiene ‘misterios’ por la carga ritual del término, no como elogio religioso.
  - La estructura conserva el paralelismo de la enumeración sin añadir elementos interpretativos no presentes en el original.
