  text: 'But God turned away and gave them over to serve the host of heaven[a], just as it is written in the book of the prophets: ‘Did you offer to me slain offerings and sacrifices for forty years in the wilderness[d][c][b], O house of Israel?’'
  footnotes:
  - marker: a
    text: Or 'to worship the host of heaven.' The Greek verb can denote religious service or worship.
    reason: lexical_alternative
  - marker: b
    text: '''The host of heaven'' is a biblical expression for the heavenly bodies, and by extension the celestial powers associated with them in idolatrous worship.'
    reason: cultural_note
  - marker: c
    text: Quoted from Amos 5:25.
    reason: cross_reference
  - marker: d
    text: Or 'in the scroll of the prophets.'
    reason: lexical_alternative
