  - severity: low
    issue: La nota a duplica exactamente la redacción principal en vez de ofrecer una alternativa real.
    rationale: Como el texto principal ya dice 'con los pueblos de estas abominaciones', la nota debe explicar el sentido probable o presentar la alternativa interpretativa relevante en español, no repetir lo mismo como 'más literalmente'.
  - severity: low
