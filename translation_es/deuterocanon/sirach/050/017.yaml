translation:
  language: es
  text: Toda carne juntamente se apresuró[a], y cayeron sobre sus rostros en tierra, para postrarse ante el Altísimo[b], ante el Santo de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «entonces todo el pueblo juntamente se apresuró» en lugar del hebreo «toda carne juntamente se apresuró». El griego probablemente aclara el modismo hebreo para la asamblea reunida.
    reason: alternative_reading
  - marker: b
    text: O «para adorar ante el Altísimo». El verbo hebreo se refiere específicamente a inclinarse o postrarse en reverencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל בָּשָׂר / πᾶς ὁ λαὸς
  english_pob_choice: All flesh
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda carne
  - todos
  lexicon: HALOT; LXX comparison
  rationale: En español, «toda carne» conserva el giro hebreo, pero suena duro e impide la fluidez del contexto litúrgico. Dado que el paralelo griego aclara con «todo el pueblo» y la escena describe una asamblea congregada, «todo el pueblo» comunica bien el sentido sin perder el referente colectivo.
- source_word: יַחְדָּו / κοινῇ
  english_pob_choice: together
  chosen_spanish: juntamente
  alternatives_spanish:
  - todos juntos
  - en común
  lexicon: HALOT; BDAG
  rationale: La idea es acción colectiva simultánea. «Juntamente» es natural, solemne y suficientemente preciso para el registro bíblico.
- source_word: נִמְהָרוּ / κατέσπευσεν
  english_pob_choice: hastened
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dio prisa
  - se precipitó
  lexicon: HALOT; LXX
  rationale: «Se apresuró» preserva el impulso de rapidez y disponibilidad del verbo hebreo, y en español resulta más idiomático que un calco como «hastened». La forma verbal singular en la fuente griega se entiende distributivamente con el sujeto colectivo.
- source_word: וַיִּפְּלוּ עַל פְּנֵיהֶם אָרְצָה / ἔπεσαν ἐπὶ πρόσωπον ἐπὶ τὴν γῆν
  english_pob_choice: they fell on their faces to the ground
  chosen_spanish: cayeron rostro en tierra
  alternatives_spanish:
  - cayeron sobre su rostro al suelo
  - se postraron rostro en tierra
  lexicon: HALOT; BDB
  rationale: La expresión española tradicional «rostro en tierra» reproduce la prostración física con economía y dignidad. «Cayeron sobre su rostro al suelo» sería más literal, pero menos fluido.
- source_word: לְהִשְׁתַּחֲוֹת / προσκυνῆσαι
  english_pob_choice: to bow down
  chosen_spanish: para postrarse
  alternatives_spanish:
  - para inclinarse
  - para adorar
  lexicon: HALOT; BDAG
  rationale: 'La acción principal es corporal: postrarse/prosternarse. «Postrarse» mantiene la fuerza del verbo sin sustituirlo por el más interpretativo «adorar». En el contexto, la reverencia corporal ya implica el acto de culto.'
- source_word: לִפְנֵי עֶלְיוֹן / τῷ κυρίῳ αὐτῶν Παντοκράτορι θεῷ τῷ ὑψίστῳ
  english_pob_choice: before the Most High
  chosen_spanish: ante el Altísimo
  alternatives_spanish:
  - delante del Altísimo
  - ante Dios Altísimo
  lexicon: HALOT; tradición bíblica hispana
  rationale: «Altísimo» es el título divino equivalente más natural en español y conserva la elevación del hebreo y del griego. Se evita añadir «Dios» en el cuerpo porque la fuente hebrea aquí nombra primero el título.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  lexicon: HALOT; uso bíblico estándar
  rationale: «El Santo de Israel» es la forma establecida y fiel al hebreo. Mantiene la resonancia bíblica y la identificación del título sin explicar de más.
theological_decisions:
- issue: Relación entre el hebreo «ante el Altísimo» y el griego ampliado con «el Señor de ellos, el Todopoderoso, Dios el Altísimo»
  english_pob_reading: before the Most High, before the Holy One of Israel
  chosen_spanish_reading: ante el Altísimo, ante el Santo de Israel
  alternative_spanish_readings:
  - ante el Señor todopoderoso, Dios Altísimo
  - ante el Todopoderoso, Dios el Altísimo
  rationale: La base hebrea de la fuente conserva el paralelismo con «el Santo de Israel», mientras que el griego explicita títulos divinos adicionales. Para un texto principal en español se sigue la forma hebrea preservada en el paquete fuente, dejando constancia de la expansión griega como variante de apoyo sin sobrecargar el verso.
  doctrine_reference: Principio de primacía del original con control por paralelo textual; no fusionar testimonios sin necesidad textual.
- issue: Si לְהִשְׁתַּחֲוֹת debe traducirse como adoración explícita o como gesto corporal de reverencia
  english_pob_reading: to bow down
  chosen_spanish_reading: para postrarse
  alternative_spanish_readings:
  - para adorar
  - para inclinarse
  rationale: El verbo hebreo y el contexto de caer rostro en tierra describen primero una postura corporal. «Postrarse» conserva esa materialidad y permite que el acto de culto se entienda por el contexto, sin reemplazarlo por una abstracción devocional.
  doctrine_reference: Equivalencia óptima; mantener la tensión entre gesto físico y acto religioso.
translation_notes:
  revision_awareness: 'La redacción sigue el análisis revisado del inglés POB: se preserva la lectura hebrea de una asamblea colectiva que se mueve con rapidez, con el paralelo griego en cuenta para clarificar el sujeto. Se adoptó un registro español más natural y litúrgico que el inglés intermedio, sin perder la prostración corporal ni el doble título divino.'
  spanish_consistency_notes:
  - Se usó «Altísimo» para עֶלְיוֹן conforme al uso bíblico hispano y al criterio POB de no ocultar el nombre/título divino.
  - Se mantuvo «Santo de Israel» como título fijo bíblico equivalente a la tradición profética, sin sustituirlo por perífrasis.
  - «Postrarse» se prefirió a «adorar» en el texto principal para conservar la acción física del hebreo; la nota recoge la alternativa.
  - La cláusula inicial se formuló con sujeto colectivo («todo el pueblo») por claridad en español, apoyada por el griego, aunque la metáfora hebrea literal sería «toda carne».
