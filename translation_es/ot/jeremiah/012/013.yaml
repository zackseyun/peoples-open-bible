    text: 'O: «y ustedes se avergonzarán de sus cosechas», si וּבֹשׁוּ se toma como lectura predictiva más que imperativa.'
    reason: alternative_reading
  revision_rationale: Se corrigió el imperativo a un español natural y fiel ('Avergüéncense'), se movió la nota al lugar correcto para reflejar la ambigüedad de וּבֹשׁוּ, y se eliminó una nota léxica innecesaria. El resto del verso se mantiene porque representa adecuadamente el hebreo y las decisiones del audit trail.
