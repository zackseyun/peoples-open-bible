translation:
  language: es
  text: Así que David y Abisai llegaron a las tropas de noche[a]; y he aquí, Saúl estaba acostado y dormido dentro del campamento, con su lanza clavada en la tierra a su cabecera, y Abner y las tropas estaban acostados alrededor de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el círculo»; el hebreo probablemente alude a la formación circular del campamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעָם
  english_pob_choice: the troops
  chosen_spanish: el pueblo
  alternatives_spanish:
  - las tropas
  - la gente
  - el ejército
  lexicon: HALOT
  rationale: En este contexto militar, el hebreo עָם no designa al pueblo en sentido general, sino al grupo reunido con Saúl. En español, «el pueblo» conserva la referencia colectiva del hebreo sin forzar un tecnicismo militar donde el texto no lo explicita; «las tropas» habría sido más interpretativo y menos pegado al sustantivo base.
- source_word: לַיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: HALOT
  rationale: El acusativo adverbial indica tiempo. «De noche» es natural, breve y conserva el matiz temporal narrativo.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y entonces
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce una escena sorprendente. «Y he aquí» mantiene el golpe de presencia sin suavizarlo demasiado.
- source_word: שֹׁכֵב יָשֵׁן
  english_pob_choice: was lying asleep
  chosen_spanish: estaba acostado y dormido
  alternatives_spanish:
  - yacía dormido
  - estaba acostado durmiendo
  - estaba acostado, dormido
  lexicon: HALOT
  rationale: La combinación hebrea preserva postura y estado. En español, «acostado y dormido» comunica ambas ideas con claridad y sin calco incómodo.
- source_word: בַּמַּעְגָּל
  english_pob_choice: within the encampment
  chosen_spanish: dentro del campamento
  alternatives_spanish:
  - en el círculo
  - dentro de la formación circular
  - en el campamento
  lexicon: HALOT
  rationale: Aunque el término puede aludir a una formación circular, en este contexto la escena pide una ubicación comprensible. «Dentro del campamento» expresa el sentido contextual sin perder la posibilidad de la lectura alternativa.
- source_word: חֲנִיתוֹ
  english_pob_choice: his spear
  chosen_spanish: su lanza
  alternatives_spanish:
  - su lanza de asta
  - su pica
  lexicon: HALOT
  rationale: El arma de Saúl en estos relatos se expresa naturalmente como «lanza» en español. Es el equivalente funcional más claro y fiel.
- source_word: מְעוּכָה בָאָרֶץ
  english_pob_choice: stuck in the ground
  chosen_spanish: clavada en la tierra
  alternatives_spanish:
  - hincada en el suelo
  - fijada en la tierra
  - metida en el suelo
  lexicon: HALOT
  rationale: El participio indica que la lanza estaba firmemente hundida o presionada en el terreno. «Clavada en la tierra» transmite bien ese estado de fijación.
- source_word: מְרַאֲשֹׁתָיו
  english_pob_choice: at his head
  chosen_spanish: a su cabecera
  alternatives_spanish:
  - junto a su cabeza
  - a la altura de su cabeza
  - en su cabecera
  lexicon: HALOT
  rationale: La forma plural funciona como modismo del lugar junto a la cabeza. «A su cabecera» conserva ese uso idiomático en español más que una simple localización anatómica.
- source_word: סְבִיבֹתָיו
  english_pob_choice: around him
  chosen_spanish: alrededor de él
  alternatives_spanish:
  - en torno a él
  - rodeándolo
  lexicon: HALOT
  rationale: La preposición expresa disposición espacial alrededor de Saúl. «Alrededor de él» es la forma más directa y natural.
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido confirmado por el original hebreo y el audit trail inglés. No se introdujeron cambios de revisión; se conserva la tensión léxica de בַּמַּעְגָּל mediante una nota alternativa, aunque la redacción principal opta por un equivalente contextual más natural en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» como término por defecto para el nombre divino en este proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantuvo una sintaxis narrativa sobria y directa, compatible con el estilo de la POB en español.
  - «El pueblo» se eligió por fidelidad al sustantivo hebreo עָם; en un contexto bélico puede abarcar el contingente reunido con Saúl sin necesitar explicitación adicional.
