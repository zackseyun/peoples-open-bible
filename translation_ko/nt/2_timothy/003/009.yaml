id: 2TI.3.9
reference: 2 Timothy 3:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλ’ οὐ προκόψουσιν ἐπὶ πλεῖον, ἡ γὰρ ἄνοια αὐτῶν ἔκδηλος ἔσται πᾶσιν, ὡς καὶ ἡ ἐκείνων ἐγένετο.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/003/009.yaml
  text: But they will not advance any further, for their foolishness will be plain to everyone, as that of those men also became.
translation:
  language: ko
  text: 그러나 그들은 더는 나아가지 못할 것입니다. 그 옛 사람들의 어리석음이 그러했듯이, 이들의 어리석음도 모든 이에게 환히 드러날 것이기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐ προκόψουσιν ἐπὶ πλεῖον
  english_pob_choice: they will not advance any further
  chosen_korean: 더는 나아가지 못할 것입니다
  alternatives_korean:
  - 더 이상 진전을 보지 못할 것입니다
  - 더 멀리 가지 못할 것입니다
  lexicon: BDAG
  rationale: 2:16의 προκόπτω(진전·나아감)와 어휘 통일. 「나아가지 못하다」가 한국어로 자연스럽다.
- source_word: ἄνοια
  english_pob_choice: foolishness
  chosen_korean: 어리석음
  alternatives_korean:
  - 미련함
  - 무지함
  lexicon: BDAG
  rationale: ἄνοια(ἀ-νοῦς)는 「판단력·이성의 결여」. 「어리석음」이 한국어로 자연스럽다.
- source_word: ἔκδηλος ἔσται πᾶσιν
  english_pob_choice: will be plain to everyone
  chosen_korean: 모든 이에게 환히 드러날 것이기 때문입니다
  alternatives_korean:
  - 모든 사람에게 분명히 보일 것입니다
  - 만인에게 드러날 것입니다
  lexicon: BDAG
  rationale: ἔκδηλος는 「밖으로 드러난·뚜렷한」. 「환히 드러나다」가 그 가시성의 무게를 담는다.
- source_word: ὡς καὶ ἡ ἐκείνων ἐγένετο
  english_pob_choice: as that of those men also became
  chosen_korean: 그 옛 사람들의 어리석음이 그러했듯이
  alternatives_korean:
  - 그들의 어리석음이 그렇게 된 것처럼
  - 저들의 경우도 그러했듯이
  lexicon: BDAG
  rationale: ἐκεῖνοι(그들)는 8절의 얀네와 얌브레를 가리키므로, 한국어로는 「그 옛 사람들」로 분명히 지시한다.
