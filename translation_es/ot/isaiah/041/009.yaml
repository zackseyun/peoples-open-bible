translation:
  language: es
  text: 'tú, a quien tomé de los confines de la tierra[a], y te llamé desde sus rincones más lejanos, y te dije: «Tú eres mi siervo; yo te he escogido y no te he rechazado»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «de sus extremidades»; el término hebreo es objeto de debate léxico. Algunos lo han entendido como «de sus nobles», pero el sentido geográfico encaja mejor con el paralelismo de «de los confines de la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחֱזַקְתִּיךָ
  english_pob_choice: I took hold of
  chosen_spanish: tomé
  alternatives_spanish:
  - tomé de la mano
  - sujeté
  - agarré
  lexicon: HALOT
  rationale: La idea central aquí es el acto divino de tomar al destinatario desde un lugar remoto. «Tomé» conserva la concreción del gesto sin añadir una imagen que el hebreo no explicita. En español, «tomar de la mano» sería demasiado específico y «sujeté» sugiere más control que el contexto.
- source_word: מִקְצוֹת הָאָרֶץ
  english_pob_choice: from the ends of the earth
  chosen_spanish: de los confines de la tierra
  alternatives_spanish:
  - de los extremos de la tierra
  - desde los fines de la tierra
  lexicon: HALOT
  rationale: «Confines» comunica bien la idea idiomática de los lugares más remotos y mantiene el valor geográfico-poético del hebreo. Evita un calco demasiado duro y conserva el paralelismo con la segunda mitad del versículo.
- source_word: וּמֵאֲצִילֶיהָ
  english_pob_choice: from its farthest corners
  chosen_spanish: desde sus rincones más lejanos
  alternatives_spanish:
  - desde sus extremidades
  - desde sus lados más remotos
  - desde sus nobles
  lexicon: HALOT
  rationale: La POB inglesa resuelve una ambigüedad léxica real con una lectura geográfica. En español, «rincones más lejanos» preserva esa opción y el paralelismo con «confines de la tierra». Se evita «nobles» porque no encaja con el contexto poético-geográfico.
- source_word: קְרָאתִיךָ
  english_pob_choice: called
  chosen_spanish: llamé
  alternatives_spanish:
  - te llamé
  - te convocé
  - te cité
  lexicon: HALOT
  rationale: «Llamé» es el equivalente natural y amplio para el acto divino de convocar y designar. «Convocé» suena más administrativo, y «cité» no transmite bien la dimensión vocativa y electiva del texto.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  - mi servidor
  lexicon: HALOT
  rationale: La POB inglesa opta por «my servant» en el contexto de Isaías para evitar la suavización litúrgica y conservar el trasfondo de pertenencia y dependencia. En español, «esclavo» reproduce mejor esa fuerza léxica que «siervo», aunque este último sería la opción tradicional. La elección mantiene la tensión semántica del término sin borrarla.
- source_word: בְּחַרְתִּיךָ
  english_pob_choice: I have chosen you
  chosen_spanish: yo te he escogido
  alternatives_spanish:
  - yo te elegí
  - te escogí
  lexicon: HALOT
  rationale: El perfecto español («he escogido») corresponde bien al valor resultativo del hebreo en este contexto de elección vigente. «Escogido» preserva además el registro bíblico sin caer en una formulación arcaizante.
- source_word: מְאַסְתִּיךָ
  english_pob_choice: rejected you
  chosen_spanish: te he rechazado
  alternatives_spanish:
  - te he desechado
  - te he despreciado
  - te he apartado
  lexicon: HALOT
  rationale: «Rechazado» expresa con claridad la negativa de Dios sin intensificar el afecto más de lo que el hebreo exige. Se evita «despreciado», que sería demasiado emotivo, y «desechado», que puede sonar más técnico o más fuerte de lo necesario.
theological_decisions:
- issue: Referencia del «tú» singular corporativo
  english_pob_reading: Retain singular 'you' throughout, reflecting the addressed servant Israel/Jacob as a corporate singular.
  chosen_spanish_reading: Mantener el singular «tú/te» a lo largo del versículo, reflejando al siervo corporativo Israel/Jacob.
  alternative_spanish_readings:
  - pluralizar como «ustedes» o «vosotros» para un sentido moderno
  - reformular en plural colectivo
  rationale: El hebreo usa segunda persona masculina singular de manera consistente. En español, mantener el singular preserva la fuerza literaria y teológica del destinatario corporativo sin introducir un plural que el texto no sostiene.
  doctrine_reference: Translation philosophy §4 (fidelidad de género/forma) y §5 (consistencia terminológica)
- issue: Tensión léxica en עבד
  english_pob_reading: servant rather than slave in the English main text, without erasing the bonded-status force entirely
  chosen_spanish_reading: «esclavo» en el texto principal, sin suavizarlo a «siervo»
  alternative_spanish_readings:
  - «siervo»
  - «servidor»
  rationale: La POB documenta que el término puede implicar esclavitud/servidumbre, y aquí no hay una razón contextual fuerte para atenuarlo. En español, «esclavo» conserva la tensión lexical y obliga a leer el llamado y la pertenencia de modo más robusto.
  doctrine_reference: Terminología POB para δοῦλος/עבד y principio de no suavizar la fuerza léxica documentada
translation_notes:
  revision_awareness: La POB inglesa revisada mantiene una solución geográfica para מֵאֲצִילֶיהָ y conserva el singular corporativo; no se registran cambios posteriores en el paquete de revisión, por lo que el borrador español sigue esa decisión sin ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se conserva el singular corporativo «tú/te» para el destinatario del discurso.
  - Se usa «esclavo» siguiendo la decisión POB de no diluir עבד en un término más suave.
  - Se evita «Mesías/Cristo» porque el versículo no lo requiere.
  - El tono busca ser bíblico, claro y publicable en español latinoamericano sin arcaísmos innecesarios.
