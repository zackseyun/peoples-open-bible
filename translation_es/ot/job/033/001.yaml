translation:
  language: es
  text: Pero ahora[a], Job, por favor oye mis palabras, y escucha todas mis palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «presta oído a todas mis palabras». El hebreo usa dos expresiones casi paralelas («mis palabras» / «mis palabras») y dos verbos de oír para dar énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Pero
  - Sin embargo
  - No obstante
  lexicon: HALOT
  rationale: La partícula introduce un giro discursivo marcado; en español, 'Pero ahora' conserva la transición adversativa y el matiz de avance en el discurso de Eliú sin volverlo más fuerte de lo que exige el hebreo.
- source_word: שְׁמַע
  english_pob_choice: hear
  chosen_spanish: oye
  alternatives_spanish:
  - oye
  - escucha
  lexicon: HALOT
  rationale: El imperativo simple de שׁמע se expresa naturalmente con 'oye' en una apelación directa. Mantiene la correspondencia básica con 'hear' y deja 'escucha' para el segundo verbo, preservando el paralelismo.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - por favor
  lexicon: HALOT
  rationale: La partícula de cortesía נָא se vierte con 'por favor', que suena natural y digno en español contemporáneo y conserva el tono suplicante del original.
- source_word: מִלַּי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis palabras
  - lo que digo
  lexicon: HALOT
  rationale: El sustantivo plural con sufijo de primera persona se refleja de forma directa con 'mis palabras'. Es la opción más transparente y mantiene la repetición léxica del verso.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y toda
  alternatives_spanish:
  - y todas
  - y toda
  lexicon: HALOT
  rationale: '''Y toda'' reproduce la fuerza totalizadora de כָל en coordinación con el sustantivo siguiente, en un español más natural que una repetición excesivamente literal.'
- source_word: דְּבָרַי
  english_pob_choice: my speech
  chosen_spanish: mi exposición
  alternatives_spanish:
  - mis palabras
  - mi discurso
  - lo que digo
  lexicon: HALOT
  rationale: Aunque literalmente puede ser 'mis palabras', en español 'mi exposición' comunica bien el sentido colectivo y discursivo de דְבָרַי, especialmente después de 'toda'. Conserva la cercanía semántica al paralelo sin sonar redundante.
- source_word: הַאֲזִינָה
  english_pob_choice: listen to
  chosen_spanish: escucha
  alternatives_spanish:
  - escucha
  - presta oído a
  lexicon: HALOT
  rationale: El hiphil de אזן intensifica la idea de prestar atención. 'Escucha' es el equivalente más claro en español moderno y mantiene el segundo mandato paralelo con una ligera intensificación implícita.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo de Job 33:1 y el auditable inglés POB, manteniendo la doble exhortación y la progresión retórica. La principal decisión de estilo fue traducir דְּבָרַי como 'mi exposición' para evitar una repetición plana con מִלַּי, sin perder el sentido de discurso completo.
  spanish_consistency_notes:
  - Se mantiene 'Job' como nombre propio transliterado estándar.
  - Se conserva la distinción entre el primer verbo de oír ('oye') y el segundo, más enfático ('escucha').
  - '''Por favor'' refleja la cortesía de נָא sin arcaísmo.'
  - La nota al pie preserva la alternativa semántica que el inglés POB documenta para la segunda mitad del verso.
