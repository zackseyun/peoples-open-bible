id: 1SA.25.26
reference: 1 Samuel 25:26
source:
  edition: WLC
  text: וְ/עַתָּ֣ה אֲדֹנִ֗/י חַי יְהוָ֤ה וְ/חֵֽי נַפְשְׁ/ךָ֙ אֲשֶׁ֨ר מְנָעֲ/ךָ֤ יְהוָה֙ מִ/בּ֣וֹא בְ/דָמִ֔ים וְ/הוֹשֵׁ֥עַ יָדְ/ךָ֖ לָ֑/ךְ וְ/עַתָּ֗ה יִֽהְי֤וּ כְ/נָבָל֙ אֹיְבֶ֔י/ךָ וְ/הַֽ/מְבַקְשִׁ֥ים אֶל אֲדֹנִ֖/י רָעָֽה־־־׃
translation:
  text: Now[a], my lord, as Yahweh lives and as you yourself live, since Yahweh has kept you from bloodguilt and from saving yourself by your own hand[b], now let your enemies and those who seek evil against my lord be like Nabal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in context, 'from avenging yourself with your own hand.'
    reason: lexical_alternative
  - marker: b
    text: '''Be like Nabal'' likely refers to the man Nabal by name, though the name also echoes the Hebrew word for ''fool.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: In this narrative address Abigail speaks respectfully to David. 'My lord' preserves the deferential title without implying deity; 'master' is possible but sounds more servile in English than the context requires.
- source_word: חַי יְהוָה וְחֵי נַפְשְׁךָ
  chosen: as the LORD lives and as you yourself live
  alternatives:
  - by the life of the LORD and by your life
  lexicon: HALOT
  rationale: This is an oath formula invoking the life of the LORD and of the addressee. 'As ... lives' is idiomatic and natural in English while staying close to the Hebrew. 'You yourself' brings out the second oath element clearly.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְנָעֲךָ
  chosen: has kept you from
  alternatives:
  - has restrained you from
  - has withheld you from
  lexicon: HALOT
  rationale: The verb denotes restraining or preventing. 'Has kept you from' is clear modern English and fits the context of preventing David from wrongful action.
- source_word: מִבּוֹא בְדָמִים
  chosen: from bloodguilt
  alternatives:
  - from bloodshed
  - from coming into bloodshed
  lexicon: HALOT
  rationale: Literally 'from coming into bloods.' In context Abigail is not merely speaking of violence in general but of incurring guilt for shedding blood. 'Bloodguilt' best captures the moral-legal force in concise English; 'bloodshed' is possible but weaker ethically.
- source_word: וְהוֹשֵׁעַ יָדְךָ לָךְ
  chosen: and from saving yourself by your own hand
  alternatives:
  - and from avenging yourself with your own hand
  - and from giving victory to yourself by your hand
  lexicon: HALOT
  rationale: The idiom is difficult. In context it refers to David securing justice or deliverance for himself through personal violent action. 'Saving yourself by your own hand' stays close to the Hebrew verb ישׁע while conveying self-help vengeance. The more interpretive 'avenging yourself' is contextually strong and preserved in a footnote.
- source_word: יִהְיוּ כְנָבָל
  chosen: let ... be like Nabal
  alternatives:
  - let ... become as Nabal
  - let ... be like a fool
  lexicon: HALOT
  rationale: Because נָבָל here is the personal name of Abigail's husband in the immediate context, the comparison is best rendered with the name. The common-noun sense 'fool' is an intentional resonance but not the primary referent in this verse.
- source_word: אֹיְבֶיךָ וְהַמְבַקְשִׁים אֶל אֲדֹנִי רָעָה
  chosen: your enemies and those who seek evil against my lord
  alternatives:
  - your enemies and those seeking harm for my lord
  - your enemies and those who seek my lord's hurt
  lexicon: HALOT
  rationale: מְבַקְשִׁים ... רָעָה is a standard expression for seeking harm or evil against someone. 'Seek evil against' is transparent and preserves the lexical connection to רָעָה.
