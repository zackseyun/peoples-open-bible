translation:
  language: es
  text: desde el que está sentado en un trono elevado[a], hasta el que vuelve al polvo y a la ceniza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «desde uno sentado en un trono en gloria hasta uno humillado en tierra y ceniza». El griego hace explícitas las ideas de gloria y humillación que el hebreo expresa de manera más concisa.'
    reason: alternative_reading
lexical_decisions:
- source_word: מיושב
  english_pob_choice: from one seated
  chosen_spanish: desde el que está sentado
  alternatives_spanish:
  - desde uno sentado
  - desde el que se sienta
  lexicon: HALOT
  rationale: El hebreo marca punto de partida en una escala social; en español, «desde el que está sentado» conserva el valor participial y el sentido de origen del rango sin volverlo demasiado literal o torpe.
- source_word: כסא
  english_pob_choice: throne
  chosen_spanish: trono
  alternatives_spanish:
  - asiento
  - silla real
  lexicon: HALOT
  rationale: En este contexto jerárquico, «trono» comunica mejor la dignidad regia del hebreo que un simple «asiento».
- source_word: לגבה
  english_pob_choice: lofty
  chosen_spanish: —
  alternatives_spanish:
  - alto
  - exaltado
  - en altura
  lexicon: HALOT
  rationale: La base hebrea enfatiza elevación/exaltación; en español se integra de manera natural con «trono» sin añadir un adjetivo explícito en el texto principal, porque la idea de altura ya queda sugerida por el sustantivo en contexto.
- source_word: לשוב
  english_pob_choice: returning
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - retorna
  - volver al
  lexicon: HALOT
  rationale: El infinitivo hebreo expresa el punto final del recorrido humano; «vuelve» mantiene el movimiento de retorno y sugiere el giro bíblico de la vida hacia su fin.
- source_word: עפר ואפר
  english_pob_choice: dust and ashes
  chosen_spanish: polvo y ceniza
  alternatives_spanish:
  - polvo y ashes
  - tierra y ceniza
  - polvo y humo
  lexicon: HALOT
  rationale: El hebreo tiene la pareja fija עפר ואפר. En español, «polvo y ceniza» es la equivalencia más transparente y conserva la imagen de mortalidad y humillación.
theological_decisions:
- issue: Merismo social de máxima altura a máxima bajeza mortal
  english_pob_reading: from one seated on a lofty throne, to one returning to dust and ashes
  chosen_spanish_reading: desde el que está sentado en un trono, hasta el que vuelve al polvo y a la ceniza
  alternative_spanish_readings:
  - desde el que está sentado en un trono glorioso, hasta el que es humillado en la tierra y la ceniza
  - desde el entronizado en gloria hasta el que vuelve al polvo y a la ceniza
  rationale: 'Se sigue el hebreo como testimonio principal: el contraste es social y mortal, no una expansión interpretativa. Por eso no se importan al texto principal los elementos explicativos del griego («en gloria», «humillado en la tierra»), aunque se reconocen como paralelo útil.'
  doctrine_reference: 'PHILOSOPHY.md: prioridad del hebreo donde Sirácida se conserva; el griego sirve como paralelo de comprobación'
translation_notes:
  revision_awareness: Se corrigió el problema anterior eliminando la nota al pie no anclada. Esta versión no incluye notas porque no se requiere distinguir una variante textual en el texto principal y así se evita cualquier marcador huérfano.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, con sintaxis natural en español.
  - Se prefiere «polvo y ceniza» como equivalente funcional de la pareja hebrea fija.
  - No se añadió «gloria» ni «humillado» al cuerpo principal para no sobretraducir el hebreo desde el griego.
