translation:
  language: es
  text: Y tomaremos diez hombres de cada cien de todas las tribus de Israel, y cien de cada mil, y mil de cada diez mil, para tomar provisiones para el pueblo, para que, cuando lleguen[a] a Guibeá de Benjamín, hagan conforme a toda la vileza[b] que hizo en Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente 'para hacer al llegar ellos a Guibeá de Benjamín', una expresión comprimida para indicar la acción una vez que lleguen.
    reason: lexical_alternative
  - marker: b
    text: O 'acto vil' o 'hecho vergonzoso' para נְבָלָה. El término hebreo denota una acción chocante y moralmente degradante.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְנוּ
  english_pob_choice: And we will take
  chosen_spanish: Y tomaremos
  alternatives_spanish:
  - Y tomaremos entonces
  - Y vamos a tomar
  lexicon: HALOT
  rationale: El perfecto con waw en este contexto deliberativo expresa una acción proyectada; el futuro español transmite mejor la intención del plan que un pasado literal.
- source_word: עֲשָׂרָה אֲנָשִׁים לַמֵּאָה ... וּמֵאָה לָאֶלֶף וְאֶלֶף לָרְבָבָה
  english_pob_choice: ten men out of a hundred ... a hundred out of a thousand, and a thousand out of ten thousand
  chosen_spanish: diez hombres de cada cien ... cien de cada mil, y mil de cada diez mil
  alternatives_spanish:
  - diez hombres por cada cien ...
  - una décima parte de cada unidad
  lexicon: HALOT
  rationale: La construcción proporcional se conserva con 'de cada', que comunica la selección por grupos sin añadir interpretación. 'Por cada' también sería posible, pero 'de cada' suena más natural en español bíblico moderno.
- source_word: לְכֹל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: from all the tribes of Israel
  chosen_spanish: de todas las tribus de Israel
  alternatives_spanish:
  - para todas las tribus de Israel
  - entre todas las tribus de Israel
  lexicon: HALOT
  rationale: 'El sentido es distributivo: los hombres son tomados del conjunto tribal. ''De todas'' preserva esa procedencia mejor que ''para todas''.'
- source_word: לָקַחַת צֵדָה
  english_pob_choice: to get provisions
  chosen_spanish: para llevar provisiones
  alternatives_spanish:
  - para tomar provisiones
  - para reunir víveres
  lexicon: HALOT
  rationale: צֵדָה denota provisiones para una campaña o viaje. 'Llevar provisiones' es idiomático en español y mantiene la idea de abastecimiento sin estrecharlo solo a comida.
- source_word: לָעָם
  english_pob_choice: for the people
  chosen_spanish: para el pueblo
  alternatives_spanish:
  - para la gente
  - para el ejército
  lexicon: HALOT
  rationale: Se conserva el sustantivo general 'pueblo' como en el hebreo. Aunque el contexto es militar, 'pueblo' evita restringir indebidamente el alcance.
- source_word: לַעֲשׂוֹת לְבוֹאָם
  english_pob_choice: so that when they come
  chosen_spanish: para hacer cuando lleguen
  alternatives_spanish:
  - para actuar cuando lleguen
  - para obrar cuando lleguen
  lexicon: HALOT
  rationale: El hebreo es una cadena verbal comprimida. 'Para hacer cuando lleguen' sigue de cerca la estructura, y el sentido de acción se entiende por el complemento siguiente.
- source_word: לְגֶבַע בִּנְיָמִן
  english_pob_choice: to Gibeah of Benjamin
  chosen_spanish: a Guibeá de Benjamín
  alternatives_spanish:
  - contra Guibeá de Benjamín
  - en Guibeá de Benjamín
  lexicon: HALOT
  rationale: Se mantiene el topónimo en forma española habitual 'Guibeá'. La preposición direccional 'a' conserva el movimiento literal del hebreo; la acción hostil queda implícita en el contexto.
- source_word: כְּכָל הַנְּבָלָה
  english_pob_choice: according to all the outrage
  chosen_spanish: conforme a toda la vileza
  alternatives_spanish:
  - conforme a toda la atrocidad
  - según toda la infamia
  - según toda la vileza
  lexicon: HALOT
  rationale: נְבָלָה expresa una acción infame, vergonzosa y moralmente aberrante. 'Vileza' conserva la carga de vergüenza y bajeza moral sin introducir un tecnicismo ajeno.
- source_word: אֲשֶׁר עָשָׂה בְּיִשְׂרָאֵל
  english_pob_choice: that it committed in Israel
  chosen_spanish: que hizo en Israel
  alternatives_spanish:
  - que cometió en Israel
  - que se hizo en Israel
  lexicon: HALOT
  rationale: El verbo activo singular se refiere de forma flexible al hecho/caso personificado en el contexto. 'Hizo' sigue la forma simple del hebreo; 'cometió' sería posible, pero añade matiz evaluativo más explícito.
theological_decisions:
- issue: Cómo traducir נְבָלָה sin suavizar su gravedad moral ni importar una categoría doctrinal ajena
  english_pob_reading: outrage
  chosen_spanish_reading: vileza
  alternative_spanish_readings:
  - atrocidad
  - infamia
  - deshonra
  rationale: El pasaje denuncia un acto moralmente escandaloso. 'Vileza' conserva el peso ético y la idea de bajeza vergonzosa, sin convertir el término en una etiqueta doctrinal o jurídica más técnica de lo que permite el hebreo.
  doctrine_reference: Ética bíblica; traducción léxica del campo semántico de נְבָלָה.
translation_notes:
  revision_awareness: La redacción sigue de cerca el estado revisado más reciente del POB en inglés, especialmente la preferencia por una expresión más literal en la cláusula final ('do according to' / 'hacer conforme a'), pero la adapta al español con una sintaxis natural. También conserva la progresión numérica y la finalidad logística del verso sin añadir explicaciones interpretativas.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo 'Guibeá' como forma española consistente del topónimo, junto con 'Benjamín'.
  - Se prefirió 'vileza' para נְבָלָה por coherencia con el campo semántico de vergüenza/abyección moral; las alternativas quedan documentadas en nota.
  - La construcción 'de cada' conserva la proporcionalidad del hebreo y es clara en español bíblico moderno.
