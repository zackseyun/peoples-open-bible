  to: y la matanza de nuestros hermanos, y el cautiverio de la tierra, y la desolación de nuestra herencia, volverá[a] sobre nuestras cabezas entre las naciones donde serviremos como esclavos allí[b]; y seremos piedra de tropiezo y oprobio delante de quienes nos poseen.
