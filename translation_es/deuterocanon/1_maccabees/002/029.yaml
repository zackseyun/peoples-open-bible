review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia narrativa y el sentido general del griego: «Entonces», «bajaron», «muchos», «buscaban», «al desierto» y «para establecerse allí» reflejan adecuadamente Τότε, κατέβησαν, πολλοὶ, ζητοῦντες, εἰς τὴν ἔρημον, καθίσαι ἐκεῖ. Sin embargo, el par léxico δικαιοσύνην καὶ κρίμα no sigue de manera fiel la decisión auditada del POB en inglés, que distingue «righteousness and justice» y deja «justice and judgment» como alternativa en nota. El español invierte esa lógica al usar «justicia y rectitud», asignando «justicia» a δικαιοσύνη y «rectitud» a κρίμα, lo cual desajusta tanto el mapeo semántico como la nota alternativa.'
  spanish_quality_summary: 'El texto es natural y legible en español. «Bajaron ... al desierto para establecerse allí» suena bien y es bíblico sin arcaísmo excesivo. La principal mejora necesaria es léxica: «rectitud y justicia» comunica mejor la distinción del griego y la rationale documentada; además, alinea la nota alternativa «justicia y juicio» con el término base correcto. «Desierto» es aceptable, aunque «wilderness» podría también verterse como «región desierta» o «desierto»; no requiere cambio.'
  glossary_alignment: Hay un desajuste con la pauta del proyecto para δικαιοσύνη, que normalmente debe preservarse como «justicia» o «rectitud» según contexto, pero aquí el expediente inglés decidió explícitamente «righteousness» para distinguirlo de κρίμα. En español, la mejor correspondencia es «rectitud» para δικαιοσύνη y «justicia» para κρίμα. El borrador actual hace lo contrario. No hay otros conflictos relevantes con la terminología del proyecto.
  issues:
  - severity: high
    issue: Asignación invertida de δικαιοσύνη y κρίμα
    rationale: El expediente inglés documenta δικαιοσύνη = «righteousness» y κρίμα = «justice», con alternativa «judgment» solo en nota. El borrador español pone «justicia y rectitud», invirtiendo la distinción y debilitando la fidelidad al razonamiento léxico auditado.
  - severity: medium
    issue: La nota al pie ya no corresponde exactamente al texto base
    rationale: Si el texto principal usa «justicia y rectitud», la alternativa «justicia y juicio» deja fijo «justicia» en la primera posición, cuando el expediente inglés preserva la alternativa para el par completo derivado de δικαιοσύνην καὶ κρίμα. Con «rectitud y justicia», la nota «O “rectitud y juicio”» refleja mejor la relación entre texto y alternativa.
  revised_spanish_text: Entonces bajaron muchos que buscaban rectitud y justicia[a] al desierto para establecerse allí.
  revised_footnotes:
  - marker: a
    text: O «rectitud y juicio». El griego junta δικαιοσύνην y κρίμα, una combinación que puede superponerse en significado, pero probablemente conserva dos ideales relacionados.
    reason: lexical_alternative
  revision_rationale: 'Se revisa únicamente el par léxico central para reflejar con fidelidad el análisis fuente y el audit trail inglés: δικαιοσύνην se vierte mejor como «rectitud» aquí, y κρίμα como «justicia», manteniendo su distinción. La nota alternativa se ajusta en paralelo para conservar «juicio» como opción para κρίμα sin desalinearse del texto principal. El resto del versículo es claro, natural y fiel.'
