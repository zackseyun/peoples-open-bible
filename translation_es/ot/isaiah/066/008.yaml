translation:
  language: es
  text: ¿Quién ha oído tal cosa? ¿Quién ha visto cosas semejantes? ¿Puede nacer un país en un solo día? ¿Puede nacer una nación de una vez? Porque Sión estaba de parto y también dio a luz a sus descendientes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «sus hijos».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי שָׁמַע כָּזֹאת
  english_pob_choice: Who has heard such a thing?
  chosen_spanish: ¿Quién ha oído tal cosa?
  alternatives_spanish:
  - ¿Quién ha oído esto?
  - ¿Quién ha oído una cosa así?
  lexicon: HALOT
  rationale: Conserva la pregunta retórica y el valor demostrativo de כָּזֹאת con un español natural. 'Tal cosa' reproduce bien la fuerza singular del hebreo sin volverlo rígido.
- source_word: מִי רָאָה כָּאֵלֶּה
  english_pob_choice: Who has seen things like these?
  chosen_spanish: ¿Quién ha visto cosas semejantes?
  alternatives_spanish:
  - ¿Quién ha visto cosas como estas?
  - ¿Quién ha visto tales cosas?
  lexicon: HALOT
  rationale: El plural כָּאֵלֶּה pide una forma plural en español. 'Cosas semejantes' mantiene el paralelo con la primera pregunta y evita repetir de forma pesada 'estas'.
- source_word: הֲי֤וּחַל אֶ֨רֶץ֙
  english_pob_choice: Can a land be born
  chosen_spanish: ¿Puede nacer una tierra
  alternatives_spanish:
  - ¿Puede ser dada a luz una tierra
  - ¿Puede nacer el país
  lexicon: HALOT
  rationale: El hebreo usa imaginería de parto para una realidad territorial/política. 'Nacer' preserva esa metáfora; 'tierra' sigue la elección de 'land' y mantiene el paralelo con 'nación'.
- source_word: בְּיוֹם אֶחָד
  english_pob_choice: in one day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - en un día solamente
  lexicon: HALOT
  rationale: Expresión temporal directa; 'un solo día' comunica con claridad la simultaneidad extraordinaria del verso.
- source_word: אִם יִוָּלֵד גּוֹי
  english_pob_choice: Can a nation be born
  chosen_spanish: ¿Puede nacer una nación
  alternatives_spanish:
  - ¿Puede nacer un pueblo
  - ¿Puede ser engendrada una nación
  lexicon: HALOT
  rationale: '''Nación'' es el mejor equivalente para גּוֹי en este contraste retórico. ''Nacer'' conserva el lenguaje de nacimiento sin forzar un giro más abstracto.'
- source_word: פַּעַם אֶחָת
  english_pob_choice: all at once
  chosen_spanish: de una vez
  alternatives_spanish:
  - a la vez
  - en un solo momento
  lexicon: HALOT
  rationale: La expresión hebrea comunica simultaneidad; 'de una vez' es idiomático en español y mantiene la sorpresa retórica.
- source_word: חָלָה
  english_pob_choice: was in labor
  chosen_spanish: estaba de parto
  alternatives_spanish:
  - estaba con dolores de parto
  - estaba en trabajo de parto
  lexicon: HALOT
  rationale: חָלָה aquí pertenece al campo del parto. 'Estaba de parto' es claro, digno y natural en español bíblico contemporáneo.
- source_word: גַּם יָלְדָה
  english_pob_choice: she also gave birth
  chosen_spanish: y también dio a luz
  alternatives_spanish:
  - y también parió
  - y además dio a luz
  lexicon: HALOT
  rationale: '''Dar a luz'' conserva la metáfora del nacimiento y resulta más idiomático y digno que una forma demasiado cruda. ''También'' refleja el גַּם aditivo.'
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sión
  alternatives_spanish:
  - Zion
  lexicon: HALOT
  rationale: Se usa la forma española tradicional de nombre propio bíblico, plenamente reconocible en lectura eclesial.
- source_word: בָּנֶיהָ
  english_pob_choice: her children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos e hijas
  lexicon: HALOT
  rationale: El hebreo es formalmente masculino plural; el contexto personifica a Sión como madre y se refiere a su descendencia. 'Sus hijos' preserva esa relación y queda más cercano al literal auditado 'her sons' que 'children'.
theological_decisions:
- issue: Personificación de Sión como madre
  english_pob_reading: Retain Zion as a personified mother who gives birth to her people
  chosen_spanish_reading: Mantener a Sión como madre personificada que da a luz a su pueblo
  alternative_spanish_readings:
  - Reducir la imagen a una mera metáfora de restauración
  - Despersonalizar a Sión como símbolo institucional
  rationale: El hebreo presenta explícitamente a Sión en trabajo de parto y dando a luz. La traducción conserva la metáfora corporal sin suavizarla, porque forma parte del argumento profético del versículo.
  doctrine_reference: Principio de traducción §3
- issue: Renderizar בָּנֶיהָ con género y sentido
  english_pob_reading: Render collectively as 'her children' in the main text
  chosen_spanish_reading: Traducir colectivamente como 'sus hijos'
  alternative_spanish_readings:
  - sus hijos varones
  - sus niños
  rationale: El hebreo usa plural masculino formal, pero el referente es la descendencia de Sión. 'Sus hijos' comunica el sentido colectivo y mantiene la tensión entre forma y referente sin borrarla.
  doctrine_reference: Principio de traducción §4
- issue: Metáfora del nacimiento para tierra y nación
  english_pob_reading: Can a land be born... Can a nation be born...
  chosen_spanish_reading: Conservar la metáfora de nacimiento para 'tierra' y 'nación'
  alternative_spanish_readings:
  - explicar la idea como 'ser restaurada'
  - usar lenguaje puramente político
  rationale: El paralelismo del verso depende de la imagen imposible de un nacimiento súbito. Traducirla literalmente, con español natural, preserva el impacto retórico y la relación entre tierra, nación y Sión.
  doctrine_reference: Principio de traducción §2
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa, que ajustó la imaginería del nacimiento para mayor consistencia léxica y eliminó ''as soon as'' por no estar explícito. En español se mantuvo ese perfil: se preserva la secuencia de preguntas retóricas, la metáfora de parto/nacimiento y el cierre explicativo con ''Porque'', sin añadir temporalidad no sustentada por el hebreo.'
  spanish_consistency_notes:
  - Se conserva 'Sión' como forma española estándar del topónimo/personificación.
  - Se usa 'tierra' para אֶרֶץ en paralelo con 'nación', siguiendo la decisión contextual del POB inglés.
  - '''De parto'' y ''dio a luz'' mantienen el campo semántico del nacimiento sin calcado excesivo.'
  - La nota a pie distingue la alternativa más literal de בָּנֶיהָ sin romper la fluidez del texto principal.
