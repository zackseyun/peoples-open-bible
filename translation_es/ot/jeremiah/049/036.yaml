    reason: lexical_alternative
  - marker: b
    text: 'O: «los dispersos de Elam»; o: «los expulsados de Elam».'
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota [b] para que ancle la expresión que realmente comenta. Se cambia 'los dispersos' por 'los desterrados' para reflejar mejor la fuerza de נִדְּחֵי según el rastro POB, dejando 'dispersos' como alternativa. También se ajusta 'adonde no lleguen' a 'a la que no vayan' por mayor cercanía al movimiento del original y a la revisión inglesa.
