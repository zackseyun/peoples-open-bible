revisions:
- from: Desde mi angustia invoqué a Yah[a]; Yah me respondió en amplitud.
  to: Desde mi angustia invoqué a Yahvé[a]; Yahvé me respondió con amplitud.
  rationale: Se ajusta el nombre divino a la convención principal del proyecto en español («Yahvé») y se mejora la naturalidad de «en amplitud» a «con amplitud», manteniendo la imagen espacial y el sentido del hebreo. La nota alternativa conserva la lectura más concreta del original.
