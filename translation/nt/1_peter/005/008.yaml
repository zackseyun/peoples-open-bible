theological_decisions:
- issue: Whether to render διάβολος as a common noun ('slanderer') or as the personal title/name of Satan
  chosen_reading: the devil
  alternative_readings:
  - the slanderer
  rationale: In this verse the referent is the personal evil being opposed to believers, not merely a generic slanderer. Rendering it 'the devil' reflects standard New Testament usage without adding doctrinal content beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: How strongly to express περιπατεῖ in the lion metaphor
  chosen_reading: walks around
  alternative_readings:
  - prowls around
  rationale: Optimal equivalence favors preserving the ordinary sense of the Greek verb while allowing the simile itself to carry the menace. Because 'prowls around' is a familiar and plausible contextual rendering, it is preserved in a footnote as a lexical alternative.
  doctrine_reference: Translation philosophy §1; §5
