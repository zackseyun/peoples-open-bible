base_translation:
  language: en
  yaml_path: translation/ot/2_kings/017/034.yaml
  text: To this day they act according to the former customs[a]. They do not fear Yahweh, and they do not act according to their statutes and their ordinances, or according to the law and the commandment that Yahweh commanded the sons of Jacob[d][c][b], whom he named Israel.
  footnotes:
  - marker: a
    text: Or 'according to the former ordinances' or 'according to the former practices.'
    reason: lexical_alternative
  - marker: b
    text: '''Fear the LORD'' can also be expressed ''revere the LORD''; the Hebrew idiom carries both dread and reverent covenant loyalty.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the sons of Jacob'; this refers corporately to the people descended from Jacob.
    reason: lexical_alternative
  - marker: d
    text: That is, Jacob; compare Genesis 32:28; 35:10.
    reason: cross_reference
