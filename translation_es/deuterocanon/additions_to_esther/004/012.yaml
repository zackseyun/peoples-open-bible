  revision_awareness: Texto revisado a partir del pasaje griego de Swete LXX 1909 y del auditorio inglés POB; se mantuvo la preferencia por una equivalencia óptima que preserva el gesto cortesano, la secuencia verbal y la ambigüedad lexical documentada en ἠσπάσατο.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras convenciones no pertinentes porque el pasaje no contiene el nombre divino ni títulos teológicos equivalentes.
  - 'Se mantuvo el orden narrativo del griego: acción del rey, contacto con el cetro, beso y խոս directiva.'
  - La nota al pie conserva la alternativa lexical documentada por el POB inglés y la aplica a la posible ambigüedad de ἠσπάσατο.
