translation:
  language: es
  text: 'Y de los hijos de Adín: Ebed, hijo de Jonatán, y con él cincuenta varones[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cincuenta hombres». El hebreo dice específicamente «varones», preservando la redacción explícita del sexo en esta lista.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  english_pob_choice: And from the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y de los descendientes de
  - Y de la familia de
  lexicon: HALOT
  rationale: En listas genealógicas o de grupos, בני funciona como marcador de linaje o pertenencia grupal. «Hijos de» conserva esa forma hebrea y suena natural en español bíblico sin perder precisión.
- source_word: עָדִין
  english_pob_choice: Adin
  chosen_spanish: Adín
  alternatives_spanish:
  - Adin
  lexicon: Nombre propio
  rationale: Es nombre propio. Se conserva transliterado; en español se prefiere la acentuación gráfica «Adín» para reflejar la pronunciación natural.
- source_word: עֶבֶד
  english_pob_choice: Ebed
  chosen_spanish: Ebed
  alternatives_spanish:
  - Obed
  lexicon: Nombre propio
  rationale: Aquí no es el sustantivo común «siervo/esclavo», sino un nombre personal. Se translitera como nombre propio.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: Marcador genealógico estándar. En español, «hijo de» es la forma más natural y fiel en una lista de ascendencia.
- source_word: יוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: Nombre propio
  rationale: Nombre propio bien asentado en español bíblico; «Jonatán» mantiene la forma tradicional y es plenamente intelligible.
- source_word: וְ/עִמּוֹ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - con él
  lexicon: HALOT
  rationale: La conjunción וְ mantiene la estructura de la lista; «con él» expresa adecuadamente la relación de acompañamiento del grupo respecto del nombre anterior.
- source_word: חֲמִשִּׁים
  english_pob_choice: fifty
  chosen_spanish: cincuenta
  lexicon: HALOT
  rationale: Número cardinal directo y sin ambigüedad.
- source_word: הַ/זְּכָרִים
  english_pob_choice: males
  chosen_spanish: varones
  alternatives_spanish:
  - males
  - hombres
  lexicon: HALOT
  rationale: זכרים especifica el sexo masculino. En español, «varones» conserva esa precisión y suena más natural y digno en este registro que «males», mientras que evita diluir el matiz en «hombres».
translation_notes:
  revision_awareness: 'Se mantuvo sin cambios sustanciales el sentido de la lista hebrea: pertenencia clanica, nombre propio, vínculo genealógico, acompañamiento y conteo sexado. La única decisión relevante fue conservar la especificidad de זכרים mediante «varones» en lugar de un término más genérico.'
  spanish_consistency_notes:
  - Se usa «hijos de» para el marcador genealógico de clan, conforme al patrón bíblico y al paralelo inglés auditado.
  - 'Los nombres propios se transliteran o se adaptan según uso español bíblico: «Adín» y «Jonatán».'
  - «Varones» preserva la especificidad de género del hebreo sin sonar forzado en español.
  - No hay notas textuales o teológicas adicionales porque el versículo es una entrada de lista genealógica y numérica sin variantes interpretativas relevantes.
