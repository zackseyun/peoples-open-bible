translation:
  language: es
  text: 'Entonces nuestros ancianos y todos los habitantes de nuestra tierra nos dijeron: «Tomen provisiones en su mano para el camino, y vayan al encuentro de ellos. Y díganles: “Nosotros somos sus siervos[a]”; y ahora hagan un pacto con nosotros[b]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sus siervos» refleja lenguaje diplomático deferente; el término hebreo también puede significar «esclavos» en otros contextos.
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «corten un pacto con nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְקֵינֵינוּ
  english_pob_choice: our elders
  chosen_spanish: nuestros ancianos
  alternatives_spanish:
  - nuestros mayores
  - nuestros ancianos, es decir, nuestros dirigentes
  lexicon: HALOT
  rationale: En este contexto se trata de los líderes comunitarios, no solo de hombres de edad avanzada. «Ancianos» conserva la función social y es un equivalente natural en español bíblico.
- source_word: יֹשְׁבֵי אַרְצֵנוּ
  english_pob_choice: the inhabitants of our land
  chosen_spanish: todos los habitantes de nuestra tierra
  alternatives_spanish:
  - los que habitaban nuestra tierra
  - los residentes de nuestra tierra
  lexicon: HALOT
  rationale: El participio designa a quienes viven en la tierra. «Habitantes» mantiene el sentido colectivo y «tierra» refleja el término territorial hebreo sin imponer una modernización indebida.
- source_word: צֵידָה
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - comida
  - suministros
  lexicon: HALOT
  rationale: El sustantivo se refiere a provisiones de viaje; «provisiones» es el equivalente más natural en español y no limita el sentido a solo alimento.
- source_word: בְיֶדְכֶם
  english_pob_choice: in your hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - con ustedes
  - en su poder
  lexicon: HALOT
  rationale: 'La expresión hebrea es literal: «en la mano». En español, «en su mano» conserva la imagen concreta y sigue siendo comprensible sin forzar la sintaxis.'
- source_word: לַדֶּרֶךְ
  english_pob_choice: for the journey
  chosen_spanish: para el camino
  alternatives_spanish:
  - para el viaje
  - para el camino/recorrido
  lexicon: HALOT
  rationale: Aquí el sustantivo expresa trayecto o desplazamiento. «Camino» conserva la imagen hebrea y funciona bien en español; «viaje» sería más interpretativo.
- source_word: לִקְרָאתָם
  english_pob_choice: to meet them
  chosen_spanish: al encuentro de ellos
  alternatives_spanish:
  - para encontrarlos
  - a su encuentro
  lexicon: HALOT
  rationale: La frase expresa ir hacia alguien para encontrarse con él. «Al encuentro de ellos» mantiene la dirección del movimiento y evita suavizar el matiz espacial.
- source_word: עַבְדֵיכֶם
  english_pob_choice: your servants
  chosen_spanish: sus esclavos[b]
  alternatives_spanish:
  - sus siervos
  - sus servidores
  lexicon: HALOT
  rationale: Aunque aquí la fórmula es diplomática y deferente, el término hebreo conserva la amplitud de sentido de esclavo/siervo. Dado el proyecto POB, se mantiene «esclavos» en el texto, dejando en nota la tensión de registro y la posibilidad de lectura deferencial.
- source_word: כִּרְתוּ לָנוּ בְרִית
  english_pob_choice: make a covenant with us
  chosen_spanish: hagan un pacto con nosotros
  alternatives_spanish:
  - corten un pacto con nosotros
  - hagan un convenio con nosotros
  lexicon: HALOT
  rationale: El hebreo usa la fórmula idiomática «cortar un pacto». En español, «hacer un pacto» comunica bien la idea sin perder la categoría covenantal; «pacto» es más natural que «alianza» en este contexto narrativo.
- source_word: וְעַתָּה
  english_pob_choice: and now
  chosen_spanish: y ahora
  alternatives_spanish:
  - así que ahora
  - y en este momento
  lexicon: HALOT
  rationale: La conjunción más adverbio introduce la petición. «Y ahora» conserva la transición discursiva de forma directa.
- source_word: וַיֹּאמְרוּ ... לֵאמֹר
  english_pob_choice: said to us ... saying
  chosen_spanish: 'nos dijeron:'
  alternatives_spanish:
  - nos hablaron, diciendo
  - nos dijeron, diciendo
  lexicon: HALOT
  rationale: La fórmula introductoria hebrea se condensa naturalmente en español como «nos dijeron», con la cita directa siguiente; evita una repetición pesada en la traducción.
theological_decisions:
- issue: Renderización de עַבְדֵיכֶם en un contexto diplomático
  english_pob_reading: '''Your servants'' reflects deferential diplomatic language; the Hebrew term can also mean ''slaves'' in other contexts.'
  chosen_spanish_reading: «Sus esclavos» en el texto, con nota sobre el registro deferencial y la amplitud semántica del término.
  alternative_spanish_readings:
  - sus siervos
  - sus servidores
  rationale: 'La decisión preserva la tensión lexical documentada por el POB inglés: el término puede ser esclavo, pero aquí funciona como fórmula de sumisión política. Mantener «esclavos» protege la fuerza del hebreo y la transparencia del registro, mientras la nota aclara el uso diplomático.'
  doctrine_reference: Lexicografía bíblica y consistencia terminológica del proyecto POB sobre δοῦλος/עבד
- issue: Expresión de כרת ברית como fórmula pactal
  english_pob_reading: make a covenant with us
  chosen_spanish_reading: hagan un pacto con nosotros
  alternative_spanish_readings:
  - corten un pacto con nosotros
  - hagan una alianza con nosotros
  rationale: Se conserva la idea pactal sin sustituirla por un término más eclesiástico o abstracto. «Pacto» mantiene la categoría bíblica de alianza juramentada y es coherente con la nota inglesa sobre la expresión idiomática.
  doctrine_reference: Teología bíblica del pacto / alianza
- issue: Uso de «camino» frente a «viaje»
  english_pob_reading: for the journey
  chosen_spanish_reading: para el camino
  alternative_spanish_readings:
  - para el viaje
  - para el trayecto
  rationale: «Camino» conserva la imaginería narrativa del hebreo y su concisión. No altera el contenido, pero mantiene la forma espacial del mandato.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el pasaje revisado del POB inglés y su estado final sin cambios. La traducción sigue la lectura óptima equivalente del auditable English POB: mantiene la estructura narrativa, la fórmula de habla, el léxico pactal y la tensión semántica de עבד, sin añadir interpretaciones no sustentadas por el hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantiene «pacto» para ברית en consonancia con la traducción inglesa documentada.
  - Se conserva el registro formal y narrativo propio de un relato histórico bíblico.
  - No se introduce «siervo» en el cuerpo principal para no diluir la fuerza lexical documentada en la auditoría inglesa.
