translation:
  language: es
  text: 'Para Mahlí: Eleazar[a], y no tuvo hijos varones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En cuanto a Mahlí: Eleazar; y no tuvo hijos varones». El prefijo inicial probablemente funciona como marcador de encabezado o de tema en esta lista.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַחְלִי
  english_pob_choice: For Mahli
  chosen_spanish: Para Mahli
  alternatives_spanish:
  - De Mahli
  - As for Mahli
  lexicon: HALOT
  rationale: El prefijo ל en esta lista genealógica funciona como marcador de encabezado o tópico. «Para Mahli» conserva esa función de introducción en un español natural; «de Mahli» puede sonar posesivo, y «as for Mahli» no es idiomático en español.
- source_word: אֶלְעָזָר
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  lexicon: Nombre propio transliterado
  rationale: Se conserva el nombre propio mediante transliteración estándar, sin traducirlo.
- source_word: וְלֹא הָיָה לוֹ
  english_pob_choice: and he had no
  chosen_spanish: y no tuvo
  alternatives_spanish:
  - y no le hubo
  - y no había para él
  lexicon: HALOT
  rationale: La construcción hebrea «no había para él» expresa la misma idea que la inglesa «he had no», pero en español bíblico actual «no tuvo» comunica con claridad y evita una frase demasiado literal o extraña. Se mantiene el valor simple de la coordinación con «y».
- source_word: בָּנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - descendencia
  lexicon: HALOT
  rationale: Aunque el término hebreo especifica «sons», en español «hijos» comunica de forma natural la ausencia de descendencia masculina dentro del contexto genealógico; si se optara por «hijos varones» se añadiría una explicitación que el hebreo no desarrolla aquí. La elección mantiene la brevedad del verso y su sentido genealógico.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene el valor de encabezado del prefijo ל con una nota alternativa («As for Mahli»). La versión española preserva esa ambigüedad con «Para Mahli» y una nota que explicita la posible función temática del marcador inicial.
  spanish_consistency_notes:
  - Se usa «Mahli» y «Eleazar» como transliteraciones consistentes de nombres propios.
  - Se evita «SEÑOR» u otro sustituto teológico porque no aparece el nombre divino en este versículo.
  - La estructura breve y paratáctica sigue el orden del hebreo sin forzar una paráfrasis.
