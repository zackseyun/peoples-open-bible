id: COL.1.7
reference: Colossians 1:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀καθὼς ἐμάθετε ἀπὸ Ἐπαφρᾶ τοῦ ἀγαπητοῦ συνδούλου ἡμῶν, ὅς ἐστιν πιστὸς ὑπὲρ ⸀ἡμῶν διάκονος τοῦ Χριστοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/007.yaml
  text: just as you learned from Epaphras, our beloved fellow slave, who is a faithful minister of the Messiah on our behalf,
translation:
  language: ko
  text: 이는 여러분이 우리의 사랑하는 동료 노예[a] 에바브라에게서 배운 그대로입니다. 그는 우리를 대신하여[b] 메시아의 신실한 일꾼[c]입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 σύνδουλος(δοῦλος와 동족어). 같은 주인 아래 함께 매여 있는 자를 가리킨다. δοῦλος의 매임의 무게를 살리기 위해 영어 POB가 「fellow slave」를 선택한 결정을 따라 「동료 노예」로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「우리를 위하여」. 헬라어 ὑπὲρ + 속격은 대신함과 유익을 함께 담는다.
    reason: alternative_reading
  - marker: c
    text: 또는 「봉사자」, 「집사」. 헬라어 διάκονος는 후대 직제 「집사」보다 일반적 사역의 「섬기는 자·일꾼」을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμάθετε
  english_pob_choice: you learned
  chosen_korean: 배운
  alternatives_korean:
  - 받은
  - 익힌
  lexicon: BDAG
  rationale: 부정과거 직설법. 복음을 배운 사건을 단순 과거로 「배운」으로 옮긴다.
- source_word: Ἐπαφρᾶ
  english_pob_choice: Epaphras
  chosen_korean: 에바브라
  alternatives_korean: []
  lexicon: BDAG
  rationale: 한국 교회의 정립된 표기를 따른다.
- source_word: ἀγαπητοῦ
  english_pob_choice: beloved
  chosen_korean: 사랑하는
  alternatives_korean:
  - 친애하는
  lexicon: BDAG
  rationale: 사랑의 신학적 무게를 담은 「사랑하는」을 사용한다.
- source_word: συνδούλου
  english_pob_choice: fellow slave
  chosen_korean: 동료 노예
  alternatives_korean:
  - 동료 종
  - 함께 종 된 자
  lexicon: BDAG
  rationale: σύν-δοῦλος는 「함께 매인 자」를 가리킨다. 영어 POB가 매임의 강한 어감을 보존하기 위해 「fellow slave」를 택한 결정을 한국어로 반영하여 「동료 노예」로 옮긴다. 「종」으로 옮기면 매임의 무게가 약화된다.
- source_word: πιστὸς
  english_pob_choice: faithful
  chosen_korean: 신실한
  alternatives_korean:
  - 충성된
  - 믿음직한
  lexicon: BDAG
  rationale: 에바브라의 사역의 신뢰성을 가리킨다.
- source_word: ὑπὲρ ἡμῶν
  english_pob_choice: on our behalf
  chosen_korean: 우리를 대신하여
  alternatives_korean:
  - 우리를 위하여
  lexicon: BDAG
  rationale: ὑπέρ + 속격은 대신·유익을 함께 담는다. 영어 POB의 「on our behalf」 결정에 따라 대신함의 어감을 살린 「우리를 대신하여」로 옮긴다.
- source_word: διάκονος
  english_pob_choice: minister
  chosen_korean: 일꾼
  alternatives_korean:
  - 사역자
  - 봉사자
  - 집사
  lexicon: BDAG
  rationale: 본 절은 후대 직제 「집사」보다 일반적 복음 사역의 「섬기는 자」를 가리키므로 「일꾼」으로 옮긴다. 영어 POB의 「minister」 결정을 따른다.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_korean: 메시아의
  alternatives_korean:
  - 그리스도의
  lexicon: BDAG
  rationale: Χριστός의 칭호성을 보존하기 위해 「메시아」로 옮긴다.
theological_decisions:
- issue: σύνδουλος / δοῦλος의 매임 어감 번역
  chosen_reading: 동료 노예
  alternative_readings:
  - 동료 종
  - 함께 종 된 자
  rationale: 본 절은 바울·에바브라가 같은 주인께 매여 있다는 매임의 이미지를 담는다. DOCTRINE.md는 δοῦλος의 매임의 무게가 본문에 살아 있을 때 「노예」 어휘로 옮기도록 지시한다. 영어 POB도 「fellow slave」로 결정했다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Contested terms table for δοῦλος'
- issue: Χριστός를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: διάκονος τοῦ Χριστοῦ에서 Χριστός는 섬김의 대상이신 분의 칭호로 기능한다. 본 번역의 일관된 원칙에 따라 「메시아」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; Contested terms table for Χριστός'
