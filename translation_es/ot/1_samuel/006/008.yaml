translation:
  language: es
  text: Entonces tomen el arca de Yahvé y pónganla sobre el carro, y pongan los objetos de oro que le están devolviendo como ofrenda por la culpa en una caja junto a ella. Luego envíenla, y déjenla ir.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of Yahweh
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca de Yahvé
  - el arca del SEÑOR
  lexicon: HALOT
  rationale: אֲרוֹן designa el arca sagrada; en la pauta del proyecto, יְהוָה se vierte como «Yahvé». Mantiene la referencia al nombre divino sin ocultarlo bajo una sustitución editorial.
- source_word: הָעֲגָלָה
  english_pob_choice: the cart
  chosen_spanish: el carro
  alternatives_spanish:
  - el carro
  - la carreta
  lexicon: HALOT
  rationale: עֲגָלָה puede ser carro o carreta. «Carro» es claro y natural en español bíblico moderno, y conserva la imagen de un vehículo de carga.
- source_word: כְּלֵי הַזָּהָב
  english_pob_choice: the gold objects
  chosen_spanish: los objetos de oro
  alternatives_spanish:
  - los objetos de oro
  - las piezas de oro
  - los artículos de oro
  - los utensilios de oro
  lexicon: HALOT
  rationale: 'כְּלִי es amplio: objeto, utensilio, vasija o pieza. «Objetos de oro» reproduce bien esa amplitud sin imponer indebidamente «vasijas» o «utensilios».'
- source_word: הֲשֵׁבֹתֶם לוֹ
  english_pob_choice: that you are returning to him
  chosen_spanish: que están devolviéndole
  alternatives_spanish:
  - que están devolviéndole
  - que le están devolviendo
  - que le han devuelto
  - que están regresándole
  lexicon: HALOT
  rationale: El verbo de שוב aquí expresa devolver/enviar de vuelta. El dativo «le» conserva el referente a Yahvé, y el gerundio español mantiene el valor de acción en curso propio de la instrucción.
- source_word: אָשָׁם
  english_pob_choice: as a guilt offering
  chosen_spanish: como ofrenda por la culpa
  alternatives_spanish:
  - como ofrenda por la culpa
  - como ofrenda de culpa
  - como ofrenda por el pecado
  lexicon: HALOT
  rationale: Se conserva el valor sacrificial técnico de אָשָׁם, pero en español «ofrenda por la culpa» comunica con más naturalidad el matiz cultual y evita confundirlo con términos más generales de pecado.
- source_word: בָאַרְגַּז
  english_pob_choice: in a box
  chosen_spanish: en una caja
  alternatives_spanish:
  - en una caja
  - en un cofre
  - en un arcón
  lexicon: HALOT
  rationale: אַרְגָּז es un recipiente cerrado tipo caja o cofre. «Caja» es la forma más transparente para el lector actual; «cofre» se deja como alternativa más solemne pero menos cotidiana.
- source_word: מִצִּדּוֹ
  english_pob_choice: beside it
  chosen_spanish: junto a ella
  alternatives_spanish:
  - junto a ella
  - al lado de ella
  - a su lado
  lexicon: HALOT
  rationale: 'El sufijo se refiere naturalmente al arca, que en español requiere femenino: «ella». «Junto a ella» preserva la relación espacial con buena fluidez.'
- source_word: וְשִׁלַּחְתֶּם אֹתוֹ
  english_pob_choice: Then send it away
  chosen_spanish: Luego despídanla
  alternatives_spanish:
  - Luego despídanla
  - Luego envíenla lejos
  - Luego déjenla ir
  lexicon: HALOT
  rationale: שׁלח en este contexto es despedir/enviar fuera. «Despídanla» expresa bien la acción de liberar el arca para que salga, manteniendo el tono imperativo.
- source_word: וְהָלָךְ
  english_pob_choice: and let it go
  chosen_spanish: y que siga su camino
  alternatives_spanish:
  - y que siga su camino
  - y déjenla ir
  - y se irá
  lexicon: HALOT
  rationale: 'La forma verbal finaliza la secuencia como resultado permisivo: una vez enviada, el arca irá por sí misma. «Que siga su camino» transmite ese valor sin sonar duro ni demasiado literal.'
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: La política del proyecto exige transliterar el nombre divino en lugar de enmascararlo. «Yahvé» es la forma española prevista y mantiene la tensión reverente del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Uso de sacrificial legal אָשָׁם en boca del narrador
  english_pob_reading: guilt offering
  chosen_spanish_reading: ofrenda por la culpa
  alternative_spanish_readings:
  - ofrenda por la culpa
  - ofrenda de culpa
  - ofrenda por el pecado
  rationale: Se conserva el tecnicismo sacrificial sin simplificarlo a un lenguaje más general. La formulación española mantiene la conexión con el sistema cultual bíblico y no introduce una equivalencia doctrinal ajena al pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 y #5'
- issue: Referencia pronominal del arca como femenino en español
  english_pob_reading: it
  chosen_spanish_reading: ella
  alternative_spanish_readings:
  - ella
  - lo
  rationale: En español, «arca» es femenino. Ajustar el pronombre al género gramatical mejora la naturalidad sin alterar el referente ni suavizar la instrucción.
  doctrine_reference: Spanish grammar consistency for source-faithful reference
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por una revisión menor: se cambió «send it off» por «send it away» para mayor naturalidad. La redacción española ya adopta directamente una forma equivalente de despedida/enviar fuera («despídanla»), por lo que no requiere un ajuste adicional. Se mantuvieron las decisiones léxicas clave: nombre divino explícito, término sacrificial técnico y final resultativo del verbo de movimiento.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto para יְהוָה.
  - «Carro» conserva el valor narrativo de עֲגָלָה sin arcaísmo.
  - «Objetos de oro» reproduce la amplitud de כְּלִי.
  - El arca se trata como femenino en los pronombres españoles por concordancia gramatical.
  - La secuencia verbal conserva el carácter imperativo y resultativo del hebreo.
