translation:
  language: es
  text: No degollarás la sangre de mi sacrificio con levadura[a], y el sacrificio de la fiesta de la Pascua no quedará hasta la mañana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «junto con levadura» o «sobre levadura». La expresión hebrea es breve e idiomática.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׁחַט
  english_pob_choice: shall not slaughter
  chosen_spanish: no sacrificarás
  alternatives_spanish:
  - no degollarás
  - no matarás ritualmente
  lexicon: HALOT
  rationale: El hebreo שָׁחַט puede designar el degüello o la matanza ritual de una víctima. En español, 'sacrificar' comunica el contexto cultual con naturalidad; 'degollar' es más literal pero puede sonar demasiado técnico o crudo, y 'matar' pierde el matiz ritual.
- source_word: עַל חָמֵץ
  english_pob_choice: with leaven
  chosen_spanish: con levadura
  alternatives_spanish:
  - sobre levadura
  - junto con levadura
  - mientras haya levadura
  lexicon: HALOT
  rationale: La preposición עַל es idiomática en esta prohibición cultual. 'Con levadura' reproduce el sentido general adoptado por la POB en inglés sin forzar una explicación ritual más específica que el hebreo no desarrolla aquí.
- source_word: דַּם זִבְחִי
  english_pob_choice: the blood of my sacrifice
  chosen_spanish: la sangre de mi sacrificio
  alternatives_spanish:
  - la sangre de mi ofrenda
  - mi sangre sacrificial
  lexicon: HALOT
  rationale: Se mantiene la cadena nominal de forma directa. 'Sangre' conserva la imagen sacrificial explícita del hebreo, y 'mi sacrificio' refleja el sufijo de primera persona sobre זִבְחִי.
- source_word: יָלִין
  english_pob_choice: shall not remain until the morning
  chosen_spanish: no quedará hasta la mañana
  alternatives_spanish:
  - no permanecerá hasta la mañana
  - no se quedará hasta la mañana
  - no se dejará hasta la mañana
  lexicon: HALOT
  rationale: El verbo לין aquí señala que la víctima o porción no debe permanecer durante la noche. 'No quedará hasta la mañana' es breve, idiomático y conserva el límite temporal del texto sin añadir la idea de 'overnight' que la revisión inglesa retiró por redundante.
- source_word: זֶבַח חַג הַפָּסַח
  english_pob_choice: the sacrifice of the feast of the Passover
  chosen_spanish: el sacrificio de la fiesta de la Pascua
  alternatives_spanish:
  - el sacrificio de la Pascua
  - la ofrenda de la fiesta de la Pascua
  - el sacrificio de la festividad de la Pascua
  lexicon: HALOT
  rationale: Se preserva la estructura compacta del hebreo, manteniendo visibles tanto 'sacrificio' como 'fiesta'. 'Pascua' es la equivalencia establecida y transparente en español; no se translitera porque el término ya tiene forma heredada y comprensible.
theological_decisions:
- issue: Terminología cultual sin suavizar el carácter sacrificial
  english_pob_reading: the blood of my sacrifice / the sacrifice of the feast of the Passover
  chosen_spanish_reading: la sangre de mi sacrificio / el sacrificio de la fiesta de la Pascua
  alternative_spanish_readings:
  - mi ofrenda
  - la ofrenda de la Pascua
  - el sacrificio pascual
  rationale: El versículo regula una ofrenda concreta dentro del culto mosaico; por eso se conserva el lenguaje sacrificial explícito. 'Ofrenda' podría ser más general y atenuar la precisión de 'sacrificio', mientras que 'sacrificio pascual' compacta demasiado la cadena nominal y borra la distinción entre fiesta y sacrificio.
  doctrine_reference: Éxodo 34:25; regulación cultual del pacto
- issue: Tiempo de permanencia hasta la mañana sin añadir matices no presentes
  english_pob_reading: shall not remain until the morning
  chosen_spanish_reading: no quedará hasta la mañana
  alternative_spanish_readings:
  - no permanecerá hasta la mañana
  - no se dejará hasta la mañana
  rationale: El hebreo marca el límite temporal de permanencia; la español escogido lo expresa de modo simple y directo. No se introduce 'de noche' ni 'pasar la noche' porque la revisión inglesa ya observó que 'until the morning' basta para el sentido.
  doctrine_reference: Éxodo 12:10; 23:18; 34:25
- issue: Término festivo sin importar asociaciones posteriores
  english_pob_reading: Passover
  chosen_spanish_reading: Pascua
  alternative_spanish_readings:
  - Pesaj
  rationale: '''Pascua'' es el equivalente bíblico establecido en español y comunica la fiesta/sacrificio de manera clara. ''Pesaj'' puede ser útil en contextos académicos o judíos, pero aquí no es necesario para la audiencia general de lectura bíblica.'
  doctrine_reference: Éxodo 12; Levítico 23:5
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión inglesa que eliminó ''overnight'' por redundante, manteniendo el sentido temporal de יָלִין con una formulación española compacta: ''no quedará hasta la mañana''. También se preservó la decisión inglesa de mantener la estructura nominal cultual de זֶבַח חַג הַפָּסַח sin comprimirla en un equivalente más interpretativo.'
  spanish_consistency_notes:
  - Se usó 'Pascua' de forma consistente para הַפָּסַח, en línea con el estándar bíblico en español.
  - Se eligió 'sacrificio' en lugar de 'ofrenda' para conservar la fuerza cultual del hebreo זֶבַח.
  - Se mantuvo el registro formal y reverente, sin calcos innecesarios ni paráfrasis extensivas.
  - La nota al pie marca la ambigüedad de עַל חָמֵץ sin duplicar el marcador en el texto principal.
