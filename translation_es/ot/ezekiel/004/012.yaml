review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: comer una torta de cebada y cocerla usando excremento humano, de manera visible para otros. Sin embargo, hay dos ajustes importantes para mayor fidelidad. Primero, תֹּאכֲלֶנָּה incluye el sufijo femenino de objeto (''la''), por lo que en español conviene explicitarlo: ''la comerás''. Segundo, לְעֵינֵיהֶם enfatiza visibilidad pública más específicamente que ''en su presencia''; ''ante sus ojos'' o ''a la vista de ellos'' preserva mejor el matiz del signo profético visible.'
  spanish_quality_summary: El español es claro y natural, pero 'Comerás una torta de cebada' suena ligeramente incompleto frente al objeto femenino explícito del hebreo; 'La comerás como una torta de cebada' fluye mejor y sigue más de cerca el original y el POB inglés. 'La cocerás sobre excremento humano' es comprensible, aunque en español bíblico 'la cocerás con excremento humano' podría malentenderse como mezcla; por eso conviene mantener 'sobre' con nota. 'Ante sus ojos' es más vívido y bíblicamente natural que 'en su presencia'.
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Excremento humano' representa bien גֶלְלֵי צֵאַת הָאָדָם; 'humano' mantiene el valor genérico de הָאָדָם. No aparecen términos sensibles como Yahvé, Mesías o esclavo. La nota léxica sobre la preposición está bien orientada y debe conservarse.
  issues:
  - severity: medium
    issue: Falta el objeto explícito de תֹּאכֲלֶנָּה
    rationale: El verbo hebreo lleva sufijo femenino singular que remite a la torta. 'Comerás una torta...' comunica el sentido general, pero no preserva tan claramente la referencia pronominal como 'La comerás...'.
  - severity: medium
    issue: '''En su presencia'' debilita el matiz visual de לְעֵינֵיהֶם'
    rationale: El hebreo literalmente apunta a 'ante sus ojos / a la vista de ellos', subrayando la visibilidad pública del acto profético. 'En su presencia' puede significar simplemente estando ellos presentes.
  revised_spanish_text: La comerás como una torta de cebada[a], y la cocerás sobre excremento humano, ante sus ojos.
  revised_footnotes:
  - marker: a
    text: O 'con excremento humano'—el hebreo con la preposición puede entenderse más literalmente, pero el sentido aquí es cocer sobre un fuego alimentado con excremento humano.
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto para reflejar mejor el sufijo pronominal femenino de תֹּאכֲלֶנָּה ('la comerás') y para preservar el matiz de visibilidad pública de לְעֵינֵיהֶם ('ante sus ojos'). Se mantiene 'sobre excremento humano' con nota, porque en español comunica mejor el uso del excremento como combustible y evita la lectura errónea de mezcla en la masa.
