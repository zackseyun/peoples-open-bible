translation:
  language: es
  text: Todo camino del hombre es recto a sus propios ojos[a], pero Yahvé pesa los corazones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea significa según la propia evaluación o parecer de la persona.
    reason: lexical_explanation
lexical_decisions:
- source_word: כָּל
  english_pob_choice: Every
  chosen_spanish: Todo
  alternatives_spanish:
  - Cada
  - Todo el
  lexicon: HALOT
  rationale: 'El sentido es distributivo y proverbial: se aplica a cada caso individual. En español, «Todo camino del hombre» conserva esa amplitud sin sonar forzado.'
- source_word: דֶּרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - conducta
  - sendero
  lexicon: HALOT
  rationale: En la literatura sapiencial, la imagen de «camino» designa la manera de vivir o proceder. «Camino» es natural en español y preserva la metáfora.
- source_word: אִישׁ
  english_pob_choice: man's
  chosen_spanish: del hombre
  alternatives_spanish:
  - de un hombre
  - de la persona
  lexicon: HALOT
  rationale: El hebreo usa singular masculino con valor representativo y proverbial. «Del hombre» conserva esa forma y el sentido genérico sin neutralizar indebidamente la estructura del original.
- source_word: יָשָׁר
  english_pob_choice: right
  chosen_spanish: recto
  alternatives_spanish:
  - justo
  - correcto
  lexicon: HALOT
  rationale: Aquí el término describe lo que a la persona le parece moral o prácticamente correcto. «Recto» mantiene la evaluación ética y evita el posible sesgo de «correcto» en español moderno.
- source_word: בְּעֵינָיו
  english_pob_choice: in his own eyes
  chosen_spanish: ante sus propios ojos
  alternatives_spanish:
  - a sus propios ojos
  - en su propia opinión
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude a la propia evaluación. «Ante sus propios ojos» reproduce bien la imagen y deja claro el matiz reflexivo con «propios».
- source_word: וְתֹכֵן
  english_pob_choice: weighs
  chosen_spanish: pesa
  alternatives_spanish:
  - examina
  - valora
  - mide
  lexicon: HALOT
  rationale: El verbo conserva la imagen de la balanza y contrasta la autoevaluación humana con el juicio divino. «Pesa» es breve, bíblico y fiel a la metáfora.
- source_word: לִבּוֹת
  english_pob_choice: hearts
  chosen_spanish: los corazones
  alternatives_spanish:
  - los corazones y pensamientos
  - las intenciones
  lexicon: HALOT
  rationale: En antropología hebrea, «corazones» abarca la interioridad, incluidos pensamiento e intención. Se mantiene el término bíblico por su densidad semántica y su resonancia literaria.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: transliterar יְהוָה como «Yahvé». Esto preserva el nombre personal del pacto y evita la sustitución por un título.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura inglesa del POB usa el nombre divino en transliteración. En español, el equivalente establecido por el proyecto es «Yahvé», que conserva el referente del Tetragrámaton sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de בְּעֵינָיו como evaluación subjetiva
  english_pob_reading: in his own eyes
  chosen_spanish_reading: ante sus propios ojos
  alternative_spanish_readings:
  - según su propia opinión
  - a sus propios ojos
  rationale: La frase no habla de visión física sino de juicio personal. La traducción elegida mantiene la imagen hebrea y comunica claramente la autoevaluación humana frente al juicio divino.
  doctrine_reference: 'Sabiduría bíblica: contraste entre percepción humana y evaluación divina'
translation_notes:
  revision_awareness: 'El contexto inglés no requiere cambios textuales respecto de la última revisión: mantiene la oposición proverbial entre la autoevaluación humana y la evaluación divina. Se ajustó el nombre divino al criterio español del proyecto («Yahvé») y se conservó la metáfora de «pesar» para el verbo de evaluación.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo breve y proverbial del original.
  - «Yahvé» se usa de manera consistente para יְהוָה.
  - «Corazones» conserva el antropologismo hebreo sin explicitarlo en el texto principal.
  - La nota a explica la idiomatización de בְּעֵינָיו sin debilitar la imagen original.
