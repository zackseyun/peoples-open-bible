translation:
  language: es
  text: Hay un pacto entre tú y yo, entre mi padre y tu padre. Mira, te he enviado un regalo[a] de plata y oro. Ve, rompe tu pacto con Baasa, rey de Israel, para que se aparte de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Regalo'' refleja la lectura neutral de la POB inglesa para שֹׁחַד, aunque el contexto sugiere una dádiva con finalidad persuasiva, cercana a un soborno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרִית
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - convenio
  lexicon: HALOT
  rationale: En este contexto diplomático y político, בְּרִית designa un acuerdo formal entre reyes. 'Pacto' comunica mejor en español esa formalidad sin sonar excesivamente eclesiástico; 'alianza' sería posible, pero puede sonar más genérico y menos vinculante.
- source_word: בֵּינִי וּבֵינֶךָ ... בֵּין אָבִי וּבֵין אָבִיךָ
  english_pob_choice: between me and you, between my father and your father
  chosen_spanish: entre tú y yo, entre mi padre y tu padre
  alternatives_spanish:
  - entre nosotros dos, entre mi padre y tu padre
  lexicon: HALOT
  rationale: Se conserva la estructura relacional explícita del hebreo, pero con el orden natural del español. El original enfatiza la reciprocidad y el paralelismo formal.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: הִנֵּה funciona como marcador de atención. 'Mira' mantiene ese gesto discursivo en español moderno sin introducir arcaísmo.
- source_word: שֹׁחַד
  english_pob_choice: gift
  chosen_spanish: regalo
  alternatives_spanish:
  - presente
  - soborno
  - coima
  lexicon: HALOT
  rationale: La POB inglesa pasó de 'bribe' a 'gift' por neutralidad léxica, aunque reconoce la posible carga de soborno en el contexto. En español, 'regalo' reproduce esa neutralidad, mientras que el contexto deja ver la intención persuasiva. 'Soborno' sería demasiado interpretativo para el texto principal.
- source_word: כֶּסֶף וְזָהָב
  english_pob_choice: silver and gold
  chosen_spanish: plata y oro
  alternatives_spanish:
  - oro y plata
  - monedas de plata y oro
  lexicon: HALOT
  rationale: La traducción literal de los materiales preserva la concreción del hebreo. 'Plata y oro' es la fórmula natural en español y no requiere generalización.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: HALOT
  rationale: El imperativo simple reproduce la fuerza directa de la orden. 'Ve' es breve, natural y fiel al tono urgente del mandato.
- source_word: הָפֵרָה
  english_pob_choice: break
  chosen_spanish: rompe
  alternatives_spanish:
  - anula
  - deshace
  - invalida
  lexicon: HALOT
  rationale: El verbo hebreo expresa la ruptura o anulación de un pacto. 'Rompe' conserva la fuerza idiomática más natural en español para 'break a pact'.
- source_word: בְּרִיתְךָ אֶת־בַּעְשָׁא
  english_pob_choice: your covenant with Baasha
  chosen_spanish: tu pacto con Baasa
  alternatives_spanish:
  - tu alianza con Baasa
  lexicon: HALOT
  rationale: Se mantiene la consistencia léxica con בְּרִית en la primera mitad del versículo. 'Con Baasa' expresa la relación pactal de modo idiomático en español.
- source_word: וְיַעֲלֶה מֵעָלָי
  english_pob_choice: so that he may withdraw from me
  chosen_spanish: para que se aparte de mí
  alternatives_spanish:
  - para que se retire de mí
  - para que se aleje de mí
  lexicon: HALOT
  rationale: La expresión hebrea describe retirarse o apartarse de una posición hostil o de presión. 'Se aparte de mí' comunica con claridad esa retirada sin forzar una imagen militar demasiado literal.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió 'bribe' por 'gift' para volver más neutral la traducción de שֹׁחַד. La versión española sigue esa decisión, manteniendo a la vez la tensión contextual de un presente usado para inducir a Ben-hadad a quebrar su pacto con Baasa.
  spanish_consistency_notes:
  - Se mantiene 'pacto' para בְּרִית en todo el versículo, evitando alternar con 'alianza' o 'convenio'.
  - Se usa 'Baasa' como forma española habitual del nombre, sin añadir glosas.
  - La puntuación conserva el paralelismo y la cadencia diplomática del original.
