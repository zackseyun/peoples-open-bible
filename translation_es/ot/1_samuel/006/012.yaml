base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/006/012.yaml
  text: And the cows went straight on the road to Beth-shemesh[a], on one highway; they went along, lowing as they went, and did not turn aside to the right or to the left[c][b]. And the lords of the Philistines were walking behind them as far as the border of Beth-shemesh.
  footnotes:
  - marker: a
    text: Or 'along a single road.' The Hebrew emphasizes that the cows kept to one fixed route.
    reason: lexical_alternative
  - marker: b
    text: '''Lowing'' refers to the vocal sound of cattle; the wording suggests they continued making this sound as they traveled.'
    reason: cultural_note
  - marker: c
    text: Or 'the rulers of the Philistines.' The term denotes the recognized Philistine city-lords.
    reason: lexical_alternative
