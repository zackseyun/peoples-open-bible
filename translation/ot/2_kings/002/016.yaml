id: 2KI.2.16
reference: 2 Kings 2:16
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ אֵלָ֡י/ו הִנֵּה נָ֣א יֵֽשׁ אֶת עֲבָדֶי/ךָ֩ חֲמִשִּׁ֨ים אֲנָשִׁ֜ים בְּנֵֽי חַ֗יִל יֵ֣לְכוּ נָא֮ וִ/יבַקְשׁ֣וּ אֶת אֲדֹנֶי/ךָ֒ פֶּן נְשָׂא/וֹ֙ ר֣וּחַ יְהוָ֔ה וַ/יַּשְׁלִכֵ֨/הוּ֙ בְּ/אַחַ֣ד הֶ/הָרִ֔ים א֖וֹ בְּ/אַחַ֣ת ה/גיאות וַ/יֹּ֖אמֶר לֹ֥א תִשְׁלָֽחוּ־־־־־־׃
translation:
  text: Then they said to him[a], “Look now, there are fifty strong men among your servants. Please let them go and seek your master, lest the Spirit of Yahweh has carried him away and thrown him on one of the mountains or into one of the valleys.” But he said, “Do not send them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the wind of the LORD has carried him away.” The Hebrew word רוּחַ can mean “spirit” or “wind.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה נָא
  chosen: Look now
  alternatives:
  - Please look
  - Behold now
  lexicon: HALOT
  rationale: Combines the deictic/interjection הִנֵּה with the particle נָא in natural modern English. 'Look now' preserves the attention-getting force without archaic 'behold.'
- source_word: יֵשׁ אֶת עֲבָדֶיךָ
  chosen: there are ... among your servants
  alternatives:
  - your servants have
  - there are with your servants
  lexicon: HALOT
  rationale: יֵשׁ marks existence; the construction indicates the presence of men available from among Elisha's servants/attendants. 'Among your servants' is idiomatic and avoids wooden phrasing.
- source_word: חֲמִשִּׁים אֲנָשִׁים
  chosen: fifty ... men
  alternatives:
  - fifty men
  lexicon: HALOT
  rationale: Straightforward numerical phrase; retained explicitly.
- source_word: בְּנֵי חַיִל
  chosen: strong men
  alternatives:
  - able men
  - valiant men
  - men of strength
  lexicon: HALOT
  rationale: The phrase denotes capable, strong, competent men. In this search context, 'strong men' communicates physical capability clearly; 'valiant men' could overemphasize military heroism.
- source_word: יֵלְכוּ נָא
  chosen: Please let them go
  alternatives:
  - Please let them go now
  - Let them go, please
  lexicon: HALOT
  rationale: The jussive with נָא expresses a polite request. English requires an implied permissive sense directed to Elisha, hence 'Please let them go.'
- source_word: וִיבַקְשׁוּ אֶת אֲדֹנֶיךָ
  chosen: and search for your master
  alternatives:
  - and seek your master
  - and look for your lord
  lexicon: HALOT
  rationale: בקשׁ with direct object here means to seek/search for. אֲדֹנֶיךָ refers to Elijah as Elisha's master. 'Master' fits the disciple-teacher relationship better than 'lord' in English.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - perhaps
  - in case
  lexicon: HALOT
  rationale: פֶּן introduces apprehension about a possible outcome. 'Lest' is concise and accurate, though slightly formal; it best preserves the nuance.
- source_word: נְשָׂאוֹ רוּחַ יְהוָה
  chosen: the Spirit of the LORD has carried him away
  alternatives:
  - the Spirit of the LORD may have carried him away
  - the wind/spirit of the LORD has lifted him up
  lexicon: HALOT
  rationale: רוּחַ can mean wind or spirit, but in this prophetic context and with divine agency, 'the Spirit of the LORD' is the most natural reading. The perfect after פֶּן expresses the feared possibility as a completed action; English idiom renders this well with 'has carried him away.' 'Carried away' fits נשׂא in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: וַיַּשְׁלִכֵהוּ
  chosen: and thrown him
  alternatives:
  - and cast him
  - and hurled him
  lexicon: HALOT
  rationale: The verb means to throw/cast. 'Thrown him' works naturally after 'has carried him away' in English sequence.
- source_word: בְּאַחַד הֶהָרִים
  chosen: on one of the mountains
  alternatives:
  - onto one of the mountains
  - on one of the hills
  lexicon: HALOT
  rationale: הרים is best rendered 'mountains.' 'On' is idiomatic for being deposited upon a mountain area.
- source_word: בְּאַחַת הַגֵּאָיוֹת
  chosen: into one of the valleys
  alternatives:
  - in one of the valleys
  - into one of the ravines
  lexicon: HALOT
  rationale: גיא denotes valley/ravine. 'Valleys' is more broadly accessible; 'into' pairs naturally with the idea of being thrown there.
- source_word: לֹא תִשְׁלָחוּ
  chosen: Do not send them
  alternatives:
  - You shall not send
  - Do not send
  lexicon: HALOT
  rationale: The 2mp prohibition is directed to the group making the request. Supplying 'them' clarifies the implied object from context.
