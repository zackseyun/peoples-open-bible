lexical_decisions:
- source_word: שָׁם
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - Entonces
  lexicon: HALOT
  rationale: 'El adverbio es locativo: señala el lugar de la caída, no principalmente el momento. «Allí» conserva la deixis espacial de forma natural en español.'
- source_word: נָפְלוּ
  english_pob_choice: have fallen
  chosen_spanish: cayeron
  alternatives_spanish:
  - han caído
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un hecho consumado. En español, el pretérito simple suena más directo y natural en una sentencia poética; el presente perfecto también sería posible.
- source_word: פֹּעֲלֵי אָוֶן
  english_pob_choice: the workers of wickedness
  chosen_spanish: los obreros de iniquidad
  alternatives_spanish:
  - los hacedores de maldad
  - los malhechores
  lexicon: HALOT
  rationale: Se conserva la imagen constructa de «los que trabajan/hacen» y la carga moral de אָוֶן. «Obreros» refleja el campo semántico de workers y mantiene el paralelismo con el inglés auditado, mientras que «iniquidad» reproduce el valor moral fuerte sin suavizarlo.
- source_word: אָוֶן
  english_pob_choice: wickedness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - maldad
  - miseria
  - mal
  lexicon: HALOT
  rationale: Aquí אָוֶן tiene sentido moral. «Iniquidad» es una equivalencia digna y bíblicamente reconocible en español, y conserva la gravedad del término.
- source_word: דֹּחוּ
  english_pob_choice: are thrust down
  chosen_spanish: fueron derribados
  alternatives_spanish:
  - fueron arrojados abajo
  - fueron echados abajo
  lexicon: HALOT
  rationale: El verbo expresa caída forzada o empuje hacia abajo. «Fueron derribados» comunica la violencia del acto y su resultado, y es idiomático en español poético.
- source_word: וְלֹא יָכְלוּ קוּם
  english_pob_choice: and cannot rise
  chosen_spanish: y no pudieron levantarse
  alternatives_spanish:
  - y no pueden levantarse
  - y no lograron ponerse en pie
  lexicon: HALOT
  rationale: «Levantarse» reproduce bien la metáfora corporal de קום en este contexto. El pretérito mantiene la secuencia consumada del versículo y su tono de ruina irreversible.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo WLC y el audit trail inglés: conserva el valor locativo de שָׁם, el sentido consumado de נָפְלוּ, la imagen constructa de פֹּעֲלֵי אָוֶן y la pasiva de דֹּחוּ. No se detectan revisiones posteriores que alteren el contenido de la línea inglesa auditada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando el hebreo lo requiere; este versículo no contiene el Tetragrámaton.
  - Se mantiene un registro poético y bíblico, sin recurrir a un español arcaizante.
  - La puntuación separa claramente la primera cláusula de la segunda para reflejar el paralelismo hebreo.
