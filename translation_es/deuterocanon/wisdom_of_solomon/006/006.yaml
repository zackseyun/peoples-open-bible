translation:
  language: es
  text: Porque el menor es digno de misericordia[a], pero los poderosos serán examinados poderosamente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perdonable» o «excusable» para συγγνωστός. El griego sugiere alguien a quien se le concede indulgencia o se le disculpa la falta.
    reason: lexical_alternative
  - marker: b
    text: 'El griego hace un juego de palabras: «los poderosos serán examinados poderosamente». Opciones como «con severidad» o «estrictamente» explicitan el sentido, pero pierden el eco retórico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλάχιστος
  english_pob_choice: the least
  chosen_spanish: el más pequeño
  alternatives_spanish:
  - el menos
  - el más bajo
  - el de menor cuenta
  lexicon: LSJ
  rationale: El superlativo se usa sustantivamente y apunta a la persona de menor rango o importancia. 'El más pequeño' es natural en español y conserva el contraste con 'los poderosos'.
- source_word: συγγνωστός
  english_pob_choice: deserving of mercy
  chosen_spanish: digno de misericordia
  alternatives_spanish:
  - perdonable
  - excusable
  - merecedor de indulgencia
  lexicon: LSJ
  rationale: El adjetivo expresa la idea de ser tratado con tolerancia, perdón o indulgencia. 'Digno de misericordia' comunica bien el sentido relacional y evita una formulación demasiado técnica en español.
- source_word: ἐλέους
  english_pob_choice: of mercy
  chosen_spanish: de misericordia
  alternatives_spanish:
  - en misericordia
  - por misericordia
  - con misericordia
  lexicon: LSJ
  rationale: El genitivo es compacto y algo elíptico. 'De misericordia' mantiene la brevedad y la conexión directa con la cláusula anterior sin explicitar más de lo que el griego dice.
- source_word: δυνατοὶ
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los grandes
  - los poderosos en autoridad
  lexicon: LSJ
  rationale: En el contexto judicial y de gobierno, el adjetivo alude a quienes tienen poder o autoridad. 'Los poderosos' es claro y conserva el contraste retórico con 'el más pequeño'.
- source_word: δυνατῶς
  english_pob_choice: mightily
  chosen_spanish: poderosamente
  alternatives_spanish:
  - con severidad
  - estrictamente
  - con fuerza
  lexicon: LSJ
  rationale: 'El adverbio repite la raíz de ''poderosos'' y crea un juego de palabras: los poderosos serán examinados con poder. ''Poderosamente'' preserva ese eco mejor que una equivalencia interpretativa como ''con severidad''.'
- source_word: ἐτασθήσονται
  english_pob_choice: will be examined
  chosen_spanish: serán examinados
  alternatives_spanish:
  - serán escrutados
  - serán investigados
  - serán probados
  lexicon: LSJ
  rationale: El futuro pasivo indica examen o escrutinio evaluativo. 'Serán examinados' es claro y formal, y no introduce un matiz más específico que el del texto griego.
theological_decisions:
- issue: Contraste entre misericordia para el más pequeño y examen riguroso para los poderosos
  english_pob_reading: Retain the judicial-mercy contrast without expanding it into a doctrinal paraphrase about divine favoritism or condemnation.
  chosen_spanish_reading: 'Conservar el contraste judicial: al más pequeño se le reconoce misericordia, mientras que los poderosos afrontan un examen intenso.'
  alternative_spanish_readings:
  - Porque el humilde puede ser perdonado, pero los fuertes serán juzgados con rigor.
  - El menor merece indulgencia, pero los grandes serán severamente examinados.
  rationale: El griego presenta una antítesis de trato según estatus y responsabilidad, pero no desarrolla una doctrina completa. La traducción mantiene esa tensión sin resolverla en una paráfrasis teológica.
  doctrine_reference: Preservar la tensión teológica sin cerrarla
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que sustituyó una formulación más literal por 'deserving of mercy' para hacer más natural el sentido de συγγνωστός ἐλέους, y conserva el juego de palabras de la segunda cláusula mediante 'poderosamente'.
  spanish_consistency_notes:
  - '''Misericordia'' se usa para ἐλέους en coherencia con el estándar del proyecto para ἔλεος.'
  - Se conserva 'los poderosos' para δυνατοί, evitando suavizar el contraste con el más pequeño.
  - '''Serán examinados'' mantiene el tono judicial sin introducir ''juzgados'', que sería una inferencia adicional.'
  - El adverbio 'poderosamente' funciona como recurso retórico en español, aunque sea menos idiomático que alternativas más explicativas.
