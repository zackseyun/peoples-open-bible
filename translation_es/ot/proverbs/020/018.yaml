translation:
  language: es
  text: Los planes se establecen por consejo; libra la guerra con estrategia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con dirección hábil» o «con dirección sabia»; el término hebreo puede denotar guía experta, originalmente con la imagen de gobernar o pilotear.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחֲשָׁבוֹת
  english_pob_choice: Plans
  chosen_spanish: planes
  alternatives_spanish:
  - pensamientos
  - propósitos
  - proyectos
  lexicon: HALOT
  rationale: Aquí el sustantivo plural no se refiere a pensamientos internos, sino a cursos de acción proyectados. «Planes» comunica bien ese sentido práctico y encaja con el paralelismo del proverbio.
- source_word: בְּעֵצָה
  english_pob_choice: by counsel
  chosen_spanish: por consejo
  alternatives_spanish:
  - con consejo
  - mediante consejo
  - con asesoramiento
  lexicon: HALOT
  rationale: 'La preposición expresa medio o instrumento: los planes se afirman por medio de consejo. «Consejo» conserva el registro sapiencial y evita una formulación demasiado coloquial.'
- source_word: תִכּוֹן
  english_pob_choice: are established
  chosen_spanish: se establecen
  alternatives_spanish:
  - se afirman
  - quedan firmes
  - se fijan
  lexicon: HALOT
  rationale: El verbo en nifal comunica ser establecido o hecho firme. En español, la forma pronominal plural suena natural y mantiene el valor de permanencia/solidez.
- source_word: וּבְתַחְבֻּלוֹת
  english_pob_choice: with strategy
  chosen_spanish: con estrategia
  alternatives_spanish:
  - con táctica
  - con dirección sabia
  - con pericia en la conducción
  lexicon: HALOT
  rationale: תַחְבֻּלוֹת evoca maniobra, conducción hábil y estrategia, con trasfondo náutico/militar. «Estrategia» preserva ese matiz bélico sin reducirlo a simple consejo general.
- source_word: עֲשֵׂה
  english_pob_choice: wage
  chosen_spanish: haz
  alternatives_spanish:
  - libra
  - haz la guerra
  - combate
  lexicon: HALOT
  rationale: Con מִלְחָמָה, el hebreo forma una expresión idiomática equivalente a «hacer guerra». En español, «haz la guerra» sería más literal pero menos fluido; «haz la guerra» se conserva mediante la combinación completa «haz la guerra» dentro del orden natural del proverbio.
- source_word: מִלְחָמָה
  english_pob_choice: war
  chosen_spanish: la guerra
  alternatives_spanish:
  - batalla
  - combate
  - guerra
  lexicon: HALOT
  rationale: El sustantivo denota guerra en sentido amplio. «La guerra» es la forma directa y mantiene la fuerza proverbial del contraste entre planificación y acción militar.
translation_notes:
  revision_awareness: La versión inglesa pasó de «with guidance» a «with strategy» para reflejar mejor el matiz militar de תַחְבֻּלוֹת. La redacción española sigue ese ajuste, eligiendo «estrategia» en lugar de una equivalencia más general.
  spanish_consistency_notes:
  - Se mantiene el paralelismo breve y proverbial del hebreo.
  - Se usa «consejo» para el ámbito sapiencial, evitando «asesoramiento» por su tono más administrativo.
  - No se introduce terminología eclesiástica ajena al texto.
  - La forma verbal «se establecen» conserva el valor de firmeza sin forzar una construcción pasiva pesada.
