    text: O «mi mensajero». El hebreo מַלְאָךְ puede referirse a un mensajero humano o celestial; aquí «ángel» encaja mejor con el contexto de guía divina.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «lo destruiré» o «lo borraré», con sufijo singular usado colectivamente para los pueblos mencionados; en español se expresa naturalmente como «los».'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la nota b para reflejar con precisión el dato textual clave del hebreo: un sufijo singular con referencia colectiva. Además, se suaviza el arranque a «Pues» para mejor fluidez discursiva y se elimina «por completo» para evitar intensificación innecesaria no exigida por el original. El resto del verso se mantiene, porque representa bien el sentido del hebreo y las decisiones léxicas de la POB inglesa.'
