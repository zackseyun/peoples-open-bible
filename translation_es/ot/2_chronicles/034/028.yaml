    text: O «Mira». El hebreo introduce una declaración solemne e inmediata.
    reason: lexical_alternative
  - marker: b
    text: O «sepulturas». El hebreo conserva el plural de קִבְרֹתֶיךָ.
    reason: lexical_alternative
  - marker: c
    text: 'La frase «en paz» se aclara con la cláusula siguiente: Josías no vería la calamidad que venía sobre el lugar; no necesariamente implica que su muerte misma fuera sin violencia.'
    reason: theological_note
  revision_rationale: Se corrigió el error principal de sentido y gramática cambiando «con tus tumbas» por «a tus sepulcros», que refleja la dirección de אֶל y produce un español digno y natural. También se ajustó «todo el mal» a «toda la calamidad» para expresar mejor רָעָה en contexto de juicio, y se pulió la cláusula final a una formulación narrativa más natural en español.
