    text: Hebreo YHWH, tradicionalmente traducido ‘el SEÑOR’.
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: ‘en las islas’; ‘las costas lejanas’ refleja el uso frecuente de Isaías para tierras marítimas distantes en sentido amplio, no solo islas literales.'
    reason: lexical_alternative
