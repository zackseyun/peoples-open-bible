  source_alignment_summary: 'El borrador español refleja bien la estructura legal del hebreo: mantiene «los hijos de Israel», explicita «un hombre o una mujer», traduce כִּי de modo natural como «cuando», conserva el carácter técnico del voto nazareo y usa «Yahvé» para יהוה conforme a la política del proyecto. Sin embargo, la nota [b] no coincide con la función de la nota inglesa, que era una nota cultural sobre «Nazirite/nazareo», no una alternativa léxica para לְהַזִּיר.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. «Habla… y diles» suena natural. «Voto especial» y «para consagrarse a Yahvé» comunican bien el sentido. El término «nazareo» es aceptable y natural en español bíblico. La principal mejora necesaria es alinear las notas con la auditoría inglesa y evitar crear una nota alternativa innecesaria sobre «consagrarse».
  glossary_alignment: 'Alineado en general con la terminología del proyecto: יהוה → «Yahvé» correctamente; no hay conflictos con otras entradas del glosario. La decisión «nazareo» para נָזִיר es defendible en español, y «consagrarse» para לְהַזִּיר preserva el sentido de separación consagratoria. Se debe restaurar una nota cultural sobre «nazareo» en lugar de una nota léxica sobre «consagrarse».'
  issues:
  - severity: medium
    issue: La nota [b] del borrador no preserva la función ni el contenido de la nota del POB inglés.
    rationale: La auditoría inglesa usa [b] como nota cultural para explicar qué es un Nazirite. El borrador español cambia eso por una nota de alternativa léxica sobre «consagrarse/apartarse/dedicarse», desplazando una decisión ya resuelta y perdiendo la aclaración cultural preservada por el POB.
  - severity: low
    issue: El anclaje de la nota cultural debe colocarse sobre «nazareo», no sobre «consagrarse».
    rationale: Esto refleja mejor el referente explicado y evita sugerir incertidumbre principal en el verbo cuando el término técnico es el que requiere aclaración para el lector.
  revised_spanish_text: 'Habla a los hijos de Israel y diles: Cuando un hombre o una mujer haga un voto especial[a], el voto de nazareo[b], para consagrarse a Yahvé,'
  revised_footnotes:
  - marker: a
    text: 'O: «si un hombre o una mujer se aparta mediante un voto de nazareo».'
    reason: lexical_alternative
  - marker: b
    text: «Nazareo» se refiere a una persona especialmente apartada para Yahvé bajo un voto.
    reason: cultural_note
  revision_rationale: 'Se conserva el texto principal casi intacto porque es fiel y natural en español. Se corrigen las notas para que coincidan con la evidencia y la auditoría del POB: [a] sigue preservando la alternativa léxica del hebreo, y [b] vuelve a ser una nota cultural sobre «nazareo», anclada en el término técnico pertinente. No se requiere adjudicación adicional.'
