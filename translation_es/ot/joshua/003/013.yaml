- from: Y cuando las plantas de los pies de los sacerdotes que llevan el arca de Yahvé[a], el Señor de toda la tierra, se detengan en las aguas del Jordán, las aguas que bajan desde arriba[b] serán cortadas en el Jordán, y se alzarán en un solo montón.
  to: Y cuando las plantas de los pies de los sacerdotes que llevan el arca de Yahvé[a], el Señor de toda la tierra, se detengan en las aguas del Jordán, las aguas que bajan desde arriba[b] serán cortadas en el Jordán, y quedarán detenidas en un solo montón.
  rationale: Se corrige la nota [a] para que exprese la alternativa sintáctica real documentada en el audit trail. También se reemplaza «se alzarán» por «quedarán detenidas», que refleja mejor ויעמדו נֵד אֶחָד sin añadir el matiz de elevación. Se conservan «Yahvé», la lectura aposicional y la formulación «serán cortadas en el Jordán» por fidelidad al expediente inglés y al hebreo.
