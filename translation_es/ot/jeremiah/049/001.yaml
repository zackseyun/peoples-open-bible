translation:
  language: es
  text: 'En cuanto a los hijos de Amón, así dice Yahvé: ¿Acaso Israel no tiene hijos? ¿No tiene heredero? ¿Por qué entonces Milcom[a] se ha apoderado de Gad, y su pueblo se ha establecido en sus ciudades?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo Malcam/Milcom también puede leerse «su rey»: «¿Por qué entonces su rey se ha apoderado de Gad...?».'
    reason: alternative_reading
lexical_decisions:
- source_word: לִבְנֵי עַמּוֹן
  english_pob_choice: Concerning the sons of Ammon
  chosen_spanish: En cuanto a los hijos de Amón
  alternatives_spanish:
  - A los hijos de Amón
  - Contra los hijos de Amón
  - En cuanto a los amonitas
  lexicon: HALOT
  rationale: El prefijo ל funciona aquí como encabezamiento u oráculo dirigido al tema; «En cuanto a» conserva ese valor discursivo. «Hijos de Amón» mantiene la expresión hebrea más directamente que el etnónimo suavizado «amonitas».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio según la norma del proyecto, sin sustituirlo por un título. «Yahvé» es la forma establecida en el español de la POB.
- source_word: הֲבָנִים ... לְיִשְׂרָאֵל
  english_pob_choice: Does Israel have no sons?
  chosen_spanish: ¿Acaso Israel no tiene hijos?
  alternatives_spanish:
  - ¿Acaso Israel no tiene hijos varones?
  - ¿Israel no tiene hijos?
  lexicon: HALOT
  rationale: «Hijos» traduce בנים de manera natural en español y conserva la fuerza de herencia implícita en la pregunta retórica. «Hijos varones» explicita el matiz, pero el hebreo lo deja implícito; se evita añadir más de lo que el texto exige.
- source_word: אִם יוֹרֵשׁ אֵין לוֹ
  english_pob_choice: Does he have no heir?
  chosen_spanish: ¿Acaso no tiene heredero?
  alternatives_spanish:
  - ¿O no tiene heredero?
  - Si no tiene heredero
  lexicon: HALOT
  rationale: El interrogativo/disyuntivo hebreo se entiende en la secuencia retórica del versículo; por eso se usa otra pregunta en español. «Heredero» expresa bien יוֹרֵשׁ en el contexto de posesión territorial e herencia.
- source_word: מַדּוּעַ יָרַשׁ
  english_pob_choice: Why then has taken possession of
  chosen_spanish: ¿Por qué entonces se ha apoderado de
  alternatives_spanish:
  - ¿Por qué entonces ha heredado
  - ¿Por qué entonces ha tomado posesión de
  lexicon: HALOT
  rationale: ירש aquí se refiere a ocupar/poseer territorio. «Se ha apoderado de» comunica con claridad el acto de tomar la tierra, sin sugerir de forma engañosa una simple herencia legal o doméstica.
- source_word: מַלְכָּם
  english_pob_choice: Milcom
  chosen_spanish: Milcom
  alternatives_spanish:
  - Malcam
  - su rey
  - su rey (de ellos)
  lexicon: HALOT
  rationale: Se conserva el nombre propio tal como lo leyó la POB inglesa, porque el contexto favorece la deidad amonita y esa lectura mantiene la tensión textual documentada. No se reduce a una paráfrasis interpretativa en el texto principal.
- source_word: אֶת גָּד
  english_pob_choice: Gad
  chosen_spanish: de Gad
  alternatives_spanish:
  - Gad
  - la tierra de Gad
  - la tribu de Gad
  lexicon: HALOT
  rationale: En español, «se ha apoderado de Gad» puede sonar incompleto; «de Gad» hace explícita la relación de posesión territorial que el hebreo da por entendida. La referencia sigue siendo al territorio/posesión de Gad sin expandirla más allá del texto.
- source_word: וְעַמּוֹ בְּעָרָיו יָשָׁב
  english_pob_choice: and his people settled in its cities
  chosen_spanish: y su pueblo ha habitado en sus ciudades
  alternatives_spanish:
  - y su pueblo se ha establecido en sus ciudades
  - y su pueblo habita en sus ciudades
  lexicon: HALOT
  rationale: Se conserva el paralelismo con el inglés auditado y el tiempo perfecto como resultado presente del acto de ocupación. «Ha habitado» es suficientemente natural y mantiene el valor durativo/estable de יָשָׁב en contexto.
theological_decisions:
- issue: Lectura de מַלְכָּם
  english_pob_reading: Milcom (the Ammonite deity)
  chosen_spanish_reading: Milcom (la deidad amonita)
  alternative_spanish_readings:
  - su rey
  - Malcam
  rationale: El consonantismo permite leer un nombre propio divino o la expresión «su rey». La POB inglesa documenta esta tensión y la conserva; el texto principal sigue la lectura de Milcom por coherencia contextual, sin borrar la alternativa.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Relación entre herencia y posesión territorial en la pregunta retórica
  english_pob_reading: Why then has Milcom taken possession of Gad, and his people settled in its cities?
  chosen_spanish_reading: ¿Por qué entonces se ha apoderado Milcom de Gad, y su pueblo ha habitado en sus ciudades?
  alternative_spanish_readings:
  - ¿Por qué entonces ha heredado Milcom Gad...?
  - ¿Por qué entonces ha tomado posesión de Gad...?
  rationale: La pregunta acusa la ocupación de territorio que, según la lógica del versículo, no debería haberse producido. «Se ha apoderado» mantiene la fuerza polémica y judicial del reproche profético sin suavizarla.
  doctrine_reference: Jeremías 49:1; crítica profética a la ocupación ilegítima de la tierra
translation_notes:
  revision_awareness: 'Se revisó la forma de encabezamiento para reflejar mejor el ל de destinatario/oráculo en español, se mantuvo Yahvé según la norma del proyecto, y se conservó la tensión de מַלְכָּם documentada en el audit trail inglés. No se requiere nueva revisión textual: el pasaje presenta alta concordancia con la fuente hebrea y con la decisión inglesa auditada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto, no una sustitución por «SEÑOR».
  - «Hijos» conserva el paralelo con el hebreo y la lógica de herencia del verso.
  - «Milcom» se mantiene en el texto principal; la lectura alternativa «su rey» queda documentada en nota.
  - «Ha habitado» preserva el sentido de ocupación estable sin convertirlo en un mero presente gnómico.
  - La nota al pie se ancla en «Amón» porque la ambigüedad de lectura afecta a toda la unidad del oráculo y no solo al nombre propio.
