translation:
  language: es
  text: Verdaderamente, Yahvé, los reyes de Asiria han asolado todos los países[a] y su propia tierra[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘todas las tierras’. El hebreo puede designar tierras, territorios o países según el contexto.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘su tierra’; algunos lo entienden de manera colectiva, mientras que un pasaje paralelo suele verterse ‘sus tierras’.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָמְנָם
  english_pob_choice: Truly
  chosen_spanish: ¡Verdaderamente!
  alternatives_spanish:
  - Ciertamente
  - En verdad
  - ¡De veras!
  lexicon: HALOT
  rationale: Expresa la afirmación enfática inicial del hebreo con un español natural y digno; conserva el tono de reconocimiento sincero que introduce la oración.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la directriz del proyecto para el Tetragrámaton: transliterar el nombre divino como ''Yahvé'' en vez de sustituirlo por un título.'
- source_word: הֶחֱרִיבוּ
  english_pob_choice: have laid waste
  chosen_spanish: han asolado
  alternatives_spanish:
  - han devastado
  - han arrasado
  - han destruido
  lexicon: HALOT
  rationale: El verbo causativo expresa desolación producida por acción militar. 'Asolar' comunica ruina y despojo sin perder fuerza ni volverlo demasiado genérico.
- source_word: מַלְכֵי אַשּׁוּר
  english_pob_choice: the kings of Assyria
  chosen_spanish: los reyes de Asiria
  alternatives_spanish:
  - los reyes asirios
  - los monarcas de Asiria
  lexicon: HALOT
  rationale: Mantiene la relación constructa de manera clara y natural en español, con el nombre geográfico usual 'Asiria'.
- source_word: אֶת כָּל הָאֲרָצוֹת
  english_pob_choice: all the lands
  chosen_spanish: todos los países
  alternatives_spanish:
  - todas las tierras
  - todos los territorios
  - todas las naciones
  lexicon: HALOT
  rationale: El hebreo puede abarcar tierras, territorios o países. En este contexto bélico, 'países' comunica bien el alcance político sin reducirlo a una sola esfera geográfica; se conserva la alternativa semántica en nota.
- source_word: וְאֶת אַרְצָם
  english_pob_choice: and their own land
  chosen_spanish: y su propia tierra
  alternatives_spanish:
  - y su tierra
  - y sus tierras
  lexicon: HALOT
  rationale: Se respeta el singular con sufijo pronominal. 'Su propia tierra' refleja mejor la fuerza del posesivo y evita ambigüedad en español, manteniendo la tensión entre el singular morfológico y el posible sentido colectivo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La política terminológica del proyecto pide 'Yahvé' para el Nombre divino. Esto preserva el valor personal y pactal del Tetragrámaton sin recurrir a una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de הָאֲרָצוֹת en contexto militar
  english_pob_reading: all the lands
  chosen_spanish_reading: todos los países
  alternative_spanish_readings:
  - todas las tierras
  - todos los territorios
  - todas las naciones
  rationale: No se fuerza una equivalencia exclusiva. 'Países' conserva el sentido amplio de entidades territoriales/políticas que el hebreo permite en este contexto; la nota deja abierta la alternativa 'tierras'.
  doctrine_reference: Lexical scope in context; no doctrinal issue beyond fidelity to the Hebrew range
translation_notes:
  revision_awareness: El borrador inglés más reciente ajustó 'their land' a 'their own land' para reflejar con más claridad el sufijo pronominal. El español adopta esa misma aclaración con 'su propia tierra', manteniendo además la tensión textual del singular hebreo y la posible lectura colectiva sugerida por el paralelo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con la terminología del proyecto para el Nombre divino.
  - Se evita 'SEÑOR' como sustitución del Tetragrámaton.
  - '''Asiria'' se mantiene como el topónimo estándar y no se introduce ''asirios'' porque el hebreo dice literalmente ''reyes de Asiria''.'
  - '''Países'' se emplea en el texto principal por fluidez, pero la nota preserva la alternativa semántica ''tierras''.'
  - '''Su propia tierra'' conserva el singular del hebreo y la corrección auditada del inglés reciente.'
