translation:
  language: es
  text: Y las naciones sabrán que la casa de Israel fue al exilio[a] por su iniquidad, porque actuaron con infidelidad contra mí; por eso escondí mi rostro de ellos y los entregué en manos de sus adversarios[b], y todos cayeron a espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por su culpa»; «iniquidad» conserva mejor el peso moral y judicial del hebreo עָוֺן.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «en la mano de sus adversarios», un hebraísmo para quedar bajo su poder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ / הַגּוֹיִם
  english_pob_choice: And the nations will know
  chosen_spanish: Y las naciones sabrán
  alternatives_spanish:
  - Y los pueblos sabrán
  - Entonces las naciones sabrán
  lexicon: HALOT
  rationale: ‘Naciones’ conserva el valor de גּוֹיִם en este contexto de pueblos extranjeros. ‘Sabrán’ expresa bien el efecto resultativo-profético sin forzar un futuro perifrástico más pesado.
- source_word: בַעֲוֺנָם
  english_pob_choice: for their iniquity
  chosen_spanish: por su iniquidad
  alternatives_spanish:
  - por su culpa
  - a causa de su pecado
  lexicon: HALOT
  rationale: עָוֺן reúne culpa e iniquidad con peso moral y judicial. ‘Iniquidad’ preserva mejor ese espesor que ‘culpa’ o ‘pecado’ en este verso.
- source_word: גָּלוּ
  english_pob_choice: went into exile
  chosen_spanish: fue llevada al exilio
  alternatives_spanish:
  - entró en exilio
  - fue exiliada
  lexicon: HALOT
  rationale: El hebreo describe el estado histórico de ser llevado al exilio. En español, ‘fue llevada al exilio’ comunica ese resultado con naturalidad; en la cláusula inglesa el sujeto colectivo fue tratado como singular, y aquí se conserva el colectivo ‘la casa de Israel’ con verbo singular concordante.
- source_word: בֵית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión colectiva pactal ‘casa de Israel’, importante en Ezequiel, en lugar de reducirla a ‘Israel’.
- source_word: עַל אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - a causa de que
  - debido a que
  lexicon: HALOT
  rationale: La relación causal del hebreo se expresa de forma directa y clara con ‘porque’.
- source_word: מָעֲלוּ בִי
  english_pob_choice: they acted unfaithfully against me
  chosen_spanish: actuaron con infidelidad contra mí
  alternatives_spanish:
  - me fueron infieles
  - cometieron traición contra mí
  - obraron con deslealtad contra mí
  lexicon: HALOT
  rationale: מעל en contexto de pacto denota infidelidad/traición de alianza. ‘Actuaron con infidelidad contra mí’ conserva la fuerza relacional y pactal sin suavizarla a ‘deslealtad’ ni desviar hacia una sola opción más jurídica como ‘trespasaron’.
- source_word: וָאַסְתִּר פָּנַי מֵהֶם
  english_pob_choice: so I hid my face from them
  chosen_spanish: por eso oculté mi rostro de ellos
  alternatives_spanish:
  - y escondí mi rostro de ellos
  - por eso escondí mi rostro de ellos
  lexicon: HALOT
  rationale: Se conserva el modismo bíblico ‘ocultar/ esconder mi rostro’, que en español comunica el retiro del favor/presencia divina. ‘Oculté’ suena algo más elevado y adecuado al registro que ‘escondí’.
- source_word: וָאֶתְּנֵם בְּיַד צָרֵיהֶם
  english_pob_choice: and gave them into the hand of their adversaries
  chosen_spanish: y los entregué en mano de sus adversarios
  alternatives_spanish:
  - y los entregué en las manos de sus adversarios
  - y los puse en poder de sus adversarios
  lexicon: HALOT
  rationale: Se mantiene el idiomático ‘en mano de’ para reflejar ‘into the hand of’. ‘Adversarios’ traduce bien צָרִים sin limitarlo a ‘enemigos’ en un sentido más estrecho.
- source_word: וַיִּפְּלוּ בַחֶרֶב כֻּלָּם
  english_pob_choice: and they all fell by the sword
  chosen_spanish: y todos cayeron a espada
  alternatives_spanish:
  - y todos cayeron por la espada
  - y todos fueron muertos a espada
  lexicon: HALOT
  rationale: ‘Caer a espada’ reproduce el giro bíblico solemne y breve de muerte violenta en juicio o guerra. ‘Todos’ conserva el totalizador כֻּלָּם.
theological_decisions:
- issue: Secuencia teológica de culpa humana, ocultamiento divino y juicio
  english_pob_reading: The verse presents exile and military defeat as divine judgment for Israel's iniquity and covenant unfaithfulness, without softening either human culpability or divine agency.
  chosen_spanish_reading: El verso presenta el exilio y la derrota militar como juicio divino por la iniquidad e infidelidad pactal de Israel, sin suavizar ni la culpabilidad humana ni la acción divina.
  alternative_spanish_readings:
  - Una lectura más histórica que no explicite el juicio divino
  - Una traducción que atenúe la responsabilidad de Israel
  rationale: El hebreo vincula explícitamente el exilio con la iniquidad del pueblo, su infidelidad contra Yahvé, el ocultamiento del rostro divino y la entrega en manos hostiles. La versión española conserva esa secuencia causal y judicial sin añadir explicación externa ni resolver la tensión teológica.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en sentido, tono y decisiones léxicas principales. No se observaron revisiones aplicadas en el inglés; la traducción española sigue la lectura aprobada y solo adapta la concordancia natural de ‘la casa de Israel’ en singular colectivo.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como nombre divino por defecto en el proyecto, pero en este versículo el hebreo usa la primera persona divina sin el tetragrámaton explícito; por eso no aparece un equivalente nominal aquí.
  - Se mantiene ‘casa de Israel’ como colectivo pactal, no ‘pueblo de Israel’, para conservar la expresión bíblica.
  - Se preserva el modismo ‘en mano de’ con nota, porque el español lo entiende y refleja mejor el hebraísmo que una paráfrasis como ‘en poder de’.
  - Se opta por ‘infidelidad’ para מעל, siguiendo la carga pactal destacada por el audit trail inglés.
