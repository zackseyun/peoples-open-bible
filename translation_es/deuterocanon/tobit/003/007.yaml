- from: En aquel mismo día también sucedió a Sara[a], hija de Ragüel, en Ecbátana de Media, que fue reprochada por las esclavas de su padre,
  to: Ese mismo día también le sucedió a Sara[a], hija de Ragüel, en Ecbátana de Media, que fue reprochada por las esclavas de su padre,
  rationale: Se ajusta la sintaxis inicial para un español más natural y fiel al valor impersonal narrativo de συνέβη con dativo ('le sucedió a Sara'). Se mantiene 'también' para reflejar el valor aditivo de καὶ según la revisión inglesa. Se conserva 'fue reprochada' y 'las esclavas de su padre' por fidelidad léxica, pero se mejora la nota al pie sustituyendo 'fue burlada' por 'fue injuriada', que preserva mejor el rango semántico de ὀνειδισθῆναι.
