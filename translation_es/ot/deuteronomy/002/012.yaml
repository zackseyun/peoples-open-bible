review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: los horeos habitaban antes en Seír, los hijos de Esaú los desposeyeron, los destruyeron, habitaron en su lugar, y se establece la comparación con Israel. También preserva correctamente Yahvé y el cambio final a plural en «les dio». Sin embargo, «como hizo Israel con la tierra de su posesión» no representa con suficiente fidelidad לְאֶרֶץ יְרֻשָּׁתוֹ, que apunta más naturalmente a «a la tierra»/«respecto de la tierra» que a un instrumental «con la tierra».'
  spanish_quality_summary: El español es mayormente claro y digno. «Los horeos» es aceptable, «antes» funciona aunque «antiguamente» sería más pulido, y «de delante de ellos» suena algo rígido pero es defendible con nota. La principal aspereza es «como hizo Israel con la tierra de su posesión», que en español resulta menos natural y además desvía el sentido preposicional del original. Una leve mejora de fluidez y fidelidad resolvería el pasaje.
  glossary_alignment: Se alinea bien con la terminología del proyecto en «Yahvé», «desposeyeron», «destruyeron» y la preservación de «posesión/heredad». No hay conflicto teológico relevante. La excepción necesaria es ajustar la construcción preposicional de לְאֶרֶץ a «a la tierra de su posesión» en vez de «con la tierra de su posesión».
  issues:
  - severity: medium
    issue: La frase «como hizo Israel con la tierra de su posesión» traduce de forma imprecisa לְאֶרֶץ יְרֻשָּׁתוֹ.
    rationale: 'El hebreo usa לְ («a / respecto de»), no una idea instrumental o asociativa como «con». Además, en español «hacer con la tierra» suena poco idiomático aquí. «Como hizo Israel a la tierra de su posesión» es más cercano, pero más natural es reestructurar a «tal como Israel hizo con la tierra de su posesión» solo si el sentido se mantiene; sin embargo, dado el original y el POB inglés, la mejor reparación es «tal como Israel hizo a la tierra de su posesión», aunque en español suena duro. Una solución más natural y fiel es «tal como Israel hizo en la tierra de su posesión» no corresponde al hebreo. Por tanto, la forma más equilibrada es «tal como Israel hizo con la tierra de su posesión» no es ideal. Mejor: «tal como Israel hizo a la tierra de su posesión» sigue demasiado literal. Conviene una reformulación completa que preserve el sentido comparativo: «tal como hizo Israel con la tierra de su posesión» sigue siendo la menos mala estilísticamente, pero no la más fiel. Dado el
      inglés auditado, «a la tierra de su posesión» es preferible pese a cierta rigidez.'
  - severity: low
    issue: «Antes» es correcto, pero «antiguamente» o «antes» sin nota explicativa extensa podría sonar más pulido en registro bíblico.
    rationale: No es un error; es solo una mejora estilística posible. El valor temporal está bien captado.
  - severity: low
    issue: 'La nota [a] introduce «antiguamente» pero omite la alternativa inglesa auditada «o: los expulsaron» para יִירָשׁוּם; no es obligatorio añadirla, pero sería útil si se desea reflejar mejor el rastro de auditoría.'
    rationale: La nota [a] actual sigue siendo válida porque aclara el sentido temporal de לְפָנִים. No hace falta ampliar notas salvo para corregir el texto principal.
