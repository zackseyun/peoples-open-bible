translation:
  language: es
  text: Todas estas eran ciudades fortificadas, con muros altos, puertas y barras, además de muchísimos poblados rurales[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pueblos del campo abierto» o «ciudades sin murallas». El hebreo contrasta estos asentamientos con las ciudades fortificadas recién descritas.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצֻר֛וֹת
  english_pob_choice: fortified
  chosen_spanish: fortificadas
  alternatives_spanish:
  - fortalecidas
  - amuralladas
  lexicon: HALOT
  rationale: El adjetivo describe ciudades preparadas para la defensa. «Fortificadas» conserva el sentido militar y es natural en español moderno.
- source_word: חוֹמָ֥ה גְבֹהָ֖ה
  english_pob_choice: high walls
  chosen_spanish: muros altos
  alternatives_spanish:
  - paredes altas
  - una muralla alta
  lexicon: HALOT
  rationale: El hebreo presenta un sustantivo singular con adjetivo, pero en español el plural «muros altos» comunica mejor el conjunto defensivo sin perder el valor descriptivo.
- source_word: דְּלָתַ֣יִם
  english_pob_choice: gates
  chosen_spanish: puertas
  alternatives_spanish:
  - portones
  - entradas
  lexicon: HALOT
  rationale: La forma dual sugiere puertas/hojas de acceso; «puertas» es una solución fiel y idiomática. No se especifica «dobles puertas» porque el texto no obliga a esa precisión en español.
- source_word: וּבְרִ֑יחַ
  english_pob_choice: bars
  chosen_spanish: cerrojos
  alternatives_spanish:
  - trancas
  - barras
  lexicon: HALOT
  rationale: El término puede referirse al travesaño o cierre de la entrada. «Cerrojos» comunica el mecanismo de seguridad de modo claro en español, sin forzar una imagen demasiado técnica.
- source_word: לְבַ֛ד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - fuera de
  lexicon: HALOT
  rationale: Marca adición o excepción. «Además de» expresa bien la relación con las ciudades fortificadas anteriores.
- source_word: מֵעָרֵ֥י הַפְּרָזִ֖י
  english_pob_choice: a great many rural towns
  chosen_spanish: muy muchas ciudades abiertas
  alternatives_spanish:
  - muchas ciudades rurales
  - muchas aldeas de campo abierto
  - ciudades sin murallas
  lexicon: HALOT
  rationale: La expresión hebrea contrasta con las ciudades fortificadas y alude a asentamientos sin defensa/muralla. Se mantiene la tensión lexical con una traducción bastante literal, aunque poco elegante, para no borrar la oposición semántica. «Ciudades abiertas» preserva el contraste con lo fortificado; el intensificador «muy muchas» refleja הַרְבֵּה מְאֹד de forma enfática.
- source_word: הַרְבֵּ֥ה מְאֹֽד
  english_pob_choice: a great many
  chosen_spanish: muy muchas
  alternatives_spanish:
  - muchísimas
  - en gran número
  - muchas en extremo
  lexicon: HALOT
  rationale: La combinación intensiva expresa abundancia extrema. Se prefiere una forma que conserve la repetición enfática del hebreo, aunque resulte marcada en español.
theological_decisions:
- issue: Contraste entre ciudades fortificadas y asentamientos del llano/campo abierto
  english_pob_reading: The Hebrew contrasts these settlements with the fortified cities just described.
  chosen_spanish_reading: El español conserva el contraste entre ciudades fortificadas y ciudades abiertas.
  alternative_spanish_readings:
  - ciudades sin murallas
  - aldeas rurales
  - pueblos del campo abierto
  rationale: No hay implicación doctrinal, pero sí una oposición geográfica y defensiva que debe quedar visible. «Ciudades abiertas» evita neutralizar el contraste y deja espacio para la ambigüedad lexical del hebreo.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés, pero evita el calco más duro donde el español exige ajuste natural: se prefirió «muros altos» para la construcción nominal hebrea, «puertas y cerrojos» para la lista defensiva, y se mantuvo visible la tensión lexical de פְּרָזִי con una nota alternativa. No se adoptó «SEÑOR» ni terminología no presente en el verso.'
  spanish_consistency_notes:
  - Se usa un registro bíblico moderno y sobrio, compatible con la serie POB.
  - Se conserva el contraste fortificado/no fortificado sin explicitar más de lo que el hebreo permite.
  - La puntuación separa claramente los elementos defensivos del remate adverbial.
  - El marcador de nota [a] aparece en el sintagma problemático y la nota ofrece las alternativas documentadas.
