    reason: lexical_alternative
  revision_rationale: Se corrige 'estarán' a 'serán' para reflejar mejor el valor copulativo/futuro de יִהְיוּ en un contexto de sucesión dinástica. Se ajusta 'tus hijos' a 'tus hijos varones' para preservar el masculino específico de בָנֶיךָ y la fuerza hereditaria real que el inglés auditado mantuvo con 'sons'. Se añade la nota de orden alternativo que el POB inglés conservó, y se regulariza la nota sobre אָרֶץ con español más natural.
