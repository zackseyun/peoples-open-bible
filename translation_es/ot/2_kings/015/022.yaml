translation:
  language: es
  text: Y Menahem se acostó con sus padres[a], y Pekajías, su hijo, reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “durmió con sus padres”. El hebreo usa una fórmula idiomática estándar para la muerte de un rey y la sucesión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: lay down
  chosen_spanish: se acostó
  alternatives_spanish:
  - durmió
  - murió
  lexicon: HALOT
  rationale: El verbo hebreo, en esta fórmula real con 'con sus padres', funciona como eufemismo de muerte y sucesión. 'Se acostó' conserva la imagen verbal sin reducirla de inmediato a 'murió', y permite que el sentido idiomático se complete por el contexto.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  lexicon: HALOT
  rationale: '''Con sus padres'' reproduce la fórmula dinástica/sepulcral del hebreo y sigue el valor idiomático señalado por la POB en inglés. ''Padres'' mantiene la expresión convencional sin volverla interpretativa.'
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: En fórmulas regias, מלך se expresa naturalmente con 'reinó'. Es conciso, fiel y idiomático en español bíblico contemporáneo.
- source_word: פְּקַחְיָה
  english_pob_choice: Pekahiah
  chosen_spanish: Pekajías
  alternatives_spanish:
  - Pekahías
  lexicon: convención transliterativa del hebreo al español
  rationale: Se mantiene el nombre propio transliterado en forma española estándar. 'Pekajías' refleja mejor la consonante gutural hebrea y evita una grafía excesivamente anglicada.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su hijo varón
  lexicon: HALOT
  rationale: La filiación es explícita en la sucesión real y debe conservarse sin expansión interpretativa.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: '''En su lugar'' expresa bien la sustitución/sucesión real en español natural y mantiene el valor de reemplazo del hebreo.'
