translation:
  language: es
  text: Manasés tenía doce años cuando comenzó a reinar, y reinó cincuenta y cinco años en Jerusalén. El nombre de su madre era Hepsiba[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hepsiba significa aproximadamente: «Mi delicia está en ella».'
    reason: cultural_note
lexical_decisions:
- source_word: בֶּן שְׁתֵּים עֶשְׂרֵה שָׁנָה
  english_pob_choice: was twelve years old
  chosen_spanish: tenía doce años
  alternatives_spanish:
  - era de doce años
  - era hijo de doce años
  lexicon: HALOT
  rationale: El hebreo expresa un modismo de edad; en español natural se comunica mejor con 'tenía doce años'. 'Era de doce años' suena más literal pero menos idiomático. 'Era hijo de doce años' conserva la literalidad extrema, pero no es natural en español.
- source_word: בְמָלְכוֹ
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando llegó a reinar
  - al empezar a reinar
  lexicon: HALOT
  rationale: La construcción marca el momento inicial del reinado. 'Comenzó a reinar' reproduce el valor temporal y el registro regnal de forma clara en español.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasé
  lexicon: convención bíblica española
  rationale: Se usa la forma bíblica española establecida para el nombre propio.
- source_word: וַחֲמִשִּׁים וְחָמֵשׁ שָׁנָה
  english_pob_choice: fifty-five years
  chosen_spanish: cincuenta y cinco años
  alternatives_spanish:
  - cincuenta y cinco años
  - cincuenta y cinco años
  lexicon: HALOT
  rationale: En español moderno la cifra compuesta es la forma normal y fiel. El hebreo coordinado queda reflejado en sentido, sin forzar una estructura arcaica.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: '''Reinó'' es el equivalente directo y preciso del verbo regnal en este contexto.'
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en Jerusalén
  lexicon: topónimo estándar
  rationale: Traducción locativa directa con la forma española estándar del topónimo.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: El nombre de su madre era
  alternatives_spanish:
  - Y el nombre de su madre era
  - Su madre se llamaba
  lexicon: HALOT
  rationale: Mantiene la fórmula hebrea de notificación genealógica en español natural sin perder el énfasis en el nombre.
- source_word: חֶפְצִי בָהּ
  english_pob_choice: Hephzibah
  chosen_spanish: Hepsiba
  alternatives_spanish:
  - Jepsiba
  - Jefziba
  lexicon: convención bíblica española
  rationale: Se adopta la forma española bíblica más difundida para el nombre propio, preservando la transliteración de la tradición bíblica en español.
theological_decisions:
- issue: Tratamiento del nombre divino implícito en el nombre 'Hephzibah'
  english_pob_reading: Hephzibah means approximately, “My delight is in her.”
  chosen_spanish_reading: Se conserva el nombre propio sin glosa en el texto principal; el sentido del nombre queda implícito.
  alternative_spanish_readings:
  - '''Mi delicia está en ella'''
  - '''Mi deleite está en ella'''
  rationale: 'En este versículo la POB inglesa conserva el nombre como nombre propio y explica su sentido en una nota. En español se mantiene la misma estrategia: el texto principal no traduce el antropónimo, para no convertir una designación nominal en una paráfrasis del versículo.'
  doctrine_reference: Nombres propios bíblicos y nota explicativa; no implica una afirmación doctrinal adicional.
translation_notes:
  revision_awareness: El texto español sigue de cerca la última versión inglesa auditada, sin cambios sustanciales reportados; se mantiene la fórmula regnal, la cifra de años y el nombre propio con nota explicativa como en el POB inglés.
  spanish_consistency_notes:
  - Se usa 'Manasés' como forma bíblica española establecida, coherente con el tratamiento de nombres propios en el proyecto.
  - Se evita 'SEÑOR' o cualquier máscara del nombre divino porque el versículo no contiene el Tetragrámaton; la única alusión relevante aparece dentro del nombre Hephzibah y se trata como antropónimo.
  - La puntuación y el orden siguen el patrón narrativo español natural, manteniendo la estructura de dos cláusulas y la nota explicativa del nombre.
