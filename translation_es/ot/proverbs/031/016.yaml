translation:
  language: es
  text: Ella considera un campo y lo adquiere[a]; del fruto de sus manos[b] planta una viña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «planea un campo y lo toma»; los verbos hebreos pueden traducirse más literalmente, pero el texto principal busca un español natural sin perder el sentido de una acción económica deliberada.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «del fruto de sus manos», un modismo para el producto o la ganancia de su labor.
    reason: cultural_note
lexical_decisions:
- source_word: זָמְמָה
  english_pob_choice: considers
  chosen_spanish: considera
  alternatives_spanish:
  - planea
  - se propone
  - evalúa
  lexicon: HALOT
  rationale: El verbo expresa deliberación intencional. «Considera» conserva la idea de reflexión y propósito sin forzar todavía una decisión consumada.
- source_word: שָׂדֶה
  english_pob_choice: field
  chosen_spanish: campo
  alternatives_spanish:
  - terreno
  - parcela
  - tierra
  lexicon: HALOT
  rationale: «Campo» es el equivalente natural y directo en español para שָׂדֶה en este contexto de posesión y trabajo agrícola.
- source_word: וַתִּקָּחֵהוּ
  english_pob_choice: acquires it
  chosen_spanish: lo adquiere
  alternatives_spanish:
  - lo toma
  - lo compra
  lexicon: HALOT
  rationale: לקח puede abarcar tomar o adquirir. En un contexto económico, «lo adquiere» comunica apropiación/obtención sin introducir explícitamente «compra», que el hebreo no dice.
- source_word: מִפְּרִי
  english_pob_choice: from the fruit
  chosen_spanish: con el fruto
  alternatives_spanish:
  - del fruto
  - de su fruto
  - de la cosecha
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y apunta al resultado o rendimiento del trabajo. «Con el fruto» conserva la relación con el producto de su labor y suena natural en español.
- source_word: כַפֶּיהָ
  english_pob_choice: of her hands
  chosen_spanish: de sus manos
  alternatives_spanish:
  - de su trabajo
  - de sus labores
  lexicon: HALOT
  rationale: La imagen literal de «manos» se mantiene porque el hebreo enfatiza la acción manual y el esfuerzo personal. En español, «sus manos» es claro y fiel.
- source_word: נטע
  english_pob_choice: she plants
  chosen_spanish: planta
  alternatives_spanish:
  - establece
  - siembra
  lexicon: HALOT
  rationale: El sentido básico es plantar. Se conserva el sujeto femenino implícito por el contexto del pasaje, sin necesidad de añadirlo de nuevo en cada verbo.
- source_word: כָּרֶם
  english_pob_choice: a vineyard
  chosen_spanish: una viña
  alternatives_spanish:
  - un viñedo
  - una vid
  lexicon: HALOT
  rationale: «Viña» es el equivalente español más natural de כָּרֶם y mantiene la imagen agrícola tradicional del texto.
theological_decisions:
- issue: La frase idiomática «del fruto de sus manos» puede sonar extraña en español si se vuelve totalmente explicativa.
  english_pob_reading: The Hebrew says 'from the fruit of her hands,' an idiom for the yield or proceeds of her labor.
  chosen_spanish_reading: Con el fruto de sus manos, es decir, con el rendimiento de su trabajo, planta una viña.
  alternative_spanish_readings:
  - de su trabajo
  - de sus labores
  rationale: Mantengo la imagen corporal del hebreo en el texto principal y explicito el sentido idiomático solo en la nota, sin borrar la metáfora de productividad y esfuerzo.
  doctrine_reference: Sabiduría práctica y diligencia en Proverbios; no aplica una doctrina controvertida, sino una imagen idiomática laboral.
translation_notes:
  revision_awareness: 'El contexto inglés POB presenta alta concordancia y no requiere cambios sustanciales. He conservado la lectura óptima-equivalente: deliberación + adquisición + productividad laboral + plantación de viña, manteniendo la metáfora idiomática y evitando introducir «compró» donde el hebreo solo dice «tomar/adquirir».'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se mantuvo «viña» para כָּרֶם por naturalidad y fidelidad al campo semántico agrícola.
  - Se preservó la secuencia de acciones en femenino singular, coherente con el sujeto implícito del poema.
