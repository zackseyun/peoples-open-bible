translation:
  language: es
  text: 'Los hijos de Manasés: Asriel[a], a quien dio a luz su concubina aramea[b]; ella dio a luz a Maquir, padre de Galaad[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los descendientes de Manasés». En genealogías, «hijos» puede funcionar con un alcance más amplio que la descendencia inmediata.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la mujer aramea»; tradicionalmente, «la siria».'
    reason: lexical_alternative
  - marker: c
    text: «Padre de Galaad» puede también sugerir «antepasado» o «fundador» en uso genealógico.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי מְנַשֶּׁה
  english_pob_choice: The sons of Manasseh
  chosen_spanish: Los hijos de Manasés
  alternatives_spanish:
  - Los descendientes de Manasés
  lexicon: HALOT
  rationale: בְּנֵי es el constructo plural normal de "hijos de". En genealogías puede extenderse a "descendientes", pero "hijos" conserva mejor la forma genealógica del hebreo y coincide con la decisión auditada en inglés.
- source_word: אַשְׂרִיאֵל
  english_pob_choice: Asriel
  chosen_spanish: Asriel
  lexicon: convención onomástica
  rationale: Nombre propio transliterado de manera estándar, sin traducir.
- source_word: אֲשֶׁר יָלָדָה
  english_pob_choice: whom ... bore
  chosen_spanish: a quien ... dio a luz
  alternatives_spanish:
  - quien fue dado a luz por
  - a quien ... parió
  lexicon: HALOT
  rationale: La cláusula relativa con ילד en qal perfecto femenino singular pide un verbo en español que conserve el sujeto femenino implícito. "Dar a luz" es natural, digno y fiel al valor de nacimiento indicado por el hebreo.
- source_word: פִּילַגְשׁוֹ
  english_pob_choice: his concubine
  chosen_spanish: su concubina
  alternatives_spanish:
  - su segunda esposa
  lexicon: HALOT
  rationale: פִּילֶגֶשׁ significa concubina; "concubina" es el equivalente más directo y preciso. Se evita suavizarlo como "segunda esposa" porque eso diluye la fuerza léxica del término.
- source_word: הָאֲרַמִּיָּה
  english_pob_choice: Aramean
  chosen_spanish: aramea
  alternatives_spanish:
  - siria
  lexicon: HALOT
  rationale: '"Aramea" expresa con más precisión histórica y étnica el adjetivo hebreo. Se evita "siria" por ser más tradicional en algunas versiones, pero potencialmente anacrónico.'
- source_word: יָלְדָה אֶת מָכִיר
  english_pob_choice: she bore Machir
  chosen_spanish: ella dio a luz a Machir
  alternatives_spanish:
  - y dio a luz a Machir
  lexicon: HALOT
  rationale: Se mantiene la repetición del verbo de nacimiento para reflejar el hebreo y la continuidad del sujeto femenino. La conjunción puede omitirse sin perder sentido, pero se conserva la segunda oración breve para claridad castellana.
- source_word: אֲבִי גִלְעָד
  english_pob_choice: the father of Gilead
  chosen_spanish: padre de Galaad
  alternatives_spanish:
  - antepasado de Galaad
  - fundador de Galaad
  lexicon: HALOT
  rationale: '"Padre de Galaad" es la lectura más literal y sigue la decisión auditada en inglés. En castellano, "Galaad" es la forma tradicional del topónimo/persona en contexto bíblico, y aquí conserva bien el paralelo genealógico.'
theological_decisions:
- issue: Valor genealógico de "padre"
  english_pob_reading: '''Father of Gilead'' may also carry the sense ''ancestor'' or ''founder'' in genealogical usage.'
  chosen_spanish_reading: padre de Galaad, con posible valor genealógico amplio
  alternative_spanish_readings:
  - antepasado de Galaad
  - fundador de Galaad
  rationale: Se conserva en el texto principal la literalidad de "padre" porque el hebreo אָב admite ese uso genealógico. La ambigüedad no se borra; queda disponible por contexto y se documenta como alternativa.
  doctrine_reference: uso genealógico de אָב en listas genealógicas bíblicas
translation_notes:
  revision_awareness: 'Coincide con el pasaje auditado en inglés: sin revisiones aplicadas y con alto acuerdo en la verificación cruzada. Se mantuvo la estructura genealógica, la referencia étnica como "aramea" y la ambigüedad de "padre" sin neutralizarla.'
  spanish_consistency_notes:
  - Se usa "Galaad" para el topónimo bíblico, siguiendo el uso castellano habitual.
  - Se transliteró "Asriel" y se mantuvo el nombre "Manasés" con tilde.
  - Se prefirió "dio a luz" para reflejar el hebreo de nacimiento sin introducir paráfrasis.
  - No se introdujo "SEÑOR" ni otras sustituciones teológicas no presentes en el texto.
  - Se mantuvo "concubina" por fuerza léxica y transparencia semántica.
