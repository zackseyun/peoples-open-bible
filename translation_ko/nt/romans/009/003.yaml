id: ROM.9.3
reference: Romans 9:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ηὐχόμην γὰρ ⸂ἀνάθεμα εἶναι αὐτὸς ἐγὼ⸃ ἀπὸ τοῦ Χριστοῦ ὑπὲρ τῶν ἀδελφῶν μου τῶν συγγενῶν μου κατὰ σάρκα,
base_translation:
  language: en
  yaml_path: translation/nt/romans/009/003.yaml
  text: For I could wish that I myself were accursed and cut off from the Messiah for the sake of my brothers[a], my kinsmen according to the flesh[c][b],
  footnotes:
  - marker: a
    text: Or 'accursed from Christ' or 'under a curse, separated from Christ.' The Greek expression combines the idea of being under a curse with separation from the Messiah.
    reason: lexical_alternative
  - marker: b
    text: Greek 'my brothers'; in context Paul refers to his fellow Israelites, his ethnic kindred.
    reason: cultural_note
  - marker: c
    text: '''According to the flesh'' here means by physical descent or ethnic lineage, not ''sinful nature.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 나의 형제들, 곧 육체를 따른 내 동족을 위해서라면, 나 자신이 메시아에게서 끊어져 저주를 받는 것까지도 원할 정도였습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνάθεμα
  english_pob_choice: accursed
  chosen_korean: 저주를 받는 것
  alternatives_korean:
  - 저주받은 자
  - 아나테마
  lexicon: BDAG
  rationale: 정책상 ἀναθέμα는 「저주를 받다」로 옮겨 무게를 보존한다. 「끊어진」을 결합하여 분리의 뉘앙스도 살린다.
- source_word: ἀπὸ τοῦ Χριστοῦ
  english_pob_choice: cut off from the Messiah
  chosen_korean: 메시아에게서 끊어져
  alternatives_korean:
  - 메시아로부터 분리되어
  lexicon: BDAG
  rationale: ἀπό의 분리 의미를 자연스러운 한국어 동사로 살린다.
- source_word: κατὰ σάρκα
  english_pob_choice: according to the flesh
  chosen_korean: 육체를 따른
  alternatives_korean:
  - 혈통상의
  lexicon: BDAG
  rationale: σάρξ는 정책상 「육체」를 기본으로 한다. 여기서는 혈통적 의미이지만 본문 어휘를 유지한다.
- source_word: συγγενῶν
  english_pob_choice: kinsmen
  chosen_korean: 동족
  alternatives_korean:
  - 친족
  lexicon: BDAG
  rationale: 이스라엘 민족 정체성을 가리키는 문맥에서 「동족」이 자연스럽다.
