translation:
  language: es
  text: Así los pastoreó con integridad de corazón[a], y los guió con la destreza[b] de sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según la integridad de su corazón».
    reason: lexical_alternative
  - marker: b
    text: O «con el entendimiento de sus manos», es decir, con discernimiento hábil en su liderazgo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְעֵם
  english_pob_choice: he shepherded them
  chosen_spanish: pastoreó
  alternatives_spanish:
  - los pastoreó
  - los apacentó
  - los guió como pastor
  lexicon: HALOT
  rationale: El verbo רעה conserva la imagen pastoral activa del rey-pastor. En español, «pastoreó» transmite esa metáfora con naturalidad y sin diluirla en un verbo más genérico.
- source_word: כְּתֹם לְבָבוֹ
  english_pob_choice: with integrity of heart
  chosen_spanish: con integridad de corazón
  alternatives_spanish:
  - según la integridad de su corazón
  - con blamelessness of heart
  - con rectitud de corazón
  lexicon: HALOT
  rationale: תֹם expresa integridad, completitud o blamelessness. «Integridad» es claro en español y mantiene el sentido ético. «Corazón» conserva el valor hebreo del centro interior de la persona.
- source_word: וּבִתְבוּנוֹת
  english_pob_choice: with the skill
  chosen_spanish: con la destreza
  alternatives_spanish:
  - con entendimiento
  - con discernimiento
  - con sabiduría
  lexicon: HALOT
  rationale: En esta construcción, תְּבוּנוֹת no apunta solo a comprensión abstracta, sino a capacidad práctica y eficaz de guiar. «Destreza» comunica bien esa inteligencia aplicada.
- source_word: כַּפָּיו
  english_pob_choice: of his hands
  chosen_spanish: de sus manos
  alternatives_spanish:
  - por sus manos
  - con sus manos
  lexicon: HALOT
  rationale: כַּפָּיו significa literalmente «sus palmas/manos». «De sus manos» preserva la metáfora corporal y permite una frase española fluida en paralelo con el hemistiquio anterior.
- source_word: יַנְחֵם
  english_pob_choice: guided them
  chosen_spanish: los guió
  alternatives_spanish:
  - los llevó
  - los condujo
  lexicon: HALOT
  rationale: El hiphil de נחה significa «guiar/dirigir». «Los guió» mantiene la idea de dirección sabia, coherente con la imagen pastoral y con la destreza mencionada.
theological_decisions:
- issue: Imagen del rey como pastor
  english_pob_reading: Retain explicit shepherd language in the main text.
  chosen_spanish_reading: 'Mantener el verbo pastoral explícito: «pastoreó».'
  alternative_spanish_readings:
  - los cuidó
  - los condujo
  - los atendió
  rationale: El cierre del salmo presenta a David como rey-pastor. Conservar la imagen evita neutralizar su peso teológico y literario.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto coincide con el pasaje fuente y con la lectura auditada en inglés; no se requieren revisiones adicionales. Se conservó la imagen pastoral y la correspondencia entre la destreza de las manos y la guía sabia.
  spanish_consistency_notes:
  - Se eligió «pastoreó» para reflejar el verbo hebreo רעה sin perder la imagen del pastor-rey.
  - Se mantuvo «corazón» como equivalente del hebreo לֵבָב por su valor antropológico bíblico.
  - «Destreza» traduce el matiz práctico de תְבוּנוֹת en este contexto, evitando una abstracción innecesaria.
  - La nota a pie conserva la alternativa «según» para reflejar la posibilidad de lectura instrumental/adverbial del prefijo כ.
