id: ISA.9.19
reference: Isaiah 9:19
source:
  edition: WLC
  text: וַ/יִּגְזֹ֤ר עַל יָמִין֙ וְ/רָעֵ֔ב וַ/יֹּ֥אכַל עַל שְׂמֹ֖אול וְ/לֹ֣א שָׂבֵ֑עוּ אִ֥ישׁ בְּשַׂר זְרֹע֖/וֹ יֹאכֵֽלוּ־־־׃
translation:
  text: He cuts on the right[a], but is hungry; he eats on the left, but is not satisfied[b]. Each one eats the flesh of his own arm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He snatches on the right ... he devours on the left.' The Hebrew imagery may suggest violent grabbing for food rather than ordinary eating.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'Each one eats the flesh of his arm.' This likely depicts extreme internal strife or self-destruction in cannibalistic imagery.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּגְזֹר
  chosen: He cuts
  alternatives:
  - He snatches
  - He devours
  lexicon: HALOT
  rationale: The verb גזר literally means 'cut' or 'cut off.' In this violent, famine-like context it likely conveys grabbing or carving out food, but 'cuts' preserves the concrete imagery of the Hebrew while remaining intelligible in English.
- source_word: עַל יָמִין
  chosen: on the right
  alternatives:
  - to the right
  - from the right side
  lexicon: HALOT
  rationale: The phrase is spatial and idiomatic. 'On the right' is a natural rendering that preserves the directional parallel with 'on the left.'
- source_word: וְרָעֵב
  chosen: but is hungry
  alternatives:
  - yet is hungry
  - and remains hungry
  lexicon: HALOT
  rationale: 'The qatal form following the previous action expresses resulting condition. ''But is hungry'' captures the adversative sense in context: despite taking, hunger remains.'
- source_word: וַיֹּאכַל
  chosen: he eats
  alternatives:
  - he devours
  - he consumes
  lexicon: HALOT
  rationale: אכל is the ordinary verb 'eat.' 'Eats' is preferred over more interpretive options, letting the context supply the desperation.
- source_word: עַל שְׂמֹאול
  chosen: on the left
  alternatives:
  - to the left
  - from the left side
  lexicon: HALOT
  rationale: Rendered in parallel with 'on the right' to preserve the Hebrew structure and rhetorical balance.
- source_word: וְלֹא שָׂבֵעוּ
  chosen: but they are not satisfied
  alternatives:
  - but they are not filled
  - but they do not have enough
  lexicon: HALOT
  rationale: The shift to plural in the Hebrew is retained in English. שׂבע commonly means being sated or satisfied with food; 'are not satisfied' is idiomatic and preserves the image of unrelieved appetite.
- source_word: אִישׁ
  chosen: Each one
  alternatives:
  - A man
  - Each man
  lexicon: HALOT
  rationale: Although grammatically masculine singular, the sense here is distributive. 'Each one' preserves the individualizing force without obscuring the representative sense.
- source_word: בְּשַׂר
  chosen: the flesh
  alternatives:
  - the meat
  lexicon: HALOT
  rationale: '''Flesh'' is the standard rendering and preserves the grim, bodily imagery. ''Meat'' would weaken the horror and be less literal.'
- source_word: זְרֹעוֹ
  chosen: his own arm
  alternatives:
  - his arm
  - his own strength
  lexicon: HALOT
  rationale: זְרוֹעַ normally means 'arm.' While 'arm' can metaphorically denote strength, the collocation 'flesh of his arm' strongly favors the literal bodily sense. 'His own' makes explicit the reflexive force implied by the context.
- source_word: יֹאכֵלוּ
  chosen: eats
  alternatives:
  - will eat
  lexicon: HALOT
  rationale: The Hebrew has a plural verb after singular אִישׁ, a common distributive construction. English smooths this to singular agreement ('Each one eats') while preserving the distributive meaning.
