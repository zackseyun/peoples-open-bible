translation:
  language: es
  text: 'Entonces los siervos del rey, que estaban en la puerta del rey, dijeron a Mardoqueo: «¿Por qué estás transgrediendo el mandato del rey?»'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: עַבְדֵי הַמֶּלֶךְ
  english_pob_choice: the king’s servants
  chosen_spanish: los esclavos del rey
  alternatives_spanish:
  - los siervos del rey
  - los servidores del rey
  - los funcionarios del rey
  lexicon: HALOT
  rationale: POB preserva el valor léxico fuerte de עֶבֶד con 'servants' por el contexto; en español, 'esclavos' mantiene mejor esa fuerza que 'siervos' o 'servidores'. Aunque el contexto los presenta como personal cortesano, el hebreo usa el término de servidumbre, no un término administrativo más débil.
- source_word: בְּשַׁעַר הַמֶּלֶךְ
  english_pob_choice: who were at the king’s gate
  chosen_spanish: que estaban en la puerta del rey
  alternatives_spanish:
  - que estaban en la puerta real
  - que estaban en la puerta del palacio del rey
  - que estaban en la puerta del rey
  lexicon: HALOT
  rationale: La expresión identifica ubicación en el entorno cortesano. 'En la puerta del rey' es natural en español y conserva el trasfondo palaciego mejor que una paráfrasis con 'palacio'. 'Del rey' mantiene la relación posesiva del hebreo.
- source_word: לְמָרְדֳּכָי
  english_pob_choice: to Mordecai
  chosen_spanish: a Mardoqueo
  alternatives_spanish:
  - a Mordecai
  - para Mardoqueo
  lexicon: HALOT
  rationale: Se adapta el nombre a la forma española habitual 'Mardoqueo' y se conserva el objeto indirecto simple del hebreo.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿A qué viene
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español, equivalente al valor causal de מַדּוּעַ.
- source_word: עוֹבֵר
  english_pob_choice: are you transgressing
  chosen_spanish: estás transgrediendo
  alternatives_spanish:
  - estás quebrantando
  - estás violando
  - estás pasando por encima de
  lexicon: HALOT
  rationale: El inglés POB revisado opta por 'transgressing' para reflejar el matiz de 'cruzar/ir más allá' de עבר en relación con el mandato. En español, 'transgrediendo' conserva ese registro formal y esa fuerza normativa sin reducirse a un simple 'desobedeciendo'.
- source_word: אֵת מִצְוַת הַמֶּלֶךְ
  english_pob_choice: the king’s command
  chosen_spanish: el mandamiento del rey
  alternatives_spanish:
  - la orden del rey
  - el mandato del rey
  - la disposición del rey
  lexicon: HALOT
  rationale: מִצְוָה puede ser 'mandamiento' o 'mandato/orden'. Aquí el inglés POB eligió 'command' para no convertirlo en un término excesivamente religioso. En español, 'mandamiento' conserva la formalidad y la correspondencia léxica, aunque 'orden' sigue siendo una alternativa contextual válida.
translation_notes:
  revision_awareness: La redacción inglesa auditada pasó de 'disobeying' a 'transgressing' para acercarse más a עוֹבֵר ('cruzar/violar'). La versión española sigue esa revisión con 'transgrediendo', manteniendo el registro formal y la tensión normativa del hebreo.
  spanish_consistency_notes:
  - Se conserva la secuencia narrativa con 'Entonces'.
  - 'Se mantiene una forma española estable para el nombre Mordecai/Mardoqueo: ''Mardoqueo''.'
  - '''Mandamiento'' se usa aquí por fidelidad léxica; en contextos jurídicos similares podría preferirse ''orden'' si el registro del pasaje lo exigiera más claramente.'
  - El vocativo indirecto y la puntuación dialogal siguen el uso editorial del español bíblico moderno.
