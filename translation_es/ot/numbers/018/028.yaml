translation:
  language: es
  text: Así también ustedes presentarán la contribución de Yahvé de todos sus diezmos que reciban de los hijos de Israel[a], y de esos diezmos darán la contribución de Yahvé a Aarón el sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas' para 'los hijos de Israel'. La expresión hebrea dice literalmente 'hijos de Israel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So
  chosen_spanish: Así también
  alternatives_spanish:
  - De este modo
  - Por tanto
  lexicon: HALOT
  rationale: Expresa la relación inferencial y de correspondencia con el mandato anterior sin sonar forzado en español.
- source_word: תָּרִימוּ
  english_pob_choice: shall present
  chosen_spanish: presentarán
  alternatives_spanish:
  - levantarán
  - ofrecerán
  lexicon: HALOT
  rationale: En este contexto cultual, la idea es apartar/presentar una porción dedicada; 'presentarán' comunica la acción ritual con naturalidad y sin reducirla a un mero 'levantar' literal.
- source_word: גַם אַתֶּם
  english_pob_choice: you also
  chosen_spanish: ustedes también
  alternatives_spanish:
  - incluso ustedes
  - ustedes asimismo
  lexicon: HALOT
  rationale: Mantiene el énfasis de que los levitas, igual que Israel, también deben apartar una porción.
- source_word: תְּרוּמַת יְהוָה
  english_pob_choice: the LORD’s contribution
  chosen_spanish: la contribución de Yahvé
  alternatives_spanish:
  - la ofrenda de Yahvé
  - la porción apartada para Yahvé
  lexicon: HALOT
  rationale: '''Contribución'' conserva el valor de תְּרוּמָה como porción apartada/dedicada, y ''Yahvé'' sigue el criterio del proyecto para el nombre divino.'
- source_word: מִכֹּל מַעְשְׂרֹתֵיכֶם
  english_pob_choice: from all your tithes
  chosen_spanish: de todos sus diezmos
  alternatives_spanish:
  - de todos sus diezmos
  - de todas sus décimas partes
  lexicon: HALOT
  rationale: '''Diezmos'' es el equivalente natural de מַעְשְׂרוֹת y preserva el sentido administrativo/cultual del texto.'
- source_word: אֲשֶׁר תִּקְחוּ מֵאֵת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: which you receive from the sons of Israel
  chosen_spanish: que reciban de los hijos de Israel
  alternatives_spanish:
  - que tomen de los hijos de Israel
  - que reciban de los israelitas
  lexicon: HALOT
  rationale: '''Reciban'' refleja bien el sentido de recepción legítima de los levitas en este contexto; ''hijos de Israel'' preserva la expresión formal del hebreo y su correspondencia con el audit trail en inglés.'
- source_word: וּנְתַתֶּם מִמֶּנּוּ
  english_pob_choice: and from it you shall give
  chosen_spanish: y de ello darán
  alternatives_spanish:
  - y de eso darán
  - y de él darán
  lexicon: HALOT
  rationale: 'Conserva la secuencia partitiva: de lo recibido se separa una porción para entregarla.'
- source_word: לְאַהֲרֹן הַכֹּהֵן
  english_pob_choice: to Aaron the priest
  chosen_spanish: a Aarón el sacerdote
  alternatives_spanish:
  - para Aarón el sacerdote
  lexicon: HALOT
  rationale: El lamed introduce al destinatario; 'a' es la forma más natural en español y conserva el título sacerdotal.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton. 'Yahvé' es la forma establecida en el español del POB y mantiene visible el nombre del pacto, en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh (Spanish default: Yahvé)'
- issue: Gender-accurate rendering of בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: El hebreo usa una fórmula masculina plural explícita; 'hijos de Israel' mantiene la forma representativa del original y evita neutralizarla sin base textual.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El audit trail inglés no registra revisiones aplicadas; el texto español sigue la lectura estable del WLC y la decisión léxica ya verificada en el contexto inglés, sin cambios textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de manera uniforme para el nombre divino.
  - '''Contribución'' se usa para תְּרוּמָה en ambos lugares del versículo.'
  - '''Hijos de Israel'' conserva la formulación bíblica formal y la concordancia masculina del hebreo.'
  - La secuencia partitiva 'de ello' refleja correctamente 'mimenu' sin volverla ambigua.
