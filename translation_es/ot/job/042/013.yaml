  - Se evita ‘SEÑOR’ porque el texto no contiene el Tetragrámaton ni una cita de κύριος.
  - Se preserva la referencia de género del hebreo en la segunda cola (‘hijas’) y se refleja el sentido global de familia completa en la primera (‘hijos’).
