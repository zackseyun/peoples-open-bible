translation:
  language: es
  text: Porque el hombre y su porción de parte de ti están en la balanza[a]; no añadirá para sobrepasar tu juicio[b], oh Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque el hombre y su porción vienen de ti y están en la balanza».'
    reason: alternative_reading
  - marker: b
    text: 'O: «no añadirá para exceder tu juicio, oh Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἄνθρωπος
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el ser humano
  - la humanidad
  lexicon: BDAG
  rationale: El griego singular presenta al ser humano de manera representativa. Mantengo el singular masculino, como en la decisión inglesa, para conservar esa fuerza antropológica sin neutralizarla.
- source_word: μερὶς
  english_pob_choice: portion
  chosen_spanish: porción
  alternatives_spanish:
  - parte
  - lote
  lexicon: LSJ
  rationale: «Porción» expresa de modo natural la medida o asignación correspondiente de una persona, y funciona bien en el contexto de evaluación y reparto medido.
- source_word: παρὰ σοῦ
  english_pob_choice: from you
  chosen_spanish: de parte de ti
  alternatives_spanish:
  - de ti
  - procedente de ti
  lexicon: BDAG
  rationale: Con genitivo, παρά significa «de parte de / desde». Opto por una forma que conserve esa procedencia divina. «De parte de ti» evita perder el matiz relacional y se ajusta al contenido de que la porción proviene de Dios.
- source_word: ἐν σταθμῷ
  english_pob_choice: in the balance
  chosen_spanish: en la balanza
  alternatives_spanish:
  - en el balance
  - sobre la balanza
  - en las balanzas
  lexicon: LSJ
  rationale: La imagen es la de pesaje. «Balanza» comunica con claridad el instrumento de medida en español y mantiene el valor concreto de la metáfora.
- source_word: οὐ προσθήσει
  english_pob_choice: he will not add
  chosen_spanish: no añadirá
  alternatives_spanish:
  - no añadirá nada
  - no sumará
  lexicon: BDAG
  rationale: El verbo básico es «añadir». En español, el sentido queda completo sin introducir «nada», que no está explícito en el griego.
- source_word: τοῦ πλεονάσαι
  english_pob_choice: so as to exceed
  chosen_spanish: para sobrepasar
  alternatives_spanish:
  - para exceder
  - para aumentar más allá de
  lexicon: BDAG
  rationale: 'El infinitivo expresa la finalidad o resultado de añadir: llegar más allá del límite debido. «Sobrepasar» recoge bien el matiz de exceder una medida.'
- source_word: κρίμα
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - decisión
  - juicio divino
  lexicon: BDAG
  rationale: «Juicio» es la traducción más directa y natural para el valor judicial/evaluativo de κρίμα. Mantiene el tono forense del pasaje.
- source_word: ὁ θεός
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: El nominativo funciona como vocativo en la oración; en español se expresa de modo natural con «oh Dios».
theological_decisions:
- issue: Matiz relacional de la procedencia de la porción (παρὰ σοῦ)
  english_pob_reading: from you
  chosen_spanish_reading: de parte de ti
  alternative_spanish_readings:
  - de ti
  - procedente de ti
  rationale: La gramática del genitivo con παρά favorece una idea de procedencia, no de localización. Traduzco de modo que el texto afirme que la porción del hombre viene de Dios, en continuidad con el contexto inmediato.
  doctrine_reference: DOCTRINE.md §2 (fidelidad semántica al original)
translation_notes:
  revision_awareness: Tomé en cuenta la revisión que corrigió παρὰ σοῦ como «from you» y la observación posterior sobre la naturalidad de la imagen de la balanza. Por eso la línea principal refleja procedencia («de parte de ti») y conserva la metáfora del pesaje sin convertirla en una paráfrasis.
  spanish_consistency_notes:
  - Mantuve «Dios» y no «SEÑOR» porque el griego finaliza con ὁ θεός, con valor vocativo.
  - Conservé el singular «el hombre» para reflejar el sujeto griego representativo.
  - Elegí «porción» para mantener el lenguaje de asignación medida, coherente con la imagen de la balanza.
  - Evité introducir «nada» en el verbo de añadir, porque el griego no lo explicita.
