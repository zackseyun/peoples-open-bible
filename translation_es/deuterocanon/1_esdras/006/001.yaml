translation:
  language: es
  text: Ahora en el segundo año del reinado de Darío, Hageo y Zacarías, hijo de Iddo, los profetas, profetizaron a los judíos que estaban en Judea[a] y Jerusalén en nombre de Yahvé, Dios de Israel, para ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Judá», siguiendo más de cerca el paralelo hebreo; el griego dice «Judea».
    reason: lexical_alternative
  - marker: b
    text: La frase final también puede entenderse como «sobre ellos» o «acerca de ellos»; el griego y el hebreo conservan aquí una formulación algo comprimida.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐν δὲ τῷ δευτέρῳ ἔτει
  english_pob_choice: Now in the second year
  chosen_spanish: Ahora, en el segundo año
  alternatives_spanish:
  - Y en el segundo año
  - En el segundo año
  lexicon: LSJ
  rationale: δέ es una partícula narrativa leve; «Ahora» mantiene la progresión del relato sin volverlo demasiado literal. «En el segundo año» refleja con naturalidad la frase temporal griega.
- source_word: τῆς Δαρείου βασιλείας
  english_pob_choice: of the reign of Darius
  chosen_spanish: del reinado de Darío
  alternatives_spanish:
  - del reinado del rey Darío
  - del reinado de Darío
  lexicon: LSJ
  rationale: βασιλεία aquí se refiere al reinado, no al reino como entidad. «Del reinado de Darío» es la forma más natural y fiel al sentido.
- source_word: ἐπροφήτευσεν
  english_pob_choice: prophesied
  chosen_spanish: profetizaron
  alternatives_spanish:
  - profetizó
  - hablaron proféticamente
  lexicon: BDAG
  rationale: El verbo expresa actividad profética estándar. En español, el plural concuerda con los dos sujetos, Hageo y Zacarías.
- source_word: Ἀγγαῖος καὶ Ζαχαρίας ὁ τοῦ Ἐδδεὶν
  english_pob_choice: Haggai and Zechariah son of Iddo
  chosen_spanish: Hageo y Zacarías, hijo de Iddo
  alternatives_spanish:
  - Hageo y Zacarías, hijo de Iddó
  - Hageo y Zacarías, hijo de Iddo
  lexicon: LSJ
  rationale: El griego presenta el patronímico singular unido a Zacarías. En español se conserva esa relación con la puntuación que la hace inequívoca.
- source_word: οἱ οἱ προφῆται
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los profetas
  lexicon: LSJ
  rationale: La duplicación del artículo en el texto griego es una irregularidad textual, pero el sentido claro es identificativo y plural. No se reproduce en español.
- source_word: ἐπὶ τοὺς Ἰουδαίους
  english_pob_choice: to the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - contra los judíos
  - sobre los judíos
  - acerca de los judíos
  lexicon: BDAG
  rationale: Con un verbo de profetizar, ἐπί marca dirección hacia el destinatario. «A los judíos» expresa bien el público al que se dirige la profecía sin sugerir hostilidad.
- source_word: τοὺς ἐν τῇ Ἰουδαίᾳ καὶ Ἰερουσαλήμ
  english_pob_choice: who were in Judea and Jerusalem
  chosen_spanish: que estaban en Judea y Jerusalén
  alternatives_spanish:
  - que estaban en Judá y Jerusalén
  - en Judea y en Jerusalén
  lexicon: LSJ
  rationale: Ἰουδαία corresponde naturalmente a «Judea» en el griego; la referencia geográfica se conserva de forma clara y fluida.
- source_word: ἐπὶ τῷ ὀνόματι Κυρίου θεοῦ Ἰσραὴλ
  english_pob_choice: in the name of the Lord God of Israel
  chosen_spanish: en nombre de Yahvé, Dios de Israel
  alternatives_spanish:
  - en nombre del Señor, Dios de Israel
  - en el nombre de Yahvé, Dios de Israel
  lexicon: BDAG
  rationale: El griego dice «del Señor, Dios de Israel»; en este proyecto, la referencia divina subyacente se vierte como «Yahvé» en el texto principal. «En nombre de» conserva el valor de autorización profética.
- source_word: ἐπ’ αὐτούς
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - sobre ellos
  - con respecto a ellos
  - contra ellos
  lexicon: BDAG
  rationale: La frase final es compacta y algo ambigua. «A ellos» sigue la revisión inglesa reciente y comunica el destinatario de la profecía sin cargar la expresión con un matiz no exigido por el griego.
theological_decisions:
- issue: Renderización de κύριος en contexto escritural griego
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: Aunque el texto base es griego y la auditoría inglesa usa «Lord», el nombre divino subyacente en esta fórmula corresponde al Tetragrámaton en el trasfondo bíblico. El estándar del proyecto para יהוה/YHWH es «Yahvé» en el texto principal.
  doctrine_reference: 'DOCTRINE.md: יהוה/YHWH → Yahvé en el texto principal; κύριος en griego se evalúa caso por caso cuando refleja el nombre divino.'
- issue: Relación profética expresada por ἐπί/עַל
  english_pob_reading: to the Jews ... to them
  chosen_spanish_reading: a los judíos ... a ellos
  alternative_spanish_readings:
  - contra los judíos ... sobre ellos
  - acerca de los judíos ... respecto de ellos
  rationale: El contexto es de exhortación y comisión profética, no de hostilidad. La primera ἐπί se entiende como dirección al destinatario; la segunda, siguiendo la revisión inglesa reciente, se vierte de forma simple como complemento indirecto.
  doctrine_reference: Uso contextual de preposiciones en textos proféticos; evitar sobreinterpretar un matiz polémico donde el contexto no lo exige.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que suaviza la clausula final a «to them» y elimina la puntuación innecesaria alrededor de «the God of Israel». Dado que la validación anterior falló por pies de nota sin anclaje, esta versión no incluye notas al pie.
  spanish_consistency_notes:
  - Se usa «Yahvé» de acuerdo con la terminología base del proyecto para el nombre divino.
  - «Judea» se conserva porque corresponde al griego Ἰουδαία; no se sustituye por «Judá» sin apoyo directo del texto fuente.
  - 'Se mantiene la puntuación española natural en el patronímico: «Zacarías, hijo de Iddo».'
  - No se introducen notas al pie para evitar marcadores sin anclaje en el texto.
  - El estilo busca ser publicable y sobrio, sin calcos innecesarios del inglés.
