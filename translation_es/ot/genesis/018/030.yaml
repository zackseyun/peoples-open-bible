translation:
  language: es
  text: 'Entonces él dijo[a]: «Por favor, que no se enoje mi Señor, y hablaré. Tal vez se encuentren allí treinta». Y respondió: «No lo haré si encuentro allí treinta».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi señor». El título hebreo puede leerse como un tratamiento respetuoso; aquí se escribe con mayúscula porque, por el contexto, se entiende que el destinatario es el Señor.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל נָא יִחַר
  english_pob_choice: Please, let not ... be angry
  chosen_spanish: Por favor, no se enoje
  alternatives_spanish:
  - no se enoje, por favor
  - ruego que no se enoje
  lexicon: HALOT
  rationale: La combinación de la partícula negativa y la de cortesía expresa una súplica respetuosa. En español, «Por favor, no se enoje» conserva el tono de ruego y el sentido idiomático de la ira sin volverlo rígido.
- source_word: לַאדֹנָי
  english_pob_choice: my Lord
  chosen_spanish: mi Señor
  alternatives_spanish:
  - mi señor
  lexicon: HALOT
  rationale: El texto apunta a un trato reverente dirigido al interlocutor divino en este contexto. En español, «mi Señor» mantiene el registro de respeto y la mayúscula refleja la comprensión teológica del destinatario, sin sustituirlo por el nombre divino.
- source_word: וַאֲדַבֵּרָה
  english_pob_choice: and I will speak
  chosen_spanish: y hablaré
  alternatives_spanish:
  - y permita que hable
  - y hablaría
  lexicon: HALOT
  rationale: El cohortativo expresa la intención deferente de continuar la intercesión. «Y hablaré» es natural en español y conserva el impulso prospectivo sin añadir paráfrasis.
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Tal vez
  alternatives_spanish:
  - quizá
  - quizás
  lexicon: HALOT
  rationale: Marca la incertidumbre respetuosa de Abraham. «Tal vez» transmite bien la cautela de la propuesta y suena fluido en español contemporáneo.
- source_word: יִמָּצְאוּן
  english_pob_choice: will be found
  chosen_spanish: se encuentren
  alternatives_spanish:
  - se hallen
  - serán hallados
  lexicon: HALOT
  rationale: El nifal de מצא tiene sentido pasivo/reflexivo. «Se encuentren» conserva la pasividad y la posibilidad hipotética en un español natural.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Adverbio locativo simple. «Allí» es claro y mantiene la referencia espacial sin sobreexplicar.
- source_word: שְׁלֹשִׁים
  english_pob_choice: thirty
  chosen_spanish: treinta
  alternatives_spanish:
  - '30'
  lexicon: HALOT
  rationale: Número cardinal directo, sin tensión semántica especial.
- source_word: לֹא אֶעֱשֶׂה
  english_pob_choice: I will not do it
  chosen_spanish: No lo haré
  alternatives_spanish:
  - No lo haré así
  - No lo haré de esa manera
  lexicon: HALOT
  rationale: El objeto queda implícito en el contexto. «No lo haré» suple con naturalidad el referente tácito y conserva la brevedad del hebreo.
- source_word: אִם אֶמְצָא
  english_pob_choice: if I find
  chosen_spanish: si encuentro
  alternatives_spanish:
  - si hallo
  - en caso de que encuentre
  lexicon: HALOT
  rationale: Construcción condicional sencilla. «Si encuentro» refleja la condición hipotética de forma directa y idiomática.
theological_decisions:
- issue: Cómo reflejar לַאדֹנָי en la súplica de Abraham
  english_pob_reading: my Lord
  chosen_spanish_reading: mi Señor
  alternative_spanish_readings:
  - mi señor
  rationale: La escena presenta una conversación con el interlocutor divino; por eso, la traducción debe conservar el trato reverente. En español, la mayúscula en «Señor» comunica esa lectura devocional sin introducir el tetragrámaton.
  doctrine_reference: Tratamiento reverente de títulos divinos y contexto teofánico; titularidad frente a nombre propio.
translation_notes:
  revision_awareness: 'Coincide con el tramo final del rastro auditado en inglés: se mantiene el tono de súplica, el título reverente para אֲדֹנָי en contexto teofánico, la propuesta tentativ​​a de Abraham y la respuesta breve de YHWH sin cambios de revisión pendientes.'
  spanish_consistency_notes:
  - Se preserva «Yahvé» no porque aparezca explícitamente aquí, sino como norma del proyecto; en este versículo el hebreo usa אֲדֹנָי como tratamiento, no el tetragrámaton.
  - Se prefiere «mi Señor» con mayúscula por coherencia con la lectura divina del contexto, pero la nota deja abierta la lectura alternativa «mi señor».
  - «No lo haré» mantiene el objeto tácito, como en el inglés POB, para no sobreexplicar la respuesta divina.
