translation:
  language: es
  text: No tomaré un toro de tu casa, ni machos cabríos[a] de tus apriscos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cabritos machos» o «chivos». El hebreo se refiere específicamente a machos cabríos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶקַּח
  english_pob_choice: I will not take
  chosen_spanish: No tomaré
  alternatives_spanish:
  - No tomo
  - No tomaría
  lexicon: HALOT
  rationale: El imperfecto qal con לֹא expresa aquí una acción negada en discurso divino. En español, el futuro simple comunica con naturalidad la declaración solemne de rechazo, como en la solución inglesa auditada.
- source_word: מִבֵּיתְךָ
  english_pob_choice: from your house
  chosen_spanish: de tu casa
  alternatives_spanish:
  - de tu hogar
  - de tu casa y familia
  lexicon: HALOT
  rationale: בַּיִת mantiene aquí su sentido concreto de casa o propiedad. 'De tu casa' conserva la imagen espacial y sigue la lectura auditada de que no se trata primariamente de la familia sino del ámbito doméstico del oferente.
- source_word: פָר
  english_pob_choice: a bull
  chosen_spanish: un toro
  alternatives_spanish:
  - un bull
  - un novillo
  lexicon: HALOT
  rationale: פָר designa un bovino macho apto para sacrificio. En español, 'toro' comunica la fuerza del término con naturalidad. 'Novillo' sería más específico por edad, pero el hebreo no obliga a esa precisión; se conserva así la equivalencia funcional con 'bull'.
- source_word: מִמִּכְלְאֹתֶיךָ
  english_pob_choice: from your pens
  chosen_spanish: de tus apriscos
  alternatives_spanish:
  - de tus corrales
  - de tus enclosures
  lexicon: HALOT
  rationale: מִכְלָאָה es un recinto para animales. 'Apriscos' es un término español natural y pastoral; mantiene la imagen de un lugar cerrado para el ganado. Se evita 'corrales' por ser menos preciso en algunos contextos ganaderos y por conservar mejor el matiz de 'pens'.
- source_word: עַתּוּדִים
  english_pob_choice: goats
  chosen_spanish: machos cabríos
  alternatives_spanish:
  - cabras
  - chivos
  lexicon: HALOT
  rationale: עַתּוּדִים se refiere específicamente a machos cabríos, como indica la nota inglesa. En el texto principal se preserva esa precisión lexical, porque 'goats' en inglés se amplía genéricamente pero el hebreo marca el sexo del animal.
theological_decisions:
- issue: Negación de la ofrenda animal en boca de Dios
  english_pob_reading: I will not take ...
  chosen_spanish_reading: No tomaré ...
  alternative_spanish_readings:
  - No tomo ...
  - No aceptaré ...
  rationale: El versículo presenta a Dios rechazando la idea de recibir sacrificios meramente formales. 'No tomaré' reproduce el acto de no aceptar/recibir sin introducir una reinterpretación más explícita que el hebreo no dice aquí. 'No aceptaré' sería posible, pero desplaza levemente el verbo original de לקחת.
  doctrine_reference: Salmo 50:9; culto sincero frente a sacrificio vacío
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente y la solución inglesa auditada, pero ajusta la zoología y el léxico de recinto para que el español conserve la precisión del hebreo sin volverse duro o arcaizante. No se registraron revisiones aplicadas en el pasaje base, por lo que no se introducen cambios textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' implícito por la primera persona divina; no se añadió sujeto explícito.
  - '''Apriscos'' se eligió por claridad pastoral y por su equivalencia funcional con ''pens''.'
  - Se preservó la distinción de sexo en 'machos cabríos', siguiendo la nota léxica auditada.
