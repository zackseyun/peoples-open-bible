base_translation:
  language: en
  yaml_path: translation/ot/judges/019/016.yaml
  text: And behold[a], an old man was coming in from his work in the field at evening. The man was from the hill country of Ephraim, and he was staying in Gibeah[b], but the men of the place were Benjaminites.
  footnotes:
  - marker: a
    text: Or, more literally, 'the man was from Mount Ephraim.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb for 'was staying' can also mean 'was residing' or 'was sojourning,' suggesting he was living in Gibeah though not originally from there.
    reason: lexical_alternative
