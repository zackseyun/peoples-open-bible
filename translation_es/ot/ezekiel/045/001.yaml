base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/045/001.yaml
  text: 'And when you divide the land as an inheritance[a], you shall set apart a contribution to Yahweh, a holy portion from the land: twenty-five thousand cubits in length and ten thousand in width[b]. It shall be holy within all its surrounding boundary.'
  footnotes:
