translation:
  language: es
  text: Así también una mujer que deja a su esposo y presenta un heredero concebido con[a] otro hombre;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de un extraño». El griego ἐξ ἀλλοτρίου señala a alguien ajeno al matrimonio; «con otro hombre» hace explícito ese sentido en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως καὶ
  english_pob_choice: So also
  chosen_spanish: Así también
  alternatives_spanish:
  - De igual modo
  - Asimismo
  lexicon: LSJ
  rationale: Conserva el enlace comparativo e inferencial del griego sin volverlo pesado en español.
- source_word: γυνή
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - la mujer
  - una esposa
  lexicon: LSJ
  rationale: En este contexto, el término puede leerse como mujer o esposa; como el verso ya menciona al esposo, 'una mujer' mantiene la naturalidad y deja que el contexto marital aporte el matiz.
- source_word: καταλιποῦσα
  english_pob_choice: who leaves
  chosen_spanish: que deja
  alternatives_spanish:
  - que abandona
  - habiendo dejado
  lexicon: LSJ
  rationale: El participio aoristo se vierte de forma simple y directa; 'deja' sigue el valor verbal sin intensificar indebidamente la culpa en el texto principal.
- source_word: τὸν ἄνδρα
  english_pob_choice: her husband
  chosen_spanish: a su esposo
  alternatives_spanish:
  - a su marido
  - a su hombre
  lexicon: LSJ
  rationale: En este contexto ἀνήρ se refiere al cónyuge masculino; 'esposo' es claro y natural en español contemporáneo.
- source_word: παριστῶσα
  english_pob_choice: presents
  chosen_spanish: presenta
  alternatives_spanish:
  - produce
  - trae
  lexicon: LSJ
  rationale: '''Presenta'' conserva la idea de poner ante/introducir a alguien como heredero, sin sobreinterpretar el término.'
- source_word: κληρονόμον
  english_pob_choice: an heir
  chosen_spanish: un heredero
  alternatives_spanish:
  - un heredero legal
  - un sucesor
  lexicon: LSJ
  rationale: '''Heredero'' es el equivalente breve y habitual para κληρονόμος en un marco familiar y patrimonial.'
- source_word: ἐξ ἀλλοτρίου
  english_pob_choice: from another man
  chosen_spanish: de otro hombre
  alternatives_spanish:
  - de un extraño
  - de un ajeno
  lexicon: LSJ
  rationale: La frase griega apunta a alguien ajeno al matrimonio. 'De otro hombre' comunica esa relación de manera natural en español; 'de un extraño' podría sugerir desconocimiento más que paternidad fuera del vínculo marital.
theological_decisions:
- issue: Fuerza moral y legal del dicho sobre una unión fuera del matrimonio
  english_pob_reading: Render the line straightforwardly as describing a woman leaving her husband and producing an heir from another man, without adding interpretive labels in the main text.
  chosen_spanish_reading: Traducir la acción y su consecuencia sin añadir en el texto principal etiquetas como 'adúltera' o 'infiel'.
  alternative_spanish_readings:
  - Así también una esposa que abandona a su esposo y trae un heredero de otro hombre
  - Así también una mujer que deja a su marido y presenta un hijo de otro hombre
  rationale: El griego expresa el hecho y su resultado; la condena implícita pertenece al contexto inmediato, no a una ampliación del traductor. El texto español conserva esa sobriedad.
  doctrine_reference: 'Translation philosophy: original-language primacy; no paraphrasing beyond the source warrant.'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'by another man' a 'from another man' para reflejar más de cerca ἐξ ἀλλοτρίου. En español, 'de otro hombre' mantiene ese matiz de procedencia/relación sin perder naturalidad.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no hay aquí el Tetragrámaton ni κύριος con función divina.
  - Se prefiere 'esposo' a 'marido' por neutralidad y legibilidad, sin alterar el sentido.
  - '''Heredero'' conserva el valor jurídico-familiar del sustantivo griego sin añadir precisión no presente en el texto.'
