translation:
  language: es
  text: Y Yahvé envió un ángel[a], que destruyó a todo guerrero valiente, líder y comandante en el campamento del rey de Asiria. Así volvió a su tierra con vergüenza en el rostro. Y cuando entró en la casa de su dios[b], allí lo derribaron con la espada algunos de los que salieron de su propio cuerpo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mensajero'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'algunos de los que salieron de sus entrañas'; compárese 2 Reyes 19:37, donde se especifica que eran sus hijos.
    reason: cross_reference
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre del pacto con la forma española establecida del proyecto. No se lo sustituye por un título enmascarado, conforme al criterio POB.
- source_word: מַלְאָךְ
  english_pob_choice: an angel
  chosen_spanish: un ángel
  alternatives_spanish:
  - un mensajero
  lexicon: HALOT
  rationale: En este contexto narrativo de intervención divina, el sentido sobrenatural es el más probable y coincide con la lectura auditada del inglés POB.
- source_word: וַיַּכְחֵד
  english_pob_choice: wiped out
  chosen_spanish: destruyó
  alternatives_spanish:
  - aniquiló
  - borró
  - exterminó
  lexicon: HALOT
  rationale: El verbo expresa eliminación decisiva en contexto militar. 'Destruyó' comunica bien la fuerza del hebreo sin forzar un giro demasiado coloquial como 'borró'.
- source_word: כָּל גִּבּוֹר חַיִל
  english_pob_choice: every mighty warrior
  chosen_spanish: todo guerrero valiente
  alternatives_spanish:
  - todo guerrero poderoso
  - todo hombre valiente de guerra
  lexicon: HALOT
  rationale: La expresión describe combatientes fuertes o valerosos. 'Guerrero valiente' preserva el valor militar y evita una calca poco natural.
- source_word: וְנָגִיד
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - jefe
  - caudillo
  - gobernante
  lexicon: HALOT
  rationale: Siguiendo la revisión auditada del inglés POB, 'líder' distingue este término del siguiente sin cargarlo de un matiz técnico innecesario.
- source_word: וְשָׂר
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - oficial
  - jefe
  - capitán
  lexicon: HALOT
  rationale: En el marco militar del campamento asirio, 'comandante' comunica bien una función de mando y mantiene la distinción con נָגִיד.
- source_word: בְּמַחֲנֵה מֶלֶךְ אַשּׁוּר
  english_pob_choice: in the camp of the king of Assyria
  chosen_spanish: en el campamento del rey de Asiria
  alternatives_spanish:
  - en el campamento del rey asirio
  - en el campamento del monarca de Asiria
  lexicon: HALOT
  rationale: Se mantiene la cadena constructa de forma clara y natural en español, con 'rey de Asiria' como equivalente transparente del hebreo.
- source_word: בְּבֹשֶׁת פָּנִים
  english_pob_choice: with shame on his face
  chosen_spanish: con vergüenza en el rostro
  alternatives_spanish:
  - con el rostro avergonzado
  - con la vergüenza en la cara
  - en vergonzoso rostro
  lexicon: HALOT
  rationale: La idiomática hebrea expresa humillación pública mediante la imagen del rostro. 'Con vergüenza en el rostro' conserva esa imagen mejor que una abstracción como 'en desgracia'.
- source_word: לְאַרְצוֹ
  english_pob_choice: to his own land
  chosen_spanish: a su tierra
  alternatives_spanish:
  - a su propia tierra
  - a su país
  lexicon: HALOT
  rationale: '''Tierra'' refleja bien el hebreo y suena natural en español bíblico; el posesivo ya queda claro por el contexto. Se omite ''propia'' por economía estilística.'
- source_word: בֵּית אֱלֹהָיו
  english_pob_choice: the house of his god
  chosen_spanish: la casa de su dios
  alternatives_spanish:
  - el templo de su dios
  lexicon: HALOT
  rationale: '''Casa'' reproduce literalmente בַּיִת y mantiene la neutralidad del texto, sin imponer automáticamente el término ''templo''.'
- source_word: וּמִיצָאָיו מֵעָיו
  english_pob_choice: some of those who came from his own body
  chosen_spanish: los que salieron de sus propias entrañas
  alternatives_spanish:
  - los que salieron de su propio cuerpo
  - sus propios hijos
  - los de su linaje
  lexicon: HALOT
  rationale: El hebreo es literalmente una expresión corporal amplia, no una identificación explícita como 'hijos'. 'Entrañas' conserva el valor idiomático y la tensión documental del original.
- source_word: הִפִּילֻהוּ בֶחָרֶב
  english_pob_choice: struck him down there with the sword
  chosen_spanish: lo derribaron con la espada
  alternatives_spanish:
  - lo mataron con la espada
  - lo hicieron caer con la espada
  lexicon: HALOT
  rationale: '''Derribaron'' reproduce el valor de hacer caer/abatir con violencia letal; la espada conserva el instrumento y evita sobreespecificar la causa en la redacción principal.'
theological_decisions:
- issue: Identidad del agente enviado por Yahvé
  english_pob_reading: an angel as a heavenly being
  chosen_spanish_reading: un ángel celestial
  alternative_spanish_readings:
  - un mensajero
  - un enviado
  rationale: La escena de liberación milagrosa favorece la lectura angélica. El español mantiene esa lectura sin convertirla en una interpretación doctrinal ajena al texto.
  doctrine_reference: Lectura contextual del relato; primacía del hebreo sobre la paráfrasis interpretativa
- issue: Descripción de quienes matan al rey asirio
  english_pob_reading: retain the broader bodily/kinship expression in the main text
  chosen_spanish_reading: los que salieron de sus propias entrañas
  alternative_spanish_readings:
  - sus propios hijos
  - los que salieron de su propio cuerpo
  rationale: Se conserva la expresión hebrea amplia para no importar al texto principal el dato explícito de 2 Reyes 19:37. Así se preserva la tensión textual y la diferencia entre paralelos.
  doctrine_reference: 'Principio POB: mantener la formulación original y no resolver de antemano la relación con el paralelo'
- issue: Rango militar doble de נָגִיד y שַׂר
  english_pob_reading: leader, and commander
  chosen_spanish_reading: líder y comandante
  alternative_spanish_readings:
  - jefe y comandante
  - líder y oficial
  - caudillo y comandante
  rationale: Se evita fundir ambos términos en uno solo. La pareja 'líder/comandante' refleja dos cargos distintos en el campamento asirio, siguiendo la revisión auditada del inglés POB.
  doctrine_reference: Respeto a la distinción léxica y a la revisión más reciente del texto base
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'commander, and officer' a 'leader, and commander' para distinguir mejor נָגִיד y שַׂר. La presente redacción española sigue esa revisión y evita suavizar la diferencia entre ambos términos. También preserva la expresión corporal amplia de 'came out from his own body' en vez de resolverla como 'hijos' en el texto principal.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה, conforme al criterio del proyecto.
  - Se usa ángel en el texto principal, con nota de alternativa 'mensajero' por la ambigüedad léxica.
  - Se preserva la distinción entre 'líder' y 'comandante' para נָגִיד y שַׂר.
  - Se evita 'SEÑOR' y 'Cristo', que no corresponden a este pasaje.
  - La frase final conserva la imagen corporal hebrea y no la sustituye por una armonización con 2 Reyes 19:37.
