translation:
  language: es
  text: Yozabad hijo de Simeat y Jehozabad hijo de Somer, sus siervos[a], lo atacaron, y murió. Lo sepultaron con sus padres en la ciudad de David, y Amasías su hijo reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “sus oficiales” para עֲבָדָיו; el hebreo puede referirse a siervos o asistentes de corte según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יוֹזָבָד
  english_pob_choice: And Jozabad
  chosen_spanish: Yozabad
  alternatives_spanish:
  - Yozabad
  - Yozabad, y
  lexicon: HALOT
  rationale: Se translitera el nombre propio según uso español claro; no se fuerza un equivalente semántico. Se omite la conjunción inicial porque en español la coordinación narrativa puede sonar pesada al inicio del versículo.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo de
  - el hijo de
  lexicon: HALOT
  rationale: La construcción genealógica hebrea se expresa de forma natural en español con 'hijo de', manteniendo la relación filial sin artículo añadido.
- source_word: שִׁמְעָת
  english_pob_choice: Shimeath
  chosen_spanish: Simeat
  alternatives_spanish:
  - Shimeat
  - Simeat
  lexicon: HALOT
  rationale: Se adapta la transliteración al sistema fonético habitual del español, conservando el nombre propio sin traducirlo.
- source_word: וִ/יהוֹזָבָד
  english_pob_choice: and Jehozabad
  chosen_spanish: Jehozabad
  alternatives_spanish:
  - Jehozabad
  - Yehozabad
  lexicon: HALOT
  rationale: Nombre propio transliterado; se mantiene la forma tradicional de transliteración bíblica en español cuando es reconocible y legible.
- source_word: שֹׁמֵר
  english_pob_choice: Shomer
  chosen_spanish: Somer
  alternatives_spanish:
  - Somer
  - Shomer
  lexicon: HALOT
  rationale: Se adapta al español la consonante inicial para una lectura más natural, sin alterar la identidad del nombre.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus siervos
  - sus servidores
  - sus esclavos
  lexicon: HALOT
  rationale: El hebreo עֲבָדָיו puede abarcar siervos, servidores u oficiales. Aquí se traduce 'siervos' porque conserva la fuerza relacional del término sin implicar necesariamente esclavitud legal, y encaja con el contexto de corte y conspiración.
- source_word: הִכֻּהוּ
  english_pob_choice: struck him down
  chosen_spanish: lo hirieron
  alternatives_spanish:
  - lo hirieron
  - lo golpearon
  - lo derribaron
  lexicon: HALOT
  rationale: '''Herir'' comunica el acto violento de manera natural en español y permite que la cláusula siguiente ''y murió'' conserve su valor narrativo. Evita duplicar el sentido de muerte ya explicitado por el verbo posterior.'
- source_word: וַ/יָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y murió
  - entonces murió
  lexicon: HALOT
  rationale: Se conserva la secuencia narrativa del wayyiqtol con una coordinación simple y directa.
- source_word: וַ/יִּקְבְּרוּ אֹת֛/וֹ
  english_pob_choice: And they buried him
  chosen_spanish: Lo sepultaron
  alternatives_spanish:
  - Lo sepultaron
  - Y lo enterraron
  lexicon: HALOT
  rationale: '''Sepultar'' es adecuado en contexto funerario histórico y mantiene un registro digno. Se omite la conjunción inicial para fluidez española, sin perder la progresión narrativa.'
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus padres
  - con sus antepasados
  lexicon: HALOT
  rationale: El hebreo puede expresar la fórmula sepulcral dinástica. En español, 'con sus padres' conserva la relación idiomática y la referencia a los antecesores reales; 'antepasados' sería más explicativo pero menos cercano al giro original.
- source_word: בְּ/עִ֣יר דָּוִ֑ד
  english_pob_choice: in the city of David
  chosen_spanish: en la ciudad de David
  alternatives_spanish:
  - en la ciudad de David
  - en la Ciudad de David
  lexicon: HALOT
  rationale: Se conserva la expresión fija del histórico bíblico como topónimo reconocido y transparente.
- source_word: וַ/יִּמְלֹ֛ךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - reinó
  - comenzó a reinar
  lexicon: HALOT
  rationale: El verbo מלך en esta fórmula sucesoria se expresa de manera idiomática con 'reinó', que comunica el cambio de soberano sin sobreespecificar el aspecto ingresivo.
- source_word: אֲמַצְיָ֥ה בְנ֖/וֹ
  english_pob_choice: Amaziah his son
  chosen_spanish: Amasías, su hijo
  alternatives_spanish:
  - Amasías, su hijo
  - su hijo Amasías
  lexicon: HALOT
  rationale: Se adopta la forma española convencional 'Amasías'. El orden se ajusta a la fluidez española, sin perder la aposición filial.
- source_word: תַּחְתָּֽי/ו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su lugar
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: '''En su lugar'' reproduce bien la fórmula sucesoria y es idiomática en español contemporáneo.'
theological_decisions:
- issue: 'Término עֲבָדָיו: siervos, oficiales o esclavos'
  english_pob_reading: his servants; the Hebrew עֲבָדָיו can refer to servants or court attendants depending on context.
  chosen_spanish_reading: sus siervos
  alternative_spanish_readings:
  - sus oficiales
  - sus esclavos
  - sus servidores
  rationale: El contexto de un complot palaciego favorece una referencia a la servidumbre/corte más que a esclavitud literal. 'Siervos' preserva la ambigüedad controlada y la fuerza del término hebreo sin ir más allá de lo que el texto exige.
  doctrine_reference: Lexical ambiguity in historical narrative; no doctrinal issue.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante-masorético y el audit trail en inglés sin revisiones aplicadas; la traducción inglesa coincide plenamente con el control cruzado, por lo que no se introdujeron cambios de contenido. La principal decisión abierta fue עֲבָדָיו, donde el inglés ya documenta la alternativa 'his officials'.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y contemporáneo, evitando arcaísmos innecesarios.
  - Los nombres propios se transliteran con adaptación española cuando mejora la pronunciación, sin alterar la identificación textual.
  - La fórmula sucesoria se conserva con 'reinó en su lugar' para reflejar el hebreo y el uso narrativo habitual.
