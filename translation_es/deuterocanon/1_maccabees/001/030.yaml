review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa del griego: habla conciliadora usada con engaño, confianza de la población, ataque súbito, gran golpe y destrucción de muchos de Israel. Sin embargo, presenta un problema de anclaje y coherencia en la nota: el texto principal ya usa «palabras de paz[a]», mientras la nota la presenta como alternativa («O: ...») y además afirma que esa fue la opción elegida. También «la hirió con un gran golpe» suena menos idiomático para ἐπάταξεν αὐτὴν πληγὴν μεγάλην que una formulación como «le asestó un gran golpe».'
  spanish_quality_summary: El español es generalmente claro, pero necesita un ajuste menor de naturalidad y consistencia editorial. «Y le habló con palabras de paz engañosamente» es comprensible, aunque «les habló palabras de paz con engaño» o «les dirigió palabras de paz con engaño» suena más natural. «Mucho pueblo de Israel» conserva el colectivo, pero en español bíblico moderno resulta algo forzado tras «destruyó a»; «muchos del pueblo de Israel» mejora la fluidez sin perder el colectivo. La nota al pie debe corregirse para no contradecir el texto.
  glossary_alignment: No hay términos del glosario principal en conflicto. La decisión «confiaron en él» para ἐπίστευσαν αὐτῷ está bien contextualizada y evita sobrecarga teológica. «Palabras de paz» es una buena opción para λόγους εἰρηνικούς, con «palabras pacíficas» como alternativa posible. No se requieren ajustes doctrinales.
  issues:
  - severity: medium
    issue: La nota [a] está mal formulada respecto al texto anclado.
    rationale: 'El texto principal ya dice «palabras de paz[a]», pero la nota la presenta como lectura alternativa con «O: “palabras de paz”». Eso crea incoherencia editorial y confunde al lector.'
  - severity: medium
    issue: «La hirió con un gran golpe» es poco idiomático en español para una ciudad.
    rationale: Aunque intenta seguir de cerca la metáfora griega, en español suena torpe. «Le asestó un gran golpe» conserva bien el sentido de πληγὴν μεγάλην y mejora la legibilidad.
  - severity: low
    issue: «Mucho pueblo de Israel» suena forzado en este contexto sintáctico.
    rationale: La conservación del colectivo es defendible, pero «destruyó a mucho pueblo de Israel» no es la mejor formulación española. «Destruyó a muchos del pueblo de Israel» mantiene el valor colectivo con mayor naturalidad.
  revised_spanish_text: Y les habló palabras de paz[a] con engaño, y ellos confiaron en él; entonces cayó sobre la ciudad de repente, le asestó un gran golpe, y destruyó a muchos del pueblo de Israel.
  revised_footnotes:
