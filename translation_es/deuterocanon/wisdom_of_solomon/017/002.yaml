translation:
  language: es
  text: Porque los hombres inicuos supusieron que oprimían a una nación santa[a], yacían presos por la oscuridad y atados por una larga noche, encerrados bajo sus techos[c][b], fugitivos de la providencia eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los inicuos» para ἄνομοι. El adjetivo griego está en plural masculino sustantivado.
    reason: lexical_alternative
  - marker: b
    text: O «prisioneros de la oscuridad y encadenados por una larga noche».
    reason: lexical_alternative
  - marker: c
    text: «Providencia» traduce πρόνοια; aquí probablemente se refiere al cuidado ordenado y continuo de Dios, no solo a la previsión.
    reason: cultural_note
lexical_decisions:
- source_word: ὑπειληφότες
  english_pob_choice: supposed
  chosen_spanish: pensaron
  alternatives_spanish:
  - supusieron
  - imaginaron
  - consideraron
  lexicon: LSJ
  rationale: El participio expresa una suposición errónea o presuntuosa. «Pensaron» mantiene la idea de juicio mental equivocado en un español natural, sin intensificar innecesariamente el matiz.
- source_word: καταδυναστεύειν
  english_pob_choice: oppressing
  chosen_spanish: oprimían
  alternatives_spanish:
  - dominaban
  - tiranizaban
  - ejercían poder sobre
  lexicon: LSJ
  rationale: El verbo implica dominación dura y abusiva. «Oprimían» conserva la fuerza moral del contexto y fluye bien en español.
- source_word: ἔθνος ἅγιον
  english_pob_choice: a holy nation
  chosen_spanish: una nación santa
  alternatives_spanish:
  - un pueblo santo
  lexicon: LSJ
  rationale: «Nación» reproduce ἔθνος de manera más literal y preserva la resonancia bíblica del lenguaje de pacto; «santa» conserva ἅγιον sin suavizarlo.
- source_word: ἄνομοι
  english_pob_choice: lawless men
  chosen_spanish: los hombres inicuos
  alternatives_spanish:
  - los sin ley
  - los hombres sin ley
  - los malvados
  lexicon: LSJ
  rationale: El griego funciona sustantivado y masculino plural. «Los hombres inicuos» conserva el rasgo masculino y expresa la carga moral de ἄνομοι con naturalidad en español.
- source_word: δέσμιοι σκότους
  english_pob_choice: imprisoned by darkness
  chosen_spanish: presos por la oscuridad
  alternatives_spanish:
  - prisioneros de la oscuridad
  - encarcelados por la oscuridad
  lexicon: LSJ
  rationale: «Δέσμιοι» designa cautivos o presos. «Presos por la oscuridad» mantiene la imagen de la oscuridad como fuerza aprisionadora y es idiomático en español.
- source_word: μακρᾶς πεδῆται νυκτός
  english_pob_choice: bound fast by a long night
  chosen_spanish: fuertemente atados por una larga noche
  alternatives_spanish:
  - frenados por una larga noche
  - sujetos por una larga noche
  - feterados por una larga noche
  lexicon: LSJ
  rationale: «Pēdētai» evoca ligaduras o grilletes. «Fuertemente atados» conserva la imagen de atadura con claridad moderna; «larga noche» sigue de cerca το μακρᾶς νυκτός.
- source_word: κατακλεισθέντες ὀρόφοις
  english_pob_choice: shut in under their roofs
  chosen_spanish: encerrados bajo sus techos
  alternatives_spanish:
  - encerrados bajo sus casas
  - cerrados bajo sus techos
  - confinados bajo sus techos
  lexicon: LSJ
  rationale: «Ὀρόφοις» se refiere literalmente a techos/cubiertas. «Bajo sus techos» conserva la imagen concreta del griego sin generalizar a «casas»; «encerrados» comunica el cierre forzado.
- source_word: φυγάδες
  english_pob_choice: fugitives
  chosen_spanish: fugitivos
  alternatives_spanish:
  - prófugos
  - exiliados
  lexicon: LSJ
  rationale: 'El término denota los que huyen. «Fugitivos» preserva la ironía del texto: están físicamente encerrados, pero descritos como huidizos frente al orden divino.'
- source_word: τῆς αἰωνίου προνοίας
  english_pob_choice: from eternal providence
  chosen_spanish: de la providencia eterna
  alternatives_spanish:
  - de la previsión eterna
  - de la providencia perpetua
  - del cuidado eterno
  lexicon: LSJ
  rationale: En Sabiduría, πρόνοια tiene sentido teológico de gobierno/cuidado providencial. «Providencia» conserva ese peso doctrinal; «eterna» sigue de cerca αἰωνίου.
- source_word: ἔκειντο
  english_pob_choice: they lay
  chosen_spanish: yacían
  alternatives_spanish:
  - estaban tendidos
  - permanecían
  - yacían allí
  lexicon: LSJ
  rationale: El imperfecto presenta una situación estática. «Yacían» es sobrio, fiel y adecuado para la escena de abatimiento.
theological_decisions:
- issue: Sentido teológico de πρόνοια en Sabiduría
  english_pob_reading: providence
  chosen_spanish_reading: providencia
  alternative_spanish_readings:
  - previsión
  - cuidado providencial
  rationale: En este libro, πρόνοια no es mera previsión humana; alude al gobierno cuidadoso de Dios. «Providencia» mantiene esa densidad teológica sin perder claridad en español.
  doctrine_reference: Translation philosophy §1, §6
- issue: Tratamiento del sustantivo masculino plural ἄνομοι
  english_pob_reading: lawless men
  chosen_spanish_reading: los hombres inicuos
  alternative_spanish_readings:
  - los sin ley
  - los malvados
  rationale: El griego está masculinizado y sustantivado. Se preserva esa forma en español para no neutralizar el rasgo gramatical sin nota.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la lectura auditada del inglés POB y el griego de Swete; no se introdujeron revisiones posteriores en el pasaje. Se conservaron las tensiones léxicas relevantes: ἄνομοι sustantivado, δέσμιοι/πεδῆται con doble imagen de cautiverio, y πρόνοια en sentido teológico.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva un registro bíblico sobrio y moderno, evitando calcos innecesarios.
  - «Providencia» se usa en sentido teológico coherente con Sabiduría, no como mero latinismo decorativo.
