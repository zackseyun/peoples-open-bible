    reason: lexical_alternative
  - marker: b
    text: O «no había en ella una vara fuerte, un cetro para gobernar». El hebreo mezcla deliberadamente la imaginería de la vid con la imaginería real.
    reason: alternative_reading
  revision_rationale: Se ajusta la nota [b] para reflejar la alternativa y la rationale documentadas en el POB inglés, se mejora la fluidez de la primera cláusula con «vástagos», y se sustituye «endecha» por «lamentación» para mayor claridad y mejor alineación con la decisión principal auditada.
