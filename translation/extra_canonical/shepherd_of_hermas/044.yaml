  text: θρώπου τοῦ δυναμένου τηρῆσαι αὐτάς. οὐκ οἶδα δὲ εἰ δύνανται αἱ ἐντολαὶ αὗται ὑπὸ ἀνθρώπου φυλαχθῆναι, διότι σκληραί εἰσι λίαν. 5. ἀποκριθεὶς λέγει μοι· Ἐὰν σὺ σεαυτῷ προθῇς ὅτι δύνανται φυλαχθῆναι, εὐκόλως αὐτὰς φυλάξεις, καὶ οὐκ ἔσονται σκληραί· ἐὰν δὲ ἐπὶ τὴν καρδίαν σου ἤδη ἀναβῇ μὴ δύνασθαι αὐτὰς ὑπὸ ἀνθρώπου φυλαχθῆναι, οὐ φυλάξεις αὐτάς. 6. νῦν δέ σοι λέγω· ἐὰν ταύτας μὴ φυλάξῃς, ἀλλὰ παρενθυμηθῇς, οὐχ οἱ ταῖς ἐντολαῖς πορευόμενοι τοῦ διαβόλου, ταῖς δυσκόλοις καὶ πικραῖς καὶ ἀγρίαις καὶ ἀσελγέσι, καὶ μὴ φοβήθητε τὸν διάβολον, ὅτι ἐν αὐτῷ δύναμις οὐκ ἔστιν καθ' ὑμῶν· 7. ἐγὼ γὰρ ἔσομαι μεθ' ὑμῶν, ὁ ἄγγελος τῆς μετανοίας ὁ κατακυριεύων αὐτοῦ. ὁ διάβολος μόνον φόβον ἔχει, ὁ δὲ φόβος αὐτοῦ τόνον οὐκ ἔχει· μὴ φοβήθητε οὖν αὐτόν, καὶ φεύξεται ἀφ' ὑμῶν.
