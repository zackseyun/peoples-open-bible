    reason: cross_reference
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: los que
  alternatives_spanish:
  - quienes
  lexicon: HALOT
  rationale: El relativo introduce una lista de personas; en español, 'los que' expresa con naturalidad la referencia al grupo sin añadir interpretación innecesaria.
- source_word: בָּאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vinieron aquí
  - llegaron
  lexicon: HALOT
  rationale: '''Vinieron'' conserva el sentido básico de movimiento/arribo sin forzar el matiz contextual de ''regresaron'', que no está explícito en el verbo.'
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  lexicon: HALOT
  rationale: Preposición directa y natural en español para acompañamiento.
- source_word: זְרֻבָּבֶל
  english_pob_choice: Zerubbabel
  chosen_spanish: Zorobabel
  alternatives_spanish:
  - Zerubabel
  lexicon: transliteration
  rationale: Se adopta la transliteración habitual en español bíblico; mantiene identificable el nombre propio sin depender de la forma inglesa.
- source_word: יֵשׁוּעַ
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Jeshúa
  - Josué
  lexicon: transliteration
  rationale: Se conserva la forma postexílica del nombre propio. 'Jesúa' es una transliteración española clara y distingue esta figura de Josué.
- source_word: נְחֶמְיָה
  english_pob_choice: Nehemiah
  chosen_spanish: Nehemías
  lexicon: transliteration
  rationale: Transliteración española estándar del nombre propio.
- source_word: שְׂרָיָה
  english_pob_choice: Seraiah
  chosen_spanish: Seraías
  alternatives_spanish:
  - Azarías
  lexicon: transliteration
  rationale: Se sigue la consonancia del texto hebreo masorético; la forma tradicional española conserva el nombre propio sin sustituirlo por otra tradición textual.
- source_word: רְעֵלָיָה
  english_pob_choice: Reelaiah
  chosen_spanish: Reelaías
  alternatives_spanish:
  - Raamías
  lexicon: transliteration
  rationale: La forma principal refleja el hebreo del pasaje; la alternativa se conserva por la lectura paralela en Nehemías 7:7.
- source_word: מָרְדֳּכַי
  english_pob_choice: Mordecai
  chosen_spanish: Mardoqueo
  alternatives_spanish:
  - Mordejai
  lexicon: transliteration
  rationale: Transliteración española asentada del nombre propio.
- source_word: בִּלְשָׁן
  english_pob_choice: Bilshan
  chosen_spanish: Bilsán
  alternatives_spanish:
  - Bilšán
  lexicon: transliteration
  rationale: Se adapta al uso ortográfico español manteniendo el nombre propio reconocible.
- source_word: מִסְפָּר
  english_pob_choice: Mispar
  chosen_spanish: Mispar
  alternatives_spanish:
  - Misperet
  lexicon: transliteration
  rationale: Aquí funciona como nombre propio, no como 'número'; se conserva la forma breve del hebreo, con alternativa paralela documentada.
- source_word: בִּגְוַי
  english_pob_choice: Bigvai
  chosen_spanish: Bigvai
  alternatives_spanish:
  - Biguai
  lexicon: transliteration
  rationale: Se preserva el nombre propio con una transliteración estable y reconocible en español.
- source_word: רְחוּם
  english_pob_choice: Rehum
  chosen_spanish: Rehum
  alternatives_spanish:
  - Nehum
  lexicon: transliteration
  rationale: Se mantiene la lectura del texto hebreo masorético, con la forma alternativa preservada en nota por el paralelo de Nehemías 7:7.
- source_word: בַּעֲנָה
  english_pob_choice: Baanah
  chosen_spanish: Baaná
  alternatives_spanish:
  - Baana
  lexicon: transliteration
  rationale: Nombre propio transliterado de forma natural al español.
- source_word: מִסְפַּר
  english_pob_choice: The number
  chosen_spanish: El número
  alternatives_spanish:
  - La cifra
  - El total
  lexicon: HALOT
  rationale: Es el sustantivo común que introduce el conteo censal; 'el número' reproduce bien el valor formal y el enlace con el versículo siguiente.
- source_word: אַנְשֵׁי
  english_pob_choice: the men of
  chosen_spanish: los hombres de
  alternatives_spanish:
  - los varones de
  - las personas de
  lexicon: HALOT
  rationale: La forma constructa hebrea es literalmente masculina plural; 'los hombres de' conserva la referencia de género y el tono censal del pasaje.
- source_word: עַם יִשְׂרָאֵל
  english_pob_choice: the people of Israel
  chosen_spanish: el pueblo de Israel
  alternatives_spanish:
  - la gente de Israel
  - Israel
  lexicon: HALOT
  rationale: '''Pueblo de Israel'' comunica de manera natural la cadena constructa y mantiene el sentido colectivo sin reducirlo al mero nombre geográfico.'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético de Esdras 2:2 y conserva el orden de la lista nominal, con las variantes paralelas de Nehemías 7:7 preservadas en notas. No se aplicaron revisiones posteriores en el audit trail inglés; la redacción española mantiene esa misma lectura base.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Los nombres propios se transliteran al español de manera consistente y no se castellanizan según usos eclesiásticos variables.
  - Se mantiene el valor masculino de אַנְשֵׁי con «los hombres» por fidelidad al hebreo y al contexto censal.
  - «Mispar» se trata como nombre propio, no como sustantivo común.
  - La nota final no altera el sentido del versículo; solo anticipa el total que aparece en el versículo siguiente.
