review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo: Faraón llama a Moisés, concede que vayan a servir a Yahvé, pero restringe que el ganado quede atrás, mientras permite que los pequeños vayan con ellos. También preserva correctamente «Yahvé» para יְהוָה y «sirvan» para עבד. Sin embargo, el texto español no es publicable tal como está porque incluye el anglicismo «flocks» en lugar de un equivalente español fiel, y la nota [a] introduce una alternativa no reflejada por la nota inglesa ni necesaria para el sentido principal.'
  spanish_quality_summary: La redacción es en general clara y natural, pero «sus flocks» es un error grave de calidad y legibilidad. Además, «sus ganados» suena menos idiomático en esta pareja que «sus rebaños y sus vacadas» o «sus rebaños y sus manadas». Para español bíblico general y legible, «rebaños y vacadas» funciona bien aquí. La puntuación y el registro son apropiados.
  glossary_alignment: Alinea bien con la terminología del proyecto en «Yahvé» y en la preferencia por «sirvan» para עבד. «Sus pequeños» es aceptable para טַף, aunque «sus niños» sería una alternativa más explícita; no es necesario cambiarlo. El principal desajuste léxico es «flocks», que contradice tanto la terminología esperada en español como la propia explicación léxica del borrador.
  issues:
  - severity: high
    issue: Uso de «flocks» en el texto español
    rationale: Es un anglicismo evidente y no preserva una redacción española fiel ni publicable. Debe reemplazarse por «rebaños».
  - severity: medium
    issue: La nota [a] añade una alternativa innecesaria sobre «mandó llamar»
    rationale: El English POB coloca las notas en «remain behind» y «little ones», no en «dijo». Además, la nota actual mezcla explicación contextual no necesaria. Conviene eliminarla para evitar ruido y mantener disciplina de notas.
  - severity: medium
    issue: «Sus ganados» es menos natural en pareja con «rebaños»
    rationale: Aunque comprensible, en español bíblico más claro y digno conviene una pareja léxica más concreta para בקר. «Vacadas» refleja ganado mayor/bovino con naturalidad contextual.
  revised_spanish_text: 'Entonces Faraón llamó a Moisés y dijo: «Vayan, sirvan a Yahvé. Solo queden atrás[a] sus rebaños y sus vacadas; incluso sus pequeños[b] pueden ir con ustedes».'
  revised_footnotes:
  - marker: a
    text: O «permanezcan atrás»; el verbo hebreo permite la idea de quedar dejados en un lugar.
    reason: lexical_alternative
  - marker: b
    text: O «sus niños».
    reason: lexical_alternative
  revision_rationale: 'Se corrige el anglicismo «flocks» por «rebaños», se mejora la naturalidad de בקר con «vacadas», y se reubican las notas para que correspondan a las alternativas léxicas relevantes preservadas en la auditoría inglesa: «queden atrás / permanezcan atrás» y «sus pequeños / sus niños». Se elimina la nota innecesaria sobre «llamó».'
