translation:
  language: es
  text: 'Y su ofrenda de grano será flor de harina mezclada con aceite: tres décimas[a] para cada toro, para los trece toros, y dos décimas para cada carnero, para los dos carneros.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Las 'décimas' corresponden a medidas de capacidad; tradicionalmente se entienden como décimas de un efa.
    reason: cultural_note
lexical_decisions:
- source_word: וּמִנְחָתָם
  english_pob_choice: And their grain offering
  chosen_spanish: Y su ofrenda
  alternatives_spanish:
  - Y su ofrenda vegetal
  - Y su ofrenda de cereal
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial puede referirse a la ofrenda vegetal o de cereal, pero en español 'ofrenda' es el término más natural y abarcaría el valor cultual; el contexto inmediato de harina y aceite deja claro que se trata de la ofrenda de grano sin necesidad de añadir una glosa pesada en el texto principal.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina de calidad fina
  lexicon: HALOT
  rationale: El término técnico cultual se expresa de manera estable como 'flor de harina' en español bíblico y transmite mejor la harina finamente molida requerida para la ofrenda.
- source_word: בְּלוּלָה בַשָּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - mezclada en aceite
  - amasada con aceite
  lexicon: HALOT
  rationale: El participio pasivo indica una mezcla preparada con aceite; 'mezclada con aceite' es claro, fiel y natural en español.
- source_word: שְׁלֹשָׁה עֶשְׂרֹנִים
  english_pob_choice: three-tenths
  chosen_spanish: tres décimas
  alternatives_spanish:
  - tres medidas décimas
  - tres décimas de efa
  lexicon: HALOT
  rationale: Se conserva la medida cultual breve del hebreo, como en la POB inglesa. En español, 'décimas' comunica la fracción de manera idiomática sin añadir un equivalente interpretativo que no está explícito en el versículo.
- source_word: לַפָּר הָאֶחָד
  english_pob_choice: for each bull
  chosen_spanish: para cada toro
  alternatives_spanish:
  - para un toro
  - para el toro
  lexicon: HALOT
  rationale: La construcción distributiva del hebreo se vierte de forma natural en español con 'para cada', evitando una literalidad poco clara ('para el toro uno'). 'Toro' es el equivalente habitual y comprensible de פָּר.
- source_word: לִשְׁלֹשָׁה עָשָׂר פָּרִים
  english_pob_choice: for the thirteen bulls
  chosen_spanish: para los trece toros
  alternatives_spanish:
  - para trece toros
  lexicon: HALOT
  rationale: Se mantiene la enumeración total del grupo sacrificial. El artículo en español ayuda a marcar el conjunto definido de los toros mencionados en la serie.
- source_word: שְׁנֵי עֶשְׂרֹנִים
  english_pob_choice: two-tenths
  chosen_spanish: dos décimas
  alternatives_spanish:
  - dos medidas décimas
  - dos décimas de efa
  lexicon: HALOT
  rationale: Se conserva la misma medida cultual abreviada que en el hebreo y en la traducción inglesa, con una formulación española natural y paralela a 'tres décimas'.
- source_word: לָאַיִל הָאֶחָד
  english_pob_choice: for each ram
  chosen_spanish: para cada carnero
  alternatives_spanish:
  - para un carnero
  - para el carnero
  lexicon: HALOT
  rationale: La relación distributiva se expresa con 'para cada carnero'. 'Carnero' refleja mejor la clase de animal sacrificable que 'oveja' y mantiene el paralelismo con los toros.
- source_word: לִשְׁנֵי הָאֵילִם
  english_pob_choice: for the two rams
  chosen_spanish: para los dos carneros
  alternatives_spanish:
  - para dos carneros
  lexicon: HALOT
  rationale: Se preserva el total del grupo sacrificial con una expresión española natural. 'Los dos carneros' corresponde al conjunto definido del hebreo.
translation_notes:
  revision_awareness: El texto hebreo y la POB inglesa están en alto acuerdo; no se requieren correcciones textuales ni ajustes de sentido. Se ha mantenido la estructura distributiva del original y la medida cultual abreviada, con una nota para aclarar el valor tradicional de la unidad de medida.
  spanish_consistency_notes:
  - Se usó 'ofrenda' como término genérico cultual, y se dejó que el contexto de harina y aceite precisara que se trata de una ofrenda de cereal/grano.
  - 'Se mantuvo el paralelismo numérico exacto: tres décimas para cada toro/trece toros, dos décimas para cada carnero/dos carneros.'
  - Se eligió 'toro' y 'carnero' por ser equivalentes naturales y precisos en español para פָּר y אַיִל en contexto sacrificial.
  - La nota al pie aclara la medida sin sobrecargar el texto principal.
