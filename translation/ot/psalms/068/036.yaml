id: PSA.68.36
reference: Psalms 68:36
source:
  edition: WLC
  text: נ֤וֹרָ֥א אֱלֹהִ֗ים מִֽ/מִּקְדָּ֫שֶׁ֥י/ךָ אֵ֤ל יִשְׂרָאֵ֗ל ה֤וּא נֹתֵ֨ן עֹ֖ז וְ/תַעֲצֻמ֥וֹת לָ/עָ֗ם בָּר֥וּךְ אֱלֹהִֽים׀׃
translation:
  text: Awesome is God from your sanctuaries; the God of Israel—he gives strength and mighty power to the people[a]. Blessed be God!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from your sanctuary' or 'in your sanctuary.' The Hebrew reads 'from your sanctuaries,' a plural form that may refer to God's holy dwelling in a majestic or collective sense.
    reason: alternative_reading
lexical_decisions:
- source_word: נוֹרָא
  chosen: Awesome
  alternatives:
  - fearsome
  - dreadful
  - to be feared
  lexicon: HALOT
  rationale: The adjective denotes that God inspires awe and reverent fear. 'Awesome' is natural modern English and preserves the sense of overwhelming majesty better than the potentially misleading 'terrible' or the more wooden 'to be feared.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the plural form refers to the one God of Israel and is best rendered by the singular 'God.'
- source_word: מִמִּקְדָּשֶׁיךָ
  lemma: מִן
  chosen: from your sanctuaries
  alternatives:
  - from your sanctuary
  - in your sanctuary
  - from your holy places
  lexicon: HALOT
  rationale: The form is plural with 2ms suffix, literally 'from your sanctuaries/holy places.' The preposition מִן is retained as 'from.' The plural is preserved in the main text rather than normalized to singular, though singular is a plausible idiomatic alternative in English and in some interpretive traditions.
- source_word: אֵל יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - God of Israel
  - O God of Israel
  lexicon: HALOT
  rationale: This is a nominal apposition identifying the God just mentioned as Israel's God. The definite article is supplied idiomatically in English.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The pronoun is explicit for emphasis. English can reflect this with 'he'; stronger emphasis such as 'he himself' is possible but not necessary.
- source_word: נֹתֵן
  chosen: gives
  alternatives:
  - is giving
  - grants
  lexicon: HALOT
  rationale: The participle expresses characteristic action; simple present 'gives' communicates this well in English.
- source_word: עֹז
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: HALOT
  rationale: A common sense of עֹז is strength or might. 'Strength' pairs well with the following plural noun and avoids redundancy with the next term.
- source_word: וְתַעֲצֻמוֹת
  chosen: mighty power
  alternatives:
  - abundance of strength
  - great might
  - power
  lexicon: HALOT
  rationale: The noun denotes powerful might or intensities of strength. Rendering it as 'mighty power' preserves the intensification alongside עֹז without collapsing the two terms into a single English word.
- source_word: לָעָם
  chosen: to the people
  alternatives:
  - to his people
  - to the nation
  lexicon: HALOT
  rationale: The Hebrew has simply 'to the people.' While context may suggest Israel, the possessive 'his' is not explicit and should not be added to the main text.
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Blessed is
  - May ... be blessed
  lexicon: HALOT
  rationale: This doxological formula is naturally rendered 'Blessed be God!' in English, preserving the exclamatory blessing.
