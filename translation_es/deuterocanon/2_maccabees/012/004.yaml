translation:
  language: es
  text: Pero después de la resolución común de la ciudad, y cuando estos la habían aceptado como si quisieran la paz y no tuvieran nada sospechoso[a], se los llevaron y los ahogaron, no menos de doscientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no tuvieran nada sospechoso en mente»; el griego puede describir tanto su aparente inocencia como la ausencia de intención sospechosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ κοινὸν τῆς πόλεως ψήφισμα
  english_pob_choice: the common resolution of the city
  chosen_spanish: el decreto común de la ciudad
  alternatives_spanish:
  - la resolución común de la ciudad
  - el acuerdo común de la ciudad
  - el decreto público de la ciudad
  lexicon: LSJ
  rationale: ψήφισμα puede ser una decisión formal, decreto o resolución. «Decreto» comunica bien el acto cívico formal; «común» conserva τὸ κοινόν como una decisión compartida de la ciudad.
- source_word: τούτων ἐπιδεξαμένων
  english_pob_choice: these men had accepted it
  chosen_spanish: éstos lo habían aceptado
  alternatives_spanish:
  - éstos habían accedido a ello
  - éstos lo habían recibido
  lexicon: LSJ
  rationale: ἐπιδέχομαι aquí expresa aceptar o dar asentimiento a la propuesta de la ciudad. «Lo habían aceptado» es natural y mantiene el sentido participial.
- source_word: ὡς ἂν εἰρηνεύειν θέλοντων
  english_pob_choice: as though they wanted peace
  chosen_spanish: como si quisieran la paz
  alternatives_spanish:
  - como si desearan vivir en paz
  - con apariencia de querer la paz
  lexicon: LSJ
  rationale: La construcción sugiere apariencia o valoración de que querían la paz. «Como si quisieran la paz» preserva el matiz sin añadir más interpretación de la necesaria.
- source_word: μηδὲν ὑπόπτον ἐχόντων
  english_pob_choice: had nothing suspicious in mind
  chosen_spanish: no tuvieran nada sospechoso
  alternatives_spanish:
  - no tuvieran nada sospechoso en mente
  - no presentaran nada sospechoso
  lexicon: LSJ
  rationale: ὑπόπτον puede significar sospechoso o digno de sospecha. En español, la formulación negativa directa («no tuvieran nada sospechoso») conserva la ambigüedad entre apariencia inocente y ausencia de intención sospechosa.
- source_word: ἀχθέντας
  english_pob_choice: they took them away
  chosen_spanish: los llevaron lejos
  alternatives_spanish:
  - los condujeron lejos
  - los llevaron aparte
  lexicon: LSJ
  rationale: ἀχθέντας, participio pasivo de ἄγω, es «habiendo sido llevados». «Los llevaron lejos» da una traducción fluida y evita precisar un lugar o destino que el griego no explicita.
- source_word: ἐβύθισαν
  english_pob_choice: drowned them
  chosen_spanish: los ahogaron
  alternatives_spanish:
  - los hundieron
  - los sumergieron hasta matarlos
  lexicon: LSJ
  rationale: βυθίζω significa hundir o sumergir en lo profundo; con objeto humano, «ahogaron» expresa el resultado de forma clara en español.
- source_word: ὄντας οὐκ ἔλαττον τῶν διακοσίων
  english_pob_choice: no fewer than two hundred of them
  chosen_spanish: siendo no menos de doscientos
  alternatives_spanish:
  - no menos de doscientos
  - por lo menos doscientos
  lexicon: LSJ
  rationale: La frase establece un mínimo numérico. «Siendo no menos de doscientos» conserva el valor de οὐκ ἔλαττον sin convertirlo en una paráfrasis más libre.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió «took them out» por «took them away» para no implicar un lugar específico; por eso se optó por «los llevaron lejos», manteniendo la misma neutralidad espacial en español. También se preservó la ambigüedad de ὑπόπτον con una nota de alternativa lexical.
  spanish_consistency_notes:
  - Se mantuvo «paz» para εἰρηνεύειν, en línea con el valor verbal del griego, sin expandirlo innecesariamente a «vivir en paz».
  - Se usó «decreto» para ψήφισμα porque el contexto es cívico y formal; no se sustituyó por formulaciones eclesiásticas.
  - El número «doscientos» se expresó con un giro que conserva el límite mínimo del griego.
  - La nota [a] está anclada en el texto para cumplir la advertencia lexical sobre ὑπόπτον.
