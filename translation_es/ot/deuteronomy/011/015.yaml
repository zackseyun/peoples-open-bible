translation:
  language: es
  text: Y daré pasto en tu campo para tu ganado[a], y comerás y te saciarás[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hierba», «vegetación» o «forraje»; el término hebreo puede referirse ampliamente al crecimiento vegetal, pero aquí probablemente significa alimento para el ganado.
    reason: lexical_alternative
  - marker: b
    text: O «quedarás satisfecho». El verbo hebreo denota estar lleno o satisfecho después de comer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will give
  chosen_spanish: Y daré
  alternatives_spanish:
  - Y proveeré
  - Entonces daré
  lexicon: HALOT
  rationale: El hebreo usa una forma perfecta con prefijo conjuntivo en contexto de promesa; en español, el futuro simple transmite mejor la acción prometida. Conservé la conjunción inicial con «Y» para mantener la secuencia discursiva del contexto de bendición.
- source_word: עֵשֶׂב
  english_pob_choice: grass
  chosen_spanish: pasto
  alternatives_spanish:
  - hierba
  - vegetación
  - forraje
  lexicon: HALOT
  rationale: En combinación con «para tu ganado», el término apunta a vegetación destinada al alimento de los animales. «Pasto» comunica de manera natural esa idea de alimento para el ganado sin perder el sentido amplio posible del hebreo.
- source_word: בְּשָׂדְךָ
  english_pob_choice: in your field
  chosen_spanish: en tu campo
  alternatives_spanish:
  - en tu tierra
  - en tu pastizal
  lexicon: HALOT
  rationale: «Campo» preserva el sentido concreto de שָׂדֶה y refleja mejor el escenario agrícola que «tierra», que sería más general. Mantiene además la singularidad del hebreo.
- source_word: לִבְהֶמְתֶּךָ
  english_pob_choice: for your livestock
  chosen_spanish: para tu ganado
  alternatives_spanish:
  - para tus animales
  - para tus bestias
  lexicon: HALOT
  rationale: בְּהֵמָה aquí es colectivo y se refiere a animales domésticos en un contexto agrario. «Ganado» expresa bien ese sentido colectivo en español moderno y resulta más natural que opciones más amplias o más arcaicas.
- source_word: וְאָכַלְתָּ
  english_pob_choice: and you will eat
  chosen_spanish: y comerás
  alternatives_spanish:
  - y comerás de ello
  - y has de comer
  lexicon: HALOT
  rationale: Se conserva el futuro dirigido a la segunda persona singular, como en el hebreo, sin pluralizar ni suavizar el valor directo de la promesa.
- source_word: וְשָׂבָעְתָּ
  english_pob_choice: and be satisfied
  chosen_spanish: y te saciarás
  alternatives_spanish:
  - y quedarás satisfecho
  - y te llenarás
  lexicon: HALOT
  rationale: El verbo indica quedar lleno o satisfecho después de comer. «Te saciarás» reproduce bien ese resultado completo y es idiomático en español bíblico contemporáneo.
theological_decisions:
- issue: Sujeto representativo singular para Israel
  english_pob_reading: Retain second-person singular ('your field,' 'your livestock,' 'you will eat')
  chosen_spanish_reading: Mantener la segunda persona singular («tu campo», «tu ganado», «comerás»)
  alternative_spanish_readings:
  - 'Pluralizar para español contemporáneo: «sus campos ... comerán»'
  - Usar un singular genérico menos marcado
  rationale: El hebreo conserva de manera consistente la segunda persona singular masculina al dirigirse a Israel como representante. Mantenerla en español preserva la forma retórica y el vínculo directo del pacto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Naturaleza de la bendición prometida
  english_pob_reading: Translate as ordinary covenantal agricultural provision without expanding the sense
  chosen_spanish_reading: Traducir como provisión agrícola del pacto, sin ampliar a una idea general de prosperidad
  alternative_spanish_readings:
  - Expresar más explícitamente abundancia o prosperidad
  - Parafrasear como provisión total
  rationale: El verso habla de pasto para el ganado y alimento suficiente para saciarse. La redacción evita introducir matices teológicos más amplios que no están explícitos en el hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 3
translation_notes:
  revision_awareness: Alineado con el último pase de revisión, que señaló alto acuerdo y sin cambios necesarios. La redacción española conserva la fuerza promesal del hebreo, la singularidad representativa y la ambigüedad controlada de עֵשֶׂב en un contexto de forraje.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según la política del proyecto solo cuando el versículo lo requiera; este verso no lo incluye explícitamente.
  - Se evitó «SEÑOR» y también «Cristo», por no corresponder al contenido del versículo.
  - «Pasto» y «ganado» forman una combinación natural en español y respetan el contexto agrícola.
  - Los corchetes de nota están anclados en el término principal para reflejar la alternativa léxica del hebreo.
