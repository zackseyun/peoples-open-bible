id: 2CH.20.27
reference: 2 Chronicles 20:27
source:
  edition: WLC
  text: וַ֠/יָּשֻׁבוּ כָּל אִ֨ישׁ יְהוּדָ֤ה וִֽ/ירוּשָׁלִַ֨ם֙ וִֽ/יהוֹשָׁפָ֣ט בְּ/רֹאשָׁ֔/ם לָ/שׁ֥וּב אֶל יְרוּשָׁלִַ֖ם בְּ/שִׂמְחָ֑ה כִּֽי שִׂמְּחָ֥/ם יְהוָ֖ה מֵֽ/אוֹיְבֵי/הֶֽם־־־׃
translation:
  text: Then all the men of Judah and Jerusalem returned[a], with Jehoshaphat at their head, to return to Jerusalem with joy[b], because Yahweh had made them rejoice over their enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the men of Judah and Jerusalem.' The Hebrew literally has 'every man of Judah and Jerusalem,' a distributive expression for the whole group.
    reason: lexical_alternative
  - marker: b
    text: Or 'returned to go back'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: HALOT
  rationale: From שוב, here a narrative wayyiqtol indicating the group's return from the battlefield. 'Returned' is natural English and preserves the motion sense.
- source_word: כָּל אִישׁ יְהוּדָה וִירוּשָׁלַם
  chosen: every man of Judah and Jerusalem
  alternatives:
  - all the men of Judah and Jerusalem
  - everyone of Judah and Jerusalem
  lexicon: HALOT
  rationale: Literally 'every man of Judah and Jerusalem.' Per gender-accurate policy, 'man' is retained rather than neutralizing, since אִישׁ is singular distributive with collective force. 'Every man' also matches the Hebrew idiom better than the smoother but less literal 'everyone.'
- source_word: וִיהוֹשָׁפָט בְּרֹאשָׁם
  chosen: with Jehoshaphat at their head
  alternatives:
  - and Jehoshaphat at their head
  - with Jehoshaphat leading them
  lexicon: HALOT
  rationale: בְּרֹאשָׁם is idiomatic for leadership or position at the front. 'At their head' preserves the metaphor closely while remaining readable.
- source_word: לָשׁוּב אֶל יְרוּשָׁלַם
  chosen: to go back to Jerusalem
  alternatives:
  - to return to Jerusalem
  lexicon: HALOT
  rationale: The infinitive of שוב after the finite verb creates a purposive/resultative sense. Because English already used 'returned' for וַיָּשֻׁבוּ, 'to go back' avoids awkward repetition while preserving the duplicated Hebrew root's emphasis on the homeward movement.
- source_word: בְּשִׂמְחָה
  chosen: with joy
  alternatives:
  - in joy
  - rejoicing
  lexicon: HALOT
  rationale: A straightforward rendering of the noun שִׂמְחָה. 'With joy' is idiomatic and keeps the nounal form.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for their joyful return. 'Because' is clearer in modern English than 'for.'
- source_word: שִׂמְּחָם
  chosen: had made them rejoice
  alternatives:
  - had given them joy
  - had gladdened them
  lexicon: HALOT
  rationale: Piel of שׂמח with object suffix means to cause someone to rejoice. 'Had made them rejoice' preserves the causative force more explicitly than the more idiomatic but less transparent 'had given them joy.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֵאֹיְבֵיהֶם
  chosen: over their enemies
  alternatives:
  - from their enemies
  - because of their enemies
  lexicon: HALOT
  rationale: The preposition מן after a verb of rejoicing can mark the occasion or object in relation to which joy is experienced. In context, the sense is triumph over enemies whom the LORD has defeated, so 'over their enemies' communicates the meaning most clearly in English.
