id: MAT.11.27
reference: Matthew 11:27
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Πάντα μοι παρεδόθη ὑπὸ τοῦ πατρός μου, καὶ οὐδεὶς ἐπιγινώσκει τὸν υἱὸν εἰ μὴ ὁ πατήρ, οὐδὲ τὸν πατέρα τις ἐπιγινώσκει εἰ μὴ ὁ υἱὸς καὶ ᾧ ἐὰν βούληται ὁ υἱὸς ἀποκαλύψαι.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/011/027.yaml
  text: 'All things have been handed over to me by my Father[a], and no one knows the Son except the Father[b], nor does anyone know the Father except the Son and anyone to whom the Son chooses to reveal him.'
  footnotes:
  - marker: a
    text: Or 'knows' or 'truly knows' for 'fully knows' in both clauses; the Greek verb can denote knowing fully or intimately.
    reason: lexical_alternative
  - marker: b
    text: Or 'whomever the Son wills to reveal him to.'
    reason: lexical_alternative
translation:
  language: ko
  text: '모든 것이 내 아버지로부터 내게 넘겨졌으니, 아버지 외에는 아무도 아들을 알지 못하고, 아들과 아들이 나타내 보이기를 원하는 자 외에는 아무도 아버지를 알지 못한다.'
  philosophy: optimal-equivalence
theological_decisions:
- issue: 11:27 아들과 아버지의 상호 인식 — 그리스도론적 본문
  chosen_reading: 「아버지 외에는 아무도 아들을 알지 못하고, 아들 ... 외에는 아무도 아버지를 알지 못한다」
  alternative_readings:
  - 「아무도 진정으로 알지 못한다」 등의 부드러운 표현
  rationale: 본문은 위격 간 직접적·독점적 상호 인식을 분명히 한다. 공관복음에서 가장 「요한적」인 본문 중 하나로, 그리스도론의 무게를 흐리지 않도록 직역에 가깝게 옮긴다.
  doctrine_reference: 'DOCTRINE.md: §5'
