translation:
  text: Be made holy from all wickedness and from all crookedness. But you do not want to depart from
    your wickedness. Now then, listen to me and be at peace among yourselves, and look after one another
    and support one another; and do not alone partake of God’s creatures in an overflow of abundance,
    but share also with those who are in want. For some, from their many foods, bring weakness upon the
    flesh and ruin their flesh; but the flesh of those who do not have food is ruined because they do
    not have enough nourishment, and their body is destroyed. This lack of moderation then is harmful
    to you who have and do not share with those who lack. Look to the judgment that is coming. Therefore,
    you who are well-off, seek out the hungry while the tower is not yet finished; for after the tower
    has been finished you will want to do good, and you will not have a place. So watch, you who pride
    yourselves in your wealth, lest those in need should groan, and their groaning go up to the Lord,
    and you be shut out together with your useless goods outside the door of the tower.
  philosophy: optimal-equivalence
