translation:
  text: He declares the changes that are coming[b][a], and reveals the search of hidden things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''He declares what has passed and what is to come, and reveals the traces of hidden things.'' This reflects a fuller temporal expansion than the extant Hebrew.'
    reason: alternative_reading
  - marker: b
    text: The Masada scroll for this section is fragmentary and does not preserve this verse in a form sufficient to replace the Cairo Geniza wording here.
    reason: textual_variant
lexical_decisions:
- source_word: מחוה
  chosen: declares
  alternatives:
  - makes known
  - announces
  - shows
  lexicon: HALOT
  rationale: The Hebrew verb here carries the sense of making something known or reporting it. 'Declares' fits the elevated wisdom context and aligns well with the Greek parallel ἀπαγγέλλων ('reporting, declaring') without becoming overly formal.
- source_word: חליפות
  chosen: the changes
  alternatives:
  - successions
  - alternations
  - what passes by
  lexicon: HALOT
  rationale: The noun suggests changes, alternations, or successive developments. 'The changes' is the most natural English rendering from the Hebrew. The Greek parallel's τὰ παρεληλυθότα καὶ ἐπεσόμενα points toward temporal succession, which supports understanding this as the course of changing events rather than a narrow physical 'exchange'.
- source_word: נהיות
  chosen: that are coming to be
  alternatives:
  - that happen
  - that come about
  - future things
  lexicon: HALOT
  rationale: From היה, the participial/plural form points to things that come into being or happen. 'That are coming to be' preserves the Hebrew verbal nuance. The Greek parallel expands toward past and future events, but the Hebrew wording itself is better represented by an emergence/becoming sense.
- source_word: ומגלה
  chosen: and reveals
  alternatives:
  - and uncovers
  - and discloses
  lexicon: HALOT
  rationale: A standard rendering for גלה in contexts of disclosure. 'Reveals' is clear modern English and suits the wisdom theme of divine disclosure.
- source_word: חקר
  chosen: the investigation
  alternatives:
  - the depths
  - the searching out
  - the inquiry
  lexicon: HALOT
  rationale: The noun can denote searching, investigation, or probing inquiry. Because the Hebrew says 'reveals the חקר of hidden things,' a noun of inquiry fits better than an abstract 'depths.' This also avoids importing the Masada fragment's separate wording about 'depth and heart' into the main text.
- source_word: נסתרות
  chosen: hidden things
  alternatives:
  - secret things
  - what is concealed
  lexicon: HALOT
  rationale: A straightforward rendering of the feminine plural passive participle/noun. 'Hidden things' is idiomatic and preserves the broad scope of what is concealed.
