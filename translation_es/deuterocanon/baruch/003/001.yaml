translation:
  language: es
  text: Señor Todopoderoso, Dios de Israel, un alma en angustia y un espíritu desfallecido clama a ti.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un alma en estrecheces y un espíritu desalentado ha clamado a ti». Los términos griegos también pueden sugerir aflicción severa y pérdida de ánimo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Dueño
  lexicon: BDAG / uso litúrgico bíblico
  rationale: En vocativo divino, «Señor» es la equivalencia española natural y reverente para κύριε. Conserva el tono de oración directa sin introducir una paráfrasis más interpretativa.
- source_word: Παντοκράτωρ
  english_pob_choice: Almighty
  chosen_spanish: Todopoderoso
  alternatives_spanish:
  - Omnipotente
  - Soberano de todo
  lexicon: LEH
  rationale: «Todopoderoso» comunica con claridad el título divino de dominio universal. En español suena más fluido que un calco técnico y mantiene la fuerza teológica del título.
- source_word: ὁ θεὸς Ἰσραήλ
  english_pob_choice: God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - Dios del Israel
  lexicon: LEH
  rationale: Se preserva el título pactal sin añadir artículos innecesarios en el vocativo. «Dios de Israel» es natural y fiel a la relación covenantal del texto.
- source_word: ψυχὴ
  english_pob_choice: a soul
  chosen_spanish: un alma
  alternatives_spanish:
  - una vida
  - una persona
  lexicon: LEH
  rationale: «Alma» conserva el registro antropológico y de lamento del griego. «Persona» aplanaría el matiz interior; «vida» desplazaría el foco hacia la existencia externa.
- source_word: ἐν στενοῖς
  english_pob_choice: in distress
  chosen_spanish: en angustia
  alternatives_spanish:
  - en aprieto
  - en aflicción
  - en estrechez
  lexicon: LEH
  rationale: La expresión idiomática apunta a aflicción o constricción extrema. «Angustia» comunica bien el sentido de opresión interior y circunstancial en español moderno.
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: un espíritu
  alternatives_spanish:
  - un aliento
  - un ánimo
  lexicon: LEH
  rationale: Se conserva el paralelismo con ψυχή como término interior distinto. «Espíritu» es el equivalente más directo; «ánimo» suavizaría el alcance semántico del original.
- source_word: ἀκηδιῶν
  english_pob_choice: faint
  chosen_spanish: desfallecido
  alternatives_spanish:
  - abatido
  - desanimado
  - desfalleciente
  lexicon: LEH
  rationale: La revisión inglesa apuntó a un valor más cercano a debilidad/decadencia interior que a mera desmotivación. «Desfallecido» transmite mejor ese matiz de pérdida de vigor y ánimo.
- source_word: κέκραγεν
  english_pob_choice: cry out
  chosen_spanish: claman
  alternatives_spanish:
  - clama
  - han clamado
  - gritan
  lexicon: BDAG
  rationale: El griego usa un perfecto con valor presente-resultativo, pero el sujeto poético puede entenderse colectivamente. «Claman» mantiene la fuerza actual de la súplica y evita una perífrasis pesada en español.
- source_word: πρὸς σέ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  - para ti
  lexicon: BDAG
  rationale: En lenguaje de oración, «a ti» es la equivalencia idiomática más natural en español y preserva la dirección personal del clamor.
theological_decisions:
- issue: Título divino κύριε Παντοκράτωρ
  english_pob_reading: Lord Almighty
  chosen_spanish_reading: Señor Todopoderoso
  alternative_spanish_readings:
  - Señor Omnipotente
  - Señor Soberano
  rationale: Se mantiene la combinación de vocativo reverente y título de poder universal. No se reemplaza por una fórmula eclesiástica opaca; la traducción conserva accesibilidad y densidad teológica.
  doctrine_reference: 'DOCTRINE.md: preservar títulos divinos y su fuerza contextual; no mascarar el nombre o título sin razón textual.'
- issue: Paralelismo antropológico ψυχὴ / πνεῦμα
  english_pob_reading: a soul in distress and a faint spirit
  chosen_spanish_reading: un alma en angustia y un espíritu desfallecido
  alternative_spanish_readings:
  - una persona en angustia y un espíritu abatido
  - un alma en aprieto y un espíritu desanimado
  rationale: Se conservan dos términos interiores distintos para respetar la paralelismo poético y la tensión antropológica del pasaje. No se colapsa en un solo equivalente psicológico.
  doctrine_reference: 'DOCTRINE.md: preservar tensión teológica y literaria; no resolver prematuramente la antropología bíblica.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: se refleja el giro de un perfecto traducido como clamor vigente/actual y el ajuste léxico de ἀκηδιῶν hacia una debilidad interior más cercana a «faint». En español se decidió mantener el presente plural «claman» para conservar la fuerza presente del lamento colectivo implícito y una cadencia natural de oración.'
  spanish_consistency_notes:
  - Se mantiene «Dios de Israel» como título pactal, no «el Dios de Israel» salvo en contextos donde el artículo español resulte necesario.
  - Se usa «alma» y «espíritu» de forma distinta para respetar el paralelismo del original.
  - «Todopoderoso» se usa como equivalente principal de Παντοκράτωρ, coherente con el audit trail inglés y el registro bíblico en español.
  - Se evita «SEÑOR» en versales porque el texto base aquí no depende de un enmascaramiento tipográfico del nombre divino, sino de un vocativo griego a Dios.
