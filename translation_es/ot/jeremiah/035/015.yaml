- from: 'Y envié a ustedes a todos mis siervos, los profetas[a], madrugando y enviándolos, para decir: «Vuélvanse, por favor, cada uno[b] de su mal camino, y mejoren sus obras, y no anden tras dioses ajenos para servirlos. Vuelvan a la tierra que di a ustedes y a sus padres». Pero no inclinaron su oído ni me escucharon.'
  to: 'Y envié a ustedes a todos mis siervos, los profetas, madrugando y enviándolos[c], para decir: «Vuélvanse[a], por favor, cada uno[b] de su mal camino, y mejoren sus obras[d], y no anden tras dioses ajenos para servirlos. Entonces habiten en la tierra que di a ustedes y a sus padres». Pero no inclinaron su oído ni me escucharon.'
