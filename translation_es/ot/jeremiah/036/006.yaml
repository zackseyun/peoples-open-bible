translation:
  language: es
  text: Así que tú mismo debes ir y leer del rollo que escribiste de mi boca[a] las palabras de Yahvé, a oídos del pueblo, en la casa de Yahvé, en un día de ayuno[b]; y también las leerás a oídos de todo Judá que viene de sus ciudades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Lit. ‘que escribiste de mi boca’; también puede entenderse: ‘que escribiste a mi dictado’.'
    reason: lexical_alternative
  - marker: b
    text: ‘La casa de Yahvé’ designa aquí el templo.
    reason: cultural_note
lexical_decisions:
- source_word: וּבָאתָ אַתָּה
  english_pob_choice: So you yourself must go
  chosen_spanish: Así que tú mismo debes ir
  alternatives_spanish:
  - Y tú irás
  - Entonces debes ir tú mismo
  lexicon: HALOT
  rationale: El hebreo añade énfasis con אַתָּה; ‘tú mismo’ lo conserva de manera natural en español. ‘Debes ir’ refleja mejor el valor exhortativo/mandativo del contexto que una simple narración futura.
- source_word: וְקָרָאתָ
  english_pob_choice: and read
  chosen_spanish: y leer
  alternatives_spanish:
  - y proclamar
  - y leer en voz alta
  lexicon: HALOT
  rationale: Con un objeto escrito, קרא significa leer; el contexto público ya implica lectura oral. ‘Leer’ evita añadir una paráfrasis no requerida por el hebreo.
- source_word: בַמְּגִלָּה
  english_pob_choice: from the scroll
  chosen_spanish: del rollo
  alternatives_spanish:
  - de la escritura
  - de la hoja
  lexicon: HALOT
  rationale: En español, ‘rollo’ comunica bien מְגִלָּה y mantiene la imagen material del texto escrito. La preposición ‘de’ naturaliza el valor instrumental/documental de ב con ‘leer’.
- source_word: אֲשֶׁר כָּתַבְתָּ מִפִּי
  english_pob_choice: that you wrote from my mouth
  chosen_spanish: que escribiste de mi boca
  alternatives_spanish:
  - que escribiste de mis labios
  - que escribiste al dictado de mí
  lexicon: HALOT
  rationale: ‘De mi boca’ conserva la expresión hebrea y su fuerza concreta. ‘Al dictado’ explicita el sentido, pero suaviza la metáfora y añade interpretación; por eso no se usa en el texto principal.
- source_word: אֶת דִּבְרֵי יְהוָה
  english_pob_choice: the words of Yahweh
  chosen_spanish: las palabras de Yahvé
  alternatives_spanish:
  - las palabras del SEÑOR
  - los dichos de Yahvé
  lexicon: HALOT
  rationale: ‘Palabras’ refleja דִּבְרֵי en este contexto de discurso profético. Se mantiene ‘Yahvé’ según la norma del proyecto para el nombre divino en lugar de sustituirlo por un título.
- source_word: בְּאָזְנֵי הָעָם
  english_pob_choice: in the hearing of the people
  chosen_spanish: en presencia del pueblo
  alternatives_spanish:
  - al oído del pueblo
  - en la audiencia del pueblo
  lexicon: HALOT
  rationale: La idiomática hebrea apunta a una lectura pública audible. ‘En presencia del pueblo’ comunica de forma natural el escenario público sin perder la fuerza comunitaria del pasaje.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se conserva ‘casa de Yahvé’ porque refleja el hebreo בית יהוה con mayor fidelidad que ‘templo’, aunque el referente sea el templo. La expresión mantiene la imagen bíblica tradicional sin ocultarla.
- source_word: בְּיוֹם צֹום
  english_pob_choice: on a day of fasting
  chosen_spanish: en un día de ayuno
  alternatives_spanish:
  - en el día del ayuno
  - en un día de fasto
  lexicon: HALOT
  rationale: ‘Ayuno’ reproduce צֹום de forma directa y clara. ‘Día de ayuno’ es más natural en español que ‘día de ayunar’ y no presupone más de lo que el texto dice.
- source_word: וְגַם
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - además
  - y asimismo
  lexicon: HALOT
  rationale: La partícula añade una segunda audiencia; ‘y también’ preserva esa adición de manera simple y clara.
- source_word: בְּאָזְנֵי כָל יְהוּדָה
  english_pob_choice: in the hearing of all Judah
  chosen_spanish: en presencia de todo Judá
  alternatives_spanish:
  - al oído de todo Judá
  - ante todo Judá
  lexicon: HALOT
  rationale: Se mantiene el sentido de proclamación pública para todo el pueblo de Judá. ‘Presencia’ evita una traducción demasiado literal de ‘oídos’ y suena natural en español, sin perder el carácter auditivo del mandato.
- source_word: הַבָּאִים מֵעָרֵיהֶם
  english_pob_choice: who come from their cities
  chosen_spanish: los que vienen de sus ciudades
  alternatives_spanish:
  - los que llegan de sus ciudades
  - los que vienen de sus pueblos
  lexicon: HALOT
  rationale: ‘Los que vienen de sus ciudades’ refleja el participio presente y el origen local de los oyentes. Se conserva ‘ciudades’ porque corresponde al sustantivo hebreo עָרִים.
- source_word: תִּקְרָאֵם
  english_pob_choice: you must also read them
  chosen_spanish: y también las leerás
  alternatives_spanish:
  - y también debes leerlas
  - y también las proclamarás
  lexicon: HALOT
  rationale: El sufijo pronominal remite a ‘las palabras’. ‘Las leerás’ mantiene la repetición del verbo leer y la continuidad del mandato; el valor de futuro mandatorio queda claro en el contexto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Siguiendo la convención del proyecto en español, se translitera como ‘Yahvé’ para preservar el nombre propio divino en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Traducción de בֵּית יְהוָה
  english_pob_reading: the house of Yahweh
  chosen_spanish_reading: la casa de Yahvé
  alternative_spanish_readings:
  - el templo de Yahvé
  - la casa del Señor
  rationale: Aunque el referente histórico es el templo, el hebreo dice literalmente ‘casa’. Mantener esa formulación conserva la imagen y la textura del original sin oscurecer el sentido.
  doctrine_reference: 'DOCTRINE.md: Render Hebrew concrete cultic locations with source-transparent phrasing when intelligible'
- issue: Idioma de lectura pública בְּאָזְנֵי
  english_pob_reading: in the hearing of
  chosen_spanish_reading: en presencia de
  alternative_spanish_readings:
  - al oído de
  - ante
  rationale: La expresión hebrea es auditiva, pero en español la fórmula ‘en presencia de’ transmite de modo natural la escena pública de proclamación. No niega el oír; lo presupone en contexto.
  doctrine_reference: 'POB Spanish style guidance: preserve source force without unnatural calque'
translation_notes:
  revision_awareness: 'El contexto inglés fue revisado y quedó en alto acuerdo; no se detectaron cambios posteriores necesarios. La redacción española sigue de cerca las decisiones auditadas: énfasis en אַתָּה, lectura de קרא con objeto escrito, conservación de la imagen de מִפִּי, y uso consistente de Yahvé para יהוה.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה de forma uniforme.
  - Se conserva la repetición de ‘leer’ para קרא en ambos miembros del versículo.
  - Se usa ‘casa de Yahvé’ en el texto y se aclara su referencia cultual en nota.
  - Se evita ‘SEÑOR’ como sustituto del nombre divino, conforme a la norma del proyecto.
  - El registro es moderno y reverente, sin arcaísmos innecesarios.
