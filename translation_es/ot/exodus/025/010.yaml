translation:
  language: es
  text: Harán un arca[a] de madera de acacia[b], de dos codos y medio de largo, de un codo y medio de ancho[c], y de un codo y medio de alto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cofre' o 'caja'; el término hebreo designa un recipiente, pero aquí se conserva 'arca' por tratarse del contexto sagrado del arca del pacto.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''madera de acacia'', tradicionalmente ''madera de shittim''.'
    reason: lexical_alternative
  - marker: c
    text: El codo era una antigua unidad de longitud, aproximadamente la distancia del codo hasta la punta de los dedos.
    reason: cultural_note
lexical_decisions:
- source_word: וְעָשׂוּ
  english_pob_choice: They shall make
  chosen_spanish: Harán
  alternatives_spanish:
  - Y harán
  - Han de hacer
  lexicon: HALOT
  rationale: El imperfecto con valor exhortativo/instructivo se vierte naturalmente en futuro en español. Se omite la conjunción inicial para evitar un calco innecesario, como en la estrategia de la POB en inglés.
- source_word: אֲרוֹן
  english_pob_choice: ark
  chosen_spanish: arca
  alternatives_spanish:
  - cofre
  - caja
  lexicon: HALOT
  rationale: En español, 'arca' comunica el contenedor sagrado del contexto del tabernáculo con claridad y mantiene la terminología tradicional sin perder la referencia a un recipiente. Se evita 'caja' por su tono demasiado general.
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: of acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de madera de shittim
  - de acacia
  lexicon: HALOT
  rationale: 'La expresión constructa se vierte de modo idiomático en español como material: ''madera de acacia''. Se evita ''shittim'' porque la POB inglesa lo explica como acacia wood y esa equivalencia es más transparente para el lector hispano.'
- source_word: אַמָּתַ֨יִם וָחֵצִי
  english_pob_choice: two and a half cubits
  chosen_spanish: de dos codos y medio
  alternatives_spanish:
  - de dos codos y medio de longitud
  - de dos codos y medio
  lexicon: HALOT
  rationale: Se conserva la unidad antigua 'codos', como hace la POB inglesa con 'cubits', sin convertirla a medidas modernas. 'Dos codos y medio' reproduce con naturalidad la cantidad hebrea.
- source_word: אָרְכּוֹ
  english_pob_choice: its length
  chosen_spanish: de largo
  alternatives_spanish:
  - en su longitud
  - de longitud
  lexicon: HALOT
  rationale: Aunque literalmente significa 'su longitud', en español la forma más natural en una lista dimensional es 'de largo'. No se pierde el valor referencial porque la medida sigue aplicando al arca.
- source_word: וְאַמָּה וָחֵצִי
  english_pob_choice: a cubit and a half
  chosen_spanish: de un codo y medio
  alternatives_spanish:
  - de un codo y medio de ancho
  - un codo y medio
  lexicon: HALOT
  rationale: Se mantiene la construcción singular más medio, reflejando el hebreo y la decisión inglesa. El sustantivo 'codo' conserva la unidad antigua de medida.
- source_word: רָחְבּוֹ
  english_pob_choice: its width
  chosen_spanish: de ancho
  alternatives_spanish:
  - de su ancho
  - de anchura
  lexicon: HALOT
  rationale: '''Ancho'' es el equivalente más natural y claro para la dimensión horizontal del objeto. Evita la dureza de ''anchura'' en una enumeración técnica.'
- source_word: קֹמָתוֹ
  english_pob_choice: its height
  chosen_spanish: de alto
  alternatives_spanish:
  - de su altura
  - en altura
  lexicon: HALOT
  rationale: En la descripción de un objeto, 'de alto' es la formulación más idiomática y precisa en español contemporáneo.
theological_decisions:
- issue: Terminología del arca sagrada
  english_pob_reading: ark retained because this is the sacred ark of the covenant context
  chosen_spanish_reading: arca
  alternative_spanish_readings:
  - arca del pacto
  - arca del testimonio
  - cofre
  rationale: La POB inglesa conserva 'ark' por el objeto sagrado específico. En español, 'arca' funciona como término tradicional y directo para este contenedor cultual; no se explicita 'del pacto' porque ese complemento no está en este versículo y añadirlo sería una expansión.
  doctrine_reference: Éxodo 25; uso bíblico de la arca del testimonio/pacto
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el resumen de control indicó alta concordancia con observaciones menores; por ello se mantiene una solución cercana a la POB inglesa, con ajuste natural al español y sin expandir el contenido del versículo.
  spanish_consistency_notes:
  - Se usa 'arca' de manera consistente con el contexto sagrado, no 'caja'.
  - Se conserva la unidad antigua 'codo' para mantener la correspondencia con 'cubits'.
  - La dimensión se expresa con preposiciones idiomáticas españolas ('de largo', 'de ancho', 'de alto') sin alterar el sentido.
  - Se evita introducir 'del pacto' en el texto principal porque el hebreo de este versículo no lo dice explícitamente.
