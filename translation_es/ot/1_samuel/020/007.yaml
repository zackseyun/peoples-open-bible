revisions:
- from: 'Si él dice: «Bien», le irá bien a tu siervo; pero si se enciende mucho en ira, sabe que la calamidad ha sido resuelta por él.'
  to: 'Si él dice: «Bien», le irá bien a tu siervo; pero si se enfurece mucho, sabe que el mal[a] ha sido determinado por él.'
  rationale: Se reemplaza «la calamidad ha sido resuelta por él» por «el mal ha sido determinado por él» para ajustarse mejor al hebreo הָרָעָה / כָלְתָה y a la rationale documentada en el POB inglés. También se suaviza «se enciende mucho en ira» a «se enfurece mucho» por naturalidad española, sin perder la intensidad del infinitivo absoluto más verbo finito. Se añade una nota léxica para preservar la alternativa explicativa que el inglés auditado ya conservó.
