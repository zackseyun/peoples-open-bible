review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del audit trail inglés: mensajeros humanos salen desde la presencia divina en barcos para aterrar a Cus; luego sobreviene temblor/pánico cuando llega el día de Egipto. Sin embargo, hay dos desajustes relevantes: (1) הִנֵּה no se refleja bien con ''miren'' en tercera persona narrativa; en español bíblico-natural conviene ''he aquí'' o ''miren'' solo si hay un destinatario explícito. (2) בָהֶם se vierte mejor como ''sobre ellos'' que ''en ellos'' para conservar la idea de algo que sobreviene. Además, ''viene'' queda algo flotante sin antecedente explícito, por lo que ''ya viene'' ayuda a la inminencia sin sobretraducir.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero 'porque, miren, viene' suena algo forzado en español escrito y menos natural que 'porque, he aquí, ya viene'. También 'habrá temblor en ellos' es comprensible, pero 'vendrá temblor sobre ellos' o 'habrá temblor sobre ellos' suena más idiomático para una calamidad que sobreviene. El resto del verso es legible y fiel.
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'Cus' respeta la preferencia por transliteración; 'mensajeros' concuerda con מַלְאָכִים en este contexto; 'de delante de mí' preserva la imagen de presencia divina. No aparece ningún término del glosario mayor que exija ajuste.
  issues:
  - severity: medium
    issue: Renderización de הִנֵּה como 'miren'
    rationale: Aunque הִנֵּה puede llamar la atención, 'porque, miren, viene' en este contexto profético suena coloquial y discursivamente extraño en español. 'He aquí' preserva mejor el énfasis profético y la dignidad del registro.
  - severity: medium
    issue: Renderización de בָהֶם como 'en ellos'
    rationale: El hebreo permite varias opciones, pero aquí la idea es que el temblor sobreviene a la gente de Cus. En español, 'sobre ellos' comunica mejor esa irrupción que 'en ellos', que suena menos natural con 'habrá temblor'.
  - severity: low
    issue: Inminencia poco marcada en 'viene'
    rationale: El audit trail inglés explicita una inminencia cierta ('it is coming'). 'Ya viene' refleja mejor esa inmediatez sin alterar el sentido.
