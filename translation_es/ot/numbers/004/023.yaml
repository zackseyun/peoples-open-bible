  text: מִ/בֶּן֩ שְׁלֹשִׁ֨ים שָׁנָ֜ה וָ/מַ֗עְלָ/ה עַ֛ד בֶּן חֲמִשִּׁ֥ים שָׁנָ֖ה תִּפְקֹ֣ד אוֹתָ֑/ם כָּל הַ/בָּא֙ לִ/צְבֹ֣א צָבָ֔א לַ/עֲבֹ֥ד עֲבֹדָ֖ה בְּ/אֹ֥הֶל מוֹעֵֽד־־׃
base_translation:
