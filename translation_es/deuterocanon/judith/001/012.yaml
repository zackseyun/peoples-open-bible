base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/001/012.yaml
  text: And Nebuchadnezzar became very angry with all this land[a], and he swore by his throne and his kingdom that he would surely take vengeance on all the territories of Cilicia and Damascus and Syria, putting them to the sword, and all who lived in Moab and the Ammonites and all Idumea and all those in Egypt[b], until he came to the borders of the two seas.
  footnotes:
  - marker: a
    text: Or, more literally, 'unless he avenges'; in this oath formula the Greek expresses a strong sworn resolve rather than a simple negative condition.
    reason: lexical_alternative
  - marker: b
    text: '''The two seas'' likely refers to the full extent of the region in view, expressed by its bounding seas.'
    reason: cultural_note
