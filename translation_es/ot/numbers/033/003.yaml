translation:
  language: es
  text: Salieron de Ramesés en el primer mes, el día quince del primer mes; el día después de la Pascua, los hijos[a] de Israel salieron con mano alzada[b], a la vista de todos los egipcios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». Literalmente, «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: La expresión «con mano alzada» conserva el modismo hebreo y puede implicar una salida pública, audaz y sin disimulo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Se pusieron en marcha
  - Partieron
  lexicon: HALOT
  rationale: En un itinerario de viaje, נסע expresa el acto de levantar el campamento y emprender la marcha. «Salieron» comunica el movimiento narrativo de manera natural en español y conserva el sentido de salida del lugar.
- source_word: מֵרַעְמְסֵס
  english_pob_choice: from Rameses
  chosen_spanish: de Ramesés
  alternatives_spanish:
  - desde Ramesés
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado en una forma reconocible en español. «De Ramesés» reproduce la relación de procedencia del hebreo.
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: in the first month
  chosen_spanish: en el primer mes
  alternatives_spanish:
  - durante el primer mes
  lexicon: HALOT
  rationale: חֹדֶשׁ aquí designa el mes calendárico. La preposición «en» es la forma más natural y fiel para una fecha narrativa.
- source_word: בַּחֲמִשָּׁה עָשָׂר יוֹם לַחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: on the fifteenth day of the first month
  chosen_spanish: el día quince del primer mes
  alternatives_spanish:
  - el quince del primer mes
  - al día quince del primer mes
  lexicon: HALOT
  rationale: La expresión fija de fecha se vierte en español con la formulación idiomática «el día quince». Mantiene la precisión cronológica sin sobrecargar la sintaxis.
- source_word: מִמָּחֳרַת הַפֶּסַח
  english_pob_choice: on the day after the Passover
  chosen_spanish: al día siguiente de la Pascua
  alternatives_spanish:
  - el día después de la Pascua
  - a la mañana siguiente de la Pascua
  lexicon: HALOT
  rationale: מָחֳרַת indica el día siguiente. «Pascua» es el término natural en español para la fiesta referida por הַפֶּסַח, y «al día siguiente» conserva el valor temporal sin calco rígido.
- source_word: יָצְאוּ
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - partieron
  - fueron
  lexicon: HALOT
  rationale: יצא en este contexto exódico se traduce con el verbo común «salir», que mantiene el motivo de la salida de Egipto y suena natural en español bíblico contemporáneo.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se preserva la forma representativa masculina del hebreo con «hijos de Israel», una fórmula bíblica transparente en español. «Israelitas» sería más idiomático, pero atenúa la forma explícita del original.
- source_word: בְּיָד רָמָה
  english_pob_choice: with a high hand
  chosen_spanish: con mano alzada
  alternatives_spanish:
  - con mano levantada
  - abiertamente y con valentía
  lexicon: HALOT
  rationale: El hebreo usa un modismo literal de «mano alzada/levantada». «Con mano alzada» conserva la imagen concreta del original y puede entenderse en español como acción pública y sin ocultamiento.
- source_word: לְעֵינֵי כָּל מִצְרָיִם
  english_pob_choice: before the eyes of all the Egyptians
  chosen_spanish: a la vista de todos los egipcios
  alternatives_spanish:
  - ante los ojos de todos los egipcios
  - en presencia de todos los egipcios
  lexicon: HALOT
  rationale: La expresión hebrea subraya visibilidad pública. «A la vista de» es una equivalencia natural en español que mantiene la idea de ser visto por todos los egipcios.
theological_decisions:
- issue: Forma representativa de בְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se conserva la fórmula masculina plural del hebreo, que el POB inglés también retuvo por transparencia. En español, «los hijos de Israel» mantiene la forma bíblica y la referencia colectiva sin neutralizar el género gramatical del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor del modismo בְיָד רָמָה
  english_pob_reading: with a high hand
  chosen_spanish_reading: con mano alzada
  alternative_spanish_readings:
  - con mano levantada
  - abiertamente
  - con valentía
  rationale: 'El texto hebreo presenta un modismo concreto, no una explicación interpretativa. «Con mano alzada» preserva la imagen del original y deja abierta la gama de matices: pública, audaz, sin disimulo, sin imponer una sola lectura doctrinal.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: El pasaje y el audit trail inglés muestran alta concordancia y no registran revisiones aplicadas; esta versión española sigue la lectura estable sin introducir variación textual ni interpretativa no sustentada.
  spanish_consistency_notes:
  - Se mantiene «Pascua» para הַפֶּסַח, conforme al uso bíblico común en español y al valor festivo del hebreo.
  - «Ramesés» conserva la transliteración del topónimo de manera reconocible en español.
  - Se evita «SEÑOR» o sustituciones teológicas no presentes en este versículo.
  - «Hijos de Israel» preserva la transparencia formal del hebreo donde el inglés POB también retuvo la forma literal.
