revisions:
- from: Y cuando los hijos de Amón vieron que Aram había huido[a], ellos huyeron delante de Abisai y entraron en la ciudad[b]. Entonces Joab se retiró de en medio de los hijos de Amón[c] y llegó a Jerusalén.
  to: Y cuando los hijos de Amón[a] vieron que Aram[b] había huido, huyeron ante Abisai y entraron en la ciudad. Entonces Joab volvió de su ataque contra los hijos de Amón[c] y llegó a Jerusalén.
  rationale: Se corrigieron los anclajes de las notas para que correspondan a las palabras pertinentes en el texto. También se reemplazó 'de en medio de los hijos de Amón' por 'de su ataque contra los hijos de Amón' para reflejar mejor el valor militar de מֵעַל en contexto, siguiendo la intención documentada por la nota inglesa. Además, 'huyeron ante Abisai' mejora la naturalidad del español sin perder fidelidad.
