  glossary_alignment: Alineación parcial. Se cumple la norma del proyecto para יְהוָה -> «Yahvé». Se preserva la alternativa de תּוֹרָה con nota. Pero בְּרִית está mejor representado por «alianza» aquí que por «pacto», dado el razonamiento auditado sobre «covenant» y el registro bíblico esperado en español.
