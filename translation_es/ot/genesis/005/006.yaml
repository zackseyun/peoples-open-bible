lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - vivió
  - vivió por
  lexicon: HALOT
  rationale: En fórmulas genealógicas hebreas, חיה expresa la duración de vida alcanzada antes del siguiente evento. En español, «vivió» comunica de forma natural esa duración sin añadir matices no presentes en el texto.
- source_word: שֵׁת
  english_pob_choice: Seth
  chosen_spanish: Set
  alternatives_spanish:
  - Seth
  lexicon: Convención transliterada desde el hebreo
  rationale: Se translitera el nombre propio directamente del hebreo; «Set» mantiene la cercanía fonética y la forma breve habitual en español bíblico. Se evita «Seth» como grafía menos adaptada al español.
- source_word: חָמֵשׁ שָׁנִים וּמְאַת שָׁנָה
  english_pob_choice: 105 years
  chosen_spanish: 105 años
  alternatives_spanish:
  - ciento cinco años
  - cinco años y cien años
  lexicon: HALOT
  rationale: La expresión hebrea es una construcción idiomática que significa 105 años. El número arábigo es claro y exacto en español moderno, y preserva el valor total sin forzar la sintaxis hebrea literal.
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: fue padre de
  alternatives_spanish:
  - engendró
  - engendró a
  lexicon: HALOT
  rationale: En contextos genealógicos, ילד señala la paternidad/begetting. «Fue padre de» conserva la relación genealógica con naturalidad en español y evita tanto el arcaísmo de «engendró» como la ambigüedad de un verbo más general.
- source_word: אֶת אֱנוֹשׁ
  english_pob_choice: Enosh
  chosen_spanish: Enós
  alternatives_spanish:
  - Enosh
  - Enos
  lexicon: Convención transliterada desde el hebreo
  rationale: El marcador de objeto directo no se expresa en español. El nombre se adapta como «Enós» para una forma bíblica natural en español, manteniendo la referencia directa al hebreo y evitando la forma tradicional «Enos», menos transparente al original.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran acuerdo alto y no requieren revisión adicional. Se mantiene la equivalencia óptima del inglés POB, trasladando al español la misma tensión entre una formulación natural («fue padre de») y la alternativa más formal («llegó a ser padre de»).
  spanish_consistency_notes:
  - Se mantiene la fórmula genealógica con un verbo/predicado natural en español, sin perder el sentido de engendrar/paternidad.
  - Se usa «Set» y «Enós» como transliteraciones españolas coherentes con el hebreo y con la lectura bíblica en español.
  - Se preserva el número total 105 con cifra arábiga, de acuerdo con la construcción idiomática del hebreo.
