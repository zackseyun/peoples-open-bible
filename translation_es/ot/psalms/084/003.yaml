  yaml_path: translation/ot/psalms/084/003.yaml
  text: My soul longs—indeed[a], it even faints—for the courts of Yahweh; my heart and my flesh cry out to the living God.
  footnotes:
  - marker: a
    text: Or 'sing for joy' / 'shout for joy' for 'cry out.' The Hebrew verb can denote a ringing cry of joy; here it is rendered 'cry out' to fit the context of intense longing for God's presence.
