revisions:
- from: Entonces haré que sus aguas[a] se asienten, y haré que sus ríos[b] fluyan como aceite, declara Yahvé, el Señor.
  to: Entonces haré que sus aguas[a] se asienten, y haré que sus ríos fluyan como aceite[b], declara el Señor Yahvé.
