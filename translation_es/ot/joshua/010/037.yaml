revisions:
- from: Y capturaron la ciudad y la atacaron[a] con la punta de la espada, junto con su rey, todas sus ciudades y toda persona que había en ella. No dejó sobreviviente, tal como había hecho a Eglón. La consagró a la destrucción, junto con toda persona que había en ella.
  to: Y capturaron la ciudad y la hirieron[a] con el filo de la espada, junto con su rey, todas sus ciudades y toda persona que había en ella. No dejó sobreviviente, tal como había hecho con Eglón. La consagró a la destrucción, junto con toda persona que había en ella.
  rationale: Se corrige el modismo לְפִי חֶרֶב a «con el filo de la espada», que refleja con precisión la evidencia hebrea y la decisión auditada del POB. También se ajusta וַיַּכּוּהָ a «la hirieron» para conservar la acción concreta de נכה en vez de la paráfrasis más general «la atacaron». Por último, se mejora la naturalidad de la comparación con Eglón sin cambiar el sentido. No se requiere adjudicación adicional porque son correcciones léxicas y estilísticas directas.
