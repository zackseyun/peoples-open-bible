theological_decisions:
- issue: Rendering the ethical force of οὐ θέμις in a Jewish martyrdom context
  chosen_reading: not lawful
  alternative_readings:
  - forbidden
  - not permitted
  rationale: The verse grounds Eleazar's action in what is religiously and morally lawful, not merely in personal scruple. 'Not lawful' preserves the legal-sacral force without importing later doctrinal terminology.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
