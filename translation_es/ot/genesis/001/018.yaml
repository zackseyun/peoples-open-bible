translation:
  language: es
  text: y para gobernar sobre el día y sobre la noche[a], y para separar la luz de la oscuridad. Y vio Dios que era bueno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «y para distinguir entre la luz y la oscuridad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/מְשֹׁל
  english_pob_choice: and to rule over
  chosen_spanish: y para gobernar
  alternatives_spanish:
  - y para reinar sobre
  - y para tener dominio sobre
  lexicon: HALOT
  rationale: El infinitivo final expresa función/asignación de los astros. «Gobernar» comunica esa función con naturalidad en español sin cargar el texto con una idea de soberanía absoluta que el contexto no exige.
- source_word: בַּ/יּוֹם
  english_pob_choice: the day
  chosen_spanish: el día
  alternatives_spanish:
  - el tiempo del día
  - el día, la luz del día
  lexicon: HALOT
  rationale: Mantiene el paralelismo con «la noche» y refleja el artículo definido hebreo. En español, «el día» es la forma más directa y estable.
- source_word: וּ/בַ/לַּיְלָה
  english_pob_choice: and over the night
  chosen_spanish: y la noche
  alternatives_spanish:
  - y sobre la noche
  - y durante la noche
  lexicon: HALOT
  rationale: 'El español no necesita repetir la preposición «sobre» si el infinitivo ya lleva valor de función: «para gobernar el día y la noche» conserva el sentido y evita una construcción pesada.'
- source_word: וּֽ/לֲ/הַבְדִּיל
  english_pob_choice: and to separate
  chosen_spanish: y para separar
  alternatives_spanish:
  - y para distinguir
  - y para dividir
  lexicon: HALOT
  rationale: En Génesis 1, בדל expresa separación establecida en la creación. «Separar» es el equivalente más natural y concreto en español, sin perder la fuerza funcional del verbo.
- source_word: בֵּין הָ/א֖וֹר וּ/בֵ֣ין הַ/חֹ֑שֶׁךְ
  english_pob_choice: the light from the darkness
  chosen_spanish: la luz de la oscuridad
  alternatives_spanish:
  - entre la luz y la oscuridad
  - la luz de las tinieblas
  lexicon: HALOT
  rationale: La construcción española «separar A de B» expresa bien el contraste binario del hebreo. «Oscuridad» evita la connotación más literaria o tradicional de «tinieblas» y mantiene el registro claro y moderno.
- source_word: וַ/יַּ֥רְא אֱלֹהִ֖ים
  english_pob_choice: And God saw
  chosen_spanish: Y vio Dios
  alternatives_spanish:
  - Entonces vio Dios
  - Y Dios vio
  lexicon: HALOT
  rationale: Conserva el ritmo narrativo hebreo y el orden natural del español bíblico. «Vio Dios» mantiene la solemnidad sin forzar el estilo.
- source_word: כִּי טֽוֹב
  english_pob_choice: that it was good
  chosen_spanish: que era bueno
  alternatives_spanish:
  - que estaba bien
  - que era bueno y adecuado
  lexicon: HALOT
  rationale: «Bueno» preserva la carga teológica del refrán de Génesis 1, que abarca bondad, adecuación y orden dentro de la creación. No se estrecha a un sentido meramente moral.
theological_decisions:
- issue: Función de los astros en el orden creado
  english_pob_reading: The verse describes the lights as appointed to govern day and night and to mark the separation between light and darkness, without implying deity or independent agency.
  chosen_spanish_reading: El versículo presenta a los astros como asignados para gobernar el día y la noche y para separar la luz de la oscuridad, sin atribuirles divinidad ni agencia independiente.
  alternative_spanish_readings:
  - Una lectura más personificada podría sugerir que los astros ejercen dominio como seres divinos.
  - «Gobernar» podría sonar más fuerte, pero el contexto no introduce soberanía autónoma.
  rationale: 'La sintaxis de propósito y el marco de Génesis 1 indican función delegada, no divinización. La traducción debe mantener esa tensión: un verbo funcional real, pero subordinado al acto creador y evaluador de Dios.'
  doctrine_reference: Primacía del texto original; preservar la tensión teológica sin resolverla por tradición.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el audit trail inglés: conserva el propósito de los infinitivos, la secuencia narrativa con «Y vio Dios», y el refrán evaluativo «que era bueno». No se introdujeron revisiones recientes ni cambios respecto del acuerdo alto reportado en el contexto.'
  spanish_consistency_notes:
  - Se prefirió «oscuridad» como español neutro y claro; en contextos más tradicionales podría usarse «tinieblas», pero aquí no es necesario.
  - «Gobernar» se eligió como equivalente funcional de משל, evitando tanto «reinar» como «tener dominio sobre» por ser menos naturales en esta construcción.
  - La nota textual mantiene la alternativa de «distinguir», porque el inglés POB conservó esa ambigüedad lexical.
  - Se mantuvo «Dios» en lugar de una forma con mayúsculas especiales o sustitutos de nombre divino, porque el hebreo usa אֱלֹהִים y no el tetragrámaton en este versículo.
