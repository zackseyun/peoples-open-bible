translation:
  language: es
  text: Yahvé su Dios[a], que va delante de ustedes, él mismo peleará por ustedes, tal como hizo por ustedes en Egipto, ante sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hizo con ustedes». La frase se refiere a lo que Yahvé hizo en favor de Israel en Egipto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, siguiendo la política del POB de no sustituirlo por un título. En español, «Yahvé» es la forma transparente y ampliamente reconocible para el nombre revelado a Israel.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - vuestro Dios
  - sus Dios
  lexicon: HALOT
  rationale: El plural hebreo funciona aquí como título singular para el Dios de Israel. En español, «tu Dios» comunica el posesivo de segunda persona plural dirigido a Israel como colectivo, sin introducir un plural arcaizante innecesario.
- source_word: הַהֹלֵךְ לִפְנֵיכֶם
  english_pob_choice: who goes before you
  chosen_spanish: que va delante de ti
  alternatives_spanish:
  - que va delante de ustedes
  - que marcha delante de ustedes
  - el que va delante de ti
  lexicon: HALOT
  rationale: El participio expresa acción característica o continua. «Va delante de ti» es natural en español y conserva la imagen de liderazgo previo. Se usa «ti» como forma colectiva dirigida a Israel en segunda persona singular, común en un registro bíblico solemne.
- source_word: הוּא
  english_pob_choice: himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - el mismo
  lexicon: HALOT
  rationale: 'El pronombre independiente es enfático. «Él mismo» reproduce esa insistencia: no será otro, sino Yahvé personalmente quien peleará.'
- source_word: יִלָּחֵם לָכֶם
  english_pob_choice: will himself fight for you
  chosen_spanish: peleará por ti
  alternatives_spanish:
  - combatirá por ti
  - librará batalla por ti
  - hará guerra por ti
  lexicon: HALOT
  rationale: El verbo expresa combatir en favor de alguien. «Peleará por ti» es fiel, claro y natural en español; el énfasis del hebreo ya queda reforzado por «él mismo».
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - exactamente como
  - así como
  lexicon: HALOT
  rationale: La comparación remite a una acción previa de Dios. «Tal como» comunica la equivalencia comparativa sin sobrecargar el español con una literalidad rígida.
- source_word: עָשָׂה אִתְּכֶם
  english_pob_choice: he did for you
  chosen_spanish: hizo por ti
  alternatives_spanish:
  - hizo contigo
  - actuó en favor de ti
  - obró por ti
  lexicon: HALOT
  rationale: La revisión inglesa ya documenta que el sentido aquí es de acción en favor de Israel, no una mera compañía literal. «Por ti» preserva ese matiz y evita el calco «contigo», que en español resultaría ambiguo o menos natural.
- source_word: בְּמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  - en el país de Egipto
  lexicon: HALOT
  rationale: Se mantiene la localización directa estándar. «En Egipto» es claro y suficiente en español bíblico contemporáneo.
- source_word: לְעֵינֵיכֶם
  english_pob_choice: before your eyes
  chosen_spanish: ante tus ojos
  alternatives_spanish:
  - a tus ojos
  - a la vista de ustedes
  - delante de tus ojos
  lexicon: HALOT
  rationale: La expresión idiomática subraya testimonio visible. «Ante tus ojos» es una equivalencia natural y digna en español, preservando la idea de acción presenciada abiertamente.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Siguiendo el criterio POB de transparencia, se conserva el nombre divino como nombre propio y no se lo vela con un título litúrgico. «Yahvé» es la forma de uso más estable en español para esa transliteración.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza de la acción de Dios en favor de Israel
  english_pob_reading: he did for you
  chosen_spanish_reading: hizo por ti
  alternative_spanish_readings:
  - hizo contigo
  - hizo a favor de ti
  - actuó contigo
  rationale: La nota auditada del POB descarta la simple lectura relacional de «con ustedes» y entiende la frase como acción en beneficio de Israel. En español, «por ti» comunica ese favorecimiento sin perder la base hebrea.
  doctrine_reference: Texto hebreo con revisión auditada en inglés sobre עָשָׂה אִתְּכֶם
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que cambió «did with you» por «did for you» por razones de precisión y naturalidad. La redacción española adopta el sentido favorecedor («hizo por ti») y evita volver a la literalidad anterior.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del nombre divino, conforme al criterio POB para el Tetragrámaton.
  - Se conserva una segunda persona singular colectiva («tu/ti/tus») para reflejar el hebreo dirigido a Israel como pueblo.
  - «Él mismo» refuerza el pronombre enfático hebreo.
  - «Por ti» expresa la revisión semántica del hebreo en favor de Israel y evita un calco que podría sonar ambiguo en español.
