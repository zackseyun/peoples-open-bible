    text: 'O: «Difícilmente son plantados... difícilmente su tallo ha echado raíces en la tierra». La repetición hebrea intensifica cuán pronto queda deshecho su ascenso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un torbellino» en lugar de «una tormenta».'
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva la estructura y la teología del borrador, pero alinea mejor el español con las decisiones léxicas auditadas del POB y con la imagen hebrea: «tallo» encaja mejor que «tronco» con «stem» y la metáfora agrícola; «y aun sopla sobre ellos» evita añadir un «cuando» temporal no expreso; «como rastrojo» reproduce mejor כַּקַּשׁ que «como paja»; y se restaura la alternativa documentada para סְעָרָה en nota.'
