translation:
  language: es
  text: 'Y de los levitas: Jozabad, Seneis, Konos[a] (es decir, Kalitais), y Pathaios[c][b], y Judas y Jonás.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase appositiva del griego también puede entenderse como «esto es, Kalitais»; probablemente identifica a Konos con un nombre alternativo.
    reason: alternative_reading
  - marker: b
    text: Algunos nombres pueden corresponder a formas hebreas conocidas en la tradición paralela, como «Jonás» para «Jonas» o un equivalente semítico detrás de «Pathaios», pero aquí el texto principal sigue el testimonio griego de 1 Esdras.
    reason: lexical_alternative
  - marker: c
    text: La transcripción de la fuente está marcada con una discrepancia menor, así que la grafía exacta de algunos nombres raros puede ser ligeramente incierta.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ τῶν Λευειτῶν
  english_pob_choice: from the Levites
  chosen_spanish: de los levitas
  alternatives_spanish:
  - entre los levitas
  - de entre los levitas
  lexicon: LSJ
  rationale: El griego expresa una procedencia o extracción dentro de un conjunto; en español, «de los levitas» comunica con naturalidad esa fuerza partitiva sin volver rígida la frase.
- source_word: Ἰωζάβαδος
  english_pob_choice: Jozabad
  chosen_spanish: Jozabad
  alternatives_spanish:
  - Josabad
  lexicon: Transliteración del nombre propio griego
  rationale: Se conserva la forma del nombre propio según el testimonio griego, manteniendo la transliteración simple del POB en inglés.
- source_word: Σενεεὶς
  english_pob_choice: Seneis
  chosen_spanish: Seneis
  alternatives_spanish:
  - Seneeis
  lexicon: Transliteración del nombre propio griego
  rationale: Nombre raro y textualmente algo incierto; se sigue la transliteración directa del griego sin introducir una normalización no atestiguada.
- source_word: Κῶνος
  english_pob_choice: Konos
  chosen_spanish: Konos
  alternatives_spanish:
  - Conos
  - Konón
  lexicon: Transliteración del nombre propio griego
  rationale: Se conserva la kappa con «K» para reflejar el sonido griego y evitar una latinización no necesaria.
- source_word: οὗτος Καλιταίς
  english_pob_choice: that is, Kalitais
  chosen_spanish: es decir, Kalitais
  alternatives_spanish:
  - que es Kalitais
  - o sea, Kalitais
  - a saber, Kalitais
  lexicon: LSJ
  rationale: 'La función es appositiva e identificadora: el griego aclara que Konos lleva un segundo nombre. «Es decir» reproduce bien esa relación sin forzar una traducción demasiado literal de οὗτος.'
- source_word: Παθαῖος
  english_pob_choice: Pathaios
  chosen_spanish: Pathaios
  alternatives_spanish:
  - Pataios
  - Pathaeus
  lexicon: Transliteración del nombre propio griego
  rationale: Se mantiene la forma griega transliterada porque la fuente primaria es el LXX griego y el paralelo semítico no desplaza ese testimonio.
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: Uso nominal griego
  rationale: Aquí λειτουργa como nombre personal griego; «Judas» evita confundirlo con la forma tribal o geográfica «Judá».
- source_word: Ἰωνάς
  english_pob_choice: Jonas
  chosen_spanish: Jonás
  alternatives_spanish:
  - Jonas
  lexicon: Uso nominal griego con adaptación española estándar
  rationale: El español bíblico usa de manera estable «Jonás» para Ἰωνάς; es una adaptación natural y plenamente inteligible, mientras que «Jonas» dejaría una forma menos asentada.
translation_notes:
  revision_awareness: Se siguió el ajuste del POB inglés que clarifica οὗτος Καλιταίς como una identificación appositiva («that is, Kalitais»). En español se optó por «es decir, Kalitais», con una nota para preservar la posibilidad alternativa de lectura identificadora sin sobreexplicarla.
  spanish_consistency_notes:
  - Se mantiene el tratamiento transliterado de los nombres propios cuando el griego es la fuente primaria.
  - Se prefirió «levitas» en minúscula por tratarse de un gentilicio/clase dentro de la lista.
  - Se usó «Jonás» como adaptación española habitual del nombre Ἰωνάς, en coherencia con el uso bíblico común y sin alterar el dato textual.
  - No se añadió puntuación interpretativa más allá de la necesaria para reflejar la apposición del segundo nombre.
