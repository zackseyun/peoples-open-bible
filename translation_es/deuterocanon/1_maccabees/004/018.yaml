    rationale: En el rastro inglés, la alternativa 'confidently/boldly' corresponde a μετὰ παρρησίας al final del versículo, no al mandato 'fight them'. En español, la nota debe acompañar 'con valentía' o frase equivalente.
  - severity: medium
    issue: '''La fuerza'' es poco idiomático para δύναμις en este contexto militar.'
