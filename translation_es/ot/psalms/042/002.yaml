translation:
  language: es
  text: Como un ciervo anhela los arroyos de agua[a], así mi alma[c] te anhela, oh, Dios.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘jadea por’; el verbo hebreo puede evocar un anhelo intenso semejante a la sed.
    reason: lexical_alternative
  - marker: b
    text: O ‘cauces de agua’ o ‘canales de agua’.
    reason: lexical_alternative
  - marker: c
    text: ‘Mi alma’ también puede entenderse como ‘mi vida’, ‘mi ser’ o ‘mi interior’.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/אַיָּל
  english_pob_choice: As a deer
  chosen_spanish: Como un ciervo
  alternatives_spanish:
  - Como un venado
  - Como un gamo
  lexicon: WLC / HALOT
  rationale: El hebreo compara con un animal de ciervo/venado; en español neutral, 'ciervo' es claro y digno. 'Como' conserva el valor comparativo de כְּ.
- source_word: תַּעֲרֹ֥ג
  english_pob_choice: longs
  chosen_spanish: anhela
  alternatives_spanish:
  - panta
  - suspira intensamente
  - desea con fuerza
  lexicon: HALOT
  rationale: El verbo puede expresar anhelo intenso, incluso con matiz de jadeo o panting. 'Anhela' comunica deseo fuerte en español moderno sin perder la intensidad poética.
- source_word: עַל אֲפִיקֵי מָ֑יִם
  english_pob_choice: for streams of water
  chosen_spanish: los arroyos de agua
  alternatives_spanish:
  - los cauces de agua
  - los canales de agua
  - las corrientes de agua
  lexicon: HALOT
  rationale: אֲפִיקִים son cauces, canales o lechos por donde corre el agua. 'Arroyos de agua' suena natural en español y mantiene la imagen plural de abundancia y frescura. Se conserva la idea de agua en pluralidad de corrientes.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  - mi interior
  lexicon: HALOT
  rationale: '''Alma'' preserva el registro bíblico y la profundidad afectiva del hebreo נֶפֶשׁ. Aunque el término puede abarcar vida o ser entero, aquí ''alma'' es la opción más natural y tradicionalmente comprensible en español eclesial.'
- source_word: אֵלֶיךָ
  english_pob_choice: for you
  chosen_spanish: por ti
  alternatives_spanish:
  - hacia ti
  - para ti
  lexicon: HALOT
  rationale: Con el verbo de anhelo, el movimiento relacional se expresa de forma natural en español con 'por ti'. Mantiene la dirección del deseo sin sonar forzado.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh, Dios
  lexicon: HALOT
  rationale: El vocativo pide una forma directa de invocación. 'Oh Dios' es natural en español reverente.
theological_decisions:
- issue: Alcance antropológico de נַפְשִׁי
  english_pob_reading: my soul may also be understood as my life, my self, or my inner being
  chosen_spanish_reading: mi alma
  alternative_spanish_readings:
  - mi vida
  - mi ser
  - mi interior
  - yo mismo
  rationale: Se mantiene 'alma' por su fuerza poética y devocional, reconociendo que el hebreo puede abarcar la persona entera. La traducción no impone una antropología dualista estricta.
  doctrine_reference: Translation philosophy §3, §6
- issue: Valor del verbo תַּעֲרֹג
  english_pob_reading: longs; Or 'pants for'
  chosen_spanish_reading: anhela
  alternative_spanish_readings:
  - panta
  - jadea con sed de
  - suspira por
  rationale: El hebreo permite tanto el matiz de anhelo intenso como una imagen corporal de jadeo. 'Anhela' conserva la carga emocional sin introducir una corporalidad excesiva que en español podría sonar menos natural, pero la nota preserva la alternativa literal.
  doctrine_reference: Lexical fidelity / poetic imagery
- issue: Sentido de אֲפִיקֵי מָיִם
  english_pob_reading: streams of water; Or 'watercourses' or 'channels of water.'
  chosen_spanish_reading: arroyos de agua
  alternative_spanish_readings:
  - cauces de agua
  - canales de agua
  - corrientes de agua
  rationale: Se elige una expresión transparente para lectores generales, sin perder la idea de un cauce donde fluye el agua. La imagen queda suficientemente abierta para abarcar el hebreo.
  doctrine_reference: Lexical fidelity
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español: [a] en ‘los arroyos de agua’, [b] en ‘anhela por ti[c][b]’, y [c] en ‘mi alma’.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico reverente con ‘oh Dios’.
  - Se usa ‘alma’ para נֶפֶשׁ siguiendo la decisión POB de conservar el valor devocional-poético.
  - Se evita un calco demasiado literal de עַל al optar por una construcción natural en español.
  - Se conserva la intensidad semántica del hebreo mediante ‘anhela’, reforzada por la nota de alternativa verbal.
