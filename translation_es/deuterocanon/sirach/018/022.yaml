  to: No dejes que nada te impida cumplir un voto a su debido tiempo, y no esperes hasta la muerte para ser justificado[a].
  rationale: Se reubica la nota [a] para que ancle correctamente a «ser justificado», que es el término comentado en la auditoría inglesa y en el griego δικαιωθῆναι. Además, se suaviza «No te dejes impedir de» a «No dejes que nada te impida», que suena más natural en español sin perder el sentido pasivo-exhortativo de no permitir que surja impedimento. No se requieren cambios doctrinales ni de fondo.
