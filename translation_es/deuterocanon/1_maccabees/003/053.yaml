review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien el sentido básico de la pregunta retórica y la dependencia de la ayuda divina. Sin embargo, «resistirles» concentra en un solo verbo tanto ὑποστῆναι como κατὰ πρόσωπον αὐτῶν, mientras que el griego distingue la idea de ‘mantenerse/estar en pie’ y la de ‘frente a ellos’. Además, «si tú no nos ayudas» es entendible, pero «a menos que tú nos ayudes» refleja mejor ἐὰν μὴ y suena más natural en registro bíblico cuidado.
  spanish_quality_summary: El español es claro y legible, pero puede mejorarse para acercarse más al griego sin volverse rígido. «¿Cómo podremos mantenernos firmes ante ellos…?» preserva mejor la imagen de estar en pie frente al adversario. También conviene ajustar la nota para que corresponda exactamente al texto revisado.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. La súplica directa a Dios está bien preservada. La revisión propuesta mejora la correspondencia léxica de ὑποστῆναι y κατὰ πρόσωπον αὐτῶν sin introducir paráfrasis teológica.
  issues:
  - severity: medium
    issue: «resistirles» comprime dos elementos griegos en uno
    rationale: ὑποστῆναι significa literalmente mantenerse/estar en pie, y κατὰ πρόσωπον αὐτῶν aporta la idea de estar frente a ellos en confrontación. «Resistirles» comunica oposición, pero pierde la imagen más concreta que el inglés auditado quiso preservar con ‘stand before them’.
  - severity: low
    issue: La condicional «si tú no nos ayudas» es menos precisa que «a menos que tú nos ayudes»
    rationale: Ambas son posibles, pero «a menos que» refleja de manera más directa ἐὰν μὴ (‘unless’) y mantiene un tono más cuidado y natural en español bíblico moderno.
  revised_spanish_text: ¿Cómo podremos mantenernos firmes[a] ante ellos, a menos que tú nos ayudes?
