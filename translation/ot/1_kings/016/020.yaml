id: 1KI.16.20
reference: 1 Kings 16:20
source:
  edition: WLC
  text: וְ/יֶ֨תֶר֙ דִּבְרֵ֣י זִמְרִ֔י וְ/קִשְׁר֖/וֹ אֲשֶׁ֣ר קָשָׁ֑ר הֲ/לֹֽא הֵ֣ם כְּתוּבִ֗ים עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־־׃פ
translation:
  text: Now the rest of the acts of Zimri[a], and his conspiracy that he carried out—are they not written in the Book of the Chronicles of the Kings of Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his plot that he plotted.' The Hebrew uses a noun and cognate verb from the same root for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - As for the rest of
  lexicon: HALOT
  rationale: יֶתֶר in this recurring regnal formula refers to the remainder of a king's deeds. 'Now the rest of' is idiomatic modern English that preserves the formulaic transition.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: In the formula 'the rest of the דברי X,' the sense is not merely spoken words but the matters/deeds associated with the person. 'Acts' is concise and natural in English for royal annal summaries.
- source_word: זִמְרִי
  chosen: Zimri
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: וְקִשְׁרוֹ
  chosen: and his conspiracy
  alternatives:
  - and his treason
  - and his plot
  lexicon: HALOT
  rationale: The noun קֶשֶׁר commonly denotes a conspiracy or treasonous plot, especially in royal contexts. 'Conspiracy' best matches the political sense without overinterpreting.
- source_word: אֲשֶׁר קָשָׁר
  chosen: that he carried out
  alternatives:
  - which he conspired
  - that he plotted
  lexicon: HALOT
  rationale: The relative clause repeats the cognate verb קשׁר. A too-literal 'which he conspired' is awkward in English; 'that he carried out' preserves the completed action of the conspiracy while remaining readable. The conspiratorial sense is already explicit in 'his conspiracy'.
- source_word: הֲלֹא
  chosen: are they not
  alternatives:
  - behold, are they not
  - surely they are
  lexicon: HALOT
  rationale: This introduces the standard rhetorical question in the regnal formula. 'Are they not' preserves both form and function.
- source_word: כְּתוּבִים
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: Passive participle meaning 'written'; 'written' keeps the formal link to the source, while the object named is a written record.
- source_word: עַל סֵפֶר
  chosen: in the Book of
  alternatives:
  - on the scroll of
  - in the scroll of
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' in this archival formula English idiom prefers 'in the Book of.' 'Book' is the conventional and natural rendering for סֵפֶר here.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the Chronicles
  alternatives:
  - the events of the days
  - the annals
  lexicon: HALOT
  rationale: This phrase denotes an annalistic record. 'Chronicles' is the established and accurate rendering in this formula; capitalization reflects the title-like function of the source named.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - for the kings of Israel
  lexicon: HALOT
  rationale: In this title formula, ל has a genitival/title function rather than a dative sense. 'Of the Kings of Israel' is the standard and contextually correct rendering.
