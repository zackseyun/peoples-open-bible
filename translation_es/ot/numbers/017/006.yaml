translation:
  language: es
  text: 'Pero al día siguiente toda la congregación de los hijos de Israel murmuró contra Moisés y contra Aarón, diciendo: «Ustedes han matado al pueblo de Yahvé».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיִּלֹּנוּ
  english_pob_choice: grumbled
  chosen_spanish: murmuró
  alternatives_spanish:
  - se quejó
  - protestó
  lexicon: HALOT
  rationale: El verbo לון en este contexto narra una protesta comunitaria hostil contra los líderes. «Murmuró» conserva bien el matiz de queja repetida y rebelde, y es natural en español bíblico sin caer en un calco duro.
- source_word: כָּל עֲדַת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: all the congregation of the sons of Israel
  chosen_spanish: toda la congregación de los hijos de Israel
  alternatives_spanish:
  - toda la asamblea de los hijos de Israel
  - todo el pueblo de Israel
  lexicon: HALOT
  rationale: «Congregación» refleja עֵדָה como comunidad corporativa del pacto. «Hijos de Israel» conserva la forma masculina plural del hebreo, en vez de neutralizarla, y «toda» reproduce כָּל con naturalidad en español.
- source_word: מִמָּחֳרָת
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - en la mañana siguiente
  lexicon: HALOT
  rationale: La expresión hebrea significa «al día siguiente / el día siguiente». «Al día siguiente» es idiomática y fiel, sin arcaísmo.
- source_word: עַל מֹשֶׁה וְעַל אַהֲרֹן
  english_pob_choice: against Moses and against Aaron
  chosen_spanish: contra Moisés y contra Aarón
  alternatives_spanish:
  - contra Moisés y Aarón
  lexicon: HALOT
  rationale: Se conserva la repetición de עַל con ambos nombres, porque el hebreo enfatiza la acusación dirigida a cada líder por separado.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Es la fórmula estándar de introducción del discurso directo; «diciendo» funciona de modo natural en español sin perder el enlace sintáctico.
- source_word: אַתֶּם הֲמִתֶּם
  english_pob_choice: You have killed
  chosen_spanish: Ustedes han dado muerte
  alternatives_spanish:
  - Ustedes han matado
  - Ustedes mataron
  lexicon: HALOT
  rationale: El hebreo expresa una acusación de haber causado la muerte. «Han dado muerte» transmite el hecho consumado con un registro digno y evita una dureza innecesaria en español, aunque «han matado» sigue siendo una alternativa válida.
- source_word: עַם יְהוָה
  english_pob_choice: the people of Yahweh
  chosen_spanish: el pueblo de Yahvé
  alternatives_spanish:
  - el pueblo de Yahweh
  - el pueblo de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יְהוָה: «Yahvé» en el texto principal. «Pueblo» conserva la designación de pertenencia pactual del hebreo עַם.'
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: the people of Yahweh / Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: La pauta del proyecto exige representar el Tetragrama como «Yahvé» en el texto principal, preservando el nombre del pacto en lugar de una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor colectivo de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la forma masculina del hebreo, ya que aquí funciona como designación del grupo pactual y la política del proyecto prefiere mantener la precisión gramatical del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior añadiendo los anclajes [a] y [b] en el texto español exactamente donde corresponden.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en el texto principal conforme al criterio del proyecto para יְהוָה.
  - Se conservó la estructura acusatoria «contra Moisés y contra Aarón» para reflejar el paralelismo del hebreo.
  - «Hijos de Israel» reproduce la expresión colectiva masculina del original sin neutralización.
  - El discurso directo se introdujo con «diciendo», equivalente natural de לֵאמֹר en español bíblico contemporáneo.
