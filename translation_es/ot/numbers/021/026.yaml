translation:
  language: es
  text: Porque Hesbón era la ciudad de Sehón, rey de los amorreos, y había luchado contra el anterior rey de Moab y había tomado toda su tierra de su mano[a], hasta Arnón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de su poder'; el hebreo dice literalmente 'de su mano'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de la afirmación anterior; 'Porque' conserva bien la fuerza explicativa causal/explanatoria en español.
- source_word: עִיר
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - urbe
  - población
  lexicon: HALOT
  rationale: '''Ciudad'' es la correspondencia directa y natural para חֶשְׁבּוֹן como centro político.'
- source_word: נִלְחַם
  english_pob_choice: had fought against
  chosen_spanish: había guerreado contra
  alternatives_spanish:
  - había luchado contra
  - había peleado contra
  lexicon: HALOT
  rationale: El verbo expresa entablar combate; 'había guerreado contra' mantiene el matiz de conflicto bélico y el pluscuamperfecto que refleja prioridad temporal respecto del marco narrativo.
- source_word: הָרִאשׁוֹן
  english_pob_choice: the former
  chosen_spanish: el anterior
  alternatives_spanish:
  - el primero
  - el previo
  lexicon: HALOT
  rationale: En este contexto no se trata de 'primero' en orden numérico, sino de un rey que precedía al actual; 'anterior' evita una interpretación demasiado literal.
- source_word: כָּל אַרְצוֹ
  english_pob_choice: all his land
  chosen_spanish: toda su tierra
  alternatives_spanish:
  - todo su territorio
  - toda su posesión
  lexicon: HALOT
  rationale: '''Tierra'' reproduce bien el campo semántico territorial del hebreo y suena natural en español bíblico sin perder concreción.'
- source_word: מִיָּדוֹ
  english_pob_choice: from his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de su poder
  - de su control
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea de 'mano' como control o dominio, sin suavizarla a una explicación interpretativa en el texto principal.
- source_word: עַד אַרְנֹן
  english_pob_choice: as far as the Arnon
  chosen_spanish: hasta Arnón
  alternatives_spanish:
  - hasta el Arnón
  lexicon: HALOT
  rationale: Marca el límite territorial con la preposición natural 'hasta'; se mantiene el nombre propio como límite geográfico conocido.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español junto al sintagma 'rey de los amorreos'. También se mantuvo la relación de la nota con la expresión idiomática מִיָּדוֹ.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según el estándar del proyecto cuando aparezca el nombre divino; aquí no ocurre.
  - Se prefirió 'anterior' para הָרִאשׁוֹן por claridad contextual.
  - Se mantuvo la metáfora hebrea 'de su mano' en el texto principal y se explicó la alternativa 'de su poder' en nota.
