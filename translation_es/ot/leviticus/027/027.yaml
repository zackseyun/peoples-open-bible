base_translation:
  language: en
  yaml_path: translation/ot/leviticus/027/027.yaml
  text: But if it is among the unclean animals[a], then he shall redeem it at your valuation and add a fifth of it to it; and if it is not redeemed[b], then it shall be sold at your valuation.
  footnotes:
  - marker: a
    text: Or 'from the unclean livestock.' The Hebrew phrase refers to an animal belonging to the class of ritually unclean animals.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'add its fifth upon it,' that is, add twenty percent to the assessed value.
    reason: lexical_alternative
