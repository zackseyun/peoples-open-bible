id: GEN.47.18
reference: Genesis 47:18
source:
  edition: WLC
  text: וַ/תִּתֹּם֮ הַ/שָּׁנָ֣ה הַ/הִוא֒ וַ/יָּבֹ֨אוּ אֵלָ֜י/ו בַּ/שָּׁנָ֣ה הַ/שֵּׁנִ֗ית וַ/יֹּ֤אמְרוּ ל/וֹ֙ לֹֽא נְכַחֵ֣ד מֵֽ/אֲדֹנִ֔/י כִּ֚י אִם תַּ֣ם הַ/כֶּ֔סֶף וּ/מִקְנֵ֥ה הַ/בְּהֵמָ֖ה אֶל אֲדֹנִ֑/י לֹ֤א נִשְׁאַר֙ לִ/פְנֵ֣י אֲדֹנִ֔/י בִּלְתִּ֥י אִם גְּוִיָּתֵ֖/נוּ וְ/אַדְמָתֵֽ/נוּ־־־־׃
translation:
  text: 'When that year ended[a], they came to him in the second year and said to him, “We will not hide it from my lord: the money is gone, and the livestock of the herds belongs to my lord[b]. Nothing is left before my lord except our bodies and our land.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the silver is exhausted.' Hebrew often uses 'silver' for money.
    reason: lexical_alternative
  - marker: b
    text: Or 'our persons and our land.' The Hebrew says literally 'our bodies and our land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֹּם
  chosen: ended
  alternatives:
  - was completed
  - came to an end
  lexicon: HALOT
  rationale: From תמם, indicating completion or coming to an end. 'Ended' is natural modern English and fits the temporal clause.
- source_word: הַשָּׁנָה הַהִוא
  chosen: that year
  alternatives:
  - the year, that one
  lexicon: HALOT
  rationale: Definite noun plus demonstrative; idiomatic English is 'that year.'
- source_word: בַּשָּׁנָה הַשֵּׁנִית
  chosen: in the second year
  alternatives:
  - in the second year after that
  - the following year
  lexicon: HALOT
  rationale: Formally this is 'in the second year.' In context it refers to the next year after the previous one ended, but the more literal rendering preserves the Hebrew wording without over-paraphrase.
- source_word: לֹא נְכַחֵד
  chosen: We will not hide it
  alternatives:
  - We will not conceal it
  - We cannot hide it
  lexicon: HALOT
  rationale: כחד in the piel means to hide or conceal. The cohortative nuance is not explicit; 'We will not hide it' captures the volitional statement addressed to Joseph.
- source_word: מֵאֲדֹנִי
  chosen: from my lord
  alternatives:
  - from our lord
  lexicon: HALOT
  rationale: The singular suffix is preserved. Although a plural possessive might be expected in English from a group of speakers, the Hebrew has singular 'my lord' as a deferential form in direct address.
- source_word: כִּי אִם
  chosen: ':'
  alternatives:
  - for
  - indeed
  - for if
  lexicon: HALOT
  rationale: The particle combination introduces the explanation of what they will not hide. In English, a colon best conveys the explanatory force without awkwardness.
- source_word: תַּם הַכֶּסֶף
  chosen: the money is gone
  alternatives:
  - the money is finished
  - the silver is exhausted
  lexicon: HALOT
  rationale: תם here denotes being used up or exhausted. 'Money' is contextually clearer than the more literal 'silver,' since the point is depletion of means of payment.
- source_word: וּמִקְנֵה הַבְּהֵמָה
  chosen: the herds of livestock
  alternatives:
  - the livestock
  - the cattle holdings
  lexicon: HALOT
  rationale: מִקְנֶה refers to acquired livestock/property in animals; with הַבְּהֵמָה it specifies animal holdings. 'Herds of livestock' preserves the concrete economic sense.
- source_word: אֶל אֲדֹנִי
  chosen: belong to my lord
  alternatives:
  - are with my lord
  - have gone over to my lord
  lexicon: HALOT
  rationale: Literally 'to my lord,' indicating transfer of possession. 'Belong to my lord' makes the possessive sense explicit in idiomatic English.
- source_word: לֹא נִשְׁאַר לִפְנֵי אֲדֹנִי
  chosen: Nothing is left before my lord
  alternatives:
  - Nothing remains in my lord's presence
  - Nothing is left to my lord
  lexicon: HALOT
  rationale: נשאר means remain/be left. לִפְנֵי is literally 'before,' here in the sense of 'at the disposal of' or 'in the presence of.' Retaining 'before my lord' preserves the Hebrew idiom while remaining understandable.
- source_word: בִּלְתִּי אִם
  chosen: except
  alternatives:
  - unless
  - nothing but
  lexicon: HALOT
  rationale: 'This combination functions idiomatically as an exception clause: ''except''.'
- source_word: גְּוִיָּתֵנוּ
  chosen: our bodies
  alternatives:
  - our persons
  - our bodies/carcasses
  lexicon: HALOT
  rationale: The noun can denote body, corpse, or physical frame. In this living context, 'our bodies' best conveys that only their own persons remain to be surrendered. 'Persons' is possible but less concrete than the Hebrew.
- source_word: וְאַדְמָתֵנוּ
  chosen: our land
  alternatives:
  - our ground
  - our farmland
  lexicon: HALOT
  rationale: אדמה is ground/land/soil. 'Our land' is the most natural rendering in this economic context of property transfer.
