translation:
  language: es
  text: Pero que pida con fe[a], sin dudar nada, porque el que duda es semejante a una ola del mar, movida por el viento y zarandeada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con confianza». La expresión griega ἐν πίστει usa πίστις, que en este contexto también puede comunicar la idea de confianza o dependencia confiada.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰτείτω
  english_pob_choice: let him ask
  chosen_spanish: que pida
  alternatives_spanish:
  - pida
  - que solicite
  lexicon: BDAG
  rationale: El imperativo de tercera persona se expresa de modo natural en español exhortativo con «que pida». Conserva la fuerza imperativa sin volverlo mecánico.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca transición con un matiz de contraste suave desde la afirmación anterior; «Pero» reproduce bien ese giro en español.
- source_word: ἐν πίστει
  english_pob_choice: in faith
  chosen_spanish: con fe
  alternatives_spanish:
  - en fe
  - con confianza
  lexicon: BDAG
  rationale: Aunque la preposición es ἐν, en español «con fe» comunica de forma natural la esfera o modo de la petición. Se preserva la lectura principal de πίστις como «fe».
- source_word: πίστει
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: Se mantiene el término principal «fe» por consistencia doctrinal y porque el contexto de la oración pide una confianza firme en Dios. «Confianza» queda como alternativa de matiz.
- source_word: μηδὲν διακρινόμενος
  english_pob_choice: doubting nothing
  chosen_spanish: sin dudar nada
  alternatives_spanish:
  - sin ninguna duda
  - sin vacilar
  lexicon: BDAG
  rationale: Aquí διακρινόμενος expresa vacilación o duda interior, no discernimiento intelectual. «Sin dudar nada» conserva la negación enfática de μηδέν y suena idiomático en español.
- source_word: ὁ γὰρ διακρινόμενος
  english_pob_choice: for the one who doubts
  chosen_spanish: porque el que duda
  alternatives_spanish:
  - pues el que duda
  - porque el que vacila
  lexicon: BDAG
  rationale: El participio sustantivado se traduce de forma genérica y natural; «el que duda» evita forzar género masculino particular y mantiene la referencia representativa.
- source_word: ἔοικεν
  english_pob_choice: is like
  chosen_spanish: es semejante a
  alternatives_spanish:
  - se parece a
  - es como
  lexicon: BDAG
  rationale: La comparación se expresa con un paralelismo claro y digno en español; «es semejante a» conserva mejor el tono comparativo formal.
- source_word: κλύδωνι θαλάσσης
  english_pob_choice: a wave of the sea
  chosen_spanish: una ola del mar
  alternatives_spanish:
  - una ola del mar agitado
  - un oleaje del mar
  lexicon: BDAG
  rationale: κλύδων denota una gran ola o embate del mar. «Ola del mar» es claro y fiel; no se añade más especificación de la que el griego exige.
- source_word: ἀνεμιζομένῳ
  english_pob_choice: driven by the wind
  chosen_spanish: movida por el viento
  alternatives_spanish:
  - impulsada por el viento
  - llevada por el viento
  lexicon: BDAG
  rationale: El participio pasivo conserva la imagen de una ola sometida al viento. «Movida por el viento» es natural y no sobretraduce.
- source_word: ῥιπιζομένῳ
  english_pob_choice: tossed about
  chosen_spanish: zarandeada
  alternatives_spanish:
  - agitada
  - lanzada de un lado a otro
  lexicon: BDAG
  rationale: Completa la imagen de inestabilidad con un término vivo y preciso. «Zarandeada» transmite el vaivén violento sin perder dignidad estilística.
theological_decisions:
- issue: Rendering of πίστις in an exhortational prayer context
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: Se conserva «fe» como traducción principal de πίστις, siguiendo la línea doctrinal del POB y la fuerza del contexto de confiar en Dios al pedir sabiduría. La alternativa «confianza» se admite como matiz, pero no reemplaza el término principal.
  doctrine_reference: 'DOCTRINE.md: πίστις → faith; alternatives trust / faithfulness'
- issue: Scope of μηδὲν διακρινόμενος
  english_pob_reading: doubting nothing
  chosen_spanish_reading: sin dudar nada
  alternative_spanish_readings:
  - sin ninguna duda
  - sin vacilar
  rationale: La frase debe reflejar la exigencia de no oscilar interiormente al orar. «Dudar» expresa adecuadamente la tensión aquí, sin convertirlo en mera indecisión intelectual.
  doctrine_reference: James 1:6 immediate context
- issue: Comparative force of ἔοικεν and the sea image
  english_pob_reading: is like a wave of the sea, driven by the wind and tossed about
  chosen_spanish_reading: es semejante a una ola del mar, movida por el viento y zarandeada
  alternative_spanish_readings:
  - es como una ola del mar, movida por el viento y agitada
  - se parece a una ola del mar, impulsada por el viento
  rationale: Se preserva la metáfora de inestabilidad sin suavizarla. «Zarandeada» ayuda a comunicar el movimiento violento sugerido por los dos participios pasivos griegos.
  doctrine_reference: Poetic-imagery consistency in James
translation_notes:
  revision_awareness: El texto se ajusta al paquete original griego de Santiago 1:6 y al audit trail inglés sin introducir cambios de sentido. Se mantuvo la tensión lexical de πίστις como «fe», con nota alternativa para «confianza», y se conservó la imagen completa del mar con dos participios pasivos para reflejar la inestabilidad descrita en el griego.
  spanish_consistency_notes:
  - Se usó «fe» para πίστις y no «fidelidad», salvo como alternativa anotada.
  - Se evitó «dudar» como simple matiz de discernimiento; aquí expresa vacilación interior.
  - La construcción «que pida» mantiene el tono exhortativo del imperativo griego.
  - «Zarandeada» traduce el efecto acumulativo de ἀνεμιζομένῳ y ῥιπιζομένῳ sin añadir elementos ajenos al texto.
