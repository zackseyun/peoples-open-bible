translation:
  language: es
  text: El número de los días del hombre es, a lo sumo, de cien años[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «Los días del hombre pueden llegar a muchos años: cien». El griego es breve y elíptico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀριθμός
  english_pob_choice: number
  chosen_spanish: cuenta
  alternatives_spanish:
  - número
  - cómputo
  - conteo
  lexicon: LSJ
  rationale: El sustantivo griego expresa una cuantificación. En español, «cuenta» suena natural en una sentencia proverbial y conserva la idea de cómputo sin forzar una construcción demasiado mecánica.
- source_word: ἡμερῶν
  english_pob_choice: days
  chosen_spanish: días
  alternatives_spanish:
  - jornada
  - vida
  - tiempo
  lexicon: LSJ
  rationale: El genitivo plural es literalmente «de días». Se mantiene esa concreción en español, porque el griego habla de la medida de la vida por días, no solo de una duración abstracta.
- source_word: ἀνθρώπου
  english_pob_choice: a man's
  chosen_spanish: del hombre
  alternatives_spanish:
  - de un hombre
  - de un ser humano
  - de la persona
  lexicon: LSJ
  rationale: Se conserva el singular genérico masculino del griego, con valor representativo. «Del hombre» mantiene esa fuerza proverbial y evita diluir el matiz singular del texto fuente.
- source_word: πολλὰ
  english_pob_choice: many
  chosen_spanish: a lo sumo
  alternatives_spanish:
  - muchos
  - numerosos
  - hasta
  lexicon: LSJ
  rationale: Aunque πολλὰ es literalmente «muchos», en combinación con ἔτη ἑκατόν el inglés POB entendió el sentido idiomático como límite de vida. En español, «a lo sumo» comunica ese valor de límite máximo sin ocultar la tensión interpretativa.
- source_word: ἔτη
  english_pob_choice: years
  chosen_spanish: años
  alternatives_spanish:
  - años de vida
  - tiempo
  lexicon: LSJ
  rationale: El término significa simplemente «años». Se conserva en español para reflejar el paralelismo directo con «días» y el alcance proverbio-brevísimo del dicho.
- source_word: ἑκατόν
  english_pob_choice: a hundred
  chosen_spanish: de cien años
  alternatives_spanish:
  - cien
  - de un centenar de años
  lexicon: LSJ
  rationale: El numeral se expresa de modo natural como parte del sintagma «de cien años». Esta solución sigue la lectura del POB inglés, que entiende la frase como un límite aproximado o máximo de longevidad.
theological_decisions:
- issue: Lectura del conjunto πολλὰ ἔτη ἑκατόν
  english_pob_reading: at most a hundred years
  chosen_spanish_reading: a lo sumo, de cien años
  alternative_spanish_readings:
  - 'muchos años: cien'
  - cien años como máximo
  - muchos años, hasta cien
  rationale: El griego es breve y elíptico. La versión inglesa optó por un sentido idiomático de límite. En español se conserva esa misma decisión interpretativa con «a lo sumo», pero sin perder la tensión entre el valor literal de «muchos» y la idea pragmática de un máximo de vida.
  doctrine_reference: Sabiduría proverbial; no hay afirmación doctrinal controvertida en el versículo.
- issue: Masculino genérico de ἀνθρώπου
  english_pob_reading: a man's
  chosen_spanish_reading: del hombre
  alternative_spanish_readings:
  - de un ser humano
  - de la persona
  - humanas
  rationale: Se mantiene el singular genérico del original. No se neutraliza el sujeto porque el dicho funciona proverbialmente con forma masculina singular en el griego, y la equivalencia auditable favorece conservar esa figura.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El inglés POB pasó de una redacción más literal y torpe a una formulación idiomática («at most a hundred years») para reflejar el sentido de límite vital. La presente versión española sigue esa revisión, pero conserva la tensión del griego entre «muchos años» y «cien», expresándola con una construcción natural en español.
  spanish_consistency_notes:
  - Se mantuvo «hombre» como genérico singular, en línea con la política de precisión de género del proyecto.
  - Se evitó «SEÑOR» porque no hay aquí el tetragrámaton ni una cita de κύριος; el versículo no contiene vocabulario divino.
  - Se eligió una fórmula breve y proverbial, adecuada al carácter gnómico del texto griego.
