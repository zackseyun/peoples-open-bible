id: JDG.20.25
reference: Judges 20:25
source:
  edition: WLC
  text: וַ/יֵּצֵא֩ בִנְיָמִ֨ן לִ/קְרָאתָ֥/ם מִֽן הַ/גִּבְעָה֮ בַּ/יּ֣וֹם הַ/שֵּׁנִי֒ וַ/יַּשְׁחִיתוּ֩ בִ/בְנֵ֨י יִשְׂרָאֵ֜ל ע֗וֹד שְׁמֹנַ֨ת עָשָׂ֥ר אֶ֛לֶף אִ֖ישׁ אָ֑רְצָ/ה כָּל אֵ֖לֶּה שֹׁ֥לְפֵי חָֽרֶב׀׀־־׃
translation:
  text: Benjamin came out from Gibeah to meet them on the second day[a], and they struck down another eighteen thousand men of Israel to the ground[b]; all these were drawing the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against them' for 'to meet them'; the Hebrew expression can denote hostile encounter in a military setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' for 'the sons of Israel.' The Hebrew is literally 'sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - went out
  lexicon: HALOT
  rationale: The verb יצא in narrative commonly means 'go out/come out.' 'Came out' fits the English viewpoint from the battlefield scene and is idiomatic in context.
- source_word: לִקְרָאתָם
  chosen: to meet them
  alternatives:
  - against them
  - to encounter them
  lexicon: HALOT
  rationale: לקראת often means 'to meet' or 'to confront.' Here the military context implies hostile encounter, but 'to meet them' preserves the Hebrew wording without over-paraphrasing; the hostility is clear from the following clause.
- source_word: מִן הַגִּבְעָה
  chosen: from Gibeah
  alternatives:
  - out of Gibeah
  lexicon: HALOT
  rationale: Straightforward locative source. The place name is transliterated per translation philosophy.
- source_word: בַּיּוֹם הַשֵּׁנִי
  chosen: on the second day
  alternatives:
  - on the next day
  lexicon: HALOT
  rationale: More formally reflects the ordinal expression in Hebrew. 'Next day' is possible in context but less explicit.
- source_word: וַיַּשְׁחִיתוּ
  chosen: they struck down
  alternatives:
  - they destroyed
  - they killed
  - they ruined
  lexicon: HALOT
  rationale: The Hiphil of שׁחת can mean 'destroy.' In battle context with a direct object of persons and a following casualty number, 'struck down' is natural English that conveys lethal military action without sounding wooden.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  chosen: of the sons of Israel
  alternatives:
  - of the Israelites
  - among the sons of Israel
  lexicon: HALOT
  rationale: The preposition ב can mark the object affected ('among/from'). 'Of the sons of Israel' preserves the underlying familial-national expression and the gender-accurate wording of the source. 'Israelites' is smoother but less transparent to the Hebrew phrase.
- source_word: עוֹד
  chosen: another
  alternatives:
  - again
  - still
  - yet
  lexicon: HALOT
  rationale: In casualty reporting after the previous day's losses, עוד marks an additional number. 'Another' best captures the additive force in idiomatic English.
- source_word: שְׁמֹנַת עָשָׂר אֶלֶף אִישׁ
  chosen: eighteen thousand men
  alternatives:
  - eighteen thousand men each
  - eighteen thousand soldiers
  lexicon: HALOT
  rationale: Standard rendering of the numeral phrase plus איש. 'Men' is preferable to 'soldiers' because the Hebrew says 'man/men,' though the military setting is obvious.
- source_word: אָרְצָה
  chosen: to the ground
  alternatives:
  - earthward
  - to the الأرض
  lexicon: HALOT
  rationale: The directional form of ארץ here idiomatically indicates falling/slaying to the ground. 'To the ground' is clear modern English and fits the battle context.
- source_word: כָּל אֵלֶּה
  chosen: all these
  alternatives:
  - all of these
  lexicon: HALOT
  rationale: Direct and natural rendering of the demonstrative phrase.
- source_word: שֹׁלְפֵי חָרֶב
  chosen: men drawing the sword
  alternatives:
  - those who drew the sword
  - swordsmen
  - armed men
  lexicon: HALOT
  rationale: Literally 'drawers of sword.' 'Men drawing the sword' preserves the vivid participial expression and links naturally with the preceding 'men.' 'Swordsmen' is possible but more interpretive and less transparent.
