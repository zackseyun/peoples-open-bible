translation:
  language: es
  text: Y el rey les dio órdenes[a], y desnudaron a Jonatán de sus vestiduras y lo vistieron de púrpura[b]; y así lo hicieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego presenta verbos en singular («desnudó», «vistió») después de «el rey les dio órdenes»; el sentido es que los asistentes ejecutaron el mandato real.
    reason: textual_variant
  - marker: b
    text: «Púrpura» señala en este escenario de corte una vestidura de prestigio o rango real, no solo el color en abstracto.
    reason: cultural_note
lexical_decisions:
- source_word: προσέταξεν
  english_pob_choice: gave orders
  chosen_spanish: les dio órdenes
  alternatives_spanish:
  - les ordenó
  - les mandó
  lexicon: BDAG
  rationale: El verbo griego expresa una orden con autoridad real. «Les dio órdenes» conserva el matiz de mandato y suena natural en español moderno sin perder el tono cortesano del contexto.
- source_word: ἐξέδυσεν
  english_pob_choice: they stripped ... of his garments
  chosen_spanish: desnudaron a Jonatán de sus vestiduras
  alternatives_spanish:
  - le quitaron sus vestiduras
  - lo despojaron de sus vestiduras
  lexicon: BDAG
  rationale: La escena es ceremonial y formal. «Desnudaron ... de sus vestiduras» reproduce la acción de quitar la ropa oficial con más fuerza que «le quitaron la ropa», y mantiene la tensión del original sin suavizarla.
- source_word: ἱμάτια
  english_pob_choice: garments
  chosen_spanish: vestiduras
  alternatives_spanish:
  - prendas
  - ropas
  lexicon: BDAG
  rationale: En este contexto de corte, «vestiduras» comunica mejor una indumentaria de rango que «ropa» o «prendas», y evita especificar más de lo que el griego dice.
- source_word: ἐνέδυσεν
  english_pob_choice: clothed him
  chosen_spanish: lo vistieron
  alternatives_spanish:
  - lo revistieron
  - lo cubrieron
  lexicon: BDAG
  rationale: El griego tiene forma singular, pero el contexto inmediato y la nota inglesa indican que los sirvientes ejecutan la orden. En español, el plural se adapta al sentido colectivo ya implícito y «lo vistieron» expresa bien el acto ceremonial.
- source_word: πορφύραν
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - tela púrpura
  - manto púrpura
  lexicon: BDAG
  rationale: «Púrpura» mantiene la referencia a un color o tejido de alto rango sin añadir un sustantivo que el griego no repite. En castellano conserva el valor real y ceremonial del pasaje.
- source_word: ἐποίησαν οὕτως
  english_pob_choice: they did so
  chosen_spanish: y así lo hicieron
  alternatives_spanish:
  - y lo hicieron así
  - y procedieron de ese modo
  lexicon: BDAG
  rationale: Es una cláusula resumida de cumplimiento. «Y así lo hicieron» es natural, fiel y refleja que se ejecutó la orden del rey.
translation_notes:
  revision_awareness: El texto griego coincide de manera alta con el testimonio auditado en inglés. La principal decisión de revisión fue adaptar al español el desajuste entre sujeto singular y verbos singulares del griego, manteniendo el sentido colectivo ya reconocido en la nota inglesa. No se requieren otras correcciones sustantivas.
  spanish_consistency_notes:
  - Se mantuvo «Jonatán» como forma española del nombre propio.
  - 'Se preservó el orden narrativo simple del original: mandato real, despojo, investidura, cierre de cumplimiento.'
  - Se evitó traducir «púrpura» por una perífrasis más explicativa en el texto principal para no perder la concisión del griego.
