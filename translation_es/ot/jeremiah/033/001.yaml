translation:
  language: es
  text: Y la palabra de Yahvé vino a Jeremías por segunda vez, mientras aún estaba detenido en el patio de la guardia[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en el patio de la prisión'. El hebreo probablemente se refiere a un recinto de detención vigilado o a un espacio de guardia.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: Se conserva la fórmula profética formal y teológica. 'Palabra' reproduce mejor el valor revelatorio y autoritativo que 'mensaje'. Se usa 'Yahvé' como equivalente del nombre divino, según la guía del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre propio divino 'Yahvé', no con una sustitución titulada. Esto preserva el nombre del pacto en el texto español.
- source_word: אֶל יִרְמְיָהוּ
  english_pob_choice: to Jeremiah
  chosen_spanish: a Jeremías
  alternatives_spanish:
  - para Jeremías
  - hacia Jeremías
  lexicon: HALOT
  rationale: La preposición de dirección se expresa de forma natural con 'a' en español, manteniendo el destinatario de la revelación sin forzar un calco.
- source_word: שֵׁנִית
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: HALOT
  rationale: La expresión española conserva con precisión la secuencia explícita del hebreo. 'Por segunda vez' es más exacta que el simple 'otra vez'.
- source_word: וְהוּא עוֹדֶנּוּ
  english_pob_choice: while he was still
  chosen_spanish: mientras aún estaba
  alternatives_spanish:
  - y él todavía estaba
  - cuando aún estaba
  lexicon: HALOT
  rationale: Se expresa la circunstancia temporal de manera natural en español, sin perder el matiz de continuidad de la situación previa al nuevo mensaje.
- source_word: עָצוּר
  english_pob_choice: confined
  chosen_spanish: detenido
  alternatives_spanish:
  - confinado
  - encerrado
  - preso
  lexicon: HALOT
  rationale: '''Detenido'' comunica la restricción de libertad sin afirmar más de lo que el participio exige. En español es más natural que ''confinado'' y menos específico que ''preso''.'
- source_word: בַּחֲצַר הַמַּטָּרָה
  english_pob_choice: in the court of the guard
  chosen_spanish: en el patio de la guardia
  alternatives_spanish:
  - en el patio del guardia
  - en la corte de la guardia
  - en el patio de la prisión
  lexicon: HALOT
  rationale: Se mantiene el sentido institucional del lugar de detención y vigilancia. 'Patio de la guardia' refleja bien la combinación de חֲצַר y מַטָּרָה, sin imponer de antemano una identificación estricta con una prisión formal.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y diciendo,
  - 'al decir:'
  lexicon: HALOT
  rationale: Se conserva la introducción estándar del discurso directo con una forma natural en español. La coma prepara la cita siguiente.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del proyecto pide transliterar el nombre divino. En español, 'Yahvé' es la forma que mejor reproduce esa decisión y evita sustituir el nombre por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Naturaleza del lugar: ''court of the guard'''
  english_pob_reading: guard court / court of the guard
  chosen_spanish_reading: patio de la guardia
  alternative_spanish_readings:
  - patio de la prisión
  - patio del guardia
  - patio de custodia
  rationale: El hebreo apunta a un recinto vigilado asociado a la detención. 'Patio de la guardia' conserva la ambigüedad documentada entre un espacio de custodia y una prisión formal, sin resolverla prematuramente.
  doctrine_reference: POB lexical note on בַּחֲצַר הַמַּטָּרָה
translation_notes:
  revision_awareness: 'El pasaje coincide de manera alta con el audit trail inglés: no hay revisiones pendientes en el registro fuente. Se mantiene la misma decisión sobre el nombre divino y la misma cautela lexical para el lugar de detención.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' para יְהוָה en coherencia con la política del proyecto y con el equivalente inglés 'Yahweh'.
  - '''Patio de la guardia'' conserva la ambigüedad útil del hebreo y permite la nota alternativa sobre ''patio de la prisión''.'
  - 'El orden español sigue la fórmula profética sin sonar rígido: ''Y vino la palabra de Yahvé a Jeremías por segunda vez...'''
