translation:
  language: es
  text: Pero todas las cosas buenas me vinieron todas juntas junto con ella[a], y en sus manos había riquezas incontables[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, con la Sabiduría, personificada como mujer en el contexto circundante.
