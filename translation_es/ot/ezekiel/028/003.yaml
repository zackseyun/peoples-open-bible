translation:
  language: es
  text: Mira[a], tú eres más sabio que Danel; nada oculto te es oscuro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «Danel»; tradicionalmente «Daniel». La forma consonántica aquí carece de la yod de la ortografía más conocida, por eso el texto principal conserva «Danel» y la nota recoge la identificación tradicional.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  - Observa
  lexicon: HALOT
  rationale: La partícula introduce una afirmación enfática y deíctica. «Mira» conserva ese impulso oral y directo en español actual mejor que un calco solemne como «He aquí».
- source_word: חָכָם אַתָּה
  english_pob_choice: you are wiser
  chosen_spanish: tú eres más sabio
  alternatives_spanish:
  - eres sabio
  - eres más sabio
  lexicon: HALOT
  rationale: El hebreo usa un adjetivo con valor comparativo por el contexto y la preposición con el nombre siguiente. En español, «más sabio» expresa la comparación de manera natural y fiel.
- source_word: מ/דנאל
  english_pob_choice: than Danel
  chosen_spanish: que Danel
  alternatives_spanish:
  - que Daniel
  lexicon: HALOT
  rationale: La forma consonántica preservada en el texto es דנאל, por lo que el nombre se translitera como «Danel». Se mantiene la distinción textual frente a la forma tradicional «Daniel».
- source_word: כָּל סָתוּם
  english_pob_choice: no hidden thing
  chosen_spanish: ningún secreto
  alternatives_spanish:
  - nada oculto
  - ninguna cosa oculta
  lexicon: HALOT
  rationale: La expresión apunta a algo cerrado u oculto. «Ningún secreto» comunica bien la idea en español sin perder el matiz de cosa escondida, y resulta más natural que una traducción demasiado literal.
- source_word: לֹא עֲמָמֽוּ/ךָ
  english_pob_choice: is obscure to you
  chosen_spanish: te es oscuro
  alternatives_spanish:
  - te es oculto
  - está velado para ti
  - te resulta oscuro
  lexicon: HALOT
  rationale: El verbo tiene el valor de oscurecer/volver opaco, no solo esconder. «Te es oscuro» conserva la tensión entre ocultamiento y falta de claridad que el inglés POB mantuvo con «obscure».
translation_notes:
  revision_awareness: El texto sigue la lectura hebrea consonántica transmitida en WLC y mantiene la decisión auditada del POB inglés de preservar «Danel» en el cuerpo principal, con nota para la identificación tradicional. No se registran revisiones textuales o teológicas adicionales en el expediente.
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo de segunda persona singular («tú», «te»), coherente con el hebreo.
  - «Secreto» y «oscuro» forman en español una pareja natural que conserva la relación semántica entre lo oculto y lo no claro.
  - Se evita sustituir «Danel» por «Daniel» en el texto principal para respetar la forma hebrea auditada.
