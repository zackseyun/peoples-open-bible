review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: la fuerza explicativa de כִּי, el valor locativo de שָׁמָּה, la imagen concreta de כִסְאוֹת y la función judicial de לְמִשְׁפָּט. También mantiene correctamente la referencia a la casa de David sin importar una lectura mesiánica al texto principal. Sin embargo, la formulación española principal tiene un tropiezo de naturalidad y una nota al pie impropia: «se sientan tronos» suena forzado en español de llegada, y la nota [c] presenta como alternativa exactamente la misma redacción que aparece en el texto.'
  spanish_quality_summary: El español es comprensible y digno, pero «Porque allí se sientan tronos» resulta poco idiomático en español moderno, aun si intenta seguir de cerca el hebreo. Una solución más natural y fiel es «Porque allí hay tronos puestos para juicio», que conserva la imagen de tronos establecidos para función judicial sin caer en una construcción extraña. Además, la nota [c] debe corregirse para ofrecer una alternativa real y no duplicar el texto base.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «David» y «juicio» están bien. La cuestión principal es estilística y de adecuación semántica del verbo יָשְׁבוּ en español: el inglés pudo retener «sit», pero en español con sujeto inanimado «tronos se sientan» no suena natural; conviene expresar el valor de establecimiento con «hay tronos puestos» y conservar la literalidad en nota.'
  issues:
