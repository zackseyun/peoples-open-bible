translation:
  language: es
  text: Y hay ocasiones en que los sacerdotes[a], tomando oro y plata de sus dioses, lo gastan para sí mismos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «robando» o «sustrayendo en secreto» oro y plata de sus dioses.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστι δὲ καὶ ὅτε
  english_pob_choice: And there are times when
  chosen_spanish: Y hay ocasiones en que
  alternatives_spanish:
  - Y hay veces en que
  - Y también ocurre que
  lexicon: LSJ
  rationale: La construcción griega introduce una circunstancia repetida o general. «Y hay ocasiones en que» conserva ese valor aspectual y suena natural en español sin volver el texto más concreto de lo que es.
- source_word: ὑφαιρούμενοι
  english_pob_choice: taking
  chosen_spanish: tomando
  alternatives_spanish:
  - quitando
  - llevándose
  - robando
  lexicon: LSJ
  rationale: El participio admite la idea de retirar o sustraer, a veces con matiz oculto. «Tomando» mantiene la cercanía al griego sin fijar de entrada una acusación más fuerte; el contexto satírico deja percibir el abuso.
- source_word: οἱ ἱερεῖς
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes
  - los presbíteros
  lexicon: LSJ
  rationale: En español bíblico, «sacerdotes» comunica de modo directo la función del grupo y corresponde al sujeto definido del griego.
- source_word: ἀπὸ τῶν θεῶν αὐτῶν
  english_pob_choice: from their gods
  chosen_spanish: de sus dioses
  alternatives_spanish:
  - de sus propios dioses
  - de entre sus dioses
  lexicon: LSJ
  rationale: La preposición con genitivo señala el origen de lo retirado. «De sus dioses» conserva la ironía de que los sacerdotes despojan a las mismas imágenes o deidades que sirven.
- source_word: χρυσὸν καὶ ἀργύριον
  english_pob_choice: gold and silver
  chosen_spanish: oro y plata
  alternatives_spanish:
  - oro y plata
  - objetos de oro y plata
  - adornos de oro y plata
  lexicon: LSJ
  rationale: El griego nombra los metales en forma simple; «oro y plata» mantiene esa literalidad y la amplitud semántica sin añadir una forma material que el texto no especifica.
- source_word: εἰς ἑαυτοὺς
  english_pob_choice: on themselves
  chosen_spanish: para sí mismos
  alternatives_spanish:
  - en sí mismos
  - para su propio provecho
  lexicon: LSJ
  rationale: Un español natural exige explicitar la dirección beneficiaria. «Para sí mismos» expresa el destino egoísta de la acción y funciona bien con el verbo siguiente.
- source_word: καταναλοῦσιν
  english_pob_choice: spend it
  chosen_spanish: lo gastan
  alternatives_spanish:
  - lo consumen
  - lo usan para sí
  lexicon: LSJ
  rationale: Dado que el objeto es oro y plata, «lo gastan» comunica el uso impropio y económico que el contexto demanda, sin perder la idea de consumo o despilfarro.
theological_decisions:
- issue: Ironía sobre sacerdotes e ídolos
  english_pob_reading: The verse is rendered to show that the priests remove valuables from the idols and use them for themselves, without softening the satire.
  chosen_spanish_reading: El versículo deja ver que los sacerdotes quitan bienes de sus dioses y los emplean en beneficio propio, conservando la ironía del texto.
  alternative_spanish_readings:
  - Una versión más explícita podría decir «robando» en lugar de «tomando».
  - También podría decirse «se los quedan para sí mismos».
  rationale: La fuerza del pasaje está en denunciar la impotencia de los ídolos y la corrupción de quienes los sirven. La redacción española mantiene esa sátira sin añadir una acusación más fuerte que la permitida por el participio griego.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el texto fuente y el análisis inglés permanecen estables, con acuerdo alto en la revisión cruzada.
  spanish_consistency_notes:
  - Se mantiene «dioses» en plural porque el griego usa θεῶν en plural y el contexto satírico alude a ídolos múltiples.
  - Se conserva un registro bíblico moderno y digno, evitando calcos como «sobre sí mismos» o «consumen» que sonarían menos naturales en español.
  - La nota lexical recoge la alternativa interpretativa presente en el audit trail inglés, sin sobrecargar el texto principal.
