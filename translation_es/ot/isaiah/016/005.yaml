    text: Or 'he will sit on it'; the Hebrew leaves the subject implicit.
    reason: alternative_reading
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, often denoting covenant loyalty or merciful love.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in truth.'
    reason: lexical_alternative
