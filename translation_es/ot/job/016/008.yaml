revisions:
- from: Tú me has marchitado; se ha vuelto un testigo[a]; mi flacura se levanta contra mí y testifica delante de mi rostro.
  to: Tú me has marchitado; se ha vuelto un testigo; mi flacura[a] se levanta contra mí y testifica ante mí.
  rationale: Se corrige el anclaje de la nota para que corresponda al término hebreo כחשי, y se mejora la naturalidad de בפני con 'ante mí' en lugar de 'delante de mi rostro'. El resto del verso ya preservaba adecuadamente el sentido físico-forense del original y las decisiones del POB inglés.
