translation:
  language: es
  text: 'Pero uno de los criminales que estaban colgados lo insultaba, diciendo: «¿No eres tú el Mesías[a]? Sálvate a ti mismo y a nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «el Cristo». Griego: ho christos.'
    reason: alternative_reading
lexical_decisions:
- source_word: Εἷς δὲ
  english_pob_choice: Now one
  chosen_spanish: Ahora uno
  alternatives_spanish:
  - Pero uno
  - Y uno
  lexicon: BDAG
  rationale: δέ introduce un desarrollo narrativo leve; en español, «Ahora uno» conserva la continuidad del relato sin cargar un contraste mayor que el del griego.
- source_word: τῶν κρεμασθέντων κακούργων
  english_pob_choice: of the criminals who were hanging there
  chosen_spanish: de los criminales que estaban colgados
  alternatives_spanish:
  - de los criminales crucificados
  - de los malhechores que estaban colgados
  lexicon: BDAG
  rationale: κακούργοι tiene el sentido de personas culpables o criminales; «criminales» reproduce bien ese valor. κρεμασθέντων alude a estar colgados en la crucifixión; «estaban colgados» sigue de cerca la imagen sin añadir una glosa interpretativa más específica.
- source_word: ἐβλασφήμει
  english_pob_choice: was reviling
  chosen_spanish: lo insultaba
  alternatives_spanish:
  - lo blasfemaba
  - lo injuriaba
  lexicon: BDAG
  rationale: En este contexto el acto es un ultraje dirigido a Jesús. «Insultaba» comunica mejor el sentido discursivo en español que «blasfemaba», que puede sonar demasiado técnico o teológicamente restringido.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre de objeto directo referido a Jesús; «lo» es la forma natural y clara en español.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: BDAG
  rationale: Participio de introducción de discurso; «diciendo» mantiene la construcción narrativa normal en español.
- source_word: Οὐχὶ σὺ εἶ
  english_pob_choice: Are you not
  chosen_spanish: ¿No eres tú
  alternatives_spanish:
  - ¿Acaso no eres tú
  - ¿No eres tú, entonces
  lexicon: BDAG
  rationale: La pregunta con οὐχί espera una respuesta afirmativa o funciona como burla; «¿No eres tú» preserva ese tono retórico de forma directa y natural.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no como nombre fijo; «Mesías» conserva su sentido judío y el valor titular que el audit trail documenta.
- source_word: σῶσον
  english_pob_choice: Save
  chosen_spanish: Sálvate
  alternatives_spanish:
  - Rescátate
  - Salva
  lexicon: BDAG
  rationale: El imperativo exige una acción reflexiva sobre Jesús mismo; «Sálvate» expresa el mandato de modo idiomático y conserva la fuerza de urgencia.
- source_word: σεαυτὸν καὶ ἡμᾶς
  english_pob_choice: yourself and us
  chosen_spanish: a ti mismo y a nosotros
  alternatives_spanish:
  - a ti mismo y también a nosotros
  - a ti mismo y nosotros
  lexicon: BDAG
  rationale: La coordinación incluye al hablante y a los otros condenados; «a ti mismo y a nosotros» suena natural en español y refleja el paralelismo del griego.
theological_decisions:
- issue: Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: En este versículo el término es un título mesiánico en un contexto de burla. Traducirlo como «Mesías» evita importar un uso eclesiástico fijo de «Cristo» y mantiene la referencia al rey esperado de Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός/Christos → Mesías cuando funciona como título'
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente griego y el audit trail inglés. No se requirieron cambios recientes; la opción «Mesías» coincide con la decisión doctrinal documentada para Χριστός como título, y «insultaba» mantiene en español el matiz contextual de ἐβλασφήμει sin perder la posibilidad alternativa de «lo ultrajaba» indicada en nota.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός como título en contexto, de acuerdo con la política del proyecto.
  - Se usa «criminales» para κακούργων y «colgados» para κρεμασθέντων, evitando sobreespecificar «crucificados» en el cuerpo del texto.
  - La forma reflexiva «Sálvate» conserva el imperativo dirigido a Jesús mismo.
  - Se evita «Cristo» en el texto principal para no neutralizar el valor titular del término griego.
