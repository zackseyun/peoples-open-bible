revisions:
- from: Y cuando Achior vio todo lo que el Dios de Israel había hecho[a], creyó a Dios con mucha fuerza, y se circuncidó la carne de su prepucio[b], y fue añadido a la casa de Israel hasta este día.
  to: Y cuando Ajior vio todo lo que el Dios de Israel había hecho[a], creyó mucho a Dios, y se circuncidó la carne de su prepucio, y fue añadido[b] a la casa de Israel hasta este día.
  rationale: Se corrigió la expresión intensiva de πιστεύω σφόδρα para un español más natural y fiel («creyó mucho a Dios» en vez de «con mucha fuerza»), y se restauró la nota alternativa relevante para προσετέθη según el POB inglés. También se ajustó el nombre a «Ajior», forma española más natural para Ἀχιώρ.
