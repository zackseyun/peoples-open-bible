translation:
  language: es
  text: Pero la justicia los perseguirá a ambos[a], porque pensaron mal acerca de Dios al prestar atención a los ídolos[b], y juraron injustamente, con engaño, despreciando la santidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las exigencias de la justicia» o «el justo castigo perseguirá a ambos».
    reason: lexical_alternative
  - marker: b
    text: Es decir, formaron una falsa idea de Dios al adherirse a los ídolos.
    reason: lexical_alternative
  - marker: c
    text: O «despreciando la piedad» o «mostrando desprecio por lo sagrado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμφότερα
  english_pob_choice: both
  chosen_spanish: a ambos
  alternatives_spanish:
  - a los dos
  - ambas cosas
  - ambas partes
  lexicon: LSJ
  rationale: El griego neutro plural/adverbial remite de manera resumida a los dos males u ofensas mencionados en el contexto inmediato. «A ambos» conserva esa referencia dual sin forzar una explicación más interpretativa en el cuerpo del texto.
- source_word: μετελεύσεται
  english_pob_choice: will pursue
  chosen_spanish: los perseguirá
  alternatives_spanish:
  - los alcanzará
  - vendrá sobre ellos
  - los visitará
  lexicon: LSJ
  rationale: El verbo expresa una acción que sigue con fuerza retributiva. «Perseguirá» conserva la imagen de una justicia que va tras los culpables, de modo natural en español y sin cerrar demasiado el matiz de retribución.
- source_word: τὰ δίκαια
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - lo justo
  - el justo castigo
  - las exigencias de la justicia
  lexicon: LSJ
  rationale: El plural neutro con artículo puede abarcar las reclamaciones o consecuencias justas. «La justicia» reproduce bien ese sentido amplio; «el justo castigo» sería más explícito, pero estrecharía el alcance antes de tiempo.
- source_word: κακῶς ἐφρόνησαν περὶ θεοῦ
  english_pob_choice: they thought wrongly about God
  chosen_spanish: pensaron mal acerca de Dios
  alternatives_spanish:
  - razonaron mal acerca de Dios
  - tuvieron malos pensamientos sobre Dios
  lexicon: LSJ
  rationale: La frase apunta a un juicio o concepción erróneos acerca de Dios, no solo a una emoción o actitud moral. «Pensaron mal acerca de Dios» comunica esa falla cognitiva con claridad y sin arcaísmo.
- source_word: προσχόντες εἰδώλοις
  english_pob_choice: by giving heed to idols
  chosen_spanish: al prestar atención a los ídolos
  alternatives_spanish:
  - al entregarse a los ídolos
  - al adherirse a los ídolos
  - al dar oído a los ídolos
  lexicon: LSJ
  rationale: 'El participio explica cómo pensaron mal acerca de Dios: dirigieron su atención/adherencia hacia los ídolos. «Prestar atención a los ídolos» conserva la relación participial y evita añadir una intensidad cultual no explicitada por el griego.'
- source_word: ἀδίκως ὤμοσαν
  english_pob_choice: they swore unjustly
  chosen_spanish: juraron injustamente
  alternatives_spanish:
  - juraron falsamente
  - hicieron juramentos perversos
  - juzgaron mal al jurar
  lexicon: LSJ
  rationale: ἀδίκως señala que el juramento fue hecho de manera injusta o incorrecta. «Injustamente» mantiene ese peso moral-jurídico mejor que «falsamente», que en español puede reducir el problema solo a veracidad factual.
- source_word: ἐν δόλῳ
  english_pob_choice: in deceit
  chosen_spanish: en engaño
  alternatives_spanish:
  - con engaño
  - engañosamente
  - con fraude
  lexicon: LSJ
  rationale: La frase preposicional modifica el jurar e indica la esfera o modo del engaño. «En engaño» es cercano a la estructura griega y suficientemente claro en español.
- source_word: καταφρονήσαντες ὁσιότητος
  english_pob_choice: despising holiness
  chosen_spanish: despreciando la santidad
  alternatives_spanish:
  - despreciando la piedad
  - mostrando desprecio por lo sagrado
  - desatendiendo la santidad
  lexicon: LSJ
  rationale: ὁσιότης puede abarcar santidad/piedad/reverencia por lo sagrado. «Santidad» es la opción más accesible y fuerte en español; «piedad» sigue siendo posible, pero puede sonar más estrecha o subjetiva.
theological_decisions:
- issue: Alcance de «a ambos» y de «la justicia»
  english_pob_reading: '''both'' refers to the two sins named in the verse’s latter half, and ''justice'' denotes the just consequences that pursue the offenders.'
  chosen_spanish_reading: «A ambos» remite a las dos culpas mencionadas en la cláusula final, y «la justicia» expresa las consecuencias justas que los persiguen.
  alternative_spanish_readings:
  - «A ambos» puede referirse también a dos clases de idólatras del contexto anterior
  - «el justo castigo» haría más explícita la dimensión punitiva
  rationale: 'La sintaxis inmediata favorece una síntesis de dos ofensas: la mala concepción de Dios mediante los ídolos y el juramento injusto. Mantener «la justicia» preserva el campo moral-jurídico sin reducirlo prematuramente a castigo, aunque la consecuencia retributiva está claramente implicada.'
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en lugar de resolverla; coherencia de términos clave, o excepción documentada.'
translation_notes:
  revision_awareness: El texto base en inglés y el paquete original griego coinciden sustancialmente y la última pasada revisada quedó sin cambios; por eso no se introducen variantes textuales, solo decisiones léxicas y de alcance semántico directamente justificadas por el griego y el audit trail en inglés.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ conforme a la norma del proyecto.
  - Se conserva un registro sobrio y publicable, evitando calcos innecesarios pero sin expandir el sentido más allá del griego.
  - «La justicia» mantiene la ambigüedad productiva entre principio moral y consecuencia retributiva, en línea con la POB en inglés.
  - Las notas al pie preservan alternativas relevantes donde el inglés POB también las documentó.
