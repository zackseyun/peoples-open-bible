  text: מַשְׂכִּ֗יל לְ/אָ֫סָ֥ף הַאֲזִ֣ינָ/ה עַ֭מִּ/י תּוֹרָתִ֑/י הַטּ֥וּ אָ֝זְנְ/כֶ֗ם לְ/אִמְרֵי פִֽ/י־׃
