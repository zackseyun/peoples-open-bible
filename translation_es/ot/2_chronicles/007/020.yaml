translation:
  language: es
  text: entonces los arrancaré de mi tierra que les he dado, y esta casa[a], que he consagrado para mi nombre, la echaré de mi vista[b], y la haré proverbio[c] y objeto de burla entre todos los pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «este templo». Hebreo: «esta casa».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de delante de mi rostro».
    reason: lexical_alternative
  - marker: c
    text: 'O: «proverbio y objeto de escarnio» / «burla y proverbio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתַשְׁתִּים
  english_pob_choice: then I will uproot them
  chosen_spanish: entonces los arrancaré
  alternatives_spanish:
  - entonces los arrancaré de raíz
  - entonces los desarraigaré
  lexicon: HALOT
  rationale: נתשׁ expresa la idea de arrancar o desarraigar. En español, «arrancar» conserva la imagen concreta; el contexto de juicio y expulsión lo vuelve natural y fiel.
- source_word: מֵעַל אַדְמָתִי
  english_pob_choice: from my land
  chosen_spanish: de mi tierra
  alternatives_spanish:
  - de mi suelo
  - de mi terreno
  lexicon: HALOT
  rationale: אַדְמָה en contexto de pacto y posesión divina se comunica mejor como «tierra». «Mi» conserva la relación de pertenencia del pacto.
- source_word: הַבַּיִת הַזֶּה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  - este edificio
  lexicon: HALOT
  rationale: Se mantiene la forma hebrea «casa», que en este contexto designa el templo sin sustituirla por un término explicativo menos literal.
- source_word: הִקְדַּשְׁתִּי לִשְׁמִי
  english_pob_choice: I have consecrated for my name
  chosen_spanish: he consagrado para mi nombre
  alternatives_spanish:
  - he santificado para mi nombre
  - he apartado para mi nombre
  lexicon: HALOT
  rationale: הקדישׁ se vierte bien como «consagrar», que preserva el sentido cultual. «Para mi nombre» conserva la referencia teológica al nombre divino sin reinterpretarlo como mera fama.
- source_word: אַשְׁלִיךְ מֵעַל פָּנַי
  english_pob_choice: I will cast out of my sight
  chosen_spanish: la arrojaré lejos de mi vista
  alternatives_spanish:
  - la arrojaré de delante de mí
  - la expulsaré de mi presencia
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de sobre mi rostro». «Lejos de mi vista» comunica la imagen idiomática de rechazo/presencia de modo claro en español sin perder la fuerza del gesto.
- source_word: וְאֶתְּנֶנּוּ
  english_pob_choice: and I will make it
  chosen_spanish: la haré
  alternatives_spanish:
  - la convertiré en
  - la pondré como
  lexicon: HALOT
  rationale: Aquí נתן con complemento predicativo expresa convertir algo en cierta condición. «La haré» reproduce bien esa construcción en español.
- source_word: לְמָשָׁל
  english_pob_choice: a proverb
  chosen_spanish: proverbio
  alternatives_spanish:
  - refrán
  - dicho
  lexicon: HALOT
  rationale: מָשָׁל puede ser proverbio, dicho o parábola. «Proverbio» es la opción más estable en esta combinación con שְׁנִינָה.
- source_word: לִשְׁנִינָה
  english_pob_choice: a byword
  chosen_spanish: objeto de burla
  alternatives_spanish:
  - objeto de escarnio
  - dicho de burla
  lexicon: HALOT
  rationale: שְׁנִינָה denota una expresión burlona o despectiva. «Objeto de burla» expresa bien la idea de escarnio público en español actual.
- source_word: בְּכָל הָעַמִּים
  english_pob_choice: among all peoples
  chosen_spanish: entre todos los pueblos
  alternatives_spanish:
  - entre todas las naciones
  - entre todos los pueblos y naciones
  lexicon: HALOT
  rationale: «Pueblos» preserva el plural de עַמִּים mejor que «naciones» y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Término de templo como «casa»
  english_pob_reading: this house
  chosen_spanish_reading: esta casa
  alternative_spanish_readings:
  - este templo
  rationale: Se conserva la terminología del hebreo, que llama al templo «casa». Esto evita sustituir el término base por uno explicativo y mantiene la teología bíblica del lugar de morada divina.
  doctrine_reference: Lexical fidelity / temple theology
- issue: Imagen de expulsión desde la presencia divina
  english_pob_reading: cast out of my sight
  chosen_spanish_reading: la arrojaré lejos de mi vista
  alternative_spanish_readings:
  - la arrojaré de delante de mí
  - la expulsaré de mi presencia
  rationale: La expresión hebrea es un modismo de rechazo desde la presencia/rostro de Dios. «Lejos de mi vista» comunica esa ruptura de relación sin literalismo torpe.
  doctrine_reference: Divine presence and judgment
- issue: Lista de deshonra pública
  english_pob_reading: a proverb and a byword
  chosen_spanish_reading: proverbio y objeto de burla
  alternative_spanish_readings:
  - proverbio y escarnio
  - refrán y burla
  rationale: El par hebreo combina dicho proverbial con sentido de ridículo público. «Objeto de burla» conserva la vergüenza social sin borrar el primer término.
  doctrine_reference: Public shame / covenant curse
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail inglés con acuerdo alto y sin cambios recientes. La principal corrección aplicada fue anclar las notas al texto español mediante marcadores visibles [a], [b] y [c], evitando notas sueltas.
  spanish_consistency_notes:
  - Se preserva «casa» para בית en coherencia con el hebreo y con la decisión auditada en inglés.
  - Se traduce אַדְמָה como «tierra» en contexto de pacto, no como «suelo» o «terreno», para mantener naturalidad y peso teológico.
  - Se evita «SEÑOR» para el nombre divino porque este versículo no contiene el Tetragrámaton explícito.
  - «Pueblos» reproduce mejor el plural hebreo עַמִּים que «naciones».
