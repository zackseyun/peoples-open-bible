translation:
  language: es
  text: Y tú, acuéstate sobre tu lado izquierdo, y pon la iniquidad de la casa de Israel sobre él; por el número de los días que te acuestes sobre él, llevarás la iniquidad de ellos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «culpa» o «castigo por la iniquidad» para עָוֹן en ambos casos; el término puede abarcar el pecado mismo, su culpa o su consecuencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁכַב
  english_pob_choice: lie
  chosen_spanish: acuéstate
  alternatives_spanish:
  - tiéndete
  - yace
  lexicon: HALOT
  rationale: El imperativo hebreo exige una postura física ordenada. «Acuéstate» es natural en español y conserva la idea de recostarse sin añadir contenido que el hebreo no expresa explícitamente.
- source_word: צִדְּךָ הַשְּׂמָאלִי
  english_pob_choice: your left side
  chosen_spanish: tu lado izquierdo
  alternatives_spanish:
  - tu costado izquierdo
  - tu flanco izquierdo
  lexicon: HALOT
  rationale: צַד significa «lado» en este contexto de postura corporal. «Tu lado izquierdo» reproduce bien el mandato simbólico y es claro para lector general.
- source_word: וְשַׂמְתָּ
  english_pob_choice: place
  chosen_spanish: pon
  alternatives_spanish:
  - coloca
  - pondrás
  lexicon: HALOT
  rationale: שׂים puede ser «poner/colocar/poner sobre». Aquí el verbo introduce una acción simbólica concreta; «pon» es directo y fiel en español.
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - castigo por la iniquidad
  lexicon: HALOT
  rationale: La raíz עון puede abarcar pecado, culpa o la carga/consecuencia del pecado. «Iniquidad» preserva esa ambigüedad moral y permite mantener la imagen de cargar un peso simbólico. Se evita resolver de antemano el sentido hacia «culpa» o «castigo».
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: La expresión hebrea es una designación corporativa y covenantal estable. «La casa de Israel» conserva esa forma tradicional y precisa mejor que simplemente «Israel».
- source_word: עָלָיו
  english_pob_choice: upon it
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre ello
  lexicon: HALOT
  rationale: El pronombre remite naturalmente al «lado» sobre el cual yace Ezequiel. En español, «sobre él» mantiene la relación espacial y evita una paráfrasis más explicativa.
- source_word: מִסְפַּר הַיָּמִים אֲשֶׁר
  english_pob_choice: for the number of the days that
  chosen_spanish: por el número de los días que
  alternatives_spanish:
  - según el número de los días que
  - durante el número de los días que
  lexicon: HALOT
  rationale: La construcción marca duración medida por días contados. «Por el número de los días que» conserva el matiz cuantitativo sin sonar forzado en español.
- source_word: תִּשְׁכַּב
  english_pob_choice: you lie
  chosen_spanish: te acuestes
  alternatives_spanish:
  - yaces
  - te recuestes
  lexicon: HALOT
  rationale: El imperfecto con sentido durativo se expresa mejor con una subordinada en español («que te acuestes»). Esto suena natural y conserva la continuidad de la acción.
- source_word: תִּשָּׂא
  english_pob_choice: you shall bear
  chosen_spanish: llevarás
  alternatives_spanish:
  - cargarás
  - soportarás
  lexicon: HALOT
  rationale: נשא con עון puede significar «llevar/bear/carry» una culpa o carga. «Llevarás» mantiene la imagen de carga y deja abierta la tensión semántica entre culpa, carga y consecuencia.
- source_word: עֲוֺנָם
  english_pob_choice: their iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - su castigo
  lexicon: HALOT
  rationale: El sufijo plural se refiere corporativamente a Israel, y en español puede expresarse naturalmente con «su» colectivo. Se mantiene la misma palabra base «iniquidad» para conservar coherencia léxica dentro del versículo.
theological_decisions:
- issue: Sentido de «llevar la iniquidad» en el acto simbólico de Ezequiel
  english_pob_reading: Retain 'bear their iniquity' as a symbolic prophetic sign-act without importing substitutionary atonement language.
  chosen_spanish_reading: Conservar «llevarás su iniquidad» como un signo profético simbólico, sin introducir lenguaje expiatorio o sustitutivo que el versículo no exige.
  alternative_spanish_readings:
  - llevarás su culpa
  - llevarás el castigo de su iniquidad
  rationale: El hebreo admite un rango semántico entre pecado, culpa y consecuencia, pero el contexto inmediato presenta una acción profética dramatizada. Traducir de forma abierta preserva la tensión interpretativa y evita cerrar el sentido hacia una doctrina específica que el texto no formula explícitamente.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios sustanciales; se mantiene la solución auditada con alta concordancia entre el texto fuente y la lectura inglesa de POB.
  spanish_consistency_notes:
  - Se conserva la terminología base «iniquidad» para עָוֹן en ambas ocurrencias, como en el audit trail inglés.
  - «Casa de Israel» mantiene el matiz corporativo y covenantal del hebreo.
  - 'El pronombre de objeto se traduce de forma espacial («sobre él») para reflejar el referente inmediato: el lado sobre el que yace Ezequiel.'
  - Se evitó «SEÑOR» u otra sustitución, ya que este versículo no contiene el Tetragrámaton.
