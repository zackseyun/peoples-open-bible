translation:
  language: es
  text: Y será como cuando uno recoge el grano en pie en la cosecha, y su brazo siega las espigas; y será como cuando uno rebusca espigas en el Valle de Refaím[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Refaím es un nombre de lugar; alternativamente, el nombre se ha relacionado con 'gigantes'.
    reason: alternative_reading
lexical_decisions:
- source_word: כֶּאֱסֹף
  english_pob_choice: as when one gathers
  chosen_spanish: como cuando se recoge
  alternatives_spanish:
  - como cuando uno recoge
  - al recoger
  lexicon: HALOT
  rationale: La construcción comparativa con infinitivo exige en español una equivalencia natural de comparación temporal. 'Se recoge' mantiene el valor genérico impersonal que tiene el inglés POB, sin añadir un sujeto específico.
- source_word: קָצִיר
  english_pob_choice: harvest
  chosen_spanish: la cosecha
  alternatives_spanish:
  - la siega
  - la mies
  lexicon: HALOT
  rationale: Aquí el término señala el momento del ciclo agrícola, no solo la acción de segar. 'La cosecha' comunica bien ese contexto en español; se conserva también 'mies' para dar continuidad al campo semántico agrícola.
- source_word: קָמָה
  english_pob_choice: standing grain
  chosen_spanish: la mies
  alternatives_spanish:
  - el grano en pie
  - las espigas en pie
  - el cereal en pie
  lexicon: HALOT
  rationale: El hebreo alude al grano todavía en pie. 'Mies' es un término bíblico y comprensible en español que puede abarcar ese cereal aún no cortado; por eso se acompaña con 'al tiempo de la cosecha' para evitar ambigüedad.
- source_word: וּזְרֹעוֹ
  english_pob_choice: and his arm
  chosen_spanish: y con su brazo
  alternatives_spanish:
  - y su brazo
  - y con el brazo
  lexicon: HALOT
  rationale: El hebreo conserva la imagen corporal del segador. 'Con su brazo' mantiene esa imagen con claridad en español y refleja el instrumento de la acción.
- source_word: שִׁבֳּלִים
  english_pob_choice: the ears
  chosen_spanish: las espigas
  alternatives_spanish:
  - las cabezas de grano
  - las espigas de grano
  lexicon: HALOT
  rationale: En español 'espigas' comunica mejor la imagen agrícola que 'ears', que sería demasiado literal y poco natural. Mantiene el sentido de las cabezas/espigas de cereal que se siegan y recogen.
- source_word: יִקְצוֹר
  english_pob_choice: reaps
  chosen_spanish: siega
  alternatives_spanish:
  - cosecha
  - corta
  lexicon: HALOT
  rationale: '''Segar'' es el verbo agrícola más adecuado para el contexto de trillar/cortar cereal en español y conserva la fuerza verbal de la metáfora.'
- source_word: כִּמְלַקֵּט
  english_pob_choice: as when one gleans
  chosen_spanish: como cuando se espigan
  alternatives_spanish:
  - como cuando se rebusca
  - como cuando se recogen espigas
  lexicon: HALOT
  rationale: El participio expresa la acción de recoger las sobras del campo. 'Espigar' en español bíblico/agrícola refleja ese acto específico de recoger espigas remanentes; evita perder el matiz técnico de 'glean'.
- source_word: בְּעֵמֶק רְפָאִים
  english_pob_choice: in the Valley of Rephaim
  chosen_spanish: en el Valle de Refaím
  alternatives_spanish:
  - en el valle de los refaítas
  - en el Valle de los Gigantes
  lexicon: HALOT
  rationale: Se mantiene el topónimo transliterado siguiendo la política del proyecto. 'Refaím' preserva el nombre propio y evita imponer la glosa interpretativa 'gigantes' en el texto principal.
theological_decisions:
- issue: Valor del topónimo רְפָאִים
  english_pob_reading: Rephaim is a place name; alternatively, the name has been connected with 'giants.'
  chosen_spanish_reading: Refaím se traduce como topónimo transliterado, sin incorporar la glosa 'gigantes' al texto principal.
  alternative_spanish_readings:
  - Valle de los Gigantes
  - valle de los refaítas
  rationale: El contexto inmediato trata de un lugar geográfico, no de una afirmación directa sobre seres gigantes. Por fidelidad al nombre propio y para no cerrar una tensión léxica/documental, se conserva la transliteración en el cuerpo del texto y se deja abierta la lectura alternativa en nota.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names.'
translation_notes:
  revision_awareness: El texto inglés auditado ya muestra una solución estable sin revisiones aplicadas y con acuerdo moderado; la versión española sigue esa línea sin introducir novedades interpretativas, pero ajusta 'gathers/gleans' a verbos agrícolas naturales en español y mantiene el topónimo transliterado conforme a la política del proyecto.
  spanish_consistency_notes:
  - Se preserva el paralelismo repetido 'y será como cuando...' del hebreo y del inglés POB.
  - Se mantiene el registro bíblico sobrio y agrícola, evitando explicitar más de lo que el hebreo dice.
  - '''Refaím'' se usa como transliteración estable en lugar de ''gigantes'' para el texto principal.'
  - Las notas a pie señalan alternativas léxicas legítimas sin alterar la línea principal de traducción.
