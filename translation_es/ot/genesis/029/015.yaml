review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: Labán habla a Jacob, apela al parentesco, rechaza el trabajo no remunerado y le pide que indique su compensación. Sin embargo, dos elecciones debilitan la alineación con la evidencia fuente y con el rastro auditado en inglés: «vas a servirme» desplaza el matiz laboral de עבד en este contexto de negociación salarial, y «qué salario tendrás» suena más a predicción de lo que Jacob recibirá que a una petición para que nombre cuál debe ser su paga.'
  spanish_quality_summary: El español es claro y legible, pero puede mejorarse para sonar más natural y más fiel al sentido negociador. «¿vas a servirme de balde?» es comprensible, aunque «trabajar para mí» encaja mejor con «salario». Además, «qué salario tendrás» resulta menos idiomático que «cuál será tu salario» o «cuál debe ser tu salario» después de «Dime».
  glossary_alignment: No hay términos teológicos de proyecto en juego. La nota sobre אָחִי como «mi hermano» con sentido amplio está bien. La nota b sobre «salario» no es necesaria, ya que el español principal puede resolver el sentido sin crear ambigüedad nueva.
  issues:
  - severity: medium
    issue: «servirme» para וַעֲבַדְתַּנִי
    rationale: Aunque עבד puede significar servir, aquí el contexto inmediato de מַשְׂכֻּרְתֶּךָ («tu salario/paga») favorece claramente «trabajar para mí». «Servirme» en español puede sonar demasiado personal o doméstico y debilita el vínculo con remuneración laboral.
  - severity: medium
    issue: «qué salario tendrás» para מַה מַשְׂכֻּרְתֶּךָ
    rationale: La construcción española sugiere una afirmación sobre un salario futuro, no tanto una invitación a fijarlo. El hebreo, y la auditoría inglesa, apuntan a «dime cuál será tu salario» o equivalente negociador.
  - severity: low
    issue: Nota b innecesaria
    rationale: «Salario» o «paga» ya se entienden naturalmente en español. La nota no preserva una alternativa fuente significativa ni resuelve una ambigüedad nueva creada por el español.
  revised_spanish_text: 'Entonces Labán dijo a Jacob[a]: «Porque eres mi pariente, ¿vas a trabajar para mí de balde? Dime cuál será tu salario».

