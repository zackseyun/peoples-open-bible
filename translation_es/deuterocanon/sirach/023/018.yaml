    rationale: Aunque reproduce ψυχή literalmente, en español suena tieso. «Dice en su interior» o «dice para sí» serían más naturales; si se prefiere conservar la textura antropológica, puede explicarse en nota.
  - severity: low
    issue: La nota al pie puede afinar la alternativa contextual
    rationale: «deja su lecho matrimonial» funciona, pero conviene reflejar también que el griego puede entenderse como «se aparta/se desvía de su lecho», manteniendo el eufemismo.
