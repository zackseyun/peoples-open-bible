translation:
  language: es
  text: No harán ningún trabajo. Es un estatuto permanente[a] a través de sus generaciones, en todos los lugares donde habiten[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativamente: «un estatuto para siempre» o «un estatuto perpetuo». La expresión hebrea חֻקַּת עוֹלָם indica duración continua o permanente.'
    reason: lexical_alternative
  - marker: b
    text: 'Alternativamente: «en todos sus asentamientos» o «dondequiera que vivan». El hebreo בְּכֹל מֹשְׁבֹתֵיכֶם se refiere a todos sus lugares de residencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל מְלָאכָה
  english_pob_choice: no work
  chosen_spanish: ningún trabajo
  alternatives_spanish:
  - ninguna labor
  - ninguna clase de trabajo
  - ningún quehacer
  lexicon: HALOT
  rationale: 'מְלָאכָה designa trabajo, labor u ocupación. Con la negación y כָּל, el sentido es total: no se permite trabajo alguno. En español, «ningún trabajo» comunica esa fuerza de manera natural y sobria.'
- source_word: לֹא תַעֲשׂוּ
  english_pob_choice: you shall do no
  chosen_spanish: No harán
  alternatives_spanish:
  - No deben hacer
  - No deben realizar
  - No harán ustedes
  lexicon: HALOT
  rationale: La forma prohibitiva legal en hebreo se expresa bien con futuro prohibitivo en español formal. «No harán» mantiene registro jurídico y concisión, sin añadir énfasis inexistente en el hebreo.
- source_word: חֻקַּת עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: un estatuto permanente
  alternatives_spanish:
  - un estatuto perpetuo
  - un estatuto para siempre
  - un decreto permanente
  lexicon: HALOT
  rationale: חֻקָּה es una disposición legal fija; «estatuto» preserva mejor el matiz jurídico que «regla» o «costumbre». עוֹלָם aquí expresa duración continua; «permanente» comunica vigencia duradera sin forzar una afirmación filosófica de eternidad absoluta.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - por todas las generaciones
  - de generación en generación
  - a través de sus generaciones
  lexicon: HALOT
  rationale: La frase marca aplicabilidad continua a través de sucesivas generaciones. «Por todas sus generaciones» conserva ese alcance temporal de forma clara y natural.
- source_word: בְּכֹל מֹשְׁבֹתֵיכֶם
  english_pob_choice: in all your dwelling places
  chosen_spanish: en todos sus lugares de habitación
  alternatives_spanish:
  - en todas sus moradas
  - en todos sus asentamientos
  - dondequiera que habiten
  lexicon: HALOT
  rationale: מֹשָׁב se refiere a lugares de morada o residencia. «Lugares de habitación» mantiene el campo semántico de residencia sin reducirlo a un término más técnico o más estrecho.
theological_decisions:
- issue: Alcance temporal de la norma cultual
  english_pob_reading: a permanent statute
  chosen_spanish_reading: un estatuto permanente
  alternative_spanish_readings:
  - un estatuto perpetuo
  - un estatuto para siempre
  - un decreto perpetuo
  rationale: La lectura del inglés POB sigue el valor durativo de עוֹלָם dentro del marco del pacto. «Permanente» conserva la seriedad legal y el carácter vigente de la norma sin sobretraducirla como una declaración metafísica absoluta.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological tension rather than over-resolve'
translation_notes:
  revision_awareness: 'Se siguió la revisión que retiró una intensificación añadida en el inglés («at all»). Por eso en español no se añadió ningún refuerzo equivalente y se mantuvo una prohibición sobria: «No harán ningún trabajo».'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando el texto lo requiera; este versículo no lo contiene.
  - «Estatuto» se mantiene para conservar el matiz jurídico de חֻקָּה.
  - «Lugar(es) de habitación» preserva el valor locativo de מֹשְׁבֹתֵיכֶם sin interpretarlo como término técnico de frontera o asentamiento.
