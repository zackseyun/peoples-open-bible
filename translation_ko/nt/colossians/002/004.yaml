  lexicon: BDAG
  rationale: 「잘못된 추론으로 속임」을 「속이다」로 옮긴다.
- source_word: ἐν πιθανολογίᾳ
  english_pob_choice: with persuasive argument
  chosen_korean: 그럴듯한 말로
