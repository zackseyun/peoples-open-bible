base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/010/018.yaml
  text: 'For thus says Yahweh: Behold[a], I am slinging out the inhabitants of the land at this time[c][b], and I will distress them so that they may find it.'
  footnotes:
