translation:
  language: es
  text: Pero ellos[a], mientras dormían el mismo sueño, con la noche verdaderamente irresistible que les había sobrevenido desde las profundidades del Hades irresistible,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «la noche verdaderamente impotente ... desde las profundidades del Hades impotente». El griego repite la misma raíz (ἀδύνατος) en ambos miembros, y el matiz exacto es difícil: puede significar «sin poder/impotente» en sentido literal o, por implicación contextual, «imposible de resistir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδύνατον
  english_pob_choice: powerless
  chosen_spanish: impotente
  alternatives_spanish:
