translation:
  language: es
  text: Cuando un hombre justo se aparta de su justicia y comete injusticia[a], y muere a causa de ellas[b], por la injusticia que ha cometido morirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hace mal» / «comete iniquidad». El hebreo עָוֶל tiene el sentido de injusticia, mal o conducta torcida.
    reason: lexical_alternative
  - marker: b
    text: «A causa de ellas» refleja el pronombre plural hebreo y se refiere a los actos injustos mencionados.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׁוּב
  english_pob_choice: When ... turns away
  chosen_spanish: Cuando ... se aparta
  alternatives_spanish:
  - Al apartarse
  - Cuando ... se desvía
  lexicon: HALOT
  rationale: El infinitivo con ב introduce una cláusula temporal. En este contexto, שוב con מן expresa apartarse de una condición previa, no volver a ella. «Se aparta» conserva el valor direccional y suena natural en español.
- source_word: צַדִּיק
  english_pob_choice: a righteous man
  chosen_spanish: un hombre justo
  alternatives_spanish:
  - una persona justa
  - el justo
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado para un caso individual. «Hombre» conserva el singular masculino gramatical del hebreo y mantiene el estilo general del POB sin volverlo arcaico.
- source_word: מִצִּדְקָתוֹ
  english_pob_choice: from his righteousness
  chosen_spanish: de su justicia
  alternatives_spanish:
  - de su rectitud
  - de su conducta justa
  lexicon: HALOT
  rationale: El sustantivo señala aquí conducta justa en sentido ético. «Justicia» conserva la relación léxica con el término bíblico, aunque en español también puede oírse como rectitud; el contexto inmediato con el mal cometido orienta el sentido moral.
- source_word: וְעָשָׂה עָוֶל
  english_pob_choice: and does injustice
  chosen_spanish: y comete injusticia
  alternatives_spanish:
  - y hace mal
  - y comete iniquidad
  lexicon: HALOT
  rationale: עָוֶל puede significar injusticia, mal o iniquidad. «Comete injusticia» preserva el peso judicial/ético del término y resulta idiomático en español.
- source_word: עֲלֵיהֶם
  english_pob_choice: because of them
  chosen_spanish: a causa de ellas
  alternatives_spanish:
  - por ellas
  - por causa de ellas
  - a causa de estos actos
  lexicon: HALOT
  rationale: El sufijo plural remite a los actos injustos mencionados. El plural femenino español «ellas» concuerda con las acciones implícitas y conserva la referencia plural del hebreo, que el POB también preserva en sentido.
- source_word: בְּעַוְלוֹ אֲשֶׁר עָשָׂה
  english_pob_choice: for the injustice that he has done
  chosen_spanish: por la injusticia que ha cometido
  alternatives_spanish:
  - por la injusticia que ha hecho
  - a causa de la injusticia que ha cometido
  - por el mal que ha cometido
  lexicon: HALOT
  rationale: La frase explica la base de la muerte. «Por» comunica con naturalidad el valor causal; «la injusticia que ha cometido» mantiene el vínculo con עָוֶל y evita suavizar el juicio moral.
- source_word: יָמוּת
  english_pob_choice: he shall die
  chosen_spanish: morirá
  alternatives_spanish:
  - morirá ciertamente
  - deberá morir
  lexicon: HALOT
  rationale: El imperfecto expresa consecuencia segura o principio judicial. El futuro simple en español transmite bien esa certeza sin añadir modalización ajena al texto.
theological_decisions:
- issue: Cómo traducir la advertencia sin resolver la tensión doctrinal sobre apostasía o perseverancia
  english_pob_reading: Translate the conditional moral principle straightforwardly without importing a systematic-theological conclusion beyond the verse itself.
  chosen_spanish_reading: Traducir la advertencia moral tal como está, sin cerrar la cuestión doctrinal más amplia sobre si la caída descrita implica apostasía final o una advertencia general.
  alternative_spanish_readings:
  - Una lectura que subraye apostasía definitiva
  - Una lectura que minimice una verdadera desviación
  rationale: El hebreo afirma que un justo que se aparta de su justicia, hace injusticia y muere a causa de esos actos morirá por la injusticia cometida. La traducción debe conservar esa advertencia sin resolver debates intertradicionales que el versículo no explicita.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del POB inglés: se omitió un pronombre redundante antes de «muere» para lograr una fluidez más natural, y se conservó el plural del hebreo en la referencia causal («a causa de ellas»). También se tuvo en cuenta el juicio de revisión menor del cruce comparativo, sin alterar el sentido principal del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se usa «justicia» para צִדְקָה/צְדָקָה siguiendo la conexión léxica con el término bíblico, no «rectitud», porque el contraste interno con עָוֶל queda claro en español.
  - Se evita «iniquidad» en el texto principal porque en español moderno puede sonar más eclesiástico que el valor ético/judicial del hebreo, aunque se reconoce como alternativa válida.
  - El plural femenino «ellas» en la nota responde al antecedente implícito de los actos, no a personas.
  - La forma «morirá» conserva el valor de consecuencia judicial sin añadir especificaciones doctrinales.
