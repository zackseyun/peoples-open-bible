translation:
  language: es
  text: 'Así dice el Señor Yahvé: ¡Ay de los profetas necios[a], que siguen su propio espíritu y no han visto nada!'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que siguen su propio espíritu»; el hebreo dice literalmente «que van tras su espíritu».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor YHWH
  lexicon: Uso contextual de título divino + nombre propio del pacto
  rationale: En español, ‘Señor’ conserva el valor de אֲדֹנָי como título reverencial, y ‘Yahvé’ preserva el nombre divino יְהוָה conforme al criterio de la obra. Se evita ‘SEÑOR’ como máscara tipográfica porque aquí el nombre debe quedar auditable en la traducción.
- source_word: ה֖וֹי
  english_pob_choice: Woe to
  chosen_spanish: ¡Ay de
  alternatives_spanish:
  - ¡Ay!
  - ¡Desdichados los...!
  lexicon: HALOT
  rationale: ‘הוֹי’ introduce una denuncia profética o lamento judicial. ‘¡Ay de’ es natural en español bíblico y conserva el tono de amenaza y lamentación.
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los profetas
  lexicon: HALOT
  rationale: Correspondencia directa del sustantivo plural con artículo. No requiere matiz adicional en español.
- source_word: הַנְּבָלִים
  english_pob_choice: foolish
  chosen_spanish: necios
  alternatives_spanish:
  - foolish
  - insensatos
  - estúpidos
  lexicon: HALOT
  rationale: נָבָל denota necedad moral y espiritual, no solo falta de inteligencia. ‘Necios’ preserva mejor el reproche profético en español que ‘tontos’ o ‘estúpidos’.
- source_word: הֹלְכִים אַחַר רוּחָם
  english_pob_choice: who follow their own spirit
  chosen_spanish: que siguen su propio espíritu
  alternatives_spanish:
  - que andan tras su propio espíritu
  - que siguen su propio viento
  lexicon: HALOT
  rationale: La expresión idiomática ‘ir/andar tras’ puede sonar más marcada, pero ‘seguir’ comunica bien la idea de adherirse a impulsos propios. ‘Espíritu’ conserva la ambigüedad controlada de רוּחַ sin reducirlo a ‘viento’ en el texto principal.
- source_word: וּ/לְ/בִלְתִּי רָאוּ
  english_pob_choice: and have seen nothing
  chosen_spanish: y no han visto nada
  alternatives_spanish:
  - y no han visto ninguna visión
  - y no han visto nada
  lexicon: HALOT
  rationale: 'La cláusula final explica la denuncia: estos profetas actúan como si hubieran recibido visión, pero carecen de ella. ‘No han visto nada’ es idiomático en español y mantiene el sentido de visión profética negativa.'
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Fórmula profética estándar. ‘Así dice’ suena natural y solemne en español actual, sin perder la función de mensajero.
theological_decisions:
- issue: Representación del nombre divino יְהוָה en la fórmula profética
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor YHWH
  rationale: La política del proyecto pide ‘Yahvé’ para יהוה. En el compuesto אֲדֹנָי יְהוִה, ‘Señor Yahvé’ comunica el título reverencial y mantiene visible el nombre del pacto sin oscurecerlo con una sustitución tipográfica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido confirmado por el texto hebreo y el audit trail inglés: fórmula profética, denuncia de los profetas, idiomática de ‘ir tras su espíritu’ y cláusula final de ausencia de visión. No se detectan revisiones posteriores que requieran ajustes adicionales.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ conforme al criterio del proyecto para יהוה.
  - Se eligió ‘necios’ para reflejar la necedad moral de נבל sin volverlo coloquial.
  - La nota al pie conserva la alternativa idiomática literal del hebreo sobre ‘ir tras su espíritu’.
  - El estilo es formal y bíblico, pero con sintaxis natural para español moderno.
