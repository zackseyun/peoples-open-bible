theological_decisions:
- issue: Sense of βλασφημέω in a non-explicitly divine object
  chosen_reading: Rendered as 'slander' rather than 'blaspheme'
  alternative_readings:
  - blaspheme
  - revile
  rationale: The verse condemns abusive speech about matters beyond their comprehension, not necessarily direct speech against God. 'Slander' avoids importing a narrower theological claim while preserving the seriousness of the offense.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve what the text actually says.'
- issue: Force of φθείρονται
  chosen_reading: 'Expressed as ongoing ruin: ''are being destroyed'''
  alternative_readings:
  - are corrupted
  rationale: Jude's context emphasizes judgment and moral decay together. The passive/middle form allows the sense that their instinct-driven conduct results in their own ruin. The chosen rendering preserves that gravity without over-specifying mechanism.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
