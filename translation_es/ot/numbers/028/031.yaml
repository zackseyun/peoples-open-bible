revisions:
- from: Además del holocausto regular y su ofrenda de cereal[a], lo prepararán; serán sin defecto[b], junto con sus libaciones[c].
  to: Además del holocausto continuo y su ofrenda de cereal[a], las ofrecerán; serán sin defecto[b], junto con sus libaciones.
  rationale: Se ajusta 'holocausto regular' a 'holocausto continuo' por mayor naturalidad y adecuación al registro bíblico en español, sin apartarse de las alternativas documentadas. Se cambia 'lo prepararán' por 'las ofrecerán' para reflejar mejor el referente plural implícito de las ofrendas y producir una frase idiomática en español. Se elimina la nota c porque no añade información distinta al texto principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:33:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura básica del hebreo: estas ofrendas se añaden al holocausto continuo/regular y a su ofrenda de cereal, deben ser sin defecto, y van con sus libaciones. Sin embargo, ''lo prepararán'' no concuerda bien con el objeto plural implícito de תַעֲשׂוּ (''las harán/prepararán''), y ''holocausto regular'' suena menos natural en español bíblico que una opción documentada como ''holocausto continuo'' o ''diario''.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero requiere un ajuste menor de naturalidad y concordancia. 'Además del holocausto continuo...' fluye mejor que 'holocausto regular', y 'las ofrecerán' evita la discordancia de número de 'lo prepararán'. También conviene quitar la redundancia de la nota c, porque la nota repite exactamente el texto principal.
  glossary_alignment: No hay conflictos con la terminología global del proyecto. 'Holocausto', 'ofrenda de cereal', 'sin defecto' y 'libaciones' son adecuados al registro cultual. La revisión propuesta se mantiene dentro de las alternativas ya documentadas en la auditoría inglesa para תָּמִיד y mejora el español sin alejarse de la evidencia fuente.
  issues:
  - severity: medium
    issue: Concordancia y referencia poco natural en 'lo prepararán'
    rationale: El hebreo תַעֲשׂוּ tiene como referente las ofrendas/animales en plural; en español, el singular 'lo' resulta impreciso y menos fiel a la relación sintáctica del contexto.
  - severity: low
    issue: '''holocausto regular'' suena algo calcado del inglés'
    rationale: Aunque defendible, en español bíblico y eclesial 'holocausto continuo' comunica mejor תָּמִיד y además ya está documentado como alternativa auditada.
  - severity: low
    issue: La nota c no aporta alternativa real
    rationale: 'Dice ''También: sus libaciones'', que repite exactamente la forma del texto base. La alternativa documentada en inglés es ''libaciones'' frente a ''drink offerings''; en español, si el texto ya usa ''libaciones'', no hace falta nota.'
  revised_spanish_text: Además del holocausto continuo y su ofrenda de cereal[a], las ofrecerán; serán sin defecto[b], junto con sus libaciones.
