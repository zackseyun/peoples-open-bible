translation:
  language: es
  text: Y sus cámaras[a], sus pilares laterales[b] y su pórtico[c] fueron según estas medidas; y tanto él como sus pilares laterales tenían ventanas por todo alrededor. Su longitud era de cincuenta codos, y su anchura de veinticinco codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cámaras de guardia»; el término hebreo arquitectónico puede referirse a pequeños compartimentos de la estructura de la puerta.
    reason: lexical_alternative
  - marker: b
    text: O «jambas» o «pilastras» para «pilares laterales». El término hebreo arquitectónico es difícil y puede referirse a miembros estructurales del acceso.
    reason: lexical_alternative
  - marker: c
    text: O «vestíbulo» o «porche» para «pórtico».
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּא
  english_pob_choice: guardrooms
  chosen_spanish: cámaras
  alternatives_spanish:
  - guardias
  - guarderías
  - aposentos
  lexicon: HALOT
  rationale: El término hebreo designa pequeños cuartos arquitectónicos del acceso del templo. En español, «cámaras» conserva la idea de recinto/cuarto sin imponer una interpretación demasiado específica; «cámaras de guardia» sería más explicativo, pero aquí la POB inglesa mantuvo la ambigüedad funcional con un término arquitectónico breve.
- source_word: אַיִל
  english_pob_choice: side pillars
  chosen_spanish: postes
  alternatives_spanish:
  - jambas
  - pilastras
  - pilares laterales
  lexicon: HALOT
  rationale: La POB inglesa eligió «side pillars» para reflejar el miembro estructural del acceso. En español, «postes» comunica de forma clara un elemento vertical arquitectónico; «pilastras» es más técnico y «jambas» puede sonar demasiado especializado o sugerir solo el marco lateral de una puerta.
- source_word: אֵילָם
  english_pob_choice: portico
  chosen_spanish: pórtico
  alternatives_spanish:
  - vestíbulo
  - porche
  lexicon: HALOT
  rationale: «Pórtico» es el equivalente español más natural para una estructura de entrada arquitectónica elevada o proyectada. Mantiene la dignidad del término y el registro formal del pasaje.
- source_word: כַּמִּדּוֹת הָאֵלֶּה
  english_pob_choice: according to these measurements
  chosen_spanish: según estas medidas
  alternatives_spanish:
  - de acuerdo con estas medidas
  - con estas dimensiones
  lexicon: HALOT
  rationale: La frase indica conformidad con dimensiones ya dadas. «Según estas medidas» es la formulación más directa y natural en español, sin perder precisión.
- source_word: חַלּוֹנוֹת
  english_pob_choice: windows
  chosen_spanish: ventanas
  alternatives_spanish:
  - aberturas
  - claraboyas
  - vanos
  lexicon: HALOT
  rationale: El sentido ordinario de «ventanas» encaja con la descripción arquitectónica. «Vanos» sería más técnico y menos transparente para lectores generales.
- source_word: סָבִיב סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor, alrededor
  alternatives_spanish:
  - por todas partes
  - en todo alrededor
  - a su alrededor
  lexicon: HALOT
  rationale: La duplicación hebrea intensifica la idea distributiva. Repetir «alrededor» reproduce esa fuerza enfática sin añadir interpretación.
- source_word: אֹרֶךְ חֲמִשִּׁים אַמָּה
  english_pob_choice: Its length was fifty cubits
  chosen_spanish: Su longitud era de cincuenta codos
  alternatives_spanish:
  - Tenía una longitud de cincuenta codos
  - Medía cincuenta codos de largo
  lexicon: HALOT
  rationale: Es una medida arquitectónica directa. «Longitud» mantiene el registro técnico y «codos» conserva la unidad de medida tradicional sin modernizarla indebidamente.
- source_word: רֹחַב חָמֵשׁ וְעֶשְׂרִים אַמָּה
  english_pob_choice: its width twenty-five cubits
  chosen_spanish: su anchura de veinticinco codos
  alternatives_spanish:
  - su ancho de veinticinco codos
  - y su anchura era de veinticinco codos
  lexicon: HALOT
  rationale: La segunda dimensión se expresa con el mismo registro técnico. «Anchura» corresponde bien a la simetría de la frase hebrea; «veinticinco codos» conserva la numeración compuesta de forma clara.
translation_notes:
  revision_awareness: El texto inglés revisado sustituyó una repetición incorrecta de «its portico» por «its side pillars» en la cláusula de las ventanas. La versión española sigue esa corrección y refleja que las ventanas pertenecían tanto al conjunto como a sus postes, no al pórtico únicamente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto cuando aparezca el nombre divino, pero en este versículo no se presenta el tetragrámaton.
  - Se conservó el orden arquitectónico y la estructura dimensional del original, evitando una paráfrasis explicativa.
  - La duplicación hebrea סָבִיב סָבִיב se reprodujo con repetición en español para preservar el énfasis distributivo.
