translation:
  language: es
  text: entonces su padre y su madre lo sujetarán y lo llevarán a los ancianos de su ciudad y a la puerta de su lugar[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la puerta de la ciudad como lugar público donde los ancianos locales trataban asuntos legales.
    reason: cultural_note
  - marker: b
    text: 'O «la puerta de su pueblo». Hebreo: «la puerta de su lugar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתָפְשׂוּ בוֹ
  english_pob_choice: shall seize him
  chosen_spanish: lo tomarán
  alternatives_spanish:
  - lo sujetarán
  - lo agarrarán
  lexicon: HALOT
  rationale: The Hebrew expresa una acción física de control sobre el hijo. En español, «lo tomarán» mantiene la fuerza legal y el movimiento inmediato sin sonar excesivamente forzado; «sujetarán» o «agarrarán» serían más marcados, pero menos naturales en este contexto jurídico.
- source_word: אָבִיו וְאִמּוֹ
  english_pob_choice: his father and his mother
  chosen_spanish: su padre y su madre
  alternatives_spanish:
  - el padre y la madre de él
  - su padre y madre
  lexicon: HALOT
  rationale: Se conserva la referencia explícita a ambos progenitores, como en el hebreo, con la posesión repetida en forma natural en español. Esto mantiene el tono formal y legal del texto.
- source_word: וְהוֹצִיאוּ אֹתוֹ
  english_pob_choice: bring him out
  chosen_spanish: lo llevarán
  alternatives_spanish:
  - lo sacarán
  - lo conducirán
  lexicon: HALOT
  rationale: El causativo de יצא permite «sacar/llevar/conducir». Aquí «lo llevarán» refleja bien el traslado desde la esfera doméstica al foro público; «lo sacarán» sería más literal, pero en español puede sonar menos fluido cuando va seguido del destino legal.
- source_word: אֶל זִקְנֵי עִירוֹ
  english_pob_choice: to the elders of his city
  chosen_spanish: a los ancianos de su ciudad
  alternatives_spanish:
  - a los ancianos de la ciudad
  - a los líderes de su ciudad
  lexicon: HALOT
  rationale: «Ancianos» traduce de manera directa זקנים y conserva el sentido de autoridades locales; «elders» en español bíblico puede expresarse así sin perder la referencia institucional. «Líderes» explicaría la función, pero suavizaría el término del hebreo.
- source_word: וְאֶל שַׁעַר מְקֹמֽוֹ
  english_pob_choice: and to the gate of his place
  chosen_spanish: y a la puerta de su lugar
  alternatives_spanish:
  - y a la puerta de su pueblo
  - y a la puerta de su ciudad
  lexicon: HALOT
  rationale: Se preserva el sustantivo מקום con «lugar», como hace la POB inglesa, para no cerrar demasiado pronto la posible amplitud del hebreo. «Puerta» mantiene la imagen legal del espacio público de juicio.
translation_notes:
  revision_awareness: 'El pasaje coincide de cerca con la audición inglesa: no se detectan revisiones sustantivas en el texto base. La traducción española conserva el paralelismo del hebreo y la ambigüedad deliberada de מְקֹמוֹ («su lugar») con una nota alternativa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no porque aparezca en este versículo, sino como criterio general del proyecto; aquí no aplica.
  - Se prefirió «ancianos» para זקנים por continuidad bíblica y por ser la opción más cercana al campo semántico de autoridades locales.
  - «Puerta de su lugar» reproduce la ambigüedad del hebreo y evita imponer de entrada una reinterpretación geográfica que el texto no explicita.
  - El orden sintáctico sigue el valor legal de la cláusula, con un inicio de consecuencia («entonces») acorde al flujo narrativo del mandato.
