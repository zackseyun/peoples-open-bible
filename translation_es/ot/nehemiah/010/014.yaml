  - severity: high
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota alternativa 'Binnui' corresponde a בְּנִינוּ / Beninu, no a הוֹדִיָּה. Dejarla sobre 'Hodías' distorsiona qué nombre tiene la variante textual/tradicional.
