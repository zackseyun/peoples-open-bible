translation:
  language: es
  text: Yo también te alabaré con el arpa por tu fidelidad[a], mi Dios; te cantaré con la lira[b][c], Santo de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «verdad». El término hebreo puede significar tanto verdad como fidelidad.
    reason: lexical_alternative
  - marker: b
    text: La distinción exacta entre los instrumentos nombrados aquí (nevel y kinnor) es incierta; las traducciones tradicionales suelen decir «arpa» y «lira».
    reason: cultural_note
  - marker: c
    text: O «con el arpa, por tu fidelidad».
    reason: previous_rendering
lexical_decisions:
- source_word: גַּם אֲנִי
  english_pob_choice: I also
  chosen_spanish: Yo también
  alternatives_spanish:
  - también yo
  - yo asimismo
  lexicon: HALOT
  rationale: גַּם con el pronombre independiente añade énfasis y continuidad. «Yo también» comunica esa inclusión enfática en un español natural y solemne.
- source_word: אוֹדְךָ
  english_pob_choice: will praise you
  chosen_spanish: te alabaré
  alternatives_spanish:
  - te daré gracias
  - te agradeceré
  lexicon: HALOT
  rationale: En el contexto poético y musical del versículo, ידה en hifil funciona como alabanza cultual. «Te alabaré» preserva ese valor sin sonar forzado; «dar gracias» también es posible pero menos ajustado al paralelismo con el canto instrumental.
- source_word: בִּכְלִי נֶבֶל
  english_pob_choice: with the harp
  chosen_spanish: con el arpa
  alternatives_spanish:
  - con el instrumento, el arpa
  - con la cítara
  lexicon: HALOT
  rationale: כְּלִי es genérico («instrumento») y נֶבֶל especifica el tipo. En español, «con el arpa» es una equivalencia tradicional y natural; el instrumento exacto antiguo sigue siendo incierto.
- source_word: אֲמִתֶּךָ
  english_pob_choice: for your faithfulness
  chosen_spanish: por tu fidelidad
  alternatives_spanish:
  - por tu verdad
  - por tu veracidad
  - por tu fiabilidad
  lexicon: HALOT
  rationale: אֱמֶת puede significar verdad, fidelidad o fiabilidad. En una alabanza dirigida a Dios, «fidelidad» expresa mejor su carácter de pacto y su confiabilidad histórica. La alternativa «verdad» se preserva implícitamente como posibilidad léxica.
- source_word: אֱלֹהָי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  lexicon: HALOT
  rationale: Forma posesiva directa y natural en español; mantiene la invocación personal del original.
- source_word: אֲזַמְּרָה לְךָ
  english_pob_choice: I will make music to you
  chosen_spanish: te haré música
  alternatives_spanish:
  - te cantaré
  - te cantaré alabanzas
  - haré música para ti
  lexicon: HALOT
  rationale: זמר en piel puede referirse a cantar con acompañamiento o hacer música en alabanza. «Te haré música» conserva el matiz musical sin duplicar el contenido ya expresado por el primer colon.
- source_word: בְּכִנּוֹר
  english_pob_choice: with the lyre
  chosen_spanish: con la lira
  alternatives_spanish:
  - con el arpa
  lexicon: HALOT
  rationale: כִּנּוֹר suele rendirse «lira» en español para distinguirlo de נֶבֶל. Así se conserva la diferencia entre los dos instrumentos nombrados en el hebreo, aun si la identificación precisa es histórica y culturalmente incierta.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: Holy One of Israel
  chosen_spanish: Santo de Israel
  alternatives_spanish:
  - Santo de Israel, O
  - el Santo de Israel
  lexicon: HALOT
  rationale: Título divino de dirección. En español bíblico y eclesial, «Santo de Israel» comunica con precisión el nombre/título sin añadir elementos ajenos al hebreo.
theological_decisions:
- issue: 'אֱמֶת aplicado a Dios: verdad o fidelidad'
  english_pob_reading: faithfulness
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - verdad
  - veracidad
  rationale: La alabanza del verso se centra en el carácter fiable y pactal de Dios. «Fidelidad» mantiene la tensión léxica sin reducirla a una verdad abstracta; «verdad» sigue siendo una alternativa legítima, pero menos específica en este contexto.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
- issue: 'Instrumentos nombrados en hebreo: nevel y kinnor'
  english_pob_reading: harp / lyre
  chosen_spanish_reading: arpa / lira
  alternative_spanish_readings:
  - lira / arpa
  - arpa / cítara
  rationale: El hebreo distingue dos instrumentos distintos, aunque la identificación exacta no sea segura. En español, usar dos nombres distintos evita borrar esa distinción. «Arpa» y «lira» son equivalentes naturales y suficientemente diferenciados para la poesía.
  doctrine_reference: Translation philosophy §3, Preserve lexical distinctions where the source preserves them
translation_notes:
  revision_awareness: La redacción sigue el sentido del texto hebreo y el expediente auditado en inglés. Se conserva la tensión léxica de אֱמֶת como «fidelidad» con nota alternativa «verdad», y se mantiene la distinción de instrumentos del hebreo usando «arpa» y «lira», en línea con la revisión inglesa que aclaró la relación estrecha entre alabanza y motivo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como nombre divino principal solo cuando el hebreo lo exige directamente; en este versículo el texto dice אֱלֹהָי, por eso se traduce «mi Dios».
  - Se prefirió «te alabaré» frente a «te daré gracias» por el paralelismo poético con la música instrumental.
  - Se mantuvo un registro bíblico moderno, sin arcaísmos innecesarios.
  - La forma «Santo de Israel» conserva el título divino sin añadir un vocativo explícito que el español no necesita.
