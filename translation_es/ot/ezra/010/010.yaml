translation:
  language: es
  text: 'Entonces Ezra, el sacerdote, se levantó y les dijo: “Ustedes han obrado con infidelidad y se han casado con mujeres extranjeras[a], añadiendo a la culpa de Israel.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “esposas extranjeras”. La frase hebrea es literalmente “mujeres extranjeras”, pero en este contexto se refiere a mujeres tomadas en matrimonio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: stood up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce la acción pública de Ezra en la asamblea. En español, ‘se levantó’ comunica de manera natural ese gesto físico y público sin sonar arcaico.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficial
  - el sacerdote
  lexicon: HALOT
  rationale: Es un título apposicional directo para identificar a Ezra. ‘Sacerdote’ es la equivalencia natural y fiel en español.
- source_word: מְעַלְתֶּם
  english_pob_choice: have acted unfaithfully
  chosen_spanish: han obrado con infidelidad
  alternatives_spanish:
  - han sido infieles
  - han traspasado
  - han cometido una infidelidad
  lexicon: HALOT
  rationale: מעל expresa una traición o quiebre de lealtad, con carga covenantal. ‘Han obrado con infidelidad’ conserva esa fuerza moral y relacional sin perder claridad en español.
- source_word: וַתֹּשִׁיבוּ
  english_pob_choice: have married
  chosen_spanish: se han casado
  alternatives_spanish:
  - han tomado por esposas
  - han hecho habitar
  - han tomado
  lexicon: HALOT
  rationale: Aunque la raíz literalmente sugiere ‘hacer habitar’, en este contexto el sentido es matrimonial. ‘Se han casado’ expresa el hecho con naturalidad y evita una traducción demasiado mecánica.
- source_word: נָשִׁים נָכְרִיּוֹת
  english_pob_choice: foreign women as wives
  chosen_spanish: mujeres extranjeras
  alternatives_spanish:
  - esposas extranjeras
  - mujeres foráneas
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘mujeres extranjeras’. Dado que el contexto ya trata de matrimonios prohibidos, ‘mujeres extranjeras’ preserva el original y deja implícita la relación matrimonial sin sobretraducirla. Por eso no añadí ‘esposas’ en el texto principal.
- source_word: לְהוֹסִיף
  english_pob_choice: adding
  chosen_spanish: añadiendo
  alternatives_spanish:
  - para añadir
  - sumando
  lexicon: HALOT
  rationale: El infinitivo expresa resultado o consecuencia. ‘Añadiendo’ mantiene ese valor y fluye bien en español.
- source_word: אַשְׁמַת
  english_pob_choice: the guilt
  chosen_spanish: la culpa
  alternatives_spanish:
  - la culpa
  - la culpabilidad
  - el delito
  lexicon: HALOT
  rationale: En este contexto comunitario, אַשְׁמָה refiere a culpa/culpabilidad acumulada por el pueblo. ‘Culpa’ es claro y suficientemente amplio para no reducirlo a una categoría técnica.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  - Israel
  lexicon: HALOT
  rationale: Se mantiene el nombre propio del pueblo del pacto, tal como lo exige el contexto corporativo del versículo.
theological_decisions:
- issue: Culpabilidad corporativa del pueblo
  english_pob_reading: adding to the guilt of Israel
  chosen_spanish_reading: añadiendo a la culpa de Israel
  alternative_spanish_readings:
  - añadiendo a la culpabilidad de Israel
  - aumentando la culpa de Israel
  rationale: La frase no describe solo una falta privada, sino un agravamiento de la responsabilidad de la comunidad del pacto. ‘Culpa de Israel’ conserva esa dimensión colectiva sin introducir explicaciones ajenas al texto.
  doctrine_reference: Translation philosophy §3, §5
- issue: Sentido matrimonial de נשים נכריות
  english_pob_reading: foreign women as wives
  chosen_spanish_reading: mujeres extranjeras
  alternative_spanish_readings:
  - esposas extranjeras
  - mujeres foráneas
  rationale: El hebreo dice literalmente ‘mujeres extranjeras’. El contexto de Esdras 10 deja claro que se trata de matrimonios; por eso el texto principal conserva la literalidad del sintagma hebreo, mientras la relación matrimonial queda inferida por el contexto narrativo.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: El audit trail inglés revisó ‘have taken foreign women as wives’ a ‘have married foreign women’ para hacer más directo el sentido matrimonial. En español, se optó por mantener la literalidad de ‘mujeres extranjeras’ y expresar el acto con ‘se han casado’, de modo que el texto siga siendo natural y, a la vez, fiel al hebreo y a la revisión inglesa.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ solo cuando el texto fuente lo requiere explícitamente; este versículo no lo contiene.
  - ‘Sacerdote’ se usa como título funcional, no como término litúrgico ampliado.
  - ‘Infidelidad’ y ‘culpa’ preservan la carga moral y comunitaria del hebreo מעל / אשמה.
  - No se añadió ‘esposas’ en el texto principal para no desplazar la literalidad de נשים נכריות, aunque el contexto matrimonial está claro.
