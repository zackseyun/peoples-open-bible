translation:
  language: es
  text: Los pueblos oyeron; temblaron[a]. La angustia se apoderó de los habitantes de Filistea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los pueblos han oído; tiemblan. La angustia se ha apoderado de los habitantes de Filistea». La poesía hebrea permite aquí un matiz vívido de presente o de futuro cercano, además del pasado simple.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְעוּ
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - han oído
  - escucharon
  lexicon: HALOT
  rationale: El qal perfecto de שׁמע expresa oír. En español, «oyeron» comunica el hecho en pasado de forma natural y conserva el valor simple del verbo sin añadir matices de obediencia o atención que no están explícitos aquí.
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: HALOT
  rationale: El plural de עם designa colectivos étnicos alrededor de Israel. «Las naciones» mantiene el plural colectivo y suena fluido en español bíblico moderno; «los pueblos» también sería posible, pero puede sonar menos concreto en este contexto poético.
- source_word: יִרְגָּזוּ/ן
  english_pob_choice: they trembled
  chosen_spanish: temblaron
  alternatives_spanish:
  - tiemblan
  - se estremecieron
  - se agitaron
  lexicon: HALOT
  rationale: רָגַז puede abarcar temblor, conmoción o agitación. «Temblaron» conserva el sentido básico de reacción temerosa y funciona bien en la secuencia poética sin forzar una interpretación más amplia como «se agitaron».
- source_word: חִיל
  english_pob_choice: anguish
  chosen_spanish: pavor
  alternatives_spanish:
  - angustia
  - temblor
  - dolor
  lexicon: HALOT
  rationale: El sustantivo puede denotar dolor retorcido, temblor o aflicción. Aquí se trata de una reacción intensa de terror; «pavor» comunica esa conmoción y evita sugerir de manera demasiado específica un dolor de parto, que el hebreo no explicita por sí solo.
- source_word: אָחַז
  english_pob_choice: seized
  chosen_spanish: se apoderó de
  alternatives_spanish:
  - agarró
  - tomó posesión de
  - los tomó
  lexicon: HALOT
  rationale: אָחַז significa asir o agarrar. Con un sujeto abstracto en español, «se apoderó de» transmite bien la idea de una fuerza que domina repentinamente a los habitantes, manteniendo la imagen de captura.
- source_word: יֹשְׁבֵי
  english_pob_choice: the inhabitants of
  chosen_spanish: los habitantes de
  alternatives_spanish:
  - los moradores de
  - los que habitan en
  lexicon: HALOT
  rationale: El participio sustantivado de ישׁב se refiere a quienes residen en un lugar. «Los habitantes de» es la forma más natural y exacta en español.
- source_word: פְּלָשֶׁת
  english_pob_choice: Philistia
  chosen_spanish: Filistea
  alternatives_spanish:
  - la tierra de los filisteos
  - el país de Filistea
  lexicon: HALOT
  rationale: פְּלָשֶׁת nombra el territorio filisteo, no el pueblo como colectivo. «Filistea» conserva la referencia geográfica y evita confundirla con la etnia.
translation_notes:
  revision_awareness: La revisión del inglés POB quedó sin cambios tras la última pasada; este borrador español sigue de cerca esa lectura auditada y conserva la alternativa temporal en nota, porque el hebreo poético admite un valor perfecto/presente o prospectivo además del pasado narrativo.
  spanish_consistency_notes:
  - 'He mantenido el paralelo verbal breve: oyeron / temblaron / se apoderó de, para reflejar la cadencia del hebreo.'
  - «Filistea» se usa como topónimo territorial; no se sustituye por una perífrasis más explicativa.
  - Se conserva una nota de alternativa temporal porque el hebreo admite más de un matiz aspectual en la línea poética.
