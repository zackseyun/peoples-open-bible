translation:
  language: es
  text: ¿Cuentas los meses que cumplen[a], y sabes el tiempo cuando dan a luz?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «¿Cuentas los meses hasta que se cumplan?». El hebreo usa un verbo activo, literalmente «ellas cumplen [los meses]», refiriéndose al término de la gestación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּסְפֹּר
  english_pob_choice: Do you count
  chosen_spanish: ¿Contarás
  alternatives_spanish:
  - ¿Cuentas
  - ¿Vas a contar
  lexicon: HALOT
  rationale: El verbo qal imperfecto 2ms en una pregunta retórica se expresa naturalmente en español con futuro interrogativo. Conserva el tono de interrogación divina sin volverlo forzado.
- source_word: יְרָחִים
  english_pob_choice: the months
  chosen_spanish: los meses
  alternatives_spanish:
  - meses
  - los meses lunares
  lexicon: HALOT
  rationale: ‘Meses’ basta en español y mantiene la referencia temporal. ‘Lunares’ sería más explicativo de lo que el hebreo exige aquí.
- source_word: תְּמַלֶּאנָה
  english_pob_choice: they fulfill
  chosen_spanish: que cumplen
  alternatives_spanish:
  - que completan
  - que llegan a término
  - que son completados
  lexicon: HALOT
  rationale: 'Se preserva la idea activa del hebreo: los meses ‘cumplen’ o llegan a su término. ‘Cumplen’ comunica en español tanto la forma activa como el sentido de gestación completada.'
- source_word: וְיָדַעְתָּ
  english_pob_choice: and do you know
  chosen_spanish: y sabrás
  alternatives_spanish:
  - y sabes
  - y conocerás
  lexicon: HALOT
  rationale: En la secuencia retórica, el perfecto hebreo funciona como pregunta dirigida al oyente; el futuro interrogativo español transmite bien la confrontación del discurso.
- source_word: עֵת
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - la hora
  - el momento
  - el tiempo señalado
  lexicon: HALOT
  rationale: ‘Tiempo’ es la opción más natural y suficientemente precisa; evita añadir la noción de ‘señalado’ que el hebreo no explicita aquí.
- source_word: לִדְתָּנָה
  english_pob_choice: when they give birth
  chosen_spanish: de su parto
  alternatives_spanish:
  - de su alumbramiento
  - cuando dan a luz
  - de su dar a luz
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo apunta al acto de parir de las hembras. ‘De su parto’ suena natural en español y conserva el valor nominal/temporal sin parafrasear demasiado.
translation_notes:
  revision_awareness: El texto inglés POB mantiene la estructura retórica y la tensión léxica de תְּמַלֶּאנָה con una nota sobre el sentido idiomático de la gestación. La propuesta española conserva esa tensión con «que cumplen» y una nota que explicita la alternativa más idiomática sin borrar la forma activa hebrea.
  spanish_consistency_notes:
  - Se mantuvo «meses» sin ampliar a «meses lunares» para no sobreespecificar.
  - Se evitó «Señor» o formulaciones devocionales ajenas al hebreo; el versículo permanece como una pregunta retórica directa.
  - «Parto» conserva el sustantivo de proceso/acto y permite leer el verso con naturalidad en español.
