translation:
  language: es
  text: Ahora la casa estaba llena de hombres y mujeres, y allí estaban todos los gobernantes de los filisteos. Y sobre el techo había como tres mil hombres y mujeres que miraban a Sansón mientras actuaba[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mirando a Sansón actuar»; o, de manera más formal, «mirando a Sansón en su espectáculo». El hebreo usa la raíz שׂחק, que puede denotar reír, jugar, divertirse o entretener.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el edificio
  - el salón del templo
  lexicon: HALOT
  rationale: El sentido básico es 'casa/edificio'. En este contexto puede tratarse del complejo filisteo, pero el hebreo dice simplemente 'la casa'; 'la casa' conserva la forma del original sin sobreespecificar.
- source_word: מָלֵא
  english_pob_choice: was full of
  chosen_spanish: estaba llena de
  alternatives_spanish:
  - estaba llena de manera plena
  - estaba colmada de
  lexicon: HALOT
  rationale: Verbo predicativo con sentido estativo de plenitud. 'Estaba llena de' es natural en español y refleja bien el estado indicado por el hebreo.
- source_word: הָאֲנָשִׁים ... וְהַנָּשִׁים
  english_pob_choice: men and women
  chosen_spanish: hombres y mujeres
  alternatives_spanish:
  - los hombres y las mujeres
  - varones y mujeres
  lexicon: HALOT
  rationale: El par explícitamente marca la presencia de ambos sexos. 'Hombres y mujeres' es la forma más natural y mantiene la distinción del texto.
- source_word: וְשָׁמָּה
  english_pob_choice: were there
  chosen_spanish: allí estaban
  alternatives_spanish:
  - estaban allí
  - se hallaban allí
  lexicon: HALOT
  rationale: Adverbio locativo que introduce presencia. 'Allí estaban' suena fluido en español y conserva el énfasis de lugar.
- source_word: כֹּל סַרְנֵי פְלִשְׁתִּים
  english_pob_choice: all the lords of the Philistines
  chosen_spanish: todos los gobernantes de los filisteos
  alternatives_spanish:
  - todos los señores de los filisteos
  - todos los jefes filisteos
  lexicon: HALOT
  rationale: סַרְנֵי designa a los príncipes o autoridades filisteas. 'Gobernantes' comunica la función sin introducir un título feudal que en español podría sonar más cargado o menos transparente.
- source_word: וְעַל הַגָּג
  english_pob_choice: And on the roof were
  chosen_spanish: Y sobre el techo había
  alternatives_spanish:
  - Y en el techo había
  - Y sobre la azotea había
  lexicon: HALOT
  rationale: גָּג es 'techo/azotea'. 'Sobre el techo' mantiene la localización elevada; 'había' reproduce bien la existencia de una multitud en esa posición.
- source_word: כִּשְׁלֹשֶׁת אֲלָפִים
  english_pob_choice: about three thousand
  chosen_spanish: como tres mil
  alternatives_spanish:
  - aproximadamente tres mil
  - unos tres mil
  lexicon: HALOT
  rationale: El prefijo כ expresa aproximación. 'Como tres mil' es breve, idiomático y fiel a la cifra aproximada.
- source_word: אִישׁ וְאִשָּׁה
  english_pob_choice: men and women
  chosen_spanish: hombres y mujeres
  alternatives_spanish:
  - personas, hombres y mujeres
  - varones y mujeres
  lexicon: HALOT
  rationale: Aunque las formas son singulares distributivas, el sentido es colectivo y mixto. 'Hombres y mujeres' preserva la referencia de género explícita.
- source_word: הָרֹאִים
  english_pob_choice: watching
  chosen_spanish: que miraban
  alternatives_spanish:
  - observando
  - que observaban
  lexicon: HALOT
  rationale: Participio que describe la acción en curso de la multitud. 'Que miraban' es claro y natural en español.
- source_word: בִּשְׂחוֹק שִׁמְשׁוֹן
  english_pob_choice: as he performed
  chosen_spanish: mientras actuaba
  alternatives_spanish:
  - mientras Sansón hacía su espectáculo
  - mientras Sansón era objeto de burla
  lexicon: HALOT
  rationale: La raíz שׂחק puede implicar reír, jugar, hacer deporte o divertir. 'Mientras actuaba' mantiene la ambigüedad funcional del pasaje y evita añadir un objeto explícito, como también buscó la revisión inglesa final.
theological_decisions:
- issue: La actividad de Sansón en el banquete/acto filisteo
  english_pob_reading: watching Samson as he performed
  chosen_spanish_reading: que miraban a Sansón mientras actuaba
  alternative_spanish_readings:
  - que miraban a Sansón mientras hacía su espectáculo
  - que miraban a Sansón mientras era objeto de burla
  rationale: El hebreo usa un término con campo semántico amplio y el contexto sugiere que Sansón estaba siendo exhibido para entretenimiento humillante. 'Mientras actuaba' conserva esa tensión sin fijar de forma excesiva si se trataba de comedia, juego o espectáculo.
  doctrine_reference: Jueces 16:27; léxico de שׂחק
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de ''as he entertained them'' a ''as he performed'' para no añadir un objeto explícito no presente en el hebreo. La redacción española sigue esa revisión: evita decir ''los entretenía'' o ''les hacía reír'' y conserva una formulación abierta con ''mientras actuaba''.'
  spanish_consistency_notes:
  - Yahvé no aparece en este versículo.
  - Se mantiene 'filisteos' y no se introduce un título más interpretativo.
  - La nota textual/lexical sobre שׂחק se conserva como alternativa porque el hebreo admite varias matizaciones semánticas.
