translation:
  language: es
  text: 'Entonces invoqué el nombre de Yahvé: «Por favor[a], Yahvé, libra mi alma».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «mi vida». El hebreo נֶפֶשׁ aquí puede significar «vida», «yo mismo» o «alma»; en este contexto de peligro, «vida» también encaja bien en el sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְשֵׁם
  english_pob_choice: Then ... on the name of
  chosen_spanish: Entonces ... el nombre de
  alternatives_spanish:
  - Y ... en el nombre de
  - Y ... sobre el nombre de
  lexicon: HALOT
  rationale: La construcción idiomática קרא בשם expresa invocación. «Entonces» conserva la secuencia narrativa del salmo, y «invocar el nombre de» en español refleja naturalmente el acto de dirigirse a Yahvé en plegaria.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. En el proyecto POB, el nombre divino se vierte como «Yahvé» para preservar el nombre personal del pacto, no un título sustituto.
- source_word: אֶקְרָא
  english_pob_choice: I called
  chosen_spanish: invoqué
  alternatives_spanish:
  - llamé
  - clamé
  lexicon: HALOT
  rationale: Aunque el imperfecto puede tener valor narrativo pasado, en español «invoqué» expresa con precisión la acción de llamar a Yahvé en oración, manteniendo el registro solemne del poema.
- source_word: אָנָּה
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Ah
  - te ruego
  lexicon: HALOT
  rationale: אָנָּה es partícula de ruego. «Por favor» es la equivalencia española más natural y conserva el tono suplicante sin caer en arcaísmo.
- source_word: מלטה
  english_pob_choice: deliver
  chosen_spanish: libra
  alternatives_spanish:
  - rescata
  - salva
  - saca
  lexicon: HALOT
  rationale: El imperativo de מלט pide liberación de peligro. «Libra» mantiene el valor de liberación y funciona bien con el objeto directo siguiente en español bíblico contemporáneo.
- source_word: נפשי
  english_pob_choice: my soul
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - mi ser
  - mi persona
  lexicon: HALOT
  rationale: נפש puede significar «vida», «yo mismo» o «alma». En este contexto de peligro mortal, la lectura más ajustada es «mi vida»; se evita imponer el sentido teológico posterior de «alma» cuando el hebreo apunta a la preservación de la existencia.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre propio revelado a Israel en lugar de sustituirlo por un título. Esto sigue la práctica doctrinal del POB y evita ocultar el Tetragrámaton del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Sentido de נפש en un contexto de peligro
  english_pob_reading: my soul
  chosen_spanish_reading: mi vida
  alternative_spanish_readings:
  - mi alma
  - mi ser
  rationale: Aunque la revisión inglesa mantuvo «my soul» por correspondencia formal, el hebreo נפש aquí apunta a la vida amenazada. En español, «mi vida» comunica mejor la tensión semántica sin negar que la palabra pueda abarcar la persona entera.
  doctrine_reference: Lexical semantics of נפש in Hebrew poetry
translation_notes:
  revision_awareness: La base inglesa pasó de «rescue my life» a «deliver my soul» para acercarse más a מלטה נפשי y preservar el registro formal. Esta versión española mantiene la precisión semántica de la revisión, pero elige «mi vida» porque el valor contextual de נפש en este versículo es la preservación de la existencia amenazada.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el nombre divino, conforme al criterio del proyecto.
  - «Invocar/invoqué» conserva el valor idiomático de קרא בשם sin introducir una paráfrasis excesiva.
  - La nota textual/lexical se ancla en «mi vida» para reflejar la alternativa semántica de נפש sin borrar la tensión entre «vida» y «alma».
