    issue: Las notas al pie están ancladas en lugares equivocados.
    rationale: El marcador [a] aparece tras «de lejos», pero su contenido trata de la frase «como el águila se abate». El marcador [b] aparece tras «de la tierra», pero debería documentar la alternativa literal de «cuya lengua no entenderás». Esto rompe la trazabilidad del audit trail y puede confundir al lector.
