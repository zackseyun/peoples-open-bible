translation:
  text: Jesus said[a], “The one who is near me is near the fire[c][b], and the one
    who is far from me is far from the kingdom.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Kingdom’ translates Coptic ⲙⲛⲧⲣⲣⲟ, which can also mean ‘kingship’ or ‘royal
      rule.’
    reason: lexical_alternative
  - marker: b
    text: The manuscript has ‘to me’ (ⲉⲣⲟⲓ) / ‘from me’ (ⲙ̄ⲙⲟⲓ); Dilley normalizes
      these with independent pronouns. The article with ‘kingdom’ varies (ⲧ-/ⲡ-).
    reason: textual_variant
  - marker: c
    text: Compare the ‘fire’ imagery in Luke 12:49 for thematic resonance, though
      the saying here is distinct.
    reason: cross_reference
lexical_decisions:
- source_word: ϩⲏⲛ
  chosen: be near
  alternatives:
  - draw near
  - approach
  lexicon: Crum; Layton
  rationale: Stative usage here denotes proximity rather than movement; rendering
    as “be near” preserves the terseness and parallelism.
- source_word: ⲉⲣⲟⲓ / ⲙ̄ⲙⲟⲓ (object pronouns)
  chosen: to me / from me
  alternatives:
  - with me / away from me
  lexicon: Layton (Grammar)
  rationale: The prepositional pronominals mark direction (toward/away). Retaining
    “to me / from me” keeps the directional force clear and un-smoothed.
- source_word: ⲥⲁⲧⲉ
  chosen: the fire
  alternatives:
  - flame
  lexicon: Crum
  rationale: Basic sense is ‘fire’; ‘flame’ would over-specify and weaken the stark
    imagery.
- source_word: ⲟⲩⲏⲩ (ϥⲟⲩⲏⲩ)
  chosen: is far
  alternatives:
  - is distant
  lexicon: Crum
  rationale: Common adjective/verb ‘far’ fits the parallel construction with ‘near’;
    ‘distant’ is acceptable but less punchy.
- source_word: ⲙⲛⲧⲣⲣⲟ
  chosen: the kingdom
  alternatives:
  - kingship
  - royal rule
  - reign
  lexicon: Crum; Layton
  rationale: Term denotes ‘kingship/realm’; ‘kingdom’ is idiomatic in Thomas. Lowercased
    to avoid importing later theological capitalization while retaining definiteness
    signaled by the article.
- source_word: ⲡⲉⲧ- (relative construction)
  chosen: the one who
  alternatives:
  - whoever
  lexicon: Layton (Grammar)
  rationale: Singular generic relative suits Thomas’s aphoristic style; ‘whoever’
    would generalize acceptably but slightly shifts tone.
textual_note: No lacunae in NH II for this saying. The manuscript reads ⲡⲉϫⲉⲓⲥ (ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ)
  … ⲡⲉⲧϩⲏⲛ ⲉⲣⲟⲉⲓ ⲉϥϩⲏⲛ ⲉⲧⲥⲁⲧⲉ ⲁⲩⲱ ⲡⲉⲧⲟⲩⲏⲩ⳿ ⲙ̄ⲙⲟⲉⲓ ϥⲟⲩⲏⲩ ⲛ̄ⲧⲙⲛ̄ⲧⲉⲣⲟ. Dilley’s normalization
  regularizes the pronominal objects as ⲉⲁⲛⲟⲕ / ⲛⲁⲛⲟⲕ and reads ⲡⲙⲛⲧⲣⲣⲟ (masc. article)
  for the manuscript’s ⲧ… spelling; both articles are attested with ⲙⲛⲧⲣⲣⲟ in Sahidic.
  The predicate ‘far’ appears as ϥⲟⲩⲏⲩ (stative with pronominal subject). No restorations
  are marked by Dilley in this logion.
