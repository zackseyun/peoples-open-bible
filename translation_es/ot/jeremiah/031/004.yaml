translation:
  language: es
  text: Otra vez te edificaré[a], y serás edificada, oh virgen Israel[b]; otra vez te adornarás con tus panderos y saldrás en la danza de los que celebran[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «te reconstruiré». El hebreo usa la misma raíz dos veces: «te edificaré, y serás edificada».'
    reason: lexical_alternative
  - marker: b
    text: O «doncella Israel». La expresión es un llamado metafórico a Israel en su pureza y gozo restaurados.
    reason: lexical_alternative
  - marker: c
    text: O «en la danza de los que festejan».
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹד
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Una vez más
  - Otra vez más
  lexicon: HALOT
  rationale: Marca repetición renovada tras el juicio/restauración. «Otra vez» es natural en español y conserva la duplicación enfática de las dos cláusulas.
- source_word: אֶבְנֵךְ
  english_pob_choice: I will build you
  chosen_spanish: te edificaré
  alternatives_spanish:
  - te construiré
  - te reconstruiré
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente «edificar». «Edificaré» mantiene el campo léxico y el paralelismo con la pasiva siguiente, sin perder el sentido de restauración.
- source_word: וְנִבְנֵית
  english_pob_choice: and you will be built
  chosen_spanish: serás edificada
  alternatives_spanish:
  - serás construida
  - serás reconstruida
  lexicon: HALOT
  rationale: La pasiva hebrea repite la misma raíz. «Serás edificada» conserva la palabra-eco con el activo anterior y sugiere restauración sin añadir el prefijo interpretativo «re-».
- source_word: בְּתוּלַת יִשְׂרָאֵל
  english_pob_choice: O virgin Israel
  chosen_spanish: oh virgen Israel
  alternatives_spanish:
  - oh doncella Israel
  - oh joven Israel
  lexicon: HALOT
  rationale: Se mantiene la metáfora vocativa de restauración. «Virgen» preserva la tensión léxica y teológica del original; «oh» refleja el giro apelativo documentado en la revisión inglesa.
- source_word: תַּעְדִּי
  english_pob_choice: you will adorn yourself
  chosen_spanish: te adornarás
  alternatives_spanish:
  - te pondrás
  - te engalanarás
  lexicon: HALOT
  rationale: El verbo expresa adornarse/engalanarse para fiesta. «Te adornarás» es claro en español y conserva el matiz celebrativo.
- source_word: תֻפַּיִךְ
  english_pob_choice: your tambourines
  chosen_spanish: tus panderos
  alternatives_spanish:
  - tus tamboriles
  - tus panderetas
  lexicon: HALOT
  rationale: El instrumento se refiere a percusión pequeña para celebración. «Panderos» es el equivalente español más natural y ampliamente reconocible; «tamboriles» o «panderetas» son posibles, pero menos directos según el uso bíblico tradicional en español.
- source_word: וְיָצָאת
  english_pob_choice: and go out
  chosen_spanish: y saldrás
  alternatives_spanish:
  - y irás afuera
  - y saldrás fuera
  lexicon: HALOT
  rationale: Verbo simple de movimiento secuencial. «Saldrás» comunica con naturalidad la procesión pública implícita.
- source_word: בִּמְחֹול
  english_pob_choice: in the dance
  chosen_spanish: en la danza
  alternatives_spanish:
  - en el baile
  - en la ronda
  lexicon: HALOT
  rationale: מָחוֹל designa danza festiva/comunitaria. «Danza» conserva el sustantivo concreto y funciona bien con el participio siguiente.
- source_word: מְשַׂחֲקִים
  english_pob_choice: those who celebrate
  chosen_spanish: de los que se alegran
  alternatives_spanish:
  - de los que celebran
  - de los que festejan
  - de los que hacen fiesta
  lexicon: HALOT
  rationale: El participio de שׂחק puede abarcar juego, júbilo y celebración. «Los que se alegran» comunica el sentido festivo sin volver trivial el texto; se mantiene la amplitud semántica reconocida en la auditoría inglesa.
theological_decisions:
- issue: Metáfora de identidad restaurada en «virgen Israel»
  english_pob_reading: Retain the metaphor directly as 'virgin Israel' rather than interpretively expanding it.
  chosen_spanish_reading: Mantener la metáfora directamente como «virgen Israel», sin explicitarla como una afirmación literal sobre virginidad física.
  alternative_spanish_readings:
  - oh doncella Israel
  - oh Israel, restaurada en pureza
  rationale: El hebreo es un vocativo metafórico de restauración. Traducirlo de forma directa conserva la tensión profética entre juicio y renovación, y evita diluir la imagen con una paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa más reciente que añadió el vocativo «O» antes de «virgin Israel»; en español se reflejó con «oh» para mantener el tono apelativo. También se conservó la observación de la auditoría sobre la repetición de la misma raíz en «edificar/ser edificada» y la ambigüedad festiva de מְשַׂחֲקִים.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero en este verso no aparece el nombre divino.
  - Se eligió una solución de raíz compartida («edificar / ser edificada») para conservar el juego léxico del hebreo.
  - Se usó «panderos» por ser un equivalente bíblico natural en español; no se optó por «timbreles» por su tono arcaico.
  - «Oh virgen Israel» conserva el vocativo y la metáfora sin suavizar la carga profética.
