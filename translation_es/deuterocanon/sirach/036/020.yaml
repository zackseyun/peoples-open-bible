translation:
  language: es
  text: Todo alimento lo recibe el estómago, pero un alimento es mejor que otro.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «hay alimento mejor que alimento»; el comparativo griego expresa que algunos alimentos son mejores que otros.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶν
  english_pob_choice: Every
  chosen_spanish: Todo
  alternatives_spanish:
  - Cada
  lexicon: LSJ
  rationale: 'El griego tiene un valor distributivo proverbiaI: cada clase de alimento entra en la afirmación. En español, "Todo" conserva bien esa amplitud y suena natural con el singular genérico "alimento".'
- source_word: βρῶμα
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - alimento que se come
  lexicon: LSJ
  rationale: βρῶμα es el término general para lo que se come. "Alimento" mantiene el sentido genérico sin forzar una referencia a una comida concreta; además funciona bien en el contraste comparativo del verso.
- source_word: φάγεται
  english_pob_choice: is eaten
  chosen_spanish: lo come
  alternatives_spanish:
  - será comido
  - se come
  lexicon: LSJ
  rationale: Aunque la forma griega es pasiva/futura, en este contexto sapiencial expresa una verdad general. En español, una construcción activa impersonal de estilo natural comunica mejor la idea proverbial que un pasivo rígido.
- source_word: κοιλία
  english_pob_choice: stomach
  chosen_spanish: el estómago
  alternatives_spanish:
  - el vientre
  - la barriga
  lexicon: LSJ
  rationale: En el contexto de comer, κοιλία designa el órgano digestivo. "Estómago" es la equivalencia más precisa y idiomática en español moderno.
- source_word: βρῶμα βρώματος κάλλιον
  english_pob_choice: one food is better than another
  chosen_spanish: hay alimento mejor que alimento
  alternatives_spanish:
  - un alimento es mejor que otro
  - hay una comida mejor que otra
  lexicon: LSJ
  rationale: 'La construcción griega es literalmente comparativa: "alimento de alimento mejor". El español necesita explicitar la comparación; "hay alimento mejor que alimento" conserva la literalidad suficiente y mantiene la tensión de que algunos alimentos son mejores que otros.'
translation_notes:
  revision_awareness: El pasaje griego es breve y proverbial; se ha conservado la estructura general y el contraste comparativo del original, siguiendo la lectura inglesa auditada, pero ajustando la sintaxis para que suene natural en español sin perder la literalidad necesaria.
  spanish_consistency_notes:
  - Se mantuvo «alimento» para βρῶμα por su amplitud semántica y para evitar una restricción innecesaria a una sola comida concreta.
  - Se evitó una traducción pasiva rígida de φάγεται, porque en español el valor gnómico queda mejor expresado con una construcción natural y general.
  - No se introdujeron términos eclesiásticos o doctrinales ajenos al verso; el texto es sapiencial y de observación general.
