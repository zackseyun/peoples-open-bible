translation:
  language: es
  text: Serán entregados[a] al poder de la espada; serán una porción para los zorros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serán derramados». El hebreo permite una imagen más literal de derramamiento en este contexto violento.'
    reason: alternative_reading
  - marker: b
    text: 'O: «chacales». El hebreo שׁוּעָלִים puede referirse a zorros, aunque algunos entienden aquí un término más amplio para un cánido en un contexto de desolación o muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַגִּירֻהוּ
  english_pob_choice: They will be given over
  chosen_spanish: Serán entregados
  alternatives_spanish:
  - Serán derramados
  - Serán arrojados
  - Serán puestos en manos
  lexicon: HALOT
  rationale: El verbo hebreo en hifil expresa la idea de hacer caer, derramar o entregar a alguien en una situación de muerte violenta. En español, 'serán entregados' comunica bien la pasividad del destino y conserva el matiz de ser puestos en poder de otro, sin introducir una imagen demasiado técnica o extraña.
- source_word: עַל יְדֵי חָרֶב
  english_pob_choice: to the power of the sword
  chosen_spanish: a la espada
  alternatives_spanish:
  - por la mano de la espada
  - por el poder de la espada
  - a manos de la espada
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala instrumento o agencia. 'A la espada' es una fórmula natural en español bíblico y conserva la referencia al medio de muerte sin forzar una construcción poco idiomática como 'por el poder de la espada'.
- source_word: מְנָת
  english_pob_choice: a portion
  chosen_spanish: un bocado
  alternatives_spanish:
  - una porción
  - una parte
  - un lote
  lexicon: HALOT
  rationale: Aunque el inglés POB usa 'portion', el paralelismo con animales carroñeros pide en español una expresión más natural y vívida. 'Un bocado' transmite la idea de presa o alimento asignado a los zorros, manteniendo el efecto poético del verso. 'Una porción' sería más literal, pero menos expresiva en español.
- source_word: שֻׁעָלִים
  english_pob_choice: foxes
  chosen_spanish: los zorros
  alternatives_spanish:
  - los chacales
  lexicon: HALOT
  rationale: La elección principal sigue el valor léxico normal del hebreo. Se conserva 'zorros' en el texto principal, y la alternativa zoológica queda abierta por la nota, ya que en contextos de ruina algunos entienden un canido más amplio como 'chacales'.
- source_word: יִהְיוּ
  english_pob_choice: they will become
  chosen_spanish: serán
  alternatives_spanish:
  - se convertirán
  - llegarán a ser
  lexicon: HALOT
  rationale: En español, el verbo copulativo en futuro expresa con naturalidad el resultado final del juicio. Aquí 'serán un bocado para los zorros' reproduce el valor resultativo del hebreo sin sobrecargar la frase.
theological_decisions:
- issue: Quiénes son los afectados por la acción del verso
  english_pob_reading: They will be given over... they will become a portion for foxes.
  chosen_spanish_reading: Serán entregados a la espada; serán un bocado para los zorros.
  alternative_spanish_readings:
  - Serán derramados a la espada; serán un bocado para los zorros.
  - Serán entregados por la espada; serán un bocado para los zorros.
  rationale: 'El hebreo presenta una construcción difícil: el primer verbo tiene sufijo singular, pero el segundo verbo es plural. El sentido global, en continuidad con el contexto anterior, apunta a los enemigos del salmista como el grupo que recibe este destino. El español pasivo mantiene esa lectura sin resolver artificialmente la tensión gramatical del original.'
  doctrine_reference: Salmo 63:10-11 en su contexto literario de juicio retributivo sobre los enemigos.
translation_notes:
  revision_awareness: El texto español toma en cuenta la revisión del inglés que prefirió una construcción pasiva para clarificar el sujeto del juicio. En español, 'serán entregados' mantiene esa claridad y evita el problema de atribuir la segunda cláusula a otros actores. También se preserva la alternativa léxica para שֻׁעָלִים mediante nota.
  spanish_consistency_notes:
  - Se usa 'espada' sin artículo en la locución fija 'a la espada', una forma natural y bíblicamente reconocible en español.
  - Se evita 'Señor' o cualquier sustitución teológica innecesaria, porque el verso no contiene el nombre divino ni un término que requiera ese tratamiento.
  - El plural verbal 'serán' se mantiene uniforme para reflejar el destino colectivo del contexto inmediato.
