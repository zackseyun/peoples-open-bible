translation:
  language: es
  text: Yahvé habló a Moisés y a Aarón[a], diciendo a ellos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
