review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja fielmente el griego y la línea auditada de la POB: mantiene «esta es la parábola» en vez de expandir interpretativamente a «significado», conserva «la semilla» para σπόρος y «la palabra de Dios» para ὁ λόγος τοῦ θεοῦ. La única corrección necesaria está en la nota, cuya redacción actual se contradice al presentar como alternativa «esta es la parábola» y luego decir «es decir, este es el significado…».'
  spanish_quality_summary: 'El texto principal suena natural y digno en español general: «Ahora bien, esta es la parábola: la semilla es la palabra de Dios». La transición «Ahora bien» funciona bien para δέ. La nota, sin embargo, debe simplificarse para expresar correctamente la alternativa sin confundir al lector.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. θεοῦ se traduce correctamente como «Dios», λόγος como «palabra», y no aparecen términos sensibles como Yahvé/Mesías/espíritu/esclavo. La decisión teológica sobre παραβολή se preserva adecuadamente en el texto principal.
  issues:
  - severity: medium
    issue: La nota al pie está formulada de manera confusa y parcialmente invertida.
    rationale: 'La POB inglesa dice: «Or, ''this is the meaning of the parable.'' The Greek reads more literally, ''this is the parable.''» La nota española actual comienza con «O: “esta es la parábola”» y luego añade «es decir, “este es el significado de la parábola”», lo cual desordena la relación entre lectura principal, alternativa y literalidad. Debe presentar la alternativa como «este es el significado de la parábola» y luego aclarar que el griego dice más literalmente «esta es la parábola».'
  revised_spanish_text: 'Ahora bien, esta es la parábola: la semilla es la palabra de Dios[a].'
  revised_footnotes:
  - marker: a
    text: 'O: «este es el significado de la parábola». El griego dice más literalmente: «esta es la parábola».'
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel al griego, claro en español y consistente con la decisión auditada de no insertar «significado» en el cuerpo del versículo. Solo se corrige la nota para que refleje con precisión la alternativa interpretativa y la literalidad del griego, sin contradicción interna.
