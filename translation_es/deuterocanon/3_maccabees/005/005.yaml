translation:
  language: es
  text: Y además, los asistentes, al salir al atardecer, ataban las manos de los que sufrían, y maquinaban el resto de la seguridad nocturna en torno a ellos, pensando que juntos llevarían al pueblo[a] al fin de la destrucción[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la nación» para τὸ φύλον, que aquí designa al pueblo judío como colectividad.
    reason: lexical_alternative
  - marker: b
    text: La expresión griega está más cerca de «el fin» o «la consumación» de la destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: λειτουργοὶ
  english_pob_choice: attendants
  chosen_spanish: asistentes
  alternatives_spanish:
  - sirvientes
  - funcionarios
  - ministros
  lexicon: LSJ
  rationale: En este contexto narrativo se trata de quienes cumplen una función asignada bajo autoridad. 'Asistentes' conserva la idea de servicio operativo sin introducir un matiz litúrgico que 'ministros' tendría en español eclesial.
- source_word: κατὰ τὴν ἑσπέραν
  english_pob_choice: at evening
  chosen_spanish: al atardecer
  alternatives_spanish:
  - por la tarde
  - en la tarde
  - al anochecer
  lexicon: LSJ
  rationale: La expresión temporal es simple. 'Al atardecer' suena natural en español y mantiene la referencia al momento de transición hacia la noche.
- source_word: τὰς τῶν ταλαιπωρουμένων χεῖρας
  english_pob_choice: the hands of those who were suffering
  chosen_spanish: las manos de los que sufrían
  alternatives_spanish:
  - las manos de los afligidos
  - las manos de los que estaban en sufrimiento
  - las manos de los miserables
  lexicon: LSJ
  rationale: ταλαιπωρουμένων indica personas en aflicción o sufrimiento. 'Los que sufrían' comunica la condición humana de forma clara y sin añadir un tono demasiado arcaico.
- source_word: ἐδέσμευον
  english_pob_choice: bound
  chosen_spanish: ataban
  alternatives_spanish:
  - ligaban
  - fijaban
  - encadenaban
  lexicon: LSJ
  rationale: El verbo expresa el acto de sujetar o asegurar físicamente. 'Ataban' es directo y natural en español; 'encadenaban' sería más específico de cadenas de lo que el griego exige.
- source_word: τὴν τε λοιπὴν ἀσφάλειαν ἔννυχον
  english_pob_choice: the rest of the nighttime security
  chosen_spanish: el resto de la seguridad nocturna
  alternatives_spanish:
  - la demás seguridad de la noche
  - las medidas restantes de seguridad durante la noche
  - la vigilancia nocturna restante
  lexicon: LSJ
  rationale: La frase griega es compacta y se refiere a medidas adicionales para la noche. 'Seguridad nocturna' conserva el sustantivo del original y su ámbito temporal.
- source_word: ἐμηχανῶντο
  english_pob_choice: contrived
  chosen_spanish: disponían
  alternatives_spanish:
  - maquinaban
  - planeaban
  - preparaban
  lexicon: LSJ
  rationale: El medio sugiere una elaboración intencional de medidas. 'Disponer' funciona en español con el sentido de organizar o preparar, evitando un matiz excesivamente técnico o artificioso.
- source_word: δοξαντες
  english_pob_choice: thinking
  chosen_spanish: pensando
  alternatives_spanish:
  - suponiendo
  - creyendo
  - esperando
  lexicon: LSJ
  rationale: El participio introduce su supuesto mental. 'Pensando' es la opción más transparente y no añade certeza que el griego no expresa.
- source_word: λήμψεσθαι
  english_pob_choice: would receive
  chosen_spanish: llevarían
  alternatives_spanish:
  - recibirían
  - obtendrían
  - alcanzarían
  lexicon: LSJ
  rationale: En combinación con el objeto y el contexto de acción hostil, el sentido se expresa mejor en español como un resultado que ellos procurarían 'llevar' a su término. 'Recibirían' suena demasiado pasivo para la construcción final del verso.
- source_word: τὸ φύλον
  english_pob_choice: the race
  chosen_spanish: esa tribu
  alternatives_spanish:
  - ese pueblo
  - esa nación
  - ese linaje
  lexicon: LSJ
  rationale: El sustantivo puede referirse al grupo étnico/corporativo entero. 'Tribu' conserva el valor colectivo antiguo, pero en español puede sonar estrecho; por eso se marca en nota la alternativa 'pueblo' o 'nación'.
- source_word: πέρας τῆς ὀλεθρίας
  english_pob_choice: the end of destruction
  chosen_spanish: al fin de la destrucción
  alternatives_spanish:
  - a la completa destrucción
  - al término de la ruina
  - a la consumación de la destrucción
  lexicon: LSJ
  rationale: πέρας puede significar fin, término o consumación. 'Al fin de la destrucción' preserva la relación sustantiva entre 'fin' y 'destrucción' sin borrar la tensión del giro griego.
theological_decisions:
- issue: Identidad colectiva de τὸ φύλον
  english_pob_reading: the race
  chosen_spanish_reading: esa tribu
  alternative_spanish_readings:
  - ese pueblo
  - esa nación
  rationale: El texto se refiere a la colectividad judía como objetivo de la persecución. 'Tribu' mantiene la idea de grupo étnico/hereditario, mientras que las alternativas se conservan porque en español moderno pueden captar mejor el alcance colectivo sin perder el sentido.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Relación entre λήμψεσθαι y πέρας τῆς ὀλεθρίας
  english_pob_reading: would together bring the race to the end of destruction
  chosen_spanish_reading: llevarían a esa tribu al fin de la destrucción
  alternative_spanish_readings:
  - recibirían el final de la destrucción para esa tribu
  - alcanzarían para esa tribu la consumación de la ruina
  rationale: La cláusula final expresa una expectativa de consumación del daño, no solo un desenlace pasivo. El español elegido mantiene esa dirección de acción y conserva la tensión del genitivo 'de la destrucción' sin suavizarla.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: Se ha tenido en cuenta la revisión más reciente del audit trail inglés, que afinó ἐμηχανῶντο, la relación de ἀσφάλειαν ἔννυχον y la cláusula final con λήμψεσθαι / πέρας. El español busca conservar esa precisión sin copiar mecánicamente el inglés revisado.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención general del proyecto, pero este verso no contiene el tetragrámaton ni un equivalente contextual directo.
  - Se evita 'ministros' para λειτουργοὶ por su carga eclesial en español.
  - Se conserva un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - La nota sobre τὸ φύλον se formula con cautela para no absolutizar 'tribu' como única opción semántica.
