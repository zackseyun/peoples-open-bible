translation:
  language: es
  text: Y enviaré delante de ti[a] un ángel, y expulsaré al cananeo, al amorreo, al hitita, al perizita, al heveo y al jebuseo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un mensajero». El hebreo מַלְאָךְ puede designar tanto a un mensajero humano como a un ángel; aquí «ángel» encaja mejor con el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁלַחְתִּי
  english_pob_choice: And I will send
  chosen_spanish: Y enviaré
  alternatives_spanish:
  - Y mandaré
  - Y enviaré adelante
  lexicon: HALOT
  rationale: El verbo hebreo se entiende aquí en sentido prospectivo en habla divina. «Enviaré» conserva el valor promisor de futuro y suena natural en español.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - antes de ti
  - por delante de ti
  lexicon: HALOT
  rationale: La expresión idiomática hebrea significa estar delante o al frente. «Delante de ti» es claro, natural y preserva la imagen espacial.
- source_word: מַלְאָךְ
  english_pob_choice: an angel
  chosen_spanish: un ángel
  alternatives_spanish:
  - un mensajero
  lexicon: HALOT
  rationale: Aunque מַלְאָךְ puede significar «mensajero», el contexto de guía en el desierto favorece «ángel». Se mantiene la ambigüedad teológica del original sin especificar más.
- source_word: וְגֵרַשְׁתִּי
  english_pob_choice: and I will drive out
  chosen_spanish: y yo expulsaré
  alternatives_spanish:
  - y yo echaré fuera
  - y yo desalojaré
  lexicon: HALOT
  rationale: גרשׁ expresa expulsar o sacar de un territorio. «Expulsaré» comunica bien la fuerza de desposesión territorial en español moderno.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanite
  chosen_spanish: al cananeo
  alternatives_spanish:
  - al cananita
  - a los cananeos
  lexicon: HALOT
  rationale: Se conserva el singular colectivo del hebreo con artículo, como en la pauta inglesa, para respetar la forma de la lista étnica.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorite
  chosen_spanish: al amorreo
  alternatives_spanish:
  - a los amorreos
  lexicon: HALOT
  rationale: Se mantiene el singular colectivo para corresponder al hebreo y a la estructura enumerativa del texto.
- source_word: הַחִתִּי
  english_pob_choice: the Hittite
  chosen_spanish: al hitita
  alternatives_spanish:
  - a los hititas
  lexicon: HALOT
  rationale: Se conserva el singular colectivo como en el hebreo, siguiendo la decisión de la POB inglesa.
- source_word: הַפְּרִזִּי
  english_pob_choice: the Perizzite
  chosen_spanish: al perizita
  alternatives_spanish:
  - a los perizitas
  lexicon: HALOT
  rationale: Se translitera el etnónimo de forma tradicional y se conserva el singular colectivo para reflejar el patrón del texto fuente.
- source_word: הַחִוִּי
  english_pob_choice: the Hivite
  chosen_spanish: al heveo
  alternatives_spanish:
  - a los heveos
  lexicon: HALOT
  rationale: Se elige la forma española establecida «heveo» para el etnónimo, manteniendo el singular colectivo del hebreo.
- source_word: הַיְבוּסִי
  english_pob_choice: and the Jebusite
  chosen_spanish: al jebuseo
  alternatives_spanish:
  - a los jebuseos
  lexicon: HALOT
  rationale: Se conserva la forma singular colectiva para reproducir la lista hebrea con la misma economía y fuerza enumerativa.
theological_decisions:
- issue: Identidad de מַלְאָךְ en este versículo
  english_pob_reading: Render generically as 'an angel' without specifying whether this is the Angel of the LORD or a created angel.
  chosen_spanish_reading: Traducir genéricamente «un ángel» sin identificar si se trata del Ángel de Yahvé o de un mensajero creado.
  alternative_spanish_readings:
  - el ángel
  - un mensajero
  rationale: El verso no especifica la identidad del מַלְאָךְ. La traducción mantiene la tensión teológica y evita resolverla con una identificación no explícita en el texto.
  doctrine_reference: Preservar la tensión teológica sin sobreinterpretar el pasaje.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto sigue el análisis auditado y la decisión inglesa de mantener מַלְאָךְ de forma genérica.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no figura.
  - Se mantiene el singular colectivo en los etnónimos, en paralelo con la decisión inglesa.
  - Se prefieren verbos de movimiento y expulsión directos («enviar», «expulsar») para conservar la fuerza del hebreo sin añadir explicación.
  - La nota al pie marca la ambigüedad léxica de מַלְאָךְ, preservando la alternativa «mensajero» como en el audit trail inglés.
