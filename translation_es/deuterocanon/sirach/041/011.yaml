review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el contraste principal del hebreo: la fugacidad del cuerpo humano frente a la permanencia de un buen nombre. Sin embargo, introduce material no presente en el texto fuente con «La condición mortal», y en la segunda cola abandona la decisión léxica principal del hebreo «no será cortado» en favor de «no será borrado», que pertenece más bien al paralelo griego preservado en la nota.'
  spanish_quality_summary: El español es comprensible, pero «La condición mortal de un hombre en su cuerpo» suena forzado y expansivo respecto del hebreo breve. «El cuerpo de un hombre es vanidad» es más natural, fiel y proverbial. «Un nombre de bondad» es aceptable, aunque «un nombre bondadoso» o «un nombre de bondad» ambos funcionan; aquí conviene conservar la estructura nominal cercana al hebreo o una formulación natural equivalente. La nota está bien planteada.
  glossary_alignment: Se mantiene adecuadamente «vanidad», «un hombre», «cuerpo» y «nombre». El problema principal de alineación léxica es לא יכרת, que según el expediente inglés debe seguirse como «no será cortado», no «no será borrado». Dado que la nota ya conserva la variante griega con «borrado», conviene diferenciar claramente texto principal y alternativa.
  issues:
  - severity: high
    issue: 'Expansión no respaldada en la primera cola: «La condición mortal de un hombre en su cuerpo»'
    rationale: El hebreo הבל אדם בגויתו significa de forma mucho más directa «El cuerpo de un hombre es vanidad» o equivalente. «Condición mortal» añade una abstracción interpretativa ausente del original.
  - severity: high
    issue: La segunda cola usa «no será borrado» en vez de la lectura hebrea «no será cortado»
    rationale: El expediente POB documenta que el texto principal debe seguir el hebreo לא יכרת, mientras que «borrado» corresponde a la variante griega ἐξαλειφθήσεται conservada en nota. Mantener «borrado» en el texto principal borra la tensión textual que el proyecto quiere preservar.
  - severity: medium
    issue: La nota contradice innecesariamente el texto principal actual
    rationale: La nota dice correctamente que el hebreo dice «no será cortado», pero el texto principal dice «no será borrado». Esto puede confundir al lector sobre cuál lectura sigue la traducción española.
  revised_spanish_text: El cuerpo de un hombre es vanidad[a], pero un nombre de bondad no será cortado.
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «el nombre de los pecadores no será borrado como bueno» (o «para bien»). El testimonio hebreo, en cambio, dice: «un nombre de bondad no será cortado».'
    reason: alternative_reading
