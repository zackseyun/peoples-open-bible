  rationale: Es un nombre propio de lugar; se translitera en español para conservar la referencia geográfica sin interpretar su significado etimológico.
- source_word: בֵּֽית צ֖וּר
  english_pob_choice: Beth-zur
  chosen_spanish: Bet-sur
  alternatives_spanish:
  - Beth-zur
  - Bet Zur
  - Casa de Zur
  lexicon: HALOT
  rationale: Se mantiene como topónimo transliterado. En español, 'Bet-' reproduce de forma natural la forma hebrea בֵּית en nombres de lugar, y 'sur' conserva la consonancia del nombre propio sin convertirlo en una traducción literal como 'casa de Zur'.
- source_word: וּ/גְדֽוֹר
  english_pob_choice: and Gedor
  chosen_spanish: y Gedor
  alternatives_spanish:
  - Gedor
  lexicon: HALOT
  rationale: La conjunción ו se refleja con 'y' para conservar la lista. גְדוֹר es nombre propio y se translitera como Gedor.
