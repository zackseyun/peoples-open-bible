translation:
  language: es
  text: cuando todo Israel venga para presentarse delante de Yahvé tu Dios en el lugar que él escoja[a], leerás esta ley delante de todo Israel, de modo que lo oiga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ver el rostro de Yahvé tu Dios», un modismo que significa presentarse en su presencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/ב֣וֹא
  english_pob_choice: when ... comes
  chosen_spanish: cuando ... venga
  alternatives_spanish:
  - al venir
  - cuando ... llegue
  lexicon: HALOT
  rationale: La cláusula temporal introduce una acción futura y habitual en el contexto cultual; «cuando ... venga» suena natural en español y conserva el valor temporal del infinitivo constructo con ב.
- source_word: כָל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el Israel
  - la totalidad de Israel
  lexicon: HALOT
  rationale: Mantiene el sentido colectivo del pueblo del pacto con una formulación natural en español; «todo Israel» es la equivalencia más directa y idiomática.
- source_word: לֵ/רָאוֹת אֶת פְּנֵי
  english_pob_choice: to appear before
  chosen_spanish: para presentarse delante de
  alternatives_spanish:
  - para aparecer ante
  - para ver el rostro de
  lexicon: HALOT
  rationale: Se conserva el sentido idiomático de la expresión hebrea, sin traducirla de forma literal y engañosa como si implicara ver físicamente el rostro de Dios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la terminología POB para el Nombre divino: «Yahvé» refleja el Tetragrámaton sin sustituirlo por un título y es la forma establecida en español del proyecto.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - su Dios
  - tu Dios, el Dios de ti
  lexicon: HALOT
  rationale: La terminación de segunda persona singular se conserva con «tu», que reproduce la dirección personal del discurso de Moisés a Israel.
- source_word: בַּ/מָּקוֹם אֲשֶׁר יִבְחָר
  english_pob_choice: at the place that he will choose
  chosen_spanish: en el lugar que él escoja
  alternatives_spanish:
  - en el lugar que él elegirá
  - en el sitio que él elija
  lexicon: HALOT
  rationale: «Lugar» traduce bien מָקוֹם y «escoja» mantiene el valor volitivo del verbo; el tiempo subjuntivo en español expresa adecuadamente la elección futura.
- source_word: תִּקְרָא
  english_pob_choice: you shall read
  chosen_spanish: leerás
  alternatives_spanish:
  - proclamarás
  - leerás en voz alta
  lexicon: HALOT
  rationale: En este contexto, קרא con objeto escrito implica lectura pública; «leerás» es claro y fiel, y el contexto ceremonial ya aporta la dimensión pública.
- source_word: הַ/תּוֹרָה הַ/זֹּאת
  english_pob_choice: this law
  chosen_spanish: esta ley
  alternatives_spanish:
  - esta instrucción
  - esta Torah
  lexicon: HALOT
  rationale: «Ley» comunica de manera natural el cuerpo normativo aludido en Deuteronomio. Se evita «Torah» por ser menos transparente para el lector general, aunque el término hebreo incluya el sentido de enseñanza/instrucción.
- source_word: נֶגֶד כָּל יִשְׂרָאֵל
  english_pob_choice: before all Israel
  chosen_spanish: delante de todo Israel
  alternatives_spanish:
  - en presencia de todo Israel
  - frente a todo Israel
  lexicon: HALOT
  rationale: «Delante de» conserva la idea de exposición pública ante la asamblea, con una preposición natural en español.
- source_word: בְּ/אָזְנֵי/הֶם
  english_pob_choice: in their hearing
  chosen_spanish: en su presencia
  alternatives_spanish:
  - a oídos de ellos
  - para que lo oigan
  lexicon: HALOT
  rationale: Aquí se opta por una formulación que refuerza la audición pública ya implícita en el contexto; sin embargo, el valor literal de «en sus oídos» se preserva indirectamente en la nota textual, y el sintagma final evita una repetición pesada en español.
theological_decisions:
- issue: Traducción del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo nombra directamente a יהוה; siguiendo la política del proyecto, se vierte como «Yahvé» para preservar el Nombre del pacto en el texto principal y no reemplazarlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor idiomático de «ver el rostro de Yahvé»
  english_pob_reading: to appear before
  chosen_spanish_reading: presentarse delante de
  alternative_spanish_readings:
  - comparecer ante
  - ver el rostro de
  rationale: La construcción hebrea es un modismo de acceso/presencia, no de visión física del rostro divino. «Presentarse delante de» comunica la idea cultual con fidelidad y evita una lectura antropomórfica impropia.
  doctrine_reference: Lexical idiom note on פְּנֵי יהוה in worship contexts
translation_notes:
  revision_awareness: 'Se revisó el pasaje a la luz del audit trail inglés: se mantuvo el valor idiomático de לֵרָאוֹת אֶת פְּנֵי como presencia cultual, se respetó el Nombre divino con la terminología POB en español, y se evitó una calca excesiva en la cláusula final para conservar la fluidez sin perder la audibilidad pública del texto.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - «Ley» traduce הַתּוֹרָה הַזֹּאת siguiendo el uso deuteronómico y la inteligibilidad en español.
  - La nota a explica la tensión lexical del modismo «ver el rostro de» sin introducir una lectura alternativa en el cuerpo principal.
  - Se preservó el tono de mandato futuro con «leerás», adecuado al discurso de Moisés y al contexto litúrgico.
