  yaml_path: translation/deuterocanon/1_maccabees/007/009.yaml
  text: And he sent him and Alcimus the ungodly[a], and established the priesthood for him[b], and commanded him to carry out vengeance on the sons of Israel.
  footnotes:
  - marker: a
    text: Or 'appointed him to the priesthood.' The Greek literally says 'established the priesthood for him,' referring to Alcimus's installation in priestly office.
    reason: lexical_alternative
  - marker: b
    text: Or 'against the sons of Israel.' The preposition may be understood as indicating the people within whom the vengeance was to be carried out, with hostile force implied by the context.
    reason: alternative_reading
