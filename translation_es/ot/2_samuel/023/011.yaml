translation:
  language: es
  text: Después de él estaba Samá hijo de Agee el hararita. Los filisteos se reunieron en Lehi[a], donde había una parcela del campo llena de lentejas, y el pueblo huyó de delante de los filisteos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo לַחַיָּה es difícil. Puede entenderse como un lugar, «Lehi», mientras que otros lo toman con un sentido militar, como «para batalla» o «hacia una tropa». El texto principal sigue la lectura «Lehi».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרָיו
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - Y después de él
  - Tras él
  lexicon: HALOT
  rationale: La construcción hebrea marca simple sucesión en una lista; en español, «Después de él» conserva la relación temporal sin añadir un verbo inexistente en el original.
- source_word: שַׁמָּא
  english_pob_choice: Shammah
  chosen_spanish: Samá
  alternatives_spanish:
  - Samma
  - Shamma
  lexicon: Transliteración basada en el hebreo y la forma castellana de nombres bíblicos
  rationale: Se translitera el nombre propio en forma natural para español. «Samá» evita una grafía excesivamente inglesa y mantiene la identificación del personaje.
- source_word: בֶן אָגֵא
  english_pob_choice: son of Agee
  chosen_spanish: hijo de Agee
  alternatives_spanish:
  - hijo de Agé
  - descendiente de Agee
  lexicon: Construcción filiar estándar
  rationale: La relación de filiación se expresa de forma directa y fiel con «hijo de». No hay motivo para reinterpretarla como linaje más amplio.
- source_word: הָרָרִי
  english_pob_choice: the Hararite
  chosen_spanish: el hararita
  alternatives_spanish:
  - el de Harar
  - el hombre de Harar
  lexicon: HALOT
  rationale: Se conserva el gentilicio/título como designación de procedencia o clan. «Hararita» refleja mejor la forma nominativa breve que una paráfrasis geográfica.
- source_word: וַיֵּאָסְפוּ
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: HALOT
  rationale: El verbo en este contexto militar funciona naturalmente como reunión de tropas. «Se reunieron» comunica la acción sin forzar un tecnicismo militar adicional.
- source_word: לַחַיָּה
  english_pob_choice: for battle / together at Lehi
  chosen_spanish: en Lehi
  alternatives_spanish:
  - para batalla
  - junto a Lehi
  lexicon: HALOT
  rationale: 'Siguiendo el audit trail, la lectura textual se refleja como un topónimo en la traducción principal: «Lehi». Esto evita imponer la paráfrasis «para batalla» y conserva la tensión textual documentada; el contexto militar queda explícito por la reunión de los filisteos y por el paralelo tradicional.'
- source_word: חֶלְקַת הַשָּׂדֶה
  english_pob_choice: a plot of ground / a plot of the field
  chosen_spanish: una parcela del campo
  alternatives_spanish:
  - un terreno del campo
  - un lote del campo
  lexicon: HALOT
  rationale: «Parcela» recoge היטב la idea de una porción concreta de terreno. «Del campo» mantiene la relación constructa sin volver la frase extraña en español.
- source_word: מְלֵאָה עֲדָשִׁים
  english_pob_choice: full of lentils
  chosen_spanish: llena de lentejas
  alternatives_spanish:
  - sembrada de lentejas
  - repleta de lentejas
  lexicon: HALOT
  rationale: Se mantiene el sentido literal «llena de lentejas», que es lo que afirma el hebreo. «Sembrada de» sería interpretativo y menos fiel al dato textual.
- source_word: וְהָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: En español, «el pueblo» suena más natural que un calco rígido y puede abarcar al grupo humano presente sin especificarlo más allá de la evidencia del verso.
- source_word: נָס מִפְּנֵי
  english_pob_choice: fled from before
  chosen_spanish: huyó de delante de
  alternatives_spanish:
  - huyó ante
  - retrocedió ante
  lexicon: HALOT
  rationale: «De delante de» reproduce de manera bastante cercana el giro hebreo y conserva su tono formal. «Ante» sería más breve, pero perdería la imagen espacial del original.
theological_decisions:
- issue: Tratamiento del topónimo/lectura de לַחַיָּה
  english_pob_reading: The Philistines gathered together at Lehi
  chosen_spanish_reading: Los filisteos se reunieron en Lehi
  alternative_spanish_readings:
  - Los filisteos se reunieron para batalla
  - Los filisteos se reunieron junto a Lehi
  rationale: El audit trail muestra una decisión revisada para no fijar «para batalla» como traducción principal. En español, la opción «en Lehi» preserva la lectura topográfica documentada y deja la nota de dificultad semántica en el aparato, sin borrar el trasfondo militar del pasaje.
  doctrine_reference: No aplica; decisión textual y lexicográfica, no doctrinal.
translation_notes:
  revision_awareness: El inglés POB revisó este versículo para reemplazar la paráfrasis interpretativa «for battle» por la lectura más controlada «at Lehi», reflejando la dificultad de לַחַיָּה. La presente versión española sigue esa revisión y evita reintroducir una expansión no fijada en el texto auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton en todo el proyecto, pero este versículo no lo contiene.
  - Se conserva el tono sobrio y narrativo del listado de guerreros sin añadir explicaciones ajenas al verso.
  - «Filisteos» y «pueblo» siguen el nivel de generalidad del hebreo, sin especificaciones históricas adicionales.
