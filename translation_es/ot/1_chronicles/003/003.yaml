translation:
  language: es
  text: el quinto, Shefatías, de Abital[a]; el sexto, Itream[b], de Eglá, su esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a Abital' / 'a Eglá', es decir, 'nacido de Abital' y 'nacido de Eglá'. La preposición hebrea se vierte aquí de manera idiomática en español genealógico como 'de'.
    reason: lexical_alternative
  - marker: b
    text: Algunos intérpretes identifican a Eglá con Mical, pero el texto mismo no lo afirma.
    reason: alternative_reading
lexical_decisions:
- source_word: הַחֲמִישִׁי
  english_pob_choice: the fifth
  chosen_spanish: el quinto
  alternatives_spanish:
  - quinto
  lexicon: HALOT
  rationale: El ordinal con artículo continúa la lista genealógica. En español, 'el quinto' conserva la estructura enumerativa natural y refleja la función del artículo en la secuencia.
- source_word: שְׁפַטְיָה
  english_pob_choice: Shephatiah
  chosen_spanish: Shefatías
  alternatives_spanish:
  - Shefatía
  - Sefatías
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio con una forma española legible y cercana al valor fonético hebreo, sin traducirlo.
- source_word: לַאֲבִיטָל
  english_pob_choice: by Abital
  chosen_spanish: de Abital
  alternatives_spanish:
  - por Abital
  - para Abital
  - nacido de Abital
  lexicon: HALOT
  rationale: En esta fórmula genealógica, la preposición ל señala parentela materna. En español, 'de Abital' comunica de manera concisa y natural la relación de procedencia/generación, sin sobreinterpretar el vínculo con una expresión más explicativa.
- source_word: הַשִּׁשִּׁי
  english_pob_choice: the sixth
  chosen_spanish: el sexto
  alternatives_spanish:
  - sexto
  lexicon: HALOT
  rationale: Se mantiene el paralelo con 'el quinto' y la misma función ordinal en la lista.
- source_word: יִתְרְעָם
  english_pob_choice: Ithream
  chosen_spanish: Itream
  alternatives_spanish:
  - Ithream
  - Yitream
  lexicon: Nombre propio
  rationale: Se usa una transliteración española transparente del nombre propio, evitando una traducción interpretativa.
- source_word: לְעֶגְלָה
  english_pob_choice: by Eglah
  chosen_spanish: de Eglá
  alternatives_spanish:
  - por Eglá
  - para Eglá
  - nacido de Eglá
  lexicon: HALOT
  rationale: Como en el miembro anterior, la preposición funciona genealógicamente. 'De Eglá' es la opción más natural en español para indicar maternidad/procedencia sin añadir glosa al texto principal.
- source_word: אִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - su esposa
  lexicon: HALOT
  rationale: En este contexto marital, 'su esposa' expresa con claridad el sentido normal de אִשָּׁה con sufijo. Se evita 'mujer' por posible ambigüedad en español.
theological_decisions:
- issue: Sentido genealógico de ל ('by/to/from') en 'de Abital' y 'de Eglá'
  english_pob_reading: '''by Abital'' / ''by Eglah'' preserves genealogical maternity without forcing a literal directional preposition.'
  chosen_spanish_reading: '''de Abital'' y ''de Eglá'' preservan la relación genealógica materna sin resolverla con una paráfrasis más larga.'
  alternative_spanish_readings:
  - '''por Abital'''
  - '''nacido de Abital'''
  - '''nacido de Eglá'''
  rationale: El hebreo permite una relación de parentela que en contexto genealógico puede expresarse idiomáticamente en español con 'de'. Esto conserva la tensión lexical sin borrar el matiz de procedencia materna que el POB inglés marcó con 'by'.
  doctrine_reference: Genealogía y sintaxis contextual; preservar la relación de parentela sin añadir datos no explicitados.
- issue: Referencia de 'su esposa' con Eglá
  english_pob_reading: Retain the straightforward genealogical note that Eglah was David's wife, without importing later interpretive identifications.
  chosen_spanish_reading: 'Se mantiene la nota genealógica directa: Eglá es llamada ''su esposa'', sin identificarla explícitamente con otra figura.'
  alternative_spanish_readings:
  - Identificar a Eglá con Mical
  - Tomar 'su esposa' como señal de estatus especial entre las esposas de David
  rationale: El texto hebreo solo appone Eglá con 'su esposa'; no explica por qué se la destaca ni confirma identificaciones posteriores. La traducción conserva esa sobriedad y no resuelve la ambigüedad del pasaje.
  doctrine_reference: Preservar la tensión interpretativa; no importar identidades posteriores no explícitas en el texto.
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del expediente en inglés, que reporta alta concordancia y ningún cambio adicional. No se introdujeron ajustes frente al audit trail inglés; la traducción española traslada la misma estructura genealógica y conserva la ambigüedad sobre Eglá sin ampliarla.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se conservaron nombres propios transliterados con ortografía española legible.
  - Se prefirió 'de' para la relación genealógica de ל, porque en español natural expresa procedencia/parentesco sin perder la nota de filiación.
  - Se evitó 'señora' o 'mujer' para אִשְׁתּוֹ por claridad marital y neutralidad léxica.
