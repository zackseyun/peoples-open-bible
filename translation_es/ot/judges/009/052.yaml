translation:
  language: es
  text: Abimelec llegó a la torre y combatió contra ella, y se acercó a la entrada de la torre para quemarla con fuego.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - se acercó
  - arribó
  lexicon: HALOT
  rationale: בוא expresa llegada/arribo; en este contexto de asedio, «llegó» comunica movimiento hacia el lugar sin añadir la imagen de ascenso que el texto hebreo no explicita aquí.
- source_word: הַמִּגְדָּל
  english_pob_choice: the tower
  chosen_spanish: la torre
  alternatives_spanish:
  - el torreón
  - la fortaleza
  lexicon: HALOT
  rationale: מִגְדָּל designa normalmente una torre. «La torre» es la correspondencia más directa y conserva la concreción arquitectónica del contexto.
- source_word: וַיִּלָּחֶם בּוֹ
  english_pob_choice: fought against it
  chosen_spanish: combatió contra ella
  alternatives_spanish:
  - peleó contra ella
  - luchó contra ella
  - atacó contra ella
  lexicon: HALOT
  rationale: לחם con ב indica combate/hostilidad dirigida contra el objeto. «Combatió contra ella» mantiene la fuerza bélica del hebreo y suena natural en español bíblico contemporáneo.
- source_word: וַיִּגַּשׁ
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - llegó cerca
  - arrimó
  - se aproximó
  lexicon: HALOT
  rationale: נגש significa acercarse/draw near. «Se acercó» refleja el movimiento progresivo hacia la entrada sin sobretraducción.
- source_word: פֶּתַח
  english_pob_choice: the entrance
  chosen_spanish: la entrada
  alternatives_spanish:
  - el acceso
  - la puerta
  - el umbral
  lexicon: HALOT
  rationale: פֶּתַח puede ser abertura o entrada. «La entrada» es la opción más amplia y fiel para un torreón, sin imponer la idea de una puerta específica.
- source_word: לְשָׂרְפוֹ
  english_pob_choice: to burn it
  chosen_spanish: prenderla fuego
  alternatives_spanish:
  - quemarla
  - incendiarla
  - ponerla en fuego
  lexicon: HALOT
  rationale: שׂרף con sufijo indica el intento de quemar la estructura. «Prenderla fuego» comunica con naturalidad la intención de incendiarla; evita una calca dura como «quemarla» si pudiera sonar demasiado genérica, y conserva el matiz de acción deliberada.
- source_word: בָאֵשׁ
  english_pob_choice: with fire
  chosen_spanish: fuego
  alternatives_spanish:
  - con fuego
  - en fuego
  lexicon: HALOT
  rationale: El ב instrumental expresa el medio. En español, el giro verbal «prenderla fuego» ya incorpora ese medio; por eso no se repite explícitamente «con fuego» en la superficie, aunque el sentido instrumental queda contenido.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimelec
  alternatives_spanish:
  - Abimeleq
  - Abimelech
  lexicon: conventional transliteration
  rationale: Se usa la transliteración castellana habitual «Abimelec» para el nombre propio.
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que ajustó «came up to» a «came to» para evitar una inferencia no explícita del hebreo. La versión española sigue esa línea y evita añadir una noción de ascenso; por eso usa «llegó» en vez de «subió» o «llegó arriba».
  spanish_consistency_notes:
  - Se mantuvo el nombre propio como «Abimelec», forma usual en español bíblico.
  - 'Se preservó la secuencia narrativa de tres movimientos: llegada, combate, acercamiento para incendiar.'
  - «La entrada» conserva la ambigüedad del hebreo פֶּתַח sin especificar una puerta física.
  - No se usó «SEÑOR» ni terminología teológica especial porque este versículo no contiene vocabulario divino.
