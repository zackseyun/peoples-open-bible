revisions:
- from: Entonces el límite se extendió hacia el occidente hasta Michmetat[a], al norte, y el límite dio vuelta hacia el oriente a Taanat-Silo, y la pasó al oriente hasta Janoa.
  to: Entonces el límite se extendió hacia el occidente[a] hasta Michmetat, al norte, y el límite giró hacia el oriente a Taanat-Silo, y pasó por ella al oriente hasta Janoa.
  rationale: 'Se conserva el sentido del hebreo y del POB inglés, pero se corrigen dos detalles: se mueve la nota al término que realmente explica el idiomatismo hebreo, y se reemplaza ''la pasó'' por ''pasó por ella'', que suena natural en español y sigue expresando que el límite continuó más allá de Taanat-Silo. También se cambia ''dio vuelta'' por ''giró'' para mayor fluidez.'
