  yaml_path: translation/ot/isaiah/002/003.yaml
  text: And many peoples will come and say[a], “Come, let us go up to the mountain of Yahweh, to the house of the God of Jacob, that he may teach us his ways and that we may walk in his paths.” For instruction will go out from Zion[b], and the word of Yahweh from Jerusalem.
  footnotes:
  - marker: a
    text: Or 'will go' or 'will walk'; the Hebrew verb is literally 'go/walk,' but here it describes peoples moving toward Zion.
    reason: lexical_alternative
  - marker: b
    text: '''Instruction'' translates Hebrew torah, which can also be rendered ''law'' or ''teaching.'''
    reason: lexical_alternative
