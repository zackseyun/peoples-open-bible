translation:
  language: es
  text: 'Entonces Yahvé[a] dijo a Moisés: «Levántate temprano por la mañana y preséntate delante de Faraón, y dile: “Así dice Yahvé, el Dios de los hebreos: Deja ir a mi pueblo, para que me sirvan[b]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nombre propio del Dios del pacto; se traduce aquí como transliteración del Tetragrámaton, no como título sustitutivo.
    reason: source_note
  - marker: b
    text: O «para que me adoren». El verbo hebreo puede denotar servicio rendido a Dios, incluida la adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio, no un título sustitutivo. En español, 'Yahvé' es la forma coherente con la política del POB de transliterar el Tetragrámaton, manteniendo la referencia al nombre del pacto.
- source_word: הַשְׁכֵּם
  english_pob_choice: Rise early
  chosen_spanish: Levántate temprano
  alternatives_spanish:
  - Levántate de madrugada
  - Levántate temprano por la mañana
  lexicon: HALOT
  rationale: El hebreo expresa la acción de levantarse temprano; 'Levántate temprano' comunica la urgencia sin sonar forzado. Se integra naturalmente con la frase temporal siguiente.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - temprano por la mañana
  lexicon: HALOT
  rationale: La referencia temporal se expresa de manera idiomática en español con 'por la mañana'. La idea de 'temprano' ya está dada por el verbo hebreo.
- source_word: וְהִתְיַצֵּב לִפְנֵי
  english_pob_choice: and present yourself before
  chosen_spanish: preséntate delante de
  alternatives_spanish:
  - preséntate ante
  - ponte delante de
  lexicon: HALOT
  rationale: '''הִתְיַצֵּב'' implica ponerse en posición o presentarse formalmente; ''preséntate delante de'' conserva el matiz cortesano y es claro en español.'
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: Es la fórmula profética estándar; 'Así dice' reproduce bien su solemnidad y fuerza declarativa en español.
- source_word: אֱלֹהֵי הָעִבְרִים
  english_pob_choice: the God of the Hebrews
  chosen_spanish: el Dios de los hebreos
  alternatives_spanish:
  - el Dios de los hebreos
  - Dios de los hebreos
  lexicon: HALOT
  rationale: La cadena constructa se vierte de modo directo y natural. Se conserva el artículo en español para la fluidez normal de la construcción nominal.
- source_word: שַׁלַּח
  english_pob_choice: Let ... go
  chosen_spanish: Deja ir
  alternatives_spanish:
  - Suéltalo
  - Despide
  lexicon: HALOT
  rationale: En este contexto de Éxodo, el imperativo debe sonar natural y fiel al sentido de liberar/release. 'Deja ir' preserva la idiomaticidad de la fórmula bíblica sin estrechar el verbo a un solo matiz.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi pueblo
  - mi gente
  lexicon: HALOT
  rationale: Se mantiene la posesión divina y el carácter colectivo del sustantivo. 'Pueblo' es la forma más estable y bíblicamente adecuada en español.
- source_word: וְיַעַבְדֻנִי
  english_pob_choice: so that they may serve me
  chosen_spanish: para que me sirva
  alternatives_spanish:
  - para que me sirvan
  - para que me adoren
  lexicon: HALOT
  rationale: Se conserva el campo semántico amplio de עבד como servicio a Dios, no reducido a adoración litúrgica. En español, el singular colectivo 'mi pueblo' permite 'me sirva' como un resultado/finalidad natural; la nota documenta la alternativa plural y la posible lectura de adoración.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La política del POB es no enmascarar el Tetragrámaton con un título. 'Yahvé' preserva el nombre propio de Dios en una forma reconocible y consistente para el lector hispanohablante.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de וְיַעַבְדֻנִי
  english_pob_reading: so that they may serve me
  chosen_spanish_reading: para que me sirva
  alternative_spanish_readings:
  - para que me sirvan
  - para que me adoren
  rationale: El verbo עבד en este contexto incluye servicio rendido a Dios, con posible dimensión cultual, pero no debe reducirse a 'adorar'. 'Servir' conserva la amplitud del término y el énfasis del relato del Éxodo en la liberación para el servicio de Yahvé.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: La comparación con la auditoría inglesa muestra acuerdo alto y sin revisiones aplicadas en la última pasada. La versión española sigue la misma lectura base, trasladando al español el nombre divino, la fórmula profética y la finalidad de עבד sin estrecharla a 'adoración'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma regular del nombre divino, coherente con el proyecto.
  - '''Faraón'' se conserva como nombre propio tradicional y legible en español.'
  - La fórmula profética 'Así dice Yahvé' se conserva sin variación estilística para continuidad intertextual.
  - '''Mi pueblo'' se usa para reflejar עַמִּי; no se reemplaza por ''mi gente''.'
  - La finalidad de 'me sirva' queda anclada por la nota alternativa para no perder la amplitud semántica de עבד.
