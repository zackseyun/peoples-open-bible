translation:
  language: es
  text: 'Desde lejos[a] Yahvé se me apareció: «Con amor eterno te he amado; por eso te he atraído con amor fiel[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «Yahvé se apareció a él desde lejos», según se tome «desde lejos» con el verbo y/o se entienda de otro modo el pronombre en el contexto.
    reason: alternative_reading
  - marker: b
    text: «Amor fiel» traduce el hebreo חֶסֶד, un término que con frecuencia se asocia con amor leal y de pacto; alternativamente, «amor constante», «fidelidad del pacto» o «misericordia amorosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵרָחוֹק
  english_pob_choice: From far away
  chosen_spanish: Desde lejos
  alternatives_spanish:
  - Desde afar
  - A distancia
  lexicon: HALOT
  rationale: La preposición מִן con רָחוֹק indica distancia espacial. En español, «desde lejos» comunica la imagen de manera natural y fiel, sin arcaísmo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», de acuerdo con el criterio del proyecto para distinguir el nombre propio de un título sustitutivo.
- source_word: נִרְאָה לִי
  english_pob_choice: appeared to me
  chosen_spanish: se apareció a mí
  alternatives_spanish:
  - me apareció
  - fue visto por mí
  lexicon: HALOT
  rationale: El nifal de ראה puede significar «aparecer / ser visto». «Se apareció a mí» refleja el sentido idiomático en español y mantiene la ambigüedad pasiva/medio-pasiva del hebreo.
- source_word: וְאַהֲבַת עוֹלָם
  english_pob_choice: with an everlasting love
  chosen_spanish: Con amor eterno
  alternatives_spanish:
  - Con amor perpetuo
  - Con amor de eternidad
  lexicon: HALOT
  rationale: La construcción expresa un amor de duración ilimitada. «Amor eterno» conserva el peso del constructo y resulta natural en español bíblico contemporáneo.
- source_word: אֲהַבְתִּיךְ
  english_pob_choice: I have loved you
  chosen_spanish: te he amado
  alternatives_spanish:
  - te amé
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte mejor con presente perfecto en español para expresar una acción pasada con vigencia actual.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - por consiguiente
  lexicon: HALOT
  rationale: La partícula inferencial introduce consecuencia. «Por eso» es claro y idiomático en español, preservando la relación lógica con lo anterior.
- source_word: מְשַׁכְתִּיךְ
  english_pob_choice: I have drawn you
  chosen_spanish: te he atraído
  alternatives_spanish:
  - te he jalado
  - te he arrastrado
  - te he atraído hacia mí
  lexicon: HALOT
  rationale: משך significa «tirar / atraer / arrastrar». En este contexto, «atraído» comunica bien el movimiento hacia Dios sin forzar una imagen física demasiado literal.
- source_word: חָסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor leal
  alternatives_spanish:
  - amor firme
  - amor constante
  - misericordia
  lexicon: HALOT
  rationale: חֶסֶד es amor leal, de pacto, con matiz de fidelidad comprometida. «Amor leal» preserva esa carga relacional y evita reducir el término a mera benevolencia.
theological_decisions:
- issue: Distinción entre אַהֲבָה y חֶסֶד
  english_pob_reading: 'Render both terms with distinct but related expressions: ''love'' and ''steadfast love.'''
  chosen_spanish_reading: Distinguir entre «amor eterno» y «amor leal».
  alternative_spanish_readings:
  - Usar «amor» para ambos términos
  - Traducir חֶסֶד como «fidelidad del pacto»
  rationale: El hebreo usa dos términos relacionados pero no idénticos. Mantener una distinción en español conserva el relieve retórico y teológico del verso.
  doctrine_reference: Translation philosophy §§3, 5
- issue: Tiempo verbal de los perfectos
  english_pob_reading: Use English present-perfect forms ('have loved,' 'have drawn')
  chosen_spanish_reading: Usar pretéritos perfectos compuestos («he amado», «he atraído»)
  alternative_spanish_readings:
  - Pretérito simple («amé», «atraje»)
  rationale: En español, el perfecto compuesto expresa mejor una acción pasada con efecto vigente en el presente del discurso profético.
  doctrine_reference: Translation philosophy §6
- issue: Sentido relacional de חֶסֶד
  english_pob_reading: '''Steadfast love'' translates Hebrew חֶסֶד, a term often associated with loyal, covenantal love'
  chosen_spanish_reading: «amor leal» como término relacional y de pacto
  alternative_spanish_readings:
  - «misericordia»
  - «fidelidad del pacto»
  rationale: «Amor leal» preserva tanto la dimensión afectiva como la de compromiso fiel, sin desviar el término hacia una sola esfera semántica.
  doctrine_reference: Translation philosophy §§3, 5
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando en el texto los marcadores de nota [a] y [b], que ahora aparecen exactamente junto a las expresiones correspondientes. La redacción mantiene la lectura principal del hebreo y conserva la ambigüedad reconocida por el audita en una nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה de forma consistente con los criterios del proyecto.
  - Se mantiene la distinción entre «amor eterno» y «amor leal» para reflejar אַהֲבָה y חֶסֶד.
  - El orden de cláusulas sigue el hebreo y conserva la relación causal con «por eso».
  - Los perfectos compuestos «he amado» y «he atraído» reflejan la fuerza aspectual del original.
