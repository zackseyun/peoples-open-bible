  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: prohibición de odiar internamente, mandato enfático de reprender, y advertencia sobre incurrir en pecado por causa del otro. Conserva adecuadamente «hermano», «corazón» y «prójimo». Sin embargo, «no cargarás sobre él pecado» suena en español como imputarle pecado a él, lo cual desalinearía el sentido idiomático documentado por el POB («bear sin because of him / incur guilt on his account»).'
  spanish_quality_summary: El español es claro y digno en casi todo el versículo. «Reprenderás ciertamente» es comprensible, aunque algo rígido; aun así es aceptable para reflejar el énfasis hebreo. El problema principal de legibilidad y sentido está en «cargarás sobre él pecado», que en español resulta poco natural y potencialmente equívoco. Conviene una formulación que preserve la causalidad sin sugerir transferencia de culpa al prójimo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hermano» y «prójimo» siguen bien la rationale auditada. La decisión sobre נשׂא חטא debe ajustarse para respetar la explicación léxica inglesa y evitar un calco no idiomático en español.
  issues:
