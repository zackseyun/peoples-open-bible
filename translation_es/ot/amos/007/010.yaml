translation:
  language: es
  text: 'Entonces Amasías[a], el sacerdote de Betel, envió mensaje a Jeroboam, rey de Israel, diciendo: «Amós ha conspirado[b] contra ti en medio de la casa de Israel[c]; la tierra no puede soportar[d] todas sus palabras»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha tramado contra ti». El verbo hebreo puede expresar conspiración o intriga, especialmente en contextos políticos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «entre la casa de Israel».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la tierra no puede contener o soportar todas sus palabras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent word
  chosen_spanish: envió mensaje
  alternatives_spanish:
  - envió
  - mandó decir
  lexicon: HALOT
  rationale: El hebreo expresa una acción de enviar con contenido comunicativo introducido por לֵאמֹר. «Envió mensaje» mantiene el acto de comunicación sin añadir elementos ajenos ni sonar forzado en español.
- source_word: כֹּהֵן בֵּית אֵל
  english_pob_choice: the priest of Bethel
  chosen_spanish: el sacerdote de Betel
  alternatives_spanish:
  - el sacerdote en Betel
  - el sacerdote de Beth-el
  lexicon: HALOT
  rationale: La construcción en hebreo identifica oficio y lugar cultual. «De Betel» es la forma natural en español y conserva la asociación institucional.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: Fórmula estándar de introducción del discurso directo; «diciendo» conserva el enlace del reporte sin sobretraducir.
- source_word: קָשַׁר
  english_pob_choice: has conspired
  chosen_spanish: se ha conspirado
  alternatives_spanish:
  - ha conspirado
  - ha tramado
  lexicon: HALOT
  rationale: Se conserva el valor de acusación política del verbo. La forma reflexiva en español evita atribuir como hecho narrativo algo que en el contexto es la denuncia hostil de Amasías al rey.
- source_word: עָלֶיךָ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - en tu contra
  - contra tu persona
  lexicon: HALOT
  rationale: Con קָשַׁר, עַל marca el blanco de la supuesta conspiración. «Contra ti» es la equivalencia idiomática más directa.
- source_word: בְּקֶרֶב
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - dentro de
  lexicon: HALOT
  rationale: «En medio de» preserva la idea espacial/social de estar en el centro del ámbito de Israel, como en el audit trail inglés.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - el pueblo de Israel
  - Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión covenantal/nacional sin rebajarla a un simple «Israel»; «casa de Israel» refleja la formulación profética.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: En este contexto la referencia más natural es el territorio/patria de Israel. «La tierra» respeta el término hebreo y su carga política.
- source_word: לְהָכִיל
  english_pob_choice: to bear
  chosen_spanish: soportar
  alternatives_spanish:
  - contener
  - aguantar
  - sostener
  lexicon: HALOT
  rationale: El hebreo puede expresar contener o resistir. Aquí el sentido es de tolerar/soportar la carga verbal, y «soportar» reproduce bien esa fuerza en español.
- source_word: כָּל דְּבָרָיו
  english_pob_choice: all his words
  chosen_spanish: todas sus palabras
  alternatives_spanish:
  - todo lo que dice
  - todos sus dichos
  lexicon: HALOT
  rationale: Se preserva la pluralidad hebrea y el totalizador «todo(s)». «Palabras» es fiel y fluido en español.
theological_decisions:
- issue: Naturaleza de la acusación de Amasías contra Amós
  english_pob_reading: The verse reports Amaziah's hostile characterization of Amos before the king, not the narrator's endorsement that Amos truly engaged in treason.
  chosen_spanish_reading: El versículo presenta la denuncia de Amasías ante el rey, no una afirmación narrativa de que Amós realmente haya cometido traición.
  alternative_spanish_readings:
  - Amós ha conspirado contra ti
  - Amós está conspirando contra ti
  rationale: Se conserva la tensión política del hebreo sin resolverla a favor de la acusación. La traducción debe reflejar que se trata de un reporte hostil, no de un juicio narrativo.
  doctrine_reference: Preservar la tensión textual y la distinción entre denuncia e ისტორical factualidad narrativa.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no introdujo cambios: se mantuvo la solución óptima equivalente, con agreement total en el control cruzado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; este versículo no contiene el nombre divino.
  - Se mantiene «Mesías/Cristo» fuera de este pasaje; no aplica aquí.
  - «Casa de Israel» conserva la fórmula profética; no se reduce a «Israel» salvo cuando el contexto lo autoriza.
  - La acusación política se deja como denuncia de Amasías sin convertirla en hecho narrativo confirmado.
