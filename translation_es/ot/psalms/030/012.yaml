  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. «Cilicio» preserva bien שַׂק. «Alegría» para שִׂמְחָה es adecuado. La elección «me ceñiste de alegría» preserva correctamente la metáfora documentada en el audit trail; la alternativa española debe anotarse sobre ese verbo, no sobre «danza».
