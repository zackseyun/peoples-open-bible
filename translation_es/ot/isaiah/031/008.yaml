base_translation:
  language: en
  yaml_path: translation/ot/isaiah/031/008.yaml
  text: And Assyria will fall by a sword not of man[a], and a sword not of humankind will devour him; and he will flee from before the sword[d][c][b], and his young men will become forced labor.
  footnotes:
  - marker: a
    text: Or 'and a sword not of man.' The Hebrew contrasts אִישׁ ('man') and אָדָם ('humankind/man') in parallel.
    reason: lexical_alternative
  - marker: b
    text: That is, by a sword not wielded by human power; the text leaves the exact means of the LORD's judgment unspecified.
    reason: alternative_reading
  - marker: c
    text: Or 'his chosen men'; the Hebrew term can refer to young men in their prime, often in a military setting.
    reason: lexical_alternative
  - marker: d
    text: Or 'will be put to corvée/tribute labor.'
    reason: lexical_alternative
