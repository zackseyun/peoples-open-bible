lexical_decisions:
- source_word: אַנְשֵׁי
  english_pob_choice: the men of
  chosen_spanish: los hombres de
  alternatives_spanish:
  - la gente de
  - los habitantes de
  lexicon: HALOT
  rationale: En este registro censal, el constructo plural de אִישׁ señala a los varones o representantes masculinos asociados con el lugar. 'Los hombres de' conserva ese valor de lista/censo y evita diluirlo con una expresión más general.
- source_word: מִכְמָס
  english_pob_choice: Mikmas
  chosen_spanish: Mikmas
  alternatives_spanish:
  - Michmas
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se translitera al español como 'Mikmas', manteniendo cercanía con la forma hebrea. 'Michmas' queda como alternativa tradicional conocida.
- source_word: מֵאָה עֶשְׂרִים וּשְׁנָיִם
  english_pob_choice: one hundred twenty-two
  chosen_spanish: ciento veintidós
  alternatives_spanish:
  - cien veintidós
  - ciento veintidós
  lexicon: HALOT
  rationale: 'La secuencia numérica hebrea es aditiva y directa: 100 + 20 + 2. En español, ''ciento veintidós'' es natural, claro y fiel al valor exacto del número.'
