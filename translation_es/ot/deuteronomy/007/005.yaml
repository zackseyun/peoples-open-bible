revisions:
- from: 'Pero esto es lo que ustedes harán con ellos: derribarán sus altares[a], quebrarán sus columnas, cortarán sus Aseras[b] y quemarán sus imágenes talladas[c] en el fuego.'
  to: 'Pero esto es lo que ustedes harán con ellos: derribarán sus altares, quebrarán sus pilares[a], cortarán sus postes de Asera[b] y quemarán sus imágenes talladas[c] en el fuego.'
  rationale: Se corrige el anclaje de la nota léxica para que corresponda al término hebreo correcto («pilares»), se ajusta אֲשֵׁרִים a «postes de Asera» para seguir la decisión documentada del POB y mejorar la claridad en español, y se armoniza «pilares» con la nota existente y el contexto cultual.
