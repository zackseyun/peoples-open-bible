translation:
  language: es
  text: 'Di a la casa de Israel: «Así dice el Señor Yahvé: He aquí, voy a profanar[a] mi santuario, el orgullo de su fuerza, el deleite[b] de sus ojos y el anhelo[c] de su alma; y sus hijos y sus hijas, a quienes dejaron atrás, caerán a espada».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contaminar» o «desecrar» mi santuario.
    reason: lexical_alternative
  - marker: b
    text: O «el deseo de sus ojos» por «el deleite de sus ojos».
    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea también puede entenderse como «aquello que su alma compadece o aprecia con ternura».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  english_pob_choice: Say
  chosen_spanish: Di
  alternatives_spanish:
  - Habla
  - Dile
  lexicon: HALOT
  rationale: La forma imperativa singular se dirige a Ezequiel para introducir el mensaje profético. En español, «Di» reproduce con naturalidad la fórmula profética sin añadir explicación extra.
- source_word: לְבֵית יִשְׂרָאֵל
  english_pob_choice: to the house of Israel
  chosen_spanish: al casa de Israel
  alternatives_spanish:
  - a la casa de Israel
  - a Israel
  lexicon: HALOT
  rationale: Se preserva la expresión colectiva y pactal «casa de Israel» en lugar de reducirla a «Israel». Mantiene el matiz de comunidad nacional y religiosa.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  english_pob_choice: Thus says the Lord GOD
  chosen_spanish: Así dice el Señor Yahvé
  alternatives_spanish:
  - Así dice el Señor Dios
  - Así dice el Señor Yahweh
  lexicon: HALOT
  rationale: Se conserva la fórmula profética y se vierte el nombre divino como «Yahvé» según la norma del proyecto, en vez de ocultarlo con «SEÑOR». «Señor Yahvé» refleja la combinación de אֲדֹנָי + יְהוִה sin perder claridad en español.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am about to
  chosen_spanish: He aquí, voy a
  alternatives_spanish:
  - Miren, voy a
  - He aquí, estoy por
  lexicon: HALOT
  rationale: La partícula introduce una autoafirmación solemne e inminente. «He aquí, voy a» transmite bien la cercanía de la acción anunciada en español contemporáneo.
- source_word: מְחַלֵּל
  english_pob_choice: profane
  chosen_spanish: profanar
  alternatives_spanish:
  - contaminar
  - desecrar
  lexicon: HALOT
  rationale: «Profanar» conserva el sentido cultual y teológico de tratar lo santo como común. Es la mejor equivalencia para el acto verbal del hebreo en este contexto.
- source_word: מִקְדָּשִׁי
  english_pob_choice: my sanctuary
  chosen_spanish: mi santuario
  alternatives_spanish:
  - mi lugar santo
  - mi templo
  lexicon: HALOT
  rationale: «Santuario» es preciso y más amplio que «templo», aunque el templo de Jerusalén esté implícito. Mantiene el valor de espacio sagrado.
- source_word: גְּאוֹן עֻזְּכֶם
  english_pob_choice: the pride of your strength
  chosen_spanish: el orgullo de vuestra fuerza
  alternatives_spanish:
  - la gloria de vuestro poder
  - el orgullo de vuestro vigor
  lexicon: HALOT
  rationale: Se conserva la relación constructa del hebreo sin suavizarla. «Orgullo de vuestra fuerza» comunica la idea de aquello en lo que confiaban con soberbia.
- source_word: מַחְמַד עֵינֵיכֶם
  english_pob_choice: the delight of your eyes
  chosen_spanish: el deleite de vuestros ojos
  alternatives_spanish:
  - el deseo de vuestros ojos
  - la cosa preciosa de vuestros ojos
  lexicon: HALOT
  rationale: «Deleite» reproduce el valor afectivo y estético del término y mantiene la resonancia con el paralelismo del contexto. Es una equivalencia fiel e idiomática.
- source_word: וּמַחְמַל נַפְשְׁכֶם
  english_pob_choice: the desire of your soul
  chosen_spanish: el anhelo de vuestra alma
  alternatives_spanish:
  - lo que vuestra alma compadece
  - la ternura de vuestra alma
  - el deseo de vuestra alma
  lexicon: HALOT
  rationale: El sustantivo tiene un matiz difícil entre deseo, compasión y aprecio entrañable. «Anhelo de vuestra alma» conserva la fuerza afectiva sin borrar la tensión semántica documentada.
- source_word: וּבְנֵיכֶם וּבְנוֹתֵיכֶם
  english_pob_choice: your sons and your daughters
  chosen_spanish: vuestros hijos y vuestras hijas
  alternatives_spanish:
  - vuestros hijos e hijas
  - vuestra descendencia
  lexicon: HALOT
  rationale: Se preserva el par explícito masculino/femenino del hebreo en vez de generalizar a «hijos». En español, «hijos e hijas» o «vuestros hijos y vuestras hijas» mantiene esa precisión.
- source_word: אֲשֶׁר עֲזַבְתֶּם
  english_pob_choice: whom you left behind
  chosen_spanish: a quienes dejasteis
  alternatives_spanish:
  - a quienes dejasteis atrás
  - a quienes abandonasteis
  lexicon: HALOT
  rationale: «Dejasteis» es fiel al verbo básico y evita cargar el texto con una interpretación más fuerte de la que exige el hebreo. El contexto de guerra ya aclara que fueron dejados en la ciudad.
- source_word: בַּחֶרֶב יִפֹּלוּ
  english_pob_choice: will fall by the sword
  chosen_spanish: caerán a espada
  alternatives_spanish:
  - caerán por la espada
  - morirán a espada
  lexicon: HALOT
  rationale: Se conserva el idiomatismo bíblico de muerte violenta en combate. «Caerán a espada» es natural en español bíblico y mantiene la concisión del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוִה en la fórmula profética
  english_pob_reading: the Lord GOD / Yahweh
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Yahvé
  rationale: El texto hebreo incluye el Tetragrámaton y, según la norma del proyecto, debe aparecer como «Yahvé» en el texto principal. Al ir precedido por אֲדֹנָי, la combinación española natural es «Señor Yahvé», que preserva la relación reverencial sin ocultar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Ambigüedad de מַחְמַל נַפְשְׁכֶם
  english_pob_reading: the desire of your soul; possible sense of what your soul pities/cherishes
  chosen_spanish_reading: el anhelo de vuestra alma
  alternative_spanish_readings:
  - lo que vuestra alma compadece
  - lo que vuestra alma aprecia con ternura
  - el deseo de vuestra alma
  rationale: La palabra hebrea admite un campo semántico más amplio que un simple «deseo». «Anhelo» deja espacio a la idea de afecto, apego y aprecio entrañable sin cerrar indebidamente el sentido, y evita borrar la tensión lexical documentada.
  doctrine_reference: HALOT / fuente hebrea; nota auditada de POB sobre alternativas semánticas
translation_notes:
  revision_awareness: 'Se ha tenido en cuenta el audit trail inglés y la revisión más reciente, que indica alta concordancia y ausencia de cambios necesarios. Esta versión conserva las decisiones nucleares: fórmula profética, nombre divino como Yahvé, santuario, paralelismo de «orgullo/deleite/anhelo» y la muerte «a espada».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en el texto principal conforme a la norma del proyecto.
  - Se evitó «Cristo» y otras equivalencias no pertinentes.
  - Se conservó la estructura paralela del hebreo sin expandirla innecesariamente.
  - No se añadieron notas al pie porque las alternativas léxicas relevantes quedaron documentadas en los campos de decisiones léxicas y teológicas.
