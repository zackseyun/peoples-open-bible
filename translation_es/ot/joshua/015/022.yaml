lexical_decisions:
- source_word: קִינָה
  english_pob_choice: Kinah
  chosen_spanish: Kináh
  alternatives_spanish:
  - Qináh
  - Kiná
  lexicon: HALOT
  rationale: Es un nombre propio de lugar en una lista de ciudades; por eso se translitera, no se traduce. Se mantiene la forma cercana al auditable inglés POB, pero ajustada a la ortografía española con acento gráfico para indicar la sílaba tónica final en lectura pública.
- source_word: דִּימוֹנָה
  english_pob_choice: Dimonah
  chosen_spanish: Dimoná
  alternatives_spanish:
  - Dimona
  - Dimonah
  lexicon: HALOT
  rationale: Nombre propio de lugar; se conserva la transliteración. La terminación hebrea se refleja de manera legible en español con -á, manteniendo la pronunciación aproximada y evitando una forma demasiado anglicada.
- source_word: עַדְעָדָה
  english_pob_choice: Adadah
  chosen_spanish: Adadá
  alternatives_spanish:
  - Adadah
  lexicon: HALOT
  rationale: Nombre propio en la lista de asentamientos de Judá; la transliteración es la solución fiel. El acento final ayuda a la lectura en español sin alterar la base consonántica del nombre.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción simple enlaza una lista de topónimos. En español, 'y' es la equivalencia natural; 'e' no es necesaria porque las siguientes palabras no comienzan con sonido /i/.
translation_notes:
  revision_awareness: 'El testimonio inglés POB no requirió cambios de sentido respecto del hebreo; solo documenta variación transliterativa en dos de los topónimos. Esta versión española sigue el mismo criterio: lista de nombres propios, sin añadir ni omitir elementos.'
  spanish_consistency_notes:
  - Se preserva la secuencia simple de tres topónimos unida por conjunción, en paralelo al hebreo.
  - Se evita introducir un artículo o verbo que el texto no contiene.
  - La solución mantiene consistencia con el criterio POB de transliterar nombres de lugar en vez de traducirlos.
