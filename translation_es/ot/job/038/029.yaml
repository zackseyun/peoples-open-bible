translation:
  language: es
  text: ¿Del vientre de quién salió el hielo, y quién dio a luz la escarcha[a] del cielo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la escarcha blanca del cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֶּטֶן
  english_pob_choice: From whose womb
  chosen_spanish: Del vientre de quién
  alternatives_spanish:
  - ¿De qué vientre?
  - ¿Del vientre de quién salió?
  lexicon: HALOT
  rationale: בֶּטֶן denota literalmente “vientre” y, en este contexto poético, sostiene la imagen de nacimiento. En español, “vientre” conserva esa metáfora mejor que “útero” y evita un tono técnico innecesario.
- source_word: מִי
  english_pob_choice: whose / who
  chosen_spanish: de quién / quién
  alternatives_spanish:
  - ¿quién?
  - ¿de qué?
  lexicon: HALOT
  rationale: El hebreo usa una interrogación personal sobre el origen. En español, “de quién” funciona naturalmente con “vientre”, y “quién” con el segundo hemistiquio, manteniendo el paralelismo interrogativo.
- source_word: יָצָא
  english_pob_choice: did ... come forth
  chosen_spanish: salió
  alternatives_spanish:
  - salió a la luz
  - vino
  - brotó
  lexicon: HALOT
  rationale: יצא significa “salir, salir de”. “Salió” es la forma más directa y natural en español, sin perder la imagen de procedencia. El matiz poético del movimiento queda implícito por el contexto.
- source_word: הַקָּרַח
  english_pob_choice: the ice
  chosen_spanish: el hielo
  alternatives_spanish:
  - el granizo helado
  - el hielo
  lexicon: HALOT
  rationale: קֶרַח significa “hielo”. “El hielo” es la equivalencia normal en español y conserva la referencia concreta del texto. Se evita una lectura interpretativa que diluya el sustantivo.
- source_word: וּכְפֹר שָׁמַיִם
  english_pob_choice: and the frost of heaven
  chosen_spanish: y la escarcha del cielo
  alternatives_spanish:
  - y la escarcha de los cielos
  - y el rocío helado del cielo
  lexicon: HALOT
  rationale: כְּפוֹר es “escarcha” o “helada fina”; en español “escarcha” refleja bien el fenómeno. שָׁמַיִם puede ser “cielo” o “cielos”; aquí “cielo” suena más natural y todavía conserva el ámbito cósmico elevado del hebreo.
- source_word: שָׁמַיִם
  english_pob_choice: heaven
  chosen_spanish: cielo
  alternatives_spanish:
  - cielos
  - firmamento
  lexicon: HALOT
  rationale: Aunque שָׁמַיִם puede traducirse “cielos”, en esta construcción poética singular “cielo” fluye mejor en español. No se pierde la altura metafórica ni el alcance cósmico de la pregunta.
- source_word: יְלָדוֹ
  english_pob_choice: gave birth to
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: ילד en qal expresa “dar a luz, parir”. “Dio a luz” mantiene la metáfora maternal explícita y es comprensible en español moderno; “parió” sería más abrupto y “engendró” desplaza el matiz hacia paternidad.
translation_notes:
  revision_awareness: 'El contexto de revisión muestra alto acuerdo y ningún cambio aplicado; esta versión conserva la misma lectura básica del hebreo: dos preguntas poéticas paralelas sobre el origen del hielo y de la escarcha del cielo.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo interrogativo con dos miembros coordinados por coma y “y”, como en el hebreo.
  - Se preservó la metáfora de nacimiento con “vientre” y “dio a luz” sin suavizarla ni espiritualizarla.
  - Se eligió “cielo” por fluidez española; la nota ofrece una alternativa léxica que refleja la posibilidad de entender כְּפוֹר como “escarcha blanca” (equivalente al inglés “hoarfrost”).
