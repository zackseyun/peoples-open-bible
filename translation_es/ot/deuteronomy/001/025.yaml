revisions:
- from: 'Y tomaron en sus manos algo del fruto de la tierra, y nos lo trajeron[a], y nos dieron informe, y dijeron: «La tierra que Yahvé nuestro Dios nos da es buena».'
  to: 'Y tomaron en sus manos parte del fruto de la tierra, y nos lo bajaron, y nos dieron noticia[a], y dijeron: «La tierra que Yahvé nuestro Dios nos da es buena».'
  rationale: Se revisa para conservar el matiz direccional de וַיּוֹרִדוּ con «nos lo bajaron», sustituir el menos idiomático «nos dieron informe» por «nos dieron noticia», y afinar el partitivo con «parte del fruto de la tierra». La frase resultante sigue siendo natural en español y más fiel al hebreo y al audit trail inglés.
