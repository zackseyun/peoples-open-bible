translation:
  language: es
  text: Tus labios destilan miel de panal[a], novia; miel y leche hay debajo de tu lengua[b], y el aroma de tus vestidos es como el aroma del Líbano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «panal de miel»; נֹפֶת es más específico que la palabra hebrea posterior para «miel».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «miel y leche», no la expresión más familiar «leche y miel».
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹפֶת
  english_pob_choice: honeycomb
  chosen_spanish: miel de panal
  alternatives_spanish:
  - panal de miel
  - miel
  - comb honey
  lexicon: HALOT
  rationale: El hebreo נֹפֶת distingue este término de דְּבַשׁ más adelante; en español, "miel de panal" conserva la imagen concreta y evita perder esa distinción léxica.
- source_word: תִּטֹּפְנָה
  english_pob_choice: drip
  chosen_spanish: destilan
  alternatives_spanish:
  - gotean
  - derraman
  - destilan
  lexicon: HALOT
  rationale: El verbo expresa una acción de caer en gotas o fluir; "destilan" mantiene la imagen poética en un español natural y elevado.
- source_word: שִׂפְתוֹתַיִךְ
  english_pob_choice: your lips
  chosen_spanish: tus labios
  alternatives_spanish:
  - tus labios
  lexicon: HALOT
  rationale: Corresponde directamente al plural con sufijo de 2ª fem. sing.; "labios" es la equivalencia normal y clara en español.
- source_word: כַּלָּה
  english_pob_choice: bride
  chosen_spanish: novia
  alternatives_spanish:
  - esposa
  - novia
  lexicon: HALOT
  rationale: En el Cantar funciona como vocativo afectivo dentro de la imaginería nupcial. "Novia" suena natural en español contemporáneo y conserva el tono de enamoramiento; se evita endurecerlo como un título eclesiástico o litúrgico.
- source_word: דְּבַשׁ וְחָלָב
  english_pob_choice: honey and milk
  chosen_spanish: miel y leche
  alternatives_spanish:
  - leche y miel
  lexicon: HALOT
  rationale: Se preserva el orden hebreo "miel y leche", que el POB ya documenta como distinto de la fórmula más familiar "leche y miel".
- source_word: תַּחַת לְשׁוֹנֵךְ
  english_pob_choice: under your tongue
  chosen_spanish: debajo de tu lengua
  alternatives_spanish:
  - bajo tu lengua
  - debajo de tu lengua
  lexicon: HALOT
  rationale: La preposición admite un sentido espacial directo; "debajo de tu lengua" mantiene la literalidad poética sin sonar forzado en español.
- source_word: רֵיחַ
  english_pob_choice: fragrance
  chosen_spanish: aroma
  alternatives_spanish:
  - fragancia
  - aroma
  - olor
  lexicon: HALOT
  rationale: En un contexto positivo y sensorial, "aroma" funciona de modo natural y agradable en español; evita la frialdad de "olor".
- source_word: שַׂלְמֹתַיִךְ
  english_pob_choice: your garments
  chosen_spanish: tus vestidos
  alternatives_spanish:
  - tus prendas
  - tus ropas
  - tus vestidos
  lexicon: HALOT
  rationale: El sustantivo se refiere a la ropa exterior/vestimenta; "vestidos" es claro y elegante para poesía amorosa.
- source_word: כְּרֵיחַ לְבָנוֹן
  english_pob_choice: like the fragrance of Lebanon
  chosen_spanish: como el aroma del Líbano
  alternatives_spanish:
  - como la fragancia del Líbano
  - como el aroma del Líbano
  lexicon: HALOT
  rationale: Se conserva el topónimo y la comparación literal. "Líbano" aporta la carga poética/geográfica asociada al frescor y al prestigio del lugar.
translation_notes:
  revision_awareness: La versión coincide con el sentido y la imagen del texto hebreo y con el audit trail inglés; se mantuvo la distinción entre נֹפֶת y דְּבַשׁ, así como el orden hebreo «miel y leche». No se requirieron correcciones por la revisión más reciente.
  spanish_consistency_notes:
  - Se mantuvo un registro poético, claro y publicable, sin sustituir el orden hebreo cuando este aporta una distinción léxica importante.
  - '"Novia" se eligió por su naturalidad en español y por conservar el vocativo afectivo del Cantar.'
  - '"Aroma" se usó para רֵיחַ en ambos miembros para mantener coherencia sonora y semántica dentro del verso.'
