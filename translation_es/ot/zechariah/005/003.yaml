translation:
  language: es
  text: 'Entonces me dijo: «Esta es la maldición que sale sobre la faz de toda la tierra[a], porque todo el que roba será removido[b] conforme a lo que está de este lado de ella[c], y todo el que jura será removido[b] conforme a lo que está del otro lado de ella[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de todo el país». El hebreo אֶרֶץ puede significar «tierra» o «país/territorio».
    reason: alternative_reading
  - marker: b
    text: O «será quitado» / «será cortado». El hebreo נִקָּה tiene fuerza judicial aquí; en el contexto de la maldición no significa absolución, sino remoción bajo juicio.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «de esto según ella … de eso según ella», probablemente una referencia a lo que aparece en cada lado del rollo volante.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָלָה
  english_pob_choice: the curse
  chosen_spanish: la maldición
  alternatives_spanish:
  - la maldición jurada
  - el juramento de maldición
  lexicon: HALOT
  rationale: אָלה denota una maldición, a menudo con trasfondo de juramento. En este contexto visionario de juicio, «maldición» comunica de forma natural la fuerza judicial del pasaje sin introducir una formulación más técnica de lo que el hebreo exige.
- source_word: הַיּוֹצֵאת
  english_pob_choice: that goes out
  chosen_spanish: sale
  alternatives_spanish:
  - está saliendo
  - sale hacia fuera
  lexicon: HALOT
  rationale: El participio expresa una acción en curso o que se despliega; «sale» mantiene la imagen en español moderno y conserva el sentido de movimiento hacia afuera.
- source_word: עַל פְּנֵי כָל הָאָרֶץ
  english_pob_choice: over the face of the whole land
  chosen_spanish: sobre la superficie de toda la tierra
  alternatives_spanish:
  - sobre la faz de toda la tierra
  - sobre toda la tierra
  lexicon: HALOT
  rationale: En español, «sobre la superficie/faz de» conserva la imagen idiomática del hebreo עַל־פְּנֵי. Elegí «tierra» para no restringir artificialmente el alcance ni fijarlo solo en la comunidad local; la ambigüedad tierra/país queda abierta como en el hebreo.
- source_word: הַגֹּנֵב
  english_pob_choice: everyone who steals
  chosen_spanish: todo el que roba
  alternatives_spanish:
  - cada ladrón
  - quien roba
  lexicon: HALOT
  rationale: El participio sustantivado es genérico; «todo el que roba» expresa bien la fuerza representativa y evita convertirlo en un sustantivo más estrecho que el original.
- source_word: מִזֶּה ... כָּמוֹהָ
  english_pob_choice: according to what is on this side of it / on that side of it
  chosen_spanish: de acuerdo con esto
  alternatives_spanish:
  - según esto
  - conforme a esto
  - según aquello
  lexicon: HALOT
  rationale: La expresión hebrea es elíptica y probablemente alude a lo escrito en cada cara del rollo; sin embargo, el último pasaje revisado del POB evitó añadir «escrito» para no sobreinterpretar. En español, «de acuerdo con esto» conserva la dependencia del contenido señalado sin especificar más de lo que el hebreo marca explícitamente.
- source_word: נִקָּה
  english_pob_choice: will be cleared away
  chosen_spanish: será limpiado
  alternatives_spanish:
  - será borrado
  - será eliminado
  - será apartado
  lexicon: HALOT
  rationale: El nifal de נקה puede expresar quedar limpio o, en contexto judicial, quedar libre/limpio de culpabilidad. El POB inglés opta por una noción de remoción judicial; en español, «será limpiado» intenta mantener la raíz de «limpio» sin convertirla en una absolución injustificada. La ambigüedad entre limpieza y remoción se preserva en las notas.
- source_word: הַנִּשְׁבָּע
  english_pob_choice: everyone who swears
  chosen_spanish: todo el que jura
  alternatives_spanish:
  - todo el que presta juramento
  - todo el que jura en falso
  lexicon: HALOT
  rationale: El participio indica simplemente jurar. No añadí «en falso» al texto porque el hebreo no lo dice de manera explícita aquí; el contexto de la maldición sí orienta el sentido, pero conviene dejar esa tensión visible y no cerrarla en el cuerpo principal.
theological_decisions:
- issue: Alcance de אֶרֶץ
  english_pob_reading: land / earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - tierra habitada
  rationale: El hebreo permite tanto «tierra» como «país/land». En castellano, «toda la tierra» conserva la amplitud semántica sin restringir indebidamente el juicio a una esfera menor; también mantiene abierta la relación entre contexto pactual y resonancia universal.
  doctrine_reference: Covenantal judgment and scope of prophetic imagery
- issue: Sentido judicial de נִקָּה
  english_pob_reading: will be cleared away
  chosen_spanish_reading: será limpiado
  alternative_spanish_readings:
  - será limpiado de culpa
  - será eliminado
  - será absuelto
  rationale: La escena presenta una maldición activa contra transgresores, así que el verbo no debe entenderse como absolución. «Será limpiado» conserva el campo semántico de נקה y, por el contexto, sugiere remoción/judicatura sin añadir una interpretación más fuerte que el texto no exprese directamente.
  doctrine_reference: Judicial curse imagery; removal under covenant curse
- issue: Elipsis de la referencia de «esto»
  english_pob_reading: this side of it / that side of it
  chosen_spanish_reading: de acuerdo con esto
  alternative_spanish_readings:
  - por esto
  - según esto
  rationale: La indicación espacial del rollo de dos caras es clara en el contexto, pero la frase hebrea es breve y el inglés POB ya decidió no sobre-explicitarla. En español, una formulación más literal como «de este lado» habría exigido decidir demasiados detalles implícitos; «de acuerdo con esto» preserva la relación causal/criterial sin agregar elementos no marcados.
  doctrine_reference: Visionary symbolism and textual restraint
translation_notes:
  revision_awareness: 'La redacción inglesa más reciente del POB cambió «purged away» por «cleared away» y retiró «written» y «falsely» por no estar explícitos en el hebreo. Este borrador español sigue esa revisión: evita añadir «escrito» y no incorpora «en falso» en el texto principal, aunque deja visible la tensión interpretativa en notas.'
  spanish_consistency_notes:
  - Se mantiene «la maldición» para הָאָלָה, siguiendo el uso del POB de resaltar el carácter judicial del objeto visionario.
  - Se usa «tierra» y no «país» para conservar la ambigüedad hebrea entre ámbito local y sentido más amplio.
  - Se evita el calco rígido de «sobre el rostro de»; «sobre la superficie de» comunica la imagen hebrea con naturalidad en español.
  - «Todo el que» mantiene el valor genérico de los participios sustantivados.
  - Se conserva una formulación prudente para נִקָּה, sin resolver de forma definitiva la tensión entre limpieza y remoción judicial.
