- source_word: ⲛ̄ⲛⲟⲩⲧⲉ
  chosen: the gods
  alternatives:
  - God
  - divine beings
  lexicon: Coptic ⲛⲟⲩⲧⲉ (God/god), plural construed by context
  rationale: Given repeated ⲛ̄ⲛⲟⲩⲧⲉ and list parallelism, plural is more likely; singular
