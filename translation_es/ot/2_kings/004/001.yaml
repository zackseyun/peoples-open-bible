  to: 'Ahora una mujer de entre las mujeres de los hijos de los profetas clamó a Eliseo, diciendo: «Tu siervo, mi esposo, ha muerto, y tú sabes que tu siervo temía a Yahvé. Y el acreedor ha venido para llevarse a mis dos hijos[a] como esclavos».'
  rationale: Se ajusta «esclavo» a «siervo» en עַבְדְּךָ por contexto relacional con Eliseo; se mejora la naturalidad de «para esclavos» a «como esclavos»; se aligera «esposas» a «mujeres» en el sintagma colectivo; y se corrige la nota para que preserve el valor léxico amplio del hebreo en יְלָדַי y su alternativa contextual, conforme al rastro inglés.
