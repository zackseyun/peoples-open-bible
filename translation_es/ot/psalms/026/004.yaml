translation:
  language: es
  text: No me he sentado con hombres de falsedad, ni voy con los que se esconden[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: “ni entraré con los ocultos”. El hebreo probablemente se refiere a personas que esconden su verdadero carácter; es decir, disimuladores o hipócritas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשַׁבְתִּי
  english_pob_choice: have not sat
  chosen_spanish: no me he sentado
  alternatives_spanish:
  - no me senté
  - no he convivido
  - no he andado en compañía
  lexicon: HALOT
  rationale: El hebreo ישׁב con עִם conserva la imagen de “sentarse”, pero en español la expresión natural para compañía o asociación es un perfecto compuesto reflexivo. Mantiene la metáfora sin sonar forzado y refleja la negativa de una experiencia pasada con vigencia actual.
- source_word: מְתֵי שָׁוְא
  english_pob_choice: men of falsehood
  chosen_spanish: hombres de falsedad
  alternatives_spanish:
  - hombres de mentira
  - hombres falsos
  - hombres vanos
  lexicon: HALOT
  rationale: מְתֵי es el constructo plural “hombres de”, y שָׁוְא puede significar falsedad, vacío o engaño. “Falsedad” preserva bien el campo semántico moral y evita el arcaísmo de “vano” en español moderno.
- source_word: נַעֲלָמִים
  english_pob_choice: those who conceal themselves
  chosen_spanish: los que se esconden
  alternatives_spanish:
  - los ocultos
  - los que ocultan lo que son
  - los hipócritas
  lexicon: HALOT
  rationale: La forma derivada de עלם apunta a personas ocultas o disimuladas. “Los que se esconden” conserva la idea de ocultamiento en español natural; es menos interpretativo que “hipócritas” y más transparente que “los ocultos”.
- source_word: אָבֽוֹא
  english_pob_choice: do not go in
  chosen_spanish: ni entraré
  alternatives_spanish:
  - ni iré
  - ni vendré
  - ni me uniré
  lexicon: HALOT
  rationale: בוא admite ‘entrar/venir/ir’. En paralelo con “me he sentado con”, “entraré” comunica bien la idea de incorporarse o participar con ellos. Se eligió el futuro por corresponder al valor verbal que el hebreo puede expresar en este contexto de resolución o compromiso.
- source_word: וְעִם
  english_pob_choice: and ... with
  chosen_spanish: ni
  alternatives_spanish:
  - y con
  - ni con
  lexicon: HALOT
  rationale: Aunque el hebreo coordina con וְ + עִם, el español suena más fiel al paralelismo adversativo con “ni” en la segunda cola. Esto evita una coordinación demasiado blanda y reproduce mejor la fuerza negativa del conjunto.
translation_notes:
  revision_awareness: Se siguió el último ajuste del POB en inglés que aclaró el final como personas que “se esconden / se ocultan”, evitando la paráfrasis más interpretativa de “los que ocultan lo que son”. La versión española conserva esa precisión y mantiene el paralelismo verbal del hebreo.
  spanish_consistency_notes:
  - Se mantiene “falsedad” para שָׁוְא, en continuidad con la elección inglesa “falsehood”.
  - Se evita “Cristo”, “SEÑOR” u այլ terminología no presente en el versículo.
  - El segundo miembro usa futuro (“entraré”) para reflejar adecuadamente la apertura verbal de אָבֽוֹא y su valor de resolución.
  - La nota al pie preserva la ambigüedad entre ocultamiento literal y disimulo moral, tal como la auditoría inglesa la documenta.
