    rationale: Aunque es inteligible, pierde el eco verbal de שׁמר ('guardar') que estructura el Salmo 121. En español, 'el que te guarda' conserva mejor la motivación léxica documentada sin sonar antinatural.
  - severity: low
    issue: '''se adormecerá'' para יָנוּם'
    rationale: No es incorrecto, pero 'se adormecerá' puede sugerir entrar en sueño más que dormitar/cabecear. 'Dormitará' refleja mejor el contraste con el versículo siguiente y el matiz de נוּם.
  - severity: low
