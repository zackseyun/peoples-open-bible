translation:
  language: es
  text: 'Y cuando los días del banquete habían terminado, Job enviaba y los consagraba; se levantaba muy de mañana y ofrecía holocaustos según el número de todos ellos. Porque Job decía: «Quizá mis hijos han pecado y han maldecido a Dios[a] en sus corazones». Así hacía Job continuamente.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «han bendecido a Dios»; aquí «bendecido» es un eufemismo reverencial para «maldecido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּי הִקִּיפוּ יְמֵי הַמִּשְׁתֶּה
  english_pob_choice: And when the days of feasting had run their course
  chosen_spanish: Y cuando los días del banquete habían terminado
  alternatives_spanish:
  - Y cuando habían dado la vuelta los días del banquete
  - Y cuando se había completado el ciclo de los días del banquete
  lexicon: HALOT
  rationale: נקף en este contexto expresa que el período festivo llegó a su fin. «Habían terminado» comunica con naturalidad ese cierre temporal sin perder el valor de culminación del hebreo; «banquete» preserva la ocasión festiva concreta.
- source_word: וַיִּשְׁלַח
  english_pob_choice: Job would send
  chosen_spanish: Job enviaba
  alternatives_spanish:
  - Job envió
  - Job mandaba
  lexicon: HALOT
  rationale: El contexto de rutina habitual en el cierre del versículo favorece un imperfecto habitual en español. «Enviaba» refleja la acción repetida mejor que un perfecto puntual.
- source_word: וַיְקַדְּשֵׁם
  english_pob_choice: consecrate them
  chosen_spanish: los consagraba
  alternatives_spanish:
  - los santificaba
  - los apartaba como santos
  lexicon: HALOT
  rationale: קדש en piel tiene el sentido de apartar para lo sagrado. «Consagraba» conserva el matiz cultual y es más natural en español bíblico que «santificaba» en este contexto.
- source_word: וְהִשְׁכִּים בַּבֹּקֶר
  english_pob_choice: he would rise early in the morning
  chosen_spanish: se levantaba muy de mañana
  alternatives_spanish:
  - se levantaba temprano por la mañana
  - se madrugaba por la mañana
  lexicon: HALOT
  rationale: El hebreo es una locución idiomática para levantarse temprano. «Muy de mañana» suena natural y conserva la prontitud del acto; no se añadió «en la mañana» dos veces para evitar redundancia.
- source_word: וְהֶעֱלָה עֹלוֹת
  english_pob_choice: offer burnt offerings
  chosen_spanish: ofrecía holocaustos
  alternatives_spanish:
  - presentaba holocaustos
  - sacrificaba holocaustos
  lexicon: HALOT
  rationale: עֹלוֹת es el término técnico para los sacrificios completamente quemados. «Holocaustos» es el equivalente tradicional y exacto en español bíblico; «ofrecía» mantiene el verbo cultual.
- source_word: מִסְפַּר כֻּלָּם
  english_pob_choice: according to the number of them all
  chosen_spanish: según el número de todos ellos
  alternatives_spanish:
  - conforme al número de todos
  - para cada uno de ellos
  lexicon: HALOT
  rationale: La frase indica correspondencia numérica con todos los hijos. «Según el número de todos ellos» sigue de cerca el hebreo y evita especificar más de lo que el texto dice.
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Quizá
  alternatives_spanish:
  - Tal vez
  - Puede que
  lexicon: HALOT
  rationale: «Quizá» reproduce la posibilidad con tono sobrio y natural en español.
- source_word: חָטְאוּ
  english_pob_choice: have sinned
  chosen_spanish: han pecado
  alternatives_spanish:
  - pecaron
  - han errado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una posibilidad de acto consumado con relevancia actual. «Han pecado» conserva ese matiz y es idiomático en español.
- source_word: וּבֵרֲכוּ אֱלֹהִים
  english_pob_choice: cursed God
  chosen_spanish: han bendecido a Dios[a]
  alternatives_spanish:
  - han maldecido a Dios
  - han hablado contra Dios
  lexicon: HALOT
  rationale: Se conserva la forma verbal literal «bendecido» para reflejar el hebreo ברך, que aquí funciona como eufemismo reverencial cuyo sentido real es el contrario. La lectura idiomática «han maldecido a Dios» queda documentada en la nota para no borrar la tensión léxica.
- source_word: בִּלְבָבָם
  english_pob_choice: in their hearts
  chosen_spanish: en su corazón
  alternatives_spanish:
  - dentro de su corazón
  - en su interior
  lexicon: HALOT
  rationale: «Corazón» en hebreo denota el centro interior de pensamiento y voluntad. El singular colectivo en español («su corazón») es natural con el sujeto plural del discurso reportado.
- source_word: כָּכָה יַעֲשֶׂה ... כָּל הַיָּמִים
  english_pob_choice: Thus Job would do continually
  chosen_spanish: Así hacía Job continuamente
  alternatives_spanish:
  - Así Job lo hacía siempre
  - Tal era la costumbre de Job
  lexicon: HALOT
  rationale: La cláusula final resume una práctica habitual. «Así hacía Job continuamente» conserva el valor iterativo del imperfecto y la continuidad de כָּל הַיָּמִים.
theological_decisions:
- issue: Eufemismo de ברך con Dios
  english_pob_reading: Render the sense as 'cursed God' in the main text
  chosen_spanish_reading: Conservar «han bendecido a Dios» en el cuerpo y explicarlo como eufemismo cuyo sentido es «han maldecido a Dios»
  alternative_spanish_readings:
  - han maldecido a Dios
  - han blasfemado contra Dios
  rationale: En Job el verbo ברך aparece como eufemismo reverencial en un contexto donde la intención es la irreverencia opuesta. Traducir directamente el sentido evita confusión doctrinal y narrativa; mantener la forma literal en el texto y aclararla en la nota preserva la transparencia del audit trail.
  doctrine_reference: Job 1:5; Job 1:11; Job 2:5, 9
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió un cierre formal con «continually»; en español se reprodujo con «continuamente». También se atendió al ajuste de naturalidad en la primera cláusula, manteniendo el sentido de culminación de los días de festín.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí el versículo dice אֱלֹהִים, por lo que se traduce «Dios».
  - Se eligió «holocaustos» para עֹלוֹת por ser el término cultual preciso y tradicional en español bíblico.
  - Se evitó «SEÑOR» como sustituto de אֱלֹהִים, siguiendo la convención del proyecto de distinguir cuidadosamente el nombre divino del sustantivo general «Dios».
  - El imperfecto narrativo/habitual («enviaba», «consagraba», «hacía») conserva la idea de costumbre repetida que culmina en la cláusula final.
