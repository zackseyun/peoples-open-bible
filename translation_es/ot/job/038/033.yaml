translation:
  language: es
  text: ¿Conoces las ordenanzas de los cielos? ¿Puedes establecer su gobierno sobre la tierra?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su dominio' o 'su autoridad' para 'su gobierno'; el sufijo hebreo es singular ('su'), probablemente referido a 'los cielos' como conjunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיָדַעְתָּ
  english_pob_choice: Do you know
  chosen_spanish: ¿Conoces... ?
  alternatives_spanish:
  - ¿Has conocido... ?
  - ¿Sabes... ?
  lexicon: HALOT
  rationale: La pregunta hebrea con הֲ + perfecto 2ms expresa una pregunta de estado/conocimiento. En español, 'conoces' comunica de manera natural la interpelación directa sin perder el valor retórico del desafío divino.
- source_word: חֻקּוֹת
  english_pob_choice: ordinances
  chosen_spanish: estatutos
  alternatives_spanish:
  - ordenanzas
  - decretos
  - leyes fijas
  lexicon: HALOT
  rationale: En este contexto cósmico, el término apunta a disposiciones fijas u orden establecido. 'Estatutos' conserva la idea de normas determinadas sin volver el texto demasiado jurídico ni introducir una connotación eclesiástica.
- source_word: שָׁמָיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  - el firmamento
  lexicon: HALOT
  rationale: El hebreo plural se refiere al ámbito celestial/cósmico. 'Los cielos' preserva el plural y funciona bien en español bíblico contemporáneo.
- source_word: אִם
  english_pob_choice: Can you
  chosen_spanish: ¿Puedes... ?
  alternatives_spanish:
  - ¿si puedes... ?
  - ¿si acaso puedes... ?
  lexicon: HALOT
  rationale: Aquí אִם introduce una segunda pregunta retórica paralela. En español, '¿Puedes...?' expresa con naturalidad el desafío y evita una traducción mecánica con 'si'.
- source_word: תָּשִׂים
  english_pob_choice: establish
  chosen_spanish: establecer
  alternatives_spanish:
  - poner
  - fijar
  - instituir
  lexicon: HALOT
  rationale: Con מִשְׁטָר, el verbo no es solo 'poner', sino dar vigencia o asentar una forma de gobierno/orden. 'Establecer' comunica bien ese matiz causativo.
- source_word: מִשְׁטָרוֹ
  english_pob_choice: their rule
  chosen_spanish: su gobierno
  alternatives_spanish:
  - su dominio
  - su autoridad
  - su regla
  lexicon: HALOT
  rationale: El sustantivo denota gobierno, dominio o autoridad regente. Dado que el sufijo es singular, 'su gobierno' evita forzar el plural inglés y mantiene la referencia colectiva a 'los cielos' como unidad.
- source_word: בָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra
  - en la superficie de la tierra
  lexicon: HALOT
  rationale: La preposición ב con ארץ en este contexto señala la esfera terrestre. 'Sobre la tierra' suena natural en español y conserva la idea de alcance o dominio sobre el mundo terrenal.
theological_decisions:
- issue: Naturaleza del orden celestial
  english_pob_reading: The verse speaks of God's fixed cosmic ordinances and governing order in creation, without specifying astrological determinism.
  chosen_spanish_reading: El versículo habla de los estatutos y del gobierno fijado por Dios en el orden cósmico, sin afirmar un determinismo astrológico.
  alternative_spanish_readings:
  - El versículo se refiere a influencias astrológicas sobre los asuntos terrenales.
  - El versículo describe simplemente leyes astronómicas sin implicación de gobierno.
  rationale: El hebreo enfatiza disposiciones fijas y gobierno, no una doctrina detallada de astrología. La traducción conserva el lenguaje de orden cósmico sin ampliar el sentido más allá de lo que el texto garantiza.
  doctrine_reference: 'Translation philosophy: primacía del idioma original y preservación de tensiones sin resolverlas más allá del texto'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido del hebreo y concuerda con la revisión inglesa sin cambios: se mantiene la pregunta retórica doble, el marco cósmico de estatutos/orden y la ambigüedad del sufijo singular en מִשְׁטָרוֹ.'
  spanish_consistency_notes:
  - Se usó 'los cielos' para conservar el plural hebreo y la elevación del registro.
  - '''Establecer'' traduce la fuerza de תָּשִׂים en relación con gobierno/orden, no solo ubicación.'
  - La nota al pie marca explícitamente la tensión entre el singular hebreo y una referencia colectiva a 'los cielos'.
