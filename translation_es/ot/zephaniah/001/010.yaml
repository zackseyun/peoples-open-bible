translation:
  language: es
  text: Y en aquel día[a], declara Yahvé, habrá el sonido de un clamor desde la Puerta del Pescado, y un lamento desde el Segundo Barrio[b], y un gran estruendo[c] desde los collados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sonido de un clamor».
    reason: lexical_alternative
  - marker: b
    text: Probablemente un distrito de Jerusalén; hebreo מִשְׁנֶה (Mishneh).
    reason: cultural_note
  - marker: c
    text: O «una gran ruina» o «un gran rompimiento».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - será
  - sucederá
  lexicon: HALOT
  rationale: La fórmula profética introduce hechos futuros de juicio. En español, «habrá» reproduce con naturalidad la existencia/ocurrencia de los sonidos anunciados sin volver la frase rígida.
- source_word: בַיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: Es la fórmula temporal profética habitual. «En aquel día» conserva el valor solemne y escatológico mejor que una expresión más coloquial.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética con el nombre divino según la norma del proyecto. «Declara» expresa bien la autoridad oracular sin forzar el español.
- source_word: ק֤וֹל צְעָקָה֙
  english_pob_choice: the sound of a cry
  chosen_spanish: un sonido de clamor
  alternatives_spanish:
  - la voz de un clamor
  - el sonido de un grito
  lexicon: HALOT
  rationale: La construcción hebrea literalmente es «voz/sonido de clamor». «Un sonido de clamor» mantiene el sustantivo de sonido y el matiz de clamor, evitando reducirlo solo a «un grito».
- source_word: מִשַּׁעַר הַדָּגִים
  english_pob_choice: from the Fish Gate
  chosen_spanish: desde la Puerta de los Peces
  alternatives_spanish:
  - desde la Puerta del Pescado
  - desde la puerta de los peces
  lexicon: HALOT
  rationale: Es un nombre propio topográfico de Jerusalén; se mantiene la forma tradicional comprensible en español con mayúsculas de topónimo.
- source_word: וִילָלָה
  english_pob_choice: a wail
  chosen_spanish: un lamento
  alternatives_spanish:
  - un alarido
  - un gemido
  lexicon: HALOT
  rationale: El término expresa duelo y angustia. «Lamento» es natural en español bíblico y conserva el tono de queja dolorosa del contexto de juicio.
- source_word: מִן הַמִּשְׁנֶה
  english_pob_choice: from the Second Quarter
  chosen_spanish: desde el Segundo Barrio
  alternatives_spanish:
  - desde la Segunda División
  - desde el Segundo Distrito
  lexicon: HALOT
  rationale: El hebreo apunta a una sección urbana específica de Jerusalén. «Barrio» comunica el valor de distrito urbano sin introducir una equivalencia excesivamente técnica; el término sigue siendo interpretativo, por lo que se documenta la alternativa topográfica.
- source_word: וְשֶׁבֶר גָּד֖וֹל
  english_pob_choice: a great crash
  chosen_spanish: un gran quebranto
  alternatives_spanish:
  - una gran ruina
  - una gran destrucción
  - un gran rompimiento
  lexicon: HALOT
  rationale: שבר admite sentido de quiebre, ruina o quebranto. Se evita «crash» por ser demasiado acústico en español; «quebranto» preserva la idea de ruptura/desastre sin perder la tensión semántica del hebreo.
- source_word: מֵהַגְּבָעוֹת
  english_pob_choice: from the hills
  chosen_spanish: desde los collados
  alternatives_spanish:
  - desde las colinas
  - desde los montes
  lexicon: HALOT
  rationale: גְּבָעוֹת son colinas/collados. «Collados» suena bíblico y natural, y mantiene el plural de terreno elevado sin sobreinterpretar el referente.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrama. Conforme al criterio del proyecto, se conserva el nombre divino en español como «Yahvé», evitando el sustituto litúrgico «SEÑOR» y manteniendo la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca el pasaje hebreo y el audit trail inglés, sin cambios de revisión pendientes; se mantiene la alta concordancia documentada y se adapta la elección léxica al español natural sin borrar las tensiones semánticas de צְעָקָה, וִילָלָה y שֶׁבֶר.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma uniforme del nombre divino.
  - 'Se conserva la progresión paralela de tres anuncios sonoros/destructivos: clamor, lamento y quebranto.'
  - «Puerta de los Peces» y «Segundo Barrio» se presentan como topónimos/distritos urbanos, no como descripciones genéricas.
  - La puntuación y el orden siguen la cadencia profética del original, con artículo y demostrativo ajustados al español.
