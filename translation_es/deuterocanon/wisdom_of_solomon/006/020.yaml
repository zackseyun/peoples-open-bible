translation:
  language: es
  text: Así pues[a], el deseo de la sabiduría conduce a la realeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el deseo de la sabiduría conduce a un reino» o «a un gobierno real». El griego βασιλεία puede denotar realeza, reinado o reino; aquí «realeza» se ajusta mejor al énfasis del argumento en alcanzar la dignidad o autoridad real.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιθυμία
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - anhelo
  - aspiración
  lexicon: BDAG
  rationale: ἐπιθυμία expresa un deseo intenso. En español, «deseo» conserva esa fuerza sin cargar un matiz negativo innecesario como podría ocurrir con otras opciones en ciertos contextos.
- source_word: ἄρα
  english_pob_choice: so then
  chosen_spanish: Así pues
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: ἄρα introduce una inferencia. «Así pues» mantiene el enlace lógico con naturalidad en español y corresponde al valor inferencial que el inglés POB marcó con «so then».
- source_word: σοφίας
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  lexicon: BDAG
  rationale: Es el equivalente normal y directo de σοφία. En Sabiduría de Salomón conserva su peso práctico y teológico.
- source_word: ἀνάγει
  english_pob_choice: leads
  chosen_spanish: conduce
  alternatives_spanish:
  - lleva
  - guía
  - eleva
  lexicon: BDAG
  rationale: El verbo literalmente puede sugerir «subir» o «llevar hacia arriba», pero en este contexto la imagen es direccional hacia un resultado. «Conduce» expresa bien esa progresión sin sonar forzado en español.
- source_word: ἐπὶ βασιλείαν
  english_pob_choice: to kingship
  chosen_spanish: al reinado
  alternatives_spanish:
  - a la realeza
  - a un reino
  - a la soberanía
  lexicon: BDAG
  rationale: La secuencia con ἐπί + acusativo indica movimiento hacia un estado o condición. Dado el contexto argumental, «reinado» capta mejor la idea de ejercicio de la realeza que «reino» como territorio.
theological_decisions:
- issue: Alcance de βασιλεία en un dicho sapiencial
  english_pob_reading: kingship
  chosen_spanish_reading: reinado
  alternative_spanish_readings:
  - reino
  - realeza
  - soberanía
  rationale: La lectura del inglés POB evita una noción territorial y enfatiza el estado o ejercicio del poder real. «Reinado» sigue esa decisión y deja abierta la referencia al ejercicio de la autoridad más que a un lugar geográfico.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Se siguió la lectura final sin cambios del pasaje base: el texto griego adjudicado ἐπιθυμία ἄρα σοφίας ἀνάγει ἐπὶ βασιλείαν fue tomado como estable, y la traducción española refleja la decisión auditada del POB inglés sobre βασιλεία como ''kingship''.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o formas de sustitución divina porque el verso no contiene el Tetragrámaton ni κύριος.
  - Se prefirió «sabiduría» como término técnico y teológico estable.
  - «Reinado» mantiene la diferencia entre reino como dominio territorial y realeza/reinado como autoridad o condición.
