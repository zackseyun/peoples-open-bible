translation:
  language: es
  text: Dio a los santos[b] la recompensa de sus trabajos[a], los guio por un camino maravilloso, y se hizo para ellos un refugio de día y una llama de estrellas[c] de noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La imagen recuerda la guía y protección de Dios en el éxodo, especialmente la nube de día y el fuego de noche; el griego aquí lo sugiere de manera alusiva, no con la fórmula tradicional completa.
    reason: cross_reference
  - marker: b
    text: O «los piadosos» para «los santos».
    reason: lexical_alternative
  - marker: c
    text: La expresión «llama de estrellas» es literal; también puede entenderse como «llama estrellada».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέδωκεν
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - retribuyó
  - pagó
  - dio de vuelta
  lexicon: BDAG
  rationale: El verbo puede significar dar, devolver o retribuir. En este contexto, con μισθὸν κόπων, expresa la concesión de una recompensa debida por el esfuerzo. «Dio» es natural en español y conserva el matiz positivo sin forzar una imagen comercial o punitiva.
- source_word: ὁσίοις
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los piadosos
  - los fieles
  - los hombres santos
  lexicon: BDAG
  rationale: ὅσιος describe a quienes están dedicados a Dios, piadosos o santos. «Los santos» conserva el valor adjetival y encaja bien en español bíblico sin borrar el tono de devoción; «los piadosos» también es posible, pero suena más interpretativo.
- source_word: μισθὸν
  english_pob_choice: reward
  chosen_spanish: recompensa
  alternatives_spanish:
  - salario
  - galardón
  - retribución
  lexicon: BDAG
  rationale: μισθός puede significar salario o recompensa. Aquí «recompensa» expresa mejor el sentido elevado del pasaje y evita reducirlo a una imagen laboral estricta.
- source_word: κόπων
  english_pob_choice: their labors
  chosen_spanish: sus trabajos
  alternatives_spanish:
  - sus fatigas
  - sus labores
  - su afán
  lexicon: BDAG
  rationale: κόπος alude a esfuerzo penoso o labor fatigosa. «Trabajos» es comprensible y digno en español; «labores» o «fatigas» también funcionarían, pero «trabajos» mantiene un equilibrio claro entre esfuerzo y resultado.
- source_word: ὡδήγησεν
  english_pob_choice: guided
  chosen_spanish: los guio
  alternatives_spanish:
  - los condujo
  - los dirigió
  lexicon: BDAG
  rationale: El verbo significa guiar o conducir por un camino. «Los guio» refleja dirección cuidadosa y sigue bien la imagen del camino.
- source_word: ἐν ὁδῷ θαυμαστῇ
  english_pob_choice: in a marvelous way
  chosen_spanish: por un camino maravilloso
  alternatives_spanish:
  - en un camino maravilloso
  - por una senda maravillosa
  - en una ruta maravillosa
  lexicon: BDAG
  rationale: La frase es literalmente «en/en un camino maravilloso». «Por un camino maravilloso» suena natural en español y conserva la idea de tránsito guiado sin añadir interpretación excesiva.
- source_word: ἐγένετο αὐτοῖς εἰς σκέπην ἡμέρας
  english_pob_choice: became for them a shelter by day
  chosen_spanish: se hizo para ellos un refugio de día
  alternatives_spanish:
  - les fue un refugio de día
  - se volvió para ellos un cobijo de día
  - fue para ellos un refugio de día
  lexicon: BDAG
  rationale: σκέπη significa cobertura, abrigo o protección. «Refugio» transmite bien la idea de protección en español bíblico; «de día» conserva el valor temporal de ἡμέρας.
- source_word: εἰς φλόγα ἄστρων τὴν νύκτα
  english_pob_choice: a flame of stars by night
  chosen_spanish: una llama de estrellas de noche
  alternatives_spanish:
  - una llama estrellada de noche
  - una llama de astros de noche
  - una llama de estrellas por la noche
  lexicon: LSJ
  rationale: 'La secuencia griega es comprimida y literal: «llama de estrellas». Mantener «llama de estrellas» preserva la imagen inusual del texto y evita normalizarla demasiado; «de noche» reproduce el temporal de τὴν νύκτα.'
theological_decisions:
- issue: Sujeto implícito del versículo
  english_pob_reading: He gave... guided them... and became for them...
  chosen_spanish_reading: Él dio... los guio... y se hizo para ellos...
  alternative_spanish_readings:
  - Dio... guio... y se hizo...
  - La Sabiduría dio... guio... y se hizo...
  rationale: El griego no repite explícitamente el sujeto en cada miembro, y el contexto inmediato lo mantiene implícito. Conservar «Él» sigue la lectura inglesa y la personificación del agente sin introducir una aclaración interpretativa en el cuerpo del texto.
  doctrine_reference: Preservar la tensión literaria y el antecedente contextual, no resolverlo de modo expansivo en la traducción principal.
- issue: Alusión al éxodo y a la nube/fuego
  english_pob_reading: The imagery recalls God's guidance and protection in the exodus... translated directly without importing explanatory expansion into the main text.
  chosen_spanish_reading: La imagen se traduce directamente, como alusión, sin expandirla a la fórmula completa del éxodo.
  alternative_spanish_readings:
  - una columna de nube de día y una columna de fuego de noche
  - un refugio diurno y una llama nocturna
  rationale: El griego evoca la tradición del éxodo, pero no reproduce la fórmula tradicional completa. La versión española debe conservar esa alusión compacta sin agregar elementos ausentes del texto fuente.
  doctrine_reference: No paraprasear más allá de lo que warrantiza el texto original; mantener la alusión bíblica sin expandirla artificialmente.
translation_notes:
  revision_awareness: Se siguió el último pase de revisión en inglés, que prefirió «in a marvelous way» por naturalidad sin alterar ἐν ὁδῷ θαυμαστῇ. En español se reflejó con «por un camino maravilloso», manteniendo la naturalidad y la imagen de dirección guiada. También se preservó la literalidad de «a flame of stars» sin convertirla en la fórmula completa del éxodo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término por defecto cuando el original requiera el nombre divino; en este versículo no aparece explícitamente.
  - Se evitó «SEÑOR» para no ocultar el nombre divino donde no corresponde ni introducir una convención ajena al texto.
  - Se conservó el tono bíblico sobrio y la sintaxis coordinada del original, sin ampliar la alusión exódica en el texto principal.
  - «Santos» se usó como equivalente de ὁσίοις, dejando «piadosos» como alternativa documentada.
  - «Llama de estrellas» se conservó por fidelidad a la imagen griega inusual, con nota sobre su posible lectura alternativa.
