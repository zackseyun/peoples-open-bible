translation:
  language: es
  text: El amor constante y la fidelidad preservan a un rey[a][b][c], y por el amor constante se sostiene su trono.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Alternativamente, אֱמֶת puede traducirse «verdad»; aquí probablemente resalta la fidelidad o confiabilidad junto con חֶסֶד.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse יִצְּרוּ como «guardan» o «protegen». «Preservan» comunica bien el efecto protector y sostenedor en este proverbio.
    reason: lexical_alternative
  - marker: c
    text: Se repite «amor constante» en ambas cláusulas para reflejar la repetición de חֶסֶד en el hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: lealtad
  alternatives_spanish:
  - amor constante
  - misericordia
  - bondad leal
  lexicon: HALOT
  rationale: חֶסֶד en este paralelismo real expresa lealtad pactal y compromiso fiel, no solo afecto. En español, «lealtad» comunica mejor esa fidelidad relacional y protectora que «misericordia» o «bondad».
- source_word: אֱמֶת
  english_pob_choice: faithfulness
  chosen_spanish: fidelidad
  alternatives_spanish:
  - verdad
  - fiabilidad
  - veracidad
  lexicon: HALOT
  rationale: En la pareja con חֶסֶד, אֱמֶת apunta a confiabilidad ética más que a verdad abstracta. «Fidelidad» mantiene la fuerza relacional y moral del término.
- source_word: יִצְּרוּ
  english_pob_choice: preserve
  chosen_spanish: preservan
  alternatives_spanish:
  - guardan
  - custodian
  - protegen
  lexicon: HALOT
  rationale: El verbo נצר expresa guardar, cuidar y preservar. «Preservan» conserva el sentido de sostener y proteger con naturalidad en español.
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: La ausencia del artículo en hebreo favorece un valor general o proverbial. «Un rey» reproduce mejor ese carácter gnómico que «el rey».
- source_word: סָעַד
  english_pob_choice: is upheld
  chosen_spanish: se sostiene
  alternatives_spanish:
  - es sustentado
  - es apoyado
  - permanece firme
  lexicon: HALOT
  rationale: סעד denota sostener, apoyar o dar soporte. «Se sostiene» es una forma natural en español y mantiene la imagen de apoyo del trono.
- source_word: בַּחֶסֶד
  english_pob_choice: by steadfast love
  chosen_spanish: por la lealtad
  alternatives_spanish:
  - mediante la lealtad
  - con lealtad
  - por amor constante
  lexicon: HALOT
  rationale: Se conserva la repetición léxica de חֶסֶד con el mismo equivalente español para reflejar el paralelismo hebreo. «Por» expresa bien el valor instrumental.
- source_word: כִּסְאֹו
  english_pob_choice: his throne
  chosen_spanish: su trono
  alternatives_spanish:
  - su estrado
  - su asiento real
  lexicon: HALOT
  rationale: La imagen concreta de כִּסֵּא se preserva como «trono», que en español mantiene el valor metonímico de reinado y autoridad.
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente: no se registran cambios aplicados y el acuerdo del control cruzado fue alto, con solo observaciones menores.'
  spanish_consistency_notes:
