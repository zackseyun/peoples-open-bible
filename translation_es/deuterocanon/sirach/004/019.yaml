translation:
  language: es
  text: Si se aparta de mí[a], yo lo rechazaré y lo entregaré a los saqueadores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «y lo entregará en manos de su caída», quizá reflejando una lectura subyacente distinta o una traducción interpretativa.'
    reason: alternative_reading
lexical_decisions:
- source_word: יָסוּר
  english_pob_choice: turns away
  chosen_spanish: se aparta
  alternatives_spanish:
  - se desvía
  - se aleja
  - se vuelve atrás
  lexicon: HALOT
  rationale: La raíz סור expresa apartarse/retirarse de una vía o relación. «Se aparta» conserva el movimiento de desviación sin cargar innecesariamente la frase con una idea más fuerte que el hebreo.
- source_word: מֵאַחֲרַי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de seguirme
  - de mi seguimiento
  - de detrás de mí
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de detrás de mí», un modismo de dejar de seguir. En español, «de mí» unido a «se aparta» comunica con naturalidad esa relación implícita.
- source_word: אַשׁלִיכֶנּוּ
  english_pob_choice: I will cast him off
  chosen_spanish: lo desecharé
  alternatives_spanish:
  - lo arrojaré lejos
  - lo rechazaré
  - lo echaré fuera
  lexicon: HALOT
  rationale: שׁלך es literalmente «arrojar/castigar», pero en este contexto relacional la idea es apartarlo o deshacerse de él. «Desecharé» mantiene la fuerza de abandono sin sonar demasiado mecánico en español.
- source_word: וְאַסְגִּירֶנּוּ
  english_pob_choice: and hand him over
  chosen_spanish: lo entregaré
  alternatives_spanish:
  - lo pondré en manos de
  - lo cederé
  - lo entregaré a
  lexicon: HALOT
  rationale: סגר en esta forma tiene el sentido de poner a alguien en poder de otros. «Entregaré» reproduce bien la idea judicial/de abandono y coincide con el paralelo griego παραδώσει.
- source_word: לַשֹׁדְדִים
  english_pob_choice: to plunderers
  chosen_spanish: a los saqueadores
  alternatives_spanish:
  - a los plunderadores
  - a los robadores
  - a los ladrones
  lexicon: HALOT
  rationale: El sustantivo designa gente que saquea o despoja. «Saqueadores» es el equivalente español más natural y fiel al matiz de incursión violenta.
theological_decisions:
- issue: Alineación entre el hebreo conservado y el paralelo griego
  english_pob_reading: The main text follows the extant Hebrew 'hand him over to plunderers'; the Greek parallel is preserved in a footnote as an alternative reading.
  chosen_spanish_reading: 'El texto principal sigue el hebreo: «lo entregaré a los saqueadores».'
  alternative_spanish_readings:
  - «lo entregaré en manos de su caída»
  - «lo entregaré en manos de su ruina»
  rationale: En Sirácides, cuando el hebreo conservado es claro y de alta confianza, el texto principal debe seguirlo. El griego de Swete ofrece una formulación distinta («en manos de su caída»), que puede reflejar otra Vorlage o una interpretación. Por eso se mantiene en nota, sin desplazar el testimonio hebreo principal.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives; preserve genuine ambiguity in footnotes'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente sin cambios sustantivos: el consenso de los testigos favorece el hebreo conservado como texto principal, con el griego preservado en nota para transparencia.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en textos donde aparece el nombre divino; aquí no aplica porque el versículo habla en primera persona de Sabiduría.
  - Se mantuvo «saqueadores» para לַשֹׁדְדִים por su fuerza concreta y su cercanía al campo semántico de robo violento.
  - No se introdujo «Cristo/Mesías» ni terminología eclesial ajena al pasaje.
