translation:
  language: es
  text: y Quedemot con sus tierras de pasto[a], y Mefaat con sus tierras de pasto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tierras comunales'; el término hebreo denota la tierra abierta que pertenece a una ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְדֵמוֹת
  english_pob_choice: Kedemoth
  chosen_spanish: Quedemot
  alternatives_spanish:
  - Kedemot
  - Kedemoth
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español conviene transliterarlo. 'Quedemot' conserva la forma tradicional hispana aproximada y refleja la consonante inicial ק con qu-.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus tierras de pasto
  alternatives_spanish:
  - sus tierras comunes
  - sus tierras abiertas
  - sus pastizales
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto asociado a una ciudad, especialmente en contextos levíticos. 'Tierras de pasto' comunica en español la función espacial y agrícola sin perder la idea de terreno abierto; 'sus' conserva el posesivo referido a cada ciudad.
- source_word: מֵיפַעַת
  english_pob_choice: Mephaath
  chosen_spanish: Mefaat
  alternatives_spanish:
  - Mefaat
  - Mephaat
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera al español. 'Mefaat' adapta la forma al sistema gráfico hispano y mantiene cercanía con la forma hebrea y la convención inglesa.
- source_word: וְאֶת ... וְאֶת
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - con ... con
  - e ... e
  lexicon: BDB
  rationale: La partícula marca una lista coordinada de ciudades y sus terrenos. En español, 'y' reproduce con naturalidad el encadenamiento enumerativo sin añadir una relación no indicada por el hebreo.
translation_notes:
  revision_awareness: El audit trail inglés no registra cambios revisados; se sigue la lectura estable con traslitteración de los topónimos y la equivalencia funcional de מִגְרָשׁ como terreno abierto/asalto de pasto en un contexto de reparto de ciudades levíticas.
  spanish_consistency_notes:
  - Se usa 'y' para la coordinación repetida, en paralelo con el valor aditivo del hebreo.
  - Se evita 'SEÑOR' u otros términos teológicos porque el versículo no contiene nombres divinos ni vocabulario teológico explícito.
  - Se mantiene una solución transparente para מִגְרָשׁ que pueda armonizar con otros pasajes POB donde aparezcan 'tierras de pasto' o glosas afines.
