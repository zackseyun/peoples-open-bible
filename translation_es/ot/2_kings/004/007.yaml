    reason: lexical_alternative
  - marker: b
    text: O «paga a tu acreedor», si la forma subyacente se entiende con referencia a la persona a quien se debe en vez de a la deuda misma.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «tú y tus hijos varones vivirán del remanente» o «de lo restante».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para preservar con mayor exactitud el sentido fuente y el rastro POB: (1) «hijos varones» explicita בָּנַיִךְ como masculino específico; (2) «podrán vivir» refleja la idea de capacidad/provisión detrás de תִּחְיִי; (3) «de lo que quede» mantiene naturalidad española y recibe una nota literal sobre «el remanente»; y (4) las notas se reordenan y corrigen para que sus anclajes coincidan exactamente con el texto y con las alternativas documentadas en la auditoría inglesa.'
