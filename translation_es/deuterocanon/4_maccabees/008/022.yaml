  spanish_quality_summary: 'El borrador es claro, pero puede mejorarse en naturalidad y fluidez. «Bajo coacción» o «por fuerza» suena más idiomático que «bajo compulsión». Además, con «si» conviene un presente o subjuntivo más natural: «si, bajo coacción, tememos al rey» o «si, bajo coacción, llegamos a temer al rey». La mejor combinación aquí es directa y sobria.'
  glossary_alignment: No hay conflicto con la terminología marco del proyecto. «Justicia divina» sigue la decisión auditada para δίκη, y la nota léxica conserva correctamente las alternativas «juicio» y «castigo».
