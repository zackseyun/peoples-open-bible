translation:
  language: es
  text: ¡Yahvé vive[a]!, y bendita sea mi roca, y exaltado sea Dios, la roca de mi salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi roca salvadora» o «la roca de mi liberación».
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי יְהוָה
  english_pob_choice: Yahweh lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - ¡Yahvé vive!
  - ¡Vive el Yahvé!
  lexicon: HALOT
  rationale: La forma nominal-predicativa hebrea se expresa con una exclamación natural en español. Se conserva el orden enfático del nombre divino y el predicado vital sin convertirlo en una paráfrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre del pacto: Yahvé, no una sustitución por título. Esto mantiene la referencia explícita al Tetragrámaton.'
- source_word: וּבָר֣וּךְ
  english_pob_choice: and blessed be
  chosen_spanish: y bendito sea
  alternatives_spanish:
  - y bendito es
  - y sea bendito
  lexicon: HALOT
  rationale: En un contexto doxológico, el participio funciona como aclamación benedictoria. «Bendito sea» conserva mejor el valor desiderativo y solemne que un simple enunciado.
- source_word: צוּרִי
  english_pob_choice: my rock
  chosen_spanish: mi roca
  alternatives_spanish:
  - mi peña
  - mi refugio
  lexicon: HALOT
  rationale: Se mantiene la metáfora literal de «roca», que es la imagen establecida en la poesía bíblica para la firmeza y protección divina. «Peña» es posible, pero menos neutro en español moderno.
- source_word: וְיָרֻם
  english_pob_choice: and exalted be
  chosen_spanish: y enaltecido sea
  alternatives_spanish:
  - y sea exaltado
  - y exaltado sea
  lexicon: HALOT
  rationale: El jussivo se vierte con una forma desiderativa equivalente en español. «Enaltecido sea» mantiene el tono de alabanza y la paralelismo con «bendito sea».
- source_word: אֱלֹהֵי
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios de
  - mi Dios
  lexicon: HALOT
  rationale: Aquí el constructo se entiende en aposición poética con la expresión siguiente. «Dios» conserva la claridad española sin introducir una relación genitiva que el paralelismo no exige de manera obligatoria.
- source_word: צ֥וּר יִשְׁעִֽי
  english_pob_choice: the rock of my salvation
  chosen_spanish: la roca de mi salvación
  alternatives_spanish:
  - mi roca salvadora
  - la roca de mi liberación
  lexicon: HALOT
  rationale: Se preserva la metáfora del sustantivo «roca» y la cualidad salvadora con «salvación». «Liberación» es una alternativa válida, pero atenúa el registro más amplio de יֶשַׁע/ישׁע en este contexto de alabanza.
theological_decisions:
- issue: Cómo rendir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se traduce por el nombre propio «Yahvé» para conservar la identidad pactal y evitar el enmascaramiento por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Conservar la metáfora de צור para Dios
  english_pob_reading: rock
  chosen_spanish_reading: roca
  alternative_spanish_readings:
  - peña
  - refugio
  rationale: 'La imagen de «roca» es teológicamente central: expresa firmeza, estabilidad y protección divina. Traducirla literalmente preserva la metáfora bíblica en vez de interpretarla.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el texto hebreo recibido y con el auditor inglés: no se requiere corrección textual ni revisión de sentido. Se ha mantenido el paralelismo doxológico y la metáfora de «roca» sin suavizarla.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva «roca» para צור en ambas ocurrencias para mantener la cohesión metafórica.
  - 'La cadencia española respeta el paralelismo hebreo: declaración de vida, bendición, exaltación y epíteto final.'
