revisions:
- from: Instruye al muchacho[a] conforme a su camino; aun cuando envejezca, no se apartará de él.
  to: Instruye al muchacho[a] conforme a su camino[b]; aun cuando envejezca, no se apartará de ese camino.
  rationale: Se añade la nota alternativa ya documentada en el POB inglés para preservar la ambigüedad interpretativa del hebreo, y se reemplaza 'de él' por 'de ese camino' para una referencia final más clara y natural en español.
