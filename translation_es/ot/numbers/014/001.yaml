translation:
  language: es
  text: Entonces toda la congregación levantó la voz y clamaron[a], y el pueblo lloró aquella noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, ‘alzó [la] ... y dieron su voz’, un modismo para un clamor comunitario fuerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשָּׂא
  english_pob_choice: raised
  chosen_spanish: levantó
  alternatives_spanish:
  - alzó
  - elevó
  lexicon: HALOT
  rationale: El hebreo usa נָשָׂא en una expresión idiomática con ‘voz’. En español, ‘levantó su voz’ conserva la imagen de elevación sin sonar artificial.
- source_word: כָּל הָעֵדָה
  english_pob_choice: all the congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - toda la comunidad
  lexicon: HALOT
  rationale: ‘Congregación’ comunica bien עֵדָה como el grupo reunido de Israel y conserva el registro bíblico sin depender de una fórmula eclesiástica más cargada.
- source_word: וַיִּתְּנוּ אֶת קוֹלָם
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - alzaron la voz
  - dieron su voz
  - gritaron
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es ‘dieron su voz’, un modismo para un clamor fuerte. ‘Clamó’ funciona en español como equivalente natural para un grito comunitario intenso y permite mantener el paralelismo con ‘levantó su voz’.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: ‘עָם’ se refiere al pueblo en contraste estilístico con ‘la congregación’. ‘El pueblo’ conserva esa variación referencial sin perder naturalidad.
- source_word: וַיִּבְכּוּ
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - lloraron
  - se echaron a llorar
  lexicon: HALOT
  rationale: בכה significa ‘llorar/llorar de pena’. En español, ‘lloró’ mantiene la emoción del verbo y evita añadir intensidad no explícita en el hebreo.
- source_word: בַּלַּיְלָה הַהוּא
  english_pob_choice: that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - esa noche
  - esa misma noche
  lexicon: HALOT
  rationale: ‘Aquella noche’ es una equivalencia idiomática natural y solemne para בַּלַּיְלָה הַהוּא.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido del texto hebreo y la solución auditada del inglés POB: una acción comunitaria de alzar la voz seguida de llanto nocturno, manteniendo la distinción entre el clamor inicial y el llanto posterior.'
  spanish_consistency_notes:
  - Se evitó ‘voz’ singular porque en español ‘levantó su voz’ ya expresa naturalmente el modismo hebreo; ‘clamó’ cubre el valor de ‘dieron su voz’.
  - Se mantuvo la distinción semántica entre el clamor público de toda la congregación y el llanto del pueblo.
  - El registro es bíblico pero en español moderno, sin recurrir a fórmulas arcaizantes.
