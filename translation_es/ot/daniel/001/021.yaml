translation:
  language: es
  text: Y Daniel permaneció hasta el primer año del rey Ciro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Daniel estuvo allí hasta el primer año del rey Ciro». El verbo hebreo es literalmente «fue», pero aquí probablemente comunica presencia continua.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: remained
  chosen_spanish: permaneció
  alternatives_spanish:
  - estuvo
  - continuó
  - fue
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'y fue/estuvo', pero con sujeto personal y marcador temporal expresa continuidad de presencia. 'Permaneció' reproduce bien la idea de seguir estando hasta el momento señalado sin sonar artificial en español.
- source_word: דָּנִיֵּאל
  english_pob_choice: Daniel
  chosen_spanish: Daniel
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio en su forma habitual en español.
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta que
  lexicon: HALOT
  rationale: La preposición temporal indica límite de duración; 'hasta' es la equivalencia natural en español.
- source_word: שְׁנַת אַחַת
  english_pob_choice: the first year
  chosen_spanish: el primer año
  alternatives_spanish:
  - año uno
  - un año
  lexicon: HALOT
  rationale: La construcción con numeral funciona idiomáticamente como ordinal en este contexto de datación real; por eso se traduce 'el primer año'.
- source_word: לְכוֹרֶשׁ
  english_pob_choice: of Cyrus
  chosen_spanish: de Ciro
  alternatives_spanish:
  - para Ciro
  - perteneciente a Ciro
  lexicon: HALOT
  rationale: En la fórmula de datación, la ל marca el año correspondiente al reinado del monarca. En español, 'de Ciro' comunica correctamente esa relación.
- source_word: הַמֶּלֶךְ
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: Se conserva el título real explícito del hebreo con la forma natural 'el rey'. La secuencia 'Ciro, el rey' mantiene la estructura semítica sin forzarla.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del hebreo y con la audit trail inglesa: se mantiene la idea de continuidad de Daniel hasta el inicio del reinado de Ciro, usando un español natural y transparente. No hubo revisiones sustantivas en el pase reciente del inglés.'
  spanish_consistency_notes:
  - Se evita la mayúscula devocional para el título real, porque el hebreo no requiere una convención especial en español.
  - Se conserva la fórmula de datación regnal de manera clara y audit-able.
  - El verbo 'permaneció' mantiene la tensión léxica documentada entre literalidad ('estuvo/fue') e idiomaticidad contextual.
