review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva bien la estructura básica del hebreo: mantiene el cambio de persona entre “su” y “tus”, conserva los nombres propios principales y refleja la idea de apoyo aliado. Sin embargo, “fueron entre tus ayudantes” no representa bien la fuerza idiomática de בְּעֶזְרָתֵךְ; suena poco natural y menos fiel que una formulación como “estaban entre tus aliados” o “estaban entre los que te ayudaban”. Además, las notas c y d quedaron invertidas respecto de sus anclajes en el texto: [d] está colocado sobre “sin fin” aunque explica “Lubim”, y [c] está colocado sobre “sin fin” aunque explica “Put”.'
  spanish_quality_summary: El español es mayormente claro, pero “fueron entre tus ayudantes” es torpe y no suena idiomático en español bíblico natural. “Estaban entre tus aliados” fluye mejor, conserva la idea de fuerzas de apoyo y evita un calco extraño. También conviene corregir la ubicación de las notas para que sus marcadores aparezcan junto a los términos relevantes.
  glossary_alignment: 'La terminología onomástica está en general alineada con la POB: “Cush”, “Egipto”, “Put” y “los libios” son defendibles; el cambio gramatical de persona también se preserva correctamente. No hay conflicto con la terminología teológica del proyecto. La mejora principal es estilístico-lexical en la cláusula final y técnica en la colocación de notas.'
  issues:
  - severity: medium
    issue: La expresión “fueron entre tus ayudantes” es poco natural en español.
    rationale: Aunque intenta reflejar “among your helpers”, en español resulta forzada y poco elegante. El hebreo describe fuerzas de apoyo; “estaban entre tus aliados” o similar comunica mejor ese sentido relacional.
  - severity: medium
    issue: Los marcadores de notas [c] y [d] están anclados en un lugar incorrecto.
    rationale: La nota sobre “Put” debe anclarse en “Put”, y la nota sobre “Lubim/libios” debe anclarse en “libios”. En el borrador ambas aparecen tras “sin fin”, lo que rompe la correspondencia exigida entre texto y nota.
  - severity: low
    issue: El uso de “fueron” en la cláusula final puede sonar menos adecuado que “estaban”.
    rationale: Para una descripción de pertenencia a las fuerzas de apoyo, “estaban” suena más natural y estable en español que el pretérito puntual “fueron”.
  revised_spanish_text: Cush era su fuerza[a], y Egipto sin fin; Put[c] y los libios[d] estaban entre tus aliados.
  revised_footnotes:
  - marker: a
    text: 'El hebreo cambia de persona dentro del versículo: “Cush era su fuerza” (3.ª persona femenina) pero “tus aliados” (2.ª persona femenina). La traducción conserva ese cambio en lugar de suavizarlo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “Cush era tu fuerza”. Algunas traducciones armonizan el posesivo con el posterior “tus”, pero el sufijo hebreo en “fuerza” es de 3.ª persona femenina singular (“su”).'
    reason: alternative_reading
  - marker: c
    text: “Put” también se traduce tradicionalmente “Phut”.
    reason: lexical_alternative
  - marker: d
    text: Hebreo “Lubim”; probablemente pueblos libios.
    reason: cultural_note
  revision_rationale: 'Se revisa la cláusula final para un español más natural y fiel al sentido de apoyo aliado en contexto: “estaban entre tus aliados” comunica mejor el valor de בְּעֶזְרָתֵךְ que “fueron entre tus ayudantes”. Además, se corrigen los anclajes de notas para que [c] aparezca en “Put” y [d] en “libios”. Se conserva el cambio de persona documentado por la POB. La nota [b] sigue siendo válida como alternativa significativa aunque no requiere anclaje adicional en el texto principal.'
