translation:
  language: es
  text: Podrá darle cuarenta golpes[a], pero no más[b], para que no siga golpeándolo con muchos más golpes que estos y tu hermano no sea degradado ante tus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuarenta azotes» o «cuarenta golpes». El hebreo especifica el número cuarenta; no se nombra aquí el instrumento ni la forma exacta de cada golpe.'
    reason: lexical_alternative
  - marker: b
    text: «Tu hermano» aquí designa a un miembro de la comunidad del pacto; la ley limita el castigo para que no sea tratado como despreciable.
    reason: cultural_note
lexical_decisions:
- source_word: אַרְבָּעִים
  english_pob_choice: forty times
  chosen_spanish: cuarenta golpes
  alternatives_spanish:
  - cuarenta azotes
  - cuarenta azotes o golpes
  lexicon: HALOT
  rationale: El hebreo especifica el número cuarenta, pero no nombra el instrumento. En español, "golpes" conserva el carácter de conteo corporal sin introducir un término más técnico que el texto no explicita. "Azotes" es posible por contexto judicial, pero añade una concreción no expresada en el hebreo.
- source_word: יַכֶּנּוּ
  english_pob_choice: He may strike him
  chosen_spanish: Podrá darle
  alternatives_spanish:
  - Podrá golpearlo
  - Podrá azotarlo
  lexicon: HALOT
  rationale: La forma hiphil expresa la acción permitida por la ley. "Podrá darle" con "golpes" en el complemento transmite la autorización sin forzar un futuro simple. "Golpearlo" es cercano, pero "darle" enlaza naturalmente con el sustantivo de medida en español.
- source_word: לֹא יֹסִיף
  english_pob_choice: but no more
  chosen_spanish: pero no más
  alternatives_spanish:
  - y no más
  - pero no añadirá más
  lexicon: HALOT
  rationale: יסף tiene la idea de añadir o aumentar. "Pero no más" comunica con naturalidad el límite legal, de forma breve y fiel al sentido de prohibición de exceder la medida.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - a fin de que no
  lexicon: HALOT
  rationale: La partícula introduce una finalidad negativa o prevención. En español, "para que no" expresa bien el propósito preventivo y suena más natural que una fórmula demasiado arcaica.
- source_word: יֹסִיף לְהַכֹּתוֹ
  english_pob_choice: he go on to strike him
  chosen_spanish: siga golpeándolo
  alternatives_spanish:
  - continúe golpeándolo
  - siga dándole golpes
  lexicon: HALOT
  rationale: La construcción expresa continuar y añadir a la acción. "Siga golpeándolo" reproduce ese avance indebido de manera idiomática en español, sin perder el matiz de exceso.
- source_word: עַל אֵלֶּה
  english_pob_choice: than these
  chosen_spanish: que estas
  alternatives_spanish:
  - sobre estas
  - más que estas
  lexicon: HALOT
  rationale: En el contexto de "muchas más heridas", el hebreo compara con las ya determinadas. "Que estas" mantiene la comparación de exceso en un español claro y natural.
- source_word: מַכָּה רַבָּה
  english_pob_choice: many more blows
  chosen_spanish: muchas más heridas
  alternatives_spanish:
  - muchos más golpes
  - un gran castigo
  lexicon: HALOT
  rationale: La expresión hebrea puede denotar un golpe/castigo amplificado. "Heridas" subraya el efecto resultante del castigo corporal y evita repetir "golpes" de manera pesada; aun así, se conserva la idea de multiplicación excesiva. "Golpes" también sería válido, pero menos fluido aquí.
- source_word: וְנִקְלָה
  english_pob_choice: be degraded
  chosen_spanish: no sea degradado
  alternatives_spanish:
  - no sea humillado
  - no sea tratado como despreciable
  - no sea deshonrado
  lexicon: HALOT
  rationale: El nifal de קלה apunta a quedar hecho despreciable o deshonrado. "Degradado" preserva la fuerza social y jurídica del término, más amplia que una humillación meramente interna.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu compatriota
  - tu hermano de pacto
  - tu prójimo
  lexicon: HALOT
  rationale: La literalidad del hebreo es "tu hermano". En este contexto de comunidad del pacto, mantenerlo conserva la cercanía ética y la carga relacional del texto, sin neutralizarla.
- source_word: לְעֵינֶיךָ
  english_pob_choice: before your eyes
  chosen_spanish: ante tus ojos
  alternatives_spanish:
  - en tu presencia
  - a la vista de ti
  lexicon: HALOT
  rationale: La expresión idiomática conserva la visibilidad pública del hecho. "Ante tus ojos" es natural en español y retiene la fuerza moral de una degradación ocurrida abiertamente.
theological_decisions:
- issue: Kinship term in legal punishment limit
  english_pob_reading: your brother here means a fellow member of the covenant community; the law limits punishment so that he is not treated as contemptible.
  chosen_spanish_reading: tu hermano
  alternative_spanish_readings:
  - tu compatriota
  - tu hermano de pacto
  - tu prójimo
  rationale: Se mantiene el parentesco literal porque el punto teológico-jurídico del versículo es que el castigado sigue siendo parte de la comunidad del pacto. "Tu hermano" conserva esa tensión sin diluirla en una etiqueta social más genérica.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: 'Coincide con el contexto auditado en alto acuerdo: se preserva el límite numérico, la prohibición de excederlo, la cláusula de prevención, la comparación de exceso y el término de parentesco del pacto. No se detectaron revisiones previas aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva el tratamiento de parentesco "tu hermano" por su valor covenantal, evitando neutralizarlo.
  - '"Golpes" se usa para mantener la neutralidad del término hebreo; no se introduce "azotes" en el texto principal.'
  - La comparación final se hace idiomática en español sin borrar el matiz de exceso sobre la medida prescrita.
