translation:
  language: es
  text: 'Pero Moisés habló delante de Yahvé, diciendo: «He aquí, los hijos de Israel[b] no me han escuchado; entonces, ¿cómo me escuchará Faraón, siendo yo incircunciso de labios[a]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «incircunciso de labios», un modismo que expresa habla impedida o insuficiente; compárese Ex. 4:10.'
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas» para «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: But Moses spoke
  chosen_spanish: Pero Moisés habló
  alternatives_spanish:
  - Y Moisés habló
  - Entonces Moisés habló
  lexicon: HALOT
  rationale: La waw consecutiva avanza el relato; en español, 'Pero' conserva mejor el contraste implícito con el mandato previo y con la objeción de Moisés. 'Habló' mantiene el sentido básico de דבר sin añadir interpretación.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: '''לִפְנֵי'' expresa relación espacial/de comparecencia; ''delante de'' preserva el giro sin convertirlo en un simple ''a''. Se mantiene ''Yahvé'' según la terminología del proyecto para el nombre divino.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' conforme al estándar español del proyecto, preservando el nombre personal del Dios del pacto.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: Fórmula narrativa estándar para introducir discurso directo; 'diciendo' es natural y transparente.
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: HALOT
  rationale: La partícula llama la atención sobre la observación de Moisés. 'He aquí' conserva la fuerza discursiva con un registro digno y bíblico en español.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la forma hebrea בני con 'hijos de Israel', que es más transparente que una normalización a 'israelitas' y sigue siendo idiomática en español bíblico.
- source_word: לֹא שָׁמְעוּ אֵלַי
  english_pob_choice: have not listened to me
  chosen_spanish: no me han escuchado
  alternatives_spanish:
  - no me oyeron
  - no me obedecieron
  lexicon: HALOT
  rationale: שׁמע con אֶל comunica escuchar/atender. 'Han escuchado' mantiene el matiz de atención a la palabra de Moisés sin imponer el sentido más fuerte de 'obedecer'.
- source_word: וְאֵיךְ
  english_pob_choice: so how
  chosen_spanish: entonces, ¿cómo
  alternatives_spanish:
  - y cómo
  - así que, ¿cómo
  lexicon: HALOT
  rationale: La conjunción más interrogativa expresa inferencia causal. 'Entonces, ¿cómo' reproduce de manera natural la lógica de la objeción de Moisés.
- source_word: יִשְׁמָעֵנִי
  english_pob_choice: will Pharaoh listen to me
  chosen_spanish: me escuchará Faraón
  alternatives_spanish:
  - Faraón me oirá
  - Faraón me atenderá
  lexicon: HALOT
  rationale: Se mantiene la coherencia con שׁמע como 'escuchar'. El orden español antepuesto del objeto pronominal es natural y claro.
- source_word: וַאֲנִי
  english_pob_choice: since I am
  chosen_spanish: si yo soy
  alternatives_spanish:
  - puesto que soy
  - porque soy
  lexicon: HALOT
  rationale: La cláusula introduce la base de la objeción. 'Si yo soy' conserva de modo natural el valor explicativo/causal que el inglés auditado resolvió con 'since'.
- source_word: עֲרַל שְׂפָתָיִם
  english_pob_choice: uncircumcised in lips
  chosen_spanish: incircunciso de labios
  alternatives_spanish:
  - incircunciso en labios
  - de labios incircuncisos
  - poco apto para hablar
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal del hebreo para no aplanar la tensión literaria. 'Incircunciso de labios' es más transparente al original que una paráfrasis como 'poco apto para hablar', y mantiene visible el idiomático vínculo con la circuncisión.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el nombre del pacto. En español del proyecto se traduce como 'Yahvé' para preservar el nombre divino sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: The force of Moses' statement about his speech impediment
  english_pob_reading: uncircumcised in lips
  chosen_spanish_reading: incircunciso de labios
  alternative_spanish_readings:
  - incircunciso en labios
  - de labios incircuncisos
  - poco apto para hablar
  rationale: 'La frase mantiene la metáfora hebrea y su tensión teológica/literaria: Moisés se presenta como impedido o descalificado para hablar, pero el texto no precisa más allá de lo que la imagen permite.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it; #6: Readable modern Spanish'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último pase revisado del texto inglés auditado: conserva el nombre divino como nombre propio, mantiene la partícula de atención con registro formal (''He aquí''), y reproduce la cláusula causal con un equivalente natural en español. También conserva la metáfora hebrea de ''incircunciso de labios'' para no resolver la tensión léxica del original.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se mantiene 'hijos de Israel' por transparencia al hebreo, aunque 'israelitas' queda documentado como alternativa.
  - '''Escuchar'' se usa para שׁמע cuando el contexto trata de atender o hacer caso a una palabra.'
  - La metáfora 'incircunciso de labios' se conserva en el texto principal y se explica en nota, evitando una paráfrasis que suavice el original.
