translation:
  language: es
  text: Como el sol que resplandece sobre el palacio del rey[a], y como un arcoíris que aparece en la nube.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «el templo del Altísimo» en lugar de «el palacio del rey». El testimonio hebreo probablemente conserva una formulación variante, mientras que el griego aclara el marco cultual.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּשֶׁמֶשׁ / ἥλιος
  english_pob_choice: Like the sun
  chosen_spanish: Como el sol
  alternatives_spanish:
  - Como el sol
  - Al modo del sol
  lexicon: HALOT; LXX ἥλιος
  rationale: La comparación introducida por כ se vierte naturalmente con «como». «Sol» conserva la imagen poética directa y corresponde al paralelo griego.
- source_word: מְשַׁקֶּרֶת / ἐκλάμπων
  english_pob_choice: shining
  chosen_spanish: resplandeciendo
  alternatives_spanish:
  - brillando
  - irradiando
  lexicon: HALOT; LXX ἐκλάμπων
  rationale: El hebreo y el griego apuntan a una luz intensa que irradia. «Resplandeciendo» mantiene el valor poético y evita una traducción demasiado plana.
- source_word: אֶל הֵיכַל הַמֶּלֶךְ / ἐπὶ ναὸν Ὑψίστου
  english_pob_choice: on the palace of the king
  chosen_spanish: sobre el palacio del rey
  alternatives_spanish:
  - sobre el templo del rey
  - sobre la morada del rey
  lexicon: HALOT; LXX ναὸν Ὑψίστου
  rationale: El audit trail inglés optó por «palace of the king» por la acepción de היכל en este contexto. En español, «palacio» reproduce bien esa lectura y preserva el contraste con el paralelo griego, que interpreta el lugar como templo del Altísimo.
- source_word: וּכְקֶשֶׁת / τόξον
  english_pob_choice: like a rainbow
  chosen_spanish: como un arco iris
  alternatives_spanish:
  - como un arco
  - como un arco de colores
  lexicon: HALOT; LXX τόξον
  rationale: Aunque קשת puede significar «arco», el contexto «en la nube» y el paralelo inglés muestran que aquí se trata del fenómeno celeste. «Arco iris» es la equivalencia más clara en español.
- source_word: נִרְאֲתָה / φωτίζον
  english_pob_choice: appearing
  chosen_spanish: apareciendo
  alternatives_spanish:
  - siendo visto
  - visible
  lexicon: HALOT; LXX φωτίζον
  rationale: El nifal expresa el aparecer o ser visto. «Apareciendo» conserva el movimiento visual de la comparación poética.
- source_word: בֶעָנָן / ἐν νεφέλαις δόξης
  english_pob_choice: in the cloud
  chosen_spanish: en la nube
  alternatives_spanish:
  - entre las nubes
  - en una nube
  lexicon: HALOT; LXX νεφέλαις δόξης
  rationale: El hebreo está en singular y el inglés POB lo mantiene así. En español, «en la nube» sigue de cerca el hebreo y conserva la imagen concreta del arco iris.
theological_decisions:
- issue: 'Lugar descrito: hebreo ''palacio del rey'' frente al griego ''templo del Altísimo'''
  english_pob_reading: Retain the Hebrew-based main text 'palace of the king' while noting the Greek cultic alternative in a footnote.
  chosen_spanish_reading: Mantener «palacio del rey» en el texto principal, con nota sobre la variante griega «templo del Altísimo».
  alternative_spanish_readings:
  - templo del Altísimo
  - templo del rey
  rationale: 'La base hebrea conservada da «el rey» y el sentido inmediato de היכל en este pasaje permite «palacio». Sin embargo, el paralelo griego no es meramente ornamental: explícitamente sitúa la imagen en el ámbito cultual. La nota preserva esa tensión textual sin borrar ninguna de las dos tradiciones.'
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual translation input'
translation_notes:
  revision_awareness: La versión inglesa revisó la frase de «temple of the king» a «palace of the king» por precisión léxica respecto de הֵיכָל. La presente redacción sigue esa decisión y la combina con la evidencia griega, que interpreta el espacio como templo del Altísimo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto solo cuando el texto lo requiera; aquí no aparece el nombre divino, sino una perífrasis comparativa.
  - «Palacio» reproduce la decisión del audit trail inglés para היכל en este contexto, evitando el falso amigo «templo» en el texto principal.
  - La puntuación y la cadencia conservan el paralelismo poético de dos símiles unidos por «y».
