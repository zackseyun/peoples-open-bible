lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  lexicon: LSJ
  rationale: En este contexto de lista/censo, υἱοὶ funciona como fórmula genealógica para un linaje o grupo familiar. «Los hijos de» conserva mejor el estilo formal del registro que una paráfrasis más amplia como «los descendientes de».
- source_word: Φασσόρου
  english_pob_choice: Phassor
  chosen_spanish: Fasor
  alternatives_spanish:
  - Phassor
  - Fasur
  lexicon: LSJ
  rationale: El griego presenta un nombre propio transliterado en genitivo. En español se adapta como nombre propio simple, «Fasor», para mantener naturalidad tipográfica y lectura pública, sin desplazar el testimonio griego primario.
- source_word: χίλιοι διακόσιοι τεσσεράκοντα ἑπτά
  english_pob_choice: 1,247
  chosen_spanish: '1.247'
  alternatives_spanish:
  - mil doscientos cuarenta y siete
  lexicon: LSJ
  rationale: La secuencia numérica griega da claramente el total 1,247. En español se usa cifra por claridad en un registro censal; se conserva el valor exacto del original.
translation_notes:
  revision_awareness: El texto griego de 1 Esdras 5:25 es estable en este testimonio; el paralelo hebreo/masorético mencionado en el dossier presenta una lista y un número distintos, pero aquí se traduce únicamente la lectura griega como fuente primaria. No hubo revisiones aplicadas en el audit trail reciente.
  spanish_consistency_notes:
  - Se mantiene el orden breve de lista censal propio del original.
  - Se prefirió «Fasor» como adaptación española del nombre griego para evitar una transliteración híbrida innecesaria.
  - Se usó punto como separador de miles conforme a la convención española.
