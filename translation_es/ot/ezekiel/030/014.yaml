translation:
  language: es
  text: Dejaré desolada a Patros[a], prenderé fuego en Zoán[b], y ejecutaré juicios sobre No[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dejaré a Patros en ruinas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «encenderé fuego en Zoán». Lit.: «daré fuego en Zoán».'
    reason: lexical_alternative
  - marker: c
    text: No es la ciudad egipcia también conocida como Tebas.
    reason: cultural_note
lexical_decisions:
- source_word: וַהֲשִׁמֹּתִי
  english_pob_choice: I will make desolate
  chosen_spanish: Haré desolada
  alternatives_spanish:
  - devastaré
  - dejaré en ruinas
  lexicon: HALOT
  rationale: El causativo de שׁמם expresa causar desolación; en español, «hacer desolada» mantiene la fuerza resultativa y el tono profético sin alejarse del hebreo.
- source_word: פַּתְרוֹס
  english_pob_choice: Pathros
  chosen_spanish: Patros
  alternatives_spanish:
  - Pathros
  lexicon: nombre propio geográfico
  rationale: Se translitera el topónimo egipcio al español como «Patros», conservando la referencia geográfica sin traducirlo.
- source_word: וְנָתַתִּי אֵשׁ
  english_pob_choice: I will set fire
  chosen_spanish: pondré fuego
  alternatives_spanish:
  - encenderé fuego
  - prenderé fuego
  lexicon: HALOT
  rationale: La expresión literal es «dar fuego»; en español, «poner fuego» comunica de manera natural y fiel la acción destructiva, sin añadir un sujeto implícito distinto.
- source_word: בְּצֹעַן
  english_pob_choice: in Zoan
  chosen_spanish: en Zoán
  alternatives_spanish:
  - contra Zoán
  lexicon: nombre propio geográfico
  rationale: El ב locativo se refleja con «en», como ubicación del fuego; «Zoán» es la forma española natural del topónimo.
- source_word: וְעָשִׂיתִי שְׁפָטִים
  english_pob_choice: I will execute judgments
  chosen_spanish: ejecutaré juicios
  alternatives_spanish:
  - haré juicios
  - llevaré a cabo juicios
  lexicon: HALOT
  rationale: El hebreo usa un giro judicial típico de castigo. «Ejecutaré juicios» conserva la fuerza forense y punitiva del original mejor que una paráfrasis más suave.
- source_word: בְּנֹא
  english_pob_choice: on No
  chosen_spanish: sobre No
  alternatives_spanish:
  - contra No
  - en No
  lexicon: nombre propio geográfico
  rationale: Con una acción judicial punitiva en español, «sobre» expresa bien el blanco del juicio. «No» se conserva como topónimo.
theological_decisions:
- issue: Agencia directa de YHWH en el oráculo de juicio
  english_pob_reading: 'Render the first-person verbs straightforwardly as direct divine acts: ''I will make... I will set... I will execute.'''
  chosen_spanish_reading: 'Los verbos en primera persona se vierten de manera directa: «Haré... pondré... ejecutaré».'
  alternative_spanish_readings:
  - formas que sugieran solo permiso o causalidad indirecta
  rationale: El hebreo presenta a Yahvé como agente directo del juicio; el español debe conservar esa fuerza sin suavizarla.
  doctrine_reference: Translation philosophy §1, §3; default POB para YHWH
- issue: Naturaleza del sustantivo שְׁפָטִים en contexto profético
  english_pob_reading: I will execute judgments
  chosen_spanish_reading: ejecutaré juicios
  alternative_spanish_readings:
  - ejecutaré sentencias
  - haré justicia
  rationale: «Juicios» mantiene el plural intensivo y el matiz de actos punitivos judiciales; «sentencias» o «haré justicia» estrecharían o desplazarían el campo semántico.
  doctrine_reference: Uso profético y forense de שׁפטים
translation_notes:
  revision_awareness: 'El inglés POB de referencia mantiene una equivalencia óptima estable: «make desolate», «set fire», y «execute judgments», sin revisiones posteriores. La versión española sigue esa misma línea y conserva la tensión judicial y el carácter directo del habla divina.'
  spanish_consistency_notes:
  - Se usa «Patros» y «Zoán» como topónimos transliterados de manera uniforme.
  - Se conserva el tono profético con verbos futuros en primera persona singular.
  - «Ejecutaré juicios» evita diluir el matiz punitivo de שׁפטים.
  - Las notas al pie preservan las alternativas documentadas por el POB inglés y la identificación cultural de No/Tebas.
