translation:
  language: es
  text: 'Estas son las familias[a] de los simeonitas: veintidós mil doscientos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «clanes». El hebreo se refiere a subdivisiones de parentesco dentro de la tribu; se traduce «familias» por claridad en español.
    reason: El texto principal idealmente debería reflejar la precisión censal con «clanes», pero si se conserva una formulación más corriente, hace falta nota para preservar el matiz documentado por el POB inglés y evitar pérdida semántica.
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estas fueron
  lexicon: HALOT
  rationale: La forma hebrea es una presentación deíctica en una cláusula nominal. En español, «Estas son» mantiene el valor introductorio y la vivacidad del presente, como en el POB inglés.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: clans
  chosen_spanish: familias
  alternatives_spanish:
  - clanes
  lexicon: HALOT
  rationale: En este contexto censal y tribal, el término puede referirse a subdivisiones de parentesco. Se eligió «familias» porque en español comunica la estructura de linaje con naturalidad; «clanes» sería más técnico, pero menos transparente para lectura eclesial general. No se pierde el sentido tribal porque el contexto inmediato ya trata de las divisiones de Israel.
- source_word: הַשִּׁמְעֹנִי
  english_pob_choice: the Simeonites
  chosen_spanish: los simeonitas
  alternatives_spanish:
  - la tribu de Simeón
  - los descendientes de Simeón
  lexicon: HALOT
  rationale: El gentilicio singular hebreo con artículo funciona colectivamente. «Los simeonitas» reproduce de forma natural el grupo tribal colectivo que el inglés POB expresa con «the Simeonites».
- source_word: שְׁנַיִם וְעֶשְׂרִים
  english_pob_choice: twenty-two
  chosen_spanish: veintidós
  alternatives_spanish:
  - dos y veinte
  lexicon: HALOT
  rationale: Número cardinal compuesto normalizado en español. «Veintidós» es la forma idiomática y fiel al total hebreo.
- source_word: אֶלֶף
  english_pob_choice: thousand
  chosen_spanish: mil
  alternatives_spanish:
  - mil
  lexicon: HALOT
  rationale: En un total censal, el valor cardinal se expresa naturalmente con «mil»; equivale directamente al término hebreo dentro de la cifra.
- source_word: וּמָאתַיִם
  english_pob_choice: two hundred
  chosen_spanish: doscientos
  alternatives_spanish:
  - doscientos
  lexicon: HALOT
  rationale: Cierra la cifra total con el cardinal estándar español. La sintaxis numérica española pide la forma unida «doscientos».
translation_notes:
  revision_awareness: El pasaje está en alto acuerdo con la fuente hebrea y con el audit trail inglés; no hubo revisiones textuales ni decisiones teológicas controvertidas que requieran nota adicional.
  spanish_consistency_notes:
  - Se mantiene el estilo censal breve y declarativo del hebreo.
  - Se evitó una transliteración técnica como «clanes» para favorecer la lectura pública en español, sin alterar el referente tribal.
  - 'Se preserva el orden informativo básico del original: presentación + identificación tribal + total numérico.'
