translation:
  language: es
  text: Yahvé rescata la vida[a] de sus siervos, y ninguno de los que se refugian en él será tenido por culpable[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alma» para נֶפֶשׁ (nephesh), refiriéndose al ser viviente mismo; aquí «vida» refleja mejor el sentido del hebreo.
    reason: lexical_alternative
  - marker: b
    text: O «incurrirá en culpa» / «será condenado». El verbo hebreo lleva lenguaje forense de culpa.
    reason: alternative_reading
lexical_decisions:
- source_word: פּוֹדֶה
  english_pob_choice: redeems
  chosen_spanish: rescata
  alternatives_spanish:
  - redime
  - libra
  lexicon: HALOT
  rationale: El participio expresa la acción continua de librar mediante rescate; en español, «rescata» comunica bien la idea de salvación efectiva sin forzar un matiz técnico de redención que aquí podría sonar demasiado abstracto. «Redime» también es posible, pero «rescata» resulta más natural y conserva la fuerza de intervención salvadora.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton con la forma tradicional y académicamente común «Yahvé», en lugar de sustituirlo por un título.
- source_word: נֶפֶשׁ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - ser
  lexicon: HALOT
  rationale: En este contexto נֶפֶשׁ se refiere a la vida o al ser viviente completo, no a una noción técnica de «alma». «Vida» es la opción más clara y fiel en español.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus esclavos
  lexicon: HALOT
  rationale: Aunque עבד puede significar «esclavo», en este salmo la relación de pertenencia y servicio a Yahvé es la más visible. «Siervos» comunica esa pertenencia con naturalidad en español, sin perder la idea de sometimiento fiel.
- source_word: יֶאְשְׁמוּ
  english_pob_choice: will be held guilty
  chosen_spanish: será tenido por culpable
  alternatives_spanish:
  - será hallado culpable
  - incurrirá en culpa
  - será condenado
  lexicon: HALOT
  rationale: El verbo אשם tiene fuerza forense de culpa o responsabilidad. «Será tenido por culpable» preserva ese sentido judicial sin exagerarlo hasta «condenado», que podría ir más allá de lo que el hebreo exige aquí.
- source_word: הַחֹסִים בּוֹ
  english_pob_choice: those who take refuge in him
  chosen_spanish: los que se refugian en él
  alternatives_spanish:
  - los que buscan refugio en él
  - los que confían en él
  lexicon: HALOT
  rationale: חסה mantiene la imagen de refugio/sombra más que una simple confianza abstracta. «Se refugian en él» reproduce esa imagen bíblica de manera natural en español.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en un contexto de salvación
  english_pob_reading: Rendered as 'life' rather than 'soul.'
  chosen_spanish_reading: Se traduce como «vida», no como «alma».
  alternative_spanish_readings:
  - «alma» para enfatizar la interioridad
  - «persona» para destacar al sujeto
  rationale: El hebreo apunta al ser viviente preservado por Yahvé. «Vida» evita introducir una antropología dualista no exigida por el texto y conserva el énfasis en la preservación concreta del ser entero.
  doctrine_reference: Principio de primacía del texto original; evitar resolver tensiones antropológicas que el hebreo no resuelve explícitamente.
- issue: Fuerza de יֶאְשְׁמוּ
  english_pob_reading: 'Forensic acquittal language: ''will be held guilty.'''
  chosen_spanish_reading: 'Se mantiene el lenguaje forense: «será tenido por culpable».'
  alternative_spanish_readings:
  - «será condenado»
  - «incurrirá en culpa»
  - «será hallado culpable»
  rationale: La oposición con el rescate divino favorece una lectura judicial, pero conviene no estrecharla hasta una afirmación técnica sobre condena final. «Será tenido por culpable» preserva la tensión entre culpa y liberación.
  doctrine_reference: No sobretraducir hacia conclusiones doctrinales no explícitas; preservar la tensión teológica del hebreo.
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del inglés POB, que no introdujo cambios respecto del borrador aprobado; por eso la versión española mantiene la misma resolución léxica y forense, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el Nombre divino.
  - Se preserva el paralelismo entre rescate de la vida y ausencia de culpa.
  - «Se refugian en él» conserva la imagen poética del hebreo sin sustituirla por un mero sinónimo de confianza.
  - La nota [a] se ancla en «vida» porque el español requiere explicitar la alternativa léxica del hebreo נֶפֶשׁ.
