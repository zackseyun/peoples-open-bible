  text: But Zacchaeus stood and said to the Lord[a], “Look, Lord, I give half of my possessions to the poor, and if I have extorted anything from anyone[b], I repay it fourfold.”
  footnotes:
  - marker: a
    text: Or 'if I have defrauded anyone of anything.' The Greek verb can refer to extortion, exploitation, or defrauding, sometimes by false accusation.
    reason: lexical_alternative
  - marker: b
    text: The Greek present-tense verbs can also be understood as 'I will give' and 'I will repay,' expressing immediate resolve.
    reason: alternative_reading
