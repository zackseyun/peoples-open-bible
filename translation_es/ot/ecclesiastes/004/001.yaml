translation:
  language: es
  text: Entonces me volví y vi todas las opresiones que se hacen bajo el sol; y he aquí[a], el llanto de los oprimidos, y no tenían consolador. Y en la mano de sus opresores había poder[b], y no tenían consolador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los oprimidos que están bajo el sol». El participio pasivo hebreo puede referirse a personas oprimidas o, por extensión, a actos de opresión.
    reason: alternative_reading
  - marker: b
    text: Lit. «y de la mano de sus opresores, poder».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁבְתִּי
  english_pob_choice: Then I turned
  chosen_spanish: Entonces me volví
  alternatives_spanish:
  - Y volví
  - Luego me volví
  - Otra vez me volví
  lexicon: HALOT
  rationale: El hebreo שוב en Qohelet suele introducir una nueva observación. «Me volví» conserva el movimiento discursivo sin perder la imagen concreta; «entonces» reproduce bien el valor de encuadre narrativo.
- source_word: וָאֶרְאֶה
  english_pob_choice: and saw
  chosen_spanish: y vi
  alternatives_spanish:
  - y miré
  - y contemplé
  - y observé
  lexicon: HALOT
  rationale: ראה aquí indica observación directa. «Vi» es la forma más natural y fiel en español.
- source_word: כָּל הָעֲשֻׁקִים
  english_pob_choice: all the oppressions
  chosen_spanish: todos los oprimidos
  alternatives_spanish:
  - todas las opresiones
  - todos los actos de opresión
  - todos los oprimidos y oprimidas
  lexicon: HALOT
  rationale: La forma hebrea es un participio pasivo que puede referirse a personas o, por extensión, a realidades de opresión. Siguiendo la nota auditada del inglés, se mantiene aquí la lectura personal en el texto principal para no perder el eco de «los oprimidos», que luego se concreta en «el llanto de los oprimidos».
- source_word: אֲשֶׁר נַעֲשִׂים
  english_pob_choice: that are done
  chosen_spanish: que se hacen
  alternatives_spanish:
  - que son cometidos
  - que están siendo hechos
  - que ocurren
  lexicon: HALOT
  rationale: La construcción pasiva se expresa naturalmente en español con «se hacen». Aunque puede sonar amplia, conserva la pasividad del hebreo y funciona bien con la lectura de personas oprimidas dentro del verso.
- source_word: תַּחַת הַשָּׁמֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: bajo el sol
  alternatives_spanish:
  - debajo del sol
  - bajo el cielo
  lexicon: HALOT
  rationale: Es la expresión característica de Eclesiastés. «Bajo el sol» mantiene la fórmula tradicional y la conexión literaria del libro.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - he aquí
  - y, he aquí
  lexicon: HALOT
  rationale: «He aquí» conserva la fuerza de atención súbita y sigue siendo claro en español bíblico contemporáneo.
- source_word: דִּמְעַת הָעֲשֻׁקִים
  english_pob_choice: the tears of the oppressed
  chosen_spanish: el llanto de los oprimidos
  alternatives_spanish:
  - las lágrimas de los oprimidos
  - el llanto de los oprimidos
  - la lágrima de los oprimidos
  lexicon: HALOT
  rationale: Aunque דמעת es singular en forma, el español puede expresar mejor la escena con un sustantivo colectivo. «Llanto» comunica sufrimiento visible y continuo sin forzar un singular poco natural.
- source_word: וְאֵין לָהֶם מְנַחֵם
  english_pob_choice: and they had no comforter
  chosen_spanish: y no tenían consolador
  alternatives_spanish:
  - y no tenían quien los consolara
  - y no había consolador para ellos
  - y no había quien los consolara
  lexicon: HALOT
  rationale: מְנַחֵם funciona sustantivamente. «Consolador» conserva la sustantivación y la repetición del término en ambos miembros del verso.
- source_word: וּמִיַּד עֹשְׁקֵיהֶם כֹּחַ
  english_pob_choice: Power was in the hand of their oppressors
  chosen_spanish: En la mano de sus opresores había poder
  alternatives_spanish:
  - Y en la mano de sus opresores había poder
  - El poder estaba en la mano de sus opresores
  - Y del lado de sus opresores estaba el poder
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de la mano como sede de capacidad/poder. La colocación «había poder» reproduce el énfasis sobre la desigualdad de fuerzas sin sonar artificial en español.
- source_word: עֹשְׁקֵיהֶם
  english_pob_choice: their oppressors
  chosen_spanish: sus opresores
  alternatives_spanish:
  - los que los oprimen
  - sus explotadores
  - sus opresores
  lexicon: HALOT
  rationale: El participio activo de עשק designa a quienes oprimen. «Opresores» mantiene la conexión léxica con «oprimidos» y es claro para el lector.
- source_word: כֹּחַ
  english_pob_choice: Power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - capacidad
  - poder
  lexicon: HALOT
  rationale: «Poder» refleja bien la idea de fuerza efectiva o dominio en el contexto; en español suena más directo que «fuerza» para esta asimetría de poder.
- source_word: מְנַחֵם
  english_pob_choice: comforter
  chosen_spanish: consolador
  alternatives_spanish:
  - quien consuela
  - consuelo
  - consolador
  lexicon: HALOT
  rationale: El participio sustantivado se traduce con «consolador», opción natural y coherente con la repetición del cierre del verso.
theological_decisions:
- issue: Lectura de הָעֲשֻׁקִים en la cláusula inicial
  english_pob_reading: Rendered as 'oppressions' rather than 'the oppressed' in the main text
  chosen_spanish_reading: Se traduce como «los oprimidos» en el texto principal
  alternative_spanish_readings:
  - las opresiones
  - los actos de opresión
  rationale: La forma hebrea admite referencia a personas o a actos de opresión. Siguiendo el rastro auditado del inglés, se deja espacio a esa tensión en la nota; el texto principal adopta la lectura personal para hacer visible la transición del verso hacia «el llanto de los oprimidos».
  doctrine_reference: Translation philosophy §1, §5
- issue: Reproducción de la imagen de la mano en la segunda mitad del verso
  english_pob_reading: Power was in the hand of their oppressors
  chosen_spanish_reading: En la mano de sus opresores había poder
  alternative_spanish_readings:
  - El poder estaba en la mano de sus opresores
  - Había poder en la mano de sus opresores
  rationale: 'La imagen corporal de la «mano» es parte del argumento del verso: el poder está del lado de los opresores. Mantenerla ayuda a preservar la asimetría y el tono observacional de Qohelet.'
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el paquete fuente hebreo, la solución inglesa auditada y su nota sobre la ambigüedad de הָעֲשֻׁקִים. La formulación española conserva esa tensión: el texto principal opta por la lectura personal («los oprimidos») mientras la nota recoge la alternativa de «opresiones». También se preservó la repetición de מְנַחֵם con un mismo sustantivo («consolador») y la imagen de la mano/poder en la segunda cola.'
  spanish_consistency_notes:
  - Se mantuvo «bajo el sol» para la fórmula característica de Eclesiastés.
  - Se usó «Yahvé» por defecto en el proyecto, pero este verso no contiene el tetragrámaton.
  - «Consolador» se repite en ambas ocurrencias de מְנַחֵם para conservar el efecto retórico.
  - La traducción de הָעֲשֻׁקִים se señaló con nota porque el español exige elegir entre personas y opresiones, y el hebreo permite ambas posibilidades.
