  yaml_path: translation/nt/john/018/037.yaml
  text: 'Then Pilate said to him[a], “So then, are you a king?” Jesus answered, “You say that I am a king. For this I have been born, and for this I have come into the world: that I should bear witness to the truth. Everyone who is of the truth listens to my voice.”'
  footnotes:
  - marker: a
    text: 'Or, ''You say so: I am a king,'' or ''You say rightly that I am a king.'' The Greek wording is concise and can be heard as a qualified affirmation.'
    reason: alternative_reading
translation:
  language: ko
  text: '그러자 빌라도가 그에게 말하였습니다. 「그러면 당신은 왕입니까?」 예수께서 대답하셨습니다. 「당신이 내가 왕이라고 말하고 있습니다. 나는 이것을 위해 태어났으며, 이것을 위해 세상에 왔습니다. 곧 진리에 대하여 증언하기 위함입니다. 진리에 속한 사람은 누구나 내 목소리를 듣습니다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「당신이 그렇게 말하니, 나는 왕입니다」, 「당신이 옳게 말하니, 나는 왕입니다」. 헬라어 표현은 간결하며 자격을 둔 긍정으로도 들릴 수 있다.
    reason: lexical_alternative
