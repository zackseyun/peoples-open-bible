base_translation:
  language: en
  yaml_path: translation/ot/genesis/024/027.yaml
  text: And he said[a], “Blessed be Yahweh, the God of my master Abraham, who has not forsaken his steadfast love and his faithfulness from my master. As for me[b], Yahweh has led me on the way to the house of my master’s brothers.”
  footnotes:
  - marker: a
    text: Or “his lovingkindness and his truth.” The Hebrew pair often carries the sense of covenant loyalty and reliability.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “brothers”; here it refers to Abraham’s male kin/family line.
    reason: lexical_alternative
