review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la secuencia básica del hebreo: los insectos suben sobre toda la tierra de Egipto, se asientan por todo su territorio, y la plaga se presenta como incomparable antes y después. Sin embargo, hay desajustes importantes: ''saltamontes'' no es la opción bíblica más fiel para אַרְבֶּה en este contexto de plaga; ''muy pesados'' suena antinatural en español aplicado a insectos y no comunica bien el valor idiomático de כָּבֵד מְאֹד; y la última cláusula ''ni después de ellos volverá a haber así'' resulta poco natural y menos precisa que una formulación comparativa explícita.'
  spanish_quality_summary: 'El texto es mayormente comprensible, pero varias elecciones reducen la legibilidad eclesial y la naturalidad: ''los saltamontes'' debilita la identificación tradicional de la plaga de langostas; ''muy pesados'' suena coloquial o físicamente extraño; y ''volverá a haber así'' no es castellano fluido. Una revisión menor puede dejarlo fiel, claro y digno.'
  glossary_alignment: No hay términos teológicos mayores en juego. Léxicamente, conviene ajustar אַרְבֶּה a 'langostas' por uso bíblico y contexto de plaga devastadora. Se puede conservar la nota sobre el literal 'muy pesado' mientras el texto principal use 'muy grave', que refleja mejor el sentido idiomático de כָּבֵד מְאֹד en español.
  issues:
  - severity: medium
    issue: '''saltamontes'' para אַרְבֶּה'
    rationale: Aunque zoológicamente relacionado, en español bíblico y narrativo de las plagas la opción más reconocible y fiel es 'langostas'. 'Saltamontes' suena más genérico y menos alineado con la tradición textual de Éxodo.
  - severity: high
    issue: '''muy pesados[a]'' para כָּבֵד מְאֹד'
    rationale: Preserva el literalismo, pero en español aplicado a langostas resulta torpe y puede entenderse como una broma o como peso físico. El hebreo aquí describe intensidad/gravedad de la plaga; conviene expresarlo en el texto y dejar el literal en nota.
  - severity: medium
    issue: '''ni después de ellos volverá a haber así'' es poco natural'
    rationale: La cláusula hebrea expresa que no habrá otro caso semejante después. En español, una formulación como 'ni después de ellas volverá a haber algo semejante' comunica mejor el comparativo implícito.
  - severity: low
    issue: Repetición de 'Egipto'
    rationale: La repetición refleja el hebreo y no es error; puede conservarse sin problema por fidelidad. No requiere cambio sustancial.
