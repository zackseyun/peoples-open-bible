revisions:
- from: 'Y hablarás a los hijos de Israel: Cualquier hombre de entre los hijos de Israel[a], o del forastero que reside en Israel, que dé de su descendencia[b] a Moloc[c], ciertamente morirá; el pueblo de la tierra lo apedreará con piedras.'
  to: 'Y hablarás a los hijos de Israel: Cualquier hombre de entre los hijos de Israel, o del extranjero residente[a] en Israel, que dé de su descendencia[b] a Moloc[c], ciertamente será condenado a muerte; el pueblo de la tierra lo apedrearán con piedras.'
  rationale: Ajusté el texto para reflejar mejor el sentido judicial pasivo de מוֹת יוּמָת y la acción comunitaria plural de יִרְגְּמֻהוּ. También mejoré la naturalidad de «forastero que reside» a «extranjero residente», dejando la transparencia más literal en nota. Mantuve «los hijos de Israel», «descendencia», «Moloc» y «con piedras» por fidelidad al hebreo y al rastro léxico del POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:31:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro del POB en la mayoría de los puntos: conserva «los hijos de Israel», el distributivo «cualquier hombre», la referencia a Moloc y la ejecución por apedreamiento. Sin embargo, hay dos desajustes significativos con el sentido fuente y con las decisiones auditadas: (1) מוֹת יוּמָת es una fórmula judicial pasiva intensificada, mejor expresada en español como «ciertamente será condenado a muerte» o «sin falta se le dará muerte», no «ciertamente morirá», que debilita el matiz judicial; (2) יִרְגְּמֻהוּ es 3mp y debe concordar con «el pueblo» entendido colectivamente, por lo que «lo apedrearán» es preferible a «lo apedreará».'
  spanish_quality_summary: El español es claro y digno, pero «del forastero que reside en Israel» suena algo menos natural que «del extranjero residente en Israel» o «del forastero que habita en Israel». Además, «el pueblo de la tierra lo apedreará» presenta una incongruencia leve de número y «ciertamente morirá» suena menos jurídico de lo que exige el contexto legal. Con ajustes menores, el texto queda más fiel y más natural en español bíblico contemporáneo.
  glossary_alignment: No hay conflicto con los términos base del proyecto. «Moloc» es una forma española aceptable para Molech. «Los hijos de Israel» concuerda con la preferencia por preservar el parentesco hebreo. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La principal corrección es sintáctico-semántica, no glosarial.
  issues:
  - severity: high
    issue: «ciertamente morirá» no refleja bien el pasivo judicial de מוֹת יוּמָת
    rationale: La construcción hebrea intensifica una pena legal impuesta, no solo el hecho de morir. El POB inglés auditado eligió «shall surely be put to death» precisamente para preservar ese matiz. En español, «ciertamente morirá» puede entenderse como resultado genérico más que como sentencia.
  - severity: medium
    issue: «lo apedreará» no concuerda bien con יִרְגְּמֻהוּ ni con el sujeto colectivo
    rationale: El verbo hebreo está en plural masculino («lo apedrearán»). Aunque «el pueblo» puede tomar singular gramatical, aquí la acción recae en la colectividad; el plural refleja mejor el original y su fuerza legal comunitaria.
  - severity: low
    issue: «forastero que reside» es menos natural y menos transparente que una opción como «extranjero residente»
    rationale: El hebreo usa un sustantivo y verbo cognados. La nota ya preserva esto, por lo que el texto principal puede sonar más natural sin perder fidelidad. «Extranjero residente en Israel» es más idiomático para lectura amplia en español.
  revised_spanish_text: 'Y hablarás a los hijos de Israel: Cualquier hombre de entre los hijos de Israel, o del extranjero residente[a] en Israel, que dé de su descendencia[b] a Moloc[c], ciertamente será condenado a muerte; el pueblo de la tierra lo apedrearán con piedras.'
  revised_footnotes:
