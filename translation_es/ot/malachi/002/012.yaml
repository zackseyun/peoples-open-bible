    rationale: Aunque «¡Que Yahvé corte!» puede reflejar el matiz imprecatorio, en español bíblico continuo suena más natural y digno «Que Yahvé corte...», sin signo exclamativo, manteniendo igualmente el valor desiderativo.
  revised_spanish_text: Que Yahvé corte de las tiendas de Jacob al hombre que hace esto, al que está despierto[a] y al que responde, y al que presenta una ofrenda a Yahvé de los ejércitos.
  revised_footnotes:
