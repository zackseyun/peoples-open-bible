revisions:
- from: 'Y fue notificado a Jacob[a], y se dijo: «Mira, tu hijo José ha venido a ti». Entonces Israel se fortaleció y se sentó sobre la cama.'
  to: 'Y a Jacob se le informó[a], y se dijo: «Mira, tu hijo José ha venido a ti». E Israel se fortaleció y se sentó sobre la cama.'
  rationale: Se mejoró la naturalidad narrativa del español reemplazando «fue notificado a Jacob» por «a Jacob se le informó», que preserva mejor el impersonal del hebreo sin tono administrativo. También se eliminó «Entonces» porque no corresponde a un elemento explícito del original. Se mantuvieron el cambio de nombre Jacob/Israel, «Mira» para הִנֵּה, y «se fortaleció» según la decisión lexical documentada.
