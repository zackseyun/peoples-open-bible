translation:
  language: es
  text: 'Y tomaron en sus manos parte del fruto de la tierra, y nos lo bajaron, y nos dieron noticia[a], y dijeron: «La tierra que Yahvé nuestro Dios nos da es buena».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos informaron»; literalmente, «nos trajeron palabra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - se llevaron
  - recogieron
  lexicon: HALOT
  rationale: לקח en este contexto narrativo describe una acción simple de tomar. «Tomaron» mantiene la naturalidad del español sin cargar el verbo con matices no presentes en el hebreo.
- source_word: בְיָדָם
  english_pob_choice: in their hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - con ellos
  - de la mano
  lexicon: HALOT
  rationale: La expresión conserva el idiomatismo concreto del hebreo y subraya que el fruto fue transportado físicamente por ellos.
- source_word: מִפְּרִי הָאָרֶץ
  english_pob_choice: some of the fruit of the land
  chosen_spanish: algo del fruto de la tierra
  alternatives_spanish:
  - parte del fruto de la tierra
  - algunos frutos de la tierra
  lexicon: HALOT
  rationale: El מִן partitivo se expresa con «algo de», que comunica mejor que una traducción demasiado literal. «Fruto de la tierra» preserva la imagen del texto fuente.
- source_word: וַיּוֹרִדוּ אֵלֵינוּ
  english_pob_choice: brought it down to us
  chosen_spanish: nos lo trajeron
  alternatives_spanish:
  - nos lo trajeron desde arriba
  - nos lo bajaron
  lexicon: HALOT
  rationale: Aunque el hebreo incluye la idea direccional de «hacer bajar», en español «nos lo trajeron» comunica con claridad la entrega del fruto. Se evita una formulación forzada, pero se conserva el objeto directo con clítico.
- source_word: וַיָּשִׁבוּ אֹתָנוּ דָבָר
  english_pob_choice: they brought us back word
  chosen_spanish: nos dieron informe
  alternatives_spanish:
  - nos dieron palabra
  - nos reportaron
  lexicon: HALOT
  rationale: La locución שוב + דבר funciona como «traer noticia/informe». «Nos dieron informe» preserva el sentido de respuesta o reporte sin sonar arcaico en español. La alternativa inglesa «brought us back word» señala el valor idiomático, no una devolución física.
- source_word: דָבָר
  english_pob_choice: word
  chosen_spanish: informe
  alternatives_spanish:
  - palabra
  - mensaje
  - reporte
  lexicon: HALOT
  rationale: En esta construcción, דָבָר no se refiere a «palabra» aislada, sino al contenido de un reporte. «Informe» refleja mejor la función comunicativa del sustantivo en español.
- source_word: טוֹבָה הָאָרֶץ
  english_pob_choice: The land ... is good
  chosen_spanish: La tierra ... es buena
  alternatives_spanish:
  - La tierra ... es buena y fértil
  - La tierra ... es agradable
  lexicon: HALOT
  rationale: טוֹבָה expresa una valoración general positiva. «Buena» es la equivalencia más directa y fiel; no se añaden especificaciones como «fértil» que el hebreo no exige aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el Tetragrámaton. «Yahvé» mantiene la referencia al nombre propio divino sin sustituirlo por un título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios y Señor
  lexicon: HALOT
  rationale: Expresión de posesión pactual estándar. «Nuestro Dios» reproduce de forma directa el hebreo sin sobreinterpretación.
- source_word: נֹתֵן לָנוּ
  english_pob_choice: is giving us
  chosen_spanish: nos da
  alternatives_spanish:
  - nos está dando
  - nos está dando a nosotros
  lexicon: HALOT
  rationale: El participio puede comunicar acción continua o presente. En español, el presente simple «nos da» transmite bien la acción vigente de Dios y suena más natural y solemne en la frase citada.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo emplea directamente el Tetragrámaton. Se conserva el nombre divino en español como «Yahvé» para no ocultar el nombre pactual de Dios bajo un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El audit trail inglés pasó de «brought us back word» a «brought us word» para evitar redundancia, y de «giving to us» a «giving us» para suavidad. En español se refleja esa misma compactación con «nos dieron informe» y «nos da», manteniendo la fuerza del hebreo sin añadir elementos redundantes.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como nombre divino conforme al estándar del proyecto.
  - Se evitó «SEÑOR» para no ocultar el Tetragrámaton.
  - «Informe» se eligió para reflejar el idiomatismo verbal de דָבָר en este contexto; la nota conserva la alternativa más literal.
  - La puntuación final y la cita con comillas españolas siguen el registro bíblico moderno y legible en español.
