id: ACT.20.28
reference: Acts 20:28
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀προσέχετε ἑαυτοῖς καὶ παντὶ τῷ ποιμνίῳ, ἐν ᾧ ὑμᾶς τὸ πνεῦμα τὸ ἅγιον ἔθετο ἐπισκόπους, ποιμαίνειν τὴν ἐκκλησίαν τοῦ ⸀θεοῦ, ἣν περιεποιήσατο διὰ τοῦ ⸂αἵματος τοῦ ἰδίου⸃.
base_translation:
  language: en
  yaml_path: translation/nt/acts/020/028.yaml
  text: Pay careful attention to yourselves and to all the flock[a], in which the Holy Spirit has appointed you overseers, to shepherd the church of God[c][b], which he obtained through the blood of his own.
  footnotes:
  - marker: a
    text: Some manuscripts read 'the church of the Lord' instead of 'the church of God.'
    reason: textual_variant
  - marker: b
    text: Or 'which he obtained through the blood of his own Son'; traditionally, 'which he obtained with his own blood.'
    reason: alternative_reading
  - marker: c
    text: Or 'of his own'.
    reason: previous_rendering
translation:
  language: ko
  text: 여러분 자신과 모든 양 떼를 조심하십시오. 성령께서 여러분을 감독자로 그 가운데 세우사, 자기 피로 사신[a] 하나님의 교회를 치게 하셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 「διὰ τοῦ αἵματος τοῦ ἰδίου」(자기 피로)에서 「τοῦ ἰδίου」는 (1) 「(하나님) 자신의 (피)」로 읽혀 그리스도의 신성을 함의하는 강력한 기독론적 진술로 이해될 수 있으며, (2) 「자기에게 속한 분(아들)의 (피)」로 읽혀 「하나님의 사랑하시는 아들의 피로」를 함의할 수도 있다. 본 번역은 「자기 피로」로 옮겨 본문의 양면성과 강한 기독론적 음조를 함께 보존한다.
    reason: lexical_alternative
theological_decisions:
- issue: 20:28의 ἐκκλησίαν τοῦ θεοῦ ἣν περιεποιήσατο διὰ τοῦ αἵματος τοῦ ἰδίου — 「자기 피」의 기독론적 무게
  chosen_reading: 자기 피로 사신 하나님의 교회
  alternative_readings:
  - 자기에게 속한 분(아들)의 피로 사신 교회
  - 자기 아들의 피로 사신 교회
  rationale: τοῦ ἰδίου는 (1) 형용사적 — 「자기 자신의」(하나님 자신의 피, patripassianism 위험 있는 강한 기독론) 또는 (2) 명사적 — 「자기 자신의 분(곧 사랑하시는 아들)」 (롬 8:32과 평행)로 모두 읽힐 수 있다. 본 번역은 본문의 의도적 모호함과 강한 기독론적 음조를 모두 보존하기 위하여 직역 「자기 피로 사신」을 채택한다. 한국 전통 번역(개역개정)의 동일한 처리와도 일치하며, EN POB가 「he obtained through the blood of his own」으로 모호함을 보존한 것과 평행한다.
  doctrine_reference: 'DOCTRINE.md: christology and divine name; cf. Rom 8:32'
- issue: ἐκκλησίαν τοῦ θεοῦ의 번역어 선택
  chosen_reading: 하나님의 교회
  alternative_readings:
  - 하나님의 회중
  rationale: 에베소 장로들에 대한 사도의 작별 강설에서 ἐκκλησία는 양 떼·감독제 직제와 함께 등장하므로 제도적 의미의 「교회」가 적절하다. 글로사리 원칙(「제도적 의미가 분명할 때 교회」)에 부합한다.
  doctrine_reference: 'Glossary: ἐκκλησία'
