review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: mantiene la fórmula profética, usa «Yahvé» para יְהוָה, conserva el contraste económico entre חִנָּם y בְכֶסֶף, y traduce תִּגָּאֵלוּ con «redimidos», en línea con el audit trail. Sin embargo, hay un problema gramatical importante: נִמְכַּרְתֶּם y תִּגָּאֵלוּ son segunda persona plural («ustedes»), no tercera plural. «Fueron vendidos ... serán redimidos» rompe la correspondencia directa del discurso divino al pueblo; debe ser «fueron vendidos ... serán redimidos» con sujeto implícito de segunda persona o, mejor, «ustedes fueron vendidos ... serán redimidos». Además, la nota [a] está anclada en «por nada», pero explica כֶּסֶף («plata/dinero»), por lo que debe moverse a «dinero».'
  spanish_quality_summary: El español es claro y digno, pero la concordancia personal necesita reparación para sonar natural y fiel al hebreo dirigido al oyente. «Porque así dice Yahvé» funciona bien. Para mayor naturalidad y precisión en español, conviene explicitar «ustedes» en la primera cláusula, ya que de otro modo «fueron vendidos» puede leerse ambiguamente. El resto del registro es adecuado.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יְהוָה → «Yahvé»; גאל → «redimir»; כסף → «dinero» con alternativa «plata» en nota. No hay conflicto teológico relevante. La única corrección de glosario/forma es mantener la segunda persona plural del hebreo en ambas formas verbales y reubicar la nota al término correspondiente.'
  issues:
  - severity: high
    issue: Cambio indebido de segunda persona plural a tercera plural en el texto español
    rationale: El hebreo usa נִמְכַּרְתֶּם / תִּגָּאֵלוּ, ambas segundas personas plurales. El español «Fueron vendidos ... serán redimidos» omite y difumina esa referencia directa; en traducción bíblica al discurso profético conviene preservarla explícitamente como «Ustedes fueron vendidos ... serán redimidos».
  - severity: medium
    issue: La nota [a] está anclada al lugar incorrecto
    rationale: La nota explica el valor léxico de כֶּסֶף («plata/dinero»), pero el marcador aparece tras «nada», que corresponde a חִנָּם. Debe anclarse en «dinero[a]» o expresión equivalente.
  revised_spanish_text: 'Porque así dice Yahvé: «Ustedes fueron vendidos por nada, y serán redimidos sin dinero[a]».'
  revised_footnotes:
  - marker: a
    text: O, «sin plata». El hebreo כֶּסֶף puede referirse específicamente a plata, pero en este contexto probablemente significa dinero o pago en general.
    reason: lexical_alternative
  revision_rationale: Se corrige la persona gramatical para reflejar la segunda persona plural del hebreo y se mueve la nota al término que realmente comenta («dinero»/כֶּסֶף). El resto del texto se conserva por ser fiel, claro y alineado con la terminología del proyecto.
