translation:
  language: es
  text: Hizo la mesa de madera de acacia; su largo era de dos codos, su ancho de un codo y su alto de un codo y medio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un codo y medio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Fabricó
  lexicon: עשה
  rationale: El verbo עשה narra una acción pasada simple. «Hizo» es natural en español y conserva la fuerza directa del original sin añadir interpretación.
- source_word: הַשֻּׁלְחָן
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la tabla
  - la mesa del santuario
  lexicon: שֻׁלְחָן
  rationale: En español bíblico y moderno, «mesa» comunica con claridad el objeto descrito. «Tabla» sería menos natural aquí y «mesa del santuario» añade una aclaración que el hebreo no expresa en esta cláusula.
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: of acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de acacia
  - de madera de shittim
  lexicon: עֵץ / שִׁטָּה
  rationale: 'La frase constructa expresa material: «madera de acacia». «De acacia» también es posible, pero «de madera de acacia» es más explícito y transparente para lectores contemporáneos. Se evita «shittim» por opacidad en español.'
- source_word: אַמָּתַיִם
  english_pob_choice: two cubits
  chosen_spanish: dos codos
  alternatives_spanish:
  - dos cubitos
  - dos codos de medida
  lexicon: אַמָּה
  rationale: «Codo» conserva la unidad antigua de medida sin convertirla a una equivalencia moderna. Se mantiene la literalidad de la medida histórica.
- source_word: אָרְכּוֹ
  english_pob_choice: its length
  chosen_spanish: su largo
  alternatives_spanish:
  - su longitud
  - su largo
  lexicon: אֹרֶךְ
  rationale: En español, «largo» suena más natural que «longitud» en una descripción de dimensiones, y preserva el valor dimensional del sustantivo.
- source_word: וְאַמָּה רָחְבּוֹ
  english_pob_choice: its width one cubit
  chosen_spanish: su ancho de un codo
  alternatives_spanish:
  - y su ancho de un codo
  - su anchura de un codo
  lexicon: רֹחַב
  rationale: «Ancho» es la forma más natural y clara para la dimensión horizontal. Se omite el verbo copulativo porque el español lo entiende bien en esta estructura nominal.
- source_word: וְאַמָּה וָחֵצִי
  english_pob_choice: one and a half cubits
  chosen_spanish: de un codo y medio
  alternatives_spanish:
  - y medio codo
  - de un codo y medio
  lexicon: חֵצִי
  rationale: La expresión reproduce con precisión la medida del hebreo. «De un codo y medio» es idiomática y exacta en español.
- source_word: קֹמָתוֹ
  english_pob_choice: its height
  chosen_spanish: su alto
  alternatives_spanish:
  - su altura
  - su estatura
  lexicon: קֹמָה
  rationale: En un objeto, «alto» funciona naturalmente en español para la dimensión vertical. «Altura» también es posible, pero «alto» mantiene simetría con «largo» y «ancho».
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con la fuente hebrea y con la auditoría inglesa; no hay revisiones aplicadas en el tramo de referencia. Se conservó la secuencia descriptiva y la medida exacta, con una nota para explicitar la formulación hebrea del último miembro dimensional.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y descriptivo, apropiado para una lista de medidas y materiales.
  - Se prefirió vocabulario transparente («mesa», «madera de acacia», «codos») sobre tecnicismos opacos.
  - La nota al pie marca la equivalencia interna hebrea sin alterar el texto principal.
  - No se introdujeron términos doctrinales ni interpretaciones adicionales, porque el versículo es puramente descriptivo.
