  text: As they go[a], I will spread my net over them; like the birds of the heavens I will bring them down[b]. I will chasten them according to the report to their assembly.
  footnotes:
  - marker: a
    text: Or, 'I will chasten them' or 'I will punish them.' The Hebrew verb can denote corrective discipline or punitive chastisement.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult. It may also mean 'according to what was proclaimed in their assembly' or 'as their congregation has heard.'
    reason: alternative_reading
