  text: ὃ λέγω ὑμῖν ἐν τῇ σκοτίᾳ, εἴπατε ἐν τῷ φωτί· καὶ ὃ εἰς τὸ οὖς ἀκούετε, κηρύξατε ἐπὶ τῶν δωμάτων.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/010/027.yaml
  text: 'What I tell you in the darkness[a], say in the light; and what you hear in the ear[b], proclaim on the housetops.'
  footnotes:
  - marker: a
    text: Or 'in secret ... openly'; the Greek preserves the imagery 'in the darkness ... in the light.'
    reason: lexical_alternative
  - marker: b
    text: That is, what is heard privately is to be announced publicly; 'on the housetops' reflects the flat roofs of ancient houses used as visible places for public announcement.
    reason: cultural_note
translation:
  language: ko
  text: '내가 너희에게 어둠 속에서 말하는 것을 너희는 빛 가운데서 말하고, 너희가 귀에 듣는 것을 지붕 위에서 선포하라.'
  philosophy: optimal-equivalence
