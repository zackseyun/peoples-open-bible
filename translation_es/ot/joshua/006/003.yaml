  to: Ustedes marcharán alrededor de la ciudad[a], todos los hombres de guerra, rodeando la ciudad una vez. Así harás durante seis días.
  rationale: Se corrige el primer verbo para reflejar explícitamente la segunda persona plural del hebreo y preservar con claridad el cambio posterior al singular «harás». El resto del borrador ya era fiel, claro y consistente con las decisiones léxicas documentadas.
