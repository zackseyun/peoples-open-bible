  - severity: medium
    issue: «marco» para קֶרֶשׁ resulta poco natural en el contexto del tabernáculo en español.
    rationale: La decisión inglesa «frame» responde a su propio contexto idiomático. En español bíblico y arquitectónico, «tabla» o «tablón» comunica mejor el referente sin sobreinterpretar.
  - severity: low
