translation:
  language: es
  text: Si el ladrón no es hallado[a], el dueño de la casa se acercará a Dios para ver si no ha puesto su mano sobre la propiedad de su prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante los jueces»; el hebreo dice «a Dios», pero en algunos contextos legales esto puede referirse a jueces que actúan con autoridad divina.
    reason: alternative_reading
lexical_decisions:
- source_word: יִמָּצֵא הַגַּנָּב
  english_pob_choice: the thief is not found
  chosen_spanish: el ladrón no es hallado
  alternatives_spanish:
  - el ladrón no es descubierto
  - el ladrón no es encontrado
  lexicon: HALOT
  rationale: El nifal de מצא expresa aquí pasividad/resultado en un contexto legal. «Es hallado» conserva bien la relación con el hebreo y suena natural en español jurídico-bíblico; «descubierto» o «encontrado» también son posibles, pero «hallado» mantiene mejor la forma formal del original.
- source_word: וְנִקְרַב
  english_pob_choice: shall come near
  chosen_spanish: se presentará
  alternatives_spanish:
  - se acercará
  - comparecerá
  lexicon: HALOT
  rationale: En este contexto procesal, קרב en nifal puede entenderse como acercarse o comparecer ante una autoridad. «Se presentará» comunica con claridad la acción legal sin añadir detalles no explicitados; «comparecerá» sería más técnico y «se acercará» más literal pero menos natural para español moderno.
- source_word: בַּעַל הַבַּיִת
  english_pob_choice: the owner of the house
  chosen_spanish: el dueño de la casa
  alternatives_spanish:
  - el propietario de la casa
  - el amo de la casa
  - el jefe de la casa
  lexicon: HALOT
  rationale: בעל הבית designa al responsable/poseedor de la casa. «Dueño de la casa» es la forma más clara y directa en español; «propietario» es posible pero más legalista y menos fluido.
- source_word: אֶל הָאֱלֹהִים
  english_pob_choice: to God
  chosen_spanish: ante Dios
  alternatives_spanish:
  - a Dios
  - delante de Dios
  - ante los jueces
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a Dios». En español, en una fórmula judicial, «ante Dios» conserva la referencia directa y sugiere la comparecencia forense. Se mantiene la posibilidad de la lectura judicial alternativa en nota, sin borrar el valor léxico principal.
- source_word: שָׁלַח יָדוֹ
  english_pob_choice: whether he has not laid his hand on
  chosen_spanish: si no ha puesto su mano en
  alternatives_spanish:
  - si no ha echado mano a
  - si no ha extendido su mano sobre
  - si no ha tomado para sí
  lexicon: HALOT
  rationale: La locución hebrea expresa apropiación indebida o intervención ilícita. «Ha puesto su mano en» mantiene la imagen hebrea y es comprensible en español; evita traducirla demasiado pronto como «ha robado», porque el hebreo es más amplio que un robo formalmente definido.
- source_word: בִּמְלֶאכֶת רֵעֵהוּ
  english_pob_choice: his neighbor’s property
  chosen_spanish: los bienes de su prójimo
  alternatives_spanish:
  - la propiedad de su prójimo
  - la posesión de su prójimo
  - el encargo de su prójimo
  lexicon: HALOT
  rationale: מְלָאכָה puede referirse aquí al asunto/encargo bien confiado a otro, en un marco de bienes o responsabilidad económica. «Bienes» expresa de forma natural y suficientemente amplia el objeto afectado en este caso legal; «propiedad» es posible, pero algo más técnico y menos congruente con el uso bíblico amplio.
theological_decisions:
- issue: Sentido de אֱלֹהִים en el contexto legal
  english_pob_reading: to God, with a footnote allowing 'to the judges' as an alternative in some legal contexts
  chosen_spanish_reading: ante Dios, con nota que permite «ante los jueces» como alternativa
  alternative_spanish_readings:
  - ante los jueces
  - delante de los jueces
  rationale: El texto hebreo dice literalmente «a Dios». La traducción principal conserva ese valor directo; la nota preserva la interpretación judicial posible sin resolverla silenciosamente, siguiendo el audit trail de la POB inglesa.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el registro inglés auditado; no hubo revisiones textuales posteriores que afectaran la decisión principal. Se mantiene la ambigüedad jurídica de אֱלֹהִים en nota, sin desplazar el valor léxico directo del hebreo.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים conforme al criterio del proyecto, evitando la sustitución automática por «Señor».
  - Se conserva el tono jurídico-formal del versículo sin caer en un calco rígido.
  - «Dueño de la casa» y «bienes de su prójimo» son opciones españolas naturales que mantienen el sentido legal del hebreo.
  - El marcador de nota [a] aparece solo donde corresponde y la nota mantiene una alternativa relevante sin duplicar marcadores.
