revisions:
- from: 'Ve[a] y diles: «Vuelvan a sus tiendas».'
  to: 'Ve[a] y di: «Vuelvan a sus tiendas».'
  rationale: Se sustituye «diles» por «di:» para reflejar con mayor precisión el valor simple de אֱמֹר ('decir') preservado en el POB inglés, sin perder naturalidad en español. Se mantiene «Vuelvan a sus tiendas» como texto principal por su fidelidad a שוב + אָהֳלֵיכֶם, y se conserva la alternativa «Regresen a sus tiendas» en nota como opción léxica cercana.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:44:56Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia imperativa hebrea: לֵךְ + אֱמֹר לָהֶם + שׁוּבוּ לָכֶם לְאָהֳלֵיכֶם. Sin embargo, «diles» desplaza ligeramente el valor léxico de אֱמֹר (''di/decir'') hacia ''tell'', cuando el rastro inglés preserva deliberadamente ''say''.'
  spanish_quality_summary: 'El español es claro y natural, pero «Ve y diles» suena un poco más interpretativo que necesario. «Ve[a] y di[a] a ellos» sería torpe; la solución más natural y fiel es «Ve[a] y diles» o «Ve[a] y di:». Para mantener el acto de habla simple de אֱמֹר y la puntuación natural en español, conviene revisar a «Ve[a] y di: “Vuelvan a sus tiendas”».'
  glossary_alignment: 'No hay términos teológicos sensibles en juego. «Tiendas» alinea correctamente con אָהֳלֵיכֶם y preserva el trasfondo histórico. La nota alternativa debe corresponder mejor al hebreo/inglés: la alternativa natural es «Vayan de regreso a sus tiendas» o, más concisamente, «Regresen a sus tiendas»; el borrador ya ofrece esta última y es aceptable.'
  issues:
  - severity: medium
    issue: «diles» para אֱמֹר
    rationale: Aunque gramaticalmente posible, «diles» introduce un matiz de 'decirles/tell them' más fuerte que el simple 'say' documentado por el POB. «Di:» preserva mejor la sencillez del hebreo y del inglés auditado.
  - severity: low
    issue: Anclaje de nota en «Ve»
    rationale: La nota inglesa sobre 'Go back' se asocia a 'Go'. En español, anclarla en «Ve» sigue siendo defendible, pero la alternativa propuesta en la nota afecta en realidad más a la cláusula de retorno. Aun así, puede conservarse por paralelismo con el POB inglés.
  revised_spanish_text: 'Ve[a] y di: «Vuelvan a sus tiendas».'
  revised_footnotes:
  - marker: a
    text: 'O: «Regresen a sus tiendas».'
    reason: lexical_alternative
  revision_rationale: Se sustituye «diles» por «di:» para reflejar con mayor precisión el valor simple de אֱמֹר ('decir') preservado en el POB inglés, sin perder naturalidad en español. Se mantiene «Vuelvan a sus tiendas» como texto principal por su fidelidad a שוב + אָהֳלֵיכֶם, y se conserva la alternativa «Regresen a sus tiendas» en nota como opción léxica cercana.
