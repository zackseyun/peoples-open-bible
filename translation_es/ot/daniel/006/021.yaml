  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Dios» y «siervo» están bien usados en contexto. La decisión de no usar «esclavo» en el texto principal está justificada por la rationale documentada, pero la alternativa debe preservarse en nota. «Sirves» para פָּלַח también está bien y debe mantener la alternativa «adoras» en nota.
