id: 1CO.12.28
reference: 1 Corinthians 12:28
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ οὓς μὲν ἔθετο ὁ θεὸς ἐν τῇ ἐκκλησίᾳ πρῶτον ἀποστόλους, δεύτερον προφήτας, τρίτον διδασκάλους, ἔπειτα δυνάμεις, ⸀ἔπειτα χαρίσματα ἰαμάτων, ἀντιλήμψεις, κυβερνήσεις, γένη γλωσσῶν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/012/028.yaml
  text: And God has appointed in the church first apostles[a], second prophets, third teachers, then miracles, then gifts of healings, helps, administrations[c][b], kinds of tongues.
  footnotes:
  - marker: a
    text: Or 'works of power' for 'miracles.'
    reason: lexical_alternative
  - marker: b
    text: Or 'guidance' or 'forms of leadership' for 'administrations.'
    reason: lexical_alternative
  - marker: c
    text: Or 'kinds of languages.' The Greek term can mean 'tongues' or 'languages'; the main text preserves the ambiguity of Paul's wording in this context.
    reason: alternative_reading
translation:
  language: ko
  text: 하나님께서는 교회 안에 첫째로 사도들을, 둘째로 예언자들을, 셋째로 교사들을 두셨고, 그다음에 능력들을, 그다음에 치유의 은사들을, 또 돕는 일들을, 다스리는 일들을, 여러 종류의 방언을 두셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「여러 종류의 방언(γένη γλωσσῶν)」은 「여러 종류의 언어」로도 옮길 수 있다. 12:10과 같이 본문의 모호성을 보존한다.
    reason: alternative_reading
