id: PHM.1.14
reference: Philemon 1:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: χωρὶς δὲ τῆς σῆς γνώμης οὐδὲν ἠθέλησα ποιῆσαι, ἵνα μὴ ὡς κατὰ ἀνάγκην τὸ ἀγαθόν σου ᾖ ἀλλὰ κατὰ ἑκούσιον·
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/014.yaml
  text: But without your consent I wanted to do nothing[a], so that your good deed might not be as if by compulsion[c][b], but voluntary.
  footnotes:
  - marker: a
    text: Or 'without your approval' or 'without your opinion.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your goodness' or 'your kindness'; the Greek can refer either to Philemon's good action in this matter or, more abstractly, to his goodness.
    reason: lexical_alternative
  - marker: c
    text: Literally 'but according to what is voluntary'; that is, 'of your own free will.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 나는 그대의 동의[a] 없이는 아무것도 하고 싶지 않았습니다. 그대의 선한 행위[b]가 강요에 의한 것처럼 되지 않고 자원하는 것[c]이 되도록 하기 위함이었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그대의 승낙」 또는 「그대의 뜻」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「그대의 선함」 또는 「그대의 친절」. 헬라어는 빌레몬의 이 일에 대한 선한 행위, 또는 더 추상적으로 그의 선함을 가리킬 수 있다.
    reason: lexical_alternative
  - marker: c
    text: 직역하면 「자발적인 것에 따라」, 곧 「그대의 자유의지로」.
    reason: lexical_alternative
lexical_decisions:
- source_word: χωρὶς ... τῆς σῆς γνώμης
  english_pob_choice: without your consent
  chosen_korean: 그대의 동의 없이는
  alternatives_korean:
  - 그대의 승낙 없이는
  - 그대의 뜻 없이는
  lexicon: BDAG
  rationale: γνώμη는 의견·판단·의향·동의를 함께 담는다. 본 문맥은 빌레몬의 허락 없이는 행동하지 않으려는 바울의 신중함이므로 「동의」가 가장 자연스럽다.
- source_word: οὐδὲν ἠθέλησα ποιῆσαι
  english_pob_choice: I wanted to do nothing
  chosen_korean: 아무것도 하고 싶지 않았습니다
  alternatives_korean:
  - 아무것도 하기를 원치 않았습니다
  - 아무것도 행하지 않으려 했습니다
  lexicon: BDAG
  rationale: θέλω의 의지·바람. 합쇼체 「~고 싶지 않았습니다」가 개인적 의향의 무게를 자연스럽게 살린다.
- source_word: ἵνα μὴ
  english_pob_choice: so that ... might not
  chosen_korean: ~되지 않고 ... 되도록 하기 위함이었습니다
  alternatives_korean:
  - ~이 아니라 ... 이 되게 하려고
  lexicon: BDAG
  rationale: ἵνα μή ... ἀλλά 구조를 한국어 어순으로 자연스럽게 풀어내며, 합쇼체 종결 「~위함이었습니다」로 마무리한다.
- source_word: ὡς κατὰ ἀνάγκην
  english_pob_choice: as if by compulsion
  chosen_korean: 강요에 의한 것처럼
  alternatives_korean:
  - 부득이한 것처럼
  - 강제로 인한 것처럼
  lexicon: BDAG
  rationale: ἀνάγκη는 압박·강요. ὡς는 「~처럼」으로 부드럽게 한다. 「강요」가 본문의 무게를 살리며, 「강요에 의한 것처럼」이 ὡς를 자연스럽게 담아낸다.
- source_word: τὸ ἀγαθόν σου
  english_pob_choice: your good deed
  chosen_korean: 그대의 선한 행위
  alternatives_korean:
  - 그대의 선
  - 그대의 친절
  - 그대로부터 나오는 선
  lexicon: BDAG
  rationale: 중성 단수 형용사의 명사적 용법은 구체적 선한 행위를 가리킬 가능성이 가장 높다. 「선한 행위」가 자연스럽고, 추상적 「선함」 가능성은 각주에 둔다.
- source_word: ᾖ
  english_pob_choice: might be
  chosen_korean: 되도록
  lexicon: BDAG
  rationale: ἵνα + 현재가정법. 「되도록」으로 목적성을 살린다.
- source_word: ἀλλὰ κατὰ ἑκούσιον
  english_pob_choice: but voluntary
  chosen_korean: 자원하는 것
  alternatives_korean:
  - 기꺼이
  - 자유의지로
  - 자발적인 것
  lexicon: BDAG
  rationale: ἑκούσιος는 「자원하는, 자발적인」. 「자원하는 것」이 강요와의 대비를 가장 간결하고 분명히 살린다.
theological_decisions:
- issue: 빌레몬의 응답의 성격
  chosen_reading: 강요가 아닌 자원하는 응답을 강조하되, 구체적 행위는 본문이 명시하지 않은 채로 둠
  alternative_readings:
  - 추상적으로 「그대의 선함」으로 옮김
  - 더 구체적으로 「그대의 친절」로 옮김
  rationale: 본 절은 빌레몬 응답의 도덕적 성격(강요가 아닌 자원함)을 강조한다. 헬라어는 구체적 행위를 명시하지 않으므로 본 번역도 본문 이상의 구체화나 도덕적 함의를 더하지 않는다.
  doctrine_reference: 'Translation philosophy §1, §3, §6'
