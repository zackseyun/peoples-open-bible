translation:
  language: es
  text: Si un buey cornea a un hijo o a una hija, se le hará[a] conforme a este juicio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, se aplica al caso el mismo castigo legal establecido en el versículo anterior si el buey cornea a un hijo o a una hija.
    reason: cross_reference
  - marker: b
    text: 'O: «según esta norma» o «según esta ordenanza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - O
  lexicon: HALOT
  rationale: En este contexto casuístico, אוֹ introduce un caso legal alternativo dentro de la misma norma. En español jurídico natural, 'Si' comunica mejor la continuidad de la ley que 'O', que sonaría disyuntivo de forma más rígida.
- source_word: בֵן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un hijo varón
  - un hijo
  lexicon: HALOT
  rationale: La POB inglesa conserva el parentesco literal ('a son'). En español, 'hijo' mantiene el valor genealógico y el paralelo con 'hija'; añadir 'varón' sería redundante.
- source_word: יִגָּח
  english_pob_choice: it gores
  chosen_spanish: cornea
  alternatives_spanish:
  - hierra
  - da una cornada
  lexicon: HALOT
  rationale: El verbo נגח describe el acto específico de cornear/golpear con los cuernos. 'Cornear' es el equivalente más directo y legalmente preciso en español; mantiene la imagen zoológica sin explicarla de más.
- source_word: בַת
  english_pob_choice: a daughter
  chosen_spanish: una hija
  alternatives_spanish:
  - una hija
  - una muchacha
  lexicon: HALOT
  rationale: Se conserva la pareja hebrea hijo/hija para reflejar la simetría legal del texto y evitar una paráfrasis generacional menos exacta como 'muchacha'.
- source_word: כַּמִּשְׁפָּט הַזֶּה
  english_pob_choice: according to this judgment
  chosen_spanish: conforme a este juicio
  alternatives_spanish:
  - según este juicio
  - conforme a esta norma
  - de acuerdo con esta sentencia
  lexicon: HALOT
  rationale: משפט en contexto legal puede expresar juicio, norma o sentencia. 'Juicio' conserva la amplitud semántica que la POB inglesa dejó abierta con 'judgment', y 'conforme a' refleja bien la fórmula jurídica.
- source_word: יֵעָשֶׂה
  english_pob_choice: it shall be done
  chosen_spanish: se hará
  alternatives_spanish:
  - será hecho
  - se llevará a cabo
  lexicon: HALOT
  rationale: El nifal pasivo se vierte de manera natural en español con 'se hará'. Así se mantiene el tono legal pasivo del hebreo sin introducir un sujeto explícito que no está en el texto.
- source_word: לּוֹ
  english_pob_choice: to him
  chosen_spanish: con él
  alternatives_spanish:
  - para él
  - contra él
  lexicon: HALOT
  rationale: El sufijo pronominal remite al responsable legal en el contexto inmediato. La POB inglesa dice 'to him'; en español, 'con él' preserva la idea de la medida que se ejecuta sobre la persona implicada y suena más natural en una fórmula judicial breve.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado sin cambios según el expediente; por eso no se introducen lecturas alternativas no atestiguadas y se mantiene la estructura casuística del hebreo con una equivalencia óptima y sobria.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' en el proyecto cuando el hebreo contiene el nombre divino; este versículo no lo contiene.
  - Se conserva 'juicio' para משפט por su amplitud jurídica, en línea con la decisión inglesa 'judgment'.
  - Se evita 'señor/siervo' porque no corresponde a los lexemas de este versículo.
  - La relación hijo/hija se mantiene explícita para preservar la simetría legal del hebreo.
