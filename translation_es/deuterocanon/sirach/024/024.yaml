translation:
  language: es
  text: No fallen en la fuerza[a]; adhiéranse a él[b], para que sean fortalecidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No desfallezcan en su fuerza». El verbo puede significar fallar, cesar, desfallecer o cansarse.'
    reason: lexical_alternative
  - marker: b
    text: Esta línea aparece como un versículo añadido en algunas tradiciones textuales de Sirácida; el proyecto la conserva como el versículo 24 en la secuencia de este capítulo.
    reason: textual_variant
lexical_decisions:
- source_word: μὴ ἐκλίπητε
  english_pob_choice: Do not fail
  chosen_spanish: No desfallezcan
  alternatives_spanish:
  - No fallen
  - No cesen
  - No se debiliten
  lexicon: LEH
  rationale: ἐκλίπητε puede expresar fallar, cesar o desfallecer. En español, «desfallezcan» conserva la idea de perder vigor o decaer sin sonar excesivamente literal o ambigua en una exhortación.
- source_word: ἐν ἰσχύϊ
  english_pob_choice: in strength
  chosen_spanish: en la fuerza
  alternatives_spanish:
  - en la fuerza
  - en vigor
  - en poder
  lexicon: LEH
  rationale: ἰσχύς abarca fuerza, poder o vigor. «En la fuerza» es natural en español y mantiene el matiz de perseverar sin perder energía o firmeza.
- source_word: κολλᾶσθε
  english_pob_choice: cling
  chosen_spanish: adhiéranse
  alternatives_spanish:
  - abrácense a él
  - siéntanse unidos a él
  - péguense a él
  lexicon: LEH
  rationale: El medio/pasivo sugiere adherirse estrechamente. «Adhiéranse» conserva el impulso volitivo y la cercanía relacional de manera digna y clara en español.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: a él
  alternatives_spanish:
  - a él
  - a eso
  lexicon: LEH
  rationale: Aunque el pronombre puede ser formalmente neutro, el contexto exhortativo favorece una referencia personal. «A él» preserva la lectura covenantal/personal sin imponer una glosa innecesaria.
- source_word: κραταιωθῆτε
  english_pob_choice: be strengthened
  chosen_spanish: sean fortalecidos
  alternatives_spanish:
  - se fortalezcan
  - sean hechos fuertes
  - cobren fuerza
  lexicon: LEH
  rationale: 'El pasivo/subjuntivo expresa resultado: al adherirse a él, reciben fortaleza. «Sean fortalecidos» reproduce bien esa fuerza pasiva en español.'
theological_decisions:
- issue: Referencia de αὐτῷ
  english_pob_reading: him
  chosen_spanish_reading: a él
  alternative_spanish_readings:
  - a eso
  - al mismo
  rationale: Aunque el griego permite una lectura formal neutra, el sentido exhortativo en la tradición del POB favorece una referencia personal a Dios. «A él» mantiene esa fuerza teológica sin forzar el texto.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original con preservación natural del sentido teológico'
- issue: Estado textual del versículo en la tradición de Sirácida
  english_pob_reading: retain the added line in chapter sequence with a textual-variant footnote
  chosen_spanish_reading: retener la línea en la secuencia del capítulo con nota textual
  alternative_spanish_readings:
  - omitirla del cuerpo
  - marcarla solo en nota
  rationale: La práctica del proyecto es conservar la línea en la secuencia versicular y señalar su carácter de variante textual. Esto protege la auditabilidad y evita borrar una tradición atestiguada.
  doctrine_reference: 'POB editorial policy: transparencia textual y manejo visible de variantes'
translation_notes:
  revision_awareness: Se revisó el texto griego de Swete 1909 y el audit trail inglés. La decisión principal fue conservar la exhortación breve con equivalencia óptima en español, manteniendo la ambigüedad relevante de ἐκλίπητε y el estatus textual variante del versículo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece un reemplazo explícito del nombre divino.
  - Se prefirió un español moderno y reverente, evitando calcos como «pegaos» o «manteneos unidos» que sonarían menos naturales en lectura pública.
  - «Fortalecidos» conserva mejor el valor resultativo del pasivo que una paráfrasis más libre como «más firmes».
