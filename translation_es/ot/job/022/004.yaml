translation:
  language: es
  text: ¿Es por tu temor de él[a] que él te reprende[b] y entra en juicio contigo[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque le temes»; hebreo, literalmente: «desde/por tu temor».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «te reprueba» o «te corrige».'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «entra contigo en juicio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲמִיִּרְאָתְךָ
  english_pob_choice: because of your fear of him
  chosen_spanish: por tu temor[a]
  alternatives_spanish:
  - a causa de tu temor
  - por tu reverencia
  - porque temes a Dios
  lexicon: HALOT
  rationale: La construcción hebrea es causal e interrogativa; en español, "por" comunica bien la idea de causa. "Temor" conserva la ambivalencia de miedo/reverencia propia de יִרְאָה. El objeto implícito queda en el contexto inmediato; no se añade explícitamente en el texto principal para no sobretraducir.
- source_word: יֹכִיחֶךָ
  english_pob_choice: he reproves you
  chosen_spanish: te reprende[b]
  alternatives_spanish:
  - te reprueba
  - te corrige
  - litiga contigo
  lexicon: HALOT
  rationale: יׄכִיחַ en este contexto puede abarcar reprensión moral y dimensión forense. "Reprende" es natural en español y mantiene la fuerza correctiva sin cerrar indebidamente la lectura judicial que sigue en el paralelismo.
- source_word: יָבֹא עִמְּךָ בַּמִּשְׁפָּט
  english_pob_choice: enters into judgment with you
  chosen_spanish: entra en juicio contigo[c]
  alternatives_spanish:
  - entra contigo en juicio
  - comparece contigo en juicio
  - se presenta contigo en juicio
  lexicon: HALOT
  rationale: La imagen literal es "viene contigo al juicio"; "entra en juicio contigo" suena idiomático en español y preserva el marco judicial y adversarial. "Contigo" mantiene עִמְּךָ, y "juicio" traduce מִשְׁפָּט en su sentido legal.
theological_decisions:
- issue: Objeto implícito del temor en la primera cláusula
  english_pob_reading: The fear is directed toward God, rendered explicitly as 'your fear of him.'
  chosen_spanish_reading: El texto español deja el objeto implícito en la cláusula principal, sin añadir "de él" o "de Dios".
  alternative_spanish_readings:
  - por tu temor de él
  - por tu temor de Dios
  rationale: El hebreo usa un sufijo posesivo y el contexto ya identifica al referente. En español, explicitarlo puede ayudar a la claridad, pero también puede sonar más interpretativo de lo necesario. Se optó por una formulación breve que conserva la elipsis sin perder inteligibilidad.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza retórica de la pregunta de Elifaz
  english_pob_reading: A rhetorical question expecting 'no'
  chosen_spanish_reading: Se conserva la interrogación retórica sin reforzarla con palabras añadidas.
  alternative_spanish_readings:
  - ¿Acaso es por tu temor...?
  - ¿Es que por tu temor...?
  rationale: El contexto de Elifaz exige un cuestionamiento irónico. La traducción mantiene la forma interrogativa y el tono acusatorio sin explicitar una respuesta, para no ir más allá del valor del hebreo.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el audit trail inglés y no requiere revisión adicional; se preservan la causalidad interrogativa, la ambigüedad de יִרְאָה y la fuerza forense de מִשְׁפָּט.
  spanish_consistency_notes:
  - Se usa "temor" para יִרְאָה, manteniendo la posibilidad de reverencia sin perder el sentido básico de temor.
  - Se usa "reprende" para יכח en un contexto donde la cláusula siguiente ya aporta el matiz judicial.
  - Se usa "juicio" para מִשְׁפָּט por coherencia con el campo forense del verso.
