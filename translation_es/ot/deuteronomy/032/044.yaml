translation:
  language: es
  text: Entonces Moisés vino y habló todas las palabras de este cántico a oídos del pueblo, él y Hoshea[a] hijo de Nun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Hoshea»; en otros lugares esta figura suele llamarse «Josué» (véase Núm. 13:16).'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se presentó
  lexicon: HALOT
  rationale: En este contexto narrativo, בוא expresa la llegada/presencia de Moisés para recitar. «Vino» mantiene la simplicidad y naturalidad del movimiento narrativo, como «came» en el inglés POB, sin añadir dirección no explícita.
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - declaró
  lexicon: HALOT
  rationale: דבר en piel se traduce naturalmente como «hablar». «Habló» conserva el acto verbal directo de la recitación pública sin intensificarlo más de lo que permite el hebreo.
- source_word: אֶת כָּל דִּבְרֵי
  english_pob_choice: all the words
  chosen_spanish: todas las palabras
  alternatives_spanish:
  - todo el mensaje
  - todas las expresiones
  lexicon: HALOT
  rationale: La construcción indica integridad/completitud del contenido recitado. «Todas las palabras» conserva la forma y la amplitud del original con transparencia auditiva.
- source_word: הַשִּׁירָה הַזֹּאת
  english_pob_choice: this song
  chosen_spanish: este cántico
  alternatives_spanish:
  - esta canción
  - este poema
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «song», en español «cántico» comunica mejor el carácter solemne y litúrgico de la composición sin perder la referencia al género poético-cantado. «Canción» sonaría demasiado moderna y ligera; «poema» es posible pero menos anclado al uso bíblico.
- source_word: בְּאָזְנֵי הָעָם
  english_pob_choice: in the hearing of the people
  chosen_spanish: en presencia del pueblo
  alternatives_spanish:
  - a oídos del pueblo
  - en el oído del pueblo
  lexicon: HALOT
  rationale: El hebreo es literalmente «en los oídos de», pero la equivalencia idiomática en español debe conservar el acto público de recitación. «En presencia del pueblo» comunica bien la proclamación audible ante la comunidad; la alternativa más literal se preserva en nota.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la asamblea
  lexicon: HALOT
  rationale: «Pueblo» mantiene el sentido corporativo e histórico de la comunidad del pacto, más preciso que «gente» y suficientemente sobrio para el registro bíblico.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: 'El pronombre independiente se conserva por énfasis/aposición: «él y Hoshea hijo de Nun». En español, «él» refleja esa explicitud hebrea sin forzar la sintaxis.'
- source_word: וְהוֹשֵׁעַ
  english_pob_choice: Hoshea
  chosen_spanish: Hoshea
  alternatives_spanish:
  - Josué
  lexicon: HALOT
  rationale: El texto hebreo dice aquí הוֹשֵׁעַ, no el nombre ya cambiado «Josué». Seguir la forma fuente respeta la primacía del original y evita armonizar el verso con la forma más familiar.
- source_word: בִּן נוּן
  english_pob_choice: son of Nun
  chosen_spanish: hijo de Nun
  alternatives_spanish:
  - el hijo de Nun
  lexicon: HALOT
  rationale: La construcción patronímica se expresa de manera natural y formal como «hijo de Nun», adecuada para identificación narrativa.
theological_decisions:
- issue: Mantener la forma «Hoshea» en vez de armonizarla a «Josué»
  english_pob_reading: The Hebrew text here reads 'Hoshea,' not 'Joshua' (cf. Num 13:16 for the name change).
  chosen_spanish_reading: El texto sigue «Hoshea», no «Josué», porque el hebreo de este verso conserva esa forma del nombre.
  alternative_spanish_readings:
  - «Josué» para armonizar con el personaje conocido
  - «Oseas» como castellanización tradicional
  rationale: 'No se trata de una elección doctrinal sino textual: el verso presenta la forma hebrea הוֹשֵׁעַ. Conservarla documenta la diferencia de forma respecto del nombre posterior y evita ocultar la señal del texto fuente.'
  doctrine_reference: §1, §2 de la filosofía de traducción; Num. 13:16
- issue: Elegir un equivalente español para la expresión idiomática de audición pública
  english_pob_reading: in the hearing of the people
  chosen_spanish_reading: en presencia del pueblo
  alternative_spanish_readings:
  - a oídos del pueblo
  - en los oídos del pueblo
  rationale: La preocupación principal es preservar la recitación pública y audible. «En presencia del pueblo» da esa dimensión comunitaria de forma natural en español; la formulación más literal puede añadirse como nota para transparencia.
  doctrine_reference: Transparencia textual y equivalencia idiomática
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el auditoría inglesa: no se reportan revisiones aplicadas; la forma del nombre se conserva conforme al hebreo del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «cántico» para reflejar el género solemne de שירה en español sin perder la referencia a una composición cantada.
  - Se conservó «Hoshea» en consonancia con el texto hebreo del verso y con la nota alternativa documentada en el POB inglés.
