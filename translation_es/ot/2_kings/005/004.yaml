translation:
  language: es
  text: 'Entonces él entró y le informó a su amo[a], diciendo: «Así y así habló la muchacha que era de la tierra de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Modismo hebreo: «Así y así» o «tal y tal», que resume lo dicho sin repetirlo literalmente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: he went in
  chosen_spanish: entró
  alternatives_spanish:
  - fue
  - vino
  lexicon: HALOT
  rationale: בוא puede significar venir, ir o entrar según el punto de vista. Aquí el sentido narrativo de acceder a la presencia de su superior se expresa de forma natural con «entró».
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: lo dijo
  alternatives_spanish:
  - se lo contó
  - lo reportó
  - lo comunicó
  lexicon: HALOT
  rationale: נגד en hifil tiene el valor de contar, informar o hacer saber. Dado que el siguiente discurso directo explica el contenido, «lo dijo» mantiene la función reportativa con español natural.
- source_word: לַאדֹנָיו
  english_pob_choice: his master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su jefe
  lexicon: HALOT
  rationale: אָדוֹן puede ser señor, amo o maestro según el contexto. En una relación de superioridad personal y servidumbre, «su señor» conserva dignidad y la relación de dominio sin volverlo demasiado moderno.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y le dijo
  lexicon: HALOT
  rationale: La fórmula de introducción al discurso directo se refleja con «diciendo», que mantiene el giro hebreo sin sobrecargar la sintaxis española.
- source_word: כָּזֹאת וְכָזֹאת
  english_pob_choice: Thus and thus
  chosen_spanish: Así y así
  alternatives_spanish:
  - Tal y tal
  - Esto y esto
  lexicon: HALOT
  rationale: El hebreo es un modismo que resume el contenido sin repetirlo palabra por palabra. «Así y así» reproduce esa función idiomática en español con buen nivel de registro.
- source_word: דִּבְּרָה
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: דבר es el verbo general para hablar. «Habló» conserva el valor verbal pleno del hebreo y encaja con el modismo siguiente.
- source_word: הַנַּעֲרָה
  english_pob_choice: the girl
  chosen_spanish: la muchacha
  alternatives_spanish:
  - la joven
  - la niña
  - la muchacha esclava
  lexicon: HALOT
  rationale: נַעֲרָה puede ser muchacha o joven. Como el hebreo no especifica aquí el estatus servil en el sustantivo mismo, «la muchacha» refleja mejor el término base sin añadir información no explícita.
- source_word: מֵאֶרֶץ יִשְׂרָאֵל
  english_pob_choice: from the land of Israel
  chosen_spanish: de la tierra de Israel
  alternatives_spanish:
  - de Israel
  - de la tierra de Israel
  lexicon: HALOT
  rationale: אֶרֶץ significa tierra/país/territorio. «De la tierra de Israel» preserva la referencia geográfica y la fuerza concreta del hebreo mejor que una simple «de Israel».
theological_decisions:
- issue: Relación de autoridad en לַאדֹנָיו
  english_pob_reading: his master
  chosen_spanish_reading: su señor
  alternative_spanish_readings:
  - su amo
  - su jefe
  rationale: No hay una decisión doctrinal fuerte aquí, pero sí una opción de tono. «Señor» conserva la relación de subordinación del contexto sin confundirla con el nombre divino, ya que el referente es humano y el versículo no usa el tetragrámaton ni κύριος en sentido teológico.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del audit trail: conserva la estructura de reporte («entró… y lo dijo… diciendo») y el modismo resumidor del hebreo, evitando una paráfrasis coloquial. También mantiene «la tierra de Israel» como equivalencia directa de אֶרֶץ יִשְׂרָאֵל.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico moderno y sobrio, evitando el calco excesivo pero preservando la estructura narrativa.
  - «Señor» se usa aquí solo para traducir אָדוֹן en contexto humano; no implica el nombre divino.
  - La nota [a] está anclada en el modismo «Así y así» para explicar su valor idiomático.
