translation:
  language: es
  text: ¿Quién ha planeado esto contra Tiro, la que otorga coronas, cuyos comerciantes son príncipes, cuyos negociantes son los honorables de la tierra[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «cananeos»; en este contexto, el término probablemente significa «negociantes» o «comerciantes».
    reason: alternative_reading
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién ha sido
  lexicon: HALOT
  rationale: La pregunta retórica en español se expresa naturalmente con «¿Quién». Mantiene el tono de indagación profética sin añadir matices innecesarios.
- source_word: יָעַץ
  english_pob_choice: has planned
  chosen_spanish: ha planeado
  alternatives_spanish:
  - ha dispuesto
  - ha pensado
  - ha aconsejado
  lexicon: HALOT
  rationale: En este contexto de juicio contra Tiro, «ha planeado» conserva la idea de intención deliberada y es natural en español. Evita el tono más arcaico de «ha aconsejado».
- source_word: צֹר
  english_pob_choice: Tyre
  chosen_spanish: Tiro
  alternatives_spanish:
  - Tiro
  - Tiria
  lexicon: HALOT
  rationale: Se usa el nombre bíblico habitual en español, «Tiro», que corresponde a la ciudad fenicia mencionada en el texto.
- source_word: הַמַּעֲטִירָה
  english_pob_choice: the bestower of crowns
  chosen_spanish: la que otorga coronas
  alternatives_spanish:
  - la coronadora
  - la que corona
  - la otorgadora de coronas
  lexicon: HALOT
  rationale: La forma participial femenina sugiere a Tiro como agente que «corona» o confiere estatus real/riqueza. «La que otorga coronas» preserva mejor la metáfora activa que una adaptación más libre.
- source_word: סֹחֲרֶיהָ
  english_pob_choice: merchants
  chosen_spanish: comerciantes
  alternatives_spanish:
  - mercaderes
  - traders
  - negociantes
  lexicon: HALOT
  rationale: «Comerciantes» comunica con claridad el campo semántico del comercio y es idiomático en español contemporáneo. Mantiene la imagen económica elevada del verso.
- source_word: שָׂרִים
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - principes
  - gobernantes
  - nobles
  lexicon: HALOT
  rationale: «Príncipes» preserva el rango social alto que el hebreo atribuye a los comerciantes de Tiro. Aunque puede sonar fuerte, refleja bien la paralelización poética.
- source_word: כִּנְעָנֶיהָ
  english_pob_choice: traders
  chosen_spanish: negociantes
  alternatives_spanish:
  - cananeos
  - mercaderes
  - traders
  lexicon: HALOT
  rationale: Aunque literalmente puede leerse «cananeos», el contexto comercial y la nota auditada del POB inglés favorecen un sentido ocupacional. «Negociantes» ofrece una segunda palabra comercial que evita repetir exactamente «comerciantes» y mantiene el paralelismo.
- source_word: נִכְבַּדֵּי אָרֶץ
  english_pob_choice: the honored ones of the earth
  chosen_spanish: los honrados de la tierra
  alternatives_spanish:
  - los honorables de la tierra
  - los nobles de la tierra
  - los honrados de la tierra
  lexicon: HALOT
  rationale: «Los honrados de la tierra» reproduce la fuerza de dignidad/peso del participio pasivo. «De la tierra» conserva el alcance amplio e internacional del hebreo mejor que «del país».
theological_decisions:
- issue: Sentido de הַמַּעֲטִירָה aplicado a Tiro
  english_pob_reading: the bestower of crowns
  chosen_spanish_reading: la que otorga coronas
  alternative_spanish_readings:
  - la coronadora
  - la ciudad que corona
  rationale: Se mantiene la lectura de Tiro como agente que confiere corona/estatus a otros, no solo como ciudad coronada. Esto preserva la tensión metafórica señalada en el audit trail inglés.
  doctrine_reference: No aplica; decisión léxico-poética basada en el hebreo y el audit trail.
- issue: Sentido de כִּנְעָנֶיהָ en el paralelismo
  english_pob_reading: traders
  chosen_spanish_reading: negociantes
  alternative_spanish_readings:
  - cananeos
  - mercaderes
  rationale: La lectura comercial es la preferida por el contexto poético y por la nota inglesa, aunque el hebreo literal dice «cananeos». Se evita borrar esa tensión al no usar una traducción étnica en el texto principal, pero se deja abierta la lectura alternativa en nota.
  doctrine_reference: No aplica; decisión semántica contextual.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el cierre revisado del audit trail inglés, que corrigió la imagen de Tiro de «la coronada» a «la que otorga coronas». También conserva la observación auditada de que כִּנְעָנֶיהָ puede significar ocupacionalmente «comerciantes/negociantes», sin borrar la lectura literal étnica.
  spanish_consistency_notes:
  - Se usa «Tiro» para la ciudad y «Yahvé» no aparece en este versículo.
  - Se eligió «la que otorga coronas» para mantener la metáfora activa del participio hebreo.
  - «Comerciantes» y «negociantes» se alternan para reflejar el paralelismo sin perder el campo semántico comercial.
  - «Los honrados de la tierra» conserva el valor de prestigio/ponderación del hebreo, en línea con la decisión inglesa de «the honored ones of the earth».
