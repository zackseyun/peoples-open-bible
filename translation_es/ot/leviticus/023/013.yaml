review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte el hebreo: mantiene la estructura de la ofrenda vegetal/grano, la cantidad, la harina fina, el aceite, la dedicación a Yahvé, la fórmula de aroma agradable y la libación de vino con su medida. Sin embargo, hay dos puntos mejorables frente al origen y al rastro auditado: (1) «amasada con aceite» es más específico que בְּלוּלָה בַשֶּׁמֶן, que solo indica ‘mezclada con aceite’; (2) «ofrenda encendida» no refleja con suficiente precisión el tecnicismo אִשֶּׁה ni la alternativa inglesa documentada ‘offering by fire’.'
  spanish_quality_summary: El español es claro y digno, pero «ofrenda vegetal» suena menos natural y menos establecido en registro bíblico que «ofrenda de grano» o «ofrenda de cereal». «Flor de harina» es bueno. «Para Yahvé» funciona, aunque «a Yahvé» encaja mejor con la dedicación cultual inmediata. La frase general fluye bien.
  glossary_alignment: Se alinea bien con la pauta del proyecto al usar «Yahvé». No hay conflicto con otros términos mayores. Para מִנְחָה conviene una formulación más natural en español eclesial; para אִשֶּׁה conviene conservar la nota alternativa ligada al fuego de manera más fiel al expediente inglés.
  issues:
  - severity: medium
    issue: «amasada con aceite» sobretraduce בְּלוּלָה בַשֶּׁמֶן
    rationale: El hebreo indica que la harina está mezclada/combinada con aceite, no necesariamente amasada. «Mezclada con aceite» preserva mejor el sentido sin añadir proceso culinario específico.
  - severity: medium
    issue: «ofrenda encendida» no expresa con claridad el tecnicismo sacrificial de אִשֶּׁה
    rationale: La evidencia inglesa conserva como alternativa explícita ‘offering by fire’. En español, «ofrenda encendida» resulta poco idiomática y algo ambigua; «ofrenda de alimento» con nota «o, ofrenda por fuego» reproduce mejor la decisión auditada y mantiene inteligibilidad.
  - severity: low
    issue: «ofrenda vegetal» es comprensible pero menos natural que otras opciones
    rationale: Aunque semánticamente cercana, en español bíblico general suena menos establecida. «Ofrenda de grano» comunica mejor el valor cultual de מִנְחָה sin exceso de tecnicismo.
  - severity: low
    issue: «para Yahvé» puede mejorarse a «a Yahvé»
    rationale: En esta construcción sacrificial, «a Yahvé» suena más directo y natural en español para marcar destino/dedicación de la ofrenda.
  revised_spanish_text: Su ofrenda de grano será de dos décimas de efa de flor de harina mezclada con aceite, una ofrenda de alimento[a] a Yahvé, de aroma agradable; y su libación será vino, la cuarta parte de un hin.
  revised_footnotes:
  - marker: a
    text: O «ofrenda por fuego».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para reflejar con más precisión el hebreo y la auditoría inglesa: «ofrenda de grano» mejora la naturalidad de מִנְחָה; «mezclada con aceite» evita la sobreespecificación de «amasada»; y «ofrenda de alimento» con nota «o, ofrenda por fuego» reproduce mejor la tensión léxica documentada para אִשֶּׁה. Se mantiene «Yahvé» conforme a la pauta del proyecto.'
