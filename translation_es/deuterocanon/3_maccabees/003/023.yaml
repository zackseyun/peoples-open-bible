    text: Or, more literally, 'by word and by silence,' implying both open and tacit hostility.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the honorable civic order' renders πολιτεία broadly as the valued civic arrangement or constitution, not merely individual citizenship.
    reason: lexical_alternative
  - marker: c
    text: Or 'under the most impious pretext' for 'driven by the most impious pretext.'
    reason: alternative_reading
