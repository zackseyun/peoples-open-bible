  text: 'Y Faraón dijo a José: «Mira, te he puesto sobre toda la tierra de Egipto».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Y ... habló
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Y ... dijo» conserva el flujo narrativo hebreo sin sobreinterpretar la secuencia. «Dijo» mantiene la sobriedad del discurso directo.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el Faraón
  lexicon: HALOT
  rationale: Es el título real convencional en español bíblico y corresponde al nombre/título del personaje en Génesis.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: 'En español, la dirección del habla se expresa naturalmente con «a» antes del destinatario: «dijo a José».'
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: HALOT
  rationale: Forma española estándar del nombre propio.
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Ve
  lexicon: HALOT
  rationale: El imperativo funciona como llamada discursiva de atención. «Mira» suena natural en español moderno y conserva el tono solemne mejor que un calco más arcaico.
- source_word: נָתַתִּי
  english_pob_choice: I have set
  chosen_spanish: te he puesto
  alternatives_spanish:
  - te he colocado
  - te he nombrado
  - te he establecido
  lexicon: HALOT
  rationale: Aunque el verbo básico es «dar», en este contexto administrativo con עַל expresa investir o colocar en una posición de autoridad. «Puesto» mantiene la idea de asignación oficial sin perder naturalidad.
- source_word: אֹתְךָ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - te
  - a ti
  lexicon: HALOT
  rationale: 'El objeto directo pronominal en español se integra naturalmente como clítico: «te he puesto».'
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - en autoridad sobre
  - al frente de
  lexicon: HALOT
  rationale: «Sobre» preserva la relación de superioridad/autoridad que el hebreo marca con נתן + עַל, y evita sustituirla por una paráfrasis más interpretativa.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - todo
  - la totalidad de
  lexicon: HALOT
  rationale: Con «la tierra de Egipto» en singular femenino, «toda» concuerda de forma natural y mantiene el alcance total del hebreo.
- source_word: אֶרֶץ מִצְרַיִם
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - el país de Egipto
  - todo Egipto
  - la región de Egipto
  lexicon: HALOT
  rationale: «Tierra» traduce directamente אֶרֶץ y conserva el matiz territorial/realm sin reemplazarlo por una expresión menos precisa como «país».
translation_notes:
  revision_awareness: La versión inglesa auditada no presenta notas textuales ni decisiones teológicas adicionales; la traducción española sigue de cerca esa lectura de alta concordancia, ajustando solo la sintaxis para el español natural.
  spanish_consistency_notes:
  - Se conserva el nombre divino ausente en este versículo; no hay necesidad de aplicar la convención «Yahvé».
  - Se mantiene la relación de autoridad de נתן + עַל mediante «te he puesto sobre», en línea con el sentido administrativo del hebreo.
  - Se evita el calco arcaizante «he aquí» para רְאֵה, porque el imperativo discursivo se expresa mejor con «Mira» en español contemporáneo.
