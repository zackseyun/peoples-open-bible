translation:
  language: es
  text: 'Azarías, el sacerdote principal[a], de la casa de Zadoc, le respondió: «Desde que comenzaron a traer la contribución[b] a la casa de Yahvé, hemos comido y nos hemos saciado, y nos ha sobrado mucho; porque Yahvé ha bendecido a su pueblo, y lo que sobra es esta gran abundancia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sumo sacerdote»; el hebreo dice literalmente «el sacerdote principal», sin usar el título técnico posterior.
    reason: lexical_alternative
  - marker: b
    text: O «la ofrenda»; תרומה designa una contribución apartada para uso sagrado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֵן הָרֹאשׁ
  english_pob_choice: the chief priest
  chosen_spanish: el sacerdote principal
  alternatives_spanish:
  - el sumo sacerdote
  - el jefe de los sacerdotes
  lexicon: HALOT
  rationale: La expresión hebrea señala el rango dirigente dentro del sacerdocio. «Sacerdote principal» conserva la idea jerárquica sin introducir el título técnico posterior «sumo sacerdote», que el hebreo aquí no usa explícitamente.
- source_word: לְבֵית צָדוֹק
  english_pob_choice: of the house of Zadok
  chosen_spanish: de la casa de Zadoc
  alternatives_spanish:
  - perteneciente a la casa de Zadoc
  - procedente de la casa de Zadoc
  lexicon: HALOT
  rationale: El complemento con לְ + «casa» identifica afiliación familiar/sacerdotal. «De la casa de Zadoc» es natural en español y conserva la relación genealógica y de linaje sacerdotal.
- source_word: מֵהָחֵל
  english_pob_choice: Since they began
  chosen_spanish: Desde que comenzaron
  alternatives_spanish:
  - Desde el momento en que comenzaron
  - A partir de que comenzaron
  lexicon: HALOT
  rationale: La construcción temporal marca el punto de inicio de la acción. «Desde que comenzaron» comunica bien el valor de inicio sin cargarlo con una paráfrasis excesiva.
- source_word: הַתְּרוּמָה
  english_pob_choice: the contribution
  chosen_spanish: la contribución
  alternatives_spanish:
  - la ofrenda
  - la ofrenda apartada
  lexicon: HALOT
  rationale: תרומה es algo apartado para uso sagrado, pero en este contexto se trata de provisiones traídas al templo. «Contribución» preserva la idea de aporte dedicado y evita la ambigüedad litúrgica de «ofrenda».
- source_word: לָבִיא בֵית יְהוָה
  english_pob_choice: bringing the contribution into the house of Yahweh
  chosen_spanish: a traer ... a la casa de Yahvé
  alternatives_spanish:
  - a llevar ... a la casa de Yahvé
  - para traer ... a la casa de Yahvé
  lexicon: HALOT
  rationale: El infinitivo de בוא expresa movimiento hacia la casa de Yahvé. «A traer» refleja de forma simple y fiel la acción de introducir la contribución en el templo.
- source_word: אָכוֹל וְשָׂבוֹעַ
  english_pob_choice: we have eaten and been satisfied
  chosen_spanish: hemos comido y nos hemos saciado
  alternatives_spanish:
  - hemos comido y quedado satisfechos
  - hemos comido hasta saciarnos
  lexicon: HALOT
  rationale: La pareja verbal expresa ingestión suficiente y saciedad. «Nos hemos saciado» mantiene el sentido de plenitud sin debilitarlo a un mero «tener suficiente».
- source_word: וְהוֹתֵר עַד לָרֹב
  english_pob_choice: and have had plenty left over
  chosen_spanish: y nos ha sobrado mucho
  alternatives_spanish:
  - y ha quedado mucho de sobra
  - y nos ha quedado abundancia
  lexicon: HALOT
  rationale: יתר con עד לרוב comunica sobrante en gran cantidad. «Nos ha sobrado mucho» es claro y mantiene el matiz de abundancia de lo restante.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: traducir el nombre divino como «Yahvé» en el texto principal, no como una sustitución por título.'
- source_word: בֵּרַךְ אֶת עַמּוֹ
  english_pob_choice: has blessed his people
  chosen_spanish: ha bendecido a su pueblo
  alternatives_spanish:
  - bendijo a su pueblo
  - ha favorecido a su pueblo
  lexicon: HALOT
  rationale: El perfecto verbal funciona como causa de la abundancia presente. «Ha bendecido» conserva la fuerza explicativa y el tono bíblico natural en español.
- source_word: וְהַנּוֹתָר אֶת הֶהָמוֹן הַזֶּה
  english_pob_choice: and what is left is this great abundance
  chosen_spanish: y lo que sobra es esta gran abundancia
  alternatives_spanish:
  - y el resto es esta gran multitud
  - y lo restante es esta gran cantidad
  lexicon: HALOT
  rationale: 'הַנּוֹתָר funciona como sustantivo: «lo que sobra» / «lo restante». הֶהָמוֹן en este contexto no es una multitud de personas sino una cantidad abundante; por eso «gran abundancia» es más fiel al sentido de provisiones sobrantes.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al criterio del proyecto, el nombre divino se mantiene transliterado en español como «Yahvé», preservando el nombre propio del pacto en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, manteniendo las decisiones ya verificadas como estables (chief priest, contribution, Yahweh/Yahvé, great abundance) y ajustándolas a un español natural y publicable sin suavizar las tensiones léxicas del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se conserva «casa de Zadoc» para la afiliación sacerdotal de linaje.
  - «Contribución» se usa con el sentido sagrado de תרומה, no como simple donativo civil.
  - «Gran abundancia» expresa el sentido cuantitativo de הֶהָמוֹן en este contexto de sobrantes.
