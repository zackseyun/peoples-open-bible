    issue: Nombre propio 'Joram' en lugar de 'Jehoram'
    rationale: El texto fuente tiene לִיהוֹרָם, y la auditoría inglesa traduce 'Jehoram'. En español, 'Joram' es una forma abreviada conocida, pero aquí no hay justificación documentada para apartarse del referente más directo del hebreo y del expediente POB.
  - severity: low
    issue: Pronombre explícito 'él' en 'porque él era el primogénito'
    rationale: No es incorrecto, pero en español resulta más natural 'porque era el primogénito'. La referencia sigue siendo clara y se evita una ligera pesadez estilística.
