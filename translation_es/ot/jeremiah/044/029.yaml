translation:
  language: es
  text: Y esta será la señal para ustedes, dice Yahvé, de que yo los estoy castigando en este lugar, para que sepan que mis palabras ciertamente se levantarán contra ustedes para daño[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis palabras ciertamente se cumplirán contra ustedes para desgracia». El hebreo dice literalmente: «mis palabras ciertamente se levantarán contra ustedes para mal/daño».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֹאת
  english_pob_choice: And this
  chosen_spanish: Y esta
  alternatives_spanish:
  - Y esto
  - Y esta será
  lexicon: HALOT
  rationale: El demostrativo con la conjunción introduce la señal anunciada. «Y esta» conserva la deixis y permite una construcción natural en español con «será» implícito o explícito en el complemento nominal.
- source_word: הָאוֹת
  english_pob_choice: the sign
  chosen_spanish: la señal
  alternatives_spanish:
  - el signo
  - la prueba
  lexicon: HALOT
  rationale: En español bíblico contemporáneo «señal» comunica bien el marcador confirmatorio de la acción divina y es más natural que «signo» en este contexto profético.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se vierte de manera idiomática. «Dice Yahvé» mantiene el valor de fórmula de autoridad sin volverla rígida; se conserva el nombre divino según la política del proyecto.
- source_word: פֹקֵד אֲנִי עֲלֵיכֶם
  english_pob_choice: I am punishing you
  chosen_spanish: yo los estoy castigando
  alternatives_spanish:
  - yo los estoy visitando
  - yo estoy trayendo juicio sobre ustedes
  - yo los estoy atendiendo
  lexicon: HALOT
  rationale: El verbo פקד tiene rango amplio, pero en este contexto judicial el sentido efectivo es de castigo. «Castigando» expresa la fuerza negativa del pasaje de forma natural en español.
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - en este sitio
  - en este lugar mismo
  lexicon: HALOT
  rationale: La frase locativa se traduce de forma directa. «Lugar» preserva el deíctico y suena más sobrio que «sitio».
- source_word: לְמַעַן תֵּדְעוּ
  english_pob_choice: so that you may know
  chosen_spanish: para que sepan
  alternatives_spanish:
  - a fin de que sepan
  - para que conozcan
  lexicon: HALOT
  rationale: La finalidad se conserva con una subordinada final natural. Se usa tercera persona por concordancia con el español de reverencia/lectura pública dirigido al grupo receptor.
- source_word: כִּי קוֹם יָקוּמוּ
  english_pob_choice: will surely stand
  chosen_spanish: ciertamente se levantarán
  alternatives_spanish:
  - ciertamente se cumplirán
  - seguramente permanecerán en pie
  - sin falta se alzarán
  lexicon: HALOT
  rationale: La intensificación por infinitivo absoluto + verbo finito exige una marca de certeza. «Se levantarán» conserva el verbo de base קום más de cerca que una paráfrasis como «se cumplirán».
- source_word: דְבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi palabra
  - mis dichos
  - mis pronunciamientos
  lexicon: HALOT
  rationale: El plural hebreo se mantiene explícitamente. «Palabras» respeta el número y la concreción del enunciado divino.
- source_word: עֲלֵיכֶם
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - sobre ustedes
  - encima de ustedes
  lexicon: HALOT
  rationale: En el marco judicial, la fuerza adversativa se expresa mejor con «contra ustedes» que con una preposición más literal pero menos clara en español.
- source_word: לְרָעָה
  english_pob_choice: for harm
  chosen_spanish: para hacerles daño
  alternatives_spanish:
  - para mal
  - para desgracia
  - para calamidad
  lexicon: HALOT
  rationale: En este contexto רעה señala resultado adverso, no mal moral. «Para hacerles daño» comunica el efecto de juicio sin sugerir que Dios actúe mal moralmente.
theological_decisions:
- issue: Cómo renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: Se sigue la terminología del proyecto para el Tetragrámaton. En este verso la forma aparece directamente en hebreo, por lo que se conserva el nombre divino y no se lo sustituye por un título enmascarado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de לְרָעָה en un contexto de juicio
  english_pob_reading: for harm
  chosen_spanish_reading: para hacerles daño
  alternative_spanish_readings:
  - para mal
  - para desastre
  - para calamidad
  rationale: La frase describe el efecto punitivo de las palabras de Yahvé sobre el pueblo. «Para hacerles daño» evita la ambigüedad de «mal» y conserva el valor de juicio adverso.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Valor de פקד en este pasaje
  english_pob_reading: I am punishing you
  chosen_spanish_reading: yo los estoy castigando
  alternative_spanish_readings:
  - yo los estoy visitando
  - yo estoy ejerciendo juicio sobre ustedes
  rationale: Aunque פקד puede significar visitar o atender, el contexto inmediato y el resultado anunciado orientan al castigo. La traducción evita suavizar el juicio divino.
  doctrine_reference: HALOT; translation philosophy §1
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el audit trail inglés. No se adoptaron cambios revisados posteriores porque el último pasaje auditado indica que no hubo modificaciones necesarias y el consenso es de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino, conforme al criterio del proyecto.
  - «Contra ustedes» conserva la fuerza adversativa del hebreo עֲלֵיכֶם en contexto judicial.
  - «Para hacerles daño» refleja לְרָעָה como resultado adverso, no como mal moral.
  - El registro es bíblico y público, pero evita arcaísmos que oscurezcan el sentido.
