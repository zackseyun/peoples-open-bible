translation:
  language: es
  text: Mis ojos se consumen con lágrimas; mis entrañas se agitan[a]; mi hígado[b] se derrama por tierra por la destrucción de la hija de mi pueblo[c][d], porque el infante y el niño de pecho desfallecen en las calles de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis entrañas se revuelven». El hebreo usa imaginería corporal para expresar angustia profunda.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «mi hígado». Se conserva la imagen corporal concreta del original, asociada al dolor intenso.'
    reason: cultural_note
  - marker: c
    text: 'O: «por el quebranto de la hija de mi pueblo».'
    reason: alternative_reading
  - marker: d
    text: «La hija de mi pueblo» es una personificación poética hebrea para el pueblo o la ciudad.
    reason: cultural_note
lexical_decisions:
- source_word: כָּלוּ
  english_pob_choice: are spent
  chosen_spanish: se consumen
  alternatives_spanish:
  - se agotan
  - se acaban
  - se desgastan
  lexicon: HALOT
  rationale: El verbo expresa agotamiento total. En español, «se consumen» conserva la imagen de desgaste físico sin sonar tan técnico ni tan débil como «se agotan».
- source_word: בַּדְמָעוֹת
  english_pob_choice: with tears
  chosen_spanish: con lágrimas
  alternatives_spanish:
  - en lágrimas
  - de lágrimas
  lexicon: HALOT
  rationale: La preposición indica acompañamiento o medio. «Con lágrimas» es natural en español y mantiene la relación estrecha con los ojos.
- source_word: עֵינַי
  english_pob_choice: my eyes
  chosen_spanish: mis ojos
  alternatives_spanish:
  - mis ojos mismos
  lexicon: HALOT
  rationale: Se preserva el cuerpo como imagen concreta del lamento. «Mis ojos» es la forma directa y fiel al hebreo.
- source_word: חֳמַרְמְרוּ
  english_pob_choice: churn
  chosen_spanish: se agitan
  alternatives_spanish:
  - se estremecen
  - hierve
  - se revuelven
  lexicon: HALOT
  rationale: El verbo raro describe agitación visceral. «Se agitan» comunica el tumulto interno de manera comprensible en español sin perder el carácter corporal.
- source_word: מֵעַי
  english_pob_choice: my inward parts
  chosen_spanish: mis entrañas
  alternatives_spanish:
  - mis interioridades
  - mis insides
  - mi corazón
  lexicon: HALOT
  rationale: «Entrañas» preserva el lenguaje corporal del hebreo para emociones profundas. Aunque es una palabra fuerte, resulta más fiel que espiritualizarla como «corazón».
- source_word: נִשְׁפַּךְ לָאָרֶץ
  english_pob_choice: is poured out to the earth
  chosen_spanish: se derrama sobre la tierra
  alternatives_spanish:
  - se derrama en la tierra
  - se vierte sobre el suelo
  - se derrama por tierra
  lexicon: HALOT
  rationale: Se conserva la imagen de derramamiento y descenso. «Sobre la tierra» corresponde al movimiento poético del hebreo y evita una simplificación abstracta.
- source_word: כְּבֵדִי
  english_pob_choice: my liver
  chosen_spanish: mi hígado
  alternatives_spanish:
  - mi interior
  - mi ser
  - mi corazón
  lexicon: HALOT
  rationale: Se retiene el órgano concreto que usa el hebreo. «Hígado» preserva la metáfora corporal de dolor profundo y evita domesticarla con un término más interpretativo.
- source_word: עַל שֶׁבֶר
  english_pob_choice: because of the destruction
  chosen_spanish: por la destrucción
  alternatives_spanish:
  - a causa de la destrucción
  - por la ruina
  - a causa del quebranto
  lexicon: HALOT
  rationale: En este contexto de devastación de Jerusalén, «destrucción» comunica bien el alcance del desastre. «Por» mantiene la causalidad breve y clara del hebreo.
- source_word: בַּת עַמִּי
  english_pob_choice: the daughter of my people
  chosen_spanish: la hija de mi pueblo
  alternatives_spanish:
  - la hija de mi gente
  - la hija de mi pueblo-
  - mi pueblo, como hija
  lexicon: HALOT
  rationale: Se conserva la personificación poética hebrea. Mantener la frase literal permite que el lector perciba el giro literario y su carga afectiva.
- source_word: בְּעָטֵף
  english_pob_choice: faint
  chosen_spanish: desfallecen
  alternatives_spanish:
  - se desmayan
  - debilitan
  - se rinden
  lexicon: HALOT
  rationale: El participio/infinitivo de circunstancia describe la condición de los niños. «Desfallecen» es preciso y solemne; mantiene la idea de colapso por debilidad.
- source_word: עוֹלֵל
  english_pob_choice: infant
  chosen_spanish: el infante
  alternatives_spanish:
  - el niño pequeño
  - el bebé
  - el pequeño
  lexicon: HALOT
  rationale: «Infante» conserva el referente de muy corta edad y su tono elevado. Se usa junto a «niño de pecho» para distinguir los dos términos hebreos.
- source_word: יוֹנֵק
  english_pob_choice: nursing child
  chosen_spanish: niño de pecho
  alternatives_spanish:
  - lactante
  - niño que mama
  - bebé lactante
  lexicon: HALOT
  rationale: «Niño de pecho» es una expresión clara y reverente en español para un niño aún amamantado. Mantiene el pathos del texto sin tecnicismo excesivo.
- source_word: בִּרְחֹבוֹת
  english_pob_choice: in the streets
  chosen_spanish: en las calles
  alternatives_spanish:
  - en las plazas
  - en los espacios abiertos
  - en los anchos lugares
  lexicon: HALOT
  rationale: «Calles» es una forma natural en español y encaja con el escenario urbano. Evita sonar arcaico o excesivamente literal.
- source_word: קִרְיָה
  english_pob_choice: the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - de la urbe
  - de la villa
  lexicon: HALOT
  rationale: La referencia es a la ciudad sitiada y devastada. «Ciudad» es el equivalente directo y más claro para el lector español.
theological_decisions:
- issue: Persona poética y personificación de Jerusalén como «la hija de mi pueblo»
  english_pob_reading: The daughter of my people is a Hebrew poetic personification for the people/city.
  chosen_spanish_reading: Se conserva la personificación literal «la hija de mi pueblo» sin explicarla en el texto principal.
  alternative_spanish_readings:
  - mi pueblo
  - la ciudad de mi pueblo
  - mi querida ciudad
  rationale: El hebreo usa una figura poética significativa; traducirla literalmente permite que el lector perciba la tensión literaria. Explicarla o normalizarla en el texto principal borraría esa forma.
  doctrine_reference: Poética bíblica / personificación profética
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada en el segmento causal: de «as infant and nursing child faint...» a «because infant and nursing child faint...», para reflejar mejor בְּעָטֵף como circunstancia causal. La redacción española sigue esa decisión con «porque... desfallecen».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - Se conserva el lenguaje corporal concreto («entrañas», «hígado») para no desactivar la intensidad del lamento.
  - Se usa «hija de mi pueblo» de forma literal para respetar la personificación poética del hebreo.
  - «Desfallecen» expresa la caída por debilidad física y mantiene el tono solemne del pasaje.
