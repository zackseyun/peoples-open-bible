review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia verbal hebrea: vestir, ungir, instalar/ordenar, consagrar, y luego servir sacerdotalmente. También preserva adecuadamente el sentido idiomático de וּמִלֵּאתָ אֶת־יָדָם mediante una traducción funcional con nota literal. Sin embargo, el anclaje de la nota está mal ubicado: la nota explica «llenar sus manos», que corresponde a «los investirás», no a «vestirás». Además, «ejercerán el sacerdocio para mí» es comprensible pero algo abstracto frente al valor verbal de וְכִהֲנוּ לִי; una formulación más directa como «servirán como sacerdotes para mí» preserva mejor la función verbal y se alinea más estrechamente con el audit trail inglés.'
  spanish_quality_summary: El español es en general claro, digno y natural. «Ungirás», «consagrarás» e «investirás» funcionan bien en registro bíblico moderno. La principal reparación necesaria es mover la nota al verbo correcto y mejorar la frase final para que suene menos nominalizada y más transparente. También conviene evitar un anclaje erróneo que induce a pensar que «vestirás» corresponde al hebraísmo de «llenar sus manos».
  glossary_alignment: No hay conflicto con los términos base del proyecto. La elección «investirás» para מִלֵּא אֶת־יָד es defendible en español y está bien justificada. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La mejora propuesta en «servirán como sacerdotes para mí» se ajusta mejor a la decisión inglesa documentada para וְכִהֲנוּ לִי.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «vestirás» en lugar de «investirás».
    rationale: La nota explica el hebraísmo «llenar sus manos», que corresponde a וּמִלֵּאתָ אֶת־יָדָם, no a וְהִלְבַּשְׁתָּ. Tal como está, el lector recibe una asociación léxica incorrecta.
  - severity: medium
    issue: «Ellos ejercerán el sacerdocio para mí» suena más abstracto que el hebreo verbal.
    rationale: וְכִהֲנוּ לִי expresa que ellos servirán/ministrarán como sacerdotes. «Ejercerán el sacerdocio» es posible, pero menos inmediato y menos alineado con la decisión auditada en inglés.
  revised_spanish_text: Y vestirás a Aarón, tu hermano, y a sus hijos con él, y los ungirás y los investirás[a] y los consagrarás, y servirán como sacerdotes para mí.
  revised_footnotes:
  - marker: a
    text: Literalmente, «llenar sus manos», un hebraísmo para instalar o investir a alguien en el servicio sacerdotal.
    reason: lexical_alternative
  revision_rationale: Se movió la nota al verbo que traduce el modismo hebreo מִלֵּא אֶת־יָדָם, corrigiendo una asociación léxica errónea. También se sustituyó «ejercerán el sacerdocio para mí» por «servirán como sacerdotes para mí» para reflejar con mayor claridad el valor verbal de וְכִהֲנוּ לִי y alinearse mejor con la justificación documentada en el English POB.
