id: 1TH.3.10
reference: 1 Thessalonians 3:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: νυκτὸς καὶ ἡμέρας ὑπερεκπερισσοῦ δεόμενοι εἰς τὸ ἰδεῖν ὑμῶν τὸ πρόσωπον καὶ καταρτίσαι τὰ ὑστερήματα τῆς πίστεως ὑμῶν;
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/003/010.yaml
  text: night and day praying most earnestly to see your face and to supply what is lacking in your faith,[a]
  footnotes:
  - marker: a
    text: Or 'what is missing from your faith.' The Greek could also be understood more broadly as what still needs strengthening or completion in their faith.
    reason: lexical_alternative
translation:
  language: ko
  text: 밤낮으로 우리는 여러분의 얼굴을 다시 보고 여러분의 믿음에 부족한 것[a]을 채워 주기를 더할 나위 없이 간절히 간구하고 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분의 믿음에서 빠져 있는 것」, 「여러분의 믿음에서 아직 강화·완성되어야 할 것」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπερεκπερισσοῦ δεόμενοι
  english_pob_choice: praying most earnestly
  chosen_korean: 더할 나위 없이 간절히 간구하고 있습니다
  alternatives_korean:
  - 지극히 간절하게 기도하고 있습니다
  - 한없이 간절히 청하고 있습니다
  lexicon: BDAG
  rationale: ὑπερεκπερισσοῦ는 최상급적 강조 부사. 「더할 나위 없이」가 한국어 최상급 표현으로 자연스럽다.
- source_word: εἰς τὸ ἰδεῖν ὑμῶν τὸ πρόσωπον
  english_pob_choice: to see your face
  chosen_korean: 여러분의 얼굴을 다시 보고
  alternatives_korean:
  - 여러분의 얼굴을 보기를
  - 여러분과 다시 대면하기를
  lexicon: BDAG
  rationale: 「다시」를 보충해 2:17의 그리움 정황(다시 만나려는)을 자연스럽게 잇는다.
- source_word: καταρτίσαι τὰ ὑστερήματα τῆς πίστεως ὑμῶν
  english_pob_choice: to supply what is lacking in your faith
  chosen_korean: 여러분의 믿음에 부족한 것을 채워 주기를
  alternatives_korean:
  - 여러분의 믿음의 부족함을 보충해 주기를
  - 여러분의 믿음을 온전케 하기를
  lexicon: BDAG
  rationale: καταρτίζω는 「온전케 하다·갖추어 주다」. 「채워 주다」가 본문의 부족함 보충 의미를 자연스럽게 담는다.
