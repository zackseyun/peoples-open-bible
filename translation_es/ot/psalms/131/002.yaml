  text: אִם לֹ֤א שִׁוִּ֨יתִי וְ/דוֹמַ֗מְתִּי נַ֫פְשִׁ֥/י כְּ֭/גָמֻל עֲלֵ֣י אִמּ֑/וֹ כַּ/גָּמֻ֖ל עָלַ֣/י נַפְשִֽׁ/י־׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/131/002.yaml
  text: Surely I have calmed and quieted my soul[a], like a weaned child with his mother[c][b]; like a weaned child is my soul within me.
  footnotes:
