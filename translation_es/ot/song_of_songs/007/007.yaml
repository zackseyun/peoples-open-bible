  yaml_path: translation/ot/song_of_songs/007/007.yaml
  text: How beautiful and how delightful you are[a], O love[b], among delights!
  footnotes:
  - marker: a
    text: Or 'among delights' or 'in delights.' The Hebrew phrase בַּתַּעֲנוּגִים is compact and may describe either the sphere of delight or the beloved as characterized by delights.
    reason: lexical_alternative
  - marker: b
    text: Or 'my love' or 'beloved.' The Hebrew אַהֲבָה is literally 'love' and functions here as a term of address.
