base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/006/029.yaml
  text: The bellows blow fiercely[a]; the lead is consumed by the fire. In vain the refiner keeps refining[b], but the wicked are not separated out.
  footnotes:
  - marker: a
    text: Or 'The bellows are scorched/burned up; from their fire the lead is consumed.' The Hebrew of this clause is difficult, and translations differ on how the fire and lead are related.
    reason: textual_variant
  - marker: b
    text: Or 'the evil ones are not removed' or, in a more metallurgical sense, 'the impurities are not drawn off.'
    reason: lexical_alternative
