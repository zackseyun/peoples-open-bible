    issue: אֱמָר נָא traducido como 'habla, te ruego'
    rationale: Aunque נָא puede expresar ruego/urgencia, 'te ruego' introduce un matiz más fuerte y menos natural en español para esta instrucción a Jeremías. 'Di' o 'habla' sin esa inserción refleja mejor el hebreo y coincide con la lógica del English POB, que desplaza el matiz cortés a la exhortación 'shuvu na'.
  - severity: low
    issue: Falta una nota específica en el imperativo 'Vuélvanse' para las alternativas 'Regresen' / 'Arrepiéntanse'
    rationale: La auditoría inglesa preserva esta alternativa léxica para שׁוּבוּ נָא. En español conviene mantenerla también, ya que es significativa para la semántica del llamado profético.
  - severity: low
    issue: La nota [b] actual se ancla a 'calamidad' pero omite la alternativa más directa 'desastre'
    rationale: No es un error grave, pero 'desastre' corresponde más estrechamente al English POB 'disaster', mientras que 'desgracia' puede sonar más subjetivo o menos judicial.
