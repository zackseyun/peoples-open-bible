    text: O ‘por la mano de su siervo Elías’.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la referencia explícita del sujeto (''que Yahvé habló'') para ajustarla mejor al hebreo, se reemplaza ''Reconoced'' por ''Sepan'' para un español más neutral y legible, y se reordena el aparato de notas para que refleje el rastro auditado: el modismo ''caerá a tierra'' recibe la nota principal y la frase de agencia ''por medio de'' conserva su alternativa literal.'
