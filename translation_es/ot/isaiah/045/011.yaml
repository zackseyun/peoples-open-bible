translation:
  language: es
  text: 'Así dice Yahvé, el Santo de Israel y su Hacedor: Pregúntenme acerca de las cosas por venir[a], acerca de mis hijos[b], y mándenme[c] respecto a la obra de mis manos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “las cosas futuras” o “las cosas venideras”.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente “mis hijos”; esto puede referirse colectivamente a Israel como pueblo de Dios.
    reason: lexical_alternative
  - marker: c
    text: La formulación “mándenme” es probablemente intencionalmente provocadora en este contexto; algunos la entienden como reprensión retórica más que como autorización directa.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el uso fijo del proyecto para el nombre divino, preservando el valor del nombre propio del pacto. 'Yahvé' es el equivalente español transparente y consistente con el POB inglés que usa 'Yahweh'.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  - el Santo de Israel
  lexicon: HALOT
  rationale: La construcción titular profética se rinde de forma natural en español como 'el Santo de Israel', conservando el sentido de título fijo y la relación de pertenencia del genitivo.
- source_word: וְיֹצְרוֹ
  english_pob_choice: his Maker
  chosen_spanish: su Hacedor
  alternatives_spanish:
  - su Formador
  - el que lo formó
  lexicon: HALOT
  rationale: El sufijo masculino singular se mantiene implícito en español con 'su'. 'Hacedor' reproduce el valor nominal del participio sin volverlo una paráfrasis excesiva, y encaja bien con el paralelismo de creación.
- source_word: הָאֹתִיּוֹת
  english_pob_choice: the things to come
  chosen_spanish: las cosas por venir
  alternatives_spanish:
  - las cosas venideras
  - las cosas futuras
  - lo que está por venir
  lexicon: HALOT
  rationale: En este contexto profético, la expresión apunta a realidades futuras o inminentes, no a 'signos' ni a 'letras'. 'Las cosas por venir' preserva la ambigüedad idiomática y la lectura adoptada por el POB inglés.
- source_word: שְׁאָלוּנִי
  english_pob_choice: Ask me
  chosen_spanish: Pregúntenme
  alternatives_spanish:
  - Interróguenme
  - Consúltenme
  lexicon: HALOT
  rationale: El imperativo plural con sufijo de primera persona se expresa con fuerza directa en español. 'Pregúntenme' conserva la orden y el tono retador del hebreo.
- source_word: עַל בָּנַי
  english_pob_choice: concerning my sons
  chosen_spanish: acerca de mis hijos
  alternatives_spanish:
  - acerca de mis hijos varones
  - acerca de mis hijos
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural ('mis hijos/varones'), en español 'hijos' puede funcionar como masculino genérico y evita una dureza innecesaria. Se mantiene la referencia literal con nota para la posible referencia colectiva a Israel.
- source_word: פֹּעַל יָדַי
  english_pob_choice: the work of my hands
  chosen_spanish: la obra de mis manos
  alternatives_spanish:
  - el trabajo de mis manos
  - la obra hecha por mis manos
  lexicon: HALOT
  rationale: La expresión hebrea fija se conserva con un equivalente idiomático muy natural en español. 'Obra' mantiene el paralelismo con creación/hacer y suena más bíblico sin perder precisión.
- source_word: תְּצַוֻּנִי
  english_pob_choice: command me
  chosen_spanish: mándenme
  alternatives_spanish:
  - comándenme
  - denme órdenes
  lexicon: HALOT
  rationale: En español, 'mándenme' preserva la fuerza directa del verbo sin sonar artificial. Se evita suavizar el reto retórico; la frase sigue siendo provocadora y mantiene la tensión teológica del hebreo.
theological_decisions:
- issue: Si la última cláusula debe atenuar la idea de que los humanos manden a Dios
  english_pob_reading: Retain the direct wording 'command me' in the main text
  chosen_spanish_reading: Mantener 'mándenme' en el texto principal
  alternative_spanish_readings:
  - ¿me mandan?
  - ordénenme
  - háganme encargos
  rationale: El hebreo conserva una formulación abrupta e irónica. Traducirla con suavidad resolvería la tensión que el texto quiere exponer. Por eso se mantiene una orden directa, apta para ser leída como reprensión retórica.
  doctrine_reference: Translation philosophy §3
- issue: Si בָּנַי debe neutralizarse en español
  english_pob_reading: Render as 'my sons'
  chosen_spanish_reading: Renderizar como 'mis hijos'
  alternative_spanish_readings:
  - mis hijos e hijas
  - mis descendientes
  - mi pueblo
  rationale: El hebreo es masculino plural; en español 'hijos' puede abarcar el grupo con valor genérico/representativo sin borrar la forma gramatical. Se conserva además el eco colectivo que el POB inglés anotó como posible referencia a Israel.
  doctrine_reference: Translation philosophy §4
- issue: Cómo reflejar el título divino compuesto sin ocultar la relación del participio con el antecedente
  english_pob_reading: '''the Holy One of Israel and his Maker'''
  chosen_spanish_reading: '''el Santo de Israel y su Hacedor'''
  alternative_spanish_readings:
  - el Santo de Israel y el que lo formó
  - el Santo de Israel y su Formador
  rationale: El hebreo vincula el título con el participio posesivo. 'Su Hacedor' reproduce esa relación de manera natural en español y evita diluir el vínculo gramatical entre el Santo de Israel y aquel que lo formó.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó el segundo miembro de 'the one who formed him' a 'his Maker'. En español se reflejó ese ajuste con 'su Hacedor', manteniendo la relación posesiva y la naturalidad idiomática. También se preservó la fuerza de 'command me' sin suavizar la tensión retórica detectada en los passes de revisión.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma estable para el nombre divino, conforme al criterio del proyecto.
  - Se mantiene 'Santo de Israel' como título fijo profético.
  - '''Obra de mis manos'' conserva el paralelismo y evita una paráfrasis explicativa.'
  - '''Mándenme'' refleja la osadía del hebreo sin convertirla en una forma coloquial excesiva.'
  - Las notas [a], [b] y [c] corresponden a alternativas léxicas y lecturas teológicas documentadas en el POB inglés.
