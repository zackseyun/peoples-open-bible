translation:
  language: es
  text: y Abdías, hijo de Semaías, hijo de Galal, hijo de Jedutún, y Berequías, hijo de Asa, hijo de Elcana, que vivía en las aldeas de los netofatitas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que vivía en los asentamientos de Netofá»; el gentilicio hebreo puede entenderse como referencia al pueblo («netofatitas») o al lugar («Netofá»).
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/עֹבַדְיָה
  english_pob_choice: and Obadiah
  chosen_spanish: y Abdías
  alternatives_spanish:
  - y Obadías
  - Abdías
  lexicon: HALOT
  rationale: El hebreo conserva el nexo con la lista anterior mediante וְ; por eso se mantiene 'y'. Para el nombre propio, 'Abdías' es la forma castellana usual y transparente, y preserva la identificación del personaje sin añadir sentido no presente en el texto.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En esta genealogía, בן expresa filiación inmediata en la cadena nominal. 'Hijo de' reproduce de forma natural y fiel la relación genealógica en español.
- source_word: שְׁמַעְיָה
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Shemaías
  - Semaia
  lexicon: HALOT
  rationale: Se usa la transliteración castellana habitual 'Semaías', que conserva el nombre propio y resulta legible para una audiencia bíblica en español.
- source_word: גָּלָל
  english_pob_choice: Galal
  chosen_spanish: Galal
  alternatives_spanish:
  - Gaalal
  lexicon: HALOT
  rationale: Nombre propio transliterado sin adaptación adicional, porque no hay una forma castellana establecida que mejore la claridad.
- source_word: יְדוּתוּן
  english_pob_choice: Jeduthun
  chosen_spanish: Jedutún
  alternatives_spanish:
  - Jeduthun
  lexicon: HALOT
  rationale: Se adopta la forma castellana tradicional 'Jedutún', más natural en español bíblico y claramente identificable como nombre propio.
- source_word: וּ/בֶרֶכְיָה
  english_pob_choice: and Berechiah
  chosen_spanish: y Berequías
  alternatives_spanish:
  - y Berecías
  - Berequías
  lexicon: HALOT
  rationale: La conjunción continúa la lista genealógica, por lo que se mantiene 'y'. El nombre se vierte 'Berequías', forma castellana común y reconocible.
- source_word: אָסָא
  english_pob_choice: Asa
  chosen_spanish: Asa
  alternatives_spanish:
  - Asás
  lexicon: HALOT
  rationale: Se conserva 'Asa', la forma normal en español para este nombre propio, sin introducir confusión con el rey homónimo fuera de este contexto.
- source_word: אֶלְקָנָה
  english_pob_choice: Elkanah
  chosen_spanish: Elcana
  alternatives_spanish:
  - Elkaná
  lexicon: HALOT
  rationale: Se usa 'Elcana', forma castellanizada habitual en textos bíblicos, suficiente para identificar el nombre sin forzar la grafía hebrea.
- source_word: הַ/יּוֹשֵׁב
  english_pob_choice: who lived
  chosen_spanish: que vivía
  alternatives_spanish:
  - que habitaba
  - el que vivía
  lexicon: HALOT
  rationale: El participio con artículo funciona como cláusula relativa descriptiva. 'Que vivía' conserva el sentido residencial y el valor durativo del hebreo con naturalidad en español.
- source_word: בְּ/חַצְרֵי
  english_pob_choice: in the villages of
  chosen_spanish: en las aldeas de
  alternatives_spanish:
  - en las aldeas/estamentos de
  - en los poblados de
  lexicon: HALOT
  rationale: חצר puede referirse a un conjunto habitacional o asentamiento rural. 'Aldeas' comunica bien el sentido geográfico de poblados menores, evitando la imagen engañosa de 'patios'.
- source_word: נְטוֹפָתִי
  english_pob_choice: the Netophathites
  chosen_spanish: los netofatitas
  alternatives_spanish:
  - los de Netofá
  - los habitantes de Netofá
  lexicon: HALOT
  rationale: El adjetivo gentilicio se traduce como etnónimo plural 'netofatitas', siguiendo la decisión del inglés POB de reflejar el grupo de habitantes. Se conserva la tensión entre gentilicidad y posible referencia al lugar en la nota.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el paquete fuente hebreo y armoniza con el audit trail inglés: conserva la cadena genealógica, el valor relacional de los dos וְ iniciales, y mantiene abierta la ambigüedad del gentilicio final mediante nota, sin introducir interpretaciones no atestiguadas.'
  spanish_consistency_notes:
  - Se prefieren formas castellanas estándar de nombres propios cuando existen y son reconocibles (Semaías, Jedutún, Berequías, Elcana).
  - Se conserva 'hijo de' para la serie genealógica, porque el texto funciona como lista de filiación.
  - '''Aldeas'' se eligió para reflejar asentamientos rurales pequeños sin perder naturalidad en español.'
  - La nota final mantiene la misma tensión lexical que en el inglés POB entre etnónimo y topónimo.
