translation:
  language: es
  text: Y pondrá algo de la sangre[a] sobre los cuernos del altar que está delante de Yahvé, el cual está en la tienda de reunión; y derramará toda la sangre en la base del altar del holocausto, que está a la entrada de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de la sangre pondrá»; el español explicita «algo de la sangre» para hacer claro el sentido partitivo, en contraste con «toda la sangre» más adelante en el versículo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן הַדָּם
  english_pob_choice: And from the blood ... some
  chosen_spanish: Y de la sangre
  alternatives_spanish:
  - Y algo de la sangre
  - Y de la sangre, una parte
  lexicon: HALOT
  rationale: El hebreo introduce una relación partitiva que en español puede quedar implícita en el contexto ritual. Mantengo la forma natural «de la sangre» sin añadir «algo de» en el texto principal, porque la segunda cláusula («toda la sangre») ya deja clara la contraposición.
- source_word: יִתֵּן
  english_pob_choice: he shall put
  chosen_spanish: pondrá
  alternatives_spanish:
  - aplicará
  - colocará
  lexicon: HALOT
  rationale: נתן en este contexto sacrificial es un verbo general de acción ritual. «Pondrá» es directo, claro y suficientemente preciso sin tecnicismo excesivo.
- source_word: קַרְנֹת הַמִּזְבֵּחַ
  english_pob_choice: the horns of the altar
  chosen_spanish: los cuernos del altar
  alternatives_spanish:
  - las puntas del altar
  - las protuberancias del altar
  lexicon: HALOT
  rationale: «Cuernos» preserva el término técnico del altar y evita diluir la imagen cultual con una paráfrasis explicativa.
- source_word: אֲשֶׁר לִפְנֵי יְהוָה
  english_pob_choice: that is before Yahweh
  chosen_spanish: que está delante de Yahvé
  alternatives_spanish:
  - que está en presencia de Yahvé
  - que está ante Yahvé
  lexicon: HALOT
  rationale: '«Delante de» conserva el valor espacial/cultual de לִפְנֵי y mantiene el nombre divino según la norma del proyecto: יְהוָה → Yahvé.'
- source_word: אֲשֶׁר בְּאֹהֶל מוֹעֵד
  english_pob_choice: which is in the tent of meeting
  chosen_spanish: el cual está en la tienda de reunión
  alternatives_spanish:
  - la cual está en la tienda de reunión
  - que está en la tienda de reunión
  lexicon: HALOT
  rationale: «Tienda de reunión» es la equivalencia transparente y estable para אֹהֶל מוֹעֵד. «El cual» conecta naturalmente con «altar» y conserva la referencia inmediata.
- source_word: וְאֵת כָּל הַדָּם
  english_pob_choice: and all the blood
  chosen_spanish: y toda la sangre
  alternatives_spanish:
  - y la sangre entera
  - y toda la sangre restante
  lexicon: HALOT
  rationale: Se mantiene el alcance total de «todo el sangue» como en el hebreo, sin explicitar en el texto principal la idea de sangre restante, que es inferida por el contexto pero no dicha aquí.
- source_word: יִשְׁפֹּךְ
  english_pob_choice: he shall pour out
  chosen_spanish: derramará
  alternatives_spanish:
  - verterá
  - echará
  lexicon: HALOT
  rationale: «Derramará» es el equivalente natural en español para שפך en un contexto de sangre sacrificada; conserva la imagen de líquido vertido.
- source_word: אֶל יְסוֹד
  english_pob_choice: at the base
  chosen_spanish: al pie
  alternatives_spanish:
  - a la base
  - sobre la base
  lexicon: HALOT
  rationale: Para un altar, «al pie» es idiomático en español y comunica la ubicación inferior inmediata. «Base» también sería válido, pero «al pie» suena más natural y reverente en un registro bíblico moderno.
- source_word: מִזְבַּח הָעֹלָה
  english_pob_choice: the altar of burnt offering
  chosen_spanish: el altar del holocausto
  alternatives_spanish:
  - el altar del sacrificio quemado
  - el altar del sacrificio ascendente
  lexicon: HALOT
  rationale: Aunque «ofrenda quemada» sería más descriptivo, «holocausto» sigue siendo el término bíblico tradicional en español para עֹלָה y conserva la referencia cultual estable.
- source_word: אֲשֶׁר פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: which is at the entrance of the tent of meeting
  chosen_spanish: que está a la entrada de la tienda de reunión
  alternatives_spanish:
  - que está en la entrada de la tienda de reunión
  - que está junto a la entrada de la tienda de reunión
  lexicon: HALOT
  rationale: «A la entrada» reproduce bien פֶּתַח como ubicación de acceso y resulta natural en español bíblico actual.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», preservando su carácter propio en vez de sustituirlo por un título.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lenguaje sacrificial de la sangre sobre el altar
  english_pob_reading: he shall put some on the horns ... and all the blood he shall pour out
  chosen_spanish_reading: pondrá ... y toda la sangre derramará
  alternative_spanish_readings:
  - aplicará ... y el resto de la sangre derramará
  - colocará ... y toda la sangre verterá
  rationale: La frase española conserva la tensión del original entre una parte de la sangre aplicada a los cuernos y la totalidad derramada al pie del altar. No se suaviza ni se explica de más en el texto principal.
  doctrine_reference: Leviticus sacrificial procedure; consistency with English POB partitive note
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo directamente y conserva la estructura ritual y la doble referencia a la sangre. La revisión inglesa más reciente no requirió cambios, así que no se introducen ajustes adicionales por capas de revisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - «Tienda de reunión» se usa de forma consistente para אֹהֶל מוֹעֵד.
  - «Holocausto» conserva la terminología sacrificial tradicional para עֹלָה.
  - No se fuerza una explicación en el texto principal para el sentido partitivo de la primera mención de la sangre; se anota en la nota correspondiente.
