translation:
  language: es
  text: ¿Es mi fuerza la fuerza de las piedras[a], o es mi carne de bronce?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Es mi cuerpo de bronce?». El hebreo dice literalmente «mi carne», preservando el contraste entre la fragilidad humana y una dureza semejante al metal.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: Is
  chosen_spanish: ¿Es... ?
  alternatives_spanish:
  - si
  - acaso
  lexicon: HALOT
  rationale: En este contexto, אִם introduce una pregunta retórica, no una condición. El español natural para conservar ese valor interrogativo es «¿Es... ?», que mantiene la fuerza de la queja de Job sin volver la frase condicional.
- source_word: כֹּחַ / כֹּחִי
  english_pob_choice: strength / my strength
  chosen_spanish: fuerza / mi fuerza
  alternatives_spanish:
  - poder / mi poder
  - vigor / mi vigor
  lexicon: HALOT
  rationale: «Fuerza» reproduce bien el valor de כֹּחַ y mantiene el paralelismo con la repetición hebrea. «Poder» sería más abstracto y «vigor» menos directo para este contraste corporal.
- source_word: אֲבָנִים
  english_pob_choice: stones
  chosen_spanish: las piedras
  alternatives_spanish:
  - las piedras
  - los peñascos
  lexicon: HALOT
  rationale: Aunque el inglés POB dice «stones», en español «piedras» es la forma más natural y clara para este plural concreto. Conserva la imagen material sin perder la correspondencia semántica con el hebreo.
- source_word: בְּשָׂרִי
  english_pob_choice: my flesh
  chosen_spanish: mi carne
  alternatives_spanish:
  - mi cuerpo
  - mi carne
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi carne». En español, «carne» conserva esa literalidad y la tensión poética entre fragilidad humana y dureza metálica. Aunque «cuerpo» sería una clarificación posible, aquí suavizaría la imagen original.
- source_word: נָחוּשׁ
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - metal
  lexicon: HALOT
  rationale: «Bronce» es la equivalencia bíblica y literaria más estable para נָחוּשׁ en este tipo de comparación de dureza. «Cobre» es posible, pero «bronce» comunica mejor la idea de resistencia y mantiene la solución del POB inglés.
translation_notes:
  revision_awareness: La versión inglesa POB permanece sin cambios en el pass más reciente; el acuerdo de revisión es alto y no se registran enmiendas que afecten este versículo. La redacción española sigue de cerca el hebreo y adopta las mismas decisiones léxicas centrales, ajustando solo «stones» a «piedras» por naturalidad idiomática en español.
  spanish_consistency_notes:
  - Se mantiene la repetición de fuerza/fuerza para reflejar el paralelismo hebreo.
  - Se conserva la imagen corporal literal con «carne» y no se neutraliza a «cuerpo» en el texto principal.
  - «Bronce» se usa de forma consistente como equivalente bíblico de dureza metálica.
  - La puntuación interrogativa en español refleja el tono retórico del hebreo.
