- from: Y contó Haman[a] a ellos la gloria de su riqueza, y la multitud de sus hijos[b], y todo lo que el rey había hecho para engrandecerlo[c], y cómo lo había exaltado[d] por encima de los oficiales y de los servidores del rey.
  to: Y Hamán les contó la gloria de su riqueza[a], y la multitud de sus hijos[b], y todo lo que el rey había hecho para engrandecerlo[c], y cómo lo había exaltado[d] por encima de los oficiales y de los servidores del rey.
  rationale: La revisión corrige la forma del nombre a «Hamán» conforme al uso español natural, mejora la sintaxis con «les contó», elimina una nota editorial innecesaria y alinea las notas al pie con las alternativas léxicas documentadas en el POB inglés, incluyendo la alternativa para «la gloria de su riqueza».
