translation:
  language: es
  text: 'Y dijeron a los mensajeros que habían llegado[a]: «Así dirán a los hombres de Jabes de Galaad: “Mañana, al calor del sol, tendrán liberación[b]”». Y los mensajeros fueron y se lo comunicaron a los hombres de Jabes, y ellos se alegraron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los mensajeros que venían»; el participio hebreo puede describir a los mensajeros como los que llegaban, aunque aquí el contexto favorece «que habían llegado».
    reason: lexical_alternative
  - marker: b
    text: O «salvación»; el hebreo תְּשׁוּעָה puede ser un término amplio, pero aquí se refiere al rescate concreto de una amenaza militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - ángeles
  lexicon: HALOT
  rationale: En este contexto narrativo se trata de portadores humanos del mensaje, no de seres celestiales. «Mensajeros» conserva el valor concreto y es el equivalente natural en español.
- source_word: הַבָּאִים
  english_pob_choice: who had come
  chosen_spanish: que habían llegado
  alternatives_spanish:
  - que venían
  - que llegaron
  lexicon: HALOT
  rationale: El participio describe a los mensajeros como los que ya habían arribado. «Que habían llegado» mantiene ese valor aspectual y resulta natural en español.
- source_word: כֹּה תֹאמְרוּן
  english_pob_choice: Thus you shall say
  chosen_spanish: Así dirán
  alternatives_spanish:
  - Esto es lo que dirán
  - De esta manera dirán
  lexicon: HALOT
  rationale: La fórmula introduce el discurso directo. En español, «Así dirán» conserva la estructura imperativa/mandato indirecto y evita una paráfrasis más larga.
- source_word: לְאִישׁ יָבֵישׁ גִּלְעָד
  english_pob_choice: to the men of Jabesh-gilead
  chosen_spanish: a los hombres de Jabes de Galaad
  alternatives_spanish:
  - al hombre de Jabes de Galaad
  - al pueblo de Jabes de Galaad
  lexicon: HALOT
  rationale: Aunque el hebreo usa un singular formal («al hombre»), el contexto colectivo exige una referencia plural. «Los hombres de Jabes de Galaad» preserva la función colectiva sin forzar un singular engañoso.
- source_word: מָחָר
  english_pob_choice: Tomorrow
  chosen_spanish: Mañana
  alternatives_spanish:
  - Para mañana
  lexicon: HALOT
  rationale: Adverbio temporal directo, sin necesidad de expansión.
- source_word: תִּהְיֶה לָכֶם תְּשׁוּעָה
  english_pob_choice: you will have deliverance
  chosen_spanish: tendréis salvación
  alternatives_spanish:
  - tendréis liberación
  - habrá salvación para vosotros
  - tendréis auxilio
  lexicon: HALOT
  rationale: תשועה puede referirse a rescate/liberación concreta. En español, «salvación» mantiene el campo semántico amplio y, en este contexto militar, comunica rescate efectivo; se evita «victoria» por ser más interpretativo. Se conserva la tensión entre sentido militar concreto y vocabulario de salvación.
- source_word: בְּחֹם הַשָּׁמֶשׁ
  english_pob_choice: by the heat of the sun
  chosen_spanish: al calor del sol
  alternatives_spanish:
  - en el calor del sol
  - cuando el sol esté caliente
  - a la hora más calurosa
  lexicon: HALOT
  rationale: La expresión es literalmente térmica y probablemente temporal. «Al calor del sol» preserva la imagen y deja abierta la referencia al momento más cálido del día.
- source_word: וַיַּגִּידוּ
  english_pob_choice: told
  chosen_spanish: lo comunicaron
  alternatives_spanish:
  - lo dijeron
  - lo anunciaron
  - se lo contaron
  lexicon: HALOT
  rationale: Verbo narrativo de transmisión de información. «Lo comunicaron» suena más formal que «lo dijeron» y mantiene la función de reportar el mensaje.
- source_word: לְאַנְשֵׁי יָבֵישׁ
  english_pob_choice: the men of Jabesh
  chosen_spanish: a los hombres de Jabes
  alternatives_spanish:
  - a la gente de Jabes
  - a los habitantes de Jabes
  lexicon: HALOT
  rationale: Se conserva la expresión idiomática «hombres de» como reflejo del hebreo אנשי, sin perder inteligibilidad en español.
- source_word: וַיִּשְׂמָחוּ
  english_pob_choice: they rejoiced
  chosen_spanish: se alegraron
  alternatives_spanish:
  - se gozaron
  - se regocijaron
  lexicon: HALOT
  rationale: Verbo común de alegría, natural en español y fiel al tono narrativo.
theological_decisions:
- issue: 'תְּשׁוּעָה / deliverance: rescate militar o salvación'
  english_pob_reading: you will have deliverance
  chosen_spanish_reading: tendréis salvación
  alternative_spanish_readings:
  - tendréis liberación
  - habrá salvación para vosotros
  rationale: El contexto inmediato es bélico, pero el término hebreo es amplio y puede abarcar rescate/liberación. «Salvación» preserva la amplitud semántica y no reduce el término a una victoria militar exclusivamente, manteniendo la tensión lexical sin cargarla con un sentido doctrinal posterior.
  doctrine_reference: Semántica de תשועה en contexto narrativo/ bélico; evitar sobreespecificación soteriológica.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del POB en inglés: se opta por el valor participial de הַבָּאִים como «que habían llegado», por una fórmula más formal para כֹּה תֹאמְרוּן, y por una expresión que preserve la cercanía semántica de תִּהְיֶה לָכֶם תְּשׁוּעָה sin convertirla en una paráfrasis interpretativa. Se mantiene la lectura colectiva de לְאִישׁ יָבֵישׁ y la referencia idiomática a los «hombres de» Jabes.'
  spanish_consistency_notes:
  - Se usa «Jabes de Galaad» para mantener la toponimia bíblica común en español y reflejar el compuesto del hebreo.
  - Se preserva «mensajeros» y no «ángeles», porque el contexto narra portadores humanos.
  - Se emplea el tratamiento plural «tendréis» para concordar con «los hombres de Jabes de Galaad».
  - Se mantiene «salvación» como término amplio, con nota para la alternativa «liberación».
