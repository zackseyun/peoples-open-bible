  text: עוֹדֶ֨/נִּי הַ/יּ֜וֹם חָזָ֗ק כַּֽ/אֲשֶׁר֙ בְּ/י֨וֹם שְׁלֹ֤חַ אוֹתִ/י֙ מֹשֶׁ֔ה כְּ/כֹ֥חִ/י אָ֖ז וּ/כְ/כֹ֣חִ/י עָ֑תָּה לַ/מִּלְחָמָ֖ה וְ/לָ/צֵ֥את וְ/לָ/בֽוֹא׃
