review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: וַיִּקַּח = «tomaron», «Moisés y Aarón», «estos hombres», y la relativa sobre quienes fueron identificados. El único desajuste importante está en «por nombre», que suena poco idiomático en español para בְּשֵׁמוֹת; el sentido fuente es identificación explícita/nominal, mejor expresado como «por nombre[a]» solo si se explica, o más naturalmente «por sus nombres»/«por nombre» con nota. Aquí conviene mantener la formulación principal natural en español y conservar la alternativa más literal en nota.'
  spanish_quality_summary: 'La frase es clara y fiel, pero «designados por nombre» resulta algo calcada y poco natural en español eclesial general. «Designados por sus nombres» fluye mejor y preserva el matiz administrativo de identificación individual. También la nota actual tiene comillas y prefijo poco naturales: debe normalizarse al estilo español.'
  glossary_alignment: No hay términos del glosario mayor implicados. Los nombres propios están bien. La decisión de mantener «designados» concuerda con la racionalidad léxica inglesa para נִקְּבוּ; la mejora necesaria es de idiomaticidad española en la expresión de בְּשֵׁמוֹת.
  issues:
  - severity: medium
    issue: «designados por nombre» suena forzado en español
    rationale: Aunque calca de cerca «by name», en español común y bíblico suena menos natural que «designados por sus nombres» o una nota que explique la literalidad. La meta pide español claro y moderno, no calcos de madera.
  - severity: low
    issue: Redacción de la nota al pie poco natural
    rationale: 'La nota empieza con comilla y «O:», pero puede formularse con mayor limpieza: «O “nombrados por nombre”, es decir, “identificados específicamente”». Esto preserva la alternativa léxica documentada.'
