    text: O “junto a En-harod”. El hebreo incluye literalmente la palabra para “fuente”.
    reason: lexical_alternative
  revision_rationale: Se corrige el nombre propio a 'Moreh' para reflejar fielmente הַמּוֹרֶה y alinearlo con el expediente inglés. También se cambia 'collado' por 'colina' para mejorar la claridad y naturalidad en español neutral sin apartarse del sentido de גִּבְעָה. El resto del texto y la nota se conservan porque representan bien el hebreo y las decisiones léxicas auditadas.
