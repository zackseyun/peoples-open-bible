translation:
  language: es
  text: ¡Oh Dios!, que eres poderoso sobre todos, escucha la voz de los desesperados y líbranos de la mano de los que hacen mal, y líbrame de mi temor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «del peligro que temo». El griego puede referirse tanto al temor mismo de Ester como al peligro que ella teme.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ θεὸς
  english_pob_choice: O God
  chosen_spanish: ¡Oh Dios
  alternatives_spanish:
  - Dios
  lexicon: LSJ
  rationale: En la oración, el nominativo con artículo funciona como vocativo. En español, «¡Oh Dios!» conserva la interpelación directa y el tono súplice sin añadir elementos ajenos.
- source_word: ὁ ἰσχύων ἐπὶ πάντας
  english_pob_choice: who are mighty over all
  chosen_spanish: que eres poderoso sobre todos
  alternatives_spanish:
  - que eres fuerte sobre todos
  - que tienes poder sobre todos
  - que prevaleces sobre todos
  lexicon: LSJ
  rationale: El participio describe la fuerza o capacidad soberana de Dios. «Poderoso sobre todos» mantiene la idea de supremacía amplia y suena natural en español devocional.
- source_word: εἰσάκουσον
  english_pob_choice: hear
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - atiende
  lexicon: LSJ
  rationale: El imperativo en una oración pide audición atenta. «Escucha» es claro, solemne y plenamente idiomático en español.
- source_word: φωνὴν ἀπηλπισμένων
  english_pob_choice: the voice of the despairing
  chosen_spanish: la voz de los desesperados
  alternatives_spanish:
  - la voz de los que han perdido la esperanza
  - el clamor de los desesperados
  lexicon: LSJ
  rationale: ἀπηλπισμένων denota a quienes están sin esperanza o en desesperación. «Los desesperados» reproduce bien el estado emocional y preserva la fuerza patética del griego.
- source_word: ῥῦσαι ἡμᾶς
  english_pob_choice: deliver us
  chosen_spanish: líbranos
  alternatives_spanish:
  - delivranos
  - rescátanos
  lexicon: LSJ
  rationale: ῥύομαι puede significar librar, rescatar o sacar de peligro. «Líbranos» es la forma bíblica y natural en español para una súplica de salvación y preserva el paralelismo con la segunda petición.
- source_word: ἐκ χειρὸς
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de las manos de
  lexicon: LSJ
  rationale: La expresión conserva la metáfora bíblica de control o dominio hostil. «De la mano de» es transparente y mantiene el lenguaje figurado del original.
- source_word: τῶν πονηρευομένων
  english_pob_choice: those who do evil
  chosen_spanish: los que hacen mal
  alternatives_spanish:
  - los malhechores
  - los que obran perversamente
  - los que practican el mal
  lexicon: LSJ
  rationale: El participio señala a personas dedicadas a obrar perversamente. «Los que hacen mal» es una equivalencia clara y sobria que evita precisar más de lo que el griego dice.
- source_word: ῥῦσαί με
  english_pob_choice: deliver me
  chosen_spanish: líbrame
  alternatives_spanish:
  - rescátame
  - sálvame
  lexicon: LSJ
  rationale: Se repite el mismo verbo, por lo que conviene conservar la repetición en español. «Líbrame» mantiene la cadencia y la consistencia léxica de la petición anterior.
- source_word: ἐκ τοῦ φόβου μου
  english_pob_choice: from my fear
  chosen_spanish: de mi temor
  alternatives_spanish:
  - de aquello que temo
  - de mi miedo
  - del peligro que temo
  lexicon: LSJ
  rationale: La frase griega puede referirse tanto al sentimiento de temor como al peligro temido. «De mi temor» conserva la ambigüedad sin resolverla y refleja el valor más literal del sintagma.
theological_decisions:
- issue: 'Ambigüedad de ἐκ τοῦ φόβου μου: temor interno o peligro temido'
  english_pob_reading: from my fear
  chosen_spanish_reading: de mi temor
  alternative_spanish_readings:
  - de aquello que temo
  - de mi miedo
  rationale: La evidencia griega permite entender la frase como liberación del estado interior de temor o del objeto de ese temor. La traducción principal mantiene la tensión sin aclararla de más, en línea con la práctica de la POB de no resolver prematuramente ambigüedades significativas.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB al preferir «los desesperados» para ἀπηλπισμένων y un verbo de liberación/librar para ῥῦσαι/ῥῦσαί. En español se optó por «líbranos/líbrame» por naturalidad litúrgica y consistencia retórica, sin perder el sentido de rescate o liberación del peligro.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός, sin sustituirlo por una forma reverencial indirecta.
  - Se conservó la metáfora «de la mano de» para χειρός.
  - Se tradujo el mismo verbo griego ῥύομαι de manera consistente en ambas peticiones.
  - Se preservó la ambigüedad de φόβος con una nota, sin convertirla en una explicación interpretativa en el texto principal.
