translation:
  language: es
  text: Vuelven al anochecer[a]; gruñen como perros[b][c] y rondan por la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aúllan como perros». El verbo hebreo puede referirse a un ruido animal fuerte; se eligió «gruñen» para mantener la imagen inmediata de acecho canino.
    reason: lexical_alternative
  - marker: b
    text: O «como un perro». El hebreo usa el singular «perro» de manera idiomática en la comparación.
    reason: lexical_alternative
  - marker: c
    text: 'Otra traducción anterior: «como un perro».'
    reason: previous_rendering
lexical_decisions:
- source_word: וְיָשׁוּבוּ
  english_pob_choice: They return
  chosen_spanish: Vuelven
  alternatives_spanish:
  - Regresan
  - Vuelven de nuevo
  lexicon: HALOT
  rationale: שׁוּב expresa la idea básica de volver o regresar. En español, «vuelven» es natural, breve y conserva la repetición de una acción que se reitera cada noche sin añadir matices no presentes en el hebreo.
- source_word: לָעֶרֶב
  english_pob_choice: at evening
  chosen_spanish: al anochecer
  alternatives_spanish:
  - al atardecer
  - por la tarde
  - en la tarde
  lexicon: HALOT
  rationale: עֶרֶב señala la transición hacia la tarde/noche. «Al anochecer» transmite bien el momento temporal y sugiere el inicio de su actividad nocturna sin forzar una hora exacta.
- source_word: יֶהֱמוּ
  english_pob_choice: they growl
  chosen_spanish: gruñen
  alternatives_spanish:
  - aúllan
  - emiten un bramido
  - hacen un ruido fuerte
  lexicon: HALOT
  rationale: המה puede referirse a un sonido fuerte, tumultuoso o animal. Dado el símil inmediato con perros, «gruñen» preserva el tono canino y la fuerza sonora que el contexto exige.
- source_word: כַּכָּלֶב
  english_pob_choice: like a dog / like dogs
  chosen_spanish: como perros
  alternatives_spanish:
  - como un perro
  - como el perro
  lexicon: HALOT
  rationale: El hebreo usa el singular de manera representativa en el comparativo. En español, el plural «como perros» fluye mejor con el sujeto plural y comunica de forma natural la comparación colectiva; se preserva así la imagen sin perder el valor idiomático del hebreo.
- source_word: וִיסוֹבְבוּ
  english_pob_choice: and prowl around
  chosen_spanish: y rondan
  alternatives_spanish:
  - y dan vueltas
  - y merodean
  - y se pasean alrededor
  lexicon: HALOT
  rationale: סבב indica moverse alrededor o circular. «Rondan» mantiene la idea de vagar alrededor con intención hostil, adecuada al cuadro de enemigos que patrullan la ciudad en busca de presa.
- source_word: עִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - una ciudad
  lexicon: HALOT
  rationale: Aunque el hebreo no lleva artículo, el contexto apunta a una ciudad concreta conocida por el lector. En español, «la ciudad» es la forma más natural y mantiene la referencia determinada implícita.
translation_notes:
  revision_awareness: La versión inglesa más reciente mantuvo sin cambios la lectura base de la línea. La revisión anterior solo señaló una posible preferencia entre singular/plural en el símil canino; en español se resolvió de forma idiomática con el plural «como perros», sin perder la equivalencia representativa del singular hebreo.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, con vocabulario claro y contemporáneo.
  - Se evitó «SEÑOR» y otras sustituciones no pertinentes porque no aparece el tetragrámaton en este versículo.
  - «Al anochecer» y «rondan» conservan el movimiento temporal y espacial del hebreo sin ampliar el sentido.
  - Las notas a–c preservan la tensión léxica entre el sonido animal, el singular idiomático hebreo y la fluidez natural del español.
