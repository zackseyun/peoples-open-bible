translation:
  language: es
  text: Me volví y no había quien me ayudara; busqué apoyo[a], y no había.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «busqué apoyo»; el paralelo griego dice de forma más explícita: «mirando en busca de ayuda de los hombres, y no la había». La traducción sigue el hebreo, mientras que el griego confirma el sentido de ayuda humana buscada.'
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֶפְנֶה
  english_pob_choice: I turned
  chosen_spanish: Me volví
  alternatives_spanish:
  - Me di vuelta
  - Volví
  lexicon: HALOT
  rationale: El hebreo expresa un giro o vuelta del cuerpo con matiz de mirar en derredor. En español, «me volví» conserva el movimiento personal y suena natural en registro bíblico actual. «Me di vuelta» sería más coloquial; «volví» pierde la idea de girar.
- source_word: סָבִיב
  english_pob_choice: around
  chosen_spanish: '[a]'
  alternatives_spanish:
  - en torno
  - por todas partes
  - alrededor
  lexicon: HALOT
  rationale: La idea de buscar en todas direcciones ya está implícita en «me volví»; por eso se mantiene el matiz en una nota y no se sobrecarga el texto principal. El inglés POB también optó por una formulación natural que preserva el movimiento sin repetir la partícula distributiva.
- source_word: עוֹזֵר
  english_pob_choice: to help
  chosen_spanish: me ayudara
  alternatives_spanish:
  - me socorriera
  - me asistiera
  lexicon: HALOT
  rationale: El participio hebreo designa a alguien que presta ayuda. En español, el verbo finito «me ayudara» transmite con naturalidad la ausencia de un ayudante. «Socorriera» sería más solemne, pero menos directo.
- source_word: וַאֲצַפֶּה
  english_pob_choice: I looked for
  chosen_spanish: busqué
  alternatives_spanish:
  - esperé
  - aguardé
  - miré hacia
  lexicon: HALOT
  rationale: Aquí צפה tiene fuerza de buscar/estar atento en una expectativa activa. «Busqué» comunica bien la acción de procurar apoyo, y en combinación con el paralelo griego mantiene el sentido de mirar en busca de ayuda. «Esperé» debilitaría la iniciativa de la frase.
- source_word: סוֹמֵךְ
  english_pob_choice: support
  chosen_spanish: apoyo
  alternatives_spanish:
  - sostén
  - ayuda
  - respaldo
  lexicon: HALOT
  rationale: 'El término puede referirse a quien sostiene o al sostén buscado. «Apoyo» conserva esa ambigüedad útil en español: puede ser tanto ayuda concreta como sostén personal. «Sostén» es válido, pero menos natural aquí.'
- source_word: וְאָיִן
  english_pob_choice: there was none
  chosen_spanish: no había ninguno
  alternatives_spanish:
  - no había nadie
  - no había nada
  - y no había
  lexicon: HALOT
  rationale: La negación existencial hebrea cierra la línea con énfasis. «No había ninguno» refleja bien la ausencia absoluta y permite enlazar con «apoyo» sin introducir un sujeto personal explícito que el hebreo no obliga a especificar.
theological_decisions:
- issue: Relación entre el hebreo y el paralelo griego en la idea de ayuda humana
  english_pob_reading: The translation follows the Hebrew while allowing the Greek to confirm the sense of sought human assistance.
  chosen_spanish_reading: La traducción sigue el hebreo, pero deja ver la confirmación del griego sobre la búsqueda de ayuda humana.
  alternative_spanish_readings:
  - La traducción se atiene solo al hebreo.
  - La traducción incorpora plenamente el griego en el texto principal.
  rationale: El hebreo habla de no hallar ayudante y de buscar apoyo; el griego explicita «ayuda de los hombres». En español conviene mantener el texto hebreo-base sin perder la corroboración del paralelo griego, por eso se traduce de forma sobria y se documenta la expansión del griego en nota.
  doctrine_reference: Texto bíblico deuterocanónico / crítica textual
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que prefirió «turned around» por naturalidad, y se mantuvo el sentido sin añadir expresiones redundantes. La nota recupera la diferencia auditada entre el hebreo base y el griego paralelo.
  spanish_consistency_notes:
  - Se conserva un estilo sobrio y bíblico en español moderno.
  - Se evita «SEÑOR» u այլ terminología no presente en el versículo.
  - «Ayuda/apoyo» se mantiene como campo semántico principal para reflejar tanto el hebreo como el apoyo del paralelo griego.
  - La nota de pie marca la diferencia textual sin duplicarla en el cuerpo del versículo.
