translation:
  language: es
  text: 'Y su ofrenda de grano será flor de harina mezclada con aceite: tres décimas para el toro[a], y dos décimas para el carnero prepararéis.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Las expresiones 'tres décimas' y 'dos décimas' abrevian décimas de un efá, una medida seca usada en las regulaciones sacrificiales.
    reason: cultural_note
lexical_decisions:
- source_word: וּמִנְחָתָם
  english_pob_choice: And their grain offering
  chosen_spanish: Y su ofrenda
  alternatives_spanish:
  - Y su ofrenda vegetal
  - Y su ofrenda de cereal
  lexicon: HALOT
  rationale: En contexto sacrificial, מִנְחָה puede designar una ofrenda vegetal/grano; en español, 'ofrenda' evita una perífrasis pesada y conserva la referencia cultual. El posesivo singular 'su' refleja el sufijo plural colectivo del hebreo, referido a los animales/elementos del ofrecimiento ya mencionados.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina de calidad fina
  lexicon: HALOT
  rationale: '''סֹלֶת'' es harina finamente molida para ofrendas. ''Flor de harina'' es una equivalencia bíblica clara y natural en español, sin perder el valor técnico del término.'
- source_word: בְּלוּלָה בַשָּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: amasada con aceite
  alternatives_spanish:
  - mezclada con aceite
  - batida con aceite
  lexicon: HALOT
  rationale: La idea es que la harina está preparada con aceite. 'Amasada con aceite' es idiomática en español bíblico y comunica la mezcla efectiva sin sonar demasiado mecánica.
- source_word: שְׁלֹשָׁה עֶשְׂרֹנִים
  english_pob_choice: three-tenths
  chosen_spanish: tres décimas
  alternatives_spanish:
  - tres décimos
  - tres décimas de efá
  lexicon: HALOT
  rationale: El hebreo abrevia una medida cultual (décimas de un efá). 'Tres décimas' reproduce la estructura compacta y mantiene la referencia medida sin añadir explicaciones al texto principal.
- source_word: לַפָּר
  english_pob_choice: for the bull
  chosen_spanish: para el becerro
  alternatives_spanish:
  - para el toro
  - para el novillo
  lexicon: HALOT
  rationale: El término puede cubrir un animal bovino joven en contexto sacrificial. 'Becerro' es una opción cultual comprensible en español y evita endurecer el término como 'toro' cuando el contexto de ofrenda sugiere un animal de sacrificio.
- source_word: וּשְׁנֵי עֶשְׂרֹנִים
  english_pob_choice: and two-tenths
  chosen_spanish: y dos décimas
  alternatives_spanish:
  - y dos décimos
  - y dos décimas de efá
  lexicon: HALOT
  rationale: Se mantiene la misma forma de medida que en la primera cláusula para conservar el paralelismo del hebreo y la economía del texto.
- source_word: לָאַיִל
  english_pob_choice: for the ram
  chosen_spanish: para el carnero
  alternatives_spanish:
  - para el macho cabrío
  - para el macho ovino
  lexicon: HALOT
  rationale: אַיִל es el carnero. 'Carnero' es el equivalente natural y preciso en español, y conserva el paralelismo sacrificial con el animal anterior.
- source_word: תַּעֲשׂוּ
  english_pob_choice: you shall prepare
  chosen_spanish: prepararéis
  alternatives_spanish:
  - haréis
  - ofreceréis
  lexicon: HALOT
  rationale: En instrucciones rituales, עשה puede expresar la acción de preparar/realizar la ofrenda. 'Prepararéis' mantiene el valor práctico del verbo sin imponer 'ofreceréis', que interpretaría más de lo que exige el hebreo.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la traducción inglesa auditada y sus decisiones léxicas: grain offering, fine flour, mixed with oil, three-tenths, for the bull, two-tenths, for the ram, you shall prepare. No se incorporaron cambios textuales relevantes respecto del pass más reciente; la revisión se centró en una formulación española natural y fiel al hebreo.'
  spanish_consistency_notes:
  - Se conservó el paralelismo numérico y sintáctico del hebreo.
  - Se eligió 'ofrenda' como término base sin añadir glosas al texto principal.
  - La nota al pie explica la medida cultual sin sobrecargar el versículo.
  - '''Prepararéis'' preserva el carácter instruccional del hebreo en segunda persona plural.'
