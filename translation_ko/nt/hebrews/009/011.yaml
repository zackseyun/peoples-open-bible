translation:
  language: ko
  text: 그러나 메시아께서는 이미 이루어진 좋은 것들의 대제사장으로 오시어, 손으로 짓지 아니한 더 크고 더 온전한 장막을 통하여—곧 이 창조에 속하지 아니한 것입니다—
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 본 번역의 일관된 원칙에 따라 칭호 Χριστός는 「메시아」로 옮긴다.
- source_word: οὐ χειροποιήτου
  english_pob_choice: not made by hands
  chosen_korean: 손으로 짓지 아니한
  alternatives_korean: []
  lexicon: BDAG
  rationale: 지상 장막과 천상 장막의 대조를 보존한다.
theological_decisions:
- issue: 9:11-28의 단번에(ἐφάπαξ) 들어가심 — 그리스도의 결정적 제사 모티프 보존
  chosen_reading: 본문의 제사적·법적 정밀성을 풀어쓰지 않고 그대로 보존
  alternative_readings:
  - 설명적 의역
  - 예배 언어로의 부드러운 풀이
  rationale: 히브리서 9:11-28은 그리스도께서 자기 피로 단번에 성소들에 들어가셨다는 결정적 주장을 정밀한 제사 용어로 펼친다. 한국어 번역은 「단번에」(ἐφάπαξ), 「영원한 구속」(αἰωνία λύτρωσις), 「자기 피로」(διὰ τοῦ ἰδίου αἵματος)의 어휘를 그대로 보존해 그 결정성을 흐리지 않는다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological precision; once-for-all sacrifice'
