base_translation:
  language: en
  yaml_path: translation/ot/1_kings/022/044.yaml
  text: However[a], the high places were not removed[b]; the people still sacrificed and burned incense on the high places.
  footnotes:
  - marker: a
    text: Or 'the shrines.' The Hebrew term refers to local elevated cult sites, traditionally rendered 'high places.'
    reason: lexical_alternative
  - marker: b
    text: The verse does not specify whether these sacrifices were offered to the LORD at unauthorized sites or as part of broader idolatrous practice.
    reason: cultural_note
