translation:
  language: es
  text: Y si su esposo oye y no le dice nada, y no anula su voto, entonces todos sus votos permanecerán firmes, y toda obligación vinculante con la que ella se ha ligado permanecerá firme.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְשָׁמַע / hears
  english_pob_choice: And if ... hears
  chosen_spanish: Y si ... la oye
  alternatives_spanish:
  - Y ... oye
  - Y si ... escucha
  lexicon: HALOT
  rationale: En el estilo legal casuístico, el hebreo expresa una condición; por eso en español se añade naturalmente «si». «La oye» conserva la idea de enterarse de su caso, sin forzar un calco narrativo.
- source_word: אִישָׁהּ / her husband
  english_pob_choice: her husband
  chosen_spanish: su esposo
  alternatives_spanish:
  - su marido
  - su hombre
  lexicon: HALOT
  rationale: El contexto jurídico matrimonial determina que אִישׁ con sufijo femenino es el esposo. «Esposo» es claro y digno en español contemporáneo; «su hombre» sería demasiado literal y ambiguo.
- source_word: וְהֶחֱרִשׁ לָהּ / says nothing to her
  english_pob_choice: says nothing to her
  chosen_spanish: no le dice nada
  alternatives_spanish:
  - guarda silencio respecto de ella
  - permanece callado ante ella
  lexicon: HALOT
  rationale: La expresión idiomática apunta a no responder o no objetar. «No le dice nada» preserva la función legal de la omisión de palabra con naturalidad en español.
- source_word: לֹא הֵנִיא אֹתָהּ / does not nullify her
  english_pob_choice: does not nullify her vow
  chosen_spanish: no anula su voto
  alternatives_spanish:
  - no invalida su voto
  - no frustra su voto
  - no anula su obligación
  lexicon: HALOT
  rationale: Siguiendo el ajuste de la auditoría inglesa, el objeto implícito es el voto. En español, «anula» expresa bien la fuerza jurídica del verbo, y «su voto» aclara el referente sin perder la transparencia del texto.
- source_word: וְקָמוּ / then ... shall stand
  english_pob_choice: then ... shall stand
  chosen_spanish: entonces ... permanecerán firmes
  alternatives_spanish:
  - entonces ... quedarán en vigor
  - entonces ... se mantendrán
  lexicon: HALOT
  rationale: En lenguaje legal, קום comunica vigencia o validez continuada. «Permanecerán firmes» conserva el valor jurídico y evita un calco poco natural en español, aunque sigue siendo cercano a «estarán en pie».
- source_word: כָּל נְדָרֶיהָ / all her vows
  english_pob_choice: all her vows
  chosen_spanish: todos sus votos
  alternatives_spanish:
  - cada uno de sus votos
  - todas sus promesas votivas
  lexicon: HALOT
  rationale: נדר se traduce de forma estándar como «voto» en español bíblico. El plural mantiene la referencia colectiva del hebreo.
- source_word: וְכָל אִסָּר / and every binding obligation
  english_pob_choice: and every binding obligation
  chosen_spanish: toda obligación vinculante
  alternatives_spanish:
  - todo vínculo obligatorio
  - todo compromiso vinculante
  - toda atadura
  lexicon: HALOT
  rationale: אִסָּר designa aquí una imposición u obligación autoasumida con fuerza legal. «Obligación vinculante» comunica mejor el valor jurídico que «lazo» o «vínculo», que en español resultarían más opacos o demasiado figurativos.
- source_word: אֲשֶׁר אָסְרָה עַל נַפְשָׁהּ / that she has bound on herself
  english_pob_choice: that she has bound on herself
  chosen_spanish: que ella ha impuesto sobre sí misma
  alternatives_spanish:
  - que ella ha atado sobre sí
  - que se ha ligado a sí misma
  - que ha ligado sobre su propia vida
  lexicon: HALOT
  rationale: El hebreo usa la metáfora de «atar/bind on oneself». «Impuesto sobre sí misma» conserva el carácter autoasumido y suena natural en español jurídico; aunque «atado» sería más literal, podría sonar demasiado físico.
- source_word: יָקוּם / shall stand
  english_pob_choice: shall stand
  chosen_spanish: permanecerá firme
  alternatives_spanish:
  - quedará en vigor
  - se mantendrá
  - estará en pie
  lexicon: HALOT
  rationale: La repetición de קום refuerza la validez continuada. «Permanecerá firme» mantiene el paralelismo y comunica la permanencia legal con buena idiomaticidad.
theological_decisions:
- issue: La anulación del voto por silencio del esposo
  english_pob_reading: If the husband hears and says nothing, he does not nullify her vow, and it remains valid.
  chosen_spanish_reading: Si su esposo oye y no le dice nada, no anula su voto, y éste permanece válido.
  alternative_spanish_readings:
  - si su esposo guarda silencio, su voto sigue en vigor
  - si no lo invalida, el voto queda firme
  rationale: No hay aquí una cuestión doctrinal amplia, sino una norma legal de validez/invalidación. La traducción mantiene la tensión entre silencio y anulación, y conserva el efecto jurídico del acto o la omisión del esposo.
  doctrine_reference: Números 30:12; ley de votos en contexto de autoridad doméstica
- issue: Relación entre voto y obligación vinculante
  english_pob_reading: all her vows ... and every binding obligation that she has bound on herself
  chosen_spanish_reading: todos sus votos ... y toda obligación vinculante que ella ha impuesto sobre sí misma
  alternative_spanish_readings:
  - todos sus votos ... y todo compromiso vinculante que se ha impuesto
  - todos sus votos ... y toda atadura que ella misma ha asumido
  rationale: El hebreo distingue entre נדרים e אִסָּר. Se conserva esa distinción en español con «votos» y «obligación vinculante», para no borrar el matiz legal adicional del segundo término.
  doctrine_reference: Distinción léxica en Números 30:12
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que aclara el objeto de לֹא הֵנִיא como «su voto» y no «a ella». Por eso el español explicita «no anula su voto», manteniendo transparencia con el hebreo y evitando una lectura personal que el contexto no exige.
  spanish_consistency_notes:
  - Se mantiene «voto» para נדר y «obligación vinculante» para אִסָּר, preservando la distinción del texto hebreo.
  - Se usa «permanecerán firmes» / «permanecerá firme» para קום en sentido jurídico de validez continuada.
  - «Esposo» se prefiere a «marido» por tono neutral y claridad contextual.
  - No se emplea una nota de pie de página porque la aclaración del objeto de «anula» quedó integrada en el texto principal.
