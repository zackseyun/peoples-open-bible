    reason: lexical_alternative
  revision_rationale: La revisión restaura en el texto principal el sustantivo explícito «la prenda», que corresponde a הַעֲבוֹט y preserva mejor el marco legal del versículo. También simplifica las notas para evitar repetir en nota una opción ya adoptada en el texto. Se conserva «te será justicia» por su fidelidad al hebreo y su resonancia teológica abierta.
