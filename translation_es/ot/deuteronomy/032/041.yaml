translation:
  language: es
  text: Si afilo el relámpago de mi espada[a], y mi mano se apodera del juicio[b], devolveré venganza[c] sobre mis adversarios y les pagaré a los que me odian.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si afilo mi espada relampagueante». El hebreo puede traducirse de forma más literal o más idiomática en varios puntos de la primera cláusula.'
    reason: lexical_alternative
  - marker: b
    text: «Juicio» también puede traducirse «justicia» aquí.
    reason: lexical_alternative
  - marker: c
    text: 'O: «tomaré venganza sobre mis adversarios». Literalmente: «devolveré venganza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: En este contexto poético, el hebreo introduce una acción divina futura con fuerza condicional/temporal. El español «si» conserva mejor esa apertura y sigue el ajuste del POB inglés de 'when' a 'if' en la revisión.
- source_word: שַׁנּוֹתִי
  english_pob_choice: I sharpen
  chosen_spanish: afilo
  alternatives_spanish:
  - desgasto
  - afilo de nuevo
  - pulo
  lexicon: HALOT
  rationale: El sentido verbal apunta a afilar o hacer más aguda un arma. «Afilo» es natural, claro y fiel; «pulo» o perífrasis más técnicas no añaden fidelidad, y «desgasto» se aparta del campo semántico.
- source_word: בְּרַק חַרְבִּי
  english_pob_choice: the lightning of my sword
  chosen_spanish: el relámpago de mi espada
  alternatives_spanish:
  - mi espada fulgurante
  - el destello de mi espada
  lexicon: HALOT
  rationale: Se conserva la metáfora de בְּרַק como «relámpago» o «destello». Opté por una estructura más literal, «el relámpago de mi espada», para mantener la imagen poética y la tensión entre afilar y fulgor.
- source_word: וְתֹאחֵז
  english_pob_choice: takes hold
  chosen_spanish: se apodera de
  alternatives_spanish:
  - agarra
  - toma
  lexicon: HALOT
  rationale: El verbo expresa tomar o agarrar con firmeza. «Se apodera de» comunica bien la energía de la acción sin suavizar la imagen antropomórfica de la mano divina.
- source_word: בְּמִשְׁפָּט
  english_pob_choice: of judgment
  chosen_spanish: del juicio
  alternatives_spanish:
  - de justicia
  - para juicio
  lexicon: HALOT
  rationale: En un contexto de retribución, מִשְׁפָּט puede ser «juicio» o «justicia». Aquí «juicio» conserva el tono forense del verso y la paralelización con venganza y pago, mientras se deja abierta la posible nota semántica de «justicia».
- source_word: אָשִׁיב נָקָם
  english_pob_choice: I will return vengeance
  chosen_spanish: devolveré venganza
  alternatives_spanish:
  - tomaré venganza
  - haré volver la venganza
  lexicon: HALOT
  rationale: El hebreo dice literalmente «haré volver venganza». En español, «devolveré venganza» preserva la imagen verbal de retorno mejor que una solución totalmente idiomática como «tomaré venganza».
- source_word: לְצָרָי
  english_pob_choice: on my adversaries
  chosen_spanish: sobre mis adversarios
  alternatives_spanish:
  - contra mis enemigos
  - a mis adversarios
  lexicon: HALOT
  rationale: צָר transmite la idea de adversario u hostil. «Sobre mis adversarios» mantiene el movimiento de retribución y la correspondencia con la acción punitiva del verso.
- source_word: וְלִמְשַׂנְאַי
  english_pob_choice: those who hate me
  chosen_spanish: a los que me odian
  alternatives_spanish:
  - a quienes me odian
  - a mis aborrecedores
  lexicon: HALOT
  rationale: El participio describe a quienes mantienen hostilidad activa. «Los que me odian» es natural en español y conserva la fuerza relacional del hebreo.
- source_word: אֲשַׁלֵּם
  english_pob_choice: I will repay
  chosen_spanish: recompensaré
  alternatives_spanish:
  - pagaré
  - retribuiré
  - les pagaré
  lexicon: HALOT
  rationale: שׁלם en piel comunica pagar, retribuir o recompensar. Aquí elegí «recompensaré» para mantener el paralelo retributivo con «venganza», sin perder la idea de pago justo. «Retribuiré» sería también viable, pero menos idiomático para lectura pública.
theological_decisions:
- issue: Imagen antropomórfica y judicial de Dios
  english_pob_reading: Retain the concrete imagery of God's sword, hand, judgment, vengeance, and repayment without softening it.
  chosen_spanish_reading: Conservar la imagen concreta de la espada, la mano, el juicio, la venganza y la recompensa sin convertirla en una abstracción.
  alternative_spanish_readings:
  - Parafrasear como una declaración abstracta sobre la justicia divina
  - Suavizar la imagen guerrera para hacerla menos literal
  rationale: El verso presenta a Yahvé con lenguaje poético de guerrero y juez. La traducción española mantiene esa tensión sin resolverla, porque eso es lo que el texto exige y lo que la línea editorial de POB busca transparentar.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que cambió la apertura de 'when' a 'if' para reflejar mejor el valor condicional de אִם. También conserva la decisión de mantener la imaginería concreta de la espada, la mano, el juicio, la venganza y la retribución, sin suavizarla ni convertirla en paráfrasis abstracta.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito en el sujeto poético según el estilo del proyecto, aunque aquí no aparece explícito en la línea.
  - «Juicio» se eligió como término principal por su tono forense; «justicia» queda registrada como alternativa válida.
  - «Adversarios» y «los que me odian» conservan el paralelismo hostil del hebreo sin introducir términos más eclesiásticos o suavizados.
  - Se evitó «Señor» como máscara del nombre divino porque el versículo pertenece al cántico donde el sujeto poético es Yahvé y la política terminológica del proyecto prefiere el nombre propio en español cuando corresponda.
