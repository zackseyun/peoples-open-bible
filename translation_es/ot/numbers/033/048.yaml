translation:
  language: es
  text: Partieron de los montes de Abarim y acamparon en las llanuras de Moab, junto al Jordán, a la altura de Jericó[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las estepas de Moab». El término hebreo puede designar terreno estepario o llanuras.
    reason: lexical_alternative
  - marker: b
    text: O «junto al Jordán, frente a Jericó». Algunas traducciones entienden la frase final de manera más específica como la zona opuesta a Jericó.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en camino
  - Salieron
  lexicon: HALOT
  rationale: En un contexto de itinerario del desierto, נסע expresa el movimiento de romper campamento y continuar la marcha. «Partieron» comunica ese avance secuencial con naturalidad en español y sin perder la fuerza narrativa.
- source_word: מֵהָרֵי הָעֲבָרִים
  english_pob_choice: from the mountains of Abarim
  chosen_spanish: de los montes de Abarim
  alternatives_spanish:
  - de las montañas de Abarim
  - del monte de Abarim
  lexicon: HALOT
  rationale: El hebreo usa el plural constructo de «montes/montañas». «Montes de Abarim» conserva la forma plural y el nombre propio transliterado, en armonía con el estilo geográfico de Números 33.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - y plantaron su campamento
  lexicon: HALOT
  rationale: חנה en fórmulas itinerantes significa instalar campamento. «Acamparon» es la equivalencia española natural y fiel, menos arcaica que «acamparon» en sentido de «acamparon»/«encamparon».
- source_word: בְּעַרְבֹת מוֹאָב
  english_pob_choice: in the plains of Moab
  chosen_spanish: en las llanuras de Moab
  alternatives_spanish:
  - en las estepas de Moab
  - en la llanura de Moab
  lexicon: HALOT
  rationale: עַרְבֹת puede referir al terreno de estepa o llanura. «Llanuras» es claro en español actual y mantiene la idea topográfica sin imponer una precisión mayor que la del hebreo.
- source_word: עַל יַרְדֵּן יְרֵחוֹ
  english_pob_choice: by the Jordan at Jericho
  chosen_spanish: junto al Jordán, en Jericó
  alternatives_spanish:
  - a orillas del Jordán, en Jericó
  - junto al Jordán, frente a Jericó
  lexicon: HALOT
  rationale: עַל con un río puede señalar cercanía o ubicación junto a él. «Junto al Jordán» refleja esa relación espacial sin decidir en exceso entre «by», «along» u «opposite». La mención de Jericó se conserva como marcador geográfico final.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios relevantes: la versión revisada mantiene la solución óptima-equivalente para el itinerario, preservando la ambigüedad legítima de עַרְבֹת y de עַל יַרְדֵּן יְרֵחוֹ mediante notas alternativas en español.'
  spanish_consistency_notes:
  - Se mantuvo «Jordán» para יַרְדֵּן como nombre del río, y «Jericó» como topónimo final.
  - Se evitó «SEÑOR» u otra terminología teológica no pertinente, dado que el versículo es puramente geográfico.
  - La puntuación refleja una sola cláusula narrativa con dos acciones consecutivas, conforme al hebreo de itinerario.
