translation:
  language: es
  text: No solo han rechazado el orden cívico deshonroso[a], sino que también aborrecen, tanto de palabra como en silencio[b], a los pocos entre ellos que de veras se muestran bien dispuestos hacia nosotros, y a cada paso, con la intención más impía[c], se apresuran a arruinar nuestros asuntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega puede abarcar «orden cívico», «constitución» o «forma de vida pública»; aquí se traduce según el contexto político del pasaje. El adjetivo se vierte «deshonroso» siguiendo la lectura final del expediente inglés.
    reason: lexical_alternative
  - marker: b
    text: Lit. «de palabra y en silencio», es decir, con hostilidad tanto abierta como tácita.
    reason: lexical_alternative
  - marker: c
    text: La frase griega puede sugerir también un pretexto o apariencia; la revisión inglesa opta por «intención», y aquí se sigue esa lectura.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεστρέψαντο
  english_pob_choice: have rejected
  chosen_spanish: han rechazado
  alternatives_spanish:
  - se han apartado de
  - han repudiado
  lexicon: LSJ
  rationale: El aoristo medio expresa apartarse o rechazar deliberadamente una realidad establecida; «han rechazado» comunica bien esa negativa decidida en español y conserva la fuerza polémica del contexto.
- source_word: τὴν ἄτιμητον πολιτίαν
  english_pob_choice: the dishonorable civic order
  chosen_spanish: la orden cívica deshonrosa
  alternatives_spanish:
  - la constitución cívica deshonrosa
  - el orden cívico deshonroso
  - la ciudadanía deshonrosa
  lexicon: LSJ
  rationale: πολιτεία aquí se entiende como el orden o arreglo cívico, no como ciudadanía individual. Siguiendo la revisión inglesa, ἄτιμητον se toma en sentido negativo según el debate del texto, por eso se vierte «deshonrosa»; «orden cívica» mantiene el alcance político sin estrecharlo demasiado.
- source_word: βδελύσσονται
  english_pob_choice: they detest
  chosen_spanish: aborrecen
  alternatives_spanish:
  - detestan
  - abominan
  lexicon: LSJ
  rationale: Es un verbo fuerte de repulsión/aversión. «Aborrecer» comunica bien la intensidad en español bíblico moderno sin sonar artificial.
- source_word: λόγῳ τε καὶ σιγῇ
  english_pob_choice: both in speech and in silence
  chosen_spanish: tanto de palabra como en silencio
  alternatives_spanish:
  - de palabra y en silencio
  - tanto con palabras como con silencio
  - abiertamente y en silencio
  lexicon: LSJ
  rationale: Conserva el paralelismo literal y el sentido de hostilidad tanto explícita como tácita. «De palabra» es una equivalencia natural de λόγῳ; «en silencio» preserva σιγῇ.
- source_word: τοὺς ἐν αὐτοῖς ὀλίγους
  english_pob_choice: the few among them
  chosen_spanish: a los pocos entre ellos
  alternatives_spanish:
  - a los pocos de entre ellos
  - a la pequeña minoría entre ellos
  - a los pocos dentro de su número
  lexicon: LSJ
  rationale: La frase identifica una minoría interna. «Entre ellos» reproduce el valor distributivo sin añadir matices que el griego no exige.
- source_word: πρὸς ἡμᾶς γνησίως διακειμένους
  english_pob_choice: who are genuinely well-disposed toward us
  chosen_spanish: que de veras se muestran bien dispuestos hacia nosotros
  alternatives_spanish:
  - que sinceramente nos son favorables
  - que realmente están bien dispuestos hacia nosotros
  - que nos tienen leal afecto
  lexicon: LSJ
  rationale: διακέομαι con πρός indica disposición hacia alguien; γνησίως refuerza la autenticidad. «Bien dispuestos» mantiene la neutralidad semántica y evita convertir la relación en una lealtad formal que el texto no explicita.
- source_word: παρʼ ἕκαστα
  english_pob_choice: at every turn
  chosen_spanish: en cada ocasión
  alternatives_spanish:
  - en cada paso
  - a cada paso
  - en todo momento
  lexicon: LSJ
  rationale: La expresión adverbial señala recurrencia u oportunidad repetida. «En cada ocasión» conserva esa idea sin forzar una metáfora que el español no requiere.
- source_word: ἐφορμώμενοι
  english_pob_choice: rushing
  chosen_spanish: se apresuran
  alternatives_spanish:
  - se abalanzan
  - atacan
  - se lanzan
  lexicon: LSJ
  rationale: El verbo sugiere un impulso agresivo hacia la acción. En español, enlazado con el infinitivo final, «se apresuran» mantiene la urgencia hostil sin introducir una imagen más violenta de la necesaria.
- source_word: μετὰ τῆς δυσσεβεστάτης ἐμφάσεως
  english_pob_choice: with the most impious intent
  chosen_spanish: con la intención más impía
  alternatives_spanish:
  - con el pretexto más impío
  - con la más impía apariencia
  - bajo el pretexto más impío
  lexicon: LSJ
  rationale: ἔμφασις admite idea de pretexto, insinuación o énfasis aparente. Dado el ajuste de la revisión inglesa hacia «intent», la traducción española opta por «intención» para no introducir una lectura de pretexto que el estado final del texto no privilegia, sin perder el valor intensivo de δυσσεβεστάτης.
- source_word: διὰ τάχους
  english_pob_choice: they rush
  chosen_spanish: se apresuran
  alternatives_spanish:
  - rápidamente
  - con rapidez
  - a toda prisa
  lexicon: LSJ
  rationale: La expresión denota rapidez/urgencia. «Se apresuran» integra naturalmente esa rapidez con el verbo de movimiento hostil.
- source_word: ἡμᾶς καταστρέψαι τὰ πράγματα
  english_pob_choice: to bring our affairs to ruin
  chosen_spanish: a arruinar nuestros asuntos
  alternatives_spanish:
  - a destruir nuestros asuntos
  - a trastornar nuestros asuntos
  - a arruinar nuestra situación
  lexicon: LSJ
  rationale: καταστρέψαι con τὰ πράγματα apunta a arruinar o voltear el estado de las cosas. «Nuestros asuntos» preserva el alcance amplio y político sin reducirlo a destrucción física.
theological_decisions:
- issue: Sentido de ἄτιμητον en πολιτίαν
  english_pob_reading: dishonorable civic order
  chosen_spanish_reading: orden cívica deshonrosa
  alternative_spanish_readings:
  - orden cívica honorable
  - orden cívica estimada
  rationale: Sigo la revisión inglesa más reciente, que entendió ἄτιμητον en sentido negativo dentro de una acusación política. Por eso no suavizo el término hacia un valor positivo; el español mantiene la tensión y la carga reprochable del pasaje.
  doctrine_reference: No aplica doctrina específica; decisión semántico-histórica sobre vocabulario político helenístico.
- issue: ἔμφασις en la frase con δυσσεβεστάτης
  english_pob_reading: with the most impious intent
  chosen_spanish_reading: con la intención más impía
  alternative_spanish_readings:
  - con el pretexto más impío
  - bajo el pretexto más impío
  - con la más impía apariencia
  rationale: La revisión inglesa descartó «pretext» y prefirió una formulación de intención. El español conserva esa línea para no reintroducir una ambigüedad que el audit trail final no sostiene, aunque la palabra griega puede abarcar matices de apariencia o pretexto.
  doctrine_reference: No aplica doctrina específica; cuestión de pragmática léxica y retórica.
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «honorable civic order» por «dishonorable civic order», «at every opportunity» por «at every turn» y «driven by the most impious pretext» por «with the most impious intent». La presente redacción española sigue esas decisiones de revisión y evita reabrir la lectura positiva de ἄτιμητον o el valor de «pretexto» para ἔμφασις.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «aborrecer» como equivalente fuerte y natural de βδελύσσομαι.
  - «Bien dispuestos hacia nosotros» conserva la orientación relacional de πρός ἡμᾶς sin añadir un tecnicismo político innecesario.
  - Las notas con [a], [b] y [c] están ancladas en el texto principal y corresponden a alternativas reales del griego y del audit trail inglés.
