    text: 'O: «escuchó mi voz». El hebreo «escuchar la voz de» a menudo lleva la idea de obedecer al oír.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mis instrucciones». El hebreo tôrôt puede significar «ley», «instrucción» o «enseñanza» según el contexto.'
    reason: lexical_alternative
  revision_rationale: Se reubica la nota sobre «escuchó mi voz» al verbo correspondiente y se sustituye «mi encargo» por «mis preceptos» para lograr un español más natural y eclesialmente legible, manteniendo la acumulación diferenciada de términos legales. Aunque «preceptos» no reproduce todos los matices de מִשְׁמַרְתִּי, funciona mejor en español que «encargo» en este contexto y evita una frase más parafrástica.
