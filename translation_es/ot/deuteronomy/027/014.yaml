translation:
  language: es
  text: Y los levitas responderán y dirán a todo hombre de Israel en alta voz.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a todo israelita». El hebreo dice literalmente «a todo hombre de Israel», con singular masculino y fuerza representativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָנוּ
  english_pob_choice: shall answer
  chosen_spanish: responderán
  alternatives_spanish:
  - contestarán
  - harán su respuesta
  lexicon: HALOT
  rationale: ענה en esta construcción introduce una respuesta o proclamación formal. En español, «responderán» conserva el valor idiomático y ceremonial sin volverlo demasiado rígido.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas sacerdotales
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente a «los levitas», no a «los sacerdotes». Mantener el término exacto respeta la distinción del contexto inmediato.
- source_word: וְאָמְרוּ
  english_pob_choice: and say
  chosen_spanish: y dirán
  alternatives_spanish:
  - y hablarán
  - y hablarán diciendo
  lexicon: HALOT
  rationale: אמר es el verbo común para hablar o decir. «Y dirán» mantiene la secuencia natural de una proclamación formal en español.
- source_word: אֶל כָּל אִישׁ יִשְׂרָאֵל
  english_pob_choice: to every man of Israel
  chosen_spanish: a todo hombre de Israel
  alternatives_spanish:
  - a todo israelita
  - a toda persona de Israel
  lexicon: HALOT
  rationale: אִישׁ es singular masculino. «Todo hombre de Israel» conserva la forma masculina singular y su fuerza representativa, como lo refleja la nota del POB en inglés.
- source_word: ק֥וֹל רָם
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - en voz alta
  - a gran voz
  lexicon: HALOT
  rationale: La expresión hebrea indica una proclamación audible y pública. «Con voz fuerte» comunica bien el sentido, aunque «en voz alta» también sería posible en español corriente.
theological_decisions:
- issue: Lenguaje masculino singular representativo en אִישׁ
  english_pob_reading: to every man of Israel
  chosen_spanish_reading: a todo hombre de Israel
  alternative_spanish_readings:
  - a todo israelita
  - a todos los hombres de Israel
  rationale: El hebreo usa singular masculino con fuerza colectiva o representativa. Se conserva esa forma en vez de neutralizarla, siguiendo la política textual de precisión de género cuando el original la expresa.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa coinciden en el sentido y en la decisión de mantener el singular masculino representativo; no se observan revisiones pendientes que afecten esta línea.
  spanish_consistency_notes:
  - Se mantuvo «levitas» para el hebreo explícito, evitando ampliar a «sacerdotes».
  - «Con voz fuerte» traduce de forma natural קוֹל רָם sin perder el valor de proclamación pública.
  - La nota al pie conserva la alternativa suavizada «israelita», pero el cuerpo principal preserva la forma masculina singular del original.
