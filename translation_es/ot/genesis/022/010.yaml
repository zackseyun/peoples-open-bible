revisions:
- from: Entonces Abraham extendió[a] su mano y tomó el cuchillo para sacrificar a su hijo[b].
  to: Entonces Abraham extendió su mano y tomó el cuchillo para degollar a su hijo[a][b].
  rationale: Se corrige el verbo principal para לִשְׁחֹט a 'degollar', que representa mejor la especificidad léxica de שָׁחַט y mantiene el peso sacrificial sin sobreinterpretar como un acto cultual ya consumado. También se repara la nota [a] para que ofrezca una alternativa genuina en lugar de repetir la lectura principal.
