revisions:
- from: ¿Cómo, pues, podrás volver atrás el rostro de un solo capitán[a] de los más pequeños[b] de los siervos de mi señor, mientras confías para ti en Egipto, en carros y en jinetes?
  to: ¿Cómo, pues, podrás volver atrás el rostro de un solo capitán[a] de los menos importantes[b] de los siervos de mi señor, mientras confías para ti en Egipto, para carros y jinetes?
  rationale: 'Se corrigen dos puntos para mayor fidelidad al hebreo y a la auditoría inglesa: «de los menos importantes» expresa rango inferior mejor que «de los más pequeños», y «para carros y jinetes» refleja mejor el valor de recurso/apoyo que «en carros y en jinetes». Se mantiene el giro literal «volver atrás el rostro de» por coherencia con la revisión auditada del POB, apoyado por la nota léxica existente.'
  reviewer_model: gpt-5.4
