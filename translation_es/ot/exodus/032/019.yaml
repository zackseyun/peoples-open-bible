revisions:
- from: Y sucedió que, cuando se acercó al campamento y vio el becerro y las danzas[a], la ira de Moisés se encendió, y arrojó las tablas de sus manos y las quebró al pie del monte.
  to: Y en cuanto se acercó al campamento y vio el becerro y las danzas[a], la ira de Moisés se encendió, y arrojó las tablas que llevaba en las manos y las quebró al pie del monte.
  rationale: Se ajusta la apertura para reflejar mejor la inmediatez temporal del hebreo en español natural, se repara la frase sobre las manos para que sea idiomática sin perder la imagen del original, y se corrige la nota para que preserve una alternativa léxica real en vez de repetir el texto principal. No se requiere adjudicación adicional.
