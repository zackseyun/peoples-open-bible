  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ταῦτα δέ, ἀδελφοί, μετεσχημάτισα εἰς ἐμαυτὸν καὶ ⸀Ἀπολλῶν δι’ ὑμᾶς, ἵνα ἐν ἡμῖν μάθητε τό· Μὴ ὑπὲρ ⸀ἃ ⸀γέγραπται, ἵνα μὴ εἷς ὑπὲρ τοῦ ἑνὸς φυσιοῦσθε κατὰ τοῦ ἑτέρου.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/004/006.yaml
  text: 'Now these things, brothers, I have applied to myself and Apollos for your sake, so that in us you may learn this: “Do not go beyond what is written,” so that none of you may be puffed up in favor of one against another.'
  footnotes:
  - marker: a
    text: 'Or ''brothers and sisters''; Greek ''brothers'' can address a mixed group.'
    reason: cultural_note
  - marker: b
    text: 'Greek is elliptical: literally, ''the “not beyond what is written.”'' It may reflect a slogan or maxim.'
    reason: lexical_alternative
translation:
  language: ko
  text: 형제들이여, 내가 이 일들을 여러분을 위하여 나 자신과 아볼로에 적용해 말한 것은, 우리에게서 「기록된 것을 넘어가지 말라」 하는 것을 배워, 여러분 중 누구도 한 사람을 편들어 다른 사람에 대하여 교만해지지 않게 하려는 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μετεσχημάτισα
  english_pob_choice: I have applied
  chosen_korean: 적용해 말한
  alternatives_korean:
  - 빗대어 말한
  - 비유로 옮긴
  lexicon: BDAG
  rationale: μετασχηματίζω는 「형태를 바꾸어 적용하다」. 자신을 예시로 삼은 수사적 기법.
- source_word: Μὴ ὑπὲρ ἃ γέγραπται
  english_pob_choice: Do not go beyond what is written
  chosen_korean: 기록된 것을 넘어가지 말라
  alternatives_korean:
  - 기록된 것 이상 가지 말라
  lexicon: BDAG
  rationale: 고린도 회중 내에 통용되던 격언(또는 바울의 인용 정형) 그대로 직역.
- source_word: φυσιοῦσθε
  english_pob_choice: may be puffed up
  chosen_korean: 교만해지지
  alternatives_korean:
  - 우쭐대지
  - 부풀어 오르지
  lexicon: BDAG
  rationale: 고전 4·5·8·13장의 핵심 어휘. 한국어 「교만해지다」가 자연스럽다.
