  from: Then the tested character of my chosen ones will appear, like gold that is tested by fire.
  to: Then the testing of my chosen ones will appear, like gold that is tested by fire.
  rationale: 'The Latin `probatio` primarily means ''testing'' or ''proving.'' In the context of the preceding verses describing violent persecution, this persecution is the active ''testing'' of the chosen ones, which is explicitly compared to gold being ''tested'' (`probatur`) by fire. Translating it as ''tested character'' shifts the focus from the ordeal they are enduring to their internal virtue, losing the direct cognate connection with `probatur` and the immediate context of tribulation. | Azure: In 6 Ezra 16:74, the Latin noun is plainly `probatio`, whose normal sense is "testing," "trial," or "proof," not the resultant quality "tested character." The immediate comparison confirms this: `ut a'
