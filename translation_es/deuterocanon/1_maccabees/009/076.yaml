translation:
  language: es
  text: Y los de la ciudad, atemorizados, abrieron[a], y Jonatán tomó el control de Jope. Y Apolonio oyó[b], y
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego deja sin expresar el objeto de «abrieron»; por el contexto, probablemente se refiere a la ciudad o a sus puertas.
    reason: lexical_alternative
  - marker: b
    text: El versículo termina en la fuente suministrada con «y Apolonio oyó, y», porque el testimonio aquí es incompleto.
    reason: textual_variant
lexical_decisions:
- source_word: φοβηθέντες
  english_pob_choice: being afraid
  chosen_spanish: temiendo
  alternatives_spanish:
  - teniendo miedo
  - estando asustados
  lexicon: LSJ
  rationale: El participio aoristo se entiende como una acción motivada por el temor; «temiendo» mantiene el valor causal y suena natural en español sin añadir una paráfrasis innecesaria.
- source_word: ἤνοιξαν
  english_pob_choice: opened up
  chosen_spanish: abrieron
  alternatives_spanish:
  - abrieron de par en par
  - abrieron las puertas
  lexicon: LSJ
  rationale: El griego no expresa el objeto directo; por eso se conserva el verbo simple «abrieron» y se deja la elipsis visible. «Abrieron las puertas» interpretaría más de lo que dice el texto base.
- source_word: οἱ ἐκ τῆς πόλεως
  english_pob_choice: those from the city
  chosen_spanish: los de la ciudad
  alternatives_spanish:
  - los habitantes de la ciudad
  - los hombres de la ciudad
  - los que estaban en la ciudad
  lexicon: LSJ
  rationale: La frase es sustantiva y designa a quienes pertenecen a la ciudad. «Los de la ciudad» es idiomático en español y conserva la vaguedad del griego sin especificar sexo o función militar.
- source_word: ἐκυρίευσεν
  english_pob_choice: gained control of
  chosen_spanish: tomó el control de
  alternatives_spanish:
  - se apoderó de
  - conquistó
  - tomó posesión de
  lexicon: LSJ
  rationale: El verbo κυριεύω expresa dominio o control; en este contexto militar-político, «tomó el control de» conserva la idea de dominio logrado sin obligar a leer una captura total en un sentido más estrecho.
- source_word: Ἰόππης
  english_pob_choice: Joppa
  chosen_spanish: Joppa
  alternatives_spanish:
  - Jope
  lexicon: LSJ
  rationale: Se mantiene la transliteración tradicional usada en la obra base y ampliamente reconocible en español bíblico, sin cambiar a una forma menos establecida aquí.
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - se enteró
  - escuchó
  lexicon: LSJ
  rationale: Para un relato breve, «oyó» reproduce el valor básico de ἀκούω y deja abierto el fragmento incompleto, tal como ocurre en el testimonio griego.
theological_decisions:
- issue: Fragmento final incompleto
  english_pob_reading: And Apollonius heard, and
  chosen_spanish_reading: Y Apolonio oyó, y
  alternative_spanish_readings:
  - Y Apolonio se enteró, y
  - Y Apolonio escuchó, y
  rationale: El testimonio fuente termina abruptamente con una conjunción final. Conviene preservar la incompletitud en español sin cerrar la frase ni suplir contenido ausente.
  doctrine_reference: Texto crítico / variante textual
- issue: Objeto implícito de «abrieron»
  english_pob_reading: opened up
  chosen_spanish_reading: abrieron[a]
  alternative_spanish_readings:
  - abrieron las puertas
  - abrieron la ciudad
  rationale: 'El griego deja sin expresar el objeto. La nota conserva la tensión textual: probablemente se trata de la ciudad o de sus puertas, pero el texto suministrado no lo dice de forma explícita.'
  doctrine_reference: Crítica textual / semántica del verbo
translation_notes:
  revision_awareness: El pasaje presenta acuerdo moderado con la revisión previa y no requiere cambios de contenido. Se mantiene la elipsis del objeto de «abrieron» y el final incompleto del versículo, en línea con el testimonio griego y la auditoría inglesa.
  spanish_consistency_notes:
  - Se usa «Joppa» para conservar la forma toponímica adoptada por la POB en inglés y evitar oscilar con «Jope».
  - Se mantiene «Apolonio» como transliteración estándar del nombre griego Ἀπολλώνιος.
  - 'La frase inicial conserva la inversión narrativa del griego: sujetos, temor, apertura, dominio y audición, sin añadir verbos auxiliares innecesarios.'
