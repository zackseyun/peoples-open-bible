  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: Hadad halla favor ante Faraón, y Faraón le da una mujer en matrimonio. Sin embargo, no sigue fielmente dos decisiones auditadas importantes del POB inglés: 1) el texto principal debía resolver el referente de אִשְׁתּוֹ en favor de Faraón, no dejarlo ambiguo; 2) הַגְּבִירָה fue adoptado en el POB inglés como equivalente funcional ''queen mother'', con la literalidad preservada en nota, no al revés.'
  spanish_quality_summary: 'El español es claro y legible, pero ''la gran dama'' suena menos natural y menos institucional en este contexto real. Además, la nota [a] no corresponde al tipo de nota inglesa: convierte una alternativa léxica del modismo en vez de conservar la alternativa referencial documentada sobre ''his wife''.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto (Yahvé, Mesías, etc.). El problema es de alineación con decisiones léxicas/contextuales del audit trail: conviene usar ''reina madre'' en el texto principal para הַגְּבִירָה y mover ''gran dama'' a nota; además, en español debe aclararse en el cuerpo ''la hermana de la propia esposa del Faraón'' para preservar la decisión contextual del POB.'
  issues:
