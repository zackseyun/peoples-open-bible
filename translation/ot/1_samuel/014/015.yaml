theological_decisions:
- issue: Meaning of לְחֶרְדַּת אֱלֹהִים
  chosen_reading: a trembling from God
  alternative_readings:
  - a very great trembling
  - a divine terror
  rationale: The Hebrew can be read either as a genitive of source or as an idiomatic superlative. Rendering it 'from God' preserves the text's theological tension and allows the event to be read as divinely caused without overstating beyond the wording. Because the superlative reading is also viable, it is preserved in a footnote rather than excluded.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
