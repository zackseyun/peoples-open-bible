review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: comercio/producidos de Tiro dedicados a Yahvé, no acumulados, sino destinados a quienes habitan delante de Yahvé para sustento y vestido. Sin embargo, dos elecciones desalinean parcialmente el matiz fuente/POB: אֶתְנַנָּהּ se acerca mejor a ''salarios/paga/hire'' que a ''ganancias'', y la nota a [a] introduce ''alquiler'', que no corresponde bien aquí. Además, el último sintagma suena poco natural en español con ''cobertura durable''.'
  spanish_quality_summary: El texto es mayormente legible, pero 'cosa santa para Yahvé' y especialmente 'cobertura durable' suenan algo forzados. Un español más natural y digno sería 'serán santas para Yahvé' y 'ropa duradera'. También conviene singularizar 'su mercancía' para mayor naturalidad y mejor eco del hebreo, aunque el plural no es imposible.
  glossary_alignment: Se mantiene correctamente 'Yahvé' para יהוה. No hay otros términos doctrinales problemáticos. La revisión propuesta conserva la dedicación cultual de קֹדֶשׁ y mejora la correspondencia léxica de אֶתְנַנָּהּ con 'salarios', preservando en nota la alternativa 'paga'.
  issues:
  - severity: medium
    issue: אֶתְנַנָּהּ fue traducido como 'sus ganancias'
    rationale: El término denota pago/hire/wages y en este contexto puede evocar la imaginería de prostitución de Tiro. 'Ganancias' diluye ese matiz y se superpone demasiado con 'mercancía'.
  - severity: medium
    issue: La nota [a] usa 'alquiler' como alternativa
    rationale: Aunque la raíz puede relacionarse con hire/payment, 'alquiler' en español sugiere renta de bienes y no comunica bien el matiz de pago/remuneración aquí.
  - severity: medium
    issue: '''cobertura durable'' suena antinatural en español bíblico contemporáneo'
    rationale: Aunque intenta preservar la ambigüedad de לִמְכַסֶּה עָתִיק, la expresión resulta poco idiomática. 'Ropa duradera' transmite mejor la idea principal documentada por el POB y sigue siendo compatible con la nota de alternativas.
  - severity: low
    issue: '''cosa santa para Yahvé'' es menos natural que una formulación adjetival'
    rationale: El hebreo predica santidad/dedicación; en español 'serán santas para Yahvé' o 'serán consagradas a Yahvé' fluye mejor sin pérdida de sentido.
  revised_spanish_text: Y su mercancía y sus salarios serán santas para Yahvé[a]; no serán almacenados ni acaparados, porque su mercancía será para los que habitan delante de Yahvé, para comer hasta saciarse y para ropa duradera[b].
  revised_footnotes:
