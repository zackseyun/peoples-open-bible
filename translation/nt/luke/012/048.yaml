theological_decisions:
- issue: Nature of the punishment imagery
  chosen_reading: Retain the concrete disciplinary imagery ('blows') without softening it into a vague consequence or intensifying it into a specific judicial system.
  alternative_readings:
  - abstract consequence language such as 'punishment'
  - more specific corporal language such as 'lashes' or 'flogging'
  rationale: The verse uses a parabolic image of graded punishment tied to knowledge and responsibility. The translation should preserve the image and the moral logic without importing a full doctrine of final judgment mechanics beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Agency in the final clause
  chosen_reading: Keep the indefinite plural 'they' in 'they entrusted' / 'they will ask' rather than specifying God explicitly.
  alternative_readings:
  - God entrusted ... God will require
  - people entrusted ... people will ask
  rationale: The Greek uses third person plural verbs without explicit subject. In context the saying expresses a general principle of accountability; specifying the subject would interpret beyond the wording.
  doctrine_reference: Do not import doctrinal claims the text does not make.
