translation:
  language: es
  text: Y tenían en su heredad Beer-sheba[a], Sheba y Moladá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Beer-sheba y Sheba». Algunos entienden esto como un solo nombre de lugar («Beer-sheba») con una irregularidad textual o estilística, más que como dos pueblos separados.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And they had
  chosen_spanish: Y tenían
  alternatives_spanish:
  - Y fue
  - Y había
  lexicon: HALOT
  rationale: En listas de repartición de tierras, ויהי + ל + sufijo pronominal expresa posesión/asignación. En español, «tenían» comunica de forma natural que estos lugares pertenecían a su heredad, sin perder el matiz de posesión asignada.
- source_word: לָהֶם
  english_pob_choice: they
  chosen_spanish: '(implícito en «tenían»; sujeto: «ellos»/«ellos mismos» dentro del contexto)'
  alternatives_spanish:
  - para ellos
  - a ellos
  lexicon: HALOT
  rationale: El hebreo usa un dativo posesivo; en español conviene convertirlo en sujeto verbal implícito con «tenían», como hizo la POB inglesa con «they had».
- source_word: בְּנַחֲלָתָם
  english_pob_choice: in their inheritance
  chosen_spanish: en su heredad
  alternatives_spanish:
  - dentro de su herencia
  - en su posesión heredada
  lexicon: HALOT
  rationale: נחלה se refiere a la porción heredada/asignada, especialmente territorial. «Heredad» conserva el sentido bíblico de tierra asignada y suena natural en español bíblico contemporáneo.
- source_word: בְּאֵר שֶׁבַע
  english_pob_choice: Beer-sheba
  chosen_spanish: Beer-sheba
  alternatives_spanish:
  - Beerseba
  lexicon: HALOT
  rationale: Es un nombre propio de lugar transliterado. Se conserva la forma compuesta con guion, siguiendo el valor transparente del nombre hebreo y la práctica de la POB inglesa.
- source_word: וְשֶׁבַע
  english_pob_choice: Sheba
  chosen_spanish: Sheba
  alternatives_spanish:
  - y Sheba
  lexicon: HALOT
  rationale: La secuencia consonántica permite entender un topónimo separado. Como en la POB inglesa, se mantiene la posible lectura de dos lugares distintos, sin borrar la tensión textual.
- source_word: וּמוֹלָדָה
  english_pob_choice: and Moladah
  chosen_spanish: y Molada
  alternatives_spanish:
  - Molada
  lexicon: HALOT
  rationale: Nombre propio de lugar transliterado al español. Se adapta la terminación para lectura natural en español, manteniendo la identificación del topónimo.
translation_notes:
  revision_awareness: 'Se siguió de cerca la solución auditada de la POB inglesa: una lista de heredad con posesión expresada idiomáticamente, transliteración de topónimos y preservación de la nota textual sobre «Beer-sheba / Sheba». No hubo revisiones adicionales en el registro inglés reciente.'
  spanish_consistency_notes:
  - Se usa «heredad» para נחלה en contexto territorial, coherente con el uso bíblico de reparto de tierras.
  - Se conserva «Beer-sheba» con guion para reflejar la forma compuesta del nombre y su relación con la nota textual.
  - «Molada» sigue la adaptación española más natural del topónimo, sin alterar la identificación del lugar.
