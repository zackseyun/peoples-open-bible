translation:
  language: es
  text: 'Entonces los ancianos de Galaad dijeron a Jefté[a]: «Yahvé será testigo entre nosotros si no hacemos conforme a tu palabra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Yahvé será oyendo entre nosotros»; es decir, oyendo como testigo o juez entre las dos partes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִקְנֵי גִלְעָד
  english_pob_choice: the elders of Gilead
  chosen_spanish: los ancianos de Galaad
  alternatives_spanish:
  - los líderes de Galaad
  - los ancianos de Gilead
  lexicon: HALOT
  rationale: La frase constructa designa a los líderes reconocidos de Galaad. En español, «ancianos» comunica bien la idea de autoridad comunitaria, y «Galaad» mantiene la forma castellana habitual del topónimo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino, no un título. Siguiendo la convención del proyecto, se conserva la forma «Yahvé» para reflejar el Tetragrámaton sin sustituirlo por un título.
- source_word: יִהְיֶה שֹׁמֵעַ בֵּינוֹתֵינוּ
  english_pob_choice: be a witness between us
  chosen_spanish: será testigo entre nosotros
  alternatives_spanish:
  - estará oyendo entre nosotros
  - será oyente entre nosotros
  - será testigo/juez entre nosotros
  lexicon: HALOT
  rationale: 'La expresión hebrea literalmente dice «ser oyente entre», pero en contexto de juramento y disputa tiene fuerza judicial: oír como testigo y árbitro. «Será testigo entre nosotros» preserva esa función sin sonar forzado en español.'
- source_word: אִם לֹא
  english_pob_choice: if ... not
  chosen_spanish: si no
  alternatives_spanish:
  - a menos que no
  - si no fuera que
  lexicon: HALOT
  rationale: Aquí introduce la condición del juramento, no una simple afirmación enfática. «Si no» reproduce esa estructura condicional de manera natural.
- source_word: כִדְבָרְךָ
  english_pob_choice: according to your word
  chosen_spanish: conforme a tu palabra
  alternatives_spanish:
  - según tu palabra
  - de acuerdo con tu palabra
  - conforme a lo que has dicho
  lexicon: HALOT
  rationale: La frase hebrea significa literalmente «según tu palabra». «Conforme a tu palabra» conserva el paralelismo verbal y sugiere las condiciones propuestas por Jefté.
- source_word: כֵּן נַעֲשֶׂה
  english_pob_choice: do according to your word
  chosen_spanish: haremos
  alternatives_spanish:
  - haremos así
  - actuaremos así
  - lo haremos así
  lexicon: HALOT
  rationale: 'El hebreo completa la idea de la promesa: «así haremos». En español, la cláusula previa ya expresa el contenido («conforme a tu palabra»), por lo que «haremos» comunica la respuesta obligada sin redundancia innecesaria. La nota explica el sentido más literal preservado en el inglés POB.'
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijeron
  alternatives_spanish:
  - Y ... dijeron
  - Luego ... dijeron
  lexicon: HALOT
  rationale: La waw narrativa avanza la acción. «Entonces» da un flujo narrativo natural en español y refleja la secuencia del relato.
theological_decisions:
- issue: El nombre divino יְהוָה en una fórmula de juramento
  english_pob_reading: Yahweh will be witness between us
  chosen_spanish_reading: Yahvé será testigo entre nosotros
  alternative_spanish_readings:
  - Yahvé estará oyendo entre nosotros
  - Yahvé será oyente entre nosotros
  rationale: En esta escena, el nombre divino aparece dentro de una fórmula jurídica de juramento. La traducción «será testigo» comunica la función judicial de Dios en el pacto sin ocultar el nombre personal divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Función judicial de «oyente»/«testigo»
  english_pob_reading: be a witness between us
  chosen_spanish_reading: será testigo entre nosotros
  alternative_spanish_readings:
  - será oyente entre nosotros
  - será juez entre nosotros
  rationale: El hebreo subyacente permite la idea de «oír» con valor forense. En español, «testigo» recoge mejor esa implicación judicial, mientras que «juez» sería más interpretativo. Se mantiene la tensión lexical en la nota.
  doctrine_reference: 'DOCTRINE.md: Source-transparent rendering and forensic idiom'
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de una formulación optativa («May the LORD be a witness») a una declaración directa («The LORD will be witness»). La redacción española sigue esa revisión y evita una lectura desiderativa, preservando el valor declarativo del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme a la política del proyecto.
  - «Ancianos» traduce el oficio comunitario sin introducir lenguaje eclesiástico ajeno.
  - La nota conserva la alternativa más literal «oyendo», porque el hebreo emplea un participio de escuchar con función forense.
