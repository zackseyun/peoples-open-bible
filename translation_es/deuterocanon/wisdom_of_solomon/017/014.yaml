  lexicon: LSJ
  rationale: El adjetivo expresa falta de poder o fuerza. «Impotente» conserva la repetición retórica con ἐξ ἀδυνάτου y mantiene el matiz de incapacidad, sin convertirlo en una interpretación moral.
- source_word: ὄντως
