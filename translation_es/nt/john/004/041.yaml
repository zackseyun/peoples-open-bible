    rationale: '«Muchísimo más» en español funciona normalmente como intensificador singular/adverbial y no expresa bien el comparativo plural «muchos más». Conviene una alternativa que conserve el sentido de cantidad comparativa plural, p. ej. «muchos más todavía» o «muchos más». '
  revised_spanish_text: Y muchos más creyeron por su palabra[a][b].
