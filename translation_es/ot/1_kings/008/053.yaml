revisions:
- from: Porque tú los has apartado para ti como herencia, de entre todos los pueblos de la tierra[a], conforme a lo que hablaste por medio de Moisés, tu esclavo[b], cuando sacaste a nuestros padres de Egipto, Señor Yahvé[c].
  to: Porque tú los has apartado para ti como herencia de entre todos los pueblos de la tierra, tal como hablaste por medio[a] de Moisés, tu siervo, cuando sacaste a nuestros padres[b] de Egipto, Señor Yahvé[c].
  rationale: Se corrige «tu esclavo» a «tu siervo» conforme a la decisión lexical auditada para este contexto honorífico; se realinean las notas al pie con las alternativas realmente preservadas por el POB (mediación por Moisés, padres/antepasados, y la fórmula divina); y se pule la fluidez española quitando la coma innecesaria y usando «tal como», que expresa bien כַּאֲשֶׁר.
