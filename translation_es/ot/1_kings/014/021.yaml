translation:
  language: es
  text: Y Roboam, hijo de Salomón, reinó en Judá[a]. Roboam tenía cuarenta y un años cuando llegó a ser rey, y reinó diecisiete años en Jerusalén, la ciudad que Yahvé había escogido de entre todas las tribus de Israel para poner allí su nombre[b]. Y el nombre de su madre era Naamá, la amonita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre Judá», si se enfatiza el ejercicio de autoridad real más que la ubicación territorial.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «para poner allí su nombre», una fórmula de elección y presencia asociada al lugar de culto.'
    reason: theological_note
lexical_decisions:
- source_word: מָלַךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - gobernó
  - fue rey
  lexicon: HALOT
  rationale: El qal perfecto describe el ejercicio real del gobierno. En español, «reinó» conserva el valor monárquico de forma natural y no añade matices ajenos. En la segunda ocurrencia, «comenzó a reinar» traduce con precisión el valor temporal de בְּמָלְכוֹ.
- source_word: בִּיהוּדָה
  english_pob_choice: in Judah
  chosen_spanish: en Judá
  alternatives_spanish:
  - sobre Judá
  - en el territorio de Judá
  lexicon: HALOT
  rationale: La preposición בּ aquí puede entenderse locativamente. «En Judá» sigue de cerca el hebreo y es claro en español; «sobre Judá» es posible en sentido de gobierno, pero no es la opción base del texto inglés auditado.
- source_word: בְּמָלְכוֹ
  english_pob_choice: when he became king
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando fue hecho rey
  - al tiempo de su ascensión al trono
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo marca el momento de acceso al trono. «Comenzó a reinar» comunica ese punto de inicio con naturalidad y distingue la edad de acceso de los años totales de reinado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma de proyecto «Yahvé», según el criterio español del POB. Esto evita la sustitución por un título y mantiene la transparencia hacia el nombre propio revelado.
- source_word: לָשׂוּם אֶת שְׁמוֹ שָׁם
  english_pob_choice: to put his name there
  chosen_spanish: para poner allí su nombre
  alternatives_spanish:
  - para establecer allí su nombre
  - para hacer habitar allí su nombre
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «poner su nombre allí». Se mantiene el giro sin ampliarlo a una paráfrasis más interpretativa, preservando el valor pactual del idioma del nombre.
- source_word: מִכֹּל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: from all the tribes of Israel
  chosen_spanish: de entre todas las tribus de Israel
  alternatives_spanish:
  - de todas las tribus de Israel
  - entre todas las tribus de Israel
  lexicon: HALOT
  rationale: El מִן expresa selección de entre un conjunto. «De entre» hace visible esa idea electiva con naturalidad en español y evita ambigüedad de mera procedencia.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: And his mother’s name was
  chosen_spanish: Y el nombre de su madre era
  alternatives_spanish:
  - Y se llamaba su madre
  - Y el nombre de su madre fue
  lexicon: HALOT
  rationale: Se conserva la fórmula formal característica de Reyes. «Era» funciona bien en el registro narrativo y respeta el carácter identificador de la construcción.
- source_word: הָעַמֹּנִית
  english_pob_choice: the Ammonite woman
  chosen_spanish: la amonita
  alternatives_spanish:
  - la mujer amonita
  - la ammonita
  lexicon: HALOT
  rationale: El gentilicio femenino identifica el origen étnico de Naamá. «La amonita» es breve, natural y suficientemente explícito en español; «amonita» evita arcaísmos como «ammonita» y no añade una perífrasis innecesaria.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La traducción española conserva el nombre propio divino en vez de sustituirlo por un título. Esto sigue la línea documental del POB y mantiene la transparencia respecto del Tetragrámaton en el texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Expresión cultual «poner su nombre allí»
  english_pob_reading: to put his name there
  chosen_spanish_reading: para poner allí su nombre
  alternative_spanish_readings:
  - para hacer habitar allí su nombre
  - para establecer allí su nombre
  rationale: Se conserva la fórmula sin expandirla en una paráfrasis teológica. El texto habla de la ciudad elegida para asociarla con el nombre de Yahvé; en español conviene preservar la tensión idiomática del hebreo.
  doctrine_reference: Deuteronomic name theology / covenantal-name formula
- issue: Identidad étnica de Naamá
  english_pob_reading: the Ammonite woman
  chosen_spanish_reading: la amonita
  alternative_spanish_readings:
  - la mujer amonita
  - la ammonita
  rationale: La designación gentilicia se entiende como dato de procedencia, no como comentario moral. Se preserva la neutralidad del hebreo y la claridad narrativa.
  doctrine_reference: Narrative ethnonym usage in Kings
translation_notes:
  revision_awareness: La revisión inglesa más reciente afinó la fórmula de filiación y precisó «the Ammonite woman». En español se reflejó esa precisión con un gentilicio femenino breve y natural («la amonita»), y se mantuvo una traducción formal pero no calcada de la oración principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, conforme al criterio editorial español del proyecto.
  - Se mantiene «reinó» / «comenzó a reinar» para distinguir el hecho del reinado de su inicio cronológico.
  - «De entre todas las tribus de Israel» conserva la idea de selección implícita en מִן.
  - El orden narrativo sigue el hebreo y el inglés auditado sin introducir expansión interpretativa.
