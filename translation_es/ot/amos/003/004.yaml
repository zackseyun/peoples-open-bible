translation:
  language: es
  text: ¿Ruge un león en el bosque cuando no tiene presa? ¿Alza un león joven su voz desde su guarida[a] a menos que haya atrapado algo?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde su madriguera».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a menos que haya atrapado». El objeto queda implícito por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁאַג
  english_pob_choice: roar
  chosen_spanish: ruge
  alternatives_spanish:
  - brama
  - ruge con fuerza
  lexicon: HALOT
  rationale: El verbo hebreo expresa el bramido fuerte de un león. «Ruge» es el equivalente natural y solemne en español, y conserva la fuerza retórica de la pregunta.
- source_word: אַרְיֵה
  english_pob_choice: lion
  chosen_spanish: león
  alternatives_spanish:
  - leona
  lexicon: HALOT
  rationale: Término animal directo. «León» mantiene la imagen y el paralelismo.
- source_word: בַּיַּעַר
  english_pob_choice: in the forest
  chosen_spanish: en el bosque
  alternatives_spanish:
  - en la espesura
  - en el monte
  lexicon: HALOT
  rationale: יַעַר puede referirse a bosque o arboleda. «Bosque» es claro, moderno y fiel al ámbito del animal.
- source_word: טֶרֶף
  english_pob_choice: prey
  chosen_spanish: presa
  alternatives_spanish:
  - alimento
  - algo desgarrado
  lexicon: HALOT
  rationale: En contexto de caza, el sustantivo significa presa. «Presa» conserva el sentido de lo capturado para comer.
- source_word: אֵין לוֹ
  english_pob_choice: it has no
  chosen_spanish: no tiene
  alternatives_spanish:
  - no hay para él
  - carece de
  lexicon: HALOT
  rationale: La construcción indica falta o ausencia. «No tiene» suena natural en español y respeta el sujeto animal.
- source_word: יִתֵּן קוֹלוֹ
  english_pob_choice: raise its voice
  chosen_spanish: da su voz
  alternatives_spanish:
  - alza su voz
  - lanza su voz
  - ruge
  lexicon: HALOT
  rationale: Literalmente es «dar su voz». «Da su voz» conserva el giro hebreo sin volverlo artificioso; el contexto del león justifica la imagen vocal.
- source_word: כְּפִיר
  english_pob_choice: young lion
  chosen_spanish: cachorro de león
  alternatives_spanish:
  - león joven
  - leoncillo
  lexicon: HALOT
  rationale: El término designa un león joven y vigoroso. «Cachorro de león» es claro en español; se evita reducirlo a un simple diminutivo si el contexto no lo exige.
- source_word: מִמְּעֹנָתוֹ
  english_pob_choice: from its den
  chosen_spanish: desde su guarida
  alternatives_spanish:
  - desde su cueva
  - desde su madriguera
  lexicon: HALOT
  rationale: El sustantivo alude al lugar de habitación del animal. «Guarida» funciona bien para una fiera y mantiene la imagen zoológica. La nota permite la variante «desde su guarida / desde su madriguera» según el matiz.
- source_word: בִּלְתִּי אִם
  english_pob_choice: unless
  chosen_spanish: si no
  alternatives_spanish:
  - a menos que
  - salvo que
  lexicon: HALOT
  rationale: La combinación introduce una condición exceptiva. «Si no» reproduce de manera directa la lógica del hebreo; en español puede leerse como excepción condicional equivalente a «a menos que».
- source_word: לָכָד
  english_pob_choice: has caught something
  chosen_spanish: ha atrapado
  alternatives_spanish:
  - ha capturado
  - ha apresado
  lexicon: HALOT
  rationale: El verbo significa capturar o apoderarse de una presa. Se omite el objeto explícito porque el hebreo lo deja implícito por el contexto; en español, «ha atrapado» mantiene la elipsis con naturalidad.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo de WLC y el audit trail inglés. Se mantuvo la estructura interrogativa paralela, el campo semántico de caza y la elipsis del objeto final, tal como la traducción inglesa documenta. La decisión de usar «guarida» y «ha atrapado» se tomó para conservar naturalidad en español sin perder la tensión lexical del original.
  spanish_consistency_notes:
  - Se mantiene «león» y «cachorro de león» para preservar el paralelismo.
  - Se traduce la elipsis final sin añadir un objeto explícito en el texto principal, siguiendo el contexto del hebreo.
  - «Bosque» y «presa» reflejan los valores más directos y transparentes de יער y טרף.
