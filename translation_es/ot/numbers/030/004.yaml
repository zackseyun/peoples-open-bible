translation:
  language: es
  text: Y si una mujer hace un voto a Yahvé[a] y se impone una obligación[b] en la casa de su padre, en su juventud,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: "Hebreo: «vota un voto»; una construcción cognada que enfatiza el acto formal de hacer un voto."
    reason: lexical_alternative
  - marker: b
    text: "O: «y se ata con una obligación vinculante». El hebreo usa un verbo y un sustantivo relacionados para expresar que ella misma queda bajo un compromiso obligatorio."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִשָּׁה
  english_pob_choice: And if a woman
  chosen_spanish: Y si una mujer
  alternatives_spanish:
  - Y una mujer
  - Cuando una mujer
  lexicon: HALOT
  rationale: En el estilo casuístico del texto legal, la cláusula introduce un caso condicional. «Y si una mujer» conserva el valor de caso y el enlace lógico del hebreo sin sonar forzado en español.
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: Aquí כִּי introduce una situación jurídica hipotética. «Si» es el equivalente más natural en español para este uso legal.
- source_word: תִדֹּר נֶדֶר
  english_pob_choice: vows a vow
  chosen_spanish: hace un voto
  alternatives_spanish:
  - formula un voto
  - vota un voto
  lexicon: HALOT
  rationale: El hebreo usa una construcción verbo-sustantivo enfática. En español, «hace un voto» comunica el acto formal sin sonar artificial; la redundancia se explica en nota para no perder la fuerza lexical del original.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: «Yahvé» en el texto principal, manteniendo el nombre divino del original hebreo y evitando la máscara litúrgica «SEÑOR».'
- source_word: וְאָסְרָה אִסָּר
  english_pob_choice: and binds herself by an obligation
  chosen_spanish: y se impone una obligación
  alternatives_spanish:
  - y se ata con un compromiso
  - y se vincula con una obligación
  lexicon: HALOT
  rationale: El hebreo combina verbo y sustantivo afines para expresar una carga vinculante. «Se impone una obligación» conserva la idea de auto-vinculación legal y resulta claro en español, aunque la nota preserva la alternativa más literal de «vínculo/atadura».
- source_word: בְּבֵית אָבִיהָ
  english_pob_choice: in her father's house
  chosen_spanish: en la casa de su padre
  alternatives_spanish:
  - en casa de su padre
  lexicon: HALOT
  rationale: La frase señala el ámbito doméstico y de autoridad paterna. «En la casa de su padre» es transparente y mantiene el matiz legal-social del hebreo.
- source_word: בִּנְעֻרֶיהָ
  english_pob_choice: in her youth
  chosen_spanish: en su juventud
  alternatives_spanish:
  - cuando es joven
  - durante su juventud
  lexicon: HALOT
  rationale: El término indica la etapa de juventud y, en este contexto, la condición bajo la autoridad del padre. «En su juventud» es fiel y natural en español; la posición final mantiene el flujo del verso.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El hebreo contiene explícitamente el Tetragrámaton. Conforme al estándar del proyecto en español, se usa «Yahvé» en el texto principal para conservar el nombre pactal revelado, en vez de la convención sustitutiva «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca el audio-trazado inglés, pero ajusta la redacción al español natural. Se conserva la distinción entre נֶדֶר («voto») y אִסָּר («obligación») sin fusionarlas. No se adoptó una máscara litúrgica para יהוה, en coherencia con la política del proyecto en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - «Voto» se emplea para נֶדֶר y «obligación» para אִסָּר, manteniendo la diferencia lexical.
  - La sintaxis respeta el estilo jurídico condicional del hebreo con «Y si...».
  - La cláusula final queda abierta como en el hebreo, sin añadir elementos interpretativos.
