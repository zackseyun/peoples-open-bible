translation:
  language: es
  text: Que Dios quite[a] a los que viven en hipocresía entre los piadosos[b], en la corrupción[c] de su carne y la pobreza de su vida[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arranque» o «aparte».
    reason: lexical_alternative
  - marker: b
    text: O «entre los fieles».
    reason: alternative_reading
  - marker: c
    text: O «con corrupción en su carne».
    reason: alternative_reading
  - marker: d
    text: El griego usa pronombres singulares («su carne», «su vida») de manera distributiva para la clase descrita.
    reason: grammatical_note
lexical_decisions:
- source_word: ἐξάραι
  english_pob_choice: remove
  chosen_spanish: quite
  alternatives_spanish:
  - remueva
  - saque
  - arranque
  lexicon: LSJ
  rationale: «Quitar» expresa bien la remoción solicitada a Dios sin cargar el verbo con una violencia mayor que la del griego. Mantiene la fuerza de exclusión o expulsión presente en el contexto imprecatorio.
- source_word: ὑποκρίσει
  english_pob_choice: hypocrisy
  chosen_spanish: hipocresía
  alternatives_spanish:
  - disimulo
  - pretensión
  - dissimulación
  lexicon: LSJ
  rationale: «Hipocresía» es el equivalente natural en español y conserva el registro moral-religioso del término.
- source_word: ὁσίων
  english_pob_choice: the pious
  chosen_spanish: los piadosos
  alternatives_spanish:
  - los fieles
  - los devotos
  - los santos
  lexicon: LSJ
  rationale: En el contexto de Psalms of Solomon, ὅσιοι no se debe nivelar a «santos»; «piadosos» refleja mejor el grupo religioso específico y sigue la decisión auditada del texto inglés.
- source_word: ἐν φθορᾷ
  english_pob_choice: with corruption
  chosen_spanish: en la corrupción
  alternatives_spanish:
  - con corrupción
  - en la ruina
  - con deterioro
  lexicon: LSJ
  rationale: «Corrupción» es una correspondencia más cercana al valor léxico de φθορά y permite conservar la referencia corporal al ir unido a «carne».
- source_word: σαρκός
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  - naturaleza humana
  lexicon: LSJ
  rationale: Se mantiene «carne» para respetar el sentido literal del griego y la política del proyecto; aquí designa la condición corporal, no una abstracción ética.
- source_word: πενίᾳ
  english_pob_choice: poverty
  chosen_spanish: pobreza
  alternatives_spanish:
  - indigencia
  - miseria
  - escasez
  lexicon: LSJ
  rationale: «Pobreza» es el equivalente más directo y natural en español para la severidad concisa del verso.
- source_word: τὴν ζωὴν αὐτοῦ
  english_pob_choice: their life
  chosen_spanish: su vida
  alternatives_spanish:
  - la vida de él
  - su existencia
  - sus vidas
  lexicon: LSJ
  rationale: Conservar «su vida» permite respetar la construcción singular distributiva del griego sin forzar una perífrasis pesada. El singular español mantiene la tensión del original; el referente es colectivo en el encuadre, aunque la forma griega sea singular.
theological_decisions:
- issue: Valor modal de ἐξάραι al inicio
  english_pob_reading: 'A wish/prayer: ''May God remove those...'''
  chosen_spanish_reading: 'Una imprecación/súplica: «Que Dios quite...»'
  alternative_spanish_readings:
  - Dios quite...
  - Ojalá Dios quite...
  - Para que Dios quite...
  rationale: El griego comprimido encaja mejor en español como deseo dirigido a Dios. «Que Dios quite» conserva el tono de ruego judicial sin añadir un verbo finito ajeno al texto.
  doctrine_reference: Imprecación bíblica; salmos de juicio
- issue: Pronombres singulares distributivos en αὐτοῦ
  english_pob_reading: Greek 'his flesh' and 'his life' use singular pronouns distributively for the class described.
  chosen_spanish_reading: 'Conservar el singular: «su carne» y «su vida».'
  alternative_spanish_readings:
  - su carne y su vida
  - su carne y sus vidas
  - su carne y la vida de ellos
  rationale: El singular en español refleja mejor la forma griega y evita suavizar la oscilación retórica del pasaje. Aunque el referente es un grupo, el verso presenta la figura individualizada de manera distributiva.
  doctrine_reference: Gramática del singular distributivo
- issue: Relación de ὁσίων con la comunidad descrita
  english_pob_reading: Or 'among the pious'
  chosen_spanish_reading: «entre los piadosos»
  alternative_spanish_readings:
  - entre los santos
  - entre los fieles
  - con los piadosos
  rationale: «Piadosos» evita la lectura eclesiástica de «santos» y conserva el carácter socioreligioso específico del término en Psalms of Solomon, como indica el aparato de revisión.
  doctrine_reference: Distinción léxica ὅσιοι/ἅγιοι
translation_notes:
  revision_awareness: La redacción sigue la última revisión auditada que prefirió «corruption» para φθορά y eliminó la coordinación añadida antes de la frase final. También conserva el singular distributivo de αὐτοῦ, sin armonizarlo al plural, y evita traducir ὁσίων como «santos» para respetar la decisión contextual del libro.
  spanish_consistency_notes:
  - Se mantuvo «Dios» porque el texto griego tiene ὁ θεός; no se introduce «Yahvé» al no aparecer el nombre divino.
  - Se usó «piadosos» para ὁσίων conforme al contexto del libro y a la revisión más reciente.
  - La secuencia «en la corrupción de su carne y en la pobreza su vida» intenta reproducir la estructura griega sin añadir elementos explicativos.
  - Se evitó «Cristo», «SEÑOR» y otras equivalencias no presentes en el texto fuente.
