base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/018/010.yaml
  text: And it happened on the next day that an evil spirit from God rushed upon Saul[a], and he prophesied within the house while David was playing with his hand, as day by day[d][c][b]; and the spear was in Saul’s hand.
  footnotes:
  - marker: a
    text: Or 'a harmful spirit from God'; Hebrew literally, 'an evil spirit of God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he prophesied' or 'he was in a prophetic frenzy'; the verb can denote ecstatic behavior, but here the context suggests deranged ravings rather than true prophecy.
    reason: alternative_reading
  - marker: c
    text: The instrument is not named in this verse, though it is identified elsewhere in the context.
    reason: cross_reference
  - marker: d
    text: Or 'as day by day'.
    reason: previous_rendering
