translation:
  language: es
  text: '¿Acaso los dioses de las naciones que mis padres destruyeron los libraron: Gozán, Harán, Rezef y la gente de Edén[a], que estaba en Tel-asar?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los hijos de Edén'. El hebreo dice literalmente 'hijos de Edén', lo cual puede designar al pueblo o a los habitantes de Edén.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַהִצִּילוּ
  english_pob_choice: Did ... deliver
  chosen_spanish: ¿Acaso ... las libraron?
  alternatives_spanish:
  - ¿Acaso ... las salvaron?
  - ¿Acaso ... las rescataron?
  lexicon: HALOT
  rationale: La forma hebrea es un perfecto hifil usado en pregunta retórica. En español, una pregunta con '¿Acaso...?' reproduce bien el tono desafiante. 'Libraron' conserva el valor bíblico de rescatar/deliver sin volver la frase demasiado mecánica.
- source_word: אֱלֹהֵי הַגּוֹיִם
  english_pob_choice: the gods of the nations
  chosen_spanish: los dioses de las naciones
  alternatives_spanish:
  - los dioses nacionales
  - los dioses de aquellos pueblos
  lexicon: HALOT
  rationale: La construcción hebrea designa a las deidades adoradas por las naciones. 'Los dioses de las naciones' es la correspondencia directa y transparente.
- source_word: אֲשֶׁר שִׁחֲתוּ אֲבוֹתַי
  english_pob_choice: that my fathers destroyed
  chosen_spanish: que mis padres destruyeron
  alternatives_spanish:
  - que mis antepasados arrasaron
  - que mis padres arruinaron
  lexicon: HALOT
  rationale: En este contexto militar, שׁחת transmite destruir/arrasar. 'Mis padres' preserva el hebreo literal y el modo real de hablar de predecesores en estilo regio.
- source_word: אֶת גּוֹזָן וְאֶת חָרָן וְרֶצֶף
  english_pob_choice: Gozan, Haran, Rezeph
  chosen_spanish: Gozán, Harán, Rezef
  alternatives_spanish:
  - Gozán, Harán, Rezeph
  - Gozán, Jarán, Rezef
  lexicon: Proper names
  rationale: Los nombres propios se transliteran al español de forma reconocible. 'Rezef' refleja con mayor cercanía la forma hebrea רֶצֶף; se conserva el resto con adaptación gráfica habitual.
- source_word: וּבְנֵי עֶדֶן
  english_pob_choice: the people of Eden
  chosen_spanish: los hijos de Edén
  alternatives_spanish:
  - la gente de Edén
  - los habitantes de Edén
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente 'hijos de Edén'. Aunque puede referirse a los habitantes, el POB inglés dejó visible esa literalidad y la nota de ambigüedad; en español se conserva la expresión para no borrar la tensión léxica.
- source_word: אֲשֶׁר בִּתְלַאשָּׂר
  english_pob_choice: who were in Tel-assar
  chosen_spanish: que estaban en Tel-asar
  alternatives_spanish:
  - que estaban en Tel-asar
  - que se hallaban en Tel-asar
  lexicon: HALOT
  rationale: La preposición ב + topónimo se expresa naturalmente con 'en'. 'Estaban' comunica la localización sin añadir información interpretativa.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el auditable sentido del hebreo y mantiene la misma tensión léxica que el POB inglés: la frase בני עֶדֶן se conserva de forma literal en el cuerpo principal, con nota para su posible valor colectivo. No se introdujeron revisiones textuales ni cambios respecto del pasaje base.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino; aquí no aplica.
  - Se mantiene un registro bíblico claro y sobrio, con transliteración consistente de nombres propios.
  - '''Los dioses de las naciones'' conserva el plural y el contraste retórico del original.'
  - '''Hijos de Edén'' se preserva deliberadamente para no resolver una ambigüedad que el inglés POB también documenta.'
