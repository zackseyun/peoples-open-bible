base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/002/001.yaml
  text: And in the eighteenth year[a], on the twenty-second day of the first month, a word came in the house of Nebuchodonosor king of the Assyrians, to take vengeance on all the land[c][b], just as he had spoken.
  footnotes:
  - marker: a
    text: Or 'in the palace/court of Nebuchodonosor.' The Greek says 'house,' which can also refer to a royal residence or court.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the earth.' Greek γῆ can mean either 'land' or 'earth'; context here favors a territorial sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'a decree was issued' / 'a matter was decided.' The Greek more literally says 'a word came to be.'
    reason: alternative_reading
