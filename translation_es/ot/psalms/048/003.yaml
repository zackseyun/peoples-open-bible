translation:
  language: es
  text: Hermoso en lo alto[a], el gozo de toda la tierra, es Monte Sion, en los confines del norte, la ciudad del gran Rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las laderas del norte»; literalmente, «en las partes/costados remotos del norte». La frase también puede evocar la imaginería del monte divino asociada con Zafón.
    reason: alternative_reading
lexical_decisions:
- source_word: יְפֵה
  english_pob_choice: Beautiful
  chosen_spanish: Hermoso
  alternatives_spanish:
  - Bello
  - Bonito
  lexicon: HALOT
  rationale: Como adjetivo predicativo de la apariencia de Sion, «Hermoso» comunica bien la valoración estética y mantiene un registro digno y natural en español.
- source_word: נוֹף
  english_pob_choice: in elevation
  chosen_spanish: en elevación
  alternatives_spanish:
  - en altura
  - en lo alto
  - en posición elevada
  lexicon: HALOT
  rationale: El sustantivo es difícil y apunta a altura o disposición elevada. «En elevación» conserva esa fuerza espacial sin volver opaco el verso.
- source_word: מְשׂוֹשׂ
  english_pob_choice: the joy
  chosen_spanish: el gozo
  alternatives_spanish:
  - la alegría
  - el deleite
  lexicon: HALOT
  rationale: «Gozo» reproduce bien el valor nominal de júbilo/delight y suena natural en un contexto poético y bíblico.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: of all the earth
  chosen_spanish: de toda la tierra
  alternatives_spanish:
  - de toda la tierra habitada
  - de todo el mundo
  lexicon: HALOT
  rationale: «Tierra» conserva la amplitud cósmica del hebreo sin reducirlo a un ámbito local; en español bíblico es claro y fluido.
- source_word: הַר צִיּוֹן
  english_pob_choice: Mount Zion
  chosen_spanish: el monte Sion
  alternatives_spanish:
  - Monte Sion
  - el monte de Sion
  lexicon: HALOT
  rationale: Se conserva la referencia geográfica y bíblica con el orden natural del español; «monte Sion» es claro y reverente.
- source_word: יַרְכְּתֵי צָפוֹן
  english_pob_choice: in the far north
  chosen_spanish: en los confines del norte
  alternatives_spanish:
  - en el lejano norte
  - en las laderas del norte
  - en los recónditos del norte
  lexicon: HALOT
  rationale: La expresión hebrea es ambigua entre localización geográfica y resonancia poética. «En los confines del norte» transmite la lejanía/remotez sin cerrar la posibilidad de alusión mítica o topográfica.
- source_word: קִרְיַת מֶלֶךְ רָב
  english_pob_choice: the city of the great King
  chosen_spanish: la ciudad del gran Rey
  alternatives_spanish:
  - la ciudad del Rey grande
  - la ciudad del gran monarca
  lexicon: HALOT
  rationale: La cadena constructa se vierte de forma natural como «la ciudad del gran Rey». «Rey» en mayúscula refleja la referencia soberana implícita en el contexto bíblico.
theological_decisions:
- issue: Sentido de יַרְכְּתֵי צָפוֹן y posible alusión a imaginería de monte divino
  english_pob_reading: Rendered geographically as 'in the far north' while leaving the phrase's elevated poetic/mythic resonance implicit.
  chosen_spanish_reading: «En los confines del norte» mantiene una lectura geográfica amplia sin resolver la posible resonancia poética o mítica.
  alternative_spanish_readings:
  - «En las laderas del norte»
  - «En lo recóndito del norte»
  - «En el lejano norte»
  rationale: El hebreo admite más de una lectura, y la POB inglesa preserva la tensión en vez de decidirla. La traducción española evita interpretar de más y deja abierta la posible evocación de Zafón/imaginería montañosa.
  doctrine_reference: Preservar la tensión interpretativa sin forzar una resolución.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés, que añadió comas para reflejar mejor la estructura aposicional: «Beautiful in elevation, the joy of all the earth, is Mount Zion, in the far north, the city of the great King.» La versión española conserva esa puntuación y la misma estructura sintáctica.'
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según convenga en otros contextos, pero aquí el verso no contiene el Nombre divino explícito.
  - Se eligió «el gran Rey» para reproducir la mayúscula reverencial implícita del inglés sin introducir una glosa interpretativa adicional.
  - «Tierra» se mantiene por la amplitud universal del verso; «monte Sion» conserva el registro bíblico estándar y claro.
