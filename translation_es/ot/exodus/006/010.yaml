lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then spoke
  chosen_spanish: Entonces habló
  alternatives_spanish:
  - Y habló
  - Entonces dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; en español, «Entonces habló» mantiene la secuencia y preserva el valor de hablar, más específico que «dijo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre del pacto, el Tetragrámaton. En el proyecto, la norma española es «Yahvé», transliteración reconocible y consistente del nombre divino, sin sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca dirección del habla hacia Moisés; «a» es la equivalencia natural y clara en español.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Nombre propio bíblico estándar
  rationale: Nombre propio establecido en español bíblico y lectura natural para el público objetivo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: La fórmula introductoria al discurso directo se conserva con «diciendo», que reproduce el giro narrativo sin forzar la sintaxis española.
theological_decisions:
- issue: Renderización del nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El verso contiene directamente el Tetragrámaton. En español, el proyecto usa «Yahvé» como forma principal para preservar el nombre personal de Dios revelado a Israel, en vez de ocultarlo con un sustituto titulado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: se mantiene la progresión narrativa de וַיְדַבֵּר, el nombre divino no se sustituye por un título, y la fórmula de discurso directo se conserva de manera idiomática. No hay revisiones pendientes en el registro base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del nombre divino, conforme al estándar del proyecto.
  - «Entonces habló» conserva la secuencia narrativa sin depender de un calco rígido.
  - La puntuación reproduce la fórmula introductoria al discurso directo con una coma final, como en el inglés auditado.
