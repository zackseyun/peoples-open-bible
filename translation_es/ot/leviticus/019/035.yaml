revisions:
- from: No harás injusticia en el juicio[a], en las medidas de longitud, en el peso o en la capacidad de medida.
  to: No cometerán injusticia en el juicio[a], en las medidas de longitud, en el peso o en la medida de capacidad.
  rationale: Se ajusta el verbo al plural del hebreo, se adopta una colocación española más natural con 'injusticia', y se corrige 'capacidad de medida' a 'medida de capacidad' para mayor fidelidad y claridad. La nota alternativa se simplifica para reflejar más de cerca las alternativas léxicas auditadas en inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:31:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: una prohibición contra la injusticia en el ámbito judicial/comercial y en tres categorías de medición. Sin embargo, no refleja adecuadamente la segunda persona plural del hebreo ni el estilo jurídico-natural del español; además, ''capacidad de medida'' suena invertido y menos fiel que ''medida de capacidad''.'
  spanish_quality_summary: La redacción actual es entendible, pero 'No harás' individualiza un mandato plural y resulta inconsistente con el contexto legal dirigido a la comunidad. 'No harás injusticia' es comprensible, pero 'No cometerán injusticia' suena más natural con 'injusticia' en español jurídico. 'Capacidad de medida' es torpe; 'medida de capacidad' es claro y digno. También conviene mantener el paralelismo sin repetir 'en' antes de cada elemento final.
  glossary_alignment: No hay términos teológicos sensibles aquí. 'Injusticia' para עָוֶל y 'juicio' para מִשְׁפָּט están bien alineados. La decisión inglesa de especificar מִדָּה como longitud puede mantenerse en español como 'medidas de longitud'. Para מְשׂוּרָה, la mejor alineación con la nota auditada es 'medida de capacidad', no 'capacidad de medida'.
  issues:
  - severity: medium
    issue: Uso de segunda persona singular 'No harás'
    rationale: El hebreo תַעֲשׂוּ es plural. Aunque el español bíblico a veces neutraliza número, aquí 'No harás' cambia innecesariamente el destinatario del mandato comunitario. 'No cometerán' preserva mejor el plural sin caer en voseo peninsular.
  - severity: medium
    issue: 'Colocación poco natural: ''capacidad de medida'''
    rationale: En español idiomático la expresión natural es 'medida de capacidad'. La forma actual suena calcada y puede entorpecer la lectura.
  - severity: low
    issue: Alternativa de nota y texto principal podrían usar mejor la colocación con 'injusticia'
    rationale: '''Cometer injusticia'' es una combinación más natural que ''hacer injusticia'' en español moderno y refleja bien la decisión inglesa ''commit injustice''.'
  revised_spanish_text: No cometerán injusticia en el juicio[a], en las medidas de longitud, en el peso o en la medida de capacidad.
  revised_footnotes:
  - marker: a
    text: 'O: «No harán mal en el juicio, en la medida, en el peso o en la medida de capacidad»'
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo al plural del hebreo, se adopta una colocación española más natural con 'injusticia', y se corrige 'capacidad de medida' a 'medida de capacidad' para mayor fidelidad y claridad. La nota alternativa se simplifica para reflejar más de cerca las alternativas léxicas auditadas en inglés.
