lexical_decisions:
- source_word: μεμελανωμένον
  english_pob_choice: blackened
  chosen_spanish: ennegrecidos
  alternatives_spanish:
  - ennegrecido
  - oscurecidos
  - puestos negros
  lexicon: LSJ
  rationale: El participio perfecto/pasivo expresa un estado resultante. En español, «ennegrecidos» comunica con naturalidad el efecto visual concreto y conserva la idea de haber sido puestos negros por una causa externa.
- source_word: τὸ πρόσωπον αὐτῶν
  english_pob_choice: their faces
  chosen_spanish: sus rostros
  alternatives_spanish:
  - sus caras
  - su rostro
  - su semblante
  lexicon: LSJ
  rationale: Aunque el griego usa un singular formal, el referente es distributivo con posesivo plural. «Sus rostros» suena natural en español y preserva el sentido plural sin perder la referencia al rostro visible.
- source_word: ἀπὸ τοῦ καπνοῦ
  english_pob_choice: by the smoke
  chosen_spanish: por el humo
  alternatives_spanish:
  - a causa del humo
  - del humo
  - con el humo
  lexicon: LSJ
  rationale: ἀπό marca origen o causa. En español, «por el humo» expresa bien la causa del ennegrecimiento y evita una literalidad menos fluida.
- source_word: τοῦ ἐκ τῆς οἰκίας
  english_pob_choice: from the house
  chosen_spanish: de la casa
  alternatives_spanish:
  - de la vivienda
  - del templo
  - del santuario
  lexicon: LSJ
  rationale: Se conserva el sentido básico de οἰκία como «casa». El contexto idolátrico puede sugerir un edificio cultual, pero el griego no usa aquí un término más específico; por eso se mantiene la forma transparente «la casa».
theological_decisions:
- issue: Si οἰκία debe interpretarse como «templo» o «santuario» en un contexto de ídolos
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  - santuario
  - shrine
  rationale: La POB inglesa conservó «house» para no añadir una precisión cultual que el griego no formula. La versión española mantiene esa misma reserva y deja que el contexto determine el tipo de edificio.
  doctrine_reference: 'Translation philosophy: primacía del texto original sobre la tradición de traducción; no parafrasear más allá de lo que el texto fuente permite.'
translation_notes:
  revision_awareness: La versión sigue el pasaje griego de Swete LXX 1909 y el audit trail inglés con alta concordancia; no se requieren revisiones adicionales. Se preserva la tensión lexical entre el sentido general de οἰκία («casa») y la posible lectura contextual cultual sin resolverla interpretativamente en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «rostros» en plural por naturalidad española, aunque el griego use un singular formal.
  - Se conserva «casa» en el texto principal para reflejar el lexema οἰκία y no introducir una equivalencia cultual no explícita.
  - La nota al pie recoge las alternativas «templo/santuario» como posibilidades contextuales, en paralelo al audit trail inglés.
