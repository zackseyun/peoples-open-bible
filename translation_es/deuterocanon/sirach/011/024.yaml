  glossary_alignment: 'Sin conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión clave es lexical: preferir «porción asignada» sobre «lote asignado» para reflejar mejor el campo semántico documentado y sonar natural en español eclesial amplio.'
