translation:
  language: es
  text: '¿Quién le ha fijado[a] su camino? ¿O quién le ha dicho: «Tú has hecho mal[b]»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «le ha encargado su camino» o «le ha prescrito su camino». El verbo hebreo puede también llevar la idea de designar, prescribir o encargar.
    reason: lexical_alternative
  - marker: b
    text: O, «has hecho injusticia». El hebreo también puede significar «injusticia» además de «mal».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  lexicon: HALOT
  rationale: El interrogativo introduce una pregunta retórica directa; «¿Quién» conserva la fuerza y la naturalidad del hebreo.
- source_word: פָקַד
  english_pob_choice: has appointed
  chosen_spanish: ha asignado
  alternatives_spanish:
  - ha nombrado
  - ha prescrito
  - ha encargado
  lexicon: HALOT
  rationale: El verbo admite ideas de asignar, prescribir o encargar. «Ha asignado» expresa bien la idea de establecer la senda o curso de alguien sin forzar un matiz técnico innecesario en español.
- source_word: עָלָיו
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - sobre él
  - respecto de él
  lexicon: HALOT
  rationale: En español, con «asignar» la construcción más clara es «para él». Mantiene la relación de destino o referencia personal del hebreo.
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su curso
  lexicon: HALOT
  rationale: «Camino» es un equivalente natural y conserva la imagen literal y figurada de conducta o rumbo.
- source_word: וּמִי
  english_pob_choice: Or who
  chosen_spanish: ¿O quién
  alternatives_spanish:
  - ¿Y quién
  lexicon: HALOT
  rationale: La partícula coordinante aquí presenta una segunda pregunta retórica. «¿O quién» refleja mejor la relación disyuntiva que un simple «y quién».
- source_word: אָמַר
  english_pob_choice: has said
  chosen_spanish: ha dicho
  alternatives_spanish:
  - podría decir
  - dijo
  lexicon: HALOT
  rationale: El perfecto hebreo en la pregunta retórica se expresa de forma natural con pretérito perfecto compuesto en español.
- source_word: פָּעַלְתָּ
  english_pob_choice: You have done
  chosen_spanish: has hecho
  alternatives_spanish:
  - has obrado
  - has actuado
  lexicon: HALOT
  rationale: «Hacer» reproduce bien el valor amplio de do/make/work en esta acusación; es la opción más idiomática en español junto con el complemento siguiente.
- source_word: עַוְלָה
  english_pob_choice: wrong
  chosen_spanish: maldad
  alternatives_spanish:
  - injusticia
  - mal
  - iniquidad
  lexicon: HALOT
  rationale: El sustantivo puede significar injusticia, maldad o perversidad. Aquí, como acusación directa, «maldad» comunica con naturalidad el reproche moral, sin perder el alcance de injusticia.
theological_decisions:
- issue: Referente de los sufijos masculinos y de la acusación en segunda persona
  english_pob_reading: 'The verse speaks of God: no one appoints his way for him, and no one can accuse him of wrongdoing.'
  chosen_spanish_reading: 'El versículo habla de Dios: nadie le asigna su camino, y nadie puede acusarlo de haber obrado mal.'
  alternative_spanish_readings:
  - Se refiere a un gobernante humano o a una persona poderosa
  rationale: El contexto inmediato exalta la grandeza y la justicia de Dios. Mantengo el referente teológico en el texto español sin capitalizar pronombres, preservando la lectura contextual y la tensión del original.
  doctrine_reference: La traducción debe conservar la referencia contextual a Dios sin resolverla por tradición eclesiástica; primacía del hebreo sobre la convención devocional.
translation_notes:
  revision_awareness: 'Coincide con el estado de alta concordancia del audit trail: no se requieren cambios sustantivos respecto de la lectura inglesa; solo se ajusta a español natural manteniendo la amplitud semántica de פקד y עַוְלָה.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando el texto lo requiera; en este versículo el referente implícito es Dios, pero no aparece el tetragrámaton.
  - Se evita «Señor» como sustituto automático porque el hebreo no contiene יהוה aquí.
  - Se conserva el tono de pregunta retórica doble, con puntuación española adecuada.
  - La nota [a] se ancla en «asignado» y la nota [b] en «ha dicho» para reflejar las alternativas léxicas del original.
