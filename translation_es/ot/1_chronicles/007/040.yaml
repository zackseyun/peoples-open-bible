translation:
  language: es
  text: Todos estos eran hijos de Aser, jefes de casas paternas, hombres escogidos, guerreros valientes, jefes principales; y fueron inscritos por genealogía para servicio en el ejército para la guerra. Su número de hombres era veintiséis mil.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: בְנֵי אָשֵׁר
  english_pob_choice: sons of Asher
  chosen_spanish: hijos de Aser
  alternatives_spanish:
  - hijos de Asher
  - descendientes de Aser
  lexicon: HALOT
  rationale: «Hijos» conserva la relación genealógica directa del hebreo y funciona naturalmente en español bíblico para descendencia tribal.
- source_word: רָאשֵׁי בֵית הָאָבוֹת
  english_pob_choice: heads of fathers’ houses
  chosen_spanish: jefes de casas paternas
  alternatives_spanish:
  - cabezas de casas paternas
  - jefes de hogares paternos
  lexicon: HALOT
  rationale: La expresión hebrea es un tecnicismo genealógico de jefatura de clan; «casas paternas» mantiene el giro y «jefes» expresa bien la función directiva.
- source_word: בְּרוּרִים
  english_pob_choice: choice men
  chosen_spanish: hombres escogidos
  alternatives_spanish:
  - hombres selectos
  - hombres elegidos
  lexicon: HALOT
  rationale: El participio pasivo comunica selección o distinción. «Escogidos» es natural y fiel; evita una traducción más mecánica como «selectos».
- source_word: גִּבּוֹרֵי חֲיָלִים
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres poderosos
  - guerreros valientes
  lexicon: HALOT
  rationale: La expresión es militar y encomiástica. Opté por «hombres valientes» para conservar la fuerza sin introducir una fórmula demasiado tradicional o pesada, aunque el matiz de poder/milicia queda en el contexto.
- source_word: רָאשֵׁי הַנְּשִׂיאִים
  english_pob_choice: chief of the princes
  chosen_spanish: jefe de los príncipes
  alternatives_spanish:
  - cabeza de los príncipes
  - principal de los príncipes
  lexicon: HALOT
  rationale: El hebreo es comprimido y probablemente apposicional. «Jefe de los príncipes» conserva la relación jerárquica sin suavizar el término relacional del original.
- source_word: וְהִתְיַחְשָׂם
  english_pob_choice: they were enrolled by genealogy
  chosen_spanish: fueron inscritos por genealogía
  alternatives_spanish:
  - fueron registrados por genealogía
  - se hizo su inscripción genealógica
  lexicon: HALOT
  rationale: En Crónicas, la raíz יחס suele referirse al registro genealógico. «Inscritos por genealogía» conserva el sentido administrativo y la conexión con el censo/registro militar.
- source_word: בַּצָּבָא
  english_pob_choice: for service in the army
  chosen_spanish: para servicio en el ejército
  alternatives_spanish:
  - para servicio militar
  - en el ejército
  lexicon: HALOT
  rationale: צבא aquí es el conjunto organizado de tropas. «Ejército» transmite bien el cuerpo militar, y «servicio» refleja la finalidad del registro.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: for war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para batalla
  - para combate
  lexicon: HALOT
  rationale: La preposición final indica propósito. «Para la guerra» es directo y corresponde a la formulación del hebreo y del POB inglés.
- source_word: מִסְפָּרָם אֲנָשִׁים
  english_pob_choice: Their number of men
  chosen_spanish: Su número de hombres
  alternatives_spanish:
  - el número de ellos, hombres
  - su cantidad de hombres
  lexicon: HALOT
  rationale: La construcción cuenta personas como hombres. «Su número de hombres» mantiene el conteo explícito sin forzar una perífrasis extraña.
- source_word: עֶשְׂרִים וְשִׁשָּׁה אָלֶף
  english_pob_choice: twenty-six thousand
  chosen_spanish: veintiséis mil
  alternatives_spanish:
  - veinte y seis mil
  lexicon: HALOT
  rationale: Es la forma estándar y clara en español para el numeral.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca en el texto español junto a «Aser», manteniendo además la nota anclada y coherente con el nombre tribal del hebreo.
  spanish_consistency_notes:
  - Se preservó la estructura genealógica y militar del verso sin suavizarla a términos más generales.
  - «Casas paternas» mantiene el tecnicismo de Crónicas sin reemplazarlo por «familias».
  - La frase «inscritos por genealogía» refleja el sentido administrativo del verbo hebreo sin perder la conexión con el contexto de registro militar.
  - «Ejército» y «guerra» distinguen cuerpo militar y finalidad bélica, como en el hebreo.
