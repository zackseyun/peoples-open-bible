translation:
  language: es
  text: Cuida tu nombre[a], porque irá contigo más que mil tesoros de sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Cuida tu nombre, porque permanecerá para ti más que mil grandes tesoros de oro».'
    reason: alternative_reading
lexical_decisions:
- source_word: פחד / φρόντισον
  english_pob_choice: Be concerned
  chosen_spanish: Preocúpate
  alternatives_spanish:
  - Cuida
  - Ten en cuenta
  - Ocúpate
  lexicon: HALOT; LXX φροντίζω
  rationale: El hebreo y el griego convergen en una exhortación de atención diligente, no de miedo emocional. «Preocúpate» conserva el tono admonitorio y la idea de prestar seria atención a algo valioso.
- source_word: על שם / περὶ ὀνόματος
  english_pob_choice: for your name
  chosen_spanish: por tu nombre
  alternatives_spanish:
  - por tu reputación
  - acerca de tu nombre
  lexicon: HALOT; LSJ
  rationale: «Nombre» aquí comunica la reputación o fama de la persona; en español, «por tu nombre» mantiene la concisión del texto y deja la resonancia semítica sin explicitarla de más.
- source_word: כי הוא ילוך / αὐτὸ ... διαμενεῖ
  english_pob_choice: for it will go with you
  chosen_spanish: porque te acompañará
  alternatives_spanish:
  - porque irá contigo
  - porque permanecerá contigo
  lexicon: HALOT; LSJ
  rationale: 'El hebreo dice literalmente que «irá contigo», mientras que el griego expresa permanencia. «Te acompañará» integra ambas ideas: movimiento junto a la persona y continuidad duradera.'
- source_word: אוצרות
  english_pob_choice: treasures
  chosen_spanish: tesoros
  alternatives_spanish:
  - riquezas
  - depósitos
  lexicon: HALOT
  rationale: «Tesoros» es la equivalencia natural para אוצרות y para χίλιοι μεγάλοι θησαυροὶ. Mantiene el campo semántico de bienes valiosos y la elevación retórica del proverbio.
- source_word: חכמה / χρυσίου
  english_pob_choice: wisdom / gold
  chosen_spanish: de sabiduría
  alternatives_spanish:
  - de oro
  - de bienes de oro
  lexicon: HALOT; LXX
  rationale: La lectura hebrea atestiguada dice claramente «sabiduría», mientras que el griego tiene «oro». El texto principal sigue el hebreo como fuente primaria donde se conserva, y la variante griega queda preservada en la nota.
theological_decisions:
- issue: Prioridad del hebreo de Sirácida frente al paralelo griego cuando difieren en el objeto final
  english_pob_reading: Follow the extant Hebrew main text ('treasures of wisdom') while preserving the Greek alternative in a footnote
  chosen_spanish_reading: 'Seguir el hebreo: «tesoros de sabiduría», dejando la lectura griega en nota'
  alternative_spanish_readings:
  - 'Seguir más plenamente el griego: «mil grandes tesoros de oro»'
  - Fusionar ambas lecturas en el texto principal
  rationale: La política editorial exige traducir desde la fuente original primaria donde está disponible. Aquí el hebreo está validado con alta confianza; la divergencia con el griego es material y no debe borrarse. Por eso el texto principal sigue el hebreo y la nota conserva honestamente la variante griega.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve uncertainty honestly with footnotes.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó el sustantivo final a «treasures» para hacer más natural אוצרות. La presente versión española sigue esa decisión con «tesoros» y mantiene la tensión textual entre el hebreo («sabiduría») y el griego («oro») sin resolverla artificialmente.
  spanish_consistency_notes:
  - Se usa «Sabiduría» solo como sustantivo común, no como nombre propio.
  - Se evitó «SEÑOR» u otras convenciones no pertinentes, porque el versículo no contiene el nombre divino.
  - «Preocúpate» se eligió por su fuerza exhortativa y su registro bíblico natural en español sin sonar arcaico.
