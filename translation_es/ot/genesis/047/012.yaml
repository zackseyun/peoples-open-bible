    text: Or 'with bread.' The Hebrew word often means 'bread' literally, but here likely refers more broadly to food provisions.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'according to the mouth of the little ones,' an idiom meaning according to the number or needs of the children.
    reason: lexical_alternative
