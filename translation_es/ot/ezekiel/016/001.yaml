translation:
  language: es
  text: 'Y vino a mí la palabra de Yahvé[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: יְהוָה (YHWH). Tradicionalmente se vierte "el SEÑOR" en muchas traducciones.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: y ocurrió
  alternatives_spanish:
  - y vino
  - y llegó
  lexicon: HALOT
  rationale: En la fórmula profética וַיְהִי דְבַר־יְהוָה, el sentido no es meramente existencial ('fue'), sino la irrupción efectiva de la palabra divina. 'Ocurrió' comunica bien esa entrada del mensaje sin sonar tan mecánico como una calca directa.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el dicho
  lexicon: HALOT
  rationale: En este giro profético fijo, דְבַר se refiere al dicho/revelación de Dios. 'La palabra' preserva el valor bíblico habitual y mantiene la relación con la fórmula de revelación directa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración española de יְהוָה. 'Yahvé' sigue el criterio del proyecto para evitar sustituir el nombre propio por un título, y es la forma más natural en español eclesial amplio.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo indica dirección hacia el profeta. 'A mí' es la equivalencia natural en español y conserva la sencillez del hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: La fórmula introduce el discurso divino que sigue. 'Diciendo' reproduce el valor de enlace narrativo sin convertir la cláusula en una oración independiente.
theological_decisions:
- issue: Nombre divino en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo contiene el Tetragrama יְהוָה. La traducción española debe conservar el nombre divino, no sustituirlo por 'el SEÑOR'. 'Yahvé' sigue la política del proyecto y refleja la referencia directa al Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparece exactamente en el texto español junto al término correspondiente.
  spanish_consistency_notes:
  - Se mantuvo la fórmula profética breve y directa, sin añadir contenido interpretativo.
  - '''Yahvé'' sigue la terminología base del proyecto para יְהוָה.'
  - '''Diciendo'' conserva el enlace discursivo del hebreo sin sobretraducir.'
