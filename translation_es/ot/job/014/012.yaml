translation:
  language: es
  text: Así, el hombre se acuesta y no se levanta; hasta que los cielos dejen de existir[a], no despertarán ni serán despertados de su sueño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta que los cielos dejen de ser». El giro hebreo es idiomático y señala un límite prácticamente inalcanzable.'
    reason: lexical_alternative
  - marker: b
    text: 'La imagen del sueño continúa la metáfora de la muerte: «no despertarán ni serán despertados de su sueño».'
    reason: cultural_note
lexical_decisions:
- source_word: וְאִישׁ
  english_pob_choice: So a man
  chosen_spanish: Así, el hombre
  alternatives_spanish:
  - Y el hombre
  - Pero el hombre
  lexicon: HALOT
  rationale: אִישׁ es singular masculino y funciona de manera representativa. «El hombre» conserva esa fuerza general sin neutralizarla. El prefijo וְ se vuelve «Así» para enlazar con la imagen precedente y mantener el avance argumental natural en español.
- source_word: שָׁכַב
  english_pob_choice: lies down
  chosen_spanish: se acuesta
  alternatives_spanish:
  - se yace
  - se reclina
  - se ha acostado
  lexicon: HALOT
  rationale: שׁכב significa «acostarse/recostarse» y aquí funciona como eufemismo de la muerte. «Se acuesta» preserva la metáfora sin resolverla prematuramente en «muere».
- source_word: וְלֹא יָקוּם
  english_pob_choice: and does not rise
  chosen_spanish: y no se levanta
  alternatives_spanish:
  - y no resucita
  - y no se pone en pie
  - y no vuelve a levantarse
  lexicon: HALOT
  rationale: קוּם expresa levantarse después de yacer; en este contexto apunta al no retorno desde la muerte. «No se levanta» conserva el hebraísmo y mantiene la dignidad poética, sin explicitar más de lo que el verso dice.
- source_word: עַד בִּלְתִּי שָׁמַיִם
  english_pob_choice: until the heavens are no more
  chosen_spanish: hasta que los cielos no sean
  alternatives_spanish:
  - hasta que los cielos dejen de ser
  - hasta que no existan los cielos
  - hasta que los cielos no existan
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y señala un límite prácticamente inalcanzable. «Hasta que los cielos no sean» intenta reproducir la literalidad del giro sin perder su valor idiomático; en nota se explica la alternativa natural «dejen de ser».
- source_word: לֹא יָקִיצוּ
  english_pob_choice: they will not awake
  chosen_spanish: no despertarán
  alternatives_spanish:
  - no se despertarán
  - no volverán a despertar
  - no despertarán de nuevo
  lexicon: HALOT
  rationale: יקיץ significa «despertar». El plural se mantiene con «despertarán», reflejando que el verso pasa del singular representativo al plural colectivo de los muertos.
- source_word: וְלֹא יֵעֹרוּ
  english_pob_choice: or be roused
  chosen_spanish: ni serán removidos
  alternatives_spanish:
  - ni serán despertados
  - ni serán espoleados
  - ni se alzarán
  lexicon: HALOT
  rationale: El nifal de עור expresa ser despertado o removido del sueño. «Serán removidos» busca reproducir la pasiva del hebreo y el paralelo poético con «despertarán»; en español suena menos repetitivo que una segunda forma de «despertar».
- source_word: מִשְּׁנָתָם
  english_pob_choice: from their sleep
  chosen_spanish: de su sueño
  alternatives_spanish:
  - de su dormir
  - de su descanso
  - de su sueño
  lexicon: HALOT
  rationale: שֵׁנָה es «sueño» y continúa la imagen de la muerte como sueño. «De su sueño» es claro y mantiene la metáfora sin añadir interpretación doctrinal.
theological_decisions:
- issue: Metáfora de sueño y levantarse en relación con la muerte
  english_pob_reading: Retain the sleep/rising imagery without doctrinal expansion
  chosen_spanish_reading: Conservar la imagen de acostarse, no levantarse y no despertar, sin convertirla en una afirmación sistemática sobre el estado final de los muertos
  alternative_spanish_readings:
  - Morirá y no volverá a vivir
  - Se duerme hasta la resurrección
  - Desaparece para siempre
  rationale: El hebreo poético describe la mortalidad humana con imágenes de sueño. La versión española conserva esa tensión y evita resolverla en una explicación doctrinal que el verso no explicita.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor representativo de אִישׁ
  english_pob_reading: Render as 'man'
  chosen_spanish_reading: Traducir como «el hombre»
  alternative_spanish_readings:
  - la persona
  - el ser humano
  - un hombre
  rationale: El hebreo usa el singular masculino de forma representativa. «El hombre» mantiene esa forma y su valor general sin neutralizar el texto.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
- issue: Giro idiomático עַד בִּלְתִּי שָׁמַיִם
  english_pob_reading: until the heavens are no more
  chosen_spanish_reading: Mantener una redacción que conserve el hebraísmo y su sentido de límite inconcebiblemente lejano
  alternative_spanish_readings:
  - hasta que los cielos dejen de ser
  - hasta que los cielos no existan
  - hasta que ya no haya cielos
  rationale: La frase es idiomática y no busca proporcionar una cronología detallada, sino un horizonte imposible desde el punto de vista humano. La redacción española conserva el tono y deja abierto el sentido, como en el audit trail inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el rastro de auditoría inglés. Se conservaron la metáfora de sueño/muerte, el singular representativo de אִישׁ y el límite idiomático de עַד בִּלְתִּי שָׁמַיִם. No se incorporaron revisiones posteriores porque el registro indica que no hubo cambios en la última pasada.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece el Tetragrámaton.
  - «Cielos» conserva el plural bíblico del hebreo.
  - Se prefirió una sintaxis española natural, pero sin eliminar el paralelismo poético ni la ambigüedad teológica del verso.
  - «Despertar» y «levantarse» se mantuvieron diferenciados para reflejar el paralelismo verbal hebreo.
