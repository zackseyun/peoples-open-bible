translation:
  language: es
  text: Y subieron algunos de los hijos de Israel, y algunos de los sacerdotes, y los levitas, y los cantores, y los porteros, y los servidores del templo[a] a Jerusalén en el séptimo año del rey Artajerjes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los netinim», término técnico para una clase de servidores del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron
  - ascendieron
  lexicon: HALOT
  rationale: עלה expresa movimiento hacia arriba y, en contexto de Jerusalén, conserva el valor geográfico y cultual. En español, «subieron» mantiene esa imagen sin sonar forzado.
- source_word: מִבְנֵי יִשְׂרָאֵל
  english_pob_choice: some of the sons of Israel
  chosen_spanish: algunos de los hijos de Israel
  alternatives_spanish:
  - algunos de los israelitas
  - algunos de entre los hijos de Israel
  lexicon: HALOT
  rationale: El hebreo usa un partitivo con מן, así que conviene expresar que no se trata de todo el grupo. «Hijos de Israel» sigue más de cerca la forma hebrea que «israelitas».
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: כֹּהֲנִים tiene el sentido técnico cultual de sacerdotes; «sacerdotes» es la equivalencia natural en español.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los hijos de Leví
  lexicon: HALOT
  rationale: Es el término estándar para el grupo tribal y de servicio del templo.
- source_word: הַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantores del templo
  - los músicos
  lexicon: HALOT
  rationale: El participio nominal refiere a quienes cantan en el servicio del templo. «Cantores» conserva precisión y dignidad; «músicos» sería más amplio de lo que el término hebreo requiere.
- source_word: הַשֹּׁעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardianes de las puertas
  - los guardapuertas
  lexicon: HALOT
  rationale: En español bíblico y eclesial, «porteros» comunica bien la función de quienes custodiaban las puertas del templo. Aunque «guardianes de las puertas» es más explicativo, «porteros» es más directo y natural.
- source_word: הַנְּתִינִים
  english_pob_choice: the temple servants
  chosen_spanish: los servidores del templo
  alternatives_spanish:
  - los netinim
  - los dados
  lexicon: HALOT
  rationale: El término técnico designa una clase reconocida de servidores del templo. La POB inglesa opta por la equivalencia funcional; en español, «servidores del templo» comunica el cargo sin depender de transliteración opaca.
- source_word: אֶל יְרוּשָׁלִָם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - hasta Jerusalén
  lexicon: HALOT
  rationale: אֶל con nombre de lugar se rinde naturalmente como dirección simple en español.
- source_word: בִּשְׁנַת שֶׁבַע
  english_pob_choice: in the seventh year
  chosen_spanish: en el séptimo año
  alternatives_spanish:
  - en año siete
  lexicon: HALOT
  rationale: La forma idiomática española refleja fielmente el tiempo indicado.
- source_word: לְאַרְתַּחְשַׁסְתְּא הַמֶּלֶךְ
  english_pob_choice: of King Artaxerxes
  chosen_spanish: del rey Artajerjes
  alternatives_spanish:
  - de Artajerjes el rey
  - del rey Artajerjes
  lexicon: HALOT
  rationale: «Del rey Artajerjes» es la forma más natural en español y preserva el título real sin alterar el sentido.
translation_notes:
  revision_awareness: La revisión inglesa añadió las conjunciones repetidas para reflejar más de cerca la sintaxis hebrea. En español se mantuvieron las repeticiones con «y» para corresponder al encadenamiento de la lista y conservar el estilo enumerativo del original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma de la serie solo cuando aparece el nombre divino; aquí no aplica.
  - Se prefirió «los servidores del templo» para הַנְּתִינִים, en línea con la equivalencia funcional de la POB inglesa.
  - Se conservaron las repeticiones de «y» para reflejar la coordinación hebrea de la lista.
  - «Hijos de Israel» se tradujo de manera partitiva con «algunos de» para respetar מִן.
