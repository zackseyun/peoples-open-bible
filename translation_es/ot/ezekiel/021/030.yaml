translation:
  language: es
  text: Y tú, herido de muerte[a], impío, príncipe de Israel, cuyo día ha llegado, en el tiempo del castigo del fin[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «muerto»; algunos entienden el hebreo en el sentido de «profanado», dando: «oh príncipe impío y profanado de Israel».'
    reason: alternative_reading
  - marker: b
    text: Más literalmente, «la iniquidad del fin»; el hebreo puede referirse tanto a la culpa que llega a su colmo como al castigo final por esa culpa.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלָל
  english_pob_choice: slain
  chosen_spanish: muerto
  alternatives_spanish:
  - herido de muerte
  - muerto en batalla
  - despojado de vida
  lexicon: HALOT
  rationale: En este contexto de juicio profético, el término apunta a una muerte o herida mortal ya determinada. «Muerto» es breve y natural en español, y conserva la idea de sentencia cumplida. «Herido de muerte» sería más explícito, pero añade una precisión no exigida por el hebreo.
- source_word: רָשָׁע
  english_pob_choice: wicked one
  chosen_spanish: impío
  alternatives_spanish:
  - malvado
  - culpable
  - impío hombre
  lexicon: HALOT
  rationale: Aquí funciona como vocativo adjetival sustantivado. «Impío» conserva la carga moral y suena más sobrio y bíblico que «malvado». Se evita suavizarlo con «culpable», porque el hebreo marca perversidad, no solo responsabilidad legal.
- source_word: נְשִׂיא יִשְׂרָאֵל
  english_pob_choice: prince of Israel
  chosen_spanish: príncipe de Israel
  alternatives_spanish:
  - líder de Israel
  - gobernante de Israel
  lexicon: HALOT
  rationale: «Príncipe de Israel» preserva el título formal del hebreo y coincide con la decisión inglesa. «Líder» o «gobernante» explican el oficio, pero pierden la formulación tradicional del texto.
- source_word: אֲשֶׁר בָּא יוֹמוֹ
  english_pob_choice: whose day has come
  chosen_spanish: cuyo día ha llegado
  alternatives_spanish:
  - a quien le ha llegado su día
  - cuyo tiempo ha llegado
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para la llegada del día señalado de juicio. «Cuyo día ha llegado» reproduce esa imagen con naturalidad en español sin explicarla en exceso.
- source_word: בְּעֵת
  english_pob_choice: at the time of
  chosen_spanish: en el tiempo de
  alternatives_spanish:
  - al tiempo de
  - cuando
  - en el momento de
  lexicon: HALOT
  rationale: «En el tiempo de» sigue de cerca la construcción temporal del hebreo y mantiene el tono formal del oráculo. «Cuando» sería más fluido, pero menos fiel a la estructura.
- source_word: עֲוֺן קֵץ
  english_pob_choice: the punishment of the end
  chosen_spanish: el castigo del fin
  alternatives_spanish:
  - la iniquidad del fin
  - el castigo final
  - el castigo del final
  lexicon: HALOT
  rationale: Se conserva la ambigüedad relevante de עָוֹן entre culpa e impacto punitivo, pero se opta por «castigo» siguiendo la lectura contextual del juicio. «Del fin» mantiene la referencia a קֵץ sin reinterpretarla como mero desenlace cronológico.
theological_decisions:
- issue: Sentido de חָלָל en un oráculo de sentencia
  english_pob_reading: '''slain wicked one'' addresses the ruler as already under judgment, while noting the alternative ''profane wicked prince of Israel.'''
  chosen_spanish_reading: «muerto, impío» mantiene el tono de condena ya consumada sin adoptar la lectura de «profanado».
  alternative_spanish_readings:
  - «profanado, impío»
  - «herido de muerte, impío»
  rationale: El contexto inmediato es una denuncia judicial contra el príncipe. Traducirlo como «muerto» conserva la severidad y evita introducir la lectura menos probable de «profanado» como opción principal, aunque queda reconocida como alternativa interpretativa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de עֲוֺן קֵץ
  english_pob_reading: The POB notes the phrase may mean either final guilt reaching its full measure or final punishment for that guilt.
  chosen_spanish_reading: «el castigo del fin» expresa la culminación del juicio sin resolver de manera absoluta si el foco recae en culpa o en castigo.
  alternative_spanish_readings:
  - «la iniquidad del fin»
  - «el castigo final»
  - «el castigo por el fin»
  rationale: La frase hebrea es comprimida y admite más de una relación semántica. En español, «castigo» comunica bien la lectura contextual que adoptó la edición inglesa, pero «del fin» preserva la densidad del hebreo y evita borrar la tensión entre culpa y pena.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Esta redacción sigue de cerca la última revisión inglesa: conserva la secuencia vocativa, traduce el sintagma final de manera más literal que «castigo final», y mantiene la ambigüedad comentada en las notas entre culpa e سزا final sin borrar la lectura de juicio consumado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - «Mesías/Cristo» no aparece aquí.
  - Se mantiene el registro profético formal y no se suaviza el vocativo de juicio.
  - Las notas usan marcadores únicos y cada uno aparece anclado en el texto principal.
