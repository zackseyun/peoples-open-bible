translation:
  language: es
  text: Y Nikanor vino a Jerusalén con una gran fuerza, y envió a Judas y a sus hermanos, engañosamente, palabras de paz, diciendo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Νικάνωρ
  english_pob_choice: Nikanor
  chosen_spanish: Nikanor
  alternatives_spanish:
  - Nicanor
  lexicon: n/a (nombre propio)
  rationale: Conservo la transliteración más cercana al griego, en línea con la decisión inglesa del POB y con el principio del proyecto de reflejar la forma original del nombre.
- source_word: δυνάμει πολλῇ
  english_pob_choice: with a large force
  chosen_spanish: con un gran ejército
  alternatives_spanish:
  - con una gran fuerza
  - con tropas numerosas
  lexicon: LSJ
  rationale: El griego expresa fuerza militar concreta; en español, «ejército» comunica mejor esa fuerza armada que una abstracción como «fuerza», sin añadir más de lo que permite el contexto.
- source_word: ἀπέστειλεν πρὸς Ἰούδαν καὶ τοὺς ἀδελφοὺς αὐτοῦ
  english_pob_choice: he sent to Judas and his brothers
  chosen_spanish: envió a Judas y a sus hermanos
  alternatives_spanish:
  - envió mensaje a Judas y a sus hermanos
  - envió mensajeros a Judas y a sus hermanos
  lexicon: LSJ
  rationale: Mantengo la estructura abierta del griego, donde no se explicita si el envío fue de mensaje o de mensajeros. El español puede sostener esa misma ambigüedad sin perder claridad.
- source_word: μετὰ δόλου
  english_pob_choice: deceitfully
  chosen_spanish: engañosamente
  alternatives_spanish:
  - con engaño
  - traidoramente
  lexicon: LSJ
  rationale: La traducción adverbial «engañosamente» reproduce el valor de modo de μετὰ δόλου y mantiene el contraste con las «palabras de paz». «Traidoramente» sería más interpretativa.
- source_word: λόγους εἰρηνικούς
  english_pob_choice: with peaceful words
  chosen_spanish: con palabras de paz
  alternatives_spanish:
  - con palabras pacíficas
  - con palabras conciliadoras
  lexicon: LSJ
  rationale: «Palabras de paz» sigue de cerca el sustantivo griego y conserva la tensión narrativa entre la apariencia pacífica y la intención engañosa.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - acudió
  lexicon: LSJ
  rationale: «Vino» es natural en español narrativo y mantiene la sencillez del aoristo. «Llegó» también sería posible, pero «vino» se ajusta bien al movimiento hacia Jerusalén.
- source_word: Ἰούδαν
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: n/a (nombre propio)
  rationale: En este contexto histórico y en la tradición del libro, el referente es Judas Macabeo; «Judas» es la forma normal y clara en español.
- source_word: ἀδελφοὺς
  english_pob_choice: brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos de sangre
  - sus parientes
  lexicon: LSJ
  rationale: «Hermanos» mantiene el sentido literal del término y concuerda con la referencia a la familia de Judas; no hay base aquí para ampliarlo a «parientes».
- source_word: λέγων
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y diciendo,
  - al decir,
  lexicon: LSJ
  rationale: «Diciendo» conserva el participio introductorio y prepara la cita directa que continúa en el siguiente versículo.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, especialmente al hacer que «engañosamente» modifique directamente el envío y no solo la relación general de la frase. No se añade material explicativo ajeno al texto griego.
  spanish_consistency_notes:
  - He mantenido la transliteración «Nikanor» para coherencia con el POB inglés y con la orientación del proyecto hacia formas directamente auditable del original.
  - He elegido una sintaxis española natural pero suficientemente cercana al orden y a las relaciones gramaticales del griego, evitando tanto el calco rígido como la paráfrasis libre.
  - «Palabras de paz» conserva la ambigüedad del griego y deja visible la ironía narrativa del pasaje.
