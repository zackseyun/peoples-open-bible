review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro de auditoría inglés en casi todo: conserva «subió», «allí», el valor aditivo de וְגַם, «sus dos esposas», y la identificación de Abigail como «la esposa de Nabal». También preserva correctamente la nota alternativa sobre la sintaxis identificadora.'
  spanish_quality_summary: La redacción es clara y natural, pero «Así que» introduce un matiz consecutivo que no está en וַיַּעַל; basta una coordinación narrativa simple. Además, «el carmelita» en español eclesial contemporáneo puede leerse primariamente como miembro de la orden carmelita, creando ambigüedad innecesaria. Conviene evitar ese falso amigo con «de Carmel», que además ya está contemplado como alternativa válida en el expediente.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La elección «esposas» es adecuada para נָשָׁיו. El único ajuste léxico recomendable es no calc ar «the Carmelite» como «el carmelita» por posible ambigüedad en español; «de Carmel» preserva mejor el sentido gentilicio aquí.
  issues:
  - severity: medium
    issue: «Así que» sobretraduce la apertura narrativa
    rationale: El hebreo comienza simplemente con un wayyiqtol narrativo («Y/Entonces David subió allí»). «Así que» añade una inferencia o consecuencia más marcada de la que exige el texto.
  - severity: medium
    issue: «el carmelita» es ambiguo en español
    rationale: Aunque formalmente cercano al inglés auditado, en español actual «carmelita» suele asociarse a la orden religiosa. En este contexto geográfico, «de Carmel» comunica con mayor claridad la procedencia de Nabal sin alterar el sentido.
  revised_spanish_text: 'David subió allí[a], y también sus dos esposas: Ahinoam la jezreelita y Abigail, la esposa de Nabal de Carmel.'
  revised_footnotes:
  - marker: a
    text: 'O bien: «Abigail, la esposa de Nabal, la mujer de Carmel». El hebreo identifica a Abigail por su matrimonio anterior y a Nabal por su procedencia de Carmel.'
    reason: lexical_alternative
  revision_rationale: Se elimina «Así que» para no añadir un matiz consecutivo no explícito en el hebreo narrativo, y se cambia «el carmelita» por «de Carmel» para evitar una ambigüedad fuerte en español contemporáneo mientras se preserva la identificación gentilicia de Nabal. La nota se mantiene, ajustada al texto revisado.
