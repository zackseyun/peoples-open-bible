review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura del hebreo: futuro de reposo seguro, negación existencial de amenaza y cierre con el modismo de buscar el favor de alguien. Sin embargo, «te rogarán tu favor» no es español natural y distorsiona ligeramente la sintaxis del modismo; además, la nota [a] no preserva la alternativa idiomática documentada en el POB inglés para חִלּוּ פָנֶיךָ, sino que comenta innecesariamente רָבַצְתָּ.'
  spanish_quality_summary: '«Te acostarás» y «nadie te hará temer» son comprensibles, aunque «nadie te infundirá temor» o «nadie te hará tener miedo» serían más fluidos; aun así, no requieren cambio. El problema principal es la naturalidad de la segunda cola: en español estándar eclesial, «muchos procurarán tu favor» o «muchos buscarán tu favor» es claro y digno. La nota actual también suena débil y poco útil.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión clave es idiomática: חִלּוּ פָנֶיךָ debe expresarse como «buscar/procurar tu favor», con nota que preserve la alternativa literal «rogar tu rostro» / «implorar ante tu rostro» de forma explicativa, no como texto principal.'
  issues:
  - severity: high
    issue: La frase «muchos te rogarán tu favor» es gramaticalmente extraña en español.
    rationale: Aunque intenta reflejar la súplica implícita en חִלּוּ פָנֶיךָ, la construcción con doble objeto suena antinatural y no representa bien el idiomatismo hebreo en español claro.
  - severity: medium
    issue: La nota [a] está anclada a «Te acostarás» pero el POB inglés documenta la alternativa idiomática en la segunda cola.
    rationale: La nota útil para el lector debería explicar la literalidad de «entreat your face» / פני, no ofrecer una glosa mínima de «te acostarás», que ya es transparente en español.
  revised_spanish_text: Te acostarás, y nadie te hará temer; muchos procurarán tu favor[a].
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «muchos implorarán ante tu rostro», un modismo que significa buscar tu favor.
    reason: lexical_alternative
  revision_rationale: Se corrige la segunda cola para lograr español natural y fiel al modismo hebreo חִלּוּ פָנֶיךָ. «Procurarán tu favor» conserva la idea de buscar o solicitar favorablemente el trato de alguien. Se traslada la nota al lugar relevante y se explica la literalidad del hebreo, siguiendo la justificación auditada del POB inglés.
