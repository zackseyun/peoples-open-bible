translation:
  language: es
  text: Aun si yo estuviera en lo cierto[a], no respondería; suplicaría a mi juez por misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aun si yo fuera justo, no respondería; haría súplica a mi juez».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר אִם
  english_pob_choice: Even if
  chosen_spanish: Aunque
  alternatives_spanish:
  - Aun si
  - Aunque si
  - Si aun
  lexicon: HALOT
  rationale: La combinación introduce una concesión hipotética. «Aunque» comunica bien esa fuerza en español sin forzar una traducción mecánica de ambas partículas.
- source_word: צָדַקְתִּי
  english_pob_choice: I were in the right
  chosen_spanish: yo estuviera en lo cierto
  alternatives_spanish:
  - yo fuera justo
  - yo estuviera en lo correcto
  - yo fuera inocente
  lexicon: HALOT
  rationale: En este contexto forense, la idea es de estar en lo correcto o tener razón en la disputa. «En lo cierto» preserva la dimensión legal sin moralizarla demasiado ni convertirla en una declaración absoluta de justicia personal.
- source_word: לֹא אֶעֱנֶה
  english_pob_choice: I would not answer
  chosen_spanish: no respondería
  alternatives_spanish:
  - no contestaría
  - no daría respuesta
  - no habría de responder
  lexicon: HALOT
  rationale: ענה en Qal aquí significa responder. El condicional en español expresa bien el resultado hipotético con una forma natural y sobria.
- source_word: לִמְשֹׁפְטִי
  english_pob_choice: my judge
  chosen_spanish: a mi juez
  alternatives_spanish:
  - con mi juez
  - ante mi juez
  - mi juez
  lexicon: HALOT
  rationale: La referencia es al juez del litigio. «A mi juez» mantiene la relación directa del verbo siguiente y conserva el matiz judicial sin añadir una lectura adversarial.
- source_word: אֶתְחַנָּן
  english_pob_choice: I would plead with ... for mercy
  chosen_spanish: suplicaría ... que me mostrara misericordia
  alternatives_spanish:
  - haría súplica ... por misericordia
  - imploraría ... misericordia
  - pediría clemencia
  lexicon: HALOT
  rationale: El hitpael de חנן expresa súplica humilde por favor/misericordia. «Suplicaría» mantiene esa intensidad; «me mostrara misericordia» explicita el objeto implícito de la súplica en español natural.
theological_decisions:
- issue: Lenguaje forense y relación con Dios como juez
  english_pob_reading: Render the verse in legal-relational terms ('in the right,' 'my judge') without implying Job denies God's justice or asserts sinless perfection.
  chosen_spanish_reading: Traducir en términos jurídicos y relacionales («en lo cierto», «mi juez») sin convertir la afirmación hipotética de Job en una confesión de inocencia absoluta ni en una negación de la justicia de Dios.
  alternative_spanish_readings:
  - usar «justo» en sentido moral
  - usar «acusador» para el juez
  rationale: El hebreo presenta una escena de litigio. La traducción conserva el carácter hipotético y procesal del dicho de Job, evitando cargar el texto con una teología más fuerte que la que el verso exige.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La versión inglesa revisada movió el matiz final para reflejar más de cerca el hebreo: «plead with my judge for mercy». En español, se reprodujo ese orden relacional con «suplicaría a mi juez que me mostrara misericordia», manteniendo el vínculo directo entre la súplica y el juez.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evitó «Cristo» y «SEÑOR» porque no corresponden al texto hebreo aquí.
  - Se prefirió «en lo cierto» por la escena judicial, en línea con la opción inglesa «in the right» y su revisión contextual.
