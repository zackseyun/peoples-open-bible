revisions:
- from: Él pondrá su mano sobre la cabeza de su ofrenda y la sacrificará delante de la tienda de reunión[a]; y los hijos de Aarón rociarán su sangre sobre el altar, alrededor.
  to: Él pondrá su mano sobre la cabeza de su ofrenda y la degollará delante de la tienda de reunión; y los hijos de Aarón arrojarán[a] su sangre contra el altar alrededor.
  rationale: 'Se corrige el punto léxico central del versículo: זרק exige una acción más fuerte que «rociar», por eso se cambia a «arrojarán» y se restituye una nota sobre alternativas cercanas. También se ajusta «contra el altar» para reflejar mejor la construcción con זרק, y se refina שָׁחַט a «degollará» para mayor precisión sacrificial. No se requiere adjudicación adicional porque la evidencia fuente y la auditoría inglesa son claras.'
