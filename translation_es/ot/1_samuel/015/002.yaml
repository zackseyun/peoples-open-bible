revisions:
- from: 'Así dice Yahvé de los ejércitos: «He tomado nota[a] de lo que Amalec hizo a Israel[c], de cómo lo[b] hostigó en el camino cuando subía de Egipto».'
  to: 'Así dice Yahvé de los ejércitos: «He tomado nota[a] de lo que Amalec hizo a Israel, de cómo se le opuso[b][c] en el camino cuando subía de Egipto».'
  rationale: Se corrige el verbo principal de la acción de Amalec a «se le opuso» para ajustarlo mejor al hebreo y al expediente inglés, evitando la sobreespecificación de «hostigó». Se repara la nota b para que contenga alternativas españolas naturales y fieles. Se mueve la nota sobre el singular colectivo al pronombre correspondiente, de modo que el anclaje entre texto y nota sea exacto.
