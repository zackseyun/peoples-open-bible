base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/028/019.yaml
  text: And Yahweh will also give Israel with you into the hand of the Philistines[a], and tomorrow you and your sons will be with me[b]. Yahweh will also give the camp of Israel into the hand of the Philistines.
  footnotes:
