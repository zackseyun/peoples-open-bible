translation:
  language: es
  text: Con paciencia[a], un gobernante puede ser persuadido, y una lengua suave[b] quebranta un hueso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Con mucha longanimidad, un gobernante es ganado». El hebreo alude literalmente a la lentitud para airarse.'
    reason: lexical_alternative
  - marker: b
    text: La imagen expresa el poder de la palabra apacible para vencer la dureza o la resistencia.
    reason: cultural_note
lexical_decisions:
- source_word: בְּאֹרֶךְ אַפַּיִם
  english_pob_choice: By patience
  chosen_spanish: Con paciencia
  alternatives_spanish:
  - Con longanimidad
  - Con mucha paciencia
  - Con longanimidad y paciencia
  lexicon: HALOT
  rationale: El hebreo usa un modismo que literalmente alude a la lentitud para airarse. En español, «con paciencia» comunica de forma natural la actitud perseverante y contenida que exige el proverbio, sin perder el valor proverbial del enunciado.
- source_word: יְפֻתֶּה
  english_pob_choice: may be persuaded
  chosen_spanish: se puede persuadir
  alternatives_spanish:
  - es persuadido
  - puede ser ganado
  - se puede ganar
  lexicon: HALOT
  rationale: El pasivo del verbo expresa que la persona en autoridad llega a ceder o a ser ganada por la actitud paciente. «Se puede persuadir» mantiene la idea de influencia o convencimiento sin introducir una connotación engañosa que no exige el contexto sapiencial.
- source_word: קָצִין
  english_pob_choice: a ruler
  chosen_spanish: un gobernante
  alternatives_spanish:
  - un jefe
  - un oficial
  - un príncipe
  lexicon: HALOT
  rationale: El término designa a una persona con autoridad. «Gobernante» es amplio, claro y natural en español, y conserva el alcance general del proverbio mejor que opciones más restringidas o más arcaicas.
- source_word: לָשׁוֹן רַכָּה
  english_pob_choice: a gentle tongue
  chosen_spanish: una lengua amable
  alternatives_spanish:
  - una lengua suave
  - una lengua tierna
  - una lengua gentil
  lexicon: HALOT
  rationale: La expresión es metafórica para habla suave y bondadosa. «Lengua amable» suena natural en español y transmite la cualidad de trato benigno que el proverbio contrapone a la dureza.
- source_word: תִּשְׁבָּר גָּרֶם
  english_pob_choice: breaks a bone
  chosen_spanish: quebranta un hueso
  alternatives_spanish:
  - rompe un hueso
  - puede romper un hueso
  - quiebra un hueso
  lexicon: HALOT
  rationale: Se conserva la imagen concreta y enfática del hebreo. «Quebranta» comunica con fuerza proverbial el efecto sorprendente de la palabra suave, y mantiene el tono figurado del original.
translation_notes:
  revision_awareness: El contexto inglés fue revisado y mantenido sin cambios sustanciales; la traducción española sigue de cerca las decisiones léxicas auditadas, especialmente el modismo de paciencia/longanimidad y la metáfora de la lengua suave que quiebra un hueso.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde al nombre divino; este versículo no lo contiene.
  - Se prefirió «gobernante» para קָצִין por su amplitud semántica y naturalidad en español.
  - Se conservó la metáfora corporal «lengua» en vez de sustituirla por «palabras», porque el hebreo la presenta como imagen viva.
  - «Quebranta» mantiene la fuerza proverbial sin volver la frase demasiado literal o áspera para el español actual.
