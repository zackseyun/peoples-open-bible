review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el contraste del hebreo: Dios no preserva la vida del malvado y da justicia a los afligidos. Sin embargo, la elección principal «No dejará vivir» suena algo permisiva/volitiva en español y se aleja del matiz de preservación continua documentado por el POB para יְחַיֶּה. Conviene alinear el texto principal con «mantener con vida» y dejar «dejar vivir» como alternativa.'
  spanish_quality_summary: El español es claro y natural, pero «No dejará vivir al malvado» puede sugerir impedimento directo más que falta de preservación. «No mantendrá con vida al malvado» suena más preciso y digno en registro bíblico moderno. El resto de la línea, «pero dará justicia a los afligidos», es fiel y legible.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «justicia» para מִשְׁפָּט y «afligidos» para עֲנִיִּים están bien elegidos. La revisión propuesta mejora la alineación con la decisión inglesa auditada para יְחַיֶּה («keep alive»).
  issues:
  - severity: medium
    issue: La cláusula principal usa «No dejará vivir» para יְחַיֶּה.
    rationale: Aunque es una alternativa válida y ya documentada en la auditoría inglesa, el texto principal del POB eligió «keep alive», no «let live». En español, «no dejar vivir» puede sonar más a prohibición o impedimento que a no preservar la vida.
  revised_spanish_text: No mantendrá con vida al malvado[a], pero dará justicia a los afligidos[b].
