translation:
  language: es
  text: Pero las criaturas del desierto se echarán allí, y sus casas estarán llenas de búhos[a]; los avestruces habitarán allí, y los machos cabríos[b] danzarán allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «criaturas aulladoras» o «chacales» para «búhos»; el término hebreo אֹחִים es incierto.
    reason: lexical_alternative
  - marker: b
    text: O «demonios cabríos» o «sátiros»; el hebreo שְׂעִירִים puede denotar machos cabríos peludos y también puede llevar asociaciones míticas o demoníacas en algunos contextos.
    reason: alternative_reading
lexical_decisions:
- source_word: וְרָבְצוּ
  english_pob_choice: will lie down
  chosen_spanish: se echarán
  alternatives_spanish:
  - se acostarán
  - reposarán
  lexicon: HALOT
  rationale: El verbo hebreo describe a animales que se echan o se recuestan en un lugar. En español, "se echarán" transmite de manera natural esa ocupación del sitio, con la misma imagen de asentamiento animal en ruinas.
- source_word: צִיִּים
  english_pob_choice: desert creatures
  chosen_spanish: las criaturas del desierto
  alternatives_spanish:
  - las bestias del desierto
  - los moradores del desierto
  lexicon: HALOT
  rationale: El término es amplio e incierto, y no nombra con precisión una sola especie. "Criaturas del desierto" conserva esa generalidad sin forzar una identificación zoológica concreta.
- source_word: בָתֵּיהֶם
  english_pob_choice: their houses
  chosen_spanish: sus casas
  alternatives_spanish:
  - sus viviendas
  - sus moradas
  lexicon: HALOT
  rationale: El hebreo habla de las casas que les pertenecen a los habitantes del lugar. "Sus casas" reproduce de forma directa y clara el posesivo y la imagen de desolación.
- source_word: אֹחִים
  english_pob_choice: owls
  chosen_spanish: búhos
  alternatives_spanish:
  - lechuzas
  - criaturas aulladoras
  - chacales
  lexicon: HALOT
  rationale: La referencia hebrea es incierta. Dado el paralelo con la tradición inglesa de la POB y la imagen de ruina habitada por aves nocturnas, "búhos" funciona bien en español, mientras que la incertidumbre queda preservada en la nota.
- source_word: בְּנוֹת יַעֲנָה
  english_pob_choice: ostriches
  chosen_spanish: las hijas del avestruz
  alternatives_spanish:
  - avestruces
  - avestruces hembras
  lexicon: HALOT
  rationale: La expresión hebrea es un giro idiomático zoológico. En español, "hijas del avestruz" mantiene con mayor cercanía la forma constructa del hebreo, aunque el sentido sea la especie de las avestruces; por eso se conserva la posibilidad zoológica y el tono poético.
- source_word: וּשְׂעִירִים
  english_pob_choice: wild goats
  chosen_spanish: los machos cabríos
  alternatives_spanish:
  - las cabras monteses
  - los seres cabríos
  - los sátiros
  lexicon: HALOT
  rationale: El sentido base de שְׂעִירִים es el de seres cabríos o peludos, con posibles asociaciones míticas en algunos contextos. "Machos cabríos" conserva el campo semántico caprino sin afirmar de entrada una lectura demonológica más fuerte de la que exige el pasaje.
- source_word: יְרַקְּדוּ
  english_pob_choice: will dance
  chosen_spanish: saltarán
  alternatives_spanish:
  - danzarán
  - brincarán
  - saltarín
  lexicon: HALOT
  rationale: El verbo puede significar danzar, brincar o saltar. En este contexto de criaturas del desierto y seres caprinos, "saltarán" comunica mejor el movimiento vivo y extraño que la escena poética sugiere en español.
theological_decisions:
- issue: Si שְׂעִירִים debe entenderse como animales literales o como seres demoníacos/mitológicos
  english_pob_reading: Rendered as 'wild goats' in the main text, with a footnote allowing 'goat-demons' or 'satyrs'
  chosen_spanish_reading: Se traduce en el texto principal como "machos cabríos", con nota que abre la opción de "demonios cabríos" o "sátiros"
  alternative_spanish_readings:
  - demonios cabríos
  - sátiros
  rationale: El hebreo permite un trasfondo mítico o demonológico en algunos contextos, pero la forma léxica básica sigue siendo caprina. En este oráculo de desolación, el texto no obliga a una afirmación doctrinal más fuerte que la que el hebreo expresa de manera directa. La traducción principal conserva la ambigüedad sin borrar la tensión.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión española sigue el pasaje hebreo con alta concordancia con el control cruzado más reciente y no incorpora cambios de revisión; se mantiene la incertidumbre léxica donde el hebreo la presenta, especialmente en אֹחִים y שְׂעִירִים.
  spanish_consistency_notes:
  - Se conserva el paralelismo poético del verso en cuatro miembros.
  - Se evita traducir automáticamente por términos eclesiásticos tradicionales cuando el hebreo describe criaturas del desierto y seres cabríos.
  - La nota sobre אֹחִים mantiene la incertidumbre léxica sin resolverla artificialmente.
  - La nota sobre שְׂעִירִים preserva la tensión entre sentido caprino y posibles asociaciones míticas.
