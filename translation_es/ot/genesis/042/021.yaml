  text: וַ/יֹּאמְר֞וּ אִ֣ישׁ אֶל אָחִ֗י/ו אֲבָל֮ אֲשֵׁמִ֣ים אֲנַחְנוּ֮ עַל אָחִי/נוּ֒ אֲשֶׁ֨ר רָאִ֜ינוּ צָרַ֥ת נַפְשׁ֛/וֹ בְּ/הִתְחַֽנְנ֥/וֹ אֵלֵ֖י/נוּ וְ/לֹ֣א שָׁמָ֑עְנוּ עַל כֵּן֙ בָּ֣אָה אֵלֵ֔י/נוּ הַ/צָּרָ֖ה הַ/זֹּֽאת־׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/042/021.yaml
  text: Then they said to one another[a], “Indeed, we are guilty concerning our brother, because we saw the distress of his soul when he pleaded with us, and we did not listen[b]. Therefore this distress has come upon us.”
  footnotes:
  - marker: a
    text: Or 'his anguish.' The Hebrew literally says 'the distress of his soul,' an expression for deep personal anguish.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew uses the same root for Joseph's 'distress' and the brothers' present 'distress,' linking their past cruelty with their current suffering.
    reason: cross_reference
