base_translation:
  language: en
  yaml_path: translation/ot/leviticus/013/003.yaml
  text: And the priest shall examine the diseased spot on the skin of the body[a], and if the hair in the spot has turned white and the appearance of the spot is deeper than the skin of his body, it is a diseased spot of leprosy; when the priest has examined him, he shall pronounce him unclean.
  footnotes:
  - marker: a
    text: Or, traditionally, 'a spot of leprosy' / 'a leprous infection.' The Hebrew צָרַעַת refers to a broader category than modern leprosy.
    reason: lexical_alternative
