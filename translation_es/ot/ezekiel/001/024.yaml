review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido del hebreo: oye el sonido de las alas, lo compara con muchas aguas, con el sonido del Todopoderoso, con tumulto y con un campamento, y luego indica que al detenerse bajaban sus alas. Sin embargo, en מַחֲנֶה el POB inglés explicitó correctamente el matiz militar probable como ''army camp'', y el borrador principal lo redujo a ''campamento'', dejando perder parte de la fuerza contextual que la auditoría quiso preservar.'
  spanish_quality_summary: El español es claro, natural y digno. 'Y oí', 'muchas aguas', 'tumulto' y 'bajaban sus alas' funcionan bien. La puntuación con punto y coma tras 'cuando iban' es aceptable, pero la frase fluye mejor si se mantiene la explicitación de 'campamento militar' en el texto principal, ya que 'campamento' solo puede sonar demasiado general en español.
  glossary_alignment: Buen alineamiento general con la terminología del proyecto. שַׁדַּי como 'el Todopoderoso' concuerda con la decisión teológica documentada. No hay conflicto con Yahvé/Mesías/etc. La única desviación relevante del rastro léxico inglés es מַחֲנֶה, donde conviene reflejar 'campamento militar' en vez de solo 'campamento'.
  issues:
  - severity: medium
    issue: מַחֲנֶה se tradujo en el texto principal como 'campamento' en vez de explicitar el valor militar probable.
    rationale: La auditoría inglesa eligió 'army camp' precisamente para hacer explícito el sentido más probable de מַחֲנֶה en este contexto de ruido colectivo. En español, 'campamento' solo atenúa esa precisión. 'Campamento militar' conserva mejor el razonamiento léxico documentado sin sonar forzado.
  - severity: low
    issue: La nota b no refleja bien la alternativa preservada por el inglés.
    rationale: El inglés principal lleva 'army camp' y la nota conserva la alternativa más literal 'camp'. En español, si el texto principal se corrige a 'campamento militar', la nota debe presentar como alternativa 'campamento', no repetir la forma principal ni terminar con una explicación circular.
  revised_spanish_text: Y oí el sonido de sus alas[a], como el sonido de muchas aguas, como el sonido del Todopoderoso, cuando iban; un sonido de tumulto, como el sonido de un campamento militar[b]. Cuando se detenían, bajaban sus alas.
  revised_footnotes:
  - marker: a
    text: O «como el sonido de Shaddai». El hebreo usa el título divino שַׁדַּי, tradicionalmente traducido «el Todopoderoso».
    reason: lexical_alternative
  - marker: b
    text: O «como el sonido de un campamento»; el hebreo מַחֲנֶה suele referirse a un campamento militar, de ahí «campamento militar».
    reason: lexical_alternative
  revision_rationale: Se requiere una corrección menor para alinear el texto español con la decisión léxica documentada del POB sobre מַחֲנֶה. El resto del versículo es fiel y natural en español. También se ajusta la nota b para que preserve correctamente la alternativa frente a la lectura principal revisada.
