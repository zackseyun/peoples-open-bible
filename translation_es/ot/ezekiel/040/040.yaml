translation:
  language: es
  text: Y al costado exterior, junto a la subida a la entrada de la puerta norte, había dos mesas; y al otro costado, que pertenecía al pórtico de la puerta, había dos mesas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כָּתֵף
  english_pob_choice: outer side
  chosen_spanish: costado
  alternatives_spanish:
  - lado
  - flanco
  lexicon: HALOT
  rationale: En esta descripción arquitectónica, el hebreo usa un término corporal ('hombro') para una proyección o zona lateral del acceso. La revisión inglesa optó por 'side' para naturalidad. En español, 'costado' mantiene la imagen lateral sin sonar tan físico como 'hombro' en este contexto.
- source_word: מִחוּצָה
  english_pob_choice: outer side
  chosen_spanish: exterior
  alternatives_spanish:
  - afuera
  - en el lado exterior
  lexicon: HALOT
  rationale: La forma indica exterioridad. 'Costado exterior' conserva la relación espacial con כָּתֵף y transmite claramente que se trata de la parte externa del acceso.
- source_word: לָעוֹלֶה
  english_pob_choice: by the ascent
  chosen_spanish: junto a la subida
  alternatives_spanish:
  - en la subida
  - por la subida
  - junto al acceso elevado
  lexicon: HALOT
  rationale: Aquí el participio funciona como referencia al lugar por donde se sube. 'Subida' es una forma natural en español para el elemento arquitectónico sin perder la idea de ascenso.
- source_word: פֶּתַח
  english_pob_choice: entrance
  chosen_spanish: entrada
  alternatives_spanish:
  - apertura
  - acceso
  lexicon: HALOT
  rationale: En contexto de puerta/arquitectura sagrada, 'entrada' es la equivalencia más clara y actual para פֶּתַח.
- source_word: שַׁעַר
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portón
  - portal
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, 'puerta' comunica mejor que 'portal' la estructura funcional del complejo. Se evita forzar un tecnicismo cuando el hebreo designa la puerta del recinto.
- source_word: הַצָּפוֹנָה
  english_pob_choice: north gate
  chosen_spanish: norte
  alternatives_spanish:
  - septentrional
  - del norte
  lexicon: HALOT
  rationale: La relación direccional se expresa de forma natural como 'puerta norte'. 'Norte' conserva el valor adjetival del hebreo en un español idiomático.
- source_word: שְׁנַיִם שֻׁלְחָנוֹת
  english_pob_choice: two tables
  chosen_spanish: dos mesas
  alternatives_spanish:
  - dos tablas
  - dos mesas de trabajo
  lexicon: HALOT
  rationale: La POB inglesa mantiene 'tables', que en este contexto de preparación sacrificial alude a superficies o mesas. 'Mesas' es el equivalente más claro y aceptable en español.
- source_word: הָאַחֶרֶת
  english_pob_choice: the other
  chosen_spanish: el otro costado
  alternatives_spanish:
  - el costado opuesto
  - el segundo
  lexicon: HALOT
  rationale: El hebreo marca el lado correspondiente/opuesto. 'El otro costado' reproduce la relación sin introducir una precisión no explícita como 'opuesto'.
- source_word: אֲשֶׁר לְאֻלָם הַשַּׁעַר
  english_pob_choice: which belonged to the porch of the gate
  chosen_spanish: que pertenecía al pórtico de la puerta
  alternatives_spanish:
  - que estaba junto al pórtico de la puerta
  - que era del pórtico de la puerta
  lexicon: HALOT
  rationale: La relación con לְ es flexible; la revisión inglesa prefirió 'belonged to' para expresar asociación arquitectónica. 'Pertenecía' conserva esa vinculación sin sobrerrepresentar posesión jurídica. 'Pórtico' traduce bien אֻלָם en este marco arquitectónico.
- source_word: אֻלָם
  english_pob_choice: porch
  chosen_spanish: pórtico
  alternatives_spanish:
  - vestíbulo
  - portal
  lexicon: HALOT
  rationale: '''Pórtico'' es un término español claro y digno para la parte cubierta de acceso del templo. Se preserva la referencia arquitectónica sin recurrir a una paráfrasis.'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que sustituyó 'shoulder' por 'side' para mayor naturalidad arquitectónica. Por eso el español evita 'hombro' en el texto principal y opta por 'costado', manteniendo la estructura del verso y la distribución paralela de dos mesas en ambos lados.
  spanish_consistency_notes:
  - Se mantiene 'puerta' para שַׁעַר en coherencia con el español bíblico moderno y con el contexto arquitectónico del templo.
  - '''Pórtico'' se usa para אֻלָם por ser el equivalente más natural y estable en este pasaje.'
  - La secuencia espacial 'costado exterior... al otro costado' conserva el paralelismo del hebreo sin introducir información adicional.
