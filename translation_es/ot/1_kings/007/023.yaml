translation:
  language: es
  text: Entonces hizo el mar fundido[a], diez codos de borde a borde, redondo por todos lados; su altura era de cinco codos[c], y un cordel de treinta codos lo rodeaba por todos lados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cuenca». El hebreo llama a este gran recipiente del templo «el mar», una designación formal que se conserva en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «un cordel de treinta codos»; es decir, su circunferencia medía treinta codos.'
    reason: cultural_note
  - marker: c
    text: La forma escrita aquí es קוה («línea»), tradicionalmente leída con el sentido de cordel o cuerda de medir; compárese 2 Crónicas 4:2.
    reason: textual_variant
lexical_decisions:
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - la cuenca
  - el estanque
  lexicon: HALOT
  rationale: Se conserva la designación formal del objeto como "mar", porque el hebreo usa un nombre teológico/técnico, no solo una descripción funcional. En español, "el mar" mantiene esa fuerza mejor que "cuenca" o "estanque".
- source_word: מוּצָק
  english_pob_choice: cast
  chosen_spanish: fundido
  alternatives_spanish:
  - vacido
  - de metal fundido
  lexicon: HALOT
  rationale: El participio pasivo señala un objeto formado por vertido/moldeado en metal. "Fundido" comunica bien la idea de metal trabajado y evita una perífrasis pesada; el contexto del templo hace claro que se trata de una pieza metálica.
- source_word: עֶשֶׂר בָּאַמָּה מִשְּׂפָתוֹ עַד שְׂפָתוֹ
  english_pob_choice: ten cubits from brim to brim
  chosen_spanish: diez codos de borde a borde
  alternatives_spanish:
  - diez codos de un borde al otro
  - diez codos de labio a labio
  lexicon: HALOT
  rationale: '"Borde" es natural en español para un recipiente grande y conserva la medición transversal del hebreo. "Labio" suena demasiado técnico o extraño para el lector general; "borde a borde" reproduce la precisión sin calco duro.'
- source_word: שְׂפָה
  english_pob_choice: brim
  chosen_spanish: borde
  alternatives_spanish:
  - reborde
  - orilla
  lexicon: HALOT
  rationale: Para un vaso/vasija, "borde" es la opción más clara y publicable en español. Mantiene la imagen del perímetro superior del objeto sin introducir una palabra demasiado literaria o ambigua.
- source_word: עָגֹל סָבִיב
  english_pob_choice: round all around
  chosen_spanish: redondo por todos lados
  alternatives_spanish:
  - circular por todos lados
  - redondo alrededor
  lexicon: HALOT
  rationale: La expresión hebrea enfatiza la forma circular y la totalidad del contorno. "Redondo por todos lados" conserva esa doble idea de forma y extensión, con un español natural.
- source_word: קוֹמָתוֹ
  english_pob_choice: its height
  chosen_spanish: su altura
  alternatives_spanish:
  - su estatura
  - su elevación
  lexicon: HALOT
  rationale: En contexto arquitectónico, "altura" es la equivalencia directa y más clara. "Estatura" sonaría antropomórfico; "elevación" es posible pero menos idiomático.
- source_word: וְקוה
  english_pob_choice: and a line
  chosen_spanish: y un cordel
  alternatives_spanish:
  - y una línea
  - y un cordón de medir
  lexicon: HALOT
  rationale: El texto hebreo presenta la palabra ketiv relacionada con un instrumento de medida; la nota en inglés remite al sentido tradicional de cordel/cuerda de medir. "Cordel" expresa mejor en español esa idea instrumental que "línea".
- source_word: שְׁלֹשִׁים בָּֽאַמָּה
  english_pob_choice: thirty cubits
  chosen_spanish: de treinta codos
  alternatives_spanish:
  - treinta codos
  - con una medida de treinta codos
  lexicon: HALOT
  rationale: Se preserva la unidad tradicional "codo" por fidelidad al original y coherencia con la traducción POB en inglés. La construcción preposicional sirve para la medida de longitud del cordel/contorno.
- source_word: יָסֹב אֹתוֹ סָבִיב
  english_pob_choice: went around it all around
  chosen_spanish: lo rodeaba por todos lados
  alternatives_spanish:
  - lo circundaba por todos lados
  - lo rodeaba alrededor
  lexicon: HALOT
  rationale: El hebreo repite la idea de rodear para enfatizar el contorno completo. "Lo rodeaba por todos lados" comunica esa repetición de manera fluida en español, sin perder la intensidad de la imagen.
theological_decisions:
- issue: Nombre técnico del gran recipiente del templo
  english_pob_reading: the sea is retained as a formal designation in the main text, with 'the basin' as an alternative
  chosen_spanish_reading: se conserva «el mar» como designación formal en el texto principal
  alternative_spanish_readings:
  - la cuenca
  - el gran recipiente
  rationale: El hebreo usa un nombre fijo y simbólico para este objeto del templo. Mantener "el mar" preserva esa designación formal y la tensión entre nombre y función; traducirlo solo por función perdería ese rasgo textual.
  doctrine_reference: 1 Reyes 7:23; comparación con la designación técnica del objeto en el pasaje
- issue: Lectura del término de medida en la cláusula final
  english_pob_reading: a line of thirty cubits went around it all around; the note distinguishes the written form and the traditional reading
  chosen_spanish_reading: un cordel de treinta codos lo rodeaba por todos lados
  alternative_spanish_readings:
  - una línea de treinta codos lo rodeaba por todos lados
  - un cordón de treinta codos lo rodeaba por todos lados
  rationale: La forma escrita hebrea permite la idea de "línea", pero el uso tradicional apunta a un instrumento de medición. "Cordel" conserva esa ambivalencia razonable en español y evita decidir prematuramente entre texto escrito y lectura tradicional.
  doctrine_reference: 1 Reyes 7:23; nota textual sobre קוה y el paralelo de 2 Crónicas 4:2
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del texto inglés, que eliminó un posesivo redundante antes de "brim" sin cambiar el sentido. En español se optó por una solución igualmente natural («de borde a borde») que conserva la medición exacta y evita una repetición innecesaria.
  spanish_consistency_notes:
  - Se mantuvo «codos» como unidad de medida, coherente con la práctica POB en inglés de conservar «cubits».
  - Se evitó «SEÑOR» o equivalentes de sustitución porque el versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - La repetición hebrea de «por todos lados» se conservó para reflejar el énfasis descriptivo del original.
  - El término «mar» se conservó como nombre técnico y no se redujo a una mera descripción funcional.
