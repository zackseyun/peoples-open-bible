theological_decisions:
- issue: Identification of the feminine subject throughout the verse
  chosen_reading: Render the subject as 'She,' referring to personified Wisdom from the immediate context.
  alternative_readings:
  - Repeat 'Wisdom' explicitly in English at the start of the verse
  rationale: The prior context identifies the acting subject as Wisdom. Retaining 'She' preserves the Greek flow and the literary personification without unnecessary repetition.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
