  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La elección de 'hombres' para אֱנוֹשׁ es admisible porque sigue la decisión documentada del POB, pero requiere la nota correcta para aclarar su valor colectivo. 'Tierra' para אֶרֶץ también está bien, con nota de alternativa 'país/territorio' si se quisiera lectura localizada.
