translation:
  language: es
  text: Deja[a], hijo mío, de oír instrucción, y te desviarás de las palabras de conocimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Deja, hijo mío, de oír instrucción y de desviarte de las palabras de conocimiento». La sintaxis hebrea es comprimida, y los intérpretes discrepan sobre si el verso advierte contra una instrucción engañosa o reprende irónicamente a quien deja de escuchar la instrucción sana.'
    reason: alternative_reading
lexical_decisions:
- source_word: חַדַל
  english_pob_choice: Cease
  chosen_spanish: Cesa
  alternatives_spanish:
  - Detente
  - Desiste
  lexicon: HALOT
  rationale: El imperativo de חדל pide detener o desistir; «Cesa» conserva el tono proverbial y admonitorio del inglés POB, y suena natural en español bíblico sin volverse arcaizante en exceso.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo
  lexicon: HALOT
  rationale: En la literatura sapiencial, el vocativo filial es una fórmula estable. «Hijo mío» mantiene la cercanía exhortativa y evita neutralizar innecesariamente el masculino singular documentado por el hebreo.
- source_word: לִשְׁמֹעַ
  english_pob_choice: to hear
  chosen_spanish: escuchar
  alternatives_spanish:
  - oír
  - prestar atención a
  lexicon: HALOT
  rationale: Aunque el hebreo puede significar «oír» o «escuchar», aquí el contexto sapiencial exige recepción atenta. «Escuchar» comunica mejor esa idea que el mero acto pasivo de oír.
- source_word: מוּסָר
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - corrección
  lexicon: HALOT
  rationale: מוּסָר abarca disciplina, corrección e instrucción. En este pareado, «instrucción» encaja con «palabras de conocimiento» y preserva el sentido pedagógico de la sabiduría.
- source_word: לִשְׁגּוֹת
  english_pob_choice: to stray
  chosen_spanish: desviarte
  alternatives_spanish:
  - extraviarte
  - errar
  - apartarte
  lexicon: HALOT
  rationale: El infinitivo de שגה expresa desviarse o errar. «Desviarte» comunica con claridad el movimiento fuera del camino correcto y funciona bien con la construcción española 'de escuchar... y de desviarte...'.
- source_word: מֵאִמְרֵי
  english_pob_choice: from the words of
  chosen_spanish: de las palabras de
  alternatives_spanish:
  - de los dichos de
  - de las expresiones de
  lexicon: HALOT
  rationale: La preposición מן introduce separación o alejamiento respecto de lo que sigue. «De las palabras de» preserva la relación constructa y resulta natural en español.
- source_word: דָעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - sabiduría
  - entendimiento
  lexicon: HALOT
  rationale: En Proverbios, דעת suele referir conocimiento en sentido sapiencial. «Conocimiento» reproduce con fidelidad el campo semántico y coincide con la formulación del inglés POB.
theological_decisions:
- issue: 'Ambigüedad sintáctica del hebreo: si la frase advierte contra escuchar instrucción que lleva al error o si reprende al que deja de escuchar instrucción y así se desvía.'
  english_pob_reading: Cease, my son, to hear instruction and to stray from the words of knowledge.
  chosen_spanish_reading: Cesa, hijo mío, de escuchar instrucción y de desviarte de las palabras de conocimiento.
  alternative_spanish_readings:
  - Cesa, hijo mío, de escuchar instrucción, y te desviarás de las palabras de conocimiento.
  - 'Cesa, hijo mío: escucha instrucción y no te desvíes de las palabras de conocimiento.'
  rationale: La sintaxis hebrea es comprimida y permite más de una relación lógica entre los infinitivos. La redacción principal sigue de cerca la revisión inglesa más reciente, que preserva la advertencia sin atribuir a la instrucción un valor causal que el hebreo no exige explícitamente.
  doctrine_reference: Proverbios 19:27; sabiduría proverbial y sintaxis hebrea comprimida
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada desde una lectura que hacía depender el desvío de la propia instrucción a otra que refleja mejor el hebreo: el verso exhorta a cesar de escuchar instrucción y a desviarse de las palabras de conocimiento, no a afirmar que la instrucción misma lleva al error. La propuesta española sigue esa revisión y conserva el registro proverbial formal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, aunque este versículo no contiene el nombre divino.
  - Se traduce מוּסָר por «instrucción» por coherencia con la decisión inglesa auditada y para evitar empobrecer el paralelismo sapiencial.
  - «Conocimiento» se conserva para דעת en lugar de «entendimiento», siguiendo la línea lexical del POB inglés y su consistencia en Proverbios.
  - Se opta por una construcción adjetival/infinitiva natural en español, pero sin borrar la tensión sintáctica del hebreo; la nota a pie de página preserva la alternativa principal.
