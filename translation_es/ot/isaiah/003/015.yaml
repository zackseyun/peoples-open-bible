review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: la reprensión idiomática inicial, la violencia concreta de «aplastar»/«moler», «mi pueblo», «los pobres» y la fórmula profética final. Sin embargo, pierde matiz en el título divino אֲדֹנָי יְהוִה צְבָאוֹת al invertir indebidamente los componentes como «Yahvé, Dios de los ejércitos».'
  spanish_quality_summary: El español es claro y legible, pero «¿Qué quieren decir con...?» suena algo menos natural y directo que «¿Qué quieren decir al...?» o «¿Qué quieren decir con esto de...?» en este contexto. Además, «el rostro de los pobres» es posible, pero el plural «los rostros de los pobres» preserva mejor la imagen hebrea y su fuerza poética en español sin sonar forzado.
  glossary_alignment: 'Se alinea bien con «Yahvé» para יהוה. No obstante, para אֲדֹנָי יְהוִה debe preservarse mejor el valor compuesto: en español conviene «el Señor Yahvé» (o similar), no «Yahvé, Dios», porque אֲדֹנָי no es «Dios» aquí. «De los ejércitos» es aceptable para צְבָאוֹת.'
  issues:
  - severity: high
    issue: Título divino mal representado en «Yahvé, Dios de los ejércitos»
    rationale: El hebreo אֲדֹנָי יְהוִה צְבָאוֹת contiene «Señor» + nombre divino + «de los ejércitos». Traducirlo como «Yahvé, Dios de los ejércitos» reemplaza אֲדֹנָי por «Dios», alterando el título fuente y la decisión léxica documentada.
  - severity: medium
    issue: La imagen de פנים queda algo reducida en «el rostro de los pobres»
    rationale: Aunque «rostro» singular puede sonar natural, el hebreo tiene valor plural formal y la POB inglesa conservó «faces». En español, «los rostros de los pobres» mantiene mejor la vividez metáforica sin afectar la claridad.
  - severity: low
    issue: El giro inicial puede sonar ligeramente menos idiomático
    rationale: «¿Qué quieren decir con aplastar...?» se entiende, pero «¿Qué quieren decir al aplastar...?» suena más natural en español para introducir la acción censurada.
  revised_spanish_text: ¿Qué quieren decir al aplastar a mi pueblo y moler los rostros de los pobres?[a] declara el Señor Yahvé de los ejércitos.
  revised_footnotes:
