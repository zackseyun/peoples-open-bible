translation:
  language: es
  text: Y cuando llegó, hizo sonar el shofar en la región montañosa de Efraín, y los hijos de Israel bajaron con él desde la región montañosa, y él estaba delante de ellos.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיְהִי בְּבוֹאוֹ
  english_pob_choice: And when he arrived
  chosen_spanish: Y cuando él llegó
  alternatives_spanish:
  - Y cuando llegó
  - Y sucedió que, cuando llegó
  lexicon: HALOT
  rationale: La construcción temporal del hebreo introduce la acción de forma narrativa. En español, «cuando él llegó» comunica el cambio de escena con naturalidad. Se conserva el valor secuencial sin añadir una paráfrasis innecesaria.
- source_word: וַיִּתְקַע בַּשּׁוֹפָר
  english_pob_choice: he blew the trumpet
  chosen_spanish: tocó el shofar
  alternatives_spanish:
  - tocó el cuerno
  - hizo sonar el shofar
  lexicon: HALOT
  rationale: שׁוֹפָר designa un instrumento de señal, frecuentemente un cuerno de carnero. «Shofar» mantiene la especificidad del término bíblico y evita la pérdida de precisión que tendría «trompeta» en este contexto. «Tocó» expresa bien la acción de dar la señal.
- source_word: בְּהַר אֶפְרָיִם
  english_pob_choice: in the hill country of Ephraim
  chosen_spanish: en la región montañosa de Efraín
  alternatives_spanish:
  - en la serranía de Efraín
  - en la tierra montañosa de Efraín
  lexicon: HALOT
  rationale: Aquí הַר tiene sentido geográfico colectivo, no el de un monte aislado. «Región montañosa» refleja ese valor de forma clara y natural en español.
- source_word: וַיֵּרְדוּ עִמּוֹ בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel went down with him
  chosen_spanish: los hijos de Israel bajaron con él
  alternatives_spanish:
  - los israelitas bajaron con él
  - los hijos de Israel descendieron con él
  lexicon: HALOT
  rationale: Se conserva la forma fuente «hijos de Israel» porque el auditorio masculino/corporativo del hebreo se mantiene en la estructura del texto. «Bajaron» expresa adecuadamente el verbo de descenso en un español corriente y bíblico.
- source_word: מִן הָהָר
  english_pob_choice: from the hill country
  chosen_spanish: desde la región montañosa
  alternatives_spanish:
  - desde la serranía
  - desde la montaña
  lexicon: HALOT
  rationale: El artículo y el paralelismo con la expresión anterior indican la misma zona elevada. «Desde la región montañosa» conserva el sentido colectivo y evita el singular literal que sonaría artificial en español.
- source_word: וְהוּא לִפְנֵיהֶם
  english_pob_choice: and he was before them
  chosen_spanish: y él iba delante de ellos
  alternatives_spanish:
  - y él estaba delante de ellos
  - y él iba al frente de ellos
  lexicon: HALOT
  rationale: La frase hebrea indica posición anterior y, por contexto, conducción. «Iba delante de ellos» preserva la imagen espacial y deja implícita la función de liderazgo sin sobreinterpretarla.
theological_decisions:
- issue: בְנֵי יִשְׂרָאֵל como colectivo masculino
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel y las hijas de Israel
  rationale: Se mantiene la forma masculina plural porque refleja el texto fuente y su referencia al grupo que desciende con él en la narrativa. En español, «los hijos de Israel» conserva la relación formal con el hebreo sin borrar el rasgo gramatical del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El paquete inglés pasó por una revisión que prefirió mantener la referencia repetida a «hill country» por consistencia interna. En español se sigue esa consistencia con «región montañosa», evitando variar a «colinas» o «montes» para no perder la correspondencia semántica con בְּהַר אֶפְרָיִם y מִן הָהָר.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras equivalencias de máscara porque este versículo no contiene el nombre divino.
  - Se conservó «hijos de Israel» en lugar de «israelitas» para mantener la huella formal del hebreo, como hace el POB inglés.
  - «Shofar» se dejó sin traducir por ser un término bíblico específico ampliamente reconocible en contextos de traducción transparente.
