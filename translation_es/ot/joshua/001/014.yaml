revisions:
- from: Vuestras mujeres[a], vuestros pequeños y vuestro ganado habitarán en la tierra que Moisés os dio al otro lado del Jordán. Pero vosotros pasaréis armados[b] delante de vuestros hermanos, todos los valientes guerreros, y los ayudaréis.
  to: Sus esposas, sus pequeños y su ganado se quedarán en la tierra que Moisés les dio al otro lado del Jordán. Pero ustedes pasarán armados[a] delante de sus hermanos[b], todos los valientes guerreros, y los ayudarán.
  rationale: Se corrigió la nota mal anclada moviendo la alternativa representativa a 'hermanos' y se ordenaron las notas según su aparición en el texto. También se ajustó el español hacia un registro más neutro latinoamericano ('sus/les/ustedes') y se cambió 'habitarán' por 'se quedarán' para reflejar mejor el contraste contextual con 'pasarán'. 'Esposas' hace más explícito el sentido contextual de נְשֵׁיכֶם y suena natural en español actual.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:51:59Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: mujeres/esposas, pequeños, ganado, permanencia en la tierra dada por Moisés, cruce delante de los hermanos, condición militar, ayuda posterior. Sin embargo, hay un problema claro de alineación documental en las notas: la nota [a] está anclada en ''mujeres'' pero su contenido trata de ''hermanos'', siguiendo mal el rastro del inglés. Además, ''habitarán'' es aceptable para יֵשְׁבוּ, pero ''se quedarán'' o ''permanecerán'' reproduce mejor el contraste con ''vosotros pasaréis''.'
  spanish_quality_summary: El español es claro y legible, pero mezcla registro peninsular ('vuestras', 'os') con una meta declarada de español neutro latinoamericano/broadly church-readable. Eso no exige rechazo, pero sí conviene suavizarlo. También la nota mal anclada crea confusión de lectura. 'Todos los valientes guerreros' es natural, aunque pierde algo del matiz de 'todos los hombres valientes/de guerra'; aun así es defendible.
  glossary_alignment: No hay términos del glosario maestro en disputa aquí. La decisión sobre אֲחֵיכֶם como 'hermanos' está bien preservada en el texto principal. La nota alternativa debe ir anclada en 'hermanos', no en 'mujeres'. La decisión sobre חֲמֻשִׁים como 'armados' también está bien y la nota alternativa es adecuada.
  issues:
  - severity: high
    issue: La nota [a] está anclada en 'mujeres' pero explica 'hermanos'.
    rationale: Esto falsea la relación entre texto y nota y no cumple la disciplina requerida de anclar cada nota exactamente en la palabra o frase pertinente.
  - severity: medium
    issue: '''Habitarán'' comunica residencia, pero no el matiz contrastivo de quedarse mientras otros cruzan.'
    rationale: יֵשְׁבוּ en este contexto contrasta con תעברו; 'se quedarán' o 'permanecerán' refleja mejor la permanencia frente al avance militar.
  - severity: medium
    issue: Registro pronominal peninsular ('vuestras', 'os') menos neutro para el objetivo latinoamericano amplio.
    rationale: El proyecto pide español neutral latinoamericano/broadly church-readable. Un ajuste a 'sus/ustedes/les' mejora alcance sin pérdida semántica.
  revised_spanish_text: Sus esposas, sus pequeños y su ganado se quedarán en la tierra que Moisés les dio al otro lado del Jordán. Pero ustedes pasarán armados[a] delante de sus hermanos[b], todos los valientes guerreros, y los ayudarán.
  revised_footnotes:
