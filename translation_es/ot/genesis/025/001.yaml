  rationale: La fuente hebrea indica adición/repetición. «Otra esposa» comunica esa fuerza de manera idiomática en español sin exagerar ni diluir el matiz lexical.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source-text plain sense.'
