base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/021/006.yaml
  text: David answered the priest and said to him[a], “Indeed, women have been kept from us as yesterday and the day before, when I went out, and the young men’s vessels are holy, though it is an ordinary journey[d][c][b]. How much more today will it be holy in the vessel.”
  footnotes:
  - marker: a
    text: Or “a woman has been withheld from us,” or “we have kept ourselves from women.” The Hebrew expression refers to sexual abstinence in preparation for handling holy things.
    reason: lexical_alternative
  - marker: b
    text: Literally “as yesterday, three days ago,” a Hebrew idiom referring to prior days; some take it more specifically as “for about three days.”
    reason: lexical_alternative
  - marker: c
    text: “Vessels” may refer to the young men’s equipment; some understand it euphemistically of their bodies/persons.
    reason: lexical_alternative
  - marker: d
    text: The Hebrew of the last clause is difficult. It may also be understood, “although the journey is ordinary, today it will be holy in respect to the vessel/gear,” or similarly.
    reason: alternative_reading
