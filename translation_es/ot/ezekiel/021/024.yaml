translation:
  language: es
  text: Y tú, hijo de hombre, pon para ti dos caminos para que venga la espada del rey de Babilonia; ambos saldrán de una sola tierra. Y haz una señal[a]; hazla en la cabeza del camino hacia la ciudad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "mano" aquí probablemente significa un marcador o señal direccional.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "hazla al comienzo del camino hacia la ciudad"; la frase hebrea puede referirse a la cabeza del camino o a su cruce principal.'
    reason: alternative_reading
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - hijo de hombre mortal
  - ser humano
  lexicon: HALOT
  rationale: Conserva la fórmula profética de vocación y el valor idiomático del hebreo sin sustituirla por una paráfrasis interpretativa. En español bíblico, 'hijo de hombre' es la forma más fiel y reconocible para esta dirección divina a Ezequiel.
- source_word: שִׂים לְךָ
  english_pob_choice: set for yourself
  chosen_spanish: pon para ti
  alternatives_spanish:
  - dispón para ti
  - señálate
  lexicon: HALOT
  rationale: El imperativo pide que Ezequiel coloque o establezca algo de manera simbólica. 'Pon para ti' conserva la acción directa y el matiz reflexivo sin recargarlo con interpretación.
- source_word: שְׁנַיִם דְּרָכִים
  english_pob_choice: two roads
  chosen_spanish: dos caminos
  alternatives_spanish:
  - dos rutas
  - dos sendas
  lexicon: HALOT
  rationale: '''Camino'' cubre bien el valor de דֶּרֶךְ en español y suena natural en un acto simbólico. ''Rutas'' o ''sendas'' son posibles, pero ''caminos'' mantiene mejor la amplitud semántica del hebreo.'
- source_word: לָבוֹא חֶרֶב מֶלֶךְ בָּבֶל
  english_pob_choice: for the sword of the king of Babylon to come by
  chosen_spanish: para que venga la espada del rey de Babilonia
  alternatives_spanish:
  - para que llegue la espada del rey de Babilonia
  - para que pase la espada del rey de Babilonia
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de 'espada' como metonimia del ataque del rey de Babilonia. 'Venga' comunica el movimiento requerido por el contexto de los caminos sin forzar una explicación más explícita que el hebreo.
- source_word: מֵאֶרֶץ אֶחָד
  english_pob_choice: from one land
  chosen_spanish: de una misma tierra
  alternatives_spanish:
  - de una sola tierra
  - de una tierra
  lexicon: HALOT
  rationale: El hebreo subraya un único punto de origen. 'De una misma tierra' expresa con claridad que ambas vías proceden del mismo lugar, y evita una posible lectura demasiado genérica.
- source_word: יֵצְאוּ שְׁנֵיהֶם
  english_pob_choice: both of them shall go out
  chosen_spanish: ambas saldrán
  alternatives_spanish:
  - las dos saldrán
  - ambos saldrán
  lexicon: HALOT
  rationale: Como en español 'camino' es masculino, la referencia natural al par de caminos exige concordancia femenina con 'ambas'. Se mantiene la idea de dos salidas que proceden del mismo origen.
- source_word: יָד
  english_pob_choice: signpost
  chosen_spanish: señal
  alternatives_spanish:
  - señal indicadora
  - poste señalador
  - marca
  lexicon: HALOT
  rationale: Aunque literalmente significa 'mano', aquí el contexto pide un marcador direccional. 'Señal' conserva la función indicativa de forma sobria y más natural en español; 'señal indicadora' sería más explícita, pero más pesada.
- source_word: בָּרֵא
  english_pob_choice: make
  chosen_spanish: haz
  alternatives_spanish:
  - fabrica
  - prepara
  - forma
  lexicon: HALOT
  rationale: La forma imperativa rara en este contexto pide una traducción amplia. 'Haz' sigue la decisión inglesa de no sobredeterminar el modo material de fabricación y permite que el lector entienda la acción simbólica.
- source_word: בְּרֹאשׁ דֶּרֶךְ
  english_pob_choice: at the head of the road
  chosen_spanish: en la cabeza del camino
  alternatives_spanish:
  - al comienzo del camino
  - en el inicio del camino
  - en el cruce del camino
  lexicon: HALOT
  rationale: Se conserva la imagen espacial de 'cabeza' del hebreo, porque el texto no especifica explícitamente 'cruce'. 'En la cabeza del camino' es fiel y comprensible en un registro bíblico moderno.
- source_word: עִיר
  english_pob_choice: to the city
  chosen_spanish: hacia la ciudad
  alternatives_spanish:
  - a la ciudad
  - para la ciudad
  lexicon: HALOT
  rationale: El movimiento direccional del contexto se expresa mejor con 'hacia'. Aunque el hebreo no lleva artículo, el sentido del itinerario apunta a una ciudad concreta en la escena simbólica, por eso no se deja meramente como 'a una ciudad'.
theological_decisions:
- issue: 'Naturaleza del acto profético: señal/índice direccional frente a objeto literal'
  english_pob_reading: Hebrew 'hand' here likely means a marker or signpost indicating direction.
  chosen_spanish_reading: '''señal'' como marcador direccional simbólico'
  alternative_spanish_readings:
  - '''mano'' literal'
  - '''poste'' o ''señalador'''
  rationale: 'La elección sigue la lectura contextual del hebreo en el acto profético: no se trata de una ''mano'' anatómica, sino de un signo que guía caminos. ''Señal'' mantiene la tensión entre literalidad y función simbólica sin introducir materialidad no atestiguada.'
  doctrine_reference: Interpretación literaria del signo profético en Ezequiel 21:24; no introduce doctrina adicional.
- issue: Correspondencia del plural hebreo con el sustantivo español 'camino'
  english_pob_reading: both of them shall go out from one land
  chosen_spanish_reading: '''ambas saldrán'''
  alternative_spanish_readings:
  - '''ambos saldrán'''
  - '''las dos saldrán'''
  rationale: El hebreo trata a los dos elementos como par dual/plural. En español, como 'caminos' es masculino pero el referente inmediato es la idea de vías, se privilegia una concordancia femenina con 'ambas' para evitar ambigüedad y conservar la referencia a los dos caminos.
  doctrine_reference: Claridad gramatical y fidelidad al referente del texto; sin implicación doctrinal.
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de alta concordancia del audit trail en English POB y no se introdujeron cambios sustantivos de sentido. La principal adaptación al español fue resolver la concordancia de 'ambas' con el referente dual y conservar la imagen de 'señal' para יָד sin perder la función direccional indicada por la nota inglesa.
  spanish_consistency_notes:
  - Se mantiene 'Babilonia' para בָּבֶל y 'hijo de hombre' para la fórmula profética.
  - Se conserva 'espada' como imagen literal de juicio militar, sin explicitar 'ejército' para no sobretraducir.
  - '''Camino'' se usa de forma consistente para דֶּרֶךְ, evitando alternar con ''ruta'' o ''senda'' dentro del mismo versículo.'
  - La traducción evita 'SEÑOR' u otras sustituciones no requeridas, pues aquí no aparece el Tetragrámaton.
  - La nota del marcador direccional se conserva como decisión lexical y no como reinterpretación doctrinal.
