id: 1TI.4.8
reference: 1 Timothy 4:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἡ γὰρ σωματικὴ γυμνασία πρὸς ὀλίγον ἐστὶν ὠφέλιμος, ἡ δὲ εὐσέβεια πρὸς πάντα ὠφέλιμός ἐστιν, ἐπαγγελίαν ἔχουσα ζωῆς τῆς νῦν καὶ τῆς μελλούσης.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/004/008.yaml
  text: For bodily training is beneficial for a little while[a], but godliness is beneficial for all things[c][b], since it holds promise for the present life and the coming one.
  footnotes:
  - marker: a
    text: Or 'physical training' or 'bodily exercise.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for a little' or 'to a small extent'; the Greek may indicate limited duration or limited extent.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'having promise of the life now and of the coming [life].'
    reason: lexical_alternative
translation:
  language: ko
  text: 몸의 훈련[a]은 약간[b]의 유익이 있을 뿐이지만, 경건은 모든 일에 유익합니다. 이는 경건이 지금의 삶과 장차 올 삶에 대한 약속을 지니고 있기 때문입니다[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「육체적 훈련」 「신체 단련」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「잠시」 「조금」. 헬라어 πρὸς ὀλίγον은 기간이나 정도의 제한 모두를 가리킬 수 있다.
    reason: lexical_alternative
  - marker: c
    text: 직역하면 「지금의 생명과 장차 올 [생명]의 약속을 가진」.
    reason: lexical_alternative
lexical_decisions:
- source_word: σωματικὴ γυμνασία
  english_pob_choice: bodily training
  chosen_korean: 몸의 훈련
  alternatives_korean:
  - 육체 단련
  - 신체 훈련
  lexicon: BDAG
  rationale: 7절 γυμνάζω의 「훈련」과 어휘 연결을 위해 「훈련」 유지.
- source_word: πρὸς ὀλίγον
  english_pob_choice: for a little while
  chosen_korean: 약간의 유익이 있을 뿐
  alternatives_korean:
  - 잠시 유익할 뿐
  - 조금 유익이 있으나
  lexicon: BDAG
  rationale: 기간/정도 모호함을 「약간」으로 절제.
- source_word: εὐσέβεια
  english_pob_choice: godliness
  chosen_korean: 경건
  alternatives_korean: []
  lexicon: BDAG
  rationale: 본 번역 표준.
- source_word: ἐπαγγελίαν ἔχουσα ζωῆς τῆς νῦν καὶ τῆς μελλούσης
  english_pob_choice: holds promise for the present life and the coming one
  chosen_korean: 지금의 삶과 장차 올 삶에 대한 약속을 지니고 있기 때문
  alternatives_korean:
  - 현생과 내생의 약속을 지니고 있으니
  - 현세와 내세의 생명에 대한 약속을 가졌으니
  lexicon: BDAG
  rationale: 「현세/내세」보다 한국어로 자연스러운 「지금의 삶/장차 올 삶」.
