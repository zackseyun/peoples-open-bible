  glossary_alignment: No hay conflicto con la terminología base del proyecto. צדק se ha vertido como «lo recto», dentro del campo semántico permitido por la auditoría inglesa. אמת como «verdad» y בִּלְבָבוֹ como «en su corazón» están bien alineados. La principal mejora necesaria es estilística-lexical para תמים en español.
