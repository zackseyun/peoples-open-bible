  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: ven el gran número de fuerzas, temen mucho, muchos huyen del campamento y solo quedan ochocientos hombres. Sin embargo, el marcador de nota al pie en «fuerzas[a]» está mal anclado: la nota trata sobre ἐξερρύησαν («huyeron / se escabulleron»), no sobre τὸ πλῆθος τῶν δυνάμεων. Además, la nota misma ofrece como alternativa exactamente la misma traducción ya usada en el texto, por lo que no preserva correctamente la alternativa léxica documentada.'
  spanish_quality_summary: El español es claro y natural, con tono digno y legible. «Tuvieron mucho miedo» y «huyeron del campamento» funcionan bien. «La multitud de las fuerzas» es algo rígido, pero aceptable por fidelidad al plural militar griego y a la decisión documentada del POB. La reparación necesaria es principalmente de nota al pie y su contenido.
  glossary_alignment: No hay términos teológicos del glosario principal en juego. La decisión militar «fuerzas» / «campamento» está alineada con el expediente inglés. La alternativa léxica para ἐξερρύησαν debe expresarse en español como una opción distinta, por ejemplo «se escabulleron del campamento» o «salieron furtivamente del campamento», en lugar de repetir «huyeron del campamento».
  issues:
  - severity: medium
    issue: El marcador de nota al pie está anclado en «fuerzas[a]», pero la nota corresponde al verbo ἐξερρύησαν.
    rationale: La evidencia inglesa y el análisis léxico muestran que la nota es una alternativa sobre el verbo de salida/huida, no sobre «las fuerzas». Un anclaje incorrecto induce a error sobre qué palabra se está aclarando.
  - severity: medium
    issue: El texto de la nota al pie repite la misma traducción principal («huyeron del campamento») en vez de dar una alternativa real.
    rationale: La nota debe preservar la alternativa léxica documentada por el POB. Si el texto principal dice «huyeron», la nota debe ofrecer algo como «se escabulleron del campamento» o «salieron furtivamente del campamento» para reflejar el matiz de ἐξερρύησαν.
  revised_spanish_text: Y vieron la multitud de las fuerzas, que eran muchas, y tuvieron mucho miedo; y muchos huyeron[a] del campamento, y no quedaron de ellos sino ochocientos hombres.
  revised_footnotes:
  - marker: a
    text: 'O: «se escabulleron del campamento». El verbo griego puede sugerir tanto salir sigilosamente como huir fuera.'
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota al verbo pertinente («huyeron») y se reemplaza la supuesta alternativa por una opción realmente distinta que conserva el matiz léxico documentado para ἐξερρύησαν.
