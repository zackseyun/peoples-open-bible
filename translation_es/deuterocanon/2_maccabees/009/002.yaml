    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a la ayuda de las armas»; es decir, recurrieron a la defensa armada.
    reason: lexical_alternative
  revision_rationale: Se revisa para hacer el español más natural y fiel al sentido del griego sin perder el rastro lexical del POB. «Apoderarse de la ciudad» expresa mejor el dominio buscado. «Recurrieron a la defensa armada» comunica con claridad el recurso a las armas y evita un calco confuso. También se aligera la secuencia verbal con «e intentó», manteniendo la anterioridad principal en «había entrado».
