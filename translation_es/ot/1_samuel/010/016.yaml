revisions:
- from: 'Saúl le dijo a su tío[a]: «De veras nos dijo que las burras[b] habían sido halladas. Pero no le dijo nada acerca del asunto de la realeza[c], que Samuel había hablado» .'
  to: 'Saúl le dijo a su tío[a]: «Nos dijo claramente que las burras[b] habían sido halladas». Pero no le dijo nada acerca del asunto de la realeza[c], del que Samuel había hablado.'
  rationale: La revisión corrige un giro poco natural para la intensificación verbal, repara una construcción relativa deficiente en español, y ajusta la puntuación. Se preservan el sentido del hebreo, la decisión auditada sobre «tío», el femenino de «burras» con nota, y la distinción entre «realeza» y «reino».
