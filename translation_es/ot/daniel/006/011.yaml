translation:
  language: es
  text: Y cuando Daniel supo que el documento[a] había sido firmado, fue a su casa. Ahora bien, las ventanas de su aposento alto[b] estaban abiertas hacia Jerusalén, y tres veces al día se arrodillaba[c], oraba y daba gracias delante de su Dios, tal como lo había estado haciendo antes de esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el escrito había sido firmado»; el arameo se refiere al decreto escrito que quedó formalmente promulgado.
    reason: lexical_alternative
  - marker: b
    text: O «frente a Jerusalén».
    reason: lexical_alternative
  - marker: c
    text: La expresión aramea literalmente menciona sus rodillas y describe la postura de oración; aquí el verbo se entiende, por el contexto, como arrodillarse.
    reason: cultural_note
lexical_decisions:
- source_word: רְשִׁים כְּתָבָא
  english_pob_choice: the document had been signed
  chosen_spanish: el documento había sido firmado
  alternatives_spanish:
  - la escritura había sido firmada
  - el decreto había sido registrado
  lexicon: HALOT
  rationale: La expresión aramea apunta a un acto oficial de promulgación/validación de un escrito legal. En español, «documento» comunica con claridad el carácter administrativo del texto; «había sido firmado» conserva el valor jurídico de la decisión sin convertirla en una paráfrasis más interpretativa.
- source_word: עַל לְבַיְתֵהּ
  english_pob_choice: he went to his house
  chosen_spanish: fue a su casa
  alternatives_spanish:
  - entró en su casa
  - vino a su casa
  lexicon: HALOT
  rationale: La frase narra el movimiento de Daniel después de enterarse del decreto. «Fue a su casa» es natural en español y mantiene la acción sin añadir un matiz no exigido por el arameo.
- source_word: כַוִּין פְּתִיחָן
  english_pob_choice: windows ... were open
  chosen_spanish: las ventanas ... estaban abiertas
  alternatives_spanish:
  - las aberturas de la ventana estaban abiertas
  - las celosías estaban abiertas
  lexicon: HALOT
  rationale: «Ventanas» es el equivalente más claro y normal; «estaban abiertas» reproduce el estado descrito por el participio sin insinuar una apertura reciente.
- source_word: עִלִּיתֵהּ
  english_pob_choice: his upper room
  chosen_spanish: su aposento alto
  alternatives_spanish:
  - su cuarto alto
  - su habitación superior
  lexicon: HALOT
  rationale: «Aposento alto» es fiel al referente arquitectónico de una cámara elevada y, en español bíblico, sigue siendo inteligible y sobrio. Conserva mejor el sabor del término que una equivalencia demasiado moderna.
- source_word: נֶגֶד יְרוּשְׁלֶם
  english_pob_choice: toward Jerusalem
  chosen_spanish: hacia Jerusalén
  alternatives_spanish:
  - frente a Jerusalén
  - en dirección a Jerusalén
  lexicon: HALOT
  rationale: La preposición describe orientación espacial y devocional. «Hacia Jerusalén» mantiene esa orientación de modo natural; no se reduce a una fórmula litúrgica más rígida que el hebreo/arameo no exige.
- source_word: בָּרֵךְ עַל בִּרְכֹוהִי
  english_pob_choice: he knelt on his knees
  chosen_spanish: se arrodillaba sobre sus rodillas
  alternatives_spanish:
  - se ponía de rodillas
  - se inclinaba sobre sus rodillas
  lexicon: HALOT
  rationale: La imagen física del original es explícita respecto de la postura. «Se arrodillaba sobre sus rodillas» conserva esa concreción corporal, aunque en español resulte algo enfático; se prefiere para no diluir el gesto en una formulación más genérica.
- source_word: מְצַלֵּא
  english_pob_choice: prayed
  chosen_spanish: oraba
  alternatives_spanish:
  - rezaba
  - oraba continuamente
  lexicon: HALOT
  rationale: El verbo denota la acción de orar en sentido general. «Oraba» es idiomático y reverente en español bíblico sin sobrecargar el texto con una lectura confesional específica.
- source_word: מוֹדֵא
  english_pob_choice: gave thanks
  chosen_spanish: daba gracias
  alternatives_spanish:
  - agradecía
  - confesaba
  lexicon: HALOT
  rationale: En este contexto la acción se entiende mejor como acción de gracias ante Dios. «Daba gracias» preserva la fuerza devocional y evita introducir «confesaba», que sería demasiado estrecho o ambiguo aquí.
- source_word: קֳדָם אֱלָהֵהּ
  english_pob_choice: before his God
  chosen_spanish: delante de su Dios
  alternatives_spanish:
  - ante su Dios
  - en presencia de su Dios
  lexicon: HALOT
  rationale: «Delante de» conserva el matiz relacional y espacial del original, indicando la postura de oración ante Dios. La referencia posesiva «su Dios» sigue el arameo y mantiene la continuidad narrativa.
- source_word: כָּל קֳבֵל דִּי
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - de la misma manera que
  lexicon: HALOT
  rationale: La cláusula compara la conducta presente de Daniel con su práctica anterior. «Tal como» expresa esa continuidad sin volverla causal ni excesivamente explicativa.
- source_word: הֲוָא עָבֵד מִן קַדְמַת דְּנָה
  english_pob_choice: he had been doing before this
  chosen_spanish: había hecho antes de esto
  alternatives_spanish:
  - había venido haciendo antes de esto
  - venía haciendo esto desde antes
  lexicon: HALOT
  rationale: El arameo indica una práctica previa y habitual. «Había hecho antes de esto» comunica esa continuidad de manera breve y natural; aunque no reproduce de forma idéntica la perfrasis inglesa, sí preserva la idea de costumbre anterior.
theological_decisions:
- issue: Postura de oración de Daniel bajo la prohibición real
  english_pob_reading: Rendered descriptively as Daniel continuing his established practice of kneeling, praying, and giving thanks toward Jerusalem.
  chosen_spanish_reading: 'Se presenta de manera descriptiva: Daniel continúa su práctica establecida de arrodillarse, orar y dar gracias hacia Jerusalén.'
  alternative_spanish_readings:
  - Podría enfatizarse como un acto de desafío frontal al rey.
  - Podría parafrasearse como una protesta religiosa abierta.
  rationale: El versículo narra la acción de Daniel sin explicitar que su intención sea protestar. La redacción española conserva esa continuidad piadosa y evita introducir una lectura ideológica que el texto no formula de manera directa.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El pasaje coincide con el texto fuente y con la decisión auditada en inglés; no se identificaron revisiones posteriores que alteraran la elección léxica o teológica, y el control cruzado reporta alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto cuando aparezca el nombre divino, aunque en este versículo solo se usa «Dios».
  - Se conservó el matiz espacial de «delante de» para קֳדָם, sin sustituirlo por una fórmula litúrgica más rígida.
  - La nota sobre la postura corporal evita suavizar la repetición de «rodillas», porque el original la hace explícita.
  - «Aposento alto» preserva un registro bíblico claro, pero no arcaizante en exceso.
