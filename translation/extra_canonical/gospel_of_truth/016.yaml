  consult_excerpt: As for the others, then, may they know, where they’re at, that
    it’s not right 43 for me, having come to the place of rest, to say anything else,
    but I’ll come to be in it, and will devote myself continually to the Father of
    all and the true brothers (and sisters), those upon whom the Father’s love is
    emptied and in whose midst there is no need. They’re the ones who are revealed
    in Truth; they exist in the true eternal life, and they speak of the light that’s
    complete and that’s filled with the Father’s seed, and that’s in his heart and
    in the fullness. His Spirit rejoices in it, and glorifies the one in whom it existed,
    because he’s good. And his children are complete, and worthy of his name, because
    he’s the Father. It’s children like this that he loves.
translation:
  text: 'As for the others, may they recognize where they stand. But as for me—having
    come to the Place of Rest—it is proper not to add anything further; rather, I
    will come to be in it, and I will devote myself without ceasing to the Father
    of the All and to the true siblings: those upon whom the love of the Father has
    been poured, and in whose midst there is no deficiency.


    These are the ones revealed in the Truth; they exist in the true life, and they
    speak of the Light that is complete and filled with the Father’s seed, that is
    in his heart and in the Fullness. His Spirit rejoices in it and glorifies the
    one in whom it existed, because he is good. And his children are complete and
    worthy of his name, for he is the Father; such are the children whom he loves.


    [… large lacuna in the manuscript …]


    Yet there are some whose thoughts are upon toil: they become drunk in seeking,
    and they lose their mind. But the holy ones are those whose thought has not been
    defiled by wickedness; their thought remains within them. For the Logos of the
    Thought searches out what is above—his unsayability—I have [borne/spoken] by means
    of the mouth of all: the Good—the Messiah.'
