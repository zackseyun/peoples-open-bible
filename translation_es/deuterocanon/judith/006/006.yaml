translation:
  language: es
  text: y entonces el hierro de mi ejército y el pueblo de mis siervos atravesarán tus costados[a][b], y caerás entre sus heridos[c] cuando vuelvan;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El hierro» probablemente funciona como metonimia de armas o fuerza armada; también podría interpretarse más explícitamente como «las espadas de mi ejército».
    reason: lexical_alternative
  - marker: b
    text: «Tus costados» también podría entenderse como «tus flancos» o «tus costillas», según si el destinatario se percibe de modo más corporativo o más personal.
    reason: lexical_alternative
  - marker: c
    text: La frase griega es vívida pero comprimida en «caerás entre sus heridos»; probablemente significa que el destinatario será contado entre los heridos causados por las fuerzas de Holofernes.
    reason: lexical_alternative
lexical_decisions:
- source_word: διελεύσεται
  english_pob_choice: will pass through
  chosen_spanish: atravesará
  alternatives_spanish:
  - pasará por
  - cruzará
  lexicon: LSJ
  rationale: En este contexto bélico, el verbo debe conservar la idea de movimiento penetrante y devastador; «atravesará» comunica mejor el golpe violento que un simple «pasará».
- source_word: ὁ σίδηρος
  english_pob_choice: the iron
  chosen_spanish: el hierro
  alternatives_spanish:
  - las armas
  - la espada
  lexicon: LSJ
  rationale: Se conserva la metáfora concreta del griego. «El hierro» mantiene la metonimia de armamento/violencia sin especificar un arma que el texto no nombra.
- source_word: τῆς στρατείας μου
  english_pob_choice: of my army
  chosen_spanish: de mi ejército
  alternatives_spanish:
  - de mi campaña
  - de mi fuerza
  lexicon: LSJ
  rationale: Aquí στρατεία designa la fuerza militar; «ejército» es el equivalente más natural y claro en español.
- source_word: ὁ λαὸς τῶν θεραπόντων μου
  english_pob_choice: the people of my servants
  chosen_spanish: el pueblo de mis siervos
  alternatives_spanish:
  - la gente de mis servidores
  - la tropa de mis siervos
  lexicon: LSJ
  rationale: Se mantiene λαός como «pueblo» y θεράποντες como «siervos», que en español conservan la relación de pertenencia y servicio sin reducirlo a un término militar no explícito en el griego.
- source_word: τὰς πλευράς σου
  english_pob_choice: your sides
  chosen_spanish: tus costados
  alternatives_spanish:
  - tus flancos
  - tus costillas
  lexicon: LSJ
  rationale: «Costados» reproduce bien πλευρά como lado/costado y funciona en español bíblico sin sonar tan físico o anatómico como «costillas».
- source_word: πεσῇ
  english_pob_choice: you will fall
  chosen_spanish: caerás
  alternatives_spanish:
  - serás derribado
  - caerás abatido
  lexicon: LSJ
  rationale: «Caerás» conserva la imagen de derrota o muerte sin añadir una interpretación más explícita de la que exige el texto.
- source_word: ἐν τοῖς τραυματίαις αὐτῶν
  english_pob_choice: among their wounded
  chosen_spanish: entre sus heridos
  alternatives_spanish:
  - entre los heridos de ellos
  - entre sus caídos heridos
  lexicon: LSJ
  rationale: «Heridos» es el equivalente directo de τραυματίαις. «Entre» refleja la inclusión dentro del grupo, como en el inglés POB, sin forzar una precisión adicional sobre la causa.
- source_word: ὅταν ἐπιστρέψωσιν
  english_pob_choice: when they return
  chosen_spanish: cuando vuelvan
  alternatives_spanish:
  - cuando regresen
  - cuando vuelvan atrás
  lexicon: LSJ
  rationale: ὅταν + subjuntivo expresa futuro indefinido; «cuando vuelvan» es idiomático y natural en español para el contexto militar.
theological_decisions:
- issue: El sentido de «el hierro» como metonimia bélica
  english_pob_reading: The iron likely uses 'iron' as a metonym for weaponry or armed force; alternatively, it could be rendered more interpretively as 'the swords of my army.'
  chosen_spanish_reading: «El hierro» se mantiene como metonimia de armamento o violencia militar.
  alternative_spanish_readings:
  - «las espadas de mi ejército»
  - «las armas de mi ejército»
  rationale: No hay base suficiente para sustituir la imagen concreta por un arma específica. Mantener la metonimia respeta la tensión lexical documentada por el POB inglés.
  doctrine_reference: No aplica; decisión léxica de imaginería bélica.
- issue: Alcance de «tus costados»
  english_pob_reading: The phrase 'your sides' could also be rendered 'your flanks' or 'your ribs,' depending on whether the addressee is heard more corporately or more personally.
  chosen_spanish_reading: «Tus costados» mantiene la ambigüedad entre referencia corporal y militar/corporativa.
  alternative_spanish_readings:
  - «tus flancos»
  - «tus costillas»
  rationale: «Costados» es suficientemente amplio para no cerrar la imagen a una sola lectura. Conserva el posible doble sentido sin sobreinterpretar.
  doctrine_reference: No aplica; decisión semántica del cuerpo/ciudad personificada.
- issue: «Entre sus heridos» y la identidad del grupo
  english_pob_reading: The Greek text is vivid but somewhat compressed in 'you will fall among their wounded'; this likely means the addressee will be counted among those wounded by Holofernes' forces.
  chosen_spanish_reading: «Caerás entre sus heridos» conserva la formulación comprimida y el tono vívido.
  alternative_spanish_readings:
  - «serás contado entre sus heridos»
  - «caerás entre los heridos que ellos causen»
  rationale: El español puede reproducir la compresión sin explicitar en exceso quién hiere a quién. Así se preserva la fuerza imagética del original.
  doctrine_reference: No aplica; decisión de claridad narrativa.
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa al conservar «servants/siervos» como equivalente más directo de θεραπόντων y mantiene la puntuación final con punto y coma. También preserva la tensión léxica documentada en «el hierro», «tus costados» y «caerás entre sus heridos» sin volverla más explícita de lo que permite el griego.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al tetragrámaton; aquí no aparece.
  - Se mantiene «siervos» para θεράποντων en continuidad con la revisión inglesa reciente y para evitar una paráfrasis como «servidores» o «asistentes».
  - Se conserva el estilo bíblico formal pero natural, con verbos en futuro para reflejar el valor resultativo de la secuencia griega.
