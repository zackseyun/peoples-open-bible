revisions:
- from: Y si alguien muere de repente junto a él[a], y profana su cabeza consagrada, entonces se rapará la cabeza en el día de su purificación[b]; al séptimo día se la rapará.
  to: Y si alguien muere de repente junto a él[a], y contamina ritualmente su cabeza consagrada, entonces se rapará la cabeza el día de su purificación; el séptimo día se la rapará.
  rationale: Se corrige el principal desajuste documental moviendo la nota al segmento sobre la muerte repentina y combinando en ella la alternativa literal sobre la «cabeza de su consagración» con la explicación del modismo hebreo, ya que ambas observaciones pertenecen a ese tramo y solo una nota es necesaria en español para evitar sobrecarga. Se sustituye «profana» por «contamina ritualmente» para reflejar mejor טמא en contexto de impureza por muerte. También se mejora la naturalidad de la frase temporal a «el séptimo día».
  reviewer_model: gpt-5.4
