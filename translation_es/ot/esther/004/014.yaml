review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: la condición inicial, la ayuda que vendrá de otra parte, la amenaza para Ester y su casa paterna, y la pregunta retórica final con providencia implícita. Sin embargo, se aparta de la decisión léxica auditada en un punto importante: לַמַּלְכוּת se entiende mejor aquí como acceso a la condición/oficio real, no como «al reino». También hay un desajuste de nota: la nota [a] está anclada a «este tiempo», pero explica la frase final «para un tiempo como este».'
  spanish_quality_summary: El español es claro y digno, pero conviene pulirlo para mayor naturalidad y fidelidad. «En este tiempo» suena menos idiomático que «en este momento» o «en esta hora», pero no es un error. Más importante, «has llegado al reino» resulta menos preciso y más espacial que el hebreo en contexto; «has llegado a la realeza» o «has alcanzado la realeza» comunica mejor el sentido. La puntuación funciona, aunque la coma tras la cláusula condicional mejora la lectura.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. «judíos», «liberación» y la preservación de la providencia implícita están bien encaminadas. El problema principal es léxico-contextual: מַלְכוּת aquí no debe aplanarse a «reino» cuando el expediente inglés documenta «royalty» como estatus/cargo real.'
  issues:
  - severity: high
    issue: «al reino» para לַמַּלְכוּת
    rationale: En Ester 4:14 el sentido es que Ester ha llegado a la posición/condición real, no al territorio o reino. El rastro auditado inglés justificó «royalty» precisamente para evitar esa lectura espacial o geopolítica. En español, «al reino» desvía el sentido.
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado
    rationale: 'La nota [a] aparece en «este tiempo[a]», pero su contenido («O, más tradicionalmente: “para un tiempo como este”») corresponde a la frase final. Esto crea una referencia engañosa y debe corregirse.'
  - severity: medium
    issue: La nota [b] defiende una opción menos fiel que la principal auditada
    rationale: La nota presenta «al reino» como si conservara mejor la amplitud del hebreo, pero el expediente inglés ya razonó que aquí el referente es el oficio/estatus real. La nota debe eliminarse o invertirse a favor de «realeza».
  - severity: low
    issue: Falta una coma después de la cláusula inicial
    rationale: «Porque si callas..., alivio...» se lee mejor con coma tras la prótasis condicional, en consonancia con la sintaxis española.
