id: 2TI.2.18
reference: 2 Timothy 2:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἵτινες περὶ τὴν ἀλήθειαν ἠστόχησαν, ⸀λέγοντες ἀνάστασιν ἤδη γεγονέναι, καὶ ἀνατρέπουσιν τήν τινων πίστιν.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/018.yaml
  text: who have gone astray from the truth, saying that the resurrection has already happened, and are upsetting the faith of some.
translation:
  language: ko
  text: 그들은 진리에서 벗어나, 부활이 이미 일어났다고 말하면서[a] 어떤 이들의 믿음을 뒤흔들고 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 그들이 미래의 부활이 이미 과거에 일어났다고 주장하고 있었다는 뜻이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ τὴν ἀλήθειαν ἠστόχησαν
  english_pob_choice: have gone astray from the truth
  chosen_korean: 진리에서 벗어나
  alternatives_korean:
  - 진리를 빗나갔습니다
  - 진리에 대하여 과녁을 빗나갔습니다
  lexicon: BDAG
  rationale: ἀστοχέω는 「과녁을 빗나가다」를 본의로 한다. 「벗어나다」가 한국어로 자연스럽고 본문 흐름에 맞다.
- source_word: ἀνάστασιν ἤδη γεγονέναι
  english_pob_choice: the resurrection has already happened
  chosen_korean: 부활이 이미 일어났다고
  alternatives_korean:
  - 부활이 벌써 있었다고
  - 부활이 이미 이루어졌다고
  lexicon: BDAG
  rationale: γίνομαι의 완료 부정사 γεγονέναι는 과거의 발생을 가리킨다. 「이미 일어났다」가 본문의 주장(미래 부활을 과거화)을 분명히 드러낸다.
- source_word: ἀνατρέπουσιν τήν τινων πίστιν
  english_pob_choice: are upsetting the faith of some
  chosen_korean: 어떤 이들의 믿음을 뒤흔들고 있습니다
  alternatives_korean:
  - 일부의 믿음을 무너뜨리고 있습니다
  - 어떤 이들의 신앙을 흔들어 놓고 있습니다
  lexicon: BDAG
  rationale: ἀνατρέπω는 「뒤집어 엎다」를 본의로 한다. 「뒤흔들다」가 진행되는 파괴의 강도를 자연스럽게 담는다.
