translation:
  language: es
  text: Como un pastor busca a su rebaño en el día en que está en medio de sus ovejas cuando estas han sido dispersadas[a], así buscaré a mis ovejas, y las rescataré de todos los lugares donde se dispersaron, en un día de nubes y espesa oscuridad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘examina/cuida de’; el verbo hebreo lleva la idea de una supervisión atenta además de buscar.
    reason: lexical_alternative
  - marker: b
    text: O ‘en el día de nube y espesa oscuridad’.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּבַקָּרַת
  english_pob_choice: As a shepherd seeks out
  chosen_spanish: Como el pastor busca
  alternatives_spanish:
  - Como la inspección de un pastor
  - Como el cuidado atento de un pastor
  - Como la visita de un pastor
  lexicon: HALOT
  rationale: El hebreo usa una forma nominal con כְּ que introduce comparación, pero en contexto se une al verbo siguiente de la misma raíz. En español, "busca" comunica mejor la acción pastoral concreta que una nominalización abstracta, y mantiene la relación con el verbo posterior.
- source_word: רֹעֶה
  english_pob_choice: a shepherd
  chosen_spanish: el pastor
  alternatives_spanish:
  - uno que pastorea
  - el que apacienta
  lexicon: HALOT
  rationale: Es el equivalente natural y claro para el participio sustantivado. Conserva la imagen pastoral sin oscurecerla con una paráfrasis.
- source_word: עֶדְרוֹ
  english_pob_choice: his flock
  chosen_spanish: su rebaño
  alternatives_spanish:
  - su hato
  - su grey
  lexicon: HALOT
  rationale: Con רֹעֶה y צֹאן, el campo semántico apunta al rebaño de ovejas. "Rebaño" comunica bien la unidad del grupo y resulta más natural que "grey" en español moderno.
- source_word: בְּיוֹם הֱיוֹתוֹ בְתוֹךְ צֹאנוֹ
  english_pob_choice: on the day he is among his sheep
  chosen_spanish: en el día en que está en medio de sus ovejas
  alternatives_spanish:
  - cuando está entre sus ovejas
  - en el día de su estar en medio de sus ovejas
  lexicon: HALOT
  rationale: Se conserva la construcción temporal e idiomática de presencia en medio del rebaño, en español natural. "En medio de" refleja היטב la idea de estar entre ellas.
- source_word: נִפְרָשׁוֹת
  english_pob_choice: when they have been scattered
  chosen_spanish: dispersas
  alternatives_spanish:
  - esparcidas
  - dispersadas
  lexicon: HALOT
  rationale: El participio niphal describe el estado del rebaño ya dispersado. "Dispersas" es idiomático y mantiene el paralelo temático con נָפֹצוּ más adelante.
- source_word: כֵּן אֲבַקֵּר
  english_pob_choice: so I will seek out
  chosen_spanish: así buscaré yo
  alternatives_spanish:
  - así cuidaré de
  - así inspeccionaré
  lexicon: HALOT
  rationale: Se mantiene la misma raíz conceptual de ביקר aplicada a la acción divina. "Buscaré" preserva la idea de salir al encuentro para encontrar y atender, sin convertirla en una inspección fría.
- source_word: צֹאנִי
  english_pob_choice: my sheep
  chosen_spanish: mis ovejas
  alternatives_spanish:
  - mi rebaño
  - mis corderos
  lexicon: HALOT
  rationale: '"Ovejas" conserva el concreto de צֹאן en este contexto y evita una abstracción colectiva que diluya la imagen individual y pastoral.'
- source_word: וְהִצַּלְתִּי
  english_pob_choice: and I will rescue
  chosen_spanish: y las rescataré
  alternatives_spanish:
  - y las libraré
  - y las salvaré
  lexicon: HALOT
  rationale: '"Rescatar" expresa היטב la idea de sacar a alguien del peligro o de un sitio del que no puede salir por sí mismo, adecuada al contexto de ovejas esparcidas.'
- source_word: מִכָּל הַמְּקוֹמוֹת
  english_pob_choice: from all the places
  chosen_spanish: de todos los lugares
  alternatives_spanish:
  - de todos los sitios
  - de cada lugar
  lexicon: HALOT
  rationale: Es una equivalencia directa y natural en español, manteniendo el plural distributivo del hebreo.
- source_word: אֲשֶׁר נָפֹצוּ שָׁם
  english_pob_choice: where they were scattered
  chosen_spanish: donde fueron dispersadas
  alternatives_spanish:
  - donde habían sido esparcidas
  - a donde fueron dispersadas
  lexicon: HALOT
  rationale: '"Dispersadas" conserva el valor del verbo נפץ y mantiene el referente femenino plural de las ovejas. Se evita una traducción demasiado libre.'
- source_word: בְּיוֹם עָנָן וַעֲרָפֶל
  english_pob_choice: on a day of clouds and thick darkness
  chosen_spanish: en un día de nubes y espesa oscuridad
  alternatives_spanish:
  - en un día de nube y tiniebla
  - en un día de nubes y densa oscuridad
  lexicon: HALOT
  rationale: Se preserva el paralelismo hebreo con una expresión plenamente inteligible en español. "Espesa oscuridad" refleja bien עֲרָפֶל sin suavizar su peso semántico.
theological_decisions:
- issue: Imagen de Dios como pastor que busca y rescata personalmente a su pueblo
  english_pob_reading: Retain the metaphor of God personally seeking and rescuing his sheep without importing later christological interpretation into the translation.
  chosen_spanish_reading: Mantener la metáfora de Yahvé como pastor que busca y rescata personalmente a sus ovejas, sin introducir en la traducción una lectura cristológica posterior.
  alternative_spanish_readings:
  - Introducir una formulación más interpretativa que aluda al Mesías
  - Suavizar la imagen pastoral hacia una descripción general del cuidado divino
  rationale: El contexto inmediato habla de Yahvé actuando como pastor. La traducción debe conservar esa tensión teológica y dejar las conexiones canónicas para la interpretación, no para el texto mismo.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: El texto inglés POB ya pasó una revisión reciente sin cambios sustanciales; la versión española sigue de cerca ese consenso y conserva sus dos notas léxicas principales, adaptándolas al español.
  spanish_consistency_notes:
  - Se usa "Yahvé" para el nombre divino según la norma del proyecto.
  - Se mantiene el tono pastoral y directo, evitando calcos innecesarios.
  - Se preserva el paralelismo entre "buscar" y "rescatar" como en el audit trail inglés.
  - Las notas a y b se anclan en los segmentos donde aparece la tensión léxica correspondiente.
