translation:
  language: es
  text: El justo jamás será sacudido[a], pero los malvados no habitarán la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra entera» o «el mundo». El hebreo אֶרֶץ puede referirse a una tierra concreta o a la tierra en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el justo como clase
  - una persona justa
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado para designar al justo en sentido genérico. En español, "el justo" es natural, conciso y conserva ese valor representativo sin añadir género o especificación innecesarios.
- source_word: לְעוֹלָם
  english_pob_choice: never
  chosen_spanish: jamás
  alternatives_spanish:
  - nunca
  - para siempre
  lexicon: HALOT
  rationale: En combinación con la negación y el verbo de estabilidad, expresa una negación duradera o permanente. "Jamás" transmite bien esa fuerza enfática en español y evita el literalismo de "para siempre".
- source_word: בַּל
  english_pob_choice: never
  chosen_spanish: jamás
  alternatives_spanish:
  - 'no'
  - ciertamente no
  lexicon: HALOT
  rationale: Como partícula poética de negación reforzada, se integra naturalmente con לְעוֹלָם en una negación intensiva. "Jamás" recoge esa doble fuerza negativa mejor que un simple "no".
- source_word: יִמּוֹט
  english_pob_choice: be shaken
  chosen_spanish: será sacudido
  alternatives_spanish:
  - será movido
  - vacilará
  - será derribado
  lexicon: HALOT
  rationale: El nifal de מוט expresa ser movido o quedar inestable. "Ser sacudido" conserva la metáfora de inestabilidad de forma clara y natural en español, sin cargar el verso con la idea más fuerte de caída o destrucción.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  lexicon: HALOT
  rationale: El plural adjetival sustantivado refiere a personas moralmente perversas. "Los malvados" es claro y bíblicamente comprensible en español; se evita "impíos" porque puede sonar más eclesiástico que el hebreo directo.
- source_word: יִשְׁכְּנוּ
  english_pob_choice: will not dwell
  chosen_spanish: no habitarán
  alternatives_spanish:
  - no morarán
  - no residirán
  lexicon: HALOT
  rationale: שכן expresa habitar o establecerse. "Habitarán" mantiene la idea de residencia estable y funciona bien en el paralelismo del proverbio.
- source_word: אָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el suelo
  - la tierra prometida
  lexicon: HALOT
  rationale: El término puede significar una tierra concreta o la tierra en sentido más amplio. En español, "la tierra" conserva esa ambigüedad entre territorio y mundo habitado, por lo que se deja abierta la tensión textual sin resolverla demasiado pronto.
theological_decisions:
- issue: Alcance de אָרֶץ en el proverbio
  english_pob_reading: the land, with a footnoted alternative 'the earth'
  chosen_spanish_reading: la tierra, con una nota que deja abierta la posibilidad de 'la tierra' en sentido territorial o cósmico
  alternative_spanish_readings:
  - la tierra en sentido de territorio
  - la tierra en sentido de mundo habitado
  - el país
  rationale: La POB en inglés preserva la tensión entre una lectura territorial y una más amplia. En español, "la tierra" mantiene esa ambigüedad sin forzar una interpretación técnica; la nota explica que el hebreo puede referirse a una tierra concreta o a la tierra en general.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; esta propuesta sigue de cerca el acuerdo alto del texto inglés y mantiene la misma tensión léxica sobre אֶרֶץ, adaptándola de manera natural al español.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo proverbial con una estructura simple y directa: afirmación sobre el justo y contraste con los malvados.'
  - Se usa "la tierra" para אָרֶץ, manteniendo abierta la ambigüedad territorial/cósmica documentada en el audit trail.
  - '"Jamás" se usa dos veces implícitamente en la primera cláusula para reflejar la negación reforzada del hebreo sin sobrecargar el estilo.'
  - '"Ser sacudido" preserva la metáfora de inestabilidad mejor que una traducción interpretativa como "caer" o "ser destruido".'
