    issue: 'Nombre propio final no estándar: «Sedequías»'
    rationale: Aunque comprensible, «Sedequías» es menos asentado en español bíblico que «Sedecías» para צִדְקִיָּהוּ. Dado que el proyecto busca legibilidad e inteligibilidad e incluso registra «Sedecías» como alternativa, conviene adoptar la forma española más reconocible.
  - severity: low
    issue: «en lugar de él» puede mejorarse a «en su lugar»
    rationale: Ambas expresiones representan bien תַּחְתָּיו, pero «en su lugar» es un giro más idiomático y más fluido en español bíblico contemporáneo sin alterar el sentido.
  revised_spanish_text: Y el rey de Babilonia hizo rey a Matanías[a], su tío, en su lugar, y cambió su nombre por el de Sedecías.
  revised_footnotes:
