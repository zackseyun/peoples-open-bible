review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la elipsis hebrea עַל שָׁדַיִם סֹפְדִים como gesto de duelo y mantiene la triple repetición de עַל con sentido de lamentación. 'sus pechos' para שָׁדַיִם y 'la vid fructífera' para גֶּפֶן פֹּרִיָּה son fieles. Sin embargo, 'campos deleitosos' no suena natural en español bíblico actual para שְׂדֵי חֶמֶד; 'campos agradables' o 'campos deleitables' sería más idiomático, y la opción más clara y fiel aquí es 'campos agradables'.
  spanish_quality_summary: La frase es generalmente clara, pero 'Golpean sus pechos en duelo' suena algo mecánica; 'se golpean el pecho en duelo' sería más idiomática en singular colectivo, aunque el plural 'sus pechos' también es entendible. El principal problema de legibilidad es 'campos deleitosos', que resulta forzado en español contemporáneo. El resto mantiene un registro digno y comprensible.
  glossary_alignment: No hay términos teológicos de proyecto en juego. La decisión de conservar 'vid' es adecuada. La nota alternativa preserva correctamente la compresión del hebreo, pero conviene ajustar la redacción principal para mejor español sin perder la lógica léxica documentada.
  issues:
  - severity: medium
    issue: '''campos deleitosos'' suena poco natural en español moderno'
    rationale: Aunque refleja etimológicamente 'delightful', 'deleitoso' rara vez modifica 'campos' en registro natural. שְׂדֵי חֶמֶד expresa campos agradables/deseables; 'campos agradables' conserva el sentido con mejor legibilidad.
  - severity: low
    issue: La construcción 'Golpean sus pechos en duelo' es algo rígida
    rationale: El español idiomático suele preferir 'se golpean el pecho' para este gesto de duelo. Aun así, el sentido se entiende y la revisión es de estilo más que de fidelidad.
  revised_spanish_text: Se golpean el pecho en duelo[a], por los campos agradables, por la vid fructífera.
  revised_footnotes:
  - marker: a
    text: 'O: «lamentando por los pechos»; el hebreo es muy condensado, y muchos lo entienden como un modismo que alude a golpearse el pecho en dolor.'
    reason: lexical_alternative
