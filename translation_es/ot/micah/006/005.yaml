  language: en
  yaml_path: translation/ot/micah/006/005.yaml
  text: My people[a], please remember what Balak king of Moab planned[c][b], and what Balaam son of Beor answered him—from Shittim to Gilgal—so that you may know the righteous acts of Yahweh.
  footnotes:
  - marker: a
    text: Or 'what Balak king of Moab counseled/devised.'
    reason: lexical_alternative
  - marker: b
    text: Shittim and Gilgal are place names recalling Israel's journey from the plains of Moab into the land.
    reason: cultural_note
  - marker: c
    text: Or 'the saving acts of the LORD' or 'the acts of righteousness of the LORD.'
    reason: alternative_reading
