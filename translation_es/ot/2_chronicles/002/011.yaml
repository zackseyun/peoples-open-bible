translation:
  language: es
  text: 'Entonces Huram dijo[a]: «Bendito sea Yahvé, el Dios de Israel, que hizo los cielos y la tierra, que ha dado al rey David un hijo sabio, que conoce la discreción y el entendimiento[b], que edificará una casa para Yahvé y una casa para su reino[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Huram aparece escrito «Hiram» en el pasaje paralelo de 1 Reyes; aquí Crónicas usa la forma hebrea Huram.
    reason: alternative_reading
  - marker: b
    text: 'O: «con discernimiento y entendimiento».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, una casa para su reino o realeza; posiblemente se refiere al complejo del palacio.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma con waw consecutiva avanza la escena; «Entonces ... dijo» conserva la secuencia narrativa en español sin sonar forzado.
- source_word: חוּרָם
  english_pob_choice: Huram
  chosen_spanish: Huram
  alternatives_spanish:
  - Hiram
  lexicon: HALOT
  rationale: Se mantiene la forma hebrea presente en Crónicas, en lugar de armonizar con 1 Reyes.
- source_word: בָּרוּךְ יְהוָה
  english_pob_choice: Blessed be Yahweh
  chosen_spanish: Bendito sea Yahvé
  alternatives_spanish:
  - Sea bendito Yahvé
  - Bendito es Yahvé
  lexicon: HALOT
  rationale: La fórmula de bendición se vierte de manera natural en español conservando su valor optativo/de alabanza.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton, usando la forma española «Yahvé» como nombre propio divino, no el sustituto litúrgico «SEÑOR».
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: Construcción directa y fiel al hebreo, preservando la identificación pactual.
- source_word: עָשָׂה אֶת הַשָּׁמַיִם וְאֶת הָאָרֶץ
  english_pob_choice: who made the heavens and the earth
  chosen_spanish: que hizo los cielos y la tierra
  alternatives_spanish:
  - que hizo el cielo y la tierra
  - que creó los cielos y la tierra
  lexicon: HALOT
  rationale: «Los cielos y la tierra» conserva el plural hebreo y la fórmula bíblica de creación; «hizo» refleja con precisión עָשָׂה sin añadir la especificidad de «creó».
- source_word: נָתַן
  english_pob_choice: has given
  chosen_spanish: ha dado
  alternatives_spanish:
  - dio
  lexicon: HALOT
  rationale: El perfecto español mantiene la relevancia presente del don de Dios a David.
- source_word: בֵּן חָכָם
  english_pob_choice: a wise son
  chosen_spanish: un hijo sabio
  alternatives_spanish:
  - un hijo prudente
  - un hijo experto
  lexicon: HALOT
  rationale: «Sabio» es el equivalente más natural y amplio para חָכָם en este contexto.
- source_word: יוֹדֵעַ שֵׂכֶל וּבִינָה
  english_pob_choice: who knows discretion and understanding
  chosen_spanish: que conoce la discreción y el entendimiento
  alternatives_spanish:
  - que tiene discernimiento y entendimiento
  - que sabe discernir y entender
  lexicon: HALOT
  rationale: Se conserva la estructura participial con «conoce» y el doble sustantivo, sin desdibujar la tensión entre conocimiento práctico y discernimiento.
- source_word: שֵׂכֶל
  english_pob_choice: discretion
  chosen_spanish: discreción
  alternatives_spanish:
  - prudencia
  - entendimiento práctico
  lexicon: HALOT
  rationale: «Discreción» expresa bien el sentido de juicio sensato/prudente que el inglés audit trail documenta.
- source_word: בִּינָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  lexicon: HALOT
  rationale: «Entendimiento» mantiene el paralelismo con שֵׂכֶל y conserva el matiz cognitivo.
- source_word: בַּיִת לַיהוָה
  english_pob_choice: a house for Yahweh
  chosen_spanish: una casa para Yahvé
  alternatives_spanish:
  - un templo para Yahvé
  lexicon: HALOT
  rationale: Se conserva «casa», porque el hebreo usa בַּיִת; aunque el referente sea el templo, no conviene sustituir el sustantivo sin base textual.
- source_word: בַּיִת לְמַלְכוּתוֹ
  english_pob_choice: a house for his kingdom
  chosen_spanish: una casa para su reino
  alternatives_spanish:
  - un palacio para su reino
  - una casa real para su reino
  lexicon: HALOT
  rationale: Se mantiene el paralelismo léxico con la primera cláusula y se evita especificar «palacio» más allá de lo que garantiza el hebreo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo nombra explícitamente a יְהוָה, por lo que la traducción debe preservar el nombre divino en vez de sustituirlo por un título. La forma española del proyecto es «Yahvé».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: ‘House for his kingdom’ and royal referent
  english_pob_reading: a house for his kingdom; possibly referring to the palace complex
  chosen_spanish_reading: una casa para su reino
  alternative_spanish_readings:
  - un palacio para su reino
  - una casa real para su reino
  rationale: El hebreo dice literalmente «casa» y la nota inglesa advierte que puede aludir al complejo real. En español se conserva la literalidad y se deja la posible extensión semántica sin forzar una identificación arquitectónica más específica.
  doctrine_reference: POB note on royal house / palace complex
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés, que ajustó la frase a «who knows discretion and understanding» para mayor naturalidad formal. En español se reflejó con «que conoce la discreción y el entendimiento», manteniendo la estructura participial y el paralelismo semántico. También se preservó la preferencia revisada por «Yahweh» en el inglés auditado, adaptada al estándar español del proyecto: «Yahvé».'
  spanish_consistency_notes:
  - Se mantuvo «casa» en ambos casos para respetar el paralelismo del hebreo בַּיִת.
  - Se usó «cielos» en plural para reflejar הַשָּׁמַיִם.
  - Se conservó el nombre propio divino «Yahvé» en lugar de «SEÑOR».
  - Se evitó «palacio» en el texto principal porque la base hebrea dice literalmente «casa»; la posible referencia palaciega quedó en la nota.
  - El orden narrativo con «Entonces ... dijo» reproduce el avance secuencial del waw-consecutivo sin cargar el español de semitismos.
