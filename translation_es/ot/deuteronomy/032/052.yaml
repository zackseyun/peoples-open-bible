    text: Or “from opposite it” or “from afar”; the Hebrew expression indicates that Moses will view the land without entering it.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has “children of Israel” or “Israelites.” The Hebrew reads “sons of Israel.”
