revisions:
- from: Yahvé estaba con José[a], y llegó a ser un hombre exitoso; y estaba en la casa de su señor egipcio.
  to: Yahvé estaba con José[a], y llegó a ser un hombre exitoso; y estaba en la casa de su amo egipcio.
  rationale: Se reemplaza 'señor' por 'amo' para reflejar con mayor fidelidad el sentido contextual de אֲדֹנָיו y la decisión auditada inglesa 'master'. Se mantiene 'exitoso' con nota alternativa 'próspero', y se pule la nota para mejor español editorial.
