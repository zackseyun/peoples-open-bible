translation:
  language: es
  text: ¿Por qué me recibieron las rodillas[a], y por qué pechos, para que yo mamara[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Rodillas» probablemente alude a que el recién nacido era recibido sobre las rodillas o el regazo al nacer.
    reason: cultural_note
  - marker: b
    text: O «para que yo pudiera chupar» o «para que yo pudiera mamar». El verbo hebreo se refiere a la acción de un lactante al tomar leche.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué razón
  - ¿Por qué motivo
  lexicon: HALOT
  rationale: La partícula interrogativa pide una pregunta directa y natural en español. «¿Por qué» conserva la fuerza lamentativa sin añadir interpretación.
- source_word: קִדְּמוּנִי
  english_pob_choice: did ... receive me
  chosen_spanish: me recibieron
  alternatives_spanish:
  - me salieron al encuentro
  - me acogieron
  lexicon: HALOT
  rationale: El verbo expresa la idea de salir al encuentro/recibir; en el contexto de «rodillas» comunica mejor la imagen del recién nacido recibido al nacer o colocado sobre el regazo. «Me recibieron» reproduce bien la función idiomática.
- source_word: בִרְכָּיִם
  english_pob_choice: knees
  chosen_spanish: rodillas
  alternatives_spanish:
  - regazo
  lexicon: HALOT
  rationale: Se conserva el término corporal concreto. Aunque el sentido cultural apunta al recién nacido sobre las rodillas o el regazo, «rodillas» mantiene la imagen sin explicarla en el texto principal.
- source_word: וּמַה
  english_pob_choice: and why
  chosen_spanish: y por qué
  alternatives_spanish:
  - y qué
  - y para qué
  lexicon: HALOT
  rationale: En el paralelismo interrogativo funciona idiomáticamente como otra pregunta de causa. «Y por qué» conserva la paralelidad con la primera pregunta.
- source_word: שָׁדַיִם
  english_pob_choice: breasts
  chosen_spanish: pechos
  alternatives_spanish:
  - senos
  - mamas
  lexicon: HALOT
  rationale: «Pechos» es claro, digno y natural en español; mantiene el término anatómico sin un giro más técnico o más marcado por registro.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - a fin de que
  lexicon: HALOT
  rationale: 'La partícula introduce una relación de finalidad/resultante en el lamento: «pechos, para que yo mamara». «Para que» expresa mejor la fuerza del resultado esperado que un simple «que».'
- source_word: אִינָק
  english_pob_choice: I should nurse
  chosen_spanish: yo mamara
  alternatives_spanish:
  - yo succionara
  - yo mamase
  lexicon: HALOT
  rationale: El verbo describe la acción del lactante de succionar/mamar. «Mamara» es natural, reverente y comunica el acto infantil de alimentarse del pecho. Se evita «nurse» por ser menos idiomático en español y «succionar» por sonar demasiado técnico.
translation_notes:
  revision_awareness: Se mantiene la estructura interrogativa paralela del hebreo y la solución auditada del inglés POB, ajustando el registro a un español natural y publicable sin diluir la imagen corporal ni el valor idiomático de los verbos.
  spanish_consistency_notes:
  - Se preserva «rodillas» en el texto principal por fidelidad a la imagen concreta; la nota aclara el trasfondo cultural.
  - Se usa «mamara» para el acto del lactante, coherente con la fuerza del verbo hebreo y con el registro bíblico en español.
  - No se introduce «Señor» ni terminología teológica adicional, pues el versículo no contiene nombres divinos ni conceptos doctrinales explícitos.
