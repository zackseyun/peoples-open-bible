translation:
  language: es
  text: 'Los siervos de Absalón llegaron a la casa de la mujer y dijeron[a]: «¿Dónde están Ahimaaz y Jonatán?». La mujer les respondió: «Cruzaron el arroyo de agua[b]». Ellos los buscaron, pero no los encontraron, y regresaron a Jerusalén.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le dijeron». El hebreo simplemente dice «dijeron»; en español puede dejarse sin complemento indirecto expreso.
    reason: lexical_alternative
  - marker: b
    text: O «el arroyo» o «el canal de agua». La frase hebrea מִיכַל הַמָּיִם es inusual, y el matiz exacto del curso de agua es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵי אַבְשָׁלוֹם
  english_pob_choice: Absalom’s servants
  chosen_spanish: los siervos de Absalón
  alternatives_spanish:
  - los servidores de Absalón
  - los hombres de Absalón
  - los esclavos de Absalón
  lexicon: HALOT
  rationale: עֶבֶד puede designar servidor, oficial o esclavo según el contexto. Aquí se trata de agentes al servicio de Absalón; en español, «siervos» comunica servicio personal sin forzar una lectura de esclavitud que no es la saliente en este versículo.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: אִשָּׁה puede significar «mujer» o «esposa». En este contexto el referente es la mujer de la casa, no una relación matrimonial específica; por eso «mujer» es más fiel y natural.
- source_word: הַבַּיְתָה
  english_pob_choice: at the house
  chosen_spanish: de la casa
  alternatives_spanish:
  - a la casa
  - en la casa
  - hasta la casa
  lexicon: HALOT
  rationale: El sufijo direccional sobre בַּיִת indica movimiento hacia la casa. En español, «llegaron a la mujer de la casa» reproduce esa llegada al lugar sin sobreespecificar una entrada física al interior.
- source_word: אַיֵּה
  english_pob_choice: Where are
  chosen_spanish: ¿Dónde están?
  alternatives_spanish:
  - ¿Dónde está?
  lexicon: HALOT
  rationale: La pregunta es de localización y se refiere a dos personas, por lo que el plural español «¿Dónde están?» expresa mejor la fuerza interrogativa del hebreo.
- source_word: עָבְרוּ
  english_pob_choice: They crossed over
  chosen_spanish: Ya pasaron
  alternatives_spanish:
  - Cruzaron
  - Pasaron al otro lado
  lexicon: HALOT
  rationale: עָבַר puede significar pasar o cruzar. En esta escena, el sentido narrativo es que se alejaron pasando el curso de agua; «ya pasaron» conserva la idea de haber cruzado sin sonar rígido. El adverbio «ya» refleja el valor perfectivo del verbo en contexto.
- source_word: מִיכַל הַמָּיִם
  english_pob_choice: the brook of water
  chosen_spanish: el arroyo de agua
  alternatives_spanish:
  - el arroyo
  - el cauce de agua
  - la corriente de agua
  lexicon: HALOT
  rationale: La expresión hebrea es inusual y el tipo exacto de curso de agua es incierto. «Arroyo de agua» mantiene la incertidumbre y la imagen de un pequeño curso fluyente sin imponer una terminología técnica más precisa de lo que permite el texto.
- source_word: וַיְבַקְשׁוּ
  english_pob_choice: They searched
  chosen_spanish: los buscaron
  alternatives_spanish:
  - los buscaron con diligencia
  - los procuraron
  lexicon: HALOT
  rationale: בקשׁ aquí describe la acción de buscar personas. En español, «los buscaron» es directo y suficientemente preciso; el objeto se explicita por claridad narrativa.
- source_word: וְלֹא מָצָאוּ
  english_pob_choice: but did not find them
  chosen_spanish: pero no los encontraron
  alternatives_spanish:
  - y no los hallaron
  lexicon: HALOT
  rationale: El hebreo tiene una coordinación simple, pero en español «pero» expresa mejor el resultado fallido de la búsqueda. «Encontraron» es un equivalente natural de מָצָא en este contexto.
- source_word: וַיָּשֻׁבוּ יְרוּשָׁלִָם
  english_pob_choice: so they returned to Jerusalem
  chosen_spanish: y regresaron a Jerusalén
  alternatives_spanish:
  - volvieron a Jerusalén
  - así que regresaron a Jerusalén
  lexicon: HALOT
  rationale: שׁוּב significa volver o regresar. «Regresaron» conserva bien el movimiento de retorno; la coordinación con «y» mantiene el flujo narrativo hebreo sin añadir una relación causal no explícita.
translation_notes:
  revision_awareness: 'La redacción sigue el alcance del texto hebreo y el audit trail inglés: conserva la referencia incierta de מִיכַל הַמָּיִם, mantiene el resultado narrativo de la búsqueda infructuosa y refleja la salida hacia Jerusalén sin añadir detalles no atestiguados. Frente a la revisión inglesa que favoreció «brook of water», la versión española opta por «arroyo de agua» como equivalente natural y aún suficientemente indeterminado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton cuando aparezca; aquí no ocurre.
  - Se evita «Cristo» porque no hay lenguaje mesiánico en el versículo.
  - Se mantiene un registro narrativo claro y bíblico, sin arcaísmos innecesarios.
  - El objeto de «buscaron» y «encontraron» se expresa en español para evitar ambigüedad sintáctica.
  - La nota de pie marca la incertidumbre del curso de agua sin resolverla artificialmente.
