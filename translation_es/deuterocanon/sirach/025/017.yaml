translation:
  language: es
  text: La maldad de una mujer[a] oscurece la apariencia de un hombre, y le pone el rostro sombrío como un oso[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo אִשָּׁה también puede significar «esposa», así que el dicho puede entenderse más específicamente en un contexto doméstico.
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego dice «y oscurece su rostro como saco», con una imagen distinta de la del hebreo conservado, que dice «como un oso».
    reason: alternative_reading
lexical_decisions:
- source_word: רֹעַ / πονηρία
  english_pob_choice: evil
  chosen_spanish: maldad
  alternatives_spanish:
  - mal
  - maldad moral
  - maldad dañina
  lexicon: HALOT; LXX πονηρία
  rationale: En español, «maldad» conserva el valor moral y proverbial del sustantivo hebreo y del paralelo griego, sin sonar tan abstracto como «evil» ni forzar una calificación más interpretativa.
- source_word: אִשָּׁה
  english_pob_choice: woman's
  chosen_spanish: de una mujer
  alternatives_spanish:
  - de una esposa
  - de la mujer
  lexicon: HALOT
  rationale: El hebreo permite «mujer» o «esposa». Se mantiene el sentido más abierto en el texto principal, y se documenta la alternativa con «esposa» en nota.
- source_word: יַשְׁחִיר
  english_pob_choice: darkens
  chosen_spanish: oscurece
  alternatives_spanish:
  - ennegrece
  - vuelve oscuro
  lexicon: HALOT
  rationale: «Oscurece» es el equivalente natural y fiel para el causativo de שׁחר/שחר en este contexto proverbial, conservando la imagen de hacer más oscuro el aspecto.
- source_word: מַרְאֶה אִישׁ
  english_pob_choice: a man's appearance
  chosen_spanish: el semblante de un hombre
  alternatives_spanish:
  - la apariencia de un hombre
  - el aspecto de un hombre
  lexicon: HALOT
  rationale: «Semblante» comunica bien la idea de aspecto visible del rostro/porte en español y encaja con el paralelismo con «rostro» en la segunda cola.
- source_word: וְיַקְדִיר
  english_pob_choice: makes ... gloomy
  chosen_spanish: le pone el rostro sombrío
  alternatives_spanish:
  - le oscurece el rostro
  - le vuelve el rostro sombrío
  lexicon: HALOT
  rationale: Se conserva el matiz afectivo de קדר con una expresión idiomática en español. El verbo/prédicado «poner… sombrío» evita repetir «oscurece» de forma mecánica y mantiene la fuerza proverbial.
- source_word: פָּנָיו
  english_pob_choice: his face
  chosen_spanish: el rostro
  alternatives_spanish:
  - su rostro
  - la cara
  lexicon: HALOT
  rationale: En español, el giro impersonal «le pone el rostro sombrío» expresa naturalmente el poseído original y mantiene la imagen facial.
- source_word: לְדוֹב
  english_pob_choice: like a bear
  chosen_spanish: como un oso
  alternatives_spanish:
  - como un oso pardo
  - como oso
  lexicon: HALOT
  rationale: Se traduce directamente desde el hebreo principal, que ofrece «oso», como en la decisión inglesa; se preserva la imagen original del manuscrito hebreo frente a la variante griega de «cilicio/saco».
theological_decisions:
- issue: Término genérico con posible sentido de relación doméstica
  english_pob_reading: A woman's evil darkens a man's appearance
  chosen_spanish_reading: La maldad de una mujer oscurece el semblante de un hombre
  alternative_spanish_readings:
  - La maldad de una esposa oscurece el semblante de su marido
  - La maldad de una mujer oscurece el semblante de una persona
  rationale: Se conserva la sintaxis y el género del proverbio sin neutralizarlo. La posibilidad de «esposa» queda en documentación, no en el texto base, porque el hebreo no lo especifica de manera explícita.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Variante textual entre el hebreo y el griego
  english_pob_reading: the Greek parallel reads 'and darkens her face like sackcloth,' reflecting a different image from the extant Hebrew, which reads 'like a bear.'
  chosen_spanish_reading: '...como un oso.'
  alternative_spanish_readings:
  - '...como saco.'
  - '...como cilicio.'
  rationale: El texto principal sigue el testimonio hebreo disponible, que es claro en «oso». La variante griega se documenta como alternativa significativa porque cambia la imagen, pero no se adopta en el cuerpo principal.
  doctrine_reference: DOCTRINE.md §Textual criticism and transparency
translation_notes:
  revision_awareness: 'Se siguió el dictamen de revisión más reciente sin cambios sustanciales: la lectura hebrea principal sigue siendo suficientemente clara para la traducción base, y la variante griega se conserva solo en nota para transparencia textual.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» y «Cristo» por no corresponder al contenido del verso.
  - Se prefirió una dicción proverbial y literaria, pero moderna, para que el paralelismo sea natural en español.
  - La nota a y la nota b se anclan en palabras distintas del texto para respetar la trazabilidad de decisiones.
