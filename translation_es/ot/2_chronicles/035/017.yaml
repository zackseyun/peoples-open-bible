translation:
  language: es
  text: Y los israelitas que estaban presentes celebraron la Pascua[a] en aquel tiempo, y la Fiesta de los Panes sin Levadura[b] por siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Pascua» traduce el nombre festivo habitual en español; el hebreo puede abarcar tanto la celebración como el rito pascual.
    reason: lexical_alternative
  - marker: b
    text: «Panes sin Levadura» mantiene el sentido literal de מַצּוֹת y evita un tecnicismo menos transparente.
    reason: spanish_style_note
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: kept
  chosen_spanish: celebraron
  alternatives_spanish:
  - observaron
  - guardaron
  lexicon: HALOT
  rationale: En contexto festivo, el hebreo עשה puede significar observar o celebrar una fiesta. «Celebraron» conserva el sentido cultual de la acción sin sonar forzado en español, y encaja naturalmente con las fiestas mencionadas.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the Israelites
  chosen_spanish: los israelitas
  alternatives_spanish:
  - los hijos de Israel
  - los hijos de Israel reunidos
  lexicon: HALOT
  rationale: La expresión designa al pueblo de Israel como colectivo. «Los israelitas» es la forma más idiomática y clara en español actual, y mantiene la referencia étnico-covenantal del hebreo.
- source_word: הַנִּמְצְאִים
  english_pob_choice: who were present
  chosen_spanish: que estaban presentes
  alternatives_spanish:
  - que fueron hallados
  - que estaban allí
  lexicon: HALOT
  rationale: El participio de מצא aquí no describe un hallazgo casual, sino a los que se encontraban disponibles o presentes para la celebración. «Que estaban presentes» evita la literalidad engañosa de «hallados» y refleja bien el contexto.
- source_word: הַפֶּסַח
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el Pésaj
  - la Pascua de la liberación
  lexicon: HALOT
  rationale: En español bíblico, «Pascua» es la denominación establecida y comprende la observancia completa aquí aludida. No se añade una glosa como «sacrificio» porque el contexto no la exige de forma explícita en esta cláusula.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - en esa ocasión
  lexicon: HALOT
  rationale: La frase es temporal y directa. «En aquel tiempo» conserva el valor deíctico y suena natural en español bíblico contemporáneo.
- source_word: חַג הַמַּצּוֹת
  english_pob_choice: the Feast of Unleavened Bread
  chosen_spanish: la Fiesta de los Panes sin Levadura
  alternatives_spanish:
  - la fiesta de los ázimos
  - la Fiesta de los Panes ácimos
  lexicon: HALOT
  rationale: «Fiesta» traduce חַג y «Panes sin Levadura» expresa el sustantivo plural מַצּוֹת de manera clara para el lector moderno. Se evita «ázimos» por menor accesibilidad, aunque es una alternativa válida.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: HALOT
  rationale: Con el verbo de celebración, «por siete días» expresa duración de forma natural en español y conserva el valor temporal del hebreo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y también el audit trail inglés: se conserva el valor cultual de וַיַּעֲשׂוּ como observancia festiva, el sentido situacional de הַנִּמְצְאִים como presencia efectiva, y la temporalidad simple de בָּעֵת הַהִיא. No se introducen expansiones interpretativas que el hebreo no exija.'
  spanish_consistency_notes:
  - Se mantiene «Pascua» como término festivo estándar, coherente con el uso bíblico en español.
  - «Fiesta de los Panes sin Levadura» preserva la forma transparente y evita oscurecer el sustantivo plural hebreo.
  - Se conserva un registro bíblico moderno y sobrio, sin arcaísmos innecesarios.
