translation:
  language: es
  text: Tomaste tus vestidos bordados y los cubriste[a], y pusiste mi aceite y mi incienso delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los vestiste». El verbo hebreo significa literalmente «los cubriste», pero en contexto puede implicar poner las prendas sobre los ídolos, como vestirlos.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּגְדֵי רִקְמָתֵךְ
  english_pob_choice: your embroidered garments
  chosen_spanish: tus vestidos bordados
  alternatives_spanish:
  - tus ropas bordadas
  - tus vestidos ricamente trabajados
  lexicon: HALOT
  rationale: בִּגְדִים se refiere a prendas o vestidos, y רִקְמָה denota trabajo bordado o finamente trabajado. «Vestidos bordados» comunica bien el lujo del texto sin volverlo rígido.
- source_word: וַתְּכַסִּים
  english_pob_choice: covered them
  chosen_spanish: los cubriste
  alternatives_spanish:
  - los vestiste
  - los extendiste sobre ellos
  lexicon: HALOT
  rationale: El verbo כסה significa literalmente «cubrir». Mantengo esa base semántica; «vestiste» queda como alternativa interpretativa, tal como el audit trail inglés deja abierta la posibilidad.
- source_word: וְשַׁמְנִי
  english_pob_choice: my oil
  chosen_spanish: mi aceite
  alternatives_spanish:
  - mi aceite de oliva
  lexicon: HALOT
  rationale: שֶׁמֶן es «aceite»; aunque en contexto israelita suele ser aceite de oliva, el hebreo no lo especifica. Por eso conservo el término más general.
- source_word: וּקְטָרְתִּי
  english_pob_choice: my incense
  chosen_spanish: mi incienso
  alternatives_spanish:
  - mi incienso aromático
  lexicon: HALOT
  rationale: קְטֹרֶת es incienso de ofrenda. «Incienso» es natural en español y conserva la propiedad divina implícita en el posesivo «mi».
- source_word: נתתי לִפְנֵיהֶם
  english_pob_choice: you set ... before them
  chosen_spanish: pusiste ... delante de ellos
  alternatives_spanish:
  - colocaste ... delante de ellos
  - los presentaste delante de ellos
  lexicon: HALOT
  rationale: La forma verbal es segunda femenina singular en contexto. «Pusiste delante de ellos» refleja bien la acción de colocar ofrendas ante los ídolos sin añadir interpretación excesiva.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en frente de ellos
  lexicon: HALOT
  rationale: לִפְנֵי significa «delante de / ante». «Delante de ellos» es claro y mantiene el sentido cultual de colocar ofrendas ante los objetos referidos.
theological_decisions:
- issue: Referente de «ellos»
  english_pob_reading: The pronouns refer to the idols/images described in the immediate context.
  chosen_spanish_reading: Los pronombres se entienden como referencia a los ídolos/imágenes del contexto inmediato.
  alternative_spanish_readings:
  - Se deja el referente implícito sin nombrarlo
  - Se entiende como referencia a objetos no especificados
  rationale: Ezequiel 16 acusa a Jerusalén de usar para la idolatría lo que pertenecía a Yahvé. Mantener «ellos» sin sustituirlo en el texto por «ídolos» preserva la cercanía al hebreo, pero la lectura contextual en español puede explicitarse en la nota.
  doctrine_reference: Ezequiel 16; idolatría y profanación de los dones de Yahvé
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo y el audit trail inglés, sin cambios respecto de la lectura consolidada: el verbo principal conserva la ambigüedad entre cubrir y vestir, y los posesivos mantienen el valor cultual de los bienes que pertenecen a Yahvé.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término de referencia divina en el marco del proyecto, aunque en este versículo no aparece explícitamente el nombre.
  - «Aceite» e «incienso» se dejan sin adjetivos añadidos para no especificar más de lo que dice el hebreo.
  - La secuencia verbal en pretérito simple es natural en español bíblico y corresponde al relato acusatorio del pasaje.
