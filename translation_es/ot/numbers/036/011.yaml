translation:
  language: es
  text: Mahlah, Tirsa, Hogla, Milca y Noa, las hijas de Zelofehad, llegaron a ser esposas[a] de los hijos de sus tíos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más explícitamente: «de los hijos de los hermanos de su padre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּהְיֶינָה
  english_pob_choice: became
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - fueron
  - se hicieron
  lexicon: HALOT
  rationale: El hebreo expresa un cambio de estado resultado del matrimonio. «Llegaron a ser» conserva ese matiz de transición mejor que un simple «fueron», y suena natural en español bíblico contemporáneo.
- source_word: מַחְלָה תִרְצָה וְחָגְלָה וּמִלְכָּה וְנֹעָה
  english_pob_choice: Mahlah, Tirzah, Hoglah, Milcah, and Noah
  chosen_spanish: Mahlá, Tirsa, Hoglá, Milcá y Noá
  alternatives_spanish:
  - Mahlah, Tirzah, Hoglah, Milcah y Noah
  lexicon: convención onomástica
  rationale: Son nombres propios y se transliteran. Se adapta la acentuación al español para lectura fluida, sin cambiar la identidad de los nombres.
- source_word: בְּנוֹת
  english_pob_choice: daughters
  chosen_spanish: las hijas
  alternatives_spanish:
  - hijas
  lexicon: HALOT
  rationale: En contexto genealógico, «hijas» identifica de manera directa su relación filial con Zelofehad, manteniendo la precisión del hebreo.
- source_word: צְלָפְחָד
  english_pob_choice: Zelophehad
  chosen_spanish: Zelofehad
  alternatives_spanish:
  - Zelofehad
  lexicon: convención onomástica
  rationale: Nombre propio transliterado en forma española estándar, conservando la referencia a la figura bíblica.
- source_word: לִ/בְנֵ֥י
  english_pob_choice: to the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - para los hijos de
  - a los hijos de
  lexicon: HALOT
  rationale: En español, la relación matrimonial queda más natural y precisa con «esposas de». El hebreo con ל + בני en este contexto marca la unión matrimonial, no una mera pertenencia abstracta.
- source_word: דֹדֵי/הֶ֖ן
  english_pob_choice: their uncles
  chosen_spanish: sus tíos
  alternatives_spanish:
  - los hermanos de su padre
  - sus tíos paternos
  - sus parientes
  lexicon: HALOT
  rationale: דּוֹד suele significar «tío»; el plural con sufijo se traduce de manera directa como «sus tíos». La alternativa «los hermanos de su padre» es más explícita, pero menos fluida; puede reservarse para nota si se desea mayor precisión genealógica.
- source_word: לְ/נָשִֽׁים
  english_pob_choice: wives
  chosen_spanish: esposas
  alternatives_spanish:
  - mujeres
  - como esposas
  lexicon: HALOT
  rationale: En un contexto matrimonial, נָשִׁים se refiere a esposas. «Esposas» es claro, formal y evita ambigüedad.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido ya confirmado por la revisión inglesa más reciente: se mantiene la idea de devenir en estado matrimonial, pero en español se expresa con una forma natural y formal. Se conserva además la posibilidad de una especificación genealógica más explícita, como en el aparato inglés.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se tradujo la relación de parentesco con «sus tíos» para reflejar el hebreo de manera directa y legible; la nota preserva la alternativa más explícita.
  - Los nombres propios se mantuvieron transliterados, con adaptación ortográfica española solo cuando ayuda a la lectura sin alterar la identificación.
