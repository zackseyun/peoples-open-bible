translation:
  language: es
  text: Y Jacob viajó a Sucot[a], y edificó una casa para sí, e hizo refugios para su ganado. Por eso llamó al lugar Sucot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sucot» suena como la palabra hebrea para «refugios» o «cobertizos».
    reason: lexical_alternative
lexical_decisions:
- source_word: נָסַע
  english_pob_choice: traveled
  chosen_spanish: viajó
  alternatives_spanish:
  - partió
  - se trasladó
  - viajó hacia
  lexicon: HALOT
  rationale: El verbo expresa el desplazamiento de un lugar a otro. «Viajó» es natural en español moderno y conserva el movimiento narrativo sin volver el texto arcaico.
- source_word: סֻכֹּתָה
  english_pob_choice: to Succoth
  chosen_spanish: a Sucot
  alternatives_spanish:
  - hacia Sucot
  - para Sucot
  lexicon: HALOT
  rationale: La terminación direccional indica movimiento hacia el lugar. Se mantiene el nombre propio transliterado como topónimo, siguiendo la solución del POB inglés y la convención del proyecto.
- source_word: וַיִּבֶן לוֹ בָּיִת
  english_pob_choice: he built a house for himself
  chosen_spanish: edificó una casa para sí
  alternatives_spanish:
  - se construyó una casa
  - edificó para sí una casa
  lexicon: HALOT
  rationale: La expresión dice que Jacob construyó una vivienda para su propio uso. «Para sí» conserva el dativo y «edificó» mantiene un tono digno sin ser arcaico.
- source_word: מִקְנֵהוּ
  english_pob_choice: his livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - sus animales
  - su hato
  lexicon: HALOT
  rationale: El término se refiere a animales de cría o rebaños. «Ganado» es la opción más natural en español y suficientemente amplia para este contexto.
- source_word: עָשָׂה סֻכֹּת
  english_pob_choice: made shelters
  chosen_spanish: hizo cabañas
  alternatives_spanish:
  - hizo refugios
  - hizo chozas
  lexicon: HALOT
  rationale: El plural alude a estructuras temporales para abrigo. «Cabañas» comunica bien la idea de refugios provisionales y preserva la relación de palabra con el nombre del lugar; en español, «shelters» no sería la opción más idiomática aquí.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: La fórmula introduce la explicación del nombre del lugar. «Por eso» comunica con claridad la relación causal en español actual.
- source_word: קָרָא שֵׁם הַמָּקוֹם
  english_pob_choice: he called the name of the place
  chosen_spanish: llamó el nombre del lugar
  alternatives_spanish:
  - nombró el lugar
  - llamó al lugar
  lexicon: HALOT
  rationale: Se conserva la estructura idiomática hebrea «llamar el nombre de». Aunque en español suena más literal, ayuda a preservar la forma del relato de nombrar.
- source_word: סֻכּוֹת
  english_pob_choice: Succoth
  chosen_spanish: Sucot
  alternatives_spanish:
  - Sucoth
  - Sucoth
  lexicon: HALOT
  rationale: Como topónimo se translitera. «Sucot» evita la carga interpretativa de traducirlo como «cabañas» en el cuerpo del texto, preservando el juego de palabras en la nota.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/vocalizado del WLC y el audito inglés del POB. La única tensión relevante es el juego de palabras entre el topónimo Sucot y el sustantivo común סֻכּוֹת; se preserva con transliteración en el texto y nota explicativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Sucot» se usa de forma consistente como topónimo; la nota explica su relación con el sustantivo común.
  - «Ganado» traduce el referente colectivo de מִקְנֵהוּ sin limitarlo a «cattle».
  - El paralelismo narrativo se conserva con un estilo sobrio y bíblico, sin arcaísmos innecesarios.
