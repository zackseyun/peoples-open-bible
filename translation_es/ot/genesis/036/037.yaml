    text: Hebreo «Rehobot el Río», probablemente Rehobot situado junto a un río notable.
    reason: cultural_note
  revision_rationale: Se corrigen las notas para que sus anclas correspondan al elemento correcto del texto, se elimina la nota redundante sobre 'Shaúl', se mejora la naturalidad geográfica con 'junto al Río', y se ajusta 'Samlah' a una transliteración más estable y transparente en español. No cambia el sentido del hebreo ni la fórmula sucesoria.
