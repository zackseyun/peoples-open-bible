    issue: Marcador de nota [a] anclado al término equivocado
    rationale: La nota a explica τὸν τρόπον τοῦτον («esta forma / estas palabras / esta redacción»), pero en el borrador el marcador aparece tras «Lisias», creando una correspondencia incorrecta entre texto y nota.
  - severity: medium
    issue: «al pueblo de los judíos» debilita el matiz de πλῆθος
    rationale: El griego πλῆθος denota multitud, cuerpo colectivo o asamblea. «Pueblo» es más interpretativo y se aparta de la elección documentada del POB, que procura conservar el matiz colectivo sin sobreinterpretar.
  - severity: low
    issue: «por parte de Lisias» y «conteniendo» suenan menos naturales que alternativas simples
    rationale: Aunque son fieles, «de Lisias» y «que contenían» leen con más naturalidad en español moderno y mantienen mejor la dignidad del registro sin calcar la sintaxis griega.
