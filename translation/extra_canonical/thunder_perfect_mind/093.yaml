      I tentatively reconstruct ⲟⲩⲡⲱϣⲥ (“a sound/voice”), but the continuation is
      uncertain; hence the ellipsis.'
    reason: alignment_note
  - marker: b
    text: “Undefiled” renders ⲥⲕⲁⲕ ⲉⲃⲟⲗ; alternatives are “sinless,” “pure,” or “stainless.”
