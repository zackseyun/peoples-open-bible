translation:
  language: es
  text: Entonces diez jóvenes, escuderos de Joab, rodearon a Absalón y lo hirieron y lo mataron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּסֹבּוּ
  english_pob_choice: surrounded
  chosen_spanish: rodearon
  alternatives_spanish:
  - circundaron
  - lo rodearon
  lexicon: HALOT
  rationale: El verbo סבב en este contexto narrativo expresa movimiento alrededor de una persona con sentido táctico de encierro. «Rodearon» comunica esa acción de forma natural en español y conserva la idea de cerco sin calco excesivo.
- source_word: עֲשָׂרָה נְעָרִים
  english_pob_choice: ten young men
  chosen_spanish: diez jóvenes
  alternatives_spanish:
  - diez muchachos
  - diez servidores
  lexicon: HALOT
  rationale: נְעָרִים puede referirse a hombres jóvenes o asistentes en un contexto militar. «Jóvenes» mantiene el valor léxico básico y evita precisar más de lo que el hebreo exige. «Muchachos» suena menos formal; «servidores» introduciría una función no explicitada por el texto.
- source_word: נֹשְׂאֵי כְּלֵי יוֹאָב
  english_pob_choice: Joab’s armor-bearers
  chosen_spanish: escuderos de Joab
  alternatives_spanish:
  - portadores de las armas de Joab
  - armados de Joab
  lexicon: HALOT
  rationale: La expresión literalmente es «portadores de los utensilios/armas de Joab». En español, «escuderos» es un equivalente militar idiomático y cercano a «armor-bearers», preservando la relación de subordinación armada sin volver la frase pesada.
- source_word: וַיַּכּוּ
  english_pob_choice: struck him
  chosen_spanish: lo hirieron
  alternatives_spanish:
  - lo golpearon
  - lo atacaron
  lexicon: HALOT
  rationale: נכה abarca golpear, herir o abatir según el contexto. Aquí, antes de «lo mataron», «lo hirieron» mantiene la secuencia narrativa y evita una repetición demasiado áspera de «golpearon» en español, sin debilitar la violencia del verbo.
- source_word: וַיְמִיתֻהוּ
  english_pob_choice: killed him
  chosen_spanish: lo mataron
  alternatives_spanish:
  - lo dieron muerte
  - lo hicieron morir
  lexicon: HALOT
  rationale: מות en causativo significa causar la muerte. «Lo mataron» es la forma más directa y natural en español, y conserva con claridad el desenlace inmediato del relato.
- source_word: אַבְשָׁלֹם
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Absalom
  lexicon: standard proper-name transliteration
  rationale: En español bíblico tradicional y moderno, el nombre se adapta normalmente como «Absalón». Se conserva la identificación del personaje sin dejar la forma inglesa.
translation_notes:
  revision_awareness: El texto base inglés no introduce notas ni variantes, y la revisión más reciente indicó que no había cambios necesarios; por eso el español sigue de cerca la escena hebrea sin añadir explicaciones interpretativas.
  spanish_consistency_notes:
  - 'Se mantiene la secuencia narrativa con tres verbos coordinados: «rodearon», «hirieron» y «mataron».'
  - Se evita «SEÑOR» porque no aparece el tetragrámaton ni un título divino en este versículo.
  - Se usa «Absalón» como forma española estable del nombre propio.
