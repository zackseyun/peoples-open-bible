translation:
  language: es
  text: Ahora, la señal[a] acordada entre los hombres de Israel y la emboscada[b] era que hicieran subir una gran columna de humo[c] de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «el arreglo señalado» o «la señal convenida». מוֹעֵד suele significar un tiempo señalado, pero aquí se trata de una señal previamente pactada en la batalla.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «para los hombres de Israel con la emboscada». El sentido es una disposición o señal acordada entre ambas partes.'
    reason: lexical_alternative
  - marker: c
    text: 'También: «una masa de humo» o «una nube de humo». La expresión señala un humo conspicuo que asciende como marca visible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמּוֹעֵד
  english_pob_choice: the appointed sign
  chosen_spanish: la señal acordada
  alternatives_spanish:
  - el tiempo señalado
  - el arreglo señalado
  - la señal designada
  lexicon: HALOT
  rationale: מוֹעֵד puede significar tiempo señalado, cita o encuentro; aquí, por el contexto militar y la relación con las dos partes, funciona como una señal previamente acordada. 'Señal acordada' mantiene la idea de algo fijado de antemano sin forzar el sentido de 'tiempo' en español.
- source_word: לְאִישׁ יִשְׂרָאֵל
  english_pob_choice: between the men of Israel
  chosen_spanish: entre los hombres de Israel
  alternatives_spanish:
  - para los hombres de Israel
  - para Israel
  - entre los varones de Israel
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'para/al hombre de Israel', con עִם el sentido es relacional entre dos partes. 'Entre los hombres de Israel' refleja el valor colectivo y militar de אִישׁ sin perder naturalidad en español.
- source_word: עִם הָאֹרֵב
  english_pob_choice: and the ambush
  chosen_spanish: y la emboscada
  alternatives_spanish:
  - y los que estaban en emboscada
  - y los emboscadores
  - y el grupo en emboscada
  lexicon: HALOT
  rationale: אֹרֵב es participio de 'acechar/poner emboscada' y puede funcionar colectivamente para la fuerza que embosca. 'La emboscada' es una forma concisa y fiel al valor colectivo del término en este contexto.
- source_word: הֶרֶב
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - muy grande
  - abundante
  - en gran manera
  lexicon: HALOT
  rationale: La forma intensiva de רבה refuerza la magnitud del humo. 'Gran' es la solución natural en español para conservar la intensificación sin sonar redundante.
- source_word: לְהַעֲלוֹתָם
  english_pob_choice: that they should make ... rise
  chosen_spanish: que hicieran subir
  alternatives_spanish:
  - que levantaran
  - que hicieran ascender
  - para hacer subir
  lexicon: HALOT
  rationale: El hifil de עלה expresa causar que algo suba. 'Hicieran subir' conserva la causalidad y suena idiomático en español bíblico contemporáneo.
- source_word: מַשְׂאַת הֶעָשָׁן
  english_pob_choice: a great cloud of smoke
  chosen_spanish: una gran columna de humo
  alternatives_spanish:
  - una masa de humo
  - una nube de humo
  - un penacho de humo
  lexicon: HALOT
  rationale: מַשְׂאַת es algo levantado o alzado; con 'humo' se refiere a una señal visible que se eleva. 'Columna de humo' expresa mejor en español la imagen ascendente del hebreo que 'nube', manteniendo el carácter señalizador.
- source_word: מִן הָעִיר
  english_pob_choice: from the city
  chosen_spanish: desde la ciudad
  alternatives_spanish:
  - de la ciudad
  - fuera de la ciudad
  lexicon: HALOT
  rationale: '''Desde la ciudad'' reproduce el punto de origen y el movimiento ascendente del humo. Es una equivalencia natural y precisa en español.'
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó 'signal' por 'sign' para hacer más formal y directo el valor de מוֹעֵד; la traducción española sigue esa decisión con 'señal'. También se mantuvo la idea de un humo visible y ascendente, sin convertirla en una paráfrasis más libre.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' solo cuando el texto fuente lo exija explícitamente; este versículo no contiene el Tetragrámaton.
  - '''Hombres de Israel'' conserva el valor militar/colectivo de אִישׁ en este contexto.'
  - '''Emboscada'' mantiene el valor colectivo de הָאֹרֵב sin introducir un sujeto adicional no presente en el hebreo.'
  - '''Gran columna de humo'' preserva la imagen de elevación y visibilidad del signo.'
