id: ISA.23.17
reference: Isaiah 23:17
source:
  edition: WLC
  text: וְ/הָיָ֞ה מִ/קֵּ֣ץ שִׁבְעִ֣ים שָׁנָ֗ה יִפְקֹ֤ד יְהוָה֙ אֶת צֹ֔ר וְ/שָׁבָ֖ה לְ/אֶתְנַנָּ֑/ה וְ/זָֽנְתָ֛ה אֶת כָּל מַמְלְכ֥וֹת הָ/אָ֖רֶץ עַל פְּנֵ֥י הָ/אֲדָמָֽה׀־־־־׃
translation:
  text: And it will happen at the end of seventy years that Yahweh will attend to Tyre[c][b][a], and she will return to her wages and prostitute herself with all the kingdoms of the earth on the face of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD will visit Tyre'; the Hebrew verb can also imply punitive or restorative intervention depending on context.
    reason: lexical_alternative
  - marker: b
    text: '''Her wages'' refers to the hire of a prostitute, continuing the oracle''s metaphor of Tyre as a prostitute among the nations.'
    reason: cultural_note
  - marker: c
    text: 'Or ''on the face of the earth.'' The Hebrew uses two related but distinct terms in this verse: ''earth/land'' and ''ground.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall be
  - Then it will happen
  lexicon: HALOT
  rationale: Common prophetic discourse marker introducing a future circumstance. 'Will happen' is readable modern English while preserving the formulaic sense.
- source_word: מִקֵּץ שִׁבְעִים שָׁנָה
  chosen: at the end of seventy years
  alternatives:
  - after seventy years
  lexicon: HALOT
  rationale: מִקֵּץ is more precisely 'from/at the end of' rather than simply 'after'; the phrase marks the completion of a set period.
- source_word: יִפְקֹד
  chosen: will attend to
  alternatives:
  - will visit
  - will take note of
  - will punish
  - will restore
  lexicon: HALOT
  rationale: פקד has a broad semantic range including visit, attend to, intervene, punish, or care for depending on context. Here the result is Tyre's renewed activity, so a neutral 'attend to' preserves the divine intervention without over-specifying whether the emphasis is punitive or restorative.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צֹר
  chosen: Tyre
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: וְשָׁבָה
  chosen: and she will return
  alternatives:
  - and it will return
  - and she will turn back
  lexicon: HALOT
  rationale: The verb is feminine singular, referring back to the city Tyre, personified as a woman in this oracle. 'She' preserves the personification.
- source_word: לְאֶתְנַנָּה
  chosen: to her wages
  alternatives:
  - to her hire
  - to her pay
  lexicon: HALOT
  rationale: אֶתְנַן commonly denotes a prostitute's hire/wages. 'Wages' is natural English, while the following clause makes the sexual-commercial metaphor explicit.
- source_word: וְזָנְתָה
  chosen: and prostitute herself
  alternatives:
  - and play the prostitute
  - and commit prostitution
  - and commit fornication
  lexicon: HALOT
  rationale: The verb זנה here continues the personified metaphor of Tyre as a prostitute engaging in mercenary relations with nations. 'Prostitute herself' is direct, contemporary, and preserves the metaphorical force.
- source_word: אֶת כָּל מַמְלְכוֹת הָאָרֶץ
  chosen: with all the kingdoms of the earth
  alternatives:
  - with all the kingdoms of the land
  lexicon: HALOT
  rationale: With זנה, the object marker introduces the parties with whom Tyre prostitutes herself. 'Earth' is preferred over 'land' because the scope is universalized by 'all the kingdoms.'
- source_word: עַל פְּנֵי הָאֲדָמָה
  chosen: on the face of the ground
  alternatives:
  - on the face of the earth
  - across the world
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew idiom and avoids flattening the poetic emphasis. 'Ground' reflects אֲדָמָה distinctly from the previous אָרֶץ.
