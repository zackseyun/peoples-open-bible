revisions:
- from: Porque ellas mismas profanaron lo que era puro en la inmundicia de una mezcla ilícita[c][b][a]. Mi vientre y mis entrañas me duelen por estas cosas.
  to: Porque ellas mismas contaminaron lo que era puro[a] en la inmundicia de una mezcla ilícita[b]. Mi vientre y mis entrañas me duelen por estas cosas.
  rationale: Se ajusta ἐμίαυσαν a 'contaminaron' para reflejar mejor el valor léxico de contaminación moral/ritual documentado por la traducción inglesa y las decisiones léxicas. Se simplifican las notas para evitar que la antigua lectura 'calle' compita indebidamente con la corrección textual ya adoptada, mientras se conserva tanto la alternativa de ἁγνά ('cosas santas') como la observación sobre la carga moral de ἀναμίξεως.
