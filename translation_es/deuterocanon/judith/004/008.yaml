translation:
  language: es
  text: diciéndoles que se apoderaran de los pasos de montaña[a], porque por ellos estaba la entrada a Judea; y era fácil impedirles el paso mientras subían[b], pues el acceso era tan estrecho que solo podían avanzar de dos en dos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Pasos de montaña» refleja el sentido estratégico de la expresión griega, literalmente «las subidas de la región montañosa», es decir, las rutas de acceso por terreno elevado.
    reason: lexical_alternative
  - marker: b
    text: El griego final es breve y difícil; aquí se entiende que el acceso era tan estrecho que el avance quedaba limitado a dos hombres lado a lado.
    reason: alternative_reading
lexical_decisions:
- source_word: διακατασχεῖν
  english_pob_choice: to seize
  chosen_spanish: se apoderaran de
  alternatives_spanish:
  - ocuparan
  - tomaran control de
  - se adueñaran de
  lexicon: LSJ
  rationale: El infinitivo expresa tomar control de un punto estratégico. «Apoderarse de» conserva la fuerza militar sin sonar demasiado técnico o abstracto en español.
- source_word: τὰς ἀναβάσεις τῆς ὀρεινῆς
  english_pob_choice: the mountain passes
  chosen_spanish: los pasos de la montaña
  alternatives_spanish:
  - las subidas de la región montañosa
  - los accesos de la serranía
  - los pasos de la serranía
  lexicon: LSJ
  rationale: La expresión griega es literalmente «las subidas de la región montañosa», pero en contexto se trata de rutas de acceso estratégicas. «Los pasos de la montaña» conserva el sentido topográfico y militar de manera natural en español.
- source_word: ἡ εἴσοδος εἰς τὴν Ἰουδαίαν
  english_pob_choice: the entrance into Judea
  chosen_spanish: la entrada a Judea
  alternatives_spanish:
  - el acceso a Judea
  - la entrada hacia Judea
  lexicon: LSJ
  rationale: «Entrada» preserva el sentido concreto de punto de acceso. En español, «a Judea» suena más natural que «en Judea» para este valor direccional.
- source_word: εὐχερῶς
  english_pob_choice: easy
  chosen_spanish: era fácil
  alternatives_spanish:
  - se podía fácilmente
  - era sencillo
  - resultaba fácil
  lexicon: LSJ
  rationale: El adverbio indica que detenerlos allí sería relativamente sencillo por el terreno. «Era fácil» sigue de cerca el valor del inglés auditado y suena idiomático.
- source_word: διακωλῦσαι
  english_pob_choice: to hold them back
  chosen_spanish: impedirles el paso
  alternatives_spanish:
  - detenerlos
  - retenerlos
  - bloquearlos
  lexicon: LSJ
  rationale: El verbo significa obstaculizar o impedir. En este contexto de avance por un desfiladero, «impedirles el paso» expresa con claridad la acción defensiva.
- source_word: προσβαίνοντας
  english_pob_choice: as they came up
  chosen_spanish: mientras subían
  alternatives_spanish:
  - cuando venían subiendo
  - mientras ascendían
  - al subir
  lexicon: LSJ
  rationale: El participio alude al movimiento de venir hacia arriba por la pendiente. «Mientras subían» conserva la imagen de ascenso sin cargarla con un tecnicismo innecesario.
- source_word: στενῆς τῆς προσβάσεως οὔσης
  english_pob_choice: since the approach was narrow
  chosen_spanish: pues el acceso era tan estrecho
  alternatives_spanish:
  - ya que el acceso era estrecho
  - porque el paso era angosto
  - puesto que la entrada era estrecha
  lexicon: LSJ
  rationale: La construcción causal explica por qué era fácil defender el lugar. «Acceso» mantiene el valor de πρόσβασις, y «tan estrecho» prepara la restricción de movimiento del final de la frase.
- source_word: ἐπʼ ἄνδρας τοὺς πάντας δύο
  english_pob_choice: for all the men to go only two abreast
  chosen_spanish: que todos los hombres podían ir solo de dos en dos
  alternatives_spanish:
  - que todos los hombres podían pasar solo dos abreast
  - que podían avanzar únicamente de dos en dos
  - que solo dos hombres podían pasar a la vez
  lexicon: LSJ
  rationale: El griego es condensado y difícil. «De dos en dos» expresa de forma natural la idea de ir dos hombres lado a lado, preservando la restricción espacial sin sobreinterpretar más allá del contexto.
translation_notes:
  revision_awareness: La versión inglesa auditada fue refinada en la cláusula final para expresar con más claridad la estrechez del acceso y la limitación a dos hombres en paralelo. La redacción española sigue esa lectura revisada y mantiene la misma cautela ante la frase griega condensada.
  spanish_consistency_notes:
  - Se mantiene «Judea» como topónimo histórico, sin adaptar a una forma litúrgica.
  - Se evita «Señor» u otro término de sustitución, ya que el pasaje no contiene el nombre divino.
  - 'Se conserva la imagen militar/topográfica: pasos, entrada, acceso estrecho y avance de dos en dos.'
  - La solución «de dos en dos» intenta reproducir la idea de «two abreast» en español natural.
