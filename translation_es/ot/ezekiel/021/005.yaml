revisions:
- from: 'Entonces dije[a]: «¡Ah, Señor Yahvé! Ellos están diciendo de mí[b]: “¿No es él un hablador de parábolas?”»'
  to: 'Entonces dije[a]: «¡Ah, Señor Yahvé! Ellos dicen de mí[b]: “¿No es él uno que habla en parábolas?”»'
  rationale: Se ajustó la redacción para un español más natural y digno sin perder el sentido del hebreo ni del historial POB. «Ellos dicen de mí» simplifica un progresivo innecesario, y «uno que habla en parábolas» evita el coloquialismo de «hablador» mientras preserva la caracterización idiomática de מְמַשֵּׁל מְשָׁלִים. La nota alternativa se corrigió a un español idiomático y la nota léxica se afinó para reflejar mejor el rango semántico documentado.
