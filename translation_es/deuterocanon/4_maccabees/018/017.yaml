translation:
  language: es
  text: 'Apeló al testimonio de Ezequiel[a], quien dice[b]: «¿Vivirán estos huesos secos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Alusión a Ezequiel 37:3. La expresión griega evoca la pregunta del profeta sobre el valle de huesos secos.
    reason: cross_reference
  - marker: b
    text: 'También: «confirmó a Ezequiel» o «llamó como testigo a Ezequiel». El verbo griego tiene un sentido testimonial y no se deja reducir fácilmente a una sola expresión española.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστοποιεῖτο
  english_pob_choice: bore witness to
  chosen_spanish: dio testimonio de
  alternatives_spanish:
  - confirmó
  - apeló al testimonio de
  - llamó como testigo a
  lexicon: LSJ
  rationale: El verbo medio/pasivo tiene un matiz testimonial difícil de condensar en una sola palabra española. «Dio testimonio de» conserva la fuerza de apelación a un testimonio profético sin volver la frase rígida o interpretativamente excesiva.
- source_word: τὸν Ἰεζεκιὴλ
  english_pob_choice: Ezekiel
  chosen_spanish: Ezequiel
  alternatives_spanish:
  - Ezequiel
  lexicon: Nombre propio estándar
  rationale: El nombre propio se translitera al uso normal del español bíblico, manteniendo la referencia profética reconocible.
- source_word: τὸν λέγοντα
  english_pob_choice: who says
  chosen_spanish: quien dice
  alternatives_spanish:
  - que dice
  - quien decía
  lexicon: BDAG
  rationale: El participio introduce una cita; en español, «quien dice» reproduce de modo natural la fórmula de cita en presente, como en el inglés auditado.
- source_word: Εἰ ζήσεται
  english_pob_choice: Will ... live?
  chosen_spanish: ¿Vivirán... ?
  alternatives_spanish:
  - ¿Si vivirán... ?
  - ¿Llegarán a vivir... ?
  - ¿Vivirán éstos...?
  lexicon: BDAG
  rationale: 'En este eco de Ezequiel 37:3, εἰ funciona interrogativamente. El español natural es una pregunta directa en futuro: «¿Vivirán...?»; conserva el carácter retórico sin forzar una estructura condicional ajena al sentido.'
- source_word: τὰ ὀστᾶ τὰ ξηρὰ ταῦτα
  english_pob_choice: these dry bones
  chosen_spanish: estos huesos secos
  alternatives_spanish:
  - estos huesos, los secos
  - estos huesos desecados
  lexicon: LSJ
  rationale: «Huesos secos» es la forma idiomática y mantiene con claridad la alusión a la visión de Ezequiel. La inversión normal en español evita un calco innecesario.
theological_decisions:
- issue: Conservar la alusión a Ezequiel 37 sin explicitar más de lo que el verso dice
  english_pob_reading: An appeal to Ezekiel's testimony, preserving the allusive force of the dry-bones vision.
  chosen_spanish_reading: Un testimonio que remite a Ezequiel 37 y conserva la pregunta profética sobre los huesos secos.
  alternative_spanish_readings:
  - Una cita profética que ya implica resurrección corporal
  - Una afirmación directa de resurrección
  rationale: El versículo alude a la esperanza profética, pero no desarrolla por sí mismo la conclusión doctrinal. La redacción española mantiene la tensión y la referencia bíblica sin añadir una explicación teológica que el texto no formula.
  doctrine_reference: Preservar la tensión teológica y la intertextualidad; primacía del texto fuente sobre la ampliación doctrinal.
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo estable en la última revisión; no se reportaron cambios aplicados. Esta propuesta sigue esa lectura, conservando la alusión a Ezequiel 37 y el matiz testimonial del verbo griego.
  spanish_consistency_notes:
  - Se usa «Ezequiel» con la transliteración habitual en español.
  - «Dio testimonio de» conserva el valor de apelación/testimonio sin sustituirlo por un verbo más interpretativo como «confirmó».
  - La pregunta se formula en futuro interrogativo, que es natural en español y corresponde al sentido del griego en esta cita.
  - Se evita «SEÑOR» u otra terminología no pertinente, pues el verso no contiene el nombre divino.
