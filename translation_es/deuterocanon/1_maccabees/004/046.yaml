translation:
  language: es
  text: Y pusieron aparte las piedras en el monte de la Casa, en un lugar adecuado[a], hasta que viniera un profeta para dar respuesta acerca de ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en el monte de la casa», es decir, el monte o colina del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέθεντο
  english_pob_choice: set ... aside
  chosen_spanish: depositaron
  alternatives_spanish:
  - las apartaron
  - las dejaron aparte
  - las pusieron a resguardo
  lexicon: BDAG
  rationale: El verbo medio aquí indica poner algo aparte para una disposición posterior. «Depositaron» comunica bien esa acción de dejar las piedras guardadas para más adelante, sin sonar mecánico en español.
- source_word: τοὺς λίθους
  english_pob_choice: the stones
  chosen_spanish: las piedras
  alternatives_spanish:
  - estas piedras
  - las piedras del altar
  lexicon: BDAG
  rationale: El griego dice simplemente «las piedras». En español conviene mantener la referencia explícita y dejar que el contexto inmediato indique de cuáles piedras se trata.
- source_word: ἐν τῷ ὄρει τοῦ οἴκου
  english_pob_choice: on the temple hill
  chosen_spanish: en el monte de la Casa[a]
  alternatives_spanish:
  - en el monte del templo
  - en el monte de la Casa de Dios
  - en el cerro del templo
  lexicon: LEH
  rationale: La expresión es literalmente «en el monte de la casa» y funciona como un giro idiomático para el monte del templo. «Monte de la Casa» conserva mejor la forma subyacente del texto y permite la nota explicativa.
- source_word: ἐν τόπῳ ἐπιτηδείῳ
  english_pob_choice: in a suitable place
  chosen_spanish: en un lugar adecuado
  alternatives_spanish:
  - en un lugar conveniente
  - en un lugar apropiado
  - en un lugar apto
  lexicon: BDAG
  rationale: ἐπιτήδειος expresa idoneidad o conveniencia. «Lugar adecuado» es natural en español y conserva el matiz evaluativo sin ampliar el sentido.
- source_word: μέχρι τοῦ παραγενηθῆναι
  english_pob_choice: until ... should come
  chosen_spanish: hasta que viniera
  alternatives_spanish:
  - hasta que llegara
  - hasta la venida de
  - hasta que apareciera
  lexicon: BDAG
  rationale: La construcción expresa un punto futuro esperado desde la narración. «Hasta que viniera» reproduce ese valor prospectivo de forma idiomática en español.
- source_word: προφήτην
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - el profeta
  - algún profeta
  lexicon: BDAG
  rationale: El acusativo sin artículo se entiende mejor de modo indefinido. El texto no identifica a un profeta concreto, sino que espera la llegada de uno.
- source_word: τοῦ ἀποκριθῆναι περὶ αὐτῶν
  english_pob_choice: to give an answer concerning them
  chosen_spanish: para responder acerca de ellas
  alternatives_spanish:
  - para dar una respuesta acerca de ellas
  - para decidir sobre ellas
  - para pronunciarse acerca de ellas
  lexicon: BDAG
  rationale: ἀποκριθῆναι significa responder, y περὶ αὐτῶν, acerca de ellas. «Responder acerca de ellas» mantiene el sentido consultivo sin convertirlo en una decisión jurídica explícita.
theological_decisions:
- issue: Función del futuro profeta
  english_pob_reading: a future prophet is awaited to provide authoritative guidance about the stones
  chosen_spanish_reading: se espera a un profeta futuro para responder acerca de las piedras
  alternative_spanish_readings:
  - se espera a un profeta para dictaminar sobre las piedras
  - se deja el asunto hasta que llegue un profeta
  rationale: El griego presenta una espera real de orientación profética respecto de las piedras. La traducción conserva esa tensión sin especificar más de lo que dice el texto sobre el tipo exacto de respuesta.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el estado más reciente indica que el borrador inglés quedó sin cambios y con alta concordancia con la fuente griega.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa «profeta» de forma indefinida, acorde con el artículo ausente en griego.
  - «Monte de la Casa» conserva la metáfora original y se aclara con nota para lectores que prefieran una equivalencia funcional.
