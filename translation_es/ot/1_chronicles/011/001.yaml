revisions:
- from: 'Entonces se reunieron con David en Hebrón[a], diciendo: «Mira, somos tu hueso y tu carne».'
  to: 'Entonces todo Israel se reunió a David en Hebrón, diciendo: «He aquí, somos tu hueso y tu carne[a]».'
  rationale: Se ajusta «con David» a «a David» para reflejar mejor אֶל; se eleva «Mira» a «He aquí» por fidelidad al registro del POB y al tono bíblico en español; y se mueve la nota al modismo corporal, que es donde pertenece la alternativa léxica. También se explicita «todo Israel» en el texto, conforme a las decisiones léxicas ya documentadas.
