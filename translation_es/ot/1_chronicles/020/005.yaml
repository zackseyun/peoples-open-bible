translation:
  language: es
  text: Y hubo otra vez guerra con los filisteos[a], y Elhanán hijo de Jair derribó a Lahmi, hermano de Goliat el geteo, cuya asta de lanza era como un travesaño de tejedor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo de 2 Samuel 21:19 tiene un hebreo difícil y suele discutirse en relación con este versículo; Crónicas dice explícitamente que Elhanán derribó a Lahmi, hermano de Goliat.
    reason: textual_variant
lexical_decisions:
- source_word: וַתְּהִי עוֹד מִלְחָמָה
  english_pob_choice: And there was war ... again
  chosen_spanish: Y hubo otra vez guerra
  alternatives_spanish:
  - Y todavía hubo guerra
  - Y hubo guerra de nuevo
  lexicon: HALOT
  rationale: El hebreo introduce un nuevo episodio de conflicto continuo; «otra vez» comunica con naturalidad el valor de עוֹד en contexto y evita un calco pesado de «todavía».
- source_word: אֶת פְּלִשְׁתִּים
  english_pob_choice: with the Philistines
  chosen_spanish: con los filisteos
  alternatives_spanish:
  - contra los filisteos
  lexicon: HALOT
  rationale: En español, «hubo guerra con» expresa bien la relación hostil del conflicto. «Contra» también sería posible, pero «con» sigue la solución idiomática del POB inglés.
- source_word: וַיַּךְ
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - derribó
  - mató
  lexicon: HALOT
  rationale: El verbo hebreo נכה admite «herir», «golpear» o «derribar». Aquí el contexto bélico implica derrota mortal, pero «hirió» conserva la imagen verbal sin anticipar más de lo que el hebreo dice explícitamente.
- source_word: אֶלְחָנָן בֶּן יעור
  english_pob_choice: Elhanan son of Jair
  chosen_spanish: Elhanán hijo de Jair
  alternatives_spanish:
  - Elhanán, hijo de Jair
  lexicon: HALOT
  rationale: 'Se mantiene el nombre propio según la forma tradicional en español para יער/יעור en este pasaje: «Jair». «Hijo de Jair» reproduce la filiación de modo claro y fiel.'
- source_word: אֶת לַחְמִי
  english_pob_choice: Lahmi
  chosen_spanish: Lahmi
  lexicon: HALOT
  rationale: Se conserva el nombre propio tal como lo vocaliza y lo entiende el texto masorético de Crónicas, sin armonizarlo con la dificultad del paralelo de Samuel.
- source_word: אֲחִי גָּלְיָת
  english_pob_choice: the brother of Goliath
  chosen_spanish: hermano de Goliat
  alternatives_spanish:
  - el hermano de Goliat
  lexicon: HALOT
  rationale: La relación de parentesco es explícita en el hebreo. «Hermano de Goliat» mantiene la estructura y el sentido sin añadir explicaciones.
- source_word: הַגִּתִּי
  english_pob_choice: the Gittite
  chosen_spanish: el geteo
  alternatives_spanish:
  - el giteo
  - el de Gat
  lexicon: HALOT
  rationale: «Geteo» es la forma española establecida para el gentilicio de Gat y conserva el valor étnico/geográfico del hebreo. Se evita sustituirlo por una paráfrasis.
- source_word: וְעֵץ חֲנִיתוֹ
  english_pob_choice: whose spear shaft
  chosen_spanish: cuyo asta de lanza
  alternatives_spanish:
  - y el asta de su lanza
  - y la madera de su lanza
  lexicon: HALOT
  rationale: עֵץ puede designar la madera o el asta/sháft de un arma. «Asta de lanza» comunica bien la imagen concreta y evita la ambigüedad de «madera» en español.
- source_word: כִּמְנוֹר אֹרְגִים
  english_pob_choice: was like a weaver’s beam
  chosen_spanish: era como el enjullo de los tejedores
  alternatives_spanish:
  - era como el enjulio de los tejedores
  - era como un denso travesaño de tejedores
  lexicon: HALOT
  rationale: מְנוֹר es el travesaño o rollo del telar; en español técnico-biblico «enjullo» reproduce mejor el objeto comparado que una expresión más interpretativa. «De los tejedores» preserva el plural del hebreo.
theological_decisions:
- issue: Relación con el pasaje paralelo de 2 Samuel 21:19, que presenta una dificultad textual conocida
  english_pob_reading: 'Follow the Chronicler''s explicit wording: Elhanan killed Lahmi, the brother of Goliath.'
  chosen_spanish_reading: 'Seguir la formulación explícita de Crónicas: Elhanán hirió a Lahmi, hermano de Goliat.'
  alternative_spanish_readings:
  - Armonizar Samuel para que diga también que fue el hermano de Goliat
  - Releer Lahmi como parte de otra solución derivada del paralelo de Samuel
  rationale: Crónicas dice de manera directa que Elhanán hirió a Lahmi, hermano de Goliat. La traducción española debe reflejar esa afirmación sin importar al texto la dificultad del paralelo de Samuel; la nota remite a la tensión textual sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El contexto auditado coincide en alta medida con la lectura final aprobada del inglés POB; no se registran revisiones posteriores que alteren el sentido base. Se ha mantenido la decisión de Crónicas frente a la dificultad del paralelo de Samuel, y se ha conservado la comparación de la lanza como objeto de telar con un equivalente español técnico y comprensible.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como preferencia general del proyecto, pero aquí no aparece el tetragrámaton.
  - Se usa «filisteos» en minúscula por norma española y por tratarse de un nombre étnico.
  - Se conserva «Goliat» con la forma española usual.
  - «Geteo» se emplea como gentilicio bíblico tradicional y claro para lectores de español.
  - La nota al pie marcada [a] corresponde al único punto textual relevante del versículo.
