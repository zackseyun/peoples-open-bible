translation:
  language: es
  text: Oigan mis palabras, hombres sabios, y préstenme oído[a], ustedes que saben.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O también «escúchenme»; el verbo hebreo es más literalmente un mandato relacionado con el oído.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oigan atentamente
  lexicon: HALOT
  rationale: El imperativo plural de שמע pide un llamado directo a oír/escuchar. «Oigan» conserva la fuerza imperativa, es natural en español y mantiene el paralelismo con el segundo mandato.
- source_word: חֲכָמִים
  english_pob_choice: wise men
  chosen_spanish: hombres sabios
  alternatives_spanish:
  - sabios
  - hombres sabios
  lexicon: HALOT
  rationale: La forma masculina plural vocativa se refleja mejor con un vocativo explícito. «Hombres sabios» mantiene el matiz personal del original sin volverlo una abstracción.
- source_word: מִלָּי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi խոսa
  - mi discurso
  - lo que digo
  lexicon: HALOT
  rationale: מִלָּה/מִלִּים en estilo de Job designa «palabra/expresión». «Mis palabras» es la equivalencia más directa y conserva el plural concreto del hebreo.
- source_word: וְיֹדְעִים
  english_pob_choice: you who know
  chosen_spanish: ustedes que saben
  alternatives_spanish:
  - los que saben
  - ustedes entendidos
  - ustedes que conocen
  lexicon: HALOT
  rationale: El participio plural funciona sustantivamente y en vocativo. «Ustedes que saben» conserva el valor descriptivo y suena idiomático en español.
- source_word: הַאֲזִינוּ
  english_pob_choice: give ear to me
  chosen_spanish: préstenme atención
  alternatives_spanish:
  - escúchenme
  - inclinen el oído hacia mí
  - atiéndanme
  lexicon: HALOT
  rationale: El hebreo es literalmente un mandato de ‘dar oído’. En español, «préstenme atención» comunica bien el giro idiomático sin perder el tono formal ni la relación con el primer imperativo.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: El complemento indirecto puede incorporarse naturalmente al verbo en español. «Préstenme» conserva el sentido de לִי de manera más fluida que una construcción pesada con preposición explícita.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés, incluyendo la revisión que cambió «listen to me» por «give ear to me» para reflejar más de cerca el segundo imperativo y su paralelismo con el primero.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y vocativo apropiado para discurso sapiencial.
  - Se evitó traducir el segundo imperativo con una simple repetición de «escuchen» para conservar el matiz auditivo más específico del hebreo.
  - Se preservó el plural de «palabras» para reflejar el hebreo מִלָּי.
