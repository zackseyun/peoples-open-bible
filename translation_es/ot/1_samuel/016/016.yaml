revisions:
- from: Por favor, permita que nuestro señor diga a sus siervos, delante de usted, que busquen a un hombre que sepa tocar el arpa; y cuando un espíritu dañino de parte de Dios esté sobre usted[a], él tocará con su mano, y le irá bien.
  to: Por favor, que nuestro señor diga a sus siervos que están delante de usted que busquen a un hombre que sepa tocar la lira; y cuando un espíritu dañino de parte de Dios esté sobre usted[a], él tocará con su mano, y le irá bien.
  rationale: Se reemplazó 'arpa' por 'lira' para seguir la decisión léxica auditada sobre כִּנּוֹר. Se suavizó la sintaxis inicial para un español más natural sin perder la petición cortés ni la referencia a los siervos presentes ante el rey. Se limpió la nota al pie eliminando el anglicismo y manteniendo las alternativas semánticas y sintácticas documentadas.
  reviewer_model: gpt-5.4
