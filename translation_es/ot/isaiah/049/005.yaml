translation:
  language: es
  text: 'Y ahora dice Yahvé: el que me formó desde el vientre para ser su siervo, para hacer volver a Jacob hacia él, y para que Israel sea reunido a él[a]; sin embargo, soy honrado ante Yahvé, y mi Dios ha venido a ser mi fuerza.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto consonántico hebreo dice: ''y Israel no será reunido'' (o ''aunque Israel no sea reunido''). Muchos intérpretes antiguos y versiones entienden el sentido como ''y para que Israel sea reunido a él'', lo cual encaja con la línea paralela ''para hacer volver a Jacob hacia él''.'
    reason: textual_variant
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el convenio del proyecto para el nombre divino, conservando la referencia al nombre propio del pacto y evitando el reemplazo por una máscara litúrgica.
- source_word: יֹצְרִי מִבֶּטֶן
  english_pob_choice: he who formed me from the womb
  chosen_spanish: el que me formó desde el vientre
  alternatives_spanish:
  - el que me modeló desde el vientre
  - el que me hizo desde el vientre
  lexicon: HALOT
  rationale: יֹצֵר comunica formar/modelar con intención. 'Desde el vientre' reproduce el marco temporal de origen vocacional y resulta natural en español bíblico contemporáneo.
- source_word: לְעֶבֶד לוֹ
  english_pob_choice: to be his servant
  chosen_spanish: para ser su esclavo
  alternatives_spanish:
  - para ser su siervo
  - para servirle
  lexicon: HALOT
  rationale: La decisión del proyecto en inglés fue 'slave' para conservar la fuerza lexical de עֶבֶד. En español, 'esclavo' mantiene esa fuerza semántica; 'siervo' suavizaría el término y perdería parte del peso del vocablo fuente.
- source_word: לְשׁוֹבֵב יַעֲקֹב אֵלָיו
  english_pob_choice: to bring Jacob back to him
  chosen_spanish: para hacer volver a Jacob hacia él
  alternatives_spanish:
  - para restaurar a Jacob hacia él
  - para volver a traer a Jacob hacia él
  lexicon: HALOT
  rationale: שׁוֹבֵב expresa la idea causativa de retorno/restauración. 'Hacer volver' conserva la causalidad verbal de forma clara en español y mantiene el movimiento hacia Yahvé.
- source_word: וְיִשְׂרָאֵל לֹא יֵאָסֵף
  english_pob_choice: and that Israel might be gathered to him
  chosen_spanish: y para que Israel sea reunido a él
  alternatives_spanish:
  - y que Israel no sea reunido
  - y aunque Israel no sea reunido
  - y para que Israel se reúna con él
  lexicon: HALOT
  rationale: Se adopta la lectura contextual que entiende el pasaje como misión de reunificación, siguiendo la opción del audit trail inglés. 'Sea reunido' preserva la pasiva resultativa y la referencia implícita a Dios/hacia él.
- source_word: וְאֶכָּבֵד בְּעֵינֵי יְהוָה
  english_pob_choice: yet I am honored in the eyes of Yahweh
  chosen_spanish: aunque soy honrado en los ojos de Yahvé
  alternatives_spanish:
  - y soy honrado ante Yahvé
  - y seré honrado ante Yahvé
  - pero soy glorificado ante Yahvé
  lexicon: HALOT
  rationale: כָּבֵד en nifal puede ser 'ser honrado/glorificado'. 'Soy honrado' es claro y conserva el contraste implícito introducido por 'aunque'.
- source_word: וֵאלֹהַי הָיָה עֻזִּי
  english_pob_choice: and my God has become my strength
  chosen_spanish: y mi Dios ha venido a ser mi fuerza
  alternatives_spanish:
  - y mi Dios ha sido mi fuerza
  - y mi Dios se ha vuelto mi fuerza
  - y mi Dios es mi fuerza
  lexicon: HALOT
  rationale: עֹז es fuerza. 'Ha venido a ser' refleja bien el valor de הָיָה con resultado presente, sin perder la historicidad del acto divino.
theological_decisions:
- issue: Lectura de וְיִשְׂרָאֵל לֹא יֵאָסֵף
  english_pob_reading: Read in the main text as 'and that Israel might be gathered to him,' with the negative-text alternative preserved in a footnote.
  chosen_spanish_reading: Se deja en el texto principal como 'y para que Israel sea reunido a él', con la alternativa negativa del texto consonántico preservada en nota.
  alternative_spanish_readings:
  - y Israel no sea reunido
  - aunque Israel no sea reunido
  - y Israel no será reunido
  rationale: La forma consonántica permite una lectura negativa, pero el paralelismo inmediato con 'hacer volver a Jacob' y el contexto de misión del Siervo favorecen la lectura de reunificación. Para no borrar la tensión textual documentada, la lectura más coherente va en el texto principal y la negativa queda registrada en nota.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Valor de עֶבֶד en el contexto del Siervo
  english_pob_reading: to be his servant
  chosen_spanish_reading: para ser su esclavo
  alternative_spanish_readings:
  - para ser su siervo
  - para servirle
  rationale: Aunque 'siervo' es frecuente en español bíblico, aquí el expediente inglés documenta la preferencia por 'slave' para conservar el peso lexical de עֶבֶד. La elección 'esclavo' evita suavizar el término y deja abierta la función vocacional del Siervo sin domesticar el vocablo.
  doctrine_reference: Project lexical defaults for δοῦλος / עֶבֶד
translation_notes:
  revision_awareness: El expediente inglés indica que no hubo revisiones aplicadas y que la última pasada quedó sin cambios. La versión española sigue esa línea, manteniendo la lectura principal coherente con el audit trail y registrando la variante textual en nota sin intentar resolverla por paráfrasis.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino en concordancia con el proyecto.
  - '''Esclavo'' se usa para reflejar la fuerza de עֶבֶד según la decisión léxica documentada.'
  - '''Fuerza'' traduce עֹז de manera directa y sobria, en vez de ''fortaleza'' o ''refugio'', para no introducir matices no atestiguados.'
  - La nota textual debe anclarse en la frase sobre Israel reunido; no se agrega otra nota distinta en el texto principal.
