translation:
  language: es
  text: Entonces establecieron un decreto para hacer circular una proclamación por todo Israel[a], desde Beerseba hasta Dan, para que vinieran a celebrar la Pascua para Yahvé, el Dios de Israel, en Jerusalén; porque no la habían celebrado conforme a lo escrito desde hacía mucho tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque no la habían celebrado conforme a lo escrito por mucho tiempo». El hebreo es comprimido y puede entenderse como una referencia al largo tiempo sin observarla según la norma prescrita; también se ha considerado, pero no preferido, la idea de que no muchos la habían celebrado.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲמִידוּ דָבָר
  english_pob_choice: they established a decree
  chosen_spanish: establecieron un decreto
  alternatives_spanish:
  - tomaron una resolución
  - promulgaron una decisión
  - establecieron un asunto
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es ‘hicieron estar de pie una palabra/asunto’, pero en este contexto administrativo implica una decisión oficial. ‘Establecieron un decreto’ conserva el tono formal y público mejor que una versión demasiado literal.
- source_word: לְהַעֲבִיר קוֹל
  english_pob_choice: to send a proclamation
  chosen_spanish: hacer circular una proclamación
  alternatives_spanish:
  - publicar un mensaje
  - hacer pasar una voz
  - difundir una proclamación
  lexicon: HALOT
  rationale: La imagen literal es ‘hacer pasar una voz’, pero aquí se trata de anunciar públicamente una convocatoria. ‘Hacer circular una proclamación’ suena natural en español y mantiene la difusión oficial.
- source_word: בְּכָל יִשְׂרָאֵל
  english_pob_choice: throughout all Israel
  chosen_spanish: por todo Israel
  alternatives_spanish:
  - en todo Israel
  - a través de todo Israel
  lexicon: HALOT
  rationale: La frase marca el alcance geográfico completo del anuncio. ‘Por todo Israel’ comunica bien la extensión territorial sin sonar forzado.
- source_word: מִבְּאֵר שֶׁבַע וְעַד דָּן
  english_pob_choice: from Beersheba to Dan
  chosen_spanish: desde Beerseba hasta Dan
  alternatives_spanish:
  - desde Beerseba hasta Dan
  lexicon: HALOT
  rationale: Se conserva el merismo tradicional de sur a norte con nombres propios transliterados de forma transparente y comprensible.
- source_word: לָבוֹא
  english_pob_choice: that they should come
  chosen_spanish: para que vinieran
  alternatives_spanish:
  - para venir
  - a fin de que vinieran
  lexicon: HALOT
  rationale: El infinitivo expresa el contenido de la proclamación; ‘para que vinieran’ aclara la finalidad en español sin añadir contenido.
- source_word: לַעֲשׂוֹת פֶּסַח
  english_pob_choice: to keep the Passover
  chosen_spanish: a celebrar la Pascua
  alternatives_spanish:
  - a guardar la Pascua
  - a observar la Pascua
  - a hacer la Pascua
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘hacer Pascua’, pero en español bíblico contemporáneo ‘celebrar la Pascua’ transmite la observancia festiva de modo claro y digno. ‘Guardar’ u ‘observar’ serían posibles, pero aquí ‘celebrar’ evita rigidez y sigue siendo fiel al acto ritual.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se mantiene el nombre divino ‘Yahvé’ según la terminología del proyecto. ‘Para Yahvé’ refleja el destino/relación cultual del acto y evita la sustitución por una máscara genérica.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Renderiza de forma directa el constructo hebreo sin pérdida de claridad teológica o sintáctica.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: at Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la Jerusalén
  lexicon: HALOT
  rationale: ‘En Jerusalén’ es la preposición más natural en español y comunica la localización del culto.
- source_word: כִּי לֹא לָרֹב עָשׂוּ כַּכָּתוּב
  english_pob_choice: for they had not kept it according to what is written for a long time
  chosen_spanish: porque no la habían celebrado conforme a lo escrito desde hacía mucho tiempo
  alternatives_spanish:
  - porque no la habían celebrado en gran número conforme a lo escrito
  - porque no muchos la habían celebrado conforme a lo escrito
  lexicon: HALOT
  rationale: 'Se adopta la lectura revisada del POB: el hebreo comprimido sugiere que no la habían observado conforme a lo prescrito durante mucho tiempo, más que una referencia primaria al número de participantes. ‘Conforme a lo escrito’ preserva la norma textual; ‘desde hacía mucho tiempo’ expresa el valor temporal que el contexto y la revisión favorecen.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. En la línea terminológica del proyecto se usa ‘Yahvé’ para conservar el nombre del pacto sin enmascararlo con un título genérico. Esta decisión afecta la lectura devocional y textual del versículo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de לַעֲשׂוֹת פֶּסַח
  english_pob_reading: to keep the Passover
  chosen_spanish_reading: a celebrar la Pascua
  alternative_spanish_readings:
  - a guardar la Pascua
  - a observar la Pascua
  - a hacer la Pascua
  rationale: El mandato no es meramente nominal, sino una convocatoria a la observancia festiva. ‘Celebrar’ comunica bien el acto litúrgico sin perder la referencia a una práctica prescrita. No se fuerza un sentido sacramental ajeno al hebreo.
  doctrine_reference: Uso ritual y narrativo de la Pascua en el Antiguo Testamento
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del POB para la cláusula final: no interpreta לָרֹב principalmente como ‘en gran número’, sino como un giro comprimido que apunta a la observancia conforme a lo escrito y a su prolongada ausencia. También conserva el nombre divino según la política terminológica actual del proyecto, en contraste con la edición inglesa previa que usaba ‘the LORD’.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יהוה de manera consistente con la política del proyecto.
  - Se mantiene ‘Pascua’ para פֶּסַח, y ‘celebrar’ como verbo natural para la observancia festiva.
  - ‘Proclamación’ y ‘decreto’ conservan el tono oficial del pasaje.
  - La merisma ‘desde Beerseba hasta Dan’ se deja intacta para preservar el alcance total del anuncio.
