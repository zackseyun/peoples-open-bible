  rationale: 표준 등가어.
- source_word: καλῶς ἀνέχεσθε
  english_pob_choice: put up with it well enough
  chosen_korean: 잘도 참아 줍니다
  lexicon: BDAG
  rationale: 비꼬는 어조. 「잘도 ~합니다」가 한국어에서 그 비아냥을 자연스럽게 전달한다.
  alternatives_korean:
  - 흔쾌히 받아들입니다
