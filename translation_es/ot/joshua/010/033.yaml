translation:
  language: es
  text: Entonces Horam, rey de Gezer, subió para ayudar a Laquis, y Josué lo derrotó a él y a su pueblo hasta no dejarle ningún sobreviviente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ningún remanente». El hebreo שָׂרִיד puede designar a un sobreviviente o a uno que queda.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca secuencia narrativa; «Entonces» conserva el avance temporal de la historia en un español natural y sobrio.
- source_word: עָלָה
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - subió para ir
  - ascendió
  lexicon: HALOT
  rationale: El hebreo usa el verbo literal de ascenso/movimiento, que en contexto militar puede indicar desplazamiento hacia un objetivo. «Subió» conserva esa imagen sin forzar un matiz interpretativo adicional.
- source_word: הֹרָם
  english_pob_choice: Horam
  chosen_spanish: Horam
  alternatives_spanish:
  - Joram
  lexicon: transliteración del nombre propio
  rationale: Se mantiene la transliteración usada en el audit trail inglés para el nombre del rey.
- source_word: מֶלֶךְ גֶּזֶר
  english_pob_choice: king of Gezer
  chosen_spanish: rey de Gezer
  alternatives_spanish:
  - monarca de Gezer
  lexicon: HALOT
  rationale: La cadena constructa identifica cargo y ciudad; «rey de Gezer» es la forma directa y fiel en español.
- source_word: לַעְזֹר אֶת לָכִישׁ
  english_pob_choice: to help Lachish
  chosen_spanish: para ayudar a Laquis
  alternatives_spanish:
  - a socorrer a Laquis
  - para prestar ayuda a Laquis
  lexicon: HALOT
  rationale: «Ayudar» reproduce el valor básico de עזר; el complemento se expresa con «a» en español para reflejar la relación entre la acción y la ciudad sin añadir especificación militar no presente en el hebreo.
- source_word: וַיַּכֵּהוּ
  english_pob_choice: struck him
  chosen_spanish: lo hirió a él
  alternatives_spanish:
  - lo golpeó
  - lo derrotó
  lexicon: HALOT
  rationale: El verbo נכה puede abarcar golpear o herir/abatir. Dado que el verso continúa con una derrota total, «hirió» conserva la fuerza física del verbo sin cerrar prematuramente la escena como «derrotó».
- source_word: וְאֶת עַמּוֹ
  english_pob_choice: and his people
  chosen_spanish: y a su pueblo
  alternatives_spanish:
  - y a su gente
  - y a sus hombres
  lexicon: HALOT
  rationale: «Pueblo» reproduce el alcance amplio de עַם. Se mantiene «a» por la sintaxis española con verbo transitivo de acción contra personas.
- source_word: עַד בִּלְתִּי הִשְׁאִיר ל֖/וֹ שָׂרִיד
  english_pob_choice: until he left him no survivor
  chosen_spanish: hasta no dejarle ningún sobreviviente
  alternatives_spanish:
  - hasta no dejarle ningún remanente
  - hasta no dejarle ninguno con vida
  lexicon: HALOT
  rationale: La construcción expresa resultado total. «Hasta no dejarle ningún sobreviviente» conserva el sentido de ausencia total de sobrevivientes y respeta la relación del pronombre dativo «le».
theological_decisions:
- issue: Valor de שָׂרִיד
  english_pob_reading: Or 'no remnant.' The Hebrew שָׂרִיד can denote a survivor or one remaining.
  chosen_spanish_reading: «sobreviviente» con nota alternativa a «remanente»
  alternative_spanish_readings:
  - remanente
  - el que queda
  rationale: El hebreo permite tanto la idea de sobreviviente como la de resto/remanente. En español, «sobreviviente» es más natural en esta estructura, pero la nota preserva la tensión semántica documentada por el audit trail inglés.
  doctrine_reference: None
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo en el audit trail inglés y no registra revisiones aplicadas; la redacción española sigue de cerca la sintaxis hebrea y conserva la alternativa semántica de שָׂרִיד en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere; aquí no aparece.
  - Se mantiene «Laquis» y «Gezer» como transliteraciones estándar de topónimos.
  - Se evita «SEÑOR» y «Cristo» porque no corresponden a este versículo.
  - «Pueblo» traduce עַם sin restringirlo a ejército, conforme al audit trail inglés.
  - La puntuación y el orden verbal buscan ser naturales en español sin perder la estructura narrativa del hebreo.
