base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/010/008.yaml
  text: And they said to her[a], “May the God of our fathers grant you favor[d][c][b], and bring your undertakings to completion for the glory of the sons of Israel and the exaltation of Jerusalem.” And she bowed down to God.
  footnotes:
  - marker: a
    text: Or “grant you grace” / “grant you acceptance.” The Greek phrase literally says “give you into favor,” an idiom for granting favorable reception or success.
    reason: lexical_alternative
  - marker: b
    text: Or “your plans” or “your pursuits.” The Greek term can refer broadly to one’s undertakings or course of action.
    reason: lexical_alternative
  - marker: c
    text: Or “for the glory of the Israelites and the honor of Jerusalem.”
    reason: alternative_reading
  - marker: d
    text: Or “she worshiped God” or “she prostrated herself before God.”
    reason: lexical_alternative
