translation:
  language: es
  text: y para enseñar a los hijos de Israel todos los estatutos que Yahvé les ha dicho por medio de Moisés[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por la mano de Moisés».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/הוֹרֹת
  english_pob_choice: and to teach
  chosen_spanish: y para enseñar
  alternatives_spanish:
  - y para instruir
  - y a enseñar
  lexicon: HALOT
  rationale: El infinitivo causativo con prefijo expresa finalidad dentro de la función sacerdotal; en español, 'para enseñar' comunica con naturalidad la idea de transmitir instrucción sin endurecer el giro.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  - los niños de Israel
  lexicon: HALOT
  rationale: Se conserva el valor literal de la expresión filial masculina en un sentido corporativo de pacto. 'Hijos de Israel' es transparente en español bíblico y evita aplanar la forma hebrea.
- source_word: כָּל הַחֻקִּים
  english_pob_choice: all the statutes
  chosen_spanish: todos los estatutos
  alternatives_spanish:
  - todos los decretos
  - todas las ordenanzas
  lexicon: HALOT
  rationale: '''Estatutos'' refleja bien חֻקִּים en registro legal-covenantal y mantiene la terminología bíblica tradicional sin perder claridad.'
- source_word: אֲשֶׁר דִּבֶּר יְהוָה
  english_pob_choice: that Yahweh has spoken
  chosen_spanish: que Yahvé les ha hablado
  alternatives_spanish:
  - que Yahvé ha dicho
  - que Yahvé les habló
  lexicon: HALOT
  rationale: Se traduce el verbo de habla divina con perfecto compuesto para expresar palabra ya pronunciada con vigencia presente. 'Les ha hablado' hace explícito el destinatario indicado por אֲלֵיהֶם.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar el nombre divino ''Yahvé'' en vez de una sustitución titulada.'
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: HALOT
  rationale: En español, el dativo clítico 'les' expresa con naturalidad el destinatario del discurso divino sin añadir pesadez sintáctica.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: by the hand of Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por la mano de Moisés
  - a través de Moisés
  - mediante Moisés
  lexicon: HALOT
  rationale: Se preserva la mediación de Moisés con una fórmula idiomática clara en español. La imagen literal 'por la mano de' se reserva en nota como posibilidad de lectura más cercana al hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo emplea directamente el nombre del pacto; la traducción mantiene ese valor nominativo y no lo sustituye por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Carácter corporativo y masculino de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se mantiene la forma masculina colectiva del hebreo, que funciona como designación del pueblo del pacto sin neutralizarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Mediación de Moisés en בְּיַד מֹשֶׁה
  english_pob_reading: by the hand of Moses
  chosen_spanish_reading: por medio de Moisés
  alternative_spanish_readings:
  - mediante Moisés
  - por la mano de Moisés
  rationale: La expresión comunica la mediación instrumentada por Moisés sin perder el sentido semítico de agencia delegada. En español, 'por medio de' es el equivalente más natural y fiel.
  doctrine_reference: HALOT / idiomática hebrea de agency
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no hubo cambios sustanciales en el texto fuente ni en la decisión de traducción; se mantiene la equivalencia óptima y la terminología del proyecto para el nombre divino y la mediación de Moisés.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - '''Hijos de Israel'' conserva la forma semítica masculina colectiva, coherente con la política de género-precisión.'
  - '''Por medio de Moisés'' es la opción principal; la lectura literal alternativa queda documentada en nota.'
  - '''Estatutos'' mantiene el registro jurídico-covenantal esperado en Levítico.'
