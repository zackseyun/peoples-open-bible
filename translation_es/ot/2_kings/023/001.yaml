translation:
  language: es
  text: Entonces el rey envió[a], y todos los ancianos de Judá y de Jerusalén se reunieron con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más explícitamente: «Entonces el rey envió por todos los ancianos de Judá y de Jerusalén, y ellos se reunieron con él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió por
  lexicon: HALOT
  rationale: En este contexto narrativo, שׁלח puede expresar el acto de despachar o convocar. «Envió» conserva la forma breve y natural del POB en inglés; «envió por» aclara la convocatoria, pero añade una explicitación que no está dicha de manera abierta en el hebreo.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El sustantivo con artículo se traduce de manera directa como «el rey». El contexto identifica a Josías, pero el versículo mismo conserva el título.
- source_word: וַיַּאַסְפוּ אֵלָיו
  english_pob_choice: were gathered to him
  chosen_spanish: fueron reunidos a él
  alternatives_spanish:
  - se congregaron ante él
  - se reunieron con él
  lexicon: HALOT
  rationale: El hebreo usa una forma activa plural con sujeto implícito; en español, la pasiva refleja el resultado de la convocatoria sin forzar un agente no expresado. «A él» mantiene el valor direccional de אֵלָיו.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos los
  lexicon: HALOT
  rationale: «Todos» comunica la totalidad del grupo de manera natural en español y preserva el valor cuantificador de כָּל.
- source_word: זִקְנֵי
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los líderes
  - los mayores
  lexicon: HALOT
  rationale: En este contexto gubernamental, זקנים se refiere a dirigentes reconocidos de la comunidad. «Ancianos» conserva el sentido institucional tradicional y evita reducirlo a la mera edad.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - la tierra de Judá
  lexicon: HALOT
  rationale: Nombre propio del reino/territorio; «Judá» es la forma estándar en español bíblico y mantiene la referencia geopolítica.
- source_word: וִירוּשָׁלִָם
  english_pob_choice: and Jerusalem
  chosen_spanish: y de Jerusalén
  alternatives_spanish:
  - y Jerusalén
  lexicon: HALOT
  rationale: La preposición española «de» hace natural la coordinación con «los ancianos de Judá y de Jerusalén», expresando que pertenecen o proceden de ambos ámbitos. El hebreo une los nombres con la waw coordinante, y el sentido en español requiere una relación explícita para la lista de grupos.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura revisada del POB inglés sin cambios sustantivos: el versículo conserva la concisión narrativa y la ambigüedad moderada de וַיִּשְׁלַח, mientras que la reunión se expresa como resultado de la convocatoria.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; aquí no aparece.
  - Se mantuvo el título «el rey» en vez de nombrar a Josías, porque el hebreo del versículo usa el título.
  - «Ancianos» se eligió por coherencia con el valor institucional de זקנים en contexto político, no como referencia meramente etaria.
