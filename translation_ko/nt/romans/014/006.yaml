id: ROM.14.6
reference: Romans 14:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ φρονῶν τὴν ἡμέραν κυρίῳ ⸀φρονεῖ. καὶ ὁ ἐσθίων κυρίῳ ἐσθίει, εὐχαριστεῖ γὰρ τῷ θεῷ· καὶ ὁ μὴ ἐσθίων κυρίῳ οὐκ ἐσθίει, καὶ εὐχαριστεῖ τῷ θεῷ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/006.yaml
  text: The one who observes the day, observes it for the Lord. And the one who eats, eats for the Lord, for he gives thanks to God; and the one who does not eat, does not eat for the Lord, and he gives thanks to God.
translation:
  language: ko
  text: 그 날을 중히 여기는[a] 자는 주를 위하여 중히 여깁니다. 먹는 자도 주를 위하여 먹습니다. 그가 하나님께 감사하기 때문입니다. 먹지 않는 자도 주를 위하여 먹지 않으며, 그도 하나님께 감사합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그 날에 마음을 둔다」. 헬라어 동사 φρονέω는 어떤 것에 마음을 두고 존중함을 가리킨다. 여기서는 한 날을 지키는 의미가 자연스럽다.
    reason: lexical_alternative
lexical_decisions:
- source_word: φρονῶν / φρονεῖ
  english_pob_choice: observes / observes it
  chosen_korean: 중히 여기다
  alternatives_korean:
  - 마음을 두다
  - 존중하다
  - 지키다
  lexicon: BDAG
  rationale: τὴν ἡμέραν과 결합한 φρονέω는 단순한 사고가 아니라 실천적 존중·지킴. 「중히 여기다」가 자연스럽다.
- source_word: κυρίῳ
  english_pob_choice: for the Lord
  chosen_korean: 주를 위하여
  alternatives_korean:
  - 주께
  lexicon: BDAG
  rationale: 방향·목적의 여격. 「주께」와 「주를 위하여」 사이에서 한국어 자연성을 위해 후자 선택. 정책 글로사리 κύριος→주.
- source_word: εὐχαριστεῖ τῷ θεῷ
  english_pob_choice: he gives thanks to God
  chosen_korean: 하나님께 감사하다
  lexicon: BDAG
  rationale: 표준 표현.
theological_decisions:
- issue: 「주」(κύριος)와 「하나님」(θεός)의 관계
  chosen_reading: 두 어휘를 구분하여 「주」와 「하나님」으로 별도 옮긴다
  alternative_readings:
  - 두 어휘를 「하나님」 하나로 통합
  rationale: 바울 용법에서 κύριος는 (문맥상) 예수를, θεός는 아버지를 가리키는 경향이 있다. 본문의 구분을 보존한다.
  doctrine_reference: 'DOCTRINE.md: κύριος→주'
