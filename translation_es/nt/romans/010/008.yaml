translation:
  language: es
  text: Pero ¿qué dice? «La palabra está cerca de ti[a], en tu boca y en tu corazón» — es decir[b], la palabra de la fe que proclamamos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensaje de la fe»; además, πίστις puede traducirse en algunos contextos como «fidelidad» o «confianza».
    reason: lexical_alternative
  - marker: b
    text: Pablo está haciendo eco de Deuteronomio 30:14 y aplicando su lenguaje al mensaje del evangelio que proclamamos.
    reason: cross_reference
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: La conjunción adversativa introduce un contraste directo con el argumento anterior; «Pero» es natural en español y conserva el giro paulino sin aumentar el tono.
- source_word: τί λέγει
  english_pob_choice: what does it say?
  chosen_spanish: ¿qué dice?
  alternatives_spanish:
  - ¿qué dice la Escritura?
  - ¿qué dice él?
  lexicon: BDAG
  rationale: El griego personifica la cita al usar un sujeto implícito; «¿qué dice?» mantiene esa concisión sin añadir «Escritura», que sería explicativo pero no explícito en el texto.
- source_word: Ἐγγύς
  english_pob_choice: near
  chosen_spanish: cerca
  alternatives_spanish:
  - próxima
  - al alcance
  lexicon: BDAG
  rationale: «Cerca» expresa de forma natural la cercanía espacial/metafórica de la cita y funciona bien en español dentro de la frase bíblica.
- source_word: τὸ ῥῆμά
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la declaración
  lexicon: BDAG
  rationale: Aunque ῥῆμα puede abarcar 'palabra', 'mensaje' o 'dicho', «la palabra» conserva la correspondencia con el texto citado y deja que la apposición de Pablo especifique su sentido evangélico.
- source_word: ἐν τῷ στόματί σου
  english_pob_choice: in your mouth
  chosen_spanish: en tu boca
  alternatives_spanish:
  - en tus labios
  lexicon: BDAG
  rationale: Es una equivalencia directa y bíblicamente transparente; «boca» mantiene la imagen corporal del original sin reescritura idiomática excesiva.
- source_word: ἐν τῇ καρδίᾳ σου
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - en tu interior
  lexicon: BDAG
  rationale: «Corazón» es el equivalente estándar de καρδία y conserva el sentido bíblico del centro interior de pensamiento, voluntad y compromiso.
- source_word: τοῦτ’ ἔστιν
  english_pob_choice: that is,
  chosen_spanish: es decir
  alternatives_spanish:
  - o sea
  - esto significa
  lexicon: BDAG
  rationale: La fórmula introduce la explicación paulina de la cita; «es decir» es claro y formal en español, y mantiene el valor aclaratorio del griego.
- source_word: τὸ ῥῆμα τῆς πίστεως
  english_pob_choice: the word of faith
  chosen_spanish: la palabra de la fe
  alternatives_spanish:
  - la palabra de la confianza
  - el mensaje de la fe
  lexicon: BDAG
  rationale: Se preserva la relación con ῥῆμα como «palabra». Para πίστις se mantiene «fe» como opción por defecto; el genitivo se deja abierto, sin forzar una paráfrasis doctrinal como «mensaje».
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: La guía doctrinal de la obra favorece «fe» como traducción ordinaria de πίστις. En este contexto paulino, la frase nombra la palabra vinculada con la fe proclamada, sin necesidad de resolver más allá el matiz genitivo.
- source_word: ὃ κηρύσσομεν
  english_pob_choice: that we proclaim
  chosen_spanish: que proclamamos
  alternatives_spanish:
  - que predicamos
  - que anunciamos
  lexicon: BDAG
  rationale: κηρύσσω implica anunciar públicamente como heraldo; «proclamamos» conserva ese tono público y autoritativo mejor que una opción más eclesializada.
theological_decisions:
- issue: Sentido de πίστις en τὸ ῥῆμα τῆς πίστεως
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: Se conserva el valor estándar de πίστις como 'fe'. La frase puede entenderse como la palabra que llama a la fe y está caracterizada por ella; no se resuelve de manera restrictiva a 'fidelidad' ni se diluye en 'confianza' en el texto principal.
  doctrine_reference: 'DOCTRINE.md: πίστις → fe'
- issue: Relación de la cita con Deuteronomio 30:14
  english_pob_reading: Paul is echoing Deuteronomy 30:14, applying its language to the proclaimed gospel message.
  chosen_spanish_reading: Pablo está ecoando Deuteronomio 30:14 y aplicando su lenguaje al mensaje proclamado del evangelio.
  alternative_spanish_readings:
  - Pablo cita Deuteronomio 30:14 de forma directa
  - Pablo adapta el lenguaje de Deuteronomio 30:14 al evangelio
  rationale: La frase 'es decir' en el texto deja visible la función explicativa de Pablo; la decisión teológica subyacente es reconocer que no se trata solo de una cita ornamental, sino de una reaplicación del lenguaje de la Torá al mensaje del evangelio.
  doctrine_reference: Cross-reference note to Deuteronomio 30:14
translation_notes:
  revision_awareness: Coincide con el pasaje auditado en sentido y estructura; no se identificaron revisiones posteriores que alteren la elección léxica o teológica. Se mantiene la equivalencia óptima aprobada en el contexto inglés.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «palabra» y «mensaje» sin resolverla en el cuerpo principal, preservando la ambigüedad útil del original.
  - «Fe» se usa consistentemente para πίστις, reservando las alternativas para la nota.
  - «Proclamamos» conserva el matiz de anuncio público de κηρύσσω, sin reemplazarlo por un registro demasiado litúrgico.
