translation:
  language: es
  text: ¿Y a quién le perdonará sus pecados, sino a los que han pecado?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀφήσει
  english_pob_choice: will he forgive
  chosen_spanish: perdonará
  alternatives_spanish:
  - le remitirá
  - le absolverá
  lexicon: BDAG
  rationale: En un contexto de pecados, ἀφίημι se vierte de manera natural como 'perdonar'. 'Perdonará' conserva el sentido relacional y directo de la acción, y suena más idiomático en español que 'remitirá' o 'absolverá'.
- source_word: ἁμαρτίας
  english_pob_choice: sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - las faltas
  - las ofensas
  lexicon: BDAG
  rationale: El sustantivo plural nombra pecados de forma directa. 'Los pecados' mantiene la referencia general y evita suavizar el término.
- source_word: τοῖς ἡμαρτηκόσι
  english_pob_choice: to those who have sinned
  chosen_spanish: a los que han pecado
  alternatives_spanish:
  - a los pecadores
  - a los que pecaron
  lexicon: BDAG
  rationale: El participio perfecto subraya a personas caracterizadas por haber pecado. 'A los que han pecado' conserva mejor esa fuerza verbal que la forma nominal 'pecadores'.
- source_word: τίνι
  english_pob_choice: to whom
  chosen_spanish: ¿a quién
  alternatives_spanish:
  - ¿a quiénes
  - ¿a cuál
  lexicon: BDAG
  rationale: En español, la pregunta retórica suena más natural como '¿a quién...?'. Mantiene el valor del dativo interrogativo sin forzar la sintaxis.
theological_decisions:
- issue: Alcance retórico del perdón divino
  english_pob_reading: A rhetorical question asserting that forgiveness is for actual sinners.
  chosen_spanish_reading: Una pregunta retórica que afirma que el perdón se dirige a los que realmente han pecado.
  alternative_spanish_readings:
  - Una formulación más general sobre a quién se concede perdón
  - Una lectura restringida al arrepentimiento previo consciente
  rationale: La línea debe conservar su tono retórico y no suavizarse. 'A los que han pecado' reproduce la afirmación directa de que el perdón tiene por objeto a quienes han cometido pecado, sin añadir un sistema doctrinal más amplio que el verso no expresa.
  doctrine_reference: Lexical and rhetorical scope only; no additional doctrinal expansion beyond the verse.
translation_notes:
  revision_awareness: El texto griego y el auditor inglés concuerdan en alto grado; no se requieren notas textuales ni variantes. La decisión clave es mantener el participio perfecto con una construcción verbal natural en español.
  spanish_consistency_notes:
  - Se usa 'perdonará' para ἀφήσει, consistente con el valor de ἀφίημι en un contexto de pecados.
  - Se mantiene la forma concreta 'pecados' para ἁμαρτίας, sin sustituirla por una abstracción.
  - Se conserva la fuerza verbal del participio perfecto ἡμαρτηκόσι con 'han pecado' en lugar de un sustantivo de identidad como 'pecadores'.
