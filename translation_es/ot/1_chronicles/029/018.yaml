    issue: La nota [a] está anclada a «Yahvé», pero su contenido explica «Israel» frente a «Jacob».
    rationale: Esto induce al lector a pensar que la nota comenta el nombre divino cuando en realidad comenta la fórmula patriarcal. Debe anclarse en «Israel».
  - severity: medium
    issue: El texto principal usa «como la inclinación…» en vez de la lectura principal auditada «en las intenciones…».
    rationale: El expediente muestra una revisión posterior que restauró «in the intentions…» como texto principal y dejó «as the inclination…» como alternativa. La versión española debe seguir ese estado auditado salvo razón fuerte en contra, que aquí no se justifica.
  - severity: low
    issue: La distribución de notas b/d invierte la jerarquía entre lectura principal y alternativa.
    rationale: Si el texto principal pasa a «en las intenciones…», la alternativa debe quedar como «como la inclinación…», y la nota de variante previa puede conservar la formulación alternativa pertinente sin confundir al lector.
