  - Nefeg
  lexicon: HALOT
  rationale: Nombre propio transliterado adaptando la acentuación al español para facilitar la lectura. Se mantiene la forma cercana al hebreo sin introducir una traducción.
- source_word: וְ/זִכְרִי
