translation:
  language: es
  text: Cuando los filisteos oyeron que los hijos de Israel se habían reunido en Mizpa[a], los gobernantes de los filisteos[b] subieron contra Israel. Cuando los hijos de Israel lo oyeron, tuvieron miedo a causa de los filisteos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Mizpa». La forma hebrea lleva una terminación direccional, aunque el contexto muestra que el pueblo estaba reunido allí.
    reason: lexical_alternative
  - marker: b
    text: O «los señores de los filisteos». El término hebreo se refiere a los gobernantes reconocidos de los filisteos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - supieron
  lexicon: HALOT
  rationale: שׁמע en narrativa informa recepción de noticias; en español, «oyeron» preserva la repetición verbal del versículo y suena natural en este contexto.
- source_word: פְלִשְׁתִּים
  english_pob_choice: Philistines
  chosen_spanish: filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Nombre del pueblo, transliterado al español con la forma habitual «filisteos».
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: Introduce el contenido de lo que oyeron; en español, «que» expresa la relación subordinante de manera clara y fiel.
- source_word: הִתְקַבְּצוּ
  english_pob_choice: had gathered
  chosen_spanish: se habían reunido
  alternatives_spanish:
  - se habían juntado
  - se habían congregado
  lexicon: HALOT
  rationale: El hitpael de קבץ indica reunirse/aglomerarse; «se habían reunido» refleja bien la acción colectiva y el tiempo anterior.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión formal del hebreo para mantener la transparencia del original y la correspondencia con el audit trail inglés.
- source_word: הַמִּצְפָּתָה
  english_pob_choice: at Mizpah
  chosen_spanish: en Mizpa
  alternatives_spanish:
  - a Mizpa
  lexicon: HALOT
  rationale: Aunque la terminación direccional admite «a Mizpa», el contexto indica el lugar de reunión; en español, «en Mizpa» comunica mejor la escena sin perder la nota topográfica.
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - ascendieron
  - marcharon
  lexicon: HALOT
  rationale: עלה en movimiento militar/narrativo se expresa de forma natural con «subieron», preservando el idiomatismo hebreo.
- source_word: סַרְנֵי פְלִשְׁתִּים
  english_pob_choice: the rulers of the Philistines
  chosen_spanish: los gobernantes de los filisteos
  alternatives_spanish:
  - los señores de los filisteos
  - los jefes de los filisteos
  lexicon: HALOT
  rationale: סַרְנִים designa a los líderes filisteos reconocidos; «gobernantes» es claro y evita el matiz arcaizante o feudal de «señores».
- source_word: אֶל יִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - hacia Israel
  - a Israel
  lexicon: HALOT
  rationale: Aunque אֶל es literalmente «a/hacia», en este contexto militar español requiere «contra» para transmitir el avance hostil.
- source_word: וַיִּשְׁמְעוּ
  english_pob_choice: heard it
  chosen_spanish: lo oyeron
  alternatives_spanish:
  - lo supieron
  - oyeron eso
  lexicon: HALOT
  rationale: El objeto está implícito en el contexto; «lo oyeron» mantiene la concisión del hebreo y la referencia al rumor del avance filisteo.
- source_word: וַיִּֽרְא֖וּ
  english_pob_choice: were afraid
  chosen_spanish: tuvieron miedo
  alternatives_spanish:
  - temieron
  - se asustaron
  lexicon: HALOT
  rationale: ירא expresa temor; «tuvieron miedo» es una forma natural y directa en español contemporáneo.
- source_word: מִפְּנֵי פְלִשְׁתִּים
  english_pob_choice: because of the Philistines
  chosen_spanish: a causa de los filisteos
  alternatives_spanish:
  - por los filisteos
  - ante los filisteos
  lexicon: HALOT
  rationale: La idiomática hebrea literalmente apunta a la presencia/frente de; aquí el sentido es causal, y «a causa de» lo expresa con claridad en español.
translation_notes:
  revision_awareness: 'Se siguió el último estado revisado del audit trail inglés: se conserva ''heard it'' sin añadir contenido no implicado, y se mantiene la lectura contextual de Mizpa como lugar de reunión. No se introdujeron notas doctrinales porque el versículo no plantea una decisión teológica explícita más allá del tratamiento del nombre del lugar y del verbo implícito.'
  spanish_consistency_notes:
  - Se usa «filisteos» de forma consistente para el gentilicio/pueblo.
  - Se conserva «hijos de Israel» como equivalente formal de בני ישראל, en línea con la política de transparencia del proyecto.
  - «Mizpa» se mantiene como topónimo sin transliteración ampliada; la nota cubre la alternativa direccional del hebreo.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en este versículo.
