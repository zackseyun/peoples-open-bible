translation:
  language: es
  text: Recorrieron toda la tierra, y al cabo de nueve meses y veinte días llegaron a Jerusalén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּשֻׁטוּ
  english_pob_choice: they traveled
  chosen_spanish: Recorrieron
  alternatives_spanish:
  - viajaron
  - anduvieron de un lado a otro
  lexicon: HALOT
  rationale: El verbo hebreo sugiere moverse por una extensión de territorio. «Recorrieron» comunica ese desplazamiento por todo el país sin introducir la idea de vagar sin rumbo, que en español sería más fuerte de lo que el contexto exige.
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: throughout all the land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - por toda la tierra
  - a lo largo de toda la tierra
  lexicon: HALOT
  rationale: La expresión indica la totalidad del territorio. «Toda la tierra» mantiene la amplitud del hebreo; en este contexto «tierra» funciona como territorio, no como planeta, y la referencia al recorrido permite omitir una preposición adicional sin perder sentido.
- source_word: וַיָּבֹאוּ
  english_pob_choice: they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - arribaron
  lexicon: HALOT
  rationale: «Llegaron» es la forma más natural en español para marcar la culminación del trayecto. Conserva el valor narrativo de בוא sin sonar rígida.
- source_word: מִקְצֵה
  english_pob_choice: at the end of
  chosen_spanish: al cabo de
  alternatives_spanish:
  - al final de
  - después de
  lexicon: HALOT
  rationale: La construcción temporal expresa el cumplimiento de un período. «Al cabo de» es una equivalencia idiomática clara en español y refleja bien la noción de tiempo transcurrido.
- source_word: תִשְׁעָה חֳדָשִׁים וְעֶשְׂרִים יוֹם
  english_pob_choice: nine months and twenty days
  chosen_spanish: nueve meses y veinte días
  alternatives_spanish:
  - nueve meses, veinte días
  - nueve meses y veinte día(s)
  lexicon: HALOT
  rationale: La duración se traduce de manera directa y natural. Se conserva la secuencia exacta del hebreo sin añadir interpretaciones.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: Nombre propio estándar
  rationale: Se usa la forma española consagrada del topónimo, que es la más reconocible y natural en un texto bíblico en español.
