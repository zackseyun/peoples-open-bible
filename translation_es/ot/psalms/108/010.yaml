translation:
  language: es
  text: Moab es mi lavatorio[a]; sobre Edom arrojo mi sandalia[b]; sobre Filistea lanzo un grito de triunfo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "mi vasija para lavar". La imagen hebrea es la de un recipiente usado para lavar, y expresa humillación o sometimiento para Moab.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "arrojo mi zapato". El gesto probablemente simboliza dominio o reclamo sobre Edom.'
    reason: lexical_alternative
  - marker: c
    text: 'O: "sobre Filistea lanzo un grito" o "sobre Filistea grito con fuerza". El verbo hebreo puede indicar un clamor jubiloso o de guerra.'
    reason: alternative_reading
lexical_decisions:
- source_word: סִיר רַחְצִי
  english_pob_choice: my washbasin
  chosen_spanish: mi pila de lavar
  alternatives_spanish:
  - mi lavadero
  - mi palangana
  - mi vasija para lavar
  lexicon: HALOT
  rationale: סִיר designa un recipiente para lavar, y רַחְצִי lo especifica como relacionado con el lavado. En español, "pila de lavar" comunica con naturalidad el objeto concreto y la imagen de humillación o degradación, sin caer en una forma arcaica o poco transparente.
- source_word: אַשְׁלִיךְ נַעֲלִי
  english_pob_choice: I throw my sandal
  chosen_spanish: arrojo mi sandalia
  alternatives_spanish:
  - lanzo mi sandalia
  - arrojo mi calzado
  - echo mi sandalia
  lexicon: HALOT
  rationale: El verbo tiene fuerza de lanzar/arrojar, y נַעַל se refiere a una pieza de calzado. "Sandalia" es más precisa y culturalmente adecuada que "zapato" en este contexto antiguo. Se conserva la acción concreta para no diluir el gesto simbólico de dominio.
- source_word: עַל / עֲלֵי
  english_pob_choice: on / over
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - encima de
  lexicon: HALOT
  rationale: '"Sobre" permite reproducir el movimiento espacial del hebreo tanto en el gesto de arrojar la sandalia como en la exclamación dirigida sobre Filistea, sin introducir de antemano una interpretación más abstracta.'
- source_word: אֶתְרוֹעָע
  english_pob_choice: I shout in triumph
  chosen_spanish: exulto con júbilo
  alternatives_spanish:
  - lanzo un grito de triunfo
  - grito de victoria
  - exclamo con júbilo
  lexicon: HALOT
  rationale: La forma verbal expresa un grito elevado, a menudo jubiloso o guerrero. "Exulto con júbilo" conserva el tono de victoria y celebración, aunque en la nota se mantiene abierta la alternativa de un grito triunfal o marcial.
- source_word: פְלֶשֶׁת
  english_pob_choice: Philistia
  chosen_spanish: Filistea
  alternatives_spanish:
  - Filistea, la región filistea
  - los filisteos
  lexicon: HALOT
  rationale: El hebreo nombra la región, no solo al pueblo. "Filistea" sigue mejor la forma del término fuente que "los filisteos", aunque el referente humano queda implícito.
- source_word: מוֹאָב / אֱדוֹם
  english_pob_choice: Moab / Edom
  chosen_spanish: Moab / Edom
  alternatives_spanish:
  - Moabitas / edomitas
  lexicon: HALOT
  rationale: Se conservan los nombres propios como en el hebreo, sin traducirlos ni explicarlos en el texto principal.
theological_decisions:
- issue: Metáforas de humillación y dominio sobre naciones enemigas
  english_pob_reading: Retain the concrete metaphors ('washbasin,' 'throw my sandal,' 'shout in triumph') rather than interpretively paraphrasing them as political conquest alone.
  chosen_spanish_reading: Conservar las metáforas concretas de humillación y triunfo ('pila de lavar', 'arrojo mi sandalia', 'exulto con júbilo') en lugar de convertirlas en una paráfrasis abstracta de conquista política.
  alternative_spanish_readings:
  - Moab es mi vasija de servicio; sobre Edom reclamo posesión; sobre Filistea lanzo un grito de victoria
  rationale: El verso es poesía vigorosa y figurada. Mantener las imágenes preserva la tensión retórica y permite que el lector perciba el gesto simbólico de sometimiento sin que la traducción resuelva demasiado pronto su significado.
  doctrine_reference: 'Principio POB: primacía del original y preservación de la imagen poética con explicación en nota.'
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se registran cambios en la auditoría inglesa; el borrador español mantiene la misma lectura óptima, con ajuste estilístico a una formulación natural en español.'
  spanish_consistency_notes:
  - Se usó "sandalia" en lugar de "zapato" por adecuación histórica y claridad.
  - Se eligió "Filistea" para reflejar el topónimo hebreo de la región.
  - Se evitó "SEÑOR" u otras convenciones de reemplazo porque este versículo no contiene el Tetragrámaton.
  - '"Exulto con júbilo" mantiene el tono celebrativo sin borrar la posible resonancia guerrera del verbo hebreo.'
