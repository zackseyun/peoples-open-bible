  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εἰσέλθατε διὰ τῆς στενῆς πύλης· ὅτι πλατεῖα ⸂ἡ πύλη⸃ καὶ εὐρύχωρος ἡ ὁδὸς ἡ ἀπάγουσα εἰς τὴν ἀπώλειαν, καὶ πολλοί εἰσιν οἱ εἰσερχόμενοι δι’ αὐτῆς·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/007/013.yaml
  text: Enter through the narrow gate[a]. For wide is the gate and broad is the road that leads to destruction[c][b], and many are those who enter through it.
  footnotes:
  - marker: a
    text: Or 'spacious is the road.' The Greek adjective εὐρύχωρος can mean 'broad' or 'spacious.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to ruin' or 'to perdition.' The Greek ἀπώλεια can denote destruction, ruin, or perdition.
    reason: lexical_alternative
  - marker: c
    text: Or 'who enter through it'.
    reason: previous_rendering
translation:
  language: ko
  text: 좁은 문으로 들어가십시오. 멸망으로 이끄는 문은 넓고 그 길은 평탄하여, 그 문으로 들어가는 사람들이 많기 때문입니다.
  philosophy: optimal-equivalence
