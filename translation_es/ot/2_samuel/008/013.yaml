translation:
  language: es
  text: Y David se ganó renombre cuando volvió después de abatir a dieciocho mil hombres de Aram en el Valle de la Sal[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testigos y el paralelo de 1 Crónicas 18:12 apuntan a «Edom» en lugar de «Aram».
    reason: textual_variant
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - ganó
  - se hizo
  lexicon: HALOT
  rationale: 'La expresión hebrea עשה שם es idiomática: literalmente ''hacer un nombre''. En español, ''hizo un nombre para sí'' conserva la imagen básica, pero en español actual suena algo más natural ''hizo un nombre para sí'' que una traducción más rígida. Se mantiene el valor de reputación/renombre sin perder la base verbal del hebreo.'
- source_word: שֵׁם
  english_pob_choice: a name for himself
  chosen_spanish: un nombre para sí
  alternatives_spanish:
  - renombre
  - fama
  lexicon: HALOT
  rationale: El sustantivo שֵׁם en este giro apunta a reputación, no simplemente a un nombre propio. 'Un nombre para sí' reproduce el hebraísmo y deja visible la metáfora de adquirir renombre.
- source_word: בְּשֻׁבוֹ
  english_pob_choice: when he returned
  chosen_spanish: cuando volvió
  alternatives_spanish:
  - al volver
  - a su regreso
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo + sufijo pide una relación de tiempo. 'Cuando volvió' es claro, natural y conserva la secuencia narrativa.
- source_word: מֵהַכּוֹתוֹ
  english_pob_choice: from striking down
  chosen_spanish: de derrotar
  alternatives_spanish:
  - después de derribar
  - tras herir
  lexicon: HALOT
  rationale: El verbo נכה puede abarcar golpear, herir o derrotar según el contexto. En una referencia bélica, 'derrotar' comunica bien el resultado militar sin añadir más de lo que el texto dice. Se evita una literalidad pesada como 'de golpear'.
- source_word: אֶת אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - los arameos
  - Siria
  lexicon: HALOT
  rationale: Se conserva el nombre propio hebreo como en el texto fuente. 'Los arameos' interpreta el referente colectivo; 'Siria' introduce una equivalencia histórica posterior que no está en el hebreo.
- source_word: בְּגֵיא מֶלַח
  english_pob_choice: in the Valley of Salt
  chosen_spanish: en el Valle de la Sal
  alternatives_spanish:
  - en el Valle Salado
  - en el valle de la sal
  lexicon: HALOT
  rationale: Se traduce el topónimo de forma transparente y reverente como nombre de lugar. 'Valle de la Sal' sigue de cerca la forma hebrea y es suficientemente idiomático en español.
- source_word: שְׁמוֹנָה עָשָׂר אָלֶף
  english_pob_choice: eighteen thousand men
  chosen_spanish: dieciocho mil hombres
  alternatives_spanish:
  - dieciocho mil
  - dieciocho mil guerreros
  lexicon: HALOT
  rationale: El hebreo no expresa un sustantivo explícito; la adición de 'hombres' sigue la convención de conteo militar implícito en el contexto, como en la POB inglesa. 'Hombres' es más sobrio y directo que 'guerreros'.
theological_decisions:
- issue: 'Identidad del enemigo derrotado: Aram vs. Edom'
  english_pob_reading: Aram in the main text, with Edom preserved in a footnote as a textual/canonical alternative.
  chosen_spanish_reading: Aram en el texto principal, con una nota que preserva la variante 'Edom'.
  alternative_spanish_readings:
  - Edom
  - los edomitas
  rationale: Se sigue el hebreo recibido de 2 Samuel 8:13, que dice Aram. Al mismo tiempo, se conserva la tensión textual/canónica señalada por la POB inglesa y por el paralelo de 1 Crónicas 18:12. La nota evita ocultar la variante significativa.
  doctrine_reference: Translation philosophy §1 (primacía de la fuente original) y §3 (preservar tensiones y alternativas en notas)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura final inglesa de la POB y su evaluación textual: mantiene Aram en el texto principal, conserva la referencia bélica y refleja la idiomaticidad de עשה שם sin convertirla en una paráfrasis extensa. No se detectan cambios recientes que alteren la solución final.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se mantiene «Aram» como nombre propio transliterado, evitando sustituirlo por equivalentes históricos posteriores.
  - La puntuación con guion largo introduce la cifra final de manera natural en español y conserva el cierre de la cláusula hebrea.
