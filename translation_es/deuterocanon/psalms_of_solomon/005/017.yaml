translation:
  language: es
  text: Tu misericordia está sobre toda la tierra, oh Yahvé, con bondad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔλεός
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - clemencia
  lexicon: BDAG
  rationale: ἔλεος denota misericordia o compasión misericordiosa. «Misericordia» conserva el peso del sustantivo y es el equivalente más natural y fiel en español.
- source_word: ἐπὶ πᾶσαν τὴν γῆν
  english_pob_choice: over all the earth
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - por toda la tierra
  - a través de toda la tierra
  lexicon: BDAG
  rationale: La preposición con acusativo expresa extensión o cobertura amplia. «Sobre toda la tierra» reproduce bien la imagen espacial y suena natural en español.
- source_word: Κύριε
  english_pob_choice: O Lord
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh Señor
  - Yahvé
  lexicon: BDAG
  rationale: Dado el contexto de la colección y la norma del proyecto, se usa «Yahvé» para el nombre divino cuando el griego dice κύριε en una dirección vocativa que corresponde al Nombre. Se mantiene la fuerza de invocación con «oh».
- source_word: χρηστότητι
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - amabilidad
  - benignidad
  lexicon: BDAG
  rationale: χρηστότης puede significar bondad, benignidad o amabilidad. «Bondad» es breve, comprensible y mantiene el tono relacional del cierre.
- source_word: '[copula implícita]'
  english_pob_choice: is
  chosen_spanish: está
  alternatives_spanish:
  - es
  - permanece
  lexicon: Greek grammar
  rationale: El griego es nominal y requiere una cópula en español. «Está» comunica la relación de manera natural en una construcción de ubicación o extensión sin sobreinterpretar el verbo implícito.
theological_decisions:
- issue: Tratamiento del vocativo κύριε y del nombre divino
  english_pob_reading: O Lord
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - oh Señor
  - Señor
  rationale: La política del proyecto pide traducir el nombre divino como «Yahvé» y no enmascararlo como «SEÑOR». Como el inglés POB conserva el vocativo con «O Lord», el español mantiene la invocación directa con «oh» y explicita el referente divino con el nombre.
  doctrine_reference: POB terminology defaults for יהוה / YHWH
translation_notes:
  revision_awareness: La revisión inglesa añadió «O» antes de Lord para hacer más natural el vocativo; el español refleja esa función con «oh» delante de «Yahvé», sin necesidad de una nota textual adicional. No se detectan variantes textuales ni tensiones lexicológicas mayores en este verso.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - «misericordia» y «bondad» conservan la paridad semántica con el audit trail inglés sin introducir lenguaje eclesiástico más tradicional que el requerido.
  - La sintaxis española es breve y directa, acorde con el paralelismo poético del original.
