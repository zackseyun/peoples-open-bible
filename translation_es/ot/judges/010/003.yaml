lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: surgió
  alternatives_spanish:
  - se levantó
  - apareció
  lexicon: HALOT
  rationale: En esta fórmula narrativa de sucesión, קום marca la aparición de un nuevo dirigente después del anterior. «Surgió» conserva el valor de emergencia/sucesión sin sonar tan literal ni tan ambiguo como «se levantó» en español.
- source_word: אַחֲרָיו
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - tras él
  - después de este
  lexicon: HALOT
  rationale: La relación de sucesión personal se expresa con claridad natural en español mediante «Después de él», manteniendo el referente al juez anterior sin añadir interpretación.
- source_word: יָאִיר
  english_pob_choice: Jair
  chosen_spanish: Jair
  lexicon: convención onomástica
  rationale: Los nombres propios se transliteran de manera estándar; «Jair» es la forma natural y establecida en español.
- source_word: הַגִּלְעָדִי
  english_pob_choice: the Gileadite
  chosen_spanish: el galaadita
  alternatives_spanish:
  - de Galaad
  - el de Galaad
  lexicon: HALOT
  rationale: El adjetivo gentilicio se rinde con «galaadita», que preserva la forma atributiva y el vínculo regional de manera breve y transparente en español.
- source_word: וַיִּשְׁפֹּט
  english_pob_choice: he judged
  chosen_spanish: juzgó
  alternatives_spanish:
  - gobernó
  - hizo de juez sobre
  lexicon: HALOT
  rationale: En Jueces, שפט mantiene el término recurrente «juzgar» para la función del caudillo/juez. «Juzgó» conserva esa terminología del libro sin expandirla innecesariamente a «gobernó».
- source_word: עֶשְׂרִים וּשְׁתַּיִם שָׁנָה
  english_pob_choice: twenty-two years
  chosen_spanish: veintidós años
  alternatives_spanish:
  - veinte y dos años
  lexicon: HALOT
  rationale: El número compuesto se expresa de forma idiomática en español contemporáneo como «veintidós años», preservando la duración con naturalidad.
translation_notes:
