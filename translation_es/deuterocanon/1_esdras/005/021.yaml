  - severity: low
    issue: Posible variación transliterativa en «Macalón» frente a la elección inglesa «Makalon».
    rationale: No afecta el sentido y la decisión española está documentada; en español «c» puede ser una adaptación ortográfica aceptable. No requiere cambio.
  - severity: low
    issue: «Neifeis» adapta la grafía griega más que conservar «Neipheis».
    rationale: La racionalización española está explicada y mejora la legibilidad sin alterar de manera sustancial la referencia onomástica.
