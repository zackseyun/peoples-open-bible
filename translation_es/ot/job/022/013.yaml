translation:
  language: es
  text: 'Pero tú dices: «¿Qué sabe Dios? ¿Puede juzgar a través de la densa oscuridad[a][b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Densa oscuridad» también puede traducirse «nube oscura», «penumbra» o «sombría oscuridad».
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Juzga a través de la densa oscuridad?». El imperfecto hebreo puede entenderse como presente/futuro simple, además de con un matiz implícito de capacidad en esta pregunta retórica.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: Yet you say
  chosen_spanish: Pero tú dices
  alternatives_spanish:
  - Y tú dices
  - Sin embargo, tú dices
  lexicon: HALOT
  rationale: La conjunción adversativa y la forma verbal introducen una acusación citada; «Pero» conserva el contraste discursivo con naturalidad en español, y el presente de citación reproduce la fuerza retórica del hebreo.
- source_word: מַה
  english_pob_choice: What
  chosen_spanish: Qué
  alternatives_spanish:
  - Qué cosa
  - Cuánto
  lexicon: HALOT
  rationale: Interrogativo directo para la pregunta citada. «Qué» es la forma más natural en español y mantiene el tono polémico de la réplica.
- source_word: יָּדַע אֵל
  english_pob_choice: What does God know?
  chosen_spanish: ¿Qué sabe Dios?
  alternatives_spanish:
  - ¿Qué conoce Dios?
  - ¿Qué llega a saber Dios?
  lexicon: HALOT
  rationale: «Saber» expresa bien la pregunta sobre conocimiento divino; «conocer» sería posible, pero suena menos idiomático aquí. No se translitera «El», porque el término funciona como nombre común/título para Dios en este contexto.
- source_word: הַבְעַד
  english_pob_choice: through
  chosen_spanish: a través de
  alternatives_spanish:
  - por medio de
  - entre
  lexicon: HALOT
  rationale: La preposición señala una idea de obstrucción o separación respecto de lo que sigue; «a través de» comunica bien la imagen espacial del texto.
- source_word: עֲרָפֶל
  english_pob_choice: thick darkness
  chosen_spanish: la oscuridad espesa
  alternatives_spanish:
  - la densa oscuridad
  - la penumbra espesa
  - la nube oscura
  lexicon: HALOT
  rationale: El término hebreo designa oscuridad densa, nube oscura o penumbra. «Oscuridad espesa» preserva la imagen fuerte y evita suavizarla; el sentido alternativo de «nube oscura» queda implícito en la nota.
- source_word: יִשְׁפּוֹט
  english_pob_choice: can he judge
  chosen_spanish: ¿Puede juzgar?
  alternatives_spanish:
  - ¿Juzga?
  - ¿Juzgará?
  lexicon: HALOT
  rationale: El imperfecto en la pregunta retórica puede leerse como acción simple o con matiz de capacidad. En español, «¿Puede juzgar?» conserva mejor la tensión de si Dios está realmente habilitado para juzgar en medio de la oscuridad, sin resolverla demasiado pronto.
theological_decisions:
- issue: 'Matiz del verbo imperfecto en la pregunta retórica final: capacidad frente a acción simple/futuro'
  english_pob_reading: Can he judge through thick darkness?
  chosen_spanish_reading: ¿Puede juzgar a través de la oscuridad espesa?
  alternative_spanish_readings:
  - ¿Juzga a través de la oscuridad espesa?
  - ¿Juzgará a través de la oscuridad espesa?
  rationale: La lectura española sigue el valor de posibilidad/capacidad que la POB inglesa documenta, porque refleja mejor el escepticismo de la acusación citada sin eliminar la ambigüedad del imperfecto hebreo. Así se preserva la tensión teológica del discurso impío reportado.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica y no resolverla artificialmente)
translation_notes:
  revision_awareness: El borrador sigue el sentido y la tensión del texto hebreo junto con el audit trail inglés; no se requieren revisiones previas adicionales porque el pasaje es breve y de alta concordancia en el rastreo fuente-traducción.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל conforme al estándar del proyecto.
  - Se conserva el matiz interrogativo-retórico sin sustituirlo por una afirmación.
  - Se usa una construcción española natural («a través de») para reflejar la imagen de obstrucción del hebreo.
  - El adjetivo pospuesto en «oscuridad espesa» busca claridad y solemnidad sin perder fuerza semántica.
