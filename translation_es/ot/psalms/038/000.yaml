translation:
  language: es
  text: Un salmo de David[a], para recuerdo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De David» también puede entenderse como «por David» o «para David»; la fórmula hebrea del encabezado puede expresar autoría, asociación o dedicación.
    reason: alternative_reading
  - marker: b
    text: O «para memorial» o «para hacer memoria». La frase hebrea de propósito es breve y puede señalar una función conmemorativa o litúrgica.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמ֖וֹר
  english_pob_choice: psalm
  chosen_spanish: salmo
  alternatives_spanish:
  - cántico
  - canción
  lexicon: HALOT
  rationale: En los encabezados de los Salmos, מִזְמוֹר designa un género poético-litúrgico; «salmo» es el equivalente español establecido y más preciso que opciones más generales como «cántico» o «canción».
- source_word: לְ/דָוִ֣ד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - por David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en este tipo de encabezados puede indicar autoría, asociación o dedicación. «De David» conserva mejor esa ambigüedad que una versión más interpretativa como «por David» o «para David».
- source_word: לְ/הַזְכִּֽיר
  english_pob_choice: for remembrance
  chosen_spanish: para memorial
  alternatives_spanish:
  - para hacer memoria
  - para recordar
  - para ser recordado
  lexicon: HALOT
  rationale: El infinitivo causativo de זכר funciona aquí como rótulo de propósito en el encabezado. «Para memorial» mantiene la brevedad y el valor litúrgico/conmemorativo del hebreo sin precisar indebidamente si el acto de recordar se dirige a Dios, a la comunidad o a una función cultual.
translation_notes:
  revision_awareness: 'La colocación de las marcas sigue la revisión auditada del POB inglés: la nota sobre «for remembrance» debe ir junto a esa frase, no junto a «David». En español se conserva esa relación, colocando [a] en «David» y [b] en «memorial».'
  spanish_consistency_notes:
  - Se mantiene «salmo» para מִזְמוֹר por ser el término genérico y litúrgico más natural en español bíblico.
  - Se usa «de David» para preservar la ambigüedad del ל en encabezados de salmos.
  - Se traduce לְהַזְכִּיר con una expresión breve y funcional («para memorial») para no sobreespecificar el sentido del propósito.
  - No se introduce «SEÑOR» ni otra convención de sustitución, porque el versículo no contiene el Tetragrámaton.
