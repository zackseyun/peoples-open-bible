translation:
  language: es
  text: Vio que el lugar de descanso era bueno[a], y que la tierra era agradable, así que inclinó su hombro para llevar cargas, y quedó sometido a trabajos forzados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘descanso’. El hebreo מְנֻחָה puede significar ‘descanso’ o ‘lugar de descanso’.
    reason: lexical_alternative
  - marker: b
    text: O ‘llegó a ser un siervo tributario’ o ‘un esclavo sometido a trabajos forzados’. El hebreo לְמַס עֹבֵד es debatido; מַס suele referirse a trabajo forzado o corvea.
    reason: alternative_reading
lexical_decisions:
- source_word: מְנֻחָה
  english_pob_choice: the resting place
  chosen_spanish: el lugar de descanso
  alternatives_spanish:
  - el descanso
  - el lugar de reposo
  lexicon: HALOT
  rationale: El hebreo puede significar ‘descanso’ o ‘lugar de descanso’. En este contexto tribal y territorial, el sentido concreto encaja mejor con ‘lugar de descanso’ que con una abstracción.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - buena
  - agradable
  - favorable
  lexicon: HALOT
  rationale: ‘Bueno’ conserva la sencillez del adjetivo hebreo y funciona de manera natural en español con ‘lugar de descanso’.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  - la tierra/territorio
  lexicon: HALOT
  rationale: ‘Tierra’ es la forma más natural en español para el territorio tribal del pasaje. Mantiene la amplitud del hebreo sin agregar precisión no explicitada.
- source_word: נָעֵמָה
  english_pob_choice: pleasant
  chosen_spanish: agradable
  alternatives_spanish:
  - deliciosa
  - deleitosa
  - hermosa
  lexicon: HALOT
  rationale: ‘Agradable’ expresa la cualidad de ser placentera o grata sin volver el tono demasiado ornamental. Es fiel y sobrio.
- source_word: וַיֵּט שִׁכְמוֹ
  english_pob_choice: he bent his shoulder
  chosen_spanish: inclinó su hombro
  alternatives_spanish:
  - dobló su hombro
  - echó su hombro
  - bajó su hombro
  lexicon: HALOT
  rationale: La imagen corporal se conserva de modo claro en español. ‘Inclinó su hombro’ mantiene el gesto de someterse a una carga sin forzar una paráfrasis.
- source_word: לִסְבֹּל
  english_pob_choice: to bear
  chosen_spanish: para cargar
  alternatives_spanish:
  - para llevar
  - para soportar
  - para sostener
  lexicon: HALOT
  rationale: En este contexto, ‘cargar’ transmite bien la acción de asumir una carga física o laboral. Evita la ambigüedad más abstracta de ‘soportar’.
- source_word: לְמַס עֹבֵד
  english_pob_choice: a servant for forced labor
  chosen_spanish: un siervo para trabajo forzado
  alternatives_spanish:
  - un esclavo para trabajo forzado
  - un siervo de corvea
  - un trabajador de trabajo forzado
  lexicon: HALOT
  rationale: ‘מַס’ apunta a trabajo forzado, corvea o servicio obligatorio. ‘Siervo’ preserva la relación de sujeción sin convertir de inmediato el término en esclavitud chattel; ‘trabajo forzado’ hace explícita la carga semántica del sustantivo.
theological_decisions:
- issue: Naturaleza de la sujeción final de Isacar
  english_pob_reading: became a servant for forced labor
  chosen_spanish_reading: llegó a ser un siervo para trabajo forzado
  alternative_spanish_readings:
  - llegó a ser un esclavo para trabajo forzado
  - llegó a ser un tributario
  - llegó a ser un siervo de corvea
  rationale: El hebreo admite una lectura de servicio coercitivo vinculado a la corvea. Se conserva la tensión entre servidumbre y trabajo forzado sin resolverla con lenguaje más fuerte de lo que el texto exige.
  doctrine_reference: 'Translation philosophy §3: preservar tensiones interpretativas genuinas y no borrar ambigüedades léxicas del original.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB en inglés, que suavizó la frase final hacia una formulación más idiomática sin perder la idea de servicio bajo trabajo forzado. En español se optó por ‘siervo para trabajo forzado’ para conservar la relación semántica entre עֹבֵד y מַס sin redundancia excesiva.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - ‘Siervo’ se usó por la construcción idiomática final, aunque el proyecto suele preferir ‘esclavo’ para δοῦλος; en este verso no corresponde ese lexema griego y la elección responde a עֹבֵד y מַס.
  - Se conservó la imagen corporal de ‘hombro’ y la idea de carga para reflejar el paralelismo hebreo.
  - La puntuación sigue el español moderno con coma antes de la cláusula final de resultado.
