  text: El rey Salomón superó a todos los reyes de la tierra en riqueza y sabiduría.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּגְדַּל
  english_pob_choice: surpassed
  chosen_spanish: superó
  alternatives_spanish:
  - fue más grande que
  - creció más que
  - sobresalió
  lexicon: HALOT
  rationale: En esta construcción comparativa con מִן, el hebreo expresa superioridad frente a otros reyes, no solo crecimiento. «Superó» comunica de manera natural esa idea de exceder a los demás.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: King Solomon
  chosen_spanish: el rey Salomón
  alternatives_spanish:
  - Rey Salomón
  - el rey, Salomón
  lexicon: HALOT
  rationale: La frase aposicional identifica a Salomón por título y nombre. «El rey Salomón» conserva ambos elementos con fluidez en español.
- source_word: מִכֹּל מַלְכֵי הָאָרֶץ
  english_pob_choice: all the kings of the earth
  chosen_spanish: a todos los reyes de la tierra
  alternatives_spanish:
  - a todos los reyes del país
  - a todos los reyes del mundo
  lexicon: HALOT
  rationale: En este contexto de comparación real amplia, «tierra» reproduce el alcance general del hebreo אָרֶץ y mantiene la formulación bíblica natural en español.
- source_word: לְעֹשֶׁר
  english_pob_choice: in wealth
  chosen_spanish: en riqueza
  alternatives_spanish:
  - en riquezas
  - en cuanto a riqueza
  lexicon: HALOT
  rationale: 'La preposición ל indica esfera o aspecto: Salomón destacó en la categoría de riqueza. «En riqueza» preserva ese valor comparativo de manera clara y idiomática.'
- source_word: וְחָכְמָה
  english_pob_choice: and wisdom
  chosen_spanish: y sabiduría
  alternatives_spanish:
  - e inteligencia
  - y en sabiduría
  lexicon: HALOT
  rationale: El sustantivo חָכְמָה se traduce de forma directa como «sabiduría». En español, la coordinación puede mantener sin repetir la preposición sin perder el sentido.
translation_notes:
  revision_awareness: El texto hebreo y el testimonio auditado en inglés están en alta concordancia; no se requieren revisiones textuales ni notas variantes.
