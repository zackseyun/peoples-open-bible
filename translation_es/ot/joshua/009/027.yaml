review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido general del hebreo: Josué los asigna a labores permanentes de cortar madera y sacar/acarrear agua para la congregación y para el altar de Yahvé; también preserva bien la referencia de continuidad «hasta el día de hoy» y el sujeto implícito divino en «el lugar que él escogería».'
  spanish_quality_summary: El español es claro y mayormente natural, pero «cargadores de agua» suena menos idiomático y puede sugerir solo transporte, mientras que el hebreo שאב enfatiza sacar/dibujar agua; además, «Así que» introduce una conexión discursiva no requerida por el hebreo narrativo simple. Una leve corrección mejora fidelidad y fluidez.
  glossary_alignment: Se alinea bien con la terminología del proyecto en «Yahvé» para יְהוָה y «congregación» para עֵדָה. La nota léxica sobre «sacadores de agua» ya reconoce la opción más cercana al hebreo; conviene subir esa forma al texto principal para reflejar mejor la decisión léxica documentada.
  issues:
  - severity: medium
    issue: «Así que» añade un matiz consecutivo no explicitado en el hebreo
    rationale: וַיִּתְּנֵם es simplemente continuación narrativa («Y/Entonces Josué los hizo/asignó»). «Así que» puede sonar inferencial y algo más interpretativo de lo necesario.
  - severity: medium
    issue: «cargadores de agua» no representa con suficiente precisión שאבי מים
    rationale: El participio שאב se refiere primariamente a sacar o extraer agua. «Cargadores» desplaza el foco a transportar, mientras que «sacadores de agua» conserva mejor el valor léxico y sigue siendo comprensible en español bíblico.
  revised_spanish_text: Entonces Josué los hizo leñadores y sacadores de agua[a] en aquel día, para la congregación y para el altar de Yahvé, hasta el día de hoy, en el lugar que él escogería.
  revised_footnotes:
  - marker: a
    text: O «cargadores de agua».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «Así que» por «Entonces» para una secuencia narrativa más neutra y fiel al hebreo, y se cambia «cargadores de agua» por «sacadores de agua» para reflejar mejor el sentido léxico de שאב. Se conserva la alternativa menos literal en nota. El resto del versículo está bien alineado con la fuente y la terminología del proyecto.
