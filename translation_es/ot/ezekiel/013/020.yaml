  - severity: low
    issue: '''de sobre vuestros brazos'' suena forzado'
    rationale: Aunque refleja literalmente מֵעַל, en español natural basta 'de sus brazos' o 'de encima de sus brazos'. La primera mantiene bien el sentido sin dureza innecesaria.
