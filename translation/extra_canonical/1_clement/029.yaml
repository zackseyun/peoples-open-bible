id: 1CLEM.29
reference: 1 Clement 29
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Προσέλθωμεν οὖν αὐτῷ ἐν ὁσιότητι ψυχῆς, ἁγνὰς καὶ ἀμιάντους χεῖρας αἴροντες πρὸς αὐτόν, ἀγαπῶντες τὸν ἐπιεικῆ καὶ εὔσπλαγχνον πατέρα ἡμῶν, ὃς ἐκλογῆς μέρος ἡμᾶς ἐποίησεν ἑαυτῷ. 2. οὕτω γὰρ γέγραπται· "Ὅτε διεμέριζεν ὁ ὕψιστος ἔθνη, ὡς διέσπειρεν υἱοὺς Ἀδάμ, ἔστησεν ὅρια ἐθνῶν κατὰ ἀριθμὸν ἀγγέλων θεοῦ. ἐγενήθη μερὶς κυρίου λαὸς αὐτοῦ Ἰακώβ, σχοίνισμα κληρονομίας αὐτοῦ Ἰσραήλ. 3. καὶ ἐν ἑτέρῳ τόπῳ λέγει· Ἰδοὺ, κύριος λαμβάνει ἑαυτῷ ἔθνος ἐκ μέσου ἐθνῶν, ὥσπερ λαμβάνει ἄνθρωπος τὴν ἀπαρχὴν αὐτοῦ τῆς ἅλω· καὶ ἐξελεύσεται ἐκ τοῦ ἔθνους ἐκείνου ἅγια ἁγίων.
  language: Greek
  pages:
  - 299
  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: 'Therefore let us come to him in holiness of soul[a], lifting up to him hands that are pure and undefiled, loving our gentle and compassionate Father, who has made us a chosen portion for himself.


    2. For thus it is written:

    “When the Most High divided the nations,

    when he scattered the sons of Adam,

    he fixed the boundaries of the nations

    according to the number of the angels of God.

    The Lord’s portion became his people Jacob,

    Israel the measuring-line of his inheritance.”


    3. And in another place he says:

    “Behold, the Lord takes for himself a nation from the midst of nations,

    as a man takes the firstfruits of his threshing floor[b][c];

    and from that nation the holy of holies shall come forth.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The citation reflects the Greek wording as given here, including 'according to the number of the angels of God.' Other textual traditions of Deuteronomy differ at this point.
    reason: textual_variant
    anchor_ref: '29:2'
  - marker: c
    text: '''The holy of holies'' is a literal rendering of the Greek phrase and may be understood in more than one way in this context.'
    reason: lexical_alternative
    anchor_ref: '29:3'
  - marker: b
    text: Or 'And the Lord’s portion became his people Jacob,'.
    reason: previous_rendering
lexical_decisions:
- source_word: Προσέλθωμεν
  chosen: let us come near
  alternatives:
  - let us approach
  - let us draw near
  lexicon: BDAG
  rationale: Retains the hortatory subjunctive and the cultic/devotional sense of approaching God, while remaining natural English.
- source_word: ἐν ὁσιότητι ψυχῆς
  chosen: in holiness of soul
  alternatives:
  - with holiness of soul
  - in piety of soul
  lexicon: BDAG
  rationale: Preserves the moral-religious quality of ὁσιότης and the inward emphasis of ψυχή without flattening the phrase into generic sincerity.
- source_word: ἁγνὰς καὶ ἀμιάντους χεῖρας
  chosen: hands that are pure and undefiled
  alternatives:
  - pure and unstained hands
  - clean and unpolluted hands
  lexicon: BDAG
  rationale: Keeps the concrete bodily image of prayerful uplift and the paired purity terms; 'undefiled' preserves the stronger cultic/moral nuance of ἀμίαντος.
- source_word: ἀγαπῶντες
  chosen: loving
  alternatives:
  - as we love
  - in love for
  lexicon: BDAG
  rationale: Maintains the participial flow of the Greek and the ethical-theological centrality of love.
- source_word: ἐπιεικῆ
  chosen: gentle
  alternatives:
  - kind
  - forbearing
  - gracious
  lexicon: BDAG
  rationale: '''Gentle'' best captures the mild, forbearing character of the Father in accessible English without overinterpreting.'
- source_word: εὔσπλαγχνον
  chosen: compassionate
  alternatives:
  - merciful
  - tenderhearted
  lexicon: BDAG
  rationale: Conveys deep pity/compassion in idiomatic modern English; 'tenderhearted' is possible but less natural here.
- source_word: ἐκλογῆς μέρος
  chosen: a chosen portion
  alternatives:
  - a portion of election
  - an elect share
  lexicon: BDAG
  rationale: Brings out both the election language and the inheritance/portion imagery; smoother than a more wooden rendering while preserving theological weight.
- source_word: ὁ ὕψιστος
  chosen: the Most High
  alternatives:
  - the Highest
  lexicon: BDAG
  rationale: Standard biblical title with clear scriptural cadence.
- source_word: υἱοὺς Ἀδάμ
  chosen: the sons of Adam
  alternatives:
  - the sons of man
  - the children of humankind
  lexicon: BDAG
  rationale: Keeps the explicit Adam-language of the citation rather than generalizing it away; this preserves the scriptural register and gender-accurate wording of the source.
- source_word: ἔστησεν ὅρια ἐθνῶν
  chosen: he fixed the boundaries of the nations
  alternatives:
  - he set the borders of the nations
  lexicon: BDAG
  rationale: A natural rendering that preserves the territorial-allotment imagery of the citation.
- source_word: κατὰ ἀριθμὸν ἀγγέλων θεοῦ
  chosen: according to the number of the angels of God
  alternatives:
  - according to the number of God's angels
  lexicon: BDAG
  rationale: Rendered straightforwardly according to the Greek citation as given in Clement; this wording preserves the textual form before interpretive harmonization.
- source_word: μερὶς κυρίου
  chosen: the Lord’s portion
  alternatives:
  - the portion of the Lord
  lexicon: BDAG
  rationale: Preserves covenant-inheritance language with biblical cadence.
- source_word: σχοίνισμα κληρονομίας
  chosen: the measuring-line of his inheritance
  alternatives:
  - the allotment of his inheritance
  - the cord of his inheritance
  lexicon: BDAG
  rationale: σχοίνισμα is literally a measuring line/cord used in allotment; preserving the image keeps the land-inheritance metaphor vivid and auditable.
- source_word: ἔθνος ἐκ μέσου ἐθνῶν
  chosen: a nation from the midst of nations
  alternatives:
  - a people from among the nations
  - a nation out of the nations
  lexicon: BDAG
  rationale: Retains the singular 'nation' and the rhetorical force of divine selection from among other nations.
- source_word: ἀπαρχὴν
  chosen: the firstfruits
  alternatives:
  - the first portion
  - the first yield
  lexicon: BDAG
  rationale: A standard biblical term with sacrificial/cultic resonance that should be preserved.
- source_word: ἅλω
  chosen: threshing floor
  alternatives:
  - harvest floor
  lexicon: BDAG
  rationale: The established agricultural term in biblical English; preserves the agrarian image.
- source_word: ἅγια ἁγίων
  chosen: the holy of holies
  alternatives:
  - most holy things
  - a most holy one
  lexicon: BDAG
  rationale: The phrase is formally the superlative sacred expression 'holy of holies'; preserving it keeps the scriptural and cultic resonance, even though its precise referent here may be debated.
theological_decisions:
- issue: Meaning of ἐκλογῆς μέρος in relation to the church/community
  chosen_reading: Rendered 'a chosen portion' to preserve both election language and inheritance imagery.
  alternative_readings:
  - '''an elect people'''
  - '''a portion of the elect'''
  rationale: The phrase combines divine choosing with portion/allotment language. The chosen rendering avoids collapsing the metaphor into a generic ecclesial label while still reading naturally.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
- issue: Referent of ἅγια ἁγίων in the final citation
  chosen_reading: Rendered literally as 'the holy of holies' in the main text.
  alternative_readings:
  - '''most holy things'''
  - '''a most holy one'''
  rationale: The phrase is ambiguous in this context and may point to a supremely holy reality/person/people. A literal rendering best preserves the ambiguity for readers and later annotation rather than prematurely resolving it.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
