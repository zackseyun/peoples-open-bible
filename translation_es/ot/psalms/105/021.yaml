translation:
  language: es
  text: Lo constituyó señor de su casa[a], y gobernante sobre todas sus posesiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lo constituyó amo de su casa, y gobernante sobre todo lo que poseía».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂמ֣/וֹ
  english_pob_choice: He made him
  chosen_spanish: Lo constituyó
  alternatives_spanish:
  - Lo hizo
  - Lo puso
  - Lo nombró
  lexicon: HALOT
  rationale: El verbo שׂים/שׂוּם con sufijo de objeto expresa acción de establecer o colocar a alguien en una función. En español, «constituyó» comunica con naturalidad el acto de designación para un cargo, sin perder el valor causativo del hebreo.
- source_word: אָד֣וֹן
  english_pob_choice: lord
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - maestro
  lexicon: HALOT
  rationale: אָדוֹן designa a uno con autoridad sobre una casa. En español, «señor» es más natural en este registro poético que «amo», y conserva la idea de autoridad doméstica sin sonar demasiado estrecho o servil.
- source_word: לְ/בֵית֑/וֹ
  english_pob_choice: of his house
  chosen_spanish: de su casa
  alternatives_spanish:
  - sobre su casa
  - para su casa
  lexicon: HALOT
  rationale: La relación preposicional con בית en este contexto expresa el ámbito doméstico sobre el cual recibe autoridad. «De su casa» reproduce de manera idiomática la construcción del inglés POB y su sentido de pertenencia/domínio familiar.
- source_word: וּ֝/מֹשֵׁ֗ל
  english_pob_choice: and ruler
  chosen_spanish: y gobernante
  alternatives_spanish:
  - y ruler
  - y quien gobierna
  lexicon: HALOT
  rationale: El participio de משל señala a quien ejerce dominio o gobierno. «Gobernante» mantiene el paralelismo con «señor» y evita un calco inglés, a la vez que preserva la idea de autoridad real sobre una esfera.
- source_word: בְּ/כָל
  english_pob_choice: over all
  chosen_spanish: sobre todas
  alternatives_spanish:
  - en todo
  - en toda
  lexicon: HALOT
  rationale: Con משל, la preposición marca la esfera de gobierno. En español, «sobre» expresa mejor la relación de autoridad que un literal «en», y el plural concuerda naturalmente con el sustantivo colectivo siguiente.
- source_word: קִנְיָנֽ/וֹ
  english_pob_choice: his possessions
  chosen_spanish: sus posesiones
  alternatives_spanish:
  - su propiedad
  - todo lo que poseía
  lexicon: HALOT
  rationale: קִנְיָן remite a bienes adquiridos o posesiones. «Posesiones» es claro, digno y suficientemente amplio para abarcar el patrimonio administrado, conservando el matiz de propiedad adquirida sin necesidad de expansión explicativa.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo; la traducción española sigue la misma estructura semántica básica (designación a un cargo doméstico y gobierno sobre bienes), con ajustes idiomáticos normales para el español.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo entre el título doméstico y el de gobierno: «señor» / «gobernante».'
  - Se evitó «SEÑOR» como convención de ocultamiento, porque aquí אָדוֹן no corresponde al Tetragrámaton sino a un título de autoridad.
  - «Poseiones» conserva el sentido de קִנְיָן como bienes adquiridos; la nota ofrece la alternativa más literal «todo lo que poseía».
