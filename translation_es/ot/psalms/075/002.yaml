translation:
  language: es
  text: Te damos gracias, oh Dios; damos gracias, porque tu nombre está cerca[a]; se cuentan[b] tus maravillas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tu nombre está cerca» puede implicar la cercanía de Dios, su presencia manifiesta o su nombre reconocido; se conserva el modismo hebreo en lugar de parafrasearlo.
    reason: lexical_alternative
  - marker: b
    text: O «relatan tus maravillas» o «proclaman tus obras maravillosas». El hebreo tiene un plural de tercera persona indefinido («cuentan») sin sujeto explícito.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹדִינוּ
  english_pob_choice: we give thanks
  chosen_spanish: damos gracias
  alternatives_spanish:
  - te alabamos
  - confesamos
  lexicon: HALOT
  rationale: El hiphil de ידה en este contexto salmódico expresa gratitud dirigida a Dios. «Damos gracias» conserva el valor de acción de gracias y suena natural en español litúrgico moderno.
- source_word: לְּךָ אֱלֹהִים
  english_pob_choice: to you, O God
  chosen_spanish: a ti, oh Dios
  alternatives_spanish:
  - a ti, Dios
  - a ti, oh Dios
  lexicon: HALOT
  rationale: Se conserva la dirección explícita del dativo pronominal y la apelación vocativa. «Oh Dios» mantiene el registro poético sin volverse innecesariamente arcaico.
- source_word: וְקָרוֹב
  english_pob_choice: for ... is near
  chosen_spanish: porque cercano está
  alternatives_spanish:
  - y cercano está
  - pues cercano está
  - porque está cerca
  lexicon: HALOT
  rationale: El hebreo puede funcionar como fundamento explicativo. «Porque» explicita ese valor causal sin perder la cercanía del enunciado. El orden invertido «cercano está» mantiene el paralelismo y el énfasis poético.
- source_word: שְׁמֶךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu nombre
  - tu fama
  - tu presencia
  lexicon: HALOT
  rationale: Se preserva «nombre» para no resolver la ambigüedad teológica del hebreo, que puede implicar carácter revelado, presencia o reputación. No se paraphrasea como «presencia» o «fama» en el texto principal.
- source_word: סִפְּרוּ
  english_pob_choice: are recounted
  chosen_spanish: se cuentan
  alternatives_spanish:
  - se relatan
  - se proclaman
  - las personas cuentan
  lexicon: HALOT
  rationale: El verbo es plural indefinido sin sujeto explícito. En español, el pasivo/impersonal con «se» reproduce bien esa indefinición y evita introducir un sujeto que el hebreo no da.
- source_word: נִפְלְאוֹתֶיךָ
  english_pob_choice: your wondrous deeds
  chosen_spanish: tus maravillas
  alternatives_spanish:
  - tus obras maravillosas
  - tus hechos maravillosos
  - tus maravillas portentosas
  lexicon: HALOT
  rationale: נִפְלְאוֹת designa acciones extraordinarias que causan asombro. «Maravillas» es breve y fiel al sustantivo; el contexto ya indica que son tuyas, por lo que no hace falta añadir «deeds» explícitamente.
theological_decisions:
- issue: «Tu nombre está cerca»
  english_pob_reading: Retain the Hebrew idiom literally as 'your name is near' rather than interpretively expanding it.
  chosen_spanish_reading: «cercano está tu nombre» conserva el giro hebreo sin cerrarlo a una sola explicación.
  alternative_spanish_readings:
  - tu presencia está cerca
  - tu renombre está cerca
  - cerca está tu nombre
  rationale: En los Salmos, «nombre» puede señalar carácter revelado, presencia pactal o fama. La traducción mantiene la tensión teológica en vez de resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB que favorece una lectura más literal del verbo final como impersonal/pasiva sin sujeto explícito. También se respetó la división principal marcada por la pausa fuerte del verso, reflejada en la puntuación española con dos segmentos de agradecimiento y una cláusula final explicativa.
  spanish_consistency_notes:
  - Se usa «Dios» en vocativo según el estándar del proyecto.
  - Se preserva «nombre» sin sustituirlo por «presencia» o «fama» en el texto principal.
  - Se usa impersonal con «se» para el verbo final, en continuidad con la indefinición del hebreo.
  - El tono es bíblico y sobrio, pero con sintaxis española natural.
