    issue: '''repartirá la herencia'' traduce mal יַחֲלֹק en contexto'
    rationale: Con נַחֲלָה y 'entre los hermanos', el sentido es participar en la herencia o recibir una parte, no distribuirla a otros. El proverbio trata de elevación de estatus del esclavo prudente, no de su función como repartidor.
