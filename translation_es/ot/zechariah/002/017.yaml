translation:
  language: es
  text: ¡Silencio[a], toda carne, delante de Yahvé, porque se ha despertado[b] de su santa morada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la humanidad». El hebreo dice literalmente «toda carne», una expresión profética que subraya la condición criatura del ser humano delante de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «se ha levantado» / «se ha despertado». El verbo hebreo presenta la imagen de Yahvé saliendo del reposo para actuar.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַס
  english_pob_choice: Be silent
  chosen_spanish: ¡Silencio!
  alternatives_spanish:
  - Calla
  - Guarden silencio
  - ¡Silencio total!
  lexicon: HALOT
  rationale: El hebreo es una interjección/imperativo breve que convoca a guardar silencio. «¡Silencio!» comunica con naturalidad la solemnidad y la fuerza exhortativa del original, sin añadir explicación.
- source_word: כָּל בָּשָׂר
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda humanidad
  - todos los seres humanos
  - todos
  lexicon: HALOT
  rationale: Se conserva la expresión literal «carne» para mantener el registro profético y la tensión antropológica del hebreo, en vez de suavizarla con una paráfrasis como «toda humanidad».
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: En este contexto la locución idiomática expresa estar ante la presencia de alguien. «Delante de» es claro, natural y conserva la relación espacial/personal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el principio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en vez de sustituirlo por un título. Así se preserva el nombre personal de Dios en el texto español.'
- source_word: נֵעוֹר
  english_pob_choice: he has roused himself
  chosen_spanish: se ha despertado
  alternatives_spanish:
  - se ha levantado
  - se ha puesto en acción
  - se ha agitado
  lexicon: HALOT
  rationale: El verbo sugiere ser despertado o salir del reposo para actuar. «Se ha despertado» mantiene la imagen con fluidez en español y deja visible la idea de movimiento desde el reposo.
- source_word: מִמְּעוֹן קָדְשׁוֹ
  english_pob_choice: from his holy dwelling
  chosen_spanish: de su santa morada
  alternatives_spanish:
  - de su santa habitación
  - de su santo santuario
  - de su santa residencia
  lexicon: HALOT
  rationale: «Morada» traduce bien מָעוֹן como lugar de habitar; «santa» preserva el valor de קָדְשׁוֹ. «Morada» suena más natural que «habitación» y más preciso que «santuario» en este verso.
theological_decisions:
- issue: Alcance antropológico de כָּל בָּשָׂר
  english_pob_reading: Retain the literal expression 'all flesh' rather than interpretively narrowing it to 'all humanity.'
  chosen_spanish_reading: Conservar «toda carne» en lugar de reducirlo interpretativamente a «toda humanidad».
  alternative_spanish_readings:
  - toda humanidad
  - todos los seres humanos
  rationale: La expresión literal preserva el tono profético y la imagen bíblica de la criatura humana compareciendo ante Dios. Aunque el sentido global apunta a toda la humanidad, el español puede retener la tensión del hebreo sin perder inteligibilidad.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Modo de referirse al nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se adopta la forma española estándar del proyecto para el nombre divino, en continuidad con la decisión auditada del POB en inglés. Esto evita la sustitución por un título y mantiene la transparencia del nombre revelado.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
- issue: Valor de la imagen verbal נֵעוֹר
  english_pob_reading: he has roused himself
  chosen_spanish_reading: se ha despertado
  alternative_spanish_readings:
  - se ha levantado
  - se ha rousado
  - se ha puesto en acción
  rationale: La imagen no es solo «levantarse», sino pasar del reposo a la acción. «Se ha despertado» conserva esa metáfora sin forzar un giro explicativo y resulta idiomática en español.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El inglés POB mantiene «all flesh» y traduce נֵעוֹר con una imagen de despertar/espabilarse para actuar; esta versión española conserva ambas decisiones auditadas. No se requieren revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera coherente con el principio del proyecto para יהוה.
  - Se conserva el registro profético con «toda carne» en lugar de una paráfrasis antropológica.
  - La puntuación reproduce la fuerza exhortativa del hebreo con una interjección inicial seguida de la causa explicativa.
  - «Morada» mantiene el valor espacial/sagrado sin introducir el matiz técnico de «santuario» que el hebreo no exige aquí.
