lexical_decisions:
- source_word: עֲטָרוֹת
  english_pob_choice: Ataroth
  chosen_spanish: Atarot
  alternatives_spanish:
  - Ataroth
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera en vez de traducirse. En español bíblico, «Atarot» mantiene mejor la forma hebrea y evita una anglicización innecesaria.
- source_word: דִיבֹן
  english_pob_choice: Dibon
  chosen_spanish: Dibón
  alternatives_spanish:
  - Dibon
  lexicon: HALOT
  rationale: Nombre propio geográfico. Se adapta a la ortografía española con tilde por la acentuación natural de la palabra.
- source_word: יַעְזֵר
  english_pob_choice: Jazer
  chosen_spanish: Jazer
  alternatives_spanish:
  - Yazer
  - Jaazer
  lexicon: HALOT
  rationale: Se conserva la transliteración convencional del topónimo. «Jazer» es claro y reconocible en español bíblico.
- source_word: נִמְרָה
  english_pob_choice: Nimrah
  chosen_spanish: Nimra
  alternatives_spanish:
  - Nimrah
  lexicon: HALOT
  rationale: El hebreo aquí presenta la forma breve del topónimo, así que se evita armonizarla con formas más largas de pasajes relacionados. «Nimra» refleja mejor esa forma breve en español.
- source_word: חֶשְׁבּוֹן
  english_pob_choice: Heshbon
  chosen_spanish: Jesbón
  alternatives_spanish:
  - Hesbón
  - Heshbón
  lexicon: HALOT
  rationale: Se translitera el nombre propio respetando la pronunciación española más natural. «Jesbón» es una forma clara y estable en español bíblico.
- source_word: אֶלְעָלֵה
  english_pob_choice: Elealeh
  chosen_spanish: Elealé
  alternatives_spanish:
  - Elealeh
  - Elealé
  lexicon: HALOT
  rationale: Nombre propio; la forma española conserva el timbre final del hebreo y resulta más natural en lectura pública.
- source_word: שְׂבָם
  english_pob_choice: Sebam
  chosen_spanish: Sebam
  alternatives_spanish:
  - Sibma
  - Shibmá
  - Sibmá
  lexicon: HALOT
  rationale: Se mantiene la forma que corresponde al hebreo de este versículo, sin normalizarla con variantes relacionadas de otros contextos. Se preserva así la tensión textual entre formas afines del topónimo.
- source_word: נְבוֹ
  english_pob_choice: Nebo
  chosen_spanish: Nebo
  alternatives_spanish:
  - Nebo
  lexicon: HALOT
  rationale: Topónimo propio ampliamente reconocido; se conserva sin traducción.
- source_word: בְּעֹן
  english_pob_choice: Beon
  chosen_spanish: Beón
  alternatives_spanish:
  - Beon
  lexicon: HALOT
  rationale: Se translitera el nombre propio con acento gráfico para la lectura española. Se preserva la forma breve del texto, sin expandirla a una forma relacionada de otro pasaje.
- source_word: וְ / וּ
  english_pob_choice: and
  chosen_spanish: la conjunción coordinante repetida en la lista
  alternatives_spanish:
  - coma simple sin repetición de la conjunción
  - solo «y» final
  lexicon: Gramática hebrea
  rationale: El hebreo enumera los lugares con polisíndeton; en español, la lista se resuelve de manera natural con comas y una conjunción final, sin perder la secuencia enumerativa.
theological_decisions:
- issue: Tratamiento de nombres de lugares relacionados con variantes textuales
  english_pob_reading: The English POB preserves Sebam and Beon as the forms present here, while noting related expanded or alternate forms elsewhere.
  chosen_spanish_reading: Se conservan Sebam y Beón tal como aparecen en este versículo, con notas que señalan variantes relacionadas en otros lugares.
  alternative_spanish_readings:
  - Normalizar a Sibmá/Shibmá y Baal-meón
  - armonizar con formas más largas de pasajes paralelos
  rationale: La fidelidad al texto hebreo de este versículo exige no armonizar automáticamente con nombres más expandidos atestiguados en otros contextos. Esto preserva la tensión textual documentada por la POB inglesa.
  doctrine_reference: Principio de fidelidad textual y respeto por las variantes de los topónimos bíblicos
translation_notes:
  revision_awareness: 'La revisión inglesa reciente redujo las repeticiones de «and» para una lista más natural, manteniendo los nombres y la conjunción final. La versión española adopta una solución equivalente: lista con comas y «y» final, sin repetir la conjunción antes de cada topónimo.'
  spanish_consistency_notes:
  - Se mantiene la transliteración de topónimos en forma breve cuando el hebreo del versículo es breve.
  - Se evita introducir traducciones interpretativas o armonizaciones con pasajes paralelos.
  - La puntuación española sigue el patrón natural de enumeración en lugar del polisíndeton literal.
  - Las notas a pie preservan variantes relevantes para el lector sin sobrecargar el texto principal.
