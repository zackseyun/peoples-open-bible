base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/014/019.yaml
  text: Then the king said[a], “Is the hand of Joab with you in all this?” And the woman answered and said, “As your soul lives, my lord the king, no one can turn to the right or to the left from anything that my lord the king has spoken, for your servant Joab himself commanded me[b], and he himself put all these words into the mouth of your female servant.”
  footnotes:
  - marker: a
    text: Or, “As surely as you live, my lord the king.” The Hebrew oath formula is literally, “As your soul lives.”
    reason: lexical_alternative
  - marker: b
    text: The expression “turn to the right or to the left” is a Hebrew idiom meaning to deviate from, contradict, or evade what the king has said.
    reason: cultural_note
