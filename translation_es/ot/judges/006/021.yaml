translation:
  language: es
  text: Entonces el ángel de Yahvé extendió la punta del bastón que tenía en su mano y tocó la carne y el pan sin levadura[a]. Y el fuego subió de la roca y consumió la carne[b] y el pan sin levadura. Entonces el ángel de Yahvé se alejó de su vista[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el mensajero de Yahvé’.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘carne’; aquí se refiere a la carne preparada de la ofrenda.
    reason: lexical_alternative
  - marker: c
    text: O ‘se apartó de su vista’; hebreo literalmente ‘se fue de sus ojos’, es decir, ya no era visible para Gedeón.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar ‘mensajero’ o ‘ángel’; en este relato el ser actúa con rasgos sobrenaturales, así que ‘ángel’ comunica mejor el uso narrativo. Yְהוָה se conserva como ‘Yahvé’ conforme al criterio doctrinal del proyecto.
- source_word: וַיִּשְׁלַח
  english_pob_choice: reached out
  chosen_spanish: extendió
  alternatives_spanish:
  - alargó
  - estiró
  lexicon: HALOT
  rationale: Aquí el verbo expresa extender la punta del bastón hacia adelante, no ‘enviar’. ‘Extendió’ es natural en español y mantiene la imagen física.
- source_word: קְצֵה הַמִּשְׁעֶנֶת
  english_pob_choice: the tip of the staff
  chosen_spanish: la punta del bastón
  alternatives_spanish:
  - el extremo del bastón
  - la punta del palo
  lexicon: HALOT
  rationale: קָצֶה es ‘extremo/punta’ y מִשְׁעֶנֶת es un bastón o vara de apoyo. ‘Punta del bastón’ conserva la concreción del gesto y suena idiomático en español.
- source_word: וַיִּגַּע
  english_pob_choice: touched
  chosen_spanish: tocó
  alternatives_spanish:
  - hizo contacto con
  - tocó con
  lexicon: HALOT
  rationale: נגע normalmente significa ‘tocar’; no hace falta intensificar el verbo.
- source_word: בָּשָׂר
  english_pob_choice: meat
  chosen_spanish: carne
  alternatives_spanish:
  - carne preparada
  - carne del sacrificio
  lexicon: HALOT
  rationale: Aunque en inglés POB se optó por ‘meat’ para evitar ambigüedad, en español ‘carne’ es el equivalente más directo y también puede designar la porción preparada para comer. La nota conserva que se trata de la carne preparada de la ofrenda.
- source_word: מַצּוֹת
  english_pob_choice: unleavened bread
  chosen_spanish: las tortas sin levadura
  alternatives_spanish:
  - el pan sin levadura
  - las matzot
  lexicon: HALOT
  rationale: El plural hebreo nombra un alimento concreto. ‘Tortas sin levadura’ es claro y ampliamente entendible; evita un calco rígido y mantiene el referente culinario.
- source_word: וַתַּעַל הָאֵשׁ מִן הַצּוּר
  english_pob_choice: fire went up from the rock
  chosen_spanish: el fuego subió de la roca
  alternatives_spanish:
  - el fuego salió de la roca
  - el fuego se alzó de la roca
  lexicon: HALOT
  rationale: ‘Subió de la roca’ sigue la imagen de עולה con מן, sin añadir más de lo que el hebreo afirma. ‘Roca’ traduce צּוּר de forma directa.
- source_word: וַתֹּאכַל
  english_pob_choice: consumed
  chosen_spanish: consumió
  alternatives_spanish:
  - devoró
  - se tragó
  lexicon: HALOT
  rationale: Aunque literalmente el verbo es ‘comer’, con fuego el español natural y fiel es ‘consumió’.
- source_word: הָלַךְ מֵעֵינָיו
  english_pob_choice: went away from his sight
  chosen_spanish: se alejó de su vista
  alternatives_spanish:
  - se apartó de su vista
  - desapareció de su vista
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente que ya no estaba ‘ante sus ojos’. ‘Se alejó de su vista’ conserva el matiz de retirada visual sin forzar la idea de desaparición repentina.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español del proyecto se mantiene el nombre divino como ‘Yahvé’ para preservar el nombre personal del pacto, en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: mַלְאַךְ יְהוָה como entidad narrativa
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  rationale: La narración presenta una figura sobrenatural identificable como ángel; por eso se mantiene esa lectura, sin neutralizarla como ‘mensajero’.
  doctrine_reference: HALOT / narrativa de Jueces 6
translation_notes:
  revision_awareness: Concordancia alta con el audit trail en inglés; no se requirieron revisiones textuales adicionales. Se preservó la decisión doctrinal de traducir יְהוָה como Yahvé y se mantuvo la secuencia narrativa y la imaginería del fuego que emerge de la roca.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה.
  - ‘Ángel’ se mantiene como traducción principal de מַלְאַךְ en este contexto narrativo.
  - ‘Carne’ traduce בָּשָׂר; la nota explica el sentido de ofrenda para evitar ambigüedad.
  - ‘Tortas sin levadura’ conserva el plural y el carácter alimentario de מַצּוֹת.
  - La frase final preserva el hebraísmo de ‘su vista’ sin exagerar a ‘desapareció’.
