    issue: Pronombre 'para él' en 'antes de que se cumpla un año completo para él'
    rationale: El hebreo לוֹ se refleja en inglés como 'for it', ligado a la casa/venta. En español, 'para él' introduce un referente masculino personal y crea confusión; no preserva fielmente el sentido contextual.
  - severity: medium
    issue: '''quedará establecida permanentemente para el comprador'' suena rígido y menos transparente'
    rationale: Aunque intenta reflejar וְקָם literalmente, la auditoría inglesa explica que el sentido jurídico es que la propiedad queda definitivamente transferida. En español natural, 'pasará permanentemente al comprador' o equivalente comunica mejor esa fuerza legal sin perder fidelidad.
  - severity: low
    issue: Nota a sobrecargada con alternativa poco natural
    rationale: La nota actual repite 'para él' y 'año íntegro', que no mejora la claridad. Conviene una nota breve que explique el plazo legal de un año completo y, si se desea, la literalidad de la construcción.
