translation:
  language: es
  text: 'Y de los silonitas[a]: Asaías, el primogénito, y sus hijos varones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «los shelonitas», siguiendo una identificación tradicional alternativa de este nombre de clan.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מִן
  english_pob_choice: And from
  chosen_spanish: Y de
  alternatives_spanish:
  - De
  - Y desde
  lexicon: HALOT
  rationale: El prefijo conjuntivo unido a מִן conserva aquí el enlace aditivo con la lista anterior; en español, «Y de» reproduce bien esa continuidad genealógica sin sonar forzado.
- source_word: הַ/שִּׁילוֹנִי
  english_pob_choice: the Shilonites
  chosen_spanish: los shilonitas
  alternatives_spanish:
  - el shilonita
  - los shelonitas
  lexicon: HALOT
  rationale: Aunque la forma hebrea es morfológicamente singular, en este registro funciona de manera colectiva para un clan o grupo. En español, el plural gentilicio «los shilonitas» preserva ese sentido corporativo. Se mantiene la transliteración basada en la consonancia del texto; «shelonitas» queda como alternativa tradicional posible, pero menos directa.
- source_word: עֲשָׂיָה
  english_pob_choice: Asaiah
  chosen_spanish: Asaías
  alternatives_spanish:
  - Asayah
  - Asaía
  lexicon: Transliteration (name)
  rationale: Es un nombre propio y debe transliterarse, no traducirse. «Asaías» es la forma castellana más reconocible y fiel para este antropónimo.
- source_word: הַ/בְּכֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primero nacido
  - el mayor
  lexicon: HALOT
  rationale: בכור designa al hijo primogénito. En español, «primogénito» expresa de manera natural y precisa el valor familiar y lexical del término.
- source_word: וּ/בָנָיו
  english_pob_choice: and his sons
  chosen_spanish: y sus hijos
  alternatives_spanish:
  - y sus hijos varones
  - y su descendencia
  lexicon: HALOT
  rationale: בנים significa literalmente «hijos» y aquí continúa la enumeración familiar. «Hijos» es fiel y idiomático en español; se evita «descendencia» por ser más general de lo que el hebreo exige.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa están en alto acuerdo y no muestran revisiones sustantivas. La única decisión relevante es la manera de reflejar en español el gentilicio colectivo y la nota alternativa tradicional del nombre de clan.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando aparece el nombre divino; en este versículo no aparece.
  - Se mantiene un gentilicio colectivo en plural para reflejar el valor de grupo del término hebreo.
  - Los nombres propios se transliteran de forma estándar al español bíblico sin domesticar su forma al sentido común del idioma.
