source:
  edition: SBLGNT
  text: καὶ ἀπέστειλεν πρὸς τοὺς γεωργοὺς τῷ καιρῷ δοῦλον, ἵνα παρὰ τῶν γεωργῶν λάβῃ ἀπὸ ⸂τῶν καρπῶν⸃ τοῦ ἀμπελῶνος·
base_translation:
  language: en
  yaml_path: translation/nt/mark/012/002.yaml
  text: And at the proper time he sent a slave to the vine-growers[b][a], so that he might receive from the vine-growers some of the fruit of the vineyard.
  footnotes:
  - marker: a
    text: Or 'servant' for 'slave' (δοῦλος).
    reason: alternative_reading
  - marker: b
    text: Or 'farmers' or 'tenants' for 'vine-growers.' The Greek term refers to those who work the land; the vineyard setting gives it this more specific sense.
    reason: lexical_alternative
translation:
  language: ko
  text: 그리고 때가 이르자 그가 종 한 사람을 소작인들에게 보내, 소작인들에게서 포도원 소출 가운데서 얼마를 받게 하였습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοῦλον
  english_pob_choice: slave
  chosen_korean: 종
  alternatives_korean:
  - 노예
  - 하인
  lexicon: BDAG
  rationale: 비유 안에서의 δοῦλος는 직설적인 매임을 신학적으로 강조하기보다 「주인의 사람」으로서의 사절 기능을 한다. 한국어 자연스러움을 위해 「종」을 사용하고, 신학적 매임을 부각해야 할 본문(10:44)과 구별한다.
