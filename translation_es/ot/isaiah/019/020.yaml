review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: señal/testigo, Yahvé, clamor por causa de opresores, envío de un salvador y figura protectora, y liberación final. Sin embargo, hay dos puntos que conviene ajustar para mayor fidelidad y naturalidad: (1) לַיהוָה צְבָאוֹת se entiende mejor en español como «para Yahvé de los Ejércitos» o «para Yahvé de los Ejércitos como señal/testigo», no «de Yahvé...», porque el dativo לְ expresa referencia/dirección más que posesión; (2) la nota al pie anclada en «opresores» no corresponde al audit trail inglés, que preserva la dificultad léxica de וָרָב, no de לֹחֲצִים.'
  spanish_quality_summary: El texto es claro y de registro bíblico moderno. «Clamarán», «salvador» y «los librará» funcionan bien. «Campeón» es defendible por el audit trail, aunque puede sonar algo moderno; con nota bien anclada resulta aceptable. El principal problema de calidad es sintáctico-semántico en «testigo de Yahvé de los Ejércitos», que suena posesivo y menos natural/fiel que «para Yahvé de los Ejércitos».
  glossary_alignment: 'Alinea bien con la terminología del proyecto: יהוה -> «Yahvé»; צְבָאוֹת -> «de los Ejércitos»; מוֹשִׁיעַ -> «salvador». No hay conflicto doctrinal. Se preserva adecuadamente la nota sobre el término difícil וָרָב, pero debe moverse para anclarse a «campeón» y no a «opresores».'
  issues:
  - severity: medium
    issue: «de Yahvé de los Ejércitos» para לַיהוָה צְבָאוֹת
    rationale: El hebreo usa לְ, no una construcción posesiva. En este contexto «para Yahvé de los Ejércitos» preserva mejor la relación de señal/testimonio dirigida a él o referente a él. «Testigo de Yahvé» en español puede entenderse como 'testigo perteneciente a Yahvé'.
  - severity: medium
    issue: La nota [a] está anclada a «opresores» en vez de al término difícil «campeón»
    rationale: La nota inglesa explica la dificultad de וָרָב y las alternativas «a champion / a great one». No comenta לֹחֲצִים. Debe moverse al lugar correspondiente para mantener la trazabilidad léxica.
  - severity: low
    issue: «Señal» sin artículo
    rationale: No es incorrecto, pero «para una señal y para un testigo» suena más natural y completo en español. Aun así, puede mantenerse sin artículo si se prioriza concisión.
  revised_spanish_text: Será para señal y para testigo para Yahvé de los Ejércitos en la tierra de Egipto. Porque clamarán a Yahvé a causa de los opresores, y él les enviará un salvador y campeón[a], y los librará.
  revised_footnotes:
  - marker: a
    text: O «un salvador y un campeón»; la expresión hebrea es difícil. El segundo término también puede entenderse más literalmente como «un grande».
    reason: lexical_alternative
  revision_rationale: Se ajusta la preposición para reflejar mejor el לְ hebreo en «לַיהוָה צְבָאוֹת» y se reubica la nota textual al término realmente discutido, «campeón», conforme al audit trail inglés. No se requieren cambios doctrinales ni una adjudicación compleja.
