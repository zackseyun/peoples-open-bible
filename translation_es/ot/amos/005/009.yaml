    issue: Uso de «Él que» en lugar de «El que»
    rationale: El hebreo tiene un participio sustantivado ('el que ...'), no un pronombre explícito. En español, «Él que» resulta incorrecto o muy poco natural aquí y añade una explicitación innecesaria.
  - severity: medium
    issue: «hace venir una destrucción repentina» suena forzado
    rationale: Aunque intenta preservar el movimiento verbal, en español bíblico natural «trae una destrucción repentina» comunica mejor la misma idea sin perder el matiz de irrupción súbita.
