translation:
  language: es
  text: 'Que los de mente vana[b] no bendigan las cosas vanas[a] por la destrucción de los amados por ti, diciendo[c]: «Ni siquiera su Dios los rescató».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cosas vacías» o «los ídolos». El griego dice literalmente «las cosas vacías», probablemente con fuerza polémica.
    reason: lexical_alternative
  - marker: b
    text: O «los de pensamiento vano». El griego empareja deliberadamente esta expresión con «las cosas vanas» para crear un juego de palabras.
    reason: lexical_alternative
  - marker: c
    text: O «los libró».
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ... εὐλογησάτωσαν
  english_pob_choice: Let not ... bless
  chosen_spanish: No permitan ... que bendigan
  alternatives_spanish:
  - No dejen que ... bendigan
  - Que no ... bendigan
  lexicon: LSJ
  rationale: 'El imperativo prohibitivo de tercera persona con μή se expresa con naturalidad en español como una prohibición dirigida a quien habla: «No permitan ... que bendigan». Mantiene el valor de ruego/prohibición sin convertirlo en una mera descripción.'
- source_word: τοῖς ματαίοις
  english_pob_choice: the empty things
  chosen_spanish: las cosas vanas
  alternatives_spanish:
  - las cosas vacías
  - los ídolos
  - las vanidades
  lexicon: LSJ
  rationale: La forma dativa plural sugiere aquí objetos o cosas asociadas con vaciedad/vanidad. «Cosas vanas» conserva la fuerza léxica y la posible carga polémica sin especificar «ídolos» más de lo que el griego dice explícitamente.
- source_word: οἱ ματαιόφρονες
  english_pob_choice: the vain-minded
  chosen_spanish: los de mente vana
  alternatives_spanish:
  - los vanidosos
  - los de pensamiento vano
  - los fútiles
  lexicon: LSJ
  rationale: La palabra compuesta mantiene el juego de raíz con ματαίοις y describe personas cuyo pensamiento es vano. «Los de mente vana» preserva la repetición semántica y suena más formal que una opción coloquial.
- source_word: ἐπὶ τῇ ... ἀπωλείᾳ
  english_pob_choice: over the destruction
  chosen_spanish: sobre la destrucción
  alternatives_spanish:
  - por la destrucción
  - a causa de la destrucción
  - ante la destrucción
  lexicon: LSJ
  rationale: ἐπί con dativo indica ocasión o base; «sobre la destrucción» refleja el sentido de jactarse o celebrar a costa de la ruina ajena, de modo directo y idiomático.
- source_word: τῶν ἠγαπημένων σου
  english_pob_choice: those beloved by you
  chosen_spanish: los amados por ti
  alternatives_spanish:
  - los amados tuyos
  - los que tú amas
  - tus amados
  lexicon: LSJ
  rationale: El participio perfecto pasivo conserva la idea de «amados». «Por ti» mantiene la pasiva y la dirección a Dios sin introducir una formulación más interpretativa que «los que tú amas».
- source_word: Οὐδὲ ὁ θεὸς αὐτῶν ἐρύσατο αὐτούς
  english_pob_choice: Not even their God rescued them
  chosen_spanish: Ni siquiera su Dios los rescató
  alternatives_spanish:
  - Ni siquiera su Dios los libró
  - Ni siquiera su Dios los salvó
  - Su Dios no los rescató ni siquiera
  lexicon: LSJ
  rationale: ἐρύσατο puede significar «rescatar» o «librar». «Rescató» es claro en español moderno y conserva el matiz de sacar de peligro o ruina.
theological_decisions:
- issue: Si ματαίοις debe entenderse específicamente como «ídolos» o más generalizadamente como cosas vanas/vacías
  english_pob_reading: 'more general: ''the empty things'''
  chosen_spanish_reading: 'más general: «las cosas vanas»'
  alternative_spanish_readings:
  - los ídolos
  - las cosas vacías
  - las vanidades
  rationale: El griego no nombra explícitamente «ídolos», aunque en contextos judíos polémicos la asociación es posible. La opción general preserva la tensión léxica y evita añadir una precisión teológica que el texto no formula de manera abierta.
  doctrine_reference: Primacía del idioma original y conservación de ambigüedades significativas
- issue: Cómo reflejar el juego de palabras entre ματαίοις y ματαιόφρονες
  english_pob_reading: the vain-minded / the empty things
  chosen_spanish_reading: «los de mente vana» / «las cosas vanas»
  alternative_spanish_readings:
  - los vanos / las cosas vanas
  - los de pensamiento vano / las cosas vacías
  rationale: El griego enlaza ambos términos por raíz y efecto retórico. El español intenta conservar esa correspondencia con «vana» y «mente vana», sin volver la frase demasiado artificial.
  doctrine_reference: Retención de recursos retóricos del texto fuente
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «empty-headed» a «vain-minded» para mayor precisión formal. La presente versión española sigue esa corrección con «los de mente vana» y mantiene la equivalencia léxica con «cosas vanas» para ματαίοις. No se adoptó «ídolos» en el texto principal porque la revisión inglesa también decidió conservar una lectura más general de ματαίοις.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma preferente cuando el texto griego cite o aluda al nombre divino; aquí aparece θεός, por lo que se traduce «Dios» según el contexto.
  - Se conserva el paralelismo semántico entre ματαίοις y ματαιόφρονες con «vanas» / «mente vana».
  - Se eligió «rescató» para ἐρύσατο por ser claro y no más interpretativo que «libró».
  - La puntuación con dos puntos introduce la cita directa final de manera natural en español.
