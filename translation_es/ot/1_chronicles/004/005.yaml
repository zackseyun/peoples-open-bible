translation:
  language: es
  text: 'Ashhur, padre[a] de Tecoa, tuvo dos esposas: Helah y Naarah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fundador de Tecoa' / 'antepasado de Tecoa'; en genealogías, 'padre de' puede indicar el fundador de un clan o de un asentamiento, no solo un padre biológico inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְאַשְׁחוּר
  english_pob_choice: Ashhur
  chosen_spanish: Ashhur
  alternatives_spanish:
  - Y Ashhur
  - Ahora bien, Ashhur
  lexicon: HALOT
  rationale: En una nota genealógica, la partícula introductoria unida al nombre funciona como enlace discursivo; en español fluido, el nombre propio puede ir sin reproducir de forma rígida la conjunción/preposición inicial.
- source_word: אֲבִי תְקוֹעַ
  english_pob_choice: the father of Tekoa
  chosen_spanish: padre de Tecoa
  alternatives_spanish:
  - fundador de Tecoa
  - antepasado de Tecoa
  lexicon: HALOT
  rationale: אָב puede indicar padre literal, antepasado o fundador en contextos genealógicos. 'Padre de Tecoa' mantiene la forma y deja abierta la amplitud genealógica documentada por la POB inglesa.
- source_word: הָיוּ
  english_pob_choice: had
  chosen_spanish: tuvo
  alternatives_spanish:
  - había
  - eran
  lexicon: HALOT
  rationale: Aunque el hebreo usa una forma verbal de 'ser/estar', en español la relación posesiva o genealógica se expresa naturalmente con 'tuvo' en este contexto.
- source_word: שְׁתֵּי נָשִׁים
  english_pob_choice: two wives
  chosen_spanish: dos esposas
  alternatives_spanish:
  - dos mujeres
  - dos mujeres como esposas
  lexicon: HALOT
  rationale: Por el marco genealógico y la construcción posesiva con un varón nombrado, נָשִׁים aquí significa 'esposas', no simplemente 'mujeres'.
- source_word: חֶלְאָה
  english_pob_choice: Helah
  chosen_spanish: Helá
  alternatives_spanish:
  - Jelá
  - Helah
  lexicon: HALOT
  rationale: Se translitera el nombre propio con una adaptación ortográfica española que conserve la pronunciación aproximada y lectura natural en español.
- source_word: וְנַעֲרָה
  english_pob_choice: and Naarah
  chosen_spanish: y Naará
  alternatives_spanish:
  - y Naará
  - y Naarah
  lexicon: HALOT
  rationale: Se conserva la coordinación simple entre los dos nombres y se translitera el segundo con adaptación española de acentuación para lectura natural.
translation_notes:
  revision_awareness: El texto base y la auditoría inglesa están en alto acuerdo; no se requieren cambios textuales mayores. Se mantuvo la ambigüedad genealógica de 'padre de' mediante una nota, como en la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene 'Tecoa' como forma española estable del topónimo.
  - 'Se usa transliteración adaptada para nombres propios: Helá, Naará.'
  - No se introdujo 'Mesías', 'SEÑOR' ni otras equivalencias no pertinentes al versículo.
