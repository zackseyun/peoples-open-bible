translation:
  language: es
  text: No hay quien clame por justicia[a], ni quien litigue con fidelidad[b]; confían en el vacío[c] y hablan falsedad; conciben daño y dan a luz perversidad[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud».
    reason: lexical_alternative
  - marker: b
    text: O «litigue con honestidad», o «comparezca en juicio con verdad».
    reason: lexical_alternative
  - marker: c
    text: O «futilidad» o «vanidad».
    reason: lexical_alternative
  - marker: d
    text: O «iniquidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹרֵא בְצֶדֶק
  english_pob_choice: calls for righteousness
  chosen_spanish: clame por justicia
  alternatives_spanish:
  - clame por rectitud
  - llame por justicia
  - clame conforme a la justicia
  lexicon: HALOT
  rationale: קרא con ב puede expresar clamar o invocar en relación con un estándar. En este contexto judicial y moral, «clame por justicia» conserva la fuerza de una apelación pública por lo que es recto. «Justicia» es una alternativa válida a «righteousness» y resulta más natural en español.
- source_word: נִשְׁפָּט בֶּאֱמוּנָה
  english_pob_choice: pleads with faithfulness
  chosen_spanish: litigue con fidelidad
  alternatives_spanish:
  - pleitee con fidelidad
  - entre en juicio con verdad
  - alegue con integridad
  lexicon: HALOT
  rationale: נשפט en este marco forense apunta a disputar o comparecer en un pleito. «Litigue» comunica mejor la participación judicial que una simple traducción pasiva. אֱמוּנָה conserva el sentido de fidelidad, confiabilidad o integridad; «con fidelidad» mantiene esa amplitud.
- source_word: תֹּהוּ
  english_pob_choice: emptiness
  chosen_spanish: vaciedad
  alternatives_spanish:
  - vacío
  - futilidad
  - vanidad
  lexicon: HALOT
  rationale: תֹהוּ puede expresar vaciedad, inestabilidad, irrealidad o futilidad. «Vaciedad» es una solución idiomática en español que preserva la imagen de confiar en algo sin sustancia, sin reducirlo solo a «futilidad» o a la carga tradicional de «vanidad».
- source_word: שָׁוְא
  english_pob_choice: falsehood
  chosen_spanish: falsedad
  alternatives_spanish:
  - engaño
  - mentira
  - vanidad
  lexicon: HALOT
  rationale: שָׁוְא abarca falsedad, engaño o lo vano. «Falsedad» reproduce bien el valor moral y discursivo del término sin forzar una única acepción de «mentira».
- source_word: הָרוֹ עָמָל
  english_pob_choice: they conceive trouble
  chosen_spanish: conciben maldad
  alternatives_spanish:
  - conciben calamidad
  - conciben aflicción
  - conciben daño
  lexicon: HALOT
  rationale: El verbo הרה mantiene la metáfora de concepción. Aunque el inglés POB usa «trouble», en español «maldad» funciona bien con el paralelo siguiente y deja visible el resultado moral de la metáfora sin perder la imagen de gestación.
- source_word: וְהוֹלֵיד אָוֶן
  english_pob_choice: give birth to wickedness
  chosen_spanish: dan a luz perversidad
  alternatives_spanish:
  - dan a luz iniquidad
  - engendran maldad
  - dan a luz maldad
  lexicon: HALOT
  rationale: ילד en causativo continúa la metáfora de parto. «Dan a luz» es una equivalencia transparente en español. אָוֶן puede ser iniquidad, maldad o perversidad; «perversidad» conserva el tono de corrupción moral del contexto profético.
theological_decisions:
- issue: Amplitud moral de צֶדֶק y אֱמוּנָה en un oráculo de corrupción
  english_pob_reading: Use 'righteousness' for צֶדֶק and 'faithfulness' for אֱמוּנָה without narrowing either to exclusively legal or doctrinal categories.
  chosen_spanish_reading: Usar «justicia» para צֶדֶק y «fidelidad» para אֱמוּנָה, sin reducirlos a términos técnicos de tribunal ni a nociones abstractas desligadas de la conducta.
  alternative_spanish_readings:
  - «rectitud» y «verdad»
  - «justicia» y «verdad»
  rationale: El pasaje denuncia corrupción social y jurídica, pero los términos hebreos conservan alcance moral y pactal más amplio. La combinación elegida mantiene esa amplitud y sigue siendo clara en español.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'La revisión más reciente del inglés POB ajustó la cláusula media a verbos finitos con sujeto explícito: ''they trust in emptiness and speak falsehood''. La redacción española sigue ese ajuste con ''confían... y hablan...'', manteniendo además la metáfora de concepción y parto y evitando una construcción participial que debilitara el paralelismo hebreo.'
  spanish_consistency_notes:
  - Se preserva el paralelismo de dos miembros legales iniciales y dos miembros morales posteriores.
  - «Yahvé» no aparece en este versículo; no se requiere decisión sobre el nombre divino aquí.
  - Se mantuvo «fidelidad» para אֱמוּנָה, coherente con su uso covenantal y relacional en la serie POB.
  - La secuencia verbal española refleja con claridad los perfectivos/participiales hebreos sin volverla artificial.
