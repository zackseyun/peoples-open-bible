review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés en casi todo: conserva Yahvé para יְהוָה, mantiene la secuencia imperativa, retiene la amplitud de יְשׁוּעַת como «salvación» con nota alternativa, y refleja correctamente la cláusula final sin verbo explícito con nota sobre el posible futuro. Sin embargo, «No les corresponde pelear» desplaza el sentido principal de לֹא לָכֶם לְהִלָּחֵם desde ‘no necesitarán / no les tocará combatir’ hacia una idea de impropiedad o competencia. Además, «manténganse firmes» para עִמְדוּ es aceptable, pero combinado con «tomen sus posiciones» suena algo interpretativo; «quédense quietos» o «permanezcan quietos» refleja mejor el efecto de ‘stand still’ tras el primer imperativo.'
  spanish_quality_summary: El español es claro y digno, con buena legibilidad eclesial. «Tomen sus posiciones» y «Yahvé está con ustedes» son naturales. La principal mejora es hacer más idiomática y exacta la primera cláusula; «No tienen que pelear en esta batalla» suena más natural y coincide mejor con el sentido contextual. También conviene ajustar «manténganse firmes» a una expresión que no duplique demasiado la idea de tomar posición y que preserve el matiz de quedarse sin intervenir.
  glossary_alignment: 'La terminología del proyecto está bien respetada: יְהוָה -> «Yahvé»; יְשׁוּעַת -> «salvación» con alternativa «liberación» en nota; עִמָּכֶם -> «con ustedes». No hay conflictos doctrinales relevantes. El único desajuste es más semántico/idiomático que glosarial: «No les corresponde pelear» no representa tan bien la decisión léxica documentada en inglés («You will not need to fight»).'
  issues:
  - severity: medium
    issue: «No les corresponde pelear en esta batalla» para לֹא לָכֶם לְהִלָּחֵם בָּזֹאת
    rationale: Aunque literalmente se aproxima a ‘no es para ustedes pelear’, en español sugiere más ‘no es su función / no les incumbe’ que ‘no tendrán que pelear’. El contexto y la decisión inglesa documentada favorecen una formulación de necesidad o requerimiento.
  - severity: low
    issue: «manténganse firmes» para עִמְדוּ
