revisions:
- from: 'Y el rey dijo a Barzilái[a]: «Tú, cruza con[mí] y yo te proveeré[b] conmigo en Jerusalén».'
  to: 'Y el rey dijo a Barzilái: «Tú, cruza conmigo, y yo te sustentaré[a] conmigo en Jerusalén».'
  rationale: Se corrige el error de formato «con[mí]», se elimina una nota innecesaria sobre la transliteración del nombre propio, y se reemplaza «te proveeré» por «te sustentaré» para reflejar mejor el valor de כלכל en español natural, conservando mediante nota las alternativas léxicas documentadas por el inglés POB.
