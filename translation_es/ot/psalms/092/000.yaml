lexical_decisions:
- source_word: מִזְמוֹר
  english_pob_choice: psalm
  chosen_spanish: salmo
  alternatives_spanish:
  - melodía
  - salmo musical
  lexicon: HALOT
  rationale: «מִזְמוֹר» es un término de encabezado asociado a composiciones para ser cantadas. «Salmo» es el equivalente natural y reconocido en español, y preserva el carácter de título literario del versículo.
- source_word: שִׁיר
  english_pob_choice: song
  chosen_spanish: canto
  alternatives_spanish:
  - canción
  - himno
  lexicon: HALOT
  rationale: El hebreo añade un segundo sustantivo junto a «מִזְמוֹר». «Canto» mantiene la idea de pieza cantada y permite distinguirlo de «salmo» sin sonar redundante en español.
- source_word: לְ/י֣וֹם
  english_pob_choice: for the day
  chosen_spanish: para el día
  alternatives_spanish:
  - para
  - para uso en el día
  - correspondiente al día
  lexicon: HALOT
  rationale: La preposición ל indica asociación o destino. En español, «para el día» conserva esa relación funcional en un encabezado, sin forzar una cláusula verbal.
- source_word: הַ/שַּׁבָּֽת
  english_pob_choice: the Sabbath
  chosen_spanish: el día de reposo
  alternatives_spanish:
  - el sábado
  - el día de sábado
  lexicon: HALOT
  rationale: «הַשַּׁבָּת» refiere al Sabbath. En español bíblico y eclesial, «día de reposo» comunica el sentido institucional sin depender de una tradición denominacional específica; «sábado» sería más literal pero puede sonar menos explícito en el contexto litúrgico del encabezado.
theological_decisions:
- issue: Función literaria de superinscripción
  english_pob_reading: 'Translate as a heading: ''A psalm, a song for the Sabbath day.'''
  chosen_spanish_reading: 'Tratarlo como encabezado: «Un salmo, un canto para el día de reposo.»'
  alternative_spanish_readings:
  - Primera línea poética sin puntuación de encabezado
  rationale: El hebreo presenta sustantivos nominales sin verbo finito; por tanto, corresponde a una superinscripción. El español como encabezado evita crear una proposición inexistente y respeta la función literaria del texto.
  doctrine_reference: Poética bíblica / encabezamientos del Salterio
translation_notes:
  revision_awareness: 'El texto fuente y el audit trail inglés concuerdan plenamente: no se registran revisiones aplicadas ni tensiones textuales. La decisión principal en español es mantener el valor de encabezado y resolver «Sabbath» con una equivalencia natural y clara.'
  spanish_consistency_notes:
  - 'Se conserva el paralelismo de dos sustantivos del hebreo: «salmo» y «canto».'
  - Se mantiene el tono de encabezado con puntuación breve, acorde con el uso del Salterio.
  - «Día de reposo» expresa la referencia sabática sin introducir una formulación eclesiástica cerrada.
