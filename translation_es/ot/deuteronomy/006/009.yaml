revisions:
- from: Y las escribirás sobre los postes de la puerta de tu casa y sobre tus puertas.[a][b]
  to: Las escribirás sobre los postes de la puerta de tu casa[a] y en tus entradas[b].
  rationale: Se ajusta שְׁעָרֶיךָ para reflejar mejor 'gates/entrances' y evitar la ambigüedad de 'puertas'. Se mantiene 'postes de la puerta' para מְזוּזוֹת conforme a la precisión del original. Se omite la conjunción inicial por naturalidad en español bíblico moderno sin afectar el valor injuntivo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:51:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: verbo injuntivo/futuro de mandato, objeto explícito, inscripción ''sobre'' los postes de la puerta de la casa, y referencia paralela a los accesos. Sin embargo, ''tus puertas'' para וּבִשְׁעָרֶיךָ reduce demasiado el sentido de ''gates/entrances'' a hojas de puerta domésticas y no preserva bien el matiz de acceso/gate area documentado en la auditoría inglesa.'
  spanish_quality_summary: La frase es clara y natural, pero 'sobre tus puertas' suena menos preciso y algo extraño en este contexto, especialmente después de 'los postes de la puerta de tu casa'. 'Y en tus entradas' o 'y en tus portones' evita la repetición ambigua de 'puerta' y refleja mejor el paralelismo. También conviene quitar la 'Y' inicial para un español más natural en versículo aislado.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. La decisión clave es léxica: mantener מְזוּזוֹת como ''postes de la puerta'' y ajustar שְׁעָרֶיךָ a un equivalente español que preserve ''gates/entrances'' mejor que ''puertas''. Las notas léxicas deben seguir mostrando las alternativas estructurales.'
