review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: כִּי כֹה אָמַר introduce correctamente la fórmula profética; בְּתִתִּי se entiende bien como acto resultativo (''cuando te convierta en''); עִיר נֶחֱרֶבֶת = ''ciudad arruinada'' es fiel; כֶּעָרִים אֲשֶׁר לֹא נוֹשָׁבוּ está bien representado como ciudades no habitadas. También preserva adecuadamente בְּהַעֲלוֹת ... אֶת תְּהוֹם con ''hacer subir ... el abismo''. Sin embargo, el texto español omite el verbo final de וְכִסּוּךְ הַמַּיִם הָרַבִּים (''y las aguas grandes te cubran / te cubran las aguas grandes''), dejando la cláusula incompleta. Además, la nota [a] está anclada en ''ciudad arruinada'', pero su contenido corresponde a la cláusula del abismo, no a ese sintagma.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la frase final queda truncada e ininteligible por la ausencia de 'te cubran'. También conviene mover la nota [a] al lugar correcto para que no cree confusión. 'El Señor Yahvé' es legible, aunque algo pesado; no requiere cambio porque sigue la política del proyecto. 'Las aguas grandes' es aceptable y natural en registro bíblico.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוִה -> ''Yahvé''; תְּהוֹם -> ''abismo'' es defendible en este contexto; no hay conflictos con otros términos clave. La principal desviación no es terminológica sino sintáctica: falta el verbo correspondiente a וְכִסּוּךְ.'
  issues:
  - severity: high
    issue: Falta el verbo final de la última cláusula
    rationale: El hebreo וְכִסּוּךְ significa 'y te cubran / y te cubren'; el borrador termina en 'y las aguas grandes[b],' sin predicado, por lo que no preserva el sentido completo.
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado
    rationale: 'La nota dice ''O: cuando haga subir el abismo sobre ti'', pero está puesta sobre ''ciudad arruinada[a]''. Debe anclarse en la cláusula del abismo, donde pertenece la alternativa léxica/documental.'
  revised_spanish_text: 'Porque así dice el Señor Yahvé: Cuando te convierta en una ciudad arruinada, como las ciudades que no están habitadas, cuando haga subir sobre ti el abismo[a] y las aguas grandes[b] te cubran,'
  revised_footnotes:
  - marker: a
    text: 'O: "cuando haga subir el abismo sobre ti".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "las muchas aguas".'
    reason: lexical_alternative
  revision_rationale: Se añadió el verbo 'te cubran' para completar fielmente וְכִסּוּךְ הַמַּיִם הָרַבִּים y se reubicó la nota [a] a la cláusula del abismo, que es donde corresponde su alternativa. Se mantuvieron las demás decisiones léxicas porque son fieles al hebreo y coherentes con la política terminológica del proyecto.
