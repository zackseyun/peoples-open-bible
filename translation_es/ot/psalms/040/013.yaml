translation:
  language: es
  text: Porque males sin número me han rodeado[a]; mis iniquidades[b] me han alcanzado, y no he podido ver. Son más que los cabellos de mi cabeza, y mi corazón desfallece[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sin número' o 'demasiados para contarlos'.
    reason: lexical_alternative
  - marker: b
    text: '''Mis iniquidades'' también puede traducirse ''mis pecados'' o ''mi culpa''; el hebreo puede abarcar tanto el mal cometido como su carga.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'mi corazón me ha abandonado'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base o motivo de la afirmación anterior con una causalidad natural en español, manteniendo el valor explicativo del hebreo sin volverlo excesivamente formal.
- source_word: אָפְפוּ עָלַי
  english_pob_choice: have surrounded me
  chosen_spanish: me han rodeado
  alternatives_spanish:
  - me han cercado
  - me han envuelto
  lexicon: HALOT
  rationale: El verbo hebreo expresa ser cercado o rodeado; en español, 'me han rodeado' conserva la imagen de verse asediado por todos lados de manera clara y fiel.
- source_word: רָעוֹת
  english_pob_choice: evils
  chosen_spanish: males
  alternatives_spanish:
  - calamidades
  - desdichas
  - males
  lexicon: HALOT
  rationale: '''Males'' reproduce la amplitud semántica de רָעוֹת, que puede abarcar maldad, daño o desgracia. ''Males'' evita reducirlo solo a aflicciones externas y mantiene el peso moral del término.'
- source_word: עַד אֵין מִסְפָּר
  english_pob_choice: beyond number
  chosen_spanish: sin número
  alternatives_spanish:
  - sin contar
  - demasiados para contarlos
  lexicon: HALOT
  rationale: La expresión idiomática comunica innumerabilidad. 'Sin número' es una fórmula natural y sobria en español que conserva el valor del hebreo sin añadir interpretación.
- source_word: הִשִּׂיגוּנִי
  english_pob_choice: have overtaken me
  chosen_spanish: me han alcanzado
  alternatives_spanish:
  - me han sobrepasado
  - me han dado alcance
  lexicon: HALOT
  rationale: El verbo expresa alcanzar o dar alcance a alguien. 'Me han alcanzado' preserva la imagen de persecución y la idea de quedar sobrepasado por las iniquidades.
- source_word: עֲוֹנֹתַי
  english_pob_choice: my iniquities
  chosen_spanish: mis iniquidades
  alternatives_spanish:
  - mis pecados
  - mi culpa
  lexicon: HALOT
  rationale: Se mantiene 'iniquidades' para conservar la fuerza moral y jurídica del término hebreo y el mismo matiz que la traducción inglesa documentó, evitando diluirlo en un sentido genérico de problemas.
- source_word: וְלֹא יָכֹלְתִּי לִרְאוֹת
  english_pob_choice: and I am not able to see
  chosen_spanish: y no he podido ver
  alternatives_spanish:
  - y no puedo ver
  - y no pude ver
  lexicon: HALOT
  rationale: La forma española conserva la incapacidad de ver del original con un perfecto compuesto natural en el contexto, sin explicitar una causa que el hebreo no formula.
- source_word: עָצְמוּ
  english_pob_choice: They are more than
  chosen_spanish: Son más que
  alternatives_spanish:
  - Son más numerosos que
  - Han aumentado más que
  lexicon: HALOT
  rationale: En el paralelo con 'los cabellos de mi cabeza', el verbo comunica exceder en cantidad. 'Son más que' mantiene la comparación abierta y sobria, como en la lectura inglesa auditada.
- source_word: מִשַּׂעֲרוֹת רֹאשִׁי
  english_pob_choice: the hairs of my head
  chosen_spanish: los cabellos de mi cabeza
  alternatives_spanish:
  - los pelos de mi cabeza
  - los cabellos de mi cabeza
  lexicon: HALOT
  rationale: '''Cabellos'' es la opción más natural y digna en español bíblico actual. Conserva la imagen convencional de innumerabilidad sin el registro más coloquial de ''pelos''.'
- source_word: לִבִּי עֲזָבָנִי
  english_pob_choice: my heart fails me
  chosen_spanish: mi corazón me ha abandonado
  alternatives_spanish:
  - mi corazón desfallece
  - me falta el corazón
  - mi corazón me falla
  lexicon: HALOT
  rationale: La expresión literal 'mi corazón me ha abandonado' preserva la imagen hebrea de dejar/forsake y la tensión semántica documentada. Se evita reducirla de entrada a una mera emoción o a una sola idea idiomática.
theological_decisions:
- issue: 'El sentido de עֲוֹנֹתַי: culpa/iniquidad propia o solo desgracias asociadas'
  english_pob_reading: the psalmist's own iniquities
  chosen_spanish_reading: mis iniquidades
  alternative_spanish_readings:
  - mi culpa
  - mis pecados
  - las consecuencias de mis pecados
  rationale: Se conserva la lectura de culpa propia señalada por la traducción inglesa y por el hebreo posesivo, sin convertirla en simples sufrimientos externos. Esto mantiene la tensión entre aflicción y responsabilidad moral del hablante.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
- issue: 'La última cláusula: metáfora literal del corazón que abandona vs. equivalente idiomático de desmayo o desánimo'
  english_pob_reading: my heart fails me
  chosen_spanish_reading: mi corazón me ha abandonado
  alternative_spanish_readings:
  - mi corazón desfallece
  - me falta el ánimo
  - mi corazón me falla
  rationale: La elección sigue de cerca el literal hebreo documentado ('ha forsaken me') para no suavizar la imagen. Así se conserva la fuerza poética y la ambigüedad entre pérdida de ánimo, valentía o vitalidad.
  doctrine_reference: Mantener la metáfora bíblica sin sobreinterpretarla.
translation_notes:
  revision_awareness: 'Se integró la lectura auditada del inglés POB y se mantuvo su tensión lexical y teológica principal: רָעוֹת como males/evils amplios, עֲוֹנֹתַי como iniquidades propias, y לִבִּי עֲזָבָנִי con una nota que preserva el literal hebreo. No hubo cambios de revisión pendientes en el paquete fuente.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' por norma solo cuando el texto lo exige; este versículo no lo contiene.
  - Se prefirió 'males' para רָעוֹת en lugar de 'aflicciones' para conservar amplitud semántica y el posible matiz moral.
  - '''Iniquidades'' mantiene coherencia con la POB inglesa y con el valor de עָוֹן como culpa y delito, no solo como desgracia.'
  - La clausula final conserva la imagen corporal del hebreo; la nota aclara la alternativa idiomática sin reemplazarla en el texto principal.
  - La puntuación separa las dos mitades del versículo conforme al paralelismo hebreo, con un cierre final que reproduce el avance retórico del original.
