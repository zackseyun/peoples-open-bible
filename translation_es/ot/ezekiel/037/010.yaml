translation:
  language: es
  text: Así profeticé como él me mandó[a], y el aliento[b] entró en ellos, y vivieron y se pusieron de pie, un ejército sumamente grande.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como él me ordenó».
    reason: lexical_alternative
  - marker: b
    text: O «el espíritu entró en ellos». El hebreo רוּחַ puede significar «aliento», «viento» o «espíritu».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנַּבֵּאתִי
  english_pob_choice: I prophesied
  chosen_spanish: Así profeticé
  alternatives_spanish:
  - Así hablé como profeta
  - Profeticé
  lexicon: HALOT
  rationale: El hitpael de נבא aquí describe el acto profético de Ezequiel. «Profeticé» conserva la fuerza verbal y la brevedad del hebreo; «Así» refleja el enlace narrativo equivalente a «So» en el contexto.
- source_word: כַּאֲשֶׁר צִוָּנִי
  english_pob_choice: as he commanded me
  chosen_spanish: como él me mandó
  alternatives_spanish:
  - tal como él me mandó
  - como me ordenó
  lexicon: HALOT
  rationale: Se mantiene la comparación directa y el verbo de mandato. El sujeto queda implícito como en el hebreo; se conserva «él» sin explicitar «Yahvé» para no añadir lo que el texto inmediato no expresa.
- source_word: וַתָּבוֹא בָהֶם
  english_pob_choice: entered into them
  chosen_spanish: entró en ellos
  alternatives_spanish:
  - entró dentro de ellos
  - vino sobre ellos
  lexicon: HALOT
  rationale: בוא con ב expresa entrada. «Entró en ellos» es natural en español y conserva la imagen de ingreso al interior, sin expandirla indebidamente.
- source_word: הָרוּחַ
  english_pob_choice: the breath
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el aliento
  - el viento
  lexicon: HALOT
  rationale: En este pasaje la palabra רוּחַ conserva una ambigüedad deliberada entre aliento, viento y espíritu. Se eligió «espíritu» para respetar esa amplitud semántica en español, mientras la nota preserva la alternativa «aliento» que enfatiza la vivificación corporal. No se colapsa la tensión teológica del texto.
- source_word: וַיִּחְיוּ
  english_pob_choice: they lived
  chosen_spanish: y vivieron
  alternatives_spanish:
  - y cobraron vida
  - y revivieron
  lexicon: HALOT
  rationale: El qal wayyiqtol de חיה indica que pasaron a estar vivos. «Vivieron» es fiel y sobrio; evita añadir una imagen no explícita aunque posible en español.
- source_word: וַיַּעַמְדוּ עַל רַגְלֵיהֶם
  english_pob_choice: stood on their feet
  chosen_spanish: y se pusieron en pie sobre sus pies
  alternatives_spanish:
  - y se alzaron sobre sus pies
  - y estuvieron de pie sobre sus pies
  lexicon: HALOT
  rationale: Se conserva el giro idiomático hebreo de ponerse de pie sobre los propios pies. La fórmula española suena natural y mantiene la concreción corporal del texto.
- source_word: חַיִל
  english_pob_choice: army
  chosen_spanish: un ejército
  alternatives_spanish:
  - una tropa
  - una fuerza
  lexicon: HALOT
  rationale: חיל puede referirse a fuerza militar, hueste o ejército. Dado el cuadro visual de los huesos revividos alineados como formación, «ejército» capta mejor la imagen concreta que «hueste» en español moderno.
- source_word: גָּדוֹל מְאֹד מְאֹד
  english_pob_choice: an exceedingly great
  chosen_spanish: grandísimo
  alternatives_spanish:
  - grandísimo, grandísimo
  - sumamente grande
  lexicon: HALOT
  rationale: La duplicación de מְאֹד intensifica fuertemente el adjetivo. «Grandísimo» transmite esa superlación de manera fluida en español; se mantiene el valor intensivo sin forzar una repetición poco natural en la lengua meta.
theological_decisions:
- issue: La ambigüedad de רוּחַ en la visión del valle
  english_pob_reading: the breath
  chosen_spanish_reading: el espíritu
  alternative_spanish_readings:
  - el aliento
  - el viento
  rationale: El contexto inmediato apunta a la fuerza vivificante que entra en los cuerpos y los hace vivir; sin embargo, el hebreo conserva la polisemia de רוּחַ. En español, «espíritu» mantiene mejor la resonancia teológica amplia, mientras que la nota permite leer «aliento» para no perder la referencia a la animación corporal. Se preserva así la tensión literaria y teológica del pasaje en lugar de resolverla de forma reductiva.
  doctrine_reference: 'Translation philosophy: preservar la tensión teológica cuando el texto la sostiene.'
translation_notes:
  revision_awareness: 'El audit trail inglés fue revisado desde una primera formulación más literal («a very, very great army») a una versión más natural («an exceedingly great army»). La versión española sigue esa misma lógica de equivalencia óptima: conserva la intensidad hebrea sin calcado mecánico. También se tuvo en cuenta la nota inglesa sobre רוּחַ, pero se decidió preservar la polisemia en español con una solución principal y una nota alternativa.'
  spanish_consistency_notes:
  - Se usa «profeticé» como forma verbal estándar para נבא en contexto narrativo.
  - Se evita introducir «Yahvé» porque el sujeto del mandato está implícito y no aparece explícitamente en esta cláusula.
  - «Espíritu» se conserva como opción principal por la polisemia de רוּחַ; la nota mantiene «aliento» como alternativa importante.
  - «Ejército» comunica mejor la fuerza militar formada que un término más arcaico como «hueste».
  - La intensificación final se expresa con «grandísimo» para reflejar la duplicación hebrea de מְאֹד sin redundancia innecesaria.
