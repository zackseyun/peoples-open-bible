translation:
  language: es
  text: El enemigo ha llegado a su fin en ruinas perpetuas[a]; tú has arrancado ciudades; hasta la memoria de ellos ha perecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Oh enemigo, las destrucciones han terminado para siempre!». El hebreo inicial también puede entenderse como un vocativo, no solo como sujeto.'
    reason: alternative_reading
lexical_decisions:
- source_word: הָאוֹיֵב
  english_pob_choice: The enemy
  chosen_spanish: El enemigo
  alternatives_spanish:
  - ¡Oh enemigo!
  lexicon: HALOT
  rationale: 'El artículo hebreo favorece una lectura nominal en español: ''El enemigo''. Mantiene la lectura principal del POB en inglés, sin borrar la alternativa vocativa posible del hebreo.'
- source_word: תַּמּוּ
  english_pob_choice: has come to an end
  chosen_spanish: ha llegado a su fin
  alternatives_spanish:
  - se han acabado
  - han terminado
  lexicon: HALOT
  rationale: '''Ha llegado a su fin'' expresa con naturalidad en español la idea de culminación o finalización definitiva, conservando el valor de término completo del verbo.'
- source_word: חֳרָבוֹת
  english_pob_choice: ruins
  chosen_spanish: ruinas
  alternatives_spanish:
  - desolaciones
  - destrucciones
  lexicon: HALOT
  rationale: '''Ruinas'' es la correspondencia más natural y directa en español para la imagen de devastación, y armoniza bien con el plural del hebreo y con ''perpetuas''.'
- source_word: לָנֶצַח
  english_pob_choice: everlasting
  chosen_spanish: perpetuas
  alternatives_spanish:
  - eternas
  - para siempre
  lexicon: HALOT
  rationale: '''Perpetuas'' mantiene la idea de permanencia duradera sin sonar forzado en la construcción ''ruinas perpetuas''. Preserva el matiz de duración indefinida del hebreo.'
- source_word: וְעָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - poblaciones
  - aldeas
  lexicon: HALOT
  rationale: '''Ciudades'' reproduce el sentido básico de עִיר y mantiene la fuerza histórica y urbana del juicio descrito.'
- source_word: נָתַשְׁתָּ
  english_pob_choice: you have uprooted
  chosen_spanish: has arrancado
  alternatives_spanish:
  - has desarraigado
  - has derribado
  lexicon: HALOT
  rationale: '''Arrancar'' conserva la imagen de sacar de raíz o remover por completo, que está en el verbo hebreo. En español suena más natural que un calco como ''desarraigar'' en este contexto poético.'
- source_word: אָבַד
  english_pob_choice: has perished
  chosen_spanish: ha perecido
  alternatives_spanish:
  - ha desaparecido
  - se ha perdido
  lexicon: HALOT
  rationale: '''Ha perecido'' conserva el registro solemne y la idea de desaparición por destrucción, coherente con el cierre del verso.'
- source_word: זִכְרָם
  english_pob_choice: the memory of them
  chosen_spanish: su memoria
  alternatives_spanish:
  - la memoria de ellos
  - su recuerdo
  lexicon: HALOT
  rationale: En español, 'su memoria' es una forma más fluida y idiomática para el sustantivo hebreo con sufijo, sin perder la referencia a lo que queda de ellos en el recuerdo colectivo.
- source_word: הֵמָּה
  english_pob_choice: the very
  chosen_spanish: hasta
  alternatives_spanish:
  - incluso
  - aun
  lexicon: HALOT
  rationale: El pronombre enfático final se expresa de manera idiomática con 'hasta' para marcar énfasis en 'hasta su memoria'. Conserva la fuerza enfática sin introducir una glosa excesiva.
theological_decisions:
- issue: 'Constricción sintáctica inicial: enunciado o vocativo'
  english_pob_reading: The verse is read as a declaration about the enemy's final destruction, not as a direct address to the enemy.
  chosen_spanish_reading: El verso se entiende principalmente como una afirmación sobre la destrucción final del enemigo.
  alternative_spanish_readings:
  - ¡Oh enemigo, las destrucciones se han acabado para siempre!
  rationale: La secuencia verbal y el flujo hacia la segunda hemistiquio favorecen una lectura declarativa. Se conserva la alternativa vocativa en nota porque el hebreo la permite, pero no parece la lectura más natural del conjunto.
  doctrine_reference: Psalmic imprecatory/judgment language; translational issue, not a doctrinal divergence.
translation_notes:
  revision_awareness: La versión sigue el pasaje hebreo directo con atención a la lectura poética del paralelismo y al valor enfático del pronombre final. No hay cambios relevantes respecto al POB inglés auditado; se mantiene la decisión principal de leer el inicio como enunciado, dejando la alternativa vocativa en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparece; aquí no se presenta.
  - Se evita 'SEÑOR' como sustituto editorial porque el verso no contiene el tetragrámaton.
  - '''Ruinas perpetuas'' busca reflejar ''everlasting ruins'' sin sonar artificial en español.'
  - La nota conserva la ambigüedad sintáctica documentada en el POB inglés.
