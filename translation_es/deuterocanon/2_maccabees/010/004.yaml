lexical_decisions:
- source_word: οὐδάμως
  english_pob_choice: not at all
  chosen_spanish: de ningún modo
  alternatives_spanish:
  - en absoluto
  - de ninguna manera
  lexicon: LSJ
  rationale: La negación enfática pide una expresión igualmente fuerte y natural en español; «de ningún modo» conserva la intensidad de οὐδάμως sin sonar artificial.
- source_word: ἐπιλογιζόμενος
  english_pob_choice: taking into account
  chosen_spanish: tomando en cuenta
  alternatives_spanish:
  - considerando
  - reckonando con
  lexicon: LSJ
  rationale: El participio expresa una evaluación mental de la situación militar; «tomando en cuenta» reproduce bien la idea de cálculo o consideración práctica.
- source_word: τὸ τοῦ θεοῦ κράτος
  english_pob_choice: the might of God
  chosen_spanish: el poder de Dios
  alternatives_spanish:
  - la fuerza de Dios
  - la potestad de Dios
  lexicon: LSJ
  rationale: En español, «poder» comunica de forma clara la fuerza efectiva de κράτος en este contraste bélico. «Might» en inglés se refleja mejor con «poder» o «fuerza»; aquí «poder de Dios» mantiene la referencia directa sin introducir una noción más técnica de dominio.
- source_word: πεφρονηματισμένος
  english_pob_choice: puffed up
  chosen_spanish: ensoberbecido
  alternatives_spanish:
  - lleno de orgullo
  - hinchado de orgullo
  lexicon: LSJ
  rationale: El perfecto participial señala un estado asentado de arrogancia. «Ensoberbecido» conserva esa idea de orgullo inflado y funciona con dignidad en español bíblico contemporáneo.
- source_word: μυριάσιν τῶν πεζῶν
  english_pob_choice: the tens of thousands of foot soldiers
  chosen_spanish: las miríadas de infantes
  alternatives_spanish:
  - los decenas de miles de infantes
  - las miríadas de soldados de a pie
  lexicon: LSJ
  rationale: «Miríadas» refleja el valor cuantitativo de μυριάσιν y conserva el color del número griego. «Infantes» es una forma militar precisa para πεζῶν y evita una frase más pesada.
- source_word: χιλιάσι τῶν ἱππέων
  english_pob_choice: the thousands of horsemen
  chosen_spanish: los millares de jinetes
  alternatives_spanish:
  - los miles de jinetes
  - las millares de caballería
  lexicon: LSJ
  rationale: χιλιάσι expresa miles en plural; «millares» reproduce mejor esa pluralidad cuantitativa que «miles». «Jinetes» es natural para ἱππέων y mantiene el contraste con la infantería.
- source_word: ἐλέφασιν τοῖς ὀγδοήκοντα
  english_pob_choice: the eighty elephants
  chosen_spanish: los ochenta elefantes
  alternatives_spanish:
  - ochenta elefantes
  lexicon: LSJ
  rationale: Se conserva la enumeración literal del contingente militar. El artículo puede quedar implícito en español, pero aquí se mantiene para reflejar la forma listada del griego.
theological_decisions:
- issue: κράτος referido a Dios
  english_pob_reading: the might of God
  chosen_spanish_reading: el poder de Dios
  alternative_spanish_readings:
  - la fuerza de Dios
  - la potestad de Dios
  rationale: El pasaje contrapone la fuerza divina con los recursos militares humanos. «Poder» es el término más transparente y directo en español para ese contraste, sin añadir una lectura más abstracta de soberanía que el contexto inmediato no exige.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El audio-trail inglés no muestra cambios posteriores: la versión recibida se mantiene estable, con revisión final marcada como unchanged y sin modificaciones aplicadas. La redacción española sigue esa decisión y solo ajusta el registro a un español bíblico natural.'
  spanish_consistency_notes:
  - 'Se preservó la negación enfática con una equivalencia idiomática fuerte: «de ningún modo».'
  - «Poder de Dios» mantiene la relación semántica con κράτος y evita una paráfrasis doctrinal más amplia.
  - «Ensoberbecido» traduce el estado de orgullo implícito en el participio perfecto sin suavizarlo.
  - «Miríadas» y «millares» reflejan la enumeración cuantitativa del griego, manteniendo el paralelismo militar.
