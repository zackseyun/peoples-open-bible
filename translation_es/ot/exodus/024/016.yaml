translation:
  language: es
  text: Y la gloria de Yahvé se asentó sobre el monte Sinaí, y la nube lo cubrió[a] por seis días. El séptimo día llamó a Moisés desde el interior[b] de la nube.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la nube cubrió la gloria», si el sufijo se toma como referido a «la gloria de Yahvé» y no al monte Sinaí.
    reason: alternative_reading
  - marker: b
    text: O, «desde en medio de la nube».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahvé
  - la gloria del Yahvé
  lexicon: HALOT
  rationale: כבוד se rinde con el sustantivo español natural 'gloria', y el nombre divino se mantiene como 'Yahvé' conforme al criterio del proyecto. La construcción en español conserva la relación genitiva sin volverla una paráfrasis.
- source_word: וַיִּשְׁכֹּן
  english_pob_choice: settled
  chosen_spanish: se asentó
  alternatives_spanish:
  - habitó
  - reposó
  - moró
  lexicon: HALOT
  rationale: El verbo indica una presencia establecida o que toma asiento. 'Se asentó' comunica bien esa idea en español moderno sin el arcaísmo de 'moró' ni la posible ambigüedad de 'habitó'.
- source_word: עַל הַר סִינַי
  english_pob_choice: on Mount Sinai
  chosen_spanish: sobre el monte Sinaí
  alternatives_spanish:
  - en el monte Sinaí
  - sobre el monte Sinaí
  lexicon: HALOT
  rationale: '''Sobre'' conserva mejor la imagen espacial de la presencia divina que desciende y se posa sobre el monte. ''Monte Sinaí'' es el equivalente natural y reconocido para el topónimo.'
- source_word: וַיְכַסֵּהוּ
  english_pob_choice: covered it
  chosen_spanish: lo cubrió
  alternatives_spanish:
  - lo cubrió
  - cubrió a Sinaí
  - cubrió al monte
  lexicon: HALOT
  rationale: El sufijo masculino singular se traduce con 'lo' de forma neutra y fiel. En contexto, el antecedente más probable es el monte Sinaí, pero el español puede conservar esa referencia implícita sin forzarla en el texto principal.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube
  - la nube teofánica
  lexicon: HALOT
  rationale: '''La nube'' es la equivalencia natural y suficiente para la nube de la teofanía. No se explicita más en el texto para no sobreinterpretar.'
- source_word: שֵׁשֶׁת יָמִים
  english_pob_choice: for six days
  chosen_spanish: por seis días
  alternatives_spanish:
  - durante seis días
  - por seis días
  lexicon: HALOT
  rationale: La expresión hebrea marca duración; en español, 'por seis días' transmite adecuadamente ese lapso sin añadir matices no presentes.
- source_word: וַיִּקְרָא
  english_pob_choice: he called
  chosen_spanish: llamó
  alternatives_spanish:
  - llamó
  - convocó
  lexicon: HALOT
  rationale: '''Llamó'' reproduce el valor básico del verbo y permite, como en el hebreo, que el sujeto se entienda del contexto. ''Convocó'' sería más interpretativo.'
- source_word: אֶל מֹשֶׁה
  english_pob_choice: to Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - a Moisés
  lexicon: HALOT
  rationale: La preposición con el nombre propio se vierte de manera directa y natural en español.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  english_pob_choice: On the seventh day
  chosen_spanish: Al séptimo día
  alternatives_spanish:
  - El séptimo día
  - Al séptimo día
  lexicon: HALOT
  rationale: La forma temporal española más fluida es 'Al séptimo día', que mantiene el valor ordinal definido del hebreo.
- source_word: מִתּוֹךְ הֶעָנָן
  english_pob_choice: from the midst of the cloud
  chosen_spanish: desde en medio de la nube
  alternatives_spanish:
  - desde en medio de la nube
  - desde el interior de la nube
  - desde dentro de la nube
  lexicon: HALOT
  rationale: '''מתוך'' expresa procedencia desde el interior o medio de algo. ''Desde en medio de la nube'' conserva la fuerza imagística del hebreo y suena más natural que una calca rígida.'
theological_decisions:
- issue: Referente del pronombre objeto en 'lo cubrió'
  english_pob_reading: The cloud covered Mount Sinai
  chosen_spanish_reading: La nube cubrió el monte Sinaí
  alternative_spanish_readings:
  - La nube cubrió la gloria de Yahvé
  - La nube cubrió al monte Sinaí
  rationale: Se mantiene el antecedente más probable del sufijo según el contexto inmediato y la lectura auditada del inglés POB. El texto principal conserva la ambigüedad del hebreo sin resolverla de manera innecesaria.
  doctrine_reference: Primacía del texto original y preservación de ambigüedad genuina.
- issue: Sujeto implícito de 'llamó'
  english_pob_reading: The subject is the LORD
  chosen_spanish_reading: Yahvé llamó a Moisés
  alternative_spanish_readings:
  - La gloria de Yahvé llamó a Moisés
  - Él llamó a Moisés
  rationale: Aunque el hebreo continúa el relato con un sujeto implícito, el contexto de la teofanía apunta a Yahvé como quien llama. El español puede hacer explícito ese sujeto sin alterar el sentido ni perder el flujo narrativo.
  doctrine_reference: Lectura narrativa del pasaje y continuidad teofánica.
translation_notes:
  revision_awareness: 'Se ha seguido de cerca el audit trail inglés: ''settled'' se vierte como ''se asentó'', ''covered it'' se mantiene con el referente más probable en la nota, y ''from the midst of the cloud'' conserva la imagen espacial. No se aplicaron revisiones posteriores al texto base.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton, conforme al estándar del proyecto.
  - '''Gloria'' mantiene el valor de כבוד como presencia/peso manifiesto, sin sustituirlo por una formulación explicativa.'
  - '''Nube'' se deja sin adjetivación teofánica añadida para no cargar el texto más allá del hebreo.'
  - La puntuación sigue el español bíblico moderno con una división clara entre la cláusula inicial y la escena temporal final.
