review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea básica: mantiene la conjunción inicial, la metonimia ‘mi lengua’, el valor durativo de כָּל־הַיּוֹם y el sentido de תְּהִלָּתֶךָ como ‘tu alabanza’. Sin embargo, ‘meditará en tu justicia, y todo el día en tu alabanza’ suena algo elíptico y menos natural en español que una repetición del régimen preposicional; además, la elección principal ‘tu justicia’ se aparta de la preferencia documentada del POB por preservar la amplitud de ‘righteousness’ con una alternativa ‘justice’, lo que en español se puede reflejar mejor con ‘tu rectitud’ en texto y ‘tu justicia’ en nota.'
  spanish_quality_summary: 'El español es claro y digno, pero presenta dos detalles mejorables: (1) la coordinación ‘y todo el día en tu alabanza’ resulta algo trabada; ‘y en tu alabanza todo el día’ o repetir el verbo sería más idiomático. (2) La nota a sobreexplica ‘meditará en voz baja’, mientras que la documentación inglesa prioriza la alternativa entre meditar/expresar verbalmente. También hay un error léxico en alternativas_spanish internas (‘utterá’), aunque eso no afecta el texto bíblico final.'
  glossary_alignment: 'No hay conflicto con los términos de proyecto mayores. La cuestión principal es צִדְקֶךָ: el expediente inglés deja como principal ‘your righteousness’ y conserva ‘justice’ como alternativa. En español, ‘rectitud’ preserva mejor esa amplitud teológica, mientras ‘justicia’ puede quedar como alternativa contextual de vindicación. ‘Tu alabanza’ está bien alineado con el expediente.'
  issues:
  - severity: medium
    issue: La frase ‘y todo el día en tu alabanza’ es poco natural en español.
    rationale: Aunque refleja el hebreo, la elipsis del verbo/régimen produce una coordinación algo rígida. Reordenar a ‘y en tu alabanza todo el día’ mejora la legibilidad sin perder el sentido.
  - severity: medium
    issue: La elección principal ‘tu justicia’ estrecha el matiz frente a la preferencia auditada por ‘righteousness’.
    rationale: El expediente POB documenta ‘your righteousness’ como lectura principal por su amplitud teológica, con ‘justice’ como alternativa. En español, ‘tu rectitud’ preserva mejor esa amplitud que ‘tu justicia’.
  - severity: low
    issue: La nota [a] podría alinearse mejor con la justificación inglesa.
    rationale: La documentación inglesa destaca ‘meditate on / utter’ y que el contexto favorece alabanza hablada; conviene formular la alternativa sin introducir innecesariamente ‘en voz baja’ como foco principal.
  revised_spanish_text: Y mi lengua meditará[a] en tu rectitud[b], y en tu alabanza[c] todo el día.
  revised_footnotes:
