  - marker: b
    text: 'Hebreo: «la casa de Jacob», designación corporativa de los descendientes de Jacob, es decir, Israel.'
    reason: cultural_note
  revision_rationale: Se corrige la primera cola a 'esperaré a Yahvé' para reflejar con mayor fidelidad y naturalidad el hebreo לַיהוָה. Se mueve la nota [a] al verbo 'oculta', que es donde corresponde la alternativa participial documentada. Se ajusta la última cola a 'pondré mi esperanza en él' para distinguir mejor קוה de חכה en español y mantener buena fluidez.
