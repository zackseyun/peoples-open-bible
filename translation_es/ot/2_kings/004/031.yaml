translation:
  language: es
  text: 'Y Giezi fue delante de ellos, y puso el bastón sobre el rostro del muchacho; pero no hubo voz ni respuesta[a]. Luego volvió a su encuentro y le informó, diciendo: «El muchacho no ha despertado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «no hubo voz ni atención / escucha»; es decir, no hubo ninguna reacción del muchacho.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָבַר לִפְנֵיהֶם
  english_pob_choice: went on ahead of them
  chosen_spanish: fue delante de ellos
  alternatives_spanish:
  - pasó delante de ellos
  - se adelantó a ellos
  lexicon: HALOT
  rationale: 'La idea es direccional: Giezi avanza por delante del grupo. «Fue delante de ellos» conserva el movimiento sin volverlo rígido en español.'
- source_word: הַמִּשְׁעֶנֶת
  english_pob_choice: the staff
  chosen_spanish: el bastón
  alternatives_spanish:
  - la vara
  - el cayado
  lexicon: HALOT
  rationale: El objeto es un implemento portátil de apoyo/acción; en español bíblico «vara» podría sonar más abstracto o disciplinario, mientras que «bastón» comunica mejor un objeto físico concreto sin perder naturalidad. Se mantiene la posibilidad de matiz profético sin imponer terminología eclesiástica.
- source_word: עַל פְּנֵי הַנַּעַר
  english_pob_choice: on the boy’s face
  chosen_spanish: sobre el rostro del muchacho
  alternatives_spanish:
  - sobre la cara del muchacho
  - en el rostro del muchacho
  lexicon: HALOT
  rationale: פָּנִים aquí es literalmente «rostro/cara». «Rostro» conserva un registro más digno y preciso en español bíblico; «muchacho» refleja bien נַעַר en este contexto narrativo.
- source_word: וְאֵין קוֹל
  english_pob_choice: there was no sound
  chosen_spanish: no hubo voz
  alternatives_spanish:
  - no hubo sonido
  - no se oyó nada
  lexicon: HALOT
  rationale: Se conserva la tensión léxica del hebreo entre קול como «voz/sonido». «No hubo voz» mantiene más de cerca la expresión original que «no hubo sonido» y deja espacio para la frase paralela siguiente.
- source_word: וְאֵין קָשֶׁב
  english_pob_choice: no response
  chosen_spanish: ni atención
  alternatives_spanish:
  - ni respuesta
  - ni escucha
  lexicon: HALOT
  rationale: קָשֶׁב puede denotar atención o escucha atenta. En paralelo con «no hubo voz», «ni atención» preserva más literalmente la pareja de términos hebreos; la ausencia de respuesta queda inferida por el contexto. Se evita aplanar el contraste con una sola paráfrasis.
- source_word: וַיָּשָׁב לִקְרָאתוֹ
  english_pob_choice: he returned to meet him
  chosen_spanish: luego volvió a su encuentro
  alternatives_spanish:
  - volvió para encontrarse con él
  - regresó a su encuentro
  lexicon: HALOT
  rationale: La expresión indica retorno con intención de encontrarse con el otro. «Volvió a su encuentro» es natural y fiel al movimiento del relato.
- source_word: וַיַּגֶּד לוֹ לֵאמֹר
  english_pob_choice: and told him, saying
  chosen_spanish: y le informó, diciendo
  alternatives_spanish:
  - y le dijo, diciendo
  - y le contó, diciendo
  lexicon: HALOT
  rationale: El verbo hebreo introduce un informe formal. «Le informó» conserva ese matiz de reporte, más preciso que un simple «le dijo».
- source_word: לֹא הֵקִיץ הַנַּעַר
  english_pob_choice: The boy has not awakened
  chosen_spanish: El muchacho no ha despertado
  alternatives_spanish:
  - El muchacho no se ha despertado
  - El muchacho no despertó
  lexicon: HALOT
  rationale: הֵקִיץ significa despertar/recobrar la vigilia. «No ha despertado» conserva el valor resultativo del perfecto hebreo y suena natural en español.
theological_decisions:
- issue: 'Literalidad de la fórmula negativa doble: «no sound and no response» frente a la pareja hebrea קול / קשב'
  english_pob_reading: there was no sound and no response
  chosen_spanish_reading: no hubo voz ni atención
  alternative_spanish_readings:
  - no hubo sonido ni respuesta
  - no hubo voz ni respuesta
  rationale: La elección mantiene visible la doblete del hebreo. «Atención» refleja mejor קשב que una simple «respuesta», pero el contexto deja claro que se trata de ausencia de reacción vital. No hay decisión doctrinal, sino de preservación de la textura del original.
  doctrine_reference: none
translation_notes:
  revision_awareness: El texto base inglés de la POB se mantiene sin revisiones registradas; esta propuesta sigue el pasaje hebreo con la misma lectura general auditada por el equipo inglés, conservando las dos negaciones del original y la secuencia narrativa de movimiento, contacto y reporte.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; este versículo no lo contiene.
  - Se prefieren términos concretos y bíblicamente estables («muchacho», «rostro», «bastón») sin recurrir a máscaras litúrgicas innecesarias.
  - Se conserva la tensión entre קול y קשב mediante una pareja negativa en español, evitando simplificarla a una sola idea de «respuesta».
