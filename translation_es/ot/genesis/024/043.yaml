    issue: Construcción «y que sea que» poco natural para וְהָיָה
    rationale: Aunque intenta reflejar el matiz volitivo, en español suena torpe. «Y sea que» o «y suceda que» preserva mejor el sentido condicional-oracional del hebreo.
  - severity: low
    issue: Nota [a] mal formulada respecto a la alternativa léxica
    rationale: La nota dice «O “Mira”» cuando el texto principal ya usa «¡Mira!». Debe presentar una alternativa real, p. ej. «He aquí», o reformularse como explicación sin “O …”.
  - severity: low
    issue: Mayúscula innecesaria en «Yo» después de la exclamación inicial
    rationale: 'En español debe ir en minúscula dentro de la misma oración: «¡Mira!... yo estoy...» o mejor sin énfasis innecesario: «Mira, estoy...».'
