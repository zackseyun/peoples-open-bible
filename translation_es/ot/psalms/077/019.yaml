review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura del hebreo y mantiene la alternativa léxica para בַּגַּלְגַּל con nota. Sin embargo, se aparta innecesariamente de la decisión auditada de קוֹל como 'sound' al usar 'voz', y 'estaba en el torbellino' suena menos natural en español que una formulación existencial más idiomática.
  spanish_quality_summary: El texto es claro y digno, pero 'La voz de tu trueno' suena más calcado y menos natural que 'El sonido de tu trueno'. Además, 'estaba en el torbellino' resulta algo rígido en español poético; 'se oyó en el torbellino' comunica mejor el evento auditivo sin alejarse del sentido. El resto del verso fluye bien.
  glossary_alignment: No hay conflicto con los términos teológicos por defecto del proyecto. La revisión propuesta sigue la decisión léxica documentada para קוֹל y conserva 'torbellino' como equivalente contextual de בַּגַּלְגַּל, con la nota alternativa 'rueda'.
  issues:
  - severity: medium
    issue: קוֹל se tradujo como 'voz' en lugar de 'sonido'
    rationale: La auditoría inglesa justificó 'The sound of' como la opción idiomática con 'thunder'. En español, 'la voz de tu trueno' es comprensible, pero más literalista y menos natural que 'el sonido de tu trueno'.
  - severity: low
    issue: '''estaba en el torbellino'' es una formulación poco idiomática'
    rationale: Aunque posible, en español suena estática. Dado que el hebreo expresa la presencia/ubicación del sonido, 'se oyó en el torbellino' preserva el sentido y mejora la naturalidad poética.
  revised_spanish_text: El sonido de tu trueno se oyó en el torbellino[a]; los relámpagos alumbraron el mundo; la tierra tembló y se estremeció.
  revised_footnotes:
