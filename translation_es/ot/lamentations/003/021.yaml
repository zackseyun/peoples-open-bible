lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This
  chosen_spanish: Esto
  alternatives_spanish:
  - Esta cosa
  - Esta cuestión
  lexicon: HALOT
  rationale: El demostrativo apunta a algo ya conocido por el contexto inmediato. «Esto» mantiene la referencia abierta y natural en español, sin añadir un sustantivo que el hebreo no expresa.
- source_word: אָשִׁיב
  english_pob_choice: I call
  chosen_spanish: traigo
  alternatives_spanish:
  - hago volver
  - vuelvo a traer
  lexicon: HALOT
  rationale: 'El hiphil de שוב tiene fuerza causativa: «hacer volver / traer de vuelta». En español, «traigo» funciona en la locución idiomática «traer a la mente/corazón» y conserva la idea de recuperar interiormente lo recordado.'
- source_word: אֶל לִבִּי
  english_pob_choice: to mind
  chosen_spanish: a mi corazón
  alternatives_spanish:
  - a mi mente
  - a mi corazón y mente
  lexicon: HALOT
  rationale: El hebreo «corazón» incluye memoria, pensamiento y voluntad interior. Se conserva «corazón» porque es el término fuente y porque aquí no se trata solo de emoción; en español suena natural dentro de la expresión «traer al corazón».
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: HALOT
  rationale: La frase marca consecuencia lógica. «Por eso» comunica la relación inferencial con claridad y dignidad en español contemporáneo.
- source_word: אוֹחִיל
  english_pob_choice: I have hope
  chosen_spanish: tengo esperanza
  alternatives_spanish:
  - espero
  - aguardo con esperanza
  lexicon: HALOT
  rationale: La raíz יחל expresa esperanza expectante. «Tengo esperanza» preserva el matiz de estado interior confiado, más fuerte que un simple «espero», y encaja bien con el tono de lamentación.
theological_decisions:
- issue: Lֵב / corazón como sede de memoria e ინტención interior
  english_pob_reading: Rendered idiomatically as 'to mind' rather than literally 'heart'.
  chosen_spanish_reading: Se conserva «corazón» en la idiomática «traigo a mi corazón», en vez de trasladarlo a «mente».
  alternative_spanish_readings:
  - Esto traigo a mi mente; por eso tengo esperanza.
  - Esto recuerdo; por eso tengo esperanza.
  rationale: En hebreo, «corazón» no es solo emoción; incluye pensamiento, memoria y decisión. En español, mantener «corazón» respeta el campo semántico del original y evita reducir la imagen a una facultad mental moderna. La formulación sigue siendo comprensible y preserva la tensión antropológica del texto.
  doctrine_reference: Antropología bíblica; traducción óptima del hebreo לֵב.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el audit trail inglés: demostrativo neutro, verbo causativo de retorno, locución interna con «corazón», inferencia conclusiva y esperanza expectante. No se detectaron revisiones previas en el registro fuente.'
  spanish_consistency_notes:
  - Se mantiene «corazón» para לֵב, de acuerdo con la antropología bíblica y con el valor idiomático del hebreo.
  - «Tengo esperanza» preserva el matiz de confianza expectante sin volverlo mera posibilidad o deseo.
  - La nota a[a] recoge la alternativa más formal documentada en el audit trail inglés.
