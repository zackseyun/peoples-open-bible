translation:
  language: es
  text: 'Entonces el rey le dijo: «Haz como él ha dicho, y derríbalo[a] y sepúltalo, y quita de mí y de la casa de mi padre la sangre inocente[b] que Joab derramó».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "mátalo"; el hebreo usa un modismo que literalmente significa "caer sobre él" y aquí se refiere a ejecutarlo.
    reason: lexical_alternative
  - marker: b
    text: Expresión legal-moral hebrea para derramamiento de sangre cometido sin causa justa; implica culpa de sangre.
    reason: cultural_note
lexical_decisions:
- source_word: עֲשֵׂה
  english_pob_choice: Do
  chosen_spanish: Haz
  alternatives_spanish:
  - Lleva a cabo
  - Cumple
  lexicon: HALOT
  rationale: Es un imperativo directo y natural en español; conserva la orden breve y enfática del hebreo sin añadir matices innecesarios.
- source_word: כַּאֲשֶׁר דִּבֶּר
  english_pob_choice: as he has said
  chosen_spanish: como él ha dicho
  alternatives_spanish:
  - como dijo
  - conforme a lo que dijo
  lexicon: HALOT
  rationale: La referencia es inmediata a las palabras recién pronunciadas; en español, el pretérito perfecto funciona bien para ese enlace discursivo y mantiene la naturalidad.
- source_word: וּפְגַע בּוֹ
  english_pob_choice: strike him down
  chosen_spanish: atácalo
  alternatives_spanish:
  - dale muerte
  - cae sobre él
  lexicon: HALOT
  rationale: El hebreo usa un modismo que, en este contexto, implica una acción violenta con resultado de ejecución. 'Atácalo' conserva el valor idiomático sin suavizarlo; la secuencia con 'sepúltalo' deja claro el resultado letal.
- source_word: וּקְבַרְתּוֹ
  english_pob_choice: and bury him
  chosen_spanish: y sepúltalo
  alternatives_spanish:
  - y entiérralo
  lexicon: HALOT
  rationale: '''Sepultar'' es plenamente comprensible y un poco más solemne, acorde con el registro bíblico; refleja bien la acción final de dar sepultura.'
- source_word: וַהֲסִירֹתָ
  english_pob_choice: and remove
  chosen_spanish: así apartarás
  alternatives_spanish:
  - y quitarás
  - de ese modo removerás
  lexicon: HALOT
  rationale: En la cadena verbal, la forma expresa resultado/propósito. 'Así apartarás' comunica ese efecto de manera natural y preserva la relación entre la acción y el alivio de la culpa.
- source_word: דְּמֵי חִנָּם
  english_pob_choice: the innocent blood
  chosen_spanish: la sangre inocente
  alternatives_spanish:
  - la sangre derramada sin causa
  - la sangre de inocentes
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula legal-moral. 'Sangre inocente' mantiene el valor idiomático y la carga de culpa por derramamiento injusto.
- source_word: שָׁפַךְ
  english_pob_choice: shed
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - esparció
  lexicon: HALOT
  rationale: En español bíblico y contemporáneo, 'derramó' es la correspondencia más natural para sangre derramada violentamente.
- source_word: מֵעָלַי וּמֵעַל בֵּית אָבִי
  english_pob_choice: from me and from my father’s house
  chosen_spanish: de mí y de la casa de mi padre
  alternatives_spanish:
  - de sobre mí y de sobre la casa de mi padre
  - de encima de mí y de la casa de mi padre
  lexicon: HALOT
  rationale: La preposición sobre/encima no es necesaria en español para transmitir la idea de culpabilidad que recae sobre alguien. 'De mí y de la casa de mi padre' comunica con claridad la remoción de esa carga judicial.
theological_decisions:
- issue: Sangre inocente como carga de culpa removida
  english_pob_reading: Render the idiom as removal of 'innocent blood' from Solomon and his father's house, implying release from culpability for Joab's unjust killings.
  chosen_spanish_reading: Mantener 'la sangre inocente' y 'así apartarás de mí y de la casa de mi padre' para conservar la idea de culpa o sangre-guerra que pesa sobre la casa real.
  alternative_spanish_readings:
  - traducir explícitamente 'la culpa de sangre'
  - usar solo 'la sangre derramada'
  rationale: El hebreo habla concretamente de sangre inocente que debe ser apartada de personas y casa; no conviene abstractarlo del todo a 'culpa' porque se perdería la imagen legal-teológica del texto. A la vez, el español debe dejar claro que el sentido es responsabilización por derramamiento injusto.
  doctrine_reference: Conservar la tensión legal y teológica del texto veterotestamentario sin resolverla mediante una paráfrasis doctrinal.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que eliminó una formulación causal explícita para ceñirse mejor a la coordinación hebrea. En español se reflejó esa coordinación con 'y apartarás', manteniendo el vínculo de resultado sin introducir una explicación añadida.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no por aparecer en este versículo, sino como convención general del proyecto; aquí no era necesario.
  - Se evitó 'SEÑOR' porque el texto no contiene el Tetragrámaton.
  - '''Sangre inocente'' se mantuvo como fórmula estable para דְּמֵי חִנָּם, coherente con el audit trail inglés.'
  - El pronombre enclítico 'le' en 'le dijo' preserva la referencia discursiva natural del hebreo.
