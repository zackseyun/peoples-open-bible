review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: introduce la categoría con ''En cuanto a'', conserva la pezuña dividida, la falta de rumia, la consecuencia de impureza y la regla sobre tocar. Sin embargo, la cláusula וְשֶׁסַע אֵינֶנָּה שֹׁסַעַת está mal resuelta en español: ''pero no la hendidura completamente dividida'' es gramaticalmente defectuosa y no comunica con claridad ''pero no la tiene completamente partida / no divide completamente la pezuña''.'
  spanish_quality_summary: 'El español es mayormente natural, pero presenta un problema importante de legibilidad y sintaxis en la frase central sobre la pezuña. Además, la nota al pie actual no corresponde bien al punto léxico preservado por el inglés: la nota debe anclarse en la segunda expresión sobre la división completa, no en ''animal''. El resto del versículo suena claro y de registro bíblico moderno.'
  glossary_alignment: No hay conflicto con Yahvé/Mesías u otros términos globales. 'Impuro' para טָמֵא es aceptable en Levítico, aunque 'inmundo' sería más tradicional; no es necesario cambiarlo. 'Rumia' es buen equivalente idiomático. La principal corrección requerida es lexical/sintáctica en la intensificación de la pezuña y el manejo de la nota.
  issues:
  - severity: high
    issue: La frase 'pero no la hendidura completamente dividida' es incorrecta y oscurece el sentido.
    rationale: El hebreo expresa que el animal tiene pezuña hendida en algún sentido, pero no la pezuña totalmente partida. La redacción actual carece de verbo finito y no comunica la idea legal/zoológica con claridad.
  - severity: medium
    issue: La nota al pie está anclada en 'animal[a]' en vez de en la expresión relevante sobre la pezuña.
    rationale: La nota inglesa explica la intensificación de 'does not split a split', por lo que debe aparecer donde esa cuestión surge en español, no sobre 'animal'.
  - severity: medium
    issue: El contenido de la nota al pie no refleja con precisión el literal hebreo señalado por la auditoría inglesa.
    rationale: 'La nota actual habla de ''tiene una pezuña hendida'', pero la alternativa literal documentada es sobre la segunda cláusula: ''no divide una división / no parte una hendidura'', que intensifica la idea de una pezuña completamente partida.'
  revised_spanish_text: En cuanto a todo animal que tiene la pezuña hendida, pero no la tiene completamente dividida[a], y no rumia, son impuros para ustedes. Todo el que los toque quedará impuro.
  revised_footnotes:
  - marker: a
    text: Literalmente, 'no divide una hendidura'; el hebreo intensifica la idea de una pezuña completamente partida.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la cláusula central para que el español sea gramatical y fiel al hebreo y al POB en inglés: el animal tiene pezuña hendida, pero no completamente dividida. También se reubica y corrige la nota al pie para documentar la intensificación cognada en el lugar pertinente.'
