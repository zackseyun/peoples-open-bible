revisions:
- from: También el altar que estaba en Betel —el alto lugar que había hecho Jeroboam hijo de Nabat, el que hizo pecar a Israel—, también aquel altar y el alto lugar derribó. Quemó el alto lugar, lo deshizo hasta hacerlo polvo, y quemó la Asherá[a].
  to: También el altar que estaba en Betel —el alto lugar que había hecho Jeroboam hijo de Nabat, el que hizo pecar a Israel—, hasta ese altar y el lugar alto los derribó. Quemó el lugar alto, lo hizo polvo y quemó la Asherá[a].
  rationale: Se ajustó la cláusula principal para que el español suene natural y conserve el énfasis de גַּם con 'hasta ese altar'. También se simplificó la frase final a 'lo hizo polvo' para reflejar mejor la idea de reducir a polvo. Se mantuvo la transliteración 'Asherá' con la nota léxica del POB.
