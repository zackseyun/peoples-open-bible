translation:
  language: es
  text: 'Y habló con ellos, diciendo: «Si es su deseo que yo entierre a mi muerto fuera de mi vista, escúchenme e intercedan[a] por mí con Efrón, hijo de Zóhar»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hagan una petición por mí a Efrón, hijo de Zóhar», reflejando el matiz de hacer una apelación en favor de alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר אִתָּם
  english_pob_choice: And he spoke with them
  chosen_spanish: Y habló con ellos
  alternatives_spanish:
  - Y les dijo
  lexicon: HALOT
  rationale: דבר con אִתָּם expresa hablar con alguien; en español, «habló con ellos» conserva la relación recíproca y el tono narrativo sin volverlo demasiado interpretativo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Es la fórmula estándar de introducción de discurso directo. «Diciendo» mantiene la estructura hebrea de manera natural en español.
- source_word: אִם יֵשׁ אֶת־נַפְשְׁכֶם
  english_pob_choice: If it is your desire
  chosen_spanish: Si es de su agrado
  alternatives_spanish:
  - Si ustedes quieren
  - Si es su deseo
  lexicon: HALOT
  rationale: La expresión literalmente involucra «su alma/vida/yo», pero aquí comunica voluntad o disposición. «Si es de su agrado» preserva el valor volitivo con un español digno y fluido, sin borrar la idiomaticidad.
- source_word: לִקְבֹּר
  english_pob_choice: that I bury
  chosen_spanish: que yo entierre
  alternatives_spanish:
  - para enterrar
  - que entierre
  lexicon: HALOT
  rationale: El infinitivo se hace explícito con sujeto en español para reflejar la intención de Abraham de realizar el entierro; «entierre» conserva la voz activa y el sentido del contexto.
- source_word: אֶת־מֵתִי
  english_pob_choice: my dead
  chosen_spanish: a mi muerto
  alternatives_spanish:
  - a mi difunto
  - a mi muerto querido
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi muerto». En español, «a mi muerto» reproduce la fuerza sobria y directa del genitivo posesivo, sin especificar más de lo que el texto da.
- source_word: מִלְּפָנַי
  english_pob_choice: out of my sight
  chosen_spanish: fuera de mi vista
  alternatives_spanish:
  - de delante de mí
  - fuera de mi presencia
  lexicon: HALOT
  rationale: La frase significa literalmente «de delante de mí». En este contexto funerario se entiende idiomáticamente como apartar al fallecido de la vista/presencia del hablante; «fuera de mi vista» es natural y fiel.
- source_word: שְׁמָעוּנִי
  english_pob_choice: listen to me
  chosen_spanish: escúchenme
  alternatives_spanish:
  - óiganme
  lexicon: HALOT
  rationale: שמע en imperativo puede ser «oír» o «escuchar». Aquí el sentido es atender la súplica; «escúchenme» comunica mejor la apelación directa.
- source_word: וּפִגְעוּ לִי
  english_pob_choice: and intercede for me with
  chosen_spanish: e intercedan por mí con
  alternatives_spanish:
  - y rueguen por mí a
  - y pidan por mí a
  lexicon: HALOT
  rationale: פגע con ב puede implicar hacer una petición o dirigirse a alguien en favor de otro. La revisión inglesa optó por «intercede for me with»; en español, «intercedan por mí con» conserva esa mediación sin exagerar ni suavizar el matiz.
- source_word: בְּעֶפְרוֹן בֶּן־צֹחַר
  english_pob_choice: Ephron son of Zohar
  chosen_spanish: Efrón, hijo de Zóhar
  alternatives_spanish:
  - Efrón hijo de Zóhar
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de forma transparente. «Hijo de» traduce בן de manera estándar y clara.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «approach ... for me» por «intercede for me with ...» para reflejar mejor וּפִגְעוּ לִי בְּ. La presente versión sigue esa decisión y evita añadir contenido no sustentado, manteniendo el resto del versículo muy cerca del hebreo y de la audit trail inglesa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece en este texto.
  - Se usó «mi muerto» en singular para respetar la forma hebrea, sin especificar «esposa» en el texto principal.
  - El matiz de פגע se resolvió como mediación/apelación, no como simple acercarse físicamente.
