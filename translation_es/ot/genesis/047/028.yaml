translation:
  language: es
  text: Jacob vivió en la tierra de Egipto diecisiete años[a], y los días de Jacob, los años de su vida, fueron ciento cuarenta y siete años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los días de Jacob, los años de su vida», un modismo hebreo para referirse a toda su vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - habitó
  - siguió viviendo
  lexicon: HALOT
  rationale: El verbo חיה en esta forma narrativa expresa que Jacob continuó con vida durante ese periodo. «Vivió» es la equivalencia natural en español y conserva el sentido temporal del texto.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  - en la tierra egipcia
  lexicon: HALOT
  rationale: Se conserva explícitamente אֶרֶץ como «tierra», tal como hace la POB en inglés al retener «land». «En la tierra de Egipto» mantiene la forma del hebreo sin volverlo innecesariamente abstracto.
- source_word: שְׁבַע עֶשְׂרֵה שָׁנָה
  english_pob_choice: seventeen years
  chosen_spanish: diecisiete años
  alternatives_spanish:
  - diecisiete años de tiempo
  lexicon: HALOT
  rationale: Es la manera normal y precisa de expresar el número hebreo más sustantivo «años» en español.
- source_word: וַיְהִי
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - resultaron
  - llegaron a ser
  lexicon: HALOT
  rationale: En la cláusula sumaria del total de vida, «fueron» reproduce con naturalidad el valor de cópula/resultativo que la POB inglesa expresa con «were».
- source_word: יְמֵי יַעֲקֹב
  english_pob_choice: the days of Jacob
  chosen_spanish: los días de Jacob
  alternatives_spanish:
  - la vida de Jacob
  - los años de Jacob
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo literalmente, como hace la POB inglesa, para no borrar su carácter idiomático.
- source_word: שְׁנֵי חַיָּיו
  english_pob_choice: the years of his life
  chosen_spanish: los años de su vida
  alternatives_spanish:
  - su vida
  - su existencia
  lexicon: HALOT
  rationale: La frase appositiva explica el modismo anterior. «Los años de su vida» mantiene la estructura y el paralelismo con el hebreo.
- source_word: שֶׁבַע שָׁנִים וְאַרְבָּעִים וּמְאַת שָׁנָה
  english_pob_choice: one hundred forty-seven years
  chosen_spanish: ciento cuarenta y siete años
  alternatives_spanish:
  - ciento cuarenta y siete años cumplidos
  lexicon: HALOT
  rationale: El hebreo expresa el total con el orden numérico propio del idioma; en español se reordena al patrón natural sin alterar la cifra exacta.
theological_decisions:
- issue: Idiomático hebreo «los días de Jacob, los años de su vida»
  english_pob_reading: Hebrew idiom for his lifespan
  chosen_spanish_reading: modismo hebreo para indicar su duración de vida
  alternative_spanish_readings:
  - su vida
  - su tiempo de vida
  rationale: La POB inglesa anotó que la expresión es un modismo. En español conviene conservarla en el texto y aclarar su función idiomática en nota para no perder transparencia ni naturalidad.
  doctrine_reference: Ninguna doctrina en disputa; decisión estilística y semántica.
translation_notes:
  revision_awareness: 'Se sigue la revisión más reciente del audit trail: se mantienen las comas en la apposición («los días de Jacob, los años de su vida») en lugar de un guion largo, porque la revisión aprobada los consideró más formales y naturales en una renderización transparente.'
  spanish_consistency_notes:
  - Se prefirió «tierra de Egipto» para conservar el valor de אֶרֶץ, en coherencia con la POB inglesa.
  - Se mantuvo la apposición hebrea de forma explícita y se explicó en nota, siguiendo el enfoque auditado.
  - Se evitó «moró» o «habitó» porque suavizan innecesariamente el valor narrativo simple de וַיְחִי.
  - El total numérico se expresó según el orden natural del español, preservando exactamente la cifra del hebreo.
