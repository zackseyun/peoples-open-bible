translation:
  language: es
  text: Él planta su tienda junto a ella[a], y se aloja en una buena morada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'sobre/junto a su mano'; aquí el giro hebreo y el paralelo griego expresan cercanía, no una referencia física a la mano.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''y se hospeda en un buen alojamiento''. El hebreo es breve, y el griego sugiere el sentido de alojarse en un buen lugar.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנוֹטֶה / στήσει
  english_pob_choice: he pitches
  chosen_spanish: Él extiende su tienda
  alternatives_spanish:
  - Él planta su tienda
  - Él arma su tienda
  - Él tiende su tienda
  lexicon: HALOT; LSJ
  rationale: נטה con אהל en contexto de campamento describe desplegar o armar una tienda. En español, 'extiende su tienda' conserva la imagen concreta y suena natural, sin perder el valor de acción física que la fuente exige.
- source_word: אָהֳלוֹ / τὴν σκηνὴν αὐτοῦ
  english_pob_choice: his tent
  chosen_spanish: su tienda
  alternatives_spanish:
  - su carpa
  - su tabernáculo
  lexicon: HALOT
  rationale: אֹהֶל / σκηνή es la tienda literal. 'Tienda' es el equivalente más transparente y bíblicamente reconocible en español, sin añadir connotaciones litúrgicas ajenas.
- source_word: עַל יָדָהּ / κατὰ χεῖρας αὐτῆς
  english_pob_choice: beside her
  chosen_spanish: junto a ella
  alternatives_spanish:
  - al lado de ella
  - cerca de ella
  - junto a su mano
  lexicon: HALOT; LSJ
  rationale: El giro hebreo y el paralelo griego expresan cercanía espacial. 'Junto a ella' comunica la proximidad sin retener una imagen demasiado literal que en español sonaría extraña o ambigua.
- source_word: וְשָׁכַן / καὶ καταλύσει
  english_pob_choice: and he lodges
  chosen_spanish: y se hospeda
  alternatives_spanish:
  - y mora
  - y habita
  - y se aloja
  lexicon: HALOT; LSJ
  rationale: שכן y καταλύω aquí apuntan al acto de alojarse o pasar la noche, no solo a residir en sentido abstracto. 'Se hospeda' preserva la idea de alojamiento concreto y temporal propia de la imagen de viaje/campamento.
- source_word: שֹׁכֶן טוֹב / ἐν καταλύματι ἀγαθῶν
  english_pob_choice: a good dwelling-place
  chosen_spanish: un buen alojamiento
  alternatives_spanish:
  - una buena morada
  - un alojamiento agradable
  - un buen lugar de hospedaje
  lexicon: HALOT; LSJ
  rationale: El hebreo es compacto y el griego favorece la idea de un lugar bueno para alojarse. 'Un buen alojamiento' mantiene la imagen de hospedaje sin sobreinterpretar el matiz plural del griego ni convertirlo en una abstracción.
theological_decisions:
- issue: Personificación femenina de la sabiduría
  english_pob_reading: Render feminine references straightforwardly as 'her'.
  chosen_spanish_reading: Mantener 'ella' para la Sabiduría/personificación femenina.
  alternative_spanish_readings:
  - neutralizar con 'ello'
  - reformular sin pronombre personal
  rationale: La sección presenta a la Sabiduría como figura femenina. En español, 'ella' conserva la personificación literaria y teológica sin imponer una despersonalización que la fuente no justifica.
  doctrine_reference: Translation philosophy §1, §3
- issue: Imágenes concretas de tienda y alojamiento
  english_pob_reading: Retain concrete tent/lodging imagery rather than paraphrasing to abstract attachment to wisdom.
  chosen_spanish_reading: Conservar la metáfora concreta de tienda y hospedaje.
  alternative_spanish_readings:
  - Él vive cerca de ella y vive bien
  - Él se establece en la sabiduría
  rationale: El versículo usa imágenes domésticas y de campamento. La traducción debe preservar esa textura metafórica porque forma parte del argumento sapiencial del texto.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El inglés auditado pasó de 'beside her hand' a 'beside her' para hacer más natural la equivalencia idiomática. La presente versión española opta por 'junto a ella' en lugar de una calca de 'mano', porque el hebreo עַל יָדָהּ y el griego κατὰ χεῖρας αὐτῆς indican proximidad. También se conserva la imagen de hospedaje y no una abstracción.
  spanish_consistency_notes:
  - Se mantiene 'tienda' para σκηνή/אהל y 'alojamiento'/'se hospeda' para καταλύω/שכן, siguiendo una coherencia imagética de campamento.
  - No se usa 'SEÑOR' ni terminología eclesiástica no presente en el texto.
  - La personificación femenina se conserva con 'ella' según el contexto sapiencial.
