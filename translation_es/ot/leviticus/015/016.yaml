revisions:
- from: Y si un hombre tiene una emisión de semen[a][b], lavará toda su carne en agua y será inmundo hasta la tarde.
  to: Y si un hombre tiene una emisión de semen[a][b], lavará en agua todo su cuerpo y quedará inmundo hasta la tarde.
  rationale: Se reemplaza «toda su carne» por «todo su cuerpo» para evitar un calco rígido y comunicar con claridad el sentido de בָּשָׂר en este contexto de ablución total. Se ajusta «será inmundo» a «quedará inmundo» para expresar mejor el resultado ritual posterior. Se conservan las notas y el resto de las decisiones léxicas porque son fieles al hebreo y al audit trail inglés.
