translation:
  language: es
  text: Y hubo una ira muy grande contra Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hubo ira muy grande sobre Israel». El griego no precisa el origen de la ira.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - existió
  - se levantó
  - llegó a haber
  lexicon: BDAG
  rationale: El giro griego introduce un estado o acontecimiento resultante. En español, 'hubo' comunica de forma natural la aparición de la situación sin añadir un agente ni forzar una perífrasis más pesada.
- source_word: ὀργὴ
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - enojo
  - indignación
  lexicon: BDAG
  rationale: '''Ira'' transmite mejor que ''enojo'' la intensidad fuerte del término en un contexto de juicio o desastre. Evita suavizar la fuerza léxica del griego.'
- source_word: μεγάλη
  english_pob_choice: very great / great
  chosen_spanish: muy grande
  alternatives_spanish:
  - grandísima
  - muy intensa
  - enorme
  lexicon: BDAG
  rationale: La combinación 'muy grande' preserva el énfasis acumulativo de μεγάλη ... σφόδρα con un español claro y digno, sin sobreinterpretar la clase de ira.
- source_word: ἐπὶ Ἰσραήλ
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - sobre Israel
  - en contra de Israel
  lexicon: BDAG
  rationale: Con ὀργή, ἐπί expresa dirección hacia el objeto del enojo. 'Contra Israel' mantiene esa orientación de manera idiomática en español.
- source_word: σφόδρα
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - en gran manera
  - sobremanera
  lexicon: BDAG
  rationale: '''Muy'' ya está absorbido en la construcción ''muy grande'' y reproduce la intensificación final del griego de forma natural. No se omite la fuerza enfática, sino que se integra en la frase.'
theological_decisions:
- issue: Agente implícito de la ira
  english_pob_reading: The text leaves the source of the wrath unstated.
  chosen_spanish_reading: El texto deja sin especificar el origen de la ira.
  alternative_spanish_readings:
  - ira de Dios
  - ira de los enemigos
  - ira sobrevenida por las circunstancias
  rationale: El griego solo afirma que hubo una gran ira sobre/contra Israel, sin nombrar su fuente. La traducción conserva esa ambigüedad y no introduce un agente que el texto no menciona.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El inglés auditado pasó de una formulación más literal ('there came to be') a una más natural ('there was'). En español, 'hubo' conserva tanto la naturalidad como el valor eventivo de ἐγένετο, mientras 'ira muy grande' mantiene el énfasis de μεγάλη ... σφόδρα sin añadir explicaciones.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otra sustitución teológica no pertinente, porque el versículo no contiene el nombre divino.
  - '''Israel'' se conserva sin artículo, conforme al griego.'
  - La nota alternativa usa 'sobre' como posible equivalente de ἐπί, pero el texto principal prefiere 'contra' por idiomatismo y por el sentido direccional del contexto.
