translation:
  language: es
  text: el pelícano[a], el buitre de carroña[b] y el cormorán[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación de los nombres hebreos de estas aves es incierta; «pelícano» también puede entenderse como «búho del desierto» o simplemente «búho».
    reason: lexical_alternative
  - marker: b
    text: O «buitre»; versiones antiguas en inglés tienen «gier eagle».
    reason: lexical_alternative
  - marker: c
    text: El término hebreo también puede referirse a otra ave acuática, como un pelícano o un ave pescadora.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקָּאָת
  english_pob_choice: the pelican
  chosen_spanish: el pelícano
  alternatives_spanish:
  - el búho del desierto
  - el búho
  lexicon: HALOT, BDB
  rationale: El hebreo קָאָת tiene identificación incierta. Sigo la opción tradicional y reconocible 'pelícano', que encaja con una lista de aves impuras y conserva la decisión léxica documentada por la POB en inglés. La incertidumbre se mantiene en una nota española.
- source_word: הָרָחָמָה
  english_pob_choice: the carrion vulture
  chosen_spanish: el buitre de carroña
  alternatives_spanish:
  - el buitre
  - el águila carroñera
  lexicon: HALOT, BDB
  rationale: Rָחָמָה designa probablemente un ave de presa o carroñera. 'Buitre de carroña' comunica con claridad la función alimentaria sugerida por el contexto y evita el arcaísmo de 'águila giera'/'gier eagle'. La expresión mantiene la fuerza semántica sin sobreprecisar la especie.
- source_word: הַשָּׁלָךְ
  english_pob_choice: the cormorant
  chosen_spanish: el cormorán
  alternatives_spanish:
  - el pelícano
  - el ave pescadora
  lexicon: HALOT, BDB
  rationale: La identificación exacta de שָׁלָךְ es discutida. 'Cormorán' es una equivalencia moderna y natural en español para un ave acuática que pesca, y refleja la opción auditada en inglés. La nota conserva la posibilidad de otras identificaciones.
- source_word: וְ / וְאֶת
  english_pob_choice: and / [object marker not translated]
  chosen_spanish: y / [marcador de objeto no traducido]
  alternatives_spanish:
  - y
  lexicon: Gramática hebrea
  rationale: La waw conjuntiva se traduce con 'y'. El marcador de objeto directo אֵת no tiene equivalente directo en español y se omite en la traducción, preservando la estructura enumerativa sin artificialidad.
translation_notes:
  revision_awareness: El texto inglés auditado no muestra revisiones aplicadas y el resumen de revisión indica acuerdo alto, sin cambios necesarios; por eso la versión española sigue de cerca las decisiones léxicas ya establecidas, manteniendo la misma gradación de incertidumbre en las aves enumeradas.
  spanish_consistency_notes:
  - Se mantiene «pelícano» como término principal para קָאָת, en paralelo con la tradición inglesa auditada.
  - «Buitre de carroña» comunica el valor semántico de scavenger/carrion bird sin usar una forma anticuada.
  - «Cormorán» respeta la opción moderna y clara para שָׁלָךְ.
  - Se conserva la minúscula en los nombres de aves porque el versículo es una lista común de animales.
  - Los corchetes de notas aparecen únicamente donde hay una nota asociada en el texto.
