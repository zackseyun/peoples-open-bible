translation:
  language: es
  text: Entonces tomarás el pecho del carnero de la ordenación[a], que es para Aarón, y lo mecerás como ofrenda mecida delante de Yahvé; y será tu porción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “de la consagración”. El término técnico hebreo se refiere al carnero usado en el rito de instalación sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחָזֶה
  english_pob_choice: the breast
  chosen_spanish: el pecho
  alternatives_spanish:
  - la pechuga
  - el pecho del animal
  lexicon: HALOT
  rationale: En contexto sacrificial, חָזֶה designa la porción delantera del animal destinada al rito. En español, "pecho" comunica de manera natural y precisa esa pieza sin sonar demasiado técnica; "pechuga" es más culinario y menos adecuado para el registro ritual.
- source_word: אֵיל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - ram
  - macho de oveja
  lexicon: HALOT
  rationale: El término hebreo אַיִל corresponde a un macho adulto de oveja. "Carnero" es el equivalente natural y bíblico en español, adecuado para el contexto sacrificial.
- source_word: הַמִּלֻּאִים
  english_pob_choice: of ordination
  chosen_spanish: de la ordenación
  alternatives_spanish:
  - de la consagración
  - de la instalación
  lexicon: HALOT
  rationale: El sintagma técnico nombra el carnero usado en el rito de instalación sacerdotal. "Ordenación" conserva la función de investidura/oficio que el audit trail inglés destacó; "consagración" también es posible, pero menos explícita respecto del oficio.
- source_word: אֲשֶׁר לְאַהֲרֹן
  english_pob_choice: that is for Aaron
  chosen_spanish: que es para Aarón
  alternatives_spanish:
  - que pertenece a Aarón
  - que es de Aarón
  lexicon: HALOT
  rationale: La construcción hebrea identifica el carnero vinculado a Aarón dentro del rito. "Que es para Aarón" mantiene la relación sin forzar una idea de propiedad absoluta.
- source_word: וְהֵנַפְתָּ אֹתוֹ תְּנוּפָה
  english_pob_choice: you shall wave it as a wave offering
  chosen_spanish: lo mecerás como ofrenda mecida
  alternatives_spanish:
  - lo balancearás como ofrenda mecida
  - lo presentarás con un movimiento de mecer
  lexicon: HALOT
  rationale: El verbo y el sustantivo forman una expresión ritual fija. "Mecer" conserva la imagen de movimiento repetido y evita un calco rígido; "ofrenda mecida" mantiene el carácter técnico del rito.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La preposición cultual לִפְנֵי se expresa de forma natural con "delante de". Se conserva "Yahvé" conforme al criterio del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, usando la forma española establecida "Yahvé" en vez de una sustitución por título.
- source_word: וְהָיָה לְךָ לְמָנָה
  english_pob_choice: and it shall be your portion
  chosen_spanish: y será tu porción
  alternatives_spanish:
  - y será tu parte
  - y te corresponderá como porción
  lexicon: HALOT
  rationale: מָנָה denota una porción asignada. "Porción" es breve, fiel y natural en español bíblico contemporáneo.
theological_decisions:
- issue: Rito de instalación sacerdotal expresado por הַמִּלֻּאִים
  english_pob_reading: ordination
  chosen_spanish_reading: ordenación
  alternative_spanish_readings:
  - consagración
  - instalación sacerdotal
  rationale: El pasaje trata del rito de investidura de Aarón en el sacerdocio. "Ordenación" preserva esa dimensión de nombramiento al oficio, sin desplazarla hacia categorías eclesiales posteriores. Se mantiene la tensión documental entre la precisión funcional y la posible lectura de consagración.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se conserva el nombre divino como "Yahvé" en español, evitando la sustitución por un título genérico y manteniendo la referencia al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide sustancialmente con el audit trail inglés: mantiene el término técnico para הַמִּלֻּאִים, el gesto ritual de mecer la ofrenda, y el nombre divino como Yahvé. No se detectan revisiones recientes que alteren el sentido, por lo que no se introducen cambios más allá de la adaptación natural al español.'
  spanish_consistency_notes:
  - Se mantiene el registro litúrgico sin caer en arcaísmos innecesarios.
  - '"Mecer" y "ofrenda mecida" preservan la terminología ritual sin explicarla en el cuerpo del texto.'
  - '"Porción" traduce de modo estable מָנָה en contexto cultual.'
  - Se usa "Yahvé" de manera consistente con el estándar del proyecto para יְהוָה.
