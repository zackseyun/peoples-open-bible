translation:
  language: es
  text: Además[a], debido a mi deleite en la casa de mi Dios[b], tengo un tesoro personal de oro y plata, y lo he dado a la casa de mi Dios, por encima de todo lo que he preparado para la casa santa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y además» o «Por otra parte». El hebreo añade una continuación enfática al pensamiento anterior.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para la casa de mi Dios».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para el santuario».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעוֹד
  english_pob_choice: Moreover
  chosen_spanish: Además
  alternatives_spanish:
  - Y además
  - Por otra parte
  - Además de esto
  lexicon: HALOT
  rationale: Introduce una adición enfática al discurso previo. «Además» expresa de forma natural la continuidad y el valor acumulativo del hebreo sin sobreactuar el tono.
- source_word: בִּרְצוֹתִי
  english_pob_choice: because of my delight
  chosen_spanish: por mi deleite
  alternatives_spanish:
  - porque me deleito
  - por mi agrado
  - porque tengo agrado
  lexicon: HALOT
  rationale: El hebreo con ב expresa causa o motivo. «Por mi deleite» conserva la idea de una disposición favorable/placer, evitando reducirlo a una mera emoción pasajera.
- source_word: בְּבֵית אֱלֹהַי
  english_pob_choice: in the house of my God
  chosen_spanish: en la casa de mi Dios
  alternatives_spanish:
  - para la casa de mi Dios
  - en el templo de mi Dios
  lexicon: HALOT
  rationale: Se mantiene el sustantivo בית como «casa», siguiendo la preferencia del POB inglés y preservando la resonancia bíblica del lugar de morada de Dios.
- source_word: יֶשׁ לִי
  english_pob_choice: I have
  chosen_spanish: tengo
  alternatives_spanish:
  - hay para mí
  - yo tengo
  lexicon: HALOT
  rationale: La construcción existencial hebrea se vierte con el español natural «tengo», que comunica posesión directa y clara.
- source_word: סְגֻלָּה
  english_pob_choice: a personal treasure
  chosen_spanish: un tesoro personal
  alternatives_spanish:
  - un tesoro propio
  - una posesión especial
  - un tesoro especial
  lexicon: HALOT
  rationale: El término alude a propiedad valiosa, reservada para uno mismo. «Tesoro personal» conserva la fuerza de bien estimado y propio, sin perder la posibilidad de lectura de «propio/privado».
- source_word: זָהָב וָכָסֶף
  english_pob_choice: gold and silver
  chosen_spanish: oro y plata
  alternatives_spanish:
  - oro y dinero
  - oro y plata fina
  lexicon: HALOT
  rationale: Materiales directos y transparentes; «oro y plata» es la equivalencia natural y fiel.
- source_word: נָתַתִּי
  english_pob_choice: I have given
  chosen_spanish: lo he dado
  alternatives_spanish:
  - di
  - he entregado
  - lo di
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completada con relevancia presente. El presente perfecto español comunica bien ese valor.
- source_word: לְבֵית אֱלֹהַי
  english_pob_choice: to the house of my God
  chosen_spanish: a la casa de mi Dios
  alternatives_spanish:
  - para la casa de mi Dios
  - a la casa de mi Dios
  lexicon: HALOT
  rationale: Con נתן, ל marca destino/beneficiario. «A la casa de mi Dios» es directo y natural en español.
- source_word: לְמַעְלָה
  english_pob_choice: over and above
  chosen_spanish: por encima de
  alternatives_spanish:
  - además de
  - por sobre
  - más allá de
  lexicon: HALOT
  rationale: El adverbio expresa excedencia o algo añadido. «Por encima de» conserva la comparación y el sentido de superación/añadidura.
- source_word: מִכָּל הֲכִינוֹתִי
  english_pob_choice: all that I have prepared
  chosen_spanish: todo lo que he preparado
  alternatives_spanish:
  - todas mis preparaciones
  - todo cuanto preparé
  lexicon: HALOT
  rationale: La frase comparativa contrasta el don personal con lo previamente preparado. «Todo lo que he preparado» reproduce bien la idea sin sobreinterpretación.
- source_word: לְבֵית הַקֹּדֶשׁ
  english_pob_choice: for the holy house
  chosen_spanish: para la casa santa
  alternatives_spanish:
  - para el santuario
  - para la casa santa del Señor
  - para la casa sagrada
  lexicon: HALOT
  rationale: Se conserva בית como «casa» y קֹדֶשׁ como «santa», manteniendo la cercanía al hebreo. «Casa santa» refleja el carácter consagrado del edificio sin sustituirlo por un término más interpretativo.
theological_decisions:
- issue: 'Terminología del lugar de culto: בית'
  english_pob_reading: house / holy house
  chosen_spanish_reading: casa / casa santa
  alternative_spanish_readings:
  - templo / santuario
  - casa / templo santo
  rationale: El hebreo insiste en בית. Traducirlo como «casa» preserva la imagen bíblica y la continuidad con el texto fuente; «templo» sería más explicativo pero menos literal. «Casa santa» mantiene también el matiz de consagración del final del versículo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de סְגֻלָּה
  english_pob_reading: personal treasure
  chosen_spanish_reading: tesoro personal
  alternative_spanish_readings:
  - tesoro propio
  - posesión especial
  - bien propio
  rationale: 'El POB inglés documenta la posibilidad de «special treasure» o «my own treasure», señalando propiedad valiosa. «Tesoro personal» preserva ambas ideas: valor y pertenencia, sin convertir el término en una categoría teológica distinta.'
  doctrine_reference: HALOT; lexical note in POB audit trail
translation_notes:
  revision_awareness: Se revisó el texto inglés POB y su aparato de notas. No hay cambios posteriores reportados en la última pasada de revisión; el acuerdo de control cruzado es alto y estable, por lo que la propuesta española sigue de cerca las decisiones léxicas y teológicas auditadas sin introducir nuevos desplazamientos interpretativos.
  spanish_consistency_notes:
  - Se mantuvo «casa» para בית, en coherencia con el POB inglés y con el valor teológico del lenguaje del templo en Crónicas.
  - Se eligió «Yahvé» por norma del proyecto solo cuando aparece el Tetragrámaton; en este versículo aparece אֱלֹהִים, por lo que corresponde «Dios».
  - Se evitó «templo» como traducción principal para no desplazar la imagen repetida de la «casa» en el hebreo.
  - «Tesoro personal» conserva la tensión entre posesión privada y bien precioso documentada por el POB inglés.
  - La frase final usa «casa santa» para mantener la correspondencia con la secuencia בית + הקֹדֶשׁ sin introducir un término más interpretativo.
