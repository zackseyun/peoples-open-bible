translation:
  language: es
  text: Porque nuestro escudo pertenece a Yahvé[a], y nuestro rey pertenece al Santo de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque nuestro escudo es de Yahvé, y nuestro rey es del Santo de Israel». El hebreo es elíptico y muy paralelo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque en efecto
  lexicon: HALOT
  rationale: En este contexto introduce la base o explicación del verso anterior. «Porque» preserva bien la fuerza causal/explicativa del hebreo sin añadir matices innecesarios.
- source_word: לַיהוָה
  english_pob_choice: belongs to Yahweh / the LORD
  chosen_spanish: pertenece a Yahvé
  alternatives_spanish:
  - es de Yahvé
  - le pertenece a Yahvé
  - pertenece al SEÑOR
  lexicon: HALOT
  rationale: El prefijo ל expresa relación posesiva o de pertenencia. «Pertenece a Yahvé» conserva la relación y sigue el criterio del proyecto de usar «Yahvé» en el texto principal en lugar de una máscara litúrgica.
- source_word: מָגִנֵּנוּ
  english_pob_choice: our shield
  chosen_spanish: nuestro escudo
  alternatives_spanish:
  - nuestra defensa
  - nuestro protector
  lexicon: HALOT
  rationale: Se mantiene la metáfora concreta «escudo», como en el inglés POB, porque es transparente en poesía bíblica y no requiere una abstracción que atenúe la imagen.
- source_word: וְלִקְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: and our king to the Holy One of Israel
  chosen_spanish: y nuestro rey al Santo de Israel
  alternatives_spanish:
  - y nuestro rey pertenece al Santo de Israel
  - y nuestro rey es del Santo de Israel
  lexicon: HALOT
  rationale: La construcción hebrea es elíptica y paralela a la primera cola. En español, «y nuestro rey al Santo de Israel» conserva esa elipsis y la relación de pertenencia sin resolverla de forma excesivamente interpretativa.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  - el Santo de Israel
  lexicon: HALOT
  rationale: Se traduce el título divino fijo con la forma reconocible y reverente «el Santo de Israel», que preserva solemnidad y continuidad bíblica.
- source_word: מַלְכֵּנוּ
  english_pob_choice: our king
  chosen_spanish: nuestro rey
  alternatives_spanish:
  - nuestro soberano
  - nuestro gobernante
  lexicon: HALOT
  rationale: «Rey» es el equivalente directo y mantiene la imaginería real y la posible referencia davídica, sin diluir el término.
theological_decisions:
- issue: Relación de pertenencia entre «nuestro escudo» y «Yahvé»
  english_pob_reading: The shield belongs to Yahweh; the Hebrew is elliptical and parallel.
  chosen_spanish_reading: Nuestro escudo pertenece a Yahvé.
  alternative_spanish_readings:
  - Nuestro escudo es de Yahvé.
  - Yahvé es nuestro escudo.
  rationale: La cola hebrea usa ל con valor relacional/posesivo. La formulación elegida conserva la ambigüedad poética entre posesión y tutela sin convertir el verso en una afirmación distinta. La nota permite la lectura alternativa donde el escudo «es de Yahvé».
  doctrine_reference: Preservar la tensión exegética y la elipsis poética
- issue: Relación de pertenencia entre «nuestro rey» y «el Santo de Israel»
  english_pob_reading: our king belongs to the Holy One of Israel
  chosen_spanish_reading: nuestro rey al Santo de Israel
  alternative_spanish_readings:
  - nuestro rey pertenece al Santo de Israel
  - nuestro rey es del Santo de Israel
  rationale: La segunda cola reproduce el paralelismo de la primera sin forzar una reinterpretación. En español, la elipsis es comprensible y mantiene el vínculo entre el rey de Israel y el Santo de Israel, sin borrar la tensión entre rey humano y soberanía divina.
  doctrine_reference: Preservar la tensión teológica en paralelismo poético
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no hubo cambios necesarios y que existe alto acuerdo con la evaluación cruzada; por eso se conserva la estructura poética y la ambigüedad relacional del original sin ampliar la interpretación.
  spanish_consistency_notes:
  - Se sigue el patrón del proyecto de traducir יהוה como «Yahvé» en el texto principal.
  - Se mantiene «Santo de Israel» como título divino fijo, sin sustituirlo por paráfrasis.
  - Se conserva la metáfora de «escudo» y la elipsis del hebreo, en paralelo con la auditoría inglesa.
  - La sintaxis española se ajusta para legibilidad, pero sin resolver la estructura poética más de lo que el original permite.
