    rationale: Aunque intenta reflejar el pasivo hebreo, en español suena forzado y no comunica bien la restauración al campamento implicada por אסף en este contexto.
  - severity: low
    issue: «Así Miriam» suena algo rígido en español narrativo
    rationale: «Entonces Miriam» o simplemente comenzar con «Miriam» mejora la naturalidad sin alterar el sentido.
  - severity: low
