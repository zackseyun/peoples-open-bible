    reason: alternative_reading
  revision_rationale: Se ajusta la cláusula central para que el español sea más natural y refleje mejor el objeto explícito del hebreo ('todos mis huesos'). También se pule la expresión temporal final para una lectura más fluida sin cambiar el sentido. Se conserva la nota sobre la dificultad del verbo inicial y la nota sobre el cambio de tercera a segunda persona.
