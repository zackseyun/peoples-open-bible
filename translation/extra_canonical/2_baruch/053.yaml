theological_decisions:
- issue: Whether to identify the black and bright waters with specific historical epochs within the vision chapter.
  chosen_reading: Leave the imagery uninterpreted in ch. 53; render symbols plainly as seen.
  alternative_readings:
  - Insert historical identifications (e.g., Adam, Flood, etc.) in the translation
  rationale: The interpretation is given later in the book; importing it here would preempt the inspired sequence and over-interpret the vision.
- issue: Rendering of the culminating action of the lightning (illumination and healing).
  chosen_reading: Translate the sequence of shining/illumination and healing, with cautious reliance on the control witness.
  alternative_readings:
  - Omit illumination/healing due to Syriac OCR difficulty
  - Paraphrase as generic victory of light over darkness
  rationale: The control Latin closely parallels known Syriac text and clarifies damaged lines; retaining these concrete actions preserves apocalyptic specificity without allegorizing.
- issue: ‘Twelve rivers’ versus ‘twelve lights’.
  chosen_reading: Render ‘twelve rivers’ ascending from the sea, with a footnote noting the alternate reading ‘lights’.
  alternative_readings:
  - Prefer ‘lights’ as lectio facilior given OCR
  - Avoid decision by vague wording
  rationale: Narrative coherence and the secondary control support ‘rivers’; but transparency requires flagging the variant.
