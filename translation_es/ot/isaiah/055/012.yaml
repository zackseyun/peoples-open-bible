translation:
  language: es
  text: Porque saldrán con alegría y serán conducidos en paz[a]; los montes y las colinas romperán en canto delante de ustedes[b], y todos los árboles del campo batirán palmas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán guiados en paz». El verbo hebreo significa «ser conducidos» o «ser llevados»; la idea es de ser guiados o conducidos, en paralelo con «saldrán».
    reason: lexical_alternative
  - marker: b
    text: O «estallarán en canto delante de ustedes».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque entonces
  lexicon: HALOT
  rationale: Introduce la relación de causa o resultado respecto del anuncio anterior. «Porque» conserva la fuerza conectiva con naturalidad en español.
- source_word: בְשִׂמְחָה
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - en alegría
  - alegremente
  lexicon: HALOT
  rationale: La preposición con el sustantivo expresa el modo de la acción. «Con alegría» mantiene el sustantivo y suena natural en español.
- source_word: תֵצֵאוּ
  english_pob_choice: you will go out
  chosen_spanish: saldrán
  alternatives_spanish:
  - irán afuera
  - saldrán afuera
  - partirán
  lexicon: HALOT
  rationale: El verbo יצא se refiere a salir o partir. «Saldrán» comunica el movimiento de salida sin forzar el complemento 'afuera'.
- source_word: וּבְשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - en bienestar
  - seguramente
  lexicon: HALOT
  rationale: שָׁלוֹם abarca paz, bienestar e integridad. «En paz» es la opción más concisa y fiel al registro poético.
- source_word: תּוּבָלוּן
  english_pob_choice: be led in peace
  chosen_spanish: serán conducidos
  alternatives_spanish:
  - serán guiados
  - serán llevados
  - serán conducidos afuera
  lexicon: HALOT
  rationale: La forma pasiva de יבל indica ser llevado o conducido. «Serán conducidos» refleja el verbo de manera más directa que una paráfrasis más amplia.
- source_word: הֶהָרִים וְהַגְּבָעוֹת
  english_pob_choice: the mountains and the hills
  chosen_spanish: los montes y los collados
  alternatives_spanish:
  - las montañas y las colinas
  - los cerros y los montes
  lexicon: HALOT
  rationale: En poesía bíblica, הָרִים y גְּבָעוֹת forman un par paisajístico. «Montes y collados» mantiene un tono bíblico claro y evita un coloquialismo excesivo.
- source_word: יִפְצְחוּ ... רִנָּה
  english_pob_choice: will break out in singing
  chosen_spanish: estallarán en gritos de júbilo
  alternatives_spanish:
  - estallarán en canto
  - brotarán en canción
  - romperán en canto
  lexicon: HALOT
  rationale: פצח + רנה expresa una explosión gozosa, no solo una acción musical. «Gritos de júbilo» preserva la energía del hebreo y evita reducirlo solo a 'cantar'.
- source_word: לִפְנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - ante ustedes
  - en su presencia
  - frente a ustedes
  lexicon: HALOT
  rationale: La expresión marca la escena como respuesta de la creación ante el pueblo. «Delante de ustedes» es natural en español y conserva el valor espacial.
- source_word: וְכָל עֲצֵי הַשָּׂדֶה
  english_pob_choice: and all the trees of the field
  chosen_spanish: y todos los árboles del campo
  alternatives_spanish:
  - y todos los árboles de la tierra
  - y cada árbol del campo
  lexicon: HALOT
  rationale: La imagen colectiva debe permanecer intacta. «Del campo» reproduce el sentido de שָׂדֶה en el entorno poético.
- source_word: יִמְחֲאוּ כָף
  english_pob_choice: will clap their hands
  chosen_spanish: aplaudirán con sus manos
  alternatives_spanish:
  - batirán palmas
  - golpearán las palmas
  - aplaudirán
  lexicon: HALOT
  rationale: El hebreo usa un modismo para aplaudir. Dado que el sujeto son árboles, «aplaudirán con sus manos» conserva la personificación sin oscurecer el idiomático original.
theological_decisions:
- issue: Personificación poética de la creación
  english_pob_reading: Retain the mountains, hills, and trees as personified participants in joy
  chosen_spanish_reading: Mantener los montes, collados y árboles como participantes personificados del gozo
  alternative_spanish_readings:
  - Reducir la imagen a una descripción meramente ornamental de la naturaleza
  - Suavizar la personificación para evitar lenguaje figurado
  rationale: El poema presenta a la creación entera reaccionando ante la restauración. Conservar la personificación respeta la teología poética del texto sin añadir explicaciones ajenas.
  doctrine_reference: Poética bíblica; restauración de la creación
- issue: Relación entre 'serán conducidos' y 'en paz'
  english_pob_reading: The Hebrew verb means 'be led' or 'be conducted'; 'be led out' is chosen to reflect the parallel with 'you will go out.'
  chosen_spanish_reading: Conservar la pasiva 'serán conducidos en paz' como reflejo directo del verbo y de la cláusula adverbial
  alternative_spanish_readings:
  - '''serán guiados en paz'''
  - '''irán en paz'''
  rationale: La construcción española elegida mantiene visible la pasividad del hebreo y la idea de conducción. No se añadió 'afuera' porque el texto hebreo no repite esa idea en el segundo miembro.
  doctrine_reference: Fidelidad sintáctica; revisión POB 2026-04-23
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés: se corrigió la segunda cláusula de ''be led out in peace'' a ''be led in peace'' para ajustarse mejor al hebreo. La redacción española refleja esa decisión evitando repetir una idea de salida en la segunda mitad del verso.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el hebreo subyacente exige el nombre divino; en este versículo no aparece.
  - Se mantuvo un registro poético pero claro, acorde con la traducción de poesía profética en español.
  - Se prefirió 'aplaudirán con sus manos' para conservar el modismo hebreo y la personificación de los árboles.
  - Se optó por «collados» en paralelo con la poesía bíblica tradicional, sin perder inteligibilidad moderna.
