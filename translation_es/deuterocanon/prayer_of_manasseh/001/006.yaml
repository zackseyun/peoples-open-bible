translation:
  language: es
  text: y la misericordia de tu promesa es inmensurable e insondable.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu misericordia prometida» o «la misericordia mostrada en tu promesa». El genitivo griego puede entenderse de varias maneras estrechamente relacionadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμέτρητόν
  english_pob_choice: immeasurable
  chosen_spanish: inmensurable
  alternatives_spanish:
  - sin medida
  - incalculable
  lexicon: LSJ
  rationale: El adjetivo griego expresa algo que no puede medirse. «Inmensurable» conserva con naturalidad en español la fuerza cuantitativa de «immeasurable» sin volver la frase pesada.
- source_word: ἀνεξιχνίαστον
  english_pob_choice: unsearchable
  chosen_spanish: inescrutable
  alternatives_spanish:
  - inrastreable
  - insondable
  lexicon: LSJ
  rationale: El término griego indica lo que no puede seguirse o investigarse del todo. «Inescrutable» mantiene bien en español la idea de algo que no puede agotarse ni penetrarse plenamente; aunque «insondable» también es posible, «inescrutable» conserva mejor la relación con la imagen de búsqueda/indagación.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - misericordia leal
  - compasión
  lexicon: LSJ
  rationale: Aunque el inglés POB usa «mercy», en español «misericordia» es el equivalente más natural y eclesialmente claro para ἔλεος. Conserva el valor de clemencia y favor inmerecido sin perder el matiz de compasión.
- source_word: ἐπαγγελίας
  english_pob_choice: promise
  chosen_spanish: promesa
  alternatives_spanish:
  - promesa dada
  - compromiso
  lexicon: LSJ
  rationale: '«Promesa» es la traducción directa de ἐπαγγελία y preserva el sentido pactal del sintagma. Se mantiene la estructura genitiva del griego para no cerrar prematuramente la ambigüedad: misericordia perteneciente a la promesa, expresada en ella o asegurada por ella.'
- source_word: τε καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - tanto ... como
  lexicon: LSJ
  rationale: Las partículas coordinadas intensifican la unión de los dos adjetivos. En español, una simple «y» comunica bien la coordinación sin forzar una estructura artificial.
theological_decisions:
- issue: Relación entre «misericordia» y «promesa» en el genitivo τὸ ἔλεος τῆς ἐπαγγελίας σου
  english_pob_reading: '''the mercy of your promise'''
  chosen_spanish_reading: «la misericordia de tu promesa»
  alternative_spanish_readings:
  - «tu promesa misericordiosa»
  - «la misericordia mostrada en tu promesa»
  rationale: 'El griego presenta una relación genitiva que puede entenderse de varias maneras próximas. Se conserva una traducción literal en español para dejar abierta la tensión: misericordia que pertenece a la promesa, que se manifiesta en ella o que está garantizada por ella. Esto evita cerrar el sentido donde el original no lo hace.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el cotejo externo reportó solo observaciones menores; por ello, se mantiene una solución sobria que conserva la ambigüedad del genitivo y la doble cualidad de los adjetivos griegos.
  spanish_consistency_notes:
  - Se usa «misericordia» como equivalente natural de ἔλεος, coherente con el registro devocional del texto.
  - Se usa «inmensurable» e «inescrutable» para reflejar la doble intensificación del griego sin añadir paráfrasis.
  - Se conserva el vínculo sintáctico «de tu promesa» para no resolver la ambigüedad semántica del original.
