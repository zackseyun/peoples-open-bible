revisions:
- from: No harán así a Yahvé su Dios[a][b].
  to: No harán así con Yahvé su Dios[a][b].
  rationale: 'Se hizo una reparación menor para que el español exprese con naturalidad la relación indicada por לַיהוָה en este contexto: ''con Yahvé'' comunica mejor la idea de no tratar a Yahvé del modo descrito antes. También se ajustó la nota sobre YHWH para reflejar una alternativa de traducción real y la política del proyecto.'
  reviewer_model: gpt-5.4
