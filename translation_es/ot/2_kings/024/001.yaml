base_translation:
  language: en
  yaml_path: translation/ot/2_kings/024/001.yaml
  text: In his days Nebuchadnezzar king of Babylon came up[a], and Jehoiakim became his servant for three years[b]. Then he turned and rebelled against him.
  footnotes:
  - marker: a
    text: Or 'became his vassal for three years.' The Hebrew says literally 'became to him a servant,' a political expression for subjection to an overlord.
    reason: lexical_alternative
  - marker: b
    text: Or 'turned back and rebelled against him.' The verb 'turned' likely marks Jehoiakim's reversal of allegiance before the rebellion.
    reason: lexical_alternative
