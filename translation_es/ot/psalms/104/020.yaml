translation:
  language: es
  text: Tú pones las tinieblas, y se hace de noche; en ella merodean[a] todos los animales del bosque.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se mueven»; el verbo hebreo puede denotar el movimiento de animales en la noche, incluso el deambular en busca de presa.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּשֶׁת
  english_pob_choice: You set
  chosen_spanish: Tú estableces
  alternatives_spanish:
  - Tú pones
  - Tú dispones
  - Tú colocas
  lexicon: HALOT
  rationale: El verbo expresa acción divina directa de poner/establecer. «Estableces» conserva la agencia activa de Yahvé y suena natural en español sin debilitar la fuerza creativa del hebreo.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: las tinieblas
  alternatives_spanish:
  - la oscuridad
  - la noche oscura
  lexicon: HALOT
  rationale: El sustantivo designa la oscuridad como realidad creada. «Tinieblas» mantiene el registro poético y bíblico; en plural en español funciona de manera natural para el estado de oscuridad.
- source_word: וִיהִי
  english_pob_choice: and it becomes
  chosen_spanish: y llega a ser
  alternatives_spanish:
  - y es
  - y se hace
  - y se vuelve
  lexicon: HALOT
  rationale: La forma verbal marca resultado o transición. «Llega a ser» conserva ese movimiento de pasar a estado nocturno mejor que un simple «es».
- source_word: לָיְלָה
  english_pob_choice: night
  chosen_spanish: noche
  alternatives_spanish:
  - la noche
  lexicon: HALOT
  rationale: Equivale directamente al período nocturno. En español el artículo puede omitirse con naturalidad en esta construcción coordinada.
- source_word: בּוֹ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en ella misma
  - durante ella
  lexicon: HALOT
  rationale: El sufijo refiere a la noche; en español concuerda mejor con el antecedente femenino «noche». «En ella» conserva la referencia locativa sin añadir matices.
- source_word: תִרְמֹשׂ
  english_pob_choice: creep about
  chosen_spanish: se arrastran
  alternatives_spanish:
  - merodean
  - deambulan
  - prowl
  lexicon: HALOT
  rationale: El verbo describe el movimiento rastrero o reptante de animales. «Se arrastran» retiene la imagen corporal básica; en nota se puede mantener la alternativa de merodeo o acecho, según el matiz animal nocturno.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo
  lexicon: HALOT
  rationale: Expresa generalidad distributiva. «Todos» concuerda con el plural implícito del sujeto animal y suena natural en español.
- source_word: חַיְתוֹ
  english_pob_choice: the beasts of
  chosen_spanish: los animales de
  alternatives_spanish:
  - las fieras de
  - las bestias de
  lexicon: HALOT
  rationale: En poesía hebrea puede referirse a animales salvajes. «Animales» comunica el referente sin sobrerrecrear un tono excesivamente arcaico; se conserva la nota de que son animales del ámbito salvaje.
- source_word: יָעַר
  english_pob_choice: the forest
  chosen_spanish: bosque
  alternatives_spanish:
  - selva
  - monte
  lexicon: HALOT
  rationale: El término designa el bosque o arbolado. «Bosque» es el equivalente más directo y amplio para el español contemporáneo.
theological_decisions:
- issue: Agencia creadora divina en el verso
  english_pob_reading: The verse states that God actively sets darkness, resulting in night.
  chosen_spanish_reading: El verso presenta a Yahvé como quien establece las tinieblas y así llega la noche.
  alternative_spanish_readings:
  - Yahvé permite que haya tinieblas y noche.
  - Yahvé dispone las tinieblas, y entonces es noche.
  rationale: La forma verbal hebrea atribuye la acción directamente a Dios; la traducción conserva esa agencia sin convertirla en mera permisión. «Llega a ser noche» mantiene el valor resultativo del hebreo.
  doctrine_reference: Poética de la creación; agency divina en el orden creado
translation_notes:
  revision_awareness: El texto inglés auditado opta por «creep about» para תִרְמֹשׂ y añade una nota con «prowl» como alternativa. La versión española conserva la imagen básica de movimiento nocturno con «se arrastran» y mantiene la alternativa semántica en la nota, sin forzar un matiz más depredador que el hebreo no exige. También se mantiene la transición resultativa de וִיהִי con «llega a ser», en paralelo al análisis inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según el estándar del proyecto.
  - «Tinieblas» preserva el registro poético y no neutraliza la oscuridad creada.
  - «Bosque» se prefiere a «selva» para evitar sobreespecificar el hábitat.
  - La concordancia pronominal de «en ella» se ajusta a «noche» para fluidez en español.
