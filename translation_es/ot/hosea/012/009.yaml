translation:
  language: es
  text: 'Y Efraín dijo: «Ciertamente me he enriquecido; he encontrado riqueza para mí[a]. En todo mi trabajo no hallarán en mí iniquidad que es pecado[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «he encontrado fortaleza para mí»; el término hebreo puede significar fuerza, riqueza o sustancia, pero aquí probablemente se refiere a riqueza material.'
    reason: lexical_alternative
  - marker: b
    text: O «iniquidad que sería pecado». El hebreo de esta cláusula es muy comprimido y permite una ligera diferencia de interpretación.
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Seguro
  - Sin duda
  - Sólo
  lexicon: HALOT
  rationale: La partícula introduce una afirmación enfática y segura de Efraín. «Ciertamente» transmite bien esa confianza sin convertirla en exclusividad, como podría sugerir «sólo».
- source_word: עָשַׁרְתִּי
  english_pob_choice: I have become rich
  chosen_spanish: me he enriquecido
  alternatives_spanish:
  - soy rico
  - he llegado a ser rico
  - me he hecho rico
  lexicon: HALOT
  rationale: El perfecto expresa un estado alcanzado. «Me he enriquecido» conserva el matiz resultativo y suena natural en español actual.
- source_word: א֖וֹן
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - fuerza
  - bienes
  - substancia
  lexicon: HALOT
  rationale: En este contexto de autoelogio material, el término apunta a ganancia o patrimonio. «Riqueza» refleja mejor esa referencia que «fuerza» o el más arcaico «substancia».
- source_word: כָּל יְגִיעַי
  english_pob_choice: all my labor
  chosen_spanish: en todo mi trabajo
  alternatives_spanish:
  - en todo mi esfuerzo
  - en toda mi labor
  - con todo mi afán
  lexicon: HALOT
  rationale: La expresión puede abarcar tanto el esfuerzo como lo producido por él. «Mi trabajo» mantiene esa amplitud y evita una redundancia poco natural en español con «labores».
- source_word: יִמְצְאוּ לִי
  english_pob_choice: they will not find in me
  chosen_spanish: no hallarán en mí
  alternatives_spanish:
  - no encontrarán contra mí
  - no descubrirán en mí
  - no me hallarán
  lexicon: HALOT
  rationale: 'La idea es forense: nadie podrá detectar culpa en él. «No hallarán en mí» reproduce la construcción de manera directa y mantiene la posibilidad de una evaluación moral/legal.'
- source_word: עָוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - maldad
  - pecado
  lexicon: HALOT
  rationale: «Iniquidad» conserva el peso moral y la resonancia jurídica del término hebreo. En este verso además prepara el paralelismo con «pecado».
- source_word: אֲשֶׁר חֵטְא
  english_pob_choice: that is sin
  chosen_spanish: que es pecado
  alternatives_spanish:
  - que sería pecado
  - que resulta pecado
  - que llega a ser pecado
  lexicon: HALOT
  rationale: La frase hebrea es breve y algo comprimida. En español, «que es pecado» conserva la relación appositiva sin sobreexplicar, y deja ver el intento de Efraín de minimizar su falta.
theological_decisions:
- issue: Discurso autojustificatorio de Efraín sin comentario editorial explícito en el texto principal
  english_pob_reading: The verse is rendered as Ephraim's self-justifying boast, without endorsing the claim.
  chosen_spanish_reading: El versículo presenta la autoafirmación de Efraín directamente, sin añadir una glosa interpretativa en la línea principal.
  alternative_spanish_readings:
  - 'Efraín presumió engañosamente: «..."'
  - 'Efraín dijo con arrogancia: «..."'
  rationale: El hebreo transmite el habla de Efraín de forma directa. Conviene mantener esa voz y dejar que el contexto profético señale la ironía o la crítica, en vez de introducirla en la traducción principal.
  doctrine_reference: Preservar la tensión teológica y retórica del contexto profético sin resolverla prematuramente.
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente del inglés: se mantuvo la formulación literal «that is sin» frente a una paráfrasis más explicativa, y se ajustó el singular de «labor». En español, opté por una solución cercana al literal hebreo pero natural en lectura pública, preservando el contraste entre «iniquidad» y «pecado» sin expandir el texto principal.'
  spanish_consistency_notes:
  - Uso «Yahvé» solo cuando el texto lo requiere; este versículo no lo contiene.
  - Conservo «Efraín» como sujeto y no lo interpreto en el texto principal.
  - «Iniquidad» se usa de modo técnico y coherente con el paralelismo del hebreo.
  - No se introduce «Mesías/Cristo» ni terminología ajena al pasaje.
