    issue: 'Expresión no idiomática: «no nos tome luego venganza»'
    rationale: En español estándar no se dice «tomar venganza a alguien» en este sentido; lo natural es «tomar venganza de alguien» o «vengarse de alguien». La forma actual afecta fidelidad y legibilidad.
  - severity: medium
    issue: Orden y elección adverbial de «luego»
    rationale: «Luego» es posible, pero en muchas variedades puede sonar ambiguo o menos claro que «después»/«más tarde» para ὕστερον. Una mejora menor aumenta la claridad panhispánica.
