- from: Así saciaré mi ira contra ti[a], y mi celos[b] se apartará de ti; entonces estaré tranquilo y no me enojaré más.
  to: Así saciaré mi ira contra ti[a], y mis celos se apartarán de ti[b]; entonces estaré tranquilo y no me enojaré más.
  rationale: 'Se corrige el error gramatical ''mi celos'' a ''mis celos'' y el verbo a plural para que el español sea natural y fiel al sentido de jealousy. También se ajustan las notas para reflejar mejor las alternativas léxicas documentadas en la auditoría inglesa: la primera explica el literal de נוח con חֵמָה, y la segunda conserva la alternativa ''celo'' frente a ''celos'' con la justificación contextual matrimonial.'
