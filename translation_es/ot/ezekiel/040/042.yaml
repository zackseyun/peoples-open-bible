revisions:
- from: Y cuatro mesas para el holocausto eran de piedra cortada[a], de un codo y medio de largo, de un codo y medio de ancho, y de un codo de alto[b]. Sobre ellas ponían los utensilios con los cuales degollaban el holocausto y el sacrificio.
  to: Y cuatro mesas para el holocausto eran de piedra cortada[a], de un codo y medio de largo, de un codo y medio de ancho, y de un codo de alto. Sobre ellas colocaron los utensilios con los cuales degollaban el holocausto y el sacrificio.
  rationale: Se ajusta el verbo principal a un pasado descriptivo simple («colocaron») para seguir la revisión inglesa auditada y mejorar la naturalidad en español. Se elimina la nota b porque no añade información útil ni preserva una alternativa textual o teológica relevante. Se conserva el resto, que refleja bien el hebreo y las decisiones léxicas documentadas.
