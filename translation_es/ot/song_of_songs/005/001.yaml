translation:
  language: es
  text: He venido a mi huerto[a], hermana mía, novia mía; he recogido mi mirra con mi perfume. He comido mi panal con mi miel; he bebido mi vino con mi leche. Coman, amigos; beban y embriáguense, amados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a mi jardín». El hebreo לְגַנִּי marca destino con verbo de movimiento; según el contexto puede expresarse en español como llegada a o entrada en el huerto/jardín.'
    reason: alternative_reading
  - marker: b
    text: 'O: «beban y embriáguense de amor», entendiendo דּוֹדִים no como vocativo («amados»), sino como referencia al amor o a las caricias amorosas.'
    reason: alternative_reading
lexical_decisions:
- source_word: בָּאתִי
  english_pob_choice: I have come
  chosen_spanish: He venido
  alternatives_spanish:
  - Vine
  - He llegado
  lexicon: HALOT
  rationale: El perfecto hebreo se conserva mejor en español con el perfecto compuesto, que expresa una acción completada con pertinencia en el momento poético. 'He venido' es natural y mantiene la idea de llegada.
- source_word: לְגַנִּי
  english_pob_choice: into my garden
  chosen_spanish: a mi huerto
  alternatives_spanish:
  - a mi jardín
  - dentro de mi huerto
  lexicon: HALOT
  rationale: ל con movimiento marca destino. 'Huerto' comunica mejor el campo semántico de jardín/producto cultivado en el Cantar; 'a mi huerto' evita una imagen demasiado ornamental y sigue la concreción del hebreo.
- source_word: אֲחֹתִי כַלָּה
  english_pob_choice: my sister, my bride
  chosen_spanish: hermana mía, novia mía
  alternatives_spanish:
  - hermana mía, esposa mía
  - mi hermana-novia
  lexicon: HALOT
  rationale: Se conservan ambos apelativos por separado, como en el hebreo. 'Novia' es la forma española más natural y digna para כַלָּה en este contexto, sin borrar la ternura de la fórmula.
- source_word: אָרִיתִי
  english_pob_choice: I have gathered
  chosen_spanish: he recogido
  alternatives_spanish:
  - he juntado
  - he cosechado
  lexicon: HALOT
  rationale: אָרָה aquí alude a tomar/reunir productos aromáticos. 'Recogido' es idiomático en español y suficientemente amplio para mirra y perfume.
- source_word: מוֹרִי
  english_pob_choice: my myrrh
  chosen_spanish: mi mirra
  alternatives_spanish:
  - mi mirra aromática
  lexicon: HALOT
  rationale: Equivalente directo y tradicional de la resina aromática.
- source_word: בְּשָׂמִי
  english_pob_choice: my spice
  chosen_spanish: mi perfume
  alternatives_spanish:
  - mi aroma
  - mi especia
  lexicon: HALOT
  rationale: בֹּשֶׂם/בְּשָׂם puede referirse a perfume/aroma especiado. En español, 'perfume' preserva la cualidad aromática sin sonar forzado junto a 'mirra'.
- source_word: אָכַלְתִּי
  english_pob_choice: I have eaten
  chosen_spanish: he comido
  alternatives_spanish:
  - comí
  lexicon: HALOT
  rationale: Se mantiene el perfecto compuesto por paralelismo con los verbos previos y por la enumeración de acciones consumadas.
- source_word: יַעְרִי
  english_pob_choice: my honeycomb
  chosen_spanish: mi panal
  alternatives_spanish:
  - mi panal de miel
  - mi miel en el panal
  lexicon: HALOT
  rationale: יַעַר en este contexto se entiende como panal/honeycomb. 'Panal' es breve, claro y equilibra la repetición con 'mi miel'.
- source_word: דִּבְשִׁי
  english_pob_choice: my honey
  chosen_spanish: mi miel
  alternatives_spanish:
  - mi miel dulce
  lexicon: HALOT
  rationale: Traducción directa y natural del sustantivo. Mantiene la imagen de abundancia del paralelismo hebreo.
- source_word: שָׁתִיתִי
  english_pob_choice: I have drunk
  chosen_spanish: he bebido
  alternatives_spanish:
  - he tomado
  lexicon: HALOT
  rationale: En español, 'beber' funciona mejor que 'tomar' para conservar el paralelo con vino/leche y el tono poético.
- source_word: יֵינִי
  english_pob_choice: my wine
  chosen_spanish: mi vino
  lexicon: HALOT
  rationale: Correspondencia directa y estándar.
- source_word: חֲלָבִי
  english_pob_choice: my milk
  chosen_spanish: mi leche
  alternatives_spanish:
  - mi leche fresca
  lexicon: HALOT
  rationale: Traducción literal y transparente de חָלָב. Se conserva el contraste sensorial con el vino.
- source_word: אִכְלוּ רֵעִים
  english_pob_choice: Eat, friends
  chosen_spanish: Comed, amigos
  alternatives_spanish:
  - Coman, amigos
  - Comed, compañeros
  lexicon: HALOT
  rationale: רֵעִים puede ser 'amigos' o 'compañeros'. 'Amigos' es natural y mantiene el tono de invitación festiva. Se usa el imperativo plural peninsular/litúrgico por la forma exhortativa poética; en una variante plenamente latinoamericana podría ser 'Coman'.
- source_word: שְׁתוּ
  english_pob_choice: drink
  chosen_spanish: bebed
  alternatives_spanish:
  - beban
  lexicon: HALOT
  rationale: Imperativo plural paralelo al anterior. 'Bebed' conserva el paralelo formal con 'Comed'.
- source_word: וְשִׁכְרוּ
  english_pob_choice: and be drunk
  chosen_spanish: y embriagaos
  alternatives_spanish:
  - y embriagaos de vino
  - y emborráchense
  lexicon: HALOT
  rationale: El hebreo exige la fuerza de 'become drunk/intoxicated'. 'Embriagaos' conserva el sentido fuerte sin suavizarlo; el mandato poético queda marcado por el contexto celebratorio.
- source_word: דּוֹדִים
  english_pob_choice: beloved ones
  chosen_spanish: amados
  alternatives_spanish:
  - amantes
  - amados míos
  lexicon: HALOT
  rationale: 'Se adopta la lectura vocativa documentada por el POB inglés: דּוֹדִים como apelativo (''amados'') y no como complemento ''con amor''. En español, ''amados'' funciona bien como vocativo plural y evita añadir material no presente en el texto.'
theological_decisions:
- issue: Lectura de דּוֹדִים al final del versículo
  english_pob_reading: 'vocative: ''beloved ones'' / ''O lovers,'' rather than ''with love'''
  chosen_spanish_reading: 'vocativo: ''amados'''
  alternative_spanish_readings:
  - '''amantes'''
  - '''con amor'''
  rationale: La evidencia auditada del POB inglés y la morfología favorecen entender דּוֹדִים como vocativo plural. En español se mantiene esa decisión con 'amados', preservando la apelación directa sin introducir la preposición 'con'.
  doctrine_reference: Poética bíblica; consistencia lexical del Cantar de los Cantares
- issue: Registro de la invitación final 'be drunk'
  english_pob_reading: literal, strong imperative 'be drunk'
  chosen_spanish_reading: '''embriagaos'''
  alternative_spanish_readings:
  - '''beban profundamente'''
  - '''intoxicaos'''
  rationale: El POB preserva la fuerza literal del verbo. 'Embriagaos' comunica en español la intensidad del mandato sin rebajarlo a una simple metáfora de 'beber mucho'. El contexto nupcial y festivo contiene la expresión poética.
  doctrine_reference: Poética bíblica; transparencia semántica
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que corrigió la cláusula final para reflejar דּוֹדִים como vocativo ('beloved ones') y no como 'with love'. La versión española adopta esa misma solución con 'amados', manteniendo además la estructura acumulativa de los verbos perfectos y la invitación final al banquete.
  spanish_consistency_notes:
  - Se preserva el patrón de perfectos con 'he...' para reflejar la sucesión de acciones consumadas en el poema.
  - Se eligieron términos concretos y sensoriales ('huerto', 'mirra', 'perfume', 'panal', 'miel', 'vino', 'leche') para mantener la imaginería del texto.
  - No se usó 'SEÑOR' ni terminología eclesiástica ajena al versículo; tampoco aparece 'Cristo' o lenguaje alegórico no sustentado por el contexto inmediato.
  - '''Amados'' funciona como vocativo plural y evita oscurecer la decisión lexicológica sobre דּוֹדִים.'
