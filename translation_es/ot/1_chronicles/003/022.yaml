revisions:
- from: 'Y los hijos de Shecanías: Shemaías. Y los hijos de Shemaías: Hatús[a], Igal, Barías, Nearías y Safat—seis.'
  to: 'Y los hijos de Shecanías: Semaías. Y los hijos de Semaías: Hatús[a], Igal, Baríah, Nearías y Shafat: seis.'
  rationale: Se mantiene la estructura del borrador y la nota textual, pero se corrigen los nombres para reflejar con mayor fidelidad el hebreo y el rastro del POB. «Semaías» funciona mejor en español que «Shemaías»; «Baríah» preserva la forma consonántica frente a una adaptación excesiva; «Shafat» conserva mejor la transliteración tradicional que «Safat». También se sustituye la raya por dos puntos para una puntuación genealógica más natural en español. Se conserva «Hatús[a]» porque, aunque podría discutirse otra forma, sigue siendo identificable y no impide la fidelidad principal del verso.
