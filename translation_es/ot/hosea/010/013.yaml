  source_alignment_summary: 'El borrador español refleja bien la secuencia metafórica del hebreo: arar, segar, comer, y conserva correctamente los valores de maldad, injusticia, fruto de engaño, confianza en el propio camino y en la multitud de guerreros. También preserva adecuadamente el cambio retórico de plural a singular, conforme al rastro de auditoría inglés.'
  spanish_quality_summary: 'La principal dificultad no es de sentido sino de legibilidad y concordancia discursiva en español: comenzar con ‘Han arado... han segado... han comido... porque has confiado...’ suena abrupto porque en español ‘han’ normalmente exige un sujeto de tercera persona, no de segunda plural. Para conservar el cambio de número del hebreo con español natural y legible, conviene usar segunda persona plural en la primera mitad (‘ustedes han...’) y singular en la segunda, o marcarlo de forma explícita. Además, la nota [a] está anclada a ‘maldad’ pero su contenido explica alternativas de ‘engaño’; el anclaje debe corregirse. La nota [c] también está colocada en el lugar equivocado: corresponde a ‘guerreros’, no a ‘camino’.'
  glossary_alignment: 'No hay términos del glosario de proyecto especialmente controvertidos en este versículo. ‘Maldad’, ‘injusticia’, ‘engaño’ y ‘guerreros’ se alinean bien con las decisiones documentadas. La elección de ‘camino’ para דֶּרֶךְ preserva la metáfora moral. La excepción necesaria es sintáctica: el español requiere explicitar ‘Ustedes’ para que la preservación del cambio plural→singular no resulte torpe o ambigua.'
