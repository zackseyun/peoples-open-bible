translation:
  language: es
  text: Conforme a la ley[a] que ellos te instruyan, y conforme al juicio que te digan, harás; no te apartarás de la palabra[b] que te declaren, ni a derecha ni a izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «instrucción» o «enseñanza» para תּוֹרָה.
    reason: lexical_alternative
  - marker: b
    text: O «asunto» o «fallo» para «palabra».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל פִּי
  english_pob_choice: According to
  chosen_spanish: Conforme a
  alternatives_spanish:
  - Según
  - De acuerdo con
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula idiomática de conformidad normativa. «Conforme a» conserva bien el sentido legal de apego a una instrucción o decisión, sin traducir literalmente «sobre la boca de».
- source_word: הַתּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la enseñanza
  lexicon: HALOT
  rationale: Aunque תּוֹרָה puede significar «instrucción» o «enseñanza», en este contexto judicial la revisión inglesa optó por «law» para ajustar el correlato legal. «Ley» mantiene esa correspondencia en español y suena natural en un marco forense.
- source_word: יוֹרוּךָ
  english_pob_choice: they instruct you
  chosen_spanish: te enseñen
  alternatives_spanish:
  - te instruyan
  - te dirijan
  lexicon: HALOT
  rationale: El verbo hifil de ירה puede implicar instruir o dirigir. «Te enseñen» es una solución natural en español y preserva la idea de dar dirección normativa, aunque no reduzca el término a una simple clase didáctica.
- source_word: הַמִּשְׁפָּט
  english_pob_choice: the judgment
  chosen_spanish: el juicio
  alternatives_spanish:
  - la decisión
  - el fallo
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí es un veredicto o resolución judicial. «Juicio» conserva el registro formal y la relación con el ámbito jurídico.
- source_word: יֹאמְרוּ לְךָ
  english_pob_choice: that they tell you
  chosen_spanish: que te digan
  alternatives_spanish:
  - que te declaren
  - que te pronuncien
  lexicon: HALOT
  rationale: אָמַר es el verbo general «decir». «Te digan» es idiomático y mantiene la sencillez de la comunicación directa del fallo.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall do
  chosen_spanish: harás
  alternatives_spanish:
  - deberás hacer
  - harás lo que
  lexicon: HALOT
  rationale: El imperfecto expresa obligación. «Harás» conserva el tono de mandato legal sin añadir una perífrasis más pesada.
- source_word: לֹא תָסוּר
  english_pob_choice: you shall not turn aside
  chosen_spanish: no te apartarás
  alternatives_spanish:
  - no te desviarás
  - no te saldrás
  lexicon: HALOT
  rationale: סוּר significa apartarse o desviarse. «No te apartarás» es una equivalencia clara y sobria que encaja con el español bíblico moderno.
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el asunto
  - la sentencia
  lexicon: HALOT
  rationale: דָּבָר puede ser palabra, asunto o cosa. Se eligió «palabra» para conservar la singularidad del pronunciamiento autorizado, como en el texto inglés, dejando que el contexto judicial cargue con el matiz de resolución.
- source_word: יַגִּידוּ לְךָ
  english_pob_choice: that they declare to you
  chosen_spanish: te declaren
  alternatives_spanish:
  - te hagan saber
  - te anuncien
  lexicon: HALOT
  rationale: נגד en hifil tiene el sentido de declarar o hacer saber. «Te declaren» mantiene el tono formal de una determinación oficial.
- source_word: יָמִין וּשְׂמֹאל
  english_pob_choice: to the right or to the left
  chosen_spanish: ni a derecha ni a izquierda
  alternatives_spanish:
  - ni hacia la derecha ni hacia la izquierda
  - a la derecha o a la izquierda
  lexicon: HALOT
  rationale: Es un modismo fijo para no desviarse en ninguna dirección. En español, la construcción negativa paralela fluye de manera natural y conserva la imagen direccional.
theological_decisions:
- issue: Alcance de la obediencia a la autoridad judicial/sacerdotal
  english_pob_reading: Render the verse as a command to obey the authoritative legal instruction and judgment issued in the case at hand, without implying unlimited or infallible authority beyond the text.
  chosen_spanish_reading: Se traduce como un mandato de obedecer la instrucción legal y el juicio emitidos en el caso concreto, sin sugerir una autoridad ilimitada o infalible fuera del pasaje.
  alternative_spanish_readings:
  - Una afirmación de autoridad religiosa absoluta para instituciones posteriores
  - Una sumisión generalizada a cualquier liderazgo eclesial
  rationale: El contexto es el proceso judicial pactal de Israel. La traducción debe conservar la fuerza obligatoria del texto sin importar afirmaciones doctrinales posteriores que el hebreo no explicita.
  doctrine_reference: 'Philosophy of translation: preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «instruction» a «law» para ajustar más de cerca תּוֹרָה al contexto jurídico. En español se siguió esa decisión con «ley», manteniendo el registro legal y la paralelidad con «juicio», mientras se conserva en nota la alternativa semántica de «instrucción/enseñanza».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió un registro jurídico claro y sobrio, acorde con el contexto de tribunal y mandato.
  - Se preservó el paralelismo entre «ley / juicio / palabra» para reflejar la estructura del hebreo.
  - 'La negación final se expresó con doble miembro paralelo: «ni a derecha ni a izquierda», fiel al modismo hebreo.'
