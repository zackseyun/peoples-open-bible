translation:
  language: es
  text: Y dividió al pueblo y a los jinetes entre los soldados de a pie; pero la caballería de los enemigos era muy numerosa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διεῖλεν
  english_pob_choice: divided
  chosen_spanish: dividió
  alternatives_spanish:
  - distribuyó
  - separó
  - dispuso
  lexicon: LSJ
  rationale: El verbo expresa dividir o distribuir. «Dividió» conserva la acción organizativa sin añadir una táctica más precisa de la que el griego garantiza.
- source_word: τὸν λαόν
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de guerra
  - a la gente
  - a las tropas
  lexicon: LSJ
  rationale: Aunque en contexto militar puede referirse a la fuerza combatiente, «pueblo» sigue de cerca el griego y respeta la elección auditada del inglés POB.
- source_word: τοὺς ἱππεῖς
  english_pob_choice: the horsemen
  chosen_spanish: a los jinetes
  alternatives_spanish:
  - a la caballería
  - a los hombres de a caballo
  lexicon: LSJ
  rationale: Ἱππεῖς designa soldados montados. «Jinetes» es el equivalente directo y claro en español; se reserva «caballería» para el valor colectivo de ἵππος en la segunda cláusula.
- source_word: ἐν μέσῳ τῶν πεζῶν
  english_pob_choice: among the foot soldiers
  chosen_spanish: entre los soldados de a pie
  alternatives_spanish:
  - en medio de los soldados de a pie
  - entre la infantería
  lexicon: LSJ
  rationale: πεζῶν son los que van a pie, es decir, infantería. «Soldados de a pie» es natural en español y conserva el sentido de colocarlos en medio de la fuerza de infantería.
- source_word: ἡ δὲ ἵππος
  english_pob_choice: the cavalry
  chosen_spanish: la caballería
  alternatives_spanish:
  - los jinetes
  - la fuerza montada
  lexicon: LSJ
  rationale: Aunque literalmente significa «el caballo», aquí funciona de manera colectiva para la unidad montada. «Caballería» expresa mejor ese valor colectivo en español.
- source_word: τῶν ὑπεναντίων
  english_pob_choice: of the enemy
  chosen_spanish: de los enemigos
  alternatives_spanish:
  - de los adversarios
  - del enemigo
  lexicon: LSJ
  rationale: El término significa los que están enfrente o en contra. En este contexto militar, «de los enemigos» transmite de forma natural la referencia a la fuerza contraria.
- source_word: πολλὴ σφόδρα
  english_pob_choice: very numerous
  chosen_spanish: muy numerosa
  alternatives_spanish:
  - excesivamente numerosa
  - muchísima
  lexicon: LSJ
  rationale: La frase intensifica la cantidad. «Muy numerosa» comunica bien la abundancia del contingente montado sin forzar una paráfrasis.
translation_notes:
  revision_awareness: 'La versión inglesa auditada se mantuvo sin cambios sustantivos: conserva la organización militar del griego y la distinción entre ἱππεῖς (jinetes) e ἵππος (caballería colectiva). La redacción española sigue esa misma distinción y no introduce información táctica adicional.'
  spanish_consistency_notes:
  - Se mantiene «pueblo» para τὸν λαόν, siguiendo el rastro auditado del POB, aunque en contexto pueda leerse como tropa o fuerza combatiente.
  - Se reserva «caballería» para ἵππος, por su valor colectivo, y «jinetes» para ἱππεῖς.
  - Se usa «soldados de a pie» como equivalente idiomático de πεζῶν, equivalente a la infantería sin imponer un tecnicismo innecesario.
