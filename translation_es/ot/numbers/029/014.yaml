    rationale: El hebreo presenta una frase nominal de listado sacrificial. En español bíblico natural, 'su ofrenda de grano será flor de harina...' o 'y su ofrenda de grano, flor de harina...' comunica mejor el sentido técnico sin rigidez.
  revised_spanish_text: 'Y su ofrenda de grano será flor de harina mezclada con aceite: tres décimas[a] para cada toro, para los trece toros, y dos décimas para cada carnero, para los dos carneros.'
