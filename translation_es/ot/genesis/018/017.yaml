translation:
  language: es
  text: 'Yahvé dijo[a]: «¿Debo ocultarle a Abraham lo que hago?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Estoy ocultándole a Abraham lo que hago?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַֽ/יהֹוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio del pacto יְהוָה. En español, el estándar del proyecto es «Yahvé», manteniendo el nombre divino de forma transparente y auditable, en lugar de sustituirlo por una máscara litúrgica.
- source_word: אָמָר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - había dicho
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la narración con pasado simple; «dijo» conserva ese valor narrativo directo sin añadir anterioridad.
- source_word: הַֽ/מְכַסֶּה
  english_pob_choice: Shall I hide
  chosen_spanish: ¿Debo ocultar?
  alternatives_spanish:
  - ¿Voy a ocultar?
  - ¿He de ocultar?
  lexicon: HALOT
  rationale: El participio interrogativo expresa una pregunta deliberativa. «¿Debo ocultar?» reproduce mejor esa autointerrogación que una simple progresión verbal.
- source_word: מֵֽ/אַבְרָהָם
  english_pob_choice: from Abraham
  chosen_spanish: a Abraham
  alternatives_spanish:
  - de Abraham
  - ante Abraham
  lexicon: HALOT
  rationale: Con verbos de esconder/ocultar, el complemento en español puede requerir una construcción natural. Aquí «a Abraham» comunica el referente afectado por el ocultamiento de manera idiomática y fiel al contexto relacional.
- source_word: אֲשֶׁר
  english_pob_choice: what / that which
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - qué
  lexicon: HALOT
  rationale: La relativa hebrea se naturaliza como «lo que» en español, conservando el contenido proposicional sin rigidez sintáctica.
- source_word: אֲנִי עֹשֶׂה
  english_pob_choice: I am doing
  chosen_spanish: hago
  alternatives_spanish:
  - estoy haciendo
  - voy a hacer
  lexicon: HALOT
  rationale: Aunque el hebreo puede leerse con fuerza progresiva, en español «hago» suena más natural en esta pregunta divina y mantiene el valor presente del participio sin añadir una interpretación de inminencia.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino en forma transliterada, siguiendo la política del proyecto de no enmascarar יְהוָה. «Yahvé» es la forma establecida para este corpus español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La POB inglesa revisó su propia solución en este versículo, pasando de una paráfrasis con matiz de inminencia («about to do») a una forma más directa («what I am doing») para reflejar mejor el participio hebreo עֹשֶׂה. La propuesta española sigue esa lectura más directa con «hago», sin introducir un matiz prospectivo adicional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se evita «el SEÑOR» para no ocultar el nombre divino.
  - «Debo ocultar» conserva la interrogativa deliberativa del hebreo.
  - «Lo que hago» mantiene el contenido verbal presente del participio sin sobreinterpretarlo.
