lexical_decisions:
- source_word: ἀνεβόησαν
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - exclamó
  - alzaron su clamor
  lexicon: BDAG
  rationale: El verbo expresa un clamor fuerte dirigido a Dios. En español, «clamó» conserva mejor el matiz de súplica intensa y oración que «gritó», y es más natural en registro bíblico que una mera glosa literal.
- source_word: πᾶς ἀνὴρ Ἰσραήλ
  english_pob_choice: every man of Israel
  chosen_spanish: todo hombre de Israel
  alternatives_spanish:
  - todos los hombres de Israel
  - cada hombre de Israel
  - todo israelita
  lexicon: LSJ
  rationale: La construcción griega es distributiva y usa ἀνήρ de forma explícita; por eso se mantiene «hombre» y no se neutraliza a «israelita». «Todo hombre de Israel» reproduce el valor distributivo de manera clara en español.
- source_word: πρὸς τὸν θεόν
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - hacia Dios
  - ante Dios
  lexicon: BDAG
  rationale: En contexto de oración, la preposición griega se vierte naturalmente como «a Dios», que en español expresa el destinatario del clamor sin sobrecargar la imagen espacial.
- source_word: ἐν ἐκτενείᾳ μεγάλῃ
  english_pob_choice: with great intensity
  chosen_spanish: con gran intensidad
  alternatives_spanish:
  - con gran fervor
  - con gran ferviente empeño
  - con gran fervor y constancia
  lexicon: LSJ
  rationale: La expresión repetida subraya intensidad y empeño sostenido. «Con gran intensidad» es una equivalencia natural en español y preserva el énfasis del griego en ambas cláusulas.
- source_word: ἐταπείνουσαν
  english_pob_choice: they humbled
  chosen_spanish: humillaron
  alternatives_spanish:
  - se humillaron
  - abatieron
  - se abatieron
  lexicon: BDAG
  rationale: El verbo puede traducirse por «humillar» o «humillarse» según el sujeto y la construcción. Aquí, el griego describe la acción sobre «sus almas», por lo que «humillaron» mantiene la forma verbal y el paralelismo del texto, sin perder el sentido penitencial.
- source_word: τὰς ψυχὰς αὐτῶν
  english_pob_choice: their souls
  chosen_spanish: sus almas
  alternatives_spanish:
  - ellos mismos
  - sus vidas
  - su ser
  lexicon: BDAG
  rationale: Se conserva «almas» porque el griego dice literalmente «sus almas». Esto preserva el lenguaje antropológico y espiritual del pasaje; en español puede entenderse también de manera idiomática como la persona misma, sin borrar la imagen original.
theological_decisions:
- issue: Mantenimiento de ἀνήρ en la expresión distributiva
  english_pob_reading: every man of Israel
  chosen_spanish_reading: todo hombre de Israel
  alternative_spanish_readings:
  - todo israelita
  - todos los hombres de Israel
  rationale: La forma griega es explícitamente masculina y distributiva. Mantener «hombre» respeta la precisión del original y evita suavizarla con una neutralización no requerida por el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: ψυχή en plural como lenguaje antropológico y espiritual
  english_pob_reading: their souls
  chosen_spanish_reading: sus almas
  alternative_spanish_readings:
  - se humillaron
  - ellos mismos
  rationale: El griego menciona directamente las ψυχαί. Traducir «sus almas» conserva la tensión entre sentido literal e idiomático, sin borrar el vocabulario del texto ni imponer una paráfrasis interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: El borrador español sigue la decisión revisada del POB inglés de traducir ἐν ἐκτενείᾳ μεγάλῃ con una expresión de intensidad y no con una paráfrasis más interpretativa. También conserva la referencia a ψυχή en «sus almas», respetando la tensión entre literalidad e idiomatismo señalada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico en español sin recurrir a «SEÑOR» para θεός, siguiendo el principio del proyecto para este caso.
  - Se conservó la repetición de «con gran intensidad» en ambas cláusulas para reflejar el paralelismo enfático del griego.
  - Se prefirió «clamó» y «humillaron» por ser formas naturales y fieles en español, sin perder el tono penitencial de la escena.
