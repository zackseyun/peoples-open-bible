translation:
  language: es
  text: Un manantial de jardines[a], un pozo de agua viva[b], y arroyos que fluyen del Líbano[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una fuente de jardines»; מַעְיַן puede denotar un manantial o una fuente.
    reason: lexical_alternative
  - marker: b
    text: «Agua viva» es un giro hebreo para agua fresca y corriente, no agua estancada.
    reason: cultural_note
  - marker: c
    text: O «aguas que fluyen del Líbano». El participio hebreo subraya el movimiento del agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעְיַן
  english_pob_choice: spring
  chosen_spanish: manantial
  alternatives_spanish:
  - fuente
  - naciente
  lexicon: HALOT
  rationale: מַעְיַן denota un brote natural de agua, un manantial o fuente. «Manantial» comunica bien esa imagen en español y mantiene la relación con el campo semántico de agua que brota.
- source_word: גַּנִּים
  english_pob_choice: gardens
  chosen_spanish: jardines
  alternatives_spanish:
  - huertos
  - jardín
  lexicon: HALOT
  rationale: El plural hebreo es explícito y conviene preservarlo. «Jardines» refleja la abundancia o multiplicidad sugerida por el texto.
- source_word: בְּאֵר
  english_pob_choice: well
  chosen_spanish: pozo
  alternatives_spanish:
  - cisterna
  - aljibe
  lexicon: HALOT
  rationale: בְּאֵר normalmente es «pozo». «Pozo» es el equivalente natural en español y evita la idea de agua almacenada propia de «cisterna».
- source_word: מַיִם חַיִּים
  english_pob_choice: living water
  chosen_spanish: agua viva
  alternatives_spanish:
  - agua corriente
  - agua fresca
  lexicon: HALOT
  rationale: La expresión hebrea es un giro idiomático para agua fresca, corriente y vivificante. «Agua viva» conserva la fuerza literaria y la resonancia bíblica, sin perder inteligibilidad.
- source_word: וְנֹזְלִים
  english_pob_choice: streams flowing
  chosen_spanish: arroyos que fluyen
  alternatives_spanish:
  - corrientes que fluyen
  - aguas que fluyen
  lexicon: HALOT
  rationale: El participio expresa movimiento continuo. En español, «arroyos que fluyen» transmite con naturalidad la imagen de agua en movimiento y conserva el matiz dinámico del participio.
- source_word: מִן לְבָנוֹן
  english_pob_choice: from Lebanon
  chosen_spanish: desde el Líbano
  alternatives_spanish:
  - del Líbano
  - procedentes del Líbano
  lexicon: HALOT
  rationale: La preposición marca origen. «Desde el Líbano» reproduce ese valor de procedencia de manera clara y idiomática en español.
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente del inglés POB, que reordenó la última expresión para reflejar mejor el participio hebreo: «streams flowing from Lebanon». La redacción española conserva ese orden natural con «arroyos que fluyen desde el Líbano».'
  spanish_consistency_notes:
  - Se preservó el plural de גַּנִּים con «jardines».
  - Se mantuvo la metáfora de «agua viva» por su valor idiomático y resonancia bíblica.
  - Se evitó traducir mecánicamente desde el inglés cuando el español podía expresar mejor el hebreo con orden natural.
  - No se usó «SEÑOR» ni terminología confesional ajena al verso, pues el texto no contiene el nombre divino ni un término cristológico.
