  from: Yet by so much the more he ought to be humble
  to: For by so much the more he ought to be humble
  rationale: 'The Greek conjunction is `γὰρ` (for), not an adversative like `δέ` or `ἀλλά`. The author''s logic is that the possession of spiritual gifts is the very reason (for) one must be all the more humble, not a contrast to it. Translating it as ''Yet'' breaks the author''s argument. | Adjudicator: The Greek conjunction is indeed γάρ (for), which introduces the reason or basis for the preceding statement, rather than an adversative like δέ or ἀλλά (yet/but). The author''s rhetorical logic is that'
