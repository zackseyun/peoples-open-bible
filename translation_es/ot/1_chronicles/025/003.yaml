base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/025/003.yaml
  text: 'Of Jeduthun: the sons of Jeduthun—Gedaliah[a], Zeri, Jeshaiah, Hashabiah, and Mattithiah, six—under the direction of their father Jeduthun, who prophesied with the lyre[b], giving thanks and praise to Yahweh.'
  footnotes:
  - marker: a
    text: The Hebrew text lists five names here but then says 'six.' Some interpreters infer that another son is omitted from the list, or that Jeduthun himself is counted.
    reason: textual_variant
  - marker: b
    text: Or 'prophesying with the lyre for thanksgiving and praise to the LORD.'
    reason: lexical_alternative
