translation:
  language: es
  text: Átalos a tu corazón continuamente[a]; átalos alrededor de tu cuello[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siempre».
    reason: lexical_alternative
  - marker: b
    text: O «llévalos alrededor de tu cuello».
    reason: lexical_alternative
lexical_decisions:
- source_word: קָשְׁרֵם
  english_pob_choice: Bind them
  chosen_spanish: Átalos
  alternatives_spanish:
  - Átalos
  - Lígalos
  - Sujétalos
  lexicon: HALOT
  rationale: El imperativo qal con sufijo pronominal pide una acción concreta de fijar o atar. En español, «átalos» conserva la fuerza directa del mandato y funciona naturalmente con la imagen corporal del versículo.
- source_word: לִבְּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu corazón
  - tu mente
  - tu interior
  lexicon: HALOT
  rationale: «Corazón» mantiene la antropología hebrea del centro de la persona, incluyendo pensamiento y voluntad, sin reducirla a una sola facultad mental.
- source_word: תָמִיד
  english_pob_choice: continually
  chosen_spanish: siempre
  alternatives_spanish:
  - siempre
  - continuamente
  - constantemente
  lexicon: HALOT
  rationale: Aquí el adverbio expresa permanencia habitual. «Siempre» es natural en español y conserva la idea de constancia continua sin sonar forzado.
- source_word: עָנְדֵם
  english_pob_choice: tie them
  chosen_spanish: llévalos alrededor de
  alternatives_spanish:
  - llévalos
  - átalos
  - póntelos
  lexicon: HALOT
  rationale: El verbo ענד se usa para ponerse o llevar un adorno. «Llévalos alrededor de» comunica esa imagen de portar algo sobre el cuello sin perder la distinción respecto del primer verbo.
- source_word: גַּרְגְּרֹתֶךָ
  english_pob_choice: your neck
  chosen_spanish: tu cuello
  alternatives_spanish:
  - tu cuello
  - tu garganta
  lexicon: HALOT
  rationale: En este modismo el término apunta al cuello como lugar donde se lleva un adorno. «Cuello» es la equivalencia más clara y natural en español.
translation_notes:
  revision_awareness: 'El texto hebreo presenta dos imperativos paralelos: uno con קָשַׁר y otro con עָנַד. La redacción española conserva esa doble imagen sin fusionarlas, siguiendo el sentido literal y el audit trail inglés. No se añadieron notas porque las alternativas léxicas no cambian sustancialmente el sentido en español.'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, pero en español natural.
  - No se usó «SEÑOR» ni terminología no presente en el versículo.
  - Se preservó la imagen corporal de corazón y cuello, coherente con el hebreo.
