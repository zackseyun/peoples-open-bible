  spanish_consistency_notes:
  - Se mantiene Yahvé como forma predeterminada del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa transliteración estable para nombres propios hebreos no traducibles.
  - Se conserva el paralelismo genealógico literal para no cerrar la ambigüedad de 'hija de' que el inglés POB también preserva.
