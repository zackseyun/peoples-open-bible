translation:
  language: es
  text: Y los redimidos de Yahvé volverán y vendrán a Sion con cantos[a]; el gozo eterno estará sobre sus cabezas; alegría y gozo los alcanzarán[b]; la tristeza y el gemido huirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con gritos de júbilo»; el término hebreo puede denotar clamores jubilantes además de canto.
    reason: lexical_alternative
  - marker: b
    text: O «alegría y gozo darán alcance a ellos» o «los sobrepasarán»; el verbo hebreo literalmente significa «dar alcance, alcanzar, alcanzar a alguien», y aquí presenta al gozo como si los persiguiera hasta alcanzarlos.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְדוּיֵי
  english_pob_choice: the redeemed
  chosen_spanish: los redimidos
  alternatives_spanish:
  - los rescatados
  - los redimidos
  lexicon: HALOT
  rationale: El participio pasivo de פדה expresa a personas que han sido redimidas o rescatadas. «Los redimidos» conserva bien el sentido de liberación pactal y sigue de cerca la elección inglesa sin sonar forzado en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Nombre divino, no un título. En español del POB se mantiene «Yahvé» como transliteración del Tetragrámaton, preservando la decisión doctrinal y evitando la sustitución por «SEÑOR».
- source_word: יְשׁוּבוּן
  english_pob_choice: will return
  chosen_spanish: volverán
  alternatives_spanish:
  - regresarán
  - volverán
  lexicon: HALOT
  rationale: שׁוּב significa «volver/retornar». «Volverán» es natural en español y conserva la idea de restauración futura.
- source_word: וּבָאוּ
  english_pob_choice: and come
  chosen_spanish: y vendrán
  alternatives_spanish:
  - y llegarán
  - y entrarán
  lexicon: HALOT
  rationale: בוא es «venir/llegar». «Vendrán» mantiene la secuencia del hebreo y el movimiento hacia Sion sin añadir matices no atestiguados.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  - Sion
  lexicon: HALOT
  rationale: Como nombre propio bíblico, se translitera en forma usada en español bíblico y litúrgico. «Sion» es la forma estándar en español y conserva el valor poético del topónimo.
- source_word: בְּרִנָּה
  english_pob_choice: with singing
  chosen_spanish: con júbilo[a]
  alternatives_spanish:
  - con canto
  - con júbilo
  lexicon: HALOT
  rationale: רִנָּה puede denotar canto, grito jubiloso o exclamación gozosa. Siguiendo el audit trail inglés, «con júbilo» comunica mejor ese matiz amplio en español; se añade nota para preservar la alternativa de «canto»/«gritos de alegría».
- source_word: שִׂמְחַת עוֹלָם
  english_pob_choice: everlasting joy
  chosen_spanish: el gozo eterno
  alternatives_spanish:
  - alegría eterna
  - gozo para siempre
  lexicon: HALOT
  rationale: La construcción literalmente expresa un gozo duradero/eterno. «El gozo eterno» reproduce el valor durativo de עוֹלָם y conserva la imagen poética de una alegría estable y permanente.
- source_word: עַל רֹאשָׁם
  english_pob_choice: upon their heads
  chosen_spanish: sobre sus cabezas
  alternatives_spanish:
  - encima de sus cabezas
  - sobre sus cabezas
  lexicon: HALOT
  rationale: La imagen se conserva de forma casi literal en español. «Sobre sus cabezas» mantiene el carácter de corona o cobertura simbólica sin interpretarlo en exceso.
- source_word: שָׂשׂוֹן
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: HALOT
  rationale: En el par poético, se evita repetir la misma palabra dos veces. «Alegría» funciona bien para שָׂשׂוֹן y mantiene la distinción con el siguiente término.
- source_word: שִׂמְחָה
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - gozo
  lexicon: HALOT
  rationale: Se alterna con «alegría» para preservar el paralelismo poético. «Gozo» es idiomático y refleja bien la cercanía semántica entre los dos sustantivos.
- source_word: יַשִּׂיגוּן
  english_pob_choice: will overtake them
  chosen_spanish: los alcanzarán[b]
  alternatives_spanish:
  - los perseguirán hasta alcanzarlos
  - los alcanzarán
  lexicon: HALOT
  rationale: El verbo transmite la idea de llegar hasta alguien, alcanzarlo o dar alcance. «Los alcanzarán» conserva el valor figurado de que la alegría sale al encuentro de los redimidos, sin perder naturalidad en español.
- source_word: נָסוּ
  english_pob_choice: will flee away
  chosen_spanish: huirán
  alternatives_spanish:
  - habrán huido
  - huirán
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, en este contexto profético expresa el resultado futuro. «Huirán» mantiene la imagen de alejamiento definitivo sin cargar la frase con un tiempo más técnico.
- source_word: יָגוֹן
  english_pob_choice: sorrow
  chosen_spanish: la tristeza
  alternatives_spanish:
  - el dolor
  - la tristeza
  lexicon: HALOT
  rationale: יָגוֹן designa pena, dolor o tristeza. Se elige «tristeza» por su claridad y por el paralelismo con «gemido» en español.
- source_word: אֲנָחָה
  english_pob_choice: sighing
  chosen_spanish: el gemido
  alternatives_spanish:
  - el gemido
  - el suspiro
  lexicon: HALOT
  rationale: אֲנָחָה es una expresión audible de aflicción. «Gemido» comunica mejor ese peso emocional en español que «suspiro» en este contexto poético.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva la decisión del POB de no ocultar el Nombre divino tras una sustitución titular. «Yahvé» refleja el Tetragrámaton y mantiene la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor temporal de נָסוּ en poesía profética
  english_pob_reading: 'future/resultative: ''will flee away'''
  chosen_spanish_reading: 'futuro/resultativo: «huirán»'
  alternative_spanish_readings:
  - «han huido»
  - «huirán»
  rationale: Aunque la forma verbal hebrea es perfecta, el oráculo describe el estado resultante de la restauración. En español, el futuro simple comunica adecuadamente esa imagen profética sin forzar una equivalencia mecánica de tiempos.
  doctrine_reference: 'DOCTRINE.md: Hebrew verbal aspect in prophetic poetry'
translation_notes:
  revision_awareness: Coincide con la revisión más reciente, que no introdujo cambios; el pasaje quedó confirmado con acuerdo alto y sin ajustes necesarios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Nombre divino, conforme al criterio del proyecto.
  - Se usa «Sion» como forma española estándar del topónimo bíblico.
  - 'Se conserva el paralelismo poético mediante pares distintos: «alegría / gozo» y «tristeza / gemido».'
  - La nota de pie[a] preserva la alternativa semántica de רִנָּה sin reemplazar el texto principal.
  - La nota de pie[b] preserva la imagen verbal de «alcanzar/overtake» que el inglés ya destacó.
