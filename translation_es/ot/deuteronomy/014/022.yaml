revisions:
- from: Ciertamente diezmarás[a] todo el producto de tu semilla que salga del campo, año tras año.
  to: Sin falta diezmarás[a] todo el producto de tu semilla que sale del campo, año tras año.
  rationale: Se ajusta la expresión del mandato enfático para un español más natural y digno, preservando la intensificación del hebreo; se cambia el subjuntivo a indicativo en la relativa para mayor fidelidad sintáctica y claridad; y se pule la nota al pie sin alterar su contenido sustancial.
