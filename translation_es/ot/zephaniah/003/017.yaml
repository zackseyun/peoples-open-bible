translation:
  language: es
  text: Yahvé tu Dios está en medio de ti[a], un poderoso que salva; se gozará sobre ti con alegría; callará en su amor; se regocijará sobre ti con cánticos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te callará con su amor». Otra interpretación menos probable es: «te renovará en su amor».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal como transliteración reverente y auditable. En español bíblico, 'Yahvé' comunica el Tetragrámaton sin sustituirlo por un título.
- source_word: אֱלֹהַיִךְ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - Dios tuyo
  - tu dios
  lexicon: HALOT
  rationale: La forma con sufijo femenino singular se refleja naturalmente como 'tu Dios', manteniendo el valor pactual y el sentido monoteísta.
- source_word: בְּקִרְבֵּך
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - dentro de ti
  - entre ti
  lexicon: HALOT
  rationale: '''En medio de ti'' reproduce la presencia local-comunitaria de la expresión hebrea y resulta idiomático en español.'
- source_word: גִּבּוֹר
  english_pob_choice: a mighty one
  chosen_spanish: un poderoso
  alternatives_spanish:
  - un guerrero
  - un héroe
  - uno fuerte
  lexicon: HALOT
  rationale: '''Poderoso'' conserva la fuerza nominal sin forzar una imagen militar específica que el hebreo no exige aquí.'
- source_word: יוֹשִׁיעַ
  english_pob_choice: who saves
  chosen_spanish: que salva
  alternatives_spanish:
  - que salvará
  - salvador
  lexicon: HALOT
  rationale: En aposición a 'un poderoso', el participio/forma verbal funciona descriptivamente; 'que salva' mantiene el vínculo verbal y evita introducir un sustantivo no presente.
- source_word: יָשִׂישׂ
  english_pob_choice: he will rejoice
  chosen_spanish: se gozará
  alternatives_spanish:
  - se regocijará
  - se alegrará
  lexicon: HALOT
  rationale: Se elige una forma natural y elevada en español que expresa júbilo exuberante, sin repetir exactamente el verbo posterior.
- source_word: בְּשִׂמְחָה
  english_pob_choice: with gladness
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - con regocijo
  lexicon: HALOT
  rationale: '''Con alegría'' es claro, fluido y adecuado para el registro bíblico contemporáneo, preservando el sentido afectivo de la expresión.'
- source_word: יַחֲרִישׁ בְּאַהֲבָתוֹ
  english_pob_choice: he will be quiet in his love
  chosen_spanish: callará en su amor
  alternatives_spanish:
  - estará callado en su amor
  - se aquietará en su amor
  - te callará con su amor
  lexicon: HALOT
  rationale: Se mantiene la lectura sobria y sintácticamente cercana al hebreo, evitando añadir un objeto ('te') que no está explícito. 'Callará' conserva la tensión interpretativa del texto fuente.
- source_word: יָגִיל
  english_pob_choice: he will exult
  chosen_spanish: se regocijará
  alternatives_spanish:
  - exultará
  - se gozará
  lexicon: HALOT
  rationale: Se diferencia de 'se gozará' para reflejar el matiz de exultación intensa con una segunda forma natural en español.
- source_word: בְּרִנָּה
  english_pob_choice: with singing
  chosen_spanish: con gritos de júbilo
  alternatives_spanish:
  - con canto
  - con cantos
  - con clamores de alegría
  lexicon: HALOT
  rationale: La raíz indica grito jubiloso, a veces canto; 'gritos de júbilo' preserva mejor la intensidad sonora que un simple 'canto'.
theological_decisions:
- issue: Interpretación de יחריש באהבתו
  english_pob_reading: he will be quiet in his love
  chosen_spanish_reading: callará en su amor
  alternative_spanish_readings:
  - te callará con su amor
  - te aquietará con su amor
  - se aquietará en su amor
  rationale: La sintaxis hebrea no aporta un objeto explícito para 'callará'. La elección principal conserva la tensión del original y evita convertir una posibilidad interpretativa en texto base. Se deja abierta la lectura pastoral alternativa sin imponerla en el cuerpo del verso.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Presencia divina en medio del pueblo
  english_pob_reading: Yahweh your God is in your midst
  chosen_spanish_reading: Yahvé tu Dios está en medio de ti
  alternative_spanish_readings:
  - Yahvé está en medio de ti
  - Yahvé, tu Dios, está en medio de ti
  rationale: Se conserva tanto el nombre divino como la relación de pacto expresada por 'tu Dios'. Esto mantiene la identificación de Yahvé con el Dios del pueblo y el énfasis en su presencia real en medio de la comunidad.
  doctrine_reference: Translation philosophy §§1, 2, 4
translation_notes:
  revision_awareness: El paquete inglés indica alta concordancia, sin revisiones aplicadas y con el último pase marcado como sin cambios. La propuesta española sigue la lectura principal del auditrack y conserva la tensión de יחריש באהבתו sin resolverla de forma interpretativa en el texto principal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con la política del proyecto para יהוה.
  - 'Se conserva el paralelismo verbal con dos formas distintas: ''se gozará'' / ''se regocijará''.'
  - '''Callará en su amor'' mantiene la ambigüedad semántica documentada en el inglés POB y queda apoyado por una nota textual.'
  - '''Con gritos de júbilo'' traduce el carácter sonoro de רִנָּה sin suavizarlo indebidamente.'
