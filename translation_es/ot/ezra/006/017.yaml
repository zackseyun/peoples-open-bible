  rationale: Se corrigieron los anclajes de las notas para que correspondan al contenido que explican. También se cambió «como expiación» a «como ofrenda por el pecado» para reflejar con mayor precisión el valor sacrificial de לְחַטָּא y la decisión léxica documentada en el POB inglés, sin perder naturalidad en español.
