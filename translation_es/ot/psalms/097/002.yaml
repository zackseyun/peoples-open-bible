translation:
  language: es
  text: Nubes y densa oscuridad están alrededor de él[a]; rectitud y justicia son el cimiento de su trono.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nube y tinieblas lo rodean».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנָן
  english_pob_choice: clouds
  chosen_spanish: nubes
  alternatives_spanish:
  - nube
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo singular en forma léxica, pero en el contexto poético la traducción plural en español refleja mejor el valor colectivo que asumió la revisión inglesa (“Clouds”). “Nubes” conserva la imagen teofánica sin forzar un singular artificial en español.
- source_word: וַעֲרָפֶל
  english_pob_choice: thick darkness
  chosen_spanish: densa oscuridad
  alternatives_spanish:
  - oscuridad espesa
  - tiniebla
  - niebla espesa
  lexicon: HALOT
  rationale: עֲרָפֶל designa una oscuridad pesada, bruma densa o tiniebla teofánica. “Densa oscuridad” comunica bien el peso imagético en español y mantiene la tensión de ocultamiento divino que el texto presenta.
- source_word: סְבִיבָיו
  english_pob_choice: are around him
  chosen_spanish: están alrededor de él
  alternatives_spanish:
  - lo rodean
  - están a su alrededor
  lexicon: HALOT
  rationale: La forma preposicional expresa ubicación alrededor de él; en español hace falta el verbo copulativo para una cláusula natural. “Están alrededor de él” conserva el sentido relacional sin convertirlo en paráfrasis.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  lexicon: HALOT
  rationale: En esta pareja poética con מִשְׁפָּט, el español “justicia” puede corresponder a צֶדֶק con suficiente fidelidad y mantiene la complementariedad con el segundo término. Aunque “rectitud” también sería posible, “justicia” suena más natural junto a “rectitud” en la cláusula final.
- source_word: וּמִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - juicio
  lexicon: HALOT
  rationale: מִשְׁפָּט abarca justicia, orden judicial o derecho establecido. Dado que el verso ya usa “justicia” para צֶדֶק, “rectitud” ayuda a conservar la distinción semántica y el paralelismo sin repetir el mismo término.
- source_word: מְכוֹן
  english_pob_choice: the foundation
  chosen_spanish: el cimiento
  alternatives_spanish:
  - la base
  - el fundamento
  - la base firme
  lexicon: HALOT
  rationale: El sustantivo indica un lugar fijo, base establecida o fundamento. “Cimiento” funciona bien en español para una imagen arquitectónica concreta y transmite estabilidad bajo el trono.
- source_word: כִּסְאוֹ
  english_pob_choice: of his throne
  chosen_spanish: de su trono
  alternatives_spanish:
  - de su silla real
  - de su asiento
  lexicon: HALOT
  rationale: La construcción posesiva se mantiene de modo directo en español. “Trono” es el equivalente natural para el símbolo de realeza divina y preserva la imaginería del texto.
theological_decisions:
- issue: Imagen teofánica de ocultamiento y majestad
  english_pob_reading: Retain the imagery of cloud and thick darkness around God without softening it.
  chosen_spanish_reading: Mantener la imagen de nubes y densa oscuridad alrededor de él, sin convertirla en una explicación abstracta.
  alternative_spanish_readings:
  - interpretarlo como mera majestuosidad
  - parafrasearlo como misterio envolvente
  rationale: El verso no solo describe clima o ambiente; presenta el lenguaje clásico de la manifestación divina con reserva y ocultamiento. La traducción preserva esa tensión en vez de resolverla en un concepto más general.
  doctrine_reference: Conservar la tensión teológica del texto, no reducirla a paráfrasis.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de “Cloud” a “Clouds” para ajustar el valor plural contextual de עָנָן; en español se reflejó esa revisión con “nubes”. También se mantuvo la distinción paralela entre צֶדֶק y מִשְׁפָּט para no aplanar el hebreo en sinónimos.
  spanish_consistency_notes:
  - 'Se preserva el paralelismo poético con dos binomios: imágenes de ocultamiento (nubes / densa oscuridad) y cualidades de su reino (justicia / rectitud).'
  - Se usa “él” para el referente implícito de Yahvé, coherente con el contexto del salmo.
  - El orden de los miembros sigue de cerca el hebreo y la versión inglesa auditada, sin introducir expansión interpretativa.
