theological_decisions:
- issue: Referent of 'his' in the verse
  chosen_reading: Render the pronouns simply as 'his' without specifying whether the referent is the LORD, the ark, or David's chosen resting place.
  alternative_readings:
  - Interpret the referent specifically as the LORD
  - Interpret the referent specifically as the ark
  rationale: The immediate context of Psalm 132 interweaves the LORD's dwelling and the ark/Zion traditions. The Hebrew text uses pronouns without explicit clarification here, so the translation preserves that literary and theological tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
