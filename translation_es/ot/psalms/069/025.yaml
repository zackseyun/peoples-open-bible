translation:
  language: es
  text: Derrama sobre ellos tu indignación[a], y que tu ardiente enojo[b] los alcance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu ira» para «tu indignación».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «el ardor de tu enojo» (modismo hebreo: «el ardor de tu nariz»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁפָךְ
  english_pob_choice: Pour out
  chosen_spanish: Derrama
  alternatives_spanish:
  - Vierte
  - Vacía
  lexicon: HALOT
  rationale: El imperativo hebreo pide una acción de derramar/aplicar con fuerza sobre un objeto. «Derrama» comunica bien la imagen de vertido intenso y mantiene el tono de juicio sin sonar mecánico en español.
- source_word: עֲלֵיהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - encima de ellos
  lexicon: HALOT
  rationale: La preposición עַל con sufijo plural expresa dirección hacia los destinatarios del juicio. «Sobre ellos» conserva la fuerza direccional y funciona con naturalidad en español.
- source_word: זַעְמֶךָ
  english_pob_choice: your indignation
  chosen_spanish: tu indignación
  alternatives_spanish:
  - tu ira
  - tu furor
  lexicon: HALOT
  rationale: Se eligió «indignación» para mantener la dimensión moral del término, como en la lectura inglesa, y para distinguirlo del sintagma siguiente sin aplanar ambos en un solo campo léxico.
- source_word: וַחֲרוֹן אַפְּךָ
  english_pob_choice: and let your burning anger
  chosen_spanish: y que tu ardiente enojo
  alternatives_spanish:
  - y tu ardiente ira
  - y el ardor de tu enojo
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo literal del «ardor/calor de tu nariz», es decir, ira intensa. «Ardiente enojo» preserva el valor metafórico del calor y evita perder la diferencia con «indignación».
- source_word: יַשִּׂיגֵם
  english_pob_choice: overtake them
  chosen_spanish: los alcance
  alternatives_spanish:
  - los persiga y alcance
  - los sobrecoja
  lexicon: HALOT
  rationale: El verbo hifil de נשׂג puede significar alcanzar u overtaking. «Los alcance» mantiene la idea de que la ira llega a sus objetivos; en español, el matiz de persecución implícita queda suficientemente sugerido por el contexto de juicio.
theological_decisions:
- issue: Lenguaje imprecatorio contra enemigos
  english_pob_reading: Retain the direct petition for divine judgment without softening it.
  chosen_spanish_reading: Mantener la petición directa de juicio divino sin suavizarla.
  alternative_spanish_readings:
  - Suavizar a una expresión como «manifiesta tu desagrado sobre ellos»
  - Reformular como mera advertencia
  rationale: El hebreo presenta una súplica explícita para que el juicio de Dios caiga sobre los enemigos. La versión española conserva esa fuerza para no diluir la tensión teológica del texto.
  doctrine_reference: Principio de primacía del original; preservación de la tensión teológica del salmo imprecatorio.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el dictamen auditado en inglés: mantiene la distinción entre זַעַם y חֲרוֹן אַף, conserva la fuerza imprecatoria y traduce el modismo hebreo con español natural sin neutralizarlo. No se registraron revisiones posteriores que alteren la lectura.'
  spanish_consistency_notes:
  - Se usa «indignación» para זַעַם y «ardiente enojo» para חֲרוֹן אַף, manteniendo dos términos distintos en español como en el auditorio inglés.
  - Se prefirió el imperativo «Derrama» por su naturalidad bíblica y su cercanía al valor metafórico de שׁפךְ.
  - El orden de la cláusula secundaria («y que tu ardiente enojo los alcance») conserva la estructura de juicio y el paralelismo del hebreo.
  - Las notas a pie distinguen entre alternativa léxica y explicación del modismo hebreo, sin introducir doctrina adicional.
