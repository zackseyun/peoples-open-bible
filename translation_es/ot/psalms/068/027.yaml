translation:
  language: es
  text: En las asambleas[a], bendigan a Dios, Yahvé[b], de la fuente de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre las congregaciones». El hebreo usa un plural que puede referirse a grupos reunidos o asambleas.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «YHWH». Se vierte aquí como «Yahvé» para preservar el nombre divino. La frase «de la fuente de Israel» es elíptica y también puede entenderse como «Yahvé, ustedes que son de la fuente/origen de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמַקְהֵלוֹת
  english_pob_choice: In the assemblies
  chosen_spanish: En las asambleas
  alternatives_spanish:
  - entre las congregaciones
  - en las congregaciones
  lexicon: HALOT
  rationale: מַקְהֵלוֹת es plural y refiere a grupos reunidos; «asambleas» conserva bien el sentido de reunión y evita el matiz demasiado institucional que puede tener «congregaciones» en español eclesiástico.
- source_word: בָּרְכ֣וּ
  english_pob_choice: bless
  chosen_spanish: bendigan
  alternatives_spanish:
  - alaben
  - bendecid
  lexicon: HALOT
  rationale: El verbo ברך con Dios como objeto conserva en español mejor la fuerza de «bendecir» que la de «alabar». En un mandato plural, «bendigan» comunica la exhortación litúrgica de forma natural.
- source_word: אֱלֹהִ֑ים
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios
  - a Dios Todopoderoso
  lexicon: HALOT
  rationale: Aquí el paralelo con יְהוָה muestra referencia singular; «Dios» es la equivalencia normal y no requiere ampliación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El tetragrámaton se vierte en el texto principal como «Yahvé», conforme al criterio del proyecto para preservar el nombre divino sin sustituirlo por un título. «Yahweh» se reserva para contextos anglófonos; en español, «Yahvé» es la forma más estable y legible.
- source_word: מִמְּקוֹר
  english_pob_choice: from the fountain
  chosen_spanish: desde la fuente
  alternatives_spanish:
  - desde el manantial
  - desde la fuente / manantial
  lexicon: HALOT
  rationale: מָקוֹר puede significar «fuente», «manantial» o «origen». «Fuente» conserva la imagen poética y permite también la lectura de origen implícita, mientras que «manantial» suena más físico y menos apto para el paralelismo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Nombre propio estándar, sin ajuste.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה frente al uso litúrgico tradicional
  english_pob_reading: Yahweh; the divine name is preserved rather than masked as 'the LORD'.
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Se preserva el nombre propio de Dios en lugar de sustituirlo por un título. Esto sigue la decisión doctrinal del proyecto y evita perder la distinción entre nombre y título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Sujeto implícito del imperativo plural 'bendigan'
  english_pob_reading: In the assemblies, bless God, the Lord, from the fountain of Israel.
  chosen_spanish_reading: En las asambleas, bendigan a Dios, Yahvé, desde la fuente de Israel.
  alternative_spanish_readings:
  - En las asambleas, bendecid a Dios, Yahvé, desde la fuente de Israel.
  rationale: El hebreo se dirige a una pluralidad convocada; en español, el imperativo de cortesía o exhortación plural («bendigan») mantiene la fuerza exhortativa sin introducir un sujeto explícito innecesario.
  doctrine_reference: Gramática del hebreo poético en Sal 68:27
translation_notes:
  revision_awareness: El texto inglés auditado mostró una oscilación entre «the LORD» y «the Lord» por influencia de la cadena de fuentes; aquí se sigue directamente el hebreo masorético, que tiene el Tetragrámaton יְהוָה. También se conservó la ambigüedad poética de מִמְּקוֹר y se evitó resolverla de manera demasiado interpretativa en el cuerpo principal.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - «Asambleas» mantiene el plural del hebreo y evita forzar una lectura eclesial técnica.
  - «Fuente» preserva la imagen de מָקוֹר y deja abierta la posible lectura de origen/nacimiento poético.
