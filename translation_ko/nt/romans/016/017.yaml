  text: Παρακαλῶ δὲ ὑμᾶς, ἀδελφοί, σκοπεῖν τοὺς τὰς διχοστασίας καὶ τὰ σκάνδαλα παρὰ τὴν διδαχὴν ἣν ὑμεῖς ἐμάθετε ποιοῦντας, καὶ ⸀ἐκκλίνετε ἀπ’ αὐτῶν·
base_translation:
  language: en
  yaml_path: translation/nt/romans/016/017.yaml
  text: Now I urge you, brothers, to watch out for those who cause divisions and stumbling blocks contrary to the teaching that you learned, and turn away from them.
translation:
  language: ko
  text: 형제 여러분, 내가 여러분에게 권합니다. 여러분이 배운 가르침에 어긋나게 분열과 걸림돌을 일으키는 자들을 경계하고, 그들에게서 떠나십시오.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Παρακαλῶ
  english_pob_choice: I urge
  chosen_korean: 권하다
  lexicon: BDAG
  rationale: 15:30과 일관.
- source_word: σκοπεῖν
  english_pob_choice: to watch out for
  chosen_korean: 경계하다
  alternatives_korean:
  - 주의하다
  - 살피다
  lexicon: BDAG
  rationale: 부정사. 「경계하다」가 위험에 대한 주의의 의미를 살린다.
- source_word: τὰς διχοστασίας καὶ τὰ σκάνδαλα
  english_pob_choice: divisions and stumbling blocks
  chosen_korean: 분열과 걸림돌
  lexicon: BDAG
  rationale: 14:13의 σκάνδαλον과 어휘 일관.
- source_word: παρὰ τὴν διδαχὴν ἣν ὑμεῖς ἐμάθετε
  english_pob_choice: contrary to the teaching that you learned
  chosen_korean: 여러분이 배운 가르침에 어긋나게
  lexicon: BDAG
  rationale: παρά + 대격 「~에 반하여」.
- source_word: ἐκκλίνετε ἀπ’ αὐτῶν
  english_pob_choice: turn away from them
  chosen_korean: 그들에게서 떠나다
  alternatives_korean:
  - 그들을 피하다
  lexicon: BDAG
  rationale: 정형.
