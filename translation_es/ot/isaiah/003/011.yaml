translation:
  language: es
  text: ¡Ay del malvado! Le irá mal[a], porque la obra de sus manos se le hará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¡Ay del malvado! El mal vendrá sobre él, porque la obra de sus manos se le hará»'
    reason: lexical_alternative
lexical_decisions:
- source_word: א֖וֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de!
  - ¡Ay del!
  lexicon: HALOT
  rationale: La interjección profética de amenaza y lamentación en español se expresa naturalmente con «¡Ay!». Aquí se combina con el destinatario en «¡Ay del malvado!», preservando el tono oracular sin sonar artificial.
- source_word: לְ/רָשָׁ֣ע
  english_pob_choice: to the wicked
  chosen_spanish: del malvado
  alternatives_spanish:
  - del impío
  - del perverso
  - del malvado hombre
  lexicon: HALOT
  rationale: El hebreo presenta un singular representativo. «Malvado» conserva ese singular y el matiz moral fuerte, sin introducir «hombre» de más en el texto principal.
- source_word: רָ֑ע
  english_pob_choice: It will go badly
  chosen_spanish: Le irá mal
  alternatives_spanish:
  - vendrá mal sobre él
  - habrá mal sobre él
  - le acontecerá mal
  lexicon: HALOT
  rationale: En este contexto רַע funciona de manera predicativa y expresa resultado adverso. «Le irá mal» comunica esa idea idiomáticamente en español, manteniendo el valor de juicio sin forzar «mal» como sustantivo abstracto.
- source_word: כִּֽי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en efecto
  lexicon: HALOT
  rationale: Introduce la razón del anuncio de desgracia. «Porque» es la conexión causal más clara y directa en español contemporáneo.
- source_word: גְמ֥וּל יָדָ֖י/ו
  english_pob_choice: the work of his hands
  chosen_spanish: la retribución de sus manos
  alternatives_spanish:
  - la obra de sus manos
  - el pago de sus manos
  - la recompensa de sus manos
  lexicon: HALOT
  rationale: גְּמוּל tiene un campo de retribución, pago o correspondencia. En el paralelismo del verso, «retribución» conserva la idea de medida por medida mejor que una paráfrasis puramente descriptiva. «Sus manos» mantiene el hebraísmo que designa sus obras o acciones.
- source_word: יֵעָ֥שֶׂה לּֽ/וֹ
  english_pob_choice: will be done to him
  chosen_spanish: se le hará
  alternatives_spanish:
  - le será hecho
  - le será retribuido
  - se le pagará
  lexicon: HALOT
  rationale: El nifal de עשה se conserva con una pasiva impersonal en español. «Se le hará» mantiene la repetición verbal de עשה y el sentido retributivo sin introducir una explicación ajena al hebreo.
theological_decisions:
- issue: Singular representativo del juicio contra el malvado
  english_pob_reading: Rendered with singular 'him' while keeping 'the wicked' as a representative singular category.
  chosen_spanish_reading: 'Se mantiene el singular: «el malvado... le irá mal... se le hará».'
  alternative_spanish_readings:
  - «les irá mal»
  - «a los malvados...»
  rationale: El hebreo es singular y presenta un caso representativo. En español conviene preservar ese singular para no diluir la forma del dicho profético ni perder su fuerza directa.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Recompensa retributiva medida por medida
  english_pob_reading: 'Expressed the verse as reciprocal recompense: ''what his hands have done will be done to him.'''
  chosen_spanish_reading: 'Se expresa como retribución recíproca: «la retribución de sus manos se le hará».'
  alternative_spanish_readings:
  - «se le pagará según sus obras»
  - «le será devuelto lo que hizo»
  - «la paga de sus manos vendrá sobre él»
  rationale: El versículo subraya la correspondencia entre actos y consecuencia. «Retribución» conserva el eje de compensación/juicio sin añadir una formulación doctrinal más técnica de la que el texto exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 y 3
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido revisado del audit trail inglés, pero opta por una formulación española más idiomática que conserva el paralelismo retributivo y el tono profético de amenaza. Se tuvo en cuenta la última revisión que elevó «the work of his hands» hacia un registro más formal; en español, «la retribución de sus manos» mantiene ese registro y la relación semántica con גְּמוּל/יָדָיו.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando aparece el Tetragrámaton; este versículo no lo contiene.
  - Se preserva «malvado» para el singular representativo y no se pluraliza.
  - «Retribución» se emplea por el valor de גְּמוּל en un contexto de juicio, sin borrar el vínculo con las obras de las manos.
  - La pasiva impersonal «se le hará» reproduce de manera natural el valor pasivo del hebreo sin sobreexplicar la frase.
