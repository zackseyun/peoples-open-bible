translation:
  language: es
  text: En cambio[a], derribarán sus altares, harán pedazos sus pilares[b] y cortarán sus postes de Asera[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Porque derribarán sus altares…». El hebreo כִּי también puede traducirse «porque»; aquí, sin embargo, funciona naturalmente en el contexto como continuación contrastiva de la prohibición anterior.
    reason: lexical_alternative
  - marker: b
    text: O «sus piedras erguidas» o «sus estelas cultuales». El hebreo se refiere a pilares o piedras levantadas para uso religioso.
    reason: alternative_reading
  - marker: c
    text: Hebreo «sus asheras»; es decir, objetos de culto asociados con Asera, probablemente de madera.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Instead
  chosen_spanish: En cambio
  alternatives_spanish:
  - Porque
  - pues
  - ya que
  lexicon: HALOT
  rationale: En este contexto, כִּי no introduce explicación causal sino una continuación contrastiva de la prohibición anterior. «En cambio» comunica en español la oposición práctica que el audit trail inglés marcó con «Instead».
- source_word: מִזְבְּחֹתָם
  english_pob_choice: their altars
  chosen_spanish: sus altares
  alternatives_spanish:
  - sus altares de culto
  lexicon: HALOT
  rationale: מִזְבֵּחַ designa un altar cultual; el plural con sufijo de tercera persona se conserva naturalmente como «sus altares».
- source_word: תִּתֹּצוּן
  english_pob_choice: you shall tear down
  chosen_spanish: derribarán
  alternatives_spanish:
  - demolerán
  - destruirán
  - derribarán
  lexicon: HALOT
  rationale: נתץ expresa derribar o demoler estructuras. «Derribarán» es natural en español y mantiene la fuerza física del verbo sin suavizarlo.
- source_word: מַצֵּבֹתָם
  english_pob_choice: their pillars
  chosen_spanish: sus columnas
  alternatives_spanish:
  - sus pilares
  - sus piedras erguidas
  - sus estelas
  lexicon: HALOT
  rationale: מַצֵּבָה se refiere a una piedra o poste erigido de carácter cultual. «Columnas» conserva la idea de objeto vertical erigido y resulta legible; «pilares» o «piedras erguidas» también serían posibles, pero «columnas» fluye mejor en español sin perder el sentido cultual.
- source_word: תְּשַׁבֵּרוּן
  english_pob_choice: shatter
  chosen_spanish: romperán
  alternatives_spanish:
  - harán pedazos
  - desmenuzarán
  - quebrantarán
  lexicon: HALOT
  rationale: שׁבר intensifica la acción de romper. «Romperán» es más natural y suficientemente fuerte en español; el matiz intensivo queda implícito por la serie de mandatos destructivos.
- source_word: אֲשֵׁרָיו
  english_pob_choice: their Asherah poles
  chosen_spanish: sus imágenes de Asera
  alternatives_spanish:
  - sus postes de Asera
  - sus asheras
  - sus árboles sagrados de Asera
  lexicon: HALOT
  rationale: En la lista de objetos a destruir, el término apunta a un objeto de culto asociado con Asera. «Imágenes de Asera» preserva la conexión con el nombre propio sin imponer de antemano una reconstrucción material demasiado específica; evita además un calco extraño en español.
- source_word: תִּכְרֹתוּן
  english_pob_choice: cut down
  chosen_spanish: cortarán
  alternatives_spanish:
  - derribarán
  - talarán
  - cortarán
  lexicon: HALOT
  rationale: כרת significa cortar o cortar abajo. Para el objeto de culto, «cortarán» comunica de manera directa la acción requerida y deja abierta la naturaleza exacta del objeto (madera u otro soporte) sin sobreespecificarla.
theological_decisions:
- issue: Valor de כִּי al inicio del verso
  english_pob_reading: Instead, you shall…
  chosen_spanish_reading: En cambio, derribarán…
  alternative_spanish_readings:
  - Porque derribarán…
  - Pues derribarán…
  rationale: La secuencia del contexto inmediato es una prohibición seguida por la acción contraria exigida a Israel. Traducir con «En cambio» mantiene la relación adversativa/contrastiva sin convertir la frase en una explicación causal.
  doctrine_reference: Exodus 34:12-13; covenant obedience after the prohibition against alliance.
- issue: Referente de אֲשֵׁרָיו
  english_pob_reading: their Asherah poles
  chosen_spanish_reading: sus imágenes de Asera
  alternative_spanish_readings:
  - sus postes de Asera
  - sus asheras
  - sus objetos de Asera
  rationale: El verbo de destrucción y la lista de elementos cultuales indican un objeto material relacionado con Asera. En español, «imágenes de Asera» conserva la referencia al nombre y comunica un objeto de culto sin forzar una única identificación arqueológica o material que el hebreo no explicita con total precisión.
  doctrine_reference: Deuteronomy 7:5; 12:3; 16:21-22; 1 Kings 14:23.
translation_notes:
  revision_awareness: 'Alineado con el audit trail inglés revisado: no hay cambios sustanciales en la decisión de contraste para כִּי ni en la referencia cultual de אֲשֵׁרָיו; se conserva la lectura de objeto cultual asociado con Asera, con un español más natural y consistente con el resto del proyecto.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar del proyecto cuando el verso lo requiere implícitamente por contexto cercano, aunque no aparece explícito en este versículo.
  - Se prefirió un español contemporáneo y digno, evitando el calco de «Asherah poles» y evitando también tradiciones que borren la referencia cultual específica.
  - «Columnas» y «imágenes de Asera» son opciones de claridad pública; ambas reflejan una destrucción concreta de objetos de culto.
