translation:
  language: es
  text: 'Todos ellos responderán y te dirán: «Tú también[a] te has debilitado como nosotros; has sido hecho semejante a nosotros[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «has sido debilitado» / «has sido hecho débil».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «has sido comparado con nosotros» / «has llegado a ser igual a nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּם
  english_pob_choice: All of them
  chosen_spanish: Todos ellos
  alternatives_spanish:
  - Todos
  - Ellos todos
  lexicon: HALOT
  rationale: El hebreo tiene un valor colectivo totalizador. «Todos ellos» conserva esa totalidad con un español natural y claro para una intervención coral.
- source_word: יַעֲנוּ
  english_pob_choice: will answer
  chosen_spanish: responderán
  alternatives_spanish:
  - contestarán
  - darán respuesta
  lexicon: HALOT
  rationale: ענה en este contexto es responder en diálogo. «Responderán» mantiene el tono formal de réplica que se enlaza con «dirán».
- source_word: וְיֹאמְרוּ
  english_pob_choice: and say
  chosen_spanish: y dirán
  alternatives_spanish:
  - y dirán diciendo
  - y hablarán
  lexicon: HALOT
  rationale: La coordinación verbal hebrea se puede expresar con futuro simple en español. «Dirán» conserva la secuencia de discurso sin forzar una repetición pesada.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - a usted
  lexicon: HALOT
  rationale: El dativo de discurso se integra naturalmente en español con el pronombre átono «te», adecuado para una reprensión directa en segunda persona singular.
- source_word: גַּם אַתָּה
  english_pob_choice: You too
  chosen_spanish: Tú también
  alternatives_spanish:
  - También tú
  - Aun tú
  lexicon: HALOT
  rationale: La expresión marca inclusión irónica del rey entre los muertos. «Tú también» conserva el golpe retórico y suena idiomático en español.
- source_word: חֻלֵּיתָ
  english_pob_choice: have become weak
  chosen_spanish: te has debilitado
  alternatives_spanish:
  - has sido debilitado
  - te has enfermado
  lexicon: HALOT
  rationale: La raíz חלה en piel/pual aquí apunta a estar debilitado/enfequecido más que a una enfermedad específica. «Te has debilitado» refleja el estado resultante con naturalidad; la alternativa pasiva queda en la nota por si se prefiere una lectura más cercana al pasivo hebreo.
- source_word: כָמוֹנוּ
  english_pob_choice: like us
  chosen_spanish: como nosotros
  alternatives_spanish:
  - igual que nosotros
  - como estamos
  lexicon: HALOT
  rationale: La comparación es directa y el paralelismo con el verso siguiente exige mantenerla sencilla. «Como nosotros» conserva el taunt comparativo.
- source_word: אֵלֵינוּ נִמְשָׁלְתָּ
  english_pob_choice: you have become like us
  chosen_spanish: has sido hecho semejante a nosotros
  alternatives_spanish:
  - te has vuelto como nosotros
  - has sido comparado con nosotros
  - has llegado a ser igual a nosotros
  lexicon: HALOT
  rationale: נמשל puede significar ser comparado, hecho semejante o equiparado. En este contexto de humillación, «has sido hecho semejante a nosotros» mantiene la pasiva del hebreo y la ironía del nivelamiento sin aplanar la tensión semántica entre comparación y equivalencia.
theological_decisions:
- issue: La voz de los muertos en el Seol como recurso poético de burla
  english_pob_reading: Render the speech as mockery about the king's loss of power and reduction to the common state of the dead, without importing later doctrinal claims about the afterlife.
  chosen_spanish_reading: Presentar el discurso como una burla poética sobre la pérdida de poder del rey y su reducción a la condición común de los muertos, sin convertir el versículo en una afirmación doctrinal cerrada sobre el más allá.
  alternative_spanish_readings:
  - Tratar a los muertos como sombras personificadas con énfasis mitológico
  - Usar el texto para fijar una doctrina detallada sobre el estado intermedio
  rationale: El pasaje dramatiza una irrupción coral de los muertos para ridiculizar al soberbio caído. La traducción debe preservar esa imagen y su fuerza humillante, dejando abierta la tensión sobre la ontología de los muertos en vez de resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica; no imponer una doctrina no explicitada por el texto.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y el audit trail inglés: conserva la secuencia «responderán y dirán», mantiene la burla directa de «tú también», y refleja la pasiva/resultativa de חֻלֵּיתָ y נִמְשָׁלְתָּ sin suavizar la humillación ni sobregeneralizarla. No se detectaron revisiones aplicadas en el expediente más reciente.'
  spanish_consistency_notes:
  - Usar «te has debilitado»/«has sido hecho semejante» para respetar el tono de descenso y la pasiva hebrea.
  - Mantener «como nosotros» de forma literal y natural, sin expandirlo a explicaciones interpretativas.
  - Conservar el registro poético de reproche con «dirán» en paralelo con «responderán».
