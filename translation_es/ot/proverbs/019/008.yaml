base_translation:
  language: en
  yaml_path: translation/ot/proverbs/019/008.yaml
  text: Whoever gains sense loves his own life[b][a]; whoever keeps understanding will find good.
  footnotes:
  - marker: a
    text: Literally, 'acquires heart.' In Hebrew wisdom literature, 'heart' often refers to the mind or the capacity for discernment.
    reason: lexical_alternative
  - marker: b
    text: Or 'loves himself' or 'loves his soul/life.' The Hebrew noun can denote the self or life, not only the soul in a narrow sense.
    reason: lexical_alternative
