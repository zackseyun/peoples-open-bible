    reason: textual_variant
  revision_rationale: Se restaura la transparencia del audit trail añadiendo la nota de variante textual omitida, y se cambia «se eleva» por «sale» para un español más natural y plenamente fiel al hebreo poético sin reintroducir «brilla».
