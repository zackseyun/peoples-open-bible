review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: mandato de presentar, doble designación sacrificial, destinatario «Yahvé», inventario de animales y requisito final de integridad. Sin embargo, «ofrenda encendida» no preserva con suficiente fidelidad la decisión léxica auditada para אִשֶּׁה, que en el POB inglés se fijó como «food offering» con nota alternativa «offering by fire». En español, «ofrenda encendida» suena poco idiomática y puede sugerir simplemente una ofrenda prendida, no el término técnico sacrificial consumido por fuego. También conviene ajustar «sin defecto» a «sin defecto alguno» o mantener la construcción más natural con «deberán ser»; no es un error grave, pero mejora la claridad normativa.'
  spanish_quality_summary: El español es generalmente claro y digno. «Y presentaréis» y «holocausto para Yahvé» funcionan bien. «Corderos machos» es comprensible aunque algo pesado; aun así es aceptable por precisión. El principal problema de legibilidad es «ofrenda encendida», que no suena natural en español bíblico moderno y no comunica bien el tecnicismo sacrificial. La nota también puede afinarse para explicar mejor el término.
  glossary_alignment: 'Alineación buena en «Yahvé», «holocausto», «carnero», y la conservación del matiz masculino en «corderos machos». No hay conflicto doctrinal mayor. La excepción principal es אִשֶּׁה: el proyecto inglés documenta como principal «food offering» y alternativa «offering by fire»; en español, una solución como «ofrenda de alimento[a]» con nota «O: ofrenda por fuego» preserva mejor el rastro de auditoría que «ofrenda encendida».'
  issues:
  - severity: medium
    issue: «ofrenda encendida» para אִשֶּׁה es poco natural y semánticamente impreciso
    rationale: El sustantivo hebreo es un término técnico sacrificial. «Encendida» no es la forma idiomática esperable en español y puede no transmitir que la ofrenda es consumida por fuego. Además se aleja de la decisión principal documentada en el POB inglés.
  - severity: low
    issue: La nota al pie puede alinearse mejor con la alternativa inglesa documentada
    rationale: La nota actual dice «ofrenda por fuego», lo cual es útil, pero la explicación debería dejar más claro que se trata de un término técnico sacrificial consumido por fuego, en armonía con la auditoría inglesa.
  - severity: low
    issue: La cláusula final puede sonar más normativa en español
    rationale: «serán sin defecto para vosotros» es fiel, pero «deberán ser sin defecto para ustedes/vosotros» o «serán sin defecto alguno para vosotros» resulta más natural. No obstante, no es una desviación grave del sentido fuente.
  revised_spanish_text: 'Y presentaréis una ofrenda de alimento[a], un holocausto para Yahvé: dos toros, un carnero y siete corderos machos de un año; serán sin defecto para vosotros.'
  revised_footnotes:
  - marker: a
    text: 'O también: «ofrenda por fuego». El hebreo usa aquí un término técnico sacrificial para una ofrenda consumida por fuego.'
    reason: lexical_alternative
  revision_rationale: Se revisa únicamente el término para אִשֶּׁה. «Ofrenda de alimento» preserva mejor la decisión principal del POB inglés y es más idiomático que «ofrenda encendida», mientras la nota conserva la alternativa «ofrenda por fuego» y explica el tecnicismo. Se mantiene el resto del versículo porque está sustancialmente alineado con el hebreo y con la terminología del proyecto.
