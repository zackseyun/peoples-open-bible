base_translation:
  language: en
  yaml_path: translation/ot/joshua/015/007.yaml
  text: And the border went up to Debir from the Valley of Achor[a], and turned northward toward Gilgal, which is opposite the Ascent of Adummim, which is south of the wadi. Then the border passed on to the waters of En-shemesh[c][b], and its end was at En-rogel.
  footnotes:
  - marker: a
    text: Or 'to Gilgal' instead of 'toward Gilgal'; the Hebrew can denote either orientation toward the site or movement to it within the boundary description.
    reason: lexical_alternative
  - marker: b
    text: '''Wadi'' refers to a seasonal streambed or ravine; Hebrew נחל often denotes such a watercourse in this kind of topographical description.'
    reason: cultural_note
  - marker: c
    text: Or 'its extremities were at En-rogel'; the Hebrew literally uses a plural form ('its goings out' / 'its outgoings') for the border's termination.
    reason: lexical_alternative
