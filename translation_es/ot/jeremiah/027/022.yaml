  yaml_path: translation/ot/jeremiah/027/022.yaml
  text: They will be brought to Babylon[a], and there they will remain until the day I attend to them, declares Yahweh[b]. Then I will bring them up and restore them to this place.
  footnotes:
  - marker: a
    text: Or 'visit them.' The Hebrew verb can mean to attend to, visit, or intervene for someone; here the context indicates restoration rather than punishment.
    reason: lexical_alternative
  - marker: b
    text: Or 'bring them back.' The Hebrew literally says 'bring them up,' a common expression for return from exile to the land.
    reason: lexical_alternative
