translation:
  language: es
  text: Y había reyes poderosos sobre Jerusalén[a], que gobernaban sobre todo Más Allá del Río, y a ellos se les pagaban tributo, impuesto y peaje[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre todo Más Allá del Río»; la expresión es una designación oficial del territorio imperial al oeste del Éufrates.'
    reason: cultural_note
  - marker: b
    text: Los tres términos forman categorías distintas de ingreso imperial; también puede entenderse como «tributo, impuesto y peaje de tránsito» o «tributo, impuesto y derecho de aduana».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכִין
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  - reyes poderosos
  lexicon: HALOT
  rationale: El sustantivo arameo es plural y denota reyes; «reyes» es la equivalencia directa y natural en español. Mantengo el matiz de poder en el adjetivo siguiente, no en el sustantivo.
- source_word: תַּקִּיפִין
  english_pob_choice: mighty
  chosen_spanish: poderosos
  alternatives_spanish:
  - fuertes
  - poderosos
  lexicon: HALOT
  rationale: El adjetivo expresa fuerza/poder. «Poderosos» comunica bien la idea en español sin sonar arcaico; «fuertes» sería posible, pero menos adecuado para autoridad real.
- source_word: הֲווֹ
  english_pob_choice: were
  chosen_spanish: estaban
  alternatives_spanish:
  - eran
  - había
  lexicon: HALOT
  rationale: La forma copulativa plural pide un pasado simple en español. «Estaban» conserva el estado/posición de dominio sobre Jerusalén con naturalidad.
- source_word: עַל יְרוּשְׁלֶם
  english_pob_choice: over Jerusalem
  chosen_spanish: sobre Jerusalén
  alternatives_spanish:
  - en Jerusalén
  - contra Jerusalén
  lexicon: HALOT
  rationale: La preposición señala autoridad o dominio, no mera ubicación. «Sobre Jerusalén» reproduce ese valor, como en el audit trail inglés.
- source_word: וְשַׁלִּיטִין
  english_pob_choice: ruling
  chosen_spanish: gobernando
  alternatives_spanish:
  - dominando
  - ejerciendo dominio
  lexicon: HALOT
  rationale: El participio verbal expresa ejercicio de dominio. «Gobernando» fluye bien en español y mantiene la función verbal del texto.
- source_word: בְּכֹל עֲבַר נַהֲרָה
  english_pob_choice: over all Beyond the River
  chosen_spanish: sobre todo Más Allá del Río
  alternatives_spanish:
  - sobre todo el territorio Más Allá del Río
  - sobre toda la región Más Allá del Río
  lexicon: HALOT
  rationale: Conservo el nombre administrativo oficial «Más Allá del Río» para עֲבַר נַהֲרָה. Omito «territorio/región» porque no está explícito en el hebreo/arameo y el audit trail inglés retiró ese añadido.
- source_word: מִדָּה
  english_pob_choice: tribute
  chosen_spanish: tributo
  alternatives_spanish:
  - tributo
  - homenaje
  lexicon: HALOT
  rationale: En la tríada administrativa imperial, el término corresponde a una carga tributaria. «Tributo» es el equivalente más estable y claro en español.
- source_word: בְלוֹ
  english_pob_choice: tax
  chosen_spanish: impuesto
  alternatives_spanish:
  - impuesto
  - tributo
  lexicon: HALOT
  rationale: El término designa una categoría fiscal distinta dentro de la serie. «Impuesto» comunica bien esa función general en español y evita confundirlo con «tributo».
- source_word: וַהֲלָךְ
  english_pob_choice: toll
  chosen_spanish: peaje
  alternatives_spanish:
  - peaje
  - derecho de paso
  - arancel
  lexicon: HALOT
  rationale: El vocablo sugiere un cobro de tránsito o circulación. «Peaje» es la opción más transparente para un lector español moderno y conserva la idea de pago por paso/uso.
- source_word: מִתְיְהֵב לְהוֹן
  english_pob_choice: were paid to them
  chosen_spanish: se les pagaban
  alternatives_spanish:
  - se les entregaban
  - se les rendían
  lexicon: HALOT
  rationale: La pasiva aramea indica que esos ingresos eran entregados a los reyes. «Se les pagaban» mantiene la pasiva impersonal y el plural del sujeto compuesto en español.
theological_decisions:
- issue: Designación administrativa «Más Allá del Río»
  english_pob_reading: official designation for the imperial territory west of the Euphrates
  chosen_spanish_reading: título administrativo oficial «Más Allá del Río»
  alternative_spanish_readings:
  - la provincia Más Allá del Río
  - el territorio Más Allá del Río
  rationale: Aunque el verso no nombra explícitamente una 'provincia' o 'territorio', la expresión funciona como designación imperial fija. Mantenerla como título evita sobreinterpretar el hebreo/arameo y respeta el valor histórico-administrativo señalado en el audit trail.
  doctrine_reference: Ninguno; nota histórico-administrativa
- issue: Relación de dominio sobre Jerusalén
  english_pob_reading: over Jerusalem
  chosen_spanish_reading: sobre Jerusalén
  alternative_spanish_readings:
  - en Jerusalén
  rationale: El sentido no es mera localización sino autoridad política. «Sobre Jerusalén» preserva esa tensión semántica y coincide con la lectura auditada del inglés.
  doctrine_reference: Ninguno; nota de sentido léxico-histórico
translation_notes:
  revision_awareness: La redacción sigue la revisión que eliminó cualquier añadido equivalente a «región», porque no está explícito en el texto fuente. También conserva la tríada fiscal diferenciada del audit trail inglés, usando equivalentes españoles claros sin aplanar las distinciones léxicas.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el nombre divino cuando aparezca; este verso no contiene el Tetragrámaton.
  - Se mantiene «Más Allá del Río» como designación fija, con mayúsculas por tratarse de un nombre administrativo.
  - La serie tributaria se diferencia con tres sustantivos no sinónimos exactos para reflejar la tríada del original y del audit trail inglés.
