translation:
  language: es
  text: 'Mira, esta fue la culpa de tu hermana Sodoma: soberbia, plenitud de pan[a] y prosperidad tranquila había en ella y en sus hijas[b], pero no fortaleció la mano del pobre y del necesitado[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abundancia de pan».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «sus hijas»; es decir, los pueblos o asentamientos asociados con Sodoma.
    reason: cultural_note
  - marker: c
    text: Hebreo «no fortaleció la mano del pobre y del necesitado», un modismo que significa que no les dio apoyo ni ayuda.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה זֶה
  english_pob_choice: Look, this was
  chosen_spanish: Mira, este fue
  alternatives_spanish:
  - Mira
  - Mira, esto fue
  - He aquí, esto fue
  lexicon: HALOT
  rationale: El marcador discursivo introduce una explicación enfática; «Mira» comunica esa fuerza en español moderno sin volver el registro arcaico.
- source_word: עֲוֺן
  english_pob_choice: guilt
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  - iniquidad
  - maldad
  lexicon: HALOT
  rationale: En este contexto enumerativo, «pecado» funciona de manera natural para introducir la falta de Sodoma. «Culpa» sería posible, pero en español suena más abstracta y menos alineada con la lista de vicios.
- source_word: אֲחוֹתֵךְ
  english_pob_choice: your sister
  chosen_spanish: tu hermana
  alternatives_spanish:
  - tu hermana
  - la hermana tuya
  lexicon: HALOT
  rationale: Se conserva la metáfora familiar explícita, importante en Ezequiel para la comparación entre ciudades.
- source_word: גָּאוֹן
  english_pob_choice: pride
  chosen_spanish: soberbia
  alternatives_spanish:
  - orgullo
  - arrogancia
  - altivez
  lexicon: HALOT
  rationale: «Soberbia» expresa mejor el tono moral negativo de גָּאוֹן en una lista de vicios, sin perder naturalidad bíblica en español.
- source_word: שִׂבְעַת לֶחֶם
  english_pob_choice: fullness of bread
  chosen_spanish: plena abundancia de pan
  alternatives_spanish:
  - abundancia de pan
  - hartura de pan
  - plenitud de pan
  lexicon: HALOT
  rationale: La imagen literal de «plenitud / hartura de pan» se conserva, pero «plena abundancia de pan» resulta más clara y publicable en español que una calca demasiado dura.
- source_word: שַׁלְוַת הַשְׁקֵט
  english_pob_choice: prosperous ease
  chosen_spanish: próspera tranquilidad
  alternatives_spanish:
  - holgada tranquilidad
  - segura prosperidad
  - tranquila prosperidad
  lexicon: HALOT
  rationale: La frase combina prosperidad y quietud/seguridad; «próspera tranquilidad» mantiene ambos rasgos con buena fluidez en español.
- source_word: וְלִבְנוֹתֶיהָ
  english_pob_choice: her daughters
  chosen_spanish: a ella y a sus hijas
  alternatives_spanish:
  - a ella y a sus hijas
  - y a sus hijas
  - y a sus ciudades hijas
  lexicon: HALOT
  rationale: La versión inglesa preserva la metáfora de «hijas»; en español también se mantiene, y la nota aclara que se trata de los poblados asociados con Sodoma.
- source_word: יָד ... לֹא הֶחֱזִיקָה
  english_pob_choice: she did not strengthen the hand of
  chosen_spanish: no fortaleció la mano de
  alternatives_spanish:
  - no sostuvo la mano de
  - no ayudó a
  - no apoyó a
  lexicon: HALOT
  rationale: Se conserva el hebraísmo «fortalecer la mano» para reflejar la imagen idiomática auditada por la POB, sin ocultar su sentido de apoyo o auxilio.
- source_word: עָנִי וְאֶבְיוֹן
  english_pob_choice: the poor and needy
  chosen_spanish: el pobre y el necesitado
  alternatives_spanish:
  - los pobres y necesitados
  - el afligido y el necesitado
  lexicon: HALOT
  rationale: La pareja léxica se traduce de forma directa y clara; el singular genérico es natural en español y conserva la fuerza social del original.
theological_decisions:
- issue: Naturaleza del pecado de Sodoma en este versículo
  english_pob_reading: The verse lists pride, fullness of bread, prosperous ease, and failure to help the poor and needy, without narrowing the text to one later interpretive line.
  chosen_spanish_reading: El versículo enumera soberbia, abundancia, tranquilidad próspera y la omisión de ayudar al pobre y al necesitado, sin reducirlo a un solo tipo de pecado.
  alternative_spanish_readings:
  - Interpretarlo de modo que sugiera solo un pecado sexual.
  - Ampliar el versículo para incluir pecados no mencionados aquí.
  rationale: La traducción debe seguir el contenido explícito del texto hebreo y evitar tanto estrecharlo como ampliarlo doctrinalmente.
  doctrine_reference: Philosophy items 1 and 3
- issue: Sentido de la expresión «her daughters»
  english_pob_reading: Hebrew 'her daughters'—that is, the towns or settlements associated with Sodom.
  chosen_spanish_reading: «Sus hijas» se mantiene en el texto; la referencia son los asentamientos o poblados asociados con Sodoma.
  alternative_spanish_readings:
  - Sustituirlo por «sus ciudades dependientes» en el cuerpo del texto.
  - Eliminar la imagen filial por completo.
  rationale: La metáfora es parte del lenguaje profético y debe conservarse; la aclaración puede ir en nota para no perder el sentido histórico-geográfico.
  doctrine_reference: Source note / prophecy diction
translation_notes:
  revision_awareness: La revisión inglesa reciente reemplazó «plenty of food» por la forma más literal «fullness of bread»; la presente versión conserva esa mayor literalidad mediante «plena abundancia de pan», sin perder legibilidad. También se respetó la decisión de no estrechar el versículo a un solo tema moral posterior, manteniendo la lista explícita del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el nombre divino aparezca en otros pasajes; este versículo no lo contiene.
  - Se conserva la metáfora de «hijas» con nota explicativa, en línea con la POB.
  - Se usa un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - No se introduce «Cristo», «SEÑOR» ni otras sustituciones no presentes en el hebreo de este versículo.
