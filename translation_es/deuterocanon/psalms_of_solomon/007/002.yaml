review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: ἀπώσω como indicativo pasado («has rechazado»), vocativo «oh Dios», y μὴ πατήσαι como deseo/prohibición independiente («no permita…»). También conserva la lectura principal de κληρονομίαν ἁγιάσματός σου como «la heredad de tu santuario». Sin embargo, las notas no representan con precisión el expediente inglés: la nota [a] presenta como alternativa algo que ya es el texto principal, y omite claramente la alternativa futura/repulsiva; la nota [b] invierte la alternativa documentada, pues el inglés alternativo es más bien «tu heredad santa», no «la herencia de tu santuario».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos mejoras pequeñas: «no permita su pie pisotear» suena algo forzado; «que su pie no pisotee» es más natural y sigue expresando deseo/prohibición. Además, «heredad» es posible en registro bíblico, pero «herencia» resulta más clara para lectura eclesial amplia sin perder el matiz de κληρονομίαν.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Dios» para θεός y «santuario» para ἁγίασμα encajan bien. La decisión sobre «su pie» respeta la revisión auditada al mantener el singular griego. El ajuste propuesto a «herencia» responde a claridad estilística, no a cambio teológico.
  issues:
  - severity: medium
    issue: La nota [a] no preserva correctamente la alternativa del expediente inglés.
    rationale: El texto principal ya dice «los has rechazado», pero la nota [a] dice que el griego puede entenderse como «los has rechazado». La nota debe registrar la alternativa futura/volitiva documentada («los harás retroceder» / «hazlos retroceder»), no repetir el sentido principal.
  - severity: medium
    issue: La nota [b] invierte la relación entre lectura principal y alternativa.
    rationale: El inglés principal es «the inheritance of your sanctuary» y la alternativa es «your holy inheritance». La nota española dice como alternativa «la herencia de tu santuario», que equivale sustancialmente al texto principal. Debe consignar una alternativa como «tu herencia santa».
  - severity: low
    issue: La formulación verbal «no permita su pie pisotear» suena poco natural en español bíblico moderno.
    rationale: Aunque comprensible, una construcción con subjuntivo exhortativo como «que su pie no pisotee» fluye mejor y representa adecuadamente el valor optativo independiente.
  - severity: low
    issue: «Heredad» puede sonar más arcaico de lo deseable para este proyecto.
    rationale: Es defendible, pero «herencia» comunica mejor a un público amplio y sigue preservando el sentido de κληρονομίαν.
  revised_spanish_text: Porque tú los has rechazado, oh Dios[a]; que su pie no pisotee la herencia de tu santuario[b].
  revised_footnotes:
  - marker: a
    text: 'El verbo griego en Swete es inusual y también podría entenderse como «los harás retroceder, oh Dios»; por el contexto de oración, el texto principal sigue la lectura indicativa aprobada: «los has rechazado».'
    reason: alternative_reading
  - marker: b
    text: O posiblemente, «tu herencia santa», si la frase final se toma de manera más atributiva que como «la herencia de tu santuario».
    reason: lexical_alternative
