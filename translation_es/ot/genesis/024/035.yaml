review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en el sujeto divino «Yahvé», en «mi amo», y en la lista general de bienes. Sin embargo, no preserva bien וַיִּגְדָּל: «ha engrandecido» queda sin objeto y cambia el sentido de intransitivo/reflexivo («se ha hecho grande / ha llegado a ser grande»). Además, «ovejas y vacas» estrecha indebidamente los colectivos צֹאן y בָקָר; conviene una formulación más amplia y natural como «rebaños y ganado».'
  spanish_quality_summary: 'El texto actual es legible, pero «y ha engrandecido» suena gramaticalmente incompleto en español. La revisión propuesta mejora naturalidad y fidelidad. También conviene alinear la nota con la política del proyecto: no hace falta ofrecer «el SEÑOR» como alternativa reverencial en una nota léxica aquí. La nota pertinente en este versículo es la alternativa «esclavos/esclavas» frente a «siervos/siervas» o viceversa; dado el texto revisado, se preserva la alternativa fuerte en nota.'
  glossary_alignment: Se mantiene «Yahvé» conforme al proyecto. «Amo» encaja para אֲדֹנִי. Para עֲבָדִם / שְׁפָחֹת, dado que la evidencia inglesa documenta como principal ‘male/female servants’ con alternativa ‘slaves’, en español conviene «siervos y siervas» en texto principal con nota alternativa «esclavos y esclavas», preservando la racionalidad auditada sin perder la tensión léxica.
  issues:
  - severity: high
    issue: «ha engrandecido» traduce mal וַיִּגְדָּל
    rationale: El hebreo aquí expresa que Abraham ‘se hizo grande / llegó a ser grande’; la forma española propuesta exige objeto o cambia la estructura del evento.
  - severity: medium
    issue: «ovejas y vacas» sobreespecifica colectivos hebreos
    rationale: צֹאן y בָקָר son categorías colectivas de ganado, no necesariamente solo ovejas y vacas individuales. «Rebaños y ganado» o equivalente preserva mejor el alcance.
  - severity: medium
    issue: La nota [a] sobre «el SEÑOR» no corresponde a la política principal ni a la necesidad de este versículo
    rationale: El proyecto español ya fija «Yahvé» como forma principal. La nota útil, siguiendo el rastro POB inglés, es la alternativa léxica para siervos/esclavos.
  - severity: medium
    issue: El texto principal usa «esclavos y esclavas» donde la auditoría inglesa privilegia ‘servants’ con alternativa fuerte en nota
    rationale: Aunque el contexto permite ‘esclavos’, para conservar la decisión documentada conviene reflejar en español la opción principal más neutral y dejar la alternativa fuerte anotada.
  revised_spanish_text: Yahvé ha bendecido mucho a mi amo, y él se ha hecho grande. Le ha dado rebaños y ganado, plata y oro, siervos[a] y siervas, camellos y asnos.
  revised_footnotes:
  - marker: a
    text: O «esclavos y esclavas». Los términos hebreos pueden denotar siervos domésticos o esclavos, según el contexto.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el verbo de crecimiento/estatus («se ha hecho grande»), se evita restringir los colectivos ganaderos hebreos, y se alinea el manejo de עֲבָדִם / שְׁפָחֹת con la decisión auditada: texto principal más neutral con alternativa fuerte en nota. Se elimina la nota innecesaria sobre «el SEÑOR» porque el proyecto español ya adopta «Yahvé» como forma principal.'
