translation:
  language: es
  text: Y cuando el rey oyó las palabras de la ley[a], rasgó sus vestidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la instrucción»; תורה puede significar instrucción en sentido más amplio, aunque aquí se refiere al cuerpo legal del pacto leído ante el rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ...
  chosen_spanish: Y ...
  alternatives_spanish:
  - Ahora ...
  - Y sucedió que ...
  lexicon: HALOT
  rationale: La forma narrativa con waw-consecutiva introduce el hecho siguiente. En español, iniciar con «Y» conserva la continuidad narrativa sin forzar un giro arcaico que no añade precisión.
- source_word: כִּשְׁמֹעַ
  english_pob_choice: when ... heard
  chosen_spanish: cuando oyó
  alternatives_spanish:
  - al oír
  - así que oyó
  lexicon: HALOT
  rationale: El infinitivo constructo con כ expresa circunstancia temporal. «Cuando oyó» reproduce de manera natural la relación temporal y mantiene el sujeto explícito del contexto.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey Josías
  lexicon: HALOT
  rationale: El hebreo usa el título definido, no el nombre propio. «El rey» respeta esa forma; el contexto ya identifica al referentе como Josías.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - los dichos de
  - el contenido de
  lexicon: HALOT
  rationale: El constructo plural de דבר se refiere aquí al contenido leído. «Las palabras de» es la traducción más directa y natural en español.
- source_word: הַתּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la Torá
  lexicon: HALOT
  rationale: En este contexto histórico la referencia es al corpus pactal/legal leído ante el rey. «La ley» comunica mejor esa fuerza en español bíblico actual, sin reducir innecesariamente el alcance de תורה a un término meramente abstracto.
- source_word: וַיִּקְרַע
  english_pob_choice: he tore
  chosen_spanish: rasgó
  alternatives_spanish:
  - rompió
  - desgarró
  lexicon: HALOT
  rationale: קרע describe el gesto convencional de rasgar la ropa en señal de dolor, consternación o arrepentimiento. «Rasgó» conserva ese valor ceremonial y literario en español.
- source_word: בְּגָדָיו
  english_pob_choice: his clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - su ropa
  - sus prendas
  lexicon: HALOT
  rationale: בגד designa ropa en general. «Sus vestidos» es digno y bíblicamente natural en español; «su ropa» sería más coloquial, y «sus prendas» menos idiomático en este contexto.
theological_decisions:
- issue: Valor de תורה en el contexto de la reforma de Josías
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la instrucción
  - la Torá
  rationale: El pasaje alude al libro descubierto y leído ante el rey, con contenido normativo y pactal. «La ley» expresa mejor esa función en español sin introducir una transliteración innecesaria ni atenuar el carácter normativo del texto.
  doctrine_reference: 'Consistencia terminológica: término legal/pactual en contexto histórico narrativo.'
translation_notes:
  revision_awareness: 'Coincide plenamente con el cierre de revisión indicado en el paquete fuente: no se registran cambios recientes sustantivos y el acuerdo de revisión fue alto. La redacción española conserva el paralelismo narrativo del hebreo y la opción léxica principal documentada para תורה.'
  spanish_consistency_notes:
  - Se mantiene «rey» sin añadir «Josías» para respetar el título del hebreo.
  - Se conserva el valor concreto de קרע como «rasgar» y no se suaviza a una expresión meramente emocional.
  - La nota sobre תורה ofrece la alternativa semántica documentada sin desplazar la lectura principal «ley».
  - El estilo es bíblico contemporáneo, no arcaizante, y evita calcos innecesarios.
