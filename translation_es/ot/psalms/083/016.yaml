review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: כֵּן como introducción modal/resultativa, תִּרְדְּפֵם como petición de persecución, y la distinción poética entre בְּסַעֲרֶךָ y וּבְסוּפָתְךָ mediante «tormenta» y «tempestad». También conserva adecuadamente la petición imprecatoria dirigida a Dios.'
  spanish_quality_summary: El español es claro, natural y digno. Sin embargo, «Así, persíguelos...» suena algo más imperativo que súplica poética en español, mientras que «Así, los persigas...» sería poco natural. La mejor reparación menor es usar «Persíguelos... y aterrorízalos...» para una oración directa a Dios, sin el adverbio inicial, o alternativamente «Así persíguelos...» sin coma. Además, la nota al pie actual introduce una alternativa que duplica el término principal y no refleja bien la nota inglesa, que contrasta mejor «Así»/«De este modo» y «tempestad»/«torbellino».
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen Yahvé, Mesías ni otros términos sensibles del glosario. La elección «atorrorízalos» para בהל y «tormenta/tempestad» para los dos sustantivos meteorológicos es sólida y fiel.
  issues:
  - severity: medium
    issue: El adverbio inicial «Así,» con coma hace la línea algo torpe en español y puede sonar menos natural en una súplica directa.
    rationale: Aunque כֵּן sí está presente y significa «Así/De este modo», en español bíblico natural la oración funciona mejor sin esa apertura marcada, o con «Así» sin pausa. Dado que es una reparación menor, conviene simplificar la línea para máxima naturalidad.
  - severity: low
    issue: La nota al pie no refleja con precisión la alternativa principal documentada en la auditoría inglesa.
    rationale: La nota inglesa preserva la alternativa «Thus ... and with your whirlwind ...». La nota española debería recoger mejor la posibilidad de «Así/De este modo» y «torbellino» en vez de repetir «tempestad» como alternativa del primer término.
  revised_spanish_text: Persíguelos con tu tormenta,[a] y aterrorízalos con tu tempestad.
  revised_footnotes:
  - marker: a
    text: 'O: «Así persíguelos con tu tormenta, y con tu torbellino aterrorízalos».'
    reason: lexical_alternative
  revision_rationale: Se hace una reparación menor para mejorar la naturalidad y legibilidad en español, manteniendo plenamente el sentido hebreo y la fuerza imprecatoria. También se ajusta la nota para reflejar mejor las alternativas documentadas en la auditoría inglesa.
