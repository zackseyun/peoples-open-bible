base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/036/023.yaml
  text: 'Thus says Cyrus king of Persia: Yahweh[a], the God of heaven, has given me all the kingdoms of the earth, and he has charged me to build for him a house in Jerusalem, which is in Judah. Whoever is among you of all his people, may Yahweh his God be with him[d][c][b], and let him go up.'
  footnotes:
  - marker: a
    text: Or, more smoothly, 'Whoever among you belongs to any of his people.' The Hebrew expression is compressed and can be represented in more than one close English form.
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD his God is with him.' The Hebrew can be read as an indicative statement, though the context favors a benedictory sense.
    reason: alternative_reading
  - marker: c
    text: That is, go up to Jerusalem; 'go up' is the conventional biblical idiom for ascent to the holy city.
    reason: cultural_note
  - marker: d
    text: Or 'Whoever among you is from all his people'.
    reason: previous_rendering
