    rationale: 'En la POB inglesa, [a] comenta «to deceive her» y [b] comenta «reclined». En el borrador español, [a] se ancla a «entró» y [b] a «tener relaciones con ella». Eso altera la correspondencia editorial y pierde dos notas importantes: la alternativa léxica de ἀπατῆσαι y la nota cultural de ἀνέπεσεν.'
  - severity: low
