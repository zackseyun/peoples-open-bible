lexical_decisions:
- source_word: οὐκ
  english_pob_choice: not
  chosen_spanish: 'No'
  alternatives_spanish:
  - 'no'
  lexicon: BDAG
  rationale: La negación simple se expresa naturalmente con «No» antes del verbo finito en español, conservando el valor directo de la partícula negativa griega.
- source_word: ἐξόμνυμαι
  english_pob_choice: I will renounce
  chosen_spanish: renunciaré
  alternatives_spanish:
  - abjuraré
  - desconoceré
  - repudiaré
  lexicon: LSJ
  rationale: El verbo medio puede expresar negar, renunciar o forswear. Dado el contexto de rechazo de la solidaridad familiar, «renunciaré» transmite bien la idea de repudiar esa vinculación sin forzar una fórmula jurídica de juramento que el español no necesita explicitar aquí.
- source_word: τὴν ... συγγένειαν
  english_pob_choice: the ... kinship
  chosen_spanish: el parentesco
  alternatives_spanish:
  - la relación de parentesco
  - el vínculo familiar
  lexicon: BDAG
  rationale: «συγγένεια» denota parentesco o relación familiar. «Parentesco» es un equivalente natural y preciso en español, y mantiene el sentido de vínculo familiar que el contexto exige.
- source_word: εὐγενῆ
  english_pob_choice: noble
  chosen_spanish: noble
  alternatives_spanish:
  - de noble linaje
  - bien nacido
  - honorable
  lexicon: LSJ
  rationale: El adjetivo puede aludir a nobleza de nacimiento o a dignidad de calidad. «Noble» preserva ambas posibilidades sin restringir prematuramente el matiz social o moral.
- source_word: τῆς ἀδελφότητος
  english_pob_choice: of our brotherhood
  chosen_spanish: de nuestra fraternidad
  alternatives_spanish:
  - de nuestra hermandad
  - de nuestros hermanos
  - de la fraternidad fraterna
  lexicon: LSJ
  rationale: «ἀδελφότης» nombra la fraternidad o hermandad entre hermanos. «Fraternidad» funciona bien en español bíblico moderno; se conserva el posesivo implícito con «nuestra», como en el inglés auditado, porque el hablante alude a su propio vínculo familiar. Opté por «fraternidad» para evitar la redundancia de «hermandad de hermanos».
theological_decisions:
- issue: Término familiar masculino ἀδελφότης
  english_pob_reading: brotherhood
  chosen_spanish_reading: fraternidad
  alternative_spanish_readings:
  - hermandad
  - fraternidad de hermanos
  - siblingidad
  rationale: Aunque el término griego es morfológicamente masculino, aquí designa la solidaridad entre los miembros de la familia. En español, «fraternidad» comunica de forma natural ese vínculo sin perder el marco familiar. Se evita neutralizar innecesariamente más allá de lo que permite el contexto, pero tampoco se impone un calco masculino si el español ofrece una opción más idiomática.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Matiz de ἐξόμνυμαι como repudio de lazos familiares
  english_pob_reading: I will not renounce
  chosen_spanish_reading: No renunciaré
  alternative_spanish_readings:
  - No repudiaré
  - No abjuraré
  - No desconoceré
  rationale: La elección sigue la revisión auditada que prefirió «renounce» por ser más natural y formal. En español, «renunciaré» conserva el sentido de rechazar o repudiar esa relación bajo presión, sin añadir una idea explícita de juramento que el contexto no obliga a poner en primer plano.
  doctrine_reference: 4 Maccabees 10:3 audit trail / applied revision
translation_notes:
  revision_awareness: El inglés auditado fue revisado de «disown» a «renounce» para reflejar con mayor naturalidad ἐξόμνυμαι; la versión española sigue esa línea con «renunciaré» y mantiene el adjetivo «noble» y el vínculo familiar explícito. Se preserva la alternativa lexical de «vínculo/hermandad» en nota para mostrar el matiz posible de συγγένεια y ἀδελφότης.
  spanish_consistency_notes:
  - Se mantiene «nuestra» como reflejo del posesivo implícito del contexto familiar, coherente con el inglés auditado.
  - Se evita «Señor» o lenguaje de sustitución teológica porque el versículo no contiene el nombre divino.
  - «Fraternidad» se usa como equivalente de ἀδελφότης en un registro bíblico moderno y natural, sin borrar el matiz de vínculo entre hermanos de sangre.
