translation:
  language: es
  text: ¿Sabes el tiempo en que paren las cabras monteses[a]? ¿Observas a las ciervas[b] de parto[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cabras salvajes de la roca»; el hebreo se refiere a cabras salvajes de montaña, posiblemente íbices.
    reason: lexical_alternative
  - marker: b
    text: O «las hembras de ciervo».
    reason: lexical_alternative
  - marker: c
    text: O «con dolores de parto». El verbo también puede expresar el estar en labor de parto; además, «observas» puede traducirse «vigilas» o «miras con atención».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיָדַעְתָּ
  english_pob_choice: Do you know
  chosen_spanish: ¿Sabes
  alternatives_spanish:
  - ¿Has conocido
  - ¿Conoces
  lexicon: HALOT
  rationale: La forma interrogativa hebrea con perfecto 2ms funciona de modo retórico; en español, el presente interrogativo «¿Sabes?» comunica con naturalidad la pregunta de conocimiento.
- source_word: עֵת
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - la temporada
  - el momento
  lexicon: HALOT
  rationale: Aquí se refiere al periodo o momento de la gestación y el parto; «el tiempo» conserva bien esa amplitud sin precisar demasiado.
- source_word: לֶדֶת
  english_pob_choice: when ... give birth
  chosen_spanish: paren
  alternatives_spanish:
  - den a luz
  - estén por dar a luz
  lexicon: HALOT
  rationale: El infinitivo constructo con valor temporal se vierte de forma natural con una cláusula de tiempo. «Paren» expresa el acto de dar a luz con concisión y fidelidad.
- source_word: יַעֲלֵי סָלַע
  english_pob_choice: the mountain goats
  chosen_spanish: las cabras monteses de la peña
  alternatives_spanish:
  - las cabras salvajes de la roca
  - los íbices
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es «cabras de la roca» y alude a cabras monteses/íbices de montaña. «Cabras monteses de la peña» conserva el valor zoológico y la imagen topográfica del original.
- source_word: חֹלֵל
  english_pob_choice: in labor
  chosen_spanish: en el parto
  alternatives_spanish:
  - con dolores de parto
  - de parto
  lexicon: HALOT
  rationale: El verbo alude al estado de contracciones y dolor del alumbramiento. «En el parto» comunica de manera clara y fiel ese estado sin añadir interpretación.
- source_word: אַיָּלוֹת
  english_pob_choice: the deer
  chosen_spanish: las ciervas
  alternatives_spanish:
  - las hembras de ciervo
  - las hinds
  lexicon: HALOT
  rationale: El término designa ciervas o hembras de ciervo. «Ciervas» mantiene el género femenino explícito que está presente en el hebreo y funciona con naturalidad en español.
- source_word: תִּשְׁמֹר
  english_pob_choice: Do you observe
  chosen_spanish: Observas
  alternatives_spanish:
  - Miras
  - Vigilas
  lexicon: HALOT
  rationale: En este contexto שׁמר tiene el matiz de observar o vigilar. «Observas» refleja mejor la idea de atención perceptiva indicada por la revisión inglesa reciente que «vigilar» o «guardar».
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió «watch over» por «observe» para ajustar con más precisión el valor lexical de שׁמר; por eso se eligió «observas» y se evitó «vigilar/guardar» como sentido principal. También se mantuvo la distinción entre las cabras monteses de montaña y las ciervas hembras, según el audit trail inglés y el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se preserva el tono interrogativo retórico del hebreo con dos preguntas consecutivas.
  - «Cabras monteses» y «ciervas» mantienen el paralelismo zoológico del texto hebreo sin forzar un término más técnico que el necesario.
