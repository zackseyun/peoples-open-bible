review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del griego: οὖν = «Por tanto», χρείαν ἔχητε = «si tienen necesidad», y ἀποστείλατε = «envíen». También conserva adecuadamente la nota sobre la duplicación textual de ἐὰν. Sin embargo, «se lo llevarán hasta ustedes» no refleja bien la orientación contextual y epistolar que el inglés auditado resolvió como «bring them to you»; en español, «llevar ... hasta ustedes» suena invertido o forzado desde la perspectiva del destinatario, y además «lo» singulariza indebidamente un objeto implícito que en contexto es plural («them», los escritos/libros mencionados antes).'
  spanish_quality_summary: «Por tanto, si tienen necesidad, envíen a los que se los traerán a ustedes» es más natural y claro en español general que «se lo llevarán hasta ustedes». Evita un giro poco idiomático («hasta ustedes» con este verbo) y corrige la referencia implícita al objeto contextual plural. La nota textual actual es clara y adecuada.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. El principal ajuste léxico es mantener el valor de ἀποκομιούντας como traer/llevar en contexto de entrega a los destinatarios, en línea con la revisión inglesa auditada. «Por tanto» para οὖν y «tienen necesidad» para χρείαν ἔχητε son aceptables.
  issues:
  - severity: medium
    issue: «se lo llevarán hasta ustedes» suena direccionalmente confuso y poco idiomático.
    rationale: Desde la perspectiva de los destinatarios, el sentido contextual es de traerles los escritos, no de «llevarlos hasta ustedes», que en español resulta forzado.
  - severity: medium
    issue: El pronombre «lo» no refleja bien el objeto implícito contextual.
    rationale: El inglés auditado suple «them» por referencia a los escritos mencionados antes; en español conviene pluralizar («se los») para preservar esa referencia contextual.
  - severity: low
    issue: «hasta ustedes» añade un matiz espacial innecesario.
    rationale: ὑμῖν se expresa naturalmente como «a ustedes» con un verbo de entrega/traslado; «hasta» no aporta fidelidad adicional y empeora la fluidez.
  revised_spanish_text: Por tanto[a], si tienen necesidad, envíen a los que se los traerán a ustedes.
  revised_footnotes:
  - marker: a
    text: El griego transmitido presenta ἐὰν ... ἐὰν («si ... si»), probablemente una irregularidad textual o una dittografía; la traducción expresa el sentido previsto con una sola condicional.
    reason: textual_variant
  revision_rationale: Se reemplaza «se lo llevarán hasta ustedes» por «se los traerán a ustedes» para reflejar mejor el sentido contextual de entrega a los destinatarios, mejorar la naturalidad del español y ajustar el objeto implícito al plural contextual de los escritos mencionados anteriormente. Se mantiene la nota textual sobre la duplicación de ἐὰν.
