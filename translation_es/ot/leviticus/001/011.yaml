translation:
  language: es
  text: Y lo degollará en el lado norte del altar, delante de Yahvé; y los hijos de Aarón, los sacerdotes, arrojarán[a] su sangre contra el altar por todos sus lados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la arrojarán con fuerza contra el altar por todos sus lados». El verbo hebreo sugiere una acción enérgica de lanzar la sangre, no un rociado leve.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁחַט
  english_pob_choice: shall slaughter
  chosen_spanish: lo degollará
  alternatives_spanish:
  - lo sacrificará
  - lo matará
  lexicon: HALOT
  rationale: שׁחט es el verbo técnico del degüello sacrificial; en español, "degollar" comunica con más precisión la acción ritual que "matar". Se mantiene el valor instructivo/legal del futuro de mandato con "-rá".
- source_word: יֶרֶךְ הַמִּזְבֵּחַ צָפֹנָה
  english_pob_choice: the north side of the altar
  chosen_spanish: el lado norte del altar
  alternatives_spanish:
  - el costado norte del altar
  - el flanco norte del altar
  lexicon: HALOT
  rationale: יֶרֶךְ designa literalmente el costado o lado; en español, "lado norte" suena natural y conserva la ubicación cultual. "Costado" y "flanco" son posibles, pero menos fluidos para esta frase.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como "Yahvé" según la terminología del proyecto. "Delante de" reproduce bien la expresión cultual y evita una paráfrasis excesiva.
- source_word: וְזָרְקוּ
  english_pob_choice: shall throw
  chosen_spanish: arrojarán
  alternatives_spanish:
  - tirarán
  - echarán
  lexicon: HALOT
  rationale: זרק indica un lanzamiento vigoroso del sangre hacia el altar; "arrojarán" mantiene la fuerza del verbo mejor que "esparcirán" o "rociarán".
- source_word: בְּנֵי אַהֲרֹן הַכֹּהֲנִים
  english_pob_choice: Aaron’s sons, the priests
  chosen_spanish: los hijos de Aarón, los sacerdotes
  alternatives_spanish:
  - los hijos de Aarón, que eran sacerdotes
  - los sacerdotes, hijos de Aarón
  lexicon: HALOT
  rationale: 'La apposición hebrea identifica a los hijos de Aarón como los sacerdotes. La traducción conserva ambos rasgos: linaje y oficio.'
- source_word: דָּמֹו
  english_pob_choice: its blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - la sangre de él
  - la sangre de eso
  lexicon: HALOT
  rationale: En español, el posesivo de un animal sacrificial se expresa naturalmente con "su". El referente ya está claro por el contexto ritual.
- source_word: עַל הַמִּזְבֵּחַ סָבִיב
  english_pob_choice: against the altar all around
  chosen_spanish: contra el altar, alrededor
  alternatives_spanish:
  - sobre el altar, alrededor
  - alrededor del altar
  lexicon: HALOT
  rationale: Con זָרַק, עַל puede implicar un movimiento "contra" la superficie/lado del altar; "alrededor" refleja סָבִיב. Se conserva la concreción ritual sin añadir un término técnico no atestiguado aquí.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: before Yahweh
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - ante Yahvé
  - en presencia de Yahvé
  rationale: Se sigue la decisión del proyecto de traducir יהוה como "Yahvé", preservando el nombre del pacto en lugar de ocultarlo con un título. La preposición mantiene el valor cultual de la fórmula.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: El registro inglés indica alta concordancia con revisión sin cambios posteriores; no se documentaron enmiendas aplicadas. La versión española mantiene esa línea, conservando las decisiones léxicas y teológicas ya auditadas.
  spanish_consistency_notes:
  - Se usa "Yahvé" de forma consistente para יהוה.
  - Se mantiene un registro cultual sobrio y directo, sin sustituir el vocabulario sacrificial por términos más genéricos.
  - '"Su sangre" corresponde naturalmente al referente animal en español, sin perder la referencia al sacrificio.'
  - La puntuación separa las dos cláusulas conforme al ritmo del hebreo y la lectura pública en español.
