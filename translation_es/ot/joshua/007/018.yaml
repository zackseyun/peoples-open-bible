review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja la estructura general del hebreo y conserva bien la genealogía, «fue tomado» para וַיִּלָּכֵד, y «de la tribu de Judá». Sin embargo, falla en un punto importante: לַגְּבָרִים no se preserva fielmente con «a los hombres», porque el inglés auditado documenta el sentido procedimental «man by man» y la nota alternativa debe anclarse a esa frase, no a «su casa». Además, «su casa» para בֵּיתוֹ es demasiado ambigua en español moderno en este contexto; «su casa» suena a edificio, mientras que el hebreo aquí se refiere al grupo doméstico presentado para el sorteo.'
  spanish_quality_summary: El texto es legible, pero «hizo acercar su casa a los hombres» suena poco natural y confuso en español. «Su familia» o «su casa» con nota no basta si la frase procedimental queda mal resuelta. Una redacción como «hizo acercarse a su familia, hombre por hombre» mejora claridad y conserva el procedimiento sin paráfrasis excesiva.
  glossary_alignment: No hay conflictos con Yahvé/Mesías/etc. Los nombres propios están dentro de un margen aceptable en español («Acan», «Zera»), aunque «Acan» puede sonar menos transparente frente a la forma más conocida «Acán». El problema principal no es de glosario sino de fidelidad léxica en לַגְּבָרִים y de naturalidad semántica en בֵּיתוֹ.
  issues:
  - severity: high
    issue: לַגְּבָרִים fue traducido como «a los hombres»
    rationale: El hebreo, según la auditoría inglesa, probablemente indica subdivisión procedimental «hombre por hombre» o algo similar. «A los hombres» cambia la relación sintáctica y puede sugerir dirección hacia unos hombres, no presentación individual por varones.
  - severity: medium
    issue: La nota [a] está anclada en «su casa» en lugar de la frase procedimental
    rationale: La nota inglesa explica la tersedad de לַגְּבָרִים y la posible presentación por subdivisiones masculinas. En español, esa explicación debe ir anclada donde aparece «hombre por hombre» u otra solución equivalente, no sobre «su casa».
  - severity: medium
    issue: «Su casa» resulta poco natural y potencialmente equívoco para בֵּיתוֹ en este contexto
    rationale: Aunque בֵּיתוֹ puede ser literalmente «su casa», en español bíblico actual aquí se entiende mejor como grupo doméstico. «Su familia» comunica mejor el referente social que está siendo presentado para el sorteo.
  - severity: low
    issue: El nombre «Acan» podría considerarse menos reconocible que «Acán»
    rationale: No es un error de fidelidad, pero en español eclesial la forma acentuada «Acán» suele ser más reconocible. No es necesario adjudicarlo si el proyecto ya normaliza «Acan».
  revised_spanish_text: Entonces hizo acercarse a su familia, hombre por hombre[a], y Acan, hijo de Carmi, hijo de Zabdi, hijo de Zera, de la tribu de Judá, fue tomado.
  revised_footnotes:
