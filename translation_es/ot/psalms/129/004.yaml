lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'El hebreo presenta el Tetragrámaton directamente. Siguiendo la decisión auditada del POB en inglés, se conserva el nombre divino como nombre propio en español: «Yahvé», en lugar de sustituirlo por un título como «el SEÑOR». «Jehová» queda como variante tradicional, pero no es la opción principal del POB.'
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo en su conducta
  lexicon: HALOT
  rationale: Aquí el adjetivo predica el carácter moral de Yahvé. En español, «justo» comunica de manera natural tanto la rectitud moral como la justicia activa; «recto» es posible, pero suena menos idiomático en esta afirmación sobre Dios.
- source_word: קִצֵּץ
  english_pob_choice: has cut
  chosen_spanish: ha cortado
  alternatives_spanish:
  - ha cortado de raíz
  - ha cercenado
  - ha seccionado
  lexicon: HALOT
  rationale: El verbo expresa cortar o desgarrar de manera decisiva. «Ha cortado» mantiene el valor perfecto y suena natural en español. «Ha cercenado» intensifica el matiz, pero puede resultar más marcado de lo que exige el hebreo.
- source_word: עֲבוֹת
  english_pob_choice: cords
  chosen_spanish: cuerdas
  alternatives_spanish:
  - cuerdas gruesas
  - lazos
  - sogas
  lexicon: HALOT
  rationale: El sustantivo puede referirse a cuerdas o sogas gruesas. El POB en inglés eligió «cords», y en español «cuerdas» reproduce bien la imagen y la concisión poética. Se evita una ampliación como «cuerdas gruesas» porque el contexto ya deja clara la metáfora de atadura.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  - los injustos
  lexicon: HALOT
  rationale: El plural sustantivado designa a personas impías o culpables. «Los impíos» es un equivalente bíblico claro y fiel, y conserva el matiz moral-religioso mejor que alternativas más generales como «los malvados».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La línea doctrinal del POB preserva el nombre del pacto en lugar de sustituirlo por un título. En español, «Yahvé» es la forma directa correspondiente al «Yahweh» del texto auditado y mantiene la misma decisión teológica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor predicativo de צַדִּיק aplicado a Yahvé
  english_pob_reading: Yahweh is righteous
  chosen_spanish_reading: Yahvé es justo
  alternative_spanish_readings:
  - Yahvé es recto
  - Yahvé es justo en todo
  rationale: El hebreo afirma una cualidad del carácter de Yahvé, no solo una declaración jurídica. «Es justo» conserva la fuerza predicativa y permite que la declaración fluya naturalmente en español sin diluir el énfasis moral del verso.
  doctrine_reference: HALOT / uso poético del atributo divino en Salmos
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y no requiere cambios de revisión; la elección española sigue de cerca el texto hebreo y la decisión inglesa documentada, con la única adaptación normal de 'Yahweh' a 'Yahvé' en español.
  spanish_consistency_notes:
  - Se conserva el nombre divino como «Yahvé», coherente con el estándar del proyecto para יְהוָה.
  - 'Se mantiene el orden breve y poético del hebreo: predicación divina + acción completa.'
  - «Los impíos» reproduce el plural sustantivado sin añadir elementos inexistentes en el texto fuente.
  - El pie de nota vinculado a «cuerdas» preserva la alternativa léxica documentada por el POB en inglés.
