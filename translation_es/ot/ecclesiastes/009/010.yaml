review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: la cláusula relativa amplia («Todo lo que...»), el modismo con «tu mano», el imperativo «hazlo», la razón introducida por כִּי y la serie de capacidades ausentes en Seol. También preserva correctamente שְׁאוֹל como término transliterado con nota explicativa. Sin embargo, hay ajustes menores de fidelidad/estilo: «con todo tu poder» suena menos natural y más abstracto que el sentido exhortativo de בְּכֹחֲךָ; «planeación» es posible pero menos natural y menos ampliamente eclesial que «planificación»; y «adonde tú vas» introduce un «tú» enfático innecesario y una clausura menos fluida que «adonde vas».'
  spanish_quality_summary: El español es claro y comprensible, pero puede mejorarse en naturalidad y registro bíblico contemporáneo. «Con todas tus fuerzas» suena más idiomático que «con todo tu poder» en este contexto de esfuerzo humano. «Planificación» es más natural panhispánicamente que «planeación». La frase final fluye mejor como «adonde vas» sin el pronombre explícito.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Seol» mantiene la decisión teológica auditada; no hay conflictos con Yahvé/Mesías u otros términos clave. La excepción relevante es estilística-lexical: para בְּכֹחֲךָ conviene una formulación española más idiomática («con todas tus fuerzas») que preserve la intensidad práctica sin sonar abstracta.'
  issues:
  - severity: medium
    issue: «con todo tu poder» para בְּכֹחֲךָ
    rationale: Aunque transmite intensidad, «poder» en español puede sonar abstracto o asociado a autoridad/capacidad general, no al esfuerzo personal concreto. En este contexto sapiencial exhortativo, «con todas tus fuerzas» o «con toda tu fuerza» comunica mejor la energía disponible del oyente.
  - severity: low
    issue: «planeación»
    rationale: Es correcto en algunos países, pero menos natural y menos ampliamente aceptado en registro bíblico general que «planificación». Dado que el inglés auditado usa «planning», «planificación» conserva bien el sentido.
  - severity: low
    issue: «adonde tú vas»
    rationale: El pronombre explícito añade énfasis no marcado en el hebreo y hace la frase más pesada. «Adonde vas» o «adonde te diriges» es más natural y fiel al tono.
  revised_spanish_text: Todo lo que tu mano halle para hacer, hazlo con todas tus fuerzas, porque no hay obra ni planificación ni conocimiento ni sabiduría en el Seol[a], adonde vas.
  revised_footnotes:
  - marker: a
    text: O «la tumba» o «el reino de los muertos». El término hebreo «Seol» se refiere al lugar o estado de los muertos en el Antiguo Testamento.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para mejorar fidelidad idiomática y legibilidad en español sin alterar el sentido auditado: «con todas tus fuerzas» expresa mejor בְּכֹחֲךָ en contexto exhortativo; «planificación» es más natural que «planeación» para un público panhispánico; «adonde vas» elimina un énfasis innecesario. También se movió la marca de nota al término «Seol», que es el elemento explicado por la nota.'
