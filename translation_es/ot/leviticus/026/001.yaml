revisions:
- from: No se harán para ustedes ídolos[a], ni se levantarán para ustedes imagen tallada o piedra erguida; tampoco pondrán en su tierra piedra figurada[b], para postrarse ante ella, porque yo soy Yahvé, su Dios.
  to: No harán para ustedes ídolos, ni levantarán para ustedes imagen tallada o piedra erguida; tampoco pondrán en su tierra piedra figurada[a], para postrarse ante ella, porque yo soy Yahvé, su Dios.
  rationale: Se ajustan los verbos a formas activas directas de segunda persona plural para reflejar mejor el hebreo legal prohibitivo y sonar más natural en español. Se elimina la nota en «ídolos» porque las alternativas no añaden valor suficiente aquí y la nota original tenía un error ortográfico; se conserva la nota necesaria sobre אֶבֶן מַשְׂכִּית, alineada con la evidencia inglesa auditada.
