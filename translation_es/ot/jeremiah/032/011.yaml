translation:
  language: es
  text: Entonces tomé el documento de compra[a], la copia sellada, con las estipulaciones y condiciones, y la copia abierta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la escritura de compra». El hebreo usa un término general para un documento escrito en un contexto legal de transferencia de propiedad.
    reason: lexical_alternative
  - marker: b
    text: Es decir, la copia no sellada o accesible públicamente, en contraste con la copia sellada.
    reason: cultural_note
lexical_decisions:
- source_word: וָאֶקַּח
  english_pob_choice: Then I took
  chosen_spanish: Entonces tomé
  alternatives_spanish:
  - Y tomé
  - Así que tomé
  lexicon: WLC/HALOT
  rationale: La forma consecutiva marca avance narrativo; «Entonces» conserva la secuencia y suena natural en español sin perder el enlace con el contexto anterior.
- source_word: סֵפֶר הַמִּקְנָה
  english_pob_choice: the deed of purchase
  chosen_spanish: el documento de compra
  alternatives_spanish:
  - el acta de compra
  - la escritura de compra
  - el título de compra
  lexicon: HALOT
  rationale: סֵפֶר es un documento escrito, y מִקְנָה se refiere a una adquisición/compraventa. «Documento de compra» comunica el sentido legal sin forzar un tecnicismo poco idiomático.
- source_word: הֶחָתוּם
  english_pob_choice: the sealed copy
  chosen_spanish: el ejemplar sellado
  alternatives_spanish:
  - la copia sellada
  - el documento sellado
  - el ejemplar con sello
  lexicon: HALOT
  rationale: El participio pasivo indica algo sellado. «Ejemplar» preserva la idea de una copia del documento, en contraste con «el ejemplar abierto».
- source_word: הַמִּצְוָה
  english_pob_choice: the terms
  chosen_spanish: las cláusulas
  alternatives_spanish:
  - las estipulaciones
  - las condiciones
  - las disposiciones
  lexicon: HALOT
  rationale: En este contexto jurídico, מִצְוָה no se entiende primariamente como «mandamiento» religioso sino como estipulación del documento. «Cláusulas» transmite fuerza contractual y mantiene la tensión léxica del original.
- source_word: וְהַחֻקִּים
  english_pob_choice: and conditions
  chosen_spanish: y
  alternatives_spanish:
  - y las condiciones
  - y las disposiciones
  - y las reglas
  lexicon: HALOT
  rationale: Como el inglés POB resuelve el par «terms and conditions» de forma unificada y el hebreo coordina dos sustantivos jurídicos cercanos, el español los integra de manera natural en «con las cláusulas»; no se duplica innecesariamente la idea para evitar pesadez y conservar claridad.
- source_word: הַגָּלוּי
  english_pob_choice: the open copy
  chosen_spanish: el ejemplar abierto
  alternatives_spanish:
  - la copia abierta
  - el documento abierto
  - el ejemplar no sellado
  lexicon: HALOT
  rationale: גָּלוּי contrasta con lo sellado y significa abierto/desvelado. «Ejemplar abierto» mantiene el contraste documental y evita introducir una explicación interpretativa excesiva en el texto principal.
theological_decisions:
- issue: Valor jurídico de מִצְוָה y חֻקִּים en un contrato de compraventa
  english_pob_reading: the terms and conditions
  chosen_spanish_reading: las cláusulas
  alternative_spanish_readings:
  - las estipulaciones
  - las condiciones
  - las disposiciones
  rationale: No se trata de una exhortación moral sino de vocabulario legal del documento. El español principal evita «mandamiento» y «estatutos» en el cuerpo del texto para no trasladar automáticamente el campo religioso donde el contexto es notarial/contractual.
  doctrine_reference: Lectura contextual del derecho del antiguo Cercano Oriente; sin implicación doctrinal directa.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audio trail inglés, pero ajusta la terminología al español jurídico-natural. Mantiene la estructura de dos ejemplares del documento: uno sellado y otro abierto, sin borrar la relación appositiva aclarada en la revisión inglesa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evita «Cristo» y toda terminología cristológica, no pertinente aquí.
  - «Documento» y «ejemplar» se mantienen coherentes con un contexto legal-documental.
  - «Abierto» conserva el contraste con «sellado» sin introducir interpretación adicional.
