translation:
  language: es
  text: Las bendiciones de tu padre han sobrepasado las bendiciones de mis padres, hasta los límites de los antiguos collados[a]. Que estén sobre la cabeza de José[b], y sobre la coronilla del que fue apartado de entre sus hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los collados eternos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el príncipe entre sus hermanos»; hebreo: «el consagrado/apartado de entre sus hermanos».'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּרְכֹת
  english_pob_choice: blessings
  chosen_spanish: bendiciones
  alternatives_spanish:
  - bendición
  lexicon: HALOT
  rationale: El plural hebreo se conserva mejor con el plural español, porque la frase acumula dones y favor en paralelo poético.
- source_word: אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - mi padre
  lexicon: HALOT
  rationale: Sigo la lectura auditada del texto inglés y el contexto de la bendición dirigida a José, donde el sufijo de segunda persona es el mejor ajuste textual.
- source_word: גָּבְרוּ עַל
  english_pob_choice: have prevailed beyond
  chosen_spanish: han prevalecido por encima de
  alternatives_spanish:
  - son mayores que
  - han sobrepasado a
  lexicon: HALOT
  rationale: La idea de exceder en fuerza o alcance se expresa con naturalidad en español con 'han prevalecido por encima de', sin perder el matiz comparativo.
- source_word: הוֹרַי
  english_pob_choice: my parents
  chosen_spanish: mis padres
  alternatives_spanish:
  - mis progenitores
  - mis antepasados
  lexicon: HALOT
  rationale: La referencia plural se entiende de modo directo como los padres de Jacob; 'mis padres' evita una paráfrasis más amplia de lo que exige el texto.
- source_word: תַּאֲוַת גִּבְעֹת עוֹלָם
  english_pob_choice: the utmost bounds of the ancient hills
  chosen_spanish: el límite de los antiguos collados
  alternatives_spanish:
  - los confines de los collados eternos
  - los límites de los collados antiguos
  lexicon: HALOT
  rationale: La expresión hebrea es difícil; en español, 'límite' comunica la idea de extensión extrema, y 'antiguos collados' mantiene el valor de antigüedad/primordialidad sin resolver indebidamente la imagen.
- source_word: תִּהְיֶיןָ
  english_pob_choice: May they be
  chosen_spanish: Que estén
  alternatives_spanish:
  - Sean
  - Que sean
  lexicon: HALOT
  rationale: En contexto de bendición, el imperfecto funciona como deseo o pronunciamiento; 'Que estén' suena natural y conserva el valor volitivo.
- source_word: לְרֹאשׁ
  english_pob_choice: on the head of
  chosen_spanish: sobre la cabeza de
  alternatives_spanish:
  - en la cabeza de
  - sobre el cabeza de
  lexicon: HALOT
  rationale: La preposición hebrea con 'cabeza' se expresa de forma idiomática en español con 'sobre la cabeza de', manteniendo la imagen de la bendición reposando sobre la persona.
- source_word: קָדְקֹד
  english_pob_choice: the crown of the head
  chosen_spanish: la coronilla
  alternatives_spanish:
  - la cima de la cabeza
  - la parte superior de la cabeza
  lexicon: HALOT
  rationale: '''Coronilla'' es una opción natural, digna y precisa para la parte superior de la cabeza, y preserva el paralelismo poético.'
- source_word: נְזִיר אֶחָיו
  english_pob_choice: the one set apart from his brothers
  chosen_spanish: el que está apartado de sus hermanos
  alternatives_spanish:
  - el consagrado entre sus hermanos
  - el príncipe entre sus hermanos
  - el nazareo entre sus hermanos
  lexicon: HALOT
  rationale: Mantengo la tensión lexical de נְזִיר como alguien separado o consagrado, sin importar la institución posterior del nazareato ni imponer de entrada el título político de 'príncipe'.
theological_decisions:
- issue: Sentido de נְזִיר אֶחָיו
  english_pob_reading: the one set apart from his brothers
  chosen_spanish_reading: el que está apartado de sus hermanos
  alternative_spanish_readings:
  - el príncipe entre sus hermanos
  - el consagrado entre sus hermanos
  - el nazareo entre sus hermanos
  rationale: 'La frase debe conservar la ambigüedad productiva del hebreo: puede señalar distinción, consagración o primacía. ''Apartado'' preserva esa tensión sin resolverla de manera demasiado técnica o institucional.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
- issue: Valor de la bendición final sobre José
  english_pob_reading: May they be on the head of Joseph, and on the crown of the head of the one set apart from his brothers.
  chosen_spanish_reading: Que estén sobre la cabeza de José, y sobre la coronilla del que está apartado de sus hermanos.
  alternative_spanish_readings:
  - Sean sobre la cabeza de José
  - Caigan sobre la cabeza de José
  rationale: La formulación en subjuntivo exhortativo refleja el acto performativo de bendición. Se evita una lectura meramente descriptiva, porque el hebreo funciona como pronunciación eficaz de favor.
  doctrine_reference: Translation philosophy §2, Blessings as speech-act
- issue: Imagen de los collados antiguos/eternos
  english_pob_reading: the ancient hills
  chosen_spanish_reading: los antiguos collados
  alternative_spanish_readings:
  - los collados eternos
  - los collados de antaño
  rationale: '''Antiguos'' mantiene la antigüedad primordial sin forzar una interpretación exclusivamente metafísica de ''eternos''. La ambigüedad poética se conserva y sigue siendo comprensible en español.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto español sigue de cerca el estado auditado de alta concordancia, manteniendo las alternativas notables preservadas en la tradición de notas de la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene 'bendiciones' en plural para reflejar el hebreo constructo plural.
  - Se usa 'Yahvé' como norma general del proyecto solo cuando el texto lo exige; en este versículo no aparece el nombre divino.
  - '''Apartado'' conserva la tensión entre separación, consagración y posible función honorífica sin imponer un tecnicismo posterior.'
  - '''Coronilla'' evita arcaísmos fuertes y conserva la imagen corporal del paralelo hebreo.'
