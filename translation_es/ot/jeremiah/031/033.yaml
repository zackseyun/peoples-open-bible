base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/031/033.yaml
  text: 'For this is the covenant that I will make with the house of Israel after those days[a], declares Yahweh: I will put my law within them, and I will write it on their hearts. And I will be their God[c][b], and they shall be my people.'
  footnotes:
  - marker: a
    text: Or 'my instruction.' The Hebrew torah can mean 'law' or 'instruction'; here 'law' is used to preserve the covenantal sense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'I will cut' a covenant.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew verb translated 'I will put' is formally perfect ('I have put'), but in this prophetic context it is understood with future force alongside the surrounding promises.
    reason: lexical_alternative
