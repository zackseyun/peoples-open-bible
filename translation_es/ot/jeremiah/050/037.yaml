    text: 'O: «todos los mercenarios extranjeros» o «toda la multitud mezclada». El hebreo probablemente se refiere a una población mixta o a fuerzas auxiliares dentro de Babilonia.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y se convertirán en mujeres», un modismo antiguo para volverse temerosos o perder el valor en la batalla.'
    reason: cultural_note
  revision_rationale: Se corrigen los anclajes de las notas para que coincidan con las frases que realmente explican en el original y en el audit trail inglés. Además, se cambia 'tesoros' por 'tesorerías' para reflejar mejor אוֹצְרֹתֶיהָ como depósitos o reservas de riqueza, manteniendo un español natural y eclesialmente legible.
