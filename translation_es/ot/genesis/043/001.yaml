translation:
  language: es
  text: Y la hambruna era severa en el país[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «Y el hambre era pesada en la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָרָעָב
  english_pob_choice: Now the famine
  chosen_spanish: Y el hambre
  alternatives_spanish:
  - Y la hambruna
  - Entonces el hambre
  lexicon: HALOT
  rationale: רָעָב denota ‘hambre’ o ‘famine’. En español, ‘hambre’ conserva la idea básica del término hebreo y evita introducir una carga mayor de ‘hambruna’ que no es necesaria aquí. El וְ inicial se refleja con ‘Y’ para mantener la continuación narrativa sin añadir un matiz temporal explícito que el hebreo no obliga.
- source_word: כָּבֵד
  english_pob_choice: was severe
  chosen_spanish: era severa
  alternatives_spanish:
  - era pesada
  - era grave
  lexicon: HALOT
  rationale: כָּבֵד significa literalmente ‘pesado’, pero con ‘hambre’ expresa intensidad. ‘Era severa’ comunica esa fuerza idiomática en español moderno y mantiene la equivalencia funcional con la decisión inglesa de ‘was severe’.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  lexicon: HALOT
  rationale: אֶרֶץ puede significar ‘tierra’ o ‘país/territorio’ según contexto. Dado el hebreo y el campo semántico amplio del término, ‘en la tierra’ conserva la formulación general del original sin estrechar innecesariamente el referente.
translation_notes:
  revision_awareness: El texto inglés auditado ya fue aprobado sin cambios en la última revisión; esta versión española sigue de cerca la estructura y las decisiones léxicas confirmadas, sin introducir variantes no sustentadas.
  spanish_consistency_notes:
  - Se preserva la continuidad narrativa del וְ con ‘Y’, en lugar de expandirlo a ‘Ahora’, porque el español lo permite de manera natural en una cláusula breve.
  - ‘Tierra’ mantiene la amplitud de אֶרֶץ; se evita ‘país’ para no limitar el alcance geográfico del hebreo.
  - La nota al pie conserva la alternativa literal ‘pesada’, alineada con el valor léxico documentado de כָּבֵד.
