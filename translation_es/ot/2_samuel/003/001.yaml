    text: Or 'was long.' The Hebrew adjective is literally 'long,' here referring to the duration of the war.
    reason: lexical_alternative
  - marker: b
    text: '''House'' can mean a household, family line, or ruling dynasty; the Hebrew likely carries both familial and political force here.'
    reason: lexical_alternative
