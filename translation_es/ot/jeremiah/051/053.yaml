revisions:
- from: Aunque Babilonia se eleve[a] hasta los cielos, y aunque fortifique la altura de su poder[b], de mí vendrán destruidores contra ella, declara Yahvé.
  to: Aunque Babilonia se eleve hasta los cielos[a], y aunque fortifique la altura de su fuerza[b], vendrán a ella destructores de parte mía[c], declara Yahvé.
