  source_alignment_summary: 'El borrador refleja bien el griego: καὶ ἀνέστησαν se traduce naturalmente como «se levantaron» y οὐκ εἶδον αὐτόν se conserva con sobriedad como «no lo vieron», manteniendo la perspectiva observacional sin explicitar la desaparición. La nota también preserva la alternativa contextual documentada en el POB inglés.'
