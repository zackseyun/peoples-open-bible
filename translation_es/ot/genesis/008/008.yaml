translation:
  language: es
  text: Entonces envió a la paloma de él para ver si las aguas habían disminuido[a] de la superficie del suelo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habían menguado». El verbo hebreo indica que las aguas del diluvio se habían reducido.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de sobre la faz del suelo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלַּח
  english_pob_choice: Then he sent out
  chosen_spanish: Entonces envió
  alternatives_spanish:
  - Y envió
  - Así que envió
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; en español, «Entonces» conserva la secuencia. «Envió» comunica el acto de mandar/soltar sin añadir información no presente en el hebreo.
- source_word: הַיּוֹנָה
  english_pob_choice: the dove
  chosen_spanish: la paloma
  alternatives_spanish:
  - la dove
  - la paloma mensajera
  lexicon: HALOT
  rationale: En español bíblico natural, «paloma» es el equivalente idiomático y claro para יוֹנָה en este contexto narrativo. «Dove» no es español y «paloma mensajera» añade una precisión no explicitada por el texto.
- source_word: מֵאִתּוֹ
  english_pob_choice: from him
  chosen_spanish: desde él
  alternatives_spanish:
  - de su lado
  - de él
  lexicon: HALOT
  rationale: La preposición con sufijo indica alejamiento de la persona/presencia de Noé. «Desde él» preserva la referencia concreta del hebreo; «de su lado» interpreta más libremente y «de él» puede sonar menos preciso en español.
- source_word: לִרְאוֹת
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para observar
  - para saber
  lexicon: HALOT
  rationale: El infinitivo de finalidad se traduce de forma directa y natural con «para ver». Mantiene la literalidad funcional del propósito sin volverlo explicativo.
- source_word: הֲקַלּוּ
  english_pob_choice: had subsided
  chosen_spanish: habían disminuido
  alternatives_spanish:
  - habían menguado
  - habían cedido
  - se habían aligerado
  lexicon: HALOT
  rationale: El valor del verbo aquí es que las aguas se habían reducido o aliviado. «Habían disminuido» es claro y fiel; «menguado» es posible, pero menos corriente; «se habían aligerado» suena menos natural para aguas en español.
- source_word: הַמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El plural hebreo se conserva en español bíblico como «las aguas», que además refleja el sentido colectivo de la inundación.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  english_pob_choice: from the surface of the ground
  chosen_spanish: de sobre la superficie de la tierra
  alternatives_spanish:
  - de sobre el rostro de la tierra
  - de sobre la superficie del suelo
  - de sobre la faz de la tierra
  lexicon: HALOT
  rationale: El hebreo expresa literalmente «de sobre la faz/superficie de la tierra/suelo». «Superficie de la tierra» comunica el espacio sin oscurecer el idiomatismo; «de sobre» conserva el movimiento de retiro del agua. Se mantiene «tierra» por la amplitud del contexto narrativo, aunque אֲדָמָה puede referir el suelo/terreno.
translation_notes:
  revision_awareness: Se corrigió el anclaje de las notas para que los marcadores [a] y [b] aparezcan exactamente en el texto español, cumpliendo la validación solicitada. Se mantuvo el sentido de la versión inglesa auditada, pero con español natural y fiel al hebreo.
  spanish_consistency_notes:
  - Se preservó el plural bíblico «las aguas» para הַמַּיִם.
  - Se evitó «SEÑOR» u otra sustitución teológica no presente en este versículo.
  - «Desde él» traduce de manera transparente מֵאִתּוֹ sin introducir «arca» que no está en el hebreo de este segmento.
  - La nota [b] se ancla en la frase completa para reflejar el giro idiomático hebreo.
