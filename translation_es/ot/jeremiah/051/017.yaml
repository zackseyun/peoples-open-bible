translation:
  language: es
  text: Todo hombre se embrutece, sin conocimiento; todo fundidor es avergonzado por su ídolo, porque su imagen fundida es falsedad, y no hay aliento[a] en ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «no hay espíritu en ellos». El hebreo רוּחַ puede significar «aliento», «viento» o «espíritu»; aquí se prefiere «aliento» porque la idea es que los ídolos están sin vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְעַר
  english_pob_choice: is made brutish
  chosen_spanish: es hecho necio
  alternatives_spanish:
  - es hecho brutal
  - se vuelve brutusco
  - se vuelve necio
  lexicon: HALOT
  rationale: El hebreo expresa una condición causada o asumida, no solo una cualidad estática. «Es hecho necio» conserva esa fuerza pasiva/causativa en un español natural; «brutal» o «brutusco» sonarían menos precisos o poco idiomáticos.
- source_word: כָּל אָדָם
  english_pob_choice: Every man
  chosen_spanish: Todo hombre
  alternatives_spanish:
  - Toda la humanidad
  - Todos
  - Cada ser humano
  lexicon: HALOT
  rationale: Se preserva el valor distributivo y la forma masculina singular representativa del hebreo. «Todo hombre» mantiene el paralelismo con el texto fuente y su alcance genérico.
- source_word: מִדַּעַת
  english_pob_choice: without knowledge
  chosen_spanish: sin conocimiento
  alternatives_spanish:
  - por falta de conocimiento
  - privado de conocimiento
  - sin saber
  lexicon: HALOT
  rationale: La preposición con valor privativo se expresa de modo directo en español con «sin». «Sin conocimiento» conserva la brevedad y el contraste del hebreo.
- source_word: הֹבִישׁ
  english_pob_choice: is put to shame
  chosen_spanish: es avergonzado
  alternatives_spanish:
  - queda avergonzado
  - es puesto en vergüenza
  - es humillado
  lexicon: HALOT
  rationale: 'El hiphil tiene matiz causativo: alguien es traído a vergüenza. «Es avergonzado» mantiene la pasiva y la fuerza causal sin sobreexplicar.'
- source_word: צֹרֵף
  english_pob_choice: metalworker
  chosen_spanish: metalúrgico
  alternatives_spanish:
  - orfebre
  - fundidor
  - herrero
  lexicon: HALOT
  rationale: El contexto de fabricación de ídolos pide un término amplio para quien trabaja el metal. «Metalúrgico» funciona bien en español actual; «orfebre» restringiría demasiado el oficio.
- source_word: מִפָּסֶל
  english_pob_choice: by his idol
  chosen_spanish: por su ídolo
  alternatives_spanish:
  - a causa de su ídolo
  - ante su ídolo
  - por su imagen tallada
  lexicon: HALOT
  rationale: La preposición marca aquí la causa del bochorno. «Por su ídolo» es conciso y natural; la referencia al objeto idolátrico queda clara por el contexto inmediato.
- source_word: שֶׁקֶר
  english_pob_choice: falsehood
  chosen_spanish: falsedad
  alternatives_spanish:
  - mentira
  - engaño
  - falso
  lexicon: HALOT
  rationale: El sustantivo denuncia la irrealidad y falsedad del ídolo. «Falsedad» reproduce bien el tono profético y la cualidad absoluta del juicio.
- source_word: נִסְכּוֹ
  english_pob_choice: his cast image
  chosen_spanish: su imagen fundida
  alternatives_spanish:
  - su imagen de fundición
  - su imagen vaciada
  - su imagen moldeada
  lexicon: HALOT
  rationale: La forma apunta a una imagen hecha por fundición o vaciado. «Imagen fundida» conserva la relación material y evita precisar más de lo que el hebreo exige.
- source_word: וְלֹא רוּחַ בָּם
  english_pob_choice: there is no breath in them
  chosen_spanish: y no hay aliento en ellos
  alternatives_spanish:
  - y no hay espíritu en ellos
  - y no tienen vida
  - y no hay soplo en ellos
  lexicon: HALOT
  rationale: En la polémica contra los ídolos, רוּחַ puede entenderse como ausencia de vida. «Aliento» comunica bien esa carencia vital en español; se preserva la alternativa «espíritu» por la amplitud semántica del término hebreo.
theological_decisions:
- issue: Alcance genérico de אָדָם
  english_pob_reading: Every man
  chosen_spanish_reading: Todo hombre
  alternative_spanish_readings:
  - Toda la humanidad
  - Todos
  rationale: Se conserva la forma masculina singular con fuerza representativa, como en el hebreo, sin perder el sentido genérico universal del dicho.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4; Contested terms table for אָדָם
- issue: Sentido de רוּחַ en la crítica a los ídolos
  english_pob_reading: there is no breath in them
  chosen_spanish_reading: no hay aliento en ellos
  alternative_spanish_readings:
  - no hay espíritu en ellos
  rationale: El contexto afirma la inanidad y falta de vida de los ídolos; «aliento» hace explícita esa carencia vital sin borrar la amplitud semántica de רוּחַ.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio; esta redacción sigue de cerca el sentido hebreo y mantiene la decisión auditada de traducir רוּחַ como «aliento» en el marco de la polémica contra los ídolos.
  spanish_consistency_notes:
  - Se mantuvo Yahvé como forma estándar en el proyecto cuando corresponde; este versículo no contiene el nombre divino.
  - Se conservó el paralelismo semántico de dos miembros con juicio sobre la humanidad y sobre el artesano/idólatra.
  - «Imagen fundida» se eligió para distinguir נִסְכּוֹ de פָּסֶל sin sobretraducir el término.
  - No se neutralizó «Todo hombre» para respetar la forma distributiva masculina del hebreo y la política del proyecto.
