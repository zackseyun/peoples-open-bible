review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: petición de restauración del gozo de la salvación de Dios y segunda petición para que un espíritu dispuesto sostenga al salmista. Conserva adecuadamente la ambigüedad de רוּחַ como ''espíritu'' y de נְדִיבָה como disposición voluntaria, con alternativas léxicas útiles. Sin embargo, la forma principal ''Restáurame el gozo...'' desplaza ligeramente la sintaxis: el hebreo pide ''devuélveme/restaura para mí el gozo'', no ''restáurame a mí''.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero la frase inicial suena menos fiel y algo menos natural para este contexto que ''Devuélveme'' o ''Restáurame ... a mí''. Además, las notas a y b no reproducen bien los equivalentes ingleses: la nota a debería repetir el sustantivo base (''un espíritu generoso/noble''), y la nota b actualmente incluye la lectura principal ''sostenga'' como alternativa, cuando la alternativa documentada es ''me apoye'' o ''me sostenga'' según la elección principal.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. ''Salvación'', ''espíritu'' y ''gozo'' están bien alineados. La decisión principal a ajustar es sintáctico-lexical: para הָשִׁיבָה לִּי conviene ''Devuélveme'' en lugar de ''Restáurame''.'
  issues:
  - severity: medium
    issue: La traducción principal 'Restáurame el gozo de tu salvación' atribuye el verbo directamente al hablante en vez de al gozo.
    rationale: הָשִׁיבָה לִּי שְׂשׂוֹן יִשְׁעֶךָ significa 'haz volver/devuélveme el gozo de tu salvación'. En español, 'Restáurame el gozo' puede entenderse como 'restáurame a mí por medio del gozo', lo cual altera levemente la relación sintáctica.
  - severity: medium
    issue: La nota a está incompleta y puede resultar ambigua.
    rationale: El inglés preserva alternativas para 'willing' dentro de la frase completa. En español, solo 'generoso' o 'noble' sin repetir 'espíritu' deja el lector reconstruyendo el referente.
  - severity: low
    issue: La nota b no presenta correctamente la alternativa léxica.
    rationale: Si el texto principal usa 'me sostenga', la alternativa debe ser 'me apoye' o 'me sustente/uphold me'; no conviene listar la lectura principal como si también fuera alternativa.
  revised_spanish_text: Devuélveme el gozo de tu salvación[c], y que un espíritu dispuesto[a] me sostenga[b].
