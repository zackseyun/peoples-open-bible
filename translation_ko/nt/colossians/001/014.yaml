  text: in whom we have redemption, the forgiveness of sins.
translation:
  language: ko
  text: 우리는 그분 안에서 속량[a], 곧 죄들의 사함을 받았습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「대속」, 「구속」. 헬라어 ἀπολύτρωσις는 값을 치르고 풀어 줌의 의미를 담는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: in whom
  chosen_korean: 그분 안에서
  alternatives_korean:
  - 그분께
  - 그분으로 말미암아
  lexicon: BDAG
  rationale: 남성 단수 관계대명사로 앞 절의 「아들」을 가리킨다. 「그분 안에서」로 인격적·연합적 의미를 보존한다.
- source_word: ἔχομεν
  english_pob_choice: we have
  chosen_korean: 받았습니다
  alternatives_korean:
  - 가집니다
  - 누리고 있습니다
  lexicon: BDAG
  rationale: 현재 능동 직설법이나, 한국어에서 「속량을 받았다」가 자연스럽다. 현재의 소유적 상태를 합쇼체 종결로 표현한다.
- source_word: ἀπολύτρωσιν
  english_pob_choice: redemption
  chosen_korean: 속량
  alternatives_korean:
  - 구속
  - 구원
  - 대속
  lexicon: BDAG
  rationale: 「속량」은 값을 치르고 풀려나게 함의 의미를 담은 한국 교회의 정립된 표현이다.
- source_word: ἄφεσιν
  english_pob_choice: forgiveness
  chosen_korean: 사함
  alternatives_korean:
  - 용서
  - 풀어 줌
  lexicon: BDAG
  rationale: ἀπολύτρωσις와 동격으로 「죄의 사함」을 가리킨다. 「사함」은 한국 교회의 정립된 표현으로 신학적 무게를 담는다.
- source_word: τῶν ἁμαρτιῶν
  english_pob_choice: of sins
  chosen_korean: 죄들의
  alternatives_korean:
  - 죄의
  lexicon: BDAG
  rationale: 복수형을 보존하기 위해 「죄들의」로 옮긴다. 한국어 자연성을 위해 「죄」도 가능하나 원어 복수형의 무게를 살린다.
