base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/039/014.yaml
  text: And they will set apart men continually[a], who will pass through the land burying those who pass through, those left on the surface of the land, to cleanse it[c][b]. At the end of seven months they will make a search.
  footnotes:
  - marker: a
    text: Or 'men regularly appointed'; the Hebrew literally has 'men of continuality,' indicating an ongoing assignment.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew repeats the verb 'pass through' ('burying those who passed through'). In context this likely refers to the dead left lying in the land, but the wording is difficult and may intentionally echo the searchers' passing through the land.
    reason: lexical_alternative
  - marker: c
    text: Or 'they will search thoroughly' or 'they will investigate.'
    reason: lexical_alternative
