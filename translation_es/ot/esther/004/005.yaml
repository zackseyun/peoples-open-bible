revisions:
- from: Entonces Ester llamó a Hatac[a], uno de los eunucos del rey, a quien él había puesto para atenderla, y le mandó acerca de Mardoqueo, para saber qué era esto y por qué era esto.
  to: Entonces Ester llamó a Hatac[a], uno de los eunucos del rey, a quien él había asignado para atenderla, y le encargó que fuera a ver a Mardoqueo, para saber qué era esto y por qué sucedía esto.
  rationale: 'Se hicieron ajustes de estilo para lograr un español más natural sin apartarse del sentido del hebreo ni de la auditoría inglesa: se reemplazó «le mandó acerca de Mardoqueo» por una formulación más idiomática que expresa la comisión dada a Hatac en relación con Mardoqueo; se mejoró «había puesto» a «había asignado» para reflejar mejor una designación oficial; y se sustituyó «por qué era esto» por «por qué sucedía esto» para mantener la pregunta causal con buena legibilidad en español.'
