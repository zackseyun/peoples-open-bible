id: 1PE.5.8
reference: 1 Peter 5:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: νήψατε, γρηγορήσατε. ὁ ἀντίδικος ὑμῶν διάβολος ὡς λέων ὠρυόμενος περιπατεῖ ζητῶν τινα καταπιεῖν·
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/005/008.yaml
  text: 'Be clear-minded; stay alert. Your adversary, the devil, walks around like a roaring lion, seeking someone to devour.'
translation:
  language: ko
  text: '깨어 있으십시오, 정신을 차리고 있으십시오. 여러분의 대적 마귀가 우는 사자같이 두루 다니며 삼킬 자를 찾고 있습니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: νήψατε
  english_pob_choice: Be clear-minded
  chosen_korean: 깨어 있으십시오
  alternatives_korean:
  - 정신 차려 있으십시오
  - 술 깨어 있으십시오
  lexicon: BDAG
  rationale: 1:13·4:7의 νήφω와 통일.
- source_word: γρηγορήσατε
  english_pob_choice: stay alert
  chosen_korean: 정신을 차리고 있으십시오
  alternatives_korean:
  - 깨어 경계하십시오
  - 깨어 있으십시오
  lexicon: BDAG
  rationale: γρηγορέω는 「잠들지 않고 경계하다」. 「정신을 차리고 있다」로 옮겨 νήφω(깨어 있다)와 어휘 구별.
- source_word: ὁ ἀντίδικος ὑμῶν διάβολος
  english_pob_choice: Your adversary, the devil
  chosen_korean: 여러분의 대적 마귀
  alternatives_korean:
  - 너희의 원수 곧 마귀
  - 너희의 적수 사탄
  lexicon: BDAG
  rationale: 글로서리 정책에 따라 διάβολος는 「마귀」. ἀντίδικος는 법정적 「적수·대적」.
- source_word: λέων ὠρυόμενος
  english_pob_choice: a roaring lion
  chosen_korean: 우는 사자
  alternatives_korean:
  - 으르렁거리는 사자
  - 포효하는 사자
  lexicon: BDAG
  rationale: 한국 성서 전통의 「우는 사자」 유지.
- source_word: καταπιεῖν
  english_pob_choice: to devour
  chosen_korean: 삼킬
  alternatives_korean:
  - 삼키워 버릴
  - 집어삼킬
  lexicon: BDAG
  rationale: καταπίνω의 「완전히 삼킴」을 「삼키다」로 옮긴다.
