revisions:
- from: Y la gloria de Yahvé subió de en medio de la ciudad y se puso sobre el monte que está al oriente de la ciudad[a][b].
  to: Y la gloria de Yahvé subió de en medio de la ciudad y se detuvo sobre el monte que está al oriente de la ciudad[a][b].
  rationale: 'Se corrige la nota espacial para que coincida con la evidencia fuente y la auditoría inglesa: la lectura principal es geográfica («al oriente»), mientras que «delante» queda como alternativa posible. También se mejora «se puso» a «se detuvo» para reflejar mejor עמד en un registro bíblico claro y digno.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:31:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica del hebreo: la gloria de Yahvé sale de la ciudad y se coloca en el monte al oriente/este de ella. También preserva correctamente יְהוָה como «Yahvé». Sin embargo, la nota b invierte la relación entre texto principal y alternativa: el hebreo base se entiende mejor como «al oriente de la ciudad», mientras que «delante de la ciudad» debe quedar como alternativa posible, no al revés. Además, «se puso sobre el monte» es comprensible, pero para עמד suena algo menos fiel y menos digno que «se detuvo sobre el monte» o «se paró sobre el monte»; conviene un ajuste leve.'
  spanish_quality_summary: El español es en general claro y natural. «De en medio de la ciudad» funciona bien. El principal problema de calidad está en la nota b, que contradice el sentido prioritario del texto principal y puede confundir al lector. En el cuerpo del texto, «se puso sobre el monte» es idiomático pero algo coloquial y menos preciso para un contexto solemne; «se detuvo sobre el monte» mejora fidelidad y registro.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: «Yahvé» para יְהוָה y «gloria» para כְּבוֹד. No hay conflicto doctrinal relevante. La decisión espacial para מִקֶּדֶם debe conservar la opción principal «al oriente de la ciudad» con nota alternativa «delante de la ciudad».'
  issues:
  - severity: medium
    issue: La nota b presenta como hebreo principal «delante de la ciudad» y como posibilidad «al oriente de la ciudad».
    rationale: 'El expediente inglés hace lo contrario: la traducción principal es «east of the city» y la nota explica que el hebreo también puede entenderse como «in front of the city», según la orientación espacial. La nota española actual desalineada con la auditoría y con la decisión lexical documentada.'
  - severity: low
    issue: «Se puso sobre el monte» para וַיַּעֲמֹד es menos preciso y algo más coloquial.
    rationale: עמד significa sencillamente «estar de pie / detenerse / pararse». En esta secuencia narrativa solemne, «se detuvo sobre el monte» preserva mejor la idea de llegar y quedar allí, sin la sensación de giro idiomático coloquial.
  revised_spanish_text: Y la gloria de Yahvé subió de en medio de la ciudad y se detuvo sobre el monte que está al oriente de la ciudad[a][b].
  revised_footnotes:
  - marker: a
    text: O «ascendió» para «subió».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «que está al oriente de la ciudad»; posiblemente «que está delante de la ciudad», según la orientación espacial.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la nota espacial para que coincida con la evidencia fuente y la auditoría inglesa: la lectura principal es geográfica («al oriente»), mientras que «delante» queda como alternativa posible. También se mejora «se puso» a «se detuvo» para reflejar mejor עמד en un registro bíblico claro y digno.'
