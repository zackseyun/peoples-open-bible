review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: «En sus días», la rebelión de Edom, y la entronización de un rey propio. Sin embargo, dos puntos no preservan con suficiente fidelidad el sentido auditado: «pusieron sobre ellos un rey» suena extraño en español y no expresa con claridad que se nombraron un rey propio; además, el valor reflexivo de עֲלֵיהֶם queda mejor explicitado como «sobre sí»/«para sí».'
  spanish_quality_summary: «En sus días» y «se rebeló de debajo de la mano de Judá» son aceptables y legibles, aunque el segundo giro es marcadamente literal; la nota ayuda. El principal problema de calidad es «pusieron sobre ellos un rey», que resulta poco idiomático y ambiguo en español. «Se pusieron un rey» sería coloquial; «se nombraron un rey» o «hicieron rey sobre sí a uno» son más claros. Conviene una reparación pequeña y natural.
  glossary_alignment: No hay términos del glosario mayor en juego salvo el nombre propio «Judá», bien resuelto. La decisión de conservar la imagen «debajo de la mano» concuerda con la filosofía POB y está bien respaldada por nota. La elección de «Edom» también es correcta.
  issues:
  - severity: medium
    issue: «pusieron sobre ellos un rey» es poco natural en español
    rationale: Aunque refleja elementos léxicos del hebreo, la construcción no suena idiomática y puede dificultar la comprensión. El Hifil de מלך aquí se expresa mejor como «se nombraron un rey» o «hicieron rey ...».
  - severity: medium
    issue: El matiz reflexivo de עֲלֵיהֶם no queda bien representado
    rationale: El inglés auditado explicita «over themselves». En español, «sobre ellos» puede entenderse simplemente como objeto no reflexivo. Conviene una formulación que muestre que Edom estableció su propio rey independiente.
  revised_spanish_text: En sus días, Edom se rebeló de debajo de la mano de Judá y se nombraron un rey[a].
