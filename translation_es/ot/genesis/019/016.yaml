revisions:
- from: Pero él se demoraba[a], de modo que los hombres se aferraron de su mano, de la mano de su esposa y de las manos de sus dos hijas, por la compasión de Yahvé para con él[b]; y lo sacaron y lo pusieron fuera de la ciudad.
  to: Pero él se demoraba, de modo que los hombres[a] agarraron firmemente su mano, la mano de su esposa y las manos de sus dos hijas, por la compasión de Yahvé para con él[b]; y lo sacaron y lo pusieron fuera de la ciudad.
  rationale: 'Se corrigió el verbo principal de asimiento para reflejar mejor la fuerza y dirección de ויחזקו en español natural: ‘agarraron firmemente’ comunica que ellos sujetaron a Lot y a su familia. Se movió la nota sobre ‘los hombres’ al término correcto. También se rehízo la segunda nota para que sí preserve una observación textual real sobre la repetición hebrea de ‘mano’.'
