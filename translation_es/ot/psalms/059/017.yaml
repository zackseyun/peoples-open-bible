translation:
  language: es
  text: Pero yo cantaré de tu fuerza[a]; cantaré en voz alta de tu amor leal[b] por la mañana[c], porque has sido para mí una fortaleza y un refugio en el día de mi angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «gritaré de alegría por la mañana a causa de tu amor leal»; el verbo puede destacar un clamor gozoso además del acto de cantar.'
    reason: lexical_alternative
  - marker: b
    text: «Amor leal» traduce el hebreo hesed, término que suele abarcar amor fiel, bondadoso y de pacto.
    reason: lexical_alternative
  - marker: c
    text: 'O: «cantaré en voz alta por la mañana de tu amor leal».'
    reason: previous_rendering
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - Mas yo
  - En cuanto a mí
  lexicon: HALOT
  rationale: La forma con pronombre independiente marca contraste con los enemigos del contexto; 'Pero yo' expresa bien ese valor adversativo sin sonar forzado en español.
- source_word: אָשִׁיר
  english_pob_choice: will sing
  chosen_spanish: cantaré
  alternatives_spanish:
  - cantaré alabanzas
  - cantaré
  lexicon: HALOT
  rationale: El imperfecto cohortativo/volitivo en primera persona comunica resolución futura. 'Cantaré' es natural y mantiene el sentido básico de cantar alabanza.
- source_word: עֻזֶּךָ
  english_pob_choice: your strength
  chosen_spanish: tu poder
  alternatives_spanish:
  - tu fuerza
  - tu poderío
  - tu fortaleza
  lexicon: HALOT
  rationale: עֹז puede denotar fuerza, poder o vigor. Aquí el paralelismo con 'baluarte' favorece una idea de poder eficaz de protección; 'poder' comunica esa fuerza divina de forma clara en español.
- source_word: וַאֲרַנֵּן
  english_pob_choice: I will sing aloud
  chosen_spanish: cantaré con alegría
  alternatives_spanish:
  - gritaré de alegría
  - cantaré a voz en cuello
  - me gozaré
  lexicon: HALOT
  rationale: רנן incluye una resonancia jubilosa, vocal, más amplia que 'cantar'. En español, 'cantaré con alegría' conserva el matiz celebrativo sin volverlo áspero o poco natural.
- source_word: לַבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - al amanecer
  - por la mañana temprano
  lexicon: HALOT
  rationale: La expresión es temporal; 'por la mañana' es idiomática en español y mantiene el valor circunstancial del hebreo.
- source_word: חַסְדֶּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor leal
  alternatives_spanish:
  - tu amor constante
  - tu misericordia leal
  - tu amor fiel
  lexicon: HALOT
  rationale: חֶסֶד expresa amor leal, covenantal y sostenido. 'Amor leal' conserva la tensión entre afecto y fidelidad pactal mejor que 'misericordia' o un mero 'amor'.
- source_word: הָיִיתָ
  english_pob_choice: you have been
  chosen_spanish: has sido
  alternatives_spanish:
  - has estado
  - fuiste
  - has resultado ser
  lexicon: HALOT
  rationale: El perfecto apunta a una realidad comprobada con vigencia actual. 'Has sido' comunica esa experiencia continua mejor que un pasado simple.
- source_word: מִשְׂגָּב
  english_pob_choice: a stronghold
  chosen_spanish: un baluarte
  alternatives_spanish:
  - una fortaleza
  - un refugio alto
  - una torre fuerte
  lexicon: HALOT
  rationale: El sustantivo describe un lugar elevado y seguro, de protección firme. 'Baluarte' es una opción castellana digna que preserva la idea de defensa fuerte.
- source_word: וּמָנוֹס
  english_pob_choice: and a refuge
  chosen_spanish: y un refugio
  alternatives_spanish:
  - y un lugar de escape
  - y un asilo
  - y un amparo
  lexicon: HALOT
  rationale: מָנוֹס es un lugar al que huir para ponerse a salvo. 'Refugio' comunica bien esa función y mantiene el paralelismo con 'baluarte'.
- source_word: בְּיוֹם צַר לִי
  english_pob_choice: in the day of my distress
  chosen_spanish: en el día de mi angustia
  alternatives_spanish:
  - en el día de mi aflicción
  - cuando tuve angustia
  - en el día de mi aprieto
  lexicon: HALOT
  rationale: La frase refiere a un tiempo de aflicción personal. 'Angustia' es natural en español bíblico contemporáneo y preserva el tono existencial del hebreo.
theological_decisions:
- issue: Cómo rendir חֶסֶד en un salmo de rescate divino
  english_pob_reading: your steadfast love
  chosen_spanish_reading: tu amor leal
  alternative_spanish_readings:
  - tu amor constante
  - tu misericordia
  - tu amor fiel
  rationale: '''Amor leal'' mantiene el componente relacional y pactal de חֶסֶד sin recurrir a una fórmula demasiado arcaica. También deja visible la idea de fidelidad activa de Dios en medio del rescate.'
  doctrine_reference: Translation philosophy §5; key-term consistency
- issue: Valor de עֹז en paralelo con מִשְׂגָּב y מָנוֹס
  english_pob_reading: your strength / a stronghold / a refuge
  chosen_spanish_reading: tu poder / un baluarte / un refugio
  alternative_spanish_readings:
  - tu fuerza / una fortaleza / un refugio
  - tu poderío / una fortaleza / un asilo
  rationale: La línea junta fuerza activa y protección segura. 'Poder' y 'baluarte' conservan esa combinación sin borrar la distinción entre capacidad divina y lugar de resguardo.
  doctrine_reference: Translation philosophy §6; poetic parallelism
- issue: Tensión entre cantar y gritar de alegría en וַאֲרַנֵּן
  english_pob_reading: I will sing aloud
  chosen_spanish_reading: cantaré con alegría
  alternative_spanish_readings:
  - cantaré a voz en cuello
  - gritaré de alegría
  rationale: El hebreo permite tanto cantar como exclamar jubilosamente. 'Cantaré con alegría' conserva la ambivalencia sin elegir una sola modalidad sonora de manera restrictiva.
  doctrine_reference: Lexical range preservation
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que movió 'in the morning' para mayor fluidez. En español se eligió 'por la mañana' al final del hemistiquio, manteniendo la claridad rítmica y la relación temporal con el canto sin replicar un orden innecesariamente marcado. No se detectaron cambios textuales posteriores que alteren el sentido base.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma por defecto para el Tetragrámaton, pero este versículo no contiene el nombre divino explícito.
  - '''Amor leal'' se usa aquí para חֶסֶד siguiendo la línea de POB y para evitar alternar innecesariamente con ''misericordia''.'
  - '''Baluarte'' y ''refugio'' conservan la doble imagen de protección sin fusionarlas.'
  - La puntuación y el orden de los miembros poéticos buscan claridad en español sin perder el paralelismo hebreo.
