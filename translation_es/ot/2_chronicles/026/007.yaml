    issue: Uso de 'arabios'
    rationale: Aunque intenta reflejar un pueblo antiguo, 'arabios' no es forma normal ni clara en español neutral contemporáneo. 'Árabes' es más natural y ampliamente entendible, y en este contexto narrativo no distorsiona el sentido del etnónimo hebreo.
  - severity: high
    issue: La nota [a] está colocada en 'filisteos' en vez de 'meunitas'
    rationale: La nota explica la alternativa para הַמְּעוּנִים ('maonitas'), no para 'filisteos'. El anclaje actual induce a error y no cumple la disciplina requerida de asociar la nota con la palabra pertinente.
  revised_spanish_text: Dios lo ayudó contra los filisteos, contra los árabes que habitaban en Gur-baal, y contra los meunitas[a].
