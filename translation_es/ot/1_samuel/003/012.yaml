translation:
  language: es
  text: En aquel día llevaré a cabo contra Elí todo lo que he hablado acerca de su casa[a][b], desde el principio hasta el fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cumpliré para Elí todo lo que he hablado acerca de su casa»'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «su casa» puede significar su hogar, su familia o su línea sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: La expresión hebrea marca un tiempo futuro específico y demostrativo. «En aquel día» conserva esa deixis y suena natural en español bíblico sin perder precisión.
- source_word: אָקִים
  english_pob_choice: I will carry out
  chosen_spanish: haré venir
  alternatives_spanish:
  - llevaré a cabo
  - cumpliré
  - estableceré
  lexicon: HALOT
  rationale: En este contexto de juicio, el verbo no expresa “levantar” en sentido literal, sino hacer que se ejecute lo dicho por Dios. «Haré venir sobre» reproduce bien la idea de traer efectivamente el anuncio sobre Elí, sin suavizar el matiz judicial.
- source_word: אֶל עֵלִי
  english_pob_choice: against Eli
  chosen_spanish: sobre Elí
  alternatives_spanish:
  - contra Elí
  - a Elí
  - sobre Eli
  lexicon: HALOT
  rationale: El hebreo usa אֶל, pero aquí la acción anunciada recae de manera adversa sobre Elí. «Sobre Elí» mantiene el destino directo del juicio con un español natural; «contra Elí» también sería posible, pero suena más explícitamente hostil que el hebreo inmediato.
- source_word: אֵת כָּל אֲשֶׁר דִּבַּרְתִּי
  english_pob_choice: all that I have spoken
  chosen_spanish: todo lo que he hablado
  alternatives_spanish:
  - todo cuanto he dicho
  - todas las cosas que he hablado
  lexicon: HALOT
  rationale: Se conserva la totalidad de כָּל אֲשֶׁר con «todo lo que», y el verbo דִּבַּרְתִּי se refleja con «he hablado», que mantiene el acto de hablar sin convertirlo en una simple referencia abstracta.
- source_word: אֶל בֵּיתוֹ
  english_pob_choice: concerning his house
  chosen_spanish: acerca de su casa
  alternatives_spanish:
  - sobre su casa
  - con respecto a su casa
  - acerca de su familia
  lexicon: HALOT
  rationale: 'Como con דבר seguido de אֶל, la frase señala el tema del habla divina. «Casa» conserva la amplitud de בַּיִת: hogar, familia y línea sacerdotal. «Acerca de» mantiene el valor temático sin introducir una interpretación más estrecha.'
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su familia
  - su linaje
  - su casa paterna
  lexicon: HALOT
  rationale: «Casa» es la traducción más amplia y fiel al campo semántico de בַּיִת en este contexto; puede incluir la familia y la línea sacerdotal de Elí, no solo su vivienda física.
- source_word: הָחֵל וְכַלֵּה
  english_pob_choice: from beginning to end
  chosen_spanish: desde el principio hasta el fin
  alternatives_spanish:
  - de principio a fin
  - desde el comienzo hasta el final
  lexicon: HALOT
  rationale: La construcción expresa totalidad y consumación. «Desde el principio hasta el fin» conserva ese alcance completo de manera clara y natural en español.
theological_decisions:
- issue: Alcance de «su casa» en el juicio anunciado
  english_pob_reading: The verse states that God will fully execute what he previously spoke regarding Eli's house, without narrowing 'house' to only immediate family or expanding it beyond the familial-priestly line.
  chosen_spanish_reading: El versículo afirma que Dios ejecutará plenamente lo que ya había dicho respecto de la casa de Elí, sin limitar «casa» solo a la familia inmediata ni ampliarla más allá de la línea familiar-sacerdotal.
  alternative_spanish_readings:
  - restringir «casa» a la familia nuclear de Elí
  - ampliar «casa» al sacerdocio institucional en la traducción principal
  rationale: En hebreo, בֵּיתוֹ puede abarcar hogar, familia y linaje. La traducción principal conserva esa amplitud con «su casa» y evita resolver de antemano una tensión interpretativa que el texto deja abierta.
  doctrine_reference: Preservar la tensión lexical y teológica; no cerrar indebidamente el alcance del término clave.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés: conserva la deixis temporal, el valor de juicio del verbo hifil, el alcance amplio de «casa» y la idea de totalidad de la clausura verbal. No se registran revisiones previas aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma preferida del nombre divino en el proyecto, pero este versículo no lo contiene explícitamente.
  - «Casa» se usa con sentido amplio y consistente con el hebreo bíblico; no se reduce a vivienda ni se sustituye por un término más estrecho.
  - La puntuación con notas al pie sigue el orden de marcadores solicitado y los ancla en la frase correspondiente.
