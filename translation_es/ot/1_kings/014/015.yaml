translation:
  language: es
  text: Y Yahvé herirá a Israel, como se mece una caña en el agua; y arrancará a Israel de esta buena tierra que dio a sus padres, y los esparcirá al otro lado del Río[a], por cuanto hicieron sus Aserim[b], provocando a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más allá del Éufrates»; en este contexto, «el Río» se refiere al Éufrates.
    reason: cross_reference
  - marker: b
    text: 'Hebreo: «sus Aserim»; es decir, objetos de culto asociados con la diosa Aserá, a menudo entendidos como postes o imágenes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכָּה / וְנָתַשׁ
  english_pob_choice: will strike / will uproot
  chosen_spanish: herirá / arrancará
  alternatives_spanish:
  - golpeará / arrancará de raíz
  - herirá / desarraigará
  lexicon: HALOT
  rationale: 'He elegido verbos naturales en español que conservan el paralelismo de juicio: el primero comunica el golpe divino y el segundo la remoción violenta de la tierra. ''Arrancar'' mantiene la imagen de desarraigo sin sonar forzado; ''desarraigar'' sería más explícito pero menos directo en el ritmo del verso.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: יְהוָה → Yahvé'
  rationale: Sigo la convención del proyecto para el Tetragrámaton. 'Yahvé' preserva el nombre propio divino en español y evita la sustitución por un título.
- source_word: כַּאֲשֶׁר יָנוּד הַקָּנֶה בַּמַּיִם
  english_pob_choice: as a reed sways in the water
  chosen_spanish: como se mece una caña en el agua
  alternatives_spanish:
  - como una caña se balancea en el agua
  - como una caña es agitada en el agua
  lexicon: HALOT
  rationale: '''Se mece'' expresa en español la inestabilidad oscilante de la imagen con buena naturalidad. ''Caña'' comunica el mismo referente vegetal que ''reed'' sin perder transparencia.'
- source_word: הָאֲדָמָה הַטּוֹבָה הַזֹּאת
  english_pob_choice: this good land
  chosen_spanish: esta buena tierra
  alternatives_spanish:
  - esta tierra buena
  - esta tierra fértil
  lexicon: HALOT
  rationale: '''Tierra'' es la forma natural en español para el ámbito de posesión y herencia covenantal. ''Buena'' reproduce el juicio valorativo del hebreo sin necesidad de expandir a ''fértil''.'
- source_word: לַאֲבוֹתֵיהֶם
  english_pob_choice: to their fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a sus padres y antepasados
  lexicon: HALOT
  rationale: Mantengo 'padres' porque refleja el paralelismo bíblico de continuidad generacional y herencia pactal. En español es claro y fiel, aunque 'antepasados' sería una glosa posible.
- source_word: וְזֵרָם
  english_pob_choice: and scatter them
  chosen_spanish: y los esparcirá
  alternatives_spanish:
  - y los dispersará
  - y los esparcirá ampliamente
  lexicon: HALOT
  rationale: '''Esparcir'' conserva el valor de dispersión del verbo con un registro bíblico natural en español. ''Dispersar'' es viable, pero ''esparcir'' reproduce mejor el efecto de alejamiento colectivo.'
- source_word: מֵעֵבֶר לַנָּהָר
  english_pob_choice: beyond the River
  chosen_spanish: al otro lado del Río
  alternatives_spanish:
  - más allá del Río
  - al otro lado del Éufrates
  lexicon: HALOT
  rationale: Conservo la expresión 'el Río' en el texto principal, porque el hebreo usa un título convencional. 'Al otro lado' transmite la dirección geográfica con naturalidad; la identificación histórica se deja para la nota.
- source_word: יָעַן אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: por cuanto
  alternatives_spanish:
  - porque
  - ya que
  lexicon: HALOT
  rationale: '''Por cuanto'' mantiene un tono bíblico-digno y expresa con precisión la causalidad judicial del hebreo. ''Porque'' sería más simple, pero menos solemne en este contexto.'
- source_word: אֲשֵׁרֵיהֶם
  english_pob_choice: their Asherim
  chosen_spanish: sus Aserim
  alternatives_spanish:
  - sus Aseras
  - sus postes sagrados de Aserá
  lexicon: HALOT
  rationale: Sigo la decisión del POB inglés de conservar el término transliterado para no diluir el objeto cultual específico. 'Aserim' es legible en español y mantiene la referencia al plural hebreo sin introducir una explicación interpretativa en el texto principal.
- source_word: מַכְעִיסִים אֶת יְהוָה
  english_pob_choice: provoking Yahweh
  chosen_spanish: provocando a Yahvé
  alternatives_spanish:
  - irritando a Yahvé
  - despertando la ira de Yahvé
  lexicon: HALOT
  rationale: '''Provocando'' reproduce el valor causal del participio y es idiomático en español bíblico moderno. ''Despertando la ira'' explicita el efecto, pero añade una expansión que el hebreo no exige.'
theological_decisions:
- issue: Nombre divino en la traducción
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política del proyecto exige transliterar יְהוָה como el nombre propio divino. 'Yahvé' es la forma española establecida en el marco POB y preserva la identidad del pacto sin sustituirla por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referencia de 'el Río'
  english_pob_reading: Retain 'the River' in the main text, with explanatory footnote identifying it as the Euphrates
  chosen_spanish_reading: Retener 'el Río' en el texto principal, con nota explicativa que lo identifica como el Éufrates
  alternative_spanish_readings:
  - al Éufrates
  - más allá del Éufrates
  rationale: El hebreo usa una designación convencional, no un nombre propio directo. Mantener 'el Río' respeta la forma del texto y la nota aclara el referente histórico para el lector moderno.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Sentido de אֲשֵׁרֵיהֶם
  english_pob_reading: their Asherim
  chosen_spanish_reading: sus Aserim
  alternative_spanish_readings:
  - sus Aseras
  - sus postes de Aserá
  rationale: Se preserva el término técnico de culto para no convertirlo prematuramente en una explicación. La forma transliterada permite mantener la tensión léxica del hebreo y coincide con la revisión inglesa más reciente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: El contexto inglés muestra una revisión reciente que prefirió conservar Asherim en lugar de expandirlo a 'Asherah poles'; por eso el español conserva el término transliterado 'Aserim' en el texto principal y reserva la explicación cultual para la nota. También se mantiene la distinción entre 'the River' y su identificación con el Éufrates en nota, conforme al audit trail.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera uniforme para יְהוָה, según la terminología del proyecto.
  - Se mantuvo 'el Río' con mayúscula inicial en el texto principal para reflejar el título geográfico convencional.
  - '''Aserim'' se translitera de forma consistente en plural, evitando sustituirlo por una paráfrasis interpretativa.'
  - El tono general es bíblico y digno, pero con español moderno y legible.
