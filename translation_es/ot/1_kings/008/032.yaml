review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura judicial del hebreo: oír en/desde los cielos, actuar, juzgar a tus siervos, condenar al malvado y justificar al justo. También mantiene adecuadamente la imagen retributiva de hacer recaer su proceder sobre su propia cabeza. Sin embargo, falta una nota para la expresión idiomática ''sobre su propia cabeza'', que el rastro inglés preserva explícitamente como nota cultural, y la nota actual [a] no refleja con suficiente precisión la alternativa locativa principal del inglés (''en el cielo'' / ''desde el cielo'').'
  spanish_quality_summary: El español es claro y digno, pero 'oye en los cielos' suena menos natural en español bíblico que 'oye en el cielo', y además el hebreo puede expresarse locativamente en singular en español sin pérdida. La redacción general es buena. Conviene ajustar las notas para evitar ambigüedad y añadir la explicación del modismo hebreo.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Siervos' aquí es defendible por contexto de súplica pactual. 'Justificando' y 'condenando' preservan correctamente la decisión forense documentada. 'Justicia' para כְּצִדְקָתוֹ es aceptable, aunque 'rectitud' sería una alternativa contextual; no exige cambio.
  issues:
  - severity: medium
    issue: Falta la nota cultural sobre 'hacer recaer su conducta sobre su propia cabeza'.
    rationale: El inglés POB conserva esta explicación como nota significativa porque la frase es un modismo hebreo de retribución según la conducta. En español la imagen se entiende parcialmente, pero sigue siendo idiomática y merece preservarse en nota.
  - severity: low
    issue: La nota [a] está formulada de manera menos precisa que el rastro inglés.
    rationale: El inglés distingue 'hear in heaven' y 'hear from heaven'. En español conviene 'oye en el cielo' con alternativa 'desde el cielo'; la redacción actual 'oye los cielos / en los cielos' resulta poco natural y confusa.
  - severity: low
    issue: '''en los cielos'' es posible, pero ''en el cielo'' suena más natural y eclesial en español.'
    rationale: La decisión inglesa ya trata 'heaven/the heavens' como fórmula locativa. En español, el singular expresa mejor la locución sin sacrificar fidelidad, y la nota puede preservar la literalidad hebrea.
