translation:
  language: es
  text: Cuando Yahvé tu Dios te haga entrar en la tierra a la que vas para poseerla, y expulse[a] de delante de ti a muchas naciones —los hititas, los girgaseos, los amorreos, los cananeos, los ferezeos, los heveos y los jebuseos—, siete naciones más numerosas y más poderosas que tú[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'desposea de delante de ti a muchas naciones'.
    reason: lexical_alternative
  - marker: b
    text: O 'más numerosas y más fuertes que tú'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del texto hebreo con la forma española establecida en los lineamientos del proyecto. No se sustituye por un título en mayúsculas, para mantener el valor del Tetragrámaton.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: La construcción posesiva y de pacto se expresa de manera directa y natural en español como 'tu Dios'.
- source_word: יְבִיאֲךָ
  english_pob_choice: brings you into
  chosen_spanish: te introduzca
  alternatives_spanish:
  - te lleve a
  - te haga entrar en
  lexicon: HALOT
  rationale: El hiphil de בוא con destino expresa causar la entrada en la tierra; 'te introduzca' conserva el sentido causativo y resulta idiomático en español bíblico actual.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  lexicon: HALOT
  rationale: En Deuteronomio, 'la tierra' es la forma teológicamente resonante y más fiel al campo semántico de la herencia prometida.
- source_word: אֲשֶׁר אַתָּה בָא שָׁמָּה
  english_pob_choice: that you are entering
  chosen_spanish: que vas a poseer
  alternatives_spanish:
  - que estás entrando
  - a la que vas
  lexicon: HALOT
  rationale: La traducción sigue la decisión auditada de tomar el infinitivo final como finalidad de posesión; en español se expresa con una relativa natural que mantiene el movimiento hacia la posesión de la tierra.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess
  chosen_spanish: a poseer
  alternatives_spanish:
  - para poseerla
  - a heredar
  lexicon: HALOT
  rationale: Se conserva el valor de ירשׁ como 'poseer/tomar posesión'. La preposición 'a' encaja con el giro verbal español después de 'vas'.
- source_word: וְנָשַׁל
  english_pob_choice: drives out
  chosen_spanish: expulse
  alternatives_spanish:
  - desplace
  - arroje fuera
  - desposea
  lexicon: HALOT
  rationale: El verbo denota quitar de en medio y hacer salir del territorio; 'expulse' mantiene la fuerza del movimiento forzado sin perder la naturalidad del español.
- source_word: גּוֹיִם רַבִּים
  english_pob_choice: many nations
  chosen_spanish: muchas naciones
  alternatives_spanish:
  - muchos pueblos
  lexicon: HALOT
  rationale: '''Naciones'' reproduce el término colectivo usado en el texto fuente y en la audit trail inglesa; ''muchas'' conserva el cuantificador directo.'
- source_word: מִפָּנֶיךָ
  english_pob_choice: before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - ante ti
  - de tu presencia
  lexicon: HALOT
  rationale: La locución hebrea se vuelve de manera transparente con un giro espacial natural en español que mantiene la imagen de expulsión frontal.
- source_word: הַחִתִּי ... הַיְבוּסִי
  english_pob_choice: the Hittites, the Girgashites, the Amorites, the Canaanites, the Perizzites, the Hivites, and the Jebusites
  chosen_spanish: los hititas, los gergeseos, los amorreos, los cananeos, los ferezeos, los heveos y los jebuseos
  alternatives_spanish:
  - los heteos, los gergeseos, los amorreos, los cananeos, los ferezeos, los heveos y los jebuseos
  lexicon: HALOT
  rationale: Se adoptan etnónimos españoles corrientes para estos pueblos, respetando la identificación tradicional de las siete naciones sin forzar una transliteración innecesaria.
- source_word: שִׁבְעָה גוֹיִם
  english_pob_choice: seven nations
  chosen_spanish: siete naciones
  alternatives_spanish:
  - siete pueblos
  lexicon: HALOT
  rationale: La apposición numérica resume la lista anterior; 'naciones' mantiene la coherencia terminológica con גּוֹיִם.
- source_word: רַבִּים וַעֲצוּמִים
  english_pob_choice: greater and mightier
  chosen_spanish: más numerosas y más poderosas
  alternatives_spanish:
  - más grandes y más fuertes
  - más numerosas y más fuertes
  lexicon: HALOT
  rationale: 'El hebreo combina cantidad e intensidad. Como la elección inglesa preserva la posibilidad de ''more numerous and stronger'', en español se explicitan ambos matices: tamaño numérico y fuerza/poder.'
- source_word: מִמֶּךָּ
  english_pob_choice: than you
  chosen_spanish: que tú
  alternatives_spanish:
  - que tú eres
  - más que tú
  lexicon: HALOT
  rationale: La comparación explícita en español se formula con la construcción comparativa natural 'más ... que tú'.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del pacto y se adapta a la convención española del proyecto, evitando la máscara litúrgica de 'SEÑOR' y manteniendo la transparencia frente al hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de 'muchas naciones' y la lista étnica
  english_pob_reading: many nations ... seven nations greater and mightier than you
  chosen_spanish_reading: muchas naciones ... siete naciones más numerosas y más poderosas que tú
  alternative_spanish_readings:
  - muchas naciones ... siete naciones más grandes y más fuertes que tú
  - muchos pueblos ... siete pueblos más numerosos y más fuertes que tú
  rationale: Se conserva la tensión entre cantidad y fuerza que el audit trail inglés no resuelve del todo con un único par adjetival. En español se expresa con dos rasgos para no borrar ninguno de los matices del hebreo.
  doctrine_reference: 'POB lexical audit: גּוֹיִם רַבִּים; רַבִּים וַעֲצוּמִים'
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo y el auditor inglés sin depender mecánicamente de la estructura inglesa. Se conserva la secuencia causal-temporal del hebreo con una frase inicial natural en español, se mantiene el nombre divino como Yahvé, y se traduce el doble juego cuantitativo/fuerte de las naciones sin reducirlo a una sola noción.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - '''La tierra'' se mantiene en singular como término técnico de Deuteronomio.'
  - '''Naciones'' se conserva para גּוֹיִם en toda la cláusula.'
  - Los etnónimos se presentan en plural español por referirse a colectivos nacionales.
  - La puntuación con raya introduce la enumeración de las siete naciones conforme al registro bíblico español moderno.
