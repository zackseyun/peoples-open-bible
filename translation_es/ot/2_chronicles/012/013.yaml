translation:
  language: es
  text: Entonces el rey Roboam se fortaleció en Jerusalén y reinó[a]. Roboam tenía cuarenta y un años cuando comenzó a reinar, y reinó diecisiete años en Jerusalén, la ciudad que Yahvé había escogido de entre todas las tribus de Israel para poner su nombre allí. Y el nombre de su madre era Naamá la amonita[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se estableció en Jerusalén». El verbo hebreo puede denotar fortalecerse o quedar firmemente consolidado.
    reason: lexical_alternative
  - marker: b
    text: O «Entonces el rey Roboam se estableció en Jerusalén y reinó». Esto conserva una traducción previa documentada de la cláusula inicial.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּתְחַזֵּק
  english_pob_choice: strengthened himself
  chosen_spanish: se fortaleció
  alternatives_spanish:
  - se estableció
  - cobró fuerzas
  lexicon: HALOT
  rationale: El hitpael de חזק aquí es reflexivo/incoativo. «Se fortaleció» conserva esa fuerza verbal y sigue el matiz de consolidación de poder sin añadir una explicación interpretativa.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: and reigned
  chosen_spanish: y reinó
  alternatives_spanish:
  - y comenzó a reinar
  - y se hizo rey
  lexicon: HALOT
  rationale: La forma narrativa continúa la acción real de Roboam; «y reinó» mantiene la secuencia simple del hebreo sin sobreespecificar el inicio, que ya aparece en la cláusula de edad.
- source_word: כִּי בֶן אַרְבָּעִים וְאַחַת שָׁנָה ... בְּמָלְכוֹ
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando empezó a reinar
  - al reinar
  lexicon: HALOT
  rationale: La construcción temporal con כִּי + infinitivo expresa el momento de acceso al trono. «Cuando comenzó a reinar» es natural en español y conserva el valor temporal de la fórmula regnal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: DOCTRINE.md contested terms
  rationale: Se mantiene el nombre divino del Tetragrámaton como «Yahvé», conforme al estándar del proyecto, en vez de sustituirlo por un título como «el Señor».
- source_word: לָשׂוּם אֶת שְׁמוֹ שָׁם
  english_pob_choice: to put his name there
  chosen_spanish: para poner allí su nombre
  alternatives_spanish:
  - para establecer allí su nombre
  - para colocar allí su nombre
  lexicon: HALOT
  rationale: La frase conserva el idioma concreto del hebreo sobre la elección de Jerusalén para el nombre divino. «Poner allí su nombre» evita una paráfrasis doctrinal más amplia y sigue de cerca la imagen del texto.
- source_word: מִכֹּל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: from all the tribes of Israel
  chosen_spanish: de entre todas las tribus de Israel
  alternatives_spanish:
  - de todas las tribus de Israel
  - entre todas las tribus de Israel
  lexicon: HALOT
  rationale: La preposición expresa selección de entre un conjunto. «De entre» comunica mejor la idea de elección desde el total de las tribus.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: And his mother’s name was
  chosen_spanish: Y el nombre de su madre era
  alternatives_spanish:
  - Y se llamaba su madre
  - Y el nombre de su madre fue
  lexicon: HALOT
  rationale: Se conserva la fórmula regnal de identificación genealógica en un español claro y formal.
- source_word: הָעַמֹּנִית
  english_pob_choice: the Ammonite
  chosen_spanish: la amonita
  alternatives_spanish:
  - la ammonita
  - la mujer amonita
  lexicon: HALOT
  rationale: El gentilicio femenino se expresa naturalmente como «la amonita», evitando arcaísmos y manteniendo la identificación étnica de Naamá.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: El hebreo presenta explícitamente יהוה; se conserva el nombre propio divino como «Yahvé» para no ocultar el nombre del pacto con una sustitución titulativa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Fórmula de elección del templo/ciudad: לָשׂוּם אֶת שְׁמוֹ שָׁם'
  english_pob_reading: to put his name there
  chosen_spanish_reading: para poner allí su nombre
  alternative_spanish_readings:
  - para establecer allí su presencia
  - para hacer habitar allí su nombre
  rationale: 'La traducción conserva la imagen concreta del texto: Yahvé eligió Jerusalén para poner allí su nombre. No se amplía a una explicación teológica de presencia/indwelling que el hebreo no formula aquí.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente del audit trail, que prefirió «strengthened himself» sobre «established himself» para reflejar con más precisión וַיִּתְחַזֵּק, manteniendo a la vez una redacción natural. También conserva la fórmula regnal y la referencia al nombre divino sin sustituirlas por paráfrasis doctrinales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה en todo el registro, conforme al estándar del proyecto.
  - Se usa «se fortaleció» para reflejar el valor reflexivo de וַיִּתְחַזֵּק, evitando «se estableció» salvo en la nota alternativa.
  - «Amonita» se emplea como gentilicio natural y no como forma arcaica.
  - La cláusula temporal «cuando comenzó a reinar» conserva la función de acceso al trono de בְּמָלְכוֹ.
