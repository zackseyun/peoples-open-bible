  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido básico del griego: Jonatán rasga su ropa, pone tierra sobre su cabeza y ora. Sin embargo, las notas al pie están invertidas respecto de los anclajes del texto y del contenido documentado en el rastro inglés: [a] en el texto acompaña «vestidos», pero la nota [a] explica la tierra/polvo sobre la cabeza; [b] en el texto acompaña «su cabeza», pero la nota [b] es la alternativa léxica de «polvo». Esto requiere corrección formal para que la evidencia y las notas queden alineadas.'
  spanish_quality_summary: El español es claro, natural y digno. «Rasgó sus vestidos», «echó tierra sobre su cabeza» y «oró» son formulaciones legibles y fieles. No hay problemas de estilo mayores. La única reparación necesaria es la colocación correcta de los marcadores de nota.
  glossary_alignment: No hay términos del glosario de alta sensibilidad aquí. «Jonatán», «oró» y «tierra» concuerdan con las decisiones léxicas documentadas. «Vestidos» es aceptable en registro bíblico y preserva bien ἱμάτια.
  issues:
  - severity: medium
    issue: Los marcadores de notas al pie están mal anclados en el texto español.
    rationale: La nota cultural sobre echar tierra o polvo sobre la cabeza debe anclarse a esa acción, no a «vestidos». La nota léxica alternativa sobre «polvo» también debe anclarse a «tierra/sobre su cabeza». Tal como está, el lector recibe referencias incorrectas y no coincide con el rastro de auditoría inglés.
  revised_spanish_text: Y Jonatán rasgó sus vestidos, y echó tierra[a] sobre su cabeza[b], y oró.
  revised_footnotes:
