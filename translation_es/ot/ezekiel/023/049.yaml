revisions:
- from: Ellas traerán sobre ustedes su lascivia[a], y ustedes cargarán con los pecados de sus ídolos; entonces sabrán que yo soy el Señor Yahvé.
  to: Harán recaer sobre ustedes su lascivia, y ustedes cargarán con los pecados de sus ídolos[a]; entonces sabrán que yo soy el Señor Yahvé.
  rationale: Se reemplazó 'Ellas traerán' por 'Harán recaer' para evitar un sujeto español innecesariamente explícito y mantener la idea judicial de que la lascivia les será puesta encima. Se eliminó la construcción defectuosa 'sobre ustedes su lascivia' preservando el posesivo correcto en una formulación natural. También se movió la nota al pie al término 'ídolos', que es la palabra a la que realmente corresponde la observación léxica sobre גִלּוּלִים.
  reviewer_model: gpt-5.4
