translation:
  language: es
  text: El decimosexto fue para Hananyahu[a], sus hijos y sus hermanos[b], doce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente en el contexto: «El decimosexto lote fue para Hananyahu». La palabra «lote» está implícita por los versículos circundantes, pero no se expresa en el hebreo de este versículo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «doce».'
    reason: alternative_reading
lexical_decisions:
- source_word: לְשִׁשָּׁה עָשָׂר
  english_pob_choice: The sixteenth was for
  chosen_spanish: El decimosexto fue para
  alternatives_spanish:
  - Para el decimosexto
  - El decimosexto lot fue para
  lexicon: HALOT
  rationale: En este contexto de asignaciones por sorteo o turnos, el valor de לְ con el ordinal expresa pertenencia/asignación en una secuencia. En español, «fue para» reproduce bien esa relación sin añadir una palabra no explícita en el verso. Se evita introducir «lote» en el texto principal porque, aunque está implícito por el contexto inmediato, no aparece en este versículo.
- source_word: לַחֲנַנְיָהוּ
  english_pob_choice: Hananyahu
  chosen_spanish: Hananyahu
  alternatives_spanish:
  - Hananiahu
  - Hananías
  lexicon: BDB
  rationale: Se conserva el nombre propio en forma transliterada cercana al hebreo חֲנַנְיָהוּ. «Hananyahu» refleja de manera directa la forma consonántica y evita una adaptación más tradicional que se alejaría del audit trail.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus descendientes
  lexicon: HALOT
  rationale: El hebreo usa בָּנִים, que de manera primaria significa «hijos» y en este listado genealógico puede verse de forma natural como «hijos». En español, «sus hijos» mantiene la relación familiar sin forzar una especificación de género que el contexto ya hace probable pero no explícita en la superficie del verso.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos de clan
  lexicon: HALOT
  rationale: אָח normalmente significa «hermano»; en listas de organización familiar puede ampliarse a parientes cercanos, pero «hermanos» es la correspondencia más directa y coincide con el estilo formular del capítulo. Se mantiene la conexión estrecha con el hebreo sin sustituirla por una paráfrasis social más amplia.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - en total doce
  - doce en número
  lexicon: HALOT
  rationale: El numeral cierra la unidad como total del grupo mencionado. «Doce» es la forma más idiomática en español y conserva la brevedad del hebreo sin añadir una frase explicativa que el texto no requiere.
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una corrección que evitó una formulación más pesada («numbering twelve») para conservar mayor literalidad; la versión española sigue ese mismo criterio y no añade equivalentes explicativos innecesarios en la línea principal. También se respetó la decisión inglesa de no introducir «lote» en el cuerpo principal, dejándolo solo como alternativa de nota porque el sustantivo no está explícito en el hebreo de este versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; aquí no aplica.
  - Se usa transliteración consistente de nombres propios hebreos sin castellanización tradicional.
  - El cierre con «doce» conserva la economía del original y evita sobreexplicar una estructura elíptica.
  - No se introduce terminología eclesiástica tradicional donde el hebreo es simplemente administrativo/familiar.
