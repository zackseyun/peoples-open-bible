    text: O «desde en medio del Jordán».
    reason: lexical_alternative
  - marker: b
    text: O «el campamento»; el hebreo indica más específicamente un lugar de alojamiento o pernocta.
    reason: lexical_alternative
  revision_rationale: Se elimina la nota espuria sobre «doce piedras». Se cambia «tomaron» por «cargaron» para reflejar mejor וַיִּשְׂאוּ y el audit trail inglés. Se cambia «las dejaron allí» por «las pusieron allí» para representar con más precisión la acción de depositar las piedras. Se conservan «Yahvé», «los hijos de Israel» y «lugar de alojamiento» por fidelidad al proyecto y al hebreo.
