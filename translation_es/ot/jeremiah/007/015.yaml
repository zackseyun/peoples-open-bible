- from: Y yo los arrojaré[a] de delante de mí, como arrojé a todos sus hermanos[b], a toda la descendencia[c] de Efraín.
  to: Y los arrojaré[a] de delante de mí, como arrojé a todos vuestros hermanos[c][b], a toda la descendencia de Efraín.
