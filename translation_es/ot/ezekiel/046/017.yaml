  text: וְ/כִֽי יִתֵּ֨ן מַתָּנָ֜ה מִ/נַּחֲלָת֗/וֹ לְ/אַחַד֙ מֵֽ/עֲבָדָ֔י/ו וְ/הָ֤יְתָה לּ/וֹ֙ עַד שְׁנַ֣ת הַ/דְּר֔וֹר וְ/שָׁבַ֖ת לַ/נָּשִׂ֑יא אַ֚ךְ נַחֲלָת֔/וֹ בָּנָ֖י/ו לָ/הֶ֥ם תִּהְיֶֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/046/017.yaml
  text: But if he gives a gift from his inheritance to one of his servants[a], it shall be his until the year of liberty; then it shall return to the prince. Only his inheritance to his sons shall be theirs.
  footnotes:
