translation:
  language: es
  text: Y el pueblo de la tierra[a] se postrará a la entrada de aquel portal, delante de Yahvé, los sábados y en las lunas nuevas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El pueblo de la tierra» probablemente se refiere a la población laica, en contraste con el príncipe y los sacerdotes en el contexto circundante.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִשְׁתַּחֲו֣וּ
  english_pob_choice: shall bow down
  chosen_spanish: se postrará
  alternatives_spanish:
  - se inclinará
  - se postrará en adoración
  lexicon: HALOT
  rationale: El verbo hebreo expresa el acto corporal de inclinarse o postrarse en reverencia. «Se postrará» conserva esa acción concreta en español y deja ver el matiz de adoración sin añadir más contenido del que aporta el texto.
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente de la tierra
  - el pueblo del país
  lexicon: HALOT
  rationale: La traducción literal mantiene la expresión social distintiva del contexto de Ezequiel, donde este grupo se contrasta con el príncipe y los sacerdotes. «Pueblo de la tierra» preserva el valor de designación colectiva sin explicitar en el texto principal una glosa interpretativa.
- source_word: פֶּתַח
  english_pob_choice: at the entrance of
  chosen_spanish: a la entrada de
  alternatives_spanish:
  - en la entrada de
  - junto a la entrada de
  lexicon: HALOT
  rationale: פֶּתַח denota un acceso o entrada. «A la entrada de» suena natural en español y reproduce adecuadamente el sentido espacial del hebreo.
- source_word: הַשַּׁעַר הַהוּא
  english_pob_choice: that gate
  chosen_spanish: aquella puerta
  alternatives_spanish:
  - esa puerta
  - la puerta aquella
  lexicon: HALOT
  rationale: El demostrativo hebreo señala una puerta específica ya identificada en el contexto. «Aquella puerta» conserva esa referencia deíctica. Se prefirió «puerta» por fluidez en español, aunque el contexto arquitectónico también permitiría «portón» o «puerta-gate»; aquí «puerta» es suficiente y natural.
- source_word: בַּשַּׁבָּתוֹת
  english_pob_choice: on the Sabbaths
  chosen_spanish: en los sábados
  alternatives_spanish:
  - los sábados
  - en los días de sábado
  lexicon: HALOT
  rationale: El plural hebreo conserva la idea de observancias sabáticas repetidas. «En los sábados» refleja el ritmo recurrente de manera clara y moderna en español; aunque «sábados» puede sonar más general, aquí el contexto cultual lo delimita.
- source_word: וּבֶחֳדָשִׁים
  english_pob_choice: and on the new moons
  chosen_spanish: y en las lunas nuevas
  alternatives_spanish:
  - y en los novilunios
  - y en los comienzos de mes
  lexicon: HALOT
  rationale: El contexto cultual indica la celebración de la luna nueva. «Lunas nuevas» conserva el lenguaje bíblico y es comprensible; «novilunios» sería más técnico, pero menos transparente para lectores generales.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: La preposición לִפְנֵי expresa estar en la presencia de alguien y, en contexto de culto, delante de él. Se usa «Yahvé» conforme al criterio español del proyecto para יְהוָה, manteniendo el nombre divino sin sustitución por una convención de máscara.
theological_decisions:
- issue: Cómo expresar el nombre divino יְהוָה
  english_pob_reading: Yahweh in the note; before Yahweh in the verse context
  chosen_spanish_reading: Yahvé en el texto principal
  alternative_spanish_readings:
  - el SEÑOR
  - Yahvé / Yavé
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Conforme a la terminología del proyecto en español, se traduce con «Yahvé» en el cuerpo principal para no ocultar el nombre propio divino. La nota marca la referencia sin volver al cifrado litúrgico de «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la postración en contexto cultual
  english_pob_reading: shall bow down
  chosen_spanish_reading: se postrará
  alternative_spanish_readings:
  - adorará
  - se inclinará
  rationale: En Ezequiel, el verbo describe un gesto físico de reverencia ante Dios. «Se postrará» mantiene la concreción corporal y permite que el contexto cultual provea el matiz de adoración sin imponer una traducción demasiado abstracta.
  doctrine_reference: Uso contextual de שׁחה/השתחוה en literatura cultual
translation_notes:
  revision_awareness: El auditorio inglés de la POB no requirió cambios en la última revisión; el consenso fue de alta concordancia y sin modificaciones. La versión española sigue esa lectura estable, manteniendo el nombre divino explícito y la referencia espacial precisa de la puerta.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de manera uniforme para יְהוָה.
  - Se preservó la distinción cultual de «el pueblo de la tierra» sin reinterpretarlo en el cuerpo principal.
  - «Lunas nuevas» conserva el registro bíblico y evita una paráfrasis calendárica excesiva.
  - 'La sintaxis española sigue el orden natural, pero respeta todos los referentes del hebreo: sujeto, lugar, tiempo y presencia divina.'
