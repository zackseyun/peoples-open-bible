source:
  edition: SBLGNT
  text: ἕως ἄρτι οὐκ ᾐτήσατε οὐδὲν ἐν τῷ ὀνόματί μου· αἰτεῖτε καὶ λήμψεσθε, ἵνα ἡ χαρὰ ὑμῶν ᾖ πεπληρωμένη.
base_translation:
  language: en
  yaml_path: translation/nt/john/016/024.yaml
  text: Until now you have asked for nothing in my name[a]. Ask, and you will receive[c][b], so that your joy may be full.
  footnotes:
  - marker: a
    text: Or 'Keep asking, and you will receive.' The present imperative Ask may imply ongoing or repeated action in context.
    reason: lexical_alternative
  - marker: b
    text: '''In my name'' can denote prayer made in relation to Jesus'' person, authority, and mission; the translation keeps the literal phrase rather than narrowing it to one explanation.'
    reason: lexical_alternative
  - marker: c
    text: Or 'so that your joy may be complete.'
    reason: lexical_alternative
translation:
  language: ko
  text: 지금까지는 여러분이 내 이름으로 아무것도 구하지 않았습니다. 구하십시오. 그러면 받을 것입니다. 그리하여 여러분의 기쁨이 충만케 될 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「계속 구하라. 그러면 받을 것이다」. 현재 명령형 「구하라」는 문맥상 지속적·반복적 행위를 함의할 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 「내 이름으로」는 예수의 인격·권위·사명과의 관계 안에서 드리는 기도를 가리킨다. 본문은 문자적 어구를 유지한다.
    reason: theological_clarification
  - marker: c
    text: 또는 「너희 기쁨이 온전해지도록」.
    reason: lexical_alternative
