revisions:
- from: Y cualquiera que no se postre ni rinda culto[a] será arrojado, en esa hora, en medio de un horno de fuego ardiente.
  to: Y cualquiera que no se postre y adore[a] será arrojado, en aquella misma hora, en medio de un horno de fuego ardiente.
  rationale: Se ajusta la segunda acción a «adore» para reflejar con más fidelidad el verbo arameo y la coordinación original, evitando una paráfrasis más libre («rinda culto»). Se mejora la naturalidad de בַּהּ שַׁעֲתָא con «en aquella misma hora», mientras la nota conserva la explicación idiomática. Se mantiene «horno de fuego ardiente» por fidelidad y claridad.
