translation:
  language: es
  text: Atráeme[a] en pos de ti; correremos. El rey me ha llevado a sus cámaras. Nos gozaremos y alegraremos en ti; celebraremos[b] tu amor más que el vino. Con razón[c] te aman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tras ti». «Atráeme» conserva la fuerza del verbo hebreo משׁך, que puede expresar atraer o tirar hacia sí.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «recordaremos», «mencionaremos» o «exaltaremos» tu amor más que el vino. El hebreo נַזְכִּירָה puede tener el valor de recordar o mencionar en sentido celebrativo.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Los rectos te aman». El hebreo מֵישָׁרִים puede entenderse adverbialmente («con razón») o como sustantivo («los rectos»).'
    reason: alternative_reading
lexical_decisions:
- source_word: מָשְׁכֵנִי
  english_pob_choice: Draw me
  chosen_spanish: Atráeme
  alternatives_spanish:
  - Dame atracción
  - Jálame
  lexicon: HALOT
  rationale: מָשַׁךְ significa 'tirar, atraer, arrastrar'; en español 'atráeme' conserva la metáfora de atracción amorosa sin volverla burdamente física. Mantiene el valor poético del imperativo.
- source_word: אַחֲרֶיךָ נָּרוּצָה
  english_pob_choice: after you; let us run
  chosen_spanish: en pos de ti; correremos
  alternatives_spanish:
  - tras ti; corramos
  - después de ti; correremos
  lexicon: HALOT
  rationale: 'Se conserva el cambio de singular a plural: ''me'' frente a ''correremos''. ''En pos de ti'' refleja con naturalidad el hebreo אַחֲרֶיךָ y ''correremos'' mantiene el plural cohortativo sin forzar una traducción literal incómoda.'
- source_word: הֱבִיאַנִי
  english_pob_choice: has brought me
  chosen_spanish: me ha llevado
  alternatives_spanish:
  - me ha traído
  - me llevó
  lexicon: HALOT
  rationale: El perfecto se entiende como acción completada. 'Me ha llevado' comunica bien la entrada a un espacio íntimo y conserva el progreso narrativo del verso.
- source_word: הַמֶּלֶךְ
  english_pob_choice: The king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Se traduce de manera directa, sin capitalización teológica. El contexto poético no exige identificarlo explícitamente con una figura divina o mesiánica.
- source_word: חֲדָרָיו
  english_pob_choice: his chambers
  chosen_spanish: sus cámaras
  alternatives_spanish:
  - sus aposentos
  - sus habitaciones interiores
  lexicon: HALOT
  rationale: חדרים puede referirse a cuartos internos o cámaras. 'Cámaras' preserva el tono íntimo y elevado del poema mejor que 'habitaciones'.
- source_word: נָגִילָה וְנִשְׂמְחָה
  english_pob_choice: We will rejoice and be glad
  chosen_spanish: Nos gozaremos y alegraremos
  alternatives_spanish:
  - nos regocijaremos y alegraremos
  - nos gozaremos y nos alegraremos
  lexicon: HALOT
  rationale: El paralelismo expresa gozo intenso. 'Nos gozaremos y alegraremos' es una pareja natural en español y mantiene la duplicación enfática.
- source_word: בָּךְ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - por ti
  - sobre ti
  lexicon: HALOT
  rationale: La preposición ב puede ser locativa o de esfera. 'En ti' conserva la relación directa con la persona amada y coincide con el sentido del texto base.
- source_word: נַזְכִּירָה
  english_pob_choice: we will extol
  chosen_spanish: celebraremos
  alternatives_spanish:
  - mencionaremos
  - recordaremos
  - exaltaremos
  lexicon: HALOT
  rationale: El verbo זכר puede implicar recordar, mencionar o conmemorar; en este contexto, con el objeto 'tu amor', el sentido es celebrativo. 'Celebraremos' comunica esa fuerza sin perder la referencia al acto de recordar/nombrar. La alternativa 'exaltaremos' fue considerada, pero 'celebraremos' suena más natural en español.
- source_word: דֹדֶיךָ
  english_pob_choice: your love
  chosen_spanish: tu amor
  alternatives_spanish:
  - tus amores
  - tus caricias
  lexicon: HALOT
  rationale: El plural hebreo puede abarcar expresiones de amor o amores. En español, el singular colectivo 'tu amor' es la forma más natural y fiel al conjunto de la expresión.
- source_word: מִיַּיִן
  english_pob_choice: more than wine
  chosen_spanish: más que el vino
  alternatives_spanish:
  - mejor que el vino
  - por encima del vino
  lexicon: HALOT
  rationale: La comparación es clara. 'Más que el vino' es idiomático y mantiene el contraste de valor sin añadir matices ajenos.
- source_word: מֵישָׁרִים
  english_pob_choice: Rightly
  chosen_spanish: Con razón
  alternatives_spanish:
  - Rectamente
  - Con justicia
  - Los rectos
  lexicon: HALOT
  rationale: Se conserva la posibilidad adverbial del término. 'Con razón' expresa bien la idea de que el amor hacia el amado está justificado o bien fundado, sin forzar un sustantivo como 'los rectos'.
- source_word: אֲהֵבוּךָ
  english_pob_choice: do they love you
  chosen_spanish: te aman
  alternatives_spanish:
  - te han amado
  - te aman ellos
  lexicon: HALOT
  rationale: El perfecto hebreo puede funcionar como presente general en poesía. 'Te aman' fluye naturalmente en español y mantiene la afirmación general del verso.
theological_decisions:
- issue: Identidad de 'el rey' en Cantares 1:4
  english_pob_reading: Retain 'The king' as a literary figure within the poem without making an explicit messianic or divine identification in translation.
  chosen_spanish_reading: Mantener 'el rey' como figura literaria del poema, sin identificarlo explícitamente con Yahvé ni con el Mesías en el texto principal.
  alternative_spanish_readings:
  - el Rey como título divino
  - el Mesías
  - el Señor
  rationale: El hebreo y el contexto inmediato no obligan a una identificación doctrinal específica. Siguiendo la lectura auditada, la traducción debe conservar la ambigüedad poética y no importar una identificación alegórica al cuerpo principal del verso.
  doctrine_reference: Principios de traducción POB; afirmaciones doctrinales sobre la distinción entre texto y interpretación
- issue: Valor de מֵישָׁרִים en la última cola
  english_pob_reading: Rightly do they love you.
  chosen_spanish_reading: Con razón te aman.
  alternative_spanish_readings:
  - Los rectos te aman.
  - Te aman rectamente.
  rationale: 'Se preserva la ambigüedad documentada: el término puede leerse adverbialmente (''con razón'') o sustantivamente (''los rectos''). El español principal adopta la lectura adverbial por ser la más fluida, pero no niega la otra posibilidad.'
  doctrine_reference: HALOT; nota alternativa del POB en inglés
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que prefirió 'extol' sobre 'praise' para נַזְכִּירָה. En español, se optó por 'celebraremos' por ser un equivalente natural de la acción celebrativa/comemorativa, manteniendo la semántica revisada sin repetir mecánicamente el inglés. También se preservó la pluralidad de נָּרוּצָה y la ambigüedad de מֵישָׁרִים.
  spanish_consistency_notes:
  - Se mantiene 'el rey' en minúscula por fidelidad al registro literario del poema.
  - Se usa 'cámaras' para חֲדָרָיו, acorde con el tono poético e íntimo.
  - Se conserva el plural verbal en 'correremos' para reflejar נָּרוּצָה.
  - La elección 'Con razón' para מֵישָׁרִים deja abierta la lectura alternativa 'los rectos'.
  - La nota a sobre atracción usa una formulación breve y no invade el texto principal con explicaciones innecesarias.
