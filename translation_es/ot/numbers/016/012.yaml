translation:
  language: es
  text: 'Entonces Moisés envió a llamar a Datán y Abiram[a], hijos de Eliab, pero ellos dijeron: «No subiremos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No iremos a subir». El verbo hebreo significa literalmente «subir/ascender» y puede referirse a ir hasta donde está Moisés o presentarse ante él cuando los llamaron.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió a llamar
  lexicon: HALOT
  rationale: El hebreo indica que Moisés inicia la convocatoria enviando un mensaje o recado para hacerlos venir. «Envió» conserva la acción base sin añadir un medio no explicitado; la construcción española «envió a llamar» comunica bien la función de la acción en contexto.
- source_word: לִקְרֹא
  english_pob_choice: to summon
  chosen_spanish: a llamar
  alternatives_spanish:
  - a convocar
  - a citar
  lexicon: HALOT
  rationale: קרא con ל + persona expresa una llamada dirigida a personas concretas, con fuerza de citación o convocatoria. En español, «a llamar» en la expresión fija «envió a llamar» mantiene naturalidad y el valor de convocatoria sin sobrerreformular.
- source_word: דָתָן וַאֲבִירָם
  english_pob_choice: Dathan and Abiram
  chosen_spanish: Datán y Abiram
  alternatives_spanish:
  - Datan y Abiram
  lexicon: standard transliteration
  rationale: Se transliteran los nombres propios; se añade tilde en «Datán» para adaptación ortográfica española y pronunciación clara, sin alterar la identificación del nombre.
- source_word: בְּנֵי אֱלִיאָב
  english_pob_choice: the sons of Eliab
  chosen_spanish: hijos de Eliab
  alternatives_spanish:
  - los hijos de Eliab
  - descendientes de Eliab
  lexicon: HALOT
  rationale: La relación filial es literal y appositiva, identificando a Datán y Abiram. «Hijos de Eliab» reproduce esa identificación de manera directa y natural en español.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: but they said
  chosen_spanish: pero ellos dijeron
  alternatives_spanish:
  - y dijeron
  - entonces dijeron
  lexicon: HALOT
  rationale: El waw-consecutivo puede ser simple coordinación, pero el contexto es de rechazo a la convocatoria. «Pero» conserva la oposición discursiva señalada por la audit trail inglesa; «ellos» explicita el referente y evita ambigüedad.
- source_word: לֹא נַעֲלֶה
  english_pob_choice: We will not come up
  chosen_spanish: No subiremos
  alternatives_spanish:
  - No iremos allá arriba
  - No iremos a subir
  lexicon: HALOT
  rationale: עלה significa literalmente «subir/ascender». La negativa expresa una negativa volitiva futura; «No subiremos» preserva la imagen espacial y la decisión de no acudir. La posible referencia a subir al lugar de Moisés queda implícita, como en el hebreo.
translation_notes:
  revision_awareness: El inglés POB mantiene la opción «We will not come up» y anota la alternativa literal «go up» por el valor espacial de עלה. La versión española conserva esa misma tensión semántica con «No subiremos», y la nota explica la posible referencia a acudir ante Moisés o subir a su lugar.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto la requiera; este verso no contiene el tetragrámaton.
  - «No subiremos» conserva la metáfora direccional sin resolverla en una paráfrasis más explícita.
  - Se usó «pero» para reflejar la oposición contextual que el POB inglés ya documenta.
