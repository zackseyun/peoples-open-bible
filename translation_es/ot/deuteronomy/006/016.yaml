translation:
  language: es
  text: No pondrán a prueba a Yahvé su Dios,[a] como lo pusieron a prueba en Masah.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No probarán a Yahvé su Dios».'
    reason: lexical_alternative
  - marker: b
    text: Masah fue el lugar donde Israel puso a prueba a Yahvé en el desierto (Éxodo 17:1–7); el nombre se relaciona con la idea de «prueba».
    reason: cross_reference
lexical_decisions:
- source_word: לֹא / תְנַסּוּ
  english_pob_choice: shall not test
  chosen_spanish: No tentarás
  alternatives_spanish:
  - No pondrás a prueba
  - No probarás
  - No tentarás a Yahvé
  lexicon: HALOT
  rationale: En español, 'tentar' conserva con naturalidad el valor de 'poner a prueba' en un contexto prohibitivo y mantiene el vínculo léxico con el verbo repetido en la referencia histórica. 'Poner a prueba' es posible, pero 'tentar' es más directo y bíblicamente reconocible sin perder fidelidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la transliteración usada por el proyecto en español, conforme a la convención del POB para יְהוָה.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - su Dios
  - tu Dios, que es Dios
  lexicon: HALOT
  rationale: El sufijo de 2ª persona plural en hebreo queda naturalizado en español con el singular de trato reverencial/no marcado 'tu' en el enunciado directivo, manteniendo la referencia al destinatario colectivo de forma idiomática.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: '''Como'' expresa con claridad la comparación histórica sin añadir matiz interpretativo.'
- source_word: נִסִּיתֶם
  english_pob_choice: you tested
  chosen_spanish: lo tentaste
  alternatives_spanish:
  - lo pusiste a prueba
  - lo probaste
  lexicon: HALOT
  rationale: Se mantiene el mismo verbo español ('tentar') para reflejar la repetición léxica del hebreo entre la prohibición y el recuerdo histórico. El pronombre 'lo' evita repetir el objeto explícito y es idiomático en español, aunque el antecedente sea Yahvé.
- source_word: בַּמַּסָּה
  english_pob_choice: at Massah
  chosen_spanish: en Masah
  alternatives_spanish:
  - en Massah
  - en la prueba
  lexicon: HALOT
  rationale: Se translitera el topónimo como 'Masah' en español para preservar el nombre propio bíblico; 'en la prueba' aclararía el sentido etimológico pero introduciría una glosa interpretativa en el cuerpo del verso.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la política del POB de preservar el nombre personal de Dios en vez de sustituirlo por un título. 'Yahvé' es la forma establecida en el proyecto en español y evita el reemplazo litúrgico de 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alusión histórica a Éxodo 17:1–7
  english_pob_reading: Keep the historical reference as 'at Massah' without expanding it
  chosen_spanish_reading: Mantener 'en Masah' sin glosa en el cuerpo principal
  alternative_spanish_readings:
  - en Masah, lugar de prueba
  - en el lugar de la prueba
  rationale: El hebreo nombra el lugar; ampliar el sintagma en el texto principal añadiría explicación que el verso no formula explícitamente. La nota permite conservar la alusión sin sobreinterpretar.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo y la decisión auditada del POB en inglés: imperativo/prohibición con el mismo verbo para la comparación histórica, nombre divino preservado como Yahvé, y topónimo transliterado sin expansión en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה en coherencia con los estándares del proyecto.
  - Se conserva la repetición verbal entre 'tentarás' y 'tentaste' para reflejar la conexión léxica del hebreo נסה.
  - '''Masah'' se translitera de manera uniforme como topónimo propio, no como glosa semántica en el cuerpo del verso.'
  - El singular 'tu' funciona en español como dirección directa al pueblo destinatario sin perder la referencia colectiva del hebreo.
