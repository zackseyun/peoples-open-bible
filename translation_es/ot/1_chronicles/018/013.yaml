    rationale: Una nota de alternativa léxica no debe repetir la misma opción del texto; debe ofrecer alternativas reales como «puestos militares» o «prefectos/gobernadores» según el caso.
  - severity: medium
    issue: «Todo Edom quedó sometido a David» es aceptable, pero diluye el valor léxico de עֲבָדִים y suena algo abstracto.
    rationale: El hebreo habla de condición de servidumbre/subordinación. En español conviene una formulación más explícita o una nota más precisa. «Todos los edomitas quedaron sometidos a David» mejora la naturalidad al hacer explícita la metonimia.
