translation:
  language: es
  text: 'Y mandó también al segundo, también al tercero, y a todos los que iban detrás de las manadas, diciendo: «Conforme a esta palabra le hablarán a Esaú cuando lo encuentren[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así le dirán a Esaú cuando lo encuentren». El hebreo puede expresarse de forma más idiomática, pero el texto principal conserva el enlace con la formulación exacta del mensaje prescrito por Jacob.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: he commanded
  chosen_spanish: instruyó
  alternatives_spanish:
  - mandó
  - ordenó
  lexicon: HALOT
  rationale: El piel de צוה expresa dar una orden o encargo. En español, «instruyó» mantiene el valor directivo sin sonar tan rígido como «ordenó», y sigue la intención de la POB inglesa de preservar la fuerza de la acción.
- source_word: הַשֵּׁנִי
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el segundo uno
  - el segundo siervo
  lexicon: HALOT
  rationale: El hebreo usa un ordinal sustantivado; «el segundo» reproduce la forma breve sin añadir un sustantivo no presente en el texto.
- source_word: הַשְּׁלִישִׁי
  english_pob_choice: the third
  chosen_spanish: el tercero
  alternatives_spanish:
  - el tercer hombre
  - el tercero de ellos
  lexicon: HALOT
  rationale: Como con «el segundo», el ordinal funciona como sustantivo. «El tercero» conserva la concisión y evita precisar más de lo que el hebreo dice.
- source_word: כָּל הַהֹלְכִים אַחֲרֵי הָעֲדָרִים
  english_pob_choice: all those going behind the droves
  chosen_spanish: a todos los que iban detrás de las manadas
  alternatives_spanish:
  - a todos los que seguían detrás de los rebaños
  - a todos los que iban detrás de las tropas
  lexicon: HALOT
  rationale: El participio con כל denota el conjunto que sigue; «iban detrás» conserva el sentido progresivo del movimiento. «Manadas» comunica bien el contexto animal en español, aunque «rebaños» también es posible.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La fórmula introductoria de discurso directo se vierte naturalmente como «diciendo», manteniendo el enlace con la cita sin sobre-interpretarla.
- source_word: כַּדָּבָר הַזֶּה
  english_pob_choice: According to this word
  chosen_spanish: Conforme a esta palabra
  alternatives_spanish:
  - De acuerdo con esta palabra
  - Así
  lexicon: HALOT
  rationale: Se preserva la referencia formal al «palabra/mensaje» del hebreo. «Conforme a esta palabra» mantiene el vínculo con el enunciado previo, tal como la POB inglesa conserva la orientación al texto literal.
- source_word: תְּדַבְּרוּן
  english_pob_choice: you shall speak
  chosen_spanish: hablarán
  alternatives_spanish:
  - dirán
  - ustedes hablarán
  lexicon: HALOT
  rationale: 'El verbo דבר es «hablar». En español, el futuro simple plural puede expresar mandato indirecto en estilo de cita: «hablarán». Se evita «dirán» porque debilita el eco verbal del hebreo y del inglés POB.'
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esau
  lexicon: N/A
  rationale: Se usa la forma española estándar del nombre propio bíblico.
- source_word: בְּמֹצַאֲכֶם אֹתוֹ
  english_pob_choice: when you find him
  chosen_spanish: cuando lo encuentren
  alternatives_spanish:
  - cuando lo hallen
  - cuando se encuentren con él
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo de מצא puede ser idiomática en español como circunstancia temporal. «Lo encuentren» sigue el sentido de hallar/alcanzar a alguien; «se encuentren con él» introduce un matiz más interpretativo.
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el texto hebreo y el audit trail inglés: mantiene la sucesión de destinatarios, el marcador de discurso directo y la construcción formal «conforme a esta palabra», sin añadir elementos explicativos que el original no requiere. No se registran revisiones aplicadas en el pasaje base.'
  spanish_consistency_notes:
  - Se mantiene «Esaú» para el nombre propio, conforme al uso bíblico en español.
  - Se traduce el complemento temporal de modo natural con «cuando lo encuentren», sin sustituir el matiz de hallazgo del verbo hebreo.
  - La opción «manadas» es funcional para el contexto zoológico; en contexto narrativo bíblico también sería viable «rebaños», pero aquí «manadas» conserva bien la imagen de grupos que avanzan en secuencia.
