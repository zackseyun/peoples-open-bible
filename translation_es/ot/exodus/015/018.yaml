- from: Yahvé reinará[a] por siempre y para siempre.
  to: Yahvé[a] reinará por siempre jamás.
  rationale: Se reubica la nota al nombre divino, que es el verdadero objeto de la aclaración, y se sustituye la frase temporal redundante por «por siempre jamás», una expresión española natural que conserva la intensificación de «forever and ever».
