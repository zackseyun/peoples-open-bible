translation:
  language: es
  text: Señor[a], mira hacia abajo desde tu santa casa y fíjate en nosotros; inclina tu oído, Señor, y oye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde tu santo templo». El griego dice literalmente «desde tu santa casa».
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Oh Señor
  - Señor mío
  lexicon: BDAG
  rationale: El vocativo κύριε se vierte de manera natural y reverente como «Señor» en español. Se omite «oh» porque el español actual lo suele considerar más marcado o arcaizante, y la forma simple conserva la dirección de la plegaria.
- source_word: κάτιδε
  english_pob_choice: look down
  chosen_spanish: mira desde
  alternatives_spanish:
  - mira hacia abajo desde
  - contempla desde
  lexicon: LSJ
  rationale: El griego añade la idea de mirar desde arriba. «Mira desde» conserva la orientación vertical sin sonar forzado en español; la dimensión de descenso implícita queda reforzada por el complemento siguiente.
- source_word: ἐκ τοῦ οἴκου τοῦ ἁγίου σου
  english_pob_choice: from your holy house
  chosen_spanish: desde tu casa santa
  alternatives_spanish:
  - desde tu casa sagrada
  - desde tu santo palacio
  - desde tu santo templo
  lexicon: LSJ
  rationale: Se mantiene οἶκος como «casa», no como «templo», porque el texto griego dice literalmente «casa». «Casa santa» preserva la imagen del lugar santo de morada divina sin imponer un término más específico que el original.
- source_word: ἐννόησον εἰς ἡμᾶς
  english_pob_choice: take notice of us
  chosen_spanish: atiéndenos
  alternatives_spanish:
  - tennos en cuenta
  - fíjate en nosotros
  - pon atención a nosotros
  lexicon: LSJ / BDAG
  rationale: ἐννόησον expresa atención efectiva, no solo comprensión mental. «Atiéndenos» comunica esa postura de consideración activa y funciona con naturalidad en una súplica litúrgica.
- source_word: κλῖνον
  english_pob_choice: incline
  chosen_spanish: inclina
  alternatives_spanish:
  - dobla
  - vuelve
  lexicon: LSJ
  rationale: «Inclina» preserva la metáfora bíblica tradicional de inclinarse para oír, y en español suena solemne sin volverse opaco.
- source_word: τὸ οὖς σου
  english_pob_choice: your ear
  chosen_spanish: tu oído
  alternatives_spanish:
  - tu oreja
  - tu oído atento
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «tu oído» singular, en español «oído» comunica mejor la metáfora de escuchar que «oreja», que resulta más corporal y menos elevada en este contexto.
- source_word: ἄκουσον
  english_pob_choice: hear
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - escúchanos
  lexicon: BDAG
  rationale: «Oye» es la forma breve y directa del imperativo, adecuada para la estructura paralela del versículo. «Escucha» también sería posible, pero «oye» conserva mejor la sobriedad del mandato final.
theological_decisions:
- issue: Si traducir οἶκος como «casa» o interpretarlo como «templo»
  english_pob_reading: from your holy house
  chosen_spanish_reading: desde tu casa santa
  alternative_spanish_readings:
  - desde tu santo templo
  rationale: 'Se conserva la menor especificidad del griego: οἶκος. «Casa santa» mantiene la tensión auditable entre el término literal y la referencia cultual implícita, sin sustituirla por un equivalente interpretativo más preciso de lo que el texto exige.'
  doctrine_reference: Translation philosophy §§1, 5
- issue: Cómo expresar la imagen de Dios escuchando la oración
  english_pob_reading: incline your ear
  chosen_spanish_reading: inclina tu oído
  alternative_spanish_readings:
  - inclina tu oreja
  - vuelve tu oído hacia nosotros
  rationale: La metáfora se conserva casi de manera literal porque forma parte del lenguaje bíblico de súplica. «Inclina tu oído» mantiene la imagen corporal reverente y evita una paráfrasis que debilite el paralelismo del texto.
  doctrine_reference: Translation philosophy §§5, 6
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la revisión más reciente; el acuerdo de revisión fue total y no hubo enmiendas aplicadas. La redacción española sigue la misma lectura base, preservando las decisiones léxicas documentadas y su tensión entre literalidad y claridad.
  spanish_consistency_notes:
  - Se mantiene «Señor» para Κύριε, coherente con el tono vocativo de oración.
  - Se conserva «casa» en lugar de «templo» en el cuerpo principal, con nota para la alternativa interpretativa.
  - El paralelismo imperativo se refleja con «mira... y atiéndenos; inclina... y oye».
  - Se usa vocabulario sobrio y litúrgico sin recurrir a fórmulas eclesiásticas no exigidas por el griego.
