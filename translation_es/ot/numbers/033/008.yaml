translation:
  language: es
  text: Salieron de delante de Hahirot[a] y pasaron por en medio del mar hacia el desierto, e hicieron un viaje de tres días[b] en el desierto de Etam y acamparon en Mará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de delante de Hahirot». En Éxodo, el lugar suele aparecer como «Pi-hahirot»; aquí Números 33:8 no incluye el elemento «Pi-», por lo que se mantiene la forma breve en vez de armonizarla.'
    reason: alternative_reading
  - marker: b
    text: 'O: «anduvieron tres días de camino en el desierto de Etam».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Partieron
  - Se pusieron en marcha
  lexicon: HALOT
  rationale: נסע en relatos de itinerario expresa la salida de un campamento o punto de partida. «Salieron» comunica bien ese movimiento inicial en español natural sin perder la idea de desplazamiento ordenado.
- source_word: מִפְּנֵי הַחִירֹת
  english_pob_choice: from before Hahiroth
  chosen_spanish: de delante de Hahirot
  alternatives_spanish:
  - desde Hahirot
  - de ante Hahirot
  lexicon: HALOT
  rationale: La expresión hebrea usa מִפְּנֵי, literalmente «de delante de». Se conserva el sentido espacial del original y, siguiendo la política del proyecto, se translitera el nombre como Hahirot, sin armonizarlo con Pi-hahiroth.
- source_word: וַיַּעַבְרוּ בְתוֹךְ הַיָּם
  english_pob_choice: passed through the midst of the sea
  chosen_spanish: pasaron por en medio del mar
  alternatives_spanish:
  - cruzaron en medio del mar
  - pasaron por el centro del mar
  lexicon: HALOT
  rationale: עבר con בתוך destaca el paso a través de algo. «Pasaron por en medio del mar» conserva la imagen de atravesarlo, y «por en medio» reproduce con naturalidad la fuerza de בתוך.
- source_word: הַמִּדְבָּרָה
  english_pob_choice: into the wilderness
  chosen_spanish: hacia el desierto
  alternatives_spanish:
  - al desierto
  - hacia el desierto
  lexicon: HALOT
  rationale: El he local direccional sugiere movimiento hacia el lugar. En español, «hacia el desierto» expresa ese matiz sin forzar una preposición demasiado literal.
- source_word: וַיֵּלְכוּ דֶּרֶךְ שְׁלֹשֶׁת יָמִים
  english_pob_choice: they went a three-day journey
  chosen_spanish: caminaron una jornada de tres días
  alternatives_spanish:
  - hicieron un camino de tres días
  - anduvieron tres días de camino
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y no significa solo duración, sino recorrido. «Una jornada de tres días» preserva esa idiomaticidad y suena digna en español bíblico contemporáneo.
- source_word: בְּמִדְבַּר אֵתָם
  english_pob_choice: in the wilderness of Etham
  chosen_spanish: en el desierto de Etam
  alternatives_spanish:
  - en el desierto de Etham
  - en Etam, el desierto
  lexicon: HALOT
  rationale: Se traduce el sustantivo genérico como «desierto» y se translitera el nombre propio como Etam. Esto refleja la cadena constructa sin sobreexplicarla.
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon
  - levantaron el campamento
  lexicon: HALOT
  rationale: חנה en listas de viaje indica establecer campamento. «Acamparon» es claro y fiel al registro itinerario del pasaje.
- source_word: בְּמָרָה
  english_pob_choice: at Marah
  chosen_spanish: en Mará
  alternatives_spanish:
  - en Marah
  - en Mará
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado como Mará, con acento para lectura española. «En» funciona naturalmente con un lugar de parada en español.
theological_decisions:
- issue: Nombre divino ausente; topónimos y narrativa de itinerario
  english_pob_reading: No theological decision was noted in the English audit trail.
  chosen_spanish_reading: No se introduce ninguna interpretación teológica adicional; se conserva el carácter narrativo e itinerario del versículo.
  alternative_spanish_readings:
  - espiritualizar los lugares o el recorrido
  - armonizar el topónimo con formas más conocidas
  rationale: El hebreo presenta una simple secuencia de movimientos y campamento. La traducción evita cargar el texto con sentidos devocionales no documentados por la fuente.
  doctrine_reference: Números 33:8; principio de sobriedad textual
- issue: Topónimo Hahirot sin elemento Pi-
  english_pob_reading: The shorter form is retained rather than harmonized.
  chosen_spanish_reading: Se conserva Hahirot sin añadir Pi- ni normalizarlo con Éxodo.
  alternative_spanish_readings:
  - Pi-hahirot
  - de delante de Pi-hahirot
  rationale: La forma hebrea de Números 33:8 carece del elemento פי presente en Éxodo. Mantener la forma corta respeta la evidencia textual y hace visible la variante.
  doctrine_reference: Crítica textual / consistencia intrabíblica
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del contexto inglés, que prefirió «a three-day journey» por ser más natural y exacto que la formulación anterior. En español se reflejó con «una jornada de tres días».
  spanish_consistency_notes:
  - Se usó «desierto» para traducir מִדְבָּר, manteniendo el valor geográfico amplio del término.
  - Se transliteraron los nombres propios Hahirot, Etam y Mará siguiendo la práctica del proyecto.
  - Se evitó «SEÑOR» u otra sustitución teológica, ya que en este versículo no aparece el tetragrámaton ni un título divino relevante.
