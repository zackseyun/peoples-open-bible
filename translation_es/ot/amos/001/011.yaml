translation:
  language: es
  text: 'Así dice Yahvé: «Por tres transgresiones de Edom[a], y por cuatro, no revocaré su castigo, porque persiguió con espada a su hermano[b] y destruyó su compasión; su ira desgarró continuamente[c], y guardó su furor para siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No lo haré volver», es decir, no revertiré el juicio anunciado.'
    reason: lexical_alternative
  - marker: b
    text: «Su hermano» probablemente evoca el parentesco de Edom con Israel por medio de Esaú y Jacob.
    reason: cross_reference
  - marker: c
    text: 'O: «desgarró perpetuamente en su ira, y guardó su furor para siempre». El hebreo usa una imagen vívida de desgarro predatorio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal del Tetragrámaton con la forma española establecida en el proyecto, en lugar de ocultarlo con una sustitución de título.
- source_word: פִּשְׁעֵי
  english_pob_choice: transgressions
  chosen_spanish: rebeliones
  alternatives_spanish:
  - transgresiones
  - crímenes
  lexicon: HALOT
  rationale: En la fórmula profética de Amós, פֶּשַׁע/פִּשְׁעֵי expresa una culpa de ruptura rebelde y no solo una falta genérica; «rebeliones» comunica bien el peso covenantal y acusatorio en español.
- source_word: לֹא אֲשִׁיבֶנּוּ
  english_pob_choice: I will not revoke its punishment
  chosen_spanish: no revocaré su castigo
  alternatives_spanish:
  - no lo haré volver
  - no me retractaré de ello
  - no lo revertiré
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático de «hacer volver» que, en este contexto, apunta a no retirar el juicio anunciado. «No revocaré su castigo» explicita el objeto implícito sin alejarse del sentido idiomático.
- source_word: רָדְפוֹ
  english_pob_choice: he pursued
  chosen_spanish: persiguió
  alternatives_spanish:
  - perseguía
  - acosó
  - dio caza a
  lexicon: HALOT
  rationale: Se mantiene el verbo de persecución con fuerza hostil; en español «persiguió» conserva la imagen sin sobreinterpretar.
- source_word: בַחֶרֶב
  english_pob_choice: with the sword
  chosen_spanish: con espada
  alternatives_spanish:
  - con la espada
  - a filo de espada
  lexicon: HALOT
  rationale: La preposición y el sustantivo se traducen de forma directa y natural; se evita añadir artículos que no son necesarios en español bíblico contemporáneo.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su pariente
  - a su hermano de sangre
  lexicon: HALOT
  rationale: Se conserva el lenguaje familiar literal, que en el contexto profético evoca la relación Edom-Israel sin explicarla en el cuerpo del verso.
- source_word: רַחֲמָיו
  english_pob_choice: his compassion
  chosen_spanish: su compasión
  alternatives_spanish:
  - sus entrañas de compasión
  - su misericordia
  - su piedad
  lexicon: HALOT
  rationale: רַחֲמִים expresa compasión/piedad entrañable. «Compasión» es claro y digno en español; se evita una paráfrasis excesiva, aunque el hebreo conserve un matiz visceral.
- source_word: וַיִּטְרֹף
  english_pob_choice: his anger tore continually
  chosen_spanish: su ira lo desgarró continuamente
  alternatives_spanish:
  - su ira desgarró continuamente
  - su ira lo devoró continuamente
  - su furor lo atacó sin cesar
  lexicon: HALOT
  rationale: Se preserva la imagen predatoria del verbo «desgarrar» y el valor adverbial de לָעַד con «continuamente». El sujeto implícito y el objeto pronominal mantienen la tensión retórica del hebreo.
- source_word: אַפּוֹ
  english_pob_choice: his anger
  chosen_spanish: su ira
  alternatives_spanish:
  - su enojo
  - su furia
  - su nariz
  lexicon: HALOT
  rationale: En el idioma profético, אַף significa ira/enojo; «ira» ofrece un registro elevado y fiel en español.
- source_word: עֶבְרָתוֹ
  english_pob_choice: his wrath
  chosen_spanish: su furor
  alternatives_spanish:
  - su ira
  - su cólera
  - su furia
  lexicon: HALOT
  rationale: Se reserva «furor» para reproducir el segundo término intensivo de غضb/ira en el paralelismo hebreo, diferenciándolo de אַף y manteniendo la progresión semántica.
- source_word: שְׁמָרָה נֶצַח
  english_pob_choice: he kept his wrath forever
  chosen_spanish: guardó su furor para siempre
  alternatives_spanish:
  - mantuvo su furor para siempre
  - conservó su furor para siempre
  lexicon: HALOT
  rationale: שׁמר aquí implica conservar o retener; «guardó» es una forma natural y suficientemente fuerte en español. «Para siempre» traduce נֶצַח con claridad y sostiene la acusación de rencor persistente.
theological_decisions:
- issue: Sujeto singular para Edom frente a una nación colectiva
  english_pob_reading: Retain singular masculine pronouns ('he,' 'his') while naming Edom as a nation.
  chosen_spanish_reading: 'Mantener el singular en la personificación: «persiguió», «su hermano», «su compasión», «su ira», «su furor».'
  alternative_spanish_readings:
  - 'usar plural colectivo: «persiguieron... destruyeron...»'
  - 'usar neutro nacional: «Edom persiguió... su ira...»'
  rationale: El hebreo personifica a la nación con verbos y pronombres singulares. Conservar esa personificación en español preserva el tono acusatorio profético y la cohesión retórica del pasaje.
  doctrine_reference: Notas de consistencia terminológica del proyecto y principio de fidelidad a la personificación textual
- issue: Sentido del giro לֹא אֲשִׁיבֶנּוּ
  english_pob_reading: I will not revoke its punishment
  chosen_spanish_reading: no revocaré su castigo
  alternative_spanish_readings:
  - no lo haré volver
  - no me retractaré de ello
  - no revertiré el juicio
  rationale: La expresión hebrea tiene fuerza idiomática de no retirar la sentencia. En español, «revocar su castigo» comunica la decisión judicial de Yahvé sin borrar la tensión semántica del giro original.
  doctrine_reference: Jeremías 18:8 como trasfondo conceptual de reversión del juicio, y fórmula oracular de Amós
- issue: Imágenes de ira y furor en los dos hemistiquios finales
  english_pob_reading: his anger tore continually, and he kept his wrath forever
  chosen_spanish_reading: su ira lo desgarró continuamente, y guardó su furor para siempre
  alternative_spanish_readings:
  - su ira desgarró continuamente, y guardó su furor para siempre
  - su furia lo desgarró sin cesar, y conservó su furor para siempre
  rationale: Se conserva la dureza de la imagen predatoria y el paralelismo de intensificación entre אַף y עֶבְרָה. La formulación evita suavizar el agravio y mantiene la carga moral del texto.
  doctrine_reference: Poética profética hebrea y paralelismo semántico
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que afinó וַיִּטְרֹף לָעַד אַפּוֹ hacia un valor más natural de acción continua («tore continually») sin perder la imagen de desgarro. La versión española refleja esa misma decisión con «desgarró continuamente», evitando una paráfrasis más débil y manteniendo el segundo hemistiquio como retención permanente del furor.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se evita «Cristo» porque no aparece en el texto fuente.
  - Se conserva la distinción entre «ira» (אַף) y «furor» (עֶבְרָה) para no aplanar el paralelismo.
  - «Compasión» traduce רַחֲמִים con un registro claro y digno; no se opta por una paráfrasis como «entranas» en el texto principal.
  - Los pronombres singulares mantienen la personificación de Edom sin convertirla en plural colectivo.
