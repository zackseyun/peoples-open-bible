revisions:
- from: El temor de Yahvé añade días[a], pero los años de los malvados serán acortados.
  to: El temor de Yahvé añade días[a], pero los años de los impíos se acortarán.
  rationale: Se ajusta el segundo hemistiquio para una formulación más natural y proverbial en español («se acortarán») y se adopta «los impíos» como opción más propia del registro sapiencial para רְשָׁעִים, sin cambiar el sentido del original ni las decisiones teológicas del POB. La nota existente se conserva sin cambios porque sigue siendo exacta y útil.
