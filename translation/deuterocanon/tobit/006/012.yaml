translation:
  text: I will speak about her[a], so that she may be given to you as a wife, because her inheritance falls to you, and you alone are from her family[b]; and the young woman is beautiful and sensible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'her inheritance belongs to you' or 'the right to her inheritance devolves upon you.' The Greek expresses a legal claim or obligation tied to kinship.
    reason: lexical_alternative
  - marker: b
    text: Or, 'you alone are of her kin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαλήσω περὶ αὐτῆς
  chosen: I will speak about her
  alternatives:
  - I will speak concerning her
  - I will speak on her behalf
  lexicon: BDAG
  rationale: Future of λαλέω with περὶ + genitive naturally means to speak about/concerning someone. 'On her behalf' is possible by implication in context, but the Greek states the act of speaking about her rather than explicitly advocating for her.
- source_word: τοῦ δοθῆναί σοι αὐτὴν εἰς γυναῖκα
  chosen: so that she may be given to you as a wife
  alternatives:
  - for her to be given to you as wife
  - that she be given to you for a wife
  lexicon: BDAG
  rationale: The articular infinitive with τοῦ expresses purpose/result in relation to the preceding speech. 'As a wife' is idiomatic modern English for εἰς γυναῖκα while preserving the marital sense without archaic phrasing.
- source_word: σοὶ ἐπιβάλλει ἡ κληρονομία αὐτῆς
  chosen: her inheritance falls to you
  alternatives:
  - her inheritance belongs to you
  - the right to her inheritance devolves upon you
  lexicon: BDAG
  rationale: ἐπιβάλλει here conveys that the inheritance legally falls upon or comes to the addressee. 'Falls to you' preserves the juridical sense in readable English better than the flatter 'belongs to you.'
- source_word: σὺ μόνος εἶ ἐκ τοῦ γένους αὐτῆς
  chosen: you alone are from her family
  alternatives:
  - you alone are of her kin
  - you alone are from her lineage
  lexicon: BDAG
  rationale: γένος denotes family, kin, or lineage. 'From her family' is natural English and fits the marriage-and-inheritance context. 'Kin' is slightly more formal; 'lineage' sounds narrower and more abstract.
- source_word: τὸ κοράσιον
  chosen: the young woman
  alternatives:
  - the girl
  - the maiden
  lexicon: BDAG
  rationale: κοράσιον can mean girl/young woman. Given marriageable context, 'young woman' avoids sounding childish while remaining age-appropriate. 'Maiden' is archaic.
- source_word: καλὸν
  chosen: beautiful
  alternatives:
  - good-looking
  - fair
  lexicon: BDAG
  rationale: In context of describing the prospective bride, καλός refers to attractiveness or beauty. 'Beautiful' is clear and dignified.
- source_word: φρόνιμόν
  chosen: sensible
  alternatives:
  - prudent
  - wise
  - intelligent
  lexicon: BDAG
  rationale: φρόνιμος denotes practical wisdom, good judgment, prudence. 'Sensible' communicates this in contemporary English without overstating philosophical wisdom.
