translation:
  language: es
  text: Quien ama la plata no se saciará de plata[a], ni quien ama la abundancia[b] con ganancia; también esto es vapor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Quien ama la riqueza no se satisface con ingresos». La segunda cláusula es sintácticamente difícil; «abundancia» también puede entenderse como «riqueza», y «ganancia» como «ingreso», «aumento» o «provecho».
    reason: alternative_reading
  - marker: b
    text: O «riqueza». El hebreo puede referirse a abundancia, riqueza o gran cantidad.
    reason: alternative_reading
  - marker: c
    text: Hebreo «vapor» (tradicionalmente «vanidad»); un término recurrente en Eclesiastés para lo fugaz, elusivo o insustancial.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹהֵב
  english_pob_choice: whoever loves
  chosen_spanish: Quien ama
  alternatives_spanish:
  - El que ama
  - Todo el que ama
  lexicon: HALOT
  rationale: El participio funciona de modo general para cualquier persona caracterizada por ese amor. «Quien ama» conserva el valor genérico y suena natural en español actual.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  - riqueza
  lexicon: HALOT
  rationale: Como en el inglés POB, se retiene el metal literal que funciona metonímicamente por riqueza. «Plata» mantiene la repetición poética y la imagen del hebreo.
- source_word: יִשְׂבַּע
  english_pob_choice: will not be satisfied
  chosen_spanish: no se saciará
  alternatives_spanish:
  - no quedará satisfecho
  - no tendrá bastante
  lexicon: HALOT
  rationale: El verbo comunica saciedad/insaciabilidad. «No se saciará» es idiomático en español y conserva la fuerza del original.
- source_word: וּמִי
  english_pob_choice: nor whoever
  chosen_spanish: ni quien
  alternatives_spanish:
  - y quien
  - o quien
  lexicon: HALOT
  rationale: La secuencia introduce un paralelismo, no una pregunta literal. «Ni quien» reproduce esa relación coordinada con el primer hemistiquio.
- source_word: בֶּהָמוֹן
  english_pob_choice: abundance
  chosen_spanish: abundancia
  alternatives_spanish:
  - riqueza
  - multitud
  - mucho
  lexicon: HALOT
  rationale: El término puede abarcar abundancia o riqueza. «Abundancia» preserva el rango semántico sin concretar demasiado el referente.
- source_word: תְבוּאָה
  english_pob_choice: income
  chosen_spanish: ganancia
  alternatives_spanish:
  - ingreso
  - provecho
  - rendimiento
  lexicon: HALOT
  rationale: En este contexto sapiencial la palabra apunta a retorno o provecho económico. «Ganancia» expresa bien esa idea y evita una especificación contable demasiado moderna.
- source_word: הָבֶל
  english_pob_choice: vapor
  chosen_spanish: vapor
  alternatives_spanish:
  - vanidad
  - aliento
  - inconsistencia
  lexicon: HALOT
  rationale: Se conserva la metáfora de lo efímero e insustancial que el POB inglés quiso preservar con «vapor», en vez de la interpretación tradicional «vanidad».
theological_decisions:
- issue: Sentido del refrán הָבֶל en Eclesiastés
  english_pob_reading: vapor
  chosen_spanish_reading: vapor
  alternative_spanish_readings:
  - vanidad
  - vacío
  - lo pasajero
  rationale: No se reduce el término a una abstracción moral; se mantiene la imagen de fugacidad e insustancialidad que atraviesa Eclesiastés.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el criterio óptimo-equivalente del POB inglés. Se preserva la ambigüedad del segundo hemistiquio con una formulación española natural, sin eliminar la dificultad sintáctica documentada. No hay revisiones adicionales aplicadas en el expediente inglés.
  spanish_consistency_notes:
  - Se usa «plata» como equivalente principal de כֶּסֶף, en coherencia con la decisión inglesa de retener el metal literal.
  - Se evita «SEÑOR» u otras convenciones no pertinentes; no hay vocabulario divino en el versículo.
  - «Vapor» se mantiene como término técnico recurrente de Eclesiastés para הָבֶל.
  - «Ganancia» comunica el valor económico de תְבוּאָה sin forzar «ingreso» como tecnicismo moderno.
  - La estructura paralela se conserva con dos hemistiquios y la cláusula final refrénica.
