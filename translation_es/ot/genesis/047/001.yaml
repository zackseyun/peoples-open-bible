base_translation:
  language: en
  yaml_path: translation/ot/genesis/047/001.yaml
  text: Then Joseph went in and told Pharaoh[a], “My father and my brothers, with their flocks and their herds and all that they have, have come from the land of Canaan; and behold[c][b], they are in the land of Goshen.”
  footnotes:
  - marker: a
    text: Or “came from the land of Canaan.” The Hebrew perfect may be rendered as a simple past or as an English present perfect emphasizing their now-completed arrival.
    reason: lexical_alternative
  - marker: b
    text: Or “and here they are in the land of Goshen.”
    reason: lexical_alternative
  - marker: c
    text: Or 'and told Pharaoh, and said'.
    reason: previous_rendering
