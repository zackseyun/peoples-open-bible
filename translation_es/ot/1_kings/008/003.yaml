translation:
  language: es
  text: Y vinieron todos los ancianos de Israel, y los sacerdotes llevaron el arca[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el arca del pacto; el título completo no aparece en este versículo, pero se entiende por el contexto cercano.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - entraron
  lexicon: HALOT
  rationale: El verbo de movimiento en la secuencia narrativa se vierte naturalmente como «llegaron» en español. Mantiene la progresión del hebreo sin añadir la idea de entrar a un lugar específico.
- source_word: כֹּל זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: all the elders of Israel
  chosen_spanish: todos los ancianos de Israel
  alternatives_spanish:
  - todos los mayores de Israel
  - los ancianos de Israel, todos
  lexicon: HALOT
  rationale: «Ancianos» conserva el valor habitual de líderes/referentes mayores del grupo, y «todos» expresa el cuantificador כֹּל de forma directa y natural.
- source_word: וַיִּשְׂאוּ
  english_pob_choice: carried
  chosen_spanish: llevaron
  alternatives_spanish:
  - alzaron
  - portaron
  - cargaron
  lexicon: HALOT
  rationale: En español, «llevaron» comunica bien el acto de transportar el arca en contexto narrativo. Conserva la idea de movimiento/transporte sin sonar demasiado literal o arcaico.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  - los ministros
  lexicon: HALOT
  rationale: «Sacerdotes» es el equivalente directo y claro de כֹּהֲנִים. No hay base para ampliar o reinterpretar el grupo.
- source_word: אֶת הָאָרוֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca del pacto
  - el arca de la alianza
  lexicon: HALOT
  rationale: Se mantiene el sustantivo breve «arca», como en el texto hebreo y en la decisión inglesa POB, sin añadir el título completo que no aparece en este versículo.
theological_decisions:
- issue: Identificación implícita del arca
  english_pob_reading: That is, the ark of the covenant; the fuller title is not stated in this verse but is clear from the surrounding context.
  chosen_spanish_reading: el arca
  alternative_spanish_readings:
  - el arca del pacto
  - el arca de la alianza
  rationale: El hebreo solo dice «el arca». Como en el audit trail inglés, se conserva la forma breve y se deja que el contexto cercano identifique de cuál arca se trata, sin introducir un título no expresado aquí.
  doctrine_reference: Contexto narrativo de 1 Reyes 8; cf. uso inmediato del arca en el relato del templo
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior incluyendo los marcadores de nota exactamente en el texto español: [a] y [b]. No se añadieron notas sin anclaje.'
  spanish_consistency_notes:
  - 'Se mantuvo la terminología bíblica directa y sobria: «ancianos», «sacerdotes», «arca».'
  - Se evitó traducir mecánicamente con calcos como «y llegaron todos» si la sintaxis española no lo requería, pero se conservó el orden narrativo.
  - La frase final no amplía «arca» a «arca del pacto» en el texto principal, para respetar la economía del hebreo y la decisión inglesa auditada.
