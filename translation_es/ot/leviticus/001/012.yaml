revisions:
- from: Y lo cortará en sus piezas[a], con su cabeza y su grasa; y el sacerdote las acomodará sobre la leña que está sobre el fuego, que está sobre el altar.
  to: Y lo cortará en pedazos, con su cabeza y su grasa[a]; y el sacerdote los dispondrá sobre la leña que está sobre el fuego, que está sobre el altar.
  rationale: Se ajusta «lo cortará en sus piezas» a «lo cortará en pedazos» para un español natural y fiel al sentido sacrificial de נתח/נתחים. Se cambia «acomodará» por «dispondrá» para reflejar mejor el matiz cultual de ערך. También se corrige la concordancia pronominal a «los dispondrá», ya que el referente colectivo incluye «pedazos» y «cabeza»; la nota léxica sobre «grasa» se conserva y se ancla correctamente en el texto revisado.
