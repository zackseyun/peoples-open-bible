translation:
  language: es
  text: Tu fuego es frío para nosotros[a], tus catapultas[b] no son dolorosas, y tu violencia es impotente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘tu fuego nos resulta frío’. El griego ψυχρόν conserva una imagen paradójica; la frase expresa que el fuego del tirano resulta ineficaz para los mártires sin explicar de más la paradoja.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ‘tus instrumentos de tormento’. El griego καταπέλται literalmente significa ‘catapultas’, pero en este contexto puede referirse más ampliamente a instrumentos mecánicos de tortura.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ πῦρ σου
  english_pob_choice: your fire
  chosen_spanish: tu fuego
  alternatives_spanish:
  - tu llama
  - el fuego que usas
  lexicon: LSJ
  rationale: ‘Fuego’ conserva la imagen concreta del instrumento de tormento sin añadir explicación; ‘tu’ mantiene el tono de desafío directo al perseguidor.
- source_word: ψυχρὸν
  english_pob_choice: is cold
  chosen_spanish: nos es frío
  alternatives_spanish:
  - es frío para nosotros
  - nos resulta frío
  lexicon: LSJ
  rationale: En español, ‘nos es frío’ preserva el giro predicativo con un matiz breve y enérgico; comunica la paradoja sin suavizarla.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - para nosotros
  - a nosotros
  lexicon: LSJ
  rationale: El dativo griego se expresa naturalmente con complemento de interés en español; ‘nos’ mantiene la referencia personal directa.
- source_word: ἄπονοι
  english_pob_choice: painless
  chosen_spanish: inofensivas
  alternatives_spanish:
  - sin dolor
  - no dolorosas
  lexicon: LSJ
  rationale: Aunque el sentido literal es ‘sin dolor’, en español ‘inofensivas’ comunica con naturalidad que esos instrumentos no surten efecto ni causan sufrimiento, sin perder la fuerza retórica del pasaje.
- source_word: οἱ καταπέλται
  english_pob_choice: your catapults
  chosen_spanish: tus catapultas
  alternatives_spanish:
  - tus máquinas de tormento
  - tus aparatos de tormento
  lexicon: LSJ
  rationale: ‘Catapultas’ sigue de cerca el valor léxico básico del término griego y coincide con la decisión del POB inglés de retener la imagen concreta, dejando abierta la posible referencia a instrumentos de tortura.
- source_word: ἀδύνατος
  english_pob_choice: powerless
  chosen_spanish: impotente
  alternatives_spanish:
  - sin poder
  - débil
  - ineficaz
  lexicon: LSJ
  rationale: ‘Impotente’ expresa mejor en español la idea de falta de poder efectivo frente al agresor; mantiene el desafío declarativo del verso.
- source_word: ἡ βία σου
  english_pob_choice: your violence
  chosen_spanish: tu violencia
  alternatives_spanish:
  - tu fuerza
  - tu brutalidad
  lexicon: LSJ
  rationale: ‘Violencia’ reproduce bien el peso moral del término griego en este contexto de persecución, sin rebajarlo a ‘fuerza’.
theological_decisions:
- issue: Paradoja retórica del martirio frente al poder persecutorio
  english_pob_reading: Translate the imagery straightforwardly as a defiant claim that the tyrant's tortures are ineffective.
  chosen_spanish_reading: Mantener la afirmación paradójica de que el fuego, las catapultas y la violencia del perseguidor resultan ineficaces ante los mártires.
  alternative_spanish_readings:
  - Suavizar la paradoja con una expresión idiomática como ‘tu fuego parece frío’
  - Explicitar demasiado el sentido con ‘tu fuego no nos afecta’
  rationale: El verso no describe una temperatura física, sino la resistencia firme de los mártires. La traducción conserva la tensión sin resolverla ni explicarla en exceso.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica y retórica; no aplanar el pasaje.'
translation_notes:
  revision_awareness: El texto inglés revisado pasó de ‘cause no pain’ a ‘are painless’ para reflejar con mayor literalidad el predicado adjetival griego ἄπονοι. En español se siguió esa misma preferencia por una solución adjetival breve, aunque se adaptó a una formulación idiomática más natural en el orden copulativo del español.
  spanish_consistency_notes:
  - Se mantuvo ‘violencia’ para βία conforme al valor moral y persecutorio del contexto.
  - Se retuvo ‘catapultas’ como traducción base de καταπέλται, dejando en nota la posible ampliación semántica a instrumentos de tormento.
  - No se usó ‘Cristo’, ‘Señor’ ni terminología doctrinal ajena al pasaje; el texto se limita al contenido retórico del martirio.
