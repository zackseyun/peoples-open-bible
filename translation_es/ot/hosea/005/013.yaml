review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: Efraín/Judá perciben su condición, Efraín acude a Asiria y al rey Jareb, y ese poder no puede remediar la herida. Sin embargo, hay dos desalineaciones relevantes con la evidencia fuente y con la auditoría inglesa: (1) la nota [a] está anclada en ‘enfermedad’, pero corresponde a ‘rey Jareb’; (2) la cláusula final hebrea מָזוֹר exige mantener ‘herida/llaga’ más claramente, no sustituirla por ‘su mal’, ya que el POB inglés fijó ‘your wound’ y la decisión léxica documentada prioriza la metáfora de herida.'
  spanish_quality_summary: 'El español es mayormente claro y legible, pero ‘envió al rey Jareb’ puede leerse como si enviara al rey mismo; ‘envió al rey Jareb’ es posible, pero ‘mandó mensajeros al rey Jareb’ añadiría contenido no explícito. Mejor ‘envió a el rey’ no es idiomático, así que se puede conservar ‘envió al rey Jareb’. El problema principal de calidad es ‘quitar de ustedes su mal’, que suena menos natural y diluye la imagen corporal. ‘curarles la herida’ o ‘curar su herida’ es más claro y más fiel al ajuste final del POB inglés. También conviene concordar el pronombre objeto con el plural de לָכֶם: ‘sanarlos’ o, más natural, ‘curarlos’.'
  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos aquí. ‘Asiria’, ‘Efraín’, ‘Judá’ y ‘rey Jareb’ están bien. La decisión entre ‘sanar’ y ‘curar’ es contextual; para esta línea médica doble, ‘curar’ funciona mejor en español por paralelismo con ‘curar la herida’. La nota alternativa sobre Jareb debe trasladarse al lugar correcto.
  issues:
  - severity: high
    issue: Nota [a] anclada en la palabra equivocada
    rationale: La nota explica ‘Jareb’ como nombre/título alternativo, pero está puesta tras ‘enfermedad’. Eso rompe la trazabilidad y viola la disciplina de anclaje de notas.
  - severity: high
    issue: La cláusula final sustituye ‘herida’ por ‘su mal’
    rationale: El hebreo מָזוֹר y la auditoría inglesa preservan la imagen de herida/llaga. ‘su mal’ introduce una abstracción no necesaria y debilita la metáfora corporal.
  - severity: medium
    issue: La nota [b] justifica una opción menos fiel como texto principal
    rationale: Dado que la revisión inglesa ya resolvió la rareza verbal con ‘cure your wound’, el español principal debería seguir una solución igualmente natural y fiel, no relegarla a nota.
  revised_spanish_text: Cuando Efraín vio su enfermedad, y Judá su herida, entonces Efraín fue a Asiria y envió al rey Jareb[a]; pero él no puede curarlos, ni puede curar su herida.
  revised_footnotes:
