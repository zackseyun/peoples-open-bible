translation:
  language: es
  text: Sembrarán en el octavo año y comerán de la cosecha antigua hasta el noveno año; hasta que llegue la cosecha de ese año[a], comerán lo antiguo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo antiguo' también en la primera expresión. En hebreo, en ambos casos el texto dice simplemente 'viejo/antiguo', y el sustantivo se sobreentiende por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּזְרַעְתֶּם
  english_pob_choice: you shall sow
  chosen_spanish: Sembrarán
  alternatives_spanish:
  - Sembraréis
  - Ustedes sembrarán
  lexicon: HALOT
  rationale: En este contexto legal/instructivo, el verbo hebreo lleva sentido de mandato o instrucción futura. En español, el futuro simple comunica bien esa fuerza normativa sin añadir palabras innecesarias.
- source_word: הַשָּׁנָה הַשְּׁמִינִת
  english_pob_choice: the eighth year
  chosen_spanish: el año octavo
  alternatives_spanish:
  - el octavo año
  - en el octavo año
  lexicon: HALOT
  rationale: La expresión ordinal es directa; 'año octavo' suena natural en español bíblico y conserva el orden del hebreo.
- source_word: וַאֲכַלְתֶּם
  english_pob_choice: and eat
  chosen_spanish: y comerán
  alternatives_spanish:
  - y comerán ustedes
  - y ustedes comerán
  lexicon: HALOT
  rationale: Se mantiene la coordinación verbal y el valor instructivo/futuro del contexto. En español, el sujeto puede quedar implícito.
- source_word: מִן הַתְּבוּאָה
  english_pob_choice: from the produce
  chosen_spanish: del producto
  alternatives_spanish:
  - de la cosecha
  - del fruto
  lexicon: HALOT
  rationale: תְּבוּאָה designa la producción agrícola/cosecha. 'Producto' es suficientemente amplio y reproduce bien la idea de alimento almacenado o disponible de la cosecha anterior.
- source_word: יָשָׁן
  english_pob_choice: old
  chosen_spanish: viejo
  alternatives_spanish:
  - antiguo
  - del año pasado
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'viejo/antiguo', sin especificar 'grano'. 'Viejo' preserva la repetición y la concisión del original; no se introduce un sustantivo que el texto no dice explícitamente.
- source_word: עַד הַשָּׁנָה הַתְּשִׁיעִת
  english_pob_choice: until the ninth year
  chosen_spanish: hasta el año noveno
  alternatives_spanish:
  - hasta el noveno año
  - hasta la novena año
  lexicon: HALOT
  rationale: La marca temporal se traduce de forma directa y fluida, manteniendo el horizonte temporal del mandato.
- source_word: עַד בּוֹא תְּבוּאָתָהּ
  english_pob_choice: until its produce comes in
  chosen_spanish: hasta que llegue su producto
  alternatives_spanish:
  - hasta que entre su producto
  - hasta la llegada de su producto
  lexicon: HALOT
  rationale: בּוֹא significa 'venir/llegar'. En español, 'llegue' expresa naturalmente la disponibilidad de la nueva cosecha. 'Su producto' conserva el vínculo pronominal con el año recién mencionado.
- source_word: תְּבוּאָתָהּ
  english_pob_choice: its produce
  chosen_spanish: su producto
  alternatives_spanish:
  - el producto de ella
  - el producto de ese año
  lexicon: HALOT
  rationale: El sufijo femenino singular se entiende como referencia al año noveno. 'Su producto' es breve y preserva esa relación sin forzar una explicitación interpretativa.
- source_word: תֹּאכְל֖וּ יָשָֽׁן
  english_pob_choice: you shall eat the old
  chosen_spanish: comerán lo viejo
  alternatives_spanish:
  - comerán el viejo producto
  - comerán lo antiguo
  lexicon: HALOT
  rationale: 'El hebreo repite el adjetivo para subrayar la continuidad: seguirán comiendo lo almacenado/antiguo hasta que llegue lo nuevo. ''Lo viejo'' reproduce esa tersura y la repetición mejor que expandir con un sustantivo implícito.'
translation_notes:
  revision_awareness: Se siguió el sentido del hebreo masorético y se revisó el audit trail inglés. No se detectaron cambios de revisión posteriores; la redacción española conserva la tensión lexical de יָשָׁן sin explicitar 'grano' o 'cosecha' más allá de lo permitido por el contexto.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como término de proyecto cuando no aplica aquí por ausencia del nombre divino en el versículo.
  - Se mantuvo un registro sobrio y bíblico, evitando calcos excesivamente ingleses.
  - La nota al pie conserva la alternativa lexical documentada por POB sobre el adjetivo 'viejo'.
