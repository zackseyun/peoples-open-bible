translation:
  language: es
  text: Después de haber comido en Silo, y después de haber bebido, Ana se levantó. Y Elí el sacerdote estaba sentado en el asiento, junto a la jamba de la puerta del templo[a] de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el santuario de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּקָם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: El wayyiqtol de קום expresa el inicio de una acción narrativa. En español, "se levantó" comunica de forma natural ese movimiento de ponerse en pie sin añadir interpretación.
- source_word: אַחֲרֵי אָכְלָה
  english_pob_choice: After they had eaten
  chosen_spanish: Después de haber comido
  alternatives_spanish:
  - Después de comer
  - Después de que hubieron comido
  lexicon: HALOT
  rationale: La construcción temporal pide una relación de anterioridad. "Después de haber comido" mantiene la referencia temporal sin forzar un sujeto explícito; el contexto del banquete permite esta neutralidad, como en la lectura inglesa colectiva.
- source_word: בְשִׁלֹה
  english_pob_choice: in Shiloh
  chosen_spanish: en Silo
  alternatives_spanish:
  - en Siló
  - en Silo
  lexicon: HALOT
  rationale: Se conserva el topónimo bíblico en forma castellana habitual "Silo", que es transparente para el lector y respeta el referente histórico del lugar.
- source_word: וְאַחֲרֵי שָׁתֹה
  english_pob_choice: and after they had drunk
  chosen_spanish: y después de haber bebido
  alternatives_spanish:
  - y después de beber
  - y después de que hubieron bebido
  lexicon: HALOT
  rationale: Se conserva el paralelismo temporal del hebreo con una formulación española natural. No se explicita "ellos" porque el texto hebreo tampoco lo hace de manera gramaticalmente obligatoria y el contexto lo suple.
- source_word: וְעֵלִי הַכֹּהֵן
  english_pob_choice: Now Eli the priest
  chosen_spanish: Entonces Elí el sacerdote
  alternatives_spanish:
  - Y Elí el sacerdote
  - Ahora bien, Elí el sacerdote
  lexicon: HALOT
  rationale: El valor de enlace del waw aquí introduce el escenario de fondo. "Entonces" funciona en español como transición narrativa y evita una coordinación plana que no reflejaría bien el cambio de foco.
- source_word: יֹשֵׁב
  english_pob_choice: was sitting
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - se sentaba
  - estaba allí sentado
  lexicon: HALOT
  rationale: El participio describe una postura continua de fondo. "Estaba sentado" conserva el aspecto durativo mejor que un perfecto simple.
- source_word: עַל הַכִּסֵּא
  english_pob_choice: on the seat
  chosen_spanish: en el asiento
  alternatives_spanish:
  - sobre el asiento
  - en la silla
  lexicon: HALOT
  rationale: כִּסֵּא puede ser asiento, silla o trono. Aquí, por el contexto del acceso al santuario, "asiento" es más general y evita la carga regia de "trono".
- source_word: עַל מְזוּזַת
  english_pob_choice: by the doorpost
  chosen_spanish: junto al poste de la puerta
  alternatives_spanish:
  - al lado del poste de la puerta
  - a la puerta
  lexicon: HALOT
  rationale: מְזוּזָה es "poste de la puerta". Con עַל en este contexto locativo, "junto a" expresa mejor la relación espacial en español que un calco como "sobre".
- source_word: הֵיכַל יְהוָה
  english_pob_choice: the temple of Yahweh
  chosen_spanish: el templo de Yahvé
  alternatives_spanish:
  - el santuario de Yahvé
  - el palacio de Yahvé
  lexicon: HALOT
  rationale: Se mantiene "templo" como traducción principal de הֵיכָל, siguiendo el valor arquitectónico-sacral reconocido por el audit trail. En español, "templo de Yahvé" es claro y fiel, sin sustituir el nombre divino por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se aplica el término base del proyecto para el Tetragrámaton. "Yahvé" conserva el nombre propio divino, en lugar de enmascararlo con una sustitución litúrgica.
theological_decisions:
- issue: 'Hֵיכָל at Shiloh: templo vs. santuario'
  english_pob_reading: the temple of Yahweh, with footnote alternative 'the sanctuary of the LORD'
  chosen_spanish_reading: el templo de Yahvé
  alternative_spanish_readings:
  - el santuario de Yahvé
  rationale: El audit trail en inglés conserva una alternativa de sentido porque הֵיכָל puede designar templo o santuario. En español se deja la lectura principal como "templo" por su naturalidad y se preserva la alternativa conceptual en nota, para no borrar la tensión semántica del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene la política del proyecto de transliterar el Tetragrámaton como nombre propio. Esto evita la sustitución tradicional por un título y refleja de forma auditables el término del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Construcción temporal plural implícita en 'after they had eaten/drunk'
  english_pob_reading: After they had eaten... and after they had drunk
  chosen_spanish_reading: Después de haber comido... y después de haber bebido
  alternative_spanish_readings:
  - Después de comer... y después de beber
  - Después de que hubieron comido... y después de que hubieron bebido
  rationale: El hebreo no marca explícitamente un sujeto en estas cláusulas temporales; el contexto colectivo permite una formulación neutral. En español se evita fijar innecesariamente 'ella' o 'ellos' para no resolver artificialmente una ambigüedad que el texto deja abierta.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: La revisión inglesa añadió una coma tras "Shiloh" para mejorar la legibilidad; en español se mantuvo una segmentación natural equivalente con pausa después de "Silo". El resto de la solución se alinea con el texto inglés revisado y conserva las decisiones léxicas auditadas.
  spanish_consistency_notes:
  - Se usa "Yahvé" de manera consistente para יְהוָה.
  - Se mantiene "templo" como opción principal y se deja la alternativa "santuario" en nota, conforme al audit trail.
  - No se explicita un sujeto para las cláusulas temporales, siguiendo la ambigüedad controlada del hebreo.
  - '"Elí" y "Ana" se presentan con la ortografía castellana estándar de nombres bíblicos.'
