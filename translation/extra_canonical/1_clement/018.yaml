  text: Τί δὲ εἴπωμεν ἐπὶ τῷ μεμαρτυρημένῳ Δαυίδ; πρὸς ὃν εἶπεν ὁ θεός· Εὗρον ἄνδρα κατὰ τὴν καρδίαν μου, Δαυὶδ τὸν τοῦ Ἰεσσαί, ἐν ἐλέει αἰωνίῳ ἔχρισα αὐτόν. 2. ἀλλὰ καὶ αὐτὸς λέγει πρὸς τὸν θεόν· Ἐλέησόν με, ὁ θεός, κατὰ τὸ μέγα ἔλεός σου, καὶ κατὰ τὸ πλῆθος τῶν οἰκτιρμῶν σου ἐξάλειψον τὸ ἀνόμημά μου. 3. ἐπὶ πλεῖον πλῦνόν με ἀπὸ τῆς ἀνομίας μου καὶ ἀπὸ τῆς ἁμαρτίας μου καθάρισόν με· ὅτι τὴν ἀνομίαν μου ἐγὼ γινώσκω, καὶ ἡ ἁμαρτία μου ἐνώπιόν μου ἐστιν διαπαντός. 4. σοὶ μόνῳ ἥμαρτον καὶ τὸ πονηρὸν ἐνώπιόν σου ἐποίησα, ὅπως ἂν δικαιωθῇς ἐν τοῖς λόγοις σου καὶ νικήσῃς ἐν τῷ κρίνεσθαί σε. 5. ἰδοὺ γὰρ ἐν ἀνομίαις συνελήμφθην, καὶ ἐν ἁμαρτίαις ἐκίσσησέν με ἡ μήτηρ μου. 6. ἰδοὺ γὰρ ἀλήθειαν ἠγάπησας· τὰ ἄδηλα καὶ τὰ κρύφια τῆς σοφίας σου ἐδήλωσάς μοι. 7. ῥαντιεῖς με ὑσσώπῳ, καὶ καθαρισθήσομαι· πλυνεῖς με, καὶ ὑπὲρ χιόνα λευκανθήσομαι. 8. ἀκουτιεῖς με ἀγαλλίασιν καὶ εὐφροσύνην, ἀγαλλιάσονται ὀστᾶ τεταπεινωμένα. 9. ἀπόστρεψον τὸ πρόσωπόν σου ἀπὸ τῶν ἁμαρτιῶν μου, καὶ πάσας τὰς ἀνομίας μου ἐξάλειψον. 10. καρδίαν καθαρὰν κτίσον ἐν ἐμοί, ὁ θεός, καὶ πνεῦμα εὐθὲς ἐγκαίνισον ἐν τοῖς ἐγκάτοις μου. 11. μὴ ἀπορίψῃς με ἀπὸ τοῦ προσώπου σου, καὶ τὸ πνεῦμα τὸ ἅγιόν σου μὴ ἀντανέλῃς ἀπʼ ἐμοῦ. 12. ἀπόδος μοι τὴν ἀγαλλίασιν τοῦ σωτηρίου σου, καὶ πνεύματι ἡγεμονικῷ στήριξόν με. 13. διδάξω ἀνόμους τὰς ὁδούς σου, καὶ ἀσεβεῖς ἐπιστρέψουσιν ἐπὶ σέ. 14. ῥῦσαί με ἐξ αἱμάτων, ὁ θεός, ὁ θεὸς τῆς σωτηρίας μου. 15. ἀγαλλιάσεται ἡ γλῶσσά μου τὴν δικαιοσύνην σου. κύριε, τὸ στόμα μου ἀνοίξεις, καὶ τὰ χείλη μου ἀναγγελεῖ τὴν αἴνεσίν σου. . ὅτι εἰ ἠθέλησας θυσίαν, ἔδωκα ἄν· ὁλοκαυτώματα οὐκ εὐδοκήσεις. 17. θυσία τῷ θεῷ πνεῦμα συντετριμμένον· καρδίαν συντετριμμένην καὶ τεταπεινωμένην ὁ θεὸς οὐκ ἐξουδενώσει.
  language: Greek
