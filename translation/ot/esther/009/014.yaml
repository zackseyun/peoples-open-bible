id: EST.9.14
reference: Esther 9:14
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הַ/מֶּ֨לֶךְ֙ לְ/הֵֽעָשׂ֣וֹת כֵּ֔ן וַ/תִּנָּתֵ֥ן דָּ֖ת בְּ/שׁוּשָׁ֑ן וְ/אֵ֛ת עֲשֶׂ֥רֶת בְּנֵֽי הָמָ֖ן תָּלֽוּ־׃
translation:
  text: So the king said that it should be done so. A decree was issued in Susa[a], and the ten sons of Haman were hanged.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "were impaled"; the Hebrew verb can refer to hanging bodies on a stake or pole, not necessarily hanging by the neck in the modern sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: The verb אמר ordinarily means 'say.' In this context it introduces the king's authorization in response to Esther's request. 'Said' preserves the Hebrew wording without overstating it as a formal command, since the following clause and decree supply the official action.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Standard rendering of מלך with article. The referent is Ahasuerus, but the Hebrew uses the title rather than the personal name here.
- source_word: לְהֵעָשׂוֹת כֵּן
  chosen: that it should be done that way
  alternatives:
  - to do so
  - for it to be done thus
  lexicon: HALOT
  rationale: The infinitive construct of עשה with כן expresses that Esther's request is to be carried out. 'That it should be done that way' is natural English while preserving the passive sense implied by the Hebrew construction.
- source_word: וַתִּנָּתֵן דָּת
  chosen: A decree was issued
  alternatives:
  - an edict was given
  - a law was promulgated
  lexicon: HALOT
  rationale: נתן + דת is a Persian-period administrative expression. 'A decree was issued' captures the idiom in clear English better than the overly literal 'a decree was given.' 'Law' would sound too general and potentially misleading in this narrative context.
- source_word: בְּשׁוּשָׁן
  chosen: in Susa
  alternatives:
  - in Shushan
  lexicon: HALOT
  rationale: The place name is conventionally rendered 'Susa' in modern English. This follows the instruction to transliterate names by standard conventions.
- source_word: עֲשֶׂרֶת בְּנֵי הָמָן
  chosen: the ten sons of Haman
  lexicon: HALOT
  rationale: Straightforward construct chain. The article is supplied naturally in English.
- source_word: תָּלוּ
  chosen: were hanged
  alternatives:
  - were impaled
  - were hung up
  lexicon: HALOT
  rationale: The verb תלה can refer to hanging a body on a tree/pole and in Persian-period contexts may overlap with impalement. 'Were hanged' matches common English Bible usage and the immediate narrative context, while the possible nuance 'impaled' is worth preserving in a footnote because the exact execution/display method is debated.
