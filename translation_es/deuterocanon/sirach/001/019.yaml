translation:
  language: es
  text: Ella es un bastón de fortaleza y un apoyo[a], alabanza y honra eterna para todo el que camina tras ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «La raíz de la sabiduría es temer al Señor, y sus ramas son larga vida». El testimonio hebreo aquí difiere sustancialmente de la tradición griega.'
    reason: textual_variant
lexical_decisions:
- source_word: מַטּהֵ עֹז
  english_pob_choice: a staff of strength
  chosen_spanish: una vara de fuerza
  alternatives_spanish:
  - un bastón de poder
  - una vara de fortaleza
  lexicon: HALOT
  rationale: מַטֶּה nombra una vara o bastón; con עֹז, la imagen comunica firmeza y sostén. «Vara de fuerza» conserva la metáfora y suena natural en español.
- source_word: מַשְׁעֵנָה
  english_pob_choice: a support
  chosen_spanish: un apoyo
  alternatives_spanish:
  - un sostén
  - una ayuda para apoyarse
  lexicon: HALOT
  rationale: El sustantivo expresa algo en lo que uno se apoya. «Apoyo» mantiene el paralelismo con «vara» sin forzar una repetición pesada.
- source_word: תְּהִלָּה
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - renombre
  - gloria
  lexicon: HALOT
  rationale: El término básico es «alabanza». En español, «alabanza» conserva mejor el valor concreto del sustantivo que una paráfrasis abstracta.
- source_word: כְבוֹד עוֹלָם
  english_pob_choice: everlasting honor
  chosen_spanish: honra eterna
  alternatives_spanish:
  - honor eterno
  - gloria eterna
  lexicon: HALOT
  rationale: כָּבוֹד puede ser «honra», «honor» o «gloria»; aquí «honra» encaja bien con una recompensa humana. עוֹלָם pide una duración sin fin, expresada como «eterna».
- source_word: לְכָל הַהוֹלֵךְ אַחֲרֶיהָ
  english_pob_choice: to everyone who walks after her
  chosen_spanish: para todo el que camina tras ella
  alternatives_spanish:
  - para todos los que la siguen
  - para quien va tras ella
  lexicon: HALOT
  rationale: La locución hebrea «caminar tras» conserva el idiomatismo de seguir a la Sabiduría. «Tras ella» mantiene la referencia femenina de la personificación.
- source_word: αὐτῆς / אַחֲרֶיהָ
  english_pob_choice: her
  chosen_spanish: ella / tras ella
  alternatives_spanish:
  - la / tras la
  - eso / tras eso
  lexicon: BDAG; HALOT
  rationale: Tanto el griego como el hebreo personifican la Sabiduría en femenino. En español se conserva «ella» para no neutralizar la personificación.
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: The main text follows the extant Hebrew witness; the Greek parallel is preserved in a footnote because it is materially different.
  chosen_spanish_reading: El texto principal sigue el testimonio hebreo conservado; el paralelo griego se preserva en nota porque presenta una forma materialmente distinta.
  alternative_spanish_readings:
  - 'Traducir el griego como texto principal: «La raíz de la sabiduría es temer al Señor, y sus ramas son larga vida».'
  - Intentar armonizar hebreo y griego en una sola línea.
  rationale: La política del proyecto es traducir del hebreo donde se conserva, y señalar honestamente las divergencias textuales. Aquí el griego ofrece una formulación distinta, por lo que debe quedar en nota y no sustituir el texto hebreo base.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde se conserva; preservar honestamente la incertidumbre textual.'
translation_notes:
  revision_awareness: La última revisión registrada no cambió el contenido; el consenso de verificación indica alta concordancia y no se requieren ajustes adicionales.
  spanish_consistency_notes:
  - Se mantuvo el femenino de la Sabiduría («ella», «tras ella») para reflejar el hebreo y el griego.
  - Se prefirió un español sobrio y publicable, evitando calcos innecesarios pero conservando la metáfora de la vara y el seguimiento.
  - «Yahvé» no aparece en el texto principal porque este versículo se traduce según el hebreo conservado, que no contiene el Tetragrámaton.
