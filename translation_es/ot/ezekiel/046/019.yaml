revisions:
- from: Entonces me llevó por la entrada que estaba al lado de la puerta, a las cámaras santas para los sacerdotes, las cuales miraban al norte; y he aquí que allí había un lugar en su extremo occidental.
  to: Entonces me llevó junto a la entrada que estaba al lado de la puerta, a las cámaras santas para los sacerdotes, las cuales daban al norte; y he aquí, allí había un lugar en el extremo occidental más alejado[a].
  rationale: Se ajusta «por la entrada» a «junto a la entrada» para reflejar mejor la relación espacial del hebreo y la revisión inglesa final; se cambia «miraban al norte» por «daban al norte» por naturalidad arquitectónica; y se refuerza el final con «el extremo occidental más alejado» más una nota que preserva la literalidad de בְיַרְכְתָם יָמָּה.
