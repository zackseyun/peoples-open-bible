translation:
  language: es
  text: Pero el sumo sacerdote, al llegar a sospechar que quizá el rey supusiera que los judíos habían cometido alguna maldad contra Heliodoro, ofreció un sacrificio por la recuperación[a] del hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘por la liberación del hombre’ o ‘por su salvación’; σωτηρία puede abarcar rescate, preservación o salvación, pero aquí probablemente se refiere a la recuperación física de Heliodoro.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὕποπτος δὲ γενόμενος
  english_pob_choice: becoming suspicious
  chosen_spanish: al llegar a sospechar
  alternatives_spanish:
  - llegando a estar receloso
  - al volverse suspicaz
  - al hacerse sospechoso
  lexicon: LSJ
  rationale: El griego expresa que el sumo sacerdote pasa a una actitud de recelo o sospecha. En español, 'al llegar a sospechar' comunica ese cambio de estado con naturalidad y sin sugerir que él mismo sea el sospechoso.
- source_word: μή ποτε
  english_pob_choice: might perhaps
  chosen_spanish: quizá
  alternatives_spanish:
  - no fuera que
  - tal vez
  - quizá pudiera
  lexicon: LSJ
  rationale: La construcción introduce una posibilidad temida o considerada. 'Quizá' conserva la idea de eventualidad; el verbo siguiente mantiene el matiz de conjetura.
- source_word: διάλημψιν
  english_pob_choice: suppose
  chosen_spanish: supusiera
  alternatives_spanish:
  - pensara
  - tomara por cierto
  - llegara a formarse la impresión
  lexicon: LSJ
  rationale: El sustantivo apunta a una impresión o inferencia que el rey pudiera formarse. 'Supusiera' reproduce bien esa idea y la relación con la sospecha del sacerdote.
- source_word: κακουργίαν τινὰ
  english_pob_choice: some wrongdoing
  chosen_spanish: alguna maldad
  alternatives_spanish:
  - algún delito
  - alguna mala acción
  - alguna fechoría
  lexicon: LSJ
  rationale: κακουργία denota una acción mala o dañina. 'Alguna maldad' es comprensible y suficientemente amplio; se evita estrechar el sentido solo a un delito jurídico.
- source_word: περὶ τὸν Ἡλιόδωρον
  english_pob_choice: against Heliodorus
  chosen_spanish: contra Heliodoro
  alternatives_spanish:
  - acerca de Heliodoro
  - en lo relativo a Heliodoro
  lexicon: LSJ
  rationale: En el contexto de daño infligido, la preposición tiene sentido hostil. 'Contra Heliodoro' expresa esa orientación con claridad en español.
- source_word: συντετελέσθαι
  english_pob_choice: had been carried out
  chosen_spanish: habían cometido
  alternatives_spanish:
  - se había perpetrado
  - se había realizado
  - se había llevado a cabo
  lexicon: LSJ
  rationale: El infinitivo perfecto señala una acción completada. En español, con 'maldad', 'habían cometido' da una relación verbal natural y refleja el carácter consumado del acto.
- source_word: προσήγαγε θυσίαν
  english_pob_choice: offered a sacrifice
  chosen_spanish: ofreció un sacrificio
  alternatives_spanish:
  - presentó un sacrificio
  - hizo una ofrenda
  - ofreció un holocausto
  lexicon: LSJ
  rationale: Es la equivalencia directa y más transparente para el lenguaje sacrificial del griego.
- source_word: ὑπὲρ τῆς ... σωτηρίας
  english_pob_choice: for ... recovery
  chosen_spanish: por la recuperación
  alternatives_spanish:
  - por la salvación
  - por la liberación
  - por el rescate
  lexicon: LSJ
  rationale: Aquí σωτηρία se entiende en el contexto narrativo de restauración física. 'Recuperación' evita cargar el texto con un sentido soteriológico que el pasaje no exige.
- source_word: τοῦ ἀνδρός
  english_pob_choice: the man's
  chosen_spanish: del hombre
  alternatives_spanish:
  - de aquel hombre
  - de ese hombre
  - del varón
  lexicon: LSJ
  rationale: La referencia vuelve a Heliodoro sin repetir el nombre. 'Del hombre' conserva la formulación explícita del griego y suena natural en español.
theological_decisions:
- issue: Sentido de σωτηρία en un contexto narrativo de curación/restauración
  english_pob_reading: physical recovery/preservation rather than spiritual salvation
  chosen_spanish_reading: recuperación física, no salvación espiritual
  alternative_spanish_readings:
  - salvación
  - liberación
  - preservación
  rationale: El episodio trata del estado corporal de Heliodoro después del juicio divino. Traducir σωτηρία como 'recuperación' mantiene el foco narrativo y evita imponer una lectura doctrinal no requerida por el contexto inmediato.
  doctrine_reference: 'DOCTRINE.md: Primacía de las fuentes originales; preservar la tensión léxica y teológica cuando el contexto no la resuelve'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan en el sentido general; la principal decisión de revisión fue mantener σωτηρία como 'recuperación' por el contexto narrativo de restauración física, sin desplazarlo a un lenguaje soteriológico más amplio.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino solo cuando corresponda; este versículo no lo contiene.
  - Se conserva 'sumo sacerdote' como término bíblico estándar por claridad y fidelidad al cargo.
  - '''Heliodoro'' se mantiene como nombre propio transliterado de forma usual en español.'
  - La puntuación reproduce la subordinación larga del griego con una sola oración fluida y publicable.
