translation:
  language: es
  text: ¿Amedrentarías una hoja llevada por el viento, y perseguirías tamo[a] seco?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tamo» también puede traducirse «paja» o «rastrojo». El hebreo denota residuo vegetal seco y liviano, lo que subraya la debilidad y poca importancia de la comparación.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעָלֶה
  english_pob_choice: a ... leaf
  chosen_spanish: una hoja
  alternatives_spanish:
  - hoja
  - una hoja de árbol
  lexicon: HALOT
  rationale: עלה aquí funciona en imagen singular y genérica; «una hoja» conserva la pregunta retórica y el paralelismo con el segundo miembro.
- source_word: נִדָּף
  english_pob_choice: windblown
  chosen_spanish: arrastrada por el viento
  alternatives_spanish:
  - llevada por el viento
  - azotada por el viento
  - sacudida por el viento
  lexicon: HALOT
  rationale: נדף expresa algo llevado o impulsado por el viento; en español «arrastrada por el viento» comunica bien la fragilidad de la imagen sin perder naturalidad.
- source_word: תַּעֲרֹוץ
  english_pob_choice: terrify
  chosen_spanish: harías temblar
  alternatives_spanish:
  - aterrorizarías
  - amedrentarías
  - asustarías
  lexicon: HALOT
  rationale: ערץ puede denotar infundir terror o causar estremecimiento. En este contexto poético, «harías temblar» conserva la fuerza agresiva y permite una formulación natural en español.
- source_word: קַשׁ
  english_pob_choice: chaff
  chosen_spanish: paja
  alternatives_spanish:
  - rastrojo
  - tamo
  - hojarasca
  lexicon: HALOT
  rationale: קשׁ abarca residuo vegetal seco y liviano; «paja» funciona en español como equivalente comprensible del material inútil y frágil del paralelo poético. Se evita imponer un término demasiado técnico sin necesidad.
- source_word: יָבֵשׁ
  english_pob_choice: dry
  chosen_spanish: seca
  alternatives_spanish:
  - seca y quebradiza
  - marchita
  lexicon: HALOT
  rationale: El adjetivo describe directamente el material como seco; «seca» es la correspondencia más simple y transparente.
- source_word: תִּרְדֹּף
  english_pob_choice: pursue
  chosen_spanish: perseguirías
  alternatives_spanish:
  - cazarías
  - acribillarías
  - darías caza a
  lexicon: HALOT
  rationale: רדף significa perseguir o ir tras algo; «perseguirías» preserva el paralelismo verbal con el primer colon y el registro poético.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto español junto al sintagma al que remite.
  spanish_consistency_notes:
  - Se conservó el paralelismo verbal de dos preguntas retóricas con futuro condicional («harías» / «perseguirías»).
  - Se prefirió un español directo y poético, evitando calcos innecesarios.
  - No se introdujo ninguna nota doctrinal porque el versículo no presenta una decisión teológica distinta en el audit trail.
