review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro del POB inglés: conserva la opresión/aflicción, la doble negativa de ''no abrir su boca'' y las dos comparaciones animales. La nota textual sobre la difícil apertura también está bien preservada. Sin embargo, dos elecciones reducen fidelidad fina o naturalidad: «muda» para נֶאֱלָמָה suena más absoluta que «silent»/«silenciosa» y puede sugerir incapacidad en vez de quietud; y «tampoco abrió su boca» al final transmite adición negativa más que la fuerza conclusiva/comparativa del cierre («así no abrió su boca» / «así tampoco...»), aunque no es grave. También conviene mejorar ligeramente la fluidez de «como cordero llevado al matadero».'
  spanish_quality_summary: El texto es legible y digno, pero puede sonar más natural y preciso en español bíblico contemporáneo. «Como cordero que es llevado al matadero» y «como oveja silenciosa delante de sus esquiladores» fluyen mejor y reflejan mejor el sentido. «Silenciosa» evita la rigidez de «muda». El resto del registro y puntuación funcionan bien.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. No aparecen Yahvé/Mesías/etc. Las decisiones «oprimido», «afligido», «cordero», «esquiladores» están alineadas con el POB. La única mejora léxica importante es preferir «silenciosa» sobre «muda» para נֶאֱלָמָה.
  issues:
  - severity: medium
    issue: «muda» para נֶאֱלָמָה
    rationale: El hebreo describe silencio o quietud ante los esquiladores, no necesariamente mudez como incapacidad. «Silenciosa» o «callada» preserva mejor el matiz y coincide mejor con el POB inglés «silent».
  - severity: low
    issue: Cierre «tampoco abrió su boca»
    rationale: Es comprensible, pero «tampoco» suena principalmente aditivo. El cierre del símil queda mejor con «así no abrió su boca», que refleja la función conclusiva del paralelo sin sobreinterpretar.
  - severity: low
    issue: Fluidez de «como cordero llevado al matadero»
    rationale: No es incorrecto, pero «como cordero que es llevado al matadero» suena más natural en español y mantiene el valor pasivo del hebreo.
  revised_spanish_text: Fue oprimido[a], y fue afligido, pero no abrió su boca; como cordero que es llevado al matadero, y como oveja silenciosa delante de sus esquiladores, así no abrió su boca.
  revised_footnotes:
  - marker: a
    text: O «Fue oprimido, pero se humilló a sí mismo»; el hebreo de la primera línea es difícil, y algunas traducciones toman el segundo verbo con el sentido de auto-humillación en vez de aflicción pasiva.
    reason: alternative_reading
  revision_rationale: Se ajusta «muda» a «silenciosa» para reflejar mejor נֶאֱלָמָה; se mejora la naturalidad de la primera comparación con «que es llevado»; y se cambia el cierre a «así no abrió su boca» para reproducir mejor la fuerza conclusiva del paralelo hebreo y del POB inglés.
