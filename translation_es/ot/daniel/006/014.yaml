  spanish_quality_summary: 'El español es claro, natural y digno. La sintaxis y el registro funcionan bien para lectura bíblica. Los ajustes necesarios son pequeños: recolocar la nota [a] al modismo correcto y fortalecer ligeramente «orden» a «mandato» para reflejar mejor la prohibición legal vinculante sin volver el texto técnico.'
