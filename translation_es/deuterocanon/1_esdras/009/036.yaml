    issue: '''con los niños'' suena menos preciso que ''con los hijos'' para σὺν τέκνοις en este contexto'
    rationale: τέκνα puede significar 'niños' o 'hijos', pero en una lista de uniones familiares disueltas, el español natural y contextual prefiere 'hijos', que expresa descendencia sin introducir posesivo. 'Niños' puede estrechar indebidamente el sentido hacia menores de edad.
  - severity: low
    issue: La nota al pie puede pulirse para sonar más natural en español
    rationale: '''con mayor explicitud desde el paralelo hebreo'' es comprensible, pero ''más explícitamente según el paralelo hebreo'' fluye mejor en español formal neutral.'
