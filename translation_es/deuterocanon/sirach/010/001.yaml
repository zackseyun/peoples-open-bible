translation:
  language: es
  text: Un juez sabio pone en orden[a] a su pueblo, y el gobierno de quien tiene discernimiento está bien ordenado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo יוֹסֵד también puede traducirse 'establece' o 'funda'; el paralelo griego favorece aquí el sentido de gobernar u ordenar a un pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹפֵט / Κριτὴς
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - gobernante
  - magistrado
  lexicon: HALOT; LXX κριτής
  rationale: El hebreo y el griego apuntan de forma directa a la figura de un juez u oficial de gobierno. En español, 'juez' conserva esa base léxica sin ampliar indebidamente a 'gobernante'.
- source_word: יוֹסֵד
  english_pob_choice: sets ... in order
  chosen_spanish: instruye
  alternatives_spanish:
  - establece
  - funda
  - ordena
  lexicon: HALOT
  rationale: El verbo puede sugerir 'fundar' o 'establecer', pero el contexto de gobernar al pueblo, junto con el paralelo griego de instrucción/corrección, favorece una acción formativa y ordenadora. 'Instruye' comunica esa función de manera natural en español sin perder la idea de ordenar.
- source_word: עַמּוֹ / τὸν λαὸν αὐτοῦ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su nación
  - su gente
  lexicon: HALOT; LXX λαός
  rationale: '''Pueblo'' reproduce el sustantivo colectivo del hebreo y del griego y mantiene el posesivo explícito.'
- source_word: מֶמְשֶׁלֶת / ἡγεμονία
  english_pob_choice: the rule
  chosen_spanish: el gobierno
  alternatives_spanish:
  - el dominio
  - la administración
  - el mando
  lexicon: HALOT; BDAG
  rationale: El término señala autoridad de gobierno. 'Gobierno' es claro en español y expresa mejor la idea de administración ordenada que 'regla' o 'dominación'.
- source_word: מֵבִין / συνετοῦ
  english_pob_choice: one who understands
  chosen_spanish: quien tiene discernimiento
  alternatives_spanish:
  - el entendido
  - el prudente
  - el que entiende
  lexicon: HALOT; BDAG
  rationale: La expresión hebrea y la griega describen a una persona dotada de entendimiento práctico. 'Quien tiene discernimiento' mantiene el valor personal del participio sin forzar un masculino genérico rígido.
- source_word: סְדוּרָה / τεταγμένη
  english_pob_choice: well arranged
  chosen_spanish: bien ordenado
  alternatives_spanish:
  - ordenado
  - bien dispuesto
  - debidamente ordenado
  lexicon: HALOT; BDAG
  rationale: La cláusula final describe un estado de orden establecido. 'Bien ordenado' conserva el matiz de arreglo correcto y encaja con el tema de gobierno estable.
translation_notes:
  revision_awareness: La revisión inglesa reciente no introdujo cambios sustanciales; se mantuvo la lectura de optimal equivalence con atención al paralelo hebreo-griego y al valor gobernante/ordenador del primer verbo.
  spanish_consistency_notes:
  - Se conservó 'juez' para שׁוֹפֵט / κριτής, en línea con la base léxica confirmada por el griego.
  - '''Su pueblo'' mantiene el posesivo explícito del hebreo y del griego.'
  - Se evitó 'SEÑOR' u otras sustituciones teológicas, porque el versículo no contiene el Tetragrámaton ni un título divino en esta cláusula.
