translation:
  language: es
  text: 'A la hora de comer, Booz le dijo: «Ven aquí y come un poco[a] de pan, y moja tu bocado en el vino agrio[b]». Entonces ella se sentó junto a los segadores, y él le sirvió grano tostado. Ella comió, se sació, y le sobró algo[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «come de pan»; aquí se expresa el valor partitivo de מִן con una formulación natural en español.
    reason: lexical_alternative
  - marker: b
    text: O «vinagre». El hebreo חֹמֶץ puede referirse a vinagre o a una bebida de vino agrio; en este contexto de comida campestre, «vino agrio» probablemente es lo más adecuado.
    reason: lexical_alternative
  - marker: c
    text: O «le quedó algo». El hebreo simplemente indica que quedó algo restante; el español explicita el resultado con un complemento natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֵת הָאֹכֶל
  english_pob_choice: At mealtime
  chosen_spanish: A la hora de comer
  alternatives_spanish:
  - A la hora de la comida
  - En el tiempo de comer
  lexicon: HALOT
  rationale: La expresión es idiomática y temporal; en español natural se vierte como una indicación de momento de comida sin sobrecargar el texto.
- source_word: גֹּשִׁי הֲלֹם
  english_pob_choice: Come here
  chosen_spanish: Acércate aquí
  alternatives_spanish:
  - Ven aquí
  - Acércate por aquí
  lexicon: HALOT
  rationale: El imperativo comunica aproximación física. 'Acércate aquí' conserva la cercanía y la invitación directa con naturalidad en español.
- source_word: וְאָכַלְתְּ מִן הַלֶּחֶם
  english_pob_choice: eat some bread
  chosen_spanish: come un poco de pan
  alternatives_spanish:
  - come del pan
  - come algo de pan
  lexicon: HALOT
  rationale: מִן con comida suele tener valor partitivo. 'Un poco de pan' expresa esa porción sin forzar un calco como 'de la pan' o 'del pan' en español.
- source_word: וְטָבַלְתְּ פִּתֵּךְ בַּחֹמֶץ
  english_pob_choice: dip your piece in the sour wine
  chosen_spanish: moja tu bocado en el vino agrio
  alternatives_spanish:
  - moja tu pedazo en el vinagre
  - moja tu bocado en el vinagre
  lexicon: HALOT
  rationale: פִּתֵּךְ es un bocado o pedazo de pan; 'bocado' es natural y respeta la pequeñez de la porción. חֹמֶץ puede ser vinagre o una bebida agria tipo vino agrio; se mantiene 'vino agrio' siguiendo la decisión auditada del POB, con la alternativa 'vinagre' disponible en nota.
- source_word: מִצַּד הַקּוֹצְרִים
  english_pob_choice: beside the reapers
  chosen_spanish: junto a los segadores
  alternatives_spanish:
  - al lado de los segadores
  - junto a los cosechadores
  lexicon: HALOT
  rationale: מִצַּד indica posición al lado de. 'Segadores' preserva el ambiente agrícola y suena más natural que un giro demasiado literal.
- source_word: וַיִּצְבָּט לָהּ קָלִי
  english_pob_choice: he passed her roasted grain
  chosen_spanish: él le sirvió grano tostado
  alternatives_spanish:
  - él le pasó grano tostado
  - él le dio grano tostado
  lexicon: HALOT
  rationale: El verbo raro sugiere una acción de dar o acercar alimento; 'sirvió' encaja bien en contexto de comida sin afirmar más de lo que el hebreo asegura. קָלִי se traduce como 'grano tostado'.
- source_word: וַתִּשְׂבַּע
  english_pob_choice: was satisfied
  chosen_spanish: se sació
  alternatives_spanish:
  - quedó satisfecha
  - comió hasta quedar llena
  lexicon: HALOT
  rationale: El verbo expresa quedar satisfecha por comida; 'se sació' conserva la idea de plenitud alimentaria de forma breve y natural.
- source_word: וַתֹּתַר
  english_pob_choice: she had some left over
  chosen_spanish: le sobró
  alternatives_spanish:
  - le quedó algo
  - sobró comida
  lexicon: HALOT
  rationale: La forma verbal indica que quedó algo restante. En español, 'le sobró' comunica claramente el resultado sin especificar de más el objeto implícito.
translation_notes:
  revision_awareness: Se ha seguido el texto hebreo de WLC y la decisión auditada del POB en inglés, especialmente en la ambigüedad de חֹמֶץ (vino agrio/vinagre) y en el sentido partitivo de מִן. No se han incorporado revisiones posteriores porque el registro indica que no hubo cambios en la última pasada.
  spanish_consistency_notes:
  - Se mantiene Booz para el nombre propio, conforme al uso español habitual del libro de Rut.
  - Se preserva el valor agrícola de 'segadores' y 'grano tostado' para mantener el campo semántico del hebreo.
  - '''Vino agrio'' sigue la lectura principal del POB; la alternativa ''vinagre'' queda documentada en nota.'
  - El estilo busca ser bíblico y claro, sin calco rígido del inglés ni sustitución por formulaciones eclesiásticas ajenas al texto.
