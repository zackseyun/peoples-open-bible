review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura básica del versículo y varias decisiones léxicas clave: «cómo te pondría», «tierra deseable», el llamado filial «Padre mío», y la idea de no apartarse de seguir a Dios. Sin embargo, no preserva con suficiente fidelidad dos rasgos del hebreo/auditoría inglesa: (1) el cambio de persona/número en la segunda mitad, donde el hebreo pasa a plural («llamarán... no se volverán») y el español lo singulariza sin señal alguna; y (2) la frase difícil נַחֲלַת צְבִי צִבְאוֹת גּוֹיִם, donde «entre las naciones» elimina demasiado del valor de ‘herencia’ + ‘hermosa/gloriosa’ + ‘de/entre las huestes/naciones’.'
  spanish_quality_summary: El español es claro y digno, pero hay detalles mejorables. La nota [a] es defectuosa porque repite exactamente «entre los hijos» como si fuera alternativa más amplia; debería explicar «entre los hijos» / «entre los hijos/descendencia» o «entre los hijos» literal y quizá «entre los hijos/entre los descendientes», o mejor reflejar la alternativa inglesa «entre los hijos / más ampliamente, entre los hijos/entre los descendientes»; en español natural, lo útil es contrastar «hijos» con «descendientes» o «hijos/miembros de la familia», no con la misma frase. Además, la singularización de «me llamarás... no te apartarás» suena natural, pero pierde un dato formal del texto fuente.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. No aparecen Yahvé, Mesías, etc. «Padre mío» es adecuado para אָבִי. «Hijos» mantiene bien בנים. La revisión debe centrarse en fidelidad sintáctica y en una nota más precisa para la frase difícil.
  issues:
  - severity: high
    issue: Cambio indebido de plural a singular en «Me llamarás... no te apartarás»
    rationale: 'El hebreo tiene verbos 2mp: תקראו, תשובו. Aunque el destinatario corporativo pueda representarse en singular femenino antes, aquí el texto cambia a plural. El español del borrador elimina ese dato. Conviene reflejarlo con «me llamarán... no se apartarán» o una solución equivalente.'
  - severity: medium
    issue: La nota [a] no ofrece una alternativa real
    rationale: Dice «O, más ampliamente, “entre los hijos”; el hebreo dice literalmente “entre los hijos”». Repite lo mismo y no ayuda al lector. Debe reformularse para explicar que el hebreo usa el masculino plural «hijos», con sentido filial más amplio según contexto.
  - severity: medium
    issue: «una herencia hermosa entre las naciones» reduce demasiado la compresión del hebreo
    rationale: La auditoría inglesa preserva que la frase es difícil y mantiene algo como «a beautiful inheritance of the hosts of nations». En español, «entre las naciones» es posible como interpretación, pero borra demasiado «צְבִי / צִבְאוֹת». Una formulación más cercana y natural como «una hermosa herencia entre las huestes de las naciones» o «una hermosa herencia de las huestes de las naciones» con nota explicativa conserva mejor la dificultad.
  revised_spanish_text: 'Y yo dije[a]: «¡Cómo te pondría entre los hijos y te daría una tierra deseable, una hermosa herencia[b] entre las huestes de las naciones!». Y dije: «Me llamarán: “Padre mío”, y no se apartarán de seguirme».'
  revised_footnotes:
  - marker: a
    text: O, más ampliamente, «entre los descendientes»; el hebreo dice literalmente «entre los hijos».
    reason: lexical_alternative
  - marker: b
    text: El hebreo de esta frase es difícil; también puede entenderse como «una herencia gloriosa entre las naciones» o «la herencia espléndida de las naciones».
    reason: alternative_reading
  revision_rationale: Se corrige el singular por plural en la segunda mitad para reflejar los verbos hebreos en 2ª persona plural. Se ajusta la nota [a] para que realmente explique la alternativa y la literalidad. Se revisa la frase difícil sobre la herencia para conservar mejor el carácter comprimido del hebreo y acercarse más al rastro de auditoría inglés, sin volverla ininteligible en español.
