translation:
  language: es
  text: Y al octavo día tomará para sí dos tórtolas o dos pichones, y los llevará al sacerdote, a la entrada[a] de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la entrada de la tienda de reunión». El hebreo repite la preposición «a» antes de «la entrada», lo que también puede reflejarse de manera más formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַיּוֹם הַשְּׁמִינִי
  english_pob_choice: And on the eighth day
  chosen_spanish: Y al octavo día
  alternatives_spanish:
  - Y en el octavo día
  - Al octavo día
  lexicon: HALOT
  rationale: La construcción temporal hebrea introduce una secuencia legal; en español, 'Y al octavo día' conserva el enlace narrativo sin forzar una calca pesada. 'Octavo' reproduce el ordinal del מקור con naturalidad.
- source_word: תִּקַּח לָהּ
  english_pob_choice: she shall take for herself
  chosen_spanish: tomará para sí
  alternatives_spanish:
  - tomará
  - deberá tomar para sí
  lexicon: HALOT
  rationale: El imperfecto legal admite valor injuntivo; 'tomará' mantiene ese matiz normativo. 'Para sí' conserva el valor beneficiario/reflexivo de לָהּ, que el POB destacó como nuance relevante.
- source_word: שְׁתֵּי תֹרִים
  english_pob_choice: two turtledoves
  chosen_spanish: dos tórtolas
  alternatives_spanish:
  - dos tórtolas
  - dos palomitas
  lexicon: HALOT
  rationale: Para תֹרִים, 'tórtolas' es el equivalente zoológico natural en español bíblico contemporáneo. 'Palomitas' puede sonar demasiado coloquial o ambiguo en algunos contextos litúrgicos.
- source_word: שְׁנֵי בְּנֵי יוֹנָה
  english_pob_choice: two young pigeons
  chosen_spanish: dos pichones
  alternatives_spanish:
  - dos pichones
  - dos polluelos de paloma
  lexicon: HALOT
  rationale: בְּנֵי יוֹנָה literalmente expresa 'hijos de paloma/pichón'; 'pichones' transmite la idea de aves jóvenes sin resultar antinatural. Se evita una glosa demasiado literal que sonaría poco idiomática.
- source_word: וְהֵבִיאָה אוֹתָם
  english_pob_choice: and bring them
  chosen_spanish: y los traerá
  alternatives_spanish:
  - y los llevará
  - y deberá llevarlos
  lexicon: HALOT
  rationale: El verbo de movimiento en contexto ritual se puede expresar naturalmente con 'traer' al lugar sagrado. Se mantiene el sujeto implícito por el contexto de la instrucción legal.
- source_word: אֶל הַכֹּהֵן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - al sacerdote
  - al cura
  lexicon: HALOT
  rationale: '''Sacerdote'' es el término bíblico y eclesial neutro en español para הַכֹּהֵן. Se evita ''cura'', que sería anacrónico y confesionalmente cargado.'
- source_word: אֶל פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: at the entrance of the tent of meeting
  chosen_spanish: a la entrada de la tienda de reunión
  alternatives_spanish:
  - a la entrada de la tienda de reunión
  - a la entrada del tabernáculo de reunión
  lexicon: HALOT
  rationale: Se conserva 'tienda de reunión' como equivalente estable de אֹהֶל מוֹעֵד. 'A la entrada' refleja bien la segunda preposición אֶל sin necesidad de volverla locativa como en la solución inglesa; el español natural mantiene el movimiento hacia el umbral del santuario.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior incorporando el marcador [a] directamente en el texto principal junto a la frase correspondiente. La redacción sigue de cerca el hebreo y el audit trail inglés, pero en español se optó por una forma más natural y pública: ''a la entrada de la tienda de reunión''.'
  spanish_consistency_notes:
  - Se mantiene 'tórtolas' para תֹרִים y 'pichones' para בני יונה, preservando la distinción lexical entre las dos opciones sacrificables.
  - '''Sacerdote'' conserva el término bíblico estándar y evita una paráfrasis confesional.'
  - '''Tienda de reunión'' se usa de manera consistente para אֹהֶל מוֹעֵד.'
  - El marcador [a] aparece exactamente en el punto donde se ofrece la alternativa formal de la preposición duplicada hebrea.
