review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y los títulos principales del hebreo: «tu esposo», «tu Hacedor», «Yahvé», «tu Redentor», «el Santo de Israel» y «el Dios de toda la tierra». Sin embargo, se aparta del rastro auditado del POB en un punto significativo: יִקָּרֵא fue elegido en inglés como «he is called», con nota alternativa «he will be called», mientras que el español principal puso «será llamado». Eso invierte la preferencia principal documentada. Además, la nota [a] está mal anclada y mal formulada: el inglés nota una alternativa para «Yahweh of Armies / the LORD of Hosts», no para «tu Hacedor».'
  spanish_quality_summary: El español es claro y digno, con buena legibilidad eclesial. «Yahvé de los Ejércitos» y «tu esposo es tu Hacedor» suenan naturales y fieles. No obstante, la colocación de la nota [a] en «Hacedor» confunde al lector porque la alternativa pertenece al título divino posterior. También conviene alinear la nota [b] con la opción temporal contraria al texto principal revisado.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יהוה -> «Yahvé» correctamente; גאל -> «Redentor» correctamente; קְדוֹשׁ יִשְׂרָאֵל -> «el Santo de Israel» correctamente; אֱלֹהֵי כָל הָאָרֶץ -> «el Dios de toda la tierra» adecuadamente. La única desalineación importante con el audit trail es יִקָּרֵא, donde debe preferirse «es llamado» en el texto principal y reservar «será llamado» para nota alternativa.'
  issues:
  - severity: high
    issue: La traducción principal de יִקָּרֵא no sigue la decisión principal auditada del POB.
    rationale: El inglés POB eligió «he is called» como lectura principal y dejó «he will be called» como alternativa. El borrador español invirtió esa relación con «será llamado» en el texto principal.
  - severity: high
    issue: La nota [a] está colocada en el lugar equivocado y su contenido no corresponde al ancla textual.
    rationale: La nota [a] aparece tras «Hacedor», pero el contenido «O, tradicionalmente, “Yahvé de los Ejércitos”» pretende referirse al título יהוה צבאות / 'Yahweh of Armies'. Además, la alternativa tradicional correcta debe reflejar «el SEÑOR de los Ejércitos» o similar, no repetir la opción principal.
  - severity: medium
    issue: La nota [b] debe invertirse para corresponder a la lectura principal revisada.
    rationale: Si el texto principal se corrige a «es llamado», la nota alternativa debe ofrecer «será llamado», siguiendo el audit trail inglés.
  - severity: low
    issue: Hay pequeños problemas de redacción en las notas y decisiones léxicas.
    rationale: 'Una nota está entrecomillada de forma torpe (''O: «es llamado...»'') y una rationale repite «de los Ejércitos» en una comparación donde parece haber un lapsus. No impiden comprensión, pero conviene limpiarlos.'
