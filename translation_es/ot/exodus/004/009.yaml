    reason: lexical_alternative
  - marker: b
    text: O «se volverá sangre».
    reason: lexical_alternative
  revision_rationale: Se corrige la nota [b] para que siga la decisión léxica documentada sobre la transformación en sangre; se mejora la expresión de גַּם con «siquiera»; y se ajusta el partitivo a un español más natural («un poco de agua del Nilo») sin apartarse del hebreo ni de la auditoría inglesa.
