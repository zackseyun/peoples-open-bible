  glossary_alignment: No hay términos teológicos del glosario principal en juego salvo la preservación de «todo Israel», que está bien mantenida. No se detectan conflictos con Yahvé/Mesías/Cristo/Espíritu, etc. La decisión geográfica «región montañosa de Efraín» concuerda con la rationale del POB.
