translation:
  language: es
  text: Y echaron suertes para las tareas[a], el pequeño así como el grande[b], el maestro con el estudiante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que entiende con el estudiante», preservando más literalmente el sentido de מֵבִין como «uno que entiende» o «experto».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «pequeño y grande», un modismo que significa que todos fueron tratados por igual, sin distinción de rango o estatus.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּפִּילוּ
  english_pob_choice: they cast
  chosen_spanish: echaron
  alternatives_spanish:
  - arrojaron
  - hicieron caer
  lexicon: HALOT
  rationale: Con גּוֹרָלֹות, el verbo expresa el modismo de echar suertes; «echaron» es natural en español y conserva la acción sin explicarla de más.
- source_word: גּוֹרָלֹות
  english_pob_choice: lots
  chosen_spanish: suertes
  alternatives_spanish:
  - lotes
  - sortes
  lexicon: HALOT
  rationale: En español bíblico y moderno, «suertes» comunica bien el procedimiento de sorteo y evita una calca técnica.
- source_word: מִשְׁמֶרֶת
  english_pob_choice: their duties
  chosen_spanish: los deberes
  alternatives_spanish:
  - el servicio
  - la guardia
  - la responsabilidad
  lexicon: HALOT
  rationale: Aquí el sustantivo señala la asignación concreta determinada por sorteo; «deberes» transmite la función sin añadir posesivo no presente en el hebreo.
- source_word: לְעֻמַּת
  english_pob_choice: alike
  chosen_spanish: así como
  alternatives_spanish:
  - de igual modo
  - por igual
  - en correspondencia con
  lexicon: HALOT
  rationale: La preposición introduce una relación de emparejamiento entre categorías; «así como» refleja esa equivalencia distributiva en español.
- source_word: כַּקָּטֹן כַּגָּדוֹל
  english_pob_choice: small and great
  chosen_spanish: el pequeño ... el grande
  alternatives_spanish:
  - el menor ... el mayor
  - el pequeño y el grande
  - pequeños y grandes
  lexicon: HALOT
  rationale: La frase hebrea es idiomática e indica trato sin distinción de rango. «El pequeño así como el grande» conserva la estructura y el contraste.
- source_word: מֵבִין
  english_pob_choice: teacher
  chosen_spanish: el maestro
  alternatives_spanish:
  - el que entiende
  - el experto
  - el instructor
  lexicon: HALOT
  rationale: Aunque literalmente es «el que entiende», en este contexto de organización del servicio musical la POB inglesa optó por «teacher»; «maestro» preserva esa función relacional en español.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  lexicon: HALOT
  rationale: Preposición simple de compañía o asociación; «con» es la equivalencia directa y clara.
- source_word: תַּלְמִיד
  english_pob_choice: student
  chosen_spanish: el estudiante
  alternatives_spanish:
  - el aprendiz
  - el alumno
  - el discípulo
  lexicon: HALOT
  rationale: En este marco no se trata del sentido técnico de «discípulo»; «estudiante» mantiene la relación instruccional sin cargar con connotaciones posteriores.
theological_decisions:
- issue: Igualdad de estatus en la asignación por sorteo
  english_pob_reading: small and great alike; all were treated alike regardless of rank or status
  chosen_spanish_reading: el pequeño así como el grande
  alternative_spanish_readings:
  - pequeños y grandes por igual
  - el menor y el mayor por igual
  rationale: La expresión hebrea indica distribución sin distinción de rango. La redacción española preserva la idiomaticidad y la igualdad implícita sin expandirla innecesariamente.
  doctrine_reference: Orden del servicio/administración cultual; principio de imparcialidad en la asignación
- issue: Relación pedagógica del último binomio
  english_pob_reading: the teacher with the student
  chosen_spanish_reading: el maestro con el estudiante
  alternative_spanish_readings:
  - el que entiende con el aprendiz
  - el instructor con el alumno
  rationale: La lectura inglesa interpreta מֵבִין como «teacher» por el contexto organizativo. En español, «maestro» comunica esa función sin borrar la tensión entre el sentido literal («el que entiende») y el funcional.
  doctrine_reference: No doctrinal; decisión lexical-contextual sobre terminología de instrucción
translation_notes:
  revision_awareness: Esta versión corrige la validación anterior anclando la nota [a] directamente en la frase «los deberes[a]» y evita notas sueltas sin marcador en el texto. También conserva la decisión del POB inglés de no añadir posesivo explícito y mantiene la pareja final como relación pedagógica.
  spanish_consistency_notes:
  - Se prefirió «suertes» para גּוֹרָלוֹת por ser el equivalente bíblico más natural en español.
  - Se evitó «SEÑOR» o cualquier sustitución teológica porque el versículo no contiene el nombre divino.
  - «Maestro / estudiante» mantiene la tensión lexical documentada sin forzar una terminología eclesial tradicional.
  - La estructura «el pequeño así como el grande» conserva el paralelismo hebreo y la nota cultural implícita de trato igualitario.
