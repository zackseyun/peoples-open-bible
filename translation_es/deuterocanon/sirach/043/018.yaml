revisions:
- from: Como la blancura de la nieve[a] deslumbra los ojos, y ante su caída[b] el corazón tiembla[c].
  to: La apariencia de la nieve[a] deslumbra los ojos[c], y ante su caída[b] el corazón tiembla.
  rationale: 'Se corrige el término principal para תואר a «apariencia», en conformidad con la decisión léxica auditada y sin perder la alternativa «blancura», que queda en nota. También se elimina el «Como» comparativo para reflejar mejor la afirmación poética del original. Se restauran y ajustan las notas para alinearlas con el aparato inglés: alternativa léxica para «blancura», variante textual sobre la caída/precipitación, e inestabilidad textual en el testigo de Masada. «El corazón tiembla» se mantiene por ser una buena solución española para יהמה dentro de la revisión aprobada.'
