translation:
  language: es
  text: Porque supe que ciertamente no me escucharían, porque son un pueblo de cerviz dura; pero en la tierra de su destierro volverán a su corazón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «tomarán a pecho esto» / «volverán en su corazón». El griego dice literalmente: «volverán a su corazón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνων
  english_pob_choice: I knew
  chosen_spanish: supe
  alternatives_spanish:
  - he sabido
  - reconocí
  lexicon: BDAG / LEH
  rationale: El aoristo expresa conocimiento previo completo; en español, «supe» comunica bien el conocimiento puntual y decidido del hablante sin volver la frase pesada. Evita un presente gnómico que no refleja el valor narrativo del griego.
- source_word: οὐ μὴ ἀκούσωσίν
  english_pob_choice: would certainly not listen
  chosen_spanish: ciertamente no me escucharían
  alternatives_spanish:
  - de ningún modo me oirían
  - no me obedecerían
  lexicon: BDAG
  rationale: La combinación οὐ μή con subjuntivo da una negación enfática de futuro. «Ciertamente no me escucharían» mantiene esa fuerza y conserva el verbo auditivo «escuchar», que puede abarcar el sentido de atender u obedecer según el contexto.
- source_word: μου
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - mi voz
  lexicon: BDAG
  rationale: El pronombre se integra naturalmente con «escuchar» en español como objeto directo/pronominal. «Mi voz» añadiría un matiz no explícito en el griego.
- source_word: λαὸς
  english_pob_choice: people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una nación
  - un pueblo de Israel
  lexicon: BDAG
  rationale: «Pueblo» conserva el valor colectivo y covenantal del término sin desplazarse a un tono político como «nación».
- source_word: σκληροτράχηλος
  english_pob_choice: stiff-necked
  chosen_spanish: de cerviz dura
  alternatives_spanish:
  - terco
  - endurecido de cuello
  lexicon: LEH
  rationale: «De cerviz dura» reproduce la metáfora bíblica establecida para σκληροτράχηλος. Aunque es una expresión tradicional, sigue siendo clara y no suaviza la dureza moral del término.
- source_word: ἐπιστρέψουσιν
  english_pob_choice: they will return
  chosen_spanish: volverán
  alternatives_spanish:
  - se volverán
  - retornarán
  - se convertirán
  lexicon: BDAG
  rationale: El verbo básico es «volver/retornar». «Volverán» es natural en español y conserva la idea de movimiento de regreso sin adelantar explícitamente «convertirse» como traducción principal.
- source_word: ἐπὶ καρδίαν αὐτῶν
  english_pob_choice: to their heart
  chosen_spanish: a su corazón
  alternatives_spanish:
  - en su corazón
  - a sí mismos
  lexicon: LEH
  rationale: La frase griega es idiomática y mantiene la imagen interior de retorno/reflexión. «A su corazón» conserva la metáfora visible en español y permite la lectura de volver la atención al interior o tomar conciencia.
- source_word: ἐν γῇ ἀποικισμοῦ αὐτῶν
  english_pob_choice: in the land of their exile
  chosen_spanish: en la tierra de su destierro
  alternatives_spanish:
  - en la tierra de su exilio
  - en la tierra de su deportación
  lexicon: LEH
  rationale: «Destierro» es una equivalencia natural y bíblicamente comprensible para ἀποικισμός. Evita la frialdad técnica de «deportación» y comunica la condición de alejamiento forzado del hogar.
theological_decisions:
- issue: El giro idiomático de volver al corazón
  english_pob_reading: Rendered literally enough to preserve the metaphor, implying inward repentance without making 'repent' the main-text verb.
  chosen_spanish_reading: Se conserva el lenguaje del corazón sin convertirlo en una paráfrasis explícita de arrepentimiento.
  alternative_spanish_readings:
  - volverán en sí
  - tomarán conciencia
  - se arrepentirán
  rationale: El griego no usa aquí el verbo explícito de arrepentirse, sino una imagen de retorno interior. Mantener «volverán a su corazón» preserva la tensión textual y permite la lectura de una vuelta interior sin cerrar la ambigüedad que el original deja abierta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que ajustó la conjunción contrastiva para reflejar καὶ como «pero» en un contraste natural. En español se adopta igualmente una oposición directa con «pero», manteniendo la secuencia causal y la imagen idiomática del regreso al corazón.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece el nombre divino.
  - «Cerviz dura» conserva la metáfora bíblica tradicional sin sustituirla por un equivalente más interpretativo.
  - «Destierro» se eligió por claridad y por su cercanía semántica al alejamiento forzado implícito en ἀποικισμός.
  - La nota de pie preserva la alternativa idiomática para «volver a su corazón», conforme al tratamiento auditado en inglés.
