base_translation:
  language: en
  yaml_path: translation/ot/exodus/034/007.yaml
  text: keeping steadfast love for thousands[a], forgiving iniquity and transgression and sin, but he will by no means leave unpunished, visiting the iniquity of fathers on children and on children's children[c][b], to the third and to the fourth generation.
  footnotes:
  - marker: a
    text: Or 'for a thousand generations'; the Hebrew says simply 'for thousands,' likely contrasting God's enduring covenant love with judgment 'to the third and the fourth generation.'
    reason: alternative_reading
  - marker: b
    text: Or 'he will certainly not acquit' or 'he will certainly not leave unpunished.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'fathers'; this is retained because the source text is specifically masculine here, though the sense is generational descent.
    reason: cultural_note
