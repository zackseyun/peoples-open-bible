translation:
  language: es
  text: No busquen la muerte por el error de su vida[a], ni atraigan la destrucción sobre ustedes mismos por las obras de sus manos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No deseen la muerte por el error de su vida». El verbo griego puede significar más literalmente «ser celosos por» o «desear».'
    reason: lexical_alternative
  - marker: b
    text: «Las obras de sus manos» puede referirse en general a las acciones humanas; la expresión concreta también puede evocar las cosas hechas por seres humanos.
    reason: cultural_note
lexical_decisions:
- source_word: ζηλοῦτε
  english_pob_choice: court
  chosen_spanish: codicien
  alternatives_spanish:
  - deseen
  - ansíen
  - sean celosos por
  lexicon: LSJ
  rationale: En este contexto, con θάνατον como objeto, el verbo expresa un deseo o búsqueda torcida de la muerte. En español, «codiciar» transmite mejor esa atracción activa y censurable que un calco como «ser celosos por», y evita suavizar el matiz moral.
- source_word: θάνατον
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: LSJ
  rationale: Es la equivalencia directa y conserva el objeto del verbo sin añadir matices no presentes en el griego.
- source_word: ἐν πλάνῃ
  english_pob_choice: by the error
  chosen_spanish: por el error
  alternatives_spanish:
  - en el error
  - por el extravío
  - por la ilusión
  lexicon: LSJ
  rationale: «πλάνη» puede ser error, extravío o engaño. «Por el error» mantiene el valor instrumental/comprensivo del giro y deja abierta la idea de una vida desviada o engañada.
- source_word: ζωῆς ὑμῶν
  english_pob_choice: of your life
  chosen_spanish: de su vida
  alternatives_spanish:
  - de sus vidas
  - de su modo de vida
  - de su conducta
  lexicon: LSJ
  rationale: En español, el singular colectivo «su vida» funciona de manera natural para el plural exhortativo. Conserva la relación genitiva con «error» sin forzar una paráfrasis como «modo de vida».
- source_word: ἐπισπᾶσθε
  english_pob_choice: draw ... upon yourselves
  chosen_spanish: atraigan ... sobre sí
  alternatives_spanish:
  - traigan ... sobre sí
  - arrastren ... sobre sí
  - acarrean ... sobre sí
  lexicon: LSJ
  rationale: 'El medio sugiere implicación reflexiva: traer algo sobre uno mismo. «Atraigan ... sobre sí» mantiene esa fuerza y suena natural en una advertencia moral.'
- source_word: ὄλεθρον
  english_pob_choice: destruction
  chosen_spanish: la destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: LSJ
  rationale: «Destrucción» refleja el peso de ὄλεθρος sin introducir un sentido técnico posterior como «perdición».
- source_word: ἔργοις χειρῶν ὑμῶν
  english_pob_choice: by the works of your hands
  chosen_spanish: por las obras de sus manos
  alternatives_spanish:
  - por las obras de sus manos
  - por lo que hacen sus manos
  - por sus hechos
  lexicon: LSJ
  rationale: La expresión concreta conserva el posible eco bíblico de acciones humanas hechas o producidas con las manos, sin especificar más de lo que el texto permite.
theological_decisions:
- issue: Cómo traducir la exhortación negativa con ζηλοῦτε sin perder el tono amonestador ni volverla áspera en español
  english_pob_reading: Do not court death
  chosen_spanish_reading: No codicien la muerte
  alternative_spanish_readings:
  - No deseen la muerte
  - No sean celosos por la muerte
  rationale: El español necesita una forma idiomática que conserve la advertencia moral. «Codicien» expresa deseo indebido y peligroso, más cercano a la fuerza exhortativa del griego que una expresión demasiado literal o poco natural.
  doctrine_reference: Principio de equivalencia óptima; prioridad del sentido original con español publicable.
- issue: Cómo reproducir el valor reflexivo del medio ἐπισπᾶσθε en un contexto de auto-inculpación
  english_pob_reading: draw destruction upon yourselves
  chosen_spanish_reading: atraigan la destrucción sobre sí
  alternative_spanish_readings:
  - traigan la destrucción sobre sí
  - acarrean la destrucción sobre sí
  rationale: El verbo no describe una destrucción externa solamente, sino una ruina que los sujetos se procuran a sí mismos. «Atraigan ... sobre sí» conserva esa implicación reflexiva y el movimiento hacia el propio sujeto.
  doctrine_reference: Primacía del original; mantener la responsabilidad humana explícita en la advertencia.
translation_notes:
  revision_awareness: 'El texto griego del testimonio fuente coincide con la capa de traducción adjudicada y no requiere correcciones textuales. La redacción española sigue la lectura inglesa auditada, conservando la advertencia doble: no desear la muerte y no atraerse la destrucción por las propias obras.'
  spanish_consistency_notes:
  - Se mantiene «muerte» y «destrucción» para conservar el paralelismo del verso.
  - Se usa el tratamiento plural de cortesía/exhortación implícita con «no codicien» y formas reflexivas en plural.
  - Se preserva la imagen concreta de «las obras de sus manos» sin sustituirla por una abstracción como «conducta», salvo en la nota explicativa.
