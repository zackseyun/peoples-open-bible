id: 2MA.7.5
reference: 2 Maccabees 7:5
source:
  edition: lxx-swete-1909
  text: ἄχρηστον δὲ αὐτὸν τοῖς λοιποῖς γενόμενον ἐκέλευσεν τῇ πυρᾷ προσάγειν ἔτινουν καὶ τηγανίζειν. τῆς δὲ ἀτμίδος ἐφʼ ἱκανὸν διδούσης τοῦ τηγάνου ἀλλήλους παρεκάλουν σὺν τῇ μητρὶ γενναίως τελευτᾷν, λέγοντες οὕτως
  language: Greek
