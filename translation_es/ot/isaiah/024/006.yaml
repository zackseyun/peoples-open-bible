translation:
  language: es
  text: Por eso una maldición[a] ha devorado la tierra[b], y sus habitantes cargan con su culpa; por eso los habitantes de la tierra están abrasados, y quedan pocos hombres[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un juramento'; el hebreo puede significar 'juramento' o 'maldición', pero aquí, en un contexto de pacto quebrantado y juicio, 'maldición' expresa mejor el sentido.
    reason: lexical_alternative
  - marker: b
    text: O 'el país' / 'los habitantes del país' si se tomara en un sentido más localizado; aquí se mantiene 'la tierra' por el alcance amplio del capítulo.
    reason: alternative_reading
  - marker: c
    text: Hebreo 'hombres' en sentido colectivo, es decir, seres humanos; el término enfatiza la humanidad mortal.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad la relación de consecuencia del contexto previo sin perder el valor causal de la cláusula hebrea.
- source_word: אָֽלָה
  english_pob_choice: a curse
  chosen_spanish: una maldición
  alternatives_spanish:
  - un juramento
  - una maldición jurada
  lexicon: HALOT
  rationale: En este marco de juicio y transgresión, 'maldición' comunica mejor en español el efecto penal y judicial del término que un 'juramento' neutral.
- source_word: אָכְלָה
  english_pob_choice: has devoured
  chosen_spanish: ha devorado
  alternatives_spanish:
  - ha consumido
  - ha comido
  lexicon: HALOT
  rationale: Conserva la metáfora viva de consumo destructivo del verbo hebreo y suena natural en español bíblico actual.
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: Mantiene el alcance amplio del pasaje; 'tierra' funciona en español para el ámbito creado y evita estrechar indebidamente el sentido a 'país'.
- source_word: וַיֶּאְשְׁמ֖וּ
  english_pob_choice: bear their guilt
  chosen_spanish: cargan con su culpa
  alternatives_spanish:
  - llevan su culpa
  - quedan culpables
  - padecen su culpa
  lexicon: HALOT
  rationale: '''Cargan con su culpa'' preserva la idea de culpabilidad y de consecuencia judicial sin forzar una sola lectura meramente forense o meramente punitiva.'
- source_word: יֹשְׁבֵי בָהּ
  english_pob_choice: those who dwell in it
  chosen_spanish: sus habitantes
  alternatives_spanish:
  - los que habitan en ella
  - los que viven en ella
  lexicon: HALOT
  rationale: Es una equivalencia idiomática clara en español que conserva el referente colectivo del participio.
- source_word: חָרוּ
  english_pob_choice: are scorched
  chosen_spanish: están abrasados
  alternatives_spanish:
  - están quemados
  - están calcinados
  - están consumidos por el fuego
  lexicon: HALOT
  rationale: '''Abrasados'' transmite el efecto del juicio con fuerza imagética y evita una lectura excesivamente técnica o demasiado extrema como ''calcinados''.'
- source_word: יֹשְׁבֵי אֶרֶץ
  english_pob_choice: the inhabitants of the earth
  chosen_spanish: los habitantes de la tierra
  alternatives_spanish:
  - los moradores de la tierra
  - los que habitan la tierra
  lexicon: HALOT
  rationale: Conserva la repetición del sustantivo para mantener el paralelismo del versículo y la amplitud del ámbito de juicio.
- source_word: וְנִשְׁאַר
  english_pob_choice: are left
  chosen_spanish: quedan
  alternatives_spanish:
  - permanecen
  - sobreviven
  lexicon: HALOT
  rationale: En combinación con el cuantificador siguiente, 'quedan' suena natural y mantiene la idea de remanente.
- source_word: אֱנוֹשׁ
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - seres humanos
  - humanidad
  - personas
  lexicon: HALOT
  rationale: Respeta el valor colectivo del hebreo y la decisión del POB en favor de una traducción masculina representativa donde el término designa humanidad mortal.
- source_word: מִזְעָר
  english_pob_choice: few
  chosen_spanish: pocos
  alternatives_spanish:
  - muy pocos
  - un número pequeño
  lexicon: HALOT
  rationale: Expresa brevedad de número de manera sobria y directa, en coordinación con 'quedan'.
theological_decisions:
- issue: Sentido de אָלָה en contexto de juicio
  english_pob_reading: covenantal/judicial 'curse'
  chosen_spanish_reading: '''maldición'' en sentido judicial'
  alternative_spanish_readings:
  - '''juramento'''
  - '''juramento maldito'''
  rationale: El contexto inmediato habla de culpa y castigo, por lo que la lectura judicial es la que mejor refleja la fuerza del hebreo; el español 'maldición' conserva esa tensión sin suavizarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Alcance de אֶרֶץ
  english_pob_reading: earth
  chosen_spanish_reading: la tierra, en sentido amplio
  alternative_spanish_readings:
  - el país
  - la región
  rationale: El capítulo presenta un juicio de alcance global; por eso 'tierra' es preferible a una lectura localizada como 'país' o 'región'.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
- issue: Valor colectivo de אֱנוֹשׁ
  english_pob_reading: men
  chosen_spanish_reading: hombres, como humanidad mortal
  alternative_spanish_readings:
  - personas
  - seres humanos
  rationale: Se conserva la fuerza del hebreo para la humanidad frágil y mortal, siguiendo la decisión del POB de no neutralizar indebidamente el colectivo representativo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'The English POB audit trail was checked: no applied revisions were recorded, and the latest revision pass was unchanged with high agreement. The Spanish draft therefore follows the stable audited sense, preserving the same lexical tensions (curse/oath, earth/land, men/human beings) in Spanish.'
  spanish_consistency_notes:
  - Se mantiene 'tierra' para אֶרֶץ de forma coherente con el alcance amplio del pasaje.
  - '''Maldición'' se usa como equivalente principal de אָלָה, con la alternativa ''juramento'' preservada en nota.'
  - '''Hombres'' traduce אֱנוֹשׁ como colectivo humano masculino representativo, en línea con la política del POB.'
  - La estructura repetitiva del hebreo se refleja con dos cláusulas de consecuencia introducidas por 'por eso'.
