translation:
  language: es
  text: Y José recogió toda la plata[a] que se halló en la tierra de Egipto y en la tierra de Canaán por el grano que ellos compraban, y José llevó la plata a la casa de Faraón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el dinero». El hebreo dice literalmente «toda la plata», usando el metal como medio de pago.
    reason: lexical_alternative
  - marker: b
    text: «La casa de Faraón» puede referirse no solo a la residencia real, sino también a su casa real o tesorería.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְלַקֵּט
  english_pob_choice: gathered up
  chosen_spanish: recogió
  alternatives_spanish:
  - juntó
  - reunió
  lexicon: HALOT
  rationale: לקט expresa la idea de recoger o reunir elementos dispersos. En español, «recogió» transmite bien la acción de acumular dinero procedente de muchas compras sin sonar demasiado pesado.
- source_word: כָּל הַכֶּסֶף
  english_pob_choice: all the silver
  chosen_spanish: toda la plata
  alternatives_spanish:
  - todo el dinero
  lexicon: HALOT
  rationale: El hebreo dice literalmente «plata». Se conserva el metal como medio de pago, dejando que el contexto económico dé la referencia monetaria.
- source_word: הַנִּמְצָא
  english_pob_choice: found
  chosen_spanish: que se halló
  alternatives_spanish:
  - que fue hallada
  - que estaba disponible
  lexicon: HALOT
  rationale: 'El participio de מצא admite un sentido resultativo: dinero presente o localizado en esas tierras. «Que se halló» mantiene ese matiz con naturalidad en español.'
- source_word: בְאֶרֶץ מִצְרַיִם וּבְאֶרֶץ כְּנַעַן
  english_pob_choice: in the land of Egypt and in the land of Canaan
  chosen_spanish: en la tierra de Egipto y en la tierra de Canaán
  alternatives_spanish:
  - en Egipto y en Canaán
  - por toda la tierra de Egipto y de Canaán
  lexicon: HALOT
  rationale: Se preserva la forma nominal hebrea «la tierra de…» para reflejar el paralelismo y la delimitación geográfica del texto.
- source_word: בַּשֶּׁבֶר אֲשֶׁר הֵם שֹׁבְרִים
  english_pob_choice: for the grain that they were buying
  chosen_spanish: por el grano que ellos compraban
  alternatives_spanish:
  - por el grano que estaban comprando
  - en pago del grano que compraban
  lexicon: HALOT
  rationale: שבר en este contexto del relato de José significa comprar grano. En español, «por el grano que ellos compraban» mantiene el valor transaccional de la preposición ב y el sentido durativo del participio.
- source_word: וַיָּבֵא ... בֵּיתָה פַרְעֹה
  english_pob_choice: brought the silver into Pharaoh’s house
  chosen_spanish: llevó la plata a la casa de Faraón
  alternatives_spanish:
  - trajo la plata a la casa de Faraón
  - llevó la plata al palacio de Faraón
  lexicon: HALOT
  rationale: El movimiento hacia la casa se expresa de forma natural con «llevó ... a». «Casa de Faraón» conserva la literalidad hebrea y deja abierto el posible sentido de casa real, administración o tesorería.
theological_decisions:
- issue: Referencia de «la casa de Faraón»
  english_pob_reading: Pharaoh’s house may refer not only to the royal residence but more broadly to Pharaoh’s household or treasury.
  chosen_spanish_reading: «la casa de Faraón» puede aludir no solo a la residencia real, sino también a la casa real o tesorería de Faraón.
  alternative_spanish_readings:
  - palacio de Faraón
  - casa real de Faraón
  - tesorería de Faraón
  rationale: El hebreo בֵּיתָה פַרְעֹה es deliberadamente amplio. Mantener «casa» en el texto principal conserva la ambigüedad documentada por la POB en inglés sin imponer una identificación interpretativa única.
  doctrine_reference: Ninguna
- issue: Valor económico de כֶּסֶף
  english_pob_reading: all the silver / all the money
  chosen_spanish_reading: toda la plata
  alternative_spanish_readings:
  - todo el dinero
  rationale: El texto hebreo nombra el metal, no solo su función monetaria. La traducción mantiene esa concreción léxica y evita borrar la tensión entre metal y moneda.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente eliminó la coma después de «Canaan» para unir con más fluidez la frase de finalidad. En español se refleja esa misma relación sin pausa fuerte: «en la tierra de Canaán, por el grano...».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiere; aquí no aparece el nombre divino.
  - Se usa «Faraón» con mayúscula como nombre/título propio, coherente con el uso bíblico en español.
  - Se preserva «plata» para כֶּסֶף y «grano» para שֶׁבֶר, evitando sustituciones explicativas que borren el lenguaje del original.
  - La puntuación sigue el flujo narrativo del hebreo y del texto inglés revisado, con una sola pausa antes de la frase de finalidad.
