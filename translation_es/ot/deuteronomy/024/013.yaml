translation:
  language: es
  text: Sin falta le devolverás la prenda[a] al ponerse el sol, para que pueda acostarse con su manto y te bendiga; y te será justicia[b] delante de Yahvé tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que fue tomado en prenda».
    reason: lexical_alternative
  - marker: b
    text: O «te será contado como justicia» o «será un acto justo para ti».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָשֵׁב תָּשִׁיב
  english_pob_choice: You must surely return
  chosen_spanish: Sin falta se lo devolverás
  alternatives_spanish:
  - ciertamente se lo devolverás
  - deberás devolverlo sin falta
  - lo restituirás sin falta
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la orden. En español, «sin falta» comunica bien esa fuerza enfática sin sonar tan rígido como una repetición literal.
- source_word: הַעֲבוֹט
  english_pob_choice: the pledge
  chosen_spanish: lo
  alternatives_spanish:
  - la prenda
  - el empeño
  - el objeto dado en prenda
  lexicon: HALOT
  rationale: El contexto legal ya identifica el objeto retenido como garantía. En el texto principal, el pronombre átono evita sobrecargar la línea; la nota conserva la alternativa léxica de «prenda»/«empeño».
- source_word: כְּבֹא הַשֶּׁמֶשׁ
  english_pob_choice: at sunset
  chosen_spanish: al ponerse el sol
  alternatives_spanish:
  - al caer el sol
  - al atardecer
  - cuando se ponga el sol
  lexicon: HALOT
  rationale: Es una expresión idiomática de tiempo. «Al ponerse el sol» reproduce la imagen hebrea con naturalidad en español.
- source_word: וְשָׁכַב בְּשַׂלְמָתוֹ
  english_pob_choice: so that he may lie down in his cloak
  chosen_spanish: para que pueda acostarse con su manto
  alternatives_spanish:
  - para que se acueste con su manto
  - y se acueste con su manto
  - para que duerma con su manto
  lexicon: HALOT
  rationale: שַׂלְמָה es una prenda exterior; «manto» comunica mejor su función que el genérico «ropa». «Acostarse» expresa el resultado buscado sin forzar a «dormir».
- source_word: וּבֵרֲכֶךָּ
  english_pob_choice: and bless you
  chosen_spanish: y te bendiga
  alternatives_spanish:
  - y te bendecirá
  - y te bendiga a ti
  lexicon: HALOT
  rationale: El hebreo presenta el verbo como consecuencia deseada. En español, el subjuntivo final («te bendiga») encaja con la relación de propósito/resultdo indicada por el contexto.
- source_word: וּלְךָ תִּהְיֶה צְדָקָה
  english_pob_choice: and it will be righteousness for you
  chosen_spanish: y te será justicia
  alternatives_spanish:
  - y te será contado como justicia
  - y será una obra justa para ti
  - y será rectitud para ti
  lexicon: HALOT
  rationale: צְדָקָה puede denotar una acción que Dios considera recta. «Te será justicia» mantiene la tensión entre acto justo y evaluación divina, sin cerrarla a una formulación más interpretativa.
- source_word: לִפְנֵי יְהוָה אֱלֹהֶיךָ
  english_pob_choice: before Yahweh your God
  chosen_spanish: delante de Yahvé tu Dios
  alternatives_spanish:
  - en presencia de Yahvé tu Dios
  - ante Yahvé tu Dios
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» según la pauta del proyecto. «Delante de» traduce bien לִפְנֵי en un registro bíblico claro y natural.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Conforme a la norma del proyecto, se lo vierte como «Yahvé» en el texto principal para no ocultar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Valor de צְדָקָה
  english_pob_reading: and it will be righteousness for you
  chosen_spanish_reading: y te será justicia
  alternative_spanish_readings:
  - y te será contado como justicia
  - y será un acto justo para ti
  rationale: La expresión puede referirse tanto a una acción justa como a su valoración delante de Dios. «Te será justicia» preserva esa ambigüedad teológica sin explicitar una lectura doctrinal posterior.
  doctrine_reference: Lexical note on צְדָקָה / covenant righteousness
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin depender mecánicamente de su redacción. Se conservó la intensificación del mandato, la idiomaticidad temporal y la ambigüedad de צְדָקָה, mientras se aplicó la terminología española del proyecto para יהוה como «Yahvé».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el Tetragrama, conforme al estándar del proyecto.
  - «Manto» se eligió para שַׂלְמָה por ser más preciso que «vestido» o «ropa» en este contexto.
  - «Te bendiga» usa subjuntivo por valor final/resultativo, acorde con el hebreo y con español bíblico contemporáneo.
