translation:
  language: es
  text: Porque tu fidelidad[a] está con nosotros, y hemos endurecido[b] nuestro cuello[c], y tú eres nuestro corrector.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu fe está con nosotros».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y endurecimos».'
    reason: previous_rendering
  - marker: c
    text: La imagen de «endurecer el cuello» es un giro bíblico de terquedad u obstinación.
    reason: cultural_note
lexical_decisions:
- source_word: πίστις
  english_pob_choice: faithfulness
  chosen_spanish: fidelidad
  alternatives_spanish:
  - fe
  - confianza
  lexicon: BDAG
  rationale: En el contexto dirigido a Dios, el sentido más natural no es «fe» como acto humano de creer, sino la cualidad divina de constancia y lealtad. «Fidelidad» preserva esa relación de pacto y evita la ambigüedad de que Dios tenga 'fe' en el sentido ordinario.
- source_word: μεθʼ ἡμῶν
  english_pob_choice: is with us
  chosen_spanish: está con nosotros
  alternatives_spanish:
  - está entre nosotros
  - permanece con nosotros
  lexicon: BDAG
  rationale: La preposición expresa presencia relacional. «Está con nosotros» es claro y fiel sin añadir matices no exigidos por el griego.
- source_word: ἐσκληρύναμεν τράχηλον ἡμῶν
  english_pob_choice: we stiffened our neck
  chosen_spanish: hemos endurecido nuestro cuello
  alternatives_spanish:
  - hemos endurecido la cerviz
  - hemos sido obstinados
  lexicon: BDAG
  rationale: Se conserva la metáfora corporal del griego. «Cuello» funciona de forma natural en español y permite mantener el valor idiomático de obstinación sin sustituirlo directamente por una explicación interpretativa. «Cerviz» es posible, pero menos común en español actual.
- source_word: παιδευτής
  english_pob_choice: disciplinarian
  chosen_spanish: disciplinador
  alternatives_spanish:
  - el que disciplina
  - maestro
  - corrector
  lexicon: LSJ
  rationale: El término abarca entrenar, corregir y disciplinar. «Disciplinador» conserva la idea de autoridad correctiva y formativa, y corresponde bien al auditorio divino sin volver la frase excesivamente explicativa.
theological_decisions:
- issue: πίστις aplicado a Dios
  english_pob_reading: your faithfulness
  chosen_spanish_reading: tu fidelidad
  alternative_spanish_readings:
  - tu fe
  rationale: La lectura teológica más coherente es la fidelidad constante de Dios hacia su pueblo, no una 'fe' divina en el sentido humano. La alternativa literal se conserva como posibilidad semántica, pero en español suena menos natural y más ambigua.
  doctrine_reference: 'Contested terms: πίστις → faith; faithfulness/trust footnoted where contested'
translation_notes:
  revision_awareness: 'La redacción sigue el último pass revisado: mantiene καί como «y» en lugar de introducir contraste explícito; conserva el aspecto perfecto-completivo con «hemos endurecido»; y respeta el singular colectivo del griego con «nuestro cuello», evitando una pluralización interpretativa.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» para el nombre divino en otros contextos del proyecto, pero aquí el texto griego no contiene κύριος ni un sustituto nominal del Tetragrámaton; por eso no se introduce.
  - Se evita «Cristo/Mesías» porque no aparece en el versículo.
  - «Fidelidad» se usa como equivalente estable de πίστις en referencia a la constancia divina.
  - «Disciplinador» preserva el campo semántico de παιδευτής sin convertirlo en una paráfrasis devocional.
