translation:
  language: es
  text: Y eché raíces entre un pueblo glorificado[a], en la porción del Señor[b], su herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre un pueblo glorioso». El participio griego puede entenderse de manera más adjetival, aunque el texto principal conserva su fuerza verbal/resultativa.'
    reason: lexical_alternative
  - marker: b
    text: La frase «en la porción del Señor, su herencia» también puede entenderse como «en la porción de la herencia del Señor» o «en la herencia asignada al Señor».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐρρίζωσα
  english_pob_choice: I took root
  chosen_spanish: eché raíces
  alternatives_spanish:
  - me arraigué
  - eché raíz
  lexicon: LSJ
  rationale: El aoristo activo en primera persona expresa una acción completa y lograda; «eché raíces» conserva la imagen vegetal y el valor resultativo sin sonar forzado en español.
- source_word: λαῷ
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  lexicon: LSJ
  rationale: «Pueblo» reproduce mejor el sentido colectivo y con frecuencia comunitario/covenantal de λαός que «gente» o «nación».
- source_word: δεδοξασμένῳ
  english_pob_choice: glorified
  chosen_spanish: glorificado
  alternatives_spanish:
  - glorioso
  - honrado
  - hecho glorioso
  lexicon: LSJ
  rationale: El participio perfecto pasivo de δοξάζω tiene fuerza resultativa; «glorificado» preserva esa acción recibida mejor que el adjetivo plano «glorioso».
- source_word: μερίδι
  english_pob_choice: portion
  chosen_spanish: porción
  alternatives_spanish:
  - parte
  - heredad
  lexicon: LSJ
  rationale: «Porción» es natural en español y mantiene la idea de una parte asignada o repartida, en paralelo con κληρονομίας.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: LSJ
  rationale: En español bíblico, «el Señor» es la forma natural para κύριος en este sintagma; no se usa «Yahvé» aquí porque el griego cita κύριος y el contexto inmediato del libro no aporta el nombre divino explícito.
- source_word: κληρονομίας
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - patrimonio
  - posesión
  lexicon: LSJ
  rationale: «Herencia» conserva el sentido de bien asignado/recibido y encaja con «porción»; «patrimonio» y «posesión» serían posibles pero menos directos.
theological_decisions:
- issue: Cómo reflejar el valor resultativo del participio perfecto pasivo δεδοξασμένῳ.
  english_pob_reading: glorified people
  chosen_spanish_reading: pueblo glorificado
  alternative_spanish_readings:
  - pueblo glorioso
  - pueblo honrado
  rationale: La traducción mantiene la tensión entre cualidad y acción recibida. «Glorificado» evita reducir el griego a un mero adjetivo de cualidad inherente.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo reconstruir la frase compacta ἐν μερίδι Κυρίου κληρονομίας αὐτοῦ.
  english_pob_reading: in the portion of the Lord, his inheritance
  chosen_spanish_reading: en la porción del Señor, su herencia
  alternative_spanish_readings:
  - en la porción de la herencia del Señor
  - en la porción asignada del Señor
  rationale: La redacción sigue de cerca la sintaxis griega y conserva la ambigüedad auditable entre aposición y relación posesiva. La coma ayuda a mantener visible la estructura compacta sin decidir en exceso.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto base se mantiene con acuerdo alto entre los controles y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al uso bíblico español del proyecto, sin convertirlo a un sustituto tipográfico.
  - «Glorificado» se usa de manera consistente para preservar la fuerza participial de δεδοξασμένῳ.
  - «Herencia» y «porción» conservan el paralelismo semántico del sintagma final sin introducir glosas interpretativas en el texto principal.
