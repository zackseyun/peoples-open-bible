translation:
  language: es
  text: y los hititas, y los ferezeos, y los refaím[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los gigantes». El hebreo רְפָאִים puede entenderse descriptivamente en algunos contextos, pero aquí lo más probable es que se refiera a un pueblo de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  - así como
  lexicon: HALOT
  rationale: La construcción con וְ + אֵת continúa la lista de pueblos de los versículos previos. En español, el objeto directo no se marca aquí y basta con coordinar con «y» para conservar el flujo enumerativo.
- source_word: הַחִתִּי
  english_pob_choice: the Hittites
  chosen_spanish: los hititas
  alternatives_spanish:
  - el hitita
  lexicon: HALOT
  rationale: Aunque el hebreo presenta forma singular con artículo, funciona colectivamente como nombre de pueblo. En español, el plural etnónimo comunica mejor el grupo étnico en una lista de naciones.
- source_word: הַפְּרִזִּי
  english_pob_choice: the Perizzites
  chosen_spanish: los ferezeos
  alternatives_spanish:
  - el ferezeo
  - los perizitas
  lexicon: HALOT
  rationale: Se conserva el etnónimo en plural para reflejar el valor colectivo del singular hebreo. «Ferezeos» es una forma española inteligible y tradicionalmente usada para este pueblo.
- source_word: הָרְפָאִים
  english_pob_choice: the Rephaim
  chosen_spanish: los refaítas
  alternatives_spanish:
  - los refaím
  - los gigantes
  lexicon: HALOT
  rationale: En este contexto de lista de pueblos, el hebreo apunta con más probabilidad a un grupo étnico/nacional. «Refaítas» mantiene el nombre propio y evita resolver en el texto principal la posible lectura descriptiva «gigantes».
theological_decisions:
- issue: Cómo traducir רְפָאִים en una lista de pueblos de la tierra prometida
  english_pob_reading: Rendered as the proper ethnic name "Rephaim"; "giants" kept as an alternative note
  chosen_spanish_reading: 'Nombre de pueblo: «los refaítas»'
  alternative_spanish_readings:
  - los gigantes
  rationale: Génesis 15:19–21 enumera pueblos que habitan la tierra prometida a Abram. En ese marco, la lectura como nombre étnico es la más fuerte y preserva la tensión lexical sin introducir en el texto principal una interpretación tradicional que no es obligatoria aquí.
  doctrine_reference: Primacía del contexto original y preservación de la tensión lexical; no armonizar prematuramente con usos descriptivos de רְפָאִים en otros pasajes.
translation_notes:
  revision_awareness: 'Alineado con la última pasada del texto fuente: no hay cambios aplicados y el consenso de revisión es alto. Se conserva la decisión del POB inglés de tratar רְפָאִים como etnónimo en el texto principal, dejando la lectura alternativa en nota.'
  spanish_consistency_notes:
  - Se mantiene el plural etnónimo para nombres de pueblos, conforme al uso español bíblico y a la función colectiva del hebreo singular.
  - Se usa «refaítas» como transliteración española estable y legible, coherente con la práctica de nombres étnicos en la serie.
  - No se introduce una mayúscula innecesaria en «hititas/ferezeos/refaítas» salvo cuando el estilo editorial del proyecto la requiera en otros contextos.
