  to: Y Sansón estuvo acostado hasta la medianoche. Luego se levantó a medianoche y agarró las puertas del portón de la ciudad y los dos postes de la puerta, y los arrancó junto con la tranca[a]; se los puso sobre los hombros y los subió a la cima del monte que está enfrente de Hebrón[b].
  rationale: Se corrigió el anclaje de la nota [b] para que corresponda a la frase geográfica que explica. Se reemplazó «las puertas de la puerta de la ciudad» por «las puertas del portón de la ciudad» para lograr español natural sin perder el sentido arquitectónico de דלתות שער העיר. También se fortaleció «tomó» a «agarró» para reflejar mejor la fuerza de ויאחז. El resto del versículo se mantiene por ser fiel y legible.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:43:21Z'
