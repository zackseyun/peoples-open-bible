translation:
  language: es
  text: ¿Quedará sin respuesta la multitud de palabras, y quedará en lo cierto un hombre de labios[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿quedará justificado un hombre de labios?». El hebreo «hombre de labios» se refiere a una persona caracterizada por el hablar, probablemente excesivo o vacío.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲרֹב דְּבָרִים
  english_pob_choice: a multitude of words
  chosen_spanish: la multitud de palabras
  alternatives_spanish:
  - muchas palabras
  - una abundancia de palabras
  lexicon: HALOT
  rationale: רֹב con דְּבָרִים expresa abundancia o multitud; «la multitud de palabras» conserva el paralelismo retórico y el matiz de exceso verbal sin sonar forzado en español.
- source_word: לֹא יֵעָנֶה
  english_pob_choice: go unanswered
  chosen_spanish: no se responderá
  alternatives_spanish:
  - no tendrá respuesta
  - quedará sin respuesta
  lexicon: HALOT
  rationale: 'El nifal de ענה tiene valor pasivo: «ser respondido». En español, «no se responderá» mantiene la pregunta retórica y suena más natural que una traducción rígida.'
- source_word: וְאִם
  english_pob_choice: and should
  chosen_spanish: y podrá
  alternatives_spanish:
  - y si
  - y acaso
  lexicon: HALOT
  rationale: En este paralelismo interrogativo, וְאִם introduce una segunda pregunta retórica. «Y podrá» comunica mejor ese tono que un simple «y si», sin perder la conexión coordinada.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino representativo. «Un hombre» preserva esa forma gramatical y el carácter típico del dicho.
- source_word: שְׂפָתַיִם
  english_pob_choice: of lips
  chosen_spanish: de labios
  alternatives_spanish:
  - verbal
  - hablador
  lexicon: HALOT
  rationale: Literalmente «labios» funciona como idiomático para la habla. «Un hombre de labios» conserva la imagen hebrea y la posible crítica a la verborrea, mejor que una paráfrasis explícita.
- source_word: יִצְדָּק
  english_pob_choice: be proved right
  chosen_spanish: quedar en lo cierto
  alternatives_spanish:
  - ser declarado justo
  - ser justificado
  - ser tenido por justo
  lexicon: HALOT
  rationale: 'צדק aquí tiene sentido forense/evaluativo: ser mostrado como correcto. «Quedar en lo cierto» expresa bien ese valor en español sin cargar de antemano con el peso teológico de «justificar».'
theological_decisions:
- issue: Valor forense de יִצְדָּק en un proverbio retórico
  english_pob_reading: be proved right
  chosen_spanish_reading: quedar en lo cierto
  alternative_spanish_readings:
  - ser justificado
  - ser declarado justo
  - ser tenido por justo
  rationale: El contexto discute si la abundancia de palabras puede producir vindicación. En español, «quedar en lo cierto» comunica la idea de evaluación correcta sin introducir asociaciones doctrinales ajenas al proverbio.
  doctrine_reference: justicia/rectitud forense en contextos sapienciales; cf. uso evaluativo de צדק
- issue: Imagen idiomática «man of lips»
  english_pob_reading: a man of lips
  chosen_spanish_reading: un hombre de labios
  alternative_spanish_readings:
  - un hombre hablador
  - un hombre de mucho hablar
  rationale: Se conserva la metáfora hebrea porque el POB en inglés también la preserva y aclara en nota. Traducirla como «hablador» sería más interpretativo y borraría la tensión entre literalidad e idiomática.
  doctrine_reference: lenguaje sapiencial figurado; preservación de idiomatisms
translation_notes:
  revision_awareness: Se siguió el borrador inglés auditado y no se introdujeron cambios respecto del sentido principal. La única tensión relevante es el modismo hebreo «hombre de labios» y el valor forense de יִצְדָּק, ambos preservados con una nota explicativa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, aunque en este versículo no aparece el tetragrámaton.
  - Se usó «justo/lo cierto» solo en sentido evaluativo, no como terminología doctrinal técnica.
  - La puntuación reproduce el paralelismo interrogativo del hebreo con dos preguntas coordinadas.
