translation:
  language: es
  text: 'Este montículo es un testigo[a], y la piedra erguida es un testigo: yo no cruzaré este montículo hacia ti[b], y tú no cruzarás este montículo y esta piedra erguida hacia mí para mal[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Este montículo es un testigo, y la piedra erguida es testigo». El hebreo repite la idea de testigo en paralelo para ambos marcadores del límite.
    reason: lexical_alternative
  - marker: b
    text: O «pasaré / pasarás» en lugar de «cruzaré / cruzarás»; el sentido es atravesar este límite.
    reason: lexical_alternative
  - marker: c
    text: «Para mal» significa con intención dañina u hostil, no simplemente moverse físicamente al otro lado del límite.
    reason: cultural_note
lexical_decisions:
- source_word: עֵד
  english_pob_choice: a witness
  chosen_spanish: un testigo
  alternatives_spanish:
  - un testigo
  - un testimonio
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo predicativo para declarar la función del objeto como señal jurídica/memorial. En español, «testigo» conserva mejor la idea de un objeto que da testimonio que «testimonio», que suena más abstracto.
- source_word: גַּל
  english_pob_choice: heap
  chosen_spanish: montículo
  alternatives_spanish:
  - montón de piedras
  - amontonamiento
  - heap
  lexicon: HALOT
  rationale: El contexto inmediato es un montón de piedras levantado como linde. «Montículo» es natural y transmite la forma física sin volverlo demasiado técnico.
- source_word: וְעֵדָה
  english_pob_choice: and the pillar is a witness
  chosen_spanish: y la piedra erguida es un testigo
  alternatives_spanish:
  - y la piedra erguida es testigo
  - y el pilar es un testigo
  - y la piedra memorial es un testigo
  lexicon: HALOT
  rationale: Se mantiene la paralelidad con עֵד y se explicita el valor funcional de la מַצֵּבָה como piedra levantada. «Piedra erguida» evita una traducción eclesiástica de «pilar» y conserva el objeto de piedra del contexto.
- source_word: מַצֵּבָה
  english_pob_choice: pillar
  chosen_spanish: piedra erguida
  alternatives_spanish:
  - pilar
  - estela
  - piedra levantada
  lexicon: HALOT
  rationale: La palabra refiere a una piedra erigida como marcador. «Piedra erguida» es clara y fiel; «pilar» puede sonar demasiado arquitectónico en español moderno.
- source_word: אִם
  english_pob_choice: that
  chosen_spanish: de que
  alternatives_spanish:
  - que
  - si
  lexicon: HALOT
  rationale: En este contexto de pacto/juramento, la forma hebrea introduce el contenido de la cláusula ligada al testimonio. «De que» en español ayuda a integrar la subordinada sin convertirla en una condición simple.
- source_word: אֶעֱבֹר / תַעֲבֹר
  english_pob_choice: pass over
  chosen_spanish: pasaré / pasarás
  alternatives_spanish:
  - cruzaré / cruzarás
  - pasaré por encima / pasarás por encima
  - pasaré al otro lado / pasarás al otro lado
  lexicon: HALOT
  rationale: «Pasar» conserva la idea de atravesar el límite señalado por el montículo y la piedra, sin forzar una imagen espacial más específica que el hebreo no exige.
- source_word: אֵלֶיךָ / אֵלַי
  english_pob_choice: toward you / toward me
  chosen_spanish: hacia ti / hacia mí
  alternatives_spanish:
  - a ti / a mí
  - contra ti / contra mí
  lexicon: HALOT
  rationale: «Hacia» preserva la dirección del movimiento. No se introduce «contra» porque la intención hostil ya queda expresada al final con «para mal».
- source_word: לְרָעָה
  english_pob_choice: for harm
  chosen_spanish: para mal
  alternatives_spanish:
  - para daño
  - con intención de hacer daño
  - para perjuicio
  lexicon: HALOT
  rationale: La expresión hebrea indica propósito nocivo o intención hostil, no mero desplazamiento físico. «Para mal» es breve, bíblico y suficientemente claro en español.
translation_notes:
  revision_awareness: El audit trail inglés retuvo la estructura paralela con un segundo «that» y distinguió entre el acto de pasar y la intención nociva final; la versión española conserva esa estructura con dos subordinadas introducidas por «de que», mantiene el paralelismo testigo/testigo, y evita suavizar la cláusula final a una mera referencia espacial.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el hebreo subyacente es el nombre divino; aquí no aplica.
  - Se mantuvo el tono jurídico-covenantal con «testigo» y «para mal», sin sustituirlos por formulaciones eclesiásticas más libres.
  - La repetición paralela de la cláusula se conservó para reflejar el hebreo y el tratamiento inglés revisado.
