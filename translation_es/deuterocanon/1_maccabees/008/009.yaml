translation:
  language: es
  text: y que los de Grecia habían planeado venir y quitarlos[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'destruirlos' / 'exterminarlos'; el verbo griego puede implicar una eliminación forzosa, pero se mantiene 'quitarlos' en el texto principal por ser una traducción más amplia.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἐκ τῆς Ἑλλάδος
  english_pob_choice: those from Greece
  chosen_spanish: los de Grecia
  alternatives_spanish:
  - los griegos
  - los de Helade
  lexicon: LSJ
  rationale: La expresión griega significa literalmente 'los de Grecia/Helade'. En español, 'los de Grecia' conserva la estructura de procedencia sin convertirla de inmediato en un etnónimo más interpretativo. 'Los griegos' es posible, pero estrecha un poco el matiz de origen que la fuente mantiene.
- source_word: ἐβουλεύσαντο
  english_pob_choice: had planned
  chosen_spanish: habían planeado
  alternatives_spanish:
  - habían resuelto
  - habían tramado
  - habían tomado consejo
  lexicon: LSJ
  rationale: El verbo medio expresa deliberación o formación de un plan. 'Habían planeado' reproduce bien esa idea en español moderno sin introducir por sí mismo la carga negativa de 'tramado'.
- source_word: ἐλθεῖν
  english_pob_choice: to come
  chosen_spanish: venir
  alternatives_spanish:
  - ir
  - llegar
  lexicon: LSJ
  rationale: El infinitivo básico es 'venir'. En español suena natural después de 'habían planeado' y conserva el movimiento hacia los referidos.
- source_word: ἐξᾶραι
  english_pob_choice: remove
  chosen_spanish: eliminarlos
  alternatives_spanish:
  - borrarlos
  - destruirlos
  - sacarlos
  lexicon: LSJ
  rationale: El verbo puede abarcar quitar, remover o incluso eliminar en contexto bélico-político. Dado que el contexto apunta a una acción hostil contra personas, 'eliminarlos' comunica mejor el alcance potencial sin forzar necesariamente la imagen de aniquilación total. 'Eliminar' además recoge el valor de 'remove' con naturalidad en español.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los mismos
  lexicon: LSJ
  rationale: Pronombre de objeto directo referente al grupo mencionado. En español, el clítico 'los' es la forma más natural y concisa en esta secuencia verbal.
translation_notes:
  revision_awareness: Se tomó en cuenta el texto griego de 1 Macabeos 8:9 y el audit trail inglés, especialmente la decisión de mantener la amplitud semántica de ἐξᾶραι sin sobrerrepresentar el grado de destrucción. No hubo revisiones aplicadas en el pasaje inglés, y la coincidencia de revisión indica que no se requerían cambios.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y directo, adecuado para prosa narrativa histórica.
  - Se usó el perfecto compuesto 'habían planeado' para reflejar anterioridad respecto del resto de la oración.
  - '''Los de Grecia'' preserva la procedencia geográfica del original sin necesidad de una etiqueta étnica más fuerte.'
  - El clítico de objeto directo 'los' evita una perífrasis innecesaria y suena natural en español bíblico contemporáneo.
