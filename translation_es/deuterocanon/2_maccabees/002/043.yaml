translation:
  language: es
  text: Puesto que estamos por celebrar la purificación[a], les hemos escrito. Por tanto, harán bien en observar los días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «guardar los días» o «celebrar los días». El mismo verbo griego aparece antes con «la purificación».
    reason: lexical_alternative
lexical_decisions:
- source_word: Μέλλοντες
  english_pob_choice: Since we are about to
  chosen_spanish: Puesto que estamos por
  alternatives_spanish:
  - Como estamos por
  - Ya que estamos por
  lexicon: LSJ
  rationale: El participio prospectivo con οὖν introduce la ocasión de la carta. «Puesto que estamos por» expresa cercanía e inminencia de manera natural en español sin perder el valor prospectivo.
- source_word: ἄγειν
  english_pob_choice: celebrate / observe
  chosen_spanish: celebrar / observar
  alternatives_spanish:
  - guardar
  - tener
  - conmemorar
  lexicon: LSJ
  rationale: 'El mismo verbo se usa con distinto complemento: con τὸν καθαρισμόν remite a celebrar la festividad, y con τὰς ἡμέρας a observar los días. Mantener dos verbos españoles ayuda a la legibilidad, pero conserva la repetición semántica del griego.'
- source_word: τὸν καθαρισμόν
  english_pob_choice: the purification
  chosen_spanish: la purificación
  alternatives_spanish:
  - la limpieza
  - la festividad de la purificación
  lexicon: LSJ
  rationale: El sustantivo significa literalmente «purificación/limpieza». En este contexto festivo alude a la conmemoración de la purificación del templo, pero el texto español principal conserva la forma más cercana al griego.
- source_word: ἐγράψαμεν
  english_pob_choice: we have written
  chosen_spanish: les hemos escrito
  alternatives_spanish:
  - les escribimos
  lexicon: LSJ
  rationale: El aoristo epistolar puede verterse como pasado simple o como perfecto. «Les hemos escrito» suena natural en español y preserva la inmediatez de una carta ya enviada.
- source_word: καλῶς ... ποιήσετε
  english_pob_choice: you will do well
  chosen_spanish: harán bien
  alternatives_spanish:
  - procederán bien
  - les convendrá
  lexicon: LSJ
  rationale: La expresión es una fórmula idiomática de exhortación o aprobación. «Harán bien» reproduce bien el matiz de recomendación sin exagerar la fuerza imperativa.
- source_word: τὰς ἡμέρας
  english_pob_choice: the days
  chosen_spanish: los días
  alternatives_spanish:
  - estos días
  - los días festivos
  lexicon: LSJ
  rationale: El griego dice simplemente «los días». En contexto se trata de los días conmemorativos mencionados antes, pero el español principal conserva la frase literal sin añadir una glosa interpretativa.
translation_notes:
  revision_awareness: Se sigue el acuerdo de alta concordancia del expediente en inglés, sin revisiones pendientes; se mantiene la repetición del verbo ἄγειν y la literalidad de τὰς ἡμέρας, con una nota que preserva la alternativa lexical ya documentada.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el nombre divino aparece; aquí no aplica.
  - Se mantuvo un registro sobrio y eclesial, evitando calcos pesados.
  - La nota al pie conserva la tensión léxica entre «celebrar» y «guardar/observar» sin resolverla de manera reductiva.
