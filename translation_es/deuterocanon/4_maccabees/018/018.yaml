translation:
  language: es
  text: 'Pues ella no olvidó el cántico que Moisés enseñó[a], que enseña: «Yo mataré, y haré vivir».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La frase alude al Cántico de Moisés en Deuteronomio 32:39. Algunas traducciones de ese pasaje dicen: «Yo mato y yo hago vivir»; aquí, sin embargo, el griego de este versículo usa futuro: «Yo mataré, y haré vivir».'
