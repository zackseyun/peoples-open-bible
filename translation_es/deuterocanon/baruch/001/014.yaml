translation:
  language: es
  text: Y leerán este libro que hemos enviado a ustedes[a], para proclamar en la casa del Señor en un día de fiesta y en días de tiempo señalado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más fluidamente, 'en días de fiesta y en tiempos señalados'. La expresión griega 'en días de tiempo señalado' es algo áspera tal como está transmitida; el texto principal se mantiene cercano a la fuente y la alternativa ofrece una formulación más natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναγνώσεσθε
  english_pob_choice: you shall read
  chosen_spanish: leerán
  alternatives_spanish:
  - deberán leer
  - han de leer
  lexicon: BDAG
  rationale: El futuro con valor exhortativo preserva la fuerza directiva del griego sin añadir explícitamente 'en voz alta'. En español, 'leerán' comunica bien la instrucción dada a los destinatarios.
- source_word: τὸ βιβλίον τοῦτο
  english_pob_choice: this book
  chosen_spanish: este libro
  alternatives_spanish:
  - este rollo
  - este escrito
  lexicon: BDAG
  rationale: βιβλίον puede ser libro o documento; 'libro' es natural en español y mantiene la referencia amplia sin forzar el formato material.
- source_word: ἀπεστείλαμεν
  english_pob_choice: we have sent
  chosen_spanish: hemos enviado
  alternatives_spanish:
  - enviamos
  - mandamos
  lexicon: BDAG
  rationale: El aoristo remite a una acción completada ya realizada; el pretérito perfecto en español refleja bien la relación con la orden presente y suena natural.
- source_word: ἐξαγορεῦσαι
  english_pob_choice: to proclaim
  chosen_spanish: para proclamarlo
  alternatives_spanish:
  - para declararlo
  - para leerlo públicamente
  lexicon: LSJ
  rationale: En este contexto cultual y público, 'proclamarlo' conserva la fuerza formal y pública del infinitivo mejor que una glosa más rígida. El pronombre 'lo' retoma 'este libro' de modo natural.
- source_word: ἐν οἴκῳ Κυρίου
  english_pob_choice: in the house of the Lord
  chosen_spanish: en la casa del Señor
  alternatives_spanish:
  - en la casa del Señor Dios
  - en el templo del Señor
  lexicon: BDAG
  rationale: Se mantiene la expresión bíblica idiomática 'casa del Señor'. Aunque el proyecto suele traducir κύριος como 'Señor' en este contexto griego, la frase sigue siendo transparente para el lector español y respeta el eco cultual del original.
- source_word: ἐν ἡμέρᾳ ἑορτῆς
  english_pob_choice: on a feast day
  chosen_spanish: en día de fiesta
  alternatives_spanish:
  - en un día de fiesta
  - en una festividad
  lexicon: BDAG
  rationale: '''Fiesta'' reproduce el sentido de ἑορτή y, con ''en día de fiesta'', mantiene una formulación breve y bíblica en español.'
- source_word: ἐν ἡμέραις καιροῦ
  english_pob_choice: on days of appointed time
  chosen_spanish: en días de tiempo señalado
  alternatives_spanish:
  - en días señalados
  - en tiempos determinados
  lexicon: BDAG
  rationale: καιρός puede denotar tiempo oportuno o señalado. 'Tiempo señalado' conserva la idea de un tiempo fijado/apropiado sin suavizar demasiado la expresión griega, que el audit trail reconoce como algo algo áspera.
theological_decisions:
- issue: Tratamiento de Κυρίου en un contexto griego de culto
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: El texto griego dice Κυρίου; no hay un nombre hebreo explícito en esta forma transmitida. Por eso se conserva 'Señor' en una expresión cultual estable ('casa del Señor'), siguiendo el valor auditado del inglés POB y sin introducir una equivalencia con el Tetragrámaton que el griego no exhibe aquí.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El contexto de auditoría indica una correspondencia mayoritaria con el inglés POB y ningún cambio requerido en la revisión más reciente. Se conservó la estructura sintáctica básica del original griego, ajustando solo lo necesario para que el español suene natural sin perder la literalidad controlada ni la tensión de 'días de tiempo señalado'.
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para Κυρίου conforme al uso auditado en este pasaje griego.
  - '''Tiempo señalado'' preserva la rareza expresiva del griego y evita normalizar excesivamente la frase.'
  - '''Proclamarlo'' conserva el matiz público/cultual de ἐξαγορεῦσαι sin ampliar indebidamente el sentido.'
