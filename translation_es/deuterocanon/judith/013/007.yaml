translation:
  language: es
  text: 'Entonces se acercó a la cama, asió la cabellera de su cabeza, y dijo: «Fortaléceme, oh Dios de Israel, en este día».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγγίσασα
  english_pob_choice: went up to
  chosen_spanish: acercándose a
  alternatives_spanish:
  - fue hasta
  - se acercó a
  lexicon: LSJ
  rationale: El participio expresa proximidad o acercamiento hacia la cama; en español, «acercándose a» conserva el movimiento sin forzar una imagen más específica que el griego no exige.
- source_word: τῆς κλίνης
  english_pob_choice: bed
  chosen_spanish: la cama
  alternatives_spanish:
  - el lecho
  - el catre
  lexicon: LSJ
  rationale: κλίνη denota una cama o lecho. «La cama» es la opción más clara y natural en español moderno, y mantiene el sentido narrativo directo.
- source_word: ἐδράξατο
  english_pob_choice: seized
  chosen_spanish: agarró
  alternatives_spanish:
  - se aferró a
  - tomó por
  lexicon: LSJ
  rationale: El verbo implica tomar con firmeza. «Agarró» comunica la acción con fuerza en español sin volverla artificial; «se aferró a» sugeriría más permanencia de la que el contexto requiere.
- source_word: τῆς κόμης τῆς κεφαλῆς αὐτοῦ
  english_pob_choice: the hair of his head
  chosen_spanish: el cabello de su cabeza
  alternatives_spanish:
  - el pelo de su cabeza
  - el cabello de la cabeza de él
  lexicon: LSJ
  rationale: La construcción genitiva redundante del griego se conserva de forma natural con «el cabello de su cabeza». «Cabello» suena más digno y bíblico que «pelo» en este contexto narrativo.
- source_word: Κραταίωσόν με
  english_pob_choice: Strengthen me
  chosen_spanish: Fortaléceme
  alternatives_spanish:
  - Hazme fuerte
  - Dame fuerzas
  lexicon: LSJ
  rationale: El imperativo pide ser hecho fuerte o fortalecido. «Fortaléceme» reproduce bien la fuerza verbal y mantiene el tono de oración breve y urgente.
- source_word: ὁ θεὸς Ἰσραήλ
  english_pob_choice: O God of Israel
  chosen_spanish: oh Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  - Dios de Israel, te ruego
  lexicon: LSJ
  rationale: Aunque el griego usa nominativo, la función es vocativa en la invocación. «Oh Dios de Israel» conserva la solemnidad de la súplica sin añadir elementos ausentes.
- source_word: ἐν τῇ ἡμέρᾳ ταύτῃ
  english_pob_choice: on this day
  chosen_spanish: en este día
  alternatives_spanish:
  - hoy
  - en el día de hoy
  lexicon: LSJ
  rationale: La frase temporal se traduce de manera directa. «En este día» mantiene la especificidad del momento señalado por el texto y el tono litúrgico/narrativo.
theological_decisions:
- issue: Invocación directa a Dios en un acto de liberación violenta
  english_pob_reading: Render the prayer directly and solemnly as 'Strengthen me, O God of Israel, on this day.'
  chosen_spanish_reading: 'Traducir la oración de manera directa y solemne: «Fortaléceme, oh Dios de Israel, en este día».'
  alternative_spanish_readings:
  - «Fortaléceme, Dios de Israel, en este día»
  - «Dame fuerzas, oh Dios de Israel, hoy»
  rationale: El texto presenta una súplica breve e inmediata. La redacción española conserva la urgencia, la dirección al Dios de Israel y la tensión narrativa sin explicar ni suavizar la escena.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica y la claridad textual; español contemporáneo, no paráfrasis devocional.'
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete 1909 y el acuerdo alto del audit trail inglés, sin introducir cambios de sentido respecto de la versión inglesa aprobada.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y la invocación vocativa con «oh» por naturalidad en español bíblico contemporáneo.
  - Se usa «cabello» en lugar de «pelo» por registro digno y consistencia con el estilo de la POB en narración solemne.
  - No se introduce «Mesías», «Yahvé» ni otras equivalencias no presentes en este versículo.
  - La puntuación reproduce una cita directa breve con tono de oración, acorde con el griego y con la audita traducción inglesa.
