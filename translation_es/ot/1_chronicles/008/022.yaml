  lexicon: conjunción
  rationale: Las waw prefijadas unen una lista de nombres; en español la conjunción normal es 'y'. No se usa 'e' porque la coordinación ante 'i-' no lo exige aquí y la forma nominativa del nombre no comienza con ese sonido en español.
