  spanish_quality_summary: El español es generalmente claro, pero «que que» es incorrecto y debe ser «que». Además, «te pidan» suena demasiado amplio para el matiz de necesidad/súplica del contexto. Una formulación como «tengan que pedirte» mejora la naturalidad y conserva mejor la fuerza semántica sin volverse innecesariamente áspera. Para preservar la distinción léxica del original, conviene usar «tus hijos» en la primera cláusula y «tus hijos varones» en la segunda, aunque sea algo más explícito.
  glossary_alignment: No hay términos teológicos de glosario mayor en juego. El punto clave de alineación léxica es respetar la diferencia entre τέκνα y υἱῶν, y mantener la metáfora corporal de ἐμβλέπειν εἰς χεῖρας. La revisión propuesta hace ambas cosas.
  issues:
