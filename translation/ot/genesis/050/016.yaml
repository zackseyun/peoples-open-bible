id: GEN.50.16
reference: Genesis 50:16
source:
  edition: WLC
  text: וַ/יְצַוּ֕וּ אֶל יוֹסֵ֖ף לֵ/אמֹ֑ר אָבִ֣י/ךָ צִוָּ֔ה לִ/פְנֵ֥י מוֹת֖/וֹ לֵ/אמֹֽר־׃
translation:
  text: So they sent word to Joseph[a], saying, “Your father commanded before his death, saying,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'So they commanded Joseph, saying.' The Hebrew verb commonly means 'command,' but here likely refers to sending a message to Joseph.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַוּוּ
  chosen: they sent word
  alternatives:
  - they commanded
  - they instructed
  lexicon: HALOT
  rationale: Although the verb צוה commonly means 'command,' in this context with אֶל יוֹסֵף and the following indirect quotation, the brothers are not portrayed as issuing a command to Joseph but as conveying a message to him. 'Sent word' captures the idiomatic sense in natural English while preserving the communicative action.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Standard directional preposition introducing Joseph as the recipient of the message.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive construct introduces reported speech. 'Saying' is the most natural English narrative equivalent.
- source_word: אָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Direct second-person possessive addressed to Joseph.
- source_word: צִוָּה
  chosen: gave this command
  alternatives:
  - commanded
  - charged
  lexicon: HALOT
  rationale: The same Hebrew root צוה appears again here. 'Gave this command' is idiomatic English and prepares for the content of the command in the next verse, while preserving the force of the verb.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - prior to
  lexicon: HALOT
  rationale: 'Temporal sense is required here: Jacob spoke prior to his death.'
- source_word: מוֹתוֹ
  chosen: his death
  alternatives:
  - his dying
  lexicon: HALOT
  rationale: Standard nominal rendering of the construct with pronominal suffix.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: A second speech introducer marking that the father's command is about to be quoted in the following verse; retaining 'saying' preserves the Hebrew discourse structure.
