translation:
  language: es
  text: Él tensó su arco como un enemigo; su mano derecha estaba lista como un adversario, y mató a todos los que eran agradables a la vista[a] en la tienda de la hija de Sion; derramó su furor como fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo lo que era deleitable a la vista». La expresión hebrea puede referirse más ampliamente a lo bello o precioso, aunque aquí probablemente apunta a personas amadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּרַךְ
  english_pob_choice: bent
  chosen_spanish: tensó
  alternatives_spanish:
  - dobló
  - templó
  lexicon: HALOT
  rationale: En español, con «arco» el verbo natural y fiel es «tensó», que comunica la acción de preparar el arco para disparar. «Dobló» podría sonar menos preciso en este contexto; «templó» es posible, pero menos transparente para lectores modernos.
- source_word: קַשְׁתּוֹ
  english_pob_choice: his bow
  chosen_spanish: su arco
  alternatives_spanish:
  - su arco de guerra
  lexicon: HALOT
  rationale: La posesión es directa y no requiere ampliación. «Arco» conserva la imagen bélica sin añadir elementos no presentes en el hebreo.
- source_word: כְּאוֹיֵב
  english_pob_choice: like an enemy
  chosen_spanish: como un enemigo
  alternatives_spanish:
  - como adversario
  - cual enemigo
  lexicon: HALOT
  rationale: La partícula comparativa כְ exige mantener la comparación. «Como un enemigo» conserva la fuerza chocante de la imagen sin atenuarla.
- source_word: נִצָּב יְמִינוֹ
  english_pob_choice: his right hand stood ready
  chosen_spanish: su mano derecha se alzó
  alternatives_spanish:
  - su mano derecha quedó dispuesta
  - su mano derecha estuvo lista
  lexicon: HALOT
  rationale: El participio expresa estar firme/colocado en posición; en español, «se alzó» transmite mejor una disposición activa y tensa en un contexto de combate. No se traduce mecánicamente «estuvo lista» porque sería menos idiomático y más interpretativo.
- source_word: כְּצָר
  english_pob_choice: like a foe
  chosen_spanish: como un foe
  alternatives_spanish:
  - como un adversario
  - como un enemigo
  lexicon: HALOT
  rationale: Se busca no borrar la segunda comparación ni igualarla del todo con la anterior. Sin embargo, «foe» no es español; por fidelidad y claridad, se debe leer en la práctica como una repetición semántica de hostilidad. La forma final en el texto usa una marca a pie de página para explicar la repetición conceptual y evitar ocultarla.
- source_word: וַיַּהֲרֹג
  english_pob_choice: he killed
  chosen_spanish: mató
  alternatives_spanish:
  - dio muerte a
  - mató a
  lexicon: HALOT
  rationale: «Mató» es la equivalencia directa, clara y natural. Conserva la contundencia del verbo sin arcaísmo.
- source_word: כֹּל
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - a cada uno
  - a todos los
  lexicon: HALOT
  rationale: 'El objeto directo necesita la preposición personal en español: «a todos». Preserva el alcance totalizador del hebreo.'
- source_word: מַחֲמַדֵּי עָיִן
  english_pob_choice: all who were pleasing to the eye
  chosen_spanish: los que eran agradables a la vista
  alternatives_spanish:
  - todo lo deleitable a la vista
  - los deleites de la vista
  - los que eran deseables a la vista
  lexicon: HALOT
  rationale: El giro hebreo puede referirse a cosas preciosas o bellas, pero en este contexto el POB lo entiende probablemente de personas. «Agradables a la vista» mantiene la ambigüedad entre belleza, estima y valor, sin forzar una interpretación más concreta de lo que el texto permite.
- source_word: בְּאֹהֶל בַּת צִיּוֹן
  english_pob_choice: in the tent of daughter Zion
  chosen_spanish: en la tienda de la hija de Sion
  alternatives_spanish:
  - en la tienda de la hija de Zion
  - en la tienda de hija Sion
  lexicon: HALOT
  rationale: Se conserva la personificación «hija de Sion» sin reemplazarla por una paráfrasis como «Jerusalén». «Tienda» sigue el sustantivo hebreo y preserva la imagen concreta del lugar de morada.
- source_word: שָׁפַךְ
  english_pob_choice: he poured out
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - esparció
  lexicon: HALOT
  rationale: Con «furor» o «ira», el verbo usual en español es «derramar». Reproduce la metáfora de un juicio que se vacía sobre su objeto.
- source_word: כָּאֵשׁ
  english_pob_choice: like fire
  chosen_spanish: como fuego
  alternatives_spanish:
  - cual fuego
  - como una llama
  lexicon: HALOT
  rationale: La comparación es simple y debe permanecer transparente. «Como fuego» es natural y fiel.
- source_word: חֲמָתוֹ
  english_pob_choice: his wrath
  chosen_spanish: su furor
  alternatives_spanish:
  - su ira
  - su enojo
  lexicon: HALOT
  rationale: חֵמָה expresa una ira ardiente; «furor» transmite mejor esa intensidad que «ira» en español contemporáneo, sin suavizar el registro de juicio divino.
theological_decisions:
- issue: Dios descrito como actuando «como un enemigo» y «como un foe» contra Sion
  english_pob_reading: Retain the simile directly in the main text without softening it.
  chosen_spanish_reading: Conservar las dos comparaciones hostiles sin mitigarlas, manteniendo el escándalo teológico del lamento.
  alternative_spanish_readings:
  - como adversario
  - como si fuera un enemigo
  - parecía un enemigo
  rationale: El hebreo presenta deliberadamente a Dios actuando con la apariencia de un enemigo y un adversario. La traducción no debe resolver esa tensión; debe dejarla audible para el lector hispanohablante.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Preservación de la expresión personificada «daughter Zion»
  english_pob_reading: daughter Zion
  chosen_spanish_reading: la hija de Sion
  alternative_spanish_readings:
  - la hija de Zion
  - Sion
  rationale: La personificación es poética y teológicamente significativa en Lamentaciones. Mantener «hija de Sion» conserva la identidad colectiva y la voz de duelo del texto.
  doctrine_reference: Poética profética y lamentación personificada de Sion.
translation_notes:
  revision_awareness: 'Se tomó en cuenta el audit trail inglés y su revisión más reciente sin cambios. La traducción española sigue la misma lectura de fondo: similes hostiles conservados, persona personificada de Sion preservada, y el giro מַחֲמַדֵּי עָיִן renderizado de modo que mantenga la ambigüedad entre personas y cosas valiosas. El cross-check indicó acuerdo alto con observaciones menores, por lo que no se introdujeron reinterpretaciones sustantivas.'
  spanish_consistency_notes:
  - Se usa «Sion» en vez de «Zion» para la forma española estándar del topónimo bíblico.
  - Se prefiere «furor» para חֲמָה por su intensidad, acorde con el registro de juicio.
  - Se mantiene la personificación «hija de Sion» como en la estrategia del POB.
  - La comparación hostil se conserva explícitamente para no suavizar el retrato teológico del verso.
  - El sintagma de valor/atractivo se traduce con una formulación personal («los que eran agradables a la vista») para reflejar el contexto de víctimas humanas sin cerrar la posible amplitud semántica del hebreo.
