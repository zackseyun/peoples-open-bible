translation:
  text: Recline like a well-bred man[a], and do not gobble[c][b], lest you become disgusting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a distinguished man' or 'like a chosen man'; the Hebrew phrase is somewhat uncertain in nuance, though the sense is clearly courteous, refined table conduct.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel in Swete does not correspond to this Hebrew line at Sirach 31:19, indicating a source-level mismatch in the verse tradition.
    reason: textual_variant
  - marker: c
    text: Reclining was the customary posture at formal meals in the ancient Mediterranean world.
    reason: cultural_note
lexical_decisions:
- source_word: הסב
  chosen: Recline
  alternatives:
  - Sit down
  - Dine leaning
  lexicon: HALOT
  rationale: In banquet context the verb means to recline at table rather than merely 'turn' or 'sit.' 'Recline' preserves the ancient dining posture implied by the Hebrew.
- source_word: כאיש אשר נבחר
  chosen: like a man of refinement
  alternatives:
  - like a distinguished man
  - like a chosen man
  - like a well-bred man
  lexicon: HALOT
  rationale: The phrase likely describes someone select, distinguished, or well-bred in conduct. 'Of refinement' brings out the social-ethical sense in context of table manners better than the more wooden 'chosen man.' 'Man' is retained for gender-accurate correspondence to איש.
- source_word: תעט
  chosen: gulp it down
  alternatives:
  - devour
  - gobble
  - eat greedily
  lexicon: HALOT
  rationale: The warning concerns greedy, uncouth eating at a meal. 'Gulp it down' communicates rapid, excessive consumption in natural English while staying close to the sense.
- source_word: תגעל
  chosen: you become disgusting
  alternatives:
  - you be loathed
  - you become repulsive
  - you cause disgust
  lexicon: HALOT
  rationale: The niphal/qal sense here points to becoming an object of disgust because of bad manners. 'Become disgusting' makes the social result explicit in idiomatic English.
