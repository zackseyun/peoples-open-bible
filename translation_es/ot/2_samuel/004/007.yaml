  source_alignment_summary: 'El borrador español sigue bien la secuencia hebrea principal: entrada en la casa, estado circunstancial de Is-bóset acostado, agresión, muerte, decapitación, toma de la cabeza y viaje nocturno. Sin embargo, falta una nota léxica equivalente a la nota inglesa sobre «le quitaron la cabeza» / «le cortaron la cabeza», y «por el camino del Arabá» suena más específico que el hebreo «por vía del Arabá / por el Arabá».'
  spanish_quality_summary: El español es claro y mayormente natural, pero puede mejorar en fidelidad y fluidez formal. «Tomaron su cabeza» es comprensible pero poco idiomático en este contexto; «tomaron la cabeza» preserva mejor la repetición sin sonar tan calcado. También conviene evitar la coma antes de «y» en la serie verbal final. «Por el Arabá» o «por vía del Arabá» es más natural que «por el camino del Arabá».
  glossary_alignment: No hay términos teológicos sensibles en este versículo. El topónimo הָעֲרָבָה debe mantenerse como nombre geográfico transliterado («Arabá»), idealmente con nota cultural. La distinción entre וַיָּסִירוּ («quitaron/removieron») y וַיִּקְחוּ («tomaron») debe conservarse también en español, con nota léxica sobre la primera acción.
