translation:
  language: es
  text: Hará el cálculo con su comprador desde el año en que se vendió a su comprador hasta el año del jubileo[a], y el precio de su venta será según el número de años[b]; como los días de un jornalero, estará con su comprador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «desde el año de su venta a él». La expresión hebrea puede traducirse de manera más formal, pero el contexto indica que el hombre se había vendido a sí mismo para servicio.
    reason: lexical_alternative
  - marker: b
    text: O, «como los días de un jornalero». La comparación indica que la tasación debe contarse como servicio contratado, no como propiedad perpetua.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחִשַּׁב
  english_pob_choice: He shall calculate
  chosen_spanish: Hará el cálculo
  alternatives_spanish:
  - calculará
  - hará la cuenta
  lexicon: HALOT
  rationale: En este contexto jurídico-económico, חשׁב expresa hacer un cálculo o ajuste de valor. «Hará el cálculo» conserva ese sentido técnico y suena natural en español.
- source_word: עִם קֹנֵהוּ
  english_pob_choice: with his buyer
  chosen_spanish: con su comprador
  alternatives_spanish:
  - con el que lo compró
  - con su adquirente
  lexicon: HALOT
  rationale: קֹנֶה designa al que compra o adquiere. «Comprador» mantiene la fuerza transaccional y es más claro que un calco más duro.
- source_word: מִשְּׁנַת הִמָּכְרוֹ ל֔וֹ
  english_pob_choice: from the year he sold himself to him
  chosen_spanish: desde el año en que se vendió a él
  alternatives_spanish:
  - desde el año de su venta a él
  - desde el año en que se vendió a su servicio
  lexicon: HALOT
  rationale: La forma hebrea puede leerse de modo más formal como «de su venta», pero el contexto de la legislación del jubileo indica que se trata de autoventa para servicio. Por eso se explicita «se vendió a él», sin perder el valor reflexivo documentado en la auditoría inglesa.
- source_word: עַד שְׁנַת הַיֹּבֵל
  english_pob_choice: until the year of jubilee
  chosen_spanish: hasta el año del jubileo
  alternatives_spanish:
  - hasta el año de jubileo
  - hasta el jubileo
  lexicon: HALOT
  rationale: «Jubileo» es la denominación estable de la institución. Se mantiene como sustantivo común en español, en paralelo con el inglés auditado.
- source_word: כֶּסֶף מִמְכָּרוֹ
  english_pob_choice: the price of his sale shall be
  chosen_spanish: el precio de su venta será
  alternatives_spanish:
  - el dinero de su venta será
  - el precio de su venta se fijará
  lexicon: HALOT
  rationale: Aunque כֶּסֶף literalmente es «plata/dinero», aquí funciona como valor monetario en una disposición legal. «Precio de su venta» comunica mejor esa equivalencia económica que un calco literal.
- source_word: בְּמִסְפַּר שָׁנִים
  english_pob_choice: according to the number of years
  chosen_spanish: según el número de años
  alternatives_spanish:
  - de acuerdo con el número de años
  - en proporción al número de años
  lexicon: HALOT
  rationale: La expresión indica una tasación proporcional basada en los años transcurridos. «Según» transmite esa base normativa de manera clara y fiel.
- source_word: כִּימֵי שָׂכִיר
  english_pob_choice: like the days of a hired worker
  chosen_spanish: como los días de un jornalero
  alternatives_spanish:
  - como los días de un trabajador asalariado
  - como el tiempo de un jornalero
  lexicon: HALOT
  rationale: שָׂכִיר es un trabajador contratado por jornal o salario. «Jornalero» mantiene la imagen laboral concreta y la comparación del hebreo, de forma más natural que un calco rígido.
- source_word: יִהְיֶה עִמּוֹ
  english_pob_choice: he shall be with him
  chosen_spanish: estará con él
  alternatives_spanish:
  - permanecerá con él
  - servirá con él
  lexicon: HALOT
  rationale: El hebreo expresa su situación relacional con el comprador. En español, «estará con él» funciona bien y evita sobreespecificar el matiz de servicio que ya aporta la comparación anterior.
theological_decisions:
- issue: La autoventa del israelita en el marco de la redención y el jubileo
  english_pob_reading: the man had sold himself into service
  chosen_spanish_reading: se vendió a él
  alternative_spanish_readings:
  - se vendió a su servicio
  - se entregó como siervo
  rationale: La nota inglesa deja explícito que no se trata solo de una venta ordinaria, sino de una autoventa para servicio dentro de la legislación del jubileo. En español se preserva la tensión entre venta y servicio sin sustituirla por una terminología más interpretativa.
  doctrine_reference: Levítico 25:39-55; institución del jubileo y liberación de deudores
- issue: La comparación con el jornalero
  english_pob_reading: valuation is to be reckoned as hired service rather than perpetual ownership
  chosen_spanish_reading: como los días de un jornalero
  alternative_spanish_readings:
  - como un asalariado
  - como los días de un trabajador contratado
  rationale: 'Se mantiene la comparación económica del texto: no posesión perpetua, sino servicio tasado por tiempo. «Jornalero» preserva el carácter laboral y temporario del paralelo.'
  doctrine_reference: Levítico 25:50; valoración proporcional del servicio
- issue: Nombre institucional del jubileo
  english_pob_reading: year of jubilee
  chosen_spanish_reading: año del jubileo
  alternative_spanish_readings:
  - año de jubileo
  - jubileo
  rationale: Se conserva el nombre de la institución legal bíblica sin ocultarlo bajo una perífrasis. «Año del jubileo» es claro y mantiene la referencia litúrgico-legal del pasaje.
  doctrine_reference: Levítico 25:10, 25:28, 25:50
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente ajustó la cláusula final para reflejar con mayor literalidad la comparación hebrea: «like the days of a hired worker he shall be with him». La versión española sigue ese ajuste con «como los días de un jornalero, estará con él», manteniendo la comparación y el orden natural del español. El resto de la línea se alinea con la auditoría inglesa y con el hebreo, explicitando la autoventa implícita por el contexto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el tetragrámaton aparece directamente; este versículo no lo contiene.
  - Se mantiene «jubileo» como término institucional.
  - Se evita «siervo» para no borrar el matiz jurídico de la venta y el servicio tasado.
  - Se opta por «jornalero» para preservar la comparación laboral concreta del hebreo.
