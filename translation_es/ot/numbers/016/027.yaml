base_translation:
  language: en
  yaml_path: translation/ot/numbers/016/027.yaml
  text: So they moved away from around the dwelling of Korah[a], Dathan, and Abiram. And Dathan and Abiram came out, standing at the entrance of their tents, with their wives, their sons[b], and their little children.
  footnotes:
  - marker: a
    text: Or 'went up from around the dwelling of Korah, Dathan, and Abiram.' The Hebrew verb is literally 'went up,' but here likely functions idiomatically for withdrawing from the area.
    reason: lexical_alternative
  - marker: b
    text: '''Dwelling'' renders Hebrew mishkan here as the residence/place of encampment associated with Korah, Dathan, and Abiram, not the tabernacle of the LORD.'
    reason: cultural_note
