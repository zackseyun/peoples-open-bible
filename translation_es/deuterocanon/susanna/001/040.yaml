review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el sentido general del griego y conserva el registro forense en la cláusula final. Sin embargo, «al apoderarnos de ella» no refleja con suficiente naturalidad la aprehensión física de ἐπιλαβόμενοι y en español puede sugerir dominio o abuso más que simple sujeción/captura. Además, «no nos reveló» es algo más intenso y menos llano que οὐκ ἀπήγγειλεν ἡμῖν ('no nos dijo / no nos informó').
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse en naturalidad y precisión forense. «Tras sujetarla» o similar suena más idiomático y fiel al acto físico. «No nos dijo» expresa mejor la sencillez del verbo griego en este contexto judicial. El resto del verso funciona bien, especialmente «la interrogamos» y «damos testimonio».
  glossary_alignment: No hay términos del glosario principal especialmente implicados. Se mantiene adecuadamente el registro judicial de μαρτυροῦμεν con «damos testimonio». La revisión propuesta busca alinear mejor ἐπιλαβόμενοι con una aprehensión física y ἀπήγγειλεν con una formulación española más directa.
  issues:
  - severity: medium
    issue: «al apoderarnos de ella» para ἐπιλαβόμενοι
    rationale: Aunque intenta conservar fuerza, en español suele sugerir tomar posesión o adueñarse, no simplemente prender o sujetar físicamente. «Tras sujetarla» o «después de prenderla» refleja mejor la escena.
  - severity: low
    issue: «no nos reveló» para οὐκ ἀπήγγειλεν ἡμῖν
    rationale: «Reveló» añade un matiz de desvelar algo oculto que puede sonar más fuerte que el griego. El contexto pide una negativa a identificar; «no nos dijo» mantiene mejor la sencillez y naturalidad.
  revised_spanish_text: 'Pero, tras sujetarla, la interrogamos: «¿Quién era el hombre?». Pero ella no nos dijo quién era; de esto damos testimonio.'
  revision_rationale: Se ajusta la primera cláusula para reflejar con mayor naturalidad en español la aprehensión física de ἐπιλαβόμενοι, sin el matiz impropio de posesión que puede tener «apoderarnos de». También se simplifica «no nos reveló» a «no nos dijo» para corresponder mejor a ἀπήγγειλεν en este contexto. Se conserva el tono forense de «damos testimonio».
