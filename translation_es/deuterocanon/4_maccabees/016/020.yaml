    issue: «Inmolar» para σφαγιάσαι
    rationale: «Inmolar» en español sugiere más directamente una acción sacrificial/ritual, mientras que el expediente inglés preserva la crudeza de «to slaughter» precisamente para no importar una formulación teológica más suave o litúrgica. «Degollar» o una formulación equivalente preserva mejor la violencia gráfica.
