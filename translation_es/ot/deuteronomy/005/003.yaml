translation:
  language: es
  text: No fue con nuestros padres[a] con quienes Yahvé hizo este pacto[b], sino con nosotros[c], todos los que hoy estamos aquí vivos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'antepasados'. El hebreo dice literalmente 'padres'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'cortó este pacto'.
    reason: lexical_alternative
  - marker: c
    text: 'Algunos entienden el contraste de manera retórica: no con nuestros padres únicamente, sino especialmente con nosotros que estamos aquí vivos hoy.'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּרַת ... אֶת הַבְּרִית
  english_pob_choice: made this covenant
  chosen_spanish: hizo este pacto
  alternatives_spanish:
  - selló este pacto
  - hizo este convenio
  - cortó este pacto
  lexicon: HALOT
  rationale: El hebreo usa el modismo literal 'cortar un pacto'. En español, 'hacer un pacto' transmite de forma natural el sentido pactal sin perder la referencia al acto solemne. 'Este' conserva el demostrativo del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio en forma transliterada, conforme al criterio del proyecto, en vez de sustituirlo por un título. 'Yahvé' es la forma española estable y readable para el Tetragrámaton.
- source_word: אֲבֹתֵינוּ
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'nuestros padres'. Se conserva esa concreción en español, sin ampliar a 'antepasados' en el texto principal.
- source_word: כִּי
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: HALOT
  rationale: Después de la negación, 'sino' expresa mejor el contraste adversativo del hebreo en español natural y preciso.
- source_word: אִתָּנוּ
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - entre nosotros
  - a nosotros
  lexicon: HALOT
  rationale: La preposición indica la parte vinculada al pacto. 'Con nosotros' reproduce de manera directa la relación del texto.
- source_word: אֲנַחְנוּ אֵלֶּה
  english_pob_choice: we ... here alive today
  chosen_spanish: estamos todos aquí vivos hoy
  alternatives_spanish:
  - somos todos aquí vivos hoy
  - todos nosotros estamos aquí hoy, vivos
  lexicon: HALOT
  rationale: El hebreo añade una apposición enfática que subraya a la generación presente. En español, una construcción verbal fluida comunica la idea de totalidad y presencia viva sin forzar una repetición artificiosa.
- source_word: פֹה הַיּוֹם
  english_pob_choice: here alive today
  chosen_spanish: aquí ... hoy
  alternatives_spanish:
  - aquí hoy
  - en este día
  lexicon: HALOT
  rationale: Se mantienen ambos adverbios de lugar y tiempo. 'Aquí' y 'hoy' conservan la inmediatez del original.
- source_word: כֻּלָּנוּ חַיִּים
  english_pob_choice: all of us here alive today
  chosen_spanish: estamos todos ... vivos
  alternatives_spanish:
  - todos nosotros vivimos
  - todos estamos vivos
  lexicon: HALOT
  rationale: La forma hebrea enfatiza la totalidad de los presentes vivos. 'Estamos todos ... vivos' conserva el valor colectivo y el predicado de estado.
theological_decisions:
- issue: 'Alcance de la negación: ¿excluye absolutamente a los padres del pacto o solo contrasta la generación actual con ellos?'
  english_pob_reading: The translation preserves the Hebrew rhetoric of contrast without adding interpretive qualifiers; it states that the covenant was not made 'with our fathers' but 'with us' who are alive today.
  chosen_spanish_reading: 'La versión conserva el contraste directo: no fue con nuestros padres, sino con nosotros, los que estamos vivos hoy.'
  alternative_spanish_readings:
  - no fue solo con nuestros padres, sino también con nosotros
  - no fue con nuestros padres solamente, sino con nosotros
  rationale: El hebreo no añade un término equivalente a 'solamente'. Por eso se mantiene el contraste sin resolverlo interpretativamente en el texto principal, dejando abierta la tensión que el contexto puede matizar.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente en cuanto a eliminar repeticiones innecesarias y hacer explícita la totalidad de los presentes vivos, pero adapta el resultado a un español natural. También conserva la tensión interpretativa sobre el alcance del contraste, sin introducir 'solamente' en el texto principal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma estable del Nombre divino, no una sustitución por mayúscula o título.
  - Se eligió 'pacto' como equivalente bíblico natural de ברית, manteniendo la nota sobre el modismo literal 'cortar'.
  - '''Nuestros padres'' conserva la concreción del hebreo frente a ''antepasados'', que queda como alternativa anotada.'
  - '''Sino'' reproduce mejor el contraste adversativo posterior a la negación.'
  - La clausula final conserva 'aquí' y 'hoy' para no perder los dos marcadores de presencia del hebreo.
  - No se fuerza una repetición artificial de 'con nosotros'; el español fluye con una sola mención y preserva la idea de totalidad mediante 'estamos todos'.
