base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/015/001.yaml
  text: Then Samuel said to Saul[a], “Yahweh sent me to anoint you as king over his people, over Israel. So now, listen to the words of Yahweh.”
  footnotes:
  - marker: a
    text: Or 'hear the voice of the words of the LORD.' The Hebrew expression is more literal than the smoother English rendering and carries an implicit call not only to hear but to heed.
