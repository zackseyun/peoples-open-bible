base_translation:
  language: en
  yaml_path: translation/ot/zechariah/003/010.yaml
  text: On that day[a], declares Yahweh of Armies[d][c][b], each of you will invite his neighbor under the vine and under the fig tree.
  footnotes:
  - marker: a
    text: Or, 'will call, each man to his neighbor.' The Hebrew verb can be rendered more literally as 'call,' but here likely carries the sense of invitation.
    reason: lexical_alternative
  - marker: b
    text: Many English versions read 'the LORD of Hosts.' The Hebrew title צְבָאוֹת refers to armies or hosts.
    reason: lexical_alternative
  - marker: c
    text: Compare 1 Kings 4:25 and Micah 4:4, where sitting under the vine and fig tree symbolizes peace, security, and prosperity.
    reason: cross_reference
  - marker: d
    text: Some translations supply 'his' before 'vine' and 'fig tree' from similar biblical idiom, but the possessive is not explicit in the Hebrew here.
    reason: lexical_alternative
