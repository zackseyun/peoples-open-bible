    text: 또는 「큰 이득」 「큰 수익원」. 헬라어는 5절의 「이익」(πορισμός)과 같은 어휘로, 그 어휘를 되받아 반전시킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「자족」. 본 문맥의 어감은 독립적 자기 의존이 아니라 만족·충분함이다.
