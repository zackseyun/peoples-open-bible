translation:
  language: es
  text: Desde allí fue contra los habitantes de Debir[a]. (El nombre anterior de Debir era Kiriat-sefer[b].)
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “a los habitantes de Debir”. La preposición hebrea puede rendirse más literalmente como “a/hacia”, pero en este contexto de conquista el sentido es de avance hostil; por eso se traduce “contra”.
    reason: lexical_alternative
  - marker: b
    text: Kiriat-sefer es el nombre anterior de Debir; el nombre puede significar “Ciudad del Libro” o “Ciudad de escribas”, pero aquí se translitera en el texto principal como topónimo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: he went
  chosen_spanish: fue
  alternatives_spanish:
  - fue
  - se dirigió
  - marchó
  lexicon: HALOT
  rationale: El wayyiqtol de הלך expresa movimiento narrativo básico. En español, "fue" comunica con naturalidad el avance sin añadir una especificidad militar que no exige el hebreo.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: Desde allí
  alternatives_spanish:
  - Desde allí
  - De allí
  lexicon: HALOT
  rationale: Equivale directamente al adverbio locativo de origen y mantiene el enlace con el contexto previo.
- source_word: אֶל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - a
  - hacia
  - contra
  lexicon: HALOT
  rationale: Aunque el hebreo puede ser literalmente "a/toward", en un relato de conquista el destino es un grupo humano en situación hostil. "Contra" expresa adecuadamente el avance agresivo sin convertir el preposición en una traducción mecánica.
- source_word: יוֹשְׁבֵי
  english_pob_choice: the inhabitants of
  chosen_spanish: los habitantes de
  alternatives_spanish:
  - los moradores de
  - los que habitaban en
  - los residentes de
  lexicon: HALOT
  rationale: El participio sustantivado de ישב se refiere a quienes viven en el lugar. "Habitantes" es formal, claro y fiel al valor colectivo.
- source_word: דְּבִיר
  english_pob_choice: Debir
  chosen_spanish: Debir
  alternatives_spanish:
  - Debir
  lexicon: HALOT
  rationale: Nombre propio de lugar, conservado por transliteración en la forma establecida.
- source_word: וְשֵׁם דְּבִיר לְפָנִים
  english_pob_choice: the former name of Debir was
  chosen_spanish: El nombre anterior de Debir era
  alternatives_spanish:
  - Y el nombre de Debir antes era
  - Debir se llamaba antes
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula explicativa sobre el nombre previo. "Nombre anterior" comunica bien el sentido temporal de לְפָנִים y mantiene el orden claro en español.
- source_word: לְפָנִים
  english_pob_choice: former
  chosen_spanish: anterior
  alternatives_spanish:
  - antes
  - antiguo
  - anterior
  lexicon: HALOT
  rationale: El adverbio temporal indica "antes/antiguamente". "Anterior" conserva la referencia cronológica sin sonar más idiomático de lo necesario.
- source_word: קִרְיַת סֵפֶר
  english_pob_choice: Kiriath-sepher
  chosen_spanish: Kiriat-sefer
  alternatives_spanish:
  - Kiriat-sefer
  - Ciudad del Libro
  - Kiriat-Séfer
  lexicon: HALOT
  rationale: Se conserva como topónimo transliterado. Se usa una grafía española transparente, mientras que la glosa etimológica se mantiene en nota para no confundir el nombre con una traducción interpretativa.
translation_notes:
  revision_awareness: 'El pasaje coincide con el último control de revisión: no se documentaron cambios aplicados y el cruce de verificación mostró acuerdo alto, por lo que la redacción española conserva la estructura y las decisiones léxicas auditablemente estables.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la transliteración de los topónimos en vez de traducirlos en el texto principal, siguiendo la pauta auditada.
  - '"Contra" se usa solo para reflejar el matiz contextual de conflicto en אֶל; no se generaliza a otros casos de la preposición.'
