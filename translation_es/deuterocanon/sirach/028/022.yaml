translation:
  language: es
  text: Nunca dominará[a] a los piadosos, y en su llama no serán quemados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nunca se apoderará de los devotos». El verbo griego puede significar tomar posesión de, dominar o prevalecer contra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μὴ
  english_pob_choice: will never
  chosen_spanish: Nunca
  alternatives_spanish:
  - ciertamente no
  - de ninguna manera
  lexicon: BDAG
  rationale: La negación enfática οὐ μή exige una negación fuerte en español; «nunca» transmite bien la fuerza prospectiva sin sonar artificial.
- source_word: κρατήσῃ
  english_pob_choice: overpower
  chosen_spanish: dominará
  alternatives_spanish:
  - se apoderará de
  - prevalecerá contra
  - someterá
  lexicon: BDAG
  rationale: κρατέω puede ser «agarrar», «retener» o «ganar dominio». En este contexto de imagen destructiva, «dominará» conserva la idea de vencer o prevalecer con naturalidad en español.
- source_word: εὐσεβῶν
  english_pob_choice: the godly
  chosen_spanish: los piadosos
  alternatives_spanish:
  - los devotos
  - los fieles
  lexicon: BDAG
  rationale: El genitivo plural de εὐσεβής designa a los que reverencian a Dios. «Piadosos» reproduce bien el valor religioso-moral y es más idiomático que una perífrasis.
- source_word: φλογὶ
  english_pob_choice: flame
  chosen_spanish: llama
  alternatives_spanish:
  - flama
  - fuego
  lexicon: BDAG
  rationale: φλόξ se refiere con precisión a la llama. «Llama» mantiene esa especificidad y funciona de manera natural en español.
- source_word: καήσονται
  english_pob_choice: will be burned
  chosen_spanish: serán quemados
  alternatives_spanish:
  - serán consumidos
  - arderán
  lexicon: BDAG
  rationale: El futuro pasivo indica padecer quemadura, no acción propia. «Serán quemados» es la correspondencia más directa y conserva la pasividad del griego.
theological_decisions:
- issue: Referente de αὐτῆς en «ἐν τῇ φλογὶ αὐτῆς»
  english_pob_reading: Rendered as 'its,' referring to the destructive power of the tongue imaged as fire in the immediate context.
  chosen_spanish_reading: «su llama», entendiendo el posesivo como referencia a la fuerza destructiva figurada en el contexto inmediato.
  alternative_spanish_readings:
  - «su llama», con personificación más marcada
  - «la llama de ella»
  rationale: En español, «su» evita forzar el género del referente y conserva la referencia metafórica al poder destructivo del habla que domina el contexto cercano. «Su llama» mantiene la ambigüedad funcional del griego sin introducir una explicación ajena al texto.
  doctrine_reference: Contexto literario de Sirácida 28; no implica una afirmación doctrinal adicional.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan estrechamente; se mantuvo la negación enfática, el valor hostil de κρατέω y la imagen concreta de la llama, sin introducir lecturas secundarias no sustentadas.
  spanish_consistency_notes:
  - Se conservó «piadosos» para εὐσεβῶν, en línea con el valor moral-religioso del término.
  - «Llama» se eligió para φλογί por su precisión frente a «fuego» en este contexto.
  - La nota alterna refleja la misma ambigüedad léxica documentada en la versión inglesa, trasladada a un español natural.
