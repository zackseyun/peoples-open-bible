  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego: futuro pasivo en βοηθησόμεθα, expresión formal «los hijos de Israel», colectivo «un pueblo», y la duplicación «fuerza ni poder». Sin embargo, «para una formación de batalla fuerte» suena poco idiomático y algo calcado; el griego εἰς παράταξιν ἰσχυράν apunta a capacidad para formar una línea/formación militar fuerte o sólida.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «formación de batalla fuerte» resulta torpe en español. «He aquí» funciona en registro bíblico formal. «No seremos auxiliados» es aceptable, aunque algo rígido; no requiere cambio forzoso. La nota al pie contiene una alternativa duplicada con el texto principal («los hijos de Israel»), por lo que conviene corregirla para que solo preserve alternativas reales.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Los hijos de Israel» preserva la decisión documentada sobre υἱῶν Ἰσραήλ. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La revisión propuesta mantiene la tensión léxica entre δύναμις y κράτος y mejora la naturalidad del segmento militar.
  issues:
  - severity: medium
    issue: 'Frase militar poco idiomática: «para una formación de batalla fuerte»'
    rationale: Aunque formalmente cercana al inglés, en español suena calcada y poco natural. παράταξις se expresa mejor como «formación militar» o «línea de batalla», y ἰσχυράν califica esa formación como «sólida/fuerte».
  - severity: low
    issue: Nota al pie con alternativa redundante
    rationale: 'La nota dice «O: “los israelitas” o “los hijos de Israel”», pero «los hijos de Israel» ya es la lectura principal. La nota debe preservar solo alternativas reales al texto principal.'
  revised_spanish_text: Porque no seremos auxiliados por los hijos[a] de Israel; pues, he aquí, son un pueblo en quien no hay fuerza ni poder para una formación militar sólida.
  revised_footnotes:
  - marker: a
    text: 'O: «los israelitas» o «los hijos del pueblo de Israel». El griego dice literalmente «los hijos de Israel».'
    reason: lexical_alternative
  revision_rationale: 'Se conserva la fidelidad al griego y al audit trail inglés, pero se ajusta la frase militar a un español más natural y preciso: «formación militar sólida» transmite mejor εἰς παράταξιν ἰσχυράν que «formación de batalla fuerte». También se corrige la nota al pie para eliminar una alternativa redundante con el texto principal.'
