  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀ἀμὴν λέγω ὑμῖν ὅτι ὃς ἂν εἴπῃ τῷ ὄρει τούτῳ· Ἄρθητι καὶ βλήθητι εἰς τὴν θάλασσαν, καὶ μὴ διακριθῇ ἐν τῇ καρδίᾳ αὐτοῦ ἀλλὰ ⸀πιστεύῃ ὅτι ⸂ὃ λαλεῖ γίνεται, ἔσται αὐτῷ⸃.
base_translation:
  language: en
  yaml_path: translation/nt/mark/011/023.yaml
  text: Truly I tell you[a], whoever says to this mountain, ‘Be lifted up and be thrown into the sea,’ and does not doubt in his heart but believes that what he says is happening[b], it will be so for him.
  footnotes:
  - marker: a
    text: Or 'does not waver' or 'is not divided within himself'; the Greek verb can carry the sense of inward division as well as doubt.
    reason: lexical_alternative
  - marker: b
    text: Or 'that what he says happens' or 'comes to pass.' The Greek uses a present tense ('is happening'/'happens') before the future result clause.
    reason: lexical_alternative
translation:
  language: ko
  text: 진실로 내가 여러분에게 말합니다. 누구든지 이 산에게 「들려 바다에 던져져라」 하고 말하며, 마음에 의심하지 않고 자기가 말하는 것이 이루어진다고 믿으면, 그에게 그렇게 될 것입니다.
  philosophy: optimal-equivalence
