translation:
  language: es
  text: Pero sus hijos no anduvieron en sus caminos[a]; se desviaron tras la ganancia deshonesta, recibieron sobornos y pervirtieron la justicia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tras la ganancia injusta' o 'tras la codicia'. El término hebreo señala una ganancia buscada de modo injusto o explotador.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'torcieron el juicio'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלְכוּ ... בְּדַרְכּוֹ
  english_pob_choice: did not walk in his ways
  chosen_spanish: no anduvieron en sus caminos
  alternatives_spanish:
  - no siguieron sus caminos
  - no anduvieron en su senda
  lexicon: HALOT
  rationale: הלך con בְּ + דֶּרֶךְ es un modismo de conducta. En español, 'andar en los caminos de alguien' conserva bien la imagen bíblica y suena natural.
- source_word: וַיִּטּוּ
  english_pob_choice: they turned aside
  chosen_spanish: se desviaron
  alternatives_spanish:
  - se apartaron
  - torcieron el rumbo
  lexicon: HALOT
  rationale: נטה expresa desviación de un curso recto. 'Se desviaron' comunica el desvío moral y prepara la frase sobre la ganancia ilícita.
- source_word: אַחֲרֵי הַבָּצַע
  english_pob_choice: after dishonest gain
  chosen_spanish: tras la ganancia deshonesta
  alternatives_spanish:
  - tras la ganancia injusta
  - tras la codicia
  - tras el lucro injusto
  lexicon: HALOT
  rationale: בצע aquí apunta a ganancia obtenida de modo ilícito o explotador. 'Ganancia deshonesta' conserva tanto el matiz de lucro como su carácter corrupto, sin reducirlo solo a una actitud interior.
- source_word: וַיִּקְחוּ שֹׁחַד
  english_pob_choice: took bribes
  chosen_spanish: recibieron sobornos
  alternatives_spanish:
  - tomaron sobornos
  - aceptaron sobornos
  lexicon: HALOT
  rationale: שוחד es 'soborno', especialmente en contexto judicial. En español, 'recibieron sobornos' refleja bien la práctica de corrupción sin sonar forzado.
- source_word: וַיַּטּוּ מִשְׁפָּט
  english_pob_choice: perverted justice
  chosen_spanish: pervirtieron la justicia
  alternatives_spanish:
  - torcieron la justicia
  - torcieron el juicio
  - pervirtieron el juicio
  lexicon: HALOT
  rationale: El hebreo expresa distorsión del juicio legal. 'Pervirtieron la justicia' preserva la fuerza forense del texto y mantiene la referencia a un orden jurídico corrompido.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural, en español 'hijos' es la forma natural para hijos varones en un contexto familiar ya definido, y evita una repetición pesada de 'varones'.
theological_decisions:
- issue: Corrupción judicial como acusación central
  english_pob_reading: Render the verse as an indictment of judicial corruption without softening the legal terminology.
  chosen_spanish_reading: Presentar el versículo como una acusación de corrupción judicial, manteniendo el lenguaje legal.
  alternative_spanish_readings:
  - 'Reducirlo a una descripción moral general: ''eran codiciosos'''
  - Suavizarlo con 'actuaron injustamente'
  rationale: 'El hebreo acumula términos forenses: búsqueda de ganancia ilícita, sobornos y perversión del juicio. La versión española conserva esa secuencia para no diluir el peso legal y moral del texto.'
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés en la filosofía de equivalencia óptima y no requiere cambios de revisión adicionales; se preserva la secuencia forense del hebreo sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparece el nombre divino; aquí no aplica.
  - Se conserva un registro bíblico claro y moderno, evitando arcaísmos innecesarios.
  - '''Justicia'' traduce מִשְׁפָּט en sentido forense, acorde con el contexto de corrupción judicial.'
