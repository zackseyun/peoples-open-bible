  text: נָשִׁים֙ שַֽׁאֲנַנּ֔וֹת קֹ֖מְנָה שְׁמַ֣עְנָה קוֹלִ֑/י בָּנוֹת֙ בֹּֽטח֔וֹת הַאְזֵ֖נָּה אִמְרָתִֽ/י׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/032/009.yaml
  text: You complacent women[a], rise up; hear my voice. You confident daughters[c][b], listen to my word.
  footnotes:
  - marker: a
    text: Or 'at ease' for 'complacent'; the Hebrew can denote those living undisturbed or carelessly secure.
    reason: lexical_alternative
  - marker: b
    text: Literally 'daughters.' The term is retained to preserve the Hebrew form of address.
    reason: cultural_note
  - marker: c
    text: Or 'secure' for 'confident'; the Hebrew emphasizes a sense of safety or self-assurance.
    reason: lexical_alternative
