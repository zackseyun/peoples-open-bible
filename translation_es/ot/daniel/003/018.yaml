translation:
  language: es
  text: Pero si no[a], sea sabido por ti, oh rey, que no serviremos a tus dioses, y no nos postraremos ante la imagen de oro que has levantado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero aun si no», con el sentido implícito del verso anterior: «aun si él no nos libra».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהֵן לָא
  english_pob_choice: But if not
  chosen_spanish: Pero si no
  alternatives_spanish:
  - Pero aun si no
  - Y si no
  lexicon: HALOT
  rationale: La expresión aramea introduce el caso contrario con fuerza condicional y adversativa. «Pero si no» conserva la brevedad y la tensión retórica del original, sin resolver explícitamente lo que se sobreentiende del verso anterior.
- source_word: יְדִיעַ לֶהֱוֵא לָךְ
  english_pob_choice: let it be known to you
  chosen_spanish: que se te haga saber
  alternatives_spanish:
  - sépanlo
  - que te sea conocido
  lexicon: HALOT
  rationale: Es una construcción impersonal; en español, «que se te haga saber» mantiene el tono formal y declarativo dirigido al rey, sin volverlo demasiado coloquial.
- source_word: מַלְכָּא
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: Es un vocativo directo. «Oh rey» reproduce la apelación solemne y cortés del discurso.
- source_word: לֶאֱלָהָיִךְ
  english_pob_choice: your gods
  chosen_spanish: tus dioses
  alternatives_spanish:
  - a tus dioses
  lexicon: HALOT
  rationale: El sentido es el objeto de la acción de servir; en español, el complemento directo idiomático es «tus dioses». Se mantiene el plural como en el arameo y en la lectura inglesa.
- source_word: פָלְחִין
  english_pob_choice: we will not serve
  chosen_spanish: no serviremos
  alternatives_spanish:
  - no estamos sirviendo
  - no servimos
  lexicon: HALOT
  rationale: El verbo expresa servicio/culto. «No serviremos» comunica la negativa resuelta en un contexto de decisión futura e inmediata ante el rey.
- source_word: וּלְצֶלֶם דַּהֲבָא
  english_pob_choice: the golden image
  chosen_spanish: la imagen de oro
  alternatives_spanish:
  - la imagen dorada
  - la estatua de oro
  lexicon: HALOT
  rationale: צֶלֶם es «imagen» y דַּהֲבָא es «oro». «Imagen de oro» conserva la formulación más pegada al arameo y evita añadir «estatua», que sería una especificación interpretativa.
- source_word: הֲקֵימְתָּ
  english_pob_choice: you have set up
  chosen_spanish: has levantado
  alternatives_spanish:
  - has erigido
  - has establecido
  lexicon: HALOT
  rationale: El perfecto describe una acción ya realizada por el rey. «Has levantado» es natural en español y refleja la idea de erigir una imagen sin sobretraducir el matiz técnico.
- source_word: נִסְגֻּד
  english_pob_choice: bow down
  chosen_spanish: nos postraremos
  alternatives_spanish:
  - nos inclinaremos
  - nos arrodillaremos
  lexicon: HALOT
  rationale: El verbo denota prosternarse en homenaje. «Nos postraremos» conserva la acción física de reverencia y el peso cultual del gesto, mejor que una mera «inclinación».
theological_decisions:
- issue: Preservar la tensión teológica del «si no» sin explicitar el resultado implícito
  english_pob_reading: But if not
  chosen_spanish_reading: Pero si no
  alternative_spanish_readings:
  - Pero aun si no
  - Pero si él no nos libra
  rationale: El hebreo/arameo deja una elipsis que remite al verso anterior y no nombra explícitamente el objeto de la condición. Mantener la forma breve preserva la confianza en Yahvé y, al mismo tiempo, la decisión de obedecer aun sin liberación visible.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El texto sigue el auditable patrón del POB en inglés: condicional breve, vocativo solemne, negativa volitiva y preservación del gesto físico de postración. La versión española conserva la misma tensión implícita sin expandirla más allá del alcance del arameo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el contexto del canon lo requiera, pero en este versículo no aparece el nombre divino explícito.
  - Se mantiene «dioses» en plural conforme al arameo y a la lectura inglesa auditada.
  - «Imagen de oro» se prefiere a «estatua de oro» por mayor proximidad léxica al término צֶלֶם.
  - «Postraremos» conserva el valor corporal y reverencial de נִסְגֻּד sin convertirlo directamente en «adoraremos».
