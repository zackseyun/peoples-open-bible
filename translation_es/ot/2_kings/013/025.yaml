revisions:
- from: Entonces Joás hijo de Joacaz tomó de nuevo las ciudades de manos de Ben-adad hijo de Hazael[a], que este había tomado de manos de Joacaz su padre en la guerra. Tres veces lo hirió[b] Joás, y restauró las ciudades de Israel.
  to: Entonces Jehoás hijo de Joacaz tomó de nuevo las ciudades de manos de Ben-adad hijo de Hazael[a], que este había tomado de manos de Joacaz su padre en la guerra. Tres veces lo derrotó[b] Joás, y restauró las ciudades de Israel.
  rationale: Se corrige el nombre inicial a 'Jehoás' para reflejar la forma hebrea más plena documentada por el POB, manteniendo 'Joás' al final para la forma breve. Se cambia 'lo hirió' por 'lo derrotó' porque representa mejor el uso bélico de נכה en este contexto; la alternativa más literal 'lo golpeó' se conserva en nota. El resto del verso puede mantenerse como fiel y natural en español.
