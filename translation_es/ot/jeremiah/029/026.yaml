  to: Yahvé te ha puesto como sacerdote en lugar de Joiada el sacerdote[a], para ser oficiales en la casa de Yahvé sobre todo hombre que esté loco y actúe como profeta[c][b], y lo pondrás en el cepo y en el collar de hierro.
  rationale: 'Se revisa principalmente וּמִתְנַבֵּא para alinearlo con la decisión lexical y teológica auditada en inglés: ''actúe como profeta'' preserva el tono acusatorio del hablante mejor que ''profetice''. También se reubican y ajustan las notas para que correspondan al texto revisado: la nota sobre el plural de פקידים se ancla donde realmente aplica, y la nota cultural se formula con más precisión sin sobreafirmar ''collar de hierro'' dentro de la propia nota.'
