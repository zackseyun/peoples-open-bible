translation:
  language: es
  text: 'Y los hombres de Judá dijeron: «¿Por qué han subido contra nosotros?». Y ellos dijeron: «Hemos subido para atar a Sansón, para hacer con él tal como él hizo con nosotros».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אִישׁ יְהוּדָה
  english_pob_choice: the men of Judah
  chosen_spanish: los hombres de Judá
  alternatives_spanish:
  - el hombre de Judá
  - el pueblo de Judá
  lexicon: HALOT
  rationale: Aunque אִישׁ está en singular, funciona colectivamente con el verbo plural; en español, «los hombres de Judá» conserva ese valor colectivo y la concordancia natural.
- source_word: לָמָה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Para qué razón?
  - ¿Con qué motivo?
  lexicon: HALOT
  rationale: Es la interrogativa normal en español para pedir la razón; mantiene naturalidad sin añadir matices.
- source_word: עֲלִיתֶם עָלֵינוּ
  english_pob_choice: have you come up against us
  chosen_spanish: han subido contra nosotros
  alternatives_spanish:
  - han venido contra nosotros
  - han subido sobre nosotros
  lexicon: HALOT
  rationale: El hebreo usa עלה con עַל en sentido hostil. «Subido contra nosotros» conserva la imagen direccional y la fuerza adversativa sin volverlo demasiado explícito.
- source_word: לֶאֱסוֹר
  english_pob_choice: to bind
  chosen_spanish: atar
  alternatives_spanish:
  - ligar
  - sujetar
  - prender
  lexicon: HALOT
  rationale: En este contexto narrativo de capturar a Sansón, «atar» comunica bien la acción concreta y es idiomático en español; «sujetar» o «prender» alteran el matiz o la escena.
- source_word: עָלִינוּ
  english_pob_choice: We have come up
  chosen_spanish: Hemos subido
  alternatives_spanish:
  - Subimos
  - Hemos venido
  lexicon: HALOT
  rationale: Se conserva la repetición del verbo subir, importante en el intercambio. El perfecto compuesto suena natural en el diálogo español.
- source_word: לַעֲשׂוֹת לוֹ
  english_pob_choice: to do to him
  chosen_spanish: para hacerle
  alternatives_spanish:
  - para tratarlo
  - para hacer con él
  lexicon: HALOT
  rationale: El hebreo עשה + ל indica acción dirigida a una persona; «hacerle» mantiene la relación verbal y es idiomático en español.
- source_word: כַּאֲשֶׁר עָשָׂה לָנוּ
  english_pob_choice: just as he did to us
  chosen_spanish: como él nos hizo a nosotros
  alternatives_spanish:
  - tal como él nos hizo
  - así como nos hizo
  lexicon: HALOT
  rationale: «Como él nos hizo a nosotros» mantiene la reciprocidad vengativa y el paralelismo. Se evita suavizar el retributivo de la frase.
- source_word: שִׁמְשׁוֹן
  english_pob_choice: Samson
  chosen_spanish: Sansón
  alternatives_spanish:
  - Samson
  lexicon: Onomastics standard
  rationale: 'Nombre propio bíblico con forma asentada en español: «Sansón» es la forma más reconocible y natural para lectores hispanos.'
theological_decisions:
- issue: Carácter retributivo de la respuesta
  english_pob_reading: just as he did to us
  chosen_spanish_reading: como él nos hizo a nosotros
  alternative_spanish_readings:
  - tal como nos hizo
  - así como él nos hizo
  rationale: La frase expresa reciprocidad punitiva; la traducción mantiene la simetría sin interpretarla ni suavizarla.
  doctrine_reference: Principio de retribución narrativa en Jueces; cf. el contexto inmediato de Jueces 15.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante-vocalizado del WLC y el audit trail inglés. No se detectaron revisiones pendientes en el material de referencia; la formulación española conserva la repetición de «subir» y la simetría retaliatoria del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» en la serie cuando el hebreo contiene el nombre divino; este versículo no lo incluye.
  - Se mantiene «Sansón» como forma española estable del nombre propio.
  - Se conserva el paralelismo verbal de subir / subir para reflejar la hostilidad del original.
  - No se añadieron notas al pie porque el texto no presenta una variante textual o ambigüedad lexical que requiera anclaje explícito en español.
