base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/090.yaml
  text: Jesus said[a], “Come to me; for my yoke is good, and my lordship is gentle[c][b]; and you will find rest for yourselves.”
  footnotes:
  - marker: a
    text: The word is ⲭⲣⲏⲥⲧⲟⲥ (from Greek χρηστός, “good/pleasant/kind”), not ⲭⲣⲓⲥⲧⲟⲥ (“Christ”). Hence “good,” not a title.
    reason: lexical_alternative
  - marker: b
    text: Rest renders the Greek loan ⲁⲛⲁⲡⲁⲩⲥⲓⲥ (ἀνάπαυσις). The codex shows minor orthographic uncertainty in the upsilon, but the reading is secure.
    reason: lacuna_or_restoration
  - marker: c
    text: 'Compare Matthew 11:28–30, but note Thomas’s different phrasing: “my lordship is gentle,” and “for yourselves” rather than “for your souls.”'
    reason: cross_reference
