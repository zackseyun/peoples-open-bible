translation:
  language: es
  text: Entonces Miriam y Aarón hablaron contra Moisés a causa de la mujer cusita[a] que había tomado[b], porque había tomado una mujer cusita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «etíope». El hebreo dice «cusita», refiriéndose a una mujer de Cus.
    reason: lexical_alternative
  - marker: b
    text: «Había tomado» es un giro hebreo que puede significar «había tomado por esposa» o «se había casado con ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: hablaron
  alternatives_spanish:
  - habló
  - habló contra
  - criticaron
  lexicon: BDB / HALOT
  rationale: El hebreo usa el verbo básico «hablar»; en el contexto adversativo, el sentido negativo lo aporta la construcción completa. «Hablaron contra» conserva el verbo sin cargarlo con una interpretación más fuerte que el texto no exige.
- source_word: מִרְיָם וְאַהֲרֹן
  english_pob_choice: Miriam and Aaron
  chosen_spanish: María y Aarón
  alternatives_spanish:
  - Miriam y Aarón
  lexicon: Convención bíblica española
  rationale: Se usa «María» como forma española tradicional de Miriam, con Aarón transliterado conforme al uso bíblico en español.
- source_word: בְּמֹשֶׁה
  english_pob_choice: against Moses
  chosen_spanish: contra Moisés
  alternatives_spanish:
  - sobre Moisés
  - acerca de Moisés
  lexicon: HALOT
  rationale: La preposición con דבר puede marcar hostilidad; «contra» expresa la relación adversativa de forma natural en español.
- source_word: עַל אֹדוֹת
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - con respecto a
  lexicon: HALOT
  rationale: La expresión introduce la ocasión o motivo de la queja; «a causa de» reproduce bien ese valor causal en español.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: «אִשָּׁה» puede ser «mujer» o «esposa». Se mantiene «mujer» para ser más cercano al hebreo, dejando que el contexto marital se infiera por «que había tomado».
- source_word: הַכֻּשִׁית / כֻשִׁית
  english_pob_choice: Cushite
  chosen_spanish: cusita
  alternatives_spanish:
  - etíope
  lexicon: HALOT
  rationale: «Cusita» preserva la referencia al pueblo/territorio de Cus y evita sustituirla por la glosa tradicional «etíope», que puede ser más interpretativa.
- source_word: אֲשֶׁר לָקָח
  english_pob_choice: whom he had taken
  chosen_spanish: que había tomado
  alternatives_spanish:
  - que había desposado
  - que había tomado por esposa
  lexicon: HALOT
  rationale: «Tomar» refleja el verbo hebreo de manera directa. En este contexto matrimonial puede implicar haberla tomado como esposa, pero el texto no explicita aquí el matiz, por lo que se conserva la literalidad sobria.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la explicación o reiteración causal de la acusación; «porque» es claro y natural en español.
- source_word: אִשָּׁה כֻשִׁית לָקָח
  english_pob_choice: he had taken a Cushite woman
  chosen_spanish: había tomado una mujer cusita
  alternatives_spanish:
  - había desposado una mujer cusita
  - había tomado por esposa una mujer cusita
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del hebreo sin suavizarla. «Mujer cusita» mantiene la misma combinación léxica que la primera mitad del versículo.
theological_decisions:
- issue: Identificación étnico-geográfica de la esposa de Moisés
  english_pob_reading: Render כֻשִׁית as 'Cushite' without harmonizing to Zipporah/Midianite traditions or importing interpretive conclusions.
  chosen_spanish_reading: Traducir como «cusita» sin resolver el debate histórico o armonizar con otras tradiciones bíblicas.
  alternative_spanish_readings:
  - «etíope» como glosa tradicional
  - interpretar implícitamente que se trata de Séfora
  rationale: El versículo identifica a la mujer por su procedencia de Cus; la traducción debe dejar intacta esa designación y no cerrar una tensión histórica que el texto no resuelve aquí.
  doctrine_reference: Principios de transparencia textual y no armonización interpretativa
translation_notes:
  revision_awareness: 'El texto sigue el sentido confirmado por el audit trail inglés: la hostilidad de la frase se expresa con «contra», la referencia geográfica/étnica se mantiene como «cusita», y se conserva la repetición enfática del hebreo en la segunda mitad del versículo. No se aplicaron revisiones posteriores al borrador inglés, y el consenso de revisión indicó alta concordancia con solo cuestiones menores.'
  spanish_consistency_notes:
  - Se prefirió «María» para Miriam por convención bíblica española, manteniendo «Moisés», «Aarón» y «Cusita» en formas claras y recognoscibles.
  - Se evitó «esposa» en el cuerpo principal para no imponer una interpretación que el hebreo expresa de modo más general con «mujer» y «tomó».
  - La repetición final se conserva para reflejar el paralelismo y la insistencia del hebreo.
  - Las notas al pie se limitan a alternativas léxicas documentadas en el audit trail inglés, sin ampliar indebidamente el alcance del versículo.
