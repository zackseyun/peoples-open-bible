revisions:
- from: 'Y les seguía recordando la Escritura de Isaías que dice[a]: “Aunque pases por el fuego, la llama no te quemará”.'
  to: 'Y les seguía recordando la Escritura de Isaías que dice[a]: «Aunque pases por fuego, una llama no te quemará.»'
