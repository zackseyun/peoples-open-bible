translation:
  language: es
  text: Pero estos no son preservados del óxido y de las polillas[a], aunque están vestidos de púrpura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la corrosión y de las cosas que consumen». El griego βρωμάτων es más amplio que «polillas», pero «polillas» encaja mejor con la mención de la ropa.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτοι
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - estas cosas
  - estos ídolos
  lexicon: LSJ
  rationale: El demostrativo apunta a los ídolos mencionados en el contexto. En español, «estos» basta para retomar la referencia sin añadir un sustantivo interpretativo que el griego no expresa aquí.
- source_word: οὐ διασώζονται
  english_pob_choice: are not preserved
  chosen_spanish: no son preservados
  alternatives_spanish:
  - no son salvados
  - no sobreviven
  - no son protegidos
  lexicon: LSJ
  rationale: La forma pasiva comunica que no pueden ser mantenidos a salvo o intactos. «Preservados» conserva el matiz físico de resistencia al deterioro, sin cargar el verbo con un sentido espiritual ajeno al contexto.
- source_word: ἀπὸ ἰοῦ
  english_pob_choice: from rust
  chosen_spanish: del óxido
  alternatives_spanish:
  - de la corrosión
  - del herrumbre
  lexicon: LSJ
  rationale: En este marco de deterioro material, ἰός se entiende naturalmente como óxido/corrosión. «Óxido» es la opción más clara en español contemporáneo y mantiene la imagen de descomposición física.
- source_word: βρωμάτων
  english_pob_choice: moths
  chosen_spanish: las polillas
  alternatives_spanish:
  - las cosas que consumen
  - los insectos que destruyen
  - los gusanos
  lexicon: LSJ
  rationale: Aunque el término griego es más amplio que «polillas», el contexto de vestiduras hace que esa imagen sea la más natural en español. Se conserva así la referencia a la ruina de la ropa, tal como razona el audit trail inglés.
- source_word: περιβεβλημένων αὐτῶν
  english_pob_choice: though they are clothed
  chosen_spanish: aunque están vestidos
  alternatives_spanish:
  - mientras están vestidos
  - si bien están vestidos
  lexicon: LSJ
  rationale: 'La construcción de genitivo absoluto expresa una concesión: pese a estar revestidos, no quedan a salvo. «Aunque están vestidos» transmite esa ironía con naturalidad en español.'
- source_word: ἱματισμὸν πορφυροῦν
  english_pob_choice: in purple garments
  chosen_spanish: de vestidos de púrpura
  alternatives_spanish:
  - con un manto de púrpura
  - con vestiduras púrpura
  - con ropa de púrpura
  lexicon: LSJ
  rationale: ἱματισμός significa vestidura o ropa, y πορφυροῦν especifica el color púrpura. «Vestidos de púrpura» es una formulación comprensible y fiel al valor colectivo del sustantivo griego, sin imponer un término litúrgico posterior.
theological_decisions:
- issue: Sentido de διασώζονται en una denuncia de la idolatría
  english_pob_reading: physical preservation from decay
  chosen_spanish_reading: preservación física frente al deterioro
  alternative_spanish_readings:
  - salvación espiritual
  - liberación en sentido general
  rationale: El contexto inmediato habla de ídolos, metal, ropa y corrupción material. Por eso la traducción debe subrayar la incapacidad de resistir el deterioro físico, no una noción de salvación espiritual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Relación entre el óxido y las polillas como imagen de decadencia
  english_pob_reading: rust and moths
  chosen_spanish_reading: óxido y polillas
  alternative_spanish_readings:
  - corrosión y cosas que consumen
  - herrumbre y destructores
  rationale: La lectura inglesa ya reconoce que βρωμάτων es más amplia que «polillas», pero mantiene la imagen textil. En español, «polillas» preserva esa concreción sin borrar la amplitud semántica, que queda reflejada en la decisión lexical.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: 'Coincide con el último pase del audit trail: no se requieren revisiones respecto de la base inglesa aprobada. Se conserva la decisión de leer el pasaje como una descripción de decadencia material de los ídolos y sus vestiduras.'
  spanish_consistency_notes:
  - Se mantiene «preservados» para διασώζονται, evitando «salvados» por claridad contextual.
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - Se conserva «púrpura» como color de prestigio, sin sustituirlo por términos más interpretativos.
