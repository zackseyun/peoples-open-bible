  yaml_path: translation/ot/jeremiah/046/011.yaml
  text: Go up to Gilead and get balm[a], virgin daughter of Egypt. In vain you have multiplied remedies[b]; there is no healing for you.
  footnotes:
  - marker: a
    text: 'Or ''To no avail you have used many remedies.'' The Hebrew verb form in ''you have multiplied'' is textually and morphologically difficult in the consonantal text, but the sense in context is clear: Egypt''s many treatments are futile.'
    reason: textual_variant
  - marker: b
    text: Gilead was known for its medicinal balm; the command is ironic, since even the best-known remedy will not heal Egypt.
    reason: cultural_note
