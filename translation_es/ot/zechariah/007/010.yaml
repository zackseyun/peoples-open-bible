translation:
  language: es
  text: No opriman a la viuda, al huérfano[a], al forastero residente[b] ni al pobre, y no maquinen mal en sus corazones unos contra otros[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Huérfano'' aquí corresponde al hebreo con sentido de persona sin padre; el inglés POB retuvo ''fatherless'' por ese matiz social.'
    reason: lexical_alternative
  - marker: b
    text: '''Forastero residente'' intenta reflejar el sentido de un no nativo que vive entre el pueblo, equivalente funcional de ''sojourner''.'
    reason: cultural_note
  - marker: c
    text: Literalmente, 'la maldad de cada hombre contra su hermano' o 'un hombre contra su hermano'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלְמָנָה
  english_pob_choice: widow
  chosen_spanish: viuda
  alternatives_spanish:
  - mujer viuda
  lexicon: HALOT
  rationale: El término hebreo designa de manera directa a una mujer cuyo esposo ha muerto; en español, 'viuda' es natural, preciso y conserva el valor social vulnerable del listado.
- source_word: יָתוֹם
  english_pob_choice: fatherless
  chosen_spanish: huérfano
  alternatives_spanish:
  - desamparado de padre
  - orfano
  lexicon: HALOT
  rationale: Aunque el auditorio inglés retuvo 'fatherless' por su matiz social-jurídico, en español 'huérfano' comunica con claridad la vulnerabilidad del término sin exigir una perífrasis poco natural; el sentido legal queda integrado por el contexto de protección al débil.
- source_word: גֵּר
  english_pob_choice: sojourner
  chosen_spanish: forastero residente
  alternatives_spanish:
  - forastero
  - extranjero residente
  - inmigrante
  lexicon: HALOT
  rationale: '''Forastero residente'' conserva la idea de un no nativo que vive dentro de la comunidad, más específica que ''forastero'' y menos anacrónica que ''inmigrante''; evita también reducir el término a una categoría moderna ajena al texto.'
- source_word: עָנִי
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - necesitado
  - afligido
  lexicon: HALOT
  rationale: En esta lista de personas vulnerables, el sentido socioeconómico es primario; 'pobre' es la correspondencia más clara y directa en español.
- source_word: תַּעֲשֹׁקוּ
  english_pob_choice: oppress
  chosen_spanish: opriman
  alternatives_spanish:
  - defrauden
  - exploten
  - opriman
  lexicon: HALOT
  rationale: El verbo expresa abuso u opresión indebida de personas vulnerables; 'opriman' preserva la amplitud semántica de abuso económico, legal y social mejor que una opción más estrecha.
- source_word: רָעַת
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - daño
  lexicon: HALOT
  rationale: La construcción apunta a una intención moralmente mala hacia el prójimo; 'mal' es una forma natural en español que mantiene esa carga sin endurecer el giro idiomático.
- source_word: תַּחְשְׁבוּ
  english_pob_choice: devise
  chosen_spanish: maquinen
  alternatives_spanish:
  - planeen
  - tramen
  - piensen
  lexicon: HALOT
  rationale: Con 'mal' y 'en su corazón', el sentido no es simple pensamiento sino planificación intencional; 'maquinen' transmite bien la idea de urdir/planear mal.
- source_word: אִישׁ אָחִיו
  english_pob_choice: one another
  chosen_spanish: unos contra otros
  alternatives_spanish:
  - el uno contra el otro
  - entre sí
  - cada uno contra su hermano
  lexicon: HALOT
  rationale: La frase hebrea es literalmente distributiva y masculina, pero en contexto funciona recíprocamente dentro de la comunidad; 'unos contra otros' expresa la reciprocidad conflictiva de modo natural en español.
- source_word: בִּלְבַבְכֶם
  english_pob_choice: in your hearts
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en sus corazones
  - dentro de sus corazones
  lexicon: HALOT
  rationale: Aunque el sufijo es plural, la segunda persona plural en español admite una referencia colectiva con 'su' en este tipo de formulación; además, el singular genérico 'corazón' es idiomático y mantiene la interioridad moral del hebreo.
theological_decisions:
- issue: Equivalente español de אִישׁ אָחִיו / distributivo recíproco
  english_pob_reading: one another
  chosen_spanish_reading: unos contra otros
  alternative_spanish_readings:
  - el uno contra el otro
  - cada uno contra su hermano
  - entre sí
  rationale: El hebreo usa un distributivo masculino singular con valor recíproco comunitario. En español, 'unos contra otros' comunica esa reciprocidad sin perder el matiz de conflicto implícito en 'evil in your hearts against one another'.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Traducción de גֵּר sin reducirlo a una categoría moderna
  english_pob_reading: sojourner
  chosen_spanish_reading: forastero residente
  alternative_spanish_readings:
  - extranjero residente
  - forastero
  rationale: El término bíblico no coincide exactamente con 'extranjero' genérico ni con una etiqueta migratoria moderna. 'Forastero residente' conserva la idea de una persona no originaria que vive bajo la protección de la comunidad del pacto.
  doctrine_reference: DOCTRINE.md § Lexical precision
- issue: Valor moral de רָעַת ... תַּחְשְׁבוּ
  english_pob_reading: do not devise evil
  chosen_spanish_reading: no maquin[en] mal
  alternative_spanish_readings:
  - no planeen mal
  - no tramen mal
  - no piensen mal
  rationale: El contexto no prohíbe solo pensamientos internos sino la intención deliberada de hacer daño. 'Maquinen' mantiene la tensión entre pensamiento y planificación moralmente perversa.
  doctrine_reference: DOCTRINE.md § Translation philosophy 2
translation_notes:
  revision_awareness: 'El borrador sigue el estado de revisión más reciente indicado como sin cambios necesarios (latest_revision_pass: unchanged=true). No se detectan revisiones aplicadas ni conflictos con el control cruzado de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y contemporáneo, evitando calcos demasiado rígidos.
  - Se conserva la tensión distributiva/recíproca de אִישׁ אָחִיו mediante una nota literal, mientras el texto principal prioriza naturalidad.
  - '''Yahvé'' no aparece en este versículo, por lo que no se requiere decisión sobre el Tetragrámaton.'
  - La elección de 'forastero residente' es terminológicamente consistente con el valor protegido de גֵּר en contextos legales y proféticos.
