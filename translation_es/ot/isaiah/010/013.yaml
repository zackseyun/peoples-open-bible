translation:
  language: es
  text: 'Porque dice: «Con la fuerza de mi mano lo he hecho, y con mi sabiduría, porque tengo entendimiento. Quito los límites de los pueblos, y despojo sus tesoros[a]; como un hombre poderoso[b] derribo a los que están sentados en sus tronos[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus depósitos», «sus posesiones» o «sus riquezas acumuladas». El término hebreo es raro y probablemente se refiere a riquezas atesoradas.
    reason: lexical_alternative
  - marker: b
    text: O «como un poderoso».
    reason: lexical_alternative
  - marker: c
    text: O «los habitantes». El participio hebreo puede significar los que habitan, pero en este contexto puede referirse más específicamente a los que están sentados en posición de poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación causal/discursiva con lo anterior. En español, «Porque» reproduce naturalmente ese enlace sin cambiar el contenido del hebreo.
- source_word: אָמַר
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  - está diciendo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, en el discurso profético funciona como cita vivida o característica. «Dice» mantiene ese valor presente, como en la decisión inglesa.
- source_word: בְּכֹחַ יָדִי
  english_pob_choice: By the strength of my hand
  chosen_spanish: Con la fuerza de mi mano
  alternatives_spanish:
  - Con el poder de mi mano
  - Por la fuerza de mi mano
  lexicon: HALOT
  rationale: «כֹּחַ» es fuerza/poder; en español «la fuerza de mi mano» conserva la imagen concreta del poder autoatribuido. Se prefirió «con» para reflejar el medio/instrumento implícito del hebreo y sonar natural.
- source_word: עָשִׂיתִי
  english_pob_choice: I have done it
  chosen_spanish: he hecho esto
  alternatives_spanish:
  - lo he hecho
  - he realizado esto
  lexicon: HALOT
  rationale: El verbo es amplio («hacer, realizar»). «He hecho esto» sigue de cerca la concisión del hebreo y evita agregar matices no presentes; «esto» expresa el objeto implícito del contexto.
- source_word: וּבְחָכְמָתִי
  english_pob_choice: and by my wisdom
  chosen_spanish: y con mi sabiduría
  alternatives_spanish:
  - y por mi sabiduría
  - y con mi conocimiento
  lexicon: HALOT
  rationale: «חָכְמָה» es «sabiduría»; no se estrecha a pericia técnica. «Con mi sabiduría» conserva el tono de autoexaltación del original.
- source_word: כִּי נְבֻנוֹתִי
  english_pob_choice: for I have understanding
  chosen_spanish: porque tengo entendimiento
  alternatives_spanish:
  - pues tengo discernimiento
  - porque soy entendido
  lexicon: HALOT
  rationale: Deriva de בין/נבון y expresa discernimiento/entendimiento. «Tengo entendimiento» reproduce bien la estructura predicativa y evita un giro demasiado coloquial o abstracto.
- source_word: וַאֲסִיר גְּבוּלוֹת עַמִּים
  english_pob_choice: I remove the boundaries of peoples
  chosen_spanish: Quito los límites de los pueblos
  alternatives_spanish:
  - Remuevo los límites de los pueblos
  - Quito las fronteras de los pueblos
  lexicon: HALOT
  rationale: «גְּבוּלוֹת» puede ser límites/fronteras. «Límites» mantiene amplitud semántica y evita modernizar en exceso el referente político; «pueblos» refleja עַמִּים sin convertirlo en «naciones».
- source_word: וַעֲתִידֹתֵיהֶם
  english_pob_choice: their treasures
  chosen_spanish: sus tesoros
  alternatives_spanish:
  - sus riquezas
  - sus bienes guardados
  - sus reservas
  lexicon: HALOT
  rationale: El término es raro y probablemente alude a riqueza acumulada o preparada. «Tesoros» es la opción española más natural en el contexto de saqueo y preserva la ambigüedad lexical documentada por la nota inglesa.
- source_word: שׁוֹשֵׂתִי
  english_pob_choice: I plunder
  chosen_spanish: despojo
  alternatives_spanish:
  - saqueo
  - plundero
  - devasto
  lexicon: HALOT
  rationale: El verbo comunica despojar/saquear. Se eligió «despojo» por ser claro, digno y plenamente acorde con el contexto militar; mantiene la idea de arrebatar bienes sin introducir una metáfora adicional.
- source_word: וְאוֹרִיד
  english_pob_choice: I bring down
  chosen_spanish: derribo
  alternatives_spanish:
  - hago caer
  - abato
  - humillo
  lexicon: HALOT
  rationale: 'Hiphil de ירד: causar el descenso, rebajar. «Derribo» comunica con fuerza la acción de abatir a los exaltados y preserva la imagen de humillación del poder.'
- source_word: כַּאַבִּיר
  english_pob_choice: like a mighty man
  chosen_spanish: como un hombre poderoso
  alternatives_spanish:
  - como un poderoso
  - como un valiente
  - como un guerrero poderoso
  lexicon: HALOT
  rationale: «אַבִּיר» puede designar al poderoso/mighty one; en el contexto bélico, «hombre poderoso» resulta natural y mantiene el sentido personal que la traducción inglesa prefirió sobre posibles asociaciones zoológicas.
- source_word: יוֹשְׁבִים
  english_pob_choice: those who sit enthroned
  chosen_spanish: a los que están sentados en trono
  alternatives_spanish:
  - a los que habitan
  - a los que se sientan
  lexicon: HALOT
  rationale: El participio puede significar «los que habitan», pero aquí el contexto favorece a quienes están sentados en posición de poder. «Están sentados en trono» intenta conservar esa fuerza sin abandonar la ambigüedad básica.
theological_decisions:
- issue: Referente del hablante orgulloso
  english_pob_reading: The verse quotes the arrogant king of Assyria as representative of Assyria's pride.
  chosen_spanish_reading: El versículo cita al rey asirio soberbio como representante de la arrogancia de Asiria.
  alternative_spanish_readings:
  - El versículo personifica a Asiria como si hablara colectivamente.
  - El versículo se refiere solo al rey de Asiria sin matiz corporativo.
  rationale: El contexto inmediato acusa el orgullo de Asiria y del rey asirio; el singular hebreo se conserva sin forzar una reducción indebida ni borrar el alcance corporativo del pasaje.
  doctrine_reference: Isaías 10:12-15
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y el estado más reciente sin cambios. La versión española sigue la decisión óptima-equivalente del inglés, pero ajusta la sintaxis al español bíblico moderno y conserva las ambigüedades documentadas donde el hebreo las exige.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «pueblos» para עַמִּים, coherente con el alcance amplio del término en contexto imperial.
  - «Sabiduría» y «entendimiento» se distinguieron para reflejar חָכְמָה y נְבֻנוֹתִי sin fusionarlas.
  - La alternancia «despojo/tesoros» conserva el tono de saqueo militar y la nota lexical sobre el término raro.
