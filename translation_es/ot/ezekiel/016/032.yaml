review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo y conserva la imagen de adulterio y sustitución: הָאִשָּׁה הַמְּנָאָפֶת … תַּחַת אִישָׁהּ תִּקַּח אֶת זָרִים. Sin embargo, el inglés POB optó por ''wife'' con una nota alternativa para ''woman'', y la propia evidencia contextual (''su marido'') hace explícito el sentido matrimonial. En español, ''mujer'' es posible, pero ''esposa'' preserva mejor la decisión auditada y evita una leve pérdida de especificidad. Además, ''extraños'' en español puede sonar más adjetival o ambiguo; en este contexto sexual/metafórico, ''otros hombres'' comunica mejor el referente humano implícito que el hebreo permite y que la nota inglesa explicita como alternativa.'
  spanish_quality_summary: El borrador es legible, pero 'La mujer adúltera toma extraños' suena poco idiomático en español bíblico natural. 'Tomar extraños' no identifica claramente que se trata de hombres/parejas sexuales. 'La esposa adúltera toma a otros hombres en lugar de su marido' es más claro, natural y mantiene la dureza del original sin paráfrasis excesiva.
  glossary_alignment: No hay términos de glosario mayor en conflicto. La revisión propuesta mejora la alineación con la decisión inglesa 'wife' mediante 'esposa' y conserva 'marido' para אִישָׁהּ. La nota alternativa puede preservar 'mujer' y la posibilidad de una formulación más cercana a 'strangers'.
  issues:
  - severity: medium
    issue: הָאִשָּׁה se tradujo como 'mujer' en lugar de 'esposa'.
    rationale: Aunque 'mujer' puede ser semánticamente válido, el contexto inmediato 'su marido' y la decisión auditada del inglés favorecen el sentido marital explícito. 'Esposa' refleja mejor la relación de pacto traicionada.
  - severity: medium
    issue: זָרִים se tradujo como 'extraños' en el texto principal.
    rationale: '''Extraños'' es formalmente posible, pero en español ''toma extraños'' resulta poco natural y ambiguo. Dado el contexto sexual/metafórico, ''otros hombres'' comunica con mayor claridad el objeto humano de la acción, mientras la nota puede conservar una alternativa más literal.'
  revised_spanish_text: La esposa adúltera toma a otros hombres en lugar de su marido[a].
  revised_footnotes:
