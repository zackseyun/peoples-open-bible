translation:
  language: es
  text: '¡Miren![a] Todos ustedes que encienden un fuego, que se ciñen con teas: caminen a la luz de su fuego y entre las teas que han encendido. De mi mano les ha venido esto: en tormento[b] se acostarán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «¡He aquí!» o «¡Vean!».
    reason: lexical_alternative
  - marker: b
    text: 'O: «en dolor», «en angustia» o «en aflicción».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡Miren aquí!
  - ¡Vean!
  - ¡He aquí!
  lexicon: HALOT
  rationale: Es una interjección deíctica que introduce una advertencia solemne. «¡Miren!» conserva la fuerza directa y natural del inglés POB «Look» sin caer en arcaísmo.
- source_word: קֹדְחֵי אֵשׁ
  english_pob_choice: who kindle a fire
  chosen_spanish: que encienden fuego
  alternatives_spanish:
  - que prenden fuego
  - que prenden una llama
  - que encienden una llama
  lexicon: HALOT
  rationale: El participio expresa la acción de prender/encender. «Encienden fuego» mantiene la imagen simple y el paralelismo con la siguiente cláusula.
- source_word: מְאַזְּרֵי
  english_pob_choice: who gird yourselves with
  chosen_spanish: que se ciñen de
  alternatives_spanish:
  - que se arman con
  - que se rodean de
  - que se ajustan con
  lexicon: HALOT
  rationale: El verbo de ‘ceñirse’ conserva la metáfora corporal de prepararse o armarse con algo. En español «ciñen de brasas» sigue siendo comprensible y refleja la estructura reflexiva del hebreo.
- source_word: זִיקוֹת
  english_pob_choice: firebrands
  chosen_spanish: brasas
  alternatives_spanish:
  - astillas encendidas
  - antorchas
  - brasas ardientes
  lexicon: HALOT
  rationale: El inglés POB revisó la opción hacia una imagen de «brands/firebrands» más que «arrows». En español, «brasas» es la opción más natural y suficiente para el campo semántico de cosas encendidas; se evita «flechas» porque el audit trail descartó esa dirección. La alternativa de «chispas» queda contemplada en nota por la tensión lexical.
- source_word: לְכ֣וּ
  english_pob_choice: walk
  chosen_spanish: caminen
  alternatives_spanish:
  - anden
  - vayan
  lexicon: HALOT
  rationale: Es un imperativo de הלך. «Caminen» reproduce mejor que «vayan» el matiz de moverse dentro de la imagen de luz/fuego y conserva el tono de desafío irónico.
- source_word: בְּאוּר אֶשְׁכֶם
  english_pob_choice: in the light of your fire
  chosen_spanish: a la luz de su fuego
  alternatives_spanish:
  - en la luz de su fuego
  - bajo la luz de su fuego
  - a la claridad de su fuego
  lexicon: HALOT
  rationale: «אוּר» puede ser luz o resplandor. «A la luz de su fuego» expresa la ironía de confiar en una iluminación auto-producida y suena natural en español.
- source_word: וּבְזִיקוֹת בִּעַרְתֶּם
  english_pob_choice: and among the brands you have kindled
  chosen_spanish: y entre las brasas que han encendido
  alternatives_spanish:
  - y entre las brasas que ustedes han encendido
  - y entre las brasas que han prendido
  - y entre lo encendido por ustedes
  lexicon: HALOT
  rationale: La preposición aquí se entiende como ‘entre’, reflejando la imagen de caminar dentro de lo que ellos mismos han prendido. «Han encendido» conserva el vínculo con el verbo de encender y evita una paráfrasis excesiva.
- source_word: מִיָּדִי
  english_pob_choice: from my hand
  chosen_spanish: de mi mano
  alternatives_spanish:
  - de parte mía
  - de mí
  - por mi mano
  lexicon: HALOT
  rationale: Se conserva el modismo «mano» porque en Isaías comunica agencia y juicio divino de forma más vívida que una neutralización a «de mí».
- source_word: לְמַעֲצֵבָה
  english_pob_choice: in torment
  chosen_spanish: en tormento
  alternatives_spanish:
  - en dolor
  - en angustia
  - en aflicción
  lexicon: HALOT
  rationale: El sustantivo denota dolor/aflicción severa. «En tormento» expresa el peso judicial del cierre y conserva la gravedad del juicio.
- source_word: תִּשְׁכָּבוּן
  english_pob_choice: you will lie down
  chosen_spanish: se acostarán
  alternatives_spanish:
  - se tenderán
  - yacerán
  - reposarán
  lexicon: HALOT
  rationale: Se mantiene la imagen literal de ‘acostarse/recostarse’. En español bíblico moderno, «se acostarán» es claro, aunque el contexto de juicio deja implícito que no es reposo sino caída en sufrimiento.
theological_decisions:
- issue: Tono de los imperativos dirigidos a quienes encienden fuego
  english_pob_reading: A judicial/ironic challenge announcing divine judgment on self-reliance and hostile schemes
  chosen_spanish_reading: Un desafío irónico y judicial que anuncia juicio divino sobre la auto-confianza y los planes hostiles
  alternative_spanish_readings:
  - Una invitación neutral a seguir su propio camino
  - Una simple descripción de su conducta
  rationale: El cierre «de mi mano les ha venido esto» y la conclusión de sufrimiento muestran que no es aprobación sino ironía bajo juicio. La traducción conserva ese filo sin explicitar más de lo que el texto dice.
  doctrine_reference: Juicio divino; soberanía de Dios en la retribución profética
- issue: Identidad implícita del hablante en «de mi mano»
  english_pob_reading: The speaker is God, whose hand brings the announced consequence
  chosen_spanish_reading: El hablante es Dios, cuya mano trae la consecuencia anunciada
  alternative_spanish_readings:
  - El hablante es un profeta que cita a Dios
  - La expresión es impersonal
  rationale: En el discurso profético de Isaías, «mi mano» señala agencia directa de Yahvé. La formulación en español conserva la referencia sin añadir nombres fuera del texto.
  doctrine_reference: Agencia divina; lenguaje profético de juicio
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «burning arrows» a «firebrands/brands» y de «set ablaze» a «kindled». La versión española sigue esa revisión, evitando «flechas» y prefiriendo una imagen de brasas/brasas encendidas. También mantiene el cierre judicial con «tormento», conforme al último pass revisado.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar solo cuando el nombre divino aparece explícitamente; en este versículo el hebreo no lo contiene, por lo que la traducción conserva la referencia implícita mediante «mi mano».
  - Se preserva el paralelismo de las dos participiales iniciales y la secuencia imperativa/judicial final.
  - «En tormento» se eligió para mantener la severidad judicial; la nota recoge alternativas españolas legítimas sin borrar la tensión semántica.
