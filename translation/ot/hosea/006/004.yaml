id: HOS.6.4
reference: Hosea 6:4
source:
  edition: WLC
  text: מָ֤ה אֶֽעֱשֶׂה לְּ/ךָ֙ אֶפְרַ֔יִם מָ֥ה אֶעֱשֶׂה לְּ/ךָ֖ יְהוּדָ֑ה וְ/חַסְדְּ/כֶם֙ כַּֽ/עֲנַן בֹּ֔קֶר וְ/כַ/טַּ֖ל מַשְׁכִּ֥ים הֹלֵֽךְ־־־׃
translation:
  text: What shall I do with you[a], Ephraim? What shall I do with you, Judah? Your loyalty is like a morning cloud, and like dew that goes away early.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'steadfast love' or 'faithfulness' for 'covenant loyalty.' The Hebrew חֶסֶד carries the sense of loyal love within a covenant relationship.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה אֶעֱשֶׂה לְךָ
  chosen: What shall I do with you
  alternatives:
  - What am I to do with you
  - What shall I make of you
  lexicon: HALOT
  rationale: The idiom expresses exasperated deliberation, not merely an inquiry about action. 'What shall I do with you' is natural English and preserves the rhetorical force.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  alternatives:
  - —
  rationale: Proper name transliterated per translation philosophy. Here it stands for the northern kingdom, but the text addresses the named entity directly, so the name is retained.
- source_word: יְהוּדָה
  chosen: Judah
  alternatives:
  - —
  rationale: Proper name transliterated. The parallel with Ephraim indicates the southern kingdom/personified tribe, but the text itself uses the name.
- source_word: חַסְדְּכֶם
  chosen: covenant loyalty
  alternatives:
  - steadfast love
  - faithfulness
  - loyalty
  - love
  lexicon: HALOT
  rationale: חֶסֶד often denotes loyal love within a covenant relationship. In Hosea, the covenantal dimension is especially salient, so 'covenant loyalty' best captures both affection and obligation. Because English tradition often uses 'steadfast love,' that alternative is preserved in a footnote.
- source_word: כַּעֲנַן בֹּקֶר
  chosen: like a morning cloud
  alternatives:
  - like the morning mist
  - like a cloud of morning
  lexicon: HALOT
  rationale: עָנָן is 'cloud.' In context the image is of something insubstantial and quickly vanishing in the morning. 'Morning cloud' is concise and idiomatic, while preserving the metaphor.
- source_word: וְכַטַּל
  chosen: and like dew
  alternatives:
  - and like the dew
  lexicon: HALOT
  rationale: Simple simile parallel to 'morning cloud.' English idiom does not require the article here.
- source_word: מַשְׁכִּים
  chosen: early
  alternatives:
  - in the morning
  - that comes early
  lexicon: HALOT
  rationale: The Hiphil participle from שׁכם conveys doing something early. Here it modifies the vanishing dew; 'early' is the most natural adverbial rendering in English.
- source_word: הֹלֵךְ
  chosen: goes away
  alternatives:
  - vanishes
  - disappears
  - passes away
  lexicon: HALOT
  rationale: הלך literally means 'go/walk,' but in this collocation it describes something departing or disappearing. 'Goes away' preserves the verbal image while remaining idiomatic.
