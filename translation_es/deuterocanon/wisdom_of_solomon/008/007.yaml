  to: Y si alguien ama la rectitud[a], sus labores son virtudes; porque enseña la templanza y la prudencia, la rectitud y el valor[b], que nada es más útil para los seres humanos en la vida.
  rationale: Se cambió ‘justicia’ por ‘rectitud’ en el texto principal para reflejar mejor la decisión auditada del POB sobre δικαιοσύνη en este contexto ético sapiencial, dejando ‘justicia’ como alternativa léxica en nota. Se mantuvo la lista de virtudes y ‘templanza’ por ser una opción válida y eclesialmente comprensible. Se suavizó la cláusula final a ‘que nada es más útil…’ para un español más natural, y se precisó la nota sobre la personificación femenina preservada del griego.
