- from: La sabiduría para el necio es como una casa en ruinas[a], y el conocimiento del que carece de entendimiento es palabras que no se pueden examinar[b].
  to: La sabiduría para un necio es como una casa en ruinas[a], y el conocimiento del que carece de entendimiento es palabras inescrutables[b].
  rationale: Se ajusta la segunda cola a un español más natural y sapiencial mediante 'palabras inescrutables', manteniendo en nota la alternativa más literal 'palabras que no se pueden examinar', tal como permite la evidencia léxica y la auditoría inglesa. También se suaviza 'para el necio' a 'para un necio' para reflejar mejor el carácter genérico del proverbio.
