translation:
  language: es
  text: 'Entonces ambos se sentaron, comieron y bebieron juntos. Luego el padre de la joven dijo al hombre[a]: «Por favor, quédate a pasar la noche, y alégrate de corazón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por favor, acepta pasar la noche, y alégrate de corazón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: sat and ate and drank together (with “sat” as a natural narrative introduction)
  chosen_spanish: se sentaron
  alternatives_spanish:
  - tomaron asiento
  - se quedaron sentados
  lexicon: HALOT
  rationale: ישׁב en esta secuencia narrativa funciona como la acción inicial previa a comer; en español, «se sentaron» es natural y fiel sin añadir matices no presentes.
- source_word: וַיֹּאכְלוּ
  english_pob_choice: ate
  chosen_spanish: comieron
  alternatives_spanish:
  - cenaron
  - alrededor de la mesa comieron
  lexicon: HALOT
  rationale: אכל se traduce de forma directa con «comieron»; no se especifica el tipo de comida.
- source_word: שְׁנֵיהֶם יַחְדָּו
  english_pob_choice: the two of them together
  chosen_spanish: ambos ... juntos
  alternatives_spanish:
  - los dos ... juntos
  - los dos juntos
  lexicon: HALOT
  rationale: La combinación enfática de «los dos» con יחדו se expresa con «ambos ... juntos», manteniendo la redundancia de énfasis sin sonar pesado en español.
- source_word: וַיִּשְׁתּוּ
  english_pob_choice: drank
  chosen_spanish: bebieron
  alternatives_spanish:
  - tomaron
  - bebieron vino
  lexicon: HALOT
  rationale: שתה se rinde de manera directa con «bebieron»; el hebreo no especifica bebida y el español tampoco la añade.
- source_word: אֲבִי הַנַּעֲרָה
  english_pob_choice: the young woman's father
  chosen_spanish: el padre de la joven
  alternatives_spanish:
  - el padre de la muchacha
  - el padre de la muchacha joven
  lexicon: HALOT
  rationale: נַעֲרָה designa una joven/muchacha; «joven» conserva dignidad y evita un tono infantil que «niña» sugeriría.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el esposo
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el hombre»; se conserva esa formulación sin identificarlo más de lo que el texto aquí hace.
- source_word: הוֹאֶל נָא
  english_pob_choice: Please, be willing / Please consent
  chosen_spanish: Por favor, consiente
  alternatives_spanish:
  - Por favor, accede
  - Te ruego, consiente
  lexicon: HALOT
  rationale: יאל expresa disposición o consentimiento, y נָא añade ruego cortés; «consiente» preserva el valor de aceptación solicitada mejor que un imperativo más libre.
- source_word: וְלִין
  english_pob_choice: spend the night / lodge
  chosen_spanish: pasar la noche
  alternatives_spanish:
  - quedarte a pernoctar
  - alojarte
  lexicon: HALOT
  rationale: לון significa alojarse o pernoctar; «pasar la noche» es claro, moderno y fiel al sentido.
- source_word: וְיִטַב לִבֶּךָ
  english_pob_choice: let your heart be merry
  chosen_spanish: que tu corazón se alegre
  alternatives_spanish:
  - que tu corazón esté alegre
  - que tu ánimo se alegre
  - que tu corazón esté contento
  lexicon: HALOT
  rationale: La expresión literal es «que tu corazón sea bueno/esté bien»; en este contexto de hospitalidad se refleja con un giro idiomático natural en español que mantiene la imagen del corazón y el sentido de gozo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó el orden a una secuencia más directa y prefirió un verbo de pernoctar más cercano al hebreo, además de conservar el matiz idiomático de alegría del corazón. La nota al pie en español preserva la alternativa léxica documentada para נַעֲרָה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - Se evita «SEÑOR» como sustituto reverencial porque el hebreo aquí no lo requiere.
  - «Corazón» conserva la metáfora antropológica del hebreo sin sustituirla por un equivalente psicológico más interpretativo.
  - La puntuación y comillas siguen el uso editorial moderno en español de América Latina.
