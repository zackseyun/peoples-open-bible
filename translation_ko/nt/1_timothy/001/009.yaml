id: 1TI.1.9
reference: 1 Timothy 1:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰδὼς τοῦτο, ὅτι δικαίῳ νόμος οὐ κεῖται, ἀνόμοις δὲ καὶ ἀνυποτάκτοις, ἀσεβέσι καὶ ἁμαρτωλοῖς, ἀνοσίοις καὶ βεβήλοις, πατρολῴαις καὶ μητρολῴαις, ἀνδροφόνοις,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/009.yaml
  text: 'understanding this: the law is not laid down for a righteous man, but for the lawless and rebellious, the ungodly and sinful, the unholy and profane, those who kill their fathers and those who kill their mothers, murderers,'
  footnotes:
  - marker: a
    text: Or possibly 'those who strike their fathers and those who strike their mothers'; the Greek terms can refer to violent assault on parents, though in this context 'kill' is likely.
    reason: lexical_alternative
translation:
  language: ko
  text: '이것을 알아야 합니다: 율법은 의인을 위해 제정된 것이 아니라, 무법한 자와 거역하는 자들, 경건치 않은 자와 죄인들, 거룩하지 않은 자와 속된 자들, 자기 아버지를 죽이는 자[a]와 자기 어머니를 죽이는 자, 사람을 죽이는 자,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「자기 아버지·어머니를 폭행하는 자」. 헬라어 πατρολῴας / μητρολῴας는 부모를 폭행·살해하는 행위를 가리킬 수 있으나, 본문 문맥(다음에 「사람을 죽이는 자」가 이어짐)에서는 「죽이는」 의미가 유력하다.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδὼς τοῦτο
  english_pob_choice: understanding this
  chosen_korean: 이것을 알아야 합니다
  alternatives_korean:
  - 이것을 알고
  - 이것을 깨달아
  lexicon: BDAG
  rationale: 분사 구문을 합쇼체 문장으로 옮기되, 앞 절의 논리적 흐름을 받기 위해 「알아야 합니다」로 풀어 명령적 무게를 보존한다.
- source_word: δικαίῳ
  english_pob_choice: a righteous man
  chosen_korean: 의인
  alternatives_korean:
  - 의로운 사람
  - 의로운 자
  lexicon: BDAG
  rationale: 단수 남성형의 대표 표현. 한국 신학 정립 어휘 「의인」이 간결하고 정확하다.
- source_word: νόμος οὐ κεῖται
  english_pob_choice: the law is not laid down
  chosen_korean: 율법은 ~ 위해 제정된 것이 아니라
  alternatives_korean:
  - 율법이 놓인 것이 아니라
  - 율법이 정해진 것이 아니라
  lexicon: BDAG
  rationale: κεῖμαι의 법적 제정 어감을 「제정된」으로 살린다.
- source_word: ἀνόμοις
  english_pob_choice: the lawless
  chosen_korean: 무법한 자
  alternatives_korean:
  - 율법 없는 자
  - 불법한 자
  lexicon: BDAG
  rationale: 「무법한 자」가 도덕·법적 의미를 균형 있게 담는다.
- source_word: ἀνυποτάκτοις
  english_pob_choice: rebellious
  chosen_korean: 거역하는 자
  alternatives_korean:
  - 복종하지 않는 자
  - 반항하는 자
  lexicon: BDAG
  rationale: 권위에의 불복종을 「거역하는」으로 자연스럽게 담는다.
- source_word: ἀσεβέσι
  english_pob_choice: ungodly
  chosen_korean: 경건치 않은 자
  alternatives_korean:
  - 불경한 자
  lexicon: BDAG
  rationale: 6:11 등에서 사용되는 εὐσέβεια(경건)과 같은 어근의 부정 합성. 「경건치 않은」이 어휘적 연결을 살린다.
- source_word: ἁμαρτωλοῖς
  english_pob_choice: sinful
  chosen_korean: 죄인
  alternatives_korean:
  - 죄있는 자
  lexicon: BDAG
  rationale: 한국 교회 정립 어휘 「죄인」.
- source_word: ἀνοσίοις
  english_pob_choice: unholy
  chosen_korean: 거룩하지 않은 자
  alternatives_korean:
  - 부정한 자
  - 불경한 자
  lexicon: BDAG
  rationale: 「거룩하지 않은」이 ὅσιος(거룩한)의 부정형을 자연스럽게 담는다.
- source_word: βεβήλοις
  english_pob_choice: profane
  chosen_korean: 속된 자
  alternatives_korean:
  - 모독적인 자
  - 세속적인 자
  lexicon: BDAG
  rationale: 거룩한 것을 평범한 것으로 다루는 어감을 「속된」으로 옮긴다.
- source_word: πατρολῴαις / μητρολῴαις
  english_pob_choice: those who kill their fathers / mothers
  chosen_korean: 자기 아버지를 죽이는 자 / 자기 어머니를 죽이는 자
  alternatives_korean:
  - 아버지·어머니를 폭행하는 자
  - 친부 살해자
  lexicon: BDAG
  rationale: 폭력의 강도(폭행~살해)에 폭이 있으나, 다음에 「사람을 죽이는 자」가 이어지는 악행 목록 구조에서 「죽이는」이 본문 무게에 부합한다. 다른 어감은 각주로 보존한다.
- source_word: ἀνδροφόνοις
  english_pob_choice: murderers
  chosen_korean: 사람을 죽이는 자
  alternatives_korean:
  - 살인자
  lexicon: BDAG
  rationale: 「살인자」도 가능하나, 바로 앞 친족 살해 어휘와 구분하기 위해 「사람을 죽이는 자」로 풀어 일반적 살인을 명시한다.
