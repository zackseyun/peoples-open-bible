  text: '이로써 하나님의 자녀들과 마귀의 자녀들이 드러납니다: 의를 행하지 않는 자마다 하나님께 속한 것이 아니며, 자기 형제를 사랑하지 않는 자 또한 그러합니다.'
  philosophy: optimal-equivalence
