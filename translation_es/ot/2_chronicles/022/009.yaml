translation:
  language: es
  text: 'Lo buscó y lo capturaron mientras se escondía en Samaria; lo llevaron ante Jehú y lo mataron[a]. Luego lo sepultaron, porque dijeron: “Es hijo de Josafat, que buscó a Yahvé con todo su corazón”. Y la casa de Ahazías no tenía fuerza para conservar el reino[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, “lo dieron muerte”. El hebreo usa un verbo causativo: “lo hicieron morir”; por eso también puede traducirse “lo mataron”.'
    reason: lexical_alternative
  - marker: b
    text: O, “la casa de Ahazías no tenía fuerza para retener el reino”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבַקֵּשׁ
  english_pob_choice: he sought
  chosen_spanish: lo buscó
  alternatives_spanish:
  - lo buscó
  - lo buscó hasta hallarlo
  - lo buscó con empeño
  lexicon: HALOT
  rationale: בקש expresa buscar, procurar o indagar. En este contexto narrativo, “lo buscó” mantiene la acción directa sin añadir matices no atestiguados.
- source_word: וַיִּלְכְּדֻהוּ
  english_pob_choice: they captured him
  chosen_spanish: lo capturaron
  alternatives_spanish:
  - lo capturaron
  - lo apresaron
  - lo agarraron
  lexicon: HALOT
  rationale: לכד denota capturar o aprehender. “Lo capturaron” conserva el valor de toma efectiva y el sujeto plural del hebreo.
- source_word: מִתְחַבֵּא
  english_pob_choice: while he was hiding
  chosen_spanish: mientras se escondía
  alternatives_spanish:
  - mientras se escondía
  - oculto
  - cuando se escondía
  lexicon: HALOT
  rationale: El participio hitpael describe una acción en curso. “Mientras se escondía” expresa bien esa situación continua en español natural.
- source_word: בְשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en Samaria
  - en la ciudad de Samaria
  lexicon: HALOT
  rationale: La preposición ב señala ubicación. “En Samaria” es la forma más directa y natural en español.
- source_word: וַיְבִאֻהוּ אֶל יֵהוּא
  english_pob_choice: they brought him to Jehu
  chosen_spanish: lo llevaron ante Jehú
  alternatives_spanish:
  - lo llevaron a Jehú
  - lo trajeron ante Jehú
  - lo condujeron ante Jehú
  lexicon: HALOT
  rationale: בוא en hiphil significa traer o llevar. “Lo llevaron ante Jehú” comunica el traslado hacia su presencia; “ante” refleja el movimiento al encuentro de una autoridad.
- source_word: וַיְמִתֻהוּ
  english_pob_choice: put him to death
  chosen_spanish: lo mataron
  alternatives_spanish:
  - lo mataron
  - lo hicieron morir
  - lo dieron muerte
  lexicon: HALOT
  rationale: El causativo de מות puede expresarse en español con “lo mataron”; es la forma más natural y no añade un grado de formalidad que el hebreo no exige aquí.
- source_word: וַיִּקְבְּרֻהוּ
  english_pob_choice: they buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo sepultaron
  - lo enterraron
  lexicon: HALOT
  rationale: קבר significa enterrar/sepultar. “Lo sepultaron” es solemne y plenamente fiel al acto funerario narrado.
- source_word: כִּי אָמְרוּ
  english_pob_choice: for they said
  chosen_spanish: porque dijeron
  alternatives_spanish:
  - porque dijeron
  - pues dijeron
  - ya que dijeron
  lexicon: HALOT
  rationale: כִּי introduce la razón de la sepultura. “Porque dijeron” reproduce claramente la relación explicativa.
- source_word: בֶּן יְהוֹשָׁפָט הוּא
  english_pob_choice: He is the son of Jehoshaphat
  chosen_spanish: Es hijo de Josafat
  alternatives_spanish:
  - Es hijo de Josafat
  - Es el hijo de Josafat
  lexicon: HALOT
  rationale: La cláusula nominal hebrea se vuelve natural en español como “Es hijo de...”. Se mantiene la filiación inmediata y la solemnidad narrativa.
- source_word: אֲשֶׁר דָּרַשׁ אֶת יְהוָה
  english_pob_choice: who sought Yahweh
  chosen_spanish: que buscó a Yahvé
  alternatives_spanish:
  - que buscó a Yahvé
  - que inquirió de Yahvé
  - que buscó a Yahvé con devoción
  lexicon: HALOT
  rationale: דרש con Dios puede significar buscarlo devocionalmente o consultar/inquirir. Aquí la decisión inglesa de “sought” apunta a búsqueda de fidelidad; “buscó a Yahvé” conserva esa orientación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio doctrinal del proyecto para el Tetragrámaton: transliteración del nombre divino como “Yahvé” en lugar de sustituirlo por un título.'
- source_word: בְּכָל לְבָבוֹ
  english_pob_choice: with all his heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - con todo su corazón
  - con el corazón entero
  lexicon: HALOT
  rationale: Es un modismo de lealtad íntegra. “Con todo su corazón” es idiomático en español y conserva la fuerza covenantal.
- source_word: וְאֵין לְבֵית אֲחַזְיָהוּ
  english_pob_choice: And the house of Ahaziah had no power
  chosen_spanish: Y la casa de Ahazías no tenía fuerza
  alternatives_spanish:
  - Y la casa de Ahazías no tenía fuerza
  - Y la casa de Ahazías no tenía poder
  lexicon: HALOT
  rationale: “Casa” mantiene el sentido dinástico. “No tenía fuerza” sigue de cerca la imagen hebrea de incapacidad/poder insuficiente sin convertirla en una abstracción excesiva.
- source_word: לַעְצֹר כֹּחַ
  english_pob_choice: to retain
  chosen_spanish: para conservar
  alternatives_spanish:
  - para conservar
  - para retener
  - para sostener
  lexicon: HALOT
  rationale: עצר con כוח en este contexto apunta a mantener o retener el control. “Conservar” comunica bien la idea de mantener el reino sin forzar un tecnicismo.
- source_word: לְמַמְלָכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el reino
  - la monarquía
  - el dominio real
  lexicon: HALOT
  rationale: ממלכה puede referirse al reino/monarquía. “El reino” es la equivalencia más natural y clara en este relato histórico.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo contiene el Nombre propio divino, no un título. Se mantiene la transliteración “Yahvé” según la política del proyecto y la lectura inglesa auditada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of the final clause about Ahaziah's house
  english_pob_reading: dynastic inability to retain royal power
  chosen_spanish_reading: incapacidad dinástica para conservar el reino
  alternative_spanish_readings:
  - falta de fuerza para gobernar
  - no tener poder para sostener el reino
  - no poder retener el reino
  rationale: El hebreo habla de falta de כוח respecto de la monarquía, una incapacidad para sostenerla más que una simple debilidad física. “No tenía fuerza para conservar el reino” preserva esa tensión.
  doctrine_reference: HALOT / contexto histórico-narrativo de la dinastía de Ahazías
translation_notes:
  revision_awareness: Se revisó la concordancia con el texto hebreo WLC, la lectura inglesa POB y su nota sobre el causativo de מות y la cláusula final dinástica. No se detectaron cambios necesarios respecto del sentido base; se optó por una redacción española directa y publicable.
  spanish_consistency_notes:
  - Se usa “Yahvé” para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene “casa” en sentido dinástico para בֵּית אֲחַזְיָהוּ.
  - Se evita “Cristo” o terminología eclesiástica no presente en el texto.
  - Se conserva la diferencia entre “buscar” devocionalmente y “retener/conservar” en la cláusula política final.
