    text: O «y echen fuera»; el verbo raro hebreo también puede entenderse como «y vomiten».
    reason: lexical_alternative
  revision_rationale: Se corrigió la colocación de la nota para que corresponda al verbo hebreo וּקְיוּ («vomiten»), se afinó la redacción a «Y les dirás» para mejor español, y se ajustó la nota para reflejar con más fidelidad la alternativa léxica auditada sin introducir «escupan», que es menos preciso.
