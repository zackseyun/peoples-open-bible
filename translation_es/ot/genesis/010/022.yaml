translation:
  language: es
  text: 'Los hijos de Sem: Elam, Asur, Arpacsad[a], Lud[b] y Aram.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «Arpacsad»; una forma tradicional, influida por el griego, suele leerse «Arfaxad».
    reason: lexical_alternative
  - marker: b
    text: Los nombres «Asur» y «Aram» suelen asociarse con las regiones o pueblos conocidos después como Asiria y Siria.
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos
  lexicon: HALOT
  rationale: En una lista genealógica, el hebreo plural constructo de בֵּן admite una relación filial amplia. En español, «hijos de» conserva bien la estructura y suena natural; «descendientes de» ampliaría demasiado el sentido inmediato.
- source_word: שֵׁם
  english_pob_choice: Shem
  chosen_spanish: Sem
  alternatives_spanish:
  - Shem
  lexicon: HALOT
  rationale: Nombre propio bíblico. En español bíblico es más natural la forma «Sem», ya asentada en la tradición hispana, sin cambiar el referente.
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  alternatives_spanish:
  - Elán
  lexicon: HALOT
  rationale: Nombre propio/topónimo en forma transliterada estándar. Se conserva «Elam» para mantener la correspondencia con el hebreo y con el esquema genealógico.
- source_word: אַשּׁוּר
  english_pob_choice: Asshur
  chosen_spanish: Asur
  alternatives_spanish:
  - Assur
  - Asiria
  lexicon: HALOT
  rationale: El contexto es una genealogía de nombres personales/ancestrales, no una designación geopolítica. Por eso se translitera el nombre como «Asur» en vez de «Asiria».
- source_word: אַרְפַּכְשַׁד
  english_pob_choice: Arpachshad
  chosen_spanish: Arpajshad
  alternatives_spanish:
  - Arfaxad
  - Arphaxad
  lexicon: HALOT
  rationale: Se conserva una transliteración cercana al hebreo. La forma española «Arpajshad» refleja mejor las consonantes hebreas que la forma tradicional influida por el griego.
- source_word: לוּד
  english_pob_choice: Lud
  chosen_spanish: Lud
  alternatives_spanish:
  - Ludim
  lexicon: HALOT
  rationale: Nombre propio singular; «Lud» reproduce directamente el hebreo y evita introducir una forma plural distinta.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  lexicon: HALOT
  rationale: Nombre propio en una lista genealógica. Se mantiene «Aram» en lugar de «Siria» para no desplazar el valor genealógico del texto.
translation_notes:
  revision_awareness: El texto fuente y la auditoría inglesa muestran alta concordancia y no requieren revisiones textuales. La principal decisión española fue ajustar la forma de nombres propios a usos bíblicos hispanos sin perder la cercanía al hebreo.
  spanish_consistency_notes:
  - Se mantuvo el orden y la puntuación de la lista genealógica.
  - Se prefirió «hijos de» por su naturalidad y fidelidad estructural en genealogías.
  - Los nombres propios se transliteraron de forma consistente, evitando equivalentes geopolíticos que oscurecerían el sentido inmediato.
