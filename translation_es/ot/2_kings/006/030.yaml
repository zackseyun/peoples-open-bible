revisions:
- from: Y sucedió que, cuando el rey oyó las palabras de la mujer, rasgó sus vestidos mientras pasaba sobre la muralla, y el pueblo vio, y he aquí que el cilicio estaba sobre su cuerpo[a] debajo.
  to: Y sucedió que, cuando el rey oyó las palabras de la mujer, rasgó sus vestidos mientras pasaba sobre la muralla, y el pueblo vio, y he aquí que llevaba cilicio sobre su cuerpo, por debajo[a].
  rationale: Se ajustó la clausula final para que el español exprese con naturalidad que el cilicio estaba debajo de la ropa exterior, preservando a la vez «sobre su cuerpo». Se movió el marcador de nota al segmento que traduce מִבָּיִת, que es el punto explicado por la nota. El resto del versículo se mantiene por ser fiel al hebreo y adecuado en español.
