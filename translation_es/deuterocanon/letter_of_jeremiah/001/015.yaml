lexical_decisions:
- source_word: Ὥσπερ
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - justo como
  lexicon: LSJ
  rationale: Introduce comparación directa con un equivalente natural en español, conservando la relación ilustrativa del griego.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: LSJ
  rationale: En posición inicial, el conector explica la afirmación previa; 'porque' comunica bien la función causal/explicativa en español moderno.
- source_word: σκεῦος
  english_pob_choice: vessel
  chosen_spanish: recipiente
  alternatives_spanish:
  - vasija
  - vaso
  - utensilio
  lexicon: LSJ
  rationale: '''Recipiente'' mantiene la imagen de un objeto hecho para contener o servir sin restringir innecesariamente a cerámica; en español suena más natural que ''vasija'' en un registro general.'
- source_word: ἀνθρώπου
  english_pob_choice: human
  chosen_spanish: humano
  alternatives_spanish:
  - de un hombre
  - de una persona
  - hecho por un hombre
  lexicon: LSJ
  rationale: Sigue la revisión inglesa que preserva el matiz genérico de ἀνθρώπου. 'Humano' evita una lectura demasiado masculina de 'hombre' y conserva el sentido de pertenencia/calificación.
- source_word: συντριβὲν
  english_pob_choice: once broken
  chosen_spanish: una vez quebrado
  alternatives_spanish:
  - cuando se quiebra
  - habiendo sido quebrado
  - roto
  lexicon: LSJ
  rationale: El participio aoristo expresa una acción completada antes del resultado; 'una vez quebrado' refleja ese valor sin perder fluidez.
- source_word: ἄχρειον
  english_pob_choice: useless
  chosen_spanish: inútil
  alternatives_spanish:
  - sin provecho
  - inservible
  - de nada sirve
  lexicon: LSJ
  rationale: '''Inútil'' expresa con claridad la pérdida de valor práctico indicada por el adjetivo griego.'
- source_word: γίνεται
  english_pob_choice: becomes
  chosen_spanish: llega a ser
  alternatives_spanish:
  - se vuelve
  - se hace
  lexicon: LSJ
  rationale: Marca con claridad el cambio de estado resultante tras la ruptura, conservando el dinamismo del verbo griego.
theological_decisions:
- issue: Imagen comparativa de un objeto humano y su estado tras quebrarse
  english_pob_reading: For just as a human vessel, once broken, becomes useless,
  chosen_spanish_reading: Porque, así como un recipiente humano, una vez quebrado, llega a ser inútil,
  alternative_spanish_readings:
  - Porque, así como una vasija humana, una vez quebrada, se vuelve inútil,
  - Porque, así como un recipiente de una persona, una vez quebrado, llega a ser inútil,
  rationale: No hay carga doctrinal explícita en el verso; la decisión es mantener la comparación material con el menor grado posible de interpretación, sin convertir el objeto en una metáfora teológica más precisa de la que el texto ofrece.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que prefirió 'a human vessel' frente a 'a vessel of a man'. El español refleja esa actualización con 'recipiente humano' y evita introducir una especificación no garantizada por el griego. No se detectan otros cambios sustanciales en el tramo.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' y cualquier término divino, porque este versículo no los contiene.
  - Se eligió 'recipiente' en lugar de 'vasija' para un español más neutral, pero la nota conserva la alternativa tradicional si se prefiere una imagen más concreta.
  - '''Quebrado'' mantiene el valor de ruptura física del participio griego sin intensificarlo innecesariamente.'
