translation:
  language: es
  text: La joven le agradó y halló favor delante de él, y él se apresuró a darle sus tratamientos de belleza y sus porciones, junto con siete jóvenes aptas para serle dadas del palacio del rey; y la trasladó a ella y a sus jóvenes al mejor lugar[a] de la casa de las mujeres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a las mejores dependencias de la casa de las mujeres»; la frase se refiere a un lugar superior dentro de las habitaciones reales de las mujeres, a menudo entendido como el harén.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעֲרָה
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la joven mujer
  lexicon: HALOT
  rationale: נַעֲרָה nombra a una mujer joven. En español, ‘la joven’ conserva esa neutralidad sin infantilizarla como ‘muchacha’ ni añadir una fórmula más pesada.
- source_word: וַתִּיטַב ... בְעֵינָיו
  english_pob_choice: pleased him
  chosen_spanish: agradó a sus ojos
  alternatives_spanish:
  - fue buena a sus ojos
  - le pareció bien
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: ‘ser buena en sus ojos’. En el texto español se mantiene la imagen de ‘a sus ojos’ para no perder la construcción semítica, aunque con verbo natural en español.'
- source_word: וַתִּשָּׂא חֶסֶד לְפָנָיו
  english_pob_choice: found favor before him
  chosen_spanish: halló favor delante de él
  alternatives_spanish:
  - obtuvo favor ante él
  - encontró gracia delante de él
  lexicon: HALOT
  rationale: El POB inglés preserva la idiomaticidad de ‘found favor before him’. ‘Halló favor delante de él’ mantiene la fórmula bíblica y evita volver ‘חֶסֶד’ a ‘bondad’ o ‘amor leal’, que aquí no corresponde al contexto cortesano.
- source_word: חֶסֶד
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - bondad
  - misericordia
  - gracia
  lexicon: HALOT
  rationale: En este contexto de corte y aceptación personal, חֶסֶד significa trato favorable, no el sentido pactual de ‘amor leal’. ‘Favor’ conserva esa tensión y la misma decisión léxica básica del POB.
- source_word: וַיְבַהֵל
  english_pob_choice: quickly provided
  chosen_spanish: apresuró
  alternatives_spanish:
  - se apresuró a dar
  - dio con prontitud
  - proveyó rápidamente
  lexicon: HALOT
  rationale: El verbo expresa prisa/urgencia. En español, ‘apresuró’ funciona bien con los objetos directos del versículo y deja claro que la acción fue hecha con rapidez, como en el inglés auditado.
- source_word: תַּמְרוּקֶיהָ
  english_pob_choice: her beauty treatments
  chosen_spanish: sus tratamientos de belleza
  alternatives_spanish:
  - sus ungüentos
  - sus cosméticos
  - sus preparaciones
  lexicon: HALOT
  rationale: El término alude a cuidados preparatorios o cosméticos dentro del contexto del harén/palacio. ‘Tratamientos de belleza’ comunica bien esa función sin reducir el hebreo a un solo producto cosmético.
- source_word: מָנוֹתֶיהָ
  english_pob_choice: her portions
  chosen_spanish: sus raciones
  alternatives_spanish:
  - sus porciones
  - sus provisiones
  - su comida asignada
  lexicon: HALOT
  rationale: מָנוֹת denota porciones asignadas, a menudo de comida o provisiones. ‘Raciones’ transmite la asignación concreta y suena natural en un entorno administrativo-palaciego.
- source_word: שֶׁבַע הַנְּעָרוֹת
  english_pob_choice: seven young women
  chosen_spanish: las siete jóvenes
  alternatives_spanish:
  - las siete muchachas
  - las siete doncellas
  - las siete asistentes jóvenes
  lexicon: HALOT
  rationale: El hebreo describe a siete jóvenes femeninas designadas para acompañarla. ‘Las siete jóvenes’ es breve y fiel; el contexto completa su función de asistentes.
- source_word: הָרְאֻיוֹת
  english_pob_choice: suitable
  chosen_spanish: convenientes
  alternatives_spanish:
  - aptas
  - adecuadas
  - idóneas
  lexicon: HALOT
  rationale: El participio pasivo indica idoneidad o aptitud para ser dadas a ella. ‘Convenientes’ conserva esa idea de correspondencia sin forzar una selección técnica no explicitada.
- source_word: מִבֵּית הַמֶּלֶךְ
  english_pob_choice: from the king’s palace
  chosen_spanish: de la casa del rey
  alternatives_spanish:
  - del palacio del rey
  - de la casa real
  lexicon: HALOT
  rationale: Se conserva la literalidad del hebreo ‘casa del rey’, que en este contexto designa la residencia/palacio real. Así se mantiene la conexión con la redacción del original.
- source_word: וַיְשַׁנֶּהָ
  english_pob_choice: he transferred her
  chosen_spanish: la trasladó
  alternatives_spanish:
  - la movió
  - la transfirió
  - la cambió de lugar
  lexicon: HALOT
  rationale: El verbo expresa cambio de ubicación o traslado. ‘La trasladó’ es natural en español y no añade la idea administrativa de ‘transferir’ más de lo que el contexto exige.
- source_word: בֵּית הַנָּשִׁים
  english_pob_choice: the women’s house
  chosen_spanish: la casa de las mujeres
  alternatives_spanish:
  - el recinto de las mujeres
  - el harén
  - las dependencias de las mujeres
  lexicon: HALOT
  rationale: Se mantiene la forma literal del hebreo. ‘Casa de las mujeres’ es transparente y permite que el lector perciba el término sin sustituirlo por ‘harén’ como interpretación principal.
theological_decisions:
- issue: Sentido de חֶסֶד en un contexto cortesano
  english_pob_reading: favor rather than covenantal steadfast love
  chosen_spanish_reading: favor, no amor leal pactual
  alternative_spanish_readings:
  - bondad
  - misericordia
  - gracia
  rationale: El contexto inmediato trata de aceptación ante un funcionario de la corte, no de alianza o relación pactual. Por eso se conserva ‘favor’, evitando cargar el término con un contenido teológico que aquí no aparece.
  doctrine_reference: Léxico contextual de חֶסֶד en narrativa cortesana
- issue: בית הנשים y su posible equivalencia cultural
  english_pob_reading: the women’s house, often understood as the harem, but the main text stays literal
  chosen_spanish_reading: la casa de las mujeres, con posible implicación de harén solo como nota cultural
  alternative_spanish_readings:
  - el harén
  - las dependencias de las mujeres
  - el recinto de las mujeres
  rationale: La traducción principal sigue el hebreo para no imponer de entrada una palabra interpretativa. ‘Harén’ queda implícito como trasfondo cultural, pero no reemplaza la forma del texto.
  doctrine_reference: Principio de transparencia textual y nota cultural
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail en inglés, que mantiene la idiomaticidad del hebreo en ‘pleased him’ y ‘found favor before him’, y preserva la alternativa de ‘best quarters of the women’s house’ como nota. No se introdujeron cambios doctrinales respecto del análisis inglés; la versión española sigue la misma lectura léxica con equivalentes naturales y transparentes.
  spanish_consistency_notes:
  - Se preservó ‘favor’ para חֶסֶד, evitando ‘gracia’ como traducción principal en este contexto.
  - Se mantuvo ‘casa del rey’ y ‘casa de las mujeres’ para conservar la literalidad institucional del hebreo.
  - ‘Tratamientos de belleza’ y ‘raciones’ reflejan los objetos concretos del texto sin amplificación interpretativa.
  - La nota[a] se ancló en ‘agradó’ para reflejar la idiomaticidad hebrea de ‘ser bueno en los ojos de’.
