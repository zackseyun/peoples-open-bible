lexical_decisions:
- source_word: וְ/אֵלֶּה
  english_pob_choice: Now these
  chosen_spanish: Ahora bien, estas
  alternatives_spanish:
  - Y estas
  - Estas
  lexicon: HALOT
  rationale: La partícula conjuntiva más el demostrativo introduce una fórmula de apertura genealógica. «Ahora bien» conserva la función discursiva de apertura y transición, y «estas» mantiene la deixis del hebreo sin sonar mecánico en español.
- source_word: תּוֹלְדוֹת
  english_pob_choice: the generations
  chosen_spanish: las generaciones
  alternatives_spanish:
  - los descendientes
  - la genealogía
  - la familia lineal
  lexicon: HALOT
  rationale: En este contexto genealógico, «las generaciones» reproduce la fórmula bíblica estable y conserva el matiz de registro formal que marca el encabezado de la sección.
- source_word: פָּרֶץ
  english_pob_choice: Perez
  chosen_spanish: Pérez
  alternatives_spanish:
  - Fares
  lexicon: convention on proper names
  rationale: Se usa la forma estándar en español desde el hebreo. «Fares» responde a tradición antigua, pero «Pérez» es la transliteración moderna y más cercana al hebreo.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: fue padre de
  alternatives_spanish:
  - engendró
  - engendró a
  - procreó
  lexicon: HALOT
  rationale: En genealogías, el Hiphil de ילד expresa la relación de paternidad. «Fue padre de» comunica con claridad esa función genealógica en español y evita un arcaísmo o una carga estilística innecesaria.
- source_word: חֶצְרוֹן
  english_pob_choice: Hezron
  chosen_spanish: Hezrón
  alternatives_spanish:
  - Hesrón
  lexicon: convention on proper names
  rationale: Nombre propio transliterado de manera estándar al español. Se conserva la forma más reconocible y cercana al hebreo.
