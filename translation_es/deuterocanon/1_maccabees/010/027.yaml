revisions:
- from: Nos alegramos[a]. Y ahora permanezcan todavía en guardar fidelidad con nosotros,
  to: Nos alegramos[a]. Y ahora continúen todavía manteniendo fe[b] con nosotros,
  rationale: Se revisa para alinear el español con el expediente fuente y con la política documentada del POB para πίστις. «Nos alegramos» se mantiene como texto principal, pero la nota se corrige para reflejar alternativas léxicas reales. «Continúen todavía manteniendo…» mejora la naturalidad y conserva la fuerza exhortativa de ἐμείνατε ἔτι τοῦ συντηρῆσαι. «Fe» se restaura en el texto principal para preservar la decisión del POB inglés, mientras una nota aclara las alternativas contextuales «fidelidad» y «lealtad».
