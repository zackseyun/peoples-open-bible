    text: Or 'to register the people in Jerusalem as citizens of Antioch.' The Greek says 'Antiochenes,' which may imply civic enrollment or legal status connected with Antioch.
    reason: alternative_reading
  - marker: b
    text: The 'gymnasium' and the enrollment of young men refer to Greek civic and athletic institutions associated here with Jerusalem's Hellenization.
    reason: cultural_note
