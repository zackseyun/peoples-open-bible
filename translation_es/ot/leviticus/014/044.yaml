  - severity: medium
    issue: «la llaga» para הַנֶּגַע en una casa suena poco natural
    rationale: En español contemporáneo, «llaga» evoca más una lesión corporal. En una casa, «mancha» o «infección» evita esa fricción semántica.
  revised_spanish_text: Entonces el sacerdote vendrá y examinará[a], y si en verdad la mancha se ha extendido en la casa, es un mildiu destructivo[b] en la casa; es impura.
