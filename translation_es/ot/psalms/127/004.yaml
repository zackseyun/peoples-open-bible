translation:
  language: es
  text: Como flechas en la mano de un guerrero[a], así son los hijos nacidos en la juventud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «los hijos de la juventud».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/חִצִּים
  english_pob_choice: Like arrows
  chosen_spanish: Como flechas
  alternatives_spanish:
  - Como dardos
  lexicon: HALOT
  rationale: חִצִּים designa flechas; en español, «flechas» es el equivalente más natural y preciso para conservar la imagen comparativa del hebreo.
- source_word: בְּ/יַד
  english_pob_choice: in the hand of
  chosen_spanish: en la mano de
  alternatives_spanish:
  - en manos de
  lexicon: HALOT
  rationale: La construcción con בְּ + יָד expresa posesión o control. «En la mano de» mantiene esa imagen concreta y corresponde bien al singular hebreo.
- source_word: גִּבּוֹר
  english_pob_choice: a warrior
  chosen_spanish: un guerrero
  alternatives_spanish:
  - un hombre poderoso
  - un héroe
  lexicon: HALOT
  rationale: גִּבּוֹר aquí refiere a un hombre fuerte y capaz de combatir. «Guerrero» preserva la fuerza militar de la imagen mejor que opciones más amplias o menos específicas.
- source_word: כֵּן
  english_pob_choice: so are
  chosen_spanish: así son
  alternatives_spanish:
  - así también son
  - de igual modo son
  lexicon: HALOT
  rationale: כֵּן introduce la conclusión del símil. «Así son» transmite de forma natural la relación comparativa en español sin perder la estructura proverbial.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los hijos varones de
  - los hijos de
  lexicon: HALOT
  rationale: El hebreo es masculino plural en constructo. En español, «hijos» puede conservar la referencia masculina y funciona con naturalidad, sin borrar la marca gramatical del original.
- source_word: הַ/נְּעוּרִים
  english_pob_choice: one's youth
  chosen_spanish: la juventud
  alternatives_spanish:
  - los años de la juventud
  - la niñez
  lexicon: HALOT
  rationale: נְעוּרִים denota juventud o años juveniles. «La juventud» expresa bien el genitivo de manera idiomática en español y deja abierta la lectura de hijos nacidos en esa etapa.
theological_decisions:
- issue: Expresión masculina en בְּנֵי הַנְּעוּרִים
  english_pob_reading: the sons of one's youth
  chosen_spanish_reading: los hijos de la juventud
  alternative_spanish_readings:
  - los hijos nacidos en la juventud
  - los hijos de los años jóvenes
  rationale: Se conserva el masculino plural del hebreo, sin neutralizarlo. Al mismo tiempo, la formulación española deja la posibilidad idiomática de entenderlos como hijos nacidos durante la juventud, que es la tensión señalada por el audit trail inglés.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El inglés POB revisó la frase de 'sons of youth' a 'sons of one's youth' para hacer más natural el genitivo. La versión española sigue ese ajuste semántico con «los hijos de la juventud», manteniendo la posibilidad idiomática indicada por la nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma habitual del proyecto solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se evitó «Cristo» y términos teológicos no presentes en el verso.
  - «Guerrero» se eligió por coherencia con la imagen bélica explícita de flechas en la mano.
  - La nota al pie conserva la alternativa idiomática sin debilitar el sentido literal del texto.
