- from: No opriman a la viuda[a], al huérfano[b], al forastero residente[c] ni al pobre, y no maquin[en] mal en su corazón unos contra otros[d].
  to: No opriman a la viuda, al huérfano[a], al forastero residente[b] ni al pobre, y no maquinen mal en sus corazones unos contra otros[c].
  rationale: Se corrige un error editorial evidente ('maquin[en]' → 'maquinen'), se ajusta el plural de בִּלְבַבְכֶם con 'en sus corazones', y se elimina la nota mal anclada sobre 'opriman'. Se conservan las decisiones léxicas principales del borrador porque son fieles al hebreo y al razonamiento del POB, con notas solo donde añaden valor real.
