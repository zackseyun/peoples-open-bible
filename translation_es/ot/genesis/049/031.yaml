review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: el adverbio locativo repetido («allí»), los verbos activos «enterraron / enterré», y la secuencia de Abraham/Sara, Isaac/Rebeca y Lea. Sin embargo, introduce dos matices no presentes en la fuente: la puntuación con comas en «Sara, su esposa» y «Rebeca, su esposa» suena más parentética que atributiva, y «enterré yo» añade un énfasis pronominal innecesario frente al simple 1cs hebreo.'
  spanish_quality_summary: 'El español es claro y natural, pero puede afinarse para sonar más fluido y más cercano a la estructura original: «Sara su esposa» y «Rebeca su esposa» funcionan mejor sin comas, y «yo enterré» o simplemente «enterré» evita una torsión marcada. También conviene mantener el paralelismo de la lista con una formulación más directa.'
  glossary_alignment: No hay términos de glosario sensibles en este versículo aparte de nombres propios. «Sara», «Rebeca» y «Lea» son formas españolas aceptables. «Enterraron» preserva bien la repetición de קבר. No hay conflictos con terminología teológica del proyecto.
  issues:
  - severity: medium
    issue: Comas en «Sara, su esposa» y «Rebeca, su esposa»
    rationale: 'El hebreo presenta un complemento atributivo sencillo («Sarah his wife», «Rebekah his wife»), no una aposición explicativa marcada. En español, sin comas se preserva mejor la estructura y se lee con más naturalidad bíblica: «Sara su esposa».'
  - severity: low
    issue: Énfasis innecesario en «enterré yo»
    rationale: קָבַרְתִּי ya expresa la primera persona; añadir «yo» pospuesto introduce un énfasis pragmático no exigido por la fuente. Una forma más llana como «yo enterré» o simplemente «enterré» es preferible; «yo enterré» además mantiene contraste ligero con «enterraron».
  revised_spanish_text: Allí enterraron a Abraham y a Sara su esposa; allí enterraron a Isaac y a Rebeca su esposa; y allí yo enterré a Lea.
  revision_rationale: Se quitaron las comas para reflejar mejor la relación atributiva de «su esposa» en el hebreo y se ajustó «enterré yo» a «yo enterré» para evitar un énfasis pospuesto poco natural, manteniendo a la vez la primera persona explícita y el paralelismo narrativo.
