revisions:
- from: y mató a reyes poderosos, porque para siempre es su amor leal.
  to: y mató a reyes poderosos[a], porque su amor leal[b] permanece para siempre.
  rationale: Se conserva el sentido del hebreo y la decisión léxica principal, pero se corrige el estribillo para que suene natural en español y exprese mejor la duración continua implícita en la fórmula repetida del salmo. Se añaden notas léxicas útiles para reflejar alternativas documentadas sin sobrecargar el texto principal.
