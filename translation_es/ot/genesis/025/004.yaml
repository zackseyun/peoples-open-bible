translation:
  language: es
  text: Y los hijos de Madián fueron Efa, Efer, Hanoc[a], Abida y Eldaa. Todos estos fueron los hijos de Cetura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "Hanoc"; la forma tradicional en algunas versiones es "Enoc".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los descendientes de
  - Y los hijos varones de
  lexicon: HALOT
  rationale: En un contexto genealógico, בְּנֵי se traduce de forma más natural y precisa como 'hijos'. 'Descendientes' suaviza el parentesco directo que el hebreo presenta, y 'hijos varones' resulta innecesariamente pesado en español.
- source_word: מִדְיָן
  english_pob_choice: Midian
  chosen_spanish: Madián
  alternatives_spanish:
  - Midian
  lexicon: HALOT
  rationale: Nombre propio bíblico; en español bíblico estándar la forma tradicional y reconocible es 'Madián'. Mantiene transparencia sin depender de una transliteración demasiado inglesa.
- source_word: עֵיפָה
  english_pob_choice: Ephah
  chosen_spanish: Efá
  alternatives_spanish:
  - Efa
  lexicon: HALOT
  rationale: Nombre propio. 'Efá' refleja bien la vocalización hebrea y evita la asociación automática con medidas de volumen que podría sugerir 'efa' en español.
- source_word: וָעֵפֶר
  english_pob_choice: Epher
  chosen_spanish: Éfer
  alternatives_spanish:
  - Efer
  lexicon: HALOT
  rationale: Nombre propio. La tilde ayuda a conservar la acentuación natural en español y a distinguirlo de otras formas parecidas; sigue de cerca la forma hebrea.
- source_word: וַחֲנֹךְ
  english_pob_choice: Hanoch
  chosen_spanish: Hanoc
  alternatives_spanish:
  - Hanoj
  - Enoc
  lexicon: HALOT
  rationale: Se preserva la forma del nombre hebreo חֲנוֹךְ sin sustituirlo por el tradicional 'Enoc', que puede confundirlo con otras figuras bíblicas. 'Hanoc' mantiene la cercanía fonética con el hebreo y la decisión del POB inglés de evitar la forma tradicional cuando oscurece la identificación.
- source_word: וַאֲבִידָע
  english_pob_choice: Abida
  chosen_spanish: Abidá
  alternatives_spanish:
  - Abida
  lexicon: HALOT
  rationale: Nombre propio. La acentuación española final ('Abidá') conserva la pronunciación natural y distingue el nombre dentro de la serie genealógica.
- source_word: וְאֶלְדָּעָה
  english_pob_choice: Eldaah
  chosen_spanish: Eldaá
  alternatives_spanish:
  - Eldaa
  lexicon: HALOT
  rationale: Nombre propio. Se conserva el final abierto del hebreo con una forma española fluida; la doble vocal se representa como hiato marcado por tilde.
- source_word: כָּל אֵלֶּה
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Todas estas
  - Todos ellos
  lexicon: HALOT
  rationale: Reproduce de manera directa el sumario colectivo del hebreo. 'Todos estos' mantiene la referencia al conjunto de nombres enumerados y funciona de forma natural en español.
- source_word: בְּנֵי קְטוּרָה
  english_pob_choice: were the sons of Keturah
  chosen_spanish: fueron los hijos de Cetura
  alternatives_spanish:
  - eran los hijos de Cetura
  - pertenecían a Cetura
  lexicon: HALOT
  rationale: Se mantiene la fórmula genealógica 'hijos de' para conservar la estructura del hebreo. 'Cetura' es la forma habitual en español bíblico; 'fueron' corresponde al cierre identificador de la cláusula.
translation_notes:
  revision_awareness: Traducción revisada a partir del texto hebreo masorético (WLC) y del audit trail inglés; no se requieren cambios según el estado de revisión más reciente, y la presente propuesta conserva la transparencia genealógica y la preferencia del POB por formas que reflejan mejor el hebreo.
  spanish_consistency_notes:
  - Se mantiene el estilo genealógico breve y enumerativo del hebreo.
  - Se evita sustituir nombres propios por formas tradicionales cuando eso podría borrar la proximidad al original; aun así, se usan exónimos españoles bien establecidos cuando no afectan la identificación.
  - La nota al pie preserva la alternativa tradicional documentada en el POB inglés para Hanoc/Enoc.
