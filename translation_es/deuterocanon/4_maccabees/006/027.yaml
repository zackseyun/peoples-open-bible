translation:
  language: es
  text: 'Tú lo sabes[a], oh Dios: aunque me es posible salvarme, estoy muriendo en tormentos ardientes por causa de la ley[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sabes bien’.
    reason: lexical_alternative
  - marker: b
    text: O ‘por la ley’ o ‘por causa de la ley’. La referencia es a la fidelidad perseverante a la Ley mosaica bajo persecución.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σὺ οἶσθα
  english_pob_choice: You know
  chosen_spanish: Tú lo sabes
  alternatives_spanish:
  - Tú sabes
  - Tú bien lo sabes
  lexicon: LSJ
  rationale: El griego usa pronombre enfático y verbo de conocimiento directo. En español, ‘Tú lo sabes’ conserva la fuerza de apelación en oración y el tono inmediato del original sin sonar artificial.
- source_word: θεέ
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh, Dios
  lexicon: LSJ
  rationale: Es un vocativo en oración directa; ‘oh Dios’ reproduce esa apelación solemne de manera natural en español.
- source_word: παρὸν μοι
  english_pob_choice: though it is possible for me
  chosen_spanish: aunque me es posible
  alternatives_spanish:
  - aunque está a mi alcance
  - aunque tengo posibilidad
  lexicon: LSJ
  rationale: La frase expresa que una salida permanece abierta al hablante. ‘Aunque me es posible’ conserva el valor concesivo y la idea de posibilidad real sin ampliar el sentido.
- source_word: σῴζεσθαι
  english_pob_choice: to be saved
  chosen_spanish: ser salvo
  alternatives_spanish:
  - ser librado
  - ser preservado
  - escapar con vida
  lexicon: LSJ
  rationale: En este contexto la referencia primaria es la preservación física o liberación de la muerte/tortura. ‘Ser salvo’ mantiene la cercanía lexical con el griego y la resonancia solemne, sin imponer de antemano un sentido doctrinal más amplio.
- source_word: βασάνοις καυστικαῖς
  english_pob_choice: in burning torments
  chosen_spanish: en tormentos ardientes
  alternatives_spanish:
  - en torturas ardientes
  - en tormentos de fuego
  - bajo torturas ardientes
  lexicon: LSJ
  rationale: βασάνοις denota tormentos/torturas, y καυστικαῖς añade la cualidad de quemante o ardiente. ‘Tormentos ardientes’ comunica ambas ideas con naturalidad en español.
- source_word: ἀποθνῄσκω
  english_pob_choice: I am dying
  chosen_spanish: muero
  alternatives_spanish:
  - estoy muriendo
  - estoy muriendo ya
  lexicon: LSJ
  rationale: El presente griego es vívido e inmediato. En español, el presente simple ‘muero’ puede expresar esa inmediatez martirial de forma sobria y directa.
- source_word: διὰ τὸν νόμον
  english_pob_choice: because of the law
  chosen_spanish: por causa de la ley
  alternatives_spanish:
  - a causa de la ley
  - por fidelidad a la ley
  - por la ley
  lexicon: LSJ
  rationale: La preposición διά con acusativo indica causa u ocasión. ‘Por causa de la ley’ refleja la relación causal de manera fiel y suficientemente clara, sin cerrar la posible implicación de fidelidad perseverante al mandamiento.
theological_decisions:
- issue: Sentido de σῴζεσθαι en un contexto de martirio
  english_pob_reading: physical rescue/preservation is primary, rendered as 'to be saved'
  chosen_spanish_reading: la preservación o liberación física es primaria, rendida como 'ser salvo'
  alternative_spanish_readings:
  - ser librado
  - escapar con vida
  - ser preservado
  rationale: El contexto inmediato contrasta una salida de rescate todavía disponible con la muerte sufrida por fidelidad. No conviene forzar aquí un sentido plenamente soteriológico; sin embargo, ‘ser salvo’ preserva la tensión lexical y su resonancia bíblica.
  doctrine_reference: Principio de primacía del texto fuente; mantener la tensión lexical y no resolverla en una sola lectura teológica
- issue: Fuerza de διὰ τὸν νόμον en relación con la fidelidad de pacto
  english_pob_reading: causal commitment to the Jewish law, rendered 'because of the law'
  chosen_spanish_reading: causalidad por fidelidad a la ley, rendida 'por causa de la ley'
  alternative_spanish_readings:
  - a causa de la ley
  - por fidelidad a la ley
  rationale: La frase presenta el martirio como resultado de lealtad a la ley mosaica. ‘Por causa de la ley’ es cercano al griego y no añade explicación doctrinal innecesaria, aunque deja abierta la implicación de fidelidad.
  doctrine_reference: Equivalencia óptima; no importar más de lo que el texto explícitamente afirma
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el griego y con el audit trail inglés. Se mantiene la tensión entre rescate físico posible y muerte real por fidelidad, sin convertirla en una paráfrasis doctrinal. No se requieren revisiones adicionales respecto del último pase auditado.
  spanish_consistency_notes:
  - Se mantuvo ‘ley’ para τὸν νόμον, en coherencia con el contexto macabeo y con el audit trail inglés.
  - ‘Ser salvo’ conserva la cercanía lexical con σῴζεσθαι, mientras la nota aclara el sentido de rescate físico.
  - Se usó ‘tormentos ardientes’ para reflejar tanto βασάνοις como καυστικαῖς sin sobrecargar el español.
  - El vocativo ‘oh Dios’ conserva el tono de oración directa del griego.
