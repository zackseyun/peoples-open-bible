translation:
  language: es
  text: Señor Yahvé[a], tú has comenzado a mostrar a tu siervo tu grandeza y tu mano fuerte. Porque, ¿qué dios hay en los cielos o en la tierra que haga obras como tus obras y hechos poderosos como los tuyos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ʾadonay YHWH. El texto principal conserva tanto el título de soberanía como el nombre divino: “Señor Yahvé”.'
    reason: source_note
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: O Lord Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor Yahvé
  - Señor Dios
  lexicon: HALOT
  rationale: El hebreo combina un título de soberanía (ʾadonay) con el nombre divino YHWH. En español, el POB ya decidió representar el nombre propio divino como “Yahvé”; aquí, por tratarse de una invocación directa y breve, “Yahvé” comunica con claridad el nombre del pacto sin duplicar títulos de manera pesada. Mantengo la tensión reverencial del vocativo sin sustituirlo por “SEÑOR”.
- source_word: הַחִלּוֹתָ
  english_pob_choice: you have begun
  chosen_spanish: has comenzado
  alternatives_spanish:
  - comenzaste
  - has empezado
  lexicon: HALOT
  rationale: El perfecto hifil expresa una acción ya iniciada con relevancia actual. “Has comenzado” conserva bien ese valor y suena natural en español orante.
- source_word: לְהַרְאוֹת
  english_pob_choice: to show
  chosen_spanish: mostrar
  alternatives_spanish:
  - hacer ver
  - dejar ver
  lexicon: HALOT
  rationale: El hifil de ראה significa ‘mostrar’ o ‘hacer ver’. “Mostrar” es la opción más directa y idiomática en español.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: El POB inglés eligió “servant”, pero también dejó abierta la fuerza de subordinación del lexema. En español, “esclavo” preserva mejor la carga lexical de עבד cuando se dirige a Dios en dependencia total, y evita suavizar indebidamente la relación al convertirla en un término eclesiástico más general como “siervo”.
- source_word: גָּדְלְךָ
  english_pob_choice: your greatness
  chosen_spanish: tu grandeza
  alternatives_spanish:
  - tu majestad
  - tu magnitud
  lexicon: HALOT
  rationale: El sustantivo expresa grandeza, magnitud o majestad. “Grandeza” reproduce de forma directa el paralelo con la siguiente frase.
- source_word: יָדְךָ הַחֲזָקָה
  english_pob_choice: your strong hand
  chosen_spanish: tu mano fuerte
  alternatives_spanish:
  - tu mano poderosa
  - tu mano poderosa y fuerte
  lexicon: HALOT
  rationale: La expresión es un idiomático de poder divino en acción. “Mano fuerte” sigue de cerca el hebreo y mantiene la imagen corporal tradicional sin convertirla en una paráfrasis abstracta.
- source_word: מִי אֵל
  english_pob_choice: what god is there
  chosen_spanish: ¿qué dios hay
  alternatives_spanish:
  - ¿quién es un dios
  - ¿qué dios existe
  lexicon: HALOT
  rationale: La pregunta retórica compara cualquier deidad posible con Yahvé. “¿Qué dios hay?” conserva la fuerza interrogativa y la comparación implícita sin sobreexplicar.
- source_word: בַּשָּׁמַיִם וּבָאָרֶץ
  english_pob_choice: in heaven or on earth
  chosen_spanish: en los cielos o en la tierra
  alternatives_spanish:
  - en el cielo o en la tierra
  - en los cielos y en la tierra
  lexicon: HALOT
  rationale: “Cielos” respeta el plural hebreo y la fórmula bíblica amplia el alcance cósmico del contraste. “O” mantiene bien la pregunta retórica del inglés POB.
- source_word: יַעֲשֶׂה
  english_pob_choice: can do
  chosen_spanish: haga
  alternatives_spanish:
  - hará
  - pueda hacer
  lexicon: HALOT
  rationale: Aunque el inglés POB expresó capacidad con “can do”, el hebreo usa un imperfecto dentro de una pregunta retórica. En español, la subordinada con subjuntivo (“que haga”) reproduce de manera natural la idea de poder o posibilidad en este contexto.
- source_word: כְמַעֲשֶׂיךָ
  english_pob_choice: deeds like your deeds
  chosen_spanish: obras como tus obras
  alternatives_spanish:
  - hechos como tus hechos
  - acciones como tus acciones
  lexicon: HALOT
  rationale: מַעֲשֶׂה puede ser ‘obra’, ‘hecho’ o ‘acto’. “Obras” es una equivalencia sobria y bíblicamente reconocible, y permite conservar el paralelismo con la siguiente hemistiquio.
- source_word: וְכִגְבוּרֹתֶיךָ
  english_pob_choice: and mighty acts like yours
  chosen_spanish: y hechos poderosos como los tuyos
  alternatives_spanish:
  - y actos poderosos como los tuyos
  - y proezas como las tuyas
  lexicon: HALOT
  rationale: גְבוּרֹת denota actos de poder, hazañas o demostraciones de fuerza. “Hechos poderosos” preserva el paralelo con “obras” y mantiene una resonancia semítica más directa que una paráfrasis más libre.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH en combinación con אֲדֹנָי
  english_pob_reading: O Lord Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor Yahvé
  - Señor Dios
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Según la práctica del POB en español, el nombre propio divino se representa como “Yahvé”, evitando la convención de ocultarlo con “SEÑOR”. En esta invocación, usar solo “Yahvé” es suficientemente reverente y evita una duplicación artificial en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; translation policy on original-language primacy and transparent divine-name rendering'
- issue: Valor de עַבְדְּךָ en oración dirigida a Dios
  english_pob_reading: your servant
  chosen_spanish_reading: tu esclavo
  alternative_spanish_readings:
  - tu siervo
  - tu servidor
  rationale: La relación expresada por עבד incluye dependencia y pertenencia de pacto. “Esclavo” conserva la dureza lexical que el inglés POB no quiso intensificar en exceso, pero que en español ayuda a no diluir el término en una fórmula devocional suavizada. No pretende introducir una doctrina nueva, sino reflejar el peso del vocablo hebreo.
  doctrine_reference: 'DOCTRINE.md: lexical force of עבד; translation philosophy on preserving tension where source-language status language is present'
translation_notes:
  revision_awareness: 'El inglés POB pasó de “O Lord GOD” a “O Lord Yahweh” en una revisión posterior, confirmando que el nombre divino debía aparecer de forma explícita y no mediante una convención de reemplazo. La presente versión española sigue esa revisión y la adapta al estándar del proyecto en español: “Yahvé”.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como representación del nombre divino, en coherencia con el estándar español del POB.
  - Se conserva el paralelismo hebreo con “obras / hechos poderosos” sin mezclar registros más interpretativos.
  - Se traduce עבד como “esclavo” por consistencia léxica y para no suavizar el status language del original.
  - La pregunta retórica se vuelve natural en español con “¿qué dios hay...?” sin perder el valor comparativo del hebreo.
