base_translation:
  language: en
  yaml_path: translation/ot/1_kings/002/029.yaml
  text: And it was reported to King Solomon that Joab had fled to the tent of Yahweh[a], and behold, he was beside the altar. So Solomon sent Benaiah son of Jehoiada, saying, “Go[b], strike him down.”
  footnotes:
  - marker: a
    text: Or “tabernacle of the LORD.” The Hebrew says “tent of the LORD.”
    reason: lexical_alternative
  - marker: b
    text: Or “Go, fall upon him” / “Go, attack him.” The Hebrew verb can denote striking or assaulting; here it carries the sense of a lethal blow in context.
    reason: lexical_alternative
