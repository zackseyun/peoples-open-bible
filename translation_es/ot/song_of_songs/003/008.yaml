translation:
  language: es
  text: Todos ellos empuñan espadas, entrenados para la guerra; cada hombre lleva su espada junto al muslo, a causa del terror en las noches[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por las noches». El hebreo dice literalmente «en las noches», una expresión plural que puede intensificar poéticamente la idea de peligro nocturno.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּם
  english_pob_choice: All of them
  chosen_spanish: Todos ellos
  alternatives_spanish:
  - Todos
  - Todos ellos
  lexicon: HALOT
  rationale: El sufijo pronominal hace explícito el sentido colectivo. «Todos ellos» preserva la totalidad del grupo con español natural y claro.
- source_word: אֲחֻזֵי חֶרֶב
  english_pob_choice: are holding swords
  chosen_spanish: llevan espada
  alternatives_spanish:
  - sujetan espada
  - van armados con espada
  - están sosteniendo espadas
  lexicon: HALOT
  rationale: La construcción participial comunica portar/empunar armas. «Llevan espada» suena natural en español y conserva la imagen de hombres armados; se usa singular colectivo en español como equivalente idiomático.
- source_word: מְלֻמְּדֵי מִלְחָמָה
  english_pob_choice: trained in warfare
  chosen_spanish: adiestrados en la guerra
  alternatives_spanish:
  - entrenados para la guerra
  - experimentados en la guerra
  lexicon: HALOT
  rationale: El participio de למד expresa formación o adiestramiento. «Adiestrados en la guerra» preserva el valor de entrenamiento y mantiene el sustantivo amplio מִלְחָמָה como «guerra».
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - todo hombre
  lexicon: HALOT
  rationale: El singular distributivo después de un colectivo plural se refleja bien con «cada hombre», que mantiene el matiz masculino singular del hebreo y la distribución individual.
- source_word: חַרְבּוֹ עַל יְרֵכוֹ
  english_pob_choice: has his sword at his thigh
  chosen_spanish: lleva su espada junto al muslo
  alternatives_spanish:
  - tiene su espada al muslo
  - lleva su espada sobre el muslo
  - lleva su espada al costado
  lexicon: HALOT
  rationale: La frase evoca un arma sujeta a la cadera/muslo. «Junto al muslo» conserva la proximidad corporal sin sonar forzado en español, y mantiene la imagen de portación lista.
- source_word: מִפַּחַד
  english_pob_choice: because of terror
  chosen_spanish: a causa del terror
  alternatives_spanish:
  - por temor
  - a causa del miedo
  - por terror
  lexicon: HALOT
  rationale: La preposición causal מִן exige una causalidad explícita. «Terror» transmite mejor la intensidad de פַּחַד en este contexto que «miedo».
- source_word: בַּלֵּילוֹת
  english_pob_choice: in the nights
  chosen_spanish: en las noches
  alternatives_spanish:
  - de noche
  - por las noches
  - en la noche
  lexicon: HALOT
  rationale: Se preserva el plural hebreo como «las noches», siguiendo el valor poético/intensivo documentado en el POB inglés. «En las noches» mantiene esa pluralidad y sugiere peligro nocturno recurrente.
translation_notes:
  revision_awareness: 'Coincide con el apunte revisado del POB inglés: no se requieren cambios sustantivos y se mantiene la lectura alta de concordancia. La traducción conserva el plural hebreo de «las noches» y la imaginería de portación de espada sin suavizar el tono militar del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa vocabulario militar directo («espada», «guerra», «terror») para no diluir el tono del hebreo.
  - La nota al pie reproduce la alternativa documentada en el audit trail inglés sobre el plural «las noches».
