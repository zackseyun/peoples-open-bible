translation:
  language: es
  text: Seguí mirando en las visiones de la noche, y he aquí, con las nubes del cielo[b] venía uno como un hijo de hombre[a]; llegó hasta el Anciano de Días, y lo acercaron ante él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «uno como un ser humano». El arameo dice literalmente «como un hijo de hombre», una expresión que puede referirse a una figura humana y que después llega a ser un título mesiánico significativo en la interpretación bíblica.'
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, «sobre las nubes del cielo». La preposición aramea aquí es «con», que puede describir acompañamiento más que movimiento sobre las nubes.
    reason: alternative_reading
lexical_decisions:
- source_word: חָזֵה הֲוֵית
  english_pob_choice: I kept looking
  chosen_spanish: Seguí mirando
  alternatives_spanish:
  - Estuve mirando
  - Miraba
  lexicon: HALOT
  rationale: La construcción verbal expresa acción continua en pasado. «Seguí mirando» conserva bien el valor durativo sin sonar forzado en español.
- source_word: בְּחֶזְוֵי לֵילְיָא
  english_pob_choice: in the visions of the night
  chosen_spanish: en las visiones de la noche
  alternatives_spanish:
  - en las visiones nocturnas
  - en visiones de noche
  lexicon: HALOT
  rationale: Se mantiene el plural «visiones» y la relación genitiva con «noche», de modo más cercano al arameo que una adaptación más idiomática pero menos precisa.
- source_word: וַאֲרוּ
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y entonces
  lexicon: HALOT
  rationale: Es una fórmula deíctica que introduce un giro visual llamativo. «Y he aquí» preserva el tono apocalíptico y la fuerza de la aparición.
- source_word: עִם עֲנָנֵי שְׁמַיָּא
  english_pob_choice: with the clouds of heaven
  chosen_spanish: con las nubes del cielo
  alternatives_spanish:
  - con las nubes de los cielos
  - sobre las nubes del cielo
  lexicon: HALOT
  rationale: Se mantiene «con» porque el preposición aramea es עִם, no «sobre». «Del cielo» conserva el genitivo simple y el registro natural en español.
- source_word: כְּבַר אֱנָשׁ
  english_pob_choice: one like a son of man
  chosen_spanish: uno como un hijo de hombre
  alternatives_spanish:
  - uno como un ser humano
  - uno como un hombre
  lexicon: HALOT
  rationale: Se conserva la comparación literal y la expresión formal «hijo de hombre», que refleja de cerca el arameo y mantiene la tensión interpretativa y la carga bíblica posterior. En español, «uno como un hijo de hombre» es más fiel al sintagma que una paráfrasis antropológica.
- source_word: אָתֵה הֲוָה
  english_pob_choice: was coming
  chosen_spanish: venía
  alternatives_spanish:
  - estaba viniendo
  - iba viniendo
  lexicon: HALOT
  rationale: El valor aspectual es progresivo. «Venía» es la forma española más natural para expresar ese avance continuo en la escena visionaria.
- source_word: וְעַד עַתִּיק יוֹמַיָּא
  english_pob_choice: to the Ancient of Days
  chosen_spanish: hasta el Anciano de Días
  alternatives_spanish:
  - ante el Anciano de Días
  - al Anciano de Días
  lexicon: HALOT
  rationale: «Anciano de Días» es la equivalencia estable del título arameo. «Hasta» reproduce el movimiento direccional de la preposición sin sobreexplicar.
- source_word: מְטָה
  english_pob_choice: he came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: Después del progresivo «venía», el aoristo narrativo se expresa de forma natural con «llegó» en español.
- source_word: וּקְדָמוֹהִי
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: «Delante de él» es claro y conserva la idea espacial de presentación en la presencia del Anciano de Días.
- source_word: הַקְרְבוּהִי
  english_pob_choice: they brought him near
  chosen_spanish: lo acercaron
  alternatives_spanish:
  - lo presentaron
  - lo llevaron cerca
  lexicon: HALOT
  rationale: El causativo conserva la idea de acercar a alguien. «Lo acercaron» mantiene el sujeto implícito plural sin convertir la frase en pasiva ni introducir más contenido del que da el arameo.
theological_decisions:
- issue: Expresión כְּבַר אֱנָשׁ en un contexto visionario de alta carga interpretativa
  english_pob_reading: one like a son of man
  chosen_spanish_reading: uno como un hijo de hombre
  alternative_spanish_readings:
  - uno como un ser humano
  - uno como un hombre
  rationale: Se conserva la forma comparativa y el giro bíblico tradicional, sin reducirlo a un antropónimo genérico. La traducción deja abierta la tensión interpretativa presente en el texto y en su recepción posterior.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Preposición עִם en la frase «with the clouds of heaven»
  english_pob_reading: with the clouds of heaven
  chosen_spanish_reading: con las nubes del cielo
  alternative_spanish_readings:
  - sobre las nubes del cielo
  rationale: Se respeta la preposición aramea «con», evitando importar la lectura tradicional de «sobre» al texto principal. La lectura alternativa puede anotarse por su peso en la tradición interpretativa, pero no desplaza el valor de la fuente.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El borrador sigue de cerca el acuerdo alto del expediente inglés y no introduce revisiones sustantivas. Se conserva la principal decisión filológica sobre עִם («con») y la comparación de כְּבַר אֱנָשׁ, con equivalentes españoles naturales y auditables.
  spanish_consistency_notes:
  - Se mantiene «Anciano de Días» como título fijo y no se sustituye por una paráfrasis.
  - Se usa «nubes del cielo» para conservar la imaginería del texto y evitar calcos excesivamente duros.
  - «Uno como un hijo de hombre» preserva la tensión entre literalidad y resonancia bíblica sin normalizarla a un simple «ser humano».
  - La progresión verbal se expresa con «seguí mirando» y «venía», coherente con el valor durativo del arameo.
