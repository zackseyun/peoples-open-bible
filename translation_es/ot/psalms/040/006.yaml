translation:
  language: es
  text: 'Has hecho muchas cosas, Yahvé mi Dios: tus maravillas y tus planes[a] para nosotros; nadie puede compararse contigo. Declararía y hablaría de ellas, pero son demasiadas para contarlas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tus pensamientos hacia nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבּוֹת
  english_pob_choice: many things
  chosen_spanish: muchas cosas
  alternatives_spanish:
  - muchas
  - grandes cosas
  lexicon: HALOT
  rationale: El hebreo presenta una expresión adverbial/plural de abundancia. En español, 'muchas cosas' comunica de modo natural la multiplicidad de las acciones divinas sin perder el énfasis en la cantidad.
- source_word: עָשִׂיתָ
  english_pob_choice: you have done
  chosen_spanish: has hecho
  alternatives_spanish:
  - hiciste
  - has realizado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa actos completados con vigencia en la memoria orante. 'Has hecho' mantiene ese valor resultativo y suena natural en español moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino, conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios mío
  lexicon: HALOT
  rationale: La construcción posesiva directa transmite el vocativo personal del salmista de manera clara y fiel.
- source_word: נִפְלְאוֹתֶיךָ
  english_pob_choice: your wonders
  chosen_spanish: tus maravillas
  alternatives_spanish:
  - tus obras maravillosas
  - tus prodigios
  lexicon: HALOT
  rationale: נִפְלְאוֹת designa actos maravillosos/prodigiosos. 'Maravillas' es breve, bíblico y suficientemente preciso en español.
- source_word: וּמַחְשְׁבֹתֶיךָ אֵלֵינוּ
  english_pob_choice: and your plans for us
  chosen_spanish: y tus planes para nosotros
  alternatives_spanish:
  - y tus pensamientos hacia nosotros
  - y tus intenciones para nosotros
  lexicon: HALOT
  rationale: מַחְשְׁבוֹת puede significar pensamientos, planes o intenciones. Siguiendo la lectura auditada, 'planes para nosotros' expresa bien la orientación benévola y deliberada del texto sin imponer un sistema doctrinal adicional.
- source_word: אֵין עֲרֹךְ אֵלֶיךָ
  english_pob_choice: none can compare with you
  chosen_spanish: nadie puede compararse contigo
  alternatives_spanish:
  - no hay quien se compare contigo
  - nadie puede ponerse a tu altura
  lexicon: HALOT
  rationale: El hebreo expresa incomparabilidad. 'Nadie puede compararse contigo' es una formulación idiomática natural en español y preserva la fuerza del giro.
- source_word: אַגִּידָה וַאֲדַבֵּרָה
  english_pob_choice: I would declare and speak
  chosen_spanish: Yo querría anunciar y hablar
  alternatives_spanish:
  - Declararía y hablaría
  - Yo declararía y hablaría
  lexicon: HALOT
  rationale: Las formas cohortativas funcionan aquí con matiz volitivo/condicional en el contexto. 'Yo querría' refleja esa intención no consumada sin volverla una simple afirmación futura.
- source_word: עָצְמוּ
  english_pob_choice: they are too many
  chosen_spanish: son demasiadas
  alternatives_spanish:
  - se han multiplicado
  - son innumerables
  lexicon: HALOT
  rationale: En combinación con מִסַּפֵּר, el verbo indica que exceden la posibilidad de ser enumeradas. 'Son demasiadas' captura esa imposibilidad de recuento con naturalidad.
- source_word: מִסַּפֵּר
  english_pob_choice: to recount
  chosen_spanish: para contarlas
  alternatives_spanish:
  - para enumerarlas
  - para relatarlas
  lexicon: HALOT
  rationale: El complemento final con ספר apunta al acto de contarlas/relatarlas. 'Para contarlas' conserva el juego semántico con el verbo de número y relato de forma concisa.
theological_decisions:
- issue: Referencia de las מחשבות de Dios hacia el pueblo
  english_pob_reading: your plans for us
  chosen_spanish_reading: tus planes para nosotros
  alternative_spanish_readings:
  - tus pensamientos hacia nosotros
  - tus intenciones para nosotros
  rationale: Se mantiene la lectura de propósito benevolente sin convertirla en una formulación técnica sobre providencia o predestinación. La traducción conserva la tensión del hebreo entre pensamiento, intención y plan.
  doctrine_reference: Preservar la tensión lexical; no sobredeterminar la doctrina desde la traducción.
translation_notes:
  revision_awareness: 'Esta redacción sigue el último pase de revisión del inglés auditado: ''none can compare with you'' se refleja como ''nadie puede compararse contigo''; la relación adversativa antes del cierre se mantiene con una coma y ''pero'' implícito en la estructura contrastiva del español. También se evitó una traducción mecánica de las cohortativas, usando un matiz volitivo (''querría'') acorde con el hebreo.'
  spanish_consistency_notes:
  - Se conserva Yahvé según la terminología del proyecto.
  - '''Maravillas'' traduce נִפְלְאוֹת con estilo bíblico y comprensible.'
  - '''Planes para nosotros'' sigue la opción auditada y deja constancia de la alternativa literal en nota.'
  - El cierre 'son demasiadas para contarlas' reproduce la imposibilidad de enumeración sin añadir contenido ajeno al verso.
  - La nota al pie está anclada explícitamente en el texto con [a].
