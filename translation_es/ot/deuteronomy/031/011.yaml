review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y las decisiones del POB en casi todos los puntos: «cuando todo Israel venga», «presentarse delante de», «Yahvé», «tu Dios», «en el lugar que él escoja», «leerás esta ley» y «delante de todo Israel» son fieles y naturales. Sin embargo, la última frase no preserva el sentido de בְּאָזְנֵיהֶם, que significa específicamente audición pública («en oídos de ellos / para que lo oigan / a oídos de ellos»), no mera presencia física.'
  spanish_quality_summary: El español es claro y eclesialmente legible. La oración fluye bien, pero «en su presencia» introduce una imprecisión semántica y además duplica de forma innecesaria la idea ya expresada por «delante de todo Israel». Una fórmula como «de modo que lo oiga todo Israel» o «a oídos de ellos» preserva mejor el hebreo y suena natural.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה → «Yahvé» correctamente; el modismo לֵרָאוֹת אֶת־פְּנֵי se maneja bien con nota; הַתּוֹרָה הַזֹּאת → «esta ley» es aceptable según el rastro inglés. El único desajuste léxico significativo es בְּאָזְנֵיהֶם, que no debe aplanarse a «en su presencia».'
  issues:
  - severity: high
    issue: «en su presencia» no traduce fielmente בְּאָזְנֵיהֶם
    rationale: El hebreo expresa recepción auditiva de la lectura pública, literalmente «en sus oídos», idiomáticamente «en su oído / a oídos de ellos / para que lo oigan». «En su presencia» cambia el sentido de oír por el de estar presentes.
  - severity: medium
    issue: Redundancia semántica al combinar «delante de todo Israel» con «en su presencia»
    rationale: Neged ya aporta la idea de estar delante/en presencia de la asamblea. Repetir luego «en su presencia» no solo suena pesado, sino que oscurece el matiz auditivo del cierre hebreo.
  revised_spanish_text: cuando todo Israel venga para presentarse delante de Yahvé tu Dios en el lugar que él escoja[a], leerás esta ley delante de todo Israel, de modo que lo oiga.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «ver el rostro de Yahvé tu Dios», un modismo que significa presentarse en su presencia.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el cierre para reflejar el sentido auditivo de בְּאָזְנֵיהֶם con un español natural y claro: «de modo que lo oiga». Esto evita el falso sentido de mera presencia física y mantiene la función de lectura pública audible ante la asamblea. La nota existente sobre el modismo «ver el rostro» se conserva sin cambios.'
