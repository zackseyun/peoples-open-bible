  from: though he knew what would happen
  to: although he had told him what would happen
  rationale: The Ge'ez verb አይድዖ (ayde'o) is the causative form of አእመረ (to know), meaning 'he informed him' or 'he told him' (referring to Joseph telling the cupbearer). Translating it as 'he knew' misses the causative force and misidentifies the subject of the clause.
