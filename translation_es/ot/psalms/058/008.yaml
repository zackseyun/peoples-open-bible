- from: Hagan que se derritan como agua que se va[a]; cuando él doble su arco[b], que sus flechas sean como cortadas[c].
  to: Que se derritan como agua que se va[a]; cuando él tienda su arco, que sus flechas[b] sean como si estuvieran cortadas[c].
  rationale: Se corrige el inicio para reflejar el valor imprecatorio sin introducir un agente plural ajeno al hebreo; se mejora la naturalidad de la imagen del arco con 'tienda su arco'; se corrige la nota de singular/plural para que corresponda a 'flecha' y no a 'arco'; y se suaviza la última cláusula para un español más idiomático sin perder la incertidumbre léxica documentada.
