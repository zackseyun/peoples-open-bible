translation:
  language: es
  text: Y al oírlo, se indignó. Pero en cuanto lo oyó, inmediatamente levantó el campamento y fue a Ptolemaida, y escribió a Jonatán que no continuara el asedio[a], sino que fuera a encontrarse con él en Ptolemaida lo antes posible[b], para conferenciar con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, «no sentarse alrededor» o «no permanecer alrededor»; en este contexto, se refiere a mantener el asedio.
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final griega es textualmente algo torpe («encontrarse con él, reunirse con él»). La traducción expresa el sentido aparente: Jonatán es convocado a reunirse con el remitente en Ptolemaida para conferenciar.'
    reason: textual_variant
lexical_decisions:
- source_word: ἀκούσας / ἤκουσεν
  english_pob_choice: when he heard it / as soon as he heard
  chosen_spanish: al oírlo / en cuanto lo oyó
  alternatives_spanish:
  - cuando lo oyó
  - habiéndolo oído
  - al enterarse
  lexicon: LSJ
  rationale: 'La repetición del verbo de oír se conserva con dos giros naturales en español: primero introduce el reporte recibido y luego marca la inmediatez de la reacción.'
- source_word: ὠργίσθη
  english_pob_choice: he was angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se indignó
  - se enfureció
  - se irritó
  lexicon: LSJ
  rationale: Expresa con naturalidad el aoristo verbal sin añadir intensidad que el griego no exige necesariamente.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: en cuanto
  alternatives_spanish:
  - inmediatamente
  - al instante
  - sin demora
  lexicon: LSJ
  rationale: En esta construcción temporal, ‘en cuanto’ comunica bien la prontitud de la respuesta y suena más fluido que una repetición adverbial pesada.
- source_word: ἀναζεύξας
  english_pob_choice: broke camp
  chosen_spanish: levantó el campamento
  alternatives_spanish:
  - rompió el campamento
  - partió
  - se puso en marcha
  lexicon: LSJ
  rationale: En contexto militar, el participio denota la partida desde el campamento; ‘levantó el campamento’ conserva la imagen concreta y es idiomático en español bíblico contemporáneo.
- source_word: ἦλθεν εἰς Πτολεμαΐδα
  english_pob_choice: came to Ptolemais
  chosen_spanish: fue a Ptolemaida
  alternatives_spanish:
  - vino a Ptolemaida
  - llegó a Ptolemaida
  lexicon: LSJ
  rationale: ‘Fue a’ reproduce con claridad el movimiento hacia el destino, sin cargar el verbo con un matiz de llegada no explicitado por el griego.
- source_word: ἔγραψεν Ἰωναθὰν
  english_pob_choice: he wrote to Jonathan
  chosen_spanish: escribió a Jonatán
  alternatives_spanish:
  - envió aviso a Jonatán
  - escribió a Jonatán
  lexicon: LSJ
  rationale: El dativo se expresa de manera natural con ‘escribió a’. Se mantiene el nombre en forma castellana ‘Jonatán’.
- source_word: τοῦ μὴ περικαθῆσθαι
  english_pob_choice: not to continue the siege
  chosen_spanish: que no siguiera el sitio
  alternatives_spanish:
  - que no continuara el asedio
  - que no permaneciera sitiado alrededor
  - que no siguiera cercando
  lexicon: LSJ
  rationale: Se conserva el sentido militar de mantener un cerco. ‘Sitio’ es breve y claro; ‘seguir’ reproduce el valor de continuidad del infinitivo con μή.
- source_word: ἀπαντῆσαι
  english_pob_choice: to meet him
  chosen_spanish: lo encontrara
  alternatives_spanish:
  - saliera a su encuentro
  - lo ملاقاتara
  - se reuniera con él
  lexicon: LSJ
  rationale: En el contexto de una citación para conferencia, ‘encontrara’ funciona como verbo de encuentro sin sobreexplicar el matiz.
- source_word: αὐτὸν αὐτῷ συνμίσγειν
  english_pob_choice: to confer with him
  chosen_spanish: para conferenciar con él
  alternatives_spanish:
  - para tratar con él
  - para reunirse con él
  - para conversar con él
  lexicon: LSJ
  rationale: La cláusula griega es algo torpe; ‘conferenciar con él’ transmite el propósito de encuentro para tratar asuntos, manteniendo un registro digno y preciso.
- source_word: τὴν ταχίστην
  english_pob_choice: as quickly as possible
  chosen_spanish: lo antes posible
  alternatives_spanish:
  - con la mayor rapidez
  - cuanto antes
  - con toda rapidez
  lexicon: LSJ
  rationale: Equivale al superlativo adverbial de urgencia con una expresión natural en español contemporáneo.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés: se reflejó la oposición con ‘Pero’, se mantuvo la secuencia de movimiento inmediato, y se tradujo la frase final como una convocatoria a encontrarse y conferenciar, evitando una paráfrasis más interpretativa.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparezca el nombre divino; aquí no ocurre.
  - Se conserva ‘Ptolemaida’ como topónimo castellano estable.
  - Se mantiene ‘sitio’ para el cerco militar, coherente con el valor contextual de περικαθῆσθαι.
  - ‘Jonatán’ sigue la forma española habitual del nombre propio.
  - Las notas [a] y [b] están ancladas explícitamente en el texto para evitar marcadores huérfanos.
