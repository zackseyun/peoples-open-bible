translation:
  language: es
  text: Entonces los hijos de Judá pelearon contra Jerusalén[a] y la capturaron, y la pasaron a filo de espada, y prendieron fuego a la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Judá». Se conserva la expresión familiar/tribal del texto fuente, en vez de neutralizarla a «judaitas» o «gente de Judá». También puede entenderse «pelearon en Jerusalén», aunque el contexto favorece claramente «contra Jerusalén».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - los hombres de Judá
  - la gente de Judá
  lexicon: HALOT
  rationale: Conserva la filiación literal del hebreo sin neutralizarla, de modo coherente con la decisión auditada en inglés de mantener «sons». En español, «hijos de Judá» refleja con naturalidad la referencia tribal/colectiva.
- source_word: וַיִּלָּחֲמוּ ... בִּירוּשָׁלִַם
  english_pob_choice: fought against Jerusalem
  chosen_spanish: pelearon contra Jerusalén
  alternatives_spanish:
  - pelearon en Jerusalén
  - hicieron guerra contra Jerusalén
  lexicon: HALOT
  rationale: El contexto militar y los verbos siguientes muestran que Jerusalén es el objeto del ataque. «Pelearon contra» comunica la dirección hostil mejor que una lectura locativa de «en».
- source_word: וַיִּלְכְּדוּ אוֹתָהּ
  english_pob_choice: captured it
  chosen_spanish: la capturaron
  alternatives_spanish:
  - la tomaron
  - la apresaron
  lexicon: HALOT
  rationale: לכד se usa con frecuencia para la toma militar de una ciudad. «Capturaron» es claro y mantiene el sentido bélico sin añadir matices no presentes.
- source_word: וַיַּכּוּהָ לְפִי חָרֶב
  english_pob_choice: struck it with the edge of the sword
  chosen_spanish: la hirieron con filo de espada
  alternatives_spanish:
  - la golpearon con el filo de la espada
  - la pasaron a espada
  lexicon: HALOT
  rationale: El hebreo contiene el modismo «boca/filo de espada». En español, «con filo de espada» conserva la imagen; «hirieron» recoge היטבה el valor de נכה en contexto de combate. Se evita convertir todo el sentido en una frase idiomática menos transparente.
- source_word: וְאֶת הָעִיר שִׁלְּחוּ בָאֵשׁ
  english_pob_choice: they set the city on fire
  chosen_spanish: prendieron fuego a la ciudad
  alternatives_spanish:
  - la incendiaron
  - la quemaron con fuego
  lexicon: HALOT
  rationale: El hebreo expresa el envío/entrega a fuego; en español, «prender fuego a» es una equivalencia idiomática natural y fiel. «La ciudad» mantiene la referencia anafórica a Jerusalén.
translation_notes:
  revision_awareness: 'El texto base inglés fue revisado y quedó sin cambios, con concordancia alta entre fuentes. La presente propuesta sigue de cerca el hebreo y mantiene las mismas decisiones centrales: «hijos de Judá», ataque hostil contra Jerusalén, captura de la ciudad, herida/paso a espada y quema de la ciudad.'
  spanish_consistency_notes:
  - Se mantiene «Judá» y «Jerusalén» con ortografía española estándar.
  - Se evita «SEÑOR» porque no hay aquí el tetragrámaton ni una cita de κύριος.
  - Se usa pasado narrativo simple, adecuado para el relato bíblico en español.
  - La referencia anafórica de «la ciudad» queda suficientemente clara por el contexto inmediato.
