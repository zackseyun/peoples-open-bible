textual_note: 'Dialect and orthography: The saying is transmitted in Sahidic with
  Lycopolitan features. The repeated ⲁⲛⲧⲟ- chains (e.g., ⲁⲛⲧⲟϥϫⲓϥ, ⲁⲛⲧⲟϥⲁⲛⲁⲭⲱⲣⲉⲓ)
  reflect subject-resumptive morphology typical of Nag Hammadi scribal style and do
  not add extra semantic content beyond pronoun reference. Greek loans include ⲁⲅⲅⲉⲗⲟⲥ,
  ⲇⲓⲕⲁⲓⲟⲥ, ⲫⲓⲗⲟⲥⲟⲫⲟⲥ, ⲁⲛⲁⲭⲱⲣⲉⲓ, and ⲡⲡⲏⲅⲏ. Dilley’s printed text marks a minor restoration
  in the verb ⲉⲓⲛⲉ (‘be like’) early in the saying (bracketed letter), but the reading
  is secure. No lacunae affect sense. No POxy Greek fragment overlaps Saying 13.'
