revisions:
- from: Porque si confías en ella[a], la heredarás, y sus descendientes la poseerán.
  to: Porque iré con él disfrazada[a], y al principio lo probaré con pruebas.
  rationale: 'Se corrige el texto principal para que siga la lectura base actualmente adoptada en la auditoría: el hebreo divergente, no la antigua redacción griega. Se mantiene la personificación femenina implícita de la Sabiduría con «disfrazada», que suena natural en español y refleja el sentido del hebreo. La variante griega se preserva en nota, como exige la honestidad textual del expediente. No requiere nueva adjudicación compleja porque la decisión ya está documentada en la revisión aplicada y el ajuste español es directo.'
