theological_decisions:
- issue: Referent of 'the house of the LORD'
  chosen_reading: retain the literal phrase without resolving whether it refers to the temple, the land, or the covenant people
  alternative_readings:
  - the temple of the LORD
  - the people/household of the LORD
  rationale: The phrase may evoke the sanctuary, but in Hosea's prophetic judgment context it can also encompass Israel as the LORD's house. Preserving the literal wording maintains the prophetic ambiguity rather than narrowing the referent beyond what the Hebrew requires.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
