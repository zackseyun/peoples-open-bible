  text: עֶרְוַ֤ת בַּת בִּנְ/ךָ֙ א֣וֹ בַֽת בִּתְּ/ךָ֔ לֹ֥א תְגַלֶּ֖ה עֶרְוָתָ֑/ן כִּ֥י עֶרְוָתְ/ךָ֖ הֵֽנָּה־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/018/010.yaml
  text: You shall not uncover the nakedness of your son's daughter or of your daughter's daughter[b][a], for their nakedness is your own.
  footnotes:
  - marker: a
    text: Or, more interpretively, 'You shall not have sexual relations with your son's daughter or your daughter's daughter.' The Hebrew idiom is literally 'uncover the nakedness of.'
    reason: lexical_alternative
  - marker: b
    text: The closing clause is literally 'for they are your nakedness,' expressing that these close descendants are regarded as an extension of one's own family flesh and therefore sexually forbidden.
    reason: cultural_note
