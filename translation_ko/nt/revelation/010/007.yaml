  text: 그러나 일곱째 천사가 그의 음성을 내는 날들에, 곧 그가 나팔을 불려고 할 때에, 하나님의 비밀이 완성될 것입니다. 이는 그분께서 자기 노예들인 예언자들에게 복음으로 전하신 것과 같습니다.
