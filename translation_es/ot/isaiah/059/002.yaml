translation:
  language: es
  text: Pero sus iniquidades[a] los han separado de su Dios, y sus pecados han ocultado de ustedes su rostro, de modo que no oye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'culpas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: HALOT
  rationale: En este contexto, la expresión introduce contraste directo con la afirmación previa y en español natural se expresa mejor con 'Pero'. Mantiene el valor adversativo sin añadir matiz innecesario.
- source_word: עֲוֺנֹתֵיכֶם
  english_pob_choice: your iniquities
  chosen_spanish: sus iniquidades
  alternatives_spanish:
  - sus culpas
  - sus maldades
  lexicon: HALOT
  rationale: '''עָוֹן'' conserva la idea de culpa torcida/iniquidad, distinta de ''חַטָּאות''. ''Iniquidades'' preserva esa distinción léxica mejor que unificar ambos términos como ''pecados''.'
- source_word: הָיוּ מַבְדִּלִים
  english_pob_choice: have separated
  chosen_spanish: han separado
  alternatives_spanish:
  - han venido a separar
  - han llegado a separar
  lexicon: HALOT
  rationale: Aunque la construcción hebrea combina 'ser/estar' con el participio, en español 'han separado' comunica con claridad el resultado relacional que el POB inglés también prioriza en la revisión final. Evita una calca forzada y conserva la fuerza causal.
- source_word: בֵּינֵיכֶם לְבֵין אֱלֹהֵיכֶם
  english_pob_choice: between you and your God
  chosen_spanish: de su Dios
  alternatives_spanish:
  - entre ustedes y su Dios
  - de ustedes y de su Dios
  lexicon: HALOT
  rationale: El hebreo expresa separación entre dos partes; en español, 'los han separado de su Dios' es una forma natural que conserva la relación interpersonal/covenantal. La repetición de 'entre' sería posible, pero menos idiomática en esta cláusula.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - su Dios, el de ustedes
  lexicon: HALOT
  rationale: La forma plural morfológica refiere aquí al Dios de Israel en sentido singular. 'Su Dios' mantiene el sentido contextual y fluidez en español.
- source_word: וְחַטֹּאותֵיכֶם
  english_pob_choice: and your sins
  chosen_spanish: y sus pecados
  alternatives_spanish:
  - y sus faltas
  - y sus transgresiones
  lexicon: HALOT
  rationale: '''חַטָּאת'' se refiere aquí a pecados o faltas morales. Se conserva la distinción respecto de ''iniquidades'' con un término español claro y ampliamente comprensible.'
- source_word: הִסְתִּירוּ פָנִים
  english_pob_choice: have hidden his face
  chosen_spanish: han ocultado su rostro
  alternatives_spanish:
  - han escondido su rostro
  - han apartado su rostro
  lexicon: HALOT
  rationale: El hebreo usa la imagen antropomórfica del 'rostro' de Dios. 'Rostro' preserva mejor esa imagen que 'cara' en un registro bíblico digno y natural en español.
- source_word: מִכֶּם
  english_pob_choice: from you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - de vosotros
  - de ustedes mismos
  lexicon: HALOT
  rationale: La preposición indica separación. En español latinoamericano, 'de ustedes' es natural y coherente con el tono de la traducción.
- source_word: מִשְּׁמוֹעַ
  english_pob_choice: so that he does not hear
  chosen_spanish: de modo que no oye
  alternatives_spanish:
  - para que no oiga
  - de manera que no escucha
  lexicon: HALOT
  rationale: La forma con מִן + infinitivo expresa consecuencia/resultados. 'De modo que no oye' conserva la idea causal-final sin forzar una construcción más explicativa de lo que el hebreo exige.
theological_decisions:
- issue: Imagen antropomórfica del 'rostro' divino
  english_pob_reading: Retain 'his face' language rather than interpret it as mere favor or presence
  chosen_spanish_reading: Conservar 'su rostro' en vez de abstraerlo como 'su favor' o 'su presencia'
  alternative_spanish_readings:
  - han apartado su favor
  - han ocultado su presencia
  rationale: El hebreo habla explícitamente del 'rostro' de Dios. Mantener la imagen preserva la fuerza literaria y teológica del texto, así como la noción de alejamiento relacional, sin reducirla a una paráfrasis conceptual.
  doctrine_reference: Translation philosophy §1, §3
- issue: Causalidad moral de la separación de Dios
  english_pob_reading: State that the people's sins are what divide and hide, without implying divine inability or change in God's nature
  chosen_spanish_reading: Declarar que las iniquidades y pecados del pueblo son la causa de la separación y del ocultamiento del rostro, sin sugerir incapacidad divina
  alternative_spanish_readings:
  - sus pecados los alejaron de Dios
  - Dios los dejó por sus pecados
  rationale: La cláusula hebrea atribuye la ruptura relacional al pecado humano. La redacción española debe conservar esa causalidad y evitar inferencias ajenas al versículo, especialmente sobre un cambio en la naturaleza de Dios.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al preferir una expresión natural para la separación ('han separado') y una consecuencia clara para מִשְּׁמוֹעַ ('de modo que no oye'), sin perder la distinción léxica entre עָוֹן y חַטָּאת. También conserva la imagen del 'rostro' divino que el audit trail inglés decidió retener.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים y 'rostro' para פָנִים en un registro bíblico digno.
  - Se distingue 'iniquidades' de 'pecados' para reflejar el paralelismo hebreo.
  - El sujeto implícito de 'no oye' se entiende como Dios por el contexto inmediato; la formulación evita añadir elementos no presentes en el hebreo.
  - El tratamiento pronominal 'su/de ustedes' sigue el español neutral latinoamericano y corresponde al plural hebreo.
