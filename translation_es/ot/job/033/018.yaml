review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura paralela del hebreo y mantiene «alma/vida», pero se aparta del rastro léxico auditado en dos puntos clave: שחת se documentó en el POB como «pit» con alternativas «grave/destruction», y בשלח como término amplio «weapon» con alternativas más específicas. «Sepulcro» y especialmente «espada» estrechan innecesariamente el sentido del original.'
  spanish_quality_summary: El español es claro y digno, pero «guarda su alma» suena menos idiomático que «preserva» o «libra» en este contexto, y «de pasar por la espada» introduce una expresión fija española que tiende a significar ejecución o matanza por espada, más interpretativa y más estrecha que el hebreo. «Fosa» y «arma» conservan mejor la imaginería y la cautela léxica.
  glossary_alignment: 'No hay conflictos con términos doctrinales mayores del glosario. Sí hay desalineación con la política de preservar la amplitud semántica documentada: שחת debe quedar como «fosa» en el texto con nota para «sepulcro/destrucción», y שׁלח no debería fijarse como «espada» cuando el POB inglés escogió «weapon».'
  issues:
  - severity: medium
    issue: «del sepulcro» estrecha שחת
    rationale: El expediente inglés eligió «from the pit» como lectura principal y reservó «grave/destruction» para nota. En español, «sepulcro» especifica demasiado una tumba y pierde la concreción poética de «fosa».
  - severity: high
    issue: «la espada» sobretraduce בַּשָּׁלַח
    rationale: El POB inglés decidió «the weapon» precisamente para evitar fijar el referente debatido como espada, dardo o proyectil. «Espada» contradice esa cautela lexical.
  - severity: medium
    issue: Falta la nota equivalente a la nota inglesa c sobre עֲבֹר
    rationale: El audit trail inglés preserva la alternativa «from crossing into the weapon» como nota de historial/rendición previa. Dado que en español la expresión también es ambigua, conviene conservar una nota paralela.
  - severity: low
    issue: «guarda su alma» es menos natural en contexto de rescate de muerte
    rationale: Aunque posible, «preserva» o «libra» suena más idiomático en español bíblico moderno para חשׂך en paralelo con rescate de la muerte.
  revised_spanish_text: Él preserva su alma de la fosa[a], y su vida de pasar por el arma[b][c].
  revised_footnotes:
  - marker: a
    text: O «del sepulcro» o «de la destrucción» para «de la fosa».
    reason: lexical_alternative
  - marker: b
    text: El hebreo puede referirse más específicamente a «un dardo», «un proyectil» o posiblemente «la espada»; la línea habla de ser librado de una muerte violenta.
    reason: lexical_alternative
  - marker: c
    text: O «de cruzar hacia el arma».
    reason: previous_rendering
  revision_rationale: 'Se ajusta el español al expediente fuente-POB: «fosa» refleja mejor שחת como lectura principal con alternativas en nota; «arma» preserva la amplitud de בשלח; se añade la nota sobre la alternativa más literal de עֲבֹר; y «preserva» mejora la naturalidad sin apartarse del sentido de חשׂך.'
