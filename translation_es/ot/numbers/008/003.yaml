translation:
  language: es
  text: 'Y Aarón hizo así: hacia el frente del candelabro colocó sus lámparas[a][b], tal como Yahvé había mandado a Moisés.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «opuesto al frente de» o «de cara al frente de» el candelabro.
    reason: lexical_alternative
  - marker: b
    text: O «encendió sus lámparas». El verbo hebreo puede entenderse como hacer subir las lámparas, lo que en este contexto puede referirse a colocarlas o a encenderlas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ כֵּן
  english_pob_choice: And Aaron did so
  chosen_spanish: Y Aarón hizo así
  alternatives_spanish:
  - Así hizo Aarón
  - Y Aarón lo hizo así
  lexicon: HALOT
  rationale: El hebreo expresa cumplimiento de una instrucción previa; en español, 'hizo así' conserva la fuerza resumptiva de כֵּן sin sonar rígido.
- source_word: אֶל מוּל פְּנֵי
  english_pob_choice: toward the front of
  chosen_spanish: hacia el frente de
  alternatives_spanish:
  - frente al frente de
  - en frente de
  - opuesto al frente de
  lexicon: HALOT
  rationale: La expresión indica orientación espacial; 'hacia el frente de' comunica dirección sin forzar una geometría más precisa de la que el hebreo exige.
- source_word: הַמְּנוֹרָה
  english_pob_choice: the lampstand
  chosen_spanish: el candelabro
  alternatives_spanish:
  - la menorá
  - el lampadario
  lexicon: HALOT
  rationale: En contexto tabernacular, el objeto es un soporte de lámparas; 'candelabro' es el equivalente natural en español bíblico moderno y evita transliterar innecesariamente.
- source_word: הֶעֱלָה
  english_pob_choice: he set up / he lit
  chosen_spanish: colocó
  alternatives_spanish:
  - encendió
  - levantó
  - dispuso
  lexicon: HALOT
  rationale: La POB inglesa conserva la tensión entre 'set up' y 'lit'. En español, 'colocó' mantiene la idea de disponer las lámparas sin resolver de forma prematura la ambigüedad entre instalación y encendido.
- source_word: נֵרֹתֶיהָ
  english_pob_choice: its lamps
  chosen_spanish: sus lámparas
  alternatives_spanish:
  - sus luces
  - sus mechas
  lexicon: HALOT
  rationale: '''Lámparas'' refleja el referente concreto del objeto y funciona bien con el verbo de disposición/encendido del contexto.'
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: just as Yahweh had commanded Moses
  chosen_spanish: tal como Yahvé había mandado a Moisés
  alternatives_spanish:
  - como Yahvé había ordenado a Moisés
  - según Yahvé había mandado a Moisés
  lexicon: HALOT
  rationale: '''Tal como'' preserva la conformidad exacta; ''había mandado'' reproduce el mandato divino con dignidad y naturalidad en español.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ''Yahvé'' como forma española estable para el nombre divino, evitando la sustitución por un título.'
theological_decisions:
- issue: Ambigüedad de הֶעֱלָה con las lámparas
  english_pob_reading: he set up / he lit
  chosen_spanish_reading: colocó sus lámparas
  alternative_spanish_readings:
  - encendió sus lámparas
  - dispuso sus lámparas
  rationale: 'La POB documenta una tensión léxica real: el verbo puede referirse a instalar o encender. ''Colocó'' mantiene abierta la ambigüedad sin borrar la posibilidad de encendido ni imponer una sola lectura.'
  doctrine_reference: Lexical fidelity / auditable ambiguity retention
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se conserva el nombre propio divino en forma española 'Yahvé', en lugar de reemplazarlo por un título. Esto mantiene la distinción entre el nombre revelado y otras designaciones de Dios.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se mantuvo alta concordancia con el audit trail inglés: la frase idiomática de cumplimiento, la orientación espacial, la traducción de מְנוֹרָה como objeto físico, la ambigüedad de הֶעֱלָה y el uso de Yahvé. No se registraron revisiones pendientes en el paquete fuente.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para יְהוָה.
  - '''Candelabro'' mantiene un registro bíblico claro y natural para מְנוֹרָה.'
  - La ambigüedad de הֶעֱלָה se preserva en el texto y se explica en nota.
  - El orden de la cláusula sigue el hebreo sin resultar forzado en español.
