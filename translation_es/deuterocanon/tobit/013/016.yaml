translation:
  language: es
  text: Porque Jerusalén será edificada con zafiro y esmeralda[a], y tus muros[c] con piedras preciosas, y las torres y los baluartes[b] con oro puro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será reedificada»; el griego dice simplemente «será edificada», aunque el contexto de restauración puede sugerir reconstrucción.
    reason: lexical_alternative
  - marker: b
    text: «Baluartes» traduce un término de fortificaciones defensivas; «bastiones» o «parapetos» también son posibles.
    reason: lexical_alternative
  - marker: c
    text: 'El griego se dirige directamente a Jerusalén: «tus muros».'
    reason: cultural_note
lexical_decisions:
- source_word: οἰκοδομηθήσεται
  english_pob_choice: will be built
  chosen_spanish: será edificada
  alternatives_spanish:
  - será construida
  - será reedificada
  lexicon: BDAG
  rationale: El futuro pasivo expresa la acción de edificar. «Será edificada» conserva el sentido directo y el tono solemne. «Ser reedificada» es posible por el contexto de restauración, pero el griego no añade explícitamente el prefijo re-.
- source_word: σαπφείρῳ
  english_pob_choice: with sapphire
  chosen_spanish: con zafiro
  alternatives_spanish:
  - de zafiro
  - en zafiro
  lexicon: LSJ
  rationale: El dativo instrumental o de material se expresa naturalmente en español con «con». «Zafiro» mantiene el valor de la piedra preciosa sin cargar la frase.
- source_word: σμαράγδῳ
  english_pob_choice: and emerald
  chosen_spanish: y esmeralda
  alternatives_spanish:
  - con esmeralda
  lexicon: LSJ
  rationale: El sustantivo griego designa la esmeralda. En coordinación con «zafiro», la forma simple «y esmeralda» evita repeticiones poco naturales y conserva el paralelo material.
- source_word: λίθῳ ἐντίμῳ
  english_pob_choice: with precious stones
  chosen_spanish: piedras preciosas
  alternatives_spanish:
  - piedra preciosa
  - piedras de gran valor
  - piedra costosa
  lexicon: LSJ
  rationale: La construcción griega puede entenderse con sentido colectivo. En español, el plural «piedras preciosas» refleja mejor la referencia colectiva que el singular inglés anterior y armoniza con el giro de materiales de construcción.
- source_word: τὰ τείχη σου
  english_pob_choice: your walls
  chosen_spanish: tus muros
  alternatives_spanish:
  - tus murallas
  - sus muros
  lexicon: LSJ
  rationale: El posesivo de segunda persona debe conservarse porque el griego se dirige directamente a Jerusalén. «Muros» es claro y sobrio; «murallas» también sería posible, pero «muros» sigue de cerca el término sin especializarlo demasiado.
- source_word: πύργοι
  english_pob_choice: towers
  chosen_spanish: las torres
  alternatives_spanish:
  - torres
  lexicon: LSJ
  rationale: «Torres» es la correspondencia directa y natural para las estructuras defensivas de la ciudad.
- source_word: προμαχῶνες
  english_pob_choice: battlements
  chosen_spanish: los baluartes
  alternatives_spanish:
  - los bastiones
  - las almenas
  - los parapetos
  lexicon: LSJ
  rationale: El término alude a fortificaciones defensivas. En español, «baluartes» comunica bien la idea de obras defensivas elevadas sin limitarla a un único detalle arquitectónico. Se evita «almenas» porque sería demasiado específico.
- source_word: χρυσίῳ καθαρῷ
  english_pob_choice: with pure gold
  chosen_spanish: con oro puro
  alternatives_spanish:
  - de oro puro
  - con oro refinado
  lexicon: LSJ
  rationale: El dativo de material se vierte de modo natural con «con». «Oro puro» reproduce la imagen de esplendor y pureza del metal sin añadir matices no presentes en el texto.
theological_decisions:
- issue: Imaginería de restauración gloriosa para Jerusalén
  english_pob_reading: Retain the verse as a poetic promise of Jerusalem's glorious future construction without specifying whether the language is literal, hyperbolic, or symbolic.
  chosen_spanish_reading: Conservar el versículo como promesa poética de la futura edificación gloriosa de Jerusalén, sin precisar si el lenguaje es literal, hiperbólico o simbólico.
  alternative_spanish_readings:
  - Descripción arquitectónica literal
  - Imagen simbólica de la gloria restaurada
  rationale: El griego presenta un cuadro de gran riqueza material, pero no obliga a resolver su alcance. La traducción mantiene la tensión interpretativa en vez de definirla.
  doctrine_reference: 'DOCTRINE.md §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'La versión española sigue la lectura revisada del audit trail: mantiene el sentido simple de «will be built», recoge el valor colectivo de λίθῳ ἐντίμῳ con «piedras preciosas», y conserva el direccionamiento directo a Jerusalén. También evita forzar una lectura de reedificación que el griego no explicita.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene un registro solemne y bíblico, evitando arcaísmos innecesarios.
  - «Baluartes» se eligió por claridad defensiva y consistencia con el campo semántico de fortificación.
  - Se conserva el posesivo de segunda persona para reflejar el apóstrofe directo a Jerusalén.
