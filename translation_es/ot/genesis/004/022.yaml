base_translation:
  language: en
  yaml_path: translation/ot/genesis/004/022.yaml
  text: Zillah also bore Tubal-cain[a], a forger of every cutting tool of bronze and iron[b]. And the sister of Tubal-cain was Naamah.
  footnotes:
  - marker: a
    text: Or 'a sharpener/hammerer of every craftsman in bronze and iron'; the Hebrew wording after 'Tubal-cain' is difficult, and some understand it to describe him as a metalworker rather than as the maker of metal tools.
    reason: alternative_reading
  - marker: b
    text: '''Bronze'' may also be rendered ''copper.'''
    reason: lexical_alternative
