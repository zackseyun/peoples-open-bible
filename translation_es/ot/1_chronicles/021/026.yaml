translation:
  language: es
  text: Allí David edificó un altar a Yahvé y ofreció holocaustos y sacrificios de paz. Invocó a Yahvé[a], y él le respondió con fuego desde el cielo sobre el altar del holocausto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sacrificios de comunión» para «sacrificios de paz».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: El verbo indica construir/edificar un altar. «Edificó» conserva el acto concreto y resulta natural en español bíblico sin sonar mecánico.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: Allí
  alternatives_spanish:
  - ahí
  - en aquel lugar
  lexicon: HALOT
  rationale: Es un adverbio locativo que remite al lugar ya mencionado. «Allí» mantiene la referencia espacial de forma breve y clara.
- source_word: מִזְבֵּחַ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - ara
  lexicon: HALOT
  rationale: Es el equivalente estándar para la estructura sacrificial.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: Se conserva «Yahvé» según la convención del proyecto. La preposición expresa dedicación/dirección; en español «para» comunica bien ese matiz cultual.
- source_word: וַיַּעַל
  english_pob_choice: offered up
  chosen_spanish: ofreció
  alternatives_spanish:
  - ofreció en holocausto
  - presentó
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo significa ofrecer sacrificios. En español, el complemento ya distingue los holocaustos, por lo que «ofreció» funciona de manera natural y fiel.
- source_word: עֹלוֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas elevadas
  lexicon: HALOT
  rationale: Para עֹלוֹת, el término técnico tradicional y preciso en español bíblico es «holocaustos», equivalente de ofrendas totalmente quemadas.
- source_word: שְׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: sacrificios de paz
  alternatives_spanish:
  - sacrificios de comunión
  - ofrendas de paz
  lexicon: HALOT
  rationale: La POB inglesa señaló la alternativa «fellowship offerings». En español, «sacrificios de paz» mantiene la forma tradicional y a la vez deja abierta la idea de comunión/relación pacífica implícita en el término.
- source_word: וַיִּקְרָא אֶל יְהוָה
  english_pob_choice: He called on Yahweh
  chosen_spanish: Invocó a Yahvé
  alternatives_spanish:
  - clamó a Yahvé
  - llamó a Yahvé
  lexicon: HALOT
  rationale: El giro verbal en contexto de oración expresa invocación. «Invocó» es preciso y evita la ambigüedad de «llamó» en español.
- source_word: וַיַּעֲנֵהוּ
  english_pob_choice: he answered him
  chosen_spanish: le respondió
  alternatives_spanish:
  - lo respondió
  - contestó
  lexicon: HALOT
  rationale: El sujeto implícito es Yahvé por el contexto inmediato. «Le respondió» expresa respuesta personal y mantiene el orden narrativo.
- source_word: בָאֵשׁ
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - por fuego
  - mediante fuego
  lexicon: HALOT
  rationale: 'La preposición es instrumental: la respuesta divina se manifiesta por medio del fuego. «Con fuego» es la opción más natural en español.'
- source_word: מִן הַשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde los cielos
  alternatives_spanish:
  - desde el cielo
  - del cielo
  lexicon: HALOT
  rationale: Aunque el hebreo usa plural, el sentido apunta a la esfera celestial. «Desde los cielos» conserva mejor la forma plural del original que la singular idiomática «del cielo».
- source_word: עַל מִזְבַּח הָעֹלָה
  english_pob_choice: on the altar of burnt offering
  chosen_spanish: sobre el altar del holocausto
  alternatives_spanish:
  - en el altar del holocausto
  - sobre el altar para el holocausto
  lexicon: HALOT
  rationale: La frase identifica el altar asociado con el holocausto. «Del holocausto» reproduce la relación atributiva del hebreo y evita añadir una explicación que el texto no da.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: La convención del proyecto pide usar «Yahvé» para el Tetragrámaton. Se preserva así el nombre propio del pacto en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de la respuesta divina por fuego
  english_pob_reading: the LORD answered him with fire from heaven
  chosen_spanish_reading: le respondió con fuego desde los cielos
  alternative_spanish_readings:
  - le respondió enviando fuego
  - lo contestó con fuego
  rationale: Se mantiene la afirmación narrativa sin ampliar su significado teológico. La respuesta divina es presentada como un hecho milagroso, no como símbolo añadido.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import doctrinal claims the text does not make'
translation_notes:
  revision_awareness: La redacción inglesa revisada cambió «upon» por «on» para mayor naturalidad. En español se optó por «sobre», que comunica con claridad la localización del fuego sin sobrecargar la línea ni introducir una distinción artificial entre preposiciones.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se eligió «holocaustos» para עֹלוֹת por precisión cultual y consistencia terminológica.
  - Se conservó «sacrificios de paz» con nota alternativa porque el auditorio español puede conocer también la denominación funcional «sacrificios de comunión».
  - «Desde los cielos» preserva el plural hebreo sin perder inteligibilidad en español.
  - La puntuación y mayúsculas siguen el uso estándar del español bíblico moderno.
