translation:
  language: es
  text: 'Porque así dice el Alto y Exaltado[a], el que habita la eternidad, cuyo nombre es Santo: «Yo habito en el lugar alto y santo, y también con el quebrantado y humilde en espíritu[b], para reavivar el espíritu de los humildes y para reavivar el corazón de los quebrantados».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que habita para siempre». La expresión hebrea puede enfatizar tanto la duración eterna como el hecho de habitar en la eternidad.'
    reason: lexical_alternative
  - marker: b
    text: 'Tradicionalmente: «con el contrito y humilde de espíritu» ... «para reavivar el corazón de los contritos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָם וְנִשָּׂא
  english_pob_choice: high and lifted up
  chosen_spanish: Alto y Sublime
  alternatives_spanish:
  - alto y levantado
  - alto y exaltado
  lexicon: HALOT
  rationale: Conserva la pareja de exaltación y elevación del hebreo en un español natural y solemne. 'Sublime' comunica la idea de elevación/majestad sin sonar tan mecánico como una traducción literal de 'levantado'.
- source_word: שֹׁכֵן עַד
  english_pob_choice: who inhabits eternity
  chosen_spanish: el que habita la eternidad
  alternatives_spanish:
  - el que habita para siempre
  - el que mora en la eternidad
  lexicon: HALOT
  rationale: '''Habita la eternidad'' mantiene la densidad de la expresión hebrea y la imagen de morada duradera. ''Habita para siempre'' explicita la duración, pero reduce el matiz locativo que el audit trail preserva.'
- source_word: קָדוֹשׁ שְׁמוֹ
  english_pob_choice: whose name is Holy
  chosen_spanish: cuyo nombre es Santo
  alternatives_spanish:
  - cuyo nombre es Santo
  - Santo es su nombre
  lexicon: HALOT
  rationale: La construcción posesiva con 'cuyo nombre es Santo' suena natural en español y preserva el predicado 'Santo' aplicado al nombre divino.
- source_word: מָרוֹם וְקָדוֹשׁ אֶשְׁכּוֹן
  english_pob_choice: I dwell in the high and holy place
  chosen_spanish: Yo habito en la altura y en la santidad
  alternatives_spanish:
  - Yo habito en el alto y santo lugar
  - Yo habito en lo alto y santo
  lexicon: HALOT
  rationale: '''Altura y santidad'' conserva el paralelo hebreo entre elevación y santidad sin añadir ''lugar'' donde el texto no lo exige explícitamente. Mantiene también la conexión verbal con ''habita'' del hemistiquio anterior.'
- source_word: דַּכָּא
  english_pob_choice: the crushed
  chosen_spanish: el quebrantado
  alternatives_spanish:
  - el aplastado
  - el roto
  lexicon: HALOT
  rationale: Aunque la imagen básica es de estar 'crushed', en español bíblico 'quebrantado' comunica bien la condición de abatimiento y no fuerza una imagen físicamente extraña. Se evita 'contrito' porque estrecha el sentido hacia arrepentimiento, como nota el POB en inglés.
- source_word: שְׁפַל רוּחַ
  english_pob_choice: lowly in spirit
  chosen_spanish: humilde de espíritu
  alternatives_spanish:
  - bajo de espíritu
  - humilde en espíritu
  lexicon: HALOT
  rationale: '''Humilde de espíritu'' es idiomático y fiel a la construcción hebrea, preservando la idea de interioridad/actitud sin volverla más interpretativa de lo necesario.'
- source_word: לְהַחֲיוֹת
  english_pob_choice: to revive
  chosen_spanish: para reavivar
  alternatives_spanish:
  - para hacer vivir
  - para dar vida a
  lexicon: HALOT
  rationale: '''Reavivar'' reproduce la idea de restaurar vida o vigor sin cargar el texto con lenguaje de resurrección. Mantiene la repetición enfática del verbo en ambos cola.'
- source_word: רוּחַ שְׁפָלִים
  english_pob_choice: the spirit of the lowly
  chosen_spanish: el espíritu de los humildes
  alternatives_spanish:
  - el espíritu de los bajos
  - el espíritu de los abatidos
  lexicon: HALOT
  rationale: En español, 'humildes' es la forma más clara y digna para el grupo sustantivado 'los de espíritu humilde'. Se mantiene 'espíritu' para respetar la antropología bíblica.
- source_word: לֵב נִדְכָּאִים
  english_pob_choice: the heart of the crushed
  chosen_spanish: el corazón de los quebrantados
  alternatives_spanish:
  - el corazón de los aplastados
  - el corazón de los contritos
  lexicon: HALOT
  rationale: Se conserva la correspondencia con 'quebrantado' para דַּכָּא/נִדְכָּאִים y se mantiene 'corazón' en sentido antropológico bíblico. 'Contritos' se evita por la misma razón lexical que en el primer miembro.
theological_decisions:
- issue: Tensión entre trascendencia e inmanencia divina
  english_pob_reading: Render both God's exalted dwelling and his presence with the crushed without softening either tension.
  chosen_spanish_reading: Mantener tanto la altura/santidad de Dios como su presencia con el quebrantado y humilde de espíritu, sin resolver la tensión.
  alternative_spanish_readings:
  - Enfatizar solo la trascendencia de Dios
  - Interpretar 'con el quebrantado' de manera meramente metafórica
  rationale: El hebreo yuxtapone explícitamente el habitar en lo alto con el habitar junto a los abatidos. La formulación española conserva ambos polos para no diluir la paradoja teológica del texto.
  doctrine_reference: Translation philosophy §3
- issue: Valor de דַּכָּא / נִדְכָּאִים
  english_pob_reading: Use 'crushed' in the main text rather than the traditional 'contrite.'
  chosen_spanish_reading: Usar 'quebrantado / quebrantados' en el texto principal en vez de 'contrito'.
  alternative_spanish_readings:
  - contrito / contritos
  - roto / rotos
  rationale: '''Contrito'' introduce de forma más estrecha la idea de arrepentimiento devocional. ''Quebrantado'' conserva mejor la imagen léxica de aplastamiento o abatimiento que el hebreo presenta aquí.'
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el pasaje permanece con acuerdo alto y sin ajustes aplicados. La versión española refleja ese estado estable y conserva las tensiones léxicas señaladas en el audit trail.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma preferida para el nombre divino cuando aparezca; aquí el verso usa una perífrasis descriptiva, por lo que no se introduce el nombre.
  - '''Alto y Sublime'' y ''altura y santidad'' conservan el paralelismo de elevación y santidad sin añadir material extrabíblico.'
  - '''Quebrantado'' se usa consistentemente para דַּכָּא/נִדְכָּאִים, preservando la repetición léxica del hebreo.'
  - '''Reavivar'' se repite en ambos miembros para reflejar el paralelismo verbal del original.'
