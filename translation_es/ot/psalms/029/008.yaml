translation:
  language: es
  text: La voz de Yahvé sacude la estepa[a]; Yahvé sacude la estepa de Cades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hace que la estepa se retuerza' o 'hace temblar la estepa'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֣וֹל
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  lexicon: HALOT
  rationale: En el Salmo 29, la expresión repetida 'voz de Yahvé' conserva en español el efecto poético y personal del hebreo mejor que 'sonido', que sería más impersonal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del tetragrámaton como 'Yahvé', conforme al criterio del proyecto en español, evitando la sustitución por un título y preservando el nombre propio del pacto.
- source_word: יָחִיל
  english_pob_choice: shakes
  chosen_spanish: sacude
  alternatives_spanish:
  - hace temblar
  - estremece
  - hace retorcerse
  lexicon: HALOT
  rationale: El hiphil de חול permite la idea de hacer temblar o agitar. 'Sacude' comunica con claridad el efecto sobre el desierto y funciona bien en el paralelismo poético; 'hace temblar' también es posible, pero menos vigoroso en esta línea.
- source_word: מִדְבָּר
  english_pob_choice: wilderness
  chosen_spanish: desierto
  alternatives_spanish:
  - erial
  - yermo
  - wilderness
  lexicon: HALOT
  rationale: Aunque 'wilderness' puede abarcar un espacio más amplio y salvaje, en español 'desierto' es la opción natural y fiel para el campo semántico de מִדְבָּר, aquí sin perder la imagen de tierra inhóspita.
- source_word: מִדְבַּר קָדֵשׁ
  english_pob_choice: the wilderness of Kadesh
  chosen_spanish: el desierto de Cades
  alternatives_spanish:
  - el desierto de Kadesh
  - el desierto junto a Cades
  - el desierto de Cades
  lexicon: HALOT
  rationale: La relación constructa se vierte con naturalidad como 'el desierto de Cades'. Se translitera el topónimo como 'Cades' para conservar la referencia geográfica bíblica en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el tetragrama. En español se conserva el nombre divino como 'Yahvé', en continuidad con la decisión doctrinal del proyecto y sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente sin cambios sustantivos; el consenso de auditoría permanece en alta concordancia y no requiere ajustes respecto del inglés POB auditado.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente para יְהוָה.
  - '''Desierto'' se emplea de manera uniforme para מִדְבָּר, incluida la frase constructa ''el desierto de Cades''.'
  - La nota al pie conserva alternativas léxicas reales del hebreo sin ampliar indebidamente el sentido.
  - 'El texto principal conserva el paralelismo sintético del hebreo: dos miembros casi idénticos con variación geográfica.'
