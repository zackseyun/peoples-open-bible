translation:
  language: es
  text: Y vio el rey que lo estaban presionando mucho, y, obligado, les entregó a Daniel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπείγουσιν
  english_pob_choice: were pressing him
  chosen_spanish: lo estaban presionando
  alternatives_spanish:
  - lo estaban instando
  - lo estaban insistiendo
  lexicon: BDAG
  rationale: El griego expresa presión insistente e intensa; en español, «presionar» comunica bien esa coerción social y política sin reducirla a una simple petición.
- source_word: σφόδρα
  english_pob_choice: very hard
  chosen_spanish: muy fuertemente
  alternatives_spanish:
  - en extremo
  - muchísimo
  - con mucha fuerza
  lexicon: LSJ
  rationale: El adverbio intensifica la presión anterior. «Muy fuertemente» conserva el énfasis sin sonar arcaico y mantiene el paralelismo con la idea de presión continua.
- source_word: ἀναγκασθεὶς
  english_pob_choice: being compelled
  chosen_spanish: al verse compelido
  alternatives_spanish:
  - siendo compelido
  - forzado
  - bajo compulsion
  lexicon: BDAG
  rationale: El participio pasivo indica acción bajo presión externa. «Al verse compelido» conserva la pasividad y evita afirmar una fuerza física que el griego no especifica.
- source_word: παρέδωκεν
  english_pob_choice: handed ... over
  chosen_spanish: les entregó
  alternatives_spanish:
  - se lo entregó
  - los puso en sus manos
  - los entregó
  lexicon: BDAG
  rationale: En este contexto, el verbo significa poner a alguien bajo el poder de otro. «Les entregó a Daniel» reproduce el sentido de transferencia de custodia de forma natural en español.
- source_word: Δανιήλ
  english_pob_choice: Daniel
  chosen_spanish: Daniel
  lexicon: transliteration
  rationale: Nombre propio estándar en español.
theological_decisions:
- issue: Grado de coerción sobre el rey
  english_pob_reading: The king acts under strong social/political compulsion, not voluntary initiative.
  chosen_spanish_reading: El rey actúa bajo fuerte presión social y política, no por iniciativa voluntaria.
  alternative_spanish_readings:
  - El rey simplemente fue persuadido
  - El rey fue forzado físicamente
  rationale: La combinación de la insistencia intensa y el participio pasivo presenta una acción arrancada por presión externa. La redacción española mantiene esa tensión sin añadir más de lo que dice el griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
