translation:
  language: es
  text: Porque sus oficiales están en Zoán[a], y sus enviados llegan a Hanes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus príncipes están en Zoán, y sus mensajeros llegan a Hanes».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: HALOT
  rationale: El valor causal/explanatorio de כִּי en este contexto se conserva mejor con «Porque». Mantiene la relación con la acusación anterior sin introducir un matiz demasiado enfático.
- source_word: הָיוּ
  english_pob_choice: are
  chosen_spanish: están
  alternatives_spanish:
  - eran
  - han llegado a estar
  - se encuentran
  lexicon: HALOT
  rationale: Aunque la forma es perfecta, en el discurso profético puede describir un estado presente. «Están» suena natural en español y refleja la situación actual de los funcionarios en Zoán.
- source_word: בְצֹעַן
  english_pob_choice: in Zoan
  chosen_spanish: en Zoán
  alternatives_spanish:
  - en Tanis
  - en Zoan
  lexicon: HALOT
  rationale: Nombre propio de lugar transliterado como en la pauta de la obra; la preposición ב se expresa de modo directo con «en».
- source_word: שָׂרָיו
  english_pob_choice: his officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus príncipes
  - sus jefes
  - sus gobernantes
  lexicon: HALOT
  rationale: שַׂר puede abarcar príncipe, jefe u oficial. Aquí el contexto diplomático favorece «oficiales», porque comunica con claridad la función gubernativa sin sugerir nobleza dinástica.
- source_word: וּמַלְאָכָיו
  english_pob_choice: and his envoys
  chosen_spanish: y sus enviados
  alternatives_spanish:
  - y sus mensajeros
  - y sus embajadores
  lexicon: HALOT
  rationale: מַלְאָךְ es «mensajero» en sentido amplio. «Enviados» refleja bien el carácter oficial y diplomático del contexto, y evita que «embajadores» añada un nivel de formalidad no explicitado por el hebreo.
- source_word: חָנֵס
  english_pob_choice: Hanes
  chosen_spanish: Hanes
  alternatives_spanish:
  - Janes
  - Hanés
  lexicon: HALOT
  rationale: Nombre propio de lugar transliterado. Se conserva la forma tradicional de transliteración usada en la tradición inglesa del proyecto.
- source_word: יַגִּיעוּ
  english_pob_choice: arrive at
  chosen_spanish: llegan a
  alternatives_spanish:
  - arriban a
  - alcanzan
  - llegan hasta
  lexicon: HALOT
  rationale: El hiphil de נגע expresa llegar o alcanzar el destino. «Llegan a» mantiene la idea de movimiento hacia un lugar y suena natural en español.
translation_notes:
  revision_awareness: El texto inglés más reciente pasó de «reach Hanes» a «arrive at Hanes». La versión española sigue esa precisión verbal con «llegan a», y conserva la alternativa de rango semántico para שָׂרָיו / וּמַלְאָכָיו mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma normal para el nombre divino cuando aparezca; aquí no ocurre.
  - Se prefiere «enviados» frente a «embajadores» para no sobretraducir el cargo diplomático.
  - La puntuación reproduce una pausa causal natural en español con coma antes de la segunda cláusula.
