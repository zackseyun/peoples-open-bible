revisions:
- from: 'Moisés dijo a Coré[a]: «Tú y toda tu congregación[b], preséntense delante de Yahvé mañana: tú, ellos y Aarón»[c].'
  to: 'Moisés dijo a Coré: «Tú y toda tu congregación, estén delante de Yahvé[a] mañana: tú, ellos y Aarón[b]».'
  rationale: 'Se revisa el versículo para alinear mejor el español con el hebreo y con el rastro auditado del POB inglés. ‘Estén delante de Yahvé’ conserva mejor הֱיוּ לִפְנֵי יְהוָה que ‘preséntense delante de Yahvé’. Se eliminó la nota innecesaria sobre ‘Korah’, y las dos notas restantes se reubicaron donde realmente corresponden: una sobre la alternativa ‘en presencia de Yahvé mañana’ y otra sobre la enumeración explícita ‘tú y ellos y Aarón’.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:33:21Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: Moisés habla a Coré, convoca a él y a toda su congregación a estar delante de Yahvé al día siguiente, y conserva la enumeración explícita de las partes. También mantiene correctamente Yahvé para יהוה. Sin embargo, la distribución de las notas no sigue bien el rastro auditado: la nota sobre ‘en presencia de Yahvé mañana’ corresponde a לִפְנֵי יְהוָה, no al nombre Coré; y la nota sobre la enumeración explícita debe anclarse a la frase final, no a ‘congregación’.'
  spanish_quality_summary: El español es claro y legible, pero ‘preséntense’ con sujeto mixto (‘tú y toda tu congregación’) suena algo forzado, y además el singular ‘tú’ seguido de imperativo plural puede sentirse menos natural. ‘Estén delante de Yahvé mañana’ reproduce mejor el hebreo הֱיוּ y mantiene dignidad bíblica sin paraprasear. También conviene reubicar las notas para evitar confusión y dejar la puntuación final más limpia.
  glossary_alignment: 'Alineación buena en términos clave: יהוה -> ‘Yahvé’ conforme al proyecto; קֹרַח -> ‘Coré’ es aceptable como forma bíblica tradicional española; עֵדָה -> ‘congregación’ es defendible. La principal mejora es lexical/sintáctica en הֱיוּ, donde ‘estén’ preserva mejor la literalidad del POB que ‘preséntense’, aunque esta última era contextual. No hay conflicto teológico que requiera adjudicación superior.'
  issues:
  - severity: medium
    issue: Anclaje incorrecto de las notas al pie
    rationale: La nota [a] ofrece ‘O «Korah»’, pero el English POB no preservó esa alternativa como nota; la alternativa auditada era para לִפְנֵי יְהוָה (‘be in the presence of Yahweh tomorrow’). La nota sobre la enumeración explícita también está mal anclada a ‘congregación’ en vez de a la frase final ‘tú, ellos y Aarón’.
  - severity: medium
    issue: ‘preséntense’ sobreinterpreta ligeramente הֱיוּ
    rationale: Aunque contextualiza bien la comparecencia, el hebreo dice literalmente ‘sean/estén’. Dado que el POB inglés eligió ‘be’ precisamente para conservar esa cercanía formal, ‘estén’ o ‘sean’ delante de Yahvé resulta más fiel al rastro auditado y sigue siendo natural en español bíblico moderno.
  - severity: low
    issue: Concordancia estilística con sujeto mixto
    rationale: ‘Tú y toda tu congregación, preséntense’ es entendible, pero ‘estén’ encaja más naturalmente con el mandato dirigido al conjunto sin llamar tanto la atención sobre una solución perifrástica.
  revised_spanish_text: 'Moisés dijo a Coré: «Tú y toda tu congregación, estén delante de Yahvé[a] mañana: tú, ellos y Aarón[b]».'
  revised_footnotes:
  - marker: a
    text: O «en presencia de Yahvé mañana».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tú y ellos y Aarón», una enumeración explícita de las partes que debían presentarse.'
    reason: lexical_alternative
  revision_rationale: 'Se revisa el versículo para alinear mejor el español con el hebreo y con el rastro auditado del POB inglés. ‘Estén delante de Yahvé’ conserva mejor הֱיוּ לִפְנֵי יְהוָה que ‘preséntense delante de Yahvé’. Se eliminó la nota innecesaria sobre ‘Korah’, y las dos notas restantes se reubicaron donde realmente corresponden: una sobre la alternativa ‘en presencia de Yahvé mañana’ y otra sobre la enumeración explícita ‘tú y ellos y Aarón’.'
