translation:
  language: es
  text: Porque les he dado buena instrucción[a]; no abandonen mi enseñanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi instrucción»; tradicionalmente, «mi ley». El hebreo torá puede designar instrucción en sentido amplio, no solo ley estatutaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introduce la base de la exhortación inmediata. «Porque» preserva la conexión causal/explanatoria de כִּי en español natural sin volver el verso más pesado.
- source_word: לֶקַח
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - enseñanza
  - lección
  - aprendizaje
  lexicon: HALOT
  rationale: En este contexto de sabiduría, לֶקַח designa lo impartido al discípulo. «Instrucción» conserva el sentido de contenido transmitido y mantiene distancia suficiente respecto de תּוֹרָתִי.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: buena
  alternatives_spanish:
  - excelente
  - sana
  lexicon: HALOT
  rationale: Adjetivo cualitativo directo. «Buena» es fiel, natural y corresponde al valor positivo de טוֹב sin intensificarlo innecesariamente.
- source_word: נָתַתִּי לָכֶם
  english_pob_choice: I have given you
  chosen_spanish: les he dado
  alternatives_spanish:
  - les di
  - les he impartido
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un don ya otorgado con vigencia actual en el discurso. «Les he dado» reproduce bien ese matiz en español.
- source_word: תּוֹרָתִי
  english_pob_choice: my teaching
  chosen_spanish: mi enseñanza
  alternatives_spanish:
  - mi instrucción
  - mi ley
  lexicon: HALOT
  rationale: En Proverbios, תּוֹרָה no requiere el sentido técnico de «ley»; aquí se trata de instrucción sapiencial. «Enseñanza» es idiomático en español y mantiene el paralelismo con «instrucción» sin igualar de forma plana ambos términos.
- source_word: אַל תַּעֲזֹבוּ
  english_pob_choice: do not forsake
  chosen_spanish: no abandonen
  alternatives_spanish:
  - no dejen
  - no abandonen
  - no se aparten de
  lexicon: HALOT
  rationale: El prohibitivo llama a una adhesión continua. «No abandonen» comunica bien la fuerza moral de עזב; «forsake» no tiene un equivalente único igual de natural, pero «abandonar» preserva mejor el peso que «dejar».
theological_decisions:
- issue: Sentido de תּוֹרָה en contexto sapiencial
  english_pob_reading: my teaching
  chosen_spanish_reading: mi enseñanza
  alternative_spanish_readings:
  - mi ley
  - mi instrucción
  rationale: Aquí תּוֹרָה funciona como instrucción autoritativa de sabiduría, no como referencia directa a la Torá mosaica. Traducirlo como «mi enseñanza» evita importar una lectura legalista que el contexto no exige.
  doctrine_reference: Principio de primacía del idioma original y distinción contextual entre instrucción sapiencial y ley pactal.
translation_notes:
  revision_awareness: El contexto auditado en inglés muestra alta concordancia y ninguna revisión sustantiva en la última pasada. La decisión principal en español es conservar la distinción entre לֶקַח y תּוֹרָתִי mediante «instrucción» / «enseñanza», evitando el calco de «ley» que el propio audit trail ya descartó para este proverbio.
  spanish_consistency_notes:
  - Se mantiene un registro neutral y contemporáneo, apto para lectura eclesial amplia.
  - «Porque» reproduce la función explicativa de כִּי de manera natural en español.
  - La nota[a] preserva la alternativa documentada entre «enseñanza», «instrucción» y el sentido tradicional de «ley».
