translation:
  language: es
  text: ¡Canten de gozo[a], cielos, y regocíjate, tierra; que los montes estallen en canto, porque Yahvé ha consolado a su pueblo y tendrá compasión de sus afligidos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Griten de alegría, cielos». El verbo hebreo también puede expresar un clamor jubiloso, no solo canto gozoso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus pobres» o «sus humildes». El término hebreo puede referirse a los afligidos, pobres o humildes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָנּוּ
  english_pob_choice: Shout for joy
  chosen_spanish: ¡Aclamad de gozo!
  alternatives_spanish:
  - Cantad de gozo
  - Clamad con gozo
  lexicon: HALOT
  rationale: El imperativo plural expresa júbilo vocal; «aclamad de gozo» conserva la fuerza exhortativa y suena natural en español poético. También mantiene abierta la alternativa de canto, como en el audit trail inglés.
- source_word: שָׁמַיִם
  english_pob_choice: heavens
  chosen_spanish: cielos
  alternatives_spanish:
  - cielo
  lexicon: HALOT
  rationale: En un paralelo cósmico con tierra y montes, el plural hebreo se vierte bien como «cielos», que preserva el registro elevado y la amplitud de la escena.
- source_word: וְגִילִי
  english_pob_choice: rejoice
  chosen_spanish: regocíjate
  alternatives_spanish:
  - alégrate
  - exulta
  lexicon: HALOT
  rationale: El imperativo femenino singular dirigido a la tierra pide un verbo de gozo intenso. «Regocíjate» corresponde bien al paralelismo con la primera línea y mantiene el tono poético.
- source_word: אָרֶץ
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: El contexto es cósmico y no una región específica; «tierra» funciona de manera directa en español y conserva el paralelismo con «cielos».
- source_word: יפצחו
  english_pob_choice: let the mountains break out
  chosen_spanish: que los montes estallen
  alternatives_spanish:
  - que los montes prorrumpan
  - que los montes broten
  lexicon: HALOT
  rationale: El verbo de exhortación poética se rinde con una construcción de mandato suave. «Estallen» comunica la energía de «break out» sin perder el carácter figurado.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  lexicon: HALOT
  rationale: «Montes» es natural en poesía bíblica española y conserva el tono más literario del hebreo, sin añadir matiz geográfico ajeno.
- source_word: רִנָּה
  english_pob_choice: in singing
  chosen_spanish: en canto
  alternatives_spanish:
  - en cántico
  - en cantos de gozo
  lexicon: HALOT
  rationale: El sustantivo denota canto/clamor jubiloso. «En canto» es breve y fiel; evita imponer una sola formulación interpretativa más amplia que el hebreo.
- source_word: נִחַם
  english_pob_choice: has comforted
  chosen_spanish: ha consolado
  alternatives_spanish:
  - ha confortado
  - ha dado consuelo a
  lexicon: HALOT
  rationale: En este contexto, נחם expresa consuelo divino. «Ha consolado» reproduce bien la acción terminada con relevancia presente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el convenio editorial del proyecto para el Tetragrámaton: «Yahvé», en lugar de la sustitución por título. Es una transliteración estable, audible y acorde con el español bíblico contemporáneo.'
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  - su nación
  lexicon: HALOT
  rationale: El sentido pactual colectivo se expresa naturalmente como «su pueblo», sin reducirlo a una entidad política.
- source_word: וַעֲנִיָּו
  english_pob_choice: his afflicted ones
  chosen_spanish: sus afligidos
  alternatives_spanish:
  - los pobres de él
  - sus humildes
  - sus necesitados
  lexicon: HALOT
  rationale: El término puede abarcar afligidos, pobres o humildes. Dado el contexto de consuelo y compasión, «afligidos» preserva la amplitud semántica mejor que restringirlo solo a pobreza económica.
- source_word: יְרַחֵם
  english_pob_choice: will have compassion on
  chosen_spanish: tendrá compasión de
  alternatives_spanish:
  - mostrará misericordia a
  - se compadecerá de
  lexicon: HALOT
  rationale: El piel imperfecto de רחם expresa compasión entrañable. «Tendrá compasión de» suena natural en español y conserva el afecto del verbo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El hebreo usa explícitamente el Nombre divino, no un título genérico. En la POB en español se preserva el nombre propio como «Yahvé», para mantener la transparencia textual y la coherencia doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor semántico de עֲנִיָּיו
  english_pob_reading: his afflicted ones
  chosen_spanish_reading: sus afligidos
  alternative_spanish_readings:
  - sus pobres
  - sus humildes
  - sus necesitados
  rationale: La cadena semántica del texto une consuelo y compasión hacia un grupo descrito por una palabra amplia. «Afligidos» evita estrechar el alcance a una sola condición socioeconómica o moral y mantiene la tensión documentada por el audit trail.
  doctrine_reference: HALOT / contexto poético-salvífico de Isaías 49:13
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés al reflejar el plural con una forma plural en español («sus afligidos») y se mantuvo el resto del versículo sin cambios sustanciales de sentido. Se preservó la nota alternativa sobre el valor verbal inicial, ahora adaptada al español con un pie de nota explícito.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para el Nombre divino.
  - Se prefirió lenguaje poético claro y contemporáneo, sin recurrir a una sustitución litúrgica por «SEÑOR».
  - El paralelismo cósmico se conserva con «cielos / tierra / montes».
  - No se introdujo terminología eclesiástica no sustentada por el hebreo.
  - Los marcadores de nota se colocaron solo donde el texto español presenta una alternativa realmente relevante.
