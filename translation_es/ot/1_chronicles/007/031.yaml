translation:
  language: es
  text: 'Los hijos de Bería: Heber y Malquiel[a]; él fue padre de Birzaít[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antepasado de» o «fundador de» Birzaít; en contextos genealógicos, «padre de» puede indicar un antepasado o el fundador de un clan o asentamiento, no necesariamente un padre biológico inmediato.
    reason: lexical_alternative
  - marker: b
    text: El nombre «Birzaít» también puede transliterarse «Birzaith», «Birzot» o «Berazot».
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Ahora bien, los hijos de
  lexicon: HALOT
  rationale: En un encabezado genealógico, el valor constructo plural introduce una sublista familiar. En español, «Los hijos de» conserva la función genealógica con naturalidad y sin recargar la coordinación inicial.
- source_word: בְרִיעָה
  english_pob_choice: Beriah
  chosen_spanish: Bería
  alternatives_spanish:
  - Beriá
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con acentuación gráfica para favorecer la lectura y mantener una forma cercana a la tradición bíblica hispana, sin alterar el nombre.
- source_word: חֶבֶר
  english_pob_choice: Heber
  chosen_spanish: Heber
  alternatives_spanish:
  - Hever
  lexicon: HALOT
  rationale: Nombre propio conservado en su transliteración habitual en español bíblico. «Hever» sería más fonética, pero menos estándar.
- source_word: וּמַלְכִּיאֵל
  english_pob_choice: and Malchiel
  chosen_spanish: y Malquiel
  alternatives_spanish:
  - y Malchiel
  lexicon: HALOT
  rationale: Se conserva el nombre propio y se vierte la conjunción explícitamente. «Malquiel» refleja mejor la pronunciación esperable en español que «Malchiel».
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - quien
  - es
  lexicon: HALOT
  rationale: El pronombre independiente retoma al referente masculino singular inmediato. «Él» preserva la sintaxis hebrea sin convertirla en una relativa interpretativa.
- source_word: אֲבִי
  english_pob_choice: the father of
  chosen_spanish: padre de
  alternatives_spanish:
  - antepasado de
  - fundador de
  lexicon: HALOT
  rationale: En contextos genealógicos, el hebreo puede señalar paternidad inmediata o relación ancestral/fundacional. El español principal mantiene «padre de» por ser la forma más literal; la ambigüedad se documenta en nota.
- source_word: ברזות
  english_pob_choice: Birzaith
  chosen_spanish: Birzaít
  alternatives_spanish:
  - Birzaith
  - Berazot
  lexicon: HALOT
  rationale: Nombre propio de forma incierta en la tradición transliterada. Se elige una adaptación española conservando la secuencia consonántica y una pronunciación natural en español; se preservan alternativas transliteradas en nota.
theological_decisions:
- issue: Valor genealógico de «padre de»
  english_pob_reading: In genealogical contexts, 'father of' may indicate a clan or settlement founder rather than an immediate biological father.
  chosen_spanish_reading: «Padre de» se mantiene en el texto principal, con nota que admite «antepasado de» o «fundador de» cuando la relación es genealógica amplia.
  alternative_spanish_readings:
  - antepasado de
  - fundador de
  rationale: El hebreo אֲבִי en genealogías no siempre describe paternidad biológica directa. Mantener la formulación literal conserva la tensión semántica y permite la lectura extendida que el propio contexto puede requerir.
  doctrine_reference: Uso genealógico bíblico de pater/filiación en listas de linaje; cf. Números 32:42; 1 Crónicas 2:50.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustantivos: el encabezado genealógico, la coordinación de los nombres y la ambigüedad de אֲבִי se preservan. La única adaptación relevante es la transliteración hispana de los nombres propios, con nota de variantes.'
  spanish_consistency_notes:
  - Se usa «Bería» para el nombre propio y «y» para coordinar los dos descendientes, en paralelo con el patrón genealógico del hebreo.
  - «Padre de» se conserva como formulación principal para no resolver de antemano la posible relación clan/fundador.
  - La acentuación de nombres propios se aplica solo para facilitar la lectura en español y no introduce una interpretación adicional.
