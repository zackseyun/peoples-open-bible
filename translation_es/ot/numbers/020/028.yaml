base_translation:
  language: en
  yaml_path: translation/ot/numbers/020/028.yaml
  text: So Moses stripped Aaron of his garments and put them on Eleazar his son[a], and Aaron died there on the top of the mountain[b]. Then Moses and Eleazar came down from the mountain.
  footnotes:
