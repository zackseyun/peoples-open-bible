translation:
  language: es
  text: Noé fue hallado justo, intachable; en el tiempo de la destrucción fue un sustituto[a]. Por causa de él quedó un remanente, y por su pacto cesó el diluvio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘un intercambio’, ‘una compensación’ o ‘un rescate’ para ‘un sustituto’. El hebreo תחליף y el griego ἀντάλλαγμα expresan la idea de algo dado en lugar de otro.
    reason: lexical_alternative
  - marker: b
    text: 'La lectura griega paralela difiere en la cláusula final y apunta hacia la venida del diluvio más que a su cese. El testimonio hebreo usado aquí lee: ‘y por su pacto cesó el diluvio’.'
    reason: textual_variant
lexical_decisions:
- source_word: נח / Νῶε
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noah
  lexicon: uso bíblico estándar
  rationale: Se conserva el nombre propio en su forma española bíblica tradicional y plenamente inteligible.
- source_word: צדיק / δίκαιος
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo delante de Dios
  lexicon: HALOT / BDAG
  rationale: ‘Justo’ reproduce la idea moral y forense de צדיק/δίκαιος en español natural. ‘Recto’ es posible, pero menos directo en este contexto.
- source_word: תמים / τέλειος
  english_pob_choice: blameless
  chosen_spanish: sin mancha
  alternatives_spanish:
  - intachable
  - íntegro
  - perfecto
  lexicon: HALOT / BDAG
  rationale: El paralelismo con ‘justo’ sugiere integridad moral, no perfección absoluta. ‘Sin mancha’ comunica bien el valor de irreprochabilidad sin sonar excesivamente técnico.
- source_word: לעת כלה / ἐν καιρῷ ὀργῆς
  english_pob_choice: at the time of destruction
  chosen_spanish: en el tiempo de la destrucción
  alternatives_spanish:
  - en el tiempo del juicio
  - cuando llegó la ruina
  - en el tiempo de la ira
  lexicon: HALOT / BDAG
  rationale: ‘Destrucción’ conserva la fuerza de כלה como ruina devastadora. No se suaviza a un mero momento cronológico.
- source_word: תחליף / ἀντάλλαγμα
  english_pob_choice: a substitute
  chosen_spanish: un sustituto
  alternatives_spanish:
  - un intercambio
  - una compensación
  - un rescate
  lexicon: HALOT / BDAG
  rationale: El término expresa algo puesto en lugar de otro. ‘Sustituto’ es la opción más clara y mantiene la tensión lexical entre intercambio y reemplazo.
- source_word: בעבורו
  english_pob_choice: Because of him
  chosen_spanish: Por causa de él
  alternatives_spanish:
  - por él
  - a causa de él
  - por su causa
  lexicon: uso contextual
  rationale: La frase causal se rinde de modo natural en español y preserva que Noé es el motivo de la preservación del resto.
- source_word: שארית / κατάλειμμα
  english_pob_choice: a remnant remained
  chosen_spanish: quedó un remanente
  alternatives_spanish:
  - quedó un resto
  - sobrevivió un remanente
  - permaneció un resto
  lexicon: HALOT / BDAG
  rationale: ‘Remanente’ conserva el valor bíblico de supervivientes preservados por juicio. ‘Quedó’ hace la cláusula idiomática en español.
- source_word: ובבריתו
  english_pob_choice: by his covenant
  chosen_spanish: por su pacto
  alternatives_spanish:
  - por medio de su pacto
  - a causa de su pacto
  - mediante su pacto
  lexicon: uso contextual
  rationale: ‘Pacto’ es el equivalente natural de בְּרִית. ‘Por’ aquí puede ser causal/instrumental y encaja con el flujo de la oración. Se evita ‘alianza’, que en español suele ser más general o político.
- source_word: חדל מבול / κατακλυσμός
  english_pob_choice: the flood ceased
  chosen_spanish: cesó el diluvio
  alternatives_spanish:
  - terminó el diluvio
  - se detuvo el diluvio
  - el diluvio cesó
  lexicon: HALOT / BDAG
  rationale: La tradición hebrea usada por la POB lee el cese del diluvio; ‘diluvio’ mantiene el registro bíblico y ‘cesó’ traduce directamente חדל.
theological_decisions:
- issue: Divergencia textual en la cláusula final entre el hebreo preservado y el griego paralelo
  english_pob_reading: 'Follow the extant Hebrew: ''and by his covenant the flood ceased'''
  chosen_spanish_reading: 'Se sigue el hebreo conservado: ‘por su pacto cesó el diluvio’.'
  alternative_spanish_readings:
  - la lectura griega sugiere algo como ‘por esto vino un diluvio’
  - por esto se produjo un diluvio sobre la tierra
  rationale: En Sirácida, cuando el hebreo está disponible, la política del proyecto da prioridad al testimonio hebreo. Aquí el hebreo de Kahana lee con claridad el cese del diluvio, mientras que el griego paralelo apunta en otra dirección. Como la divergencia afecta el sentido, la lectura principal sigue el hebreo y la alternativa griega se conserva en nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirach desde el hebreo donde se conserva; preservar honestamente la incertidumbre de la fuente'
- issue: Sentido de תמים junto a צדיק
  english_pob_reading: righteous, blameless
  chosen_spanish_reading: justo, sin mancha
  alternative_spanish_readings:
  - justo, íntegro
  - recto, intachable
  - justo, perfecto
  rationale: No se fuerza una perfección absoluta. La pareja de términos comunica integridad moral reconocida ante Dios y ante la comunidad.
  doctrine_reference: Uso semántico del paralelismo poético en literatura sapiencial
- issue: Valor de תחליף / ἀντάλλαγμα
  english_pob_reading: a substitute
  chosen_spanish_reading: un sustituto
  alternative_spanish_readings:
  - un intercambio
  - una compensación
  - un rescate
  rationale: Se preserva la tensión entre sustitución e intercambio sin reducir el término a una sola categoría técnica. El contexto narrativo permite la idea de alguien puesto en lugar de otros.
  doctrine_reference: Semántica léxica de intercambio/sustitución en literatura sapiencial
translation_notes:
  revision_awareness: Se revisó el pasaje con prioridad al hebreo conservado, en consonancia con la política de Sirácida del proyecto. No se requieren cambios respecto al pase más reciente; la redacción española mantiene la tensión textual final entre el hebreo y el griego mediante nota.
  spanish_consistency_notes:
  - Se emplea ‘Yahvé’ no porque aparezca en este versículo, sino como norma del proyecto cuando corresponda.
  - ‘Pacto’ se usa de manera consistente para בְּרִית.
  - ‘Remanente’ preserva la resonancia bíblica de שארית/kataλειμμα.
  - La formulación ‘cesó el diluvio’ mantiene el valor de חדל sin introducir una paráfrasis explicativa.
