  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. La decisión clave es ἀχαρίστου: conviene usar «ingrato» en texto principal por naturalidad y mantener «desagradecido» como alternativa explicativa en nota, preservando el énfasis en la falta de gratitud documentado por el audit trail inglés.'
