  text: Ἀλλὰ οὐαὶ ὑμῖν τοῖς Φαρισαίοις, ὅτι ἀποδεκατοῦτε τὸ ἡδύοσμον καὶ τὸ πήγανον καὶ πᾶν λάχανον, καὶ παρέρχεσθε τὴν κρίσιν καὶ τὴν ἀγάπην τοῦ θεοῦ· ταῦτα ⸀δὲ ἔδει ποιῆσαι κἀκεῖνα μὴ ⸀παρεῖναι.
translation:
  text: 'But woe to you Pharisees, because you tithe mint and rue and every herb, and you pass by justice and the love of God. These things you ought to have done, without neglecting those things.'
