translation:
  language: es
  text: Entonces los ancianos de su ciudad mandarán por él, lo tomarán de allí y lo entregarán en manos del vengador de la sangre[a], y morirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el vengador de sangre». La expresión hebrea גֹּאֵל הַדָּם es un término jurídico técnico para la persona responsable de vengar la sangre derramada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁלְחוּ
  english_pob_choice: shall send
  chosen_spanish: lo enviarán
  alternatives_spanish:
  - deberán enviarlo
  - lo mandarán
  lexicon: HALOT
  rationale: En español legal y narrativo, el futuro simple expresa con naturalidad la obligación/instrucción del texto, sin volverlo demasiado rígido. Mantiene el valor injuntivo que el inglés POB marcó con 'shall send'.
- source_word: זִקְנֵי עִירוֹ
  english_pob_choice: the elders of his city
  chosen_spanish: los ancianos de su ciudad
  alternatives_spanish:
  - los ancianos de su pueblo
  - los líderes de su ciudad
  lexicon: HALOT
  rationale: '''Ancianos'' conserva el cargo comunitario/jurídico de זִקְנֵי; ''ciudad'' mantiene la referencia administrativa habitual. ''Su ciudad'' sigue el posesivo del hebreo.'
- source_word: וְלָקְחוּ אֹתוֹ מִשָּׁם
  english_pob_choice: take him from there
  chosen_spanish: lo tomarán de allí
  alternatives_spanish:
  - lo sacarán de allí
  - lo llevarán de allí
  lexicon: HALOT
  rationale: '''Tomar'' reproduce literalmente לקח sin añadir una acción más fuerte como ''sacar'' o ''arrestar''. ''De allí'' conserva el referente espacial del lugar de refugio sin explicitarlo más de lo que el verso dice.'
- source_word: וְנָתְנוּ אֹתוֹ בְּיַד
  english_pob_choice: hand him over to
  chosen_spanish: lo entregarán en manos de
  alternatives_spanish:
  - lo pondrán en manos de
  - lo entregarán al cuidado de
  lexicon: HALOT
  rationale: La locución hebrea 'dar en mano de' se refleja con la expresión española equivalente 'entregar en manos de', que conserva el matiz de transferencia de poder/custodia. No se suaviza a una mera 'entrega' abstracta.
- source_word: גֹּאֵל הַדָּם
  english_pob_choice: the avenger of blood
  chosen_spanish: el vengador de la sangre
  alternatives_spanish:
  - el vengador de sangre
  - el redentor de la sangre
  lexicon: HALOT
  rationale: Se preserva el término legal fuerte de גֹּאֵל הַדָּם. 'Vengador de la sangre' refleja el valor técnico del título en el contexto de homicidio, y evita sustituirlo por una glosa menos precisa. 'Redentor' no se usa aquí porque en este contexto jurídico el foco es la represalia por sangre derramada.
- source_word: וָמֵת
  english_pob_choice: and he shall die
  chosen_spanish: y morirá
  alternatives_spanish:
  - y morirá allí
  - y habrá de morir
  lexicon: HALOT
  rationale: El hebreo expresa el resultado legal de forma breve; 'y morirá' mantiene esa concisión y el valor de consecuencia/judicio sin añadir sujeto explícito adicional ni perífrasis interpretativa.
theological_decisions:
- issue: Traducción del término legal גֹּאֵל הַדָּם
  english_pob_reading: a technical legal expression for the person responsible to avenge the shedding of blood
  chosen_spanish_reading: un título jurídico técnico para la persona responsable de vengar la sangre derramada
  alternative_spanish_readings:
  - el vengador de la sangre
  - el pariente vengador
  rationale: En español, 'vengador de la sangre' conserva la fuerza legal y retributiva del hebreo y del audit trail en inglés. Se evita 'pariente vengador' porque, aunque puede describir la figura social, no expresa tan claramente la función jurídica aquí.
  doctrine_reference: Lexical/theological note on biblical civil law and blood-vengeance terminology; no doctrinal controversy beyond legal semantics.
translation_notes:
  revision_awareness: 'Coincide con el juicio del control cruzado: alta concordancia con la fuente y sin revisiones necesarias en el pasaje base. La redacción española conserva el flujo legal del hebreo y la decisión terminológica del POB inglés para גֹּאֵל הַדָּם.'
  spanish_consistency_notes:
  - Se mantiene un registro legal claro y sobrio, adecuado para ley mosaica.
  - Se conserva el futuro prescriptivo en español para reflejar la fuerza injuntiva del hebreo.
  - '''Vengador de la sangre'' se usa consistentemente como término técnico, con nota alternativa para la variante sin artículo.'
  - No se introduce 'SEÑOR' ni otros equivalentes no presentes en el verso.
