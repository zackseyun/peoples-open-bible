translation:
  language: es
  text: 'Dos cosas te he pedido[a]; no me las retengas antes de que muera:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Dos [cosas] te he pedido». El sustantivo «cosas» está implícito en el hebreo y se añade en español por claridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתַּיִם
  english_pob_choice: Two things
  chosen_spanish: Dos cosas
  alternatives_spanish:
  - Dos
  lexicon: HALOT
  rationale: El numeral femenino dual/ellíptico en hebreo funciona aquí como dos peticiones u objetos implícitos. En español, 'cosas' hace explícito el sustantivo elidido de manera natural, sin añadir contenido ajeno al contexto inmediato.
- source_word: שָׁאַלְתִּי
  english_pob_choice: I have asked
  chosen_spanish: te he pedido
  alternatives_spanish:
  - te pedí
  - he solicitado
  lexicon: HALOT
  rationale: '''Pedir'' comunica bien la acción de suplicar o solicitar en un contexto de oración. El perfecto compuesto español conserva el valor de una petición ya formulada que sigue vigente.'
- source_word: מֵאִתָּךְ
  english_pob_choice: of you
  chosen_spanish: te
  alternatives_spanish:
  - de ti
  - de ti, a ti
  lexicon: HALOT
  rationale: Con 'pedir' en español, el complemento de persona se expresa de forma natural con clítico ('te'). Esto mantiene la relación de origen/destinatario sin forzar una construcción menos idiomática.
- source_word: אַל
  english_pob_choice: do not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no quieras
  - no permitas
  lexicon: HALOT
  rationale: La partícula prohibitiva se traduce de forma directa con 'no' ante el verbo en subjuntivo/imperfecto de mandato negativo implícito. En español, esa estructura expresa la súplica con claridad.
- source_word: תִּמְנַע
  english_pob_choice: withhold
  chosen_spanish: niegues
  alternatives_spanish:
  - retengas
  - prives
  - restringas
  lexicon: HALOT
  rationale: מנע puede expresar retener, impedir o negar. En este contexto de petición, 'negar' comunica la idea de no conceder lo pedido; se prefiere por naturalidad en español, sin perder la fuerza de la negativa.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: a mí
  alternatives_spanish:
  - de mí
  lexicon: HALOT
  rationale: Con el verbo 'negar' en español, el complemento personal se expresa normalmente con 'a mí'. Aunque la relación preposicional del hebreo es 'de/desde', la construcción española conserva el sentido de privación de algo solicitado.
- source_word: בְּטֶרֶם
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes de
  lexicon: HALOT
  rationale: '''Antes de que'' introduce con claridad el límite temporal previo a la muerte, y encaja de modo natural con el verbo en subjuntivo en español.'
- source_word: אָמֽוּת
  english_pob_choice: I die
  chosen_spanish: muera
  alternatives_spanish:
  - muera yo
  - llegue a morir
  lexicon: HALOT
  rationale: El verbo hebreo marca una acción futura respecto al momento de la súplica; en español, el subjuntivo 'muera' funciona de manera idiomática tras 'antes de que'. La primera persona queda clara por el contexto y por 'a mí'.
translation_notes:
  revision_awareness: 'Alineado con el audit trail inglés: se preserva la elipsis de ‘things’ mediante una expansión natural en español, y se mantiene el valor de petición verbal y el límite temporal ‘before I die’ sin suavizar la fuerza del negativo.'
  spanish_consistency_notes:
  - Se usa 'pedir' para שאל en vez de 'solicitar' por registro bíblico natural y para mantener tono de súplica.
  - Se evita 'SEÑOR' o terminología no presente en el versículo; no hay referencia al nombre divino en este texto.
  - La nota [a] ancla solo la elipsis de 'cosas', igual que en el inglés auditado.
