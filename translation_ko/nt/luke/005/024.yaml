  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἵνα δὲ εἰδῆτε ὅτι ⸂ὁ υἱὸς τοῦ ἀνθρώπου ἐξουσίαν ἔχει⸃ ἐπὶ τῆς γῆς ἀφιέναι ἁμαρτίας— εἶπεν τῷ παραλελυμένῳ· Σοὶ λέγω, ⸀ἔγειρε καὶ ἄρας τὸ κλινίδιόν σου πορεύου εἰς τὸν οἶκόν σου.
base_translation:
  language: en
  yaml_path: translation/nt/luke/005/024.yaml
  text: But so that you may know that the Son of Man has authority on earth to forgive sins—he said to the paralyzed man[a], “I say to you, rise, pick up your mat[b], and go to your house.”
  footnotes:
  - marker: a
    text: Or 'the Human One.' The Greek title 'the Son of Man' is retained because it is Jesus' self-designation and carries important biblical resonance, especially with Daniel 7.
    reason: alternative_reading
  - marker: b
    text: Or 'take up your bed.' The Greek κλινίδιον refers to a small bed, pallet, or mat.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 너희가 인자[a]에게 땅에서 죄를 용서할 권세가 있음을 알게 하려는 것이다.」 — 그분께서 중풍병자에게 말씀하셨습니다. — 「내가 너에게 말하니, 일어나 침상을 들고 네 집으로 가라.」
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 「ὁ υἱὸς τοῦ ἀνθρώπου」는 단 7:13의 메시아적 칭호이며, 본 번역은 한국 성경 전통의 「인자」를 유지한다.
    reason: cultural_note
