translation:
  language: es
  text: 'Y Jesús, clamando a gran voz, dijo: «Padre, en tus manos encomiendo[a] mi espíritu». Después de decir esto[b], expiró[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confío mi espíritu». El verbo puede significar poner algo bajo el cuidado de otra persona.
    reason: lexical_alternative
  - marker: b
    text: 'Esta frase hace eco de Salmo 31:5 en las Escrituras griegas: «En tus manos encomiendo mi espíritu».'
    reason: cross_reference
  - marker: c
    text: O simplemente «murió»; literalmente, el verbo se refiere a exhalar el último aliento.
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνήσας φωνῇ μεγάλῃ
  english_pob_choice: crying out with a loud voice
  chosen_spanish: clamando a gran voz
  alternatives_spanish:
  - gritando con voz fuerte
  - dando un gran clamor
  lexicon: BDAG
  rationale: La combinación verbal más natural en español para una exclamación solemne y enérgica es 'clamando a gran voz'. Conserva tanto el acto de emitir un clamor como el énfasis en la intensidad de la voz sin sonar rígida o redundante.
- source_word: Πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Padre mío
  lexicon: BDAG
  rationale: Es un vocativo directo. No se añade 'mío' porque no está en el griego y la forma simple 'Padre' ya expresa con claridad la dirección de la oración.
- source_word: εἰς χεῖράς σου
  english_pob_choice: into your hands
  chosen_spanish: en tus manos
  alternatives_spanish:
  - dentro de tus manos
  - a tus manos
  lexicon: BDAG
  rationale: La imagen idiomática se conserva con 'en tus manos', que en español transmite adecuadamente la entrega a la custodia de alguien. El plural 'manos' refleja la forma griega y mantiene el eco intertextual de Salmo 31:5.
- source_word: παρατίθεμαι
  english_pob_choice: I commit
  chosen_spanish: encomiendo
  alternatives_spanish:
  - confío
  - entrego
  lexicon: BDAG
  rationale: '''Encomiendo'' expresa bien la acción de poner algo al cuidado de otro y funciona con dignidad litúrgica en español. Preserva la fuerza de la entrega personal implícita en el verbo medio sin volverlo explicativo de más.'
- source_word: τὸ πνεῦμά μου
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi aliento
  - mi vida
  lexicon: BDAG
  rationale: En este contexto de oración consciente y de entrega al Padre, 'espíritu' es la opción principal más fiel al peso lexical y teológico del griego. 'Aliento' o 'vida' reducirían demasiado el alcance del término.
- source_word: τοῦτο δὲ εἰπών
  english_pob_choice: Having said this
  chosen_spanish: Habiendo dicho esto
  alternatives_spanish:
  - Y después de decir esto
  - Cuando hubo dicho esto
  lexicon: BDAG
  rationale: El participio aoristo se expresa de forma natural con 'Habiendo dicho esto', que marca correctamente la acción previa a la oración principal y suena idiomático en español.
- source_word: ἐξέπνευσεν
  english_pob_choice: he breathed his last
  chosen_spanish: expiró
  alternatives_spanish:
  - respiró por última vez
  - murió
  lexicon: BDAG
  rationale: '''Expiró'' conserva la relación etimológica con la expiración del aliento y es una forma sobria, clara y reverente en español. También deja ver la tensión entre el sentido literal de ''exhalar'' y el sentido idiomático de morir.'
theological_decisions:
- issue: Sentido de πνεῦμά μου en la despedida de Jesús
  english_pob_reading: my spirit
  chosen_spanish_reading: mi espíritu
  alternative_spanish_readings:
  - mi aliento
  rationale: Se mantiene 'espíritu' porque el texto presenta una entrega consciente y personal al Padre, no solo un dato fisiológico. Esto preserva la tensión teológica del pasaje sin imponer una explicación doctrinal extra al versículo.
  doctrine_reference: Evitar resolver la relación entre espíritu y muerte de Jesús más allá de lo que el texto dice; mantener la tensión lexical y teológica.
- issue: Valor de ἐξέπνευσεν al final del relato
  english_pob_reading: he breathed his last
  chosen_spanish_reading: expiró
  alternative_spanish_readings:
  - murió
  - respiró por última vez
  rationale: '''Expiró'' permite comunicar la muerte real de Jesús y, al mismo tiempo, mantiene el matiz literal del verbo griego relacionado con el acto de exhalar. Así se conserva la sobriedad narrativa sin perder la imagen verbal.'
  doctrine_reference: Equivalencia óptima; preservar la imagen verbal y el hecho de la muerte.
- issue: Eco de Salmo 31:5 en la frase de Jesús
  english_pob_reading: This saying echoes Psalm 31:5 in the Greek Scriptures
  chosen_spanish_reading: Esta frase hace eco de Salmo 31:5
  alternative_spanish_readings:
  - Esta declaración recuerda Salmo 31:5
  - Estas palabras evocan Salmo 31:5
  rationale: Aunque el eco intertextual no se inserta en el texto principal, se registra para que la decisión de 'encomiendo' y 'en tus manos' quede auditable. El paralelismo con el salmo apoya la traducción y evita perder la referencia bíblica implícita.
  doctrine_reference: Intertextualidad bíblica; mantener el eco con la Escritura griega del AT.
translation_notes:
  revision_awareness: Se revisó la coherencia con la versión inglesa POB y no se detectaron cambios posteriores relevantes; la redacción española mantiene el mismo perfil de equivalencia óptima, el mismo eco de Salmo 31:5 y la misma tensión lexical entre 'espíritu' y el matiz físico de 'expiró'.
  spanish_consistency_notes:
  - Se mantiene el vocativo «Padre» sin posesivo añadido, conforme al griego.
  - «En tus manos» conserva el plural y el eco textual con Salmo 31:5.
  - Se eligió «encomiendo» por su valor de entrega confiada y su registro natural en español.
  - «Expiró» preserva tanto la claridad narrativa como la imagen verbal del griego.
  - Los marcadores de nota [a], [b] y [c] aparecen en el texto principal con la misma función auditada que en el contexto inglés.
