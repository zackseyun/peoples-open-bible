revisions:
- from: ¡Oh madre[a], soldado de la piedad de Dios, aunque anciana y mujer, por la constancia venciste incluso a un tirano, y en obras y palabras fuiste hallada más fuerte que un hombre.
  to: ¡Oh madre[a], soldado de la devoción a Dios! Aunque anciana y mujer, por la constancia venciste incluso a un tirano, y en obras y palabras fuiste hallada más fuerte que un hombre.
  rationale: Se corrige εὐσέβειαν θεοῦ a una formulación idiomática y fiel en español («devoción a Dios»), evitando la ambigüedad de «piedad de Dios». Se mantiene «soldado» para conservar la imagen marcial, así como el contraste explícito «mujer» / «hombre». También se ajusta la puntuación para una exclamación inicial bien formada en español.
