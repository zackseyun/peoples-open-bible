    text: Or 'find him' or 'overtake him' for 'come upon him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'before him' may be understood more forcefully as 'against him' in context, since the song functions as a witness.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'his inclination' (or 'intent/imagination'), referring to his inner disposition.
    reason: lexical_alternative
  - marker: d
    text: Hebrew simply 'that I swore'; 'to give' is implied by context and parallel covenant-language.
    reason: lexical_alternative
