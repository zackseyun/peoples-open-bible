translation:
  language: es
  text: 'Y ella dijo a su padre: «No se enoje mi señor conmigo[a], porque no puedo levantarme delante de ti, pues me sucede lo propio de las mujeres». Y él buscó, pero no encontró los ídolos domésticos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en los ojos de mi señor». La frase puede entenderse también como: «No le parezca mal a mi señor».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los terafines», término para imágenes o ídolos de culto doméstico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: And she said
  chosen_spanish: Y ella dijo
  alternatives_spanish:
  - Entonces ella dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se conserva con una coordinación simple que mantiene el avance del relato sin añadir interpretación.
- source_word: אָבִיהָ
  english_pob_choice: her father
  chosen_spanish: su padre
  alternatives_spanish:
  - a su padre
  lexicon: HALOT
  rationale: El posesivo está implícito en español por el contexto; la referencia a Labán queda clara sin sobrecargar la frase.
- source_word: אַל יִחַר בְּעֵינֵי אֲדֹנִי
  english_pob_choice: Let not my lord be angry in your sight
  chosen_spanish: No se encienda mi señor contra mí
  alternatives_spanish:
  - Que no se enoje mi señor conmigo
  - No le parezca mal a mi señor
  lexicon: HALOT
  rationale: יִחַר proviene de חרה, literalmente ‘arder’; por eso se mantiene una imagen verbal de encenderse/enojarse. Se evita una calca como ‘en tus ojos’ y se expresa el sentido idiomático con naturalidad en español, conservando el tono deferente de ‘mi señor’ aplicado al padre.
- source_word: לֹא אוּכַל לָקוּם מִפָּנֶיךָ
  english_pob_choice: that I cannot rise before you
  chosen_spanish: porque no puedo levantarme delante de ti
  alternatives_spanish:
  - porque no puedo ponerme de pie delante de ti
  - porque no puedo alzarme en tu presencia
  lexicon: HALOT
  rationale: קום se traduce con ‘levantarme’, que es natural y conserva el sentido físico de ponerse en pie. מִפָּנֶיךָ se rinde con ‘delante de ti’, manteniendo la noción de presencia personal.
- source_word: דֶרֶךְ נָשִׁים לִי
  english_pob_choice: for the way of women is upon me
  chosen_spanish: pues me sucede lo propio de las mujeres
  alternatives_spanish:
  - pues tengo lo propio de las mujeres
  - pues estoy en la costumbre de las mujeres
  lexicon: HALOT
  rationale: Se preserva el eufemismo hebreo sobre la menstruación sin volverlo clínico ni brusco. ‘Lo propio de las mujeres’ comunica el registro discreto del hebreo y resulta comprensible en español moderno.
- source_word: וַיְחַפֵּשׂ
  english_pob_choice: So he searched
  chosen_spanish: Y él buscó
  alternatives_spanish:
  - Entonces buscó
  - Y él registró
  lexicon: HALOT
  rationale: El verbo expresa una búsqueda minuciosa; ‘buscó’ es natural en español y suficiente en contexto, con el sujeto explícito por claridad narrativa.
- source_word: וְלֹא מָצָא
  english_pob_choice: but did not find
  chosen_spanish: pero no encontró
  alternatives_spanish:
  - y no halló
  - sin encontrar
  lexicon: HALOT
  rationale: La adversación se expresa con ‘pero’, como en el flujo narrativo natural del español.
- source_word: הַתְּרָפִים
  english_pob_choice: the household idols
  chosen_spanish: los ídolos domésticos
  alternatives_spanish:
  - los terafines
  - los ídolos del hogar
  lexicon: HALOT
  rationale: תרפים designa objetos de culto doméstico; ‘ídolos domésticos’ comunica su función religiosa y su ámbito familiar, siguiendo la decisión del audit trail de traducir el término en vez de transliterarlo en el texto principal.
theological_decisions:
- issue: Rendering of תְּרָפִים
  english_pob_reading: household idols
  chosen_spanish_reading: ídolos domésticos
  alternative_spanish_readings:
  - terafines
  - ídolos del hogar
  rationale: La elección subraya que no se trata de simples objetos decorativos sino de imágenes o cultos domésticos. Se evita la transliteración en el texto principal para mantener inteligibilidad y fuerza religiosa, dejando abiertas alternativas lexicales en notas o glosa.
  doctrine_reference: 'Principio POB: primacía del texto original con español claro; no suavizar la referencia idolátrica.'
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión sobre el giro idiomático de אַל יִחַר בְּעֵינֵי אֲדֹנִי, donde se descartó una calca poco natural y se reafirmó la necesidad de reflejar el hebreo con una expresión idiomática. En español se optó por una formulación natural que conserva tanto el tono respetuoso como la imagen de ‘encenderse’ ligada a חרה, y se mantuvo el cierre sobre los terafines como ídolos domésticos.
  spanish_consistency_notes:
  - Se conserva ‘Y ella dijo’ para el avance narrativo de wayyiqtol.
  - ‘Mi señor’ mantiene el registro deferente del hebreo sin implicar una referencia divina.
  - Se evita ‘SEÑOR’ en mayúsculas porque aquí אֲדֹנִי es un tratamiento humano, no el nombre divino.
  - ‘Ídolos domésticos’ mantiene la carga religiosa del término תְּרָפִים y evita una transliteración innecesaria en el cuerpo del texto.
  - Las notas a pie preservan la alternativa lexical documentada en el auditor inglés y aclaran el término hebreo de forma breve.
