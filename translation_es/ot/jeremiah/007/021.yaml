    issue: La nota [a] está colocada sobre «la carne» en vez de sobre «sus sacrificios».
    rationale: La nota explica la alternativa léxica de זִבְחֵיכֶם («sus sacrificios» / «sus sacrificios de paz»), no בָשָׂר («carne»). El anclaje actual induce a pensar que la nota comenta «carne», lo cual distorsiona la información del audit trail.
  revised_spanish_text: 'Así dice Yahvé de los ejércitos, Dios de Israel: Añadan sus holocaustos a sus sacrificios[a], y coman la carne.'
  revised_footnotes:
