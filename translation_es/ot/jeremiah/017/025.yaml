translation:
  language: es
  text: Entonces entrarán por las puertas de esta ciudad reyes y oficiales, sentados en el trono de David, montando en carros y a caballo; ellos y sus oficiales, los hombres de Judá[a] y los habitantes de Jerusalén. Y esta ciudad será habitada para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pueblo de Judá». El hebreo dice literalmente «hombre de Judá», usado en sentido colectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאוּ
  english_pob_choice: then ... will enter
  chosen_spanish: Entonces entrarán
  alternatives_spanish:
  - y entrarán
  - entonces vendrán
  lexicon: HALOT
  rationale: El hebreo continúa la consecuencia del contexto previo; «Entonces» hace explícita la relación apodótica, y «entrarán» conserva la idea de movimiento de entrada que sigue a «por las puertas».
- source_word: בְּשַׁעֲרֵי הָעִיר הַזֹּאת
  english_pob_choice: through the gates of this city
  chosen_spanish: por las puertas de esta ciudad
  alternatives_spanish:
  - a las puertas de esta ciudad
  - a través de las puertas de esta ciudad
  lexicon: HALOT
  rationale: Con בוא + ב, la imagen es de acceso mediante las puertas; en español «por las puertas» es natural y transmite la entrada formal a la ciudad.
- source_word: מְלָכִים וְשָׂרִים
  english_pob_choice: kings and officials
  chosen_spanish: reyes y oficiales
  alternatives_spanish:
  - reyes y príncipes
  - reyes y gobernantes
  lexicon: HALOT
  rationale: שָׂרִים abarca líderes, funcionarios o cortesanos. «Oficiales» es amplio, claro y evita introducir una connotación nobiliaria más fuerte que la del hebreo.
- source_word: יֹשְׁבִים עַל כִּסֵּא דָוִד
  english_pob_choice: sitting on the throne of David
  chosen_spanish: sentados en el trono de David
  alternatives_spanish:
  - sentados sobre el trono de David
  - entronizados en el trono de David
  lexicon: HALOT
  rationale: El participio describe la condición real de los reyes; «sentados en el trono de David» conserva la imagen y la referencia dinástica sin explicitar más de lo que el texto dice.
- source_word: רֹכְבִים בָּרֶכֶב וּבַסּוּסִים
  english_pob_choice: riding in chariots and on horses
  chosen_spanish: montando en carros y en caballos
  alternatives_spanish:
  - cabalgando en carros y caballos
  - montados en carros y caballos
  lexicon: HALOT
  rationale: El hebreo contrapone carro y caballos como medios de desplazamiento regio. «Montando» es idiomático en español y mantiene la imagen de dignidad militar/real.
- source_word: הֵמָּה וְשָׂרֵיהֶם
  english_pob_choice: they and their officials
  chosen_spanish: ellos y sus oficiales
  alternatives_spanish:
  - ellos y sus príncipes
  - ellos y sus líderes
  lexicon: HALOT
  rationale: El pronombre resume al grupo real antes de añadir a sus acompañantes. Se conserva la misma elección léxica para שָׂרִים como «oficiales».
- source_word: אִישׁ יְהוּדָה
  english_pob_choice: the men of Judah
  chosen_spanish: los hombres de Judá
  alternatives_spanish:
  - el pueblo de Judá
  - cada hombre de Judá
  lexicon: HALOT
  rationale: Literalmente es «hombre de Judá», usado colectivamente. «Los hombres de Judá» preserva la forma masculina colectiva sin neutralizarla innecesariamente.
- source_word: וְיֹשְׁבֵי יְרוּשָׁלָ͏ִם
  english_pob_choice: and the inhabitants of Jerusalem
  chosen_spanish: y los habitantes de Jerusalén
  alternatives_spanish:
  - y los moradores de Jerusalén
  - y los residentes de Jerusalén
  lexicon: HALOT
  rationale: Es una expresión colectiva estándar para la población de la ciudad; «habitantes» es natural, formal y fiel.
- source_word: וְיָשְׁבָה הָעִיר הַזֹּאת
  english_pob_choice: and this city will be inhabited
  chosen_spanish: y esta ciudad será habitada
  alternatives_spanish:
  - y esta ciudad permanecerá habitada
  - y esta ciudad estará habitada
  lexicon: HALOT
  rationale: Con ciudad como sujeto, ישב expresa el estado de estar habitada, no que la ciudad «se siente»; la pasiva en español reproduce bien el sentido.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: «Para siempre» es la equivalencia más natural y solemne en español para la continuidad indefinida de לעולם.
theological_decisions:
- issue: Referencia dinástica en «el trono de David»
  english_pob_reading: Retain the explicit Davidic throne language without paraphrasing it into a generalized idea of legitimate rule.
  chosen_spanish_reading: Mantener «el trono de David» de forma explícita, sin convertirlo en una idea generalizada de gobierno legítimo.
  alternative_spanish_readings:
  - el trono real de David
  - el trono davídico
  rationale: La frase tiene peso pactal y monárquico en Jeremías; el español debe conservar esa transparencia sin añadir una expansión cristológica que el texto aquí no formula.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor colectivo y forma masculina en אִישׁ יְהוּדָה
  english_pob_reading: Render as 'the men of Judah' in the main text.
  chosen_spanish_reading: Usar «los hombres de Judá» en el texto principal.
  alternative_spanish_readings:
  - el pueblo de Judá
  - los habitantes de Judá
  rationale: El hebreo usa el singular masculino de manera colectiva. Se preserva la forma masculina, mientras el contexto deja claro el sentido colectivo.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y no introdujo cambios; esta versión sigue de cerca la línea ya aprobada, manteniendo el mismo valor léxico para שָׂרִים, la referencia explícita al trono de David y la lectura colectiva de אִישׁ יְהוּדָה.
  spanish_consistency_notes:
  - Se mantiene «oficiales» para שָׂרִים en todo el versículo.
  - Se conserva «trono de David» sin paráfrasis teológica.
  - «Los hombres de Judá» preserva el masculino colectivo del hebreo.
  - «Para siempre» refleja la duración indefinida de לְעוֹלָם con español natural.
