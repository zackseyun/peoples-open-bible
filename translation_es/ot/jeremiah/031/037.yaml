  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה אִם יִמַּ֤דּוּ שָׁמַ֨יִם֙ מִ/לְ/מַ֔עְלָ/ה וְ/יֵחָקְר֥וּ מֽוֹסְדֵי אֶ֖רֶץ לְ/מָ֑טָּה גַּם אֲנִ֞י אֶמְאַ֨ס בְּ/כָל זֶ֧רַע יִשְׂרָאֵ֛ל עַֽל כָּל אֲשֶׁ֥ר עָשׂ֖וּ נְאֻם יְהוָֽה׀־־־־־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/031/037.yaml
  text: 'Thus says Yahweh: If the heavens above can be measured[a], and the foundations of the earth below can be searched out, then I also will reject all the offspring of Israel for all that they have done, declares Yahweh.'
  footnotes:
