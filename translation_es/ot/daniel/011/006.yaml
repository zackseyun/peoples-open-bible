translation:
  language: es
  text: Al cabo de años se unirán[a], y la hija del rey del Sur vendrá al rey del Norte para hacer un acuerdo. Pero no retendrá la fuerza de su brazo, y él y su brazo no permanecerán; y ella será entregada, junto con los que la trajeron, y el que la engendró[b], y el que la sostenía en aquellos tiempos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se aliarán»; o «se unirán para concertar términos equitativos». El hebreo dice literalmente «hacer rectitudes/equidades».'
    reason: lexical_alternative
  - marker: b
    text: La forma hebrea es masculina; por eso se traduce «el que la engendró». Algunas versiones entienden «el hijo» o proponen otro referente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְקֵץ שָׁנִים
  english_pob_choice: At the end of years
  chosen_spanish: Al cabo de años
  alternatives_spanish:
  - Al final de años
  - Al término de años
  lexicon: HALOT
  rationale: La expresión hebrea señala el transcurso de un período de años. «Al cabo de años» conserva la idea de plazo cumplido y suena natural en español bíblico actual sin perder la estructura temporal.
- source_word: יִתְחַבָּרוּ
  english_pob_choice: they will join together
  chosen_spanish: se unirán
  alternatives_spanish:
  - se aliarán
  - se juntarán
  lexicon: HALOT
  rationale: El hitpael de חבר puede expresar unirse o aliarse. «Se unirán» mantiene la amplitud del verbo y permite el matiz político sin forzarlo.
- source_word: וּבַת מֶלֶךְ הַנֶּגֶב
  english_pob_choice: the daughter of the king of the South
  chosen_spanish: la hija del rey del Sur
  alternatives_spanish:
  - una hija del rey del Sur
  lexicon: HALOT
  rationale: La cadena constructa se entiende como definida por el contexto. «Rey del Sur» preserva la designación política estable de Daniel 11.
- source_word: תָּבוֹא אֶל מֶלֶךְ הַצָּפוֹן
  english_pob_choice: will come to the king of the North
  chosen_spanish: vendrá al rey del Norte
  alternatives_spanish:
  - irá al rey del Norte
  lexicon: HALOT
  rationale: בוא puede traducirse «venir» o «ir» según el punto de vista. «Vendrá a» es idiomático en español y mantiene el movimiento hacia el rey del Norte.
- source_word: לַעֲשׂוֹת מֵישָׁרִים
  english_pob_choice: to make an agreement
  chosen_spanish: para hacer un acuerdo
  alternatives_spanish:
  - para concertar términos equitativos
  - para establecer una alianza justa
  lexicon: HALOT
  rationale: מֵישָׁרִים literalmente apunta a rectitud/equidad. En este contexto diplomático, «hacer un acuerdo» comunica el sentido relacional o político; el matiz de equidad queda implícito en la base léxica y puede explicarse en nota.
- source_word: כּוֹחַ הַזְּרֹעַ
  english_pob_choice: the strength of her arm
  chosen_spanish: la fuerza de su brazo
  alternatives_spanish:
  - el poder de su brazo
  - la fuerza de su brazo/fortaleza
  lexicon: HALOT
  rationale: כּוֹחַ es «fuerza» o «poder», y זְרוֹעַ funciona metafóricamente como brazo/poder. «Fuerza de su brazo» conserva la imagen corporal y el valor figurado.
- source_word: וְלֹא יַעֲמֹד וּזְרֹעוֹ
  english_pob_choice: he and his arm will not stand
  chosen_spanish: y él y su brazo no permanecerán
  alternatives_spanish:
  - y él y su brazo no se mantendrán
  - y él y su poder no permanecerán
  lexicon: HALOT
  rationale: עָמַד aquí expresa permanecer o mantenerse firme. «No permanecerán» mantiene el hebraísmo con claridad; «su brazo» conserva la metáfora de poder o apoyo.
- source_word: וְתִנָּתֵן הִיא
  english_pob_choice: she will be given up
  chosen_spanish: y ella será entregada
  alternatives_spanish:
  - y ella será puesta en manos de otros
  - y ella será entregada en abandono
  lexicon: HALOT
  rationale: El nifal de נתן expresa ser entregada o puesta en manos ajenas. «Será entregada» es directo y fiel al pasivo hebreo.
- source_word: וּמְבִיאֶיהָ
  english_pob_choice: those who brought her
  chosen_spanish: los que la trajeron
  alternatives_spanish:
  - sus acompañantes
  - los que la escoltaron
  lexicon: HALOT
  rationale: El participio con sufijo se refiere a quienes la llevaron allí. «Los que la trajeron» es la forma más directa y transparente.
- source_word: וְהַיֹּלְדָהּ
  english_pob_choice: the one who fathered her
  chosen_spanish: el que la engendró
  alternatives_spanish:
  - el que la procreó
  - el que la dio a luz
  lexicon: HALOT
  rationale: La forma masculina del participio apunta al progenitor varón. «El que la engendró» respeta la tensión gramatical y evita neutralizarla con una lectura tradicional incorrecta.
- source_word: וּמַחֲזִקָהּ
  english_pob_choice: the one who supported her
  chosen_spanish: el que la sostenía
  alternatives_spanish:
  - el que la apoyaba
  - el que la fortalecía
  lexicon: HALOT
  rationale: חזק en hiphil puede significar sostener, fortalecer o apoyar. «Sostenía» es amplio y natural en español, sin decidir indebidamente entre apoyo físico o político.
- source_word: בָּעִתִּים
  english_pob_choice: in those times
  chosen_spanish: en aquellos tiempos
  alternatives_spanish:
  - en esos tiempos
  - en aquel tiempo
  lexicon: HALOT
  rationale: El plural hebreo «tiempos» se conserva con una expresión natural en español. «Aquellos» mantiene la referencia histórica distante.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido general confirmado por el audit trail inglés: alianza inicial, viaje de la hija del rey del Sur al rey del Norte, fracaso de la fuerza/poder, y entrega de ella y sus acompañantes en una cadena de participios con tensión gramatical preservada. No se aplicaron revisiones posteriores al pasaje.'
  spanish_consistency_notes:
  - Se mantiene «rey del Sur» y «rey del Norte» de forma consistente con Daniel 11.
  - Se conserva el paralelismo de fuerza corporal/poder mediante «brazo» en dos miembros del versículo.
  - «Engendró» se usa para reflejar el masculino del participio hebreo sin suavizar la tensión textual.
  - El estilo busca ser publicable y bíblico, pero sin sustituir el léxico documentado por fórmulas eclesiásticas tradicionales no sustentadas por el hebreo.
