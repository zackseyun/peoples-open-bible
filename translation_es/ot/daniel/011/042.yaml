translation:
  language: es
  text: Él extenderá su mano contra los países[a], y la tierra de Egipto no escapará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no tendrá escapatoria». Literalmente, el hebreo dice: «no será para escape».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִשְׁלַח
  english_pob_choice: will stretch out
  chosen_spanish: extenderá
  alternatives_spanish:
  - estirará
  - alargará
  - desplegará
  lexicon: HALOT
  rationale: El hebreo puede significar 'enviar' o 'extender'; con 'su mano' el giro idiomático expresa ejercer poder o avanzar contra otros. En español, 'extenderá su mano' suena posible, pero 'extenderá' por sí solo, unido al objeto implícito, conserva la imagen y evita un giro demasiado literal o pesado.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su mano derecha
  - su brazo
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de la mano como símbolo de acción y dominio. No se amplía a 'brazo' ni se especifica 'derecha' porque el texto hebreo no lo dice.
- source_word: בָּאֲרָצוֹת
  english_pob_choice: against the countries
  chosen_spanish: contra los países
  alternatives_spanish:
  - contra las tierras
  - sobre los países
  - hacia los países
  lexicon: HALOT
  rationale: La preposición en este contexto militar indica oposición o agresión; por eso 'contra' comunica mejor el sentido que una dirección neutra. 'Países' es más natural en español actual que 'tierras' y preserva la pluralidad territorial.
- source_word: וְאֶרֶץ מִצְרַיִם
  english_pob_choice: and the land of Egypt
  chosen_spanish: y la tierra de Egipto
  alternatives_spanish:
  - y Egipto
  - y la tierra egipcia
  lexicon: HALOT
  rationale: Se conserva la formulación explícita 'la tierra de Egipto' para reflejar la construcción hebrea y su énfasis geográfico. Se evita reducirlo a 'Egipto' porque el texto destaca el país como territorio.
- source_word: לֹא תִהְיֶה לִפְלֵיטָה
  english_pob_choice: will not escape
  chosen_spanish: no tendrá escape
  alternatives_spanish:
  - no escapará
  - no habrá escape para ella
  - no será para escape
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'no será para escape'. En español, 'no tendrá escape' comunica bien la idea de no tener salida o salvación posible, sin perder del todo la fuerza idiomática. Se evita 'no escapará' porque en español puede sonar menos cercano al matiz nominal del original.
translation_notes:
  revision_awareness: El texto coincide con el sentido del paquete fuente y con la auditoría inglesa; no se detectan revisiones aplicadas ni cambios de última pasada que obliguen a ajustar la redacción española.
  spanish_consistency_notes:
  - Se mantiene el sujeto implícito masculino singular con referencia al rey del contexto inmediato.
  - Se conserva la imagen bélica de la mano extendida y la negación idiomática de 'escape' sin paraphrasear hacia una interpretación más explicativa.
