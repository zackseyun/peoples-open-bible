translation:
  language: es
  text: 'Y les habló muchas cosas en parábolas, diciendo: «He aquí, el sembrador salió a sembrar».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἐλάλησεν
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - les habló
  lexicon: BDAG
  rationale: λαλέω aquí expresa el acto de hablar en general; en español, «habló» reproduce bien ese valor sin añadir matices de decir formal o pronunciar un discurso.
- source_word: πολλὰ
  english_pob_choice: many things
  chosen_spanish: muchas cosas
  alternatives_spanish:
  - mucho
  - numerosas cosas
  lexicon: BDAG
  rationale: El neutro plural funciona sustantivamente; «muchas cosas» refleja con claridad el contenido abundante sin volverlo abstracto o demasiado literal.
- source_word: ἐν παραβολαῖς
  english_pob_choice: in parables
  chosen_spanish: en parábolas
  alternatives_spanish:
  - con parábolas
  - por parábolas
  lexicon: BDAG
  rationale: La preposición ἐν con dativo expresa medio o modo; «en parábolas» es el giro natural y fiel en español.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: BDAG
  rationale: El participio presente introduce el contenido del discurso; «diciendo» conserva la transición fluida hacia la cita.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡Miren aquí!
  - ¡Vean!
  - He aquí
  lexicon: BDAG
  rationale: ἰδού es una partícula de llamada de atención. En español, «¡Miren!» comunica mejor la fuerza inmediata que «He aquí», que sería más tradicional pero menos natural.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - salió fuera
  lexicon: BDAG
  rationale: ἐξέρχομαι en este contexto narrativo se rinde de forma natural con «salió»; evita la redundancia de «salió fuera» y conserva el movimiento.
- source_word: ὁ σπείρων
  english_pob_choice: the sower
  chosen_spanish: el sembrador
  alternatives_spanish:
  - el que siembra
  - quien siembra
  lexicon: BDAG
  rationale: El participio presente articular funciona sustantivamente. «El sembrador» es idiomático en español y conserva la figura estable de la parábola.
- source_word: τοῦ σπείρειν
  english_pob_choice: to sow
  chosen_spanish: a sembrar
  alternatives_spanish:
  - para sembrar
  - sembrando
  lexicon: BDAG
  rationale: El infinitivo articular de finalidad se expresa naturalmente con «a + infinitivo» en español; aquí comunica bien el propósito del salir.
theological_decisions:
- issue: Fuerza de Ἰδοὺ como llamada de atención en discurso directo
  english_pob_reading: Behold
  chosen_spanish_reading: ¡Miren!
  alternative_spanish_readings:
  - He aquí
  - ¡Vean!
  rationale: No hay disputa doctrinal, pero sí de registro. Se eligió una forma exclamativa natural que conserva la urgencia del recurso retórico sin arcaísmo excesivo.
  doctrine_reference: 'POB translation philosophy: readable modern Spanish with source-faithful discourse force'
- issue: Renderización de ἐν παραβολαῖς como medio/modo de enseñanza
  english_pob_reading: in parables
  chosen_spanish_reading: en parábolas
  alternative_spanish_readings:
  - por parábolas
  - con parábolas
  rationale: Se mantiene la formulación tradicional y transparente, evitando interpretaciones que debiliten el medio pedagógico explícito del texto.
  doctrine_reference: Discourse/method of teaching in the Gospel narrative
translation_notes:
  revision_awareness: El borrador inglés pasó por una revisión que sustituyó “Look” por “Behold” para reflejar con mayor formalidad Ἰδοὺ. En español se mantuvo la fuerza de llamada de atención, pero se optó por «¡Miren!» por naturalidad y claridad en registro bíblico moderno.
  spanish_consistency_notes:
  - Se conservó «Y» inicial para reflejar la coordinación narrativa del griego.
  - Se eligió «parábolas» como término técnico estable en español bíblico.
  - No se usó «Cristo», «Señor» ni otras equivalencias no pertinentes en este versículo.
  - La puntuación de cita directa sigue la convención española con comillas angulares.
  - 'Se mantuvo el orden de ideas del griego: habla abundante -> en parábolas -> introducción de la cita -> salida del sembrador con propósito.'
