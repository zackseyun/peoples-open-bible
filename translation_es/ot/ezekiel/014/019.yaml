translation:
  language: es
  text: O si envío una plaga contra esa tierra y derramo mi ira sobre ella con sangre[a], para eliminar de ella a hombre y bestia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘por derramamiento de sangre’. El hebreo dice literalmente ‘en sangre’.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹ
  english_pob_choice: Or if
  chosen_spanish: O si
  alternatives_spanish:
  - O
  lexicon: HALOT
  rationale: En esta serie de juicios condicionales, el español necesita explicitar la condición para conservar la fuerza hipotética del hebreo y del audit trail inglés.
- source_word: דֶּבֶר
  english_pob_choice: plague
  chosen_spanish: plaga
  alternatives_spanish:
  - pestilencia
  - enfermedad
  lexicon: HALOT
  rationale: ‘Plaga’ comunica en español moderno la idea de calamidad epidémica enviada como juicio divino, con un registro natural y digno.
- source_word: אֲשַׁלַּח
  english_pob_choice: I send
  chosen_spanish: envío
  alternatives_spanish:
  - mando
  - envío contra
  lexicon: HALOT
  rationale: El verbo simple de envío se conserva sin expansión innecesaria. En español, el complemento ‘contra aquella tierra’ ya aporta el matiz hostil del contexto.
- source_word: אֶל הָאָרֶץ הַהִיא
  english_pob_choice: against that land
  chosen_spanish: contra aquella tierra
  alternatives_spanish:
  - a aquella tierra
  - sobre aquella tierra
  lexicon: HALOT
  rationale: Aunque אֶל es literalmente direccional, el contexto de juicio pide un equivalente hostil. ‘Contra’ mantiene la intención del texto fuente y su fuerza judicial.
- source_word: וְשָׁפַכְתִּי חֲמָתִי
  english_pob_choice: and pour out my wrath
  chosen_spanish: y derramo mi ira
  alternatives_spanish:
  - y derramo mi furor
  - y vierto mi ira
  lexicon: HALOT
  rationale: ‘Derramar mi ira’ es una imagen idiomática natural en español y conserva la metáfora de efusión del hebreo. Se eligió ‘ira’ como equivalente de חֲמָה por ser claro y solemne.
- source_word: עָלֶיהָ
  english_pob_choice: on it
  chosen_spanish: sobre ella
  alternatives_spanish:
  - en ella
  - contra ella
  lexicon: HALOT
  rationale: La tierra es femenina en español; ‘sobre ella’ reproduce el referente y conserva la idea de peso/descenso del juicio.
- source_word: בְּדָם
  english_pob_choice: with blood
  chosen_spanish: con sangre
  alternatives_spanish:
  - en sangre
  - por derramamiento de sangre
  lexicon: HALOT
  rationale: Se mantiene el sentido instrumental que el audit trail inglés también preserva con ‘with blood’. ‘Con sangre’ suena más natural que un calco rígido y deja visible la imagen violenta del hebreo.
- source_word: לְהַכְרִית
  english_pob_choice: to cut off
  chosen_spanish: para cortar de
  alternatives_spanish:
  - para exterminar
  - para destruir
  lexicon: HALOT
  rationale: ‘Cortar de’ conserva el verbo clave ‘cortar’ y el valor de eliminación/cese del hebreo. Se evita ‘exterminar’ por ser más interpretativo y menos cercano a la metáfora original.
- source_word: מִמֶּנָּה
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - de allí
  - desde ella
  lexicon: HALOT
  rationale: El pronombre femenino remite a ‘tierra’; ‘de ella’ mantiene la referencia clara en español y suena más natural que un literal ‘desde ella’.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - ser humano
  - humanidad
  lexicon: HALOT
  rationale: Siguiendo la decisión auditada de conservar la fórmula distributiva ‘man and beast’, se usa ‘hombre y bestia’ como equivalente natural y tradicional de la pareja hebrea sin neutralizarla.
- source_word: וּבְהֵמָה
  english_pob_choice: and beast
  chosen_spanish: y bestia
  alternatives_spanish:
  - y animal
  - y ganado
  lexicon: HALOT
  rationale: ‘Bestia’ reproduce la compacta pareja hebrea con אָדָם y conserva el tono de devastación total del juicio.
theological_decisions:
- issue: 'Fórmula de juicio total: אדם + בהמה'
  english_pob_reading: man and beast
  chosen_spanish_reading: hombre y bestia
  alternative_spanish_readings:
  - ser humano y animal
  - humanidad y bestia
  rationale: La combinación hebrea es una fórmula de devastación total sobre la vida humana y animal. ‘Hombre y bestia’ conserva la fuerza idiomática y la estructura binaria del original sin suavizarla.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; formula judgmental stock phrase'
- issue: Imagen de ‘con sangre’ en la ira divina
  english_pob_reading: with blood
  chosen_spanish_reading: con sangre
  alternative_spanish_readings:
  - en sangre
  - por derramamiento de sangre
  rationale: El hebreo literalmente dice ‘en sangre’; el inglés POB optó por ‘with blood’ para fluidez. En español, ‘con sangre’ comunica bien la noción instrumental/violenta sin borrar la tensión semántica del texto.
  doctrine_reference: POB lexical policy on preserving source imagery while allowing natural target idiom
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó ‘in blood’ a ‘with blood’ por naturalidad sin cambiar el sentido. La versión española adopta una solución equivalente, ‘con sangre’, para conservar tanto la naturalidad como la imagen instrumental del hebreo.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ no aplicable aquí porque el versículo no contiene el tetragrama.
  - 'Se conserva el registro profético/judicial con vocabulario sobrio: ‘plaga’, ‘ira’, ‘cortar de’, ‘hombre y bestia’.'
  - Se evita ‘SEÑOR’ como sustituto del nombre divino, conforme a la política general del proyecto, aunque este versículo no lo requiera.
