translation:
  language: es
  text: Si están dispuestos y obedecen[a], comerán lo bueno de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si están dispuestos y escuchan», donde «escuchan» lleva el sentido de obedecer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si es que
  - En caso de que
  lexicon: HALOT
  rationale: La partícula condicional introduce la protasis de manera directa; en español, 'Si' comunica con naturalidad la condición del hebreo sin añadir matiz.
- source_word: תֹּאב֖וּ
  english_pob_choice: you are willing
  chosen_spanish: estáis dispuestos
  alternatives_spanish:
  - queréis
  - estáis dispuestos a
  lexicon: HALOT
  rationale: El verbo אבה expresa voluntad o disposición. 'Estáis dispuestos' preserva el valor volitivo y suena natural en español bíblico contemporáneo.
- source_word: וּ/שְׁמַעְתֶּ֑ם
  english_pob_choice: and obedient
  chosen_spanish: y obedecéis
  alternatives_spanish:
  - y escucháis
  - y oís con obediencia
  lexicon: HALOT
  rationale: שׁמע puede significar oír, escuchar u obedecer. En este contexto de exhortación pactal, el sentido es respuesta obediente; 'obedecéis' lo expresa con claridad en español sin perder la relación semántica con 'escuchar'.
- source_word: ט֥וּב
  english_pob_choice: the good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - el bien
  - la bondad
  - el buen fruto
  lexicon: HALOT
  rationale: El sustantivo denota 'bondad' o 'lo bueno'. En construcción con 'de la tierra', el sentido apunta al beneficio o abundancia de la tierra; 'lo bueno' conserva la expresión hebrea de modo comprensible.
- source_word: הָ/אָ֖רֶץ
  english_pob_choice: the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra prometida
  - del país
  lexicon: HALOT
  rationale: En este pasaje el referente es la tierra/country en sentido territorial, no 'el mundo'. 'Tierra' es la opción más directa y fiel al contexto.
- source_word: תֹּאכֵֽלוּ
  english_pob_choice: you will eat
  chosen_spanish: comeréis
  alternatives_spanish:
  - comerán
  - os comeréis
  lexicon: HALOT
  rationale: אכל es el verbo común 'comer'. 'Comeréis' conserva la imagen concreta de disfrutar el producto o la abundancia de la tierra, tal como en el texto fuente.
theological_decisions:
- issue: Valor de שׁמע en una exhortación de pacto
  english_pob_reading: obedient
  chosen_spanish_reading: obedecéis
  alternative_spanish_readings:
  - escucháis
  - oís
  rationale: La perícopa inmediata contrapone respuesta obediente y rebeldía. Traducir שׁמע como 'obedecéis' comunica el hebraísmo de 'oír' con sumisión efectiva, sin imponer doctrina adicional.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: Coincide con el estado de alta concordancia del audit trail inglés; no se registran revisiones aplicadas y no se detectan cambios necesarios respecto del sentido fuente.
  spanish_consistency_notes:
  - Se mantiene el paralelismo volitivo/obediencial de la protasis con una forma verbal natural en español.
  - '''Tierra'' conserva el valor territorial del hebreo en contexto de pacto.'
  - No se usa 'SEÑOR' ni 'Cristo', pues no aparecen en el versículo fuente.
