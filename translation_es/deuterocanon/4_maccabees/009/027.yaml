translation:
  language: es
  text: Y cuando preguntaron si quería comer antes de ser torturado[a], oyeron su noble resolución.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su noble propósito» o «su noble mente». El griego γνώμη puede denotar intención, resolución o modo de pensar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δʼ εἰ
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y así como si
  - Entonces cuando
  lexicon: LSJ
  rationale: La construcción introduce la circunstancia siguiente en la narración. «Y cuando» conserva el avance temporal natural del relato sin volver hipotética la escena.
- source_word: φαγεῖν
  english_pob_choice: to eat
  chosen_spanish: comer
  alternatives_spanish:
  - tomar alimento
  - participar de alimento
  lexicon: LSJ
  rationale: El infinitivo significa simplemente «comer». En español, «comer» es claro, natural y suficientemente fiel.
- source_word: βούλοιτο
  english_pob_choice: he wished
  chosen_spanish: quería
  alternatives_spanish:
  - deseaba
  - estaba dispuesto a
  lexicon: LSJ
  rationale: El optativo en pregunta indirecta expresa voluntad. «Quería» mantiene esa fuerza volitiva en español contemporáneo sin exagerar el matiz.
- source_word: πρὶν βασανίζεσθαι
  english_pob_choice: before being tortured
  chosen_spanish: antes de ser torturado
  alternatives_spanish:
  - antes de ser atormentado
  - antes de ser sometido al tormento
  lexicon: LSJ
  rationale: En este contexto martirial, βασανίζεσθαι apunta a tortura. «Ser torturado» es la forma más directa y exacta en español.
- source_word: πυνθανόμενοι
  english_pob_choice: when they asked
  chosen_spanish: preguntaron
  alternatives_spanish:
  - inquirieron
  - al preguntarle
  lexicon: LSJ
  rationale: El participio de pregunta se vierte de modo natural como verbo principal en español. El sujeto implícito se entiende por el contexto de la escena.
- source_word: τὴν εὐγενῆ γνώμην
  english_pob_choice: his noble resolve
  chosen_spanish: su noble resolución
  alternatives_spanish:
  - su noble propósito
  - su noble mente
  - su noble intención
  lexicon: LSJ
  rationale: γνώμη puede significar intención, disposición o modo de pensar. «Resolución» conserva la firmeza volitiva y moral que el contexto destaca, mientras εὐγενῆ se expresa como nobleza de carácter.
- source_word: ἤκουσαν
  english_pob_choice: they heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - oyeron decir
  lexicon: LSJ
  rationale: El aoristo simple de oír se traduce naturalmente como «oyeron». Evita añadir una percepción no indicada por el griego.
theological_decisions:
- issue: Cómo rendir γνώμη en el marco del martirio
  english_pob_reading: resolve
  chosen_spanish_reading: resolución
  alternative_spanish_readings:
  - mente
  - propósito
  - opinión
  rationale: El versículo subraya la firmeza interior del mártir frente a la tortura. «Resolución» expresa mejor esa determinación moral que «opinión» o «mente» en español actual, sin perder la amplitud semántica documentada.
  doctrine_reference: Translation philosophy §1, §6
- issue: Mantener la tensión martirial de βασανίζεσθαι
  english_pob_reading: before being tortured
  chosen_spanish_reading: antes de ser torturado
  alternative_spanish_readings:
  - antes de ser atormentado
  - antes de ser puesto a la tortura
  rationale: La escena presenta interrogatorio bajo tortura, no solo sufrimiento general. «Torturado» preserva la dureza del término y su valor histórico en el contexto.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego de Swete 1909 y coincide con el audit trail inglés en la interpretación narrativa de ὡς δʼ εἰ, el valor volitivo de βούλοιτο y el sentido martirial de βασανίζεσθαι. No se detectan revisiones aplicadas en el contexto auditado.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando corresponda; este versículo no contiene el nombre divino.
  - «Cristo/Mesías» no aparece en este pasaje.
  - Se conserva un registro formal y bíblico, con sintaxis natural para español contemporáneo.
  - La nota [a] se coloca en «resolución» porque ahí recae la principal ambigüedad léxica de γνώμη.
