base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/025/041.yaml
  text: She rose and bowed with her face to the ground and said[a], “Behold[b], your slave is a maidservant to wash the feet of the servants of my lord.”
  footnotes:
  - marker: a
    text: Or “your maidservant is for a maidservant,” preserving the two closely related Hebrew terms for a female servant/slave.
    reason: lexical_alternative
  - marker: b
    text: “Bowed with her face to the ground” refers to a posture of deep obeisance; alternatively, “prostrated herself.”
    reason: lexical_alternative
