translation:
  language: es
  text: Levántate y llévalo a cabo[a], porque el asunto te corresponde, y nosotros estamos contigo; sé fuerte y actúa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase griega final es concisa y puede entenderse también como «sé fuerte» o, a la luz del paralelo hebreo de Esdras 10:4, «sé fuerte y hazlo».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: Rise up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Alzate
  lexicon: LSJ
  rationale: El participio aoristo se usa con fuerza exhortativa. «Levántate» conserva el impulso de acción inmediata y suena natural en español bíblico contemporáneo.
- source_word: ἐπίτελει
  english_pob_choice: carry it through
  chosen_spanish: llévalo a cabo
  alternatives_spanish:
  - complétalo
  - llévalo hasta el fin
  lexicon: LSJ
  rationale: El imperativo transmite completar una tarea ya encomendada. «Llévalo a cabo» expresa realización decidida sin sonar mecánico.
- source_word: πρὸς σὲ γὰρ τὸ πρᾶγμα
  english_pob_choice: for the matter is yours
  chosen_spanish: porque el asunto te corresponde
  alternatives_spanish:
  - porque el asunto es tuyo
  - porque el asunto te pertenece
  - porque la responsabilidad es tuya
  lexicon: LSJ
  rationale: La frase griega indica incumbencia o responsabilidad dirigida a alguien. «Te corresponde» evita una posesión demasiado literal y comunica bien la carga de responsabilidad.
- source_word: ἡμεῖς μετὰ σοῦ
  english_pob_choice: we are with you
  chosen_spanish: nosotros estamos contigo
  alternatives_spanish:
  - estamos a tu lado
  - vamos contigo
  lexicon: LSJ
  rationale: Es una afirmación directa de solidaridad. «Estamos contigo» conserva la sencillez y la cercanía del griego.
- source_word: ἰσχὺν ποιεῖν
  english_pob_choice: be strong and act
  chosen_spanish: sé fuerte y actúa
  alternatives_spanish:
  - hazlo con fuerza
  - obra con vigor
  - mantente firme y actúa
  lexicon: LSJ
  rationale: La construcción es breve y algo comprimida. «Sé fuerte y actúa» refleja el valor exhortativo del miembro final sin añadir un objeto inexistente en el griego.
translation_notes:
  revision_awareness: Se siguió el ajuste más reciente del inglés auditado, que pasó de una traducción más interpretativa de ἰσχὺν ποιεῖν a una exhortación más directa («be strong and act»). El español conserva esa naturalidad y no introduce una paráfrasis más amplia que el griego no exija.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca aquí, sino para mantener la terminología POB en contextos donde corresponda.
  - Se prefirió un español sobrio y directo, evitando «cumple» o «prosigue» por falta de apoyo explícito en el paralelo textual.
  - «Asunto» se eligió para τὸ πρᾶγμα por ser más general y idiomático que «negocio» en español bíblico actual.
  - La puntuación con punto y coma separa con claridad la exhortación principal del cierre exhortativo, siguiendo la estructura del inglés auditado.
