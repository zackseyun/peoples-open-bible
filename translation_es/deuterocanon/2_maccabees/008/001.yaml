translation:
  language: es
  text: Pero Judas, también llamado Macabeo, y los que estaban con él, entrando furtivamente en las aldeas sin ser notados, iban llamando a sus parientes; y, recibiendo a los que habían permanecido en el judaísmo[a], llegaron a reunir unos seis mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que habían permanecido fieles al judaísmo». El término griego «judaísmo» aquí se refiere a la identidad y práctica judías en contraste con la presión helenizante.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰούδας δὲ ὁ καὶ Μακκαβαῖος
  english_pob_choice: But Judas, who was also called Maccabeus
  chosen_spanish: Pero Judas[a], el que también era llamado Macabeo
  alternatives_spanish:
  - Pero Judas, que también era llamado Macabeo
  - Pero Judas, también llamado Macabeo
  lexicon: LSJ
  rationale: La construcción identifica a Judas con un epíteto o nombre adicional. «El que también era llamado» conserva el valor identificador sin volverlo demasiado arcaico; «Macabeo» es la forma natural en español para el nombre propio/título.
- source_word: παρεισπορευόμενοι λεληθότως εἰς τὰς κώμας
  english_pob_choice: slipping in secretly into the villages
  chosen_spanish: se infiltraban en secreto en las aldeas
  alternatives_spanish:
  - entraban furtivamente en las aldeas
  - se deslizaban en secreto por las aldeas
  lexicon: LSJ
  rationale: El griego combina entrada sigilosa con clandestinidad. «Se infiltraban en secreto» preserva ambos rasgos y suena natural en español bíblico actual; «aldeas» traduce κώμας de manera más precisa que «pueblos» en este contexto rural.
- source_word: προσεκαλοῦντο τοὺς συγγενεῖς
  english_pob_choice: were calling together their relatives
  chosen_spanish: iban llamando a sus parientes
  alternatives_spanish:
  - iban convocando a sus parientes
  - reunían a sus parientes
  lexicon: LSJ
  rationale: El verbo medio sugiere atraer o reunir gente a su lado. «Iban llamando» reproduce el movimiento progresivo y evita una solemnidad militar que el contexto no exige; «parientes» sigue bien τοὺς συγγενεῖς.
- source_word: τοὺς μεμενηκότας ἐν τῷ Ἰουδαϊσμῷ
  english_pob_choice: those who had remained in Judaism
  chosen_spanish: los que habían permanecido en el judaísmo
  alternatives_spanish:
  - los que habían permanecido fieles al judaísmo
  - los que habían permanecido en la manera de vivir judía
  lexicon: LSJ
  rationale: Ἰουδαϊσμός en 2 Macabeos nombra la identidad y práctica judías frente a la helenización. «Permanecido en el judaísmo» es cercano al griego y mantiene la tensión lexical sin expandirla interpretativamente.
- source_word: προσλαμβανόμενοι
  english_pob_choice: taking in
  chosen_spanish: recibiendo
  alternatives_spanish:
  - acogiendo
  - sumando a los suyos
  lexicon: LSJ
  rationale: El participio indica aceptar o incorporar a otros al grupo. «Recibiendo» es breve y fiel; el contexto de reunión y el resultado numérico hacen clara la incorporación.
- source_word: συνῆγον
  english_pob_choice: they gathered
  chosen_spanish: reunían
  alternatives_spanish:
  - juntaban
  - congregaban
  lexicon: LSJ
  rationale: El verbo describe el acto de reunir un grupo. «Reunían» es idiomático y mantiene el sentido de colecta/agrupamiento sin excesiva formalidad.
- source_word: εἰς ἑξακισχιλίους
  english_pob_choice: about six thousand
  chosen_spanish: como unos seis mil
  alternatives_spanish:
  - hasta unos seis mil
  - aproximadamente seis mil
  lexicon: LSJ
  rationale: La cifra expresa un total aproximado. «Como unos seis mil» conserva la imprecisión narrativa del griego y resulta natural en español.
theological_decisions:
- issue: Rendering Ἰουδαϊσμός
  english_pob_reading: Judaism
  chosen_spanish_reading: el judaísmo
  alternative_spanish_readings:
  - la religión judía
  - la manera de vivir judía
  rationale: En 2 Macabeos el término señala identidad religiosa y comunitaria en contraste con la presión helenizante. «Judaísmo» es la equivalencia directa y preserva el peso histórico-teológico del término sin ampliar su sentido más de lo que el griego exige.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Se revisó el tono para mantener la precisión del griego: la entrada sigilosa y la reunión de parientes quedan explícitas, y Ἰουδαϊσμός se conserva como «judaísmo» con nota alternativa equivalente a la del POB inglés. No se detectaron revisiones pendientes en el paquete auditado.'
  spanish_consistency_notes:
  - «Macabeo» se usa como forma estable del epíteto/nombre en español.
  - «Judaísmo» se conserva de manera consistente con el valor lexical del griego en 2 Macabeos.
  - Se prefirió «aldeas» para κώμας por concordancia con el matiz rural del pasaje.
  - La cifra se mantiene aproximada, no exacta, conforme al griego y al POB inglés.
