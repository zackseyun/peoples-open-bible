base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/002/011.yaml
  text: Then Huram said[a], “Blessed be Yahweh, the God of Israel, who made the heavens and the earth, who has given King David a wise son, who knows discretion and understanding[c][b], who will build a house for Yahweh and a house for his kingdom.”
  footnotes:
  - marker: a
    text: Huram is spelled 'Hiram' in the parallel account in 1 Kings; Chronicles here has the Hebrew form Huram.
    reason: alternative_reading
  - marker: b
    text: Or 'having insight and understanding' for 'knowing discretion and understanding.'
    reason: lexical_alternative
  - marker: c
    text: That is, a house for his royal rule; possibly referring to the palace complex.
    reason: cultural_note
