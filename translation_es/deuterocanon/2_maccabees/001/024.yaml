translation:
  language: es
  text: 'Y la oración fue en esta forma: «Yahvé Dios, creador de todas las cosas, el temible[a] y poderoso y justo y misericordioso, el único rey y bueno[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el asombroso» o «el imponente»; el griego φοβερός describe a alguien que inspira temor o asombro reverente.
    reason: lexical_alternative
  - marker: b
    text: O «bondadoso» o «benigno» para «bueno»; χρηστός puede abarcar bondad, amabilidad o benevolencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ ἡ προσευχὴ τὸν τρόπον ἔχουσα τοῦτον
  english_pob_choice: And the prayer was in this form
  chosen_spanish: Y la oración fue en esta forma
  alternatives_spanish:
  - Y la oración fue así
  - Y la oración tomó esta forma
  lexicon: LSJ
  rationale: La expresión griega introduce la oración citada con un giro idiomático de forma/modo. «Fue en esta forma» conserva el valor formal de la introducción y suena natural en español bíblico actual.
- source_word: Κύριε ὁ θεός
  english_pob_choice: Lord God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - Señor Dios
  - Oh Yahvé Dios
  lexicon: LSJ
  rationale: En este contexto de oración judía, el audit trail inglés traduce κύριος como 'Lord', pero el proyecto español prefiere 'Yahvé' para el nombre divino cuando el trasfondo apunta al nombre sagrado. «Dios» mantiene ὁ θεός. Se evita «Señor» como máscara cuando el texto funciona como apelación divina directa.
- source_word: ὁ πάντων κτίστης
  english_pob_choice: creator of all things
  chosen_spanish: creador de todas las cosas
  alternatives_spanish:
  - creador de todo
  - hacedor de todas las cosas
  lexicon: LSJ
  rationale: κτίστης significa creador/fundador. «De todas las cosas» reproduce con claridad el alcance universal de πάντων y mantiene un registro litúrgico natural.
- source_word: ὁ φοβερὸς
  english_pob_choice: the awesome one
  chosen_spanish: el asombroso
  alternatives_spanish:
  - el temible
  - el imponente
  - el awe-inspiring
  lexicon: LSJ
  rationale: El término describe a quien inspira temor o asombro. Dado que el inglés revisado optó por 'awesome' para capturar mejor ese matiz, «asombroso» conserva la ambivalencia de temor reverente/asombro sin endurecerlo innecesariamente como «temible».
- source_word: ὁ ἰσχυρὸς
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - fuerte
  - mighty
  lexicon: LSJ
  rationale: ἰσχυρός aplicado a Dios expresa fuerza/poder. «Poderoso» es la opción más natural y solemne en español para esta serie de atributos divinos.
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - recto y justo
  lexicon: LSJ
  rationale: En una lista de atributos divinos, «justo» preserva el carácter moral y judicial del adjetivo sin perder claridad en español. «Recto» sería posible, pero menos directo aquí.
- source_word: ἐλεήμων
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - compasivo
  - misericordioso y compasivo
  lexicon: LSJ
  rationale: El adjetivo expresa misericordia activa. «Misericordioso» es la equivalencia más estable y reconocible en español eclesial.
- source_word: ὁ μόνος βασιλεὺς
  english_pob_choice: the only king
  chosen_spanish: el único rey
  alternatives_spanish:
  - el solo rey
  - el rey único
  lexicon: LSJ
  rationale: «Único» reproduce la exclusividad de μόνος. La fórmula mantiene la confesión monárquica aplicada a Dios sin expandir el sentido.
- source_word: χρηστός
  english_pob_choice: good one
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - benigno
  - el bueno
  lexicon: LSJ
  rationale: χρηστός puede significar bueno, amable, benévolo o bondadoso. En español, «bueno» conserva la brevedad del predicado final y el paralelismo con la serie de atributos previos; «bondadoso» estrecharía ligeramente el matiz.
theological_decisions:
- issue: Tratamiento del nombre divino en una oración judía donde el griego dice Κύριε
  english_pob_reading: Lord God
  chosen_spanish_reading: Yahvé Dios
  alternative_spanish_readings:
  - Señor Dios
  - Dios
  rationale: Aunque el inglés auditado usa 'Lord' por norma doctrinal, el proyecto español establece 'Yahvé' para יהוה cuando el contexto original es una apelación divina que presupone el nombre sagrado. Así se evita ocultar el referente del griego en una oración de alabanza y se mantiene la transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה → Yahvé; κύριος → Lord (English default) / Spanish project exception when the underlying divine name is implicated'
- issue: Alcance de μόνος βασιλεὺς
  english_pob_reading: the only king
  chosen_spanish_reading: el único rey
  alternative_spanish_readings:
  - el sole rey
  - el rey único
  rationale: La exclusividad teológica del reinado divino se mantiene sin añadir explicaciones interpretativas. «Único» comunica que no hay otro rey comparable en este marco doxológico.
  doctrine_reference: Monoteísmo y realeza divina exclusiva en oraciones judías de alabanza
- issue: φοβερὸς como atributo de Dios
  english_pob_reading: the awesome one
  chosen_spanish_reading: el asombroso
  alternative_spanish_readings:
  - el temible
  - el imponente
  rationale: Se conserva la tensión de un atributo que puede evocar temor reverente y asombro. «Asombroso» permite esa amplitud sin forzar una connotación negativa que «temible» podría sugerir en español moderno.
  doctrine_reference: Lenguaje de temor reverente aplicado a Dios
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés auditable, que prefirió 'awesome' sobre 'fearful' para φοβερός. La versión española refleja ese ajuste con «asombroso», manteniendo la serie de atributos y la cadencia de la oración sin introducir glosas interpretativas adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del nombre divino en el texto español.
  - 'Se conserva el orden acumulativo de atributos: creador, asombroso, poderoso, justo, misericordioso, único rey, bueno.'
  - «Bueno» se deja al final como predicado breve y paralelo al inglés auditado.
  - Las notas a pie de página usan marcadores únicos y aparecen ancladas solo en los términos con alternativa léxica real.
