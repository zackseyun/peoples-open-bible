  to: Así se completó toda la obra que Salomón había hecho para la casa de Yahvé. Entonces Salomón hizo entrar las cosas consagradas[a] de David su padre, la plata, el oro y todos los utensilios; los puso en las tesorerías de la casa de Dios.
  rationale: 'Se corrigen un error gramatical (''la plata''), la ubicación de la nota al sintagma correcto, y dos decisiones léxicas para reflejar mejor el hebreo: ''hizo entrar'' por וַיָּבֵא y ''tesorerías'' por בְּאֹצְרוֹת. Se conserva el buen uso de ''Yahvé'', la distinción ''casa de Yahvé'' / ''casa de Dios'', y ''cosas consagradas'' como equivalente válido de קָדְשֵׁי.'
