translation:
  language: es
  text: 'Entonces la mujer de Tecoa dijo al rey: «Sobre mí, mi señor el rey, sea la culpa[a], y sobre la casa de mi padre; pero el rey y su trono son inocentes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la iniquidad» o «la culpa»; el hebreo puede referirse a culpa, maldad o a la responsabilidad/consecuencia de ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִשָּׁה הַתְּקוֹעִית
  english_pob_choice: the woman from Tekoa
  chosen_spanish: la mujer de Tecoa
  alternatives_spanish:
  - la mujer tecoíta
  - la tecoíta
  lexicon: HALOT
  rationale: El gentilicio identifica a la mujer por su procedencia. En español, «de Tecoa» conserva la referencia geográfica con mayor naturalidad que una forma adjetival más técnica, sin perder el dato del hebreo.
- source_word: עָלַי
  english_pob_choice: On me
  chosen_spanish: Sobre mí
  alternatives_spanish:
  - En mí
  - Cargue sobre mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona va al frente por énfasis. «Sobre mí» reproduce bien la carga de responsabilidad que la mujer asume, sin añadir interpretación.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi amo el rey
  - mi señor, el rey
  lexicon: HALOT
  rationale: «Mi señor el rey» mantiene el tono cortesano de Samuel. «Señor» refleja mejor el valor de respeto del hebreo en español que «amo» en este contexto real.
- source_word: הֶעָוֺן
  english_pob_choice: the guilt
  chosen_spanish: la culpa
  alternatives_spanish:
  - la iniquidad
  - la culpa o su consecuencia
  - el delito
  lexicon: HALOT
  rationale: El término hebreo puede abarcar culpa, iniquidad o la responsabilidad por el mal. En este contexto jurídico, «la culpa» comunica bien la asunción de responsabilidad sin fijar demasiado la idea en castigo o pena.
- source_word: וְעַל בֵּית אָבִי
  english_pob_choice: and on my father’s house
  chosen_spanish: y sobre la casa de mi padre
  alternatives_spanish:
  - y sobre mi familia
  - y sobre la casa paterna
  lexicon: HALOT
  rationale: «Casa de mi padre» conserva el giro idiomático y su alcance familiar/legal. «Familia» es más interpretativo y pierde la expresión concreta del hebreo.
- source_word: וְהַמֶּלֶךְ וְכִסְאוֹ
  english_pob_choice: but the king and his throne
  chosen_spanish: pero el rey y su trono
  alternatives_spanish:
  - y el rey y su trono
  lexicon: HALOT
  rationale: El hebreo contrapone implícitamente la carga sobre ella y la inocencia del rey. En español, «pero» hace visible esa oposición sin añadir contenido nuevo; «su trono» conserva el metonímico del poder real.
- source_word: נָקִי
  english_pob_choice: are innocent
  chosen_spanish: están inocentes
  alternatives_spanish:
  - son inocentes
  - están libres de culpa
  - quedan inocentes
  lexicon: HALOT
  rationale: El adjetivo predicativo con sujeto compuesto se expresa de forma natural en plural. «Están inocentes» mantiene el sentido de exoneración jurídica; aunque menos usual que «son inocentes», evita sonar demasiado esencialista.
theological_decisions:
- issue: Exoneración del rey y su trono
  english_pob_reading: the king and his throne are innocent
  chosen_spanish_reading: el rey y su trono están inocentes
  alternative_spanish_readings:
  - el rey y su trono son inocentes
  - el rey y su trono están libres de culpa
  rationale: El verso trata de responsabilidad legal/moral dentro de la narración, no de una afirmación doctrinal sobre impecabilidad. «Están inocentes» conserva la lectura judicial y la tensión del texto sin suavizarla demasiado.
  doctrine_reference: Preservar la tensión textual y no convertir una declaración legal en una afirmación teológica general.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el consenso del auditor inglés: se mantiene la identificación geográfica, el tono cortesano, la carga de culpa asumida por la mujer y la exoneración del rey y su trono. No hubo revisiones sustantivas en el pase más reciente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; este verso no lo contiene.
  - «Tecoa» se mantiene como topónimo transliterado en forma usual española.
  - Se preserva el contraste implícito del hebreo con «pero» para reflejar la oposición entre culpa asumida e inocencia del rey.
  - El texto principal evita una paráfrasis explicativa, manteniéndose cercano a la sintaxis y al peso judicial del hebreo.
