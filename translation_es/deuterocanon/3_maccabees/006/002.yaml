translation:
  language: es
  text: Oh Rey, poderoso en fuerza, Altísimo, Dios todopoderoso, que gobiernas toda la creación[a] con misericordias[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la creación entera».
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «con compasión» o «misericordiosamente»; el griego usa un sustantivo plural, destacando actos de misericordia o abundancia de misericordia.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλεῦ
  english_pob_choice: O King
  chosen_spanish: ¡Oh Rey!
  alternatives_spanish:
  - Rey
  - ¡Oh, Rey!
  lexicon: LSJ
  rationale: Es un vocativo directo en una oración; «¡Oh Rey!» preserva la invocación solemne y el tono litúrgico sin volverlo rígido.
- source_word: μεγαλοκράτωρ
  english_pob_choice: mighty in power
  chosen_spanish: poderoso en fuerza
  alternatives_spanish:
  - mighty in power
  - gran soberano
  - todopoderoso
  lexicon: LSJ
  rationale: El compuesto destaca grandeza y dominio con fuerza efectiva. «Poderoso en fuerza» conserva el énfasis semántico sin anticipar el sentido de παντοκράτωρ, que se vierte aparte como «todopoderoso».
- source_word: ὕψιστε
  english_pob_choice: Most High
  chosen_spanish: Altísimo
  alternatives_spanish:
  - Muy Alto
  - El Altísimo
  lexicon: LSJ
  rationale: Es el epíteto divino tradicional en vocativo; «Altísimo» comunica bien la elevación superlativa y suena natural en español bíblico.
- source_word: παντοκράτωρ
  english_pob_choice: almighty
  chosen_spanish: todopoderoso
  alternatives_spanish:
  - omnipotente
  - que todo lo gobierna
  - ruler of all
  lexicon: LSJ
  rationale: Aunque literalmente puede sugerir dominio sobre todo, en el registro bíblico español «todopoderoso» es la equivalencia más directa y reconocible para el título divino.
- source_word: δέε
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - ¡oh Dios!
  - deidad
  lexicon: LSJ
  rationale: La secuencia griega añade otro vocativo a la cadena de títulos; en español, «Dios» mantiene la apelación directa sin añadir elementos no presentes.
- source_word: τὴν πᾶσαν ... κτίσιν
  english_pob_choice: all creation
  chosen_spanish: toda la creación
  alternatives_spanish:
  - toda la criatura
  - la creación entera
  - todo lo creado
  lexicon: LSJ
  rationale: κτίσις aquí designa el orden creado en su totalidad; «toda la creación» es natural y conserva el alcance universal del sintagma.
- source_word: διακυβερνῶν
  english_pob_choice: governing
  chosen_spanish: que gobiernas
  alternatives_spanish:
  - dirigiendo
  - guiando
  - rigiendo
  lexicon: LSJ
  rationale: El participio evoca gobernar/dirigir con imagen de pilotaje. «Que gobiernas» encaja bien en la oración y mantiene el matiz de soberanía activa.
- source_word: ἐν οἰκτιρμοῖς
  english_pob_choice: with mercies
  chosen_spanish: con misericordias
  alternatives_spanish:
  - con compasiones
  - misericordiosamente
  - con abundante misericordia
  lexicon: LSJ
  rationale: El plural griego subraya actos o abundancia de misericordia; «misericordias» conserva mejor ese plural que una adverbialización, aunque suene algo más intensivo en español.
theological_decisions:
- issue: Acumulación de títulos divinos en vocativo
  english_pob_reading: 'Render all titles explicitly: ''O King, mighty in power, Most High, almighty God'''
  chosen_spanish_reading: 'Conservar la cadena de títulos de modo explícito: «¡Oh Rey, poderoso en fuerza, Altísimo, Dios todopoderoso!»'
  alternative_spanish_readings:
  - Condensar los títulos en menos expresiones
  - fundir «Altísimo» y «todopoderoso» en una sola fórmula
  rationale: El griego amontona epítetos en una invocación. Mantenerlos separados preserva la retórica de alabanza y la teología de la soberanía divina.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Valor del plural en ἐν οἰκτιρμοῖς
  english_pob_reading: The phrase 'with mercies' could also be rendered 'with compassion' or 'mercifully'; the Greek uses a plural noun, emphasizing God's merciful acts or abundant mercy.
  chosen_spanish_reading: «con misericordias», conservando el plural y su fuerza de acciones abundantes de misericordia
  alternative_spanish_readings:
  - «con compasión»
  - «misericordemente»
  rationale: En español, el plural mantiene mejor la observación del griego que una sola cualidad abstracta o un adverbio. Esto deja visible la tensión entre idiomatismo y forma del original.
  doctrine_reference: Lexical note on plural mercies
translation_notes:
  revision_awareness: El texto griego y el aparato inglés muestran alta concordancia y no registran revisiones aplicadas; se conserva la estructura de invocación con los títulos divinos en serie y la cláusula final en participio. La principal decisión española fue separar el valor de μεγαλοκράτωρ («poderoso en fuerza») del de παντοκράτωρ («todopoderoso»), para no colapsar dos matices distintos.
  spanish_consistency_notes:
  - Se usa «Dios» para δέε en concordancia con el vocativo de la línea y con el registro bíblico español.
  - Se evita «SEÑOR» como máscara del nombre divino porque aquí el texto no usa יהוה sino títulos griegos de alabanza.
  - «Misericordias» mantiene el plural del griego, aun si en español suena menos usual, para preservar el matiz de abundancia/actos de misericordia.
