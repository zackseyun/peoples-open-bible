lexical_decisions:
- source_word: ἐφʼ οἷς
  english_pob_choice: With these words
  chosen_spanish: Con estas palabras
  alternatives_spanish:
  - Por estas cosas
  - Sobre esta base
  lexicon: LSJ
  rationale: La frase retoma la exhortación anterior y marca el efecto del discurso. «Con estas palabras» conserva el valor instrumental y suena natural en español.
- source_word: εὐθαρσεῖς
  english_pob_choice: encouraged them
  chosen_spanish: los animó
  alternatives_spanish:
  - los alentó
  - los hizo valientes
  lexicon: LSJ
  rationale: El adjetivo expresa buen ánimo, confianza o valentía. En español, el verbo causativo más natural y fiel al contexto es «animó».
- source_word: παραστήσας
  english_pob_choice: encouraged them
  chosen_spanish: los puso
  alternatives_spanish:
  - los presentó
  - los hizo quedar
  lexicon: LSJ
  rationale: 'El participio queda absorbido en la acción principal: Judas los colocó en ese estado de ánimo y disposición. «Los puso» mantiene la idea de hacerlos quedar en cierta condición sin forzar el español.'
- source_word: ἑτοίμους
  english_pob_choice: ready
  chosen_spanish: listos
  alternatives_spanish:
  - preparados
  lexicon: LSJ
  rationale: Significa preparado o dispuesto. «Listos» es breve, claro y conserva el sentido de disposición inmediata.
- source_word: ὑπὲρ τῶν νόμων καὶ τῆς πατρίδος
  english_pob_choice: for the laws and the fatherland
  chosen_spanish: por las leyes y la patria
  alternatives_spanish:
  - por la ley y la patria
  - a favor de las leyes y de la patria
  - por las leyes y la tierra de los padres
  lexicon: LSJ
  rationale: Se preserva el plural de νόμων con «las leyes», como en el contexto judío de preceptos ancestrales. «Patria» conserva el peso afectivo y colectivo de πατρίς sin recurrir a un calco poco natural como «padreland».
- source_word: ἀποθνήσκειν
  english_pob_choice: to die
  chosen_spanish: morir
  alternatives_spanish:
  - dar la vida
  lexicon: LSJ
  rationale: El infinitivo significa morir de manera directa. «Morir» es la forma más fiel y sobria; no se suaviza el sentido.
- source_word: τετραμερές τι ἐποίησεν τὸ στράτευμα
  english_pob_choice: he formed the army into four parts
  chosen_spanish: dividió al ejército en cuatro partes
  alternatives_spanish:
  - formó al ejército en cuatro partes
  - lo dividió en cuatro divisiones
  - hizo al ejército cuadripartito
  lexicon: LSJ
  rationale: τετραμερές indica cuatro partes. En español, «dividió al ejército en cuatro partes» reproduce con claridad la imagen y evita una construcción más rígida.
theological_decisions:
- issue: πατρίς como lealtad ancestral y política
  english_pob_reading: fatherland
  chosen_spanish_reading: patria
  alternative_spanish_readings:
  - tierra natal
  - tierra de los padres
  - país
  rationale: El contexto une la defensa de la ley con la defensa de la patria; «patria» comunica bien el valor afectivo y colectivo de πατρίς en español sin debilitar su fuerza.
  doctrine_reference: Tradición de equivalencia óptima; fidelidad semántica al contexto histórico y retórico.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el trámite inglés revisado: conserva la relación entre exhortación, disposición al sacrificio y organización táctica. Se optó por «animó»/«los puso listos» para reflejar la fuerza causativa de εὐθαρσεῖς ... παραστήσας de manera idiomática en español.'
  spanish_consistency_notes:
  - Se mantuvo «patria» para πατρίς, evitando «homeland» literalizaciones extrañas en español.
  - Se conservó el plural «las leyes» para νόμων, en línea con el contexto judío de normas ancestrales.
  - Se eligió «morir» en lugar de una paráfrasis más suave para respetar ἀποθνήσκειν.
  - La nota al pie recoge la alternativa estructural sobre la división militar, como en el inglés POB.
