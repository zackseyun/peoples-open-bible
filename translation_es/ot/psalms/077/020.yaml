    text: O «en el mar ... en muchas aguas». La preposición hebrea puede traducirse «en», pero aquí probablemente tiene sentido de movimiento a través de las aguas.
    reason: lexical_alternative
  - marker: b
    text: O «tus rastros» o «tus pasos no se conocieron».
    reason: lexical_alternative
  revision_rationale: 'La revisión ajusta el primer colon a la decisión principal documentada por el POB (''through the sea'') con un español natural y poético: ''fue por el mar''. Mantiene la alternativa más literal ''en el mar'' en nota. También reemplaza ''no fueron conocidas'' por ''no se conocieron'', que preserva mejor la ambigüedad pasiva del hebreo en español idiomático. La nota b se corrige para aportar alternativas reales al texto principal.'
