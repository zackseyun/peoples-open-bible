translation:
  language: es
  text: Por eso derramó sobre él el calor de su ira y el ímpetu de la batalla[a][b]; lo abrasó por todos lados, pero él no lo supo[c]; ardía en él, pero no se lo tomó a pecho[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la furia de su ira».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la violencia / fiereza de la guerra».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no entendió». El singular se refiere a Israel como pueblo personificado.'
    reason: alternative_reading
  - marker: d
    text: 'Literalmente: «no lo puso sobre el corazón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁפֹּךְ
  english_pob_choice: poured out
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - derramó fuera
  lexicon: HALOT
  rationale: שפך significa literalmente “derramar/verter”. En el contexto de ira y juicio, “derramó” conserva la imagen de algo que se descarga sobre el destinatario y suena natural en español.
- source_word: עָלָיו
  english_pob_choice: on him
  chosen_spanish: sobre él
  alternatives_spanish:
  - en él
  - contra él
  lexicon: HALOT
  rationale: La preposición עַל con sufijo masculino singular se expresa de modo directo como “sobre él”, manteniendo el singular corporativo de Israel personificado.
- source_word: חֵמָה אַפּוֹ
  english_pob_choice: the heat of his anger
  chosen_spanish: el calor de su ira
  alternatives_spanish:
  - la furia de su ira
  - su ira ardiente
  lexicon: HALOT
  rationale: חֵמָה conserva la idea de calor/ardor, y אַף es “nariz” en el sentido idiomático de ira. “Calor de su ira” mantiene la imaginería térmica sin volverlo redundante en español.
- source_word: וֶעֱזוּז מִלְחָמָה
  english_pob_choice: and the might of battle
  chosen_spanish: y la fuerza de la batalla
  alternatives_spanish:
  - y la violencia de la guerra
  - y el ímpetu de la guerra
  lexicon: HALOT
  rationale: עֱזוּז expresa fuerza, vigor o vehemencia. “Fuerza de la batalla” conserva el paralelo nominal con מִלְחָמָה y evita restringir el sentido solo a emoción o solo a combate literal.
- source_word: וַתְּלַהֲטֵהוּ
  english_pob_choice: it set him ablaze
  chosen_spanish: lo encendió
  alternatives_spanish:
  - lo abrasó
  - lo prendió fuego
  lexicon: HALOT
  rationale: El verbo sugiere arder o prender fuego. “Lo encendió” preserva la metáfora ígnea de forma breve y natural en español.
- source_word: מִסָּבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - por todos lados
  - alrededor
  lexicon: HALOT
  rationale: La expresión indica envolvimiento por todos lados. “Todo alrededor” es una equivalencia clara y idiomática.
- source_word: וְלֹא יָדָע
  english_pob_choice: but he did not know
  chosen_spanish: pero no lo supo
  alternatives_spanish:
  - pero no conoció
  - pero no entendió
  lexicon: HALOT
  rationale: ידע puede significar conocer, saber o percibir. Aquí se conserva la correspondencia léxica con “no lo supo”, evitando imponer una explicación más interpretativa que el hebreo no exige.
- source_word: וַתִּבְעַר בּוֹ
  english_pob_choice: it burned in him
  chosen_spanish: ardió en él
  alternatives_spanish:
  - quemó en él
  - lo consumió
  lexicon: HALOT
  rationale: בער es “arder/quemar”. La construcción con בוּ se refleja de manera directa en “ardió en él”, manteniendo el efecto consumiente del juicio.
- source_word: וְלֹא יָשִׂים עַל לֵב
  english_pob_choice: but he did not take it to heart
  chosen_spanish: pero no lo puso en su corazón
  alternatives_spanish:
  - pero no lo tomó en serio
  - pero no lo tuvo en cuenta
  lexicon: HALOT
  rationale: El idioma hebreo dice literalmente “poner sobre el corazón”. “No lo puso en su corazón” conserva la metáfora del original; la alternativa idiomática inglesa se entiende, pero aquí la imagen es auditable y fiel.
theological_decisions:
- issue: Referente singular de los pronombres
  english_pob_reading: The singular 'him/he' is retained, referring corporately to Israel as a people personified as one man.
  chosen_spanish_reading: Se conserva el singular “él/lo”, refiriéndolo corporativamente a Israel personificado como una sola figura.
  alternative_spanish_readings:
  - pluralizar a “ellos/los” por claridad moderna
  - nombrar explícitamente a Israel en cada cláusula
  rationale: El hebreo usa formas singulares de manera consistente para el pueblo como persona colectiva. Mantener el singular preserva la figura profética y evita aplanar la retórica del pasaje.
  doctrine_reference: Translation philosophy §1, §5
- issue: Agente divino y sujeto impersonal del juicio
  english_pob_reading: '''He'' in the opening clause is understood as God, while the subsequent feminine-singular verbs are rendered with impersonal ''it'' referring to the outpoured wrath/battle-force.'
  chosen_spanish_reading: El agente inicial se sobreentiende como Dios, mientras que los verbos posteriores se expresan con un sujeto tácito/impersonal que remite a la ira derramada como fuerza operante.
  alternative_spanish_readings:
  - repetir a Dios como sujeto en toda la oración
  - forzar un femenino personal en español
  rationale: El hebreo pasa naturalmente de la acción divina al efecto de la ira como fuerza activa. En español, una formulación impersonal conserva la coherencia sin introducir una afirmación doctrinal extraña al texto.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB que cambió “did not understand” por “did not know” para ajustarse más de cerca a יָדָע. Por eso se eligió “no lo supo” en lugar de una paráfrasis interpretativa. También se conservó la decisión auditada de mantener el singular corporativo y la metáfora del “corazón”.
  spanish_consistency_notes:
  - Se mantuvo “ira” para חֵמָה y no “furor” como forma principal, aunque se documenta la alternativa.
  - Se preservó “él/lo” en singular por la personificación corporativa de Israel.
  - Se evitó “SEÑOR” y no aparece el Tetragrámaton en este versículo.
  - Se conservó la metáfora de “corazón” como centro de atención y discernimiento.
