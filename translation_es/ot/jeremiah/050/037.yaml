revisions:
- from: Una espada contra sus caballos y contra sus carros[a], y contra toda la población mezclada[b] que está en medio de ella, y se convertirán en mujeres. Una espada contra sus tesoros, y serán saqueados.
  to: Una espada contra sus caballos y contra sus carros, y contra toda la población mezclada[a] que está en medio de ella, y se convertirán en mujeres[b]. Una espada contra sus tesorerías, y serán saqueadas.
  rationale: Se corrigen los anclajes de las notas para que coincidan con las frases que realmente explican en el original y en el audit trail inglés. Además, se cambia 'tesoros' por 'tesorerías' para reflejar mejor אוֹצְרֹתֶיהָ como depósitos o reservas de riqueza, manteniendo un español natural y eclesialmente legible.
