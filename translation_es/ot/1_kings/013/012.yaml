translation:
  language: es
  text: 'Y su padre les dijo: «¿Por qué camino se fue?» Porque sus hijos habían visto el camino por el que se fue el hombre de Dios, que vino de Judá.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: said
  chosen_spanish: les dijo
  alternatives_spanish:
  - habló
  - les habló
  lexicon: HALOT
  rationale: En español narrativo, «decir» funciona de manera natural en discurso directo y preserva la función comunicativa del verbo sin volver la frase rígida. La duplicación del dativo «les» hace explícito el destinatario, como exige el contexto.
- source_word: אֲבִיהֶם
  english_pob_choice: their father
  chosen_spanish: su padre
  alternatives_spanish:
  - el padre de ellos
  lexicon: HALOT
  rationale: El sufijo plural se refiere a los hijos mencionados antes; en español, «su padre» es la forma natural y precisa para expresar esa relación familiar sin sobrecargar el verso.
- source_word: אֵי זֶה הַדֶּרֶךְ
  english_pob_choice: Which way
  chosen_spanish: ¿Qué camino
  alternatives_spanish:
  - ¿Cuál camino
  - ¿Por qué camino
  lexicon: HALOT
  rationale: La pregunta busca identificar la ruta tomada. En español, «¿Qué camino tomó él?» transmite de modo fluido la misma búsqueda de identificación del trayecto, manteniendo el valor interrogativo de אֵי זֶה con naturalidad.
- source_word: הַדֶּרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - ruta
  - sendero
  - vía
  lexicon: HALOT
  rationale: «Camino» es una equivalencia clara y ampliamente comprensible para la idea de una ruta recorrida. Conserva bien la repetición enfática del término hebreo en ambos miembros del versículo.
- source_word: הָלָךְ
  english_pob_choice: did he go / had gone
  chosen_spanish: tomó / había tomado
  alternatives_spanish:
  - fue / había ido
  - anduvo / había andado
  lexicon: HALOT
  rationale: En una pregunta sobre dirección, español expresa mejor la idea con un verbo de trayecto como «tomar» un camino. En la cláusula relativa, «había tomado» mantiene la anterioridad del recorrido respecto de la pregunta, como en el análisis inglés.
- source_word: וַיִּרְאוּ
  english_pob_choice: had seen
  chosen_spanish: habían visto
  alternatives_spanish:
  - vieron
  lexicon: HALOT
  rationale: El pluscuamperfecto en español refleja que la visión de los hijos antecedía a la pregunta del padre, respetando la secuencia lógica marcada en el audit trail inglés.
- source_word: בָנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - los hijos de él
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sus hijos», el contexto narrativo ya identifica al padre; por eso «sus hijos» resulta natural y suficiente en español. «Hijos» preserva la relación sin introducir una precisión innecesaria.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  - el profeta de Dios
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea tradicional «hombre de Dios» porque es el giro lexical exacto del texto y no debe restringirse interpretativamente a «profeta».
- source_word: מִיהוּדָה
  english_pob_choice: from Judah
  chosen_spanish: que había venido de Judá
  alternatives_spanish:
  - de Judá
  - procedente de Judá
  lexicon: HALOT
  rationale: La idea de origen se expresa de manera más natural en la cláusula relativa española con «había venido de Judá», que sigue el valor direccional del hebreo y armoniza con el verbo de movimiento ya usado en el versículo.
translation_notes:
  revision_awareness: El inglés POB revisó la conjunción de ‘Now’ a ‘For’ para reflejar mejor el valor explicativo del hebreo. En español se siguió ese ajuste con «Porque», que introduce la explicación de por qué el padre pregunta el camino. No se detectaron otros cambios doctrinales o textuales relevantes en el audit trail.
  spanish_consistency_notes:
  - Se mantuvo «hombre de Dios» como término técnico estable, coherente con el texto hebreo y con la decisión inglesa.
  - Se prefirió «camino» en ambas ocurrencias para conservar la repetición del original.
  - Se usó pluscuamperfecto («habían visto», «había tomado», «había venido») para reflejar la relación temporal observada en el inglés auditado y evitar ambigüedad en español.
  - No se introdujo «Señor» ni otra sustitución para nombres divinos, porque este versículo no contiene יהוה ni κύριος.
  - La frase inicial «Y su padre les dijo» mantiene el flujo narrativo sin perder la referencia explícita a los destinatarios.
