translation:
  language: es
  text: 'Entonces el rey Roboam consultó a los ancianos que habían estado al servicio[a] de Salomón, su padre, mientras este aún vivía, diciendo: «¿Cómo me aconsejan[b] que yo responda a este pueblo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «que habían estado delante de Salomón». La expresión también puede significar que lo atendían o servían oficialmente.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «¿Cómo están aconsejando para devolver una palabra a este pueblo?». El hebreo usa un modismo que significa dar una respuesta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּעַץ
  english_pob_choice: consulted
  chosen_spanish: consultó
  alternatives_spanish:
  - tomó consejo con
  - conferenció con
  lexicon: HALOT
  rationale: El nifal de יעץ expresa buscar consejo de otros; en español, «consultó» es natural y conserva la idea de pedir orientación, no solo deliberar interiormente.
- source_word: הַזְּקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los mayores
  - los consejeros ancianos
  lexicon: HALOT
  rationale: זקנים puede referirse a hombres mayores con función de liderazgo. «Ancianos» mantiene la referencia directa y es idiomático en español bíblico sin perder el matiz de autoridad.
- source_word: אֲשֶׁר הָיוּ עֹמְדִים לִפְנֵי
  english_pob_choice: who had stood before
  chosen_spanish: que habían estado delante de
  alternatives_spanish:
  - que habían atendido a
  - que habían servido delante de
  lexicon: HALOT
  rationale: La imagen hebrea de «estar delante de» se conserva con «estar delante de», una formulación comprensible en español y suficientemente cercana al giro original.
- source_word: שְׁלֹמֹה אָבִיו
  english_pob_choice: Solomon his father
  chosen_spanish: Salomón, su padre
  alternatives_spanish:
  - su padre Salomón
  lexicon: HALOT
  rationale: Se mantiene la aposición hebrea con coma, y «Salomón» conserva el nombre propio en forma española común.
- source_word: בִּהְיוֹתוֹ חַי
  english_pob_choice: while he was still alive
  chosen_spanish: mientras estaba vivo
  alternatives_spanish:
  - durante su vida
  - cuando aún vivía
  lexicon: HALOT
  rationale: La construcción temporal expresa el estado de estar con vida; «mientras estaba vivo» es claro y natural, y mantiene la contraposición implícita con el momento posterior a su muerte.
- source_word: אֵיךְ אַתֶּם נוֹעָצִים
  english_pob_choice: How do you advise me
  chosen_spanish: ¿Cómo aconsejan ustedes
  alternatives_spanish:
  - ¿Qué me aconsejan
  - ¿Cómo me aconsejan
  lexicon: HALOT
  rationale: El participio plural «aconsejan» refleja el plural del hebreo y conserva la fuerza de pedir consejo; el objeto implícito se completa en la cláusula siguiente.
- source_word: לְהָשִׁיב
  english_pob_choice: to answer
  chosen_spanish: responda
  alternatives_spanish:
  - conteste
  - dé respuesta
  lexicon: HALOT
  rationale: Aquí השיב significa dar una respuesta; «responda» reproduce bien la función idiomática del verbo sin sobrecargar la frase.
- source_word: לָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: a este pueblo
  alternatives_spanish:
  - a esta gente
  - a este pueblo de aquí
  lexicon: HALOT
  rationale: Se conserva el sustantivo colectivo singular «pueblo», con el demostrativo próximo «este», como en el hebreo.
- source_word: דָּבָר
  english_pob_choice: a word
  chosen_spanish: respuesta
  alternatives_spanish:
  - palabra
  - contestación
  lexicon: HALOT
  rationale: En español, «responder a este pueblo una palabra» suena poco natural; como el contexto idiomático ya pide una contestación, «respuesta» expresa con fidelidad la función de דבר sin perder el sentido del giro.
translation_notes:
  revision_awareness: Se siguió de cerca el hebreo masorético y el auditable inglés POB. Se mantuvo el valor idiomático de לְהָשִׁיב como «responder» y se evitó una traducción mecánica de «palabra» en el español principal, porque el español requiere una contestación explícita para sonar natural sin perder el sentido del modismo hebreo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se emplea «ancianos» para זקנים, coherente con el uso bíblico de líderes mayores o consejeros.
  - «Roboam» y «Salomón» siguen las formas españolas estándar de los nombres propios.
  - La cita directa se introduce con dos puntos y comillas angulares españolas por claridad tipográfica.
