translation:
  language: es
  text: Pero el campo, cuando salga en el jubileo, será santo para Yahvé, como un campo dedicado irrevocablemente[a]; será la posesión del sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bajo el anatema». El hebreo חֵרֶם se refiere a algo irrevocablemente apartado para Yahvé y retirado del uso humano ordinario.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: But ... shall be
  chosen_spanish: Pero ... será
  alternatives_spanish:
  - Y ... será
  - Entonces ... será
  lexicon: HALOT
  rationale: La partícula wə + qatal mantiene aquí un sentido consecuencial dentro del caso legal; «Pero» preserva el contraste con el versículo anterior y «será» refleja la fuerza resultativa/futura sin añadir paráfrasis.
- source_word: הַשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - la parcela
  - la tierra
  lexicon: HALOT
  rationale: Es el sustantivo definido básico y el contexto ya ha presentado el terreno discutido; «campo» es la equivalencia natural y fiel en español.
- source_word: בְּצֵאתוֹ
  english_pob_choice: when it goes out
  chosen_spanish: cuando salga
  alternatives_spanish:
  - cuando sea liberado
  - al salir
  lexicon: HALOT
  rationale: La expresión hebrea literal es «al salir», pero en este contexto legal la idea es la salida/reversión del bien en el jubileo. «Cuando salga» conserva la imagen verbal sin forzar una interpretación explicativa adicional.
- source_word: בַיֹּבֵל
  english_pob_choice: in the Jubilee
  chosen_spanish: en el jubileo
  alternatives_spanish:
  - en el año del jubileo
  - en el jubileo del año
  lexicon: HALOT
  rationale: «Jubileo» es el término técnico adecuado y puede aparecer con artículo o sin él según el flujo de la frase; aquí «en el jubileo» suena natural y preciso.
- source_word: קֹדֶשׁ לַיהוָה
  english_pob_choice: holy to Yahweh
  chosen_spanish: santo para Yahvé
  alternatives_spanish:
  - santo a Yahvé
  - consagrado a Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula de consagración a YHWH con el nombre divino «Yahvé», conforme al criterio del proyecto. «Santo» mantiene la fuerza cultual/legal del hebreo; «para» expresa destino/relación consagratoria de modo claro en español.
- source_word: כִּשְׂדֵה הַחֵרֶם
  english_pob_choice: like a devoted field
  chosen_spanish: como un campo consagrado
  alternatives_spanish:
  - como un campo dedicado
  - como un campo bajo el anatema
  lexicon: HALOT
  rationale: 'חֵרֶם tiene una tensión lexical importante: designa algo irrevocablemente apartado para Dios y fuera del uso común. En español, «consagrado» es la opción más sobria y publicable aquí, sin introducir por defecto la idea de destrucción, que el hebreo no explicita en este versículo. La nota conserva la alternativa lexical relevante.'
- source_word: לַכֹּהֵן
  english_pob_choice: the priest’s
  chosen_spanish: del sacerdote
  alternatives_spanish:
  - para el sacerdote
  - al sacerdote
  lexicon: HALOT
  rationale: El lamed final indica asignación/posesión en la cláusula de resultado; en español, «del sacerdote» expresa de manera natural la pertenencia resultante.
- source_word: תִּהְיֶה אֲחֻזָּתוֹ
  english_pob_choice: it shall be the priest’s possession
  chosen_spanish: será la posesión del sacerdote
  alternatives_spanish:
  - le pertenecerá como posesión al sacerdote
  - será su posesión
  lexicon: HALOT
  rationale: אֲחֻזָּה denota una posesión patrimonial, especialmente una tenencia de tierra. «La posesión del sacerdote» conserva el matiz jurídico de propiedad hereditaria/tenencia sin diluirlo en una posesión genérica.
theological_decisions:
- issue: Sentido de חֵרֶם en la comparación legal
  english_pob_reading: like a devoted field
  chosen_spanish_reading: como un campo consagrado
  alternative_spanish_readings:
  - como un campo dedicado
  - como un campo bajo el anatema
  rationale: El punto del pasaje es que el campo queda apartado irrevocablemente para Yahvé y pasa fuera del alcance normal del dueño original. En esta cláusula comparativa, el hebreo no requiere explicitar destrucción; por eso «consagrado» evita una sobreinterpretación y mantiene la seriedad de la dedicación total. La nota preserva la alternativa tradicional 'bajo el anatema' como posibilidad semántica.
  doctrine_reference: Translation philosophy §1, §5
- issue: Tratamiento del nombre divino
  english_pob_reading: the LORD / Yahweh in the audit trail
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto exige traducir יהוה como «Yahvé» en el texto principal. Aquí no hay un κύριος griego que exija explicación adicional; se mantiene el nombre propio del pacto conforme a la política del POB en español.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés que volvió «goes out» más literal y simplificó la comparación para evitar una expansión interpretativa. En español, se conserva esa cercanía al hebreo con «cuando salga en el jubileo» y se mantiene la comparación breve con «como un campo consagrado», evitando añadir «destrucción» donde el texto fuente no la explicita.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme al criterio del proyecto.
  - «santo» se usa para קֹדֶשׁ en sentido cultual/legal, sin reemplazarlo por una paráfrasis.
  - «posesión» traduce אֲחֻזָּה con matiz patrimonial, coherente con el contexto legal de Levítico 27.
  - La nota al pie conserva la alternativa semántica importante de חֵרֶם sin duplicar el término principal en el texto.
