translation:
  language: es
  text: Y el sacerdote lo examina[a], y he aquí una hinchazón blanca en la piel, y esta ha vuelto blanco el pelo, y hay carne viva[b] en la hinchazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo inspecciona»; ראה en este contexto es un verbo de examen médico-ritual, no solo de visión general.
    reason: lexical_alternative
  - marker: b
    text: Lit. «carne viva»; la expresión se refiere a tejido vivo o expuesto dentro de la lesión.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  english_pob_choice: examines
  chosen_spanish: lo examina
  alternatives_spanish:
  - lo mira
  - lo inspecciona
  lexicon: HALOT
  rationale: En este contexto legal-diagnóstico, ראה no es solo ver, sino revisar o examinar la condición. «Lo examina» conserva la fuerza procedural y suena natural en español.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficial
  - el presbítero
  lexicon: HALOT
  rationale: כֹּהֵן en el marco levítico designa al sacerdote encargado del examen ritual; «sacerdote» es el equivalente estándar y transparente en español.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: La fórmula señala atención a lo observado. «He aquí» conserva el giro deíctico con dignidad literaria sin perder claridad.
- source_word: שְׂאֵת
  english_pob_choice: swelling
  chosen_spanish: hinchazón
  alternatives_spanish:
  - elevación
  - levantamiento
  - tumor
  lexicon: HALOT
  rationale: En Levítico 13, שְׂאֵת es un término técnico para una lesión elevada en la piel. «Hinchazón» comunica bien la idea en español moderno; se preserva la posible alternativa técnica en nota.
- source_word: בָּעוֹר
  english_pob_choice: in the skin
  chosen_spanish: en la piel
  alternatives_spanish:
  - sobre la piel
  - dentro de la piel
  lexicon: HALOT
  rationale: La preposición y el sustantivo indican localización de la lesión. «En la piel» es la forma más natural y fiel al contexto.
- source_word: וְהִיא הָפְכָה שֵׂעָר לָבָן
  english_pob_choice: it has turned the hair white
  chosen_spanish: el pelo se le ha vuelto blanco
  alternatives_spanish:
  - el cabello se le ha puesto blanco
  - el pelo se ha puesto blanco
  lexicon: HALOT
  rationale: El sujeto femenino retoma la lesión; en español conviene expresar el efecto sobre el pelo sin forzar una construcción extraña. «Se le ha vuelto blanco» mantiene la relación con la persona examinada y la observación clínica.
- source_word: וּמִחְיַת בָּשָׂר חַי
  english_pob_choice: raw flesh
  chosen_spanish: carne viva
  alternatives_spanish:
  - tejido vivo
  - carne cruda
  - carne abierta
  lexicon: HALOT
  rationale: La POB en inglés revisó «raw living flesh» a «raw flesh» para evitar rigidez. En español, «carne viva» conserva el sentido técnico y la tensión literal de בָּשָׂר חַי sin añadir explicación interpretativa al texto principal.
- source_word: בַּשְׂאֵת
  english_pob_choice: in the swelling
  chosen_spanish: en la hinchazón
  alternatives_spanish:
  - dentro de la hinchazón
  - en la elevación
  lexicon: HALOT
  rationale: Se mantiene la repetición del término de la lesión para respetar la cohesión lexical del versículo; la preposición «en» refleja la localización interna indicada por el hebreo.
translation_notes:
  revision_awareness: La base inglesa revisó «raw living flesh» a «raw flesh» para evitar una literalidad torpe. En español, se optó por «carne viva» en el texto principal porque comunica con precisión la idea de tejido vivo/expuesto y preserva mejor la tensión lexical del hebreo, mientras la nota reconoce la alternativa más idiomática.
  spanish_consistency_notes:
  - Se preservó la terminología diagnóstica de Levítico 13 con un equivalente consistente para שְׂאֵת.
  - Se evitó «SEÑOR» y otras convenciones de reemplazo irrelevantes para este versículo.
  - «Sacerdote» se mantuvo como término levítico estándar, sin introducir matices eclesiales ajenos al pasaje.
  - La repetición de la lesión («hinchazón») se conservó para reflejar la repetición hebrea de שְׂאֵת.
