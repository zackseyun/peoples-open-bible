    text: O «el mar de aguas estancadas».
    reason: previous_rendering
  revision_rationale: Se añadió la nota omitida que preserva la alternativa significativa del expediente inglés para הַמּוּצָאִים, anclándola en el segundo «mar». También se ajustó «son sanadas» a «quedan sanadas» para mejorar la naturalidad en español sin perder la metáfora ni la pasividad del hebreo.
