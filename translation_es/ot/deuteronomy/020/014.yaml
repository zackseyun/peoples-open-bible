review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el contenido del hebreo: excepción restrictiva, mujeres/niños/ganado, todo lo que haya en la ciudad, botín, y la cláusula final con Yahvé tu Dios. Sin embargo, hay dos desajustes importantes con el audit trail y con la fuerza léxica del hebreo: (1) el texto español imprime ''Yahvé'' aunque la decisión léxica declarada es correcta; eso debe corregirse en el texto principal, y (2) la nota al pie está anclada en ''tomarlo'' y explica una suavización introducida por el español, mientras que la nota preservada en el POB inglés corresponde a ''comer/eat'' como alternativa léxica. Además, ''tomarlo'' pierde parte de la fuerza de תָּבֹז לָךְ (''tomar como botín/saquear'').'
  spanish_quality_summary: El español es claro y legible, con buena puntuación. No obstante, 'podrás tomarlo para ti' suena algo atenuado frente al contexto bélico y resulta menos preciso que 'podrás tomar como botín'. También conviene alinear la modalidad con el inglés auditado usando 'podrás comer' en vez de 'comerás', para mantener la fuerza permisiva de ambas formas verbales en este contexto legal.
  glossary_alignment: Alineación parcial. 'Yahvé' debe aparecer en el texto principal conforme al glosario del proyecto. 'Botín' para שָׁלָל y 'ganado' para הַבְּהֵמָה están bien. La nota debe trasladarse a 'comer' para reflejar la razón léxica documentada sobre אָכַל ('comer' literal, con extensión a usar/aprovechar lo tomado).
  issues:
  - severity: high
    issue: El texto principal usa 'Yahvé' en vez de 'Yahvé'.
    rationale: El proyecto exige 'Yahvé' para יהוה en español. La decisión léxica interna ya lo reconoce, pero la forma impresa del borrador no la sigue.
  - severity: medium
    issue: La nota al pie está aplicada a 'tomarlo' y no a 'comer'.
    rationale: El audit trail inglés conserva una nota léxica sobre אָכַל ('eat') y su sentido extendido de usar/aprovechar el botín. La nota española actual introduce otra justificación distinta sobre suavizar תָּבֹז, lo cual no preserva la documentación existente.
  - severity: medium
    issue: '''podrás tomarlo para ti'' debilita la fuerza de תָּבֹז לָךְ.'
    rationale: El verbo hebreo significa tomar botín/saquear. En español, 'tomarlo para ti' es comprensible pero menos específico; 'tomar como botín' conserva mejor el sentido bélico sin sonar antinatural.
  - severity: low
    issue: La secuencia modal 'podrás ...; y comerás ...' queda menos consistente que 'podrás ...; y podrás ...'.
    rationale: El POB inglés documenta una lectura permisiva para ambas formas en este contexto legal. En español, repetir 'podrás' mantiene mejor esa autorización contextual.
  revised_spanish_text: Solo las mujeres, los niños pequeños, el ganado y todo lo que haya en la ciudad—todo su botín—podrás tomar como botín para ti; y podrás comer[a] el botín de tus enemigos, que Yahvé tu Dios te ha dado.
  revised_footnotes:
  - marker: a
    text: 'O: «podrás aprovechar el botín de tus enemigos». El verbo hebreo es literalmente «comer» y puede extenderse a usar o consumir lo que se toma.'
    reason: lexical_alternative
  revision_rationale: Se corrige el nombre divino a 'Yahvé' según la política del proyecto, se restaura la especificidad bélica de תָּבֹז con 'tomar como botín', y se reubica la nota al verbo 'comer' para reflejar la justificación léxica documentada en el POB inglés. También se armoniza la modalidad permisiva con 'podrás ... y podrás ...' en el contexto legal.
