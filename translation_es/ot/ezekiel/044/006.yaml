translation:
  language: es
  text: 'Y di a la casa rebelde[a], a la casa de Israel: «Así dice el Señor Yahvé: Basta de todas sus abominaciones, casa de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «al rebelde»; el sustantivo puede entenderse también de manera más abstracta como «rebeldía» o colectivamente como «el pueblo rebelde». En contexto se expresa mejor como «casa rebelde».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶרִי
  english_pob_choice: the rebellious house
  chosen_spanish: el rebelde
  alternatives_spanish:
  - la rebeldía
  - la casa rebelde
  - el pueblo rebelde
  lexicon: HALOT
  rationale: En este saludo profético, el hebreo usa un sustantivo singular con valor colectivo o abstracto. «El rebelde» conserva esa forma singular y permite una dirección directa en español; la nota aclara que el sentido es colectivo en contexto. Evito «rebeldía» porque suena más abstracto y pierde el efecto de interpelación.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - casa de Israel
  lexicon: HALOT
  rationale: Se mantiene la fórmula pactual literal y reconocible. «La casa de Israel» reproduce el valor corporativo y teológico del hebreo sin simplificarlo a «Israel».
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: HALOT
  rationale: 'Se conserva el título compuesto y el nombre divino según la convención del proyecto: יהוה → «Yahvé». «El Señor Yahvé» evita la sustitución de máscara «SEÑOR» y mantiene la fuerza reverencial de אֲדֹנָי + יְהוִה.'
- source_word: רַב לָכֶם
  english_pob_choice: Enough
  chosen_spanish: Basta
  alternatives_spanish:
  - Es demasiado para ustedes
  - Les basta
  - Ya es suficiente
  lexicon: HALOT
  rationale: «Basta» expresa el giro idiomático con concisión natural en español. Mantiene el tono de reprensión y el sentido de límite alcanzado, sin convertirlo en paráfrasis.
- source_word: מִכָּל תּוֹעֲבֹתֵיכֶם
  english_pob_choice: of all your abominations
  chosen_spanish: de todas sus abominaciones
  alternatives_spanish:
  - de todas sus cosas abominables
  - de todos sus actos detestables
  lexicon: HALOT
  rationale: Se preserva el término fuerte «abominaciones» para תּוֹעֵבָה, especialmente apropiado en el contexto de pureza del templo en Ezequiel. «De» funciona idiomáticamente con «Basta de…» en español.
theological_decisions:
- issue: Modo de dirigir la acusación profética a מֶרִי en singular con valor colectivo
  english_pob_reading: And say to the rebellious house, to the house of Israel
  chosen_spanish_reading: Y di al rebelde, a la casa de Israel
  alternative_spanish_readings:
  - Y di a la rebeldía, a la casa de Israel
  - Y di al pueblo rebelde, a la casa de Israel
  rationale: El hebreo puede entenderse como un singular colectivo/abstracto. La redacción española mantiene ese rasgo sin forzar una expansión interpretativa. La apposición «a la casa de Israel» aclara el referente comunitario, como en la revisión inglesa final.
  doctrine_reference: 'DOCTRINE.md: Collective address and prophetic rebuke'
- issue: Representación del nombre divino en el título אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: El texto hebreo contiene el Tetragrama, que el proyecto rinde como «Yahvé». Conservar «Señor» para אֲדֹנָי y «Yahvé» para יְהוִה mantiene ambos elementos del título compuesto sin ocultar el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente cambió «the rebellious one» por «the rebellious house» para reflejar mejor el sentido colectivo de מֶרִי y su concordancia con «the house of Israel». La redacción española sigue esa corrección en sentido, aunque conserva una formulación más breve y natural: «al rebelde», con nota para el matiz colectivo.'
  spanish_consistency_notes:
  - Se aplicó la convención del proyecto para יהוה → «Yahvé», no «SEÑOR».
  - Se mantuvo el término fuerte «abominaciones» para תּוֹעֵבָה por coherencia con Ezequiel y con el audit trail inglés.
  - «Casa de Israel» se conservó literalmente por consistencia pactual y estilística.
  - La puntuación con dos puntos y comillas angulares sigue el estilo español bíblico moderno y mantiene la división exhortación-oráculo.
