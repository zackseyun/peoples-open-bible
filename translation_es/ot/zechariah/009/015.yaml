translation:
  language: es
  text: Yahvé de los Ejércitos los protegerá[a], y ellos devorarán y pisotearán las piedras de la honda; beberán y rugirán como con vino, y se llenarán como una vasija[c][b], como las esquinas del altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede leerse: «El SEÑOR de los ejércitos».'
    reason: alternative_reading
  - marker: b
    text: El término hebreo para el recipiente alude a una vasija usada en ritos sacrificiales.
    reason: cultural_note
  - marker: c
    text: La imagen probablemente evoca sangre aplicada o salpicada en el altar, pero el hebreo dice simplemente «como las esquinas del altar».
    reason: cross_reference
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el nombre divino según el criterio del proyecto, manteniendo la referencia de pacto y evitando el reemplazo por una convención de máscara litúrgica.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de los ejércitos celestiales
  - de los anfitriones
  lexicon: HALOT
  rationale: En este contexto bélico, 'Ejércitos' preserva la fuerza militar de צְבָאוֹת y suena natural en español sin recurrir al tradicional 'huestes'.
- source_word: יָגֵן עֲלֵיהֶם
  english_pob_choice: will shield them
  chosen_spanish: los protegerá
  alternatives_spanish:
  - los defenderá
  - será escudo para ellos
  lexicon: HALOT
  rationale: El hebreo expresa cobertura/protección; en español, 'protegerá' comunica bien la idea sin perder claridad. Se evita forzar una metáfora menos natural en este verso.
- source_word: וְאָכְלוּ
  english_pob_choice: they will devour
  chosen_spanish: devorarán
  alternatives_spanish:
  - comerán
  - consumirán
  lexicon: HALOT
  rationale: En contexto de victoria militar, 'devorarán' conserva el valor figurado de conquista violenta que el texto exige, sin reducirlo a un comer literal.
- source_word: וְכָבְשׁוּ
  english_pob_choice: tread down
  chosen_spanish: pisotearán
  alternatives_spanish:
  - dominarán
  - someterán
  - harán trizas
  lexicon: HALOT
  rationale: Dado que el objeto son las piedras de la honda, 'pisotearán' reproduce bien la imagen de desprecio y derrota material, equivalente al 'tread down' del POB inglés.
- source_word: אַבְנֵי קֶלַע
  english_pob_choice: the sling stones
  chosen_spanish: las piedras de la honda
  alternatives_spanish:
  - las piedras de la honda
  - las piedras arrojadas por la honda
  - las pedradas de la honda
  lexicon: HALOT
  rationale: Es una equivalencia directa y transparente del constructo hebreo. 'Honda' mantiene el instrumento de guerra; 'piedras' preserva la concreción del texto.
- source_word: וְשָׁתוּ
  english_pob_choice: they will drink
  chosen_spanish: beberán
  alternatives_spanish:
  - tomarán
  - beberán con avidez
  lexicon: HALOT
  rationale: Se mantiene el verbo literal, necesario para introducir el paralelo de embriaguez/exaltación de la línea siguiente.
- source_word: הָמוּ
  english_pob_choice: roar
  chosen_spanish: rugirán
  alternatives_spanish:
  - harán estruendo
  - se alborotarán
  - bramarán
  lexicon: HALOT
  rationale: '''הָמוּ'' denota ruido tumultuoso; ''rugirán'' conserva el vigor de la imagen y funciona bien con el paralelo de vino e intensidad bélica.'
- source_word: כְּמוֹ יָיִן
  english_pob_choice: as if with wine
  chosen_spanish: como con vino
  alternatives_spanish:
  - como vino
  - como si fuera vino
  lexicon: HALOT
  rationale: La comparación debe sonar natural en español y conservar el valor simile del hebreo sin explicitar más de lo que el texto dice.
- source_word: וּמָלְאוּ
  english_pob_choice: they will be filled
  chosen_spanish: se llenarán
  alternatives_spanish:
  - quedarán llenos
  - estarán llenos
  lexicon: HALOT
  rationale: 'Se preserva el sentido resultativo del verbo: quedar colmados. El reflexivo es idiomático en español y no añade contenido ajeno.'
- source_word: כַּמִּזְרָק
  english_pob_choice: like a bowl
  chosen_spanish: como un tazón
  alternatives_spanish:
  - como un tazón
  - como un tazón ritual
  - como una vasija
  lexicon: HALOT
  rationale: מִזְרָק es un recipiente de uso ritual; 'tazón' comunica la forma básica en español. Se deja el matiz cultual para nota, evitando una traducción demasiado técnica en el cuerpo del texto.
- source_word: כְּזָוִיּוֹת מִזְבֵּחַ
  english_pob_choice: like the corners of the altar
  chosen_spanish: como las esquinas del altar
  alternatives_spanish:
  - como las esquinas del altar
  - como las esquinas del altar de sacrificio
  lexicon: HALOT
  rationale: Se conserva la imagen exacta del hebreo sin introducir 'hornos' u otra precisión no expresada explícitamente. 'Esquinas' es natural en español y mantiene la estructura visual.
theological_decisions:
- issue: Renderizar el nombre divino יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - El SEÑOR de los ejércitos
  - Yahvé de las huestes
  rationale: Se conserva el nombre propio divino según la política del proyecto y se traduce צְבָאוֹת con un equivalente transparente en español. Esto mantiene la tonalidad bélica del versículo sin ocultar el nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Conservar la tensión entre victoria militar e imaginería sacrificial
  english_pob_reading: Preserve the battle and cultic metaphors without allegorizing or softening them
  chosen_spanish_reading: Conservar las metáforas bélicas y cultuales sin allegorizarlas ni suavizarlas
  alternative_spanish_readings:
  - Explicar la imagen como triunfo general
  - Parafrasear el pasaje para hacerlo más explícito
  rationale: El verso combina conquista, embriaguez y lenguaje sacrificial. La traducción mantiene esas capas visibles en vez de resolverlas en una explicación interpretativa única.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1 and §3'
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'trample' por 'tread down' para hacer más formal la versión. En español se optó por 'pisotearán', que conserva la imagen directa de humillación y derrota y resulta natural en el registro bíblico sin desdibujar el matiz del verbo hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal para el nombre divino, conforme al estándar del proyecto.
  - Se eligió 'Ejércitos' para צְבָאוֹת en coherencia con el sentido militar del contexto.
  - '''Piedras de la honda'' conserva el objeto concreto y evita una abstracción innecesaria.'
  - '''Tazón'' se reserva para el recipiente cultual, con explicación en nota para no perder el matiz ritual.'
  - No se introdujo una glosa interpretativa en el texto principal sobre la sangre del altar; esa posible asociación queda en nota, como en el audit trail inglés.
