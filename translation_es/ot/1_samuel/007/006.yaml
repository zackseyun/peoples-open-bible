base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/007/006.yaml
  text: So they gathered at Mizpah[a], drew water, and poured it out before Yahweh. They fasted on that day and said there[c][b], “We have sinned against Yahweh.” And Samuel judged the sons of Israel at Mizpah.
  footnotes:
  - marker: a
    text: Or “to Mizpah” at the first mention; the Hebrew form includes a directional ending.
    reason: lexical_alternative
  - marker: b
    text: The pouring out of water before the LORD is a ritual act of repentance or lament, though the text does not explain its symbolism explicitly.
    reason: cultural_note
  - marker: c
    text: Hebrew “the sons of Israel.”
    reason: lexical_alternative
