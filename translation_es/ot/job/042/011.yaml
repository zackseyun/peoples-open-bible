base_translation:
  language: en
  yaml_path: translation/ot/job/042/011.yaml
  text: Then all his brothers[a], all his sisters, and all who had known him before came to him, and they ate bread with him in his house. They showed him sympathy and comforted him for all the calamity that Yahweh had brought upon him[d][c][b]. And each one gave him one qesitah and one gold ring.
  footnotes:
  - marker: a
    text: Or 'all his former acquaintances.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'ate bread,' a common expression for sharing a meal.
    reason: cultural_note
  - marker: c
    text: The Hebrew term qesitah refers to an ancient unit or piece of value; its exact equivalent is uncertain.
    reason: cultural_note
  - marker: d
    text: Or 'one gold nose-ring'; the Hebrew word can refer to a ring worn in the nose or ear.
    reason: lexical_alternative
