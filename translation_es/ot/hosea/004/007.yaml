revisions:
- from: Cuanto más se multiplicaron[a], más pecaron contra mí[b]; yo cambiaré su gloria por vergüenza.
  to: Cuanto más se multiplicaron[a], más pecaron contra mí; yo convertiré su gloria en vergüenza[b].
  rationale: Se corrige la ubicación de la nota b para que corresponda a la cláusula final, conforme al rastro de auditoría inglés y a la sintaxis hebrea. También se mejora la redacción principal a «convertiré su gloria en vergüenza», que comunica con mayor naturalidad en español el sentido de cambio de estado de אָמִיר + בְּקָלוֹן, mientras se conserva en la nota la alternativa más literal «cambiaré ... por vergüenza».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:20:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura correlativa de כְּרֻבָּם ... כֵּן y traduce correctamente חָטְאוּ לִי como «pecaron contra mí». También preserva acertadamente la ambigüedad de כְּבוֹדָם como «su gloria». Sin embargo, la nota b está mal anclada: el marcador aparece tras «mí», pero la variante inglesa y la evidencia fuente corresponden a la cláusula final «yo cambiaré su gloria por/en vergüenza». Además, en español «cambiaré su gloria por vergüenza» es aceptable, pero «convertiré su gloria en vergüenza» expresa mejor el sentido de transformación de בְּקָלוֹן con אָמִיר y suena más natural en español bíblico moderno.'
  spanish_quality_summary: El texto es legible y digno, con español natural. La primera cláusula funciona bien como «Cuanto más..., más...». La segunda mitad puede mejorarse levemente para mayor claridad idiomática y para reflejar mejor el movimiento a un estado de deshonra. También conviene corregir la puntuación/ubicación de la nota para que el lector no asocie erróneamente la variante con «contra mí».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Gloria» mantiene la decisión documentada para כְּבוֹדָם. No hay nombres divinos ni términos del glosario principal en disputa aquí. La revisión propuesta conserva la tensión teológica sin expandir interpretativamente el referente de «su gloria».
  issues:
  - severity: medium
    issue: El marcador de la nota b está anclado a la frase equivocada.
    rationale: La nota b en el rastro inglés corresponde a la cláusula final sobre אָמִיר / בְּקָלוֹן («I will change/exchange their glory into/for disgrace»), no a «pecaron contra mí». Tal como está, el aparato de notas induce a error.
  - severity: low
    issue: «cambiaré su gloria por vergüenza» puede mejorarse a una formulación más natural y precisa en español.
    rationale: Aunque «por vergüenza» no es incorrecto, «en vergüenza» o «en deshonra» representa mejor el cambio de estado implicado y evita una lectura excesivamente transaccional de «por» en español.
  - severity: low
    issue: La nota a puede ajustarse para sonar más natural en español.
    rationale: «A medida que se multiplicaron, así pecaron contra mí» reproduce de cerca el hebreo, pero «A medida que se multiplicaban, así pecaban contra mí» o «Mientras más se multiplicaban, más pecaban contra mí» suena más idiomático. Dado que es nota alternativa, basta una mejora leve.
  revised_spanish_text: Cuanto más se multiplicaron[a], más pecaron contra mí; yo convertiré su gloria en vergüenza[b].
  revised_footnotes:
