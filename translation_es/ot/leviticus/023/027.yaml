translation:
  language: es
  text: Pero el día diez de este séptimo mes[a] será el Día de la Expiación; será para ustedes una santa convocación, y se afligirán[b], y presentarán una ofrenda de alimento[c] a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el Día de las Expiaciones». El hebreo usa una forma plural; la tradición bíblica en español suele decir «el Día de la Expiación».
    reason: alternative_reading
  - marker: b
    text: 'También puede traducirse: «se humillarán» o «se negarán a sí mismos».'
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente, «ofrenda por fuego». El hebreo אִשֶּׁה designa una ofrenda ofrecida mediante fuego.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  - Solo
  lexicon: HALOT
  rationale: La partícula introduce una transición restrictiva/enfática respecto de las instrucciones festivas anteriores. «Pero» comunica ese giro de modo natural en español sin exagerarlo.
- source_word: בֶּעָשׂוֹר
  english_pob_choice: on the tenth day
  chosen_spanish: en el día diez
  alternatives_spanish:
  - el día diez
  - en el décimo
  lexicon: HALOT
  rationale: El hebreo expresa la fecha con preposición + ordinal; en español conviene explicitar «día» para evitar ambigüedad y mantener la claridad temporal.
- source_word: לַחֹדֶשׁ הַשְּׁבִיעִי הַזֶּה
  english_pob_choice: of this seventh month
  chosen_spanish: de este séptimo mes
  alternatives_spanish:
  - en este séptimo mes
  - del séptimo mes, este
  lexicon: HALOT
  rationale: «Mes» refleja el sustantivo חֹדֶשׁ en su sentido calendárico, y el demostrativo «este» conserva el valor deíctico del hebreo.
- source_word: יוֹם הַכִּפֻּרִים
  english_pob_choice: the Day of Atonement
  chosen_spanish: el Día de la Expiación
  alternatives_spanish:
  - el Día de las Expiaciones
  - el Día de la Propiciación
  lexicon: HALOT
  rationale: Aunque el hebreo es morfológicamente plural, en español litúrgico y bíblico «Día de la Expiación» comunica con claridad el nombre festivo. Se preserva la forma tradicional inteligible, sin forzar un plural poco natural en español.
- source_word: מִקְרָא קֹדֶשׁ
  english_pob_choice: a holy convocation
  chosen_spanish: una santa convocación
  alternatives_spanish:
  - una asamblea santa
  - una congregación santa
  lexicon: HALOT
  rationale: «Convocación» mantiene el matiz técnico de reunión convocada para culto; «santa» sigue el adjetivo קדשׁ sin sustituirlo por una expresión más general.
- source_word: וְעִנִּיתֶם אֶת נַפְשֹׁתֵיכֶם
  english_pob_choice: you shall afflict yourselves
  chosen_spanish: se afligirán a ustedes mismos
  alternatives_spanish:
  - se humillarán a ustedes mismos
  - se negarán a sí mismos
  lexicon: HALOT
  rationale: Se preserva la fuerza verbal de ענה. La construcción reflexiva en español intenta reflejar el objeto enfático «sus vidas/personas» del hebreo, aunque suene menos idiomática que una paráfrasis suavizada; así no se pierde la dureza ritual del mandato.
- source_word: נַפְשֹׁתֵיכֶם
  english_pob_choice: yourselves
  chosen_spanish: a ustedes mismos
  alternatives_spanish:
  - sus almas
  - sus vidas
  - ustedes mismos
  lexicon: HALOT
  rationale: En este idioma, נֶפֶשׁ señala a la persona misma más que a una entidad separable. «A ustedes mismos» comunica el alcance reflexivo sin introducir «alma» como si fuera una antropología distinta.
- source_word: וְהִקְרַבְתֶּם
  english_pob_choice: present
  chosen_spanish: presentarán
  alternatives_spanish:
  - ofrecerán
  - traerán
  - acercarán
  lexicon: HALOT
  rationale: En contexto sacrificial, הִקְרִיב significa presentar/traer una ofrenda. «Presentarán» conserva formalidad y exactitud sin cargar innecesariamente el verbo con una explicación interpretativa.
- source_word: אִשֶּׁה
  english_pob_choice: a food offering
  chosen_spanish: una ofrenda encendida
  alternatives_spanish:
  - una ofrenda por fuego
  - una ofrenda de alimento
  lexicon: HALOT
  rationale: Se opta por una forma transparente y tradicionalmente reconocible en español bíblico. «Encendida» refleja el componente de fuego sin imponer la lectura moderna «alimento», que sería menos natural aquí.
- source_word: לַיהוָה
  english_pob_choice: to the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de verter יהוה como «Yahvé» en el texto principal, en lugar de una máscara reverencial. La preposición «a» reproduce con naturalidad el valor direccional/ofrendario de ל.
theological_decisions:
- issue: Nombre festivo hebreo con plural morfológico
  english_pob_reading: the Day of Atonement
  chosen_spanish_reading: el Día de la Expiación
  alternative_spanish_readings:
  - el Día de las Expiaciones
  - el Día de la Propiciación
  rationale: El hebreo lleva כִּפֻּרִים, con forma plural; la POB inglesa decidió no imponer el plural en el texto final por naturalidad. En español, «Día de la Expiación» preserva el título tradicional y claro, sin ocultar que el original literal es plural. La tensión se deja señalada en nota.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido del mandato de afligirse
  english_pob_reading: you shall afflict yourselves
  chosen_spanish_reading: se afligirán a ustedes mismos
  alternative_spanish_readings:
  - se humillarán a ustedes mismos
  - se negarán a sí mismos
  rationale: No se reduce el mandato a ayuno solamente ni se espiritualiza en exceso. El español elegido busca retener la aspereza cultual y penitencial del verbo hebreo, aunque requiera una formulación algo marcada.
  doctrine_reference: Translation philosophy §1, §3
- issue: Tratamiento del nombre divino
  english_pob_reading: to the LORD
  chosen_spanish_reading: a Yahvé
  alternative_spanish_readings:
  - al Señor
  - a YHWH
  rationale: Siguiendo el estándar del proyecto, se conserva el nombre divino explícito. Esto evita la ocultación del tetragrámaton bajo una convención reverencial y mantiene la auditabilidad del texto fuente.
  doctrine_reference: Project terminology defaults; Translation philosophy §1
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «Day of Atonements» a «Day of Atonement» por naturalidad, pero el comentario textual seguía reconociendo la forma plural hebrea. La presente versión española mantiene la claridad tradicional («Día de la Expiación») y conserva la tensión fuente/tradición en nota, mientras sigue el criterio del proyecto para יהוה como «Yahvé».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme a los parámetros del proyecto.
  - Se usa «santa convocación» para מִקְרָא קֹדֶשׁ, coherente con un registro bíblico formal.
  - «Afligir(se)» conserva la fuerza ritual del hebreo y evita reducir el mandato a una sola práctica.
  - «Ofrenda encendida» comunica la ofrenda sacrificial ligada al fuego sin reemplazarla por terminología eclesial más tardía.
