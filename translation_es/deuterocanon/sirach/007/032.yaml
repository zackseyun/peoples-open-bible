translation:
  language: es
  text: Pan de los poderosos y ofrenda de la mano[a], sacrificios de justicia y ofrenda santa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Y al pobre extiende tu mano, para que se complete tu bendición». El hebreo y el griego difieren de manera sustancial, lo que sugiere una tradición textual variante o corrupción en una de las líneas de transmisión.'
    reason: textual_variant
lexical_decisions:
- source_word: לֶחֶם / Bread
  english_pob_choice: Bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT; POB audit trail
  rationale: En español, «pan» conserva la imagen concreta y básica del hebreo y funciona de manera natural en un contexto sapiencial. «Alimento» o «comida» generalizarían más de lo que exige el texto base.
- source_word: אַבִּירִים
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los nobles
  - toros
  lexicon: HALOT; POB audit trail
  rationale: Sigo la lectura conservadora del hebreo transmitido, manteniendo el referente humano implícito sin resolverlo en una imagen distinta. «Los poderosos» es natural en español y conserva la fuerza social del término.
- source_word: וּתְרוּמַת יָד
  english_pob_choice: and an offering of the hand
  chosen_spanish: y una ofrenda de la mano
  alternatives_spanish:
  - y una contribución de tu mano
  - y una ofrenda hecha con la mano
  lexicon: HALOT; POB audit trail
  rationale: La expresión se conserva de forma literal para no borrar la imagen del hebreo. «Ofrenda de la mano» refleja el giro nominal y deja abierta la relación cultual o de donación que el hebreo sugiere.
- source_word: זִבְחֵי צֶדֶק
  english_pob_choice: sacrifices of righteousness
  chosen_spanish: sacrificios de justicia
  alternatives_spanish:
  - sacrificios de rectitud
  - sacrificios justos
  lexicon: HALOT; POB audit trail
  rationale: «Justicia» preserva el campo semántico de צֶדֶק en un registro bíblico natural en español. «Rectitud» sería posible, pero en este contexto puede sonar menos cultual y más moralista.
- source_word: וּתְרוּמַת קֹדֶשׁ
  english_pob_choice: and a holy contribution
  chosen_spanish: y una ofrenda santa
  alternatives_spanish:
  - y una contribución santa
  - y una ofrenda consagrada
  lexicon: HALOT; POB audit trail
  rationale: «Santa» comunica el carácter consagrado del término sin forzar tecnicismos. «Ofrenda» mantiene el paralelo con la línea anterior y es más natural para el lector hispanohablante que «contribución».
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: Translate the surviving Hebrew as the primary witness, while preserving the Greek's substantially different sense in a footnote.
  chosen_spanish_reading: Seguir el hebreo como texto principal y señalar en nota la versión griega, que da un sentido muy distinto.
  alternative_spanish_readings:
  - Y al pobre extiende tu mano, para que se complete tu bendición.
  - Y extiende tu mano al pobre, para que tu bendición llegue a su plenitud.
  rationale: En Sirácides, el hebreo conservado recibe primacía editorial cuando está disponible. Aquí el griego no es una simple variante estilística, sino una formulación sustancialmente diferente; por eso conviene mantener el hebreo en el texto principal y documentar la diferencia para transparencia textual.
  doctrine_reference: 'PHILOSOPHY.md: priorizar el hebreo de Sirácides cuando sobrevive; preservar variantes significativas en nota.'
translation_notes:
  revision_awareness: El hebreo conservado en este versículo presenta una forma muy distinta del paralelo griego. La redacción española sigue el hebreo como testigo principal, pero la nota recoge explícitamente la alternativa griega por razones de auditoría textual.
  spanish_consistency_notes:
  - He mantenido «ofrenda» para traducir תרומה con un registro bíblico natural en español.
  - He usado «justicia» para צֶדֶק, en coherencia con el tratamiento habitual de δικαιοσύνη/צדק en la serie.
  - He preferido un español moderno y digno, evitando calcos innecesarios, pero conservando la imaginería cultual del hebreo.
  - La nota marca la divergencia textual sin ocultarla en el cuerpo principal.
