  yaml_path: translation/ot/2_kings/020/009.yaml
  text: 'And Isaiah said[a], “This is the sign for you from Yahweh, that Yahweh will do the thing that he has spoken: shall the shadow go forward ten steps, or shall it turn back ten steps?”'
  footnotes:
