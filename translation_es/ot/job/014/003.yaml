translation:
  language: es
  text: Sin embargo, sobre uno así abres tus ojos[a], y me traes a juicio contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante ti»; el hebreo dice literalmente «contigo», lo que puede sugerir comparecer en juicio delante de Dios o entrar en una causa legal con él.
    reason: alternative_reading
lexical_decisions:
- source_word: אַף
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Y aun así
  - No obstante
  - Pero
  lexicon: HALOT
  rationale: La partícula introduce contraste con la fragilidad humana descrita antes; «Sin embargo» expresa bien ese giro adversativo sin endurecer el tono más de lo que pide el hebreo poético.
- source_word: עַל זֶה
  english_pob_choice: on such a one
  chosen_spanish: sobre uno así
  alternatives_spanish:
  - sobre este
  - sobre tal hombre
  - sobre un ser así
  lexicon: HALOT
  rationale: El hebreo apunta de forma cercana a la persona frágil del contexto inmediato. «Sobre uno así» conserva el referente humano sin convertirlo en una paráfrasis extensa.
- source_word: פָּקַחְתָּ עֵינֶךָ
  english_pob_choice: you open your eyes
  chosen_spanish: abres tus ojos
  alternatives_spanish:
  - has abierto tus ojos
  - fijas tus ojos
  - velas por
  lexicon: HALOT
  rationale: La imagen idiomática se mantiene de manera literal y natural en español. «Abres tus ojos» conserva el énfasis en la atención o escrutinio divino sin interpretarlo como vigilancia continua.
- source_word: וְאֹתִי
  english_pob_choice: and you bring me
  chosen_spanish: y me traes
  alternatives_spanish:
  - y a mí me traes
  - y me conduces
  - y me llevas
  lexicon: HALOT
  rationale: El pronombre enfático se refleja con la colocación directa «me traes», manteniendo que Job se pone en primer plano como sujeto del trato judicial.
- source_word: תָבִיא
  english_pob_choice: you bring
  chosen_spanish: traes
  alternatives_spanish:
  - haces venir
  - convocas
  - presentas
  lexicon: HALOT
  rationale: En contexto judicial, «traes» conserva el núcleo léxico de בוא sin sustituirlo por un término demasiado técnico como «convocas», que ya interpretaría el procedimiento.
- source_word: בְמִשְׁפָּט
  english_pob_choice: into judgment
  chosen_spanish: a juicio
  alternatives_spanish:
  - en juicio
  - ante juicio
  - para juicio
  lexicon: HALOT
  rationale: «Juicio» preserva el campo legal de מִשְׁפָּט y funciona de forma fluida en español bíblico contemporáneo. La preposición «a» refleja la entrada en un proceso judicial.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con respecto a ti
  - ante ti
  - contra ti
  lexicon: HALOT
  rationale: '«Contigo» mantiene la literalidad relacional de עם y deja abierta la tensión del hebreo: comparecer en juicio en relación con Dios, sin decidir de antemano si es «ante» o «contra» él.'
theological_decisions:
- issue: La relación judicial expresada por עִמָּךְ en la que Job es llevado ante Dios
  english_pob_reading: with you
  chosen_spanish_reading: contigo
  alternative_spanish_readings:
  - ante ti
  - contra ti
  rationale: 'Se conserva la ambigüedad del hebreo y la del POB inglés: la frase puede evocar comparecer delante de Dios o entrar en litigio con él. «Contigo» respeta esa tensión sin resolverla.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; el consenso de revisión es alto. La versión española sigue el mismo sentido básico y conserva la tensión legal de עִמָּךְ sin suavizarla.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo nombra explícitamente el Tetragrámaton; aquí no aparece, por lo que no se introduce.
  - Se mantiene el léxico jurídico con «juicio» para מִשְׁפָּט, evitando «tribunal» por no estar exigido por el hebreo.
  - «Contigo» se conserva para reproducir la relación del hebreo con el interlocutor divino y dejar abierta la ambigüedad interpretativa.
