lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Y los descendientes de
  - Y los hijos
  lexicon: HALOT
  rationale: En listas genealógicas, בְּנֵי se refiere naturalmente a los descendientes varones del clan; en español bíblico, «hijos de» conserva bien la estructura de enumeración. Se mantiene la conjunción inicial para reflejar el encadenamiento del relato.
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalí
  - Neftali
  lexicon: HALOT
  rationale: Nombre propio; en español bíblico la forma establecida y más inteligible es «Neftalí». No se calca la grafía inglesa del audit trail porque el objetivo es una transliteración natural al español.
- source_word: יַחְצְאֵל
  english_pob_choice: Jahzeel
  chosen_spanish: Jahzeel
  alternatives_spanish:
  - Jahziel
  - Jachzeel
  lexicon: HALOT
  rationale: Nombre propio. Se conserva «Jahzeel» porque el auditor inglés la usó como forma principal y el español puede recibirla sin dificultad. Se documentan variantes habituales por la oscilación en la representación de las consonantes hebreas.
- source_word: וְגוּנִי
  english_pob_choice: Guni
  chosen_spanish: Guni
  alternatives_spanish:
  - Guni
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera directa. No requiere ajuste especial en español.
- source_word: וְיֵצֶר
  english_pob_choice: Jezer
  chosen_spanish: Jezer
  alternatives_spanish:
  - Jezer
  lexicon: HALOT
  rationale: Nombre propio. Se conserva la forma inglesa auditada, que además coincide con la transliteración más difundida en español para este nombre.
- source_word: וְשִׁלֵּם
  english_pob_choice: Shillem
  chosen_spanish: Shillem
  alternatives_spanish:
  - Shilem
  lexicon: HALOT
  rationale: Nombre propio. Se mantiene «Shillem» para reflejar de modo visible la consonante doble indicada por el hebreo, como también hace el texto inglés auditado.
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la revisión más reciente; no se registran revisiones aplicadas. La versión española sigue ese mismo estado estable, con adaptación ortográfica al español para el nombre principal de la tribu (Neftalí) y conservación de la serie onomástica.
  spanish_consistency_notes:
  - Se usa «hijos de» en una lista genealógica, no «niños», por tratarse de descendencia/clan.
  - Se transliteran los nombres propios de forma consistente y se mantiene el orden del hebreo.
  - La nota al pie solo se vincula a «Jahzeel», donde el audit trail inglés documenta variantes de grafía.
