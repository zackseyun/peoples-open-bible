translation:
  language: es
  text: Ciertamente[a] su carne en él sufre dolor, y su alma[b] en él se lamenta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ciertamente» traduce el valor enfático de אַךְ; también podría entenderse como «sólo» o «en verdad».
    reason: lexical_alternative
  - marker: b
    text: «Alma» también puede traducirse «vida», «ser» o «ser interior».
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sólo
  - En verdad
  - Pero
  lexicon: HALOT
  rationale: אַךְ aquí funciona como partícula enfática al cerrar la reflexión. «Ciertamente» conserva el matiz aseverativo sin volver restrictivo el enunciado.
- source_word: בְּשָׂרוֹ
  english_pob_choice: his flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - su cuerpo
  lexicon: HALOT
  rationale: בָּשָׂר se traduce mejor por «carne» para mantener la imaginería concreta del hebreo y su paralelo con נַפְשׁוֹ.
- source_word: עָלָיו
  english_pob_choice: on him
  chosen_spanish: sobre él
  alternatives_spanish:
  - en él
  - sobre sí
  lexicon: HALOT
  rationale: La preposición עַל con sufijo se conserva de manera cercana con «sobre él», reflejando la repetición idiomática del hebreo.
- source_word: יִכְאָב
  english_pob_choice: feels pain
  chosen_spanish: sufre dolor
  alternatives_spanish:
  - le duele
  - está adolorida
  - siente dolor
  lexicon: HALOT
  rationale: יִכְאָב expresa la experiencia de dolor. «Sufre dolor» es natural en español y preserva el sentido experiencial sin ampliar el texto.
- source_word: נַפְשׁוֹ
  english_pob_choice: his soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - su ser interior
  - su persona
  lexicon: HALOT
  rationale: «Alma» conserva la correspondencia poética con «carne» y mantiene la tensión antropológica del pasaje sin resolverla dogmáticamente.
- source_word: תֶּאֱבָל
  english_pob_choice: mourns
  chosen_spanish: se lamenta
  alternatives_spanish:
  - muerne
  - llora
  - gime
  lexicon: HALOT
  rationale: אָבל denota duelo o lamento. «Se lamenta» comunica el matiz de duelo poético con registro digno en español.
theological_decisions:
- issue: Paralelismo carne/alma y tensión antropológica
  english_pob_reading: Rendered as 'soul' to preserve the poetic body/inner-self contrast.
  chosen_spanish_reading: «Carne» / «alma» conserva el paralelismo poético y la tensión entre lo corporal y lo interior.
  alternative_spanish_readings:
  - «carne» / «vida»
  - «cuerpo» / «ser interior»
  rationale: El hebreo contrapone la dimensión corporal y la interior sin definir una antropología sistemática. Traducir נֶפֶשׁ como «alma» mantiene esa tensión en español.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al mantener la repetición de עָלָיו en ambas cláusulas con «sobre él», y evita la solución anterior de «dentro de él».
  spanish_consistency_notes:
  - Se mantiene «carne» para בָּשָׂר y «alma» para נֶפֶשׁ, preservando el contraste poético.
  - Se evita «SEÑOR» u otra sustitución teológica; no hay aquí el Tetragrámaton.
  - La puntuación y el orden reflejan la brevedad del hebreo poético sin añadir explicaciones.
  - Los marcadores de nota aparecen exactamente en el texto traducido y sólo para alternativas realmente presentes en esta línea.
