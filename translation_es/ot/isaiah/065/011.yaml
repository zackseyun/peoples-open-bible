    issue: «una libación» para מִמְסָךְ en el texto principal
    rationale: מִמְסָךְ denota la bebida mezclada/preparada, no primariamente el acto ritual de libar. «Llenan una libación» altera el significado y produce una combinación poco natural en español.
  - severity: high
    issue: Marcadores de notas mal anclados
    rationale: El marcador [a] está en «Yahvé» pero la nota [a] explica Gad; [c] aparece junto a «Gad» aunque la nota [c] trata de la bebida mezclada; [b] debe anclarse a «Meni». Esto rompe la trazabilidad exigida.
  - severity: low
    issue: Pérdida de paralelismo fino con el audit trail inglés
    rationale: El inglés principal conserva un término concreto de bebida («mixed wine»). El español puede hacer lo mismo con «vino mezclado», manteniendo la nota como alternativa interpretativa cultual.
