    rationale: Aunque ל puede marcar referencia/beneficio, en español «contar siete días para él» suena forzado. En una norma ritual, «se contarán siete días por él» expresa mejor la relación legal respecto al sacerdote.
  - severity: low
    issue: La nota lexical puede alinearse mejor con la jerarquía principal/alternativa del POB inglés
    rationale: El inglés tiene texto principal «his cleansing» con alternativa «his purification». Como el español principal usa «purificación», conviene ofrecer «limpieza ritual» como alternativa explícita y mantener la explicación cultual.
