  - severity: low
    issue: La nota al pie propuesta no preserva bien la alternativa literal documentada por el POB inglés.
    rationale: La auditoría inglesa conserva la literalidad de «bound a binding obligation upon herself with an oath»; la nota española debería reflejar esa alternativa en el segmento correspondiente.
  revised_spanish_text: Y si en la casa de su marido hizo un voto, o se obligó a sí misma por juramento a una obligación[a].
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «ató una obligación vinculante sobre sí misma con un juramento».'
