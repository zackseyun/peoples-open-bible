id: LUK.20.17
reference: Luke 20:17
source:
  edition: SBLGNT
  text: ὁ δὲ ἐμβλέψας αὐτοῖς εἶπεν· Τί οὖν ἐστιν τὸ γεγραμμένον τοῦτο· Λίθον ὃν ἀπεδοκίμασαν οἱ οἰκοδομοῦντες, οὗτος ἐγενήθη εἰς κεφαλὴν γωνίας;
translation:
  text: 'But he looked at them and said[a], “What then is this that has been written: ‘The stone that the builders rejected, this one has become the head of the corner’?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the cornerstone”; alternatively, “the capstone.” The Greek reads literally, “the head of the corner.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμβλέψας
  chosen: looked at
  alternatives:
  - gazed at
  - fixed his eyes on
  lexicon: BDAG
  rationale: The aorist participle indicates a deliberate look directed toward them. 'Looked at' is natural modern English and preserves the directness without overstating intensity.
- source_word: Τί οὖν ἐστιν τὸ γεγραμμένον τοῦτο
  chosen: What then is this that has been written
  alternatives:
  - What then is this that is written
  - What then does this scripture mean
  lexicon: BDAG
  rationale: This keeps the rhetorical force and the perfect passive sense of γεγραμμένον ('has been written'). Avoided the more interpretive 'does this scripture mean,' which goes beyond the wording.
- source_word: Λίθον
  chosen: The stone
  alternatives:
  - A stone
  lexicon: BDAG
  rationale: Although anarthrous in the citation as quoted, English idiom and the recognized scriptural quotation favor 'the stone,' matching the specific, identifiable stone of the cited text.
- source_word: ἀπεδοκίμασαν
  chosen: rejected
  alternatives:
  - disapproved
  - considered unfit and rejected
  lexicon: BDAG
  rationale: '''Rejected'' is the standard and clearest rendering in this construction, conveying the evaluative refusal implied by the verb.'
- source_word: οἰκοδομοῦντες
  chosen: the builders
  alternatives:
  - those building
  lexicon: BDAG
  rationale: The substantival participle naturally refers to 'the builders.' This is idiomatic and preserves the metaphor from the Psalm citation.
- source_word: οὗτος
  chosen: this one
  alternatives:
  - this stone
  - he
  lexicon: BDAG
  rationale: οὗτος is emphatic. 'This one' preserves the emphasis more transparently than simply repeating 'the stone,' while avoiding a christological personalization in the wording itself.
- source_word: ἐγενήθη εἰς
  chosen: has become
  alternatives:
  - became
  - came to be as
  lexicon: BDAG
  rationale: English present perfect works well for the aorist in a scriptural citation with abiding significance. 'Has become' is idiomatic and preserves the resultative sense.
- source_word: κεφαλὴν γωνίας
  chosen: the head of the corner
  alternatives:
  - the cornerstone
  - the capstone
  lexicon: BDAG
  rationale: A more formally transparent rendering is preferred here because the exact architectural image is debated. 'Cornerstone' is a common interpretive rendering, but 'head of the corner' preserves the metaphor without prematurely resolving whether the image is foundation stone, capstone, or chief corner stone.
