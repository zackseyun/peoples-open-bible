revisions:
- from: Y se revelará la gloria de Yahvé[a], y toda carne[b] la verá juntamente, porque la boca de Yahvé ha hablado.
  to: Y se revelará[a] la gloria de Yahvé, y toda carne[b] verá juntamente, porque la boca de Yahvé ha hablado.
  rationale: Se eliminó «la» para no añadir un objeto directo ausente del hebreo y para seguir la corrección ya registrada en el audit trail inglés. También se movió la nota [a] al verbo «se revelará», que es donde corresponde la alternativa léxica documentada. Se mantuvo «toda carne» y «la boca de Yahvé» por fidelidad al texto fuente y al glosario del proyecto.
