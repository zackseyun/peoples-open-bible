    issue: La nota [b] está colocada en el lugar equivocado.
    rationale: El contenido de la nota trata la dificultad textual de לַהֲשִׁיבוֹ (‘hacerla volver’), no la frase ‘lo vio’. Debe anclarse donde aparece esa decisión textual.
  - severity: medium
    issue: ‘Se alegró de recibirlo’ no refleja plenamente לִקְרָאתוֹ.
    rationale: El hebreo indica alegría asociada con ir al encuentro de él. ‘Recibirlo’ reduce el componente de movimiento/encuentro presente en la construcción.
  revised_spanish_text: Entonces su marido se levantó y fue tras ella para hablarle al corazón[a] y hacerla volver[b]. Su joven servidor iba con él, junto con un par de asnos. Ella lo llevó a casa de su padre, y cuando el padre de la joven lo vio, se alegró de salir a su encuentro.
  revised_footnotes:
