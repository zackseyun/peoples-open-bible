  yaml_path: translation/deuterocanon/1_maccabees/010/030.yaml
  text: And instead of the third of the seed[a], and instead of the half of the fruit of the trees that falls to me to receive, I remit it from this day and onward, so that it is not taken from the land of Judah and from the three districts added to it from Samaria and Galilee[c][b], from this day and for all time.
