id: 2TH.2.16
reference: 2 Thessalonians 2:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Αὐτὸς δὲ ὁ κύριος ἡμῶν Ἰησοῦς Χριστὸς καὶ ⸀θεὸς ⸀ὁ πατὴρ ἡμῶν, ὁ ἀγαπήσας ἡμᾶς καὶ δοὺς παράκλησιν αἰωνίαν καὶ ἐλπίδα ἀγαθὴν ἐν χάριτι,
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/002/016.yaml
  text: Now may our Lord Jesus Messiah himself[a], and God our Father, who loved us and gave us eternal encouragement and good hope by grace,
translation:
  language: ko
  text: 이제 우리 주 예수 메시아 친히, 그리고 우리를 사랑하시고 은혜로 영원한 격려[a]와 좋은 소망을 주신 우리 아버지 하나님께서,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「위로」, 「위안」. 헬라어 παράκλησις는 격려·위로·권면을 함께 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτὸς
  english_pob_choice: himself
  chosen_korean: 친히
  alternatives_korean:
  - 자신이
  - 몸소
  lexicon: BDAG
  rationale: αὐτός의 강조적 사용을 한국어 부사 「친히」로 자연스럽게 표현한다. 합쇼체 격식에 잘 맞는다.
- source_word: δὲ
  english_pob_choice: Now
  chosen_korean: 이제
  alternatives_korean:
  - 그러면
  lexicon: BDAG
  rationale: 축복으로의 부드러운 화제 전환.
- source_word: κύριος Ἰησοῦς Χριστὸς
  english_pob_choice: Lord Jesus Messiah
  chosen_korean: 주 예수 메시아
  alternatives_korean:
  - 주 예수 그리스도
  lexicon: BDAG
  rationale: 표준 글로서리.
- source_word: θεὸς ὁ πατὴρ ἡμῶν
  english_pob_choice: God our Father
  chosen_korean: 우리 아버지 하나님
  alternatives_korean:
  - 우리 하나님 아버지
  lexicon: BDAG
  rationale: 자연스러운 한국어 어순. 1:1, 1:2와 일관.
- source_word: ὁ ἀγαπήσας ἡμᾶς
  english_pob_choice: who loved us
  chosen_korean: 우리를 사랑하시고
  alternatives_korean:
  - 우리를 사랑하신 분으로서
  lexicon: BDAG
  rationale: 관사+분사의 관계절 구조를 자연스러운 연결 어미로 옮긴다.
- source_word: δοὺς
  english_pob_choice: gave
  chosen_korean: 주신
  alternatives_korean:
  - 베푸신
  lexicon: BDAG
  rationale: 부정과거 분사를 자연스럽게 표현한다.
- source_word: παράκλησιν
  english_pob_choice: encouragement
  chosen_korean: 격려
  alternatives_korean:
  - 위로
  - 위안
  - 권면
  lexicon: BDAG
  rationale: παράκλησις는 격려·위로·권면의 의미를 함께 가진다. 다음 17절의 「격려하시다」 동사와 어휘적 일관성을 위해 「격려」를 본문에 두고, 「위로」 가능성을 각주.
- source_word: αἰωνίαν
  english_pob_choice: eternal
  chosen_korean: 영원한
  alternatives_korean:
  - 영구한
  lexicon: BDAG
  rationale: 표준 등가어.
- source_word: ἐλπίδα ἀγαθὴν
  english_pob_choice: good hope
  chosen_korean: 좋은 소망
  alternatives_korean:
  - 선한 소망
  - 좋은 희망
  lexicon: BDAG
  rationale: 무관사 명사구의 질적 의미를 「좋은 소망」으로 자연스럽게 표현한다.
- source_word: ἐν χάριτι
  english_pob_choice: by grace
  chosen_korean: 은혜로
  alternatives_korean:
  - 은혜 가운데
  - 은혜를 통해
  lexicon: BDAG
  rationale: 도구적/원인적 ἐν의 의미를 자연스럽게 옮긴다.
theological_decisions:
- issue: 단수 분사 「사랑하시고 주신」이 「주 예수 메시아」와 「하나님 아버지」 두 주어 모두에 걸리는 점
  chosen_reading: 헬라어의 통합 구조를 보존 — 두 주어를 함께 두고 단수 분사로 묶음
  alternative_readings:
  - 분사를 「하나님 아버지」에만 한정
  - 두 인격 모두에 명시적으로 분사를 분배
  rationale: 본문의 통합 구조는 바울의 고기독론적 표현으로 자주 논의된다. 번역도 그 구조를 본문에서 평탄화하지 않고, 해석적 단어를 더하지 않는다.
  doctrine_reference: 'Affirmations; Translation philosophy §3'
