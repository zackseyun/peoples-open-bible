  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: mantiene la doble pregunta implícita, usa «Yahvé» para יְהוָה y comunica correctamente la queja por la distancia y el ocultamiento divinos. Sin embargo, «te mantienes lejos» desplaza la imagen más literal de «estar de pie / estar» a una noción de permanencia sostenida que el inglés auditado evitó sobreinterpretar. Una reparación menor mejora la fidelidad a עמד.'
  spanish_quality_summary: El español es claro, natural y de tono digno. La única mejora importante es reemplazar «te mantienes lejos» por una formulación más directa y menos interpretativa, como «estás lejos» o «te quedas lejos». «Estás lejos» suena más natural en español y preserva suficientemente la metáfora espacial del original.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Yahvé» para יְהוָה, «te ocultas» para תעלים, y repetición explícita de «¿Por qué...?» en el segundo hemistiquio. No hay conflicto teológico relevante. La nota al pie actual, sin embargo, añade «aflicción» como alternativa española no presente como nota independiente en el audit trail inglés; conviene simplificarla para reflejar mejor la alternativa documentada («angustia/distress» frente a la lectura principal).'
  issues:
  - severity: medium
    issue: «te mantienes lejos» sobreinterpreta תעמד
    rationale: El hebreo עמד significa literalmente «estar de pie / estar». El audit trail inglés eligió «do you stand» precisamente para no reducirlo a mera permanencia. «Te mantienes» añade matiz aspectual no necesario.
  - severity: low
    issue: La nota al pie mezcla alternativa estructural y alternativa léxica adicional
    rationale: La nota inglesa documenta como alternativa completa «Why do you conceal yourself in times of distress?». La nota española añade además «aflicción», que no es erróneo pero excede lo auditado y puede enturbiar una nota sencilla.
  revised_spanish_text: ¿Por qué[a], Yahvé, estás lejos? ¿Por qué te ocultas en tiempos de angustia?
  revised_footnotes:
