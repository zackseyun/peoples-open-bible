translation:
  language: es
  text: 'Ellos dijeron al rey: «El hombre que nos consumió, y que maquinó contra nosotros[a], de modo que fuéramos destruidos y no pudiéramos permanecer[b] en todo el territorio de Israel—»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que ideó contra nosotros». El verbo hebreo puede llevar el sentido de planear, tramar o maquinar.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «de permanecer/ponernos en pie en todo el territorio de Israel»; es decir, de seguir teniendo un lugar en cualquier parte de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּלָּנוּ
  english_pob_choice: consumed us
  chosen_spanish: nos consumió
  alternatives_spanish:
  - nos destruyó
  - nos acabó
  lexicon: HALOT
  rationale: כִּלָּנוּ expresa acabar, consumir o llevar a término con efecto devastador. «Nos consumió» conserva la imagen fuerte elegida en inglés y funciona con naturalidad en español.
- source_word: דִּמָּה לָנוּ
  english_pob_choice: planned against us
  chosen_spanish: maquinó contra nosotros
  alternatives_spanish:
  - planeó contra nosotros
  - devisó contra nosotros
  - intentó contra nosotros
  lexicon: HALOT
  rationale: En este contexto דִּמָּה tiene el sentido de tramar, idear o planear con hostilidad. «Maquinó contra nosotros» refleja bien el matiz de conspiración que el inglés POB preserva con «planned against us».
- source_word: נִשְׁמַדְנוּ
  english_pob_choice: that we should be destroyed
  chosen_spanish: fuéramos destruidos
  alternatives_spanish:
  - se nos destruyera
  - seríamos destruidos
  lexicon: HALOT
  rationale: El nifal de שׁמד expresa destrucción/exterminio. En español, la cláusula de resultado se expresa con naturalidad como «fuéramos destruidos», manteniendo la fuerza pasiva del hebreo.
- source_word: מֵהִתְיַצֵּב
  english_pob_choice: from remaining
  chosen_spanish: impidiéndoseos permanecer
  alternatives_spanish:
  - impidiéndosenos quedarnos
  - impidiéndosenos estar
  - impidiéndosenos establecer
  lexicon: HALOT
  rationale: הִתְיַצֵּב literalmente es ‘ponerse en pie/estacionarse’, pero aquí el contexto exige la idea de continuar o permanecer en un lugar. «Impidiéndosenos permanecer» conserva la relación causal del hebreo y hace explícito el sentido contextual sin perder la base léxica.
- source_word: בְּכָל גְּבֻל יִשְׂרָאֵל
  english_pob_choice: within all the territory of Israel
  chosen_spanish: en todo el territorio de Israel
  alternatives_spanish:
  - dentro de todo el territorio de Israel
  - por todo el territorio de Israel
  - en toda la frontera de Israel
  lexicon: HALOT
  rationale: גְּבוּל puede significar límite, frontera o territorio. Aquí el contexto apunta al dominio territorial completo de Israel, por lo que «territorio» es más preciso que una simple ‘frontera’.
- source_word: הָאִישׁ
  english_pob_choice: The man
  chosen_spanish: El hombre
  alternatives_spanish:
  - Ese hombre
  - Aquel hombre
  lexicon: HALOT
  rationale: El artículo definido hebreo señala a una persona ya identificable en el discurso. «El hombre» mantiene la referencia directa y la formalidad del original.
translation_notes:
  revision_awareness: El borrador sigue la lectura revisada del POB en la cláusula final, que hizo más explícita la relación de resultado («so that we should be destroyed») y tradujo מֵהִתְיַצֵּב de manera más directa como ‘from remaining’. En español se conservó esa claridad resultativa con «de modo que fuéramos destruidos» e «impidiéndoseos permanecer».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término por defecto en este proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conservó el tono directo de discurso narrativo sin añadir glosas interpretativas al texto principal.
  - «Maquinó» se eligió por su valor de trama hostil, sin suavizar el matiz de intención contra el grupo.
  - La cláusula final se dejó abierta con raya larga, siguiendo el carácter incompleto de la cita en el versículo.
  - El pronombre de las notas conserva la primera persona plural del hebreo y del inglés POB, evitando neutralizar la referencia comunitaria.
