    rationale: La nota explica «por sus cabezas, como varones», pero el [a] está puesto tras «más arriba». Esto desvincula la nota de la expresión que realmente comenta y puede inducir a error.
  - severity: low
    issue: «desde los treinta años y más arriba» suena poco idiomático
    rationale: Aunque es comprensible y cercano al hebreo, en español natural resulta más fluido «de treinta años para arriba» o «de treinta años en adelante», sin pérdida de sentido.
