review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: Yahvé estableció el Jordán como separación entre ambos grupos; la frase ''no tienen porción en Yahvé'' preserva חֵלֶק בַּיהוָה; y la consecuencia temida de que los hijos de ellos hagan cesar el temor de Yahvé en los hijos de Israel está bien captada. Sin embargo, ''frontera'' suena algo más político/territorial que el más neutro ''límite'' o ''frontera divisoria'', y ''ha puesto ... como'' es menos directo que ''ha hecho del Jordán un límite'' o ''ha puesto el Jordán como límite''.'
  spanish_quality_summary: 'El español es claro y natural, con tono bíblico legible. La única mejora principal es léxica/estilística: ''frontera'' puede sugerir frontera estatal moderna, mientras que ''límite'' suena más amplio y cercano al valor de גְּבוּל en este contexto. El resto lee bien y mantiene dignidad moderna.'
  glossary_alignment: 'Se alinea correctamente con la terminología del proyecto: יְהוָה -> ''Yahvé''; ירא -> ''temer''; חֵלֶק -> ''porción''. No hay conflicto doctrinal. La nota alternativa existente también es válida, pero conviene invertir la preferencia principal a ''límite'' y dejar ''frontera'' como alternativa.'
  issues:
  - severity: medium
    issue: '''frontera'' como equivalente principal de גְּבוּל'
    rationale: Aunque posible, en español contemporáneo 'frontera' suele evocar una frontera política o internacional. El contexto pide una línea divisoria establecida por Yahvé entre grupos; 'límite' comunica eso con menos carga moderna y se acerca mejor al campo semántico de גְּבוּל.
  - severity: low
    issue: Nota alternativa invertida respecto de la mejor opción española
    rationale: Si el texto principal se corrige a 'límite', la nota debe ofrecer 'frontera' como alternativa, no al revés, para reflejar mejor la decisión léxica principal.
