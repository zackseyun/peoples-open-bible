translation:
  language: es
  text: Porque tus flechas se han hundido en mí[a], y tu mano[b] ha descendido sobre mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se han clavado en mí» o «me han herido». El verbo hebreo, más literalmente, expresa la idea de «bajar» o «descender»; aquí se usa de flechas que quedan alojadas en el salmista.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tu mano». Imagen hebrea de la acción eficaz de Dios; aquí, en contexto de aflicción o disciplina.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base causal del lamento con naturalidad en español, manteniendo el valor explicativo del hebreo כִּי sin sobrecargar el tono.
- source_word: חִצֶּיךָ
  english_pob_choice: your arrows
  chosen_spanish: tus flechas
  alternatives_spanish:
  - tus saetas
  - tus dardos
  lexicon: HALOT
  rationale: Conserva la metáfora bélica del plural constructo con sufijo de segunda masculina singular. 'Flechas' es claro y natural en español contemporáneo.
- source_word: נִחֲתוּ
  english_pob_choice: have sunk into
  chosen_spanish: se han hundido
  alternatives_spanish:
  - han descendido
  - te han penetrado
  - se han clavado
  lexicon: HALOT
  rationale: El verbo hebreo apunta literalmente a una idea de descenso/ir hacia abajo. 'Se han hundido' conserva esa imagen física y permite, en contexto, la idea de que las flechas quedan alojadas sin convertir el verbo en una paráfrasis más interpretativa como 'clavado' o 'penetrado'.
- source_word: בִי
  english_pob_choice: into me
  chosen_spanish: en mí
  alternatives_spanish:
  - dentro de mí
  - contra mí
  lexicon: HALOT
  rationale: En español, 'hundirse en mí' expresa mejor la penetración de la imagen que un calco como 'dentro de mí'; 'contra mí' debilitaría la metáfora corporal.
- source_word: וַתִּנְחַת
  english_pob_choice: has come down on
  chosen_spanish: ha caído sobre
  alternatives_spanish:
  - ha descendido sobre
  - se ha abatido sobre
  - ha pesado sobre
  lexicon: HALOT
  rationale: Preserva el movimiento descendente del mismo radical en el segundo hemistiquio y sugiere el peso/impacto de la acción divina sin explicar la imagen.
- source_word: עָלַי
  english_pob_choice: on me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - en mí
  - contra mí
  lexicon: HALOT
  rationale: '''Sobre mí'' reproduce bien la carga o presión expresada por עַל en este contexto y mantiene la paralelidad con el hemistiquio anterior.'
- source_word: יָדֶךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu poder
  - tu brazo
  lexicon: HALOT
  rationale: Se conserva literalmente la imagen antropomórfica. En el contexto bíblico, 'mano' funciona como imagen de la acción eficaz de Dios; no se sustituye por una abstracción en el texto principal.
theological_decisions:
- issue: 'Antropomorfismo divino: ''tu mano'''
  english_pob_reading: Retain 'your hand' literally
  chosen_spanish_reading: Conservar 'tu mano' literalmente
  alternative_spanish_readings:
  - tu poder
  - tu juicio
  rationale: El hebreo usa una imagen concreta de intervención divina. Mantenerla evita resolver la tensión metafórica en una explicación abstracta y sigue la práctica de la POB de preservar la imaginería original.
  doctrine_reference: Principio de primacía del texto original; preservación de la imagen antropomórfica sin expansión doctrinal
- issue: Verbo נחת aplicado primero a flechas y luego a la mano
  english_pob_reading: Same root rendered with downward-force imagery
  chosen_spanish_reading: Misma raíz reflejada con imágenes de descenso y caída
  alternative_spanish_readings:
  - se han clavado / ha golpeado
  rationale: La repetición del radical en ambos cola poéticos queda visible en español mediante 'se han hundido' / 'ha caído', evitando borrar la relación verbal que el hebreo subraya.
  doctrine_reference: Poética hebrea; consistencia léxico-semántica en paralelismo
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente del expediente: no hay cambios aplicados y el paso de revisión final marcó el texto como sin modificaciones necesarias.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' implícito sin añadirlo en el texto, siguiendo el hebreo que usa segunda persona directa.
  - 'Se preserva la metáfora corporal en ambos miembros: flechas que se hunden y mano que cae sobre el hablante.'
  - El registro es bíblico-formal pero en español actual, evitando arcaísmos innecesarios como 'sobre mí cayó' si la sintaxis moderna comunica mejor la imagen.
