  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego: exhortación hortativa a morir por la ley, alusión a los tres jóvenes, conservación de «Siria» según el texto fuente, y mantenimiento de la dificultad léxica de ἰσοπαίδος mediante una nota. Sin embargo, no preserva plenamente la repetición enfática Ἀδελφικῶς ... ἀδελφοὶ, que el rastro inglés retuvo deliberadamente como «as brothers, brothers».'
  spanish_quality_summary: El español es claro y digno, pero «Muramos fraternalmente» suena más abstracto y menos idiomático que «Muramos como hermanos». Además, la pérdida de la repetición vocativa reduce la fuerza retórica del original. El resto del verso fluye bien; «horno de igual tormento» es aceptable como solución cauta para una expresión difícil.
  glossary_alignment: 'No hay conflictos con la terminología marco del proyecto. «Ley», «hermanos», «jóvenes», «horno» y «despreciaron» están bien alineados. La principal cuestión es de fidelidad retórica más que de glosario: conviene reflejar mejor la duplicación de ἀδελφοί.'
  issues:
