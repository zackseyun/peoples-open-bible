  to: Pero para ustedes que temen mi nombre[a], saldrá el sol de justicia con curación en sus alas[b]; y ustedes saldrán y saltarán[c] como terneros del establo.
  rationale: 'La revisión restaura más de cerca la sintaxis e imaginería del hebreo y del audit trail inglés: «saldrá» encaja mejor con el sol; «con curación en sus alas» refleja directamente וּמַרְפֵּא בִּכְנָפֶיהָ; y se añade la nota necesaria sobre «rayos» como alternativa de «alas». Se mantiene «sol de justicia» y la ausencia de identificación mesiánica explícita, conforme a la decisión teológica documentada.'
