  - marker: a
    text: Lit. «levantarán el rostro hacia ti», una expresión griega para volverse a Dios en súplica o dependencia.
    reason: cultural_note
  revision_rationale: Se conserva el sentido del griego, pero se mejora la naturalidad en español con «levantarán el rostro hacia ti» y se recoloca la nota al modismo que realmente explica.
