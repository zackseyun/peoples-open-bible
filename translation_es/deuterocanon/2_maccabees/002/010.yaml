revisions:
- from: Porque cuando nuestros padres eran llevados a Persia, los sacerdotes piadosos tomaron secretamente un poco del fuego del altar y lo escondieron en la hendidura de un pozo seco[a], donde lo aseguraron, de modo que el lugar quedara desconocido para todos.
  to: Porque cuando nuestros padres eran llevados a Persia, los sacerdotes piadosos tomaron secretamente un poco del fuego del altar y lo escondieron en la cavidad de un pozo seco[a], donde lo aseguraron, de modo que el lugar fuera desconocido para todos.
  rationale: Se hizo una reparación menor para alinear mejor el español con el griego y con la nota léxica documentada. «Cavidad» representa mejor κοιλώματι que «hendidura», y «fuera desconocido para todos» mejora la naturalidad de la cláusula final sin apartarse del sentido fuente.
  reviewer_model: gpt-5.4
