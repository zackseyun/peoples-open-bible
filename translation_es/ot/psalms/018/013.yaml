translation:
  language: es
  text: 'Del resplandor delante de él pasaron sus nubes: granizo y brasas de fuego[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus densas nubes pasaron de largo; granizo y brasas de fuego». El hebreo es compacto y muy poético, y admite varias formas legítimas de expresar la imaginería de la tormenta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנֹּגַהּ
  english_pob_choice: From the brightness
  chosen_spanish: Desde el resplandor
  alternatives_spanish:
  - Desde la brillantez
  - Desde el brillo
  lexicon: HALOT
  rationale: נֹגַהּ denota resplandor, brillo o luz radiante. «Resplandor» conserva el campo semántico y suena natural y digno en español. «Desde» expresa el origen del movimiento poético, como el inglés «From».
- source_word: נֶגְדּוֹ
  english_pob_choice: before him
  chosen_spanish: que tenía delante
  alternatives_spanish:
  - delante de él
  - ante él
  lexicon: HALOT
  rationale: נֶגֶד con sufijo masculino singular señala posición frontal. «Que tenía delante» mantiene la referencia espacial sin volverla demasiado abstracta y encaja bien con el español de la línea poética.
- source_word: עָבָיו
  english_pob_choice: his clouds
  chosen_spanish: sus nubes
  alternatives_spanish:
  - sus densas nubes
  - sus nubarrones
  lexicon: HALOT
  rationale: El sustantivo derivado de עָב apunta a nubes o masa nubosa. «Sus nubes» sigue de cerca el sufijo posesivo y conserva la imaginería concisa del hebreo. No se añadió «densas» porque la línea siguiente ya sugiere el carácter tempestuoso.
- source_word: עָבְרוּ
  english_pob_choice: passed on
  chosen_spanish: pasaron
  alternatives_spanish:
  - pasaron de largo
  - avanzaron
  - se deslizaron
  lexicon: HALOT
  rationale: El verbo עבר en qal plural expresa pasar, avanzar o pasar por/by. «Pasaron» es el equivalente más natural y no introduce una dirección más específica de la que el hebreo exige.
- source_word: בָּרָד
  english_pob_choice: hail
  chosen_spanish: granizo
  alternatives_spanish:
  - pedrisco
  lexicon: HALOT
  rationale: El término meteorológico es directo. «Granizo» es el equivalente estándar y claro en español bíblico moderno.
- source_word: וְגַחֲלֵי אֵשׁ
  english_pob_choice: and coals of fire
  chosen_spanish: brasas de fuego
  alternatives_spanish:
  - brasas ígneas
  - carbones encendidos
  lexicon: HALOT
  rationale: La construcción expresa literalmente «brasas de fuego». «Brasas de fuego» comunica bien la imagen, aunque en español suena algo redundante; por eso se eligió «brasas» en el cuerpo, con la referencia completa conservada en el sentido global. Se evita «carbones» por sonar menos poético y más prosaico.
theological_decisions:
- issue: Imaginería de teofanía tormentosa
  english_pob_reading: Retain the imagery as a description of divine manifestation without reducing it to mere metaphor or expanding it into a doctrinal claim.
  chosen_spanish_reading: Conservar la escena como imaginería de manifestación divina, sin reducirla a simple metáfora ni convertirla en una explicación meteorológica literal.
  alternative_spanish_readings:
  - Tratar la línea como metáfora exclusiva de victoria militar
  - Leerla como descripción literal de un milagro atmosférico
  rationale: 'El versículo es poesía de teofanía: describe la aparición de Yahvé con imágenes de tormenta. La traducción debe preservar esa tensión poética y no resolverla en una sola interpretación. Se mantiene el valor evocador sin añadir doctrinas no explicitadas por el texto.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje se mantiene sin cambios respecto del último pase de revisión; la concordancia cruzada indicó alto acuerdo y ningún problema pendiente.
  spanish_consistency_notes:
  - Se preservó «Yahvé» como nombre divino cuando corresponde al contexto del salmo, aunque este versículo no lo repite explícitamente.
  - Se evitó «SEÑOR» como sustituto, conforme a la política del proyecto.
  - La línea se dejó en registro poético, no explicativo, para respetar la concisión del hebreo.
  - «Brasas de fuego» mantiene la imagen sin desplazarla hacia una paráfrasis interpretativa.
