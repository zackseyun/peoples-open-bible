translation:
  language: es
  text: y va y sirve a otros dioses y se postra ante ellos, o al sol, o a la luna, o a toda la hueste del cielo[a], lo cual yo no he mandado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, 'a todo el ejército celestial'. La frase puede referirse al conjunto de los cuerpos celestes y, en algunos contextos, también evocar seres celestiales.
    reason: lexical_alternative
  - marker: b
    text: La cláusula 'lo cual yo no he mandado' puede referirse específicamente a 'toda la hueste del cielo' o, más ampliamente, a todo el acto de servir y postrarse ante otros dioses.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: goes
  chosen_spanish: va
  alternatives_spanish:
  - va y
  - anda
  lexicon: HALOT
  rationale: En este contexto legal-condicional, el hebreo con wayyiqtol continúa la condición con sentido vigente; en español, 'va' conserva esa progresión natural sin forzar pasado narrativo.
- source_word: וַיַּעֲבֹד
  english_pob_choice: serves
  chosen_spanish: sirve
  alternatives_spanish:
  - adora
  - rinde culto
  lexicon: HALOT
  rationale: עבד aplicado a objetos divinos suele implicar servicio cultual. 'Sirve' preserva la fuerza léxica y deja que el gesto explícito de la siguiente cláusula exprese la postración.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses extraños
  - dioses ajenos
  lexicon: HALOT
  rationale: La expresión literal es 'otros dioses'. 'Otros' reproduce con precisión אֲחֵרִים sin introducir el matiz étnico de 'ajenos' ni el interpretativo de 'extraños'.
- source_word: וַיִּשְׁתַּחוּ לָהֶם
  english_pob_choice: bows down to them
  chosen_spanish: se postra ante ellos
  alternatives_spanish:
  - se inclina ante ellos
  - los adora
  lexicon: HALOT
  rationale: El verbo indica postración física. 'Se postra ante ellos' conserva el acto corporal y evita absorberlo en el sentido más amplio de 'adorar', ya sugerido por 'sirve'.
- source_word: וְלַשֶּׁמֶשׁ
  english_pob_choice: or to the sun
  chosen_spanish: o al sol
  alternatives_spanish:
  - y al sol
  lexicon: HALOT
  rationale: Con la serie disyuntiva siguiente, 'o al sol' comunica mejor la alternancia de la lista y mantiene el flujo español natural.
- source_word: לַיָּרֵחַ
  english_pob_choice: to the moon
  chosen_spanish: a la luna
  alternatives_spanish:
  - al luna
  lexicon: HALOT
  rationale: Traducción directa y estándar del astro mencionado.
- source_word: לְכָל צְבָא הַשָּׁמַיִם
  english_pob_choice: to all the host of heaven
  chosen_spanish: a todo el ejército del cielo
  alternatives_spanish:
  - a toda la hueste del cielo
  - a todos los astros del cielo
  lexicon: HALOT
  rationale: '''Ejército del cielo'' refleja con fidelidad צבא y permite mantener la amplitud semántica entre conjunto de cuerpos celestes y posible resonancia de seres celestiales, sin resolverla de antemano.'
- source_word: אֲשֶׁר לֹא צִוִּיתִי
  english_pob_choice: which I have not commanded
  chosen_spanish: lo cual yo no he mandado
  alternatives_spanish:
  - que yo no he mandado
  - que no he mandado
  lexicon: HALOT
  rationale: La cláusula final queda deliberadamente amplia, como en el inglés POB. 'Lo cual' permite que la negación alcance la práctica descrita y no obliga a fijar solo el antecedente inmediato.
theological_decisions:
- issue: Alcance de la cláusula relativa final אֲשֶׁר לֹא צִוִּיתִי
  english_pob_reading: The clause may refer specifically to 'all the host of heaven' or more broadly to the entire act of worshiping other gods.
  chosen_spanish_reading: La cláusula puede referirse específicamente a 'todo el ejército del cielo' o, de manera más amplia, a todo el acto de servir y postrarse ante otros dioses.
  alternative_spanish_readings:
  - La cláusula modifica solo a 'todo el ejército del cielo'.
  - La cláusula resume toda la idolatría descrita.
  rationale: El hebreo permite ambas lecturas, y el POB conserva esa tensión. La redacción española mantiene la ambigüedad sin resolverla artificialmente, respetando el alcance posible del reproche divino.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó estable tras la comprobación cruzada, con solo observaciones menores. Se mantiene la solución que conserva la progresión legal del hebreo y la ambigüedad del relativo final.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino; aquí no está presente.
  - Se mantiene 'otros dioses' y no 'dioses ajenos' para no añadir matiz étnico no explícito.
  - Se traduce צבא con 'ejército' siguiendo la equivalencia auditada, y se deja abierta en nota la posible resonancia de 'hueste' o de realidades celestiales.
  - '''Se postra'' conserva la acción física diferenciada de ''sirve''.'
