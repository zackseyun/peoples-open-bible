translation:
  language: es
  text: 'Apresúrense y suban a mi padre, y díganle: “Así dice tu hijo José: Dios me ha puesto como señor sobre todo Egipto. Baja a verme; no te demores[a].”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “no te quedes”, “no te detengas” o, más literalmente, “no te pongas de pie”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַהֲרוּ
  english_pob_choice: Hurry
  chosen_spanish: Apresúrense
  alternatives_spanish:
  - Dense prisa
  - Apúrense
  - Hagan prontamente
  lexicon: HALOT
  rationale: El imperativo plural expresa urgencia; en español, 'apresúrense' comunica esa prisa con un tono digno y natural, sin caer en arcaísmo.
- source_word: וַעֲלוּ
  english_pob_choice: go up
  chosen_spanish: suban
  alternatives_spanish:
  - suban allá
  - asciendan
  lexicon: HALOT
  rationale: עלה mantiene el valor literal de 'subir'. En el marco geográfico de Génesis, 'suban' conserva la imagen de ascenso hacia Canaán.
- source_word: אֶל אָבִי
  english_pob_choice: to my father
  chosen_spanish: a donde está mi padre
  alternatives_spanish:
  - a mi padre
  - hacia mi padre
  lexicon: HALOT
  rationale: La dirección se entiende hacia la presencia de Jacob; 'a donde está mi padre' expresa con claridad la meta sin perder el referente personal. Se mantiene la nota relacional de 'mi padre'.
- source_word: וַאֲמַרְתֶּם אֵלָיו
  english_pob_choice: and say to him
  chosen_spanish: y díganle
  alternatives_spanish:
  - y le dirán
  - y le digan
  lexicon: HALOT
  rationale: La secuencia verbal hebrea se vuelve una instrucción directa y natural en español con 'díganle'.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula mensajera se preserva en español con 'Así dice', equivalente formal y reconocible que no añade contenido.
- source_word: בִּנְךָ יוֹסֵף
  english_pob_choice: your son Joseph
  chosen_spanish: tu hijo José
  alternatives_spanish:
  - José, tu hijo
  - tu hijo, José
  lexicon: HALOT
  rationale: Se conserva el orden relacional del hebreo y el nombre propio en forma española habitual, 'José'.
- source_word: שָׂמַנִי אֱלֹהִים
  english_pob_choice: God has made me
  chosen_spanish: Dios me ha puesto
  alternatives_spanish:
  - Dios me ha hecho
  - Dios me ha nombrado
  - Dios me ha establecido
  lexicon: HALOT
  rationale: שׂים puede expresar poner, establecer o नियुक्तar. 'Me ha puesto' mantiene la imagen de colocación en un cargo y evita sobreespecificar más de lo que el hebreo dice.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  lexicon: HALOT
  rationale: El contexto y la sintaxis exigen el referente singular; en español, 'Dios' comunica correctamente el sujeto divino.
- source_word: לְאָדוֹן
  english_pob_choice: lord
  chosen_spanish: como señor
  alternatives_spanish:
  - como señor y gobernador
  - como amo
  lexicon: HALOT
  rationale: אָדוֹן denota autoridad. 'Señor' en minúscula conserva el rango sin confundirlo con el título divino.
- source_word: לְכָל מִצְרַיִם
  english_pob_choice: over all Egypt
  chosen_spanish: sobre todo Egipto
  alternatives_spanish:
  - de todo Egipto
  - para todo Egipto
  lexicon: HALOT
  rationale: La relación de dominio se expresa con 'sobre'; 'todo Egipto' reproduce el alcance total del hebreo.
- source_word: רְדָה אֵלַי
  english_pob_choice: Come down to me
  chosen_spanish: Desciende a mí
  alternatives_spanish:
  - Baja a mí
  - Ven abajo a mí
  lexicon: HALOT
  rationale: ירד literalmente es 'descender'. Aquí se conserva esa forma más cercana al hebreo, aun cuando en español 'baja' también sería posible.
- source_word: אַל תַּעֲמֹד
  english_pob_choice: do not delay
  chosen_spanish: no te demores
  alternatives_spanish:
  - no te detengas
  - no te quedes
  - no te hagas esperar
  lexicon: HALOT
  rationale: עמד en este contexto significa no quedarse ni tardar. 'No te demores' recoge bien la urgencia sin usar una paráfrasis excesiva.
theological_decisions:
- issue: Identidad del sujeto divino en 'אֱלֹהִים'
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - dios
  rationale: 'No hay tensión doctrinal aquí: el verbo singular y la confesión de José señalan al Dios único. La mayúscula en español marca adecuadamente el referente personal y teológico.'
  doctrine_reference: Original-language primacy over translation tradition
- issue: Tono de autoridad en 'לְאָדוֹן לְכָל מִצְרַיִם'
  english_pob_reading: lord over all Egypt
  chosen_spanish_reading: señor sobre todo Egipto
  alternative_spanish_readings:
  - gobernante sobre todo Egipto
  - amo de todo Egipto
  rationale: '''Señor'' refleja la categoría de autoridad sin convertir el título en un cargo administrativo más específico que el hebreo. Se evita ''amo'' por su matiz de propiedad, no requerido aquí.'
  doctrine_reference: Lexical precision without doctrinal inflation
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo de Génesis 45:9 y es coherente con el audit trail en inglés: conserva el imperativo plural, la fórmula mensajera, el nombre propio José, el sujeto divino singular y la expresión de urgencia final. Se ha optado por un español natural y digno, manteniendo la tensión lexical de יָרַד / עָמַד con ''desciende'' y ''no te demores''.'
  spanish_consistency_notes:
  - Se usa 'Dios' con mayúscula para אֱלֹהִים en referencia singular al Dios de José.
  - '''Señor'' va en minúscula porque traduce el sustantivo de autoridad אָדוֹן, no el título divino.'
  - '''Desciende'' preserva la imagen espacial del hebreo, mientras que la nota recoge alternativas idiomáticas posibles.'
  - El marcador [a] está anclado en 'mi padre' para reflejar la alternativa final sobre אַל תַּעֲמֹד.
