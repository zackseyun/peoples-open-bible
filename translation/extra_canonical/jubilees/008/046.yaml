  from: the life with the flesh
  to: blood with the flesh
  rationale: The Ge'ez text reads 'dama' (blood), not 'nafsa' (life/soul). The prohibition
    here is specifically against eating blood with the flesh, which sets up the subsequent
    clause ('lest your blood... be required'). Translating it as 'the life' obscures
    the direct literal command in the source text.
