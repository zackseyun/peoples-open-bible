    reason: lexical_alternative
  - marker: c
    text: '''Plaza pública'' refleja el hebreo para un espacio abierto o plaza de la ciudad.'
    reason: lexical_alternative
  - marker: d
    text: Gilboa designa la zona montañosa donde Saúl cayó (cf. 1 Samuel 31:8–13).
    reason: cross_reference
  revision_rationale: 'Se hicieron ajustes menores pero necesarios para alinear mejor el español con el hebreo y con la auditoría inglesa: ''de los ciudadanos de'' en vez de ''de parte de''; ''plaza pública'' en vez de ''lugar público''; y ''hirieron de muerte a Saúl'' en vez de ''derrotaron a Saúl'' para reflejar mejor הַכּוֹת ... אֶת שָׁאוּל. También se ordenaron las notas para que la marcación siga el orden del texto y se refinó la nota sobre ''colgar''.'
