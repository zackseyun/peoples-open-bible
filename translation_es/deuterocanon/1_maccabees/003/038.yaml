translation:
  language: es
  text: Y Lisías eligió a Ptolomeo, hijo de Dórimenes[a], a Nicánor y a Gorgias, hombres poderosos entre los amigos del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de los cortesanos del rey». En el uso real helenístico, «los amigos del rey» podía funcionar como un título de corte y no solo indicar amistad personal.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐπέλεξεν
  english_pob_choice: chose
  chosen_spanish: eligió
  alternatives_spanish:
  - escogió
  - seleccionó
  lexicon: LSJ
  rationale: El verbo griego expresa la acción de escoger. «Eligió» es natural en español y conserva el valor directo de selección sin añadir la idea de nombramiento formal que no exige el contexto.
- source_word: Πτολεμαῖον τὸν Δορυμένους
  english_pob_choice: Ptolemy son of Dorymenes
  chosen_spanish: Ptolomeo, hijo de Dórimenes
  alternatives_spanish:
  - Ptolomeo, hijo de Dórymenes
  - Ptolomeo, de Dórimenes
  lexicon: LSJ
  rationale: La construcción con artículo y genitivo identifica a Ptolomeo por filiación. «Hijo de» expresa esa relación de modo claro y natural en español, siguiendo el sentido del POB en inglés.
- source_word: ἄνδρας δυνατοὺς
  english_pob_choice: mighty men
  chosen_spanish: hombres poderosos
  alternatives_spanish:
  - hombres fuertes
  - hombres valientes
  - varones poderosos
  lexicon: LSJ
  rationale: El griego presenta una combinación de masculinidad explícita y fuerza/capacidad/influencia. «Hombres poderosos» conserva la amplitud semántica de δύνατος y sugiere capacidad e importancia, sin forzar una lectura exclusivamente militar.
- source_word: τῶν φίλων τοῦ βασιλέως
  english_pob_choice: among the king’s friends
  chosen_spanish: entre los amigos del rey
  alternatives_spanish:
  - entre los cortesanos del rey
  - entre los íntimos del rey
  - entre los amigos del rey
  lexicon: LSJ
  rationale: Se mantiene «amigos» para no perder el término literal del texto, pero «entre» comunica mejor la pertenencia al grupo. En español, «cortesanos» sería interpretativo; se deja la posible función de título cortesano para la nota.
theological_decisions:
- issue: τῶν φίλων τοῦ βασιλέως como posible título cortesano helenístico
  english_pob_reading: The main text keeps 'friends' and a footnote notes that 'the king’s friends' could function as a court title rather than merely personal friendship.
  chosen_spanish_reading: «amigos del rey» en el texto principal, con nota sobre posible título cortesano helenístico
  alternative_spanish_readings:
  - cortesanos del rey
  - favoritos del rey
  rationale: El español «amigos» reproduce el término del original y evita reemplazarlo por una equivalencia moderna que borraría la ambigüedad histórica. La nota preserva la tensión entre amistad literal y designación cortesana.
  doctrine_reference: Contexto histórico-cultural helenístico; no aplica una doctrina específica.
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del POB en inglés, que prefiere 'among the king’s friends' por ser más natural y exacto para τῶν φίλων τοῦ βασιλέως, manteniendo el sentido de pertenencia al círculo real sin convertirlo en un genitivo posesivo rígido.
  spanish_consistency_notes:
  - Se conserva «Y» inicial para reflejar el enlace narrativo del griego.
  - Se usa «Lisías» y «Nicánor» con acentuación española coherente.
  - Se mantiene «Ptolomeo, hijo de Dórimenes» como equivalente transparente de la filiación.
  - La nota al pie marca la ambigüedad histórica del grupo de 'amigos del rey' sin sustituir el término principal.
