translation:
  language: es
  text: 'Entonces el rey Salomón juró por Yahvé, diciendo: «Así me haga Dios, y aun más[a], porque Adonías ha dicho esta palabra contra su propia vida».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Modismo hebreo: «ha hablado/dicho esta palabra con/contra su vida», es decir, ha dicho algo que pone su vida en peligro o le cuesta la vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע
  english_pob_choice: swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo un juramento
  - prestó juramento
  lexicon: HALOT
  rationale: El verbo expresa jurar o prestar juramento. «Juró» es breve, natural en narrativa y fiel al acto solemne del hebreo.
- source_word: בַּיהוָה
  english_pob_choice: by Yahweh
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - por Yahvé
  - por el SEÑOR
  lexicon: HALOT
  rationale: La preposición con el nombre divino indica el ser por quien se jura. Se conserva el nombre propio «Yahvé» según la política del proyecto, en lugar de ocultarlo con un título.
- source_word: כֹּה יַעֲשֶׂה לִּי אֱלֹהִים וְכֹה יוֹסִיף
  english_pob_choice: May God do so to me, and more also
  chosen_spanish: Así me haga Dios, y aun más
  alternatives_spanish:
  - Así me haga Dios, y aun más
  - Dios me haga así y aun lo añada
  lexicon: HALOT
  rationale: Es una fórmula fija de juramento/maldición. «Así me haga Dios, y aun más» conserva la fuerza idiomática sin volverla excesivamente literal ni explicativa.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: En esta fórmula de juramento, אֱלֹהִים funciona como referencia singular a Dios; por eso se traduce en singular en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del juramento. «Porque» expresa bien el valor causal/asseverativo que el POB inglés resolvió con «for».
- source_word: בְנַפְשׁוֹ
  english_pob_choice: against his own life
  chosen_spanish: contra su propia vida
  alternatives_spanish:
  - contra su propia vida
  - con riesgo de su vida
  - a costa de su vida
  lexicon: HALOT
  rationale: La expresión es idiomática y apunta a que lo dicho compromete o pone en peligro su vida. «Contra su propia vida» conserva el matiz reflexivo y judicial.
- source_word: דִּבֶּר ... אֶת־הַדָּבָר הַזֶּה
  english_pob_choice: has spoken this word
  chosen_spanish: ha hablado esta palabra
  alternatives_spanish:
  - ha hablado esta palabra
  - ha dicho esta cosa
  - ha hablado este asunto
  lexicon: HALOT
  rationale: Se mantiene la textura formal del hebreo («hablar la palabra»). «Palabra» refleja el sustantivo hebreo de forma más cercana que «asunto».
- source_word: אֲדֹנִיָּהוּ
  english_pob_choice: Adonijah
  chosen_spanish: Adonías
  alternatives_spanish:
  - Adonías
  lexicon: HALOT
  rationale: Nombre propio en su forma española usual y reconocible.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La política del proyecto pide verterlo como «Yahvé», preservando el nombre pactual y evitando el reemplazo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió la relación de כי: no introduce una condición negada, sino una explicación causal/asseverativa. Por eso en español se eligió «porque» y no una forma condicional como «si».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como equivalente regular de יהוה en el texto principal.
  - Se evitó «SEÑOR» por el mandato del proyecto y por fidelidad al nombre propio.
  - La fórmula juramentaria se conservó como expresión fija sin desglosarla en paráfrasis excesiva.
  - «Palabra» reproduce la concreción del hebreo דָּבָר sin perder inteligibilidad en español.
  - Se usó «Adonías» como forma española estándar del nombre propio.
