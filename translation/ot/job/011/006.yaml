id: JOB.11.6
reference: Job 11:6
source:
  edition: WLC
  text: וְ/יַגֶּד לְ/ךָ֨ תַּֽעֲלֻמ֣וֹת חָכְמָה֮ כִּֽי כִפְלַ֪יִם לְֽ/ת֫וּשִׁיָּ֥ה וְ/דַ֡ע כִּֽי יַשֶּׁ֥ה לְ/ךָ֥ אֱ֝ל֗וֹהַ מֵ/עֲוֺנֶֽ/ךָ־׀־־׃
translation:
  text: and would tell you the hidden things of wisdom[a], for sound wisdom has two sides. Know, then[c][b], that God has overlooked some of your iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the secrets of wisdom.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'for it is double for sound wisdom,' an idiom expressing that wisdom is more complex or many-sided than it appears.
    reason: lexical_alternative
  - marker: c
    text: Or 'God exacts from you less than your guilt deserves' or 'God has forgotten some of your iniquity.' The Hebrew verb is difficult.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיַגֶּד
  chosen: and would tell
  alternatives:
  - and declare
  - and make known
  lexicon: HALOT
  rationale: 'Hiphil of נגד commonly means ''tell, declare, make known.'' Given the preceding wish-context in Zophar''s speech (''Oh, that God would speak...''), the imperfect here is best carried as a volitive/resultative continuation: ''and would tell you,'' not a simple future.'
- source_word: תַּעֲלֻמוֹת חָכְמָה
  chosen: the hidden things of wisdom
  alternatives:
  - the secrets of wisdom
  - wisdom's hidden things
  lexicon: HALOT
  rationale: תעלמות denotes hidden or concealed matters. 'Hidden things of wisdom' preserves the concrete plural and the genitival relation without over-paraphrasing. 'Secrets of wisdom' is possible but slightly more interpretive.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: The conjunction introduces the ground for the previous clause. 'For' best preserves the explanatory force in natural English.
- source_word: כִפְלַיִם
  chosen: has two sides
  alternatives:
  - is double
  - is manifold
  lexicon: HALOT
  rationale: The dual form literally suggests doubleness. In English, 'has two sides' communicates the idiom naturally while preserving the sense that wisdom/sound wisdom is more than appears on the surface. 'Is double' is more literal but less clear idiomatically.
- source_word: לְתוּשִׁיָּה
  chosen: sound wisdom
  alternatives:
  - understanding
  - success
  - resourcefulness
  lexicon: HALOT
  rationale: תושיה is a difficult wisdom-term with senses including sound wisdom, effective insight, or resourcefulness. In this context, paired with חכמה, 'sound wisdom' best fits the semantic field and avoids flattening it to mere 'understanding.'
- source_word: וְדַע
  chosen: Know, then,
  alternatives:
  - And know
  - So know
  lexicon: HALOT
  rationale: Imperative of ידע. 'Know, then,' gives the exhortational force and connects the conclusion to the preceding explanation.
- source_word: יַשֶּׁה לְךָ
  chosen: has overlooked some of
  alternatives:
  - has forgotten some of
  - has caused you to forget
  - has remitted part of
  lexicon: HALOT
  rationale: The verb from נשׁה can mean 'forget' or in causative nuance 'cause to forget/overlook.' In context with מן + 'your iniquity,' Zophar's point is that God has not exacted the full penalty Job deserves. 'Has overlooked some of' captures that idiomatic sense in context better than a wooden 'has forgotten.'
- source_word: אֱלוֹהַ
  chosen: God
  alternatives:
  - God Almighty
  lexicon: HALOT
  rationale: אֱלוֹהַ is the singular poetic form 'God.' No contextual warrant exists here to expand it to 'God Almighty.'
- source_word: מֵעֲוֺנֶךָ
  chosen: some of your iniquity
  alternatives:
  - part of your guilt
  - some of your sin
  lexicon: HALOT
  rationale: 'עון can denote iniquity, guilt, or guilt-bearing consequence. Here Zophar accuses Job morally, so ''iniquity'' preserves the ethical weight. The prefixed מן is best represented partitively: God has overlooked ''some of'' Job''s iniquity.'
