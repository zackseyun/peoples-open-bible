translation:
  language: es
  text: Pero en cuanto a ti, no ores por este pueblo, ni eleves por ellos clamor ni oración, porque no escucho en el tiempo en que claman a mí por causa de su calamidad.
  philosophy: optimal-equivalence
  footnotes:
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: But as for you
  chosen_spanish: Pero en cuanto a ti[a]
  alternatives_spanish:
  - Pero tú
  - Y en cuanto a ti
  lexicon: HALOT
  rationale: La forma hebrea introduce un contraste enfático con Jeremías. «En cuanto a ti» transmite mejor ese giro que un simple «y tú», y «pero» conserva el contraste del contexto.
- source_word: אַל תִּתְפַּלֵּל
  english_pob_choice: do not pray
  chosen_spanish: no ores
  alternatives_spanish:
  - no intercedas
  - no ruegues
  lexicon: HALOT
  rationale: תִּתְפַּלֵּל se refiere aquí a la acción de orar. «Ores» es natural en español y no estrecha indebidamente el verbo a «interceder», aunque el contexto sea intercesorio.
- source_word: בְּעַד הָעָם הַזֶּה
  english_pob_choice: for this people
  chosen_spanish: por este pueblo
  alternatives_spanish:
  - a favor de este pueblo
  - en favor de este pueblo
  lexicon: HALOT
  rationale: בְּעַד señala representación o beneficio. «Por este pueblo» mantiene la sencillez y la relación de intercesión sin sonar forzado.
- source_word: וְאַל תִּשָּׂא
  english_pob_choice: and do not lift up
  chosen_spanish: ni eleves
  alternatives_spanish:
  - ni levantes
  - ni alces
  lexicon: HALOT
  rationale: נָשָׂא literalmente es «levantar». En este contexto, «eleves» conserva la imagen verbal de levantar una plegaria o clamor.
- source_word: רִנָּה
  english_pob_choice: a cry
  chosen_spanish: clamor
  alternatives_spanish:
  - grito
  - canto
  lexicon: HALOT
  rationale: רִנָּה puede ser un grito fuerte o clamoroso. «Clamor» encaja mejor que «canto» en una súplica urgente y evita una lectura festiva.
- source_word: וּתְפִלָּה
  english_pob_choice: or prayer
  chosen_spanish: ni oración
  alternatives_spanish:
  - ni plegaria
  - y oración
  lexicon: HALOT
  rationale: Aunque la conjunción es «y», en español la coordinación negativa queda más natural como «ni oración». Conserva la pareja de términos sin pesadez sintáctica.
- source_word: כִּי אֵינֶנִּי שֹׁמֵעַ
  english_pob_choice: for I am not listening
  chosen_spanish: porque no los escucho
  alternatives_spanish:
  - porque no oigo
  - pues no presto oído
  lexicon: HALOT
  rationale: El participio negado expresa una negativa efectiva de atender. «No los escucho» comunica esa negativa con naturalidad y mantiene el referente directo del pueblo.
- source_word: בְּעֵת קָרְאָם אֵלַי
  english_pob_choice: at the time when they call to me
  chosen_spanish: en el tiempo en que clamen a mí
  alternatives_spanish:
  - cuando me llamen
  - al tiempo que me invoquen
  lexicon: HALOT
  rationale: בְּעֵת marca el momento de la acción. «En el tiempo en que» refleja de manera bastante literal la expresión hebrea; «clamen» conserva el matiz de invocación urgente.
- source_word: בְּעַד רָעָתָם
  english_pob_choice: because of their disaster
  chosen_spanish: por causa de su calamidad
  alternatives_spanish:
  - a causa de su desgracia
  - por su desastre
  lexicon: HALOT
  rationale: Aquí רָעָה se entiende como calamidad/desastre, no como maldad moral. «Calamidad» preserva ese sentido de juicio y aflicción que motiva su clamor.
theological_decisions:
- issue: Valor de רָעָה en la cláusula final
  english_pob_reading: calamity/disaster rather than moral evil
  chosen_spanish_reading: calamidad, no maldad moral
  alternative_spanish_readings:
  - mal
  - maldad
  - desgracia
  rationale: El contexto habla del momento en que el pueblo clama a Yahvé a causa de la situación que le ha sobrevenido. «Calamidad» expresa la aflicción/jucio sufrido sin insinuar que claman «por su maldad».
  doctrine_reference: Jeremiah 11:14; lexical context of רעה in prophetic judgment language
- issue: Negación de la intercesión por este pueblo
  english_pob_reading: do not pray for this people
  chosen_spanish_reading: no ores por este pueblo
  alternative_spanish_readings:
  - no intercedas por este pueblo
  - no ruegues por este pueblo
  rationale: El texto prohíbe la oración intercesora de Jeremías. «Ores» es suficientemente amplio y fiel; el contexto deja claro que se trata de intercesión, sin imponer un término más técnico que el hebreo no exige.
  doctrine_reference: Jeremiah 11:14; prophetic intercession
- issue: Matiz temporal de בְּעֵת
  english_pob_reading: at the time when they call to me
  chosen_spanish_reading: en el tiempo en que clamen a mí
  alternative_spanish_readings:
  - cuando clamen a mí
  - al tiempo que clamen a mí
  rationale: La forma hebrea subraya el momento de su invocación. La versión española conserva ese valor temporal y el tono solemne del rechazo divino a esa súplica.
  doctrine_reference: Jeremiah 11:14; temporal clause בְּעֵת
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que precisó la idea temporal de בְּעֵת como «at the time when». La redacción española refleja esa precisión con «en el tiempo en que», manteniendo naturalidad. También se preservó la decisión léxica de entender רָעָה como calamidad/desastre y no como maldad moral.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino solo cuando aparezca explícitamente; en este versículo no está presente.
  - Se prefirió «calamidad» para רָעָה en coherencia con el tratamiento POB de este lexema en contextos de juicio y aflicción.
  - Se conservó la doble expresión de súplica con dos sustantivos coordinados, usando «clamor ni oración» para una coordinación española natural.
