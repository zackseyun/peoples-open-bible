revisions:
- from: Pero antes de hacer estas cosas, llamadme a Ajior el amonita[a], para que vea y reconozca al que ha tratado con desprecio la casa de Israel y que lo envió a nosotros como para muerte[b][c].
  to: Pero antes de hacer estas cosas, tráiganme a Ajior el amonita[a], para que vea y reconozca al que ha tratado con desprecio la casa de Israel y lo envió a nosotros como para muerte[b][c].
  rationale: Se revisa el verbo principal para lograr un español natural y ampliamente eclesial sin perder el sentido del dativo μοι, y se alisa la coordinación final para reflejar mejor los dos participios griegos que modifican al mismo referente. Se mantienen «casa de Israel» y «como para muerte» por fidelidad al registro y a la literalidad explicada en notas.
