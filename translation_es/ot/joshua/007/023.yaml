base_translation:
  language: en
  yaml_path: translation/ot/joshua/007/023.yaml
  text: They took them from inside the tent and brought them to Joshua and to all the sons of Israel[c][b][a], and they laid them out before Yahweh.
  footnotes:
  - marker: a
    text: Or 'they poured them out before the LORD.' The Hebrew verb can literally mean 'pour out,' but here likely refers to laying out the recovered items in the LORD's presence.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Israel'; alternatively, 'Israelites.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'before Yahweh.' The divine name יְהוָה is rendered 'the LORD' in keeping with the project's standard practice.
    reason: alternative_reading
