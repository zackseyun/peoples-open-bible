translation:
  language: es
  text: Y levantaré para mí un sacerdote fiel, que hará conforme a lo que hay en mi corazón y en mi alma. Y le edificaré una casa fiel[a], y andará delante de mi ungido[b] todos los días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una casa duradera», es decir, una casa o linaje perdurable.
    reason: lexical_alternative
  - marker: b
    text: «Mi ungido» también puede entenderse, según el contexto, como «mi Mesías» o «mi rey».
    reason: alternative_reading
lexical_decisions:
- source_word: וַהֲקִימֹתִי
  english_pob_choice: I will raise up
  chosen_spanish: levantaré
  alternatives_spanish:
  - estableceré
  - pondré
  lexicon: HALOT
  rationale: הקים aquí expresa hacer surgir o poner en oficio a alguien. «Levantaré» conserva la imagen verbal y la iniciativa divina sin añadir una formulación demasiado interpretativa.
- source_word: לִי
  english_pob_choice: for myself
  chosen_spanish: para mí
  alternatives_spanish:
  - para mí mismo
  lexicon: HALOT
  rationale: El dativo con sufijo de primera persona indica pertenencia e iniciativa divina. «Para mí» es natural en español y mantiene ese valor.
- source_word: כֹהֵן
  english_pob_choice: priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - cura
  lexicon: HALOT
  rationale: El término cultual estándar se expresa mejor en español bíblico contemporáneo como «sacerdote».
- source_word: נֶאֱמָן
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - fiable
  - digno de confianza
  lexicon: HALOT
  rationale: נֶאֱמָן comunica fidelidad, lealtad y confiabilidad. «Fiel» preserva bien esa amplitud en español.
- source_word: כַּאֲשֶׁר
  english_pob_choice: according to what
  chosen_spanish: conforme a lo que
  alternatives_spanish:
  - según lo que
  - como
  lexicon: HALOT
  rationale: La comparación fija el patrón de acción. «Conforme a lo que» es fluido y conserva la idea de norma o medida.
- source_word: בִּלְבָבִי
  english_pob_choice: in my heart
  chosen_spanish: en mi corazón
  alternatives_spanish:
  - según mi corazón
  lexicon: HALOT
  rationale: Se conserva la imagen antropomórfica del corazón como sede de voluntad y propósito.
- source_word: וּבְנַפְשִׁי
  english_pob_choice: and in my soul
  chosen_spanish: y en mi alma
  alternatives_spanish:
  - y en mi ser
  - y en mi vida
  lexicon: HALOT
  rationale: נפש se rinde aquí como «alma» para mantener el paralelismo con «corazón» y respetar la forma léxica del original, tal como la POB inglesa mantuvo «soul».
- source_word: יַעֲשֶׂה
  english_pob_choice: he will do
  chosen_spanish: hará
  alternatives_spanish:
  - actuará
  - obrará
  lexicon: HALOT
  rationale: El verbo es amplio; en español, «hará» funciona naturalmente con la expresión precedente sin perder literalidad.
- source_word: וּבָנִיתִי
  english_pob_choice: I will build
  chosen_spanish: edificaré
  alternatives_spanish:
  - construiré
  - levantaré
  lexicon: HALOT
  rationale: Aunque literalmente es «construir», con «casa» la equivalencia bíblica «edificar» suena natural y conserva la metáfora de establecimiento de una línea o casa.
- source_word: בַּיִת נֶאֱמָן
  english_pob_choice: a faithful house
  chosen_spanish: una casa fiel
  alternatives_spanish:
  - una casa duradera
  - una casa firme
  lexicon: HALOT
  rationale: Se mantiene el adjetivo repetido «fiel» para reflejar נֶאֱמָן y dejar abierta la metáfora de casa como linaje o casa sacerdotal. La alternativa de duración queda documentada en la nota.
- source_word: וְהִתְהַלֵּךְ
  english_pob_choice: he will walk
  chosen_spanish: andará
  alternatives_spanish:
  - caminará
  - se conducirá
  lexicon: HALOT
  rationale: El hitpael de הלך puede expresar modo de vida o conducta continua. «Andará» conserva el hebraísmo idiomático que la POB inglesa preservó con «walk».
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» conserva el matiz relacional y espacial del original de manera natural en español.
- source_word: מְשִׁיחִי
  english_pob_choice: my anointed
  chosen_spanish: mi ungido
  alternatives_spanish:
  - mi Mesías
  - mi rey
  lexicon: HALOT
  rationale: משיח se traduce aquí por su sentido básico de persona ungida. «Mi ungido» evita importar una especificación mesiánica posterior que el contexto inmediato no exige, y sigue el ajuste revisional inglés que eliminó «one».
- source_word: כָּל הַיָּמִים
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - siempre
  - por todos sus días
  lexicon: HALOT
  rationale: La locución se vierte de manera literal para conservar el hebraísmo y no exagerar a «para siempre».
theological_decisions:
- issue: Referente de מְשִׁיחִי
  english_pob_reading: Rendered as 'my anointed' rather than 'my Messiah' in the main text.
  chosen_spanish_reading: «mi ungido» en el texto principal.
  alternative_spanish_readings:
  - «mi Mesías»
  - «mi rey»
  rationale: En este contexto histórico inmediato, el referente primario es el portador ungido por Yahvé dentro de Israel. «Mi ungido» preserva la tensión entre el sentido histórico y cualquier extensión canónica posterior sin resolverla prematuramente.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La POB inglesa fue revisada para quitar «one» tras «my anointed», quedando «my anointed». La versión española sigue esa revisión con «mi ungido», sin añadir palabras inexistentes en el hebreo. Se mantuvo la nota de alternativa para reflejar la posible lectura titulada o régia, pero sin imponerla en el texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» según el estándar del proyecto para יהוה cuando aparezca el nombre divino en el contexto inmediato; aquí el versículo está en primera persona divina y no requiere sustitución por «SEÑOR».
  - Se conservó el paralelismo «corazón / alma» para reflejar la doble antropopatía del hebreo.
  - «Casa fiel» mantiene la ambigüedad entre edificio, casa dinástica y linaje sacerdotal.
  - «Delante de» y «todos los días» mantienen el hebraísmo sin forzar una paráfrasis interpretativa.
