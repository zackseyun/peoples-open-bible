translation:
  language: es
  text: 'Yahvé me dijo en los días del rey Josías: «¿Has visto lo que ha hecho Israel descarriada[a]? Ella subió a todo monte alto y debajo de todo árbol frondoso[b], y allí cometió prostitución[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Israel apóstata» o «Israel que se aparta». El término hebreo denota apartamiento, apostasía o infidelidad al pacto.
    reason: lexical_alternative
  - marker: b
    text: Las expresiones «todo monte alto» y «debajo de todo árbol frondoso» son descripciones estereotipadas de lugares asociados con culto ilícito.
    reason: cultural_note
  - marker: c
    text: O «y allí se prostituyó». El hebreo usa la infidelidad sexual como metáfora de la idolatría y de la infidelidad al pacto de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio del Tetragrámaton, conforme al principio editorial del proyecto. «Yahvé» preserva el referente personal sin sustituirlo por un título genérico.
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante
  - en tiempos de
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula temporal idiomática; «en los días de» la conserva de modo natural en español.
- source_word: יֹאשִׁיָּהוּ הַמֶּלֶךְ
  english_pob_choice: King Josiah
  chosen_spanish: el rey Josías
  alternatives_spanish:
  - Josías, el rey
  - el rey Josías
  lexicon: HALOT
  rationale: El español normal coloca el título antes o en aposición simple. «El rey Josías» es claro y fiel al sentido sin alterar el referente.
- source_word: הֲרָאִיתָ
  english_pob_choice: Have you seen
  chosen_spanish: ¿Has visto
  alternatives_spanish:
  - ¿Viste?
  - ¿Has contemplado?
  lexicon: HALOT
  rationale: 'La pregunta retórica en perfecto funciona naturalmente como presente relevante en español: «¿Has visto...?». Mantiene el tono de reproche profético.'
- source_word: מְשֻׁבָה יִשְׂרָאֵל
  english_pob_choice: backsliding Israel
  chosen_spanish: Israel, la rebelde
  alternatives_spanish:
  - Israel apóstata
  - Israel, la descarriada
  - Israel rebelde
  lexicon: HALOT
  rationale: מְשֻׁבָה expresa alejamiento, infidelidad de pacto y rebelión. «La rebelde» conserva esa carga sin adoptar «apóstata», que suena más técnico eclesiástico. Se coloca en aposición para evitar una etiqueta demasiado dura o inequívocamente denominacional, manteniendo la tensión del término original.
- source_word: הֹלְכָה הִיא
  english_pob_choice: She went up
  chosen_spanish: Ella subía
  alternatives_spanish:
  - Ella fue
  - Ella iba
  lexicon: HALOT
  rationale: El hebreo describe una acción habitual o repetida en estilo profético. «Subía» reproduce mejor ese valor aspectual que un pretérito puntual.
- source_word: עַל כָּל הַר גָּבֹהַּ
  english_pob_choice: on every high hill
  chosen_spanish: a todo monte alto
  alternatives_spanish:
  - en todo monte alto
  - sobre todo monte alto
  - a cada collado alto
  lexicon: HALOT
  rationale: La expresión es un modismo de lugares de culto ilícito. «Monte alto» comunica bien el topónimo cultual en español; «a todo» refleja la idea distributiva de הַר + כָּל.
- source_word: וְאֶל תַּחַת כָּל עֵץ רַעֲנָן
  english_pob_choice: and under every green tree
  chosen_spanish: y debajo de todo árbol frondoso
  alternatives_spanish:
  - y bajo todo árbol verde
  - y bajo todo árbol frondoso
  - y debajo de cada árbol frondoso
  lexicon: HALOT
  rationale: רַעֲנָן alude a lo fresco, vigoroso o frondoso. «Frondoso» es más natural en español que «verde» y conserva la imagen de lugares asociados al culto idólatra.
- source_word: וַתִּזְנִי
  english_pob_choice: she committed prostitution
  chosen_spanish: se prostituyó
  alternatives_spanish:
  - cometió prostitución
  - se entregó a prostitución
  - fornicó
  lexicon: HALOT
  rationale: Se preserva el verbo sexual metafórico para la infidelidad de pacto. «Se prostituyó» es idiomático, claro y mantiene la fuerza figurada sin una formulación demasiado abstracta.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en esos lugares
  lexicon: HALOT
  rationale: «Allí» remite de forma directa a los lugares mencionados inmediatamente antes y conserva la deixis del hebreo.
theological_decisions:
- issue: Metáfora profética de infidelidad sexual para la idolatría
  english_pob_reading: Retain the sexualized metaphor explicitly rather than flattening it to 'committed idolatry.'
  chosen_spanish_reading: Conservar «se prostituyó» en vez de neutralizarlo como «cometió idolatría»
  alternative_spanish_readings:
  - allí fue infiel
  - allí cometió idolatría
  rationale: Jeremías usa deliberadamente el lenguaje de prostitución como metáfora de la ruptura de pacto. Mantenerlo en español preserva la carga moral, literaria y teológica del texto, sin borrar la tensión semántica del hebreo.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor de מְשֻׁבָה
  english_pob_reading: backsliding / apostate / turning away
  chosen_spanish_reading: la rebelde
  alternative_spanish_readings:
  - la apóstata
  - la descarriada
  - la que se apartó
  rationale: El término hebreo puede abarcar apartarse, rebelarse e infidelidad de pacto. «La rebelde» conserva una tensión amplia y no reduce el matiz a una sola noción técnica; además, evita un giro excesivamente eclesiástico que no está exigido por el hebreo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail en cuanto a dos decisiones: (1) se conserva un equivalente formal para מְשֻׁבָה, pero en español se opta por una aposición más natural («la rebelde») para evitar un adjetivo demasiado abstracto o eclesiástico; (2) se mantiene la metáfora sexual explícita para וַתִּזְנִי, con una forma idiomática y formal en español («se prostituyó»), evitando la neutralización conceptual. También se respeta el nombre divino «Yahvé» según la norma del proyecto, y se traduce el patrón cultual «high hill / green tree» con imágenes naturales comprensibles en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se evita «Cristo»/«SEÑOR» por no corresponder al hebreo ni al criterio editorial indicado.
  - «Se prostituyó» conserva la metáfora sexual de infidelidad, sin convertirla en paráfrasis moralizante.
  - «Monte alto» y «árbol frondoso» preservan la imaginería cultual tradicional del pasaje.
  - La aposición «Israel, la rebelde» mantiene la fluidez del español y la carga del término מְשֻׁבָה.
