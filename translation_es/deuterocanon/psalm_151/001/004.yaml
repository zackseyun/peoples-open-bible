translation:
  language: es
  text: Él mismo envió a su mensajero[a], y me tomó de las ovejas de mi padre, y me ungió con el aceite de su unción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su ángel’. El griego ἄγγελος puede significar tanto ‘mensajero’ como ‘ángel’; aquí se adopta ‘mensajero’ por el contexto narrativo de la unción de David.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  english_pob_choice: He himself
  chosen_spanish: Él mismo
  alternatives_spanish:
  - Él
  - Él solo
  lexicon: LSJ
  rationale: El griego usa el pronombre enfático; «Él mismo» conserva esa fuerza sin sonar forzado en español.
- source_word: ἐξαπέστειλεν
  english_pob_choice: sent out
  chosen_spanish: envió
  alternatives_spanish:
  - despachó
  - mandó
  lexicon: LSJ
  rationale: El compuesto intensifica la acción de enviar, pero en español «envió» es natural y suficiente aquí; el valor enfático queda reforzado por «Él mismo».
- source_word: τὸν ἄγγελον αὐτοῦ
  english_pob_choice: his messenger
  chosen_spanish: su mensajero
  alternatives_spanish:
  - su ángel
  lexicon: LSJ
  rationale: Siguiendo la revisión auditada, aquí ἄγγελος se entiende contextual y narrativamente como el enviado humano en el episodio de la unción, no como un ser angelical. «Mensajero» preserva el valor léxico amplio sin introducir una lectura sobrenatural no exigida por el contexto.
- source_word: ἦρέν με
  english_pob_choice: took me
  chosen_spanish: me tomó
  alternatives_spanish:
  - me levantó
  - me alzó
  lexicon: LSJ
  rationale: «Me tomó» reproduce la acción de sacar/levantar con naturalidad en español y encaja con la idea de selección desde el rebaño.
- source_word: ἐκ τῶν προβάτων τοῦ πατρός μου
  english_pob_choice: from my father's sheep
  chosen_spanish: de las ovejas de mi padre
  alternatives_spanish:
  - de entre las ovejas de mi padre
  - del rebaño de mi padre
  lexicon: LSJ
  rationale: «Ovejas» mantiene la concreción del griego πρόβατα. La preposición «de» permite un español fluido, aunque la idea subyacente es la extracción de entre ellas.
- source_word: ἔχρισέν με
  english_pob_choice: anointed me
  chosen_spanish: me ungió
  alternatives_spanish:
  - me consagró con unción
  lexicon: LSJ
  rationale: χρίω se vierte de manera directa con «ungió», conservando el sentido real y ritual.
- source_word: ἐν τῷ ἐλαίῳ τῆς χρίσεως αὐτοῦ
  english_pob_choice: with the oil of his anointing
  chosen_spanish: con el aceite de su unción
  alternatives_spanish:
  - con el aceite de la unción que procede de él
  - con el óleo de su unción
  lexicon: LSJ
  rationale: «Aceite» es claro y contemporáneo; «unción» preserva la relación con el rito. La combinación reproduce el doble matiz material y ceremonial del griego.
theological_decisions:
- issue: Sentido de ἄγγελος en el contexto de la unción de David
  english_pob_reading: messenger
  chosen_spanish_reading: mensajero
  alternative_spanish_readings:
  - ángel
  rationale: El contexto de la unción de David, junto con la revisión auditada, apunta a Samuel como el enviado de Dios. Traducir «ángel» introduciría una lectura sobrenatural no respaldada por el episodio aludido.
  doctrine_reference: 1 Samuel 16
- issue: Relación entre el aceite y la unción
  english_pob_reading: with the oil of his anointing
  chosen_spanish_reading: con el aceite de su unción
  alternative_spanish_readings:
  - con el óleo de su unción
  - con el aceite de la unción
  rationale: La formulación española conserva la referencia concreta al aceite y, a la vez, el vínculo ritual con la unción; no se suaviza a una mera metáfora espiritual.
  doctrine_reference: 1 Samuel 16:13
translation_notes:
  revision_awareness: La revisión auditada corrigió la lectura anterior de «ángel» a «mensajero» para evitar una lectura sobrenatural ajena al contexto de la unción de David y coherente con el trasfondo de 1 Samuel 16. La versión española sigue esa decisión revisada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto solo cuando aparece el nombre divino explícito; este versículo no lo contiene.
  - Se usa «ungió» y no una perífrasis, para conservar el verbo técnico de consagración.
  - Se evitó «ángel» en el texto principal por la decisión contextual documentada; la alternativa queda en nota.
  - 'El español conserva el paralelismo de tres acciones: envío, extracción, unción.'
