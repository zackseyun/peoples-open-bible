translation:
  language: es
  text: 'Josué les dijo: «Si eres un pueblo numeroso, sube al bosque[a] y despeja allí terreno para ti, en la tierra de los perizitas y de los refaítas; porque la región montañosa de Efraín[b] es demasiado estrecha para ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sube a la zona boscosa». El hebreo habla de subir hacia el bosque; el verbo siguiente se refiere a despejar terreno arbolado.
    reason: lexical_alternative
  - marker: b
    text: O «la serranía de Efraín» o «el monte de Efraín». El hebreo puede referirse a la región alta asignada a Efraín, no necesariamente a un monte singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם עַם רַב אַתָּה
  english_pob_choice: If you are a numerous people
  chosen_spanish: Si eres un pueblo numeroso
  alternatives_spanish:
  - Si eres mucha gente
  - Si eres un pueblo grande
  lexicon: HALOT
  rationale: La expresión hebrea destaca cantidad, no estatus. «Pueblo numeroso» conserva el valor cuantitativo de עַם רַב en un español natural y bíblicamente claro.
- source_word: עֲלֵה לְךָ הַיַּעְרָה
  english_pob_choice: go up to the forest
  chosen_spanish: sube al monte
  alternatives_spanish:
  - sube al bosque
  - sube a la selva
  - sube al bosque para ti
  lexicon: HALOT
  rationale: El contexto no exige reproducir literalmente «bosque» si en español eso oscurece la idea territorial. El POB inglés conserva el área arbolada; aquí «monte» comunica mejor el movimiento hacia una zona alta y boscosa. Se mantiene la nota para indicar la alternativa de “bosque” vinculada al hebreo.
- source_word: וּבֵרֵאתָ לְךָ שָׁם
  english_pob_choice: clear land for yourselves there
  chosen_spanish: despeja allí terreno para ti
  alternatives_spanish:
  - corta allí para ti
  - aclárate allí terreno
  - despeja allí para ustedes
  lexicon: HALOT
  rationale: בָּרַר/בֵּרֵא en esta forma implica despejar o limpiar terreno, especialmente de vegetación. «Despeja allí terreno» expresa la acción concreta sin añadir objetos no presentes. Se conserva el beneficiario con «para ti», siguiendo el לְךָ del hebreo, aunque el plural del inglés refleja el colectivo.
- source_word: בְּאֶרֶץ הַפְּרִזִּי וְהָרְפָאִים
  english_pob_choice: in the land of the Perizzites and the Rephaim
  chosen_spanish: en la tierra de los perizitas y de los refaítas
  alternatives_spanish:
  - en la tierra de los perizitas y de los refaíms
  - en la tierra de los perizitas y los refaítas
  lexicon: HALOT
  rationale: Se conservan ambos etnónimos con transliteración estándar en español bíblico. «Refaítas» mantiene el nombre tradicional del grupo sin interpretarlo, como hace el POB inglés con Rephaim.
- source_word: כִּי אָץ לְךָ
  english_pob_choice: since ... is too narrow for you
  chosen_spanish: porque ... es demasiado estrecho para ti
  alternatives_spanish:
  - pues ... te aprieta demasiado
  - porque ... es demasiado angosto para ti
  lexicon: HALOT
  rationale: אָץ expresa constricción o estrechez. «Demasiado estrecho» es idiomático en español y conserva la idea de insuficiencia del territorio asignado.
- source_word: הַר אֶפְרָיִם
  english_pob_choice: the hill country of Ephraim
  chosen_spanish: el monte de Efraín
  alternatives_spanish:
  - la serranía de Efraín
  - la región montañosa de Efraín
  - la tierra montañosa de Efraín
  lexicon: HALOT
  rationale: Aunque el POB inglés opta por «hill country», en español «monte de Efraín» es una forma breve, tradicional y comprensible para el lector bíblico. Se mantiene la referencia geográfica al territorio alto de Efraín sin forzar una perífrasis extensa.
theological_decisions:
- issue: Tratamiento del nombre divino inexistente en el versículo
  english_pob_reading: No divine-name rendering issue appears in this verse.
  chosen_spanish_reading: No se introduce ninguna marca especial para el nombre divino.
  alternative_spanish_readings:
  - No aplica
  rationale: El versículo no contiene יהוה ni κύριος, así que no hay decisión teológica de equivalencia divina que explicar aquí.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se cotejó el borrador con el POB inglés y el paquete hebreo. No se detectaron revisiones aplicadas en el historial reciente; se mantuvo la lectura óptima con ajustes de estilo español en el campo geográfico y verbal.
  spanish_consistency_notes:
  - 'Se conservan los etnónimos bíblicos con transliteración consistente: perizitas, refaítas.'
  - «Monte de Efraín» se usa como equivalente español breve de la región montañosa; la nota preserva la alternativa más literal.
  - La forma verbal de beneficio «para ti» sigue el singular del hebreo; el contexto colectivo de la cita queda claro por el sentido global de la frase.
  - Se evitó traducir mecánicamente «forest» como bosque en el cuerpo principal porque en español bíblico territorial «monte» comunica mejor el relieve y la cobertura vegetal sin perder el contenido del hebreo.
