translation:
  language: es
  text: seis de sus nombres sobre una piedra, y los nombres de los seis restantes sobre la segunda piedra, según su orden de nacimiento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “según sus generaciones”; la expresión hebrea puede referirse al linaje genealógico o al orden que resulta de él.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁשָּׁה
  english_pob_choice: six
  chosen_spanish: seis
  alternatives_spanish:
  - seis
  lexicon: HALOT
  rationale: Número cardinal directo; en español se mantiene sin carga interpretativa.
- source_word: מִשְּׁמֹתָם
  english_pob_choice: of their names
  chosen_spanish: de sus nombres
  alternatives_spanish:
  - a partir de sus nombres
  - de entre sus nombres
  lexicon: HALOT
  rationale: El מן partitivo con 'nombres' se expresa de forma natural como 'de sus nombres', conservando la idea de selección parcial del conjunto.
- source_word: עַל הָאֶבֶן הָאֶחָת
  english_pob_choice: on the one stone
  chosen_spanish: sobre la piedra una
  alternatives_spanish:
  - sobre la primera piedra
  - sobre una de las piedras
  lexicon: HALOT
  rationale: Se conserva el contraste hebreo 'la una / la segunda' sin convertir innecesariamente en ordinal explícito. 'Piedra una' suena algo marcado en español, pero refleja mejor el paralelismo del texto fuente.
- source_word: וְאֶת שְׁמוֹת
  english_pob_choice: and the names
  chosen_spanish: y los nombres
  alternatives_spanish:
  - y sus nombres
  lexicon: HALOT
  rationale: El marcador de objeto directo no se traduce; en español basta 'y los nombres' para continuar la distribución de las inscripciones.
- source_word: הַשִּׁשָּׁה הַנּוֹתָרִים
  english_pob_choice: the remaining six
  chosen_spanish: los seis restantes
  alternatives_spanish:
  - los otros seis
  - los seis que faltan
  lexicon: HALOT
  rationale: נּוֹתָרִים expresa lo que queda; 'restantes' preserva el sentido de resto sin introducir una noción distinta.
- source_word: עַל הָאֶבֶן הַשֵּׁנִית
  english_pob_choice: on the second stone
  chosen_spanish: sobre la segunda piedra
  alternatives_spanish:
  - en la segunda piedra
  - encima de la segunda piedra
  lexicon: HALOT
  rationale: '''Sobre'' es la correspondencia más natural para עַל en contexto de inscripción o colocación.'
- source_word: כְּתוֹלְדֹתָם
  english_pob_choice: according to their birth order
  chosen_spanish: según su orden de nacimiento
  alternatives_spanish:
  - según sus generaciones
  - según su genealogía
  - conforme al orden de su nacimiento
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa que opta por el sentido contextual de la lista de los hijos. 'Orden de nacimiento' comunica en español la relación probable de תולדות en este contexto sin perder la tensión léxica con 'generaciones'.
translation_notes:
  revision_awareness: La base inglesa revisó 'according to their generations' por 'according to their birth order' para reflejar mejor כְּתוֹלְדֹתָם en este contexto. La redacción española sigue esa decisión, manteniendo la posibilidad semántica más literal en la nota.
  spanish_consistency_notes:
  - Se usa 'piedra' para אֶבֶן y no 'gema', porque el contexto inmediato habla del soporte inscrito, no de una tradición ornamental interpretativa.
  - Se mantiene 'según' para כְּ, en armonía con una equivalencia formal/funcional moderada.
  - No se reemplaza 'Yahvé' ni 'Mesías' porque el versículo no contiene esos lexemas.
