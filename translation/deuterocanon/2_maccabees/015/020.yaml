  text: Καὶ πάντων ἤδη προσδοκώντων τὴν ἐσομένην κρίσιν, καὶ ἤδη προσμιξάντων τῶν πολεμίων καὶ τῆς στρατιᾶς ἐκταγείσης, καὶ τῶν θηρίων ἐπὶ μέρος εὐκαίρως ἀποκατασταθέντων, τῆς δὲ ἵππου κατὰ κέρας τεταγμένης,
