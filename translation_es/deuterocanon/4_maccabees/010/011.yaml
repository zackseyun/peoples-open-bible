review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en la estructura y en la mayor parte del sentido: «impiedad», «soportarás» y «tormentos sin fin» reflejan bien ἀσέβειαν, καρτερήσεις y ἀκαταλύτους βασάνους. Sin embargo, «sangre culpable» no representa de manera fiel e idiomática μιαιφονίαν en español; suena antinatural y desplaza el sentido hacia una descripción de la sangre misma, en vez de la culpa/contaminación por derramamiento de sangre.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «sangre culpable» resulta poco natural y puede confundir al lector. «Culpa de sangre» es mucho más idiomático y preserva mejor la acusación moral. El resto de la frase lee bien en español bíblico contemporáneo.
  glossary_alignment: 'No hay conflicto con los términos base del proyecto. «Impiedad» y «tormentos» están bien. La principal corrección es lexical: para μιαιφονίαν conviene «culpa de sangre» en el texto principal, manteniendo en nota la alternativa «homicidio contaminante» para preservar la dimensión de contaminación.'
  issues:
