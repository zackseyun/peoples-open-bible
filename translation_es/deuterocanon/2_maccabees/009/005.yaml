    issue: Uso de «el Señor» en el texto principal en lugar de «Yahvé».
    rationale: Aunque el griego tiene κύριος como título, la política del proyecto para el español pide «Yahvé» en el texto principal en vez de la convención enmascaradora «SEÑOR/Señor», salvo razón contextual fuerte. Aquí puede traducirse naturalmente como «Yahvé, el Dios de Israel, que todo lo ve».
  - severity: low
    issue: «apenas había terminado de hablar» suena poco natural en esta construcción.
    rationale: 'Para ἄρτι... καταλήξαντος τὸν λόγον, un pasado simple o una locución temporal más directa fluye mejor en español: «apenas terminó de hablar» o «justo cuando terminó de hablar».'
  - severity: low
    issue: «partes internas» suena rígido y poco idiomático.
    rationale: Aunque transmite τῶν ἔνδον, en español bíblico-natural «su interior» o «sus adentros» comunica mejor el sentido sin perder la corporeidad. Dado el tono, «su interior» es preferible.
  - severity: low
    issue: La nota [a] combina dos asuntos léxicos distintos y crea confusión sobre cuál es el texto adoptado.
    rationale: Conviene que la nota explique la decisión κύριος > «Yahvé»/título divino y, aparte, documente que πληγή también puede significar «azote» o «plaga», sin insinuar que el texto principal lea otra cosa.
