base_translation:
  language: en
  yaml_path: translation/ot/amos/003/014.yaml
  text: For on the day when I punish Israel for his transgressions[a], I will also punish the altars of Bethel[b]; the horns of the altar will be cut off and fall to the ground.
  footnotes:
  - marker: a
    text: Or 'when I visit Israel for his rebellions'; the Hebrew verb can mean 'visit' in the sense of calling to account or punishing.
    reason: lexical_alternative
  - marker: b
    text: The 'horns' were the horn-like projections at the corners of the altar, associated with its sanctity and ritual use.
    reason: cultural_note
