translation:
  language: es
  text: Y en el año ciento sesenta[a], Alejandro, hijo de Antíoco Epífanes, subió y tomó Ptolemaida[b], y lo recibieron, y reinó allí[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'subió'; el griego preserva un giro direccional convencional que también puede funcionar como avance militar.
    reason: lexical_alternative
  - marker: b
    text: O 'capturó Ptolemaida'; el verbo griego puede implicar tomar posesión o conquistar la ciudad.
    reason: lexical_alternative
  - marker: c
    text: O 'fue rey allí'; el verbo griego puede entenderse como ejercicio del reinado o como acceso al trono.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ἔτει ἑξηκοστῷ καὶ ἑκατοστῷ
  english_pob_choice: in the one hundred sixtieth year
  chosen_spanish: en el año ciento sesenta
  alternatives_spanish:
  - en el año ciento sesenta y uno
  - en el año ciento y sesenta
  lexicon: LSJ
  rationale: La fórmula griega es una datación convencional; en español natural se expresa como 'en el año ciento sesenta', preservando el valor cronológico sin forzar el orden literal del griego.
- source_word: ἀνέβη
  english_pob_choice: came up
  chosen_spanish: subió
  alternatives_spanish:
  - subió a
  - avanzó
  lexicon: LSJ
  rationale: ἀναβαίνω mantiene el idiomático de movimiento ascendente o de avance. 'Subió' conserva ese valor direccional en español y sigue siendo natural en narración histórica.
- source_word: ὁ τοῦ Ἀντιόχου ὁ Ἐπιφανής
  english_pob_choice: the son of Antiochus Epiphanes
  chosen_spanish: hijo de Antíoco Epífanes
  alternatives_spanish:
  - de Antíoco Epífanes
  - hijo de Antíoco el Epífanes
  lexicon: LSJ
  rationale: La construcción griega identifica a Alejandro por filiación; el epíteto real se conserva como nombre convencional, no como adjetivo traducido, para respetar el uso histórico fijado.
- source_word: κατελάβετο
  english_pob_choice: took Ptolemais
  chosen_spanish: tomó Ptolemaida
  alternatives_spanish:
  - capturó Ptolemaida
  - se apoderó de Ptolemaida
  lexicon: LSJ
  rationale: El verbo puede llevar el matiz de ocupar o apoderarse, pero el texto inglés revisado prefirió 'took' como más neutro. 'Tomó' reproduce esa neutralidad y encaja bien en español.
- source_word: ἐπεδέξαντο αὐτόν
  english_pob_choice: they received him
  chosen_spanish: lo recibieron
  alternatives_spanish:
  - lo acogieron
  - lo aceptaron
  lexicon: LSJ
  rationale: El verbo griego admite recepción, acogida o aceptación política. 'Lo recibieron' permanece cercano al griego y conserva la ambigüedad deliberada del audit trail.
- source_word: ἐβασίλευσεν ἐκεῖ
  english_pob_choice: he reigned there
  chosen_spanish: reinó allí
  alternatives_spanish:
  - fue rey allí
  - comenzó a reinar allí
  lexicon: LSJ
  rationale: La revisión inglesa optó por 'reigned there' como lectura directa del aoristo. 'Reinó allí' conserva esa lectura sin introducir explícitamente la idea de entronización que el griego no obliga a expresar.
translation_notes:
  revision_awareness: La revisión inglesa finalizó con 'took' para κατελάβετο y 'reigned there' para ἐβασίλευσεν, en lugar de 'seized' y 'became king there'. La redacción española sigue esa última decisión, manteniendo un registro sobrio y no interpretando más de lo que el griego exige.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo requiera; aquí no aparece.
  - '''Mesías/Cristo'' no es pertinente en este versículo.'
  - '''Ptolemaida'' se conserva como transliteración tradicional del topónimo histórico, coherente con el uso de la edición inglesa.'
  - La puntuación sigue norma española, con coma tras el complemento temporal inicial y entre miembros coordinados.
