base_translation:
  language: en
  yaml_path: translation/ot/2_kings/011/018.yaml
  text: Then all the people of the land went into the house of Baal and tore it down[a]. They thoroughly smashed his altars and his images, and they killed Mattan the priest of Baal before the altars[c][b]. Then the priest appointed overseers over the house of Yahweh.
  footnotes:
  - marker: a
    text: Or 'the temple of Baal.' The Hebrew reads 'house of Baal.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his idols' or 'his statues' for 'his images.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: alternative_reading
