- from: Te has vuelto cruel conmigo[a]; con la fuerza de tu mano[b] me opones[c].
  to: Te has vuelto cruel conmigo[a]; con la fuerza de tu mano, estás contra mí[b].
  rationale: Se corrige el único error serio del borrador, «me opones», por «estás contra mí», que expresa de manera natural en español la hostilidad de תִשְׂטְמֵנִי y se alinea con el inglés auditado ‘oppose me’. Se elimina la nota sobre «tu poder» para no debilitar la conservación de «tu mano», imagen que el proyecto decidió preservar. Se mantiene la primera cláusula con un ajuste menor en la nota alternativa para mayor naturalidad.
