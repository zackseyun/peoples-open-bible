translation:
  language: es
  text: Y un espíritu malo de Yahvé vino sobre Saúl, mientras estaba sentado en su casa, con su lanza en la mano, y David tocaba con la mano[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «con la mano». El hebreo no nombra el instrumento en este versículo, aunque el contexto más amplio indica que David estaba tocando música.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - sobrevino
  lexicon: HALOT
  rationale: El hebreo presenta un evento que irrumpe sobre Saúl. En español, «vino sobre» reproduce bien el movimiento/irrupción del original sin volverlo mecánico.
- source_word: רוּחַ יְהוָה רָעָה
  english_pob_choice: an evil spirit from Yahweh
  chosen_spanish: un espíritu malo de Yahvé
  alternatives_spanish:
  - un espíritu maligno de Yahvé
  - un espíritu dañino de Yahvé
  lexicon: HALOT
  rationale: Se conserva «espíritu» y la cualidad רָעָה como «malo», manteniendo la tensión lexical del hebreo. «De Yahvé» traduce el genitivo divino de forma transparente, sin ocultar el nombre propio.
- source_word: אֶל שָׁאוּל
  english_pob_choice: upon Saul
  chosen_spanish: sobre Saúl
  alternatives_spanish:
  - contra Saúl
  - a Saúl
  lexicon: HALOT
  rationale: «Sobre» comunica en español el efecto de caída o aflicción que el inglés POB expresó con «upon», preservando el matiz de invasión/impulso del espíritu.
- source_word: בְּבֵיתוֹ יוֹשֵׁב
  english_pob_choice: while he was sitting in his house
  chosen_spanish: mientras él estaba sentado en su casa
  alternatives_spanish:
  - sentado en su casa
  - mientras estaba sentado en su casa
  lexicon: HALOT
  rationale: 'El participio durativo se vierte con una construcción natural en español que conserva el trasfondo escénico: Saúl se encuentra sentado cuando ocurre el episodio.'
- source_word: וַחֲנִיתוֹ בְּיָדוֹ
  english_pob_choice: with his spear in his hand
  chosen_spanish: con su lanza en la mano
  alternatives_spanish:
  - y su lanza en su mano
  - con la lanza en la mano
  lexicon: HALOT
  rationale: «Lanza» es el equivalente directo de חֲנִית. «En la mano» reproduce la frase idiomática hebrea y evita una formulación artificial.
- source_word: מְנַגֵּן
  english_pob_choice: was playing the lyre
  chosen_spanish: tocaba el instrumento
  alternatives_spanish:
  - tocaba el laúd
  - hacía música
  lexicon: HALOT
  rationale: El hebreo indica que David está tocando, pero el instrumento no se nombra en este versículo. Como el contexto amplio lo identifica, la traducción española puede decir «el instrumento» sin especificarlo indebidamente en el texto principal.
- source_word: בְּיָד
  english_pob_choice: with his hand
  chosen_spanish: con la mano
  alternatives_spanish:
  - a mano
  - con su mano
  lexicon: HALOT
  rationale: Se conserva la literalidad de la expresión hebrea («con mano»), pero en español se ajusta a «con la mano» para que la frase sea natural y fiel.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: La política del proyecto en español usa «Yahvé» para יהוה. Se mantiene el nombre propio del pacto y no se sustituye por un título enmascarador.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre Yahvé y el espíritu malo
  english_pob_reading: an evil spirit from Yahweh
  chosen_spanish_reading: un espíritu malo de Yahvé
  alternative_spanish_readings:
  - un espíritu malo enviado por Yahvé
  - un espíritu dañino de Yahvé
  rationale: La frase hebrea permite entender un espíritu que procede de Yahvé sin atribuir mal moral a Dios mismo. «De Yahvé» conserva esa relación abierta y el adjetivo «malo» mantiene la tensión lexical documentada.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Instrumento implícito en la última cola
  english_pob_reading: David was playing the lyre with his hand
  chosen_spanish_reading: David tocaba el instrumento con la mano
  alternative_spanish_readings:
  - David tocaba con la mano
  - David tocaba el arpa con la mano
  rationale: El hebreo solo dice literalmente «tocando con mano». Como el instrumento no está explícito en este versículo, el español principal evita importarlo, aunque el contexto narrativo lo sugiera.
  doctrine_reference: DOCTRINE.md source transparency and context restraint
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión que aclaró el instrumento implícito en la última cola («the lyre»). Para el español, se optó por mantener la transparencia del hebreo en el texto principal y no especificar el instrumento, porque en este versículo no aparece nombrado; la aclaración queda restringida a la nota. También se conservó la distinción entre la relación con Yahvé y la cualidad del espíritu sin suavizar la tensión lexical.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה de manera consistente con el estándar del proyecto.
  - «Espíritu» se mantiene como sustantivo común porque el contexto no exige mayúscula ni la identificación explícita con el Espíritu Santo.
  - «Lanza» traduce חֲנִית de forma directa y coherente con el campo semántico militar del pasaje.
  - La frase final mantiene la literalidad de בְּיָד sin forzar un instrumento no expresado en el hebreo del versículo.
