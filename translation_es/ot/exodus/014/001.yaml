lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - le habló
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo, por lo que conviene un pasado simple en español. 'Habló' conserva el tono formal de la introducción divina mejor que 'dijo', sin perder naturalidad en español.
- source_word: יְהֹוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton. En el español POB se adopta 'Yahvé' como forma visible del nombre divino, siguiendo la decisión doctrinal de no ocultarlo bajo un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para con
  - hacia
  lexicon: HALOT
  rationale: La preposición introduce el complemento indirecto del habla. En español, 'a' es la equivalencia natural y suficiente aquí.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico, con la forma ampliamente reconocible y fiel al referente hebreo.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La fórmula infinitiva introduce el contenido del discurso. 'Diciendo' preserva la estructura formal del hebreo sin expandir innecesariamente el texto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura fuente es el nombre propio del pacto, no un título genérico. El español POB mantiene esa visibilidad con 'Yahvé', coherente con la política doctrinal indicada para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El audit trail en inglés está en alto acuerdo y sin revisiones aplicadas. Se conserva la estructura narrativa breve del hebreo, incluyendo el marcador introductorio 'Entonces' y la fórmula 'diciendo'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma principal para יְהוָה, en coherencia con el criterio del proyecto.
  - 'Se mantiene el orden natural del español: sujeto verbal + complemento indirecto + participio de habla.'
  - No se añade contenido interpretativo; la cláusula final queda abierta como en el hebreo.
