  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, sin añadir artículos ni explicaciones que el hebreo no contiene.
  - La nota al pie conserva la repetición enfática de la conjunción en hebreo, mientras que el cuerpo principal usa el español natural con una sola 'y'.
  - Se priorizó la legibilidad española en nombres propios, sin perder la conexión auditable con la forma hebrea y la solución inglesa de la POB.
