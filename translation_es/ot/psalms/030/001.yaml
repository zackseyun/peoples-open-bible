translation:
  language: es
  text: Un salmo[a]. Un cántico para la dedicación de la casa[b]. De David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo» o «el palacio»; el hebreo dice simplemente «la casa».
    reason: alternative_reading
  - marker: b
    text: 'O: «Un salmo, un cántico para la dedicación de la casa, de David».'
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Un himno
  - Un canto salmódico
  lexicon: HALOT
  rationale: מִזְמוֹר nombra un tipo de composición poética-musical; en español, «salmo» es el equivalente natural y tradicional, y conserva el género literario sin agregar matices no presentes.
- source_word: שִׁיר
  english_pob_choice: a song
  chosen_spanish: Un cántico
  alternatives_spanish:
  - Una canción
  - Un canto
  lexicon: HALOT
  rationale: El hebreo añade un segundo rótulo genérico distinto de מִזְמוֹר. «Cántico» mantiene la idea de pieza para ser cantada y distingue el segundo término sin repetir simplemente «salmo».
- source_word: חֲנֻכַּת
  english_pob_choice: for the dedication
  chosen_spanish: para la dedicación
  alternatives_spanish:
  - en la dedicación
  - de la dedicación
  lexicon: HALOT
  rationale: La construcción nominal en el encabezado funciona mejor en español como una relación de propósito u ocasión. «Para la dedicación» comunica bien ese uso sin cerrar la interpretación.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - el palacio
  lexicon: HALOT
  rationale: El sustantivo básico es «casa». Como el hebreo no especifica si se trata del templo, del palacio o de otra referencia, se conserva la ambigüedad con el término más general.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Pertenece a David
  - Por David
  lexicon: HALOT
  rationale: En los encabezados de salmos, לְדָוִד puede indicar asociación, atribución o dedicación. «De David» preserva esa amplitud mejor que una opción más precisa.
theological_decisions:
- issue: Alcance de «la casa» en el encabezado
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  - el palacio de David
  rationale: El texto hebreo no identifica de manera explícita el referente. Mantener «la casa» evita resolver la cuestión interpretativa y conserva la tensión documental presente en el original y en la auditoría inglesa.
  doctrine_reference: 'Translation philosophy: preservar la tensión interpretativa en lugar de resolverla.'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente separó los rótulos del encabezado en frases cortas para reflejar mejor la lista hebrea: género, ocasión y atribución. La versión española sigue ese mismo criterio de claridad y segmentación, sin introducir cambios de sentido.'
  spanish_consistency_notes:
  - 'Se conserva la tripleta breve del encabezado: género («salmo»), ocasión («cántico para la dedicación de la casa») y atribución («De David»).'
  - Se mantiene «la casa» para reflejar la ambigüedad del hebreo, en lugar de especificar «templo» o «palacio».
  - Se evita «Señor» u otras sustituciones no presentes, ya que aquí no aparecen los términos divinos del encabezado.
