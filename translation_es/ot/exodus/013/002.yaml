translation:
  language: es
  text: Consagra para mí[a] todo primogénito, el primero que abre todo vientre entre los hijos de Israel, tanto del hombre como de la bestia; mío es.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de la humanidad y de los animales». El hebreo usa «hombre» de manera representativa aquí, en contraste con los animales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַדֶּשׁ
  english_pob_choice: Consecrate
  chosen_spanish: Santifica
  alternatives_spanish:
  - Consagra
  - Santifica como santo
  lexicon: HALOT
  rationale: El imperativo de קדשׁ pide apartar algo para Dios en condición de santidad. En español, 'santifica' conserva la fuerza cultual y resulta natural en un registro bíblico serio; 'consagra' también es posible, pero 'santifica' refleja mejor el verbo básico del campo semántico.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - para mí mismo
  lexicon: HALOT
  rationale: La preposición ל expresa dedicación y pertenencia dirigida a Dios. En español, 'para mí' comunica con claridad la consagración y la destinación del primogénito a Yahvé.
- source_word: כָל בְּכוֹר
  english_pob_choice: every firstborn
  chosen_spanish: todo primogénito
  alternatives_spanish:
  - cada primogénito
  - todo hijo primogénito
  lexicon: HALOT
  rationale: בְּכוֹר significa 'primogénito'. El hebreo no añade explícitamente 'varón', por lo que no debe importarse en el texto principal. 'Todo primogénito' mantiene la amplitud del hebreo y suena natural en español bíblico.
- source_word: פֶּטֶר כָּל רֶחֶם
  english_pob_choice: the first to open every womb
  chosen_spanish: el primero que abra todo vientre
  alternatives_spanish:
  - el que abre primero cada vientre
  - el primer fruto de todo vientre
  lexicon: HALOT
  rationale: La expresión explica al primogénito como el que primero abre el vientre. 'Vientre' reproduce con propiedad el hebreo רֶחֶם en este contexto de nacimiento; 'abre' conserva la imagen física del texto.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - entre los israelitas
  - entre los hijos de Israel
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'entre/en los hijos de Israel'. Se conserva esa forma para respetar la estructura del original y la terminología POB, sin necesidad de neutralizarla a 'israelitas'.
- source_word: בָּאָדָם
  english_pob_choice: among man
  chosen_spanish: entre hombre
  alternatives_spanish:
  - entre la humanidad
  - entre personas
  lexicon: HALOT
  rationale: אָדָם aquí contrasta la esfera humana con la animal. Se mantiene 'hombre' en sentido representativo, siguiendo el valor del hebreo y la decisión POB de no borrar esa tensión con una generalización total en el texto principal.
- source_word: וּבַבְּהֵמָה
  english_pob_choice: and among beast
  chosen_spanish: como entre animal
  alternatives_spanish:
  - y entre bestia
  - como entre ganado
  lexicon: HALOT
  rationale: בְּהֵמָה puede abarcar animales domésticos o animales en general; 'animal' es claro para lectores modernos y conserva el contraste humano/animal. La construcción 'como entre' refleja el paralelismo de la frase sin endurecerla innecesariamente.
- source_word: לִי הוּא
  english_pob_choice: it is mine
  chosen_spanish: mío es
  alternatives_spanish:
  - es mío
  - me pertenece
  lexicon: HALOT
  rationale: La cláusula final declara posesión divina. 'Mío es' es breve, solemne y fiel al énfasis del hebreo; conserva el tono absoluto de propiedad de Yahvé.
theological_decisions:
- issue: Valor representativo de אָדָם frente a בְּהֵמָה
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - humanidad
  - personas
  rationale: El hebreo usa un singular colectivo en contraste con los animales. Se conserva 'hombre' como término representativo y no se reemplaza por una neutralización total en el texto principal, para no perder la tensión lexical que el audit trail documenta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
- issue: Propiedad divina expresada en לִי הוּא
  english_pob_reading: it is mine
  chosen_spanish_reading: mío es
  alternative_spanish_readings:
  - me pertenece
  - es mío
  rationale: La frase final no describe mera utilidad sino pertenencia exclusiva a Dios. 'Mío es' comunica esa posesión enfática con una cadencia más cercana al hebreo, manteniendo la fuerza teológica del cierre.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2; divine ownership language
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó la sintaxis de 'among man and among beast' a una forma más natural ('both of man and of beast'); en español se reflejó ese paralelismo con 'tanto entre hombre como entre animal', evitando una traducción demasiado literal de la construcción inglesa revisada.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como nombre divino según la terminología del proyecto, aunque no aparezca explícitamente en este versículo.
  - '''Primogénito'' se mantuvo en singular colectivo, sin añadir ''varón''.'
  - '''Vientre'' conserva el sustrato semántico de רֶחֶם y evita suavizar la imagen corporal del hebreo.'
  - La nota al pie se ancla en 'hombre' para preservar la alternativa inclusiva documentada por el audit trail.
