- from: haciendo de su tierra una desolación[a], un objeto de silbidos[b] perpetuos; todo el que pase por ella quedará asombrado y moverá la cabeza.
  to: haciendo de su tierra una desolación, un objeto de silbidos perpetuos[a]; todo el que pase por ella quedará consternado y sacudirá la cabeza[b].
  rationale: Se fortaleció «quedará consternado» para reflejar mejor la reacción de espanto del hebreo יִשֹּׁם, y se cambió «moverá la cabeza» por «sacudirá la cabeza» para expresar con claridad el gesto idiomático hebreo. También se corrigió la nota léxica para que las alternativas afecten al sintagma de «silbidos» y no a «desolación», conforme a la evidencia fuente y al audit trail inglés.
