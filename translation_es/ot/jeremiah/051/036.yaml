revisions:
- from: 'Por tanto, así dice Yahvé: He aquí, yo defenderé tu causa y tomaré venganza por ti; secaré su mar y secaré su fuente.'
  to: 'Por tanto, así dice Yahvé: He aquí, defenderé tu causa[a] y tomaré venganza por ti; secaré su mar[b] y secaré su fuente[c].'
  rationale: Se conserva el sentido principal del borrador, pero se añaden notas necesarias para reflejar la auditoría inglesa y la personificación femenina del hebreo, y se hace un ajuste menor de fluidez eliminando el «yo» enfático no necesario.
  reviewer_model: gpt-5.4
