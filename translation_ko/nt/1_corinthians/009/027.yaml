lexical_decisions:
- source_word: ὑπωπιάζω
  english_pob_choice: discipline
  chosen_korean: 치다
  alternatives_korean:
  - 단련하다
  lexicon: BDAG
  rationale: 본래 「눈 밑을 때리다」는 권투 비유. 본문의 강한 자기 훈련을 「치다」로 옮기되, 비유적 의미는 문맥이 보장한다.
- source_word: δουλαγωγῶ
  english_pob_choice: make it my slave
  chosen_korean: 노예로 부리다
  alternatives_korean:
  - 종으로 부리다
  lexicon: BDAG
  rationale: 9:19의 ἐδούλωσα와 짝을 이루는 노예 어휘. 자유의 권리를 가진 자가 스스로 몸을 매어 부린다는 강한 자기 통제를 보존하기 위해 「노예로 부리다」로 옮긴다.
- source_word: ἀδόκιμος
  english_pob_choice: disqualified
  chosen_korean: 자격을 잃다
  lexicon: BDAG
  rationale: 운동 경기 비유와 어울리는 「자격을 잃다」가 자연스럽다.
