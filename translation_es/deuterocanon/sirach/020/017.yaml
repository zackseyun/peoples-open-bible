translation:
  language: es
  text: Los que comen mi pan son malos de lengua; ¿cuántas veces, y cuántos[b], se reirán[a] de él?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se burlarán de él'. El verbo griego puede llevar un matiz más fuerte de ridiculización, no solo de risa.
    reason: lexical_alternative
  - marker: b
    text: El griego de la segunda cláusula es abrupto y puede reflejar un texto comprimido o difícil; la traducción se mantiene cerca del texto recibido en lugar de suavizarlo demasiado.
    reason: textual_variant
lexical_decisions:
- source_word: οἱ ἐσθίοντες
  english_pob_choice: those who eat
  chosen_spanish: los que comen
  alternatives_spanish:
  - los que están comiendo
  - quienes comen
  lexicon: LSJ
  rationale: El participio sustantivado se vierte de manera natural con una relativa en español. 'Los que comen' conserva el sentido general y habitual, sin sobrecargar la frase.
- source_word: τὸν ἄρτον μου
  english_pob_choice: my bread
  chosen_spanish: mi pan
  alternatives_spanish:
  - mi alimento
  - el pan mío
  lexicon: LSJ
  rationale: Se mantiene la imagen concreta de 'pan' para respetar el valor literal y simbólico del griego, asociado al sustento o la mesa compartida.
- source_word: φαῦλοι
  english_pob_choice: evil
  chosen_spanish: malos
  alternatives_spanish:
  - malvados
  - viles
  - perversos
  lexicon: LSJ
  rationale: En español, 'malos de lengua' reproduce de forma idiomática la cualidad moral negativa ligada al habla. 'Malos' evita una intensificación innecesaria y conserva la ambigüedad entre corrupción moral y habla dañina.
- source_word: γλώσσῃ
  english_pob_choice: with the tongue
  chosen_spanish: de lengua
  alternatives_spanish:
  - con la lengua
  - en la lengua
  - en su hablar
  lexicon: LSJ
  rationale: '''De lengua'' es una construcción española estable que comunica cualidad o defecto verbal sin perder la concreción de la metáfora del órgano del habla. ''Con la lengua'' sonaría más instrumental y menos natural aquí.'
- source_word: ποσάκις
  english_pob_choice: how often
  chosen_spanish: ¿cuántas veces?
  alternatives_spanish:
  - ¿con qué frecuencia?
  - ¿cuán a menudo?
  lexicon: LSJ
  rationale: La interrogación española más directa y transparente es '¿cuántas veces?'; conserva el tono abrupto y interrogativo del griego.
- source_word: καὶ ὅσοι
  english_pob_choice: and how many
  chosen_spanish: y cuántos
  alternatives_spanish:
  - y cuántos más
  - y cuántas personas
  lexicon: LSJ
  rationale: Se preserva la brusquedad sintáctica del segundo miembro con una coordinación breve. 'Y cuántos' mantiene la sensación de acumulación retórica sin suavizarla demasiado.
- source_word: καταγελάσονται
  english_pob_choice: will laugh at
  chosen_spanish: se reirán de
  alternatives_spanish:
  - se burlarán de
  - se mofarán de
  - se reirán de él
  lexicon: LSJ
  rationale: '''Se reirán de'' sigue de cerca el valor básico del verbo y deja abierta la fuerza de burla que el contexto puede implicar. En español, la burla fuerte podría expresarse con ''se burlarán de'', pero aquí se conserva la opción más cercana al texto base.'
- source_word: αὐτοῦ
  english_pob_choice: him
  chosen_spanish: de él
  alternatives_spanish:
  - de eso
  - de tal persona
  - de él mismo
  lexicon: LSJ
  rationale: Dado que el referente en este miembro es comprimido en el griego y el contexto no lo desarrolla aquí, 'de él' mantiene la referencia personal sin añadir explicitaciones no garantizadas.
theological_decisions:
- issue: Tensión entre 'evil of tongue' y una formulación española más idiomática
  english_pob_reading: evil of tongue
  chosen_spanish_reading: malos de lengua
  alternative_spanish_readings:
  - malos con la lengua
  - malos en el hablar
  - malos de palabra
  rationale: La expresión mantiene la metáfora concreta de la lengua y evita convertirla en una abstracción. No se reemplaza por un equivalente eclesiástico más conocido, porque el texto griego es duro y proverbial.
  doctrine_reference: Preservación de la imaginería proverbial y del habla concreta del texto fuente.
- issue: Clausula segunda abrupta y posiblemente difícil en el texto griego
  english_pob_reading: how often, and how many, will laugh at him?
  chosen_spanish_reading: ¿cuántas veces, y cuántos, se reirán de él?
  alternative_spanish_readings:
  - ¿cuántas veces, y cuántos, se burlarán de él?
  - ¿cuántas veces, y cuántos, lo ridiculizarán?
  rationale: Se conserva la irregularidad y compresión del miembro final en lugar de armonizarlo demasiado. 'Se reirán de él' refleja el valor más literal del verbo, dejando al contexto el matiz de burla o ridiculización que el inglés POB también anotó.
  doctrine_reference: Primacía del texto fuente y retención honesta de una posible dificultad textual o sintáctica.
translation_notes:
  revision_awareness: Se ha seguido el audit trail inglés, pero se ha ajustado la sintaxis para un español natural y bíblicamente digno. Se conservan la metáfora concreta de 'pan' y 'lengua', el tono proverbial duro, y la irregularidad del segundo miembro sin sobreexplicarlo. La alternativa fuerte de 'burlarse' se deja documentada en nota, como en el original inglés.
  spanish_consistency_notes:
  - Se mantiene 'pan' y no 'alimento' para respetar el paralelo literal con el griego.
  - '''Malos de lengua'' busca reproducir la cualidad moral del adjetivo sin introducir un tecnicismo ajeno al español bíblico.'
  - La segunda cláusula conserva una formulación breve y algo abrupta para no borrar la dificultad del texto fuente.
  - Se usa 'se reirán de' como equivalente base y se documenta la alternativa de burla más fuerte en nota.
  - No se introduce 'Cristo', 'SEÑOR' ni otra terminología de masking, porque no aparece en este versículo.
