  revision_awareness: El texto inglés auditado permanece sin cambios sustanciales en su evaluación (high_agreement, verdict agree). La presente propuesta conserva el paralelismo poético y la fuerza moral del hebreo, ajustando solo la naturalidad del español.
  spanish_consistency_notes:
  - Se mantiene 'pan' y 'vino' como imágenes concretas del hebreo, sin sustituirlas por términos más genéricos.
  - Se conserva el singular idiomático 'violencia' para representar el plural hebreo חֲמָסִים, conforme al uso español y a la nota auditada en inglés.
  - El tiempo verbal presente ('comen', 'beben') expresa mejor el carácter proverbial del verso en español.
  - Se emplea 'Porque' para abrir la razón, en paralelo con el valor explicativo de כִּי.
