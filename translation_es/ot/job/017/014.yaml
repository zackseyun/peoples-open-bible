translation:
  language: es
  text: 'A la fosa[a] le digo: «Tú eres mi padre», y al gusano[b]: «Mi madre y mi hermana».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la corrupción» o «a la tumba» para «a la fosa». El hebreo puede referirse a una fosa, sepultura o destrucción/descomposición.
    reason: lexical_alternative
  - marker: b
    text: O «a la larva» o «a los gusanos» para «al gusano». El término hebreo designa al agente semejante a un gusano asociado con la descomposición del cuerpo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַשַּׁחַת
  english_pob_choice: to the pit
  chosen_spanish: al hoyo
  alternatives_spanish:
  - a la fosa
  - a la sepultura
  - a la tumba
  - a la corrupción
  lexicon: HALOT
  rationale: El hebreo puede referirse a una cavidad, sepulcro o a la destrucción asociada con la muerte. En español, «hoyo» conserva la imagen concreta y funciona bien en el paralelismo poético; la nota preserva alternativas semánticas importantes.
- source_word: קָרָאתִי
  english_pob_choice: I say to
  chosen_spanish: le digo
  alternatives_spanish:
  - digo
  - llamo
  - he dicho
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, en el discurso poético directo expresa una acción vivida y presente. «Le digo» reproduce la fuerza del habla inmediata mejor que una traducción rígidamente aspectual.
- source_word: אָבִי
  english_pob_choice: my father
  chosen_spanish: mi padre
  alternatives_spanish:
  - mi papá
  lexicon: HALOT
  rationale: Término de parentesco literal y central en la personificación de la muerte y la descomposición.
- source_word: אָתָּה
  english_pob_choice: you are
  chosen_spanish: tú eres
  alternatives_spanish:
  - eres
  lexicon: HALOT
  rationale: El pronombre independiente funciona predicativamente; en español la cópula es necesaria para la naturalidad y la claridad del diálogo poético.
- source_word: אִמִּי
  english_pob_choice: my mother
  chosen_spanish: mi madre
  alternatives_spanish:
  - mi mamá
  lexicon: HALOT
  rationale: Renderización literal del término de parentesco, manteniendo el paralelismo con «mi padre» y «mi hermana».
- source_word: וַאֲחֹתִי
  english_pob_choice: and my sister
  chosen_spanish: y mi hermana
  alternatives_spanish:
  - y mi hermana también
  lexicon: HALOT
  rationale: Traducción directa del sintagma conjuntivo, conservando la secuencia de parentescos que intensifica la imagen.
- source_word: לָרִמָּה
  english_pob_choice: to the worm
  chosen_spanish: al gusano
  alternatives_spanish:
  - a la lombriz
  - a la larva
  - a los gusanos
  lexicon: HALOT
  rationale: «Gusano» es el equivalente natural en español para el agente de descomposición corporal. Aunque «maggot»/«maggot(s)» sería más técnico, en español «gusano» mantiene la imagen poética y la personificación del destinatario.
translation_notes:
  revision_awareness: La revisión inglesa cambió «I call to» por «I say to» para reflejar mejor la construcción de discurso directo; la versión española sigue esa decisión con «le digo», manteniendo la personificación y el paralelismo del verso sin introducir explicaciones adicionales.
  spanish_consistency_notes:
  - Se mantiene el tono poético y directo del hebreo, con dos enunciados en estilo de cita.
  - «Hoyo» y «gusano» conservan la imaginería corporal y funeraria sin domesticarla excesivamente.
  - Las alternativas en nota preservan la tensión lexical del hebreo entre cavidad, sepultura y corrupción/descomposición.
