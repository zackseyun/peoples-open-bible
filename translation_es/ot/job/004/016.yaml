translation:
  language: es
  text: 'Se quedó quieto[a], pero no pude reconocer su apariencia; una forma estaba delante de mis ojos; había silencio[b], y oí una voz:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la apariencia de él'; el sufijo hebreo es masculino singular, pero el referente sigue siendo una aparición no identificada, por lo que el texto principal conserva la ambigüedad con 'su apariencia'.
