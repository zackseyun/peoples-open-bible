revisions:
- from: Entonces descendieron los amalecitas y los cananeos que habitaban en aquel monte, y los atacaron y los derribaron hasta Horma[a].
  to: Entonces descendieron los amalecitas y los cananeos que habitaban en aquella región montañosa, y los derrotaron y los abatieron hasta Horma[a].
  rationale: Se revisa «aquel monte» a «aquella región montañosa» para reflejar mejor el valor geográfico de הָר en contexto militar y seguir la justificación documentada del POB inglés. Se cambia «los atacaron» por «los derrotaron» para conservar mejor la fuerza de נכה, y «los derribaron» por «los abatieron» para mantener una secuencia militar natural y más fiel al matiz intensificador del segundo verbo. La nota sobre Horma se conserva sin cambios sustanciales.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:50:48Z'
