translation:
  language: es
  text: 'Abimélec, hijo de Jerobaal, fue a Siquem, a los hermanos de su madre, y les habló a ellos y a todo el clan de la casa del padre de su madre[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En hebreo, 'la casa del padre de su madre' se refiere al hogar o linaje de su familia materna.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: Now ... went
  chosen_spanish: fue
  alternatives_spanish:
  - entonces fue
  - y fue
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; en español, el pretérito simple 'fue' comunica ese movimiento sin añadir una partícula innecesaria como 'ahora' o 'entonces' si la sintaxis ya es clara.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimélec
  alternatives_spanish:
  - Abimelec
  lexicon: transliteración convencional
  rationale: Se conserva el nombre propio con forma española estándar y acento gráfico para la pronunciación, sin traducirlo.
- source_word: בֶּן יְרֻבַּעַל
  english_pob_choice: son of Jerubbaal
  chosen_spanish: hijo de Jerobaal
  alternatives_spanish:
  - hijo de Jerubaal
  lexicon: HALOT
  rationale: '''בן'' se rinde naturalmente por ''hijo de''. Se mantiene el nombre propio en forma española usual ''Jerobaal'', equivalente transliterado de יְרֻבַּעַל.'
- source_word: שְׁכֶמָה
  english_pob_choice: to Shechem
  chosen_spanish: a Siquem
  alternatives_spanish:
  - hacia Siquem
  lexicon: HALOT
  rationale: El sufijo direccional se expresa de manera natural con 'a'. 'Siquem' es la forma española usual del topónimo bíblico.
- source_word: אֶל אֲחֵי אִמּוֹ
  english_pob_choice: to his mother's brothers
  chosen_spanish: a los hermanos de su madre
  alternatives_spanish:
  - a sus tíos maternos
  - a los hermanos maternos
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'hermanos de su madre'. En español, esta forma conserva la relación de parentesco sin forzar una glosa interpretativa; 'tíos maternos' sería una explicación contextual, no la forma de base.
- source_word: וַיְדַבֵּר אֲלֵיהֶם
  english_pob_choice: and spoke to them
  chosen_spanish: y habló a ellos
  alternatives_spanish:
  - y les habló
  - y les dijo
  lexicon: HALOT
  rationale: '''דבר'' se traduce con ''hablar''. Se evita ''les dijo'' porque el verbo de habla ya aparece en hebreo y el español puede conservar la estructura sin perder naturalidad.'
- source_word: וְאֶל כָּל מִשְׁפַּחַת
  english_pob_choice: and to the whole clan
  chosen_spanish: y a toda la familia
  alternatives_spanish:
  - y a todo el clan
  - y a toda la parentela
  lexicon: HALOT
  rationale: '''מִשְׁפָּחָה'' designa un grupo de parentesco amplio. En español, ''familia'' es comprensible y neutral; ''clan'' puede sonar etnográfico o rígido en este contexto. Se retiene ''toda'' para reflejar כָּל.'
- source_word: בֵּית אֲבִי אִמּוֹ
  english_pob_choice: of his mother's father's house
  chosen_spanish: de la casa del padre de su madre
  alternatives_spanish:
  - de la casa de su abuelo materno
  - de la casa de su madre
  lexicon: HALOT
  rationale: Se conserva la estructura hebrea 'casa del padre de su madre' para no borrar la referencia genealógica. 'Casa' mantiene el sentido de hogar/linaje; 'abuelo materno' sería una clarificación interpretativa.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'para decir:'
  lexicon: HALOT
  rationale: Es la fórmula de introducción del discurso siguiente. 'Diciendo:' es la correspondencia directa y permite enlazar con la cita que continúa.
theological_decisions:
- issue: Referencia al 'house' de la línea materna como unidad familiar/linaje
  english_pob_reading: Hebrew 'the house of his mother's father' refers to his maternal family household or lineage.
  chosen_spanish_reading: '''la casa del padre de su madre'' se entiende como un hogar/linaje materno, no como una casa física solamente.'
  alternative_spanish_readings:
  - '''la casa de su abuelo materno'' como explicación explícita'
  - '''la parentela materna'' como paráfrasis'
  rationale: La frase hebrea conserva una categoría social de casa/linaje. En español, mantener la estructura ayuda a no perder la resonancia genealógica del texto, mientras que la nota explica que no se trata solo de un edificio sino de una unidad familiar.
  doctrine_reference: Ninguna; decisión de parentesco y estructura social del texto.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/vocalizado dado y el audit trail inglés sin cambios de revisión aplicados; la versión inglesa final también se mantuvo sin modificaciones, con alto acuerdo en la revisión cruzada.
  spanish_consistency_notes:
  - Se mantuvo el nombre divino fuera de este versículo porque no aparece en el texto fuente.
  - Se prefirió 'Siquem' por consistencia con la toponimia bíblica española estándar.
  - Se conservó la estructura de parentesco del hebreo para permitir trazabilidad auditables entre fuente y español.
