  - severity: medium
    issue: «Levantará sus cimientos» no es la mejor representación de יְיַסְּדֶנָּה
    rationale: יסד se refiere a fundar/poner cimientos. En español constructivo, «poner sus cimientos» o «echar sus cimientos» es más natural y más exacto que «levantar sus cimientos».
  - severity: low
