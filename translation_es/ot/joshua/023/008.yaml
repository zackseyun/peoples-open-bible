translation:
  language: es
  text: Pero ustedes deben aferrarse a Yahvé su Dios[a], tal como lo han hecho hasta este día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo דבק: «aferrarse a» o «adherirse a»; el verbo expresa apego firme, leal y de pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - sino
  - más bien
  - excepto que
  lexicon: HALOT
  rationale: La combinación introduce un contraste exhortativo con la advertencia previa. En español, "Pero" comunica de manera natural ese giro adversativo sin convertir la frase en una condición.
- source_word: בַּיהוָה
  english_pob_choice: to Yahweh / to the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - con Yahvé
  - en Yahvé
  lexicon: HALOT
  rationale: Con דבק, la preposición ב indica la persona a la cual uno se adhiere o se aferra. En español, "adherirse a" o "aferrarse a" requiere la preposición "a".
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en forma transliterada según la terminología base del proyecto, en vez de sustituirlo por un título. "Yahvé" es la forma establecida para el Tetragrámaton.
- source_word: תִּדְבָּקוּ
  english_pob_choice: you shall cling
  chosen_spanish: deben adherirse
  alternatives_spanish:
  - deben aferrarse
  - deben mantenerse unidos
  lexicon: HALOT
  rationale: דבק expresa apego firme y relacional. "Adherirse" comunica ese vínculo de lealtad y cercanía de forma natural en español, sin perder la fuerza covenantal.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - vuestro Dios
  lexicon: HALOT
  rationale: 'El sufijo posesivo plural se expresa con "su" en tratamiento de ustedes. Se mantiene el sentido relacional del pacto: el Dios que les pertenece como pueblo.'
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - así como
  lexicon: HALOT
  rationale: La comparación pide una correspondencia directa con lo ya hecho. "Tal como" reproduce bien ese valor comparativo sin sonar pesado.
- source_word: עֲשִׂיתֶם
  english_pob_choice: you have done
  chosen_spanish: lo han hecho
  alternatives_spanish:
  - han actuado así
  - han procedido
  lexicon: HALOT
  rationale: El perfecto hebreo apunta a una acción extendida hasta el presente. En español, "lo han hecho" mantiene esa continuidad con el contexto inmediato.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  lexicon: HALOT
  rationale: La expresión temporal se conserva de manera directa y solemne. "Hasta este día" refleja la fórmula hebrea sin perder naturalidad en español.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa יְהוָה directamente. Siguiendo la guía del proyecto, se preserva el nombre propio divino en transliteración, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido relacional de דבק en contexto de pacto
  english_pob_reading: cling / hold fast
  chosen_spanish_reading: adherirse
  alternative_spanish_readings:
  - aferrarse
  - permanecer unidos
  rationale: El contexto de Josué 23 subraya fidelidad al pacto y lealtad exclusiva a Yahvé. "Adherirse" conserva la idea de unión firme y compromiso continuo sin volverla meramente emocional.
  doctrine_reference: Lexical note for דבק in covenantal contexts
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin copiar su redacción de modo mecánico. El principal ajuste fue adaptar 'cling to' a una construcción española natural ('adherirse a') y conservar el nombre divino como Yahvé, de acuerdo con la política del proyecto y el hebreo directo.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento de ustedes mediante 'ustedes' implícito en el verbo y 'su Dios'.
  - Se preservó el tono exhortativo y la comparación temporal final sin añadir explicaciones ajenas al texto.
  - No se tradujo יהוה como 'SEÑOR' para evitar la sustitución del nombre propio divino.
