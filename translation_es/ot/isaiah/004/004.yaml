revisions:
- from: cuando Yahvé haya lavado la inmundicia de las hijas de Sion y haya enjuagado la sangre derramada[a] de Jerusalén de en medio de ella, con espíritu de juicio y con espíritu de ardor[b].
  to: cuando el Señor haya lavado la inmundicia de las hijas de Sion y haya enjuagado las manchas de sangre[a] de Jerusalén de en medio de ella, con espíritu de juicio y con espíritu de quema[b].
  rationale: Se corrige «Yahvé» a «el Señor» porque el hebreo tiene Adonai, no YHWH. Se cambia «sangre derramada» por «manchas de sangre» para seguir mejor la revisión auditada y la imagen de contaminación removida. Se sustituye «ardor» por «quema» para representar más directamente el sentido de burning/consuming de בָּעֵר, aunque se conserva en nota la ambigüedad de «espíritu».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:23:23Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: «cuando» por אִם en valor temporal, el doble lavado/eliminación, «las hijas de Sion», «de en medio de ella» y la ambigüedad de רוּחַ conservada en nota. Sin embargo, hay dos desajustes importantes: (1) אֲדֹנָי es «Señor», no el nombre divino Yahvé; aquí no debe aplicarse la convención de YHWH. (2) «ardor» debilita el sentido de בָּעֵר, que en este contexto apunta a «quemar/ardor consumidor», mejor «quema» o «abrasamiento». Además, «sangre derramada» es aceptable pero menos cercano al ajuste auditado «bloodstains»; en español «manchas de sangre» comunica mejor la imagen de contaminación que luego es enjuagada.'
  spanish_quality_summary: El español es legible y digno, pero requiere pequeños ajustes para mayor fidelidad y naturalidad. «Yahvé» debe corregirse a «el Señor» por corresponder a Adonai, y «espíritu de ardor» suena algo abstracto; «espíritu de quema» sería demasiado tosco, por lo que «espíritu abrasador» o «espíritu de quema» debe ponderarse. Para mantener cercanía con el hebreo nominal y con el inglés POB, «espíritu de quema» resulta más literal pero menos idiomático; «espíritu abrasador» lee mejor, aunque introduce adjetivación no explícita. También conviene preferir «las manchas de sangre de Jerusalén» frente a «la sangre derramada de Jerusalén» para reflejar mejor la imagen de suciedad quitada.
  glossary_alignment: 'Alinea bien en «Sion», «espíritu», «juicio» e imaginería de purificación. No alinea con la política del proyecto aplicada correctamente a este caso: la preferencia por «Yahvé» rige para יהוה/YHWH, pero aquí el hebreo tiene אֲדֹנָי, por lo que debe traducirse «el Señor».'
  issues:
  - severity: high
    issue: Se tradujo אֲדֹנָי como «Yahvé».
    rationale: El texto fuente no tiene יהוה sino אֲדֹנָי. La pauta editorial sobre «Yahvé» aplica al Tetragrámaton, no a Adonai. Cambiarlo altera una distinción léxica significativa del hebreo.
  - severity: medium
    issue: «Ardor» no reproduce con suficiente precisión בָּעֵר.
    rationale: El participio remite a quemar/consumir; «ardor» puede sugerir calor o fervor más que combustión purgadora. Conviene una formulación más ligada a la quema purificadora.
  - severity: medium
    issue: «Sangre derramada» se aleja de la imagen preferida «bloodstains».
    rationale: Aunque el hebreo puede referirse a derramamiento de sangre o culpa de sangre, el audit trail revisado prefirió la imagen de manchas contaminantes. En español «manchas de sangre» conserva mejor la metáfora de suciedad que se enjuaga.
  revised_spanish_text: cuando el Señor haya lavado la inmundicia de las hijas de Sion y haya enjuagado las manchas de sangre[a] de Jerusalén de en medio de ella, con espíritu de juicio y con espíritu de quema[b].
  revised_footnotes:
  - marker: a
    text: «Manchas de sangre» también puede entenderse como «derramamiento de sangre» o «culpa de sangre».
    reason: lexical_alternative
  - marker: b
    text: «Espíritu» puede entenderse también como «viento» o «aliento»; otra lectura posible es «el Espíritu de juicio y el Espíritu de quema».
    reason: alternative_reading
  revision_rationale: Se corrige «Yahvé» a «el Señor» porque el hebreo tiene Adonai, no YHWH. Se cambia «sangre derramada» por «manchas de sangre» para seguir mejor la revisión auditada y la imagen de contaminación removida. Se sustituye «ardor» por «quema» para representar más directamente el sentido de burning/consuming de בָּעֵר, aunque se conserva en nota la ambigüedad de «espíritu».
