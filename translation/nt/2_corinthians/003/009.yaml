  rationale: 'Restored "came with glory" per the drafter''s documented verbless-clause rationale. The Greek first clause is verbless (εἰ γὰρ τῇ διακονίᾳ τῆς κατακρίσεως δόξα) — English requires a supplied expression. The drafter chose "came with" as an attendant-circumstance idiom over the static "had" because Paul''s qal va-chomer argument turns on the asymmetry between attended-glory (the condemnation ministry) and abounding-in-glory (the righteousness ministry). The 2026-04-23 azure-gpt-5.4 revision overrode this on stylistic-preference grounds ("more directly reflect the Greek") without addressing why the drafter chose the dynamic verb over the static one. Same regression pattern as Rom 3:25 and Phil 4:5 from the same Azure pass: a defensible-but-not-clearly-better gloss substituted without engaging documented reasoning. The new revision_policy.md framework treats this as an invalid override.'

