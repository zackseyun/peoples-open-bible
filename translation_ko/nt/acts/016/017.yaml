  yaml_path: translation/nt/acts/016/017.yaml
  text: She kept following Paul and us and crying out[a], saying, “These men are slaves of the Most High God, who are proclaiming to you the way of salvation.”
  footnotes:
  - marker: a
    text: Or “the way of salvation.” The Greek reads literally “a/the way of salvation”; the noun 'way' has no article here, so the wording may be understood as either indefinite or definite in English.
    reason: alternative_reading
translation:
  language: ko
  text: 그 여종이 바울과 우리를 따라오며 외쳐 말하기를, 「이 사람들은 지극히 높으신 하나님의 종들이니, 여러분에게 구원의 길을 전하는 사람들입니다」 하였습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοῦλοι τοῦ θεοῦ τοῦ ὑψίστου
  english_pob_choice: slaves of the Most High God
  chosen_korean: 지극히 높으신 하나님의 종들
  alternatives_korean:
  - 지극히 높으신 하나님의 노예들
  lexicon: BDAG
  rationale: 본 본문은 점치는 영의 입을 통한 외침이며, 신약 일반의 「하나님의 종」 칭호 용법(서신서적 인사 정형이 아님)이므로 「종」으로 옮긴다.
