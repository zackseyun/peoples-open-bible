translation:
  language: es
  text: Porque Yahvé vindicará a su pueblo[a], y tendrá compasión de sus siervos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque Yahvé juzgará a su pueblo». El verbo hebreo puede significar «juzgar», pero aquí probablemente lleva la idea de juzgar en favor de su pueblo; por eso se traduce «vindicará».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y desistirá respecto de sus siervos». El verbo hebreo también puede expresar la idea de desistir, ceder o ser movido a piedad.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o explicación del enunciado anterior. En español, 'porque' comunica naturalmente esa relación causal/explicativa sin forzar el orden.
- source_word: יָדִין
  english_pob_choice: will vindicate
  chosen_spanish: vindicará
  alternatives_spanish:
  - juzgará
  - hará justicia a
  lexicon: HALOT
  rationale: El verbo דין puede significar 'juzgar', pero en este contexto con 'su pueblo' y en paralelo con la compasión siguiente, la idea es que Yahvé actúa en favor de su pueblo. 'Vindicará' conserva esa fuerza de juicio favorable sin reducirlo a mera sentencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio y transparente como 'Yahvé', conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  lexicon: HALOT
  rationale: Es la designación de alianza más natural en español y refleja el colectivo singular hebreo.
- source_word: וְעַל
  english_pob_choice: and ... on
  chosen_spanish: de
  alternatives_spanish:
  - sobre
  - acerca de
  lexicon: HALOT
  rationale: En la construcción con נחם, la preposición expresa referencia/relación respecto de un grupo. En español, 'tener compasión de' comunica mejor ese valor que una traducción literal y rígida.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus esclavos
  lexicon: HALOT
  rationale: Aunque עבד puede implicar esclavitud, en este contexto del pueblo del pacto el uso corriente y más natural en español bíblico es 'siervos'. Mantiene la relación de pertenencia y servicio sin introducir dureza no destacada aquí.
- source_word: יִתְנֶחָם
  english_pob_choice: will have compassion
  chosen_spanish: tendrá compasión
  alternatives_spanish:
  - se arrepentirá
  - se volverá a compadecer
  - se ablandará
  lexicon: HALOT
  rationale: El nifal de נחם puede expresar arrepentirse, desistir o ser movido a compasión. Aquí, con 'sobre/de sus siervos', el sentido contextual es de misericordia activa; 'tendrá compasión' comunica esa idea sin sugerir que Dios se arrepiente de una falta.
theological_decisions:
- issue: Lenguaje antropopático en יִתְנֶחָם
  english_pob_reading: Rendered as 'will have compassion' rather than 'will repent' or 'will be sorry.'
  chosen_spanish_reading: '''tendrá compasión'' en vez de ''se arrepentirá'' o ''se desdijo''.'
  alternative_spanish_readings:
  - se arrepentirá
  - se compadecerá
  rationale: El hebreo usa lenguaje acomodado a la experiencia humana para describir la respuesta misericordiosa de Dios. En este versículo, la traducción debe preservar el sentido de misericordia hacia sus siervos sin insinuar arrepentimiento moral en Dios. 'Tendrá compasión' logra ese equilibrio.
  doctrine_reference: Translation philosophy §3; readability §6
- issue: Sentido forense/favorable de יָדִין
  english_pob_reading: '''will vindicate'' rather than ''will judge.'''
  chosen_spanish_reading: '''vindicará'' y no simplemente ''juzgará''.'
  alternative_spanish_readings:
  - juzgará
  - hará justicia a
  rationale: El verbo דין incluye 'juzgar', pero en esta collocación el juicio es en favor del pueblo. 'Vindicará' preserva la tensión entre juicio y defensa del pueblo, evitando una lectura demasiado general.
  doctrine_reference: HALOT; Translation philosophy §3
translation_notes:
  revision_awareness: Revisado frente al paquete fuente WLC, la traducción inglesa POB y sus notas. No hubo cambios posteriores en el pasaje; el último pase editorial indicó que no se requerían cambios y el control cruzado mostró alto acuerdo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrama, conforme al estándar del proyecto.
  - Se usa 'siervos' para עֲבָדָיו por coherencia con el tono bíblico y la decisión inglesa contextual, evitando 'esclavos' en este caso.
  - '''Vindicará'' conserva la fuerza forense favorable de דין sin perder la ambigüedad contextual entre juzgar y defender.'
  - '''Tendrá compasión'' resuelve el valor de נחם en sentido misericordioso, manteniendo la tensión teológica sin suavizarla en exceso.'
