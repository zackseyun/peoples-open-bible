  - severity: high
    issue: «Venga venganza» no es un imperativo español natural ni claro.
    rationale: נְקֹם es un imperativo 2ms dirigido a Moisés. En español, «Venga venganza» no comunica adecuadamente ese mandato personal y resulta poco inteligible.
  - severity: medium
    issue: «sobre los madianitas» suena forzado con «tomar venganza».
    rationale: Aunque puede calcar la dirección semántica, en español «contra los madianitas» o «de los madianitas» es más idiomático. «Contra» expresa con claridad el objetivo de la represalia sin falsear el hebreo.
  - severity: medium
    issue: La nota [a] queda desalineada si se corrige el texto principal.
    rationale: La nota actualmente presenta «Toma venganza» como alternativa, cuando debe pasar a ser el texto principal revisado y ofrecer la otra posibilidad documentada («Venga/Avenge» o una explicación literal) como alternativa.
  revised_spanish_text: Toma venganza de los hijos de Israel contra los madianitas[a]. Después serás reunido a tu pueblo[b].
