revisions:
- from: 'Entonces el ángel respondió y me dijo[a]: «Estas son las cuatro [b]vientos del cielo, que salen de estar en pie delante del Señor de toda la tierra».'
  to: 'Entonces el ángel respondió y me dijo: «Estos son los cuatro vientos[a] del cielo, que salen de estar delante del Señor de toda la tierra».'
  rationale: Se corrigió la concordancia («los cuatro vientos»), se eliminó la nota duplicada y se reformuló מֵהִתְיַצֵּב de manera más natural en español manteniendo la idea de salida desde la presencia del Señor. También se simplificó la puntuación de notas para una lectura más limpia.
