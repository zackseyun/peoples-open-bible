revisions:
- from: Cuando tu pueblo Israel sea derribado[a] delante de un enemigo por haber pecado contra ti, y vuelvan a ti, y confiesen tu nombre, y oren, y te supliquen en esta casa,
  to: Cuando tu pueblo Israel sea derrotado[a] delante de un enemigo por haber pecado contra ti, y vuelva a ti y confiese tu nombre y ore y te suplique en esta casa,
  rationale: Se sustituye 'sea derribado' por 'sea derrotado' para reflejar con mayor naturalidad en español una derrota militar ante un enemigo. Además, se aligera la puntuación y se singularizan los verbos subordinados para concordar mejor con 'tu pueblo Israel' entendido como colectivo singular en español; el sentido permanece igual. Se conserva la nota de alternativa léxica para reflejar el matiz de נָגַף.
