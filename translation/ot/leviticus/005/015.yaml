theological_decisions:
- issue: Rendering of the sacrificial term אָשָׁם
  chosen_reading: compensation offering
  alternative_readings:
  - guilt offering
  - reparation offering
  rationale: The verse concerns an unintentional offense involving the LORD's holy things and includes valuation in silver, highlighting restitution/compensation. 'Compensation offering' better conveys the reparative force to modern readers than the traditional but potentially opaque 'guilt offering.' The traditional rendering is preserved in a footnote because it is well established and still defensible.
  doctrine_reference: Translation philosophy §1, §5, §6
- issue: Gendered singular in legal formulation
  chosen_reading: he shall bring
  alternative_readings:
  - they shall bring
  rationale: The Hebrew shifts to a masculine singular legal subject after the generic נֶפֶשׁ. Per doctrine guidance on gender accuracy, the representative singular is retained rather than flattened into plural.
  doctrine_reference: Translation philosophy §4
