translation:
  language: es
  text: 'El Señor dijo: «Los haré volver[a] de Basán; los haré volver de las profundidades del mar»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Haré volver de Basán; haré volver de las profundidades del mar». El hebreo deja el objeto sin expresar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: The Lord
  chosen_spanish: El Señor
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: HALOT
  rationale: אֲדֹנָי es un título de soberanía y respeto. En español bíblico, «El Señor» comunica de forma natural ese título divino sin sustituirlo por una convención de máscara del nombre propio; además mantiene la mayúscula reverencial esperable en este contexto.
- source_word: אָמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - ha dicho
  - declaró
  lexicon: HALOT
  rationale: El perfecto hebreo introduce discurso directo. «Dijo» es la equivalencia directa y natural en español narrativo, sin añadir matices aspectuales no exigidos por el hebreo.
- source_word: מִבָּשָׁן
  english_pob_choice: from Bashan
  chosen_spanish: de Basán
  alternatives_spanish:
  - desde Basán
  - fuera de Basán
  lexicon: HALOT
  rationale: Basán es un nombre propio geográfico y se translitera. La preposición מִן se expresa de manera natural en español con «de» en este contexto de procedencia.
- source_word: אָשִׁיב ... אָשִׁיב
  english_pob_choice: I will bring them back ... I will bring them back
  chosen_spanish: Haré volver ... haré volver
  alternatives_spanish:
  - los haré volver ... los haré volver
  - los traeré de vuelta ... los traeré de vuelta
  - volveré a traer ... volveré a traer
  lexicon: HALOT
  rationale: El hifil de שוב tiene sentido causativo de ‘hacer volver / traer de vuelta’. En español, «haré volver» conserva la fuerza transitiva y deja implícito el objeto, como en el hebreo, sin forzarlo. La repetición se mantiene para reproducir el énfasis del texto.
- source_word: מִֽ/מְּצֻל֥וֹת יָֽם
  english_pob_choice: from the depths of the sea
  chosen_spanish: de las profundidades del mar
  alternatives_spanish:
  - de las honduras del mar
  - de las profundidades del océano
  - del fondo del mar
  lexicon: HALOT
  rationale: מְצֻלוֹת designa profundidades acuáticas o abismos de agua. «Profundidades del mar» preserva la imagen poética con una formulación clara y digna en español; «mar» se toma en sentido genérico, no como nombre propio.
theological_decisions:
- issue: Objeto implícito de אָשִׁיב
  english_pob_reading: 'Supply ''them'' in English: ''I will bring them back'''
  chosen_spanish_reading: 'Mantener el objeto implícito: «Haré volver… haré volver…»'
  alternative_spanish_readings:
  - los haré volver ... los haré volver
  - haré volverlos ... haré volverlos
  rationale: El hebreo no expresa el objeto y permite dejarlo implícito. En español también puede omitirse sin pérdida de sentido cuando el contexto lo suple. Esto preserva la tensión textual y evita introducir un pronombre que el verso no menciona explícitamente.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source''s sense without paraphrasing beyond what the text warrants.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el estado más reciente del audit trail en inglés y no introduce cambios sustantivos: conserva el discurso directo, la repetición de אָשִׁיב y la referencia geográfica de Basán, con el objeto implícito como en el hebreo.'
  spanish_consistency_notes:
  - Se usa «El Señor» para אֲדֹנָי, coherente con un título divino reverencial en español.
  - Se mantiene «Basán» como transliteración estable de un topónimo bíblico.
  - Se conserva la repetición verbal para reflejar el paralelismo enfático del verso.
  - «Profundidades del mar» reproduce la imaginería acuática sin añadir explicaciones interpretativas.
