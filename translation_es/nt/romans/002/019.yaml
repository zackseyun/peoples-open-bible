lexical_decisions:
- source_word: πέποιθάς
  english_pob_choice: are convinced
  chosen_spanish: estás convencido
  alternatives_spanish:
  - estás persuadido
  - tienes la certeza
  lexicon: BDAG
  rationale: El perfecto expresa un estado asentado de confianza o persuasión. «Estás convencido» comunica bien esa seguridad interior y conserva el tono de autoafirmación del contexto.
- source_word: τε
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y además
  - e
  lexicon: Gramática griega / función conjuntiva
  rationale: La partícula enlaza esta cláusula con la acusación anterior. «Y» mantiene la conexión sin añadir énfasis no exigido por el texto.
- source_word: σεαυτὸν
  english_pob_choice: you yourself
  chosen_spanish: tú mismo
  alternatives_spanish:
  - a ti mismo
  - tú mismo(a)
  lexicon: BDAG
  rationale: El reflexivo es enfático. «Tú mismo» conserva la fuerza de la referencia al propio sujeto; se adapta a la sintaxis natural del español.
- source_word: ὁδηγὸν
  english_pob_choice: a guide
  chosen_spanish: guía
  alternatives_spanish:
  - un guía
  - un conductor
  lexicon: BDAG
  rationale: En este contexto metafórico, «guía» es la equivalencia más natural y precisa para alguien que orienta a otros.
- source_word: τυφλῶν
  english_pob_choice: the blind
  chosen_spanish: de los ciegos
  alternatives_spanish:
  - de los ciegos
  - para los ciegos
  lexicon: BDAG
  rationale: El genitivo depende de «guía»; en español, «guía de los ciegos» es la forma idiomática y conserva la imagen sin agregar explicaciones.
- source_word: φῶς
  english_pob_choice: a light
  chosen_spanish: luz
  alternatives_spanish:
  - una luz
  - resplandor
  lexicon: BDAG
  rationale: El sustantivo es metafórico. En español, el artículo indefinido puede sonar innecesario; «luz» transmite la misma imagen de iluminación y dirección.
- source_word: τῶν ἐν σκότει
  english_pob_choice: those in darkness
  chosen_spanish: de los que están en tinieblas
  alternatives_spanish:
  - de los que están en la oscuridad
  - de los que viven en tinieblas
  lexicon: BDAG
  rationale: La frase se entiende mejor de manera personal, como en el inglés POB. «Tinieblas» conserva el matiz bíblico y metafórico más que «oscuridad».
translation_notes:
