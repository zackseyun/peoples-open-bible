    text: O «su mano formó la serpiente fugitiva». El verbo puede entenderse de otra manera, aunque «atravesó» encaja mejor con la imaginería de combate de la línea.
    reason: alternative_reading
  - marker: c
    text: «La serpiente fugitiva» probablemente evoca una serpiente cósmica de caos; compárese Isaías 27:1.
    reason: cross_reference
