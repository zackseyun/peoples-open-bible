- from: Y David hizo subir a los hombres que estaban con él[a], cada hombre con su casa, y se establecieron en las ciudades de Hebrón.
  to: Y David hizo subir a los hombres que estaban con él, cada hombre con su familia, y se establecieron en las ciudades de Hebrón[a].
  rationale: Se corrige «su casa» a «su familia» para reflejar mejor el sentido distributivo y doméstico de אִישׁ וּבֵיתוֹ en español natural, en línea con la decisión auditada «each man with his household». También se repara la nota para que presente una alternativa real y útil en español respecto de עָרֵי חֶבְרוֹן.
