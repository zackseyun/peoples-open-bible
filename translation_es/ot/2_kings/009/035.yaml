translation:
  language: es
  text: Así que fueron a enterrarla[a], pero no encontraron nada de ella, excepto el cráneo, los pies y las palmas de las manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pero no encontraron nada en ella, excepto el cráneo, los pies y las palmas de las manos». La expresión hebrea con «en ella» es idiomática en el contexto y se refiere a lo que quedaba de su cuerpo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: So they went
  chosen_spanish: Así que fueron
  alternatives_spanish:
  - Entonces fueron
  - Y fueron
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo secuencial; «Así que» reproduce bien el valor consecutivo en español sin sonar rígido.
- source_word: לְקָבְרָהּ
  english_pob_choice: to bury her
  chosen_spanish: a enterrarla
  alternatives_spanish:
  - para enterrarla
  - a sepultarla
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo femenino singular se refiere a Jezabel; en español, «enterrarla» es claro y natural. «Sepultarla» es posible, pero «enterrar» conserva mejor la concreción narrativa.
- source_word: וְלֹא מָצְאוּ בָהּ
  english_pob_choice: but they found nothing of her
  chosen_spanish: pero no encontraron nada de ella
  alternatives_spanish:
  - pero no encontraron nada en ella
  - y no hallaron en ella
  lexicon: HALOT
  rationale: La frase hebrea expresa que no quedaba nada identificable de su cuerpo. «Nada de ella» conserva ese sentido mejor que una literalidad demasiado extraña en español.
- source_word: כִּי אִם
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - sino
  - salvo
  lexicon: HALOT
  rationale: La construcción exceptiva se vierte de forma directa con «excepto», que es natural y precisa en español.
- source_word: הַגֻּלְגֹּלֶת
  english_pob_choice: the skull
  chosen_spanish: el cráneo
  alternatives_spanish:
  - la calavera
  - el casco craneal
  lexicon: HALOT
  rationale: El sustantivo designa el cráneo/skull; «cráneo» es el término anatómico normal en español y preserva la crudeza del texto.
- source_word: וְהָרַגְלַיִם
  english_pob_choice: the feet
  chosen_spanish: los pies
  alternatives_spanish:
  - las piernas
  lexicon: HALOT
  rationale: Aunque la forma dual puede abarcar la parte inferior de las extremidades, en este contexto anatómico «pies» sigue la lectura más directa y la elegida por la POB en inglés.
- source_word: וְכַפּוֹת הַיָּדָיִם
  english_pob_choice: the palms of the hands
  chosen_spanish: las palmas de las manos
  alternatives_spanish:
  - las manos
  - las palmas
  lexicon: HALOT
  rationale: כַּף es la palma o hueco de la mano; «las palmas de las manos» mantiene la especificidad del hebreo y evita reducirlo a «las manos» sin base.
translation_notes:
  revision_awareness: El testimonio comparado muestra alta concordancia entre el texto hebreo y la auditoría inglesa; no se registraron revisiones aplicadas en la pasada más reciente. La redacción española sigue la lectura de mayor acuerdo sin introducir expansiones.
  spanish_consistency_notes:
  - Se mantuvo un registro narrativo sobrio y directo acorde con el contexto histórico.
  - Se evitó traducir mecánicamente la preposición hebrea con «en ella» en el texto principal, pero se preservó como alternativa anotada por su valor idiomático.
  - Se prefirió «cráneo» sobre «cabeza» para reflejar la referencia a restos corporales, en línea con la decisión lexical inglesa.
