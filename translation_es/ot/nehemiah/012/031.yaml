base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/012/031.yaml
  text: Then I brought the leaders of Judah up onto the wall[a], and I appointed two great thanksgiving choirs and processions[b], one going to the right on the wall toward the Dung Gate.
  footnotes:
