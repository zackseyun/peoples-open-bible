- from: Él hizo que la tormenta se aquietara[a], y sus olas fueron acalladas[b].
  to: Hizo que la tormenta se aquietara[a], y sus olas se aquietaron[b].
  rationale: Se elimina el pronombre sujeto explícito para un español más natural, y se reemplaza «fueron acalladas» por «se aquietaron» para reflejar mejor el valor resultativo del hebreo en una expresión idiomática y poética. También se ajustan las notas para que expliquen con más precisión las alternativas léxicas preservadas en el expediente inglés.
