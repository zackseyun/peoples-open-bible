translation:
  language: es
  text: Entonces tomarás el toro de la ofrenda por el pecado[a] y lo quemarás en el lugar designado de la casa[b], fuera del santuario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'el toro para la ofrenda por el pecado'; alternativamente, 'el toro de la ofrenda de purificación'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''en el lugar designado de la casa''; ''casa'' aquí se refiere al complejo del templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  english_pob_choice: Then you shall take
  chosen_spanish: Entonces tomarás
  alternatives_spanish:
  - Y tomarás
  - Luego tomarás
  lexicon: HALOT
  rationale: La secuencia waw + perfecto en instrucciones rituales marca continuidad procedimental; en español, 'Entonces' mantiene la progresión y 'tomarás' conserva el valor directivo sin sonar forzado.
- source_word: הַפָּר
  english_pob_choice: the bull
  chosen_spanish: el toro
  alternatives_spanish:
  - el buey
  - el novillo
  lexicon: HALOT
  rationale: פָּר designa un bovino macho adulto usado en sacrificio. 'Toro' es claro en español y conserva la fuerza léxica; 'novillo' podría sugerir menor edad de la que el hebreo aquí no explicita.
- source_word: הַחַטָּאת
  english_pob_choice: of the sin offering
  chosen_spanish: de la ofrenda por el pecado
  alternatives_spanish:
  - de la ofrenda por el pecado
  - de la ofrenda de purificación
  lexicon: HALOT
  rationale: En contexto sacrificial, חַטָּאת nombra la ofrenda, no solo el pecado. 'Ofrenda por el pecado' sigue de cerca la función cultual y evita imponer 'purificación' como término principal sin necesidad contextual.
- source_word: וּשְׂרָפוֹ
  english_pob_choice: and burn it
  chosen_spanish: y lo quemarás
  alternatives_spanish:
  - y lo quemarás
  - y lo quemarán
  lexicon: HALOT
  rationale: El hebreo cambia a 3ms con sufijo, pero la secuencia instruccional sigue dirigida al destinatario. En español, mantener segunda persona evita una transición opaca y conserva el carácter imperativo del pasaje.
- source_word: בְּמִפְקַד הַבַּיִת
  english_pob_choice: in the appointed place of the house
  chosen_spanish: en el lugar designado de la casa
  alternatives_spanish:
  - en el lugar designado de la casa
  - en el lugar señalado de la casa
  - en el sitio asignado de la casa
  lexicon: HALOT
  rationale: מִפְקָד expresa un lugar fijado o designado. 'Lugar designado' comunica bien la idea sin sobreinterpretar. 'Casa' se mantiene para reflejar הַבַּיִת con mayor formalidad y fidelidad al texto de Ezequiel.
- source_word: מִחוּץ לַמִּקְדָּשׁ
  english_pob_choice: outside the sanctuary
  chosen_spanish: fuera del santuario
  alternatives_spanish:
  - fuera del santuario
  - fuera del lugar santo
  - fuera del recinto sagrado
  lexicon: HALOT
  rationale: מִחוּץ es 'fuera de', y מִקְדָּשׁ denota el santuario. 'Santuario' es la equivalencia más directa y cultualmente precisa en español.
theological_decisions:
- issue: Sentido cultual de חַטָּאת
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  rationale: El término hebreo puede abarcar la idea de pecado y la ofrenda asociada. En este versículo el objeto sacrificial ya está explícito ('el toro'), por lo que la traducción principal debe conservar el nombre cultual tradicional sin borrar la ambigüedad semántica posible.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sujeto implícito/salto de persona en וּשְׂרָפוֹ
  english_pob_reading: and burn it
  chosen_spanish_reading: y lo quemarás
  alternative_spanish_readings:
  - y lo quemará
  rationale: El hebreo alterna la forma verbal dentro de una instrucción dirigida. En español, la segunda persona transmite mejor la secuencia ritual al lector moderno, sin alterar el mandato ni introducir un sujeto distinto.
  doctrine_reference: optimal equivalence
translation_notes:
  revision_awareness: El borrador español sigue la revisión más reciente del archivo fuente, que prefirió 'house/casa' sobre 'temple/templo' para reflejar más de cerca הַבַּיִת. También conserva la decisión auditada de suavizar el cambio de persona en el verbo de quemar para mantener una instrucción ritual fluida en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la terminología POB para el nombre divino cuando aparezca en contextos cercanos, aunque este versículo no lo contiene.
  - '''Santuario'' se usa para מִקְדָּשׁ, evitando ''lugar santo'' porque puede sonar menos técnico en contexto cultual.'
  - '''Casa'' traduce הַבַּיִת conforme al expediente auditado, sin reemplazarlo por ''templo'' en el texto principal.'
