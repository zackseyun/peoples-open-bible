translation:
  language: es
  text: Abrahán, padre de una multitud de naciones—no se halló mancha en su honor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «y no se halló igual en gloria» (o «en honor»).'
    reason: alternative_reading
lexical_decisions:
- source_word: אב / πατήρ
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - ancestro
  - progenitor
  lexicon: HALOT; LXX πατήρ
  rationale: «Padre» es la correspondencia directa del hebreo y del griego, y conserva la resonancia pactal de la promesa abrahámica.
- source_word: המון גוים / πλήθους ἐθνῶν
  english_pob_choice: a multitude of nations
  chosen_spanish: una multitud de naciones
  alternatives_spanish:
  - muchas naciones
  - gran número de naciones
  lexicon: HALOT; LXX πλήθους ἐθνῶν
  rationale: «Multitud» preserva mejor el eco de la promesa y la fuerza colectiva del sintagma que «muchas».
- source_word: לא נתן / οὐχ εὑρέθη
  english_pob_choice: no blemish was found
  chosen_spanish: no se halló mancha
  alternatives_spanish:
  - no se encontró defecto
  - no se halló defecto
  lexicon: HALOT; LXX οὐχ εὑρέθη
  rationale: El hebreo es difícil y el griego da un matiz encomiástico paralelo. «No se halló mancha» mantiene el sentido de ausencia de defecto/imperfección y suena natural en español.
- source_word: בכבודו / ἐν τῇ δόξῃ
  english_pob_choice: in his honor
  chosen_spanish: en su honor
  alternatives_spanish:
  - en su gloria
  - en su esplendor
  lexicon: HALOT; LXX δόξα
  rationale: «Honor» refleja bien el hebreo כבוד en este contexto y evita introducir una sonoridad más litúrgica de «gloria» donde el paralelismo habla de integridad personal.
- source_word: מום
  english_pob_choice: blemish
  chosen_spanish: mancha
  alternatives_spanish:
  - defecto
  - tacha
  lexicon: HALOT
  rationale: «Mancha» comunica en español la idea de defecto o mancha moral sin endurecer la imagen; conserva el valor honorífico del hebreo.
theological_decisions:
- issue: Divergencia entre el hebreo y el griego en la cláusula final
  english_pob_reading: Translate primarily from the Hebrew as a statement that Abraham's honor was without blemish, while preserving the Greek's different commendatory wording in a footnote.
  chosen_spanish_reading: 'Traducir la línea hebrea como una afirmación de integridad: no se halló mancha en su honor, y señalar en nota que el griego dice que no se halló igual en gloria/honor.'
  alternative_spanish_readings:
  - y no se halló igual en gloria
  - y no se halló igual en honor
  rationale: La lectura hebrea y la griega no son idénticas, pero ambas son encomiásticas. La traducción principal sigue el hebreo disponible y la nota preserva la tensión textual sin armonizarla silenciosamente.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as translation input; preserve genuine tension rather than resolve it silently.'
translation_notes:
  revision_awareness: Se siguió la revisión que eliminó cualquier adición como «el grande», no respaldada por el hebreo, y se mantuvo la estructura encomiástica del verso con una traducción sobria y fiel al paralelo hebreo-griego.
  spanish_consistency_notes:
  - Se usa «padre» para אב, no «ancestro», por la fuerza literal y pactal del texto.
  - Se conserva «una multitud de naciones» para reflejar el eco abrahámico y la correspondencia con el griego.
  - «Honor» se mantiene como equivalente de כבוד; «gloria» queda reservada para la nota del griego.
  - La nota [a] conserva la tensión entre la formulación hebrea y la griega sin ocultarla.
