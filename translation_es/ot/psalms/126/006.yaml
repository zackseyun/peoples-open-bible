- from: Él ciertamente saldrá llorando[a], llevando la semilla para sembrar; ciertamente volverá con gritos de alegría[b], llevando sus gavillas.
  to: Él ciertamente saldrá llorando[a], llevando la semilla para sembrar; ciertamente entrará con gritos de alegría[b], llevando sus gavillas.
