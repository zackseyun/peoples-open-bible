translation:
  language: es
  text: Porque Yahvé humilló a Judá a causa de Acaz, rey de Israel[a], porque había actuado sin freno en Judá[b] y había actuado con gran infidelidad contra Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Acaz, rey de Israel». Acaz era rey de Judá; se conserva la formulación del Cronista en vez de armonizarla.'
    reason: alternative_reading
  - marker: b
    text: O «había actuado temerariamente en Judá» o «había desechado el freno en Judá».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכְנִיעַ
  english_pob_choice: humbled
  chosen_spanish: humilló
  alternatives_spanish:
  - abajó
  - subyugó
  - afligió
  lexicon: HALOT
  rationale: El piel causativo de כנע expresa que Yahvé hizo bajar a Judá en condición y honor. 'Humilló' conserva bien el matiz causativo y la carga teológica/covenantal, sin forzar una imagen militar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino conforme al criterio del proyecto, en vez de reemplazarlo por un título.
- source_word: בַּעֲבוּר
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  - por razón de
  lexicon: HALOT
  rationale: Aquí la preposición marca causa. 'A causa de' es claro en español y conserva el valor causal del hebreo sin sobreinterpretar.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - rey de Judá
  lexicon: HALOT
  rationale: Se preserva la formulación del hebreo, aun cuando históricamente Acaz reinó en Judá. El texto crónico retiene esta tensión y no debe armonizarse en el cuerpo principal.
- source_word: הִפְרִיעַ
  english_pob_choice: had cast off restraint
  chosen_spanish: había quitado toda restricción
  alternatives_spanish:
  - había actuado con desenfreno
  - había dejado rienda suelta
  - había eliminado todo freno
  lexicon: HALOT
  rationale: El verbo en hifil puede implicar soltar, desordenar o quitar contención. 'Había quitado toda restricción' conserva la idea de desatar el freno moral/social y suena natural en español.
- source_word: בִּיהוּדָה
  english_pob_choice: in Judah
  chosen_spanish: en Judá
  alternatives_spanish:
  - entre Judá
  lexicon: HALOT
  rationale: La preposición marca el ámbito de la acción de Acaz; 'en Judá' es la opción más natural y precisa.
- source_word: וּמָעוֹל מַעַל
  english_pob_choice: and had acted very unfaithfully
  chosen_spanish: y había actuado con gran infidelidad
  alternatives_spanish:
  - y había cometido una grave traición
  - y había sido muy infiel
  lexicon: HALOT
  rationale: La combinación infinitivo absoluto + forma verbal intensifica מעל. 'Con gran infidelidad' mantiene la fuerza de la deslealtad de pacto sin perder legibilidad.
- source_word: בַּיהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - respecto de Yahvé
  - hacia Yahvé
  lexicon: HALOT
  rationale: Con מעל, el español expresa mejor la dirección del quebranto de pacto con 'contra'.
theological_decisions:
- issue: Ahaz nombrado 'rey de Israel'
  english_pob_reading: Retain the MT wording 'Ahaz king of Israel' in the main text.
  chosen_spanish_reading: Mantener 'Acaz, rey de Israel' en el texto principal.
  alternative_spanish_readings:
  - Acaz, rey de Judá
  - Acaz, rey de Israel' con armonización histórica implícita
  rationale: El hebreo dice explícitamente 'rey de Israel'. Aunque Acaz reinó en Judá, Crónicas preserva esa designación y la traducción no debe corregirla en el cuerpo principal. La nota permite aclarar la tensión histórica sin borrarla.
  doctrine_reference: §1 Primacía del original; §3 Preservar la tensión teológica/histórica en lugar de resolverla
- issue: Intensificación de מעל con la forma verbal + infinitivo absoluto
  english_pob_reading: and had acted very unfaithfully
  chosen_spanish_reading: y había actuado con gran infidelidad
  alternative_spanish_readings:
  - y había cometido una grave traición
  - y había sido totalmente infiel
  rationale: La intensificación del hebreo expresa una deslealtad de pacto especialmente grave. 'Gran infidelidad' conserva esa fuerza sin convertir el pasaje en una paráfrasis excesiva.
  doctrine_reference: §2 Mantener la fuerza lexical; §4 No borrar tensiones léxicas ni teológicas
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado auditado del inglés POB: se mantiene la elección de sentido para הִפְרִיעַ como ''cast off restraint'' mediante una equivalencia española natural (''quitar toda restricción''), y se conserva la tensión textual de ''rey de Israel'' con nota aclaratoria. No se adoptó la variante más literal ''subyugó'' para הִכְנִיעַ porque ''humilló'' expresa mejor el valor causativo y covenantal del contexto.'
  spanish_consistency_notes:
  - Yahweh/Yahvé se normaliza como 'Yahvé' en el texto principal.
  - Se conserva 'infidelidad' para מעל para mantener el campo semántico de deslealtad de pacto.
  - La nota a pie de página usa la misma tensión histórica que el aparato inglés, sin resolverla en el cuerpo del versículo.
