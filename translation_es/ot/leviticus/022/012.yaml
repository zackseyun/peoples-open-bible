revisions:
- from: Pero si la hija de un sacerdote llega a ser esposa de un[a] hombre extraño[b], no comerá de la contribución de las cosas santas.
  to: Pero si la hija de un sacerdote llega a ser esposa de un hombre ajeno al sacerdocio[a], ella no comerá de la contribución de las cosas santas[b].
  rationale: Se reemplaza «hombre extraño» por «hombre ajeno al sacerdocio» para reflejar con claridad el sentido contextual de זָר como alguien fuera del círculo sacerdotal, no necesariamente un extranjero ni una persona rara. Se añade «ella» para representar de forma natural el pronombre enfático הִוא. Se corrigen los anclajes de notas para que coincidan con los términos explicados.
