translation:
  language: es
  text: Estos eran los hijos de Leví, según sus casas paternas, los jefes de las casas paternas, según los que de ellos fueron contados, por número de nombres, cabeza por cabeza[a], los que hacían la obra para el servicio de la casa de Yahvé, desde los veinte años en adelante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cabeza por cabeza», literalmente «por sus cabezas/calaveras»; modismo que significa que cada individuo fue contado aparte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי לֵוִי
  english_pob_choice: the sons of Levi
  chosen_spanish: los hijos de Leví
  alternatives_spanish:
  - los descendientes de Leví
  - los hijos de Leví
  lexicon: HALOT
  rationale: En español, 'hijos de Leví' conserva la fórmula genealógica breve y natural del hebreo. 'Descendientes' explicita el sentido colectivo, pero suaviza la forma del original.
- source_word: לְבֵית אֲבֹתֵיהֶם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: según sus casas paternas
  alternatives_spanish:
  - por sus casas paternas
  - según sus casas de familia
  lexicon: HALOT
  rationale: '''Casas paternas'' refleja la unidad familiar/clánica del hebreo. ''Según'' expresa clasificación o distribución, no simple posesión, y resulta fluido en español.'
- source_word: רָאשֵׁי הָאָבוֹת
  english_pob_choice: the heads of the fathers’ houses
  chosen_spanish: los cabezas de las casas paternas
  alternatives_spanish:
  - los jefes de las casas paternas
  - los cabezas de las casas de los padres
  lexicon: HALOT
  rationale: '''Cabezas'' conserva la metáfora hebrea de liderazgo; aunque menos usual en español, aquí es suficientemente clara y mantiene la cercanía al texto. ''Jefes'' es una alternativa más idiomática pero menos imagética.'
- source_word: לִפְקוּדֵיהֶם
  english_pob_choice: according to those counted of them
  chosen_spanish: según los que de ellos fueron contados
  alternatives_spanish:
  - según su enrolamiento
  - según los que fueron empadronados de entre ellos
  lexicon: HALOT
  rationale: La construcción hebrea vincula a los jefes con el censo o recuento de personas. 'Fueron contados' mantiene la relación concreta con individuos, sin convertirlo en una abstracción administrativa.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  english_pob_choice: by the number of names
  chosen_spanish: por número de nombres
  alternatives_spanish:
  - según el número de nombres
  - en el número de nombres
  lexicon: HALOT
  rationale: La frase expresa un registro nominal. 'Por número de nombres' es breve y fiel; 'según el número de nombres' sería más explícito pero algo más pesado.
- source_word: לְגֻלְגְּלֹתָם
  english_pob_choice: head by head
  chosen_spanish: cabeza por cabeza
  alternatives_spanish:
  - persona por persona
  - por cada uno
  lexicon: HALOT
  rationale: '''Cabeza por cabeza'' preserva el modismo hebreo de conteo individual. No se reduce a ''persona por persona'' porque el POB inglés también retuvo la imagen corporal del original.'
- source_word: עֹשֵׂה הַמְּלָאכָה
  english_pob_choice: doing the work
  chosen_spanish: haciendo la obra
  alternatives_spanish:
  - realizando el trabajo
  - ocupados en la obra
  lexicon: HALOT
  rationale: '''Obra'' puede abarcar tanto labor como tarea asignada; en contexto cultual es más solemne que ''trabajo''. El participio funciona colectivamente, por eso se traduce con una forma verbal continua.'
- source_word: לַעֲבֹדַת בֵּית יְהוָה
  english_pob_choice: for the service of the house of Yahweh
  chosen_spanish: para el servicio de la casa de Yahvé
  alternatives_spanish:
  - para la obra de la casa de Yahvé
  - para el ministerio de la casa de Yahvé
  lexicon: HALOT
  rationale: '''Servicio'' refleja la carga cultual de עֲבֹדָה sin introducir terminología eclesiástica posterior. ''Casa de Yahvé'' sigue el nombre divino del proyecto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino revelado en el texto hebreo. 'Yahvé' es el equivalente adoptado por el proyecto y evita la sustitución por un título.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמָעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: desde los veinte años en adelante
  alternatives_spanish:
  - a partir de los veinte años
  - desde los veinte años y más
  lexicon: HALOT
  rationale: Es un modismo de edad mínima para servicio. 'Desde los veinte años en adelante' es natural en español y conserva el sentido legal/administrativo del hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton; no se sustituye por un título. 'Yahvé' preserva el nombre propio divino conforme a la decisión doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de עֲבֹדָה en contexto levítico
  english_pob_reading: service
  chosen_spanish_reading: servicio
  alternative_spanish_readings:
  - ministerio
  - trabajo
  rationale: En este contexto la labor de los levitas es cultual y organizada, no meramente manual. 'Servicio' mantiene esa amplitud sin desplazarla hacia vocabulario eclesiástico moderno.
  doctrine_reference: Uso léxico contextual de עֲבֹדָה en textos sacerdotales/levíticos
- issue: Expresión idiomática de conteo לְגֻלְגְּלֹתָם
  english_pob_reading: head by head
  chosen_spanish_reading: cabeza por cabeza
  alternative_spanish_readings:
  - persona por persona
  - individualmente
  rationale: Se conserva la imagen corporal del conteo para no borrar el modismo hebreo. Esto mantiene visible el énfasis en un censo individual, no solo una suma total.
  doctrine_reference: Principio de conservación de imágenes idiomáticas cuando son interpretables en español
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el texto hebreo y el audit trail inglés; no se requieren revisiones textuales mayores. La principal decisión estable fue conservar el modismo de conteo en forma transparente y mantener el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - '''Casa paterna'' / ''casas paternas'' se mantiene como término genealógico-clánico, no como ''familia'' para no perder el trasfondo tribal.'
  - '''Cabeza por cabeza'' conserva el paralelismo con la nota explicativa en el pie.'
  - No se empleó 'SEÑOR' ni 'Cristo' por no corresponder al hebreo de este versículo.
