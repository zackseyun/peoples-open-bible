  - severity: low
    issue: La nota léxica sobre «vestiduras» no está respaldada por el rastro inglés y añade información no necesaria.
    rationale: La auditoría inglesa no preserva una nota sobre «garments». Añadir «O “las prendas”» no mejora la fidelidad y distrae de la nota realmente pertinente sobre «santifiquen».
