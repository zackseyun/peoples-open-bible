revisions:
- from: Todo alimento que se pueda comer[a], sobre el cual caiga agua, quedará impuro; y toda bebida que se pueda beber en cualquier vaso quedará impura.
  to: Todo alimento que se pueda comer[a], al cual le llegue agua, quedará impuro; y toda bebida que se pueda beber en cualquier recipiente quedará impura.
  rationale: Se ajusta 'vaso' a 'recipiente' para preservar el sentido amplio de כְּלִי en contexto legal ritual. También se reemplaza 'sobre el cual caiga agua' por 'al cual le llegue agua' para evitar una especificación innecesaria del movimiento del agua y reflejar mejor el hebreo 'venga sobre él'. La nota se simplifica y se mantiene la alternativa literal documentada por el POB inglés.
