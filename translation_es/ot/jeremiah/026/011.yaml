  language: en
  yaml_path: translation/ot/jeremiah/026/011.yaml
  text: Then the priests and the prophets said to the officials and to all the people[a], “This man deserves the sentence of death, because he has prophesied against this city[b], just as you have heard with your own ears.”
  footnotes:
