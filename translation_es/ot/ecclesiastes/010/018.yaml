translation:
  language: es
  text: Por la pereza se comba el techo[a], y por manos ociosas[b] gotea la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por la pereza, el techo cede»; el verbo hebreo puede denotar hacerse bajo o ceder, y el sustantivo para «techo» puede referirse más específicamente a la estructura del techo o a las vigas.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por la bajeza de las manos», un modismo para flojedad o negligencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲצַלְתַּיִם
  english_pob_choice: Through laziness
  chosen_spanish: Por la pereza
  alternatives_spanish:
  - Por la holgazanería
  - A causa de la pereza
  lexicon: HALOT
  rationale: La preposición ב expresa aquí medio o causa; en español, «por» comunica bien esa relación. עֲצַלְתַּיִם designa pereza o holgazanería. «Pereza» es natural y fiel, sin endurecer el proverbio innecesariamente.
- source_word: יִמַּךְ
  english_pob_choice: sags
  chosen_spanish: se hunde
  alternatives_spanish:
  - se baja
  - se viene abajo
  - se hunde
  lexicon: HALOT
  rationale: El verbo en nifal puede significar hacerse bajo, ceder o irse abajo. Para el contexto de una parte de la casa, «se hunde» conserva la idea de deterioro estructural gradual, en línea con la opción inglesa «sags».
- source_word: הַמְּקָרֶה
  english_pob_choice: the roof
  chosen_spanish: el techo
  alternatives_spanish:
  - la cubierta
  - las vigas del techo
  - el tejado
  lexicon: HALOT
  rationale: מְקָרֶה puede referirse a la estructura o cobertura del techo. «Techo» es la manera más clara y natural en español para este proverbio, sin precisar más de lo que el hebreo exige.
- source_word: וּבְשִׁפְלוּת יָדַיִם
  english_pob_choice: and through idle hands
  chosen_spanish: y por las manos ociosas
  alternatives_spanish:
  - y por la laxitud de las manos
  - y por las manos negligentes
  - y por la dejadez de manos
  lexicon: HALOT
  rationale: שִׁפְלוּת literalmente es bajeza o abatimiento; con «manos» funciona como un modismo de inactividad o descuido. «Manos ociosas» preserva el carácter idiomático y el paralelismo con «pereza».
- source_word: יִדְלֹף
  english_pob_choice: leaks
  chosen_spanish: gotea
  alternatives_spanish:
  - tiene filtraciones
  - rezuma
  - gotea
  lexicon: HALOT
  rationale: דלף significa gotear o filtrar. Con «la casa» como sujeto, «gotea» reproduce la imagen concreta y breve del proverbio; además mantiene el paralelismo sonoro con el miembro anterior.
- source_word: הַבָּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - la vivienda
  - el edificio
  lexicon: HALOT
  rationale: בַּיִת es «casa» en su sentido estándar. «La casa» es la forma más directa y proverbial en español, adecuada para la imagen doméstica del texto.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto hebreo y el audit trail inglés: conserva la causalidad de la preposición ב, la idea de deterioro gradual de יִמַּךְ y el paralelismo proverbial entre el techo que cede y la casa que gotea. No se detectaron revisiones aplicadas en el paquete fuente; por eso no se incorporan variantes editoriales adicionales.'
  spanish_consistency_notes:
  - Se mantuvo «pereza» como equivalente de עֲצַלְתַּיִם para evitar una carga moralizante excesiva y conservar el valor causal del proverbio.
  - Se eligió «techo» y no «tejado» porque el hebreo puede abarcar la estructura de cobertura en general; el término español es suficientemente amplio y claro.
  - «Manos ociosas» traduce el modismo sin literalizarlo de forma extraña en español.
  - «Gotea» conserva la imagen física de filtración y evita sobreinterpretar el grado exacto del daño.
