translation:
  language: es
  text: Y todos los hombres de Israel se reunieron ante el rey en la fiesta[a], en el séptimo mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «todo Israel se reunió ante el rey en la fiesta, en el séptimo mes». El hebreo dice literalmente «cada hombre de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּהֲלוּ
  english_pob_choice: assembled
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se asamblaron
  lexicon: HALOT
  rationale: El verbo expresa la acción de juntarse como asamblea. «Se reunieron» comunica bien el sentido de congregación en español moderno sin perder la fuerza colectiva.
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: before the king
  chosen_spanish: ante el rey
  alternatives_spanish:
  - al rey
  - delante del rey
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «a/ hacia el rey», el contexto es de comparecencia ante una figura real. «Ante el rey» conserva esa relación de presencia sin sugerir solo movimiento.
- source_word: כָּל אִישׁ יִשְׂרָאֵל
  english_pob_choice: all the men of Israel
  chosen_spanish: todos los hombres de Israel
  alternatives_spanish:
  - todo Israel
  - toda la gente de Israel
  lexicon: HALOT
  rationale: Se mantiene la fuerza literal de אִישׁ con «hombres», como hace la POB inglesa con «men». «Todo Israel» sería más breve, pero perdería el elemento léxico explícito.
- source_word: בֶּחָג
  english_pob_choice: at the feast
  chosen_spanish: en la fiesta
  alternatives_spanish:
  - en el festival
  - durante la fiesta
  lexicon: HALOT
  rationale: חג designa una fiesta solemne/peregrinación. «Fiesta» es la equivalencia natural y tradicional en español, y preserva la referencia cultual sin sobreexplicar.
- source_word: הַחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: the seventh month
  chosen_spanish: el séptimo mes
  alternatives_spanish:
  - el mes séptimo
  lexicon: HALOT
  rationale: Correspondencia directa y natural del marcador temporal. No se añade el nombre de la fiesta, porque el hebreo aquí solo especifica el mes.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el ajuste de la POB inglesa que eliminó «that is» por no estar en el original. Se conserva la apposición natural como «en la fiesta, en el séptimo mes» sin añadir explicación interpretativa.
  spanish_consistency_notes:
  - Se usa «rey» sin nombre propio porque el hebreo presenta el título, no «Salomón».
  - Se evita «SEÑOR» u otras sustituciones irrelevantes porque no aparece el Tetragrámaton en este versículo.
  - «Fiesta» se conserva como término cultual amplio y no como «festival», para mantener una lectura bíblica natural en español.
  - La nota al pie preserva la alternativa «todos los hombres de Israel» para reflejar el hebreo literal y la elección lexical de la POB inglesa.
