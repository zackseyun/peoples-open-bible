  glossary_alignment: No hay conflicto con los términos teológicos principales del proyecto. «Casa» preserva la lectura dinástica documentada. «Fuego» mantiene la imagen concreta del juicio. El principal ajuste léxico requerido es אַרְמְנוֹת -> «ciudadelas» en el texto principal, dejando «palacios» como alternativa en nota, para alinearse con la decisión POB. También conviene mantener la forma onomástica «Ben-hadad».
