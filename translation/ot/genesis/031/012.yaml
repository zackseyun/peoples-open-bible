id: GEN.31.12
reference: Genesis 31:12
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר שָׂא נָ֨א עֵינֶ֤י/ךָ וּ/רְאֵה֙ כָּל הָֽ/עַתֻּדִים֙ הָ/עֹלִ֣ים עַל הַ/צֹּ֔אן עֲקֻדִּ֥ים נְקֻדִּ֖ים וּ/בְרֻדִּ֑ים כִּ֣י רָאִ֔יתִי אֵ֛ת כָּל אֲשֶׁ֥ר לָבָ֖ן עֹ֥שֶׂה לָּֽ/ךְ־־־־׃
translation:
  text: 'And he said[a], “Please lift up your eyes and see: all the male goats that are mating with the flock are striped, speckled, and spotted[b], for I have seen all that Laban is doing to you.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “mounting the flock.” The Hebrew expression is a breeding idiom.
    reason: lexical_alternative
  - marker: b
    text: Traditional translations often render עֲקֻדִּים as “ring-streaked.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂא נָא עֵינֶיךָ
  chosen: Please lift up your eyes
  alternatives:
  - Look up
  - Raise your eyes, please
  lexicon: HALOT
  rationale: שָׂא with עיניים is an idiom meaning to raise one's eyes/look up. Including 'please' reflects נָא as a polite particle without making the English wooden.
- source_word: וּרְאֵה
  chosen: and see
  alternatives:
  - and look
  - and behold
  lexicon: HALOT
  rationale: A straightforward imperative from ראה. 'See' fits modern readable English and preserves the visual emphasis of the dream scene.
- source_word: הָעַתֻּדִים
  chosen: the male goats
  alternatives:
  - the he-goats
  - the rams
  lexicon: HALOT
  rationale: עתודים commonly refers to male goats/bucks. 'Rams' would suggest male sheep and is less likely here given the broader flock context. 'Male goats' is clear modern English.
- source_word: הָעֹלִים עַל הַצֹּאן
  chosen: that are mating with the flock
  alternatives:
  - that are mounting the flock
  - that are going up upon the flock
  lexicon: HALOT
  rationale: עלה על in animal-breeding context is a euphemistic expression for mounting in mating. 'Mating with' communicates the sense naturally in English while avoiding an overly literal but potentially awkward rendering.
- source_word: עֲקֻדִּים
  chosen: streaked
  alternatives:
  - striped
  - ring-streaked
  - banded
  lexicon: HALOT
  rationale: The adjective denotes marked with bands or streaks. 'Streaked' is concise and idiomatic; 'ring-streaked' is traditional but less transparent to modern readers.
- source_word: נְקֻדִּים
  chosen: speckled
  alternatives:
  - spotted
  - dotted
  lexicon: HALOT
  rationale: This term refers to small spots or speckles. 'Speckled' distinguishes it from the following broader term for spotted/patchy marking.
- source_word: וּבְרֻדִּים
  chosen: spotted
  alternatives:
  - mottled
  - dappled
  - patchy
  lexicon: HALOT
  rationale: ברד in this adjectival form refers to variegated or spotted animals. 'Spotted' is the most accessible rendering, while preserving distinction from 'speckled' as much as English allows.
- source_word: כִּי רָאִיתִי
  chosen: for I have seen
  alternatives:
  - because I have seen
  - for I see
  lexicon: HALOT
  rationale: The perfect verb naturally conveys completed perception with present relevance. 'For I have seen' preserves the causal force of כִּי and the completed aspect.
- source_word: אֵת כָּל אֲשֶׁר לָבָן עֹשֶׂה לָּךְ
  chosen: all that Laban is doing to you
  alternatives:
  - everything that Laban has done to you
  - all that Laban is doing for you
  lexicon: HALOT
  rationale: The participle עֹשֶׂה suggests ongoing action, so 'is doing' is preferable to a simple past. The preposition with pronominal suffix here is best taken as disadvantage/affected person, 'to you,' in context of Laban's treatment of Jacob, not benefactive 'for you'.
