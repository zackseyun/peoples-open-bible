translation:
  text: And when all this happened[a], from that fiery stream and their convulsion in that place, a smell of sulfur was produced and joined with those waters[c][b]; and that valley of the angels who led astray burns beneath that land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English 'brimstone' is a possible rendering for the sulfur term here.
    reason: lexical_alternative
  - marker: b
    text: The Ge'ez of this verse is difficult in places; 'it was joined with those waters' may also be understood as 'it mixed with those waters.'
    reason: alternative_reading
  - marker: c
    text: Or 'And all this happened from that fiery stream, and in that place there was produced a smell of sulfur'.
    reason: previous_rendering
lexical_decisions:
- source_word: ነጠብጣብ እሳት
  chosen: fiery stream
  alternatives:
  - stream of fire
  - torrent of fire
  - dripping fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The compound literally evokes dripping/dropping fire, but in context of a geothermal/judgment scene a continuous fiery flow is more natural in English. 'Fiery stream' preserves the image without over-literal awkwardness.
- source_word: ሀውኮሙ
  chosen: smell of sulfur
  alternatives:
  - sulfur
  - stench
  - bitumen smell
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context the term is commonly associated with sulfurous exhalation in a burning place. 'Smell of sulfur' preserves both the material and the sensory force better than a bare 'sulfur'.
- source_word: መካን
  chosen: place
  alternatives:
  - region
  - spot
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward locative term; 'place' is suitably broad and keeps the visionary register.
- source_word: ተወልደ
  chosen: was produced
  alternatives:
  - was born
  - came forth
  - arose
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Though literally 'was born,' English uses 'was produced' more naturally for the emergence of sulfurous odor while still reflecting an arising from the place.
- source_word: ጼና ተይ
  chosen: smell of sulfur
  alternatives:
  - odor of brimstone
  - sulfurous smell
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to sulfur/brimstone odor. 'Sulfur' is preferred over 'brimstone' for modern readability, while the footnote preserves the traditional alternative.
- source_word: ተኃብረ ምስለ እልኩ ማያት
  chosen: it was joined with those waters
  alternatives:
  - it mixed with those waters
  - it was combined with those waters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates joining or association. 'Was joined with' is slightly more formal and leaves open whether the sense is physical mixing or close conjunction.
- source_word: ቈላ
  chosen: valley
  alternatives:
  - ravine
  - hollow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In Enochic topography this term regularly denotes a valley-like depression. 'Valley' is the clearest and most consistent rendering.
- source_word: እንተ መላእክት እለ አስሐቱ
  chosen: of the angels who led astray
  alternatives:
  - of the angels who deceived
  - of the angels who misled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause identifies the angels by their act of leading others into error. 'Led astray' preserves moral and theological force without narrowing the object too specifically.
- source_word: ትነድድ መትሕተ ይእቲ ምድር
  chosen: burns beneath that land
  alternatives:
  - is burning under that ground
  - burns underneath that earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause depicts ongoing subterranean burning. 'Land' is preferred over 'earth' here because the immediate sense is local terrain rather than the whole world.
