translation:
  language: es
  text: Y levantaré para ellos un plantío de renombre[a], y ya no serán consumidos por el hambre en el país[b], ni volverán a llevar la deshonra de las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para un nombre», es decir, «un plantío famoso o de renombre».'
    reason: lexical_alternative
  - marker: b
    text: La frase hebrea traducida «consumidos por el hambre» es difícil; más literalmente, «los reunidos por causa del hambre», posiblemente con el sentido de «víctimas del hambre» o «consumidos por el hambre».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִמֹתִי
  english_pob_choice: I will raise up
  chosen_spanish: levantaré
  alternatives_spanish:
  - estableceré
  - haré surgir
  lexicon: HALOT
  rationale: El hiphil de קום expresa hacer levantar/poner en pie o establecer. «Levantaré» conserva la iniciativa divina y suena natural en español.
- source_word: מַטָּע
  english_pob_choice: a planting
  chosen_spanish: una plantación
  alternatives_spanish:
  - un plantío
  - una siembra
  - un lugar de plantación
  lexicon: HALOT
  rationale: El sustantivo designa algo plantado o una plantación. «Plantación» mantiene la imagen agrícola sin forzar una identificación más precisa que el hebreo no explicita.
- source_word: לְשֵׁם
  english_pob_choice: of renown
  chosen_spanish: de renombre
  alternatives_spanish:
  - para un nombre
  - de fama
  lexicon: HALOT
  rationale: La expresión literal es «para un nombre», pero en español idiomático la idea es prestigio o reputación. «De renombre» conserva el valor idiomático sin perder la cercanía al hebreo.
- source_word: אֲסֻפֵי רָעָב
  english_pob_choice: consumed by famine
  chosen_spanish: consumidos por el hambre
  alternatives_spanish:
  - arrastrados por el hambre
  - víctimas del hambre
  - reunidos por el hambre
  lexicon: HALOT
  rationale: La construcción es difícil; el participio pasivo de אסף es literalmente «reunidos», pero el contexto apunta a personas afectadas o eliminadas por el hambre. «Consumidos por el hambre» sigue de cerca la decisión auditada en inglés y evita un literalismo opaco.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  lexicon: HALOT
  rationale: En Ezequiel, אֶרֶץ suele referirse a la tierra/corresponde al ámbito de la tierra prometida. «En la tierra» conserva ese sentido sin introducir una especificación excesiva.
- source_word: יִשְׂאוּ
  english_pob_choice: bear
  chosen_spanish: llevar
  alternatives_spanish:
  - cargar
  - soportar
  lexicon: HALOT
  rationale: נשא puede significar levantar, cargar o llevar. Con «deshonra» como objeto, «llevar» expresa bien la idea de cargar con vergüenza pública.
- source_word: כְּלִמַּת
  english_pob_choice: the disgrace
  chosen_spanish: la deshonra
  alternatives_spanish:
  - la vergüenza
  - la humillación
  lexicon: HALOT
  rationale: El sustantivo expresa vergüenza, afrenta o deshonra. «Deshonra» comunica adecuadamente el oprobio público y covenantal del texto.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En los profetas, גוים suele referirse a las naciones circundantes. «Las naciones» es la opción estándar y menos ambigua.
theological_decisions:
- issue: Naturaleza de la «plantación» prometida
  english_pob_reading: Rendered as an agricultural image ('a planting of renown') rather than explicitly identifying it as a messianic person or solely as restored agricultural abundance.
  chosen_spanish_reading: Se mantiene como una imagen agrícola («una plantación de renombre») sin identificarla explícitamente como una persona mesiánica ni reducirla solo a abundancia agrícola.
  alternative_spanish_readings:
  - un renuevo mesiánico
  - una plantación famosa
  - una tierra fértil restaurada
  rationale: El hebreo es metafórico y no especifica de manera inequívoca si la imagen apunta a una figura personal, al pueblo restaurado o a fertilidad renovada. La traducción preserva la tensión interpretativa sin imponer una conclusión doctrinal.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: La redacción sigue la última revisión auditada del inglés POB, que prefirió «consumed by famine» por ser una solución más natural y directa para la frase קשה אֲסֻפֵי רָעָב, y conservó la imagen de «planting of renown» sin resolverla interpretativamente.
  spanish_consistency_notes:
  - Se usó «renombre» para לְשֵׁם, alineado con el valor idiomático «for a name/of renown».
  - Se mantuvo «las naciones» para הַגּוֹיִם, sin sustituirlo por «gentiles».
  - Se prefirió «deshonra» para כְּלִמָּה por el matiz público y vergonzante del sustantivo.
  - La nota a pie de página b acompaña el giro difícil de אֲסֻפֵי רָעָב y preserva la alternativa literal sin sobrecargar el texto principal.
