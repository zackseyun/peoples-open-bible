  to: 'Oráculo acerca de las bestias del Negev[a]: por una tierra de angustia y dificultad, de leona y león[b], de víbora y serpiente ardiente que vuela, llevan sus riquezas sobre los hombros de asnos y sus tesoros sobre las jorobas de camellos, a un pueblo que no les aprovechará[c].'
