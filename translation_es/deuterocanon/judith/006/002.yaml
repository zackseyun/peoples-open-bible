base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/006/002.yaml
  text: And who are you[a], Achior, and the hirelings of Ephraim among all the sons of Moab, that you have prophesied among us as you did today, and said that one should not make war against the house of Israel because their God will defend them? And who is God except Nebuchadnezzar? He himself will send his force and destroy them from the face of the earth[c][b], and their God will not rescue them.
  footnotes:
  - marker: a
    text: Or 'mercenaries of Ephraim.' The Greek term denotes men serving for pay and may carry a contemptuous tone.
    reason: lexical_alternative
  - marker: b
    text: Or 'the people of Israel.' The Greek says 'the race/stock of Israel,' emphasizing ethnic lineage.
    reason: lexical_alternative
  - marker: c
    text: The speaker's 'who is god except Nebuchadnezzar?' is a boastful claim, not the narrator's endorsement.
    reason: cultural_note
