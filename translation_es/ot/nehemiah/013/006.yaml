translation:
  language: es
  text: Pero durante todo esto yo no estaba en Jerusalén, porque en el año treinta y dos de Artajerjes, rey de Babilonia[a], fui al rey, y después de algún tiempo[b] pedí permiso al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «rey de Babilonia». Se traduce tal como está escrito, sin armonizarlo con el contexto imperial persa más amplio.'
    reason: textual_variant
  - marker: b
    text: 'O: «al cabo de algunos días» / «después de un período de tiempo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכָל זֶה
  english_pob_choice: But during all this
  chosen_spanish: Pero durante todo esto
  alternatives_spanish:
  - Y durante todo esto
  - Ahora bien, durante todo esto
  lexicon: HALOT
  rationale: La frase introduce el trasfondo temporal de lo narrado, no solo una conexión lógica. 'Durante todo esto' conserva esa duración continua y en español suena natural.
- source_word: לֹא הָיִיתִי בִּירוּשָׁלִָם
  english_pob_choice: I was not in Jerusalem
  chosen_spanish: yo no estaba en Jerusalén
  alternatives_spanish:
  - no había estado en Jerusalén
  lexicon: HALOT
  rationale: El hebreo expresa ausencia pasada en el marco narrativo. En español, el imperfecto 'estaba' comunica mejor esa situación continua que un pluscuamperfecto más marcado.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la explicación de la ausencia. 'Porque' expresa con claridad esa relación causal-explicativa en español contemporáneo.
- source_word: בִּשְׁנַת שְׁלֹשִׁים וּשְׁתַּיִם
  english_pob_choice: in the thirty-second year
  chosen_spanish: en el año treinta y dos
  alternatives_spanish:
  - en el año trigésimo segundo
  lexicon: HALOT
  rationale: La datación regnal se vierte de manera idiomática y transparente. 'Año treinta y dos' es más natural en español que una forma ordinal solemne.
- source_word: לְאַרְתַּחְשַׁסְתְּא
  english_pob_choice: of Artaxerxes
  chosen_spanish: de Artajerjes
  alternatives_spanish:
  - del rey Artajerjes
  lexicon: HALOT
  rationale: Se translitera el nombre con la forma española habitual. El genitivo se expresa con 'de' para mantener la relación nominal del hebreo.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - rey babilonio
  lexicon: HALOT
  rationale: Se conserva la construcción del texto hebreo sin armonizarla con el trasfondo histórico más amplio. 'Rey de Babilonia' preserva la tensión textual documentada por la POB.
- source_word: בָּאתִי אֶל הַמֶּלֶךְ
  english_pob_choice: I went to the king
  chosen_spanish: fui al rey
  alternatives_spanish:
  - vine al rey
  - me acerqué al rey
  lexicon: HALOT
  rationale: El verbo de movimiento se traduce de forma natural desde el punto de vista del narrador. 'Fui al rey' mantiene la dirección sin sonar forzado.
- source_word: וּלְקֵץ יָמִים
  english_pob_choice: after some time
  chosen_spanish: al cabo de algunos días
  alternatives_spanish:
  - después de un tiempo
  - tras cierto tiempo
  lexicon: HALOT
  rationale: La locución hebrea es idiomática. 'Al cabo de algunos días' conserva la idea de un lapso indefinido con un giro bíblico claro en español.
- source_word: נִשְׁאַלְתִּי מִן הַמֶּלֶךְ
  english_pob_choice: I asked leave from the king
  chosen_spanish: pedí permiso al rey
  alternatives_spanish:
  - solicité permiso al rey
  - pedí licencia al rey
  lexicon: HALOT
  rationale: El nifal de שאל aquí expresa la petición de salida o autorización. 'Pedí permiso' comunica con precisión la acción sin sobreafirmar el resultado.
theological_decisions:
- issue: El título 'rey de Babilonia' aplicado a Artajerjes
  english_pob_reading: The text is translated as written rather than harmonized to the broader Persian imperial setting.
  chosen_spanish_reading: rey de Babilonia
  alternative_spanish_readings:
  - rey persa
  - rey de Persia
  rationale: Se mantiene la lectura textual del hebreo, aun si crea tensión histórica. Esto respeta la decisión de la POB de no armonizar el texto.
  doctrine_reference: Fidelidad textual / crítica textual implícita
- issue: Valor de la ausencia de Nehemías durante el periodo narrado
  english_pob_reading: But during all this I was not in Jerusalem
  chosen_spanish_reading: Pero durante todo esto yo no estaba en Jerusalén
  alternative_spanish_readings:
  - Pero durante todo esto no había estado en Jerusalén
  rationale: Se preserva la afirmación simple de ausencia sin ampliar innecesariamente la temporalidad. El imperfecto mantiene la continuidad del estado descrito.
  doctrine_reference: Narrativa histórica / aspecto verbal
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés de la POB, sin cambios de sentido. Se mantuvo la nota textual sobre «rey de Babilonia» y la alternativa lexical para וּלְקֵץ יָמִים. No se detectaron revisiones aplicadas en el pasaje de referencia.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantiene «Artajerjes» como forma española estándar del nombre propio.
  - Se prefiere «permiso» frente a «licencia» por claridad moderna y neutralidad eclesial.
  - Se conserva la tensión textual de «rey de Babilonia» sin corrección contextual.
