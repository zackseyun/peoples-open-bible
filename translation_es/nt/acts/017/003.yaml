translation:
  language: es
  text: explicando y demostrando que el Mesías tenía que sufrir y resucitar[a] de entre los muertos, y que este Jesús, a quien yo les proclamo, es el Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo» en ambas ocurrencias de «Mesías».
    reason: alternative_reading
lexical_decisions:
- source_word: διανοίγων
  english_pob_choice: explaining
  chosen_spanish: explicando
  alternatives_spanish:
  - abriendo el sentido
  - interpretando
  lexicon: BDAG
  rationale: El participio describe la acción de abrir el entendimiento del texto o hacer claro su significado. «Explicando» conserva esa función de aclaración sin añadir más de lo que el griego señala.
- source_word: παρατιθέμενος
  english_pob_choice: demonstrating
  chosen_spanish: demostrando
  alternatives_spanish:
  - presentando
  - exponiendo
  - probando
  lexicon: BDAG
  rationale: En contexto, el verbo complementa a «explicando» con la idea de poner delante argumentos o evidencias. «Demostrando» conserva la fuerza argumentativa sin exigir un tecnicismo lógico ajeno al pasaje.
- source_word: τὸν χριστόν
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no como nombre propio. «Mesías» preserva mejor el trasfondo judío-escritural y la expectativa del ungido prometido.
- source_word: ἔδει
  english_pob_choice: had to
  chosen_spanish: tenía que
  alternatives_spanish:
  - era necesario que
  - debía
  lexicon: BDAG
  rationale: La forma expresa necesidad divina o escrituraria en pasado. «Tenía que» es natural en español y mantiene esa necesidad sin volverla excesivamente formal.
- source_word: παθεῖν
  english_pob_choice: suffer
  chosen_spanish: sufrir
  alternatives_spanish:
  - padecer
  lexicon: BDAG
  rationale: El verbo se refiere al sufrimiento del Mesías, probablemente en su pasión. «Sufrir» es claro y fiel; «padecer» sería una alternativa más tradicional pero menos directa en español moderno.
- source_word: ἀναστῆναι ἐκ νεκρῶν
  english_pob_choice: rise from the dead
  chosen_spanish: resucitar de entre los muertos
  alternatives_spanish:
  - levantarse de entre los muertos
  - volver a la vida de entre los muertos
  lexicon: BDAG
  rationale: Aunque el griego usa un infinitivo activo de ἀνίστημι, en español «resucitar» comunica de manera natural la acción de levantarse de la muerte. Se añade «de entre los muertos» para reflejar ἐκ νεκρῶν.
- source_word: οὗτός ἐστιν
  english_pob_choice: this ... is
  chosen_spanish: este Jesús ... es
  alternatives_spanish:
  - este es
  - él es este
  lexicon: BDAG
  rationale: El demostrativo apunta a Jesús, ya identificado en el discurso. En español conviene mantener la estructura natural con el nombre intercalado entre sujeto y predicado.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: 'Se conserva la misma decisión terminológica que en la primera ocurrencia: uso titular de Χριστός, por lo que «Mesías» es la opción más fiel y contextual.'
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesucristo
  lexicon: BDAG
  rationale: Nombre propio transliterado de manera estándar al español.
- source_word: καταγγέλλω
  english_pob_choice: I proclaim
  chosen_spanish: anuncio
  alternatives_spanish:
  - proclamo
  - declaro públicamente
  lexicon: BDAG
  rationale: El verbo conserva el matiz de anuncio público y proclamación. «Anuncio» es natural en español y suficientemente fuerte para el tono misionero del pasaje.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - a ustedes
  - les
  lexicon: BDAG
  rationale: La dative con καταγγέλλω puede expresarse como destinatarios del anuncio. «Entre ustedes» conserva el valor discursivo de una proclamación pública dirigida al auditorio, aunque «a ustedes» también sería posible.
theological_decisions:
- issue: Renderizado de Χριστός como título en dos ocurrencias cercanas a Jesús
  english_pob_reading: the Messiah in both instances
  chosen_spanish_reading: el Mesías en ambas ocurrencias
  alternative_spanish_readings:
  - el Cristo
  rationale: El argumento de Pablo es que el ungido esperado debía sufrir y resucitar, y que Jesús cumple esa identidad. Traducir como «Mesías» mantiene el sentido titular y el marco judío-bíblico del pasaje.
  doctrine_reference: 'DOCTRINE.md: Χριστός como «Mesías» cuando funciona como título; «Cristo» reservado para usos fijados o de nombre-forma.'
- issue: Valor verbal de ἀναστῆναι
  english_pob_reading: rise from the dead
  chosen_spanish_reading: resucitar de entre los muertos
  alternative_spanish_readings:
  - ser resucitado de entre los muertos
  rationale: El griego usa infinitivo activo, por lo que la forma más directa es una construcción activa en español. «Resucitar» refleja el evento sin introducir la pasividad de «ser resucitado», aunque la teología más amplia del NT afirme también la acción de Dios.
  doctrine_reference: 'DOCTRINE.md: primacía del texto original; evitar importar una formulación verbal distinta a la del versículo.'
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no hubo cambios necesarios y que el texto se mantuvo estable; esta propuesta sigue esa línea, conservando la decisión titular de Χριστός como «Mesías» y la fuerza activa de ἀναστῆναι en español.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός como título, en continuidad con la política terminológica del proyecto.
  - Se evita «SEÑOR» o «Cristo» como sustitutos por defecto, porque este versículo trata del título mesiánico, no de una fórmula litúrgica fija.
  - Se usa «entre ustedes» para dar naturalidad al destinatario plural sin perder el carácter público de la proclamación.
  - «Resucitar» se emplea para expresar el infinitivo activo griego de modo idiomático en español, sin alterar el contenido doctrinal del pasaje.
