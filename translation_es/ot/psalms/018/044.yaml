  text: תְּפַלְּטֵ/נִי֮ מֵ/רִ֪יבֵ֫י עָ֥ם תְּ֭שִׂימֵ/נִי לְ/רֹ֣אשׁ גּוֹיִ֑ם עַ֖ם לֹא יָדַ֣עְתִּי יַֽעַבְדֽוּ/נִי־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/018/044.yaml
  text: You rescue me from the strivings of the people[a]; you set me as the head of nations[d][c][b]; a people whom I have not known serve me.
  footnotes:
