base_translation:
  language: en
  yaml_path: translation/ot/judges/009/028.yaml
  text: And Gaal son of Ebed said[a], “Who is Abimelek, and who is Shechem, that we should serve him? Is he not the son of Jerubbaal, and Zebul his officer? Serve the men of Hamor[c][b], the father of Shechem! But why should we serve him?”
  footnotes:
  - marker: a
    text: Or, 'Who is Abimelek, and what is Shechem...?' The Hebrew names 'Shechem' directly, likely referring metonymically to the city or its ruling community.
    reason: lexical_alternative
  - marker: b
    text: '''His officer'' may also be rendered ''his deputy'' or ''his appointed official.'''
    reason: lexical_alternative
  - marker: c
    text: That is, the people descended from or associated with Hamor, remembered as the father/founder of Shechem; compare Genesis 34.
    reason: cross_reference
