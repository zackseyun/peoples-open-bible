revisions:
- from: Los terrones del valle le son dulces[a]; todo hombre[b] lo sigue[c], y los que van delante de él son innumerables.
  to: Los terrones del valle le son dulces[a]; toda la humanidad[b] va tras él[c], y los que van delante de él son innumerables.
  rationale: Se ajusta «todo hombre lo sigue» a «toda la humanidad va tras él» para reflejar con mayor fidelidad el valor colectivo de כָּל אָדָם y la relación espacial/temporal explícita de וְאַחֲרָיו. El resto del versículo se mantiene porque representa bien la imaginería y el tono del hebreo y del POB auditado.
