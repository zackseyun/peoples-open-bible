base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/012/017.yaml
  text: You may not eat within your gates the tithe of your grain[a], your new wine, or your oil, or the firstborn of your herd or your flock, or any of your vows that you vow, or your freewill offerings[c][b], or the contribution of your hand.
  footnotes:
  - marker: a
    text: Or 'in your towns.' The Hebrew is literally 'within your gates,' an idiom for one's local settlements.
    reason: lexical_alternative
  - marker: b
    text: Or 'your vows that you vow.' The expression likely refers to offerings associated with vows, not merely the vows as spoken promises.
    reason: lexical_alternative
  - marker: c
    text: Or 'the offering from your hand'; traditionally, 'the heave offering of your hand.'
    reason: lexical_alternative
