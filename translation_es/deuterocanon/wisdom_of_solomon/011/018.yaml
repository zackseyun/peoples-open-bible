lexical_decisions:
- source_word: νεοκτίστους
  english_pob_choice: newly created
  chosen_spanish: recién creadas
  alternatives_spanish:
  - nuevamente creadas
  - de reciente creación
  lexicon: LSJ
  rationale: El compuesto expresa criaturas traídas a existencia de manera nueva; 'recién creadas' conserva el sentido de creación sin sonar forzado en español.
- source_word: θυμοῦ πλήρεις
  english_pob_choice: full of rage
  chosen_spanish: llenas de furor
  alternatives_spanish:
  - llenas de ira
  - llenas de rabia
  lexicon: LSJ
  rationale: θυμός aquí denota pasión violenta o enojo intenso. 'Furor' mantiene la fuerza afectiva y el tono ominoso del pasaje.
- source_word: θῆρας
  english_pob_choice: wild beasts
  chosen_spanish: bestias salvajes
  alternatives_spanish:
  - fieras
  - bestias
  lexicon: LSJ
  rationale: θῆρες se refiere a animales salvajes y peligrosos. 'Bestias salvajes' es claro y conserva el matiz amenazante.
- source_word: ἀγνώστους
  english_pob_choice: unknown
  chosen_spanish: desconocidas
  alternatives_spanish:
  - extrañas
  - inconocidas
  lexicon: LSJ
  rationale: El adjetivo significa no conocidas o no familiares. 'Desconocidas' es la equivalencia más directa y natural.
- source_word: ἤτοι
  english_pob_choice: or else
  chosen_spanish: o bien
  alternatives_spanish:
  - o sea
  - o entonces
  lexicon: LSJ
  rationale: En este contexto introduce una segunda posibilidad o especificación. 'O bien' mantiene la estructura alternativa del griego con buena fluidez.
- source_word: πυρπνόον
  english_pob_choice: fiery
  chosen_spanish: ígneo
  alternatives_spanish:
  - de fuego
  - ardiente
  lexicon: LSJ
  rationale: El adjetivo alude al fuego en el compuesto. 'Ígneo' conserva el carácter marcadamente verbal y compacto del original, sin redundar.
- source_word: φυσῶντας ἆσθμα
  english_pob_choice: breathing out fiery breath
  chosen_spanish: exhalando un aliento ígneo
  alternatives_spanish:
  - soplando un aliento ígneo
  - exhalando fuego
  lexicon: LSJ
  rationale: La secuencia griega combina la idea de soplar/exhalar con 'aliento' o 'resuello'. 'Exhalando un aliento ígneo' refleja esa condensación y evita ampliar el texto más allá de lo permitido.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete 1909 y toma como guía la revisión inglesa más reciente, que ajustó la segunda cola a 'fiery breath' para acercarse más a πυρπνόον ... ἆσθμα. Se preserva esa decisión en español con 'aliento ígneo', evitando una paráfrasis más libre.
  spanish_consistency_notes:
  - Se mantiene 'bestias salvajes' para θῆρες, en coherencia con el uso POB de 'wild beasts'.
  - '''Furor'' se eligió por su fuerza retórica; no se suaviza a ''ira'' para no perder la intensidad del contexto.'
  - '''Ígneo'' responde al compuesto πυρπνόον y evita repetir fuego/aliento de modo innecesariamente pesado en la frase principal.'
