review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: conector causal («Porque»), llamado dirigido a mujeres, referencia explícita a Yahvé, modismo del oído que recibe, instrucción a las hijas, y distinción entre dos términos de duelo. Sin embargo, «Porque oigan...» suena menos natural que una exhortación directa con vocativo («Oigan... mujeres» o «Escuchen..., mujeres»), y «reciba su oído» en singular con posesivo singular resulta torpe en español y puede confundir el referente. También falta reflejar en la nota a que «mujeres» puede entenderse como vocativo directo, tal como lo preserva la auditoría inglesa.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero tiene dos problemas de naturalidad importantes: 1) el orden «Porque oigan la palabra de Yahvé, mujeres» es rígido; 2) «reciba su oído» no suena idiomático en español bíblico moderno neutral. Una leve reformulación puede preservar mejor el sentido hebreo y la legibilidad sin paraprasear. El resto —«Yahvé», «sus hijas», «lamentación», «canto fúnebre»— funciona bien.'
  glossary_alignment: 'Alineado en lo principal con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; género específico preservado («mujeres», «hijas», «cada mujer»); distinción entre términos de duelo mantenida. No hay conflicto doctrinal. La única mejora léxica recomendada es ajustar la expresión idiomática de escucha atenta en español.'
  issues:
  - severity: medium
    issue: Orden sintáctico poco natural en «Porque oigan la palabra de Yahvé, mujeres»
    rationale: Aunque formalmente posible, en español suena forzado. El hebreo tiene llamado directo a mujeres; una formulación como «Oigan la palabra de Yahvé, mujeres» o «Mujeres, oigan...» comunica mejor la exhortación.
  - severity: medium
    issue: «reciba su oído» es poco idiomático y puede sonar incorrecto
    rationale: El hebreo usa singular colectivo, pero en español «su oído» con destinatarias plurales suena ambiguo. «presten oído» preserva mejor el modismo de escucha atenta sin aplanarlo excesivamente.
  - severity: low
    issue: La nota [a] no refleja la alternativa vocativa de la auditoría inglesa
    rationale: El POB inglés conserva la posibilidad «listen, women». En español conviene anotar la alternativa de orden/vocativo para reflejar esa posibilidad fuente.
