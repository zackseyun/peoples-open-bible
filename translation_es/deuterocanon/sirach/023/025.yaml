review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: mantiene la imagen familiar y botánica, y traduce con naturalidad οὐ διαδώσουσιν… εἰς ῥίζαν como «no echarán raíz» y οὐ δώσουσιν καρπόν como «no darán fruto». Sin embargo, la nota al pie está mal formulada: presenta como alternativa exactamente la misma frase que ya aparece en el texto principal, cuando en realidad la alternativa documentada en la auditoría inglesa es una explicación más literal del griego, del tipo «no se extenderán hacia una raíz».'
  spanish_quality_summary: El español es claro, natural y digno. «Sus hijos no echarán raíz, y sus ramas no darán fruto» suena bien en registro bíblico moderno. Solo requiere corrección menor en la nota para evitar redundancia y para representar fielmente la relación entre la traducción principal y la alternativa literal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Hijos», «ramas» y «fruto» son adecuados; no aparecen términos sensibles del glosario general. La decisión de usar «echar raíz» está bien justificada como equivalente idiomático español del griego botánico.
  issues:
  - severity: medium
    issue: La nota al pie repite el texto principal en vez de dar una alternativa real.
    rationale: 'El texto principal ya dice «Sus hijos no echarán raíz[a]». La nota comienza «O: «Sus hijos no echarán raíz»», lo cual no aporta una variante. Según la auditoría inglesa, la nota debe preservar la formulación más literal del griego, no duplicar la traducción adoptada.'
  revised_spanish_text: Sus hijos no echarán raíz[a], y sus ramas no darán fruto;
  revised_footnotes:
  - marker: a
    text: 'O: «Sus hijos no se extenderán hacia una raíz». El griego literalmente dice «se extenderán hacia una raíz», una imagen botánica idiomática de no llegar a establecerse.'
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel, natural y bien motivado. Solo se corrige la nota al pie para que presente una alternativa verdadera y documente adecuadamente la formulación más literal del griego, en vez de repetir la lectura ya adoptada en español.
