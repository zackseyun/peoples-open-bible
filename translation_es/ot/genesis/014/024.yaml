translation:
  language: es
  text: No tomaré nada, excepto únicamente lo que han comido los jóvenes[a], y la parte de los hombres que fueron conmigo —Aner, Eshcol y Mamre—. Que tomen su parte.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “lo que han comido los sirvientes/criados”. El hebreo נְּעָרִים puede referirse a jóvenes o a asistentes de servicio, según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “ellos tomarán su parte”. La forma hebrea puede leerse como futuro simple, aunque el contexto favorece un sentido de permiso: “Que tomen”.'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּלְעָדַי
  english_pob_choice: I will take nothing except
  chosen_spanish: No tomaré nada, excepto
  alternatives_spanish:
  - salvo
  - aparte de
  - excepto
  lexicon: HALOT
  rationale: El hebreo introduce una exclusión que depende del rechazo previo de Abram. En español, “No tomaré nada, excepto” expresa con naturalidad esa restricción sin perder el sentido exceptivo de בִּלְעָדַי.
- source_word: רַק
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solamente
  - solo
  lexicon: HALOT
  rationale: רַק refuerza la limitación ya expresada. “Solo” conserva ese énfasis restrictivo en un español actual y digno, sin volver la frase innecesariamente pesada.
- source_word: אֲשֶׁר אָֽכְל֣וּ הַנְּעָרִים
  english_pob_choice: what the young men have eaten
  chosen_spanish: lo que han comido los jóvenes
  alternatives_spanish:
  - lo que han comido los muchachos
  - lo que han comido los sirvientes
  - lo que han comido los retenedores
  lexicon: HALOT
  rationale: נְּעָרִים puede referirse a jóvenes o a acompañantes/servidores según el contexto. Aquí el sentido natural es el grupo de hombres de Abram que consumió provisiones en la campaña; “jóvenes” preserva el término hebreo sin imponer una etiqueta social más interpretativa.
- source_word: וְחֵלֶק
  english_pob_choice: and the share
  chosen_spanish: y la parte
  alternatives_spanish:
  - y la porción
  - y la cuota
  lexicon: HALOT
  rationale: חֵלֶק alude a la porción asignada. “Parte” es la forma más natural en español para el reparto de botín o bienes, y mantiene el valor distributivo del hebreo.
- source_word: הָאֲנָשִׁים אֲשֶׁר הָלְכוּ אִתִּי
  english_pob_choice: of the men who went with me
  chosen_spanish: de los hombres que fueron conmigo
  alternatives_spanish:
  - de los hombres que me acompañaron
  - de los hombres que caminaron conmigo
  lexicon: HALOT
  rationale: La construcción identifica a los aliados de Abram. “Fueron conmigo” conserva la imagen verbal de הָלְכוּ y su relación de compañía sin exagerar el matiz.
- source_word: עָנֵר אֶשְׁכֹּל וּמַמְרֵא
  english_pob_choice: Aner, Eshcol, and Mamre
  chosen_spanish: Aner, Eshcol y Mamre
  alternatives_spanish:
  - Aner, Escol y Mamré
  lexicon: transliteration
  rationale: Los nombres propios se transliteran de forma estable. Se mantiene la grafía bíblica común en español para facilitar la lectura e identificación.
- source_word: הֵם יִקְחוּ חֶלְקָם
  english_pob_choice: Let them take their share
  chosen_spanish: Que ellos tomen su parte
  alternatives_spanish:
  - Ellos tomarán su parte
  - Permítaseles tomar su parte
  lexicon: HALOT
  rationale: El imperfecto aquí expresa permiso o concesión en contexto. “Que ellos tomen” comunica bien esa autorización, evitando leerlo solo como un futuro declarativo.
theological_decisions:
- issue: La frase exceptiva depende de la negativa previa de Abram en el contexto inmediato
  english_pob_reading: I will take nothing except ...
  chosen_spanish_reading: No tomaré nada, excepto ...
  alternative_spanish_readings:
  - Excepto ...
  - Solo ...
  rationale: El sentido completo depende del rechazo de Abram a enriquecerse con los bienes de Sodoma. En español conviene explicitar la negativa para que no se pierda la fuerza ética de la declaración, sin añadir contenido doctrinal ajeno al texto.
  doctrine_reference: Génesis 14:22-24; integridad y rechazo del botín indebido
- issue: El plural verbal final puede leerse como permiso más que como simple predicción
  english_pob_reading: Let them take their share
  chosen_spanish_reading: Que ellos tomen su parte
  alternative_spanish_readings:
  - Ellos tomarán su parte
  - Que reciban su parte
  rationale: 'La forma hebrea puede entenderse como futuro, pero el contexto favorece la concesión: Abram autoriza a sus aliados a tomar su porción. La traducción preserva esa tensión sin borrarla.'
  doctrine_reference: Génesis 14:24; matiz aspectual/modal del hebreo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que consolidó la restricción de רַק como 'only' y mantuvo la lectura permisiva del final. La redacción española refleja ambos puntos con 'solo' y con un subjuntivo exhortativo/concesivo ('Que ellos tomen'), sin aplanar la posible alternativa futura.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto cuando el texto no presenta el Tetragrámaton de forma explícita; este verso no requiere decisión sobre el nombre divino.
  - Se prefirió 'jóvenes' para נְּעָרִים, en continuidad con el valor léxico básico, y se dejó constancia de la alternativa 'sirvientes/acompañantes' en nota.
  - Se usó 'parte' para חֵלֶק por naturalidad bíblica en español y porque conserva el sentido distributivo de 'share'.
  - Se transliteraron los nombres propios según uso bíblico usual en español, sin adaptar la forma al castellano moderno.
