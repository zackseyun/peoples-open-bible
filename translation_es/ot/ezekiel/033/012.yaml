review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte la estructura y el sentido del hebreo y del POB inglés: mantiene el paralelismo entre justo/impío, conserva ''hijo de hombre'', ''los hijos de tu pueblo'', ''no lo librará'', y la última cláusula ''no podrá vivir por ella''. Sin embargo, la segunda cláusula altera de forma significativa la voz y el sentido de יִכָּשֶׁל בָּהּ. El hebreo dice que el impío ''no tropezará por ella'' o ''no caerá por ella'', no que la maldad ''no hará tropezar a este''. Ese cambio introduce un sujeto causativo no presente en el texto y debilita la metáfora explícita de tropezar del original y del POB auditado.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero la nota [a] está mal anclada: aparece sobre ''justicia'' aunque explica ''los hijos de tu pueblo/tu pueblo''. Además, ''no hará tropezar a este'' suena menos natural y más forzado que una traducción más directa como ''no tropezará por ella'', y ''a este'' es poco elegante en registro bíblico neutral. El resto del verso lee bien en español eclesial contemporáneo.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto en ''hijo de hombre'', ''justicia'', ''impío'', ''pecado''. No hay términos de glosario mayor en disputa. La principal desviación no es terminológica sino semántica: la representación de כשל debe conservar ''tropezar/caer'' con el impío como sujeto y ''ella'' refiriéndose a su maldad.'
  issues:
  - severity: high
    issue: La segunda cláusula cambia el sentido de יִכָּשֶׁל בָּהּ
    rationale: 'El hebreo tiene un verbo intransitivo/pasivo de tropiezo con el impío como sujeto: ''no tropezará por ella''. La redacción ''no hará tropezar a este'' convierte la maldad en sujeto causativo, lo cual no corresponde al original ni al POB inglés.'
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado
    rationale: La nota [a] explica 'los hijos de tu pueblo' frente a 'tu pueblo', pero el marcador aparece sobre 'justicia'. Debe ir junto a 'los hijos de tu pueblo'.
  - severity: low
    issue: Falta una nota para la alternativa 'caerá por ella' derivada del POB inglés
    rationale: El POB inglés conserva la alternativa 'he will not fall because of it'. Dado que en español la forma principal recomendada será 'no tropezará por ella', conviene preservar esa alternativa en nota.
