translation:
  language: es
  text: Hay quien resbala y no desde el alma[a]; ¿y quién no ha pecado con su lengua?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no intencionalmente»; literalmente, «no desde el alma».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστιν
  english_pob_choice: There is / may
  chosen_spanish: Hay quien
  alternatives_spanish:
  - Existe quien
  - Puede haber quien
  lexicon: LSJ
  rationale: El griego abre con una fórmula existencial proverbial. «Hay quien» conserva ese valor genérico y suena natural en español, sin añadir un sujeto explícito que el texto no da.
- source_word: ὀλισθάνων
  english_pob_choice: slips
  chosen_spanish: resbala
  alternatives_spanish:
  - se desliza
  - tropieza
  lexicon: LSJ
  rationale: El participio expresa la idea de deslizarse o resbalar. «Resbala» mantiene la imagen verbal y funciona bien para una falta moral o verbal sin cargar el sentido más de lo que el griego permite.
- source_word: οὐκ ἀπὸ ψυχῆς
  english_pob_choice: not from the soul / not intentionally
  chosen_spanish: no por el alma
  alternatives_spanish:
  - no desde el alma
  - no intencionalmente
  - sin intención
  lexicon: LSJ
  rationale: La expresión es literalmente «no desde el alma». En español, «no por el alma» conserva el enlace preposicional y la tensión léxica, dejando visible la rareza del original. No se aplana a una paráfrasis totalmente interpretativa en el texto principal.
- source_word: τίς οὐχ ἥμαρτεν
  english_pob_choice: who has not sinned
  chosen_spanish: ¿y quién no ha pecado?
  alternatives_spanish:
  - ¿y quién no ha errado?
  - ¿y quién no ha faltado?
  lexicon: LSJ
  rationale: ἁμαρτάνω tiene fuerza moral. «Pecado/pecar» preserva esa carga ética mejor que «errar», y mantiene la forma retórica del contraste sapiencial.
- source_word: ἐν τῇ γλώσσῃ αὐτοῦ
  english_pob_choice: with his tongue
  chosen_spanish: con su lengua
  alternatives_spanish:
  - con su habla
  - por su lengua
  lexicon: LSJ
  rationale: La imagen corporal del griego se conserva en «lengua». «Con su lengua» es más fiel que abstraer a «habla» y mantiene el vínculo con la responsabilidad verbal.
theological_decisions:
- issue: Valor moral de ἥμαρτεν en contexto sapiencial
  english_pob_reading: sinned
  chosen_spanish_reading: ha pecado
  alternative_spanish_readings:
  - ha errado
  - ha faltado
  rationale: El verso no describe solo un error accidental; presenta la palabra como ámbito real de culpa. «Ha pecado» conserva esa seriedad moral sin introducir doctrinas ajenas al texto.
  doctrine_reference: 'DOCTRINE.md: ἁμαρτάνω debe conservar fuerza moral cuando el contexto la exige.'
- issue: Sentido de οὐκ ἀπὸ ψυχῆς
  english_pob_reading: not from the soul / not intentionally
  chosen_spanish_reading: no por el alma
  alternative_spanish_readings:
  - no intencionalmente
  - no desde el alma
  rationale: El griego preserva una tensión entre literalidad y sentido idiomático. En el texto principal se deja visible la literalidad para no borrar la expresión; la nota aclara la lectura idiomática de ausencia de intención.
  doctrine_reference: 'DOCTRINE.md: no borrar tensiones léxicas documentadas; conservar alternativas relevantes.'
translation_notes:
  revision_awareness: 'El inglés audit trail revisó una paráfrasis más interpretativa («not mean it») para volver a una forma más literal («not from the soul»). La versión española sigue esa revisión: conserva la imagen del alma en el cuerpo del verso y solo en la nota presenta la equivalencia idiomática de intención/voluntariedad.'
  spanish_consistency_notes:
  - Se mantiene «lengua» para γλῶσσα por coherencia con la imagen corporal del original.
  - Se usa «pecado/pecar» para ἁμαρτάνω, en línea con su fuerza moral en literatura sapiencial.
  - No se introduce «Cristo», «Señor» ni terminología eclesiástica ajena al pasaje.
  - La estructura interrogativa final conserva el tono proverbial y universal del griego.
