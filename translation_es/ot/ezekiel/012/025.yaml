revisions:
- from: Porque yo soy Yahvé[a]; la palabra que yo hable será hecha. No se dilatará más, porque en vuestros días, oh casa rebelde, hablaré una palabra y la haré[b], declara el Señor Yahvé.
  to: Porque yo soy Yahvé[a]; la palabra que yo digo será hecha. Ya no se dilatará más[b], porque en sus días, oh casa rebelde, hablaré una palabra y la haré, declara el Señor Yahvé.
  rationale: 'Se corrigió la sintaxis principal para que el español exprese afirmación segura y no un matiz hipotético («la palabra que yo digo»). Se cambió «vuestros» por «sus» para ajustarse al español neutral latinoamericano. Se mantuvo «Yahvé» y «el Señor Yahvé» por consistencia con las decisiones léxicas y teológicas documentadas. También se repararon las notas: [a] ahora refleja la alternativa inglesa real, y [b] se ancla en la cláusula sobre la demora, que es donde pertenece.'
