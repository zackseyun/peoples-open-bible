revisions:
- from: Y si está bien escrito y ordenado adecuadamente[a], eso mismo yo también lo deseaba; pero si está mal y sólo medianamente hecho, esto era lo que estaba a mi alcance hacer.
  to: Y si está bien escrito y debidamente ordenado, eso mismo yo también deseaba; pero si está mal y sólo medianamente hecho[a], esto era lo que podía hacer.
  rationale: Se reubica la nota al pie en la frase negativa, que es el lugar al que realmente corresponde su explicación. Se ajusta «ordenado adecuadamente» a «debidamente ordenado» para un español más fluido sin perder el sentido composicional del griego. Se simplifica «esto era lo que estaba a mi alcance hacer» a «esto era lo que podía hacer», que preserva mejor la modestia y limitación expresadas por ἐφικτὸν ἦν μοι en un español natural.
