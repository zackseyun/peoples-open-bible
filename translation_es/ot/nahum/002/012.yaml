translation:
  language: es
  text: ¿Dónde está la guarida de los leones, el lugar donde se alimentaban[a] los leoncillos, donde andaban el león y la leona, donde estaba el cachorro del león[b], sin que nadie los espantara?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pastizal de los leoncillos». El término hebreo para «lugar donde se alimentaban» también puede denotar un lugar de pastoreo o de alimento, usado aquí metafóricamente dentro de la imagen del león.
    reason: lexical_alternative
  - marker: b
    text: O «gran león» para לָבִיא. El término puede entenderse en varios sentidos relacionados con leones, pero «leona» encaja mejor con la secuencia león, leona y cachorro.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיֵּה
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está
  alternatives_spanish:
  - ¿Dónde queda
  - ¿Dónde se halla
  lexicon: HALOT
  rationale: La pregunta retórica de ubicación en español suena natural con '¿Dónde está', conservando el tono de desafío del pasaje.
- source_word: מְעוֹן אֲרָיוֹת
  english_pob_choice: the lions’ den
  chosen_spanish: la guarida de los leones
  alternatives_spanish:
  - la cueva de los leones
  - la morada de los leones
  lexicon: HALOT
  rationale: '''Guarida'' comunica bien la imagen animal de refugio/habitación y corresponde al sentido del sustantivo en este contexto metafórico.'
- source_word: וּמִרְעֶה
  english_pob_choice: the feeding place
  chosen_spanish: el lugar de pasto
  alternatives_spanish:
  - el pastizal
  - el lugar de alimentación
  lexicon: HALOT
  rationale: Se preserva la nota de lugar donde se alimentan los leones. 'Lugar de pasto' mantiene la metáfora sin forzar una domesticación excesiva.
- source_word: לַכְּפִרִים
  english_pob_choice: of the young lions
  chosen_spanish: de los leoncillos
  alternatives_spanish:
  - de los leones jóvenes
  - de los cachorros de león
  lexicon: HALOT
  rationale: '''Leoncillos'' expresa de forma natural la idea de leones jóvenes y enlaza con la imagen de cría presente en el verso.'
- source_word: הָלַךְ
  english_pob_choice: walked
  chosen_spanish: andaban
  alternatives_spanish:
  - iban
  - caminaban
  lexicon: HALOT
  rationale: En español, el imperfecto plural de movimiento encaja con la escena habitual y continua; 'andaban' refleja el andar/pasear sin intensificar a 'merodeaban'.
- source_word: אַרְיֵה
  english_pob_choice: the lion
  chosen_spanish: el león
  alternatives_spanish:
  - un león
  lexicon: HALOT
  rationale: Traducción directa y estándar del singular, manteniendo la secuencia zoológica del pasaje.
- source_word: לָבִיא
  english_pob_choice: lioness
  chosen_spanish: la leona
  alternatives_spanish:
  - el gran león
  lexicon: HALOT
  rationale: En este contexto, 'leona' preserva mejor la pareja 'león / leona' y la progresión hacia el cachorro, tal como la POB inglesa entendió la secuencia.
- source_word: גּוּר אַרְיֵה
  english_pob_choice: the lion’s cub
  chosen_spanish: el cachorro del león
  alternatives_spanish:
  - el leoncillo
  - la cría del león
  lexicon: HALOT
  rationale: '''Cachorro del león'' mantiene la relación de pertenencia y la imagen de cría, siendo clara y fiel al hebreo constructo.'
- source_word: וְאֵין מַחֲרִיד
  english_pob_choice: with none to make them afraid
  chosen_spanish: y nadie los aterraba
  alternatives_spanish:
  - y nadie los hacía temer
  - y no había quien los espantara
  lexicon: HALOT
  rationale: El causativo de חרד se expresa naturalmente con 'aterroraba' en español; el sujeto indefinido se vuelve 'nadie' para reproducir el sentido de ausencia de quien infunda temor.
theological_decisions:
- issue: Imagen de poder derribado mediante metáfora zoológica
  english_pob_reading: Taunt over Nineveh's downfall using the lion’s den imagery; no doctrinal claim beyond the metaphor.
  chosen_spanish_reading: Lamento/taunt profético por la caída de Nínive, conservando íntegra la metáfora de los leones sin explicitarla alegóricamente.
  alternative_spanish_readings:
  - Desafío profético sobre Nínive
  - Ironía sobre la antigua fortaleza de Nínive
  rationale: El versículo funciona como burla profética del antiguo dominio asirio. En español conviene mantener la imagen concreta sin convertirla en explicación doctrinal o moralizante.
  doctrine_reference: Profecía menor; juicio contra Nínive (Nahúm 2:12).
translation_notes:
  revision_awareness: La redacción sigue de cerca la estructura hebrea y la revisión inglesa más reciente, especialmente la repetición de ‘where’ antes de la cláusula final, reflejada en español con 'donde estaba...'. Se preserva la ambigüedad léxica señalada por la POB en מִרְעֶה y לָבִיא mediante notas de alternativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto hebreo lo requiere explícitamente; aquí no aparece el nombre divino.
  - '''León/leona/leoncillos'' mantiene la secuencia zoológica destacada por la auditoría inglesa.'
  - '''Guarida'' se eligió por naturalidad y por corresponder al marco metafórico, no por tradición eclesiástica.'
  - No se introduce puntuación o expansión interpretativa ajena al hebreo; la duplicación de 'donde' refleja la estructura relativa del original.
