  text: בֶּן אַרְבָּעִ֨ים שָׁנָ֜ה אָנֹכִ֗י בִּ֠/שְׁלֹחַ מֹשֶׁ֨ה עֶֽבֶד יְהוָ֥ה אֹתִ֛/י מִ/קָּדֵ֥שׁ בַּרְנֵ֖עַ לְ/רַגֵּ֣ל אֶת הָ/אָ֑רֶץ וָ/אָשֵׁ֤ב אֹת/וֹ֙ דָּבָ֔ר כַּ/אֲשֶׁ֖ר עִם לְבָבִֽ/י־־־־׃
