revisions:
- from: El primer día habrá para ustedes una asamblea santa[a][b]; no harán ningún trabajo laborioso.
  to: El primer día habrá para ustedes una convocación santa[a]; no harán ningún trabajo ordinario[b].
  rationale: 'La revisión es pequeña pero mejora dos puntos clave: (1) recupera en español el matiz de convocatoria cultual de מִקְרָא mediante ''convocación santa'', en línea con la decisión inglesa documentada; y (2) sustituye ''trabajo laborioso'' por ''trabajo ordinario'', que representa mejor el sentido restringido de מְלֶאכֶת עֲבֹדָה en legislación festiva y suena más natural en español general.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:29:13Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del hebreo: marco temporal (''el primer día''), declaración cultual (''habrá para ustedes'') y prohibición legal. Sin embargo, ''asamblea santa'' atenúa el matiz de מִקְרָא como convocatoria/convocación, y ''trabajo laborioso'' suena menos natural en español y puede sugerir trabajo pesado más que trabajo ordinario de servicio. La nota sobre מְלֶאכֶת עֲבֹדָה sí preserva bien el trasfondo léxico.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse en naturalidad y precisión cultual. 'Habrá para ustedes' es aceptable, aunque 'tendrán' sería más idiomático; aun así, no es necesario cambiarlo. La combinación 'asamblea santa' más la nota alternativa que repite casi lo mismo no aprovecha bien la decisión léxica inglesa. 'Trabajo laborioso' es comprensible, pero menos idiomático y menos preciso que 'trabajo ordinario' en este contexto legal-festivo.
  glossary_alignment: No hay conflicto con los términos globales principales. La revisión propuesta mantiene el registro de Levítico y alinea mejor מִקְרָא קֹדֶשׁ con 'convocación santa', conservando 'asamblea sagrada/santa' como alternativas en nota. Para מְלֶאכֶת עֲבֹדָה, 'trabajo ordinario' comunica mejor la decisión documentada de 'ordinary labor' que 'trabajo laborioso'.
  issues:
  - severity: medium
    issue: מִקְרָא קֹדֶשׁ se vierte como 'asamblea santa'
    rationale: Aunque 'asamblea' es posible, el hebreo incluye el matiz de convocatoria/summons que el English POB quiso preservar con 'holy convocation'. En español bíblico y eclesial, 'convocación santa' transmite mejor ese matiz y sigue siendo inteligible.
  - severity: medium
    issue: La nota [a] ofrece una alternativa redundante con el texto principal
    rationale: 'Si el texto principal dice ''asamblea santa'', la alternativa ''asamblea santa'' no añade información útil. Conviene que el texto principal y la nota reflejen de forma coherente el abanico documentado: ''convocación santa'' en el texto, con ''asamblea sagrada'' o ''asamblea santa'' como alternativas.'
  - severity: medium
    issue: מְלֶאכֶת עֲבֹדָה se traduce 'trabajo laborioso'
    rationale: En español, 'laborioso' suele describir algo que requiere mucho esfuerzo, no necesariamente trabajo ordinario/ocupacional. El racional documentado enfatiza labor común de servicio, no intensidad. 'Trabajo ordinario' comunica mejor el alcance de la prohibición.
  revised_spanish_text: El primer día habrá para ustedes una convocación santa[a]; no harán ningún trabajo ordinario[b].
  revised_footnotes:
  - marker: a
    text: 'También: «una asamblea sagrada» o «una asamblea santa».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «trabajo de labor/servicio»; es decir, labor ordinaria. Tradicionalmente: «trabajo servil».'
    reason: lexical_alternative
  revision_rationale: 'La revisión es pequeña pero mejora dos puntos clave: (1) recupera en español el matiz de convocatoria cultual de מִקְרָא mediante ''convocación santa'', en línea con la decisión inglesa documentada; y (2) sustituye ''trabajo laborioso'' por ''trabajo ordinario'', que representa mejor el sentido restringido de מְלֶאכֶת עֲבֹדָה en legislación festiva y suena más natural en español general.'
