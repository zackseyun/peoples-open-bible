translation:
  language: es
  text: Salí de la boca del Altísimo, y como neblina cubrí la tierra;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξῆλθον
  english_pob_choice: came forth
  chosen_spanish: salí
  alternatives_spanish:
  - salí afuera
  - provení
  lexicon: BDAG
  rationale: El griego aoristo de ἐξέρχομαι expresa salida/origen. En español, «salí» comunica el movimiento de procedencia de forma natural y mantiene el tono elevado sin añadir matices no presentes en el texto.
- source_word: ἀπὸ στόματος
  english_pob_choice: from the mouth of
  chosen_spanish: de la boca de
  alternatives_spanish:
  - desde la boca de
  - de la boca
  lexicon: BDAG
  rationale: La metáfora de procedencia/locución se conserva con una construcción española directa y fluida. «De la boca de» mantiene la imagen verbal sin volverla más abstracta.
- source_word: Ὑψίστου
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  lexicon: BDAG
  rationale: «Altísimo» es el equivalente bíblico natural de Ὕψιστος y conserva el valor de título divino. Se evita una paráfrasis comparativa más literal pero menos idiomática.
- source_word: ὡς ὁμίχλη
  english_pob_choice: like a mist
  chosen_spanish: como neblina
  alternatives_spanish:
  - como niebla
  - como bruma
  lexicon: LSJ
  rationale: Ὁμίχλη designa una masa de humedad en el aire; «neblina» transmite bien la imagen poética en español y sugiere ligereza, acorde con el registro del verso.
- source_word: κατεκάλυψα
  english_pob_choice: I covered
  chosen_spanish: cubrí
  alternatives_spanish:
  - envolví
  - extendí sobre
  lexicon: BDAG
  rationale: El verbo compuesto significa cubrir por encima. «Cubrí» es la equivalencia más directa y mantiene la fuerza de la imagen sin sobreinterpretarla.
- source_word: γῆν
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - la tierra toda
  lexicon: BDAG
  rationale: En este contexto poético, γῆ abarca la tierra en sentido amplio. «La tierra» es la forma natural en español y conserva el alcance cósmico del enunciado.
theological_decisions:
- issue: Origen personificado de la Sabiduría desde Dios
  english_pob_reading: I came forth from the mouth of the Most High
  chosen_spanish_reading: Salí de la boca del Altísimo
  alternative_spanish_readings:
  - Fui dicha por el Altísimo
  - Provení del mandato del Altísimo
  rationale: La frase mantiene la auto-presentación en primera persona y la imagen de origen en la boca divina, sin reducirla a mera creación, mandato o habla indirecta. Así se preserva la tensión teológica y poética del pasaje.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión española sigue de cerca la decisión inglesa de mantener la personificación directa y la metáfora de procedencia, evitando suavizarla hacia una explicación doctrinal. No hay revisiones posteriores que alteren el sentido base.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» como título divino equivalente a the Most High.
  - Se conserva la primera persona y el paralelismo poético del verso.
  - «Tierra» se usa con alcance general/cósmico, no como una región específica.
