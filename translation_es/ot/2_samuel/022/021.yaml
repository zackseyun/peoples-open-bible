review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Yahvé actúa/retribuye en correspondencia con la justicia de David y la limpieza de sus manos. Conserva correctamente Yahvé por יְהוָה y mantiene el paralelismo entre גמל y ישיב. Sin embargo, «mi justicia» para כְּצִדְקָתִי se aparta innecesariamente de la decisión auditada en inglés («my righteousness») y en español suena más forense que ético-moral en este contexto. «Mi rectitud» preserva mejor el sentido contextual de conducta íntegra sin resolver la tensión teológica.'
  spanish_quality_summary: El español es claro y digno. «Me ha tratado» funciona para preservar el rango de גמל, y «la limpieza de mis manos» es natural y fiel al modismo. El principal ajuste de legibilidad y precisión es cambiar «mi justicia» por «mi rectitud». Además, conviene reubicar la nota cultural para anclarla en «la limpieza de mis manos», no en «mi justicia», ya que actualmente [b] está colocado en un punto menos pertinente.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: «Yahvé» está correctamente usado para יהוה. No hay conflicto con otros términos base del glosario. La única mejora terminológica recomendada es preferir «rectitud» sobre «justicia» aquí, en línea con la explicación inglesa de צדקה como uprightness/right conduct más que justicia abstracta o estatus pactual.'
  issues:
