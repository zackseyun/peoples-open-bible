translation:
  language: es
  text: Harás cincuenta presillas[a] en el borde de una cortina, la más exterior en el primer conjunto, y cincuenta presillas en el borde de la cortina del segundo conjunto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el acoplamiento». El término hebreo puede referirse a la unidad formada por cortinas unidas entre sí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Y harás
  - Harás y
  lexicon: HALOT
  rationale: La forma verbal hebrea funciona como mandato/instrucción en contexto técnico; en español, el futuro exhortativo 'harás' transmite la orden con naturalidad y dignidad, sin añadir material no pedido por el texto.
- source_word: חֲמִשִּׁים
  english_pob_choice: fifty
  chosen_spanish: cincuenta
  alternatives_spanish:
  - '50'
  lexicon: HALOT
  rationale: Se conserva el numeral cardinal explícito del hebreo.
- source_word: לֻלָאֹת
  english_pob_choice: loops
  chosen_spanish: bucles
  alternatives_spanish:
  - anillas
  - presillas
  - lazos
  lexicon: HALOT
  rationale: En el contexto de la tienda del tabernáculo, el término designa elementos textiles para unir piezas. 'Bucles' mantiene la imagen de un lazo hecho en la tela sin trasladarlo a un término más específico que el hebreo no exige; se evita 'anillas' por sugerir metal.
- source_word: שְׂפַת
  english_pob_choice: edge
  chosen_spanish: borde
  alternatives_spanish:
  - orilla
  - extremo
  - filo
  lexicon: HALOT
  rationale: Para tela y confección, 'borde' es el equivalente español más natural y preciso.
- source_word: הַיְרִיעָה
  english_pob_choice: curtain
  chosen_spanish: cortina
  alternatives_spanish:
  - lona
  - paño
  - panel
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, יְרִיעָה es una pieza grande de tela. 'Cortina' es entendible y fiel en español; 'paño' o 'panel' serían más técnicos o ambiguos.
- source_word: הָאֶחָת
  english_pob_choice: the one
  chosen_spanish: la una
  alternatives_spanish:
  - la primera
  - la única
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'la una', no 'la primera'. Se conserva esa precisión para no suavizar la estructura comparativa del verso.
- source_word: הַקִּיצֹנָה
  english_pob_choice: the outermost
  chosen_spanish: la más exterior
  alternatives_spanish:
  - la del extremo
  - la exterior
  lexicon: HALOT
  rationale: El adjetivo indica posición en el extremo o fuera del conjunto. 'La más exterior' reproduce ese valor espacial con claridad en español.
- source_word: בַּחֹבָרֶת
  english_pob_choice: in the first set
  chosen_spanish: en el primer conjunto
  alternatives_spanish:
  - en la unión
  - en la conexión
  - en el acoplamiento
  lexicon: HALOT
  rationale: El POB inglés optó por 'first set' tras revisar una redacción más literal. En español, 'conjunto' comunica el grupo de cortinas unidas sin importar una metáfora técnica opaca. El numeral 'primer' refleja la distinción interna que el hebreo presenta por contraste con la segunda sección.
- source_word: הַחֹבֶרֶת
  english_pob_choice: the curtain in the second set
  chosen_spanish: la cortina del segundo conjunto
  alternatives_spanish:
  - la cortina unida
  - la cortina acoplada
  - la del conjunto unido
  lexicon: HALOT
  rationale: Se preserva la idea de pertenencia a la segunda unidad resultante de la unión. 'Del segundo conjunto' sigue la revisión inglesa y evita forzar una interpretación técnica más dura que el español corriente.
- source_word: הַשֵּׁנִית
  english_pob_choice: the second
  chosen_spanish: del segundo
  alternatives_spanish:
  - la segunda
  lexicon: HALOT
  rationale: El ordinal hebreo se integra de forma natural en la frase española; al repetirse con 'conjunto' evita una redundancia innecesaria.
translation_notes:
  revision_awareness: La versión inglesa revisada se apartó de una formulación más literal ('the set joined together') para favorecer claridad ('the first set' / 'the second set'). El español sigue esa línea revisada, pero conserva con 'conjunto' y la nota[a] la posibilidad semántica de 'acoplamiento', sin imponerla en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene 'cortina' para יְרִיעָה en todo el versículo.
  - Se conserva la distinción entre la primera y la segunda unidad con 'primer conjunto' y 'segundo conjunto'.
  - No se introduce 'SEÑOR' ni terminología cultual ajena al verso.
  - El tono es instructivo y técnico, acorde con el contexto tabernacular.
