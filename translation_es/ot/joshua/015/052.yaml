  text: Arab[a], Rumah y Eshan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Tres nombres de lugar en la región montañosa de Judá: Arab, Rumah y Eshan. Algunas versiones antiguas y modernas escriben el último nombre «Eshean».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרַב
  english_pob_choice: Arab
  chosen_spanish: Arab
  alternatives_spanish:
  - Arabá
  - A rab
  lexicon: HALOT
  rationale: Se trata de un nombre propio de lugar dentro de la lista territorial de Judá, por lo que se translitera. «Arab» conserva de forma directa la forma consonántica y coincide con la decisión inglesa; se evita añadir vocales o adaptar el nombre a una forma no atestiguada en el texto base.
- source_word: וְ/רוּמָה
  english_pob_choice: and Rumah
  chosen_spanish: y Rumah
  alternatives_spanish:
  - y Ruma
  - y Rumá
  lexicon: HALOT
  rationale: La conjunción וְ se expresa con «y», y el topónimo se mantiene transliterado. «Rumah» sigue la vocalización hebrea y preserva el mismo valor de nombre propio que en el expediente inglés.
- source_word: וְ/אֶשְׁעָן
  english_pob_choice: and Eshan
  chosen_spanish: y Eshan
  alternatives_spanish:
  - y Eshean
  - y Esán
  lexicon: HALOT
  rationale: También aquí la conjunción se traduce con «y» y el nombre se translitera. «Eshan» reproduce de manera más directa la forma hebrea frente a variantes inglesas/tradicionales como «Eshean», que no son necesarias para el español de base fuente.
translation_notes:
  revision_awareness: El pasaje ha sido revisado en el flujo más reciente sin cambios sustantivos; el acuerdo de revisión fue alto y no requirió ajustes textuales.
  spanish_consistency_notes:
  - Se mantiene la transliteración de los tres topónimos, sin traducirlos ni normalizarlos a formas eclesiásticas tradicionales.
  - Se usa «y» para la conjunción hebrea וְ en una lista simple, conservando el orden enumerativo del texto hebreo.
  - La nota al pie conserva la alternativa «Eshean» documentada en el expediente inglés para transparentar la variación de transliteración.
