translation:
  language: es
  text: Y exáltalo con fuerza para destrozar a gobernantes injustos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ensálzalo con fuerza» o «levántalo poderosamente».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y levántalo en fuerza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑψώσον
  english_pob_choice: exalt / raise ... up
  chosen_spanish: honrarlo / levantarlo en alto
  alternatives_spanish:
  - exaltarlo
  - alzarlo
  - levantarlo
  lexicon: BDAG
  rationale: 'El imperativo expresa elevación o ensalzamiento para una acción posterior. En español, «honrarlo con fuerza» no sería exacto; por eso se opta por una forma más directa: «hónralo» como equivalente funcional de exaltar/levantar en un contexto solemne, manteniendo el impulso ascendente del verbo.'
- source_word: ἰσχὺν
  english_pob_choice: in strength
  chosen_spanish: con fuerza
  alternatives_spanish:
  - en fuerza
  - fuertemente
  - con poder
  lexicon: BDAG
  rationale: La acusativa funciona como complemento de manera o medio. «Con fuerza» transmite bien la intensidad sin sobreinterpretar si la fuerza es atributo, instrumento o modo.
- source_word: θραῦσαι
  english_pob_choice: to shatter
  chosen_spanish: destrozar
  alternatives_spanish:
  - quebrantar
  - romper
  - triturar
  lexicon: BDAG
  rationale: «Destrozar» conserva la violencia del infinitivo de propósito y refleja mejor el efecto contundente que «romper». «Quebrantar» puede sonar más débil o más abstracto en español moderno.
- source_word: ἄρχοντας
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - ruleres
  - príncipes
  - jefes
  lexicon: BDAG
  rationale: El término apunta a autoridades de gobierno. «Gobernantes» es claro, amplio y natural en español contemporáneo para este contexto político.
- source_word: ἀδίκους
  english_pob_choice: unjust
  chosen_spanish: injustos
  alternatives_spanish:
  - inicuos
  - malvados
  - injustos y corruptos
  lexicon: BDAG
  rationale: «Injustos» reproduce de forma directa el valor moral-jurídico del adjetivo sin cargarlo más de lo que pide el texto.
translation_notes:
  revision_awareness: 'El texto griego de trabajo y el historial inglés muestran una corrección importante: la lectura inicial entendía ὑψώσον como «raise/exalt», descartando la variante errónea que lo convertía en «gird». La presente versión española sigue esa lectura revisada y conserva el tono imperativo y la finalidad bélica del verso.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y publicable, sin calco servil.
  - «Con fuerza» traduce ἰσχὺν de modo natural en español y deja abierta la relación exacta entre exaltación y poder.
  - «Destrozar» preserva la dureza del verbo de propósito sin introducir una imagen distinta.
  - Las notas [a] y [b] quedan ancladas explícitamente en el texto para cumplir la consistencia editorial.
