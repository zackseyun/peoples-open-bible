- from: Se apoyará en ella y no será sacudido; confiará en ella y no será avergonzado.
  to: Se apoyará en ella[a] y no vacilará[b]; confiará en ella y no será avergonzado[c].
  rationale: Se ajusta 'no será sacudido' a 'no vacilará' para reflejar mejor el valor de מוֹט/κλιθῇ en español natural y sapiencial. También se añaden notas para preservar el referente femenino de la Sabiduría personificada y las alternativas léxicas documentadas en la auditoría inglesa.
