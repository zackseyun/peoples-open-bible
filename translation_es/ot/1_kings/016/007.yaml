translation:
  language: es
  text: Y también por medio de Jehú, hijo de Hanani, el profeta[a], vino la palabra de Yahvé contra Baasa y contra su casa, por toda la maldad que hizo ante los ojos de Yahvé, provocándolo a ira con la obra de sus manos, por hacerse como la casa de Jeroboam, y porque lo derribó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y porque lo mató». El sufijo hebreo es masculino singular y puede referirse a Jeroboam personalmente o, más probablemente por el contexto, a su casa/dinastía como colectivo.
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And also
  chosen_spanish: Y también
  alternatives_spanish:
  - Además
  - Y además
  lexicon: HALOT
  rationale: La conjunción añade otro elemento al juicio anterior; «Y también» conserva la fuerza aditiva sin sonar excesivamente formal.
- source_word: בְּיַד
  english_pob_choice: through
  chosen_spanish: por medio de
  alternatives_spanish:
  - por
  - mediante
  lexicon: HALOT
  rationale: La expresión hebrea marca mediación/instrumentalidad profética. «Por medio de» comunica que Jehú es el intermediario humano del mensaje divino.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra de Yahveh
  lexicon: HALOT
  rationale: Se mantiene el giro profético formal «la palabra de Yahvé», fiel al hebreo y al criterio del proyecto para el nombre divino.
- source_word: אֶל ... וְאֶל
  english_pob_choice: against ... and against
  chosen_spanish: contra ... y contra
  alternatives_spanish:
  - a ... y a
  - sobre ... y sobre
  lexicon: HALOT
  rationale: En este contexto judicial, la preposición tiene sentido adversativo/denunciatorio. «Contra» expresa mejor la sentencia que un simple «a» o «sobre».
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su dinastía
  - su familia
  lexicon: HALOT
  rationale: «Casa» preserva el término hebreo y su amplitud semántica, incluyendo la línea real, no solo el ámbito doméstico.
- source_word: עַל כָּל הָרָעָה
  english_pob_choice: because of all the evil
  chosen_spanish: por toda la maldad
  alternatives_spanish:
  - a causa de toda la maldad
  - por todo el mal
  lexicon: HALOT
  rationale: «Por» hace explícita la causalidad del juicio. «Maldad» comunica el valor moral del sustantivo hebreo en este contexto.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora evaluativa del hebreo. «Ante los ojos de Yahvé» es natural en español bíblico y mantiene la imagen.
- source_word: לְהַכְעִיסוֹ
  english_pob_choice: provoking him to anger
  chosen_spanish: provocándolo a ira
  alternatives_spanish:
  - irritándolo
  - para provocar su ira
  lexicon: HALOT
  rationale: El infinitivo causativo expresa el efecto de sus actos sobre Yahvé. «Provocándolo a ira» mantiene la relación causal y el tono bíblico.
- source_word: בְּמַעֲשֵׂה יָדָיו
  english_pob_choice: by the work of his hands
  chosen_spanish: con la obra de sus manos
  alternatives_spanish:
  - por la obra de sus manos
  - con lo que hicieron sus manos
  lexicon: HALOT
  rationale: La frase conserva el hebraísmo concreto. «Obra» es un equivalente natural de ma‘aséh y «sus manos» mantiene el paralelismo corporal de la expresión.
- source_word: לִהְיוֹת כְּבֵית יָרָבְעָם
  english_pob_choice: by becoming like the house of Jeroboam
  chosen_spanish: por hacerse como la casa de Jeroboam
  alternatives_spanish:
  - al llegar a ser como la casa de Jeroboam
  - para ser como la casa de Jeroboam
  lexicon: HALOT
  rationale: «Hacerse como» recoge el proceso/resultante del infinitivo sin forzar una paráfrasis. Mantiene la comparación con la casa de Jeroboam.
- source_word: וְעַל אֲשֶׁר הִכָּה אֹתוֹ
  english_pob_choice: and because he struck him down
  chosen_spanish: y por haberlo herido de muerte
  alternatives_spanish:
  - y porque lo hirió
  - y por haberlo matado
  lexicon: HALOT
  rationale: El objeto singular del sufijo se conserva en español con «lo». «Hirió de muerte» expresa de forma fiel y sobria la violencia letal implicada por el contexto, sin cerrar innecesariamente la posibilidad semántica del verbo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al criterio del proyecto, se traslada como «Yahvé» en vez de ocultarlo con un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de בֵּיתוֹ en un juicio dinástico
  english_pob_reading: his house
  chosen_spanish_reading: su casa
  alternative_spanish_readings:
  - su dinastía
  - su linaje
  rationale: El contexto de 1 Reyes 16 es de juicio sobre una línea real. «Casa» mantiene la ambigüedad útil del hebreo entre hogar y dinastía, sin reducirla solo a familia.
  doctrine_reference: Narrative context of the Deuteronomistic history; dynastic judgment pattern in 1 Kings 15–16
- issue: Pronombre objeto final en אֹתוֹ
  english_pob_reading: him
  chosen_spanish_reading: lo
  alternative_spanish_readings:
  - la casa
  - él
  rationale: Aunque el antecedente inmediato colectivo es «casa», el sufijo hebreo es masculino singular. Se deja «lo» para reflejar la forma singular y la posible referencia personal o colectiva.
  doctrine_reference: English POB footnote a; Hebrew singular masculine suffix with collective/dynastic ambiguity
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB inglés, que mantuvo la lectura de juicio causal y ajustó el objeto final a «him»; aquí se conserva esa resolución en español con «lo» y se refleja la ambigüedad del sufijo en una nota. También se preserva la mediación profética («por medio de Jehú») y el juicio contra «su casa» como fórmula dinástica.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene «casa» para בֵּיתוֹ y «casa de Jeroboam» para preservar el paralelismo dinástico del hebreo.
  - Se evita «SEÑOR» como sustituto del nombre divino en el texto principal.
  - Se conserva un registro bíblico claro y moderno, sin caer en calcos innecesarios.
