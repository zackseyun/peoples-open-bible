translation:
  language: es
  text: Joacín tenía dieciocho años cuando comenzó a reinar, y reinó tres meses en Jerusalén. El nombre de su madre era Nehushta, hija de Elnatán, de Jerusalén[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "procedente de Jerusalén", reflejando más directamente el hebreo; "de Jerusalén" al final también puede entenderse como una expresión genealógica idiomática.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן שְׁמֹנֶ֨ה עֶשְׂרֵ֤ה שָׁנָה֙
  english_pob_choice: was eighteen years old
  chosen_spanish: tenía dieciocho años
  alternatives_spanish:
  - era de dieciocho años
  - era un hijo de dieciocho años
  lexicon: WLC/HALOT
  rationale: Es un idiomatismo hebreo de edad. En español, 'tenía dieciocho años' comunica la edad con naturalidad y fidelidad, sin volver literal una construcción extraña.
- source_word: בְּמָלְכ֔וֹ
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando llegó a reinar
  - cuando empezó a reinar
  lexicon: HALOT
  rationale: La forma con prefijo temporal indica el momento de la entronización. 'Comenzó a reinar' conserva el valor verbal y suena natural en español bíblico moderno.
- source_word: מָלַ֖ךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: El verbo expresa el hecho de reinar; 'reinó' preserva la fuerza verbal y evita diluir el matiz regnal.
- source_word: וּ/שְׁלֹשָׁ֣ה חֳדָשִׁ֔ים
  english_pob_choice: three months
  chosen_spanish: tres meses
  alternatives_spanish:
  - durante tres meses
  lexicon: HALOT
  rationale: La duración del reinado se expresa de manera directa en español con 'tres meses'; el contexto ya aporta el valor durativo.
- source_word: בִּירוּשָׁלִָ֑ם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa se traduce de forma directa y estándar.
- source_word: וְ/שֵׁ֣ם אִמּ֔/וֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: El nombre de su madre era
  alternatives_spanish:
  - Y el nombre de su madre era
  - Su madre se llamaba
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica con una estructura clara y sobria en español, sin sobretraducirla.
- source_word: נְחֻשְׁתָּ֥א
  english_pob_choice: Nehushta
  chosen_spanish: Nehushta
  lexicon: standard proper-name transliteration
  rationale: Los nombres propios se transliteran de forma estándar para mantener la referencia nominal.
- source_word: בַת אֶלְנָתָ֖ן
  english_pob_choice: daughter of Elnathan
  chosen_spanish: hija de Elnatán
  alternatives_spanish:
  - la hija de Elnatán
  lexicon: HALOT
  rationale: La cadena constructa indica filiación; 'hija de' reproduce ese vínculo de forma natural en español.
- source_word: מִ/ירוּשָׁלִָֽם
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - procedente de Jerusalén
  - originaria de Jerusalén
  lexicon: HALOT
  rationale: Se sigue la lectura más literal de la preposición de origen. En español, 'de Jerusalén' mantiene la ambigüedad entre procedencia y adscripción geográfica, como en el hebreo.
theological_decisions:
- issue: 'Lectura de מִירוּשָׁלִָם al final: procedencia literal o fórmula idiomática de adscripción'
  english_pob_reading: from Jerusalem
  chosen_spanish_reading: de Jerusalén
  alternative_spanish_readings:
  - procedente de Jerusalén
  - originaria de Jerusalén
  rationale: El texto hebreo dice literalmente 'desde/de Jerusalén'. La POB inglesa retiene 'from Jerusalem' y nota la alternativa idiomática 'of Jerusalem'. En español, 'de Jerusalén' conserva la literalidad sin perder la posibilidad de entenderla como fórmula genealógica.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto base y la auditoría inglesa muestran alta concordancia; no se requieren revisiones textuales ni ajustes doctrinales. Se mantuvo la estructura regnal estándar y la nota final sobre מִירוּשָׁלִָם, trasladada al español.
  spanish_consistency_notes:
  - Se conservó el nombre propio del rey como Joaquín, la forma habitual en español bíblico, coherente con el hebreo יְהוֹיָכִין.
  - Se mantuvo 'Jerusalén' como topónimo invariable y la filiación con 'hija de' para reflejar la cadena constructa.
  - La nota al pie se ancló en 'de Jerusalén' porque ahí aparece la alternativa idiomática relevante.
