translation:
  language: es
  text: Clamaron, y Yahvé[a] oyó, y los libró de todas sus angustias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: צָעֲקוּ
  english_pob_choice: They cried out
  chosen_spanish: Clamaron
  alternatives_spanish:
  - Gritaron
  - Clamaron a voces
  lexicon: HALOT
  rationale: צעק expresa un clamor urgente en contexto de aflicción. En español, "clamar" comunica mejor la súplica intensa y formal que "llorar" o "gritar" sin perder la fuerza del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Nombre divino, no un título. La norma del proyecto pide "Yahvé" para יהוה; por eso no se sustituye por "SEÑOR" ni por otras formas tradicionales.
- source_word: שָׁמֵעַ
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - estaba oyendo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es participial, en la secuencia poética funciona como respuesta pasada. "Oyó" mantiene el flujo narrativo y es más natural en español que un presente o perífrasis.
- source_word: מִכָּל
  english_pob_choice: from all
  chosen_spanish: de todas
  alternatives_spanish:
  - de todo
  - de entre todas
  lexicon: HALOT
  rationale: La combinación con el sustantivo plural en español pide una expresión plural natural. "De todas" conserva la idea de totalidad y el movimiento de alejamiento implícito en מן.
- source_word: צָרוֹתָם
  english_pob_choice: their troubles
  chosen_spanish: sus angustias
  alternatives_spanish:
  - sus troubles
  - sus aflicciones
  - sus adversidades
  lexicon: HALOT
  rationale: צָרוֹת indica calamidades, angustias, aflicciones. "Angustias" comunica bien la carga existencial y poética del salmo, sin volverlo demasiado técnico o abstracto.
- source_word: הִצִּילָם
  english_pob_choice: delivered them
  chosen_spanish: los libró
  alternatives_spanish:
  - los rescató
  - los salvó
  lexicon: HALOT
  rationale: נצל en hiphil es librar/rescatar/deliver. "Libró" preserva el registro bíblico y evita la sobredeterminación soteriológica que puede tener "salvó" en español.
theological_decisions:
- issue: Traducción del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el Nombre propio de Dios revelado en el hebreo, conforme al criterio del proyecto. Esto evita la sustitución por un título y mantiene la transparencia con la fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se revisó el texto inglés auditado y no se introdujeron cambios de sentido: se mantuvo la secuencia verbal de clamor → oído de Yahvé → liberación, con un equivalente español natural y fuente-adherente. El marcador de nota se conserva para transparentar la elección del Nombre divino.'
  spanish_consistency_notes:
  - Se usó "Yahvé" para יהוה de forma consistente con el estándar del proyecto.
  - '"Clamaron" mantiene el matiz de urgencia de צעק mejor que un simple "gritaron".'
  - '"Los libró" conserva el registro bíblico y la amplitud semántica de הִצִּילָם.'
  - '"Angustias" es una decisión léxica contextual para צָרוֹת, sin borrar la idea de aflicción/troubles.'
