translation:
  language: es
  text: Vayan y clamen a los dioses[a] que ustedes han escogido; que ellos los salven en el tiempo de su angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ellos los salvarán». La forma hebrea puede leerse como futuro simple, pero en contexto funciona como un desafío irónico.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vengan
  - Váyanse
  lexicon: HALOT
  rationale: El imperativo plural de הלך funciona aquí como un rechazo tajante. «Vayan» es el equivalente español más natural y directo; conserva el tono de despido sin añadir una paráfrasis excesiva.
- source_word: וְזַעֲקוּ
  english_pob_choice: and cry out
  chosen_spanish: y clamen
  alternatives_spanish:
  - y griten
  - y clamen con voz fuerte
  lexicon: HALOT
  rationale: זעק expresa un clamor intenso de auxilio. «Clamen» mantiene la intensidad y el matiz de súplica, mejor que un simple «llamen».
- source_word: אֶל הָאֱלֹהִים
  english_pob_choice: to the gods
  chosen_spanish: a los dioses
  alternatives_spanish:
  - a Dioses
  - a sus dioses
  lexicon: HALOT
  rationale: 'Aunque אֱלֹהִים puede ser formalmente ambiguo, el contexto exige plural: se trata de deidades escogidas por ellos y el verbo siguiente también es plural. «A los dioses» expresa con claridad ese referente.'
- source_word: אֲשֶׁר בְּחַרְתֶּם בָּם
  english_pob_choice: whom you have chosen
  chosen_spanish: que ustedes han escogido
  alternatives_spanish:
  - a quienes ustedes han escogido
  - que ustedes eligieron
  lexicon: HALOT
  rationale: בחר con ב tiene el sentido de escoger entre opciones. «Han escogido» conserva el valor de elección deliberada; «que» funciona de manera natural en español para introducir el relativo sin forzar un «quienes» innecesario.
- source_word: הֵמָּה
  english_pob_choice: them
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. En español, el sujeto explícito «ellos» permite conservar ese énfasis en la cláusula siguiente sin sonar artificial.
- source_word: יוֹשִׁיעוּ
  english_pob_choice: let them save you
  chosen_spanish: que ellos los salven
  alternatives_spanish:
  - que ellos los libren
  - ellos los salvarán
  lexicon: HALOT
  rationale: El forma verbal en este contexto funciona como un desafío irónico, no como una profecía neutral. «Que ellos los salven» conserva bien el tono de reto y la fuerza volitiva/irónica del hebreo.
- source_word: בְּעֵת
  english_pob_choice: in the time of
  chosen_spanish: en el tiempo de
  alternatives_spanish:
  - cuando
  - en el momento de
  lexicon: HALOT
  rationale: La construcción nominal temporal se mantiene de forma clara y digna con «en el tiempo de». Es fiel al hebreo sin volverlo torpe.
- source_word: צָרַתְכֶם
  english_pob_choice: your distress
  chosen_spanish: su angustia
  alternatives_spanish:
  - su aflicción
  - su tribulación
  - su dificultad
  lexicon: HALOT
  rationale: צָרָה denota crisis, opresión o angustia. «Angustia» comunica bien la intensidad del sufrimiento y encaja con el tono de reprensión del versículo.
theological_decisions:
- issue: Fuerza del verbo final יוֹשִׁיעוּ en contexto
  english_pob_reading: 'Rendered as an ironic imperative/jussive challenge: ''let them save you'''
  chosen_spanish_reading: «Que ellos los salven» como desafío irónico
  alternative_spanish_readings:
  - «ellos los salvarán»
  - «que ellos los libren»
  rationale: El contexto es una reprensión divina a Israel por acudir a otros dioses. El español necesita conservar la ironía y el tono desafiante; una forma con «que» preserva mejor esa fuerza que un futuro llano.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo de Jueces 10:14 y el aparato de la POB inglesa, sin cambios revisionales reportados en la última pasada. Se conserva la lectura contextual de reto irónico para el verbo final y la referencia plural a los dioses.
  spanish_consistency_notes:
  - Se mantiene «dioses» en plural por exigencia del contexto y del verbo siguiente, evitando la ambigüedad de un singular.
  - Se usa «Yahvé» donde corresponda en el marco general POB, pero este versículo no contiene el Tetragrámaton.
  - «Clamen» preserva mejor el matiz de súplica intensa que «griten» o «llamen».
  - La construcción «en el tiempo de su angustia» reproduce con naturalidad la frase temporal nominal del hebreo.
