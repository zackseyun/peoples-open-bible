id: JHN.8.9
reference: John 8:9
source:
  edition: robinson-pierpont-2005-byzantine
  text: Οἱ δὲ ἀκούσαντες, καὶ ὑπὸ τῆς συνειδήσεως ἐλεγχόμενοι, ἐξήρχοντο εἷς καθ'
    εἷς, ἀρξάμενοι ἀπὸ τῶν πρεσβυτέρων ἕως τῶν ἐσχάτων· καὶ κατελείφθη μόνος ὁ Ἰησοῦς,
    καὶ ἡ γυνὴ ἐν μέσῳ ἑστῶσα.
  language: Greek
translation:
  text: But those[a] who heard it, being convicted by their conscience, went out one
    by one, beginning with the older ones down to the last. And Jesus was left alone,
    with the woman standing in the midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Continuation of the pericope adulterae (John 7:53–8:11). See note on John
      7:53.
    reason: textual_critical
  - marker: b
    text: Or 'until the last'.
    reason: previous_rendering
lexical_decisions:
- source_word: συνείδησις
  chosen: conscience
  alternatives:
  - moral consciousness
  - awareness
  lexicon: BDAG
  rationale: BDAG defines this as the psychological faculty which can distinguish
    between right and wrong. 'Conscience' is the standard and most accurate English
    equivalent for this internal moral witness.
- source_word: ἐλέγχω
  chosen: convicted
  alternatives:
  - reproved
  - exposed
  - rebuked
  lexicon: BDAG
  rationale: In this context, it refers to the internal realization of guilt brought
    about by their conscience. 'Convicted' captures this internal legal-moral judgment
    perfectly.
- source_word: πρεσβύτερος
  chosen: older ones
  alternatives:
  - elders
  lexicon: BDAG
  rationale: While often used as a title for community leaders ('elders'), here it
    contrasts with 'the last' (often understood as the younger), indicating age and
    seniority rather than a formal office.
