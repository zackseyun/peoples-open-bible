translation:
  language: es
  text: 'Hicieron la lámina[a], la santa corona, de oro puro, e inscribieron sobre ella, como el grabado de un sello: «Santo para Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Santidad para Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: צִיץ
  english_pob_choice: plate
  chosen_spanish: placa
  alternatives_spanish:
  - lámina
  - placa frontal
  - frontal
  lexicon: HALOT
  rationale: En el contexto sacerdotal, el término designa la pieza de oro fijada al turbante; «placa» comunica bien la forma material sin imponer una interpretación más técnica de «frontal».
- source_word: נֵזֶר הַקֹּדֶשׁ
  english_pob_choice: the holy crown
  chosen_spanish: la corona santa
  alternatives_spanish:
  - la corona sagrada
  - la diadema santa
  - la corona consagrada
  lexicon: HALOT
  rationale: 'Se conserva la apposición de dos sustantivos del hebreo: la placa y la corona. «Santa» refleja el valor consagrado del objeto y mantiene la relación directa con lo inscrito después.'
- source_word: זָהָב טָהוֹר
  english_pob_choice: of pure gold
  chosen_spanish: de oro puro
  alternatives_spanish:
  - de oro limpio
  - de oro refinado
  lexicon: HALOT
  rationale: Es la equivalencia natural y fiel en español; expresa tanto la materia como la cualidad ritual de pureza.
- source_word: וַיִּכְתְּב֣וּ עָלָ֗יו
  english_pob_choice: and they inscribed on it
  chosen_spanish: e inscribieron sobre ella
  alternatives_spanish:
  - y escribieron sobre ella
  - y grabaron sobre ella
  lexicon: HALOT
  rationale: El verbo básico es «escribir», pero el contexto de una placa de oro con letras grabadas favorece «inscribieron», que preserva el matiz formal y permanente señalado en el audit trail inglés.
- source_word: מִכְתַּב פִּתּוּחֵי חוֹתָם
  english_pob_choice: like the engraving of a seal
  chosen_spanish: como el grabado de un sello
  alternatives_spanish:
  - como la talla de un sello
  - con escritura de sello
  lexicon: HALOT
  rationale: La frase compara el modo de la inscripción con el trabajo de un sello grabado. «Grabado» transmite mejor la idea de relieve/cincelado que «escritura» sola en español.
- source_word: קֹדֶשׁ לַיהוָה
  english_pob_choice: Holy to Yahweh
  chosen_spanish: «Santo para Yahvé»
  alternatives_spanish:
  - «Santidad para Yahvé»
  - «Consagrado a Yahvé»
  - «Santo para el SEÑOR»
  lexicon: HALOT
  rationale: Se mantiene la fuerza concisa del lema hebreo con una formulación predicativa natural en español. «Santo» preserva el valor adjetival/dedicatorio y «para Yahvé» conserva el nombre divino sin sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
  rationale: Se sigue el estándar del proyecto en español para el Tetragrámaton, preservando el nombre propio revelado a Israel.
theological_decisions:
- issue: Cómo reflejar el lema final קֹדֶשׁ לַיהוָה
  english_pob_reading: Holy to Yahweh
  chosen_spanish_reading: Santo para Yahvé
  alternative_spanish_readings:
  - Santidad para Yahvé
  - Consagrado a Yahvé
  rationale: La expresión hebrea es breve y formularia. «Santo para Yahvé» mantiene su carácter de dedicación inscrita en el objeto, sin forzar un giro abstracto que en español suene más distante del texto.
  doctrine_reference: Translation philosophy §3; preservar la tensión cuando el hebreo permite una lectura adjetival o nominal
- issue: Mantenimiento del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se conserva el nombre propio divino en la línea del proyecto, evitando la sustitución reverencial por «Señor» y manteniendo la referencia directa al pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés POB revisó «wrote» a «inscribed» para reflejar mejor el grabado formal sobre la placa. La redacción española toma esa revisión en cuenta con «inscribieron» y añade «grabado» para conservar el matiz técnico del sello sin perder claridad.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה, conforme al estándar del proyecto.
  - Se conserva la distinción entre la placa y la corona, siguiendo la apposición del hebreo.
  - «Inscribieron» y «grabado» trabajan juntos para reflejar el acto formal y permanente del texto, sin reducirlo a una mera escritura ordinaria.
  - La nota alternativa se vincula al lema final, que admite una lectura tradicional nominal además de la forma adjetival elegida.
