translation:
  language: es
  text: y en mí y en mis hermanos poner fin a la ira del Todopoderoso, que justamente ha sido encendida contra toda nuestra nación[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conmigo y con mis hermanos». El griego dice literalmente «en mí y en mis hermanos», lo que expresa que la ira llegaría a su punto de término en ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: στῆσαι
  english_pob_choice: bring to an end
  chosen_spanish: poner fin a
  alternatives_spanish:
  - hacer cesar
  - detener
  - poner término a
  lexicon: LSJ
  rationale: El infinitivo aoristo de ἵστημι tiene aquí valor causativo. «Poner fin a» comunica bien la acción de hacer terminar la ira, con un registro natural y formal en español, sin perder la fuerza del griego.
- source_word: ἐν ἐμοὶ δὲ καὶ τοῖς ἀδελφοῖς μου
  english_pob_choice: in me and my brothers
  chosen_spanish: en mí y en mis hermanos
  alternatives_spanish:
  - conmigo y con mis hermanos
  - sobre mí y sobre mis hermanos
  lexicon: LSJ
  rationale: Se conserva la preposición «en» para reflejar la imagen griega de que la ira llegue a su punto de توقف/terminación en ellos. La alternativa más idiomática «conmigo y con mis hermanos» suaviza la metáfora, pero el griego permite mantenerla.
- source_word: παντοκράτορος
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - el Soberano de todo
  lexicon: LSJ
  rationale: «Todopoderoso» es el equivalente español natural y reverente de παντοκράτωρ. Conserva el título divino sin introducir una paráfrasis innecesaria.
- source_word: ὀργήν
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - ira divina
  - enojo
  - indignación
  lexicon: LSJ
  rationale: En español, «ira» mantiene mejor el peso judicial y teológico de ὀργή que «enojo». Dado el contexto de juicio divino, se evita un tono demasiado psicológico o leve.
- source_word: σύμπαν ἡμῶν γένος
  english_pob_choice: our whole nation
  chosen_spanish: toda nuestra nación
  alternatives_spanish:
  - todo nuestro pueblo
  - toda nuestra raza
  - todo nuestro linaje
  lexicon: LSJ
  rationale: «Nación» expresa con claridad el colectivo étnico-histórico al que se refiere γένος en este contexto, y «toda» reproduce el valor de σύμπαν.
- source_word: δικαίως
  english_pob_choice: justly
  chosen_spanish: justamente
  alternatives_spanish:
  - con justicia
  - rectamente
  - merecidamente
  lexicon: LSJ
  rationale: «Justamente» preserva el sentido moral/judicial de δικαίως y se integra con naturalidad en la frase española.
- source_word: ἐπημμένην
  english_pob_choice: has been kindled
  chosen_spanish: ha sido encendida
  alternatives_spanish:
  - ha sido encendida en llamas
  - ha sido avivada
  - ha sido inflamadas
  lexicon: LSJ
  rationale: La metáfora de fuego para la ira se conserva con «encendida». Es una equivalencia natural en español para la imagen de ἐπημμένην, sin cambiar el campo semántico.
theological_decisions:
- issue: La petición de que la ira divina cese en el mártir y sus hermanos
  english_pob_reading: The verse is rendered as a plea that the Almighty's just wrath against the nation would stop with the speaker and his brothers.
  chosen_spanish_reading: La frase se traduce como una petición de que la ira justa del Todopoderoso tenga su fin en el hablante y sus hermanos.
  alternative_spanish_readings:
  - que la ira descanse sobre mí y mis hermanos
  - que la ira se detenga en mí y mis hermanos
  - que la ira quede satisfecha en mí y mis hermanos
  rationale: 'Se conserva la tensión teológica del texto: no se resuelve el sentido en una explicación doctrinal posterior, sino que se expresa la petición de terminación de la ira divina en ellos. «Poner fin» mantiene la idea causal de στῆσαι sin forzar un lenguaje técnico de expiación.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail en inglés: se prefirió la formulación natural y formal «poner fin a» frente a una opción más literal o pesada. El español mantiene la imagen de la ira divina encendida y el valor colectivo de «toda nuestra nación».'
  spanish_consistency_notes:
  - Se usó «Todopoderoso» para παντοκράτωρ, coherente con el registro reverente del POB.
  - Se evitó «SEÑOR» para el título divino porque el texto griego no contiene κύριος en este versículo.
  - Se conservó «ira» en vez de «enojo» para reflejar el carácter judicial del contexto.
  - Se mantuvo la estructura con «en mí y en mis hermanos» para no borrar la tensión del griego.
