    reason: lexical_alternative
  - marker: b
    text: The Hebrew shifts from 'me' to 'him' in this clause; the translation preserves that tension rather than smoothing it out.
    reason: alternative_reading
  - marker: c
    text: Or 'a spirit of grace and supplication.'
    reason: lexical_alternative
