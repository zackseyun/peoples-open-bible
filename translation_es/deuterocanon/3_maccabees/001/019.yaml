translation:
  language: es
  text: Nosotros pisoteamos la casa de santidad[a], como son pisoteadas las casas de las abominaciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «casa de santificación»; o «santuario». El griego dice literalmente «la casa de la santificación».
    reason: lexical_alternative
  - marker: b
    text: El raro término griego también puede significar «cosas destinadas a destrucción» o, en sentido más amplio, cosas detestables o malditas.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεπατήσαμεν
  english_pob_choice: we trampled
  chosen_spanish: pisoteamos
  alternatives_spanish:
  - trampleamos
  - pisoteamos bajo los pies
  lexicon: BDAG
  rationale: El verbo griego expresa la acción concreta de pisar con desprecio. «Pisoteamos» conserva la imagen fuerte y natural en español, sin suavizarla a una lectura meramente interpretativa como «profanamos».
- source_word: οἶκον
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - casa
  - templo
  lexicon: BDAG
  rationale: «Οἶκος» es literalmente «casa». En este contexto designa el lugar sagrado, pero «casa» mantiene la forma del original y permite que el complemento explique su carácter sacro.
- source_word: τοῦ ἁγιασμοῦ
  english_pob_choice: house of holiness
  chosen_spanish: de la santidad
  alternatives_spanish:
  - de la santificación
  - del santuario
  - de la casa santa
  lexicon: BDAG
  rationale: El giro griego puede significar santificación, consagración u holi​nidad. Dado el ajuste de la revisión inglesa hacia «holiness», «santidad» suena más natural en español y comunica bien la cualidad sagrada del lugar sin borrar la relación con la consagración.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - tal como
  lexicon: BDAG
  rationale: «Como» reproduce de manera directa la comparación del griego y funciona con naturalidad en la estructura de la frase.
- source_word: καταπατοῦνται
  english_pob_choice: are trampled
  chosen_spanish: son pisoteadas
  alternatives_spanish:
  - son holladas
  - son pisadas
  lexicon: BDAG
  rationale: El pasivo presente mantiene la comparación general. «Son pisoteadas» conserva la fuerza concreta y el tono de desprecio del original.
- source_word: προσολοθρευμάτων
  english_pob_choice: abominations
  chosen_spanish: abominaciones
  alternatives_spanish:
  - cosas abominables
  - cosas destinadas a destrucción
  - cosas detestables
  lexicon: LSJ
  rationale: El sustantivo es raro y cargado de rechazo cultual. «Abominaciones» comunica bien esa repulsión en español y corresponde al valor adoptado por la POB inglesa, manteniendo abierta la dificultad léxica.
theological_decisions:
- issue: Identificación del edificio sagrado
  english_pob_reading: house of holiness
  chosen_spanish_reading: casa de la santidad
  alternative_spanish_readings:
  - templo
  - santuario
  - casa santa
  rationale: La frase griega nombra el edificio por su santidad/consecración, no por una etiqueta institucional más libre. «Casa de la santidad» preserva esa tensión y deja ver el ultraje que implica pisotear lo consagrado.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor del término raro y despectivo προσολοθρευμάτων
  english_pob_reading: abominations
  chosen_spanish_reading: abominaciones
  alternative_spanish_readings:
  - cosas destinadas a destrucción
  - cosas detestables
  rationale: El contexto contrapone el lugar santo con casas impuras o malditas. «Abominaciones» expresa la repulsión cultual y moral sin decidir en exceso la etimología incierta del término.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió «house of holiness» para τοῦ ἁγιασμοῦ. En español se adoptó «casa de la santidad» como equivalente natural y fiel, manteniendo la nota alternativa sobre «santificación» y «santuario».
  spanish_consistency_notes:
  - Se mantiene el paralelismo concreto entre el sujeto activo («Nosotros») y el pasivo general («son pisoteadas»).
  - Se evita «templo» en el texto principal para no perder la literalidad de οἶκος, pero se ofrece en la nota como alternativa contextual.
  - Se conserva «abominaciones» para reflejar la carga pejorativa del término raro, sin cerrar el matiz léxico con una sola opción técnica.
