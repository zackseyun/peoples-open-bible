revisions:
- from: 'Entonces Isaías el profeta vino al rey Ezequías y le dijo[a]: «¿Qué dijeron estos hombres y de dónde vinieron a ti?». Y Ezequías dijo: «Vinieron a mí desde una tierra distante[b], desde Babilonia».'
  to: 'Entonces Isaías el profeta fue al rey Ezequías y le dijo[a]: «¿Qué dijeron estos hombres, y de dónde vinieron a ti?». Y Ezequías dijo: «Vinieron a mí de una tierra lejana[b], de Babilonia».'
  rationale: 'Se ajusta el texto para un español más natural y digno sin alterar el sentido: «fue al rey» evita un calco poco idiomático; «tierra lejana» mejora la fluidez; y «de ... de Babilonia» mantiene la progresión del hebreo con una formulación más natural que «desde». También se afina la nota a para reflejar con más precisión la alternativa literal del imperfecto («vienen») en vez de repetir la forma pasada.'
