base_translation:
  language: en
  yaml_path: translation/ot/joshua/001/013.yaml
  text: Remember the word that Moses the servant of Yahweh commanded you[a], saying, ‘Yahweh your God is giving you rest and will give you this land.’
  footnotes:
  - marker: a
    text: Or 'will give you this land.' The Hebrew verb can be understood as an assured future; here it is rendered 'has given' because the eastern tribes had already received their inheritance.
    reason: alternative_reading
