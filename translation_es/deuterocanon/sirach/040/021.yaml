translation:
  language: es
  text: Flauta y arpa endulzan el canto[a], pero mejor que ambas es una lengua pura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «y más allá de ambas, una lengua dulce» o «habla agradable».'
    reason: alternative_reading
lexical_decisions:
- source_word: חליל / αὐλὸς
  english_pob_choice: flute
  chosen_spanish: flauta
  alternatives_spanish:
  - pipe
  - flauta de pan
  lexicon: HALOT; LXX αὐλός
  rationale: El término designa un instrumento de viento; en español moderno, «flauta» es la equivalencia más clara y natural, y mantiene bien el paralelo con el griego.
- source_word: נבל / ψαλτήριον
  english_pob_choice: harp
  chosen_spanish: arpa
  alternatives_spanish:
  - lira
  - laúd
  lexicon: HALOT; LXX ψαλτήριον
  rationale: Es un instrumento de cuerdas pulsadas. «Arpa» es la correspondencia bíblica más reconocible en español y funciona bien en paralelo con «flauta».
- source_word: יעריבו / ἡδύνουσιν
  english_pob_choice: make ... sweet
  chosen_spanish: endulzan
  alternatives_spanish:
  - hacen dulce
  - hacen agradable
  lexicon: HALOT; LXX ἡδύνουσιν
  rationale: La idea causal de volver agradable o dulce el canto se expresa de forma natural con «endulzan», que conserva el matiz de hacer más deleitable la música.
- source_word: שיר / μέλη
  english_pob_choice: song
  chosen_spanish: el canto
  alternatives_spanish:
  - la canción
  - la música
  lexicon: HALOT; LXX μέλη
  rationale: En contexto musical, «canto» mantiene el sentido de canción/melodía y suena más fluido en español que una repetición más literal de «canción».
- source_word: משניהם / ὑπὲρ ἀμφότερα
  english_pob_choice: better than both
  chosen_spanish: más que ambas
  alternatives_spanish:
  - por encima de ambas
  - mejor que ambas
  lexicon: HALOT; LXX ὑπὲρ ἀμφότερα
  rationale: El comparativo expresa prioridad o superioridad sobre los dos elementos previos. «Más que ambas» conserva la estructura comparativa sin añadir una valoración demasiado libre.
- source_word: לשון / γλῶσσα
  english_pob_choice: tongue
  chosen_spanish: una lengua
  alternatives_spanish:
  - una lengua hablada
  - el habla
  - la lengua
  lexicon: HALOT; LXX γλῶσσα
  rationale: Aquí la lengua funciona metonímicamente por el habla. «Una lengua» conserva la imagen corporal y permite en español una lectura natural de la cualidad descrita.
- source_word: ברה / ἡδεῖα
  english_pob_choice: pure
  chosen_spanish: pura
  alternatives_spanish:
  - limpia
  - agradable
  - dulce
  lexicon: HALOT; LXX ἡδεῖα
  rationale: Se sigue el hebreo conservado, donde la cualidad es de pureza/limpieza. «Pura» retiene mejor esa fuerza ética o cualitativa que «dulce», aunque se reconoce el matiz alternativo del griego en la nota.
theological_decisions:
- issue: Tensión entre el hebreo conservado y el paralelo griego en la última expresión
  english_pob_reading: 'a pure tongue, with note: Greek parallel ''and beyond both, a sweet tongue'' or ''pleasant speech.'''
  chosen_spanish_reading: una lengua pura
  alternative_spanish_readings:
  - una lengua dulce
  - un habla agradable
  - un habla pura
  rationale: El hebreo disponible es la base principal, y su sentido más directo es moral o cualitativamente limpio/puro. El griego ofrece una lectura compatible pero algo distinta, más estética o agradable. Se mantiene el hebreo en el texto principal y se preserva la alternativa griega en nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirach desde el hebreo cuando se conserva; usar el griego paralelo como control y preservar la tensión significativa'
translation_notes:
  revision_awareness: El borrador sigue la revisión final sin cambios sustantivos y conserva la decisión del texto hebreo como base principal, registrando la alternativa significativa del paralelo griego en nota.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología eclesiástica no pertinente, porque aquí no aparece el Nombre divino ni vocabulario doctrinal afín.
  - Se prefirió «flauta» y «arpa» por su transparencia en español bíblico contemporáneo.
  - La nota mantiene la tensión hebreo/griego sin borrar la diferencia entre «pura» y «dulce/agradable».
