translation:
  language: es
  text: La primera suerte salió para Asaf[a], para José; Gedalías[b], la segunda; él y sus hermanos y sus hijos varones, doce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática en el contexto de echar suertes: «La primera suerte cayó para Asaf, para José».'
    reason: lexical_alternative
  - marker: b
    text: Gedalías representa la forma hebrea Gedalyahu; también puede transliterarse más de cerca como «Guedalyahu».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - fue a dar
  - cayó
  lexicon: HALOT
  rationale: En el contexto de echar suertes, el verbo expresa el resultado que 'sale'; en español 'salió' conserva la imagen concreta sin forzar un calco antinatural.
- source_word: הַגּוֹרָל
  english_pob_choice: lot
  chosen_spanish: suerte
  alternatives_spanish:
  - lote
  - sorteo
  lexicon: HALOT
  rationale: Para el reparto por sorteo, 'suerte' es una equivalencia natural en español bíblico y mantiene el sentido del objeto/resultado asignado por sorteo.
- source_word: הָרִאשׁוֹן
  english_pob_choice: the first
  chosen_spanish: la primera
  alternatives_spanish:
  - primera
  lexicon: HALOT
  rationale: Se conserva el valor ordinal y su concordancia con 'suerte'.
- source_word: לְאָסָף
  english_pob_choice: for Asaph
  chosen_spanish: para Asaf
  alternatives_spanish:
  - a Asaf
  - para la casa de Asaf
  lexicon: HALOT
  rationale: '''Para'' expresa bien la asignación por sorteo; se mantiene el nombre propio en forma transparente y consistente con la transliteración española.'
- source_word: לְיוֹסֵף
  english_pob_choice: for Joseph
  chosen_spanish: para José
  alternatives_spanish:
  - a José
  lexicon: HALOT
  rationale: El hebreo marca la asignación dentro de la línea de Asaf; 'para José' conserva esa relación de adjudicación.
- source_word: גְּדַלְיָהוּ
  english_pob_choice: Gedaliah
  chosen_spanish: Gedalías
  alternatives_spanish:
  - Gedalíahu
  - Gedalía
  lexicon: HALOT
  rationale: En español bíblico, 'Gedalías' es la forma tradicional y legible del nombre, sin perder la referencia al nombre hebreo.
- source_word: הַשֵּׁנִי
  english_pob_choice: the second
  chosen_spanish: la segunda
  alternatives_spanish:
  - segunda
  lexicon: HALOT
  rationale: Se conserva el ordinal femenino implícito por referencia a 'suerte'.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - es él
  - él mismo
  lexicon: HALOT
  rationale: El pronombre hebreo se mantiene para señalar explícitamente al cabeza del grupo, como en el texto fuente.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes varones
  lexicon: HALOT
  rationale: '''Hermanos'' es la equivalencia más directa y precisa en este contexto de linaje/agrupación masculina.'
- source_word: וּבָנָיו
  english_pob_choice: and his sons
  chosen_spanish: y sus hijos
  alternatives_spanish:
  - y sus varones
  lexicon: HALOT
  rationale: Aunque el hebreo especifica 'hijos varones', en español 'hijos' conserva la referencia natural al grupo filial; el contexto deja claro que se trata de descendientes masculinos.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - eran doce
  lexicon: HALOT
  rationale: El numeral final funciona como suma total del grupo; en español puede ir en aposición sin añadir verbo.
theological_decisions:
- issue: Estructura del reparto por suertes
  english_pob_reading: The first lot came out for Asaph, for Joseph; Gedaliah the second, he and his brothers and his sons, twelve.
  chosen_spanish_reading: La primera suerte salió para Asaf, para José; Gedalías, la segunda; él y sus hermanos y sus hijos, doce.
  alternative_spanish_readings:
  - La primera suerte cayó para Asaf, para José...
  - La primera suerte fue para Asaf, para José...
  rationale: La decisión evita sobreinterpretar el mecanismo de la suerte. 'Salió' conserva la concreción del hebreo y no introduce una interpretación adicional sobre causalidad o providencia que el texto no explicita.
  doctrine_reference: Providencia divina y reparto litúrgico/administrativo sin añadir glosa doctrinal al texto
- issue: Valor de 'hijos' en el grupo contado
  english_pob_reading: and his sons, twelve
  chosen_spanish_reading: y sus hijos, doce
  alternative_spanish_readings:
  - y sus hijos varones, doce
  - y sus descendientes, doce
  rationale: El hebreo dice literalmente 'hijos'; en español, 'hijos' es suficientemente fiel y natural. No se amplía a 'descendientes' porque eso debilitaría la concreción del término.
  doctrine_reference: Precisión genealógica y lexical del hebreo
translation_notes:
  revision_awareness: El inglés auditado pasó de «Gedaliahu» a la forma inglesa más natural «Gedaliah». En español se prefirió «Gedalías», que ya es una forma bíblica natural y legible, manteniendo la transparencia respecto del nombre hebreo. También se conservó la estructura breve del original, con puntuación española adaptada sin expandir el contenido.
  spanish_consistency_notes:
  - Se usó 'Asaf' y 'José' como formas españolas estándar de los nombres propios.
  - Se mantuvo la secuencia sintáctica breve del hebreo con aposición final para 'doce'.
  - '''Suerte'' se eligió por su naturalidad bíblica en español frente a ''lote'', que suena más administrativo y menos contextual.'
  - La puntuación con punto y coma refleja las pausas del hebreo y mejora la lectura en español.
