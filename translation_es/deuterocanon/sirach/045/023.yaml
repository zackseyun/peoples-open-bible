    issue: '''en poder'' para בגבורה es semánticamente impreciso'
    rationale: El hebreo גבורה aquí apunta a fuerza heroica, valentía o valor, no tanto a 'poder' en sentido general de capacidad o autoridad. 'En poder' suena menos natural en español y difumina el matiz de heroísmo destacado en la evidencia y en las decisiones léxicas auditadas.
  - severity: low
