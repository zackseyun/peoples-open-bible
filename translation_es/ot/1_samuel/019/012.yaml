translation:
  language: es
  text: Entonces Mical bajó a David por la ventana[a], y él se fue, huyó y escapó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo dejó bajar por la ventana».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּרֶד
  english_pob_choice: let David down
  chosen_spanish: bajó a David
  alternatives_spanish:
  - lo dejó bajar
  - lo hizo bajar
  - lo bajó
  lexicon: HALOT
  rationale: El hebreo en forma causativa expresa que Mical hizo descender a David. En español, "bajó a David" conserva la acción causativa sin sonar forzado. "Lo dejó bajar" sería más interpretativo, y "lo hizo bajar" añade una periphrasis menos natural en este contexto.
- source_word: בְּעַד הַחַלּוֹן
  english_pob_choice: through the window
  chosen_spanish: por la ventana
  alternatives_spanish:
  - a través de la ventana
  - por medio de la ventana
  - desde la ventana
  lexicon: HALOT
  rationale: La expresión indica el medio o paso de escape por una abertura. "Por la ventana" es natural en español y transmite el movimiento de salida sin ampliar innecesariamente el texto.
- source_word: וַיֵּלֶךְ
  english_pob_choice: he went
  chosen_spanish: y él fue
  alternatives_spanish:
  - y se fue
  - y partió
  - y caminó
  lexicon: HALOT
  rationale: Se mantiene la secuencia narrativa simple del verbo de movimiento. "Fue" reproduce de manera breve y directa el hebreo, aunque en español a veces se preferiría "se fue"; aquí se conserva la cadencia de la serie verbal.
- source_word: וַיִּבְרַח
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó corriendo
  - salió huyendo
  - tomó la fuga
  lexicon: HALOT
  rationale: El verbo indica huida ante peligro. "Huyó" es la forma más directa y natural en español, y mantiene la progresión entre ir, huir y escapar.
- source_word: וַיִּמָּלֵט
  english_pob_choice: escaped
  chosen_spanish: escapó
  alternatives_spanish:
  - logró escapar
  - se libró
  - se salvó
  lexicon: HALOT
  rationale: El nifal de מלט expresa escape efectivo o librarse de un peligro. "Escapó" preserva la culminación del proceso sin introducir matices de salvación no explicitados por el verbo.
- source_word: מִיכַל
  english_pob_choice: Michal
  chosen_spanish: Mical
  alternatives_spanish:
  - Mical
  - Michal
  lexicon: Convención de nombres bíblicos en español
  rationale: Se usa la transliteración habitual en español bíblico "Mical" para lectura pública, manteniendo la identidad propia del nombre.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - David
  lexicon: Convención de nombres bíblicos en español
  rationale: Nombre propio ya establecido en español; no requiere adaptación adicional.
translation_notes:
  revision_awareness: 'El texto inglés POB revisó ''lowered'' a ''let David down'' para sonar más natural sin perder el sentido causativo. La versión española sigue esa misma lógica: evita un calco rígido y conserva la escena de descenso, escape y huida en una serie verbal breve y narrativa.'
  spanish_consistency_notes:
  - 'Se mantuvo la secuencia verbal de tres movimientos/acciones: fue, huyó y escapó, equivalente al encadenamiento hebreo.'
  - Se evitó introducir 'se fue' para no desplazar la coordinación simple del original.
  - El nombre de Mical sigue la forma española bíblica habitual.
  - No se usó 'SEÑOR' ni terminología teológica especial, pues el versículo no contiene el nombre divino ni un término doctrinal que requiera decisión adicional.
