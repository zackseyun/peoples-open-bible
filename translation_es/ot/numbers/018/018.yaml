translation:
  language: es
  text: Pero su carne será tuya[a], como el pecho de la ofrenda mecida[b] y como también el muslo derecho será tuyo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su porción de carne'. El hebreo dice literalmente 'su carne', refiriéndose aquí a la parte comestible del sacrificio.
    reason: lexical_alternative
  - marker: b
    text: '''Ofrenda mecida'' traduce el rito de תְּנוּפָה, una presentación ritual ante Yahvé; también puede entenderse como ''ofrenda presentada''.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבְשָׂרָם
  english_pob_choice: But their flesh
  chosen_spanish: Pero su carne
  alternatives_spanish:
  - Y su carne
  - Pero su cuerpo
  lexicon: HALOT
  rationale: בָּשָׂר designa literalmente 'carne'; en contexto sacrificial puede referirse a la porción comestible. 'Carne' conserva el lenguaje concreto del hebreo y la contraposición discursiva introducida por וּ se expresa con 'Pero'.
- source_word: יִהְיֶה לָּךְ
  english_pob_choice: shall be yours
  chosen_spanish: será tuya
  alternatives_spanish:
  - te pertenecerá
  - será para ti
  lexicon: HALOT
  rationale: La construcción היה + ל expresa posesión o asignación. 'Será tuya' mantiene la idea legal de porción asignada y suena natural en español.
- source_word: כַּחֲזֵה הַתְּנוּפָה
  english_pob_choice: just as the breast of the wave offering
  chosen_spanish: como el pecho de la ofrenda mecida
  alternatives_spanish:
  - como el pecho de la ofrenda presentada
  - como el pecho que se mece
  lexicon: HALOT
  rationale: חָזֶה es 'pecho' en este contexto sacrificial. תְּנוּפָה refiere a la ofrenda ritual movida/presentada; 'ofrenda mecida' preserva el término técnico sin domesticarlo demasiado.
- source_word: וּכְשׁוֹק הַיָּמִין
  english_pob_choice: and the right thigh
  chosen_spanish: y el muslo derecho
  alternatives_spanish:
  - y la pierna derecha
  - y el cuarto trasero derecho
  lexicon: HALOT
  rationale: שׁוֹק nombra la porción superior de la pierna en la distribución sacrificial; 'muslo' es una equivalencia comprensible y reverente en español bíblico actual. 'Derecho' traduce directamente הַיָּמִין.
- source_word: לְךָ יִהְיֶה
  english_pob_choice: shall be yours
  chosen_spanish: será tuyo
  alternatives_spanish:
  - te pertenecerá
  - será para ti
  lexicon: HALOT
  rationale: La repetición de la fórmula posesiva refuerza la asignación sacerdotal. Se mantiene con 'será tuyo', ajustado al primer miembro en femenino por concordancia con 'carne' y al segundo con 'muslo'.
theological_decisions:
- issue: Pronombres de segunda persona con género distinto
  english_pob_reading: Render both second-person forms collectively as singular 'yours' addressed to Aaron as representative priest.
  chosen_spanish_reading: Conservar la asignación en singular y ajustar la concordancia en español según el sustantivo, sin resolver de más la irregularidad hebrea.
  alternative_spanish_readings:
  - será de ustedes
  - será tuya para ti
  rationale: El hebreo presenta una forma femenina en לָּךְ y una masculina en לְךָ, pero el sentido contextual es la porción sacerdotal asignada a Aarón y, por extensión, a su casa. En español conviene mantener el singular de asignación sin nivelar la tensión textual.
  doctrine_reference: Números 18:8-20; distribución sacerdotal de las porciones sacrificiales
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y conserva la repetición posesiva. Se refleja la revisión inglesa que suprimió el segundo ''as'' con una sola comparación fluida en español: ''como ... y ...''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino según la pauta del proyecto, aunque en este versículo no aparece explícitamente.
  - Se mantiene 'ofrenda mecida' como término técnico; no se sustituye por una glosa más libre en el texto principal.
  - '''Carne'' conserva la literalidad sacrificial, con nota para la alternativa semántica ''carne/comida'' según el contexto.'
