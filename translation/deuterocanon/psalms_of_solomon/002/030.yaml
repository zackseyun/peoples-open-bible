  from: And I did not have to wait long until God showed me his arrogance, pierced through on the mountains of Egypt, made more despised than the least person on land and sea.
  to: 'And I did not wait long until God showed me his arrogance: he was pierced through on the mountains of Egypt, made more despised than the least person on land and sea.'
  rationale: The Greek participle ἐκκενεκεντημένον (pierced through) is masculine accusative singular, referring to the man himself (Pompey). It does not agree with the feminine noun ὕβριν (arrogance). The draft's English makes 'arrogance' the antecedent of 'pierced through,' creating a grammatical mismatch and a nonsensical image. Using a colon or a pronoun ('he was pierced through') resolves this. Additionally, 'I did not wait long' is a more direct and elevated rendering of οὐκ ἐχρόνισα than the slightly colloquial 'I did not have to wait long.'
