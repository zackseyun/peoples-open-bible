translation:
  language: es
  text: Pero yo me abstuve de comer[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «guardé mi alma para no comer»; aquí «alma» funciona idiomáticamente por «yo mismo».'
    reason: lexical_alternative
  - marker: b
    text: El texto griego conservado es breve y parece continuar en la siguiente cláusula; el sentido es la negativa deliberada de Tobit a comer.
    reason: textual_variant
lexical_decisions:
- source_word: ἐγὼ δὲ
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - Ahora bien, yo
  lexicon: BDAG
  rationale: δέ introduce contraste o transición suave; en español, «Pero yo» conserva el contraste personal de Tobit con el contexto inmediato sin forzar un enlace demasiado literal.
- source_word: συνετήρησα
  english_pob_choice: kept myself from eating
  chosen_spanish: me mantuve
  alternatives_spanish:
  - me guardé
  - me contuve
  - me preservé
  lexicon: LSJ
  rationale: El verbo compuesto sugiere vigilancia o custodia de uno mismo con idea de autocontrol. «Me mantuve» comunica la perseverancia de la abstinencia en un español natural, sin perder el matiz de autodominio.
- source_word: τὴν ψυχήν μου
  english_pob_choice: myself
  chosen_spanish: me
  alternatives_spanish:
  - mi alma
  - a mí mismo
  lexicon: BDAG
  rationale: Aunque literalmente dice «mi alma», en este giro ψυχή funciona de modo idiomático y reflexivo. En español, «me» evita cargar la frase con una antropología explícita que el contexto no exige.
- source_word: μὴ φαγεῖν
  english_pob_choice: so as not to eat
  chosen_spanish: sin comer
  alternatives_spanish:
  - para no comer
  - de no comer
  - no comer
  lexicon: BDAG
  rationale: El infinitivo negativo expresa finalidad o resultado. En español, «sin comer» reproduce con naturalidad la idea de abstención deliberada y encaja con el verbo de autocontrol.
theological_decisions:
- issue: Valor antropológico de ψυχή
  english_pob_reading: Idiomatic reflexive ('myself'), not a distinct doctrinal statement about the soul
  chosen_spanish_reading: Reflexivo idiomático («me»), no una afirmación doctrinal sobre el alma
  alternative_spanish_readings:
  - «mi alma»
  - «a mí mismo»
  rationale: Aquí la frase describe la decisión de no comer. Traducir literalmente «mi alma» introduciría una lectura antropológica más pesada que el griego no necesita en este contexto; el reflexivo español preserva el sentido pragmático.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada que prefirió una expresión más natural y precisa que equivalga a la negativa deliberada de comer, evitando un calco innecesario de «vigilarme» o «guardar mi alma».
  spanish_consistency_notes:
  - Se mantiene «Pero yo» para reflejar el contraste suave de δέ.
  - Se evita «alma» en el cuerpo principal por consistencia con el tratamiento idiomático de ψυχή en el audit trail inglés.
  - La construcción «sin comer» conserva la fuerza de abstención voluntaria sin añadir información doctrinal.
