translation:
  language: es
  text: Los impíos están alejados desde el vientre; se extravían desde el nacimiento[a], diciendo mentiras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «desde el vientre» ... «desde el vientre/barriga»; el versículo usa hipérbole poética para describir a los impíos como extraviados desde la vida más temprana.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹרוּ
  english_pob_choice: are estranged
  chosen_spanish: están alejados
  alternatives_spanish:
  - están extrañados
  - están apartados
  - están alienados
  lexicon: HALOT
  rationale: El hebreo expresa un estado/resultante de separación. «Están alejados» conserva esa idea de distancia o apartamiento sin forzar una lectura de corrupción moral como única posibilidad.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  - los culpables
  lexicon: HALOT
  rationale: «Impíos» es un equivalente bíblico natural en español para la clase de los רשעים y mantiene el registro solemne de la línea poética.
- source_word: מֵרָחֶם
  english_pob_choice: from the womb
  chosen_spanish: desde el vientre
  alternatives_spanish:
  - desde el vientre materno
  - desde el seno materno
  - desde el útero
  lexicon: HALOT
  rationale: El hebreo dice literalmente «desde el vientre». En español, «vientre» conserva la imagen poética de forma más natural que una glosa anatómica más técnica.
- source_word: תָּעוּ
  english_pob_choice: go astray
  chosen_spanish: se extravían
  alternatives_spanish:
  - se desvían
  - andan errantes
  - yerra
  lexicon: HALOT
  rationale: «Se extravían» comunica bien el sentido habitual de תעה en un contexto gnómico y poético, y mantiene la idea de desviación de la conducta recta.
- source_word: מִבֶּטֶן
  english_pob_choice: from birth
  chosen_spanish: desde el nacimiento
  alternatives_spanish:
  - desde el vientre
  - desde su nacimiento
  - desde que nacen
  lexicon: HALOT
  rationale: La segunda cola paralleliza la primera con una expresión más idiomática en español. «Desde el nacimiento» reproduce la fuerza generalizada del hebreo sin aplanar la imagen poética anterior.
- source_word: דֹּבְרֵי כָזָב
  english_pob_choice: speaking lies
  chosen_spanish: hablando mentiras
  alternatives_spanish:
  - diciendo mentiras
  - que hablan mentira
  - proferidores de mentira
  lexicon: HALOT
  rationale: La forma participial funciona como rasgo caracterizador. «Hablando mentiras» mantiene el valor descriptivo y es natural en español moderno; «mentiras» expresa claramente כזב como falsedad verbal.
theological_decisions:
- issue: ¿La frase «desde el vientre / desde el nacimiento» debe convertirse en una tesis doctrinal sobre culpa prenatal o pecado original?
  english_pob_reading: Preserve the psalm's poetic hyperbole about the wicked being corrupt from earliest life without making it a technical doctrinal statement.
  chosen_spanish_reading: 'Conservar la hipérbole poética: describe a los impíos como torcidos desde muy temprano, sin convertir el versículo en una afirmación técnica sobre culpa prenatal.'
  alternative_spanish_readings:
  - El versículo enseña directamente la depravación total desde la concepción.
  - El versículo es solo una invectiva retórica sin peso antropológico.
  rationale: El hebreo usa paralelismo poético («desde el vientre» // «desde el nacimiento») en una denuncia. La traducción debe dejar intacta la fuerza de la imagen sin resolver el alcance doctrinal que el verso no formula explícitamente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: No hay cambios aplicados en la última revisión; el consenso de auditoría fue alto y el criterio aprobado se mantiene. Se ha conservado la estructura poética y la tensión teológica sin añadir explicación doctrinal al texto principal.
  spanish_consistency_notes:
  - Se mantiene «impíos» para רשעים, coherente con el registro bíblico en español.
  - Se evita «SEÑOR» para el nombre divino porque este versículo no lo contiene.
  - «Desde el nacimiento» se eligió para la segunda cola por naturalidad en español, mientras que la primera conserva la imagen de «vientre» para reflejar el paralelismo hebreo.
  - «Hablando mentiras» conserva el carácter participial/descriptivo de דֹבְרֵי כָזָב.
