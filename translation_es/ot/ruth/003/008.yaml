translation:
  language: es
  text: Y sucedió que, a la medianoche, el hombre tembló y se dio vuelta[a], y he aquí, una mujer estaba acostada a sus pies[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se volvió»; el verbo hebreo es raro y puede sugerir que se movió, se torció o se dobló por la sorpresa.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «a sus pies»; la expresión hebrea también puede referirse más ampliamente al área de sus pies o de la parte baja de sus piernas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa introduce el siguiente evento. «Y sucedió» conserva la progresión del hebreo sin sonar arcaico en español.
- source_word: בַּחֲצִי הַלַּיְלָה
  english_pob_choice: at midnight
  chosen_spanish: a la medianoche
  alternatives_spanish:
  - en la mitad de la noche
  - a media noche
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «en la mitad de la noche». «A la medianoche» es una equivalencia natural y precisa en español.
- source_word: וַיֶּחֱרַד
  english_pob_choice: trembled
  chosen_spanish: tembló
  alternatives_spanish:
  - se estremeció
  - se sobresaltó
  lexicon: HALOT
  rationale: «Tembló» preserva la reacción corporal de חרד sin decidir en exceso si la causa fue miedo, sobresalto o conmoción súbita.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el esposo
  lexicon: HALOT
  rationale: Aquí designa a Booz en la narración. «El hombre» sigue de cerca el hebreo y evita introducir una identificación relacional no expresada en el verso.
- source_word: וַיִּלָּפֵת
  english_pob_choice: turned himself
  chosen_spanish: se volvió
  alternatives_spanish:
  - se torció
  - se ladeó
  lexicon: HALOT
  rationale: El verbo es raro y admite varias posibilidades. «Se volvió» mantiene cautela y expresa un cambio de posición sin forzar un gesto más específico de lo que permite el texto.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y resultó que
  lexicon: HALOT
  rationale: «Y he aquí» conserva el valor de sorpresa y descubrimiento de la partícula hebrea, en un registro bíblico claro y entendible.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  - una muchacha
  lexicon: HALOT
  rationale: El sustantivo significa «mujer»; «esposa» sería inexacto en este contexto.
- source_word: שֹׁכֶבֶת
  english_pob_choice: was lying
  chosen_spanish: estaba acostada
  alternatives_spanish:
  - yacía
  - estaba tendida
  lexicon: HALOT
  rationale: El participio describe el estado continuo de Rut. «Estaba acostada» comunica la postura de manera natural en español y sin añadir matices innecesarios.
- source_word: מַרְגְּלֹתָיו
  english_pob_choice: at his feet
  chosen_spanish: a sus pies
  alternatives_spanish:
  - junto a sus pies
  - en la parte de sus pies / piernas
  lexicon: HALOT
  rationale: La expresión puede referirse literalmente a los pies o al área de los pies/piernas. «A sus pies» es la forma más natural en español y conserva la literalidad básica sin resolver la ambigüedad del hebreo.
theological_decisions:
- issue: Posible sobrelectura sexual o eufemística de la escena
  english_pob_reading: Render the description straightforwardly as Ruth lying at Boaz's feet.
  chosen_spanish_reading: 'Describir la escena de manera directa: Rut está acostada a los pies de Booz.'
  alternative_spanish_readings:
  - Rut estaba en el lugar de sus pies / piernas
  - Rut estaba tendida junto a él
  rationale: El hebreo no afirma explícitamente un acto sexual. La traducción debe preservar la tensión narrativa sin introducir una interpretación moral o sexual que el texto no dice. Una nota puede señalar la amplitud lexical de la expresión de lugar.
  doctrine_reference: Principios de la POB sobre primacía del idioma original y preservación de la tensión textual.
translation_notes:
  revision_awareness: 'Coincide con la última revisión registrada: no se requerían cambios respecto del estado más reciente, y se mantuvo la solución cautelosa para el verbo raro y la expresión de lugar.'
  spanish_consistency_notes:
  - Se mantiene «Booz» para el personaje, conforme al uso castellano estándar del nombre propio.
  - Se usa «Rut» como forma española habitual del nombre.
  - Se preserva la ambigüedad de מַרְגְּלֹתָיו con una expresión natural («a sus pies») y nota explicativa, sin ampliar el sentido más allá del hebreo.
  - La puntuación y el orden verbal siguen un estilo bíblico moderno y publicable en español.
