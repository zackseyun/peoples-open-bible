review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: consecuencia (''Por tanto''), inversión retributiva con ''devoran/serán devorados'', cautiverio para los adversarios y entrega al despojo de quienes despojan. Sin embargo, en la cláusula ''los que te saquean serán saqueados'' se pierde el valor nominal de לִמְשִׁסָּה (''a despojo/plunder'') que el inglés POB preserva como ''will become plunder''. Conviene ajustar esa cláusula para mantener más de cerca la imagen de reversión y la rationale léxica documentada.'
  spanish_quality_summary: El español es claro, natural y de buen registro bíblico moderno. 'Por tanto', 'adversarios' y 'cautiverio' funcionan bien. La única mejora importante es evitar convertir un sustantivo en una pasiva verbal donde el hebreo y el POB enfatizan el resultado de convertirse en despojo. También suena un poco más idiomático 'irán al cautiverio' que 'irán en cautiverio'.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Las decisiones principales son coherentes con el audit trail: ''devoran'', ''adversarios'', ''cautiverio'', ''despojan'', ''despojo''. La revisión propuesta acerca mejor לִמְשִׁסָּה a ''serán despojo'' y mantiene la alternativa léxica de la nota.'
  issues:
  - severity: medium
    issue: La cláusula 'los que te saquean serán saqueados' no preserva con precisión לִמְשִׁסָּה.
    rationale: El hebreo usa un sustantivo ('a despojo/plunder'), no simplemente un verbo pasivo. La versión actual comunica castigo, pero atenúa la imagen de convertirse en botín/despojo, que el POB inglés documenta explícitamente.
  - severity: low
    issue: '''Irán en cautiverio'' es menos idiomático que ''irán al cautiverio''.'
    rationale: Ambas expresiones son comprensibles, pero 'irán al cautiverio' suena más natural en español general y mantiene el mismo sentido de בַּשְּׁבִי יֵלֵכוּ.
  revised_spanish_text: Por tanto, todos los que te devoran serán devorados[a], y todos tus adversarios, todos ellos, irán al cautiverio; los que te saquean serán despojo, y a todos los que te despojan los entregaré al despojo.
  revised_footnotes:
  - marker: a
    text: 'O: «todos los que te saquean serán saqueados». El hebreo usa términos estrechamente relacionados para el expolio en la última cláusula.'
    reason: lexical_alternative
  revision_rationale: Se ajusta 'serán saqueados' a 'serán despojo' para reflejar mejor el sustantivo hebreo לִמְשִׁסָּה y alinearse con la decisión léxica del POB de preservar la imagen de convertirse en plunder/spoil. También se mejora la naturalidad de 'irán en cautiverio' a 'irán al cautiverio' sin cambiar el sentido.
