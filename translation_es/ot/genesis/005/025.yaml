translation:
  language: es
  text: Matusalén vivió ciento ochenta y siete años y engendró[a] a Lamec.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «llegó a ser padre de Lamec».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - vivió por
  lexicon: HALOT
  rationale: En las fórmulas genealógicas hebreas, חיה en wayyiqtol introduce la duración de vida antes del nacimiento del hijo. En español, "vivió" es la forma natural y fiel para esa fórmula.
- source_word: מְתוּשֶׁלַח
  english_pob_choice: Methuselah
  chosen_spanish: Matusalén
  alternatives_spanish:
  - Metusalén
  lexicon: convención onomástica bíblica en español
  rationale: El nombre propio se translitera según el uso bíblico establecido en español, conservando la referencia reconocible para lectores hispanohablantes.
- source_word: שֶׁבַע וּשְׁמֹנִים ... וּמְאַת שָׁנָה
  english_pob_choice: one hundred and eighty-seven years
  chosen_spanish: ciento ochenta y siete años
  alternatives_spanish:
  - ciento ochenta y siete años
  - ciento ochenta y siete años de edad
  lexicon: HALOT
  rationale: La secuencia hebrea numérica se expresa idiomáticamente en español como "ciento ochenta y siete años". Se evita el orden hebreo literal para no forzar el español.
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró a
  alternatives_spanish:
  - fue padre de
  - engendró
  lexicon: HALOT
  rationale: En genealogías, ילד en causativo se refiere a la paternidad biológica. "Engendró a" preserva el valor genealógico con un registro bíblico natural en español y evita la ambigüedad de "dio a luz" o la debilidad de "fue padre de" en este contexto.
- source_word: אֶת
  english_pob_choice: '[not separately translated]'
  chosen_spanish: '[no se traduce aparte]'
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: El marcador de objeto directo no tiene equivalente léxico independiente en español; su función queda absorbida por la sintaxis normal de la oración.
- source_word: לָמֶךְ
  english_pob_choice: Lamech
  chosen_spanish: Lamec
  alternatives_spanish:
  - Lameq
  lexicon: convención onomástica bíblica en español
  rationale: Se usa la forma tradicional hispana del nombre propio, manteniendo consistencia con la nomenclatura bíblica en español.
translation_notes:
  revision_awareness: 'El auditorio en inglés aprobó una equivalencia óptima con acuerdo alto y sin revisiones aplicadas. La versión española conserva esa decisión: formula genealógica natural, nombres propios transliterados en uso bíblico y el verbo causal genealógico con la fuerza adecuada.'
  spanish_consistency_notes:
  - Se mantiene el registro genealógico sobrio y directo propio de listas de descendencia.
  - Se evita calcar el orden numérico hebreo para lograr fluidez natural sin perder precisión.
  - La nota al pie preserva la alternativa más formal documentada en el audit trail inglés.
