translation:
  language: es
  text: Amado por su pueblo y agradable a su Hacedor[a], pedido desde el vientre de su madre, Samuel, nazareo de Yahvé en su ministerio profético, juzgó y sirvió como sacerdote; por la palabra de Dios estableció el reino y ungió gobernantes sobre su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Samuel, amado por su Yahvé, profeta de Yahvé, estableció un reino y ungió gobernantes sobre su pueblo». El testimonio hebreo, en cambio, dice «nazareo de Yahvé en su ministerio profético» y añade que «juzgó y sirvió como sacerdote».'
    reason: alternative_reading
lexical_decisions:
- source_word: אוהב עמו ורצוי עושהו
  english_pob_choice: Beloved by his people and pleasing to his Maker
  chosen_spanish: Amado por su pueblo y agradable a su Hacedor
  alternatives_spanish:
  - Amado por su pueblo y grato a su Creador
  - Querido por su pueblo y agradable a su Hacedor
  lexicon: BDB/HALOT (sentido contextual de אוהב, רצוי, עושהו)
  rationale: 'La línea hebrea añade dos rasgos iniciales que la versión inglesa reflejó: afecto/aprobación y relación con el Creador. ''Hacedor'' conserva el valor de עושהו sin desplazarlo a una formulación más interpretativa que ''Creador''.'
- source_word: המשואל מבטן אמו
  english_pob_choice: asked for from his mother's womb
  chosen_spanish: pedido desde el vientre de su madre
  alternatives_spanish:
  - pedido desde el seno de su madre
  - solicitado desde el vientre de su madre
  lexicon: HALOT
  rationale: La construcción hebrea expresa que fue pedido desde antes o desde el vientre materno. 'Vientre' mantiene la concreción del hebreo y del inglés auditado sin sobreexplicar.
- source_word: נזיר יהוה
  english_pob_choice: a Nazirite of the Lord
  chosen_spanish: nazareo de Yahvé
  alternatives_spanish:
  - nazareo del Señor
  - consagrado a Yahvé
  lexicon: HALOT
  rationale: '''Nazareo'' preserva el término técnico cultual que el inglés decidió conservar como ''Nazirite''. Se mantiene ''Yahvé'' según la terminología española del proyecto para יהוה.'
- source_word: בנבואה
  english_pob_choice: in prophecy
  chosen_spanish: en la profecía
  alternatives_spanish:
  - como profeta
  - en su vocación profética
  lexicon: HALOT
  rationale: La frase hebrea es compacta y algo elíptica; 'en la profecía' conserva esa forma sin convertirla en una paráfrasis más fuerte que el texto. La lectura griega paralela apoya el sentido profético de Samuel.
- source_word: שופט
  english_pob_choice: judged
  chosen_spanish: juzgó
  alternatives_spanish:
  - fue juez
  - gobernó como juez
  lexicon: HALOT
  rationale: '''Juzgó'' reproduce el verbo de forma natural en español y mantiene el valor de gobierno judicial propio de Samuel.'
- source_word: ומכהן
  english_pob_choice: served as priest
  chosen_spanish: sirvió como sacerdote
  alternatives_spanish:
  - ministró como sacerdote
  - ejerció como sacerdote
  lexicon: HALOT
  rationale: '''Sirvió como sacerdote'' conserva el aspecto verbal de servicio/ejercicio, evitando un simple estado de oficio.'
- source_word: בדבר אל
  english_pob_choice: by the word of God
  chosen_spanish: por la palabra de Dios
  alternatives_spanish:
  - por la palabra de Dios
  - por mandato de Dios
  lexicon: HALOT
  rationale: La expresión hebrea apunta a mediación o autorización divina. 'Por la palabra de Dios' es la correspondencia más directa y mantiene el instrumento causal del hebreo y del inglés.
- source_word: הכין ממלכת
  english_pob_choice: he established the kingdom
  chosen_spanish: estableció el reino
  alternatives_spanish:
  - estableció el reino
  - afianzó el reino
  - hizo firme el reino
  lexicon: HALOT
  rationale: '''הכין'' puede implicar establecer o afianzar. ''Estableció el reino'' es la opción más natural en español y coincide con el paralelo griego κατέστησεν βασιλείαν.'
- source_word: וימשח נגידים
  english_pob_choice: and anointed rulers
  chosen_spanish: y ungió gobernantes
  alternatives_spanish:
  - y ungió jefes
  - y ungió príncipes
  lexicon: HALOT
  rationale: '''נגידים'' admite varias opciones. ''Gobernantes'' comunica bien la función política sin forzar el tono arcaico de ''príncipes''.'
- source_word: על עם
  english_pob_choice: over his people
  chosen_spanish: sobre su pueblo
  alternatives_spanish:
  - sobre su pueblo
  - para su pueblo
  lexicon: HALOT
  rationale: El complemento posesivo se entiende por contexto del hebreo y del paralelo griego. 'Sobre su pueblo' preserva la relación de gobierno sin añadir más que el texto.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: El proyecto español pide usar 'Yahvé' para יהוה. Aquí se mantiene el nombre propio del pacto en lugar de una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Tensión textual entre hebreo y griego sobre Samuel
  english_pob_reading: Hebrew witness includes 'a Nazirite of the Lord in prophecy, judged and served as priest'; Greek parallel reads 'Samuel, beloved by his Lord, a prophet of the Lord, established a kingdom, and anointed rulers over his people.'
  chosen_spanish_reading: Se conserva en el cuerpo principal la forma hebrea y se documenta la alternativa griega en nota.
  alternative_spanish_readings:
  - Samuel, amado por su Señor, profeta del Señor, estableció un reino y ungió gobernantes sobre su pueblo
  - Samuel, profeta de Yahvé, estableció un reino y ungió gobernantes sobre su pueblo
  rationale: La versión española principal sigue el hebreo, que es la base del texto fuente proporcionado, pero no borra la diferencia con el griego. La nota permite auditar ambas tradiciones sin fusionarlas indebidamente.
  doctrine_reference: Fuente hebrea principal con paralelo griego de control
translation_notes:
  revision_awareness: 'Se incorporó la apertura hebrea añadida en la revisión más reciente: ''Amado por su pueblo y agradable a su Hacedor, pedido desde el vientre de su madre'', antes del nombre de Samuel. También se mantuvo la tensión textual relevante entre el testimonio hebreo y el paralelo griego, sin borrar ninguna de las dos tradiciones.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' para יהוה conforme al criterio del proyecto.
  - Se prefirió 'nazareo' para conservar el término técnico cultual equivalente a 'Nazirite'.
  - Se tradujo 'שופט' como 'juzgó' para mantener el valor verbal y judicial.
  - Se conservó 'por la palabra de Dios' para reflejar la mediación divina del hebreo.
  - Se evitó 'SEÑOR' como sustituto del nombre divino en el texto principal.
