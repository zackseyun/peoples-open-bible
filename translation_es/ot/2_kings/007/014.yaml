translation:
  language: es
  text: 'Entonces tomaron dos carros de guerra con caballos[a], y el rey los envió tras el campamento de Aram, diciendo: «Vayan y vean».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «dos carros de caballos», una expresión comprimida que probablemente se refiere a dos carros tirados por caballos o a dos equipos de carros.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: So they took
  chosen_spanish: Así que tomaron
  alternatives_spanish:
  - Entonces tomaron
  - Y tomaron
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «Así que» conserva la relación consecutiva en un español natural y digno, sin perder la progresión narrativa.
- source_word: שְׁנֵי רֶכֶב סוּסִים
  english_pob_choice: two chariots with horses
  chosen_spanish: dos carros con caballos
  alternatives_spanish:
  - dos carros de caballos
  - dos carros de guerra con caballos
  - dos equipos de carros
  lexicon: HALOT
  rationale: La expresión hebrea es comprimida y algo elíptica. «Carros con caballos» preserva la imagen concreta sin volverla extraña en español. «Carros» comunica el רֶכֶב en un registro comprensible; «con caballos» mantiene la especificación de סוּסִים.
- source_word: וַיִּשְׁלַח הַמֶּלֶךְ
  english_pob_choice: and the king sent them
  chosen_spanish: y el rey los envió
  alternatives_spanish:
  - y el rey envió
  - entonces el rey los despachó
  lexicon: HALOT
  rationale: En español hace falta explicitar el objeto; lo implícito en el contexto inmediato son los carros o el grupo enviado. «Los envió» mantiene la referencia narrativa sin añadir material ajeno.
- source_word: אַחֲרֵי מַחֲנֵה אֲרָם
  english_pob_choice: after the camp of Aram
  chosen_spanish: tras el campamento de Aram
  alternatives_spanish:
  - después del campamento de Aram
  - en persecución del campamento de Aram
  - tras el campamento arameo
  lexicon: HALOT
  rationale: אַחֲרֵי expresa dirección/seguimiento; «tras» resulta más natural que «después de» en este contexto de persecución. «Campamento» conserva מַחֲנֶה. Se mantiene «Aram» como nombre propio, según la política del proyecto.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - los arameos
  - Siria
  lexicon: HALOT
  rationale: Se translitera el nombre propio y no se sustituye por «Siria» ni por un etnónimo, para conservar la referencia del texto fuente y evitar una explicación interpretativa no requerida.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: La fórmula introduce discurso directo; «diciendo» reproduce de forma transparente la estructura hebrea.
- source_word: לְכוּ וּרְאוּ
  english_pob_choice: Go and see
  chosen_spanish: Vayan y vean
  alternatives_spanish:
  - Vayan y miren
  - Vayan e inspeccionen
  lexicon: HALOT
  rationale: Los imperativos son breves y directos. «Vean» es el equivalente más básico y fiel de ראה aquí, adecuado para una instrucción de reconocimiento.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y el consenso del auditable inglés POB; no se requieren revisiones adicionales respecto del pasaje fuente ni de la solución léxica ya validada.
  spanish_consistency_notes:
  - Se conserva «Aram» de forma consistente como nombre propio.
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - «Carros con caballos» mantiene la compresión hebrea sin forzar una equivalencia técnica innecesaria.
  - El marcador de nota [a] está anclado en la frase correspondiente para señalar la alternativa léxica documentada.
