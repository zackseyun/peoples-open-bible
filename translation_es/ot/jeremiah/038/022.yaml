revisions:
- from: 'Y he aquí[a], todas las mujeres que quedaban en la casa del rey de Judá eran sacadas a los oficiales del rey de Babilonia, y ellas decían: «Tus amigos te engañaron y prevalecieron contra ti; tus pies se hundieron en el lodo[b]; dieron la vuelta atrás».'
  to: 'Y he aquí[a], todas las mujeres que quedaban en la casa del rey de Judá eran sacadas a los oficiales del rey de Babilonia, y ellas decían: «Los que estaban en paz contigo[c] te engañaron y prevalecieron contra ti; tus pies se hundieron en el lodo[b]; se volvieron atrás».”'
  rationale: Se revisa «Tus amigos» a «Los que estaban en paz contigo» para reflejar mejor el modismo hebreo אַנְשֵׁי שְׁלֹמֶךָ y alinearlo con la decisión léxica documentada por el POB inglés; además se añade la nota correspondiente. Se cambia «dieron la vuelta atrás» por «se volvieron atrás» por mayor naturalidad y fidelidad al sentido de retirada. Se mantienen las demás decisiones, que son sustancialmente fieles al hebreo y al expediente inglés.
