id: 2TH.3.7
reference: 2 Thessalonians 3:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: αὐτοὶ γὰρ οἴδατε πῶς δεῖ μιμεῖσθαι ἡμᾶς, ὅτι οὐκ ἠτακτήσαμεν ἐν ὑμῖν
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/007.yaml
  text: For you yourselves know how you ought to imitate us[a], because we did not behave disorderly among you.
translation:
  language: ko
  text: 여러분 자신이 어떻게 우리를 본받아야 하는지를 알고 있습니다. 우리는 여러분 가운데서 무질서하게 행하지 않았기 때문입니다[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 본 정황에서 더 구체적으로는 「우리는 여러분 가운데서 게으르게 지내지 않았다」.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ
  english_pob_choice: yourselves
  chosen_korean: 여러분 자신이
  alternatives_korean:
  - 여러분 스스로
  lexicon: BDAG
  rationale: 강조 대명사를 「여러분 자신이」로 보존한다.
- source_word: οἴδατε
  english_pob_choice: you know
  chosen_korean: 알고 있습니다
  alternatives_korean:
  - 압니다
  - 알고 계십니다
  lexicon: BDAG
  rationale: 합쇼체 자연 표현.
- source_word: πῶς δεῖ μιμεῖσθαι ἡμᾶς
  english_pob_choice: how you ought to imitate us
  chosen_korean: 어떻게 우리를 본받아야 하는지를
  alternatives_korean:
  - 어떻게 우리를 본받아야 마땅한지를
  lexicon: BDAG
  rationale: δεῖ의 의무를 「~해야 하는지」로 자연스럽게 표현. 「본받다」는 μιμέομαι의 표준 번역.
- source_word: οὐκ ἠτακτήσαμεν
  english_pob_choice: we did not behave disorderly
  chosen_korean: 무질서하게 행하지 않았기
  alternatives_korean:
  - 게으르게 지내지 않았기
  - 분수에 맞지 않게 행하지 않았기
  lexicon: BDAG
  rationale: 3:6의 어휘적 연결 「무질서하게」를 유지한다. 정황적 「게으름」 함의는 각주.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_korean: 여러분 가운데서
  alternatives_korean:
  - 여러분 곁에서
  lexicon: BDAG
  rationale: 표준 한국어.
theological_decisions:
- issue: ἀτακτέω의 의미 폭
  chosen_reading: 「무질서하게 행하다」 — 본 문맥에서 게으름을 포함하나 더 넓은 의미
  alternative_readings:
  - 「게으르게 지내다」 (좁은 정황적 의미)
  rationale: 어휘적 의미를 좁히지 않고 본문에 보존하며, 정황적 게으름 의미는 각주.
  doctrine_reference: 'Translation philosophy §1, §3, §5'
