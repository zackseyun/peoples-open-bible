base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/007/010.yaml
  text: And on the twenty-third day of the seventh month he sent the people to their tents[b][a], rejoicing and glad of heart because of the goodness that Yahweh had done for David and for Solomon and for Israel his people.
  footnotes:
