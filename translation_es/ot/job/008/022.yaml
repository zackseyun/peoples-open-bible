translation:
  language: es
  text: Los que te odian se vestirán de vergüenza, y la tienda de los impíos no existirá más[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «la tienda de los impíos no es».'
