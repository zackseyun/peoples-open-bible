id: GEN.44.26
reference: Genesis 44:26
source:
  edition: WLC
  text: וַ/נֹּ֕אמֶר לֹ֥א נוּכַ֖ל לָ/רֶ֑דֶת אִם יֵשׁ֩ אָחִ֨י/נוּ הַ/קָּטֹ֤ן אִתָּ֨/נוּ֙ וְ/יָרַ֔דְנוּ כִּי לֹ֣א נוּכַ֗ל לִ/רְאוֹת֙ פְּנֵ֣י הָ/אִ֔ישׁ וְ/אָחִ֥י/נוּ הַ/קָּטֹ֖ן אֵינֶ֥/נּוּ אִתָּֽ/נוּ־־׃
translation:
  text: But we said[a], ‘We cannot go down. If our youngest brother is with us, then we will go down[c][b], for we cannot see the man's face unless our youngest brother is with us.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'see the face of the man,' an idiom meaning to appear before him or come into his presence.
    reason: lexical_alternative
  - marker: b
    text: Or 'if our youngest brother is not with us'.
    reason: previous_rendering
  - marker: c
    text: Or 'We cannot go down unless our youngest brother is with us; then we will go down'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַנֹּאמֶר
  chosen: But we said
  alternatives:
  - And we said
  - So we said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the discourse context of Judah recounting a prior response and marks mild contrast with the preceding demand; 'said' is the plain sense of אמר.
- source_word: לֹא נוּכַל לָרֶדֶת
  chosen: We cannot go down
  alternatives:
  - We are not able to go down
  - We cannot go
  lexicon: HALOT
  rationale: יכל expresses ability; 'cannot' is natural English. ירד is literally 'go down,' appropriate here both geographically and idiomatically for travel to Egypt, so the more formal element is retained.
- source_word: אִם יֵשׁ אָחִינוּ הַקָּטֹן אִתָּנוּ
  chosen: unless our youngest brother is with us
  alternatives:
  - if our little brother is with us
  - if our younger brother is with us
  lexicon: HALOT
  rationale: Although אִם + positive clause is literally 'if our youngest brother is with us,' English idiom after a negated main clause is best rendered 'unless.' הַקָּטֹן in this family context refers to the youngest brother, not merely a physically small one.
- source_word: וְיָרַדְנוּ
  chosen: then we will go down
  alternatives:
  - and we will go down
  - then we may go down
  lexicon: HALOT
  rationale: The clause gives the consequent of the condition. Adding 'then' makes the logic explicit in natural English while preserving the future sense of the qatal with waw in this context.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: כִּי here introduces the reason for their refusal. 'Because' is clearer in modern English than the more formal 'for.'
- source_word: לִרְאוֹת פְּנֵי הָאִישׁ
  chosen: see the man’s face
  alternatives:
  - appear before the man
  - see the presence of the man
  lexicon: HALOT
  rationale: Literally the Hebrew says 'see the face of the man,' an idiom for appearing before someone. The translation keeps the concrete imagery ('face') while remaining understandable. The alternative idiomatic rendering is viable but less transparent to the source wording.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the lord
  - the official
  lexicon: HALOT
  rationale: The Hebrew noun is simply 'the man,' referring to Joseph in his official role. The text does not use a title here, so the plain lexical value should be preserved.
- source_word: וְאָחִינוּ הַקָּטֹן אֵינֶנּוּ אִתָּנוּ
  chosen: if our youngest brother is not with us
  alternatives:
  - and our youngest brother is not with us
  lexicon: HALOT
  rationale: 'Hebrew coordinates the clause with waw, but in English the sense is conditional: they cannot appear before the man in the circumstance that the youngest brother is absent. Rendering it with ''if'' communicates the logic more naturally without changing the meaning.'
