  yaml_path: translation/ot/exodus/018/014.yaml
  text: When Moses's father-in-law saw all that he was doing for the people[a], he said, “What is this thing that you are doing for the people? Why do you sit alone[b], while all the people stand before you from morning until evening?”
  footnotes:
