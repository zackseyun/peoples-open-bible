revisions:
- from: No temas[a], muchacho, porque hemos empobrecido; tendrás mucho, si temes a Dios y te apartas de todo pecado y haces lo que le agrada delante de él.
  to: No temas[a], muchacho, porque hemos llegado a ser pobres; tienes mucho, si temes a Dios y te apartas de todo pecado y haces lo que le agrada delante de él.
  rationale: Se ajusta 'tendrás mucho' a 'tienes mucho' para reflejar con mayor fidelidad ὑπάρχει σοι πολλὰ y el English POB. También se mejora levemente la naturalidad de ἐπτωχεύσαμεν con 'hemos llegado a ser pobres', manteniendo el sentido resultativo sin perder dignidad bíblica.
