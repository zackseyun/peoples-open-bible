translation:
  language: es
  text: Tiemblen[a], y no pequen; hablen en sus corazones sobre sus camas, y estén quietos. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Enójense, y no pequen». El verbo hebreo puede denotar agitación, temblor o enojo.'
    reason: alternative_reading
lexical_decisions:
- source_word: רִגְזוּ
  english_pob_choice: Tremble
  chosen_spanish: Tiemblen
  alternatives_spanish:
  - Estén angustiados
  - Tengan temor
  - Enójense
  lexicon: HALOT
  rationale: El verbo puede abarcar temblor, agitación o enojo según el contexto. Dado que el verso sigue con la prohibición de pecar y con una llamada a la reflexión interior y al silencio, 'Tiemblen' conserva la perturbación emocional sin limitarla a 'enójense'. En español, además, mantiene la fuerza exhortativa y la imagen física del original.
- source_word: וְאַל תֶּחֱטָאוּ
  english_pob_choice: and do not sin
  chosen_spanish: y no pequen
  alternatives_spanish:
  - y no pequen contra Dios
  - y no cometan pecado
  lexicon: HALOT
  rationale: La negación con חטא se vierte de manera directa e idiomática como 'no pequen'. Esto preserva la prohibición moral sin añadir explicaciones que el hebreo no expresa explícitamente.
- source_word: אִמְרוּ
  english_pob_choice: speak
  chosen_spanish: hablen
  alternatives_spanish:
  - digan
  - hablen consigo mismos
  lexicon: HALOT
  rationale: Aunque la forma verbal puede ser 'decir' o 'hablar', 'hablen' funciona naturalmente con la expresión siguiente 'en su corazón' y conserva la fuerza de la orden de hablar internamente. La alternativa 'digan' suena más literal, pero menos natural en español con el complemento locativo interior.
- source_word: בִלְבַבְכֶם
  english_pob_choice: in your hearts
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en sus corazones
  - dentro de ustedes
  lexicon: HALOT
  rationale: El plural hebreo pide un referente plural; sin embargo, en español bíblico y general 'en su corazón' puede funcionar colectivamente para un grupo y suena más natural que 'en sus corazones'. La decisión conserva el sentido de interioridad y reflexión sin forzar una imagen poco idiomática. Se documenta la alternativa plural porque el hebreo la permite y porque el inglés POB la marcó explícitamente.
- source_word: עַל מִשְׁכַּבְכֶם
  english_pob_choice: on your beds
  chosen_spanish: sobre su cama
  alternatives_spanish:
  - en su cama
  - sobre sus camas
  lexicon: HALOT
  rationale: La expresión hebrea usa plural posesivo; no obstante, en español la formulación singular colectiva 'sobre su cama' es más fluida y puede referirse al lugar de reposo de quienes reciben la exhortación. La imagen temporal/nocturna de retiro y meditación privada se conserva. La alternativa plural se anota por fidelidad a la morfología hebrea.
- source_word: וְדֹמּוּ
  english_pob_choice: and be still
  chosen_spanish: y estén quietos
  alternatives_spanish:
  - y callen
  - y guarden silencio
  - y estén en silencio
  lexicon: HALOT
  rationale: דמם puede significar callarse, guardar silencio o estar quieto. 'Estén quietos' conserva tanto la cesación exterior como la calma interior, y encaja con la progresión del verso desde la agitación hacia el reposo reflexivo.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se translitera el marcador litúrgico porque su sentido preciso es incierto y la tradición textual lo conserva sin traducir. Mantenerlo transparenta el dato hebreo para el lector español.
theological_decisions:
- issue: 'Sentido de רִגְזוּ: temblor/agitación frente a enojo'
  english_pob_reading: An exhortation to trembling/agitation restrained from sin, rather than a direct command to anger
  chosen_spanish_reading: Una exhortación a temblar o inquietarse sin llegar al pecado, más que un mandato directo de enojarse
  alternative_spanish_readings:
  - Enójense y no pequen
  - Tengan ira, y no pequen
  rationale: La evidencia del contexto inmediato favorece una lectura de agitación interior que desemboca en examen de conciencia y silencio. Aun así, la tradición interpretativa de 'enójense' tiene peso y se conserva como alternativa para no borrar la tensión lexical y teológica del texto.
  doctrine_reference: Preservar la tensión interpretativa sin cerrarla artificialmente
- issue: Plural hebreo en 'en su corazón' y 'sobre su cama'
  english_pob_reading: 'Plural suffixes retained: ''in your hearts'', ''on your beds'''
  chosen_spanish_reading: 'Uso colectivo singular: ''en su corazón'' y ''sobre su cama'''
  alternative_spanish_readings:
  - en sus corazones y sobre sus camas
  - en sus corazones y sobre su cama
  rationale: El hebreo marca plural, pero el español puede expresar la exhortación a un grupo mediante singular colectivo sin perder el sentido. Esta decisión mejora la fluidez de lectura pública. Se deja constancia de la alternativa plural porque refleja más directamente la morfología del original.
  doctrine_reference: Fidelidad morfológica con ajuste idiomático controlado
translation_notes:
  revision_awareness: El inglés POB actualizó 'ponder in your hearts' a 'speak in your hearts' para reflejar más directamente אִמְרוּ. Esta versión española sigue esa revisión con 'hablen', evitando una paráfrasis interpretativa más libre. También se conservó la tensión lexical de רִגְזוּ en el cuerpo principal y se señaló la lectura tradicional alternativa en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' no aplica en este versículo.
  - Se mantiene el marcador litúrgico 'Selah' sin traducir.
  - Se conserva un registro bíblico sobrio y publicable, evitando arcaísmos innecesarios.
  - La elección de singular colectivo en los posesivos responde a fluidez española, pero se documenta la morfología plural del hebreo en las decisiones léxicas.
