translation:
  language: es
  text: No quedó nada para que devorara[a]; por tanto, su prosperidad[b] no perdurará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse, más literalmente: «No quedó sobreviviente para su comer», es decir, no quedó nada de lo que consumía.'
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo es difícil; pueden proponerse también «no durará» o, menos probablemente en este contexto, «no prosperará».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  english_pob_choice: Nothing
  chosen_spanish: No quedó nada
  alternatives_spanish:
  - No hay nada
  - Nada quedó
  lexicon: HALOT
  rationale: El hebreo introduce una negación existencial. En español, 'No quedó nada' conserva la idea de ausencia total y encaja bien con el contexto de consumo/devoración sin sonar forzado.
- source_word: שָׂרִיד
  english_pob_choice: survivor / escaped
  chosen_spanish: quedó
  alternatives_spanish:
  - sobreviviente
  - remanente
  - escapó
  lexicon: HALOT
  rationale: Aunque el sustantivo significa literalmente 'sobreviviente' o 'remanente', en este sintagma con לְאָכְלוֹ la idea es que nada permaneció para ser comido. 'Quedó' expresa esa fuerza idiomática en español.
- source_word: לְאָכְלוֹ
  english_pob_choice: his devouring
  chosen_spanish: para que devorara
  alternatives_spanish:
  - para su comer
  - para comerlo
  - para su devorar
  lexicon: HALOT
  rationale: 'La construcción con ל + infinitivo sugiere finalidad/relación: ''para su comer/devorar''. En español, ''para que devorara'' reproduce la relación verbal de manera natural y mantiene el matiz de consumo intenso.'
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - así que
  - por ello
  lexicon: HALOT
  rationale: Es una fórmula inferencial estándar. 'Por tanto' refleja bien la consecuencia lógica y mantiene un registro bíblico claro.
- source_word: יָחִיל
  english_pob_choice: will endure
  chosen_spanish: no perdurará
  alternatives_spanish:
  - no durará
  - no se mantendrá
  - no prosperará
  lexicon: HALOT
  rationale: El verbo es difícil y el audit trail inglés opta por 'will endure' para expresar duración/continuidad. 'No perdurará' preserva esa idea temporal sin decidir en exceso entre 'durar' y 'prosperar'.
- source_word: טוּבוֹ
  english_pob_choice: his prosperity
  chosen_spanish: su prosperidad
  alternatives_spanish:
  - su bien
  - sus bienes
  - su bienestar
  lexicon: HALOT
  rationale: En contexto de juicio, 'su prosperidad' comunica de forma idiomática el conjunto de bienes/éxito/bonanza referido por טוב, alineado con la decisión inglesa.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail inglés, que corrigió la primera cláusula para reflejar mejor la idea de que no quedó nada para devorar, manteniendo en la segunda cláusula el sentido de duración/prosperidad no sostenida.
  spanish_consistency_notes:
  - Se mantiene 'prosperidad' para טוּבוֹ, coherente con la lectura contextual del inglés POB.
  - Se evita 'SEÑOR' y no hay nombres divinos en este versículo.
  - El tono es sobrio y publicable, con sintaxis española natural y sin calco excesivo.
