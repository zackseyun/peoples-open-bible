- from: Y yo consagraré contra ti[a] destructores, cada uno con sus armas[b]; cortarán los mejores de tus cedros y los echarán al fuego[c].
  to: Y yo apartaré contra ti[a] destructores, cada uno con sus armas[b]; cortarán los mejores de tus cedros y los echarán al fuego[c].
  rationale: Se ajusta la traducción principal de וְקִדַּשְׁתִּי de «consagraré» a «apartaré» para seguir la decisión léxica y teológica documentada por el POB inglés («set apart»), manteniendo «consagraré» como alternativa en nota. El resto del versículo es fiel, natural y no requiere más cambios.
