theological_decisions:
- issue: Divine action in relation to Laban's wealth
  chosen_reading: Render God's action as 'has taken away' rather than 'has rescued/delivered.'
  alternative_readings:
  - has rescued
  - has delivered
  rationale: The verse speaks of wealth formerly associated with Laban now rightly belonging to Jacob's family. The context is not primarily rescue of the wealth itself but God's removal of it from unjust control. This is a lexical-contextual decision, not a doctrinal claim about divine theft; the wording reflects providential transfer in the narrative.
  doctrine_reference: Translation philosophy §1, §5
