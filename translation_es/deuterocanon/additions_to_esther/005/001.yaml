lexical_decisions:
- source_word: ἀντίγραφον
  english_pob_choice: copy
  chosen_spanish: copia
  alternatives_spanish:
  - duplicado
  - transcripción
  lexicon: LSJ
  rationale: El término designa una reproducción escrita de un documento. «Copia» es la equivalencia natural y precisa en español administrativo.
- source_word: ἐπιστολῆς
  english_pob_choice: letter
  chosen_spanish: carta
  alternatives_spanish:
  - epístola
  - documento
  lexicon: LSJ
  rationale: En contexto real-administrativo se trata de una comunicación escrita; «carta» comunica con claridad sin arcaísmo innecesario.
- source_word: τὰ ὑπογεγραμμένα
  english_pob_choice: the following
  chosen_spanish: he aquí ...
  alternatives_spanish:
  - lo que sigue
  - lo escrito abajo
  lexicon: LSJ
  rationale: La fórmula introduce el contenido que sigue. «He aquí» funciona como introducción formal y natural en español antes del texto citado.
- source_word: Βασιλεὺς μέγας
  english_pob_choice: Great King
  chosen_spanish: el Gran Rey
  alternatives_spanish:
  - el rey grande
  - Rey, el Grande
  lexicon: LSJ
  rationale: Es un título real persa. «Gran Rey» conserva el valor titular y suena más natural en español que una construcción más literal.
- source_word: ἑκατὸν εἴκοσι ἑπτὰ
  english_pob_choice: one hundred twenty-seven
  chosen_spanish: ciento veintisiete
  alternatives_spanish:
  - ciento y veintisiete
  lexicon: LSJ
  rationale: Rendición numérica directa y estándar en español contemporáneo.
- source_word: σατραπείαις
  english_pob_choice: satrapies
  chosen_spanish: satrapías
  alternatives_spanish:
  - provincias
  - satrapías (provincias)
  lexicon: LSJ
  rationale: Se conserva el término persa específico, como en la decisión inglesa, para no perder la precisión administrativa e histórica.
- source_word: χωρῶν ἄρχουσι
  english_pob_choice: the rulers of the provinces
  chosen_spanish: los gobernantes de las provincias
  alternatives_spanish:
  - los príncipes de las provincias
  - los magistrados de las provincias
  lexicon: LSJ
  rationale: La frase identifica a los funcionarios destinatarios. «Gobernantes de las provincias» es claro y suficientemente formal.
- source_word: τοῖς τὰ ἡμέτερα φρονοῦσι
  english_pob_choice: those who are loyal to our interests
  chosen_spanish: a los que son leales a nuestros intereses[a]
  alternatives_spanish:
  - a los que piensan nuestras cosas
  - a los que están de parte de nuestros intereses
  - a los que favorecen nuestra causa
  lexicon: LSJ
  rationale: La expresión griega es idiomática y literalmente significa algo como «los que piensan nuestras cosas». La lectura inglesa interpreta correctamente la lealtad política; el español mantiene esa interpretación y la ancla con una nota para no borrar la tensión léxica.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - salud
  - que estén bien
  lexicon: LSJ
  rationale: Es la salutación epistolar estándar. «Saludos» es la equivalencia más natural y comunicativa en español.
theological_decisions:
- issue: Ambigüedad idiomática de τοῖς τὰ ἡμέτερα φρονοῦσι
  english_pob_reading: those who are loyal to our interests
  chosen_spanish_reading: a los que son leales a nuestros intereses
  alternative_spanish_readings:
  - a los que piensan nuestras cosas
  - a los que son partidarios de nuestra causa
  rationale: El griego no dice literalmente «leales» sino algo más cercano a «los que piensan nuestras cosas». El español principal sigue la lectura funcional de la POB, mientras la nota preserva la alternativa literal para no borrar el matiz idiomático.
