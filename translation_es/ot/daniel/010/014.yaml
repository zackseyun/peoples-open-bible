translation:
  language: es
  text: Y he venido para hacerte entender lo que ha de acontecer a tu pueblo en los últimos días[a], porque la visión es aún para días venideros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en días postreros». La expresión hebrea es un modismo profético para el futuro desenlace de los acontecimientos.
    reason: alternative_reading
  - marker: b
    text: O «para muchos días» o «para días futuros». La frase indica que la visión se refiere a un tiempo todavía por venir.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאתִי
  english_pob_choice: And I have come
  chosen_spanish: Y he venido
  alternatives_spanish:
  - Y vine
  - Y he llegado
  lexicon: HALOT
  rationale: El perfecto hebreo con valor de acción completada y relevancia presente se refleja bien con «he venido», que conserva la llegada ya realizada y su pertinencia actual en el discurso.
- source_word: לַהֲבִינְךָ
  english_pob_choice: to make you understand
  chosen_spanish: para hacerte entender
  alternatives_spanish:
  - para darte entendimiento
  - para causarte a entender
  lexicon: HALOT
  rationale: El hifil es causativo; «hacerte entender» comunica esa fuerza sin sonar rígido en español y mantiene la relación directa con el destinatario en segunda persona.
- source_word: אֵת אֲשֶׁר
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - eso que
  lexicon: HALOT
  rationale: En español, «lo que» transmite de forma natural el contenido de la revelación sin sobrecargar la frase con una literalidad poco idiomática.
- source_word: יִקְרָה
  english_pob_choice: will happen
  chosen_spanish: ha de acontecer
  alternatives_spanish:
  - sucederá
  - va a ocurrir
  lexicon: HALOT
  rationale: «Acontecer» preserva el matiz de evento que sobreviene y suena digno en un contexto profético; la perífrasis «ha de» comunica futuridad segura sin forzar un simple futuro mecánico.
- source_word: לְעַמְּךָ
  english_pob_choice: to your people
  chosen_spanish: a tu pueblo
  alternatives_spanish:
  - para tu pueblo
  - sobre tu pueblo
  lexicon: HALOT
  rationale: Con un verbo de acontecimiento, «a tu pueblo» funciona de manera amplia y natural en español, sin introducir necesariamente beneficio o daño.
- source_word: בְּאַחֲרִית הַיָּמִים
  english_pob_choice: in the latter days
  chosen_spanish: en el fin de los días
  alternatives_spanish:
  - en los últimos días
  - en el final de los días
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo profético; «en el fin de los días» conserva la formulación elevada y deja abierta la tensión escatológica sin imponer un sistema interpretativo más específico.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del anuncio previo; «porque» es la forma más clara y natural en español para ese valor causal.
- source_word: עוֹד
  english_pob_choice: yet
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  - todavía no
  lexicon: HALOT
  rationale: «Aún» conserva la idea de que la visión pertenece al futuro y no está realizada; además encaja bien con «hay visión» en la cláusula siguiente.
- source_word: חָזוֹן
  english_pob_choice: the vision
  chosen_spanish: visión
  alternatives_spanish:
  - la visión
  - un mensaje visionario
  lexicon: HALOT
  rationale: En este contexto el sustantivo puede funcionar de manera anarthra y referirse al contenido revelado; el español admite omitir el artículo para evitar una repetición innecesaria y mantener fluidez.
- source_word: לַיָּמִים
  english_pob_choice: for days to come
  chosen_spanish: para días venideros
  alternatives_spanish:
  - para muchos días
  - para los días futuros
  lexicon: HALOT
  rationale: La preposición y el sustantivo expresan orientación temporal hacia el futuro; «días venideros» mantiene la idea de futuro abierto y evita reducir el hebreo a una mera cantidad de días.
theological_decisions:
- issue: Idioma escatológico בְּאַחֲרִית הַיָּמִים
  english_pob_reading: in the latter days
  chosen_spanish_reading: en el fin de los días
  alternative_spanish_readings:
  - en los últimos días
  - en el final de los días
  rationale: Se conserva el carácter proverbial/profético de la expresión sin resolverla prematuramente en un esquema doctrinal específico. «Fin de los días» es suficientemente literal y deja la tensión interpretativa abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide de cerca con el audit trail en inglés y no requiere revisiones adicionales: se preserva el perfecto de llegada, el valor causativo de לַהֲבִינְךָ, el modismo escatológico y la orientación futura de עוֹד חָזוֹן לַיָּמִים.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando corresponda; este versículo no lo contiene.
  - Se usa «visión» para חָזוֹן en continuidad con el uso bíblico profético y con la audit trail inglesa.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el texto fuente.
  - La puntuación separa claramente las dos cláusulas causales y mantiene un registro bíblico moderno y legible.
