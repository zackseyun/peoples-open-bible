translation:
  language: es
  text: De David. A ti, Yahvé, elevo mi alma[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi vida» o «mi ser»; el hebreo נֶפֶשׁ («nephesh») puede designar a la persona entera, no solo el aspecto inmaterial.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  - Un salmo de David
  lexicon: HALOT
  rationale: La preposición ל con un nombre propio en encabezamientos salmódicos suele indicar asociación davídica más que autoría estricta. «De David» conserva esa ambigüedad de manera natural en español, sin añadir un sustantivo que no está en hebreo.
- source_word: אֵלֶיךָ
  english_pob_choice: To you
  chosen_spanish: A ti
  alternatives_spanish:
  - Hacia ti
  - Para ti
  lexicon: HALOT
  rationale: אֶל con sufijo de 2ª persona masculina singular expresa dirección hacia la segunda persona. «A ti» es la forma más directa y natural en español, manteniendo la orientación de la oración.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio de la POB en español. Esto evita sustituir el nombre propio por un título y mantiene la referencia explícita al pacto.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  - mi persona
  lexicon: HALOT
  rationale: נֶפֶשׁ puede denotar alma, vida, persona o ser entero. Aquí «mi alma» preserva el paralelismo devocional del hebreo y coincide con la solución inglesa auditada, sin reducir el sentido a una sola dimensión psicológica.
- source_word: אֶשָּׂא
  english_pob_choice: I lift up
  chosen_spanish: elevo
  alternatives_spanish:
  - levanto
  - alzo
  - elevo hacia ti
  lexicon: HALOT
  rationale: El verbo נָשָׂא en este giro idiomático significa levantar o alzar en dirección a alguien. «Elevo» reproduce con naturalidad la imagen de elevar el alma en oración y conserva el movimiento dirigido del original.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, por lo que la traducción mantiene el nombre divino en español. «Yahvé» sigue la convención establecida del proyecto y evita la sustitución por un título impersonal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido amplio de נֶפֶשׁ
  english_pob_reading: my soul, with note that it can denote the whole person
  chosen_spanish_reading: mi alma, con nota sobre posibles valores de vida o ser
  alternative_spanish_readings:
  - mi vida
  - mi ser
  - mi persona
  rationale: El hebreo נֶפֶשׁ puede abarcar más que el componente inmaterial; puede referirse a la vida o a la persona entera. Se conserva «mi alma» en el texto principal y se explicita en nota que el término puede abarcar la totalidad de la persona.
  doctrine_reference: HALOT, נֶפֶשׁ; nota auditada de la POB en inglés
translation_notes:
  revision_awareness: El pasaje coincide con la última pasada revisada sin cambios sustanciales; se mantiene la solución auditada en inglés para el nombre divino, el paralelismo de נֶפֶשׁ y la imagen verbal de elevar el alma.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, no «SEÑOR».
  - «De David» conserva la ambigüedad del encabezamiento hebreo sin sobreespecificar autoría.
  - «A ti» mantiene la dirección de la oración en un español natural y reverente.
  - La nota de נֶפֶשׁ preserva la tensión lexical sin eliminar «alma» del texto principal.
