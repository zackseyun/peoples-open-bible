base_translation:
  language: en
  yaml_path: translation/ot/2_kings/007/007.yaml
  text: So they arose and fled at twilight[a], and they left their tents, their horses[c][b], their donkeys—the camp as it was—and fled for their lives.
  footnotes:
  - marker: a
    text: Or 'at dusk' / 'in the twilight.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the camp as it was,' that is, left just as they found it.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'fled to their life,' an idiom meaning 'fled for their lives.'
    reason: lexical_alternative
