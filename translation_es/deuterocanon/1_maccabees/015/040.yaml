translation:
  language: es
  text: Y Cendebeo llegó a Jamnia[a][b], y comenzó a provocar al pueblo, a invadir Judea, a tomar cautivo al pueblo y a matarlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a entrar en Judea»; el verbo griego puede verterse de manera más literal, pero el contexto sugiere una incursión militar hostil.
    reason: lexical_alternative
  - marker: b
    text: El «los» final se sobreentiende en español por el pueblo mencionado antes; el griego omite la repetición explícita del objeto tras «tomar cautivo».
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεγενήθη
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: LSJ
  rationale: El aoristo de παραγίνομαι indica llegada o presencia en un lugar. «Llegó» es natural en español y conserva el movimiento narrativo sin añadir matices innecesarios.
- source_word: Κενδεβαῖος
  english_pob_choice: Cendebeus
  chosen_spanish: Cendebeo
  alternatives_spanish:
  - Cendebeus
  - Kendebeo
  lexicon: convencional transliteración
  rationale: Se translitera el nombre propio con una forma española legible y estable. «Cendebeo» mantiene la referencia al personaje y adapta la terminación al español.
- source_word: Ἰαμνείαν
  english_pob_choice: Jamnia
  chosen_spanish: Jamnia
  alternatives_spanish:
  - Iamnia
  - Yamnia
  lexicon: convencional transliteración
  rationale: Se conserva la forma tradicional y reconocible del topónimo en español.
- source_word: ἤρξατο τοῦ ἐρεθίζειν
  english_pob_choice: began to provoke
  chosen_spanish: comenzó a provocar
  alternatives_spanish:
  - empezó a irritar
  - se puso a provocar
  lexicon: LSJ
  rationale: La construcción con ἄρχομαι + infinitivo se vierte naturalmente como «comenzó a». ἐρεθίζω aquí expresa hostigar o provocar; «provocar» preserva la agresividad sin forzar una paráfrasis.
- source_word: τὸν λαόν
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo en general
  - a la gente
  lexicon: LSJ
  rationale: «Pueblo» conserva el colectivo atacado y suena más concreto en contexto bélico que «gente».
- source_word: ἐμβατεύειν εἰς τὴν Ἰουδαίαν
  english_pob_choice: to invade Judea
  chosen_spanish: a invadir Judea
  alternatives_spanish:
  - a entrar en Judea
  - a penetrar en Judea
  lexicon: LSJ
  rationale: Aunque el verbo puede significar literalmente «entrar en», el contexto militar exige una traducción que exprese incursión hostil. «Invadir» conserva la fuerza contextual que el audit trail documenta.
- source_word: αἰχμαλωτίζειν
  english_pob_choice: to take ... captive
  chosen_spanish: a tomar cautivo al pueblo
  alternatives_spanish:
  - a capturar al pueblo
  - a llevarse al pueblo cautivo
  lexicon: LSJ
  rationale: El verbo se refiere a capturar personas en guerra. «Tomar cautivo» conserva el sentido militar y evita una equivalencia demasiado general como «capturar».
- source_word: φονεύειν
  english_pob_choice: to kill them
  chosen_spanish: a matarlos
  alternatives_spanish:
  - a asesinarlos
  - a darles muerte
  lexicon: LSJ
  rationale: El griego deja implícito el objeto directo repetido; en español se recupera con «los». «Matar» es directo y no introduce una valoración jurídica adicional.
theological_decisions:
- issue: Referencia implícita del objeto plural al final de la secuencia
  english_pob_reading: 'The final ''them'' is supplied in English from the repeated object implied by the Greek sequence: ''to take the people captive and to kill [them].'''
  chosen_spanish_reading: Se mantiene el objeto implícito con «matarlos», retomando naturalmente a «el pueblo».
  alternative_spanish_readings:
  - a matarlo
  - a matar al pueblo
  rationale: El griego omite la repetición del objeto tras αἰχμαλωτίζειν τὸν λαόν. En español conviene explicitar el referente plural retomado por el contexto para evitar ambigüedad y mantener la coherencia sintáctica.
  doctrine_reference: Uso sintáctico; no implica decisión doctrinal.
translation_notes:
  revision_awareness: Concordante con el audit trail inglés y sin revisiones aplicadas; se conserva la lectura contextual de incursión hostil y la repetición implícita del objeto final.
  spanish_consistency_notes:
  - Se prefirió «Cendebeo» como forma española de nombre propio, manteniendo el referente sin calco excesivo.
  - «Provocar» y «invadir» reflejan la carga hostil del pasaje; no se suavizó el tono militar del griego.
  - Se evitó «SEÑOR» u այլ terminología teológica no pertinente, pues el versículo no contiene lenguaje divino directo.
  - La secuencia verbal española sigue de cerca la sintaxis del original sin sonar forzada en español moderno.
