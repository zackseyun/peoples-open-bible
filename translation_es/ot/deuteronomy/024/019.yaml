revisions:
- from: Cuando siegues tu cosecha en tu campo y olvides una gavilla[a] en el campo, no volverás para tomarla. Será para el extranjero residente, para el huérfano y para la viuda[b], para que Yahvé tu Dios te bendiga en toda obra de tus manos.
  to: Cuando siegues tu cosecha en tu campo y olvides una gavilla en el campo, no volverás para tomarla. Será para el extranjero residente[a], para el que no tiene padre[b] y para la viuda, para que Yahvé tu Dios te bendiga en toda la obra de tus manos.
  rationale: Se corrige una nota no publicable, se alinea mejor לַיָּתוֹם con la decisión léxica auditada en inglés al usar «el que no tiene padre» con «huérfano» como alternativa, y se pule ligeramente la naturalidad del cierre con «toda la obra de tus manos». No se requiere adjudicación especial porque el sentido fuente es claro y la reparación es local.
