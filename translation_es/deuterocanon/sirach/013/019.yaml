    rationale: Aunque semánticamente defendible, la expresión suena forzada y menos natural que alternativas como 'le resulta detestable a' o 'es detestable para'. El proyecto pide español moderno, claro y digno.
  - severity: low
    issue: La nota griega puede sonar más natural con 'sirven de pasto a los ricos'
    rationale: '''Son el pasto de los ricos'' se entiende, pero en español la construcción verbal mejora la fluidez sin alterar el sentido del testimonio griego.'
  revised_spanish_text: La humildad le resulta detestable a la soberbia[a], y los pobres les resultan detestables a los ricos.
