    rationale: La nota [a] en inglés va con 'eunuchs' y preserva la alternativa 'court officials'; en el borrador español [a] está puesta sobre 'En aquellos días'. La nota [b] en inglés explica el modismo 'to lay hands on', pero en el borrador español [b] está anclada a 'umbral'.
  - severity: medium
    issue: La expresión 'poner la mano sobre' no representa de la mejor manera el modismo לִשְׁלֹחַ יָד en español natural.
    rationale: Aunque intenta conservar la imagen, en español puede sonar forzada o ambigua. 'Alzar la mano contra' es más idiomática y sigue expresando agresión hostil sin cerrar el sentido a un tipo exacto de ataque.
  - severity: low
    issue: La nota sobre 'umbral' no es necesaria aquí si no hay ambigüedad nueva en español.
    rationale: El inglés no nota 'threshold' como alternativa en nota; la necesidad de nota allí es baja. 'Umbral' es suficientemente claro en español dentro del contexto palaciego.
