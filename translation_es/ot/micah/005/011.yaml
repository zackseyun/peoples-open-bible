translation:
  language: es
  text: Y cortaré las hechicerías[a] de tu mano[b], y no tendrás[c] adivinos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «artes mágicas»; el término también puede traducirse «hechizos».
    reason: lexical_alternative
  - marker: b
    text: Lit. «de tu mano»; conserva la imagen hebrea de posesión o control.
    reason: lexical_alternative
  - marker: c
    text: Lit. «no serán para ti».
    reason: lexical_alternative
  - marker: d
    text: O «pronosticadores» o «echadores de suertes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכְרַתִּי
  english_pob_choice: And I will cut off
  chosen_spanish: y cortaré
  alternatives_spanish:
  - y eliminaré
  - y quitaré
  lexicon: HALOT
  rationale: El verbo hebreo en hifil de כרת conserva la imagen concreta de cortar, con sentido de remover o eliminar. «Cortaré» mantiene esa fuerza judicial/covenantal en español sin volverlo abstracto.
- source_word: כְשָׁפִים
  english_pob_choice: sorceries
  chosen_spanish: las hechicerías
  alternatives_spanish:
  - las sorcerías
  - las artes mágicas
  lexicon: HALOT
  rationale: El plural hebreo denota prácticas mágicas ilícitas. «Hechicerías» es un equivalente natural en español bíblico y conserva la carga de prácticas ocultistas sin imponer el matiz moderno de «brujería» en un sentido demasiado específico.
- source_word: מִיָּדֶךָ
  english_pob_choice: from your hand
  chosen_spanish: de tu mano
  alternatives_spanish:
  - de tu poder
  - de entre tus manos
  lexicon: HALOT
  rationale: La expresión literal mantiene la imagen hebrea de posesión o control. «De tu mano» preserva esa concreción; en español fluye mejor con el verbo «cortar» que una paráfrasis más explicativa.
- source_word: וּמְעוֹנְנִים
  english_pob_choice: soothsayers
  chosen_spanish: adivinos
  alternatives_spanish:
  - pronosticadores
  - augures
  - soñadores
  lexicon: HALOT
  rationale: El participio refiere a quienes practican la adivinación o lectura de presagios. «Adivinos» es amplio, claro y fiel; evita un término más arcaico o más restringido que pudiera falsear el alcance del hebreo.
- source_word: לֹא יִהְיוּ לָךְ
  english_pob_choice: you will have no
  chosen_spanish: no habrá para ti
  alternatives_spanish:
  - no tendrás
  - no existirán para ti
  lexicon: HALOT
  rationale: La construcción hebrea significa literalmente «no serán para ti». «No habrá para ti» reproduce bien el sentido idiomático de ausencia entre el pueblo, sin perder la relación marcada por el dativo.
theological_decisions:
- issue: Naturaleza de las prácticas prohibidas
  english_pob_reading: The verse condemns occult/magical practices and their practitioners as things God will remove from his people.
  chosen_spanish_reading: El versículo condena prácticas de hechicería y adivinación, y anuncia que Dios las apartará de su pueblo.
  alternative_spanish_readings:
  - El versículo condena la brujería y los adivinos.
  - El versículo condena la magia y los pronosticadores.
  rationale: El hebreo usa dos términos amplios para prácticas ocultas y sus practicantes. «Hechicerías» y «adivinos» conservan esa amplitud sin estrechar indebidamente el alcance ni introducir una identificación técnica no garantizada por el texto.
  doctrine_reference: 'Translation philosophy: preserve what the source text plainly says without importing extra doctrinal claims.'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «diviners» a «soothsayers» para distinguir mejor מְעוֹנְנִים de las «sorceries». En español se refleja esa distinción con «hechicerías» y «adivinos», manteniendo separados el acto ocultista y sus practicantes.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; aquí el versículo no lo contiene.
  - Se prefirió una estructura verbal simple y directa para conservar el paralelismo hebreo.
  - Se evitó «brujería» como traducción principal porque en español puede sonar más restringida o cargada que el hebreo amplio de prácticas mágicas.
  - «Adivinos» se usa como término general y no técnico para cubrir מְעוֹנְנִים sin sobreespecificar el método de adivinación.
