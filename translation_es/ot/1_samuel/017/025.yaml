translation:
  language: es
  text: 'Y los hombres de Israel decían: «¿Han visto a este hombre que sube? Pues sube para desafiar a Israel. Y sucederá que al hombre que lo derribe, el rey lo enriquecerá con grandes riquezas, le dará su hija y hará libre[a] la casa de su padre en Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “eximirá la casa de su padre en Israel”; probablemente significa libertad de impuestos u otras obligaciones de servicio real.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ יִשְׂרָאֵל
  english_pob_choice: the men of Israel
  chosen_spanish: un hombre de Israel
  alternatives_spanish:
  - los hombres de Israel
  - un israelita
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo/discursivo; en español, mantener el singular con artículo indefinido conserva el matiz de “un hombre” dentro del campamento, sin forzar un plural que no está en la forma fuente.
- source_word: הַרְּאִיתֶם
  english_pob_choice: Have you seen
  chosen_spanish: ¿Han visto?
  alternatives_spanish:
  - ¿Han visto ustedes?
  - ¿Vieron?
  lexicon: HALOT
  rationale: La forma verbal es segunda plural con valor interrogativo; el español natural y reverente puede omitir el sujeto explícito. Se conserva la pregunta retórica en perfecto compuesto, que encaja bien con la escena inmediata.
- source_word: הָאִישׁ הָעֹלֶה הַזֶּה
  english_pob_choice: this man who is coming up
  chosen_spanish: a este hombre que sube
  alternatives_spanish:
  - a este hombre que está subiendo
  - a este hombre que viene subiendo
  lexicon: HALOT
  rationale: עֹלֶה expresa acción en curso; “sube” mantiene la imagen de ascenso territorial/literal sin añadir una perífrasis innecesaria. Se conserva “este hombre” como referencia deíctica directa.
- source_word: כִּי
  english_pob_choice: Surely
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ciertamente
  lexicon: HALOT
  rationale: Aquí la partícula introduce la explicación del desafío. En español, “porque” hace explícita la relación causal que el contexto requiere; el valor enfático queda sostenido por la secuencia completa del discurso, sin necesidad de añadir una glosa interpretativa en el texto principal.
- source_word: לְחָרֵף
  english_pob_choice: to defy
  chosen_spanish: desafiar
  alternatives_spanish:
  - afrentar
  - vilipendiar
  - deshonrar
  lexicon: HALOT
  rationale: El verbo lleva la idea de reproche hostil y desafío público contra Israel. “Desafiar” comunica bien la confrontación abierta en español, sin perder el matiz de insulto implícito.
- source_word: יַכֶּנּוּ
  english_pob_choice: strikes him down
  chosen_spanish: lo hiera
  alternatives_spanish:
  - lo golpee
  - lo derribe
  - lo mate
  lexicon: HALOT
  rationale: נכה admite varios grados de golpe/derrota. “Lo hiera” preserva la amplitud semántica del hebreo y evita especificar muerte cuando el texto no la expresa de modo directo.
- source_word: יַעְשְׁרֶנּוּ ... עֹשֶׁר גָּדוֹל
  english_pob_choice: the king will enrich him with great riches
  chosen_spanish: el rey lo enriquecerá con grandes riquezas
  alternatives_spanish:
  - el rey lo hará muy rico
  - el rey le dará grandes riquezas
  lexicon: HALOT
  rationale: El verbo hifil de עשר significa hacer rico/enriquecer, y el sustantivo cognado intensifica la promesa. “Enriquecerá con grandes riquezas” conserva esa redundancia enfática del original.
- source_word: בִּתּוֹ יִתֶּן לוֹ
  english_pob_choice: will give him his daughter
  chosen_spanish: le dará su hija
  alternatives_spanish:
  - le entregará su hija
  - le dará a su hija
  lexicon: HALOT
  rationale: Se mantiene una construcción española natural para la recompensa matrimonial, sin alterar la relación de posesión del hebreo.
- source_word: בֵּית אָבִיו
  english_pob_choice: his father’s house
  chosen_spanish: la casa de su padre
  alternatives_spanish:
  - la casa paterna
  - su linaje paterno
  lexicon: HALOT
  rationale: La expresión hebrea designa el hogar/familia extensa del padre. “La casa de su padre” es transparente y suficientemente literal en español.
- source_word: יַעֲשֶׂה חָפְשִׁי בְּיִשְׂרָאֵל
  english_pob_choice: will make his father’s house free in Israel
  chosen_spanish: hará libre en Israel la casa de su padre
  alternatives_spanish:
  - eximirá en Israel a la casa de su padre
  - dejará libre en Israel la casa de su padre
  lexicon: HALOT
  rationale: Se conserva el adjetivo/resultativo “libre”, que refleja la forma hebrea y deja abierta la posible carga administrativa (exención de tributos o servicio).
theological_decisions:
- issue: Sentido de חָפְשִׁי aplicado a la casa paterna
  english_pob_reading: Or “will exempt his father’s house in Israel,” likely meaning freedom from taxes or other royal service obligations.
  chosen_spanish_reading: “hará libre en Israel la casa de su padre” con nota de posible exención de cargas reales
  alternative_spanish_readings:
  - “eximirá en Israel la casa de su padre”
  - “liberará en Israel la casa de su padre”
  rationale: El hebreo permite tanto libertad general como exención de obligaciones administrativas. La redacción principal mantiene la literalidad “libre” para no cerrar la ambigüedad, y la nota recoge la lectura probable de exención de tributos o servicio.
  doctrine_reference: Exégesis léxica e ისტორico-administrativa del Antiguo Testamento; no implica un punto doctrinal central.
translation_notes:
  revision_awareness: Se tuvo en cuenta que la versión inglesa POB es de equivalencia óptima y que mantuvo una nota sobre חָפְשִׁי. La presente versión conserva esa tensión semántica en español sin sustituirla por una paráfrasis más interpretativa. No se introdujeron cambios textuales relevantes respecto del sentido auditado.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma predeterminada en otros contextos, pero este versículo no lo contiene.
  - Se conserva el singular discursivo de אִישׁ con artículo indefinido para no forzar el plural inglés.
  - Se mantiene el paralelismo semántico entre “sube” / “sube” para עֹלֶה.
  - La nota sobre חָפְשִׁי preserva la ambigüedad entre libertad y exención, siguiendo el rastro auditado en inglés.
