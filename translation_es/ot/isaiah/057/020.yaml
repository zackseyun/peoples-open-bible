    text: Or 'the troubled sea.' The Hebrew verb can be rendered more interpretively as 'troubled' or 'tossed,' but the more literal image is of the sea being driven.
    reason: lexical_alternative
  - marker: b
    text: Or 'cast up mire and mud.'
    reason: lexical_alternative
