base_translation:
  language: en
  yaml_path: translation/ot/leviticus/023/036.yaml
  text: For seven days you shall present a food offering to Yahweh. On the eighth day you shall have a holy convocation[a], and you shall present a food offering to Yahweh. It is a solemn assembly; you shall do no ordinary work.
  footnotes:
  - marker: a
    text: Or 'offering by fire.' The Hebrew אִשֶּׁה is the standard sacrificial term for an offering presented by fire; 'food offering' is used here as a clear modern rendering.
