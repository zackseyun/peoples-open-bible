base_translation:
  language: en
  yaml_path: translation/ot/lamentations/001/020.yaml
  text: Look[a], O Yahweh, for I am in distress; my inward parts are churning; my heart is overturned within me, because I have been very rebellious[b]. Outside the sword bereaves[c]; inside the house it is like death.
  footnotes:
  - marker: a
    text: Or 'for I have grievously rebelled' or 'for I have bitterly rebelled.' The Hebrew intensifies the verb 'rebel' by pairing a cognate form with it.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my inward parts,' an embodied expression for deep inner anguish.
    reason: cultural_note
  - marker: c
    text: Or 'inside the house, there is death.' The Hebrew is terse and elliptical.
    reason: alternative_reading
