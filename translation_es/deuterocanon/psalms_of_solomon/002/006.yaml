  source_alignment_summary: 'El borrador español sigue de cerca el griego comprimido y el audit trail inglés: conserva «hijos e hijas», mantiene la rareza de la imagen de sello/marca y no sobreinterpreta ἐπισήμῳ. Sin embargo, «cautiverio malo» y sobre todo «su cuello en un sello» resultan excesivamente poco idiomáticos en español hasta el punto de oscurecer el sentido más de lo necesario. También conviene pluralizar «cuellos» por concordancia natural con un sujeto plural, sin perder la compresión del original.'
  spanish_quality_summary: El registro es digno, pero hay dos giros demasiado calcados. «Cautiverio malo» suena antinatural en español bíblico contemporáneo; «maligno» sería peor, y «cruel» sería interpretativo. «Funesto» preserva gravedad sin volver el texto tosco. «Su cuello en un sello» es gramaticalmente extraño; «sus cuellos bajo sello» conserva la literalidad relativa de ἐν σφραγῖδι y la extrañeza imagética, pero mejora la legibilidad. El resto del verso lee con claridad suficiente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. La nota sobre esclavitud puede mantenerse porque refleja el audit trail y no introduce una decisión principal indebida.
