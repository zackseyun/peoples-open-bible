  text: And if that nation turns from its evil[a], against which I spoke[c][b], then I will relent concerning the disaster that I planned to do to it.
  footnotes:
  - marker: a
    text: Or 'turns back' or 'repents.' The Hebrew verb is literally 'turns/returns.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew uses the same word family for the nation's 'evil' and the 'disaster' God planned, but the sense shifts from moral evil to calamity.
    reason: lexical_alternative
  - marker: c
    text: Or 'change my mind'; Hebrew 'relent' language expresses God's responsive withdrawal of announced judgment.
    reason: alternative_reading
