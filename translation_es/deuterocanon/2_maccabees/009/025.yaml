base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/009/025.yaml
  text: Moreover[a], considering the rulers nearby and those bordering the kingdom, who are watching for opportunities and awaiting what will happen, I have appointed my son Antiochus as king, whom, when I repeatedly went up to the upper satrapies, I often entrusted and commended to most of you[b]. And I have written to him the things written below.
  footnotes:
  - marker: a
    text: Or 'the neighboring rulers and those adjacent to the kingdom.' The Greek piles up overlapping geopolitical descriptions to stress surrounding powers.
    reason: lexical_alternative
  - marker: b
    text: '''Upper satrapies'' uses the Persian administrative term found in the Greek; it may refer broadly to the inland/eastern provinces rather than merely ''provinces'' in general.'
    reason: cultural_note
