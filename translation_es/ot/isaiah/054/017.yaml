base_translation:
  language: en
  yaml_path: translation/ot/isaiah/054/017.yaml
  text: No weapon formed against you will succeed[a], and every tongue that rises against you in judgment you will condemn. This is the heritage of the servants of Yahweh, and their righteousness is from me[b], declares Yahweh.
  footnotes:
  - marker: a
    text: Or 'you will prove guilty.' The Hebrew verb means to declare someone guilty or condemn them in a legal sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'their vindication is from me.' The Hebrew can carry a forensic sense in this legal context.
    reason: alternative_reading
