id: JHN.8.8
reference: John 8:8
source:
  edition: robinson-pierpont-2005-byzantine
  text: Καὶ πάλιν κάτω κύψας ἔγραφεν εἰς τὴν γῆν.
  language: Greek
translation:
  text: And again[a], he stooped down and wrote on the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Continuation of the story of the woman caught in adultery (John 7:53–8:11).
      See note on John 7:53.
    reason: textual_critical
lexical_decisions:
- source_word: κύψας
  chosen: stooped
  alternatives:
  - bent
  - bowed
  lexicon: BDAG
  rationale: Aorist active participle of κύπτω. Combined with κάτω (down), it describes
    the physical action of bending the body forward and downward.
- source_word: ἔγραφεν
  chosen: wrote
  alternatives:
  - was writing
  - kept writing
  lexicon: BDAG
  rationale: Imperfect active indicative of γράφω. While the imperfect can denote
    continuous action ('was writing'), standard English narrative often renders this
    simply as 'wrote' to maintain natural flow.
- source_word: γῆν
  chosen: ground
  alternatives:
  - earth
  - dirt
  - soil
  lexicon: BDAG
  rationale: Accusative form of γῆ. In this context, it refers to the physical surface
    of the earth immediately before him, best rendered as 'ground'.
