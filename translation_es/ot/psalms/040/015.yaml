translation:
  language: es
  text: Sean avergonzados y humillados juntos[a] los que buscan mi vida para acabar con ella[b]; vuelvan atrás y sean deshonrados los que se complacen en mi daño[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a una»; el hebreo indica que la vergüenza y la humillación recaen de manera conjunta o simultánea sobre ellos.
    reason: alternative_reading
  - marker: b
    text: O «para destruirla» o «para barrerla»; el hebreo puede expresar la idea de poner fin a la vida del salmista.
    reason: lexical_alternative
  - marker: c
    text: O «mi calamidad»; aquí se refiere al daño o mal que desean que me sobrevenga, no a una maldad moral propia.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵבֹשׁוּ
  english_pob_choice: be put to shame
  chosen_spanish: Sean avergonzados
  alternatives_spanish:
  - Queden avergonzados
  - Sean puestos en vergüenza
  lexicon: HALOT
  rationale: בוש expresa experimentar vergüenza. En español, "sean avergonzados" conserva el matiz pasivo y la fuerza imprecatoria del jussivo mejor que una forma reflexiva como "avergüéncense".
- source_word: וְיַחְפְּרוּ
  english_pob_choice: and humiliated
  chosen_spanish: y humillados
  alternatives_spanish:
  - y confundidos
  - y abochornados
  lexicon: HALOT
  rationale: חפר puede implicar deshonra o humillación. "Humillados" mantiene el paralelismo con "avergonzados" sin perder la intensificación del hebreo.
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: a una
  alternatives_spanish:
  - juntos
  - al mismo tiempo
  lexicon: HALOT
  rationale: La expresión indica experiencia conjunta o simultánea. "A una" suena natural en español bíblico contemporáneo y conserva la idea de unidad del castigo.
- source_word: מְבַקְשֵׁי נַפְשִׁי
  english_pob_choice: those who seek my life
  chosen_spanish: los que buscan destruir mi vida
  alternatives_spanish:
  - los que buscan mi vida
  - los que buscan mi alma
  lexicon: HALOT
  rationale: 'נפש aquí designa la vida del salmista, no una noción abstracta de "alma". Siguiendo la nota inglesa, se explicita el intento hostil: buscan destruir su vida.'
- source_word: לִסְפּוֹתָהּ
  english_pob_choice: to sweep it away
  chosen_spanish: destruir
  alternatives_spanish:
  - barrerla
  - consumirla
  - acabar con ella
  lexicon: HALOT
  rationale: ספה puede significar acabar con, destruir o barrer. En español, "destruir" comunica con claridad el sentido de poner fin a la vida sin forzar una imagen poco natural en esta línea.
- source_word: יִסֹּגוּ אָחוֹר
  english_pob_choice: turn back
  chosen_spanish: vuelvan atrás
  alternatives_spanish:
  - retrocedan
  - se retiren hacia atrás
  lexicon: HALOT
  rationale: סוג con אחור expresa retroceso o retirada. "Vuelvan atrás" es idiomático y conserva la dirección espacial y figurada del hebreo.
- source_word: וְיִכָּלְמוּ
  english_pob_choice: and be disgraced
  chosen_spanish: y sean deshonrados
  alternatives_spanish:
  - y queden avergonzados
  - y queden deshonrados
  lexicon: HALOT
  rationale: כלם se superpone con vergüenza y afrenta. "Sean deshonrados" distingue este verbo de בוש y preserva el paralelismo poético.
- source_word: חֲפֵצֵי רָעָתִי
  english_pob_choice: those who delight in my harm
  chosen_spanish: los que se complacen en mi mal
  alternatives_spanish:
  - los que desean mi mal
  - los que se deleitan en mi daño
  lexicon: HALOT
  rationale: חפץ expresa deleite o complacencia. רעה aquí se entiende como mal/harm/calamidad contra el salmista; "mi mal" es breve y fiel, y mantiene la amplitud semántica del término.
theological_decisions:
- issue: Imprecación contra enemigos y petición de vergüenza pública
  english_pob_reading: Let those who seek... be put to shame and humiliated... let those who delight in my harm turn back and be disgraced.
  chosen_spanish_reading: Sean avergonzados y humillados a una los que buscan destruir mi vida; vuelvan atrás y sean deshonrados los que se complacen en mi mal.
  alternative_spanish_readings:
  - Que sean avergonzados...
  - Hágalos Dios avergonzarse...
  rationale: El versículo es una imprecación poética. Se conserva el tono de deseo/jussivo sin convertirlo en una orden directa al lector ni añadir un sujeto explícito que el hebreo no exige. La vergüenza y la deshonra se mantienen como respuesta judicial implícita.
  doctrine_reference: Salmos imprecatorios; juicio divino sobre los impíos
- issue: נפש como vida frente a alma
  english_pob_reading: my life
  chosen_spanish_reading: mi vida
  alternative_spanish_readings:
  - mi alma
  rationale: En este contexto enemigo, נפש se refiere a la vida concreta del salmista. Traducirlo como "alma" oscurecería la intención homicida que el audit trail inglés documenta.
  doctrine_reference: Antropología bíblica; נפש como vida/persona
- issue: רעה como daño sufrido por el salmista
  english_pob_reading: my harm
  chosen_spanish_reading: mi mal
  alternative_spanish_readings:
  - mi daño
  - mi calamidad
  rationale: Rָעָה aquí no describe la maldad moral del salmista, sino el mal que otros desean para él. "Mi mal" conserva la amplitud semántica y la brevedad poética; la nota puede aclarar el sentido si se desea.
  doctrine_reference: Semántica de רעה en contexto de aflicción
translation_notes:
  revision_awareness: Se tuvo en cuenta el ajuste reciente del inglés para mantener el orden natural de 'seek to sweep away my life' y su equivalente español se reorganizó como 'buscan destruir mi vida', preservando el sentido idiomático y la secuencia del hebreo. También se respetó la decisión auditada de entender נפש como 'life' y de traducir la clausula final con un término distinto para 'be disgraced'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como término base para el nombre divino en el proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se evitó 'Cristo'/'Mesías' por no aparecer en el texto.
  - Se distinguieron 'avergonzados' y 'deshonrados' para reflejar los dos verbos hebreos paralelos.
  - La expresión 'a una' se eligió como equivalente natural de יַחַד en un registro bíblico moderno.
