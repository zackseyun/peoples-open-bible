translation:
  language: es
  text: 'Y esta es la inscripción[b] que fue escrita: MENE[a], MENE, TEKEL y PARSIN.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Los términos arameos se dejan transliterados porque Daniel los interpreta en los versículos siguientes mediante juego de palabras: MENE sugiere «contado», TEKEL «pesado» y PARSIN/PERES «dividido», con eco de «persas».'
    reason: lexical_alternative
  - marker: b
    text: «Inscripción» también podría traducirse «escritura».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְנָה
  english_pob_choice: And this
  chosen_spanish: Y este
  alternatives_spanish:
  - Y esto
  - Y éste
  lexicon: HALOT
  rationale: La partícula demostrativa introduce el contenido que sigue. En español, «Y este» conserva la conexión con el texto anterior y la fuerza deíctica sin sonar artificial.
- source_word: כְתָבָא
  english_pob_choice: the inscription
  chosen_spanish: el escrito
  alternatives_spanish:
  - la inscripción
  - la escritura
  - el texto escrito
  lexicon: HALOT
  rationale: El contexto es una escritura visible en la pared. «Escrito» conserva el sentido de algo redactado sin forzar un término más técnico; además, deja espacio para el juego de palabras posterior en la interpretación.
- source_word: רְשִׁים
  english_pob_choice: was written
  chosen_spanish: fue escrito
  alternatives_spanish:
  - estaba escrito
  - fue inscrito
  - había sido escrito
  lexicon: HALOT
  rationale: El pasivo arameo indica que el mensaje ya había sido puesto por escrito. «Fue escrito» es natural en español y mantiene la pasividad del original.
- source_word: מְנֵא
  english_pob_choice: MENE
  chosen_spanish: MENE
  alternatives_spanish:
  - numerado
  - mina
  lexicon: HALOT
  rationale: Se conserva transliterado para no borrar el juego de palabras que Daniel explica en el versículo siguiente con el sentido de «contado/numerado».
- source_word: תְּקֵל
  english_pob_choice: TEKEL
  chosen_spanish: TEKEL
  alternatives_spanish:
  - pesado
  - siclo
  lexicon: HALOT
  rationale: Se conserva la forma transliterada para mantener el carácter enigmático del mensaje y el juego interpretativo posterior con «pesado».},{
theological_decisions:
- issue: Conservar los términos arameos del mensaje en vez de traducirlos de inmediato
  english_pob_reading: The inscription preserves MENE, TEKEL, and PARSIN because the following verse interprets them with wordplay.
  chosen_spanish_reading: Se mantienen MENE, TEKEL y PARSIN transliterados para que la explicación profética posterior conserve su fuerza interpretativa.
  alternative_spanish_readings:
  - Traducirlos como «contado, pesado y dividido»
  - Mezclar transliteración y traducción en el texto principal
  rationale: La tensión textual depende de que el lector vea primero el enigma y luego su interpretación. Traducirlo aquí borraría la estructura retórica y el valor del juego de palabras.
  doctrine_reference: Daniel 5:26-28
- issue: Verter כְתָבָא de manera comprensible sin sobrerreificar el sustantivo
  english_pob_reading: The inscription could also be rendered the writing.
  chosen_spanish_reading: «El escrito» comunica el hecho de una composición escrita sin imponer una terminología más técnica que el contexto no exige.
  alternative_spanish_readings:
  - «La inscripción»
  - «La escritura»
  rationale: En español, «inscripción» es posible, pero «escrito» resulta más directo y todavía fiel al evento narrado. La opción evita desplazar el foco del mensaje mismo.
  doctrine_reference: Daniel 5:25-28
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto en inglés como sin cambios tras la comprobación de alta concordancia; por eso este borrador español sigue de cerca el valor del original arameo y la estructura auditada, sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere; aquí no aparece.
  - Se mantiene transliteración para los nombres arameos del mensaje, siguiendo la decisión auditada del POB inglés.
  - Se prefirió «el escrito» en lugar de una traducción más técnica como «inscripción» para lograr un español claro y fiel al contexto.
  - Se conservó la coordinación final «y PARSIN», reflejando el ו explícito del arameo.
