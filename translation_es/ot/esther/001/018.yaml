translation:
  language: es
  text: Y hoy las mujeres nobles[a] de Persia y de Media, que han oído la palabra[b] de la reina, dirán a todos los oficiales del rey; y habrá[c] bastante desprecio y enojo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «princesas de Persia y de Media». El hebreo se refiere a mujeres de alto rango; «mujeres nobles» evita sugerir que fueran necesariamente hijas reales.
    reason: lexical_alternative
  - marker: b
    text: O «lo que dijo la reina» / «el asunto de la reina». El hebreo דָּבָר puede referirse tanto a sus palabras como al asunto o caso relacionado con ella.
    reason: lexical_alternative
  - marker: c
    text: La cláusula final es elíptica en hebreo, literalmente algo como «y suficiente desprecio y enojo/ira». Se añade «habrá» para expresar con claridad el sentido en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַיּוֹם הַזֶּה
  english_pob_choice: And today
  chosen_spanish: Y hoy
  alternatives_spanish:
  - Y en este día
  - Y en este mismo día
  lexicon: HALOT
  rationale: La expresión temporal pide inmediatez. «Hoy» es natural en español y conserva el valor de actualidad del hebreo sin sobrecargar la frase.
- source_word: תֹּאמַרְנָה
  english_pob_choice: will say
  chosen_spanish: dirán
  alternatives_spanish:
  - dirá
  - hablarán
  lexicon: HALOT
  rationale: El verbo אמר se traduce de manera directa como «decir». El futuro encaja con el contexto predictivo del consejo.
- source_word: שָׂרוֹת
  english_pob_choice: noblewomen
  chosen_spanish: mujeres nobles
  alternatives_spanish:
  - princesas
  - damas
  lexicon: HALOT
  rationale: Se trata de mujeres de alto rango, no necesariamente hijas reales. «Mujeres nobles» conserva la referencia social sin forzar una filiación dinástica.
- source_word: פָּרַס וּמָדַי
  english_pob_choice: of Persia and Media
  chosen_spanish: de Persia y de Media
  alternatives_spanish:
  - persas y medas
  - de Paras y de Madai
  lexicon: HALOT
  rationale: Los nombres geográficos se conservan con sus formas castellanas habituales. La relación constructa se expresa de modo natural con «de».
- source_word: אֲשֶׁר שָׁמְעוּ
  english_pob_choice: who have heard
  chosen_spanish: que han oído
  alternatives_spanish:
  - que oyeron
  - que oirán
  lexicon: HALOT
  rationale: El perfecto hebreo se entiende como acción ya recibida con relevancia presente dentro del anuncio futuro; el pretérito perfecto compuesto funciona bien en español.
- source_word: אֶת דְּבַר הַמַּלְכָּה
  english_pob_choice: the queen’s word
  chosen_spanish: la palabra de la reina
  alternatives_spanish:
  - lo que dijo la reina
  - el asunto de la reina
  lexicon: HALOT
  rationale: דָּבָר puede significar «palabra», «asunto» o «hecho». Aquí se preserva la compactación hebrea con «palabra», dejando abierta la amplitud semántica indicada por el audit trail.
- source_word: לְכֹל שָׂרֵי הַמֶּלֶךְ
  english_pob_choice: to all the king’s officials
  chosen_spanish: a todos los oficiales del rey
  alternatives_spanish:
  - a todos los príncipes del rey
  - a todos los nobles del rey
  lexicon: HALOT
  rationale: שָׂרִים designa funcionarios o jefes de la corte; «oficiales» es claro en español moderno y evita la carga hereditaria de «príncipes».
- source_word: וּכְדַי
  english_pob_choice: there will be enough
  chosen_spanish: habrá bastante
  alternatives_spanish:
  - y será suficiente
  - y bastará
  lexicon: HALOT
  rationale: La frase es elíptica en hebreo. «Habrá bastante» expresa de forma idiomática la suficiencia o abundancia implícita.
- source_word: בִּזָּיוֹן
  english_pob_choice: contempt
  chosen_spanish: desprecio
  alternatives_spanish:
  - contempto
  - afrenta
  lexicon: HALOT
  rationale: El sustantivo apunta a desdén o trato despectivo. «Desprecio» comunica bien la fuerza social de la palabra en español.
- source_word: וָקָצֶף
  english_pob_choice: and wrath
  chosen_spanish: y enojo
  alternatives_spanish:
  - y furia
  - y ira
  lexicon: HALOT
  rationale: קצף puede ser «ira» o «enojo». «Enojo» es claro y mantiene el paralelismo con «desprecio» sin sonar excesivamente arcaico.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando todas las notas al texto mediante [a], [b] y [c]. No se hicieron cambios de sentido sustantivos respecto del audit trail en inglés; solo se ajustó la puntuación y la colocación de las notas para que cada marcador aparezca exactamente en el lugar correspondiente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «príncipes» en el texto principal para no introducir una connotación hereditaria no exigida por שָׂרֵי.
  - Se tradujo el cierre elíptico con una construcción natural en español sin borrar la idea de abundancia de desprecio e ira/enojo.
