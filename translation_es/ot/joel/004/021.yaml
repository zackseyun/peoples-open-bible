translation:
  language: es
  text: Vengaré su sangre[a] que no he vengado, y Yahvé habita en Sion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No dejaré su sangre sin castigo». El hebreo repite el mismo verbo con negación, de modo que también puede entenderse con el sentido de no dejar impune la sangre derramada.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנִקֵּיתִי
  english_pob_choice: I will avenge
  chosen_spanish: Yo vengaré
  alternatives_spanish:
  - Yo absolveré
  - Yo limpiaré
  - Yo dejaré sin castigo
  lexicon: HALOT
  rationale: En este contexto judicial de sangre derramada, la idea no es absolver ni limpiar en sentido ritual, sino ejecutar justicia retributiva. «Vengar» comunica con naturalidad en español la vindicación de la sangre derramada que el hebreo sugiere.
- source_word: דָּמָם
  english_pob_choice: their blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - la sangre de ellos
  - su sangre derramada
  - su sangre culpable
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su sangre». En español, «su sangre» conserva la forma breve del original y permite oír el trasfondo de sangre derramada que exige justicia.
- source_word: לֹא נִקֵּיתִי
  english_pob_choice: which I have not avenged
  chosen_spanish: que no he vengado
  alternatives_spanish:
  - que no he dejado sin castigo
  - que no he absuelto
  - que no he limpiado
  lexicon: HALOT
  rationale: 'La repetición del mismo verbo con negación es difícil y el contexto permite una relación explicativa: sangre que antes no había sido vengada. «Que no he vengado» mantiene la tensión del hebreo y la solución elegida por el POB inglés.'
- source_word: וַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: Siguiendo la política del POB español, se traduce el nombre divino con «Yahvé» en lugar de un sustituto reverencial, manteniendo la transparencia con el hebreo original.
- source_word: שֹׁכֵן
  english_pob_choice: dwells
  chosen_spanish: habita
  alternatives_spanish:
  - mora
  - está habitando
  - reside
  lexicon: HALOT
  rationale: El participio expresa residencia continua. «Habita» es natural en español bíblico contemporáneo y conserva la idea durativa sin sonar arcaizante como «mora».
- source_word: בְּצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - sobre Sion
  - en el monte Sion
  lexicon: HALOT
  rationale: La preposición hebrea indica localización. «En Sion» es la correspondencia más directa y clara; se mantiene el nombre tradicional «Sion» en español.
theological_decisions:
- issue: Sentido de נקה con «sangre» en contexto de juicio
  english_pob_reading: 'Judicial vengeance/vindication: God will avenge the bloodshed of his people.'
  chosen_spanish_reading: 'Vindicación judicial: Dios hará justicia por la sangre derramada de su pueblo.'
  alternative_spanish_readings:
  - Dios limpiará su sangre culpable
  - Dios declarará inocente su sangre
  rationale: El contexto inmediato es la sentencia contra las naciones y la vindicación de Judá/Jerusalén. «Vengar» conserva mejor la fuerza retributiva que «limpiar» o «absolver», que podrían desplazar el sentido hacia lo ritual o forense en un modo menos adecuado al pasaje.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Lectura de la cláusula con repetición verbal y negación
  english_pob_reading: 'A prior state now reversed: ''which I have not avenged.'''
  chosen_spanish_reading: 'Estado previo de no-vindicación que ahora se revierte: «que no he vengado».'
  alternative_spanish_readings:
  - 'Énfasis retórico: «que no he dejado sin castigo»'
  - Una afirmación de absolución en vez de venganza
  rationale: El hebreo es elíptico y permite más de una paráfrasis. La redacción elegida conserva la tensión entre el pasado de no-vindicación y la acción judicial prometida, mientras la nota preserva la alternativa idiomática reconocida por el POB inglés.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el cierre revisado del POB inglés, conservando la relación restrictiva de la cláusula relativa sin coma y manteniendo la tensión del verbo repetido con negación. Se adopta «Yahvé» conforme a la convención española del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, coherente con el estándar del proyecto.
  - «Sion» se conserva como forma española habitual del topónimo bíblico.
  - «Vengar» se usa para la justicia retributiva del contexto, sin suavizarla a «castigar» ni desplazarla a un sentido ritual.
  - La cláusula relativa se deja sin coma para reflejar mejor la relación restrictiva observada en la revisión inglesa.
