translation:
  language: es
  text: Porque todavía la visión es para el tiempo señalado; se apresura hacia el fin[b] y no mentirá. Si tarda, espérala[a], porque ciertamente vendrá; no se demorará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si él demora, espéralo». El pronombre hebreo puede entenderse de manera personal, aunque en el contexto se refiere más naturalmente a «la visión». Hebreos 10:37 aplica la línea de manera personal.'
    reason: alternative_reading
  - marker: b
    text: 'O: «jadea hacia el fin» / «habla del fin». El verbo hebreo es difícil; el texto principal expresa la idea de que la visión avanza con urgencia hacia su cumplimiento señalado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזוֹן
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - revelación
  - oráculo
  lexicon: HALOT
  rationale: «Visión» reproduce el término profético básico y mantiene la referencia a lo que Habacuc debe escribir y esperar, sin añadir una interpretación más específica de la necesaria.
- source_word: לַמּוֹעֵד
  english_pob_choice: for the appointed time
  chosen_spanish: para el tiempo señalado
  alternatives_spanish:
  - para el tiempo назначado
  - para el tiempo establecido
  - para la fecha fijada
  lexicon: HALOT
  rationale: «Tiempo señalado» conserva la idea de una cita o fijación concreta en el plan divino y suena natural en español bíblico actual.
- source_word: וְיָפֵחַ
  english_pob_choice: it hastens
  chosen_spanish: se apresura
  alternatives_spanish:
  - se precipita
  - avanza con prisa
  - jadea hacia
  lexicon: HALOT
  rationale: El verbo hebreo es difícil y puede sugerir movimiento urgente hacia el cumplimiento. «Se apresura» comunica esa urgencia sin forzar una imagen demasiado extraña en español.
- source_word: לַקֵּץ
  english_pob_choice: toward the end
  chosen_spanish: hacia el fin
  alternatives_spanish:
  - hacia el final
  - para el fin
  lexicon: HALOT
  rationale: «El fin» mantiene el sentido de término o consumación final. La preposición «hacia» conserva la idea de dirección implícita en la frase.
- source_word: וְלֹא יְכַזֵּב
  english_pob_choice: and will not lie
  chosen_spanish: y no mentirá
  alternatives_spanish:
  - y no resultará falso
  - y no engañará
  - y no fallará
  lexicon: HALOT
  rationale: El hebreo dice literalmente que no mentirá o no resultará engañoso. «No mentirá» es directo y conserva la fuerza personalizada del sujeto gramatical, que en el contexto es la visión.
- source_word: אִם יִתְמַהְמָהּ
  english_pob_choice: If it delays
  chosen_spanish: Si tarda
  alternatives_spanish:
  - Si se demora
  - Si se hace esperar
  - Si parece tardar
  lexicon: HALOT
  rationale: «Tardar» es una forma natural y sobria de expresar la demora sin sobrecargar el verso. Mantiene la condición de una espera aparente.
- source_word: חַכֵּה לוֹ
  english_pob_choice: wait for it
  chosen_spanish: espéralo
  alternatives_spanish:
  - espérala
  - espéralo a él
  lexicon: HALOT
  rationale: En el contexto hebreo, el antecedente más cercano es «visión», por eso el pronombre masculino se vierte de forma impersonal como «lo». Se conserva así la lectura principal del POB, sin excluir la nota de una posible lectura personal.
- source_word: כִּי בֹא יָבֹא
  english_pob_choice: for it will surely come
  chosen_spanish: porque ciertamente vendrá
  alternatives_spanish:
  - porque vendrá de cierto
  - porque vendrá sin falta
  - porque vendrá seguramente
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + verbo finito intensifica la certeza. «Ciertamente vendrá» transmite bien ese énfasis en español natural.
- source_word: לֹא יְאַחֵר
  english_pob_choice: it will not be late
  chosen_spanish: no se demorará
  alternatives_spanish:
  - no llegará tarde
  - no tardará
  - no se atrasará
  lexicon: HALOT
  rationale: Se evita repetir «tardar» y se conserva el sentido de no retrasarse. «No se demorará» suena fluido y adecuado para el cierre enfático del verso.
theological_decisions:
- issue: Referente de los pronombres en la segunda mitad del versículo
  english_pob_reading: The pronouns refer primarily to the vision and its fulfillment, rendered as 'it.'
  chosen_spanish_reading: Los pronombres se entienden primariamente como referidos a la visión; en español se expresa con pronombres neutros/impersonales donde es posible.
  alternative_spanish_readings:
  - Leerlos de modo personal, ‘él’ o ‘lo’, en una aplicación más cristológica o personal
  - Entender la línea como referida a un mensajero o a una persona
  rationale: En el hebreo inmediato, el antecedente más cercano es חָזוֹן (‘visión’), sustantivo masculino singular. Por eso la lectura principal del POB debe mantenerse ligada a la visión y su cumplimiento. La tradición de Hebreos 10:37 ofrece una recepción personal, pero no debe imponerse sobre el sentido primario de Habacuc.
  doctrine_reference: Prioridad del sentido original y preservación de la tensión receptiva sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se reportan cambios respecto del pasaje base, y la traducción española sigue la misma decisión interpretativa principal sobre el referente pronominal y el verbo difícil.'
  spanish_consistency_notes:
  - Se conserva «visión» para חָזוֹן y «tiempo señalado» para לַמּוֹעֵד, en línea con la terminología estándar del proyecto.
  - «Espéralo» mantiene el referente impersonal principal; la nota preserva la alternativa personal sin introducirla en el texto base.
  - Se evita «SEÑOR» o lenguaje de sustitución innecesaria porque el versículo no contiene el nombre divino.
  - El cierre «no se demorará» conserva el paralelismo semántico con «Si tarda» sin sonar redundante.
