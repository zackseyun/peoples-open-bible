id: ISA.52.2
reference: Isaiah 52:2
source:
  edition: WLC
  text: הִתְנַעֲרִ֧י מֵ/עָפָ֛ר ק֥וּמִי שְּׁבִ֖י יְרֽוּשָׁלִָ֑ם התפתחו מוֹסְרֵ֣י צַוָּארֵ֔/ךְ שְׁבִיָּ֖ה בַּת צִיּֽוֹן־׃ס
translation:
  text: Shake yourself from the dust[a]; rise up, sit down, Jerusalem. Loosen the bonds of your neck[c][b], captive daughter Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'sit,' with the context suggesting restored honor or royal dignity.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew form behind 'Loosen' is difficult and irregular; it likely means 'untie yourself' or 'be loosed' from the bonds on your neck.
    reason: textual_variant
  - marker: c
    text: Or 'daughter of Zion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְנַעֲרִי
  chosen: Shake yourself
  alternatives:
  - Shake yourself free
  - Rouse yourself
  lexicon: HALOT
  rationale: Hitpael imperative feminine singular from נער conveys shaking oneself off or free. 'Shake yourself' preserves the reflexive force and fits the image of removing dust/clinging humiliation.
- source_word: מֵעָפָר
  chosen: from the dust
  alternatives:
  - off the dust
  - from the ground dust
  lexicon: HALOT
  rationale: The preposition מִן with עָפָר indicates separation from dust. 'Dust' preserves the concrete image of abasement and mourning without overinterpreting.
- source_word: קוּמִי
  chosen: rise up
  alternatives:
  - arise
  - get up
  lexicon: HALOT
  rationale: Imperative feminine singular of קום. 'Rise up' is natural modern English and retains the summons to restored dignity.
- source_word: שְּׁבִי
  chosen: sit enthroned
  alternatives:
  - sit
  - be seated
  lexicon: HALOT
  rationale: Although the verb literally means 'sit,' in this context after rising from the dust and addressed to Jerusalem, the sense is not merely to sit down but to take a place of honor/restoration. 'Sit enthroned' brings out the contextual force while remaining tied to the base meaning; the more literal alternative is preserved in a footnote.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: התפתחו
  chosen: Loosen
  alternatives:
  - Untie yourselves
  - Be loosed
  lexicon: HALOT
  rationale: From פתח in the hitpael/passive-reflexive sense, the form is textually unusual because it appears masculine plural where a feminine singular addressee might be expected. The sense is an imperative to remove restraints. 'Loosen' gives idiomatic English without forcing a specific explanation of the irregular form.
- source_word: מוֹסְרֵי
  chosen: the bonds
  alternatives:
  - the fetters
  - the chains
  lexicon: HALOT
  rationale: מוֹסֵר/מוֹסְרֵי denotes bonds or restraints. 'Bonds' is broad enough to include cords/chains and suits the metaphorical and literal overlap.
- source_word: צַוָּארֵךְ
  chosen: of your neck
  alternatives:
  - from your neck
  - on your neck
  lexicon: HALOT
  rationale: 'Construct phrase with 2fs suffix: ''bonds of your neck.'' English idiom prefers ''of your neck'' with the verb ''loosen.'''
- source_word: שְׁבִיָּה
  chosen: captive
  alternatives:
  - captured one
  - prisoner
  lexicon: HALOT
  rationale: Adjectival/appositional feminine singular describing daughter Zion. 'Captive' is concise and preserves the exile imagery.
- source_word: בַּת צִיּוֹן
  chosen: daughter Zion
  alternatives:
  - Daughter Zion
  - daughter of Zion
  lexicon: HALOT
  rationale: A common prophetic personification. 'Daughter Zion' preserves the Hebrew construct compactly; capitalization is not required in running English. The traditional 'daughter of Zion' is preserved as an alternative.
