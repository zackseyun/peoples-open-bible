  text: 'Yet these you may eat from all the swarming things that fly[b][a], that go on all fours: those that have jointed legs above their feet to hop on the ground with them.'
  footnotes:
  - marker: a
    text: Hebrew textual tradition reads literally 'which not legs'; the traditional reading understood by context and ancient versions is 'which have legs.'
    reason: textual_variant
  - marker: b
    text: Or 'leaping legs' for 'jointed legs'; the Hebrew refers to the specialized hind legs used for hopping.
    reason: lexical_alternative
