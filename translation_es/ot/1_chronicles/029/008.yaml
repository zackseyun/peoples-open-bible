translation:
  language: es
  text: Todo el que tenía piedras las dio al tesoro de la casa de Yahvé, bajo el cuidado de Jehiel[a] el gersonita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por la mano de Jehiel», un modismo que significa bajo su cuidado o supervisión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנִּמְצָא אִתּוֹ
  english_pob_choice: Whoever had
  chosen_spanish: Quienquiera que tenía
  alternatives_spanish:
  - el que tenía
  - todo el que tenía
  - quien se encontraba con
  lexicon: HALOT
  rationale: El participio nifal con אִתּוֹ expresa posesión o disponibilidad distributiva; en español, «quienquiera que tenía» conserva ese sentido sin forzar una construcción literal poco natural.
- source_word: אֲבָנִים
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - piedras preciosas
  - gemas
  - piedras valiosas
  lexicon: HALOT
  rationale: El hebreo dice simplemente «piedras». En el contexto de ofrendas para la casa de Yahvé, el español «piedras» es fiel y evita añadir la idea de valor precioso que no está explícita en este versículo.
- source_word: נָתְנוּ
  english_pob_choice: gave
  chosen_spanish: las daban
  alternatives_spanish:
  - las entregaban
  - las ofrecían
  - las daban
  lexicon: HALOT
  rationale: El verbo básico נתן comunica dar/entregar. El imperfecto en español con matiz distributivo («las daban») refleja una acción repetida por varias personas conforme al contexto de contribuciones voluntarias.
- source_word: לְאוֹצַר
  english_pob_choice: to the treasury
  chosen_spanish: al tesoro
  alternatives_spanish:
  - al tesoro/depósito
  - a la tesorería
  - al almacén
  lexicon: HALOT
  rationale: אוצר puede significar tesoro, depósito o tesorería. «Al tesoro» funciona bien en español y mantiene el valor institucional de un lugar de resguardo para las ofrendas.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: de la casa de Yahvé
  alternatives_spanish:
  - del templo de Yahvé
  - de la casa de Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea «casa de Yahvé» en vez de sustituirla por «templo», siguiendo la transparencia del texto fuente. La forma «Yahvé» corresponde al nombre divino según el criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms'
  rationale: El Tetragrámaton se vierte como «Yahvé» de acuerdo con la terminología del proyecto en español, preservando el nombre propio del pacto en lugar de reemplazarlo por un título.
- source_word: עַל יַד
  english_pob_choice: into the care of
  chosen_spanish: bajo el cuidado de
  alternatives_spanish:
  - bajo la supervisión de
  - a cargo de
  - por la mano de
  lexicon: HALOT
  rationale: La expresión idiomática literalmente significa «por la mano de» y aquí indica custodia o supervisión. «Bajo el cuidado de» comunica de forma natural la idea de responsabilidad depositada en Jehiel.
- source_word: יְחִיאֵל
  english_pob_choice: Jehiel
  chosen_spanish: Jehiel
  alternatives_spanish:
  - Yehiel
  lexicon: standard transliteration
  rationale: Se translitera el nombre propio siguiendo la convención habitual en español bíblico, sin alterar la forma identificable del personaje.
- source_word: הַגֵּרְשֻׁנִּי
  english_pob_choice: the Gershonite
  chosen_spanish: el gersonita
  alternatives_spanish:
  - el guersonita
  - el gershonita
  lexicon: HALOT
  rationale: El gentilicio se adapta al español como «gersonita», forma clara y reconocible para el linaje levítico de Gersón/Gershon. Se evita una transliteración más cruda que resultaría menos natural en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política del proyecto pide transliterar el nombre divino en lugar de ocultarlo tras un título. «Yahvé» es la forma establecida en este registro en español y mantiene la referencia explícita al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la contribución al tesoro
  english_pob_reading: gave them to the treasury of the house of Yahweh
  chosen_spanish_reading: las daban al tesoro de la casa de Yahvé
  alternative_spanish_readings:
  - las entregaban al tesoro
  - las depositaban en el tesoro
  rationale: No se introduce una lectura doctrinal adicional; se conserva el sentido de una ofrenda o entrega comunitaria al depósito sagrado de la casa de Yahvé, conforme al contexto del capítulo.
  doctrine_reference: Contexto narrativo de ofrendas para la casa de Yahvé en 1 Crónicas 29
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó «precious» porque el hebreo dice simplemente «stones». Esta versión española sigue ese ajuste y no añade valoraciones que el texto no especifica. También mantiene el matiz idiomático de עַל יַד mediante una nota de cuidado/supervisión.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se preserva el campo semántico de ofrenda/depósito con «tesoro» y «bajo el cuidado de».
  - Se evita añadir «piedras preciosas», en línea con la revisión auditada del texto fuente.
  - «gersonita» se usa como gentilicio adaptado y consistente con el registro bíblico en español.
