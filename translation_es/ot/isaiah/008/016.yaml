translation:
  language: es
  text: Envuelve el testimonio; sella la instrucción[a] entre mis discípulos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ley» o «la enseñanza». El hebreo תּוֹרָה puede designar instrucción en sentido amplio, no solo un código legal.
    reason: lexical_alternative
  - marker: b
    text: O «entre mis enseñados». La expresión hebrea se refiere a los que han sido instruidos por el hablante.
    reason: lexical_alternative
lexical_decisions:
- source_word: צ֖וֹר
  english_pob_choice: Bind up
  chosen_spanish: Envuelve
  alternatives_spanish:
  - Ata
  - Recoge
  - Asegura
  lexicon: HALOT
  rationale: El imperativo pide guardar un documento para preservación. «Envuelve» conserva la imagen concreta de recoger/guardar algo y suena natural en español, sin perder la idea de seguridad implícita en el hebreo.
- source_word: תְּעוּדָ֑ה
  english_pob_choice: the testimony
  chosen_spanish: el testimonio
  alternatives_spanish:
  - la atestación
  - el testimonio formal
  - el testimonio profético
  lexicon: HALOT
  rationale: «Testimonio» es el equivalente español más idiomático para la formalidad del término hebreo y mantiene el sentido de declaración-testigo del contexto profético.
- source_word: חֲת֥וֹם
  english_pob_choice: seal
  chosen_spanish: sella
  alternatives_spanish:
  - pon un sello a
  - autentica con sello
  lexicon: HALOT
  rationale: El verbo hebreo indica sellar un documento. «Sella» preserva la acción literal y la connotación documental/jurídica.
- source_word: תּוֹרָ֖ה
  english_pob_choice: the instruction
  chosen_spanish: la instrucción
  alternatives_spanish:
  - la ley
  - la enseñanza
  lexicon: HALOT
  rationale: En Isaías, תּוֹרָה puede significar instrucción o enseñanza, no solo ley legal. «Instrucción» reproduce mejor ese alcance amplio sin imponer una lectura más estrecha que el hebreo no exige.
- source_word: בְּ/לִמֻּדָֽ/י
  english_pob_choice: among my disciples
  chosen_spanish: entre mis discípulos
  alternatives_spanish:
  - entre mis enseñados
  - entre mis aprendices
  lexicon: HALOT
  rationale: La expresión designa a los que han sido instruidos por el hablante. «Discípulos» comunica bien la relación maestro-alumnos en español bíblico contemporáneo; «entre» refleja la esfera en la que se conserva el mensaje.
theological_decisions:
- issue: Alcance de תורה en contexto profético
  english_pob_reading: the instruction
  chosen_spanish_reading: la instrucción
  alternative_spanish_readings:
  - la ley
  - la enseñanza
  rationale: Se evita reducir el término a una ley mosaica estricta cuando el contexto de Isaías apunta a enseñanza profética preservada para los discípulos del profeta. «Instrucción» mantiene la amplitud semántica y la carga teológica del pasaje.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; consistency of key terms, or documented exception.'
- issue: Sentido de בְּלִמֻּדָי
  english_pob_reading: among my disciples
  chosen_spanish_reading: entre mis discípulos
  alternative_spanish_readings:
  - entre mis enseñados
  - en mis discípulos
  rationale: «Discípulos» es una forma natural y fiel de expresar «los enseñados» sin caer en un calco pesado. El prefijo ב se expresa mejor con «entre», indicando el ámbito de custodia del mensaje.
  doctrine_reference: Hebrew participial identity and relational sphere within the prophet's instructed community.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios; la concordancia general con el revisor fue alta. Esta propuesta sigue esa lectura estable y traslada sus decisiones léxicas al español sin introducir reinterpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando corresponda, aunque este versículo no lo contiene.
  - Se usa «instrucción» para תּוֹרָה de modo coherente con el criterio POB ya documentado en el audit trail.
  - «Discípulos» conserva el valor relacional de los «taught ones» sin endurecer el español ni perder la idea de comunidad instruida.
