base_translation:
  language: en
  yaml_path: translation/ot/exodus/021/029.yaml
  text: But if the ox was accustomed to gore from yesterday and the day before[a], and its owner had been warned but did not keep it in, and it kills a man or a woman, the ox shall be stoned[b], and its owner also shall be put to death.
  footnotes:
  - marker: a
    text: Or "an ox accustomed to gore." The Hebrew participle describes an animal known for repeated goring.
    reason: lexical_alternative
  - marker: b
    text: Literally, "from yesterday and the day before," a Hebrew idiom indicating prior, established behavior.
    reason: cultural_note
