    rationale: El griego usa singular colectivo («quail»), pero el borrador español cambia a plural («las codornices»). Aunque el plural es natural, aquí el POB documentó y preservó explícitamente el singular colectivo mediante nota.
  - severity: medium
    issue: La nota al pie contradice el texto español actual
    rationale: La nota dice que el griego usa un sustantivo singular con valor colectivo, pero el texto español ya lo convirtió en plural. Eso vuelve innecesaria o confusa la nota tal como está redactada.
  revised_spanish_text: Porque la codorniz subió del mar para su consuelo.[a]
