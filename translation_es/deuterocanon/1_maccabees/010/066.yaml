translation:
  language: es
  text: Y Jonatán volvió a Jerusalén con paz y alegría.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: BDAG
  rationale: En contexto narrativo con εἰς Ἱερουσαλήμ, el verbo expresa el regreso a un lugar. «Volvió» es natural en español bíblico contemporáneo y conserva el valor de retorno sin forzar un calco.
- source_word: Ἰωνάθαν
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: transliteración estándar
  rationale: Se usa la forma española habitual del nombre propio, plenamente reconocible en español bíblico.
- source_word: εἰς Ἱερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - a la ciudad de Jerusalén
  lexicon: uso preposicional del griego con nombre propio
  rationale: El griego indica dirección hacia un lugar; en español, «a Jerusalén» comunica de manera natural el movimiento de regreso a la ciudad.
- source_word: μετʼ εἰρήνης
  english_pob_choice: with peace
  chosen_spanish: con paz
  alternatives_spanish:
  - en paz
  - pacíficamente
  lexicon: LSJ
  rationale: Se conserva la relación preposicional de compañía o estado resultante. «Con paz» mantiene de cerca la forma griega y el paralelo con la segunda expresión coordinada.
- source_word: εὐφροσύνης
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: LSJ
  rationale: El término abarca alegría, gozo y regocijo. «Alegría» es claro, sobrio y adecuado al registro narrativo breve del versículo.
translation_notes:
  revision_awareness: 'El texto griego es breve y coincide plenamente con la traducción inglesa auditada: regreso de Jonatán a Jerusalén, acompañado de paz y alegría. No se documentan variantes textuales ni tensiones léxicas que requieran nota.'
  spanish_consistency_notes:
  - Se mantuvo un estilo sobrio y narrativo, sin ampliar el contenido del versículo.
  - Se prefirió «con paz» para reflejar la construcción μετʼ εἰρήνης, en paralelo con «y alegría».
  - No se añadió nota al pie porque no hay alternativa significativa preservada por la auditoría inglesa ni una ambigüedad nueva que amerite comentario.
