translation:
  language: es
  text: Yahvé tronó en los cielos, y el Altísimo dio su voz[a]—piedras de granizo[b] y brasas de fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «emitió su voz» o «hizo oír su voz». La expresión hebrea dice literalmente «dio su voz».
    reason: lexical_alternative
  - marker: b
    text: O «granizo y brasas de fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְעֵם
  english_pob_choice: thundered
  chosen_spanish: tronó
  alternatives_spanish:
  - retumbó
  - hizo tronar
  lexicon: HALOT
  rationale: En este contexto de teofanía de tormenta, el verbo denota el sonido del trueno. «Tronó» es natural en español y conserva la fuerza poética del hebreo.
- source_word: בַּשָּׁמַיִם
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos
  lexicon: HALOT
  rationale: El plural hebreo שָׁמַיִם suele conservar un matiz elevado y poético. «En los cielos» mantiene ese registro mejor que «en el cielo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La tradición POB para el Tetragrámaton es «Yahvé», transliteración del nombre divino, en vez de sustituirlo por un título.
- source_word: וְעֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Exaltado
  - el Más Alto
  lexicon: HALOT
  rationale: Como título divino, עֶלְיוֹן corresponde bien a «el Altísimo», forma estable y reverente en español.
- source_word: יִתֵּן קֹלוֹ
  english_pob_choice: gave his voice
  chosen_spanish: dio su voz
  alternatives_spanish:
  - emitió su voz
  - levantó su voz
  lexicon: HALOT
  rationale: 'La expresión hebrea es literal: «dio su voz». En español, «dio su voz» conserva la imagen idiomática y deja abierta la asociación poética con el trueno.'
- source_word: בָּרָד
  english_pob_choice: hailstones
  chosen_spanish: granizo
  alternatives_spanish:
  - pedrisco
  - granizos
  lexicon: HALOT
  rationale: El hebreo puede ser colectivo. En español, «granizo» expresa de manera natural el fenómeno meteorológico sin forzar un plural innecesario.
- source_word: וְגַחֲלֵי אֵשׁ
  english_pob_choice: and coals of fire
  chosen_spanish: brasas de fuego
  alternatives_spanish:
  - carbones encendidos
  - brasas ardientes
  lexicon: HALOT
  rationale: «Brasas de fuego» mantiene la imagen literal y solemne del hebreo, y suena más natural que una repetición tautológica más mecánica.
theological_decisions:
- issue: Cómo verter el Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El verso usa el nombre propio divino, no un título. Se conserva con la transliteración POB en español, «Yahvé», para mantener la referencia al nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre la segunda cola y la lista meteorológica final
  english_pob_reading: 'Retained as an appositional/elliptical continuation after a dash: ''gave his voice—hailstones and coals of fire.'''
  chosen_spanish_reading: Se conserva la secuencia abrupta como continuación appositiva tras raya.
  alternative_spanish_readings:
  - y dio su voz, y hubo granizo y brasas de fuego
  - 'dio su voz: granizo y brasas de fuego'
  rationale: El hebreo presenta los elementos de la tormenta sin verbo finito adicional. La raya permite preservar el corte poético sin añadir una relación causal explícita que el texto no formula.
  doctrine_reference: Principio POB de transparencia sintáctica y mínima adición interpretativa
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios en la última revisión; esta redacción española sigue la misma lectura poética y la misma decisión de mantener la idiomaticidad hebrea de las dos cláusulas centrales, ajustándola a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al término POB para el nombre divino.
  - Se conserva el título divino «el Altísimo» para עֶלְיוֹן.
  - La secuencia final se deja sin verbo añadido, en paralelo con el inglés auditado y con el hebreo elíptico.
  - Se evita «SEÑOR» como sustituto del nombre propio divino.
  - Se usa «granizo» en singular colectivo, coherente con el hebreo y natural en español.
