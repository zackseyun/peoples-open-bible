translation:
  language: es
  text: Y recuerda que fuiste esclavo en la tierra de Egipto[a]; por eso yo te mando hacer esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este asunto» o «este mandato». El hebreo dice literalmente «esta cosa» y se refiere a la instrucción anterior sobre dejar parte del producto para los vulnerables.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכַרְתָּ
  english_pob_choice: And remember
  chosen_spanish: Y recuerda
  alternatives_spanish:
  - Y acuérdate
  - Y has de recordar
  lexicon: HALOT
  rationale: El verbo hebreo está en forma exhortativa dentro de un contexto legal. «Recuerda» conserva la fuerza imperativa con español natural; el prefijo «Y» mantiene la conexión con la instrucción anterior.
- source_word: עֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: HALOT
  rationale: En el contexto de Egipto, el término expresa una condición de esclavitud real, no de servicio voluntario. «Esclavo» preserva esa fuerza lexical y sigue la decisión auditable de la POB inglesa.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: «Tierra de Egipto» reproduce la concreción de la expresión hebrea y conserva su cadencia formal. «Tierra» es la equivalencia más natural en español para este giro bíblico.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: HALOT
  rationale: La expresión introduce una conclusión lógica desde la esclavitud pasada hacia el mandato presente. «Por eso» comunica bien la inferencia en español moderno y conserva el nexo legal-causal.
- source_word: מְצַוְּךָ
  english_pob_choice: am commanding you
  chosen_spanish: te estoy mandando
  alternatives_spanish:
  - te mando
  - te ordeno
  lexicon: HALOT
  rationale: El participio transmite una acción mandataria en curso; «te estoy mandando» reproduce esa fuerza aspectual de manera clara. «Mandar» mantiene el registro de autoridad sin volverlo excesivamente técnico.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: hacer
  alternatives_spanish:
  - cumplir
  - realizar
  lexicon: HALOT
  rationale: El verbo עשה es amplio; «hacer» es el equivalente más directo y no estrecha indebidamente el sentido. En español, la estructura «mandar hacer» funciona naturalmente con este complemento verbal.
- source_word: אֶת הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este asunto
  - este mandato
  lexicon: HALOT
  rationale: El sustantivo דבר aquí remite al acto o instrucción inmediata previa. «Esta cosa» conserva la literalidad sobria del hebreo y evita interpretar de más como «mandato» o «asunto».
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto hebreo y con la auditoría inglesa: no hubo cambios revisados en la última pasada y la lectura sigue siendo de alta concordancia. Se mantuvo el valor exhortativo del verbo inicial, la fuerza social de «esclavo» y la referencia amplia de «esta cosa».'
  spanish_consistency_notes:
  - Se conservó «Yahvé» en otros pasajes conforme al estándar del proyecto, pero aquí no aparece el tetragrámaton.
  - «Esclavo» se eligió por la carga semántica del contexto egipcio; no se suavizó a «siervo».
  - La frase final evita sustituir el hebreo amplio por un término más estrecho sin base textual.
