    rationale: בְּפִיד se puede verter como 'ruina', pero en español debe ser 'de la ruina'. La forma actual es inaceptable para publicación.
  - severity: medium
    issue: '''Mi odiador'' es poco idiomático'
    rationale: Aunque intenta conservar la fuerza verbal del participio, en español suena forzado. 'El que me odia' preserva mejor la intención del inglés auditado y la naturalidad del español.
