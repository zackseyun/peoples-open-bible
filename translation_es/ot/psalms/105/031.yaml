translation:
  language: es
  text: Habló[a], y vinieron enjambres de moscas[b], y jejenes[c] por todo su territorio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dijo»; el hebreo אָמַר puede traducirse más literalmente como «dijo», aunque «habló» conserva bien la fórmula breve de habla divina en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: O simplemente «enjambres»; el hebreo עָרֹב en las narraciones de las plagas suele entenderse como un enjambre de moscas, aunque el insecto exacto no es seguro.
    reason: lexical_alternative
  - marker: c
    text: 'O: «piojos» o «mosquitos»; la identificación exacta del hebreo כִּנִּים es incierta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַר
  english_pob_choice: He spoke
  chosen_spanish: Habló
  alternatives_spanish:
  - Dijo
  - Pronunció
  lexicon: HALOT
  rationale: אָמַר expresa el acto de hablar/decir. En español, 'Habló' conserva la fórmula breve de habla divina sin añadir la idea de mandato, que no está explícita en el verbo.
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - entraron
  lexicon: HALOT
  rationale: El wayyiqtol de בוא narra la irrupción o llegada de la plaga. 'Vinieron' mantiene la idea de llegada con estilo natural en español y evita precisar indebidamente una dirección espacial.
- source_word: עָרֹב
  english_pob_choice: swarms of flies
  chosen_spanish: enjambres de moscas
  alternatives_spanish:
  - enjambres
  - una mezcla
  - el tábano
  lexicon: HALOT
  rationale: En el contexto de las plagas, עָרֹב suele entenderse como un enjambre de insectos, tradicionalmente moscas. 'Enjambres de moscas' hace explícito el referente probable sin perder la cautela ante la incertidumbre léxica.
- source_word: כִּנִּים
  english_pob_choice: gnats
  chosen_spanish: mosquitos
  alternatives_spanish:
  - jejenes
  - piojos
  lexicon: HALOT
  rationale: כִּנִּים designa insectos pequeños y molestos; en español 'mosquitos' comunica bien esa clase de plaga. Se evita 'piojos' porque en español moderno sugiere un animal más específico y menos probable para el contexto, aunque la identificación exacta sigue siendo incierta.
- source_word: בְּכָל
  english_pob_choice: throughout all
  chosen_spanish: por todo
  alternatives_spanish:
  - en todo
  - a través de todo
  lexicon: HALOT
  rationale: La preposición más 'todo' expresa extensión distributiva. 'Por todo' es una solución natural que refleja la cobertura completa del territorio.
- source_word: גְּבוּלָם
  english_pob_choice: their territory
  chosen_spanish: su territorio
  alternatives_spanish:
  - su frontera
  - su región
  - su tierra
  lexicon: HALOT
  rationale: גְּבוּל puede significar frontera, límite o territorio. Aquí, por el alcance de la plaga, 'su territorio' transmite mejor la extensión total que una mera línea fronteriza.
translation_notes:
  revision_awareness: La versión inglesa revisada añadió 'all' para reflejar בְּכָל y clarificó que 'gnats' forma una cláusula coordinada separada de 'swarms of flies'. La redacción española refleja ambas decisiones con 'por todo' y con la coordinación mediante 'y'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplicable en este versículo porque el texto hebreo no contiene el tetragrámaton.
  - 'Se preserva la distinción entre las dos plagas mediante coordinación explícita: ''enjambres de moscas'' y ''mosquitos''.'
  - Se evita 'SEÑOR' o glosas interpretativas porque el hebreo aquí presenta un relato de plaga, no una cita nominal del nombre divino.
