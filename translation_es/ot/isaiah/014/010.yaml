  glossary_alignment: 'No hay términos de glosario mayor en disputa en este versículo. Las decisiones léxicas principales concuerdan en general con el POB inglés: חֻלֵּיתָ como debilitamiento y נִמְשָׁלְתָּ como hacerse semejante/equiparado. Debe preservarse también en español la alternativa documentada para la segunda expresión, no solo para la primera.'
