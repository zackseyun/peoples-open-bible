  text: Yahvé habló a Moisés, diciendo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El hebreo narrativo וַיְדַבֵּר introduce una fórmula de discurso divina; en español, «habló» mantiene el valor formal de introducir palabra directa y conserva la distinción frente a לֵאמֹר. «Dijo» también es posible, pero menos marcado como fórmula de discurso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrama con la forma estándar del proyecto en español, «Yahvé», en lugar de sustituirlo por un título. Esto sigue la decisión auditada del POB inglés de no enmascarar el nombre.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla; en español bíblico y moderno, «a» es la equivalencia natural y precisa para el objeto indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español, sin necesidad de adaptación adicional.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como fórmula introductoria de discurso. «Diciendo» preserva la estructura hebrea de manera natural en español y deja claro que el contenido seguirá.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'La traducción española mantiene la misma decisión teológica y textual que el POB inglés: preservar el nombre personal de Dios revelado a Israel, no sustituirlo por un título. «Yahvé» es la forma usual del proyecto para el Tetragrama en español.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés están en completo acuerdo; no hay variantes textuales ni tensiones léxicas adicionales que requieran nota. La versión española sigue la misma estructura formulaica del original: nombre divino, verbo de habla, destinatario y marcador de discurso.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto en español.
  - Se conserva el tono formulaico y bíblico con «habló ... diciendo» sin introducir paráfrasis.
  - 'Los nombres propios permanecen en sus formas españolas establecidas: «Moisés».'
