translation:
  language: es
  text: Él envía manantiales por los valles[a]; corren entre los montes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los wadis» o «en las quebradas»; el término hebreo puede referirse a cauces estacionales o a los valles asociados con ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְשַׁלֵּחַ
  english_pob_choice: He sends
  chosen_spanish: Él envía
  alternatives_spanish:
  - el que envía
  - enviando
  lexicon: HALOT
  rationale: El participio hifil articular describe una acción continua de Dios en el contexto del salmo. En español, «Él envía» conserva el sujeto implícito divino y su fuerza descriptiva con una forma verbal natural.
- source_word: מַעְיָנִים
  english_pob_choice: springs
  chosen_spanish: manantiales
  alternatives_spanish:
  - fuentes
  - springs
  lexicon: HALOT
  rationale: מַעְיָן designa una naciente o fuente de agua. «Manantiales» es claro en español contemporáneo y mantiene la imagen de agua que brota naturalmente.
- source_word: בַּנְּחָלִים
  english_pob_choice: into the valleys
  chosen_spanish: en los valles
  alternatives_spanish:
  - en los wadis
  - en las quebradas
  - en los barrancos
  lexicon: HALOT
  rationale: נחל puede referirse a valle, cauce o lecho de arroyo. Aquí, por el paralelismo con montes y el movimiento del agua, «valles» comunica bien la escena sin recurrir a un tecnicismo poco transparente.
- source_word: בֵּין
  english_pob_choice: between
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  lexicon: HALOT
  rationale: La preposición expresa ubicación intermedia de manera directa; «entre» es el equivalente normal y más preciso en español.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los cerros
  lexicon: HALOT
  rationale: הָרִים puede ser «montes» o «montañas». «Montes» conserva el tono poético bíblico en español y encaja bien con el contraste con «valles».
- source_word: יְהַלֵּכֽוּן
  english_pob_choice: they flow
  chosen_spanish: ellos fluyen
  alternatives_spanish:
  - ellos van
  - ellos corren
  - ellos discurren
  lexicon: HALOT
  rationale: Aunque el verbo básico es «ir/caminar», el sujeto son corrientes de agua. «Fluyen» reproduce el sentido contextual de movimiento del agua sin perder la imagen verbal del hebreo.
theological_decisions:
- issue: Sujeto implícito del participio y referencia a Dios
  english_pob_reading: He refers to God
  chosen_spanish_reading: Él se refiere a Dios
  alternative_spanish_readings:
  - se entiende que es Dios
  - él = Yahvé
  rationale: El hebreo presenta un participio con sujeto implícito recuperable por el contexto del himno. Mantener «Él» preserva la referencia a Yahvé sin sobrecargar el verso con una aclaración que rompería el paralelismo poético.
  doctrine_reference: Providencia divina en la creación; Salmo 104 como himno de alabanza a Yahvé.
translation_notes:
  revision_awareness: 'El repaso auditado coincide en alto grado con la lectura inglesa: se mantiene la acción providencial de Dios, se conserva el paralelismo entre manantiales y montes, y no se introducen cambios textuales ni doctrinales adicionales.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en coherencia con la política del proyecto cuando el texto lo requiera en contextos explícitos; aquí el versículo queda con sujeto pronominal implícito porque el contexto inmediato ya lo identifica.
  - Se eligieron formas poéticas naturales en español («manantiales», «montes», «fluyen») para conservar el registro bíblico sin calcos forzados.
  - La nota[a] se ancla en «valles» para preservar la ambigüedad semántica de נחל entre valle, cauce y quebrada.
