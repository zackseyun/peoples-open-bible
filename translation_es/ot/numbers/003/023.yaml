review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis y el sentido básicos del hebreo: sujeto colectivo, ubicación espacial detrás del tabernáculo y dirección hacia el oeste. También conserva correctamente la nota sobre el modismo hebreo literal ''hacia el mar''. Sin embargo, se aparta innecesariamente de la decisión auditada de מִשְׁפְּחֹת como ''clans'', que en este contexto censal/tribal apunta mejor a subdivisiones de linaje que ''familias''.'
  spanish_quality_summary: 'El español es claro y digno. ''Detrás del tabernáculo'' y ''acamparán'' son naturales. ''Hacia el occidente'' es aceptable y de buen registro. La mejora principal es terminológica: ''clanes'' comunica mejor el referente sociolineal que ''familias'' en Números.'
  glossary_alignment: No hay términos del glosario principal en disputa salvo la consistencia contextual de מִשְׁפְּחֹת. 'Gersonitas', 'tabernáculo' y la nota sobre יָמָּה están bien alineados con la evidencia y la auditoría inglesa.
  issues:
  - severity: medium
    issue: מִשְׁפְּחֹת se tradujo como 'familias' en vez de 'clanes'.
    rationale: La auditoría inglesa justificó 'clans' por el contexto tribal/censal de Números. En español bíblico legible, 'clanes' preserva mejor la idea de subdivisiones de linaje corporativas; 'familias' puede sonar demasiado doméstico y diluir la precisión sociológica del término.
  - severity: low
    issue: La alternativa española listada para יָמָּה incluye 'seawards' en inglés.
    rationale: Es un detalle metadiscursivo menor en las decisiones léxicas, no del texto bíblico mismo. No afecta el versículo, pero muestra una pequeña inconsistencia editorial.
  revised_spanish_text: Los clanes de los gersonitas acamparán detrás del tabernáculo[a], hacia el occidente.
  revised_footnotes:
  - marker: a
    text: Hebreo literalmente «hacia el mar», un giro idiomático estándar para indicar el occidente.
    reason: lexical_alternative
