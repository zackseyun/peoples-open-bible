translation:
  language: es
  text: Dios[a], los arrogantes se han levantado contra mí, y una banda de hombres despiadados ha buscado mi vida[b]; no te han puesto delante de ellos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Oh Dios».'
    reason: lexical_alternative
  - marker: b
    text: «Ha buscado mi vida» es un modismo hebreo que significa buscar matarme.
    reason: cultural_note
  - marker: c
    text: 'O: «no te han puesto delante de sus ojos», es decir, no tienen consideración por Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Oh Dios
  lexicon: HALOT
  rationale: Aquí funciona como vocativo dirigido al Dios de Israel. En español, «Dios» mantiene la dirección personal sin añadir una interjección que no está en el hebreo. Se conserva la posibilidad alternativa de una invocación explícita en el tono de oración, pero el texto base no la exige.
- source_word: זֵדִים
  english_pob_choice: arrogant men
  chosen_spanish: los arrogantes
  alternatives_spanish:
  - los soberbios
  - hombres arrogantes
  - los insolentes
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural describe personas orgullosas e insolentes. En español, «los arrogantes» comunica bien el rasgo hostil sin forzar una ampliación innecesaria. No se añade «hombres» en el texto principal porque el plural personal ya es natural en español; la referencia a personas queda clara por el contexto.
- source_word: קָמוּ עָלַי
  english_pob_choice: have risen against me
  chosen_spanish: se han levantado contra mí
  alternatives_spanish:
  - se levantaron contra mí
  - han surgido contra mí
  lexicon: HALOT
  rationale: La expresión hebrea קום על indica levantarse en hostilidad. «Se han levantado contra mí» reproduce bien el valor idiomático y el tono de conflicto. El presente perfecto encaja con el lamento y con el inglés auditado.
- source_word: וַעֲדַת
  english_pob_choice: a band of
  chosen_spanish: una banda de
  alternatives_spanish:
  - una asamblea de
  - un grupo de
  - una compañía de
  lexicon: HALOT
  rationale: El término designa un conjunto reunido. En este contexto hostil, «una banda de» suena más natural y conserva el matiz de grupo unido para una acción agresiva.
- source_word: עָרִיצִים
  english_pob_choice: ruthless men
  chosen_spanish: hombres violentos
  alternatives_spanish:
  - hombres despiadados
  - tiranos
  - hombres crueles
  lexicon: HALOT
  rationale: El término puede referirse a personas violentas, opresoras o despiadadas. «Hombres violentos» evita reducir el sentido a una tiranía política y conserva el carácter amenazante del grupo. Se mantiene la referencia personal explícita porque el hebreo funciona substantivamente.
- source_word: בִּקְשׁוּ נַפְשִׁי
  english_pob_choice: has sought my life
  chosen_spanish: ha buscado mi vida
  alternatives_spanish:
  - ha procurado quitarme la vida
  - ha querido matarme
  - ha buscado matarme
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo «buscar mi vida» en español, porque transmite la imagen bíblica tradicional de hostilidad letal sin convertirlo en una paráfrasis. «Ha buscado mi vida» sigue de cerca el texto y permanece inteligible; la idea de matar queda implícita en la expresión, como en el original.
- source_word: וְלֹא שָׂמ֣וּ/ךָ לְנֶגְדָּם
  english_pob_choice: they have not set you before them
  chosen_spanish: no te han puesto delante de ellos
  alternatives_spanish:
  - no te han puesto delante de sus ojos
  - no te han tenido presente
  - no te han considerado
  lexicon: HALOT
  rationale: La expresión literal hebrea comunica no tener a Dios en vista ni consideración. «No te han puesto delante de ellos» preserva la metáfora espacial del original y permite la lectura de falta de reverencia o de conciencia de Dios. Se evita una paráfrasis explicativa en el texto principal.
theological_decisions:
- issue: Vocativo divino sin añadir una partícula equivalente a «Oh»
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - Oh Dios
  rationale: El hebreo contiene simplemente אֱלֹהִים al inicio, y la dirección a Dios ya es evidente por el contexto. En español, «Dios» expresa el vocativo con sobriedad y sin introducir un énfasis interjectivo que el texto fuente no da de forma explícita.
  doctrine_reference: Primacía del texto original; evitar añadir énfasis no presente
- issue: Si explicitar o no el sentido homicida de «buscar mi vida»
  english_pob_reading: seek my life
  chosen_spanish_reading: ha buscado mi vida
  alternative_spanish_readings:
  - ha buscado matarme
  - ha querido matarme
  rationale: Se mantiene el modismo en el texto principal porque el hebreo usa la expresión idiomática y el POB inglés también la preserva. La implicación de violencia mortal queda en la propia fórmula y puede explicarse en nota si fuera necesario, sin desplazar la imagen original.
  doctrine_reference: Equivalencia óptima; preservar la imaginería y el alcance semántico del hebreo
- issue: Cómo traducir el final para mantener la metáfora de presencia/consideración
  english_pob_reading: they have not set you before them
  chosen_spanish_reading: no te han puesto delante de ellos
  alternative_spanish_readings:
  - no te han puesto delante de sus ojos
  - no te han considerado
  - no te han tenido presente
  rationale: La construcción hebrea expresa literalmente que no han colocado a Dios ante sí, es decir, que no lo consideran ni lo temen. La versión elegida conserva la imagen espacial y deja abierta la implicación teológica de irreverencia, como en el audit trail inglés.
  doctrine_reference: Lectura léxica conservadora; respeto por la metáfora bíblica
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés auditado, que ajustó el verbo a un perfecto singular colectivo («has sought my life»). En español se refleja con «ha buscado mi vida», manteniendo tanto el aspecto completado como el sujeto colectivo singular («una banda de hombres violentos»).
  spanish_consistency_notes:
  - Se usa «Dios» como vocativo directo, en coherencia con la política española de evitar el ocultamiento reverencial del nombre divino cuando el texto no lo hace.
  - Se mantiene «ha buscado mi vida» para conservar el modismo y su tensión semántica entre literalidad e implicación homicida.
  - «No te han puesto delante de ellos» conserva la metáfora del original y evita convertirla en una explicación interpretativa dentro del texto principal.
  - Se prefiere un registro bíblico claro y contemporáneo, sin recurrir a fórmulas arcaizantes como «SEÑOR» o «han buscado mi alma».
