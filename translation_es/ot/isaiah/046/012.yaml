translation:
  language: es
  text: Escúchenme, obstinados de corazón[a], los que están lejos de la rectitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Lit. «fuertes de corazón» o «poderosos de corazón». En este contexto de reprensión, la expresión tiene sentido negativo: obstinados o tercos de corazón.'
    reason: lexical_alternative
  - marker: b
    text: O «de la justicia» o «de la vindicación». El hebreo también puede abarcar esos matices, pero aquí «rectitud» expresa mejor la distancia moral y espiritual señalada en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְע֥וּ
  english_pob_choice: Listen
  chosen_spanish: Escúchenme
  alternatives_spanish:
  - Oiganme
  - Escuchen
  lexicon: HALOT
  rationale: El imperativo plural pide atención obediente, no solo percepción auditiva. «Escúchenme» mantiene el llamado directo y es natural en español bíblico contemporáneo.
- source_word: אֵלַ֖/י
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: El hebreo marca destino/dirección hacia el hablante; en español, el clítico «me» en «Escúchenme» expresa con naturalidad esa dirección sin perder el sentido.
- source_word: אַבִּ֣ירֵי לֵ֑ב
  english_pob_choice: stubborn of heart
  chosen_spanish: obstinados de corazón
  alternatives_spanish:
  - fuertes de corazón
  - poderosos de corazón
  - duros de corazón
  lexicon: HALOT
  rationale: La expresión literal es «fuertes/poderosos de corazón», pero el contexto de reprensión profética favorece una lectura negativa. «Obstinados de corazón» conserva la imagen interior del hebreo y comunica mejor la fuerza recriminatoria del pasaje.
- source_word: הָ/רְחוֹקִ֖ים
  english_pob_choice: you who are far
  chosen_spanish: ustedes que están lejos
  alternatives_spanish:
  - los que están lejos
  - ustedes, los lejanos
  lexicon: HALOT
  rationale: Es un participio sustantivado con artículo que describe al grupo interpelado. La cláusula relativa en español resulta clara y mantiene el tono de invectiva profética.
- source_word: מִ/צְּדָקָֽה
  english_pob_choice: from righteousness
  chosen_spanish: de la justicia
  alternatives_spanish:
  - de la rectitud
  - de la justicia/vindicación
  lexicon: HALOT
  rationale: «צְדָקָה» puede abarcar justicia, rectitud o vindicación. Aquí, siguiendo la lectura del POB, «justicia» comunica bien la distancia moral y espiritual implícita, sin reducir el término a una sola esfera técnica.
theological_decisions:
- issue: Valor de צְדָקָה en una reprensión profética
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - vindicación
  rationale: En este contexto, el contraste no apunta solo a un estatus forense sino a una distancia real respecto de lo que es recto ante Dios. «Justicia» preserva ese campo semántico amplio en español y deja espacio a los matices alternos documentados.
  doctrine_reference: 'DOCTRINE.md: términos contenciosos — δικαιοσύνη / צְדָקָה → justicia / rectitud según contexto'
translation_notes:
  revision_awareness: 'El texto coincide con el último pase revisado del expediente fuente: no se registran cambios aplicados y el control cruzado informó alto acuerdo (veredicto: agree).'
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo en segunda persona plural.
  - Se conserva el paralelismo entre la invocación y la cláusula relativa.
  - «Justicia» se usa aquí como equivalente principal de צְדָקָה, sin eliminar el rango semántico alterno documentado.
