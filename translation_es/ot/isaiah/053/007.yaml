translation:
  language: es
  text: Fue oprimido[a], y fue afligido, pero no abrió su boca; como cordero que es llevado al matadero, y como oveja silenciosa delante de sus esquiladores, así no abrió su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Fue oprimido, pero se humilló a sí mismo»; el hebreo de la primera línea es difícil, y algunas traducciones toman el segundo verbo con el sentido de auto-humillación en vez de aflicción pasiva.
    reason: alternative_reading
lexical_decisions:
- source_word: נִגַּשׂ
  english_pob_choice: was oppressed
  chosen_spanish: fue oprimido
  alternatives_spanish:
  - fue apremiado
  - fue tratado con dureza
  lexicon: HALOT
  rationale: El hebreo en nifal expresa haber sido sometido a trato duro u opresión. «Oprimido» conserva ese sentido pasivo y es natural en español, sin suavizar la violencia del verbo.
- source_word: נַעֲנֶה
  english_pob_choice: was afflicted
  chosen_spanish: fue afligido
  alternatives_spanish:
  - fue humillado
  - fue abatido
  lexicon: HALOT
  rationale: La forma pasiva/reflexiva apunta a sufrimiento o aflicción, no a una respuesta verbal. «Afligido» mantiene el paralelismo con «oprimido» y respeta el tono de padecimiento.
- source_word: וְלֹא יִפְתַּח פִּיו
  english_pob_choice: yet he did not open his mouth
  chosen_spanish: pero no abrió su boca
  alternatives_spanish:
  - y no abrió su boca
  lexicon: HALOT
  rationale: «Abrir la boca» es una expresión literal y clara en español. «Pero» comunica bien el giro concesivo que el POB inglés marcó con «yet», sin añadir contenido ajeno al hebreo.
- source_word: כַּשֶּׂה
  english_pob_choice: like a lamb
  chosen_spanish: como cordero
  alternatives_spanish:
  - como oveja joven
  - como un cordero
  lexicon: HALOT
  rationale: Aunque el término hebreo puede ser más amplio, en este contexto sacrificial «cordero» es la imagen más estable y precisa en español, y conserva la vulnerabilidad de la comparación.
- source_word: לַטֶּבַח
  english_pob_choice: to the slaughter
  chosen_spanish: al matadero
  alternatives_spanish:
  - para el degüello
  - para la matanza
  lexicon: HALOT
  rationale: La frase describe destino de muerte violenta. «Al matadero» es idiomático en español y refleja el movimiento dirigido del verbo pasivo/causativo «llevado».
- source_word: יוּבָל
  english_pob_choice: led
  chosen_spanish: llevado
  alternatives_spanish:
  - guiado
  - conducido
  lexicon: HALOT
  rationale: El hebreo indica ser movido bajo control ajeno. «Llevado» sigue de cerca la imagen y funciona con naturalidad junto a «al matadero».
- source_word: וּכְרָחֵל
  english_pob_choice: and like a ewe
  chosen_spanish: y como oveja
  alternatives_spanish:
  - y como una hembra de oveja
  - y como carnera
  lexicon: HALOT
  rationale: Rָחֵל es específicamente una oveja hembra; sin embargo, «oveja» comunica con claridad la comparación en español. Se evita «ewe» por ser poco natural en español y «carnera» por sonar forzado.
- source_word: לִפְנֵי גֹזְזֶיהָ
  english_pob_choice: before her shearers
  chosen_spanish: delante de sus esquiladores
  alternatives_spanish:
  - ante quienes la esquilan
  - frente a sus trasquiladores
  lexicon: HALOT
  rationale: «Esquiladores» conserva la imagen del esquileo y expresa bien el sufijo femenino del hebreo mediante el posesivo plural. Es más preciso que un verbo perifrástico y más claro que opciones menos comunes.
- source_word: נֶאֱלָמָה
  english_pob_choice: silent
  chosen_spanish: muda
  alternatives_spanish:
  - silenciosa
  - callada
  lexicon: HALOT
  rationale: El adjetivo hebreo describe ausencia de voz. «Muda» es breve, fuerte y encaja con la imagen de una oveja que no protesta, aunque en el uso moderno pueda sonar algo más marcado que «callada».
- source_word: וְלֹא יִפְתַּח פִּיו
  english_pob_choice: so he did not open his mouth
  chosen_spanish: tampoco abrió su boca
  alternatives_spanish:
  - ni abrió su boca
  - y no abrió su boca
  lexicon: HALOT
  rationale: La repetición final debe conservarse como cierre enfático. «Tampoco» deja oír la correspondencia con la cláusula anterior y evita atenuar la insistencia del hebreo.
theological_decisions:
- issue: Sufrimiento del Siervo sin explicitar identificación cristológica
  english_pob_reading: Translate the verse according to its immediate Hebrew sense without importing explicit christological language.
  chosen_spanish_reading: Traducir según el sentido inmediato del hebreo, sin introducir lenguaje cristológico explícito en el texto.
  alternative_spanish_readings:
  - Usar una formulación tradicional que ya suene a lectura del Nuevo Testamento
  - Nombrar explícitamente al Mesías en el versículo
  rationale: La tradición cristiana ve este texto cumplido en Cristo, pero la traducción no debe insertar esa identificación dentro del versículo. El español mantiene la imagen del Siervo sufriente, la comparación y la repetición, dejando la identificación teológica para el contexto y las notas.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'El pasaje se mantiene alineado con la última pasada de revisión del POB inglés: lectura óptima con alta concordancia, sin cambios editoriales pendientes. La nota de la línea inicial conserva la tensión reconocida en el audit trail entre opresión pasiva y posible auto-humillación.'
  spanish_consistency_notes:
  - Se preserva la repetición final de «abrió su boca» para reflejar el paralelismo del hebreo.
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «cordero» y «oveja» para conservar la imaginería sacrificial y pastoral del hebreo.
  - «Muda» se eligió por fuerza expresiva, aunque «callada» sería una alternativa más suave en español moderno.
