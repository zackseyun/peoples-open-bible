  rationale: Se mueve la nota [a] a 'Apame' para que corresponda correctamente a la alternativa transliterativa documentada. Se cambia 'Yo lo veía a él' por 'Vi a él' para seguir mejor la decisión auditada de pasado simple narrativo y evitar la pesadez del imperfecto con duplicación pronominal. Se conservan las demás decisiones léxicas correctas del borrador.
