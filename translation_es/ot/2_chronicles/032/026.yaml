  glossary_alignment: 'Está alineado con la terminología del proyecto: יְהוָה -> «Yahvé»; no hay conflictos con otros términos clave. La elección «altivez» para בְּגֹבַהּ לִבּוֹ es válida y mantiene el matiz de elevación orgullosa. «Ira» para קֶצֶף también concuerda con la gravedad del juicio divino.'
