  text: כִּ֣י אֶל הַ֠/לְּשָׁכוֹת יָבִ֨יאוּ בְנֵי יִשְׂרָאֵ֜ל וּ/בְנֵ֣י הַ/לֵּוִ֗י אֶת תְּרוּמַ֣ת הַ/דָּגָן֮ הַ/תִּיר֣וֹשׁ וְ/הַ/יִּצְהָר֒ וְ/שָׁם֙ כְּלֵ֣י הַ/מִּקְדָּ֔שׁ וְ/הַ/כֹּהֲנִים֙ הַ/מְשָׁ֣רְתִ֔ים וְ/הַ/שּׁוֹעֲרִ֖ים וְ/הַ/מְשֹׁרְרִ֑ים וְ/לֹ֥א נַעֲזֹ֖ב אֶת בֵּ֥ית אֱלֹהֵֽי/נוּ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/010/040.yaml
  text: For the sons of Israel and the sons of Levi will bring the contribution of the grain[a], the new wine, and the oil to the chambers, where the vessels of the sanctuary are, and the priests who minister, and the gatekeepers, and the singers[b]. And we will not neglect the house of our God.
  footnotes:
  - marker: a
    text: Or 'the Israelites and the Levites.' The Hebrew more literally reads 'the sons of Israel and the sons of Levi.'
    reason: lexical_alternative
  - marker: b
    text: Or 'we will not forsake the house of our God.'
    reason: alternative_reading
