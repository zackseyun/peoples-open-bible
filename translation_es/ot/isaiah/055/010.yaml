base_translation:
  language: en
  yaml_path: translation/ot/isaiah/055/010.yaml
  text: For just as the rain and the snow come down from heaven and do not return there unless they have watered the earth[a], made it bear fruit, and made it sprout, and have given seed to the sower and bread to the eater[b],
  footnotes:
  - marker: a
    text: Or 'from the heavens.' The Hebrew שָׁמַיִם is formally plural and can denote 'heaven,' 'the heavens,' or 'the sky' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'made it produce and made it grow.' The paired verbs emphasize the earth's fruitful response to the rain and snow.
    reason: lexical_alternative
