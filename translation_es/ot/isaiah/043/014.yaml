base_translation:
  language: en
  yaml_path: translation/ot/isaiah/043/014.yaml
  text: 'Thus says Yahweh[a], your Redeemer, the Holy One of Israel: For your sake I have sent to Babylon and brought them all down as fugitives, even the Chaldeans[b], in the ships of their rejoicing.'
  footnotes:
  - marker: a
    text: Or 'and I will bring down all of them as bars'; the Hebrew word rendered 'fugitives' is difficult and has also been understood to refer to 'bars' or, less likely, 'nobles.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I have sent against Babylon.' The Hebrew literally says 'I have sent to Babylon,' with the object left implicit.
    reason: alternative_reading
