translation:
  language: es
  text: En la ciudad amada, asimismo me dio descanso[a], y en Jerusalén estaba mi autoridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sujeto de «me dio descanso» está implícito en el griego; el contexto inmediato apunta a Dios, pero este versículo no lo nombra explícitamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: πόλει ἠγαπημένῃ
  english_pob_choice: the beloved city
  chosen_spanish: la ciudad amada
  alternatives_spanish:
  - la ciudad querida
  - la ciudad amada por él
  lexicon: LSJ
  rationale: ἠγαπημένῃ expresa la idea de una ciudad amada; en español, «amada» conserva el tono elevado y la referencia específica sin añadir una relación explícita que el griego no formula en la cláusula.
- source_word: ὁμοίως
  english_pob_choice: likewise
  chosen_spanish: asimismo
  alternatives_spanish:
  - igualmente
  - de igual manera
  lexicon: LSJ
  rationale: ὁμοίως marca continuidad con lo anterior; «asimismo» mantiene ese enlace en un registro digno y fluido para español bíblico actual.
- source_word: κατέπαυσεν
  english_pob_choice: he gave me rest
  chosen_spanish: me dio descanso
  alternatives_spanish:
  - me hizo descansar
  - me estableció
  - me hizo habitar
  lexicon: LSJ
  rationale: καταπαύω puede implicar hacer reposar o establecer. «Me dio descanso» conserva la idea de reposo y colocación sin forzar una localización territorial más fuerte que la del griego.
- source_word: ἐξουσία
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - dominio
  - jurisdicción
  lexicon: LSJ
  rationale: ἐξουσία denota autoridad, derecho o jurisdicción. «Autoridad» reproduce mejor el sustantivo abstracto y evita convertirlo en un simple dominio territorial.
theological_decisions:
- issue: Sujeto implícito de κατέπαυσεν
  english_pob_reading: Rendered simply as 'he' without specifying God in the main text.
  chosen_spanish_reading: Se mantiene «me dio descanso» sin nombrar al sujeto en el texto principal.
  alternative_spanish_readings:
  - el Señor me dio descanso
  - Dios me dio descanso
  rationale: El griego presenta un sujeto masculino singular implícito, probablemente Dios por el contexto circundante, pero la cláusula no lo nombra. La traducción preserva esa tensión y no introduce una identificación explícita en el cuerpo principal.
  doctrine_reference: Primacía del original sobre la tradición; preservar el sujeto implícito cuando el versículo no lo expresa.
translation_notes:
  revision_awareness: 'La redacción española sigue el orden y la fuerza relacional del griego: primero la cláusula locativa con «asimismo», luego el verbo de reposo/establecimiento, y finalmente la afirmación de autoridad en Jerusalén. Se evita resolver en el texto principal el sujeto implícito del verbo, conforme al audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija explícitamente; aquí no aparece el nombre divino.
  - «Autoridad» se mantiene como equivalente de ἐξουσία, en línea con el audit trail inglés.
  - La estructura «En la ciudad amada, asimismo...» conserva la referencia específica y el tono sapiencial sin añadir glosas interpretativas.
