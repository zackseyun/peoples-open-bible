  yaml_path: translation/ot/genesis/014/005.yaml
  text: In the fourteenth year[a], Kedorlaomer came, along with the kings who were with him, and they defeated the Rephaim at Ashteroth-karnaim, the Zuzim at Ham[c][b], and the Emim at Shaveh-kiriathaim.
  footnotes:
