translation:
  language: es
  text: Hoy Yahvé tu Dios te manda[a] hacer estos estatutos y juicios[b]; y los guardarás y los harás con todo tu corazón y con toda tu alma[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Este día Yahvé tu Dios te manda hacer estos estatutos y juicios».'
    reason: alternative_reading
  - marker: b
    text: «Juicios» puede entenderse también como «ordenanzas» o «reglas»; el hebreo suele referirse a decisiones o disposiciones legales.
    reason: lexical_alternative
  - marker: c
    text: «Alma» aquí traduce el hebreo nephesh, que también puede significar «vida» o «ser».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: This day
  chosen_spanish: Hoy
  alternatives_spanish:
  - Este día
  - En este día
  lexicon: HALOT
  rationale: En español, «hoy» comunica de forma natural el deíctico temporal del hebreo. «Este día» es posible, pero suena más marcado; «Hoy» mantiene la solemnidad sin sonar forzado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio como «Yahvé», conforme al criterio del proyecto para יְהוָה, en vez de sustituirlo por un título. «Yahveh» es una variante gráfica posible, pero «Yahvé» es la forma adoptada aquí por coherencia editorial.
- source_word: מְצַוְּךָ
  english_pob_choice: commands you
  chosen_spanish: te manda
  alternatives_spanish:
  - te ordena
  - te está mandando
  lexicon: HALOT
  rationale: El participio hebreo expresa mandato vigente. En español, «te manda» transmite bien la fuerza imperativa y suena más natural que una perífrasis continua; «te ordena» sería más duro, pero no necesario por el contexto.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: hacer
  alternatives_spanish:
  - cumplir
  - realizar
  lexicon: HALOT
  rationale: Se mantiene el verbo básico «hacer» para conservar la cercanía al hebreo. «Cumplir» podría introducir un matiz interpretativo más fuerte, aunque sería posible en contexto legal.
- source_word: הַחֻקִּים
  english_pob_choice: statutes
  chosen_spanish: estatutos
  alternatives_spanish:
  - decretos
  - mandamientos
  lexicon: HALOT
  rationale: «Estatutos» es el equivalente jurídico-bíblico más estable para חֻקִּים y preserva la distinción con מִשְׁפָּטִים.
- source_word: הַמִּשְׁפָּטִים
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - ordenanzas
  - sentencias
  - reglas
  lexicon: HALOT
  rationale: «Juicios» reproduce de manera directa el valor de מִשְׁפָּטִים como decisiones o disposiciones legales, y mantiene la tensión terminológica que la POB inglesa conserva con «judgments». «Ordenanzas» suaviza el término pero pierde esa correspondencia.
- source_word: וְשָׁמַרְתָּ
  english_pob_choice: you shall keep
  chosen_spanish: y los guardarás
  alternatives_spanish:
  - y observarás
  - y los cuidarás
  lexicon: HALOT
  rationale: En contexto de pacto, שׁמר se traduce bien como «guardar» u «observar». Se eligió «guardarás» para conservar el paralelo bíblico tradicional y la idea de custodia obediente.
- source_word: וְעָשִׂיתָ אֹתָם
  english_pob_choice: and do them
  chosen_spanish: y los pondrás por obra
  alternatives_spanish:
  - y los harás
  - y los cumplirás
  lexicon: HALOT
  rationale: La combinación «poner por obra» expresa de forma idiomática y digna el hebreo «hacerlos», sin perder el énfasis práctico. «Los harás» sería demasiado literal y menos natural en español; «cumplirás» introduce una interpretación normativa más fuerte.
- source_word: בְּכָל לְבָבְךָ
  english_pob_choice: with all your heart
  chosen_spanish: con todo tu corazón
  alternatives_spanish:
  - con todo tu ser interior
  - con todo tu ánimo
  lexicon: HALOT
  rationale: «Corazón» conserva el valor bíblico de centro de voluntad, pensamiento y afecto. En español es la formulación más fiel y reconocible.
- source_word: וּבְכָל נַפְשֶׁךָ
  english_pob_choice: and with all your soul
  chosen_spanish: y con toda tu alma
  alternatives_spanish:
  - y con toda tu vida
  - y con todo tu ser
  lexicon: HALOT
  rationale: Se mantiene «alma» para reflejar la tradición bíblica y la correspondencia con la POB inglesa. Aunque נֶפֶשׁ también puede significar vida o ser, aquí la pareja «corazón/alma» preserva bien la fórmula covenantal.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama explícitamente, y la política del proyecto pide reflejarlo como nombre propio. «Yahvé» mantiene la referencia personal y pactal sin ocultarla detrás de un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de מִשְׁפָּטִים en un contexto legal-covenantal
  english_pob_reading: judgments
  chosen_spanish_reading: juicios
  alternative_spanish_readings:
  - ordenanzas
  - reglas
  - sentencias
  rationale: La palabra hebrea puede referirse a decisiones o disposiciones legales. «Juicios» conserva la fuerza jurídica del término y, aunque es menos común que «ordenanzas», refleja mejor la elección auditada de la POB inglesa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and lexical precision in legal terms'
- issue: Fórmula antropológica «corazón/alma»
  english_pob_reading: heart/soul
  chosen_spanish_reading: corazón/alma
  alternative_spanish_readings:
  - corazón/vida
  - mente/alma
  rationale: El hebreo une לֵבָב y נֶפֶשׁ para expresar la totalidad interior de la persona. «Corazón» y «alma» preservan la fórmula bíblica tradicional en español sin diluir la amplitud antropológica del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que sustituyó una inferencia causal por la conjunción simple del hebreo y prefirió el presente simple para el mandato. En español se reflejó esa misma sobriedad sintáctica con «te manda ...; y los guardarás y los pondrás por obra», sin añadir conectores inferenciales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se conserva la distinción terminológica «estatutos/juicios» para reproducir la pareja legal hebrea.
  - Se usa el paralelismo «guardarás / pondrás por obra» para reflejar el doble verbo hebreo sin sobreexplicar.
  - La puntuación con punto y coma separa la cláusula de mandato de la exhortación consecuente, en línea con la revisión auditada del inglés.
