translation:
  language: es
  text: 'Así dice el Señor Yahvé[a]: Esta es Jerusalén. La he puesto en medio de las naciones, con tierras a su alrededor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el Señor Yahvé»; se conserva el nombre divino en lugar de la convención tradicional de ocultarlo como «SEÑOR».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Entonces
  lexicon: HALOT
  rationale: La fórmula profética כֹּה אָמַר se expresa con una introducción solemne y natural en español; «Así» conserva el tono oracular sin sonar forzado.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: En la fórmula profética, el perfecto hebreo funciona idiomáticamente como presente en el habla profética; por eso «dice» mantiene el valor vigente de la declaración.
- source_word: אֲדֹנָי יְהֹוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: HALOT
  rationale: 'Se conserva la distinción del título compuesto: אֲדֹנָי como «Señor» y יְהֹוִה como «Yahvé», conforme al criterio del proyecto para el nombre divino. «Señor Yahvé» evita la repetición en español y refleja directamente el hebreo.'
- source_word: זֹאת
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esto es
  - Aquí está
  lexicon: HALOT
  rationale: El demostrativo introduce e identifica a Jerusalén de forma enfática; «Esta es Jerusalén» reproduce bien la fuerza deíctica en español.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar en español.
- source_word: בְּתוֹךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en el centro de
  - en medio entre
  lexicon: HALOT
  rationale: La expresión espacial pide una solución natural en español que preserve la centralidad imaginada; «en medio de» transmite la misma ubicación enfática.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto profético, «naciones» es la equivalencia más fiel y neutral para גוים, sin introducir matices eclesiásticos ajenos.
- source_word: שַׂמְתִּיהָ
  english_pob_choice: I have set her
  chosen_spanish: la he puesto
  alternatives_spanish:
  - la puse
  - la he colocado
  lexicon: HALOT
  rationale: El verbo significa «poner/colocar»; el perfecto español («he puesto») conserva el estado resultante de una acción ya establecida por Dios. El pronombre femenino concuerda con Jerusalén.
- source_word: וּסְבִיבוֹתֶיהָ
  english_pob_choice: with lands all around her
  chosen_spanish: con tierras todo alrededor de ella
  alternatives_spanish:
  - con tierras alrededor de ella
  - y tierras a su alrededor
  lexicon: HALOT
  rationale: La frase se vierte de forma fluida como complemento de acompañamiento y circunferencia. «Todo alrededor» mantiene el valor intensivo de la revisión inglesa («all around»).
- source_word: אֲרָצוֹת
  english_pob_choice: lands
  chosen_spanish: tierras
  alternatives_spanish:
  - territorios
  - países
  lexicon: HALOT
  rationale: En este pasaje, el plural apunta a regiones o extensiones territoriales circundantes. «Tierras» preserva el sentido geográfico sin forzar un concepto político moderno como «países».
theological_decisions:
- issue: Tratamiento del nombre divino en el título compuesto אֲדֹנָי יְהֹוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: El texto hebreo emplea el Tetragrama en combinación con אֲדֹנָי. Conforme al criterio del proyecto, se traduce YHWH como «Yahvé» en el texto principal. En español, «Señor Yahvé» preserva el compuesto sin ocultar el nombre divino ni crear una repetición torpe.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהֹוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa reciente añadió «all» en «all around her» para reflejar mejor el hebreo וּסְבִיבוֹתֶיהָ. En español se integró esa intensificación con «todo alrededor de ella», manteniendo la referencia espacial completa sin sobreinterpretar el plural.
  spanish_consistency_notes:
  - Se usó «Yahvé» en lugar de «SEÑOR» por consistencia con el estándar del proyecto para יְהֹוִה.
  - «Naciones» se mantuvo para גוים por coherencia con el registro profético y el uso previo del POB en inglés.
  - «Tierras» conserva el plural territorial de אֲרָצוֹת y evita un giro político más fuerte que el hebreo no exige.
