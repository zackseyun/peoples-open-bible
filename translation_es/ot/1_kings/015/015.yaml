translation:
  language: es
  text: Y llevó a la casa de Yahvé las cosas consagradas de su padre y sus propias cosas consagradas[a], plata, oro y utensilios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "las cosas que su padre había dedicado, y las cosas que él mismo había dedicado".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  english_pob_choice: he brought
  chosen_spanish: llevó
  alternatives_spanish:
  - trajo
  - llevó dentro
  lexicon: HALOT
  rationale: El hebreo en causativo expresa hacer entrar o llevar algo a un lugar. En español, 'llevó a la casa de Yahvé' conserva el movimiento hacia el destino sin sonar forzado; 'trajo' también sería posible, pero 'llevó' encaja mejor con el énfasis direccional del contexto.
- source_word: קָדְשֵׁי אָבִיו
  english_pob_choice: the holy things of his father
  chosen_spanish: las cosas santas de su padre
  alternatives_spanish:
  - los objetos consagrados de su padre
  - las ofrendas dedicadas de su padre
  lexicon: HALOT
  rationale: El plural constructo קדשׁ aquí se refiere a bienes apartados para uso sagrado, no a santidad abstracta. 'Cosas santas' mantiene la forma amplia y transparente del POB inglés y evita especificar más de lo que el hebreo exige.
- source_word: וְקָדְשׁוֹ
  english_pob_choice: and his own holy things
  chosen_spanish: y sus propias cosas santas
  alternatives_spanish:
  - y sus propios bienes consagrados
  - y lo que él mismo había dedicado
  lexicon: HALOT
  rationale: La forma con sufijo singular funciona colectivamente. 'Sus propias cosas santas' preserva el paralelismo con la frase anterior y mantiene abierta la posibilidad de que se trate de cosas dedicadas por él mismo.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahveh
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea literal 'casa' en lugar de 'templo', porque el original no usa un término técnico distinto. Se adopta 'Yahvé' conforme al criterio del proyecto para el nombre divino.
- source_word: כֶּסֶף וְזָהָב וְכֵלִים
  english_pob_choice: silver and gold and vessels
  chosen_spanish: plata, oro y utensilios
  alternatives_spanish:
  - plata, oro y vasos
  - plata, oro y objetos
  lexicon: HALOT
  rationale: '''Vessels'' en contexto cultual puede abarcar utensilios o recipientes. ''Utensilios'' comunica bien la amplitud funcional en español sin estrechar innecesariamente el término a ''vasos''.'
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se sigue el estándar del proyecto para el Tetragrama: ''Yahvé''. Aunque la forma inglesa del POB usa ''Yahweh'', en español ''Yahvé'' es la forma establecida y más natural para la misma decisión textual, manteniendo el nombre propio divino visible.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Spanish project default Yahvé'
- issue: Sentido de קדשׁ como bienes apartados para uso sagrado
  english_pob_reading: the holy things ... his own holy things
  chosen_spanish_reading: las cosas santas ... sus propias cosas santas
  alternative_spanish_readings:
  - las cosas consagradas ... sus propias cosas consagradas
  - las ofrendas dedicadas ... lo que él mismo había dedicado
  rationale: No se traduce como mera 'santidad' moral; el contexto es cultual y patrimonial. 'Cosas santas' conserva la ambigüedad útil del POB y permite que el lector perciba que son objetos/bienes apartados para Dios.
  doctrine_reference: HALOT; uso cultual de קדשׁ en contexto de dedicación
translation_notes:
  revision_awareness: La redacción inglesa revisada eliminó dos puntos para que la lista 'silver and gold and vessels' quede en aposición a las cosas santas. La versión española sigue esa misma decisión con una coma y enumeración final, manteniendo la relación appositiva sin introducir pausa interpretativa adicional.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme al estándar español del proyecto.
  - Se conserva 'cosas santas' para קדשׁ, evitando sustituirlo por una terminología eclesiástica más interpretativa.
  - '''Utensilios'' traduce de manera amplia כלים en contexto del templo y evita restringir el referente a recipientes únicamente.'
  - 'La puntuación reproduce la lectura appositiva del texto auditado: la lista final especifica las cosas santas, no introduce una sección separada.'
