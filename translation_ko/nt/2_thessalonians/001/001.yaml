id: 2TH.1.1
reference: 2 Thessalonians 1:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Παῦλος καὶ Σιλουανὸς καὶ Τιμόθεος τῇ ἐκκλησίᾳ Θεσσαλονικέων ἐν θεῷ πατρὶ ἡμῶν καὶ κυρίῳ Ἰησοῦ Χριστῷ·
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/001/001.yaml
  text: 'Paul and Silvanus and Timothy[b][a], to the church of the Thessalonians in God our Father and the Lord Jesus Messiah:'
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός can be rendered 'Messiah' or, more traditionally, 'Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'the Lord Jesus the Messiah'.
    reason: previous_rendering
translation:
  language: ko
  text: '바울과 실루아노와 디모데가, 우리 아버지 하나님과 주 예수 메시아[a] 안에 있는 데살로니가인들의 회중[b]에게 편지합니다:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「예수 그리스도」. 본 번역은 칭호 Χριστός를 「메시아」로 옮기는 원칙을 따른다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「교회」. 헬라어 ἐκκλησία는 「모인 무리」를 가리키며, 후대의 제도적 함의를 약화시키기 위해 「회중」으로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκκλησίᾳ
  english_pob_choice: church
  chosen_korean: 회중
  alternatives_korean:
  - 교회
  - 모임
  lexicon: BDAG
  rationale: KOREAN_PIPELINE 글로서리에 따라 ἐκκλησία는 「회중」을 우선한다. 바울이 가리키는 데살로니가 신자들의 모임을 후대의 제도적 「교회」 함의 없이 옮기기 위함이다.
- source_word: Θεσσαλονικέων
  english_pob_choice: of the Thessalonians
  chosen_korean: 데살로니가인들의
  alternatives_korean:
  - 데살로니가에 있는
  lexicon: BDAG
  rationale: 헬라어 복수 속격은 사람을 가리키므로 지명 처소격으로 옮기지 않고 「데살로니가인들의」로 사람-중심 표현을 보존한다.
- source_word: ἐν θεῷ πατρὶ ἡμῶν καὶ κυρίῳ Ἰησοῦ Χριστῷ
  english_pob_choice: in God our Father and the Lord Jesus Messiah
  chosen_korean: 우리 아버지 하나님과 주 예수 메시아 안에 있는
  alternatives_korean:
  - 우리 아버지 하나님과 주 예수 메시아 안의
  - 우리 아버지 하나님과 주 예수 메시아께 속한
  lexicon: BDAG
  rationale: ἐν의 영역·연합의 의미를 보존하여 「~안에 있는」으로 옮긴다. 바울의 「~안에」 정형 표현을 해석적으로 풀어버리지 않는다.
- source_word: Χριστῷ
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 본 번역의 원칙에 따라 칭호 Χριστός는 「메시아」로 옮긴다. 데살로니가 인사 정식에서도 칭호의 무게가 살아 있다.
- source_word: κυρίῳ
  english_pob_choice: Lord
  chosen_korean: 주
  alternatives_korean:
  - 주님
  - 주인
  lexicon: BDAG
  rationale: 신약의 기독론적 칭호로서 굳어진 「주(主)」를 유지한다.
theological_decisions:
- issue: 데살로니가 인사에서 Χριστῷ를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 한국 전통의 「그리스도」는 음역으로 굳어져 칭호성을 가린다. 본 번역의 일관성과 DOCTRINE.md 원칙에 따라 「메시아」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; Contested terms table for Χριστός'
- issue: ἐκκλησία의 한국어 등가어 선택
  chosen_reading: 회중
  alternative_readings:
  - 교회
  rationale: KOREAN_PIPELINE 글로서리의 기본 원칙에 따라 모인 신자들의 무리를 가리킬 때 「회중」을 우선 사용한다. 「교회」는 후대 제도적 함의가 강하여 1세기 바울의 모임 어휘에 과도하게 무겁다.
  doctrine_reference: 'KOREAN_PIPELINE.md Glossary: ἐκκλησία → 회중 / 교회'
