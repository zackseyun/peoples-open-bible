review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general el sentido del hebreo: el mandato de hacer sonar el shofar en el séptimo mes, el día diez del mes, específicamente en el Día de la Expiación, por toda la tierra. Sin embargo, introduce algunos desajustes de persona y de matiz: «Entonces harán sonar» cambia indebidamente el singular inicial וְהַעֲבַרְתָּ a plural, y «de toque» para תְּרוּעָה suena poco natural y menos preciso que una expresión como «con toque resonante» o «con un toque fuerte».'
  spanish_quality_summary: La redacción es comprensible, pero tiene problemas de naturalidad y consistencia. «Cuerno de toque» es extraño en español eclesial general; «cuerno[a] con toque resonante» o una formulación equivalente mejora la legibilidad. «Su tierra» para אַרְצְכֶם es ambiguo en español moderno, porque puede leerse como tercera persona; «la tierra de ustedes» o «toda su tierra» en contexto de segunda persona plural debe manejarse con cuidado. También falta la nota correspondiente al plural de «Día de la Expiación», que el rastro inglés sí preserva.
  glossary_alignment: No hay términos del glosario mayor en conflicto directo. «Expiación» para הַכִּפֻּרִים es adecuado en español. La decisión de usar «cuerno» para שׁוֹפָר es defendible si se conserva la nota léxica. Pero deben preservarse mejor la fuerza gramatical del hebreo y las notas auditadas del POB, especialmente la del plural literal de «atonements».
  issues:
  - severity: high
    issue: Cambio de singular a plural en la primera cláusula
    rationale: וְהַעֲבַרְתָּ es 2ms, no plural. «Harán sonar» pierde la distinción presente en el hebreo y en el POB inglés («you shall sound» singular por contexto inicial). Debe reflejarse como «harás sonar».
  - severity: medium
    issue: Falta la nota sobre el plural literal de הַכִּפֻּרִים
    rationale: El POB inglés conserva en nota que «Day of Atonement» es literalmente «day of atonements». El borrador español menciona esa posibilidad en decisiones, pero no la incluye como nota anclada en el texto.
  - severity: medium
    issue: «de toque» para תְּרוּעָה es poco natural
    rationale: Aunque intenta reflejar el valor de señal sonora, «cuerno de toque» no suena idiomático en español. Una solución más clara es «un cuerno[a] con toque resonante[b]» o similar, manteniendo la nota léxica.
  - severity: medium
    issue: «su tierra» puede sonar a tercera persona
    rationale: אַרְצְכֶם es ‘su tierra’ de segunda persona plural, pero en español moderno esa forma es ambigua. «por toda la tierra de ustedes» es más claro, aunque algo más pesado; aquí conviene priorizar claridad.
  revised_spanish_text: Entonces harás sonar un cuerno[a] con toque resonante[b] en el mes séptimo, el día diez del mes. En el Día de la Expiación[c] harán sonar el cuerno por toda la tierra de ustedes.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «shofar»; es decir, un cuerno-trompeta, tradicionalmente entendido a menudo como cuerno de carnero.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo combina «shofar» con «teruá», refiriéndose al sonido fuerte o señal sonora producida por el instrumento.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «Día de la Expiación» es literalmente «día de expiaciones» (plural).
    reason: lexical_alternative
  revision_rationale: Se corrige la persona verbal inicial para reflejar el singular hebreo, se mejora la naturalidad de la expresión para תְּרוּעָה, se aclara el posesivo final en español y se restaura la nota auditada sobre el plural literal de הַכִּפֻּרִים.
