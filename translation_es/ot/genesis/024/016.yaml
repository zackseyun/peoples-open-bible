translation:
  language: es
  text: La joven era muy hermosa de aspecto, virgen; ningún hombre la había conocido[a]. Ella descendió a la fuente[b], llenó su cántaro y subió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ningún hombre había tenido relaciones sexuales con ella». El hebreo dice literalmente: «ningún hombre la había conocido».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «a la fuente». Algunas traducciones ponen «al pozo», pero aquí el término hebreo es más propiamente «fuente» o «manantial».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעֲרָה
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la muchacha joven
  - la doncella
  lexicon: HALOT
  rationale: נַעֲרָה designa a una mujer joven, frecuentemente en edad de casarse. En español, «la joven» comunica esa idea con naturalidad y evita el registro más arcaico de «doncella» o el matiz potencialmente infantil de «muchacha».
- source_word: טֹבַת מַרְאֶה מְאֹד
  english_pob_choice: very beautiful in appearance
  chosen_spanish: muy hermosa de apariencia
  alternatives_spanish:
  - muy bella de apariencia
  - muy atractiva en apariencia
  - muy bonita de apariencia
  lexicon: HALOT
  rationale: La expresión hebrea valora la hermosura visible y la intensifica con מְאֹד. «Muy hermosa de apariencia» preserva la referencia explícita a la apariencia sin volverla torpe en español.
- source_word: בְּתוּלָה
  english_pob_choice: a virgin
  chosen_spanish: virgen
  alternatives_spanish:
  - doncella
  lexicon: HALOT
  rationale: בְּתוּלָה normalmente expresa virginidad en este contexto narrativo. «Virgen» es la correspondencia más directa y clara en español.
- source_word: וְאִישׁ לֹא יְדָעָהּ
  english_pob_choice: no man had known her
  chosen_spanish: ningún hombre la había conocido
  alternatives_spanish:
  - ningún hombre había tenido relaciones sexuales con ella
  - ningún hombre había sido íntimo con ella
  lexicon: HALOT
  rationale: Se conserva el eufemismo hebreo de יָדַע («conocer») para relaciones sexuales. En español, «la había conocido» mantiene la forma literaria y la reserva del original, mientras «virgen» aclara el sentido.
- source_word: הָעַיְנָה
  english_pob_choice: to the spring
  chosen_spanish: a la fuente
  alternatives_spanish:
  - al manantial
  - al pozo
  lexicon: HALOT
  rationale: עַיִן denota una fuente/manantial de agua. «Fuente» es natural en español y evita el término más específico «pozo», que correspondería mejor a בְּאֵר.
- source_word: כַדָּהּ
  english_pob_choice: her jar
  chosen_spanish: su cántaro
  alternatives_spanish:
  - su jarra
  - su vasija
  - su jarro
  lexicon: HALOT
  rationale: כַּד es un recipiente para sacar y llevar agua. «Cántaro» es un equivalente español muy adecuado para el contexto y comunica mejor la función que un «jarro» genérico.
- source_word: וַתָּעַל
  english_pob_choice: and came up
  chosen_spanish: y subió
  alternatives_spanish:
  - y volvió a subir
  - y ascendió
  lexicon: HALOT
  rationale: El hebreo contrapone el descenso a la fuente con el ascenso posterior. «Subió» conserva ese contraste espacial de manera breve y natural.
theological_decisions:
- issue: Eufemismo hebreo para relaciones sexuales en וְאִישׁ לֹא יְדָעָהּ
  english_pob_reading: The Hebrew says literally, 'no man had known her.'
  chosen_spanish_reading: ningún hombre la había conocido
  alternative_spanish_readings:
  - ningún hombre había tenido relaciones sexuales con ella
  - ningún hombre había estado con ella
  rationale: Se mantiene la literalidad idiomática del hebreo, evitando una explicación explícita dentro del texto principal. La frase «virgen» ya fija el sentido narrativo sin borrar la tensión estilística del original.
  doctrine_reference: Decoro bíblico y preservación del eufemismo semítico; cf. uso narrativo de יָדַע en el AT.
translation_notes:
  revision_awareness: La versión inglesa auditada está estable y sin cambios recientes; se siguió su decisión de conservar el eufemismo de «conocer» y de distinguir «spring» de «well», pero se ajustó el español para que suene natural y a la vez mantenga la misma precisión semántica.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió «fuente» para הָעַיְנָה conforme al valor léxico de עַיִן, evitando homogeneizarlo con «pozo».
  - «Cántaro» comunica mejor el recipiente de agua que «jarra» en este contexto narrativo.
  - Se mantuvo el eufemismo «la había conocido» para no borrar la reserva léxica del hebreo.
