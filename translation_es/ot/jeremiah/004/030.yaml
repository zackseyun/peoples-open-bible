translation:
  language: es
  text: 'Y tú,[a] devastada, ¿qué harás? Aunque te vistas de escarlata, aunque te adornes con adornos de oro, aunque te agrandes los ojos con pintura[b], en vano te embelleces. Tus amantes te desprecian; buscan tu vida.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «despojada» o «destruida». El hebreo se dirige a una figura femenina singular, probablemente Jerusalén/Sion personificada.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «aunque te rasgues los ojos con pukh». «Pukh» se refiere a un cosmético oscuro para los ojos, a menudo traducido «kohl» o «antimonio».'
    reason: cultural_note
lexical_decisions:
- source_word: שָׁדוּד
  english_pob_choice: devastated one
  chosen_spanish: devastada
  alternatives_spanish:
  - despojada
  - destruida
  - oh devastada
  lexicon: HALOT
  rationale: El participio/adjetivo expresa un estado de ruina. «Devastada» conserva la idea de destrucción y funciona naturalmente en español para el apostrofe profético, sin precisar en exceso si el matiz es saqueo o ruina total.
- source_word: מַה תַּעֲשִׂי
  english_pob_choice: what will you do?
  chosen_spanish: ¿qué harás?
  alternatives_spanish:
  - ¿qué vas a hacer?
  - ¿qué puedes hacer?
  lexicon: HALOT
  rationale: El imperfecto 2fs en pregunta retórica se rinde bien como futuro en español. «¿Qué harás?» mantiene el tono de desafío profético.
- source_word: שָׁנִי
  english_pob_choice: scarlet
  chosen_spanish: escarlata
  alternatives_spanish:
  - carmesí
  lexicon: HALOT
  rationale: Designa una tela o color teñido. «Escarlata» es la equivalencia clara y estándar en español bíblico contemporáneo.
- source_word: תַעְדִּי עֲדִי זָהָב
  english_pob_choice: you adorn yourself with ornaments of gold
  chosen_spanish: te adornes con aderezos de oro
  alternatives_spanish:
  - te adornes con ornamentos de oro
  - te pongas joyas de oro
  lexicon: HALOT
  rationale: Se conserva el valor reflexivo de עדה y el sustantivo עֲדִי como adorno/ornamento. «Aderezos» es un término amplio y comprensible; evita restringir demasiado a joyería si el hebreo incluye adorno ornamental en general.
- source_word: תִקְרְעִי בַפּוּךְ עֵינַיִךְ
  english_pob_choice: you enlarge your eyes with paint
  chosen_spanish: te agrandes los ojos con pintura
  alternatives_spanish:
  - te pintes los ojos con kohl
  - te remarques los ojos con antimonio
  lexicon: HALOT
  rationale: La expresión es idiomática y cosmetológica. «Agrandes los ojos» comunica la intensificación visual sin literalizar de modo confuso «rasgar». «Pintura» corresponde a פּוּךְ en un registro accesible; el detalle cultural se preserva en nota.
- source_word: פּוּךְ
  english_pob_choice: paint
  chosen_spanish: pintura
  alternatives_spanish:
  - kohl
  - antimonio
  - pintura de ojos
  lexicon: HALOT
  rationale: פּוּךְ es un cosmético para los ojos. «Pintura» mantiene claridad; «kohl» queda como alternativa cultural específica.
- source_word: לַשָּׁוְא
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - para nada
  - sin propósito
  lexicon: HALOT
  rationale: Idiomático y exacto en español para indicar la inutilidad de la autoembellecimiento.
- source_word: תִּתְיַפִּי
  english_pob_choice: you beautify yourself
  chosen_spanish: te embelleces
  alternatives_spanish:
  - te haces hermosa
  - te haces más bella
  lexicon: HALOT
  rationale: El hitpael tiene valor reflexivo. «Te embelleces» conserva esa autorreferencia y suena natural en español.
- source_word: מָאֲסוּ בָךְ עֹגְבִים
  english_pob_choice: Your lovers despise you
  chosen_spanish: Tus amantes te desprecian
  alternatives_spanish:
  - Tus enamorados te rechazan
  - Tus amantes te repudian
  - Tus paramours te desprecian
  lexicon: HALOT
  rationale: עֹגְבִים designa amantes/pretendientes en sentido peyorativo dentro de la metáfora profética. «Amantes» es la forma más idiomática; «desprecian» reproduce bien מָאֲסוּ.
- source_word: נַפְשֵׁךְ יְבַקֵּשׁוּ
  english_pob_choice: they seek your life
  chosen_spanish: buscan tu vida
  alternatives_spanish:
  - buscan tu alma
  - buscan quitarte la vida
  lexicon: HALOT
  rationale: נפש con בקש expresa buscar la vida de alguien, es decir, intentar tomarla. «Buscan tu vida» conserva el hebraísmo y es claro en español.
theological_decisions:
- issue: Personificación profética de una figura femenina singular (Jerusalén/Sion/Judá)
  english_pob_reading: Retain feminine singular address implicitly in English without adding interpretive labels into the main text
  chosen_spanish_reading: Mantener el apostrofe en segunda persona femenina sin introducir un identificador explícito en el texto principal
  alternative_spanish_readings:
  - Oh Jerusalén devastada, ¿qué harás?
  - Tú, hija de Sion, ¿qué harás?
  rationale: El hebreo usa formas femeninas singulares y personifica a la destinataria. El español puede conservar ese efecto con «Y tú, devastada», sin añadir una identificación que el verso no expresa de manera directa.
  doctrine_reference: 'Principios de traducción POB: fidelidad al texto base, evitar sobreinterpretación en el cuerpo principal'
- issue: 'Tensión léxica de עֹגְבִים: amantes/pretendientes con carga peyorativa'
  english_pob_reading: Your lovers despise you
  chosen_spanish_reading: Tus amantes te desprecian
  alternative_spanish_readings:
  - Tus amantes te rechazan
  - Tus paramours te desprecian
  - Tus amantes te repudian
  rationale: La metáfora profética implica relaciones ilícitas o aduladoras; «amantes» conserva el vínculo figurado y «desprecian» traduce מָאֲסוּ con suficiente fuerza. No se neutraliza el matiz moral.
  doctrine_reference: Principios de transparencia semántica y preservación de metáforas proféticas
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el expediente inglés. La redacción española sigue de cerca la lectura aprobada del POB y mantiene las alternativas relevantes en nota cuando el hebreo ofrece una gama semántica legítima.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene la segunda persona femenina singular a lo largo del verso para reflejar el hebreo.
  - «Amantes» se conserva como término metafórico profético y no se suaviza a un lenguaje más general.
  - La puntuación reproduce el paralelismo retórico con series de «aunque».
