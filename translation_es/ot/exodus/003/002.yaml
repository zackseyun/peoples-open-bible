translation:
  language: es
  text: Entonces se le apareció el ángel[a] de Yahvé en una llama de fuego, de en medio de la zarza. Miró, y he aquí que la zarza ardía con fuego, pero la zarza no era consumida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mensajero de Yahvé». La palabra hebrea puede significar tanto «ángel» como «mensajero».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  english_pob_choice: appeared
  chosen_spanish: se le apareció
  alternatives_spanish:
  - se hizo visible
  - fue visto
  lexicon: HALOT
  rationale: El niphal de ראה aquí expresa una aparición, no solo una percepción; en español, 'se le apareció' conserva el valor intransitivo y el marco de teofanía con naturalidad.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: '''Ángel'' reproduce la opción del POB en inglés y es la lectura más natural en el contexto narrativo; ''mensajero'' queda como alternativa léxica válida, sin resolver por adelantado la complejidad teológica del episodio.'
- source_word: יְהֹוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto en español, el Tetragrámaton se translitera como 'Yahvé' en el texto principal, no se sustituye por una máscara reverencial.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: se le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El dativo pronominal se expresa de forma idiomática en español con 'se le', manteniendo la referencia a Moisés sin forzar el orden de palabras.
- source_word: בְּלַבַּת אֵשׁ
  english_pob_choice: in a flame of fire
  chosen_spanish: en una llama de fuego
  alternatives_spanish:
  - en la llama de fuego
  - en un fuego llameante
  lexicon: HALOT
  rationale: '''Llama de fuego'' conserva la imagen hebrea y la construcción compacta del original; ''llama'' evita sobretraducción y mantiene el efecto visual del hebreo.'
- source_word: מִתּוֹךְ הַסְּנֶה
  english_pob_choice: from the midst of the bush
  chosen_spanish: desde en medio de la zarza
  alternatives_spanish:
  - desde el centro de la zarza
  - desde dentro de la zarza
  lexicon: HALOT
  rationale: '''Desde en medio de'' refleja literalmente מִתּוֹךְ y resulta natural en español bíblico contemporáneo; ''zarza'' es el equivalente estándar de סְּנֶה en este pasaje.'
- source_word: וַיַּרְא
  english_pob_choice: He looked
  chosen_spanish: Él miró
  alternatives_spanish:
  - vio
  - observó
  lexicon: HALOT
  rationale: Aunque la forma básica es 'y vio', la secuencia narrativa pide en español un gesto de atención previo; 'miró' preserva el movimiento de dirigir la vista antes de la constatación siguiente.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí que
  alternatives_spanish:
  - y he aquí
  - y mira
  lexicon: HALOT
  rationale: '''He aquí que'' conserva el marcador de sorpresa y focalización del hebreo sin perder inteligibilidad en un registro bíblico moderno.'
- source_word: בֹּעֵר בָּאֵשׁ
  english_pob_choice: was burning with fire
  chosen_spanish: ardía en fuego
  alternatives_spanish:
  - estaba ardiendo en fuego
  - ardía con fuego
  lexicon: HALOT
  rationale: El participio expresa acción continua; 'ardía' mantiene esa duratividad, y 'en fuego' preserva la referencia explícita al elemento ígneo del original.
- source_word: אֵינֶנּוּ אֻכָּל
  english_pob_choice: was not consumed
  chosen_spanish: no se consumía
  alternatives_spanish:
  - no era consumida
  - no se quemaba
  lexicon: HALOT
  rationale: La pasiva de אכל se traduce mejor con 'consumirse' en español, que conserva el paradoja central del signo y su matiz de destrucción total evitada.
theological_decisions:
- issue: Tetragrámaton en el texto español
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El auditorio español del POB recibe el nombre divino de manera transparente; 'Yahvé' preserva la identidad del nombre revelado sin la convención litúrgica de ocultarlo detrás de una mayúscula reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: מַלְאַךְ en una teofanía
  english_pob_reading: angel
  chosen_spanish_reading: ángel
  alternative_spanish_readings:
  - mensajero
  rationale: En una escena de manifestación divina, 'ángel' es la equivalencia más estable y reconocible; no se reduce el alcance del hebreo, pues se mantiene nota de alternativa léxica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: 'Coincido con el pasaje fuente y el audit trail inglés en lo esencial: no hubo revisiones aplicadas en la última pasada, y la versión española sigue la misma lectura teofánica y léxica, con la única adaptación doctrinal del nombre divino al estándar español del proyecto (Yahvé en vez de la máscara ''el SEÑOR'').'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar español del proyecto, en contraste con la convención inglesa de 'the LORD'.
  - Se conserva la distinción entre 'ángel' y la alternativa 'mensajero' mediante nota, porque el hebreo מַלְאַךְ admite ambos sentidos.
  - Se emplea 'zarza' para סְּנֶה, el equivalente tradicional y plenamente inteligible en español.
  - La secuencia verbal 'se le apareció' / 'miró' / 'ardía' / 'no se consumía' reproduce el progreso narrativo del hebreo sin añadir explicaciones interpretativas.
