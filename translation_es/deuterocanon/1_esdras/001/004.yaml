translation:
  language: es
  text: No tendréis que llevarla sobre vuestros hombros[a]. Ahora servid a Yahvé, vuestro Dios, y ministrad a su pueblo Israel, y preparaos conforme a las casas de vuestros padres y a vuestras tribus[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pronombre implícito se refiere al arca, entendida por el contexto inmediato y no repetida explícitamente en este versículo.
    reason: cross_reference
  - marker: b
    text: La expresión griega dice «tribus», pero el paralelo hebreo sugiere además una organización por casas paternas y divisiones o cursos; el texto principal conserva aquí el griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐκ ἔσται ὑμῖν
  english_pob_choice: You will not need to
  chosen_spanish: No tendréis que
  alternatives_spanish:
  - No os será necesario
  - No os corresponderá
  lexicon: BDAG
  rationale: La construcción expresa ausencia de obligación o necesidad más que simple futuridad. En español, «No tendréis que» comunica con naturalidad esa fuerza sin endurecer el sentido.
- source_word: ἆραι
  english_pob_choice: carry
  chosen_spanish: llevar
  alternatives_spanish:
  - cargar
  - portar
  lexicon: BDAG
  rationale: En este contexto cultual se trata de transportar físicamente el objeto sobre los hombros. «Llevar» es natural en español y conserva el acto concreto.
- source_word: ἐπʼ ὤμων
  english_pob_choice: on your shoulders
  chosen_spanish: sobre vuestros hombros
  alternatives_spanish:
  - en vuestros hombros
  lexicon: BDAG
  rationale: Se mantiene la imagen corporal directa. «Sobre vuestros hombros» suena idiomático y fiel al griego.
- source_word: λατρεύετε
  english_pob_choice: serve
  chosen_spanish: servid
  alternatives_spanish:
  - adorad
  - prestad servicio sagrado
  lexicon: BDAG
  rationale: El verbo tiene peso cultual y de servicio a Dios. «Servid» preserva ese valor sin reducirlo únicamente a adoración ni volverlo técnico en exceso.
- source_word: κυρίῳ θεῷ ὑμῶν
  english_pob_choice: the Lord your God
  chosen_spanish: a Yahvé, vuestro Dios
  alternatives_spanish:
  - al Señor, vuestro Dios
  lexicon: BDAG + proyecto POB
  rationale: 'Se sigue la convención del proyecto para el nombre divino: Yahvé. «Vuestro Dios» conserva el carácter de pacto del sintagma.'
- source_word: θεραπεύετε
  english_pob_choice: minister to
  chosen_spanish: ministrad
  alternatives_spanish:
  - servid
  - atended
  lexicon: BDAG
  rationale: Se mantiene la distinción con λατρεύετε. «Ministrad» refleja el servicio dirigido al pueblo y evita fusionarlo con el servicio cultual dado a Dios.
- source_word: τὸ ἔθνος αὐτοῦ Ἰσραήλ
  english_pob_choice: his people Israel
  chosen_spanish: a su pueblo Israel
  alternatives_spanish:
  - a la nación de Israel
  - a Israel, su pueblo
  lexicon: BDAG
  rationale: Aunque ἔθνος puede ser «nación», en este contexto conviene la relación pactual. «Su pueblo Israel» reproduce con naturalidad el sentido relacional que el inglés POB ya había destacado.
- source_word: ἑτοιμάσατε
  english_pob_choice: prepare yourselves
  chosen_spanish: disponéos
  alternatives_spanish:
  - preparaos
  - preparaos vosotros mismos
  lexicon: BDAG
  rationale: El imperativo requiere una acción reflexiva implícita. «Disponéos» expresa preparación/puesta en orden para el servicio con dignidad literaria; la idea reflexiva queda clara por el verbo pronominal.
- source_word: κατὰ τὰς πατριὰς
  english_pob_choice: according to your fathers' houses
  chosen_spanish: conforme a las casas de vuestros padres
  alternatives_spanish:
  - según las casas de vuestros padres
  - de acuerdo con las casas de vuestros padres
  lexicon: BDAG
  rationale: πατριά corresponde a linaje o casa paterna. «Casas de vuestros padres» conserva el paralelismo semítico y es más transparente que una paráfrasis moderna.
- source_word: καὶ τὰς φυλὰς ὑμῶν
  english_pob_choice: and your tribes
  chosen_spanish: y a vuestras tribus
  alternatives_spanish:
  - y a vuestras divisiones
  - y a vuestros clanes
  lexicon: BDAG + MT paralelo
  rationale: Aunque el paralelo hebreo sugiere una organización por divisiones/cursos, el griego dice literalmente «tribus». Aquí se mantiene la equivalencia directa, reservando cualquier matiz organizacional para nota.
theological_decisions:
- issue: Distinguir el servicio debido a Dios del servicio a Israel
  english_pob_reading: 'Different English verbs: ''serve'' for λατρεύετε and ''minister to'' for θεραπεύετε'
  chosen_spanish_reading: «servid» para Dios y «ministrad» para el pueblo
  alternative_spanish_readings:
  - usar «servid» en ambos casos
  - usar «adorad» para Dios y «servid» para el pueblo
  rationale: El griego distingue dos verbos y dos direcciones de servicio. Mantener esa diferencia evita borrar la contraposición entre servicio cultual a Dios y asistencia/ministro al pueblo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Nombre divino en un contexto de κύριος θεός
  english_pob_reading: the Lord your God
  chosen_spanish_reading: Yahvé, vuestro Dios
  alternative_spanish_readings:
  - el Señor, vuestro Dios
  rationale: La política del proyecto exige no ocultar el nombre divino cuando la fuente lo sustenta. Aunque κύριος traduce el hebreo del nombre, el contexto de pacto justifica «Yahvé» en el texto principal.
  doctrine_reference: Project-level Spanish terminology defaults
- issue: 'φυλαί: fidelidad al griego frente al matiz organizativo del paralelo hebreo'
  english_pob_reading: and your tribes
  chosen_spanish_reading: y a vuestras tribus
  alternative_spanish_readings:
  - y a vuestras divisiones
  - y a vuestros cursos
  rationale: El paralelo hebreo aporta un posible matiz organizacional, pero el griego base dice φυλαί. En la línea principal se preserva el término directo y se deja el matiz paralelo para nota si se requiere.
  doctrine_reference: PHILOSOPHY.md section on WLC MT parallels for 1 Esdras
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del expediente inglés, que volvió a «tribes» desde una formulación más interpretativa. Por ello, la línea principal en español retiene «tribus» en correspondencia directa con φυλαί, sin perder el complemento semítico de «casas de vuestros padres».
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme a la norma del proyecto para יהוה.
  - Se mantiene la distinción verbal entre «servid» (λατρεύετε) y «ministrad» (θεραπεύετε).
  - «Casas de vuestros padres» conserva el paralelismo semítico de πατριά.
  - La nota sobre «tribus» preserva el posible matiz del paralelo hebreo sin desplazar el griego base.
