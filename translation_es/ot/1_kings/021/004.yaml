    issue: סַר fue traducido como 'sordo'
    rationale: El hebreo describe un estado anímico ceñudo/retraído ('sullen'), no una condición auditiva. En español bíblico actual, 'sordo' no comunica ese sentido de manera clara y resulta engañoso.
  - severity: medium
    issue: La nota [a] intenta defender 'sordo' como uso idiomático
    rationale: 'Aunque la nota reconoce alternativas mejores, no corrige la falta principal: el texto base debe ser claro y fiel por sí mismo. La nota no salva una elección léxica incorrecta en el cuerpo del versículo.'
  - severity: medium
    issue: '''volvió el rostro'' queda menos claro que el matiz auditado ''turned his face away'''
    rationale: El hebreo expresa apartamiento petulante. 'Apartó el rostro' o 'volvió el rostro hacia otro lado' comunica mejor el gesto en español moderno sin añadir demasiado.
  - severity: low
