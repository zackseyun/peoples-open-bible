base_translation:
  language: en
  yaml_path: translation/ot/isaiah/001/002.yaml
  text: 'Hear[a], O heavens, and give ear, O earth, for Yahweh has spoken: “I have reared children and brought them up[b], but they have rebelled against me.”'
  footnotes:
  - marker: a
    text: Or “sons.” The Hebrew is masculine plural, but here it refers corporately to the people as the LORD’s offspring.
    reason: lexical_alternative
  - marker: b
    text: Or “I reared children and brought them up.” The second verb can also be rendered more generally as “lifted up” or “made great”; here it is translated to preserve the sense of honor or elevation in addition to upbringing.
    reason: lexical_alternative
