translation:
  language: es
  text: El asunto pareció bien[a] a los ojos de Faraón y a los ojos de todos sus siervos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue agradable».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּיטַב
  english_pob_choice: seemed good
  chosen_spanish: fue agradable
  alternatives_spanish:
  - pareció bien
  - fue bueno
  - les agradó
  lexicon: HALOT
  rationale: El verbo יטב en esta construcción con בְּעֵינֵי expresa valoración favorable. En español, «fue agradable» comunica aceptación sin forzar una paráfrasis excesiva. «Pareció bien» también es posible, pero aquí «fue agradable» mantiene mejor el resultado evaluativo del hebreo.
- source_word: הַדָּבָר
  english_pob_choice: the matter
  chosen_spanish: la cosa
  alternatives_spanish:
  - el asunto
  - el asunto propuesto
  - la propuesta
  lexicon: HALOT
  rationale: דָּבָר tiene un rango amplio. El contexto inmediato presenta la palabra/cuestión expuesta por José, pero en español «la cosa» conserva esa amplitud de manera algo más literal que «la propuesta», sin introducir precisión interpretativa excesiva. «El asunto» es posible, pero suena más abstracto.
- source_word: בְּעֵינֵי
  english_pob_choice: in ... eyes
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - en la opinión de
  - ante
  lexicon: HALOT
  rationale: Se preserva el modismo hebreo de forma transparente en español con «a los ojos de», que es idiomático y mantiene la imagen original. «En la opinión de» explicita el sentido, pero pierde la metáfora.
- source_word: פַרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  lexicon: HALOT
  rationale: Transliteración estándar en español para el título/nombre real.
- source_word: כָּל עֲבָדָיו
  english_pob_choice: all his servants
  chosen_spanish: todos sus siervos
  alternatives_spanish:
  - todos sus servidores
  - todos sus funcionarios
  - todos sus esclavos
  lexicon: HALOT
  rationale: עֲבָדִים puede significar siervos, esclavos o servidores/oficiales según el contexto. En la corte de Faraón, el sentido funcional es el más apropiado. «Siervos» es más fiel y amplio que «funcionarios»; «esclavos» sería demasiado fuerte para el contexto cortesano.
translation_notes:
  revision_awareness: La versión inglesa más reciente osciló entre una traducción más idiomática («seemed good to») y una más literal («in the eyes of»). La redacción española conserva el modismo hebreo con una equivalencia natural, sin perder la evaluación favorable del verbo.
  spanish_consistency_notes:
  - Se mantiene «Faraón» como transliteración estándar.
  - Se evita «SEÑOR» u այլ masking conventions porque el pasaje no contiene el nombre divino.
  - Se usa «siervos» para עֲבָדָיו por ser el término más neutro y contextualmente adecuado en la corte de Faraón.
  - La frase «a los ojos de» preserva el paralelismo hebreo de manera comprensible en español.
