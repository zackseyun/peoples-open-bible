translation:
  language: es
  text: Pero cuando algunos dijeron que esto no debía hacerse[a], porque ni siquiera los gentiles entran, ni todos los sacerdotes, sino solamente el sumo sacerdote que está sobre todos, y este solo una vez al año, él de ninguna manera se dejó persuadir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «esto no es apropiado para hacerse». El griego enfatiza la conveniencia o idoneidad, no solo la simple posibilidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ καθήκειν γίνεσθαι τοῦτο
  english_pob_choice: this ought not to be done
  chosen_spanish: esto no debía hacerse
  alternatives_spanish:
  - no era apropiado hacer esto
  - esto no debía ocurrir
  lexicon: BDAG
  rationale: καθήκειν expresa conveniencia, pertinencia o lo que corresponde; con γίνεσθαι τοῦτο la objeción recae sobre la acción propuesta. 'Debía hacerse' mantiene la fuerza de impropiedad/prohibición sin volverlo más fuerte de lo que dice el griego.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: the Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  - los pueblos
  lexicon: BDAG
  rationale: En este contexto de acceso al templo, ἔθνη designa a los no judíos. 'Gentiles' conserva la referencia religiosa y es claro en español bíblico contemporáneo.
- source_word: εἰσιέναι
  english_pob_choice: enter
  chosen_spanish: entran
  alternatives_spanish:
  - entran allí
  - pueden entrar
  lexicon: BDAG
  rationale: El verbo indica ingreso físico al recinto. 'Entran' reproduce la acción sin añadir modalidad que no está explícita en el griego.
- source_word: πᾶσιν τοῖς ἱερεῦσιν
  english_pob_choice: all the priests
  chosen_spanish: todos los sacerdotes
  alternatives_spanish:
  - cada sacerdote
  - la totalidad de los sacerdotes
  lexicon: BDAG
  rationale: El contraste es entre acceso general del orden sacerdotal y la excepción del sumo sacerdote. 'Sacerdotes' es el equivalente natural en español para ἱερεῦς.
- source_word: μόνῳ τῷ προηγουμένῳ πάντων ἀρχιερεῖ
  english_pob_choice: only the high priest who is over all
  chosen_spanish: solamente el sumo sacerdote que está sobre todos
  alternatives_spanish:
  - solo el sumo sacerdote que está sobre todos
  - únicamente el sumo sacerdote que preside sobre todos
  lexicon: BDAG
  rationale: προηγουμένῳ πάντων indica el que está al frente o por encima de todos. 'Que está sobre todos' conserva la relación jerárquica de modo natural en español, y 'sumo sacerdote' es el término estándar para ἀρχιερεύς.
- source_word: κατ᾽ ἐνιαυτὸν ἅπαξ
  english_pob_choice: once a year
  chosen_spanish: una sola vez al año
  alternatives_spanish:
  - una vez al año
  - solo una vez cada año
  lexicon: BDAG
  rationale: '''Una sola vez al año'' reproduce con claridad la restricción temporal y deja oír la exclusividad de ἅπαξ.'
- source_word: οὐδαμῶς ἐπείθετο
  english_pob_choice: he would not be persuaded at all
  chosen_spanish: él de ninguna manera se dejó persuadir
  alternatives_spanish:
  - no se dejó persuadir en absoluto
  - de ningún modo fue persuadido
  lexicon: BDAG
  rationale: El griego expresa que no fue persuadido, con fuerte negación (οὐδαμῶς). 'Se dejó persuadir' mantiene el matiz pasivo/medio y evita convertirlo demasiado pronto en una negativa activa de voluntad.
theological_decisions:
- issue: Restricción de acceso al templo y lenguaje de jerarquía sacerdotal
  english_pob_reading: Render the argument as an appeal to cultic propriety and restricted entry, culminating in the high priest's annual access.
  chosen_spanish_reading: Presentar la objeción como una apelación a la conveniencia ritual y al acceso restringido al santuario, culminando en la entrada anual del sumo sacerdote.
  alternative_spanish_readings:
  - enfatizar solo la ilegalidad general
  - suavizar la jerarquía sacerdotal
  rationale: 'El versículo apoya la objeción en una cadena cultual concreta: ni los gentiles, ni todos los sacerdotes, sino solo el sumo sacerdote, y solo una vez al año. La traducción conserva esa estructura sin añadir explicación doctrinal posterior.'
  doctrine_reference: Preservar la tensión teológica y cultual del texto; primacía del original sobre la tradición de traducción.
translation_notes:
  revision_awareness: La versión inglesa revisó 'ought not to happen' por 'ought not to be done' y eliminó la modalización 'may enter' para reflejar más directamente καθήκειν γίνεσθαι τοῦτο y εἰσιέναι. Esta versión española sigue esa revisión con 'no debía hacerse' y 'entran'.
  spanish_consistency_notes:
  - Se usa 'gentiles' para ἔθνη en contexto del templo, no 'naciones'.
  - '''Sumo sacerdote'' se mantiene para ἀρχιερεύς como término cultual estable.'
  - '''Se dejó persuadir'' conserva el sentido pasivo de πείθω sin añadir una voluntad activa ajena al griego.'
  - La puntuación con guiones refleja la cadena explicativa del griego y la del inglés auditado.
