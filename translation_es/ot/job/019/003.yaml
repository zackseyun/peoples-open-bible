translation:
  language: es
  text: Estas diez veces me han humillado; no se avergüenzan de hacerme injusticia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacerme mal», «tratarme con dureza» o, más literalmente, «tratarme como a un extraño». El verbo hebreo es difícil y puede llevar la idea de actuar hacia Job como si fuera ajeno o no reconocido.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה עֶשֶׂר פְּעָמִים
  english_pob_choice: These ten times
  chosen_spanish: Estas diez veces
  alternatives_spanish:
  - Diez veces
  - Estas diez ocasiones
  lexicon: HALOT
  rationale: La secuencia hebrea funciona de modo idiomático para contar repeticiones. «Estas diez veces» conserva el valor retórico y la estructura del original sin volverlo artificial en español.
- source_word: תַּכְלִימוּנִי
  english_pob_choice: you have humiliated me
  chosen_spanish: me han humillado
  alternatives_spanish:
  - me han avergonzado
  - me han deshonrado
  - me han insultado
  lexicon: HALOT
  rationale: El hifil de כלם expresa causar vergüenza o humillación. «Humillado» mantiene la fuerza causativa y el tono de agravio personal del hebreo.
- source_word: לֹא תֵבֹשׁוּ
  english_pob_choice: you are not ashamed
  chosen_spanish: no se avergüenzan
  alternatives_spanish:
  - no sienten vergüenza
  - no les da vergüenza
  - no se ruborizan
  lexicon: HALOT
  rationale: «Avergonzarse» comunica bien בוש en español y preserva la acusación moral. Se eligió una forma impersonal/plural natural en español para corresponder al plural verbal.
- source_word: תַּהְכְּרוּ לִי
  english_pob_choice: to wrong me
  chosen_spanish: hacerme mal
  alternatives_spanish:
  - hacerme daño
  - tratarme injustamente
  - obrar mal contra mí
  lexicon: HALOT
  rationale: El hifil de נכר es difícil y puede sugerir tratar a Job como extraño o actuar contra él de manera hostil. «Hacerme mal» es amplio, natural y deja abierta la tensión léxica que el inglés POB también documenta con alternativas como «wrong me» y «deal harshly with me».
translation_notes:
  revision_awareness: El inglés POB pasó de «mistreat me» a «wrong me» en la revisión final, manteniendo la ambigüedad del verbo hebreo. La traducción española evita cerrar demasiado esa ambigüedad y usa una nota para conservar las alternativas relevantes.
  spanish_consistency_notes:
  - Se mantiene «humillado» para reflejar la fuerza causativa de תַּכְלִימוּנִי.
  - «Avergüenzan/avergonzar» se usa para בוש sin recurrir a fórmulas eclesiásticas fijas que oculten el matiz moral.
  - La frase «hacerme mal» conserva la amplitud semántica de תַּהְכְּרוּ לִי y no fuerza una sola interpretación.
