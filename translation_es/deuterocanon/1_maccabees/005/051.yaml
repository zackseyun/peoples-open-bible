- from: Y exterminó a todo varón[a] con el filo de la espada, y la desarraigó[b], y tomó el botín de la ciudad, y pasó por la ciudad sobre los muertos.
  to: Y exterminó a todos los varones[a] con el filo de la espada, y la arrancó de raíz[b], y tomó el botín de la ciudad, y pasó por la ciudad sobre los muertos.
  rationale: Se revisa «todo varón» a «todos los varones» para evitar una lectura demasiado restringida a adultos y mejorar el español natural. Se cambia «la desarraigó» a «la arrancó de raíz» para preservar de manera más transparente la metáfora de ἐξερρίζωσεν. Se normaliza la nota b.
