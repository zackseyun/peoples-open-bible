translation:
  language: es
  text: ¡Alaben a Yah[a]!, porque es bueno entonar alabanzas a nuestro Dios; porque es agradable y la alabanza es apropiada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yah», la forma corta del nombre divino; muchas traducciones la vierten como «el SEÑOR».'
    reason: alternative_reading
  - marker: b
    text: 'O: «porque la alabanza es bella» / «porque la alabanza es conveniente», reflejando el sentido de lo que es hermoso o apropiado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ֥לְלוּ
  english_pob_choice: Praise
  chosen_spanish: ¡Alaben!
  alternatives_spanish:
  - ¡Alaben
  - Alaben
  lexicon: HALOT
  rationale: Es un imperativo plural de hallel al inicio de una convocatoria poética. «¡Alaben!» conserva el tono exhortativo directo y natural en español.
- source_word: יָ֨הּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: La fuente hebrea tiene la forma abreviada del nombre divino, no el tetragrámaton completo. Mantener «Yah» preserva la forma fuente y su resonancia litúrgica en «¡Aleluya!».
- source_word: זַמְּרָ֣ה
  english_pob_choice: to sing praises
  chosen_spanish: entonar alabanzas
  alternatives_spanish:
  - cantar alabanzas
  - cantar
  - hacer música
  lexicon: HALOT
  rationale: La raíz expresa canto musical de alabanza. «Entonar alabanzas» comunica el matiz de cantar con propósito devocional sin sonar demasiado coloquial.
- source_word: אֱלֹהֵ֑ינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  - a nuestro Dios
  lexicon: HALOT
  rationale: El sufijo posesivo de primera plural se refleja de forma directa y natural con «nuestro Dios».
- source_word: נָ֝עִים
  english_pob_choice: pleasant
  chosen_spanish: agradable
  alternatives_spanish:
  - placentero
  - delicioso
  - dulce
  lexicon: HALOT
  rationale: Describe la cualidad experiencial positiva de la alabanza. «Agradable» es sobrio y claro en español contemporáneo.
- source_word: נָאוָ֥ה
  english_pob_choice: fitting
  chosen_spanish: apropiada
  alternatives_spanish:
  - conveniente
  - encajada
  - bella
  lexicon: HALOT
  rationale: La palabra señala lo que resulta adecuado o conveniente. «Apropiada» preserva la idea de idoneidad más que la de belleza estética.
- source_word: תְהִלָּֽה
  english_pob_choice: praise
  chosen_spanish: la alabanza
  alternatives_spanish:
  - alabanza
  - elogio
  - cántico de alabanza
  lexicon: HALOT
  rationale: Es un sustantivo abstracto que nombra la alabanza misma. Con artículo, «la alabanza» suena fluida y mantiene la tersura del hebreo.
theological_decisions:
- issue: Cómo tratar la forma divina abreviada יָהּ
  english_pob_reading: Yah
  chosen_spanish_reading: Yah
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo usa la forma corta del nombre divino, no YHWH completo. Traducirla como «el SEÑOR» borraría esa distinción; mantener «Yah» preserva la forma fuente y la conexión con el nombre litúrgico.
  doctrine_reference: 'Principio POB: transliterar nombres cuando la fuente presenta una forma nominal específica; el convenio de «Yahvé» se aplica al tetragrámaton completo, no a יָהּ.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y conserva la distinción entre la forma breve del nombre divino y el tetragrámaton. También refleja la revisión inglesa reciente al unir «es agradable y la alabanza es apropiada» sin coma innecesaria.
  spanish_consistency_notes:
  - Se mantuvo «Yah» para la forma abreviada del nombre divino, en coherencia con el tratamiento del audit trail inglés.
  - «Entonar alabanzas» conserva el valor verbal-musical de זמר sin mecanicismo.
  - «Agradable» / «apropiada» reproduce el par evaluativo del hebreo con registro natural en español.
  - Se evitó «SEÑOR» porque en este versículo la fuente no usa YHWH pleno.
