translation:
  language: es
  text: Un deseo cumplido es dulce para el alma[a], pero apartarse del mal es una abominación para los necios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Un deseo que se cumple es agradable para el alma».'
    reason: alternative_reading
lexical_decisions:
- source_word: תַּאֲוָה
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - anhelo
  - ansia
  - craving
  lexicon: HALOT
  rationale: El término hebreo puede abarcar deseo o anhelo. «Deseo» es la opción más amplia y natural en español, sin volver el proverbio más intenso de lo que el hebreo exige.
- source_word: נִהְיָה
  english_pob_choice: fulfilled
  chosen_spanish: cumplido
  alternatives_spanish:
  - realizado
  - llegado a ser
  - que se ha cumplido
  lexicon: HALOT
  rationale: Como participio nifal de היה, indica un deseo que ha llegado a cumplirse o existir. «Cumplido» conserva el estado resultante y funciona bien con «deseo» en español.
- source_word: תֶּעֱרַב
  english_pob_choice: is sweet
  chosen_spanish: es dulce
  alternatives_spanish:
  - es agradable
  - es deleitoso
  - es sabroso
  lexicon: HALOT
  rationale: El verbo expresa la idea de ser agradable o dulce. «Dulce» preserva la metáfora concreta de la sabiduría bíblica y suena natural en español.
- source_word: לְנָפֶשׁ
  english_pob_choice: to the soul
  chosen_spanish: para el alma
  alternatives_spanish:
  - a la vida
  - para la persona
  - al alma
  lexicon: HALOT
  rationale: נפש aquí señala al ser interior, no solo la vida física. «Alma» transmite bien esa profundidad antropológica en español; se prefirió «para el alma» por fluidez con «es dulce».
- source_word: וְתוֹעֲבַת
  english_pob_choice: but it is an abomination
  chosen_spanish: pero ... es una abominación
  alternatives_spanish:
  - y es una abominación
  - mas ... es una abominación
  - pero es una cosa abominable
  lexicon: HALOT
  rationale: La conjunción es adversativa en el paralelismo. «Abominación» conserva la fuerza fuerte de תועבה; se mantiene el contraste con la primera cola.
- source_word: כְּסִילִים
  english_pob_choice: fools
  chosen_spanish: los necios
  alternatives_spanish:
  - los insensatos
  - los tontos
  - los necios y obstinados
  lexicon: HALOT
  rationale: En Proverbios, כסילים son personas moralmente torpes y obstinadas, no solo poco inteligentes. «Necios» comunica esa dimensión ética mejor que alternativas más suaves.
- source_word: סוּר
  english_pob_choice: to turn away
  chosen_spanish: apartarse
  alternatives_spanish:
  - alejarse
  - desviarse
  - volver la espalda
  lexicon: HALOT
  rationale: El infinitivo expresa la acción de apartarse del mal. «Apartarse» es idiomático en español y mantiene la idea de rechazar o dejar atrás el mal.
- source_word: מֵרָע
  english_pob_choice: from evil
  chosen_spanish: del mal
  alternatives_spanish:
  - de la maldad
  - de lo malo
  - del mal moral
  lexicon: HALOT
  rationale: רע es el mal moral en este contexto sapiencial. «Del mal» es breve, natural y suficientemente preciso en español.
theological_decisions:
- issue: Fuerza moral de תועבה
  english_pob_reading: abomination
  chosen_spanish_reading: abominación
  alternative_spanish_readings:
  - cosa detestable
  - algo abominable
  - repugnancia
  rationale: Se conserva el registro fuerte del hebreo y de la traducción inglesa auditada. Suavizarlo a «detestable» o similar reduciría la intensidad moral del proverbio.
  doctrine_reference: Sabiduría bíblica; valoración moral del mal en Proverbios
- issue: נפש como ser interior
  english_pob_reading: to the soul
  chosen_spanish_reading: para el alma
  alternative_spanish_readings:
  - para la vida
  - para la persona
  - al corazón
  rationale: Se mantiene la dimensión antropológica interior sin reducir נפש a vida biológica ni reemplazarla por un término menos fundamentado como «corazón».
  doctrine_reference: Antropología bíblica; alma/ser interior en la poesía sapiencial
translation_notes:
  revision_awareness: 'La revisión inglesa reciente reordenó la segunda cola para reflejar más directamente el hebreo: «but to turn away from evil is an abomination to fools». La versión española sigue esa estructura, colocando «apartarse del mal» como sujeto lógico de la segunda mitad y manteniendo el contraste poético del hebreo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se preservó «alma» para נפש siguiendo la decisión inglesa de mantener la profundidad antropológica del término.
  - Se evitó traducir כסילים por «estúpidos» o «tontos» para conservar el matiz sapiencial de necedad moral.
