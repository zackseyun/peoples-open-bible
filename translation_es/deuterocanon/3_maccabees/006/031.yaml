translation:
  language: es
  text: Entonces los que antes habían sido reprochados y estaban cerca de Hades[a] —más bien, ya habían puesto el pie sobre él[b]—, en lugar de una condena amarga y difícil de beber, habiendo dispuesto un banquete festivo de salvación[c], dividieron en lechos de banquete el lugar preparado para su caída y sepulcro, llenos de alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cerca de la muerte» / «cerca del sepulcro»; el griego dice literalmente «cerca de Hades».
    reason: lexical_alternative
  - marker: b
    text: La expresión griega dice literalmente que habían «puesto el pie sobre» Hades, una imagen vívida de estar prácticamente muertos.
    reason: cultural_note
  - marker: c
    text: El término de la fuente también puede entenderse más ampliamente como una fiesta o banquete, pero aquí apunta especialmente a una celebración de bebida y comida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπονείδιστοι
  english_pob_choice: reproached
  chosen_spanish: reprochados
  alternatives_spanish:
  - desacreditados
  - vituperados
  - cubiertos de oprobio
  lexicon: LSJ
  rationale: El adjetivo expresa una condición de vergüenza pública o censura. 'Reprochados' conserva la idea de deshonra sin forzar un término más fuerte que el contexto no exige.
- source_word: πλησίον τοῦ ᾅδου
  english_pob_choice: near Hades
  chosen_spanish: cerca de Hades
  alternatives_spanish:
  - cerca de la muerte
  - cerca del sepulcro
  lexicon: LSJ
  rationale: El griego nombra explícitamente ᾅδης. Se conserva 'Hades' para no suavizar el término ni reemplazarlo por una equivalencia interpretativa.
- source_word: ἐπʼ αὐτῷ βεβηκότες
  english_pob_choice: had already stepped upon it
  chosen_spanish: ya habían puesto el pie sobre él
  alternatives_spanish:
  - ya habían pisado sobre él
  - ya habían llegado a él
  lexicon: LSJ
  rationale: La imagen verbal de 'poner el pie sobre' transmite el valor vívido del perfecto de βαίνω con ἐπί y conserva el matiz figurado de estar al borde de la muerte.
- source_word: μόρου
  english_pob_choice: doom
  chosen_spanish: destino
  alternatives_spanish:
  - fatalidad
  - ruina
  - muerte
  lexicon: LSJ
  rationale: Aquí el sustantivo puede entenderse como suerte aciaga o muerte destinada. 'Destino' mantiene la amplitud semántica, mientras el contexto amargo lo carga de tono negativo.
- source_word: πικροῦ καὶ δυσαπότικου
  english_pob_choice: bitter and hard-to-drink
  chosen_spanish: amargo y difícil de beber
  alternatives_spanish:
  - amargo y de beber cuesta arriba
  - amargo e imbebible
  lexicon: LSJ
  rationale: Se conserva la metáfora del beber, importante para preparar κῶθωνα. 'Difícil de beber' sigue de cerca el griego sin exagerar a 'imbebible'.
- source_word: κῶθωνα
  english_pob_choice: drinking-feast
  chosen_spanish: banquete
  alternatives_spanish:
  - festín de bebida
  - comida festiva
  - convite
  lexicon: LSJ
  rationale: En contexto, el término apunta a una celebración de beber/comer y no a un objeto aislado. 'Banquete' funciona en español y mantiene la idea de ocasión festiva, aunque la nota preserve la posibilidad de un matiz más específico de bebida.
- source_word: σωτήριον
  english_pob_choice: saving
  chosen_spanish: de salvación
  alternatives_spanish:
  - salvífico
  - salvador
  - para librarse
  lexicon: LSJ
  rationale: El adjetivo modifica la ocasión/banquete como portadora de rescate. 'De salvación' es claro, reverente y fiel al valor resultativo.
- source_word: συστησάμενοι
  english_pob_choice: having arranged
  chosen_spanish: habiendo preparado
  alternatives_spanish:
  - habiendo dispuesto
  - habiendo organizado
  - habiendo montado
  lexicon: LSJ
  rationale: El participio medio expresa que ellos mismos armaron o dispusieron la celebración. 'Habiendo preparado' es natural en español y mantiene la anterioridad participial.
- source_word: εἰς πτῶσιν αὐτοῖς καὶ τάφον ἡτοιμασμένον
  english_pob_choice: prepared for them for downfall and a grave
  chosen_spanish: preparado para ellos para caída y sepulcro
  alternatives_spanish:
  - preparado para su ruina y sepulcro
  - preparado para su caída y tumba
  - destinado para su ruina y sepultura
  lexicon: LSJ
  rationale: 'La construcción mantiene la doble finalidad negativa del lugar: caída y sepulcro. ''Sepulcro'' conserva el tono más solemne y cercano al registro del original.'
- source_word: κλισίας κατεμέρισαν
  english_pob_choice: they divided up as dining-couches
  chosen_spanish: repartieron como lechos de comida
  alternatives_spanish:
  - lo distribuyeron como lechos de banquete
  - lo repartieron como divanes de mesa
  - lo convirtieron en lugares de reclinación
  lexicon: LSJ
  rationale: κλισία alude a lechos reclinados para comer. 'Lechos de comida' evita una paráfrasis excesiva y conserva la imagen de reclinarse para el banquete, aunque suena algo más literal que idiomático.
- source_word: πλήρεις χαρμονῆς
  english_pob_choice: full of joy
  chosen_spanish: llenos de alegría
  alternatives_spanish:
  - colmados de gozo
  - llenos de gozo
  - rebosantes de alegría
  lexicon: LSJ
  rationale: La expresión describe el estado emocional de los participantes tras la inversión dramática. 'Llenos de alegría' es la formulación más natural en español.
theological_decisions:
- issue: Renderización de ᾅδης
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - muerte
  - sepulcro
  - el lugar de los muertos
  rationale: El texto griego nombra explícitamente ᾅδης; conservar 'Hades' respeta la imaginería fuente y evita diluir una referencia concreta del lenguaje judío-griego sobre el reino de los muertos.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de la inversión del banquete en un lugar de muerte
  english_pob_reading: the place prepared for them for downfall and a grave
  chosen_spanish_reading: el lugar preparado para ellos para caída y sepulcro
  alternative_spanish_readings:
  - el lugar destinado para su ruina y sepultura
  - el sitio preparado para su caída y tumba
  rationale: 'La frase mantiene la tensión teológica/literaria: lo que estaba preparado como espacio de ruina y entierro es reasignado como lugar de fiesta. No se suaviza esa ironía dramática.'
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al conservar el valor más preciso de la partícula participial ('habiendo preparado'), el registro más sobrio de los términos de reproche y ruina, y la imaginería vívida de 'poner el pie sobre' Hades. También respeta la decisión revisada de traducir μόρου con un término amplio ('destino') en vez de restringirlo a 'muerte', y mantiene la ambigüedad contextual de κῶθωνα mediante una nota explicativa.
  spanish_consistency_notes:
  - Se conserva 'Hades' de forma consistente con el audit trail y la política del proyecto para ᾅδης.
  - '''Mesías'' no aparece en este versículo, por lo que no hay decisión terminológica asociada.'
  - Se evita 'SEÑOR' porque no hay aquí un caso de κύριος que requiera el tratamiento del nombre divino.
  - La estructura de la frase intenta mantener la larga acumulación del griego sin volverla opaca en español.
