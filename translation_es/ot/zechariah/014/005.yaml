review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo y del POB inglés: mantiene «huirán», preserva «mis montes», «Azal», «Yahvé mi Dios», la secuencia con «Entonces», y la variante textual final en nota. También conserva correctamente la ambigüedad de קְדֹשִׁים en nota. Sin embargo, «todos los seres santos» no es la mejor preservación del matiz léxico ni del registro natural del español bíblico; suena forzado y menos fiel al valor abierto de «holy ones» que «todos los santos» con nota explicativa.'
  spanish_quality_summary: El español es generalmente claro y digno. «De delante del terremoto» es comprensible, aunque algo pesado; puede mantenerse por cercanía al hebreo. La principal dificultad de legibilidad está en «los seres santos», expresión poco idiomática en español eclesial general. «Todos los santos» es más natural y, acompañado por nota, sigue preservando la ambigüedad sin introducir una categoría ontológica artificial.
  glossary_alignment: 'Se alinea con la política del proyecto en «Yahvé» para יהוה y mantiene adecuadamente «mi Dios». No hay conflicto con otros términos clave. La decisión sobre קְדֹשִׁים debe ajustarse: «seres santos» no corresponde a una terminología preferible del proyecto ni a un español natural; «santos» con nota es una mejor solución contextual.'
  issues:
  - severity: medium
    issue: «todos los seres santos» suena artificial y poco idiomático
    rationale: Aunque intenta preservar la amplitud semántica de קְדֹשִׁים, en español introduce una formulación extraña que no refleja una expresión bíblica natural. «Todos los santos» es más legible y sigue siendo suficientemente abierta si la nota explica que podría referirse a asistentes celestiales, santos o ángeles.
  - severity: low
    issue: La nota b debe ajustarse al nuevo ancla léxica
    rationale: Si el texto principal cambia a «todos los santos», la nota debe explicar que el hebreo también puede entenderse como «los santos seres/los seres santos», «asistentes celestiales» o «ángeles», preservando la amplitud del original sin depender de la frase anterior.
  revised_spanish_text: Y huirán por el valle de mis montes[a], porque el valle de los montes llegará hasta Azal. Sí, huirán como huyeron de delante del terremoto en los días de Uzías, rey de Judá. Entonces Yahvé mi Dios vendrá, y todos los santos[b] con él.
  revised_footnotes:
