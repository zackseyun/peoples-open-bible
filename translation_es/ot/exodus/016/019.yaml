translation:
  language: es
  text: 'Y Moisés les dijo[a]: «Nadie deje nada de él hasta la mañana».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo אִישׁ («hombre») tiene aquí valor distributivo: se entiende «nadie» / «cada uno», es decir, la prohibición alcanza a todos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Entonces habló
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; en español, «Y ... dijo» conserva esa secuencia de manera natural y fiel sin sobrecargar el estilo.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: Nombre propio bíblico
  rationale: Nombre propio estándar en español bíblico.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El dativo clítico «les» expresa con naturalidad el destinatario directo del discurso; mantiene la referencia plural sin añadir explicaciones.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: nadie
  alternatives_spanish:
  - cada uno
  - ninguna persona
  lexicon: HALOT
  rationale: Aquí אִישׁ tiene fuerza distributiva y la traducción inglesa optó por una formulación inclusiva («no one»). En español, «nadie» comunica mejor la prohibición universal sin perder el valor distributivo del hebreo.
- source_word: אַל
  english_pob_choice: Let no ...
  chosen_spanish: Nadie ...
  alternatives_spanish:
  - No ...
  - No se ...
  lexicon: HALOT
  rationale: אַל introduce una prohibición; en español, la estructura negativa con «nadie» reproduce el mandato de forma idiomática y clara.
- source_word: יוֹתֵר
  english_pob_choice: leave any
  chosen_spanish: deje nada
  alternatives_spanish:
  - guarde algo
  - reserve algo
  - deje algo
  lexicon: HALOT
  rationale: En el contexto del maná, el verbo expresa dejar sobrante o reservar. «Deje nada» mantiene la prohibición de retener algo para el día siguiente y suena natural en español bíblico.
- source_word: מִמֶּנּוּ
  english_pob_choice: of it
  chosen_spanish: de ello
  alternatives_spanish:
  - de él
  - de eso
  lexicon: HALOT
  rationale: El pronombre retoma el maná como sustancia/colectivo; «de ello» evita marcar género de manera innecesaria y conserva la referencia colectiva.
- source_word: עַד בֹּקֶר
  english_pob_choice: until morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta la mañana siguiente
  - hasta que amanezca
  lexicon: HALOT
  rationale: La expresión temporal se vierte de modo directo y natural. «Hasta la mañana» corresponde bien al hebreo sin añadir matices no presentes en el texto.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «no man» a «no one» para reflejar con mayor naturalidad e inclusividad formal el valor distributivo de אִישׁ. La versión española sigue esa revisión con «nadie», evitando un masculino genérico innecesario.
  spanish_consistency_notes:
  - Se mantuvo «Moisés» para el nombre propio y «les» para el dativo plural, conforme al español bíblico estándar.
  - Se evitó «Señor» u այլ sustituciones porque este versículo no contiene el tetragrámaton ni títulos divinos.
  - «Hasta la mañana» preserva la brevedad temporal del hebreo y el paralelismo con la prohibición del maná.
