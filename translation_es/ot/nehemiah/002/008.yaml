base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/002/008.yaml
  text: and a letter to Asaph[a], the keeper of the king’s forest, that he should give me timber to make beams for the gates of the fortress that belongs to the house, and for the wall of the city, and for the house that I will enter. And the king gave to me[d][c][b], according to the good hand of my God upon me.
  footnotes:
  - marker: a
    text: Or 'the king’s park' or 'the king’s orchard'; the Hebrew pardes denotes a royal preserve or managed woodland.
    reason: lexical_alternative
  - marker: b
    text: Or 'the gates of the citadel.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'the house'; here likely referring to the temple.
    reason: lexical_alternative
  - marker: d
    text: Literally 'according to the good hand of my God upon me,' an idiom for God’s favorable providence.
    reason: cultural_note
