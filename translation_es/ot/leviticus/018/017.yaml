  text: עֶרְוַ֥ת אִשָּׁ֛ה וּ/בִתָּ֖/הּ לֹ֣א תְגַלֵּ֑ה אֶֽת בַּת בְּנָ֞/הּ וְ/אֶת בַּת בִּתָּ֗/הּ לֹ֤א תִקַּח֙ לְ/גַלּ֣וֹת עֶרְוָתָ֔/הּ שַׁאֲרָ֥ה הֵ֖נָּה זִמָּ֥ה הִֽוא־־־־
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/018/017.yaml
  text: You shall not uncover the nakedness of a woman and her daughter[a]. You shall not take her son's daughter or her daughter's daughter to uncover her nakedness; they are close relatives[c][b]. It is depravity.
  footnotes:
  - marker: a
    text: Or 'her near kin' or more literally 'her flesh.'
    reason: lexical_alternative
  - marker: b
    text: '''Uncover the nakedness'' is a Hebrew idiom for prohibited sexual relations.'
    reason: cultural_note
  - marker: c
    text: Or 'wickedness,' 'lewdness,' or 'an outrageous act.'
    reason: lexical_alternative
