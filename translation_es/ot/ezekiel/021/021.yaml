translation:
  language: es
  text: Reúnete[a]; ve a la derecha; colócate a la izquierda[c][b], adonde esté dirigido tu rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Únete», «Compónte» o, en contexto, «Concéntrate». El verbo hebreo es raro y reflexivo, y probablemente comunica concentración o compactación antes del golpe.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «tu rostro». En hebreo, esto puede significar también la dirección hacia la que uno mira o se orienta.
    reason: lexical_alternative
  - marker: c
    text: O «adonde tu rostro está fijado» o «adonde tu rostro está puesto».
    reason: alternative_reading
lexical_decisions:
- source_word: הִתְאַחֲדִ֥י
  english_pob_choice: Gather yourself
  chosen_spanish: Reúnete
  alternatives_spanish:
  - Únete
  - Compónte
  - Júntate
  lexicon: HALOT
  rationale: El hebreo es un imperativo reflexivo femenino singular de un verbo raro; la idea central es concentrarse o compactarse para la acción. «Reúnete» conserva el matiz reflexivo y resulta natural en español sin perder la fuerza breve del mandato.
- source_word: הֵימִ֖נִי
  english_pob_choice: go to the right
  chosen_spanish: ve a la derecha
  alternatives_spanish:
  - gira a la derecha
  - muévete a la derecha
  - dirígete a la derecha
  lexicon: HALOT
  rationale: El sentido direccional de la raíz es el de la derecha/lado derecho. «Ve a la derecha» expresa con naturalidad la orden direccional del hebreo.
- source_word: הָשִׂ֣ימִי
  english_pob_choice: set yourself
  chosen_spanish: colócate
  alternatives_spanish:
  - ponte
  - sitúate
  - sitúate a
  lexicon: HALOT
  rationale: El verbo שׂים aquí funciona con valor reflexivo en la secuencia de imperativos. «Colócate» preserva el tono imperativo y la idea de posición/ajuste sin forzar un calco.
- source_word: הַשְׂמִ֑ילִי
  english_pob_choice: to the left
  chosen_spanish: a la izquierda
  alternatives_spanish:
  - hacia la izquierda
  - a mano izquierda
  - izquierda
  lexicon: HALOT
  rationale: La forma es direccional y completa el paralelo con «a la derecha». En español, «a la izquierda» transmite ese movimiento direccional de manera clara.
- source_word: אָ֖נָה
  english_pob_choice: wherever
  chosen_spanish: adonde
  alternatives_spanish:
  - dondequiera que
  - a donde
  - a cualquier lugar donde
  lexicon: HALOT
  rationale: El adverbio/interrogativo hebreo introduce la cláusula de destino. «Adonde» mantiene la orientación espacial y evita exagerar con una paráfrasis más libre.
- source_word: פָּנַ֥יִ/ךְ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu cara
  - tu frente
  - tu semblante
  lexicon: HALOT
  rationale: Aunque literalmente dice «tu rostro», en este contexto puede funcionar como dirección de avance o de mirada. «Rostro» conserva la imagen hebrea con registro más digno que «cara».
- source_word: מֻעָדֽוֹת
  english_pob_choice: is appointed
  chosen_spanish: está fijado
  alternatives_spanish:
  - está señalado
  - está dirigido
  - está determinado
  lexicon: HALOT
  rationale: El participio pasivo de יעד expresa algo fijado o señalado para un punto/dirección. «Está fijado» mantiene el sentido pasivo sin decidir innecesariamente entre destino, dirección o designación.
theological_decisions:
- issue: Addressee personificada y mandato abrupto
  english_pob_reading: The verse is rendered as direct imperatives to the personified sword/force without making explicit in the English text what is only supplied by context.
  chosen_spanish_reading: La traducción mantiene los imperativos directos y deja implícito el destinatario personificado, como en el hebreo.
  alternative_spanish_readings:
  - «Oh espada, reúnete...»
  - «Espada, ve a la derecha...»
  - Hacer explícito el destinatario en el texto principal
  rationale: El contexto inmediato identifica la espada personificada; añadir «espada» aclararía, pero introduciría una palabra que no está en este verso. La versión española conserva la concisión y la tensión retórica del original.
  doctrine_reference: Primacía del texto original; no explicar en la traducción lo que el contexto ya aporta.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios; se conserva la lectura de referencia del audit trail inglés, con ajustes naturales al español y sin añadir elementos no sustentados por el hebreo.
  spanish_consistency_notes:
  - Se mantiene el tratamiento del hebreo con terminología digna y neutra del español bíblico moderno.
  - Se conserva la tensión del original entre imagen corporal («rostro») y dirección espacial.
  - No se introduce explícitamente «espada» en el texto principal, siguiendo la cautela del POB inglés respecto del destinatario personificado.
