translation:
  language: es
  text: Junto a ellos, Melatías el gibeonita y Jadón el meronotita hicieron reparaciones[a], junto con los hombres de Gabaón y de Mizpa, para la sede[b] del gobernador de la provincia Más allá del Río.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «fortalecieron» o «repararon». En Nehemías 3 el verbo se usa de manera técnica para participar en la reconstrucción del muro.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «para el asiento del gobernador de Más allá del Río». La frase puede referirse a la sede o residencia oficial del gobernador o, menos probablemente, a su autoridad administrativa en ese territorio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל יָדָם
  english_pob_choice: And next to them
  chosen_spanish: Junto a ellos
  alternatives_spanish:
  - Al lado de ellos
  - Junto a sus manos
  lexicon: HALOT
  rationale: La expresión hebrea marca adyacencia en la lista de construcción de Nehemías 3. «Junto a ellos» conserva el valor espacial y suena natural en español, sin calcar de modo áspero la frase hebrea.
- source_word: הֶחֱזִיק
  english_pob_choice: made repairs
  chosen_spanish: hicieron reparaciones
  alternatives_spanish:
  - fortalecieron
  - repararon
  lexicon: HALOT
  rationale: En este contexto el verbo describe participación en la reconstrucción del muro. «Hicieron reparaciones» comunica la obra constructiva y mantiene la fuerza práctica del término.
- source_word: מְלַטְיָה
  english_pob_choice: Melatiah
  chosen_spanish: Melatías
  alternatives_spanish:
  - Melatía
  lexicon: Transliteración estándar
  rationale: Nombre propio transliterado al español con ajuste ortográfico natural para lectura bíblica en español.
- source_word: הַגִּבְעֹנִי
  english_pob_choice: the Gibeonite
  chosen_spanish: el gibeonita
  alternatives_spanish:
  - el de Gabaón
  lexicon: HALOT
  rationale: El gentilicio funciona como designación étnico-geográfica; «gibeonita» sigue de cerca la forma hebrea y el patrón de gentilicios del pasaje.
- source_word: וְיָדוֹן
  english_pob_choice: and Jadon
  chosen_spanish: Jadón
  alternatives_spanish:
  - Yadón
  lexicon: Transliteración estándar
  rationale: Nombre propio transliterado. Se usa la forma española usual con J para una lectura eclesial clara.
- source_word: הַמֵּרֹנֹתִי
  english_pob_choice: the Meronothite
  chosen_spanish: el meronotita
  alternatives_spanish:
  - el de Meronot
  lexicon: HALOT
  rationale: Gentilicio rendido con el sufijo castellano -ita, paralelo a «gibeonita», para conservar la relación con el topónimo sin forzar una paráfrasis.
- source_word: אַנְשֵׁי גִבְעוֹן וְהַמִּצְפָּה
  english_pob_choice: along with the men of Gibeon and Mizpah
  chosen_spanish: junto con los hombres de Gabaón y de Mizpa
  alternatives_spanish:
  - los hombres de Gabaón y de Mizpa
  - junto con la gente de Gabaón y de Mizpa
  lexicon: HALOT
  rationale: «אַנְשֵׁי» denota varones/personas de esas localidades. «Los hombres de» refleja el hebreo y mantiene la enumeración de participantes en la obra.
- source_word: לְכִסֵּא
  english_pob_choice: for the seat of
  chosen_spanish: para la silla[b]
  alternatives_spanish:
  - para el asiento
  - para la sede
  lexicon: HALOT
  rationale: El sustantivo hebreo significa literalmente «asiento/silla» y en contexto administrativo puede referirse al asiento oficial o a la sede del gobernador. Se preserva la tensión léxica con una nota, sin resolverla de manera excesiva.
- source_word: פַּחַת
  english_pob_choice: the governor of
  chosen_spanish: del gobernador
  alternatives_spanish:
  - del prefecto
  lexicon: HALOT
  rationale: Título administrativo persa. «Gobernador» es la equivalencia moderna más clara en español y comunica adecuadamente la función política.
- source_word: עֵבֶר הַנָּהָר
  english_pob_choice: the province Beyond the River
  chosen_spanish: del distrito al otro lado del río
  alternatives_spanish:
  - de la provincia Al otro lado del río
  - del distrito Transrío
  lexicon: HALOT
  rationale: La designación persa alude a la región occidental del Éufrates. Se traduce de forma descriptiva para lectores en español, evitando una transliteración opaca y manteniendo el valor administrativo del título.
theological_decisions:
- issue: Valor de לְכִסֵּא en contexto administrativo
  english_pob_reading: The phrase may refer either to the governor's official seat/residence or, less likely, to his jurisdictional authority in that district.
  chosen_spanish_reading: Puede referirse tanto a la silla o asiento oficial del gobernador como, menos probablemente, a su sede o centro de gobierno en ese distrito.
  alternative_spanish_readings:
  - al asiento del gobernador
  - a la sede del gobernador
  rationale: No se debe eliminar la ambigüedad documentada. La redacción mantiene el sentido material básico de «silla/asiento» y deja abierta la posible referencia institucional, en línea con la nota auditada del texto inglés.
  doctrine_reference: No aplica; decisión léxica e histórica-administrativa.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «as far as» por «for» para ajustarse mejor al hebreo. En español, por la misma razón, evité «hasta» y opté por «para», manteniendo la relación final/funcional con «la silla del gobernador» sin forzar una extensión espacial que el hebreo no exige claramente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece el nombre divino.
  - Se prefirió «gibeonita» y «meronotita» para conservar la forma gentilicia y la simetría del pasaje.
  - «Distrito al otro lado del río» intenta reflejar el nombre administrativo persa sin introducir una transliteración innecesaria.
  - No se usó «Mesías/Cristo», «siervo», ni otras equivalencias teológicas no pertinentes a este versículo.
