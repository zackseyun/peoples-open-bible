    text: La expresión 'será excluida' traduce una fórmula legal hebrea que literalmente es 'será cortada'. Puede referirse a expulsión de la comunidad, muerte o juicio divino; este versículo no especifica el modo exacto.
    reason: alternative_reading
  revision_rationale: Se corrige la ubicación y el contenido de las notas para que coincidan con el hebreo y con el rastro auditado del POB inglés. Se reemplaza 'será eliminada' por 'será excluida de Israel' para preservar mejor la tensión legal de וְנִכְרְתָה sin imponer una interpretación más fuerte de la que permite el texto. También se simplifica חָמֵץ como 'algo con levadura', más claro en español general.
