    issue: Nota al pie con comilla inicial sobrante
    rationale: 'La nota comienza con "''O:" en lugar de "O:" o «O: ...». Esto es un problema menor de estilo/edición, no de sentido.'
  revised_spanish_text: He visto a un necio que echaba raíces[a], y de repente maldije su morada.
  revised_footnotes:
  - marker: a
    text: 'O: «declaré su morada maldita» o «marqué su morada como condenada». El verbo hebreo puede entenderse como una maldición directa o como un pronunciamiento observacional de juicio.'
    reason: alternative_reading
  revision_rationale: Se conserva la traducción principal porque es fiel al hebreo y al expediente inglés. Solo se corrige la nota al pie para eliminar una comilla sobrante y normalizar el estilo tipográfico en español.
