translation:
  language: es
  text: Y también sus hijos, y devoraron todo y lo bebieron todo. Entonces el rey se levantó temprano por la mañana[a], y Daniel con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego repite la idea de la temprana mañana: literalmente, «se levantó temprano, por la mañana». La traducción conserva ese énfasis en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ τέκνα αὐτῶν
  english_pob_choice: their children too
  chosen_spanish: sus hijos[a]
  alternatives_spanish:
  - sus hijos
  - sus niños
  - también sus hijos
  lexicon: LSJ
  rationale: τέκνα significa de manera amplia “hijos/niños”; en este contexto narrativo, “hijos” es natural y suficientemente amplio. El sentido aditivo de καί se expresa con el orden y el contexto, y la nota explica que el griego incluye también la idea de adición (“también”).
- source_word: κατέφαγον πάντα
  english_pob_choice: they ate up everything
  chosen_spanish: devoraron todo
  alternatives_spanish:
  - comieron todo
  - se comieron todo
  - devoraron todo lo que había
  lexicon: LSJ
  rationale: El compuesto καταφαγεῖν intensifica el acto más allá de “comer”; “devoraron” conserva esa fuerza en español sin sonar forzado. πάντα se rinde con “todo” para expresar consumición total.
- source_word: ἐξέπιον
  english_pob_choice: drank it all
  chosen_spanish: lo bebieron todo
  alternatives_spanish:
  - bebieron todo
  - se lo bebieron todo
  - lo sorbieron todo
  lexicon: LSJ
  rationale: El verbo expresa beber hasta consumir por completo; “lo bebieron todo” comunica esa totalidad con claridad. El pronombre lo recoge el objeto implícito por el paralelo con “todo”.
- source_word: ὤρθρισεν
  english_pob_choice: rose early in the morning
  chosen_spanish: se levantó temprano por la mañana
  alternatives_spanish:
  - se levantó temprano
  - se alzó de madrugada
  - se levantó de mañana
  lexicon: LSJ
  rationale: ὤρθρισεν indica levantarse muy temprano; “se levantó temprano” es natural en español. Se mantiene “por la mañana” para reproducir el énfasis temporal reforzado por la frase siguiente.
- source_word: πρωί
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - de mañana
  - al amanecer
  lexicon: LSJ
  rationale: πρωί precisa la temporalidad matutina y, junto con ὤρθρισεν, crea una repetición enfática. “Por la mañana” preserva esa redundancia con buena fluidez en español.
- source_word: Δανιὴλ μετʼ αὐτοῦ
  english_pob_choice: Daniel with him
  chosen_spanish: Daniel con él
  alternatives_spanish:
  - y Daniel con él
  - Daniel iba con él
  - y Daniel lo acompañaba
  lexicon: LSJ
  rationale: La construcción es breve y sin verbo explícito; “Daniel con él” mantiene la concisión narrativa. El español puede suplir naturalmente la relación de acompañamiento sin añadir un verbo que no está en el griego.
translation_notes:
  revision_awareness: No se aplicaron revisiones al texto fuente inglés; la presente versión española corrige la falta anterior de anclaje de la nota e integra el marcador [a] directamente en el texto.
  spanish_consistency_notes:
  - Se prefirió “Yahvé” en general para el Tetragrámaton, pero este versículo no contiene ese nombre.
  - Se mantuvo un registro narrativo sobrio y directo, acorde con el paralelo griego.
  - La nota [a] está anclada exactamente en el elemento con valor adverbial aditivo-temporal, y no se crean notas sin marcador en el texto.
