translation:
  language: es
  text: 'Pero su esposa le dijo: «Si Yahvé hubiera tenido la intención de matarnos, no habría aceptado[a] de nuestra mano un holocausto y una ofrenda de cereal[b], ni nos habría mostrado todas estas cosas, ni ahora nos habría dicho cosas como estas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tomado» o «recibido». El verbo hebreo significa literalmente «tomar», pero en contexto sacrificial puede expresar la aceptación de una ofrenda.'
    reason: lexical_alternative
  - marker: b
    text: «Ofrenda de cereal» traduce el hebreo minḥah, que según el contexto también puede significar un don, tributo u ofrenda.
    reason: cultural_note
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: But ... said
  chosen_spanish: Pero ... le dijo
  alternatives_spanish:
  - Y ... le dijo
  - Entonces ... le dijo
  lexicon: HALOT
  rationale: La waw narrativa introduce la secuencia del relato; en español, «Pero» preserva el giro discursivo frente al temor de Manoaj en el versículo anterior y mantiene el movimiento narrativo natural.
- source_word: אִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - la mujer
  lexicon: HALOT
  rationale: El sustantivo con sufijo pronominal designa de forma directa a su esposa; «esposa» es más precisa que «mujer» en este contexto relacional.
- source_word: לוּ חָפֵץ
  english_pob_choice: had intended
  chosen_spanish: hubiera tenido la intención
  alternatives_spanish:
  - hubiera querido
  - le hubiera placido
  lexicon: HALOT
  rationale: La partícula condicional irreal y חָפֵץ expresan voluntad o intención. «Hubiera tenido la intención» comunica bien esa fuerza volitiva sin cargar la frase con matices emocionales ajenos al contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado, sin sustituirlo por un título. «Yahvé» es la forma española estándar adoptada por el proyecto.
- source_word: לַהֲמִיתֵנוּ
  english_pob_choice: to kill us
  chosen_spanish: matarnos
  alternatives_spanish:
  - quitarnos la vida
  - darnos muerte
  lexicon: HALOT
  rationale: El infinitivo causativo de מות con sufijo de primera persona plural se expresa de forma directa y natural en español como «matarnos».
- source_word: לֹא לָקַח מִיָּדֵנוּ
  english_pob_choice: he would not have accepted from our hand
  chosen_spanish: no habría aceptado de nuestra mano
  alternatives_spanish:
  - no habría tomado de nuestra mano
  - no habría recibido de nosotros
  lexicon: HALOT
  rationale: 'Aunque el verbo significa literalmente «tomar», en contexto sacrificial con «de nuestra mano» el sentido es cultual: recibir o aceptar la ofrenda. «Aceptado» conserva ese valor ritual de modo claro en español.'
- source_word: עֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: un holocausto
  alternatives_spanish:
  - un sacrificio quemado
  lexicon: HALOT
  rationale: El término cultual estándar en español bíblico para עֹלָה es «holocausto», es decir, una ofrenda completamente consumida por el fuego.
- source_word: וּמִנְחָה
  english_pob_choice: and a grain offering
  chosen_spanish: y una ofrenda de cereal
  alternatives_spanish:
  - y una ofrenda vegetal
  - y una ofrenda de grano
  lexicon: HALOT
  rationale: מִנְחָה puede abarcar don/gabación/ofrenda, pero aquí, junto con עֹלָה, el valor sacrificial específico se expresa mejor como «ofrenda de cereal».
- source_word: וְלֹא הֶרְאָנוּ אֶת כָּל אֵלֶּה
  english_pob_choice: or shown us all these things
  chosen_spanish: ni nos habría mostrado todas estas cosas
  alternatives_spanish:
  - ni nos habría hecho ver todas estas cosas
  - ni nos habría presentado todas estas cosas
  lexicon: HALOT
  rationale: El causativo de ראה es «hacer ver / mostrar». «Nos habría mostrado» refleja bien la acción divina de revelar estas manifestaciones.
- source_word: וְכָעֵת
  english_pob_choice: or now
  chosen_spanish: ni ahora
  alternatives_spanish:
  - y ahora
  - ni en este momento
  lexicon: HALOT
  rationale: La secuencia argumental enumera evidencias negativas; «ni ahora» conserva la progresión y el matiz temporal de כָּעֵת.
- source_word: לֹא הִשְׁמִיעָנוּ
  english_pob_choice: told us
  chosen_spanish: nos habría dicho
  alternatives_spanish:
  - nos habría hecho oír
  - nos habría anunciado
  lexicon: HALOT
  rationale: El causativo de שמע puede significar «hacer oír» o, por extensión, informar. En español, «nos habría dicho» suena natural y mantiene el sentido de comunicación revelatoria.
- source_word: כָזֹאת
  english_pob_choice: such things as these
  chosen_spanish: tales cosas como estas
  alternatives_spanish:
  - cosas así
  - algo así
  lexicon: HALOT
  rationale: El demostrativo femenino singular en este contexto apunta al contenido recién mencionado; la formulación plural «tales cosas como estas» sigue la revisión inglesa y evita reducir indebidamente el alcance.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrama. El proyecto no lo enmascara con un título; «Yahvé» preserva el nombre personal de Dios revelado en el texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: el final se ajustó para reflejar mejor el plural de כָזֹאת y el valor más natural de הִשְׁמִיעָנוּ como comunicación dirigida a ellos. Se mantuvo la decisión del nombre divino como Yahvé y el sentido sacrificial de לקח en este contexto.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - «Holocausto» y «ofrenda de cereal» conservan el registro cultual y evitan paráfrasis genéricas.
  - La secuencia negativa «no habría... ni... ni...» reproduce la argumentación hebrea de evidencias sucesivas.
  - Las notas al pie están ancladas exactamente en la cita con [a] y [b].
