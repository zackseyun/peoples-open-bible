translation:
  language: es
  text: No seas excesivamente malvado[a], ni seas insensato. ¿Por qué has de morir antes de tu tiempo?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No seas demasiado malvado». El hebreo incluye un término de grado, creando una tensión deliberada con el contexto circundante en vez de aprobar alguna medida de maldad.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «en no tu tiempo». Es decir, antes de tu tiempo propio o esperado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּרְשַׁ֥ע
  english_pob_choice: be wicked
  chosen_spanish: ser impío
  alternatives_spanish:
  - ser malvado
  - obrar impíamente
  lexicon: HALOT
  rationale: El verbo expresa conducta o condición de רשׁע, con carga moral fuerte. En español, «impío» comunica bien la oposición ética y preserva el matiz de culpa moral sin reducirlo a una mera falta de prudencia.
- source_word: הַרְבֵּ֖ה
  english_pob_choice: excessively
  chosen_spanish: excesivamente
  alternatives_spanish:
  - mucho
  - demasiado
  - en gran manera
  lexicon: HALOT
  rationale: El adverbio intensifica la prohibición. «Excesivamente» conserva el valor de grado y mantiene la tensión deliberada del hebreo sin resolverla.
- source_word: תְּהִ֣י סָכָ֑ל
  english_pob_choice: be foolish
  chosen_spanish: ser insensato
  alternatives_spanish:
  - ser necio
  - portarte como necio
  - ser tonto
  lexicon: HALOT
  rationale: La construcción con היה + sustantivo/adjetivo se vierte de forma natural en español con una cópula + predicativo. «Insensato» conserva el registro sobrio y el campo de sentido de סָכָל mejor que opciones coloquiales.
- source_word: לָ֥מָּה
  english_pob_choice: Why should
  chosen_spanish: ¿Por qué has de
  alternatives_spanish:
  - ¿por qué deberías
  - ¿por qué has de morir
  lexicon: HALOT
  rationale: La pregunta es retórica y exhortativa. «¿Por qué has de…?» reproduce con naturalidad el valor admonitorio del hebreo y la fuerza de la construcción interrogativa.
- source_word: תָמ֖וּת
  english_pob_choice: you die
  chosen_spanish: morir
  alternatives_spanish:
  - que mueras
  - has de morir
  lexicon: HALOT
  rationale: El verbo מות se entiende aquí en una pregunta retórica sobre muerte prematura. En español, el infinitivo tras «has de» suena más idiomático y conserva el tono de advertencia.
- source_word: בְּלֹ֥א עִתֶּֽךָ
  english_pob_choice: before your time
  chosen_spanish: antes de tu tiempo
  alternatives_spanish:
  - no en tu tiempo
  - fuera de tu tiempo
  - antes de tu tiempo señalado
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en no tu tiempo». «Antes de tu tiempo» expresa con claridad la idea de muerte prematura sin añadir interpretación excesiva. Se evita «señalado» porque el hebreo no lo dice de forma explícita.
theological_decisions:
- issue: La aparente posibilidad de leer el mandato como si aprobara un grado moderado de maldad
  english_pob_reading: The wording preserves the Hebrew's rhetorical tension without implying approval of any degree of wickedness.
  chosen_spanish_reading: El texto conserva la tensión retórica del hebreo sin sugerir aprobación de ninguna medida de impiedad.
  alternative_spanish_readings:
  - No seas malo en exceso
  - No seas completamente malo
  rationale: Como en la POB inglesa, el adverbio de grado se mantiene para reflejar la formulación provocadora de Eclesiastés. «Excesivamente impío» preserva la tensión sin sonar como permiso para pecar moderadamente, y mantiene el paralelismo con el versículo anterior.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «be a fool» por «be foolish» para reflejar con más naturalidad la construcción predicativa; en español se siguió esa orientación con «ser insensato», que suena natural y conserva el valor descriptivo del hebreo. También se mantuvo el término de grado en la primera prohibición para preservar la tensión retórica documentada en el audit trail.
  spanish_consistency_notes:
  - Se usó «impío» para רשע, coherente con un registro bíblico sobrio y con la distinción entre maldad moral y simple imprudencia.
  - Se evitó «SEÑOR» y otras sustituciones no aplicables; el versículo no contiene el nombre divino.
  - Se preservó la construcción retórica de advertencia con interrogativa directa.
  - Se mantuvo un español neutro y publicable, sin calcos rígidos como «en no tu tiempo» dentro del texto principal.
