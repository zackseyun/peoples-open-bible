translation:
  language: es
  text: Ahora me levantaré, dice Yahvé; ahora seré exaltado[a]; ahora me alzaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ahora me alzaré; ahora seré exaltado». Los dos verbos finales hebreos están estrechamente relacionados en significado, y las traducciones pueden variar en cómo distinguen su matiz.'
