translation:
  language: es
  text: Nadie es tan feroz que se atreva a provocarlo[a]. ¿Quién, entonces, es el que puede mantenerse ante mí?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: ‘nadie es tan cruel que se atreva a despertarlo’. El verbo hebreo puede significar ‘despertar’ o ‘incitar’; aquí se usa en el sentido de provocar a Leviatán.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא אַכְזָר
  english_pob_choice: No one is so fierce
  chosen_spanish: Nadie es tan feroz
  alternatives_spanish:
  - Nadie es tan cruel
  - Nadie es tan despiadado
  lexicon: HALOT
  rationale: אַכְזָר expresa rudeza o ferocidad; en el contexto de Leviatán, ‘feroz’ comunica mejor la fuerza intimidante que ‘cruel’, que en español suena más moralizada. ‘Nadie es tan...’ reproduce bien la construcción idiomática negativa del hebreo y el valor predicativo de la frase.
- source_word: יְעוּרֶנּוּ
  english_pob_choice: he dares to stir him up
  chosen_spanish: se atreva a provocarlo
  alternatives_spanish:
  - lo despierte
  - lo despierte y lo irrite
  - se atreva a despertarlo
  lexicon: HALOT
  rationale: El verbo עוּר significa ‘despertar/irritar/poner en movimiento’; aquí, por el contexto de Leviatán, la idea es provocar o desafiar a la criatura. ‘Provocarlo’ conserva el valor idiomático de incitarlo a reaccionar sin reducirlo a un simple despertar físico. ‘Se atreva’ refleja la fuerza retórica del contexto, como en la POB inglesa.
- source_word: וּמִי הוּא
  english_pob_choice: Who then is he
  chosen_spanish: ¿Quién, entonces, es el que
  alternatives_spanish:
  - ¿Y quién es el que
  - ¿Quién es el que
  lexicon: HALOT
  rationale: La partícula interrogativa con la conjunción avanza el argumento de forma inferencial. ‘¿Quién, entonces, es el que...?’ conserva el tono retórico y el énfasis de הוּא, que en español puede expresarse con la estructura explicativa ‘es el que’.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: en mi presencia
  alternatives_spanish:
  - ante mí
  - delante de mí
  lexicon: HALOT
  rationale: Literalmente ‘ante mi rostro/presencia’. ‘En mi presencia’ mantiene la fuerza relacional y puede sugerir tanto comparecer ante Dios como resistirle, sin volver demasiado rígida la imagen espacial.
- source_word: יִתְיַצָּב
  english_pob_choice: can stand
  chosen_spanish: puede mantenerse
  alternatives_spanish:
  - puede ponerse en pie
  - puede tomar posición
  - puede resistir
  lexicon: HALOT
  rationale: El hitpael de יצב es ‘ponerse de pie, tomar postura, mantenerse firme’. En este contexto retórico, ‘mantenerse’ comunica la idea de sostenerse o permanecer firme ante Dios; ‘puede’ reproduce la capacidad retórica de la pregunta. ‘Resistir’ es posible, pero estrecha el matiz de comparecer/plantarse.
theological_decisions:
- issue: Cambio de Leviatán a Dios en la segunda pregunta
  english_pob_reading: 'The second clause shifts from Leviathan to God: if no one dares provoke Leviathan, much less can anyone stand before God.'
  chosen_spanish_reading: 'La segunda pregunta pasa de Leviatán a Dios: si nadie se atreve a provocarlo, mucho menos alguien puede mantenerse en la presencia de Yahvé.'
  alternative_spanish_readings:
  - La segunda pregunta sigue hablando solo de Leviatán.
  - ¿Quién puede mantenerse ante mí?
  rationale: El sufijo de primera persona en לְפָנַי (‘mi presencia’) indica con fuerza la voz divina. La lectura en español debe preservar ese cambio implícito del objeto de la primera cláusula al hablante divino de la segunda, como en la auditoría inglesa. ‘Yahvé’ se usa según la convención del proyecto para el nombre divino, en lugar de ocultarlo tras ‘Señor’.
  doctrine_reference: Job 40–41; discurso divino y soberanía de Yahvé
translation_notes:
  revision_awareness: La revisión inglesa eliminó el inicial ‘Then’ y dejó ‘Who then is he who can stand before me?’. En español se mantuvo el valor inferencial con la colocación ‘¿Quién, entonces, es el que...?’ para conservar naturalidad sin perder el avance argumental.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el nombre divino según la norma del proyecto.
  - Se conserva ‘Leviatán’ en la referencia implícita del pronombre, como en la POB inglesa.
  - ‘Feroz’ se eligió por claridad contextual; no se usó ‘cruel’ porque en español desplaza el sentido hacia una valoración moral más que hacia la fiereza temible del pasaje.
  - La estructura interrogativa se ajustó para sonar natural en español sin borrar el énfasis retórico del hebreo.
