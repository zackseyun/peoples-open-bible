translation:
  language: es
  text: Si un hombre se acuesta con un animal[a], sin falta se le dará muerte, y matarán al animal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «da su yacer con un animal», un modismo hebreo para el acto sexual.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo masculino singular y el contexto legal, además del verso siguiente, distingue el caso masculino del femenino. «Un hombre» conserva esa especificidad sin volver la frase artificial.
- source_word: אֲשֶׁר
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - que
  - cuando
  lexicon: HALOT
  rationale: En estilo casuístico legal, la partícula relativa introduce una condición. «Si» comunica de manera natural esa fuerza condicional en español.
- source_word: יִתֵּן שְׁכָבְתּוֹ
  english_pob_choice: lies with
  chosen_spanish: yaciere con
  alternatives_spanish:
  - se acueste con
  - tenga relaciones con
  - duerma con
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomatismo sexual. «Yaciere con» mantiene la imagen verbal de «lie with» sin perder el matiz eufemístico del original. Se evita «tener relaciones con» por ser más interpretativo y «duerma con» por sonar menos preciso en este contexto legal.
- source_word: בִּבְהֵמָה
  english_pob_choice: with an animal
  chosen_spanish: con un animal
  alternatives_spanish:
  - con una bestia
  - con un bicho
  lexicon: HALOT
  rationale: בְּהֵמָה puede abarcar animal o bestia; «animal» es más claro y natural en español moderno, y conserva la prohibición legal sin introducir una carga estilística innecesaria.
- source_word: מוֹת יוּמָת
  english_pob_choice: he must surely be put to death
  chosen_spanish: ciertamente será muerto
  alternatives_spanish:
  - será condenado a muerte
  - deberá morir
  - morirá sin falta
  lexicon: HALOT
  rationale: La construcción intensiva hebrea expresa certeza y énfasis. «Ciertamente será muerto» conserva la fuerza del pasivo legal y la solemnidad del mandato mejor que una paráfrasis más explicativa.
- source_word: וְאֶת־הַבְּהֵמָה תַּהֲרֹגוּ
  english_pob_choice: and you shall kill the animal
  chosen_spanish: y mataréis al animal
  alternatives_spanish:
  - y mataréis el animal
  - y debéis matar al animal
  lexicon: HALOT
  rationale: El plural dirigido a la comunidad o a la autoridad judicial se mantiene con «mataréis». «Matar» refleja el sentido básico del verbo sin suavizarlo, y «al animal» suena natural en español.
theological_decisions:
- issue: Especificidad masculina del infractor
  english_pob_reading: 'male-specific: ''a man'''
  chosen_spanish_reading: 'específica de un varón: «un hombre»'
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: El hebreo no es genérico aquí; la estructura legal distingue el caso masculino, y el versículo siguiente trata el femenino. Mantener «un hombre» preserva esa organización y evita borrar una distinción del texto fuente.
  doctrine_reference: Principio de precisión lexical y de no nivelar distinciones del texto base
translation_notes:
  revision_awareness: La revisión más reciente del POB inglés optó por volver de una paráfrasis interpretativa («has sexual intercourse with») a una forma más formal («lies with»). La presente redacción española sigue esa misma dirección, conservando el idiomatismo del hebreo en vez de explicitarlo de manera interpretativa en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «animal» como equivalente de בְּהֵמָה para conservar claridad moderna.
  - Se conserva el tono legal con futuro/mandato en segunda persona plural («mataréis») para reflejar el hebreo dirigido a la comunidad.
  - Se usa «ciertamente será muerto» para reproducir la intensidad jurídica de מוֹת יוּמָת sin añadir términos ajenos al texto.
