translation:
  language: es
  text: Guárdame de las manos de la trampa que han tendido para mí[a][b], y de los lazos de los que obran maldad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «de las manos de la trampa». El hebreo usa «mano(s)» para expresar poder, dominio o alcance.
    reason: lexical_alternative
  - marker: b
    text: 'O: «Guárdame de la trampa que han tendido para mí, y de los lazos de los que obran maldad».'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁמְרֵנִי
  english_pob_choice: Keep me
  chosen_spanish: Guárdame
  alternatives_spanish:
  - Cuídame
  - Presérvame
  lexicon: HALOT
  rationale: שׁמר en esta súplica expresa pedir protección activa; «guárdame» conserva el imperativo de resguardo con naturalidad en español y mantiene el tono orante del versículo.
- source_word: מִידֵי
  english_pob_choice: from the hands of
  chosen_spanish: de las manos de
  alternatives_spanish:
  - de la mano de
  - del poder de
  lexicon: HALOT
  rationale: La imagen hebrea usa «mano(s)» para poder o alcance. En español, «de las manos de» reproduce la metáfora concreta sin perder el sentido de dominio o aprisionamiento.
- source_word: פַח
  english_pob_choice: the trap
  chosen_spanish: la trampa
  alternatives_spanish:
  - el lazo
  - la red
  lexicon: HALOT
  rationale: פַח designa un artefacto de captura; «trampa» es claro y fiel, y ayuda a distinguirlo de las «redes» del segundo hemistiquio.
- source_word: יָקְשׁוּ לִי
  english_pob_choice: they have set for me
  chosen_spanish: que han tendido para mí
  alternatives_spanish:
  - que me han puesto
  - que me han preparado
  lexicon: HALOT
  rationale: El verbo comunica la acción de poner o tender una trampa. «Han tendido para mí» mantiene la imagen de una trampa preparada intencionalmente contra el hablante.
- source_word: וּמֹקְשׁוֹת
  english_pob_choice: and from the snares of
  chosen_spanish: y de las redes de
  alternatives_spanish:
  - y de los lazos de
  - y de las trampas de
  lexicon: HALOT
  rationale: מֹקְשׁוֹת es plural de términos de captura; «redes» funciona en español como imagen poética paralela y evita repetir «trampa» de manera pesada.
- source_word: פֹּעֲלֵי אָוֶן
  english_pob_choice: the workers of wickedness
  chosen_spanish: los que hacen iniquidad
  alternatives_spanish:
  - los hacedores de maldad
  - los obradores de iniquidad
  lexicon: HALOT
  rationale: La construcción hebrea «los que hacen…» puede verterse de forma natural en español con el mismo valor participial. «Iniquidad» preserva el peso moral y la tradición semántica de אָוֶן, sin borrar su fuerza ética.
theological_decisions:
- issue: 'אָוֶן: maldad, iniquidad o mal/vanidad'
  english_pob_reading: workers of wickedness
  chosen_spanish_reading: los que hacen iniquidad
  alternative_spanish_readings:
  - los que hacen maldad
  - los obradores de iniquidad
  - los que hacen mal
  rationale: El contexto es una petición de liberación frente a personas dañinas. «Iniquidad» conserva la carga moral intensa del término y corresponde bien al paralelismo de enemigos que tienden trampas.
  doctrine_reference: Ética bíblica / lenguaje de pecado y maldad
- issue: Imagen de 'mano(s)' aplicada a una trampa
  english_pob_reading: from the hands of the trap they have set for me
  chosen_spanish_reading: de las manos de la trampa que han tendido para mí
  alternative_spanish_readings:
  - de la trampa que han tendido para mí
  - del poder de la trampa que han tendido para mí
  rationale: La metáfora hebrea conserva un matiz de alcance o poder. En español se explicita con «manos» para reflejar el original, aunque en inanimados puede sonar figurado; por eso la frase se mantiene breve y transparente.
  doctrine_reference: Poética bíblica / metáfora corporal
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB en inglés, que prefirió «hands» sobre «grasp» para reflejar más directamente el hebreo מִידֵי. En español se conservó esa decisión con «de las manos de», manteniendo la metáfora corporal del original y la estructura paralela del versículo.
  spanish_consistency_notes:
  - Se mantuvo «YHWH» no pertinente aquí; no aparece en el versículo.
  - Se eligió «Guárdame» para sostener el tono de súplica y la equivalencia funcional de שׁמר.
  - Se evitó «siervo» u otros términos no presentes; el hemistiquio final conserva el participio sustantivado con una cláusula relativa natural.
  - «Trampa» y «redes» distinguen los dos términos de captura del hebreo sin aplanar la repetición poética.
