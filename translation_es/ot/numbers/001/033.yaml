lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  english_pob_choice: those registered
  chosen_spanish: los registrados
  alternatives_spanish:
  - los contados
  - los censados
  - los inscritos
  lexicon: HALOT
  rationale: El sustantivo verbal pasivo de פקד en este contexto censal se refiere a los hombres incluidos en el censo. «Los registrados» mantiene la fuerza de inclusión en el conteo sin añadir una matización militar que no está explícita en el hebreo inmediato.
- source_word: לְמַטֵּה
  english_pob_choice: from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - de la tribu de parte de
  - por la tribu de
  lexicon: HALOT
  rationale: La preposición ל con מַטֶּה en esta fórmula de censo identifica la pertenencia tribal. En español, «de la tribu de» es natural y comunica la afiliación sin sobreinterpretar la preposición.
- source_word: אֶפְרָיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraim
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma usual en español; «Efraín» es la transliteración más reconocible y estándar en lectura bíblica hispana.
- source_word: אַרְבָּעִים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  english_pob_choice: forty thousand five hundred
  chosen_spanish: cuarenta mil quinientos
  alternatives_spanish:
  - '40.500'
  - cuarenta y cinco mil
  lexicon: HALOT
  rationale: El hebreo expresa la cifra de manera directa y compuesta. En español bíblico formal, escribirla con palabras preserva la dignidad del registro y evita ambigüedad numérica.
