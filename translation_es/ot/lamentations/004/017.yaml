translation:
  language: es
  text: Todavía nuestros ojos se consumían[a], esperando en vano nuestra ayuda; en nuestra espera vigilante[b], esperábamos a una nación que no podía salvar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se agotaban» o «fallaban». El verbo hebreo puede describir ojos gastados por la espera prolongada.
    reason: lexical_alternative
  - marker: b
    text: O «en nuestro observar» o «en nuestra vigilancia». El hebreo usa un sustantivo y un verbo de la misma raíz para expresar una espera atenta.
    reason: lexical_alternative
  - marker: c
    text: O «que no salvó». El hebreo puede entenderse como incapacidad o como fracaso en salvar.
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹד / Still
  english_pob_choice: Still
  chosen_spanish: Todavía
  alternatives_spanish:
  - Aún
  - Todavía,
  - Aún así
  lexicon: HALOT
  rationale: La partícula adverbial expresa continuidad de una condición lamentable; «Todavía» conserva la idea de persistencia sin añadir contraste no presente en el hebreo.
- source_word: תִּכְלֶינָה / failed, were exhausted
  english_pob_choice: failed
  chosen_spanish: se consumían
  alternatives_spanish:
  - se agotaban
  - fallaban
  - se gastaban
  lexicon: HALOT
  rationale: El verbo de כלה, aplicado a los ojos, comunica desgaste por انتظار/expectación prolongada. «Se consumían» conserva la imagen poética de desgaste y evita reducirla solo a un fallo funcional.
- source_word: עֵינֵינוּ / our eyes
  english_pob_choice: our eyes
  chosen_spanish: nuestros ojos
  alternatives_spanish:
  - nuestra vista
  lexicon: HALOT
  rationale: Se mantiene el sustantivo concreto del hebreo; la imagen corporal es central para la lamentación.
- source_word: אֶל־עֶזְרָתֵנוּ הָבֶל / looking in vain for our help
  english_pob_choice: looking in vain for our help
  chosen_spanish: buscando en vano nuestra ayuda
  alternatives_spanish:
  - en vano por nuestra ayuda
  - buscando nuestra ayuda inútilmente
  - buscando ayuda vana
  lexicon: HALOT
  rationale: La construcción comprimida se resuelve de forma natural en español manteniendo el sentido direccional de אֶל y la futilidad expresada por הבל.
- source_word: בְּצִפִּיָּתֵנוּ / in our watching
  english_pob_choice: in our watching
  chosen_spanish: en nuestra vigilia
  alternatives_spanish:
  - en nuestra espera
  - mientras vigilábamos
  - en nuestra expectativa
  lexicon: HALOT
  rationale: «Vigilia» conserva el campo semántico de צפיה como espera atenta o vigilante y enlaza bien con el verbo siguiente, sin perder el matiz nominal.
- source_word: צִפִּינוּ / we watched for
  english_pob_choice: we watched for
  chosen_spanish: vigilábamos
  alternatives_spanish:
  - esperábamos
  - acechábamos
  - observábamos
  lexicon: HALOT
  rationale: El verbo comparte raíz con el sustantivo precedente; «vigilábamos» reproduce la idea de expectativa atenta y preserva el juego verbal mejor que un simple «esperábamos».
- source_word: גּוֹי / a nation
  english_pob_choice: a nation
  chosen_spanish: a una nación
  alternatives_spanish:
  - a un pueblo
  lexicon: HALOT
  rationale: Se conserva el sentido político-colectivo del término en este contexto histórico de confianza puesta en una potencia extranjera.
- source_word: לֹא יוֹשִׁעַ / could not save
  english_pob_choice: could not save
  chosen_spanish: no podía salvar
  alternatives_spanish:
  - no salvaría
  - no salvaba
  - no podía librar
  lexicon: HALOT
  rationale: La negación con el imperfecto expresa incapacidad real de rescate en el marco del lamento retrospectivo; «salvar» mantiene el valor básico de ישׁע.
theological_decisions:
- issue: La fuerza de הבל aplicada a la ayuda esperada
  english_pob_reading: looking in vain for our help
  chosen_spanish_reading: buscando en vano nuestra ayuda
  alternative_spanish_readings:
  - buscando ayuda vana
  - buscando en vano ayuda
  rationale: Se conserva la tensión entre la ayuda deseada y su futilidad; no se domestica el término a una mera «ayuda inútil» sin resonancia poética.
  doctrine_reference: Suficiencia de la ayuda humana frente al juicio; cf. Lamentaciones 4:17.
- issue: El matiz de צפיה/צפה como espera vigilante
  english_pob_reading: in our watching we watched for
  chosen_spanish_reading: en nuestra vigilia vigilábamos
  alternative_spanish_readings:
  - en nuestra espera esperábamos
  - mientras esperábamos
  rationale: La repetición mantiene la intensificación hebrea y el paralelismo interno; no se diluye el juego verbal entre sustantivo y verbo.
  doctrine_reference: Lamentaciones 4:17; expectativa frustrada como rasgo del duelo nacional.
- issue: Capacidad o fracaso de la nación para salvar
  english_pob_reading: a nation that could not save
  chosen_spanish_reading: a una nación que no podía salvar
  alternative_spanish_readings:
  - a una nación que no salvaba
  - a una nación que no salvaría
  rationale: «No podía salvar» deja abierta la lectura de incapacidad, siguiendo la nota inglesa que admite incapacidad o fracaso, sin imponer una voluntad negativa no explícita.
  doctrine_reference: Lamentaciones 4:17; tensión entre incapacidad y fracaso en la liberación esperada.
translation_notes:
  revision_awareness: 'Esta línea sigue de cerca el consenso auditado del POB inglés: mantiene la secuencia adverbio + desgaste ocular + ayuda buscada en vano + vigilancia/espera repetida + nación incapaz de salvar. No se detectaron revisiones aplicadas en el pasaje fuente; la redacción española busca conservar la ambigüedad lexical documentada sin introducir interpretaciones nuevas.'
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» no aplicable aquí; no hay nombres divinos en el verso.
  - «Nación» se mantiene como término geopolítico coherente con el hebreo גוי y el audito inglés.
  - El paralelismo entre «vigilia» y «vigilábamos» intenta reflejar la repetición morfológica de צפיה/צפינו sin caer en una traducción mecánica.
  - La nota al pie marca la alternativa léxica principal para תִּכְלֶינָה, tal como el POB inglés preserva la ambigüedad entre agotamiento, fracaso y cese.
