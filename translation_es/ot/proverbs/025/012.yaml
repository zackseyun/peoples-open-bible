translation:
  language: es
  text: Como un anillo de oro y un ornamento de oro fino es el sabio que reprende a un oído atento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como un anillo de oro y joyería de oro fino es el sabio que reprende a un oído que oye». Los términos hebreos para las joyas son algo generales; «anillo» también puede entenderse como anillo para la nariz, y la frase final subraya la audición receptiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶזֶם
  english_pob_choice: ring
  chosen_spanish: anillo
  alternatives_spanish:
  - aro
  - anillo para la nariz
  - pendiente
  lexicon: HALOT
  rationale: נֶזֶם designa una joya circular o anillo ornamental; el POB inglés eligió 'ring' para no precisar nariz u oreja. En español, 'anillo' conserva esa amplitud y suena natural en la comparación proverbial.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro
  - oro
  lexicon: HALOT
  rationale: El sustantivo califica al anillo. 'De oro' es la forma española más fluida para el modificador material.
- source_word: וַחֲלִי
  english_pob_choice: and an ornament
  chosen_spanish: un ornamento
  alternatives_spanish:
  - una joya
  - un adorno
  - una pieza de joyería
  lexicon: HALOT
  rationale: חֲלִי es un término amplio para adorno o joya. 'Ornamento' mantiene el paralelismo con נֶזֶם y evita especificar indebidamente el tipo de joya.
- source_word: כָּתֶם
  english_pob_choice: fine gold
  chosen_spanish: fino oro
  alternatives_spanish:
  - oro fino
  - oro puro
  - oro escogido
  lexicon: HALOT
  rationale: כָּתֶם expresa oro de alta calidad o refinado. 'Fino oro' reproduce la valoración elevada y conserva el tono poético del paralelo.
- source_word: מוֹכִיחַ
  english_pob_choice: reprover
  chosen_spanish: reprensor
  alternatives_spanish:
  - reprendedor
  - corrector
  - amonestador
  lexicon: HALOT
  rationale: El participio de יכח aquí señala a quien corrige con reprobación. 'Reprensor' conserva el sentido disciplinario sin volverlo acusatorio, y encaja bien en el registro sapiencial.
- source_word: חָכָם
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - hábil
  - entendido
  lexicon: HALOT
  rationale: '''Sabio'' es la equivalencia directa y habitual en Proverbios para el sentido moral e intelectual del adjetivo.'
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: para
  alternatives_spanish:
  - a
  - sobre
  - hacia
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente usa una preposición de relación más amplia, en esta comparación la función es direccional hacia el receptor. 'Para' expresa en español la relación provechosa del reprensor con el oyente atento.
- source_word: אֹזֶן שֹׁמָעַת
  english_pob_choice: a listening ear
  chosen_spanish: un oído que escucha
  alternatives_spanish:
  - un oído atento
  - un oído que oye
  - una oreja oyente
  lexicon: HALOT
  rationale: La expresión hebrea enfatiza receptividad, no solo audición física. 'Oído que escucha' preserva la metáfora y el matiz de atención obediente con una formulación natural en español.
translation_notes:
  revision_awareness: La tradición inglesa del POB mantiene una comparación general ('ring' / 'ornament') sin precisar nariz u oreja, y destaca la receptividad del oyente. Esta versión española sigue esa decisión, conserva el paralelismo poético y evita una especificación no garantizada por el hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como default del proyecto no pertinente aquí.
  - Se eligió 'sabio'/'reprensor' para conservar el registro sapiencial y la fuerza correctiva del participio hebreo.
  - La línea inicial usa una comparación explícita con 'Como...', equivalente natural del hebreo sin perder el paralelismo.
  - '''Oído que escucha'' evita endurecer la imagen a una simple capacidad física de oír.'
