translation:
  language: es
  text: Hemos meditado en tu amor constante[a], oh Dios, en medio de tu templo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hemos pensado en» o «Hemos considerado». El verbo hebreo puede llevar la idea de ponderar o meditar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּמִּינוּ
  english_pob_choice: We have reflected
  chosen_spanish: Hemos meditado
  alternatives_spanish:
  - Hemos reflexionado
  - Hemos pensado en
  - Hemos considerado
  lexicon: HALOT
  rationale: El verbo en esta forma puede expresar ponderar, reflexionar o meditar. 'Hemos meditado' comunica bien la actividad contemplativa del contexto poético y cultual, sin volverla demasiado técnica ni perder la fuerza del perfectivo plural.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aquí funciona como vocativo directo. En español, 'oh Dios' conserva la dirección en forma de invocación y corresponde al valor exhortativo del contexto.
- source_word: חַסְדֶּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor leal
  alternatives_spanish:
  - tu amor constante
  - tu misericordia
  - tu bondad fiel
  - tu amor pactal
  lexicon: HALOT
  rationale: חֶסֶד tiene una carga de lealtad relacional y pactal que 'amor leal' expresa con naturalidad en español contemporáneo. 'Misericordia' sería demasiado estrecho; 'amor leal' conserva la constancia y el compromiso del término sin recurrir a una fórmula arcaica.
- source_word: בְּקֶרֶב
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en el centro de
  - dentro de
  lexicon: HALOT
  rationale: La locución expresa ubicación interior o central. 'En medio de' reproduce con claridad el sentido espacial y el tono poético del hebreo.
- source_word: הֵיכָלֶךָ
  english_pob_choice: your temple
  chosen_spanish: tu templo
  alternatives_spanish:
  - tu palacio
  - tu santuario
  lexicon: HALOT
  rationale: Aunque הֵיכָל puede significar 'palacio', en este salmo el marco de adoración favorece 'templo'. 'Tu templo' es la opción más clara y ajustada al contexto litúrgico.
theological_decisions:
- issue: Valor de חֶסֶד en relación con el carácter de Dios
  english_pob_reading: Rendered as 'steadfast love'
  chosen_spanish_reading: '''amor leal'''
  alternative_spanish_readings:
  - amor constante
  - misericordia
  - amor pactal
  rationale: La traducción busca mantener la densidad relacional y de fidelidad del término sin reducirlo a compasión únicamente. 'Amor leal' comunica bien la constancia comprometida que el hebreo sugiere en este contexto de alabanza.
  doctrine_reference: Translation philosophy §6; consistency of key terms §5
- issue: Función de אֱלֹהִים como vocativo
  english_pob_reading: 'Vocative: ''O God'''
  chosen_spanish_reading: 'Vocativo: ''oh Dios'''
  alternative_spanish_readings:
  - Dios
  rationale: El hebreo se entiende naturalmente como una dirección directa a Dios. Marcarlo como vocativo en español evita ambigüedad y mantiene la forma de oración o himno.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El texto inglés auditado ya había sido aprobado sin cambios relevantes; la versión española sigue de cerca esas decisiones léxicas, pero adapta 'steadfast love' a una expresión española más natural y fiel al peso de חֶסֶד en el contexto.
  spanish_consistency_notes:
  - Se mantiene 'Dios' como vocativo directo, no como sustituto reverencial genérico.
  - '''Amor leal'' se usa de manera consistente con la fuerza pactal/relacional de חֶסֶד en este verso.'
  - '''En medio de'' conserva la imagen espacial y litúrgica del lugar de adoración.'
  - Se evita 'Señor' porque el hebreo aquí usa אֱלֹהִים, no el tetragrámaton.
