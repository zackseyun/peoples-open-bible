id: GEN.6.11
reference: Genesis 6:11
source:
  edition: WLC
  text: וַ/תִּשָּׁחֵ֥ת הָ/אָ֖רֶץ לִ/פְנֵ֣י הָֽ/אֱלֹהִ֑ים וַ/תִּמָּלֵ֥א הָ/אָ֖רֶץ חָמָֽס׃
translation:
  text: Now the earth was corrupt before God[a], and the earth was filled with violence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land was corrupt in God's sight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשָּׁחֵת
  chosen: was corrupted
  alternatives:
  - was ruined
  - was destroyed
  - had become corrupt
  lexicon: HALOT
  rationale: From שׁחת in the Niphal/wayyiqtol, describing the state of the earth as spoiled or corrupted rather than an active transitive destruction here. 'Was corrupted' preserves the passive/resultative sense and fits the moral context leading into the flood narrative. 'Had become corrupt' is possible in English, but the simpler past better matches the Hebrew narrative sequence.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' In the flood context, the scope is cosmic/universal within the narrative, so 'the earth' is preferable to 'the land.' The repetition is retained for emphasis and fidelity to the Hebrew.
- source_word: לִפְנֵי הָאֱלֹהִים
  lemma: לִפְנֵי
  chosen: before God
  alternatives:
  - in God's sight
  - before the face of God
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before' or 'in the presence of.' 'Before God' is concise and natural while preserving the idea of divine evaluation. 'In God's sight' is interpretive and could be used, but 'before God' stays closer to the Hebrew.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים clearly refers to the one true God, not 'gods.' Standard singular rendering is required by context and syntax.
- source_word: וַתִּמָּלֵא
  chosen: was filled
  alternatives:
  - became full
  - was full
  lexicon: HALOT
  rationale: From מלא in the Niphal/wayyiqtol, indicating that the earth came to be filled. 'Was filled' best captures the passive verbal force and the narrative progression.
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - violence and injustice
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, brutality, or violent wrongdoing. 'Violence' is the most direct and established rendering here, preserving the severity of the corruption without over-expanding the term in the main text.
- source_word: וַ
  chosen: Now
  alternatives:
  - And
  - ''
  lexicon: Hebrew grammar
  rationale: The initial waw continues the narrative. 'Now' is a natural English discourse marker that signals progression without woodenly repeating 'and.' This is an optimal-equivalence choice for readability.
