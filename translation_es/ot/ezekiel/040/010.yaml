translation:
  language: es
  text: Y las cámaras del portal que daba hacia el oriente eran tres de este lado y tres de aquel lado[a]; las tres tenían una sola medida, y los pilares laterales[b] tenían una sola medida de este lado y de aquel lado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuartos laterales» para תָאֵי; el hebreo designa pequeñas cámaras integradas en la estructura del portal.
    reason: lexical_alternative
  - marker: b
    text: O «jambas» o «pilastras» para «pilares laterales»; el término arquitectónico exacto en la visión de Ezequiel es discutido.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָאֵי
  english_pob_choice: guardrooms
  chosen_spanish: cámaras
  alternatives_spanish:
  - cámaras de guardia
  - cuartos laterales
  - alcobas
  lexicon: HALOT
  rationale: El término describe pequeños cuartos incorporados a la estructura del portal. En español, «cámaras» comunica bien el sentido arquitectónico sin imponer una función más específica de la que el hebreo explicita. Mantiene la neutralidad de la nota inglesa, donde se reconoce la alternativa funcional/estructural.
- source_word: הַשַּׁעַר
  english_pob_choice: the gate
  chosen_spanish: el portal
  alternatives_spanish:
  - la puerta
  - la entrada
  lexicon: HALOT
  rationale: En este contexto visionario-architectónico, «portal» suena natural y sigue refiriéndose a la estructura de acceso completa, no solo a una hoja de puerta. «Puerta» sería posible, pero menos preciso para la descripción del complejo.
- source_word: דֶּרֶךְ הַקָּדִים
  english_pob_choice: facing east
  chosen_spanish: que daba hacia el oriente
  alternatives_spanish:
  - que miraba al oriente
  - orientado al este
  - hacia el oriente
  lexicon: HALOT
  rationale: La expresión hebrea indica orientación. «Que daba hacia el oriente» conserva esa relación espacial en un español claro y digno. Se evita una calca rígida de «cara al oriente» por sonar menos natural aquí.
- source_word: שְׁלֹשָׁה מִפֹּה וּשְׁלֹשָׁה מִפֹּה
  english_pob_choice: three on this side and three on that side
  chosen_spanish: tres de este lado y tres de aquel lado
  alternatives_spanish:
  - tres aquí y tres allí
  - tres en un lado y tres en el otro
  lexicon: HALOT
  rationale: La fórmula deíctica hebrea pide una correspondencia simétrica. «De este lado... de aquel lado» preserva la repetición y el balance del original, de manera muy cercana al audit trail inglés.
- source_word: מִדָּה אַחַת לִשְׁלָשְׁתָּם
  english_pob_choice: the three of them had one measure
  chosen_spanish: las tres tenían una sola medida
  alternatives_spanish:
  - las tres tenían la misma medida
  - una medida para las tres
  lexicon: HALOT
  rationale: El hebreo subraya uniformidad dimensional. «Una sola medida» conserva la literalidad funcional de «one measure» y su fuerza arquitectónica, sin volverla demasiado técnica ni demasiado libre.
- source_word: אֵילִם
  english_pob_choice: side pillars
  chosen_spanish: pilares laterales
  alternatives_spanish:
  - jambas
  - pilastras
  - pilares del lado
  lexicon: HALOT
  rationale: El término es arquitectónico y debatido. «Pilares laterales» mantiene la referencia a soportes estructurales sin decidir en exceso entre «jambas» o «pilastras», tal como la nota inglesa conserva alternativas. En español, es una opción clara y amplia.
- source_word: וּמִדָּה אַחַת לָאֵילִם מִפֹּה וּמִפּוֹ
  english_pob_choice: the side pillars had one measure on this side and on that side
  chosen_spanish: los pilares laterales tenían una sola medida de este lado y de aquel lado
  alternatives_spanish:
  - los pilares laterales tenían la misma medida a ambos lados
  - una sola medida para los pilares laterales de un lado y del otro
  lexicon: HALOT
  rationale: Se preserva la simetría del hebreo y la reiteración de medida uniforme aplicada a los soportes. «De este lado y de aquel lado» replica el paralelismo de los deícticos del original y coincide con la cadencia de la POB inglesa.
translation_notes:
  revision_awareness: La revisión inglesa más reciente indica que no hubo cambios necesarios; por eso el borrador español sigue de cerca la solución auditada en inglés, conservando la simetría arquitectónica, la orientación hacia el oriente y la nota de incertidumbre lexical en los elementos estructurales.
  spanish_consistency_notes:
  - Se mantiene «oriente» como equivalente estándar de «east» en un registro bíblico natural.
  - Se usa «portal» para la estructura de acceso completa y «cámaras» para los espacios interiores, evitando confundirlos.
  - La repetición de «una sola medida» y «de este lado y de aquel lado» conserva el paralelismo del hebreo.
  - No se introduce terminología eclesiástica ni doctrinal ajena al texto arquitectónico.
