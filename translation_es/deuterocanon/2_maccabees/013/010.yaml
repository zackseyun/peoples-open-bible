revisions:
- from: Y cuando Judas supo estas cosas, mandó a la multitud que, de día y de noche, invocaran al Señor, para que, así como en otros tiempos, ahora también viniera en su ayuda.
  to: Y cuando Judas supo estas cosas, mandó a la multitud invocar al Señor día y noche, para que, así como en otros tiempos, ahora también viniera en su ayuda.
  rationale: Se ajusta la sintaxis para eliminar la discordancia entre «la multitud» y «invocaran», manteniendo fielmente el sentido de una orden dada al conjunto del pueblo. También se adopta «día y noche», más natural en español y plenamente equivalente al griego.
