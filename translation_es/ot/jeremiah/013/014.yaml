  rationale: Se corrigió la ubicación de la nota cultural para que ancle donde corresponde, y se ajustó la redacción a un español más natural. También se reemplazó 'padres y hijos' por 'padres y sus hijos' para reflejar mejor el hebreo auditado 'fathers and sons' sin introducir una expresión artificiosa. Se mantuvo 'Yahvé' y la tríada de no-clemencia conforme a la política del proyecto.
