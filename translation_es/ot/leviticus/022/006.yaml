translation:
  language: es
  text: La persona que lo toque quedará impura hasta el atardecer, y no comerá de las cosas santas[a], a menos que haya lavado su cuerpo con agua[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las ofrendas sagradas» / «de las cosas consagradas».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «haya lavado su carne en agua».
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  english_pob_choice: person
  chosen_spanish: la persona
  alternatives_spanish:
  - el alma
  - cualquiera
  lexicon: HALOT
  rationale: En este contexto legal, נֶפֶשׁ designa a un individuo humano, no el “alma” inmaterial. “La persona” conserva el valor jurídico y suena natural en español.
- source_word: אֲשֶׁר תִּגַּע בּוֹ
  english_pob_choice: who touches it
  chosen_spanish: que lo toque
  alternatives_spanish:
  - que lo toca
  - que toque eso
  lexicon: HALOT
  rationale: La relativa funciona como condición general. “Lo” mantiene el referente impersonal del objeto causante de impureza y evita introducir un sujeto masculino donde no lo exige el hebreo.
- source_word: וְטָמְאָה
  english_pob_choice: shall be unclean
  chosen_spanish: quedará impura
  alternatives_spanish:
  - será impura
  - estará impura
  lexicon: HALOT
  rationale: “Quedará impura” expresa bien el estado resultante en registro legal. “Impura” refleja el sentido ritual de טָמֵא sin volverlo moral.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la noche
  alternatives_spanish:
  - hasta el atardecer
  - hasta la tarde
  lexicon: HALOT
  rationale: En español bíblico actual, “la noche” comunica el límite temporal de forma clara y natural. Se evita una perífrasis que sonaría pesada; el hebreo marca el final del período diario de impureza ritual.
- source_word: מִן הַקֳּדָשִׁים
  english_pob_choice: any of the holy things
  chosen_spanish: de las cosas santas
  alternatives_spanish:
  - de los objetos santos
  - de las cosas consagradas
  - de las ofrendas sagradas
  lexicon: HALOT
  rationale: Se mantiene el sustantivo plural concreto del hebreo. “Cosas santas” preserva la amplitud del término y la ambigüedad deliberada entre cosas consagradas y ofrendas, sin cerrarla prematuramente.
- source_word: כִּי אִם
  english_pob_choice: unless
  chosen_spanish: sino cuando
  alternatives_spanish:
  - a menos que
  - excepto cuando
  - salvo cuando
  lexicon: HALOT
  rationale: Aquí la construcción introduce una excepción condicional previa al comer. “Sino cuando” refleja bien la restricción legal y enlaza de modo fluido con la cláusula siguiente.
- source_word: רָחַץ בְּשָׂרוֹ בַּמָּיִם
  english_pob_choice: he has washed his body with water
  chosen_spanish: haya lavado su cuerpo con agua
  alternatives_spanish:
  - haya lavado su carne con agua
  - se haya lavado con agua
  - haya bañado su cuerpo en agua
  lexicon: HALOT
  rationale: בָּשָׂר literalmente es “carne”, pero en esta fórmula ritual funciona idiomáticamente como el cuerpo. “Haya lavado su cuerpo con agua” conserva la acción concreta y su uso idiomático, en español claro.
theological_decisions:
- issue: Impureza ritual vs. impureza moral
  english_pob_reading: ritual uncleanness
  chosen_spanish_reading: impureza ritual
  alternative_spanish_readings:
  - impureza moral
  - contaminación moral
  rationale: El contexto trata de elegibilidad para comer cosas santas después de un contacto impuro y lavamiento. “Impura” se usa en sentido ritual, sin añadir culpa moral que el texto no menciona.
  doctrine_reference: Levítico 22:1-16; pureza cultual en la Torá
- issue: Alcance de “las cosas santas”
  english_pob_reading: holy things / sacred offerings / consecrated things
  chosen_spanish_reading: las cosas santas
  alternative_spanish_readings:
  - las ofrendas sagradas
  - las cosas consagradas
  rationale: El hebreo permite una referencia amplia a elementos apartados para uso santo. “Las cosas santas” conserva esa amplitud, como la versión inglesa POB, y no fuerza una identificación exclusiva con ofrendas.
  doctrine_reference: Levítico 22:2-16; bienes consagrados al culto
translation_notes:
  revision_awareness: 'La versión inglesa POB revisada mantiene una lectura legal y ritual: נֶפֶשׁ = “person”, טָמֵא = “unclean” en sentido ritual, מִן הַקֳּדָשִׁים como partitivo amplio, y רָחַץ בְּשָׂרוֹ בַּמָּיִם como un modismo corporal. La redacción española conserva esas decisiones, evita moralizar la impureza y mantiene abierta la ambigüedad de קֳדָשִׁים entre “cosas santas” y “ofrendas sagradas”.'
  spanish_consistency_notes:
  - Se usa “impura” para טָמֵא en sentido ritual, coherente con otros textos levíticos.
  - Se prefiere “cosas santas” como equivalente base de הַקֳּדָשִׁים, con nota de alternativa léxica.
  - Se evita “SEÑOR” u otras convenciones de sustitución porque este verso no contiene el Tetragrámaton.
  - La cláusula final conserva el subjuntivo perfecto español (“haya lavado”) para reflejar la condición previa a comer.
