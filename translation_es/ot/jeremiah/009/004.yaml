    issue: La frase 'han enseñado a su lengua a hablar mentira' es poco idiomática en español.
    rationale: Aunque comprensible, 'hablar mentira' suena más forzado que 'hablar falsedad' o 'decir mentiras'. Dado que el POB inglés escogió 'falsehood' por su tono más formal y amplio, 'falsedad' preserva mejor tanto el matiz como la dignidad del registro profético.
  revised_spanish_text: Y cada hombre engaña a su prójimo[a], y no hablan verdad; han enseñado a su lengua a hablar falsedad; se fatigan cometiendo iniquidad[b].
