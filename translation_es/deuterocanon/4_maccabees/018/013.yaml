translation:
  language: es
  text: Y también glorificó a Daniel en el pozo[a] de los leones, y también lo llamó bienaventurado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la cueva de los leones». El griego dice literalmente «en el pozo de los leones».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδόξαζεν
  english_pob_choice: glorified
  chosen_spanish: glorificó
  alternatives_spanish:
  - honró
  - ensalzó
  lexicon: BDAG
  rationale: δοξάζω puede significar glorificar, honrar o alabar. Conservé «glorificó» porque sigue la elevación retórica del griego y refleja mejor el tono encomiástico del pasaje que un simple «honró».
- source_word: ἐν λάκκῳ λεόντων
  english_pob_choice: in the lions’ pit
  chosen_spanish: en el pozo de los leones
  alternatives_spanish:
  - en la cueva de los leones
  - en la fosa de los leones
  lexicon: LSJ
  rationale: λάκκος significa literalmente pozo, fosa o cisterna. «Pozo» mantiene la imagen concreta del griego mejor que la fórmula más idiomática «cueva/den», y sigue siendo natural en español.
- source_word: ἐμακάριζεν
  english_pob_choice: called blessed
  chosen_spanish: llamó bienaventurado
  alternatives_spanish:
  - consideró bienaventurado
  - declaró bienaventurado
  lexicon: BDAG
  rationale: μακαρίζω expresa llamar o tener por bienaventurado. «Llamó bienaventurado» conserva la fuerza verbal sin convertirla en un adjetivo suelto ni introducir un matiz litúrgico ajeno al texto.
- source_word: καὶ ... καί
  english_pob_choice: also ... also
  chosen_spanish: y también ... también
  alternatives_spanish:
  - e incluso ... también
  - también ... y también
  lexicon: LSJ
  rationale: La repetición de καί añade énfasis acumulativo. «Y también ... también» conserva ese efecto sin endurecer la frase.
- source_word: ὃν
  english_pob_choice: whom
  chosen_spanish: a quien
  alternatives_spanish:
  - quien
  - al cual
  lexicon: BDAG
  rationale: El relativo retoma a Daniel e introduce el segundo predicado. «A quien» mantiene claridad sintáctica en español y un registro algo elevado acorde con el pasaje.
theological_decisions:
- issue: Lenguaje de exaltación dirigido a Daniel
  english_pob_reading: The verse states that the subject glorified and called Daniel blessed, using elevated honor language without implying worship.
  chosen_spanish_reading: El verso dice que el sujeto glorificó a Daniel y lo llamó bienaventurado, con lenguaje de honor elevado, sin implicar adoración.
  alternative_spanish_readings:
  - honró a Daniel
  - lo alabó
  rationale: En español, «glorificó» puede sonar fuertemente teológico; sin embargo, el griego usa un lenguaje de alabanza encomiástica aplicado a una figura humana. Mantenerlo preserva la tensión del original y evita suavizar indebidamente la fuerza retórica.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: El contexto inglés no requirió revisión adicional; se mantiene la lectura de alta concordancia y la opción léxica principal «glorificó» con la nota alternativa sobre λάκκος.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» según norma del proyecto, aunque este versículo no los menciona.
  - Se conserva un registro bíblico elevado y natural en español, evitando tanto el calco rígido como la paráfrasis.
  - La nota de pie acompaña solo la alternativa léxica realmente documentada en el audit trail.
