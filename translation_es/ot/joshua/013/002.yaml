translation:
  language: es
  text: 'Esta es la tierra que queda: todos los distritos de los filisteos[a], y todos los gesuritas[b]—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «regiones» para «distritos» (hebreo גְּלִילוֹת). El término se refiere a áreas territoriales asociadas con los filisteos.
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa una forma gentilicia singular colectiva. «Los gesuritas» expresa ese sentido colectivo en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esta
  lexicon: HALOT
  rationale: El demostrativo femenino singular introduce la cláusula de manera presentativa. En español, "Esta es" conserva mejor la fuerza presentativa y la sintaxis natural que un simple "Esta".
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra/territorio
  - el territorio
  lexicon: HALOT
  rationale: En un contexto de reparto territorial, "tierra" es natural en español y preserva el sentido geográfico de אֶרֶץ sin volverse técnico o frío.
- source_word: הַנִּשְׁאָרֶת
  english_pob_choice: that remains
  chosen_spanish: que queda
  alternatives_spanish:
  - que permanece
  - restante
  lexicon: HALOT
  rationale: El participio nifal expresa lo que todavía no ha sido ocupado o asignado. "Que queda" suena natural en español y mantiene la idea de territorio restante.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos los
  alternatives_spanish:
  - todo
  - la totalidad de los
  lexicon: HALOT
  rationale: El cuantificador plural concuerda con los sustantivos siguientes en español. "Todos los" reproduce el valor distributivo sin sobrecargar la frase.
- source_word: גְּלִילוֹת
  english_pob_choice: districts
  chosen_spanish: distritos
  alternatives_spanish:
  - regiones
  - círculos
  - bordes
  lexicon: HALOT
  rationale: El término apunta a áreas territoriales asociadas con los filisteos. "Distritos" comunica bien la idea administrativa/geográfica que el inglés POB documentó.
- source_word: הַפְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - Filistea
  - de los filisteos
  lexicon: HALOT
  rationale: El hebreo nombra al pueblo, no directamente la tierra. En español, el genitivo se expresa naturalmente con "de los filisteos"; aquí se integra como complemento del sustantivo territorial, manteniendo la relación posesiva implícita.
- source_word: הַגְּשׁוּרִי
  english_pob_choice: the Geshurites
  chosen_spanish: los gesureos
  alternatives_spanish:
  - el gesureo
  - los gesuritas
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular gentilicia, funciona colectivamente. "Los gesureos" conserva el valor colectivo en paralelo con "los filisteos" y evita una forma demasiado singularizada.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo WLC y coincide sustancialmente con la solución auditada en inglés: presente presentativo, territorio restante, distritos territoriales, y etnónimos colectivos. Se conservó la ambigüedad léxica de גְּלִילוֹת mediante una nota alternativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo exige explícitamente; aquí no aparece el Tetragrámaton.
  - Se prefirió «la tierra»/«la tierra que queda» frente a «país» o «territorio» para mantener el registro bíblico y el marco de reparto de la tierra.
  - «Filisteos» y «gesureos» se emplean como etnónimos plurales naturales en español para reflejar el sentido colectivo del hebreo.
