translation:
  language: es
  text: Cuando los amonitas vieron que Aram había huido[a], ellos también huyeron ante Abisai, su hermano[b], y entraron en la ciudad. Entonces Joab llegó a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'Aram'; aquí se refiere a las fuerzas arameas, tradicionalmente traducidas 'los sirios'.
    reason: lexical_alternative
  - marker: b
    text: O 'Abisai, su hermano', es decir, el hermano de Joab.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Amón
  - el pueblo de Amón
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática de pertenencia/nacionalidad. En español, el etnónimo plural 'los amonitas' comunica de forma natural el referente colectivo sin perder precisión.
- source_word: רָאוּ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - percibieron
  - se dieron cuenta
  lexicon: HALOT
  rationale: El verbo básico es 'ver'. Aquí introduce la percepción de un hecho de guerra, por lo que 'vieron' es directo y fiel.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: 'Introduce el contenido de lo visto: ''que Aram había huido''. En español, ''que'' conserva mejor la estructura informativa del hebreo.'
- source_word: נָס
  english_pob_choice: had fled
  chosen_spanish: había huido
  alternatives_spanish:
  - huyó
  - estaba huyendo
  lexicon: HALOT
  rationale: El valor perfecto del hebreo se refleja mejor con pluscuamperfecto en español, porque la huida de Aram antecede a la reacción de los amonitas.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - los arameos
  - Siria
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado. Esto sigue la decisión POB de no sustituir el nombre hebreo por el etiquetado geopolítico tradicional 'Siria'.
- source_word: וַיָּנוּסוּ גַם הֵם
  english_pob_choice: they also fled
  chosen_spanish: ellos también huyeron
  alternatives_spanish:
  - también huyeron
  - huyeron asimismo
  lexicon: HALOT
  rationale: La secuencia narrativa se mantiene con un pretérito simple, y 'también' reproduce el énfasis comparativo de גַם הֵם.
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - de delante de
  lexicon: HALOT
  rationale: En contexto militar, la expresión indica retirada ante un adversario. 'Delante de' es natural en español y preserva la relación espacial/relacional del hebreo sin sobreinterpretar.
- source_word: אַבְשַׁי אָחִיו
  english_pob_choice: Abishai his brother
  chosen_spanish: Abisai, su hermano
  alternatives_spanish:
  - Abisai, hermano de Joab
  - Abisai, su hermano
  lexicon: HALOT
  rationale: Se mantiene la referencia anafórica del sufijo posesivo como en el inglés POB. La coma es opcional; aquí ayuda a la lectura en español sin alterar el vínculo de parentesco.
- source_word: וַיָּבֹאוּ הָעִירָה
  english_pob_choice: entered the city
  chosen_spanish: entraron en la ciudad
  alternatives_spanish:
  - se metieron en la ciudad
  - fueron a la ciudad
  lexicon: HALOT
  rationale: El sufijo direccional de עִירָה indica movimiento hacia el interior de la ciudad. 'Entraron en la ciudad' preserva esa dirección de manera natural.
- source_word: וַיָּבֹא יוֹאָב יְרוּשָׁלִָם
  english_pob_choice: Then Joab came to Jerusalem
  chosen_spanish: Entonces Joab llegó a Jerusalén
  alternatives_spanish:
  - Y Joab llegó a Jerusalén
  - Luego Joab vino a Jerusalén
  lexicon: HALOT
  rationale: El waw consecutivo sigue la secuencia narrativa; 'Entonces' marca la progresión. 'Llegó' es idiomático en español para el arribo a una ciudad.
theological_decisions:
- issue: Identidad de Aram
  english_pob_reading: '''Aram'' is retained in the main text, with a note that it refers to the Aramean forces traditionally rendered ''the Syrians.'''
  chosen_spanish_reading: Se conserva 'Aram' en el texto principal, con nota explicativa sobre los arameos.
  alternative_spanish_readings:
  - '''los sirios'''
  - '''Siria'''
  rationale: La tradición castellana suele decir 'sirios', pero el proyecto POB privilegia el nombre hebreo cuando eso evita aplanar la referencia histórica y etnolingüística. La nota permite reconocer la equivalencia tradicional sin reemplazar el término fuente.
  doctrine_reference: Ninguna; decisión histórico-lingüística.
- issue: Referencia de 'su hermano'
  english_pob_reading: Abishai his brother, that is, Joab's brother.
  chosen_spanish_reading: '''Abisai, su hermano'' mantiene la referencia relacional al contexto narrativo; la nota aclara que se trata del hermano de Joab.'
  alternative_spanish_readings:
  - '''Abisai, hermano de Joab'''
  - '''Abisai, el hermano de Joab'''
  rationale: El hebreo deja el posesivo sin repetir el nombre de Joab. En español, la forma más natural y fiel es conservar la anáfora, mientras la nota resuelve la posible ambigüedad.
  doctrine_reference: Ninguna; decisión de cohesión referencial.
translation_notes:
  revision_awareness: 'Coincide plenamente con el pasaje base y con el audit trail inglés: se conservan Aram, el valor perfectivo de ''had fled'' y la ambigüedad referencial de ''his brother'' mediante nota. No se registran revisiones aplicadas en el expediente inglés.'
  spanish_consistency_notes:
  - Se usa 'Aram' de forma consistente para el nombre del grupo/entidad del hebreo, evitando 'Siria' en el texto principal.
  - '''Abisai'' sigue la grafía castellana usual del nombre propio, manteniendo la relación con Joab según el contexto.'
  - Se evita una paráfrasis expansiva; la línea sigue de cerca la secuencia narrativa del hebreo y del inglés auditado.
