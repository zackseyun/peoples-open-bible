  - severity: low
    issue: '''Conozcamos'' es menos preciso que una forma de ''saber'' en este contexto'
    rationale: ἐπιγνῶμεν aquí se refiere a enterarse o averiguar la intención de la otra parte. 'Sepamos' suena más natural y específico en español para recibir esa información.
