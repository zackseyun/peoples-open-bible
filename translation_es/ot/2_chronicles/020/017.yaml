revisions:
- from: No les corresponde pelear en esta batalla[a]. Tomen sus posiciones, manténganse firmes y vean la salvación de Yahvé con ustedes, oh Judá y Jerusalén. No teman ni se desalienten. Mañana salgan delante de ellos[b], y Yahvé está con ustedes.
  to: No tienen que pelear en esta batalla[a]. Tomen sus posiciones, quédense quietos y vean la salvación de Yahvé con ustedes, oh Judá y Jerusalén. No teman ni se desalienten. Mañana salgan delante de ellos[b], y Yahvé está con ustedes.
  rationale: 'Se ajusta la primera cláusula para reflejar mejor el sentido contextual de que Judá no tendrá que combatir, en línea con la decisión documentada del POB inglés. También se cambia «manténganse firmes» por «quédense quietos» para conservar mejor el valor consecutivo de los imperativos: tomar posición, quedarse sin intervenir y contemplar la salvación de Yahvé. Se mantienen las notas ya justificadas y la terminología del proyecto.'
