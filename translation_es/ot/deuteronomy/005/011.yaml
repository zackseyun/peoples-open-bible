translation:
  language: es
  text: No tomarás el nombre de Yahvé tu Dios en vano[a], porque Yahvé no tendrá por inocente[b] al que tome su nombre en vano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para falsedad», «de manera indebida» o «para lo vacío». El hebreo puede incluir un uso falso, vacío o incorrecto del nombre de Yahvé, no solo una clase específica de abuso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no dejará sin castigo»; «no absolverá»; «no tendrá por inocente». La expresión hebrea tiene un sentido forense de no declarar libre de culpa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשָּׂא / יִשָּׂא (נשא)
  english_pob_choice: take
  chosen_spanish: tomarás / tome
  alternatives_spanish:
  - levantarás / levante
  - llevarás / lleve
  - portarás / porte
  lexicon: HALOT
  rationale: El hebreo נָשָׂא tiene un rango amplio, pero en esta prohibición con שֵׁם y לַשָּׁוְא la fórmula idiomática natural en español es «tomar el nombre ... en vano». «Tomar» conserva la amplitud del original sin estrecharlo solo a juramentos falsos.
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - reputación
  - autoridad
  - identidad
  lexicon: HALOT
  rationale: «Nombre» es la correspondencia directa y mantiene la fuerza bíblica del término sin explicitar una glosa interpretativa que el texto no añade.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración, conforme al criterio de la POB, y no se sustituye por un título como «SEÑOR». En español, «Yahvé» es la forma establecida en este proyecto para יְהוָה.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu divinidad
  lexicon: HALOT
  rationale: La construcción de alianza en segunda persona singular se vierte de forma directa y natural con «tu Dios».
- source_word: לַשָּׁוְא
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - para falseedad
  - para falsedad
  - para lo vacío
  - sin propósito
  lexicon: HALOT
  rationale: «En vano» reproduce el modismo español equivalente y preserva la amplitud semántica de שָׁוְא (vacío, falsedad, inutilidad, uso indebido) sin reducirlo a una sola clase de abuso.
- source_word: יְנַקֶּה (נקה)
  english_pob_choice: will not leave unpunished
  chosen_spanish: no tendrá por inocente
  alternatives_spanish:
  - no dejará sin castigo
  - no absolverá
  - no lo considerará inocente
  lexicon: HALOT
  rationale: La forma hebrea expresa exención de culpa ante juicio. «No tendrá por inocente» es una fórmula bíblica clara en español y refleja el sentido forense de נקה, aunque «no dejará sin castigo» también sería posible.
- source_word: אֲשֶׁר
  english_pob_choice: the one who
  chosen_spanish: al que
  alternatives_spanish:
  - al que sea
  - quien
  - el que
  lexicon: HALOT
  rationale: La construcción relativa genérica se expresa de manera natural con «al que», que mantiene el valor distributivo y jurídico del hebreo.
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su nombre propio
  - su nombre divino
  lexicon: HALOT
  rationale: El posesivo remite a Yahvé; en español «su nombre» conserva la referencia sin sobreexplicar, y enlaza con «el nombre de Yahvé» del inicio.
theological_decisions:
- issue: Forma de traducir el Tetragrámaton
  english_pob_reading: Yahweh rather than 'the LORD'
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo contiene יְהוָה de manera directa. Se mantiene el nombre propio de Dios para preservar la transparencia del texto y la distinción entre nombre y título, siguiendo la línea auditada de la POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de la prohibición
  english_pob_reading: retain the idiom 'take the name ... in vain' in the main text
  chosen_spanish_reading: «No tomarás el nombre ... en vano»
  alternative_spanish_readings:
  - No usarás el nombre ... para falsedad
  - No pronunciarás el nombre ... en vano
  - No llevarás el nombre ... en vano
  rationale: El hebreo puede abarcar juramento falso, uso vacío o manipulación indebida del nombre divino. La redacción principal conserva el modismo tradicional en español y, a la vez, no cierra el sentido a una sola práctica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Valor judicial de נקה
  english_pob_reading: will not leave unpunished / will not hold guiltless / will not acquit
  chosen_spanish_reading: no tendrá por inocente
  alternative_spanish_readings:
  - no dejará sin castigo
  - no absolverá
  - no lo declarará inocente
  rationale: 'Se preserva el matiz forense del verbo: Yahvé no declarará inocente al transgresor. La formulación elegida suena bíblica y precisa en español sin perder la fuerza de juicio.'
  doctrine_reference: HALOT; uso forense de נקה
- issue: Extensión semántica de לַשָּׁוְא
  english_pob_reading: in vain; falsehood, wrongfully, or emptily
  chosen_spanish_reading: en vano
  alternative_spanish_readings:
  - para falsedad
  - para lo vacío
  - para lo inútil
  - de manera indebida
  rationale: En español, «en vano» cubre bien la gama de vacío, falsedad y inutilidad. Las alternativas se preservan en nota para no restringir indebidamente el hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La versión coincide con el último pase de revisión: no se requieren cambios adicionales. Se mantuvo la decisión auditada de preservar el modismo «tomar ... en vano», la transliteración del nombre divino como «Yahvé» y el matiz forense de יְנַקֶּה sin resolver la amplitud semántica de שָׁוְא.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «nombre» en ambas apariciones de שֵׁם / שְׁמוֹ para evitar glosas interpretativas.
  - «En vano» funciona como equivalente idiomático de la fórmula bíblica, con la amplitud semántica aclarada en nota.
  - El cambio de persona verbal de «tomarás» a «tome» refleja la transición entre la prohibición general y la cláusula relativa del hebreo.
