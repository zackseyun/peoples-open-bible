translation:
  language: es
  text: 'Y ella les dijo: «Así dice Yahvé, el Dios de Israel: “Digan al hombre que los envió a mí”».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: And she said
  chosen_spanish: Y ella les dijo
  alternatives_spanish:
  - Entonces ella les dijo
  lexicon: HALOT
  rationale: El wayyiqtol introduce la respuesta de Huldá en secuencia narrativa. «Y ella les dijo» conserva el orden narrativo sin añadir matiz temporal más fuerte del que exige el hebreo.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El complemento pronominal plural se expresa de forma natural en español con «les», manteniendo que la respuesta va dirigida a la delegación.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética se vierte con un presente proclámico natural en español. «Así dice» preserva el carácter de mensajero sin recargar el registro.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración de יְהוָה, conforme a la terminología base del proyecto en español, en vez de sustituirlo por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa se traduce de manera directa y transparente. «El Dios de Israel» identifica al Dios del pacto sin introducir glosa adicional.
- source_word: אִמְרוּ
  english_pob_choice: Say
  chosen_spanish: Decid
  alternatives_spanish:
  - Hablad
  - Decidle
  lexicon: HALOT
  rationale: El imperativo plural se conserva en español con «Decid», dirigido a la delegación. Mantiene el carácter formal de la instrucción profética.
- source_word: לָאִישׁ
  english_pob_choice: to the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a ese hombre
  - a aquel hombre
  lexicon: HALOT
  rationale: אִישׁ es masculino singular y el contexto apunta a un individuo concreto. «Al hombre» preserva la referencia personal y la fuerza léxica sin neutralización.
- source_word: אֲשֶׁר שָׁלַח אֶתְכֶם אֵלַי
  english_pob_choice: who sent you to me
  chosen_spanish: que os envió a mí
  alternatives_spanish:
  - que os mandó a mí
  - que os envió
  lexicon: HALOT
  rationale: La relativa se traduce de forma natural y directa. «A mí» conserva el destino de la delegación en el discurso de Huldá.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El hebreo usa el Tetragrámaton directamente. En español se conserva el nombre propio «Yahvé» para mantener la distinción entre el nombre revelado y un título sustituto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Noun אִישׁ as a gendered singular reference
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la persona
  rationale: El sustantivo hebreo es masculino singular y refiere a un individuo específico. Se preserva esa referencia con «el hombre» en lugar de neutralizarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el trail auditado en inglés y no requiere revisión adicional respecto del packet fuente: la fórmula profética, el nombre divino y el singular masculino de אִישׁ quedan preservados sin desplazar el sentido del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el registro profético con «Así dice».
  - Se mantiene el plural de destinatarios en «les/Decid».
  - No se añade puntuación explicativa que no esté sustentada por el hebreo.
