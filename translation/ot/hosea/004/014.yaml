id: HOS.4.14
reference: Hosea 4:14
source:
  edition: WLC
  text: לֹֽא אֶפְק֨וֹד עַל בְּנוֹתֵי/כֶ֜ם כִּ֣י תִזְנֶ֗ינָה וְ/עַל כַּלּֽוֹתֵי/כֶם֙ כִּ֣י תְנָאַ֔פְנָה כִּי הֵם֙ עִם הַ/זֹּנ֣וֹת יְפָרֵ֔דוּ וְ/עִם הַ/קְּדֵשׁ֖וֹת יְזַבֵּ֑חוּ וְ/עָ֥ם לֹֽא יָבִ֖ין יִלָּבֵֽט־־־־־־־׃
translation:
  text: I will not punish your daughters when they prostitute themselves[a], nor your daughters-in-law when they commit adultery; for the men themselves go apart with prostitutes and sacrifice with cult prostitutes[c][b], and a people without understanding comes to ruin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'consort with prostitutes' for 'go apart with prostitutes.' The Hebrew verb is literally 'separate themselves/go apart.'
    reason: lexical_alternative
  - marker: b
    text: Or 'temple prostitutes' for 'cult prostitutes.' The Hebrew refers to women associated with illicit cultic sexual practice.
    reason: lexical_alternative
  - marker: c
    text: The final verb is rare and may mean 'be thrown down,' 'be confounded,' or more generally 'come to ruin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְק֨וֹד
  chosen: I will not punish
  alternatives:
  - I will not visit
  - I will not call to account
  lexicon: HALOT
  rationale: פקד with עַל in a judgment context commonly means to attend to for punishment or to call to account. 'Punish' gives the plain judicial sense in modern English better than the more opaque 'visit.'
- source_word: בְּנוֹתֵיכֶם
  chosen: your daughters
  lexicon: HALOT
  rationale: Straightforward familial term; retained literally.
- source_word: תִזְנֶינָה
  chosen: prostitute themselves
  alternatives:
  - play the whore
  - commit sexual immorality
  lexicon: HALOT
  rationale: זנה here denotes illicit sexual behavior, and in Hosea often carries prostitution imagery. 'Prostitute themselves' preserves the force more concretely than the broader 'commit sexual immorality,' while avoiding archaic phrasing.
- source_word: כַּלּוֹתֵיכֶם
  chosen: your daughters-in-law
  alternatives:
  - your brides
  lexicon: HALOT
  rationale: כלה in this relational plural construct refers to sons' wives, not merely brides in a wedding setting.
- source_word: תְנָאַפְנָה
  chosen: commit adultery
  lexicon: HALOT
  rationale: נאף specifically denotes adultery, so the more precise English term should be kept distinct from זנה.
- source_word: יְפָרֵדוּ
  chosen: go apart
  alternatives:
  - separate themselves
  - consort
  lexicon: HALOT
  rationale: The verb פרד literally means to separate or go apart. In context it likely refers euphemistically to withdrawing with prostitutes. 'Go apart' preserves the underlying imagery while remaining intelligible; the more interpretive 'consort' is preserved as an alternative sense.
- source_word: הַזֹּנוֹת
  chosen: prostitutes
  alternatives:
  - whores
  lexicon: HALOT
  rationale: Modern, clear rendering of the feminine plural participial/noun form from זנה; avoids archaic or needlessly harsh English while preserving meaning.
- source_word: הַקְּדֵשׁוֹת
  chosen: cult prostitutes
  alternatives:
  - temple prostitutes
  - consecrated women
  lexicon: HALOT
  rationale: קדשות refers to women associated with illicit cultic sexual practice. 'Cult prostitutes' is clearer and somewhat broader than 'temple prostitutes,' which may over-specify institutional setting; 'consecrated women' would obscure the negative cultic-sexual sense in context.
- source_word: יְזַבֵּחוּ
  chosen: sacrifice
  alternatives:
  - offer sacrifices
  lexicon: HALOT
  rationale: Basic sacrificial verb; simple finite English verb is sufficient in context.
- source_word: וְעָם לֹא יָבִין
  chosen: and a people without understanding
  alternatives:
  - and the people do not understand
  - and a people that does not discern
  lexicon: HALOT
  rationale: The singular collective noun עם without article is rendered generically. Expanding with 'without understanding' captures the force of לא יבין idiomatically in English.
- source_word: יִלָּבֵט
  chosen: will come to ruin
  alternatives:
  - will be thrown down
  - will be confounded
  - will be ruined
  lexicon: HALOT
  rationale: This rare verb is difficult, but in context it conveys destructive collapse or being brought down. 'Will come to ruin' communicates the result clearly in natural English without overclaiming a more specific nuance.
