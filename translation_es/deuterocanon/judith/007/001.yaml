translation:
  language: es
  text: Al día siguiente, Holofernes ordenó a todo su ejército y a toda su gente, los que habían venido para su alianza, que levantaran el campamento hacia Betulia[a], ocuparan de antemano los pasos de la región montañosa[b] e hicieran guerra contra los hijos de Israel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra Betulia». El griego usa ἐπί con verbo de movimiento, que señala dirección hacia el lugar.
    reason: lexical_alternative
  - marker: b
    text: O «las subidas de la montaña» o «las rutas de la montaña». El griego dice literalmente «las subidas de la región montañosa»; en contexto militar se refiere a accesos estratégicos.
    reason: lexical_alternative
  - marker: c
    text: O «los israelitas». El griego dice «los hijos de Israel», preservando la designación familiar tradicional.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῇ δὲ ἐπαύριον
  english_pob_choice: On the next day
  chosen_spanish: Al día siguiente
  alternatives_spanish:
  - El día siguiente
  - Al siguiente día
  lexicon: LSJ
  rationale: Expresa de forma natural la secuencia narrativa temporal y conserva el valor adverbial del griego sin añadir matiz interpretativo.
- source_word: παρήγγειλεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio órdenes
  lexicon: LSJ
  rationale: Verbo directo y adecuado para el contexto militar de un mando autoritativo.
- source_word: πάσῃ τῇ στρατείᾳ αὐτοῦ
  english_pob_choice: all his army
  chosen_spanish: todo su ejército
  alternatives_spanish:
  - toda su hueste
  - todas sus fuerzas
  lexicon: LSJ
  rationale: στρατεία aquí funciona como conjunto militar; 'ejército' conserva el sentido colectivo y es idiomático en español.
- source_word: παντὶ τῷ λαῷ αὐτοῦ
  english_pob_choice: all his people
  chosen_spanish: todo su pueblo
  alternatives_spanish:
  - toda su gente
  - todas sus tropas
  lexicon: LSJ
  rationale: λαός es más amplio que soldados; 'pueblo' preserva la amplitud del término sin reducirlo a personal militar.
- source_word: οἳ παρεγένοντο ἐπὶ τὴν συμμαχίαν αὐτοῦ
  english_pob_choice: who had come for his alliance
  chosen_spanish: que había venido para su alianza
  alternatives_spanish:
  - que habían venido como sus aliados
  - que se habían presentado para su alianza
  lexicon: LSJ
  rationale: Se conserva la cercanía al griego y la tensión lexical de συμμαχία como 'alianza'; aunque suena algo formal, evita interpretar de más el vínculo exacto.
- source_word: ἀναζευγνύειν
  english_pob_choice: to break camp
  chosen_spanish: que se pusieran en marcha
  alternatives_spanish:
  - que levantaran el campamento
  - que desalojaran el campamento
  lexicon: LSJ
  rationale: El griego es un término militar para levantar el campamento e iniciar la marcha. En español, 'ponerse en marcha' mantiene la acción sin forzar una perífrasis demasiado técnica en la frase principal.
- source_word: ἐπὶ Βαιτυλουὰ
  english_pob_choice: for Bethulia
  chosen_spanish: hacia Betulia
  alternatives_spanish:
  - contra Betulia
  - para Betulia
  lexicon: LSJ
  rationale: Con verbo de movimiento, ἐπί marca dirección; 'hacia' expresa destino sin anticipar la hostilidad que el resto del verso ya explicita.
- source_word: τὰς ἀναβάσεις τῆς ὀρεινῆς
  english_pob_choice: the passes of the hill country
  chosen_spanish: los pasos de la serranía
  alternatives_spanish:
  - las subidas de la montaña
  - los pasos de la región montañosa
  lexicon: LSJ
  rationale: ἀναβάσεις alude a accesos o subidas estratégicas; 'pasos' comunica mejor en español la idea militar de rutas transitables por terreno elevado, y 'serranía' naturaliza ὀρεινή.
- source_word: προκαταλαμβάνεσθαι
  english_pob_choice: to seize ... in advance
  chosen_spanish: ocupar de antemano
  alternatives_spanish:
  - tomar antes
  - apoderarse previamente
  lexicon: LSJ
  rationale: El compuesto indica anticipación y toma preventiva; 'ocupar de antemano' conserva la idea estratégica sin volverla redundante.
- source_word: ποιεῖν πόλεμον πρὸς
  english_pob_choice: to make war against
  chosen_spanish: hacer guerra contra
  alternatives_spanish:
  - guerrear contra
  - entablar guerra contra
  lexicon: LSJ
  rationale: La locución española reproduce bien el idiomatismo bélico del griego y mantiene su fuerza formal.
- source_word: τοὺς υἱοὺς Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: LSJ
  rationale: Se preserva el giro familiar masculino tradicional del texto, siguiendo la decisión de no neutralizar la designación étnico-covenantal.
theological_decisions:
- issue: Preservación de la designación étnico-covenantal masculina
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: La expresión funciona como designación convencional de Israel y no como referencia exclusiva a varones individuales. Se mantiene el paralelismo y la transparencia del idiomatismo bíblico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Alcance de λαός frente a στρατεία
  english_pob_reading: all his people
  chosen_spanish_reading: todo su pueblo
  alternative_spanish_readings:
  - toda su gente
  - todo su ejército
  rationale: El griego distingue entre la fuerza militar y un grupo más amplio de acompañantes. 'Pueblo' permite conservar esa amplitud sin reducirla al ámbito estrictamente militar.
  doctrine_reference: DOCTRINE.md §Lexical precision and context
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'who had joined his alliance' por 'who had come for his alliance' para ajustarse más de cerca a οἳ παρεγένοντο ἐπὶ τὴν συμμαχίαν αὐτοῦ. La redacción española sigue esa corrección con «que había venido para su alianza», evitando interpretar el vínculo como una adhesión ya formalizada.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene «hijos de Israel» para preservar la fórmula bíblica y la correspondencia con el audit trail inglés.
  - Se prefiere un registro sobrio y directo, evitando ampliar la hostilidad más allá de lo que el griego expresa explícitamente.
