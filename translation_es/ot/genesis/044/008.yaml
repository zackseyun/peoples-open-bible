revisions:
- from: —Mira[a], el dinero que hallamos en la boca de nuestros costales lo devolvimos a ti desde la tierra de Canaán. ¿Y cómo podríamos robar plata o oro de la casa de tu señor?
  to: —Mira[a], la plata que hallamos en la boca de nuestros sacos te la devolvimos de la tierra de Canaán. ¿Y cómo podríamos robar plata o oro de la casa de tu señor?
  rationale: La revisión restaura la repetición concreta de כֶּסֶף como 'plata' en armonía con la evidencia hebrea y la decisión léxica del POB, mejora la naturalidad del español con 'te la devolvimos' y 'de la tierra de Canaán', emplea 'sacos' como término más panhispánico, y corrige la disyunción a 'plata o oro'. Se conserva 'Mira' y la nota cultural sobre 'la boca' del saco, así como 'tu señor' para el superior humano en contexto narrativo.
