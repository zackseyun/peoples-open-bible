review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: la sabiduría y el entendimiento del destinatario son el medio por el cual acumuló riqueza, y la segunda cláusula describe oro y plata colocados en sus depósitos. También conserva correctamente la nota sobre la amplitud semántica de חָיִל. Sin embargo, dos elecciones debilitan la precisión: «metiste» suena demasiado coloquial para el registro buscado, y «en tus tesoros» desplaza el sentido de אוֹצְרוֹתֶיךָ desde el lugar de almacenamiento (''tesorerías/depósitos'') hacia los bienes mismos (''tesoros'').'
  spanish_quality_summary: El español es comprensible y mayormente natural, pero necesita un ajuste de registro y exactitud léxica. «Te hiciste riquezas» es aceptable y transmite bien el valor económico de חָיִל en contexto. En cambio, «metiste» es poco digno para el tono bíblico, y «tesoros» no es la mejor opción para un contenedor o tesorería. «Pusiste ... en tus tesorerías» o «en tus tesoros» sería menos preciso; «tesorerías» mantiene mejor el sentido y sigue siendo legible en español eclesial amplio.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Las decisiones para sabiduría/entendimiento, riqueza y oro/plata son coherentes con el expediente inglés. La nota léxica sobre חָיִל debe conservarse. El ajuste recomendado es terminológico-contextual para אוֹצָר y de registro para el verbo de la segunda cláusula.
  issues:
  - severity: medium
    issue: «metiste» es demasiado coloquial para el registro objetivo
    rationale: Aunque comunica la idea de introducir algo en un lugar, no suena moderno-digno ni bíblico en este contexto. «Pusiste» expresa bien el sentido idiomático de la cláusula y armoniza mejor con el estilo pedido.
  - severity: medium
    issue: «en tus tesoros» no representa con precisión אוֹצְרוֹתֶיךָ
    rationale: El hebreo se refiere a tesorerías, depósitos o lugares donde se guarda riqueza, no a los tesoros mismos. «Tesorerías» conserva mejor la distinción entre contenido y lugar.
  revised_spanish_text: Con tu sabiduría y con tu entendimiento te hiciste riquezas[a], y pusiste oro y plata en tus tesorerías.
  revised_footnotes:
  - marker: a
    text: O «te hiciste fuerza o poder para ti»; la palabra hebrea puede denotar riqueza, fuerza o recursos, pero aquí la mención de oro, plata y tesorerías favorece «riquezas».
    reason: lexical_alternative
  revision_rationale: 'Se mantiene la estructura y el sentido del borrador, pero se corrigen dos puntos: «pusiste» reemplaza a «metiste» por mejor registro y naturalidad, y «tesorerías» reemplaza a «tesoros» para reflejar con mayor precisión el sentido locativo de אוֹצְרוֹתֶיךָ como lugar de almacenamiento de bienes valiosos. La nota se ajusta para concordar con la redacción revisada.'
