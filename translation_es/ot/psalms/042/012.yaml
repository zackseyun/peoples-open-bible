translation:
  language: es
  text: ¿Por qué estás abatida, alma mía, y por qué te turbas dentro de mí? Espera en Dios, porque todavía lo alabaré, la salvación de mi semblante[a] y mi Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «la ayuda de mi semblante»; hebreo literalmente, «las salvaciones de mi rostro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁתּוֹחֲחִי
  english_pob_choice: are you cast down
  chosen_spanish: te abates
  alternatives_spanish:
  - te doblas
  - te hundes
  - estás abatida
  lexicon: HALOT
  rationale: El verbo expresa estar postrada, abatida o deprimida. «Te abates» conserva esa imagen interior en un español natural y digno, sin suavizar demasiado el tono lamentoso.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: alma mía
  alternatives_spanish:
  - mi alma
  - mi ser
  - mi vida
  lexicon: HALOT
  rationale: En la autoexhortación poética de los Salmos, «alma mía» es natural en español bíblico y conserva el carácter introspectivo de נֶפֶשׁ.
- source_word: תֶּהֱמִי
  english_pob_choice: are you in turmoil
  chosen_spanish: te turbas
  alternatives_spanish:
  - estás en tumulto
  - te alborotas
  - estás inquieta
  lexicon: HALOT
  rationale: El verbo puede aludir a ruido, agitación o conmoción. «Te turbas» comunica bien la inquietud interna en un registro bíblico legible.
- source_word: עָלַי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - sobre mí
  - en mí
  lexicon: HALOT
  rationale: Aunque la preposición es literalmente «sobre», el contexto idiomático señala una agitación interior. «Dentro de mí» expresa esa fuerza idiomática con claridad en español.
- source_word: הוֹחִילִי
  english_pob_choice: Hope in God
  chosen_spanish: Espera en Dios
  alternatives_spanish:
  - Pon tu esperanza en Dios
  - Espera con esperanza en Dios
  - Ten esperanza en Dios
  lexicon: HALOT
  rationale: El hifil de יחל combina espera confiada y esperanza. «Espera en Dios» conserva ambas ideas sin imponer una lectura demasiado abstracta.
- source_word: לֵאלֹהִים
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - para Dios
  - hacia Dios
  lexicon: HALOT
  rationale: Con este verbo, la relación es la de confiar/esperar orientándose a Dios. «En Dios» es la formulación más natural y fiel al giro hebreo.
- source_word: עוֹד
  english_pob_choice: yet
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - otra vez
  lexicon: HALOT
  rationale: La partícula marca continuidad futura frente al presente de aflicción. «Todavía» mantiene esa expectativa de reversión sin perder naturalidad.
- source_word: אוֹדֶנּוּ
  english_pob_choice: I will yet praise him
  chosen_spanish: lo alabaré
  alternatives_spanish:
  - le daré gracias
  - lo daré gracias
  - seguiré alabándolo
  lexicon: HALOT
  rationale: El verbo ידה en este contexto litúrgico-poético se vierte de modo más claro como «alabar». El pronombre objeto retoma a Dios de manera explícita y natural en español.
- source_word: יְשׁוּעוֹת
  english_pob_choice: the salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - la ayuda
  - los rescates
  - las salvaciones
  lexicon: HALOT
  rationale: Aunque formalmente plural, el sustantivo suele funcionar de manera intensiva o abstracta. «La salvación» conserva el peso teológico y evita una pluralidad extraña al oído español.
- source_word: פָּנַי
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi cara
  - mi semblante
  - mi presencia
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de la cara/rostro abatido que luego será levantado. «Rostro» es más sobrio y literario que «cara» en español bíblico.
- source_word: וֵאלֹהָי
  english_pob_choice: and my God
  chosen_spanish: y mi Dios
  alternatives_spanish:
  - e mi Dios
  lexicon: HALOT
  rationale: La conjunción es aditiva y el cierre es confesional. «Y mi Dios» preserva la estructura hebrea y el énfasis personal final.
theological_decisions:
- issue: Cómo rendir יְשׁוּעוֹת פָּנַי
  english_pob_reading: the salvation of my countenance / the help of my countenance
  chosen_spanish_reading: la salvación de mi rostro
  alternative_spanish_readings:
  - la ayuda de mi rostro
  - la salvación de mi semblante
  - mi ayuda y mi rostro
  rationale: 'Se conserva la imagen hebrea compacta y algo difícil. El texto no resuelve por completo la metáfora: Dios es quien libra al salmista de su abatimiento y le devuelve el rostro levantado. La nota preserva la opción más tradicional/interpretativa sin imponerla en el cuerpo del texto.'
  doctrine_reference: Original-language primacy; preserve lexical tension rather than over-smoothing.
- issue: Relación entre esperar y confiar en Dios
  english_pob_reading: Hope in God
  chosen_spanish_reading: Espera en Dios
  alternative_spanish_readings:
  - Pon tu esperanza en Dios
  - Confía en Dios
  rationale: El imperativo hebreo incluye tanto esperar como confiar. «Espera en Dios» conserva la dimensión temporal y afectiva; la esperanza está implícita en el verbo y no necesita añadirse como glosa en el texto principal.
  doctrine_reference: Faithful rendering of imperfective exhortation and trust language.
translation_notes:
  revision_awareness: El inglés POB pasó de una traducción más explicativa («the help of my countenance») a otra más cercana a la literalidad («the salvation of my countenance/face») tras revisiones que valoraron mejor יְשׁוּעוֹת. La versión española sigue esa última decisión, pero evita un calco áspero en el segmento verbal mediante un español natural («Espera en Dios») y conserva la tensión idiomática en «la salvación de mi rostro».
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, sin reemplazarlo por una fórmula de máscara litúrgica.
  - Se usa «alma» para נֶפֶשׁ en la autoexhortación poética, coherente con el registro de los Salmos.
  - «Espera en Dios» recoge el imperativo de confianza sin cambiarlo por un mero estado emocional.
  - «Rostro» preserva la imagen concreta del hebreo frente a una paráfrasis excesiva.
  - El tono es bíblico pero moderno, apto para lectura eclesial sin depender de formulismos arcaizantes.
