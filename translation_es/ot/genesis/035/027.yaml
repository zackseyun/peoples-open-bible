translation:
  language: es
  text: Y Jacob vino a Isaac, su padre, en Mamre[a], Kiriat-arba (es decir, Hebrón), donde Abraham e Isaac habían vivido allí como forasteros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «donde Abraham e Isaac habían habitado como forasteros». El verbo hebreo puede expresar residencia temporal o de extranjero, no solo vivir en un lugar en sentido general.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - llegó
  lexicon: HALOT
  rationale: El verbo hebreo de movimiento se adapta aquí al punto de vista narrativo de llegada a Isaac. En español, «fue a» comunica naturalmente el desplazamiento hacia esa persona/lugar sin forzar un calco de «vino».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - hasta
  lexicon: HALOT
  rationale: La preposición direccional normal en este contexto es «a», que en español moderno expresa con claridad la meta del movimiento.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su padre de él
  - su papá
  lexicon: HALOT
  rationale: Se conserva la relación de parentesco de manera explícita y natural en español. «Su padre» mantiene la claridad del hebreo con un registro digno.
- source_word: מַמְרֵא
  english_pob_choice: Mamre
  chosen_spanish: Mamre
  alternatives_spanish:
  - Mamré
  lexicon: HALOT
  rationale: Nombre propio conservado por transliteración. Se mantiene la forma bíblica usual en español con mínima adaptación.
- source_word: קִרְיַת הָאַרְבַּע
  english_pob_choice: Kiriath-arba
  chosen_spanish: Kiriat-arba
  alternatives_spanish:
  - Quiriat-arba
  - Kiriath Arba
  lexicon: HALOT
  rationale: Se translitera el topónimo para preservar el nombre propio. «Kiriat-arba» resulta legible en español y mantiene la forma del original sin traducirlo como «la ciudad de Arba».
- source_word: הִוא חֶבְרוֹן
  english_pob_choice: that is, Hebron
  chosen_spanish: es decir, Hebrón
  alternatives_spanish:
  - o sea, Hebrón
  - que es Hebrón
  lexicon: HALOT
  rationale: La construcción explicativa se vierte con una equivalencia natural en español. «Es decir» comunica la identificación del lugar sin alterar la relación appositiva.
- source_word: אֲשֶׁר
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en donde
  - en el que
  lexicon: HALOT
  rationale: Cuando el antecedente es un lugar, «donde» es la forma más natural en español y preserva el valor locativo del relativo.
- source_word: גָּר
  english_pob_choice: had sojourned
  chosen_spanish: habían habitado como forasteros
  alternatives_spanish:
  - habían sojournado
  - habían residido como extranjeros
  - habían morado como forasteros
  lexicon: HALOT
  rationale: El verbo גּוּר no se reduce a «vivir»; implica residir sin pleno arraigo, como residente temporal o extranjero. En español, «habitar como forasteros» expresa esa tensión con claridad, manteniendo el matiz de temporalidad y extranjería.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: El adverbio locativo se traduce con «allí» en español formal y sobrio, adecuado para la clausula relativa.
- source_word: אַבְרָהָם וְיִצְחָק
  english_pob_choice: Abraham and Isaac
  chosen_spanish: Abraham e Isaac
  alternatives_spanish:
  - Abraham y Isaac
  lexicon: HALOT
  rationale: Se emplea la conjunción e- ante palabra que inicia con i- para mantener la eufonía estándar del español. Los nombres propios se conservan según uso bíblico.
theological_decisions:
- issue: 'El matiz de גָּר: residencia temporal/forastería frente a simple residencia'
  english_pob_reading: The Hebrew verb carries the sense of residing as a temporary resident or foreigner, not merely living in a place.
  chosen_spanish_reading: «habían habitado como forasteros»
  alternative_spanish_readings:
  - habían residido como extranjeros
  - habían morado como forasteros
  - habían vivido como forasteros
  rationale: 'Se preserva la tensión semántica documentada por el POB inglés: no se trata de una mera presencia establecida, sino de una condición de residencia sin plena pertenencia. «Forasteros» comunica bien la extranjería; «habitado» permite un español natural sin borrar el matiz.'
  doctrine_reference: Génesis 23:4; Hebreos 11:9-13
- issue: Topónimos antiguos en apposición identificativa
  english_pob_reading: Kiriath-arba (that is, Hebron)
  chosen_spanish_reading: Kiriat-arba (es decir, Hebrón)
  alternative_spanish_readings:
  - Quiriat-arba (es decir, Hebrón)
  - Kiriat-arba, o sea, Hebrón
  rationale: Se mantiene la identificación geográfica tal como la presenta el hebreo, sin traducir el nombre propio a una glosa descriptiva. Esto conserva la estructura histórica del versículo.
  doctrine_reference: Números 13:22; Josué 14:15
translation_notes:
  revision_awareness: El inglés POB no requirió revisión sustantiva en este versículo; se mantuvo la misma lectura de alta concordancia y la misma nota léxica sobre גָּר, adaptándola al español con el mismo contraste semántico. No se añadieron variantes textuales ni cambios doctrinales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Hebrón» conserva la forma española usual de la toponimia bíblica.
  - Se prefirió «forasteros» para transmitir la extranjería implícita en גָּר sin caer en un arcaísmo innecesario.
  - 'La coordinación nominal se ajustó a la eufonía del español: «Abraham e Isaac».'
