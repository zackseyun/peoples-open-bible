revisions:
- from: Pero los lugares altos no fueron quitados; sin embargo[a], el corazón de Asa estaba íntegro con Yahvé todos sus días.
  to: Pero los lugares altos no fueron quitados; sin embargo[a], el corazón de Asa estuvo enteramente dedicado a Yahvé todos sus días.
  rationale: 'Se reemplaza «estaba íntegro con Yahvé» por «estuvo enteramente dedicado a Yahvé» para comunicar con mayor claridad y naturalidad el valor contextual de שָׁלֵם con «corazón»: lealtad plena e indivisa a Yahvé, no perfección moral absoluta. La nota se ajusta para conservar la alternativa «indiviso» y el sentido literal del hebreo en un español más natural.'
