translation:
  language: es
  text: Y al cabo de diez días, su aspecto se veía mejor, y estaban más robustos físicamente[a] que todos los jóvenes que comían la comida del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más robustos de cuerpo» o «mejor alimentados». La expresión hebrea alude literalmente a estar más llenos o saludables en la carne.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִקְצָת יָמִים עֲשָׂרָה
  english_pob_choice: And at the end of ten days
  chosen_spanish: Y al cabo de diez días
  alternatives_spanish:
  - Y después de diez días
  - Y al final de diez días
  lexicon: HALOT
  rationale: La expresión marca la conclusión del período de prueba. «Al cabo de» comunica con naturalidad ese sentido temporal y evita una calca rígida.
- source_word: נִרְאָה
  english_pob_choice: was better
  chosen_spanish: fue mejor
  alternatives_spanish:
  - pareció mejor
  - se vio mejor
  lexicon: HALOT
  rationale: Aunque el verbo literalmente remite a apariencia/percepción, el contexto comparativo exige en español una formulación directa. «Fue mejor» sigue la revisión inglesa y evita añadir una duda que el texto no marca aquí.
- source_word: מַרְאֵיהֶם
  english_pob_choice: their appearance
  chosen_spanish: su aspecto
  alternatives_spanish:
  - su apariencia
  - su semblante
  lexicon: HALOT
  rationale: Se trata de la condición visible del grupo. «Aspecto» es claro y natural en español, sin perder la referencia a la forma exterior.
- source_word: טוֹב
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - bueno
  - más favorable
  lexicon: HALOT
  rationale: El comparativo está exigido por מִן / «than». «Mejor» expresa correctamente la comparación en español.
- source_word: וּבְרִיאֵי בָשָׂר
  english_pob_choice: healthier in flesh
  chosen_spanish: más saludables en la carne
  alternatives_spanish:
  - más robustos en el cuerpo
  - más bien alimentados
  lexicon: HALOT
  rationale: La frase hebrea es concreta y corporal. Se conserva «carne» para no diluir la imagen, aunque en español suene menos idiomático; esto mantiene la tensión léxica del original sobre el estado físico real.
- source_word: מִן כָּל הַיְלָדִים
  english_pob_choice: than all the youths
  chosen_spanish: que todos los jóvenes
  alternatives_spanish:
  - que todos los muchachos
  - que todos los jóvenes de su grupo
  lexicon: HALOT
  rationale: «יְלָדִים» aquí designa a los jóvenes del grupo de formación. «Jóvenes» es amplio y respetuoso, sin infantilizar ni sobredeterminar la edad.
- source_word: הָאֹכְלִים
  english_pob_choice: who were eating
  chosen_spanish: que comían
  alternatives_spanish:
  - que estaban comiendo
  - que habían estado comiendo
  lexicon: HALOT
  rationale: El participio describe la práctica concurrente del otro grupo durante el período. En español, el imperfecto transmite bien esa acción en curso.
- source_word: אֵת פַּתְבַּג הַמֶּלֶךְ
  english_pob_choice: the king’s food
  chosen_spanish: la comida del rey
  alternatives_spanish:
  - la porción del rey
  - las delicias del rey
  lexicon: HALOT
  rationale: פַּתְבַּג es un préstamo persa para la provisión real. «Comida del rey» es comprensible y suficientemente directo; evita explicar de más o imponer una lectura más ornamental.
translation_notes:
  revision_awareness: La versión española sigue la lectura revisada del POB inglés, que prefirió una afirmación directa («was better») en lugar de una atenuación tipo «seemed better». También conserva la nota léxica sobre la expresión corporal de «en la carne», aplicada aquí a «más saludables en la carne».
  spanish_consistency_notes:
  - Se usó «Yahvé» no corresponde en este versículo, por lo que no aparece ningún sustituto divino.
  - Se mantuvo el tono bíblico moderno y readable sin recurrir a arcaísmos.
  - La nota al pie [a] está anclada explícitamente en el texto para cumplir la trazabilidad editorial.
