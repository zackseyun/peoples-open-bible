revisions:
- from: Y por la mañana verán la gloria de Yahvé[a], porque ha oído sus murmullos contra Yahvé. Y nosotros, ¿qué somos, para que murmuren contra nosotros?
  to: Y por la mañana verán la gloria de Yahvé[a], porque ha oído sus quejas contra Yahvé. Y nosotros, ¿qué somos, para que se quejen contra nosotros?
  rationale: Se reemplaza 'murmullos/murmuren' por 'quejas/se quejen' para representar con mayor claridad en español neutral el sentido de protesta o queja dirigida del hebreo, evitando la ambigüedad de 'murmurar'. Se mantiene 'contra Yahvé' y 'contra nosotros' para preservar la fuerza adversativa de עַל. La nota se conserva, ajustando solo el léxico para coincidir con el texto revisado. No se requiere adjudicación adicional porque el cambio es menor, claro y no doctrinalmente controvertido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:24:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: secuencia temporal (''Y por la mañana''), futuro predictivo (''verán''), ''la gloria de Yahvé'', lectura causal principal de בְּשָׁמְעוֹ con alternativa temporal en nota, y el paralelismo ''contra Yahvé / contra nosotros''. Sin embargo, ''murmullos'' para תְּלֻנֹּתֵיכֶם y ''murmuren'' para תלונו debilitan el matiz de queja rebelde dirigido contra alguien; en español ''murmurar'' suele inclinarse hacia hablar en voz baja o hablar mal, mientras que el inglés auditado y el hebreo apuntan más claramente a ''quejarse/gruñir/protestar'' en tono de descontento. Además, ''para que murmuren'' suena algo teleológico en español para un כִּי de contenido/resultante; ''que se quejen'' es más natural y fiel en la pregunta retórica.'
  spanish_quality_summary: La redacción es clara y digna, con buen español eclesial contemporáneo. La nota al pie está bien formulada y correctamente anclada. No obstante, la combinación 'sus murmullos ... para que murmuren' suena menos idiomática y menos precisa que una solución con 'quejas'/'se quejen' o equivalente. El ajuste propuesto mejora naturalidad y fuerza semántica sin apartarse del hebreo ni del rastro auditado inglés.
  glossary_alignment: 'Se alinea bien con la terminología del proyecto en ''Yahvé'' para יְהוָה y ''gloria'' para כָּבוֹד. No hay conflictos con términos doctrinales mayores. La única desalineación relevante es léxica: el inglés POB documenta ''grumblings''/''grumble'' por su fuerza peyorativa; en español, ''murmullos/murmuren'' no preserva ese valor con suficiente claridad. ''Quejas/se quejen'' es algo más neutro, pero en este contexto con ''contra Yahvé'' comunica mejor el acto de protesta dirigida. Si se quisiera máxima fuerza, ''sus quejas'' / ''se quejen'' sigue siendo la opción más natural y fielmente legible en español general.'
  issues:
  - severity: medium
    issue: '''murmullos'' no representa con suficiente precisión תְּלֻנֹּתֵיכֶם'
    rationale: En español neutral, 'murmullos' suele denotar sonidos bajos o cuchicheos; aquí el hebreo describe quejas/protestas del pueblo contra Yahvé.
  - severity: medium
    issue: '''murmuren contra nosotros'' suena menos natural y menos exacto para תלונו עָלֵינוּ'
    rationale: El verbo hebreo mantiene cohesión con el sustantivo anterior y expresa quejarse/protestar contra Moisés y Aarón. 'Se quejen contra nosotros' o 'se quejen de nosotros' sería más idiomático; dado el paralelo con עַל יְהוָה, 'contra nosotros' conserva bien la dirección adversativa.
  - severity: low
    issue: '''para que'' introduce un matiz final/teleológico innecesario'
    rationale: Para el כִּי de la pregunta retórica, en español suena más natural '¿qué somos, para que se quejen...?' que con 'murmuren', pero mejor aún '¿qué somos, que se quejan...?'; sin embargo, 'para que se quejen' sigue siendo aceptable y muy idiomático.
  revised_spanish_text: Y por la mañana verán la gloria de Yahvé[a], porque ha oído sus quejas contra Yahvé. Y nosotros, ¿qué somos, para que se quejen contra nosotros?
  revised_footnotes:
  - marker: a
    text: 'O: «cuando oiga sus quejas contra Yahvé». La construcción hebrea puede entenderse también en sentido temporal además de causal.'
    reason: alternative_reading
  revision_rationale: Se reemplaza 'murmullos/murmuren' por 'quejas/se quejen' para representar con mayor claridad en español neutral el sentido de protesta o queja dirigida del hebreo, evitando la ambigüedad de 'murmurar'. Se mantiene 'contra Yahvé' y 'contra nosotros' para preservar la fuerza adversativa de עַל. La nota se conserva, ajustando solo el léxico para coincidir con el texto revisado. No se requiere adjudicación adicional porque el cambio es menor, claro y no doctrinalmente controvertido.
