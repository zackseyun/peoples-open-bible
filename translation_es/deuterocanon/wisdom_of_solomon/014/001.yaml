review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: ejemplo adicional introducido por πάλιν, sujeto indefinido, preparación para viaje marítimo, cruce de olas peligrosas y contraste comparativo con la embarcación que lo transporta. Sin embargo, ''una madera'' no es una formulación natural ni suficientemente precisa en español para ξύλον en este contexto; el sentido es un objeto de madera sobre el cual se sube, y el español requiere una forma más idiomática como ''un madero''. También sobra la coma antes de ''se sube'', y conviene mejorar la nota para español natural.'
  spanish_quality_summary: El texto es mayormente claro, pero 'se sube a una madera' suena poco idiomático y algo torpe. 'Olas furiosas' es aceptable, aunque 'olas bravas' o 'olas violentas' también funcionarían; no requiere cambio. La puntuación mejora sin la coma entre proposiciones coordinadas. 'Madero' da mejor legibilidad y conserva la imaginería de un objeto de madera vulnerable.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. La decisión sobre τις como ''alguien'' es aceptable dado el estado revisado del English POB. La elección de ''más frágil'' para σαθρότερον sigue la justificación auditada. La principal corrección léxica necesaria es ξύλον: evitar ''una madera'' y usar ''un madero'', con nota que preserve la alternativa ''más podrido''.'
  issues:
  - severity: medium
    issue: ξύλον se tradujo como 'una madera'
    rationale: Aunque formalmente remite a material de madera, en español 'subirse a una madera' no es idiomático. El contexto exige un referente contable y concreto; 'un madero' comunica mejor el objeto de madera y mantiene el contraste con el barco.
  - severity: low
    issue: Coma innecesaria antes de 'se sube'
    rationale: La coma separa indebidamente el predicado principal tras una subordinada larga. Sin ella, la oración fluye mejor en español moderno.
  - severity: low
    issue: Redacción de la nota al pie poco natural
    rationale: '''''Más podrida madera'' suena calcado. En español debe formularse como ''un madero más podrido'' o ''madera más podrida'', según el texto anclado.'
  revised_spanish_text: De nuevo[a], alguien que se prepara para navegar y está a punto de atravesar olas furiosas se sube a un madero más frágil que el barco que lo lleva.
  revised_footnotes:
  - marker: a
    text: 'O: «un madero más podrido que el barco que lo lleva». El comparativo griego puede sugerir tanto fragilidad o falta de solidez como deterioro material.'
