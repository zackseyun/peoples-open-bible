translation:
  language: es
  text: Ella descubrió sus prostituciones y descubrió su desnudez[a]; entonces mi alma sintió repulsión hacia ella[c][b], tal como mi alma había sentido repulsión hacia su hermana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reveló sus actos de prostitución» para «descubrió sus prostituciones».
    reason: lexical_alternative
  - marker: b
    text: O «mi alma se apartó de ella»; el hebreo expresa un retroceso o repulsión muy fuerte.
    reason: lexical_alternative
  - marker: c
    text: La comparación alude a su hermana Samaria (Oholá) en la alegoría circundante.
    reason: cross_reference
lexical_decisions:
- source_word: וַתְּגַל
  english_pob_choice: uncovered
  chosen_spanish: descubrió
  alternatives_spanish:
  - reveló
  - dejó al descubierto
  lexicon: HALOT
  rationale: גלה expresa aquí la idea concreta de sacar a la vista lo oculto. En español, «descubrió» conserva la imagen de desvelar algo vergonzoso sin volverla demasiado abstracta, y armoniza con «desnudez» en la segunda mitad del verso.
- source_word: תַּזְנוּתֶיהָ
  english_pob_choice: her prostitutions
  chosen_spanish: sus prostituciones
  alternatives_spanish:
  - sus fornicaciones
  - sus actos de prostitución
  - sus rameras
  lexicon: HALOT
  rationale: זְנוּת en este contexto profético mantiene la fuerza de conducta sexual e infidelidad de pacto. «Prostituciones» preserva el plural del hebreo y el tono fuerte que el POB inglés también retuvo.
- source_word: עֶרְוָתָהּ
  english_pob_choice: her nakedness
  chosen_spanish: su desnudez
  alternatives_spanish:
  - su vergüenza
  - sus partes íntimas
  lexicon: HALOT
  rationale: עֶרְוָה normalmente significa desnudez/exposición. «Desnudez» reproduce la metáfora sexual sin especificar más de lo que el texto dice.
- source_word: וַתֵּקַע
  english_pob_choice: was repulsed
  chosen_spanish: fue repelida
  alternatives_spanish:
  - fue rechazada
  - se sintió asqueada
  - fue apartada
  lexicon: HALOT
  rationale: El verbo expresa un retroceso intenso, una reacción visceral de rechazo. «Fue repelida» mantiene esa fuerza y evita suavizarlo a una mera distancia emocional.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - yo
  - mi ser
  - mi persona
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí conserva el idiomatismo hebreo del yo interior. «Mi alma» sigue de cerca el original y preserva el registro bíblico sin neutralizar la expresión.
- source_word: מֵֽעָלֶיהָ
  english_pob_choice: by her
  chosen_spanish: por ella
  alternatives_spanish:
  - de ella
  - de sobre ella
  - a causa de ella
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «de sobre ella», en español la relación causal/agentiva queda más natural con «por ella» después de «fue repelida».
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - igual que
  - del mismo modo que
  lexicon: HALOT
  rationale: Marca la comparación con precisión y suena natural en español literario.
- source_word: נָקְעָה
  english_pob_choice: had been repulsed
  chosen_spanish: había sido repelida
  alternatives_spanish:
  - había sido rechazada
  - había retrocedido
  - se había apartado
  lexicon: HALOT
  rationale: El perfecto de la cláusula comparativa pide un pluscuamperfecto en español para expresar anterioridad respecto de la acción principal. «Repelida» mantiene la correspondencia con el mismo campo semántico del verbo anterior.
- source_word: אֲחוֹתָהּ
  english_pob_choice: her sister
  chosen_spanish: su hermana
  alternatives_spanish:
  - la hermana de ella
  lexicon: HALOT
  rationale: Término familiar directo dentro de la alegoría de las dos hermanas. «Su hermana» es claro y fiel al hebreo.
theological_decisions:
- issue: Mantener el lenguaje sexual explícito como metáfora profética de infidelidad
  english_pob_reading: Retain explicit sexual language ('prostitutions,' 'nakedness') in the main text
  chosen_spanish_reading: Conservar «prostituciones» y «desnudez» en el texto principal
  alternative_spanish_readings:
  - Suavizar con «infidelidades» o «vergüenza»
  - Explicar todo como idolatría en el texto principal
  rationale: Ezequiel usa deliberadamente imaginería sexual para representar adulterio de pacto e idolatría. Suavizar el lenguaje perdería la crudeza profética que el hebreo exige y que el POB inglés también preservó.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Conservar el antropopatismo del rechazo divino
  english_pob_reading: Preserve 'my soul was repulsed'
  chosen_spanish_reading: Preservar «mi alma fue repelida»
  alternative_spanish_readings:
  - «me aparté de ella»
  - «fui apartado de ella»
  - «me disgusté de ella»
  rationale: El hebreo atribuye a Dios una reacción personal e intensa. Mantener «mi alma» y «fue repelida» conserva la tensión antropopática sin resolverla en una paráfrasis más plana.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el ciclo más reciente; el estado de revisión indica que no se necesitaban cambios y que el texto quedó estable tras la última pasada.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma predeterminada del nombre divino cuando corresponda; aquí el versículo no lo contiene explícitamente.
  - Se preservó el plural de intensidad de תַּזְנוּת con «prostituciones», siguiendo la decisión inglesa de no diluir el término.
  - «Mi alma» se usó de manera consistente para נַפְשִׁי, en vez de reducirlo a un simple «yo».
  - El pasaje conserva el paralelismo entre el rechazo de esta hermana y el de la hermana anterior mediante la misma raíz semántica en español («repelida»).
