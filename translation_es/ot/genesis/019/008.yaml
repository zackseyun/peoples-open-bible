    text: 'O, de manera más explícita: «que no han tenido relaciones con un hombre»; tradicionalmente, «que son vírgenes».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «bajo la sombra de mi techo», un modismo de protección debida a los huéspedes que han entrado en la casa.'
    reason: cultural_note
  revision_rationale: La revisión unifica la segunda persona en plural latinoamericano («ustedes»), corrige el matiz de súplica/volición de אוֹצִיאָה נָּא con «déjenme sacarlas», elimina el añadido temporal impropio «ahora», y ajusta «porque para eso han venido» a la causalidad más sobria del hebreo y del POB auditado. Se conservan la crudeza del ofrecimiento, el modismo «no han conocido varón» y la imagen «bajo la sombra de mi techo».
