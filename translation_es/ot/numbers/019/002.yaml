review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: mantiene «Yahvé», conserva «los hijos de Israel», traduce idiomáticamente וְיִקְחוּ אֵלֶיךָ como «te traigan», y preserva la imagen de que no ha subido yugo sobre el animal. Sin embargo, en la pareja ritual תְּמִימָה / מוּם, el español invierte y debilita la precisión léxica: «sin defecto ... no hay mancha» no representa bien la distinción hebrea ni la decisión auditada del POB inglés («without blemish ... no defect»).'
  spanish_quality_summary: El texto es legible y digno, pero «sin defecto ... no hay mancha» suena menos natural y menos preciso en contexto cultual que «sin mancha ... no tiene defecto». Además, «en la cual no hay mancha» resulta algo rígido; «que no tiene defecto» fluye mejor en español bíblico contemporáneo. «Vaca roja» es aceptable, aunque «novilla roja» sería una alternativa más tradicional; no exige cambio aquí.
  glossary_alignment: 'Alinea correctamente el nombre divino como «Yahvé» y el sintagma «los hijos de Israel». La terminología ritual requiere ajuste para corresponder mejor al expediente inglés y al hebreo: תְּמִימָה debe ir mejor como «sin mancha» y מוּם como «defecto».'
  issues:
  - severity: medium
    issue: Se invierte la relación léxica entre תְּמִימָה y מוּם.
    rationale: El hebreo describe primero la integridad sacrificial del animal (תְּמִימָה) y luego especifica ausencia de defecto físico (מוּם). El borrador usa «sin defecto» para el primero y «mancha» para el segundo, lo que difumina la distinción y se aparta del rastro auditado del POB inglés.
  - severity: low
    issue: La cláusula relativa «en la cual no hay mancha» suena menos natural en español que una formulación verbal.
    rationale: «Que no tiene defecto» mantiene mejor la claridad moderna y el matiz físico/cultual de מוּם sin rigidez sintáctica.
  - severity: low
    issue: Falta la nota alternativa para «los hijos de Israel» presente en el expediente inglés.
    rationale: El POB inglés conserva la alternativa idiomática «Israelites». En español conviene preservar «los israelitas» en nota por trazabilidad y ayuda de lectura.
