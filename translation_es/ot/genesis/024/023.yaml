translation:
  language: es
  text: 'Y dijo[a]: «¿De quién eres hija? Por favor, dime. ¿Hay en la casa de tu padre lugar para que pasemos la noche?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Hay lugar en la casa de tu padre para que nos alojemos?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la narración; en español, «Y dijo» preserva esa secuencia narrativa sin añadir una relación temporal más fuerte de la que exige el hebreo.
- source_word: בַּת מִי אַתְּ
  english_pob_choice: Whose daughter are you?
  chosen_spanish: ¿De quién eres hija?
  alternatives_spanish:
  - ¿Hija de quién eres?
  lexicon: HALOT
  rationale: La pregunta hebrea es de identidad familiar. En español, «¿De quién eres hija?» mantiene el énfasis en el linaje/parentesco y suena natural y reverente sin paraphrasear.
- source_word: הַגִּידִי נָא לִי
  english_pob_choice: Please tell me
  chosen_spanish: Por favor, házmelo saber
  alternatives_spanish:
  - Por favor, dime
  lexicon: HALOT
  rationale: El imperativo con נָא expresa cortesía. «Házmelo saber» conserva el matiz de solicitud respetuosa y refleja con claridad que se pide información concreta.
- source_word: הֲיֵשׁ
  english_pob_choice: Is there
  chosen_spanish: ¿Hay
  alternatives_spanish:
  - ¿Existe
  lexicon: HALOT
  rationale: La partícula existencial en pregunta sí/no se traduce de manera natural con «¿Hay?» en español.
- source_word: בֵּית אָבִיךְ
  english_pob_choice: your father’s house
  chosen_spanish: la casa de tu padre
  alternatives_spanish:
  - la casa paterna
  - la casa de tu padre
  lexicon: HALOT
  rationale: Se conserva la imagen del hogar familiar/linaje. «La casa de tu padre» es transparente y fiel al constructo hebreo, sin reducirlo a un simple domicilio.
- source_word: מָקוֹם
  english_pob_choice: room
  chosen_spanish: lugar
  alternatives_spanish:
  - espacio
  - cabida
  lexicon: HALOT
  rationale: En contexto de hospitalidad, מָקוֹם puede significar un sitio disponible. «Lugar» conserva la amplitud semántica mejor que una equivalencia demasiado específica.
- source_word: לָנוּ
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - para nosotros y los nuestros
  lexicon: HALOT
  rationale: El plural de primera persona debe mantenerse; el hablante incluye a su grupo. «Para nosotros» es la forma más directa y fiel.
- source_word: לָלִין
  english_pob_choice: to spend the night
  chosen_spanish: donde pasar la noche
  alternatives_spanish:
  - para pernoctar
  - para alojarnos
  lexicon: HALOT
  rationale: El infinitivo de לון/לין en este contexto es hospedaje nocturno. «Pasar la noche» es natural en español y conserva la intención de alojamiento temporal.
translation_notes:
  revision_awareness: Se corrigió el anclaje de la nota al incluir [a] en el texto principal, manteniendo la alternativa léxica de hospedaje nocturno sin añadir interpretaciones no sustentadas.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o fórmulas litúrgicas ajenas al versículo.
  - «Casa de tu padre» preserva el marco familiar del hebreo.
  - «Pasar la noche» mantiene el contexto de hospitalidad sin forzar un tecnicismo.
  - La nota alternativa está anclada correctamente en el texto español con [a].
