translation:
  language: es
  text: 'Pero ellos le insistieron hasta que se avergonzó[a], y él dijo: «Envíenlos». Entonces enviaron cincuenta hombres, y buscaron durante tres días, pero no lo hallaron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta que se sintió avergonzado» / «hasta que se sintió incómodo». El hebreo dice literalmente «hasta que se avergonzó», describiendo la presión social producida por su insistencia reiterada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְצְרוּ בוֹ
  english_pob_choice: they urged him
  chosen_spanish: le insistieron
  alternatives_spanish:
  - le urgieron
  - le apremiaron
  lexicon: HALOT
  rationale: פצר expresa insistencia reiterada y presión persistente sobre una persona. En español, «le insistieron» comunica bien esa presión continua de forma natural y fiel al contexto narrativo.
- source_word: עַד בֹּשׁ
  english_pob_choice: until he was ashamed
  chosen_spanish: hasta avergonzarlo
  alternatives_spanish:
  - hasta que se avergonzó
  - hasta dejarlo avergonzado
  lexicon: HALOT
  rationale: בוש puede significar vergüenza o humillación social. La construcción española mantiene la idea de presión que produce vergüenza; el infinitivo con pronombre refleja el efecto sobre Elías/Eliseo sin endurecer innecesariamente el tono.
- source_word: שְׁלָחוּ
  english_pob_choice: Send them
  chosen_spanish: Envíenlos
  alternatives_spanish:
  - Envíenlos a ellos
  - Mándenlos
  lexicon: HALOT
  rationale: El imperativo plural pide permiso para mandar a los hombres. «Envíenlos» conserva el mandato y es una forma natural en español bíblico contemporáneo.
- source_word: חֲמִשִּׁים אִישׁ
  english_pob_choice: fifty men
  chosen_spanish: cincuenta hombres
  alternatives_spanish:
  - cincuenta varones
  - cincuenta hombres de los hijos de los profetas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «cincuenta hombres». Se mantiene esa forma sin ampliar la frase con información contextual que aquí no se repite.
- source_word: וַיְבַקְשׁוּ
  english_pob_choice: they searched
  chosen_spanish: buscaron
  alternatives_spanish:
  - lo buscaron
  - lo buscaron con diligencia
  lexicon: HALOT
  rationale: בקש puede ser «buscar» o «buscar/indagar». «Buscaron» es idiomático en español y conserva la acción de investigación o rastreo narrativo.
- source_word: שְׁלֹשָׁה יָמִים
  english_pob_choice: for three days
  chosen_spanish: durante tres días
  alternatives_spanish:
  - por tres días
  - tres días
  lexicon: HALOT
  rationale: La duración de la búsqueda se expresa de manera natural con «durante tres días», que comunica bien el transcurso completo del tiempo.
- source_word: וְלֹא מְצָאֻהוּ
  english_pob_choice: but they did not find him
  chosen_spanish: pero no lo hallaron
  alternatives_spanish:
  - y no lo encontraron
  - mas no lo hallaron
  lexicon: HALOT
  rationale: מצא significa «hallar/encontrar». «Hallaron» mantiene un registro bíblico natural en español y conserva el sentido de búsqueda infructuosa, con contraste adversativo en «pero».
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo masorético y el audit trail inglés: mantiene la insistencia, la vergüenza social, el permiso para enviar, los cincuenta hombres, la búsqueda de tres días y el desenlace negativo, sin añadir información inexistente en el versículo.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino ni una cita de κύριος.
  - Se usa «hallaron» como equivalente bíblico natural de מצא, coherente con el registro narrativo.
  - Se conserva el matiz de presión social en «hasta avergonzarlo», en lugar de suavizarlo a una mera incomodidad.
