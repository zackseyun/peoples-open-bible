    issue: 'Construcción defectuosa: «las palabras del rey que me había dicho»'
    rationale: El hebreo דִּבְרֵי הַמֶּלֶךְ אֲשֶׁר אָמַר לִי significa «las palabras del rey que me había dicho / que él me había dicho», pero en español la forma actual deja un relativo mal anclado. «Las palabras que el rey me había dicho» es fiel y natural.
  - severity: medium
    issue: La nota b no presenta una alternativa real
    rationale: El audit trail inglés conserva como alternativa «Let us arise and build». En español, la nota actual repite exactamente «Levantémonos y edifiquemos», por lo que no cumple la función de variante léxica.
  - severity: low
    issue: Orden y anclaje de notas alrededor de «dijeron» mejorables
    rationale: El inglés muestra dos notas en ese punto para la cita y el modismo posterior. En español puede mantenerse el doble anclaje, pero conviene ordenar y redactar las notas de forma que cada una corresponda claramente a su función.
