  glossary_alignment: 'La transliteración «Kain» y «Asur» concuerda con la línea del POB auditado. No hay conflicto con terminología doctrinal de proyecto. Las notas a y b preservan correctamente las alternativas del inglés. La única desalineación relevante es léxica: para לְבָעֵר conviene evitar el reflexivo «quemarse».'
