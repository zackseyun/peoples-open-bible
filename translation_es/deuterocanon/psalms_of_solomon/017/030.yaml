review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien γνώσεται como reconocimiento relacional y mantiene la filiación de υἱοὶ θεοῦ con una opción española natural. Sin embargo, no sigue adecuadamente el rastro auditado en dos puntos importantes: ἐπὶ τῆς γῆς debe leerse territorialmente como «sobre la tierra/land» con nota alternativa «en la tierra», y la nota actual b invierte la dirección de la alternativa; además, el texto español usa «sobre la tierra», que en español tiende a sonar global/cósmico más que territorial. También conviene suavizar la sintaxis «Porque él los reconocerá, que...» a una construcción más natural y fiel en español.'
  spanish_quality_summary: El español es legible, pero «que todos ellos son...» tras «reconocerá» suena poco natural; «que todos son...» mejora. «Entre sus tribus» es entendible, aunque la imaginería de distribución tribal se expresa mejor con «entre las tribus de ellos/de su pueblo» o «según sus tribus»; aun así, dada la revisión auditada final en inglés, «entre sus tribus» puede mantenerse. La principal mejora de calidad es usar «sobre la tierra» no como globo sino como territorio; en español bíblico actual «sobre la tierra» puede malentenderse, por lo que «sobre la tierra» solo es aceptable si la nota alternativa queda corregida y el contexto territorial se explica.
  glossary_alignment: 'No hay conflicto con la glosa base del proyecto. «Dios» y «hijos» están bien. No aparece YHWH ni términos sensibles adicionales. La decisión sobre γῆ debe alinearse con la adjudicación documentada: texto principal territorial («sobre la tierra» / mejor en español «sobre la tierra» con sentido de la tierra) y nota alternativa local «en la tierra».'
  issues:
  - severity: high
    issue: La nota b contradice el audit trail sobre γῆ.
    rationale: El inglés auditado tiene texto principal «upon the land» con alternativa «in the land». El español pone principal «sobre la tierra» pero nota «en la tierra, si γῆ se toma en un sentido más local o territorial», lo que presenta «en la tierra» como la lectura territorial alternativa en vez de reflejar que el principal ya debe entenderse territorialmente.
  - severity: medium
    issue: La sintaxis «los reconocerá, que todos ellos son...» es poco natural en español.
    rationale: 'Tras «reconocerá», el español idiomático pide una subordinada más fluida: «reconocerá que todos son...».'
  - severity: medium
    issue: La nota a está invertida respecto del valor léxico principal.
    rationale: Si el texto principal usa «reconocerá», la alternativa debe ser «los conocerá», no decir que el griego más literalmente dice «los reconocerá».
  - severity: low
    issue: La nota c no añade una alternativa real y duplica el texto principal.
    rationale: La nota inglesa c registra una renderización previa sobre la frase siguiente, no una nota teológica sobre «hijos de su Dios». En español actual, esa nota distrae y no preserva el audit trail pertinente.
  revised_spanish_text: Porque él reconocerá[a] que todos son hijos[b] de su Dios, y los repartirá entre sus tribus sobre la tierra[c].
