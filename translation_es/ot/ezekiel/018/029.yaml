  yaml_path: translation/ot/ezekiel/018/029.yaml
  text: Yet the house of Israel says[a], ‘The way of the Lord is not just.’ Are my ways not just, O house of Israel? Is it not your ways that are not just?
  footnotes:
  - marker: a
    text: Or 'The way of the Lord is not right' or 'is not fair.' The Hebrew verb concerns what is measured or ordered rightly; here it refers to moral rectitude in the Lord's dealings.
