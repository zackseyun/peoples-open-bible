  to: Y no yacen con los valientes caídos de entre los incircuncisos[a], que descendieron al Seol con sus armas de guerra, y pusieron sus espadas debajo de sus cabezas, y sus iniquidades estaban sobre sus huesos[e][d][c][b]; porque fueron el terror de los valientes en la tierra de los vivientes.
