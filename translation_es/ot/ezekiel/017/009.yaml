translation:
  language: es
  text: 'Di: «Así dice el Señor Yahvé: ¿Prosperará? ¿No arrancará[a] sus raíces y cortará su fruto, de modo que se seque? Todas las hojas tiernas de su brote se secarán. Y no con un brazo fuerte[b] ni con mucha gente será levantada de sus raíces».


    [a] O “arrancará de raíz”; el verbo hebreo también puede enfatizar el desarraigar o arrancar por completo.

    [b] Hebreo literal: “brazo”; aquí conserva el valor figurado de fuerza o poder.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “arrancará de raíz”; el verbo hebreo también puede enfatizar el desarraigar o arrancar por completo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literal: “brazo”; aquí conserva el valor figurado de fuerza o poder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  english_pob_choice: Say
  chosen_spanish: Di
  alternatives_spanish:
  - Habla
  - Dile
  lexicon: HALOT
  rationale: Imperativo introductorio de proclamación profética; “Di” es breve, natural y mantiene el tono directo del mandato.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  english_pob_choice: Thus says the Lord GOD
  chosen_spanish: Así dice el Señor Yahvé
  alternatives_spanish:
  - Así dice el Señor Dios
  - Así dice el Señor Yahveh
  lexicon: HALOT
  rationale: Se preserva la fórmula profética. En español se evita el ocultamiento del nombre divino y se sigue el default del proyecto para יְהוָה como “Yahvé”. “Señor” refleja אֲדֹנָי en la construcción fija.
- source_word: תִּצְלָח
  english_pob_choice: Will it prosper?
  chosen_spanish: ¿Prosperará?
  alternatives_spanish:
  - ¿Tendrá éxito?
  - ¿Florecerá?
  lexicon: HALOT
  rationale: El verbo pregunta si la planta/vídeo-imagen tendrá éxito o prosperidad; “prosperará” conserva la amplitud semántica y la forma interrogativa retórica.
- source_word: הֲלוֹא
  english_pob_choice: Will ... not
  chosen_spanish: ¿No
  alternatives_spanish:
  - ¿Acaso no
  - ¿No es verdad que
  lexicon: HALOT
  rationale: La pregunta retórica espera respuesta afirmativa; en español se expresa con la negación inicial para conservar el efecto.
- source_word: שָׁרָשֶׁיהָ
  english_pob_choice: its roots
  chosen_spanish: sus raíces
  alternatives_spanish:
  - sus raícillas
  - las raíces de ella
  lexicon: HALOT
  rationale: Imagen botánica literal; el plural se mantiene en español.
- source_word: יְנַתֵּק
  english_pob_choice: pull up
  chosen_spanish: arrancará
  alternatives_spanish:
  - desarraigará
  - tirará de
  lexicon: HALOT
  rationale: “Arrancar” comunica bien la idea de separar violentamente de las raíces y es más natural en español que un calco.
- source_word: פִּרְיָהּ
  english_pob_choice: its fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su producción
  - sus frutos
  lexicon: HALOT
  rationale: Se mantiene el valor literal de la imagen agrícola y la referencia singular colectiva.
- source_word: יְקוֹסֵס
  english_pob_choice: cut off
  chosen_spanish: cortará
  alternatives_spanish:
  - podará
  - arrancará
  lexicon: HALOT
  rationale: El verbo apunta a cortar o podar; “cortará” es directo y fiel, sin sobreespecificar el modo.
- source_word: וְיָבֵשׁ
  english_pob_choice: so that it withers
  chosen_spanish: de modo que se seque
  alternatives_spanish:
  - y se secará
  - de manera que se marchite
  lexicon: HALOT
  rationale: Se expresa la consecuencia del desarraigo y del corte. “Secarse” conserva la imagen vegetal y evita añadir una valoración interpretativa excesiva.
- source_word: כָּל טַרְפֵּי צִמְחָהּ
  english_pob_choice: All the fresh leaves of its growth
  chosen_spanish: Todas las hojas tiernas de su brote
  alternatives_spanish:
  - Todo el follaje tierno de su crecimiento
  - Todas las hojas frescas de su crecimiento
  lexicon: HALOT
  rationale: טַרְפֵּי se refiere a hojas/foliaje; צִמְחָהּ a su brote o crecimiento. “Hojas tiernas” conserva la idea de hojas nuevas/frescas con buen español.
- source_word: תִּיבָשׁ
  english_pob_choice: will wither
  chosen_spanish: se secarán
  alternatives_spanish:
  - se marchitarán
  - se agostarán
  lexicon: HALOT
  rationale: Se mantiene la continuidad con “seque” y se preserva el paralelo poético; “se secarán” es claro y natural en español moderno.
- source_word: וְלֹא בִזְרֹעַ גְּדוֹלָה וּבְעַם רָב
  english_pob_choice: And not with a great arm or with many people
  chosen_spanish: Y no con un brazo grande ni con mucha gente
  alternatives_spanish:
  - Y no con gran fuerza ni con mucha gente
  - Y no con un brazo fuerte ni con un pueblo numeroso
  lexicon: HALOT
  rationale: Se conserva la metáfora de “brazo” como símbolo de poder, y עַם רָב se vierte de forma directa como “mucha gente”, siguiendo la prudencia del texto base frente a una explicitación militar no presente.
- source_word: לְמַשְׂאוֹת אוֹתָהּ מִשָּׁרָשֶׁיהָ
  english_pob_choice: will it be lifted from its roots
  chosen_spanish: será levantada de sus raíces
  alternatives_spanish:
  - será alzada de sus raíces
  - será arrancada de sus raíces
  lexicon: HALOT
  rationale: La construcción infinitiva expresa la acción de levantar/retirar la planta de sus raíces. “Será levantada” sigue de cerca el sentido del inglés POB y conserva la pasiva implícita del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה en la fórmula profética
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahveh
  rationale: El proyecto pide Yahvé para יְהוָה. Se mantiene “Señor” para אֲדֹנָי y “Yahvé” para el nombre propio del pacto, evitando la máscara litúrgica “SEÑOR”.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de la imagen de “brazo grande”
  english_pob_reading: a great arm
  chosen_spanish_reading: un brazo grande
  alternative_spanish_readings:
  - gran fuerza
  - brazo poderoso
  rationale: Se conserva la metáfora corporal del hebreo. La nota explica que “brazo” funciona figuradamente como fuerza o poder.
  doctrine_reference: English POB lexical note on figurative 'arm' as strength or power
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: coordinó “and”, prefirió “withers” sobre “dries up” para el paralelo final y ajustó la instrumentalidad de “by/with”. En español, esto se refleja con el flujo “de modo que se seque” / “se secarán” y con “con” en la frase instrumental.'
  spanish_consistency_notes:
  - Se usa “Yahvé” de manera consistente para יְהוָה.
  - 'Se conserva la imagen agrícola completa: raíces, fruto, hojas y brote.'
  - “Brazo” se mantiene literal para no perder la metáfora de poder; la nota aclara su valor figurado.
  - “Mucha gente” evita introducir explícitamente ‘ejército’ donde el hebreo dice simplemente ‘pueblo/gente’.
