translation:
  language: es
  text: La longitud de cada cortina será de veintiocho codos[a], y la anchura de cada cortina de cuatro codos; todas las cortinas tendrán una sola medida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «la cortina, la una ... la cortina, la una»; el hebreo usa una forma distributiva para especificar las dimensiones de cada cortina individual.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todas las cortinas tendrán la misma medida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרֶךְ
  english_pob_choice: length
  chosen_spanish: longitud
  alternatives_spanish:
  - largo
  lexicon: HALOT
  rationale: En contexto de instrucciones arquitectónicas del tabernáculo, el sustantivo español natural y preciso es «longitud»; mantiene el sentido dimensional formal del hebreo y del inglés POB.
- source_word: הַיְרִיעָה
  english_pob_choice: curtain
  chosen_spanish: cortina
  alternatives_spanish:
  - panel
  - lienzo
  - tela
  lexicon: HALOT
  rationale: En el contexto cultual del tabernáculo, la pieza textil grande se entiende bien como «cortina» en español. «Lienzo» o «tela» son posibles, pero menos claros para lectores bíblicos generales.
- source_word: הָאַחַת / הָאֶחָת
  english_pob_choice: each
  chosen_spanish: cada
  alternatives_spanish:
  - la una
  - una
  lexicon: HALOT
  rationale: El hebreo usa una forma distributiva; en español, «cada» expresa de manera natural que las medidas aplican a cada cortina individual, preservando la fuerza distributiva sin literalidad extraña.
- source_word: שְׁמֹנֶה וְעֶשְׂרִים
  english_pob_choice: twenty-eight
  chosen_spanish: veintiocho
  alternatives_spanish:
  - '28'
  lexicon: HALOT
  rationale: Número cardinal estándar en español; corresponde directamente al hebreo y al inglés auditado.
- source_word: בָּאַמָּה
  english_pob_choice: cubits
  chosen_spanish: codos
  alternatives_spanish:
  - codos largos
  - cubitios
  lexicon: HALOT
  rationale: «Codo» es el término bíblico estándar en español para la unidad de medida antigua אַמָּה. Conserva el valor técnico sin modernizarlo indebidamente.
- source_word: וְרֹחַב
  english_pob_choice: and the width
  chosen_spanish: y la anchura
  alternatives_spanish:
  - y el ancho
  - y la largura
  lexicon: HALOT
  rationale: «Anchura» empareja naturalmente con «longitud» en descripciones dimensionales y refleja bien la relación semántica del hebreo.
- source_word: אַרְבַּע
  english_pob_choice: four
  chosen_spanish: cuatro
  alternatives_spanish:
  - '4'
  lexicon: HALOT
  rationale: Número cardinal estándar en español; coincide con el dato de medida del hebreo.
- source_word: מִדָּה אַחַת
  english_pob_choice: one measure
  chosen_spanish: una sola medida
  alternatives_spanish:
  - la misma medida
  - una medida
  lexicon: HALOT
  rationale: La traducción «una sola medida» conserva la literalidad del hebreo sin sonar forzada en español. Mantiene la idea de uniformidad de tamaño entre todas las cortinas.
- source_word: לְכָל הַיְרִיעֹת
  english_pob_choice: all the curtains
  chosen_spanish: todas las cortinas
  alternatives_spanish:
  - para todas las cortinas
  - para cada cortina
  lexicon: HALOT
  rationale: El hebreo comunica el alcance colectivo de la norma; «todas las cortinas» expresa esa universalidad de forma clara y natural en español.
translation_notes:
  revision_awareness: El texto inglés auditado no muestra cambios respecto de la última revisión y el cotejo indica alta concordancia; por ello no se introdujeron variantes interpretativas adicionales. La versión española sigue de cerca la sintaxis del hebreo en su sentido distributivo, pero adopta una formulación natural en español para la lectura pública.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exige; este versículo no contiene el nombre divino.
  - Se conserva la terminología técnica de medidas antiguas con «codos», coherente con el estándar POB.
  - «Cortina» se usa de modo consistente para יְרִיעָה en contexto del tabernáculo.
