revisions:
- from: Al noveno día del mes[a], el hambre se agravó en la ciudad[b], y no había pan para el pueblo de la tierra.
  to: El noveno día del mes, la hambruna se agravó en la ciudad, y no había pan[a] para el pueblo de la tierra[b].
  rationale: 'Se corrige la expresión temporal a un español más natural, se ajusta הָרָעָב a «hambruna» para reflejar mejor el contexto de sitio, y se restauran las notas según el audit trail inglés: una para «pan» como sustento general y otra para el posible matiz de «pueblo de la tierra». Se elimina la nota mal anclada sobre el verbo porque su contenido no requiere nota en el texto final.'
