translation:
  language: es
  text: Y Hermón[a], el jefe de los elefantes, llevó a cabo la orden exactamente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el comandante de los elefantes' u 'oficial de los elefantes'.
    reason: lexical_alternative
  - marker: b
