translation:
  language: es
  text: Y cuando Moisés terminó de escribir las palabras de esta ley en un libro[a], hasta que se completaron,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un rollo»; el hebreo ספר puede denotar un documento escrito o un rollo, no necesariamente un libro encuadernado en el sentido moderno.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ...
  chosen_spanish: Y ...
  alternatives_spanish:
  - Y aconteció
  - Entonces
  lexicon: HALOT
  rationale: La waw narrativa introduce la secuencia del relato; en español, «Y» conserva esa transición de forma natural y sobria.
- source_word: כְּכַלּוֹת
  english_pob_choice: when ... had finished
  chosen_spanish: terminó de
  alternatives_spanish:
  - cuando hubo terminado de
  - cuando terminó
  lexicon: HALOT
  rationale: El valor temporal de la construcción se expresa con naturalidad en español mediante «terminó de», que comunica la acción completada sin forzar una perífrasis pesada.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: standard proper-name transliteration
  rationale: Nombre propio según la convención española estándar.
- source_word: לִכְתֹּב
  english_pob_choice: writing
  chosen_spanish: de escribir
  alternatives_spanish:
  - escribiendo
  - para escribir
  lexicon: HALOT
  rationale: Después de «terminó», el infinitivo con complemento se expresa naturalmente en español con «de escribir», manteniendo la relación verbal de finalización.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - los dichos de
  - los asuntos de
  lexicon: HALOT
  rationale: En este contexto legal-literario, «palabras» reproduce de manera directa la referencia al contenido escrito, y encaja con el texto base auditado.
- source_word: הַתּוֹרָה הַזֹּאת
  english_pob_choice: this law
  chosen_spanish: esta ley
  alternatives_spanish:
  - esta instrucción
  - esta Torá
  lexicon: HALOT
  rationale: En Deuteronomio, תּוֹרָה tiene un claro marco legal/covenantal; «ley» es la opción más clara y natural en español, sin perder el referente del texto.
- source_word: עַל סֵפֶר
  english_pob_choice: in a book
  chosen_spanish: en un libro
  alternatives_spanish:
  - en un rollo
  - sobre un documento
  lexicon: HALOT
  rationale: El hebreo puede referirse a un documento escrito o a un rollo; en el texto principal, «en un libro» sigue la decisión inglesa y es legible en español, sin fijar innecesariamente el soporte material.
- source_word: עַד תֻּמָּם
  english_pob_choice: until they were complete
  chosen_spanish: hasta que estuvieron completas
  alternatives_spanish:
  - hasta su completa terminación
  - hasta quedar completas
  lexicon: HALOT
  rationale: La versión española debe conservar el sentido de culminación total. «Hasta que estuvieron completas» refleja el estado final de las palabras escritas y evita una formulación artificial.
theological_decisions:
- issue: Cómo traducir תּוֹרָה en contexto de pacto/ley
  english_pob_reading: this law
  chosen_spanish_reading: esta ley
  alternative_spanish_readings:
  - esta instrucción
  - esta Torá
  rationale: En este pasaje de Deuteronomio, el término funciona dentro de un marco jurídico-covenantal; «ley» comunica mejor ese peso normativo en español contemporáneo. No se usa un término más litúrgico o tradicional sin necesidad textual.
  doctrine_reference: Deuteronomio 31:24; uso contextual de תּוֹרָה en el corpus deuteronómico
- issue: Sentido de הַזֹּאת aplicado a תּוֹרָה
  english_pob_reading: this law
  chosen_spanish_reading: esta ley
  alternative_spanish_readings:
  - la ley esta
  - esta instrucción
  rationale: El demostrativo debe mantenerse explícito para reflejar que se trata de la ley específica escrita por Moisés, no de una referencia genérica.
  doctrine_reference: Deuteronomio 31:24
- issue: Valor idiomático de עַל סֵפֶר
  english_pob_reading: in a book
  chosen_spanish_reading: en un libro[a]
  alternative_spanish_readings:
  - en un rollo
  - sobre un documento
  rationale: El hebreo ספר puede denotar un escrito, documento o rollo. Se preserva la misma decisión auditada del inglés, y la nota explica la ambigüedad material sin imponer una reconstrucción más estrecha de lo que exige el hebreo.
  doctrine_reference: Filología hebrea de ספר en contextos antiguos
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó la expresión poco natural «to their completion» por «until they were complete». La redacción española sigue esa mejora semántica con «hasta que estuvieron completas», conservando la idea de culminación total y la relación con «las palabras» escritas.
  spanish_consistency_notes:
  - Se mantiene «Moisés» y no una transliteración distinta, por convención española estándar.
  - Se conserva «ley» para תּוֹרָה según el contexto deuteronómico, en línea con la decisión auditada en inglés.
  - La nota sobre ספר refleja la ambigüedad del soporte escrito sin introducir una conclusión textual más específica que la del hebreo.
