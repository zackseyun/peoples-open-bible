  to: 'And when I had said these things, I slept there, and I saw a vision by night. And behold, I saw from the great sea a cloud ascending, and it was full of white and black waters, and there were many colors in those waters, and on its head there appeared the likeness of a great lightning. And I looked, and that cloud passed swiftly in a violent course and covered the whole earth. And after these things, waters began to descend from it upon the earth, and I saw that those waters did not all have one appearance. And after these things again I saw black, and after these things again bright, and again black, and again bright. And this was until twelve times, but the black were more numerous than the bright in all of them.


    And it came to pass, at the end of the cloud, that black waters, darker than all the waters that had been before, descended; and wherever those waters descended, they produced ruin and destruction. And after these things I saw that lightning, which I had seen at the head of the cloud, and it seized it and flashed. And it became as a man, and in the days of tribulation men came to see how they might pass through. And after these things I saw twelve lights ascending from the sea, and they were joined to that flash and were praising it. And I awoke from fear.'
