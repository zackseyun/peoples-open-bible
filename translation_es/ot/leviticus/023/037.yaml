translation:
  language: es
  text: 'Estos son los tiempos señalados de Yahvé, que ustedes proclamarán como convocaciones santas, para presentar una ofrenda hecha por fuego[a] a Yahvé: un holocausto y una ofrenda de grano, un sacrificio y libaciones, lo correspondiente a cada día en su día[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ofrenda por fuego'. El hebreo se refiere a una ofrenda hecha por fuego para Yahvé.
    reason: lexical_alternative
  - marker: b
    text: O 'lo requerido para cada día en ese día'. El modismo hebreo señala lo prescrito correspondiente a cada día.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹעֲדֵי
  english_pob_choice: appointed times
  chosen_spanish: tiempos señalados
  alternatives_spanish:
  - tiempos appointed
  - fechas señaladas
  - festividades señaladas
  lexicon: HALOT
  rationale: מוֹעֵד designa un tiempo fijado o señalado, no solo una fiesta. 'Tiempos señalados' conserva el matiz temporal y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino tetragramático, manteniendo el nombre propio revelado en el hebreo y evitando la sustitución por un título.
- source_word: תִּקְרְא֥וּ אֹתָ֖ם
  english_pob_choice: you shall proclaim
  chosen_spanish: ustedes proclamarán
  alternatives_spanish:
  - ustedes llamarán
  - ustedes anunciarán
  - ustedes declararán
  lexicon: HALOT
  rationale: קרא con objeto en este contexto cultual expresa una proclamación pública o designación formal. 'Proclamarán' reproduce mejor esa fuerza que 'llamarán'.
- source_word: מִקְרָאֵי קֹדֶשׁ
  english_pob_choice: holy convocations
  chosen_spanish: convocaciones santas
  alternatives_spanish:
  - asambleas santas
  - reuniones santas
  lexicon: HALOT
  rationale: La expresión es técnica en Levítico 23. 'Convocaciones santas' conserva el sentido de reunión convocada y la cualidad de santidad sin volverla demasiado libre.
- source_word: לְהַקְרִיב
  english_pob_choice: to present
  chosen_spanish: para presentar
  alternatives_spanish:
  - para ofrecer
  - para traer
  - para acercar
  lexicon: HALOT
  rationale: El hifil de קרב en contexto sacrificial significa presentar/ofrecer. 'Presentar' evita redundancia con la lista de sacrificios y mantiene el registro formal.
- source_word: אִשֶּׁה
  english_pob_choice: offering by fire
  chosen_spanish: ofrenda encendida
  alternatives_spanish:
  - ofrenda por fuego
  - ofrenda hecha por fuego
  - sacrificio encendido
  lexicon: HALOT
  rationale: Se preserva el rasgo de fuego del término sin forzar una estructura poco natural en español. 'Ofrenda encendida' comunica de forma breve la ofrenda consumida por el fuego.
- source_word: עֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - sacrificio totalmente quemado
  lexicon: HALOT
  rationale: '''Holocausto'' es el término tradicional y preciso para la ofrenda totalmente quemada; aquí resulta más reconocible y fiel al sacrificio descrito.'
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda de grano
  alternatives_spanish:
  - ofrenda de cereal
  - oblación
  lexicon: HALOT
  rationale: En contexto levítico, מִנְחָה refiere la ofrenda de grano/cereal. 'Ofrenda de grano' es clara y evita un tecnicismo menos transparente.
- source_word: זֶבַח
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - ofrenda de sacrificio
  - víctima sacrificial
  lexicon: HALOT
  rationale: Es el equivalente español más natural y suficientemente amplio para este término sacrificial general.
- source_word: וּנְסָכִים
  english_pob_choice: drink offerings
  chosen_spanish: libaciones
  alternatives_spanish:
  - ofrendas líquidas
  - ofrendas de bebida
  lexicon: HALOT
  rationale: '''Libaciones'' es el término técnico español más exacto para las ofrendas de bebida vertida; preserva el carácter ritual del hebreo.'
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  english_pob_choice: each day's matter on its day
  chosen_spanish: la porción de cada día en su día
  alternatives_spanish:
  - lo requerido de cada día en su día
  - la obligación de cada día en su día
  - lo que corresponde a cada día en su día
  lexicon: HALOT
  rationale: El hebreo expresa una exigencia asignada a cada día. 'La porción de cada día en su día' mantiene la concisión idiomática y sugiere lo prescrito para esa jornada sin ampliar innecesariamente el sentido.
theological_decisions:
- issue: Nombre divino tetragramático
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio de Dios conforme al criterio doctrinal del proyecto y al testimonio del hebreo, en vez de enmascararlo como título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de אִשֶּׁה en el contexto sacrificial
  english_pob_reading: offering by fire
  chosen_spanish_reading: ofrenda encendida
  alternative_spanish_readings:
  - ofrenda por fuego
  - ofrenda hecha por fuego
  rationale: La frase mantiene el componente de fuego del término y su función cultual, sin perder legibilidad en español. No se reduce a una 'ofrenda' genérica ni se desplaza al lenguaje más interpretativo de 'sacrificio'.
  doctrine_reference: Levitical sacrificial terminology
translation_notes:
  revision_awareness: La redacción sigue la última revisión del audit trail al preferir una equivalencia más cercana para אִשֶּׁה ('offering by fire'), pero en español opta por 'ofrenda encendida' para conservar la misma precisión semántica con mayor naturalidad. También mantiene el sentido idiomático de דְּבַר יוֹם בְּיוֹמוֹ mediante una formulación compacta que preserve la idea de lo prescrito para cada día.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma consistente para el tetragrama en el texto principal.
  - Se usa 'libaciones' en plural, como corresponde al término hebreo y al contexto sacrificial.
  - '''Convocaciones santas'' conserva la estructura técnica de Levítico 23 y evita sustituirla por un término litúrgico más interpretativo.'
  - '''Holocausto'' se emplea como término sacrificial tradicional y preciso, no como eufemismo general.'
