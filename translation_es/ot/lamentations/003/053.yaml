translation:
  language: es
  text: Silenciaron mi vida en el pozo[a], y arrojaron una piedra contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «arrojaron una piedra sobre mí», posiblemente evocando que sellaron el pozo con una piedra, y no solo que me arrojaron una piedra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צָמְתוּ
  english_pob_choice: silenced
  chosen_spanish: acallaron
  alternatives_spanish:
  - cortaron
  - destruyeron
  - pusieron fin a
  lexicon: HALOT
  rationale: El verbo puede expresar poner fin o silenciar. En este contexto, con «mi vida» como objeto y en paralelo con ser arrojado al pozo, «acallaron» conserva la imagen concreta y comunica bien el efecto de acabar con la vida sin sobreinterpretar más de lo que el hebreo exige.
- source_word: בַּבּוֹר
  english_pob_choice: in the pit
  chosen_spanish: en el pozo
  alternatives_spanish:
  - en un pozo
  - en la cisterna
  - en el hoyo
  lexicon: HALOT
  rationale: בּוֹר puede referirse a un pozo, cisterna o hueco tipo calabozo. «Pozo» es natural en español y mantiene la imagen de encierro y amenaza de muerte sin forzar una precisión arquitectónica.
- source_word: חַיַּי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi ser vivo
  - a mí vivo
  lexicon: HALOT
  rationale: La forma plural con sufijo de primera persona funciona idiomáticamente como «mi vida». Esa opción es la más clara y fiel en español.
- source_word: וַיַּדּוּ
  english_pob_choice: threw
  chosen_spanish: arrojaron
  alternatives_spanish:
  - tiraron
  - lanzaron
  - castearon
  lexicon: HALOT
  rationale: El verbo significa echar o lanzar. «Arrojaron» reproduce mejor la fuerza violenta del gesto que una simple 'tiraron' y suena sobrio y bíblico en español moderno.
- source_word: אֶבֶן
  english_pob_choice: a stone
  chosen_spanish: una piedra
  alternatives_spanish:
  - una roca
  - una piedra de roca
  lexicon: HALOT
  rationale: La palabra hebrea es singular y directa. «Piedra» es el equivalente más natural en español; en este contexto comunica bien el objeto arrojado sin añadir matices innecesarios.
- source_word: בִּי
  english_pob_choice: at me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - a mí
  - encima de mí
  lexicon: HALOT
  rationale: La preposición puede indicar contacto o acción hostil. Dado que aquí sigue a «arrojaron una piedra», «contra mí» expresa mejor la agresión. La alternativa de colocar una piedra «sobre mí» queda reservada para la nota, porque el hebreo también permite la imagen de sellar el pozo con una piedra.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura auditada en inglés, pero ajusta la sintaxis para que el español suene natural: «acallaron mi vida» conserva el valor de fin/silenciamiento de צָמְתוּ; «en el pozo» mantiene בּוֹר sin precisar más de lo que permite el contexto; y la nota preserva la ambigüedad reconocida por el POB acerca de בִּי y la posible imagen de sellar la fosa con una piedra.'
  spanish_consistency_notes:
  - Se mantiene «pozo» para בּוֹר, coherente con la imaginería de encierro y peligro.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes; no hay términos teológicos especiales en este versículo.
  - «Contra mí» traduce la acción hostil con naturalidad en español, mientras la nota conserva la alternativa espacial «sobre mí».
