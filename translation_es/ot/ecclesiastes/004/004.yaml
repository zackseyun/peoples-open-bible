    text: 'O: «todo éxito en el trabajo»; el hebreo כִּשְׁרוֹן puede referirse a habilidad, competencia o al éxito que resulta de ello.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la envidia de un hombre por su prójimo». El singular masculino probablemente tiene valor representativo.'
    reason: lexical_alternative
