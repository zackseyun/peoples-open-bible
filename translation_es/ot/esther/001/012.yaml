translation:
  language: es
  text: Pero la reina Vasti se negó a venir por orden del rey, por medio de los eunucos[a], y el rey se enojó mucho[b], y su furia ardía dentro de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «por la mano de los eunucos»; es una expresión idiomática que indica que la orden fue transmitida por medio de ellos.
    reason: lexical_alternative
  - marker: b
    text: 'O: «su furor ardía dentro de él». El hebreo conserva la imagen de la ira como fuego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּמָאֵן
  english_pob_choice: refused
  chosen_spanish: se negó
  alternatives_spanish:
  - rehusó
  - se negó a
  lexicon: HALOT
  rationale: מאן expresa rechazo o negativa deliberada. «Se negó» comunica bien la voluntad resistente y suena natural en español bíblico contemporáneo.
- source_word: הַמַּלְכָּה וַשְׁתִּי
  english_pob_choice: Queen Vashti
  chosen_spanish: la reina Vasti
  alternatives_spanish:
  - la reina, Vasti
  - Vasti, la reina
  lexicon: HALOT
  rationale: En español, el título antes del nombre es idiomático y conserva tanto el oficio como la identidad personal.
- source_word: לָבוֹא
  english_pob_choice: to come
  chosen_spanish: venir
  alternatives_spanish:
  - entrar
  - acudir
  lexicon: HALOT
  rationale: En el contexto de una convocatoria real, «venir» es la equivalencia más directa y natural.
- source_word: בִּדְבַר הַמֶּלֶךְ
  english_pob_choice: at the king’s command
  chosen_spanish: a la orden del rey
  alternatives_spanish:
  - por la palabra del rey
  - según la orden del rey
  lexicon: HALOT
  rationale: דבר aquí funciona como mandato u orden. «A la orden del rey» transmite bien la idea de un requerimiento real sin forzar el español.
- source_word: אֲשֶׁר בְּיַד הַסָּרִיסִים
  english_pob_choice: by the hand of the eunuchs
  chosen_spanish: por medio de los eunucos
  alternatives_spanish:
  - por la mano de los eunucos
  - a través de los eunucos
  lexicon: HALOT
  rationale: La locución hebrea es idiomática y señala mediación. En español, «por medio de» comunica claramente esa función sin perder el sentido de agencia indirecta.
- source_word: וַיִּקְצֹף
  english_pob_choice: became very angry
  chosen_spanish: se enojó muchísimo
  alternatives_spanish:
  - se enfureció mucho
  - se irritó grandemente
  lexicon: HALOT
  rationale: קצף denota ira intensa. «Se enojó muchísimo» es claro y mantiene el progreso narrativo sin exagerar más allá del hebreo.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muchísimo
  alternatives_spanish:
  - mucho
  - en gran manera
  lexicon: HALOT
  rationale: El adverbio intensifica la ira del rey; «muchísimo» conserva esa fuerza de manera natural en español.
- source_word: וַחֲמָתוֹ בָּעֲרָה בּוֹ
  english_pob_choice: his wrath burned within him
  chosen_spanish: su furor ardía dentro de él
  alternatives_spanish:
  - su ira ardía en él
  - su furia se encendió dentro de él
  lexicon: HALOT
  rationale: חֵמָה puede ser «ira», «furor» o «furia». «Furor» preserva bien la intensidad y el campo metafórico del fuego. «Ardía dentro de él» mantiene la imagen hebrea de la ira como fuego interior.
theological_decisions:
- issue: Ningún asunto doctrinal específico; preservación del lenguaje figurado de la ira
  english_pob_reading: his wrath burned within him
  chosen_spanish_reading: su furor ardía dentro de él
  alternative_spanish_readings:
  - su ira ardía en él
  - su furia se encendió dentro de él
  rationale: El hebreo conserva una metáfora de fuego interior. La redacción elegida mantiene la imagen sin convertirla en mera afirmación abstracta de enojo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El inglés POB revisó su redacción para volver a una forma más literal de la locución hebrea «by the hand of the eunuchs». La versión española sigue esa decisión semántica con una expresión de mediación equivalente («por medio de los eunucos») y conserva el paralelismo narrativo del enojo y el fuego interior.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto solo cuando aparezca el tetragrámaton; aquí no aplica.
  - Se conserva «reina Vasti» como título más nombre, conforme al estilo español natural y al audit trail en inglés.
  - «Eunucos» se mantiene sin suavizar, dado el contexto persa cortesano del término.
  - La metáfora de fuego para la ira se preserva explícitamente para no nivelar el hebreo a una mera abstracción.
