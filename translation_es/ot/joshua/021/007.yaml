translation:
  language: es
  text: 'Para los hijos de Merari[a], según sus familias, de la tribu de Rubén, de la tribu de Gad y de la tribu de Zabulón: doce ciudades.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «A los hijos de Merari, por sus clanes, de la tribu de Rubén, de la tribu de Gad y de la tribu de Zabulón: doce ciudades».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי
  english_pob_choice: For the sons of
  chosen_spanish: Para los hijos de
  alternatives_spanish:
  - Para los descendientes de
  - A los hijos de
  lexicon: HALOT
  rationale: El prefijo ל en este contexto de distribución y asignación se expresa naturalmente en español con «para». «Hijos» conserva el parentesco del hebreo בני sin volverlo una paráfrasis más amplia como «descendientes».
- source_word: מְרָרִי
  english_pob_choice: Merari
  chosen_spanish: Merari
  lexicon: nombre propio
  rationale: Nombre propio transliterado de forma consistente con la tradición bíblica y con la auditable decisión inglesa.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their families
  chosen_spanish: según sus familias
  alternatives_spanish:
  - por sus familias
  - de acuerdo con sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה señala agrupación familiar o clánica; «según» comunica bien el valor distributivo y organizativo del pasaje, sin forzar un término más técnico que el español común.
- source_word: מִמַּטֵּה
  english_pob_choice: from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - desde la tribu de
  - a partir de la tribu de
  lexicon: HALOT
  rationale: En listas de reparto tribal, מַטֶּה funciona idiomáticamente como «tribu». En español, «de la tribu de» reproduce con naturalidad la relación de procedencia/distribución.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Reuben
  lexicon: nombre propio
  rationale: Se adopta la forma hispana asentada «Rubén», clara y reconocible para lectores bíblicos en español.
- source_word: וּמִמַּטֵּה
  english_pob_choice: and from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - y de la tribu de
  lexicon: HALOT
  rationale: El hebreo repite la fórmula con waw conjuntiva; en español la secuencia enumerativa fluye mejor repitiendo «de la tribu de» sin necesidad de otro conector pesado.
- source_word: גָד
  english_pob_choice: Gad
  chosen_spanish: Gad
  lexicon: nombre propio
  rationale: Nombre propio transliterado sin cambio.
- source_word: זְבוּלֻן
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulún
  - Zebulón
  lexicon: nombre propio
  rationale: Se usa «Zabulón», forma tradicional y ampliamente comprensible en español bíblico. Se evita una transliteración más cercana al inglés por legibilidad y uso eclesial hispano.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - poblados
  - aldeas
  lexicon: HALOT
  rationale: עִיר en listas de asignación territorial se traduce normalmente como «ciudad/ciudades». «Ciudades» mantiene el término territorial esperado sin rebajarlo a «poblados» o «aldeas».
- source_word: שְׁתֵּים עֶשְׂרֵה
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - doce en total
  lexicon: HALOT
  rationale: Se traduce con el cardinal simple «doce», que conserva exactamente el valor numérico del hebreo sin explicitar más de lo que el texto dice.
theological_decisions:
- issue: Valor distributivo del prefijo ל en el arranque del versículo
  english_pob_reading: For the sons of Merari, according to their families...
  chosen_spanish_reading: Para los hijos de Merari, según sus familias...
  alternative_spanish_readings:
  - A los hijos de Merari, según sus familias...
  - Para los hijos de Merari, por sus familias...
  rationale: 'No hay tensión doctrinal, pero sí una decisión sintáctica: el hebreo usa una fórmula de asignación en contexto de reparto de ciudades. «Para» preserva la orientación distributiva sin convertir el verso en una explicación interpretativa.'
  doctrine_reference: Distribución tribal en Josué 21; no aplica una doctrina controvertida.
translation_notes:
  revision_awareness: El texto sigue de cerca el consenso del audit trail inglés, con la única adaptación principal de estilo español en la fórmula inicial distributiva y en los nombres propios habituales en español. No se detectan revisiones textuales que alteren el sentido base.
  spanish_consistency_notes:
  - Se mantiene «tribu de» de forma uniforme para מַטֵּה en toda la enumeración.
  - Se conserva el paralelismo de la lista tribal sin añadir conectores innecesarios.
  - Los nombres propios se presentan en formas hispanas habituales cuando existen (Rubén, Zabulón) y transliteradas cuando corresponden (Merari, Gad).
