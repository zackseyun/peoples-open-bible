translation:
  language: es
  text: Zebaj y Zalmuná huyeron, y los persiguió y capturó a los dos reyes de Madián, Zebaj y Zalmuná; y sumió en pánico[a] a todo el campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aterrorizó a todo el campamento» o «desbarató a todo el campamento». El verbo hebreo puede denotar causar temblor o pánico, con implicación militar en el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּנוּסוּ
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - tomaron la fuga
  - escaparon
  lexicon: HALOT
  rationale: El verbo נוּס expresa huida/escape. «Huyeron» reproduce el valor narrativo con naturalidad en español y mantiene la fuerza del movimiento de escape sin añadir matices ajenos.
- source_word: זֶבַח וְצַלְמֻנָּע
  english_pob_choice: Zebah and Zalmunna
  chosen_spanish: Zebaj y Zalmuná
  alternatives_spanish:
  - Zebaj y Salmuná
  - Sebaj y Zalmuná
  lexicon: transliteración onomástica
  rationale: Se conservan como nombres propios. «Zebaj» refleja la consonante final gutural aproximada con j en español, y «Zalmuná» mantiene una transliteración legible y consistente para el lector hispanohablante.
- source_word: וַיִּרְדֹּף אַחֲרֵיהֶם
  english_pob_choice: he pursued them
  chosen_spanish: los persiguió
  alternatives_spanish:
  - los fue persiguiendo
  - los siguió de cerca
  lexicon: HALOT
  rationale: רָדַף con אַחֲרֵי significa perseguir. «Los persiguió» es la equivalencia directa y conserva el tono militar del relato sin expansión.
- source_word: וַיִּלְכֹּד
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - apresó
  - tomó prisioneros
  lexicon: HALOT
  rationale: En contexto bélico, לכד puede significar capturar o apresar. «Capturó» es claro, formal y compatible con la toma de reyes enemigos.
- source_word: שְׁנֵי מַלְכֵי מִדְיָן
  english_pob_choice: the two kings of Midian
  chosen_spanish: los dos reyes de Madián
  alternatives_spanish:
  - los dos reyes madianitas
  lexicon: HALOT
  rationale: Se preserva la relación constructa del hebreo con «de Madián», más cercana al orden fuente que el adjetivo derivado.
- source_word: אֶת זֶבַח וְאֶת צַלְמֻנָּע
  english_pob_choice: Zebah and Zalmunna
  chosen_spanish: Zebaj y Zalmuná
  alternatives_spanish:
  - los mismos Zebaj y Zalmuná
  lexicon: transliteración onomástica
  rationale: La repetición identifica a los dos reyes ya mencionados. En español puede conservarse sin forzar una glosa adicional, manteniendo el énfasis del hebreo.
- source_word: וְכָל הַמַּחֲנֶה
  english_pob_choice: the whole camp
  chosen_spanish: todo el campamento
  alternatives_spanish:
  - todo el ejército
  - todo el campamento militar
  lexicon: HALOT
  rationale: מַחֲנֶה puede ser campamento o hueste. «Campamento» sigue de cerca el hebreo y conserva la imagen concreta del despliegue militar.
- source_word: הֶחֱרִיד
  english_pob_choice: he threw ... into panic
  chosen_spanish: sumió en pánico
  alternatives_spanish:
  - aterrorizó
  - hizo temblar
  lexicon: HALOT
  rationale: El hiphil de חרד puede significar causar temblor, terror o pánico. «Sumió en pánico» refleja la acción causativa y la desorganización militar, preservando la alternativa semántica que el inglés POB anotó.
translation_notes:
  revision_awareness: El texto sigue el estado revisado más reciente sin cambios sustantivos; se mantiene el acuerdo alto del control cruzado y la equivalencia óptima del original inglés como guía, pero la redacción española se construye directamente desde el hebreo con apoyo del audit trail.
  spanish_consistency_notes:
  - Se mantiene «Madián» como forma estable del topónimo.
  - Se translitera «Zebaj» con j para reflejar la aspiración final y mantener uniformidad en el registro español.
  - Se usa «campamento» en singular colectivo para conservar el sujeto de conjunto del hebreo.
  - No se introduce «SEÑOR» ni terminología teológica adicional, porque el verso no contiene el Tetragrámaton ni una alusión explícita al nombre divino.
