translation:
  language: es
  text: para que prolonguen sus días en la tierra que Yahvé juró dar a sus padres[a], a ellos y a su descendencia[b], una tierra que mana leche y miel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a sus antepasados». El hebreo dice literalmente «a sus padres».
    reason: lexical_alternative
  - marker: b
    text: O «a su simiente». El término hebreo puede denotar descendencia en sentido colectivo o descendientes de manera más amplia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: La expresión introduce finalidad. «Para que» es natural en español y conserva con claridad el valor purposivo del hebreo sin añadir matiz innecesario.
- source_word: תַּאֲרִיכוּ יָמִים
  english_pob_choice: you may live long
  chosen_spanish: prolonguen sus días
  alternatives_spanish:
  - vivan largos días
  - alarguen sus días
  lexicon: HALOT
  rationale: El hebreo dice literalmente «alargar días». En español, «prolonguen sus días» mantiene la metáfora verbal y el sentido de longevidad, sin perder la fuerza idiomática.
- source_word: עַל הָאֲדָמָה
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el terreno
  lexicon: HALOT
  rationale: Aquí אֲדָמָה se refiere al territorio prometido. «Sobre la tierra» conserva la preposición del hebreo y su referencia territorial en un español claro.
- source_word: אֲשֶׁר נִשְׁבַּע יְהוָה
  english_pob_choice: that Yahweh swore
  chosen_spanish: que Yahvé juró
  alternatives_spanish:
  - que Yahvé prometió con juramento
  - que Yahvé había jurado
  lexicon: HALOT
  rationale: «Juró» reproduce el lenguaje de pacto del hebreo con la solemnidad debida. Se mantiene «Yahvé» según la pauta del proyecto para יְהוָה.
- source_word: לַאֲבֹתֵיכֶם
  english_pob_choice: to your fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a sus padres/antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a vuestros padres». En español, «sus padres» conserva el referente familiar y la forma directa del texto; se deja abierta la alternativa semántica sin neutralizar innecesariamente.
- source_word: לָתֵת לָהֶם וּלְזַרְעָם
  english_pob_choice: to give to them and to their offspring
  chosen_spanish: que les daría a ellos y a su descendencia
  alternatives_spanish:
  - que les daría a ellos y a su simiente
  - que les daría a ellos y a sus descendientes
  lexicon: HALOT
  rationale: 'Se conserva la doble dativa del hebreo: para ellos y para su descendencia. «Descendencia» expresa bien el sentido colectivo de זֶרַע en español bíblico contemporáneo.'
- source_word: אֶרֶץ
  english_pob_choice: a land
  chosen_spanish: tierra
  alternatives_spanish:
  - una tierra
  - el país
  lexicon: HALOT
  rationale: En aposición final, «tierra» funciona de manera natural en español y refleja el valor territorial del término sin forzar un artículo indefinido.
- source_word: זָבַת חָלָב וּדְבָשׁ
  english_pob_choice: flowing with milk and honey
  chosen_spanish: que fluye leche y miel
  alternatives_spanish:
  - que fluye con leche y miel
  - tierra que mana leche y miel
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de abundancia y fertilidad. «Fluye leche y miel» sigue de cerca la construcción del original y es plenamente inteligible en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto pide usar «Yahvé» para el Tetragrama en el texto principal. Esto mantiene visible el nombre de pacto del original y evita el reemplazo por una convención de máscara.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Tratamiento de לַאֲבֹתֵיכֶם
  english_pob_reading: to your fathers
  chosen_spanish_reading: a sus padres
  alternative_spanish_readings:
  - a sus antepasados
  rationale: El hebreo dice literalmente «padres». Se conserva esa relación lexical en el cuerpo del texto; la alternativa «antepasados» queda implícita como opción semántica, pero no se impone en el texto principal.
  doctrine_reference: Lexical faithfulness to the Hebrew family-language in covenant contexts
translation_notes:
  revision_awareness: 'La versión inglesa auditada ya fue revisada y quedó sin cambios en la última pasada. Para el español, se siguió la misma lectura estable: propósito, juramento divino, destinatarios del don y la fórmula territorial de abundancia, sin introducir reinterpretaciones.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה.
  - Se mantuvo «descendencia» para זרע, evitando «simiente» por claridad natural en español.
  - Se conservó la imagen bíblica de «fluye leche y miel» como fórmula de abundancia.
  - La sintaxis reproduce el encadenamiento del hebreo sin sobrecargarlo con subordinación adicional.
