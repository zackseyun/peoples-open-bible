translation:
  language: es
  text: 'Ahora el rey Joram había vuelto a Jezreel para recuperarse de las heridas que los arameos le habían causado cuando peleó contra Hazael, rey de Aram. Y Jehú dijo: “Si esto es lo que ustedes quieren[a], que no salga ningún fugitivo de la ciudad para ir a contarlo en Jezreel.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Si esta es su voluntad” o “Si están dispuestos”. El hebreo dice literalmente: “Si hay su alma/vida”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: had returned
  chosen_spanish: había vuelto
  alternatives_spanish:
  - había regresado
  - volvió
  lexicon: HALOT
  rationale: El hebreo indica el regreso de Joram al lugar; en español, el pluscuamperfecto ayuda a mantener la relación temporal con la acción posterior de Jehú, como en el audit trail inglés.
- source_word: לְהִתְרַפֵּא
  english_pob_choice: to recover
  chosen_spanish: para recuperarse
  alternatives_spanish:
  - para sanar
  - para ser curado
  lexicon: HALOT
  rationale: El hitpael expresa estar en proceso de recobrar la salud tras una lesión. 'Recuperarse' es natural en español y no sugiere auto-sanación mecánica.
- source_word: מִן הַמַּכִּים
  english_pob_choice: from the wounds
  chosen_spanish: de las heridas
  alternatives_spanish:
  - de los golpes
  - de las lesiones
  lexicon: HALOT
  rationale: Aunque el sustantivo puede aludir a golpes, el contexto médico-militar pide 'heridas' como equivalente más idiomático y preciso en español.
- source_word: יַכֻּהוּ
  english_pob_choice: had inflicted on him
  chosen_spanish: le habían causado
  alternatives_spanish:
  - le habían dado
  - lo habían herido
  lexicon: HALOT
  rationale: El verbo נכה conserva la idea de golpear o herir; en español, 'causar heridas' transmite la relación causal sin endurecer la frase.
- source_word: אֲרַמִּים
  english_pob_choice: the Arameans
  chosen_spanish: los arameos
  alternatives_spanish:
  - los sirios
  lexicon: HALOT
  rationale: Se preserva el etnónimo histórico del hebreo. 'Sirios' es la alternativa tradicional, pero aquí se evita por su posible anacronismo y por la preferencia documentada del POB inglés.
- source_word: בְּהִלָּחֲמוֹ אֶת חֲזָאֵל
  english_pob_choice: when he fought against Hazael
  chosen_spanish: cuando peleó contra Hazael
  alternatives_spanish:
  - cuando combatió con Hazael
  - en su lucha contra Hazael
  lexicon: HALOT
  rationale: La construcción temporal-circunstancial se vierte con 'cuando'. 'Peleó contra' comunica bien la oposición militar en español actual.
- source_word: אִם יֵשׁ נַפְשְׁכֶם
  english_pob_choice: If this is your mind
  chosen_spanish: Si esto es lo que ustedes piensan[a]
  alternatives_spanish:
  - Si esto es su deseo[a]
  - Si ustedes están dispuestos[a]
  lexicon: HALOT
  rationale: נפש aquí funciona como idiom a de voluntad/deseo/mente. En español, 'lo que piensan' recoge la lectura mental de forma comprensible, y la nota conserva las alternativas semánticas documentadas.
- source_word: פָלִיט
  english_pob_choice: fugitive
  chosen_spanish: fugitivo
  alternatives_spanish:
  - escapado
  - el que escape
  lexicon: HALOT
  rationale: El término designa a quien logra escapar. 'Fugitivo' es la equivalencia directa y funciona bien en el contexto de impedir que salga con noticias.
- source_word: לָלֶכֶת לְהַגִּיד
  english_pob_choice: to go and tell it
  chosen_spanish: para ir a contarlo
  alternatives_spanish:
  - para ir a informarlo
  - para ir a anunciarlo
  lexicon: HALOT
  rationale: La secuencia de infinitivos expresa propósito. 'Ir a contarlo' es fluido en español y conserva el matiz de desplazamiento para comunicar la noticia.
- source_word: בְּיִזְרְעֶאל
  english_pob_choice: in Jezreel
  chosen_spanish: en Jezreel
  alternatives_spanish:
  - a Jezreel
  lexicon: HALOT
  rationale: Se conserva la referencia locativa con 'en', como en el inglés auditado.
theological_decisions:
- issue: Nombre divino no presente en el versículo
  english_pob_reading: No divine-name issue arises in this verse; the English POB uses only historical names and titles.
  chosen_spanish_reading: No aparece el nombre divino en este versículo; se mantienen solo nombres históricos y títulos.
  alternative_spanish_readings:
  - No aplica
  rationale: No hay decisión teológica adicional que hacer respecto a יהוה o κύριος en este pasaje.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Seguí la revisión inglesa más reciente que añadió 'and' en 'to go and tell it', reflejada en español como 'para ir a contarlo', sin introducir contenido ajeno al hebreo. También mantuve el orden narrativo con pluscuamperfecto para Joram y una construcción imperativa negativa natural para Jehú.
  spanish_consistency_notes:
  - Usé 'arameos' para אֲרַמִּים, coherente con la terminología POB y el trasfondo histórico del texto.
  - Mantengo 'Joram' y 'Jehú' como formas castellanas estándar de los nombres propios bíblicos.
  - Conservé 'Jezreel' como topónimo transliterado uniforme.
  - Elegí 'heridas' en lugar de 'golpes' para una lectura más natural en español sin perder el sentido de lesión sufrida.
  - La nota textual en el versículo preserva la ambigüedad hebrea de נַפְשְׁכֶם, que puede implicar mente, deseo o disposición.
