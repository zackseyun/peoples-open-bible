translation:
  language: es
  text: 'Y Judá dijo a Simeón su hermano[a]: «Sube conmigo a mi territorio asignado, y peleemos contra los cananeos; y yo también iré contigo a tu territorio asignado». Y Simeón fue con él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mi suerte» y «tu suerte»; es decir, la porción de tierra asignada por sorteo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And Judah said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Luego dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce la acción siguiente en secuencia. En español, «Y dijo» conserva el flujo narrativo sin añadir una inferencia temporal más fuerte que la del hebreo.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: Nombre propio de la tribu/persona; la forma castellana asentada y fiel es «Judá».
- source_word: לְשִׁמְעוֹן אָחִיו
  english_pob_choice: to Simeon his brother
  chosen_spanish: a Simeón su hermano
  alternatives_spanish:
  - a Simeón, su hermano
  - a Simeón, su pariente
  lexicon: HALOT
  rationale: Se conserva el lenguaje de parentesco explícito. «Hermano» refleja literalmente אָחִיו y preserva la relación tribal/ancestral sin generalizarla a «pariente».
- source_word: עֲלֵה אִתִּי
  english_pob_choice: Come up with me
  chosen_spanish: Sube conmigo
  alternatives_spanish:
  - Ven conmigo arriba
  - Ve conmigo
  lexicon: HALOT
  rationale: עלה en discurso directo se expresa naturalmente como «sube». El español no necesita forzar un calco de dirección; «conmigo» conserva la invitación a acompañar al hablante.
- source_word: בְגוֹרָלִי
  english_pob_choice: into my allotted territory
  chosen_spanish: a mi territorio asignado
  alternatives_spanish:
  - en mi suerte
  - a mi lote
  lexicon: HALOT
  rationale: גוֹרָל aquí funciona metonímicamente como la porción territorial recibida por sorteo. «Territorio asignado» comunica el sentido contextual y evita la oscuridad de «suerte/lote» en el español actual.
- source_word: וְנִלָּחֲמָה
  english_pob_choice: and let us fight
  chosen_spanish: y pelearemos
  alternatives_spanish:
  - y luchemos
  - y combatiremos
  lexicon: HALOT
  rationale: El cohortativo plural expresa una propuesta/invitación conjunta. «Pelearemos» reproduce el compromiso mutuo de forma natural en español; «luchemos» podría sonar más exhortativo, pero aquí la secuencia promesa-invitación favorece el futuro coordinado.
- source_word: בַּכְּנַעֲנִי
  english_pob_choice: against the Canaanites
  chosen_spanish: contra los cananeos
  alternatives_spanish:
  - contra el cananeo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular colectiva, el español expresa naturalmente el grupo en plural. «Cananeos» mantiene el valor colectivo del referente.
- source_word: וְהָלַכְתִּי גַם אֲנִי אִתְּךָ
  english_pob_choice: and I too will go with you
  chosen_spanish: y yo también iré contigo
  alternatives_spanish:
  - y también yo iré contigo
  - y yo asimismo iré contigo
  lexicon: HALOT
  rationale: גַם אֲנִי enfatiza reciprocidad y énfasis personal. «Yo también» reproduce bien el equilibrio del hebreo y suena natural en español.
- source_word: בְּגוֹרָלֶךָ
  english_pob_choice: into your allotted territory
  chosen_spanish: a tu territorio asignado
  alternatives_spanish:
  - en tu suerte
  - a tu lote
  lexicon: HALOT
  rationale: Se mantiene la misma solución que para בְגוֹרָלִי por coherencia semántica y estilística. El contexto de distribución territorial sigue siendo explícito.
- source_word: וַיֵּלֶךְ אִתּוֹ שִׁמְעוֹן
  english_pob_choice: So Simeon went with him
  chosen_spanish: Y Simeón fue con él
  alternatives_spanish:
  - Entonces Simeón fue con él
  - Así que Simeón fue con él
  lexicon: HALOT
  rationale: El verbo הלך se puede traducir aquí de manera simple como «fue». «Con él» conserva la relación de acompañamiento, y la coordinación con «Y» mantiene la secuencia narrativa.
theological_decisions:
- issue: Relación de parentesco entre Judá y Simeón
  english_pob_reading: his brother
  chosen_spanish_reading: su hermano
  alternative_spanish_readings:
  - su pariente
  - su aliado
  rationale: El hebreo usa de forma explícita el lenguaje de hermano. Mantenerlo evita diluir la relación y respeta tanto el dato literal como el trasfondo tribal de Israel.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate over gender-neutral
- issue: Sentido de גוֹרָל en el contexto de conquista y reparto territorial
  english_pob_reading: allotted territory
  chosen_spanish_reading: territorio asignado
  alternative_spanish_readings:
  - lote asignado
  - porción asignada
  rationale: El término señala la porción obtenida por sorteo en el reparto de la tierra. «Territorio asignado» hace explícito el valor metonímico sin introducir una interpretación ajena al pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy, optimal equivalence / original-language primacy
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y coincide con el auditor inglés en las decisiones clave: secuencia narrativa de wayyiqtol, sentido colectivo de «cananeos», valor recíproco de «yo también», y traducción metonímica de גוֹרָל como territorio asignado. No se identificaron revisiones posteriores que alteraran la solución base.'
  spanish_consistency_notes:
  - Se mantuvo «Judá» y «Simeón» como nombres propios estándar en español.
  - «Territorio asignado» se usó de manera consistente para ambos miembros de la pareja בְגוֹרָלִי / בְגוֹרָלֶךָ.
  - Se evitó «SEÑOR» u otras convenciones no presentes en el pasaje; el texto no contiene el nombre divino.
  - El registro es bíblico y sobrio, con puntuación española y comillas angulares.
