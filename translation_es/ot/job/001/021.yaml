base_translation:
  language: en
  yaml_path: translation/ot/job/001/021.yaml
  text: And he said[a], “Naked I came out from my mother’s womb, and naked I will return there. Yahweh gave, and Yahweh has taken away[b]. May the name of Yahweh be blessed.”
  footnotes:
  - marker: a
    text: Or 'and naked I will return'; the Hebrew says 'there,' leaving the destination implicit. It may allude figuratively to the womb, or more broadly to the earth/grave and the state of having nothing.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew: ''YHWH'' (the divine name), traditionally rendered ''the LORD.'''
    reason: lexical_alternative
