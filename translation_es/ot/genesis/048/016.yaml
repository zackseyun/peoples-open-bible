translation:
  language: es
  text: El ángel que me ha redimido de todo mal[a], bendiga a los muchachos; y que mi nombre y el nombre de mis padres, Abraham e Isaac, sea llamado sobre ellos[b][e]; y que se multipliquen mucho[c] en medio de la tierra[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de todo daño' o 'de toda aflicción'. El hebreo 'mal' puede abarcar calamidad además de mal moral.
    reason: lexical_alternative
  - marker: b
    text: O 'que sean llamados por mi nombre'. El modismo hebreo dice literalmente 'que mi nombre sea llamado sobre ellos'.
    reason: lexical_alternative
  - marker: c
    text: O 'lleguen a ser una multitud'. El verbo hebreo es raro y sugiere aumento abundante, posiblemente con imaginería semejante a la de los peces.
    reason: lexical_alternative
  - marker: d
    text: O 'en medio del país'. El hebreo 'tierra' también puede entenderse como 'país' según el contexto.
    reason: alternative_reading
  - marker: e
    text: O 'y que mi nombre sea llamado sobre ellos, y el nombre de mis padres Abraham e Isaac'.
    reason: previous_rendering
lexical_decisions:
- source_word: הַמַּלְאָךְ
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: HALOT
  rationale: מַלְאָךְ puede significar 'mensajero' o 'ángel'. Aquí, en el marco de la bendición de Jacob, 'el ángel' preserva el sentido contextual y la lectura tradicional sin forzar una identificación ontológica que el hebreo no explicita.
- source_word: הַגֹּאֵל
  english_pob_choice: who has redeemed me
  chosen_spanish: que me ha redimido
  alternatives_spanish:
  - que me redime
  - que me ha librado
  lexicon: HALOT
  rationale: El participio de גאל expresa la acción de redimir o rescatar como goel. 'Me ha redimido' conserva el matiz retrospectivo de la bendición y el peso redentor del verbo mejor que un simple 'librado'.
- source_word: מִכָּל רָע
  english_pob_choice: from all evil
  chosen_spanish: de todo mal
  alternatives_spanish:
  - de todo daño
  - de toda aflicción
  - de todo mal y peligro
  lexicon: HALOT
  rationale: רָע puede abarcar mal moral o calamidad/daño. 'Todo mal' mantiene esa amplitud semántica en español sin restringir indebidamente el alcance a una sola clase de peligro.
- source_word: יְבָרֵךְ
  english_pob_choice: may he bless
  chosen_spanish: bendiga
  alternatives_spanish:
  - que bendiga
  - bendecirá
  lexicon: HALOT
  rationale: En este contexto de bendición, el yiqtol funciona con valor jussivo/optativo. En español, 'bendiga' expresa de manera natural esa fuerza deseativa.
- source_word: הַנְּעָרִים
  english_pob_choice: the boys
  chosen_spanish: los muchachos
  alternatives_spanish:
  - los jóvenes
  - los muchachos
  lexicon: HALOT
  rationale: Se refiere concretamente a Efraín y Manasés como descendientes jóvenes. 'Muchachos' es claro, natural y adecuado para un registro bíblico moderno sin volverlo demasiado coloquial.
- source_word: וְיִקָּרֵא בָהֶם שְׁמִי
  english_pob_choice: may my name be called on them
  chosen_spanish: sea llamado sobre ellos mi nombre
  alternatives_spanish:
  - que mi nombre sea llamado sobre ellos
  - que sean llamados por mi nombre
  lexicon: HALOT
  rationale: El hebreo usa la construcción idiomática de un nombre 'llamado sobre' alguien. 'Sea llamado sobre ellos mi nombre' preserva la imagen semítica y evita suavizarla prematuramente, mientras que 'por mi nombre' sería más interpretativo.
- source_word: וְשֵׁם אֲבֹתַי אַבְרָהָם וְיִצְחָק
  english_pob_choice: and the name of my fathers Abraham and Isaac
  chosen_spanish: y el nombre de mis padres, Abraham e Isaac
  alternatives_spanish:
  - y el nombre de mis padres Abraham e Isaac
  - y los nombres de mis padres, Abraham e Isaac
  lexicon: HALOT
  rationale: El singular 'nombre' en hebreo gobierna la frase compuesta. 'Mis padres' conserva la referencia genealógica y de herencia familiar en español; se mantiene el singular para reflejar la forma hebrea y la unidad conceptual del linaje.
- source_word: וְיִדְגּ֥וּ לָרֹב
  english_pob_choice: may they multiply greatly
  chosen_spanish: multiplíquense en gran manera
  alternatives_spanish:
  - crezcan en gran manera
  - se multipliquen abundantemente
  - sean muchos
  lexicon: HALOT
  rationale: דגה es un verbo raro con posible imaginería de peces y abundancia. 'Multiplíquense en gran manera' comunica con claridad la idea de crecimiento prolífico y conserva el valor intensivo del hebreo.
- source_word: בְּקֶרֶב הָאָרֶץ
  english_pob_choice: in the midst of the land
  chosen_spanish: en medio de la tierra
  alternatives_spanish:
  - en medio de la tierra
  - dentro de la tierra
  - en medio del país
  lexicon: HALOT
  rationale: אָרֶץ puede significar 'tierra' o 'país/land'. Aquí 'tierra' conserva la amplitud posible del hebreo y sigue de cerca la formulación del texto fuente, con una resonancia que el lector español entiende naturalmente.
theological_decisions:
- issue: Identidad del ángel en la bendición de Jacob
  english_pob_reading: Retain 'the angel' without specifying a christological or theophanic identification.
  chosen_spanish_reading: Mantener 'el ángel' sin precisar si se trata de una manifestación de Dios o de un mensajero creado.
  alternative_spanish_readings:
  - el ángel como manifestación de Dios
  - el ángel como mensajero creado que actúa para Dios
  rationale: El hebreo vincula estrechamente al ángel con la preservación divina, pero no define explícitamente su identidad ontológica. En español se conserva esa tensión teológica sin resolverla por anticipado.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión aplicada al inglés que unifica el sujeto compuesto ('mi nombre y el nombre de mis padres...') bajo un solo verbo pasivo; por eso el español también integra ambos nombres en una sola cláusula verbal. La lectura final evita dividir indebidamente la construcción hebrea.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando el hebreo lo exige explícitamente; aquí el pasaje no contiene el Tetragrámaton.
  - '''Ángel'' se conserva como término auditado por el inglés POB y por la ambigüedad teológica del texto.'
  - '''Redimido'' se eligió para גאל por su fuerza lexical y su compatibilidad con el contexto patriarcal.'
  - '''Tierra'' se prefirió a ''mundo'' o ''país'' para conservar la amplitud semántica de ארץ.'
