translation:
  language: es
  text: Y Dios cambió el espíritu del rey a la dulzura[a], y, angustiado, se levantó de un salto de su trono y la tomó en sus brazos hasta que ella se recobró[b], y la consoló con palabras de paz[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la disposición del rey» o «la mente del rey»; el griego dice «espíritu».
    reason: lexical_alternative
  - marker: b
    text: O «hasta que se repuso» o «hasta que recobró la compostura».
    reason: lexical_alternative
  - marker: c
    text: O «con palabras tranquilizadoras» o «con palabras de paz».
    reason: lexical_alternative
lexical_decisions:
- source_word: μετέβαλεν
  english_pob_choice: changed
  chosen_spanish: cambió
  alternatives_spanish:
  - transformó
  - alteró
  lexicon: LSJ
  rationale: El verbo expresa un cambio real producido por Dios. «Cambió» es natural en español y conserva la causalidad directa sin añadir matices no presentes en el griego.
- source_word: τὸ πνεῦμα τοῦ βασιλέως
  english_pob_choice: the king’s spirit
  chosen_spanish: el espíritu del rey
  alternatives_spanish:
  - la disposición del rey
  - la mente del rey
  lexicon: LSJ
  rationale: «Espíritu» mantiene el término del texto fuente y la tensión entre interioridad y agencia divina. Las alternativas explicitan la idea, pero reducen la conexión lexical con πνεῦμα.
- source_word: εἰς πραΰτητα
  english_pob_choice: to gentleness
  chosen_spanish: a mansedumbre
  alternatives_spanish:
  - a gentileza
  - a suavidad
  lexicon: LSJ
  rationale: «Mansedumbre» es fiel al campo semántico de πραΰτης y es una palabra bíblica transparente en español. «Gentileza» o «suavidad» suenan más generales y menos precisas en este contexto.
- source_word: ἀγωνιάσας
  english_pob_choice: in anguish
  chosen_spanish: angustiado
  alternatives_spanish:
  - en angustia
  - afligido
  lexicon: LSJ
  rationale: El participio expresa intensa aflicción o ansiedad. «Angustiado» funciona bien en español como participio/adjetivo circunstancial y preserva la fuerza emocional del pasaje.
- source_word: ἀνεπήδησεν
  english_pob_choice: sprang up
  chosen_spanish: saltó
  alternatives_spanish:
  - se irguió de un salto
  - se levantó de un salto
  lexicon: LSJ
  rationale: El verbo denota un movimiento súbito hacia arriba. «Saltó de su trono» comunica vivacidad narrativa de forma natural en español.
- source_word: ἀνέλαβεν αὐτὴν ἐπὶ τὰς ἀγκάλας αὐτοῦ
  english_pob_choice: took her into his arms
  chosen_spanish: la tomó en sus brazos
  alternatives_spanish:
  - la recibió en sus brazos
  - la abrazó
  lexicon: LSJ
  rationale: «La tomó en sus brazos» conserva la concreción física del gesto y evita suavizarlo demasiado. «La abrazó» es más interpretativo; «la recibió en sus brazos» es posible, pero menos directo.
- source_word: μέχρις οὗ κατέστη
  english_pob_choice: until she recovered
  chosen_spanish: hasta que ella se recobró
  alternatives_spanish:
  - hasta que se tranquilizó
  - hasta que recuperó el aliento
  lexicon: LSJ
  rationale: El contexto sugiere que Esther recupera la compostura o estabilidad. «Se recobró» permite esa amplitud semántica sin decidir de manera demasiado estrecha por un solo matiz.
- source_word: παρεκάλει
  english_pob_choice: comforted
  chosen_spanish: la consoló
  alternatives_spanish:
  - la animó
  - le habló con palabras de consuelo
  lexicon: LSJ
  rationale: En este contexto el verbo implica hablar de modo tranquilizador. «La consoló» preserva el efecto pastoral y narrativo; «animó» sería más débil.
- source_word: λόγοις εἰρηνικοῖς
  english_pob_choice: with peaceful words
  chosen_spanish: con palabras de paz
  alternatives_spanish:
  - con palabras tranquilas
  - con palabras reconfortantes
  lexicon: LSJ
  rationale: «Palabras de paz» mantiene la relación con εἰρηνικοῖς y reproduce bien la fórmula del inglés POB. «Reconfortantes» explicita el efecto, pero se aleja del giro lexical.
theological_decisions:
- issue: Acción divina sobre el interior del rey
  english_pob_reading: And God changed the king’s spirit to gentleness
  chosen_spanish_reading: Y Dios cambió el espíritu del rey a mansedumbre
  alternative_spanish_readings:
  - Y Dios cambió la disposición del rey a mansedumbre
  - Y Dios cambió la mente del rey a mansedumbre
  rationale: La versión española conserva la atribución directa a Dios y mantiene «espíritu» para no diluir πνεῦμα en un término puramente psicológico. Las alternativas son posibles, pero reducirían la textura teológica del texto.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión menor: se añadió el punto final. La traducción española sigue el texto revisado y mantiene el valor narrativo y teológico del original griego sin ampliar ni suavizar indebidamente.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «espíritu» para πνεῦμα, conforme al texto fuente y al estándar POB en español.
  - Se opta por «mansedumbre» para πραΰτης por su precisión bíblica y buena inteligibilidad en español.
  - «Palabras de paz» preserva el vínculo con λόγοις εἰρηνικοῖς y evita una paráfrasis excesiva.
