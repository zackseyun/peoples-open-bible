translation:
  language: es
  text: En el tercer mes comenzaron a echar los cimientos de los montones[a][b], y en el séptimo mes los terminaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las pilas'. El sustantivo hebreo se refiere a montones acumulados de productos aportados.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'comenzaron los montones para fundar[los]'; es un modismo que significa que empezaron los montones al poner su base.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֹדֶשׁ הַשְּׁלִשִׁי
  english_pob_choice: In the third month
  chosen_spanish: En el mes tercero
  alternatives_spanish:
  - En el tercer mes
  - En el mes de tres
  lexicon: HALOT
  rationale: חֹדֶשׁ en este contexto cronológico significa 'mes'. Mantengo el orden temporal natural en español con una forma clara y bíblica, sin convertirlo en una paráfrasis.
- source_word: הֵחֵלּוּ
  english_pob_choice: they began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  - iniciaron
  lexicon: HALOT
  rationale: El verbo indica inicio de una acción; 'comenzaron' comunica bien el arranque del trabajo sin añadir matices ajenos.
- source_word: הָעֲרֵמוֹת
  english_pob_choice: the heaps
  chosen_spanish: los montones
  alternatives_spanish:
  - las pilas
  - los cúmulos
  lexicon: HALOT
  rationale: El sustantivo se refiere a acumulaciones concretas de ofrendas/provisiones. 'Montones' es fiel y natural en español; se evita 'heaps' transliterado y 'pilas' puede sonar menos preciso en este contexto.
- source_word: לְיִסּוֹד
  english_pob_choice: by laying the foundation
  chosen_spanish: a poner el fundamento
  alternatives_spanish:
  - a echar el fundamento
  - a echar la base
  - a fundarlos
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de reflejar el idioma hebreo como una acción de inicio/fundación. 'Poner el fundamento' conserva la idea de establecer la base inicial de los montones y suena idiomático en español.
- source_word: וּבַחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: and in the seventh month
  chosen_spanish: y en el mes séptimo
  alternatives_spanish:
  - y en el séptimo mes
  - y luego, en el mes séptimo
  lexicon: HALOT
  rationale: Mantengo la simetría temporal con la primera cláusula y la referencia al mes, de forma directa y precisa.
- source_word: כִּלּוּ
  english_pob_choice: they finished them
  chosen_spanish: los terminaron
  alternatives_spanish:
  - los completaron
  - acabaron con ellos
  lexicon: HALOT
  rationale: El verbo expresa culminación/completación. 'Los terminaron' es claro en español y conserva el objeto implícito del hebreo, referido a los montones.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido revisado del POB inglés: no formula ''los montones por poner el fundamento'', sino ''comenzaron a poner el fundamento de los montones'', preservando el valor idiomático del hebreo y la relación temporal entre inicio y terminación.'
  spanish_consistency_notes:
  - Se usa 'mes' de manera uniforme para בַּחֹדֶשׁ / בַחֹדֶשׁ.
  - Se evita 'SEÑOR' u այլ terminología teológica ajena porque este versículo no contiene el nombre divino ni vocabulario doctrinal relevante.
  - '''Montones'' traduce el sustantivo concreto sin suavizarlo a un término más abstracto.'
