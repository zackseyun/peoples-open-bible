translation:
  language: es
  text: Llegue mi oración[a][b] delante de ti; inclina tu oído a mi clamor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Que llegue mi oración delante de ti».'
    reason: alternative_reading
  - marker: b
    text: 'Literalmente: «ante tu rostro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּב֣וֹא
  english_pob_choice: May ... come
  chosen_spanish: Llegue
  alternatives_spanish:
  - Que llegue
  - Venga
  lexicon: HALOT
  rationale: El imperfecto qal de בוא, con sujeto femenino singular ('mi oración'), funciona aquí como petición. En español, el subjuntivo exhortativo 'llegue' transmite bien el valor volitivo sin añadir más explicación que la que permite el hebreo.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  - antes de ti
  lexicon: HALOT
  rationale: La expresión hebrea literalmente apunta a 'ante tu rostro' / 'ante ti'. 'Delante de ti' conserva la relación espacial y la idea de comparecer ante Dios, sin sonar forzado en español.
- source_word: תְּפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  - mi ruego
  lexicon: HALOT
  rationale: תפלה es el término normal para 'oración'. 'Oración' es el equivalente más directo y amplio en español; 'plegaria' o 'ruego' serían posibles, pero estrechan el matiz o cambian el registro.
- source_word: הַטֵּה
  english_pob_choice: incline
  chosen_spanish: inclina
  alternatives_spanish:
  - tiende
  - vuelve
  - dobla
  lexicon: HALOT
  rationale: El hiphil imperativo de נטה con 'oído' mantiene la metáfora de atención auditiva. 'Inclina' es el equivalente español tradicional y claro que preserva esa imagen.
- source_word: אָזְנְךָ
  english_pob_choice: your ear
  chosen_spanish: tu oído
  alternatives_spanish:
  - tu oreja
  - tu oído atento
  lexicon: HALOT
  rationale: '''Oído'' refleja mejor el uso idiomático y el registro bíblico en español que ''oreja'', y evita una literalidad corporal innecesaria. Conserva el singular del hebreo.'
- source_word: לְרִנָּתִי
  english_pob_choice: to my cry
  chosen_spanish: a mi clamor
  alternatives_spanish:
  - a mi grito
  - a mi voz de clamor
  - a mi súplica
  lexicon: HALOT
  rationale: רִנָּה puede abarcar un clamor agudo o un grito resonante; en el lamento del Salmo 88, 'clamor' comunica bien la intensidad doliente sin sugerir alegría. 'Súplica' suaviza demasiado el término.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC y el audit trail inglés. Se conserva el valor de petición del imperfecto de תָּב֣וֹא con un subjuntivo español natural; no se introducen lecturas doctrinales ajenas al versículo, y se mantiene la metáfora de atención auditiva ('inclina tu oído').
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' en la política general del proyecto cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usó 'oído' para mantener el idiomatismo bíblico de atención, no 'oreja', por claridad y dignidad estilística.
  - '''Clamor'' preserva mejor la intensidad de רִנָּה en un contexto de lamento que ''súplica'' o ''grito'' en aislamiento.'
