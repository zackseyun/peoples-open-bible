- from: Las familias de los gersonitas acamparán detrás del tabernáculo[a], hacia el occidente.
  to: Los clanes de los gersonitas acamparán detrás del tabernáculo[a], hacia el occidente.
  rationale: Se reemplaza 'familias' por 'clanes' para reflejar con más precisión el valor de מִשְׁפְּחֹת en el contexto tribal y censal de Números, en línea con la justificación documentada por la auditoría inglesa. El resto del texto y la nota pueden mantenerse.
