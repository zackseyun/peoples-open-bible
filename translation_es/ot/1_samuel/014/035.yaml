- from: Saúl edificó un altar a Yahvé[a]; este fue el primer altar que edificó a Yahvé.
  to: Saúl levantó un altar para Yahvé[a]; este fue el primer altar que levantó para Yahvé.
  rationale: 'Se hicieron ajustes menores de estilo y naturalidad: ''levantó'' evita la rigidez repetitiva de ''edificó'', y ''para Yahvé'' expresa mejor en español la idea de dedicación del altar. Se conserva la decisión exegética principal del POB y la nota con la alternativa más literal.'
