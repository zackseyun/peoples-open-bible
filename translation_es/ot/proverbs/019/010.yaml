  spanish_quality_summary: El español es claro y digno, pero la segunda mitad gana naturalidad proverbial con «mucho menos que un esclavo gobierne a príncipes» o «mucho menos para un esclavo gobernar a príncipes». Además, «gobierne sobre príncipes» es comprensible, pero «gobierne a príncipes» suena más idiomático en español para autoridad personal. También conviene conservar las notas léxicas del inglés porque el POB documentó alternativas significativas para «lujo», «esclavo» y «príncipes».
