- from: Destruyeron el trono de David con arrogante usurpación[a]. Pero tú, oh Dios, los derribarás y quitarás[b] su descendencia de la tierra.
  to: Destruyeron el trono de David con arrogante usurpación[a]. Pero tú, oh Dios, los derribarás y quitarás de la tierra a su descendencia[b].
