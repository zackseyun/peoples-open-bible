translation:
  language: es
  text: Y el ganado vacuno fue de treinta y seis mil, y su tributo para Yahvé fue de setenta y dos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הַבָּקָר
  english_pob_choice: the cattle
  chosen_spanish: el ganado vacuno
  alternatives_spanish:
  - el ganado
  - los bovinos
  - los bueyes
  lexicon: HALOT
  rationale: בָּקָר nombra el ganado bovino en conjunto. En español, "ganado vacuno" conserva el valor colectivo y evita restringirlo a bueyes solamente. "El ganado" es posible, pero "vacuno" aclara el referente.
- source_word: שִׁשָּׁה וּשְׁלֹשִׁים אָלֶף
  english_pob_choice: thirty-six thousand
  chosen_spanish: treinta y seis mil
  alternatives_spanish:
  - seis y treinta mil
  lexicon: Uso numérico estándar en español
  rationale: El hebreo dice literalmente "seis y treinta mil", pero el español idiomático expresa la misma cantidad como "treinta y seis mil" sin alterar el sentido.
- source_word: מִכְסָם
  english_pob_choice: their tribute
  chosen_spanish: su tributo
  alternatives_spanish:
  - su contribución
  - su impuesto
  - su cuota
  lexicon: HALOT
  rationale: מֶכֶס/מִכְסָם designa una porción tasada o exigida. "Tributo" comunica bien la idea de una parte asignada a Yahvé desde el botín, manteniendo el matiz de obligación/entrega.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se conserva el nombre divino como "Yahvé" según el criterio del proyecto, en lugar de sustituirlo por un título. "Para" refleja la porción destinada o apartada para él.
- source_word: שְׁנַיִם וְשִׁבְעִים
  english_pob_choice: seventy-two
  chosen_spanish: setenta y dos
  alternatives_spanish:
  - dos y setenta
  lexicon: Uso numérico estándar en español
  rationale: Como en inglés, el orden natural en español moderno es "setenta y dos". El orden hebreo literal no aporta una diferencia semántica que deba conservarse en el texto principal.
theological_decisions:
- issue: Nombre divino YHWH / לַיהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrama de manera directa. La convención del proyecto exige transliterarlo como "Yahvé" en el texto principal, preservando el nombre de pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió "the LORD" a "Yahweh" para reflejar más directamente לַיהוָה; la versión española sigue esa misma decisión doctrinal y mantiene la equivalencia numérica y léxica sin añadir material interpretativo.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" de forma consistente con el estándar del proyecto para יְהוָה.
  - '"Tributo" se usa en sentido técnico de porción apartada, no como impuesto civil moderno.'
  - La cantidad se normaliza en español idiomático como "treinta y seis mil" y "setenta y dos".
