revisions:
- from: Esta es la ley acerca[a] del ganado, de las aves, de todo ser viviente[b] que se mueve en las aguas, y de todo ser que se arrastra sobre la tierra[c].
  to: Esta es la ley acerca[a] del ganado, de las aves, de todo ser viviente[b] que se mueve en las aguas, y de todo ser que pulula sobre la tierra[c].
  rationale: Se corrige únicamente el verbo correspondiente a הַשֹּׁרֶצֶת para preservar la distinción léxica hebrea entre רמש («moverse») y שׁרץ («pulular/swarming»). También se ajusta la nota c para mantener alternativas más estrechamente alineadas con la preposición hebrea עַל y con el POB inglés.
