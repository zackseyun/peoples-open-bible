translation:
  language: es
  text: Cambiaron su gloria[a] por la imagen de un buey[b] que come hierba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su glorioso Dios». El hebreo dice literalmente «su gloria», una forma reverencial de referirse a Dios.
    reason: lexical_alternative
  - marker: b
    text: O «toro».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמִירוּ
  english_pob_choice: They exchanged
  chosen_spanish: Cambiaron
  alternatives_spanish:
  - Intercambiaron
  - Sustituyeron
  lexicon: HALOT
  rationale: El hebreo expresa intercambio o sustitución de una cosa por otra. «Cambiaron» transmite bien la idea de abandonar una realidad por otra, en español natural y sin suavizar la acusación idolátrica.
- source_word: כְּבוֹדָם
  english_pob_choice: their glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su glorioso Dios
  - su honor
  - su Glorioso
  lexicon: HALOT
  rationale: Se conserva el sintagma abstracto del hebreo. «Gloria» mantiene la forma reverencial y deja que el contexto señale que se trata de Dios, sin explicitarlo en el cuerpo del versículo.
- source_word: בְּתַבְנִית
  english_pob_choice: for the image of
  chosen_spanish: por la imagen de
  alternatives_spanish:
  - por la forma de
  - por la semejanza de
  - por la figura de
  lexicon: HALOT
  rationale: תַבְנִית puede significar forma, patrón o semejanza. En este contexto idolátrico, «imagen» es la equivalencia más clara y natural en español, y conserva la fuerza del reemplazo.
- source_word: שׁוֹר
  english_pob_choice: an ox
  chosen_spanish: un buey
  alternatives_spanish:
  - un toro
  - un novillo
  - un buey o toro
  lexicon: HALOT
  rationale: Aunque el término puede abarcar ox o bull, «buey» funciona bien en español bíblico y conserva el matiz de un animal domesticado y común. Además, evita precisar más de lo que el hebreo exige.
- source_word: אֹכֵל עֵשֶׂב
  english_pob_choice: that eats grass
  chosen_spanish: que come hierba
  alternatives_spanish:
  - comedor de hierba
  - que se alimenta de hierba
  - que pace
  lexicon: HALOT
  rationale: 'La construcción participial con complemento se rinde de modo natural con una relativa en español. «Que come hierba» mantiene la ironía del texto: lo glorioso es reemplazado por un animal que solo pace.'
theological_decisions:
- issue: Referencia de «su gloria»
  english_pob_reading: Retain the literal phrase 'their glory' rather than making the referent explicit as 'God' in the main text.
  chosen_spanish_reading: Mantener «su gloria» en el texto principal, sin explicitar «Dios».
  alternative_spanish_readings:
  - su glorioso Dios
  - Dios
  - su gloria, es decir, Dios
  rationale: El contexto apunta claramente a Dios, pero el hebreo usa la expresión reverencial «su gloria». Preservarla mantiene la tensión retórica y la huella intertextual del reproche, sin resolverla demasiado pronto en la traducción.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con la revisión más reciente: no se requirieron cambios sustantivos respecto del juicio auditado, y la redacción mantiene las decisiones léxicas y teológicas principales confirmadas por el control de concordancia.'
  spanish_consistency_notes:
  - Se mantiene «gloria» en minúscula para reflejar el abstracto hebreo y evitar una paráfrasis explicativa en el texto principal.
  - «Buey» se eligió como equivalente amplio y natural de שׁוֹר; la nota ofrece la alternativa «toro» porque el término admite esa variación léxica en español.
  - La relativa «que come hierba» conserva la ironía del participio hebreo sin añadir intensificadores innecesarios.
  - La puntuación y la cadencia buscan un registro bíblico claro, pero no arcaizante.
