base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/001/022.yaml
  text: And above the heads of the living creatures there was the likeness of an expanse[a], like the appearance of awe-inspiring ice[b], stretched out above their heads from above.
  footnotes:
