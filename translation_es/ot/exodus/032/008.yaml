revisions:
- from: 'Se han apartado rápidamente del camino que yo les mandé. Se han hecho para sí un[a] imagen fundida de un becerro, y se han postrado ante él y le han ofrecido sacrificios, y dijeron: «Estos son tus dioses, Israel, que te hicieron subir de la tierra de Egipto».'
  to: 'Se han apartado rápidamente del camino que yo les mandé. Se han hecho para sí mismos una imagen fundida de un becerro, y se han postrado ante él y le han ofrecido sacrificios, y han dicho: «Estos son tus dioses, Israel[a], que te hicieron subir de la tierra de Egipto».'
  rationale: Se corrige el marcador de nota, se sustituye la nota redundante por la alternativa singular documentada en la POB inglesa para la aclamación idolátrica, y se ajusta «y dijeron» a «y han dicho» para mantener la coherencia verbal del español sin alterar el sentido. También se suaviza «para sí» a «para sí mismos» por idiomaticidad.
  reviewer_model: gpt-5.4
