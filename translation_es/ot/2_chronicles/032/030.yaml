base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/032/030.yaml
  text: Hezekiah was the one who stopped up the upper outlet of the waters of Gihon and directed them down westward to the city of David[b][a]. And Hezekiah prospered in all his works.
  footnotes:
  - marker: a
    text: Or 'the upper spring of Gihon.' The Hebrew term can refer either to the place where the water emerges or, more broadly, to the spring/outflow itself.
    reason: lexical_alternative
  - marker: b
    text: Or 'channeled them' or 'made them flow straight.' The Hebrew verb suggests directing the waters in a straightened course.
    reason: lexical_alternative
