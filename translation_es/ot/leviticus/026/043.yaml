translation:
  language: es
  text: Pero la tierra será abandonada por ellos y gozará de sus sábados mientras quede desolada sin ellos, y ellos soportarán la pena por su iniquidad[a], porque—sí, porque— desecharon mis juicios y su alma aborreció mis estatutos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aceptarán su iniquidad» o «harán expiación por su iniquidad». El giro hebreo puede entenderse de más de una manera; aquí se vierte en su sentido judicial dentro del contexto de castigo del pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּעָזֵב
  english_pob_choice: will be abandoned
  chosen_spanish: será abandonada
  alternatives_spanish:
  - quedará abandonada
  - será dejada
  lexicon: HALOT
  rationale: 'El nifal imperfecto expresa pasividad: la tierra recibe la acción de quedar sin ocupantes. «Será abandonada» conserva la fuerza pasiva y suena natural en español bíblico contemporáneo.'
- source_word: וְתִרֶץ
  english_pob_choice: will enjoy
  chosen_spanish: gozará
  alternatives_spanish:
  - hará sus reparaciones
  - pagará
  lexicon: HALOT
  rationale: En este contexto de la tierra y sus sábados, רצה no significa simplemente «aceptar», sino recibir o disfrutar el descanso que le corresponde. «Gozará de sus sábados» mantiene la lectura contextual del inglés POB y evita una traducción mecánica.
- source_word: שַׁבְּתֹתֶיהָ
  english_pob_choice: its Sabbaths
  chosen_spanish: sus sábados
  alternatives_spanish:
  - sus reposos sabáticos
  - sus descansos de sábado
  lexicon: HALOT
  rationale: El plural alude a los reposos sabáticos de la tierra. «Sábados» conserva la terminología pactual y es el equivalente más directo y sobrio en español.
- source_word: בָּהְשַׁמָּה מֵהֶם
  english_pob_choice: while it lies desolate without them
  chosen_spanish: mientras quede desolada sin ellos
  alternatives_spanish:
  - mientras esté desolada por causa de ellos
  - en su desolación lejos de ellos
  lexicon: HALOT
  rationale: La frase combina el estado de desolación con la ausencia del pueblo. «Quede desolada sin ellos» reproduce ambos elementos sin forzar una paráfrasis.
- source_word: יִרְצוּ אֶת עֲוֺנָם
  english_pob_choice: will accept the punishment for their iniquity
  chosen_spanish: soportarán la pena por su iniquidad
  alternatives_spanish:
  - aceptarán el castigo por su iniquidad
  - pagarán por su iniquidad
  - aceptarán su iniquidad
  lexicon: HALOT
  rationale: El inglés POB toma el giro en sentido judicial/penal. «Soportarán la pena» comunica la carga del castigo sin sugerir autoexpiación meritoria y preserva la tensión semántica del hebreo.
- source_word: עֲוֺנָם
  english_pob_choice: their punishment for iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - su castigo por la iniquidad
  lexicon: HALOT
  rationale: En español, el sintagma natural es «pena por su iniquidad»; por eso no se necesita repetir «castigo» dentro del complemento. El sustantivo hebreo mantiene aquí su referencia al pecado que acarrea pena.
- source_word: יַעַן וּבְיַעַן
  english_pob_choice: because—indeed, because—
  chosen_spanish: porque —sí, porque—
  alternatives_spanish:
  - porque —de hecho, porque—
  - puesto que —sí, puesto que—
  lexicon: HALOT
  rationale: La duplicación causal intensifica la razón. «Sí, porque» conserva el énfasis y la repetición, con puntuación natural en español.
- source_word: בְּמִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis mandatos
  - mis ordenanzas
  lexicon: HALOT
  rationale: מִשְׁפָּטִים tiene fuerza jurídico-pactual. «Juicios» mantiene la correspondencia formal y el peso legal del término mejor que opciones más generales.
- source_word: מָאָסוּ
  english_pob_choice: rejected
  chosen_spanish: desecharon
  alternatives_spanish:
  - rechazaron
  - menospreciaron
  lexicon: HALOT
  rationale: מאס implica rechazo con desprecio o desdén. «Desecharon» capta ese matiz más fuertemente que un simple «rechazaron», sin volverlo arcaico.
- source_word: חֻקֹּתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis leyes
  lexicon: HALOT
  rationale: Para distinguirlo de מִשְׁפָּטִים, «estatutos» reproduce bien la terminología legal pactual y mantiene una diferencia audible en español.
- source_word: גָּעֲלָה נַפְשָׁם
  english_pob_choice: their soul abhorred
  chosen_spanish: su alma aborreció
  alternatives_spanish:
  - su interior aborreció
  - les causó aborrecimiento
  lexicon: HALOT
  rationale: Se conserva el singular colectivo «su alma» porque el hebreo lo expresa así. «Aborreció» refleja bien געל y preserva la intensidad emocional/valorativa del original.
theological_decisions:
- issue: Sentido penal de יִרְצוּ אֶת עֲוֺנָם
  english_pob_reading: 'penal sense: ''accept the punishment for their iniquity'''
  chosen_spanish_reading: «soportarán la pena por su iniquidad»
  alternative_spanish_readings:
  - «aceptarán el castigo por su iniquidad»
  - «harán expiación por su iniquidad»
  rationale: El contexto inmediato es de maldición pactual, desolación de la tierra y compensación de los sábados omitidos. Por eso conviene una lectura penal. «Soportarán la pena» evita sugerir una expiación humana meritoria y deja claro que se trata del castigo debido.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue el último pase revisado del POB inglés: se conserva la lectura penal de יִרְצוּ אֶת עֲוֺנָם con una formulación española natural («soportarán la pena por su iniquidad»), sin volver al giro más literal «aceptarán su iniquidad». No se introducen otras variaciones doctrinales relevantes respecto del texto auditado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo lo exija explícitamente; en este versículo no aparece el nombre divino.
  - «Juicios» y «estatutos» se distinguen de manera consistente para מִשְׁפָּטִים y חֻקֹּת.
  - Se preserva el plural ritual «sábados» para שַׁבְּתֹתֶיהָ, en línea con el valor sabático de la tierra.
  - El singular colectivo «su alma» se conserva para reflejar נַפְשָׁם sin neutralizar la imagen antropológica.
