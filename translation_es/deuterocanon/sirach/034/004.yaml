translation:
  language: es
  text: ¿De lo impuro[a], qué llegará a ser limpio? ¿Y de la falsedad, qué llegará a ser verdadero?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de lo inmundo». El griego usa un adjetivo sustantivado; «lo impuro» conserva mejor el paralelismo abstracto con «la falsedad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - a partir de
  lexicon: BDAG
  rationale: La preposición griega expresa origen o procedencia; en español, 'de' comunica con naturalidad esa relación en ambas preguntas sin introducir un matiz de separación espacial innecesario.
- source_word: ἀκαθάρτου
  english_pob_choice: the unclean
  chosen_spanish: lo impuro
  alternatives_spanish:
  - lo inmundo
  - lo no limpio
  lexicon: BDAG
  rationale: El adjetivo se usa sustantivado. 'Lo impuro' preserva el valor genérico y abstracto del griego y evita forzar un sustantivo concreto como 'cosa'. 'Impuro' también conserva mejor el contraste semántico con 'limpio' en la primera pregunta.
- source_word: καθαρισθήσεται
  english_pob_choice: will be made clean
  chosen_spanish: podrá ser hecho limpio
  alternatives_spanish:
  - será limpiado
  - será purificado
  - podrá ser limpiado
  lexicon: BDAG
  rationale: El futuro pasivo apunta al resultado que podría obtenerse a partir de una fuente impura. 'Podrá ser hecho limpio' mantiene la pasividad y el sentido resultativo sin sobrecargar el verso con un tecnicismo ritual como 'purificado'.
- source_word: ψευδοῦς
  english_pob_choice: falsehood
  chosen_spanish: la falsedad
  alternatives_spanish:
  - la mentira
  - lo falso
  lexicon: BDAG
  rationale: El genitivo sustantivado pide un equivalente abstracto. 'La falsedad' reproduce mejor el paralelismo con 'lo impuro' que 'una mentira', que estrecharía el alcance a un dicho puntual.
- source_word: ἀληθεύσει
  english_pob_choice: will become true
  chosen_spanish: podrá volverse verdadero
  alternatives_spanish:
  - será verdad
  - podrá decir verdad
  - podrá probarse verdadero
  lexicon: BDAG
  rationale: En este paralelismo proverbial, el verbo no se limita necesariamente al acto de hablar verdad; expresa el resultado de llegar a ser verdadero. 'Podrá volverse verdadero' conserva ese matiz resultativo y refleja la tensión lexical documentada en el inglés POB.
theological_decisions:
- issue: Sentido de ἀληθεύσει en el paralelismo proverbial
  english_pob_reading: 'resultative sense: ''will become true'''
  chosen_spanish_reading: 'sentido resultativo: ''podrá volverse verdadero'''
  alternative_spanish_readings:
  - 'sentido de habla: ''dirá verdad'''
  - 'sentido evidencial: ''probará ser verdadero'''
  rationale: La pregunta paralela a la de lo impuro no trata primariamente de un acto de hablar, sino de si algo verdadero puede surgir de la falsedad. Por eso se mantiene una lectura de resultado, no una de simple declaración verbal.
  doctrine_reference: Sabiduría proverbial sobre la incapacidad de producir pureza o verdad a partir de un origen impuro o falso; no introduce una afirmación doctrinal adicional.
translation_notes:
  revision_awareness: La traducción sigue de cerca el texto griego de Swete. Se conserva el paralelo de dos preguntas retóricas y se mantiene la tensión lexical registrada en el audit trail inglés, especialmente en καθαρισθήσεται y ἀληθεύσει, sin convertir la segunda en una mera fórmula de 'decir la verdad'.
  spanish_consistency_notes:
  - Se usa 'limpio' para reflejar la oposición con 'impuro' y mantener una simetría idiomática en español.
  - Se evita 'purificado' porque podría sugerir un matiz ceremonial que el contexto proverbial no exige.
  - '''Falsedad'' se mantiene como abstracto paralelo a ''lo impuro'', evitando reducir el sentido a una sola mentira concreta.'
