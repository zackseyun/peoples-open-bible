translation:
  language: es
  text: Y los de la ciudad los encerraron y bloquearon las puertas con piedras.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπέκλεισαν
  english_pob_choice: shut them in
  chosen_spanish: los encerraron
  alternatives_spanish:
  - los cerraron dentro
  - los metieron bajo cerrojo
  - los dejaron encerrados
  lexicon: LSJ
  rationale: El verbo expresa cierre/enclaustramiento de personas dentro de un espacio. «Encerraron» comunica de forma natural y fiel la idea de quedar atrapados por acción de los defensores.
- source_word: οἱ ἐκ τῆς πόλεως
  english_pob_choice: those from the city
  chosen_spanish: los de la ciudad
  alternatives_spanish:
  - los habitantes de la ciudad
  - los que salían de la ciudad
  - los hombres de la ciudad
  lexicon: LSJ
  rationale: El griego dice literalmente «los de la ciudad» sin especificar sexo. Se evita añadir «hombres»; en español, «los de la ciudad» conserva la referencia colectiva y concisa del original.
- source_word: ἐνέφραξαν
  english_pob_choice: blocked
  chosen_spanish: bloquearon
  alternatives_spanish:
  - atarancaron
  - sellaron
  - cerraron
  lexicon: LSJ
  rationale: El verbo indica obstruir o taponar. «Bloquearon» reproduce bien la acción física sobre las puertas y mantiene claridad moderna.
- source_word: τὰς πύλας
  english_pob_choice: the gates
  chosen_spanish: las puertas
  alternatives_spanish:
  - las puertas de la ciudad
  - los portones
  - las entradas
  lexicon: LSJ
  rationale: En contexto militar/urbano, πύλαι se refiere a las puertas de la ciudad. «Puertas» es suficientemente natural en español; el contexto ya delimita que son las puertas urbanas.
- source_word: λίθοις
  english_pob_choice: with stones
  chosen_spanish: con piedras
  alternatives_spanish:
  - mediante piedras
  - a base de piedras
  - usando piedras
  lexicon: LSJ
  rationale: El dativo instrumental se rinde de manera directa con «con piedras», que conserva la materialidad del bloqueo.
translation_notes:
  revision_awareness: Se corrige el problema de validación anterior evitando cualquier marcador de nota no anclado en el texto. La traducción sigue de cerca el griego y la revisión inglesa reciente que ajustó «the men from the city» a «those from the city», sin introducir especificación no presente en el original.
  spanish_consistency_notes:
  - Se preserva el plural colectivo de οἱ ἐκ τῆς πόλεως con un español igualmente colectivo y no marcado por género.
  - Se mantiene el tono narrativo breve y militar del verso, sin ampliaciones explicativas.
  - No se usan notas al pie porque no hay una ambigüedad textual o lexical que requiera anclaje en este caso.
