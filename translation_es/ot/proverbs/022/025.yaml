translation:
  language: es
  text: no sea que aprendas sus caminos[a] y tomes un lazo para ti mismo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su camino» o «su manera de vivir». El hebreo singular puede referirse a la conducta habitual de una persona.
    reason: lexical_alternative
  - marker: b
    text: O «tomes una trampa para tu vida» o «para tu alma». Aquí néfesh probablemente se refiere a la persona misma, no hace una afirmación técnica sobre el alma.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - a fin de que no
  lexicon: HALOT
  rationale: En español, la construcción final negativa expresa con naturalidad la advertencia preventiva de פֶּן mejor que un calco como «menos que».
- source_word: תֶּאֱלַף
  english_pob_choice: you learn
  chosen_spanish: aprendas
  alternatives_spanish:
  - te acostumbres
  - llegues a aprender
  lexicon: HALOT
  rationale: El verbo aquí comunica adquirir una conducta por práctica o asociación; «aprendas» mantiene la idea de aprender conductas sin volverlo demasiado técnico.
- source_word: אָרְחֹתוֹ
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - su camino
  - su manera de vivir
  lexicon: HALOT
  rationale: El hebreo singular puede abarcar el curso habitual de conducta. «Caminos» conserva bien la imagen sapiencial y suena natural en español.
- source_word: וְלָקַחְתָּ
  english_pob_choice: and take
  chosen_spanish: y te hagas
  alternatives_spanish:
  - y tomes
  - y traigas sobre ti
  lexicon: HALOT
  rationale: Aquí el verbo apunta al resultado de incurrir en una consecuencia para uno mismo; «te hagas» transmite en español la idea de llegar a quedar atrapado por algo perjudicial.
- source_word: מוֹקֵשׁ
  english_pob_choice: a snare
  chosen_spanish: una trampa
  alternatives_spanish:
  - un lazo
  - un cerco
  lexicon: HALOT
  rationale: «Trampa» comunica la imagen figurada de peligro moral con claridad y dignidad en español; «lazo» o «cerco» son posibles, pero menos transparentes para una lectura amplia.
- source_word: לְנַפְשֶׁךָ
  english_pob_choice: for yourself
  chosen_spanish: para ti mismo
  alternatives_spanish:
  - para tu vida
  - para tu alma
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí designa a la persona misma o su vida afectada; «para ti mismo» conserva el sentido reflexivo sin forzar una lectura técnica de «alma».
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando notas al pie no ancladas en el texto. La redacción mantiene el valor advertencial del hebreo sin depender de marcadores de nota.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece ningún tetragrámaton o cita directa del nombre divino en este versículo.
  - Se prefirió «caminos» como plural idiomático para אָרְחֹתוֹ, manteniendo la tensión entre singular hebreo y plural español sin ocultarla en notas.
  - «Trampa» se eligió como equivalente natural de מוֹקֵשׁ en un dicho sapiencial, sin introducir terminología doctrinal ajena al contexto.
