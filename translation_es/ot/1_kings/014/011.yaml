review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura básica del hebreo, el contraste ciudad/campo, el uso de «Yahvé» y la imagen de juicio. Sin embargo, la elección principal «El muerto de Jeroboam» no preserva fielmente la fuerza distributiva e idiomática de הַמֵּת לְיָרָבְעָם tal como la documenta el expediente POB; en español suena restrictiva y poco natural, como si hablara de un cadáver específico. La misma dificultad aparece en «y el muerto en el campo».
  spanish_quality_summary: El español es comprensible, pero «El muerto de Jeroboam ... lo comerán los perros» y «el muerto en el campo» resultan duros y poco idiomáticos en registro bíblico claro. Una formulación distributiva en el texto principal mejora notablemente la legibilidad sin perder literalidad contextual. Además, la nota b repite la lectura principal en lugar de ofrecer solo alternativas significativas.
  glossary_alignment: 'Buena alineación con la terminología del proyecto en «Yahvé», «aves», «campo» y «ha hablado». El punto problemático no es glosario sino la decisión léxica para הַמֵּת לְיָרָבְעָם / וְהַמֵּת בַּשָּׂדֶה: debe reflejarse distributivamente en español, no como un sintagma nominal rígido.'
  issues:
  - severity: high
    issue: «El muerto de Jeroboam» no transmite bien la fuerza distributiva del hebreo.
    rationale: El expediente fuente explica que la expresión significa idiomáticamente cualquiera que pertenezca a la casa de Jeroboam y muera. En español, «el muerto de Jeroboam» suena a un muerto particular o a una relación posesiva ambigua, no a una referencia distributiva general.
  - severity: high
    issue: «y el muerto en el campo» repite la misma rigidez no idiomática.
    rationale: El paralelismo hebreo pide una forma distributiva equivalente en español. «El muerto en el campo» es entendible, pero menos natural y menos claro que «cualquiera que muera en el campo» o similar.
  - severity: low
    issue: La nota b duplica la lectura principal en lugar de destacar alternativas reales.
    rationale: 'Si el texto principal dice «las aves del cielo», la nota no debe comenzar con esa misma opción como alternativa. Conviene conservar las verdaderas alternativas documentadas: «las aves de los cielos» o la tradicional «las aves del aire».'
  revised_spanish_text: A cualquiera de los de Jeroboam que muera[a] en la ciudad, se lo comerán los perros; y a cualquiera que muera en el campo, se lo comerán las aves del cielo[b], porque Yahvé ha hablado.
