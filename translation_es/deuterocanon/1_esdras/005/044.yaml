translation:
  language: es
  text: y dar al tesoro sagrado para las obras mil minas de oro[a], y cinco mil minas de plata[b], y cien vestiduras sacerdotales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al tesoro del templo». La frase griega combina literalmente «sagrado/santo» y «tesoro/almacén»; por eso el texto principal conserva la cualidad sacra sin sobreespecificar más de lo que dice el griego.
    reason: lexical_alternative
  - marker: b
    text: Una mina era una antigua unidad de peso y, por extensión, de valor; la traducción conserva el término antiguo en vez de convertirlo a una medida moderna.
    reason: cultural_note
lexical_decisions:
- source_word: δοῦναι
  english_pob_choice: to give
  chosen_spanish: dar
  alternatives_spanish:
  - contribuir
  - donar
  lexicon: LSJ
  rationale: El infinitivo griego expresa la acción de entregar o aportar recursos; «dar» es la opción más directa y transparente en español, sin introducir la formalidad interpretativa de «donar» ni la especialización de «contribuir».
- source_word: ἱερὸν γαζοφυλάκιον
  english_pob_choice: the holy treasury
  chosen_spanish: el santo tesoro
  alternatives_spanish:
  - el tesoro del templo
  - el tesoro sagrado
  lexicon: LSJ
  rationale: 'Conserva los dos elementos del griego: ἱερὸν («santo») y γαζοφυλάκιον («tesoro/almacén de valores»). «Santo tesoro» sigue de cerca la fuerza semántica de la frase sin sobreespecificar «templo» en el texto principal.'
- source_word: τῶν ἔργων
  english_pob_choice: for the works
  chosen_spanish: para las obras
  alternatives_spanish:
  - para la obra
  - para las obras de construcción
  lexicon: LSJ
  rationale: El plural griego se mantiene con «obras». En español, esta forma deja abierta la referencia a trabajos de restauración o construcción, como en el texto fuente.
- source_word: χρυσίου μνᾶς χιλίας
  english_pob_choice: one thousand minas of gold
  chosen_spanish: mil minas de oro
  alternatives_spanish:
  - a thousand minas de oro
  lexicon: LSJ
  rationale: Se conserva el término antiguo «minas» y la cantidad exacta. «Mil minas de oro» es idiomático en español y mantiene el orden y la fuerza del original.
- source_word: ἀργυρίου μνᾶς πεντακισχιλίας
  english_pob_choice: five thousand minas of silver
  chosen_spanish: cinco mil minas de plata
  alternatives_spanish:
  - cinco mil minas argentadas
  lexicon: LSJ
  rationale: Se mantiene el paralelismo con el oro y el término antiguo de peso/valor «minas», sin convertirlo a equivalencias modernas.
- source_word: στολὰς ἱερατικὰς
  english_pob_choice: priestly garments
  chosen_spanish: vestiduras sacerdotales
  alternatives_spanish:
  - vestiduras de sacerdote
  - ropas sacerdotales
  lexicon: LSJ
  rationale: «Vestiduras» comunica el carácter formal y ceremonial de στολή mejor que «ropa», y «sacerdotales» refleja ἱερατικά sin caer en un registro excesivamente eclesiástico.
- source_word: ἑκατόν
  english_pob_choice: one hundred
  chosen_spanish: cien
  alternatives_spanish:
  - ciento
  lexicon: LSJ
  rationale: Número cardinal simple y natural en español, manteniendo el estilo de inventario del versículo.
theological_decisions:
- issue: 'ἱερὸν γαζοφυλάκιον: si decir «santo tesoro» o «tesoro del templo»'
  english_pob_reading: the holy treasury
  chosen_spanish_reading: el santo tesoro
  alternative_spanish_readings:
  - el tesoro del templo
  - el tesoro sagrado
  rationale: La lectura inglesa preserva tanto la santidad como la función de tesorería. «Santo tesoro» reproduce ambos matices con menor interpretación institucional que «tesoro del templo», que desplaza el énfasis desde la cualidad sagrada hacia la localización.
  doctrine_reference: Sin implicación doctrinal especial; decisión léxica basada en el griego.
translation_notes:
  revision_awareness: El borrador sigue el texto griego de 1 Esdras 5:44 y el control cruzado del audit trail inglés. Se mantiene la estructura enumerativa, el paralelismo entre oro/plata y la unidad antigua «mina», sin introducir equivalencias modernas ni ampliar «obras» más allá de lo que el genitivo griego permite.
  spanish_consistency_notes:
  - Se prefirió «minas» para mantener continuidad con el término técnico del audit trail inglés.
  - «Sacerdotales» se usa para ἱερατικὰς por claridad y naturalidad en español, evitando «clericales» o «litúrgicas», que no corresponden bien al griego.
  - «Santo tesoro» conserva la tensión entre sacralidad y función administrativa presente en γαζοφυλάκιον; la nota ofrece la alternativa «tesoro del templo» sin reemplazarla en el texto principal.
