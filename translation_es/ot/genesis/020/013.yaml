revisions:
- from: 'Y cuando Dios me hizo errar lejos de la casa de mi padre, le dije: «Esta es la bondad[b] que debes mostrarme: en todo lugar adonde lleguemos, di de mí: “Él es mi hermano”».'
  to: 'Y cuando Dios me hizo vagar desde la casa de mi padre[a], le dije: «Esta es la bondad[b] que debes mostrarme: en todo lugar adonde lleguemos, di de mí: “Él es mi hermano”».'
  rationale: Se reemplazó 'me hizo errar lejos de' por 'me hizo vagar desde' para reflejar mejor el valor causativo de הִתְעוּ sin sugerir equivocación moral ni añadir 'lejos'. Se añadió la nota léxica a para preservar la alternativa documentada en el POB inglés y se mantuvo la nota sobre hesed.
