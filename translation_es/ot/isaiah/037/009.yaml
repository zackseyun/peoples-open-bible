translation:
  language: es
  text: 'Y oyó acerca de Tirhaca, rey de Cus[a], diciendo: «Ha salido para pelear contra ti[b]». Y cuando oyó, envió mensajeros a Ezequías, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'rey de Etiopía'. El hebreo dice Cush, nombre geográfico/étnico que en algunos contextos antiguos puede solaparse con regiones al sur de Egipto asociadas con Nubia o Etiopía.
    reason: lexical_alternative
  - marker: b
    text: Literalmente 'contigo'; en este contexto militar, 'contra ti' expresa mejor el sentido adversarial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: And he heard
  chosen_spanish: Y oyó
  alternatives_spanish:
  - Y escuchó
  - Y se enteró
  lexicon: HALOT
  rationale: שמַע en narrativa conserva el sentido básico de oír/escuchar; en contexto de noticia militar, 'oyó' mantiene la forma breve y natural sin perder la referencia a la recepción de información.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - respecto de
  lexicon: HALOT
  rationale: Con שׁמע, עַל introduce el asunto del que se recibe noticia. 'Acerca de' expresa esa relación de manera clara y natural en español.
- source_word: תִּרְהָקָה
  english_pob_choice: Tirhakah
  chosen_spanish: Tirhaca
  alternatives_spanish:
  - Tirhaka
  - Tirhakah
  lexicon: transliteración estándar castellana
  rationale: Se adapta la transliteración al uso castellano con terminación -a, manteniendo la identificación del nombre propio sin depender del inglés.
- source_word: מֶלֶךְ כּוּשׁ
  english_pob_choice: king of Cush
  chosen_spanish: rey de Cus
  alternatives_spanish:
  - rey de Cush
  - rey de Etiopía
  lexicon: HALOT
  rationale: Se preserva 'Cus' como etnónimo/geónimo bíblico primario, siguiendo la primacía del hebreo y evitando la modernización interpretativa 'Etiopía'.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: El infinitivo de לומר introduce discurso citado; 'diciendo' conserva la estructura narrativa abierta sin cerrar prematuramente la cita.
- source_word: יָצָא
  english_pob_choice: He has come out
  chosen_spanish: Ha salido
  alternatives_spanish:
  - Ha salido fuera
  - Se ha salido
  lexicon: HALOT
  rationale: יצא significa literalmente 'salir'; en español, 'ha salido' reproduce el movimiento de salida y funciona bien en un contexto militar.
- source_word: לְהִלָּחֵם
  english_pob_choice: to fight
  chosen_spanish: para pelear
  alternatives_spanish:
  - para combatir
  - para hacer guerra
  lexicon: HALOT
  rationale: En español contemporáneo, 'pelear' comunica el conflicto directo de forma simple y fiel; 'combatir' también sería posible, pero 'pelear' sigue de cerca la fuerza verbal básica sin sobreformalizarla.
- source_word: אִתָּךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - contigo
  - en tu contra
  lexicon: HALOT
  rationale: Aunque la preposición hebrea puede significar 'con', el contexto bélico exige el valor adversarial; 'contra ti' mantiene esa tensión sin perder la literalidad funcional.
- source_word: וַיִּשְׁמַע
  english_pob_choice: when he heard
  chosen_spanish: Y cuando oyó
  alternatives_spanish:
  - Y al oír
  - Cuando lo oyó
  lexicon: HALOT
  rationale: 'La repetición verbal del hebreo se vuelve temporal en español para reflejar la secuencia narrativa con naturalidad: ''Y cuando oyó''.'
- source_word: וַיִּשְׁלַח
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: שלח en narrativa real se expresa de forma directa con 'envió', que es preciso y no añade matiz innecesario.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - emisarios
  - enviados
  lexicon: HALOT
  rationale: En contexto político-militar se trata de enviados humanos, no de seres celestiales; 'mensajeros' es el equivalente más transparente.
- source_word: אֶל חִזְקִיָּהוּ
  english_pob_choice: to Hezekiah
  chosen_spanish: a Ezequías
  alternatives_spanish:
  - para Ezequías
  - hacia Ezequías
  lexicon: transliteración bíblica estándar
  rationale: El hebreo usa אֶל, que en español suele verterse con 'a' para dirección/objeto de envío; 'Ezequías' es la forma castellana estándar del nombre.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con este mensaje
  - y le dijo
  lexicon: HALOT
  rationale: Se mantiene la fórmula de introducción al discurso para dejar abierta la cita que continúa en el siguiente versículo.
translation_notes:
  revision_awareness: La redacción sigue el hebreo con atención a la conjunción narrativa inicial וַ, la repetición de שׁמע y la estructura de discurso indirecto. Se integra la revisión del POB inglés que mantiene el comienzo conjuntivo 'And he heard', reflejándolo en español con 'Y oyó'.
  spanish_consistency_notes:
  - Se mantiene 'Y' inicial para reproducir la cadena narrativa hebrea.
  - '''Cus'' se conserva como forma bíblica primaria, con nota para la alternativa ''Etiopía''.'
  - '''mensajeros'' se usa en sentido diplomático-militar, no angelical.'
  - La apertura de la cita con 'diciendo' conserva la continuidad hacia el versículo siguiente.
