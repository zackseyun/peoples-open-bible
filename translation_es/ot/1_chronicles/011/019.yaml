translation:
  language: es
  text: 'Y dijo: «¡Lejos esté de mí, delante de mi Dios, hacer esto! ¿Beberé la sangre de estos hombres[b] con sus vidas? Porque con sus vidas la trajeron». Y no quiso beberla. Estas cosas hicieron los tres valientes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: «Sangre» se mantiene literalmente. David habla del agua como si equivaliera a sangre porque fue obtenida con peligro mortal.
    reason: cultural_note
lexical_decisions:
- source_word: חָלִילָה לִּי מֵאֱלֹהַי
  english_pob_choice: Far be it from me before my God
  chosen_spanish: ¡Lejos esté de mí, delante de mi Dios!
  alternatives_spanish:
  - ¡Dios me libre!
  - ¡Lejos esté de mí, por mi Dios!
  lexicon: HALOT
  rationale: חָלִילָה expresa repudio enfático; «lejos esté de mí» conserva el giro idiomático sin forzar un calco torpe. מֵאֱלֹהַי se refleja como «delante de mi Dios» para mantener la referencia a Dios y la fuerza reverente del gesto verbal, evitando una frase menos natural en español como «por mi Dios».
- source_word: מֵעֲשׂוֹת זֹאת
  english_pob_choice: to do this
  chosen_spanish: hacer esto
  alternatives_spanish:
  - de hacer esto
  - para hacer esto
  lexicon: HALOT
  rationale: El infinitivo con מ después de חָלִילָה funciona idiomáticamente como la idea de realizar la acción prohibida; «hacer esto» es la forma más natural en español y no añade matices no presentes en el hebreo.
- source_word: הֲדַם הָאֲנָשִׁים הָאֵלֶּה אֶשְׁתֶּה
  english_pob_choice: Shall I drink the blood of these men
  chosen_spanish: ¿Beberé la sangre de estos hombres?
  alternatives_spanish:
  - ¿Acaso beberé la sangre de estos hombres?
  - ¿He de beber la sangre de estos hombres?
  lexicon: HALOT
  rationale: Se conserva literalmente «la sangre» porque el hebreo lo dice de forma explícita y el peso ético de la frase depende de esa imagen. La pregunta retórica se expresa con futuro en español, una forma natural y sobria que mantiene el tono deliberativo.
- source_word: בְנַפְשׁוֹתָם
  english_pob_choice: with their lives
  chosen_spanish: con sus vidas
  alternatives_spanish:
  - a costa de sus vidas
  - arriesgando sus vidas
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí significa vida, no «alma». «Con sus vidas» reproduce de manera directa la repetición hebrea y el carácter circunstancial del medio/riesgo, sin convertirla en una explicación interpretativa.
- source_word: כִּי בְנַפְשׁוֹתָם הֱבִיאוּם
  english_pob_choice: For they brought it with their lives
  chosen_spanish: Porque con sus vidas la trajeron
  alternatives_spanish:
  - Porque la trajeron con sus vidas
  - Pues la trajeron arriesgando sus vidas
  lexicon: HALOT
  rationale: Se mantiene la repetición de בְנַפְשׁוֹתָם para conservar el énfasis del hebreo. El objeto implícito se expresa con el pronombre «la» para aclarar que se trata del agua sin sobreexplicar.
- source_word: וְלֹא אָבָה לִשְׁתּוֹתָם
  english_pob_choice: So he was not willing to drink it
  chosen_spanish: Y no quiso beberla
  alternatives_spanish:
  - Y no estuvo dispuesto a beberla
  - Y no consintió en beberla
  lexicon: HALOT
  rationale: אָבָה indica voluntad/consentimiento; «no quiso» es una formulación natural que conserva la negativa de voluntad sin endurecerla indebidamente como una negativa técnica o legal.
- source_word: אֵלֶּה עָשׂוּ שְׁלֹשֶׁת הַגִּבּוֹרִים
  english_pob_choice: These things the three mighty men did
  chosen_spanish: Estas cosas hicieron los tres hombres poderosos
  alternatives_spanish:
  - Estas cosas hicieron los tres guerreros valientes
  - Eso hicieron los tres hombres poderosos
  lexicon: HALOT
  rationale: גִּבּוֹרִים en Crónicas designa a los guerreros de élite de David; «hombres poderosos» mantiene la fuerza militar del término y evita neutralizarlo como simple «hombres». «Estas cosas hicieron» sigue de cerca el resumen final del verso.
theological_decisions:
- issue: Valor de la sangre y la vida en la declaración de David
  english_pob_reading: Retain literal 'blood' while allowing the context to show it is metaphorical/evaluative because the water was obtained through mortal danger.
  chosen_spanish_reading: Mantener «sangre» literalmente, dejando que el contexto muestre que David evalúa el agua como si estuviera ligada a derramamiento de sangre por el peligro mortal asumido por los hombres.
  alternative_spanish_readings:
  - Parafrasear como «agua conseguida arriesgando la vida»
  - Explicar el sentido en una nota y suavizar la imagen en el texto principal
  rationale: La fuerza ética del pasaje depende de la imagen de la sangre; suavizarla debilitaría la protesta de David. El texto español conserva la imagen y deja que el contexto explique su valor figurado.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de נֶפֶשׁ
  english_pob_reading: Translate as 'lives' rather than 'souls'.
  chosen_spanish_reading: Traducir נֶפֶשׁ como «vidas», no como «almas».
  alternative_spanish_readings:
  - almas
  - vida
  rationale: En este contexto נֶפֶשׁ se refiere a la vida física expuesta al peligro. «Vidas» comunica bien esa idea en español y evita introducir una noción antropológica ajena al pasaje.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó la frase correspondiente a מֵאֱלֹהַי y simplificó la expresión de בְנַפְשׁוֹתָם. En español se conservó la literalidad sobria del hebreo, usando «delante de mi Dios» y repetición de «con sus vidas» para reflejar el paralelismo y la fuerza retórica del verso.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהַי conforme al estándar del proyecto.
  - Se prefirió «vidas» para נֶפֶשׁ, evitando «almas» por claridad contextual.
  - Se preservó la imagen de «sangre» sin eufemismo, en coherencia con la lectura auditada del inglés POB.
  - «Hombres poderosos» refleja el valor militar de גִּבּוֹרִים sin introducir un término eclesiástico o devocional.
