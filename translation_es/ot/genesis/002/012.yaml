translation:
  language: es
  text: Y el oro de aquella tierra es bueno; allí hay bedelio[a] y piedra de ónice[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «resina aromática» para «bedelio»; la sustancia exacta designada por el término hebreo es incierta.
    reason: lexical_alternative
  - marker: b
    text: O posiblemente otra piedra preciosa, como «berilo»; la identificación exacta del hebreo שֹׁהַם es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּזֲהַב
  english_pob_choice: And the gold
  chosen_spanish: Y el oro
  alternatives_spanish:
  - Y oro
  - Ahora bien, el oro
  lexicon: HALOT
  rationale: El waw inicial enlaza la frase con la descripción anterior; en español, «Y» conserva ese enlace. «Oro» es la equivalencia directa de זָהָב, y el artículo definido «el» refleja de manera natural la referencia específica al oro de esa tierra.
- source_word: הָאָרֶץ הַהִוא
  english_pob_choice: of that land
  chosen_spanish: de aquella tierra
  alternatives_spanish:
  - de esa tierra
  - de aquella región
  lexicon: HALOT
  rationale: אֶרֶץ puede ser «tierra» o «país»; aquí, por el contexto geográfico de Havilá, «tierra» es la opción más natural. «Aquella» conserva el valor deíctico de הַהִוא.
- source_word: טוֹב
  english_pob_choice: is good
  chosen_spanish: es bueno
  alternatives_spanish:
  - es de buena calidad
  - es bueno en calidad
  lexicon: HALOT
  rationale: El hebreo evalúa la calidad del oro con una expresión simple. «Es bueno» mantiene esa fuerza evaluativa sin añadir explicación interpretativa; «de buena calidad» sería más explicativo, pero menos directo.
- source_word: שָׁם
  english_pob_choice: are there
  chosen_spanish: allí hay
  alternatives_spanish:
  - allí está
  - hay allí
  lexicon: HALOT
  rationale: שָׁם significa «allí». En español, «allí hay» transmite con naturalidad la presencia de los dos elementos siguientes. Se evita forzar un plural verbal innecesario.
- source_word: הַבְּדֹלַח
  english_pob_choice: bdellium
  chosen_spanish: bedelio
  alternatives_spanish:
  - bdelio
  - resina aromática
  lexicon: HALOT
  rationale: Se adopta la forma tradicional castellana «bedelio» para el sustantivo de identificación incierta. Así se preserva la ambigüedad léxica documentada sin fingir una certeza mineral o botánica que el hebreo no ofrece.
- source_word: וְאֶבֶן הַשֹּׁהַם
  english_pob_choice: and onyx stone
  chosen_spanish: y piedra de ónice
  alternatives_spanish:
  - y ónice
  - y piedra ónice
  lexicon: HALOT
  rationale: «Piedra de ónice» conserva el sustantivo «piedra» y la identificación tradicional del término שֹׁהַם, sin afirmar más de lo que permite la evidencia. «Ónice» es comprensible en español y mantiene la cautela sobre la identificación exacta.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una formulación breve y literal con dos notas de incertidumbre léxica. No se registran revisiones sustantivas; la presente propuesta conserva esa cautela y la traslada al español con equivalentes naturales y auditables.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «tierra» en lugar de «país» por coherencia con el contexto geográfico de Génesis 2.
  - Se conserva la ambigüedad de los términos de identificación incierta mediante notas, sin simplificar a una certeza moderna.
