translation:
  language: es
  text: 'Y le dijo a su madre: «Las mil cien piezas de plata[a] que te fueron quitadas[b], acerca de las cuales pronunciaste una maldición[c] y también dijiste mientras yo lo oía[d]: mira, la plata está conmigo; yo la tomé». Y su madre dijo: «Bendito sea mi hijo por Yahvé[e]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «mil cien la plata»; la unidad no se expresa explícitamente en el texto, aunque el contexto permite entender piezas o siclos de plata.
    reason: lexical_alternative
  - marker: b
    text: 'O: «te fueron tomadas»; el verbo hebreo es el pasivo de «tomar», y el contexto sugiere pérdida o sustracción.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «acerca de las cuales pronunciaste un juramento»; el verbo hebreo puede referirse a un juramento o a una maldición, pero el contexto favorece «maldición».'
    reason: lexical_alternative
  - marker: d
    text: 'Literalmente: «en mis oídos»; es un modismo hebreo que significa que él la oyó hablar.'
    reason: spanish_style_note
  - marker: e
    text: El hebreo usa la fórmula compacta «bendito sea mi hijo para/por Yahvé»; el español la vierte de manera natural como una bendición mediada por el nombre divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶלֶף וּמֵאָה הַכֶּסֶף
  english_pob_choice: the eleven hundred pieces of silver
  chosen_spanish: Mil cien piezas de plata
  alternatives_spanish:
  - Mil cien siclos de plata
  - Mil cien monedas de plata
  lexicon: HALOT
  rationale: El hebreo expresa literalmente 'mil y cien la plata'; en español, 'mil cien piezas de plata' conserva la cantidad y el objeto sin añadir una unidad no explícita en el texto. 'Siclos' sería posible por contexto histórico, pero aquí la unidad no está indicada de forma directa.
- source_word: לֻקַּח לָךְ
  english_pob_choice: were taken from you
  chosen_spanish: te fueron quitadas
  alternatives_spanish:
  - fueron tomadas de ti
  - te fueron tomadas
  lexicon: HALOT
  rationale: El pasivo de לקח es 'ser tomado'; en este contexto de pérdida ilícita, 'te fueron quitadas' comunica la relación posesiva y el despojo de manera natural en español, sin afirmar explícitamente 'robadas' más de lo que el verbo exige.
- source_word: וְאַתִּי אָלִית
  english_pob_choice: about which you uttered a curse
  chosen_spanish: acerca de las cuales tú pronunciaste una maldición
  alternatives_spanish:
  - y por las cuales tú juraste un juramento
  - y que tú maldijiste
  lexicon: HALOT
  rationale: אָלָה puede referirse a juramento o maldición. La POB inglesa eligió 'uttered a curse' por el contexto narrativo; en español, 'pronunciaste una maldición' preserva esa lectura sin borrar la tensión semántica del verbo.
- source_word: וְגַם אָמַרְתְּ בְּאָזְנַי
  english_pob_choice: and also spoke in my hearing
  chosen_spanish: y también hablaste en mi oído
  alternatives_spanish:
  - y también me lo dijiste al oído
  - y también lo dijiste en mi presencia
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo con 'en mis oídos'; el español 'en mi oído' mantiene la imagen concreta, aunque 'hablaste en mi oído' suena algo literal, pero sigue siendo inteligible y fiel. La redacción completa aclara el sentido con el contexto.
- source_word: הִנֵּה
  english_pob_choice: look
  chosen_spanish: mira
  alternatives_spanish:
  - mira aquí
  - he aquí
  lexicon: HALOT
  rationale: הִנֵּה funciona como marcador deíctico. 'Mira' es la forma moderna y natural en español, conservando la llamada de atención sin recurrir al arcaísmo 'he aquí'.
- source_word: הַכֶּסֶף אִתִּי
  english_pob_choice: the silver is with me
  chosen_spanish: la plata está conmigo
  alternatives_spanish:
  - tengo la plata
  - la plata está en mi poder
  lexicon: HALOT
  rationale: '''Está conmigo'' reproduce bien la estructura hebrea, pero en español ''está conmigo'' puede sonar menos idiomático que ''está conmigo'' o ''la plata está conmigo''; se conserva la proximidad física/posesiva del original. ''La plata está conmigo'' sigue de cerca la fuente.'
- source_word: אֲנִי לְקַחְתִּיו
  english_pob_choice: I took it
  chosen_spanish: yo la tomé
  alternatives_spanish:
  - yo la tomé personalmente
  - yo la tomé yo mismo
  lexicon: HALOT
  rationale: El pronombre enfático 'yo' refleja la fuerza del hebreo אֲנִי. 'La tomé' es suficiente por contexto, pero 'yo la tomé' retiene el énfasis confesional. Se usa 'la' para concordar con 'la plata'.
- source_word: בָּרוּךְ בְּנִי לַיהוָה
  english_pob_choice: Blessed be my son by Yahweh
  chosen_spanish: Bendito sea mi hijo por Yahvé
  alternatives_spanish:
  - Bendito sea mi hijo de parte de Yahvé
  - Que mi hijo sea bendecido por Yahvé
  lexicon: HALOT
  rationale: La fórmula hebrea de bendición con לְ/לַיהוָה se rinde de forma compacta como 'por Yahvé', manteniendo el nombre divino y la relación de agencia o procedencia de la bendición. 'Bendito sea' conserva el tono performativo de la expresión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto para el Tetragrámaton, se usa 'Yahvé' en el texto principal, no la sustitución 'SEÑOR'. Esto mantiene visible el nombre propio divino en español.
theological_decisions:
- issue: El nombre divino en la bendición final
  english_pob_reading: Blessed be my son by Yahweh
  chosen_spanish_reading: Bendito sea mi hijo por Yahvé
  alternative_spanish_readings:
  - Bendito sea mi hijo de parte de Yahvé
  - Que mi hijo sea bendecido por Yahvé
  rationale: La fórmula expresa una bendición dirigida o mediada por el nombre divino. 'Por Yahvé' sigue la lectura del proyecto para לַיהוָה sin sustituir el nombre por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: La fuerza semántica de אָלָה
  english_pob_reading: uttered a curse
  chosen_spanish_reading: pronunciaste una maldición
  alternative_spanish_readings:
  - juraste un juramento
  - maldijiste
  rationale: El hebreo permite tanto 'juramento' como 'maldición', pero el contexto narrativo favorece la lectura de maldición. La traducción conserva esa tensión semántica sin resolverla artificialmente en favor de un solo sentido absoluto.
  doctrine_reference: 'Lexical note: אָלָה in context'
- issue: La relación posesiva en 'the silver is with me'
  english_pob_reading: the silver is with me
  chosen_spanish_reading: la plata está conmigo
  alternative_spanish_readings:
  - tengo la plata
  - la plata está en mi poder
  rationale: Se mantiene la estructura relacional del hebreo, pero con una fórmula natural en español que no exagera ni minimiza la confesión de posesión.
  doctrine_reference: 'Lexical note: locative possession'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se mantuvo la ambigüedad de אָלָה, se evitó introducir ''siclos'' como unidad explícita, y se preservó el nombre divino con ''Yahvé'' conforme al criterio del proyecto. No se detectaron revisiones posteriores que alteraran la lectura base; el pass más reciente indicó agreement alto y sin cambios.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - '''Plata'' se mantiene para הַכֶּסֶף como sustantivo genérico/contable en contexto narrativo.'
  - Se conserva el paralelismo de la confesión con 'mira' y la respuesta final con una bendición breve y performativa.
  - El pronombre enfático 'yo' refleja el hebreo sin recargar la sintaxis.
