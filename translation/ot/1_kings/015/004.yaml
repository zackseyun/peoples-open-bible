id: 1KI.15.4
reference: 1 Kings 15:4
source:
  edition: WLC
  text: כִּ֚י לְמַ֣עַן דָּוִ֔ד נָתַן֩ יְהוָ֨ה אֱלֹהָ֥י/ו ל֛/וֹ נִ֖יר בִּ/ירוּשָׁלִָ֑ם לְ/הָקִ֤ים אֶת בְּנ/וֹ֙ אַחֲרָ֔י/ו וּֽ/לְ/הַעֲמִ֖יד אֶת יְרוּשָׁלִָֽם־־׃
translation:
  text: Nevertheless[a], for David’s sake Yahweh his God gave him a lamp in Jerusalem, to raise up his son after him and to establish Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a light'; the phrase 'gave him a lamp in Jerusalem' is a metaphor for preserving David’s royal line there.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Nevertheless
  alternatives:
  - For
  - Indeed
  - But
  lexicon: HALOT
  rationale: In context this clause explains why Abijam was not fully cut off despite his sin (v. 3), so an adversative-concessive English connector best captures the discourse force better than a bare 'for.'
- source_word: לְמַעַן דָּוִד
  chosen: for David’s sake
  alternatives:
  - because of David
  - on account of David
  lexicon: HALOT
  rationale: The idiom לְמַעַן with a personal name expresses action done on someone's account or for their sake. 'For David’s sake' is idiomatic and preserves the covenantal motivation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָיו
  chosen: his God
  alternatives:
  - God of him
  lexicon: HALOT
  rationale: 'Straightforward possessive construction referring to Abijam: ''the LORD his God.'''
- source_word: נִיר
  chosen: lamp
  alternatives:
  - light
  - dynasty
  lexicon: HALOT
  rationale: The noun literally denotes a lamp/light and is used metaphorically for the continuing Davidic line or enduring rule. The main text keeps the concrete metaphor 'lamp' and lets context convey dynastic continuity.
- source_word: בִּירוּשָׁלָם
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: Locative preposition ב is naturally rendered 'in.'
- source_word: לְהָקִים
  chosen: to raise up
  alternatives:
  - to set up
  - to establish
  lexicon: HALOT
  rationale: Hiphil of קום here refers to causing a successor to arise. 'Raise up' is idiomatic in dynastic contexts and fits the following object 'his son.'
- source_word: אֶת בְּנוֹ אַחֲרָיו
  chosen: his son after him
  alternatives:
  - his son to succeed him
  - his son after him
  lexicon: HALOT
  rationale: This phrase marks succession. 'His son after him' stays close to the Hebrew while remaining clear in English.
- source_word: וּלְהַעֲמִיד
  chosen: to establish
  alternatives:
  - to make stand
  - to sustain
  lexicon: HALOT
  rationale: Hiphil of עמד can mean cause to stand, set in place, or establish. Here it refers to maintaining Jerusalem as the royal center, so 'establish' is the most natural English rendering.
- source_word: אֶת יְרוּשָׁלָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Direct object of the final infinitive; the city stands metonymically for the Davidic kingdom centered there, but the text names the city itself, so the translation preserves that wording.
