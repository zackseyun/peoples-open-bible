translation:
  language: es
  text: Toma contigo un siervo[a] y dos camellos, y ve a Ragés de Media, a Gabael, y tráeme el dinero[b], y trae a Gabael contigo a la boda[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego παῖς puede significar «muchacho», «joven», «criado» o «siervo»; aquí el contexto de viaje favorece el sentido de ayudante o servidor.
    reason: lexical_alternative
  - marker: b
    text: Lit. «plata»; aquí se refiere al dinero confiado a Gabael. La tradición semítica paralela amplía la instrucción con más sirvientes y detalles sobre la casa de Gabael, pero el texto griego usado aquí es más breve.
    reason: lexical_alternative
  - marker: c
    text: O «a la fiesta de bodas». El griego γάμος puede referirse tanto al matrimonio como al banquete celebrativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: παῖδα
  english_pob_choice: servant
  chosen_spanish: siervo
  alternatives_spanish:
  - muchacho
  - joven
  - criado
  lexicon: LSJ
  rationale: En este contexto de viaje y encargo, παῖς designa a un ayudante o servidor más que a un niño. «Siervo» conserva la fuerza funcional sin introducir una edad que el griego no exige. Se evita «esclavo» porque el pasaje no subraya la condición jurídica de servidumbre.
- source_word: δύο καμήλους
  english_pob_choice: two camels
  chosen_spanish: dos camellos
  lexicon: LSJ
  rationale: Correspondencia directa y natural con el numeral y el sustantivo griegos.
- source_word: πορεύθητι
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - anda
  - sal
  - ponte en camino
  lexicon: LSJ
  rationale: El imperativo de movimiento se expresa de forma breve y natural en español con «ve».
- source_word: ἐν Ῥάγοις τῆς Μηδείας
  english_pob_choice: to Rages of Media
  chosen_spanish: a Ragés de Media
  alternatives_spanish:
  - a Rages de Media
  - en Ragés de Media
  lexicon: LSJ
  rationale: La preposición con verbo de movimiento apunta a destino; por eso se traduce con «a». Se mantiene el nombre propio y la designación regional. «Ragés» sigue la forma castellana más reconocible para el topónimo.
- source_word: παρὰ Γαβαήλ
  english_pob_choice: to Gabael
  chosen_spanish: junto a Gabael
  alternatives_spanish:
  - a Gabael
  - con Gabael
  - a la casa de Gabael
  lexicon: LSJ
  rationale: παρά con persona aquí indica acercamiento o destino hacia la esfera de esa persona. «Junto a Gabael» conserva la cercanía relacional del griego sin añadir la expansión interpretativa de «casa».
- source_word: κόμισαί μοι τὸ ἀργύριον
  english_pob_choice: bring me the money
  chosen_spanish: tráeme el dinero
  alternatives_spanish:
  - tráeme la plata
  - recupérame el dinero
  lexicon: LSJ
  rationale: ἀργύριον significa literalmente «plata», pero en este contexto remite al dinero depositado. «Dinero» comunica la referencia funcional con naturalidad en español, sin perder el trasfondo de valor metálico.
- source_word: καὶ αὐτὸν ἄγε μοι
  english_pob_choice: and bring him with you to me
  chosen_spanish: y tráelo contigo
  alternatives_spanish:
  - y llévalo a mí
  - y tráelo a mí
  lexicon: LSJ
  rationale: El pronombre masculino singular retoma a Gabael, y ἄγε expresa conducción o traer. «Tráelo contigo» reproduce la idea de acompañamiento implícita en la secuencia narrativa. Se evita hacer explícito «a mí» porque el contexto ya lo marca y el español resulta más fluido.
- source_word: εἰς τὸν γάμον
  english_pob_choice: to the wedding
  chosen_spanish: a la boda
  alternatives_spanish:
  - al banquete de bodas
  - a la celebración nupcial
  lexicon: LSJ
  rationale: γάμος puede significar la boda o el banquete nupcial. Dado el contexto narrativo de una celebración, «boda» es la opción más concisa y transparente, y deja abierta la posibilidad del banquete sin sobreespecificarlo.
theological_decisions:
- issue: Sentido de παῖς en un encargo de viaje
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - muchacho
  - esclavo
  - criado
  rationale: No hay aquí una afirmación teológica, pero sí una elección con implicación social. «Siervo» mantiene la ambigüedad respetando el valor funcional del término sin rebajar ni exagerar el estatus de la persona.
  doctrine_reference: N/A
- issue: Valor de γάμος como matrimonio o celebración
  english_pob_reading: wedding / possible wedding feast
  chosen_spanish_reading: boda
  alternative_spanish_readings:
  - banquete de bodas
  - celebración de bodas
  rationale: 'La traducción conserva la tensión semántica documentada en el audit trail: el griego puede referirse al matrimonio o a su celebración. «Boda» es suficientemente amplia en español para abarcar ambos matices sin resolverlos artificialmente.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del texto inglés que prefirió «with you» sobre «with yourself», por lo que en español se eligió la forma natural «contigo». También se respetó la decisión auditada de entender ἀργύριον como dinero y γάμος como un término con posible referencia a la celebración nupcial.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «siervo» en lugar de «esclavo» porque el contexto narrativo no enfatiza servidumbre jurídica.
  - Se preservó la ambigüedad de γάμος con una nota, sin forzar «banquete» en el texto principal.
  - 'Se prefirió un español moderno y natural: «contigo», «tráeme», «a la boda».'
