translation:
  language: es
  text: Y Cam[a], el padre de Canaán, vio la desnudez de su padre y se lo dijo a sus dos hermanos fuera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «la desnudez de su padre». En algunos contextos del Antiguo Testamento, esta expresión puede funcionar como eufemismo sexual; aquí la traducción conserva la redacción literal y deja abierta esa cuestión interpretativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - observó
  lexicon: HALOT
  rationale: El verbo narrativo básico ראה se traduce de forma directa por «vio»; no hay base suficiente para intensificarlo en español.
- source_word: חָם
  english_pob_choice: Ham
  chosen_spanish: Cam
  alternatives_spanish:
  - Ham
  lexicon: convención onomástica bíblica
  rationale: Se usa la forma española tradicional y reconocible «Cam» para el nombre propio, manteniendo legibilidad bíblica en español.
- source_word: אֲבִי כְנַעַן
  english_pob_choice: the father of Canaan
  chosen_spanish: padre de Canaán
  alternatives_spanish:
  - el padre de Canaán
  - Canaán, su padre
  lexicon: HALOT
  rationale: La cadena constructa identifica a Cam como «padre de Canaán»; el español natural conserva esa relación sin sobreexplicarla.
- source_word: עֶרְוַת אָבִיו
  english_pob_choice: his father's nakedness
  chosen_spanish: la desnudez de su padre
  alternatives_spanish:
  - la desnudez de su padre
  - la desnudez de su progenitor
  lexicon: HALOT
  rationale: Se preserva la formulación literal y la tensión interpretativa del hebreo. «Desnudez» mantiene el posible alcance idiomático sin resolverlo en el texto principal.
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: se lo contó
  alternatives_spanish:
  - le contó
  - se lo comunicó
  - lo informó
  lexicon: HALOT
  rationale: נגד en hifil tiene el sentido de «decir, contar, informar». «Se lo contó» suena natural en español y conserva el acto de relatar a otros.
- source_word: לִשְׁנֵי אֶחָיו
  english_pob_choice: his two brothers
  chosen_spanish: a sus dos hermanos
  alternatives_spanish:
  - a los dos hermanos de él
  - a sus dos hermanos
  lexicon: HALOT
  rationale: El español expresa de manera idiomática el complemento indirecto con «a sus dos hermanos», reteniendo el número explícito del hebreo.
- source_word: בַּחוּץ
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - al exterior
  lexicon: HALOT
  rationale: «Afuera» es la equivalencia natural y contextual para el adverbio locativo, con un registro claro y bíblicamente legible.
theological_decisions:
- issue: Sentido de «la desnudez de su padre»
  english_pob_reading: Se traduce literalmente, sin especificar un acto sexual más allá de ver a Noé expuesto, para dejar abierta la cuestión interpretativa.
  chosen_spanish_reading: Se traduce literalmente como «la desnudez de su padre», sin resolver si la expresión funciona aquí solo como exposición física o como posible eufemismo sexual.
  alternative_spanish_readings:
  - la desnudez de su padre como simple exposición física
  - un eufemismo de una ofensa sexual más grave
  rationale: El contexto inmediato dice que Cam «vio» y luego «contó»; el texto no explicita más. Por eso el español conserva la literalidad y no cierra la tensión semántica que el hebreo puede tener en otros pasajes.
  doctrine_reference: 'Principio POB: preservar la tensión interpretativa donde el texto no la resuelve explícitamente.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el borrador mantiene la lectura auditada de la fuente hebrea y la decisión de no resolver la ambigüedad de עֶרְוַת אָבִיו.
  spanish_consistency_notes:
  - Se mantiene «Cam» como forma española estable del nombre propio, coherente con el uso bíblico tradicional en español.
  - «Desnudez» conserva la ambigüedad documentada sin introducir una interpretación no explicitada por el verso.
  - «Afuera» reproduce de modo natural el contraste locativo del hebreo con el interior implícito de la escena.
