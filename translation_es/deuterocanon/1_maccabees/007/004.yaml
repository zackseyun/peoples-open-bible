translation:
  language: es
  text: Y las fuerzas los mataron, y Demetrio se sentó en el trono de su reino.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αἱ δυνάμεις
  english_pob_choice: the forces
  chosen_spanish: las fuerzas
  alternatives_spanish:
  - las tropas
  - el ejército
  - las fuerzas armadas
  lexicon: LSJ
  rationale: En este contexto narrativo militar, δυνάμεις se entiende como un colectivo de combatientes o tropas, no como ‘poderes’ abstractos. ‘Las fuerzas’ conserva la amplitud del griego y sigue la decisión auditada en inglés sin precisar más de lo que el texto exige.
- source_word: ἀπέκτειναν
  english_pob_choice: killed
  chosen_spanish: los mataron
  alternatives_spanish:
  - los dieron muerte
  - los ejecutaron
  - los hicieron morir
  lexicon: LSJ
  rationale: El aoristo expresa muerte causada de forma directa. ‘Los mataron’ es natural en español moderno y reproduce con claridad la acción sin añadir matiz judicial o ceremonial que el griego no exige.
- source_word: ἐκάθισεν
  english_pob_choice: sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - tomó asiento
  - fue sentado
  - se instaló
  lexicon: LSJ
  rationale: El verbo significa literalmente ‘sentarse’, y en contexto de entronización puede implicar acceso al poder. ‘Se sentó’ conserva la imagen verbal y permite que el contexto político la cargue de sentido, como en la versión inglesa auditada.
- source_word: ἐπὶ θρόνου βασιλείας αὐτοῦ
  english_pob_choice: on the throne of his kingdom
  chosen_spanish: en el trono de su reino
  alternatives_spanish:
  - sobre el trono de su reino
  - en su trono real
  - en el trono de su realeza
  lexicon: LSJ
  rationale: La construcción griega es formalmente ‘sobre/en el trono de su reino’. ‘En el trono de su reino’ mantiene la relación regia sin forzar una paráfrasis como ‘trono real’, que sería más idiomática pero menos cercana al original.
- source_word: Δημήτριος
  english_pob_choice: Demetrius
  chosen_spanish: Demetrio
  alternatives_spanish:
  - Demetrius
  lexicon: standard transliteration
  rationale: Se usa la transliteración española habitual del nombre propio griego, ‘Demetrio’, con forma reconocible y bíblicamente pública.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa coinciden en alto grado; no se documentan revisiones ni variantes relevantes, por lo que la versión española sigue de cerca la lectura estable sin introducir notas textuales.
  spanish_consistency_notes:
  - Se mantiene ‘fuerzas’ como término militar colectivo, en consonancia con la decisión inglesa auditada.
  - Se evita ‘Cristo’, ‘Señor’ o formulaciones teológicas ajenas al versículo, ya que el pasaje es narrativo e histórico.
  - 'El orden español prioriza claridad: sujeto colectivo, verbo de acción y cláusula de entronización, sin añadir interpretaciones.'
