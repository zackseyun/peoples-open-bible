translation:
  language: es
  text: Depuso a Onias del sumo sacerdocio y nombró a Jasón[a], su hermano, sumo sacerdote, después de prometer dar, si le concedía el cargo, tres mil seiscientos sesenta talentos por año.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prometió pagar»; el griego dice simplemente «prometió dar», dejando que el carácter corrupto del pago se infiera del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταλύσας
  english_pob_choice: deposed
  chosen_spanish: depuso
  alternatives_spanish:
  - removió
  - destituyó
  - despojó de su cargo
  lexicon: BDAG
  rationale: En este contexto de oficio sacerdotal, el participio expresa la remoción formal de un cargo. «Depuso» conserva el matiz institucional y evita una traducción demasiado general como «removió».
- source_word: τὸν Ὀνίαν τῆς ἀρχιερωσύνης
  english_pob_choice: Onias from the high priesthood
  chosen_spanish: a Onias del sumo sacerdocio
  alternatives_spanish:
  - a Onias de ser sumo sacerdote
  - a Onias del oficio de sumo sacerdote
  lexicon: BDAG
  rationale: El genitivo indica la exclusión de Onias de la función sacerdotal suprema. En español, «del sumo sacerdocio» expresa de forma natural la pérdida del oficio sin añadir elementos no presentes.
- source_word: κατέστησεν ἀρχιερέα
  english_pob_choice: appointed ... as high priest
  chosen_spanish: nombró ... como sumo sacerdote
  alternatives_spanish:
  - estableció ... como sumo sacerdote
  - instituyó ... como sumo sacerdote
  - puso ... como sumo sacerdote
  lexicon: BDAG
  rationale: La idea es una designación oficial para un cargo. «Nombró ... como sumo sacerdote» es idiomático en español y conserva la formalidad del acto.
- source_word: ὑποσχόμενον δώσειν
  english_pob_choice: after he promised to give
  chosen_spanish: después de prometer dar
  alternatives_spanish:
  - tras prometer entregar
  - después de haber prometido pagar
  lexicon: BDAG
  rationale: El griego dice literalmente «prometiendo dar». «Dar» mantiene la neutralidad del original; «pagar» sería una interpretación más específica que el texto griego no explicita en esta frase.
- source_word: εἰ ἐπιτρέψειεν αὐτῷ τὴν ἀρχήν
  english_pob_choice: if he would grant him the office
  chosen_spanish: si le concedía el cargo
  alternatives_spanish:
  - si le otorgaba la autoridad
  - si le permitía el gobierno
  lexicon: BDAG
  rationale: τὴν ἀρχήν alude aquí al puesto/autoridad que Jason busca. «Concedía el cargo» preserva la referencia oficial y suena natural en español.
- source_word: κατʼ ἐνιαυτόν
  english_pob_choice: per year
  chosen_spanish: por año
  alternatives_spanish:
  - anualmente
  - cada año
  lexicon: BDAG
  rationale: La expresión marca periodicidad anual. «Por año» es directa y clara en español contemporáneo.
- source_word: τρισχίλια ἑξακόσια ἑξήκοντα τάλαντα
  english_pob_choice: three thousand six hundred sixty talents
  chosen_spanish: tres mil seiscientos sesenta talentos
  alternatives_spanish:
  - 3.660 talentos
  - tres mil seiscientos sesenta talentos de plata
  lexicon: LSJ
  rationale: Se conserva el número en palabras y la unidad antigua «talentos», sin añadir «de plata» porque el griego aquí no lo especifica.
theological_decisions:
- issue: Caracterización moral del pago prometido
  english_pob_reading: Render the transaction descriptively without adding evaluative language such as 'bribe' in the main text.
  chosen_spanish_reading: Traducir el intercambio de manera descriptiva, sin añadir en el texto principal palabras como «soborno» o «coima».
  alternative_spanish_readings:
  - después de sobornarlo
  - tras prometerle un soborno
  rationale: El griego solo dice que prometió dar una suma anual si recibía el cargo. La corrupción del acto se infiere del contexto, pero no se nombra explícitamente; por eso conviene mantener la tensión sin resolverla en la redacción principal.
  doctrine_reference: 'Principio POB: no paraprasear más allá de lo que el texto fuente justifica; preservar la tensión textual.'
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió «his own brother» a «his brother» para mayor precisión. La presente redacción sigue esa misma precisión con «su hermano» y mantiene el registro formal y la lectura óptima del acto de nombramiento.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando aparece el nombre divino; aquí no aplica.
  - Se mantiene «sumo sacerdote» como equivalencia estable para ἀρχιερεύς, coherente con el uso bíblico tradicional y el registro del pasaje.
  - Se conserva el valor monetario antiguo «talentos» sin modernizarlo, para respetar la unidad del texto fuente.
  - No se introduce lenguaje interpretativo adicional sobre la corrupción del pago en el cuerpo principal del versículo.
