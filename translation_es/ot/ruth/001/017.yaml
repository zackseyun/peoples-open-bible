revisions:
- from: Donde tú mueras[a], yo moriré, y allí seré sepultada. Yahvé me haga así, y aun añada[b], si algo, fuera de la muerte, me separa de ti.
  to: Donde tú mueras, yo moriré, y allí seré sepultada. Yahvé me haga así, y aún más[a], si algo fuera de la muerte me separa de ti[b].
  rationale: Se corrigieron los anclajes de las notas para que coincidan con la evidencia auditada, se sustituyó una nota incorrecta por la explicación adecuada de la fórmula juratoria, y se mejoró levemente la naturalidad de la fórmula «y aún más» sin perder el sentido del hebreo. También se simplificó la puntuación de la cláusula final para una lectura más fluida.
