  revision_rationale: 'Se corrigen tres puntos principales: 1) se restaura el modismo deuteronómico «dentro de tus puertas» para reflejar mejor בִּשְׁעָרֶיךָ y alinearse con la decisión auditada de no sobreinterpretarlo como «ciudades» en el texto principal; 2) se unifica la segunda persona singular con «entre ti» para corresponder al hebreo בְּקִרְבֶּךָ; 3) se reemplaza «forastero» por «residente extranjero» como mejor equivalente de גֵּר en este contexto legal-social, dejando la alternativa en nota. El resto del verso puede mantenerse, incluyendo «Yahvé», «esclavo / esclava» y «hacer morar allí su nombre».'
