    rationale: '«En manos de» es español idiomático y no es incorrecto, pero dado que la nota preserva expresamente el modismo hebreo singular, conviene armonizar el texto principal con la evidencia auditada: «en la mano de[a]».'
  revised_spanish_text: La hija de Egipto es avergonzada; es entregada en la mano de[a] un pueblo del norte.
