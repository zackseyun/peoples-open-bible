translation:
  language: es
  text: Así fue sometido Madián delante de los hijos de Israel[a], y no volvieron a levantar la cabeza. Y la tierra tuvo reposo cuarenta años en los días de Gedeón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no volvieron a recobrar su fuerza» o «no volvieron a levantar la cabeza».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכָּנַע
  english_pob_choice: was subdued
  chosen_spanish: fue sometido
  alternatives_spanish:
  - fue humillado
  - fue abatido
  - quedó sometido
  lexicon: HALOT
  rationale: El nifal de כנע expresa quedar bajo dominio o sujeción. «Fue sometido» mantiene el sentido pasivo y militar del pasaje sin introducir una idea más psicológica como «humillado».
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» conserva la relación de subordinación expresada por la preposición hebrea y suena natural en español bíblico actual.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se preserva la forma genealógica y masculina del hebreo, en línea con la decisión auditada del POB en inglés.
- source_word: וְלֹא יָסְפוּ
  english_pob_choice: did not again
  chosen_spanish: no volvieron a
  alternatives_spanish:
  - no continuaron
  - no añadieron
  - no fueron otra vez
  lexicon: HALOT
  rationale: 'La locución con יסף aquí transmite reiteración negada: no repitieron la acción. «No volvieron a» es la forma más natural para ese valor aspectual en español.'
- source_word: לָשֵׂאת רֹאשָׁם
  english_pob_choice: lift up their head
  chosen_spanish: levantar la cabeza
  alternatives_spanish:
  - alzar la cabeza
  - levantar su cabeza
  - recobrar su ánimo
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea. En español, «levantar la cabeza» comunica bien la idea de recobrar iniciativa o agresividad sin borrar la metáfora.
- source_word: וַתִּשְׁקֹט
  english_pob_choice: had rest
  chosen_spanish: tuvo reposo
  alternatives_spanish:
  - descansó
  - quedó en quietud
  - tuvo paz
  lexicon: HALOT
  rationale: En Jueces, el verbo resume un período de paz tras la opresión. «Tuvo reposo» es una equivalencia bíblica clara y suficientemente literal para el contexto.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la nación
  - el país
  lexicon: HALOT
  rationale: «La tierra» refleja el sustantivo hebreo sin especificar indebidamente y es la forma más fiel y natural en este contexto colectivo.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: forty years
  chosen_spanish: cuarenta años
  alternatives_spanish:
  - 40 años
  lexicon: HALOT
  rationale: Número directo sin necesidad de expansión interpretativa.
- source_word: בִּימֵי גִדְעוֹן
  english_pob_choice: in the days of Gideon
  chosen_spanish: en los días de Gedeón
  alternatives_spanish:
  - durante la vida de Gedeón
  - en tiempos de Gedeón
  lexicon: HALOT
  rationale: Se conserva la expresión temporal hebrea estándar y el nombre propio en la forma española usual.
theological_decisions:
- issue: Expresión filial y masculina de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se mantiene la forma explícita del hebreo, evitando neutralizar una designación nacional que el texto presenta de manera tradicional y formularia.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Idiomático לָשֵׂאת רֹאשָׁם
  english_pob_reading: lift up their head
  chosen_spanish_reading: levantar la cabeza
  alternative_spanish_readings:
  - recobrar su fuerza
  - alzarse de nuevo
  rationale: Se preserva la imagen corporal del hebreo y su valor de restaurar iniciativa o preeminencia, sin resolverla prematuramente en una paráfrasis explicativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia con la revisión más reciente y no registra cambios aplicados; se mantiene la decisión de preservar la idiomaticidad hebrea en forma transparente y publicable en español.
  spanish_consistency_notes:
  - Se usa «Gedeón» para el nombre propio, conforme al uso bíblico en español.
  - «La tierra» conserva el sustantivo colectivo del hebreo y armoniza con el registro narrativo de Jueces.
  - Se mantiene el paralelismo aspectual de la oración hebrea con dos cláusulas coordinadas en español claro.
