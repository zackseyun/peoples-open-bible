translation:
  language: es
  text: No te juntes con mujeres que cantan[a], no sea que te quemen con la boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «No entregues tu vida a prostitutas, no sea que pierdas tu herencia». El griego hace explícita la advertencia sexual-moral donde el hebreo habla de «mujeres que cantan» y de ser quemado «con la boca».'
    reason: alternative_reading
lexical_decisions:
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - en compañía de
  - junto a
  lexicon: HALOT
  rationale: La preposición hebrea marca asociación. En español, «con» transmite la relación de cercanía sin añadir más de lo que el texto exige.
- source_word: מְנַגְּנוֹת
  english_pob_choice: singing women
  chosen_spanish: mujeres cantoras
  alternatives_spanish:
  - mujeres que cantan
  - mujeres músicas
  - cantantes mujeres
  lexicon: HALOT
  rationale: Conserva el referente femenino y la idea de desempeño musical. «Cantoras» es natural en español y mantiene el matiz de mujeres dedicadas al canto, acorde con el hebreo.
- source_word: אַל
  english_pob_choice: do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas
  - No debes
  lexicon: HALOT
  rationale: La partícula prohibitiva se expresa de forma directa y natural con el imperativo negativo español.
- source_word: תִּדְמוֹךְ
  english_pob_choice: associate with
  chosen_spanish: te juntes
  alternatives_spanish:
  - te asocies
  - te acerques demasiado
  - te pegues a
  lexicon: HALOT
  rationale: El verbo es raro y de sentido algo incierto; el contexto pide una cercanía o vinculación impropia. «Te juntes» comunica asociación estrecha sin forzar una lectura técnica. Se evita «consortar» por ser menos natural en español.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - lest
  lexicon: HALOT
  rationale: Marca el resultado adverso de manera idiomática en español, preservando la relación de advertencia.
- source_word: יִשְׂרְפֻךָ
  english_pob_choice: they burn you
  chosen_spanish: te quemen
  alternatives_spanish:
  - te ardan
  - te consuman
  - te destruyan
  lexicon: HALOT
  rationale: Se mantiene la metáfora de fuego. El plural femenino implícito concuerda con «mujeres cantoras» y el presente de subjuntivo expresa la posible consecuencia.
- source_word: בְּפִיפִיֹתָם
  english_pob_choice: by their mouths
  chosen_spanish: con sus bocas
  alternatives_spanish:
  - por sus bocas
  - con su habla
  - por sus palabras
  lexicon: HALOT
  rationale: La imagen concreta del hebreo se conserva. «Con sus bocas» sigue el valor instrumental y permite que el lector perciba tanto el canto como el habla seductora.
- source_word: πόρναις
  english_pob_choice: prostitutes
  chosen_spanish: prostitutas
  alternatives_spanish:
  - meretrices
  - rameras
  lexicon: LSJ
  rationale: En la nota se da el sentido explícito del paralelo griego. «Prostitutas» es el equivalente español directo y claro.
- source_word: τὴν ψυχήν σου
  english_pob_choice: your soul
  chosen_spanish: tu vida
  alternatives_spanish:
  - tu alma
  - tu ser
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «alma/vida», en español «tu vida» evita una lectura excesivamente espiritualizada y comunica mejor la idea de entregarse por completo.
- source_word: τὴν κληρονομίαν σου
  english_pob_choice: your inheritance
  chosen_spanish: tu herencia
  alternatives_spanish:
  - tu patrimonio
  - tu posesión
  lexicon: LSJ
  rationale: «Herencia» es la traducción natural de κληρονομία y conserva la noción de pérdida de un bien recibido, tanto material como de pertenencia al pueblo.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: Translate the extant Hebrew as primary, while allowing the Greek to inform interpretation of the social-moral warning.
  chosen_spanish_reading: 'Se traduce como texto principal el hebreo: una advertencia contra juntarse con mujeres cantoras y quedar destruido por sus bocas.'
  alternative_spanish_readings:
  - No entregues tu vida a las prostitutas, no sea que pierdas tu herencia.
  rationale: Siguiendo la filosofía del proyecto para Sirácides, el hebreo disponible es la base principal. El griego se preserva como lectura alternativa porque explicita la advertencia moral y añade la pérdida de herencia, pero no desplaza el testimonio hebreo.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives; use Greek parallel as actual input'
translation_notes:
  revision_awareness: La versión inglesa revisada optó por «associate with» en lugar de «consort with» y por un verbo activo («they burn you») más directo. En español se refleja esa decisión con «No te juntes... te quemen», manteniendo un registro formal y natural sin perder la fuerza del hebreo. También se dejó la nota griega para conservar la tensión textual documentada por el audit trail.
  spanish_consistency_notes:
  - Se mantuvo «bocas» para conservar la imagen concreta del hebreo, en vez de suavizarla a «palabras» en el texto principal.
  - Se evitó «Cristo/Mesías» porque no interviene en este versículo.
  - La nota usa «prostitutas» como equivalente del griego πόρναις, pero el cuerpo principal sigue el hebreo extant e.
  - El adverbio negativo «no sea que» preserva el valor de advertencia de פֶּן sin volverlo explicativo.
