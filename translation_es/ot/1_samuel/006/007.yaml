translation:
  language: es
  text: Ahora bien[a], tomen y hagan un carro nuevo, y dos vacas que están criando[b], sobre las cuales no ha venido yugo alguno; aten las vacas al carro, y lleven sus crías a la casa, apartadas de ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «ahora».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «vacas que están amamantando» o «vacas en leche»; la expresión indica vacas con crías que aún maman.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now then
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Ahora
  - Y ahora
  lexicon: HALOT
  rationale: Marca transición discursiva e introduce una instrucción procedimental; «Ahora bien» suena natural en español y conserva el matiz de arranque de la orden.
- source_word: קְחוּ וַעֲשׂוּ
  english_pob_choice: take and make
  chosen_spanish: tomen y hagan
  alternatives_spanish:
  - tomen y preparen
  - tomen y hagan listo
  lexicon: HALOT
  rationale: Se conservan los dos imperativos en secuencia, sin fusionarlos. «Hagan» mantiene la fuerza operativa del hebreo sin añadir detalles no presentes.
- source_word: עֲגָלָה חֲדָשָׁה אֶחָת
  english_pob_choice: one new cart
  chosen_spanish: un carro nuevo, uno solo
  alternatives_spanish:
  - un carro nuevo
  - un carro nuevo, uno
  lexicon: HALOT
  rationale: «Carro» comunica el vehículo de tiro de forma clara. La duplicación «uno solo» refleja el énfasis del numeral y evita perder la idea de singularidad explícita del hebreo.
- source_word: שְׁתֵּי פָרוֹת עָלוֹת
  english_pob_choice: two nursing cows
  chosen_spanish: dos vacas que amamantan
  alternatives_spanish:
  - dos vacas en cría
  - dos vacas lactantes
  lexicon: HALOT
  rationale: El participio alude a vacas en periodo de lactancia con crías. «Que amamantan» es fiel y comprensible en español; evita el calco «vacas de leche», menos natural y menos preciso.
- source_word: אֲשֶׁר לֹא עָלָה עֲלֵיהֶם עֹל
  english_pob_choice: on which no yoke has come
  chosen_spanish: sobre las cuales no ha venido yugo alguno
  alternatives_spanish:
  - sobre las cuales no se ha puesto yugo
  - que nunca han llevado yugo
  lexicon: HALOT
  rationale: Se conserva la imagen del yugo «venir sobre» ellas, reflejando el hebreo con claridad. «Yugo alguno» mantiene el énfasis negativo y la idea de animales no usados para labor.
- source_word: וַאֲסַרְתֶּם אֶת־הַפָּרוֹת בָּעֲגָלָה
  english_pob_choice: hitch the cows to the cart
  chosen_spanish: aten las vacas al carro
  alternatives_spanish:
  - uncan las vacas al carro
  - yuguen las vacas al carro
  lexicon: HALOT
  rationale: «Atar» expresa la acción de sujetar los animales al vehículo sin introducir una técnica específica más allá del texto. Se evita «yuguen» para no sugerir uso previo de yugo, precisamente negado en la cláusula anterior.
- source_word: וַהֲשֵׁיבֹתֶם
  english_pob_choice: take ... back / bring ... back
  chosen_spanish: lleven... lejos de ellas
  alternatives_spanish:
  - devuelvan
  - hagan volver
  lexicon: HALOT
  rationale: 'El verbo es causativo: hacer volver. En contexto, la acción recae sobre las crías separándolas de las vacas; «lleven ... lejos de ellas» transmite el movimiento requerido y evita forzar un «volver» que en español sería menos transparente aquí.'
- source_word: בְּנֵיהֶם
  english_pob_choice: their calves
  chosen_spanish: sus crías
  alternatives_spanish:
  - sus terneros
  - sus becerros
  lexicon: HALOT
  rationale: Aunque el contexto son vacas, «crías» conserva la referencia a los jóvenes sin estrechar el término a una denominación técnica regional. Es inclusivo y suficientemente preciso para el lector bíblico general.
- source_word: מֵאַחֲרֵיהֶם
  english_pob_choice: away from them
  chosen_spanish: lejos de ellas
  alternatives_spanish:
  - apartadas de ellas
  - separadas de ellas
  lexicon: HALOT
  rationale: La expresión hebrea indica separación de seguimiento/acompañamiento. «Lejos de ellas» comunica bien la separación física y relacional sin calco torpe.
- source_word: הַבָּיְתָה
  english_pob_choice: to the house
  chosen_spanish: a la casa
  alternatives_spanish:
  - a casa
  - al hogar
  lexicon: HALOT
  rationale: Se conserva la dirección literal «a la casa», que coincide con la decisión inglesa de no especificar una estructura más concreta como establo o granero.
theological_decisions:
- issue: Naturaleza del mandato ritual respecto a los animales no adiestrados
  english_pob_reading: The cows must be unused draft animals, not previously placed under a yoke.
  chosen_spanish_reading: Las vacas deben ser animales no acostumbrados al yugo, es decir, sin uso previo para labor.
  alternative_spanish_readings:
  - vacas vírgenes para trabajo
  - vacas sin yugo
  rationale: 'La frase «sobre las cuales no ha venido yugo alguno» conserva la señal teológica-práctica: un signo de que el éxito no dependerá de experiencia humana sino de la acción divina en el relato. No se suaviza a una mera preferencia agrícola.'
  doctrine_reference: Providencia divina y autenticación del arca en el relato de 1 Samuel 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: se prefirió la precisión de «nursing cows» frente a «milk cows» y se mantuvo la clausula final con separación de las crías «away from them to the house». En español se refleja esa misma precisión con «vacas que amamantan» y con la secuencia «lleven sus crías lejos de ellas, a la casa».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se eligió «carro» para עֲגָלָה por consistencia con el contexto de tiro y para evitar «carreta» si sonara demasiado moderna o regional.
  - «Vacas» se conserva para פָּרוֹת porque el contexto exige hembras adultas; no se sustituye por un término genérico.
  - No se añadió puntuación interpretativa más allá de la necesaria para claridad en español, conservando la estructura de mandato sucesivo.
