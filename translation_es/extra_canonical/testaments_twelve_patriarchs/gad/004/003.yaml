id: T12P.GAD.4.3
reference: Testament of Gad 4:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 3. ΓἘὰν γὰρ πέσῃ ὁ ἀδελφός⁹, *σπουδάζει εὐθὺς¹⁰ ἀναγγεῖλαι τοῖς¹¹ πᾶσιν, καὶ σπεύδει *περὶ αὐτοῦ ἵνα κριθεὶς¹² καὶ κολασθεὶς ἀποθάνῃ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/004/003.yaml
  text: For if a brother falls, it is eager at once to report it to everyone, and it hastens concerning him so that, having been judged and punished, he may die.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Adjusted the final clause to reflect ἵνα κριθεὶς καὶ κολασθεὶς ἀποθάνῃ more closely and added "concerning him" to render περὶ αὐτοῦ more explicitly.
translation:
  language: es
  text: Pues si un hermano cae[a], se apresura al instante a denunciarlo a todos, y se afana por él[b] para que, juzgado y castigado, muera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Caer'' como metáfora bíblica para fallo moral o pecado (cf. Rom 14:4).'
    reason: lexical_alternative
  - marker: b
    text: Lit. 'se apresura concerniente a él'; el revision_pass inglés explicita περὶ αὐτοῦ como 'concerning him'. En español 'por él' captura el sentido instrumental/finalidad maliciosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: πέσῃ ὁ ἀδελφός
  english_pob_choice: a brother falls
  chosen_spanish: un hermano cae
  alternatives_spanish:
  - un hermano tropieza
  - un hermano peca
  lexicon: BDAG
  rationale: '''Caer'' es la metáfora bíblica tradicional para tropiezo moral, equivalente directo del griego πίπτω.'
- source_word: σπουδάζει εὐθὺς ἀναγγεῖλαι
  english_pob_choice: is eager at once to report it
  chosen_spanish: se apresura al instante a denunciarlo
  alternatives_spanish:
  - se afana por anunciarlo enseguida
  - se apresura a divulgarlo
  lexicon: LSJ
  rationale: '''Denunciar'' captura el matiz acusatorio de ἀναγγεῖλαι en este contexto malicioso; ''al instante'' refleja εὐθύς.'
- source_word: σπεύδει περὶ αὐτοῦ
  english_pob_choice: it hastens concerning him
  chosen_spanish: se afana por él
  alternatives_spanish:
  - se apresura respecto a él
  - se ocupa de él con prisa
  lexicon: LSJ
  rationale: '''Afanarse por'' captura σπεύδω + περί con el matiz de empeño dañino; el revision_pass inglés añadió ''concerning him'' para reflejar περὶ αὐτοῦ explícitamente.'
- source_word: ἵνα κριθεὶς καὶ κολασθεὶς ἀποθάνῃ
  english_pob_choice: so that, having been judged and punished, he may die
  chosen_spanish: para que, juzgado y castigado, muera
  alternatives_spanish:
  - a fin de que sea juzgado, castigado y muera
  - para que muera tras ser juzgado y castigado
  lexicon: LSJ
  rationale: Conserva la estructura participial griega con dos participios pasivos antepuestos al verbo finito; 'juzgado y castigado' funciona como subordinación adverbial natural en español.
translation_notes:
  revision_awareness: El revision_pass de gpt-5.4-mini ajustó la cláusula final para reflejar más cercanamente ἵνα κριθεὶς καὶ κολασθεὶς ἀποθάνῃ y añadió 'concerning him' para hacer explícito περὶ αὐτοῦ. En español 'para que, juzgado y castigado, muera' refleja la estructura participial original, y 'por él' explicita περὶ αὐτοῦ.
  spanish_consistency_notes:
  - '''el hermano'' como traducción fija de ὁ ἀδελφός en contexto comunitario.'
  - Sujeto implícito 'el odio' (personificado) heredado de versos anteriores.
  - Estructura participial preservada cuando el griego la usa.
