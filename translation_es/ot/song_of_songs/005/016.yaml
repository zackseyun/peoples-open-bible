translation:
  language: es
  text: Su boca[a] es pura dulzura, y todo él[b] es deseable. Este es mi amado, y este es mi amigo, hijas de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su paladar» o «su gusto», reflejando el sentido más literal del hebreo.
    reason: lexical_alternative
  - marker: b
    text: O «todo él es deleite» / «enteramente encantador». El hebreo usa un plural intensivo para expresar desirabilidad o hermosura.
    reason: lexical_alternative
lexical_decisions:
- source_word: חִכּוֹ
  english_pob_choice: his mouth
  chosen_spanish: sus labios
  alternatives_spanish:
  - su boca
  - su paladar
  lexicon: HALOT
  rationale: El hebreo puede referirse al paladar o la boca, pero en poesía amorosa el rasgo más natural en español es «labios», porque mantiene la imagen corporal ligada al beso y a la dulzura sin sonar anatómico en exceso. «Paladar» preserva más literalmente el término, pero resulta menos idiomático en este contexto.
- source_word: מַמְתַקִּים
  english_pob_choice: sweetness itself
  chosen_spanish: dulzura
  alternatives_spanish:
  - dulzura misma
  - muy dulce
  - dulces
  lexicon: HALOT
  rationale: La pluralidad hebrea es intensiva/abstracta. «Dulzura» comunica bien la cualidad sustantivada en español, sin perder el valor enfático del original. «Dulzura misma» podría sonar forzado; «muy dulce» pasa a adjetivo y debilita el paralelismo nominal.
- source_word: וְכֻלּוֹ
  english_pob_choice: all of him
  chosen_spanish: todo él
  alternatives_spanish:
  - todo su ser
  - todo en él
  lexicon: HALOT
  rationale: La frase mantiene el foco personal concreto del hebreo. «Todo él» conserva la estructura breve y enfática; «todo su ser» explicita más de lo que exige el texto.
- source_word: מַחֲמַדִּים
  english_pob_choice: desirable
  chosen_spanish: deseable
  alternatives_spanish:
  - deleitable
  - codiciable
  - todo deleite
  lexicon: HALOT
  rationale: El término expresa valor deseable, precioso o encantador. «Deseable» sigue de cerca el sentido léxico y evita añadir la carga tradicional de «delicioso/encantador» o la frase fija «todo deleite» si no se la impone el contexto.
- source_word: זֶה
  english_pob_choice: this is
  chosen_spanish: Este es
  alternatives_spanish:
  - Esto es
  - Éste es
  lexicon: HALOT
  rationale: El demostrativo presenta al amado con énfasis y de forma directa. «Este es» es natural en español y conserva la señalización poética.
- source_word: דּוֹדִי
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi amado mío
  - mi amor
  lexicon: HALOT
  rationale: «Amado» es el equivalente poético más claro en español para el término de afecto del Cantar. Preserva intimidad y registro literario mejor que «amor», que puede sonar más abstracto o menos personal.
- source_word: וְזֶה
  english_pob_choice: and this is
  chosen_spanish: y este es
  alternatives_spanish:
  - y éste es
  - y este otro es
  lexicon: HALOT
  rationale: Se conserva la repetición del demostrativo para mantener el paralelismo y la insistencia retórica del hebreo.
- source_word: רֵעִי
  english_pob_choice: my friend
  chosen_spanish: mi amigo
  alternatives_spanish:
  - mi compañero
  - mi querido
  lexicon: HALOT
  rationale: El sustantivo puede significar amigo o compañero. «Mi amigo» reproduce directamente la relación afectiva y evita añadir matices interpretativos; en español bíblico sigue siendo comprensible y respetuoso del texto.
- source_word: בְּנוֹת יְרוּשָׁלִָם
  english_pob_choice: O daughters of Jerusalem
  chosen_spanish: hijas de Jerusalén
  alternatives_spanish:
  - jóvenes de Jerusalén
  - doncellas de Jerusalén
  lexicon: HALOT
  rationale: Como vocativo poético, «hijas de Jerusalén» conserva la fórmula tradicional y la imagen literaria del hebreo. «Jóvenes» aclara el referente, pero pierde la forma metafórica del original.
theological_decisions:
- issue: Posible lectura devocional o mesiánica de מַחֲמַדִּים
  english_pob_reading: Render in its immediate poetic sense as 'desirable' within the love poem.
  chosen_spanish_reading: Traducirlo en su sentido poético inmediato como «deseable» dentro del canto amoroso.
  alternative_spanish_readings:
  - «todo deleite» con resonancia devocional tradicional
  - lectura como título o alusión mesiánica
  rationale: El contexto literario es la alabanza del amado dentro del Cantar. La traducción debe respetar ese marco y no introducir una lectura teológica que el hebreo inmediato no exige. «Deseable» preserva la fuerza léxica sin sobrecargar el verso con asociaciones posteriores.
  doctrine_reference: Primacía del sentido original y del contexto literario; evitar sobrelecturas doctrinales no requeridas por el texto.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no se introdujeron revisiones posteriores; el estado más reciente indica que no hubo cambios necesarios y el consenso fue alto.
  spanish_consistency_notes:
  - Se usó «amado» como término poético estándar para דּוֹדִי, coherente con el registro del Cantar.
  - Se evitó «Cristo» o cualquier lectura tipológica no sustentada por el versículo.
  - Se mantuvo el vocativo «hijas de Jerusalén» para conservar la forma literaria del hebreo.
  - Las notas a y b preservan alternativas léxicas documentadas sin forzar el texto principal.
