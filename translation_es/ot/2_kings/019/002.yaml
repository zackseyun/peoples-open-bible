    text: Or 'covering themselves with sackcloth.' The Hebrew participle can emphasize the act or the resulting state.
    reason: lexical_alternative
  - marker: b
    text: '''Who was over the household'' refers to a high royal official in charge of the palace or royal household.'
    reason: cultural_note
