revisions:
- from: y su aliento será como un torrente desbordado[a]; llegará hasta el cuello, para zarandear a las naciones con un tamiz de vaciedad[b], y un freno que desvía[c] estará sobre las mejillas de los pueblos.
  to: y su aliento[a] será como un torrente desbordado; llegará hasta el cuello, para cribar a las naciones con un tamiz de vacío[b], y un freno que extravía[c] estará sobre las quijadas de los pueblos.
  rationale: Se corrige el verbo de separación para ajustarlo mejor a la imagen explícita del tamiz; se reemplaza ‘vaciedad’ por ‘vacío’ para mayor naturalidad sin perder el matiz de nulidad; se cambia ‘mejillas’ por ‘quijadas’ para preservar la metáfora del freno; y se repara la nota c, que tenía un anglicismo y debía reunir las alternativas del freno y de la localización anatómica.
