translation:
  language: es
  text: Entonces Jefté fue con los ancianos de Galaad, y el pueblo lo puso sobre ellos como jefe y comandante[a]. Y Jefté habló todas sus palabras delante de Yahvé en Mizpa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el pueblo lo nombró sobre ellos como jefe y gobernante». El término hebreo traducido «comandante» también puede significar «gobernante» o «capitán».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Jefté repitió todas sus condiciones delante de Yahvé en Mizpa». El hebreo dice literalmente «habló todas sus palabras».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - anduvo
  lexicon: HALOT
  rationale: El wayyiqtol narra la acción siguiente de forma simple. En español, «fue» comunica el desplazamiento sin cargar estilo arcaico.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  lexicon: HALOT
  rationale: Indica acompañamiento entre Jefté y los ancianos de Galaad.
- source_word: זִקְנֵי גִלְעָד
  english_pob_choice: the elders of Gilead
  chosen_spanish: los ancianos de Galaad
  alternatives_spanish:
  - los mayores de Galaad
  - los líderes de Galaad
  lexicon: HALOT
  rationale: «Ancianos» expresa bien el grupo de líderes cívicos del territorio; «Galaad» se translitera como topónimo.
- source_word: וַיָּשִׂימוּ הָעָם אֹתוֹ עֲלֵיהֶם
  english_pob_choice: the people made him ... over them
  chosen_spanish: el pueblo lo puso ... sobre ellos
  alternatives_spanish:
  - el pueblo lo nombró ... sobre ellos
  - el pueblo lo estableció ... sobre ellos
  lexicon: HALOT
  rationale: שׂים con objeto y עַל puede significar poner/establecer a alguien en una función de autoridad. «Lo puso ... sobre ellos» conserva esa instalación sin añadir más de lo que el hebreo dice.
- source_word: לְרֹאשׁ
  english_pob_choice: head
  chosen_spanish: cabeza
  alternatives_spanish:
  - jefe
  - líder
  lexicon: HALOT
  rationale: La metáfora hebrea de «cabeza» se conserva literalmente, como en el inglés POB, y en español sigue siendo inteligible.
- source_word: וּלְקָצִין
  english_pob_choice: and commander
  chosen_spanish: y comandante
  alternatives_spanish:
  - y jefe
  - y capitán
  - y gobernador
  lexicon: HALOT
  rationale: קָצִין puede denotar dirigente, oficial o comandante. «Comandante» refleja bien el matiz de autoridad y probable función militar en este contexto.
- source_word: וַיְדַבֵּר ... אֶת כָּל דְּבָרָיו
  english_pob_choice: spoke all his words
  chosen_spanish: habló todas sus palabras
  alternatives_spanish:
  - repitió todas sus palabras
  - expuso todos sus términos
  lexicon: HALOT
  rationale: La formulación hebrea es literalmente «habló todas sus palabras». Se mantiene el giro para no resolver prematuramente si se trata de términos, discurso o reafirmación formal.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se sigue el término propio del proyecto para el nombre divino. «Delante de» conserva el valor solemne y contextual de la expresión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El hebreo usa el Tetragrámaton directamente; el proyecto pide «Yahvé» como forma principal en español.
- source_word: בַּמִּצְפָּה
  english_pob_choice: at Mizpah
  chosen_spanish: en Mizpa
  alternatives_spanish:
  - en Mizpah
  - en la Mizpa
  lexicon: HALOT
  rationale: Topónimo transliterado al español. «En Mizpa» funciona naturalmente para el lugar donde ocurre la escena pública.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo nombra explícitamente a Yahvé. Se evita el reemplazo litúrgico por «SEÑOR» para mantener la transparencia del nombre pactal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de «habló todas sus palabras»
  english_pob_reading: spoke all his words
  chosen_spanish_reading: habló todas sus palabras
  alternative_spanish_readings:
  - repitió todos sus términos
  - expuso todo lo dicho
  rationale: La frase puede implicar una recitación solemne, la exposición de términos o simplemente un discurso completo. Se preserva la ambigüedad del hebreo sin estrechar el sentido.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marca de nota aparezca exactamente en el texto español mediante los anclajes [a] y [b]. La redacción mantiene el valor literal del hebreo y la terminología del proyecto para Yahvé y para la metáfora de «cabeza».
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - «Mizpa» se mantuvo como topónimo transliterado en español.
  - Se conservó la metáfora de «cabeza» para לְרֹאשׁ, en línea con la decisión inglesa de preservar la imagen hebrea.
  - «Comandante» refleja el matiz funcional de קָצִין sin forzar una lectura exclusivamente militar o puramente civil.
  - La frase final mantiene la ambigüedad de דְּבָרָיו, sin convertirla en una paráfrasis interpretativa.
