translation:
  language: es
  text: 'Cuando llegó a su suegra[a], le dijo: «¿Quién eres, hija mía?» Entonces le contó todo lo que el hombre había hecho por ella.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «¿Cómo te fue, hija mía?». El hebreo dice literalmente: «¿Quién eres, hija mía?», y puede implicar una pregunta por el cambio de estado de Rut o por el resultado de su encuentro.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתָּבוֹא
  english_pob_choice: When she came
  chosen_spanish: Cuando llegó
  alternatives_spanish:
  - Y llegó
  - Entonces llegó
  lexicon: HALOT
  rationale: El wayyiqtol introduce avance narrativo; «cuando llegó» conserva la secuencia temporal con naturalidad en español sin perder el valor narrativo del verbo de movimiento.
- source_word: אֶל חֲמוֹתָהּ
  english_pob_choice: to her mother-in-law
  chosen_spanish: a su suegra
  alternatives_spanish:
  - a su madre política
  - a la suegra de ella
  lexicon: HALOT
  rationale: חֲמוֹתָהּ designa específicamente a la suegra de Ruth; «su suegra» es preciso, natural y mantiene la referencia relacional del hebreo.
- source_word: וַתֹּאמֶר
  english_pob_choice: she said
  chosen_spanish: le dijo
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: En español, el dativo implícito de la escena conversacional se expresa con claridad mediante «le dijo». El valor de introducción de discurso está bien cubierto sin repetir innecesariamente la coordinación.
- source_word: מִי אַתְּ
  english_pob_choice: Who are you
  chosen_spanish: ¿Quién eres?
  alternatives_spanish:
  - ¿Cómo te fue?
  - ¿Quién eres ahora?
  lexicon: HALOT
  rationale: El sentido léxico literal es «¿Quién eres?». Se conserva en el texto principal porque el hebreo es directo y la posible implicación sobre el estado o resultado de Ruth pertenece mejor a una nota.
- source_word: בִּתִּי
  english_pob_choice: my daughter
  chosen_spanish: hija mía
  alternatives_spanish:
  - mi hija
  - hijita mía
  lexicon: HALOT
  rationale: La fórmula de trato afectuosa se expresa de modo natural en español con «hija mía», que preserva el valor de parentesco y ternura del hebreo.
- source_word: וַתַּגֶּד לָהּ
  english_pob_choice: Then she told her
  chosen_spanish: Entonces le contó
  alternatives_spanish:
  - Y le contó
  - Entonces le dijo
  lexicon: HALOT
  rationale: נגד en hifil suele significar contar/relatar; «le contó» comunica mejor que un mero «le dijo» la idea de reportar detalladamente lo sucedido.
- source_word: אֵת כָּל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - todo aquello que
  lexicon: HALOT
  rationale: La construcción totalizante se expresa con naturalidad mediante «todo lo que», sin añadir ni restar contenido respecto del hebreo.
- source_word: עָשָׂה לָהּ הָאִישׁ
  english_pob_choice: the man had done for her
  chosen_spanish: el hombre había hecho por ella
  alternatives_spanish:
  - el hombre le había hecho
  - el hombre había hecho para ella
  lexicon: HALOT
  rationale: Se mantiene el sujeto anónimo («el hombre») como en el hebreo, que no nombra a Booz en esta cláusula. «Por ella» sigue la lectura benéfica de ל con עשה, evitando la ambigüedad dañina que podría sugerir «a ella».
theological_decisions:
- issue: 'La pregunta de Naomi: literal versus interpretativa'
  english_pob_reading: 'Who are you, my daughter? The POB footnote notes a possible interpretive sense: ''How did it go with you, my daughter?'' and allows that the Hebrew may imply a question about Ruth''s changed status or the outcome of the meeting.'
  chosen_spanish_reading: ¿Quién eres, hija mía?
  alternative_spanish_readings:
  - ¿Cómo te fue, hija mía?
  - ¿Qué pasó contigo, hija mía?
  rationale: Se conserva la literalidad del hebreo en el texto principal, porque la tensión semántica está documentada y no debe borrarse. La posible lectura inferencial queda abierta sin imponerla como traducción principal.
  doctrine_reference: Principio de transparencia textual; preservación de la ambigüedad legítima del original.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; el estado más reciente indica alta conformidad y sin cambios necesarios. La redacción española sigue de cerca el hebreo y el criterio óptimo-equivalente ya auditado en inglés.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se mantiene «hija mía» como fórmula afectuosa, coherente con el tono narrativo y con el inglés auditado.
  - Se evita nombrar a Booz en la última cláusula, respetando el anonimato del hebreo («el hombre»).
  - La nota al pie marca la única ambigüedad interpretativa relevante en este versículo y coincide con el audito en inglés.
