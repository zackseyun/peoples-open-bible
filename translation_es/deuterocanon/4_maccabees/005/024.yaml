    reason: lexical_alternative
  - marker: b
    text: O ‘solamente al Dios verdadero’. El griego literalmente resalta ‘al Dios que es’, en contraste con los dioses falsos.
    reason: alternative_reading
  revision_rationale: Se ajusta παιδεύει a 'forma' para reflejar mejor la formación moral; ἰσονομεῖν a 'actúe con equidad' para conservar el matiz de trato justo/imparcial; δικαιοσύνην a 'rectitud' en el texto principal con 'justicia' en nota, en línea con el sentido contextual y el aparato POB; y se mejora la naturalidad de μεγαλοπρεπῶς con 'con debida majestad'.
