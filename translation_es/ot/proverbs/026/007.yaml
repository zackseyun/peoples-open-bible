  source_alignment_summary: 'El borrador refleja bien la estructura comparativa del hebreo y sigue de cerca las decisiones del POB en inglés: דַּלְיוּ como imagen de extremidades que cuelgan sin vigor, שֹׁקַיִם como «piernas», מִפִּסֵּחַ como asociación con «un cojo», y la segunda cola «así es un proverbio en la boca de los necios». La nota alternativa también preserva adecuadamente la opción documentada en inglés.'
