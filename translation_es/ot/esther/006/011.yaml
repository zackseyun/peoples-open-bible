translation:
  language: es
  text: 'Entonces Amán tomó el manto y el caballo, vistió a Mardoqueo, lo hizo montar[a] sobre el caballo, lo llevó por la plaza de la ciudad y proclamó delante de él: «Así se hará al hombre a quien el rey se complace en honrar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «lo hizo cabalgar». El verbo hebreo es causativo: Amán hizo que Mardoqueo montara en la procesión pública.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְּבוּשׁ
  english_pob_choice: the robe
  chosen_spanish: la ropa
  alternatives_spanish:
  - el vestido
  - el manto
  - la vestidura
  lexicon: HALOT
  rationale: El hebreo definido remite a una prenda concreta ya identificada por el contexto inmediato. En español, «ropa» comunica de manera natural que se trata de la prenda preparada para el honor; «manto» o «vestidura» sonarían más interpretativos y «el vestido» podría sugerir una prenda femenina o demasiado específica. Se conserva la concreción sin exagerar el tipo exacto de prenda, que el hebreo no precisa aquí.
- source_word: הַסּוּס
  english_pob_choice: the horse
  chosen_spanish: el caballo
  alternatives_spanish:
  - el caballo real
  - el corcel
  lexicon: HALOT
  rationale: El texto hebreo dice simplemente «el caballo», con artículo definido. Se mantiene esa sobriedad en español. No se añade «real» porque el contexto inmediato ya establece su carácter honorífico, y «corcel» introduciría un matiz literario no exigido por el hebreo.
- source_word: וַיַּלְבֵּשׁ אֶת מָרְדֳּכָי
  english_pob_choice: clothed Mordecai
  chosen_spanish: vistió a Mardoqueo
  alternatives_spanish:
  - lo vistió
  - cubrió a Mardoqueo con la ropa
  lexicon: HALOT
  rationale: El hifil de לבש expresa ‘vestir a alguien’. «Vistió a Mardoqueo» es la forma más directa y natural en español, y conserva la acción sin amplificación. Se evita «cubrió» porque debilita la idea precisa de vestir.
- source_word: וַיַּרְכִּיבֵהוּ
  english_pob_choice: and mounted him on the horse
  chosen_spanish: lo hizo montar sobre el caballo
  alternatives_spanish:
  - lo montó en el caballo
  - lo hizo ir montado
  - lo causó a cabalgar
  lexicon: HALOT
  rationale: 'El hebreo es causativo: Amán hizo que Mardoqueo montara. «Lo hizo montar sobre el caballo» preserva esa causalidad con claridad. «Lo montó» podría sonar a que Amán físicamente lo subió; «lo hizo ir montado» es más pesado; «lo causó a cabalgar» suena demasiado literal y poco idiomático.'
- source_word: בִּרְחוֹב הָעִיר
  english_pob_choice: through the city square
  chosen_spanish: por la plaza de la ciudad
  alternatives_spanish:
  - por la calle principal de la ciudad
  - por el espacio público de la ciudad
  - por la plaza abierta de la ciudad
  lexicon: HALOT
  rationale: רְחוֹב suele referirse a un lugar amplio y público, no simplemente a una calle angosta. «Plaza de la ciudad» comunica bien el escenario cívico y ceremonial en español natural. «Calle principal» estrecha demasiado el sentido y «espacio público» es demasiado abstracto.
- source_word: וַיִּקְרָא לְפָנָיו
  english_pob_choice: and proclaimed before him
  chosen_spanish: y proclamó delante de él
  alternatives_spanish:
  - y anunció delante de él
  - y gritó delante de él
  - y pregonó delante de él
  lexicon: HALOT
  rationale: קרא aquí tiene el sentido de anunciar en voz alta de manera pública. «Proclamó» preserva el carácter formal y público del acto mejor que «anunció» o «gritó». «Delante de él» conserva la relación espacial del hebreo sin forzar la escena.
- source_word: כָּכָה יֵעָשֶׂה
  english_pob_choice: Thus shall it be done
  chosen_spanish: Así se hará
  alternatives_spanish:
  - Así se hará esto
  - De este modo se hará
  - Así será hecho
  lexicon: HALOT
  rationale: La frase hebrea tiene valor formular y pasivo. «Así se hará» mantiene la solemnidad y la concisión del original sin sonar antinatural en español. Se evita añadir un objeto explícito que el hebreo no da.
- source_word: לָאִישׁ
  english_pob_choice: for the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - para el hombre
  - al varón
  lexicon: HALOT
  rationale: Aunque el inglés POB retiene «for the man», el hebreo puede funcionar aquí con valor de destinatario. En español, «al hombre» fluye mejor con la fórmula final y conserva la referencia genérica a la persona que recibe el honor. «Varón» sería demasiado marcado y menos natural.
- source_word: חָפֵץ בִּיקָרוֹ
  english_pob_choice: delights to honor
  chosen_spanish: desea honrar
  alternatives_spanish:
  - se complace en honrar
  - quiere honrar
  - se deleita en honrar
  lexicon: HALOT
  rationale: חפץ expresa deseo o complacencia; aquí, junto con יקר, la idea central es el honor que el rey quiere otorgar. En español, «desea honrar» transmite bien el sentido sin sobreinterpretar el componente emocional de «deleita». «Se complace en honrar» es posible, pero algo más marcado.
theological_decisions:
- issue: Honor público conferido por autoridad real
  english_pob_reading: the king delights to honor
  chosen_spanish_reading: el rey desea honrar
  alternative_spanish_readings:
  - el rey se complace en honrar
  - el rey quiere honrar
  rationale: 'No hay una tensión doctrinal que resolver, pero sí una decisión de tono: el hebreo describe la voluntad favorable del rey para otorgar honor. «Desea honrar» refleja esa disposición sin convertirla en lenguaje devocional o eclesiástico.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que explícitamente añadió la representación causativa de וַיַּרְכִּיבֵהוּ y ajustó la fórmula final a un registro más formal («Thus shall it be done»). La versión española conserva esa explicitud causal con «lo hizo montar sobre el caballo» y mantiene una fórmula final breve y solemne («Así se hará»).
  spanish_consistency_notes:
  - Se mantiene «Mardoqueo» para el nombre propio, conforme al uso bíblico estándar en español.
  - Se evita «SEÑOR» y otros reemplazos litúrgicos porque este versículo no contiene el nombre divino ni una cita directa relevante.
  - Se conserva el tono narrativo formal sin arcaísmos innecesarios, buscando legibilidad pública y fidelidad al hebreo.
