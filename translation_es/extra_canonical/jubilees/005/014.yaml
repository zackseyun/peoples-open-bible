base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/005/014.yaml
  text: And if they do not walk in it[5:14], judgment is written for every creature and for every kind. And there is nothing in heaven or on earth, or in light or in darkness, or in Sheol or in the deep or in the place of darkness—all their judgments are ordained and written and engraved.
  footnotes:
  - marker: '5:14'
    text: The sequence 'in heaven ... on earth ... in light ... in darkness ... in Sheol ... in the deep ... in the place of darkness' reflects a comprehensive cosmological register. The final triad 'ordained and written and engraved' is retained to preserve the legal-record imagery.
    reason: cultural_note
  - marker: a
    text: Or 'everything is ordained'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:11Z'
    unchanged: false
    changes_summary: Removed 'down' from 'written down' for a more natural and closer rendering; changed 'place of gloom' to 'place of darkness' for better lexical consistency with the repeated darkness terminology.
translation:
  language: es
  text: Y si no andan en ella, el juicio está escrito para toda criatura y para toda clase. Y no hay nada en el cielo ni en la tierra, ni en la luz ni en la oscuridad, ni en el Seol ni en el abismo ni en el lugar de la oscuridad—todos sus juicios están ordenados, escritos y grabados.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ተጽሕፈ፡
  english_pob_choice: judgment is written
  chosen_spanish: el juicio está escrito
  alternatives_spanish:
  - el juicio está escrito
  - el juicio ha sido escrito
  - el juicio queda escrito
  lexicon: γράφω / escribir
  rationale: 'Conservo el pasivo con valor resultativo del inglés POB y del ge''ez: el juicio aparece como algo ya fijado por escrito, no como una acción en curso.'
- source_word: ፍጥረት፡
  english_pob_choice: every creature
  chosen_spanish: toda criatura
  alternatives_spanish:
  - toda criatura
  - toda creación
  - cada ser creado
  lexicon: creature / criatura
  rationale: ‘Criatura’ mantiene el alcance personal y cósmico sin convertirlo en una abstracción más amplia que el texto no exige.
- source_word: ትዝምድ፡
  english_pob_choice: kind
  chosen_spanish: clase
  alternatives_spanish:
  - clase
  - tipo
  - linaje
  lexicon: kind / especie / clase
  rationale: ‘Clase’ transmite el sentido distributivo de categoría o tipo sin imponer una terminología técnica biológica que podría estrechar indebidamente el alcance.
- source_word: ምኵናነ፡
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - juicio
  - sentencia
  - veredicto
  lexicon: juicio / sentencia
  rationale: ‘Juicio’ conserva la amplitud jurídica del término y permite repetir el plural final ‘sus juicios’ para reflejar la cláusula legal del original.
- source_word: ውስተ፡ መጽልም፡
  english_pob_choice: in the place of darkness
  chosen_spanish: en el lugar de la oscuridad
  alternatives_spanish:
  - en el lugar de la oscuridad
  - en el lugar de tinieblas
  - en el lugar oscuro
  lexicon: place of darkness
  rationale: Sigo la revisión inglesa que prefirió ‘place of darkness’ sobre ‘place of gloom’. En español, ‘oscuridad’ conserva la repetición temática con ‘luz’ y ‘oscuridad’ en la misma secuencia cosmológica.
- source_word: ሥሩዕ፡ ወጽሑፍ፡ ወቅሩጽ።
  english_pob_choice: ordained and written and engraved
  chosen_spanish: ordenados, escritos y grabados
  alternatives_spanish:
  - ordenados, escritos y grabados
  - decretados, escritos y grabados
  - ordenados, escritos e inscritos
  lexicon: ordain / write / engrave
  rationale: ‘Ordenados’ conserva la idea de decreto u ordenamiento previo; ‘escritos’ y ‘grabados’ reproducen la triple imagen de registro legal con progresión de fijación textual y material.
theological_decisions:
- issue: Alcance cósmico del juicio en todos los ámbitos enumerados
  english_pob_reading: The sequence 'in heaven ... on earth ... in light ... in darkness ... in Sheol ... in the deep ... in the place of darkness' reflects a comprehensive cosmological register.
  chosen_spanish_reading: La secuencia ‘en el cielo ... en la tierra ... en la luz ... en la oscuridad ... en el Seol ... en el abismo ... en el lugar de la oscuridad’ mantiene un registro cosmológico totalizante.
  alternative_spanish_readings:
  - La secuencia podría compactarse como ‘en toda la creación’
  - podría usarse ‘tinieblas’ en lugar de ‘oscuridad’
  rationale: Conservo la enumeración completa porque el texto no generaliza; la amplitud retórica depende de nombrar cada ámbito. ‘Seol’ y ‘abismo’ retienen la diferenciación espacial y escatológica sin reinterpretarla.
  doctrine_reference: Jubileos 5:14; registro cosmológico-jurídico del juicio
- issue: Lectura de la cláusula final con sujeto explícito
  english_pob_reading: everything is ordained and written and engraved
  chosen_spanish_reading: todos sus juicios están ordenados, escritos y grabados
  alternative_spanish_readings:
  - todo está ordenado, escrito y grabado
  - todas las cosas están ordenadas, escritas y grabadas
  rationale: La revisión auditada señaló que el ge'ez conserva un sustantivo judicial explícito (‘sus juicios’). Lo reflejo en español para no perder el foco legal del pasaje y no diluirlo en un ‘todo’ genérico.
  doctrine_reference: Jubileos 5:14; legalidad divina y determinación previa
translation_notes:
  revision_awareness: La base inglesa revisada eliminó ‘written down’ por ‘written’ y corrigió ‘place of gloom’ a ‘place of darkness’. Además, la revisión crítica detectó que el ge'ez no dice solo ‘everything is ordained’, sino ‘all their judgments are ordained’. La traducción española refleja esa corrección con ‘todos sus juicios están ordenados, escritos y grabados’.
  spanish_consistency_notes:
  - Mantengo ‘Seol’ como transliteración estable para el ámbito subterráneo/sepulcral, en línea con el uso bíblico receptivo.
  - Uso ‘oscuridad’ de forma consistente para el contraste con ‘luz’ y para evitar alternar innecesariamente con ‘tinieblas’.
  - Conservo la tríada final ‘ordenados, escritos y grabados’ como registro jurídico-documental, no meramente poético.
