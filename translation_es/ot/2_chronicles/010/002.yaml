translation:
  language: es
  text: Y cuando Jeroboam hijo de Nabat oyó[a] (pues él estaba en Egipto, adonde había huido de delante del rey Salomón[b]), Jeroboam volvió de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oyó de ello». El hebreo no expresa explícitamente el objeto de lo oído; el contexto lo proporciona.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «adonde había huido de delante del rey Salomón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּשְׁמֹעַ
  english_pob_choice: And when ... heard
  chosen_spanish: Y sucedió que, cuando ... oyó
  alternatives_spanish:
  - Y cuando ... oyó
  - Y aconteció que, cuando ... oyó
  lexicon: HALOT
  rationale: La construcción narrativa וַיְהִי + infinitivo de שמע introduce una circunstancia temporal. En español, «Y sucedió que» conserva el avance narrativo sin sonar mecánico, y «cuando ... oyó» expresa de forma natural el valor temporal.
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam hijo de Nabat
  alternatives_spanish:
  - Jeroboam, hijo de Nabat
  - Jeroboam el hijo de Nabat
  lexicon: HALOT
  rationale: El nombre propio se translitera y la relación patronímica se expresa con «hijo de», que es la forma natural y fiel en español.
- source_word: וְהוּא בְמִצְרַיִם
  english_pob_choice: for he was in Egypt
  chosen_spanish: y estaba en Egipto
  alternatives_spanish:
  - pues estaba en Egipto
  - porque estaba en Egipto
  lexicon: HALOT
  rationale: El hebreo añade un dato de trasfondo sobre su ubicación. En español, «y estaba en Egipto» mantiene la función explicativa sin forzar una causalidad más fuerte de la que pide el contexto.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - Mizraim
  lexicon: HALOT
  rationale: Se usa el topónimo español estándar para מִצְרַיִם.
- source_word: אֲשֶׁר בָּרַח מִפְּנֵי שְׁלֹמֹה הַמֶּלֶךְ
  english_pob_choice: where he had fled from before King Solomon
  chosen_spanish: donde había huido de delante del rey Salomón
  alternatives_spanish:
  - donde había huido de la presencia del rey Salomón
  - donde había huido del rey Salomón
  lexicon: HALOT
  rationale: «De delante de» reproduce de manera bastante directa מִפְּנֵי y conserva la imagen de huir de la presencia o alcance de alguien. «Había huido» refleja el pluscuamperfecto pedido por el trasfondo anterior en la narración.
- source_word: הַמֶּלֶךְ
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: En español, «el rey Salomón» sería gramaticalmente natural, pero aquí el hebreo pone el título en aposición. Se mantiene el artículo para la fluidez y la identificación clara.
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió de nuevo
  lexicon: HALOT
  rationale: שׁוּב denota volver o regresar. «Volvió» es breve y exacto en español narrativo; evita sugerencias de restauración teológica no presentes aquí.
- source_word: מִמִּצְרָיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  lexicon: HALOT
  rationale: La preposición מִן marca origen del regreso. «De Egipto» es la formulación más natural en español y conserva el sentido de procedencia.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se mantuvo la cláusula temporal inicial, el trasfondo explicativo sobre Egipto y la imagen literal de huir «de delante» del rey Salomón, sin introducir matices ajenos al hebreo.'
  spanish_consistency_notes:
  - Se preservó el nombre propio «Jeroboam» y el patronímico «hijo de Nabat» de manera uniforme.
  - Se eligió «Egipto» como topónimo estándar y «de delante de» para no perder la fuerza espacial de מִפְּנֵי.
  - No se introdujo ninguna terminología eclesiástica ajena al texto; el verso es puramente narrativo.
