review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: identidad de pacto (''hijos de Yahvé su Dios'') y doble prohibición de prácticas de duelo (cortes y calva en la frente por el muerto). Sin embargo, la nota [b] está anclada en el lugar equivocado: el contenido de la nota explica ''entre sus ojos'', no ''cortes''. Además, en español ''se hagan una calva'' suena algo tosco; una formulación más natural y fiel es ''se rapen una calva''.'
  spanish_quality_summary: El español es claro y digno en general. 'Hijos de Yahvé, su Dios' funciona bien. 'No se hagan cortes' es aceptable, pero la segunda prohibición mejora en naturalidad con 'no se rapen una calva'. También conviene mover la marca de nota al sintagma 'entre sus ojos' para que corresponda con la nota explicativa.
  glossary_alignment: Se alinea bien con la terminología del proyecto en 'Yahvé', 'Dios' e 'hijos'. No hay conflicto glosarial serio. La decisión de mantener 'hijos' en vez de neutralizar a 'hijos e hijas' o 'hijos/as' es correcta según la evidencia y la política. La prohibición reflexiva se conserva adecuadamente.
  issues:
  - severity: medium
    issue: La nota [b] está colocada sobre 'cortes' pero explica 'entre sus ojos'.
    rationale: La disciplina de salida exige que cada nota esté anclada exactamente en la palabra o frase pertinente. Aquí la nota dice 'Literalmente, «entre sus ojos»; es decir, en la frente', por lo que debe marcar esa frase, no 'cortes'.
  - severity: medium
    issue: '''Se hagan una calva'' suena poco natural en español bíblico contemporáneo.'
    rationale: Aunque es comprensible, en contexto funerario la combinación verbal más idiomática es 'raparse una calva' o similar. Esto preserva mejor la acción concreta de hacerse un parche rapado.
  - severity: low
    issue: La nota [a] no preserva la alternativa documentada 'children/children of Yahweh your God'.
    rationale: No es un error grave, porque el texto principal 'hijos' es correcto y la nota sí menciona el literal. Pero una nota más útil al lector español sería señalar la alternativa 'hijos' / 'hijos de Yahvé su Dios' o 'también puede traducirse hijos/descendientes' solo si hiciera falta. Dado que no añade claridad esencial, puede dejarse simple.
  revised_spanish_text: Ustedes son hijos de Yahvé, su Dios[a]. No se hagan cortes, y no se rapen una calva entre sus ojos[b] por un muerto.
  revised_footnotes:
  - marker: a
    text: El hebreo dice literalmente «hijos»; la frase expresa filiación de pacto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «entre sus ojos»; es decir, en la frente.
    reason: lexical_alternative
  revision_rationale: Se corrige la colocación de la nota para que corresponda al hebreo בֵּין עֵינֵיכֶם y se mejora la naturalidad de la segunda prohibición con 'se rapen una calva', que expresa mejor el parche de pelo afeitado como señal de duelo.
