translation:
  language: es
  text: Cuando salgan al atrio exterior[a], al atrio exterior donde está el pueblo, se quitarán las vestiduras con las que ministran y las dejarán en las cámaras santas. Luego se pondrán otras vestiduras, para que no santifiquen[b] al pueblo con sus vestiduras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La repetición de «al atrio exterior» refleja el énfasis del hebreo en el movimiento desde el ámbito sacerdotal hacia el espacio accesible al pueblo.
    reason: cultural_note
  - marker: b
    text: O «consagren al pueblo». El hebreo expresa una santificación cultual transmitida por medio de las vestiduras sacerdotales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְצֵאתָם
  english_pob_choice: When they go out
  chosen_spanish: Cuando salgan
  alternatives_spanish:
  - Y cuando salgan
  - Al salir
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo + sufijo se expresa de forma natural en español con una cláusula temporal. «Cuando salgan» conserva el valor temporal sin forzar una estructura calca.
- source_word: הֶחָצֵר הַחִיצוֹנָה
  english_pob_choice: the outer court
  chosen_spanish: el atrio exterior
  alternatives_spanish:
  - el patio exterior
  - la corte exterior
  lexicon: HALOT
  rationale: «חָצֵר» en contexto del templo se puede traducir como «atrio» o «patio». Elegí «atrio exterior» por su claridad en lenguaje bíblico y arquitectónico en español, manteniendo el contraste espacial del texto.
- source_word: אֶל הֶחָצֵר הַחִיצוֹנָה אֶל הָעָם
  english_pob_choice: to the outer court where the people are
  chosen_spanish: al atrio exterior, al atrio exterior donde está el pueblo
  alternatives_spanish:
  - al atrio exterior, al atrio exterior, al pueblo
  - al atrio exterior donde está el pueblo
  lexicon: HALOT
  rationale: Conservo la repetición de אֶל para reflejar el énfasis del hebreo en el movimiento hacia el espacio accesible al pueblo. La segunda frase funciona como aclaración appositiva; en español se mantiene con una repetición idiomática y explícita.
- source_word: יִפְשְׁטוּ אֶת בִּגְדֵיהֶם
  english_pob_choice: they shall take off the garments
  chosen_spanish: se quitarán las vestiduras
  alternatives_spanish:
  - se despojarán de sus vestiduras
  - se quitarán sus vestiduras
  lexicon: HALOT
  rationale: El verbo פשט en este contexto de ropa significa quitarse/despojarse. «Vestiduras» conserva el registro reverente y litúrgico que corresponde al contexto sacerdotal.
- source_word: אֲשֶׁר הֵמָּה מְשָׁרְתִם בָּם
  english_pob_choice: in which they minister
  chosen_spanish: con las que ministran
  alternatives_spanish:
  - en las que ministran
  - con las que sirven
  lexicon: HALOT
  rationale: «שרת» en contexto cultual expresa el servicio ministerial sacerdotal. En español, «ministrar» comunica mejor esa función que el más general «servir». El hebreo instrumental/preposicional permite «con las que» para indicar las vestiduras mediante las cuales desempeñan su servicio.
- source_word: וְהִנִּיחוּ אוֹתָם
  english_pob_choice: and leave them
  chosen_spanish: y las dejarán
  alternatives_spanish:
  - y las pondrán aparte
  - y las depositarán
  lexicon: HALOT
  rationale: «הניח» puede significar dejar/colocar. Dado el contexto de guardar ropa en un recinto designado, «las dejarán» es natural y suficientemente preciso.
- source_word: בְּלִשְׁכֹת הַקֹּדֶשׁ
  english_pob_choice: in the holy chambers
  chosen_spanish: en las cámaras santas
  alternatives_spanish:
  - en las cámaras sagradas
  - en las salas santas
  lexicon: HALOT
  rationale: «לשכה» designa una cámara o cuarto anexo. «Cámaras santas» preserva el valor arquitectónico y el matiz de consagración del lugar.
- source_word: וְלָבְשׁוּ בְּגָדִים אֲחֵרִים
  english_pob_choice: Then they shall put on other garments
  chosen_spanish: Luego se vestirán de otros vestidos
  alternatives_spanish:
  - Luego se pondrán otras vestiduras
  - Después vestirán otras prendas
  lexicon: HALOT
  rationale: «לבש» admite «vestirse» o «ponerse». Opto por una forma directa y bíblica en español. «Otros vestidos» reproduce el contraste con las vestiduras del servicio, aunque «vestidos» tenga un matiz más general que «vestiduras».
- source_word: וְלֹא יְקַדְּשׁוּ אֶת הָעָם
  english_pob_choice: so that they may not sanctify the people
  chosen_spanish: para que no santifiquen al pueblo
  alternatives_spanish:
  - para que no consagren al pueblo
  - para que no hagan santo al pueblo
  lexicon: HALOT
  rationale: «קדש» en piel significa santificar/consagrar. Elegí «santifiquen» para seguir la terminología formal del hebreo y del POB inglés revisado, manteniendo la ambigüedad cultual sin reinterpretarla moralmente.
- source_word: בְּבִגְדֵיהֶם
  english_pob_choice: with their garments
  chosen_spanish: con sus vestiduras
  alternatives_spanish:
  - por medio de sus vestiduras
  - mediante sus vestiduras
  lexicon: HALOT
  rationale: El ב aquí es instrumental. «Con sus vestiduras» es la forma más natural en español y conserva la idea de medio sin precisar en exceso el mecanismo ritual.
theological_decisions:
- issue: Santificación cultual transmitida por vestiduras sacerdotales
  english_pob_reading: The priests must change garments to avoid transmitting consecrated holiness to the people by means of their sacred garments.
  chosen_spanish_reading: Los sacerdotes deben cambiarse de vestiduras para no santificar al pueblo mediante sus vestiduras.
  alternative_spanish_readings:
  - para no consagrar al pueblo mediante sus vestiduras
  - para no hacer santo al pueblo mediante sus vestiduras
  rationale: El hebreo usa piel de קדש con objeto directo «el pueblo» e instrumento «con sus vestiduras», lo que apunta a una santificación/consagración cultual transmitida por contacto o mediación ritual. La redacción española conserva esa tensión sin moralizarla ni diluirla.
  doctrine_reference: Ezequiel 44:19; santidad ritual en el templo visionario
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «their garments» por «the garments» y «make the people holy» por «sanctify the people». En español seguí esa revisión con «las vestiduras» y «santifiquen», manteniendo además el énfasis espacial repetido del hebreo mediante la duplicación de «al atrio exterior».
  spanish_consistency_notes:
  - Usé «Yahvé» según el estándar del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Mantuve «atrio» y no «patio» para conservar el registro templo-sacro.
  - Conservé el contraste entre vestiduras del ministerio y otros vestidos para no borrar la lógica ritual del pasaje.
