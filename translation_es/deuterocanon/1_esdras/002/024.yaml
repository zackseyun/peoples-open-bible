translation:
  language: es
  text: Así que ahora he ordenado que se impida a aquellos hombres construir la ciudad[a], y que se tenga cuidado de que nada más se haga más allá de esto[b], y que este mal no avance más, para detrimento de los reyes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Contextualmente, «construir la ciudad» probablemente se refiere a reconstruirla, pero el griego dice sencillamente «construir la ciudad».
    reason: lexical_alternative
  - marker: b
    text: 'O: «que nada se haga contra esto». La frase griega puede referirse tanto a acciones más allá de la orden del rey como a acciones en contra de ella.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para molestar a los reyes». La expresión se refiere a causar disturbio o perjuicio a la autoridad real.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέταξα
  english_pob_choice: I have ordered
  chosen_spanish: he ordenado
  alternatives_spanish:
  - ordené
  - he mandado
  lexicon: BDAG
  rationale: El aoristo en un informe oficial admite un perfecto español natural. «He ordenado» conserva el acto ya cumplido y el tono administrativo.
- source_word: ἀποκωλῦσαι
  english_pob_choice: be stopped from
  chosen_spanish: se impida
  alternatives_spanish:
  - se prevenga
  - se obstaculice
  lexicon: BDAG
  rationale: La infinitiva expresa la prohibición efectiva sobre la acción. «Se impida» comunica bien la restricción jurídica sin añadir más de lo que dice el griego.
- source_word: τοὺς ἀνθρώπους ἐκείνους
  english_pob_choice: those men
  chosen_spanish: aquellos hombres
  alternatives_spanish:
  - esas personas
  - aquellos hombres
  lexicon: BDAG
  rationale: En este contexto administrativo se refiere a un grupo identificado de varones. «Aquellos hombres» mantiene la deixis y la precisión del inglés POB.
- source_word: τοῦ οἰκοδομῆσαι τὴν πόλιν
  english_pob_choice: from building the city
  chosen_spanish: construir la ciudad
  alternatives_spanish:
  - reconstruir la ciudad
  - edificar la ciudad
  lexicon: BDAG
  rationale: El griego dice literalmente «construir la ciudad» sin prefijo explícito de ‘re-’. En el cuerpo del texto se sigue de cerca el griego; la posible idea de restauración queda sin forzar.
- source_word: προνοηθῆναι
  english_pob_choice: that care be taken
  chosen_spanish: que se tome cuidado
  alternatives_spanish:
  - que se provea
  - que se haga provisión
  lexicon: BDAG
  rationale: La pasiva infinitiva expresa previsión/precaución oficial. «Que se tome cuidado» suena natural en español y conserva el matiz de vigilancia administrativa.
- source_word: ὅπως μηθὲν παρὰ ταῦτα γένηται
  english_pob_choice: that nothing further be done beyond this
  chosen_spanish: que nada más se haga más allá de esto
  alternatives_spanish:
  - que nada se haga contra esto
  - que no se haga nada fuera de esto
  lexicon: BDAG
  rationale: «Παρά ταῦτα» puede sugerir ‘más allá de esto’ o ‘contra esto’. La redacción principal mantiene la amplitud semántica y deja abierta la tensión documentada.
- source_word: τὰ τῆς κακίας
  english_pob_choice: this evil
  chosen_spanish: este mal
  alternatives_spanish:
  - esta maldad
  - este asunto malo
  lexicon: LSJ
  rationale: El genitivo idiomático apunta a una acción/afair dañina concreta. «Este mal» sigue la revisión inglesa reciente y evita sobredesarrollar la expresión.
- source_word: προβῇ ἐπὶ πλεῖον
  english_pob_choice: may not proceed any further
  chosen_spanish: no avance más
  alternatives_spanish:
  - no progrese más
  - no siga adelante
  lexicon: BDAG
  rationale: La idea es de avance o escalada. «No avance más» conserva el dinamismo del griego y se lee con naturalidad en español formal.
- source_word: εἰς τὸ βασιλεῖς ἐνοχλῆσαι
  english_pob_choice: to the detriment of kings
  chosen_spanish: para detrimento de los reyes
  alternatives_spanish:
  - para molestar a los reyes
  - para perturbar a los reyes
  lexicon: BDAG
  rationale: ἐνοχλέω puede significar molestar, perturbar o causar daño. En el marco real-administrativo, «para detrimento de los reyes» conserva el tono formal del inglés revisado.
theological_decisions:
- issue: Tratamiento del nombre divino y de títulos teológicos
  english_pob_reading: No aparece un término explícito para YHWH, Dios, Mesías o Espíritu en este versículo.
  chosen_spanish_reading: No se introduce ninguna terminología teológica adicional.
  alternative_spanish_readings:
  - Añadir referencias implícitas al rey como autoridad divina
  - Usar vocabulario sacralizado donde el texto no lo pide
  rationale: El versículo es una orden política/administrativa; ampliar con lenguaje teológico alteraría el alcance del griego.
  doctrine_reference: Principio de suficiencia textual y no sobreinterpretación
- issue: Sentido de la prohibición respecto de la ciudad
  english_pob_reading: The Greek allows either action beyond the order or action contrary to it.
  chosen_spanish_reading: «Que nada más se haga más allá de esto» con la nota de posible sentido ‘contra esto’.
  alternative_spanish_readings:
  - que nada se haga contra esto
  - que nada más se haga
  rationale: 'Se preserva la tensión semántica documentada en el audit trail: el límite puede ser ‘más allá de’ o ‘contra’ la orden.'
  doctrine_reference: No doctrinal; decisión semántica y jurídica
- issue: Alcance de «to the detriment of kings»
  english_pob_reading: The concern is political harm or disturbance to royal authority.
  chosen_spanish_reading: «para detrimento de los reyes»
  alternative_spanish_readings:
  - para molestar a los reyes
  - para perturbar a los reyes
  rationale: Se mantiene el registro oficial y se evita reducir la frase a mera irritación personal; el foco es daño o perjuicio a la autoridad real.
  doctrine_reference: No doctrinal; decisión de registro y contexto político
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente en dos puntos: emplea una formulación directa equivalente a «this evil» y un cierre formal equivalente a «to the detriment of kings». A la vez, conserva la ambigüedad documentada de παρὰ ταῦτα en nota, como hacía el aparato inglés previo.'
  spanish_consistency_notes:
  - Se mantiene «reyes» en plural como en el griego y el inglés auditado, sin armonizarlo con un singular no atestiguado.
  - No se introduce «reconstruir» en el cuerpo principal porque el griego dice simplemente οἰκοδομῆσαι.
  - El tono es administrativo y sobrio, adecuado para un edicto o carta oficial.
  - Se evita «Señor» o «Yahvé» porque el versículo no contiene un referente divino explícito.
