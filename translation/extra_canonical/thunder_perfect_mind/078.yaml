translation:
  text: 'Those who exist outside my association are ignorant of me[a],

    and those who exist in my substance are the ones who know me.

    Those who are close to me have been ignorant of me,

    and those who are far away from me are the ones who have known me.

    On the day when I am close to you, you are far away from me,

    and on the day when you are close to me, I am far away from you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲥⲩⲛⲟⲩⲥⲓⲁ can mean ‘being-with, association, company’; some translate ‘counsel’
      or ‘knowledge’ here depending on context.
    reason: lexical_alternative
  - marker: b
    text: The specific classes (angels, gods, spirits, women) are not all legible
      in the provided OCR lines; they follow the standard sequence in this section
      of Thunder and may be confirmed or adjusted with a cleaner transcription.
    reason: alignment_note
  - marker: c
    text: Or 'I am the power of the powers in my presence,\nof the angels dispatched
      at my word,\nand of gods among gods in my assembly,\nand of the spirits of every
      person who abides with me,\nand of the women who dwell within me.'.
    reason: previous_rendering
