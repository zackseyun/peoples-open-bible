    rationale: La nota explica alternativas para הַחֹשְׁבִים אָוֶן («maquinan iniquidad»), no para toda la oración. Debe colocarse junto a esa expresión para mayor precisión editorial.
  revised_spanish_text: 'Y me dijo: «Hijo de hombre, estos son los hombres que maquinan iniquidad[a] y dan mal consejo en esta ciudad».'
