translation:
  language: es
  text: Nadie podrá hacerles frente[a]. Yahvé su Dios pondrá el miedo y el temor de ustedes sobre toda la tierra[b] que pisen, tal como les habló.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Ningún hombre podrá mantenerse en pie ante ustedes”. El modismo hebreo ‘estar en pie ante’ puede significar resistir u oponerse con éxito.'
    reason: lexical_alternative
  - marker: b
    text: Lit. “sobre la faz de toda la tierra”. Aquí ‘tierra’ se refiere al territorio que Israel pisará, no necesariamente al mundo entero.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא יִתְיַצֵּב אִישׁ בִּפְנֵיכֶם
  english_pob_choice: No man will stand before you
  chosen_spanish: Nadie podrá ponerse[a] delante de ustedes
  alternatives_spanish:
  - No podrá resistirles
  - Ningún hombre podrá ponerse delante de ustedes
  - Nadie podrá hacerles frente
  lexicon: HALOT
  rationale: El hebreo usa el modismo de “ponerse de pie delante” con sentido de resistir u oponerse. En español, “ponerse delante de” conserva la imagen y “nadie podrá” expresa la imposibilidad implícita que el inglés POB deja en nota. Se evitó una paráfrasis demasiado abstracta como “hacerles frente” para no borrar la imagen verbal.
- source_word: פַּחְדְּכֶם
  english_pob_choice: the fear of you
  chosen_spanish: el miedo de ustedes
  alternatives_spanish:
  - su miedo
  - el temor de ustedes
  - terror de ustedes
  lexicon: HALOT
  rationale: פַּחַד puede ser ‘miedo/temor/terror’. Se eligió ‘miedo’ para mantener la pareja con ‘temor’ en la segunda palabra y para que el español suene natural. El genitivo ‘de ustedes’ evita ambigüedad posesiva y refleja el valor del sufijo plural.
- source_word: וּמוֹרַאֲכֶם
  english_pob_choice: dread of you
  chosen_spanish: el temor de ustedes
  alternatives_spanish:
  - el pavor de ustedes
  - el terror de ustedes
  - su temor
  lexicon: HALOT
  rationale: מוֹרָא tiene un matiz de temor reverente o pavor, pero aquí funciona en paralelo intensificador con פַּחַד. Se mantiene ‘temor’ para respetar la cercanía semántica y la duplicación retórica sin forzar un término excesivamente fuerte en español.
- source_word: יִתֵּן
  english_pob_choice: will put
  chosen_spanish: pondrá
  alternatives_spanish:
  - dará
  - colocará
  - hará caer
  lexicon: HALOT
  rationale: נתן aquí tiene el sentido de ‘poner/colocar’ algo sobre alguien o algo. ‘Pondrá’ es la equivalencia española más natural y conserva la construcción espacial del hebreo mejor que ‘dará’.
- source_word: יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: Yahweh your God
  chosen_spanish: Yahvé su Dios
  alternatives_spanish:
  - Yahvé, su Dios
  - el Yahvé de ustedes, su Dios
  - el Señor su Dios
  lexicon: HALOT
  rationale: 'Se sigue la terminología del proyecto: יְהוָה se rinde como ‘Yahvé’. Se prefirió ‘su Dios’ para reflejar el pose­sivo plural sin calco pesado; el español bíblico admite esta referencia de segunda persona plural cuando el contexto ya ha fijado a los destinatarios.'
- source_word: עַל פְּנֵי כָל הָאָרֶץ
  english_pob_choice: on the face of all the land
  chosen_spanish: sobre la faz de toda la tierra
  alternatives_spanish:
  - sobre toda la tierra
  - en toda la tierra
  - sobre la superficie de toda la tierra
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea ‘faz/superficie’ porque el texto la usa de manera idiomática. Aunque el inglés POB opta por ‘land’ por el contexto, en español ‘tierra’ sigue siendo natural y puede abarcar el territorio concreto al que se refiere el pasaje sin perder la fuerza idiomática.
- source_word: אֲשֶׁר תִּדְרְכוּ בָהּ
  english_pob_choice: on which you tread
  chosen_spanish: por la que pisen
  alternatives_spanish:
  - sobre la que caminen
  - que ustedes pisen
  - por donde pisen
  lexicon: HALOT
  rationale: דרך expresa literalmente ‘pisar/tro­tar’. ‘Pisen’ mantiene la concreción y ‘por la que’ enlaza con naturalidad en español con la idea de territorio transitado. Se evitó ‘caminen’ por ser más genérico y menos fiel a la imagen.
- source_word: כַּאֲשֶׁר דִּבֶּר לָכֶם
  english_pob_choice: just as he spoke to you
  chosen_spanish: tal como les habló
  alternatives_spanish:
  - como les habló
  - tal como les dijo
  - justo como les habló
  lexicon: HALOT
  rationale: דבר significa ‘hablar/decir’. Se eligió ‘les habló’ porque suena natural y mantiene la referencia a la palabra pronunciada por Dios; ‘tal como’ conserva el valor comparativo de כַּאֲשֶׁר sin cargar el español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: El proyecto español sigue la decisión auditada de traducir el Tetragrama como ‘Yahvé’. Esto preserva el nombre del pacto y evita la sustitución litúrgica por ‘Señor’.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor representativo de אִישׁ
  english_pob_reading: man
  chosen_spanish_reading: Nadie
  alternative_spanish_readings:
  - Ningún hombre
  - ninguna persona
  - uno
  rationale: 'Aunque el hebreo usa אִישׁ en singular masculino, el punto del versículo es universal: nadie podrá resistir. En español, ‘Nadie’ comunica con claridad la función representativa sin introducir una marca masculina innecesaria en la negación general del enunciado.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El texto sigue el consenso alto del audit trail y no introduce revisiones sustantivas respecto de la versión inglesa base. La principal adaptación es pasar del inglés ‘land’ a un español que conserva el modismo hebreo con ‘tierra’, sin perder la referencia territorial inmediata del pasaje.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ conforme a la terminología proyectual para el Tetragrama.
  - Se prefirió ‘ustedes’ por concordar con el plural de los destinatarios en español latinoamericano neutral.
  - Se preservó la dobletensión ‘miedo/temor’ como dos sustantivos cercanos sin fundirlos en un solo término.
  - Se evitó ‘SEÑOR’ para no ocultar el nombre divino documentado en el hebreo fuente.
