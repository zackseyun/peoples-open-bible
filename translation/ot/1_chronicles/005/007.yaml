id: 1CH.5.7
reference: 1 Chronicles 5:7
source:
  edition: WLC
  text: וְ/אֶחָי/ו֙ לְ/מִשְׁפְּחֹתָ֔י/ו בְּ/הִתְיַחֵ֖שׂ לְ/תֹלְדוֹתָ֑/ם הָ/רֹ֥אשׁ יְעִיאֵ֖ל וּ/זְכַרְיָֽהוּ׃
translation:
  text: 'And his brothers by their clans[a], in the genealogy of their generations: the chief was Jeiel, and Zechariah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when they were registered in the genealogy according to their generations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶחָיו
  chosen: And his brothers
  alternatives:
  - And his kinsmen
  - And his relatives
  lexicon: HALOT
  rationale: אָח in genealogical contexts commonly refers to brothers/kinsmen. Here the immediate sense is male relatives within the tribal genealogy. 'Brothers' is the most direct rendering and fits the genealogical register; broader alternatives are possible but less precise.
- source_word: לְמִשְׁפְּחֹתָיו
  chosen: by their clans
  alternatives:
  - according to his clans
  - for his families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal lists is best rendered 'clan' rather than the more modern and potentially domestic 'family.' Although the suffix is 3ms ('his'), the sense is distributive with reference to the brothers' grouping; English smooths this as 'their clans' to reflect the collective sense.
- source_word: בְּהִתְיַחֵשׂ
  chosen: when they were enrolled
  alternatives:
  - in the genealogical registration
  - when they were reckoned by genealogy
  - in their enrollment
  lexicon: HALOT
  rationale: The hitpael of יחס in Chronicles refers to registering or enrolling by genealogy. A temporal clause in English ('when they were enrolled') captures the function naturally while preserving the genealogical nuance.
- source_word: לְתֹלְדוֹתָם
  chosen: by their generations
  alternatives:
  - according to their generations
  - by their genealogical lines
  lexicon: HALOT
  rationale: תּוֹלְדוֹת here refers to lines of descent/generational records, not merely birth events. 'By their generations' is a conventional and sufficiently transparent rendering in a genealogy context.
- source_word: הָרֹאשׁ
  chosen: the chief was
  alternatives:
  - the head was
  - the first was
  lexicon: HALOT
  rationale: רֹאשׁ can mean head, chief, or leader. In this list context it identifies the leading or principal person in the genealogical grouping. 'The chief was' communicates rank more clearly than the literal 'head was' in modern English.
- source_word: יְעִיאֵל
  chosen: Jeiel
  alternatives:
  - Jei'el
  rationale: Personal name transliterated by standard English convention, in keeping with the translation philosophy to transliterate names.
- source_word: וּזְכַרְיָהוּ
  chosen: and Zechariah
  alternatives:
  - and Zekaryahu
  rationale: Personal name transliterated by standard English convention. Although the Hebrew form is longer (-yahu), standard English biblical usage 'Zechariah' is appropriate and recognizable.
