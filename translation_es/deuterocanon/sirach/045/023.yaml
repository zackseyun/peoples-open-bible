revisions:
- from: Y Finees, hijo de Eleazar, heredó un tercer lugar en poder[a], porque fue celoso por el Dios de todos y se puso en la brecha por su pueblo[b][c].
  to: Y Finees, hijo de Eleazar, heredó un tercer lugar en valor[a], porque fue celoso por el Dios de todos y se puso en la brecha por su pueblo[b][c].
  rationale: Se ajusta únicamente בגבורה de 'poder' a 'valor' para reflejar mejor el sentido de fuerza heroica/valentía y mejorar la naturalidad del español, sin cambiar la estructura ni las decisiones textuales principales del borrador.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:34:36Z'
