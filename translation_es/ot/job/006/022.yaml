translation:
  language: es
  text: '¿Acaso dije[a]: “Denme”, o “De su fuerza[b], paguen un soborno por mí” ?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “¿Es que dije...?”. La partícula hebrea introduce una pregunta retórica con matiz enfático.
    reason: alternative_reading
  - marker: b
    text: O “De sus recursos”. Aunque כֹּחַ literalmente significa “fuerza”, en este contexto puede referirse a medios o recursos.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲכִי
  english_pob_choice: Have I ever
  chosen_spanish: ¿Acaso dije
  alternatives_spanish:
  - ¿He dicho acaso
  - ¿Es que dije
  lexicon: HALOT
  rationale: La forma inicia una pregunta retórica con fuerza enfática. En español, ‘¿Acaso dije...?’ comunica bien la negación implícita de Job sin endurecer el orden hebreo.
- source_word: אָמַרְתִּי
  english_pob_choice: said
  chosen_spanish: dije
  alternatives_spanish:
  - he dicho
  - hablé
  lexicon: HALOT
  rationale: El verbo básico es ‘decir’. ‘Dije’ mantiene la referencia directa a una declaración previa, como en el hebreo, y funciona naturalmente en la pregunta retórica.
- source_word: הָבוּ לִי
  english_pob_choice: Give to me
  chosen_spanish: Denme
  alternatives_spanish:
  - Den para mí
  - Entréguenme
  lexicon: HALOT
  rationale: El imperativo plural seguido del objeto indirecto se expresa con naturalidad como ‘Denme’. Conserva la súplica citada sin añadir una paráfrasis innecesaria.
- source_word: כֹּחַ
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - recursos
  - riqueza
  - medios
  lexicon: HALOT
  rationale: El sustantivo significa literalmente ‘fuerza/poder’. Aunque en contexto puede implicar recursos o riqueza, aquí se mantiene ‘fuerza’ para seguir de cerca el valor léxico preservando la tensión contextual señalada por la revisión inglesa.
- source_word: שִׁחֲדוּ
  english_pob_choice: pay a bribe
  chosen_spanish: sobórnenlo
  alternatives_spanish:
  - paguen un soborno
  - den un soborno
  - compren su favor
  lexicon: HALOT
  rationale: El verbo deriva de la raíz de ‘soborno’ y el sentido transaccional debe mantenerse. ‘Sobórnenlo’ traslada con claridad la idea de inducir favorablemente en su favor, sin suavizarla a ‘regalo’.
- source_word: בַעֲדִי
  english_pob_choice: on my behalf
  chosen_spanish: en favor de mí
  alternatives_spanish:
  - por mí
  - en mi nombre
  - a mi favor
  lexicon: HALOT
  rationale: La preposición בעד expresa representación o beneficio. ‘En favor de mí’ conserva el valor de mediación/beneficio; también refleja que la acción sería hecha por cuenta de Job.
translation_notes:
  revision_awareness: La revisión inglesa reciente volvió de ‘wealth’ a ‘strength’ para reflejar más de cerca כֹּחַ; por eso el español conserva ‘fuerza’ en el cuerpo principal, pero la nota permite la alternativa contextual ‘recursos’. También se mantuvo el valor transaccional fuerte de שִׁחֲדוּ mediante ‘sobórnenlo’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ según los lineamientos del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió un español directo y publicable, con pregunta retórica clara y sin suavizar la fuerza léxica de ‘soborno’.
  - El pronombre clítico en ‘sobórnenlo’ refleja el objeto implícito de la acción en una formulación natural en español, sin añadir contenido ajeno al hebreo.
