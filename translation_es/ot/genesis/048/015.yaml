translation:
  language: es
  text: 'Y bendijo a José y dijo: «El Dios delante de quien caminaron mis padres Abraham e Isaac, el Dios que ha sido mi pastor[a] desde mi nacimiento hasta hoy»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Dios que me ha pastoreado» o «el Dios que me ha alimentado». El verbo hebreo conserva la imagen del cuidado y la provisión continuos de un pastor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרֶךְ אֶת יוֹסֵף
  english_pob_choice: And he blessed Joseph
  chosen_spanish: Y bendijo a José
  alternatives_spanish:
  - Y bendijo a Yosef
  lexicon: HALOT
  rationale: Se mantiene el sujeto y el objeto explícitos del hebreo, sin armonizar con el contexto inmediato. Aunque la bendición alcanza en la escena a la descendencia de José, el texto dice literalmente «a José», y la traducción conserva esa formulación.
- source_word: הָאֱלֹהִים
  english_pob_choice: The God
  chosen_spanish: El Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: El artículo definido se conserva en español para reflejar la solemnidad e identificación formal del hebreo. «El Dios» suena algo marcado en español, pero comunica mejor la forma invocativa del texto.
- source_word: אֲשֶׁר הִתְהַלְּכוּ אֲבֹתַי לְפָנָיו
  english_pob_choice: before whom my fathers Abraham and Isaac walked
  chosen_spanish: delante de quien caminaron mis padres Abraham e Isaac
  alternatives_spanish:
  - ante quien caminaron mis padres Abraham e Isaac
  - en cuya presencia caminaron mis padres Abraham e Isaac
  - a quien siguieron mis padres Abraham e Isaac
  lexicon: HALOT
  rationale: Se preserva el idiomático hebreo de «caminar delante de» con una construcción natural en español. «Delante de quien caminaron» mantiene la relación de vida bajo la mirada de Dios sin reducirla a simple obediencia.
- source_word: אַבְרָהָם וְיִצְחָק
  english_pob_choice: Abraham and Isaac
  chosen_spanish: Abraham e Isaac
  alternatives_spanish:
  - Abraham y Isaac
  lexicon: Nombres propios bíblicos estándar
  rationale: Se usan las formas usuales en español. La euphónica «e» ante Isaac es la opción natural y tradicional en español.
- source_word: הָרֹעֶה אֹתִי
  english_pob_choice: the God who has been my shepherd
  chosen_spanish: el Dios que ha sido mi pastor
  alternatives_spanish:
  - el Dios que me ha pastoreado
  - el Dios que me ha cuidado como pastor
  - el Dios que me ha alimentado
  lexicon: HALOT
  rationale: Se conserva la metáfora pastoral con el sustantivo «pastor», como hace la revisión inglesa al preferir una formulación más natural sin perder la imagen. «Pastor» en español comunica con claridad la idea de guía y cuidado continuo.
- source_word: מֵעוֹדִי
  english_pob_choice: from my birth
  chosen_spanish: desde mi nacimiento
  alternatives_spanish:
  - desde mi comienzo
  - desde mi juventud
  - desde que nací
  lexicon: HALOT
  rationale: La revisión inglesa opta por «from my birth» para precisar el punto inicial. «Desde mi nacimiento» sigue esa decisión y expresa el inicio temporal más claramente que una formulación más general.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta este día
  - hasta el día de hoy
  lexicon: HALOT
  rationale: Es la equivalencia temporal natural en español y conserva la continuidad desde el inicio de la vida de Jacob hasta el presente.
theological_decisions:
- issue: Metáfora de caminar delante de Dios
  english_pob_reading: before whom my fathers Abraham and Isaac walked
  chosen_spanish_reading: delante de quien caminaron mis padres Abraham e Isaac
  alternative_spanish_readings:
  - ante quien caminaron mis padres Abraham e Isaac
  - en cuya presencia caminaron mis padres Abraham e Isaac
  - a quien siguieron mis padres Abraham e Isaac
  rationale: La frase mantiene la imagen relacional y covenantal del hebreo. No se la reduce a mera conducta moral ni se la sustituye por una paráfrasis de seguimiento, porque el texto enfatiza una vida vivida delante de Dios.
  doctrine_reference: Translation philosophy §3, §6
- issue: Metáfora pastoral divina
  english_pob_reading: the God who has been my shepherd
  chosen_spanish_reading: el Dios que ha sido mi pastor
  alternative_spanish_readings:
  - el Dios que me ha pastoreado
  - el Dios que me ha alimentado
  - el Dios que ha sido mi guía y pastor
  rationale: Se conserva la imagen del pastor, importante en toda la Escritura, en vez de rebajarla a una idea abstracta de provisión. «Ha sido mi pastor» expresa cuidado continuo desde el pasado hasta el presente.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa al preferir una formulación natural para la metáfora pastoral y precisar el punto inicial temporal con «desde mi nacimiento». También conserva el matiz del artículo definido en «El Dios», como el inglés revisado mantiene «The God».
  spanish_consistency_notes:
  - Se usa «Dios» con artículo cuando el hebreo lo lleva en forma definida y solemne.
  - Se prefiere «José» como forma española estándar para el nombre, no la transliteración hebrea.
  - La metáfora de «pastor» se conserva de forma explícita para mantener la tensión lexical del hebreo.
  - «Hasta hoy» reproduce de manera idiomática la continuidad temporal del hebreo sin añadir información no presente.
