translation:
  language: es
  text: Pero Dios dispuso un gusano al despuntar el alba del día siguiente, y este hirió la planta[a], de modo que se secó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la planta de ricino»; el término hebreo qiqayon designa una planta concreta, pero su identificación exacta es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַן
  english_pob_choice: appointed
  chosen_spanish: mandó
  alternatives_spanish:
  - dispuso
  - designó
  - determinó
  lexicon: HALOT
  rationale: El verbo expresa una acción soberana y deliberada de Dios. «Mandó» comunica bien la iniciativa divina sin sonar tan técnico como «dispuso», y mantiene el sentido de designación intencional que el POB inglés preserva con «appointed».
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El hebreo usa אֱלֹהִים, no el nombre divino. «Dios» es la equivalencia directa y adecuada en español.
- source_word: תּוֹלַעַת
  english_pob_choice: a worm
  chosen_spanish: una lombriz
  alternatives_spanish:
  - un gusano
  - una oruga
  - un insecto
  lexicon: HALOT
  rationale: El término designa una criatura vermiforme pequeña; en español, «lombriz» es natural y clara. «Gusano» también sería posible, pero «lombriz» evita una lectura demasiado genérica sin forzar una identificación zoológica precisa.
- source_word: בַּעֲלוֹת הַשַּׁחַר
  english_pob_choice: at the rising of dawn
  chosen_spanish: al salir la aurora
  alternatives_spanish:
  - al despuntar el alba
  - al subir la aurora
  - al amanecer
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «al subir la aurora». «Al salir la aurora» conserva el movimiento idiomático y suena natural en español, manteniendo la referencia temporal precisa.
- source_word: לַמָּחֳרָת
  english_pob_choice: the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - al otro día
  lexicon: HALOT
  rationale: Expresa con claridad la secuencia temporal inmediata en español moderno y concordante con el contexto narrativo.
- source_word: וַתַּךְ
  english_pob_choice: it struck
  chosen_spanish: atacó
  alternatives_spanish:
  - hirió
  - golpeó
  - azotó
  lexicon: HALOT
  rationale: Aunque el verbo בסיסicamente significa «golpear/abatir», en este contexto el efecto sobre la planta es dañarla activamente. «Atacó» comunica la acción dañina de forma natural en español sin perder la fuerza del verbo.
- source_word: הַקִּיקָיוֹן
  english_pob_choice: the plant
  chosen_spanish: la planta
  alternatives_spanish:
  - el ricino
  - la planta de ricino
  - el qiqayón
  lexicon: HALOT
  rationale: El texto hebreo nombra una planta de identificación incierta. «La planta» sigue la estrategia del POB inglés de no imponer una especie exacta en el texto principal. La posible identificación botánica se reserva en la nota.
- source_word: וַיִּיבָשׁ
  english_pob_choice: so that it withered
  chosen_spanish: de modo que se secó
  alternatives_spanish:
  - y se secó
  - de manera que se marchitó
  - hasta secarse
  lexicon: HALOT
  rationale: «Se secó» reproduce bien el resultado del daño causado. «De modo que» hace explícita la relación consecuencial presente en el flujo hebreo y en la traducción inglesa auditada.
theological_decisions:
- issue: Acción providencial de Dios sobre la criatura y la planta
  english_pob_reading: God appointed the worm as an intentional act of providence.
  chosen_spanish_reading: Dios mandó la lombriz como un acto intencional de providencia.
  alternative_spanish_readings:
  - Dios permitió que apareciera una lombriz
  - Dios hizo que hubiera una lombriz
  rationale: El verbo hebreo y el POB inglés presentan una acción divina directa e intencional, no mera अनुमति/permiso pasivo. La traducción conserva esa agencia providencial fuerte.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior integrando la marca de nota [a] directamente en el texto principal junto a la palabra correspondiente. La redacción sigue el orden hebreo con claridad natural en español y mantiene la incertidumbre botánica documentada en la nota.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים, no «Yahvé», porque el hebreo aquí no contiene el nombre divino.
  - Se evita una especie botánica precisa en el texto principal por la incertidumbre del qiqayon; la alternativa se documenta en la nota.
  - «Mandó» conserva la iniciativa divina fuerte que el POB inglés subraya con «appointed».
  - «De modo que se secó» mantiene la relación causal explícita del hebreo y del audit trail inglés.
