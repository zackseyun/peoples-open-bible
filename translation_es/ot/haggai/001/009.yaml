translation:
  language: es
  text: 'Ustedes esperaban mucho, pero miren: resultó poco; y cuando lo trajeron a casa, yo lo hice desaparecer de un soplo[a]. ¿Por qué? —declara Yahvé de los Ejércitos[b]—. Por causa de mi casa, que está en ruinas, mientras cada uno corre a su propia casa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «yo soplé sobre ello». El verbo hebreo significa literalmente «soplar/respirar»; aquí probablemente implica que el producto fue dispersado o reducido por el juicio de Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'Traducción tradicional: «Yahvé de los Ejércitos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּנֹה אֶל הַרְבֵּה
  english_pob_choice: You looked for much
  chosen_spanish: Ustedes buscaron mucho
  alternatives_spanish:
  - Ustedes miraron hacia mucho
  - Ustedes esperaban mucho
  lexicon: HALOT
  rationale: El giro expresa expectativa o búsqueda de abundancia en un contexto agrícola frustrado. «Buscaron mucho» conserva la idea de anhelar/esperar abundancia sin sonar forzado en español.
- source_word: וְהִנֵּה לִמְעָט
  english_pob_choice: but behold, it was little
  chosen_spanish: 'pero miren: resultó poco'
  alternatives_spanish:
  - pero he aquí que fue poco
  - pero resultó en poco
  lexicon: HALOT
  rationale: הִנֵּה pide atención vívida; «miren» mantiene esa fuerza. «Resultó poco» expresa el valor escaso alcanzado, de manera natural y fiel al resultado implícito.
- source_word: וַהֲבֵאתֶם הַבַּיִת
  english_pob_choice: and when you brought it home
  chosen_spanish: y cuando lo trajeron a casa
  alternatives_spanish:
  - y cuando lo llevaron a la casa
  - y cuando lo trajeron al hogar
  lexicon: HALOT
  rationale: Aquí הַבַּיִת se refiere al hogar propio, no al templo, por el contraste posterior con «mi casa» y «su propia casa». «A casa» es una forma idiomática y precisa en español.
- source_word: וְנָפַחְתִּי בוֹ
  english_pob_choice: I blew it away
  chosen_spanish: yo lo soplé
  alternatives_spanish:
  - yo soplé sobre ello
  - yo lo dispersé con un soplo
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente «soplar/breath». En este contexto de juicio, el POB nota la posibilidad de un soplo que hace desaparecer o desperdicia el producto. «Lo soplé» conserva la literalidad base y deja la fuerza del juicio implícita.
- source_word: יַעַן מֶה
  english_pob_choice: Why?
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Por qué razón?
  - ¿A causa de qué?
  lexicon: HALOT
  rationale: Es una pregunta retórica sobre la causa del juicio; «¿Por qué?» es la forma más natural y directa en español.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  english_pob_choice: declares Yahweh of Armies
  chosen_spanish: —declara Yahvé de los Ejércitos—
  alternatives_spanish:
  - —dice Yahvé de los Ejércitos—
  - —oráculo de Yahvé de los Ejércitos—
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» según la pauta del proyecto. «De los Ejércitos» traduce צְבָאוֹת de forma transparente y mantiene el matiz militar/forense del título.
- source_word: יַעַן בֵּיתִי אֲשֶׁר הוּא חָרֵב
  english_pob_choice: Because of my house, which lies in ruins
  chosen_spanish: Por causa de mi casa, que está en ruinas
  alternatives_spanish:
  - Porque mi casa está en ruinas
  - Por causa de mi casa, que yace en ruinas
  lexicon: HALOT
  rationale: חָרֵב expresa ruina o desolación. «Está en ruinas» comunica el estado con claridad y sin añadir más de lo que el hebreo dice.
- source_word: וְאַתֶּם רָצִים אִישׁ לְבֵיתוֹ
  english_pob_choice: while each of you runs to his own house
  chosen_spanish: mientras cada uno corre a su propia casa
  alternatives_spanish:
  - mientras cada uno se apresura a su casa
  - mientras cada hombre corre a su casa
  lexicon: HALOT
  rationale: רָצִים conserva la idea de correr/apresurarse con urgencia y prioridad mal enfocada. «Cada uno» reproduce el valor distributivo de אִישׁ לְבֵיתוֹ en español natural.
theological_decisions:
- issue: Render of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. El proyecto pide «Yahvé» como forma principal en español, en lugar de ocultarlo con «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering צְבָאוֹת
  english_pob_reading: of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los Ejércitos
  - de los Ejércitos celestiales
  - de los ejércitos
  rationale: Se traduce el título en vez de transliterarlo o usar «Hosts». «De los Ejércitos» es transparente en español y conserva la carga de poder y autoridad del título.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se conservó el contraste entre «mucho» y «poco», el valor idiomático de «bring it home», la posibilidad léxica de «blow/breathe», y la decisión doctrinal de traducir el nombre divino como Yahvé. No hubo revisiones aplicadas en el registro inglés y la concordancia de revisión es alta.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «De los Ejércitos» traduce צְבָאוֹת de manera uniforme y auditable.
  - Se evita neutralizar el distributivo hebreo; «cada uno» preserva la fuerza representativa de אִישׁ.
  - El tono es profético y sobrio, apto para lectura pública en español moderno.
