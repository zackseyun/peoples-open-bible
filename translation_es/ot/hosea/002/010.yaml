translation:
  language: es
  text: Pero ella no sabía que era yo quien le di el grano, el vino nuevo y el aceite[a], y quien le multipliqué la plata y el oro, que ellos hicieron en imagen de Baal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Aceite» traduce יִצְהָר como producto agrícola; puede entenderse específicamente como aceite de oliva.
    reason: lexical_alternative
  - marker: b
    text: O «que hicieron para Baal». El hebreo es breve y puede referirse tanto a hacer una imagen de Baal con la plata y el oro como a emplear esos dones más generalmente en el culto a Baal.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִיא
  english_pob_choice: But she
  chosen_spanish: Pero ella
  alternatives_spanish:
  - Y ella
  - Mas ella
  lexicon: HALOT
  rationale: El וְ introductorio tiene aquí fuerza contrastiva con el contexto previo; «Pero» reproduce naturalmente ese giro adversativo en español y mantiene el sujeto femenino explícito.
- source_word: לֹא יָדְעָה
  english_pob_choice: did not know
  chosen_spanish: no sabía
  alternatives_spanish:
  - no conocía
  - no reconoció
  lexicon: HALOT
  rationale: ידע en qal expresa saber/conocer. «No sabía» es directo, idiomático y deja que el contexto cargue la idea de no reconocer o no agradecer.
- source_word: כִּי אָֽנֹכִי
  english_pob_choice: that it was I
  chosen_spanish: que era yo quien
  alternatives_spanish:
  - que yo
  - que fui yo
  lexicon: HALOT
  rationale: El pronombre independiente אָנֹכִי es enfático; «que era yo quien» conserva ese énfasis mejor que un simple «que yo» y suena natural en español.
- source_word: הַדָּגָן
  english_pob_choice: the grain
  chosen_spanish: el grano
  alternatives_spanish:
  - el cereal
  - el trigo
  lexicon: HALOT
  rationale: דגן designa el producto cereal general. «El grano» es el equivalente más amplio y fiel en español.
- source_word: הַתִּירוֹשׁ
  english_pob_choice: the new wine
  chosen_spanish: el mosto
  alternatives_spanish:
  - el vino nuevo
  - el vino fresco
  lexicon: HALOT
  rationale: תירוש puede referirse al vino joven o recién producido. «Mosto» expresa bien la etapa agrícola de la producción y evita la lectura de vino añejo; es una opción válida dentro del campo semántico.
- source_word: הַיִּצְהָר
  english_pob_choice: the oil
  chosen_spanish: el aceite
  alternatives_spanish:
  - el aceite de oliva
  - el aceite fresco
  lexicon: HALOT
  rationale: יצהר alude al aceite producido, normalmente de oliva. «Aceite» comunica el producto sin sobreespecificar más de lo que el hebreo exige.
- source_word: וְכֶסֶף הִרְבֵּיתִי לָהּ
  english_pob_choice: and who multiplied silver for her
  chosen_spanish: y quien multiplicaba para ella la plata
  alternatives_spanish:
  - y quien aumentaba para ella la plata
  - y quien le daba abundante plata
  lexicon: HALOT
  rationale: El hifil de רבה tiene sentido causativo de hacer abundar. «Multiplicaba para ella» preserva esa fuerza y el enfoque en abundancia concedida.
- source_word: וְזָהָב
  english_pob_choice: and gold
  chosen_spanish: y el oro
  alternatives_spanish:
  - y oro
  lexicon: HALOT
  rationale: Coordinación simple con el sustantivo precedente; en español, el artículo ayuda a mantener la cadencia de la lista de dones.
- source_word: עָשׂוּ לַבָּעַל
  english_pob_choice: which they made into Baal
  chosen_spanish: que hicieron para Baal
  alternatives_spanish:
  - que hicieron de ello para Baal
  - que convirtieron en Baal
  lexicon: HALOT
  rationale: 'La construcción hebrea es tersa y admite una relación final o cultual: usar esos bienes para idolatría o modelarlos para el culto a Baal. «Para Baal» conserva la ambigüedad sin forzar una imagen específica que el hebreo no explicita por completo.'
theological_decisions:
- issue: Tratamiento de בַּעַל en contexto idolátrico
  english_pob_reading: Baal
  chosen_spanish_reading: Baal
  alternative_spanish_readings:
  - el Baal
  - señor
  rationale: Aquí no funciona como título genérico sino como referencia al dios cananeo. Mantener el nombre propio «Baal» preserva la acusación profética de idolatría.
  doctrine_reference: Idolatría / monoteísmo yahvista
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés, pero ajusta la terminología al español natural: «mosto» para תירוש, «aceite» para יִצְהָר y una formulación abierta de עָשׂוּ לַבָּעַל para conservar la ambigüedad textual documentada.'
  spanish_consistency_notes:
  - Se mantiene «Baal» como nombre propio idolátrico, coherente con la política terminológica del proyecto.
  - Se usa «grano / mosto / aceite» como tríada agrícola, evitando explicitar más de lo que exige el hebreo.
  - La estructura con «que» reproduce el énfasis del pronombre independiente אָֽנֹכִי sin sonar artificial en español.
