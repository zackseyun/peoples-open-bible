translation:
  language: es
  text: Y junto al límite de Simeón, desde el lado oriental hasta el lado occidental[a], Isacar, una porción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «desde el lado del mar». Aquí «mar» funciona como término geográfico estándar para «occidente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  english_pob_choice: And along
  chosen_spanish: Y junto a
  alternatives_spanish:
  - Y sobre
  - Y al lado de
  lexicon: HALOT
  rationale: En esta fórmula territorial, la preposición con וְ introduce otra franja contigua al tramo previo. «Junto a» comunica adyacencia de manera natural en español sin perder la relación espacial del original.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  lexicon: HALOT
  rationale: En el contexto de repartos tribales, גְּבוּל puede referir la línea limítrofe de la heredad. «Límite» suena claro y bíblicamente sobrio en español, conservando el sentido de demarcación sin cargarlo con matices modernos de frontera política.
- source_word: שִׁמְעוֹן
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simón
  lexicon: Nombre propio
  rationale: El nombre tribal se translitera según uso bíblico estándar en español como «Simeón», no «Simón».
- source_word: מִ/פְּאַת
  english_pob_choice: from the ... side
  chosen_spanish: desde el lado de
  alternatives_spanish:
  - desde la extremidad de
  - desde el borde de
  lexicon: HALOT
  rationale: פֵּאָה/פְּאַת designa un extremo, borde o lado. En español, «lado» reproduce bien la estructura formulaica de la frase y mantiene la imagen geométrica del reparto.
- source_word: קָדִימָה
  english_pob_choice: east
  chosen_spanish: oriental
  alternatives_spanish:
  - del este
  - oriental
  lexicon: HALOT
  rationale: El término direccional apunta al lado oriental. «Oriental» funciona bien en un registro bíblico digno y evita la redundancia de «lado este» en esta construcción fija.
- source_word: עַד
  english_pob_choice: to
  chosen_spanish: hasta
  alternatives_spanish:
  - a
  - así como hasta
  lexicon: HALOT
  rationale: Marca extensión de un lado al otro. «Hasta» expresa el límite terminal de forma natural en español.
- source_word: פְּאַת יָמָּה
  english_pob_choice: the west side
  chosen_spanish: el lado occidental
  alternatives_spanish:
  - el lado del mar
  - el lado de occidente
  lexicon: HALOT
  rationale: Aunque יָם literalmente es «mar», en esta fórmula geográfica funciona como «occidente». «Lado occidental» conserva el valor direccional principal sin borrar la base hebrea, y evita la ambigüedad de «lado del mar» en español.
- source_word: יִשָׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Isascar
  lexicon: Nombre propio
  rationale: Se usa la forma española bíblica habitual «Isacar» para el nombre tribal.
- source_word: אֶחָד
  english_pob_choice: one portion
  chosen_spanish: una porción
  alternatives_spanish:
  - una
  - una sola porción
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «uno», el contexto del catálogo de repartos tribales requiere entender «una porción». «Una porción» hace explícita la elipsis sin introducir un contenido ajeno al pasaje.
translation_notes:
  revision_awareness: 'Se mantiene la lectura estable del pasaje según el texto hebreo masorético y el audit trail inglés: una fórmula de distribución territorial con dirección oriental-occidental, sin cambios textuales ni revisiones relevantes reportadas.'
  spanish_consistency_notes:
  - Se conserva el paralelismo formulaico del capítulo con vocabulario geográfico simple y transparente.
  - Se evita «SEÑOR» u otro término de sustitución porque no aparece el Tetragrámaton en este versículo.
  - «Isacar» sigue la convención bíblica española habitual para el nombre tribal.
  - La nota a pie conserva la alternativa semántica de יָם como «mar»/«occidente», dada la tensión lexical documentada.
