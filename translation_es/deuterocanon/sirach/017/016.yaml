translation:
  language: es
  text: Todas sus obras están delante de él como el sol[a], y sus ojos están continuamente sobre sus caminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todas sus obras están delante de él como el sol». La comparación probablemente subraya que las acciones humanas quedan plenamente expuestas delante de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅπαντα
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todo
  - todas las
  lexicon: LSJ
  rationale: ἅπαντα intensifica la totalidad; en español, «todas» concuerda naturalmente con «obras» y conserva la idea de totalidad completa.
- source_word: τὰ ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - deeds
  - acciones
  lexicon: LSJ
  rationale: «Obras» mantiene el alcance amplio de ἔργα y suena natural en español bíblico sin restringirlo a actos aislados.
- source_word: ὡς ὁ ἥλιος
  english_pob_choice: like the sun
  chosen_spanish: como el sol
  alternatives_spanish:
  - como el sol
  - así como el sol
  - al modo del sol
  lexicon: LSJ
  rationale: La comparación con ὡς se expresa con «como»; «el sol» reproduce la imagen de visibilidad manifiesta sin añadir explicaciones ajenas al texto.
- source_word: ἐναντίον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  - frente a él
  lexicon: LSJ
  rationale: «Delante de él» conserva el valor de «before/in the presence of» y resulta natural en español. Mantiene también el matiz de exposición ante Dios.
- source_word: οἱ ὀφθαλμοὶ αὐτοῦ
  english_pob_choice: his eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - su mirada
  - su vista
  lexicon: LSJ
  rationale: Se conserva la imagen corporal del griego. No se abstracta a «su mirada» para no perder el lenguaje antropomórfico del original.
- source_word: ἐνδελεχεῖς
  english_pob_choice: continually
  chosen_spanish: están continuamente
  alternatives_spanish:
  - son constantes
  - vigilan sin cesar
  - están incesantes
  lexicon: LSJ
  rationale: El adjetivo expresa continuidad o atención ininterrumpida; «están continuamente» reproduce esa persistencia con sintaxis natural en español.
- source_word: ἐπὶ τὰς ὁδοὺς αὐτῶν
  english_pob_choice: upon their ways
  chosen_spanish: sobre sus caminos
  alternatives_spanish:
  - sobre sus sendas
  - respecto de sus caminos
  - en sus caminos
  lexicon: LSJ
  rationale: «Caminos» conserva la metáfora ética de ὁδοί y funciona bien en español. «Sobre» mantiene la preposición de supervisión/atención del griego.
theological_decisions:
- issue: Antropomorfismo divino en «sus ojos»
  english_pob_reading: Retain the concrete expression 'his eyes are continually upon their ways.'
  chosen_spanish_reading: 'Conservar la expresión concreta: «sus ojos están continuamente sobre sus caminos».'
  alternative_spanish_readings:
  - su mirada está siempre sobre sus caminos
  - él vigila continuamente sus caminos
  rationale: El griego usa lenguaje corporal para expresar percepción y vigilancia divinas. Se conserva la tensión antropomórfica en lugar de reemplazarla por una abstracción.
  doctrine_reference: Translation philosophy §3, §6
- issue: Comparación con el sol
  english_pob_reading: 'Translate as a simile of manifest visibility: ''before him like the sun.'''
  chosen_spanish_reading: 'Traducir la comparación de modo directo: «delante de él como el sol».'
  alternative_spanish_readings:
  - tan visibles como el sol delante de él
  - claros como el sol ante él
  rationale: El texto no añade la idea de «claros» o «visibles», aunque la comparación lo sugiera. Se preserva la imagen y su fuerza sin explicitarla en exceso.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto griego se corresponde bien con la versión inglesa auditada; la única tensión interpretativa principal es la fuerza de la comparación con el sol y el antropomorfismo de «sus ojos», ambos conservados en español sin suavizarlos. No hubo revisiones aplicadas en el pasaje base.
  spanish_consistency_notes:
  - Se usa «caminos» para ὁδοί, en continuidad con el valor metafórico ético conservado por la versión inglesa.
  - Se mantiene «sus ojos» en lugar de una paráfrasis abstracta para respetar el lenguaje antropomórfico del griego.
  - Se evita «SEÑOR» porque el texto no contiene el nombre divino; solo una referencia implícita a Dios mediante «él».
