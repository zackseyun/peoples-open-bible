translation:
  language: es
  text: Así, Amasías los separó, a las tropas que habían venido a él desde Efraín, para que fueran a su lugar. Y se enfurecieron mucho contra[a] Judá y volvieron a su lugar con gran furor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con Judá»; el hebreo puede expresar el blanco de la ira con matiz adversativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּבְדִּילֵם
  english_pob_choice: separated them
  chosen_spanish: los separó
  alternatives_spanish:
  - los despidió
  - los apartó
  - los envió de regreso
  lexicon: HALOT
  rationale: בדל tiene el sentido básico de separar/dividir; en este contexto, Amasías está apartando a estas tropas del servicio para enviarlas de vuelta. «Los separó» conserva el vínculo léxico con el hebreo y suena natural en español.
- source_word: לְהַגְּדוּד
  english_pob_choice: the troops
  chosen_spanish: a las tropas
  alternatives_spanish:
  - al destacamento
  - a la banda
  - a la división
  lexicon: HALOT
  rationale: גְּדוּד puede designar una unidad militar, banda o tropa. «Tropas» comunica bien el grupo militar de Efraín sin forzar un matiz más específico que el texto no exige.
- source_word: אֲשֶׁר בָּא אֵלָיו מֵאֶפְרַיִם
  english_pob_choice: that had come to him from Ephraim
  chosen_spanish: que habían venido a él desde Efraín
  alternatives_spanish:
  - que había venido a él desde Efraín
  - procedentes de Efraín
  lexicon: HALOT
  rationale: El relativo identifica a las tropas que llegaron a Amasías desde Efraín. En español, el plural concuerda con «las tropas». «Habían venido» refleja bien la secuencia narrativa.
- source_word: לָלֶכֶת לִמְקוֹמָם
  english_pob_choice: to go to their place
  chosen_spanish: para que fueran a su lugar
  alternatives_spanish:
  - para volver a su lugar
  - para ir a su lugar
  - para regresar a su lugar
  lexicon: HALOT
  rationale: 'La frase hebrea expresa propósito: ir a su lugar. «Para que fueran a su lugar» sigue de cerca la estructura y evita introducir una interpretación más específica como «regresar» si no se explicita en el hebreo.'
- source_word: וַיִּחַר אַפָּם מְאֹד
  english_pob_choice: they became very angry
  chosen_spanish: se enfurecieron mucho
  alternatives_spanish:
  - se llenaron de gran ira
  - ardió mucho su ira
  lexicon: HALOT
  rationale: La expresión literal «ardió la nariz/ira» es idiomática en hebreo; en español, «se enfurecieron mucho» transmite la fuerza emocional de modo natural sin perder intensidad.
- source_word: בִּיהוּדָה
  english_pob_choice: with Judah
  chosen_spanish: contra Judá
  alternatives_spanish:
  - con Judá
  - hacia Judá
  - en contra de Judá
  lexicon: HALOT
  rationale: La preposición marca el objeto de la hostilidad. «Contra Judá» explicita el sentido adversativo que el contexto demanda y que la nota inglesa conserva como alternativa.
- source_word: וַיָּשׁוּבוּ לִמְקוֹמָם
  english_pob_choice: returned to their place
  chosen_spanish: volvieron a su lugar
  alternatives_spanish:
  - regresaron a su lugar
  - se volvieron a su lugar
  lexicon: HALOT
  rationale: שׁוב significa volver/retornar. «Volvieron a su lugar» es una forma natural y fiel en español; evita la repetición excesiva con la cláusula anterior.
- source_word: בָּחֳרִי אָף
  english_pob_choice: in fierce anger
  chosen_spanish: con gran furor
  alternatives_spanish:
  - en furiosa ira
  - con ira ardiente
  - en ardiente furor
  lexicon: HALOT
  rationale: La expresión intensifica la ira y alude al concepto de «ardor» de la ira. «Con gran furor» comunica la intensidad y conserva un tono solemne sin ser artificial.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca en el texto principal exactamente en el punto correspondiente a la alternativa léxica de בִּיהוּדָה. La redacción sigue el texto hebreo y el audit trail inglés, manteniendo la tensión entre «con Judá» y «contra Judá» mediante la nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no lo contiene.
  - «Efraín» y «Judá» conservan la forma bíblica usual en español.
  - Se evita «señor» o «SEÑOR» porque no aparecen en el versículo.
  - La nota [a] queda anclada explícitamente en «contra Judá», alineada con la ambigüedad observada en el audit trail inglés.
