review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la fórmula censal, el umbral de edad y el total numérico del hebreo. Sin embargo, se aparta del audit trail inglés y del referente cultual más probable de הַקֹּדֶשׁ al traducir «de lo santo», que en español suena más abstracto que espacial/cultual. Además, la nota al pie no preserva realmente una alternativa distinta, porque repite sustancialmente la misma idea de «encargo».
  spanish_quality_summary: El español es mayormente claro y digno, pero «guardaban el encargo de lo santo» resulta algo forzado e idiomáticamente débil. «Tenían a su cargo el lugar santo» o «guardaban el lugar santo» sería más natural; de estas, la primera preserva mejor la combinación שֹׁמְרֵי מִשְׁמֶרֶת. También conviene evitar una nota que no añada información útil.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La cuestión principal es lexical: הַקֹּדֶשׁ aquí debe reflejarse de forma cultual concreta, mejor como «el lugar santo» que como «lo santo», en línea con la revisión inglesa documentada. «Encargo» para מִשְׁמֶרֶת es aceptable, pero en esta construcción funciona mejor «tener a su cargo».'
  issues:
  - severity: high
    issue: «de lo santo» para הַקֹּדֶשׁ
    rationale: Aunque literalmente posible, en este contexto levítico suena abstracto y no comunica bien el referente cultual concreto. El audit trail inglés revisó explícitamente a «the holy place»; el español debe reflejar ese mismo sentido con «el lugar santo».
  - severity: medium
    issue: 'Construcción española poco natural: «los que guardaban el encargo»'
    rationale: La combinación intenta calcar שֹׁמְרֵי מִשְׁמֶרֶת, pero en español resulta pesada y poco idiomática. «Los que tenían a su cargo» preserva la idea de responsabilidad encomendada sin perder precisión.
  - severity: low
    issue: Nota al pie no distintiva
    rationale: La nota «O «el encargo de lo santo»» no ofrece una alternativa real ni aclara una ambigüedad nueva en español. Es mejor omitirla si no hay una variante útil.
  revised_spanish_text: Según el número de todo varón de un mes de edad en adelante, eran ocho mil seiscientos, los que tenían a su cargo el lugar santo.
  revision_rationale: Se revisa «de lo santo» a «el lugar santo» para reflejar mejor el referente cultual de הַקֹּדֶשׁ y alinearse con la revisión inglesa documentada. Se cambia «guardaban el encargo» por «tenían a su cargo» para expresar con español natural la combinación participio + מִשְׁמֶרֶת. Se elimina la nota al pie porque no preservaba una alternativa significativa.
