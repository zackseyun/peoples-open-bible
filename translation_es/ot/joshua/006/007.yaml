  source_alignment_summary: 'El borrador refleja bien la secuencia hebrea: ויאמרו → «Y dijeron», אֶל־הָעָם → «al pueblo», עִבְרוּ וְסֹבּוּ → mandato doble de avanzar y rodear, וְהֶחָלוּץ יַעֲבֹר → instrucción jussiva para que el contingente armado pase delante del arca. También preserva correctamente «Yahvé» para יְהוָה. La única desviación relevante es de registro/legibilidad: «Pasad / rodead» mezcla un voseo/vosotros peninsular poco adecuado para el español meta neutral latinoamericano.'
  spanish_quality_summary: La frase es clara y fiel, pero el uso de imperativos de segunda persona plural en -ad («Pasad», «rodead») suena marcadamente peninsular y no cumple del todo con el objetivo de español neutral latinoamericano. Conviene usar una formulación más ampliamente legible, por ejemplo «Avancen y rodeen la ciudad», manteniendo la distinción entre el primer mandato de movimiento y el segundo de circundar. El resto del texto es natural y digno.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; חָלוּץ → «hombres armados» con alternativa «vanguardia» bien preservada. La nota [a] del español introduce «ejército», mientras que el inglés auditado tenía «troops/army» solo como alternativa contextual, pero su razón principal favorece «pueblo»; la nota española es aceptable pero mejor mantenerla más cerca de la audit trail. No hay conflictos teológicos mayores.'
  issues:
  - severity: medium
    issue: Registro peninsular en los imperativos «Pasad» y «rodead»
    rationale: El proyecto pide español neutral latinoamericano / ampliamente eclesial. Las formas en -ad son naturales en España pero menos neutras para la audiencia objetivo. Deben sustituirse por una formulación inclusiva como «Avancen y rodeen».
  - severity: low
    issue: La nota [a] puede alinearse mejor con la audit trail inglesa
    rationale: El inglés documenta como alternativas «the troops» o «the army», pero subraya que el sentido llano es «people». En español, «al ejército» es posible, pero conviene explicarlo como lectura contextual militar sin desplazar el valor básico de «pueblo».
  revised_spanish_text: 'Y dijeron al pueblo[a]: «Avancen y rodeen la ciudad, y que los hombres armados[b] pasen delante del arca de Yahvé».'
