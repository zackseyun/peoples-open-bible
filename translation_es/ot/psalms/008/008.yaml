  - severity: low
    issue: La nota alternativa puede sonar más natural sin la fórmula inicial «O:»
    rationale: 'La nota actual es comprensible, pero puede presentarse de forma más limpia en español como «O también: …». Esto es estilístico, no sustancial.'
