translation:
  language: es
  text: Y el botín[a], el resto del despojo que había saqueado el pueblo del ejército, fue de 675,000 ovejas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el botín, el resto del despojo». El hebreo usa dos términos de guerra para el botín (מַלְקוֹחַ y בָּז), muy cercanos entre sí, quizá por un matiz estilístico o clasificatorio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ... was
  chosen_spanish: Ahora ... fue
  alternatives_spanish:
  - Y ... fue
  - Entonces ... fue
  lexicon: HALOT
  rationale: La forma narrativa introduce un inventario; «Ahora» comunica progresión discursiva natural en español, y «fue» conserva el valor copulativo/existencial simple del hebreo.
- source_word: הַמַּלְקוֹחַ
  english_pob_choice: the plunder
  chosen_spanish: el botín
  alternatives_spanish:
  - el despojo
  - la presa
  lexicon: HALOT
  rationale: Es un término de guerra para lo capturado. «Botín» es claro y natural en español, y mantiene el campo semántico militar.
- source_word: יֶתֶר
  english_pob_choice: the remainder of
  chosen_spanish: el resto de
  alternatives_spanish:
  - el remanente de
  - lo que quedó de
  lexicon: HALOT
  rationale: Expresa la relación de resto/sobrante respecto del despojo. «El resto de» es idiomático y fiel al valor relacional del constructo.
- source_word: הַבָּז
  english_pob_choice: the spoil
  chosen_spanish: el despojo
  alternatives_spanish:
  - el botín
  - la presa
  lexicon: HALOT
  rationale: Mantiene la segunda voz de botín de guerra sin colapsarla con la primera. «Despojo» ayuda a preservar la distinción léxica que el inglés POB también reflejó con 'plunder/spoil'.
- source_word: אֲשֶׁר בָּזְזוּ
  english_pob_choice: that ... had plundered
  chosen_spanish: que ... habían despojado
  alternatives_spanish:
  - que ... habían saqueado
  - que ... habían tomado como botín
  lexicon: HALOT
  rationale: El verbo intensifica la acción de tomar botín. «Despojar» conserva la fuerza de saqueo/expolio y evita una paráfrasis demasiado libre.
- source_word: עַם הַצָּבָא
  english_pob_choice: the people of the army
  chosen_spanish: el pueblo del ejército
  alternatives_spanish:
  - la gente del ejército
  - los hombres del ejército
  lexicon: HALOT
  rationale: Se conserva la estructura transparente «pueblo + ejército» del hebreo. Aunque menos idiomática que «las tropas», mantiene mejor la forma del original.
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - rebaños
  lexicon: HALOT
  rationale: En este conteo, el referente específico es ovino. «Ovejas» es la equivalencia más directa y natural para un lector actual.
- source_word: שֵׁשׁ מֵאוֹת אֶלֶף וְשִׁבְעִים אֶלֶף וַחֲמֵשֶׁת אֲלָפִים
  english_pob_choice: 675,000
  chosen_spanish: 675,000
  alternatives_spanish:
  - seiscientas setenta y cinco mil
  lexicon: HALOT
  rationale: Se conserva la cifra exacta en formato numeral para un listado administrativo y facilitar la lectura, como en el inglés POB.
translation_notes:
  revision_awareness: La redacción sigue de cerca el contexto auditado del inglés POB, pero vuelve al hebreo para conservar el paralelismo léxico entre מַלְקוֹחַ y בָּז. Se reflejó la revisión inglesa que precisó el verbo como acción de despojar/plunder, por eso el español usa «habían despojado» en vez de una expresión más genérica como «habían tomado».
  spanish_consistency_notes:
  - Se mantiene «botín» como término principal para מַלְקוֹחַ, en línea con el vocabulario bíblico de guerra y con el criterio de transparencia del proyecto.
  - Se usa «despojo» para בָּז a fin de no borrar la duplicación semántica presente en el hebreo.
  - La cifra se deja en numerales para coherencia con la presentación de inventario y conteo.
  - No se introduce «SEÑOR» ni otra convención de sustitución del nombre divino, porque este versículo no lo contiene.
