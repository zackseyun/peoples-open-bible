theological_decisions:
- issue: Meaning of חרם in a compressed and somewhat difficult clause
  chosen_reading: Rendered as 'their ban' in the main text, with the fuller sense of devoted destruction preserved in a footnote.
  alternative_readings:
  - their devoted destruction
  - the ban
  - their accursed doom
  rationale: The Hebrew is terse and slightly awkward, and the Greek parallel diverges substantially at this point. Since חרם is a significant covenant-war term, the translation preserves it compactly in the main text rather than flattening it into a paraphrase, while documenting the fuller semantic force in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
- issue: Use of the Hebrew as primary witness with Greek parallel in view
  chosen_reading: Main translation follows the extant Hebrew, while noting the Greek's different wording in a footnote.
  alternative_readings:
  - A Greek-based rendering emphasizing 'war' and 'those who resisted'
  rationale: For Sirach, where Hebrew survives, the project translates from the Hebrew witness. Here the Greek parallel contains notable expansions or divergences ('war,' 'those who resisted,' 'before the Lord is his war'). The main text remains anchored in the Hebrew, but the Greek is preserved as a meaningful alternative witness.
  doctrine_reference: Original-language primacy over translation tradition; translate from the most-original Zone 1 witness available while using the parallel as actual input.
