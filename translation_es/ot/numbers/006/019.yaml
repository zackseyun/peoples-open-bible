revisions:
- from: Entonces el sacerdote tomará la espaldilla cocida del carnero, una torta sin levadura de la canasta y una galleta sin levadura, y las pondrá sobre las palmas del nazareo[a], después de que haya raspado su consagración.
  to: Entonces el sacerdote tomará la espaldilla cocida del carnero, una torta sin levadura de la canasta y una oblea sin levadura, y las pondrá sobre las palmas del nazareo[a], después de que se haya rapado la cabeza consagrada.
  rationale: 'Se corrige el tramo final para reflejar el sentido contextual documentado del hebreo: no una abstracción (‘su consagración’) como objeto directo de ‘raspar’, sino la cabeza/cabello consagrado que se rapa al concluir el voto. También se sustituye «galleta» por «oblea» para un registro ritual más natural y preciso.'
  reviewer_model: gpt-5.4
