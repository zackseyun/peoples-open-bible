lexical_decisions:
- source_word: מַלְכִּירָם
  english_pob_choice: Malchiram
  chosen_spanish: Malquiram
  alternatives_spanish:
  - Malkiram
  lexicon: HALOT
  rationale: Nombre propio en una genealogía; se translitera en lugar de traducirse. En español, 'qu' refleja mejor el sonido /k/ ante 'i' que 'ch', por lo que 'Malquiram' es más natural y fiel al hebreo consonántico que 'Malchiram'.
- source_word: פְדָיָה
  english_pob_choice: Pedaiah
  chosen_spanish: Pedaía
  alternatives_spanish:
  - Pedaiah
  - Pedayá
  lexicon: HALOT
  rationale: Nombre propio; se conserva la forma teofórica con '-ía', que es una convención habitual y entendible en español bíblico. 'Pedaía' mantiene la relación con el hebreo y evita una transliteración híbrida innecesaria.
- source_word: שֶׁנְאַצַּר
  english_pob_choice: Shenazzar
  chosen_spanish: Seneazar
  alternatives_spanish:
  - Shenazar
  - Shenazzar
  lexicon: HALOT
  rationale: Nombre propio transliterado. En español se evita 'sh' salvo necesidad técnica; 'Seneazar' reproduce de manera legible la secuencia hebrea y mantiene la alusión a la consonante enfática doble sin forzar una grafía ajena al español.
- source_word: יְקַמְיָה
  english_pob_choice: Jekamiah
  chosen_spanish: Jecamía
  alternatives_spanish:
  - Yecamía
  - Jekamía
  lexicon: HALOT
  rationale: Nombre propio; se usa 'J' por la convención tradicional en nombres bíblicos en español. La terminación '-ía' refleja el elemento teofórico y conserva la pronunciación esperable en lectura eclesial.
- source_word: הוֹשָׁמָע
  english_pob_choice: Hoshama
  chosen_spanish: Josama
  alternatives_spanish:
  - Josamá
  - Hosama
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se prefiere una forma española simple y pronunciable; 'J' sigue la convención bíblica española para la inicial aspirada/consonántica hebrea, y 'Josama' evita una grafía excesivamente técnica.
- source_word: נְדַבְיָה
  english_pob_choice: Nedabiah
  chosen_spanish: Nedabía
  alternatives_spanish:
  - Nedabyá
  - Nedabiah
  lexicon: HALOT
  rationale: Nombre propio con elemento teofórico; se mantiene '-ía' como en otros nombres bíblicos españoles. La forma es transparente, consistente con la tradición onomástica bíblica y suficientemente cercana al hebreo.
theological_decisions:
- issue: Tratamiento de nombres propios en una genealogía
  english_pob_reading: The verse is a bare list of proper names, with no additional doctrinal phrasing.
  chosen_spanish_reading: Se mantiene la lista nominal sin añadir conectores explicativos ni normalizaciones interpretativas.
  alternative_spanish_readings:
  - Expansión con aclaraciones parentéticas
  - Sustitución por equivalentes tradicionales no transliterados
  rationale: El hebreo presenta solamente nombres propios; cualquier expansión iría más allá de la fuente. La decisión preserva la función genealógica y evita borrar variantes textuales o onomásticas documentables.
  doctrine_reference: Principio de suficiencia textual y fidelidad genealógica
translation_notes:
  revision_awareness: La traducción sigue el pasaje tal como está atestiguado en el texto hebreo, y concuerda con la auditoría inglesa de la POB, que también lo trata como una lista simple de nombres propios sin cambios de sentido.
  spanish_consistency_notes:
  - Se preserva el orden de los nombres del hebreo.
  - Se usa puntuación de lista en español con coma y 'y' antes del último nombre.
  - Las formas elegidas buscan coherencia con la onomástica bíblica en español sin depender mecánicamente de la grafía inglesa.
