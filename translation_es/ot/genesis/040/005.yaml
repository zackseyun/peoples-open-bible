    text: 'Otra posibilidad: «y ambos tuvieron un sueño... en la misma noche». El hebreo usa una construcción cognada, literalmente «soñaron un sueño», y una expresión temporal literalmente «en una noche».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «que servían al rey de Egipto». El hebreo puede expresar pertenencia o vinculación oficial al servicio del rey.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «en la prisión». El hebreo dice literalmente «en la casa de la cárcel», una expresión compuesta que conserva mejor el sabor del original.'
    reason: lexical_alternative
  revision_rationale: 'La revisión mantiene las decisiones fuente-clave del POB, pero mejora dos puntos: (1) integra mejor אֲסוּרִים con una cláusula relativa natural en español («que estaban presos»), y (2) suaviza «en una sola noche» a «en una misma noche», que comunica mejor el valor temporal sin añadir énfasis innecesario. También se elimina la nota b porque la variante «principal» no corresponde a una ambigüedad real del versículo y no es necesaria para el texto revisado.'
