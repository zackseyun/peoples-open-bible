base_translation:
  language: en
  yaml_path: translation/ot/genesis/021/022.yaml
  text: And it happened at that time that Abimelech and Phicol[a], the commander of his army, said to Abraham[b], “God is with you in all that you do.”
  footnotes:
  - marker: a
    text: Or, less likely in context, “a god is with you.” The Hebrew אֱלֹהִים can be understood differently in some contexts, but here it most naturally refers to God as the one blessing Abraham.
    reason: alternative_reading
  - marker: b
    text: Or 'said to Abraham, saying'.
    reason: previous_rendering
