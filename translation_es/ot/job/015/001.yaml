lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: En el hebreo narrativo, ענה forma parte de la fórmula fija «respondió y dijo». En español, «respondió» comunica mejor la relación dialógica que «contestó» y conserva el valor discursivo del verbo sin sonar forzado.
- source_word: אֱלִיפַז
  english_pob_choice: Eliphaz
  chosen_spanish: Elifaz
  alternatives_spanish:
  - Eliphaz
  lexicon: transliteración estándar del nombre hebreo
  rationale: Se conserva el nombre propio con transliteración española corriente, ajustando la forma gráfica a la ortografía del español.
- source_word: הַתֵּימָנִי
  english_pob_choice: the Temanite
  chosen_spanish: el temanita
  alternatives_spanish:
  - el de Temán
  - el hombre de Temán
  lexicon: HALOT
  rationale: El gentilicio hebreo identifica a Elifaz por su procedencia. «Temanita» reproduce la función adjetival y resulta natural en español, preservando la referencia regional sin expandirla innecesariamente.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea pide aquí «y dijo», que en español mantiene la repetición tradicional de la secuencia verbal sin añadir matices no presentes en el texto.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  lexicon: valor discursivo del waw consecutivo
  rationale: «Entonces» expresa con naturalidad el avance narrativo del waw consecutivo inicial, mejor que una mera repetición de «Y» al inicio de la frase.
translation_notes:
  revision_awareness: La base inglesa ya reflejaba una fórmula narrativa estable («Then ... answered and said»). No hubo revisiones textuales en el audit trail; la versión española conserva esa estructura con equivalentes naturales en español.
  spanish_consistency_notes:
  - Se evita «SEÑOR» y no hay reemplazos teológicos en este versículo.
  - Se mantiene la fórmula narrativa completa «respondió y dijo» por fidelidad al hebreo.
  - «Temanita» se usa como gentilicio asentado en español bíblico y no como paráfrasis descriptiva.
