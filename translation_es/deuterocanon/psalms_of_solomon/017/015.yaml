translation:
  language: es
  text: El enemigo obró como ajeno[a], en soberbia; y su corazón era ajeno a nuestro Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «actuó como un extraño»; también puede entenderse «como forastero», aunque el sentido básico es que obró desde la ajenidad o extrañeza.
    reason: lexical_alternative
  - marker: b
    text: O «su corazón era extraño a nuestro Dios» o «estaba alejado de nuestro Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἀλλοτριότητι
  english_pob_choice: in estrangement
  chosen_spanish: en alienación
  alternatives_spanish:
  - en extrañamiento
  - en extranjería
  - como forastero
  lexicon: LSJ
  rationale: El sustantivo expresa una condición de extrañeidad o alejamiento. «Alienación» conserva el campo semántico relacional y moral, y en este contexto también puede apuntar a la cualidad de ser ajeno o forastero, sin forzar la idea de una ruptura previa de alianza que el español «extrañamiento/estrangement» podría sugerir.
- source_word: ὁ ἐχθρός
  english_pob_choice: the enemy
  chosen_spanish: el enemigo
  alternatives_spanish:
  - el adversario
  - el foe
  lexicon: LSJ
  rationale: «El enemigo» es la equivalencia natural y directa del sustantivo en este contexto.
- source_word: ἐποίησεν
  english_pob_choice: acted
  chosen_spanish: actuó
  alternatives_spanish:
  - hizo
  - obró
  - cometió
  lexicon: LSJ
  rationale: El verbo aparece sin objeto explícito; «actuó» transmite conducta o proceder de manera clara y sobria en español.
- source_word: ὑπερηφανίᾳ
  english_pob_choice: in pride
  chosen_spanish: con orgullo
  alternatives_spanish:
  - con arrogancia
  - con altivez
  - en soberbia
  lexicon: LSJ
  rationale: Aunque el término griego tiene fuerza negativa de autoexaltación, en español «con orgullo» permite una lectura natural y mantiene la valoración negativa por el contexto, sin volver la frase excesivamente pesada.
- source_word: καὶ ἡ καρδία αὐτοῦ ἀλλοτρία ἀπὸ τοῦ θεοῦ ἡμῶν
  english_pob_choice: and his heart was estranged from our God
  chosen_spanish: y su corazón era ajeno a nuestro Dios
  alternatives_spanish:
  - y su corazón estaba alejado de nuestro Dios
  - y su corazón era extraño a nuestro Dios
  lexicon: LSJ
  rationale: «Ajeno» reproduce bien la idea de pertenencia o afinidad ausente y evita que el español sugiera necesariamente una relación previa rota. «Era ajeno» preserva el adjetivo ἀλλοτρία y la relación de distancia respecto de Dios.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón interior
  - centro de la persona
  lexicon: LSJ
  rationale: «Corazón» es el equivalente bíblico estándar para el interior de la persona y funciona con naturalidad en español.
theological_decisions:
- issue: Si ἀλλοτριότης/ἀλλοτρία describen una ruptura de pacto o una condición de extranjería respecto de Dios y del pueblo
  english_pob_reading: The enemy acted in estrangement ... and his heart was estranged from our God.
  chosen_spanish_reading: El enemigo actuó en alienación ... y su corazón era ajeno a nuestro Dios.
  alternative_spanish_readings:
  - El enemigo actuó en extrañamiento ... y su corazón estaba alejado de nuestro Dios.
  - El enemigo actuó como forastero ... y su corazón era extraño a nuestro Dios.
  rationale: El expediente inglés fue revisado precisamente para evitar 'estrangement' como si implicara una relación previa quebrada. En español, «alienación»/«ajeno» preserva la idea de otredad o extranjería sin convertirla en una formulación teológica más específica de lo que el griego exige en este versículo.
  doctrine_reference: Lexical/theological caution on ἀλλοτριότης and ἀλλοτρία; cross-check notes on foreigner/outsider sense in PsSol 17:7.
translation_notes:
  revision_awareness: 'El inglés del POB pasó por una revisión importante: de ''estrangement/estranged'' a formulaciones que resaltaban la extranjería/ajenidad del enemigo. Para el español, se eligió «alienación» y «ajeno» para conservar la otredad sin sugerir demasiado una ruptura de pacto previa, manteniendo además la tensión entre condición externa y distancia interior.'
  spanish_consistency_notes:
  - 'Se mantuvo la correspondencia entre ἀλλοτριότης y ἀλλοτρία con una familia léxica coherente: ''alienación'' / ''ajeno''.'
  - 'Se evitó ''SEÑOR'' para θεός: se traduce ''Dios'' de forma directa, conforme al paquete fuente.'
  - La puntuación reproduce el paralelismo griego con una pausa media tras 'orgullo'.
