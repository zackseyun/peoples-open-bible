    text: Or 'all the foreign mercenaries' or 'all the mixed multitude.' The Hebrew likely refers to a mixed population or auxiliary forces within Babylon.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'and they will become women,' an ancient idiom for becoming fearful or losing courage in battle.
    reason: cultural_note
