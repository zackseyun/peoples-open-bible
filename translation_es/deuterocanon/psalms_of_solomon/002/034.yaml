  glossary_alignment: No hay conflictos con la terminología principal del proyecto. La revisión propuesta ajusta ἀρχάς a «gobernantes», más alineado con la rationale inglesa de «rulers» y mejor que «soberanos» para distinguirlo de «reyes».
