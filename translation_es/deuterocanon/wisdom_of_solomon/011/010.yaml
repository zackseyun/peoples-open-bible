translation:
  language: es
  text: Porque a estos los probaste, amonestándolos como un padre[a], pero a aquellos los examinaste, condenándolos como un rey severo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «advirtiéndolos como un padre» para «amonestándolos como un padre».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como un rey duro» para «como un rey severo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτους μὲν ... ἐκείνους δὲ
  english_pob_choice: these ... those
  chosen_spanish: a estos ... a aquellos
  alternatives_spanish:
  - unos ... otros
  - a la una clase ... a la otra
  lexicon: LSJ
  rationale: Conserva el contraste explícito del griego sin sobreespecificar a los grupos. En español, 'a estos ... a aquellos' mantiene la oposición deíctica y fluye con naturalidad.
- source_word: ὡς πατὴρ
  english_pob_choice: as a father
  chosen_spanish: como un padre
  alternatives_spanish:
  - como padre
  - igual que un padre
  lexicon: LSJ
  rationale: Mantiene la imagen paternal directa del comparativo ὡς sin agregar una interpretación más libre.
- source_word: νουθετῶν
  english_pob_choice: admonishing
  chosen_spanish: corrigiéndolos
  alternatives_spanish:
  - amonestándolos
  - advirtiéndolos
  - reprendiéndolos
  lexicon: LSJ
  rationale: El verbo griego combina instrucción correctiva y advertencia moral. 'Corrigiéndolos' comunica ese carácter correctivo de modo natural en español; 'amonestando' sería más literal pero menos idiomático aquí.
- source_word: ἐδοκίμασας
  english_pob_choice: you tested
  chosen_spanish: los probaste
  alternatives_spanish:
  - los pusiste a prueba
  - los examinaste
  lexicon: LSJ
  rationale: '''Probar'' conserva la idea de someter a prueba o verificar la calidad. Se mantiene distinto de ἐξήτασας, que en la segunda cláusula se vierte con ''examinaste''.'
- source_word: ἀπότομος
  english_pob_choice: stern
  chosen_spanish: severo
  alternatives_spanish:
  - duro
  - estricto
  - áspero
  lexicon: LSJ
  rationale: El adjetivo indica dureza/rigor implacable. 'Severo' expresa bien esa seriedad judicial y regia en español actual.
- source_word: βασιλεὺς
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  - soberano
  lexicon: LSJ
  rationale: '''Rey'' es la correspondencia básica y más directa; evita elevar el registro sin necesidad.'
- source_word: καταδικάζων
  english_pob_choice: condemning
  chosen_spanish: condenándolos
  alternatives_spanish:
  - sentenciándolos
  - fallando contra ellos
  lexicon: LSJ
  rationale: Preserva la fuerza forense y punitiva del participio. El objeto implícito se explicita en español para evitar ambigüedad.
- source_word: ἐξήτασας
  english_pob_choice: you examined
  chosen_spanish: los examinaste
  alternatives_spanish:
  - los investigaste
  - los escrutaste
  - los pusiste a prueba
  lexicon: LSJ
  rationale: 'Mantiene la diferencia con ἐδοκίμασας: aquí la imagen es de indagación judicial o escrutinio más que de prueba en sentido general.'
theological_decisions:
- issue: Distinción entre corrección paternal y condena regia
  english_pob_reading: The verse contrasts God's fatherly corrective testing of 'these' with his kingly judicial examination and condemnation of 'those.'
  chosen_spanish_reading: El versículo contrasta la corrección paternal de 'estos' con el examen judicial y condena regios de 'aquellos'.
  alternative_spanish_readings:
  - Ambos miembros podrían nivelarse como 'prueba' general, debilitando la diferencia entre disciplina y juicio.
  - Podría suavizarse la segunda mitad como simple 'examen', pero eso perdería la condena explícita.
  rationale: 'La sintaxis española conserva la doble escena sin armonizarla: primero corrección de padre, luego condena de rey severo. Así se preserva la tensión teológica del texto, en línea con el audit trail inglés.'
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se siguió el texto griego de la edición Swete 1909 y el audit trail inglés. La elección española mantiene la paralela distinción entre νουθετῶν y ἐξήτασας, y entre la imagen paterna y la regia/judicial, sin aplanar la tensión teológica. No se requirieron revisiones adicionales respecto del pasaje adjudicado.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como forma por defecto para el nombre divino, pero este versículo no lo contiene.
  - '''Probar'' se reservó para ἐδοκίμασας; ''examinar'' para ἐξήτασας, preservando la diferencia verbal.'
  - '''Severo'' traduce ἀπότομος sin recurrir a formulaciones eclesiásticas tradicionales no necesarias.'
  - Se mantuvo el paralelismo deíctico 'estos / aquellos' con objetos explícitos para claridad en español.
