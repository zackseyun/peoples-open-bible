translation:
  language: es
  text: Moisés nos mandó una ley[a][b], una herencia para la asamblea de Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ley» también puede entenderse como «instrucción».
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo es comprimido y puede leerse también: «Moisés nos mandó una ley, la herencia de la asamblea de Jacob».'
    reason: alternative_reading
lexical_decisions:
- source_word: תּוֹרָה
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  - Torá
  lexicon: HALOT
  rationale: En este contexto de pacto y mediación de Moisés, "ley" transmite con claridad el sentido normativo y comunitario que la traducción inglesa conservó con "law". "Instrucción" también sería posible, pero en español suena menos específico aquí; "Torá" se reservaría para casos donde la transliteración aporte valor contextual o litúrgico.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio
  lexicon: HALOT
  rationale: El verbo hebreo expresa una acción autoritativa de mando. "Mandó" mantiene esa fuerza en español natural y evita suavizar el peso del verbo. "Ordenó" también es viable, pero puede sonar más administrativo; "dio" sería demasiado débil.
- source_word: לָנוּ
  english_pob_choice: for us
  chosen_spanish: nos
  alternatives_spanish:
  - para nosotros
  - a nosotros
  lexicon: HALOT
  rationale: El hebreo admite una relación dativa de destinatario o beneficio. En español, con "mandó una ley" la forma pronominal "nos" resulta más fluida y conserva que la ley fue dada para el pueblo receptor. No se pierde el valor de pertenencia del verso.
- source_word: מוֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: Nombre propio estándar
  rationale: Se usa la forma española usual del nombre propio.
- source_word: מוֹרָשָׁה
  english_pob_choice: an inheritance
  chosen_spanish: una herencia
  alternatives_spanish:
  - una posesión
  - un patrimonio
  - una heredad
  lexicon: HALOT
  rationale: El término designa una posesión recibida por derecho hereditario. "Herencia" comunica bien esa idea en español común y mantiene el matiz de posesión recibida. "Heredad" es más tradicional pero menos natural; "posesión" y "patrimonio" desplazan el énfasis.
- source_word: קְהִלַּת
  english_pob_choice: the assembly of
  chosen_spanish: la asamblea de
  alternatives_spanish:
  - la congregación de
  - la comunidad de
  lexicon: HALOT
  rationale: '"Asamblea" conserva el sentido corporativo de un pueblo reunido, sin cargar el término con asociaciones eclesiales posteriores. Es el equivalente más transparente para el grupo reunido de Jacob.'
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: Nombre propio estándar
  rationale: El hebreo dice explícitamente "Jacob" y se conserva ese nombre en lugar de interpretarlo como "Israel".
theological_decisions:
- issue: Relación sintáctica entre "ley" y "herencia"
  english_pob_reading: 'The verse is rendered as two linked assertions: Moses commanded a law for Israel, and that law is an inheritance for Jacob''s assembly.'
  chosen_spanish_reading: 'El versículo se traduce con dos afirmaciones enlazadas: Moisés dio/mandó una ley para Israel, y esa ley es una herencia para la asamblea de Jacob.'
  alternative_spanish_readings:
  - Moisés nos mandó una ley, la herencia de la asamblea de Jacob.
  - Moisés mandó para nosotros una ley, una herencia para la asamblea de Jacob.
  rationale: 'El hebreo es muy comprimido y permite leer "herencia" como aposición de "ley" o como segunda afirmación nominal. La redacción española mantiene esa tensión sin decidirla en exceso: la coma permite que "una herencia para la asamblea de Jacob" funcione como cualidad de la ley y a la vez como segunda idea poética.'
  doctrine_reference: Translation philosophy §3, preservar la tensión teológica y poética en lugar de resolverla completamente
- issue: Elección de "ley" frente a transliteración o "instrucción"
  english_pob_reading: '''Law'' may also be rendered ''instruction,'' and ''inheritance'' may also be rendered ''heritage'' or ''possession.'''
  chosen_spanish_reading: '"Ley" como principal, con posibilidad implícita de "instrucción" en nota.'
  alternative_spanish_readings:
  - instrucción
  - Torá
  rationale: En español bíblico contemporáneo, "ley" comunica mejor el carácter público y pactal del texto. Se conserva la posibilidad de "instrucción" porque el término hebreo puede abarcar más que normativa jurídica estricta.
  doctrine_reference: HALOT; principio POB de mantener la fuerza lexical sin borrar el rango semántico
translation_notes:
  revision_awareness: El registro inglés quedó en estado de alta concordancia y sin cambios en la última revisión; esta propuesta española sigue esa lectura estable, manteniendo la compresión poética del hebreo y el valor fuerte de los términos clave.
  spanish_consistency_notes:
  - Se mantiene «Moisés» y «Jacob» como nombres propios españoles estándar.
  - Se evita «SEÑOR» porque el verso no contiene el nombre divino.
  - «Ley» se usa como equivalente principal de תּוֹרָה, coherente con la decisión inglesa, sin eliminar la posibilidad semántica de «instrucción».
  - «Herencia» reproduce el valor de posesión hereditaria de מוֹרָשָׁה sin convertirlo en un término eclesiástico o abstracto.
