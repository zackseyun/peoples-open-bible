base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/022/011.yaml
  text: Then the king sent to summon Ahimelech son of Ahitub the priest[a], and all his father's house, the priests who were at Nob; and they all came to the king.
  footnotes:
