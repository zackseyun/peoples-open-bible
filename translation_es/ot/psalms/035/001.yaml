translation:
  language: es
  text: De David[a]. Yahvé, contiende[b] con los que contienden conmigo; combate contra los que combaten contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por David». El hebreo לְ con nombre propio en un encabezado de salmo puede indicar autoría, atribución o asociación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «defiende mi causa, Yahvé, contra mis adversarios». El verbo hebreo puede tener un matiz jurídico además del de contienda general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  lexicon: HALOT
  rationale: El prefijo לְ con nombre propio en un encabezado de salmo puede indicar atribución o asociación. «De David» reproduce bien esa relación sin especificar más de lo que el hebreo afirma.
- source_word: רִיבָה
  english_pob_choice: Contend
  chosen_spanish: contiende
  alternatives_spanish:
  - pleitea
  - defiende mi causa
  - litiga
  lexicon: HALOT
  rationale: El imperativo de ריב puede abarcar disputa legal o enfrentamiento. «Contiende» conserva esa amplitud y mantiene el paralelismo con el verbo siguiente sin añadir «mi causa», que no está explícito en el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: La política del proyecto para el Tetragrámaton es verterlo como «Yahvé». Se evita la sustitución por un título, preservando el nombre divino del hebreo.
- source_word: אֶת יְרִיבַי
  english_pob_choice: with those who contend with me
  chosen_spanish: con los que contienden conmigo
  alternatives_spanish:
  - con mis adversarios
  - con quienes me disputan
  lexicon: HALOT
  rationale: El participio con sufijo expresa a los que están en contienda contra el salmista. La cláusula relativa en español conserva el valor verbal y la correspondencia con רִיבָה.
- source_word: לְחַם
  english_pob_choice: fight against
  chosen_spanish: combate contra
  alternatives_spanish:
  - pelea contra
  - batalla contra
  lexicon: HALOT
  rationale: El imperativo de לחם tiene sentido de combatir o guerrear. «Combate contra» es natural en español y preserva la fuerza militar del verbo.
- source_word: אֶת לֹחֲמָי
  english_pob_choice: those who fight against me
  chosen_spanish: los que combaten contra mí
  alternatives_spanish:
  - mis combatientes
  - los que guerrean contra mí
  lexicon: HALOT
  rationale: El participio activo con sufijo indica a quienes pelean contra el hablante. Se traduce con una cláusula relativa para mantener el paralelismo y la repetición verbal.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue el valor del Tetragrámaton como nombre propio del Dios del pacto, no como un título sustituto. En español, «Yahvé» es la forma establecida por defecto del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El cotejo inglés muestra alta concordancia y no registra revisiones aplicadas; por ello, el borrador español sigue de cerca la solución auditada, manteniendo el paralelismo verbal y la opción doctrinal para el nombre divino.
  spanish_consistency_notes:
  - Se conservó la repetición de la raíz verbal con «contienden/contiende» y «combaten/combate» para reflejar el hebreo.
  - «Yahvé» se usó de forma consistente con el estándar del proyecto para יהוה.
  - Se evitó introducir «mi causa» en el cuerpo principal porque no está explícito en el hebreo, aunque se preserva como alternativa en nota.
