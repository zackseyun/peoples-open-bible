- from: Sus palabras parecieron buenas[a] a Hamor y a Shequem, hijo de Hamor.
  to: Sus palabras les parecieron bien[a] a Hamor y a Shequem, hijo de Hamor.
  rationale: Se ajusta únicamente la expresión verbal para que el español suene natural y siga fielmente el hebreo evaluativo «fueron buenas en los ojos de». Se conserva «Shequem» por consistencia con el borrador y su racional documentado, ya que el expediente no demuestra que deba normalizarse aquí a «Siquem».
