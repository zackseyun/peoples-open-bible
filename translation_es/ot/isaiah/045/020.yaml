    text: 'O: «oran a un dios que no salva».'
    reason: alternative_reading
  revision_rationale: Se corrigió un error material de anclaje de nota, se adaptaron los imperativos al español neutral latinoamericano, y se mejoró la naturalidad de la cláusula de ignorancia culpable con «No saben nada», que sigue siendo fiel a לֹא יָדְעוּ como caracterización general. Se conservó la secuencia exhortativa, el vocativo, la literalidad polémica de «la madera de su imagen tallada» en nota, y la ironía teológica de «un dios que no puede salvar».
