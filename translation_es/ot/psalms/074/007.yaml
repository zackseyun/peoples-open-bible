translation:
  language: es
  text: Prendieron fuego a tu santuario[a]; profanaron por tierra la morada de tu nombre[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «enviaron fuego a tu santuario». El modismo hebreo significa que lo incendiaron.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la morada de tu nombre», un modismo para el lugar que Dios escogió para que allí se conociera su presencia.'
    reason: cultural_note
  - marker: c
    text: 'O: «profanaron hasta el suelo la morada de tu nombre».'
    reason: previous_rendering
lexical_decisions:
- source_word: שִׁלְחוּ
  english_pob_choice: they set
  chosen_spanish: encendieron
  alternatives_spanish:
  - pusieron fuego a
  - prendieron fuego a
  - echaron fuego a
  lexicon: HALOT
  rationale: El verbo hebreo, unido a בָאֵשׁ, expresa el acto de quemar/causar fuego. En español, «encendieron» comunica de manera natural la acción destructiva sin perder el valor idiomático del hebreo.
- source_word: בָאֵשׁ
  english_pob_choice: on fire
  chosen_spanish: fuego
  alternatives_spanish:
  - con fuego
  - en fuego
  lexicon: HALOT
  rationale: La preposición con ‘fuego’ funciona adverbialmente con el verbo anterior. En español, la construcción natural es «encendieron fuego» o «pusieron fuego a»; se evita una traducción rígida que suene extraña.
- source_word: מִקְדָּשֶׁךָ
  english_pob_choice: your sanctuary
  chosen_spanish: tu santuario
  alternatives_spanish:
  - tu lugar santo
  - tu templo
  lexicon: HALOT
  rationale: «Santuario» conserva el sentido de lugar santo y mantiene la amplitud semántica de מִקְדָּשׁ sin restringirlo prematuramente a «templo».
- source_word: לָאָרֶץ
  english_pob_choice: to the ground
  chosen_spanish: hasta la tierra
  alternatives_spanish:
  - hasta el suelo
  - a la tierra
  lexicon: HALOT
  rationale: La expresión indica humillación o profanación total. «Hasta la tierra» conserva la idea de abatimiento y funciona como equivalente natural en español, sin convertirla en paráfrasis libre.
- source_word: חִלְּלוּ
  english_pob_choice: they profaned
  chosen_spanish: profanaron
  alternatives_spanish:
  - contaminaron
  - deshonraron
  - desecraron
  lexicon: HALOT
  rationale: El piel de חלל aquí tiene el sentido cultual de profanar lo santo. «Profanaron» mantiene con claridad el contraste entre santidad y violación sacrílega.
- source_word: מִשְׁכַּן
  english_pob_choice: the dwelling place
  chosen_spanish: el lugar donde habita
  alternatives_spanish:
  - la morada
  - el tabernáculo
  lexicon: HALOT
  rationale: La imagen literal es la de una morada. En español, «el lugar donde habita» preserva la metáfora del habitar y evita imponer un tecnicismo que no siempre comunica bien en este contexto de destrucción cultual.
- source_word: שְׁמֶךָ
  english_pob_choice: of your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - de tu nombre
  - donde se invoca tu nombre
  lexicon: HALOT
  rationale: El hebreo habla del «lugar donde habita tu nombre», un modo bíblico de expresar la presencia divina. En español se conserva la relación posesiva y el idioma teológico sin resolver la tensión entre nombre y presencia.
theological_decisions:
- issue: 'La doble referencia cultual: מִקְדָּשׁ y מִשְׁכַּן'
  english_pob_reading: 'Different English terms: ''sanctuary'' and ''dwelling place'''
  chosen_spanish_reading: 'Dos expresiones distintas: «santuario» y «lugar donde habita»'
  alternative_spanish_readings:
  - «templo» y «santuario»
  - «lugar santo» y «morada»
  rationale: El hebreo usa dos términos relacionados pero no idénticos. Mantener dos expresiones distintas preserva el paralelismo poético y la diferencia entre el espacio santo y el lugar de la presencia manifestada.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: El idiom a teológico del «nombre»
  english_pob_reading: '''the dwelling place of your name'''
  chosen_spanish_reading: «el lugar donde habita tu nombre»
  alternative_spanish_readings:
  - «la morada de tu nombre»
  - «el lugar de tu nombre»
  rationale: 'No se reduce el texto a un simple edificio: el ‘nombre’ expresa la presencia reconocida de Dios. La traducción conserva esa tensión bíblica en vez de explicitarla en exceso.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el recorrido de revisión del inglés POB: la formulación final estabiliza לָאָרֶץ como «to the ground». En español se optó por un equivalente natural («hasta la tierra») que conserva el valor de abatimiento/profanación total. También se preservó la distinción cultual entre מִקְדָּשׁ y מִשְׁכַּן, así como la tensión teológica del «nombre» como presencia divina.'
  spanish_consistency_notes:
  - Se usa «santuario» para מִקְדָּשׁ y una expresión distinta para מִשְׁכַּן, evitando igualarlos.
  - «Profanaron» conserva el registro cultual y no se sustituye por verbos más débiles como «ensuciaron».
  - «Tu nombre» se mantiene como idiomático-teológico; no se amplía a una explicación interpretativa dentro del texto principal.
  - El orden de la frase busca ser natural en español sin perder el paralelismo del hebreo.
