translation:
  language: es
  text: 'Entonces bajaron tres mil hombres de Judá a la hendidura de la peña de Etam[a] y dijeron a Sansón: “¿No sabes que los filisteos dominan sobre nosotros? ¿Qué es esto que nos has hecho?”. Y él les dijo: “Como ellos me hicieron a mí, así les he hecho”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “la fisura de la peña de Etam”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ
  english_pob_choice: went down
  chosen_spanish: bajaron
  alternatives_spanish:
  - descendieron
  - fueron hacia abajo
  lexicon: HALOT
  rationale: El verbo ירד expresa movimiento hacia abajo; en español, “bajaron” es natural y conserva la dirección narrativa sin rigidez.
- source_word: שְׁלֹשֶׁת אֲלָפִים אִישׁ
  english_pob_choice: three thousand men
  chosen_spanish: tres mil hombres
  alternatives_spanish:
  - tres mil varones
  - tres mil hombres del pueblo
  lexicon: HALOT
  rationale: La construcción numérica designa un grupo masculino contado; “hombres” es claro, idiomático y fiel al referente.
- source_word: מִיהוּדָה
  english_pob_choice: of Judah
  chosen_spanish: de Judá
  alternatives_spanish:
  - desde Judá
  - procedentes de Judá
  lexicon: HALOT
  rationale: Aquí identifica su pertenencia tribal, no solo su origen espacial; “de Judá” lo comunica de manera directa.
- source_word: אֶל סְעִיף סֶלַע עֵיטָם
  english_pob_choice: to the cleft of the rock of Etam
  chosen_spanish: a la hendidura de la peña de Etam
  alternatives_spanish:
  - a la grieta de la roca de Etam
  - a la hendidura de la roca de Etam
  lexicon: HALOT
  rationale: סְעִיף describe una abertura o fisura en la roca; “hendidura” transmite bien esa idea. Para סֶלַע, “peña” mantiene el valor topográfico rocoso con español bíblico sobrio pero claro.
- source_word: הֲלֹא יָדַעְתָּ
  english_pob_choice: Do you not know
  chosen_spanish: ¿No sabías?
  alternatives_spanish:
  - ¿No sabes?
  - ¿No te das cuenta?
  lexicon: HALOT
  rationale: El hebreo es una pregunta retórica que apela a una realidad obvia. En español, el pretérito imperfecto/pasado “¿No sabías?” suena natural en este intercambio y mantiene la recriminación.
- source_word: כִּי מֹשְׁלִים בָּנוּ פְּלִשְׁתִּים
  english_pob_choice: that the Philistines are ruling over us
  chosen_spanish: que los filisteos dominan sobre nosotros
  alternatives_spanish:
  - que los filisteos gobiernan sobre nosotros
  - que los filisteos nos gobiernan
  lexicon: HALOT
  rationale: מֹשְׁלִים expresa dominio en curso. “Dominan sobre nosotros” conserva la fuerza opresiva del verbo sin perder naturalidad en español.
- source_word: וּמַה זֹּאת עָשִׂיתָ לָּנוּ
  english_pob_choice: What then is this that you have done to us?
  chosen_spanish: ¿Qué es esto que nos has hecho?
  alternatives_spanish:
  - ¿Y qué es esto que nos has hecho?
  - ¿Qué has hecho con nosotros?
  lexicon: HALOT
  rationale: La pregunta hebrea combina reproche y señalamiento del daño causado. “¿Qué es esto que nos has hecho?” preserva el contenido sin volverlo más explicativo de lo que el texto exige.
- source_word: כַּאֲשֶׁר עָשׂוּ לִי כֵּן עָשִׂיתִי לָהֶם
  english_pob_choice: As they did to me, so I have done to them
  chosen_spanish: Como ellos me hicieron a mí, así les he hecho yo a ellos
  alternatives_spanish:
  - Tal como ellos me hicieron, así les hice yo
  - Así como me hicieron, así les he hecho
  lexicon: HALOT
  rationale: Se preserva la correlación hebrea y el paralelismo de reciprocidad. El español con “me hicieron”/“les he hecho” refleja bien la relación causa-respuesta y mantiene el tono resumido del dicho.
theological_decisions:
- issue: Reciprocidad vengativa de Sansón sin evaluación explícita
  english_pob_reading: Rendered as a straightforward statement of retaliation without moral commentary.
  chosen_spanish_reading: Se traduce como una afirmación directa de reciprocidad retaliatoria, sin añadir juicio moral ni justificación interpretativa.
  alternative_spanish_readings:
  - Como justificación de una venganza legítima
  - Como denuncia negativa de una venganza personal
  rationale: El versículo informa la explicación de Sansón, pero no la evalúa. La versión española conserva esa tensión y evita resolverla doctrinalmente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del POB en inglés: no se aplicaron cambios, y la solución española mantiene el mismo nivel de equivalencia óptima y la misma cautela teológica.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma del proyecto solo cuando corresponde; en este versículo no aparece el Tetragrámaton.
  - “Filisteos” se deja en minúscula por tratarse de etnónimo en español.
  - “Sansón” conserva la forma usual del nombre propio.
  - La nota [a] acompaña una alternativa léxica real para סְעִיף/סֶעִיף sin forzar el sentido del texto principal.
