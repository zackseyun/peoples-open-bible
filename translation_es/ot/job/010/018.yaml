review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y la auditoría inglesa: la pregunta causal, la imagen concreta del nacimiento, y el sentido contrafactual de los imperfectos están bien captados. Sin embargo, la nota al pie está mal anclada y formula como alternativa exactamente la misma redacción ya usada en el texto, en vez de preservar la alternativa más formal documentada por el inglés.'
  spanish_quality_summary: 'El español es natural, claro y digno. «¿Por qué, pues, me sacaste del vientre? Yo habría muerto, y ningún ojo me habría visto» suena bien en español bíblico contemporáneo. El único problema real es editorial/paratextual: la nota no aporta una variante útil y debería corresponder a la alternativa aspectual menos explícitamente contrafactual.'
  glossary_alignment: No hay términos del glosario mayor en juego salvo el registro bíblico general. «Vientre», «me sacaste», «habría muerto» y «ningún ojo» concuerdan con la filosofía del proyecto y con las decisiones léxicas auditadas.
  issues:
  - severity: medium
    issue: La nota al pie no preserva la alternativa documentada en la auditoría inglesa.
    rationale: El inglés conserva como alternativa formal «I would have died, and no eye would see me». El borrador español pone como nota «Yo habría muerto, y ningún ojo me habría visto», que repite esencialmente el texto principal y no representa la alternativa de imperfectos más formal.
  - severity: low
    issue: El anclaje [a] en «¿Por qué[a]» puede mantenerse, pero la nota trata de los imperfectos de la segunda oración.
    rationale: No es un error de traducción del texto principal, pero conviene que la nota describa correctamente la alternativa verbal de la cláusula posterior si va a permanecer con ese marcador por limitaciones editoriales del registro.
  revised_spanish_text: ¿Por qué[a], pues, me sacaste del vientre? Yo habría muerto, y ningún ojo me habría visto.
  revised_footnotes:
  - marker: a
    text: 'O: «Yo habría muerto, y ningún ojo me vería». Los imperfectos hebreos pueden traducirse de manera más formal, pero el contexto favorece un sentido contrafactual.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Solo se corrige la nota para que refleje la alternativa formal realmente documentada por la auditoría inglesa, en vez de duplicar la redacción principal.
