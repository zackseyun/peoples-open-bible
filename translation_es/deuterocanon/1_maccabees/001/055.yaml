translation:
  language: es
  text: Y en las entradas de las casas y en las calles quemaban incienso[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrecían incienso». El verbo griego puede designar el acto de quemar incienso como ofrenda cultual.
    reason: lexical_alternative
  - marker: b
    text: «Calles» también puede entenderse como «calles anchas» o «plazas públicas».
    reason: lexical_alternative
lexical_decisions:
- source_word: θυρίδων
  english_pob_choice: doorways
  chosen_spanish: marcos de las puertas
  alternatives_spanish:
  - entradas
  - umbrales
  - puertas
  lexicon: LSJ
  rationale: θυρίς puede referirse a una puerta, abertura o acceso. En español, «marcos de las puertas» comunica bien la ubicación física sin reducir indebidamente el sentido a una sola pieza arquitectónica; además, mantiene el plural y la idea de lugares visibles de paso.
- source_word: οἰκιῶν
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  - viviendas
  lexicon: LSJ
  rationale: οἰκία se refiere aquí a construcciones domésticas concretas. «Casas» es el equivalente más directo y natural en español para este contexto narrativo.
- source_word: πλατείαις
  english_pob_choice: streets
  chosen_spanish: calles
  alternatives_spanish:
  - plazas públicas
  - avenidas anchas
  - espacios públicos
  lexicon: LSJ
  rationale: πλατεῖαι puede abarcar calles anchas o espacios abiertos urbanos. «Calles» es el equivalente más claro y publicable en español, y el pie de nota preserva la amplitud posible del término griego.
- source_word: ἐθυμίων
  english_pob_choice: they burned incense
  chosen_spanish: quemaban incienso
  alternatives_spanish:
  - ofrecían incienso
  - incensaban
  lexicon: LSJ
  rationale: θυμιάω puede significar quemar incienso como acto cultual u ofrecer incienso. «Quemaban incienso» conserva el valor literal y la carga ritual sin forzar una formulación más técnica o eclesiástica.
- source_word: ἐπὶ ... καὶ ἐν
  english_pob_choice: on ... and in
  chosen_spanish: sobre ... y en
  alternatives_spanish:
  - en ... y en
  - sobre ... y dentro de
  lexicon: LSJ
  rationale: La preposición ἐπί con los marcos de las puertas sugiere contacto o colocación 'sobre', mientras ἐν con las calles señala ubicación 'en'. Mantener la diferencia ayuda a reflejar la sintaxis griega.
translation_notes:
  revision_awareness: El texto griego es breve y no presenta variantes textuales relevantes en el paquete recibido; la redacción española sigue de cerca la sintaxis del original y conserva la ambigüedad lexical documentada por el POB en inglés.
  spanish_consistency_notes:
  - Se mantiene «incienso» para θυμιάω según la decisión léxica auditada del POB en inglés.
  - Se preserva la distinción locativa de ἐπί y ἐν para no suavizar la estructura del griego.
  - Se usa un español neutro y publicable, evitando tanto calcos rígidos como paráfrasis interpretativas.
