review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general y el tono de amenaza preventiva del hebreo, pero no sigue plenamente la decisión auditada del POB sobre el pronombre colectivo: el source y el POB inglés reconocen el singular morfológico לוֹ / הוּא, pero traducen por sentido colectivo. En español, mantener «él» repetidamente suena más engañoso que esclarecedor y no preserva bien el referente colectivo Israel. También conviene reflejar mejor la nota inglesa sobre «act wisely/deal shrewdly» y la alternativa literal «subir fuera de la tierra».'
  spanish_quality_summary: El español es claro y digno, pero «con él» y «él también» hacen pensar en un individuo, no en Israel como pueblo. «Si llega a haber guerra» es inteligible, aunque «si estalla la guerra» es más natural y cercano a «if war breaks out». «Saldrá de la tierra» es comprensible, pero «subirá fuera de la tierra» debe preservarse en nota como alternativa literal; además «de la tierra» puede sonar menos idiomático que «del país» o «de la tierra» según se quiera retener la ambigüedad. Aquí puede mantenerse «de la tierra» en el texto si la nota explica la literalidad.
  glossary_alignment: 'No hay términos de glosario mayor en disputa. El punto principal es alinear la traducción española con la práctica del POB para referentes colectivos: aunque el hebreo sea singular, en español conviene traducir «con ellos / ellos también» para representar a Israel como pueblo, dejando el singular en nota. También falta en las notas la alternativa léxica de נתחכמה como «actuemos sabiamente / con sabiduría», documentada en el audit trail.'
  issues:
  - severity: high
    issue: Uso de «él» para el referente colectivo Israel en el texto principal
    rationale: Aunque el hebreo usa singular morfológico, el POB inglés lo vierte por sentido colectivo. En español, «con él... él también...» suena a individuo concreto y distorsiona el referente más de lo que ayuda.
  - severity: medium
    issue: Falta la alternativa léxica de נתחכמה en nota
    rationale: El audit trail inglés preserva explícitamente la posibilidad de «wisely». El borrador solo explica «unirse» en la nota b y omite la alternativa semántica importante para «actuemos con astucia».
  - severity: medium
    issue: La nota c no conserva de forma suficientemente directa la alternativa literal
    rationale: La nota debe indicar con claridad la opción «y subirá fuera de la tierra» / «y saldrá del país», no solo explicar que se naturalizó el español.
  - severity: low
    issue: «Si llega a haber guerra» es menos idiomático que la opción más natural
    rationale: No es incorrecto, pero «si estalla la guerra» comunica mejor la contingencia y el inicio del conflicto en español moderno.
  revised_spanish_text: Vamos[a], actuemos con astucia con ellos, para que no se multipliquen; y si estalla la guerra, ellos también podrían unirse a nuestros enemigos y pelear contra nosotros y subir fuera de la tierra[c].
  revised_footnotes:
