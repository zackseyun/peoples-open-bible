translation:
  language: es
  text: Recuerden[a] sus maravillas que hizo[b], sus señales[c] y los juicios de su boca[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Traigan a la memoria» o «recallen».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus obras maravillosas» o «que ha hecho».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «sus portentos» o «sus milagros».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «los juicios que pronunció» o «las ordenanzas de su boca».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִכְרוּ
  english_pob_choice: Remember
  chosen_spanish: Recuerden
  alternatives_spanish:
  - Acuérdense
  - Traigan a la memoria
  lexicon: HALOT
  rationale: Imperativo plural de זכר. 'Recuerden' conserva el mandato directo y suena natural en español bíblico contemporáneo.
- source_word: נִפְלְאוֹתָיו
  english_pob_choice: the wonders
  chosen_spanish: sus maravillas
  alternatives_spanish:
  - sus prodigios
  - sus obras maravillosas
  lexicon: HALOT
  rationale: נִפְלָאוֹת refiere a actos extraordinarios que inspiran asombro. 'Maravillas' preserva bien esa fuerza y evita reducir el término a un tecnicismo.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he has done
  chosen_spanish: que hizo
  alternatives_spanish:
  - que ha hecho
  - que realizó
  lexicon: HALOT
  rationale: El relativo modifica 'maravillas'. En español, el pretérito simple comunica de forma natural hechos pasados ya consumados, sin perder la referencia vigente para el recuerdo litúrgico.
- source_word: מֹפְתָיו
  english_pob_choice: his signs
  chosen_spanish: las señales
  alternatives_spanish:
  - sus prodigios
  - sus milagros
  lexicon: HALOT
  rationale: מופת puede ser 'señal', 'portento' o 'milagro'. 'Señales' mantiene la amplitud semántica y la relación con la acción divina sin sobrecargar el término con una interpretación más estrecha.
- source_word: וּמִשְׁפְּטֵי פִיו
  english_pob_choice: and the judgments of his mouth
  chosen_spanish: y los juicios de su boca
  alternatives_spanish:
  - y los decretos de su boca
  - y las decisiones que pronunció
  lexicon: HALOT
  rationale: La construcción hebrea conserva la imagen de una palabra divina que juzga. 'Juicios de su boca' retiene el paralelismo y la tensión literal; 'decretos' o 'decisiones' interpretan más abiertamente el sentido.
- source_word: פִיו
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - lo que habló
  - su palabra
  lexicon: HALOT
  rationale: La metáfora antropomórfica de la 'boca' está presente en el hebreo y merece conservarse en español por su fuerza poética y su vínculo con la expresión anterior.
theological_decisions:
- issue: Distinción entre נִפְלְאוֹת y מֹפְתִים
  english_pob_reading: Different but overlapping categories rendered as 'wonders' and 'signs'
  chosen_spanish_reading: 'Categorías distintas pero superpuestas: ''maravillas'' y ''señales'''
  alternative_spanish_readings:
  - '''obras portentosas'' y ''milagros'''
  - '''maravillas'' y ''prodigios'''
  rationale: El verso acumula términos para los actos poderosos de Dios sin exigir una separación técnica rígida. Mantener dos palabras distintas en español preserva el paralelismo poético y la amplitud del texto.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Sentido de מִשְׁפְּטֵי פִיו
  english_pob_reading: Spoken judicial decisions rendered literally as 'the judgments of his mouth'
  chosen_spanish_reading: Decisiones o juicios divinos expresados con la imagen literal de la boca
  alternative_spanish_readings:
  - '''los decretos de su boca'''
  - '''los juicios que pronunció'''
  rationale: La frase puede referirse a decretos, sentencias o decisiones pronunciadas por Dios. El español principal conserva la imagen hebrea y deja abierta la precisión semántica, evitando resolver una tensión que el texto no resuelve explícitamente.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y no registra revisiones aplicadas; la redacción española sigue el texto hebreo y conserva el paralelismo con decisiones léxicas transparentes.
  spanish_consistency_notes:
  - Se mantiene el mandato plural con forma verbal imperativa dirigida a la comunidad.
  - '''Maravillas'' y ''señales'' reproducen la doble acumulación del hebreo sin fusionar los términos.'
  - '''Boca'' se conserva por su valor antropomórfico y poético, en lugar de suavizarlo a ''palabra''.'
  - Las notas alternativas se limitan a opciones léxicas realmente atestiguadas por el análisis fuente.
