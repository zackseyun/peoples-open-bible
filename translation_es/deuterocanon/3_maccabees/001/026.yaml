translation:
  language: es
  text: Pero, habiéndose envalentonado y habiendo ya despedido a todos, ya se acercaba, pensando llevar a término el asunto antes mencionado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θρασυνθεὶς
  english_pob_choice: having become emboldened
  chosen_spanish: habiéndose vuelto audaz
  alternatives_spanish:
  - habiendo cobrado ánimo
  - habiéndose envalentonado
  - habiendo ganado audacia
  lexicon: LSJ
  rationale: El participio aoristo pasivo expresa el cambio de estado hacia una osadía o audacia. «Habiéndose vuelto audaz» conserva ese cambio y mantiene el matiz ligeramente negativo sin forzar «insolente».
- source_word: παραπέμψας
  english_pob_choice: having sent everyone away
  chosen_spanish: habiendo ya despedido a todos
  alternatives_spanish:
  - habiendo enviado a todos lejos
  - habiendo mandado a todos retirarse
  - habiendo despedido a todos
  lexicon: LSJ
  rationale: Con πάντας como objeto, el sentido es de despedir o hacer salir a todos los acompañantes. «Despedido» es natural en español y conserva la idea de separación previa.
- source_word: πρόσβασιν
  english_pob_choice: his approach
  chosen_spanish: avanzaba
  alternatives_spanish:
  - se acercaba
  - hacía su aproximación
  - proseguía su avance
  lexicon: LSJ
  rationale: El sustantivo puede significar ‘acceso’ o ‘aproximación’. En este contexto describe el movimiento hacia adelante; por eso se vierte con un verbo dinámico en español, evitando un sustantivo torpe.
- source_word: ἐποιεῖτο
  english_pob_choice: was already making
  chosen_spanish: ya avanzaba
  alternatives_spanish:
  - ya iba acercándose
  - ya estaba haciendo su avance
  - ya iba en su aproximación
  lexicon: LSJ
  rationale: El imperfecto medio indica acción en progreso. «Ya avanzaba» comunica continuidad de manera fluida y refleja la progresión narrativa.
- source_word: τέλος ἐπιθήσειν
  english_pob_choice: to bring ... to completion
  chosen_spanish: llevar a término
  alternatives_spanish:
  - llevar a cabo hasta el fin
  - consumar
  - cumplir hasta el final
  lexicon: LSJ
  rationale: La expresión idiomática apunta a completar lo planeado, no a detenerlo. «Llevar a término» es preciso, formal y natural en español bíblico.
- source_word: τῷ προειρημένῳ
  english_pob_choice: the aforementioned matter
  chosen_spanish: el asunto antes mencionado
  alternatives_spanish:
  - lo ya dicho
  - el asunto previamente mencionado
  - lo mencionado arriba
  lexicon: LSJ
  rationale: El participio perfecto sustantivado remite a algo ya mencionado, sin precisar más. «El asunto antes mencionado» preserva esa referencia anafórica sin añadir contenido ajeno al griego.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete 1909 y el audit trail inglés, pero ajusta la sintaxis para que el encadenamiento participial resulte natural en español. Se mantuvo la progresión narrativa con dos participios iniciales, un imperfecto de acción en curso y la cláusula final de finalidad/completamiento.
  spanish_consistency_notes:
  - Se evitó «Cristo», «SEÑOR» o vocabulario litúrgico no presente en el versículo.
  - «Audaz» se eligió para θρασυνθείς por ser más exacto que «valiente» y menos fuerte que «insolente».
  - «Llevar a término» conserva el sentido de culminación de τέλος ἐπιθήσειν sin convertirlo en una expresión de cancelación.
