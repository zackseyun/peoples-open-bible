translation:
  language: es
  text: 'Y al cumplirse el tiempo, Ana concibió y dio a luz un hijo[a], y le puso por nombre Samuel[b], porque dijo: «Se lo pedí a Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «al giro/ciclo de los días», un modismo que significa cuando había llegado el tiempo apropiado.'
    reason: lexical_alternative
  - marker: b
    text: 'El nombre «Samuel» se explica aquí por un juego de palabras con el verbo hebreo «pedir» (שאל): «Se lo pedí a Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִתְקֻפוֹת הַיָּמִים
  english_pob_choice: in due time
  chosen_spanish: al cumplirse el tiempo
  alternatives_spanish:
  - en su debido tiempo
  - cuando llegó el tiempo
  - tras pasar un tiempo
  lexicon: HALOT
  rationale: El hebreo expresa una idiomática del giro/ciclo de los días, es decir, la llegada del momento apropiado. «Al cumplirse el tiempo» conserva ese sentido temporal natural en español sin perder la idea de tiempo debido.
- source_word: וַתַּהַר
  english_pob_choice: conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó embarazada
  lexicon: HALOT
  rationale: En narrativas de nacimiento, הרה se traduce con precisión y naturalidad por «concibió». Mantiene el registro bíblico sin sonar forzado.
- source_word: וַתֵּלֶד בֵּן
  english_pob_choice: bore a son
  chosen_spanish: dio a luz un hijo
  alternatives_spanish:
  - parió un hijo
  lexicon: HALOT
  rationale: «Dar a luz» comunica con claridad el nacimiento y funciona bien en español contemporáneo. «Hijo» preserva el objeto directo del hebreo בן.
- source_word: וַתִּקְרָא אֶת־שְׁמוֹ
  english_pob_choice: she called his name
  chosen_spanish: le puso por nombre
  alternatives_spanish:
  - lo llamó
  lexicon: HALOT
  rationale: La fórmula hebrea de nombrar se refleja de manera natural en español con «le puso por nombre», sin perder la estructura del acto de nombrar.
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  alternatives_spanish:
  - —
  lexicon: Convención onomástica estándar
  rationale: Los nombres propios se transliteran conforme a la convención española establecida.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: DOCTRINE.md contested terms
  rationale: Se mantiene el nombre divino en su forma de proyecto, «Yahvé», en lugar de sustituirlo por un título como «Señor», para conservar la referencia explícita del Tetragrámaton.
- source_word: שְׁאִלְתִּיו
  english_pob_choice: I asked for him
  chosen_spanish: Lo pedí
  alternatives_spanish:
  - Lo solicité
  - Pedí por él
  lexicon: HALOT
  rationale: El verbo שאל tiene el valor básico de «pedir/solicitar/ask». En español, «lo pedí» mantiene la brevedad del hebreo y deja visible el juego de palabras con el nombre Samuel.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente; por la norma del proyecto, se conserva como «Yahvé» para no ocultar el nombre del pacto ni sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Etymological wordplay with the name Samuel
  english_pob_reading: Preserve the explanatory wordplay in a footnote rather than force a misleadingly literal etymology into the main text.
  chosen_spanish_reading: Mantener el nombre «Samuel» y explicar en nota el vínculo con «pedí»
  alternative_spanish_readings:
  - Incorporar la etimología en el cuerpo del texto
  - Traducir el nombre como glosa interpretativa
  rationale: El hebreo presenta una explicación del nombre mediante el verbo שאל. Como la etimología exacta del nombre es discutida, conviene conservar la forma del nombre en el texto principal y documentar el juego de palabras en una nota.
  doctrine_reference: Translation philosophy §3, §5
- issue: Temporal idiom לִתְקֻפוֹת הַיָּמִים
  english_pob_reading: in due time
  chosen_spanish_reading: al cumplirse el tiempo
  alternative_spanish_readings:
  - en su debido tiempo
  - cuando llegó el tiempo
  rationale: Se trata de un modismo de tiempo oportuno; la traducción evita el literalismo y comunica el sentido idiomático que el inglés POB ya había identificado.
  doctrine_reference: HALOT; Translation philosophy §4
translation_notes:
  revision_awareness: 'Se siguió el control de revisión más reciente: no hubo cambios aplicados en la pasada revisión, y el veredicto de alta concordancia confirmó que la lectura inglesa auditada es sólida. La versión española conserva ese sentido sin introducir ampliaciones interpretativas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al criterio del proyecto.
  - Se conserva el nombre propio «Samuel» sin glosa intratextual, trasladando la explicación etimológica a nota.
  - «Al cumplirse el tiempo» refleja el modismo hebreo sin calco duro.
  - «Lo pedí» preserva la fuerza breve del verbo שאל y deja visible el juego de palabras.
  - El tono es bíblico y contemporáneo, evitando arcaísmos innecesarios.
