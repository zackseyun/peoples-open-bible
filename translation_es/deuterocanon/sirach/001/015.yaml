  glossary_alignment: 'Buen ajuste al glosario del proyecto: κύριος se vierte como ''Yahvé'' siguiendo la política dada para el nombre divino en el texto principal; σοφία como ''sabiduría''; la personificación femenina se conserva en nota. No hay conflictos terminológicos mayores.'
