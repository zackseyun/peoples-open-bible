translation:
  language: es
  text: Y David hizo así[a], tal como Yahvé le había mandado[b], y derrotó a los filisteos desde Geba hasta Gezer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «desde Geba». Algunas traducciones difieren aquí por consideraciones textuales o por la relación con el pasaje paralelo.'
    reason: textual_variant
  - marker: b
    text: 'Literalmente: «hasta tu venir a Gezer», es decir, hasta la aproximación o el entorno de Gezer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ / כֵּן
  english_pob_choice: did so
  chosen_spanish: hizo así
  alternatives_spanish:
  - lo hizo así
  - hizo de este modo
  - así lo hizo
  lexicon: HALOT
  rationale: El hebreo combina el verbo hacer con כֵּן para expresar cumplimiento exacto de una indicación previa. «Hizo así» conserva la concisión narrativa y la idea de conformidad sin añadir objeto explícito.
- source_word: כַּאֲשֶׁר צִוָּהוּ
  english_pob_choice: just as ... had commanded him
  chosen_spanish: tal como Yahvé le había mandado
  alternatives_spanish:
  - como Yahvé le había mandado
  - según Yahvé le había mandado
  - tal como le había mandado Yahvé
  lexicon: HALOT
  rationale: «Tal como» refleja bien la correspondencia marcada por כַּאֲשֶׁר. «Había mandado» comunica la relación temporal de la instrucción previa; «mandado» mantiene el registro bíblico sin forzar un término más técnico que el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de transliterar el nombre divino en español como «Yahvé», evitando la sustitución reverencial por «SEÑOR».
- source_word: וַיַּךְ
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - derrotó
  - hizo caer
  lexicon: HALOT
  rationale: En contexto militar, נכה puede expresar un golpe decisivo o derrota. «Hirió» conserva la fuerza del verbo hebreo y suena natural en español bíblico contemporáneo, sin perder el matiz de acción bélica.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Designación étnica estándar en español; no requiere adaptación especial.
- source_word: מִגֶּבַע
  english_pob_choice: from Geba
  chosen_spanish: desde Geba
  alternatives_spanish:
  - de Geba
  - a partir de Geba
  lexicon: HALOT
  rationale: La preposición מִ con מקום marca el punto de partida del recorrido. «Desde Geba» reproduce de manera natural el rango geográfico y conserva la lectura del texto masorético de גֶּבַע.
- source_word: עַד בֹּאֲךָ גָזֶר
  english_pob_choice: as far as Gezer
  chosen_spanish: hasta Gezer
  alternatives_spanish:
  - hasta llegar a Gezer
  - hasta la llegada a Gezer
  - hasta las cercanías de Gezer
  lexicon: HALOT
  rationale: El hebreo literal dice «hasta tu venir a Gezer», una expresión idiomática de alcance geográfico. «Hasta Gezer» comunica la extensión del golpe con naturalidad, sin perder el valor de límite del recorrido.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La norma del proyecto para יְהוָה exige preservar el nombre divino como transliteración, no como título. En español, «Yahvé» es la forma establecida en este registro y mantiene la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del perfecto narrativo en la frase de obediencia
  english_pob_reading: just as Yahweh had commanded him
  chosen_spanish_reading: tal como Yahvé le había mandado
  alternative_spanish_readings:
  - como Yahvé le mandó
  - según Yahvé le había mandado
  rationale: El pluscuamperfecto en español expresa que la orden divina precede a la acción de David, preservando la relación de anterioridad implícita en el inglés auditado y en el hebreo narrativo.
  doctrine_reference: Gramática española de aspecto verbal; fidelidad narrativa al hebreo
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto masorético y el audit trail inglés, sin cambios respecto de la última revisión: se conserva «Geba» según el hebreo y se mantiene la idea idiomática de alcance geográfico en «hasta Gezer».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrámaton, conforme al estándar del proyecto.
  - Se mantiene «los filisteos» como designación étnica estable y natural en español.
  - «Hirió» se conserva por su fuerza militar y por su cercanía al valor de נכה en este contexto.
  - La nota textual sobre «desde Geba» se ancla en el texto principal para reflejar la variante/documentación del audit trail.
