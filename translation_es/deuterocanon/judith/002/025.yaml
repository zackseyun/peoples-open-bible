    issue: Primera ocurrencia de τὰ ὅρια traducida como «las fronteras»
    rationale: Según el expediente inglés, en «τὰ ὅρια τῆς Κιλικίας» el término funciona metonímicamente para el territorio de Cilicia, no primariamente sus líneas fronterizas. En español, «tomó posesión de las fronteras de Cilicia» suena menos natural y puede sugerir solo una franja limítrofe.
  revised_spanish_text: Y tomó posesión del territorio de Cilicia, y abatió a todos los que le resistieron, y llegó hasta las fronteras de Japhet[a], al sur, frente a Arabia.
