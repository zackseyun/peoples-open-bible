translation:
  language: es
  text: Y el rey y todo Israel con él ofrecían sacrificios delante de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sacrificando un sacrificio», una expresión cognada que enfatiza el acto sacrificial; también podría traducirse de forma más literal como «estaban sacrificando un sacrificio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמֶּלֶךְ
  english_pob_choice: And the king
  chosen_spanish: Y el rey
  alternatives_spanish:
  - Ahora el rey
  - Y el rey
  lexicon: HALOT
  rationale: Se conserva la continuidad narrativa con una simple coordinación. En español, «el rey» mantiene la referencia definida a Salomón sin añadir elementos no presentes en el hebreo.
- source_word: וְכָל יִשְׂרָאֵל
  english_pob_choice: and all Israel
  chosen_spanish: y todo Israel
  alternatives_spanish:
  - y todos los israelitas
  lexicon: HALOT
  rationale: «Todo Israel» reproduce mejor el designativo colectivo del hebreo que una expansión interpretativa a «todos los israelitas».
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - que estaban con él
  lexicon: HALOT
  rationale: La relación espacial/acompañante se expresa de forma natural y concisa con «con él», manteniendo la referencia al rey.
- source_word: זֹבְחִים
  english_pob_choice: were sacrificing
  chosen_spanish: estaban sacrificando
  alternatives_spanish:
  - sacrificaban
  - estaban ofreciendo sacrificios
  lexicon: HALOT
  rationale: El participio hebreo expresa acción contemporánea o en desarrollo; el español progresivo conserva ese valor aspectual mejor que un pretérito simple.
- source_word: זֶבַח
  english_pob_choice: sacrifices / a sacrifice
  chosen_spanish: sacrificios
  alternatives_spanish:
  - un sacrificio
  - ofrendas sacrificadas
  lexicon: HALOT
  rationale: Aunque el hebreo usa un sustantivo singular en construcción cognada, el español suena más natural en plural, como refleja también la revisión inglesa final. Se conserva el matiz de acto sacrificial sin forzar una singularidad extraña en español.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» transmite con claridad el valor espacial/cultual de לִפְנֵי y resulta natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención editorial del proyecto para el Tetragrámaton: «Yahvé» como forma española del nombre divino, preservando el nombre personal de Dios en lugar de un título sustituto.'
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El versículo usa directamente el Tetragrámaton. La traducción al español mantiene el nombre divino como «Yahvé» para preservar la distinción entre el nombre propio de Dios y los títulos devocionales, en línea con la política del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «a sacrifice» a «sacrifices» para reflejar mejor la construcción cognada hebrea. La propuesta española mantiene ese mismo ajuste semántico con el plural natural «sacrificios», sin perder el valor aspectual progresivo de «estaban sacrificando».
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - «Todo Israel» se mantiene como designación colectiva sin desglosarla a un plural explicativo.
  - El progresivo «estaban sacrificando» preserva el aspecto verbal del participio hebreo en narrativa.
