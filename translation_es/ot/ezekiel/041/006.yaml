translation:
  language: es
  text: Y las cámaras laterales eran una cámara sobre otra[a], treinta y tres veces; y entraban en el muro que pertenecía a la casa para las cámaras laterales alrededor, para quedar fijadas[b], pero no quedaban fijadas en el muro de la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''tres y treinta veces''; probablemente alude a treinta y tres cámaras o colocaciones, no a acciones repetidas en el tiempo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''sujetas'' o ''aseguradas''. El hebreo enfatiza que quedan afirmadas o fijadas en su lugar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצְּלָעוֹת / צֵלָע
  english_pob_choice: side chambers / side chamber
  chosen_spanish: cámaras laterales / cámara lateral
  alternatives_spanish:
  - salas laterales
  - aposentos laterales
  - lados
  lexicon: HALOT
  rationale: En este contexto arquitectónico de templo, צלע no se refiere a 'costilla', sino a estructuras laterales adosadas. 'Cámaras laterales' comunica bien la función espacial en español y mantiene la repetición distributiva del hebreo.
- source_word: אֶל
  english_pob_choice: upon
  chosen_spanish: junto a
  alternatives_spanish:
  - sobre
  - hacia
  - a
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por 'upon' para sugerir disposición sucesiva, en español 'cámara junto a cámara' expresa con naturalidad la colocación contigua/repetida sin introducir una imagen demasiado física de apilamiento.
- source_word: שָׁלוֹשׁ וּשְׁלֹשִׁים פְּעָמִים
  english_pob_choice: thirty-three times
  chosen_spanish: treinta y tres veces
  alternatives_spanish:
  - treinta y tres
  - en treinta y tres ocasiones
  - tres y treinta veces
  lexicon: HALOT
  rationale: La expresión hebrea literal es 'tres y treinta'; en español, 'treinta y tres veces' preserva el valor numérico y la conexión con פְּעָמִים, manteniéndose clara y fiel.
- source_word: וּבָאוֹת
  english_pob_choice: they entered into
  chosen_spanish: entraban en
  alternatives_spanish:
  - entraban
  - se introducían en
  - se metían en
  lexicon: HALOT
  rationale: El participio femenino plural describe el ir/entrar de las cámaras en la estructura del muro. 'Entraban en' conserva el movimiento espacial sin forzar un tecnicismo.
- source_word: בַּקִּיר אֲשֶׁר לַבַּיִת
  english_pob_choice: the wall that belonged to the house
  chosen_spanish: el muro que pertenecía a la casa
  alternatives_spanish:
  - el muro de la casa
  - el muro que era de la casa
  - el muro destinado a la casa
  lexicon: HALOT
  rationale: '''Pertenecía a la casa'' sigue de cerca la relación expresada por לַבַּיִת y mantiene la distinción entre el muro principal de la casa y las estructuras adosadas.'
- source_word: לַצְּלָעוֹת סָבִיב סָבִיב
  english_pob_choice: for the side chambers all around
  chosen_spanish: para las cámaras laterales, todo alrededor
  alternatives_spanish:
  - para las cámaras laterales alrededor
  - en torno a las cámaras laterales
  - alrededor de las cámaras laterales
  lexicon: HALOT
  rationale: El doble סָבִיב intensifica el carácter envolvente. 'Todo alrededor' conserva esa repetición enfática en un español natural.
- source_word: לִהְיוֹת אֲחוּזִים
  english_pob_choice: so that they might be held fast
  chosen_spanish: para estar sujetas
  alternatives_spanish:
  - para ser sujetas
  - para quedar sujetas
  - para estar firmes
  lexicon: HALOT
  rationale: אחוזים expresa ser retenidas o fijadas en su lugar. 'Sujetas' comunica bien la idea arquitectónica de fijación; 'estar sujetas' suena natural y mantiene la tensión de sujeción/retención.
- source_word: וְלֹא יִהְיוּ אֲחוּזִים בְּקִיר הַבָּיִת
  english_pob_choice: but they were not supported by the wall of the house
  chosen_spanish: pero no estaban sujetas en el muro de la casa
  alternatives_spanish:
  - pero no estaban fijadas en el muro de la casa
  - pero no eran sostenidas por el muro de la casa
  - pero no estaban sujetas al muro de la casa
  lexicon: HALOT
  rationale: Mantengo la negación y la idea de fijación/soporte. 'En el muro' refleja el marco arquitectónico del hebreo y evita sugerir que el muro mismo actuara como soporte directo de manera ambigua.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió 'thirty-three times' por naturalidad y 'held fast' para acercarse al valor de fijación/aseguramiento del hebreo. La versión española conserva ese ajuste semántico con 'treinta y tres veces' y 'sujetas'.
  spanish_consistency_notes:
  - Se usa 'cámaras laterales' para צלע en este contexto arquitectónico del templo.
  - Se mantiene la distinción entre el muro perteneciente a la casa y el modo en que las cámaras se sujetan a la estructura.
  - La repetición de סָבִיב se vierte con 'todo alrededor' para preservar el énfasis envolvente sin arcaísmo excesivo.
  - '''Sujetas'' se eligió para conservar la tensión de fijación/retención que el inglés POB expresa con ''held fast''.'
