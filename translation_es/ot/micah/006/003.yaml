translation:
  language: es
  text: Mi pueblo, ¿qué te he hecho? ¿Cómo te he fatigado[a]? Respóndeme[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Cómo te he cargado?», reflejando el posible sentido alternativo de «he fatigado» como «he agobiado» o «he puesto una carga sobre ti».
    reason: lexical_alternative
  - marker: b
    text: O «Respóndeme contra mí» o «Testifica contra mí», reflejando el posible trasfondo de una escena judicial en el pasaje.
    reason: alternative_reading
lexical_decisions:
- source_word: עַמִּי
  english_pob_choice: My people
  chosen_spanish: Mi pueblo
  alternatives_spanish:
  - Pueblo mío
  - Oh, mi pueblo
  lexicon: HALOT
  rationale: Es un vocativo con sufijo de primera persona singular; en español, «Mi pueblo» comunica de manera natural el tono de pacto y cercanía del discurso profético, sin añadir una interjección no requerida por el hebreo.
- source_word: מֶה
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - qué cosa
  - qué fue lo que
  lexicon: HALOT
  rationale: Interrogativo directo y simple; «qué» conserva la pregunta retórica sin carga interpretativa adicional.
- source_word: עָשִׂיתִי לְךָ
  english_pob_choice: have I done to you
  chosen_spanish: te he hecho
  alternatives_spanish:
  - he hecho a ti
  - he hecho contra ti
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción pasada con relevancia presente. En español, el pretérito perfecto compuesto «te he hecho» mantiene bien esa fuerza retórica y la dirección del verbo hacia el destinatario.
- source_word: וּמָה
  english_pob_choice: How
  chosen_spanish: Cómo
  alternatives_spanish:
  - Y qué
  - Y de qué manera
  lexicon: HALOT
  rationale: Aunque formalmente puede leerse «y qué», aquí la función discursiva es de cuestionamiento de manera; «Cómo» conserva el paralelismo con la primera pregunta y la acusación implícita.
- source_word: הֶלְאֵתִיךָ
  english_pob_choice: have I wearied you
  chosen_spanish: te he fatigado
  alternatives_spanish:
  - te he cansado
  - te he agobiado
  - te he cargado
  lexicon: HALOT
  rationale: El hiphil de לאה expresa causar cansancio/fatiga. «Fatigado» es preciso y algo más formal; «cansado» es posible, pero puede sonar menos fuerte en registro profético. «Agobiado» y «cargado» interpretan más allá del verbo.
- source_word: עֲנֵה
  english_pob_choice: Answer
  chosen_spanish: Respóndeme
  alternatives_spanish:
  - Responde
  - Contéstame
  - Declara
  lexicon: HALOT
  rationale: Imperativo singular dirigido al oyente. «Respóndeme» conserva la apelación directa y funciona bien en español bíblico contemporáneo sin perder solemnidad.
- source_word: בִּי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - contra mí
  - a mí
  lexicon: HALOT
  rationale: La preposición con ענה puede ser simplemente «a mí», pero el español natural aquí es «Respóndeme». La alternativa adversativa «contra mí» queda disponible si se opta por un matiz forense más explícito.
theological_decisions:
- issue: Posible matiz jurídico del mandato final
  english_pob_reading: Answer me; the courtroom nuance is possible but not required in the main text.
  chosen_spanish_reading: Respóndeme; el matiz de litigio queda implícito, no explicitado.
  alternative_spanish_readings:
  - Respóndeme contra mí
  - Testifica contra mí
  rationale: El hebreo permite un trasfondo de juicio del pacto, pero no obliga a introducir lenguaje forense en el cuerpo del versículo. La traducción principal mantiene la fuerza directa de la pregunta y el imperativo, mientras conserva abierta la lectura judicial.
  doctrine_reference: Covenant lawsuit / litigio profético (Mi 6:1–8)
- issue: Tono de la relación pactual divina
  english_pob_reading: Retain the direct, personal challenge of the LORD to Israel without adding explicit lawsuit terminology in the main text.
  chosen_spanish_reading: Conservar el desafío personal y directo de Yahvé a su pueblo.
  alternative_spanish_readings:
  - Incluir explícitamente lenguaje de demanda judicial
  - Añadir una formulación adversativa en la pregunta
  rationale: El verso pertenece a un contexto de litigio profético, pero la forma concreta de este versículo es breve y personal. «Mi pueblo» y «Respóndeme» preservan esa tensión sin sobrecargar el texto con tecnicismos.
  doctrine_reference: Alianza / pacto; responsabilidad del pueblo ante Yahvé
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la versión inglesa auditada; no se identificaron revisiones textuales relevantes. Se conservó la misma ambigüedad léxica de הֶלְאֵתִיךָ y el posible matiz forense de עֲנֵה בִּי, trasladándolos a español con notas breves.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma habitual para el nombre divino en este proyecto, pero en este versículo la referencia inmediata es una voz implícita en el discurso profético; no se introduce el nombre porque el hebreo no lo contiene aquí.
  - «Fatigado» se escogió para preservar el valor causativo del hiphil sin sobreinterpretar «cargar».
  - Se evita «SEÑOR» para mantener la política terminológica del proyecto.
  - La puntuación reproduce el paralelismo y la cadencia interrogativa del hebreo.
