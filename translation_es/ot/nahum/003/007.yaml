translation:
  language: es
  text: 'Y acontecerá que todos los que te vean huirán de ti y dirán: «Nínive está devastada[a]; ¿quién hará duelo por ella?[b] ¿Dónde podré buscar consoladores para ti?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «está destruida» o «está arrasada». El hebreo puede expresar ruina total; «devastada» intenta abarcar esa amplitud.
    reason: lexical_alternative
  - marker: b
    text: O «¿quién la lamentará?» El hebreo puede referirse a lamentar, hacer duelo o mostrar simpatía por ella; aquí el contexto favorece el sentido de duelo.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאַיִךְ
  english_pob_choice: all who see you
  chosen_spanish: todos los que te vean
  alternatives_spanish:
  - todos los que te miren
  - quienes te observen
  lexicon: HALOT
  rationale: El participio hebreo de ראה con sufijo de segunda femenina singular se refiere a quienes contemplan a Nínive. «Todos los que te vean» es natural en español y conserva el valor amplio de los observadores.
- source_word: יִדּוֹד מִמֵּךְ
  english_pob_choice: will flee from you
  chosen_spanish: huirán de ti
  alternatives_spanish:
  - se apartarán de ti
  - retrocederán ante ti
  lexicon: HALOT
  rationale: El verbo נדד puede implicar moverse lejos o retroceder con horror. En este contexto de juicio, «huirán de ti» expresa bien el alejamiento repentino y el impacto de la ruina.
- source_word: שָׁדְּדָה
  english_pob_choice: is devastated
  chosen_spanish: está devastada
  alternatives_spanish:
  - está destruida
  - está arrasada
  - está asolada
  lexicon: HALOT
  rationale: El pasivo/resultativo de שׁדד comunica ruina total. «Devastada» mantiene esa amplitud sin restringirlo solo al saqueo militar.
- source_word: יָנוּד לָהּ
  english_pob_choice: will mourn for her
  chosen_spanish: se compadecerá de ella
  alternatives_spanish:
  - la lamentará
  - se dolerá por ella
  - hará duelo por ella
  lexicon: HALOT
  rationale: נוד puede abarcar lamento, gesto de duelo o simpatía. Dado el paralelo con la pregunta por consoladores, «se compadecerá de ella» preserva la idea de lamento/simpatía sin sonar forzado en español.
- source_word: מֵאַיִן
  english_pob_choice: Where
  chosen_spanish: ¿De dónde
  alternatives_spanish:
  - ¿Dónde
  - ¿Desde dónde
  lexicon: HALOT
  rationale: La expresión literal es «de dónde», y en la pregunta retórica española conviene mantener esa forma para conservar la procedencia implícita de la búsqueda.
- source_word: אֲבַקֵּשׁ
  english_pob_choice: can I seek
  chosen_spanish: buscaré
  alternatives_spanish:
  - podré buscar
  - he de buscar
  lexicon: HALOT
  rationale: El imperfecto piel de בקש expresa una búsqueda proyectada. En la pregunta retórica, «buscaré» suena natural y conserva el tono de indagación imposible.
- source_word: מְנַחֲמִים
  english_pob_choice: comforters
  chosen_spanish: consoladores
  alternatives_spanish:
  - los que consuelan
  - quienes consuelen
  lexicon: HALOT
  rationale: El participio de נחם en sentido de consolar se puede traducir con el sustantivo «consoladores», que mantiene el vínculo léxico con el campo de consuelo y duelo.
theological_decisions:
- issue: El tono de la pregunta retórica sobre el duelo por Nínive
  english_pob_reading: Nineveh is devastated; who will mourn for her?
  chosen_spanish_reading: Nínive está devastada; ¿quién se compadecerá de ella?
  alternative_spanish_readings:
  - Nínive está devastada; ¿quién hará duelo por ella?
  - Nínive está devastada; ¿quién la lamentará?
  rationale: El hebreo usa una pregunta que no solo pide llanto, sino también simpatía/gesto de duelo. «Se compadecerá de ella» conserva esa amplitud y evita estrechar el sentido solo a una expresión exterior.
  doctrine_reference: Lexical/theological nuance of נוד in poetic lament context
translation_notes:
  revision_awareness: Seguí la revisión inglesa más reciente al reflejar el alejamiento con «huirán» y el lamento con una forma natural en español; además, mantuve el cierre interrogativo con «consoladores» para conservar el enlace léxico con נחם.
  spanish_consistency_notes:
  - Se usa «Nínive» como nombre propio transliterado estándar en español.
  - Se mantiene el tratamiento de segunda persona singular para la ciudad/personificación, coherente con el hebreo.
  - «Consoladores» preserva el campo semántico de consuelo/duelo y permite una pregunta retórica idiomática en español.
