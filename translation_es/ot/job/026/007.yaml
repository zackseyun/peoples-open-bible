translation:
  language: es
  text: Él extiende el norte[a] sobre el vacío[b]; cuelga la tierra sobre nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "el cielo del norte". El hebreo dice simplemente "el norte", que en este contexto poético puede referirse a los cielos del norte.
    reason: lexical_alternative
  - marker: b
    text: O "vacío informe". El término hebreo puede denotar vacío, desolación o falta de forma.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹטֶה
  english_pob_choice: stretches out
  chosen_spanish: extiende
  alternatives_spanish:
  - tiende
  - estira
  lexicon: HALOT
  rationale: El participio qal de נטה expresa extender o tender. En español, "extiende" conserva la imagen cósmica con naturalidad y evita una literalidad pesada.
- source_word: צָפוֹן
  english_pob_choice: the north
  chosen_spanish: el norte
  alternatives_spanish:
  - el cielo del norte
  - Zafón
  lexicon: HALOT
  rationale: צָפוֹן normalmente significa "norte". En este contexto poético puede aludir también al ámbito celeste del norte, pero la forma simple "el norte" sigue de cerca el hebreo y deja abierta esa posible amplitud.
- source_word: תֹּהוּ
  english_pob_choice: emptiness
  chosen_spanish: el vacío
  alternatives_spanish:
  - la vaciedad
  - la nada
  - el vacío informe
  lexicon: HALOT
  rationale: תֹּהוּ puede denotar vacío, desolación o falta de forma. "El vacío" comunica bien en español moderno la idea de desolación/formless void sin volver la frase innecesariamente abstracta.
- source_word: תֹּלֶה
  english_pob_choice: hangs
  chosen_spanish: cuelga
  alternatives_spanish:
  - suspende
  - sostiene
  lexicon: HALOT
  rationale: El participio qal de תלה significa colgar o suspender. "Cuelga" es directo y mantiene el paralelismo verbal del verso.
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: En este contexto cósmico, אֶרֶץ se refiere al mundo terrestre. "La tierra" es la equivalencia más natural y fiel en español.
- source_word: בְּלִי מָה
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - sin nada
  - sin cosa alguna
  lexicon: HALOT
  rationale: El modismo significa "sin nada" u "on nothing". "Sobre nada" reproduce con claridad el sentido idiomático en español y conserva la tensión poética del hebreo.
theological_decisions:
- issue: Imagen cosmológica y lenguaje poético
  english_pob_reading: Render the verse as poetic description of God's sovereign ordering of creation without importing modern scientific claims.
  chosen_spanish_reading: Presentar el verso como descripción poética del dominio soberano de Dios sobre la creación, sin convertirlo en afirmación científica moderna ni suavizar su fuerza imagética.
  alternative_spanish_readings:
  - Leerlo como una declaración científica exacta sobre la posición de la tierra en el espacio
  - Expanderlo con una explicación mitológica del norte
  rationale: El hebreo ofrece imaginería sapiencial y cósmica. La traducción debe preservar el lenguaje figurado de manera transparente, sin resolver la tensión poética ni forzar una lectura técnica.
  doctrine_reference: Principio POB de primacía del texto original y preservación de la tensión interpretativa
- issue: Sentido posible de "el norte"
  english_pob_reading: The Hebrew simply says 'the north,' which may refer to the northern heavens in this poetic context.
  chosen_spanish_reading: Mantener "el norte" en el texto principal y señalar en nota la posibilidad de "el cielo del norte".
  alternative_spanish_readings:
  - el cielo del norte
  - el norte celestial
  rationale: El hebreo no exige explicitar más de lo que dice. La nota conserva la alternativa contextual sin reemplazar el término básico del original.
  doctrine_reference: Criterio POB de no sobre-interpretar cuando el hebreo admite más de una lectura
translation_notes:
  revision_awareness: La versión actual coincide con la revisión más reciente del contexto inglés; no se registraron cambios aplicados en el último pase, y la propuesta española sigue esa lectura de alta concordancia sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - 'Se conservó el paralelismo verbal del hebreo con dos verbos breves: "extiende" y "cuelga".'
  - Se evitó "SEÑOR" u otra sustitución teológica porque el verso no contiene el nombre divino.
  - Se prefirió "la tierra" frente a "el mundo" por ser la equivalencia más directa de אֶרֶץ en contexto cósmico.
  - Se mantuvo "sobre nada" para reflejar el modismo בְּלִי מָה sin explicar más de lo que el texto permite.
