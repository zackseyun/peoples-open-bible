translation:
  language: es
  text: ¿Qué nos aprovechó la arrogancia? ¿Y de qué nos sirvió la riqueza acompañada de jactancia?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «la riqueza con pretensión» o «la riqueza acompañada de arrogancia». El griego μετὰ ἀλαζονίας admite varios matices muy cercanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί ὠφέλησεν
  english_pob_choice: What did ... profit / benefit
  chosen_spanish: ¿Qué nos aprovechó... ?
  alternatives_spanish:
  - ¿Qué beneficio nos trajo... ?
  - ¿De qué nos sirvió... ?
  lexicon: BDAG / equivalencia funcional del verbo ὠφελέω
  rationale: ὠφελέω pregunta por la ventaja o utilidad obtenida. 'Aprovechó' comunica bien la idea de beneficio real en español y conserva el tono retórico de la pregunta.
- source_word: ἡ ὑπερηφανία
  english_pob_choice: arrogance
  chosen_spanish: la arrogancia
  alternatives_spanish:
  - el orgullo
  - la altivez
  lexicon: LSJ
  rationale: ὑπερηφανία expresa orgullo soberbio y despectivo; 'arrogancia' reproduce mejor ese matiz negativo que 'orgullo' en español contemporáneo.
- source_word: πλοῦτος
  english_pob_choice: wealth
  chosen_spanish: la riqueza
  alternatives_spanish:
  - las riquezas
  - la abundancia
  lexicon: LSJ
  rationale: El término alude a bienes materiales. 'Riqueza' es natural en español y mantiene el paralelismo con la primera pregunta.
- source_word: μετὰ ἀλαζονίας
  english_pob_choice: joined with boasting
  chosen_spanish: unida con la jactancia
  alternatives_spanish:
  - con jactancia
  - acompañada de arrogancia
  - unida con la presunción
  lexicon: LSJ
  rationale: ἀλαζονία denota jactancia, pretensión o fanfarronería. 'Jactancia' es el equivalente más directo y mantiene la tensión lexical sin suavizarla.
- source_word: συμβέβληται ἡμῖν
  english_pob_choice: benefit us
  chosen_spanish: nos aprovechó
  alternatives_spanish:
  - nos benefició
  - nos sirvió
  lexicon: LSJ
  rationale: El verbo perfecto de συμβάλλω aquí comunica resultado ventajoso para nosotros. 'Nos aprovechó' enlaza de manera natural con la primera cláusula y conserva la idea de utilidad.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego adjudicado y conserva el paralelismo retórico de las dos preguntas. Se refleja la decisión inglesa de mantener una idea de utilidad/provecho en ambas cláusulas, mientras que ἀλαζονία se resuelve en español con 'jactancia' por ser el matiz más natural y preciso.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro pero moderno.
  - Se evitó 'Cristo/SEÑOR' u այլ terminología no pertinente al versículo.
  - La repetición de '¿Qué nos aprovechó...?' reproduce el paralelismo interrogativo del texto griego.
