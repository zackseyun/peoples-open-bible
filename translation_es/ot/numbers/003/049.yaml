revisions:
- from: Y Moisés tomó el dinero del rescate[a] de parte de los que excedían[b] a los rescatados por los levitas.
  to: Y Moisés tomó el dinero de la redención[a] de entre los que excedían[b] el número de los redimidos por los levitas.
  rationale: 'La revisión corrige una construcción española poco natural, hace más explícita la idea de excedente numérico presente en el hebreo y alinea mejor la terminología principal con la decisión léxica auditada en inglés: «redención» en el texto, con «rescate» como alternativa de nota.'
  reviewer_model: gpt-5.4
