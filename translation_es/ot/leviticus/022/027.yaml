review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura legal del hebreo: condición temporal al nacer, siete días con la madre, y aceptabilidad sacrificial desde el octavo día. También respeta correctamente el nombre divino como «Yahvé». Sin embargo, omite en el texto principal el valor distintivo de אִשֶּׁה, reduciendo «ofrenda de alimento / hecha por fuego» a la genérica «ofrenda», lo que pierde contenido léxico presente en la fuente y en la auditoría inglesa.'
  spanish_quality_summary: El español es natural y claro. «Con su madre» es una buena adaptación idiomática de תַּחַת אִמּוֹ en este contexto. La frase fluye bien y es ampliamente legible. La principal mejora necesaria es hacer explícito en el texto el matiz sacrificial de אִשֶּׁה sin sonar forzado.
  glossary_alignment: 'Se alinea bien con la política del proyecto en «Yahvé». No hay conflicto terminológico mayor en los nombres de animales, aunque «oveja» y «cabra» pueden sonar sexados en español; aquí funcionan aceptablemente como términos de especie en una tríada legal. El punto débil es אִשֶּׁה: según la auditoría inglesa revisada, el texto principal debe conservar el sentido de «food offering», no vaciarlo en «ofrenda» solamente.'
  issues:
  - severity: medium
    issue: «como ofrenda[a]» no conserva el valor léxico de אִשֶּׁה
    rationale: El hebreo distingue לְקָרְבָּן אִשֶּׁה, no solo «como ofrenda». La revisión inglesa adoptó «food offering» en el texto principal; el español debe reflejar ese contenido, idealmente como «ofrenda de alimento», dejando «ofrenda hecha por fuego» como alternativa en nota.
  - severity: low
    issue: La nota al pie debe corresponder a la alternativa, no suplir todo el contenido perdido
    rationale: La nota actual es correcta como alternativa léxica, pero el texto principal queda demasiado general. Conviene mantener la nota, pero anclada a una expresión principal más completa.
  revised_spanish_text: Cuando nazca un buey, una oveja o una cabra, permanecerá siete días con su madre, y desde el octavo día en adelante será aceptado como ofrenda de alimento[a] a Yahvé.
  revised_footnotes:
  - marker: a
    text: O "ofrenda hecha por fuego". El término hebreo se refiere a una ofrenda presentada mediante fuego.
    reason: lexical_alternative
  revision_rationale: Se conserva la buena legibilidad del borrador, pero se corrige la omisión del matiz distintivo de אִשֶּׁה en el texto principal. «Ofrenda de alimento» sigue la decisión auditada del POB en inglés y mantiene la alternativa técnica en la nota. No se requiere adjudicación adicional.
