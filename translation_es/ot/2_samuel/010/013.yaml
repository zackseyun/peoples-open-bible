translation:
  language: es
  text: Entonces Joab y el pueblo que estaba con él avanzaron para combatir contra Aram[a], y huyeron ante él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Aram»; es decir, las fuerzas arameas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  english_pob_choice: advanced
  chosen_spanish: avanzaron
  alternatives_spanish:
  - se acercaron
  - se dirigieron
  lexicon: HALOT
  rationale: En contexto militar, נגשׁ puede significar acercarse o avanzar para entrar en combate. «Avanzaron» conserva el movimiento frontal y suena natural en español sin perder la fuerza bélica del verbo.
- source_word: וְהָעָם אֲשֶׁר עִמּוֹ
  english_pob_choice: and the people who were with him
  chosen_spanish: y la gente que estaba con él
  alternatives_spanish:
  - y el pueblo que estaba con él
  - y las tropas que estaban con él
  lexicon: HALOT
  rationale: עָם significa literalmente «pueblo/gente». «La gente que estaba con él» sigue de cerca el hebreo y evita introducir una especificación militar que el texto no dice de forma explícita.
- source_word: לַמִּלְחָמָה
  english_pob_choice: to battle
  chosen_spanish: para combatir
  alternatives_spanish:
  - para la batalla
  - a la batalla
  lexicon: HALOT
  rationale: La preposición más el sustantivo expresan finalidad o movimiento hacia el combate. «Para combatir» comunica bien ese valor teleológico en un español natural y mantiene el sentido marcial.
- source_word: בַּאֲרָם
  english_pob_choice: against Aram
  chosen_spanish: contra Aram
  alternatives_spanish:
  - contra los arameos
  - contra Siria
  lexicon: HALOT
  rationale: Se conserva el nombre bíblico «Aram», como en la base inglesa, y se expresa la oposición con «contra». «Los arameos» sería una expansión contextual válida, pero menos cercana al formulario hebreo.
- source_word: וַיָּנֻסוּ
  english_pob_choice: they fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - fueron puestos en fuga
  - se retiraron
  lexicon: HALOT
  rationale: נוּס significa «huir / escapar». «Huyeron» es directo y fuerte en español; «se retiraron» suaviza indebidamente el verbo.
- source_word: מִפָּנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - de su presencia
  - ante él
  lexicon: HALOT
  rationale: El modismo «huir de delante de alguien» se expresa naturalmente en español como «delante de él». Mantiene la imagen relacional del hebreo sin volverlo torpe.
- source_word: יוֹאָב
  english_pob_choice: Joab
  chosen_spanish: Joab
  lexicon: Convención onomástica estándar
  rationale: Los nombres propios se transliteran por convención, sin modificación.
translation_notes:
  revision_awareness: El texto inglés auditado muestra alta concordancia y no introdujo revisiones; la versión española sigue ese mismo perfil estable, conservando el nombre propio Aram y el valor militar de los verbos hebreos sin añadir matices no presentes en el original.
  spanish_consistency_notes:
  - Se mantiene «Aram» como nombre bíblico, no como sustituto interpretativo.
  - Se evita «siervos» o terminología eclesiástica ajena al contexto militar.
  - «Delante de él» refleja el modismo de fuga ante una persona, en línea con el inglés auditado.
