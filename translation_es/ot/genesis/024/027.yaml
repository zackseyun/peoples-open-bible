translation:
  language: es
  text: 'Y dijo: «¡Bendito sea Yahvé, Dios de mi señor Abraham, que no ha abandonado su misericordia[a] y su fidelidad de mi señor! En cuanto a mí, Yahvé me ha guiado por el camino a la casa de los hermanos de mi señor[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su misericordia y su verdad». El par hebreo suele expresar lealtad de pacto y confiabilidad.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «hermanos»; aquí se refiere a los varones de la parentela de Abraham.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: ¡Bendito sea!
  alternatives_spanish:
  - ¡Bendito es!
  lexicon: HALOT
  rationale: La forma hebrea funciona como exclamación doxológica dirigida a Yahvé. En español, «Bendito sea» conserva mejor el valor optativo/benedictivo que un simple enunciado descriptivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: transliteración del Tetragrámaton en lugar de sustitución por un título. «Yahvé» es la forma establecida en la POB española.'
- source_word: אֱלֹהֵי אֲדֹנִי אַבְרָהָם
  english_pob_choice: the God of my master Abraham
  chosen_spanish: Dios de mi señor Abraham
  alternatives_spanish:
  - el Dios de mi señor Abraham
  - Dios de Abraham, mi señor
  lexicon: HALOT
  rationale: Se mantiene la estructura constructa y la referencia al vínculo de servidumbre con Abraham. «Mi señor» traduce אֲדֹנִי con valor relacional y narrativo, sin suavizar el matiz.
- source_word: עָזַב
  english_pob_choice: has not forsaken
  chosen_spanish: no ha abandonado
  alternatives_spanish:
  - no ha forsado
  - no ha dejado
  lexicon: HALOT
  rationale: «Abandonado» comunica de forma natural la idea de no retirar ayuda o lealtad. En este contexto covenantal, es un equivalente claro y fiel.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su amor constante
  - su lealtad de pacto
  - su bondad
  lexicon: HALOT
  rationale: El par חֶסֶד וֶאֱמֶת admite varias opciones. Aquí se opta por «misericordia» como término bíblico amplio y reverente, pero la nota conserva la tensión con el sentido de lealtad de pacto que no debe borrarse.
- source_word: וַאֲמִתּוֹ
  english_pob_choice: and his faithfulness
  chosen_spanish: y su fidelidad
  alternatives_spanish:
  - y su verdad
  - y su confiabilidad
  lexicon: HALOT
  rationale: «Fidelidad» expresa bien la continuidad y confiabilidad del actuar divino. Evita reducir אֱמֶת a mera «verdad» proposicional en un contexto de relación y promesa.
- source_word: מֵעִם אֲדֹנִי
  english_pob_choice: from my master
  chosen_spanish: respecto de mi señor
  alternatives_spanish:
  - de parte de mi señor
  - de mi señor
  lexicon: HALOT
  rationale: La preposición con עזב apunta a una retirada/no apartarse en relación con alguien. «Respecto de» conserva la dirección relacional del hebreo sin sonar torpe en español; la nota permite ver la alternativa más literal.
- source_word: אָנֹכִי
  english_pob_choice: As for me
  chosen_spanish: En cuanto a mí
  alternatives_spanish:
  - Yo, por mi parte
  - Y yo
  lexicon: HALOT
  rationale: El pronombre independiente introduce contraste discursivo. «En cuanto a mí» reproduce esa prominencia de forma natural en español.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: por el camino
  alternatives_spanish:
  - en el camino
  - en el viaje
  lexicon: HALOT
  rationale: La expresión indica la trayectoria del viaje. «Por el camino» es idiomática y mantiene el sentido de recorrido guiado.
- source_word: נָחַנִי
  english_pob_choice: has led me
  chosen_spanish: me ha guiado
  alternatives_spanish:
  - me ha conducido
  - me ha llevado
  lexicon: HALOT
  rationale: El verbo expresa dirección providencial. «Guiado» conserva el énfasis en la conducción personal de Yahvé durante el trayecto.
- source_word: בֵּית אֲחֵי אֲדֹנִי
  english_pob_choice: to the house of my master’s brothers
  chosen_spanish: hasta la casa de los hermanos de mi señor
  alternatives_spanish:
  - a la casa de los hermanos de mi señor
  - hasta la casa de los parientes de mi señor
  lexicon: HALOT
  rationale: Se conserva literalmente אֲחֵי como «hermanos», como hace la POB inglesa, aunque el referente narrativo sea el linaje/parentela de Abraham. «Hasta» refleja bien la llegada al destino.
theological_decisions:
- issue: Nombre divino יְהוָה en una bendición narrativa
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre personal de Dios en vez de un título de sustitución. Esto mantiene visible la identidad pactual del texto y sigue la terminología del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Pareja חֶסֶד וֶאֱמֶת
  english_pob_reading: steadfast love and faithfulness
  chosen_spanish_reading: misericordia y fidelidad
  alternative_spanish_readings:
  - amor constante y fidelidad
  - lealtad de pacto y confiabilidad
  - misericordia y verdad
  rationale: La combinación debe reflejar tanto la lealtad estable como la confiabilidad de Dios. «Misericordia y fidelidad» es una pareja bíblica clara en español, pero la nota mantiene la alternativa semántica de lealtad de pacto para no borrar la tensión lexical.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5, 6
- issue: אֲחֵי como parentesco masculino
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - parientes
  - familia
  rationale: Se conserva el masculino plural del hebreo, tal como la POB inglesa opta por «brothers», aunque el sentido contextual abarque la línea familiar de Abraham. Esto evita diluir el término fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó la relación preposicional de «toward» a «from» para reflejar con mayor cercanía מֵעִם. En español, se optó por «respecto de» para conservar la orientación relacional de la frase sin perder fluidez; la nota lexical explicita la alternativa más literal. También se respetó la decisión revisada de mantener «brothers/hermanos» y la lectura teológica del binomio חֶסֶד וֶאֱמֶת.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino.
  - Se usa «mi señor» para אֲדֹנִי, consistente con el contexto servil narrativo.
  - Se preserva «hermanos» en el texto principal, con nota aclaratoria sobre el alcance familiar.
  - Se evita «Cristo» por no ser pertinente al pasaje.
  - La puntuación y comillas siguen normas editoriales del español moderno y estilo bíblico publicable.
