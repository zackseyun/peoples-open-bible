revisions:
- from: Tenía treinta y dos años cuando comenzó a reinar[a], y reinó ocho años en Jerusalén. Luego se fue sin ser deseado, y lo sepultaron en la Ciudad de David, pero no en los sepulcros de los reyes.
  to: Tenía treinta y dos años cuando comenzó a reinar[a], y reinó ocho años en Jerusalén. Luego se fue sin pesar, y lo sepultaron en la ciudad de David, pero no en los sepulcros de los reyes.
  rationale: Se ajusta בְּלֹא חֶמְדָּה en el texto principal a 'sin pesar' para seguir la decisión contextual del POB inglés ('with no regret') y mejorar la naturalidad en español. La alternativa más literal se conserva en nota, como en la auditoría inglesa. También se normaliza 'ciudad de David' en minúscula para un español más natural.
