base_translation:
  language: en
  yaml_path: translation/ot/genesis/043/034.yaml
  text: He sent portions to them from before him[a], but Benjamin’s portion was five times as much as all of theirs[c][b]. So they drank and became drunk with him.
  footnotes:
  - marker: a
    text: Literally, 'from before him,' likely meaning from Joseph’s own place at the table.
    reason: cultural_note
  - marker: b
    text: Literally, 'five hands,' a Hebrew idiom meaning five times as much.
    reason: lexical_alternative
  - marker: c
    text: Or, more softly, 'became merry'; the Hebrew verb more directly means 'became drunk.'
    reason: lexical_alternative
