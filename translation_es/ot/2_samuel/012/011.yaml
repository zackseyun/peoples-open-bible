translation:
  language: es
  text: 'Así dice Yahvé: He aquí, levantaré calamidad contra ti desde tu misma casa, y tomaré a tus esposas delante de tus ojos y se las daré a tu vecino[a], y él se acostará con tus esposas a la vista de este sol[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «compañero» o «asociado». El hebreo רֵעַ puede significar «vecino», «compañero» o «asociado».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a la vista de este sol»; es decir, públicamente y sin ocultamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el convenio del proyecto para el nombre divino, manteniendo la forma reverente y auditables las decisiones, en lugar de enmascararlo con un título.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Fórmula profética de mensajero; «Así dice» conserva la solemnidad y el valor declarativo con español natural.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí, yo
  alternatives_spanish:
  - Mira, yo
  - Yo estoy aquí
  lexicon: HALOT
  rationale: «He aquí» reproduce la función de llamada de atención del hebreo; «yo» mantiene la fuerza enfática de la construcción.
- source_word: מֵקִים ... רָעָה
  english_pob_choice: am raising up disaster
  chosen_spanish: levanto un mal
  alternatives_spanish:
  - levanto una desgracia
  - traigo una calamidad
  lexicon: HALOT
  rationale: Rָעָה puede abarcar mal/desgracia/calamidad. Aquí se conserva «mal» para no neutralizar el término, pero en español se entiende como juicio adverso; «levanto» refleja bien מֵקִים como acción de suscitar/poner en marcha.
- source_word: עָלֶיךָ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - hacia ti
  lexicon: HALOT
  rationale: La preposición en contexto es hostil y judicial; «contra ti» comunica mejor el sentido que un calco espacial.
- source_word: מִבֵּיתֶךָ
  english_pob_choice: from your own house
  chosen_spanish: desde tu misma casa
  alternatives_spanish:
  - de tu casa
  - desde tu hogar
  lexicon: HALOT
  rationale: «Casa» conserva la esfera doméstica/dinástica; «tu misma» intensifica la procedencia interna del juicio sin salir del campo semántico del hebreo.
- source_word: וְלָקַחְתִּי אֶת נָשֶׁיךָ
  english_pob_choice: I will take your wives
  chosen_spanish: tomaré tus mujeres
  alternatives_spanish:
  - tomaré a tus esposas
  - tomaré a tus esposas para mí
  lexicon: HALOT
  rationale: Se evita una terminología eclesiástica que suavice el plural concreto; «mujeres» sigue el término hebreo y deja el contexto determinar que son esposas.
- source_word: לְעֵינֶיךָ
  english_pob_choice: before your eyes
  chosen_spanish: delante de tus ojos
  alternatives_spanish:
  - en tu presencia
  - a la vista de ti
  lexicon: HALOT
  rationale: La imagen corporal del hebreo se conserva con una frase directa y transparente; «delante de tus ojos» es idiomático y fiel.
- source_word: לְרֵעֶיךָ
  english_pob_choice: to your neighbor
  chosen_spanish: a tu [a]
  alternatives_spanish:
  - a tu prójimo
  - a tu vecino
  lexicon: HALOT
  rationale: רֵעַ puede significar «vecino», «compañero» o «asociado». Dado que en este contexto el POB inglés revisado optó por «neighbor», el español principal adopta «tu vecino» como lectura estándar, pero se deja la alternativa en nota por la ambigüedad lexical.
- source_word: וְשָׁכַב עִם
  english_pob_choice: he will lie with
  chosen_spanish: se acostará con
  alternatives_spanish:
  - yacerá con
  - se unirá con
  lexicon: HALOT
  rationale: Es un eufemismo sexual; «se acostará con» lo comunica de forma clara en español moderno sin volverlo coloquial de más.
- source_word: לְעֵינֵי הַשֶּׁמֶשׁ הַזֹּאת
  english_pob_choice: in the sight of this sun
  chosen_spanish: a la vista de este sol
  alternatives_spanish:
  - en presencia de este sol
  - abiertamente, bajo este sol
  lexicon: HALOT
  rationale: Se preserva la imagen concreta del hebreo. Aunque en español suena ligeramente marcada, mantiene la expresión pública y visual del original mejor que una paráfrasis.
theological_decisions:
- issue: Rָעָה aplicado por Yahvé en juicio
  english_pob_reading: disaster/calamity, not moral evil
  chosen_spanish_reading: mal en sentido de calamidad o juicio adverso, no maldad moral
  alternative_spanish_readings:
  - desgracia
  - calamidad
  - infortunio
  rationale: El texto presenta a Yahvé como quien suscita un juicio doloroso sobre David; en español se preserva el término «mal» para no diluir la tensión lexical, pero la nota conceptual debe dejar claro que no se entiende como maldad moral atribuida a Dios.
  doctrine_reference: Primacía del texto original; distinguir entre mal moral y juicio adverso sin resolver artificialmente la tensión teológica.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «companion» a «neighbor» para רֵעַ; esta versión española adopta una formulación equivalente en el texto principal y conserva la alternativa léxica en nota, manteniendo también la imagen concreta de «in the sight of this sun».
  spanish_consistency_notes:
  - Se usa Yahvé para el nombre divino, conforme al estándar del proyecto.
  - Se conserva «mujeres» para נשׁים, evitando sustituirlo por un término eclesiástico no requerido por el hebreo.
  - «Mal» se mantiene con aclaración conceptual para no borrar la tensión teológica del juicio divino.
  - El orden y la puntuación siguen de cerca la cadencia profética del original, con español natural y publicable.
