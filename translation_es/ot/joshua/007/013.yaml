translation:
  language: es
  text: 'Levántate, consagra al pueblo y diles: «Conságrense para mañana, porque así dice Yahvé, el Dios de Israel: hay algo dedicado a la destrucción[a] en medio de ti, Israel. No podrás hacer frente a tus enemigos hasta que quiten de en medio de ustedes lo dedicado a la destrucción».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo חֵרֶם (cherem), tradicionalmente «el anatema», «lo vedado» o «la cosa dedicada»; el término denota algo puesto bajo dedicación irrevocable, aquí para destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֻם
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Alzate
  - Levántate y actúa
  lexicon: HALOT
  rationale: Es un imperativo directo a Josué que inicia una acción inmediata. «Levántate» conserva la urgencia y es natural en español bíblico sin volverse arcaico.
- source_word: קַדֵּשׁ
  english_pob_choice: consecrate
  chosen_spanish: consagra
  alternatives_spanish:
  - santifica
  - aparta como santo
  lexicon: HALOT
  rationale: El piel expresa poner aparte para un propósito santo. «Consagra» mantiene el valor ritual y la conexión léxica con el verbo reflexivo siguiente.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la nación
  lexicon: HALOT
  rationale: Se refiere al pueblo del pacto reunido; en este mandato, el acusativo se expresa de forma natural en español con «al pueblo».
- source_word: הִתְקַדְּשׁוּ
  english_pob_choice: Consecrate yourselves
  chosen_spanish: Consagraos
  alternatives_spanish:
  - Santificaos
  - Purificaos
  lexicon: HALOT
  rationale: El hitpael es reflexivo. «Consagraos» preserva el paralelismo con el verbo anterior y la idea de prepararse ritualmente.
- source_word: לְמָחָר
  english_pob_choice: for tomorrow
  chosen_spanish: para mañana
  alternatives_spanish:
  - para el día de mañana
  - mañana
  lexicon: HALOT
  rationale: La preposición indica preparación con vista al día siguiente; «para mañana» comunica mejor esa orientación preparatoria.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé», manteniendo la transparencia del nombre divino en el texto principal.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Es una frase constructa directa de identificación covenantal; «el Dios de Israel» es la correspondencia natural y fiel en español.
- source_word: חֵרֶם
  english_pob_choice: something devoted to destruction
  chosen_spanish: cosa dedicada a destrucción
  alternatives_spanish:
  - cosa consagrada a destrucción
  - cosa bajo anatema
  - la cosa devotada a destrucción
  lexicon: HALOT
  rationale: 'Se conserva la tensión semántica del término: algo puesto bajo dedicación irrevocable con resultado de destrucción. «Cosa dedicada a destrucción» evita el tecnicismo opaco y mantiene continuidad con el valor lexical documentado.'
- source_word: בְּקִרְבְּךָ יִשְׂרָאֵל
  english_pob_choice: in your midst, Israel
  chosen_spanish: en medio de ti, Israel
  alternatives_spanish:
  - en tu medio, Israel
  - entre vosotros, Israel
  lexicon: HALOT
  rationale: El singular corporativo dirigido a Israel se expresa naturalmente como «en medio de ti». Conserva la fuerza vocativa y la imagen espacial del hebreo.
- source_word: לֹא תוּכַל לָקוּם לִפְנֵי אֹיְבֶיךָ
  english_pob_choice: You cannot stand before your enemies
  chosen_spanish: No podrás hacer frente a tus enemigos
  alternatives_spanish:
  - No podrás sostenerte delante de tus enemigos
  - No podrás estar en pie ante tus enemigos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para resistir o prevalecer ante enemigos. «Hacer frente» comunica mejor esa idea en español actual que una traducción más literal y menos natural.
- source_word: עַד הֲסִירְכֶם הַחֵרֶם מִקִּרְבְּכֶם
  english_pob_choice: until you remove the thing devoted to destruction from your midst
  chosen_spanish: hasta que quitéis de en medio de vosotros la cosa dedicada a destrucción
  alternatives_spanish:
  - hasta que remováis de en medio de vosotros la cosa dedicada a destrucción
  - hasta que saquéis de entre vosotros la cosa dedicada a destrucción
  lexicon: HALOT
  rationale: «Quitar» y «de en medio de vosotros» preservan el movimiento de remoción colectiva. Se mantiene la repetición del término para conservar la cohesión lexical del verso.
theological_decisions:
- issue: Rendering חֵרֶם in Joshua’s judgment context
  english_pob_reading: something devoted to destruction / the thing devoted to destruction
  chosen_spanish_reading: cosa dedicada a destrucción
  alternative_spanish_readings:
  - la cosa bajo anatema
  - la cosa devotada
  - cosa consagrada para destrucción
  rationale: El término no designa solo una abstracción cultual, sino una realidad bajo dedicación irrevocable que aquí conlleva juicio y destrucción. La opción elegida hace explícita esa carga semántica sin recurrir a un tecnicismo tradicional que podría oscurecer el sentido.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se mantiene la decisión doctrinal del proyecto de transliterar el Nombre divino en vez de sustituirlo por un título. «Yahvé» es la forma española estable en este marco editorial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Coincide con el texto fuente y el audio de revisión: no se detectaron cambios necesarios en el repaso más reciente; se mantiene la estrategia de equivalencia óptima con transparencia léxica para חֵרֶם y el Nombre divino.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva la raíz verbal de ק-ד-ש con «consagra/consagraos» para mostrar el paralelismo del hebreo.
  - La repetición de «cosa dedicada a destrucción» refleja la reiteración de חֵרֶם en el versículo.
  - Se usa un singular corporativo («ti») para ישראל en concordancia con el hebreo, mientras el segundo mandato vuelve al plural («vosotros») al dirigirse al pueblo como conjunto.
