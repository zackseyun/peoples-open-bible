translation:
  language: es
  text: 'Y dijo Ezequías a Isaías[a]: «¿Qué señal habrá de que Yahvé me sanará y de que subiré a la casa de Yahvé al tercer día?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Yahvé». Literalmente, «la casa de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa hebrea con waw consecutiva se refleja naturalmente en español con una coordinación simple. «Y dijo» conserva el avance narrativo sin añadir interpretación temporal más fuerte que la del hebreo.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Jezequías
  lexicon: Nombre propio bíblico de uso estándar en español
  rationale: Se usa la forma bíblica habitual en español, clara y reconocible para la lectura eclesial.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición española «a» expresa el destinatario del discurso de manera natural y fiel.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  lexicon: Nombre propio bíblico de uso estándar en español
  rationale: Se conserva la forma española usual del nombre profético.
- source_word: מָה א֔וֹת
  english_pob_choice: What is the sign
  chosen_spanish: ¿Cuál será la señal
  alternatives_spanish:
  - ¿Qué señal
  lexicon: HALOT
  rationale: En español, la construcción interrogativa con artículo definido «la señal» suena más natural que una traducción palabra por palabra. «Cuál será» mantiene el valor de solicitud de confirmación futura en el contexto.
- source_word: א֔וֹת
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - prueba
  lexicon: HALOT
  rationale: «Señal» es el equivalente más natural y estable para אות en contextos de confirmación divina, conservando el sentido de indicador dado por Dios.
- source_word: כִּֽי יִרְפָּ֥א יְהוָ֖ה לִ֑/י
  english_pob_choice: that Yahweh will heal me
  chosen_spanish: de que Yahvé me sanará
  alternatives_spanish:
  - de que Yahvé me curará
  - porque Yahvé me sanará
  lexicon: HALOT
  rationale: El contenido de la señal se expresa en español con «de que», que introduce con claridad la cláusula dependiente. «Sanará» mantiene el sentido de curación divina; «me» absorbe naturalmente el valor de לִי.
- source_word: וְ/עָלִ֛יתִי
  english_pob_choice: and that I will go up
  chosen_spanish: y de que yo subiré
  alternatives_spanish:
  - y subiré
  - y de que subiré
  lexicon: HALOT
  rationale: «Subiré» refleja עלה, especialmente en la referencia cultual a ir al templo. Se conserva la coordinación con la cláusula anterior mediante «y de que».
- source_word: בַּ/יּ֥וֹם הַ/שְּׁלִישִׁ֖י
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - el tercer día
  lexicon: HALOT
  rationale: «Al tercer día» es la forma idiomática española más natural para el complemento temporal y comunica fielmente la expresión hebrea.
- source_word: בֵּ֥ית יְהוָֽה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahvé, el templo
  lexicon: HALOT
  rationale: Se conserva la expresión literal «casa de Yahvé», tal como el POB inglés retuvo «house of Yahweh». Se evita sustituirla por «templo» en el texto principal para no perder la imagen hebrea; la posible equivalencia cultual queda para nota.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. En coherencia con la postura del POB inglés, se preserva el nombre divino en transliteración, no una sustitución por título. «Yahvé» es la forma española estable del nombre.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Valor de בֵּית יְהוָה
  english_pob_reading: the house of Yahweh
  chosen_spanish_reading: la casa de Yahvé
  alternative_spanish_readings:
  - el templo de Yahvé
  rationale: El hebreo dice literalmente «casa de Yahvé». Traducirlo así conserva la imagen de morada/santuario sin borrar el vínculo lexical con el original. La lectura «templo» es válida como aclaración conceptual, pero no se adopta en el cuerpo principal porque el POB inglés también mantuvo la literalidad.
  doctrine_reference: Doctrina de transparencia léxica y mantenimiento de imagen bíblica
translation_notes:
  revision_awareness: El expediente inglés indica high_agreement, con cambios nulos en la última revisión. Esta versión española sigue de cerca el texto base y el audit trail, manteniendo la transparencia del nombre divino, la imagen de «casa de Yahvé» y la coordinación de las dos cláusulas introducidas por כִּי.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se prefiere «casa de Yahvé» en el texto principal y se aclara en nota la alternativa cultual «templo».
  - «Señal» se usa para אוֹת por ser el equivalente más natural y no excesivamente interpretativo en español.
  - La puntuación y la colocación de la nota siguen el patrón de cita directa con un solo llamado de nota en el destinatario.
