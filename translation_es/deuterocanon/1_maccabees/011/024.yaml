translation:
  language: es
  text: Y tomó plata y oro y ropa y muchos otros regalos, y fue al rey en Ptolemaida, y halló gracia delante de él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «halló favor con él». El griego dice literalmente «halló gracia delante de él».
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβὼν
  english_pob_choice: he took
  chosen_spanish: tomando
  alternatives_spanish:
  - habiendo tomado
  - después de tomar
  lexicon: LSJ
  rationale: El participio aoristo introduce una acción concomitante o previa a la principal. En español, «tomando» mantiene la secuencia narrativa con naturalidad sin añadir una subordinación más pesada.
- source_word: ἀργύριον
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  lexicon: LSJ
  rationale: El término básico es «plata»; en una lista de presentes junto con oro, la traducción literal conserva mejor el paralelismo material del griego.
- source_word: χρυσίον
  english_pob_choice: gold
  chosen_spanish: oro
  lexicon: LSJ
  rationale: Término material directo para el metal precioso, adecuado en el contexto de dones diplomáticos.
- source_word: ἱματισμόν
  english_pob_choice: clothing
  chosen_spanish: ropa
  alternatives_spanish:
  - vestidos
  - vestiduras
  lexicon: LSJ
  rationale: El griego designa ropa o prendas como parte del obsequio. «Ropa» es claro en español moderno y conserva el sentido general sin volverlo arcaico.
- source_word: ἕτερα ξένια πλείονα
  english_pob_choice: many other gifts
  chosen_spanish: muchos otros regalos
  alternatives_spanish:
  - muchos otros presentes
  - otros muchos regalos
  lexicon: LSJ
  rationale: ξένια alude a regalos vinculados con hospitalidad o intercambio diplomático; en este contexto «regalos» comunica su función de manera natural. «Muchos otros» refleja πλείονα y ἕτερα como elementos añadidos a los ya listados.
- source_word: ἐπορεύθη πρὸς τὸν βασιλέα εἰς Πτολεμαΐδα
  english_pob_choice: went to the king at Ptolemais
  chosen_spanish: se fue al rey en Ptolemaida
  alternatives_spanish:
  - fue al rey en Ptolemaida
  - viajó al rey en Ptolemaida
  lexicon: LSJ
  rationale: Se conserva la dirección hacia el rey y el destino geográfico. «Se fue» reproduce bien el movimiento narrativo; «en Ptolemaida» mantiene la referencia locativa, aunque en español podría sonar menos idiomática que «a Ptolemaida».
- source_word: εὗρεν χάριν ἐναντίον αὐτοῦ
  english_pob_choice: found favor before him
  chosen_spanish: halló gracia delante de él
  alternatives_spanish:
  - halló favor delante de él
  - ganó su favor
  lexicon: LSJ
  rationale: Se mantiene el giro idiomático del griego, que literalmente expresa «delante de él». «Gracia» sigue el eco bíblico del inglés POB y del uso tradicional, sin perder la posibilidad de entenderlo como favor. La nota aclara la alternativa semántica.
theological_decisions:
- issue: El giro χάριν ἐναντίον αὐτοῦ puede leerse como favor humano o como un modo idiomático de decir aceptación favorable.
  english_pob_reading: found favor before him
  chosen_spanish_reading: halló gracia delante de él
  alternative_spanish_readings:
  - halló favor delante de él
  - ganó su favor
  rationale: 'No hay una cuestión doctrinal intensa, pero sí una tensión lexical: el griego usa una expresión idiomática muy cercana a «delante de él». Se preserva esa forma y se admite en nota la equivalencia natural «con él / su favor» sin borrar el matiz del original.'
  doctrine_reference: Uso idiomático bíblico; sin implicación doctrinal directa.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alta concordancia. No se detectan revisiones aplicadas; la decisión principal consiste en mantener la imagen idiomática de χάριν ἐναντίον αὐτοῦ en español con una nota que preserve la alternativa más natural.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio como equivalente narrativo de καὶ, con ritmo bíblico pero español moderno.
  - «Ptolemaida» se usa como forma española corriente del topónimo.
  - «Gracia» se reserva aquí para reproducir el giro idiomático, no como afirmación teológica específica.
