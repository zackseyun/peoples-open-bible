  text: Πᾶς ὁ ποιῶν τὴν ἁμαρτίαν καὶ τὴν ἀνομίαν ποιεῖ, καὶ ἡ ἁμαρτία ἐστὶν ἡ ἀνομία.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/003/004.yaml
  text: Everyone who practices sin also practices lawlessness[b][a], and sin is lawlessness.
  footnotes:
  - marker: a
    text: Or 'Everyone who does sin also does lawlessness'; the Greek present forms can be rendered more literally as 'does,' but here 'practices' brings out the characteristic or ongoing sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'sin is the lawlessness.' Greek uses the article with both nouns, but idiomatic English usually omits it in this kind of definitional statement.
    reason: lexical_alternative
translation:
