translation:
  language: es
  text: 'La mujer concibió[a], y mandó decirle a David[b]: «Estoy embarazada».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «La mujer quedó embarazada».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo simplemente «envió»; el sentido es que envió un mensaje a David.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר
  english_pob_choice: conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó embarazada
  - se embarazó
  lexicon: HALOT
  rationale: El hebreo הרה expresa el hecho de concebir/quedar encinta. «Concibió» conserva el valor eventivo de manera breve y fiel, y evita añadir una formulación más explicativa que el texto no exige.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: אִשָּׁה puede significar «mujer» o «esposa». Aquí el hebreo dice simplemente «la mujer»; «la esposa» introduciría una precisión relacional que no está expresada en esta cláusula.
- source_word: וַתִּשְׁלַח
  english_pob_choice: sent word
  chosen_spanish: envió a decir
  alternatives_spanish:
  - envió
  - envió un mensaje
  lexicon: HALOT
  rationale: El verbo literalmente es «envió», pero en este contexto el sentido es enviar una comunicación a David. «Envió a decir» preserva el movimiento básico del hebreo y hace explícita la dimensión comunicativa sin interpretar de más.
- source_word: וַתַּגֵּד
  english_pob_choice: told
  chosen_spanish: a decir
  alternatives_spanish:
  - contó
  - informó
  lexicon: HALOT
  rationale: נגד en hifil significa decir, declarar, informar. En español, unido a «envió», la construcción natural es «envió a decir», que reproduce la función de comunicar el mensaje a David.
- source_word: לְדָוִד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: N/A
  rationale: Se mantiene el nombre propio sin cambios, como corresponde a la práctica del proyecto.
- source_word: הָרָה אָנֹכִי
  english_pob_choice: I am pregnant
  chosen_spanish: Estoy embarazada
  alternatives_spanish:
  - He concebido
  - Estoy encinta
  lexicon: HALOT
  rationale: 'הָרָה con אָנֹכִי expresa un estado presente: «estoy embarazada/encinta». «Estoy embarazada» es la forma moderna más clara y natural en español; «he concebido» desplaza el foco al acto anterior y no al estado actual.'
translation_notes:
  revision_awareness: 'El texto sigue el consenso alto del control cruzado y mantiene las decisiones léxicas ya documentadas en el audit trail inglés: concepción expresada por הרה, mujer por אִשָּׁה, y el envío de un mensaje por שׁלח + נגד. No se introducen cambios sustantivos respecto de la revisión más reciente.'
  spanish_consistency_notes:
  - Se conserva el paralelismo narrativo del hebreo con una sola oración coordinada.
  - «Estoy embarazada» refleja el estado presente, no el proceso de concebir.
  - La nota sobre «envió a decir» preserva la leve tensión entre el envío literal y el valor idiomático de la acción comunicativa.
