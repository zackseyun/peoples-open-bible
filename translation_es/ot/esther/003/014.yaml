  text: פַּתְשֶׁ֣גֶן הַ/כְּתָ֗ב לְ/הִנָּ֤תֵֽן דָּת֙ בְּ/כָל מְדִינָ֣ה וּ/מְדִינָ֔ה גָּל֖וּי לְ/כָל הָֽ/עַמִּ֑ים לִ/הְי֥וֹת עֲתִדִ֖ים לַ/יּ֥וֹם הַ/זֶּֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/esther/003/014.yaml
  text: A copy of the document was to be issued as law in every province[a], being made known to all the peoples[b], so that they would be ready for this day.
  footnotes:
  - marker: a
    text: Or 'in each and every province.' The Hebrew repeats 'province' distributively for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'for that day,' referring to the specified day set by the decree.
    reason: lexical_alternative
