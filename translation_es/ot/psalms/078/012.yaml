translation:
  language: es
  text: Delante de[a] sus padres hizo maravillas en la tierra de Egipto, en los campos de Zoán[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En presencia de sus padres».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «campo de Zoán», probablemente refiriéndose a los alrededores o a la región de Zoán.'
    reason: cultural_note
lexical_decisions:
- source_word: נֶגֶד
  english_pob_choice: Before
  chosen_spanish: Delante de
  alternatives_spanish:
  - En presencia de
  - Ante
  lexicon: HALOT
  rationale: La idea es de ubicación/presencia “frente a” o “a la vista de” los padres. “Delante de” conserva bien esa relación espacial y resulta natural en español.
- source_word: אֲבוֹתָם
  english_pob_choice: their fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - sus padres [lit. sus padres/fathers]
  lexicon: HALOT
  rationale: En español, “padres” puede conservar la referencia a los antepasados/patriarcas sin sonar tan rígido como una calca. Mantiene el vínculo familiar y pactual del hebreo.
- source_word: עָשָׂה פֶלֶא
  english_pob_choice: he did wonders
  chosen_spanish: hizo maravillas
  alternatives_spanish:
  - hizo prodigios
  - hizo milagros
  lexicon: HALOT
  rationale: La combinación verbal con el sustantivo expresa obras extraordinarias. “Maravillas” reproduce bien el valor colectivo de פֶלֶא sin cargar la frase con un tecnicismo más interpretativo como “milagros”.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: Se conserva “tierra” porque el hebreo la explicita; eso mantiene la concreción geográfica del original.
- source_word: שְׂדֵה צֹעַן
  english_pob_choice: in the fields of Zoan
  chosen_spanish: en los campos de Zoán
  alternatives_spanish:
  - en la región de Zoán
  - en el campo de Zoán
  lexicon: HALOT
  rationale: El hebreo dice literalmente “campo de Zoán”. En español, el plural “campos” comunica mejor una zona o extensión territorial, como en la lectura auditada inglesa.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide sustancialmente con la auditoría inglesa: mantiene la presencia “delante de” los padres, conserva “tierra de Egipto” y refleja el valor territorial de “campo(s) de Zoán” con una nota explicativa.'
  spanish_consistency_notes:
  - Se evitó “SEÑOR” o “Cristo” porque no aparecen en este versículo.
  - “Zoán” se translitera con acento gráfico en español.
  - “Maravillas” se eligió por naturalidad y por conservar el matiz de obras extraordinarias sin añadir interpretación doctrinal.
