theological_decisions:
- issue: Referent of the singular suffixes for threatened judgment
  chosen_reading: Render the 3ms suffixes as singular ('him'/'he') to reflect Israel as a collective singular nation.
  alternative_readings:
  - Render plurally as 'them'/'they' for natural English
  rationale: The Hebrew uses singular pronominal suffixes for the people as a corporate entity. Preserving the singular maintains the rhetoric of God addressing Israel as one nation while still being understandable in English.
  doctrine_reference: Translation philosophy §5 (consistency/documented exception) and §6 (readable modern English)
- issue: Force of ירשׁ in this context
  chosen_reading: Translate as 'dispossess' in the main text, with 'disinherit' preserved in a footnote.
  alternative_readings:
  - disinherit
  rationale: The context includes covenantal inheritance overtones, but the immediate threat is removal/replacement of the nation. 'Dispossess' is slightly broader and less interpretively loaded, while 'disinherit' remains important enough to preserve as an alternative.
  doctrine_reference: Translation philosophy §3 (preserve tension where ambiguity is genuine)
