revisions:
- from: Una multitud de camellos te cubrirá[a], los camellos jóvenes de Madián y de Efa; todos ellos vendrán de Saba. Traerán oro e incienso[b], y proclamarán las alabanzas de Yahvé.
  to: Una multitud de camellos te cubrirá[a], los camellos jóvenes de Madián y Efa; todos ellos vendrán de Saba. Llevarán oro y olíbano, y proclamarán las alabanzas de Yahvé[b].
  rationale: 'Se revisa para preservar con mayor fidelidad dos decisiones léxicas clave del hebreo y del rastro POB: לְבוֹנָה como ''olíbano'' en lugar de ''incienso'', e יִשָּׂאוּ como ''llevarán'' en lugar de ''traerán''. También se corrige la nota [a] para que refleje la alternativa lexical documentada (''dromedarios''). Se mantiene el resto del texto porque es fiel, claro y bien alineado con el uso del nombre divino ''Yahvé''.'
  reviewer_model: gpt-5.4
