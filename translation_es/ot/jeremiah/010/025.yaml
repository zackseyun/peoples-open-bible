review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura de oración imprecatoria, conserva la repetición de los verbos de destrucción y traduce adecuadamente la mayor parte del sentido hebreo. Sin embargo, se aparta de una decisión léxica significativa del POB auditado en מִשְׁפָּחוֹת: el inglés fijó ''clans'' por su fuerza de grupos de parentesco en paralelo con ''nations'', mientras que ''familias'' en español tiende a sonar más doméstico e individual. También conviene alinear חֲמָתְךָ con ''ira'' más que ''furor'' para una equivalencia más estándar y clara en español bíblico contemporáneo.'
  spanish_quality_summary: El texto es claro, natural y digno en español. 'Derrama', 'invocan', 'devorado', 'consumido' y 'han asolado su morada' funcionan bien. El único ajuste de legibilidad/fidelidad importante es cambiar 'familias' por 'clanes', que suena perfectamente inteligible en este contexto y preserva mejor la unidad social del hebreo. 'Ira' también ofrece mejor equilibrio entre claridad y registro que 'furor'.
  glossary_alignment: No hay conflicto con los términos de proyecto como Yahvé/Mesías. La principal alineación pendiente es respetar la decisión contextual de מִשְׁפָּחוֹת -> 'clanes' en vez de 'familias'. El resto del vocabulario clave permanece bien alineado con el audit trail.
  issues:
  - severity: medium
    issue: מִשְׁפָּחוֹת se tradujo como 'familias' en lugar de 'clanes'.
    rationale: El audit trail inglés escogió 'clans' para preservar el sentido de agrupaciones de parentesco en paralelo con 'nations'. En español, 'familias' puede reducirse a hogares o familias nucleares y debilita el alcance sociopolítico del hebreo.
  - severity: low
    issue: חֲמָתְךָ se tradujo como 'furor' en lugar de 'ira'.
    rationale: '''Furor'' no es incorrecto, pero ''ira'' comunica con más transparencia la fuerza judicial de חֵמָה y se alinea mejor con el registro bíblico general en español neutral sin sonar excesivamente literario.'
  revised_spanish_text: Derrama tu ira sobre las naciones que no te conocen, y sobre los clanes que no invocan tu nombre; porque han devorado a Jacob, sí, lo han devorado y consumido, y han asolado su morada.
  revision_rationale: Se ajusta 'furor' a 'ira' para una equivalencia más estándar y transparente de חֲמָה, y 'familias' a 'clanes' para preservar la decisión léxica documentada del POB sobre מִשְׁפָּחוֹת como grupos de parentesco en paralelo con 'naciones'. No se requieren notas al pie nuevas, porque el español revisado expresa el sentido principal sin introducir ambigüedad adicional.
