  to: 'Entonces el hombre se levantó para irse, él, su concubina y su criado[a]; pero su suegro, el padre de la joven, le dijo: «Mira, por favor, el día declina hacia el atardecer. Te ruego que pases la noche. Mira, el día está por terminar. Quédate aquí a pasar la noche, y que se alegre tu corazón. Mañana madrugarán para continuar su camino, y tú irás a tu tienda[b]».'
  rationale: Se corrige 'su joven' a 'su criado' por legibilidad y fidelidad contextual en español, manteniendo la alternativa en nota. Se suavizan algunos calcos ('Mira ahora', 'para su camino') para un español más natural. Se conserva la literalidad de 'tu tienda' con nota, y se mantiene la distinción hebrea entre el grupo ('madrugarán') y el destinatario principal ('tú irás').
