review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura y el sentido del griego: futuro verbal («daré»), pareja «prodigios ... señales», contraste cósmico entre cielo y tierra, y la secuencia concreta «sangre y fuego y vapor de humo». Sin embargo, «en el cielo arriba» y «en la tierra abajo» suenan poco naturales en español. El original exige mantener ἄνω/κάτω, pero conviene expresarlo con una formulación idiomática que preserve el paralelismo vertical.'
  spanish_quality_summary: La redacción es generalmente fiel y clara, pero hay una aspereza sintáctica innecesaria en «en el cielo arriba ... en la tierra abajo». Una mejora menor a «en el cielo, arriba, ... sobre la tierra, abajo,» o equivalente puede mantener la literalidad sin sonar antinatural. Además, la nota al pie actual es redundante porque repite exactamente la lectura principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Prodigios», «señales», «cielo», «tierra», «sangre», «fuego» y «vapor de humo» son adecuados. La conservación de «vapor de humo» está bien alineada con el audit trail inglés revisado y con la decisión léxica documentada.
  issues:
  - severity: medium
    issue: 'Expresión poco natural: «en el cielo arriba» / «en la tierra abajo»'
    rationale: Aunque refleja de cerca ἄνω/κάτω, en español suena forzado. El contraste vertical debe mantenerse, pero con una sintaxis más idiomática.
  - severity: low
    issue: Nota al pie redundante
    rationale: 'La nota dice «O más literalmente: “vapor de humo”», pero el texto principal ya dice exactamente «vapor de humo». No preserva una alternativa real ni aclara una ambigüedad nueva en español.'
  revised_spanish_text: 'Y daré prodigios en el cielo, arriba, y señales sobre la tierra, abajo: sangre y fuego y vapor de humo.'
  revised_footnotes: []
  revision_rationale: Se ajusta la sintaxis de las expresiones locativas para que el español sea más natural sin perder ἄνω/κάτω ni el paralelismo cósmico del original. Se elimina la nota al pie porque repite literalmente el texto principal y no aporta una alternativa significativa.
