base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/027/005.yaml
  text: Then David said to Achish[a], “If I have now found favor in your eyes, let them give me a place in one of the towns in the countryside, so that I may live there[c][b]. For why should your servant live with you in the royal city?”
  footnotes:
