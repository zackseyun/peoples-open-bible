translation:
  language: es
  text: Me has abandonado, declara Yahvé; sigues yendo hacia atrás.[a] Por eso he extendido mi mano contra ti y te he destruido; estoy cansado de ceder.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sigues volviéndote atrás» / «vas hacia atrás». El hebreo dice literalmente «hacia atrás vas», usando una imagen de movimiento para la apostasía.
    reason: lexical_alternative
  - marker: b
    text: O «de cambiar de parecer» / «de desistir de castigar». El verbo hebreo puede referirse a retirar o suavizar un juicio ya anunciado; no implica arrepentimiento moral en Dios.
    reason: theological_note
lexical_decisions:
- source_word: נָטַשְׁתְּ
  english_pob_choice: have forsaken
  chosen_spanish: me has abandonado
  alternatives_spanish:
  - me has dejado
  - me has rechazado
  lexicon: HALOT
  rationale: נטשׁ expresa dejar, abandonar o forsake. «Abandonado» conserva mejor la fuerza relacional y de pacto que un simple «dejado».
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: נְאֻם es una fórmula profética de enunciado solemne. «Declara Yahvé» sigue el registro natural de la revisión inglesa y mantiene la presentación directa del nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el Tetragrámaton como nombre propio, siguiendo la norma del proyecto, no como sustitución titulativa.
- source_word: אָח֣וֹר תֵּלֵ֑כִי
  english_pob_choice: you keep going backward
  chosen_spanish: tú sigues yendo hacia atrás
  alternatives_spanish:
  - vas hacia atrás
  - sigues retrocediendo
  - te vuelves atrás
  lexicon: HALOT
  rationale: La imagen literal es de movimiento hacia atrás. «Sigues yendo hacia atrás» conserva la metáfora espacial de apostasía sin reducirla a una paráfrasis idiomática.
- source_word: וָאַ֨ט אֶת יָדִ֤י עָלַ֨יִךְ
  english_pob_choice: I have stretched out my hand against you
  chosen_spanish: he extendido mi mano contra ti
  alternatives_spanish:
  - he alargado mi mano contra ti
  - he tendido mi mano contra ti
  lexicon: HALOT
  rationale: נטה se entiende como extender/tender. «He extendido mi mano» reproduce la acción y «contra ti» explicita el valor hostil del hebreo en contexto judicial.
- source_word: וָאַשְׁחִיתֵךְ
  english_pob_choice: and destroyed you
  chosen_spanish: y te he destruido
  alternatives_spanish:
  - y te he arruinado
  - y te he llevado a la ruina
  lexicon: HALOT
  rationale: שׁחת en causativo expresa destruir o arruinar. «Destruido» corresponde a la severidad del juicio en el pasaje.
- source_word: נִלְאֵיתִי
  english_pob_choice: I am weary
  chosen_spanish: estoy cansado
  alternatives_spanish:
  - me he cansado
  - estoy agotado
  lexicon: HALOT
  rationale: לאה denota cansancio o agotamiento. «Estoy cansado» es claro y natural en español, conservando la queja divina.
- source_word: הִנָּחֵם
  english_pob_choice: of relenting
  chosen_spanish: de relentarme
  alternatives_spanish:
  - de arrepentirme
  - de cambiar de parecer
  - de desistir de castigar
  lexicon: HALOT
  rationale: נחם aquí se refiere a relentar respecto del juicio anunciado, no a arrepentimiento moral. Se elige una forma que preserve la tensión teológica sin suplantarla.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La línea editorial del proyecto exige preservar el nombre personal divino. «Yahvé» mantiene transparencia y coherencia con el texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: הִנָּחֵם aplicado a Dios
  english_pob_reading: relenting
  chosen_spanish_reading: relentarme
  alternative_spanish_readings:
  - arrepentirme
  - cambiar de parecer
  - tener compasión
  rationale: El contexto habla del juicio anunciado y de la retirada o suspensión de ese juicio. «Relentarme» intenta preservar esa tensión; se evita «arrepentirme» por su carga moral en español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue de cerca el tramo revisado del audit trail inglés («declares the LORD» → «declara Yahvé») y conserva la decisión doctrinal de no traducir הִנָּחֵם como «arrepentirse». Se ajusta el español para que suene publicable sin perder la imagen espacial y judicial del hebreo.
  spanish_consistency_notes:
  - Se mantiene Yahvé como traducción de יְהוָה, conforme al estándar del proyecto.
  - «Contra ti» explicita el valor adversativo de la mano extendida en contexto de juicio.
  - Se evita «SEÑOR» para no ocultar el nombre divino.
  - Se conserva la metáfora de retroceso con «hacia atrás» en vez de una paráfrasis interpretativa.
  - La forma «de relentarme» es intencionalmente poco común para reflejar la tensión léxica de נחם en relación con Dios.
