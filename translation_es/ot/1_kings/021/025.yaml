- from: Ciertamente no hubo nadie como Acab, que se vendió a sí mismo para hacer lo malo ante los ojos de Yahvé, porque Jezabel, su esposa, lo incitaba.
  to: Ciertamente no hubo nadie como Acab, que se vendió para hacer lo malo a los ojos de Yahvé, porque Jezabel, su esposa, lo incitó.
  rationale: Se ajusta el verbo final a pretérito («lo incitó») para reflejar mejor el perfecto hebreo; se naturaliza el modismo a «a los ojos de Yahvé»; y se aligera «se vendió a sí mismo» a «se vendió» sin perder la imagen metafórica fuerte del original.
