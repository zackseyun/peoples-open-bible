revisions:
- from: 'Entonces aconteció[a], cuando David habitaba en su casa, que David dijo a Natán el profeta: «Mira, yo habito en una casa de cedro, pero el arca del pacto de Yahvé está debajo de cortinas».'
  to: 'Y sucedió[a] que, cuando David vivía en su casa, David dijo a Natán el profeta: «Mira, yo vivo en una casa de cedro, pero el arca del pacto de Yahvé está bajo cortinas».'
  rationale: Se ajusta la apertura narrativa a una formulación más natural en español («Y sucedió»), se mejora la fluidez de la repetición verbal con «vivía ... vivo», y se reemplaza «debajo de cortinas» por «bajo cortinas» para mayor idiomaticidad, sin alterar el sentido del hebreo ni las decisiones terminológicas del proyecto.
