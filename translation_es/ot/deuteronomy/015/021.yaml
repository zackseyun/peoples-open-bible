revisions:
- from: Pero si tiene un defecto—a saber, cojo[a] o ciego, cualquier defecto malo—no lo sacrificarás a Yahvé tu Dios.
  to: Pero si tiene un defecto—si es cojo o ciego, cualquier defecto malo[a]—no lo sacrificarás a Yahvé tu Dios.
  rationale: Se elimina «a saber» por no corresponder a la fuente, se reubica correctamente la nota al sintagma que realmente comenta, y se conserva la decisión léxica cercana al hebreo/POB para «cualquier defecto malo» con apoyo aclaratorio en nota. La estructura con rayas refleja bien la enumeración parentética del original sin añadir explicación.
