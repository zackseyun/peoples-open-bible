    text: O «su propio santuario» o «su propio templo»; el griego dice «lugar», pero el contexto probablemente se refiere al lugar santo preservado de la profanación.
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación mínima para expresar mejor ἀμίαντον con un matiz de pureza cultual y ausencia de profanación: «sin contaminación» comunica mejor el sentido que «sin mancha». Se conserva el resto del texto, incluida la nota sobre «lugar/santuario/templo», porque refleja fielmente el griego y el razonamiento documentado del POB.'
