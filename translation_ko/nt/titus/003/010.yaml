  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: αἱρετικὸν ἄνθρωπον μετὰ μίαν καὶ δευτέραν νουθεσίαν παραιτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/titus/003/010.yaml
  text: Reject a divisive person after a first and second warning,[a]
  footnotes:
  - marker: a
    text: Or 'factious' or, in traditional renderings, 'heretical man.' The Greek term likely refers to a person who creates sectarian division.
    reason: lexical_alternative
translation:
  language: ko
  text: 분파를 일으키는 사람[a]은 한 번과 두 번 권고한 뒤에 멀리하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「파당적인 사람」, 또는 전통적으로 「이단자」. 헬라어 αἱρετικός는 분파적 분열을 일으키는 자를 가리키는 것으로 보인다.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἱρετικὸν ἄνθρωπον
  english_pob_choice: a divisive person
  chosen_korean: 분파를 일으키는 사람
  alternatives_korean:
  - 파당적인 사람
  - 이단자
  - 분열을 일으키는 자
  lexicon: BDAG
  rationale: αἱρετικός의 본뜻은 αἵρεσις(파당·분파)를 만드는 자. 후대 「이단(heresy)」 어감으로 굳어지기 전의 의미. 영어 POB의 「divisive」를 따라 「분파를 일으키는」으로 옮겨, 「이단자」의 후대적 함의를 본문에서 피하고 각주에 둔다.
- source_word: μετὰ μίαν καὶ δευτέραν νουθεσίαν
  english_pob_choice: after a first and second warning
  chosen_korean: 한 번과 두 번 권고한 뒤에
  alternatives_korean:
  - 한 번 두 번 훈계한 후에
  - 첫 번째와 두 번째 경고 후에
  lexicon: BDAG
  rationale: νουθεσία는 「훈계·권고」. 단순 「경고」보다 양육적 권면의 어감이 있다. 한국어 「권고」가 그 균형을 살린다.
- source_word: παραιτοῦ
  english_pob_choice: Reject
  chosen_korean: 멀리하십시오
  alternatives_korean:
  - 거절하십시오
  - 끊어 내십시오
  lexicon: BDAG
  rationale: παραιτέομαι(중간태)는 「거절하다·물리치다·관계를 끊다」. 3:9의 「멀리하십시오」와 일관성 있는 한편, 본문에서는 사람에 대한 단호한 거리두기. 「멀리하다」가 그 균형을 살린다.
