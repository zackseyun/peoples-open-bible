translation:
  language: es
  text: 'La quinta vía: ven que la morada de los otros es guardada por ángeles.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Quinta uia
  english_pob_choice: The fifth way
  chosen_spanish: La quinta vía
  alternatives_spanish:
  - El quinto camino
  - La quinta manera
  lexicon: via
  rationale: Mantengo «vía» porque el latín usa uia y la POB inglesa conserva «way» con valor estructural y enumerativo. «Camino» sería natural en español, pero «vía» refleja mejor el registro del original y la serie retórica de las vías.
- source_word: uidentes
  english_pob_choice: they see
  chosen_spanish: ven
  alternatives_spanish:
  - ven
  - ellos ven
  lexicon: videre
  rationale: El participio latino expresa percepción directa; en español «ven» es la forma más natural y fiel. Omito el sujeto explícito porque el contexto ya lo identifica y el español lo permite sin pérdida.
- source_word: aliorum habitaculum
  english_pob_choice: the dwelling place of the others
  chosen_spanish: la morada de los otros
  alternatives_spanish:
  - el lugar de morada de los otros
  - la habitación de los otros
  lexicon: habitaculum
  rationale: «Habitaculum» es singular, como muestra la revisión aceptada, y designa un lugar de habitar. «Morada» comunica bien el sentido sin cargarlo con un tecnicismo moderno; «habitación» podría sonar a cuarto y perder el valor colectivo.
- source_word: ab angelis conseruari
  english_pob_choice: guarded by angels
  chosen_spanish: es guardada por ángeles
  alternatives_spanish:
  - es custodiada por ángeles
  - la guardan ángeles
  lexicon: conservare
  rationale: El latín passive conseruari indica preservación/guardia. «Guardada» reproduce el matiz de custodia de la POB inglesa y es idiomático en español. «Custodiada» sería posible, pero «guardada» mantiene la simpleza del texto.
theological_decisions:
- issue: Singular vs. plural of the dwelling place
  english_pob_reading: the habitation/dwelling place of the others
  chosen_spanish_reading: la morada de los otros
  alternative_spanish_readings:
  - las moradas de los otros
  - las habitaciones de los otros
  rationale: La revisión del audit trail aclara que el latín dice habitaculum singular, no plural. Por eso preservo el singular en español y evito «moradas» o «habitaciones», que oscurecerían la distinción con el pasaje previo donde sí aparece plural.
  doctrine_reference: 4 Esdras 7:85; revisión textual adjudicada 2026-04-22
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se mantiene el singular de habitaculum («morada» / «dwelling place») y se omite cualquier añadido ajeno al latín proporcionado, como «en gran silencio».'
  spanish_consistency_notes:
  - He conservado el encabezado enumerativo «La quinta vía» para reflejar la estructura del original y la POB inglesa.
  - He evitado términos eclesiásticos más cargados como «mansión» o «habitación» en el sentido moderno, porque el latín habitaculum pide un término amplio de morada o vivienda.
  - El pasivo «es guardada» mantiene el valor de protección/preservación de conseruari sin introducir agente adicional.
