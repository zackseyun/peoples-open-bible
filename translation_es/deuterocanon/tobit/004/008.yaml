translation:
  language: es
  text: Cuanto tengas[a], según tu abundancia, da limosna de tus bienes; y si tienes poco, según ese poco no temas dar limosna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Según lo que tienes, en proporción a tu abundancia, da limosna de tus bienes».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς σοι ὑπάρχει
  english_pob_choice: As much as you have
  chosen_spanish: Cuanto tengas
  alternatives_spanish:
  - Según lo que tienes
  - Todo lo que tengas
  lexicon: BDAG
  rationale: La frase marca la medida de lo disponible. «Cuanto tengas» conserva la relación directa con lo poseído y suena natural en español, sin perder el sentido cuantitativo del griego.
- source_word: κατὰ τὸ πλῆθος
  english_pob_choice: according to your abundance
  chosen_spanish: según tu abundancia
  alternatives_spanish:
  - en proporción a tu abundancia
  - según la cantidad que tengas
  lexicon: BDAG
  rationale: κατά con acusativo expresa proporcionalidad, y πλῆθος aquí apunta a abundancia o gran cantidad de bienes. «Según tu abundancia» mantiene ese valor proporcional de manera clara.
- source_word: ποίησον ἐξ αὐτῶν ἐλεημοσύνην
  english_pob_choice: give alms from it
  chosen_spanish: da limosna de ello
  alternatives_spanish:
  - haz limosna de ello
  - da limosnas de ello
  lexicon: BDAG
  rationale: En este contexto judío-griego, ἐλεημοσύνη se refiere específicamente a la limosna, es decir, al auxilio dado a los necesitados. «Da limosna» preserva el sentido concreto de la acción; «de ello» traduce ἐξ αὐτῶν como procedente de los bienes poseídos.
- source_word: ἐὰν ὀλίγον σοι ὑπάρχῃ
  english_pob_choice: if you have little
  chosen_spanish: si tienes poco
  alternatives_spanish:
  - si poco tienes
  - si apenas tienes
  lexicon: BDAG
  rationale: La cláusula contrasta con la abundancia anterior. «Si tienes poco» reproduce de forma breve y fiel la idea de medios limitados.
- source_word: κατὰ τὸ ὀλίγον
  english_pob_choice: according to that little
  chosen_spanish: según ese poco
  alternatives_spanish:
  - en proporción a ese poco
  - según lo poco que tengas
  lexicon: BDAG
  rationale: La repetición de κατά vuelve a señalar proporcionalidad. «Según ese poco» mantiene el paralelismo con «según tu abundancia» y conserva la referencia al escaso recurso disponible.
- source_word: μὴ φοβοῦ ποιεῖν ἐλεημοσύνην
  english_pob_choice: do not be afraid to give alms
  chosen_spanish: no temas dar limosna
  alternatives_spanish:
  - no tengas miedo de dar limosna
  - no dudes en dar limosna
  lexicon: BDAG
  rationale: φοβοῦ significa literalmente «temer», pero aquí exhorta a no retraerse de la generosidad por falta de recursos. «No temas dar limosna» conserva la fuerza literal y es natural en español.
theological_decisions:
- issue: Rendering of ἐλεημοσύνη
  english_pob_reading: alms / give alms
  chosen_spanish_reading: limosna / dar limosna
  alternative_spanish_readings:
  - caridad
  - obras de misericordia
  rationale: En Tobit, ἐλεημοσύνη designa de modo concreto el acto de dar a los necesitados. «Limosna» conserva esa práctica específica y el vínculo temático del libro con el socorro material.
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden de forma alta; no se requieren revisiones sustantivas. Se mantuvo la estructura paralela de abundancia/poco y la referencia concreta a la limosna.
  spanish_consistency_notes:
  - Se emplea «limosna» para ἐλεημοσύνη de manera consistente con el valor técnico del libro.
  - Se mantuvo el paralelismo «según tu abundancia / según ese poco» para conservar la proporcionalidad del griego.
  - Se evitó «caridad» por ser más abstracto y menos preciso para el acto concreto descrito.
