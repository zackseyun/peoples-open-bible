review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: «o cuando», «un hombre», «un espíritu de celos», la presentación de la mujer ante Yahvé, y la acción ritual del sacerdote. También preserva correctamente la ambigüedad de רוּחַ. Sin embargo, falla en un punto léxico importante: כָּל הַתּוֹרָה הַזֹּאת no debe traducirse como «todo este mandamiento», ya que תּוֹרָה aquí apunta a la ley/instrucción/procedimiento completo, no a un mandamiento singular. Además, la nota [b] está anclada a «Yahvé» pero su contenido trata de «todo este mandamiento / procedimiento / rito», por lo que el anclaje es incorrecto.'
  spanish_quality_summary: El español es mayormente claro y digno. «Sobreviene» y «presenta a la mujer delante de Yahvé» son naturales. «Y él siente celos de su esposa» es legible, aunque algo más interpretativo que «está celoso de»; no exige cambio. «Le hará a ella» suena algo pesado, pero es aceptable en contexto formal. El principal problema de legibilidad y precisión es «todo este mandamiento», que suena demasiado estrecho y no corresponde bien al sentido ritual-legal del hebreo.
  glossary_alignment: Se respeta la forma proyectual «Yahvé». «Espíritu» para רוּחַ está bien conservado. No hay conflictos con otros términos base del glosario. La divergencia principal es término-clave תּוֹרָה, que aquí debe alinearse mejor con «ley» o, secundariamente, «procedimiento/rito» en nota, no «mandamiento».
  issues:
  - severity: high
    issue: «todo este mandamiento» traduce mal כָּל הַתּוֹרָה הַזֹּאת
    rationale: תּוֹרָה en este contexto designa la ley/instrucción/procedimiento entero prescrito, no un mandamiento individual. «Mandamiento» estrecha indebidamente el sentido y además se aparta del audit trail inglés revisado, que optó por «all this law».
  - severity: high
    issue: La nota [b] está colocada en «Yahvé» pero explica una alternativa de הַתּוֹרָה הַזֹּאת
    rationale: Las notas deben anclarse exactamente al término pertinente. Aquí el contenido de la nota corresponde a la frase final, no al nombre divino.
  - severity: low
    issue: La nota [a] repite la frase principal en vez de ofrecer solo la alternativa relevante
    rationale: 'No es un error grave, pero podría afinarse para reflejar mejor la nota inglesa: alternativa idiomática y literal «pasa sobre él».'
  revised_spanish_text: o cuando un espíritu de celos[a] sobreviene a un hombre, y él siente celos de su esposa, y presenta a la mujer delante de Yahvé, y el sacerdote le hará a ella toda esta ley[b].
  revised_footnotes:
