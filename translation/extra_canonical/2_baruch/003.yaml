theological_decisions:
- issue: Identity of “my mother”
  chosen_reading: Baruch speaks of Jerusalem/Zion as “my mother.”
  alternative_readings:
  - The phrase refers more generally to the nation
  - The phrase should be paraphrased as “my city” in the main text
  rationale: The maternal metaphor is central to the lament and fits Jewish city-personification language. Keeping it preserves both grief and covenant intimacy.
- issue: Force of Baruch’s plea to die first
  chosen_reading: Baruch asks to be taken in death before he witnesses Jerusalem’s fall.
  alternative_readings:
  - He asks only for removal from the scene
  - He asks for an ecstatic visionary withdrawal
  rationale: The language of taking his spirit and going to his fathers points most naturally to death, framed as lament rather than rebellion.
- issue: Meaning of the cosmic questions in verses 7-8
  chosen_reading: Baruch’s words are rhetorical crisis-language asking whether judgment means a collapse of the created moral order and human story.
  alternative_readings:
  - A literal prediction of cosmic annihilation
  - A merely exaggerated emotional outburst with no theological content
  rationale: The questions escalate from Jerusalem’s ruin to covenant memory, Torah transmission, and finally creation itself. The rhetoric is apocalyptic and theological, not casual hyperbole.
