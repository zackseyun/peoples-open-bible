translation:
  language: es
  text: Me cercas por detrás y por delante[a], y pones tu mano sobre mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me rodeas» o «me asedias»; el verbo hebreo puede llevar aquí un matiz neutral o protector, o uno más apremiante, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָחוֹר
  english_pob_choice: behind
  chosen_spanish: por detrás
  alternatives_spanish:
  - detrás
  - atrás
  lexicon: HALOT
  rationale: El término es espacial y se opone a קֶדֶם; «por detrás» mantiene la imagen direccional de manera natural en español sin perder el paralelismo con «por delante».
- source_word: קֶדֶם
  english_pob_choice: before
  chosen_spanish: por delante
  alternatives_spanish:
  - delante
  - en frente
  lexicon: HALOT
  rationale: En esta pareja antitética conviene un sentido espacial, no temporal. «Por delante» reproduce bien el contraste con «por detrás» en español moderno.
- source_word: צַרְתָּנִי
  english_pob_choice: hem me in
  chosen_spanish: me ciñes
  alternatives_spanish:
  - me rodeas
  - me encierras
  - me cercas
  lexicon: HALOT
  rationale: El verbo puede expresar encerrar/apretar/ceñir. «Me ciñes» conserva la idea de rodear estrechamente y, en español, también puede sugerir una presión ambivalente; no resuelve la tensión entre protección y constricción que el hebreo permite.
- source_word: וַתָּשֶׁת
  english_pob_choice: lay
  chosen_spanish: pones
  alternatives_spanish:
  - colocas
  - pones sobre mí
  - extiendes
  lexicon: HALOT
  rationale: El hebreo indica poner o colocar. «Pones» es natural con el complemento siguiente y mantiene la sencillez del gesto poético.
- source_word: עָלַי
  english_pob_choice: upon me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - encima de mí
  - en mí
  lexicon: HALOT
  rationale: «Sobre mí» conserva el valor locativo de עַל y el tono poético sin volverse arcaico.
- source_word: כַּפֶּךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu palma
  - tu mano extendida
  lexicon: HALOT
  rationale: Aunque כַּף puede significar «palma», en este giro el español idiomático y más claro es «mano». Mantiene la imagen antropomórfica sin forzar una precisión anatómica que el contexto no exige.
theological_decisions:
- issue: Si la imagen debe leerse como protección, opresión o ambas
  english_pob_reading: Retain the ambivalent imagery of divine enclosure and touch without resolving it to either comfort or threat.
  chosen_spanish_reading: Conservar la ambivalencia de un Dios que rodea y toca de manera íntima e intensa, sin decidir por adelantado si el efecto es de resguardo o de presión.
  alternative_spanish_readings:
  - Me proteges por todas partes
  - Me asedias por completo
  rationale: El hebreo de צַרְתָּנִי permite más de una matización. En coherencia con el POB inglés, la traducción española debe preservar esa tensión y no imponer una lectura pastoralmente suavizada ni una lectura exclusivamente hostil.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; esta versión sigue de cerca la lectura aprobada y conserva la misma tensión interpretativa del texto base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no lo contiene explícitamente.
  - Se evita «Señor» o «SEÑOR» como sustitución automática, siguiendo el criterio del proyecto.
  - «Tu mano» traduce el idiomático כַּפֶּךָ sin perder la imagen antropomórfica.
  - La nota [a] queda anclada solo en la frase donde aparece la alternativa lexical relevante.
