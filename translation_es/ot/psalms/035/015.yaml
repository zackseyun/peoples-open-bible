  text: וּ/בְ/צַלְעִ/י֮ שָׂמְח֪וּ וְֽ/נֶאֱ֫סָ֥פוּ נֶאֶסְפ֬וּ עָלַ֣/י נֵ֭כִים וְ/לֹ֣א יָדַ֑עְתִּי קָֽרְע֥וּ וְ/לֹא דָֽמּוּ־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/035/015.yaml
  text: But at my stumbling they rejoiced and gathered together[a]; they gathered against me—strangers whom I did not know[d][c][b]. They tore at me and did not stop.
  footnotes:
  - marker: a
    text: Or 'at my limping' or 'when I stumbled.' The Hebrew may refer to physical lameness or, more broadly, to a moment of weakness or downfall.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'strikers' is rare and uncertain; it may also mean 'smiters,' or possibly refer to 'the afflicted/crippled.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they tore, and they were not silent,' if the image is of relentless verbal abuse rather than unceasing physical attack.
    reason: lexical_alternative
  - marker: d
    text: Or 'strikers, and I did not know it'.
    reason: previous_rendering
