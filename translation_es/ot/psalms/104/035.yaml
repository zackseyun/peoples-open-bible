revisions:
- from: Que los pecadores[a] sean acabados de la tierra, y los impíos ya no existan. Bendice, Yahvé, alma mía[b]. ¡Aleluya!
  to: Que los pecadores[a] se acaben de la tierra, y los impíos ya no existan. Bendice a Yahvé, alma mía[b]. ¡Aleluya!
  rationale: Se corrigió la sintaxis de la segunda cláusula para que 'Yahvé' sea claramente el objeto de 'Bendice', como en el hebreo. También se cambió 'sean acabados' por 'se acaben' para lograr un español más natural sin perder el sentido de llegar al fin/remoción. Se mantuvieron las notas existentes porque siguen siendo pertinentes.
