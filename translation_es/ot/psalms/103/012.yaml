translation:
  language: es
  text: Cuanto está de lejos el oriente del occidente, así ha alejado de nosotros nuestras transgresiones[b].[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha puesto lejos de nosotros nuestras transgresiones».'
    reason: lexical_alternative
  - marker: b
    text: «Transgresiones» traduce un término que también puede significar «rebeliones» u «ofensas».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּ/רְחֹק
  english_pob_choice: As far as
  chosen_spanish: Tan lejos como
  alternatives_spanish:
  - Así de lejos como
  - A la distancia de
  lexicon: HALOT
  rationale: La construcción comparativa expresa alcance o distancia. «Tan lejos como» conserva el valor comparativo de forma natural en español sin perder la imagen espacial.
- source_word: מִזְרָח
  english_pob_choice: the east
  chosen_spanish: el oriente
  alternatives_spanish:
  - el este
  - la salida del sol
  lexicon: HALOT
  rationale: «Oriente» es un equivalente digno y claro para la dirección del amanecer; mantiene el paralelismo poético con «occidente».
- source_word: מִמַּעֲרָב
  english_pob_choice: from the west
  chosen_spanish: del occidente
  alternatives_spanish:
  - del oeste
  lexicon: HALOT
  rationale: «Occidente» funciona bien en el par poético con «oriente» y preserva la imagen direccional de distancia máxima.
- source_word: הִרְחִיק
  english_pob_choice: he has removed
  chosen_spanish: alejó
  alternatives_spanish:
  - ha removido
  - ha puesto lejos
  - ha apartado
  lexicon: HALOT
  rationale: El hifil de רחק implica hacer lejano o poner a distancia. En español, «alejó» conserva el movimiento de separación; el contexto de perdón permite omitir un auxiliar explícito sin perder sentido.
- source_word: מִמֶּנּוּ
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - de nosotros mismos
  - de la comunidad
  lexicon: HALOT
  rationale: El sufijo de primera persona plural se refleja con «de nosotros», que expresa de manera directa la separación respecto del pueblo que habla.
- source_word: פְּשָׁעֵינוּ
  english_pob_choice: our transgressions
  chosen_spanish: nuestras transgresiones
  alternatives_spanish:
  - nuestras rebeliones
  - nuestras ofensas
  - nuestros pecados
  lexicon: HALOT
  rationale: «Transgresiones» preserva el peso moral y pactal de פשע mejor que el más general «pecados». Mantiene además la decisión léxica documentada en el inglés POB.
theological_decisions:
- issue: Metáfora espacial de perdón completo
  english_pob_reading: 'Retain the spatial metaphor of infinite separation: God has removed sins completely from his people.'
  chosen_spanish_reading: 'Conservar la imagen espacial de separación extrema: Yahvé ha alejado por completo nuestras transgresiones de nosotros.'
  alternative_spanish_readings:
  - Interpretarlo solo como perdón general, sin la imagen de distancia
  - Suavizarlo a una simple declaración de perdón
  rationale: El hebreo usa explícitamente la imagen oriente-occidente y luego la aplica a la remoción de las transgresiones. La traducción debe conservar esa tensión metafórica en vez de resolverla o explicarla en exceso.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente del texto fuente no introdujo cambios; el estado final indica alta concordancia y no requirió ajustes. La presente versión mantiene el paralelismo hebreo, la metáfora espacial de separación y la decisión léxica establecida para פְּשָׁעֵינוּ.
  spanish_consistency_notes:
  - Se mantiene «transgresiones» para פְּשָׁעֵינוּ, en línea con la decisión auditada en inglés POB.
  - Se usa «Yahvé» implícitamente en la decisión teológica, pero el verso en sí no nombra al sujeto; el español conserva la referencia tácita del hebreo sin añadir un sujeto explícito que no está en el texto.
  - Se prefieren «oriente/occidente» para el paralelismo poético y la equivalencia idiomática en español.
  - 'La puntuación y el orden reflejan la paralela hebrea: comparación de distancia + consecuencia de alejamiento.'
