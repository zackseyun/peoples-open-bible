translation:
  language: es
  text: No entregarás a su amo[a] a un esclavo que haya escapado de su amo hacia ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo». El hebreo puede designar tanto a un siervo como a un esclavo, pero aquí se usa «esclavo» porque el estatus de sujeción a un amo es central para la ley.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַסְגִּיר
  english_pob_choice: hand over
  chosen_spanish: entregar
  alternatives_spanish:
  - poner en manos de
  - surrender
  - devolver
  lexicon: HALOT
  rationale: El Hifil de סגר expresa poner a alguien bajo el control de otro. En español, "entregar" comunica bien la acción jurídica sin sonar arcaico; "poner en manos de" sería más explícito pero más pesado.
- source_word: עֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: HALOT
  rationale: La relación con el amo y la prohibición de devolverlo a su dueño hacen central el estatus de sujeción. "Esclavo" preserva esa fuerza léxica mejor que "siervo".
- source_word: אֶל אֲדֹנָיו
  english_pob_choice: to his master
  chosen_spanish: a su amo
  alternatives_spanish:
  - a su señor
  - a su dueño
  lexicon: HALOT
  rationale: En este contexto sociolegal, אָדוֹן no es un título divino sino el dueño/amo del esclavo. "Amo" es el equivalente natural y claro en español para esta relación.
- source_word: אֲשֶׁר יִנָּצֵל
  english_pob_choice: who has escaped
  chosen_spanish: que se haya escapado
  alternatives_spanish:
  - que escape
  - que ha sido librado
  lexicon: HALOT
  rationale: 'El nifal de נצל aquí describe la fuga o evasión de un esclavo de su amo. En español, el perfecto de subjuntivo en una relativa expresa bien el hecho previo y consumado: "que se haya escapado".'
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: contigo
  alternatives_spanish:
  - a ti
  - hacia ti
  lexicon: HALOT
  rationale: El hebreo marca movimiento hacia el destinatario. Dado el flujo natural del español, "contigo" recoge la idea de haber llegado/refugiarse en la esfera de la persona a quien se habla.
- source_word: מֵעִם אֲדֹנָיו
  english_pob_choice: from his master
  chosen_spanish: de su amo
  alternatives_spanish:
  - desde junto a su amo
  - separado de su amo
  lexicon: HALOT
  rationale: מֵעִם señala separación de la asociación con el amo. "De su amo" es la formulación idiomática más natural en español y mantiene la referencia relacional.
theological_decisions:
- issue: Tratamiento de עֶבֶד como término de estatus servil
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  rationale: La norma legal depende del estatus subordinado de la persona fugada; atenuarlo con "siervo" debilitaría el peso jurídico del mandamiento. Por ello se conserva el término fuerte, en línea con la decisión auditada del POB inglés.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; contested-status terminology by analogy with δοῦλος
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión final del inglés auditado: mantiene el orden natural del complemento dativo y la cláusula relativa, pero ajusta el sintagma a un español jurídico y fluido. También conserva la tensión léxica de עֶבֶד con una nota, en lugar de suavizarla.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiera; este versículo no contiene el tetragrámaton.
  - «Amo» se reserva aquí para אָדוֹן en contexto sociolegal; no se emplea «Señor» para evitar ambigüedad religiosa.
  - «Esclavo» se mantiene por consistencia con la política POB para términos de subordinación jurídica cuando esa condición es central.
