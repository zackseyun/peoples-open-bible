translation:
  language: es
  text: 'Porque así dice el Señor Yahvé: Al cabo de cuarenta años reuniré a Egipto de entre[a] los pueblos entre los que se dispersaron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de entre los pueblos»; alternativamente, «de entre las naciones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón o fundamento del anuncio anterior; «Porque» conserva bien esa relación causal en español bíblico contemporáneo.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - esto dice
  lexicon: HALOT
  rationale: La fórmula profética se mantiene de manera directa y natural. «Así dice» conserva el tono oracular sin volverse arcaizante.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: 'Se distingue el título compuesto y se preserva el nombre divino según el criterio del proyecto: YHWH → «Yahvé». En español, «el Señor Yahvé» refleja mejor la combinación אדני + יהוה sin ocultar el nombre.'
- source_word: מִקֵּץ
  english_pob_choice: At the end of
  chosen_spanish: Al cabo de
  alternatives_spanish:
  - Al final de
  - Después de
  lexicon: HALOT
  rationale: La expresión temporal en español se expresa con naturalidad por medio de «al cabo de», que conserva la idea de consumación de un período.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: forty years
  chosen_spanish: cuarenta años
  alternatives_spanish:
  - 40 años
  lexicon: HALOT
  rationale: Expresión temporal directa, sin necesidad de adaptación.
- source_word: אֲקַבֵּץ
  english_pob_choice: I will gather
  chosen_spanish: reuniré
  alternatives_spanish:
  - juntaré
  - recogeré
  lexicon: HALOT
  rationale: En este contexto, el verbo expresa restauración y reagrupamiento de un pueblo disperso. «Reuniré» comunica bien esa fuerza sin sonar mecánico.
- source_word: אֶת מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - a los egipcios
  lexicon: HALOT
  rationale: El objeto es la entidad nacional/territorial nombrada por el topónimo; en español se conserva «Egipto» como referente corporativo, no solo sus habitantes.
- source_word: מִן הָעַמִּים
  english_pob_choice: from the peoples
  chosen_spanish: de entre los pueblos
  alternatives_spanish:
  - de entre las naciones
  - de los pueblos
  lexicon: HALOT
  rationale: Se preserva el plural hebreo עַמִּים con «los pueblos»; «de entre» añade el matiz de extracción desde un grupo disperso, coherente con el contexto.
- source_word: אֲשֶׁר נָפֹצוּ שָׁמָּה
  english_pob_choice: among whom they were scattered
  chosen_spanish: entre quienes fue dispersado
  alternatives_spanish:
  - donde fue dispersado
  - entre los cuales fueron dispersados
  lexicon: HALOT
  rationale: La cláusula relativa se vierte con voz pasiva para mantener el sujeto corporativo «Egipto» y con «entre quienes» para reflejar adecuadamente el referente plural de «los pueblos». Se conserva la noción de dispersión sin añadir elementos ajenos al texto.
theological_decisions:
- issue: Nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: 'La edición española sigue el criterio del proyecto de transliterar YHWH como «Yahvé», en vez de enmascararlo con «SEÑOR». En la fórmula compuesta, «el Señor Yahvé» conserva ambos elementos del hebreo: el título אדני y el nombre divino.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sujeto y voz en la cláusula final
  english_pob_reading: I will gather Egypt from the peoples among whom they were scattered
  chosen_spanish_reading: reuniré a Egipto de entre los pueblos, entre quienes fue dispersado
  alternative_spanish_readings:
  - reuniré a Egipto de entre los pueblos donde fue dispersado
  - reuniré a Egipto de entre los pueblos entre los cuales fue dispersado
  rationale: Se mantiene a Egipto como entidad colectiva y se usa singular en la pasiva («fue dispersado») para reflejar el referente corporativo del topónimo. Esto evita una pluralización innecesaria y preserva la tensión entre nación y dispersión entre pueblos.
  doctrine_reference: Ezequiel 29:13; uso metonímico del topónimo para el pueblo/territorio
translation_notes:
  revision_awareness: La redacción española toma en cuenta la revisión más reciente del POB en inglés, que precisó «among whom» para reflejar con mayor exactitud el antecedente plural «the peoples». Por eso se eligió «entre quienes» y no una formulación espacial más vaga. También se respetó el cambio doctrinal del proyecto para YHWH → «Yahvé», en contraste con la convención inglesa «LORD/GOD» del contexto auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה según el estándar del proyecto.
  - «Señor» se usa para אֲדֹנָי como título, no para sustituir el nombre divino.
  - «Pueblos» conserva el plural hebreo עַמִּים; la nota aclara la alternativa «naciones».
  - La pasiva «fue dispersado» conserva el valor corporativo del referente «Egipto».
