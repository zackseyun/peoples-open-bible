  text: אֽוֹ יֹמַ֜יִם אוֹ חֹ֣דֶשׁ אוֹ יָמִ֗ים בְּ/הַאֲרִ֨יךְ הֶ/עָנָ֤ן עַל הַ/מִּשְׁכָּן֙ לִ/שְׁכֹּ֣ן עָלָ֔י/ו יַחֲנ֥וּ בְנֵֽי יִשְׂרָאֵ֖ל וְ/לֹ֣א יִסָּ֑עוּ וּ/בְ/הֵעָלֹת֖/וֹ יִסָּֽעוּ־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/009/022.yaml
  text: Whether it was two days[a], or a month, or longer, when the cloud remained over the tabernacle, dwelling over it, the sons of Israel would camp and would not set out; but when it was lifted up, they would set out.
  footnotes:
  - marker: a
    text: Or 'many days' for 'a longer time'; the Hebrew literally reads 'days,' likely meaning an extended period in this context.
    reason: lexical_alternative
