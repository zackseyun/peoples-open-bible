  revised_footnotes:
  - marker: a
    text: 'Hebreo literal: «un diente de roca ... y un diente de roca», un modismo para peñascos o salientes rocosos agudos.'
    reason: lexical_alternative
  revision_rationale: Se ajusta ‘buscaba cruzar hacia’ para reflejar mejor la construcción hebrea de intento de cruce hacia la posición filistea; se reemplaza ‘pico de roca’ por ‘peñasco rocoso’ para comunicar con más fidelidad el modismo topográfico ‘diente de roca’; se mejora la redacción de la nota léxica; y se normalizan los nombres propios a Bozez y Seneh en línea con el expediente auditado.
