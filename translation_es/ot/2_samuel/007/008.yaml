base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/007/008.yaml
  text: 'Now therefore[a], this is what you shall say to my servant David: This is what Yahweh of hosts says: I took you from the pasture, from following the flock[b], to be ruler over my people Israel.'
  footnotes:
  - marker: a
    text: Or 'from the sheepfold.' The Hebrew noun can refer to a pastureland or a place where flocks dwell.
    reason: lexical_alternative
  - marker: b
    text: Or 'leader' or 'prince' for 'ruler.' The Hebrew term denotes one appointed to govern, not necessarily using the specific title 'king.'
    reason: lexical_alternative
