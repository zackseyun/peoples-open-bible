review_pass:
  verdict: approve
  source_alignment_summary: 'El borrador español refleja fielmente la antítesis del griego: «no ... por causa del lugar, sino ... por causa de la nación». Conserva correctamente la prioridad teológica de la nación sobre el lugar y mantiene «el lugar» sin sobreespecificarlo como santuario o templo, en línea con el texto fuente y la auditoría inglesa.'
  spanish_quality_summary: El español es claro, natural y digno. «Pero el Señor no eligió a la nación por causa del lugar, sino el lugar por causa de la nación» suena bien y preserva el paralelismo. Aunque podría repetirse «eligió» tras «sino» para una simetría más explícita, la elipsis es plenamente natural en español y no oscurece el sentido.
  glossary_alignment: 'La terminología está bien alineada con el proyecto en este versículo: κύριος como «el Señor», ἔθνος como «la nación», τόπος como «el lugar», y ἐξελέξατο como «eligió». No hay conflicto con las pautas principales de Yahvé/Mesías u otros términos sensibles.'
  issues:
  - severity: low
    issue: «el Señor» sigue la auditoría inglesa para κύριος
    rationale: A nivel de proyecto global, «Yahvé» es la forma por defecto para el nombre divino, pero aquí la fuente inmediata es griega κύριος y la documentación inglesa escogió «the Lord». En este contexto deuterocanónico y sin evidencia directa del tetragrámaton en el texto base, «el Señor» es una decisión aceptable.
