review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: marco temporal extendido, muerte del rey de Egipto, gemido de los hijos de Israel, clamor y ascenso del clamor a Dios. También mantiene la repetición de מִן הָעֲבֹדָה. Sin embargo, la nota [c] no corresponde al tipo de alternativa preservada en el rastro inglés, y el anclaje [a] está puesto sobre «gimieron» cuando la nota trata de la frase temporal inicial.'
  spanish_quality_summary: El español es generalmente claro y digno. «Y aconteció» y «clamaron» son aceptables en registro bíblico moderno. No obstante, la colocación de notas necesita corrección, y conviene hacer explícito en una nota que «los hijos de Israel» refiere colectivamente al pueblo, ya que el rastro inglés lo documenta. Además, la nota [b] debe normalizarse tipográficamente en español.
  glossary_alignment: No aparecen términos del glosario mayor como Yahvé/Mesías. «Dios» es correcto para הָאֱלֹהִים. «Los hijos de Israel» sigue la decisión POB de transparentar בְּנֵי יִשְׂרָאֵל. «Trabajo» sigue el audit trail revisado para עֲבֹדָה, aunque la nota debe explicar mejor su sentido de trabajo forzado/opresivo. No hay conflicto teológico que requiera adjudicación.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «gimieron», pero su contenido trata de la frase temporal «en aquellos muchos días».
    rationale: Los marcadores deben aparecer junto al término o frase pertinente. Tal como está, induce a error sobre qué palabra tiene la alternativa.
  - severity: medium
    issue: Falta una nota para «los hijos de Israel» que preserve la aclaración del rastro inglés de que la expresión se refiere colectivamente al pueblo de Israel.
    rationale: La decisión lexical inglesa documenta esta alternativa significativa; en español también conviene conservarla para evitar malentendidos.
  - severity: low
    issue: La nota [c] ofrece «O “gritaron”» para «clamaron», pero el rastro inglés no preserva una alternativa léxica aquí; la nota inglesa [c] pertenece a עֲבֹדָה.
    rationale: Las notas deben seguir la evidencia y el audit trail, no introducir alternativas menores sin necesidad cuando ya hay una nota más importante que preservar.
  - severity: low
    issue: 'La nota [b] usa comillas y puntuación poco naturales: "''Hebreo: «el trabajo»..."'
    rationale: Conviene normalizar el estilo en español y explicar el matiz contextual sin esa apertura errónea de comilla simple.
