review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: José dice que busca a sus hermanos y pide que le indiquen dónde están ejerciendo labor pastoril. Sin embargo, introduce un desajuste gramatical importante al usar «díganme» (plural) cuando el hebreo tiene imperativo masculino singular dirigido al hombre del contexto inmediato. También conviene mejorar la puntuación del inciso de cortesía para mayor naturalidad.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «Por favor, díganme» suena incongruente con el interlocutor singular. «Apacentando» es fiel y aceptable, aunque algo más literario; funciona bien en registro bíblico. La frase fluye mejor como «Por favor, dígame dónde están apacentando».
  glossary_alignment: No hay términos de glosario mayor implicados. La elección de «apacentando» concuerda con la decisión inglesa «are pasturing» y conserva la nota alternativa. La revisión necesaria afecta sobre todo a la concordancia del tratamiento en español con el singular hebreo.
  issues:
  - severity: high
    issue: Uso de imperativo plural «díganme» frente a hebreo singular
    rationale: הַגִּידָה נָּא לִי es imperativo Hifil 2ms con matiz cortés; el texto se dirige a un solo hombre en el contexto narrativo. El plural altera innecesariamente la referencia del original.
  - severity: low
    issue: Puntuación menos natural en «Por favor, díganme»
    rationale: 'En español bíblico moderno suena más natural integrar la cortesía con el imperativo singular: «Por favor, dígame…» o «Dígame, por favor…».'
