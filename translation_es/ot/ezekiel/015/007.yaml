translation:
  language: es
  text: Y pondré mi rostro contra ellos[a]. Del fuego salieron, pero el fuego los consumirá[b]. Entonces sabrán que yo, Yahvé, cuando ponga mi rostro contra ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Modismo hebreo: «poner mi rostro contra ellos», que expresa oposición decidida y juicio.'
    reason: cultural_note
  - marker: b
    text: 'O: «Del fuego salieron, pero el fuego los devorará». El hebreo contrasta haber salido de un fuego con ser consumidos por otro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: I will set
  chosen_spanish: pondré
  alternatives_spanish:
  - colocaré
  - pondré delante de
  lexicon: HALOT
  rationale: נתן en esta construcción idiomática expresa una acción deliberada de juicio; en español, «poner» conserva bien la idea de fijar o dirigir el rostro con intención hostil o judicial.
- source_word: אֶת־פָּנַי בָּהֶם
  english_pob_choice: my face against them
  chosen_spanish: mi rostro contra ellos
  alternatives_spanish:
  - mi rostro sobre ellos
  - mi rostro en contra de ellos
  lexicon: HALOT
  rationale: Se mantiene el idiomático hebreo de «poner el rostro contra», porque el POB inglés lo preserva y la fuerza de oposición/jucio es importante; «contra ellos» comunica la dirección adversativa en español sin perder la imagen.
- source_word: מֵהָאֵשׁ יָצָאוּ
  english_pob_choice: They have come out from the fire
  chosen_spanish: Del fuego salieron
  alternatives_spanish:
  - Salieron del fuego
  - Han salido del fuego
  lexicon: HALOT
  rationale: יצא significa salir/venir fuera. «Del fuego salieron» conserva el orden enfático del hebreo y deja intacto el contraste irónico con la siguiente cláusula.
- source_word: וְהָאֵשׁ תֹּאכְלֵם
  english_pob_choice: but the fire will consume them
  chosen_spanish: pero el fuego los consumirá
  alternatives_spanish:
  - y el fuego los devorará
  - mas el fuego los consumirá
  lexicon: HALOT
  rationale: אכל aplicado al fuego puede traducirse «consumir/devorar». «Consumirá» es grave y natural en español; se mantiene el valor contrastivo del waw como adversativo, tal como en el POB inglés.
- source_word: וִידַעְתֶּם
  english_pob_choice: Then you will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - Y sabrán
  - Así sabrán
  lexicon: HALOT
  rationale: El hebreo profético marca consecuencia. «Entonces» refleja bien ese resultado y conserva el tono de reconocimiento judicial del oráculo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: De acuerdo con el estándar del proyecto para יהוה, se usa «Yahvé» en el texto principal español, preservando el nombre divino y evitando la sustitución por un título.
- source_word: בְּשׂוּמִי אֶת־פָּנַי בָּהֶם
  english_pob_choice: when I set my face against them
  chosen_spanish: cuando ponga mi rostro contra ellos
  alternatives_spanish:
  - al poner mi rostro contra ellos
  - cuando coloque mi rostro contra ellos
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo se vierte naturalmente con «cuando». Se repite la misma imagen idiomática para conservar cohesión literaria y el peso judicial del gesto.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. La política del proyecto pide transliterarlo como «Yahvé» en la versión española principal para preservar el nombre personal de Dios y no ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza del modismo de juicio «poner mi rostro contra ellos»
  english_pob_reading: Preserve the idiom in the main text
  chosen_spanish_reading: Preservar el modismo en el texto principal
  alternative_spanish_readings:
  - me opondré a ellos
  - los castigaré
  rationale: La imagen del rostro divino expresando oposición judicial tiene valor profético y teológico; mantenerla evita diluir la intensidad del juicio y respeta la continuidad con el hebreo y con el POB inglés.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #5'
translation_notes:
  revision_awareness: La versión sigue de cerca el texto hebreo y coincide con la lectura estable del audit trail inglés. No se detectaron revisiones posteriores que requirieran ajuste; se conserva el modismo judicial, el contraste entre salir del fuego y ser consumidos por el fuego, y el tratamiento de יהוה como nombre divino.
  spanish_consistency_notes:
  - Se mantiene «rostro» para פָּנִים, en coherencia con el modismo hebreo y con otros pasajes proféticos.
  - Se usa «Yahvé» para יְהוָה según el estándar español del proyecto.
  - «Consumirá» conserva el campo semántico de אכל sin introducir una paráfrasis más fuerte que el hebreo.
  - 'El orden de las cláusulas sigue el énfasis del original: juicio, contraste del fuego, y consecuencia de conocimiento.'
