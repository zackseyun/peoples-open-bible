    issue: Se tradujo אֲדֹנָי como «Yahvé».
    rationale: El texto fuente hebreo tiene אֲדֹנָי, no יהוה. La política del proyecto sobre «Yahvé» no autoriza sustituir automáticamente «Señor» cuando el término fuente es otro. El English POB además documenta «O Lord». Esto afecta fidelidad léxica y teológica.
  - severity: medium
    issue: El marcador [a] está colocado en «joven» pero la nota trata sobre בַּאֲמִתָּהּ / «En fidelidad».
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Tal como está, el lector asocia erróneamente la nota con «joven».
  - severity: low
    issue: «Caminó mi pie» suena más rígido de lo necesario en español.
    rationale: Puede conservarse el hebraísmo con mejor fluidez como «mi pie caminó», manteniendo la imagen concreta del original.
  revised_spanish_text: Yo era joven, y amaba la sabiduría; la deseé y la busqué. En fidelidad[a] mi pie caminó; desde mi juventud, oh Señor,[b] aprendí sabiduría.
