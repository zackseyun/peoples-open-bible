  glossary_alignment: No hay conflicto con la terminología base del proyecto. La elección «vergüenza» para הַבֹּשֶׁת y la nota alternativa están alineadas con el rastro de auditoría inglés. La mejor alineación con el POB audit trail pide mantener el paralelismo «rebaños ... hatos» más que «manadas», ya que «manadas» es menos preciso para בקר.
