review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: nombramientos en fortalezas del rey, designaciones para asuntos del reino, confiabilidad, autoridades tomadas de entre ellos, y permiso para regirse por sus propias leyes, como en Judá. Sin embargo, hay pequeños puntos mejorables: «serán puestos» suena menos administrativo que κατασταθήσεται en este contexto; «sobre las necesidades del reino» es demasiado calcado y menos idiomático en español para un contexto administrativo; y «los que estén sobre ellos» resulta algo torpe frente al valor relacional de οἱ ἐπʼ αὐτῶν.'
  spanish_quality_summary: 'El texto es comprensible y digno, pero puede ganar naturalidad y precisión con ajustes menores: «serán nombrados»/«serán designados» suena mejor que «serán puestos»; «sobre los asuntos del reino» expresa mejor χρεῖαι en español administrativo; «sus superiores» o «los que estén a cargo de ellos» mejora la fluidez. También conviene eliminar la alternativa errónea «serán नियुक्तados» en las decisiones léxicas subyacentes, aunque eso no afecta el texto principal.'
  glossary_alignment: No hay términos del glosario doctrinal principal en juego salvo πίστις, que está bien entendido como confiabilidad no teológica. «Judá» se mantiene correctamente. No se detectan conflictos con Yahvé/Mesías/Cristo/etc.
  issues:
  - severity: medium
    issue: «serán puestos» para κατασταθήσεται
    rationale: Aunque no es incorrecto, en este contexto administrativo de decreto real el griego apunta a nombramiento o asignación oficial. «Serán nombrados» o «serán designados» preserva mejor el matiz.
  - severity: medium
    issue: «sobre las necesidades del reino» suena calcado
    rationale: χρεῖαι puede significar necesidades, asuntos o negocios. En español administrativo «sobre los asuntos del reino» comunica mejor la función sin perder fidelidad; además el propio pie inglés señala esa amplitud semántica.
  - severity: low
    issue: «los que estén sobre ellos» es poco natural
    rationale: La frase conserva la relación jerárquica, pero en español resulta rígida. «Sus superiores» o «los que estén a cargo de ellos» expresa el mismo sentido con mejor legibilidad.
  - severity: low
    issue: "Rastro léxico interno contiene «serán \0नियुक्तados»"
    rationale: Hay una alternativa española corrupta/no española en los datos léxicos. No afecta el versículo publicado, pero debe corregirse en el registro editorial.
