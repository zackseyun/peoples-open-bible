base_translation:
  language: en
  yaml_path: translation/ot/proverbs/024/020.yaml
  text: For there will be no future for the evil[b][a]; the lamp of the wicked will be put out.
  footnotes:
  - marker: a
    text: Or 'end' or 'outcome' for 'future.' The Hebrew אַחֲרִית can refer to a person's latter end, outcome, or future prospect.
    reason: lexical_alternative
  - marker: b
    text: Or 'the lamp of the wicked will go out.' The image of the lamp signifies the extinguishing of life, prosperity, or enduring standing.
    reason: lexical_alternative
