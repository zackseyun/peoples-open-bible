translation:
  language: es
  text: Porque ha venido contra ella, contra Babilonia, un devastador[a], y sus guerreros[c] han sido capturados; sus arcos están quebrados. Porque Yahvé es un Dios de retribución[b]; ciertamente él pagará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un saqueador» o «el devastador».
    reason: lexical_alternative
  - marker: b
    text: O «un Dios de venganza». El hebreo enfatiza la retribución o el pago justo.
    reason: alternative_reading
  - marker: c
    text: Hebreo «hombres valientes»; aquí, en el contexto, los combatientes de Babilonia.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹדֵד
  english_pob_choice: a destroyer
  chosen_spanish: un devastador
  alternatives_spanish:
  - un destructor
  - un saqueador
  lexicon: HALOT
  rationale: El participio describe a quien arrasa o saquea. «Devastador» conserva el campo semántico de destrucción y funciona con naturalidad en español sin reducirlo solo a robo.
- source_word: בָא עָלֶיהָ עַל בָּבֶל
  english_pob_choice: has come against her, against Babylon
  chosen_spanish: ha venido contra ella, contra Babilonia
  alternatives_spanish:
  - ha venido sobre ella, sobre Babilonia
  lexicon: HALOT
  rationale: La duplicación de עַל es enfática. «Contra ella, contra Babilonia» reproduce esa doble referencia y mantiene la aclaración implícita de que «ella» es Babilonia.
- source_word: וְנִלְכְּדוּ
  english_pob_choice: have been captured
  chosen_spanish: han sido capturados
  alternatives_spanish:
  - han sido tomados
  - fueron capturados
  lexicon: HALOT
  rationale: El niphal expresa ser tomados/capturados. «Han sido capturados» preserva el pasivo y encaja con la secuencia de derrota militar.
- source_word: גִּבּוֹרֶיהָ
  english_pob_choice: her warriors
  chosen_spanish: sus guerreros
  alternatives_spanish:
  - sus hombres valientes
  - sus héroes
  lexicon: HALOT
  rationale: Aunque literalmente es «mighty men», en este contexto bélico se refiere a combatientes. «Guerreros» comunica con claridad la función militar en español moderno.
- source_word: חִתְּתָה קַשְּׁתוֹתָם
  english_pob_choice: their bows are shattered
  chosen_spanish: sus arcos están quebrados
  alternatives_spanish:
  - sus arcos están rotos
  - sus arcos están hechos pedazos
  lexicon: HALOT
  rationale: El verbo expresa romper o destrozar. «Quebrados» conserva la imagen de desarme militar y suena natural en español; además no suaviza la fuerza del hebreo.
- source_word: אֵל גְּמֻלוֹת
  english_pob_choice: a God of recompense
  chosen_spanish: un Dios de recompensas
  alternatives_spanish:
  - un Dios de retribución
  - un Dios de pago justo
  lexicon: HALOT
  rationale: El sustantivo apunta a pago, recompensa o retribución. «Recompensas» mantiene el sentido de correspondencia justa; en nota se preserva la alternativa de «retribución» para no perder la tensión judicial del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», evitando la sustitución por un título y preservando el nombre propio del pacto.'
- source_word: שַׁלֵּם יְשַׁלֵּם
  english_pob_choice: he will surely repay
  chosen_spanish: ciertamente él pagará
  alternatives_spanish:
  - él pagará con certeza
  - él pagará plenamente
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la acción. «Ciertamente él pagará» comunica esa fuerza enfática en español sin cargar el verso con una paráfrasis excesiva.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español se sigue la norma del proyecto para preservar el nombre divino como «Yahvé», manteniendo el carácter personal y pactual del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de אֵל גְּמֻלוֹת
  english_pob_reading: a God of recompense
  chosen_spanish_reading: un Dios de recompensas
  alternative_spanish_readings:
  - un Dios de retribución
  - un Dios de venganza
  rationale: El hebreo enfatiza el pago/retribución justa. «Recompensas» conserva el concepto de correspondencia moral sin imponer de entrada el matiz más fuerte de «venganza»; la tensión queda disponible en la nota.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: El borrador se alinea con la evaluación de alta concordancia y no requiere cambios según el último pase de revisión. Se mantuvieron la fuerza del participio hebreo, la duplicación enfática de עַל, el pasivo del niphal y la intensificación del infinitivo absoluto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva la distinción entre destrucción y retribución justa, sin colapsar ambos matices en una sola palabra.
  - «Guerreros» se usa por contexto militar, pero la nota preserva el trasfondo literal de «hombres valientes».
  - Se evitó «SEÑOR» como sustituto del nombre divino para no ocultar el Tetragrámaton.
