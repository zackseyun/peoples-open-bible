    reason: lexical_alternative
  revision_rationale: Se revisa 'casa' a 'familia' en las ocurrencias donde el audit trail inglés documenta el sentido de 'household', preservando la distinción con 'en su casa' para el edificio físico. También se ajusta 'todo lo que tenía' a 'todo lo que le pertenecía' para reflejar mejor אֲשֶׁר לוֹ. La nota se rehace para sonar natural en español y explicar con claridad la alternativa literal 'casa'.
