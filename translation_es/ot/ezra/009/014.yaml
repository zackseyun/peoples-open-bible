  glossary_alignment: No hay conflicto con la terminología principal del proyecto. Se preserva 'remanente' y no hay nombres divinos en este versículo. La decisión de mantener 'los pueblos de estas abominaciones' concuerda con el rastro de auditoría inglés, mientras la nota explica la caracterización por prácticas y evita una lectura etnicista.
