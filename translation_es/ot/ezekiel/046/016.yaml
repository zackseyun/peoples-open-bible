review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura legal del hebreo: condición introducida por כִּי, título técnico הַנָּשִׂיא como «el príncipe», y la lógica hereditaria de נַחֲלָה / אֲחֻזָּה. También conserva correctamente la nota idiomática de לְאִישׁ מִבָּנָיו. Sin embargo, hay dos ajustes necesarios para mayor fidelidad y coherencia: (1) «Así dice el Señor Yahvé» traduce de modo algo híbrido אֲדֹנָי יְהוִה; dado el estándar del proyecto, «el Señor Yahvé» es defendible, pero en español bíblico suena más natural sin artículo antes de «Señor» en esta combinación fija: «Así dice el Señor Yahvé» sigue siendo aceptable. El problema principal está en (2) «será su herencia», que debilita la identificación presente de נַחֲלָתוֹ הִיא; el hebreo dice «es su herencia», mientras el futuro pertenece a la cláusula siguiente. Además, la nota b no corresponde exactamente al segmento que está en el texto español y conviene hacerla más precisa.'
  spanish_quality_summary: El español es claro y legible, con tono digno. No obstante, «un regalo» resulta algo coloquial en un contexto legal de tenencia hereditaria; «un don» sería demasiado teológico, pero «una dádiva» o «un regalo» son posibles. Como la fuente inglesa eligió «gift», «regalo» puede mantenerse. El ajuste realmente necesario es cambiar «será» por «es» para evitar un matiz prospectivo no presente en esa cláusula. También conviene afinar la nota b para que refleje la alternativa del orden sintáctico completo.
  glossary_alignment: 'Alineación generalmente buena con la terminología del proyecto: יְהוָה se preserva como «Yahvé», θεonimia no enmascarada; נָשִׂיא como «príncipe» es correcta; el campo semántico de herencia/posesión se mantiene con «herencia» y «posesión». No hay conflictos con términos doctrinales mayores. La única corrección léxica clave es respetar el valor presente de נַחֲלָתוֹ הִיא con «es su herencia».'
  issues:
  - severity: medium
    issue: Tiempo verbal de נַחֲלָתוֹ הִיא
    rationale: 'El borrador dice «será su herencia», pero el hebreo usa una cláusula identificativa presente: «es su herencia». El futuro corresponde a «pertenecerá a sus hijos» en la siguiente cláusula.'
  - severity: low
    issue: Nota b ligeramente imprecisa respecto al texto base
    rationale: 'La nota «O: “como su posesión por herencia”» no refleja de forma ideal la alternativa documentada, que corresponde mejor al segmento completo final: «como su posesión en herencia» o una formulación equivalente de orden sintáctico.'
  revised_spanish_text: 'Así dice el Señor Yahvé: Si el príncipe da un regalo a uno de sus hijos[a], es su herencia[b]; pertenecerá a sus hijos como su posesión por herencia.'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «a un hombre de entre sus hijos», un giro que significa «a cualquiera de sus hijos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como su posesión en herencia».'
    reason: lexical_alternative
  revision_rationale: Se corrige «será» a «es» para reflejar con precisión la cláusula nominal hebrea נַחֲלָתוֹ הִיא. Se mantiene el resto de la redacción, que es natural y fiel. También se ajusta la nota b para alinearla mejor con la alternativa léxica documentada para el cierre jurídico del versículo.
