review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el tono forense del hebreo: וְ se entiende correctamente como adversativo contextual, דִּין se mantiene como ''juicio'', רָשָׁע como ''impío'', y מִשְׁפָּט como ''justicia''. Sin embargo, la cláusula final יִתְמֹכוּ no queda bien representada por ''te alcanzan''. El campo semántico documentado en el POB es ''sostener/apoyar'' o ''asir/apoderarse'', y la revisión inglesa ya optó por ''seize you''. ''Te alcanzan'' introduce una idea de llegar a ti o sobrevenirte, más débil y menos ligada al verbo hebreo.'
  spanish_quality_summary: El español es claro y digno, pero 'te alcanzan' suena algo interpretativo y desdibuja la tensión léxica. 'Te sujetan' o 'te toman' refleja mejor la ambigüedad entre sostener y apresar. El resto del texto es natural y legible. La nota existente está bien formulada, pero falta una nota léxica para la cláusula final si se desea preservar la alternativa documentada por el POB inglés.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Impío', 'juicio' y 'justicia' están alineados con las decisiones léxicas documentadas. El único desajuste es la elección de 'te alcanzan' para יִתְמֹכוּ, que no se alinea bien con la rationale inglesa ni con el rango semántico principal del hebreo.
  issues:
  - severity: medium
    issue: La cláusula final 'te alcanzan' no representa con suficiente fidelidad יִתְמֹכוּ.
    rationale: תמך suele expresar sostener, sujetar, apoyar o tomar firmemente. 'Alcanzar' desplaza el sentido hacia llegar a alguien, y pierde el matiz de sujeción/aprehensión preservado en el POB inglés ('seize you') y en las alternativas documentadas.
  - severity: low
    issue: Falta una nota para la ambigüedad léxica de la cláusula final.
    rationale: El POB inglés conserva explícitamente la alternativa 'uphold you'/'seize you'. En español, añadir una nota breve ayuda a mantener la tensión interpretativa del hebreo sin sobredecidir el sentido.
  revised_spanish_text: Pero tú estás lleno del juicio del impío[a]; juicio y justicia te sujetan[b].
  revised_footnotes:
  - marker: a
    text: 'O: "Y estás lleno del juicio del impío"; el hebreo es muy comprimido y puede referirse tanto a compartir el juicio del impío como a estar ocupado con el tipo de juicio asociado al impío.'
    reason: alternative_reading
  - marker: b
    text: 'O: "te sostienen" o "se apoderan de ti"; el verbo hebreo puede expresar sostener, mantener o tomar firmemente.'
    reason: lexical_alternative
  revision_rationale: 'Se reemplaza ''te alcanzan'' por ''te sujetan'' para reflejar mejor el valor posible de יִתְמֹכוּ en esta línea comprimida: una acción de sostener o asir, no simplemente de llegar. También se añade una nota léxica para preservar las alternativas documentadas por el POB inglés y la ambigüedad del hebreo.'
