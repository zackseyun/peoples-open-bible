  rationale: El prefijo לְ en este contexto de lista tribal/censal marca pertenencia o asignación representativa. «Para» conserva bien esa función en español y sigue la decisión inglesa de expresar la relación tribal de forma idiomática sin volverla demasiado rígida.
- source_word: אֲחִירַע
