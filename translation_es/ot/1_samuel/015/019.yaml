translation:
  language: es
  text: ¿Por qué, pues, no obedeciste a la voz de Yahvé, sino que te abalanzaste[a] sobre el botín e hiciste lo malo ante los ojos de Yahvé?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te lanzaste sobre el despojo» o «te precipitaste sobre el botín»; el verbo hebreo sugiere un movimiento ávido y codicioso hacia el botín de guerra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָמָּה
  english_pob_choice: Why then
  chosen_spanish: ¿Por qué, pues...
  alternatives_spanish:
  - ¿Y por qué...
  - ¿Por qué entonces...
  lexicon: HALOT
  rationale: En este reproche, la partícula conecta con lo dicho antes y añade tono de reprensión. «Pues» comunica bien esa fuerza discursiva sin volver la frase pesada o demasiado literal.
- source_word: שָׁמַעְתָּ בְּקוֹל
  english_pob_choice: obey the voice
  chosen_spanish: obedeciste a la voz
  alternatives_spanish:
  - escuchaste la voz
  - prestaste oído a la voz
  lexicon: HALOT
  rationale: En este contexto de mandato y desobediencia, el hebreo שׁמע con בְּקוֹל expresa obediencia, no solo audición. «Obedeciste a la voz» conserva el giro idiomático y la referencia concreta a la voz de Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce con el nombre divino en español. «Yahvé» es la forma estable del proyecto en español y evita la sustitución por un título impersonal.
- source_word: וַתַּעַט אֶל
  english_pob_choice: rush upon
  chosen_spanish: te abalanzaste sobre
  alternatives_spanish:
  - te precipitaste sobre
  - te lanzaste sobre
  - arremetiste contra
  lexicon: HALOT
  rationale: El verbo describe un movimiento ávido y arrebatado hacia el botín. «Te abalanzaste sobre» transmite bien la rapidez y la codicia implícitas sin suavizar el matiz.
- source_word: הַשָּׁלָל
  english_pob_choice: the spoil
  chosen_spanish: el botín
  alternatives_spanish:
  - el despojo
  - el saqueo
  - el botín de guerra
  lexicon: HALOT
  rationale: En español, «botín» es el término natural para el despojo militar y comunica el objeto del deseo en la escena. «Botín de guerra» sería más explícito, pero aquí no es necesario.
- source_word: וַתַּעַשׂ הָרַע
  english_pob_choice: do what was evil
  chosen_spanish: hiciste lo malo
  alternatives_spanish:
  - hiciste el mal
  - obraste maldad
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático muy común para señalar conducta malvada. «Hiciste lo malo» conserva la sencillez del hebreo y su valor moral sin añadir explicación.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: La imagen evaluativa se mantiene de forma transparente en español. «Ante los ojos de Yahvé» conserva la metáfora y resulta natural en registro bíblico contemporáneo.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se preserva el nombre propio divino en lugar de sustituirlo por un título. La forma española «Yahvé» es coherente con el proyecto y mantiene la referencia al nombre revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El contexto auditado del inglés POB confirma lectura de reproche retórico, la elección de obediencia para שׁמע בְּקוֹל, la traducción del Tetragrámaton como nombre propio y el matiz enérgico de וַתַּעַט; no se requieren revisiones adicionales respecto al acuerdo de alta concordancia.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene el registro bíblico contemporáneo con verbos naturales en español.
  - «Botín» y «lo malo» conservan la brevedad e intensidad del hebreo sin paráfrasis expansiva.
