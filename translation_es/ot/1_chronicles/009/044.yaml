translation:
  language: es
  text: 'Azel tuvo seis hijos varones[a], y estos fueron sus nombres: Azrikam, su primogénito[b], Ismael, Searías, Obadías y Hanán. Estos fueron los hijos de Azel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Y a Azel: seis hijos». La traducción principal suaviza una fórmula genealógica hebrea común.'
    reason: lexical_alternative
  - marker: b
    text: Heb. «su primogénito» identifica a Azrikam como el primer hijo de Azel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְאָצֵל
  english_pob_choice: Azel had
  chosen_spanish: Azel tuvo
  alternatives_spanish:
  - Azel tenía
  - A Azel le nacieron
  lexicon: HALOT
  rationale: La construcción genealógica con ל puede expresar pertenencia o descendencia. En español, 'tuvo' comunica de manera natural la relación genealógica sin perder el sentido de posesión/descentencia que el hebreo marca.
- source_word: שִׁשָּׁה בָנִים
  english_pob_choice: six sons
  chosen_spanish: seis hijos
  alternatives_spanish:
  - seis hijos varones
  - seis varones
  lexicon: HALOT
  rationale: Aunque בָנִים significa literalmente 'hijos/sons', en una lista genealógica española 'hijos' suena más natural y mantiene el referente masculino ya establecido por el contexto; el hebreo añade la especificación de sexo por la forma plural masculina.
- source_word: וְאֵלֶּה שְׁמוֹתָם
  english_pob_choice: and these were their names
  chosen_spanish: y estos fueron sus nombres
  alternatives_spanish:
  - y estos son sus nombres
  - y estos eran sus nombres
  lexicon: HALOT
  rationale: La fórmula introductoria genealógica se vierte de forma directa y clara. 'Sus' corresponde al sufijo plural hebreo de 'sus nombres'.
- source_word: עַזְרִיקָם
  english_pob_choice: Azrikam
  chosen_spanish: Azricam
  alternatives_spanish:
  - Azrikam
  lexicon: HALOT
  rationale: Se translitera el nombre propio al español conservando su identificación, con ajuste ortográfico mínimo para la pronunciación hispana y para mantener consistencia fonética en una lectura pública.
- source_word: בֹּכְרוּ
  english_pob_choice: his firstborn
  chosen_spanish: su primogénito
  alternatives_spanish:
  - su hijo mayor
  - el primogénito
  lexicon: HALOT
  rationale: El hebreo señala que Azricam era el primero en nacimiento. 'Primogénito' preserva esa relación de prioridad genética y evita una paráfrasis más débil como 'hijo mayor'.
- source_word: יִשְׁמָעֵאל
  english_pob_choice: Ishmael
  chosen_spanish: Ismael
  alternatives_spanish:
  - Ishmael
  lexicon: HALOT
  rationale: Nombre propio tradicional en español.
- source_word: שְׁעַרְיָה
  english_pob_choice: Sheariah
  chosen_spanish: Searías
  alternatives_spanish:
  - Sheariah
  - Seharías
  lexicon: HALOT
  rationale: Se adopta una transliteración española que reproduce el nombre propio con naturalidad en lectura castellana, manteniendo la correspondencia con la forma hebrea del listado.
- source_word: עֹבַדְיָה
  english_pob_choice: Obadiah
  chosen_spanish: Abdías
  alternatives_spanish:
  - Obadías
  - Obadiah
  lexicon: HALOT
  rationale: Nombre propio bíblico de uso asentado en español. Se conserva la forma tradicional española por inteligibilidad y reconocimiento lector.
- source_word: חָנָן
  english_pob_choice: Hanan
  chosen_spanish: Hanán
  alternatives_spanish:
  - Hanan
  lexicon: HALOT
  rationale: Nombre propio transliterado con acento gráfico para reflejar la pronunciación española y facilitar la lectura pública.
- source_word: אֵלֶּה בְּנֵי אָצַל
  english_pob_choice: These were the sons of Azel
  chosen_spanish: Estos fueron los hijos de Azel
  alternatives_spanish:
  - Estos eran los hijos de Azel
  - Estos fueron los hijos de Azel
  lexicon: HALOT
  rationale: Se conserva la fórmula de resumen genealógico. 'Hijos' reproduce el campo semántico de בְּנֵי y 'fueron' mantiene el cierre narrativo del enunciado.
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del hebreo y del audit trail inglés. Se resolvió la fórmula genealógica de לְאָצֵל con una construcción idiomática en español, pero se conservó en nota la alternativa más literal. También se mantuvo la identificación de Azricam como primogénito y se ajustaron varios nombres propios a formas españolas reconocibles y públicas.
  spanish_consistency_notes:
  - Se usa 'Azel' de forma consistente como nombre propio base.
  - Se preserva la secuencia genealógica y la relación de primogenitura.
  - Los nombres propios siguen formas españolas o transliteraciones cercanas, sin añadir títulos ni explicaciones ajenas al texto.
  - La puntuación reproduce una cadencia natural para lectura litúrgica o pública.
