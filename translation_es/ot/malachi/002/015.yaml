translation:
  language: es
  text: ¿No hizo uno[a] a la pareja, con un remanente del Espíritu para él[b]? ¿Y qué buscaba el uno? Descendencia piadosa[c]. Así que guárdense en su espíritu, y que nadie traicione a la esposa de su juventud[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es difícil: literalmente, «¿No hizo uno, y un remanente de espíritu era suyo?». Otras interpretaciones incluyen: «Nadie que tenga siquiera un remanente de espíritu hace esto», o entender «el uno» como Abraham.'
    reason: alternative_reading
  - marker: b
    text: 'O: «un remanente de espíritu era suyo»; posiblemente, «tenía abundancia de espíritu».'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «simiente de Dios»; también puede traducirse «descendencia de Dios».
    reason: lexical_alternative
  - marker: d
    text: El hebreo usa un verbo en tercera persona singular; la versión española generaliza la prohibición con «nadie» para expresar el sentido de manera natural.
    reason: spanish_style_note
lexical_decisions:
- source_word: וְלֹא אֶחָד עָשָׂה
  english_pob_choice: Did not one make them?
  chosen_spanish: ¿No hizo uno [a]?
  alternatives_spanish:
  - ¿No hizo el Uno?
  - ¿No hizo uno solo?
  lexicon: HALOT
  rationale: El hebreo es comprimido y difícil. Mantengo la ambigüedad sintáctica con «uno» sin añadir «Dios», porque eso no está explícito en el texto hebreo. La forma interrogativa conserva el tono retórico del original y no fuerza una solución interpretativa en el cuerpo del verso.
- source_word: וּשְׁאָר רוּחַ לוֹ
  english_pob_choice: with a remnant of the Spirit for him
  chosen_spanish: el remanente del Espíritu fue suyo [b]
  alternatives_spanish:
  - el remanente de espíritu fue suyo
  - y tenía un remanente del espíritu
  - y tenía abundancia de espíritu
  lexicon: HALOT
  rationale: שְׁאָר expresa «remanente» o «resto». רוּחַ puede ser «espíritu», «espíritu divino», «aliento» o «viento»; aquí conservo la capitalización de «Espíritu» como posibilidad interpretativa, pero dejo abierta la tensión con una nota. «Fue suyo» refleja el valor posesivo de לּוֹ sin resolver demasiado la construcción.
- source_word: וּמָה הָאֶחָד מְבַקֵּשׁ
  english_pob_choice: And what was the one seeking?
  chosen_spanish: ¿Y qué buscaba el uno?
  alternatives_spanish:
  - ¿Y qué estaba buscando el uno?
  - ¿Y qué buscaba aquel uno?
  lexicon: HALOT
  rationale: «Buscaba» reproduce el valor de מְבַקֵּשׁ con un imperfecto natural en español. Mantengo «el uno» para conservar la referencia interna al antecedente, sin expandir el sujeto a una paráfrasis interpretativa.
- source_word: זֶרַע אֱלֹהִים
  english_pob_choice: Godly offspring
  chosen_spanish: Descendencia de Dios [c]
  alternatives_spanish:
  - descendencia piadosa
  - simiente de Dios
  - descendencia divina
  lexicon: HALOT
  rationale: La POB inglesa opta por una lectura cualitativa («godly offspring») pero también preserva la alternativa literal. En español, «Descendencia de Dios» conserva la fuerza genitiva y la tensión del hebreo, mientras la nota explica la opción cualitativa/idiomática. Evito «piadosa» en el texto principal para no borrar la conexión léxica con אֱלֹהִים.
- source_word: וְנִשְׁמַרְתֶּם בְּרוּחֲכֶם
  english_pob_choice: So guard yourselves in your spirit
  chosen_spanish: Así que cuiden su espíritu
  alternatives_spanish:
  - Así que cuídense en su espíritu
  - Por tanto, cuiden su espíritu
  - Tengan cuidado en su espíritu
  lexicon: HALOT
  rationale: El valor exhortativo/reflexivo de נִשְׁמַרְתֶּם se expresa con «cuiden», que en español funciona de manera natural como admonición. Simplifico ligeramente «en su espíritu» a «su espíritu» para una lectura fluida, pero la decisión sigue apuntando al ámbito interior del término hebreo.
- source_word: וּבְאֵשֶׁת נְעוּרֶיךָ אַל יִבְגֹּד
  english_pob_choice: and let no one deal treacherously with the wife of his youth
  chosen_spanish: y nadie [d] traicione a la esposa de su juventud.
  alternatives_spanish:
  - y no sea infiel a la esposa de su juventud
  - y no trate traicioneramente a la esposa de su juventud
  - y nadie sea desleal con la esposa de su juventud
  lexicon: HALOT
  rationale: בגד tiene fuerza de traición/falta de lealtad en contextos de pacto; «traicione» preserva mejor esa carga que una simple infidelidad. Uso «esposa de su juventud» por fidelidad a la expresión hebrea. «Nadie» generaliza la prohibición para reflejar el giro no perfectamente alineado del hebreo en español natural.
theological_decisions:
- issue: Interpretación del primer colon difícil y su relación con la teología matrimonial
  english_pob_reading: The verse is rendered as affirming that the one God made the married pair and seeks godly offspring through covenant faithfulness.
  chosen_spanish_reading: La traducción conserva la ambigüedad del «uno» y la relación con el matrimonio, sin resolver en el cuerpo del texto si se trata de Dios, del esposo o de una lectura más general.
  alternative_spanish_readings:
  - «¿No hizo uno Dios?»
  - «¿No hizo uno a la pareja?»
  - «¿No hizo uno solo?»
  rationale: El hebreo presenta una dificultad real y no conviene borrar esa tensión. La POB inglesa discute alternativas, por lo que la versión española mantiene la apertura semántica y deja la interpretación teológica implícita, en vez de imponer una solución dogmática.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Capitalización de רוּחַ como «Espíritu»
  english_pob_reading: Spirit
  chosen_spanish_reading: «Espíritu» con mayúscula en el texto principal, reconociendo una posible referencia al Espíritu divino o a una dotación espiritual.
  alternative_spanish_readings:
  - espíritu
  - aliento
  - viento
  rationale: El hebreo no marca mayúscula, así que esta es una decisión interpretativa. La mayúscula señala la lectura teológica posible que la POB inglesa también considera, pero sin eliminar la alternativa de minúscula, que sigue siendo viable.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Sentido de זֶרַע אֱלֹהִים
  english_pob_reading: Godly offspring
  chosen_spanish_reading: «Descendencia de Dios» con nota sobre la lectura cualitativa «descendencia piadosa»
  alternative_spanish_readings:
  - descendencia piadosa
  - simiente de Dios
  - descendencia divina
  rationale: La expresión puede leerse como descendencia perteneciente a Dios o como descendencia caracterizada por fidelidad a Dios. El español principal conserva la forma más cercana al hebreo y la nota explica la alternativa idiomática, evitando aplastar una posible tensión semántica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente del inglés POB: se eliminó «God» después de «one», y se ajustó la cláusula media hacia «a remnant of the Spirit was his/for him» sin sobreinterpretar. La versión española refleja esa cautela: no introduce «Dios» en el primer colon, conserva la relación posesiva en la segunda cláusula, y mantiene abierta la dificultad sintáctica mediante nota.'
  spanish_consistency_notes:
  - Uso «Yahvé» como forma predeterminada en otros contextos, pero aquí el versículo no contiene el nombre divino explícito.
  - «Espíritu» se mantiene con mayúscula por la lectura posible del texto, aunque la minúscula sigue siendo una alternativa legítima.
  - «Esposa de su juventud» conserva la formulación bíblica sin sustituirla por expresiones más modernas que perderían el eco del hebreo.
  - Evito «infiel» en el texto principal porque suaviza la fuerza de בגד; «traicione» conserva mejor la idea de ruptura de lealtad.
