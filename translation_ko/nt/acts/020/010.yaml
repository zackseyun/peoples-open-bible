base_translation:
  language: en
  yaml_path: translation/nt/acts/020/010.yaml
  text: But Paul went down and fell upon him[a], and embracing him said, “Do not be alarmed[b], for his life is in him.”
  footnotes:
  - marker: a
    text: Or 'his soul is in him.' The Greek word ψυχή can mean 'life,' 'self,' or 'soul'; here 'life' best fits the immediate context of whether he is dead or alive.
    reason: lexical_alternative
  - marker: b
    text: Paul's words can be understood either as saying the young man was not dead after all, or that his life had been restored; the Greek wording itself does not explicitly settle the question.
    reason: alternative_reading
