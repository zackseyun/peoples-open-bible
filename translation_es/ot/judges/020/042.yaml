translation:
  language: es
  text: Así se volvieron ante los hombres de Israel hacia el camino del desierto[a]; pero la batalla los alcanzó[c][b]; y los de las ciudades los estaban destruyendo en medio de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ante los hombres de Israel»; la frase también puede entenderse idiomáticamente como «de delante de los hombres de Israel», es decir, retirándose de ellos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y la batalla les dio alcance».'
    reason: lexical_alternative
  - marker: c
    text: El hebreo del último miembro es condensado y difícil. Probablemente se refiere a fuerzas israelitas que salían de las ciudades o de posiciones de emboscada y destruían a Benjamín desde dentro de su formación.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּפְנוּ
  english_pob_choice: they turned
  chosen_spanish: volvieron
  alternatives_spanish:
  - se volvieron
  - giraron
  - retrocedieron
  lexicon: HALOT
  rationale: El verbo hebreo פנה expresa básicamente ‘volver(se)’ o ‘apartarse’. En un contexto militar, ‘volvieron’ conserva la imagen de cambio de dirección sin forzar una paráfrasis más interpretativa como ‘huyeron’.
- source_word: לִפְנֵי אִישׁ יִשְׂרָאֵל
  english_pob_choice: before the men of Israel
  chosen_spanish: delante de los hombres de Israel
  alternatives_spanish:
  - ante los hombres de Israel
  - frente a los hombres de Israel
  - desde delante de los hombres de Israel
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente ‘delante de’. ‘Los hombres de Israel’ mantiene el matiz militar del hebreo mejor que una forma más general como ‘israelitas’. La opción alternativa ‘desde delante de’ explicita el valor idiomático de retirada, pero aquí se deja esa tensión para la nota.
- source_word: אֶל דֶּרֶךְ הַמִּדְבָּר
  english_pob_choice: toward the way of the wilderness
  chosen_spanish: hacia el camino del desierto
  alternatives_spanish:
  - hacia el camino del desierto
  - hacia la ruta del desierto
  - hacia el camino de la estepa
  lexicon: HALOT
  rationale: דֶּרֶךְ se traduce de manera directa como ‘camino’. ‘Desierto’ es el equivalente español habitual para מִדְבָּר en este contexto narrativo; ‘estepa’ sería posible en algunos contextos, pero aquí sería menos transparente.
- source_word: וְהַמִּלְחָמָה הִדְבִּיקָתְהוּ
  english_pob_choice: but the battle overtook them
  chosen_spanish: pero la batalla los alcanzó
  alternatives_spanish:
  - y la batalla los alcanzó
  - pero el combate los alcanzó
  - y la guerra los alcanzó
  lexicon: HALOT
  rationale: דבק en causativo comunica alcanzar y pegarse a algo; en español, ‘alcanzó’ expresa bien la idea de persecución que da alcance a la tropa. ‘Batalla’ mantiene el sujeto singular femenino del hebreo y evita disolver el verbo en una generalidad menos precisa.
- source_word: וַאֲשֶׁר מֵהֶעָרִים
  english_pob_choice: and those from the cities
  chosen_spanish: y los que venían de las ciudades
  alternatives_spanish:
  - y los que salían de las ciudades
  - y los de las ciudades
  - y los procedentes de las ciudades
  lexicon: HALOT
  rationale: La sintaxis hebrea es comprimida. ‘Los que venían de las ciudades’ conserva la procedencia sin decidir demasiado la mecánica táctica, que el contexto sugiere pero no explicita por completo.
- source_word: מַשְׁחִיתִים
  english_pob_choice: were destroying
  chosen_spanish: los estaban destruyendo
  alternatives_spanish:
  - los destruían
  - los estaban matando
  - los estaban arrasando
  lexicon: HALOT
  rationale: El participio de שׁחת tiene un valor destructivo fuerte. ‘Los estaban destruyendo’ sigue de cerca la elección inglesa POB y preserva la fuerza semántica sin reemplazarla automáticamente por un verbo más interpretativo como ‘matar’.
- source_word: אוֹת֖/וֹ
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - lo
  - los
  - a ellos
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular pronominal, el referente es colectivo. En español, ‘los’ comunica naturalmente el grupo militar implicado y evita una lectura engañosamente singular.
- source_word: בְּתוֹכֽוֹ
  english_pob_choice: in their midst
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - en su medio
  - dentro de ellos
  - en medio de ellos
  lexicon: HALOT
  rationale: La expresión hebrea indica una acción destructiva desde dentro o en el centro del grupo. ‘En medio de ellos’ es natural en español y mantiene la imagen táctica sin sobreexplicar el mecanismo.
theological_decisions:
- issue: Cómo reflejar la frase hebrea ambigua 'delante de' sin borrar su posible sentido idiomático de retirada.
  english_pob_reading: The phrase can also be understood idiomatically as 'from before the men of Israel,' that is, retreating from them.
  chosen_spanish_reading: delante de los hombres de Israel, con nota de que también puede entenderse como retirada desde delante de ellos.
  alternative_spanish_readings:
  - desde delante de los hombres de Israel
  - huyendo de los hombres de Israel
  - retirándose ante los hombres de Israel
  rationale: La traducción principal conserva la literalidad visible del hebreo, mientras que la nota preserva la lectura idiomática de retirada que el audit trail documenta. Así no se pierde la tensión entre imagen espacial y sentido militar.
  doctrine_reference: Hermenéutica lexical y sintaxis narrativa
- issue: Cómo traducir el cierre comprimido del verso sin ocultar la dificultad textual y táctica.
  english_pob_reading: The Hebrew in the last clause is compressed and difficult. It likely refers to Israelite forces coming out from the cities or ambush positions and destroying Benjamin from within their formation.
  chosen_spanish_reading: y los que venían de las ciudades los estaban destruyendo en medio de ellos, con nota sobre la posible referencia a fuerzas israelitas saliendo de ciudades o posiciones de emboscada.
  alternative_spanish_readings:
  - y los que salían de las ciudades los destruían en medio de ellos
  - y los de las ciudades los estaban destruyendo desde dentro
  - y quienes salían de las ciudades los destruían
  rationale: La frase principal sigue el hebreo y la versión inglesa auditada, pero la nota mantiene abierta la lectura de un movimiento táctico más preciso. Esto evita resolver prematuramente una ambigüedad que el propio texto hebreo presenta.
  doctrine_reference: Crítica textual y prudencia exegética
translation_notes:
  revision_awareness: El pasaje fue revisado en el pase más reciente y quedó sin cambios sustanciales; la presente propuesta mantiene esa estabilidad, pero en español conserva la ambigüedad lexical documentada en el audit trail, especialmente en לִפְנֵי y en la cláusula final comprimida.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como terminología de proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió 'hombres de Israel' para conservar el matiz militar del hebreo.
  - Se evitó 'Cristo' o terminología cristológica, que no corresponde al pasaje.
  - Se preservó la dificultad del final del verso en lugar de suavizarla con una paráfrasis explicativa en el texto principal.
