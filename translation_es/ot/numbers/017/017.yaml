    rationale: 'El expediente inglés documenta alternativas relevantes. En español conviene mantenerlas para transparencia editorial: ''los israelitas'' como alternativa a ''hijos de Israel'' y ''bastón'' o mejor ''cetro/vara/rod'' equivalente españolizado; aquí basta una nota sobre el rango ''vara''/''bastón'' o ''vara''/''cetro'' no, mejor ''vara''/''bastón'' sería menos precisa. Dado el inglés, una nota con ''o “vara”/“bastón”'' no mejora; mejor conservar una nota que explique que el hebreo puede significar ''vara'' o ''bastón'', aunque aquí se refiere a una vara física.'
