id: 2TH.1.4
reference: 2 Thessalonians 1:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὥστε ⸂αὐτοὺς ἡμᾶς⸃ ἐν ὑμῖν ⸀ἐγκαυχᾶσθαι ἐν ταῖς ἐκκλησίαις τοῦ θεοῦ ὑπὲρ τῆς ὑπομονῆς ὑμῶν καὶ πίστεως ἐν πᾶσιν τοῖς διωγμοῖς ὑμῶν καὶ ταῖς θλίψεσιν αἷς ἀνέχεσθε,
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/001/004.yaml
  text: so that we ourselves boast about you among the churches of God because of your perseverance and faith in all your persecutions and afflictions that you are enduring,[a]
  footnotes:
  - marker: a
    text: Or 'faithfulness'; πίστις can denote either faith or steadfast fidelity, especially in contexts of suffering.
    reason: alternative_reading
translation:
  language: ko
  text: 그래서 우리 자신이 여러분에 대해, 여러분이 견뎌내고 있는 모든 박해와 환난 속에서 보이는 여러분의 인내와 믿음[a] 때문에, 하나님의 회중들 가운데서 자랑합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「신실함」. 박해 가운데 견디는 정황에서 πίστις는 「신실함」의 음영을 함께 가질 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: αὐτοὺς ἡμᾶς
  english_pob_choice: we ourselves
  chosen_korean: 우리 자신이
  alternatives_korean:
  - 우리가 친히
  lexicon: BDAG
  rationale: 강조 대명사 구문을 한국어 「우리 자신이」로 보존한다.
- source_word: ἐγκαυχᾶσθαι
  english_pob_choice: boast
  chosen_korean: 자랑합니다
  alternatives_korean:
  - 자랑스러워합니다
  - 영광스레 여깁니다
  lexicon: BDAG
  rationale: 「자랑」은 바울의 강한 수사적 어조를 약화시키지 않고 그대로 옮긴다.
- source_word: ἐν ταῖς ἐκκλησίαις τοῦ θεοῦ
  english_pob_choice: among the churches of God
  chosen_korean: 하나님의 회중들 가운데서
  alternatives_korean:
  - 하나님의 교회들 가운데서
  lexicon: BDAG
  rationale: ἐκκλησία 글로서리 정책에 따라 「회중」을 우선한다. 복수형은 「회중들」로 자연스럽게 표현된다.
- source_word: ὑπομονῆς
  english_pob_choice: perseverance
  chosen_korean: 인내
  alternatives_korean:
  - 견딤
  - 굳건함
  lexicon: BDAG
  rationale: 박해 정황에서 압박 아래 견디는 의미를 가장 자연스럽게 담는다.
- source_word: διωγμοῖς
  english_pob_choice: persecutions
  chosen_korean: 박해
  alternatives_korean:
  - 핍박
  lexicon: BDAG
  rationale: 신앙으로 인한 적대적 압박을 가리키는 표준 한국어 용어.
- source_word: θλίψεσιν
  english_pob_choice: afflictions
  chosen_korean: 환난
  alternatives_korean:
  - 고난
  - 압박
  lexicon: BDAG
  rationale: 박해와 구별되는 더 넓은 압박·고통의 의미를 「환난」으로 자연스럽게 옮긴다.
- source_word: ἀνέχεσθε
  english_pob_choice: you are enduring
  chosen_korean: 견뎌내고 있는
  alternatives_korean:
  - 참아내고 있는
  - 견디고 있는
  lexicon: BDAG
  rationale: 현재 시제의 지속적 경험을 「견뎌내고 있는」으로 자연스럽게 표현한다.
theological_decisions:
- issue: πίστεως를 「믿음」 또는 「신실함」으로 번역할지
  chosen_reading: 믿음
  alternative_readings:
  - 신실함
  - 신뢰
  rationale: 기본 번역 「믿음」을 유지하되, 박해 가운데 견디는 정황에서 「신실함」의 음영을 각주로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις'
