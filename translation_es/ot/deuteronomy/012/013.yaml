translation:
  language: es
  text: Ten cuidado, no sea que ofrezcas tus holocaustos en cualquier lugar que veas.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ten cuidado de no ofrecer tus holocaustos en cualquier lugar que veas».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֶר לְךָ
  english_pob_choice: Be careful
  chosen_spanish: Ten cuidado
  alternatives_spanish:
  - Cuídate
  - Estate alerta
  - Guárdate
  lexicon: HALOT
  rationale: 'La forma niphal imperativa expresa una advertencia: “ponte en guardia”. “Ten cuidado” es natural en español, conserva el tono preventivo y no suaviza la fuerza de la orden.'
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o si no
  - no vaya a ser que
  lexicon: HALOT
  rationale: פֶּן introduce una cláusula de prevención negativa. “No sea que” reproduce bien ese valor advertencial en español bíblico contemporáneo sin sonar forzado.
- source_word: תַּעֲלֶה
  english_pob_choice: you offer up
  chosen_spanish: ofrezcas
  alternatives_spanish:
  - subas
  - sacrifiques
  - presentes
  lexicon: HALOT
  rationale: El hifil de עלה, en contexto cultual, significa presentar una ofrenda. “Ofrezcas” comunica el acto sacrificial con naturalidad; “subas” sería demasiado literal y “sacrifiques” pierde el matiz de elevar la ofrenda.
- source_word: עֹלֹתֶיךָ
  english_pob_choice: your burnt offerings
  chosen_spanish: tus holocaustos
  alternatives_spanish:
  - tus ofrendas quemadas
  - tus ofrendas totalmente quemadas
  lexicon: HALOT
  rationale: Se eligió “holocaustos” como término cultual tradicional y preciso para עֹלָה, la ofrenda que asciende en humo. Aunque “ofrendas quemadas” sería más descriptivo, “holocaustos” es más técnico y fiel al género sacrificial del texto.
- source_word: בְּכָל מָקוֹם
  english_pob_choice: in every place
  chosen_spanish: en todo lugar
  alternatives_spanish:
  - en cada lugar
  - en cualquier lugar
  - en todo sitio
  lexicon: HALOT
  rationale: 'La expresión hebrea tiene alcance distributivo: no en un solo sitio escogido libremente, sino en cualquier lugar. “En todo lugar” transmite bien esa amplitud y mantiene un español fluido.'
- source_word: אֲשֶׁר תִּרְאֶה
  english_pob_choice: that you see
  chosen_spanish: que veas
  alternatives_spanish:
  - que tú veas
  - que contemples
  - que elijas con la vista
  lexicon: HALOT
  rationale: La cláusula relativa es literalmente “que veas”. “Que veas” conserva la imagen concreta y evita introducir la idea de elección explícita más allá de la fuente.
theological_decisions:
- issue: Centralización cultual sin sobreextensión interpretativa
  english_pob_reading: Render the warning straightforwardly as a prohibition against offering burnt offerings at self-selected locations.
  chosen_spanish_reading: La frase se traduce como una prohibición concreta de ofrecer holocaustos en cualquier lugar que uno vea o elija visualmente.
  alternative_spanish_readings:
  - Prohibición general de adorar fuera del santuario central
  - Prohibición de cualquier sacrificio en lugares no autorizados
  rationale: El versículo menciona específicamente los holocaustos y el lugar, sin formular aquí una tesis general sobre toda adoración. La traducción evita expandir el alcance más allá de la redacción inmediata, aunque el contexto más amplio sí apunte a la centralización del culto.
  doctrine_reference: 'Principio de fidelidad textual: no importar afirmaciones doctrinales que el versículo no formula explícitamente.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el trazado auditado en inglés: advertencia imperativa + partícula preventiva + verbo cultual de ‘ofrecer’ + término sacrificial específico + alcance distributivo de ‘en todo lugar’ + relativa visual concreta. Se evitó ampliar el sentido a una prohibición general del culto fuera del santuario, porque el texto aquí nombra de manera directa los holocaustos en cualquier lugar escogido por la vista.'
  spanish_consistency_notes:
  - Se mantiene “holocaustos” para עֹלֹת, conforme al registro cultual y a la transparencia terminológica del proyecto.
  - Se usa “Ten cuidado” para la advertencia niphal de שׁמר, evitando una formulación demasiado débil o demasiado arcaica.
  - “En todo lugar” conserva el alcance distributivo de בְּכָל מָקוֹם mejor que una expresión restringida.
  - La nota al pie ofrece la alternativa cercana en español sin duplicar el sentido de la línea principal.
