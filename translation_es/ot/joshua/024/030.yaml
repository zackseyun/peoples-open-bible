translation:
  language: es
  text: Y lo sepultaron en el territorio de su heredad[a], en Timnat-seraj, que está en la región montañosa de Efraín, al norte del monte Gaas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el límite de su heredad». El hebreo puede designar el borde o el territorio delimitado por él; aquí probablemente se refiere al área de la heredad asignada a Josué.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבְּרוּ
  english_pob_choice: And they buried
  chosen_spanish: Y lo sepultaron
  alternatives_spanish:
  - Y lo enterraron
  - Entonces lo sepultaron
  lexicon: HALOT
  rationale: El verbo קבר se entiende como la acción de dar sepultura; en español, 'sepultar' conserva el registro digno y narrativo del pasaje. El prefijo conjuntivo וַ- se refleja con 'Y'.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El objeto directo masculino singular se expresa naturalmente con el clítico 'lo' en español. El referente es Josué, ya identificado por el contexto inmediato.
- source_word: בִּגְבוּל נַחֲלָתוֹ
  english_pob_choice: within the territory of his inheritance
  chosen_spanish: dentro del territorio de su heredad
  alternatives_spanish:
  - en el límite de su heredad
  - en el territorio de su heredad
  - dentro de la frontera de su heredad
  lexicon: HALOT
  rationale: גְּבוּל puede significar 'límite' o 'territorio delimitado'. Aquí el contexto de entierro en la porción asignada favorece una referencia al área de la heredad; 'territorio de su heredad' preserva esa amplitud. 'Heredad' mantiene el matiz de herencia territorial sin imponer un término más técnico.
- source_word: בְּתִמְנַת סֶרַח
  english_pob_choice: at Timnath-serah
  chosen_spanish: en Timnat-seraj
  alternatives_spanish:
  - en Timnat-Sérah
  - en Timnath-seraj
  lexicon: HALOT
  rationale: Se translitera el topónimo de forma readable en español. 'Timnat-seraj' evita una adaptación demasiado anglicada y conserva la forma hebrea del nombre propio.
- source_word: אֲשֶׁר בְּהַר אֶפְרָיִם
  english_pob_choice: which is in the hill country of Ephraim
  chosen_spanish: que está en la región montañosa de Efraín
  alternatives_spanish:
  - que está en la montaña de Efraín
  - que está en la serranía de Efraín
  - que está en el monte Efraín
  lexicon: HALOT
  rationale: הַר en esta construcción geográfica designa la zona elevada o región montañosa, no una sola montaña. 'Región montañosa' comunica el sentido de manera natural y fiel.
- source_word: מִצְּפוֹן
  english_pob_choice: north of
  chosen_spanish: al norte de
  alternatives_spanish:
  - al lado norte de
  - hacia el norte de
  lexicon: HALOT
  rationale: La preposición con צָפוֹן indica ubicación relativa; 'al norte de' es la forma idiomática en español.
- source_word: לְהַר גָּעַשׁ
  english_pob_choice: Mount Gaash
  chosen_spanish: el monte Gaas
  alternatives_spanish:
  - el monte Gaash
  - el monte Gaaš
  lexicon: HALOT
  rationale: Se conserva el valor topográfico de הַר con 'monte'. 'Gaas' ofrece una transliteración castellana clara del nombre propio, manteniendo la referencia geográfica.
theological_decisions:
- issue: ¿Cómo verter גְּבוּל en el contexto de entierro y heredad?
  english_pob_reading: The term can denote either a boundary or the territory enclosed by it; here it likely refers to the area of Joshua's allotted inheritance.
  chosen_spanish_reading: '''Territorio'' en ''dentro del territorio de su heredad'''
  alternative_spanish_readings:
  - '''límite de su heredad'''
  - '''frontera de su heredad'''
  - '''borde de su heredad'''
  rationale: El contexto no describe la línea fronteriza sino el lugar donde fue sepultado Josué dentro de su porción asignada. 'Territorio' evita reducir el sentido a una línea y preserva la tensión semántica documentada por el POB inglés.
  doctrine_reference: Josué 24:30; cf. uso territorial de נַחֲלָה en la asignación de la tierra.
translation_notes:
  revision_awareness: El texto inglés auditado y la revisión más reciente no introducen cambios; se mantiene la decisión léxica principal sobre גְּבוּל y la localización geográfica, con equivalencia óptima estable y sin ajustes pendientes.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - Se mantiene 'heredad' para נַחֲלָה, coherente con el lenguaje de reparto territorial de Josué.
  - Se transliteran los nombres propios del lugar de forma consistente con una lectura bíblica en español y sin sustituirlos por equivalentes tradicionales no atestiguados aquí.
