base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/002/021.yaml
  text: Afterward Hezron went in to the daughter of Machir the father of Gilead[a], and he took her when he was sixty years old[c][b], and she bore Segub to him.
  footnotes:
