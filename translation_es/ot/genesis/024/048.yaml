  revision_rationale: Se conserva la estructura y el sentido del borrador, pero se reemplaza «mi señor» por «mi amo» en ambas apariciones para reflejar mejor que אֲדֹנִי se refiere al superior humano del siervo, no a un título divino, y para lograr un español más natural y claro en este contexto.
