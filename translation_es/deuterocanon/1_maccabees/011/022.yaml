    text: Greek literally, 'not to sit around' or 'not to remain around'; in context this refers to maintaining the siege.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek clause about meeting is textually awkward (''to meet him, to come together with him''). The translation renders the apparent sense: Jonathan is summoned to meet for a conference in Ptolemais.'
