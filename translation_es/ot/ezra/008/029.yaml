revisions:
- from: Velen con cuidado y guárdenlos hasta que los pesen delante de los jefes de los sacerdotes, de los levitas y de los jefes de las casas paternas[a] de Israel, en Jerusalén, en las cámaras[c] de la casa de Yahvé[b].
  to: Velen con cuidado[a] y guárdenlos hasta que los pesen delante de los principales sacerdotes, y los levitas, y los jefes de las casas paternas[b] de Israel, en Jerusalén, en las cámaras[c] de la casa de Yahvé[d].
  rationale: Se ajustó la lista de autoridades para reflejar mejor la coordinación del hebreo y se reemplazó «los jefes de los sacerdotes» por «los principales sacerdotes», que es más natural en español sin perder el sentido de líderes sacerdotales. También se añadió la nota alternativa sobre los imperativos de vigilancia, en línea con la auditoría inglesa, y se reordenaron las notas para que cada marcador aparezca exactamente en el texto revisado.
