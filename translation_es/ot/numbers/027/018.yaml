translation:
  language: es
  text: 'Yahvé dijo a Moisés: «Toma a Josué hijo de Nun, un hombre en quien hay espíritu[a], y pon tu mano sobre él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un hombre en quien hay espíritu», o «un hombre que tiene espíritu». El hebreo no incluye el artículo.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, preservando la referencia explícita al Tetragrámaton en español sin sustituirlo por una convención de máscara litúrgica.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico con forma asentada en español.
- source_word: קַח לְךָ
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Toma para ti
  - Toma para ti mismo
  lexicon: HALOT
  rationale: El imperativo se expresa de modo natural y directo en español. El matiz reflexivo de לְךָ existe, pero aquí no requiere explicitación para no sobrecargar la frase.
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  english_pob_choice: Joshua son of Nun
  chosen_spanish: Josué hijo de Nun
  alternatives_spanish:
  - Josué, hijo de Nun
  lexicon: HALOT
  rationale: Se conserva la filiación con la construcción usual en español bíblico; el nombre propio se adapta a la forma establecida 'Josué'.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - uno
  lexicon: HALOT
  rationale: El hebreo es masculino singular y el POB inglés preserva ese rasgo; 'un hombre' mantiene la precisión léxica y la concordancia contextual.
- source_word: אֲשֶׁר רוּחַ בּוֹ
  english_pob_choice: in whom is spirit
  chosen_spanish: en quien hay espíritu
  alternatives_spanish:
  - en quien hay el Espíritu
  - que tiene espíritu
  - en quien hay un espíritu
  lexicon: HALOT
  rationale: La cláusula hebrea es literalmente 'en quien hay espíritu'. En español, 'hay' refleja bien la estructura existencial. No se fija 'el Espíritu' porque el hebreo no lleva artículo; se preserva así la tensión entre una referencia probablemente divina y la formulación abierta del original.
- source_word: וְסָמַכְתָּ אֶת יָדְךָ עָלָיו
  english_pob_choice: and lay your hand on him
  chosen_spanish: y pon tu mano sobre él
  alternatives_spanish:
  - y extiende tu mano sobre él
  - y apoya tu mano sobre él
  lexicon: HALOT
  rationale: '''סמך'' con ''mano'' sobre una persona expresa la imposición de manos. ''Pon tu mano sobre él'' es idiomático en español, claro y fiel al gesto ritual/commissioning.'
theological_decisions:
- issue: Sentido de רוּחַ en la comisión de Josué
  english_pob_reading: the Spirit, while the latest revision lowered the capitalization to 'spirit' for lexical accuracy because the Hebrew lacks the article
  chosen_spanish_reading: espíritu (sin articular como 'el Espíritu')
  alternative_spanish_readings:
  - el Espíritu
  - un espíritu
  - espíritu humano/disposición
  rationale: La evidencia contextual apunta a una dotación para liderazgo, probablemente de origen divino, pero el hebreo dice simplemente 'espíritu' sin artículo. En español conviene mantener la apertura semántica del texto y no resolverla con demasiada especificidad doctrinal. Por eso se evita 'el Espíritu' en el cuerpo principal y se deja constancia de la alternativa.
  doctrine_reference: Preservar la tensión lexical y teológica del texto; no introducir determinación gramatical que el hebreo no marca.
translation_notes:
  revision_awareness: El borrador sigue el ajuste más reciente del audit trail, que corrigió la capitalización inglesa de 'Spirit' a 'spirit' para respetar que el hebreo no lleva artículo. La redacción española refleja esa misma decisión al evitar una explicitación como 'el Espíritu'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal para יהוה, conforme al estándar del proyecto.
  - Se conserva 'un hombre' para אִישׁ, sin neutralización de género, porque el referente masculino es explícito en el hebreo.
  - Se usa 'espíritu' sin mayúscula en el texto principal para no sobretraducir el artículo ausente.
  - La frase 'pon tu mano sobre él' reproduce la idiomática española de la imposición de manos sin añadir elementos no presentes en el hebreo.
