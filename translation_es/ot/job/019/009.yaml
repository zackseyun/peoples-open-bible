translation:
  language: es
  text: Él me ha despojado de mi honor[a] y ha quitado la corona de mi cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «honor» también puede entenderse como «gloria» o «dignidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּבוֹדִי
  english_pob_choice: my honor
  chosen_spanish: mi honor
  alternatives_spanish:
  - mi gloria
  - mi dignidad
  lexicon: HALOT
  rationale: כָּבוֹד puede expresar honor, gloria o peso social. En el lamento de Job, el sentido concreto de estatus y prestigio perdido se comunica mejor con «honor», que en español resulta natural y evita que «gloria» suene excesivamente teológica.
- source_word: מֵעָלַי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de encima de mí
  - de sobre mí
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de sobre mí», pero en español, con «despojar», la forma idiomática y clara es «de mí». Conserva la idea de retirada sin forzar la sintaxis.
- source_word: הִפְשִׁיט
  english_pob_choice: has stripped
  chosen_spanish: me ha despojado
  alternatives_spanish:
  - me ha desnudado
  - me ha despojado de
  lexicon: HALOT
  rationale: El verbo expresa quitar algo como si se arrancara una prenda. «Despojar» preserva esa fuerza metafórica en español y se ajusta al tono poético del lamento.
- source_word: וַיָּסַר
  english_pob_choice: removed
  chosen_spanish: ha quitado
  alternatives_spanish:
  - ha removido
  - ha apartado
  - ha tomado
  lexicon: HALOT
  rationale: סוּר en esta forma puede significar quitar o retirar. «Ha quitado» mantiene el paralelismo con «despojado» y es más natural que un calco.
- source_word: עֲטֶרֶת
  english_pob_choice: the crown
  chosen_spanish: la corona
  alternatives_spanish:
  - el adorno de la cabeza
  - la diadema
  lexicon: HALOT
  rationale: El sustantivo designa una corona o círculo de honra. «Corona» es la equivalencia más clara y directa en español.
- source_word: רֹאשִׁי
  english_pob_choice: my head
  chosen_spanish: de mi cabeza
  alternatives_spanish:
  - de mi frente
  - sobre mi cabeza
  lexicon: HALOT
  rationale: 'La imagen de la corona sobre la cabeza se conserva mejor con una traducción literal y natural: «de mi cabeza».'
theological_decisions:
- issue: Agente implícito de la humillación
  english_pob_reading: He refers to God as the one who has humiliated Job.
  chosen_spanish_reading: «Él» deja implícito al mismo agente que el contexto atribuye a Dios, sin añadir «Dios» en el texto.
  alternative_spanish_readings:
  - Dios me ha despojado de mi honor
  - Él me ha despojado, refiriéndose a un adversario no identificado
  rationale: La versión inglesa conserva el pronombre masculino singular sin explicitar el nombre divino. En español conviene mantener esa tersura y la tensión del lamento, dejando que el contexto identifique al agente.
  doctrine_reference: Preservar la tensión teológica del texto y la prioridad del hebreo sobre la clarificación interpretativa.
translation_notes:
  revision_awareness: 'El borrador sigue el estado más reciente sin cambios sustantivos: mantiene la lectura de agencia implícita y las equivalencias léxicas principales confirmadas por la revisión comparativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige; aquí no aparece el nombre divino explícito.
  - Se conserva el registro poético y de lamento con vocabulario claro y sobrio.
  - «Despojado» y «quitado» mantienen el paralelismo verbal del hebreo sin sobreinterpretarlo.
