translation:
  language: es
  text: Muchos han sido arruinados por el oro, y por confiar en las perlas[a]; no hallaron escape del mal[b], ni liberación en el día de la ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo פנינים puede significar «perlas» o, de manera más amplia, gemas o joyas costosas.
    reason: lexical_alternative
  - marker: b
    text: 'El testimonio griego difiere de forma importante: «Si no es enviado por el Altísimo en visitación, no les des tu corazón». El hebreo usado para el texto principal, en cambio, advierte que la confianza en las riquezas no salva del mal ni del día de la ira.'
    reason: textual_variant
lexical_decisions:
- source_word: חבולי
  english_pob_choice: have been ruined
  chosen_spanish: han sido arruinados
  alternatives_spanish:
  - han sido dañados
  - han sido atrapados
  - han sido heridos
  - han sido llevados a la ruina
  lexicon: HALOT
  rationale: El hebreo describe personas perjudicadas o abatidas por el oro; en español, «han sido arruinados» comunica bien la caída práctica y moral sin forzar una imagen demasiado literal.
- source_word: זהב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro metálico
  - riquezas
  lexicon: HALOT
  rationale: La referencia directa es al metal precioso como símbolo de riqueza; «oro» es la equivalencia natural y transparente en español.
- source_word: הבוטח
  english_pob_choice: by trusting in
  chosen_spanish: por confiar en
  alternatives_spanish:
  - el que confía en
  - y el que confía en
  lexicon: HALOT
  rationale: El participio hebreo expresa la acción de confiar como causa del desastre. «Por confiar en» conserva el valor causal y suena natural en español.
- source_word: פנינים
  english_pob_choice: pearls
  chosen_spanish: las perlas
  alternatives_spanish:
  - las gemas preciosas
  - las joyas
  - las piedras preciosas
  - las perlas o gemas
  lexicon: HALOT
  rationale: «Perlas» sigue de cerca la decisión inglesa y es una traducción defendible; el término hebreo puede abarcar adornos o gemas costosas más amplias, por lo que se mantiene una nota alternativa.
- source_word: להנצל
  english_pob_choice: find escape
  chosen_spanish: hallar escape
  alternatives_spanish:
  - ser librados
  - ser rescatados
  - encontrar salvación
  lexicon: HALOT
  rationale: La construcción negativa pide una expresión de rescate no alcanzado. «Hallar escape» reproduce bien la fuerza idiomática del hebreo en español.
- source_word: מרעה
  english_pob_choice: from evil
  chosen_spanish: del mal
  alternatives_spanish:
  - de la desgracia
  - del daño
  - de la calamidad
  lexicon: HALOT
  rationale: En este contexto sapiencial, el término puede abarcar mal moral o adversidad destructiva. «Del mal» conserva esa amplitud sin cerrarla demasiado.
- source_word: להושע
  english_pob_choice: deliverance
  chosen_spanish: liberación
  alternatives_spanish:
  - rescate
  - salvación
  lexicon: HALOT
  rationale: «Liberación» comunica la idea de ser sacados de una situación peligrosa sin cargar de inmediato con un matiz doctrinal específico que el hebreo aquí no exige.
- source_word: ביום עברה
  english_pob_choice: on the day of wrath
  chosen_spanish: en el día de la ira
  alternatives_spanish:
  - en el día del furor
  - en el día de la indignación
  - el día de la ira
  lexicon: HALOT
  rationale: La fórmula hebrea apunta a un día de juicio. «Ira» es la forma española más directa y solemne para reflejar עברה en este registro sapiencial.
- source_word: ἐπισκοπῇ (Greek parallel)
  english_pob_choice: wrath/judgment context reflected indirectly
  chosen_spanish: visita/inspección
  alternatives_spanish:
  - visitación
  - supervisión
  - juicio
  lexicon: BDAG
  rationale: El griego paralelo dice literalmente que algo es enviado «en visitación»; como el texto principal sigue el hebreo donde se conserva, esa terminología queda documentada en la nota textual y no se incorpora al texto base.
theological_decisions:
- issue: Selección de la base textual ante la discrepancia hebreo-griego
  english_pob_reading: Follow the extant Hebrew as the main text, with the Greek preserved as a textual alternative in a footnote.
  chosen_spanish_reading: Seguir el hebreo conservado como texto principal y registrar el griego como variante textual en nota.
  alternative_spanish_readings:
  - 'Traducir el griego: «Si no es enviado por el Altísimo en visitación, no les des tu corazón».'
  rationale: En Sirácides, cuando el hebreo está disponible, la política del proyecto privilegia ese testimonio para el texto principal. Aquí la diferencia con el griego es sustancial; por eso se mantiene el hebreo en la línea principal y se documenta honestamente la variante griega.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácides desde el hebreo donde sobreviva; usar el griego de Swete como control y preservar con honestidad las incertidumbres.'
translation_notes:
  revision_awareness: No se hicieron cambios respecto del último pase revisado; la formulación conserva la solución aprobada y mantiene explícita la discrepancia textual hebreo-griego.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma de proyecto solo cuando aparezca el nombre divino explícito; en este versículo no ocurre.
  - «Oro» traduce literalmente זהב sin diluir su valor simbólico como riqueza.
  - «Perlas» se mantiene con nota para no cerrar indebidamente el sentido de פנינים.
  - «Del mal» y «en el día de la ira» conservan el tono sapiencial y judicial del hebreo.
  - La nota textual deja visible la alternativa griega sin mezclarla con el texto principal.
