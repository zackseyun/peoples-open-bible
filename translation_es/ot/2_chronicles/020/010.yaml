base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/020/010.yaml
  text: And now[a], behold, the people of Ammon and Moab and Mount Seir[b], whom you did not allow Israel to enter against when they came from the land of Egypt—for they turned away from them and did not destroy them—
  footnotes:
  - marker: a
    text: Or 'the Ammonites and Moabites and those of Mount Seir.' The Hebrew literally names 'the sons of Ammon and Moab and Mount Seir.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'whom you did not give Israel to enter into/against'; the sense in context is that God did not permit Israel to attack them.
    reason: lexical_alternative
