theological_decisions:
- issue: Nature of the disciples' lack of understanding
  chosen_reading: Retain the text's threefold description of incomprehension without specifying whether the concealment is divine, providential, or simply narrative.
  alternative_readings:
  - Interpret the hiddenness as explicitly God's action
  - Interpret the hiddenness as merely psychological confusion
  rationale: The passive 'was hidden from them' leaves the agent unstated. In keeping with the translation philosophy, the rendering preserves that theological tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
