translation:
  language: es
  text: Yahvé guardará tu salida y tu entrada desde ahora y para siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español, el nombre divino se vierte como “Yahvé” para preservar el nombre propio del pacto, en continuidad con la decisión auditada del POB inglés de transliterar el nombre en lugar de sustituirlo por un título.
- source_word: יִשְׁמָר
  english_pob_choice: will keep
  chosen_spanish: guardará
  alternatives_spanish:
  - mantendrá
  - cuidará
  - preservará
  lexicon: HALOT
  rationale: שׁמר admite los sentidos de guardar, vigilar y proteger. “Guardará” conserva bien el valor de protección continua y funciona naturalmente con el paralelismo poético del salmo.
- source_word: צֵאתְךָ
  english_pob_choice: your going out
  chosen_spanish: tu salida
  alternatives_spanish:
  - tu salida y partida
  - tu partida
  - tu irte
  lexicon: HALOT
  rationale: La expresión hebrea es un sustantivo verbal con sufijo y forma parte del merismo con “entrada”. En español, “tu salida” mantiene la amplitud idiomática sin restringirlo a una sola partida puntual.
- source_word: וּבוֹאֶךָ
  english_pob_choice: and your coming in
  chosen_spanish: y tu entrada
  alternatives_spanish:
  - y tu llegada
  - y tu entrar
  lexicon: HALOT
  rationale: Para el par merístico, “entrada” conserva la correspondencia natural con “salida” y expresa el movimiento de regreso o acceso al hogar/lugar de vida sin perder la imagen hebrea.
- source_word: מֵעַתָּה
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - desde este momento
  - de ahora en adelante
  lexicon: HALOT
  rationale: La forma hebrea indica inicio temporal continuo. “Desde ahora” es breve, claro y fiel; el valor continuativo queda reforzado por la cláusula final.
- source_word: וְעַד עוֹלָם
  english_pob_choice: and forever
  chosen_spanish: y para siempre
  alternatives_spanish:
  - y para toda la eternidad
  - y por siempre
  lexicon: HALOT
  rationale: עולם expresa duración sin límite. “Para siempre” es la equivalencia más natural en español y conserva el alcance temporal absoluto del hebreo.
theological_decisions:
- issue: Rendering of the divine name YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo emplea el nombre propio del pacto, no un título. “Yahvé” mantiene la referencia personal al Dios de Israel y evita la sustitución reverencial por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: The English audit trail settled on a straightforward rendering of the merism 'going out and coming in' and updated the duration phrase to 'from now on and forever.' The Spanish draft follows the same sense directly, without adding footnotes because the chosen wording already reads naturally and no anchored alternative is necessary in this record.
  spanish_consistency_notes:
  - Se preserva el merismo hebreo con el par 'salida/entrada'.
  - Se evita 'SEÑOR' para no ocultar el nombre divino.
  - La duración final se expresa con una fórmula idiomática y completa en español.
  - El tono es bíblico y publicable sin arcaísmos innecesarios.
