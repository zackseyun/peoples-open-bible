translation:
  language: es
  text: 'A los hijos de Gersón, de la familia de la media tribu de Manasés: Golán en Basán con sus tierras de pastoreo[a], y Astarot con sus tierras de pastoreo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tierras comunales» para «tierras de pastoreo»; el hebreo se refiere al terreno abierto perteneciente a una ciudad, usado a menudo para el pastoreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי גֵּרְשׁוֹם
  english_pob_choice: To the sons of Gershom
  chosen_spanish: Para los hijos de Gersón
  alternatives_spanish:
  - Para los descendientes de Gersón
  - A los hijos de Gersón
  lexicon: HALOT
  rationale: El valor de לִ aquí es direccional/de asignación («para»), y el idiomatismo genealógico natural en español es «hijos de». Se conserva el nombre propio en forma castellana usual «Gersón» para el linaje levítico.
- source_word: מִמִּשְׁפַּחַת
  english_pob_choice: from the clan of
  chosen_spanish: de la familia de
  alternatives_spanish:
  - del clan de
  - de la familia/clan de
  lexicon: HALOT
  rationale: En castellano, «clan» puede sonar técnico o etnográfico; «familia» comunica la subdivisión tribal de manera clara y sobria. Como el contexto es de reparto territorial, se mantiene la relación genealógica sin exagerar la precisión sociológica.
- source_word: חֲצִי מַטֵּה מְנַשֶּׁה
  english_pob_choice: the half-tribe of Manasseh
  chosen_spanish: la media tribu de Manasés
  alternatives_spanish:
  - la mitad de la tribu de Manasés
  - la media tribu de Manasés
  lexicon: HALOT
  rationale: «Media tribu» es la expresión tradicional y exacta para la división territorial de Manasés; evita una frase más pesada como «la mitad de la tribu». Se conserva «Manasés» como nombre propio bíblico.
- source_word: גּוֹלָן בַּבָּשָׁן
  english_pob_choice: Golan in Bashan
  chosen_spanish: Golán en Basán
  alternatives_spanish:
  - Golán en el Basán
  - Golán, en Basán
  lexicon: HALOT
  rationale: Se translitera el topónimo como «Golán», forma natural en español bíblico. «En Basán» refleja la relación locativa sin añadir artículo donde el español no lo requiere.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus tierras de pastoreo
  alternatives_spanish:
  - sus pastos
  - sus tierras comunales
  - sus tierras de alrededor
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto asociado a una ciudad levítica, a menudo usado para pastoreo. «Tierras de pastoreo» mantiene la referencia concreta sin borrar la amplitud del término, que puede incluir espacio comunal abierto.
- source_word: עַשְׁתָּרֹוֹת
  english_pob_choice: Ashtaroth
  chosen_spanish: Astarot
  alternatives_spanish:
  - Ashtarot
  - Astarot
  lexicon: HALOT
  rationale: Se adopta la transliteración «Astarot», estándar y fluida en español bíblico. Evita la forma inglesa «Ashtaroth» y conserva la identidad del lugar.
- source_word: וְאֶת ... וְאֶת
  english_pob_choice: and ... with
  chosen_spanish: y ... con
  alternatives_spanish:
  - y ... y
  - y ... junto con
  lexicon: HALOT
  rationale: El hebreo repite la partícula de objeto para coordinar los elementos de la lista. En español, «con sus tierras de pastoreo» reproduce de forma natural la relación entre ciudad y terrenos anexos, como en el audit trail inglés.
translation_notes:
  revision_awareness: La versión inglesa auditada ya muestra acuerdo alto y no introduce revisiones textuales; esta propuesta sigue de cerca el hebreo masorético y conserva la solución léxica de «pasturelands» con una alternativa anotada para el matiz de מִגְרָשׁ.
  spanish_consistency_notes:
  - Se mantiene la terminología geográfica y tribal en registro bíblico sobrio.
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton ni una referencia divina directa.
  - La nota textual/lexical se limita a מִגְרָשׁ, ya que es el único punto con matiz semántico relevante en el versículo.
