    rationale: La nota dice «O ‘toda su casa’», pero esa ya es la lectura del texto principal. Conviene presentar verdaderas alternativas, por ejemplo «todo su hogar», «toda su familia» o «todo su linaje».
  revised_spanish_text: Entonces murió Saúl[a], y sus tres hijos, y toda su casa murieron juntamente.
