translation:
  language: es
  text: Así fueron todos los registrados de los hijos de Israel[a], según sus casas paternas, de veinte años de edad en adelante, todo el que podía salir a la guerra en Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice «los hijos de Israel», y se conserva aquí porque el censo está organizado explícitamente en términos masculinos y militares.
    reason: lexical_alternative
  - marker: b
    text: O «todos aptos para el servicio militar». Literalmente, «todo el que sale a la guerra / al ejército».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: So ... were
  chosen_spanish: Así resultaron
  alternatives_spanish:
  - Y fueron
  - De modo que resultaron
  lexicon: HALOT
  rationale: La forma wayyiqtol retoma y resume el cómputo previo. «Así resultaron» conserva el valor conclusivo/sumario sin sonar forzado en español.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - la totalidad de
  - todos los
  lexicon: HALOT
  rationale: Expresa la cobertura completa del total censado.
- source_word: פְּקוּדֵי
  english_pob_choice: those counted
  chosen_spanish: los contados
  alternatives_spanish:
  - los registrados
  - los empadronados
  - los enumerados
  lexicon: HALOT
  rationale: En contexto de censo/muster, «los contados» mantiene la voz resultativa y la referencia al acto de contar sin añadir matices ajenos.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los descendientes de Israel
  lexicon: HALOT
  rationale: Se conserva la formulación masculina del hebreo porque el contexto censal y militar la hace significativa; no se suaviza a «israelitas» en el texto principal.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: según sus casas paternas
  alternatives_spanish:
  - por sus casas de los padres
  - según sus casas de familia
  lexicon: HALOT
  rationale: «Casas paternas» reproduce la estructura social de clanes/linajes del hebreo con un español natural y técnico.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: de veinte años de edad en adelante
  alternatives_spanish:
  - desde los veinte años y más
  - a partir de los veinte años
  lexicon: HALOT
  rationale: Es una fórmula idiomática clara en español y fiel al umbral etario.
- source_word: כָּל יֹצֵא צָבָא
  english_pob_choice: every one able to go out to war
  chosen_spanish: todos los que salen a la guerra
  alternatives_spanish:
  - todos los aptos para el servicio militar
  - todos los que van a la guerra
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y militar; «salen a la guerra» conserva el giro literal y su fuerza contextualmente bélica.
- source_word: צָבָא
  english_pob_choice: war
  chosen_spanish: la guerra
  alternatives_spanish:
  - el servicio militar
  - el ejército
  lexicon: HALOT
  rationale: Dentro de la locución יצא צבא, el sentido aquí es campaña/guerra. «La guerra» es la opción más directa en español.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  lexicon: HALOT
  rationale: Es la preposición locativa/corporativa más natural en español y mantiene la referencia nacional/comunitaria.
theological_decisions:
- issue: El lenguaje masculino del censo y su posible neutralización
  english_pob_reading: The Hebrew reads 'the sons of Israel,' which is retained here because the census is explicitly organized in male, military terms.
  chosen_spanish_reading: Se mantiene «los hijos de Israel» en vez de neutralizarlo a «los israelitas» en el texto principal.
  alternative_spanish_readings:
  - los israelitas
  - los descendientes de Israel
  rationale: El hebreo es explícitamente masculino y el contexto es censal-militar; traducirlo de forma genérica borraría una tensión documentada por el propio audit trail.
  doctrine_reference: Precisión textual y fidelidad al referente masculino del pasaje censal.
translation_notes:
  revision_awareness: La versión inglesa auditada no mostró revisiones aplicadas y el último pase indicó que el texto permanecía sin cambios; por eso la redacción española sigue de cerca la decisión base del POB, sin introducir ajustes no motivados por el hebreo.
  spanish_consistency_notes:
  - Se mantiene la terminología censal con «contados» para פְּקוּדֵי.
  - Se conserva el sintagma masculino «hijos de Israel» por coherencia con el contexto militar.
  - «Casas paternas» se usa de forma consistente para לְבֵית אֲבֹתָם.
  - «Salen a la guerra» reproduce el giro idiomático de יֹצֵא צָבָא sin sustituirlo por una paráfrasis más amplia.
