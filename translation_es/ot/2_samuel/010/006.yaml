    text: Hebrew 'Aram'; traditionally 'Syria/Syrians.'
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'Ish-tob,' taken as a place or clan name; here rendered 'the men of Tob.'
    reason: alternative_reading
