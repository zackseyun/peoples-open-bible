translation:
  language: es
  text: El árbol[a] que viste, que creció y se hizo fuerte, cuya altura llegó hasta los cielos y fue visible desde toda la tierra—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Arameo אַרְעָא también puede significar «país»; aquí «tierra» encaja mejor con el alcance global de la imagen del sueño.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִֽילָנָא
  english_pob_choice: the tree
  chosen_spanish: el árbol
  alternatives_spanish:
  - el árbol mismo
  lexicon: HALOT
  rationale: El sustantivo arameo es un nombre común con artículo definido; en español, «el árbol» comunica naturalmente la referencia específica al árbol de la visión sin añadir énfasis innecesario.
- source_word: דִּי
  english_pob_choice: that / which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - que el
  lexicon: HALOT
  rationale: La partícula relativa se vierte con «que», que permite mantener la subordinación descriptiva de forma natural en español.
- source_word: חֲזַיְתָ
  english_pob_choice: you saw
  chosen_spanish: viste
  alternatives_spanish:
  - observaste
  - viste tú
  lexicon: HALOT
  rationale: El perfecto arameo de segunda persona singular se expresa de manera directa y natural con «viste».
- source_word: רְבָה
  english_pob_choice: grew
  chosen_spanish: creció
  alternatives_spanish:
  - se hizo grande
  - se volvió grande
  lexicon: HALOT
  rationale: Aunque el verbo puede sugerir hacerse grande, en la imagen del árbol «creció» preserva con claridad el desarrollo orgánico y sigue de cerca la fuerza del verbo.
- source_word: וּתְקִף
  english_pob_choice: and became strong
  chosen_spanish: y se hizo fuerte
  alternatives_spanish:
  - y se volvió fuerte
  - y se hizo robusto
  lexicon: HALOT
  rationale: El verbo expresa fortalecerse o volverse poderoso; «se hizo fuerte» mantiene la progresión descriptiva y suena idiomático en español.
- source_word: וְרוּמֵהּ
  english_pob_choice: whose height
  chosen_spanish: cuya altura
  alternatives_spanish:
  - cuya elevación
  - y su altura
  lexicon: HALOT
  rationale: El sustantivo arameo indica altura o estatura; «cuya altura» es el equivalente más preciso y transparente, conforme a la revisión inglesa que corrigió «top» por «height».
- source_word: יִמְטֵא
  english_pob_choice: reached
  chosen_spanish: llegó
  alternatives_spanish:
  - alcanzó
  - se extendió
  lexicon: HALOT
  rationale: El verbo significa llegar o alcanzar; «llegó» funciona de modo natural con el complemento de destino «hasta los cielos».
- source_word: לִשְׁמַיָּא
  english_pob_choice: to the heavens
  chosen_spanish: hasta los cielos
  alternatives_spanish:
  - hasta el cielo
  - a los cielos
  lexicon: HALOT
  rationale: El plural arameo se conserva mejor con «los cielos», y «hasta» expresa el límite de alcance de la altura sin simplificar a un singular menos marcado.
- source_word: וַחֲזוֹתֵהּ
  english_pob_choice: and was visible
  chosen_spanish: y fue visible
  alternatives_spanish:
  - y podía verse
  - y era visible
  lexicon: HALOT
  rationale: La forma nominal relacionada con visión/visibilidad se vierte con la pasiva impersonal «fue visible», que comunica claramente la accesibilidad visual del árbol.
- source_word: לְכָל אַרְעָא
  english_pob_choice: to all the earth
  chosen_spanish: para toda la tierra
  alternatives_spanish:
  - a toda la tierra
  - para toda la tierra entera
  lexicon: HALOT
  rationale: Arameo אַרְעָא puede significar «tierra» o «país/land»; aquí, siguiendo la lectura global del sueño, «toda la tierra» preserva el alcance universal que el POB inglés eligió con «earth».
theological_decisions:
- issue: Alcance de אַרְעָא en la imagen onírica universal
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - land
  rationale: La escena no apunta a una localidad concreta sino a una visión de alcance universal; «tierra» mantiene esa amplitud sin reducirla a un territorio político o geográfico local.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «top» por «height» para reflejar con mayor precisión el término arameo de estatura/altura; la redacción española sigue esa corrección con «altura».
  spanish_consistency_notes:
  - Se mantiene «los cielos» en plural para respetar el plural arameo.
  - Se evita «SEÑOR» o formulaciones litúrgicas no presentes en el verso.
  - «Tierra» se usa en sentido amplio y cósmico, no como simple suelo o territorio local.
