    rationale: La nota explica הֵילֵל, no מִשָּׁמַיִם. El marcador debe aparecer en la palabra o frase correspondiente para mantener trazabilidad léxica exacta.
  - severity: medium
    issue: «Has sido derribado» para נִגְדַּעְתָּ no refleja tan bien la imagen de 'cortado/abatido'.
    rationale: El hebreo Niphal aquí evoca una humillación violenta con matiz de cortar/talar. «Abatido» conserva mejor la fuerza poética en español que «derribado», que puede sonar demasiado genérico y redundante con la caída previa.
  revised_spanish_text: ¡Cómo has caído del cielo, resplandeciente[a], hijo del alba! Has sido abatido a la tierra, tú que sometías a las naciones.
