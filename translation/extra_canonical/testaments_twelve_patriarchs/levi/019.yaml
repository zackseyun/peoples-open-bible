id: T12P.LEV.19
reference: Testament of Levi 19
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: XIX. Καὶ νῦν, τέκνα μου¹, πάντα ἠκούσατε². Ἐκλέξασθε³ ἑαυτοῖς *ἢ τὸ φῶς ἢ τὸ σκότος⁴, ἢ τὸν⁵ νόμον⁶ κυρίου, ἢ *τὰ ἔργα τοῦ Βελίαρ⁷. 2. Καὶ *ἀπεκρίθησαν αὐτῷ οἱ υἱοὶ αὐτοῦ λέγοντες⁸. Ἐνώπιον κυρίου πορευσόμεθα⁹ ⌜καὶ⌝¹⁰ κατὰ τὸν νόμον αὐτοῦ. 3. Καὶ εἶπεν *αὐτοῖς ὁ πατὴρ αὐτῶν¹¹. Μάρτυς ἐστι¹² κύριος, καὶ μάρτυρες οἱ¹³ ἄγγελοι αὐτοῦ, *καὶ μάρτυρες ὑμεῖς καὶ μάρτυς ἐγὼ¹⁴ *περὶ τοῦ λόγου τοῦ στόματος ὑμῶν¹⁵. Καὶ *εἶπον αὐτῷ οἱ υἱοὶ αὐτοῦ¹⁶. Μάρτυρες¹⁷.
  language: Greek
  source_pages:
  - 133
translation:
  text: '1[a]. And now, my children, you have heard everything. Choose for yourselves either the light or the darkness, either the law of the Lord or the works of Beliar[b].

    2. And his sons answered him, saying, “Before the Lord we will walk, and according to his law.”

    3. And their father said to them, “The Lord is witness, and his angels are witnesses, and you are witnesses, and I am a witness concerning the word of your mouth.” And his sons said to him[c], “Witnesses.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the deeds of Beliar.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'walk before the Lord' is a biblical idiom for living one's life in accountable obedience before God.
    reason: cultural_note
  - marker: c
    text: The Greek names 'Beliar,' a form also known elsewhere as 'Belial.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐκλέξασθε
  chosen: Choose for yourselves
  alternatives:
  - Choose
  - Make your choice
  lexicon: BDAG
  rationale: Middle imperative carries a reflexive sense; 'for yourselves' preserves the personal, covenantal force of the exhortation.
- source_word: φῶς
  chosen: light
  alternatives: []
  lexicon: BDAG
  rationale: Retains the moral-symbolic contrast with 'darkness' without interpretive expansion.
- source_word: σκότος
  chosen: darkness
  alternatives: []
  lexicon: BDAG
  rationale: Standard counterpart to 'light'; preserves the stark ethical dualism of the testament.
- source_word: νόμον κυρίου
  chosen: the law of the Lord
  alternatives:
  - the Lord's law
  lexicon: BDAG
  rationale: Keeps the formal covenantal phrasing and preserves κύριος as 'Lord' per project policy.
- source_word: ἔργα τοῦ Βελίαρ
  chosen: the works of Beliar
  alternatives:
  - the deeds of Beliar
  lexicon: BDAG
  rationale: ἔργα is well rendered 'works' in moral-religious contexts; 'Beliar' is transliterated as a proper name rather than interpreted.
- source_word: Ἐνώπιον κυρίου πορευσόμεθα
  chosen: Before the Lord we will walk
  alternatives:
  - We will walk before the Lord
  - In the Lord's presence we will walk
  lexicon: BDAG
  rationale: Preserves the biblical idiom of walking before God, with 'before the Lord' kept fronted for solemnity.
- source_word: κατὰ τὸν νόμον αὐτοῦ
  chosen: according to his law
  alternatives:
  - by his law
  - in keeping with his law
  lexicon: BDAG
  rationale: A natural English rendering of κατὰ with accusative that still preserves the norming force of the phrase.
- source_word: Μάρτυς
  chosen: witness
  alternatives: []
  lexicon: BDAG
  rationale: Consistent rendering across the verse preserves the legal-covenantal tone of the oath scene.
- source_word: περὶ τοῦ λόγου τοῦ στόματος ὑμῶν
  chosen: concerning the word of your mouth
  alternatives:
  - concerning what your mouth has spoken
  - about the statement from your mouth
  lexicon: BDAG
  rationale: Slightly formal phrasing preserves the solemnity and concrete emphasis on their spoken pledge; avoids over-paraphrase.
