  text: οἷς μὲν ὀσμὴ ⸀ἐκ θανάτου εἰς θάνατον, οἷς δὲ ὀσμὴ ⸁ἐκ ζωῆς εἰς ζωήν. καὶ πρὸς ταῦτα τίς ἱκανός;
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/002/016.yaml
  text: To the one, a fragrance from death to death; to the other, a fragrance from life to life. And who is sufficient for these things?
  footnotes:
  - marker: a
    text: Or ‘aroma’ or ‘smell’ for both instances of ὀσμή.
    reason: lexical_alternative
  - marker: b
    text: The phrases ‘from death to death’ and ‘from life to life’ may express source and result (‘out of death leading to death’ / ‘out of life leading to life’) or an intensified characterization.
    reason: alternative_reading
  - marker: c
    text: Or ‘adequate’ or ‘competent’ for ‘sufficient.’
    reason: lexical_alternative
translation:
  language: ko
  text: 한쪽에게는 죽음에서 죽음에 이르는 냄새요, 다른 쪽에게는 생명에서 생명에 이르는 향기입니다. 이런 일을 누가 감당할 수 있겠습니까?
  philosophy: optimal-equivalence
