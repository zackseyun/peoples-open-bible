  spanish_quality_summary: El español es legible, pero hay problemas en las notas y en la consistencia de transliteración. La nota [a] es defectuosa porque da como alternativa la misma forma. La nota [c] depende de una forma española («Apéca») que resulta menos fiel y menos estable que una transliteración más transparente. «Bet-tapuaj» es aceptable en español si se opta por hispanizar la fricativa final hebrea con j.
