translation:
  language: es
  text: Mi corazón está con los líderes de Israel[a], los que se ofrecieron voluntariamente entre el pueblo. ¡Bendigan a Yahvé!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los legisladores de Israel, los que se ofrecieron voluntariamente entre el pueblo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבִּי
  english_pob_choice: My heart
  chosen_spanish: Mi corazón
  alternatives_spanish:
  - Mi corazón está hacia
  - Mi corazón pertenece a
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo con sufijo de 1.ª persona para expresar la inclinación interior de la hablante. «Mi corazón» conserva el giro idiomático sin explicarlo en exceso.
- source_word: לְחוֹקְקֵי
  english_pob_choice: is with the leaders
  chosen_spanish: los líderes
  alternatives_spanish:
  - los legisladores
  - los gobernantes
  - los que dictan leyes
  lexicon: HALOT
  rationale: El término puede referirse a quienes decretan o ejercen autoridad. En este contexto poético, «líderes» comunica bien la función de dirección y evita reducirlo solo a un sentido legislativo moderno.
- source_word: יִשְׂרָאֵל
  english_pob_choice: of Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de Israel
  lexicon: HALOT
  rationale: Relación genitiva directa y estándar; no requiere ampliación.
- source_word: הַמִּתְנַדְּבִים
  english_pob_choice: who volunteered
  chosen_spanish: los que se ofrecieron voluntariamente
  alternatives_spanish:
  - los que se ofrecieron de buena voluntad
  - los que voluntariamente se ofrecieron
  lexicon: HALOT
  rationale: El hitpael de נדב implica ofrenda/disposición voluntaria. En español, «se ofrecieron voluntariamente» mantiene con claridad la idea de entrega libre que el inglés POB preserva con «volunteered».
- source_word: בָּעָם
  english_pob_choice: among the people
  chosen_spanish: entre el pueblo
  alternatives_spanish:
  - entre la gente
  - en medio del pueblo
  lexicon: HALOT
  rationale: «Entre el pueblo» es natural en español y conserva el alcance amplio de עם sin estrecharlo indebidamente a «tropas».
- source_word: בָּרֲכוּ
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Bendecid
  - Alaben
  lexicon: HALOT
  rationale: El imperativo plural pide una exhortación directa. «Bendigan» es claro, reverente y corresponde al valor normal de ברך en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: «Yahvé», preservando el Tetragrámaton como nombre propio y no como sustitución titulada.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo contiene el nombre personal de Dios, no un título genérico. En español del proyecto, la forma estable es «Yahvé», que mantiene la referencia directa al Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance de חקק en contexto poético
  english_pob_reading: leaders
  chosen_spanish_reading: líderes
  alternative_spanish_readings:
  - legisladores
  - gobernantes
  rationale: La canción de Débora alaba a quienes asumieron responsabilidad de dirección en Israel. «Líderes» conserva esa amplitud sin imponer una lectura exclusivamente jurídica que el contexto no obliga a adoptar.
  doctrine_reference: HALOT, contexto de Jueces 5
- issue: Valor de נדב en forma hitpael
  english_pob_reading: who volunteered
  chosen_spanish_reading: los que se ofrecieron voluntariamente
  alternative_spanish_readings:
  - los que se entregaron de buena voluntad
  rationale: La idea central es la disposición libre y generosa de ciertos israelitas. El español debe conservar la noción de ofrecimiento personal, no solo de mera ayuda ocasional.
  doctrine_reference: HALOT, forma hitpael de נדב
translation_notes:
  revision_awareness: Concordancia alta con el audit trail inglés; no se requieren revisiones adicionales. Se conserva la tensión lexical entre un sentido de «líderes» y el posible matiz de «legisladores», sin resolverla unilateralmente en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, según el estándar del proyecto.
  - Se usa «líderes» para לְחוֹקְקֵי, con nota alternativa que conserva «legisladores» como posibilidad lexical.
  - Se traduce el participio voluntario con una frase verbal natural en español, sin perder el matiz de ofrecimiento libre.
  - La exclamación final conserva el imperativo plural del hebreo y del inglés POB.
