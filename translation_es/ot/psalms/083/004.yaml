translation:
  language: es
  text: Ellos hacen planes astutos contra tu pueblo, y consultan juntos contra tus preciados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «tus escondidos». El hebreo puede referirse a quienes están ocultos o guardados, y por extensión a quienes son preciosos para Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעֲרִימוּ
  english_pob_choice: make crafty plans
  chosen_spanish: hacen planes astutos
  alternatives_spanish:
  - traman con astucia
  - hacen planes engañosos
  - maquinan
  lexicon: HALOT
  rationale: El verbo hiphil de ערם expresa actuar con astucia o sagacidad en un contexto hostil. En español, «hacen planes astutos» conserva la idea de planificación engañosa sin sonar forzado. Evita un calco como «hacen crafty plans» y mantiene el matiz adversarial del verso.
- source_word: סוֹד
  english_pob_choice: plans
  chosen_spanish: planes
  alternatives_spanish:
  - consejo secreto
  - cónclave secreto
  - consejo
  lexicon: HALOT
  rationale: סוֹד puede referirse a consejo íntimo, deliberación confidencial o plan secreto. El POB inglés eligió «plans» para una expresión natural; en español, «planes» reproduce bien el objeto de la maquinación y deja la clandestinidad sugerida por el contexto y por «astutos».
- source_word: וְיִתְיָעֲצוּ
  english_pob_choice: they consult together
  chosen_spanish: se ponen de acuerdo
  alternatives_spanish:
  - se consultan entre sí
  - deliberan juntos
  - conspiran
  lexicon: HALOT
  rationale: El hitpael de יעץ indica consejo mutuo. «Se ponen de acuerdo» comunica la acción recíproca de forma natural en español. «Conspiran» sería posible, pero añade una acusación más fuerte que el hebreo no exige por sí sola.
- source_word: צְפוּנֶיךָ
  english_pob_choice: your treasured ones
  chosen_spanish: tus tesoros escondidos
  alternatives_spanish:
  - tus escondidos
  - tus protegidos
  - tus tesoros
  lexicon: HALOT
  rationale: 'La forma derivada de צפן puede significar lo escondido, guardado o atesorado. El POB inglés retiene la tensión entre «hidden» y «treasured». En español, «tus tesoros escondidos» conserva ambos valores: algo guardado/oculto y, a la vez, precioso para Dios. Evita perder la ambigüedad lexical documentada.'
- source_word: עַל עַמְּךָ
  english_pob_choice: against your people
  chosen_spanish: contra tu pueblo
  alternatives_spanish:
  - sobre tu pueblo
  - acerca de tu pueblo
  lexicon: HALOT
  rationale: En este contexto hostil, עַל se entiende mejor como oposición. «Contra tu pueblo» es la equivalencia idiomática natural en español y conserva el sentido adversativo del hebreo.
theological_decisions:
- issue: Nuance of צְפוּנֶיךָ in relation to God's people
  english_pob_reading: your treasured ones
  chosen_spanish_reading: tus tesoros escondidos
  alternative_spanish_readings:
  - tus escondidos
  - tus protegidos
  rationale: 'El hebreo permite tanto la idea de personas ocultas o guardadas como la de algo precioso reservado por Dios. La frase elegida en español mantiene esa doble posibilidad: son «escondidos» y, a la vez, tratados como tesoro. Así no se borra la tensión lexical entre protección y valor relacional.'
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue el sentido revisado del POB inglés («make crafty plans») y mantiene la distinción entre la primera cola hostil («contra tu pueblo») y la segunda cola con matiz de secreto/valor («tus tesoros escondidos»). Se evitó endurecer «se ponen de acuerdo» a «conspiran» para no exceder el peso del hitpael de יעץ.
  spanish_consistency_notes:
  - Se emplea «Dios» solo implícitamente en el pronombre posesivo «tu», como en el hebreo dirigido a Dios.
  - «Pueblo» se mantiene en sentido colectivo de alianza, coherente con el registro bíblico.
  - La nota al pie conserva la ambigüedad documentada entre lo escondido y lo atesorado, sin resolverla artificialmente.
