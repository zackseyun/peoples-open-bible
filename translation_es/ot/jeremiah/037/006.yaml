translation:
  language: es
  text: Entonces vino[a] la palabra de Yahvé a Jeremías el profeta, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y sucedió, la palabra de Yahvé vino ...»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces vino[a]
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי introduce una nueva secuencia de evento. En español, «Entonces vino» conserva la progresión narrativa sin caer en un giro demasiado arcaico como «aconteció»; la nota [a] preserva la alternativa más literal reconocida por el audit trail inglés.
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - un mensaje
  - el mensaje
  lexicon: HALOT
  rationale: En la fórmula profética דְּבַר יְהוָה, «la palabra» es la equivalencia más directa y reconocible; mantiene el valor técnico del enunciado de revelación divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Según el criterio del proyecto, se lo vierte como «Yahvé» en el texto principal para preservar el nombre propio del Dios de Israel, en vez de sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca dirección/orientación hacia Jeremías; en español natural, «a» expresa ese destino de forma clara y fiel.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremías
  lexicon: HALOT
  rationale: Nombre propio bíblico adaptado a la forma habitual del español.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el portavoz profético
  lexicon: HALOT
  rationale: נָבִיא se traduce con su equivalente estándar «profeta». El artículo se conserva porque funciona en aposición identificando el oficio de Jeremías.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo introduce el contenido del discurso que sigue. «Diciendo» reproduce la función de fórmula de introducción verbal de manera natural en español.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La elección sigue la política del proyecto de no ocultar el nombre del pacto. «Yahvé» conserva el valor de nombre propio divino y evita la sustitución por un título impersonal; también mantiene coherencia con otros pasajes donde aparece el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en la estructura narrativa y las decisiones léxicas clave: fórmula de introducción narrativa, דְּבַר como «la palabra», יְהוָה como nombre divino, y לֵאמֹר como fórmula de discurso. No se detectaron revisiones posteriores que exijan ajustes respecto del pasaje base.'
  spanish_consistency_notes:
  - Se mantuvo un registro natural del español con orden verbo-sujeto adecuado para la fórmula narrativa.
  - Se preservó el nombre divino como «Yahvé», conforme a la terminología del proyecto.
  - La frase completa conserva el tono formal y profético del hebreo sin añadir contenido interpretativo.
