  - Se mantuvo «Yahvé» fuera de este versículo porque el texto griego no contiene el nombre divino ni una cita de κύριος.
  - Se preservó la repetición estructural del griego («hombre judío... un hombre grande») en vez de suavizarla por completo, para reflejar el énfasis retórico del original.
  - Se evitó «siervo» o «ministerio» en favor de «sirviendo», ya que el contexto es cortesano y no eclesial.
