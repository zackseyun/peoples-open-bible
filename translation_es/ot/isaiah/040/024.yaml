revisions:
- from: Apenas son plantados[a], apenas son sembrados, apenas su tronco ha echado raíces en la tierra; y cuando él sopla sobre ellos, se secan, y un torbellino los lleva como paja.
  to: Apenas son plantados[a], apenas son sembrados, apenas su tallo ha echado raíces en la tierra; y aun sopla sobre ellos, y se secan, y una tormenta[b] los lleva como rastrojo.
  rationale: 'La revisión conserva la estructura y la teología del borrador, pero alinea mejor el español con las decisiones léxicas auditadas del POB y con la imagen hebrea: «tallo» encaja mejor que «tronco» con «stem» y la metáfora agrícola; «y aun sopla sobre ellos» evita añadir un «cuando» temporal no expreso; «como rastrojo» reproduce mejor כַּקַּשׁ que «como paja»; y se restaura la alternativa documentada para סְעָרָה en nota.'
