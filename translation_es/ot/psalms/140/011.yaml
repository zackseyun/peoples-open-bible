  spanish_quality_summary: El español es claro y digno, pero «carbones encendidos» suena algo menos natural y vívido que «brasas ardientes» o «carbones ardientes» en poesía bíblica. Además, «para que nunca se levanten» puede leerse como propósito deliberado más que como resultado definitivo. «Nunca vuelvan a levantarse» suena más natural y refleja mejor el sentido contextual de irreversibilidad. «Hondos pozos» es inteligible, aunque «pozos profundos» sería más idiomático; no obstante, no exige cambio obligatorio.
  glossary_alignment: 'No hay conflictos con la terminología de proyecto. No aparecen Yahvé/Mesías/etc. Las decisiones clave siguen la auditoría inglesa: conservar el sujeto singular implícito, mantener la rareza de במהמרות en nota y no sobreinterpretar el hebreo.'
