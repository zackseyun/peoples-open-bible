translation:
  language: es
  text: Cuando Rubén volvió al pozo[a], y vio que José no estaba en el pozo, rasgó sus vestidos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “cisterna” para traducir el hebreo bor.
    reason: lexical_alternative
  - marker: b
    text: Rasgar los vestidos era una expresión acostumbrada de dolor, conmoción o angustia.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió de nuevo
  lexicon: HALOT
  rationale: שׁוּב en esta narración expresa un retorno al lugar anterior. 'Volvió' es natural en español y conserva el movimiento de regreso sin añadir matices innecesarios.
- source_word: הַבּוֹר / בַּבּוֹר
  english_pob_choice: the pit / in the pit
  chosen_spanish: el pozo / en el pozo
  alternatives_spanish:
  - la cisterna / en la cisterna
  - el hoyo / en el hoyo
  lexicon: HALOT
  rationale: בּוֹר puede referirse a un pozo, cisterna o foso. En este contexto narrativo, 'pozo' comunica bien la depresión o cavidad donde fue puesto José y funciona con naturalidad en español, sin cerrar la posibilidad léxica de 'cisterna'.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: vio que
  alternatives_spanish:
  - he aquí que
  - y he aquí
  lexicon: HALOT
  rationale: En español, 'he aquí' puede sonar más solemne o arcaizante. La secuencia narrativa ya transmite la sorpresa, por lo que 'vio que' comunica la observación inmediata sin perder el valor de atención del marcador discursivo.
- source_word: אֵין יוֹסֵף בַּבּוֹר
  english_pob_choice: Joseph was not in the pit
  chosen_spanish: José no estaba en el pozo
  alternatives_spanish:
  - no había José en el pozo
  - José ya no estaba en el pozo
  lexicon: HALOT
  rationale: אֵין marca ausencia o no existencia. 'No estaba' refleja esa ausencia de manera idiomática en español, sin añadir la inferencia de desplazamiento implícita en 'ya no estaba'.
- source_word: וַיִּקְרַע אֶת בְּגָדָיו
  english_pob_choice: he tore his clothes
  chosen_spanish: rasgó sus vestidos
  alternatives_spanish:
  - rasgó su ropa
  - rompió sus vestidos
  lexicon: HALOT
  rationale: קרע בגדיו es una fórmula convencional de duelo o angustia. 'Rasgó sus vestidos' conserva mejor la relación léxica con בְּגָדִים y mantiene un registro bíblico claro en español; 'ropa' sería más general y menos preciso.
theological_decisions:
- issue: La acción de rasgarse las vestiduras como gesto cultural de dolor y angustia
  english_pob_reading: Tearing one's clothes was a customary expression of grief, shock, or distress.
  chosen_spanish_reading: Rasgó sus vestidos como gesto convencional de dolor, sobresalto o angustia.
  alternative_spanish_readings:
  - rasgó sus vestidos en señal de duelo
  - rasgó su ropa por aflicción
  rationale: El hebreo presenta una práctica cultural, no un símbolo doctrinal. Aunque el versículo no lo explica explícitamente, la tradición auditada del POB identifica el gesto; la redacción española conserva ese trasfondo sin convertirlo en interpretación excesiva.
  doctrine_reference: Contexto cultural narrativo, no una doctrina específica.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético y el audit trail inglés de POB sin cambios sustanciales; la revisión más reciente indicó que no había modificaciones necesarias y el control cruzado mostró acuerdo alto con solo observaciones menores.
  spanish_consistency_notes:
  - Se mantuvo 'pozo' como opción principal para בּוֹר, con nota de alternativa 'cisterna' conforme al rastro auditado.
  - Se evitó 'he aquí' por estilo español moderno, pero se conservó la súbita atención narrativa mediante 'vio que'.
  - '''Vestidos'' preserva una correspondencia más directa con בְּגָדָיו que ''ropa'', sin perder inteligibilidad.'
