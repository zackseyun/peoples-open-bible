  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Toda la nación» preserva correctamente el singular colectivo de כָל הַגּוֹי. «Circuncidarse» es aceptable para el niphal en español natural. Se recomienda una nota para עַד חֲיוֹתָם, siguiendo la documentación inglesa de alternativas como «fueron sanados» o «revivieron».
