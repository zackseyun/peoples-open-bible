translation:
  language: es
  text: Y ahora, si parece bien al rey, que se haga una búsqueda en la tesorería real, allí en Babilonia, si es así que el rey Ciro emitió un decreto para reconstruir[a] esta casa de Dios en Jerusalén; y que el rey nos haga saber su voluntad[b] acerca de este asunto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para edificar esta casa de Dios en Jerusalén». El arameo puede significar simplemente «edificar»; «reconstruir» refleja el contexto de restauración.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el beneplácito del rey» o «la decisión del rey».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְעַן
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Pues ahora
  lexicon: HALOT
  rationale: Marca discursiva que introduce la conclusión de la petición. "Y ahora" conserva la transición y suena natural en español formal.
- source_word: הֵן עַל מַלְכָּא טָב
  english_pob_choice: if it seems good to the king
  chosen_spanish: si parece bien al rey
  alternatives_spanish:
  - si le parece bien al rey
  - si agrada al rey
  lexicon: HALOT
  rationale: Expresión cortesana. "Parece bien" preserva el matiz deferente sin forzar un giro arcaizante.
- source_word: יִתְבַּקַּר
  english_pob_choice: let a search be made
  chosen_spanish: que se haga una búsqueda
  alternatives_spanish:
  - que se investigue
  - que se haga una indagación
  lexicon: HALOT
  rationale: El verbo admite la idea de averiguación documental; "búsqueda" refleja el contexto archivístico y mantiene el carácter pasivo/jusivo.
- source_word: בְּבֵית גִּנְזַיָּא
  english_pob_choice: in the royal treasury
  chosen_spanish: en la tesorería real
  alternatives_spanish:
  - en el tesoro real
  - en la casa del tesoro
  lexicon: HALOT
  rationale: Literalmente es una "casa de tesoros"; en este contexto alude al lugar donde se guardaban recursos y documentos reales. "Tesorería real" es claro y sobrio en español.
- source_word: דִּי מַלְכָּא תַמָּה דִּי בְּבָבֶל
  english_pob_choice: there in Babylon
  chosen_spanish: allí en Babilonia
  alternatives_spanish:
  - allí, en Babilonia
  - en Babilonia
  lexicon: HALOT
  rationale: La relativa sitúa la tesorería en Babilonia; "allí" conserva el valor locativo enfático del original.
- source_word: הֵן אִיתַי דִּי
  english_pob_choice: whether it is so that
  chosen_spanish: para ver si en verdad
  alternatives_spanish:
  - para comprobar si
  - para saber si
  lexicon: HALOT
  rationale: 'La fórmula introduce el contenido de la búsqueda: verificar si existe tal decreto. "En verdad" reproduce el peso confirmatorio de la construcción.'
- source_word: מִן כּוֹרֶשׁ מַלְכָּא שִׂים טְעֵם
  english_pob_choice: a decree was issued by King Cyrus
  chosen_spanish: hubo un decreto de parte del rey Ciro
  alternatives_spanish:
  - se emitió un decreto del rey Ciro
  - el rey Ciro dio un decreto
  lexicon: HALOT
  rationale: טְעֵם es el decreto/mandato oficial. "Hubo un decreto" preserva la existencia del documento sin sobrerresaltar la forma pasiva, y "de parte del rey Ciro" mantiene la fuente de autoridad.
- source_word: לְמִבְנֵא
  english_pob_choice: to rebuild
  chosen_spanish: para reconstruir
  alternatives_spanish:
  - para edificar de nuevo
  - para edificar
  lexicon: HALOT
  rationale: En contexto de restauración del templo tras la destrucción, "reconstruir" comunica mejor que un simple "construir".
- source_word: בֵּית אֱלָהָא דֵךְ
  english_pob_choice: this house of God
  chosen_spanish: esta casa de Dios
  alternatives_spanish:
  - este templo de Dios
  - esta casa de nuestro Dios
  lexicon: HALOT
  rationale: Mantiene el sintagma fuente "casa de Dios"; "esta" refleja el demostrativo cercano del arameo.
- source_word: וּרְעוּת מַלְכָּא
  english_pob_choice: the king's pleasure
  chosen_spanish: su voluntad
  alternatives_spanish:
  - el beneplácito del rey
  - la decisión del rey
  lexicon: HALOT
  rationale: En español, "voluntad" expresa de modo claro y digno el sentido cortesano de la fórmula. Se evita "beneplácito" porque puede sonar menos transparente.
- source_word: עַל דְּנָה
  english_pob_choice: concerning this matter
  chosen_spanish: acerca de este asunto
  alternatives_spanish:
  - sobre esto
  - respecto de esto
  lexicon: HALOT
  rationale: Expande la referencia demostrativa a una formulación natural en español administrativo.
- source_word: יִשְׁלַח עֲלֵינָא
  english_pob_choice: let the king send to us
  chosen_spanish: que el rey nos haga saber
  alternatives_spanish:
  - que el rey nos envíe
  - que el rey nos comunique
  lexicon: HALOT
  rationale: El verbo puede expresar envío de respuesta o decisión. En español, "hacernos saber" comunica con precisión el resultado esperado sin añadir contenido no explícito.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto arameo y el audit trail inglés. Se mantiene la consulta archivística, la cortesía real y la tensión léxica entre «construir» y «reconstruir», sin suavizar el trasfondo histórico de restauración.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלָהָא y «rey Ciro» para כּוֹרֶשׁ, en continuidad con el registro bíblico-cortesano.
  - «Tesorería real» se prefiere por claridad, pero la nota conserva la alternativa literal «casa del tesoro».
  - «Reconstruir» mantiene el matiz de restauración señalado en el audit trail inglés.
