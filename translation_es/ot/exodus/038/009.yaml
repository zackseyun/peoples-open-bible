translation:
  language: es
  text: Hizo el atrio. En el lado sur[a], hacia el sur, las colgaduras[b] del atrio eran de lino fino torcido, de cien codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'del lado sur'.
    reason: lexical_alternative
  - marker: b
    text: O 'las cortinas del atrio'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Entonces hizo
  lexicon: HALOT
  rationale: El wayyiqtol narra acción secuencial; en español, 'hizo' conserva la acción simple y directa sin cargar innecesariamente el aspecto narrativo.
- source_word: הֶחָצֵר
  english_pob_choice: the courtyard
  chosen_spanish: el patio
  alternatives_spanish:
  - el atrio
  - el recinto
  lexicon: HALOT
  rationale: Para el espacio exterior del tabernáculo, 'patio' es claro y natural en español. 'Atrio' es tradicional, pero puede sonar más eclesiástico y menos concreto; 'recinto' es más genérico.
- source_word: לִפְאַת נֶגֶב תֵּימָנָה
  english_pob_choice: On the south side, toward the south
  chosen_spanish: en el lado sur, hacia el sur
  alternatives_spanish:
  - del lado del sur, hacia el sur
  - en la parte sur, hacia el sur
  lexicon: HALOT
  rationale: La combinación de términos direccionales se conserva con una doble indicación en español, reflejando la intensificación/especificación del hebreo sin reducirla a una sola expresión.
- source_word: קַלְעֵי הֶחָצֵר
  english_pob_choice: the hangings of the courtyard
  chosen_spanish: las cortinas del patio
  alternatives_spanish:
  - las colgaduras del patio
  - los lienzos del patio
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, el hebreo designa las telas suspendidas que delimitan el patio. 'Cortinas' es una alternativa española legible; se mantiene la nota de que también puede entenderse como 'hangings'/'colgaduras'.
- source_word: שֵׁשׁ מָשְׁזָר
  english_pob_choice: of finely twisted linen
  chosen_spanish: de lino fino torcido
  alternatives_spanish:
  - de lino finamente torcido
  - de lino fino hilado
  lexicon: HALOT
  rationale: 'Se preservan ambos rasgos: la calidad (''lino fino'') y la manufactura (''torcido''). ''Torcido'' comunica el sentido material de מָשְׁזָר sin añadir más de lo que el texto permite.'
- source_word: מֵאָה בָּאַמָּה
  english_pob_choice: a hundred cubits long
  chosen_spanish: de cien codos de longitud
  alternatives_spanish:
  - de cien codos
  - cien codos de largo
  lexicon: HALOT
  rationale: La medida se expresa de forma natural y completa en español. 'De longitud' refleja que la frase funciona dimensionalmente, como en la lectura inglesa auditoria.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el cotejo reporta alta concordancia (agree, 1.0). Por eso la versión española sigue de cerca el sentido de la fuente hebrea y la auditoría inglesa, manteniendo la doble indicación direccional y la nota léxica para קַלְעֵי.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca; en este versículo no se requiere.
  - Se evita 'atrio' como término principal porque 'patio' expresa mejor el área exterior del tabernáculo en español moderno.
  - Se conserva la alternancia entre texto principal y nota para la ambigüedad léxica de קַלְעֵי / 'cortinas'.
