translation:
  language: es
  text: Mira[a], si un río se desborda, no se alarma; está confiado aun cuando el Jordán irrumpe contra su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su boca». El hebreo dice más literalmente «a su boca» o «en su boca», pero el contexto probablemente pinta al agua de crecida presionando contra él, no enfatizando que beba.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Observa
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce una llamada de atención vivida. «Mira» conserva ese valor deíctico en español moderno sin sonar rígido, y evita un calco demasiado solemne.
- source_word: יַעֲשֹׁק
  english_pob_choice: rages
  chosen_spanish: se enfurece
  alternatives_spanish:
  - ruge
  - se desborda con furia
  - irrumpe con violencia
  lexicon: HALOT
  rationale: En contexto de un río, el verbo expresa un movimiento violento y amenazante. «Se enfurece» transmite bien la fuerza figurada sin introducir la idea moral de «oprimir».
- source_word: נָהָר
  english_pob_choice: a river
  chosen_spanish: un río
  alternatives_spanish:
  - el río
  - un torrente
  lexicon: HALOT
  rationale: El singular sin artículo funciona de modo genérico; en español, «un río» comunica naturalmente cualquier río en crecida.
- source_word: לֹא יַחְפּוֹז
  english_pob_choice: he is not alarmed
  chosen_spanish: no se alarma
  alternatives_spanish:
  - no se apresura
  - no entra en pánico
  - no se turba
  lexicon: HALOT
  rationale: El verbo puede abarcar prisa o sobresalto, pero aquí la idea es la ausencia de temor ante el peligro. «No se alarma» reproduce bien el sentido idiomático.
- source_word: יִבְטַח
  english_pob_choice: he is confident
  chosen_spanish: está confiado
  alternatives_spanish:
  - confía
  - se siente seguro
  lexicon: HALOT
  rationale: El verbo expresa seguridad o confianza estable. «Está confiado» mantiene la cualidad de calma segura en una forma natural en español.
- source_word: כִּי
  english_pob_choice: even if
  chosen_spanish: aun cuando
  alternatives_spanish:
  - aunque
  - si bien
  - incluso si
  lexicon: HALOT
  rationale: Aquí la cláusula es concesiva. «Aun cuando» expresa con precisión que la confianza permanece incluso en la situación descrita.
- source_word: יָגִיחַ
  english_pob_choice: rushes
  chosen_spanish: se precipita
  alternatives_spanish:
  - irrumpe
  - avanza con ímpetu
  - se lanza
  lexicon: HALOT
  rationale: El verbo sugiere brotar o lanzarse con fuerza. «Se precipita» conserva la imagen dinámica del agua empujando con ímpetu.
- source_word: יַרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - Jordán
  lexicon: HALOT
  rationale: 'Nombre propio del río; en español bíblico natural se usa con artículo: «el Jordán».'
- source_word: אֶל פִּיהוּ
  english_pob_choice: against his mouth
  chosen_spanish: contra su boca
  alternatives_spanish:
  - en su boca
  - hacia su boca
  - hasta su boca
  lexicon: HALOT
  rationale: La imagen puede entenderse como el agua golpeando o presionando la boca del animal. «Contra su boca» mantiene esa presión externa sin decidir por la lectura más literal de ingestión como sentido principal.
theological_decisions:
- issue: Valor concesivo de כִּי en una imagen poética de temor ausente
  english_pob_reading: even if the Jordan rushes against his mouth
  chosen_spanish_reading: aun cuando el Jordán se precipita contra su boca
  alternative_spanish_readings:
  - aunque el Jordán se precipita contra su boca
  - si el Jordán se precipita contra su boca
  rationale: No hay una tesis doctrinal explícita; la decisión afecta la lógica poética. «Aun cuando» preserva la relación concesiva que el audit trail identifica y evita convertir la frase en mera condición neutral.
  doctrine_reference: N/A
- issue: Imagen corporal de 'su boca' sin suavizar la fuerza del hebreo
  english_pob_reading: against his mouth
  chosen_spanish_reading: contra su boca
  alternative_spanish_readings:
  - en su boca
  - hasta su boca
  - a su boca
  rationale: La traducción no debe borrar la tensión imaginativa del hebreo. «Contra su boca» mantiene la violencia visual del agua presionando al animal, sin imponer una lectura secundaria de beber.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto inglés revisado cambió «surges» por «rushes» para acercarse más al verbo y conservar un registro más directo. La propuesta española sigue esa preferencia con «se precipita», que mantiene la inmediatez y la fuerza del movimiento del agua.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma preferente para el nombre divino cuando aparezca en otros versículos, aunque este versículo no lo contiene.
  - Se conserva el tono poético y auditable, evitando tanto el arcaísmo excesivo como la paráfrasis libre.
  - La nota al pie marca la alternativa literal de «en su boca» porque el hebreo admite esa lectura, pero el cuerpo principal prioriza la imagen contextual del empuje del agua.
