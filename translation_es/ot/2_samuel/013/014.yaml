translation:
  language: es
  text: Pero él no quiso escucharla[a], y fue más fuerte que ella[b], y la violó[c] y se acostó con ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «no escuchó su voz».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la dominó por la fuerza».'
    reason: lexical_alternative
  - marker: c
    text: El verbo hebreo puede significar «humillar» o «violar»; aquí se refiere a una violación sexual.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבָה
  english_pob_choice: would not
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estuvo dispuesto
  - se negó
  lexicon: HALOT
  rationale: El verbo expresa voluntad o disposición. En español, «no quiso» comunica con naturalidad la negativa voluntaria sin añadir matices ajenos ni volver la frase rígida.
- source_word: לִשְׁמֹעַ בְּקוֹלָהּ
  english_pob_choice: listen to her
  chosen_spanish: escuchar su voz
  alternatives_spanish:
  - obedecer su voz
  - hacer caso a su voz
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «escuchar su voz». «Escuchar su voz» conserva el idiomatismo y permite notar la fuerza del original; «obedecer» sería más interpretativo y menos directo.
- source_word: וַיֶּחֱזַק מִמֶּנָּה
  english_pob_choice: he was stronger than she was
  chosen_spanish: era más fuerte que ella
  alternatives_spanish:
  - la sobrepujaba en fuerza
  - la vencía en fuerza
  lexicon: HALOT
  rationale: La construcción expresa prevalecer por fuerza sobre ella. «Era más fuerte que ella» preserva el valor comparativo y sigue la revisión inglesa que evitó fundir esta idea con el acto siguiente.
- source_word: וַיְעַנֶּהָ
  english_pob_choice: he violated her
  chosen_spanish: la violentó
  alternatives_spanish:
  - la violó
  - la humilló
  lexicon: HALOT
  rationale: En este contexto sexual, el verbo implica violencia y abuso. «La violentó» mantiene la gravedad y la amplitud semántica sin estrechar el sentido a un tecnicismo más específico de lo que el hebreo exige aquí.
- source_word: וַיִּשְׁכַּב אֹתָהּ
  english_pob_choice: lay with her
  chosen_spanish: se acostó con ella
  alternatives_spanish:
  - yacía con ella
  - durmió con ella
  lexicon: HALOT
  rationale: Es un hebraísmo habitual para relaciones sexuales. En español, «se acostó con ella» es la forma natural y comprensible que conserva el carácter idiomático; «durmió con ella» sonaría demasiado suave o ambiguo en este contexto violento.
theological_decisions:
- issue: Cómo traducir el verbo de violencia sexual ענה sin perder su fuerza ni imponer un término demasiado técnico.
  english_pob_reading: he violated her
  chosen_spanish_reading: la violentó
  alternative_spanish_readings:
  - la violó
  - la humilló
  rationale: El contexto narra una agresión sexual, por lo que el sentido no es meramente «afligir» o «humillar». «La violentó» refleja la idea de abuso violento de modo grave y claro, sin cerrar la posibilidad semántica que el hebreo tiene en este uso.
  doctrine_reference: Ética bíblica / violencia sexual en el relato
- issue: Cómo reflejar la relación entre no escuchar y la expresión «escuchar su voz».
  english_pob_reading: But he would not listen to her
  chosen_spanish_reading: Pero él no quiso escuchar su voz
  alternative_spanish_readings:
  - Pero él no quiso hacer caso a ella
  - Pero él se negó a obedecerle
  rationale: El hebreo literalmente dice «escuchar su voz». Mantener «su voz» conserva el valor idiomático y la referencia al ruego de ella, evitando normalizar la frase a una mera paráfrasis.
  doctrine_reference: Fidelidad al texto hebreo / estilo idiomático
- issue: Cómo entender וַיֶּחֱזַק מִמֶּנָּה sin mezclarlo con el acto posterior.
  english_pob_reading: he was stronger than she was
  chosen_spanish_reading: era más fuerte que ella
  alternative_spanish_readings:
  - la sobrecogió
  - la dominó
  rationale: 'La frase marca superioridad de fuerza, no todavía el acto sexual mismo. «Era más fuerte que ella» preserva la secuencia narrativa: primero la fuerza relativa, luego la violencia y el acostarse con ella.'
  doctrine_reference: Lectura narrativa del pasaje
translation_notes:
  revision_awareness: La redacción sigue la revisión final del POB inglés, que prefirió una cláusula finita directa («he was stronger than she was») en vez de una forma progresiva, para reflejar con mayor precisión el hebreo y conservar la secuencia de acciones. La traducción española mantiene esa misma distinción entre la superioridad de fuerza, la violencia sexual y el acto de acostarse con ella.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiere; este versículo no lo contiene.
  - Se preserva «escuchar su voz» como calco idiomático controlado para reflejar בְּקוֹלָהּ.
  - Se elige «violentó» para ענה por el contexto de agresión sexual, con nota que reconoce la alternativa «violar» y la tensión semántica.
  - Se evita suavizar la secuencia narrativa fusionando fuerza, violencia y coito en una sola expresión.
  - El registro es sobrio y bíblico, sin arcaísmos innecesarios.
