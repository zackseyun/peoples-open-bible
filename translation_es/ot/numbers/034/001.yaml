lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y habló
  - Y dijo
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo secuencial; «Entonces» conserva esa progresión en español, y «habló» mantiene el matiz verbal más pleno de דבר mejor que un simple «dijo» en esta fórmula introductoria.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino, no un título. En español del POB se prefiere «Yahvé» para reflejar el Tetragrámaton y evitar la sustitución tradicional por «el SEÑOR».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: Es la preposición direccional normal; «a» es el equivalente natural en español moderno para introducir el destinatario del habla.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español, sin tensión lexical especial.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo introduce la cita siguiente; «diciendo» conserva la fórmula de introducción del discurso sin añadir sentido no presente en el hebreo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La decisión doctrinal y editorial del POB es preservar el nombre propio divino en vez de ocultarlo tras un título. En español, «Yahvé» es la forma preferida del proyecto para ese mismo valor reverente y auditable.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail en inglés: estructura narrativa simple, fórmula de introducción del discurso y decisión consistente para el nombre divino. No se requieren revisiones adicionales.'
  spanish_consistency_notes:
  - Se mantiene el orden y la sobriedad de la fórmula hebrea.
  - «Entonces» refleja la continuidad narrativa de וַיְדַבֵּר.
  - «Yahvé» se usa de forma consistente con la terminología del proyecto para יְהוָה.
  - La nota al pie preserva la alternativa transliterada sin sustituir el nombre en el texto principal.
