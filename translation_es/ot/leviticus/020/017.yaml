revisions:
- from: Si un hombre toma[a] a su hermana, hija de su padre o hija de su madre, y ve su desnudez, y ella ve la desnudez de él, es una infamia, y ellos serán cortados[b] delante de los ojos de los hijos de su pueblo. Ha descubierto la desnudez de su hermana; llevará su culpa.
  to: Si un hombre toma a su hermana, hija de su padre o hija de su madre, y ve su desnudez, y ella ve su propia desnudez, es una vergüenza[a], y serán cortados[b] a la vista de los hijos de su pueblo. Él ha descubierto la desnudez de su hermana; llevará su culpa.
  rationale: 'Se revisa para mejorar la naturalidad del español sin apartarse del hebreo ni del audit trail inglés: se elimina una nota no necesaria; se cambia ''la desnudez de él'' por ''su propia desnudez'' para mayor claridad; se sustituye el calco rígido ''delante de los ojos de'' por ''a la vista de''; y se ajusta ''infamia'' a ''vergüenza'' con nota léxica, más idiomático y fiel al uso negativo raro de חֶסֶד.'
  reviewer_model: gpt-5.4
