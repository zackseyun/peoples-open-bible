translation:
  language: es
  text: El que responde a un asunto[a] antes de escucharlo, es necedad y vergüenza para él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una palabra' o 'un caso'. El hebreo דָּבָר puede significar 'palabra', 'asunto' o 'caso'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵשִׁיב
  english_pob_choice: answers
  chosen_spanish: responde
  alternatives_spanish:
  - contesta
  - da respuesta
  lexicon: HALOT
  rationale: El hifil de שוב aquí funciona idiomáticamente como responder/contestar. En español, «responde» suena natural y conserva la acción verbal breve del proverbio sin cargarlo con más explicación de la necesaria.
- source_word: דָּבָר
  english_pob_choice: a matter
  chosen_spanish: un asunto
  alternatives_spanish:
  - una palabra
  - un caso
  - una cosa
  lexicon: HALOT
  rationale: En contexto sapiencial, דבר puede abarcar palabra, asunto o caso. «Un asunto» mantiene la amplitud semántica y funciona bien en español para situaciones de conversación, debate o juicio.
- source_word: בְּטֶרֶם
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - antes que
  - previo a
  lexicon: HALOT
  rationale: Es la equivalencia temporal directa y natural en español, sin introducir matices que el hebreo no exige.
- source_word: יִשְׁמָע
  english_pob_choice: he hears
  chosen_spanish: escucharlo
  alternatives_spanish:
  - oírlo
  - prestársele atención
  lexicon: HALOT
  rationale: El verbo שמע aquí enfatiza recibir y atender el asunto antes de responder. «Escucharlo» comunica bien esa idea en español y evita una repetición torpe de «oír» en la misma cláusula.
- source_word: אִוֶּלֶת
  english_pob_choice: folly
  chosen_spanish: necedad
  alternatives_spanish:
  - insensatez
  - locura
  lexicon: HALOT
  rationale: En Proverbios, אִוֶּלֶת es un término moral-sapiencial fuerte. «Necedad» es una opción castellana natural y bíblicamente transparente, algo más concreta que «insensatez».
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: para él
  alternatives_spanish:
  - a él
  - para la persona
  lexicon: HALOT
  rationale: La partícula lamed expresa resultado/referencia personal. «Para él» comunica el efecto resultante de modo claro y idiomático en español.
- source_word: וּכְלִמָּה
  english_pob_choice: and shame
  chosen_spanish: y vergüenza
  alternatives_spanish:
  - y deshonra
  - y oprobio
  lexicon: HALOT
  rationale: כלמה denota vergüenza pública o deshonra. «Vergüenza» es la correspondencia más natural y reconoce el matiz social del término sin endurecerlo innecesariamente.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'Whoever' por 'He who' solo por registro formal. En español, «El que» conserva ese mismo nivel formal y natural, por lo que no requiere una marcación especial en el texto.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo proverbial breve y directo.
  - Se evitó traducir דבר como «palabra» para no estrechar indebidamente su alcance.
  - No se usó terminología eclesiástica tradicional donde el hebreo no la exige.
