translation:
  language: es
  text: Desde el cielo te hizo oír su voz para disciplinarte[a]; y sobre la tierra te mostró su gran fuego, y oíste sus palabras de en medio del fuego[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para instruirte' o 'para corregirte'; el verbo hebreo puede abarcar disciplina correctiva y formativa.
    reason: lexical_alternative
  - marker: b
    text: O 'desde dentro del fuego'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַשָּׁמַיִם
  english_pob_choice: From heaven
  chosen_spanish: Desde el cielo
  alternatives_spanish:
  - Desde los cielos
  - Del cielo
  lexicon: HALOT
  rationale: '''שָׁמַיִם'' en este giro apunta al ámbito celestial contrapuesto con ''sobre la tierra''. ''Desde el cielo'' conserva esa oposición espacial de modo natural en español y sigue la decisión inglesa de no pluralizar innecesariamente.'
- source_word: הִשְׁמִיעֲךָ
  english_pob_choice: he made you hear
  chosen_spanish: te hizo oír
  alternatives_spanish:
  - te causó oír
  - te dejó oír
  lexicon: HALOT
  rationale: El hifil es causativo; 'te hizo oír' reproduce esa causalidad con naturalidad en español y evita suavizar el verbo a una simple permisión.
- source_word: קֹלוֹ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su sonido
  lexicon: HALOT
  rationale: En contexto de revelación divina, קוֹל se entiende mejor como 'voz'. Mantener 'voz' preserva el carácter audible y personal de la auto-revelación de Dios.
- source_word: לְיַסְּרֶךָּ
  english_pob_choice: to discipline you
  chosen_spanish: para disciplinarte
  alternatives_spanish:
  - para instruirte
  - para corregirte
  - para castigarte
  lexicon: HALOT
  rationale: '''יסר'' combina corrección, formación y, a veces, disciplina correctiva. ''Disciplinarte'' conserva esa amplitud mejor que una opción más reducida como ''instruirte'' o más dura como ''castigarte''.'
- source_word: וְעַל הָאָרֶץ
  english_pob_choice: and on earth
  chosen_spanish: y sobre la tierra
  alternatives_spanish:
  - y en la tierra
  - y sobre la tierra
  lexicon: HALOT
  rationale: '''Sobre la tierra'' mantiene el contraste cósmico con ''desde el cielo'' y suena natural en español. ''Tierra'' aquí puede abarcar tanto el suelo como el ámbito terrenal.'
- source_word: הֶרְאֲךָ
  english_pob_choice: he showed you
  chosen_spanish: te mostró
  alternatives_spanish:
  - te hizo ver
  - te dejó ver
  lexicon: HALOT
  rationale: El hifil de ראה es causativo, pero en español la forma idiomática más clara es 'te mostró', que conserva el sentido de revelación visual sin calcar la estructura hebrea.
- source_word: אֶת אִשּׁוֹ הַגְּדוֹלָה
  english_pob_choice: his great fire
  chosen_spanish: su gran fuego
  alternatives_spanish:
  - su fuego grande
  - su gran llama
  lexicon: HALOT
  rationale: '''אֵשׁ'' es ''fuego''. ''Gran fuego'' sigue el orden y la fuerza del hebreo, preservando la imagen vívida sin expandirla indebidamente.'
- source_word: וּדְבָרָיו
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - sus palabras dichas
  - lo que dijo
  lexicon: HALOT
  rationale: El plural hebreo exige un plural en español. 'Palabras' conserva la explicitud del texto y sugiere discurso articulado, no solo un contenido general.
- source_word: שָׁמַעְתָּ
  english_pob_choice: you heard
  chosen_spanish: oíste
  alternatives_spanish:
  - escuchaste
  lexicon: HALOT
  rationale: Aquí el verbo denota oír efectivamente, no solo prestar atención. 'Oíste' es la equivalencia más directa y fiel.
- source_word: מִתּוֹךְ הָאֵשׁ
  english_pob_choice: from the midst of the fire
  chosen_spanish: desde en medio del fuego
  alternatives_spanish:
  - desde el medio del fuego
  - desde dentro del fuego
  lexicon: HALOT
  rationale: '''מִתּוֹךְ'' expresa origen ''desde el medio/en medio de''. ''Desde en medio del fuego'' preserva el tono solemne y la imagen de procedencia del habla divina.'
theological_decisions:
- issue: El alcance de לְיַסְּרֶךָּ como acto pedagógico y correctivo de Dios
  english_pob_reading: to discipline you
  chosen_spanish_reading: para disciplinarte
  alternative_spanish_readings:
  - para instruirte
  - para castigarte
  rationale: La frase vincula la revelación con un propósito formativo del pacto. 'Disciplinarte' mantiene la tensión entre instrucción y corrección sin reducirla a mero aprendizaje ni endurecerla a castigo exclusivo.
  doctrine_reference: Translation philosophy §3, §6
- issue: Conservación del lenguaje concreto de la revelación divina
  english_pob_reading: his voice ... his great fire ... his words
  chosen_spanish_reading: su voz ... su gran fuego ... sus palabras
  alternative_spanish_readings:
  - su sonido ... su gran fuego ... lo que dijo
  rationale: El texto habla de oír y ver realidades concretas de la manifestación de Yahvé. Mantener 'voz', 'fuego' y 'palabras' deja intacta la teología de la revelación en forma sensible y no la abstrae.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión en español sigue de cerca el texto hebreo y coincide con la decisión auditada del POB inglés en Deuteronomio 4:36. Se mantuvo la estructura paralela 'desde el cielo / sobre la tierra / desde en medio del fuego' y se conservó el verbo causativo con un español idiomático. No se identificaron revisiones posteriores que alteren esta lectura.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en el registro del proyecto, pero en este versículo el Tetragrámaton no aparece explícitamente; por eso la formulación se mantiene con 'Dios' implícito en el contexto y con pronombres posesivos.
  - '''Tierra'' se conserva para reflejar el contraste con ''cielo'', no como referencia técnica a ''la tierra prometida''.'
  - '''Disciplinarte'' se prefiere sobre ''instruirte'' para no perder el componente correctivo que el audit trail inglés preserva.'
