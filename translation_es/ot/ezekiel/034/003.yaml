translation:
  language: es
  text: Comen la grasa[a], se visten con la lana, matan la oveja engordada[b], pero no pastorean al rebaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la leche»; algunas traducciones siguen aquí una tradición interpretativa o una lectura de versiones antiguas, pero el hebreo normalmente significa «grasa».
    reason: lexical_alternative
  - marker: b
    text: O «la engordada» o «el animal escogido»; el hebreo probablemente se refiere a los animales bien alimentados del rebaño.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֵלֶב
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - la gordura
  - la parte grasa
  lexicon: HALOT
  rationale: חֵלֶב normalmente designa la grasa o la porción grasa; "la grasa" conserva el sentido concreto y la imagen de consumo abusivo. "La leche" no se adopta porque el hebreo comúnmente apunta a grasa, no a leche.
- source_word: הַצֶּמֶר
  english_pob_choice: the wool
  chosen_spanish: la lana
  alternatives_spanish:
  - el vellón
  lexicon: HALOT
  rationale: צֶמֶר significa lana. En español, "la lana" es la equivalencia natural y clara en este contraste con el vestido obtenido del rebaño.
- source_word: תִּלְבָּשׁוּ
  english_pob_choice: you clothe yourselves with
  chosen_spanish: se visten con
  alternatives_spanish:
  - se cubren con
  - se ponen
  lexicon: HALOT
  rationale: לבש expresa ponerse o vestirse; la forma reflexiva española comunica bien el sentido de beneficiarse personalmente con lo que toman del rebaño.
- source_word: הַבְּרִיאָה
  english_pob_choice: the fattened sheep
  chosen_spanish: la oveja engordada
  alternatives_spanish:
  - el animal engordado
  - la res engordada
  lexicon: HALOT
  rationale: בריאה aquí funciona de modo sustantivo/adjetival como una res bien alimentada o engordada. "La oveja engordada" hace explícito el referente ovino que el contexto pastoril sugiere sin sobreinterpretar el término.
- source_word: תִּזְבָּחוּ
  english_pob_choice: you slaughter
  chosen_spanish: degüellan
  alternatives_spanish:
  - sacrifican
  - matan
  lexicon: HALOT
  rationale: זבח puede ser "sacrificar" o "degollar/degüellar"; aquí el contexto es de abuso, no de culto, por lo que "degüellan" conserva la violencia concreta mejor que una lectura cultual.
- source_word: הַצֹּאן
  english_pob_choice: the flock
  chosen_spanish: el rebaño
  alternatives_spanish:
  - las ovejas
  - el ganado pequeño
  lexicon: HALOT
  rationale: צֹאן denota ganado menor en conjunto. "El rebaño" es la forma española más idiomática para mantener la metáfora pastoral colectiva.
- source_word: תִרְעוּ
  english_pob_choice: you shepherd
  chosen_spanish: apacientan
  alternatives_spanish:
  - pastorean
  - cuidan
  lexicon: HALOT
  rationale: רעה en este contexto pastoral abarca cuidar, pastorear y llevar al pasto. "Apacientan" mantiene el campo semántico bíblico en español sin reducirlo solo a "alimentar".
theological_decisions:
- issue: Conservar la metáfora de pastores y rebaño como eje del reproche
  english_pob_reading: 'Retain explicit shepherding language: ''you do not shepherd the flock.'''
  chosen_spanish_reading: No apacientan al rebaño.
  alternative_spanish_readings:
  - no pastorean al rebaño
  - no cuidan al rebaño
  rationale: El versículo denuncia a dirigentes que debían actuar como pastores. "Apacientan" preserva la metáfora pastoral y la carga de responsabilidad sin convertir el verbo en una paráfrasis genérica.
  doctrine_reference: 'Translation philosophy #3 and #5'
translation_notes:
  revision_awareness: El texto sigue de cerca la revisión inglesa más reciente, que no introdujo cambios respecto del borrador base, y conserva la alta concordancia del control cruzado. Se mantiene la decisión léxica central de traducir חֵלֶב como grasa, צֶמֶר como lana, בריאה como animal/oveja engordada, זבח como una acción violenta de degüello y רעה como apacentar/pastorear dentro de la metáfora de rebaño.
  spanish_consistency_notes:
  - Se usa un registro bíblico contemporáneo y natural para español, evitando tanto arcaísmos como calcos rígidos.
  - Se conserva la metáfora pastoril de manera explícita con «rebaño» y «apacientan».
  - Las notas al pie mantienen las alternativas interpretativas documentadas sin diluir la lectura principal.
  - Se evita «SEÑOR» u otras sustituciones no presentes en este versículo, ya que aquí no aparece el nombre divino.
