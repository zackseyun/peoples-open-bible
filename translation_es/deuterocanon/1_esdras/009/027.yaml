translation:
  language: es
  text: 'De los hijos de Elá: Matan y Zacarías[a], Jezrikilo y Obadías y Jeremot y Aedeías.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Varios nombres se han conservado muy cerca de la forma griega porque 1 Esdras suele diferir del paralelo hebreo en la grafía y el orden; para algunos nombres también son posibles formas hebreas más conocidas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  english_pob_choice: From the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - Entre los hijos de
  - De entre los hijos de
  lexicon: LSJ
  rationale: La preposición ἐκ con genitivo introduce aquí un subgrupo dentro de una lista genealógica. «De los hijos de» conserva ese valor relacional en español sin sobreinterpretarlo.
- source_word: Ἠλά
  english_pob_choice: Elah
  chosen_spanish: Elá
  alternatives_spanish:
  - Ela
  lexicon: LSJ
  rationale: Se translitera el nombre propio según la forma griega y la adaptación española natural con acento gráfico para indicar la sílaba tónica final.
- source_word: Ματαν
  english_pob_choice: Mattan
  chosen_spanish: Matan
  alternatives_spanish:
  - Mattan
  lexicon: LSJ
  rationale: Nombre propio semítico reproducido de manera cercana al griego. En español, «Matan» resulta más natural que duplicar la consonante sin necesidad textual.
- source_word: Ζαχαρίας
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zacarías
  lexicon: LSJ
  rationale: Se emplea la forma bíblica española consolidada para este nombre, fiel al referente tradicional y plenamente inteligible en español.
- source_word: Ἰεζρίκιλος
  english_pob_choice: Jezrikilus
  chosen_spanish: Jezríkilo
  alternatives_spanish:
  - Jezrikilus
  - Iezríkilos
  lexicon: LSJ
  rationale: El nombre es raro y la forma griega transmitida debe guiar la transliteración. «Jezríkilo» intenta reflejar de cerca la secuencia griega sin armonizarla innecesariamente con una forma hebrea más familiar.
- source_word: Ὠαβδίος
  english_pob_choice: Obadiah
  chosen_spanish: Obadías
  alternatives_spanish:
  - Joabdías
  - Oabdías
  lexicon: LSJ
  rationale: La revisión inglesa ya optó por una forma más natural que el transliterado rígido. En español, «Obadías» refleja con claridad la correspondencia probable sin perder el vínculo con la forma griega transmitida.
- source_word: Ἱερεμὼθ
  english_pob_choice: Jeremoth
  chosen_spanish: Jeremot
  alternatives_spanish:
  - Jeremot
  - Jerimot
  lexicon: LSJ
  rationale: Se conserva la transliteración cercana del nombre griego, adaptándola a la ortografía española estándar. La forma final en -t evita añadir vocales no presentes en el testimonio griego.
- source_word: Ἀηδείας
  english_pob_choice: Aedeias
  chosen_spanish: Aedeías
  alternatives_spanish:
  - Aedeias
  - Adeías
  lexicon: LSJ
  rationale: Nombre propio raro, mejor tratado por transliteración próxima. El acento gráfico en español facilita la lectura sin alterar la secuencia consonántica y vocálica transmitida.
translation_notes:
  revision_awareness: Se siguió el paquete de fuente griego como ancla primaria. La auditoría inglesa muestra una revisión reciente en Ὠαβδίος, pasando de una transliteración rígida a una forma más natural («Obadiah»); en español se reflejó esa misma orientación con «Obadías», manteniendo el resto de la lista sin armonizaciones innecesarias.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque el versículo no contiene el nombre divino.
  - Se prefirió una transliteración española legible de los nombres propios raros, sin imponer equivalentes hebreos no explicitados por la fuente griega.
  - La puntuación conserva el formato de lista nominal de la fuente y la función de dos puntos tras el encabezado genealógico.
