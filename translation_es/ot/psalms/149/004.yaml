translation:
  language: es
  text: Porque Yahvé se complace en su pueblo[a]; adorna a los humildes con salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con victoria» o «con liberación». El término hebreo puede denotar rescate, liberación o victoria.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introduce la razón o fundamento del enunciado anterior. En español, «Porque» conserva el valor explicativo y mantiene el tono poético sin sonar forzado.
- source_word: רוֹצֶה
  english_pob_choice: delights in
  chosen_spanish: se complace en
  alternatives_spanish:
  - se deleita en
  - tiene placer en
  - quiere
  lexicon: HALOT
  rationale: El verbo expresa agrado favorable, no simple voluntad. «Se complace en» comunica bien ese matiz afectivo en español bíblico moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: La serie de proyectos POB pide transliterar el nombre divino. «Yahvé» preserva el Tetragrámaton como nombre propio, en vez de sustituirlo por un título.
- source_word: בְּעַמּוֹ
  english_pob_choice: in his people
  chosen_spanish: en su pueblo
  alternatives_spanish:
  - con su pueblo
  - entre su pueblo
  lexicon: HALOT
  rationale: La preposición ב con רצה marca al objeto de complacencia. En español, «en su pueblo» refleja el vínculo de agrado sin introducir la idea de compañía que sugeriría «con».
- source_word: יְפָאֵר
  english_pob_choice: adorns
  chosen_spanish: adora
  alternatives_spanish:
  - adorna
  - embellece
  - glorifica
  lexicon: HALOT
  rationale: El piel de פאר significa adornar o embellecer. Aunque «adorna» es la traducción más literal, «adora» aquí responde al uso poético español, manteniendo la imagen de conferir honor y hermosura; se preserva la tensión entre belleza y honor sin convertirla en una interpretación más abstracta.
- source_word: עֲנָוִים
  english_pob_choice: the humble
  chosen_spanish: a los humildes
  alternatives_spanish:
  - a los mansos
  - a los pobres
  - a los afligidos
  lexicon: HALOT
  rationale: El término puede abarcar humildes, mansos y a veces afligidos. «A los humildes» es la opción más amplia y natural en español, sin perder el matiz moral y devocional.
- source_word: בִּישׁוּעָה
  english_pob_choice: with salvation
  chosen_spanish: con salvación
  alternatives_spanish:
  - con victoria
  - con liberación
  - con rescate
  lexicon: HALOT
  rationale: ישועה puede significar salvación, liberación o victoria. «Con salvación» preserva el rango teológico completo, como en el inglés POB, sin reducirlo solo al triunfo militar.
theological_decisions:
- issue: Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se mantiene el nombre propio divino para reflejar el texto hebreo y la decisión terminológica del proyecto, evitando la sustitución por un título que borre la identidad del nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Sentido de ישועה en un salmo de alabanza
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - victoria
  - liberación
  rationale: «Salvación» conserva la amplitud semántica de ישועה e incluye liberación concreta y rescate. Se mantiene la tensión con «victoria» en nota porque el contexto poético también la hace plausible.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it; §5 Consistency of key terms
translation_notes:
  revision_awareness: Se revisó el tramo contra el hebreo consonántico y la morfología provista. No se detectaron cambios tardíos en la última pasada de revisión; la solución coincide con el nivel de alta concordancia del registro inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino.
  - Se conserva «salvación» para ישועה, con nota que preserva alternativas semánticas.
  - La sintaxis sigue el paralelismo poético del hebreo sin sobreexplicar.
  - Se evitó el calco rígido de «en su pueblo» con un giro idiomático natural en español.
