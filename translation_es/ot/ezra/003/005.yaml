    issue: Falta un verbo principal en la cláusula inicial.
    rationale: El hebreo es elíptico, pero el inglés POB auditado ya documentó la necesidad de suplir 'came'. En español, 'Y después de eso, la ofrenda...' deja una frase nominal incompleta y menos legible.
  - severity: medium
    issue: '''Ofrenda quemada regular'' es comprensible pero poco idiomática en registro bíblico español.'
    rationale: Para עֹלַת תָּמִיד, 'holocausto regular' o 'holocausto continuo' suena más natural y mantiene la referencia sacrificial técnica sin calco innecesario.
  - severity: low
    issue: La nota [a] está formulada de manera algo pesada.
    rationale: 'Puede simplificarse para reflejar mejor las alternativas documentadas: ''continuo'' o ''diario'', sin sobreexplicar en exceso dentro de la nota.'
