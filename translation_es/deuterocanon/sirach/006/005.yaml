translation:
  language: es
  text: Un paladar dulce[a] multiplica amigos, y labios amables[b] preguntan por la paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo 'multiplica a quien ama' es difícil; el paralelo griego dice 'multiplica sus amigos', y ese sentido se sigue aquí por ser más claro en contexto. El hebreo conserva la imagen corporal de 'paladar'.
    reason: alternative_reading
  - marker: b
    text: 'También puede entenderse: ''labios de gracia''. El hebreo usa una expresión corporal y social de favor; se traduce ''amables'' para expresar con claridad ese matiz en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵךְ / λάρυγξ
  english_pob_choice: palate
  chosen_spanish: paladar
  alternatives_spanish:
  - boca
  - garganta
  - habla
  lexicon: HALOT; LXX λάρυγξ
  rationale: La imagen corporal debe conservarse en español. 'Paladar' es la forma más natural y fiel para el hebreo חֵךְ, y mantiene la metáfora de una palabra agradable que sale del cuerpo. 'Garganta' también aparece en la línea griega, pero en español suena más áspera y menos idiomática como equivalente principal.
- source_word: עָרֵב / γλυκὺς
  english_pob_choice: sweet
  chosen_spanish: dulce
  alternatives_spanish:
  - agradable
  - grato
  lexicon: HALOT; LXX γλυκύς
  rationale: '''Dulce'' conserva la metáfora sensorial del hebreo y coincide bien con el griego γλυκύς. ''Agradable'' explicita el sentido, pero debilita la imagen gustativa del texto.'
- source_word: יַרְבֶּה אוֹהֵב / πληθυνεῖ φίλους αὐτοῦ
  english_pob_choice: multiplies friends
  chosen_spanish: multiplica amigos
  alternatives_spanish:
  - gana muchos amigos
  - hace abundar sus amigos
  lexicon: HALOT; LXX φίλους αὐτοῦ
  rationale: 'La lectura hebrea transmite un sentido difícil, pero la paralela griega aclara que el efecto es social: aumentar amistades. ''Multiplica amigos'' sigue de cerca la forma verbal y conserva el peso proverbial.'
- source_word: שִׂפְתֵי חֵן / γλῶσσα εὔλαλος
  english_pob_choice: gracious lips
  chosen_spanish: labios graciosos
  alternatives_spanish:
  - labios de gracia
  - labios agradables
  - labios amables
  lexicon: HALOT; LXX εὔλαλος
  rationale: '''Graciosos'' puede sonar extraño en español contemporáneo, pero aquí intenta reproducir el campo de חֵן como favor, encanto social y donaire verbal. Aun así, ''labios graciosos'' es menos transparente que ''labios de gracia''; se conserva por cercanía al patrón del texto y para no sustituir el valor social de חֵן por mera estética.'
- source_word: שׁוֹאֲלֵי שָׁלוֹם / εὐπροσήγορα
  english_pob_choice: ask after peace
  chosen_spanish: preguntan por la paz
  alternatives_spanish:
  - saludan con paz
  - preguntan por el bienestar
  - hacen saludos de paz
  lexicon: HALOT; LXX εὐπροσήγορα
  rationale: La expresión hebrea es un giro idiomático de cortesía y bienestar, no solo una idea abstracta de pacificación. 'Preguntan por la paz' mantiene el verbo de inquirir y permite entender el gesto social de saludo cordial, en línea con el griego sobre un hablar/dirigirse afable.
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz de la desalineación hebreo-griego señalada en el expediente. La redacción española sigue la imagen corporal del hebreo y adopta el sentido social aclarado por la LXX para 'amigos' y 'preguntar por la paz', sin borrar la tensión textual documentada.
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' irrelevante aquí; no aplica terminología teológica directa.
  - Se preserva la metáfora corporal ('paladar', 'labios') en lugar de abstraerla a 'habla' para respetar la poética sapiencial.
  - '''Preguntan por la paz'' se entiende como saludo/interés por el bienestar, no como tratado de paz.'
