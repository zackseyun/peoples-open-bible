translation:
  language: es
  text: Si se halla a un hombre que secuestra[a] a uno de sus hermanos[b] de entre los hijos de Israel, y lo esclaviza[c] y lo vende, entonces morirá ese secuestrador. Así purgarás el mal de en medio de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «raptando a una persona»; literalmente, «robando un alma/persona».
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» aquí se refiere a miembros del pueblo de Israel, no sólo a hermanos biológicos.
    reason: cultural_note
  - marker: c
    text: O «lo hace esclavo».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמָּצֵא
  english_pob_choice: is found
  chosen_spanish: se encuentra
  alternatives_spanish:
  - es hallado
  - se descubre
  lexicon: HALOT
  rationale: El niphal de מצא expresa una pasiva de hallazgo o descubrimiento. «Se encuentra» conserva el registro legal-condicional sin sonar forzado en español.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo es singular masculino y, en este tipo de ley, la forma personal concreta conserva mejor la sintaxis y el tono del original.
- source_word: גֹּנֵב נֶפֶשׁ
  english_pob_choice: kidnapping
  chosen_spanish: secuestrando
  alternatives_spanish:
  - raptando
  - robando a una persona
  - secuestrando a una persona
  lexicon: HALOT
  rationale: La expresión literalmente significa «robar una vida/persona». En contexto legal, el acto es abducir o raptar a un ser humano; «secuestrar» comunica con claridad esa fuerza jurídica en español.
- source_word: מֵאֶחָיו
  english_pob_choice: one of his brothers
  chosen_spanish: a uno de sus hermanos
  alternatives_spanish:
  - a uno de sus compatriotas
  - a uno de sus parientes
  lexicon: HALOT
  rationale: «Hermano» puede ser literal o de parentesco de pacto. Mantiene la imagen fraternal del hebreo; el contexto siguiente aclara que se trata del pueblo de Israel.
- source_word: מִבְּנֵי יִשְׂרָאֵל
  english_pob_choice: from the sons of Israel
  chosen_spanish: de entre los hijos de Israel
  alternatives_spanish:
  - de los hijos de Israel
  - de entre los israelitas
  lexicon: HALOT
  rationale: La preposición partitiva y el plural filial se conservan mejor con «de entre», que mantiene el matiz de extracción dentro de la comunidad de Israel.
- source_word: וְהִתְעַמֶּר בּוֹ
  english_pob_choice: he enslaves him
  chosen_spanish: lo esclaviza
  alternatives_spanish:
  - lo hace esclavo
  - lo reduce a esclavitud
  lexicon: HALOT
  rationale: El hitpael de עמר expresa tratar a la persona como propiedad o esclavo. «Lo esclaviza» es directo, conserva la dureza del verbo y corresponde al ajuste revisado del POB inglés.
- source_word: וּמְכָרוֹ
  english_pob_choice: and sells him
  chosen_spanish: y lo vende
  alternatives_spanish:
  - y lo comercializa
  - y lo vende como esclavo
  lexicon: HALOT
  rationale: La venta forma parte explícita del delito; el objeto pronominal mantiene la referencia al cautivo sin añadir material no presente en el hebreo.
- source_word: וּמֵת הַגַּנָּב הַהוּא
  english_pob_choice: then that kidnapper shall die
  chosen_spanish: entonces morirá ese secuestrador
  alternatives_spanish:
  - entonces ese secuestrador morirá
  - entonces morirá ese ladrón
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «y morirá ese ladrón», el referente aquí es el raptor de personas. «Secuestrador» hace explícita la identificación ya establecida por el contexto y evita una ambigüedad innecesaria en español.
- source_word: וּבִעַרְתָּ הָרָע מִקִּרְבֶּךָ
  english_pob_choice: So you shall purge the evil from your midst
  chosen_spanish: Así quitarás el mal de en medio de ti
  alternatives_spanish:
  - Así purgarás el mal de en medio de ti
  - Así eliminarás el mal de tu medio
  lexicon: HALOT
  rationale: La fórmula deuteronómica recurrente con בער tiene fuerza judicial de remover o erradicar el mal de la comunidad. «Quitarás el mal de en medio de ti» es claro, natural y suficientemente fuerte en español.
theological_decisions:
- issue: Lenguaje de fraternidad de pacto aplicado a la ley
  english_pob_reading: Retain 'brothers' while clarifying Israelite identity with 'from the sons of Israel.'
  chosen_spanish_reading: Mantener «hermanos» y aclarar con «de entre los hijos de Israel».
  alternative_spanish_readings:
  - compatriotas
  - parientes
  rationale: La fraternidad no es sólo biológica; en la ley de Israel funciona como lenguaje de pertenencia al pueblo del pacto. Conservar «hermanos» preserva esa retórica, y la frase siguiente evita que se lea de manera restringida a hermanos de sangre.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Fuerza del verbo sobre la reducción a esclavitud
  english_pob_reading: Use 'enslaves him' rather than a softer term.
  chosen_spanish_reading: Usar «lo esclaviza» en vez de una expresión atenuada.
  alternative_spanish_readings:
  - lo hace esclavo
  - lo trata como esclavo
  rationale: El delito incluye someter a una persona de Israel a estatus esclavo y venderla. «Esclaviza» preserva la dureza del acto y evita suavizar el contenido jurídico y moral del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1; Contested terms table on δοῦλος by analogy of bonded-status clarity
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que sustituyó «treats him as a slave» por «enslaves him» para reflejar con mayor precisión el verbo hebreo. También conserva la decisión auditada de mantener la fraternidad de pacto («hermanos») junto con la aclaración nacional («hijos de Israel»), y traduce la fórmula deuteronómica final con un equivalente español natural y fuerte.
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» para conservar la formulación bíblica estándar y el matiz de pertenencia comunitaria.
  - «Secuestrador» se usa de manera coherente con la decisión léxica de entender גֹּנֵב נֶפֶשׁ como rapto o secuestro de una persona.
  - La fórmula final «de en medio de ti» conserva el tono comunitario de la expresión hebrea sin introducir un giro estilístico ajeno al registro legal.
  - Se evita «SEÑOR» porque el versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
