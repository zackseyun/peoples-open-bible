translation:
  language: es
  text: Y todos juntos bendijeron al Dios misericordioso, y fueron fortalecidos en sus almas[a], y quedaron listos para herir no solo a hombres, sino aun a las fieras más feroces y a muros de hierro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fueron fortalecidos en espíritu»; o, más idiomáticamente, «tomaron ánimo».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «herir... muros de hierro» probablemente es hiperbólica y expresa una audacia extrema en la batalla.
    reason: cultural_note
lexical_decisions:
- source_word: ὁμοῦ δὲ πάντες
  english_pob_choice: all together
  chosen_spanish: todos juntos
  alternatives_spanish:
  - juntos
  - todos de común acuerdo
  lexicon: LSJ
  rationale: Conserva el valor adverbial de ὁμοῦ y la totalidad de πάντες sin recargar la frase; 'todos juntos' es natural y transparente en español.
- source_word: εὐλόγησαν
  english_pob_choice: blessed
  chosen_spanish: bendijeron
  alternatives_spanish:
  - alabaron
  - dijeron bien de
  lexicon: LSJ
  rationale: Para Dios, 'bendijeron' mantiene el sentido bíblico de εὐλογέω y sigue siendo idiomático en español eclesial.
- source_word: τὸν ἐλεήμονα θεόν
  english_pob_choice: the merciful God
  chosen_spanish: al Dios misericordioso
  alternatives_spanish:
  - al Dios compasivo
  - a Dios, el misericordioso
  lexicon: LSJ
  rationale: '''Misericordioso'' corresponde bien a ἐλεήμων y permite una construcción natural en español con artículo y complemento nominal.'
- source_word: ἐπερρώσθησαν ταῖς ψυχαῖς
  english_pob_choice: were strengthened in their souls
  chosen_spanish: fueron fortalecidos en sus almas
  alternatives_spanish:
  - fueron fortalecidos en su espíritu
  - tomaron ánimo
  lexicon: LSJ
  rationale: Se preserva ψυχαῖς con 'almas' para mantener visible la imagen original; 'fortalecidos' sigue el pasivo griego y no resuelve la expresión a un mero modismo.
- source_word: τιτρώσκειν
  english_pob_choice: to wound
  chosen_spanish: herir
  alternatives_spanish:
  - dañar
  - lastimar
  lexicon: LSJ
  rationale: '''Herir'' reproduce la fuerza de infligir lesión y funciona tanto con seres vivos como, en el contexto hiperbólico, con objetos inanimados.'
- source_word: οὐ μόνον ἀνθρώπους θῆρας δὲ τοὺς ἀγριωτάτους καὶ σιδηρᾶ τείχη
  english_pob_choice: not only men but even the fiercest wild beasts and iron walls
  chosen_spanish: no solo a hombres, sino aun a las fieras más feroces y a muros de hierro
  alternatives_spanish:
  - no solo a hombres, sino también a las fieras más feroces y a muros de hierro
  - no solo a hombres, sino hasta a las fieras más feroces y a muros de hierro
  lexicon: LSJ
  rationale: La secuencia intensiva se conserva con 'no solo... sino aun...' y con el paralelismo de objetos; 'muros de hierro' mantiene el valor literal de σιδηρᾶ τείχη.
- source_word: ὄντες ἕτοιμοι
  english_pob_choice: being ready
  chosen_spanish: estaban listos
  alternatives_spanish:
  - estando listos
  - estaban preparados
  lexicon: LSJ
  rationale: En español, el participio resulta menos natural; 'estaban listos' expresa el estado resultante sin perder el sentido de disposición para la acción.
theological_decisions:
- issue: ψυχαῖς y la fuerza interior
  english_pob_reading: were strengthened in their souls
  chosen_spanish_reading: fueron fortalecidos en sus almas
  alternative_spanish_readings:
  - fueron fortalecidos en su espíritu
  - tomaron ánimo
  rationale: Se conserva 'almas' para no borrar la tensión antropológica del griego. 'Espíritu' y 'tomaron ánimo' son posibles, pero suavizan o reinterpretan el término original; el texto deja abierta la referencia a la interioridad sin especificarla doctrinalmente.
  doctrine_reference: DOCTRINE.md § Translation philosophy, preserve theological tension rather than resolve it
- issue: La hipérbole bélica de 'herir... muros de hierro'
  english_pob_reading: The phrase 'to wound ... iron walls' is likely hyperbolic, expressing extreme boldness in battle.
  chosen_spanish_reading: La frase sugiere hipérbole militar, expresando audacia extrema en combate.
  alternative_spanish_readings:
  - La frase puede entenderse literalmente como daño a murallas de hierro.
  - La frase exagera la capacidad ofensiva del grupo.
  rationale: Se mantiene la imagen sin diluirla en una explicación en el cuerpo del texto; la nota deja constancia de la probable hipérbole para no borrar el recurso retórico documentado en el POB inglés.
  doctrine_reference: DOCTRINE.md § Translation philosophy, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés: se mantuvieron la bendición colectiva, la fuerza interior expresada con ψυχαῖς y la hipérbole bélica. No se registraron revisiones posteriores que alteren la sustancia de la traducción.'
  spanish_consistency_notes:
  - Se usó 'Dios' y no 'Señor' porque el griego dice θεόν, no κύριος.
  - Se eligió 'bendijeron' para εὐλόγησαν, manteniendo el registro bíblico natural en español.
  - Se preservó 'almas' para ψυχαῖς por fidelidad léxica; la nota ofrece alternativas sin resolver la ambigüedad.
  - '''Muros de hierro'' traduce literalmente σιδηρᾶ τείχη y conserva la imagen retórica.'
  - Se evitó 'Cristo', 'SEÑOR' o 'siervo' porque no corresponden a este versículo ni al término fuente.
