    issue: La nota al pie reproduce mal la alternativa léxica.
    rationale: 'La nota inglesa dice: «Or ''an ephod came down in his hand,'' a more literal rendering of the Hebrew word order.» El borrador español ofrece «O: «con un efod en su mano»», que no representa esa alternativa ni el orden hebreo más literal; además, se parece demasiado al texto principal.'
  revised_spanish_text: Ahora bien, cuando Abiatar hijo de Ahimelec huyó a David en Queila[a], descendió con un efod en su mano.
