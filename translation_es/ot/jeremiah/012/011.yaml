revisions:
- from: La han hecho una desolación[a]; se lamenta delante de mí, desolada. Toda la tierra está devastada[c][b], porque nadie la toma a pecho.
  to: La han hecho una desolación[a]; se lamenta delante de mí, desolado[c]. Todo el país ha sido devastado[b], porque nadie lo toma a pecho.
  rationale: Se ajusta אֶרֶץ a «país» para preservar mejor el referente territorial contextual y evitar una lectura cósmica de «toda la tierra». En consecuencia, se armonizan los pronombres y el adjetivo («desolado», «lo», «ha sido devastado») con «país», y se corrige la nota correspondiente para reflejar con precisión la decisión léxica auditada.
