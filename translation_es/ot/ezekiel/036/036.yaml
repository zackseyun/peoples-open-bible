  revision_rationale: Se hizo una reparación menor para reflejar mejor הַנֶּהֱרָסוֹת y mejorar la naturalidad del español. «Los lugares arruinados» preserva el sentido local/plural del hebreo mejor que «las ruinas». Se mantuvo «he plantado lo desolado» por fidelidad al audit trail inglés revisado y porque el español sigue siendo claro.
