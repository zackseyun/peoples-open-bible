translation:
  language: es
  text: 'Y Eli le dijo: «¿Hasta cuándo estarás[a] ebria? Aparta[b] tu vino de ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Hasta cuándo te embriagarás?» El verbo hebreo puede entenderse como llegar a embriagarse o como estar en estado de embriaguez.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «retira tu vino de sobre ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Entonces ... le dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo avanza la acción; «Entonces» comunica el giro narrativo de forma natural en español sin perder la secuencia.
- source_word: אֵלֶיהָ
  english_pob_choice: to her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  lexicon: HALOT
  rationale: El dativo indirecto en español suena más natural con «le»; el referente femenino queda claro por el contexto.
- source_word: עֵלִי
  english_pob_choice: Eli
  chosen_spanish: Eli
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: עַד מָתַי
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo será?
  lexicon: HALOT
  rationale: Equivalente idiomático directo del hebreo temporal, más natural que un calco como «¿Hasta cuándo?» sin complemento.
- source_word: תִּשְׁתַּכָּרִין
  english_pob_choice: will you be drunk
  chosen_spanish: estarás ... ebria
  alternatives_spanish:
  - te emborracharás
  - seguirás ebria
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar el estado de embriaguez o el hacerse ebria; aquí se mantiene la lectura acusatoria del estado presente/futuro con «estarás ebria», y el adjetivo marca el estado más que un proceso reflexivo.
- source_word: הָסִירִי
  english_pob_choice: Put ... away
  chosen_spanish: Aparta
  alternatives_spanish:
  - Quita
  - Retira
  lexicon: HALOT
  rationale: Imperativo de quitar o remover algo; «aparta» es natural y conserva la idea de retirar de uno mismo.
- source_word: אֶת יֵינֵךְ
  english_pob_choice: your wine
  chosen_spanish: tu vino
  lexicon: HALOT
  rationale: Objeto directo simple; «tu vino» reproduce el sentido sin añadir explicaciones.
- source_word: מֵעָלָיִךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de encima de ti
  - de sobre ti
  lexicon: HALOT
  rationale: La imagen literal es «de sobre ti», pero en español «de ti» transmite el sentido con fluidez y sin forzar una construcción extraña.
translation_notes:
  revision_awareness: 'Se siguió la lectura revisada del inglés POB: se prefirió la forma más directa «will you be drunk» reflejada en español como «estarás ebria», y se mantuvo la imagen literal de «from upon you» en nota, pero con una traducción principal más natural. Se corrigió el anclaje de las notas para que cada marcador aparezca exactamente en el texto.'
  spanish_consistency_notes:
  - Se usa el tratamiento de segunda persona singular femenino por la forma verbal hebrea y el contexto.
  - Se evitó «SEÑOR» o equivalentes porque el versículo no contiene el nombre divino.
  - «Ebria» preserva el estado de embriaguez sin introducir un matiz reflexivo más fuerte que el hebreo en esta línea.
  - «Entonces» mantiene el avance narrativo del wayyiqtol sin sobretraducción.
