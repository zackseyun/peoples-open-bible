base_translation:
  language: en
  yaml_path: translation/ot/2_kings/023/035.yaml
  text: And Jehoiakim gave the silver and the gold to Pharaoh[a], but he assessed the land to give the silver according to Pharaoh’s command. He exacted the silver and the gold from the people of the land, each according to his assessment[d][c][b], to give it to Pharaoh Neco.
  footnotes:
  - marker: a
    text: Or 'assessed the land' or 'levied the land.' The Hebrew verb can denote imposing an assessment for payment.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'according to the mouth of Pharaoh,' that is, according to Pharaoh’s command.
    reason: lexical_alternative
  - marker: c
    text: Or 'each according to his assessment' or, more interpretively, 'each according to his means.'
    reason: lexical_alternative
  - marker: d
    text: '''Neco'' is also commonly spelled ''Necho'' in English translations.'
    reason: alternative_reading
