translation:
  language: es
  text: 'Entonces Abram cayó rostro en tierra, y Dios habló con él, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּפֹּל
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - cayó postrado
  - se postró
  lexicon: HALOT
  rationale: El hebreo expresa una acción narrativa completa; en español, «cayó» reproduce el sentido básico sin añadir una intensificación que el versículo no explicita por sí mismo. La postración queda sugerida por la frase siguiente.
- source_word: עַל פָּנָיו
  english_pob_choice: on his face
  chosen_spanish: sobre su rostro
  alternatives_spanish:
  - con el rostro en tierra
  - de cara al suelo
  lexicon: HALOT
  rationale: «Sobre su rostro» conserva de manera literal y digna la imagen corporal del hebreo. En español bíblico suena natural y mantiene la figura de reverencia/prosternación sin ampliar el sentido.
- source_word: אַבְרָם
  english_pob_choice: Abram
  chosen_spanish: Abram
  alternatives_spanish:
  - Abram
  lexicon: convención onomástica
  rationale: Se conserva el nombre propio en su forma anterior al cambio a Abraham, conforme al contexto narrativo.
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - le habló
  - dijo
  lexicon: HALOT
  rationale: El verbo hebreo marca el acto de hablar y, seguido por לֵאמֹר, mantiene la fórmula narrativa de introducción al discurso. «Habló» preserva ese valor mejor que reducirlo a «dijo».
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: La preposición con sufijo se rinde naturalmente en español como «con él», conservando la relación expresada por el hebreo. Aunque el español a menudo usa «le habló», aquí conviene mantener la literalidad relacional.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea es morfológicamente plural, el verbo y el contexto señalan al Dios único del pacto. En español corresponde «Dios» en singular.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - así
  lexicon: HALOT
  rationale: «Diciendo» conserva la fórmula hebrea de introducción del habla directa y prepara la cita que sigue.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  lexicon: conector narrativo
  rationale: «Entonces» comunica con claridad la secuencia narrativa en español moderno sin perder el avance temporal del waw consecutivo.
theological_decisions:
- issue: Nombre divino y referencia a Dios
  english_pob_reading: Singular 'God'
  chosen_spanish_reading: Dios en singular
  alternative_spanish_readings:
  - dioses
  rationale: El hebreo usa אֱלֹהִים con concordancia singular y se refiere al Dios del pacto que habla con Abram. Traducir en plural sería gramatical y contextualmente incorrecto.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: El inglés auditado no presenta notas ni revisiones aplicadas; el texto español sigue de cerca la lectura final aprobada, con equivalencias naturales en castellano y sin introducir aclaraciones no sostenidas por el original.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en singular conforme a la concordancia verbal.
  - Se conserva «Abram» porque el cambio de nombre aún no ha ocurrido en este punto del relato.
  - Se prefiere «habló con él»/«diciendo» para reflejar la fórmula hebrea וַיְדַבֵּר ... לֵאמֹר sin fusionar indebidamente las dos expresiones.
