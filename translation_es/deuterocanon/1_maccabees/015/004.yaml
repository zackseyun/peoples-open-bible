revisions:
- from: Pero yo quiero salir a recorrer la tierra[a], para ir contra los que han devastado nuestra tierra y han asolado muchas ciudades en el reino[b].
  to: Pero yo quiero salir por el territorio[a], para perseguir a los que han devastado nuestra tierra y han asolado muchas ciudades en el reino[b].
  rationale: Se ajusta «a recorrer la tierra» a «salir por el territorio» para reflejar con mayor precisión ἐκβῆναι κατὰ τὴν χώραν sin añadir un matiz interpretativo. Se cambia «ir contra» por «perseguir» para alinearse con la decisión principal documentada para μετέλθω, manteniendo en nota las alternativas hostiles admitidas. El resto del versículo se conserva porque es fiel, claro y natural en español.
