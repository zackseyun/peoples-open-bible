translation:
  language: es
  text: Y entró la criada, abriendo[a] la puerta,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la criada entró, habiendo abierto la puerta’. El participio griego ἀνοίξασα expresa una acción precedente al verbo principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Y además
  lexicon: BDAG
  rationale: Conserva la unión narrativa simple del griego; en español, 'Y' reproduce de manera natural la continuidad de la escena.
- source_word: εἰσῆλθεν
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - ingresó
  - se metió
  lexicon: BDAG
  rationale: Aoristo de εἰσέρχομαι en un relato; 'entró' es el equivalente más directo y natural en español.
- source_word: ἡ παιδίσκη
  english_pob_choice: the maidservant
  chosen_spanish: la criada
  alternatives_spanish:
  - la sirvienta
  - la muchacha sirvienta
  lexicon: BDAG
  rationale: παιδίσκη puede designar a una joven esclava o sirvienta femenina. 'Criada' comunica bien el rango doméstico en español sin sonar forzado; evita un registro excesivamente arcaico y mantiene la referencia a una mujer de servicio.
- source_word: ἀνοίξασα
  english_pob_choice: opening
  chosen_spanish: abriendo
  alternatives_spanish:
  - habiendo abierto
  - después de abrir
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción concomitante o anterior respecto del verbo principal. 'Abriendo' sigue de cerca la revisión inglesa y no añade una secuencia temporal más fuerte de la que el griego exige.
- source_word: τὴν θύραν
  english_pob_choice: the door
  chosen_spanish: la puerta
  alternatives_spanish:
  - la entrada
  - el portón
  lexicon: BDAG
  rationale: θύρα suele significar 'puerta' en este contexto doméstico; 'puerta' es la opción natural y precisa en español.
translation_notes:
  revision_awareness: El inglés POB revisó 'after opening' a 'opening' para reflejar el participio con mayor cercanía y sin imponer un matiz temporal extra. La redacción española sigue esa revisión y mantiene la misma cautela exegética.
  spanish_consistency_notes:
  - Se evitó 'sierva' porque en este contexto doméstico 'criada' comunica mejor la función servicial sin cargar innecesariamente el tono teológico.
  - Se conservó el orden narrativo con 'Y entró...', que suena natural en español y refleja la simple continuidad del griego.
  - La nota al pie marca la alternativa participial porque el griego puede entenderse como acción previa o concomitante; la traducción principal opta por la forma más fluida en español.
