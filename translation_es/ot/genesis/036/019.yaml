translation:
  language: es
  text: Estos son los hijos de Esaú[a], y estos son sus jefes. Él es Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus caudillos». El hebreo אַלּוּפִים se refiere a cabezas de clan o jefes tribales en Edom.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Éstos son
  - Estos eran
  lexicon: HALOT
  rationale: La fórmula genealógica hebrea es una presentación de identificación; en español, «Estos son» suena natural y conserva el valor demostrativo sin volverlo interpretativo.
- source_word: בְנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos varones de
  lexicon: HALOT
  rationale: En este contexto genealógico, «hijos de» reproduce con fidelidad la relación de descendencia. «Descendientes de» sería más amplio, pero diluye la formulación concreta del hebreo.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esav
  lexicon: propio_name
  rationale: 'Nombre propio transliterado de forma estándar al español bíblico: «Esaú».'
- source_word: אַלּוּפֵיהֶם
  english_pob_choice: their chiefs
  chosen_spanish: sus jefes
  alternatives_spanish:
  - sus caudillos
  - sus chieftains
  - sus líderes
  lexicon: HALOT
  rationale: אַלּוּף designa cabezas de clan o jefes tribales en Edom. «Jefes» conserva esa función social de manera clara en español; «caudillos» o «líderes» serían más cargados o más modernos.
- source_word: הוּא
  english_pob_choice: He is
  chosen_spanish: Él es
  alternatives_spanish:
  - Es
  - Él es decir
  lexicon: HALOT
  rationale: El pronombre retoma a Esaú e identifica a Edom. «Él es» mantiene el vínculo personal del hebreo con una sintaxis natural en español.
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  alternatives_spanish:
  - Idumea
  lexicon: proper_name
  rationale: Se conserva el nombre propio «Edom», que es la forma usual y más fiel al contexto bíblico.
translation_notes:
  revision_awareness: El texto en inglés del POB fue revisado recientemente y se mantiene sin cambios; la versión española sigue de cerca esa lectura, pero con ajuste natural al español bíblico en la fórmula genealógica.
  spanish_consistency_notes:
  - Se mantiene la transliteración «Esaú» y «Edom» para los nombres propios.
  - «Jefes» conserva el matiz de autoridad tribal sin introducir terminología eclesiástica ajena al texto.
  - La nota al pie preserva la alternativa léxica documentada en el audit trail inglés.
