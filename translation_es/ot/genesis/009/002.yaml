translation:
  language: es
  text: Y el temor de ustedes[a] y el pavor de ustedes estará sobre todo animal de la tierra, y sobre toda ave de los cielos[b], sobre todo lo que se arrastra sobre el suelo, y sobre todos los peces del mar; en sus manos[c] han sido entregados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su temor y su pavor».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los cielos»; también puede traducirse «el cielo».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «en sus manos han sido entregados», un modismo que expresa que han sido puestos bajo su poder o control.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹרַאֲכֶם
  english_pob_choice: the fear of you
  chosen_spanish: el temor de ustedes
  alternatives_spanish:
  - su temor
  - el miedo de ustedes
  lexicon: HALOT
  rationale: מוֹרָא expresa temor o terror inspirado por alguien. En español, 'el temor de ustedes' conserva la relación genitiva y la fuerza formal del hebreo mejor que un giro más libre como 'su temor'.
- source_word: חִתְּכֶם
  english_pob_choice: the dread of you
  chosen_spanish: el pavor de ustedes
  alternatives_spanish:
  - su pavor
  - el terror de ustedes
  lexicon: HALOT
  rationale: חִתָּה/חַת intensifica la idea de miedo con sentido de espanto o pavor. 'Pavor' permite distinguirlo de 'temor' y mantener el paralelismo intensivo.
- source_word: יִהְיֶה
  english_pob_choice: shall be
  chosen_spanish: estará
  alternatives_spanish:
  - será
  - habrá
  lexicon: HALOT
  rationale: El imperfecto hebreo aquí presenta un estado resultante en esta declaración divina. 'Estará' suena natural en español y conserva el valor de estado permanente sin añadir matices ajenos.
- source_word: חַיַּת הָאָרֶץ
  english_pob_choice: every beast of the earth
  chosen_spanish: todo animal de la tierra
  alternatives_spanish:
  - toda bestia de la tierra
  - todo animal salvaje de la tierra
  lexicon: HALOT
  rationale: חַיָּה en este contexto designa animales terrestres. 'Animal de la tierra' es claro y no restringe indebidamente a animales salvajes, aunque 'bestia' permanece como alternativa más formal.
- source_word: עוֹף הַשָּׁמַיִם
  english_pob_choice: every bird of the heavens
  chosen_spanish: toda ave de los cielos
  alternatives_spanish:
  - toda ave del cielo
  - todo ser alado de los cielos
  lexicon: HALOT
  rationale: עוף puede abarcar criaturas voladoras, pero 'ave' es la opción contextual normal. 'Cielos' conserva más directamente שָׁמַיִם que 'cielo' singular, aunque ambas serían posibles en español.
- source_word: בְּכֹל אֲשֶׁר תִּרְמֹשׂ הָאֲדָמָה
  english_pob_choice: on everything that creeps on the ground
  chosen_spanish: sobre todo lo que se arrastra sobre el suelo
  alternatives_spanish:
  - sobre todo lo que se arrastra sobre la tierra
  - sobre todo lo que repta sobre el suelo
  lexicon: HALOT
  rationale: רמשׂ describe criaturas que se desplazan arrastrándose o reptando. 'Se arrastra sobre el suelo' comunica la imagen concreta y mantiene una distinción útil entre הָאָרֶץ ('tierra') y הָאֲדָמָה ('suelo').
- source_word: דְּגֵי הַיָּם
  english_pob_choice: all the fish of the sea
  chosen_spanish: todos los peces del mar
  alternatives_spanish:
  - todo pez del mar
  - todos los peces del mar
  lexicon: HALOT
  rationale: La construcción constructa denota peces del mar en sentido colectivo. 'Todos los peces del mar' reproduce bien el alcance distributivo del hebreo.
- source_word: בְּיֶדְכֶם
  english_pob_choice: into your hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en vuestra mano
  - bajo su poder
  lexicon: HALOT
  rationale: El hebreo usa la idiomática 'en/into la mano' para indicar entrega o control. 'En su mano' conserva la metáfora con naturalidad en español y evita una explicación interpretativa excesiva.
- source_word: נִתָּנוּ
  english_pob_choice: they are given
  chosen_spanish: les son dados
  alternatives_spanish:
  - les han sido dados
  - son entregados
  lexicon: HALOT
  rationale: La forma pasiva expresa un estado de ser puestos a disposición. 'Les son dados' mantiene el pasivo y el tono solemne sin forzar un perfecto perifrástico.
theological_decisions:
- issue: Dominio humano sobre los animales en el contexto postdiluviano
  english_pob_reading: The verse states that animals are placed under human power and will fear humans, without expanding this into a broader doctrinal claim beyond the text.
  chosen_spanish_reading: El verso afirma que los animales quedan entregados a la esfera de control humano y que temerán al ser humano, sin ampliar esto a una doctrina más amplia que exceda el texto.
  alternative_spanish_readings:
  - Los animales estarán sujetos a ustedes.
  - La creación se someterá al ser humano.
  rationale: La expresión 'en su mano les son dados' conserva la metáfora de control sin convertirla en una paráfrasis doctrinal. Esto mantiene la tensión textual y evita sobreinterpretar el mandato o la relación humano-animales.
  doctrine_reference: Poética textual y principios de equivalencia óptima de la POB
- issue: Elección de 'cielos' para שָׁמַיִם
  english_pob_reading: Hebrew 'the heavens'; also translated 'the sky.'
  chosen_spanish_reading: Se traduce 'los cielos' para reflejar más directamente שָׁמַיִם, sin excluir que en español también podría decirse 'el cielo'.
  alternative_spanish_readings:
  - el cielo
  - el firmamento
  rationale: '''Cielos'' preserva mejor el plural hebreo y la textura bíblica, mientras que ''cielo'' en singular puede sonar más idiomático pero menos transparente al original.'
  doctrine_reference: Convención lexical de la POB para שָׁמַיִם
translation_notes:
  revision_awareness: La revisión inglesa más reciente quedó sin cambios; el acuerdo general fue alto y solo hubo observaciones menores. Esta versión española sigue el mismo trazado lexical sin introducir expansiones interpretativas nuevas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se preserva el paralelismo 'temor / pavor' para reflejar la duplicación hebrea.
  - Se conserva la metáfora de 'mano' como idiomática de poder o control.
  - Se evita 'SEÑOR' como sustituto del nombre divino porque no aparece en este verso.
