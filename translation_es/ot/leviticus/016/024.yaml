review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia ritual del hebreo: lavar el cuerpo/carne con agua, en un lugar santo, ponerse las vestiduras, salir, ofrecer su holocausto y el del pueblo, y realizar כפר por sí mismo y por el pueblo. Sin embargo, hay dos desajustes importantes con el audit trail inglés: (1) la nota [c] no corresponde al texto principal, porque ofrece como alternativa ''hará expiación'' cuando esa ya es la lectura principal; y (2) el inglés POB eligió ''make atonement'' como lectura principal de כפר, mientras el español cambia a ''hará expiación'' sin necesidad suficiente. Además, la puntuación con punto y coma antes de ''y hará…'' rompe innecesariamente la fluidez de la coordinación hebrea.'
  spanish_quality_summary: El español es en general claro y digno, con buen registro cultual. No obstante, 'se pondrá sus vestiduras' suena menos natural que 'se pondrá sus vestiduras' en muchos dialectos, pero sigue siendo aceptable; aun así, la estructura global mejora si se elimina el punto y coma. El resto del verso lee con naturalidad e inteligibilidad eclesial amplia.
  glossary_alignment: 'No hay términos de glosario mayores en conflicto salvo כפר. Dado el audit trail y la filosofía POB, conviene mantener en el texto principal ''hará expiación'' o ''hará atonement'' solo si estuviera ya documentado; en español bíblico natural, la mejor correspondencia estable de ''make atonement'' aquí es ''hará expiación'' o ''hará reconciliación ritual'', pero como la nota inglesa preserva ''make expiation'' como alternativa, el español no debe convertir esa alternativa en principal y luego repetirla en nota. La mejor reparación es usar ''hará expiación'' como principal solo si la nota cambia a alternativas reales; pero para seguir más de cerca el inglés POB auditado, prefiero ''hará expiación'' reemplazado por ''hará expiación'' no resuelve el problema. La opción más fiel al audit trail en español es ''hará expiación'' como principal con nota alternativa ''O: "hará propiciación" o, en algunos contextos rituales, "purificará"'' o, mejor aún, ''hará expiación'' principal
    y quitar la redundancia. Sin embargo, dado que el inglés principal es ''make atonement'', la forma española más alineada es ''hará expiación'' por uso bíblico estándar. El problema real es la nota, no necesariamente el término principal. También debe corregirse la asignación de marcadores para que [c] ancle a כפר.'
  issues:
  - severity: high
    issue: La nota [c] repite exactamente la lectura principal 'hará expiación'.
    rationale: Una nota de alternativa léxica no puede ofrecer como alternativa la misma redacción usada en el texto. Esto invalida la utilidad de la nota y desajusta el rastro de auditoría.
  - severity: medium
    issue: El anclaje y orden de notas [c][b] en 'del pueblo[c][b]' es incorrecto para el contenido de las notas.
    rationale: La nota sobre כפר debe anclarse al verbo 'hará expiación', no a 'del pueblo'. La nota sobre 'un lugar santo' debe anclarse allí. El orden actual puede confundir al lector y no sigue la ubicación semántica adecuada.
  - severity: low
    issue: El punto y coma antes de 'y hará expiación' es innecesario.
    rationale: El hebreo coordina la acción de forma continua; en español, una simple coma mantiene mejor la fluidez y la secuencia procedimental.
  revised_spanish_text: Lavará su cuerpo con agua en un lugar santo[a], se pondrá sus vestiduras, saldrá y ofrecerá su holocausto y el holocausto del pueblo, y hará expiación[c] por sí mismo y por el pueblo.
  revised_footnotes:
  - marker: a
    text: 'O: "su carne" en lugar de "su cuerpo".'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "en un lugar santo", no necesariamente "en el Lugar Santo" (la cámara interior del santuario).'
    reason: lexical_alternative
  - marker: c
    text: 'O: "hará propiciación" o, en algunos contextos rituales, "purificará".'
    reason: lexical_alternative
  revision_rationale: Se corrige la nota redundante de כפר para que ofrezca alternativas reales, se elimina el anclaje erróneo [c][b] sobre 'del pueblo', y se suaviza la puntuación. El texto principal se conserva muy cerca del borrador porque su sentido básico es fiel al hebreo y legible en español. La nota [b] no se conserva porque, si se incluye, debe anclarse en el texto; como la tarea pide marcadores exactos presentes en `spanish_text`, se omite aquí para evitar inconsistencias. Si se desea preservar explícitamente esa nota del audit trail inglés, habría que insertar [b] tras 'lugar santo' y renumerar en orden.
