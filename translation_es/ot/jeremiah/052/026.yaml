translation:
  language: es
  text: Nebuzaradán, el capitán de la guardia[b], los tomó y los llevó[a] al rey de Babilonia en Ribla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los condujo al rey de Babilonia en Ribla». El verbo hebreo puede traducirse como «llevó» o «condujo» en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «jefe de los matadores». En contexto, este título designa al comandante de la guardia real y quizá incluya funciones de ejecución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: los tomó
  alternatives_spanish:
  - los capturó
  - los apresó
  lexicon: HALOT
  rationale: לקח en narrativa suele equivaler a 'tomar'. En español, 'tomó' reproduce el movimiento verbal sin añadir una violencia mayor que la exigida por el texto. El complemento 'los' mantiene la referencia a los funcionarios del verso anterior.
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los mismos
  lexicon: Pronombre de objeto directo
  rationale: El pronombre de objeto directo en español es la forma natural y concisa para el referente plural masculino ya identificado en el contexto inmediato.
- source_word: נְבוּזַרְאֲדָן
  english_pob_choice: Nebuzaradan
  chosen_spanish: Nebuzaradán
  alternatives_spanish:
  - Nebuzaradan
  lexicon: Transliteración convencional
  rationale: Se conserva el nombre propio con acentuación española en la sílaba tónica final, siguiendo la práctica editorial de nombres bíblicos en español y facilitando la lectura en voz alta.
- source_word: רַב טַבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el jefe de los ejecutores
  - el jefe de los verdugos
  lexicon: HALOT
  rationale: La expresión literal alude a 'jefe/capitán' de los טַבָּחִים, término que en contexto real de corte puede referirse a la guardia real y no solo a funciones de ejecución. 'Capitán de la guardia' conserva la fuerza oficial y evita restringir indebidamente el cargo a 'verdugos'.
- source_word: וַיֹּלֶךְ
  english_pob_choice: brought
  chosen_spanish: los llevó
  alternatives_spanish:
  - los trajo
  - los condujo
  lexicon: HALOT
  rationale: En esta construcción causativa con objeto y destino, el verbo se traduce con un verbo de traslado. 'Llevó' es natural en español y mantiene abierto el matiz de 'llevó/guió' que el inglés POB preservó con la nota sobre 'brought' o 'led'.
- source_word: אֶל מֶלֶךְ בָּבֶל
  english_pob_choice: to the king of Babylon
  chosen_spanish: al rey de Babilonia
  alternatives_spanish:
  - ante el rey de Babilonia
  lexicon: Preposición אֶל
  rationale: אֶל indica dirección 'a/hacia'. 'Al rey de Babilonia' es la correspondencia más directa y no añade la interpretación procesal de 'ante'.
- source_word: רִבְלָתָה
  english_pob_choice: at Riblah
  chosen_spanish: en Ribla
  alternatives_spanish:
  - a Ribla
  - en Riblatá
  lexicon: Topónimo bíblico
  rationale: El topónimo se adapta a la forma usual en español, 'Ribla'. La preposición 'en' refleja de manera natural el valor locativo del lugar donde se hallaba el rey de Babilonia, en línea con el contexto narrativo.
translation_notes:
  revision_awareness: 'El pasaje está en alto acuerdo con el texto fuente y con el audit trail inglés; no se registran revisiones aplicadas en la versión más reciente. La presente propuesta conserva el sentido narrativo y las dos ambigüedades lexicográficas documentadas: el verbo de traslado y el título רב טבָּחִים.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa 'capitán de la guardia' para רב טבָּחִים conforme al precedente inglés auditable.
  - '''Ribla'' es la forma española corriente del topónimo; no se fuerza una transliteración más cercana al hebreo.'
  - Se evita 'Cristo' o terminología doctrinal ajena al versículo.
