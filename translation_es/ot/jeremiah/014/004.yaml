translation:
  language: es
  text: Porque la tierra está consternada[a], ya que no ha habido lluvia en la tierra, los labradores están avergonzados[b]; se cubren la cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la tierra está quebrada' o 'agrietada'. El verbo hebreo puede denotar estar quebrada o consternada; en este contexto de sequía probablemente alude a la tierra abierta por las grietas.
    reason: lexical_alternative
  - marker: b
    text: Cubrirse la cabeza es un gesto cultural de vergüenza, duelo o luto.
    reason: cultural_note
lexical_decisions:
- source_word: בַּעֲבוּר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - A causa de
  - Debido a que
  lexicon: HALOT
  rationale: Introduce la causa de la condición siguiente con una forma natural en español y equivalente a la causalidad del hebreo.
- source_word: הָאֲדָמָה
  english_pob_choice: the ground
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - el terreno
  lexicon: HALOT
  rationale: En este contexto profético de sequía, 'la tierra' comunica bien el ámbito agrícola y el efecto sobre la superficie cultivada sin sonar técnico o limitado.
- source_word: חַתָּה
  english_pob_choice: is dismayed
  chosen_spanish: está desolada
  alternatives_spanish:
  - está consternada
  - está quebrantada
  - está deshecha
  lexicon: HALOT
  rationale: La POB inglesa conservó la tensión del verbo hebreo entre quebranto físico y desánimo. En español, 'desolada' preserva ese campo semántico de devastación/abatimiento y funciona de manera natural en el contexto de sequía, sin reducirlo solo a una grieta física.
- source_word: כִּי
  english_pob_choice: since
  chosen_spanish: ya que
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: Mantiene la relación explicativa del hebreo y evita una repetición mecánica de 'porque' en la segunda causal.
- source_word: גֶשֶׁם
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - precipitación
  - agua de lluvia
  lexicon: HALOT
  rationale: Es la equivalencia directa y clara para la falta de lluvia mencionada en el verso.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en el país
  alternatives_spanish:
  - en la tierra
  - en la región
  lexicon: HALOT
  rationale: '''País'' suena natural en español para un territorio nacional bajo juicio y conserva el referente geográfico del hebreo sin volverlo demasiado abstracto.'
- source_word: בֹּשׁוּ
  english_pob_choice: are ashamed
  chosen_spanish: están avergonzados
  alternatives_spanish:
  - están llenos de vergüenza
  - son avergonzados
  - están confundidos
  lexicon: HALOT
  rationale: Expresa bien la vergüenza pública del contexto; en español pasivo-reflexivo o adjetival sería menos fluido aquí.
- source_word: אִכָּרִים
  english_pob_choice: the farmers
  chosen_spanish: los labradores
  alternatives_spanish:
  - los campesinos
  - los agricultores
  lexicon: HALOT
  rationale: '''Labradores'' conserva una sonoridad bíblica adecuada y refleja con precisión a quienes trabajan la tierra; ''agricultores'' sería más moderno pero menos evocador del paralelismo poético.'
- source_word: חָפוּ רֹאשָׁם
  english_pob_choice: they cover their heads
  chosen_spanish: cubren su cabeza
  alternatives_spanish:
  - cubren la cabeza
  - se cubren la cabeza
  - ponen la cabeza cubierta
  lexicon: HALOT
  rationale: Mantiene la imagen idiomática del hebreo. Se opta por una formulación sobria que permita la nota cultural sobre el gesto de vergüenza/duelo sin convertirlo en una interpretación explícita en el texto principal.
theological_decisions:
- issue: Sentido de חַתָּה aplicado a la tierra
  english_pob_reading: The ground is dismayed / cracked; the footnote preserves the lexical range and drought context.
  chosen_spanish_reading: La tierra está desolada, con la posibilidad de entender un quebranto físico o una devastación figurada.
  alternative_spanish_readings:
  - La tierra está quebrada
  - La tierra está agrietada
  - La tierra está consternada
  rationale: El hebreo permite tanto la idea de quebranto físico como la de abatimiento. Dado que la POB inglesa mantuvo la tensión y añadió una nota, el español usa 'desolada' para conservar la amplitud semántica y dejar abierta la posibilidad de que el suelo esté roto por la sequía sin cerrar el sentido a una sola imagen.
  doctrine_reference: No doctrinal issue; lexical/thematic tension in poetic prophecy.
- issue: Cobrir la cabeza como gesto cultural
  english_pob_reading: Covering the head is a cultural sign of shame, grief, or mourning.
  chosen_spanish_reading: Cubrirse la cabeza se entiende como gesto cultural de vergüenza y luto, no como un mero acto físico.
  alternative_spanish_readings:
  - cubren su cabeza
  - se cubren la cabeza
  - se cubren la cabeza en señal de vergüenza
  rationale: La acción final es idiomática y requiere nota cultural para evitar una lectura literalista. El texto principal conserva la imagen, y la nota explica su valor social y emocional.
  doctrine_reference: No doctrinal issue; cultural idiom in prophetic lament.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió 'dismayed' frente a 'cracked' para חַתָּה, manteniendo a la vez la tensión lexical en la nota. La versión española conserva esa misma amplitud semántica con 'desolada' y mantiene la secuencia causal y la imagen cultural del gesto final.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como término por defecto en el proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - Se preserva la imagen idiomática de cubrir la cabeza en lugar de sustituirla por una explicación en el texto principal.
  - '''Labradores'' se eligió por su adecuación bíblica y claridad; no introduce una lectura doctrinal distinta de ''agricultores''.'
  - 'La puntuación refleja la relación causal doble del hebreo: causa general y explicación inmediata.'
