    text: Or 'takes'; the Hebrew verb can mean 'captures' or 'seizes,' but here it refers to the tribe, clan, or household indicated by the LORD, likely through sacred lot.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'man by man,' specifying the final identification at the level of individual males within the household.
    reason: lexical_alternative
