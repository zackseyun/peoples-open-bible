  to: Y después de haber soportado esta muerte[a], digna de ser cantada, el tercero fue hecho pasar[b], siendo muy instado por muchos a salvarse al probarla.
  rationale: Se ajusta ligeramente el texto para reflejar mejor el matiz contextual de ἤγετο ('fue hecho pasar') y el doble énfasis de παρακαλούμενος πολλὰ ὑπὸ πολλῶν ('siendo muy instado por muchos'). También se simplifica la nota b para alinearla con la aclaración inglesa sin añadir detalles interpretativos innecesarios.
