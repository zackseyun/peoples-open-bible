translation:
  language: es
  text: Permanezca su nombre para siempre; delante del sol[a], permanezca[b] su nombre. Sean bendecidas en él[c] todas las naciones; llámenlo bienaventurado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «mientras dure el sol». El hebreo dice más literalmente: «delante del sol».'
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo es raro y puede sugerir también «florezca», «aumente» o «se propague».
    reason: lexical_alternative
  - marker: c
    text: O «que todas las naciones se bendigan por él». La forma hebrea puede entenderse de modo reflexivo.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהִי
  english_pob_choice: May ... endure
  chosen_spanish: Permanezca
  alternatives_spanish:
  - Sea
  - Que permanezca
  lexicon: HALOT
  rationale: El jussivo expresa deseo o súplica; en español, «Permanezca» conserva el valor optativo sin sonar forzado. Mantiene mejor la idea de continuidad del nombre que un simple «sea».
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su fama
  - su renombre
  lexicon: HALOT
  rationale: «Nombre» reproduce el sustantivo hebreo y deja abierta la carga de identidad, reputación y memoria real sin reducirla a mera fama.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por siempre
  lexicon: HALOT
  rationale: «Para siempre» es la equivalencia natural en español para duración perpetua y conserva el sentido temporal sin sobreinterpretar.
- source_word: לִפְנֵי שֶׁמֶשׁ
  english_pob_choice: before the sun
  chosen_spanish: delante del sol
  alternatives_spanish:
  - antes del sol
  - ante el sol
  lexicon: HALOT
  rationale: Se conserva la imagen literal de la frase hebrea. «Delante del sol» es idiomático en español bíblico y respeta la ambigüedad entre localización poética y duración temporal.
- source_word: ינין
  english_pob_choice: continue
  chosen_spanish: permanezca
  alternatives_spanish:
  - florezca
  - aumente
  - se propague
  lexicon: HALOT
  rationale: El verbo es raro y admite matices de continuar, florecer o propagarse. En español, repetir «permanezca» equilibra el paralelismo con el primer hemistiquio y evita especificar indebidamente el matiz.
- source_word: וְיִתְבָּרְכוּ בוֹ
  english_pob_choice: May all nations be blessed in him
  chosen_spanish: Sean bendecidas en él
  alternatives_spanish:
  - Bendígase a sí mismas por él
  - Encuentren bendición en él
  lexicon: HALOT
  rationale: La forma hitpael puede entenderse reflexivamente o como pasiva/media. «Sean bendecidas en él» preserva la bendición recibida y la resonancia abrahámica sin resolver de forma excesiva la tensión reflexiva.
- source_word: כָּל גּוֹיִם
  english_pob_choice: all nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todas las gentes
  lexicon: HALOT
  rationale: «Naciones» es la correspondencia más estable para גּוֹיִם en este contexto universal y conserva el alcance mundial del verso.
- source_word: יְאַשְּׁרוּהוּ
  english_pob_choice: may they call him blessed
  chosen_spanish: díganlo bienaventurado
  alternatives_spanish:
  - llámenlo dichoso
  - declárenlo bendito
  lexicon: HALOT
  rationale: El piel de אשר significa declarar a alguien feliz/bienaventurado. «Díganlo bienaventurado» suena un poco más literal y bíblico que una paráfrasis más libre, manteniendo el acto de pronunciar una valoración sobre él.
theological_decisions:
- issue: Alcance real y mesiánico del salmo
  english_pob_reading: Translate in a way that preserves both immediate royal reference and broader messianic resonance without making an explicit christological identification in the text.
  chosen_spanish_reading: Traducir de modo que quede preservado tanto el referente real inmediato como la resonancia mesiánica más amplia, sin introducir una identificación cristológica explícita en el texto.
  alternative_spanish_readings:
  - Tratar el verso solo como alabanza hiperbólica al rey histórico
  - Presentarlo como profecía directamente y de manera exclusiva mesiánica
  rationale: El Salmo 72 mantiene una tensión interpretativa que conviene no resolver en la traducción. La redacción española conserva esa amplitud, especialmente al mantener la bendición universal de las naciones y la imagen de permanencia del nombre.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Lectura de וְיִתְבָּרְכוּ בוֹ
  english_pob_reading: Or 'may all nations bless themselves by him.' The Hebrew form can be understood reflexively.
  chosen_spanish_reading: «Sean bendecidas en él» con nota de alternativa reflexiva.
  alternative_spanish_readings:
  - Bendígense por él
  - Bendígense a sí mismas por él
  - Sean bendecidas por él
  rationale: El hebreo permite una lectura reflexiva, pero la formulación española más clara y natural es la pasiva/media. La nota preserva la posibilidad reflexiva sin sobrecargar el verso principal.
  doctrine_reference: HALOT; Affirmations
- issue: Imagen temporal de לִפְנֵי שֶׁמֶשׁ
  english_pob_reading: The Hebrew reads more literally, 'before the sun.'
  chosen_spanish_reading: Conservar «delante del sol» y anotar que también puede entenderse «mientras dure el sol».
  alternative_spanish_readings:
  - mientras dure el sol
  - antes del sol
  rationale: La traducción principal mantiene la imagen hebrea; la nota recoge el valor temporal probable sin reemplazar el hebraísmo en el cuerpo del texto.
  doctrine_reference: HALOT; Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se aplicaron cambios posteriores; se mantuvo el equilibrio entre literalidad y claridad ya validado por el audit trail inglés.'
  spanish_consistency_notes:
  - Se preserva «nombre» para שֵׁם por coherencia bíblico-poética.
  - Se mantiene «naciones» para גּוֹיִם en sentido universal.
  - Se usa una solución verbal optativa en español («Permanezca») para reflejar el jussivo hebreo.
  - Se conserva la imagen de «delante del sol» con nota explicativa, evitando borrar la tensión poética del hebreo.
  - La bendición universal se formula en pasiva/media para no cerrar indebidamente la alternativa reflexiva documentada.
