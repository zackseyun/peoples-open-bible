translation:
  language: es
  text: Porque los hombres de la tierra que estaban antes que ustedes hicieron todas estas abominaciones[a], y la tierra quedó impura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la tierra fue profanada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o explicación del juicio precedente. «Porque» conserva la función explicativa de כִּי en un español natural y fiel.
- source_word: כָּל הַתּוֹעֵבֹת הָאֵל
  english_pob_choice: all these abominations
  chosen_spanish: todas estas abominaciones
  alternatives_spanish:
  - todos estos actos abominables
  - todas estas cosas detestables
  lexicon: HALOT
  rationale: «Abominaciones» mantiene la fuerza moral y covenantal del hebreo תּוֹעֵבֹת y el demostrativo plural «estas» reproduce הָאֵל.
- source_word: עָשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - cometieron
  - practicaron
  lexicon: HALOT
  rationale: El verbo básico עשה es simplemente «hacer»; en español, «hicieron» conserva la amplitud del original sin introducir una carga más técnica que el hebreo no exige.
- source_word: אַנְשֵׁי הָאָרֶץ
  english_pob_choice: the men of the land
  chosen_spanish: los hombres de la tierra
  alternatives_spanish:
  - los habitantes de la tierra
  - la gente de la tierra
  lexicon: HALOT
  rationale: Se conserva el masculino plural literal de אַנְשֵׁי. «Tierra» traduce הָאָרֶץ aquí como territorio, y «hombres» evita neutralizar sin base textual.
- source_word: אֲשֶׁר לִפְנֵיכֶם
  english_pob_choice: who were before you
  chosen_spanish: que estaban antes que ustedes
  alternatives_spanish:
  - que precedían a ustedes
  - que estaban delante de ustedes
  lexicon: HALOT
  rationale: La cláusula relativa identifica a los pobladores anteriores en sentido temporal. «Estaban antes que ustedes» suena natural y conserva la relación histórica.
- source_word: וַתִּטְמָא
  english_pob_choice: became unclean
  chosen_spanish: quedó impura
  alternatives_spanish:
  - se volvió impura
  - se contaminó
  - quedó inmunda
  lexicon: HALOT
  rationale: טמא expresa el resultado de impureza/contaminación. «Quedó impura» comunica el estado resultante de forma sobria; «impura» mantiene la categoría ritual-moral sin reducirla a una sola esfera.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En este contexto la referencia es al territorio habitado antes de Israel. «Tierra» es un equivalente bíblico claro y natural en español; «territorio» sería más técnico.
theological_decisions:
- issue: Relación entre pecado humano e impureza de la tierra
  english_pob_reading: the land became unclean
  chosen_spanish_reading: la tierra quedó impura
  alternative_spanish_readings:
  - la tierra fue profanada
  - la tierra fue contaminada
  - la tierra fue defilada
  rationale: 'La formulación preserva la tensión teológica del texto: las acciones humanas producen un estado de impureza en la tierra. «Quedó impura» evita forzar el matiz exclusivamente ritual o exclusivamente metafórico.'
  doctrine_reference: 'Mantener la tensión fuente: impureza moral/ritual vinculada al pecado y a la tierra.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al término relevante en el texto y evitando una nota sin marcador. La redacción española sigue de cerca el hebreo y el audit trail inglés, sin mecanizarse.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece el nombre divino en el texto fuente.
  - Se conservó el plural masculino «hombres» según אַנְשֵׁי, en lugar de neutralizarlo.
  - «Impura» mantiene el campo semántico de טמא sin decidir entre lectura ritual o moral.
