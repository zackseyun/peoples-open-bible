translation:
  language: es
  text: no como el pacto que hice con sus padres el día en que los tomé de la mano para sacarlos de la tierra de Egipto, mi pacto que ellos mismos quebrantaron, aunque yo era su esposo[a], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aunque yo era su señor» o «aunque yo gobernaba sobre ellos». El verbo hebreo puede tener lenguaje matrimonial o de dominio; la forma griega citada en Hebreos 8:9 refleja el segundo sentido.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא כַ/בְּרִית
  english_pob_choice: not like the covenant
  chosen_spanish: no como el pacto
  alternatives_spanish:
  - no según el pacto
  - no al modo del pacto
  lexicon: HALOT
  rationale: El prefijo comparativo כ requiere una comparación, no una simple negación. En español, 'no como' comunica de manera natural esa relación comparativa sin perder precisión. 'Pacto' conserva el término bíblico de alianza convenida.
- source_word: כָּרַ֨תִּי
  english_pob_choice: I made
  chosen_spanish: hice
  alternatives_spanish:
  - corté
  - establecí
  lexicon: HALOT
  rationale: La expresión hebrea 'cortar un pacto' suele equivaler a 'hacer un pacto'. 'Hice' suena natural en español y mantiene el valor idiomático sin explicar la metáfora de forma pesada.
- source_word: אֶת אֲבוֹתָ֔/ם
  english_pob_choice: with their fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  lexicon: HALOT
  rationale: Aunque el hebreo marca el objeto directo, el idioma de pacto exige en español la preposición 'con'. 'Padres' reproduce con mayor fidelidad el lenguaje histórico-familiar del texto que 'antepasados'.
- source_word: בְּ/יוֹם הֶחֱזִיקִ֣/י בְ/יָדָ֔/ם
  english_pob_choice: on the day I took them by the hand
  chosen_spanish: el día en que los tomé de la mano
  alternatives_spanish:
  - el día que los agarré de la mano
  - cuando los tomé de la mano
  lexicon: HALOT
  rationale: La forma causativa con 'mano' expresa una acción de guía y sujeción afectuosa. 'Tomé de la mano' conserva esa imagen de manera idiomática y comprensible en español.
- source_word: לְ/הוֹצִיאָ֖/ם מֵ/אֶ֖רֶץ מִצְרָ֑יִם
  english_pob_choice: to bring them out of the land of Egypt
  chosen_spanish: para sacarlos de la tierra de Egipto
  alternatives_spanish:
  - para conducirlos fuera de la tierra de Egipto
  - para traerlos fuera de la tierra de Egipto
  lexicon: HALOT
  rationale: En contextos de éxodo, 'sacar' reproduce bien el valor de la forma causativa y su resonancia redentora. 'Tierra de Egipto' mantiene la fórmula bíblica solemne.
- source_word: אֲשֶׁר הֵ֜מָּה הֵפֵ֣רוּ
  english_pob_choice: that they themselves broke
  chosen_spanish: que ellos mismos quebrantaron
  alternatives_spanish:
  - que quebrantaron
  - que ellos violaron
  lexicon: HALOT
  rationale: '''הֵמָּה'' es enfático; ''ellos mismos'' conserva ese énfasis. ''Quebrantar'' es un equivalente fuerte y bíblicamente reconocible para violar un pacto, sin suavizar el acto.'
- source_word: בְּרִיתִ֗/י
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  lexicon: HALOT
  rationale: '''Pacto'' es el término elegido para ברית y preserva el lenguaje jurídico-relacional. ''Mi'' mantiene el énfasis posesivo del hebreo.'
- source_word: וְ/אָנֹכִ֛י
  english_pob_choice: though I
  chosen_spanish: aunque yo
  alternatives_spanish:
  - y yo
  - mientras yo
  lexicon: HALOT
  rationale: La partícula y el pronombre enfático introducen contraste. 'Aunque yo' expresa mejor esa oposición frente a la infidelidad del pueblo.
- source_word: בָּעַ֥לְתִּי בָ֖/ם
  english_pob_choice: was their husband
  chosen_spanish: fui su esposo
  alternatives_spanish:
  - fui su señor
  - los dominé
  lexicon: HALOT
  rationale: El verbo בעל permite lenguaje matrimonial o de dominio. El sentido marital es el más natural en el contexto profético y conserva la metáfora relacional sin neutralizarla. Se deja constancia de la alternativa de dominio porque el texto hebreo y la tradición citada en Hebreos 8:9 abren esa posibilidad.
- source_word: נְאֻם יְהוָֽה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ''Yahvé''. ''Declara'' conserva el tono profético formular.'
theological_decisions:
- issue: Sentido de בָּעַלְתִּי בָם
  english_pob_reading: though I was their husband
  chosen_spanish_reading: aunque yo fui su esposo
  alternative_spanish_readings:
  - aunque yo era su señor
  - aunque yo gobernaba sobre ellos
  rationale: El hebreo masorético permite naturalmente una metáfora matrimonial, coherente con el lenguaje profético del pacto. La traducción española mantiene ese sentido, y deja abierta la lectura de dominio en la documentación porque esa tensión es relevante y no debe resolverse en silencio, especialmente en relación con la cita de Hebreos 8:9.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica); criterio POB para lecturas alternativas documentadas
- issue: Representación del nombre divino יהוה
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - declara el SEÑOR
  - declara Jehová
  rationale: Se usa 'Yahvé' como transliteración directa del Nombre divino, conforme al criterio del proyecto. Esto evita sustituir el nombre por un título y mantiene la identidad personal del Dios del pacto.
  doctrine_reference: Contested terms table for יהוה; direct-name rendering policy
translation_notes:
  revision_awareness: Se ha seguido la revisión más reciente del texto inglés auditado, que eliminó el guion largo y mantuvo la cláusula final como una afirmación relacional ('their husband'). La versión española refleja esa decisión con una puntuación continua y conserva la tensión interpretativa del verbo בעל mediante nota alternativa.
  spanish_consistency_notes:
  - Se usa 'pacto' para ברית de manera consistente con el proyecto, no 'alianza', salvo decisión contextual explícita.
  - '''Yahvé'' se mantiene para יְהוָה conforme al estándar del proyecto.'
  - '''Español'' neutral y bíblico: se evita arcaísmo innecesario, pero se conserva solemnidad profética.'
  - La nota al pie está anclada en 'esposo[a]' porque allí surge la principal tensión lexical y teológica del versículo.
