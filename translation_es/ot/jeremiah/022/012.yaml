  rationale: La revisión corrige el matiz locativo de בִּמְקוֹם אֲשֶׁר con «donde», mejora la naturalidad verbal con «lo han desterrado» y ajusta la nota al pie a un español idiomático, manteniendo el sentido causativo de גלה y la fuerza final de exilio permanente.
