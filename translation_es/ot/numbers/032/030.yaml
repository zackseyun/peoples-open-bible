translation:
  language: es
  text: Pero si no cruzan armados con ustedes, entonces recibirán una heredad[a] entre ustedes en la tierra de Canaán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán establecidos entre ustedes en la tierra de Canaán». El verbo hebreo puede denotar quedar establecidos en posesión, no solo el acto de recibirla.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: El hebreo introduce la contraparte condicional de contraste respecto del versículo anterior; en español, «Pero si» preserva mejor ese matiz adversativo que un simple «si».
- source_word: לֹא
  english_pob_choice: do not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no lo harán
  - no cruzan
  lexicon: HALOT
  rationale: La negación modifica el verbo siguiente; en español se expresa de forma natural con «no» antes del verbo finito.
- source_word: יַעַבְרוּ
  english_pob_choice: cross over
  chosen_spanish: cruzan
  alternatives_spanish:
  - crucen
  - pasan
  lexicon: HALOT
  rationale: En este contexto geográfico y militar, «cruzar» comunica bien el paso al otro lado del Jordán. Se usa presente en español para reflejar la condición general del hebreo.
- source_word: חֲלוּצִים
  english_pob_choice: armed
  chosen_spanish: armados
  alternatives_spanish:
  - equipados para la guerra
  - en orden de batalla
  lexicon: HALOT
  rationale: El participio describe a hombres preparados para guerra. «Armados» conserva la fuerza militar de forma breve y natural en español.
- source_word: אִתְּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - con ustedes mismos
  - junto con ustedes
  lexicon: HALOT
  rationale: Expresa acompañamiento e inclusión en la marcha conjunta del pueblo. «Con ustedes» es la equivalencia más directa y clara en español.
- source_word: וְנֹאחֲזוּ
  english_pob_choice: then they shall receive property
  chosen_spanish: entonces recibirán una posesión
  alternatives_spanish:
  - entonces serán establecidos en posesión
  - entonces tomarán posesión
  lexicon: HALOT
  rationale: El verbo en nifal puede denotar quedar establecido en posesión o recibir una heredad. «Recibirán una posesión» mantiene el sentido pasivo/resultativo que la POB inglesa decidió explicitar, sin borrar la tensión semántica con una sola lectura activa.
- source_word: בְּתֹכְכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - en su seno
  lexicon: HALOT
  rationale: La expresión señala ubicación dentro del conjunto del pueblo. «Entre ustedes» es natural en español y conserva la idea de inserción comunitaria.
- source_word: בְּאֶרֶץ כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en Canaán
  - en la tierra de Canaan
  lexicon: HALOT
  rationale: Se mantiene la expresión geográfica plena del hebreo. «Tierra» es la forma bíblica y clara en español para este contexto de repartición territorial.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo de Números 32:30 y el trazado auditado en inglés. Se conservó la ambigüedad léxica de וְנֹאחֲזוּ mediante una formulación pasiva/resultativa («recibirán una posesión») acorde con la decisión inglesa, sin convertirla en una simple acción activa. No se detectaron revisiones textuales adicionales en el paquete fuente; el estado más reciente indica que no hubo cambios necesarios.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando aparezca el tetragrámaton en otros registros; aquí no aparece.
  - Se mantiene un registro bíblico claro y moderno, evitando calcos innecesarios.
  - «Tierra de Canaán» sigue la convención geográfica del proyecto para expresiones de posesión territorial.
