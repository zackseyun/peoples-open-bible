translation:
  language: es
  text: Y se pusieron de pie los sacerdotes, ataviados, con músicos y trompetas[a]; y los levitas, hijos de Asaf, teniendo los címbalos, alabando a Yahvé y bendiciendo conforme a David, rey de Israel[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con instrumentos musicales y trompetas». El griego μουσικῶν puede entenderse de manera más general como acompañamiento musical o instrumentos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «según David, rey de Israel» o «a la manera de David, rey de Israel». El griego deja abierta la fuerza exacta de la conformidad.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔστησαν
  english_pob_choice: stood
  chosen_spanish: se pusieron de pie
  alternatives_spanish:
  - estuvieron de pie
  - se mantuvieron de pie
  lexicon: BDAG
  rationale: El aoristo describe una colocación ceremonial. En español, 'se pusieron de pie' conserva la acción puntual y resulta natural en el contexto litúrgico.
- source_word: ἐστολισμένοι
  english_pob_choice: arrayed
  chosen_spanish: vestidos ceremonialmente
  alternatives_spanish:
  - ataviados
  - vestidos
  - adornados
  lexicon: LSJ
  rationale: El participio indica estar dispuestos para servicio solemne. 'Vestidos ceremonialmente' comunica la función ritual sin añadir detalles de vestiduras que el griego no explicita.
- source_word: μετὰ μουσικῶν καὶ σαλπίγγων
  english_pob_choice: with musicians and trumpets
  chosen_spanish: con músicos y trompetas
  alternatives_spanish:
  - con instrumentos musicales y trompetas
  - con música y trompetas
  lexicon: LSJ
  rationale: Sigo la lectura auditada del POB inglés, donde μουσικῶν se entiende como músicos en este contexto ceremonial. 'Trompetas' mantiene la distinción del término separado y funciona de manera natural en español.
- source_word: Λευεῖται υἱοὶ Ἀσὰφ
  english_pob_choice: the Levites, the sons of Asaph
  chosen_spanish: los levitas, hijos de Asaf
  alternatives_spanish:
  - los levitas, los hijos de Asaf
  - los levitas, descendientes de Asaf
  lexicon: LSJ
  rationale: Conservo la identificación cultual y genealógica. 'Hijos de Asaf' es la forma más fiel y reconocible para el grupo levítico.
- source_word: ἔχοντες τὰ κύμβαλα
  english_pob_choice: holding the cymbals
  chosen_spanish: con los címbalos
  alternatives_spanish:
  - teniendo los címbalos
  - sosteniendo los címbalos
  lexicon: LSJ
  rationale: El participio sugiere que los llevaban o tenían en mano durante la acción. En español, 'con los címbalos' evita una repetición pesada y conserva el sentido instrumental-presencial.
- source_word: ὑμνοῦντες
  english_pob_choice: praising
  chosen_spanish: alabando
  alternatives_spanish:
  - cantando alabanzas
  - hymneando
  lexicon: BDAG
  rationale: '''Alabando'' expresa bien la acción de exaltar a Dios en canto o proclamación. Es más natural que un calco como ''hymneando'' y no pierde el contenido de culto.'
- source_word: τῷ κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - al Señor
  lexicon: BDAG
  rationale: Sigo el referente divino del κύριος en contexto lxx cultual. En español, 'el Señor' es la forma clara y reverente, sin usar el disfraz tipográfico de otras tradiciones.
- source_word: εὐλογοῦντες
  english_pob_choice: blessing him
  chosen_spanish: bendiciendo
  alternatives_spanish:
  - bendiciéndolo
  - diciendo bendición sobre él
  lexicon: BDAG
  rationale: El verbo puede significar 'bendecir' o 'hablar bien de'. En este contexto litúrgico, 'bendiciendo' reproduce la acción sin añadir un objeto explícito que el griego deja implícito.
- source_word: κατὰ Δαυεὶδ βασιλέα τοῦ Ἰσραήλ
  english_pob_choice: according to David king of Israel
  chosen_spanish: conforme a David, rey de Israel
  alternatives_spanish:
  - según David, rey de Israel
  - a la manera de David, rey de Israel
  - como lo prescribió David, rey de Israel
  lexicon: LSJ
  rationale: '''Κατά'' deja abierta la idea de conformidad, norma o modo. ''Conforme a'' preserva esa tensión sin fijar indebidamente si la referencia es prescripción formal o ejemplo litúrgico.'
theological_decisions:
- issue: Rendering κύριος in a cultic LXX context
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  rationale: En este contexto de adoración del Dios de Israel, κύριος remite claramente a Yahvé. 'El Señor' mantiene la convención reverente y legible en español, sin ocultar el referente divino del texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Force of κατὰ Δαυεὶδ βασιλέα τοῦ Ἰσραήλ
  english_pob_reading: according to David king of Israel
  chosen_spanish_reading: conforme a David, rey de Israel
  alternative_spanish_readings:
  - según David, rey de Israel
  - a la manera de David, rey de Israel
  - como lo prescribió David, rey de Israel
  rationale: La frase conserva la relación con el patrón davídico de alabanza. 'Conforme a' deja abierta la tensión entre norma, precedente y modo, como lo hace el griego.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'had the cymbals' a 'holding the cymbals' para reflejar mejor ἔχοντες. En español, opté por 'con los címbalos' porque mantiene el valor concomitante del participio sin sonar forzado, y preserva la escena litúrgica con un estilo publicable. También respeté la apertura semántica de κατὰ mediante 'conforme a', en lugar de resolverla demasiado pronto.
  spanish_consistency_notes:
  - Uso 'el Señor' para κύριος en contexto cultual, coherente con la convención POB y legible en español.
  - Mantengo 'címbalos' para κύμβαλα, una forma clara y tradicional en español bíblico, sin sustituirla por un término más genérico.
  - Conservo 'David, rey de Israel' con coma explicativa para reflejar el appositional structure del griego y la nota de conformidad litúrgica.
  - Evito traducir μετὰ μουσικῶν como 'música' a secas, porque la evidencia auditada permite entenderlo como músicos o acompañamiento musical; la nota preserva esa alternativa.
