translation:
  language: es
  text: Cada uno no oprimió a su prójimo[a], y nunca desobedecerán su palabra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su vecino». πλησίον puede referirse al vecino en sentido social, pero aquí el contexto ético favorece «prójimo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστος
  english_pob_choice: Each one
  chosen_spanish: Cada uno
  alternatives_spanish:
  - cada cual
  - cada persona
  - cada uno de ellos
  lexicon: LSJ
  rationale: El singular distributivo se conserva mejor con una expresión igualmente distributiva en español. «Cada uno» mantiene el valor individual-colectivo del griego sin introducir matices ajenos.
- source_word: τὸν πλησίον αὐτοῦ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - su semejante
  - el que está cerca de él
  lexicon: LSJ
  rationale: En este contexto ético, πλησίον equivale a la persona cercana o al otro con quien se tiene obligación moral. «Prójimo» es natural en español bíblico y conserva esa amplitud mejor que «vecino».
- source_word: οὐκ ἔθλιψεν
  english_pob_choice: did not oppress
  chosen_spanish: no oprimió
  alternatives_spanish:
  - no afligió
  - no presionó
  - no molestó
  lexicon: LSJ
  rationale: θλίβω aquí describe daño o presión ejercida contra el otro; en relación con «prójimo», «oprimió» expresa con precisión la fuerza interpersonal del verbo mejor que opciones más generales como «afligió».
- source_word: ἕως αἰῶνος
  english_pob_choice: will never
  chosen_spanish: nunca
  alternatives_spanish:
  - para siempre
  - jamás
  - por toda la eternidad
  lexicon: LSJ
  rationale: La combinación negativa en español se expresa de modo más natural con «nunca», reflejando el alcance durativo de la frase sin forzar una literalidad menos idiomática como «para siempre» en esta construcción negativa.
- source_word: οὐκ ἀπειθήσουσι
  english_pob_choice: will not disobey
  chosen_spanish: no desobedecerán
  alternatives_spanish:
  - no serán desobedientes
  - no rehusarán obedecer
  lexicon: LSJ
  rationale: ἀπειθέω significa desobedecer o rehusar obediencia. «No desobedecerán» conserva el valor verbal activo del futuro griego y corresponde al auditoría inglesa.
- source_word: τοῦ ῥήματος αὐτοῦ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su palabra dada
  - su mandato
  - lo que él dice
  lexicon: LSJ
  rationale: ῥῆμα puede abarcar palabra, dicho o mandato. «Su palabra» mantiene esa amplitud sin estrechar el sentido a «mandato». El posesivo queda intencionalmente abierto, como en la revisión inglesa, sin especificar más allá del griego.
theological_decisions:
- issue: Referente implícito de «su» en «su palabra»
  english_pob_reading: God is the implied referent
  chosen_spanish_reading: Dios es el referente implícito más probable, pero la traducción conserva el posesivo no explicitado
  alternative_spanish_readings:
  - su palabra de él, con referente indefinido
  - la palabra de Dios
  rationale: El contexto sapiencial y la descripción del orden creado favorecen leer a Dios como referente. Sin embargo, el griego no lo nombra explícitamente; por eso la traducción mantiene «su palabra» sin resolver la ambigüedad más allá de lo que el texto permite.
  doctrine_reference: Primacía del texto fuente y conservación de tensiones interpretativas documentadas.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «will never» sobre «forever» para ἕως αἰῶνος en una construcción negativa. En español, esa naturalidad se expresa mejor con «nunca». También se mantuvo la decisión de no explicitar «Dios» en el texto principal, aunque el referente probable sea teológico.
  spanish_consistency_notes:
  - Se mantuvo «prójimo» para πλησίον, coherente con uso bíblico y con el valor relacional del término.
  - Se eligió «oprimió» para θλίβω por su fuerza semántica y por concordar con el objeto humano («su prójimo»).
  - Se evitó «Cristo», «SEÑOR» u otras sustituciones no presentes en el texto griego.
  - La cláusula final conserva la ambigüedad del posesivo, siguiendo la cautela del audit trail inglés.
