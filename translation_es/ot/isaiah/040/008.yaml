revisions:
- from: La hierba se marchita, la flor se desvanece[a], pero la palabra de nuestro Dios permanecerá para siempre.
  to: La hierba se seca[a], la flor se marchita, pero la palabra de nuestro Dios permanecerá para siempre.
  rationale: 'Se reemplaza ''se marchita ... se desvanece'' por ''se seca ... se marchita'' para expresar de manera más natural en español los dos verbos hebreos distintos: uno de secarse y otro de marchitarse. También se corrige la nota para que ofrezca una alternativa real y explique la distinción léxica preservada por el hebreo.'
