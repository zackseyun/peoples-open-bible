review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la lista de topónimos y el sentido básico de מִגְרָשֶׁיהָ como tierras abiertas asociadas a cada ciudad. Sin embargo, los nombres propios no siguen la adaptación española más natural y reconocible en un texto bíblico en español: ''Heshbón'' y ''Jazer'' conservan grafías inglesas. El hebreo solo enumera ciudades con sus áreas abiertas; esa estructura se preserva bien con ''y ... con sus ...''.'
  spanish_quality_summary: 'La frase es legible, pero conviene ajustar los topónimos a formas españolas más naturales: ''Hesbón'' y ''Jazer'' > mejor ''Jazer'' o ''Yazer'' según convención, pero dado el uso bíblico español más extendido, ''Hesbón'' claramente mejora; para יַעְזֵיר, ''Jazer'' es aceptable en español, aunque menos claramente hispanizado. También la nota al pie puede refinarse: ''terrenos alrededor'' suena poco idiomático; ''pastos comunales'' o ''tierras comunales'' / ''tierras de alrededor'' sería más natural. ''Pastizales'' es comprensible, aunque en registro bíblico puede sonar algo coloquial; ''tierras de pastoreo'' expresa mejor el valor técnico sin perder claridad.'
  glossary_alignment: 'No hay términos teológicos sensibles aquí. La decisión clave es léxica: מִגְרָשֶׁיהָ debe reflejar el terreno abierto perteneciente a la ciudad. ''Tierras de pastoreo'' alinea mejor con la razón documentada del POB y evita la posible reducción de ''pastizales'' a mera vegetación. Los topónimos deben alinearse con formas españolas, no inglesas.'
  issues:
  - severity: medium
    issue: Topónimo 'Heshbón' demasiado influido por el inglés.
    rationale: El hebreo חֶשְׁבּוֹן suele verterse en español como 'Hesbón'. La forma actual conserva una transliteración anglicada poco natural para lectores hispanos.
  - severity: low
    issue: '''Pastizales'' es entendible pero menos preciso para מִגְרָשֶׁיהָ.'
    rationale: El término hebreo en contexto levítico apunta a tierras abiertas vinculadas a la ciudad, no solo a pasto como cobertura vegetal. 'Tierras de pastoreo' mantiene mejor el matiz funcional y administrativo.
  - severity: low
    issue: La alternativa de nota 'terrenos alrededor' suena poco natural.
    rationale: En español más idiomático, 'tierras circundantes', 'tierras comunales' o 'pastos comunales' comunican mejor la opción léxica preservada en la nota.
  revised_spanish_text: y Hesbón con sus tierras de pastoreo[a], y Jazer con sus tierras de pastoreo.
