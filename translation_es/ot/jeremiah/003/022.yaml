revisions:
- from: ¡Vuélvanse[a], hijos rebeldes! Yo sanaré sus rebeliones. ¡Miren!, nosotros venimos a ti[b], porque tú eres Yahvé, nuestro Dios.
  to: ¡Vuelvan[a], hijos descarriados! Yo sanaré sus desvíos[b]. Aquí estamos; venimos a ti, porque tú eres Yahvé nuestro Dios.
  rationale: Se reemplazó «rebeldes / rebeliones» por «descarriados / desvíos» para preservar mejor la red semántica del hebreo entre volver, apartarse y ser sanado. Se corrigió הִנְנוּ con «Aquí estamos» para un español más natural y fiel al valor de respuesta deíctica. También se realinearon las notas con las decisiones léxicas significativas del versículo y se eliminó la nota errónea sobre «a ti».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:35:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: llamado a volver, promesa de sanidad y respuesta del pueblo a Yahvé. También preserva correctamente «Yahvé». Sin embargo, debilita un rasgo importante del versículo: la repetición del campo léxico de שוב/שובבים/משובות («volver / descarriado / descarríos»). Al traducir שׁוֹבָבִים y מְשׁוּבֹתֵיכֶם como «rebeldes / rebeliones», se desplaza el foco desde el apartamiento-retorno hacia la rebeldía, y se pierde parte del juego verbal documentado en el audit trail.'
  spanish_quality_summary: El español es claro y legible, pero «¡Miren!,» suena algo forzado con esa puntuación y como equivalente de הִנְנוּ. En este contexto, «Aquí estamos» o «Mira» serían más idiomáticos; mejor aún, «Aquí estamos; venimos a ti» preserva la respuesta del pueblo. «Vuélvanse» es aceptable, pero «Vuelvan» suena más natural en este llamado profético. El conjunto requiere un ajuste menor, no una reescritura mayor.
  glossary_alignment: Alinea bien con la política del proyecto en «Yahvé» y de modo defendible en «hijos». No obstante, se aparta de la rationale léxica documentada para שוב/שובבים/משובות, que pedía conservar la red semántica de retorno/apartamiento. En español conviene mantenerla con «descarriados» / «desvíos» o equivalente cercano.
  issues:
  - severity: medium
    issue: Pérdida del juego léxico entre שוב, שׁוֹבָבִים y מְשׁוּבֹתֵיכֶם
    rationale: El hebreo repite la idea de volver/apartarse. «Rebeldes» y «rebeliones» comunican culpa, pero no preservan tan bien el motivo de desviación y retorno que el audit trail considera significativo.
  - severity: low
    issue: Renderización poco natural de הִנְנוּ como «¡Miren!,»
    rationale: La partícula introduce la respuesta del pueblo («Aquí estamos» / «He aquí»). «¡Miren!,» con coma tras el signo de exclamación resulta ortográficamente impropio y estilísticamente menos natural en español bíblico actual.
  - severity: low
    issue: Nota b no corresponde al lugar ni al sentido principal
    rationale: La nota inglesa b trata sobre «your backslidings», pero en el borrador español se colocó en «a ti» y además propone «a ustedes», lo cual no refleja el singular לָךְ dirigido a Dios.
  revised_spanish_text: ¡Vuelvan[a], hijos descarriados! Yo sanaré sus desvíos[b]. Aquí estamos; venimos a ti, porque tú eres Yahvé nuestro Dios.
  revised_footnotes:
  - marker: a
    text: O «hijos rebeldes», «hijos apóstatas» o «hijos descarriados». El hebreo repite la idea de apartarse y volver.
    reason: lexical_alternative
  - marker: b
    text: O «sus apostasías» o «su apartamiento». El hebreo usa un sustantivo de la misma familia que «vuelvan» y «descarriados».
    reason: lexical_alternative
  revision_rationale: Se reemplazó «rebeldes / rebeliones» por «descarriados / desvíos» para preservar mejor la red semántica del hebreo entre volver, apartarse y ser sanado. Se corrigió הִנְנוּ con «Aquí estamos» para un español más natural y fiel al valor de respuesta deíctica. También se realinearon las notas con las decisiones léxicas significativas del versículo y se eliminó la nota errónea sobre «a ti».
