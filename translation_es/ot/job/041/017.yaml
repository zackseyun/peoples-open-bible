    text: O «los poderosos seres»; el hebreo también puede entenderse como «dioses» o «héroes».
    reason: alternative_reading
  - marker: b
    text: La cláusula final es difícil. También puede entenderse «quedan confundidos» o, más literalmente según la forma verbal, «se purifican».
    reason: lexical_alternative
  revision_rationale: 'Se ajustó ''tiemblan'' a ''temen'' para reflejar con más precisión יָגוּרוּ. Se añadieron y reubicaron las notas para conservar las alternativas léxicas y teológicas que el audit trail inglés documenta: una nota sobre אֵלִים y otra sobre la dificultad de יִתְחַטָּאוּ. Se mantuvo ''a causa del estruendo'' como una buena representación idiomática de מִשְּׁבָרִים en contexto.'
