  to: 'Y unos pocos sobrevivientes de la espada volverán de la tierra de Egipto a la tierra de Judá[a], y todo el remanente de Judá que vino a la tierra de Egipto para residir allí como forasteros sabrá[b] de quién se cumplirá la palabra: la mía o la de ellos.'
