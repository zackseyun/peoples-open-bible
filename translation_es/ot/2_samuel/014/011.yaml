translation:
  language: es
  text: 'Entonces ella dijo: «Por favor, que el rey se acuerde de Yahvé tu Dios, para que el vengador de sangre no destruya más, y no destruyan a mi hijo». Y él dijo: «Tan cierto como que Yahvé vive,[b] ni un solo cabello de tu hijo caerá al suelo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: 'Hebraísmo juratorio: «si cae un cabello de tu hijo al suelo», es decir, protección completa para tu hijo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִזְכָּר נָא
  english_pob_choice: Please let ... remember
  chosen_spanish: Por favor, que ... recuerde
  alternatives_spanish:
  - Que ... recuerde, por favor
  - Por favor, recuerde
  lexicon: HALOT
  rationale: El jussivo con נָא expresa una petición respetuosa, no una simple declaración futura. En español, «Por favor, que ... recuerde» conserva el tono deferente dirigido al rey.
- source_word: יְהוָה אֱלֹהֶיךָ
  english_pob_choice: Yahweh your God
  chosen_spanish: Yahvé tu Dios
  alternatives_spanish:
  - el SEÑOR tu Dios
  - Yahvé, tu Dios
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», según la norma del proyecto, y se mantiene el posesivo literal «tu Dios», que en el contexto apela a la responsabilidad del rey ante Dios.
- source_word: מֵהַרְבּוֹת גֹּאֵל הַדָּם
  english_pob_choice: so that the avenger of blood may not destroy any more
  chosen_spanish: para que el vengador de sangre no destruya más
  alternatives_spanish:
  - para que el vengador de sangre no siga destruyendo
  - para que el vengador de sangre no haga más destrucción
  lexicon: HALOT
  rationale: La construcción idiomática con מן + infinitivo de רבה se vierte de forma natural como «no destruya más», siguiendo la revisión inglesa. «Vengador de sangre» conserva el término legal hebreo sin suavizarlo.
- source_word: גֹּאֵל הַדָּם
  english_pob_choice: the avenger of blood
  chosen_spanish: el vengador de sangre
  alternatives_spanish:
  - el vengador de la sangre
  - el redentor de sangre
  lexicon: HALOT
  rationale: Se mantiene el término jurídico tradicional del hebreo bíblico. «De sangre» reproduce con concisión el genitivo del original y evita introducir una explicación ajena al texto.
- source_word: וְלֹא יַשְׁמִידוּ אֶת בְּנִי
  english_pob_choice: and they may not destroy my son
  chosen_spanish: y no destruyan a mi hijo
  alternatives_spanish:
  - y no eliminen a mi hijo
  - y no aniquilen a mi hijo
  lexicon: HALOT
  rationale: El plural indefinido se conserva con «destruyan», sin especificar agentes. «Mi hijo» sigue el hebreo literal; «destruyan» mantiene el campo semántico de destrucción del contexto legal.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - Vive Yahvé
  - Tan cierto como que Yahvé vive
  lexicon: HALOT
  rationale: Se preserva la fórmula de juramento, que en español puede sonar más natural como exclamación solemne. La elección mantiene la fuerza juratoria del hebreo y el nombre divino sin sustitución.
- source_word: אִם יִפֹּל
  english_pob_choice: not one ... shall fall
  chosen_spanish: No caerá
  alternatives_spanish:
  - ni caerá
  - no se caerá
  lexicon: HALOT
  rationale: Después del juramento, אִם funciona como negación enfática. «No caerá» comunica la garantía absoluta sin convertirla en condicional.
- source_word: מִשַּׂעֲרַת בְּנֵךְ
  english_pob_choice: not one hair of your son
  chosen_spanish: ni un solo cabello de tu hijo
  alternatives_spanish:
  - ni un cabello de tu hijo
  - ni siquiera un cabello de tu hijo
  lexicon: HALOT
  rationale: La imagen hebrea se conserva en español con «cabello», que comunica la mínima parte afectada. «Ni un solo» refuerza la negación enfática presente en el juramento.
- source_word: אָרְצָה
  english_pob_choice: to the ground
  chosen_spanish: a tierra
  alternatives_spanish:
  - al suelo
  - a la tierra
  lexicon: HALOT
  rationale: «A tierra» es una forma española breve y bíblica, adecuada para el giro idiomático de caída completa. Evita redundancia con el verbo «caer».
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Según la pauta del proyecto, se traduce con el nombre propio «Yahvé» para preservar la referencia covenantal y la transparencia frente al original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido jurídico de גֹּאֵל הַדָּם
  english_pob_reading: the avenger of blood
  chosen_spanish_reading: el vengador de sangre
  alternative_spanish_readings:
  - el vengador de la sangre
  - el pariente vengador de sangre
  rationale: La expresión conserva su fuerza legal y no se reinterpreta como mera violencia privada. En este pasaje designa una figura jurídica reconocible en la legislación hebrea, por lo que se mantiene el término técnico.
  doctrine_reference: HALOT / legislación de sangre en el Pentateuco
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que prefería «may not destroy any more» frente a una formulación más literal de continuidad. También se respetó la decisión final de mantener el juramento como garantía enfática y la nota sobre el hebraísmo del cabello que cae a tierra.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto, sin ocultarlo detrás de «SEÑOR».
  - Se conserva «vengador de sangre» como término técnico; no se sustituye por lenguaje explicativo.
  - «Destruir» se usa de manera consistente para el campo semántico de שׁחת / השמיד.
  - La negación enfática del juramento se expresa de modo idiomático en español sin debilitar la certeza del original.
