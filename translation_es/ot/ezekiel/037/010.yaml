review_pass:
  verdict: revise
  source_alignment_summary: 'La base del borrador sigue en gran parte la secuencia hebrea, pero falla en dos puntos importantes frente a la evidencia fuente y el rastro POB: הָרוּחַ fue elegido en inglés como «the breath» con nota alternativa «the spirit», mientras el español invierte esa prioridad sin justificación suficiente; y «se pusieron en pie sobre sus pies» suena redundante y menos fiel al giro directo «stood on their feet». También «grandísimo» comprime la intensificación doble מְאֹד מְאֹד más de lo deseable.'
  spanish_quality_summary: 'El borrador es mayormente comprensible, pero presenta problemas de naturalidad y de anclaje de notas. Reutiliza el marcador [b] para dos referentes distintos, lo cual viola la disciplina requerida. «Sobre sus pies» es poco idiomático aquí; «sobre sus pies» además calca innecesariamente el hebreo. Conviene una redacción más natural y eclesialmente legible: «se pusieron de pie» o «estuvieron sobre sus pies».'
  glossary_alignment: 'No hay conflicto con Yahvé/Mesías/etc. El punto terminológico principal es רוּחַ: el proyecto auditado prefirió «breath» por la vivificación inmediata, preservando «spirit» como alternativa. En español, «aliento» corresponde mejor a esa decisión y mantiene la nota con «espíritu». «Ejército» para חַיִל está bien. «Mandó» es aceptable para צוה.'
  issues:
  - severity: high
    issue: Rendición principal de הָרוּחַ como «el espíritu»
    rationale: La evidencia auditada del POB eligió «the breath» en el texto principal por el contexto inmediato de animación corporal, dejando «the spirit» como alternativa. El español debe reflejar esa decisión, no invertirla sin necesidad.
  - severity: high
    issue: Marcador de nota [b] reutilizado para dos elementos distintos
    rationale: La instrucción exige marcadores únicos por nota. En el borrador, [b] aparece en «espíritu[b]» y también en «ejército[b]», pero solo hay una nota b, lo cual es inválido.
  - severity: medium
    issue: «se pusieron en pie sobre sus pies» es poco natural y redundante
    rationale: Aunque busca conservar la concreción corporal, en español resulta torpe. Una forma más fiel y natural es «se pusieron de pie sobre sus pies» o, mejor, «estuvieron sobre sus pies»; sin embargo, la opción más clara y común es «se pusieron de pie».
  - severity: medium
    issue: «grandísimo» atenúa la duplicación enfática מְאֹד מְאֹד
    rationale: El hebreo intensifica de manera explícita. «Grandísimo» comunica superlativo, pero borra la fuerza repetitiva. «En extremo grande» o «sumamente grande» preserva mejor la intensidad sin sonar forzado.
  - severity: low
    issue: Nota [a] sobre «mandó/ordenó» no es necesaria pero es admisible
    rationale: No contradice la fuente, aunque la alternativa no aporta mucho valor exegético. Puede mantenerse si se desea conservar una nota léxica menor.
  revised_spanish_text: Así profeticé como él me mandó[a], y el aliento[b] entró en ellos, y vivieron y se pusieron de pie, un ejército sumamente grande.
  revised_footnotes:
  - marker: a
    text: O «como él me ordenó».
    reason: lexical_alternative
  - marker: b
    text: O «el espíritu entró en ellos». El hebreo רוּחַ puede significar «aliento», «viento» o «espíritu».
    reason: lexical_alternative
  revision_rationale: Se corrigió la elección principal de רוּחַ a «aliento» para alinearla con la decisión auditada del POB y con el contexto inmediato de vivificación, manteniendo «espíritu» en nota. Se eliminaron los marcadores duplicados y se dejó una sola nota [b] correctamente anclada. Se mejoró la naturalidad de «se pusieron en pie sobre sus pies» a «se pusieron de pie». Se reemplazó «grandísimo» por «sumamente grande» para reflejar mejor la intensificación hebrea sin caer en una repetición española dura.
