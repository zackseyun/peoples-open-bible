    rationale: El griego tiene aoristo pasivo de ἀποστέλλω, y la auditoría inglesa escogió «I was sent». En español, «fui enviado» preserva mejor ese valor puntual que «he sido enviado», que introduce una resonancia aspectual distinta no exigida por el texto.
  - severity: low
    issue: Falta la nota léxica alternativa equivalente a la auditoría inglesa
    rationale: La auditoría inglesa preserva una alternativa para ἐπὶ τοῦτο / ἀπεστάλην («for this purpose I was sent»). En español conviene conservarla como nota breve para mantener el rastro auditado y la alternativa válida de finalidad más explícita.
  revised_spanish_text: 'Pero él les dijo: «También a las otras ciudades me es necesario anunciar las buenas noticias del reino de Dios, porque para esto fui enviado[a]».'
