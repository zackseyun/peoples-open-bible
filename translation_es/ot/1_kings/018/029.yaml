translation:
  language: es
  text: Y sucedió que, cuando pasó el mediodía, ellos siguieron profetizando[a] hasta la hora de subir la ofrenda vegetal[b]; pero no había voz, ni quien respondiera, ni quien prestara atención.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «deliraban» o «enloquecían». El hebreo usa el verbo habitual de «profetizar», aquí para describir el comportamiento extático de los profetas de Baal.'
    reason: lexical_alternative
  - marker: b
    text: «La hora de subir la ofrenda vegetal» también puede entenderse como la hora de la ofrenda regular de la tarde.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce el siguiente tramo de la escena. «Aconteció» conserva bien la función discursiva hebrea con un español natural y digno.
- source_word: כַּעֲבֹר הַצָּהֳרַיִם
  english_pob_choice: when noon had passed
  chosen_spanish: cuando pasó el mediodía
  alternatives_spanish:
  - cuando hubo pasado el mediodía
  - después del mediodía
  lexicon: HALOT
  rationale: La construcción temporal indica que el mediodía ya había transcurrido. «Cuando pasó el mediodía» es claro y fiel sin introducir matices no explícitos.
- source_word: וַיִּתְנַבְּאוּ
  english_pob_choice: they kept prophesying
  chosen_spanish: ellos siguieron profetizando
  alternatives_spanish:
  - profetizaron sin cesar
  - ellos estaban profetizando
  lexicon: HALOT
  rationale: Se conserva el verbo básico «profetizar» para reflejar la elección léxica hebrea, mientras que «siguieron» expresa la continuidad de la acción. No se adopta una paráfrasis como «deliraban» en el texto principal para no perder el vínculo verbal.
- source_word: עַד לַעֲלוֹת הַמִּנְחָה
  english_pob_choice: until the offering up of the grain offering
  chosen_spanish: hasta la hora de subir la ofrenda vegetal
  alternatives_spanish:
  - hasta el momento de ofrecer la ofrenda vegetal
  - hasta la ofrenda de la tarde
  lexicon: HALOT
  rationale: מִנְחָה suele designar «ofrenda vegetal»; «subir» reproduce el valor literal de עָלָה en la expresión «hacer subir/ofrecer». «Hora» se usa para expresar el punto temporal al que llega la acción, sin añadir «tarde» que no está en el hebreo.
- source_word: וְאֵין קוֹל
  english_pob_choice: there was no voice
  chosen_spanish: no había voz
  alternatives_spanish:
  - no había sonido
  - no se oía voz
  lexicon: HALOT
  rationale: קוֹל puede ser voz o sonido. En este contexto de espera de respuesta divina, «voz» mantiene mejor la posible expectativa de una respuesta audible.
- source_word: וְאֵין עֹנֶה
  english_pob_choice: no one answering
  chosen_spanish: ni quien respondiera
  alternatives_spanish:
  - ni nadie respondiendo
  - ni hubo respuesta
  lexicon: HALOT
  rationale: El participio expresa la ausencia de quien conteste. La subordinada con subjuntivo «quien respondiera» conserva esa idea de ausencia de respuesta sin volverla demasiado mecánica.
- source_word: וְאֵין קָשֶׁב
  english_pob_choice: no one paying attention
  chosen_spanish: ni quien prestara atención
  alternatives_spanish:
  - ni quien atendiera
  - ni nadie escuchando
  lexicon: HALOT
  rationale: קָשֶׁב denota atención, atención puesta en algo o prestar oído. «Prestar atención» comunica bien la falta de escucha/hecho de atender, en paralelo con las dos negaciones anteriores.
theological_decisions:
- issue: Sentido de וַיִּתְנַבְּאוּ en el contexto de los profetas de Baal
  english_pob_reading: they kept prophesying
  chosen_spanish_reading: ellos siguieron profetizando
  alternative_spanish_readings:
  - ellos deliraban
  - ellos seguían en éxtasis
  rationale: Se mantiene el verbo «profetizar» para no borrar la elección léxica hebrea ni anticipar una interpretación que el narrador deja sugerida por el contexto. El tono irónico y la conducta extática de los profetas de Baal quedan para la lectura contextual, como en el POB inglés.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Posible referencia temporal de הַמִּנְחָה
  english_pob_reading: the offering up of the grain offering, with a note that it may also be understood as the time of the regular evening offering
  chosen_spanish_reading: la hora de subir la ofrenda vegetal
  alternative_spanish_readings:
  - la hora de la ofrenda de la tarde
  - el momento de la ofrenda vespertina
  rationale: Se conserva la referencia directa a מִנְחָה como «ofrenda vegetal», pero sin cerrar la posibilidad cronológica de que marque la hora habitual de la ofrenda. La ambigüedad queda implícita en la formulación principal; no se fuerza «tarde» en el texto principal.
  doctrine_reference: Translation philosophy §§1, 4, 5
translation_notes:
  revision_awareness: El inglés POB revisó la clausula final de «and no attention» a «and no one paying attention» para hacer más natural la representación del hebreo; la versión española sigue esa revisión con «ni quien prestara atención». También conserva la decisión revisada de expresar el último miembro como una persona que atiende, no como una abstracción.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo exija explícitamente; este versículo no lo contiene.
  - «Ofrenda vegetal» se mantiene como equivalente base de מִנְחָה para respetar la elección léxica del proyecto, aunque en contexto temporal puede remitir a la ofrenda regular.
  - 'Se preserva la triple negación final con paralelismo natural en español: voz / responder / prestar atención.'
  - El pasivo/estado de «siguieron profetizando» evita añadir una explicación interpretativa en el cuerpo del texto.
