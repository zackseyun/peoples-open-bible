translation:
  language: es
  text: Omrí hizo lo malo ante los ojos de Yahvé[a], e hizo más maldad que todos los que fueron antes de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'y era más malo que todos los que fueron antes de él'. El verbo hebreo puede entenderse como una descripción de Omrí mismo o de sus acciones; el texto principal conserva el sentido evaluativo más común en contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשֶׂה
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - hizo lo que
  lexicon: HALOT
  rationale: En esta fórmula evaluativa, עשה con el objeto definido de mal se expresa naturalmente en español con 'hizo', que conserva la idea de realizar una acción o conducta caracterizada como mala sin volverla demasiado literal o rígida.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo/adjetivo con artículo en una expresión fija de valoración moral. 'Lo malo' reproduce bien la función sustantiva y suena más natural en español que 'el mal' en este contexto narrativo.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a la vista de
  - en los ojos de
  lexicon: HALOT
  rationale: '''Ante los ojos de'' conserva la imagen idiomática hebrea de evaluación desde la perspectiva de alguien, y resulta idiomático en español bíblico contemporáneo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La política del proyecto para el Tetragrámaton es transliterar el nombre divino. En español, 'Yahvé' es la forma tradicional y legible que corresponde a esa transliteración, preservando el nombre propio y evitando la sustitución por un título.
- source_word: וַיָּרַע
  english_pob_choice: he did more evil
  chosen_spanish: hizo más mal
  alternatives_spanish:
  - fue más malo
  - actuó con mayor maldad
  lexicon: HALOT
  rationale: El hebreo permite entender el verbo en sentido comparativo dentro de la fórmula narrativa. 'Hizo más mal' mantiene la continuidad verbal con la primera cláusula y evita trasladar innecesariamente el foco al carácter de Omrí en vez de sus actos.
- source_word: מִכֹּל אֲשֶׁר לְפָנָיו
  english_pob_choice: than all who were before him
  chosen_spanish: que todos los que habían estado antes que él
  alternatives_spanish:
  - que todos sus predecesores
  - que todos los anteriores a él
  lexicon: HALOT
  rationale: La frase compara con los que vinieron antes, sin añadir explícitamente 'reyes'. 'Habían estado antes que él' mantiene la referencia abierta y fiel al hebreo, con una naturalidad adecuada en español.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre divino como nombre propio, siguiendo la decisión doctrinal del proyecto de no ocultar el Tetragrámaton con una sustitución titualar. 'Yahvé' es la forma española más establecida y publicable para esa transliteración.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Ambigüedad entre evaluar la conducta o al sujeto en el comparativo final
  english_pob_reading: he did more evil than all who were before him / he was more evil than all who were before him
  chosen_spanish_reading: hizo más mal que todos los que habían estado antes que él
  alternative_spanish_readings:
  - era más malo que todos los que habían estado antes que él
  - fue más malvado que todos sus predecesores
  rationale: La lectura principal mantiene el paralelismo con la primera mitad del versículo y preserva la preferencia del POB por la lectura de acciones evaluadas. La alternativa personal ('era más malo') se deja implícitamente abierta por el hebreo, pero el texto principal favorece la formulación verbal.
  doctrine_reference: POB lexical note on וַיָּרַע and comparative force
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que el acuerdo con la fuente es alto; por eso se mantiene la solución evaluativa verbal del inglés POB, ajustada a un español natural y consistente con la política del nombre divino.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme al estándar del proyecto.
  - '''Hizo'' y ''hizo más mal'' conservan la continuidad verbal del hebreo y del POB inglés.'
  - La nota al pie marca la ambigüedad comparativa sin forzar una reinterpretación del sujeto.
  - El español evita 'SEÑOR' como sustituto del nombre divino y evita 'Cristo' o vocabulario ajeno al pasaje.
