translation:
  language: es
  text: 'Pero la palabra de Yahvé vino a mí[a], diciendo: «Has derramado mucha sangre y has librado grandes guerras[b]. No edificarás una casa para mi nombre[c], porque has derramado mucha sangre sobre la tierra[d] delante de mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la palabra de Yahvé vino sobre mí' para reflejar más de cerca el hebreo idiomático.
    reason: alternative_reading
  - marker: b
    text: 'O ''has hecho grandes guerras''. El hebreo dice literalmente: ''has hecho grandes guerras''.'
    reason: alternative_reading
  - marker: c
    text: 'Es decir, el templo; hebreo: ''una casa para mi nombre''.'
    reason: cultural_note
  - marker: d
    text: O 'a la tierra' para 'sobre la tierra'.
    reason: alternative_reading
lexical_decisions:
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh / the LORD
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - un mensaje de Yahvé
  - una palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética estándar con 'palabra' para reflejar דְּבַר, y 'Yahvé' para el nombre divino según el criterio textual del proyecto.
- source_word: וַיְהִי עָלַי
  english_pob_choice: came to me
  chosen_spanish: vino a mí
  alternatives_spanish:
  - estuvo sobre mí
  - llegó a mí
  lexicon: HALOT
  rationale: La idea idiomática de recepción de un mensaje divino se expresa de manera natural en español como 'vino a mí', sin perder el sentido de comunicación profética.
- source_word: דָּם לָרֹב
  english_pob_choice: much blood
  chosen_spanish: mucha sangre
  alternatives_spanish:
  - sangre en abundancia
  - gran cantidad de sangre
  lexicon: HALOT
  rationale: En español, 'mucha sangre' conserva la concreción del hebreo y comunica sangre derramada; evita una abstracción excesiva como 'derramamiento de sangre' en el cuerpo principal.
- source_word: שָׁפַכְתָּ
  english_pob_choice: have shed
  chosen_spanish: has derramado
  alternatives_spanish:
  - has vertido
  - has esparcido
  lexicon: HALOT
  rationale: '''Derramar sangre'' es la equivalencia idiomática directa y natural en español para el verbo con objeto ''sangre''.'
- source_word: וּמִלְחָמוֹת גְּדֹלוֹת עָשִׂיתָ
  english_pob_choice: fought great wars
  chosen_spanish: has hecho grandes guerras
  alternatives_spanish:
  - has librado grandes guerras
  - has peleado grandes guerras
  lexicon: HALOT
  rationale: Se mantiene más cerca de la forma hebrea 'hiciste guerras grandes' que la paráfrasis interpretativa 'fought'; en español, 'has hecho grandes guerras' conserva el paralelismo verbal y la fuerza del texto.
- source_word: לֹא תִבְנֶה בַיִת לִשְׁמִי
  english_pob_choice: You shall not build a house for my name
  chosen_spanish: No edificarás una casa para mi nombre
  alternatives_spanish:
  - No construirás una casa para mi nombre
  - No edificarás un templo para mi nombre
  lexicon: HALOT
  rationale: '''Edificarás'' reproduce bien el valor formal de תִבְנֶה y ''casa'' conserva el motivo bíblico de la casa ligada al nombre divino, sin reemplazarlo por ''templo'' en la línea principal.'
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce claramente la razón en español y conserva la relación causal del hebreo.
- source_word: דָּמִים רַבִּים
  english_pob_choice: much blood
  chosen_spanish: mucha sangre
  alternatives_spanish:
  - mucha sangre derramada
  - gran cantidad de sangre
  lexicon: HALOT
  rationale: Se repite la misma solución para mantener cohesión semántica con la primera mitad del verso y retener la imagen concreta del hebreo, en vez de neutralizarla como 'sangre derramada'.
- source_word: אַרְצָה
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - a la tierra
  lexicon: HALOT
  rationale: '''Sobre la tierra'' conserva el carácter espacial de la acusación y suena natural en español, mientras mantiene la relación con el suelo/terreno de la escena.'
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  lexicon: HALOT
  rationale: '''Delante de mí'' conserva el matiz relacional y visual del hebreo, alineado con el énfasis teológico de que el acto ocurrió ante Dios.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton, y el proyecto español lo rinde por defecto como 'Yahvé' para mantener la transparencia del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Whether בַיִת should be rendered as 'casa' or 'templo'
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  - morada
  rationale: Se preserva 'casa' en el texto principal para mantener el motivo literario y bíblico de la 'casa para mi nombre'; 'templo' explicaría el referente, pero desplazaría la forma hebrea.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #5'
translation_notes:
  revision_awareness: Se siguió el audit trail inglés con acuerdo alto y sin cambios sustantivos; la versión española mantiene la fuerza concreta de 'sangre' y el paralelismo entre 'grandes guerras' y la imposibilidad de edificar la casa para el nombre de Yahvé.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se conserva 'casa' en lugar de 'templo' en el texto principal para respetar el motivo hebreo.
  - '''Mucha sangre'' se repite en ambas cláusulas para reflejar דָּם לָרֹב y דָּמִים רַבִּים sin suavizar la imagen.'
