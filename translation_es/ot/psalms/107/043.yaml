translation:
  language: es
  text: ¿Quién es sabio? Que guarde estas cosas[a], y que consideren[b] los actos de amor fiel[c] de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo pasa del singular («que guarde») al plural («que consideren»); se conserva esa tensión en vez de armonizarla.
    reason: lexical_alternative
  - marker: b
    text: O «y que ellos consideren».
    reason: previous_rendering
  - marker: c
    text: Hebreo «actos de amor fieles» o «amores fieles» (plural), probablemente refiriéndose a las muchas manifestaciones del amor leal y misericordioso de pacto de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quiénquiera
  lexicon: HALOT
  rationale: Mantiene la fuerza interrogativa directa de la pregunta sapiencial sin suavizarla a una forma impersonal.
- source_word: חָכָם
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - sabio es
  - hombre sabio
  lexicon: HALOT
  rationale: En español, 'sabio' funciona naturalmente como predicado en una pregunta retórica y conserva el valor de cualidad sapiencial sin sobreespecificar género o estatus.
- source_word: וְיִשְׁמָר
  english_pob_choice: Let him keep
  chosen_spanish: Que guarde
  alternatives_spanish:
  - Y que guarde
  - Que observe
  - Que guarde y observe
  lexicon: HALOT
  rationale: שמַר abarca guardar, observar y mantener en mente. 'Que guarde' es un imperativo exhortativo natural en español y preserva el matiz de atender y retener fielmente.
- source_word: אֵלֶּה
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas
  - esto
  lexicon: HALOT
  rationale: La expresión apunta a los hechos y enseñanzas previamente narrados en el salmo. 'Estas cosas' es más explícito y idiomático que un simple demostrativo.
- source_word: וְיִתְבּוֹנְנוּ
  english_pob_choice: and let them consider
  chosen_spanish: y que ellos consideren
  alternatives_spanish:
  - y que consideren
  - y que reflexionen
  - y que los sabios consideren
  lexicon: HALOT
  rationale: El verbo expresa discernimiento reflexivo. Se conserva el plural del hebreo con 'ellos', evitando aplanar la tensión entre el singular inicial y el plural posterior.
- source_word: חַסְדֵי
  english_pob_choice: the steadfast love
  chosen_spanish: las misericordias
  alternatives_spanish:
  - los actos de amor fiel
  - la misericordia constante
  - las bondades fieles
  lexicon: HALOT
  rationale: El plural constructo de חסד señala múltiples manifestaciones de lealtad, bondad y misericordia del pacto. 'Las misericordias' comunica bien la pluralidad en español, aunque 'amor fiel' podría explicar mejor el matiz de pacto en nota.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre propio divino en lugar de sustituirlo por un título.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. 'Yahvé' mantiene el nombre propio de pacto y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tensión singular/plural en la exhortación
  english_pob_reading: Who is wise? Let him keep these things, and let them consider...
  chosen_spanish_reading: ¿Quién es sabio? Que guarde estas cosas, y que ellos consideren...
  alternative_spanish_readings:
  - ¿Quién es sabio? Que guarde estas cosas y considere...
  - ¿Quién es sabio? Que los sabios guarden estas cosas y consideren...
  rationale: Se conserva la transición del singular exhortativo al plural del verbo final, en vez de suavizarla con un sujeto repetido o una forma impersonal que borre la tensión textual.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 y #4'
translation_notes:
  revision_awareness: 'El borrador español sigue de cerca el último estado auditado del inglés, pero ajusta la elección léxica al español: mantiene la pregunta sapiencial, conserva el cambio singular/plural, y traduce el plural constructo חַסְדֵי con un término plural natural en español. También aplica el estándar del proyecto para el nombre divino con ''Yahvé''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el estándar del proyecto para יְהוָה.
  - '''Sabio'' funciona como predicado natural en español y preserva el sentido sapiencial sin introducir un sustantivo no presente.'
  - Se mantiene el plural verbal de la clausula final con 'ellos' para no borrar la transición numérica del hebreo.
  - '''Misericordias'' expresa adecuadamente la pluralidad del constructo hebreo, aunque la nota deja abierta la relación con ''amor fiel''.'
