  text: אַשְׂכִּ֤ילָה בְּ/דֶ֬רֶךְ תָּמִ֗ים מָ֭תַי תָּב֣וֹא אֵלָ֑/י אֶתְהַלֵּ֥ךְ בְּ/תָם לְ֝בָבִ֗/י בְּ/קֶ֣רֶב בֵּיתִֽ/י׀־׃
