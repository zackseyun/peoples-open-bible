  to: 'Entonces Yahvé dijo a Josué[a]: «No temas y no te desalientes. Toma contigo a todos los guerreros, levántate y sube a Hai. Mira, he entregado en tu mano al rey de Hai, a su pueblo, a su ciudad y a su tierra».'
