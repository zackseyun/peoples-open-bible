translation:
  language: es
  text: Y ellos serán míos[a], dice Yahvé de los Ejércitos, en el día en que yo haga de ellos una posesión especial[b]; y yo los perdonaré la vida[c] como un hombre perdona la vida a su hijo que le sirve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traducimos el Tetragrámaton por «Yahvé» en vez de ocultarlo con «SEÑOR», conforme al criterio del proyecto.
    reason: theological_note
  - marker: b
    text: «Posesión especial» refleja סְגֻלָּה sin añadir el posesivo que la revisión inglesa retiró; también puede entenderse como «posesión preciada» o «tesoro reservado».
    reason: lexical_alternative
  - marker: c
    text: El verbo hebreo חמל puede significar «tener compasión», «perdonar la vida» o «preservar del castigo». Aquí se eligió «perdonar la vida» para expresar con claridad la idea de clemencia que exime del juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ לִי
  english_pob_choice: And they will be mine
  chosen_spanish: Y ellos serán míos
  alternatives_spanish:
  - Y pertenecerán a mí
  - Y serán de mí
  lexicon: HALOT
  rationale: El hebreo expresa pertenencia posesiva futura. «Serán míos» comunica con naturalidad esa relación de pertenencia sin añadir explicaciones ajenas al texto.
- source_word: יְהוָה צְבָאֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Se conserva el nombre divino Yahvé según el criterio del proyecto. צְבָאוֹת se vierte como «de los Ejércitos» para mantener la imagen de poder sin recurrir al tradicional «SEÑOR de los ejércitos» como máscara.
- source_word: לַיּוֹם אֲשֶׁר
  english_pob_choice: on the day when
  chosen_spanish: para el día en que
  alternatives_spanish:
  - en el día en que
  - el día en que
  lexicon: HALOT
  rationale: La construcción apunta al momento señalado de la acción divina. «Para el día en que» conserva la orientación temporal del hebreo y su fuerza de destino/propósito sin volverse rígida.
- source_word: אֲנִי עֹשֶׂה
  english_pob_choice: I make them
  chosen_spanish: yo haga de ellos
  alternatives_spanish:
  - yo los haga
  - yo los constituya
  lexicon: HALOT
  rationale: 'El participio con predicado nominal requiere suplir el sentido: no es solo «hacer» en sentido genérico, sino constituirlos en una posesión especial. «Haga de ellos» respeta esa formación sin añadir contenido ajeno.'
- source_word: סְגֻלָּה
  english_pob_choice: a treasured possession
  chosen_spanish: una posesión especial
  alternatives_spanish:
  - un tesoro particular
  - una posesión valiosa
  lexicon: HALOT
  rationale: El término denota una posesión especialmente apreciada y reservada para su dueño. Dado que el POB inglés revisó para quitar el posesivo añadido, «posesión especial» es una solución fiel y clara en español.
- source_word: וְחָמַלְתִּי עֲלֵיהֶם
  english_pob_choice: and I will spare them
  chosen_spanish: y yo los perdonaré
  alternatives_spanish:
  - y yo los libraré
  - y yo tendré compasión de ellos
  lexicon: HALOT
  rationale: חמל puede significar sentir compasión o abstenerse de castigar. En este contexto de juicio, «perdonaré» comunica el resultado práctico de esa misericordia; se mantiene una nota para no ocultar la alternativa de «perdonar/liberar con compasión».
- source_word: כַּאֲשֶׁר יַחְמֹל אִישׁ
  english_pob_choice: as a man spares
  chosen_spanish: como un hombre perdona
  alternatives_spanish:
  - como un hombre perdona/ahorra
  - como un hombre tiene compasión
  lexicon: HALOT
  rationale: El paralelismo repite חמל, así que conviene reflejar un verbo de clemencia. En español «perdona» transmite bien la idea de no castigar, aunque la base semántica también admite «ahorra» o «tiene compasión».
- source_word: עַל בְּנוֹ הָעֹבֵד אֹתוֹ
  english_pob_choice: his son who serves him
  chosen_spanish: a su hijo que le sirve
  alternatives_spanish:
  - a su hijo que lo sirve
  - a su hijo que trabaja para él
  lexicon: HALOT
  rationale: Se conserva la relación padre-hijo y el sentido de servicio personal. «Le sirve» suena natural en español y preserva el matiz relacional mejor que una formulación más económica o más neutra.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La línea del proyecto exige mantener el nombre propio en español, y «Yahvé» es la forma adoptada para ese nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH'
- issue: Ímpetu de posesión/covenant en סְגֻלָּה
  english_pob_reading: a treasured possession
  chosen_spanish_reading: una posesión especial
  alternative_spanish_readings:
  - un tesoro especial
  - una posesión preciosa
  rationale: Se evita introducir el posesivo «mía» donde la revisión inglesa lo retiró. «Posesión especial» conserva el valor de pertenencia valiosa sin sobrerreformular el sustantivo hebreo.
  doctrine_reference: 'DOCTRINE.md: lexical precision and revision awareness'
- issue: Similitud de compasión en el símil padre-hijo
  english_pob_reading: as a man spares his son who serves him
  chosen_spanish_reading: como un hombre perdona a su hijo que le sirve
  alternative_spanish_readings:
  - como un hombre se apiada de su hijo que le sirve
  - como un hombre lo ahorra a su hijo que le sirve
  rationale: El símil está orientado a la clemencia que evita el castigo. «Perdona» funciona como equivalente idiomático en español, aunque la zona semántica sigue abierta a «apiadarse» o «ahorrar»; no se suprime esa tensión.
  doctrine_reference: 'DOCTRINE.md: preserve lexical/theological tension'
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó el posesivo añadido en «treasured possession» para ajustarse mejor al hebreo. El español sigue esa corrección con «una posesión especial», sin introducir «mía». También se tuvo en cuenta que el simiente verbal de חמל admite más de una solución y no se cerró artificialmente la ambigüedad semántica.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar para יהוה, en coherencia con el proyecto.
  - Se evitó «SEÑOR» como sustituto del nombre divino.
  - «Ejércitos» se conservó para צְבָאוֹת, siguiendo el valor militar/cósmico del título.
  - La frase «una posesión especial» mantiene la posesión y el valor singular de סְגֻלָּה sin sobreexplicación.
  - Se preservó el masculino singular del símil («un hombre», «su hijo») por fidelidad al hebreo.
