translation:
  language: es
  text: 'Y Aquior[a], jefe de todos los hijos de Amón, le dijo: «Oiga ahora mi señor una palabra de la boca de su siervo, y le declararé la verdad acerca del pueblo que habita esta región montañosa, cerca de usted, y ninguna falsedad saldrá de la boca de su siervo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de todos los amonitas». El griego literalmente dice «de todos los hijos de Amón».
    reason: lexical_alternative
  - marker: b
    text: O «de la boca de su siervo». El griego literalmente dice «de la boca de su siervo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀχιὼρ
  english_pob_choice: Achior
  chosen_spanish: Achior
  alternatives_spanish:
  - Achiior
  - Ajor
  lexicon: Convención onomástica
  rationale: Se translitera el nombre propio conforme al uso establecido, sin traducirlo.
- source_word: ὁ ἡγούμενος
  english_pob_choice: the leader
  chosen_spanish: el jefe
  alternatives_spanish:
  - el líder
  - el gobernador
  - el gobernante
  lexicon: BDAG
  rationale: En español, 'jefe' comunica con naturalidad la idea de quien encabeza o dirige, sin cargarlo innecesariamente de un cargo formal que el griego no exige.
- source_word: πάντων υἱῶν Ἀμμών
  english_pob_choice: of all the sons of Ammon
  chosen_spanish: de todos los hijos de Amón
  alternatives_spanish:
  - de todos los amonitas
  - de todos los hijos de Amón
  lexicon: LEH
  rationale: Se conserva la textura literal del hebraísmo/grecismo 'hijos de Amón', que el inglés POB también preserva. 'Amón' mantiene la forma tradicional del nombre en español.
- source_word: Ἀκουσάτω δὴ λόγον
  english_pob_choice: Let my lord now hear a word
  chosen_spanish: Oiga ahora... una palabra
  alternatives_spanish:
  - Escuche ahora... una palabra
  - Que mi señor oiga ahora una palabra
  lexicon: BDAG
  rationale: El imperativo respetuoso con δή se vuelve una súplica cortés en español. 'Oiga ahora' reproduce bien el tono deferente y la urgencia suave.
- source_word: ὁ κύριός μου
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señor
  - mi amo
  lexicon: BDAG
  rationale: Aquí κύριος es un título de respeto dirigido a un superior humano. 'Mi señor' es el equivalente cortés y más natural en español, más fiel al registro que 'mi amo'.
- source_word: ἐκ στόματος τοῦ δούλου σου
  english_pob_choice: from the mouth of your servant
  chosen_spanish: de la boca de su siervo
  alternatives_spanish:
  - de la boca de su esclavo
  - de la boca de su servidor
  lexicon: BDAG
  rationale: '''Siervo'' conserva el matiz autohumillante de la fórmula cortesana y evita una dureza innecesaria en español. Se mantiene además la imagen literal ''de la boca de''.'
- source_word: ἀναγγελῶ σοι τὴν ἀλήθειαν
  english_pob_choice: I will tell you the truth
  chosen_spanish: le declararé la verdad
  alternatives_spanish:
  - le diré la verdad
  - le informaré la verdad
  lexicon: BDAG
  rationale: '''Declararé'' refleja bien la solemnidad de ἀναγγέλλω como anunciar/reportar con franqueza, y suena más formal que ''diré'' sin exagerar.'
- source_word: περὶ τοῦ λαοῦ
  english_pob_choice: about the people
  chosen_spanish: acerca del pueblo
  alternatives_spanish:
  - sobre el pueblo
  - en cuanto al pueblo
  lexicon: BDAG
  rationale: '''Acerca de'' es una preposición clara y natural en español para περὶ.'
- source_word: ὃς κατοικεῖ τὴν ὀρεινὴν ταύτην
  english_pob_choice: who dwell in this hill country
  chosen_spanish: que habita esta región montañosa
  alternatives_spanish:
  - que vive en esta tierra montañosa
  - que habita esta comarca montañosa
  lexicon: LEH
  rationale: '''Región montañosa'' comunica el sentido geográfico de τὴν ὀρεινὴν sin forzar una expresión idiomática inglesa (''hill country'') que en español sería menos natural. ''Habita'' mantiene el registro bíblico.'
- source_word: πλησίον σοῦ οἰκούντος
  english_pob_choice: near you
  chosen_spanish: cerca de usted
  alternatives_spanish:
  - junto a usted
  - cerca de su morada
  lexicon: BDAG
  rationale: 'La frase participial se simplifica de modo natural en español: ''cerca de usted''. Se mantiene el trato respetuoso y el sentido de proximidad.'
- source_word: οὐκ ἐξελεύσεται ψεῦδος
  english_pob_choice: no falsehood will come from the mouth
  chosen_spanish: ninguna mentira saldrá
  alternatives_spanish:
  - no saldrá mentira alguna
  - ninguna falsedad saldrá
  lexicon: BDAG
  rationale: '''Mentira'' es la opción más idiomática en español para ψεῦδος. Se conserva la metáfora de algo que ''sale'' de la boca, como en el griego y el inglés POB.'
theological_decisions:
- issue: Rendering of κύριος in direct address to a human superior
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  rationale: El referente es humano, no divino ni mesiánico. 'Mi señor' preserva el tono cortés y jerárquico, evitando una lectura teológica indebida.
  doctrine_reference: 'DOCTRINE.md: traducir títulos según contexto; no usar formas divinas por defecto para un superior humano.'
- issue: Rendering of δοῦλος in a self-humbling court formula
  english_pob_reading: your servant
  chosen_spanish_reading: su siervo
  alternative_spanish_readings:
  - su esclavo
  - su servidor
  rationale: Aunque δοῦλος puede ser 'esclavo', aquí funciona como fórmula de humildad cortesana. 'Siervo' mantiene el valor relacional sin endurecer el tono.
  doctrine_reference: 'DOCTRINE.md: δοῦλος se rinde según contexto; conservar fuerza lexical cuando sea pertinente, pero no imponer ''esclavo'' en fórmulas deferenciales.'
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del auditrastro: se evitó la segmentación fuerte antes de la cláusula final y se mantuvo una sintaxis continua que refleje mejor la cadena griega de coordinación.'
  spanish_consistency_notes:
  - Se conserva el nombre propio Achior sin adaptar la ortografía.
  - Se mantiene 'hijos de Amón' para reflejar la textura del griego, con nota alternativa al estilo del POB inglés.
  - Se usa un registro cortés y bíblico, pero con español moderno natural.
  - Se evita 'SEÑOR' para κύριος porque aquí el referente es humano.
  - Se mantiene la imagen literal de la boca tanto en la primera como en la última cláusula.
