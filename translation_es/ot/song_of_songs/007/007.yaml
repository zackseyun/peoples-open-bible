translation:
  language: es
  text: ¡Qué hermosa eres y qué encantadora, oh amor[a], entre delicias[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amada» o «mi amor». אַהֲבָה funciona aquí como vocativo; el hebreo literalmente dice «amor».
    reason: lexical_alternative
  - marker: b
    text: O «en delicias» o «en medio de delicias». La expresión hebrea בַּתַּעֲנוּגִים es breve y puede señalar la esfera de delicia o caracterizar a la amada por delicias.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: How
  chosen_spanish: ¡Qué!
  alternatives_spanish:
  - Cómo
  - Cuán
  lexicon: HALOT
  rationale: El exclamativo מַה ante un adjetivo/verbio expresa admiración, no pregunta. En español, «Qué» reproduce naturalmente ese valor exclamativo y poético.
- source_word: יָּפִית
  english_pob_choice: beautiful you are
  chosen_spanish: hermosa eres
  alternatives_spanish:
  - bella eres
  - eres hermosa
  lexicon: HALOT
  rationale: יָּפִית es la 2ª fem. sing. dirigida a la amada. «Hermosa eres» mantiene el orden enfático y suena más natural en español poético que una calca literal.
- source_word: וּ/מַה
  english_pob_choice: and how
  chosen_spanish: y qué
  alternatives_spanish:
  - y cómo
  - y cuán
  lexicon: HALOT
  rationale: La conjunción y el exclamativo repetido intensifican el elogio. «Y qué» conserva la paralelismo y la fuerza admirativa sin forzar el español.
- source_word: נָּעַמְתְּ
  english_pob_choice: delightful
  chosen_spanish: deleitosa
  alternatives_spanish:
  - agradable
  - dulce
  - lovable
  lexicon: HALOT
  rationale: De נעם, con sentido de agrado, dulzura y encanto. «Deleitosa» armoniza con el campo semántico de delicias/delicias del verso final.
- source_word: אַהֲבָה
  english_pob_choice: O love
  chosen_spanish: oh amor
  alternatives_spanish:
  - oh amada
  - oh amada mía
  - oh amor mío
  lexicon: HALOT
  rationale: El término funciona aquí como vocativo. «Oh amor» conserva el sustantivo abstracto usado como apelativo, sin añadir el posesivo «mío» que no está explícito en hebreo.
- source_word: בַּתַּעֲנוּגִים
  english_pob_choice: among delights
  chosen_spanish: entre delicias
  alternatives_spanish:
  - en delicias
  - entre deleites
  - en medio de delicias
  lexicon: HALOT
  rationale: La preposición ב con el plural de תענוג puede indicar esfera o acompañamiento. «Entre delicias» sigue la lectura espacial/ambital del inglés revisado y evita añadir posesivos o matices no marcados por el hebreo.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una formulación más explicativa a «among delights» para reflejar mejor בַּתַּעֲנוּגִים y evitar añadir «your». La versión española sigue esa decisión, manteniendo la ambigüedad de esfera/acompañamiento con «entre delicias».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, aunque este versículo no contiene el nombre divino.
  - Se usa vocabulario de poesía amorosa sin recurrir a formulaciones eclesiásticas tradicionales que no están exigidas por el hebreo.
  - Se preserva el vocativo de אַהֲבָה sin convertirlo en un posesivo no explicitado.
