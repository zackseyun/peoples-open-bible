    rationale: La nota inglesa [a] comenta la posibilidad de leer toda la relación «silver / income» de otro modo, no simplemente la primera ocurrencia de «plata». En español es mejor anclar la nota a la segunda «plata» para evitar que parezca solo una glosa léxica de la primera palabra.
  - severity: low
