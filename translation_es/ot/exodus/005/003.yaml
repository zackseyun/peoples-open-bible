translation:
  language: es
  text: 'Y dijeron[a]: «El Dios de los hebreos ha salido a nuestro encuentro[b]. Por favor, déjanos ir un viaje de tres días al desierto, y ofrezcamos sacrificios a Yahvé nuestro Dios, no sea que él caiga sobre nosotros con peste o con espada».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O sencillamente, «dijeron».
    reason: Estilo/seguimiento opcional del marcador presente en el inglés POB sobre la apertura de cita, sin afectar el sentido principal.
  - marker: b
    text: 'O: «nos ha llamado». El hebreo puede denotar que Dios se ha encontrado con ellos o que los ha convocado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהֵי הָעִבְרִים
  english_pob_choice: The God of the Hebrews
  chosen_spanish: El Dios de los hebreos
  alternatives_spanish:
  - El Dios de los israelitas
  lexicon: HALOT
  rationale: Conserva el etnónimo 'hebreos' del hebreo עִבְרִים, que en este contexto narrativo identifica al pueblo por su designación histórica/étnica. 'Israelitas' suavizaría la forma fuente y perdería esa precisión.
- source_word: נִקְרָא עָלֵינוּ
  english_pob_choice: has met with us
  chosen_spanish: ha salido a nuestro encuentro
  alternatives_spanish:
  - nos ha llamado
  - ha encontrado con nosotros
  lexicon: HALOT
  rationale: El nifal de קרא con עַל puede expresar encuentro o convocatoria. En español, 'salir al encuentro' comunica bien la idea de una reunión/encuentro divino sin reducirla a una mera 'llamada' abstracta.
- source_word: נֵלֲכָה נָּא
  english_pob_choice: Please let us go
  chosen_spanish: Por favor, vayamos
  alternatives_spanish:
  - Por favor, dejadnos ir
  - Vayamos, por favor
  lexicon: HALOT
  rationale: El cohortativo transmite una petición decidida; 'vayamos' conserva la fuerza de propuesta/solicitud. 'Por favor' refleja נָא de manera natural en español.
- source_word: דֶּרֶךְ שְׁלֹשֶׁת יָמִים
  english_pob_choice: a journey of three days
  chosen_spanish: un camino de tres días
  alternatives_spanish:
  - un viaje de tres días
  - una jornada de tres días
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y puede referir distancia/tiempo. 'Un camino de tres días' mantiene cercanía literal y resulta natural en español bíblico contemporáneo.
- source_word: בַּמִּדְבָּר
  english_pob_choice: into the wilderness
  chosen_spanish: al desierto
  alternatives_spanish:
  - al desierto salvaje
  - al yermo
  lexicon: HALOT
  rationale: Aunque 'wilderness' puede abarcar terreno silvestre, en español 'desierto' comunica de forma más clara el ámbito apartado de la escena. Se evita una paráfrasis más amplia que diluya el contraste narrativo.
- source_word: וְנִזְבְּחָה
  english_pob_choice: and let us sacrifice
  chosen_spanish: y sacrificaremos
  alternatives_spanish:
  - y ofrezcamos sacrificio
  - para que sacrifiquemos
  lexicon: HALOT
  rationale: El cohortativo enlazado al pedido expresa propósito/resultado deseado. 'Sacrificaremos' conserva la secuencia verbal del hebreo; 'ofrezcamos sacrificio' sería posible, pero menos directo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé Dios
  - al SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la política del proyecto: el Tetragrámaton se vierte como ''Yahvé'' en el texto principal, sin recurrir a la convención de ocultarlo con ''SEÑOR''.'
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - a fin de que no
  lexicon: HALOT
  rationale: '''No sea que'' conserva la advertencia/previsión de פֶּן con un registro natural y digno en español.'
- source_word: יִפְגָּעֵנוּ
  english_pob_choice: he fall upon us
  chosen_spanish: nos salga al encuentro
  alternatives_spanish:
  - nos golpee
  - nos hiera
  lexicon: HALOT
  rationale: פגע puede abarcar encuentro hostil o aflictivo. Aquí se preserva la tensión del verbo con una formulación que permite tanto el matiz de encuentro como el de irrupción peligrosa, sin decidir prematuramente por una violencia más específica que el hebreo puede sugerir.
- source_word: בַּדֶּבֶר
  english_pob_choice: with plague
  chosen_spanish: con la peste
  alternatives_spanish:
  - con la plaga
  - con enfermedad mortífera
  lexicon: HALOT
  rationale: דֶּבֶר designa pestilencia/plaga. 'Peste' es una equivalencia española precisa y reconocible en contexto de juicio divino.
- source_word: בֶחָרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - a espada
  lexicon: HALOT
  rationale: '''Con la espada'' sigue el paralelismo instrumental del hebreo y mantiene la estructura simétrica con ''con la peste''.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto fuente usa explícitamente el Tetragrámaton. Conforme a la política del proyecto, se preserva el nombre divino como 'Yahvé' en el texto español, evitando la sustitución litúrgica 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Alcance de פגע en la clausula de advertencia
  english_pob_reading: he fall upon us
  chosen_spanish_reading: nos salga al encuentro
  alternative_spanish_readings:
  - nos golpee
  - nos hiera
  rationale: El hebreo deja abierta una tensión entre 'encontrar/alcanzar' y 'atacar/afligir'. La versión española conserva esa ambigüedad productiva con una expresión de encuentro que puede entenderse como encuentro adverso, sin borrar el matiz del verbo.
  doctrine_reference: 'HALOT: פגע; Ex 5:3 context of feared divine judgment'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió mantener la secuencia cohortativa con 'and let us sacrifice' y una formulación más literal para פגע. En español, se optó por conservar esa cercanía sintáctica con 'y sacrificaremos' y por una expresión que mantiene la tensión semántica de 'nos salga al encuentro' sin perder el posible sentido adverso.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton, conforme a la terminología del proyecto.
  - '''Hebreos'' se conserva frente a posibles nivelaciones con ''israelitas'' para respetar el etnónimo fuente.'
  - '''Peste'' y ''espada'' forman un paralelismo instrumental claro en español.'
  - El registro busca ser moderno y digno, sin calcos innecesarios del inglés ni arcaísmos devocionales no justificados.
