review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: sacrificio pascual dedicado a Yahvé, referencia a las casas de los hijos de Israel, juicio sobre Egipto, liberación de las casas, y la respuesta reverente del pueblo. Sin embargo, hay dos desajustes importantes con el expediente auditado: (1) los marcadores de notas [a]/[c] están anclados a frases equivocadas en el texto español en relación con sus contenidos; (2) «pasó por alto» suena demasiado a omisión o desatención en español y debilita el vínculo léxico-teológico con Pascua/פָּסַח, mientras que «pasó de largo» o «pasó sobre» conservan mejor el sentido narrativo con la nota explicativa.'
  spanish_quality_summary: El español es claro y digno, pero requiere ajuste menor para mayor naturalidad bíblica y precisión semántica. «Dirán» es aceptable en contexto de discurso indirecto imperatival, aunque «Dirán»/«diréis» depende del marco; aquí puede mantenerse. «Se inclinó y adoró» funciona bien como resolución de la secuencia verbal, aunque el sujeto colectivo singular con segundo verbo singular es idiomático por «el pueblo». La principal mejora de legibilidad y fidelidad es sustituir «pasó por alto» por «pasó de largo», que evita una connotación moderna de 'ignorar' y encaja mejor con Éxodo 12.
  glossary_alignment: Se preserva correctamente «Yahvé» para יהוה y «hijos de Israel» para בְנֵי יִשְׂרָאֵל, en línea con las pautas del proyecto. «El sacrificio de la Pascua» es una buena solución para זֶבַח פֶּסַח. «Libró nuestras casas» es adecuado para הִצִּיל. No obstante, la explicación léxica de פָּסַח debe corresponder al anclaje correcto en la nota, y conviene mejorar la formulación principal a «pasó de largo» para no introducir una falsa idea de mero descuido.
  issues:
  - severity: high
    issue: Los marcadores de notas [a] y [c] están colocados sobre frases distintas de aquellas que explican.
    rationale: La nota a habla de alternativas para «las casas de los hijos de Israel», pero está anclada a «pasó por alto». La nota c habla de «libró nuestras casas / rescató nuestras casas», pero está anclada a «Yahvé». Esto incumple la disciplina requerida de anclar cada nota exactamente en la palabra o frase pertinente.
  - severity: medium
    issue: «Pasó por alto» no es la mejor opción para פָּסַח en este contexto.
    rationale: Aunque puede comunicar que no hirió esas casas, en español moderno suele sugerir 'ignorar' o 'omitir', y debilita el nexo con «Pascua». «Pasó de largo» preserva mejor la escena narrativa; la nota puede aclarar el matiz de proteger/dejar a salvo.
  revised_spanish_text: 'Dirán: «Es el sacrificio de la Pascua para Yahvé, quien pasó de largo[b] las casas de los hijos de Israel[a] en Egipto, cuando hirió a Egipto y libró[c] nuestras casas». Y el pueblo se inclinó y adoró.'
  revised_footnotes:
