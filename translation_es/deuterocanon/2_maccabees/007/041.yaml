translation:
  language: es
  text: Y por último[a], después de los hijos, murió la madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y de último entre los hijos, la madre murió». La frase griega puede entenderse como una breve indicación de secuencia; esta traducción hace explícito ese sentido en español, mientras que la alternativa sigue más de cerca la forma del texto fuente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσχάτῃ
  english_pob_choice: last
  chosen_spanish: al final
  alternatives_spanish:
  - por último
  - finalmente
  lexicon: BDAG
  rationale: El dativo femenino singular de ἔσχατος funciona aquí con valor adverbial de secuencia. En español, «al final» conserva la brevedad narrativa y la idea de orden temporal sin introducir una paráfrasis más interpretativa.
- source_word: τῶν υἱῶν
  english_pob_choice: of the sons
  chosen_spanish: de los hijos
  alternatives_spanish:
  - de los hijos varones
  - de sus hijos
  lexicon: BDAG
  rationale: υἱῶν significa específicamente «hijos varones» / «sons». En español, «de los hijos» comunica el vínculo de forma natural y breve; «de sus hijos» añadiría un posesivo no explícito en el griego.
- source_word: ἡ μήτηρ
  english_pob_choice: the mother
  chosen_spanish: la madre
  alternatives_spanish:
  - su madre
  lexicon: BDAG
  rationale: El artículo con el sustantivo identifica a la madre sin un posesivo explícito. Por fidelidad al griego, se evita añadir «su» en el texto principal.
- source_word: ἐτελεύτησεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - llegó a su fin
  lexicon: BDAG
  rationale: τελευτάω suele significar «morir» o «llegar al fin». «Murió» es la equivalencia más directa y sobria en español, y preserva la concisión solemne del griego.
translation_notes:
  revision_awareness: El texto inglés POB quedó sin cambios en su revisión más reciente, y el veredicto de control fue de acuerdo moderado con observaciones menores; por eso la propuesta española conserva la misma lectura básica y refleja la alternativa de secuencia en nota.
  spanish_consistency_notes:
  - Se mantiene «madre» sin posesivo, porque el griego no lo expresa.
  - Se usa «murió» para ἐτελεύτησεν, evitando eufemismos.
  - La nota conserva la alternativa temporal que el auditor inglés ya documentó, adaptada al español natural.
  - No hay decisiones teológicas específicas en este versículo; el reto es principalmente sintáctico y de secuencia.
