review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del hebreo: doble imperativo militar, objetivo como «nación», seguridad despreocupada, fórmula profética con «Yahvé», falta de defensas y cierre con habitación separada. Sin embargo, «habitan solitaria y aparte» no refleja con naturalidad ni precisión el hebreo בָּדָד יִשְׁכֹּנוּ, que es plural y significa más sencillamente «habitan solos / aparte».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta un problema notable de concordancia y naturalidad en «habitan solitaria y aparte». Además, la nota [a] está mal anclada: el texto marca [a] en «Levántense», pero la nota explica «tranquila». Conviene corregir el anclaje y suavizar el final para una lectura más idiomática.'
  glossary_alignment: Buen cumplimiento del proyecto en «Yahvé». «nación», «declara Yahvé» y «cerrojo» son aceptables. «tranquila» como opción para שׁליו encaja con la nota alternativa, pero el marcador debe colocarse sobre ese término, no sobre el imperativo. No hay conflictos terminológicos mayores fuera de eso.
  issues:
  - severity: medium
    issue: Marcador de nota [a] mal ubicado
    rationale: La nota [a] trata del sentido de «tranquila», pero el marcador aparece en «Levántense». Esto incumple la disciplina requerida de anclar la nota al término pertinente.
  - severity: medium
    issue: Final «habitan solitaria y aparte» es poco natural y gramaticalmente defectuoso
    rationale: «Habitan» es plural, pero «solitaria» está en singular femenino. Además, la duplicación «solitaria y aparte» suena forzada y sobretraduce בָּדָד. Una forma como «habitan solas» o «habitan aparte» refleja mejor el hebreo y el español.
  - severity: low
    issue: «suban contra» es algo hebraísta
    rationale: Aunque defendible por עלה + אל en contexto bélico, en español «suban contra» suena menos natural que «suban contra» dentro de un registro bíblico; no requiere cambio obligatorio en una revisión menor porque sigue siendo comprensible y cercano al original.
  revised_spanish_text: ¡Levántense, suban contra una nación tranquila[a], que habita confiada, declara Yahvé, que no tiene puertas ni cerrojo[b]; habitan solas.
  revised_footnotes:
  - marker: a
    text: O «complaciente» o «confiada en exceso» para el sentido de «tranquila».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sin puertas y sin cerrojo/barra»; la idea es que están sin fortificación y se sienten seguras.
    reason: cultural_note
