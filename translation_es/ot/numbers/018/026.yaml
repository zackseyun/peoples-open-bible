translation:
  language: es
  text: 'Y a los levitas hablarás y les dirás: Cuando toméis de los hijos de Israel el diezmo que yo os he dado de ellos como vuestra herencia, entonces ofreceréis de él la contribución de Yahvé[a], un diezmo del diezmo[c][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “la contribución para Yahvé”; tradicionalmente, “la ofrenda elevada de Yahvé”.
    reason: lexical_alternative
  - marker: b
    text: Lit., “del diezmo”; es decir, una décima parte del diezmo recibido por los levitas.
    reason: lexical_alternative
  - marker: c
    text: O “un diezmo de ese diezmo”.
    reason: alternative_reading
lexical_decisions:
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíticos
  - los hombres levitas
  lexicon: HALOT
  rationale: Es el equivalente natural y reconocido en español para la tribu/clase levítica. Conserva el referente tribal sin artificio.
- source_word: תְּדַבֵּר ... וְאָמַרְתָּ
  english_pob_choice: you shall speak and say
  chosen_spanish: hablarás ... les dirás
  alternatives_spanish:
  - dirás
  - hablarás y dirás
  lexicon: HALOT
  rationale: Mantiene la duplicación verbal hebrea en una forma española fluida. 'Hablarás y dirás' sería demasiado mecánico; 'hablarás ... les dirás' preserva el encargo de comunicación formal.
- source_word: כִּי תִקְחוּ
  english_pob_choice: When you take
  chosen_spanish: Cuando toméis
  alternatives_spanish:
  - Porque tomaréis
  - Si tomáis
  lexicon: HALOT
  rationale: El valor circunstancial de כִּי aquí se expresa mejor con 'cuando' que con una causal o una condicional fuerte. Se conserva el sentido procedimental del mandato.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la forma hebrea masculina y su fuerza literal. 'Los israelitas' sería posible, pero suaviza la formulación explícita del texto.
- source_word: הַמַּעֲשֵׂר
  english_pob_choice: the tithe
  chosen_spanish: el diezmo
  alternatives_spanish:
  - la décima parte
  lexicon: HALOT
  rationale: En español bíblico y culto, 'diezmo' es el término claro y exacto para la porción del diez por ciento requerida.
- source_word: אֲשֶׁר נָתַתִּי לָכֶם מֵאִתָּם
  english_pob_choice: that I have given you from them
  chosen_spanish: que yo os he dado de ellos
  alternatives_spanish:
  - que os di de entre ellos
  - que os he asignado de parte de ellos
  lexicon: HALOT
  rationale: Preserva el don divino y el origen del diezmo. 'De ellos' refleja bien la relación fuente-destino sin añadir explicación excesiva.
- source_word: בְּנַחֲלַתְכֶם
  english_pob_choice: as your inheritance
  chosen_spanish: como vuestra herencia
  alternatives_spanish:
  - como vuestra posesión heredada
  - por herencia vuestra
  lexicon: HALOT
  rationale: '''Herencia'' comunica bien la idea de porción asignada. ''Como vuestra herencia'' mantiene la fuerza predicativa del hebreo y suena natural en español.'
- source_word: וַהֲרֵמֹתֶם
  english_pob_choice: you shall offer up
  chosen_spanish: ofreceréis
  alternatives_spanish:
  - elevaréis
  - presentaréis
  lexicon: HALOT
  rationale: En este contexto cultual, 'ofreceréis' transmite la acción de apartar/presentar una porción para Dios de forma más natural que un calco de 'levantar'.
- source_word: תְּרוּמַת יְהוָה
  english_pob_choice: Yahweh’s contribution
  chosen_spanish: la contribución de Yahvé
  alternatives_spanish:
  - la ofrenda de Yahvé
  - la contribución para Yahvé
  lexicon: HALOT
  rationale: '''Contribución'' refleja el valor de תְּרוּמָה como porción apartada. Se mantiene ''Yahvé'' según la norma del proyecto para el Tetragrámaton.'
- source_word: מַעֲשֵׂר מִן הַמַּעֲשֵׂר
  english_pob_choice: a tithe of the tithe
  chosen_spanish: un diezmo del diezmo
  alternatives_spanish:
  - un diezmo de ese diezmo
  - la décima parte del diezmo
  lexicon: HALOT
  rationale: Es la formulación más breve y fiel en español. Conserva la repetición enfática y la relación cuantitativa del texto hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto español usa 'Yahvé' como forma principal para el Tetragrámaton. Se evita 'SEÑOR' porque aquí el texto hebreo nombra explícitamente a YHWH en la frase de ofrenda.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la forma masculina del hebreo para respetar la precisión de la fuente y la política de mantener la expresión covenantal explícita.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: תְּרוּמַת יְהוָה
  english_pob_reading: Yahweh’s contribution
  chosen_spanish_reading: la contribución de Yahvé
  alternative_spanish_readings:
  - la ofrenda de Yahvé
  - la contribución para Yahvé
  rationale: '''Contribución'' evita la opacidad de ''heave offering'' y mantiene la idea de una porción apartada para Dios. Se preserva la tensión cultual sin introducir vocabulario eclesiástico posterior.'
  doctrine_reference: HALOT; DOCTRINE.md Contested terms
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió 'present' por 'offer up' para reflejar mejor el matiz de elevar/ofrecer en הֲרֵמֹתֶם y ajustó 'a tithe from the tithe' a 'a tithe of the tithe' por fluidez y literalidad. La redacción española sigue esa revisión con 'ofreceréis' y 'un diezmo del diezmo'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el nombre divino, conforme al estándar del proyecto en español.
  - '''Diezmo'' se usa de manera uniforme para מַעֲשֵׂר, reservando ''contribución'' para תְּרוּמָה.'
  - La frase 'los hijos de Israel' conserva la forma hebrea documentada por el audit trail.
  - La puntuación con dos puntos reproduce adecuadamente la estructura de mandato seguido de circunstancia.
  - Los marcadores de nota [a], [b], [c] aparecen anclados en los términos relevantes del texto.
