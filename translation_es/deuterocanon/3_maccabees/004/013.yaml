translation:
  language: es
  text: Enfurecido[a], ordenó que también a estos se los tratara exactamente de la misma manera que a aquellos, cuidadosamente, sin disminuir en nada el castigo que se les había dado a aquellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tratar también a estos con el mismo método, cuidadosamente, como a aquellos otros». El giro griego con τρόπων es algo inusual; la idea es que este grupo debía recibir el mismo castigo que el anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διοργισθείς
  english_pob_choice: Enraged
  chosen_spanish: Enfurecido
  alternatives_spanish:
  - Muy enojado
  - Irritado profundamente
  - Encolerizado
  lexicon: LSJ
  rationale: El participio aoristo pasivo expresa estar intensamente airado. «Enfurecido» conserva la intensidad y suena natural en español actual.
- source_word: προσέταξεν
  english_pob_choice: he ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio órdenes
  - comandó
  lexicon: LSJ
  rationale: El verbo indica una orden autoritativa. «Ordenó» es claro, idiomático y fiel al registro narrativo.
- source_word: καὶ τούτοις ὁμοῦ
  english_pob_choice: that these men too
  chosen_spanish: también a estos
  alternatives_spanish:
  - a estos también
  - a estos asimismo
  - también a estos hombres
  lexicon: LSJ
  rationale: La fuerza aditiva de τούτοις ὁμοῦ se expresa con «también». Se evita añadir «hombres» porque no es explícito en el griego.
- source_word: τὸν αὐτὸν τρόπων
  english_pob_choice: in exactly the same way
  chosen_spanish: exactamente de la misma manera
  alternatives_spanish:
  - de la misma manera
  - con el mismo método
  - del mismo modo
  lexicon: LSJ
  rationale: La construcción es algo irregular en griego, pero el sentido es de identidad de trato. «Exactamente de la misma manera» conserva la equivalencia sin sonar forzado.
- source_word: ἐπιμελῶς
  english_pob_choice: carefully
  chosen_spanish: con cuidado
  alternatives_spanish:
  - diligentemente
  - cuidadosamente
  - con esmero
  lexicon: LSJ
  rationale: El adverbio indica ejecución atenta y cuidadosa. «Con cuidado» refleja bien esa diligencia en un español natural.
- source_word: ὡς ἐκείνοις ποιῆσαι
  english_pob_choice: as those others were
  chosen_spanish: que a aquellos
  alternatives_spanish:
  - como a aquellos
  - tal como a aquellos
  - igual que a aquellos
  lexicon: LSJ
  rationale: 'La idea comparativa se vierte en español con una subordinada natural: tratar a este grupo igual que al anterior. La pasiva refleja mantiene la estructura sin sobrecargar la frase.'
- source_word: μὴ λειπομένους
  english_pob_choice: falling short in no way
  chosen_spanish: sin quedarse en modo alguno cortos
  alternatives_spanish:
  - sin faltar en nada
  - sin omitir nada
  - sin quedarse atrás en nada
  lexicon: LSJ
  rationale: El participio con μή expresa no quedar por debajo ni fallar en la ejecución. «Sin quedarse en modo alguno cortos» conserva esa idea de no quedar deficientes.
- source_word: κατὰ μηδένα τρόπον
  english_pob_choice: in no way
  chosen_spanish: en modo alguno
  alternatives_spanish:
  - de ningún modo
  - en nada
  - bajo ningún concepto
  lexicon: LSJ
  rationale: La locución intensifica la negación. «En modo alguno» es formal, clara y equivalente.
- source_word: τῆς ἐκείνων τιμωρίας
  english_pob_choice: of their punishment
  chosen_spanish: en su castigo
  alternatives_spanish:
  - de su castigo
  - del castigo de aquellos
  - de la pena que recibieron
  lexicon: LSJ
  rationale: τιμωρία tiene sentido punitivo. «Castigo» comunica la idea de sanción infligida, y la referencia a «aquellos» queda resuelta por el contexto inmediato.
translation_notes:
  revision_awareness: Se siguió el último ajuste auditado del inglés, que prefirió una formulación más formal y directa para ‘be treated in exactly the same way as those others’. En español se mantuvo esa equivalencia con una pasiva refleja natural y se preservó la intensidad de la negación final.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde al nombre divino; aquí no aparece ninguna referencia al tetragrámaton.
  - Se evitó «Cristo/Mesías» porque el versículo no contiene terminología mesiánica.
  - Se eligió «castigo» para τιμωρία por su fuerza punitiva y por concordar con el contexto narrativo de sanción.
  - La nota [a] queda anclada explícitamente en el texto para evitar marcadores huérfanos.
