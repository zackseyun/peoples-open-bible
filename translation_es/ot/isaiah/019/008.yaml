revisions:
- from: Y los pescadores se lamentarán[a], y todos los que echan un anzuelo en el Nilo se entristecerán[b]; los que extienden una red sobre las aguas languidecerán.
  to: Y los pescadores se lamentarán[a], y todos los que echan un anzuelo en el Nilo harán duelo[b]; los que extienden una red sobre las aguas se consumirán.
  rationale: Se reemplazó «se entristecerán» por «harán duelo» para reflejar con más fidelidad el valor de אבל como duelo/luto. Se ajustó «languidecerán» a «se consumirán» para dar una representación principal más fuerte y natural del hebreo אֻמְלָלוּ, manteniendo «languidecerán» como alternativa en nota según la auditoría inglesa.
