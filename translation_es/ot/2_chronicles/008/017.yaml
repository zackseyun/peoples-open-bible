translation:
  language: es
  text: Entonces Salomón fue a Ezión-geber y a Elot[a], a la orilla del mar, en la tierra de Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Elot también se escribe «Elath» o «Elat» en otras lenguas o tradiciones de transliteración.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca temporal y narrativa de secuencia. «Entonces» mantiene el valor discursivo de inicio de evento en una forma natural en español.
- source_word: הָלַךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - viajó
  - anduvo
  lexicon: HALOT
  rationale: En español, «fue» comunica el movimiento narrativo de manera breve y natural sin introducir matices de caminata física ni de viaje extensivo que el hebreo no exige aquí.
- source_word: לְעֶצְיוֹן גֶּבֶר
  english_pob_choice: to Ezion-geber
  chosen_spanish: a Ezión-geber
  alternatives_spanish:
  - a Ezion Geber
  lexicon: HALOT
  rationale: Se conserva el topónimo compuesto con transliteración cercana a la forma hebrea y al uso bíblico habitual en español. El guion refleja la unidad del nombre.
- source_word: וְאֶל אֵילוֹת
  english_pob_choice: and to Eloth
  chosen_spanish: y a Elot
  alternatives_spanish:
  - y a Elot[a]
  - y a Elath
  lexicon: HALOT
  rationale: Se mantiene el nombre propio con transliteración directa del hebreo אֵילוֹת. «Elot» es una forma transparente para el lector español y evita depender de una grafía inglesa como norma principal.
- source_word: עַל שְׂפַת הַיָּם
  english_pob_choice: on the shore of the sea
  chosen_spanish: sobre la orilla del mar
  alternatives_spanish:
  - en la orilla del mar
  - a la orilla del mar
  lexicon: HALOT
  rationale: «שְׂפַת» nombra el borde/orilla; «sobre la orilla del mar» reproduce la relación espacial con buena naturalidad en español y sin perder la concreción geográfica.
- source_word: בְּאֶרֶץ אֱדֽוֹם
  english_pob_choice: in the land of Edom
  chosen_spanish: en la tierra de Edom
  alternatives_spanish:
  - en el país de Edom
  - en Edom
  lexicon: HALOT
  rationale: El hebreo incluye explícitamente «tierra», por lo que se conserva el sustantivo. «Tierra de Edom» mantiene la extensión territorial implícita y es idiomático en registro bíblico.
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió revisiones y presenta alta concordancia con el texto hebreo. La redacción española sigue esa misma lectura base, conservando la secuencia narrativa, los topónimos y la localización geográfica sin añadir interpretación.
  spanish_consistency_notes:
  - Se prefirió «Entonces» para la marca temporal inicial, en paralelo funcional con el inglés «Then».
  - Se mantuvo «tierra de Edom» para reflejar el hebreo בְּאֶרֶץ sin reducirlo a un simple localismo.
  - Los topónimos se transliteran de modo estable y legible para una audiencia bíblica en español.
