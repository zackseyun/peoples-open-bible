translation:
  language: es
  text: En cuanto a Dios, su camino es intachable; la palabra de Yahvé es probada[a]; él es escudo para todos los que se refugian en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «refinada» o «probada por el fuego»; la imagen hebrea evoca metal purificado en el horno.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵל
  english_pob_choice: As for God
  chosen_spanish: En cuanto a Dios
  alternatives_spanish:
  - Dios
  - Respecto de Dios
  lexicon: HALOT
  rationale: La construcción hebrea introduce el enunciado con valor tópico/enfático. En español, «En cuanto a Dios» comunica ese arranque discursivo sin volverlo rígido o poco natural.
- source_word: תָּמִים
  english_pob_choice: blameless
  chosen_spanish: intachable
  alternatives_spanish:
  - sin defecto
  - perfecto
  - íntegro
  lexicon: HALOT
  rationale: Aquí describe el camino de Dios como sin falla moral o cualitativa. «Intachable» conserva esa idea de ausencia de defecto y suena natural en español actual; «perfecto» puede sonar excesivo o ambiguo.
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su manera de obrar
  lexicon: HALOT
  rationale: «Camino» mantiene la imagen hebrea de דרך y en contexto puede abarcar tanto el curso de acción como la conducta de Dios.
- source_word: אִמְרַת יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el dicho de Yahvé
  - la declaración de Yahvé
  - la promesa de Yahvé
  lexicon: HALOT
  rationale: אָמַר/אִמְרָה puede referir palabra, dicho o utterance. La formulación «la palabra de Yahvé» preserva amplitud semántica y la terminología doctrinal del nombre divino en español.
- source_word: צְרוּפָה
  english_pob_choice: proven
  chosen_spanish: probada
  alternatives_spanish:
  - refinada
  - ensayada
  - purificada
  lexicon: HALOT
  rationale: El término evoca metal pasado por el fuego, con la idea de ser examinado y hallado genuino. «Probada» comunica bien ese resultado en español sin perder la tensión metáforica.
- source_word: מָגֵן
  english_pob_choice: a shield
  chosen_spanish: escudo
  alternatives_spanish:
  - protección
  - adarga
  lexicon: HALOT
  rationale: El sustantivo es literal y metafórico. En español, «escudo» conserva la imagen de defensa directa y funciona bien en el predicado nominal.
- source_word: הַחֹסִים בּוֹ
  english_pob_choice: who take refuge in him
  chosen_spanish: los que se refugian en él
  alternatives_spanish:
  - los que buscan refugio en él
  - los que confían en él
  lexicon: HALOT
  rationale: חסה expresa buscar refugio/protección, no solo una confianza abstracta. «Se refugian en él» preserva la imagen concreta y la relación de amparo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Siguiendo la decisión doctrinal del POB para el Tetragrámaton, se usa «Yahvé» para conservar el nombre propio del pacto en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de צְרוּפָה en relación con la palabra divina
  english_pob_reading: proven
  chosen_spanish_reading: probada
  alternative_spanish_readings:
  - refinada
  - ensayada
  - purificada
  rationale: 'La metáfora metalúrgica no se aplana a mera abstracción: «probada» deja ver que la palabra de Yahvé ha sido sometida a prueba y se ha mostrado genuina, sin añadir matices doctrinales ajenos.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern Spanish; optimal equivalence'
translation_notes:
  revision_awareness: El borrador sigue de cerca el acuerdo alto del audit trail inglés y conserva la estructura poética del versículo. No se adoptaron revisiones adicionales porque el texto inglés auditado ya fue evaluado como estable y sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme a la terminología POB.
  - Se eligió lenguaje contemporáneo y eclesialmente legible, evitando calcos innecesarios.
  - La imagen de refugio/escudo se conserva de manera coherente en toda la cláusula final.
  - «Intachable» y «probada» intentan sostener el paralelismo con un tono natural en español.
