    rationale: El hebreo termina en mem final, no en nun. 'Shafam' preserva mejor el nombre fuente y evita confusión con otros nombres bíblicos como Safán/Shaphan.
  - severity: medium
    issue: '''Safat'' debilita la consistencia de transliteración para שָׁפָט.'
    rationale: Dado que el borrador ya usa 'Shafán', eliminar la h aquí crea inconsistencia. 'Shafat' o 'Shaphat' sería más fiel; 'Shafat' funciona bien en español.
  - severity: low
    issue: '''Jaánai'' es posible, pero ''Jaanai'' mantiene mejor la forma auditada y evita acentuación dudosa.'
    rationale: No es un error grave, pero la forma sin tilde sigue de cerca la representación POB y evita imponer una prosodia española no evidente en el expediente.
  revised_spanish_text: Joel el jefe, Shafam el segundo[a], y Jaanai y Shafat en Basán.
