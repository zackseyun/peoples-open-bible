  text: וַ/יִּקַּ֨ח יְהוֹשֻׁ֜עַ אֶת כָּל הָ/אָ֣רֶץ הַ/זֹּ֗את הָ/הָ֤ר וְ/אֶת כָּל הַ/נֶּ֨גֶב֙ וְ/אֵת֙ כָּל אֶ֣רֶץ הַ/גֹּ֔שֶׁן וְ/אֶת הַ/שְּׁפֵלָ֖ה וְ/אֶת הָ/עֲרָבָ֑ה וְ/אֶת הַ֥ר יִשְׂרָאֵ֖ל וּ/שְׁפֵלָתֹֽ/ה־־־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/joshua/011/016.yaml
  text: 'So Joshua took all this land: the hill country[a], all the Negev, all the land of Goshen, the lowland, the Arabah, the hill country of Israel[c][b], and its lowland.'
  footnotes:
  - marker: a
    text: Or 'the Shephelah' for 'the lowland' (also later in the verse). The Hebrew term refers to the low hill region between the central highlands and the coastal plain.
    reason: lexical_alternative
  - marker: b
    text: '''The Arabah'' is a regional geographic term; some render it more interpretively as ''the Jordan Valley'' or ''the desert plain.'''
    reason: lexical_alternative
  - marker: c
    text: '''The land of Goshen'' here refers to a region in Canaan, not necessarily the Goshen in Egypt.'
    reason: cultural_note
