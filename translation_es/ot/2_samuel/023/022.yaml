translation:
  language: es
  text: Estas cosas hizo Benaía hijo de Joyadá, y tuvo nombre[a] entre los tres valientes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "y tuvo fama" o "y fue renombrado". El hebreo dice literalmente: "y tuvo un nombre".'
    reason: lexical_alternative
  - marker: b
    text: Algunos intérpretes entienden esto a la luz de la lista más amplia de los guerreros de David y comparan lecturas relacionadas con "los treinta"; aquí el texto hebreo dice "los tres".
    reason: textual_variant
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These things
  chosen_spanish: Estas cosas
  alternatives_spanish:
  - Estas
  - Tales cosas
  lexicon: HALOT
  rationale: El demonstrativo retoma los hechos ya narrados; en español, 'Estas cosas' mantiene la fuerza resumidora sin sonar forzado.
- source_word: עָשָׂה
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - realizó
  - efectuó
  lexicon: HALOT
  rationale: El verbo básico 'hacer' permite una correspondencia directa con el hebreo y funciona bien en este resumen narrativo.
- source_word: בְּנָיָהוּ בֶּן יְהוֹיָדָע
  english_pob_choice: Benaiah son of Jehoiada
  chosen_spanish: Benaía hijo de Joyadá
  alternatives_spanish:
  - Benaía, hijo de Joyadá
  - Benaía el hijo de Joyadá
  lexicon: transliteración estándar del proyecto
  rationale: Se conservan los nombres propios en forma española habitual; el vínculo de parentesco se expresa con 'hijo de' como equivalente natural del constructo hebreo.
- source_word: וְלוֹ שֵׁם
  english_pob_choice: and he had a name
  chosen_spanish: y tuvo nombre
  alternatives_spanish:
  - y tuvo fama
  - y fue renombrado
  - y tenía nombre
  lexicon: HALOT
  rationale: '''Tuvo nombre'' reproduce de cerca el idiomatismo hebreo ''y [para] él fue un nombre'', preservando la tensión entre la expresión literal y su sentido de reputación.'
- source_word: בִּשְׁלֹשָׁה הַגִּבֹּרִים
  english_pob_choice: among the three mighty men
  chosen_spanish: entre los tres hombres valientes
  alternatives_spanish:
  - entre los tres valientes
  - entre los tres guerreros valientes
  - entre los tres hombres poderosos
  lexicon: HALOT
  rationale: '''Mighty men'' se vierte de modo natural como ''hombres valientes'' en español, manteniendo el sentido militar y heroico del grupo de David.'
theological_decisions:
- issue: 'Posible variante textual: ''los tres'' frente a lecturas que algunos relacionan con ''los treinta'''
  english_pob_reading: The Hebrew text here reads 'the three.'
  chosen_spanish_reading: El texto hebreo aquí dice 'los tres'.
  alternative_spanish_readings:
  - algunos interpretan 'los treinta'
  - algunas lecturas relacionan el pasaje con 'los treinta'
  rationale: Se sigue el texto hebreo recibido del pasaje, sin ocultar que existe una discusión textual más amplia en la tradición interpretativa.
  doctrine_reference: Crítica textual y transparencia del texto bíblico
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: todos los marcadores de nota presentes en el texto español aparecen exactamente anclados en su lugar, sin notas huérfanas. La redacción conserva el paralelismo y la transparencia del idiomatismo hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'Benaía' y 'Joyadá' como formas españolas de los nombres propios.
  - '''Tuvo nombre'' conserva el hebraísmo con inteligibilidad natural.'
  - '''Hombres valientes'' refleja el campo semántico militar de הַגִּבֹּרִים sin sobrecargar con terminología eclesiástica.'
