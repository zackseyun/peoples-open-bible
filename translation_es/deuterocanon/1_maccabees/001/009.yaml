translation:
  language: es
  text: Y todos se pusieron[a] coronas después de su muerte, y sus hijos después de ellos durante muchos años; y multiplicaron los males[b] en el país.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “diademas”. El término griego se refiere específicamente a insignias reales.
    reason: lexical_alternative
  - marker: b
    text: O “aumentaron la maldad” o “aumentaron las calamidades en el país”. El griego “males” es lo bastante amplio como para incluir tanto el mal moral como sus consecuencias dañinas.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπέθεντο
  english_pob_choice: put on
  chosen_spanish: se pusieron
  alternatives_spanish:
  - se colocaron
  - se ciñeron
  - asumieron
  lexicon: LSJ
  rationale: El griego medio con διαδήματα expresa que ellos mismos se vistieron con insignias reales. En español, “se pusieron” conserva la acción concreta y natural sin volverla más interpretativa que el original.
- source_word: διαδήματα
  english_pob_choice: crowns
  chosen_spanish: coronas
  alternatives_spanish:
  - diademas
  - insignias reales
  - cintas reales
  lexicon: LSJ
  rationale: El término designa emblemas de realeza. “Coronas” comunica bien la idea en español amplio; aunque “diademas” sería más técnico, “coronas” es más claro para lectura pública y mantiene el valor regia del contexto.
- source_word: μετὰ τὸ ἀποθανεῖν αὐτόν
  english_pob_choice: after his death
  chosen_spanish: después de su muerte
  alternatives_spanish:
  - después de que él murió
  - tras su muerte
  lexicon: BDAG
  rationale: La construcción temporal se expresa de modo natural en español con “después de su muerte”, que conserva la referencia al evento sin añadir matices ajenos.
- source_word: ὀπίσω αὐτῶν
  english_pob_choice: after them
  chosen_spanish: después de ellos
  alternatives_spanish:
  - tras ellos
  - en sucesión después de ellos
  lexicon: LSJ
  rationale: Aquí la frase indica sucesión dinástica, no posición física. “Después de ellos” es la forma más sobria y fiel en español.
- source_word: ἔτη πολλά
  english_pob_choice: for many years
  chosen_spanish: durante muchos años
  alternatives_spanish:
  - por muchos años
  - muchos años
  lexicon: LSJ
  rationale: El acusativo de duración se vierte naturalmente como “durante muchos años”, que conserva duración extensa sin sobreexplicar.
- source_word: ἐπλήθυναν
  english_pob_choice: multiplied
  chosen_spanish: multiplicaron
  alternatives_spanish:
  - aumentaron
  - hicieron crecer
  lexicon: LSJ
  rationale: “Multiplicaron” reproduce el verbo activo y mantiene un eco bíblico adecuado, a la vez que sigue siendo claro en español contemporáneo.
- source_word: κακὰ
  english_pob_choice: evils
  chosen_spanish: los males
  alternatives_spanish:
  - los males y calamidades
  - la maldad
  - las calamidades
  lexicon: LSJ
  rationale: '“Males” preserva la amplitud semántica del plural griego: puede abarcar tanto mal moral como daños y calamidades. “Los males” evita estrechar el sentido a una sola lectura.'
- source_word: ἐν τῇ γῇ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en el país
  lexicon: LSJ
  rationale: Aunque “en la tierra” es literal y publicable, en español bíblico puede sonar más general que el contexto histórico. Aquí se mantiene la imagen amplia del griego y la ambigüedad entre territorio y mundo habitado.
theological_decisions:
- issue: Alcance de κακὰ
  english_pob_reading: broadly 'evils' rather than a narrower moral or political term
  chosen_spanish_reading: los males, en sentido amplio
  alternative_spanish_readings:
  - la maldad
  - las calamidades
  rationale: El griego permite incluir tanto maldad moral como consecuencias dañinas. “Los males” conserva esa tensión sin resolverla en una sola categoría, siguiendo la cautela del POB inglés.
  doctrine_reference: Preservar la tensión semántica sin armonizarla indebidamente.
translation_notes:
  revision_awareness: La redacción sigue el testimonio griego directo y el criterio auditado del POB inglés; no se hicieron cambios sustantivos de sentido respecto al expediente de revisión más reciente, que indicó que no eran necesarios cambios.
  spanish_consistency_notes:
  - Se evitó “SEÑOR” o formulaciones de tradición eclesial no pertinentes al versículo.
  - Se mantuvo un registro sobrio y público, compatible con lectura litúrgica o comunitaria.
  - “Los males” conserva la amplitud del griego mejor que opciones que lo limitarían a maldad moral o a calamidades externas solamente.
