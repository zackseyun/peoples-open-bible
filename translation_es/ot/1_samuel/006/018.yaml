translation:
  language: es
  text: y los ratones de oro[a], según el número de todas las ciudades de los filisteos que pertenecían a los cinco gobernantes, desde ciudad fortificada hasta aldea sin murallas, y hasta la gran piedra sobre la cual depositaron el arca de Yahvé, que permanece hasta hoy en el campo de Josué el bet-semesita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «y hasta Abel la Grande», tomando el hebreo como un nombre de lugar y no como «la gran piedra».'
    reason: alternative_reading
lexical_decisions:
- source_word: עַכְבְּרֵי הַזָּהָב
  english_pob_choice: the golden mice
  chosen_spanish: los ratones de oro
  alternatives_spanish:
  - los ratones dorados
  - los ratones de oro
  lexicon: HALOT
  rationale: עַכְבָּר puede abarcar tanto 'mouse' como 'rat'; en español 'ratones' funciona con la amplitud natural del término inglés 'mice' en este contexto narrativo. 'De oro' conserva con fidelidad la construcción genitiva del hebreo y evita sugerir solo un color metafórico.
- source_word: מִסְפַּר כָּל עָרֵי פְלִשְׁתִּים
  english_pob_choice: according to the number of all the cities of the Philistines
  chosen_spanish: según el número de todas las ciudades de los filisteos
  alternatives_spanish:
  - conforme al número de todas las ciudades de los filisteos
  - en igual número que todas las ciudades de los filisteos
  lexicon: HALOT
  rationale: '''Según el número de'' comunica la relación cuantitativa que expresa מִסְפַּר y suena natural en español bíblico moderno. ''De los filisteos'' mantiene el gentilicio y el alcance colectivo del sustantivo.'
- source_word: לַחֲמֵשֶׁת הַסְּרָנִים
  english_pob_choice: belonging to the five rulers
  chosen_spanish: pertenecientes a los cinco gobernantes
  alternatives_spanish:
  - de los cinco gobernantes
  - para los cinco señores
  lexicon: HALOT
  rationale: סְרָנִים es un título filisteo para sus jefes. 'Gobernantes' evita cargar el término con un matiz feudal de 'señores' y preserva la referencia funcional. 'Pertenecientes a' reproduce la relación de pertenencia/distribución entre las ciudades y esos cinco jefes.
- source_word: מֵעִיר מִבְצָר וְעַד כֹּפֶר הַפְּרָזִי
  english_pob_choice: from fortified city to unwalled village
  chosen_spanish: desde ciudad fortificada hasta aldea sin murallas
  alternatives_spanish:
  - desde ciudad fortificada hasta aldea abierta
  - desde ciudad fortificada hasta poblado sin murallas
  lexicon: HALOT
  rationale: La expresión marca el rango completo de asentamientos. 'Ciudad fortificada' y 'aldea sin murallas' preservan el contraste semántico entre un lugar defendido y otro abierto, con un español claro y no excesivamente literal.
- source_word: וְעַד אָבֵל הַגְּדוֹלָה
  english_pob_choice: and as far as the great stone
  chosen_spanish: y hasta la gran piedra
  alternatives_spanish:
  - y hasta Abel la Grande
  - y hasta la gran piedra/Abel la Grande
  lexicon: HALOT
  rationale: El contexto inmediato ('sobre la cual depositaron el arca') favorece entender la frase como una gran piedra. Se conserva en nota la lectura alternativa como topónimo. 'Gran piedra' es la opción principal por el peso del contexto narrativo.
- source_word: אֲשֶׁר הִנִּיחוּ עָלֶיהָ אֵת אֲרוֹן יְהוָה
  english_pob_choice: on which they set down the ark of Yahweh
  chosen_spanish: sobre la cual depositaron el arca de Yahvé
  alternatives_spanish:
  - sobre la cual colocaron el arca de Yahvé
  - en la cual pusieron el arca de Yahvé
  lexicon: HALOT
  rationale: '''Depositaron'' comunica היטיב el acto de poner y dejar asentado el arca. Se usa ''Yahvé'' porque el hebreo tiene directamente el Tetragrámaton, sin sustitución reverencial.'
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: which remains to this day
  chosen_spanish: que permanece hasta hoy
  alternatives_spanish:
  - que sigue allí hasta hoy
  - hasta el día de hoy
  lexicon: HALOT
  rationale: El hebreo expresa continuidad hasta el momento de la escritura. 'Permanece hasta hoy' hace explícita esa duración en un español fluido y conserva la fuerza temporal del idiomatismo.
- source_word: בִּשְׂדֵה יְהוֹשֻׁעַ בֵּית הַשִּׁמְשִׁי
  english_pob_choice: in the field of Joshua the Beth-shemite
  chosen_spanish: en el campo de Josué el bet-semesita
  alternatives_spanish:
  - en el campo de Josué de Bet-semes
  - en el campo de Josué, el bet-semesita
  lexicon: HALOT
  rationale: בֵּית הַשִּׁמְשִׁי es un gentilicio derivado de Bet-semes; se conserva como adjetivo de origen para no perder la forma hebrea. 'Bet-semesita' evita una paráfrasis geográfica más extensa y mantiene el vínculo con el topónimo original.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa el Tetragrámaton de manera directa. En la política terminológica del proyecto, la forma principal en español es 'Yahvé', manteniendo visible el nombre de pacto sin el reemplazo reverencial tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Posible lectura de אָבֵל הַגְּדוֹלָה como topónimo o como 'gran piedra'
  english_pob_reading: the great stone
  chosen_spanish_reading: la gran piedra
  alternative_spanish_readings:
  - Abel la Grande
  - la gran piedra / Abel la Grande
  rationale: La cláusula relativa inmediata ('sobre la cual depositaron el arca') favorece un referente físico, no un lugar. Por eso la lectura principal en español sigue el contexto narrativo, sin eliminar la alternativa documentada.
  doctrine_reference: POB source-critical note on alternative reading preserved by English audit trail
translation_notes:
  revision_awareness: 'El borrador sigue la lectura estable del pasaje en el audit trail inglés: mantiene ''the great stone'' como lectura principal por el apoyo del contexto inmediato, pero conserva la alternativa topográfica en nota. También conserva la decisión terminológica del proyecto para el nombre divino, usando ''Yahvé'' en español donde el hebreo tiene יְהוָה directamente.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''Ratones de oro'' sigue la imagen concreta del hebreo sin introducir una equivalencia más interpretativa.'
  - '''Gobernantes'' traduce סְרָנִים sin adoptar ''señores'' por default, para evitar un registro feudal no exigido por el texto.'
  - '''Bet-semesita'' conserva el gentilicio derivado del topónimo, como forma breve y auditable.'
  - La nota al pie marca explícitamente la lectura alternativa de אָבֵל הַגְּדוֹלָה, preservando la tensión textual/documental.
