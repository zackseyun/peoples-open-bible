translation:
  language: es
  text: Sin embargo, no escucharon ni a sus jueces, porque se prostituyeron[a] tras otros dioses y se postraron ante ellos. Se apartaron rápidamente del camino en que habían andado sus padres, obedeciendo los mandamientos de Yahvé; no hicieron así.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «anduvieron como prostitutas tras otros dioses». El hebreo usa una metáfora sexual de infidelidad de pacto e idolatría.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Yet ... even
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Y también
  - Pero incluso
  lexicon: HALOT
  rationale: La combinación hebrea añade contraste e intensificación. «Sin embargo» comunica el giro adversativo con naturalidad en español, y el énfasis en la negación queda reforzado por «ni» en la frase siguiente.
- source_word: אֶל שֹׁפְטֵיהֶם לֹא שָׁמֵעוּ
  english_pob_choice: they did not listen even to their judges
  chosen_spanish: no escucharon ni a sus jueces
  alternatives_spanish:
  - no obedecieron a sus jueces
  - no hicieron caso ni a sus jueces
  lexicon: HALOT
  rationale: שׁמע con אֶל expresa oír con atención/hecer caso. «Escucharon» conserva el idiomático hebreo y, en contexto, implica rechazo a la autoridad de sus jueces. «Ni» preserva el valor intensivo de «even».
- source_word: שֹׁפְטֵיהֶם
  english_pob_choice: their judges
  chosen_spanish: sus jueces
  alternatives_spanish:
  - sus líderes
  lexicon: HALOT
  rationale: El término designa a los jueces del período, no un término genérico de liderazgo. «Jueces» mantiene la referencia histórica y literaria del libro.
- source_word: זָנוּ אַחֲרֵי
  english_pob_choice: they prostituted themselves after
  chosen_spanish: se prostituyeron tras
  alternatives_spanish:
  - fornicaron tras
  - fueron infieles tras
  lexicon: HALOT
  rationale: זנה es una metáfora sexual fuerte para la infidelidad del pacto. «Se prostituyeron» preserva esa fuerza. «Tras» conserva el movimiento hebreo de seguir detrás de otros dioses.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - otros ídolos
  lexicon: HALOT
  rationale: La expresión es directa y debe mantenerse sin suavizarse. «Otros dioses» es la forma más clara y fiel.
- source_word: וַיִּשְׁתַּחֲוּוּ לָהֶם
  english_pob_choice: and bowed down to them
  chosen_spanish: y se postraron ante ellos
  alternatives_spanish:
  - y se inclinaron ante ellos
  - y los adoraron
  lexicon: HALOT
  rationale: El verbo indica postración corporal con sentido de culto. «Se postraron ante ellos» conserva la imagen física sin perder la implicación religiosa.
- source_word: סָרוּ מַהֵר
  english_pob_choice: They quickly turned aside
  chosen_spanish: Se apartaron rápidamente
  alternatives_spanish:
  - Se desviaron pronto
  - Pronto se apartaron
  lexicon: HALOT
  rationale: סור describe apartarse del camino; מַהֵר añade rapidez. «Se apartaron rápidamente» conserva ambos elementos de forma natural en español.
- source_word: מִן הַדֶּרֶךְ
  english_pob_choice: from the way
  chosen_spanish: del camino
  alternatives_spanish:
  - de la senda
  - de la ruta
  lexicon: HALOT
  rationale: «Camino» mantiene la metáfora bíblica del modo de vida y conducta covenantal.
- source_word: אֲשֶׁר הָלְכוּ אֲבוֹתָם
  english_pob_choice: in which their fathers had walked
  chosen_spanish: en que habían andado sus padres
  alternatives_spanish:
  - que sus padres habían seguido
  - por donde habían andado sus padres
  lexicon: HALOT
  rationale: «Andar» reproduce el hebreo de caminar como forma de conducta. «En que» mantiene la relación con «el camino».
- source_word: לִשְׁמֹעַ מִצְוֺת יְהוָה
  english_pob_choice: in obeying the commandments of Yahweh
  chosen_spanish: al obedecer los mandamientos de Yahvé
  alternatives_spanish:
  - en obedecer los mandamientos de Yahvé
  - escuchando los mandamientos de Yahvé
  lexicon: HALOT
  rationale: Aquí שׁמע con «mandamientos» pide una equivalencia de obediencia, no solo de audición. «Al obedecer» da una relación temporal/modificadora natural en español y refleja el ajuste revisado del inglés POB.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio doctrinal del proyecto para el Tetragrámaton: «Yahvé» como transliteración del nombre divino, en vez de una sustitución por título.'
- source_word: לֹא עָשׂוּ כֵן
  english_pob_choice: they did not do so
  chosen_spanish: no hicieron así
  alternatives_spanish:
  - no actuaron así
  - no hicieron de ese modo
  lexicon: HALOT
  rationale: La frase resumitiva remite al patrón obediente de sus padres. «No hicieron así» es breve y fiel, y mantiene la referencia anafórica del hebreo.
theological_decisions:
- issue: Metáfora de infidelidad sexual en זָנוּ
  english_pob_reading: Retain the sexual-infidelity metaphor with 'prostituted themselves' rather than flattening to 'were unfaithful.'
  chosen_spanish_reading: Conservar la metáfora con «se prostituyeron»
  alternative_spanish_readings:
  - fueron infieles
  - se volvieron infieles
  rationale: El hebreo emplea deliberadamente una imagen sexual fuerte para la idolatría y la infidelidad del pacto. «Se prostituyeron» mantiene esa carga moral y teológica sin atenuarla.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se aplica el estándar del proyecto para el Tetragrámaton, preservando el nombre propio revelado y evitando la sustitución por un título genérico.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del texto base inglés: la cláusula equivalente a לִשְׁמֹעַ מִצְוֺת יְהוָה se entendió como modificadora de «el camino» que siguieron sus padres, por lo que en español se optó por «al obedecer los mandamientos de Yahvé» para reflejar esa relación sin sobrerrepresentarla como una infinitiva independiente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - Se preserva «jueces» como término histórico específico.
  - «Se prostituyeron» se usa de modo consistente para la metáfora de זנה.
  - «Camino» y «andado» conservan la metáfora de conducta y ejemplo ancestral.
  - La puntuación y el registro buscan ser bíblicos y publicables sin arcaísmo innecesario.
