  text: וְ/אֵ֣יךְ תָּשִׁ֗יב אֵ֠ת פְּנֵ֨י פַחַ֥ת אַחַ֛ד עַבְדֵ֥י אֲדֹנִ֖/י הַ/קְטַנִּ֑ים וַ/תִּבְטַ֤ח לְ/ךָ֙ עַל מִצְרַ֔יִם לְ/רֶ֖כֶב וּ/לְ/פָרָשִֽׁים־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/036/009.yaml
