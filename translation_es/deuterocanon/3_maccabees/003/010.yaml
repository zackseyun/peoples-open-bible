    reason: lexical_alternative
  revision_rationale: Se corrigió τινας ἐπισπώμενοι a «apartando discretamente a ciertas personas» para reflejar mejor la acción de llevar aparte en secreto. Se trasladó el marcador de nota al segmento que realmente tiene la alternativa léxica. También se ajustó «todo esfuerzo diligente» a «todo empeño posible» para un español más natural sin perder la intensidad del original.
