translation:
  language: es
  text: Pidieron[a], y él trajo codornices; los sació con el pan del cielo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene un verbo singular, literalmente «él pidió»; aquí probablemente se entiende de manera colectiva, referido al pueblo de Israel.
    reason: alternative_reading
  - marker: b
    text: O «pan desde el cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁאַל
  english_pob_choice: They asked
  chosen_spanish: Pidieron
  alternatives_spanish:
  - Pidieron ellos
  - Ellos pidieron
  - Él pidió
  lexicon: HALOT
  rationale: El hebreo tiene forma singular, pero el contexto histórico del Salmo y la lectura auditada en inglés entienden el sujeto de manera colectiva como Israel. En español, «pidieron» comunica con naturalidad esa petición colectiva sin borrar la tensión del singular verbal del hebreo, que queda registrada en la nota.
- source_word: וַיָּבֵא
  english_pob_choice: he brought
  chosen_spanish: trajo
  alternatives_spanish:
  - hizo venir
  - llevó
  - introdujo
  lexicon: HALOT
  rationale: 'El hifil de בוא expresa valor causativo: «hacer venir» / «traer». En español, «trajo» conserva el sentido de provisión divina de modo claro y sobrio, sin alargar innecesariamente la frase.'
- source_word: שְׂלָו
  english_pob_choice: quail
  chosen_spanish: codornices
  alternatives_spanish:
  - codorniz
  - aves
  - perdices
  lexicon: HALOT
  rationale: El término designa el ave conocida como quail; en español bíblico y moderno, el plural «codornices» refleja mejor el objeto provisto en el relato del desierto y suena natural dentro de la oración.
- source_word: לֶחֶם שָׁמַיִם
  english_pob_choice: the bread of heaven
  chosen_spanish: el pan del cielo
  alternatives_spanish:
  - pan del cielo
  - pan celestial
  - el pan de los cielos
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «pan de cielo/heaven». «Pan del cielo» preserva la imagen poética y la relación posesiva/metafórica sin forzar una paráfrasis más interpretativa.
- source_word: יַשְׂבִּיעֵם
  english_pob_choice: he satisfied them
  chosen_spanish: los sació
  alternatives_spanish:
  - los satisfizo
  - los llenó
  - los dejó satisfechos
  lexicon: HALOT
  rationale: El verbo hifil de שׂבע tiene fuerza de saciar, colmar, satisfacer. «Los sació» comunica la plenitud de la provisión con buena densidad bíblica en español y mantiene el foco en la acción divina.
theological_decisions:
- issue: Sujeto de שָׁאַל con forma singular pero sentido colectivo
  english_pob_reading: They asked; the opening verb is singular in Hebrew, but the sense is likely collective, referring to the people of Israel asking.
  chosen_spanish_reading: Pidieron[a]
  alternative_spanish_readings:
  - Pidió[a]
  - Se pidió[a]
  rationale: 'Se sigue la lectura auditada del POB en inglés: la forma verbal hebrea es singular, pero el contexto de la provisión en el desierto y el plural posterior favorecen una referencia corporativa a Israel. El español plural mantiene esa decisión de sentido y deja visible la tensión formal mediante la nota.'
  doctrine_reference: Principios de fidelidad textual y equivalencia óptima del POB; lectura contextual de Salmos 105:40
- issue: ‘Bread of heaven’ como imagen poética de provisión divina
  english_pob_reading: Or 'bread from heaven.'
  chosen_spanish_reading: el pan del cielo[b]
  alternative_spanish_readings:
  - el pan de los cielos[b]
  - pan celestial[b]
  rationale: La imagen no se explica ni se espiritualiza más allá del hebreo. «Del cielo» conserva la metáfora y es idiomático en español; la nota preserva la alternativa dinámica equivalente «de los cielos / desde el cielo» en caso de lectura distinta.
  doctrine_reference: Salmos 105:40; paralelo temático con el maná en Éxodo 16
- issue: Acción divina de provisión y saciedad
  english_pob_reading: he brought quail; he satisfied them
  chosen_spanish_reading: trajo codornices; los sació
  alternative_spanish_readings:
  - hizo venir codornices; los sació
  - trajo codornices; los satisfizo
  rationale: Se mantiene la referencia a la provisión concreta de Dios sin diluirla. «Sació» conserva la fuerza del hifil de שׂבע y la relación entre alimento abundante y satisfacción plena.
  doctrine_reference: Teología bíblica de la provisión de Yahvé en el desierto
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del estado auditado; se conserva la misma decisión interpretativa y la misma tensión formal del hebreo en la nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando el contexto lo exija; en este versículo no aparece el nombre divino explícito.
  - «Codornices» evita el anglicismo y conserva el referente zoológico exacto.
  - «Pan del cielo» y «los sació» reproducen la imaginería y el paralelismo del verso sin exceder el hebreo.
  - La nota a marca la tensión entre forma singular hebrea y sentido colectivo, siguiendo el audit trail en inglés.
