lexical_decisions:
- source_word: ἔκρινεν
  english_pob_choice: decreed
  chosen_spanish: decretó
  alternatives_spanish:
  - juzgó
  - decidió
  - pronunció
  lexicon: BDAG κρίνω 4.b
  rationale: El aoristo de κρίνω aquí expresa una decisión o determinación autoritativa más que un acto de juzgar en sentido evaluativo. En español, «decretó» conserva el matiz de determinación judicial sin volver la frase extraña o ambigua.
- source_word: τὸν πόλεμον
  english_pob_choice: war
  chosen_spanish: guerra
  alternatives_spanish:
  - batalla
  - conflicto
  lexicon: BDAG πόλεμος
  rationale: πόλεμος denota guerra, no una sola batalla. «Guerra» preserva la gravedad y el alcance del término griego.
- source_word: ἐπὶ
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - en contra de
  lexicon: BDAG ἐπί
  rationale: Con πόλεμος y un objeto hostil, ἐπί expresa dirección adversa. «Contra» es la forma más natural y fiel en español.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: transliteración estándar
  rationale: Nombre propio tradicional y claro en español.
- source_word: γῆν
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - territorio
  - país
  lexicon: BDAG γῆ
  rationale: En relación con Jerusalén, γῆ puede referirse a tierra o región circundante. «Tierra» mantiene amplitud semántica sin imponer una lectura política técnica.
- source_word: αὐτῆς
  english_pob_choice: her
  chosen_spanish: su
  alternatives_spanish:
  - de ella
  lexicon: BDAG αὐτός
  rationale: El pronombre femenino referido a Jerusalén se puede reproducir naturalmente en español con «su», que mantiene la referencia posesiva sin forzar una personificación explícita con «de ella».
translation_notes:
  revision_awareness: El texto griego presenta una construcción breve y judicial. La versión española sigue la lectura revisada del POB en inglés que optó por «decreed war», y conserva la alternativa léxica de γῆ como «territorio» para reflejar el matiz posible sin imponerlo en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Jerusalén» como nombre propio estándar en español.
  - «Tierra» conserva la amplitud de γῆ sin especializarla en «territorio» en el cuerpo del texto.
  - Se usa «su» para reflejar la referencia posesiva femenina de αὐτῆς de forma idiomática en español.
