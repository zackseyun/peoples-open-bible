translation:
  language: es
  text: Los que temen a Yahvé[a], confíen en Yahvé; él es su ayuda y su escudo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ustedes que temen a Yahvé, confíen en Yahvé». El participio hebreo puede leerse como designación en tercera persona o como dirección directa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאֵי
  english_pob_choice: You who fear
  chosen_spanish: Ustedes que temen
  alternatives_spanish:
  - Los que temen
  - Ustedes, los que temen
  lexicon: HALOT
  rationale: El participio substantivado puede entenderse como designación en tercera persona o como apelación directa. En español, 'Ustedes que temen' conserva la lectura exhortativa de la POB inglesa y su fluidez en un contexto de llamado a confiar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La POB inglesa usa 'Yahweh' para reproducir el nombre propio divino del Tetragrámaton. En español, 'Yahvé' es el equivalente establecido por el proyecto para preservar el nombre personal de Dios sin sustituirlo por un título.
- source_word: בִּטְחוּ
  english_pob_choice: trust
  chosen_spanish: confíen
  alternatives_spanish:
  - confién
  - pongan su confianza
  lexicon: HALOT
  rationale: El imperativo plural de בטח pide una orden directa. 'Confiar' comunica bien el mandato en español y evita una expansión innecesaria; 'confíen' es natural y solemne.
- source_word: בַיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahvé otra vez
  - en el Señor
  lexicon: HALOT
  rationale: La repetición del nombre divino mantiene el paralelismo del hebreo. En español conviene repetir 'Yahvé' para preservar el énfasis, no sustituirlo por una paráfrasis.
- source_word: עֶזְרָם
  english_pob_choice: their help
  chosen_spanish: su ayuda
  alternatives_spanish:
  - su ayudador
  - ayuda para ellos
  lexicon: HALOT
  rationale: עזר puede ser abstracto ('ayuda') o personal ('ayudador'). La sintaxis poética y el paralelo con 'escudo' favorecen el sustantivo abstracto, que en español suena natural y fiel.
- source_word: וּמָגִנָּם
  english_pob_choice: and their shield
  chosen_spanish: y su escudo
  alternatives_spanish:
  - y su protector
  - y su defensa
  lexicon: HALOT
  rationale: מגן es literalmente 'escudo'. Se conserva la imagen concreta por su fuerza metafórica y por coherencia con el paralelismo hebreo.
- source_word: הוּא
  english_pob_choice: he is
  chosen_spanish: él es
  alternatives_spanish:
  - es él
  - él
  lexicon: HALOT
  rationale: 'El pronombre independiente subraya la predicación: ''él es''. Mantenerlo explícito en español preserva el énfasis final del verso.'
theological_decisions:
- issue: Traducción del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton de manera directa. La decisión del proyecto es no enmascararlo con un sustituto litúrgico; 'Yahvé' preserva el nombre del pacto con claridad para lectores hispanohablantes.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Ambigüedad del participio יִרְאֵי
  english_pob_reading: You who fear / Those who fear
  chosen_spanish_reading: Ustedes que temen
  alternative_spanish_readings:
  - Los que temen
  - Ustedes, los que temen
  rationale: La alternancia entre apelación directa y designación de tercera persona está documentada en la POB inglesa. 'Ustedes que temen' conserva esa tensión y funciona bien como vocativo exhortativo en español.
  doctrine_reference: 'DOCTRINE.md: Translation choices — participial substantives'
- issue: Metáfora de מָגֵן
  english_pob_reading: shield
  chosen_spanish_reading: escudo
  alternative_spanish_readings:
  - protección
  - defensa
  rationale: La imagen concreta del escudo se mantiene porque forma parte del paralelismo poético y no requiere suavización doctrinal. Preserva la fuerza imagética del texto.
  doctrine_reference: 'DOCTRINE.md: Poetic imagery and metaphor'
translation_notes:
  revision_awareness: La revisión más reciente del expediente indicó que no hubo cambios y que el acuerdo con el control cruzado fue alto; por eso la redacción española sigue de cerca las decisiones auditadas, sin introducir ajustes no documentados.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יהוה, en lugar de 'SEÑOR'.
  - Se conserva la metáfora concreta 'escudo' para מגן.
  - Se usa 'ayuda' para עזר por paralelismo poético y naturalidad en español.
  - La ambigüedad del participio inicial queda reflejada en la nota al pie, como en la POB inglesa.
