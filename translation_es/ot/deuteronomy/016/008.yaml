    rationale: El hebreo dice literalmente «y/en el séptimo día». En español bíblico natural, «y el séptimo día» comunica mejor la simple progresión temporal que «al séptimo día», que puede sonar más interpretativo o menos directo.
  revised_spanish_text: Durante seis días comerás pan sin levadura[a], y el séptimo día habrá una asamblea solemne para Yahvé tu Dios; no harás ningún trabajo.
