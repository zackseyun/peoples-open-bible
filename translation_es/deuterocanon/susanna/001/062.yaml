  spanish_consistency_notes:
  - Se conserva «Moisés» sin artículo, conforme al uso bíblico normal en español.
  - Se evita «SEÑOR» porque este versículo no contiene el tetragrámaton ni κύριος referido directamente a Yahvé.
  - Se mantiene un registro bíblico sobrio y jurídico, evitando paráfrasis expansivas.
  - La nota al pie marca la ambigüedad sintáctica heredada del griego y del audit trail inglés.
