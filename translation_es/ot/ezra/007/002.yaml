translation:
  language: es
  text: hijo de Salum[a], hijo de Sadoc, hijo de Ahitub—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En genealogías hebreas comprimidas, «hijo de» puede señalar a veces a un descendiente más remoto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En listas genealógicas, בֶּן funciona de manera natural como relación de filiación; en español, «hijo de» reproduce mejor la fórmula genealógica directa que «descendiente de». Dado que el POB inglés conservó «son of» y solo anotó la posibilidad de una descendencia más remota, mantengo la misma lectura básica en español.
- source_word: שַׁלּוּם
  english_pob_choice: Shallum
  chosen_spanish: Salo[m]
  alternatives_spanish:
  - Salum
  - Sallum
  lexicon: transliteración de nombre propio
  rationale: El hebreo da el nombre propio שַׁלּוּם. En español, «Salum» es una forma breve y reconocible para este nombre; sin embargo, por la variación tradicional de transliteraciones, se deja abierta la alternativa histórica. No se intenta traducir el nombre.
- source_word: צָדוֹק
  english_pob_choice: Zadok
  chosen_spanish: Sadoc
  alternatives_spanish:
  - Zadoc
  lexicon: transliteración de nombre propio
  rationale: El nombre propio צָדוֹק se translitera al español de forma natural como «Sadoc», conservando la identificación tradicional del personaje. La grafía con Z es posible por influencia inglesa, pero «Sadoc» se ajusta mejor a la fonología y convención hispana.
- source_word: אֲחִיטוּב
  english_pob_choice: Ahitub
  chosen_spanish: Ahitub
  alternatives_spanish:
  - Ajitub
  lexicon: transliteración de nombre propio
  rationale: El nombre propio אֲחִיטוּב se conserva transliterado. «Ahitub» mantiene la forma ya establecida y transparente para lectorado bíblico en español; «Ajitub» sería una adaptación fonética posible, pero menos reconocible.
theological_decisions:
- issue: Genealogía comprimida y valor de la filiación
  english_pob_reading: son of Shallum[a], son of Zadok, son of Ahitub—; note that Hebrew genealogical 'son of' can at times denote a more remote descendant in compressed genealogies.
  chosen_spanish_reading: hijo de Salo[m][a], hijo de Sadoc, hijo de Ahitub—; se entiende «hijo de» en el sentido genealógico directo, sin excluir que la línea pueda comprimir generaciones.
  alternative_spanish_readings:
  - descendiente de Salo[m], descendiente de Sadoc, descendiente de Ahitub—
  - nieto de ...
  rationale: La nota inglesa preserva la tensión entre la fórmula directa y la posible compresión genealógica. En español se mantiene «hijo de» para no debilitar el patrón del texto, y se anota la misma posibilidad de descendencia más remota para no borrar el matiz histórico-literario.
  doctrine_reference: Nota de genealogía bíblica; no implica una doctrina específica.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo masorético citado y con el audit trail inglés; no hay revisiones aplicadas ni variantes textuales relevantes en este versículo. La traducción española conserva la misma estructura genealógica breve y la misma nota sobre posible compresión de generaciones.
  spanish_consistency_notes:
  - Se usa «hijo de» para reflejar la fórmula genealógica hebrea בֶּן sin introducir perífrasis interpretativas.
  - Los nombres propios se transliteran, no se traducen.
  - Se mantiene el guion final porque el hebreo y el inglés auditado dejan la lista en suspensión, preparando la continuación genealógica del contexto inmediato.
  - La forma «Sadoc» sigue la convención hispana más natural frente a «Zadok», que sería un calco del inglés.
