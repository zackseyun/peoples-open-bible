base_translation:
  language: en
  yaml_path: translation/ot/genesis/004/007.yaml
  text: If you do well[a], will there not be acceptance? But if you do not do well, sin is crouching at the door; its desire is for you[d][c][b], but you must rule over it.
  footnotes:
  - marker: a
    text: Hebrew literally, 'lifting up'; the sense may be that Cain's face would be lifted or that he would receive acceptance.
    reason: lexical_alternative
  - marker: b
    text: Or 'a sin offering is lying at the door,' though the immediate imagery more naturally suggests sin personified as a crouching beast.
    reason: alternative_reading
  - marker: c
    text: Or 'its longing' or 'its urge.' Compare the similar wording in Genesis 3:16.
    reason: cross_reference
  - marker: d
    text: Or 'you shall rule over it' or 'you can rule over it.' The Hebrew can be read as exhortation, prediction, or possibility.
    reason: alternative_reading
