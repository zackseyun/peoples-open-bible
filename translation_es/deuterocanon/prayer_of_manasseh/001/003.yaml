translation:
  language: es
  text: el que ató el mar con la palabra de tu mandamiento,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que contuvo el mar con la palabra de tu mandamiento». La imagen griega es, más literalmente, «ató» o «encadenó».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πεδήσας
  english_pob_choice: the one who bound
  chosen_spanish: el que ató
  alternatives_spanish:
  - el que sujetó
  - el que aprisionó
  - el que confinó
  lexicon: LSJ
  rationale: El participio aoristo expresa una acción concreta de atar/fetter. «Ató» conserva la imagen corporal y es natural en español; «sujetar» o «confinar» debilitan la metáfora, y «aprisionar» suena más interpretativo que el griego.
- source_word: τὴν θάλασσαν
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - las aguas
  lexicon: LSJ
  rationale: Aunque θάλασσα es literalmente «mar», en español «el mar» es la forma más directa y idiomática. «Las aguas» amplía el referente más de lo que permite el griego.
- source_word: τῷ λόγῳ
  english_pob_choice: by the word
  chosen_spanish: con la palabra
  alternatives_spanish:
  - por la palabra
  - mediante la palabra
  - con la palabra
  lexicon: BDAG
  rationale: En español, la construcción «con la palabra de tu mandamiento» reproduce bien el valor instrumental de τῷ λόγῳ sin sonar rígida. «Por la palabra» podría sugerir causa; «mediante» es correcto pero más técnico.
- source_word: τοῦ προστάγματός σου
  english_pob_choice: of your command
  chosen_spanish: de tu mandamiento
  alternatives_spanish:
  - de tu mandato
  - de tu decreto
  - de tu orden
  lexicon: LSJ
  rationale: πρόσταγμα puede ser «mandato», «orden» o «decreto». «Mandamiento» mantiene la fuerza de una orden dada por autoridad y suena bíblicamente natural en español. Se evita «decreto» por ser más abstracto y menos vivo.
theological_decisions:
- issue: Imagen concreta de dominio divino sobre el mar
  english_pob_reading: Retain the concrete image 'bound the sea' rather than interpretively smoothing to 'set limits to the sea.'
  chosen_spanish_reading: 'Conservar la imagen concreta: «ató el mar», no «puso límites al mar».'
  alternative_spanish_readings:
  - puso límites al mar
  - contuvo el mar
  - restriñó el mar
  rationale: El griego presenta una metáfora fuerte de atar/fetters. En español, «ató el mar» preserva esa fuerza y la autoridad divina sobre el caos acuático sin añadir explicación ajena al verso.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de revisión fue alto y el texto quedó sin modificaciones respecto del pasaje base.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en el contexto de la oración, sin añadirlo al verso porque el participio relativo basta en español.
  - Se usa un estilo bíblico sobrio, pero no arcaizante, para que la imagen resulte clara y fiel al griego.
