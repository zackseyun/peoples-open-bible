translation:
  language: es
  text: Señor Todopoderoso[a], Dios de nuestros padres, de Abraham, Isaac y Jacob, y de la descendencia[b] justa de ellos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Soberano de todo».
    reason: lexical_alternative
  - marker: b
    text: O «simiente». El griego puede traducirse más literalmente así, especialmente en contextos de linaje y pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Es un vocativo dirigido a Dios. En español, «Señor» es el equivalente reverente y natural del uso divino de κύριος en una oración como esta.
- source_word: παντοκράτωρ
  english_pob_choice: Almighty
  chosen_spanish: Todopoderoso
  alternatives_spanish:
  - Omnipotente
  - Soberano de todo
  lexicon: LEH
  rationale: «Todopoderoso» comunica con claridad el título divino y mantiene la fuerza teológica de παντοκράτωρ sin sonar forzado en español.
- source_word: ὁ θεὸς τῶν πατέρων ἡμῶν
  english_pob_choice: God of our fathers
  chosen_spanish: Dios de nuestros padres
  alternatives_spanish:
  - Dios de nuestros antepasados
  - Dios de nuestros padres y madres
  lexicon: LEH
  rationale: La fórmula es covenantal y tradicional en la Escritura. Se conserva «padres» por fidelidad al griego y a la resonancia bíblica, sin neutralizar el giro.
- source_word: τοῦ Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακώβ
  english_pob_choice: of Abraham and Isaac and Jacob
  chosen_spanish: de Abraham, Isaac y Jacob
  alternatives_spanish:
  - de Abraham y de Isaac y de Jacob
  lexicon: LEH
  rationale: En español, la enumeración con comas y una sola conjunción final es más natural que repetir «y» en cada miembro, sin alterar el contenido del texto.
- source_word: σπέρματος
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - linaje
  - simiente
  - semilla
  lexicon: LEH
  rationale: En este contexto de alianza y genealogía, «descendencia» expresa bien el sentido colectivo de σπέρμα. En español es más claro que «simiente» y evita la ambigüedad de «semilla».
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: de su
  alternatives_spanish:
  - de ellos
  - su
  lexicon: LEH
  rationale: El posesivo se integra naturalmente en español para referir la descendencia de los patriarcas mencionados.
- source_word: τοῦ δικαίου
  english_pob_choice: righteous
  chosen_spanish: justa
  alternatives_spanish:
  - recta
  - piadosa
  lexicon: LEH
  rationale: El adjetivo concuerda con «descendencia» y traduce δίκαιος con un término bíblicamente fuerte. «Justa» conserva la idea de rectitud/covenant fidelity sin introducir matices no requeridos.
theological_decisions:
- issue: Tratamiento del título divino παντοκράτωρ
  english_pob_reading: Almighty
  chosen_spanish_reading: Todopoderoso
  alternative_spanish_readings:
  - Omnipotente
  - Soberano de todo
  rationale: Se preserva el título como atributo divino pleno, evitando una reducción a un mero superlativo estilístico. «Todopoderoso» mantiene la solemnidad litúrgica y el valor doctrinal del apelativo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
- issue: Fórmula de alianza «Dios de nuestros padres»
  english_pob_reading: God of our fathers
  chosen_spanish_reading: Dios de nuestros padres
  alternative_spanish_readings:
  - Dios de nuestros antepasados
  rationale: Se mantiene la forma bíblica masculina y covenantal del griego, porque el texto invoca el Dios de la línea patriarcal concreta de Abraham, Isaac y Jacob.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: σπέρμα en contexto genealógico y pactal
  english_pob_reading: offspring
  chosen_spanish_reading: descendencia
  alternative_spanish_readings:
  - linaje
  - simiente
  rationale: La elección conserva la referencia a la continuidad de la promesa sobre la línea familiar. «Descendencia» comunica el sentido colectivo de manera clara para lectores actuales, sin perder la conexión con el lenguaje de pacto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: El contexto inglés fue de alta concordancia y no requirió revisiones sustantivas; la draft española sigue la misma lectura auditada, ajustando solo la formulación para naturalidad y fidelidad en español.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento reverente de la invocación divina con mayúsculas iniciales en «Señor» y «Todopoderoso».
  - Se conservó la estructura de invocación y la enumeración patriarcal sin añadir ni omitir elementos del griego.
  - «Descendencia» se usó como equivalente funcional de σπέρμα en un contexto de pacto, con nota alternativa para «simiente».
  - La puntuación exclamativa refleja el carácter vocativo de la oración en español sin alterar el contenido.
