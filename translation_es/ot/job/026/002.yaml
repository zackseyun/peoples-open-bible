translation:
  language: es
  text: ¡Cómo has ayudado al que no tiene fuerzas! ¡Cómo has salvado el brazo sin fuerza![a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Qué has ayudado al que no tiene fuerza? ¿Qué has salvado: un brazo sin vigor?». El hebreo es agudamente irónico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶה
  english_pob_choice: How
  chosen_spanish: ¡Cómo!
  alternatives_spanish:
  - ¿Qué?
  - ¡Qué!
  lexicon: HALOT
  rationale: En esta pregunta retórica exclamativa, מֶה funciona idiomáticamente como exclamación. En español, «Cómo» reproduce mejor la ironía y el tono admirativo-irónico del hebreo que un simple «qué».
- source_word: עָזַרְתָּ
  english_pob_choice: you have helped
  chosen_spanish: has ayudado
  alternatives_spanish:
  - ayudaste
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte con presente perfecto en español para mantener la acción completada con fuerza retórica en segunda persona directa.
- source_word: לְלֹא כֹחַ
  english_pob_choice: one without power
  chosen_spanish: a uno sin poder
  alternatives_spanish:
  - al que no tiene poder
  - a uno sin fuerza
  lexicon: HALOT
  rationale: La secuencia preposición + negación + sustantivo expresa a una persona sin capacidad o poder. «A uno sin poder» conserva la singularidad y suena natural en español, evitando una abstracción excesiva.
- source_word: הוֹשַׁעְתָּ
  english_pob_choice: you have saved
  chosen_spanish: has salvado
  alternatives_spanish:
  - has librado
  - has rescatado
  lexicon: HALOT
  rationale: El verbo ישׁע tiene el sentido básico de salvar/liberar. «Has salvado» mantiene la fuerza léxica y el paralelismo con «has ayudado».
- source_word: זְרוֹעַ
  english_pob_choice: the arm
  chosen_spanish: el brazo
  alternatives_spanish:
  - el brazo fuerte
  - la fuerza
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «brazo/arm», en español «brazo» conserva la imagen corporal y poética de fuerza o capacidad. Mantener el término ayuda a preservar la metáfora del paralelismo.
- source_word: לֹא עֹז
  english_pob_choice: without strength
  chosen_spanish: sin fuerza
  alternatives_spanish:
  - sin poder
  - sin vigor
  lexicon: HALOT
  rationale: עֹז significa fuerza, vigor, poder. «Sin fuerza» enlaza con la primera línea y preserva el paralelismo semántico del verso, sin borrar la tensión irónica.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «the powerless» a «one without power» para reflejar mejor el singular de לְלֹא כֹחַ. La redacción española sigue esa revisión y conserva el paralelismo poético con «el brazo sin fuerza».
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras sustituciones teológicas porque el verso no contiene el Tetragrámaton ni lenguaje divino explícito.
  - Se mantiene el tono sarcástico del hebreo mediante exclamación y paralelismo, sin suavizar la ironía.
  - «Brazo» se conserva como metáfora concreta de poder/capacidad, en lugar de sustituirlo por una abstracción como «poder» en la línea principal.
