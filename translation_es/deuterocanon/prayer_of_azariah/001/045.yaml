translation:
  language: es
  text: ¡Bendigan a Yahvé[a], rocíos y nevadas; cántenle alabanzas y exáltenlo sobremanera por siempre!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nieve(s)» o, más ampliamente, «precipitación invernal»; el griego νιφετοί puede referirse a nevadas o a precipitación tormentosa de tipo invernal.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: ¡Bendecid!
  alternatives_spanish:
  - ¡Bendigan!
  - Alabad
  lexicon: BDAG
  rationale: El imperativo plural pide una exhortación litúrgica colectiva. «Bendecid» conserva mejor que «alabad» la fuerza de hablar bien de Dios y mantiene el tono de himno refrán.
- source_word: δρόσοι
  english_pob_choice: dews
  chosen_spanish: rocíos
  alternatives_spanish:
  - rosadas
  - gotas de rocío
  lexicon: LSJ
  rationale: El plural se conserva con «rocíos» para reflejar la forma griega y el catálogo poético de fenómenos naturales.
- source_word: νιφετοί
  english_pob_choice: snowstorms
  chosen_spanish: nevadas
  alternatives_spanish:
  - nieve
  - tormentas de nieve
  - copos de nieve
  lexicon: LSJ
  rationale: «Nevadas» comunica bien la caída de nieve y mantiene la amplitud semántica de νιφετοί como precipitación invernal, sin forzar una imagen demasiado técnica o rara en español.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Yahvé
  - al Señor
  lexicon: BDAG
  rationale: Se conserva el valor de κύριος como «Señor». En este refrán de alabanza, el artículo del griego se integra naturalmente en español con la preposición exigida por el verbo «bendecid».
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cantadle alabanzas
  alternatives_spanish:
  - entonadle un himno
  - cantadlo
  lexicon: LSJ
  rationale: El verbo implica canto o himno de alabanza; «cantadle alabanzas» expresa esa fuerza de manera natural y cultual en español.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exaltadlo sobremanera
  alternatives_spanish:
  - exaltadlo en gran manera
  - alzadlo muy alto
  lexicon: LSJ
  rationale: El compuesto intensifica la acción de exaltar. «Sobremanera» preserva el énfasis sin caer en un calco áspero.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: La expresión idiomática de perpetuidad se vierte de modo natural y solemne con «por los siglos», que conserva el matiz temporal plural del griego.
theological_decisions:
- issue: Cómo verter κύριος en un refrán litúrgico de alabanza
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - Yahvé
  rationale: El contexto inmediato es un himno de bendición dirigido a Dios; «el Señor» preserva la referencia sin introducir una marcación explícita del nombre divino que el griego no expresa aquí. Dado el uso litúrgico directo, no se usó «Yahvé» como forma principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El inglés POB revisó una propuesta anterior de «showers» a «snowstorms» para νιφετοί, afinando la precisión meteorológica. En español se optó por «nevadas» como equivalente natural que conserva esa revisión y evita sobredeterminar el fenómeno como tormenta intensa.
  spanish_consistency_notes:
  - Se mantiene el tono litúrgico imperativo plural para armonizar con el refrán poético griego.
  - «Señor» se usa de forma coherente con la política del proyecto para κύριος cuando no hay base textual para explicitar Yahvé en el cuerpo principal.
  - El cierre «por los siglos» preserva la solemnidad y la duración indefinida del griego sin añadir una fórmula más expansiva que el original.
