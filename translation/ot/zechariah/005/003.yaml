theological_decisions:
- issue: Scope of הָאָרֶץ
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: The verse occurs in a covenant-judgment vision directed toward the restored community, and the offenses named are those inscribed on the flying scroll. Rendering אֶרֶץ as 'land' preserves the likely local covenantal scope without denying that the imagery has broader theological resonance.
- issue: Sense of נִקָּה in a judgment context
  chosen_reading: punitive removal ('will be purged away')
  alternative_readings:
  - exculpation ('will be acquitted')
  - simple cleansing ('will be cleansed')
  rationale: The immediate context is a curse going out against violators, so a positive acquittal sense would invert the force of the oracle. The chosen rendering preserves the warning and judicial action of the vision.
