translation:
  language: es
  text: Trajeron el arca de Yahvé y la colocaron en su lugar, dentro de la tienda que David había levantado para ella. Y David ofreció holocaustos y sacrificios de paz[a] delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sacrificios de comunión' u 'ofrendas de bienestar' para el hebreo שְׁלָמִים.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of Yahweh
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca del SEÑOR
  - el arca de Yahvé
  lexicon: HALOT
  rationale: אֲרוֹן se refiere al arca del pacto; en español, 'arca' es el equivalente natural y tradicional. יְהוָה se mantiene como 'Yahvé' conforme al criterio doctrinal del proyecto, en lugar de sustituirlo por un título.
- source_word: וַיָּבִאוּ
  english_pob_choice: They brought in
  chosen_spanish: Trajeron
  alternatives_spanish:
  - Trajeron dentro
  - Introdujeron
  lexicon: HALOT
  rationale: El hifil de בוא expresa hacer que algo llegue a un lugar; en español, 'trajeron' comunica con naturalidad la acción sin añadir elementos no presentes en el hebreo.
- source_word: וַיַּצִּגוּ אֹתוֹ בִּמְקוֹמוֹ
  english_pob_choice: and set it in its place
  chosen_spanish: y la colocaron en su lugar
  alternatives_spanish:
  - y la pusieron en su lugar
  - y la situaron en su lugar
  lexicon: HALOT
  rationale: יצג aquí indica poner o establecer algo en una posición determinada. 'Colocaron en su lugar' conserva la intención deliberada y suena natural en español.
- source_word: בְּתוֹךְ הָאֹהֶל
  english_pob_choice: inside the tent
  chosen_spanish: dentro de la tienda
  alternatives_spanish:
  - dentro del tabernáculo
  - en medio de la tienda
  lexicon: HALOT
  rationale: בְּתוֹךְ marca interioridad; 'tienda' refleja היטב אֹהֶל y evita una interpretación demasiado técnica que el contexto no exige.
- source_word: אֲשֶׁר נָטָה לוֹ דָּוִד
  english_pob_choice: that David had pitched for it
  chosen_spanish: que David le había extendido
  alternatives_spanish:
  - que David le había levantado
  - que David le había preparado
  lexicon: HALOT
  rationale: נטה con referencia a una tienda significa 'extender' o 'tender'. 'Le había extendido' conserva el valor físico de la expresión y evita forzar 'erigir' o 'instalar'.
- source_word: וַיַּעַל דָּוִד
  english_pob_choice: And David offered
  chosen_spanish: Y David ofreció
  alternatives_spanish:
  - Y David elevó
  - Y David presentó
  lexicon: HALOT
  rationale: En contexto sacrificial, עלה significa 'ofrecer' o 'subir' una ofrenda. 'Ofreció' es la opción clara y fiel al uso cultual.
- source_word: עֹלוֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas de holocausto
  lexicon: HALOT
  rationale: עֹלָה designa la ofrenda totalmente consumida por fuego. 'Holocaustos' es la forma española tradicional y precisa para este término sacrificial.
- source_word: וּשְׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: sacrificios de paz
  alternatives_spanish:
  - ofrendas de paz
  - sacrificios de comunión
  lexicon: HALOT
  rationale: שְׁלָמִים admite varias equivalencias. 'Sacrificios de paz' conserva el valor tradicional en español y deja abierta la gama semántica del término sin imponer una sola explicación.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי puede significar 'delante de' o 'en presencia de'. 'Delante de Yahvé' conserva la orientación cultual y la formulación natural en español.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la línea del proyecto, se translitera el nombre divino como 'Yahvé' en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Terminología sacrificial para עֹלוֹת y שְׁלָמִים
  english_pob_reading: burnt offerings and peace offerings
  chosen_spanish_reading: holocaustos y sacrificios de paz
  alternative_spanish_readings:
  - ofrendas quemadas y ofrendas de paz
  - holocaustos y ofrendas de bienestar
  rationale: La pareja sacrificial debe conservarse sin suavizar el valor técnico. 'Holocaustos' expresa la ofrenda totalmente consumida; 'sacrificios de paz' mantiene una equivalencia reconocible y bíblicamente inteligible en español.
  doctrine_reference: HALOT; uso cultual del Pentateuco y narrativa davídica
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el criterio auditado de la POB inglesa. Se preserva la secuencia narrativa, el paralelismo cultual y el nombre divino como Yahvé. La única nota se reserva para la ambigüedad léxica de שְׁלָמִים, que en español también admite varias soluciones legítimas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente para יְהוָה.
  - Se tradujo אֹהֶל como 'tienda' por ser el equivalente más natural en este contexto narrativo.
  - Se evitó 'SEÑOR' por coherencia con la terminología del proyecto.
  - '''Holocaustos'' se reservó para עֹלוֹת como término sacrificial técnico y tradicional en español.'
