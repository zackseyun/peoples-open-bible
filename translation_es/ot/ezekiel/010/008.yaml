translation:
  language: es
  text: Y los querubines parecían tener la forma de una mano humana bajo sus alas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una mano de hombre». El hebreo dice literalmente «la forma de una mano de hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  english_pob_choice: appeared to have
  chosen_spanish: parecían tener
  alternatives_spanish:
  - se veía
  - apareció que tenían
  lexicon: HALOT
  rationale: El nifal de ראה expresa aquí una percepción visual de lo que se observaba en la visión. En español, «parecían tener» conserva el matiz de apariencia sin sonar forzado, y refleja bien el carácter descriptivo de la escena.
- source_word: לַכְּרֻבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - a los querubines
  - entre los querubines
  lexicon: HALOT
  rationale: El contexto presenta a los querubines como el sujeto visible de la descripción. En español, el artículo definido plural es natural y mantiene la referencia a los seres celestiales ya introducidos.
- source_word: תַּבְנִית
  english_pob_choice: the form of
  chosen_spanish: la forma de
  alternatives_spanish:
  - la semejanza de
  - el diseño de
  lexicon: HALOT
  rationale: תַּבְנִית puede significar forma, patrón o semejanza. «La forma de» es la opción más clara y sobria para una descripción visionaria de apariencia visible.
- source_word: יַד אָדָם
  english_pob_choice: a human hand
  chosen_spanish: una mano humana
  alternatives_spanish:
  - una mano de hombre
  - la mano de un hombre
  lexicon: HALOT
  rationale: El hebreo literalmente dice «mano de hombre», pero en este contexto la revisión inglesa optó por «human hand» para conservar la referencia genérica sin endurecerla en una expresión masculina idiomática. En español, «mano humana» reproduce bien esa elección auditada y suena natural.
- source_word: תַּחַת כַּנְפֵי/הֶם
  english_pob_choice: under their wings
  chosen_spanish: bajo sus alas
  alternatives_spanish:
  - debajo de sus alas
  - bajo sus plumas
  lexicon: HALOT
  rationale: «Bajo sus alas» expresa de manera directa la relación espacial del hebreo. En español, «alas» es el equivalente normal de כְנָפַיִם en este contexto y evita una literalidad innecesaria.
theological_decisions:
- issue: Valor semántico de אָדָם en una descripción corporal visionaria
  english_pob_reading: a human hand
  chosen_spanish_reading: una mano humana
  alternative_spanish_readings:
  - una mano de hombre
  - la mano de un hombre
  rationale: La forma hebrea אָדָם puede apuntar genéricamente a la humanidad o al hombre singular. La revisión inglesa reciente prefirió «human hand» para captar el valor colectivo sin cargar el texto de manera antropológica masculina. En español, «mano humana» preserva esa decisión y evita perder el sentido descriptivo de la visión.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table for אָדָם'
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión desde «a man's hand» a «a human hand» por mayor naturalidad en inglés formal, sin alterar el sentido singular y visual del hebreo. La propuesta española sigue la lectura revisada y la hace idiomática como «mano humana», manteniendo la imagen bajo las alas.
  spanish_consistency_notes:
  - Se conserva «querubines» como transliteración estable para כְּרֻבִים.
  - «Bajo sus alas» mantiene la imaginería espacial del hebreo y la terminología bíblica habitual sin oscurecer el sentido.
  - La expresión «mano humana» refleja la tensión entre el hebreo literal y la lectura auditada en inglés, con nota alternativa para transparencia.
