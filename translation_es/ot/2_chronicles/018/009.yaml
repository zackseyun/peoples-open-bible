    text: Or 'And the king of Israel.' The Hebrew conjunction can be rendered either 'and' or, in English narrative style, 'now.'
    reason: alternative_reading
  - marker: b
    text: Or 'arrayed in robes.' The Hebrew says literally 'clothed in garments.'
    reason: lexical_alternative
