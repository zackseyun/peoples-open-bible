translation:
  language: es
  text: Y sucedió al cabo de tres días, después de haber hecho un pacto[a] con ellos, que oyeron que estaban cerca de ellos[b] y que vivían entre ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «cortaron un pacto con ellos».'
    reason: lexical_alternative
  - marker: b
    text: Los pronombres hebreos en «cerca de ellos» y «entre ellos» son singulares en forma, probablemente con referencia colectiva a Israel o a Josué como representante; el español usa el plural por naturalidad.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: El wayyiqtol introduce un nuevo desarrollo narrativo. «Y sucedió» conserva bien esa función en español moderno y digno, sin caer en un calco pesado.
- source_word: מִקְצֵה שְׁלֹשֶׁת יָמִים
  english_pob_choice: at the end of three days
  chosen_spanish: al cabo de tres días
  alternatives_spanish:
  - al final de tres días
  - después de tres días
  lexicon: HALOT
  rationale: La expresión hebrea marca un límite temporal; «al cabo de» reproduce de forma natural la idea de llegada del término del plazo.
- source_word: כָּרְתוּ לָהֶם בְּרִית
  english_pob_choice: they had made a covenant with them
  chosen_spanish: habían hecho un pacto con ellos
  alternatives_spanish:
  - habían cortado un pacto con ellos
  - habían concertado un pacto con ellos
  lexicon: HALOT
  rationale: כרת ברית es literalmente «cortar un pacto», pero en español «hacer un pacto» comunica la cláusula pactal con claridad. Se mantiene «pacto» para no suavizar demasiado el término técnico.
- source_word: וַיִּשְׁמְעוּ
  english_pob_choice: they heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - se enteraron
  - supieron
  lexicon: HALOT
  rationale: El verbo שׁמע puede implicar «oír» o «enterarse». Aquí se conserva «oyeron» para mantener la forma verbal cercana al hebreo, como hace la POB en inglés.
- source_word: קְרֹבִים
  english_pob_choice: near
  chosen_spanish: cerca de ellos
  alternatives_spanish:
  - próximos a ellos
  - al lado de ellos
  lexicon: HALOT
  rationale: El adjetivo indica proximidad espacial. En español conviene explicitar «de ellos» para evitar ambigüedad y reflejar el referente colectivo.
- source_word: אֵלָי/ו
  english_pob_choice: to them
  chosen_spanish: de ellos
  alternatives_spanish:
  - a él
  - a ellos
  lexicon: HALOT
  rationale: El sufijo singular del hebreo crea una tensión gramatical respecto del sentido colectivo. En el texto español se integra con «cerca de ellos» para un sentido natural, sin borrar la observación de la singularidad morfológica, que se explica en nota.
- source_word: וּבְקִרְבּוֹ
  english_pob_choice: among them
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - en su medio
  - en su interior
  lexicon: HALOT
  rationale: La imagen espacial de «en el interior/medio» se expresa de modo idiomático con «en medio de ellos», que conserva la relación de pertenencia y cercanía.
- source_word: הֵם יֹשְׁבִים
  english_pob_choice: they were living
  chosen_spanish: habitaban
  alternatives_spanish:
  - vivían
  - estaban habitando
  lexicon: HALOT
  rationale: יָשַׁב en participio presenta una residencia estable. «Habitaban» suena más formal y bíblico que «vivían», y preserva el estado continuado.
theological_decisions:
- issue: Pacto/covenant terminology
  english_pob_reading: made a covenant
  chosen_spanish_reading: hicieron un pacto
  alternative_spanish_readings:
  - concertaron un pacto
  - establecieron un pacto
  rationale: Se evita «alianza» por su posible carga eclesial o política moderna; «pacto» mantiene la fuerza bíblica y la transparencia del acto solemne entre partes.
  doctrine_reference: Lexical covenant language in the Hebrew Bible
- issue: Singular pronominal form versus collective sense
  english_pob_reading: near them ... among them
  chosen_spanish_reading: cerca de ellos ... en medio de ellos
  alternative_spanish_readings:
  - cerca de él ... en medio de él
  - cerca de Israel ... en medio de Israel
  rationale: El hebreo conserva sufijos singulares en los referentes espaciales, pero el sentido narrativo apunta a Israel como colectivo. La redacción española sigue el sentido claro y la nota registra la tensión morfológica sin borrarla.
  doctrine_reference: Representative collective reference in Hebrew narrative
translation_notes:
  revision_awareness: La versión inglesa revisada mantuvo la estructura narrativa básica y solo ajustó la proximidad («near them»). La redacción española sigue esa decisión y conserva el paralelismo entre la cercanía y la residencia «en medio de ellos», sin añadir elementos no atestiguados.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrama.
  - Se eligió «pacto» de manera consistente con la fuerza de כרת ברית en el marco bíblico, sin sustituirlo por terminología más eclesiástica.
  - Se usó «habitaban» para el participio de יֹשְׁבִים, conservando el estado de residencia continua.
