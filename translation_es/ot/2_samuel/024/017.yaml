review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: David habla a Yahvé al ver al ángel que hiere al pueblo, confiesa doblemente su culpa, mantiene la metáfora de «estas ovejas», y ruega que la mano divina recaiga sobre él y sobre la casa de su padre. Sin embargo, hay dos desajustes menores: el anclaje de notas no sigue el audit trail inglés (la nota [a] se puso en «Yahvé» en vez de sobre la segunda confesión), y falta la nota cultural sobre «la casa de mi padre».'
  spanish_quality_summary: El español es en general claro y digno, pero «Que, por favor, tu mano sea...» suena algo forzado. En español bíblico natural y moderno suena mejor «Por favor, que tu mano esté contra mí...» o «Por favor, sea tu mano contra mí...». También conviene evitar la puntuación pesada antes de la cita y mantener la fluidez del ruego.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: «Yahvé» para יהוה, «ángel» para הַמַּלְאָךְ, metáfora de «ovejas» preservada, e idiomática «tu mano» conservada. «He obrado mal» es aceptable para הֶעֱוֵיתִי, aunque «he hecho mal» también sería posible; no hay conflicto teológico. La única corrección necesaria es reubicar y completar las notas conforme al expediente auditado.'
  issues:
  - severity: medium
    issue: Las notas al pie no corresponden al patrón y contenido del audit trail inglés.
    rationale: En el inglés, la nota [a] va sobre «I have done wrong» con alternativas léxicas, y la nota [b] explica «my father's house». En el borrador español, [a] se colocó en «Yahvé» y [b] en «he obrado mal», dejando sin nota «la casa de mi padre».
  - severity: low
    issue: La expresión «Que, por favor, tu mano sea contra mí» suena poco natural en español.
    rationale: Aunque es comprensible y formalmente cercana al hebreo, la colocación del «Que, por favor» resulta torpe. Una leve reordenación conserva el jussivo y mejora la legibilidad.
  - severity: low
    issue: Los dos «yo» explícitos pueden sentirse algo pesados en español.
    rationale: El hebreo usa אָנֹכִי para énfasis, pero en español no es necesario repetir el pronombre para preservar el sentido. Puede mantenerse un énfasis suficiente sin ambos «yo».
