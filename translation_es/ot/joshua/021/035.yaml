translation:
  language: es
  text: Dimna con sus tierras de pasto[b][a], y Nahalal con sus tierras de pasto—cuatro ciudades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos hebreos y versiones antiguas difieren en la inclusión y el orden de algunos nombres de ciudades en esta sección; compárese la lista paralela de 1 Crónicas 6:62 [inglés 6:77].
    reason: textual_variant
  - marker: b
    text: O 'sus tierras comunales', porque מִגְרָשׁ puede referirse al terreno abierto o de uso común alrededor de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּמְנָה
  english_pob_choice: Dimnah
  chosen_spanish: Dimna
  alternatives_spanish:
  - Dimnah
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español conviene conservar la transliteración y adaptar la grafía al sistema ortográfico usual, sin añadir significado que el hebreo no da.
- source_word: מִגְרָשֶׁהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus tierras de pasto
  alternatives_spanish:
  - sus pastizales
  - su tierra comunal
  - sus campos abiertos
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto asociado a la ciudad; en este contexto levítico, 'tierras de pasto' comunica bien la función espacial y económica. Mantengo el posesivo plural 'sus' para reflejar el sufijo femenino singular referido a cada ciudad.
- source_word: נַהֲלָל
  english_pob_choice: Nahalal
  chosen_spanish: Nahalal
  alternatives_spanish:
  - Najalal
  lexicon: HALOT
  rationale: Nombre propio de lugar; se conserva la forma más reconocible en español, sin traducirla.
- source_word: עָרִים אַרְבַּע
  english_pob_choice: four cities
  chosen_spanish: cuatro ciudades
  alternatives_spanish:
  - cuatro poblados
  - cuatro villas
  lexicon: HALOT
  rationale: La fórmula numérica final resume la lista; 'ciudades' mantiene la correspondencia estándar de עָרִים en estos repartos territoriales y conserva la cadencia del texto.
translation_notes:
  revision_awareness: El texto inglés auditado estaba en high_agreement y no requirió cambios. Para el español, se mantuvo la estructura concisa del original, la serie de nombres propios y la nota textual, adaptando únicamente la elección lexical de מִגְרָשׁ a una expresión natural en español.
  spanish_consistency_notes:
  - Se conserva la secuencia de nombres propios y el cierre numérico final.
  - Se evitó 'SEÑOR' u այլ terminología no pertinente; no hay vocabulario teológico especial en este versículo.
  - '''tierras de pasto'' intenta reflejar la idea espacial de מִגְרָשׁ sin introducir una interpretación más estrecha que la del hebreo.'
