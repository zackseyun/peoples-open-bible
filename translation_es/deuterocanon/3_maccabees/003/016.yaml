revisions:
- from: Y después de asignar muy grandes rentas a los templos de las ciudades[a], también procedimos y subimos a Jerusalén para honrar el templo de los que nunca son aventados y nunca cesan de su insensatez.
  to: Y después de asignar muy grandes rentas a los templos en las ciudades[a], también procedimos y subimos a Jerusalén para honrar el templo de los que nunca son trillados y nunca cesan de su insensatez.
  rationale: 'Se hicieron ajustes menores para reflejar mejor el griego y la línea auditada del POB: «en las ciudades» expresa con más precisión el valor locativo de κατὰ πόλεσιν, y «nunca son trillados» alinea el español con la revisión inglesa hacia la imagen de trillar, manteniendo la aspereza metafórica y mejorando la naturalidad del español. La nota se actualiza para concordar con el nuevo anclaje textual.'
