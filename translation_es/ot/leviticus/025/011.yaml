  - severity: low
    issue: La nota [d] puede formularse de manera más directa para reflejar el hebreo y el POB inglés.
    rationale: Conviene explicitar que el hebreo alude a la vid dejada sin podar/atender, y en el texto principal mantener 'los racimos de sus vides no podadas' o equivalente natural.
