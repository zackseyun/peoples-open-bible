translation:
  language: es
  text: Bienaventurado el que considera al pobre[a][b]; en el día de la calamidad[c], Yahvé lo librará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «actúa con sabiduría hacia el pobre». El verbo hebreo puede expresar una atención reflexiva y prudente.
    reason: lexical_alternative
  - marker: b
    text: O «el débil» o «el necesitado».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «en el día del mal»; aquí «mal» se refiere a calamidad, no a mal moral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Bienaventurado el
  alternatives_spanish:
  - Feliz el
  - Dichoso el
  lexicon: HALOT
  rationale: La forma hebrea introduce una bienaventuranza sapiencial. En español, «Bienaventurado» conserva el tono bíblico y declarativo sin volverse demasiado coloquial como «Feliz». Se mantiene el carácter de sentencia sapiencial más que una emoción subjetiva.
- source_word: מַשְׂכִּיל
  english_pob_choice: the one who considers
  chosen_spanish: el que considera
  alternatives_spanish:
  - el que actúa con sabiduría hacia
  - el que tiene discernimiento respecto de
  lexicon: HALOT
  rationale: El Hiphil de שׂכל expresa atención sabia, comprensión práctica y conducta prudente. «Considera» comunica bien la idea de prestar atención reflexiva al necesitado, y en español suena natural sin perder la fuerza del verbo hebreo.
- source_word: אֶל
  english_pob_choice: toward
  chosen_spanish: al
  alternatives_spanish:
  - hacia el
  - respecto del
  lexicon: HALOT
  rationale: La preposición marca dirección u orientación hacia la condición del pobre. En español, esa orientación queda incorporada de forma natural en «considera al pobre», sin necesidad de explicitar una preposición adicional.
- source_word: דָּל
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el débil
  - el necesitado
  - el humilde
  lexicon: HALOT
  rationale: דָּל puede abarcar pobreza, debilidad o vulnerabilidad social. «El pobre» es la opción más directa y estable, y permite que el matiz de fragilidad quede implícito en el contexto.
- source_word: בְּיוֹם רָעָה
  english_pob_choice: in the day of trouble
  chosen_spanish: en el día de la angustia
  alternatives_spanish:
  - en el día del mal
  - en el día de la desgracia
  - cuando llegue la calamidad
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en el día de mal/aflicción», pero aquí el valor es calamitoso, no moral. «Angustia» expresa bien la experiencia de aflicción en español y evita la posible lectura de maldad ética.
- source_word: יְמַלְּטֵהוּ
  english_pob_choice: will deliver him
  chosen_spanish: lo librará
  alternatives_spanish:
  - lo rescatará
  - lo salvará
  - lo sacará
  lexicon: HALOT
  rationale: El Piel de מלט significa liberar o rescatar de un peligro. «Librará» es una opción bíblica y natural en español, con un peso adecuado para la acción salvadora de Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme a la convención del proyecto para יהוה, en lugar de sustituirlo por un título.
theological_decisions:
- issue: Referencia singular representativa y sufijo masculino
  english_pob_reading: Retain representative singular with 'the one ... him'
  chosen_spanish_reading: 'Mantener el singular representativo: «el que ... lo librará»'
  alternative_spanish_readings:
  - Bienaventurados los que ... los librará
  - Bienaventurada la persona que ... la librará
  rationale: El hebreo usa un sujeto singular genérico y un sufijo masculino singular. Se conserva el singular para respetar la forma del texto y la promesa individualizada, sin forzar pluralización ni neutralización indebida. En español, el objeto directo «lo» sigue el referente masculino genérico del hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Beatitud como sentencia sapiencial, no como fórmula de prosperidad
  english_pob_reading: Render straightforwardly without expanding or softening the promise
  chosen_spanish_reading: Traducir de manera directa sin añadir interpretaciones doctrinales
  alternative_spanish_readings:
  - Interpretar como una garantía absoluta de prosperidad
  - Reducirlo a una mera expresión de ánimo
  rationale: La frase presenta una bienaventuranza en contexto sapiencial/poético. La traducción conserva su fuerza promesiva sin convertirla en una teología de prosperidad ni diluirla en mero sentimiento.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el nivel de acuerdo fue alto; por eso se mantiene una solución muy cercana a la línea aprobada en inglés, con ajustes naturales para el español y sin perder las tensiones léxicas del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se conserva «Bienaventurado» para reflejar la fórmula de beatitud sapiencial.
  - «Pobre» mantiene el matiz social y de vulnerabilidad de דָּל sin expandirlo indebidamente.
  - «Librará» conserva el sentido de rescate/deliverance del verbo hebreo.
  - Las notas a pie preservan la alternativa semántica de «actúa con sabiduría» y la ambigüedad de דָּל, además de aclarar el valor calamitoso de «día del mal».
