revisions:
- from: 'Ziba dijo al rey[a]: «Según todo lo que mi señor el rey ordene a su esclavo[b], así hará tu esclavo». Y Mefiboset comía en mi mesa[c], como uno de los hijos del rey.'
  to: 'Ziba dijo al rey: «Según todo lo que mi señor el rey ordene a su siervo, así hará tu siervo». Y Mefiboset comía en mi mesa[a], como uno de los hijos del rey.'
  rationale: Se cambia «esclavo» por «siervo» para ajustarse al contexto cortesano y a la decisión léxica auditada del POB para este versículo. Se corrigen los anclajes de notas y se eliminan notas redundantes o mal ubicadas, conservando una sola nota necesaria sobre «mi mesa», que sí refleja un punto textual significativo del hebreo. No se requiere adjudicación adicional porque la corrección es clara y de baja complejidad textual.
