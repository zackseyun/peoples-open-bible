lexical_decisions:
- source_word: כּוֹס
  english_pob_choice: cup
  chosen_spanish: copa
  alternatives_spanish:
  - vaso
  - cáliz
  lexicon: HALOT
  rationale: El hebreo designa un recipiente para beber. En español, «copa» es el equivalente natural y conserva la imagen poética sin cargar el texto con matices litúrgicos innecesarios que sí podría sugerir «cáliz».
- source_word: יְשׁוּעוֹת
  english_pob_choice: salvations
  chosen_spanish: salvaciones
  alternatives_spanish:
  - salvación
  - liberaciones
  lexicon: HALOT
  rationale: La forma hebrea es plural y el audit trail inglés decidió explicitar ese plural. En español, «salvaciones» conserva mejor la señal morfológica y el posible valor intensivo/poético, aunque suene menos idiomático que el singular.
- source_word: אֶשָּׂא
  english_pob_choice: I will lift up
  chosen_spanish: Levantaré
  alternatives_spanish:
  - alzaré
  - elevaré
  lexicon: HALOT
  rationale: El verbo נָשָׂא expresa levantar/alzar/cargar; con «copa» la imagen idiomática se comunica de forma directa con «levantaré».
- source_word: בְּשֵׁם
  english_pob_choice: on the name
  chosen_spanish: el nombre de
  alternatives_spanish:
  - sobre el nombre de
  - en el nombre de
  lexicon: HALOT
  rationale: La expresión hebrea קרא בשם implica invocar el nombre. En español, la forma natural y fiel para la invocación es «invocar el nombre de», sin forzar una calca como «sobre el nombre».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración española estándar del proyecto. Se evita sustituirlo por «SEÑOR» porque el source text emplea el Tetragrámaton de forma directa.
- source_word: אֶקְרָא
  english_pob_choice: I will call
  chosen_spanish: invocaré
  alternatives_spanish:
  - llamaré
  - proclamaré
  lexicon: HALOT
  rationale: En el giro con בְּשֵׁם יְהוָה, el sentido es de invocación/oración, no mera llamada verbal. Por eso «invocaré» expresa mejor la fuerza idiomática que «llamaré».
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente; la política del proyecto pide preservarlo como nombre propio en español. «Yahvé» mantiene esa transparencia y evita la sustitución honorífica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Número de יְשׁוּעוֹת
  english_pob_reading: salvations
  chosen_spanish_reading: salvaciones
  alternative_spanish_readings:
  - salvación
  - liberaciones
  rationale: El plural hebreo merece trazarse en español para no borrar la tensión documentada. Aunque «salvación» sería más idiomático, «salvaciones» preserva el plural poético señalado por el audit trail.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El inglés POB revisó este versículo desde «salvation» a «salvations» para reflejar más de cerca el plural hebreo יְשׁוּעוֹת; la presente redacción española sigue esa revisión y conserva la misma tensión plural, junto con la equivalencia idiomática de la invocación del nombre divino.
  spanish_consistency_notes:
  - «Yahvé» se usa de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se preserva el plural de «יְשׁוּעוֹת» con «salvaciones», aun cuando el singular sería más natural en español.
  - La sintaxis se ajusta a un español bíblico moderno y readable, sin perder la imagen de levantar la copa ni el valor de invocación en «invocaré».
