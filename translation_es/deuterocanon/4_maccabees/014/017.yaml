translation:
  language: es
  text: Pero aun si no pudieran impedirlo[a], volando alrededor de ellos por todos lados, afligidas en su afecto, y llamándoles con su propia voz, ayudarían a sus hijos de cualquier modo que pudieran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La imagen griega es aviar: una madre criatura «vuela alrededor» de sus crías y las llama.'
    reason: cultural_note
lexical_decisions:
- source_word: κωλύειν
  english_pob_choice: prevent
  chosen_spanish: impedirlo
  alternatives_spanish:
  - prevenirlo
  - detenerlo
  - evitarlo
  lexicon: LSJ
  rationale: El infinitivo expresa impedir que ocurra el daño inminente; «impedirlo» comunica bien esa fuerza en español sin añadir especificación innecesaria.
- source_word: περιιπτάμενα κυκλόθεν αὐτῶν
  english_pob_choice: flying around them on every side
  chosen_spanish: volando alrededor de ellos por todos lados
  alternatives_spanish:
  - revoloteando alrededor de ellos por todos lados
  - girando alrededor de ellos
  - rodeándolos al volar
  lexicon: LSJ
  rationale: La imagen griega es aviar y envolvente. «Volando alrededor de ellos por todos lados» conserva la metáfora sin volverla abstracta.
- source_word: ἀλγοῦντα τῇ στοργῇ
  english_pob_choice: grieving in their affection
  chosen_spanish: dolidas por su afecto
  alternatives_spanish:
  - padeciendo por su afecto
  - afligidas por su cariño
  - sufriendo en su afecto
  lexicon: LSJ
  rationale: στοργή denota afecto natural o familiar, y el contexto materno-birdil sostiene esa relación. «Dolidas por su afecto» mantiene la tensión emocional sin introducir un adjetivo que el griego no afirma explícitamente.
- source_word: ἀνακαλούμενα τῇ ἰδίᾳ φωνῇ
  english_pob_choice: calling to them in their own voice
  chosen_spanish: llamándolos con su propia voz
  alternatives_spanish:
  - llamándolos en su propia voz
  - clamándoles con su propia voz
  - llamando de nuevo con su propia voz
  lexicon: LSJ
  rationale: ἀνακαλούμενα implica llamar o reclamar. «Llamándolos con su propia voz» reproduce la acción vocal y evita una paráfrasis más interpretativa.
- source_word: καθʼ ὃν δύναται τρόπον
  english_pob_choice: in whatever way they could
  chosen_spanish: en todo lo que pudieran
  alternatives_spanish:
  - de cualquier modo que pudieran
  - en la medida de lo que pudieran
  - como pudieran
  lexicon: LSJ
  rationale: La expresión idiomática indica capacidad limitada pero real. «En todo lo que pudieran» mantiene ese alcance sin sonar demasiado literal o pesado.
- source_word: βοηθεῖ τοῖς τέκνοις
  english_pob_choice: help their children
  chosen_spanish: ayudarían a sus hijos
  alternatives_spanish:
  - asistirían a sus hijos
  - acudirían en ayuda de sus hijos
  - ayudarían a su descendencia
  lexicon: LSJ
  rationale: βοηθεῖ expresa ayuda o auxilio, y τέκνοις puede ser «hijos» o «descendencia». «Hijos» es natural en español y encaja con la comparación maternal del pasaje.
theological_decisions:
- issue: Imágenes aviares aplicadas a madres humanas
  english_pob_reading: Retain the imagery explicitly rather than flattening it into abstract maternal concern.
  chosen_spanish_reading: Conservar explícitamente la imagen de volar alrededor y llamar a los hijos.
  alternative_spanish_readings:
  - Reducirlo a «rodeándolos»
  - Parafrasear como «mostrando cuidado maternal»
  rationale: El griego presenta una comparación vívida de ave/madre y cría. Mantenerla respeta la retórica del pasaje y evita diluir el peso afectivo de la imagen.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió «their affection» frente a una glosa maternal más explícita. Por eso «su afecto» conserva el valor léxico de στοργή sin añadir de forma directa el matiz «materno», aunque el contexto lo sugiere.
  spanish_consistency_notes:
  - Se mantiene «hijos» para τέκνοις por claridad y fluidez, sin perder el sentido de descendencia/offspring en el contexto.
  - «Dolidas por su afecto» conserva la ambivalencia entre dolor emocional y vínculo familiar de στοργή.
  - La imagen de vuelo se expresa de modo natural en español, sin eliminar el carácter comparativo aviar del pasaje.
