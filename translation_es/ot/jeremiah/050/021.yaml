revisions:
- from: Sube contra la tierra de Merataim[a], contra ella, y contra los habitantes de Pécod[b]. Hiérrelos con la espada y conságralos a la destrucción[c] después de ellos, declara Yahvé, y haz todo lo que te he mandado.
  to: Sube contra la tierra de Merataim[a], contra ella, y contra los habitantes de Pécod[b]. Pásalos a espada y conságralos a la destrucción[c] tras ellos, declara Yahvé, y haz todo lo que te he mandado.
  rationale: 'Se corrige un error léxico importante en la representación del mandato militar חֲרֹב: ''Pásalos a espada'' comunica con claridad y fidelidad el sentido de ''put them to the sword''. Además, ''tras ellos'' mejora la naturalidad y mantiene la ambigüedad deliberada de אַחֲרֵיהֶם sin paráfrasis excesiva. El resto del versículo puede mantenerse, incluida la transliteración de los nombres y el uso de ''Yahvé''.'
  reviewer_model: gpt-5.4
