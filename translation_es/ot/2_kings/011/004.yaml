translation:
  language: es
  text: En el séptimo año, Joyadá envió y tomó a los comandantes de cientos, a los carites[a] y a los corredores[b], y los llevó ante sí en la casa de Yahvé. Hizo con ellos un pacto y los hizo jurar en la casa de Yahvé, y les mostró al hijo del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los quereteos’. El término hebreo probablemente designa una unidad de guardia real; su identificación precisa es incierta.
    reason: alternative_reading
  - marker: b
    text: ‘Los corredores’ probablemente se refiere a guardias reales o mensajeros de la corte.
    reason: cultural_note
lexical_decisions:
- source_word: וּבַשָּׁנָה הַשְּׁבִיעִית
  english_pob_choice: In the seventh year
  chosen_spanish: En el séptimo año
  alternatives_spanish:
  - Y en el séptimo año
  lexicon: HALOT
  rationale: La frase temporal introduce el marco narrativo; en español, ‘En el séptimo año’ es natural y fiel, sin necesidad de repetir la conjunción inicial.
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió a decir
  lexicon: HALOT
  rationale: El verbo expresa el envío directo de Joyadá; ‘envió’ conserva el valor básico sin añadir un objeto no expresado en el hebreo.
- source_word: שָׂרֵי הַמֵּאוֹת
  english_pob_choice: the commanders of hundreds
  chosen_spanish: los comandantes de cientos
  alternatives_spanish:
  - los capitanes de cientos
  - los centuriones
  lexicon: HALOT
  rationale: Se mantiene el sentido militar y la estructura literal del hebreo. ‘Comandantes de cientos’ evita importar un término romano como ‘centuriones’.
- source_word: לַכָּרִי
  english_pob_choice: the Carites
  chosen_spanish: los caritas
  alternatives_spanish:
  - los quereteos
  lexicon: HALOT
  rationale: Se conserva la designación de grupo como un etnónimo/título propio transliterado. ‘Caritas’ sigue la decisión inglesa de no forzar la identificación con ‘quereteos’ sin base concluyente.
- source_word: וְלָרָצִים
  english_pob_choice: and the runners
  chosen_spanish: y a los corredores
  alternatives_spanish:
  - y a los guardias
  - y a los mensajeros
  lexicon: HALOT
  rationale: ‘Corredores’ traduce de manera más directa el hebreo literal y mantiene abierta la referencia funcional a una unidad real de guardia o mensajería.
- source_word: וַיָּבֵא אֹתָם אֵלָיו
  english_pob_choice: and brought them to himself
  chosen_spanish: y los llevó a él
  alternatives_spanish:
  - y los llevó a su presencia
  - y los condujo a sí
  lexicon: HALOT
  rationale: La construcción indica que los reunió consigo; ‘los llevó a él’ reproduce el movimiento hacia Joyadá sin sobreexplicar con una perífrasis reflexiva.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea ‘casa’ en vez de ‘templo’, siguiendo la terminología POB y el paralelo con el texto original.
- source_word: וַיִּכְרֹת לָהֶם בְּרִית
  english_pob_choice: He made a covenant with them
  chosen_spanish: Hizo con ellos un pacto
  alternatives_spanish:
  - Hizo con ellos un convenio
  - Cortó con ellos un pacto
  lexicon: HALOT
  rationale: ‘Pacto’ expresa bien el peso jurídico-relacional de ברית en español. ‘Hizo con ellos’ conserva la formulación idiomática sin calco duro.
- source_word: וַיַּשְׁבַּע אֹתָם
  english_pob_choice: and put them under oath
  chosen_spanish: y los hizo jurar
  alternatives_spanish:
  - y los puso bajo juramento
  - y los obligó a jurar
  lexicon: HALOT
  rationale: El causativo hebreo pide una forma que muestre que Joyadá los obligó a prestar juramento. ‘Los hizo jurar’ es directa y fiel.
- source_word: וַיַּרְא אֹתָם אֶת בֶּן הַמֶּלֶךְ
  english_pob_choice: and showed them the king’s son
  chosen_spanish: y les mostró al hijo del rey
  alternatives_spanish:
  - y les presentó al hijo del rey
  - y les hizo ver al hijo del rey
  lexicon: HALOT
  rationale: ‘Les mostró’ reproduce de forma natural el sentido de presentar o revelar al heredero. Se mantiene ‘hijo del rey’ para evitar suavizar la referencia dinástica.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: ‘Yahvé’. Esto preserva el nombre divino en lugar de sustituirlo por una convención litúrgica.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh/Yahvé'
- issue: עַל־ / בֵּית יְהוָה como lugar de juramento y reunión
  english_pob_reading: in the house of Yahweh
  chosen_spanish_reading: en la casa de Yahvé
  alternative_spanish_readings:
  - en el templo de Yahvé
  - en la casa del Señor
  rationale: Se mantiene la locución bíblica ‘casa de Yahvé’, que conserva tanto la forma del hebreo como la referencia cultual concreta del lugar.
  doctrine_reference: Terminología POB sobre בית יהוה
translation_notes:
  revision_awareness: Se ha seguido la lectura del paquete fuente y la auditoría inglesa sin cambios revisionarios aplicados. La formulación española intenta conservar el orden y las relaciones sintácticas del hebreo, con ajustes mínimos para fluidez natural.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יְהוָה.
  - Se conserva ‘casa de Yahvé’ en lugar de ‘templo’, conforme a la terminología del proyecto.
  - Se traduce ברית como ‘pacto’, manteniendo el peso relacional y jurídico del término.
  - Se mantiene la distinción entre ‘corredores’ y su posible función de guardia o mensajería en la nota, sin neutralizar el término en el texto principal.
