base_translation:
  language: en
  yaml_path: translation/ot/micah/005/004.yaml
  text: And he will be peace[a]. When Assyria comes into our land and treads in our citadels[c][b], then we will raise up against him seven shepherds and eight princes of men.
  footnotes:
