translation:
  language: es
  text: 'Y Josué dijo a los hijos de Israel[a]: «¿Hasta cuándo seguirán siendo remisos en entrar a tomar posesión de la tierra que Yahvé, el Dios de sus padres, les ha dado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». Literalmente, «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la narración; en español, «Y ... dijo» conserva ese flujo sin añadir una relación causal o temporal más fuerte de la que exige el hebreo.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Joshua
  lexicon: Nombre propio bíblico estándar
  rationale: En español bíblico el nombre se expresa naturalmente como «Josué», forma tradicional y plenamente inteligible.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel[a]
  - los israelitas
  lexicon: HALOT
  rationale: Se preserva la expresión filial literal del hebreo. «Los israelitas» es más fluido, pero borra la transparencia del sintagma מקור/original y la forma masculina plural explícita.
- source_word: עַד אָנָה
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo?
  alternatives_spanish:
  - ¿Hasta cuándo será?
  - ¿Hasta cuándo seguirán?
  lexicon: HALOT
  rationale: La pregunta hebrea de reprensión se vierte de manera idiomática en español como «¿Hasta cuándo?», manteniendo el tono de reproche.
- source_word: מִתְרַפִּים
  english_pob_choice: will you be slack
  chosen_spanish: van a ser remisos
  alternatives_spanish:
  - se van a mostrar negligentes
  - van a estar flojos
  - van a aflojar
  lexicon: HALOT
  rationale: «Remisos» comunica la idea de falta de diligencia o de resolución sin cargar el texto con una acusación moral más fuerte que la del hebreo. «Ser flojos» sería demasiado coloquial; «negligentes» suena más técnico y menos directo.
- source_word: לָבוֹא
  english_pob_choice: about going in
  chosen_spanish: en entrar
  alternatives_spanish:
  - para entrar
  - de ir a entrar
  lexicon: HALOT
  rationale: Con la reprimenda de «remisos», el infinitivo de movimiento se expresa de modo natural como «en entrar», conservando la dirección hacia el territorio.
- source_word: לָרֶשֶׁת
  english_pob_choice: to take possession of
  chosen_spanish: a tomar posesión de
  alternatives_spanish:
  - a poseer
  - a heredar
  lexicon: HALOT
  rationale: 'La expresión capta bien ירשׁ en contexto territorial: no solo «poseer» en abstracto, sino ocupar efectivamente la tierra recibida.'
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: «La tierra» conserva el valor bíblico del término en el contexto de la promesa y la conquista.
- source_word: אֲשֶׁר נָתַן לָכֶם
  english_pob_choice: that ... has given you
  chosen_spanish: que ... les ha dado
  alternatives_spanish:
  - que ... les dio
  - que ... les está dando
  lexicon: HALOT
  rationale: El perfecto hebreo se refleja con el pretérito perfecto compuesto en español, subrayando que el don ya fue otorgado y sigue vigente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: Transliteración del nombre divino
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé» como nombre propio divino, no una sustitución titulativa como «SEÑOR».'
- source_word: אֱלֹהֵי אֲבוֹתֵיכֶם
  english_pob_choice: the God of your fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - su Dios ancestral
  lexicon: HALOT
  rationale: Se conserva la fórmula pactal tradicional en español. «De sus padres» reproduce fielmente el hebreo y mantiene la referencia intergeneracional del pacto.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. Según la norma del proyecto, se preserva como nombre propio divino en español («Yahvé») para no ocultar el nombre personal del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel[a]
  rationale: Se mantiene la expresión literal y transparente del hebreo. Esto conserva el matiz familiar/covenantal del giro y evita sustituirlo por un etnónimo más interpretativo.
  doctrine_reference: POB lexical transparency policy
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés; el pasaje muestra alto acuerdo entre la traducción POB y la revisión cruzada, sin cambios necesarios.
  spanish_consistency_notes:
  - 'Se mantuvo la terminología del proyecto para el nombre divino: «Yahvé».'
  - «Los hijos de Israel» conserva la transparencia lexical frente a una paráfrasis etnónimica.
  - «Remisos» equilibra fidelidad semántica y registro bíblico en español sin volver el reproche más duro de lo que indica el hebreo.
  - La coordinación narrativa inicial con «Y» sigue el avance wayyiqtol sin sobreinterpretación.
