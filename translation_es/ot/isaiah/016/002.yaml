translation:
  language: es
  text: Y como ave errante[a], como nido arrojado[b], así serán las hijas[c] de Moab junto a los vados del Arnón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como ave fugitiva». El hebreo admite la idea de un ave que vaga, huye o se desplaza sin reposo.
    reason: lexical_alternative
  - marker: b
    text: O «como nido echado fuera» / «como nido expulsado». La imagen hebrea es comprimida y puede enfatizar un nido perturbado y abandonado.
    reason: lexical_alternative
  - marker: c
    text: «Las hijas de Moab» puede referirse literalmente a mujeres moabitas o, figuradamente, a los pueblos o asentamientos de Moab personificados como hijas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will be
  chosen_spanish: y ... serán
  alternatives_spanish:
  - y ... será
  - y ... sucederá
  lexicon: HALOT
  rationale: La construcción hebrea introduce la imagen y su resultado. En español, «y ... serán» conserva el valor futuro y la fluidez poética sin añadir una paráfrasis innecesaria.
- source_word: כְעוֹף נוֹדֵד
  english_pob_choice: like a wandering bird
  chosen_spanish: como ave errante
  alternatives_spanish:
  - como un ave que vaga
  - como un ave fugitiva
  lexicon: HALOT
  rationale: «Ave» mantiene la imagen genérica de עוֹף y «errante» comunica היטב el movimiento de נדד sin forzar un matiz de pánico que el hebreo no explicita por sí solo.
- source_word: קֵן מְשֻׁלָּח
  english_pob_choice: like a scattered nest
  chosen_spanish: como nido arrojado
  alternatives_spanish:
  - como nido echado fuera
  - como nido expulsado
  - como nido abandonado
  lexicon: HALOT
  rationale: La expresión hebrea es muy comprimida. «Arrojado» representa el valor de מְשֻׁלָּח como algo echado fuera o lanzado lejos, y preserva la tensión poética del cuadro; «nido abandonado» sería más interpretativo.
- source_word: בְּנוֹת מוֹאָב
  english_pob_choice: the daughters of Moab
  chosen_spanish: las hijas de Moab
  alternatives_spanish:
  - las mujeres de Moab
  - las ciudades de Moab
  lexicon: HALOT
  rationale: 'Se conserva la metáfora literal «hijas de Moab» para mantener la ambigüedad poética señalada por la tradición de la POB: puede referirse a mujeres o, por personificación, a poblaciones/ciudades dependientes.'
- source_word: מַעְבָּרֹת
  english_pob_choice: at the fords
  chosen_spanish: junto a los vados
  alternatives_spanish:
  - en los vados
  - en los lugares de cruce
  lexicon: HALOT
  rationale: «Vados» es el equivalente geográfico más preciso en español para los lugares de paso en un río. «Junto a» refleja la situación de estar al borde o cerca de esos puntos de cruce.
- source_word: לְאַרְנוֹן
  english_pob_choice: of the Arnon
  chosen_spanish: del Arnón
  alternatives_spanish:
  - del Arnon
  - junto al Arnón
  lexicon: HALOT
  rationale: Se translitera el nombre propio al uso español como «Arnón». El genitivo se expresa naturalmente con «del» para mantener la referencia geográfica de la imagen.
theological_decisions:
- issue: Ambigüedad de «las hijas de Moab»
  english_pob_reading: May refer literally to Moabite women or figuratively to the towns/settlements of Moab personified as daughters.
  chosen_spanish_reading: Se conserva la ambigüedad literal-poética de «las hijas de Moab».
  alternative_spanish_readings:
  - las mujeres de Moab
  - las ciudades de Moab personificadas
  rationale: El hebreo permite ambas posibilidades y la POB en inglés las dejó abiertas. La traducción principal no resuelve la ambigüedad para no borrar la tensión poética y referencial del texto.
  doctrine_reference: Poética bíblica / ambigüedad deliberada del texto
- issue: Valor imagístico de la comparación doble
  english_pob_reading: And like a wandering bird, like a scattered nest...
  chosen_spanish_reading: Se conserva la doble comparación con «como... como...», no fusionada en una sola imagen.
  alternative_spanish_readings:
  - como ave errante y nido arrojado
  - como ave errante, semejante a un nido arrojado
  rationale: La revisión inglesa añadió el segundo 'like' para reflejar mejor el paralelismo hebreo. En español se mantiene esa duplicación para no suavizar la estructura retórica ni perder el ritmo paralelo del verso.
  doctrine_reference: Paralelismo hebreo / fidelidad retórica
translation_notes:
  revision_awareness: 'La versión inglesa revisada añadió explícitamente el segundo ''like'' para reflejar el paralelismo hebreo: «like a wandering bird, like a scattered nest». La propuesta española conserva esa duplicación con «como ave errante, como nido arrojado», manteniendo el mismo ajuste revisional y la misma imagen doble.'
  spanish_consistency_notes:
  - Se prefirió «hijas de Moab» por coherencia con el lenguaje poético del original y con la práctica POB de preservar metáforas abiertas.
  - «Vados» es el término geográfico natural en español para מַעְבָּרוֹת en este contexto.
  - «Arnón» sigue la transliteración castellana habitual del topónimo.
  - No se usó «SEÑOR» ni términos de sustitución cultual porque aquí no aparece el nombre divino.
