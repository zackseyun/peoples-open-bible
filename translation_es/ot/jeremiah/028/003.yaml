translation:
  language: es
  text: Dentro de dos años[a], yo devolveré a este lugar todos los utensilios[b] de la casa de Yahvé, que Nabucodonosor[d], rey de Babilonia, tomó de este lugar y los llevó a Babilonia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «dentro de dos años de días», un modismo que significa «dentro de dos años».'
    reason: lexical_alternative
  - marker: b
    text: O «vasos», «artículos» o «vasijas» de la casa de Yahvé.
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo expresa explícitamente el pronombre objeto: «y los llevó a Babilonia».'
    reason: lexical_alternative
  - marker: d
    text: La forma del nombre del rey también aparece como «Nabucodrezzar» en Jeremías.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/עוֹד שְׁנָתַיִם יָמִים
  english_pob_choice: Within two years
  chosen_spanish: Dentro de dos años
  alternatives_spanish:
  - En dos años
  - Dentro de dos años de días
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática de plazo futuro próximo; en español natural, «Dentro de dos años» comunica el mismo intervalo sin calco pesado. Se conserva el valor temporal profético de un período aún por cumplirse.
- source_word: מֵשִׁיב
  english_pob_choice: I will bring back
  chosen_spanish: yo devolveré
  alternatives_spanish:
  - yo traeré de vuelta
  - yo restauraré
  lexicon: HALOT
  rationale: El contexto concreto son objetos desplazados, no una restauración abstracta. «Devolveré» expresa el retorno físico a un lugar y preserva la fuerza del verbo en la escena profética.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  english_pob_choice: to this place
  chosen_spanish: a este lugar
  alternatives_spanish:
  - a este sitio
  - a este lugar mismo
  lexicon: HALOT
  rationale: «Este lugar» es la forma natural en español para el deíctico hebreo y mantiene la referencia inmediata al sitio señalado por el contexto.
- source_word: כָּל כְּלֵי בֵּית יְהוָה
  english_pob_choice: all the vessels of the house of Yahweh
  chosen_spanish: todos los utensilios de la casa de Yahvé
  alternatives_spanish:
  - todos los vasos de la casa de Yahvé
  - todos los artículos de la casa de Yahvé
  lexicon: HALOT
  rationale: כְּלִים abarca objetos/implementos y, en este contexto de expolio del templo, «utensilios» comunica bien los bienes sagrados sin reducirlos solo a recipientes. Se conserva «casa de Yahvé» para reflejar בֵּית יְהוָה de modo transparente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte según la norma del proyecto como «Yahvé», transliteración del nombre divino y no una sustitución titulada. Se mantiene la consistencia terminológica en español.
- source_word: אֲשֶׁר לָקַח
  english_pob_choice: which ... took
  chosen_spanish: que tomó
  alternatives_spanish:
  - que se llevó
  - que había tomado
  lexicon: HALOT
  rationale: El relativo identifica los objetos; «tomó» sigue el sentido básico de לקח sin intensificar innecesariamente. En este contexto, el español deja claro que se trata de una toma como botín.
- source_word: נְבוּכַדנֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodrezzar
  - Nebucadnezar
  lexicon: HALOT
  rationale: Se emplea la forma española ampliamente reconocible del nombre del rey babilónico. Aunque Jeremías a veces refleja una forma cercana a «Nebucadrezzar», el nombre español tradicional inteligible aquí es «Nabucodonosor».
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - el rey de Babilonia
  lexicon: HALOT
  rationale: La construcción en genitivo se traduce de forma directa y natural en español. «Rey de Babilonia» conserva la relación de gobierno sin sobrecargar la frase.
- source_word: מִן הַמָּקוֹם הַזֶּה
  english_pob_choice: from this place
  chosen_spanish: de este lugar
  alternatives_spanish:
  - desde este lugar
  - fuera de este lugar
  lexicon: HALOT
  rationale: «De este lugar» reproduce con naturalidad la procedencia espacial. Mantiene la correspondencia con «a este lugar» en la primera mitad del versículo.
- source_word: וַ/יְבִיאֵ֖/ם בָּבֶל
  english_pob_choice: and brought them to Babylon
  chosen_spanish: y los llevó a Babilonia
  alternatives_spanish:
  - y los trajo a Babilonia
  - y los condujo a Babilonia
  lexicon: HALOT
  rationale: El hebreo incluye explícitamente el pronombre objeto; por eso se conserva «los» en español. «Llevó» comunica el traslado a un destino con tono natural en español; «a Babilonia» conserva el movimiento hacia la ciudad.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, por lo que en español se mantiene la transliteración del nombre divino como «Yahvé», conforme a la política del proyecto. Se evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Concrete return of temple items
  english_pob_reading: I will bring back all the vessels of the house of Yahweh
  chosen_spanish_reading: yo devolveré a este lugar todos los utensilios de la casa de Yahvé
  alternative_spanish_readings:
  - yo traeré de vuelta a este lugar todos los utensilios de la casa de Yahvé
  - yo restauraré a este lugar todos los utensilios de la casa de Yahvé
  rationale: La profecía anuncia el retorno físico de objetos del templo; por eso se prefiere un verbo de restitución concreta («devolveré») antes que una formulación más abstracta como «restauraré».
  doctrine_reference: Jeremías 28:3 context of temple vessels and exile
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se reportaron cambios necesarios y el cotejo mostró alto acuerdo. La redacción española sigue de cerca la lectura hebrea y la decisión auditada de traducir el Tetragrámaton como Yahvé, manteniendo la referencia concreta a los utensilios del templo y el movimiento de retorno/exilio.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva la secuencia espacial paralela «a este lugar» / «de este lugar».
  - Se refleja el objeto explícito del hebreo con «los llevó».
  - Se usa una traducción española natural sin perder la estructura y el contenido del hebreo.
