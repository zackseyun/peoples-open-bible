  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. «Salmo» para מזמור y «arpas» con nota alternativa «liras» para נבלים concuerdan con el expediente inglés. No aparecen términos sensibles como Yahvé, Mesías o esclavo.
