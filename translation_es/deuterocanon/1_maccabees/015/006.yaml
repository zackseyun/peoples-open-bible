translation:
  language: es
  text: para hacer tu propia moneda para tu país;[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para acuñar tu propia moneda como la moneda circulante de tu país». El griego usa un verbo general («hacer») con términos para dinero acuñado y moneda en circulación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιῆσαι
  english_pob_choice: to make
  chosen_spanish: hacer
  alternatives_spanish:
  - producir
  - acuñar
  lexicon: LSJ
  rationale: El infinitivo aoristo de ποιέω es amplio (‘hacer’/‘hacer llegar a ser’). En español, ‘hacer acuñar’ conserva la generalidad del verbo griego y, a la vez, permite que el objeto monetario precise la acción.
- source_word: κόμμα
  english_pob_choice: coinage
  chosen_spanish: moneda
  alternatives_spanish:
  - acuñación
  - moneda acuñada
  - monedaje
  lexicon: LSJ
  rationale: En este contexto κόμμα alude a dinero acuñado o pieza monetaria. ‘Moneda’ es la opción más natural en español y evita la rareza de ‘acuñación’ como sustantivo abstracto, que sonaría menos directo en la frase.
- source_word: ἴδιον
  english_pob_choice: your own
  chosen_spanish: tu propia
  alternatives_spanish:
  - propia
  - tu
  - de ti
  lexicon: LSJ
  rationale: ἴδιον marca posesión o pertenencia particular del destinatario. ‘Tu propia’ refleja bien ese matiz de posesión exclusiva y suena idiomático en español.
- source_word: νόμισμα
  english_pob_choice: currency
  chosen_spanish: moneda
  alternatives_spanish:
  - dinero
  - moneda circulante
  - curso legal
  lexicon: LSJ
  rationale: νόμισμα es el dinero en circulación, la moneda usada como medio de pago. En español, ‘moneda’ comunica de forma natural tanto la pieza como su función económica; aquí evita introducir una abstracción que el griego no exige.
- source_word: τῆς χώρας σου
  english_pob_choice: of your country
  chosen_spanish: para tu país
  alternatives_spanish:
  - de tu país
  - de tu tierra
  - para tu territorio
  lexicon: LSJ
  rationale: 'χώρα puede ser ‘tierra’, ‘región’ o ‘país’. En un contexto político-royal, ‘país’ es la forma más clara y actual en español. La preposición ‘para’ sigue la fuerza concesiva de la frase: se concede el derecho de acuñar para el ámbito del país.'
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó la redundancia de ‘for the currency of’ para ajustarse mejor al griego. La redacción española sigue esa revisión, evitando duplicar la idea de moneda/circulación y manteniendo solo el derecho concedido a acuñar moneda propia para el país.
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ u otras equivalencias teológicas porque el verso no contiene lenguaje divino.
  - ‘Moneda’ se usa de manera consistente para evitar una alternancia innecesaria entre ‘moneda’, ‘dinero’ y ‘acuñación’ en una sola frase.
  - La construcción ‘hacer acuñar’ intenta respetar la amplitud de ποιῆσαι sin convertirla en un tecnicismo más fuerte que el griego.
