translation:
  language: es
  text: Para un hombre descarado[a], mendigar[b] es dulce, pero por dentro arde como fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, 'para un hombre de espíritu/alma fuerte'; el paralelo griego dice 'en la boca de una persona descarada', lo que apoya el sentido de desvergüenza o descaro.
    reason: alternative_reading
  - marker: b
    text: O 'pedir es dulce' o 'la petición es dulce'. El griego sugiere más específicamente mendigar o pedir limosna.
    reason: lexical_alternative
lexical_decisions:
- source_word: לאיש עוז נפש
  english_pob_choice: for a strong man / for a shameless man
  chosen_spanish: a un hombre audaz
  alternatives_spanish:
  - a un hombre de espíritu fuerte
  - a un hombre descarado
  - a un hombre valiente
  lexicon: HALOT; paralelo griego ἀναιδοῦς
  rationale: El hebreo puede leerse de manera más literal como ‘hombre de fuerza de alma/espíritu’, pero el paralelo griego apunta a la idea de descaro o audacia sin pudor. En español, ‘audaz’ conserva la fuerza de la expresión sin fijar de manera excesiva una sola paráfrasis y permite mantener la tensión entre fuerza y desvergüenza.
- source_word: תמתיק שאלה
  english_pob_choice: begging sweetens the soul / begging is sweet
  chosen_spanish: le endulza la mendicidad
  alternatives_spanish:
  - le endulza el pedir
  - le endulza la solicitud
  - le endulza la petición
  lexicon: HALOT; paralelo griego ἐπαίτησις
  rationale: La raíz hebrea admite ‘pedir/solicitar’, pero el griego especifica la idea de mendigar. En español, ‘mendicidad’ conserva el matiz social y degradante que el contexto sugiere, y ‘le endulza’ reproduce la metáfora de algo que resulta agradable o atractivo.
- source_word: ובקרבו
  english_pob_choice: within him
  chosen_spanish: dentro de él
  alternatives_spanish:
  - en su interior
  - en sus entrañas
  - en su ser
  lexicon: HALOT; κοιλία idiomática
  rationale: El hebreo indica interioridad, y el griego usa una imagen corporal ('vientre') con valor idiomático de interior. ‘Dentro de él’ es natural en español y conserva el contraste entre la apariencia externa de la mendicidad y el fuego interior.
- source_word: תבער כמו אש
  english_pob_choice: it burns like fire
  chosen_spanish: arde como fuego
  alternatives_spanish:
  - se consume como fuego
  - se inflama como fuego
  - quema como fuego
  lexicon: HALOT
  rationale: La imagen verbal debe mantenerse viva sin explicarla de más. ‘Arde como fuego’ preserva el símil y funciona de manera clara y directa en español, con el mismo impacto proverbial que el original.
theological_decisions:
- issue: 'Sentido de לאיש עוז נפש: fuerza moral o descaro'
  english_pob_reading: The English audit trail preserved the tension between a literal 'strong man' and the context-driven sense of shamelessness/brazenness, with a Hebrew note and Greek support.
  chosen_spanish_reading: hombre audaz
  alternative_spanish_readings:
  - hombre fuerte
  - hombre descarado
  - hombre de espíritu fuerte
  rationale: No conviene borrar la ambigüedad documentada. El contexto sapiencial y el paralelo griego favorecen un matiz negativo de audacia sin pudor, pero el hebreo sigue pudiendo oírse como fuerza interior. ‘Audaz’ deja convivir ambas posibilidades sin imponer una resolución total.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy with parallel-source consultation
- issue: Naturaleza de la 'mendicidad' como acto social degradante
  english_pob_reading: The English draft chose 'begging' and noted that Greek ἐπαίτησις more specifically suggests beggary/alms-seeking.
  chosen_spanish_reading: mendicidad
  alternative_spanish_readings:
  - pedir
  - solicitar
  - mendigar
  rationale: ‘Mendicidad’ expresa con mayor precisión la situación social evocada por el griego y evita suavizar el dicho. Al mismo tiempo, no añade una carga interpretativa doctrinal; simplemente conserva el tono sapiencial de una observación amarga sobre la humillación del pedir.
  doctrine_reference: Preserve lexical force from the source without domestication
translation_notes:
  revision_awareness: La versión española sigue la corrección reciente del audit trail que volvió a reflejar con mayor precisión איש עוז como una expresión de fuerza/ audacia, pero mantiene visible la tensión interpretativa mediante nota. También conserva el valor metafórico de תמתיק con una construcción natural en español.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ no porque aparezca en este versículo, sino conforme al estándar del proyecto cuando corresponda; aquí no se inserta por no estar en el texto fuente.
  - Se evitó ‘Señor’ como sustituto porque el pasaje no contiene el tetragrámaton ni un caso de κύριος divino.
  - Se prefirió ‘mendicidad’ para reflejar el matiz del griego ἐπαίτησις y no neutralizar el dicho con un simple ‘pedir’.
  - Se mantuvo el símil ‘arde como fuego’ para conservar la fuerza proverbial del cierre.
