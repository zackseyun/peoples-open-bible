translation:
  language: es
  text: Y ella se ató el cabello con una cinta, y tomó una vestidura de lino para engañarlo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para su engaño'. La frase griega puede verterse más literalmente, pero el sentido en contexto es que tomó la prenda con el fin de engañarlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδήσατο
  english_pob_choice: bound up
  chosen_spanish: se ató
  alternatives_spanish:
  - se recogió
  - se sujetó
  - se prendió
  lexicon: LSJ
  rationale: El verbo medio de δέω expresa aquí el acto de asegurar o arreglar el cabello. En español, 'se ató' comunica bien la acción sin cargarla de interpretación adicional.
- source_word: τὰς τρίχας αὐτῆς
  english_pob_choice: her hair
  chosen_spanish: el cabello
  alternatives_spanish:
  - los cabellos
  - sus cabellos
  - las hebras de su cabello
  lexicon: LSJ
  rationale: Aunque el griego usa plural, en español el singular colectivo 'cabello' es más natural y fiel al sentido idiomático que una pluralización forzada.
- source_word: μίτρᾳ
  english_pob_choice: headband
  chosen_spanish: una cinta para la cabeza
  alternatives_spanish:
  - una banda para la cabeza
  - un adorno para la cabeza
  - un turbante
  lexicon: LSJ
  rationale: μίτρα puede denotar una banda o tocado para la cabeza. 'Cinta para la cabeza' conserva la función de sujetar el cabello y evita la ambigüedad de 'mitra' en español eclesiástico.
- source_word: ἔλαβεν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - llevó
  - agarró
  - se puso
  lexicon: LSJ
  rationale: '''Tomó'' reproduce de cerca el valor básico de λαμβάνω/ἔλαβεν y deja al contexto la inferencia de que la prenda fue asumida o preparada para el plan.'
- source_word: στολὴν λινῆν
  english_pob_choice: a linen garment
  chosen_spanish: una vestidura de lino
  alternatives_spanish:
  - una prenda de lino
  - un vestido de lino
  - una ropa de lino
  lexicon: LSJ
  rationale: στολή es una prenda o vestidura; 'vestidura' mantiene el tono elevado y amplio del griego sin precisar más de lo que el texto dice.
- source_word: εἰς ἀπάτην αὐτοῦ
  english_pob_choice: to deceive him
  chosen_spanish: para engañarlo
  alternatives_spanish:
  - para su engaño
  - con el fin de engañarlo
  - a fin de engañarlo
  lexicon: LSJ
  rationale: La construcción de finalidad εἰς ἀπάτην pide en español una expresión final natural. 'Para engañarlo' preserva de forma directa la intención narrativa sin suavizar ἀπάτη.
theological_decisions:
- issue: Caracterización moral de la acción de Judit
  english_pob_reading: Render the clause straightforwardly as an act aimed 'to deceive him' without softening or moralizing.
  chosen_spanish_reading: Traducir el propósito de manera directa como 'para engañarlo', sin atenuarlo ni añadir juicio moral explícito.
  alternative_spanish_readings:
  - para su engaño
  - para seducirlo
  rationale: El griego emplea ἀπάτη, vocabulario explícito de engaño. La traducción debe preservar esa franqueza narrativa y no convertirla en una formulación más suave o más interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
translation_notes:
  revision_awareness: La versión española sigue el texto griego de Swete sin cambios textuales relevantes respecto del control inglés; conserva la equivalencia óptima del audit trail, con la misma decisión clave sobre ἀπάτη como finalidad de engaño.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponde al nombre divino; este versículo no lo contiene.
  - Se evita 'mitra' por su asociación eclesiástica en español y por la posible confusión con el tocado sacerdotal.
  - '''Engañarlo'' mantiene el tono narrativo directo del griego, coherente con el audit trail inglés.'
  - '''Vestidura'' conserva el nivel estilístico elevado de στολή sin forzar una especificación como ''vestido''.'
