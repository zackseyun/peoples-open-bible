revisions:
- from: Tú les diste reinos y pueblos[a], y les asignaste a cada rincón. Así tomaron posesión de la tierra de Sijón, es decir, la tierra del rey de Hesbón[b], y de la tierra de Og, rey de Basán.
  to: Tú les diste reinos y pueblos[a], y les asignaste cada rincón. Así tomaron posesión de la tierra de Sijón, incluso la tierra del rey de Hesbón[b], y de la tierra de Og, rey de Basán.
  rationale: Se corrige la construcción «a cada rincón» por «cada rincón» para reflejar que lo adjudicado son las partes/extremos del territorio, no el destino de las personas. También se suaviza «es decir» a «incluso» para acercarse mejor a la revisión del POB inglés y dejar la explicación apposicional explícita en la nota.
