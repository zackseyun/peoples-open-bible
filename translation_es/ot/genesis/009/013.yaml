translation:
  language: es
  text: He puesto mi arco en la nube[a], y será una señal del pacto entre mí y la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi arcoíris». El hebreo dice literalmente «mi arco», usando la palabra ordinaria para un arco; en este contexto se refiere al arcoíris en la nube.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַשְׁתִּי
  english_pob_choice: my bow
  chosen_spanish: mi arco
  alternatives_spanish:
  - mi arco iris
  - mi arco en el cielo
  lexicon: HALOT
  rationale: קֶשֶׁת es literalmente “arco” y en este contexto designa el signo del arco iris. Mantener “arco” conserva la imagen hebrea directa; la lectura contextual de “arco iris” se reserva para la nota, como en el POB inglés.
- source_word: נָתַתִּי
  english_pob_choice: I have set
  chosen_spanish: he puesto
  alternatives_spanish:
  - he colocado
  - he dado
  - puse
  lexicon: HALOT
  rationale: נתן puede significar “poner/colocar”. En español, “he puesto” expresa bien la acción de situar el arco en la nube y conserva un perfecto con relevancia presente, equivalente al inglés auditado.
- source_word: בֶּעָנָן
  english_pob_choice: in the cloud
  chosen_spanish: en la nube
  alternatives_spanish:
  - en la nube de tormenta
  - en las nubes
  lexicon: HALOT
  rationale: El sustantivo está en singular y el contexto inmediato es el fenómeno visible en la nube. “En la nube” sigue de cerca el hebreo y suena natural en español.
- source_word: וְהָיְתָה
  english_pob_choice: and it will be
  chosen_spanish: y será
  alternatives_spanish:
  - y estará
  - y llegará a ser
  lexicon: HALOT
  rationale: La forma con waw aquí tiene valor prospectivo/resultativo. “Será” comunica de modo claro y natural que el arco funcionará como señal.
- source_word: לְאוֹת
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - un signo
  - una marca
  lexicon: HALOT
  rationale: אֹות puede traducirse por “señal” o “signo”. En español bíblico actual, “señal” comunica bien el valor de token del pacto sin sonar técnico.
- source_word: בְּרִית
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - la alianza
  - el convenio
  lexicon: HALOT
  rationale: בְּרִית se traduce comúnmente por “pacto” en el proyecto POB. “Pacto” preserva el peso jurídico-relacional del término y evita sustituirlo por una formulación eclesiástica más tradicional sin necesidad.
- source_word: בֵּינִי וּבֵין הָאָרֶץ
  english_pob_choice: between me and the earth
  chosen_spanish: entre yo y la tierra
  alternatives_spanish:
  - entre mí y la tierra
  - entre yo y el mundo
  lexicon: HALOT
  rationale: אֶרֶץ aquí abarca la tierra en sentido universal del relato del diluvio. “Entre yo y la tierra” reproduce la estructura hebrea y el alcance cósmico del pacto.
theological_decisions:
- issue: Referente de קַשְׁתִּי en el contexto del pacto
  english_pob_reading: Literal 'bow' retained in the main text, understood as the rainbow-sign in context
  chosen_spanish_reading: “arco” en el texto principal, entendido como el arco iris por el contexto
  alternative_spanish_readings:
  - “arco iris” en el texto principal
  rationale: El hebreo usa el término ordinario para “arco”. Mantener “arco” conserva la imagen original y evita borrar una tensión léxica documentada; el contexto de la nube permite entender el fenómeno como arco iris, que se indica en la nota.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Elección de terminología de covenant para בְּרִית
  english_pob_reading: the covenant
  chosen_spanish_reading: el pacto
  alternative_spanish_readings:
  - la alianza
  rationale: “Pacto” refleja de manera estable la decisión terminológica del proyecto para בְּרִית y comunica mejor el marco relacional-jurídico del pasaje que un término más litúrgico o menos preciso.
  doctrine_reference: Lexical policy on בְּרִית
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin revisiones en el último pase; el español sigue esa lectura base, conservando el valor literal de “bow/arco” en el texto principal y la interpretación contextual de “rainbow/arco iris” en nota.
  spanish_consistency_notes:
  - Se mantiene “pacto” para בְּרִית, conforme al estándar del proyecto.
  - Se conserva el tratamiento directo de primera persona singular para Dios y la tierra como destinatario del signo.
  - No se introduce “SEÑOR” ni “Cristo”, porque el versículo no contiene esos términos.
  - La nota explica la ambigüedad léxica sin reemplazar la imagen principal del texto.
