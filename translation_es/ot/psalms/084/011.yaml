translation:
  language: es
  text: Porque un día en tus atrios vale más que mil[a]; yo prefiero estar en el umbral[b] de la casa de mi Dios que habitar en las tiendas de la maldad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice simplemente «que mil»; algunas traducciones añaden «en otro lugar», pero esa palabra no está en el texto.
    reason: alternative_reading
  - marker: b
    text: 'O: «he escogido estar en el umbral de la casa de mi Dios»; tradicionalmente, «ser portero en la casa de mi Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: better
  chosen_spanish: vale más
  alternatives_spanish:
  - es mejor
  - es bueno
  lexicon: HALOT
  rationale: En una comparación explícita con מֵאָלֶף, el español natural pide una forma comparativa. «Vale más» transmite la preferencia y evita una literalidad torpe sin perder el sentido evaluativo de טוֹב.
- source_word: בַּחֲצֵרֶיךָ
  english_pob_choice: in your courts
  chosen_spanish: en tus atrios
  alternatives_spanish:
  - en tus cortes
  - en tus patios
  lexicon: HALOT
  rationale: «Atrios» es el término bíblico-natural en español para el ámbito del santuario y conserva el valor cultual de חָצֵר sin sonar como «patios» modernos ni como «cortes» en sentido judicial.
- source_word: מֵאָלֶף
  english_pob_choice: than a thousand
  chosen_spanish: más que mil
  alternatives_spanish:
  - que mil
  - más que un millar
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de/que mil», sin añadir «en otra parte» ni «días». «Más que mil» comunica la comparación de forma natural en español y mantiene la indeterminación del texto.
- source_word: בָּחַרְתִּי
  english_pob_choice: I would rather
  chosen_spanish: yo prefiero
  alternatives_spanish:
  - yo he escogido
  - yo escogería
  lexicon: HALOT
  rationale: La forma perfecta expresa una decisión/preferencia en poesía. «Yo prefiero» conserva el matiz volitivo mejor que un perfecto meramente narrativo y no obliga a introducir un condicional que el hebreo no requiere.
- source_word: הִסְתּוֹפֵף
  english_pob_choice: stand at the threshold
  chosen_spanish: estar a la entrada
  alternatives_spanish:
  - estar en el umbral
  - ser portero
  lexicon: HALOT
  rationale: El verbo señala una postura humilde en el umbral o la entrada. «Estar a la entrada» preserva esa idea sin imponer «ser portero» como oficio, que el POB inglés evitó explícitamente.
- source_word: בְּבֵית אֱלֹהַי
  english_pob_choice: in the house of my God
  chosen_spanish: de la casa de mi Dios
  alternatives_spanish:
  - en la casa de mi Dios
  - en el templo de mi Dios
  lexicon: HALOT
  rationale: La construcción con «estar a la entrada de» pide en español «de la casa de mi Dios». Se conserva «casa» como imagen de santuario sin sobreespecificar «templo».
- source_word: מִדּוּר
  english_pob_choice: than dwell
  chosen_spanish: que habitar
  alternatives_spanish:
  - que morar
  - que vivir
  lexicon: HALOT
  rationale: «Habitar» reproduce bien la idea de residencia estable y mantiene el paralelo con el estado de permanencia implícito en el infinitivo comparativo.
- source_word: בְּאָהֳלֵי רֶשַׁע
  english_pob_choice: in the tents of wickedness
  chosen_spanish: en las tiendas de la maldad
  alternatives_spanish:
  - en las tiendas de los malvados
  - en tiendas impías
  lexicon: HALOT
  rationale: «Maldad» conserva el sustantivo abstracto רֶשַׁע, tal como hace el inglés POB con «wickedness», en vez de convertirlo en personas («malvados»).
theological_decisions:
- issue: Contraste entre proximidad al santuario y residencia entre la impiedad
  english_pob_reading: your courts / the house of my God ... the tents of wickedness
  chosen_spanish_reading: tus atrios / la casa de mi Dios ... las tiendas de la maldad
  alternative_spanish_readings:
  - tus patios / el templo de mi Dios ... las tiendas de los malvados
  - tus cortes / la casa de mi Dios ... las tiendas de impiedad
  rationale: 'La versión mantiene el contraste espacial y moral del hebreo: estar cerca del lugar santo vale más que habitar entre ámbitos de perversidad. No se reemplaza «casa» por «templo» porque el hebreo dice בֵּית, y «casa» preserva la imagen sin perder el sentido cultual.'
  doctrine_reference: Salmo 84:11; cf. Salmo 27:4; Salmo 23:6
- issue: Posible eco tradicional de «doorkeeper»
  english_pob_reading: stand at the threshold
  chosen_spanish_reading: estar a la entrada
  alternative_spanish_readings:
  - ser portero
  - estar en el umbral
  rationale: Se evita introducir un oficio eclesial no explícito en el hebreo. La imagen se mantiene como postura humilde ante la presencia de Dios, coherente con la nota inglesa que rechaza forzar «doorkeeper» como traducción principal.
  doctrine_reference: Salmo 84:10-11
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el auditor inglés: conserva la comparación no explicitada de «mil», mantiene la imagen cultual de «atríos» y «casa de mi Dios», y evita añadir «en otro lugar» o convertir la frase en un oficio de portero. Se ajustó el orden para que el español resulte publicable y natural.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים y «maldad» para רֶשַׁע, en consonancia con el sistema del proyecto.
  - Se conserva el estilo bíblico con «atríos» y «casa», evitando equivalentes demasiado modernos que perderían el registro cultual.
  - «Yo prefiero» traduce la preferencia volitiva de בָּחַרְתִּי sin forzar un perfecto narrativo en español.
