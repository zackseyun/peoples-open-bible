translation:
  language: es
  text: Son nuevas cada mañana[a]; grande es tu fidelidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Es nueva cada mañana», si el sujeto implícito se entiende de manera más colectiva a partir del versículo anterior.'
    reason: alternative_reading
lexical_decisions:
- source_word: חֲדָשִׁים
  english_pob_choice: new
  chosen_spanish: Nuevas
  alternatives_spanish:
  - frescas
  - renovadas
  lexicon: HALOT
  rationale: El adjetivo plural hebreo significa “nuevo(s)” o “fresco(s)”. En español, “nuevas” conserva el valor descriptivo sin añadir una paráfrasis interpretativa. Se mantiene el sujeto implícito del contexto inmediato (las compasiones de Yahvé).
- source_word: לַבְּקָרִים
  english_pob_choice: every morning
  chosen_spanish: cada mañana
  alternatives_spanish:
  - por las mañanas
  - mañana tras mañana
  lexicon: HALOT
  rationale: La preposición con el sustantivo expresa repetición temporal. “Cada mañana” comunica con naturalidad la iteración y conserva la idea de renovarse con regularidad.
- source_word: רַבָּה
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - abundante
  - mucha
  lexicon: HALOT
  rationale: Con el predicado nominal, “grande” funciona bien en español y reproduce el valor de magnitud/intensidad del hebreo sin forzar una lectura más específica que el texto no exige.
- source_word: אֱמוּנָתֶךָ
  english_pob_choice: your faithfulness
  chosen_spanish: tu fidelidad
  alternatives_spanish:
  - tu fidelidad constante
  - tu lealtad
  lexicon: HALOT
  rationale: אֱמוּנָה en referencia a Dios expresa firmeza, confiabilidad y fidelidad de pacto. “Fidelidad” es la opción más clara y fiel en español, sin reducirla a mera creencia subjetiva.
theological_decisions:
- issue: Sujeto implícito de la primera cola
  english_pob_reading: They are new every morning
  chosen_spanish_reading: Nuevas son cada mañana
  alternative_spanish_readings:
  - Es nueva cada mañana
  rationale: El hebreo inicia con un adjetivo plural sin sujeto explícito. Como en el inglés POB, el antecedente más natural es el plural de 3:22 (las compasiones/ misericordias de Yahvé). En español, “Nuevas son” preserva mejor ese plural implícito que una forma singular.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Relación entre 3:22 y 3:23
  english_pob_reading: the implied subject is taken more collectively from the previous line
  chosen_spanish_reading: el sujeto implícito se toma colectivamente de la línea anterior
  alternative_spanish_readings:
  - el antecedente implícito se toma del verso anterior
  rationale: 'La decisión traductológica sigue el audit trail: el versículo depende del antecedente inmediato para completar la frase. Se conserva la tensión textual de que el hebreo no repite el sujeto, pero el español debe suministrarlo para ser idiomático.'
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la lectura óptima “They are new every morning” y conserva como alternativa “It is new every morning” si el sujeto implícito se entiende de modo colectivo desde el verso previo. No hubo revisiones aplicadas en la pasada más reciente, y el estado de concordancia es alto con observación menor.
  spanish_consistency_notes:
  - Se conserva «Yahvé» en el registro del proyecto, pero en este verso el nombre divino no aparece explícitamente; el antecedente está en 3:22.
  - Se eligió una estructura copulativa española natural (“Nuevas son…”) para reflejar el hebreo nominal sin añadir verbos interpretativos.
  - «Fidelidad» mantiene la terminología estable del proyecto para אֱמוּנָה en referencia a Dios.
