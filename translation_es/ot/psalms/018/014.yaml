    rationale: Aunque «granizo» es aceptable como colectivo, la decisión léxica inglesa destacó la imagen concreta de «hailstones». En español, «piedras de granizo» transmite mejor esa concreción sin sonar antinatural en contexto poético.
  revised_spanish_text: Yahvé tronó en los cielos, y el Altísimo dio su voz[a]—piedras de granizo[b] y brasas de fuego.
