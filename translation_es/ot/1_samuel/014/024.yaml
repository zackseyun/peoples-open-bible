  yaml_path: translation/ot/1_samuel/014/024.yaml
  text: Now the men of Israel were hard-pressed that day[a], and Saul put the people under an oath, saying, “Cursed is the man who eats food before evening, before I have avenged myself on my enemies.” So none of the people tasted food.
