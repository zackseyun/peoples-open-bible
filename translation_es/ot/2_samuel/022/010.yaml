revisions:
- from: Extendió los cielos[a] y descendió; y espesa oscuridad estaba bajo sus pies.
  to: Inclinó los cielos y descendió; espesa oscuridad[a] estaba bajo sus pies.
  rationale: Se reemplaza 'Extendió' por 'Inclinó' para reflejar fielmente el sentido de וַיֵּט en esta teofanía cósmica. También se suaviza la puntuación eliminando la segunda 'y' para un español más natural. Se conserva la imagen corporal literal y la alternativa léxica para עֲרָפֶל en una nota anclada correctamente al término relevante.
