translation:
  language: es
  text: Y he aquí[a], siete espigas[b], marchitas, delgadas y quemadas por el viento del oriente, brotaban después de ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y mira»; conserva la fuerza deíctica de la introducción del sueño.
    reason: alternative_reading
  - marker: b
    text: O «cabezas de grano».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Entonces, he aquí
  lexicon: HALOT
  rationale: Conserva la fuerza deíctica e interjectiva que introduce un elemento llamativo en el relato onírico. «He aquí» mantiene el énfasis sin sonar forzado en español bíblico moderno.
- source_word: שִׁבֳּלִים
  english_pob_choice: ears
  chosen_spanish: espigas
  alternatives_spanish:
  - espigas de grano
  - cabecillas de grano
  lexicon: HALOT
  rationale: En este contexto agrícola, el término hebreo designa las espigas o cabezas de grano. «Espigas» es natural y preciso en español; evita la rigidez de una glosa más larga.
- source_word: צְנֻמוֹת
  english_pob_choice: thin
  chosen_spanish: delgadas
  alternatives_spanish:
  - raquíticas
  - marchitas
  - magras
  lexicon: HALOT
  rationale: El término expresa una cualidad de estar enclenque, raído o menguado. En español, «delgadas» comunica bien esa apariencia física sin introducir un matiz más fuerte de marchitez que el texto no exige aquí.
- source_word: דַּקּוֹת
  english_pob_choice: thin
  chosen_spanish: delgadas
  alternatives_spanish:
  - finas
  - pequeñas
  - menudas
  lexicon: HALOT
  rationale: El adjetivo también significa delgadas/finas. Se mantiene «delgadas» para reflejar la repetición enfática de dos descriptores negativos en hebreo, sin intentar diferenciarlos artificialmente en la traducción principal.
- source_word: שְׁדֻפ֣וֹת קָדִים
  english_pob_choice: scorched by the east wind
  chosen_spanish: quemadas por el viento del oriente
  alternatives_spanish:
  - abrasadas por el viento del oriente
  - azotadas por el viento del oriente
  lexicon: HALOT
  rationale: La frase pasiva indica daño producido por el viento cálido del este. «Quemadas» comunica claramente el efecto agrícola y conserva la imagen de daño intenso; «viento del oriente» expresa de manera natural el hebraísmo.
- source_word: צֹמְח֖וֹת
  english_pob_choice: were sprouting
  chosen_spanish: iban brotando
  alternatives_spanish:
  - brotaban
  - estaban brotando
  lexicon: HALOT
  rationale: El participio presenta la acción como en desarrollo dentro de la escena del sueño. «Iban brotando» preserva mejor ese aspecto progresivo que un pasado simple.
- source_word: אַחֲרֵי/הֶם
  english_pob_choice: after them
  chosen_spanish: detrás de ellas
  alternatives_spanish:
  - después de ellas
  - tras ellas
  lexicon: HALOT
  rationale: Se refiere a las siete espigas anteriores. «Detrás de ellas» es la forma más natural en español para la relación espacial/secuencial del sueño.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisiones del inglés POB: se evitó introducir «marchitas» como sobretraducción de צְנֻמוֹת, pero se preservó su valor semántico con «delgadas», manteniendo además el segundo adjetivo como descriptor independiente. También se respetó la decisión de no ampliar la frase a «withered»/«marchitas» en el texto principal.'
  spanish_consistency_notes:
  - Se usó «Y he aquí» para reflejar la fórmula narrativa de introducción llamativa, en coherencia con el registro bíblico.
  - Se eligió «espigas» para mantener un término agrícola claro y consistente en español.
  - Se conservó la repetición de dos adjetivos negativos («delgadas y quemadas») para no perder la acumulación descriptiva del hebreo.
  - «Viento del oriente» se mantuvo como expresión transparente y bíblicamente reconocible sin sustituirla por un tecnicismo más pesado.
