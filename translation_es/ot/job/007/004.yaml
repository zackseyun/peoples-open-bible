translation:
  language: es
  text: 'Cuando me acuesto[a], digo: «¿Cuándo me levantaré?». Pero la noche[b] se alarga, y estoy lleno de inquietud hasta el alba[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si me acuesto». El hebreo אִם puede ser condicional, pero aquí probablemente introduce una circunstancia repetida: «Cuando me acuesto».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «y la tarde» o «el anochecer es medido». La imagen subraya que el tiempo de la noche parece avanzar con lentitud.'
    reason: lexical_alternative
  - marker: c
    text: נָשֶׁף puede significar «crepúsculo» y, por el contexto, aquí probablemente se refiere al amanecer o alba.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: El hebreo puede leerse condicionalmente, pero en este lamento expresa una circunstancia repetida. «Cuando» conserva mejor el valor habitual que un «si» hipotético.
- source_word: שָׁכַבְתִּי
  english_pob_choice: I lie down
  chosen_spanish: me acuesto
  alternatives_spanish:
  - me he acostado
  - me acosté
  lexicon: HALOT
  rationale: El qatal funciona aquí de manera iterativa/habitual dentro de la queja de Job. En español, el presente reflexivo comunica mejor la experiencia repetida que un pasado puntual.
- source_word: וְאָמַרְתִּי
  english_pob_choice: I say
  chosen_spanish: digo
  alternatives_spanish:
  - y digo
  - entonces digo
  lexicon: HALOT
  rationale: Se mantiene la continuidad habitual con el verbo anterior. El presente de indicativo en español suena natural y refleja el valor reiterado del enunciado.
- source_word: מָתַי אָקוּם
  english_pob_choice: When will I arise?
  chosen_spanish: ¿Cuándo me levantaré?
  alternatives_spanish:
  - ¿Cuándo me alzaré?
  - ¿Cuándo me pondré de pie?
  lexicon: HALOT
  rationale: «Levantarme» es la forma más natural en español para קום en este contexto. «Arise» en inglés conserva elevación; en español, «levantarme» comunica el mismo sentido sin exceso de solemnidad.
- source_word: וּמִדַּד עָרֶב
  english_pob_choice: But the evening drags on
  chosen_spanish: Pero la tarde se prolonga
  alternatives_spanish:
  - Pero la tarde se alarga
  - Y la tarde se mide
  lexicon: HALOT
  rationale: El verbo ligado a medir expresa la lentitud de la extensión del tiempo. «Se prolonga» reproduce esa sensación de demora y conserva el matiz idiomático; «tarde» sigue la decisión de «evening» del audit trail.
- source_word: וְשָׂבַעְתִּי
  english_pob_choice: I am full of
  chosen_spanish: estoy hastiado de
  alternatives_spanish:
  - estoy lleno de
  - estoy saciado de
  lexicon: HALOT
  rationale: שבע comunica estar lleno/saciado; en contexto negativo, el español idiomático más fuerte es «hastiado de», porque expresa saturación molesta por una experiencia desagradable.
- source_word: נְדֻדִים
  english_pob_choice: tossing
  chosen_spanish: dar vueltas
  alternatives_spanish:
  - inquietud
  - insomnio
  - turbación
  lexicon: HALOT
  rationale: El sustantivo alude a movimientos inquietos, especialmente nocturnos. «Dar vueltas» es una imagen corporal clara en español y conserva la vivencia del insomnio sin sobrerinterpretar.
- source_word: עֲדֵי נָשֶׁף
  english_pob_choice: until dawn
  chosen_spanish: hasta el alba
  alternatives_spanish:
  - hasta el amanecer
  - hasta el alba de la mañana
  lexicon: HALOT
  rationale: נָשֶׁף puede referirse al crepúsculo, pero aquí el contexto apunta al alba/madrugada matutina, como en el audit trail. «Hasta el alba» es breve, solemne y fiel al sentido contextual.
translation_notes:
  revision_awareness: 'El texto sigue el juicio del audit trail inglés: lectura habitual de אִם/שָׁכַבְתִּי/וְאָמַרְתִּי, valor idiomático de מִדַּד עָרֶב como demora del tiempo, y נָשֶׁף entendido contextualmente como alba. No se detectaron revisiones posteriores que alteren estas decisiones.'
  spanish_consistency_notes:
  - Se conservó el paralelismo de la queja de Job con formas naturales del español.
  - Se evitó «SEÑOR» o «Cristo» porque no aparecen en el verso.
  - Se mantuvo un registro digno y bíblico, pero sin calco innecesario del inglés.
  - «Alba» se eligió para reflejar el cierre temporal matutino que el audit trail identifica como sentido probable de נָשֶׁף.
