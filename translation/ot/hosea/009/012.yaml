id: HOS.9.12
reference: Hosea 9:12
source:
  edition: WLC
  text: כִּ֤י אִם יְגַדְּלוּ֙ אֶת בְּנֵי/הֶ֔ם וְ/שִׁכַּלְתִּ֖י/ם מֵֽ/אָדָ֑ם כִּֽי גַם א֥וֹי לָ/הֶ֖ם בְּ/שׂוּרִ֥/י מֵ/הֶֽם־־־־׃
translation:
  text: Even if they raise their children[a], I will bereave them so that not a man remains; for indeed[b], woe to them when I depart from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their sons' for 'their children.' The Hebrew noun can specifically mean sons, but often refers more broadly to offspring.
    reason: lexical_alternative
  - marker: b
    text: Or 'when I turn away from them.' The Hebrew may emphasize God's withdrawal of favor and presence in judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: Even if
  alternatives:
  - Though
  - For even if
  lexicon: HALOT
  rationale: The combination introduces a concessive condition here, not a simple causal 'for' plus 'if.' 'Even if' best captures the force in natural English.
- source_word: יְגַדְּלוּ
  chosen: they raise
  alternatives:
  - they bring up
  - they make great
  lexicon: HALOT
  rationale: גדל in the piel can mean to rear or bring up children. 'Raise' is idiomatic modern English in this family context.
- source_word: בְּנֵיהֶם
  chosen: their children
  alternatives:
  - their sons
  lexicon: HALOT
  rationale: Although בנים can be rendered 'sons,' it often functions more broadly for offspring/children. In this judgment context, 'children' communicates the collective sense without overstating male specificity.
- source_word: וְשִׁכַּלְתִּים
  chosen: I will bereave them
  alternatives:
  - I will make them childless
  - I will rob them of children
  lexicon: HALOT
  rationale: שׁכל denotes bereavement, especially loss of children. 'I will bereave them' preserves the personal and tragic force better than the flatter 'make them childless.'
- source_word: מֵאָדָם
  chosen: of every man
  alternatives:
  - so that not a man remains
  - from mankind
  - of humankind
  lexicon: HALOT
  rationale: The phrase is difficult, but in context it intensifies the bereavement to the point that no human survivor remains among the children. Because אָדָם here points to an individual human being rather than humanity in the abstract, 'of every man' best preserves the idiom's force while remaining intelligible.
- source_word: כִּי גַם
  chosen: for indeed
  alternatives:
  - for also
  - yes, for
  lexicon: HALOT
  rationale: This combination heightens the warning. 'For indeed' conveys the emphatic explanatory force in smooth English.
- source_word: אוֹי לָהֶם
  chosen: woe to them
  alternatives:
  - alas for them
  lexicon: HALOT
  rationale: A standard prophetic lament/judgment formula. 'Woe to them' preserves both solemnity and recognizability.
- source_word: בְּשׂוּרִי מֵהֶם
  chosen: when I depart from them
  alternatives:
  - when I turn away from them
  - in my departing from them
  lexicon: HALOT
  rationale: 'From סור, ''to turn aside/depart.'' The prefixed ב marks the circumstance/time: ''when I depart.'' This expresses the disaster that follows God''s withdrawal of presence and favor.'
