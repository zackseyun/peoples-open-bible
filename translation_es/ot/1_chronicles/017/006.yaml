translation:
  language: es
  text: 'En todos los lugares donde he andado entre todo Israel[a], ¿acaso le hablé yo una palabra a uno de los jueces de Israel, de aquellos a quienes mandé pastorear a mi pueblo, diciendo: “¿Por qué no me han edificado una casa de cedro?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pasaje paralelo en 2 Samuel 7:7 dice ‘tribus de Israel’ (y algunos testigos reflejan ‘líderes’ o ‘cetros’) en lugar de ‘jueces de Israel’. El hebreo de Crónicas aquí dice ‘jueces’.
    reason: textual_variant
lexical_decisions:
- source_word: הִתְהַלַּכְתִּי
  english_pob_choice: I have walked
  chosen_spanish: he andado
  alternatives_spanish:
  - he caminado
  - he ido de un lado a otro
  lexicon: HALOT
  rationale: El hitpael de הלך aquí expresa el moverse de Dios en medio de su pueblo; ‘he andado’ conserva la imagen sin sonar forzado en español.
- source_word: בְּכָל יִשְׂרָאֵל
  english_pob_choice: among all Israel
  chosen_spanish: entre todo Israel
  alternatives_spanish:
  - en medio de todo Israel
  - a través de todo Israel
  lexicon: HALOT
  rationale: La preposición con el verbo indica presencia en medio del pueblo más que simple extensión geográfica; ‘entre’ lo comunica de forma natural.
- source_word: הֲדָבָר דִּבַּרְתִּי
  english_pob_choice: did I ever speak a word
  chosen_spanish: ¿acaso le hablé yo una palabra?
  alternatives_spanish:
  - ¿hablé yo algo?
  - ¿le dije yo una palabra?
  lexicon: HALOT
  rationale: Se conserva la fuerza retórica de la pregunta y el acusativo cognado con una formulación natural en español.
- source_word: אֶת אַחַד שֹׁפְטֵי יִשְׂרָאֵל
  english_pob_choice: to one of the judges of Israel
  chosen_spanish: a uno de los jueces de Israel
  alternatives_spanish:
  - a uno de los gobernantes de Israel
  - a uno de los caudillos de Israel
  lexicon: HALOT
  rationale: Se sigue el hebreo de Crónicas con ‘jueces’ y no se armoniza con Samuel. ‘A’ refleja mejor el verbo ‘hablar’ en este contexto.
- source_word: שֹׁפְטֵי יִשְׂרָאֵל
  english_pob_choice: judges of Israel
  chosen_spanish: los jueces de Israel
  alternatives_spanish:
  - los líderes de Israel
  - los gobernantes de Israel
  lexicon: HALOT
  rationale: Crónicas usa ‘jueces’ y no ‘tribus’; se mantiene la lectura del texto hebreo transmitido.
- source_word: צִוִּיתִי לִרְעוֹת
  english_pob_choice: I commanded to shepherd
  chosen_spanish: mandé pastorear
  alternatives_spanish:
  - mandé apacentar
  - mandé cuidar como pastor
  lexicon: HALOT
  rationale: ‘Pastorear’ conserva la metáfora pastoral de רעה y resulta comprensible en español bíblico contemporáneo.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi nación
  lexicon: HALOT
  rationale: Expresión pactual estándar; ‘mi pueblo’ transmite la relación de pertenencia y cuidado.
- source_word: לָמָּה לֹא בְנִיתֶם לִי
  english_pob_choice: Why have you not built for me
  chosen_spanish: ¿Por qué no me han edificado
  alternatives_spanish:
  - ¿Por qué no me construyeron
  - ¿Por qué no me han construido
  lexicon: HALOT
  rationale: El perfecto retórico se vierte de forma idiomática en español con presente perfecto; ‘edificado’ mantiene el registro elevado del templo/casa real.
- source_word: בֵּית אֲרָזִים
  english_pob_choice: a house of cedar
  chosen_spanish: una casa de cedro
  alternatives_spanish:
  - una casa de cedros
  - una casa de madera de cedro
  lexicon: HALOT
  rationale: Se conserva el hebraísmo idiomático en singular (‘de cedro’), que suena natural y mantiene la dignidad del sintagma.
theological_decisions:
- issue: 'Lectura de Crónicas: ‘jueces’ frente al paralelo de Samuel ‘tribus/líderes’'
  english_pob_reading: Translate the MT of Chronicles as 'judges of Israel' in the main text
  chosen_spanish_reading: Traducir el hebreo de Crónicas como ‘los jueces de Israel’ en el texto principal
  alternative_spanish_readings:
  - armonizar con ‘las tribus de Israel’
  - armonizar con ‘los líderes de Israel’
  rationale: Se prioriza el texto hebreo de Crónicas tal como está transmitido, sin resolver por armonización la diferencia con 2 Samuel 7:7. Es una variante textual/literaria, no una contradicción doctrinal.
  doctrine_reference: Principio de primacía del texto fuente y consistencia textual de POB
translation_notes:
  revision_awareness: Se incorporó la decisión revisada del auditor inglés de usar ‘a uno de los jueces de Israel’ en lugar de una formulación equivalente con ‘con’, porque el verbo ‘hablar’ en hebreo introduce al destinatario. También se mantuvo la lectura propia de Crónicas (‘jueces’) sin armonizarla con Samuel.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ en el texto implícito solo donde corresponda por tradición POB, pero en este versículo la referencia divina es pronominal, así que no aparece un nombre explícito.
  - ‘Pastorear’ se eligió para conservar la metáfora pastoral de רעה sin sustituirla por un término más abstracto.
  - ‘Casa de cedro’ mantiene el sintagma hebreo y evita explicitar indebidamente ‘templo’ o ‘palacio’.
