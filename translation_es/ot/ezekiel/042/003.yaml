    text: El hebreo «attiq» es un término arquitectónico raro; puede denotar una galería, columnata, pórtico u otra estructura superior semejante.
    reason: lexical_alternative
  - marker: b
    text: O «en el tercer nivel». El hebreo probablemente se refiere al tercer piso de la edificación.
    reason: lexical_alternative
  revision_rationale: Se mantiene el sentido del borrador, pero se corrige la presentación de las notas para alinearla con la auditoría inglesa y se mejora ligeramente la naturalidad del español en la relación recíproca de las galerías. No hace falta una reescritura mayor ni adjudicación adicional.
