translation:
  language: es
  text: 'Pero el rey David dijo a Ornán[a]: «No, porque ciertamente lo compraré por el precio completo en plata, porque no tomaré para Yahvé[b] lo que es tuyo, ni ofreceré un holocausto[c] sin costo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Ornán»; la forma del nombre varía en la tradición textual y de traducción.
    reason: textual_variant
  - marker: b
    text: 'Literalmente: «para Yahvé lo que es tuyo»; el orden hebreo pone primero la dedicación a Yahvé.'
    reason: lexical_alternative
  - marker: c
    text: O, «ofrenda completamente quemada».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כִּי
  english_pob_choice: No, for
  chosen_spanish: No, porque
  alternatives_spanish:
  - No, sino
  - No, mas
  lexicon: HALOT
  rationale: La secuencia introduce una negativa firme seguida de la explicación. «No, porque» conserva bien la refutación y la causa en español natural.
- source_word: קָנֹה אֶקְנֶה
  english_pob_choice: I will surely buy
  chosen_spanish: ciertamente lo compraré
  alternatives_spanish:
  - seguramente lo compraré
  - lo compraré sin falta
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo finito intensifica la acción. «Ciertamente lo compraré» comunica el énfasis sin sonar forzado.
- source_word: בְּכֶסֶף מָלֵא
  english_pob_choice: for the full price in silver
  chosen_spanish: por el precio completo en plata
  alternatives_spanish:
  - por la suma completa en plata
  - por el precio íntegro en plata
  lexicon: HALOT
  rationale: La frase señala pago íntegro, no una suma simbólica. «Precio completo» preserva el sentido económico; «en plata» mantiene el medio de pago del hebreo.
- source_word: אֶשָּׂא
  english_pob_choice: I will not take
  chosen_spanish: no tomaré
  alternatives_spanish:
  - no llevaré
  - no apropiaré
  lexicon: HALOT
  rationale: En este contexto, נשׂא tiene sentido de tomar o apropiarse de algo ajeno. «Tomar» es la opción más clara y fiel en español.
- source_word: אֲשֶׁר לְךָ
  english_pob_choice: what is yours
  chosen_spanish: lo que es tuyo
  alternatives_spanish:
  - lo que te pertenece
  - lo que te corresponde
  lexicon: HALOT
  rationale: Expresa posesión de manera directa y natural. «Lo que es tuyo» sigue de cerca la relación posesiva del hebreo.
- source_word: לַיהוָה
  english_pob_choice: for the LORD
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para el Señor
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino según la política del proyecto: Yahvé, no un reemplazo tradicional que oculte el Tetragrámaton.'
- source_word: וְהַעֲלוֹת עוֹלָה
  english_pob_choice: nor offer up a burnt offering
  chosen_spanish: ni ofreceré un holocausto
  alternatives_spanish:
  - ni presentaré un holocausto
  - ni subiré un holocausto
  lexicon: HALOT
  rationale: El hebreo usa el verbo de «hacer subir» con la ofrenda quemada. En español, «ofrecer un holocausto» conserva el sentido sacrificial de forma idiomática.
- source_word: חִנָּם
  english_pob_choice: for nothing
  chosen_spanish: sin costo
  alternatives_spanish:
  - gratuitamente
  - de balde
  lexicon: HALOT
  rationale: David rechaza ofrecer sacrificio sin haber pagado nada. «Sin costo» comunica la idea de gratuidad económica con claridad moderna.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton, y la norma del proyecto pide preservarlo en español como «Yahvé» en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sacrificial idiom of עֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - sacrificio completamente quemado
  rationale: En español bíblico, «holocausto» es el término más reconocido para la ofrenda totalmente quemada y conserva el valor cultual del hebreo.
  doctrine_reference: 'Lexical theology: sacrificial terminology for עֹלָה in cultic contexts'
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión importante de orden de palabras en la cláusula sobre no tomar lo ajeno «para Yahvé». Por eso el español coloca «no tomaré para Yahvé lo que es tuyo», manteniendo la relación directa entre dedicación y posesión. También se refleja la elección consistente de pago íntegro y la negativa a ofrecer un sacrificio gratuito.
  spanish_consistency_notes:
  - Se conserva «Yahvé» según la política del proyecto, evitando el reemplazo tradicional por «el SEÑOR».
  - «Holocausto» se usa como término cultual estable para עֹלָה; se ofrece alternativa en nota para lectores que prefieran una paráfrasis más transparente.
  - La puntuación reproduce el contraste retórico del hebreo con una negativa breve seguida de explicación causal.
