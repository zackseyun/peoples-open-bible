translation:
  language: es
  text: En tu rectitud[a] rescátame y líbrame; inclina tu oído a mí y sálvame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por tu rectitud»; «rectitud» también puede entenderse como «justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצִדְקָתְךָ
  english_pob_choice: In your righteousness
  chosen_spanish: En tu justicia
  alternatives_spanish:
  - En tu rectitud
  - Por tu justicia
  - En tu righteousness
  lexicon: HALOT
  rationale: El hebreo בְּ + צְדָקָה permite un matiz instrumental o de base. En español, «en tu justicia» conserva la apertura semántica entre base y esfera de acción, y mantiene visible la opción doctrinal «justicia» que el audit trail inglés retiene como alternativa a «righteousness».
- source_word: תַּצִּילֵנִי
  english_pob_choice: rescue me
  chosen_spanish: rescátame
  alternatives_spanish:
  - líbrame
  - sálvame
  lexicon: HALOT
  rationale: El hifil de נצל expresa rescatar/salvar de un peligro. «Rescátame» comunica bien la acción de sacar del peligro y distingue este verbo del siguiente, evitando repetir la misma idea con el mismo verbo.
- source_word: וּתְפַלְּטֵנִי
  english_pob_choice: and deliver me
  chosen_spanish: y líbrame
  alternatives_spanish:
  - y escápame
  - y sácame seguro
  lexicon: HALOT
  rationale: El piel de פלט implica hacer escapar o poner a salvo. «Líbrame» es idiomático en español bíblico contemporáneo y preserva una leve diferencia de matiz frente a «rescátame».
- source_word: הַטֵּה
  english_pob_choice: incline
  chosen_spanish: inclina
  alternatives_spanish:
  - vuelve
  - dobla
  - inclina hacia
  lexicon: HALOT
  rationale: 'Con «oído» es un giro idiomático estable: inclinar el oído. «Inclina» es natural, digno y conserva la imagen corporal sin volverla una mera paráfrasis de «escucha».'
- source_word: אָזְנְךָ
  english_pob_choice: your ear
  chosen_spanish: tu oído
  alternatives_spanish:
  - tu oreja
  - tu atención
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo concreto «oído» en una petición poética de atención. En español, «tu oído» mantiene la imagen corporal y resulta claro y reverente.
- source_word: וְהוֹשִׁיעֵנִי
  english_pob_choice: and save me
  chosen_spanish: y sálvame
  alternatives_spanish:
  - y líbrame
  - y ponme a salvo
  lexicon: HALOT
  rationale: El hifil de ישׁע es el verbo estándar «salvar». En un salmo de súplica, «sálvame» preserva la amplitud teológica del término mejor que una restricción a «liberar» o «dar victoria».
theological_decisions:
- issue: צְדָקָה aplicado a Dios en una oración de petición
  english_pob_reading: righteousness with lexical note that it may also be understood as justice
  chosen_spanish_reading: justicia, con nota alternativa que admite «rectitud» o el valor de base «por tu justicia»
  alternative_spanish_readings:
  - rectitud
  - por tu justicia
  - justicia divina
  rationale: La frase no debe cerrarse en un único matiz. «Justicia» es idiomática y teológicamente válida en español; la nota preserva la alternativa de base/instrumento y la posibilidad semántica de «rectitud», sin borrar la tensión lexical que el POB inglés documenta.
  doctrine_reference: 'DOCTRINE.md: términos debatidos; paralelo funcional con δικαιοσύνη → justicia / rectitud'
translation_notes:
  revision_awareness: 'El pasaje se mantiene sin cambios respecto al último repaso: alta coincidencia entre fuentes y sin revisiones aplicadas. La redacción española conserva el paralelismo de tres súplicas y la distinción verbal entre rescatar, librar y salvar.'
  spanish_consistency_notes:
  - Se conserva el paralelismo hebreo con tres miembros coordinados.
  - Se evita sustituir «Yahvé» porque aquí el texto no contiene el tetragrámaton.
  - «Justicia» se usa para צְדָקָה siguiendo el archivo POB, con nota que mantiene la alternativa de «rectitud».
  - «Oído» se mantiene como imagen corporal idiomática, no como simple «atención».
