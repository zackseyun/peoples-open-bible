translation:
  language: es
  text: el que convirtió la roca en un estanque de agua[a], el pedernal en un manantial de agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que transforma la roca en un estanque de agua»; el hebreo usa un participio, pero el pasado encaja mejor con la rememoración poética de las obras de Dios en el desierto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַהֹפְכִי
  english_pob_choice: who turned
  chosen_spanish: el que convirtió
  alternatives_spanish:
  - el que transforma
  - el que volvió
  lexicon: HALOT
  rationale: El participio hebreo funciona como relativo y se refiere al sujeto implícito del contexto previo. En español, "el que convirtió" conserva la fuerza verbal y suena natural en un recuerdo poético de acciones pasadas, sin explicitar indebidamente el sujeto.
- source_word: הַצּוּר
  english_pob_choice: the rock
  chosen_spanish: la roca
  alternatives_spanish:
  - la peña
  - el peñasco
  lexicon: HALOT
  rationale: צוּר designa una roca o masa rocosa. "Roca" es el equivalente más directo; aquí se mantiene un registro claro y bíblico sin perder inteligibilidad.
- source_word: אֲגַם
  english_pob_choice: a pool
  chosen_spanish: un estanque
  alternatives_spanish:
  - un charco
  - una laguna
  lexicon: HALOT
  rationale: אֲגַם denota un cuerpo de agua quieta. "Estanque" comunica mejor la imagen de agua reunida que "charco", y evita la connotación demasiado grande o distinta de "laguna".
- source_word: מָיִם
  english_pob_choice: of water
  chosen_spanish: de agua
  lexicon: HALOT
  rationale: Se conserva la repetición poética de "agua" en ambos hemistiquios, como en el hebreo, manteniendo la paridad entre "estanque de agua" y "fuente de agua".
- source_word: חַלָּמִישׁ
  english_pob_choice: the flint
  chosen_spanish: la peña dura
  alternatives_spanish:
  - el pedernal
  - la roca de pedernal
  lexicon: HALOT
  rationale: חַלָּמִישׁ apunta a pedernal o roca extremadamente dura. "Peña dura" preserva la dureza resaltada por el paralelismo y suena natural en español poético; se evita una terminología excesivamente técnica.
- source_word: לְמַעְיְנוֹ
  english_pob_choice: into a spring
  chosen_spanish: en una fuente
  alternatives_spanish:
  - en un manantial
  - en una surgente
  lexicon: HALOT
  rationale: El prefijo ל expresa resultado en este contexto. Aunque "manantial" es posible, "fuente" mantiene el paralelismo con el primer hemistiquio y es una equivalencia poética adecuada en español.
theological_decisions:
- issue: Continuación implícita del sujeto divino desde el versículo anterior
  english_pob_reading: Retain the relative participial clause without repeating 'God'
  chosen_spanish_reading: Mantener la cláusula relativa sin repetir el sujeto explícito
  alternative_spanish_readings:
  - Él convirtió la roca en un estanque de agua, la peña dura en una fuente de agua.
  - Dios convirtió la roca en un estanque de agua, la peña dura en una fuente de agua.
  rationale: El hebreo continúa la descripción del mismo agente divino ya establecido en el contexto inmediato. Conservar "el que" reproduce la dependencia sintáctica del participio y evita añadir un sujeto que el verso no repite.
  doctrine_reference: Continuidad del sujeto en el Salmo 114:7–8; sintaxis participial hebrea
translation_notes:
  revision_awareness: No se requirieron cambios respecto del último pase revisado; la formulación sigue de cerca el hebreo y mantiene el valor retrospectivo señalado en el audit trail inglés.
  spanish_consistency_notes:
  - Se conserva "agua" dos veces para reflejar la repetición hebrea y su paralelismo.
  - Se prefirió "fuente" en el segundo hemistiquio por paralelismo poético con "estanque", sin imponer una lectura doctrinal distinta.
  - '"Roca" y "peña dura" distinguen los dos términos hebreos sin uniformarlos artificialmente.'
