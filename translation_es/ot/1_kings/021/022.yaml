translation:
  language: es
  text: Y haré tu casa[a] como la casa de Jeroboam hijo de Nabat y como la casa de Baasa hijo de Ahías, por la provocación con que me has provocado y has hecho pecar a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “tu dinastía”. En este contexto, “casa” se refiere a la línea real de Acab.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will make
  chosen_spanish: Y haré
  alternatives_spanish:
  - y pondré
  - y haré que sea
  lexicon: HALOT
  rationale: נתן puede significar 'dar', pero en este anuncio de juicio sobre una casa real la idea resultante es de transformación/establecimiento de un estado. 'Haré' comunica de modo natural ese resultado en español sin perder la fuerza declarativa del hebreo.
- source_word: בֵּיתְךָ
  english_pob_choice: your house
  chosen_spanish: tu casa
  alternatives_spanish:
  - tu dinastía
  - tu linaje real
  lexicon: HALOT
  rationale: בַּיִת puede referirse a casa, familia, casa real o dinastía. En este contexto regio, 'casa' preserva la metáfora hebrea y deja oír el sentido de linaje gobernante, tal como lo hace el inglés POB.
- source_word: כְּבֵית ... וּכְבֵית
  english_pob_choice: like the house of ... and like the house of
  chosen_spanish: como la casa de ... y como la casa de
  alternatives_spanish:
  - tal como la casa de ... y tal como la casa de
  - igual que la casa de ... y igual que la casa de
  lexicon: HALOT
  rationale: El כ comparativo pide una equivalencia directa. 'Como la casa de' es la forma más clara y fiel en español, manteniendo el paralelo entre las dos dinastías mencionadas.
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam hijo de Nabat
  alternatives_spanish:
  - Jeroboam, hijo de Nabat
  lexicon: Transliteración tradicional de nombres propios
  rationale: Los nombres propios se transliteran al español de manera estándar. 'Hijo de' reproduce el patronímico hebreo con naturalidad y fidelidad.
- source_word: בַּעְשָׁא בֶן אֲחִיָּה
  english_pob_choice: Baasha son of Ahijah
  chosen_spanish: Baasa hijo de Ahías
  alternatives_spanish:
  - Baasa, hijo de Ahías
  lexicon: Transliteración tradicional de nombres propios
  rationale: Se conserva la forma castellana usual de los nombres propios bíblicos y el patronímico 'hijo de' para mantener el paralelismo con el texto hebreo.
- source_word: אֶל הַכַּעַס
  english_pob_choice: because of the provocation
  chosen_spanish: por la provocación
  alternatives_spanish:
  - a causa de la provocación
  - por el enojo
  lexicon: HALOT
  rationale: הַכַּעַס designa aquí el acto o motivo de provocar, no solo el sentimiento de ira. 'Por la provocación' transmite bien la base causal del juicio y evita reducir el término a una mera emoción.
- source_word: אֲשֶׁר הִכְעַסְתָּ
  english_pob_choice: with which you have provoked me
  chosen_spanish: con que me has provocado
  alternatives_spanish:
  - con lo cual me has provocado
  - por la cual me has provocado
  lexicon: HALOT
  rationale: El verbo הִכְעִיס en piel/hiphil expresa provocar a ira. En español, 'me has provocado' comunica el objeto implícito del discurso divino sin sobreexplicar el hebreo.
- source_word: וַתַּחֲטִא אֶת יִשְׂרָאֵל
  english_pob_choice: and caused Israel to sin
  chosen_spanish: y has hecho pecar a Israel
  alternatives_spanish:
  - y has causado que Israel peque
  - y has llevado a Israel al pecado
  lexicon: HALOT
  rationale: חטא en hiphil significa causar pecado. 'Has hecho pecar a Israel' es una equivalencia idiomática y directa en español, manteniendo la imputación activa del texto.
theological_decisions:
- issue: Tratamiento de בֵּית en contexto de juicio real
  english_pob_reading: Retain 'house' rather than replacing it with 'dynasty' in the main text
  chosen_spanish_reading: Mantener 'casa' en el texto principal
  alternative_spanish_readings:
  - dinastía
  - linaje real
  rationale: La metáfora hebrea de 'casa' es importante en oráculos contra reyes, y en español sigue siendo comprensible. Mantenerla preserva la resonancia literaria y teológica del juicio sobre la línea real de Acab.
  doctrine_reference: Translation philosophy §1, §5
- issue: Objeto implícito en 'has provocado'
  english_pob_reading: Explicitly render 'me' in English
  chosen_spanish_reading: Explicitar 'me' en español
  alternative_spanish_readings:
  - 'dejar el objeto implícito: ''con que has provocado'''
  rationale: Aunque el hebreo no nombra de forma explícita el objeto, el contexto identifica al hablante como Yahvé. Incluir 'me' evita ambigüedad en español y no añade contenido ajeno al original.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta el aval de alta concordancia y la revisión más reciente sin cambios sustantivos. La redacción española sigue la lectura hebrea directa y conserva las decisiones auditadas del POB inglés sobre 'house', la causalidad de הַכַּעַס y el valor causativo de חטא.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general del proyecto, pero en este versículo no aparece el nombre divino de forma explícita en el texto hebreo.
  - Se mantiene 'casa' para בֵּית en el texto principal por su valor metafórico-regio.
  - '''Provocación'' se reserva para el sustantivo causal הַכַּעַס; no se rebaja a ''enojo'' para evitar perder el matiz de acto provocador.'
  - '''Has hecho pecar'' refleja el hiphil causativo de וַתַּחֲטִא y conserva la imputación directa del texto.'
