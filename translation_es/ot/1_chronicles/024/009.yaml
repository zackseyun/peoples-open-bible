  lexicon: HALOT
  rationale: En esta lista de asignación por sorteo, לְ expresa la destinación/atribución del lote; en español, «a» comunica de forma natural esa asignación. El nombre se translitera de manera consistente como Malkías.
- source_word: הַחֲמִישִׁי
  english_pob_choice: the fifth
  chosen_spanish: el quinto
  alternatives_spanish:
  - la quinta
  lexicon: HALOT
  rationale: El ordinal con artículo funciona sustantivado en el contexto de reparto de turnos o lotes. «El quinto» conserva el valor ordinal masculino implícito en la serie.
- source_word: לְמִיָּמִן
  english_pob_choice: to Mijamin
  chosen_spanish: a Mijamín
  alternatives_spanish:
  - para Mijamín
  lexicon: HALOT
  rationale: Se mantiene el mismo valor de asignación que en la primera mitad del versículo. El nombre se translitera como Mijamín para reflejar la forma hebrea.
- source_word: הַשִּׁשִּׁי
  english_pob_choice: the sixth
  chosen_spanish: el sexto
  alternatives_spanish:
  - la sexta
  lexicon: HALOT
  rationale: El segundo ordinal continúa la misma fórmula de reparto. «El sexto» es la equivalencia más directa y natural en español.
