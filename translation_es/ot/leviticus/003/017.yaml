  timestamp: '2026-05-07T21:28:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: una norma de duración continua para las generaciones de Israel y aplicable en todos sus lugares de residencia, con la prohibición de comer grasa y sangre. Sin embargo, hay dos ajustes recomendables: «lugares de habitación» suena poco idiomático en español bíblico actual, y «por todas sus generaciones» puede mejorarse a una formulación más natural y exacta del valor continuativo.'
  spanish_quality_summary: El texto es claro y mayormente fiel, pero «en todos sus lugares de habitación» resulta forzado. «En todas sus moradas» o «en todos sus lugares donde habiten» sería más natural; aquí «en todas sus moradas» mantiene bien la concisión formal. También conviene cambiar «por todas sus generaciones» por «a lo largo de sus generaciones», que suena más natural en español neutral y conserva el sentido distributivo.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Estatuto» es adecuado para חֻקָּה. «Perpetuo» es defendible para עוֹלָם, especialmente con nota léxica; no obstante, el cuerpo del texto podría también usar «permanente». «Grasa» y «sangre» son correctos. No aparecen términos sensibles del glosario principal como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: «en todos sus lugares de habitación» suena antinatural
    rationale: Aunque intenta reflejar מוֹשְׁבֹתֵיכֶם con precisión, la expresión es torpe en español contemporáneo y eclesial. «En todas sus moradas» comunica el mismo alcance con mejor legibilidad.
  - severity: low
    issue: «por todas sus generaciones» es menos idiomático que alternativas disponibles
    rationale: La frase es entendible, pero «a lo largo de sus generaciones» o «por todas sus generaciones» no suenan igual de naturales en español neutral. La primera preserva bien la continuidad temporal del hebreo.
  revised_spanish_text: 'Será un estatuto perpetuo[a] a lo largo de sus generaciones, en todas sus moradas: no comerán grasa ni sangre.'
