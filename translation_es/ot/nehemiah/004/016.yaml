base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/004/016.yaml
  text: Also at that time I said to the people[a], “Let each man and his servant spend the night within Jerusalem[b], and let them be a guard for us by night and workers by day.”
  footnotes:
  - marker: a
    text: Or “each man and his servant”; the Hebrew נַעַר can mean a youth, servant, attendant, or subordinate worker depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or “that they might be a watch for us at night and for work by day.”
    reason: lexical_alternative
