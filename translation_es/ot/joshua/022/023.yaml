review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura condicional del hebreo, conserva el nombre divino Yahvé y distingue correctamente los tipos de ofrendas. Sin embargo, el cierre no preserva adecuadamente la fuerza autoimprecatoria/jusiva documentada en el POB inglés: ''Yahvé mismo lo requerirá'' suena a simple futuro declarativo, mientras que el contexto pide una formulación optativa o imprecatoria como ''que Yahvé mismo lo demande''. También conviene alinear la nota con una expresión española natural.'
  spanish_quality_summary: El español es generalmente claro y digno. 'Si hubiéramos edificado' y 'para apartarnos de seguir a Yahvé' son aceptables, aunque formales. 'Sacrificios de comunión' es legible, pero aquí el rastro léxico inglés preserva explícitamente la tradición de 'peace offerings'; en español conviene reflejarla como 'sacrificios de paz' y dejar 'de comunión' como alternativa en nota para mantener más de cerca שְׁלָמִים y el razonamiento auditado. La nota actual 'lo pedirá cuenta' no es español natural.
  glossary_alignment: 'Se alinea bien con Yahvé para יְהוָה. Las categorías sacrificiales están mayormente bien: עוֹלָה = ''holocausto'', מִנְחָה = ''ofrenda vegetal''. Para זִבְחֵי שְׁלָמִים, ''sacrificios de paz'' se ajusta mejor al término base y al audit trail, con ''sacrificios de comunión'' como alternativa léxica en nota. El verbo final debe ajustarse para reflejar la fuerza juramentaria del hebreo.'
