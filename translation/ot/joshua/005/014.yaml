theological_decisions:
- issue: Whether Joshua's act toward the figure should be rendered as explicit worship
  chosen_reading: Render the verb as 'bowed down' rather than 'worshiped' in the main text
  alternative_readings:
  - Render as 'worshiped'
  rationale: The Hebrew שחה can refer to bowing down in reverence and in some contexts to worship. This verse alone does not require the translator to resolve the figure's identity or the precise theological nature of Joshua's act. Using 'bowed down' preserves the textual action while leaving interpretive conclusions to context.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Whether the speaker should be identified in translation as a divine/theophanic figure
  chosen_reading: Do not identify the figure beyond the Hebrew title 'commander of the army of the LORD'
  alternative_readings:
  - Translate in a way that implies an angelic being
  - Translate in a way that implies a Christophany/theophany
  rationale: Historic Christian interpreters differ on whether this is an angelic messenger or a manifestation of the LORD. The Hebrew text here gives the title but does not explicitly settle the ontological question in this verse. The translation therefore remains textually restrained.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
