translation:
  language: es
  text: Y cuando el rey oyó las palabras del libro de la Ley[a], rasgó sus vestidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el rollo de la Ley». El hebreo סֵפֶר puede referirse a un rollo escrito o a un libro/documento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ...
  chosen_spanish: Y ...
  alternatives_spanish:
  - Ahora bien
  - Y sucedió
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo. En español, «Y» conserva la continuidad de forma natural sin añadir un giro más interpretativo.
- source_word: כִּשְׁמֹעַ
  english_pob_choice: when ... heard
  chosen_spanish: cuando oyó
  alternatives_spanish:
  - al oír
  - así que oyó
  lexicon: HALOT
  rationale: La construcción temporal se rinde de manera idiomática con «cuando oyó», preservando la secuencia del evento sin forzar una perífrasis más pesada.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Correspondencia directa del sustantivo definido; «rey» es claro y plenamente natural en español.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - los dichos de
  - el contenido de
  lexicon: HALOT
  rationale: En este contexto, דבר en constructo se refiere a lo leído en el documento. «Palabras de» mantiene la relación formal con el hebreo y comunica bien el contenido escuchado.
- source_word: סֵפֶר הַתּוֹרָה
  english_pob_choice: the Book of the Law
  chosen_spanish: el libro de la Ley
  alternatives_spanish:
  - el rollo de la ley
  - el libro de la instrucción
  lexicon: HALOT
  rationale: «Libro» es la opción natural y fiel al uso contextual de סֵפֶר; «Ley» traduce תּוֹרָה con el peso jurídico/covenantal que el pasaje sugiere. Se conserva el término tradicional y transparente sin ocultar el objeto escrito.
- source_word: וַיִּקְרַע
  english_pob_choice: he tore
  chosen_spanish: rasgó
  alternatives_spanish:
  - rompió
  - desgarró
  lexicon: HALOT
  rationale: קרע expresa un desgarro físico intenso; «rasgó» comunica el acto con dignidad y fuerza, adecuado al gesto de duelo y alarma.
- source_word: בְּגָדָיו
  english_pob_choice: his clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - su ropa
  - sus prendas
  - sus vestiduras
  lexicon: HALOT
  rationale: «Vestidos» preserva un registro bíblico comprensible y corresponde bien al plural posesivo del hebreo. «Vestiduras» sería más solemne, pero menos natural; «ropa» sería más coloquial.
translation_notes:
  revision_awareness: Base revisada con alta concordancia en el inglés POB; no se detectaron cambios sustantivos en la decisión global. La única nota necesaria es la alternativa léxica para סֵפֶר, que en español también admite «rollo» además de «libro».
  spanish_consistency_notes:
  - Se mantiene «Ley» con mayúscula por tratarse del corpus normativo/covenantal del pasaje, en continuidad con el uso bíblico y con la decisión inglesa de «Law».
  - «Rasgó sus vestidos» conserva el valor ritual-expresivo del gesto con un español natural y respetuoso del registro narrativo.
