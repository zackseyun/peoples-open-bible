translation:
  language: es
  text: Yehoyadá envejeció y estaba lleno de días[a], y murió. Tenía ciento treinta años al morir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más idiomáticamente: «había vivido una vida plena». El hebreo dice: «estaba lleno de días».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְקַן
  english_pob_choice: grew old
  chosen_spanish: envejeció
  alternatives_spanish:
  - se hizo viejo
  - llegó a viejo
  lexicon: HALOT
  rationale: El verbo זקן en esta secuencia narrativa expresa el avance real en la vejez. «Envejeció» conserva ese proceso de manera natural en español y evita la rigidez de un calco como «fue viejo».
- source_word: יְהוֹיָדָע
  english_pob_choice: Jehoiada
  chosen_spanish: Yehoyadá
  alternatives_spanish:
  - Jehoiada
  lexicon: Convención transliterada del hebreo bíblico en español
  rationale: Se translitera el nombre propio de forma consistente con la práctica editorial en español. «Yehoyadá» refleja mejor la forma hebrea que la adaptación anglicada «Jehoiada».
- source_word: וַיִּשְׂבַּע יָמִים
  english_pob_choice: was full of days
  chosen_spanish: estuvo lleno de días
  alternatives_spanish:
  - tuvo una vida plena
  - vivió una vida completa
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente dice «estar lleno de días». Se conserva la imagen para no perder la huella semántica original, aunque en nota se reconoce la lectura más idiomática.
- source_word: וַיָּמֹת
  english_pob_choice: he died
  chosen_spanish: murió
  alternatives_spanish:
  - y murió
  - falleció
  lexicon: HALOT
  rationale: La forma narrativa de מות se traduce de manera directa y sobria. En español, el pronombre sujeto suele ser innecesario aquí, porque la forma verbal ya identifica al referente.
- source_word: בֶּן מֵאָה וּשְׁלֹשִׁים שָׁנָה
  english_pob_choice: one hundred and thirty years old
  chosen_spanish: ciento treinta años
  alternatives_spanish:
  - de ciento treinta años
  - con ciento treinta años
  lexicon: HALOT
  rationale: La fórmula hebrea usa literalmente «hijo de» para la edad, pero en español la expresión natural es simplemente la cifra de edad. Se mantiene la información sin añadir un giro menos idiomático.
- source_word: בְּמוֹתֹו
  english_pob_choice: at his death
  chosen_spanish: al morir
  alternatives_spanish:
  - a su muerte
  - cuando murió
  lexicon: HALOT
  rationale: La frase preposicional indica el momento de su muerte. «Al morir» conserva la relación temporal de forma natural y evita un doblete más pesado en español.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) y se alineó con la decisión inglesa de preservar la imagen idiomática de «lleno de días», mientras se adaptó la edad y el marcador temporal a un español natural.
  spanish_consistency_notes:
  - Se usa «Yehoyadá» para el nombre propio, coherente con transliteración hebrea en español.
  - Se mantiene «días» en la locución idiomática para respetar la textura del hebreo y la nota alternativa.
  - La edad se expresa de forma directa en español, sin calcar la fórmula semítica «hijo de».
  - El marcador temporal final se vierte como «al morir» para fluidez, manteniendo el valor aspectual del hebreo.
