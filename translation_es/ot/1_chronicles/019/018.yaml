base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/019/018.yaml
  text: And Aram fled before Israel[a], and David killed seven thousand chariot warriors from Aram and forty thousand foot soldiers[b], and he put Shophach the commander of the army to death.
  footnotes:
