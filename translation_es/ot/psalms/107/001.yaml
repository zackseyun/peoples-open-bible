translation:
  language: es
  text: Den gracias a Yahvé, porque es bueno, porque su amor fiel[a] permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su fidelidad al pacto permanece para siempre». El hebreo חֶסֶד incluye el sentido de amor leal y pactual.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹדוּ
  english_pob_choice: Give thanks
  chosen_spanish: Den gracias
  alternatives_spanish:
  - Alaben
  - Confiesen
  - Den alabanza
  lexicon: HALOT
  rationale: El imperativo plural en contextos de salmo de acción de gracias pide una respuesta litúrgica de gratitud. «Den gracias» conserva el valor idiomático de הֹדוּ sin reducirlo solo a «alabar» ni introducir una confesión explícita que el contexto no exige.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al SEÑOR
  lexicon: HALOT
  rationale: La fuente hebrea nombra directamente a יהוה; por la terminología del proyecto se traduce «Yahvé» y no se vela con «SEÑOR». La preposición ל se expresa naturalmente con «a» en español.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - benigno
  - recto
  lexicon: HALOT
  rationale: El adjetivo afirma la bondad de Yahvé de manera general y confesional. «Bueno» es la forma más directa y clara en español, sin estrechar indebidamente el alcance moral y beneficente del término.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  - para toda la eternidad
  lexicon: HALOT
  rationale: En hebreo la construcción fija la duración ilimitada del amor divino; en español, esa idea se expresa con naturalidad mediante «para siempre». No se añadió un verbo como «permanece» porque el hebreo liga la eternidad a חַסְדּוֹ en forma breve.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor fiel
  alternatives_spanish:
  - su amor constante
  - su misericordia
  - su lealtad pactal
  lexicon: HALOT
  rationale: חֶסֶד combina amor, lealtad y benevolencia pactual. «Amor fiel» conserva esa tensión entre afecto y constancia sin reducir el término a solo «misericordia» ni volverlo demasiado técnico como «lealtad pactal».
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita. Conforme a la terminología del proyecto, se mantiene el nombre propio divino «Yahvé», que preserva la referencia del pacto y evita el reemplazo litúrgico por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Rendering of חֶסֶד
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor fiel
  alternative_spanish_readings:
  - misericordia
  - amor constante
  - lealtad pactal
  rationale: El hebreo celebra la permanencia del חֶסֶד de Yahvé. «Amor fiel» mantiene la tensión teológica entre amor, lealtad y duración, y resulta comprensible en español sin perder el trasfondo de pacto.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'El texto inglés auditado fue ajustado para fluidez, eliminando el punto y coma y manteniendo la estructura causal. La redacción española sigue esa misma secuencia hebrea: llamado a la gratitud, afirmación de la bondad divina y fundamento en la duración permanente de su חֶסֶד.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con el estándar del proyecto para יהוה.
  - «Amor fiel» se empleó para חַסְדּוֹ como equivalente publicable que preserva la fuerza pactual sin calco pesado.
  - La puntuación con comas refleja la coordinación causal continua del hebreo y la revisión inglesa más fluida.
