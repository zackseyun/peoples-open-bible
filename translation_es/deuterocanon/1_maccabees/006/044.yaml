translation:
  language: es
  text: Y se dio a sí mismo para salvar a su pueblo y para ganar para sí un nombre eterno.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔδωκεν ἑαυτὸν
  english_pob_choice: gave himself
  chosen_spanish: se entregó a sí mismo
  alternatives_spanish:
  - se dio a sí mismo
  - dio su propia persona
  lexicon: LSJ
  rationale: El giro griego expresa autoentrega o autoentregarse con fuerza reflexiva. En español, «se entregó a sí mismo» comunica la misma decisión personal sin añadir por sí solo un matiz sacrificial que el contexto inmediato no exige.
- source_word: τοῦ σῶσαι
  english_pob_choice: to save
  chosen_spanish: para salvar
  alternatives_spanish:
  - con el fin de salvar
  - a fin de salvar
  lexicon: LSJ
  rationale: La construcción articular con infinitivo expresa finalidad. «Para salvar» es natural en español y conserva el sentido amplio de rescatar/liberar sin estrecharlo innecesariamente.
- source_word: τὸν λαὸν αὐτοῦ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su gente
  - a su nación
  lexicon: LSJ
  rationale: λαός designa al pueblo en sentido colectivo. «Pueblo» mantiene ese valor comunitario y evita restringirlo a una categoría política moderna.
- source_word: περιποιῆσαι
  english_pob_choice: to gain for himself
  chosen_spanish: ganarse
  alternatives_spanish:
  - adquirir para sí
  - conseguir para sí
  - lograr para sí
  lexicon: LSJ
  rationale: El verbo puede implicar adquirir, ganar o asegurarse algo para uno mismo. Dado que el objeto es «nombre», en español «ganarse» transmite bien la idea de obtener reputación o renombre con un matiz natural y reflexivo.
- source_word: αὐτῷ
  english_pob_choice: for himself
  chosen_spanish: se
  alternatives_spanish:
  - para sí
  - para él
  lexicon: Greek grammar / LSJ
  rationale: La dativa reflexiva se refleja de manera idiomática en «ganarse», evitando una repetición pesada. El referente vuelve al sujeto de la frase.
- source_word: ὄνομα αἰώνιον
  english_pob_choice: an everlasting name
  chosen_spanish: un nombre eterno
  alternatives_spanish:
  - un nombre perdurable
  - un nombre para siempre
  - una fama eterna
  lexicon: LSJ
  rationale: La expresión alude a renombre o memoria duradera. «Nombre eterno» conserva la imagen del griego y mantiene la amplitud semántica de reputación perdurable.
theological_decisions:
- issue: Posible carga sacrificial de la autoentrega
  english_pob_reading: Rendered ἔδωκεν ἑαυτὸν as 'gave himself' without adding sacrificial interpretation.
  chosen_spanish_reading: se entregó a sí mismo
  alternative_spanish_readings:
  - se ofreció
  - se inmoló
  rationale: «Se entregó a sí mismo» mantiene la autoentrega sin convertirla en un acto sacrificial explícito. Así se preserva la tensión del pasaje, que habla de liberación militar y de renombre duradero, no de expiación.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: El texto sigue la lectura griega directa y la revisión inglesa más reciente, que prefirió 'gain for himself' sobre 'win for himself' por razones de formalidad y naturalidad. En español se reflejó con «ganarse», que mantiene el sentido de obtener o adquirir un nombre duradero.
  spanish_consistency_notes:
  - Se mantuvo «pueblo» para λαός, en consonancia con el uso POB de 'people'.
  - Se eligió «nombre eterno» para ὄνομα αἰώνιον, evitando sustituirlo por una paráfrasis como 'fama' o 'memoria' que estrecharía la imagen del texto.
  - No se usó «Cristo» ni terminología litúrgica ajena al pasaje; el versículo no contiene vocabulario cristológico o cultual que lo requiera.
