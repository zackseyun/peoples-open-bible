  text: And to the sons of Aaron the priest they gave Hebron[a], the city of refuge for the manslayer, with its pasturelands, and Libnah with its pasturelands.
  footnotes:
  - marker: a
    text: Or 'the city of refuge for the killer/slayer.' The Hebrew term here is the legal term for one who has caused a death and may flee to a refuge city; 'manslayer' best preserves that nuance without implying premeditated murder.
