- from: Así pasaron y siguieron su camino[a], y el sol se puso sobre ellos cerca de Gibeá, que pertenece a Benjamín.
  to: Así pasaron y siguieron su camino[a], y se les puso el sol cerca de Gibeá, que pertenece a Benjamín.
  rationale: Se reemplaza «el sol se puso sobre ellos» por «se les puso el sol» para expresar de manera natural en español el modismo hebreo de que el atardecer los alcanzó durante el viaje, sin perder el sentido del original ni la intención de la auditoría inglesa. Se conserva la nota textual existente, correctamente anclada y formulada.
