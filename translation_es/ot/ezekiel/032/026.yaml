    text: 'Hebreo literalmente: «y toda su multitud; alrededor de él están sus sepulcros», con cambios de número y género en la línea poética.'
    reason: lexical_alternative
  revision_rationale: Se corrige únicamente el modismo final para reflejar con fidelidad y buen español el hebreo נָתְנוּ חִתִּיתָם. 'Sembraron su terror' comunica que infundieron o extendieron terror en la tierra de los vivos, en línea con el POB inglés 'they spread their terror'. El resto del versículo y la nota preservan adecuadamente el sentido fuente y la decisión documentada sobre los sufijos poéticos.
