- from: 'Entonces Jacob despertó de su sueño y dijo[a]: «¡Ciertamente Yahvé está en este lugar, y yo no lo sabía!»'
  to: 'Entonces Jacob despertó de su sueño y dijo: «Ciertamente[a] Yahvé está en este lugar, y yo no lo sabía».'
