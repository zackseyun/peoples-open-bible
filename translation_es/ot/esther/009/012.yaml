revisions:
- from: 'Entonces el rey dijo a Ester la reina[a]: «En Susa la ciudadela, los judíos han matado y destruido a quinientos hombres, junto con los diez hijos de Amán. ¿Qué habrán hecho entonces en el resto de las provincias del rey? Ahora, ¿cuál es tu petición? Te será concedida. ¿Y cuál es tu ulterior solicitud? Se hará».'
  to: 'Entonces el rey dijo a la reina Ester[a]: «En Susa, la ciudadela, los judíos han matado y destruido a quinientos hombres, junto con los diez hijos de Amán. ¿Qué habrán hecho entonces en el resto de las provincias del rey? Ahora, ¿cuál es tu petición? Te será concedida. ¿Y cuál es tu petición adicional? Se hará».'
  rationale: Se ajusta la aposición a un español más natural y digno («la reina Ester») sin cambiar el sentido. Se reemplaza «ulterior solicitud» por «petición adicional» para mejorar claridad y legibilidad, manteniendo la distinción entre שְׁאֵלָה y בַּקָּשָׁה con el matiz de עוֹד. Se conserva la nota léxica inferencial del expediente inglés.
