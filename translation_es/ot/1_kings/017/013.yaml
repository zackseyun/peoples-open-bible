    text: Or 'Come, do as you have said.' The Hebrew verb can be rendered more literally as 'come,' but here it functions idiomatically as an exhortation to proceed.
    reason: lexical_alternative
  - marker: b
    text: Or 'a little cake.' The Hebrew עֻגָה can refer to a small baked loaf or cake.
    reason: lexical_alternative
