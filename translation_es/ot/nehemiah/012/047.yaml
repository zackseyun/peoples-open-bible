base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/012/047.yaml
  text: And all Israel[a], in the days of Zerubbabel and in the days of Nehemiah, gave the portions for the singers and the gatekeepers, as each day required; and they set apart for the Levites[c][b], and the Levites set apart for the sons of Aaron.
  footnotes:
