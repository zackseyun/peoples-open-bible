theological_decisions:
- issue: Joseph's refusal to identify himself to the Ishmaelites despite hearing of Jacob's grief
  chosen_reading: Joseph suppresses his identity out of concern not to shame his brothers
  alternative_readings:
  - Joseph is simply resigned to slavery
  - Joseph fears further danger if identified
  rationale: The explicit clause 'so that I might not put my brothers to shame' governs the scene and should remain central rather than being softened into passive resignation.
  doctrine_reference: Preserve theological and moral tension rather than resolving it.
