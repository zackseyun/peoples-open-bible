translation:
  language: es
  text: Ahora Atalía, la madre de Ocozías, vio que su hijo había muerto; y se levantó y destruyó[a] a toda la descendencia real de la casa de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene aquí una forma verbal difícil, literalmente «habló», pero el contexto y el paralelo en 2 Reyes 11:1 apoyan el sentido «destruyó» o «dio muerte a».
    reason: textual_variant
lexical_decisions:
- source_word: וַעֲתַלְיָהוּ
  english_pob_choice: Now Athaliah
  chosen_spanish: Ahora Atalía
  alternatives_spanish:
  - Y Atalía
  - Atalía
  lexicon: Nombre propio / convención bíblica
  rationale: Se translitera el nombre propio en forma usual en español. El waw narrativo se vierte como conector discursivo natural; «Ahora» conserva el inicio narrativo sin volverlo demasiado mecánico.
- source_word: אֵם אֲחַזְיָהוּ
  english_pob_choice: the mother of Ahaziah
  chosen_spanish: madre de Ocozías
  alternatives_spanish:
  - la madre de Ocozías
  - Ocozías, su madre
  lexicon: Relación constructa / parentesco
  rationale: La relación constructa se expresa con naturalidad en español como aposición de parentesco. «Madre de Ocozías» mantiene la identificación clara y directa.
- source_word: רָאֲתָה כִּי מֵת בְּנָהּ
  english_pob_choice: saw that her son was dead
  chosen_spanish: vio que su hijo había muerto
  alternatives_spanish:
  - vio que su hijo estaba muerto
  - vio que su hijo fue muerto
  lexicon: HALOT
  rationale: ראתה introduce percepción de un hecho consumado. El pluscuamperfecto «había muerto» comunica bien el evento anterior con resultado presente, sin forzar el hebreo.
- source_word: וַתָּקָם
  english_pob_choice: she arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: HALOT
  rationale: קוּם en narración puede marcar acción decisiva; «se levantó» es natural en español y conserva el movimiento de transición hacia la acción.
- source_word: וַתְּדַבֵּר
  english_pob_choice: destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - dio muerte a
  - hizo morir a
  - eliminó
  lexicon: HALOT
  rationale: Aunque la forma verbal remite a «habló», el contexto y el paralelo de 2 Reyes 11:1 apuntan a la idea de exterminio. «Destruyó» reproduce esa fuerza sin resolver más de lo que el contexto obliga.
- source_word: כָּל זֶרַע הַמַּמְלָכָה
  english_pob_choice: all the royal offspring
  chosen_spanish: toda la descendencia real
  alternatives_spanish:
  - toda la simiente real
  - todos los herederos del reino
  - toda la estirpe real
  lexicon: HALOT
  rationale: זֶרַע en contexto dinástico alude a descendencia/linaje. «Descendencia real» conserva el campo semántico de linaje y herencia mejor que un término más abstracto o demasiado eclesial.
- source_word: לְבֵית יְהוּדָה
  english_pob_choice: of the house of Judah
  chosen_spanish: de la casa de Judá
  alternatives_spanish:
  - perteneciente a la casa de Judá
  - de la dinastía de Judá
  lexicon: HALOT
  rationale: «Casa de Judá» reproduce el valor dinástico del hebreo. En español, «de la casa de Judá» suena idiomático y precisa el ámbito familiar-político.
theological_decisions:
- issue: Sentido de וַתְּדַבֵּר en el contexto
  english_pob_reading: Translate according to contextual sense as 'destroyed' rather than a wooden 'spoke.'
  chosen_spanish_reading: Traducir por el sentido contextual como «destruyó», no literalmente como «habló».
  alternative_spanish_readings:
  - habló
  - ordenó la muerte de
  - dispuso la muerte de
  rationale: La frase no describe habla literal con objeto directo humano; el contexto inmediato y el paralelo de 2 Reyes 11:1 favorecen una acción de exterminio. Se preserva así la tensión textual documentando la decisión léxica en lugar de ocultarla.
  doctrine_reference: Principio de primacía del original y transparencia textual; no se resuelve la ambigüedad por tradición devocional sino por contexto y paralelo bíblico.
translation_notes:
  revision_awareness: La versión revisada más reciente no introduce cambios respecto del borrador base; se mantiene el mismo juicio de traducción y la misma decisión contextual para וַתְּדַבֵּר.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino en el texto base.
  - Se usa «casa de Judá» para conservar el matiz dinástico y familiar del hebreo.
  - La nota al pie se ancla solo en la decisión problemática de וַתְּדַבֵּר, siguiendo el aparato auditivo en inglés.
