translation:
  language: es
  text: Y sus esclavos lo prendieron y lo sacaron fuera del campamento, a la llanura, y subieron desde en medio de la llanura hacia la región montañosa, y llegaron a los manantiales que estaban debajo de Betulia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - servidores
  lexicon: BDAG
  rationale: El griego δοῦλοι conserva aquí el sentido de subordinados bajo autoridad; como el POB inglés optó por 'slaves' para mantener la fuerza léxica, 'esclavos' preserva mejor ese valor que 'siervos' o 'servidores'.
- source_word: συνέλαβον
  english_pob_choice: seized
  chosen_spanish: lo prendieron
  alternatives_spanish:
  - lo agarraron
  - lo aprehendieron
  lexicon: LSJ
  rationale: El verbo expresa tomar físicamente a una persona. 'Lo prendieron' comunica esa acción concreta sin cargar innecesariamente con un matiz jurídico de arresto.
- source_word: παρεμβολῆς
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - campamento
  lexicon: LSJ
  rationale: En este contexto narrativo militar, παρεμβολή designa un campamento. 'Campamento' es natural en español y conserva el sentido del espacio donde estaban.
- source_word: πεδίον
  english_pob_choice: plain
  chosen_spanish: llano
  alternatives_spanish:
  - planicie
  - llanura
  lexicon: LSJ
  rationale: El término señala una extensión baja y nivelada; 'llano' funciona bien en español y mantiene la contraposición con la zona montañosa.
- source_word: ἀπῆραν
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - se encaminaron hacia arriba
  - ascendieron
  lexicon: LSJ
  rationale: El verbo marca movimiento ascendente. 'Subieron' expresa con claridad el desplazamiento hacia una zona más alta, acorde con la secuencia topográfica del pasaje.
- source_word: ἐκ μέσου τῆς πεδινῆς
  english_pob_choice: from the midst of the plain
  chosen_spanish: desde en medio de la llanura
  alternatives_spanish:
  - desde el centro de la llanura
  - desde el medio del llano
  lexicon: LSJ
  rationale: La frase subraya el punto de salida dentro de la zona llana. 'Desde en medio de la llanura' conserva ese valor espacial de manera natural en español.
- source_word: ὀρεινήν
  english_pob_choice: hill country
  chosen_spanish: región montañosa
  alternatives_spanish:
  - país montañoso
  - tierras altas
  lexicon: LSJ
  rationale: El término designa una zona de colinas o montes. 'Región montañosa' es claro y mantiene el contraste geográfico con el llano.
- source_word: παρεγένοντο
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - arribaron
  lexicon: LSJ
  rationale: El verbo indica arribo a un lugar. 'Llegaron' es el equivalente narrativo más directo en español.
- source_word: πηγὰς
  english_pob_choice: springs
  chosen_spanish: las fuentes
  alternatives_spanish:
  - los manantiales
  - las vertientes
  lexicon: LSJ
  rationale: En español, 'fuentes' puede designar manantiales naturales y mantiene el sentido geográfico del pasaje. Se evita 'fuentes' en sentido ambiguo de objetos de agua artificiales porque el contexto aclara el valor natural.
- source_word: ὑποκάτω
  english_pob_choice: below
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - por debajo de
  lexicon: LSJ
  rationale: La preposición indica una posición inferior respecto de Betulia. 'Debajo de' es la formulación más transparente y natural en español.
- source_word: Βετυλουά
  english_pob_choice: Bethulia
  chosen_spanish: Betulia
  alternatives_spanish:
  - Bethulia
  lexicon: transliteration
  rationale: Es un nombre propio de lugar; en español se translitera como 'Betulia', conservando la referencia geográfica sin traducir el topónimo.
translation_notes:
  revision_awareness: 'El inglés auditado muestra una corrección importante de ''servants'' de vuelta a ''slaves'', así como ajuste de ''brought him up'' a ''went up'' por la intransitividad del griego. La versión española sigue esa última revisión y mantiene la fuerza de δοῦλοι con ''esclavos'', evitando suavizar el vínculo de subordinación. También conserva la progresión topográfica del original: fuera del campamento, al llano, subida a la región montañosa y llegada a las fuentes debajo de Betulia.'
  spanish_consistency_notes:
  - Se mantuvo 'esclavos' para δοῦλοι conforme al criterio POB documentado.
  - Se tradujo la secuencia verbal de forma narrativa y escalonada, respetando el orden del griego.
  - '''Betulia'' se dejó como nombre propio transliterado, no como traducción.'
  - No se añadieron notas al pie porque el texto no presenta una alternativa textual o teológica que requiera anclaje explícito.
