translation:
  language: es
  text: En cuanto al pueblo[a], lo trasladó a las ciudades, desde un extremo del territorio de Egipto hasta el otro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas traducciones, siguiendo una comprensión textual distinta, entienden que el versículo dice que José hizo esclavos al pueblo; el hebreo aquí habla más directamente de reubicarlo.
    reason: alternative_reading
lexical_decisions:
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la población
  lexicon: HALOT
  rationale: En este contexto colectivo, 'pueblo' expresa naturalmente al conjunto de habitantes afectados por la medida de José. 'Gente' sería más coloquial y 'población' más técnico; 'pueblo' mantiene registro bíblico sin volverlo arcaico.
- source_word: הֶעֱבִיר אֹתוֹ
  english_pob_choice: he moved them
  chosen_spanish: lo trasladó
  alternatives_spanish:
  - los movió
  - los transfirió
  - los hizo pasar
  lexicon: HALOT
  rationale: El hitpael/hiphil de עבר aquí indica hacer pasar o trasladar. En español, 'trasladó' comunica mejor la idea de reubicación y evita la ambigüedad de 'mover', que puede sonar demasiado general. Como el sustantivo colectivo es singular en hebreo, el pronombre español se ajusta a 'el pueblo'.
- source_word: לֶעָרִים
  english_pob_choice: to the cities
  chosen_spanish: a las ciudades
  alternatives_spanish:
  - hacia las ciudades
  - en las ciudades
  lexicon: HALOT
  rationale: La preposición ל en este contexto marca destino o dirección. 'A las ciudades' es la forma más natural y fiel en español; 'en las ciudades' sugeriría ubicación final más que traslado.
- source_word: מִקְצֵה גְבוּל מִצְרַיִם וְעַד קָצֵהוּ
  english_pob_choice: from one end of the territory of Egypt to the other
  chosen_spanish: desde un extremo de la tierra de Egipto hasta el otro
  alternatives_spanish:
  - desde un extremo del territorio de Egipto hasta el otro
  - desde un extremo de Egipto hasta el otro
  lexicon: HALOT
  rationale: La frase hebrea es un merismo de extensión total. 'Tierra de Egipto' conserva bien el sentido geográfico amplio de גְבוּל sin reducirlo a una simple línea fronteriza. 'Hasta el otro' reproduce la simetría del hebreo con naturalidad.
theological_decisions:
- issue: Interpretación de la acción de José sobre el pueblo egipcio
  english_pob_reading: he moved them to the cities
  chosen_spanish_reading: lo trasladó a las ciudades
  alternative_spanish_readings:
  - los convirtió en esclavos
  - los hizo siervos
  - los trasladó de ciudad en ciudad
  rationale: El hebreo masorético describe con mayor directez un traslado/reubicación del pueblo. No explicita aquí la idea de esclavización, por lo que la traducción no debe importarla. 'Trasladó' preserva la tensión interpretativa señalada por la nota inglesa sin resolverla en favor de una lectura más dura.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente al preferir una formulación breve y directa para לֶעָרִים, sin expandir innecesariamente el destino del traslado. También conserva la nota alternativa sobre la lectura de servidumbre, porque el texto hebreo y la tradición de traducción muestran esa tensión interpretativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma normal del nombre divino cuando corresponda; en este versículo no aparece.
  - Se evita 'SEÑOR' como sustituto no presente en el hebreo.
  - '''Pueblo'' se mantiene como sustantivo colectivo; el pronombre español ''lo'' concuerda con ese colectivo singular.'
  - El registro busca ser bíblico y claro, sin arcaísmos innecesarios.
