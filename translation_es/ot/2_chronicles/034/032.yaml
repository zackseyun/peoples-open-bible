revisions:
- from: Entonces hizo que todos los que fueron hallados en Jerusalén y Benjamín se comprometieran con ello[a], y los habitantes de Jerusalén actuaron conforme al pacto de Dios[b], el Dios de sus padres.
  to: Entonces hizo que todos los que fueron hallados en Jerusalén y Benjamín se mantuvieran firmes en él[a], y los habitantes de Jerusalén actuaron conforme al pacto de Dios, el Dios de sus padres.
  rationale: 'Se revisa la primera cláusula para conservar mejor la imagen del hebreo עמד y la lógica del POB inglés: no solo compromiso, sino firmeza vinculada al pacto. También se elimina la nota [b] porque estaba mal anclada y no aportaba una alternativa válida para el segmento señalado. La segunda cláusula se mantiene, ya que es fiel, natural y teológicamente adecuada.'
