  language: en
  yaml_path: translation/ot/isaiah/057/015.yaml
  text: 'For thus says the One who is high and lifted up[a], who inhabits eternity, whose name is Holy: “I dwell in the high and holy place, and also with the crushed and lowly in spirit[b], to revive the spirit of the lowly and to revive the heart of the crushed.”'
  footnotes:
  - marker: a
    text: Or 'who dwells forever.' The Hebrew expression can emphasize either eternal duration or dwelling in eternity.
    reason: lexical_alternative
  - marker: b
    text: Traditionally, 'with the contrite and lowly in spirit' ... 'to revive the heart of the contrite.'
    reason: lexical_alternative
