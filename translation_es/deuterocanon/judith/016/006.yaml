  revised_footnotes:
  - marker: a
    text: O «lo paralizó» o «lo inutilizó»; el verbo griego puede expresar que alguien queda incapacitado o sin poder, de manera literal o figurada.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que documente correctamente παρέλυσεν, se elimina la duplicación de notas sobre la misma decisión léxica y se mejora la naturalidad de la frase agentiva con «a manos de jóvenes». No se requieren cambios doctrinales ni una nueva adjudicación compleja.
