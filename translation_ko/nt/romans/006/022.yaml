source:
  edition: SBLGNT
  text: νυνὶ δέ, ἐλευθερωθέντες ἀπὸ τῆς ἁμαρτίας δουλωθέντες δὲ τῷ θεῷ, ἔχετε τὸν καρπὸν ὑμῶν εἰς ἁγιασμόν, τὸ δὲ τέλος ζωὴν αἰώνιον.
base_translation:
  language: en
  yaml_path: translation/nt/romans/006/022.yaml
  text: But now[a], having been freed from sin and enslaved to God, you have your fruit unto sanctification, and the end[c][b], eternal life.
translation:
  language: ko
  text: 그러나 이제 여러분은 죄로부터 자유롭게 되고 하나님께 노예가 되어, 거룩함에 이르는 열매를 얻고 있으며, 그 끝은 영원한 생명입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐλευθερωθέντες
  english_pob_choice: having been freed
  chosen_korean: 자유롭게 되고
  lexicon: BDAG
  rationale: 6:18 일관.
- source_word: δουλωθέντες τῷ θεῷ
  english_pob_choice: enslaved to God
  chosen_korean: 하나님께 노예가 되어
  alternatives_korean:
  - 하나님께 종이 되어
  lexicon: BDAG
  rationale: 6장 정책. 하나님께 대한 노예 신분도 일관되게 「노예」로 옮겨 충격을 보존.
- source_word: εἰς ἁγιασμόν
  english_pob_choice: unto sanctification
  chosen_korean: 거룩함에 이르는
  lexicon: BDAG
