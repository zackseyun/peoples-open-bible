translation:
  language: es
  text: Todo consejero alza la mano[a], pero hay un consejero cuyo consejo es para sí mismo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más dinámica: «Todo consejero ofrece consejo, pero algunos aconsejan para su propio provecho».'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo del final del verso es difícil en el testimonio suministrado; el paralelo griego apoya el sentido adoptado aquí: «pero hay un consejero cuyo consejo es para sí mismo».'
    reason: textual_variant
lexical_decisions:
- source_word: πᾶς / כל
  english_pob_choice: Every
  chosen_spanish: Todo
  alternatives_spanish:
  - Cada
  - Todo y cada
  lexicon: HALOT; Liddell-Scott-Jones
  rationale: En un proverbio general, «todo» conserva el valor distributivo sin forzar una perífrasis más pesada; funciona de modo natural en español y mantiene el alcance sentencioso del original.
- source_word: σύμβουλος / יועץ
  english_pob_choice: counselor
  chosen_spanish: consejero
  alternatives_spanish:
  - asesor
  - el que da consejo
  lexicon: HALOT; Liddell-Scott-Jones
  rationale: «Consejero» mantiene el registro sapiencial y corresponde bien al oficio de dar consejo; en español suena más literario y bíblico que «asesor».
- source_word: ἐξαίρει βουλήν / יניף יד
  english_pob_choice: waves his hand
  chosen_spanish: alza la mano
  alternatives_spanish:
  - mueve la mano
  - hace un gesto con la mano
  lexicon: Liddell-Scott-Jones; HALOT
  rationale: La imagen corporal debe conservarse, pero «alza la mano» suena más natural en español que «agita la mano». Al mismo tiempo, sigue reflejando la expresión hebrea opaca y no la aplana del todo.
- source_word: ἀλλ᾽ / אך
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - mas
  lexicon: Liddell-Scott-Jones; HALOT
  rationale: «Pero» expresa la oposición entre la afirmación general y la excepción advertida, sin añadir matiz ajeno.
- source_word: ἔστι
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - existe
  - hay uno
  lexicon: Liddell-Scott-Jones
  rationale: «Hay» es la manera más idiomática de reproducir la construcción existencial en español.
- source_word: συμβουλεύων εἰς αὐτόν / דרך אל לץ
  english_pob_choice: whose advice is for himself
  chosen_spanish: cuyo consejo es para sí mismo
  alternatives_spanish:
  - cuyo consejo es para él
  - que aconseja para su propio provecho
  - cuyo consejo va dirigido a sí mismo
  lexicon: Liddell-Scott-Jones; HALOT
  rationale: La lectura hebrea suministrada es difícil al final del verso, y el paralelo griego apunta claramente a una orientación reflexiva o interesada. «Para sí mismo» preserva esa dirección sin introducir una interpretación más específica que el texto no exige.
theological_decisions:
- issue: Tratamiento de la variante textual al final del verso
  english_pob_reading: 'The English POB follows the Greek-supported sense: ''but there is a counselor whose advice is for himself.'''
  chosen_spanish_reading: pero hay un consejero cuyo consejo es para sí mismo
  alternative_spanish_readings:
  - pero hay un consejero que aconseja para su propio provecho
  - pero hay un consejero que da consejo para sí
  rationale: 'No hay una controversia doctrinal, pero sí una tensión textual: el hebreo transmitido es difícil y el griego aclara la dirección del consejo. La traducción española sigue esa lectura de modo transparente, sin ocultar el matiz de interés propio.'
  doctrine_reference: Textual criticism / Proverbs and wisdom literature
translation_notes:
  revision_awareness: 'No se requirieron revisiones posteriores: el pasaje presenta una única dificultad principal al final del verso, y la decisión española sigue de cerca el sentido respaldado por el paralelo griego sin perder la imagen proverbial inicial.'
  spanish_consistency_notes:
  - Se prefirió «consejero» para mantener coherencia con el registro sapiencial y con la decisión inglesa.
  - Se conservó la imagen de la mano en una forma idiomática española («alza la mano») para no perder el color del hebreo.
  - Se evitó «SEÑOR» u այլ terminología no pertinente, ya que el verso no contiene lenguaje divino explícito.
  - «Para sí mismo» reproduce la orientación reflexiva/interesada del final del verso sin añadir una explicación interpretativa excesiva.
