revisions:
- from: 'Entonces Jefté hizo un voto a Yahvé y dijo[a]: «Si en verdad entregas a los ammonitas en mi mano»'
  to: 'Entonces Jefté hizo un voto a Yahvé y dijo[a]: «Si en verdad entregas a los amonitas en mi mano,»'
  rationale: Se corrige la grafía del etnónimo a «amonitas» para ajustarla al español estándar y se repara la nota al pie para que preserve una alternativa real al énfasis hebreo documentado en la auditoría inglesa. También se mantiene la coma final dentro de las comillas para reflejar que la prótasis queda abierta y continúa en el versículo siguiente.
