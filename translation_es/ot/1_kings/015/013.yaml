review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: Asa quita a Maacá de su cargo de reina madre por haber hecho un objeto cultual detestable para Asherah, luego lo corta y lo quema en el valle de Cedrón. También preserva correctamente la ambigüedad de אֲשֵׁרָה mediante transliteración y mantiene la nota sobre ''su madre'' como posible uso dinástico más amplio. Sin embargo, ''apartó'' suena menos preciso para una destitución oficial que ''quitó'' o ''depuso'', y ''cortó su imagen'' puede resultar algo menos natural en español que una formulación que exprese mejor la destrucción física del objeto.'
  spanish_quality_summary: El texto es claro y legible, pero admite una mejora menor de naturalidad y precisión institucional. 'Quitó ... de ser reina madre' suena más claro en español bíblico moderno que 'apartó ... de ser reina madre'. Asimismo, 'cortó su imagen' es comprensible, pero 'cortó la imagen de ella' sería torpe; conviene mantener una formulación breve y natural. El resto del verso está bien puntuado y tiene tono adecuado.
  glossary_alignment: Alineación general buena con la terminología del proyecto. Se conserva 'Asherah' por transliteración con nota explicativa, en consonancia con la decisión teológica auditada. 'Reina madre' reproduce bien גְּבִירָה. No hay términos del glosario mayor en conflicto. La revisión propuesta solo afina el verbo de destitución.
  issues:
  - severity: medium
    issue: '''apartó'' para וַיְסִרֶהָ'
    rationale: Aunque posible, 'apartó' en español puede sugerir alejar o separar más que destituir de un cargo. El hebreo aquí apunta a removerla de una posición oficial; 'quitó' comunica mejor esa función sin sonar forzado.
  - severity: low
    issue: Anclaje de notas [c][b]
    rationale: Es válido, pero visualmente puede leerse mejor si se mantiene sobre 'Asherah' como está. No requiere cambio sustantivo.
