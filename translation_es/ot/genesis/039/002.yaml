translation:
  language: es
  text: Yahvé estaba con José[a], y llegó a ser un hombre exitoso; y estaba en la casa de su amo egipcio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "próspero". El participio hebreo puede denotar a alguien que prospera o tiene éxito.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del texto hebreo, en lugar de sustituirlo por un título. En español, ‘Yahvé’ es la forma más clara y reverente para este proyecto, en continuidad con la decisión auditada del POB inglés.
- source_word: אֶת יוֹסֵף
  english_pob_choice: with Joseph
  chosen_spanish: con José
  alternatives_spanish:
  - junto a José
  - al lado de José
  lexicon: HALOT
  rationale: La construcción hebrea expresa presencia relacional y favor divino. ‘Con José’ reproduce esa relación de manera natural en español sin añadir matices no evidenciados.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - varón
  lexicon: HALOT
  rationale: El sustantivo es masculino singular y se refiere a José como individuo. ‘Hombre’ conserva el valor léxico básico y la concordancia con el predicado.
- source_word: מַצְלִיחַ
  english_pob_choice: successful
  chosen_spanish: exitoso
  alternatives_spanish:
  - próspero
  - que prospera
  - triunfante
  lexicon: HALOT
  rationale: El participio puede indicar prosperar o tener éxito. ‘Exitoso’ comunica con naturalidad en español que sus acciones iban bien, sin restringir indebidamente el sentido a riqueza material; se deja la alternativa semántica en nota.
- source_word: בְּבֵית
  english_pob_choice: in the house of
  chosen_spanish: en la casa de
  alternatives_spanish:
  - en el hogar de
  - en la casa/servicio de
  lexicon: HALOT
  rationale: La frase es literal y adecuada al contexto narrativo. ‘En la casa de’ mantiene la imagen hebrea y es suficientemente clara en español.
- source_word: אֲדֹנָיו
  english_pob_choice: his master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su dueño
  lexicon: HALOT
  rationale: Aunque ‘master’ suele corresponder a ‘amo’ o ‘señor’, aquí el uso narrativo de autoridad doméstica permite ‘señor’ como traducción respetuosa y comprensible. Se evita ‘dueño’ por su posible dureza moderna, pero se conserva la relación de subordinación.
- source_word: הַמִּצְרִי
  english_pob_choice: Egyptian
  chosen_spanish: egipcio
  alternatives_spanish:
  - el egipcio
  lexicon: HALOT
  rationale: 'En español, el adjetivo pospuesto funciona con naturalidad: ‘su señor egipcio’. Esto mantiene el valor atributivo del hebreo sin sonar forzado.'
- source_word: וַיְהִי ... וַיְהִי ... וַיְהִי
  english_pob_choice: was ... became ... was
  chosen_spanish: estaba ... llegó a ser ... estaba
  alternatives_spanish:
  - fue ... llegó a ser ... fue
  - estuvo ... se volvió ... estuvo
  lexicon: HALOT
  rationale: La repetición de wayyiqtol en hebreo marca secuencia narrativa. En español, ‘estaba’ / ‘llegó a ser’ / ‘estaba’ conserva el desarrollo del relato con buena fluidez, sin perder el cambio de estado expresado en el participio y los verbos consecutivos.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Según la política del proyecto, se translitera el nombre divino en lugar de enmascararlo con un título, preservando la identidad pactual del nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de מַצְלִיחַ
  english_pob_reading: successful / prosperous
  chosen_spanish_reading: exitoso
  alternative_spanish_readings:
  - próspero
  - que prospera
  rationale: 'El participio hebreo admite más de un matiz: éxito, prosperidad o progreso. ‘Exitoso’ refleja el valor dinámico general del POB inglés y evita estrechar el sentido a prosperidad económica בלבד; la nota conserva la alternativa lexical.'
  doctrine_reference: 'DOCTRINE.md: lexical flexibility where Hebrew participles carry a broader semantic range'
- issue: אֲדֹנָיו הַמִּצְרִי
  english_pob_reading: his Egyptian master
  chosen_spanish_reading: su señor egipcio
  alternative_spanish_readings:
  - su amo egipcio
  - su dueño egipcio
  rationale: La relación de autoridad en el contexto de José en Egipto puede expresarse con ‘señor’ en español bíblico corriente, manteniendo dignidad y subordinación. No se identifica aquí con lenguaje divino ni se suaviza indebidamente la asimetría social.
  doctrine_reference: 'DOCTRINE.md: status/authority terms in narrative context'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de su redacción: se mantuvo el nombre divino como Yahvé, se preservó la secuencia narrativa del hebreo con verbos españoles naturales, y se dejó abierta en nota la ambigüedad léxica de מַצְלִיחַ. No se detectaron revisiones posteriores que alteren la base de trabajo.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el Tetragrama, de forma consistente con el proyecto.
  - ‘Hombre’ se reserva para אִישׁ cuando el contexto refiere a un varón individual.
  - ‘Exitoso’ se eligió por fluidez, pero la nota preserva la alternativa ‘próspero’.
  - ‘Señor’ se emplea aquí como término de autoridad doméstica, no como sustituto del nombre divino.
