  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. El uso de «siervo» para עבדך es correcto por tratarse de autoidentificación cortesana. «Mi señor el rey» también está bien. La principal desviación es el nombre propio: debe mantenerse «Kimham» salvo justificación fuerte documentada, que aquí no existe.'
