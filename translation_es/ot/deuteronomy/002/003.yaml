translation:
  language: es
  text: Ya han rodeado bastante esta región montañosa[a]; vuélvanse hacia el norte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este monte». El hebreo הַר puede denotar un monte o una zona montañosa; en este contexto de viaje, la lectura geográfica amplia es la más probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב לָכֶם
  english_pob_choice: You have gone around ... long enough
  chosen_spanish: Ya han rodeado bastante
  alternatives_spanish:
  - Es suficiente para ustedes
  - Han rodeado demasiado
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y comunica suficiencia/exceso, no solo cantidad. En español, "ya han rodeado bastante" reproduce la idea de que ese recorrido ha durado lo suficiente, sin volverla mecánica.
- source_word: סֹב
  english_pob_choice: gone around
  chosen_spanish: rodeado
  alternatives_spanish:
  - circuitado
  - dado la vuelta a
  lexicon: HALOT
  rationale: El verbo indica moverse alrededor o circunvalar. "Rodeado" es natural en español y conserva la imagen de haber dado vueltas alrededor de la zona.
- source_word: הָהָר הַזֶּה
  english_pob_choice: this hill country
  chosen_spanish: este [a] monte
  alternatives_spanish:
  - esta montaña
  - esta región montañosa
  lexicon: HALOT
  rationale: El hebreo הַר puede referirse a un monte individual o a una zona montañosa; el contexto de viaje favorece una referencia geográfica amplia. En el texto principal se deja "monte" y se explica la alternativa de sentido en nota.
- source_word: פְּנוּ
  english_pob_choice: turn
  chosen_spanish: vuélvanse
  alternatives_spanish:
  - giren
  - cambien de dirección
  lexicon: HALOT
  rationale: El imperativo pide cambiar de rumbo. "Vuélvanse" expresa de forma clara y digna la orden de desviar el recorrido.
- source_word: צָפֹנָה
  english_pob_choice: northward
  chosen_spanish: hacia el norte
  alternatives_spanish:
  - al norte
  - rumbo al norte
  lexicon: HALOT
  rationale: El hebreo marca dirección de movimiento. "Hacia el norte" es una equivalencia natural y transparente en español contemporáneo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido del hebreo y el audit trail inglés: רַב לָכֶם como suficiencia/exceso, סֹב como rodear, הָהָר הַזֶּה con valor geográfico amplio y צָפֹנָה como dirección. Se evita una traducción mecánica del inglés y se conserva la ambigüedad documentada de הַר mediante nota.'
  spanish_consistency_notes:
  - Se usó "monte" en vez de "montaña" para mantener la posibilidad semántica del hebreo y porque permite una nota breve que preserva la tensión lexical.
  - Se prefirió "vuélvanse" sobre una construcción más literal como "giren" para una lectura bíblica natural y reverente en español.
  - No se añadió equivalente explícito de "for yourselves" porque el hebreo, como en el audit trail inglés, no exige una expresión idiomática en español.
