  text: ⸀καὶ ἄγγελος κυρίου ἐπέστη αὐτοῖς καὶ δόξα κυρίου περιέλαμψεν αὐτούς, καὶ ἐφοβήθησαν φόβον μέγαν·
base_translation:
  language: en
  yaml_path: translation/nt/luke/002/009.yaml
  text: And an angel of the Lord stood before them[a], and the glory of the Lord shone around them[b], and they feared a great fear.
  footnotes:
  - marker: a
    text: Or 'came upon them' or 'stood by them' for 'stood before them.' The Greek verb can convey sudden presence as well as standing near.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'they feared a great fear,' an idiom expressing intense terror.
    reason: lexical_alternative
translation:
  language: ko
  text: 야훼[a]의 천사가 그들 앞에 섰고, 야훼의 영광이 그들 둘레에 비추니, 그들은 크게 두려워하였습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「ἄγγελος κυρίου」와 「δόξα κυρίου」는 출 16:7,10; 24:16-17 등의 OT 신현 양식을 직접 반향하므로 「야훼」로 옮긴다.
    reason: alternative_reading
