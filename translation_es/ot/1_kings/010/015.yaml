translation:
  language: es
  text: además de lo que provenía de los mercaderes itinerantes[a] y del comercio de los mercaderes, y de todos los reyes de Arabia[b] y de los gobernadores de la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que provenía de los hombres que viajaban»; el hebreo es difícil y puede referirse de modo más general a comerciantes itinerantes.
    reason: lexical_alternative
  - marker: b
    text: O «todos los reyes de los pueblos mezclados»; el hebreo עֶרֶב puede tener ese sentido en algunos contextos, aunque aquí «Arabia» encaja mejor.
    reason: alternative_reading
  - marker: c
    text: O «gobernadores provinciales» o «sátrapas».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבַד
  english_pob_choice: besides
  chosen_spanish: excepto
  alternatives_spanish:
  - además de
  - aparte de
  lexicon: HALOT
  rationale: El hebreo introduce una suma o excepción respecto del total previo. En español, «excepto» comunica con claridad que esto queda fuera de la cifra mencionada, sin sonar forzado.
- source_word: מֵאַנְשֵׁי הַתָּרִים
  english_pob_choice: what came from the traveling merchants
  chosen_spanish: lo que provenía de los mercaderes itinerantes
  alternatives_spanish:
  - lo que provenía de los hombres que viajaban
  - lo que provenía de los comerciantes itinerantes
  lexicon: HALOT
  rationale: La expresión hebrea es difícil. Siguiendo el valor contextual propuesto por la POB inglesa, se evita una traducción demasiado literal de «los hombres que viajaban» y se conserva la idea de un ingreso procedente de comerciantes que andaban de lugar en lugar.
- source_word: וּמִסְחַר
  english_pob_choice: and from the trade of
  chosen_spanish: y del comercio de
  alternatives_spanish:
  - y de la mercancía de
  - y del tráfico comercial de
  lexicon: HALOT
  rationale: מִסְחַר apunta al comercio/actividad mercantil. «Comercio» es natural en español y mantiene el valor económico del sustantivo.
- source_word: הָרֹכְלִים
  english_pob_choice: the merchants
  chosen_spanish: los mercaderes
  alternatives_spanish:
  - los comerciantes
  - los vendedores ambulantes
  lexicon: HALOT
  rationale: En este contexto real y económico, «mercaderes» conserva el sentido de personas dedicadas al intercambio comercial. «Comerciantes» sería posible, pero «mercaderes» enlaza bien con el sustantivo «comercio».
- source_word: וְכָל מַלְכֵי הָעֶרֶב
  english_pob_choice: and from all the kings of Arabia
  chosen_spanish: y de todos los reyes de Arabia
  alternatives_spanish:
  - y de todos los reyes de los árabes
  - y de todos los reyes de los pueblos mezclados
  lexicon: HALOT
  rationale: Aquí se sigue la lectura geográfica que la POB inglesa considera más probable. «Arabia» es clara en español moderno y evita una paráfrasis étnica menos precisa.
- source_word: וּפַחוֹת הָאָרֶץ
  english_pob_choice: and the governors of the land
  chosen_spanish: y de los gobernadores de la tierra
  alternatives_spanish:
  - y de los gobernadores provinciales de la tierra
  - y de los sátrapas de la tierra
  lexicon: HALOT
  rationale: פַּחוֹת se refiere a funcionarios regionales o gobernadores. «Gobernadores de la tierra» reproduce bien el alcance general del hebreo; «sátrapas» sería más específico de un marco persa que no se impone aquí.
theological_decisions:
- issue: Valor de עֶרֶב
  english_pob_reading: Arabia rather than 'mixed peoples'
  chosen_spanish_reading: Arabia
  alternative_spanish_readings:
  - pueblos mezclados
  - árabes
  rationale: No se adopta la acepción minoritaria de «mezcla» porque el contexto de una lista geopolítica favorece un referente territorial. La forma «Arabia» coincide con la decisión auditada en inglés y evita oscurecer el texto.
  doctrine_reference: none
translation_notes:
  revision_awareness: La redacción sigue el pasaje con alta concordancia respecto del informe inglés auditado. Se resolvió la dificultad de מֵאַנְשֵׁי הַתָּרִים con una formulación española natural que conserva la idea de ingreso procedente de mercaderes itinerantes. No se introdujeron cambios textuales sustantivos frente al juicio revisado como 'unchanged'.
  spanish_consistency_notes:
  - Se mantiene «Arabia» en lugar de una traducción étnica más amplia para preservar la decisión geográfica documentada.
  - «Gobernadores» se usa de forma general y no como «sátrapas», siguiendo el nivel de especificidad del inglés auditado.
  - Las marcas de nota siguen el orden del texto, con [a] anclado en la frase difícil y [c][b] en el cierre conforme al inglés auditado.
