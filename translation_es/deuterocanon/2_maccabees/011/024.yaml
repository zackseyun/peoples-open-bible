translation:
  language: es
  text: Habiendo oído que los judíos no aprobaban el cambio de mi padre hacia las costumbres griegas[a], sino que elegían su propio modo de vida y pedían que se les permitieran sus costumbres legítimas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el cambio de mi padre a las costumbres griegas». La expresión griega alude a una helenización de prácticas, no necesariamente solo del idioma.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκηκοότες
  english_pob_choice: Having heard
  chosen_spanish: Habiendo oído
  alternatives_spanish:
  - Después de haber oído
  - Puesto que habían oído
  lexicon: LSJ
  rationale: El participio perfecto se mantiene como marco circunstancial de la acción principal. «Habiendo oído» conserva la relación participial, el tono formal y la prioridad temporal sin añadir interpretación.
- source_word: μὴ συνεὐδοκοῦντας
  english_pob_choice: did not approve
  chosen_spanish: no aprobaban
  alternatives_spanish:
  - no estaban de acuerdo con
  - no consentían en
  lexicon: LSJ
  rationale: συνευδοκέω expresa aprobación o asentimiento; «no aprobaban» es natural en español y retiene la fuerza evaluativa del verbo sin volverlo demasiado técnico.
- source_word: τῇ τοῦ πατρὸς εἰς τὰ Ἑλληνικὰ μεταθέσει
  english_pob_choice: my father's change to Greek ways
  chosen_spanish: el cambio de mi padre hacia las costumbres griegas
  alternatives_spanish:
  - la transición de mi padre a las costumbres griegas
  - el cambio instituido por mi padre hacia prácticas griegas
  lexicon: LSJ
  rationale: μετάθεσις indica cambio o traslado, y εἰς τὰ Ἑλληνικά apunta a una helenización cultural, no solo lingüística. «Costumbres griegas» comunica mejor ese giro cultural en español que una referencia exclusiva al idioma.
- source_word: τὴν ἑαυτῶν ἀγωγήν
  english_pob_choice: their own way of life
  chosen_spanish: su propia manera de vivir
  alternatives_spanish:
  - su propia conducta
  - su propio modo de vida
  lexicon: LSJ
  rationale: ἀγωγή puede referirse a modo de vida, conducta o formación. «Manera de vivir» expresa con naturalidad el sentido comunitario y práctico del contexto.
- source_word: αἱρετίζοντας
  english_pob_choice: were choosing
  chosen_spanish: elegían
  alternatives_spanish:
  - preferían
  - adoptaban por elección
  lexicon: LSJ
  rationale: El participio expresa preferencia deliberada. «Elegían» preserva la idea de una decisión voluntaria y continúa la frase con fluidez en español.
- source_word: ἀξιοῦν
  english_pob_choice: asking that
  chosen_spanish: pedían que
  alternatives_spanish:
  - solicitando que
  - reclamando que
  lexicon: LSJ
  rationale: En este contexto ἀξιόω funciona como petición o demanda. «Pedían que» mantiene la relación sintáctica con el infinitivo siguiente y evita introducir una idea de derecho más fuerte de la que el griego exige aquí.
- source_word: συγχωρηθῆναι αὐτοῖς τὰ νόμιμα
  english_pob_choice: their lawful customs be permitted to them
  chosen_spanish: se les permitieran sus normas legítimas
  alternatives_spanish:
  - se les concedieran sus costumbres legítimas
  - se les permitiera observar sus preceptos legales
  lexicon: LSJ
  rationale: τὰ νόμιμα puede significar lo legal, lo debido o las prácticas normativas/consuetudinarias. «Normas legítimas» conserva el matiz de validez legal y normativo sin fijarlo demasiado en «leyes» o «costumbres», que podrían estrechar innecesariamente el sentido.
theological_decisions:
- issue: εἰς τὰ Ἑλληνικά como helenización cultural, no meramente lingüística
  english_pob_reading: cultural Hellenization ('Greek ways')
  chosen_spanish_reading: cambio hacia las costumbres griegas
  alternative_spanish_readings:
  - cambio al idioma griego
  - cambio a las costumbres griegas
  rationale: El contexto de 2 Macabeos contrasta la helenización con las prácticas judías ancestrales y con τὰ νόμιμα. Por eso la traducción debe reflejar un giro cultural y religioso, no solo lingüístico.
  doctrine_reference: 'Principio POB: primacía del texto original y consistencia léxica con el contexto inmediato, evitando reducir una tensión histórica a una sola esfera semántica.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del contexto inglés, que prefirió un tono formal y natural para la petición final («be permitted to them»). En español se reflejó esa naturalidad con «se les permitieran», manteniendo el valor pasivo de συγχωρηθῆναι αὐτοῖς τὰ νόμιμα y la referencia cultural a la helenización.
  spanish_consistency_notes:
  - Se usó «judíos» para τοὺς Ἰουδαίους, en forma neutral y consistente con el uso bíblico contextual.
  - «Costumbres griegas» se mantuvo en la línea del audit trail inglés para preservar la tensión entre cultura y ley ancestral.
  - «Normas legítimas» evita reducir τὰ νόμιμα únicamente a «leyes» y preserva su rango de observancias autorizadas o debidas.
  - El texto conserva un registro formal y publicable, sin calcar innecesariamente el inglés.
