lexical_decisions:
- source_word: Χαλὲβ
  english_pob_choice: Caleb
  chosen_spanish: Caleb
  alternatives_spanish:
  - Caleb
  lexicon: nombre propio
  rationale: Nombre propio bíblico transliterado de forma estándar; no requiere adaptación semántica.
- source_word: ἐν τῷ ἐπιμαρτυρῆσαι
  english_pob_choice: when he testified
  chosen_spanish: cuando dio testimonio
  alternatives_spanish:
  - cuando testificó
  - al dar testimonio
  - en testimoniar
  lexicon: LSJ
  rationale: El infinitivo articular con ἐν expresa circunstancia temporal; en español, «cuando dio testimonio» conserva la relación temporal y el matiz de dar testimonio sin sonar forzado. «Testificó» sería igualmente posible, pero «dio testimonio» es más natural en español bíblico contemporáneo.
- source_word: τῇ ἐκκλησίᾳ
  english_pob_choice: before the assembly
  chosen_spanish: ante la asamblea
  alternatives_spanish:
  - delante de la asamblea
  - frente a la asamblea
  - ante la congregación
  lexicon: LSJ
  rationale: Aquí ἐκκλησία designa la asamblea reunida de Israel, no la iglesia cristiana. «Ante la asamblea» refleja bien el sentido relacional del dativo con ἐπιμαρτυρῆσαι y la revisión inglesa que prefirió «before the assembly».
- source_word: ἔλαβε
  english_pob_choice: received
  chosen_spanish: recibió
  alternatives_spanish:
  - obtuvo
  - tomó
  - adquirió
  lexicon: LSJ
  rationale: λάβω en este contexto de herencia expresa llegar a poseer por asignación; «recibió» mantiene la pasividad relativa y el matiz de concesión hereditaria mejor que «tomó».
- source_word: γῆν
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - la región
  - el territorio
  lexicon: LSJ
  rationale: En español bíblico, «la tierra» comunica naturalmente el territorio heredado por Caleb. Evita añadir «prometida» o «territorio», que serían más explícitos de lo que exige el griego.
- source_word: κληρονομίαν
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - por herencia
  - en herencia
  - como patrimonio
  lexicon: LSJ
  rationale: «Como herencia» conserva la idea de posesión heredada sin forzar una perífrasis más pesada. Mantiene el valor de κληρονομίαν como bien recibido por asignación.
theological_decisions:
- issue: Sentido de ἐκκλησία en contexto israelita precristiano
  english_pob_reading: assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - congregación
  - iglesia
  rationale: El pasaje alude a la comunidad reunida de Israel en el trasfondo de Caleb; «asamblea» evita el anacronismo de «iglesia» y conserva el sentido histórico original.
  doctrine_reference: 'DOCTRINE.md: traducir según el sentido llano del texto fuente; evitar terminología tradicional cuando oscurece el referente histórico.'
- issue: Relación entre el testimonio de Caleb y la recepción de la herencia
  english_pob_reading: when he testified before the assembly, received the land as an inheritance
  chosen_spanish_reading: cuando dio testimonio ante la asamblea, recibió la tierra como herencia
  alternative_spanish_readings:
  - cuando testificó ante la asamblea, recibió la tierra como herencia
  - al dar testimonio ante la asamblea, recibió la tierra como herencia
  rationale: La formulación mantiene la secuencia causal/circunstancial del griego sin convertirla en una afirmación más interpretativa. «Ante la asamblea» preserva el carácter público del testimonio.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones léxicas cuando el texto las tiene; no homogeneizar con lenguaje eclesiástico posterior.'
translation_notes:
  revision_awareness: La revisión inglesa corrigió «in the assembly» por «before the assembly» para ajustar mejor τῇ ἐκκλησίᾳ con ἐπιμαρτυρῆσαι. La versión española sigue esa precisión con «ante la asamblea», manteniendo el valor circunstancial de la construcción griega y la lectura histórica de ἐκκλησία.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo no contiene el tetragrámaton ni κύριος.
  - Se mantiene «asamblea» para ἐκκλησία, conforme al contexto judío precristiano.
  - «Herencia» traduce κληρονομίαν con un valor claro y no litúrgico.
  - El nombre propio permanece sin traducción doctrinal o devocional adicional.
