translation:
  text: And she called Jacob before Esau’s eyes and instructed him according to the
    words that she had spoken with Esau. And he said, “I will do your pleasure. Trust
    me that no evil may come out from me or from my children against Esau, and I will
    not be first in anything except in love.”
