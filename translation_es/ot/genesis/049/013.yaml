base_translation:
  language: en
  yaml_path: translation/ot/genesis/049/013.yaml
  text: Zebulun will dwell by the shore of the seas[a]; he will be by the shore of ships[c][b], and his flank will be toward Sidon.
  footnotes:
  - marker: a
    text: Or 'at a haven for ships.' The Hebrew more literally says 'by the shore of ships.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his side,' 'his border,' or 'his farthest reaches will be toward Sidon.' The Hebrew term can denote a side, flank, or extremity in a geographic sense.
    reason: lexical_alternative
  - marker: c
    text: '''The seas'' translates a Hebrew plural; some English versions render it idiomatically as singular, ''the sea.'''
    reason: lexical_alternative
