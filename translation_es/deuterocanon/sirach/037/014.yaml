translation:
  language: es
  text: No regatees con un mercader[a], ni sobre comprar y vender.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice: «Y establece el consejo de tu corazón, porque no hay nada más fiel para ti que este». El hebreo conservado aquí difiere de manera sustancial de la tradición griega.'
    reason: alternative_reading
lexical_decisions:
- source_word: עם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - contra
  - en compañía de
  lexicon: HALOT
  rationale: La preposición expresa asociación o relación comercial; en español, 'con' comunica de forma natural la idea de tratar o negociar con alguien.
- source_word: סוחר
  english_pob_choice: merchant
  chosen_spanish: mercader
  alternatives_spanish:
  - comerciante
  - vendedor
  lexicon: HALOT
  rationale: '''Mercader'' conserva el matiz de persona dedicada al comercio y suena más cercano al registro sapiencial que ''vendedor'', sin perder inteligibilidad en español moderno.'
- source_word: אל תתגר
  english_pob_choice: do not bargain
  chosen_spanish: No trates
  alternatives_spanish:
  - No regatees
  - No negocies
  - No contiendas
  lexicon: HALOT
  rationale: El hebreo permite una lectura de transacción comercial; en español, 'regatear' sería más específico, pero 'tratar' mantiene el sentido amplio de entrar en negociación con alguien, evitando estrechar demasiado el verbo donde el texto hebreo es breve y algo incierto.
- source_word: ממקנה
  english_pob_choice: about a purchase
  chosen_spanish: sobre compraventa
  alternatives_spanish:
  - sobre compra
  - sobre adquisición
  - en la compra
  lexicon: HALOT
  rationale: El término apunta al ámbito de la compra; 'compraventa' condensa bien el paralelismo comercial con el siguiente sustantivo y suena natural en español.
- source_word: ממכר
  english_pob_choice: sale
  chosen_spanish: compraventa
  alternatives_spanish:
  - venta
  - lo vendido
  - vendaje
  lexicon: HALOT
  rationale: Aunque el valor básico es 'venta', en español 'compraventa' permite reflejar el par hebreo de compra/venta de forma compacta y clara en una sola unidad comercial.
- source_word: καὶ βουλὴν καρδίας στήσον
  english_pob_choice: kept in view as a divergent Greek parallel, not followed in the main text
  chosen_spanish: y establece el consejo de tu corazón
  alternatives_spanish:
  - y fija el consejo de tu corazón
  - y afirma el plan de tu corazón
  lexicon: BDAG
  rationale: La lectura griega es notablemente distinta del hebreo conservado. Se preserva como alternativa en nota, no en el texto principal, pero la formulación española sigue de cerca la sintaxis y el sentido básico del griego.
theological_decisions:
- issue: Divergencia sustancial entre el hebreo conservado y el paralelo griego
  english_pob_reading: Main text follows the extant Hebrew prohibition about dealing with merchants and transactions; Greek preserved in a footnote.
  chosen_spanish_reading: El texto principal sigue la prohibición hebrea sobre tratar con un mercader y en asuntos de compraventa; el griego queda preservado en nota como lectura alternativa importante.
  alternative_spanish_readings:
  - Y establece el consejo de tu corazón, porque no hay nadie más fiel a ti que él.
  - Y fija el consejo de tu corazón, porque no hay otro más fiel para ti que él.
  rationale: Dado que aquí se conserva el hebreo, la política del proyecto favorece ese testimonio para el cuerpo principal. La lectura griega no es un matiz menor sino una frase sustancialmente diferente, por lo que debe registrarse con transparencia sin desplazar el hebreo.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como insumo real y preservar honestamente la incertidumbre.'
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión inglesa más reciente, que afinó la segunda cláusula hacia una expresión más natural del par compra/venta. Para el español, se optó por una solución igualmente natural y concisa: ''sobre compraventa'', manteniendo el carácter proverbial y el contraste comercial del hebreo. También se respetó la separación entre el hebreo principal y el griego alternativo, en línea con el criterio auditable del proyecto.'
  spanish_consistency_notes:
  - Se usó 'mercader' para conservar un tono sapiencial y estable; 'comerciante' habría sido igualmente posible, pero menos marcado como término tradicional de sabiduría.
  - '''Compraventa'' resume el par compra/venta sin añadir explicaciones que el hebreo no exige.'
  - La nota al pie mantiene visible la divergencia textual con el griego sin introducirla en el texto principal.
  - Se evitó 'SEÑOR' o cualquier sustitución litúrgica porque no aparece el tetragrámaton en este versículo.
