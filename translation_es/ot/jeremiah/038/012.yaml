translation:
  language: es
  text: 'Entonces Ebed-melec, el cusita[a], dijo a Jeremías: «Por favor, pon estos trapos desgastados y ropa rasgada[b] debajo de tus axilas[c], debajo de las cuerdas». Y Jeremías hizo así.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el etíope'. El hebreo dice 'el cusita', es decir, un hombre de Cush.
    reason: lexical_alternative
  - marker: b
    text: Los términos hebreos para estos materiales son raros y probablemente se refieren a piezas de tela gastadas usadas como acolchado entre el cuerpo de Jeremías y las cuerdas.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'debajo de las articulaciones de tus manos/brazos'; aquí se refiere a la zona bajo los brazos donde las cuerdas le presionarían al levantarlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶבֶד מֶלֶךְ
  english_pob_choice: Ebed-melech
  chosen_spanish: Ebed-melec
  alternatives_spanish:
  - Ebed-melech
  lexicon: nombre propio transliterado
  rationale: Se conserva el nombre propio por transliteración, como en el testimonio inglés. Ajusto la grafía final a la ortografía española más natural, sin traducirlo como 'siervo del rey'.
- source_word: הַכּוּשִׁי
  english_pob_choice: the Cushite
  chosen_spanish: el cusita
  alternatives_spanish:
  - el cusi
  - el etíope
  lexicon: término etnogeográfico
  rationale: '''Cusita'' sigue más de cerca el hebreo כּוּשִׁי y evita sustituirlo por ''etíope'', que es una equivalencia más interpretativa. Mantiene la referencia étnico-geográfica del original.'
- source_word: שִׂים נָא
  english_pob_choice: Please put
  chosen_spanish: Por favor, pon
  alternatives_spanish:
  - Pon, por favor
  - Te ruego que pongas
  lexicon: imperativo + partícula de súplica
  rationale: La combinación imperativa con נָא pide una petición cortés; 'Por favor, pon' expresa bien esa fuerza en español moderno.
- source_word: בְּלוֹאֵי הַסְּחָבוֹת וְהַמְּלָחִים
  english_pob_choice: worn-out rags and torn clothes
  chosen_spanish: estos trapos desgastados y ropa rasgada
  alternatives_spanish:
  - estos trapos viejos y ropa rasgada
  - estos harapos desgastados y ropa rasgada
  lexicon: dos términos raros de material textil
  rationale: Los dos sustantivos hebreos son raros y designan material textil usado para acolchar. 'Trapos desgastados' y 'ropa rasgada' conserva la idea de textiles deteriorados sin forzar una precisión inexistente. Evito reducir ambos a un solo concepto.
- source_word: תַּחַת אַצִּלוֹת יָדֶיךָ
  english_pob_choice: under your armpits
  chosen_spanish: debajo de tus axilas
  alternatives_spanish:
  - debajo de tus sobacos
  - debajo de tus brazos
  - debajo de las articulaciones de tus brazos
  lexicon: expresión corporal idiomática
  rationale: '''Axilas'' comunica de forma natural el lugar donde las cuerdas presionan. La nota preserva que el hebreo dice literalmente algo como ''debajo de las articulaciones de tus manos/brazos''.'
- source_word: מִתַּחַת לַחֲבָלִים
  english_pob_choice: under the ropes
  chosen_spanish: debajo de las cuerdas
  alternatives_spanish:
  - bajo las cuerdas
  - entre las cuerdas y tu cuerpo
  lexicon: preposición de colocación
  rationale: '''Debajo de las cuerdas'' mantiene la imagen espacial y la función de acolchado entre el cuerpo y las cuerdas, en paralelo con el inglés auditado.'
- source_word: וַיַּעַשׂ יִרְמְיָהוּ כֵּן
  english_pob_choice: And Jeremiah did so
  chosen_spanish: Y Jeremías hizo así
  alternatives_spanish:
  - Y Jeremías lo hizo
  - Y Jeremías obedeció así
  lexicon: fórmula narrativa
  rationale: La fórmula hebrea de cumplimiento narrativo se conserva con un español natural. 'Hizo así' reproduce el giro clásico sin añadir matices no presentes.
theological_decisions:
- issue: Etnónimo de כּוּשִׁי y posible equivalencia tradicional
  english_pob_reading: the Cushite, referring to a man from Cush
  chosen_spanish_reading: el cusita
  alternative_spanish_readings:
  - el etíope
  rationale: La elección evita una domesticación histórica innecesaria. 'Cusita' mantiene la relación con Cush y deja visible la referencia bíblica original sin imponer el equivalente tradicional 'etíope'.
  doctrine_reference: Ninguna doctrina en disputa; decisión etnogeográfica y de transparencia textual.
- issue: Ubicación corporal expresada por אַצִּילוֹת יָדֶיךָ
  english_pob_reading: literally 'under the joints of your hands/arms'; the sense here is the area under the arms where the ropes would press during lifting
  chosen_spanish_reading: debajo de tus axilas
  alternative_spanish_readings:
  - debajo de las articulaciones de tus brazos
  - debajo de tus brazos
  rationale: 'Se preserva el sentido contextual del POB: la zona bajo los brazos donde las cuerdas hacen presión. ''Axilas'' es la forma más natural y clara para el lector español, mientras la nota conserva la literalidad hebrea.'
  doctrine_reference: No aplica; decisión léxica contextual.
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó de ''scraps'' a ''torn clothes'' para reflejar mejor el par hebreo de materiales textiles usados como acolchado. La versión española refleja esa revisión con dos elementos coordinados: ''trapos desgastados y ropa rasgada'', manteniendo naturalidad y transparencia. También se preservó la equivalencia auditada de ''under your armpits'' y ''under the ropes'' con una formulación española idiomática.'
  spanish_consistency_notes:
  - Se mantiene transliteración del nombre propio, no traducción funcional.
  - '''Cusita'' se usa de modo consistente con el hebreo כּוּשִׁי; no se sustituye por ''etíope'' en el texto principal.'
  - '''Axilas'' comunica la imagen corporal sin borrar la nota literal del hebreo.'
  - '''Cuerdas'' traduce חֲבָלִים de manera simple y coherente con el contexto de la escena.'
  - La fórmula final 'Y Jeremías hizo así' conserva la clausula narrativa de cumplimiento sin expansión interpretativa.
