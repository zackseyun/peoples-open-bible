revisions:
- from: 'Porque así ha dicho el Señor Yahvé, el Santo de Israel: “En volver[a] y en reposo[b] seréis salvos[c]; en quietud y en confianza estará vuestra fuerza”. Pero no quisisteis.'
  to: 'Porque así dice el Señor Yahvé, el Santo de Israel: «En volver[a] y reposo seréis salvos[b]; en quietud y confianza será vuestra fuerza». Pero no quisisteis.'
  rationale: Se ajusta el tiempo verbal introductorio a una fórmula profética más natural en español ('dice'); se corrige 'estará vuestra fuerza' a 'será vuestra fuerza' por mayor fidelidad al hebreo y mejor estilo; se elimina la nota innecesaria sobre 'reposo' para alinearse con el rastro auditado; y se pule la puntuación. Se conserva 'el Señor Yahvé' por la política del proyecto de no ocultar el nombre divino y se mantienen las dos notas realmente justificadas por el expediente inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:28:45Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo y sigue de cerca las decisiones del POB inglés: mantiene el doble título divino, el título ''el Santo de Israel'', la amplitud de ''volver'', la tensión de ''seréis salvos'' y el contraste final de rechazo. Sin embargo, hay varios ajustes necesarios para una mejor fidelidad y español natural.'
  spanish_quality_summary: 'El texto es comprensible, pero contiene giros poco naturales o menos fieles para español bíblico actual: ''ha dicho'' suena menos directo que ''dice''; ''En volver'' es torpe frente a ''En volver a mí'' o mejor ''En volver'' si se preserva la literalidad, pero puede mejorarse sin perder el sentido; ''estará vuestra fuerza'' es menos natural que ''estará su fuerza'' y, sobre todo, el hebreo pide ''será vuestra fuerza''. Además, el cierre ''Pero no quisisteis'' es aceptable, pero ''pero no quisieron'' no aplica; la segunda persona plural debe mantenerse. Conviene también eliminar una nota innecesaria sobre ''reposo'' que no está en el rastro inglés y no resuelve una ambigüedad nueva en español.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: ''Yahvé'' preserva יהוה visiblemente; ''el Santo de Israel'' es correcto; ''salvos'' mantiene la amplitud de ישׁע. No obstante, para אֲדֹנָי יְהוִה conviene ''el Señor Yahvé'' o ''el Señor DIOS''; dado el glosario del proyecto en español, ''Yahvé'' es defendible y debe conservarse. La nota sobre בְּשׁוּבָה debe mantenerse; la de תִּוָּשֵׁעוּן también. La nota sobre וָנַחַת no es necesaria.'
  issues:
  - severity: medium
    issue: Uso de 'ha dicho' en vez de presente discursivo más natural
    rationale: Aunque no es incorrecto, 'Porque así dice' representa mejor la fórmula profética כִּי כֹה אָמַר en español bíblico natural y evita un matiz de pasado cerrado que no es necesario aquí.
  - severity: medium
    issue: '''Estará vuestra fuerza'' no refleja bien תִּהְיֶה גְּבוּרַתְכֶם'
    rationale: 'El hebreo expresa una relación copulativa sencilla: ''será vuestra fuerza''. ''Estará'' suena menos natural y puede sugerir localización o presencia más que identificación/predicación.'
  - severity: low
    issue: Nota b sobre 'reposo' es innecesaria
    rationale: El POB inglés no preservó una nota para וָנַחַת, y 'reposo' no crea una ambigüedad nueva en español que requiera aclaración. Añadirla sobrecarga el verso sin beneficio claro.
  - severity: low
    issue: Puntuación final dentro de la cita
    rationale: En español es más natural colocar el punto tras la cita antes de la cláusula adversativa externa, o bien cerrar la cita con punto interno solo si forma parte íntegra de la declaración. Aquí conviene una puntuación más fluida con dos puntos y cierre de cita antes de 'pero'.
  revised_spanish_text: 'Porque así dice el Señor Yahvé, el Santo de Israel: «En volver[a] y reposo seréis salvos[b]; en quietud y confianza será vuestra fuerza». Pero no quisisteis.'
  revised_footnotes:
  - marker: a
    text: O «en arrepentimiento»; el hebreo dice más literalmente «en volver», lo cual puede incluir arrepentimiento y regreso a Dios.
    reason: lexical_alternative
  - marker: b
    text: O «seréis librados».
    reason: alternative_reading
  revision_rationale: Se ajusta el tiempo verbal introductorio a una fórmula profética más natural en español ('dice'); se corrige 'estará vuestra fuerza' a 'será vuestra fuerza' por mayor fidelidad al hebreo y mejor estilo; se elimina la nota innecesaria sobre 'reposo' para alinearse con el rastro auditado; y se pule la puntuación. Se conserva 'el Señor Yahvé' por la política del proyecto de no ocultar el nombre divino y se mantienen las dos notas realmente justificadas por el expediente inglés.
