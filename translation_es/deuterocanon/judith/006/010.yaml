translation:
  language: es
  text: Y Holofernes ordenó a sus esclavos, que estaban junto a él en su tienda, que capturaran a Ajior y lo llevaran de vuelta a Betyloua[a] y lo entregaran en manos de los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Bethulia» es la forma tradicional en español; el texto sigue la transliteración griega Betyloua.
    reason: lexical_alternative
  - marker: b
    text: La expresión «los hijos de Israel» reproduce de manera literal el giro griego y se refiere corporativamente al pueblo de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέταξεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio orden de
  lexicon: LSJ
  rationale: El aoristo de προστάσσω expresa una orden con autoridad. «Ordenó» conserva esa fuerza en español moderno y es natural en narrativa histórica.
- source_word: τοῖς δούλοις
  english_pob_choice: his slaves
  chosen_spanish: a sus esclavos
  alternatives_spanish:
  - a sus siervos
  - a sus servidores
  lexicon: LSJ
  rationale: δοῦλοι designa condición de dependencia servil; la política del proyecto favorece «esclavos» cuando el estatus bondado es saliente. En este contexto militar y doméstico de Holofernes, «esclavos» es más fiel que suavizarlo como «siervos».
- source_word: παρεστηκότες
  english_pob_choice: standing by
  chosen_spanish: estaban de pie
  alternatives_spanish:
  - estaban presentes
  - asistían
  lexicon: LSJ
  rationale: El participio perfecto de παρίστημι indica presencia y disponibilidad junto a alguien. «Estaban de pie» conserva la imagen concreta del grupo en la tienda y evita perder el matiz de asistencia inmediata.
- source_word: σκηνῇ
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - carpa
  lexicon: LSJ
  rationale: En el escenario militar de Judit, σκηνή significa una tienda literal. «Tienda» es el equivalente usual y claro en español bíblico.
- source_word: συλλαβεῖν
  english_pob_choice: to seize
  chosen_spanish: aprehendieran
  alternatives_spanish:
  - arrestaran
  - capturaran
  - agarraran
  lexicon: LSJ
  rationale: El infinitivo expresa captura forzada. «Aprehendieran» transmite un acto coercitivo sin introducir necesariamente un procedimiento legal moderno; mantiene el sentido de tomar por la fuerza.
- source_word: ἀποκαταστῆσαι
  english_pob_choice: take him back
  chosen_spanish: lo llevaran de vuelta
  alternatives_spanish:
  - lo devolvieran
  - lo regresaran
  lexicon: LSJ
  rationale: Aunque literalmente puede sugerir «restaurar» o «restituir», aquí el sentido narrativo es regresar a Achior a Betyloua. «Lo llevaran de vuelta» refleja ese movimiento de retorno de manera natural.
- source_word: Βετυλουὰ
  english_pob_choice: Bethyloua
  chosen_spanish: Betyloua
  alternatives_spanish:
  - Bethulia
  lexicon: transliteration
  rationale: Se mantiene la transliteración cercana al griego de Swete. «Bethulia» queda como alternativa tradicional, pero el texto principal conserva la forma base del original griego.
- source_word: παραδοῦναι
  english_pob_choice: hand him over
  chosen_spanish: lo entregaran
  alternatives_spanish:
  - lo pusieran en manos de
  - lo entregaran a
  lexicon: LSJ
  rationale: El verbo implica transferir a alguien al poder de otro. «Lo entregaran» comunica claramente esa acción hostil de custodia o control.
- source_word: εἰς χεῖρας
  english_pob_choice: into the hands of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en poder de
  - a manos de
  lexicon: LSJ
  rationale: La locución es un modismo para indicar dominio o control. «En manos de» preserva la imagen bíblica habitual y funciona bien en español.
- source_word: υἱῶν Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: LSJ
  rationale: Se conserva la expresión filial masculina del griego. En español, «los hijos de Israel» mantiene la correspondencia formal y permite la referencia corporativa al pueblo de Israel sin neutralizarla.
theological_decisions:
- issue: δοῦλοι y la carga social del término
  english_pob_reading: his slaves
  chosen_spanish_reading: a sus esclavos
  alternative_spanish_readings:
  - a sus siervos
  - a sus servidores
  rationale: La revisión del inglés pasó por «servants», pero el audit trail restablece «slaves» por coherencia doctrinal con δοῦλος cuando el estado de dependencia es relevante. En español, «esclavos» conserva esa fuerza social y evita borrar la relación de subordinación.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
- issue: υἱῶν Ἰσραήλ como expresión corporativa masculina
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: El griego usa la forma masculina υἱῶν. Se mantiene la correspondencia formal en español sin convertirla en una denominación neutra que borre el dato léxico del original, aunque la referencia siga siendo corporativa.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4'
translation_notes:
  revision_awareness: El paquete de auditoría registra una oscilación en inglés entre «slaves» y «servants», con corrección posterior para restaurar «slaves» conforme a la política doctrinal sobre δοῦλος. La presente traducción sigue la lectura restaurada y mantiene la transliteración griega de Βετυλουὰ, preservando además el sentido corporativo de υἱῶν Ἰσραήλ.
  spanish_consistency_notes:
  - Se mantiene «Betyloua» en el cuerpo y se aclara en nota la alternativa tradicional «Bethulia».
  - Se conserva la forma plural masculina «los hijos de Israel» por correspondencia con el griego.
  - «Esclavos» se usa de modo consistente con la política del proyecto para δοῦλος en contextos donde la subordinación es saliente.
