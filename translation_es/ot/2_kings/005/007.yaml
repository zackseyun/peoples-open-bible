revisions:
- from: 'Y aconteció que, cuando el rey de Israel leyó la carta[a], rasgó sus vestidos y dijo: «¿Acaso soy yo Dios, para matar y dar vida, para que este hombre me envíe a quitarle a un hombre su lepra? Solo[b], por favor, reconozcan y vean que me busca pleito conmigo».'
  to: 'Y aconteció que, cuando el rey de Israel leyó la carta[a], rasgó sus vestidos y dijo: «¿Acaso soy yo Dios, para matar y dar vida, para que este hombre me envíe a curar a un hombre de su lepra? Solo, por favor[b], dense cuenta y vean que busca pleito conmigo».'
  rationale: 'La revisión corrige dos problemas reales del borrador: reemplaza la expresión poco natural «a quitarle a un hombre su lepra» por «a curar a un hombre de su lepra», que refleja mejor el hebreo idiomático y la auditoría inglesa; y corrige «me busca pleito conmigo» a «busca pleito conmigo», que es la locución española correcta. También se mueve la nota [b] a «por favor», donde corresponde por la presencia de נָא y siguiendo el anclaje de la auditoría inglesa.'
