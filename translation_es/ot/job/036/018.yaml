    reason: lexical_alternative
  - marker: b
    text: O ‘un rescate grande’; el hebreo puede entenderse con ‘grande’ calificando directamente a ‘rescate’.
    reason: alternative_reading
  - marker: c
    text: ‘Rescate’ también puede entenderse como ‘precio de expiación’ o, en algunos contextos, ‘soborno’.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota léxica para que corresponda al término difícil בְסָפֶק, no a ‘ira’. También se mejora la naturalidad de la construcción verbal con ‘te incite al escarnio’, que refleja mejor el sentido de advertencia del hebreo y la decisión inglesa ‘entice you into scoffing’, manteniendo el resto del contenido y las tensiones léxicas documentadas.
