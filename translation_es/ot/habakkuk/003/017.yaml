base_translation:
  language: en
  yaml_path: translation/ot/habakkuk/003/017.yaml
  text: Though the fig tree does not blossom[a], and there is no produce on the vines; the yield of the olive fails, and the fields produce no food; the flock is cut off from the fold, and there is no herd in the stalls[b],
  footnotes:
  - marker: a
    text: Or 'For the fig tree does not blossom ...' The Hebrew opening particle can be read causally ('for') or concessively ('though'); the concessive sense fits the flow into the declaration of joy in the following verse.
    reason: alternative_reading
  - marker: b
    text: Literally, 'the work/product of the olive proves false,' an idiom meaning that the olive crop fails.
    reason: lexical_alternative
