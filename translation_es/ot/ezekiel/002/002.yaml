translation:
  language: es
  text: Y el Espíritu[a] entró en mí cuando me habló, y me puso en pie; y oí al que me hablaba[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un espíritu». El hebreo רוּחַ puede significar «espíritu», «viento» o «aliento»; aquí el contexto favorece entender el Espíritu de Dios que capacita a Ezequiel.'
    reason: alternative_reading
  - marker: b
    text: Literalmente, «oí al que me hablaba».
    reason: lexical_alternative
lexical_decisions:
- source_word: ר֗וּחַ
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - un espíritu
  - viento
  - aliento
  lexicon: HALOT
  rationale: En este contexto de llamado profético y habilitación, la lectura más coherente es la del Espíritu divino que entra en el profeta y lo fortalece. En español, el artículo definido ayuda a marcar ese referente específico, como en la decisión inglesa, sin añadir una glosa doctrinal ajena al pasaje.
- source_word: וַ/תָּ֧בֹא בִ֣/י
  english_pob_choice: entered into me
  chosen_spanish: entró en mí
  alternatives_spanish:
  - vino a mí
  - entró dentro de mí
  - vino dentro de mí
  lexicon: HALOT
  rationale: La combinación verbal con בִּי expresa movimiento hacia el interior; 'entró en mí' conserva el sentido de ingreso interno y de acción penetrante sin sonar forzado en español.
- source_word: כַּֽ/אֲשֶׁר֙ דִּבֶּ֣ר אֵלַ֔/י
  english_pob_choice: when he spoke to me
  chosen_spanish: cuando me habló
  alternatives_spanish:
  - mientras me hablaba
  - cuando hablaba conmigo
  lexicon: HALOT
  rationale: La cláusula marca el momento de la entrada del Espíritu. 'Cuando me habló' es natural en español y preserva el valor temporal de la construcción hebrea.
- source_word: וַ/תַּעֲמִדֵ֖/נִי עַל רַגְלָ֑/י
  english_pob_choice: set me on my feet
  chosen_spanish: me puso sobre mis pies
  alternatives_spanish:
  - me hizo ponerme de pie
  - me hizo estar de pie
  lexicon: HALOT
  rationale: El hifil de עמד tiene valor causativo. 'Me puso sobre mis pies' conserva esa idea de hacer que el profeta recobre firmeza corporal y se exprese de manera idiomática en español.
- source_word: וָ/אֶשְׁמַ֕ע
  english_pob_choice: I heard
  chosen_spanish: oí
  alternatives_spanish:
  - escuché
  - entonces oí
  lexicon: HALOT
  rationale: El wayyiqtol simple se expresa bien con pretérito perfecto simple en español. 'Oí' mantiene la secuencia narrativa sin introducir un adverbio que el hebreo no exige.
- source_word: אֵ֖ת מִדַּבֵּ֥ר אֵלָֽ/י
  english_pob_choice: the one speaking to me
  chosen_spanish: al que me hablaba
  alternatives_spanish:
  - al que estaba hablándome
  - a quien me hablaba
  lexicon: HALOT
  rationale: El participio sustantivado puede verterse naturalmente como 'el que me hablaba'. Se eligió 'al que me hablaba' para reflejar la función de objeto directo introducido por אֵת y conservar la relación personal y continua del habla.
theological_decisions:
- issue: Referente de רוּחַ en el contexto profético
  english_pob_reading: the Spirit as God's empowering Spirit
  chosen_spanish_reading: el Espíritu como el Espíritu de Dios que capacita a Ezequiel
  alternative_spanish_readings:
  - un espíritu
  - el aliento
  rationale: El entorno inmediato del llamamiento y la acción posterior de levantar al profeta favorecen entender רוּחַ como el Espíritu divino. La traducción principal lo expresa con 'el Espíritu' y la nota mantiene visible la alternativa 'un espíritu' para no borrar la ambigüedad léxica del hebreo.
  doctrine_reference: Ezequiel 2:1–2; filosofía de traducción POB, §§1 y 3
translation_notes:
  revision_awareness: Coincide con la revisión inglesa más reciente (sin cambios) y con el dictamen de alta concordancia; se conservó la lectura del Espíritu como la opción contextual principal, manteniendo visible la alternativa léxica del hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'Espíritu' con mayúscula para reflejar el referente divino decidido en el audit trail inglés.
  - '''Me puso sobre mis pies'' conserva la imagen corporal del hebreo sin reemplazarla por una paráfrasis más abstracta.'
  - No se añadió 'entonces' antes de 'oí' porque el encadenamiento verbal ya comunica la secuencia narrativa.
