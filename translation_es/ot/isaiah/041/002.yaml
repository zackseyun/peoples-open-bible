revisions:
- from: ¿Quién levantó[a] desde el oriente al que llama en justicia a sus pies? Entrega naciones delante de él y subyuga reyes; los entrega como polvo a su espada[b], como rastrojo arrastrado a su arco.
  to: ¿Quién suscitó del oriente a uno, llamándolo en justicia[a] a sus pies? Entrega naciones delante de él y subyuga reyes; los entrega como polvo a su espada[b], como rastrojo arrastrado a su arco.
  rationale: Se corrigió el anclaje de la nota léxica para que recaiga sobre «justicia», que es donde está la ambigüedad documentada en el hebreo צֶדֶק. También se cambió «levantó» por «suscitó» para reflejar mejor הֵעִיר en hifil. Se mantuvo el resto del verso casi intacto por su fidelidad general al expediente fuente e inglés.
