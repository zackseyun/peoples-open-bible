revisions:
- from: Explora las montañas como su pasto[a], y anda en busca de toda cosa verde[b].
  to: Explora las montañas como su pastura[a], y anda en busca de toda cosa verde[b].
  rationale: Se reemplaza «como su pasto» por «como su pastura» para reflejar mejor מִרְעֵהוּ como lugar de apacentamiento/pastoreo, sin introducir una comparación impropia. Se ajusta la nota a) para preservar más de cerca la alternativa inglesa documentada («ranges over ... for his grazing place»). Se mantiene «toda cosa verde» por cercanía formal al original y al inglés auditado, con nota aclaratoria para la legibilidad en español.
