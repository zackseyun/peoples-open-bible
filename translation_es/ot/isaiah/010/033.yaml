translation:
  language: es
  text: ¡Mira![a] El Señor, Yahvé de los ejércitos, está cortando las ramas con fuerza terrible; los altos en estatura son derribados[b], y los elevados son abatidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí». La partícula hebrea introduce atención solemne y vividez profética.
    reason: lexical_alternative
  - marker: b
    text: La imagen es la de cortar ramas y derribar árboles altos, símbolo de la caída de los exaltados.
    reason: cultural_note
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - Mira
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica introduce una escena profética con fuerza de llamado a atender. «¡Mira!» comunica esa vivacidad en un español natural; «He aquí» sería más solemne pero menos idiomático para lectores modernos.
- source_word: הָאָדוֹן יְהוָה צְבָאוֹת
  english_pob_choice: the Lord, Yahweh of Armies
  chosen_spanish: el Señor, Yahvé de los ejércitos
  alternatives_spanish:
  - el Señor, Yahvé de Armadas
  - el Señor, Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Se conserva la distinción entre הָאָדוֹן como título («el Señor») y יְהוָה como nombre divino («Yahvé»). צְבָאוֹת se vierte como «de los ejércitos» por transparencia y por concordancia con el audit trail inglés; «Armadas» sería menos claro en español.
- source_word: מְסָעֵף
  english_pob_choice: is lopping off
  chosen_spanish: está desgajando
  alternatives_spanish:
  - está cortando
  - está podando
  lexicon: HALOT
  rationale: El verbo conserva la imagen arbórea de cortar ramas. «Desgajando» expresa mejor la idea de arrancar o separar ramas con violencia que el más general «cortando»; «podando» suavizaría indebidamente el juicio.
- source_word: פֻּארָה
  english_pob_choice: the boughs
  chosen_spanish: las ramas
  alternatives_spanish:
  - las ramas principales
  - las ramas altas
  lexicon: HALOT
  rationale: El sustantivo apunta a crecimiento de rama/ramaje en la metáfora del árbol. «Las ramas» es la opción más directa y natural en español; «brazos» o equivalentes no están justificados por el contexto.
- source_word: בְמַעֲרָצָה
  english_pob_choice: with terrifying power
  chosen_spanish: con fuerza terrible
  alternatives_spanish:
  - con estrépito
  - con violencia
  - en terror
  lexicon: HALOT
  rationale: El término expresa violencia temible y efecto de espanto. «Con fuerza terrible» conserva tanto el modo enérgico como el tono de pavor; mantiene la ambigüedad entre fuerza, estrépito y terror sin resolverla de manera excesiva.
- source_word: רָמֵי הַקּוֹמָה
  english_pob_choice: the tall in stature
  chosen_spanish: los altos en estatura
  alternatives_spanish:
  - los altos de estatura
  - los altos de talla
  lexicon: HALOT
  rationale: La expresión es literalmente «los altos de/ en estatura» y mantiene la imagen física que también puede aludir a los soberbios. Se evita interpretarla directamente como «los orgullosos» para no borrar la metáfora.
- source_word: גְּדוּעִים
  english_pob_choice: are cut down
  chosen_spanish: son cortados
  alternatives_spanish:
  - son derribados
  - son hewnos
  lexicon: HALOT
  rationale: La forma pasiva/resultativa conserva la imagen del árbol abatido. «Son cortados» es natural y fiel; «son derribados» interpretaría más el efecto que la acción verbal.
- source_word: הַגְּבֹהִים
  english_pob_choice: the lofty
  chosen_spanish: los elevados
  alternatives_spanish:
  - los altos
  - los exaltados
  lexicon: HALOT
  rationale: «Los elevados» preserva la ambigüedad entre altura física y encumbramiento figurado. «Los exaltados» podría ser válido, pero explicita demasiado la lectura moral.
- source_word: יִשְׁפָּלוּ
  english_pob_choice: are brought low
  chosen_spanish: son abatidos
  alternatives_spanish:
  - serán humillados
  - son humillados
  - serán humillados y rebajados
  lexicon: HALOT
  rationale: El verbo significa hacerse o ser puesto en bajo estado. «Son abatidos» mantiene la pasiva y el paralelismo con «son cortados», además de conservar el matiz de humillación sin explicitarlo demasiado.
theological_decisions:
- issue: Cómo representar el nombre divino יְהוָה junto con el título הָאָדוֹן
  english_pob_reading: the Lord, Yahweh of Armies
  chosen_spanish_reading: el Señor, Yahvé de los ejércitos
  alternative_spanish_readings:
  - el Señor, el SEÑOR de los ejércitos
  - el Señor, Yahvé de Armadas
  rationale: El texto hebreo distingue el título con artículo de la forma del nombre divino. Se conserva esa distinción en español para no ocultar el doble encabezamiento y para reflejar el audit trail inglés, que ya optó por «Yahweh» como representación del Tetragrama.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Si la metáfora del árbol debe resolverse en juicio moral explícito
  english_pob_reading: Retain tree-cutting imagery while allowing implied judgment on the proud
  chosen_spanish_reading: Conservar la imagen arbórea y la humillación implícita
  alternative_spanish_readings:
  - Decir directamente «los soberbios son humillados» en el texto principal
  - Parafrasear toda la línea como juicio contra los orgullosos
  rationale: El hebreo presenta un cuadro de tala y abatimiento que sugiere juicio sobre los encumbrados, pero no lo explicita con una glosa moral. La traducción mantiene esa tensión, dejando que la metáfora diga lo que dice sin convertirla en una paráfrasis interpretativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue la revisión final del audit trail inglés, que sustituyó la segunda instancia de «LORD» por «Yahweh» para representar con más claridad el nombre divino en hebreo. No se adoptaron interpretaciones adicionales que apagaran la metáfora arbórea ni se añadió una glosa moral al texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene «Señor» para הָאָדוֹן, respetando la distinción entre título y nombre.
  - «Ejércitos» se conserva por transparencia y porque es la forma establecida en el paquete de origen inglés.
  - 'La sintaxis mantiene paralelismo poético en dos miembros: acción sobre las ramas / abatimiento de los altos.'
  - Las notas al pie preservan las alternativas léxicas documentadas sin multiplicar glosas innecesarias.
