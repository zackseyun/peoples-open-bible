id: COL.2.14
reference: Colossians 2:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐξαλείψας τὸ καθ’ ἡμῶν χειρόγραφον τοῖς δόγμασιν ὃ ἦν ὑπεναντίον ἡμῖν, καὶ αὐτὸ ἦρκεν ἐκ τοῦ μέσου προσηλώσας αὐτὸ τῷ σταυρῷ·
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/014.yaml
  text: having wiped out the record of debt against us in decrees, which was opposed to us, and he has taken it out of the way, having nailed it to the cross.
translation:
  language: ko
  text: 우리에게 불리한 규례들[a]로 된 빚 문서, 곧 우리를 대적하던 것을 지워 버리시고, 그것을 십자가에 못 박아 우리 가운데서 치워 버리셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「규례들 가운데 있는」, 「규례들로 구성된」. 헬라어는 빚 문서가 규례 또는 명령들로 구체화되었음을 가리킨다.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξαλείψας
  english_pob_choice: having wiped out
  chosen_korean: 지워 버리시고
  alternatives_korean:
  - 말소하시고
  - 도말하시고
  lexicon: BDAG
  rationale: 부정과거 분사. 문서를 「지워 버리다」가 한국어로 자연스럽다.
- source_word: χειρόγραφον
  english_pob_choice: record of debt
  chosen_korean: 빚 문서
  alternatives_korean:
  - 차용증
  - 채무 증서
  - 손으로 쓴 증서
  lexicon: BDAG
  rationale: 자필 채무 증서. 「빚 문서」가 한국어로 자연스럽고 의미를 잘 담는다.
- source_word: καθ’ ἡμῶν
  english_pob_choice: against us
  chosen_korean: 우리에게 불리한
  alternatives_korean:
  - 우리를 거스르는
  - 우리에 대한
  lexicon: BDAG
  rationale: 적대 방향을 「우리에게 불리한」으로 자연스럽게 표현.
- source_word: τοῖς δόγμασιν
  english_pob_choice: in decrees
  chosen_korean: 규례들로 된
  alternatives_korean:
  - 규례들 안에 있는
  - 명령들로 이루어진
  lexicon: BDAG
  rationale: 모호한 여격을 「규례들로 된」으로 옮겨 빚 문서의 구성 내용을 살린다. 모세 율법으로 좁히지 않는다.
- source_word: ὑπεναντίον ἡμῖν
  english_pob_choice: opposed to us
  chosen_korean: 우리를 대적하던 것
  alternatives_korean:
  - 우리에 적대적인 것
  lexicon: BDAG
  rationale: 「대적함」으로 적대적 입장을 살린다.
- source_word: ἦρκεν
  english_pob_choice: he has taken
  chosen_korean: 치워 버리셨습니다
  alternatives_korean:
  - 옮겨 가셨습니다
  - 제거하셨습니다
  lexicon: BDAG
  rationale: 완료 시제로 완결된 행위의 지속적 결과를 「치워 버리셨습니다」로 옮긴다.
- source_word: ἐκ τοῦ μέσου
  english_pob_choice: out of the way
  chosen_korean: 우리 가운데서
  alternatives_korean:
  - 가운데서
  - 사이에서
  lexicon: BDAG
  rationale: 「가운데서 치워 버리다」 관용으로 장애물 제거를 표현한다.
- source_word: προσηλώσας αὐτὸ τῷ σταυρῷ
  english_pob_choice: having nailed it to the cross
  chosen_korean: 그것을 십자가에 못 박아
  alternatives_korean:
  - 그것을 십자가에 박으심으로
  lexicon: BDAG
  rationale: 부정과거 분사로 수단·정황을 「~함으로」가 아니라 한국어 어순상 자연스러운 「~하여」로 옮긴다.
