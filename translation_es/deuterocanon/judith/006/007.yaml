translation:
  language: es
  text: y mis esclavos te llevarán de vuelta a la región montañosa y te pondrán en una de las ciudades de los pasos de montaña[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las ascensiones». El griego dice literalmente «ascensos», probablemente con el sentido de accesos o pasos que suben a la región montañosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνταποστήσουσίν
  english_pob_choice: will bring you back
  chosen_spanish: te llevarán de vuelta
  alternatives_spanish:
  - te devolverán
  - te harán volver
  - te traerán de vuelta
  lexicon: LSJ
  rationale: El verbo compuesto expresa retorno con movimiento dirigido; «llevarán de vuelta» comunica bien la acción física de reconducir a la persona, sin forzar un calco innecesario.
- source_word: οἱ δοῦλοί μου
  english_pob_choice: my slaves
  chosen_spanish: mis esclavos
  alternatives_spanish:
  - mis siervos
  - mis servidores
  - mis asistentes
  lexicon: BDAG
  rationale: Se mantiene la fuerza léxica de δοῦλος con «esclavos», como en la decisión auditada en inglés, porque el estatus subordinado es parte del sentido y no conviene suavizarlo sin base textual.
- source_word: εἰς τὴν ὀρεινὴν
  english_pob_choice: to the hill country
  chosen_spanish: a la región montañosa
  alternatives_spanish:
  - al país montañoso
  - a las montañas
  - a la zona alta
  lexicon: LSJ
  rationale: ὀρεινή designa una zona montañosa o de colinas; «región montañosa» es natural en español y conserva el valor geográfico.
- source_word: θήσουσίν σε
  english_pob_choice: place you
  chosen_spanish: te pondrán
  alternatives_spanish:
  - te colocarán
  - te situarán
  - te dejarán
  lexicon: BDAG
  rationale: τίθημι aquí tiene sentido de poner/colocar a alguien en un lugar concreto; «te pondrán» es directo y fiel, aunque algo más llano que «colocarán».
- source_word: ἐν μιᾷ τῶν πόλεων
  english_pob_choice: in one of the cities
  chosen_spanish: en una de las ciudades
  alternatives_spanish:
  - en una de las poblaciones
  - en una de las urbes
  lexicon: LSJ
  rationale: πόλις se traduce normalmente por «ciudad»; el plural genitivo queda bien reflejado con «una de las ciudades».
- source_word: τῶν ἀναβάσεων
  english_pob_choice: of the mountain passes
  chosen_spanish: de los pasos de montaña
  alternatives_spanish:
  - de las ascensiones
  - de los accesos montañosos
  - de las subidas
  lexicon: LSJ
  rationale: ἀνάβασις puede ser «ascenso», pero en topografía funciona como acceso ascendente o paso; «pasos de montaña» preserva la función geográfica mejor que una traducción más literal pero menos clara.
translation_notes:
  revision_awareness: El texto español sigue la lectura auditada del POB en cuanto a δοῦλοι = «esclavos», corrigiendo cualquier suavización posterior hacia «siervos». También conserva la alternativa topográfica documentada para ἀναβάσεις mediante nota.
  spanish_consistency_notes:
  - Se mantuvo «esclavos» para δοῦλοί, conforme a la política léxica auditable del proyecto.
  - Se evitó «SEÑOR» y otras convenciones de ocultamiento porque este versículo no contiene el tetragrámaton ni κύριος.
  - «Pasos de montaña» expresa de forma idiomática el valor topográfico de ἀναβάσεις sin perder la referencia a ascensos o accesos.
  - La puntuación y el orden buscan una lectura natural en español, manteniendo la estructura de promesas encadenadas del griego.
