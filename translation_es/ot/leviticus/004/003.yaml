revisions:
- from: Si el sacerdote ungido peca[a], trayendo culpa sobre el pueblo[b], entonces presentará por el pecado que ha cometido un toro, un hijo del ganado, sin defecto, a Yahvé como ofrenda por el pecado.
  to: Si el sacerdote ungido peca[a], trayendo culpa sobre el pueblo[b], presentará por el pecado que ha cometido un toro del ganado, sin defecto, a Yahvé como ofrenda por el pecado.
  rationale: Se mantiene la fidelidad al hebreo y a las decisiones documentadas del POB, pero se sustituye el calco poco natural ‘un hijo del ganado’ por ‘un toro del ganado’, que comunica con claridad el sentido de פַּר בֶּן בָּקָר en español digno y legible. También se elimina ‘entonces’ para una sintaxis más limpia sin pérdida semántica.
