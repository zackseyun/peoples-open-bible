translation:
  language: es
  text: Y quitaré de ella el regocijo de su numerosa multitud[a], y convertiré su orgullo en luto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el regocijo de su gran multitud». El griego puede referirse tanto a su condición de ciudad populosa como al gozo que esa multitud produce.
    reason: lexical_alternative
  - marker: b
    text: O «su altivez en luto» o «su esplendor en luto». El término griego puede llevar el sentido de orgullo ostentoso, así como de despliegue orgulloso o esplendor.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιελῶ
  english_pob_choice: I will take away
  chosen_spanish: quitaré
  alternatives_spanish:
  - retiraré
  - quitaré de ella
  - sacaré
  lexicon: LSJ
  rationale: El futuro de περιαιρέω expresa quitar o remover. «Quitaré» es natural en español y conserva la acción directa de Yahvé sobre la ciudad.
- source_word: ἀγαλλίαμα
  english_pob_choice: rejoicing
  chosen_spanish: regocijo
  alternatives_spanish:
  - alegría
  - exultación
  - gozo
  lexicon: LSJ
  rationale: El sustantivo designa alegría intensa o exultación. «Regocijo» comunica bien el estado de alegría y funciona con el paralelo del verso.
- source_word: τῆς πολυοχλίας
  english_pob_choice: of her many people
  chosen_spanish: de su mucha multitud
  alternatives_spanish:
  - de su gran multitud
  - de su numerosa gente
  - por su abundancia de gente
  lexicon: LSJ
  rationale: πολυοχλία puede aludir a una multitud numerosa o a la condición de estar poblada. «Mucha multitud» conserva la densidad literal del griego y deja abierta la relación entre población y alegría.
- source_word: ἀγαυρίαμα
  english_pob_choice: pride
  chosen_spanish: orgullo
  alternatives_spanish:
  - altivez
  - vanagloria
  - haughtiness
  - esplendor
  lexicon: LSJ
  rationale: El término puede significar orgullo ostentoso o jactancia. «Orgullo» expresa bien el matiz de autoexaltación en el paralelismo con «luto».
- source_word: εἰς πένθος
  english_pob_choice: into mourning
  chosen_spanish: en luto
  alternatives_spanish:
  - en duelo
  - para luto
  - hasta luto
  lexicon: LSJ
  rationale: La preposición indica resultado o transformación. «En luto» transmite ese cambio de estado con naturalidad en español.
theological_decisions:
- issue: Verbo implícito en la segunda cláusula
  english_pob_reading: turn her pride into mourning
  chosen_spanish_reading: tornaré su orgullo en luto
  alternative_spanish_readings:
  - y convertiré su orgullo en luto
  - y su orgullo en luto
  - y tornaré su orgullo en duelo
  rationale: El griego repite de manera elíptica la fuerza verbal de la primera cláusula. «Tornaré» mantiene el movimiento de cambio sin exceder el texto y conserva el paralelismo con el hebraísmo subyacente que la POB inglesa intenta respetar.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source compression and transformation imagery.'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al suministrar un verbo explícito en la segunda cláusula («tornaré») para reflejar la elipsis del griego sin perder la naturalidad en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito en el sujeto divino cuando el contexto lo exige, pero aquí el verso conserva la primera persona sin nombrarlo.
  - Se prefirió «orgullo» sobre «esplendor» como opción principal para reflejar el paralelo con el luto, dejando la alternativa en nota.
  - Se eligió «luto» en vez de «duelo» por ser una expresión más breve y cercana al valor de cambio de estado del griego.
