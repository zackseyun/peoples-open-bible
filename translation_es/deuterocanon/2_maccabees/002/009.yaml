    text: Or 'the Feast of Booths'; traditionally, 'Tabernacles.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'and of the fire' is terse in Greek and likely refers to the commemorative observance connected with Nehemiah's offering and the fire story recounted in the following context.
    reason: cultural_note
  - marker: c
    text: Greek 'built'; some readers may understand 'rebuilt' from the historical setting, but the source text itself does not state the prefix explicitly.
    reason: lexical_alternative
