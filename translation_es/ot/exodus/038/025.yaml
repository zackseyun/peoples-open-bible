translation:
  language: es
  text: Y la plata de los que fueron contados de entre la congregación[a] fue de cien talentos y mil setecientos setenta y cinco siclos, según el siclo del santuario[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la plata de los que fueron contados de la asamblea».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, medidos según el patrón de peso del santuario.
    reason: cultural_note
lexical_decisions:
- source_word: וְכֶסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata
  - dinero
  lexicon: HALOT
  rationale: En este contexto contable el término se refiere al metal aportado, no a dinero en abstracto. 'Plata' es el equivalente natural en español y conserva el sentido material del hebreo.
- source_word: פְּקוּדֵי הָעֵדָה
  english_pob_choice: those counted from the congregation
  chosen_spanish: los que fueron contados de la congregación
  alternatives_spanish:
  - los contados de la congregación
  - los que fueron empadronados de la congregación
  - los que fueron contados de la asamblea
  lexicon: HALOT
  rationale: El hebreo expresa el total de personas registradas o contadas. 'Los que fueron contados' mantiene el valor pasivo/administrativo sin sobreinterpretar, y 'congregación' conserva el registro formal del contexto del Éxodo.
- source_word: מְאַת כִּכָּר
  english_pob_choice: one hundred talents
  chosen_spanish: cien talentos
  alternatives_spanish:
  - cien talentos
  lexicon: HALOT
  rationale: '''Talentos'' es el equivalente tradicional y claro para la gran unidad de peso כִּכָּר.'
- source_word: וְאֶלֶף וּשְׁבַע מֵאוֹת וַחֲמִשָּׁה וְשִׁבְעִים שֶׁקֶל
  english_pob_choice: one thousand seven hundred seventy-five shekels
  chosen_spanish: mil setecientos setenta y cinco siclos
  alternatives_spanish:
  - mil setecientos setenta y cinco shekels
  - mil setecientos setenta y cinco monedas
  lexicon: HALOT
  rationale: El hebreo da una suma aditiva que totaliza 1.775 unidades. 'Siclos' comunica el peso/valor de forma estándar en español bíblico, evitando una traducción literal que oscurezca el número.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: according to the sanctuary shekel
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - según el siclo del santuario
  - conforme al siclo santo
  - según el siclo sagrado
  lexicon: HALOT
  rationale: La frase especifica la norma de pesaje usada. 'Según' comunica adecuadamente la medida conforme al patrón indicado, y 'siclo del santuario' conserva la terminología técnica sin reemplazarla por una paráfrasis devocional.
translation_notes:
  revision_awareness: 'Se incorporó una formulación española natural que conserva el paralelo contable del hebreo. Se evitó un anclaje de nota sin marca: las dos notas están marcadas explícitamente en el texto ([a], [b]). La elección de ''plata'' y ''siclo del santuario'' sigue el audit trail inglés y el contexto del original.'
  spanish_consistency_notes:
  - Se mantuvo el registro formal y administrativo del versículo.
  - '''Congregación'' se conservó para הָעֵדָה en armonía con el contexto del Éxodo.'
  - '''Siclo'' se usó como unidad de peso bíblica establecida en español.'
  - No se introdujo 'SEÑOR' ni otras sustituciones teológicas ajenas al texto.
