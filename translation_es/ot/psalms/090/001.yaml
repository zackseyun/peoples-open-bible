revisions:
- from: Oración de Moisés[a], el hombre de Dios. Señor[b], tú has sido para nosotros un refugio[c] de generación en generación.
  to: Oración de Moisés[a], el hombre de Dios. Señor, tú has sido para nosotros una morada[b] de generación en generación.
  rationale: 'Se revisa el término principal para alinear el español con el hebreo מָעוֹן y con la decisión principal de la POB inglesa: «morada» conserva la metáfora espacial de habitación. «Refugio» y «habitación» quedan como alternativas en una sola nota correctamente anclada. Se elimina la nota erróneamente colocada sobre «Señor» y la duplicación de notas.'
  reviewer_model: gpt-5.4
