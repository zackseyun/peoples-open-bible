review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: aparición de Yahvé, prohibición de bajar a Egipto, mandato de residir en la tierra, y futura instrucción divina. También preserva correctamente el nombre divino como «Yahvé». La nota léxica reproduce la alternativa más literal del inglés POB.'
  spanish_quality_summary: 'El texto es claro y digno, pero «Habita» suena algo menos natural que «Vive» o «Quédate» en español actual; aun así es aceptable. El problema principal está en la nota al pie: «que yo te diga» en español suele sonar subjuntivo presente/indefinido, mientras que el hebreo y el POB apuntan a una indicación futura. Conviene ajustar la alternativa para que preserve mejor el valor temporal y la literalidad sin ambigüedad.'
  glossary_alignment: 'Alineado con la terminología del proyecto: יְהוָה → «Yahvé»; prohibición de ירד conservada como «desciendas»; אֶרֶץ como «tierra». No hay conflicto teológico ni terminológico relevante.'
  issues:
  - severity: medium
    issue: La nota al pie usa «que yo te diga».
    rationale: Esa formulación puede leerse en español como subjuntivo no temporalmente definido y no reproduce con suficiente claridad la idea de futura comunicación divina que el POB auditó en «that I will tell you», ni la literalidad señalada en la nota inglesa.
  revised_spanish_text: 'Entonces Yahvé se le apareció y le dijo[a]: «No desciendas a Egipto. Habita en la tierra que yo te diré».'
  revised_footnotes:
  - marker: a
    text: 'O: «Quédate en la tierra que yo te diré», preservando más literalmente la redacción hebrea.'
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal, que es fiel y legible. Solo se corrige la nota al pie para evitar la ambigüedad de «te diga» y alinear mejor la alternativa española con el sentido futuro documentado en el POB inglés.
