  - marker: a
    text: O «es reconocido a distancia»; el griego puede sugerir tanto habla llamativa como una reputación que lo precede.
    reason: lexical_alternative
  - marker: b
    text: O «cuando tropieza». La imagen griega de resbalar puede referirse al tropiezo literal o al error figurado.
    reason: lexical_alternative
  revision_rationale: Se corrige la ortografía de la conjunción temporal («cuando») y se reubica la nota [b] al verbo final, donde realmente corresponde la alternativa léxica sobre ὀλισθάνειν. No se requieren otros cambios de sentido.
