base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/001/025.yaml
  text: Was I not sent against you by the Lord God? For my war is on the Euphrates[a], and now the Lord is with me, and the Lord is with me, urging me on. Stand aside[b], and do not oppose the Lord.
  footnotes:
  - marker: a
    text: Or 'at the Euphrates' or 'by the Euphrates.' The Greek phrase marks the location of Neco's campaign; the Hebrew parallel names Carchemish on the Euphrates.
    reason: lexical_alternative
  - marker: b
    text: Or 'hastening me' or 'speeding me on.' The Greek participle indicates that the Lord is pressing the campaign forward.
    reason: lexical_alternative
