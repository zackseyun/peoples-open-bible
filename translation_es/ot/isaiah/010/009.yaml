translation:
  language: es
  text: ¿No es Calno como Carquemís? ¿No es Hamat como Arpad? ¿No es Samaria como Damasco?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Calno» refleja la forma consonántica de este pasaje; «Calneh» aparece en algunas traducciones por una variante tradicional del nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Is not
  chosen_spanish: ¿No es
  alternatives_spanish:
  - ¿No será?
  - ¿Acaso no es?
  lexicon: HALOT
  rationale: La partícula interrogativa con negación introduce una pregunta retórica que espera asentimiento. «¿No es» reproduce esa fuerza de manera natural en español sin volverla condicional ni demasiado interpretativa.
- source_word: כְּ/כַרְכְּמִ֖ישׁ כַּלְנ֑וֹ
  english_pob_choice: Calno like Carchemish
  chosen_spanish: Calno como Carquemis
  alternatives_spanish:
  - Calno igual que Carquemis
  - Calno como Carquemis
  lexicon: HALOT
  rationale: El hebreo usa כ comparativo. En español, «como» expresa la comparación de forma clara y breve. Se mantiene «Calno» para seguir la forma consonántica del texto hebreo, y «Carquemis» como transliteración española natural del topónimo.
- source_word: כַּלְנוֹ
  english_pob_choice: Calno
  chosen_spanish: Calno
  alternatives_spanish:
  - Calné
  - Calneh
  lexicon: HALOT
  rationale: Se conserva la forma más directa del hebreo consonántico. Aunque existen variantes tradicionales como «Calneh», el texto fuente aquí favorece «Calno».
- source_word: כְ/אַרְפַּד֙ חֲמָ֔ת
  english_pob_choice: Hamath like Arpad
  chosen_spanish: Hamat como Arpad
  alternatives_spanish:
  - Hamat igual que Arpad
  - Hamat como Arpád
  lexicon: HALOT
  rationale: 'Se conserva la comparación con «como». En español, el orden natural sigue la secuencia del enunciado retórico: ciudad comparada primero, modelo después. «Hamat» sigue la transliteración española común del topónimo.'
- source_word: חֲמָת
  english_pob_choice: Hamath
  chosen_spanish: Hamat
  alternatives_spanish:
  - Hamath
  - Jamat
  lexicon: HALOT
  rationale: Topónimo transliterado de manera consistente al español bíblico; «Hamat» evita la grafía inglesa y mantiene claridad para lectores hispanos.
- source_word: אַרְפַּד
  english_pob_choice: Arpad
  chosen_spanish: Arpad
  alternatives_spanish:
  - Arpád
  lexicon: HALOT
  rationale: Se conserva la forma habitual del nombre propio en español bíblico, sin añadir acento que no está justificado por el uso estándar.
- source_word: כְ/דַמֶּ֖שֶׂק שֹׁמְרֽוֹן
  english_pob_choice: Samaria like Damascus
  chosen_spanish: Samaria como Damasco
  alternatives_spanish:
  - Samaria igual que Damasco
  - Samaria como Damasco
  lexicon: HALOT
  rationale: Se mantiene la comparación del hebreo con «como» y se conserva «Samaria» como nombre español establecido. «Damasco» es la transliteración estándar en español.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Samaría
  lexicon: HALOT
  rationale: Topónimo bíblico de uso estable en español. También puede aludir a la ciudad capital por extensión al reino del norte, pero el nombre propio se conserva sin explicitar esa extensión en el texto principal.
- source_word: דַּמֶּשֶׂק
  english_pob_choice: Damascus
  chosen_spanish: Damasco
  alternatives_spanish:
  - Damásco
  lexicon: HALOT
  rationale: Forma española estándar del topónimo, plenamente reconocible y fiel al original.
translation_notes:
  revision_awareness: Se corrigió la validación anterior colocando el marcador [a] dentro del texto principal en el lugar exacto correspondiente a la nota. No se hicieron otros cambios de fondo respecto de la lectura auditada.
  spanish_consistency_notes:
  - 'Se prefieren transliteraciones españolas estables de topónimos bíblicos: Carquemis, Hamat, Arpad, Samaria y Damasco.'
  - Se mantiene la estructura retórica de preguntas con «¿No es ... como ...?» para reflejar el paralelismo del hebreo.
  - La nota [a] queda anclada únicamente a «Calno», que es el punto de variación léxica documentado en el audit trail.
