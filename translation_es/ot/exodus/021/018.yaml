translation:
  language: es
  text: Si los hombres riñen y uno hiere a su prójimo con una piedra o con el puño[a], y no muere, y queda postrado en cama,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «cae a cama»; es decir, queda en cama o confinado a la cama por la lesión.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי / If
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La construcción casuística introduce un caso legal hipotético; en español jurídico-bíblico, «Si» reproduce de manera natural ese valor condicional.
- source_word: יְרִיבֻן
  english_pob_choice: quarrel
  chosen_spanish: riñen
  alternatives_spanish:
  - discuten
  - pelean
  - contienden
  lexicon: HALOT
  rationale: El verbo sugiere disputa o altercado entre personas; «riñen» mantiene el matiz de disputa que puede escalar sin convertirlo de entrada en combate abierto.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - unos hombres
  lexicon: HALOT
  rationale: El hebreo es masculino plural y aquí designa a las partes del caso. «Los hombres» conserva ese dato gramatical sin introducir neutralización innecesaria.
- source_word: וְהִכָּה אִישׁ אֶת רֵעֵהוּ
  english_pob_choice: one strikes his neighbor
  chosen_spanish: uno hiere a su prójimo
  alternatives_spanish:
  - uno golpea a su vecino
  - un hombre hiere a otro
  lexicon: HALOT
  rationale: «Hiere» expresa el resultado de un golpe en contexto legal, y «prójimo» mantiene el valor relacional de רֵעַ mejor que una simple repetición de «otro»; evita además un registro demasiado coloquial para «neighbor».
- source_word: בְּאֶבֶן
  english_pob_choice: with a stone
  chosen_spanish: con una piedra
  alternatives_spanish:
  - con un piedrazo
  - por medio de una piedra
  lexicon: HALOT
  rationale: El beth instrumental se vierte naturalmente con «con»; «piedra» es el sentido llano del sustantivo.
- source_word: בְּאֶגְרֹף
  english_pob_choice: with his fist
  chosen_spanish: con el puño
  alternatives_spanish:
  - con su puño
  - a puñetazo
  lexicon: HALOT
  rationale: אֶגְרֹף significa «puño». En español, «con el puño» es claro y fiel sin añadir de forma explícita un posesivo que el hebreo no marca.
- source_word: וְלֹא יָמוּת
  english_pob_choice: and he does not die
  chosen_spanish: y no muere
  alternatives_spanish:
  - pero no muere
  - y no fallece
  lexicon: HALOT
  rationale: La coordinación del hebreo se conserva con «y», mientras que el valor contextual queda claro por la secuencia legal; «muere» mantiene la literalidad adecuada.
- source_word: וְנָפַל לְמִשְׁכָּב
  english_pob_choice: but is confined to bed
  chosen_spanish: sino que queda postrado en cama
  alternatives_spanish:
  - y cae en cama
  - y queda en cama
  - y es recluido en cama
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente «cae a cama». «Queda postrado en cama» comunica la condición resultante de manera natural y cercana, preservando la fuerza del resultado físico.'
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje casuístico del hebreo y se alinea con el audit trail inglés en los puntos clave: condición hipotética, disputa entre hombres, golpe con piedra o puño, ausencia de muerte y resultado de quedar postrado en cama. No se introdujeron lecturas doctrinales ajenas al texto.'
  spanish_consistency_notes:
  - Se mantuvo un español jurídico-bíblico sobrio y moderno, evitando calcos rígidos.
  - «Prójimo» se usa aquí por la relación interpersonal del hebreo רֵעַ en un caso legal, no como expansión teológica.
  - La nota de pie de página preserva la observación lexical sobre la expresión idiomática hebrea sin duplicar el sentido principal del texto.
