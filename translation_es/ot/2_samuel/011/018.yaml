translation:
  language: es
  text: Entonces Joab envió y contó a David todos los asuntos de la batalla[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los detalles de la batalla». El hebreo dice literalmente «todas las palabras de la batalla», un modismo para el informe o los detalles del combate.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - remitió
  lexicon: HALOT
  rationale: שׁלח expresa aquí el acto de enviar. En español, «envió» conserva el sentido básico sin añadir una paráfrasis innecesaria; «mandó» sería posible, pero puede sonar más directivo que el hebreo narrativo.
- source_word: יוֹאָב
  english_pob_choice: Joab
  chosen_spanish: Joab
  alternatives_spanish:
  - Yoab
  lexicon: Nombre propio bíblico
  rationale: Se conserva la forma tradicional del nombre en español bíblico, ampliamente reconocible y fiel a la transliteración habitual.
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: informó
  alternatives_spanish:
  - dijo
  - reportó
  - comunicó
  lexicon: HALOT
  rationale: נגד en hifil significa decir, declarar o informar. «Informó» reproduce bien el carácter de reporte narrativo dirigido a David; «dijo» sería más general y «reportó» menos natural en español bíblico.
- source_word: לְדָוִד
  english_pob_choice: David
  chosen_spanish: a David
  alternatives_spanish:
  - a David
  lexicon: Nombre propio bíblico + preposición
  rationale: La preposición לְ se expresa naturalmente con «a» en español para el destinatario del informe.
- source_word: כָּל דִּבְרֵי הַמִּלְחָמָה
  english_pob_choice: all the matters of the battle
  chosen_spanish: todos los asuntos de la batalla
  alternatives_spanish:
  - todos los detalles de la batalla
  - todo lo referente a la batalla
  - todas las palabras de la batalla
  lexicon: HALOT
  rationale: דִּבְרֵי es literalmente «palabras» o «asuntos», pero aquí funciona como modismo para el conjunto del reporte o los detalles del combate. «Asuntos» mantiene la amplitud y la formalidad del hebreo sin caer en la literalidad extraña de «palabras».
- source_word: הַמִּלְחָמָה
  english_pob_choice: the battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  - la lucha
  lexicon: HALOT
  rationale: Aunque מִלְחָמָה puede significar «guerra», el contexto inmediato es un enfrentamiento militar específico que se reporta; «batalla» es más preciso en español.
translation_notes:
  revision_awareness: 'La versión inglesa revisada volvió de «news» a «matters» y de «sent word» a «sent», acercándose más al hebreo literal. La propuesta española sigue esa dirección: usa «envió» y «asuntos» para reflejar con más fidelidad la formulación de «todas las palabras/asuntos de la batalla», sin perder naturalidad en español.'
  spanish_consistency_notes:
  - Se mantiene «David» y «Joab» con la forma habitual en español bíblico.
  - Se evita «SEÑOR» u otra convención de sustitución porque el versículo no contiene el nombre divino.
  - «Batalla» se usa de manera consistente con el contexto narrativo inmediato, no como traducción genérica de todo posible sentido de מִלְחָמָה.
