translation:
  language: es
  text: Reaía, hijo de Sobal, engendró a Jahat; y Jahat engendró a Ahumai y a Lahad. Estos fueron los clanes de los zoratitas.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “familias de los zoratitas”. El hebreo puede designar grupos extensos de parentesco; se usa “clanes” por claridad en una genealogía tribal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְאָיָה
  english_pob_choice: Reaiah
  chosen_spanish: Reaías
  alternatives_spanish:
  - Reaía
  - Reayá
  lexicon: HALOT
  rationale: Nombre propio transliterado al español de forma natural. Se conserva la identidad personal sin traducir el nombre.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En genealogías, בן puede ser descendencia amplia, pero el giro español más directo y fiel aquí es 'hijo de', que mantiene la forma genealógica breve del hebreo.
- source_word: הוֹלִיד / הֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: El hifil de ילד en contextos genealógicos expresa procreación/engendramiento. 'Engendró' preserva mejor el registro genealógico y la fuerza verbal que una paráfrasis más suave.
- source_word: יַחַת
  english_pob_choice: Jahath
  chosen_spanish: Jat
  alternatives_spanish:
  - Jahat
  - Yajat
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se opta por una forma hispana breve y legible; la grafía puede variar por la aspiración final del nombre.
- source_word: אֲחוּמַי
  english_pob_choice: Ahumai
  chosen_spanish: Ahumai
  alternatives_spanish:
  - Ajumai
  lexicon: HALOT
  rationale: Nombre propio transliterado, conservando la forma convencional ya establecida por la tradición de transliteración inglesa del POB.
- source_word: לָהַד
  english_pob_choice: Lahad
  chosen_spanish: Lahad
  alternatives_spanish:
  - Lajad
  lexicon: HALOT
  rationale: Nombre propio transliterado sin añadir interpretación.
- source_word: אֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Estas
  lexicon: HALOT
  rationale: Demostrativo plural que retoma a los descendientes nombrados; 'Estos' funciona en español como cierre genealógico natural.
- source_word: מִשְׁפְּחֹות
  english_pob_choice: clans
  chosen_spanish: clanes
  alternatives_spanish:
  - familias
  - linajes
  lexicon: HALOT
  rationale: En contexto tribal/genealógico, 'clanes' comunica mejor el alcance de משפחות que el más estrecho 'familias', siguiendo la decisión auditada del POB en inglés.
- source_word: הַצָּרְעָתִי
  english_pob_choice: the Zorathites
  chosen_spanish: los zoratitas
  alternatives_spanish:
  - los de Zora
  - los zorateos
  lexicon: HALOT
  rationale: Gentilicio derivado de Zora/Zorat. Se conserva el valor étnico-clánico con una forma española transparente y bíblica.
translation_notes:
  revision_awareness: El texto inglés auditado no fue revisado y se mantiene en alta concordancia con el hebreo. La versión española sigue la misma lectura genealógica y la misma decisión léxica clave sobre מִשְׁפְּחֹות como 'clanes'.
  spanish_consistency_notes:
  - Se mantuvo una sintaxis genealógica breve y directa, acorde con el hebreo.
  - Se conservaron todos los nombres propios como transliteraciones, sin intentar normalizarlos según grafías tradicionales no atestiguadas en el paquete fuente.
  - La nota textual sobre 'clanes' se ancla en el mismo punto donde aparece la alternativa léxica relevante.
