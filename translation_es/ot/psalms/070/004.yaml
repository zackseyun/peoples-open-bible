translation:
  language: es
  text: 'Que retrocedan por causa de su vergüenza[a] los que dicen: «¡Aj, aj!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Que vuelvan atrás a causa de su vergüenza».
