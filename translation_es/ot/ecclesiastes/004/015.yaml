translation:
  language: es
  text: Vi a todos los vivientes, a los que andan bajo el sol, con el segundo joven[a], que estaría en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el segundo niño» o «el segundo muchacho»; el hebreo también puede referirse a un sucesor que reemplaza al gobernante anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  english_pob_choice: I saw
  chosen_spanish: Vi
  alternatives_spanish:
  - Observé
  lexicon: HALOT
  rationale: El perfecto qal en primera persona introduce una observación directa del hablante; en español, «Vi» reproduce con naturalidad esa observación inmediata sin añadir interpretación.
- source_word: כָּל הַחַיִּים
  english_pob_choice: all the living
  chosen_spanish: todos los vivientes
  alternatives_spanish:
  - todas las personas vivas
  - todos los que viven
  lexicon: HALOT
  rationale: La expresión hebrea es compacta y literalmente «todos los vivientes». «Vivientes» conserva la concisión y el sustantivo colectivo, sin forzar «personas».
- source_word: הַמְהַלְּכִים
  english_pob_choice: those walking
  chosen_spanish: los que andan
  alternatives_spanish:
  - los que caminan
  - los que se desplazan
  lexicon: HALOT
  rationale: El participio sustantivado de הלך funciona como descripción de personas en movimiento; «los que andan» es natural en español y mantiene el valor participial.
- source_word: תַּחַת הַשָּׁמֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: bajo el sol
  alternatives_spanish:
  - debajo del sol
  lexicon: HALOT
  rationale: Se conserva el modismo propio de Eclesiastés con una forma natural en español. «Bajo el sol» mantiene el registro proverbial del libro.
- source_word: הַיֶּלֶד הַשֵּׁנִי
  english_pob_choice: the second youth
  chosen_spanish: el segundo joven
  alternatives_spanish:
  - el segundo muchacho
  - el segundo niño
  - el joven sucesor
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el niño/joven» con el ordinal «segundo». En contexto político, «joven» evita reducirlo a «niño» y preserva la ambigüedad del referente sin resolverlo como «sucesor».
- source_word: אֲשֶׁר יַעֲמֹד
  english_pob_choice: who would stand
  chosen_spanish: que se pondría
  alternatives_spanish:
  - que estaría en pie
  - que se levantaría
  - que ocuparía
  lexicon: HALOT
  rationale: El verbo עמד puede expresar toma de posición o presencia en un lugar. «Se pondría» comunica la idea de ocupar una posición en el marco de sucesión, sin volverla más específica de lo que exige el hebreo.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en lugar de él
  - en vez de él
  - bajo él
  lexicon: HALOT
  rationale: En contexto sucesorio, la expresión idiomática señala reemplazo. «En su lugar» expresa con claridad esa relación y conserva la neutralidad del texto.
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo masorético dado y el archivo de auditoría en inglés, sin cambios de revisión aplicados; se conserva la ambigüedad del referente final y la imagen de sucesión.
  spanish_consistency_notes:
  - Se mantuvo «bajo el sol» como fórmula fija de Eclesiastés.
  - Se prefirió «Yahvé» en otros pasajes según la norma del proyecto, pero aquí no aparece el Nombre divino.
  - Se evitó «siervo» porque el hebreo no usa δοῦλος ni un equivalente de servicio.
  - Se preservó la posible lectura sucesoria sin explicitar «sucesor» en el texto principal.
