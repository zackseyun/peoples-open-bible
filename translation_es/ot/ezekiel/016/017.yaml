base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/016/017.yaml
  text: You took your beautiful jewels from my gold and my silver[a], which I had given to you, and made for yourself male images[c][b], and you prostituted yourself with them.
  footnotes:
  - marker: a
    text: Or 'your splendid ornaments' or 'your beautiful articles.' The Hebrew term can refer broadly to objects or articles, but here likely means ornamental items made from precious metals.
    reason: lexical_alternative
  - marker: b
    text: Or 'male idols' or 'images in the form of males.'
    reason: alternative_reading
  - marker: c
    text: The expression 'prostituted yourself' renders a recurring prophetic metaphor for covenant unfaithfulness expressed through idolatry.
    reason: cultural_note
