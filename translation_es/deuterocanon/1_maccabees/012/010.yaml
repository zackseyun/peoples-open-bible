translation:
  language: es
  text: Hemos tratado de renovar la hermandad y la amistad con ustedes al enviarles este mensaje, para que no nos distanciemos de ustedes; porque ha pasado mucho tiempo[a] desde que nos enviaron mensaje.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «han pasado muchos períodos»; el griego καιροί se refiere ampliamente a intervalos o momentos señalados, no necesariamente a estaciones literales.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπειράθημεν
  english_pob_choice: We have tried
  chosen_spanish: Hemos tratado
  alternatives_spanish:
  - Hemos intentado
  - Hemos hecho un esfuerzo
  lexicon: LSJ
  rationale: El aoristo medio/pasivo de πειράω expresa un intento o esfuerzo. «Hemos tratado» es natural en español y conserva el matiz de tentativa sin implicar éxito consumado.
- source_word: ἀποστεῖλαι
  english_pob_choice: to send word
  chosen_spanish: al enviarles palabra
  alternatives_spanish:
  - al enviar
  - al despachar mensaje
  lexicon: LSJ
  rationale: El infinitivo significa «enviar». Como el contexto es diplomático y el objeto no se explicita en griego, «palabra» hace explícito el acto comunicativo sin añadir contenido ajeno al texto.
- source_word: τὴν πρὸς ὑμᾶς ἀδελφότητα καὶ φιλίαν
  english_pob_choice: the brotherhood and friendship with you
  chosen_spanish: la hermandad y la amistad con ustedes
  alternatives_spanish:
  - la fraternidad y amistad con ustedes
  - la hermandad y la amistad hacia ustedes
  lexicon: LSJ
  rationale: ἀδελφότης denota hermandad o fraternidad, y φιλία amistad. «Con ustedes» refleja de forma idiomática el valor relacional de πρὸς ὑμᾶς.
- source_word: ἀνανεώσασθαι
  english_pob_choice: to renew
  chosen_spanish: renovar
  alternatives_spanish:
  - restablecer
  - hacer nueva
  lexicon: LSJ
  rationale: El verbo significa renovar o restaurar. «Renovar» es la opción más directa y natural para una relación ya existente.
- source_word: πρὸς τὸ μὴ ἐξαλλοτριωθῆναι ὑμῶν
  english_pob_choice: so that we might not become estranged from you
  chosen_spanish: para que no lleguemos a enajenarnos de ustedes
  alternatives_spanish:
  - para no alejarnos de ustedes
  - para que no lleguemos a extrañarnos de ustedes
  lexicon: LSJ
  rationale: ἐξαλλοτριωθῆναι comunica volverse ajeno o estranjado. «Enajenarnos de ustedes» conserva la fuerza relacional y la distancia semántica del verbo, aunque «alejarnos» sería más suave.
- source_word: πολλοὶ γὰρ καιροὶ διῆλθον
  english_pob_choice: for many times have passed
  chosen_spanish: porque han pasado muchos tiempos
  alternatives_spanish:
  - porque han transcurrido muchos períodos
  - porque han pasado muchas ocasiones
  lexicon: LSJ
  rationale: καιροί refiere a intervalos o períodos; «muchos tiempos» reproduce el plural y la amplitud temporal sin reducirlo a estaciones literales.
- source_word: ἀφʼ οὗ ἀπεστείλατε πρὸς ἡμᾶς
  english_pob_choice: since you sent to us
  chosen_spanish: desde que nos enviaron
  alternatives_spanish:
  - desde que nos enviaron palabra
  - desde que enviaron a nosotros
  lexicon: LSJ
  rationale: El griego deja implícito el objeto del envío. «Nos enviaron» mantiene esa apertura y permite entender la acción como un envío/comunicación hacia la comunidad que habla.
theological_decisions:
- issue: Término relacional en vez de lectura eclesiástica posterior
  english_pob_reading: brotherhood and friendship
  chosen_spanish_reading: hermandad y amistad
  alternative_spanish_readings:
  - fraternidad y amistad
  - hermandad y comunión
  rationale: El contexto es diplomático y fraternal entre grupos, no un término técnico eclesiástico. «Hermandad» y «amistad» preservan la relación de alianza/amistad sin introducir un vocabulario confesional posterior.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Seguí la revisión más reciente del audit trail al colocar el envío como medio para renovar la hermandad y la amistad, y al traducir καιροί con un plural temporal más general en español. También conservé el carácter implícito del objeto de «enviar» sin especificarlo más allá de lo que el griego permite.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando corresponda a este proyecto; en este versículo no aparece el nombre divino.
  - Mantuve un registro formal y publicable, con sintaxis natural en español latinoamericano.
  - Preferí «hermandad» sobre «fraternidad» porque refleja bien la relación de parentesco/alianza del término griego sin sonar excesivamente técnico.
  - Conservé la tensión de ἐξαλλοτριωθῆναι con «enajenarnos», una opción algo más fuerte que «alejarnos» y más cercana al matiz de hacerse extraño o ajeno.
