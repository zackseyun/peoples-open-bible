    rationale: El inglés marca [c][b] tras «moves on» por limitaciones/decisiones editoriales, pero el contenido de c en realidad explica «I do not perceive him». En español conviene reanclar limpiamente la nota c en «percibo» para evitar ambigüedad y preservar la justificación léxica de אָבִין לוֹ.
  revised_spanish_text: Mira[a], pasa junto a mí[b], y no lo veo; sigue adelante, y no lo percibo[c].
  revised_footnotes:
