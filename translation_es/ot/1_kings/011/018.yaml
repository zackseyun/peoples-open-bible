translation:
  language: es
  text: Se levantaron de Madián y fueron a Parán, y tomaron hombres con ellos de Parán, y fueron a Egipto, a Faraón, rey de Egipto, y él le dio una casa, le asignó alimento[a], y le dio tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «y pan le dijo». La expresión indica que Faraón ordenó o asignó provisiones para él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  english_pob_choice: they arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - partieron
  - salieron
  lexicon: HALOT
  rationale: קום en narración de viaje puede funcionar como inicio de desplazamiento. «Se levantaron» conserva el valor literal del verbo y sugiere el movimiento sin introducir una paráfrasis excesiva.
- source_word: מִמִּדְיָן
  english_pob_choice: from Midian
  chosen_spanish: de Madián
  alternatives_spanish:
  - desde Madián
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar en español bíblico, manteniendo la referencia geográfica.
- source_word: פָּארָן
  english_pob_choice: Paran
  chosen_spanish: Parán
  alternatives_spanish:
  - Paran
  lexicon: HALOT
  rationale: Se conserva el nombre propio con acento españolizado por uso bíblico común y lectura natural en español.
- source_word: וַיִּקְחוּ אֲנָשִׁים עִמָּם מִפָּארָן
  english_pob_choice: they took men with them from Paran
  chosen_spanish: tomaron hombres con ellos de Parán
  alternatives_spanish:
  - tomaron personas con ellos de Parán
  - reunieron hombres de Parán con ellos
  lexicon: HALOT
  rationale: אֲנָשִׁים es literalmente «hombres», y la POB inglesa conserva esa fuerza. «Tomaron hombres» mantiene el matiz de incorporación al grupo sin suavizarlo a «personas».
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: HALOT
  rationale: Nombre propio estándar.
- source_word: אֶל פַּרְעֹה מֶלֶךְ מִצְרַיִם
  english_pob_choice: to Pharaoh king of Egypt
  chosen_spanish: a Faraón, rey de Egipto
  alternatives_spanish:
  - a Faraón, el rey de Egipto
  lexicon: HALOT
  rationale: La aposición se mantiene en forma natural en español. «Faraón» se conserva como nombre/título regente.
- source_word: וַיִּתֶּן לוֹ בַיִת
  english_pob_choice: and he gave him a house
  chosen_spanish: y él le dio una casa
  alternatives_spanish:
  - y le dio una casa
  - y le dio morada
  lexicon: HALOT
  rationale: Se conserva el referente narrativo a Faraón y el sustantivo directo «casa», como en el hebreo y en la POB inglesa.
- source_word: וְלֶחֶם אָמַר לוֹ
  english_pob_choice: and assigned him food
  chosen_spanish: le dijo el pan
  alternatives_spanish:
  - y le asignó alimento
  - y le ordenó pan
  lexicon: HALOT
  rationale: El hebreo es literalmente «y pan dijo a él». La traducción principal preserva la tensión idiomática con una formulación transparente, y el sentido administrativo/provisionamiento queda disponible por el contexto y la nota.
- source_word: וְאֶרֶץ נָתַן לוֹ
  english_pob_choice: and gave him land
  chosen_spanish: y le dio tierra
  alternatives_spanish:
  - y le dio un territorio
  - y le dio una parcela
  lexicon: HALOT
  rationale: אֶרֶץ aquí denota tierra concedida; «tierra» conserva la amplitud semántica sin restringir indebidamente a «territorio».
translation_notes:
  revision_awareness: 'La POB inglesa revisó la cláusula relativa para evitar una interpretación excesiva y conservar la secuencia narrativa hebrea: pasó de «who gave him» a «and he gave him». La redacción española sigue esa secuencia con «y él le dio», y preserva el dicho idiomático de לֶחֶם mediante una nota lexical en vez de normalizarlo demasiado pronto.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino no pertinente en este versículo; no aplica.
  - Se usa «Madián» y «Parán» como topónimos bíblicos consistentes con la serie toponímica del texto.
  - «Casa» se toma en sentido literal, como en el hebreo y la POB inglesa, sin expandir a «hogar» o «residencia».
  - La nota [a] conserva la tensión del hebreo literal sin borrar el matiz de provisión/mandato que la POB inglesa explicó.
