translation:
  language: es
  text: ¡Alábenlo con címbalos sonoros[a][b]; alábenlo con címbalos estruendosos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «címbalos muy sonoros» o «címbalos de sonido fuerte».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «címbalos de teruá»; תְּרוּעָה puede referirse a un grito, un toque o un clamor jubiloso. Aquí, con címbalos, probablemente describe un sonido fuerte de choque o estrépito.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַֽלְל֥וּ/הוּ
  english_pob_choice: Praise him
  chosen_spanish: ¡Alábenlo!
  alternatives_spanish:
  - ¡Aláben al Señor!
  - ¡Alábenlo ustedes!
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural con sufijo de objeto de tercera persona masculina singular. En español, «¡Alábenlo!» preserva la orden directa y el objeto pronominal sin añadir fórmula ajena al texto.
- source_word: בְ/צִלְצְלֵי
  english_pob_choice: with cymbals
  chosen_spanish: con címbalos
  alternatives_spanish:
  - con címbalos de
  - con platillos
  lexicon: HALOT
  rationale: La preposición ב es instrumental. «Con címbalos» es natural en español y conserva el instrumento de alabanza sin sustituirlo por un término menos preciso como «platillos».
- source_word: שָׁ֑מַע
  english_pob_choice: sounding
  chosen_spanish: sonoros
  alternatives_spanish:
  - resonantes
  - de sonido fuerte
  - sonantes
  lexicon: HALOT
  rationale: En este contexto, el sustantivo/adyacencia describe címbalos que producen un sonido claro y audible. «Sonoros» comunica esa cualidad de sonido sin alargar innecesariamente el verso.
- source_word: תְרוּעָֽה
  english_pob_choice: clashing
  chosen_spanish: resonantes
  alternatives_spanish:
  - estruendosos
  - de clamor
  - chocantes
  lexicon: HALOT
  rationale: El inglés POB entiende תְרוּעָה en este contexto no como un grito vocal, sino como un choque o estruendo de instrumentos. En español, «resonantes» mantiene la idea de sonido fuerte y jubiloso sin introducir un matiz más interpretativo que «chocantes».
theological_decisions:
- issue: El valor de תְרוּעָה con címbalos
  english_pob_reading: With cymbals, it likely refers to a loud crashing or clashing sound.
  chosen_spanish_reading: Con címbalos resonantes, probablemente alude a un sonido fuerte y jubiloso producido por el choque de los instrumentos.
  alternative_spanish_readings:
  - címbalos de clamor
  - címbalos de estruendo
  - címbalos de choque
  rationale: 'Se conserva la tensión semántica: תְרוּעָה puede significar grito, blast/sonido de trompeta o júbilo, pero aquí el contexto instrumental favorece un sonido de impacto. «Resonantes» permite esa lectura sin cerrar indebidamente el sentido a una sola imagen.'
  doctrine_reference: Poética cultual de Salmos 150; léxico de תְרוּעָה en contexto de adoración
- issue: Repetición del imperativo de alabanza
  english_pob_reading: Praise him ... praise him ...
  chosen_spanish_reading: ¡Alábenlo ... alábenlo ...!
  alternative_spanish_readings:
  - ¡Lóenlo ... lóenlo ...!
  - ¡Denle alabanza ... denle alabanza ...!
  rationale: La repetición enfática del imperativo se refleja directamente en español para mantener el paralelismo y el impulso litúrgico del verso.
  doctrine_reference: Paralelismo poético hebreo
translation_notes:
  revision_awareness: Se revisó la opción de traducir תְרוּעָה con un término más fuerte como «estruendosos» o «chocantes», pero se prefirió «resonantes» por mantener la naturalidad del español y dejar visible en nota la ambigüedad léxica documentada por el POB en inglés. La forma final conserva el paralelismo y evita suavizar indebidamente el carácter sonoro del texto.
  spanish_consistency_notes:
  - Se usa «Alábenlo» para sostener el imperativo plural y el sufijo pronominal del hebreo.
  - «Címbalos» mantiene el término musical específico y coincide con el audit trail inglés.
  - Se evita «SEÑOR» u otra sustitución, porque aquí no aparece el Tetragrámaton sino una exhortación poética general.
  - La puntuación con punto y coma ayuda a reflejar la duplicación paralela del verso.
