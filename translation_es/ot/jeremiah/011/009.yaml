  revision_awareness: 'La versión inglesa auditada muestra estabilidad textual (latest_revision_pass: unchanged) y alta concordancia (0.95), sin revisiones aplicadas; por ello la draft española sigue de cerca las decisiones léxicas ya auditadas, adaptándolas a la sintaxis natural del español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se elige «conspiración» para קֶשֶׁר, manteniendo el matiz político/traicionero sin añadir información ajena al texto.
  - Se conserva el colectivo de בְּאִישׁ יְהוּדָה con «los hombres de Judá» para reflejar la singularidad formal del hebreo sin perder naturalidad en español.
