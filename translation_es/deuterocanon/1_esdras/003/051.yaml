translation:
  language: es
  text: Y ahora no me creen. ¿No es grande el rey en su autoridad? ¿No temen todas las tierras tocarlo[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «¿No temen todas las tierras ponerle la mano encima?». El griego dice literalmente «tocarlo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστεύετέ
  english_pob_choice: believe
  chosen_spanish: creen
  alternatives_spanish:
  - confían
  - dan crédito
  lexicon: BDAG
  rationale: En este contexto de reproche retórico, πιστεύω expresa que los oyentes no aceptan la afirmación del hablante. «Creen» comunica de forma natural esa falta de aceptación; «confían» sería posible, pero suena menos directo aquí.
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - poderoso
  - mighty
  lexicon: LSJ
  rationale: μέγας describe la magnitud o prominencia del rey. «Grande» conserva la fuerza retórica sin añadir explícitamente una idea de fuerza que el griego no exige en esta frase.
- source_word: ἐξουσίᾳ
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - dominio
  lexicon: LSJ
  rationale: ἐξουσία puede significar autoridad, derecho o poder de actuar. «Autoridad» reproduce bien la relación con el rey como gobernante reconocido; «poder» es viable, pero menos preciso para el matiz de gobierno legítimo.
- source_word: χῶραι
  english_pob_choice: lands
  chosen_spanish: tierras
  alternatives_spanish:
  - países
  - regiones
  lexicon: LSJ
  rationale: χῶραι se refiere de manera amplia a territorios o tierras. «Tierras» mantiene ese alcance geográfico sin imponer la noción moderna de Estado-nación que «países» podría sugerir.
- source_word: εὐλαβοῦνται
  english_pob_choice: fear
  chosen_spanish: temen
  alternatives_spanish:
  - sienten reverencia
  - están recelosas
  lexicon: LSJ
  rationale: El verbo puede abarcar cautela reverente o temor. En este contexto, unido a «tocarlo», el sentido práctico es que evitan acercarse por temor; «temen» expresa mejor esa prudencia intimidada que una simple reverencia.
- source_word: ἅψασθαι
  english_pob_choice: to touch
  chosen_spanish: tocar
  alternatives_spanish:
  - poner la mano sobre
  - tender la mano a
  lexicon: LSJ
  rationale: ἅπτομαι significa de forma básica «tocar» o «asir». «Tocar» conserva el sentido directo del griego; la nota en inglés sobre «poner una mano sobre» queda implícita como alternativa idiomática sin sustituir el texto principal.
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego de Swete 1909 y concuerda con la traducción inglesa auditada, sin cambios textuales relevantes en la revisión más reciente; se conserva la alternativa idiomática para ἅψασθαι en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; este verso no contiene el tetragrámaton.
  - Se mantiene «autoridad» para ἐξουσία, en línea con la decisión inglesa auditada.
  - «Tierras» preserva el sentido territorial amplio de χῶραι y evita el anacronismo de «países».
  - La nota sobre ἅψασθαι conserva la tensión entre el sentido literal «tocar» y la equivalencia idiomática «ponerle la mano encima».
