review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la fórmula regia del hebreo: «el resto de los hechos de Azarías», «y todo lo que hizo», y la referencia al libro fuente. Sin embargo, hay dos problemas de alineación formal: (1) los marcadores de notas están anclados a palabras equivocadas; la nota sobre הֵם כְּתוּבִים debe ir junto a «escrito[s]», no junto a «Azarías», y la nota cultural sobre el libro debe ir junto al título de la obra, no junto a «hizo»; (2) «¿no está escrito?» suaviza el plural retórico הֵם כְּתוּבִים. Aunque es comprensible, aquí conviene conservar mejor la concordancia plural y el tono formular: «¿no están escritos?»'
  spanish_quality_summary: El español es claro y digno, pero la frase mejora en naturalidad y fidelidad con «¿no están escritos...?» en vez de singular impersonal. También conviene evitar la mayúscula innecesaria en «libro» dentro del título descriptivo y mantener el anclaje correcto de notas para legibilidad editorial.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Azarías», «hechos», «Crónicas» y «Judá» están bien alineados con el proyecto. La revisión propuesta solo corrige concordancia, puntuación editorial menor y ubicación de notas.
  issues:
  - severity: high
    issue: Marcadores de notas colocados en lugares incorrectos
    rationale: La nota a trata sobre «escrito/registrado» para הֵם כְּתוּבִים, pero está anclada a «Azarías». La nota b trata sobre «el libro de las Crónicas...», pero está anclada a «hizo». Esto rompe la trazabilidad entre texto y nota.
  - severity: medium
    issue: Concordancia singular en «¿no está escrito?»
    rationale: El hebreo tiene plural («¿no están escritos?»). Aunque el singular impersonal suena natural, aquí la fórmula archivística se conserva mejor en plural sin afectar la claridad.
  - severity: low
    issue: Mayúscula en «Libro»
    rationale: En español general, un título descriptivo de obra fuente dentro de la oración se lee mejor como «libro de las Crónicas...», salvo que el proyecto haya fijado una capitalización especial, lo cual no se documenta aquí.
  revised_spanish_text: Ahora bien, el resto de los hechos de Azarías, y todo lo que hizo, ¿no están escritos[a] en el libro de las Crónicas de los reyes de Judá[b]?
  revised_footnotes:
