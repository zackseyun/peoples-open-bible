lexical_decisions:
- source_word: לְ/מַטֵּה
  english_pob_choice: from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - de entre la tribu de
  - perteneciente a la tribu de
  lexicon: HALOT
  rationale: El hebreo con לְ + מַטֶּה introduce afiliación tribal en una lista de representantes. En español, «de la tribu de» comunica esa pertenencia de manera natural y fiel, sin añadir la idea de movimiento que tendría «desde».
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalí
  lexicon: HALOT
  rationale: Nombre propio de tribu; se translitera al español con la forma más reconocible y estable en el uso bíblico castellano.
- source_word: נַחְבִּי
  english_pob_choice: Nahbi
  chosen_spanish: Nahbí
  alternatives_spanish:
  - Nahbi
  lexicon: HALOT
  rationale: Nombre propio personal; se conserva transliterado. El acento final ayuda a la lectura española sin alterar la forma del nombre.
- source_word: בֶּן
  english_pob_choice: the son of
  chosen_spanish: el hijo de
  alternatives_spanish:
  - hijo de
  lexicon: HALOT
  rationale: En una lista genealógica, «el hijo de» reproduce con claridad el valor relacional del hebreo. Se mantiene el artículo por la misma razón de registro formal que la revisión inglesa documentó.
- source_word: וָפְסִי
  english_pob_choice: Vophsi
  chosen_spanish: Vofsí
  alternatives_spanish:
  - Vapsi
  - Vofsí
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se elige una forma española viable y consistente con la pronunciación aproximada; el final en -í refleja la vocalización del nombre en español.
translation_notes:
  revision_awareness: La revisión inglesa cambió «son of» por «the son of» para un registro un poco más formal. En español se refleja esa misma elevación estilística con «el hijo de». No se requiere nota textual ni variante, porque el hebreo y el auditable inglés coinciden plenamente en el sentido genealógico.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece ningún tetragrámaton ni sustitución divina en este versículo.
  - 'Se mantiene el orden de lista nominal propio del texto fuente: afiliación tribal, nombre personal y filiación.'
  - La transliteración de nombres sigue una forma castellana readable, sin traducir antropónimos.
