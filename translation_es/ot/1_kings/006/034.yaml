translation:
  language: es
  text: Y dos puertas de madera de ciprés[b]; la primera puerta tenía dos hojas giratorias[a], y la segunda puerta tenía dos hojas giratorias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hojas plegables». Los términos arquitectónicos hebreos son raros, y el sentido suele entenderse como hojas de puerta que giran o se pliegan.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, «madera de abeto»; el hebreo בְּרוֹשׁ probablemente se refiere a ciprés o a una conífera semejante.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַלְתוֹת
  english_pob_choice: doors
  chosen_spanish: puertas
  alternatives_spanish:
  - hojas de puerta
  - batientes
  lexicon: HALOT
  rationale: El hebreo plural se refiere a las dos unidades principales de acceso; en español, "puertas" es la forma más natural y fiel en este contexto arquitectónico.
- source_word: עֲצֵי בְרוֹשִׁים
  english_pob_choice: of cypress wood
  chosen_spanish: de madera de ciprés
  alternatives_spanish:
  - de madera de abeto
  - de madera de pino
  lexicon: HALOT
  rationale: Sigo la decisión auditada del inglés POB de evitar el tradicional "abeto" cuando el hebreo בְרוֹשׁ probablemente designa ciprés o una conífera similar. En español, "madera de ciprés" comunica bien el sentido botánico y material.
- source_word: צְלָעִים
  english_pob_choice: folding leaves
  chosen_spanish: hojas giratorias
  alternatives_spanish:
  - hojas plegables
  - piezas laterales
  - batientes
  lexicon: HALOT
  rationale: El término es raro y en este contexto describe las secciones móviles de una puerta. "Hojas giratorias" intenta conservar la idea funcional de giro/pivote que la revisión inglesa destacó, sin perder claridad en español.
- source_word: גְּלִילִים
  english_pob_choice: revolving leaves
  chosen_spanish: hojas giratorias
  alternatives_spanish:
  - hojas que giraban
  - hojas basculantes
  - hojas móviles
  lexicon: HALOT
  rationale: La revisión inglesa prefirió "revolving" para reflejar mejor el matiz de giro o pivote. En español, "giratorias" mantiene esa imagen y evita una paráfrasis más amplia como "móviles".
- source_word: קְלָעִים
  english_pob_choice: folding leaves
  chosen_spanish: hojas giratorias
  alternatives_spanish:
  - hojas plegables
  - piezas laterales
  - batientes
  lexicon: HALOT
  rationale: El segundo término raro es paralelo al primero; por eso conservo la misma solución funcional para sostener el paralelismo de la frase hebrea.
- source_word: הַדֶּלֶת הָאַחַת
  english_pob_choice: the one door
  chosen_spanish: la una puerta
  alternatives_spanish:
  - la primera puerta
  - una puerta
  lexicon: HALOT
  rationale: '"La una puerta" reproduce con más cercanía la contraposición hebrea con "la segunda puerta" y mantiene el paralelismo del texto.'
- source_word: הַדֶּלֶת הַשֵּׁנִית
  english_pob_choice: the second door
  chosen_spanish: la segunda puerta
  alternatives_spanish:
  - la otra puerta
  lexicon: HALOT
  rationale: Es la contraparte ordinal directa de la primera cláusula; "la segunda puerta" es claro y fiel.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que cambió "folding leaves" por "revolving leaves" para reflejar mejor el matiz de giro/pivote del hebreo. La versión española adopta "hojas giratorias" para seguir esa revisión sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene "Dios"/"Yahvé" fuera de este versículo, por no aparecer términos divinos en el texto.
  - Se conserva un estilo sobrio y bíblico, pero con sintaxis española natural.
  - Los dos sintagmas raros del hebreo se traducen de manera paralela para preservar la estructura del versículo.
