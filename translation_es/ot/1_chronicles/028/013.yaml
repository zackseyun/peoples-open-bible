translation:
  language: es
  text: para las divisiones de los sacerdotes y de los levitas[a], y para toda la obra del servicio de la casa de Yahvé, y para todos los utensilios[b] del servicio de la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cursos» de los sacerdotes y de los levitas.
    reason: lexical_alternative
  - marker: b
    text: O «artículos» o «implementos» del servicio de la casa de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחְלְקוֹת
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - turnos
  - cursos
  - grupos
  lexicon: HALOT
  rationale: En Crónicas el término apunta a repartos u ორგანიზación por secciones del sacerdocio y levitas. «Divisiones» conserva el sentido administrativo y evita un término demasiado eclesiástico como «cursos» sin perder claridad.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes
  - los clérigos
  lexicon: HALOT
  rationale: El hebreo designa a la clase sacerdotal de Israel. «Sacerdotes» es el equivalente natural en español y mantiene el referente bíblico sin introducir matices posteriores.
- source_word: וְהַלְוִיִּם
  english_pob_choice: and the Levites
  chosen_spanish: y de los levitas
  alternatives_spanish:
  - y los levitas
  - y de los levitas
  lexicon: HALOT
  rationale: Se conserva el nombre tribal/servicial tradicional. La repetición de la preposición en español suena más natural en una coordinación dependiente de «divisiones de… y de…».
- source_word: מְלֶאכֶת
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - labor
  - obra
  lexicon: HALOT
  rationale: Aquí introduce el conjunto de tareas relacionadas con el templo. «Obra» comunica una labor organizada y digna, y funciona bien junto a «servicio» sin sonar redundante.
- source_word: עֲבוֹדַת
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - servicio
  - ministerio
  - labor
  lexicon: HALOT
  rationale: El término es cultual y denota servicio asignado. «Servicio» preserva esa función ritual/templeña sin importar lenguaje eclesiástico ajeno al texto.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahvé
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la metáfora hebrea «casa de YHWH» en vez de sustituirla por «templo», porque el texto habla de la casa de Yahvé como expresión original y recurrente.
- source_word: כְּלֵי
  english_pob_choice: vessels
  chosen_spanish: utensilios
  alternatives_spanish:
  - vasos
  - utensilios
  - implementos
  lexicon: HALOT
  rationale: El término abarca objetos usados en el servicio del templo, no sólo recipientes. «Utensilios» es amplio, claro y adecuado en español para esa categoría funcional.
- source_word: עֲבוֹדַת
  english_pob_choice: service
  chosen_spanish: del servicio
  alternatives_spanish:
  - del servicio
  - de la obra
  - del ministerio
  lexicon: HALOT
  rationale: La construcción hebrea «utensilios de servicio» se refleja mejor en español con una frase nominal directa, evitando ampliar el sentido a «para el servicio» y preservando la relación de pertenencia/función.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrama. Conforme a la convención del proyecto, se traduce como «Yahvé» en vez de ocultarlo tras «SEÑOR», para conservar el nombre de pacto de manera transparente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre «trabajo» y «servicio» en el paralelismo final
  english_pob_reading: the work of the service ... and ... the vessels of service
  chosen_spanish_reading: la obra del servicio ... y ... los utensilios del servicio
  alternative_spanish_readings:
  - la obra del servicio ... y ... los utensilios para el servicio
  - la obra ministerial ... y ... los utensilios ministeriales
  rationale: Se conserva la doble formulación hebrea sin fusionarla. «Obra» y «servicio» reproducen la distinción entre la labor general y el servicio cultual, que el inglés POB también mantuvo.
  doctrine_reference: 'DOCTRINE.md: Temple service terminology — preserve cultic distinction when present'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB que ajustó «vessels for the service» a «vessels of service» para corresponder mejor a la construcción hebrea. En español se reflejó con «utensilios del servicio» y se mantuvo el paralelismo con «la obra del servicio de la casa de Yahvé».
  spanish_consistency_notes:
  - Se usó «Yahvé» consistentemente para יְהוָה.
  - Se prefirió «servicio» para עֲבוֹדָה y se evitó «ministerio».
  - Se mantuvo «casa de Yahvé» en lugar de «templo» para conservar la imagen hebrea.
  - «Divisiones» traduce el sentido organizativo de מַחְלְקוֹת sin recurrir automáticamente a «cursos».
  - La nota sobre «utensilios» preserva la amplitud semántica del hebreo, que incluye objetos de servicio además de recipientes.
