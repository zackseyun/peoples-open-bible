translation:
  language: es
  text: 'Y les dije: «Nosotros hemos rescatado[a] a nuestros hermanos judíos, que habían sido vendidos a las naciones, según nuestras posibilidades. Pero ustedes están vendiendo a sus hermanos, ¿y van a ser vendidos de nuevo a nosotros[b]?». Entonces callaron y no hallaron qué responder.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hemos comprado de vuelta». El verbo hebreo puede expresar compra con valor de rescate en este contexto.
    reason: lexical_alternative
  - marker: b
    text: 'O «¿para que luego nos los vendan a nosotros?». El hebreo es breve y puede leerse como una pregunta retórica que destaca lo absurdo de esa consecuencia: que sus propios hermanos terminen siendo vendidos de vuelta a su mismo pueblo.'
    reason: alternative_reading
lexical_decisions:
- source_word: קָנִינוּ
  english_pob_choice: have bought back
  chosen_spanish: hemos rescatado
  alternatives_spanish:
  - hemos comprado de vuelta
  - hemos redimido
  - hemos recobrado
  lexicon: HALOT
  rationale: En este contexto de liberar a compatriotas vendidos a pueblos extranjeros, «rescatado» comunica la idea de recuperar a precio de compra sin imponer de entrada el matiz técnico-teológico pleno de «redimido». Mantiene la fuerza práctica de la acción y su finalidad liberadora.
- source_word: אַחֵינוּ הַיְּהוּדִים
  english_pob_choice: our Jewish brothers
  chosen_spanish: nuestros hermanos judíos
  alternatives_spanish:
  - nuestros compatriotas judíos
  - nuestros hermanos del pueblo judío
  lexicon: HALOT
  rationale: Se conserva el parentesco masculino plural («hermanos») y el identificador étnico-comunitario («judíos»). Es la correspondencia más directa y natural en español para el hebreo, sin neutralizar innecesariamente el término de parentesco.
- source_word: הַנִּמְכָּרִים לַגּוֹיִם
  english_pob_choice: who were sold to the nations
  chosen_spanish: que habían sido vendidos a las naciones
  alternatives_spanish:
  - que fueron vendidos a las naciones
  - que estaban vendidos a las naciones
  - que habían sido vendidos a los gentiles
  lexicon: HALOT
  rationale: «Las naciones» traduce de forma directa גּוֹיִם en este relato. El pluscuamperfecto en español expresa bien la condición previa de esos hermanos antes del rescate.
- source_word: כְּדֵי בָנוּ
  english_pob_choice: as much as we were able
  chosen_spanish: según nuestras posibilidades
  alternatives_spanish:
  - en la medida de lo que pudimos
  - hasta donde pudimos
  - conforme a nuestros medios
  lexicon: HALOT
  rationale: La expresión hebrea marca capacidad o alcance. «Según nuestras posibilidades» es idiomático en español y conserva la idea de actuar dentro de los recursos disponibles.
- source_word: וְגַם אַתֶּם
  english_pob_choice: But you are even
  chosen_spanish: Pero ustedes están
  alternatives_spanish:
  - Y ustedes también están
  - Pero ustedes mismos están
  - Y aun ustedes están
  lexicon: HALOT
  rationale: Se mantiene el contraste recriminatorio con «Pero». El énfasis de «están» deja abierta la acusación presente; el matiz intensificador de «aun/even» se recoge en el contexto con la siguiente cláusula, donde el acto resulta escandaloso.
- source_word: תִּמְכְּרוּ
  english_pob_choice: are ... selling
  chosen_spanish: vendiendo
  alternatives_spanish:
  - venden
  - están vendiendo
  - venderán
  lexicon: HALOT
  rationale: 'El participio/progresivo en el contexto de la reprensión se expresa con un gerundio acusatorio natural en español: «están vendiendo»; aquí se condensa en la construcción verbal de la frase para mantener fluidez.'
- source_word: וְנִמְכְּרוּ לָנוּ
  english_pob_choice: should they be sold to us?
  chosen_spanish: ¿y deberían ser vendidos a nosotros?
  alternatives_spanish:
  - ¿y se los debería vender a nosotros?
  - ¿y deberían venderlos a nosotros?
  - ¿y serían vendidos a nosotros?
  lexicon: HALOT
  rationale: 'Se conserva la lectura retórica y la ambigüedad del hebreo: no es una simple afirmación, sino la insinuación de lo absurdo de que terminen vendiéndose de vuelta a su propio pueblo. «Deberían ser vendidos a nosotros» sigue de cerca la pregunta inglesa y el tono de reproche.'
- source_word: וַיַּחֲרִישׁוּ
  english_pob_choice: they were silent
  chosen_spanish: callaron
  alternatives_spanish:
  - guardaron silencio
  - se quedaron callados
  - enmudecieron
  lexicon: HALOT
  rationale: Verbo breve y directo que reproduce bien la respuesta inmediata del texto.
- source_word: וְלֹא מָצְאוּ דָּבָר
  english_pob_choice: found nothing to say
  chosen_spanish: no hallaron qué responder
  alternatives_spanish:
  - no encontraron palabra
  - no supieron qué decir
  - no hallaron respuesta
  lexicon: HALOT
  rationale: La locución hebrea expresa falta de respuesta. «No hallaron qué responder» mantiene la naturalidad del español y el sentido idiomático del original.
theological_decisions:
- issue: Traducción del término de parentesco masculino אַחֵינוּ / אַחֵיכֶם
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - compatriotas
  rationale: El hebreo usa el plural masculino de parentesco para miembros de la comunidad. Se mantiene «hermanos» en el texto principal por fidelidad lexical, mientras que el sentido comunitario amplio queda implícito sin neutralizar el término.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El audio de revisión en inglés ajustó la segunda mitad para reflejar mejor el hebreo como una pregunta retórica («should they be sold to us?») y suavizó la primera parte para sonar más natural. La versión española sigue esa revisión, preservando la tensión retórica y evitando una paráfrasis explicativa excesiva.
  spanish_consistency_notes:
  - Se mantiene «naciones» para גּוֹיִם, en línea con la elección inglesa y el uso bíblico general.
  - Se conserva el paralelo «hermanos judíos / sus hermanos» sin ampliar a lenguaje inclusivo no sustentado por el hebreo.
  - La pregunta final se formula como interrogativa retórica para reflejar la ambigüedad del hebreo y la lectura revisada del POB.
  - El estilo general es formal y publicable, con sintaxis natural en español y sin depender de calcos del inglés.
