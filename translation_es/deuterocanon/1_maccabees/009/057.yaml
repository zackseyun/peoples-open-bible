translation:
  language: es
  text: Y Bacquides vio que Alcimo había muerto, y regresó al rey, y la tierra de Judá estuvo en calma por dos años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἶδεν
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - se enteró de
  - percibió
  lexicon: LSJ
  rationale: El aoristo de ὁράω puede extenderse a 'percibir/enterarse', pero aquí la cláusula con ὅτι permite un simple 'vio' en español, natural y cercano al griego narrativo.
- source_word: ἀπέθανεν
  english_pob_choice: had died
  chosen_spanish: había muerto
  alternatives_spanish:
  - murió
  - estaba muerto
  lexicon: LSJ
  rationale: 'El pluscuamperfecto español expresa bien la relación temporal ya aclarada por el contexto narrativo: Bacquides advierte la muerte de Alcimo antes de retirarse.'
- source_word: ἀπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: regresó
  alternatives_spanish:
  - volvió
  - dio la vuelta
  lexicon: LSJ
  rationale: ἀποστρέφω con movimiento de retorno se vierte naturalmente como 'regresó'; mantiene la idea de volver atrás sin añadir matices no presentes.
- source_word: πρὸς τὸν βασιλέα
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - hacia el rey
  - de vuelta al rey
  lexicon: LSJ
  rationale: La preposición πρός con acusativo indica movimiento hacia una persona; en español 'al rey' es la opción idiomática más directa.
- source_word: ἡσύχασεν
  english_pob_choice: was quiet
  chosen_spanish: quedó quieta
  alternatives_spanish:
  - estuvo quieta
  - descansó
  - estuvo en paz
  lexicon: LSJ
  rationale: '''Quedó quieta'' conserva el valor de calma/quietud del verbo sin imponer la carga teológica más fuerte de ''paz'' que el griego aquí no exige.'
- source_word: ἡ γῆ Ἰούδα
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - la tierra de Judea
  - Judá
  lexicon: LSJ
  rationale: Se mantiene 'tierra' para γῆ y 'Judá' para Ἰούδα, siguiendo la forma griega y la continuidad territorial bíblica.
- source_word: ἔτη δύο
  english_pob_choice: for two years
  chosen_spanish: por dos años
  alternatives_spanish:
  - durante dos años
  - dos años
  lexicon: LSJ
  rationale: El acusativo de duración se expresa de modo natural en español con 'por dos años'; mantiene la duración sin sobrecargar la frase.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y quedó sin cambios; el griego y la traducción inglesa están en alto acuerdo, así que el español sigue de cerca la sintaxis y el sentido narrativo sin introducir ampliaciones.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino; aquí no aplica.
  - Se conserva 'Judá' como topónimo territorial, no 'Judea', siguiendo el griego Ἰούδα y la decisión auditada del inglés.
  - Se evita 'paz' para ἡσύχασεν para no cargar el verso con un matiz teológico no explicitado en el texto.
