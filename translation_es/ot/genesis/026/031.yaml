translation:
  language: es
  text: Y madrugaron por la mañana y hicieron juramento el uno al otro; entonces Isaac los despidió[a], y se fueron de su presencia en paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «cada hombre a su hermano», un hebraísmo que aquí expresa juramento mutuo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכִּ֣ימוּ
  english_pob_choice: they rose early
  chosen_spanish: madrugaron
  alternatives_spanish:
  - se levantaron temprano
  - se levantaron de madrugada
  lexicon: HALOT
  rationale: שׁכם en esta forma narrativa expresa levantarse muy temprano. En español, "madrugaron" comunica de forma natural la acción y conserva el valor temporal sin calco pesado.
- source_word: בַבֹּ֔קֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - temprano por la mañana
  lexicon: HALOT
  rationale: בֹּקֶר significa "mañana". Con el verbo anterior, "por la mañana" fluye bien en español y mantiene la secuencia narrativa.
- source_word: וַיִּשָּׁבְע֖וּ
  english_pob_choice: swore to one another
  chosen_spanish: se juraron uno a otro
  alternatives_spanish:
  - juraron entre sí
  - hicieron juramento uno a otro
  lexicon: HALOT
  rationale: El verbo aquí implica prestar juramento mutuo. "Se juraron uno a otro" conserva la reciprocidad y el matiz formal del juramento, sin perder la fluidez en español.
- source_word: אִ֣ישׁ לְ/אָחִ֑י/ו
  english_pob_choice: to one another
  chosen_spanish: uno a otro
  alternatives_spanish:
  - cada uno a su hermano
  - mutuamente
  lexicon: HALOT
  rationale: Literalmente dice "cada hombre a su hermano"; es un hebraísmo idiomático de reciprocidad. En español, "uno a otro" expresa esa mutualidad sin forzar una imagen fraternal literal que el contexto no exige.
- source_word: וַיְשַׁלְּחֵ֣/ם
  english_pob_choice: sent them away
  chosen_spanish: los despidió
  alternatives_spanish:
  - los envió
  - los mandó irse
  lexicon: HALOT
  rationale: שׁלח en piel con sufijo indica enviar/despedir. En este contexto de separación amistosa, "los despidió" reproduce bien el gesto de dejar partir a los visitantes y su tono cordial.
- source_word: וַיֵּלְכ֥וּ מֵ/אִתּ֖/וֹ
  english_pob_choice: they departed from him
  chosen_spanish: se fueron de él
  alternatives_spanish:
  - partieron de él
  - se alejaron de él
  lexicon: HALOT
  rationale: הלך con מן/מאת señala movimiento alejándose de alguien. "Se fueron de él" es natural y mantiene el sentido de salida/partida desde su presencia.
- source_word: בְּ/שָׁלֽוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - pacíficamente
  lexicon: HALOT
  rationale: שָׁלוֹם aquí expresa una partida sin conflicto, en buenas relaciones y con seguridad. "En paz" preserva esa amplitud semántica mejor que un adverbio meramente circunstancial.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de una redacción más literal («swore an oath, each man to his brother») a una formulación más natural («swore to one another»). La propuesta española sigue esa revisión y, a la vez, conserva en nota el hebraísmo subyacente que el hebreo documenta.
  spanish_consistency_notes:
  - Se mantiene el nombre divino según la convención del proyecto cuando no aparece en este versículo.
  - '"En paz" conserva el valor relacional y situacional de שָׁלוֹם.'
  - No se ha neutralizado indebidamente el hebraísmo de mutualidad; se explica en nota para audibilidad textual.
