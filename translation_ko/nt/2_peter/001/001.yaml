id: 2PE.1.1
reference: 2 Peter 1:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀Συμεὼν Πέτρος δοῦλος καὶ ἀπόστολος Ἰησοῦ Χριστοῦ τοῖς ἰσότιμον ἡμῖν λαχοῦσιν πίστιν ἐν δικαιοσύνῃ τοῦ θεοῦ ἡμῶν καὶ σωτῆρος Ἰησοῦ Χριστοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/001/001.yaml
  text: 'Simeon Peter[a], a slave and apostle of Jesus Messiah[d][c][b], to those who have obtained a faith as precious as ours in the righteousness of our God and Savior Jesus Messiah:'
  footnotes:
  - marker: a
    text: Or 'a faith of equal standing with ours.' The adjective can emphasize equal value, honor, or privilege.
    reason: lexical_alternative
  - marker: b
    text: Or 'through the righteousness' or 'by the righteousness.' The preposition may express sphere or means.
    reason: lexical_alternative
  - marker: c
    text: The Greek most naturally reads 'our God and Savior Jesus Messiah' as one referent, identifying Jesus as both God and Savior. A less likely alternative is 'our God and the Savior Jesus Messiah,' referring to two persons.
    reason: alternative_reading
  - marker: d
    text: Or 'equally precious with ours'.
    reason: previous_rendering
translation:
  language: ko
  text: '예수 메시아의 노예이자 사도인 시몬 베드로[a]는, 우리 하나님이시며 구주이신 예수 메시아[c][b]의 의 안에서 우리와 동등하게 귀한 믿음을 받은 자들에게 편지합니다:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 본문(SBLGNT)은 「Συμεών(시므온)」으로 읽으나, 본 번역은 한국 독자에게 친숙한 「시몬」을 본문에 두고 음역상 「시므온」도 허용한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「종」. 헬라어 δοῦλος는 매임(bonded status)을 본질로 가지며, 「사도」와 짝지어 자기를 소개하는 본문에서 예수 메시아께 전적으로 매인 자임을 강하게 드러낸다. DOCTRINE.md §1에 따라 「노예」로 옮긴다.
    reason: lexical_alternative
  - marker: c
    text: 헬라어 τοῦ θεοῦ ἡμῶν καὶ σωτῆρος Ἰησοῦ Χριστοῦ는 단 하나의 관사(τοῦ)가 두 단수 인격 명사(하나님·구주)를 묶는 그랜빌-샤프 구문으로, 자연스럽게 「우리 하나님이시며 구주이신 예수 메시아」 한 분을 가리킨다. 「우리 하나님과, 구주이신 예수 메시아」(두 인격)로 읽을 수 있는 가능성도 있으나, 헬라어 문법은 단일 지시를 강하게 지지한다.
    reason: alternative_reading
lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_korean: 노예
  alternatives_korean:
  - 종
  - 하인
  lexicon: BDAG
  rationale: 베드로후서 1:1의 자기 소개에서 δοῦλος는 사도와 짝지어 예수 메시아께 매인 자라는 정체성을 강하게 드러낸다. 한국 전통의 「종」은 친숙하지만 매임의 무게를 약화시키므로, DOCTRINE.md §1에 따라 「노예」로 옮긴다.
- source_word: Συμεών
  english_pob_choice: Simeon
  chosen_korean: 시몬
  alternatives_korean:
  - 시므온
  lexicon: BDAG
  rationale: SBLGNT는 Συμεών(시므온)으로 읽지만, 한국 독자에게는 「시몬 베드로」가 압도적으로 친숙하다. 본문은 「시몬」, 각주에 「시므온」을 둔다.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_korean: 예수 메시아
  alternatives_korean:
  - 예수 그리스도
  lexicon: BDAG
  rationale: Χριστός는 본래 칭호이며, 베드로후서 1:1의 자기 소개 정식에서도 칭호성이 살아 있다. 한국 전통의 「그리스도」 음역은 칭호성을 가리므로 「메시아」로 옮긴다.
- source_word: ἰσότιμον ... πίστιν
  english_pob_choice: a faith as precious as ours
  chosen_korean: 우리와 동등하게 귀한 믿음
  alternatives_korean:
  - 우리와 같은 가치의 믿음
  - 우리와 같은 신분의 믿음
  lexicon: BDAG
  rationale: ἰσότιμος는 같은 가치·영예·특권을 뜻한다. 「동등하게 귀한」은 사도들의 믿음과의 동등성을 한국어로 자연스럽게 전달한다.
- source_word: σωτήρ
  english_pob_choice: Savior
  chosen_korean: 구주
  alternatives_korean:
  - 구원자
  lexicon: BDAG
  rationale: 신약 인사 정식에서 σωτήρ는 칭호적 「구주」로 굳어져 있다.
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_korean: 의
  alternatives_korean:
  - 정의
  lexicon: BDAG
  rationale: 신약 구원론적 문맥의 기본 등가어 「의」를 채택한다.
theological_decisions:
- issue: 1:1의 δοῦλος를 매임을 드러내는 강한 어휘로 번역
  chosen_reading: 노예
  alternative_readings:
  - 종
  - 하인
  rationale: DOCTRINE.md §1은 δοῦλος를 신학적으로 매임의 무게가 드러나야 할 본문에서 「slave」로 옮기도록 지시한다. 베드로의 사도적 자기 소개는 그 본보기로, 「종」의 친숙함을 따르면 본문이 의도한 전적 소속의 무게가 약화된다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Contested terms table for δοῦλος'
- issue: τοῦ θεοῦ ἡμῶν καὶ σωτῆρος Ἰησοῦ Χριστοῦ — 한 인격(예수)인가, 두 인격(아버지와 예수)인가
  chosen_reading: '한 인격: 예수께서 「우리 하나님이시며 구주」로 불리신다'
  alternative_readings:
  - '두 인격: 「우리 하나님」과 「구주이신 예수 메시아」'
  rationale: 한 개의 관사 τοῦ가 두 단수 인격 명사 θεοῦ와 σωτῆρος를 καί로 묶는 그랜빌-샤프 구문은 코이네 헬라어에서 단일 지시를 강하게 지지한다. 두 인격 독해는 문법적으로 덜 자연스럽지만, 기독론적 중요성 때문에 각주로 보존한다.
  doctrine_reference: Nicene Creed; Chalcedon; Translation philosophy §3
