source:
  edition: SBLGNT
  text: Μνημονεύετε γάρ, ἀδελφοί, τὸν κόπον ἡμῶν καὶ τὸν μόχθον· ⸀νυκτὸς καὶ ἡμέρας ἐργαζόμενοι πρὸς τὸ μὴ ἐπιβαρῆσαί τινα ὑμῶν ἐκηρύξαμεν εἰς ὑμᾶς τὸ εὐαγγέλιον τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/009.yaml
  text: 'For you remember[a], brothers, our labor and hardship: working night and day so as not to burden any of you, we proclaimed to you the gospel of God.'
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and may address the whole congregation inclusively.
    reason: lexical_alternative
translation:
  language: ko
  text: 형제[a] 여러분, 여러분은 우리의 수고와 노고를 기억하고 계십니다. 우리는 여러분 중 누구에게도 짐이 되지 않으려고 밤낮으로 일하면서 여러분에게 하나님의 복음을 선포하였습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀδελφοί는 남성 복수형이나 바울 서신에서는 공동체 전체를 가리키는 경우가 많다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν κόπον ἡμῶν καὶ τὸν μόχθον
  english_pob_choice: our labor and hardship
  chosen_korean: 우리의 수고와 노고
  alternatives_korean:
  - 우리의 노고와 고생
  - 우리의 수고와 고된 일
  lexicon: BDAG
  rationale: κόπος-μόχθος 짝은 노동의 고됨을 강조하는 정형 어구. 「수고와 노고」가 두 어휘를 자연스럽게 구분한다.
- source_word: νυκτὸς καὶ ἡμέρας
  english_pob_choice: night and day
  chosen_korean: 밤낮으로
  alternatives_korean:
  - 밤과 낮으로
  - 밤이고 낮이고
  lexicon: BDAG
  rationale: 한국어 정형 어구.
- source_word: ἐκηρύξαμεν
  english_pob_choice: proclaimed
  chosen_korean: 선포하였습니다
  alternatives_korean:
  - 전하였습니다
  - 외쳤습니다
  lexicon: BDAG
  rationale: κηρύσσω의 「공적 선포」 의미. 「선포하다」가 일반 「전하다」보다 사도적 사역의 무게를 살린다.
