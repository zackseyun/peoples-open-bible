translation:
  language: es
  text: Porque con razón avergonzaríamos a nuestros antepasados si no nos sirviéramos de la obediencia a la ley para consejo y entendimiento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nos avergonzaríamos ante nuestros antepasados si no hiciéramos uso de la obediencia a la ley para consejo y discernimiento».'
    reason: alternative_reading
lexical_decisions:
- source_word: αἰσχυνόμεθα
  english_pob_choice: we would rightly shame
  chosen_spanish: avergonzaríamos
  alternatives_spanish:
  - daríamos vergüenza
  - haríamos avergonzar
  lexicon: LSJ
  rationale: El verbo griego admite el valor de causar vergüenza o deshonra a otro; con τοὺς προγόνους, el sentido no es solo sentir vergüenza interior, sino traer deshonra sobre los antepasados. En español, «avergonzaríamos» conserva ese efecto relacional.
- source_word: προγόνους
  english_pob_choice: our ancestors
  chosen_spanish: nuestros antepasados
  alternatives_spanish:
  - nuestros ancestros
  - nuestros padres
  lexicon: LSJ
  rationale: «Antepasados» comunica generaciones previas con dignidad y naturalidad en español moderno, sin arcaísmo innecesario.
- source_word: εἰκότως
  english_pob_choice: rightly
  chosen_spanish: con razón
  alternatives_spanish:
  - justamente
  - de manera justa
  lexicon: LSJ
  rationale: La idea es de conveniencia y justificación moral. «Con razón» expresa bien la legitimidad del juicio sin forzar una abstracción excesiva.
- source_word: τῇ τοῦ νόμου εὐπειθείᾳ
  english_pob_choice: obedience to the law
  chosen_spanish: la obediencia a la ley
  alternatives_spanish:
  - la docilidad a la ley
  - el acatamiento de la ley
  lexicon: LSJ
  rationale: «εὐπειθεία» es disposición a obedecer; «obediencia a la ley» es la equivalencia más clara y fiel en español. Mantiene el centro ético-legal del pasaje.
- source_word: συμβούλῳ
  english_pob_choice: as counsel
  chosen_spanish: como consejo
  alternatives_spanish:
  - como consejera
  - como consejero
  lexicon: LSJ
  rationale: El dativo con χρησαίμεθα expresa el uso de algo en una función. Aquí conviene no personificar demasiado; «como consejo» refleja la función directiva del término.
- source_word: γνώσει
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - conocimiento
  lexicon: LSJ
  rationale: Aunque γνῶσις puede ser «conocimiento», en esta pareja con συμβούλῳ apunta a una capacidad práctica de juicio. «Entendimiento» equilibra fidelidad y naturalidad en español.
- source_word: χρησαίμεθα
  english_pob_choice: we did not make use of
  chosen_spanish: nos sirviéramos de
  alternatives_spanish:
  - hiciéramos uso de
  - nos aprovecháramos de
  lexicon: LSJ
  rationale: El aoristo medio subjuntivo con εἰ μή presenta una acción hipotética contraria al deber. «Nos sirviéramos de» conserva el matiz instrumental de «hacer uso de» y suena idiomático en español.
theological_decisions:
- issue: Relación moral con los antepasados en αἰσχυνόμεθα ... τοὺς προγόνους
  english_pob_reading: The speaker says failure to obey the law would disgrace their ancestors.
  chosen_spanish_reading: El hablante dice que no obedecer la ley avergonzaría a sus antepasados.
  alternative_spanish_readings:
  - El hablante dice que se avergonzaría ante sus antepasados si no obedeciera la ley.
  - El hablante dice que deshonraría a sus antepasados si no obedeciera la ley.
  rationale: El acusativo τοὺς προγόνους sugiere que ellos son los afectados por la vergüenza. La formulación elegida mantiene esa carga de deshonra hereditaria sin reducirla a un mero sentimiento interior.
  doctrine_reference: Fidelidad a la tradición recibida y responsabilidad moral intergeneracional en el discurso martirial.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: evita personificar en exceso συμβούλῳ, traduce γνώσει con un término de capacidad práctica, y conserva la lectura fuerte de αἰσχυνόμεθα como deshonra hacia los antepasados. También toma en cuenta el marcador de lectura alternativa preservado en el texto inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - «Ley» se mantiene de manera uniforme para νόμος.
  - «Antepasados» conserva el valor histórico-familiar de προγόνους sin arcaísmo.
  - La construcción «como consejo y entendimiento» refleja la pareja instrumental sin añadir pronombres posesivos no presentes en el griego.
