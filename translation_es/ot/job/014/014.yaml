translation:
  language: es
  text: Si un hombre muere, ¿volverá a vivir? Todos los días de mi duro servicio esperaría, hasta que llegue mi alivio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi cambio». El término hebreo puede significar «cambio», «alivio» o «renovación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: Introduce una condición interrogativa, conservando el planteamiento hipotético del hebreo y el tono retórico de la pregunta.
- source_word: יָמוּת
  english_pob_choice: dies
  chosen_spanish: muere
  alternatives_spanish:
  - muriera
  - llegara a morir
  lexicon: HALOT
  rationale: El imperfecto en este contexto funciona como condición general; en español, el presente simple expresa con naturalidad esa condición sin añadir matices no presentes en el hebreo.
- source_word: גֶּבֶר
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - un ser humano
  lexicon: HALOT
  rationale: '''Gever'' designa al hombre individual, con colorido de humanidad mortal y vigor; ''un hombre'' es natural en español y conserva la forma singular masculina.'
- source_word: הֲיִחְיֶה
  english_pob_choice: will he live again?
  chosen_spanish: ¿volverá a vivir?
  alternatives_spanish:
  - ¿vivirá otra vez?
  - ¿puede vivir de nuevo?
  lexicon: HALOT
  rationale: El hebreo pregunta si hay vida después de la muerte; 'volverá a vivir' comunica esa idea con naturalidad sin sobrecargar el texto con una formulación doctrinal.
- source_word: כָּל יְמֵי
  english_pob_choice: All the days of
  chosen_spanish: Todos los días de
  alternatives_spanish:
  - Durante todos los días de
  lexicon: HALOT
  rationale: Mantiene el valor distributivo temporal de la expresión hebrea de manera clara y fiel.
- source_word: צְבָאִי
  english_pob_choice: my hard service
  chosen_spanish: mi dura servidumbre
  alternatives_spanish:
  - mi arduo servicio
  - mi servicio penoso
  - mi dura milicia
  lexicon: HALOT
  rationale: La raíz puede aludir a servicio fijado, labor dura o imagen militar. 'Dura servidumbre' preserva la idea de un término de vida penoso y asignado, sin imponer una imagen militar que el contexto no exige en español.
- source_word: אֲיַחֵל
  english_pob_choice: I would wait
  chosen_spanish: esperaría
  alternatives_spanish:
  - esperaré
  - aguardaría
  - tendría esperanza
  lexicon: HALOT
  rationale: El verbo admite 'esperar' y 'esperar con esperanza'; aquí el foco está en la espera paciente dentro del paralelismo, por lo que 'esperaría' suena natural y mantiene la fuerza modal del contexto.
- source_word: עַד בּוֹא
  english_pob_choice: until ... comes
  chosen_spanish: hasta que llegue
  alternatives_spanish:
  - hasta que venga
  - hasta la llegada de
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo se vierte de forma idiomática como cláusula temporal en español.
- source_word: חֲלִיפָתִי
  english_pob_choice: my relief
  chosen_spanish: mi alivio
  alternatives_spanish:
  - mi cambio
  - mi relevo
  - mi renovación
  lexicon: HALOT
  rationale: El término puede significar cambio, reemplazo, renovación o alivio. En el contexto de Job, la revisión inglesa reciente prefirió 'relief' para subrayar la liberación del peso de la aflicción; 'alivio' reproduce bien esa idea en español sin cerrar indebidamente la tensión semántica.
theological_decisions:
- issue: Si el verso debe sonar como una afirmación doctrinal de resurrección o como una pregunta retórica abierta sobre una posible renovación/descanso tras la muerte.
  english_pob_reading: The main text preserves the rhetorical question ('will he live again?') and renders חֲלִיפָתִי as 'my relief' without making the verse a dogmatic assertion of resurrection.
  chosen_spanish_reading: El texto principal conserva la pregunta retórica ('¿volverá a vivir?') y traduce חֲלִיפָתִי como 'mi alivio', sin convertir el versículo en una afirmación dogmática de resurrección.
  alternative_spanish_readings:
  - '''mi cambio'' para dejar aún más abierta la ambigüedad'
  - '''mi resurrección'' para explicitar una lectura doctrinal'
  rationale: 'La traducción debe preservar la tensión del verso: Job expresa esperanza condicionada y anhelo de liberación, no una definición cerrada de la resurrección. ''Alivio'' permite esa apertura y sigue la línea de la revisión inglesa más reciente.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa base pasó de 'my renewal' a 'my relief' en la revisión más reciente para ajustar mejor חֲלִיפָתִי al contexto de liberación del sufrimiento. La redacción española sigue esa decisión revisada y mantiene la pregunta retórica y el tempo del verso.
  spanish_consistency_notes:
  - Se usa 'un hombre' para גֶּבֶר y no 'ser humano' para conservar la referencia singular masculina del hebreo.
  - '''Servidumbre'' se emplea para צְבָאִי porque refleja un servicio/término impuesto y penoso; evita una traducción militarizada innecesaria.'
  - '''Alivio'' deja abierta la tensión entre cambio, liberación y posible renovación, en línea con el audit trail inglés.'
  - La nota al pie preserva la alternativa lexical principal ('cambio') sin resolver la ambigüedad semántica del hebreo.
