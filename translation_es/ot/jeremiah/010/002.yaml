translation:
  language: es
  text: 'Así dice Yahvé: No aprendan el camino de las naciones, ni se aterren por las señales de los cielos[a], porque las naciones se aterran por ellas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No se aterren por las señales de los cielos ... porque las naciones se aterran por ellas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: transliteración reverente del Tetragrámaton, no el ocultamiento en una convención de mayúsculas. «Yahvé» es el equivalente español establecido en estos lineamientos.'
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: Fórmula profética breve y solemne. «Así dice» conserva el registro oracular natural en español y el valor formal de la introducción.
- source_word: דֶּרֶךְ הַגּוֹיִם
  english_pob_choice: the way of the nations
  chosen_spanish: el camino de las naciones
  alternatives_spanish:
  - la manera de las naciones
  - la senda de las naciones
  lexicon: HALOT
  rationale: «Camino» mantiene tanto la idea de conducta/práctica como la imagen original. «Naciones» preserva el sentido amplio de גּוֹיִם sin cargarlo con asociaciones posteriores de «gentiles».
- source_word: תִּלְמָדוּ
  english_pob_choice: Do not learn
  chosen_spanish: No aprendan
  alternatives_spanish:
  - No imiten
  - No adopten
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente «aprender». Se conserva esa fuerza directa, dejando que el contexto dé el matiz de adoptar prácticas ajenas.
- source_word: מֵאֹתוֹת הַשָּׁמַיִם
  english_pob_choice: by the signs of the heavens
  chosen_spanish: por las señales de los cielos
  alternatives_spanish:
  - ante las señales del cielo
  - a causa de las señales celestes
  lexicon: HALOT
  rationale: «Señales» expresa היטב אֹתוֹת en sentido de signos/augurios. «Cielos» traduce literalmente הַשָּׁמַיִם y conserva el plural reverente del hebreo, más que nivelarlo a «cielo».
- source_word: תֵּחָתּוּ / יֵחַתּוּ
  english_pob_choice: be dismayed / are dismayed
  chosen_spanish: se espanten / se espantan
  alternatives_spanish:
  - se conmuevan / se conmueven
  - se acobarden / se acobardan
  lexicon: HALOT
  rationale: חתת puede abarcar desmayo, quebranto o miedo. En este contexto de señales astrales ominosas, «espantarse» comunica bien la reacción de sobresalto y temor sin forzar un término técnico menos natural en español.
- source_word: מֵהֵמָּה
  english_pob_choice: by them
  chosen_spanish: por ellas
  alternatives_spanish:
  - a causa de ellas
  - ante ellas
  lexicon: HALOT
  rationale: El pronombre retoma «las señales de los cielos». «Por ellas» funciona de manera natural con «se espantan» y conserva la relación causal/mediadora del hebreo.
theological_decisions:
- issue: Renderización de יְהוָה en un oráculo profético
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre del pacto de Dios en forma audible, siguiendo la decisión del proyecto de no sustituirlo por una máscara litúrgica. La elección es coherente con la lectura fuente-céntrica del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de גּוֹיִם en Jeremías
  english_pob_reading: nations
  chosen_spanish_reading: naciones
  alternative_spanish_readings:
  - gentiles
  - pueblos
  rationale: «Naciones» es el equivalente más neutro y cercano al hebreo en este contexto profético. Evita introducir un registro eclesial posterior que no está en el hebreo.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition'
- issue: Valor de אֹתוֹת הַשָּׁמַיִם
  english_pob_reading: signs of the heavens
  chosen_spanish_reading: señales de los cielos
  alternative_spanish_readings:
  - signos del cielo
  - augurios celestes
  rationale: «Señales» mantiene la ambigüedad entre signos visibles y presagios. «Los cielos» conserva la forma hebrea plural; en español puede sonar más elevado que «el cielo», sin perder claridad.
  doctrine_reference: 'Translation philosophy: lexical transparency and source-form preservation'
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo directamente y toma en cuenta la revisión inglesa más reciente, que prefirió «dismayed» sobre «terrified» para חתת. En español se buscó un equivalente natural que conserve el matiz de sobresalto y temor; por eso se eligió «se espanten», más cercano a la reacción descrita que a un término excesivamente formal. También se respetó la decisión del audit trail de conservar «nations» como «naciones» y de traducir el nombre divino como Yahvé, no como una máscara tipográfica.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - «Naciones» se usó de forma uniforme para גּוֹיִם.
  - Se conservó el plural «cielos» para הַשָּׁמַיִם, en línea con la forma hebrea.
  - La repetición de «se espantan» reproduce la correspondencia entre la prohibición y la razón final del versículo.
