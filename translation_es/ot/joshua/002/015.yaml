translation:
  language: es
  text: Entonces los bajó con una cuerda por la ventana, porque su casa estaba en el muro de la ciudad[a], y ella habitaba en el muro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su casa estaba sobre la muralla de la ciudad, y ella vivía sobre la muralla». El hebreo describe su vivienda como situada en/dentro de la estructura del muro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתּוֹרִדֵם
  english_pob_choice: Then she let them down
  chosen_spanish: Entonces la bajó
  alternatives_spanish:
  - Entonces los dejó bajar
  - Entonces los descendió
  lexicon: HALOT
  rationale: El verbo causativo de ירד expresa hacer bajar; en español, «bajar» en forma transitiva comunica con naturalidad la acción de descender a los espías mediante la cuerda, preservando el valor causativo sin endurecer el estilo.
- source_word: בַּחֶבֶל
  english_pob_choice: by a rope
  chosen_spanish: con una cuerda
  alternatives_spanish:
  - por una cuerda
  - mediante una cuerda
  lexicon: HALOT
  rationale: חֶבֶל significa «cuerda, cordel». En español, «con una cuerda» transmite el instrumento de manera natural; «por una cuerda» sonaría menos idiomático aquí.
- source_word: בְּעַד הַחַלּוֹן
  english_pob_choice: through the window
  chosen_spanish: por la ventana
  alternatives_spanish:
  - a través de la ventana
  - por la abertura de la ventana
  lexicon: HALOT
  rationale: בְּעַד indica paso a través de una abertura. «Por la ventana» es la forma más natural y directa en español, y mantiene la imagen del paso al exterior.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Aquí introduce la explicación de por qué pudo sacarlos por la ventana. «Porque» es la equivalencia más clara y corriente en español.
- source_word: בֵיתָהּ בְּקִיר הַחוֹמָה
  english_pob_choice: her house was in the wall of the city
  chosen_spanish: su casa estaba en el muro de la ciudad
  alternatives_spanish:
  - su casa estaba en la muralla de la ciudad
  - su casa estaba dentro del muro de la ciudad
  lexicon: HALOT
  rationale: La expresión hebrea sitúa la casa en/contra la estructura defensiva. «Muro de la ciudad» conserva la referencia estructural sin forzar una interpretación arquitectónica más precisa de lo que el hebreo garantiza. «Muralla» sería posible, pero «muro» deja visible la relación física con la pared fortificada.
- source_word: וּבַחוֹמָה הִיא יוֹשָׁבֶת
  english_pob_choice: and she was living in the wall
  chosen_spanish: y ella habitaba en el muro
  alternatives_spanish:
  - y ella vivía en el muro
  - y ella moraba en el muro
  lexicon: HALOT
  rationale: יוֹשָׁבֶת indica residencia continua. «Habitaba» conserva el sentido durativo y suena sobrio en registro bíblico contemporáneo. Mantener «en el muro» refleja la repetición enfática del hebreo y su tensión descriptiva.
translation_notes:
  revision_awareness: Se tomó como base la última revisión inglesa, que prefirió «in the wall of the city» sobre una formulación más interpretativa como «built into the wall». En español se evitó sobreespecificar la arquitectura; se conservó la repetición del hebreo con «en el muro» / «en el muro» para reflejar la insistencia del texto. La nota al pie preserva la ambigüedad instrumental de la frase hebrea sobre la cuerda y la ventana.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto en este proyecto, pero el versículo no contiene el nombre divino.
  - Se evitó «Señor» porque no corresponde a este pasaje.
  - Se eligió «muro» para mantener la conexión física con la fortificación; «muralla» queda como alternativa válida pero menos literal al doble uso hebreo de חוֹמָה.
  - Se mantuvo la repetición final «en el muro» para no suavizar la tensión descriptiva del hebreo.
  - La puntuación sigue el patrón narrativo español con coma antes de la explicación causal.
