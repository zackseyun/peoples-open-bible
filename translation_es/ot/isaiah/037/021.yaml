  yaml_path: translation/ot/isaiah/037/021.yaml
  text: 'Then Isaiah son of Amoz sent to Hezekiah[a], saying, “Thus says Yahweh[b], the God of Israel: Because you have prayed to me concerning Sennacherib king of Assyria,”'
  footnotes:
