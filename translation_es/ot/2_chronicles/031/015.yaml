  rationale: Se mantiene el texto principal casi intacto, con un ajuste ortográfico menor en «Edén» y, sobre todo, con la adición de la nota cultural en «sus hermanos» para conservar una aclaración presente en el expediente inglés y útil en español. También se mejora la naturalidad de la nota alternativa sobre וְעַל־יָדוֹ.
