  to: Samlá murió[a], y Shaúl de Rejobot junto al Río reinó en su lugar.
  rationale: Se corrige «Saúl» a «Shaúl» para preservar la distinción onomástica documentada en la auditoría POB y evitar confusión con el rey israelita posterior. También se simplifica la frase geográfica quitando la coma para que «de Rejobot junto al Río» funcione mejor como designación de procedencia/topónimo compuesto, sin alterar la nota sobre la posible referencia al Éufrates.
