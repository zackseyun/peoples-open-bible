translation:
  language: es
  text: 'Entonces entraron adonde estaba el rey Ezequías y dijeron[a]: «Hemos purificado toda la casa de Yahvé, el altar del holocausto y todos sus utensilios, y la mesa de las hileras[b] y todos sus utensilios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le dijeron»; la frase introduce el informe que presentaron al rey.
    reason: claridad_estilistica
  - marker: b
    text: O «la mesa de los panes de la Presencia», es decir, la mesa para el pan dispuesto en hileras delante de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ פְנִימָה
  english_pob_choice: Then they went in
  chosen_spanish: Entonces entraron a la presencia
  alternatives_spanish:
  - Entonces fueron hacia el interior
  - Entonces entraron dentro
  lexicon: HALOT
  rationale: El hebreo indica movimiento hacia adentro; en español, «entraron a la presencia» comunica naturalmente que se presentaron ante el rey, sin perder la idea de ingreso al recinto interior. Se evita un calco rígido como «fueron dentro».
- source_word: טִהַרְנוּ
  english_pob_choice: we have cleansed
  chosen_spanish: hemos purificado
  alternatives_spanish:
  - hemos limpiado ritualmente
  - hemos limpiado
  lexicon: HALOT
  rationale: En contexto de templo, el verbo tiene sentido ritual/cultual. «Purificado» preserva ese valor mejor que una limpieza meramente física, y es un equivalente natural en español bíblico contemporáneo.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahvé Dios
  lexicon: HALOT
  rationale: Se mantiene la metáfora hebrea «casa de Yahvé» y el nombre divino según el estándar del proyecto. «Templo» sería interpretativo; aquí conviene conservar la expresión original.
- source_word: מִזְבַּח הָעֹלָה
  english_pob_choice: the altar of burnt offering
  chosen_spanish: el altar del holocausto
  alternatives_spanish:
  - el altar de los holocaustos
  - el altar del sacrificio quemado
  lexicon: HALOT
  rationale: «Ofrenda quemada» sería más literal, pero en español bíblico «holocausto» sigue siendo la forma cultual estable para este altar. Se usa como término técnico, no en sentido moderno desvinculado.
- source_word: כֵּלָיו
  english_pob_choice: its utensils
  chosen_spanish: sus utensilios
  alternatives_spanish:
  - sus vasos
  - sus instrumentos
  lexicon: HALOT
  rationale: '«Utensilios» reproduce bien el campo semántico de כֵּלִים en contexto del santuario: implementos, recipientes y objetos de servicio. «Vasos» sería demasiado estrecho.'
- source_word: שֻׁלְחַן הַמַּעֲרֶכֶת
  english_pob_choice: the table of the rows
  chosen_spanish: la mesa de las hileras
  alternatives_spanish:
  - la mesa del arreglo
  - la mesa de los panes dispuestos
  lexicon: HALOT
  rationale: La expresión hebrea alude a los panes colocados en filas/orden. «Hileras» conserva el elemento visual y evita importar en el texto principal la expresión tradicional «showbread», que no es transparente. «Mesa» es una opción natural en español para שֻׁלְחָן.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'Se sigue el estándar del proyecto: renderizar el nombre propio divino con transliteración, no con sustitución titulada. «Yahvé» mantiene la referencia directa al nombre del pacto y evita ocultarlo tras un título.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La base inglesa fue revisada para preferir «went in» y «the table of the rows»; el español refleja esas decisiones con una formulación natural («entraron a la presencia», «la mesa de las hileras») sin volver a la tradición opaca de «showbread». También se conserva la transliteración del nombre divino según la directriz doctrinal del proyecto.
  spanish_consistency_notes:
  - Se mantiene el tono narrativo sobrio y formal.
  - No se introduce una nota textual porque el pasaje no presenta una variante significativa en el paquete fuente.
  - «Casa de Yahvé» se conserva como expresión cultual estable del proyecto.
  - «Holocausto» se usa en sentido técnico bíblico, no como término litúrgico moderno.
