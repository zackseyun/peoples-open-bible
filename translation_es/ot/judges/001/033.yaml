review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: Neftalí no expulsó a los habitantes de dos ciudades, vivió entre los cananeos, y esos habitantes quedaron sometidos a מַס. Conserva correctamente la apposición ''los habitantes de la tierra'' y el valor colectivo de ''los cananeos''. Sin embargo, la cláusula final ''les quedaron como trabajo forzado'' no refleja con suficiente naturalidad ni precisión ''fueron/llegaron a ser para ellos trabajo forzado'' y suena idiomáticamente débil en español.'
  spanish_quality_summary: 'El español es generalmente claro y legible, con buen registro bíblico moderno. No obstante, hay dos problemas de calidad: 1) el anclaje de la nota [a] está colocado en ''Bet-semes'', pero la nota trata de מַס/trabajo forzado al final del versículo; 2) ''les quedaron como trabajo forzado'' es poco natural. Conviene reformular a ''llegaron a ser trabajo forzado para ellos'' o equivalente.'
  glossary_alignment: No hay términos del glosario maestro especialmente conflictivos aquí. 'Expulsó', 'los habitantes', y 'los cananeos' están bien alineados con las decisiones del audit trail. 'Trabajo forzado' preserva correctamente מַס como corvée/servicio obligatorio. Los topónimos transliterados son aceptables en español.
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada al topónimo equivocado.
    rationale: La nota explica מַס ('trabajo forzado/corvée'), pero el marcador aparece en 'Bet-semes'. Esto rompe la trazabilidad exigida entre nota y palabra/frase relevante del texto.
  - severity: medium
    issue: La frase 'les quedaron como trabajo forzado' es poco natural y no representa bien הָיוּ לָהֶם לָמַס.
    rationale: Aunque intenta reflejar היה + ל, en español suena forzado y ambiguo. Una formulación como 'llegaron a ser trabajo forzado para ellos' conserva mejor el sentido de sometimiento a labor obligatoria.
  - severity: low
    issue: La adversativa 'sino que' puede sonar algo interpretativa.
    rationale: El hebreo usa simplemente waw consecutivo con consecuencia narrativa. No es una infidelidad grave, pero 'así que vivió entre' o 'y vivió entre' refleja mejor la progresión narrativa del audit trail inglés.
  revised_spanish_text: Neftalí no expulsó a los habitantes de Bet-semes ni a los habitantes de Bet-anat, así que vivió entre los cananeos, los habitantes de la tierra. Y los habitantes de Bet-semes y de Bet-anat llegaron a ser trabajo forzado[a] para ellos.
  revised_footnotes:
  - marker: a
    text: O “llegaron a quedar sujetos a corvée para ellos”. El hebreo מַס se refiere a trabajo obligatorio, no solo al pago de tributo.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que recaiga sobre 'trabajo forzado', que es el término explicado por la nota. También se reemplaza 'les quedaron como trabajo forzado' por 'llegaron a ser trabajo forzado para ellos', una formulación más natural y más fiel a הָיוּ לָהֶם לָמַס. Además, 'así que vivió entre' refleja mejor la consecuencia narrativa señalada en el audit trail inglés.
