translation:
  language: es
  text: Y pondré fin al bullicio de tus cantos, y el sonido de tus liras[a] no se oirá más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus arpas». El hebreo כִּנּוֹר se refiere a un instrumento de cuerda que a menudo se identifica como lira.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁבַּתִּי
  english_pob_choice: And I will put an end to
  chosen_spanish: haré cesar
  alternatives_spanish:
  - pondré fin a
  - haré terminar
  lexicon: HALOT
  rationale: 'El hifil de שׁבת es causativo: no solo «descansar», sino «hacer cesar / poner fin». «Haré cesar» conserva esa fuerza activa y suena natural en español bíblico contemporáneo.'
- source_word: הֲמוֹן
  english_pob_choice: the noise
  chosen_spanish: el bullicio
  alternatives_spanish:
  - el ruido
  - el estruendo
  - la algarabía
  lexicon: HALOT
  rationale: En el contexto de cantos e instrumentos, la idea es el sonido colectivo y animado, no una «multitud». «Bullicio» comunica bien el matiz de ruido sonoro y concurrido sin perder la referencia acústica.
- source_word: שִׁירָיִךְ
  english_pob_choice: your songs
  chosen_spanish: tus cantos
  alternatives_spanish:
  - tus canciones
  - tu canto
  lexicon: HALOT
  rationale: El sustantivo plural con sufijo de segunda persona femenina se refiere a los cantos de Tiro. «Cantos» mantiene el plural y funciona con un registro bíblico natural en español.
- source_word: וְקוֹל
  english_pob_choice: and the sound of
  chosen_spanish: y la voz de
  alternatives_spanish:
  - y el sonido de
  - y el ruido de
  lexicon: HALOT
  rationale: Aunque קוֹל puede ser «voz/sonido/ruido», con un instrumento musical el español admite bien «voz de» para reflejar la construcción estrecha del hebreo y el paralelismo poético con los cantos.
- source_word: כִּנּוֹרַיִךְ
  english_pob_choice: your lyres
  chosen_spanish: tus cítaras
  alternatives_spanish:
  - tus liras
  - tus arpas
  lexicon: HALOT
  rationale: כִּנּוֹר designa un instrumento de cuerda; la POB inglesa optó por «lyres» con nota alternativa. En español, «cítaras» es una equivalencia amplia y sobria para un cordófono antiguo, más precisa que «arpa» y aceptable en registro bíblico. Se conserva la alternativa semántica en nota por la incertidumbre instrumental.
- source_word: לֹא יִשָּׁמַע עוֹד
  english_pob_choice: will be heard no more
  chosen_spanish: no se oirá más
  alternatives_spanish:
  - no volverá a oírse
  - ya no se oirá
  lexicon: HALOT
  rationale: El nifal de שׁמע expresa pasivamente «ser oído». «No se oirá más» reproduce la pasiva de forma natural y transmite la idea de cese definitivo de manera idiomática.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el hebreo y la lectura auditada en inglés, con un ajuste principal en el término del instrumento: se eligió «cítaras» para mantener una equivalencia digna y comprensible en español, conservando la alternativa «arpas» en nota conforme al expediente lexical. No se detectaron revisiones textuales sustantivas en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene el futuro perifrástico de juicio («haré cesar... no se oirá más») para reflejar la acción divina causativa del hebreo.
  - Se evita «SEÑOR» porque este versículo no contiene el tetragrámaton ni una cita directa de κύριος.
  - Se conserva un registro poético y bíblico sin caer en arcaísmos innecesarios.
  - «Cítaras» se usa como término español neutral para un instrumento de cuerda antiguo, con nota de alternativa para preservar la tensión lexical documentada.
