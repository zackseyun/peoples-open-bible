translation:
  language: es
  text: Vayan, consulten a Yahvé por mí y por el remanente de Israel y de Judá, acerca de las palabras del libro[a] que ha sido hallado, porque grande es la ira de Yahvé, que ha sido derramada sobre nosotros, por cuanto nuestros padres[b] no guardaron la palabra de Yahvé, para hacer conforme a todo lo que está escrito en este libro[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del rollo que ha sido hallado». El hebreo ספר puede designar un libro o un rollo; «libro» se mantiene en el texto principal por claridad natural en español.
    reason: lexical_alternative
  - marker: b
    text: O «nuestros antepasados». El hebreo dice literalmente «nuestros padres».
    reason: lexical_alternative
  - marker: c
    text: O «en este rollo».
    reason: lexical_alternative
lexical_decisions:
- source_word: דִרְשׁוּ אֶת־יְהוָה
  english_pob_choice: inquire of Yahweh
  chosen_spanish: consulten a Yahvé
  alternatives_spanish:
  - busquen a Yahvé
  - inquieran de Yahvé
  lexicon: HALOT
  rationale: En este mandato regio, דרשׁ con objeto divino expresa pedir dirección o consulta divina, no solo una búsqueda devocional general. En español, «consulten a Yahvé» comunica mejor esa acción concreta y preserve la función oracular del verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término de base del proyecto para el nombre divino, manteniendo el nombre del pacto y evitando la máscara litúrgica «SEÑOR».
- source_word: בַּעֲדִי
  english_pob_choice: for me
  chosen_spanish: por mí
  alternatives_spanish:
  - en favor de mí
  - por mi causa
  lexicon: HALOT
  rationale: Aquí la preposición marca representación o beneficio. «Por mí» es natural en español y conserva la idea de intercesión o actuación en su favor.
- source_word: וּבְעַד הַנִּשְׁאָר בְּיִשְׂרָאֵל וּבִיהוּדָה
  english_pob_choice: and for the remnant in Israel and in Judah
  chosen_spanish: y por el remanente de Israel y de Judá
  alternatives_spanish:
  - y en favor del remanente de Israel y de Judá
  - y por los que quedaron en Israel y en Judá
  lexicon: HALOT
  rationale: הנשאר designa a los que han quedado; «remanente» conserva la carga histórico-covenantal del término. «Por» refleja la representación o beneficio del ruego.
- source_word: עַל דִּבְרֵי הַסֵּפֶר
  english_pob_choice: concerning the words of the book
  chosen_spanish: acerca de las palabras del libro
  alternatives_spanish:
  - sobre las palabras del libro
  - respecto de las palabras del libro
  - acerca de los asuntos del libro
  lexicon: HALOT
  rationale: עַל introduce aquí el tema de la consulta. «Acerca de» mantiene la relación semántica sin forzar un calco rígido.
- source_word: הַסֵּפֶר אֲשֶׁר נִמְצָא
  english_pob_choice: the book that has been found
  chosen_spanish: el libro que ha sido hallado
  alternatives_spanish:
  - el rollo que fue hallado
  - el libro encontrado
  lexicon: HALOT
  rationale: ספר puede ser «libro» o «rollo»; se conserva «libro» en el texto principal por fluidez y claridad en español. «Ha sido hallado» refleja bien el perfecto pasivo y evita una simplificación excesiva.
- source_word: גְדוֹלָה חֲמַת יְהוָה
  english_pob_choice: great is the wrath of Yahweh
  chosen_spanish: grande es la ira de Yahvé
  alternatives_spanish:
  - grande es el furor de Yahvé
  - la ira de Yahvé es grande
  lexicon: HALOT
  rationale: חמה expresa ira ardiente o furor; «ira» es el equivalente más directo y solemne en español. Se conserva el orden enfático del hebreo con «grande es».
- source_word: נִתְּכָה בָנוּ
  english_pob_choice: has been poured out on us
  chosen_spanish: ha sido derramada sobre nosotros
  alternatives_spanish:
  - ha sido vertida sobre nosotros
  - se ha derramado sobre nosotros
  lexicon: HALOT
  rationale: נתך en pasivo suele expresar algo derramado, especialmente respecto de juicio o ira. «Derramada sobre nosotros» reproduce bien la imagen y la fuerza del hebreo.
- source_word: אֲבוֹתֵינוּ
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  - nuestros padres y mayores
  lexicon: HALOT
  rationale: El hebreo es literalmente masculino plural y alude a los antepasados varones. En español, «padres» conserva la forma histórica y la tensión de género del original, coherente con el criterio del proyecto.
- source_word: שָׁמְרוּ אֶת־דְּבַר יְהוָה
  english_pob_choice: have not kept the word of Yahweh
  chosen_spanish: no guardaron la palabra de Yahvé
  alternatives_spanish:
  - no observaron la palabra de Yahvé
  - no cumplieron la palabra de Yahvé
  lexicon: HALOT
  rationale: שׁמר con דבר connota guardar, observar o custodiar lo dicho por Dios; «guardar» mantiene el vínculo léxico y es natural en español bíblico contemporáneo.
- source_word: לַעֲשׂוֹת כְּכָל הַכָּתוּב
  english_pob_choice: to do according to all that is written
  chosen_spanish: para hacer conforme a todo lo que está escrito
  alternatives_spanish:
  - para obrar conforme a todo lo que está escrito
  - para hacer todo lo que está escrito
  lexicon: HALOT
  rationale: El infinitivo final expresa el propósito de guardar la palabra mediante su ejecución. «Conforme a todo lo que está escrito» refleja la amplitud de כְּכָל sin estrecharla.
- source_word: עַל־הַסֵּפֶר הַזֶּה
  english_pob_choice: in this book
  chosen_spanish: en este libro
  alternatives_spanish:
  - en este rollo
  lexicon: HALOT
  rationale: Aunque עַל es literalmente «sobre», en español el contenido escrito se expresa naturalmente con «en». Se mantiene la referencia al documento encontrado sin cargar el verso con una literalidad extraña.
theological_decisions:
- issue: Cómo rendir el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama de forma directa. En español del proyecto, el equivalente establecido es «Yahvé», conservando el nombre del pacto y la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tratamiento de אֲבוֹתֵינוּ en un contexto de culpa histórica
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: Se preserva la referencia masculina plural del hebreo y la relación generacional del reclamo de culpa. Neutralizarlo como «antepasados» atenuaría una decisión gramatical explícita del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el audit trail inglés y el hebreo: conserva el valor consultivo de דרשׁ, el matiz de remanente, la imagen de la ira derramada y la referencia textual al libro hallado. No se registraron revisiones pendientes en el pasaje de origen, y la lectura cruzada indica alto acuerdo sin objeciones.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se mantiene «remanente» para הַנִּשְׁאָר por continuidad teológica.
  - «Guardar la palabra» conserva la tensión de שׁמר sin reemplazarla por una paráfrasis más débil.
  - «Libro» se conserva en el cuerpo principal, con nota sobre «rollo» para no perder la alternativa lexical.
