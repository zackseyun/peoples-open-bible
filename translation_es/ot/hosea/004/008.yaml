translation:
  language: es
  text: Se alimentan del pecado[a] de mi pueblo, y ponen su apetito en su iniquidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la ofrenda por el pecado de mi pueblo». La palabra hebrea puede significar «pecado» o «ofrenda por el pecado».'
    reason: alternative_reading
  - marker: b
    text: 'Lit.: «y hacia su iniquidad levantan su alma»; el giro hebreo significa desear o codiciar, y el singular «su alma» es gramaticalmente difícil en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַטַּאת
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - ofrenda por el pecado
  lexicon: HALOT
  rationale: El hebreo admite tanto el sentido abstracto de «pecado» como el cultual de «ofrenda por el pecado». En español, «pecado» mantiene el alcance moral de la acusación y encaja con el paralelismo con «su iniquidad». Se preserva la alternativa cultual en nota por su peso interpretativo.
- source_word: יֹאכֵלוּ
  english_pob_choice: feed on
  chosen_spanish: comen
  alternatives_spanish:
  - se alimentan de
  - devoran
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente «comer». En español, «comen» conserva la metáfora de consumo sin añadir una elaboración idiomática innecesaria. La idea de explotación queda apoyada por el contexto y por la segunda cola del verso.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona singular se traduce de manera directa y transparente como «mi pueblo».
- source_word: עֲוֺנָם
  english_pob_choice: their iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - su maldad
  lexicon: HALOT
  rationale: עָוֹן puede expresar iniquidad, culpa o castigo por la culpa. Aquí el sentido moral armoniza con el contexto y con el paralelismo del versículo; «iniquidad» preserva mejor la fuerza ética que una paráfrasis más débil.
- source_word: יִשְׂאוּ נַפְשׁוֹ
  english_pob_choice: they set their appetite on
  chosen_spanish: apetecen
  alternatives_spanish:
  - desean
  - anhelan
  lexicon: HALOT
  rationale: La expresión hebrea con נשׂא + נפשׁ comunica deseo dirigido o ansia. «Apetecen» transmite en español esa idea de anhelo codicioso sin volver opaco el giro idiomático.
- source_word: נַפְשׁוֹ
  english_pob_choice: their appetite
  chosen_spanish: apetito
  alternatives_spanish:
  - alma
  - soul
  lexicon: HALOT
  rationale: Aunque la forma consonántica puede reflejar un singular problemático, el inglés POB optó por expresar la fuerza idiomática como apetito. En español, «apetecen» ya incorpora el matiz, por lo que la alusión se integra naturalmente sin forzar un sustantivo adicional.
theological_decisions:
- issue: Posible lectura cultual de חַטַּאת frente a lectura moral
  english_pob_reading: 'Main text: ''sin''; footnote preserves ''sin offering.'''
  chosen_spanish_reading: 'Main text: «pecado»; nota preserva «ofrenda por el pecado».'
  alternative_spanish_readings:
  - ofrenda por el pecado
  rationale: El verso denuncia a los sacerdotes que se benefician del mal del pueblo, pero el hebreo también permite el sentido cultual. Mantener «pecado» en el texto principal conserva la acusación moral, mientras que la nota deja abierta la lectura sacrificial sin resolver la tensión.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de eliminarla'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y no registra revisiones posteriores; esta versión sigue la decisión establecida en el inglés POB de mantener «sin/pecado» en el texto principal y preservar la lectura cultual en nota.
  spanish_consistency_notes:
  - Se conserva «mi pueblo» para עַמִּי y «su iniquidad» para עֲוֺנָם, manteniendo el paralelismo con el inglés auditado.
  - Se evita «se alimentan de» porque en español «comen» ya conserva la metáfora básica sin sobretraducir.
  - «Apetecen» recoge el valor desiderativo del hebreo sin introducir una explicación interpretativa excesiva en el cuerpo del texto.
  - Se usa «pecado» en el texto principal para no borrar la tensión documentada entre sentido moral y sentido cultual.
