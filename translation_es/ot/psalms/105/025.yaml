lexical_decisions:
- source_word: הָפַךְ
  english_pob_choice: turned
  chosen_spanish: volvió
  alternatives_spanish:
  - cambió
  - torció
  - volteó
  lexicon: HALOT
  rationale: El hebreo expresa una acción fuerte de hacer cambiar la disposición interior; «volvió» conserva el sentido de giro/cambio causal sin sonar mecánico en español.
- source_word: לִבָּם
  english_pob_choice: their heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - sus corazones
  - su mente
  lexicon: HALOT
  rationale: Mantiene el singular colectivo del hebreo («su corazón»), que presenta la disposición interior del grupo como una unidad.
- source_word: לִשְׂנֹא
  english_pob_choice: to hate
  chosen_spanish: para odiar
  alternatives_spanish:
  - a fin de odiar
  - de modo que odiaran
  lexicon: HALOT
  rationale: «Odiar» es el equivalente directo y conserva la relación de resultado o propósito expresada por el infinitivo.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su nación
  - a su gente
  lexicon: HALOT
  rationale: «Pueblo» reproduce bien עַם como colectivo pactal e histórico; el posesivo «su» preserva la referencia a Dios.
- source_word: לְהִתְנַכֵּל
  english_pob_choice: to deal deceitfully
  chosen_spanish: tratar con engaño
  alternatives_spanish:
  - obrar con astucia
  - maquinar contra
  lexicon: HALOT
  rationale: El hitpael comunica conducta hostil y astuta; «tratar con engaño» suena natural en español y mantiene la idea de trato tramposo sin suavizarla.
- source_word: בַּעֲבָדָיו
  english_pob_choice: with his servants
  chosen_spanish: a sus siervos
  alternatives_spanish:
  - con sus siervos
  - a sus esclavos
  lexicon: HALOT
  rationale: Aquí el foco recae en la relación de servicio a Dios; «siervos» es más natural y coherente con el contexto bíblico que «esclavos» en español.
theological_decisions:
- issue: Agencia divina en el endurecimiento/alteración del corazón
  english_pob_reading: He turned their heart
  chosen_spanish_reading: Él volvió su corazón
  alternative_spanish_readings:
  - Dios permitió que su corazón se volviera
  - Su corazón fue vuelto
  rationale: Se conserva la afirmación directa de la acción divina sobre la disposición de Egipto, sin atenuar la tensión teológica del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios y la lectura se mantiene en alto acuerdo con el control cruzado.'
  spanish_consistency_notes:
