translation:
  language: es
  text: Porque yo soy Yahvé[a], el que los saca de la tierra de Egipto para ser su Dios. Y serán santos, porque yo soy santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que los hizo subir de la tierra de Egipto». El hebreo usa un participio, que puede verterse más literalmente con una expresión de valor presente, aunque el éxodo ya pertenece al pasado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en forma transparente y auditable, conforme al criterio del proyecto para el tetragrámaton. "Yahvé" mantiene la referencia directa a יְהוָה sin sustituirla por un título.
- source_word: הַמַּעֲלֶה
  english_pob_choice: who brings you up
  chosen_spanish: el que los hace subir
  alternatives_spanish:
  - el que los sube
  - el que los sacó
  lexicon: HALOT
  rationale: El participio expresa una acción en curso o característica; en español, "el que los hace subir" conserva mejor el valor presente-like y la imagen de ascenso desde Egipto. "Los sacó" sería más natural, pero pierde esa forma participial documentada.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - fuera de Egipto
  lexicon: HALOT
  rationale: Se mantiene "tierra" para respetar la fórmula explícita del hebreo y su valor de pacto/exodo, en vez de reducirla a una referencia geográfica más breve.
- source_word: לִהְיוֹת לָכֶם לֵאלֹהִים
  english_pob_choice: to be your God
  chosen_spanish: para ser su Dios
  alternatives_spanish:
  - para ser Dios para ustedes
  - para ser el Dios de ustedes
  lexicon: HALOT
  rationale: La expresión de pacto se vierte de manera natural en español con "para ser su Dios", preservando la relación posesiva y el sentido covenantal sin introducir una paráfrasis explicativa.
- source_word: וִהְיִיתֶם
  english_pob_choice: you shall be
  chosen_spanish: Y serán
  alternatives_spanish:
  - y sean
  - de modo que serán
  lexicon: HALOT
  rationale: En este contexto exhortativo, el futuro español reproduce adecuadamente la fuerza injuntiva del verbo y la secuencia del hebreo con una conjunción simple y directa.
- source_word: קְדֹשִׁים
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - sagrados
  - separados
  lexicon: HALOT
  rationale: '"Santos" es el equivalente bíblico normal y transmite la consagración requerida; "separados" sería demasiado reductivo y "sagrados" puede sonar menos natural en este mandato.'
- source_word: כִּי קָדוֹשׁ אָנִי
  english_pob_choice: for I am holy
  chosen_spanish: porque santo soy yo
  alternatives_spanish:
  - pues santo soy yo
  - porque yo soy santo
  lexicon: HALOT
  rationale: Se conserva la causalidad del segundo כִּי con "porque" y se mantiene la afirmación divina en un orden español aceptable. "Santo soy yo" refleja la estructura enfática del hebreo sin volverla artificial.
theological_decisions:
- issue: Fundamento de la santidad requerida
  english_pob_reading: The verse grounds Israel's required holiness in the LORD's identity, his redemptive act in the exodus, and his covenant relation as their God.
  chosen_spanish_reading: El versículo fundamenta la santidad exigida a Israel en la identidad de Yahvé, en su acción redentora del éxodo y en su relación de pacto como su Dios.
  alternative_spanish_readings:
  - El versículo solo da una instrucción ritual de pureza sin alcance teológico más amplio.
  rationale: 'La traducción mantiene unidos los tres elementos del hebreo: nombre divino, éxodo y fórmula de pacto. No reduce el texto a una norma ritual aislada, porque el hebreo explícitamente vincula el mandato con quién es Yahvé y lo que ha hecho.'
  doctrine_reference: Levítico 11:45; fórmula de pacto del Éxodo; santidad divina como fundamento de la santidad del pueblo
- issue: Valor del participio hebreo הַמַּעֲלֶה
  english_pob_reading: who brings you up
  chosen_spanish_reading: el que los hace subir
  alternative_spanish_readings:
  - el que los sacó
  rationale: Se conserva la tensión entre la forma verbal presente-like del participio y el evento pasado del éxodo. La opción española evita borrar esa forma verbal documentada, a la vez que sigue siendo idiomática.
  doctrine_reference: Aspecto participial hebreo en expresiones de memoria redentora
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés al reflejar el participio con una forma de valor presente en español y al usar una conjunción directa para el encadenamiento del mandato. También conserva la causalidad final con "porque"/"pues"-equivalente, sin perder el registro formal ni la relación de pacto del texto.
  spanish_consistency_notes:
  - Se usa "Yahvé" para el nombre divino, conforme al estándar del proyecto.
  - Se conserva "tierra de Egipto" por fidelidad a la fórmula del éxodo.
  - '"Santos" se elige como equivalente bíblico normal de קְדֹשִׁים en este contexto.'
  - La puntuación con dos oraciones respeta la cadencia del hebreo y del audit trail inglés.
