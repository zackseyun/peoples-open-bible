revisions:
- from: 'Entonces Ahimáas hijo de Sadoc dijo otra vez a Joab[a]: «Pase lo que pase, te ruego que yo también corra tras el cusita». Pero Joab dijo: «¿Por qué corres, hijo mío[b], si no tienes una buena noticia que reporte beneficio?»'
  to: 'Entonces Ahimáas hijo de Sadoc volvió a decir a Joab[a]: «Pase lo que pase, por favor, déjame correr yo también detrás del cusita». Pero Joab dijo: «¿Por qué vas a correr, hijo mío[b], si no tienes ningún mensaje que te traiga recompensa?»'
  rationale: Se ajustó la última cláusula para alinearla con la decisión auditada del POB y evitar el estrechamiento semántico de «buena noticia». También se hizo más idiomática la petición de Ahimaás y se mejoró el matiz prospectivo en la objeción de Joab. Se mantuvieron «cusita» y «hijo mío», que son fieles al expediente fuente.
  reviewer_model: gpt-5.4
