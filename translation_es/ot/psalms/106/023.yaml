revisions:
- from: Y dijo que los destruiría—si no se hubiera interpuesto Moisés, su escogido[a], delante de él, para apartar su ira de destruirlos.
  to: Y dijo que los destruiría, de no haber sido por Moisés, su escogido[a], que estuvo en la brecha delante de él para hacer volver su ira y no destruirlos.
  rationale: Se revisa para alinear el español con la evidencia hebrea y con la decisión auditada del POB de conservar la metáfora 'en la brecha'. También se mejora la fluidez de la condición contrafactual y de la cláusula final, sin perder el sentido de que Moisés desvió la ira divina para impedir la destrucción.
