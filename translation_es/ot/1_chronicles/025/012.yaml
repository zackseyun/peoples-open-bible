translation:
  language: es
  text: El quinto fue Natanías[a]; sus hijos varones y sus hermanos fueron doce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, en contexto: «El quinto lote fue para Natanías; sus hijos varones y sus hermanos fueron doce». El hebreo omite palabras como «lote» o «fue para», que se infieren de la lista circundante.'
