id: ROM.14.4
reference: Romans 14:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: σὺ τίς εἶ ὁ κρίνων ἀλλότριον οἰκέτην; τῷ ἰδίῳ κυρίῳ στήκει ἢ πίπτει· σταθήσεται δέ, ⸂δυνατεῖ γὰρ⸃ ὁ ⸀κύριος στῆσαι αὐτόν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/004.yaml
  text: Who are you to judge another's household slave? He stands or falls before his own lord, and he will be made to stand, for the Lord is able to make him stand.
translation:
  language: ko
  text: 당신이 누구이기에 남의 가복[a]을 판단합니까? 그가 서거나 넘어지거나 하는 것은 그의 주인에게 달려 있습니다. 그는 서게 될 것입니다. 주께서 그를 세우실 수 있기 때문입니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 οἰκέτης는 집안에 속한 노예·하인을 가리킨다. 정책에 따라 매임의 사회적 관계를 보존하되, 본문은 δοῦλος가 아니므로 「노예」 대신 「가복(家僕)」을 쓴다.
    reason: lexical_alternative
  - marker: b
    text: 본문에서 같은 헬라어 κύριος가 「주인」과 「주」 두 번 쓰인다. 일부는 비유 안의 인간 주인으로 본다. 더 가능성 있는 읽기는 바울이 신자의 견고함을 보장하시는 「주」(예수)를 가리킨다는 것이다.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλότριον οἰκέτην
  english_pob_choice: another's household slave
  chosen_korean: 남의 가복
  alternatives_korean:
  - 남의 집 종
  - 남의 집안 노예
  lexicon: BDAG
  rationale: '정책 지시: οἰκέτης는 δοῦλος가 아니므로 「노예」 대신 「가복」을 쓴다. 집안 매임 관계의 사회적 함의는 보존한다.'
- source_word: τῷ ἰδίῳ κυρίῳ
  english_pob_choice: to his own lord
  chosen_korean: 그의 주인에게
  alternatives_korean:
  - 자기 자신의 주인에게
  - 자신의 상전에게
  lexicon: BDAG
  rationale: 비유 안의 인간 주인을 가리키므로 「주인」으로 옮긴다. 두 번째 κύριος와의 어휘적 연결은 각주로 분명히 한다.
- source_word: στήκει ἢ πίπτει
  english_pob_choice: He stands or falls
  chosen_korean: 서거나 넘어지거나 하다
  alternatives_korean:
  - 서고 넘어지는 것
  lexicon: BDAG
  rationale: 평가·심판의 은유. 한국어 「서다/넘어지다」 짝으로 직역.
- source_word: σταθήσεται
  english_pob_choice: he will be made to stand
  chosen_korean: 그는 서게 될 것입니다
  alternatives_korean:
  - 세움을 받을 것이다
  lexicon: BDAG
  rationale: 미래 수동태. 신적 행위자를 함축. 「세움을 받다」도 가능하나 한국어 자연스러움을 위해 「서게 될 것이다」로.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_korean: 주
  alternatives_korean:
  - 그의 주인
  lexicon: BDAG
  rationale: 정책 글로사리 κύριος(예수)→주. 바울이 비유에서 신학적 「주」로 옮겨감을 한국어에 반영한다.
- source_word: στῆσαι αὐτόν
  english_pob_choice: to make him stand
  chosen_korean: 그를 세우다
  alternatives_korean:
  - 그를 굳건히 서게 하다
  lexicon: BDAG
  rationale: σταθήσεται의 능동적 대응. 직역.
theological_decisions:
- issue: 마지막 절의 ὁ κύριος의 지시 대상
  chosen_reading: 「주」는 신학적 의미의 주(바울 문맥상 메시아)를 가리킨다. 비유 안의 인간 주인이 아니다.
  alternative_readings:
  - 비유 속 인간 주인
  rationale: 바울은 가복 비유에서 신자가 주 앞에서 책임을 진다는 진술로 이동한다. 「서게 될 것이다」의 보증이 신적 능력에 근거하므로 신학적 κύριος 용법과 부합한다.
  doctrine_reference: 'DOCTRINE.md: κύριος→주; 명확한 모호성이 남는 곳에만 긴장을 보존한다'
