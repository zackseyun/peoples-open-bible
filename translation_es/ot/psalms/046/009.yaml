translation:
  language: es
  text: Vengan, vean las obras de Yahvé, que ha hecho desolaciones en la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el país». El hebreo אֶרֶץ puede referirse a toda la tierra o a una tierra en particular; aquí el sentido más amplio encaja mejor con el contexto del salmo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכוּ
  english_pob_choice: Come
  chosen_spanish: Venid
  alternatives_spanish:
  - Id
  - Venid acá
  lexicon: HALOT
  rationale: El imperativo plural de הלך funciona aquí como una invitación. En español, «venid» conserva el llamado directo y natural junto con «mirad». «Id» sería más literal, pero menos idiomático en esta exhortación.
- source_word: חֲזוּ
  english_pob_choice: see
  chosen_spanish: mirad
  alternatives_spanish:
  - ved
  - vedlo
  - observad
  lexicon: HALOT
  rationale: חזה pide contemplar u observar con atención. «Mirad» mantiene la fuerza de la invitación y suena natural en español moderno; «ved» sería más tradicional, pero menos fluido.
- source_word: מִפְעֲלוֹת
  english_pob_choice: works
  chosen_spanish: las obras
  alternatives_spanish:
  - los hechos
  - las acciones
  - las hazañas
  lexicon: HALOT
  rationale: El plural de מִפְעָל/מִפְעָלוֹת se refiere a lo que Yahvé ha realizado. «Obras» es amplio, claro y apto para el contexto del salmo, sin reducir el alcance a solo actos heroicos.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, siguiendo la convención del proyecto. «Yahvé» preserva el nombre personal de Dios sin sustituirlo por un título.
- source_word: שָׂם
  english_pob_choice: has made
  chosen_spanish: ha hecho
  alternatives_spanish:
  - ha puesto
  - ha establecido
  - ha causado
  lexicon: HALOT
  rationale: Aunque el hebreo básico de שׂים es «poner/poner por», el audit trail inglés ya evaluó que «has made» comunica mejor el resultado en este contexto. En español, «ha hecho» conserva esa lectura resultativa de manera natural.
- source_word: שַׁמּוֹת
  english_pob_choice: desolations
  chosen_spanish: desolaciones
  alternatives_spanish:
  - devastaciones
  - ruinas
  - destrucciones
  lexicon: HALOT
  rationale: «Desolaciones» mantiene el valor léxico de devastación o ruina y preserva el tono sobrio del verso. «Destrucciones» podría sonar más al acto que al estado resultante.
- source_word: בָּאָרֶץ
  english_pob_choice: in the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en la tierra habitada
  - en el país
  - en el mundo
  lexicon: HALOT
  rationale: El hebreo אֶרֶץ puede significar «tierra» o «país/territorio». Dado que el español de uso bíblico distingue bien «la tierra» como equivalente amplio de «the earth», esta opción conserva la amplitud del contexto sin forzar una lectura más localizada.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: El texto hebreo usa יְהוָה directamente. Se conserva el nombre propio divino para no ocultarlo tras un título, conforme a la línea doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de אֶרֶץ
  english_pob_reading: in the earth
  chosen_spanish_reading: en la tierra
  alternative_spanish_readings:
  - en el país
  - en el mundo
  rationale: El salmo tiene un horizonte amplio y no meramente local; «la tierra» mantiene esa amplitud sin imponer una precisión geográfica que el hebreo no exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés, pero ajusta el verbo inicial y la segunda persona plural al español natural. También conserva la equivalencia resultativa de שָׂם como «ha hecho», coherente con la revisión más reciente del texto fuente en inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה.
  - Se usa «desolaciones» para conservar el valor semántico fuerte de שַׁמּוֹת.
  - «En la tierra» refleja la amplitud de אֶרֶץ sin introducir una lectura más específica.
