translation:
  language: es
  text: No seas demasiado justo[a], ni te hagas demasiado sabio[b]. ¿Por qué habrías de arruinarte?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No seas demasiado justo, ni te hagas excesivamente sabio».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Por qué habrías de destruirte?» El verbo hebreo también puede implicar quedar desolado o atónito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל / תְּהִי
  english_pob_choice: Do not be
  chosen_spanish: No seas
  alternatives_spanish:
  - No te vuelvas
  - No llegues a ser
  lexicon: HALOT
  rationale: La prohibición en אַל + imperfecto se expresa naturalmente en español con el imperativo negativo «No seas». Conserva el valor exhortativo sin añadir una idea de proceso que el hebreo no exige.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: HALOT
  rationale: 'En español, «justo» comunica de manera directa el campo moral/covenantal de צַדִּיק y evita un giro demasiado eclesiástico. Mantiene también la tensión del texto: no se condena la justicia en sí, sino el exceso.'
- source_word: הַרְבֵּה
  english_pob_choice: overly
  chosen_spanish: demasiado
  alternatives_spanish:
  - en exceso
  - excesivamente
  - mucho
  lexicon: HALOT
  rationale: «Demasiado» expresa el valor de exceso de forma natural y clara en español. Conserva el matiz adverbial sin sugerir que la cualidad en sí sea mala.
- source_word: תִּתְחַכַּם
  english_pob_choice: make yourself wise
  chosen_spanish: te hagas sabio
  alternatives_spanish:
  - te vuelvas sabio
  - actúes con sabiduría
  - te muestres sabio
  lexicon: HALOT
  rationale: El hitpael tiene fuerza reflexiva; «te hagas sabio» refleja esa auto-relación mejor que un simple «seas sabio». Se conserva la posible ironía o autopromoción implícita en el contexto.
- source_word: יוֹתֵר
  english_pob_choice: too
  chosen_spanish: demasiado
  alternatives_spanish:
  - más
  - en exceso
  lexicon: HALOT
  rationale: Como intensificador de exceso, «demasiado» funciona de manera idiomática con «sabio» y reproduce la advertencia de sobrepasar el límite.
- source_word: לָמָּה
  english_pob_choice: Why should
  chosen_spanish: ¿Por qué habrías de
  alternatives_spanish:
  - ¿Por qué deberías
  - ¿Para qué habrías de
  lexicon: HALOT
  rationale: La pregunta retórica se vierte en un español natural y admonitorio. «Habrías de» conserva el matiz de amonestación y posibilidad implícita que tiene la construcción hebrea.
- source_word: תִּשּׁוֹמֵם
  english_pob_choice: ruin yourself
  chosen_spanish: arruinarte
  alternatives_spanish:
  - destruirte
  - quedar desolado
  - quedar arrasado
  lexicon: HALOT
  rationale: El verbo puede significar quedar desolado, devastado o atónito; en este contexto de exceso autodestructivo, «arruinarte» comunica bien el resultado sin cerrar indebidamente la ambigüedad semántica del hebreo.
theological_decisions:
- issue: Si el versículo prohíbe la justicia y la sabiduría mismas o solo su exceso
  english_pob_reading: The verse warns against self-destructive excess or self-righteous pretension, not against genuine righteousness or wisdom themselves.
  chosen_spanish_reading: El versículo advierte contra el exceso autodestructivo o la pretensión de justicia/sabiduría, no contra la justicia ni la sabiduría auténticas.
  alternative_spanish_readings:
  - El versículo rechaza la justicia y la sabiduría en sí mismas
  - El versículo se refiere solo a apariencias públicas de piedad
  rationale: Los modificadores הַרְבֵּה y יוֹתֵר marcan exceso, y la forma interrogativa final apunta al peligro del resultado. La traducción preserva esa tensión teológica sin resolverla demasiado pronto ni convertirla en una simple crítica de la piedad.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios sustantivos; el borrador español mantiene la lectura de exceso y la ambigüedad del verbo final, en paralelo al audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no contiene el Tetragrámaton.
  - Se evita «Cristo»/«Mesías» porque no hay vocabulario mesiánico en el pasaje.
  - Se conserva «justo/sabio» con matiz de exceso, no como condena de la virtud.
  - La pregunta final queda en forma retórica y no se suaviza a una simple consecuencia lógica.
