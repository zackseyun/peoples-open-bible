base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/034/009.yaml
  text: And Joshua son of Nun was full of the spirit of wisdom[a], because Moses had laid his hands on him[b]. So the sons of Israel listened to him and did as Yahweh had commanded Moses.
  footnotes:
