translation:
  language: es
  text: a Abraham como posesión, ante los ojos de los hijos de Het[a], ante todos los que entraban por la puerta de su ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los hititas' para 'los hijos de Het'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאַבְרָהָם
  english_pob_choice: to Abraham
  chosen_spanish: para Abraham
  alternatives_spanish:
  - a Abraham
  - para el beneficio de Abraham
  lexicon: HALOT
  rationale: El prefijo ל en este contexto legal marca destinatario o beneficiario de la transferencia. En español, 'para Abraham' comunica bien esa relación de adjudicación sin volver la frase rígida.
- source_word: לְמִקְנָה
  english_pob_choice: as a possession
  chosen_spanish: como posesión
  alternatives_spanish:
  - como propiedad
  - como adquisición
  lexicon: HALOT
  rationale: מִקְנָה aquí señala el resultado adquirido, no solo el acto de comprar. 'Como posesión' preserva el valor legal de tenencia resultante y suena natural en español bíblico moderno.
- source_word: לְעֵינֵי
  english_pob_choice: before the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a los ojos de
  - en presencia de
  lexicon: HALOT
  rationale: La expresión idiomática subraya publicidad y testimonio legal. 'Ante los ojos de' conserva la imagen hebrea y la fuerza de observación pública.
- source_word: בְנֵי חֵת
  english_pob_choice: the sons of Heth
  chosen_spanish: los hijos de Het
  alternatives_spanish:
  - los hititas
  - los descendientes de Het
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hijos de Het'. Se mantiene la designación familiar/étnica literal porque forma parte del lenguaje repetido de la escena jurídica, aunque 'hititas' es una equivalencia contextual válida.
- source_word: בְּכֹל
  english_pob_choice: before all
  chosen_spanish: ante todos
  alternatives_spanish:
  - en presencia de todos
  - delante de todos
  lexicon: HALOT
  rationale: La preposición refuerza la publicidad del acto en relación con el grupo completo de testigos. 'Ante todos' expresa esa amplitud de manera idiomática y concisa.
- source_word: בָּאֵי
  english_pob_choice: who entered
  chosen_spanish: los que entraban
  alternatives_spanish:
  - los que entraban en
  - los que llegaban
  lexicon: HALOT
  rationale: El participio describe a los que iban llegando al ámbito de la puerta de la ciudad, lugar de negocios públicos y jurídicos. 'Los que entraban' conserva el movimiento continuo y la referencia al acceso al recinto.
- source_word: שַׁעַר עִירוֹ
  english_pob_choice: the gate of his city
  chosen_spanish: la puerta de su ciudad
  alternatives_spanish:
  - la puerta de la ciudad de él
  - la puerta de su poblado
  lexicon: HALOT
  rationale: '''Puerta'' reproduce el término hebreo y su carga cívico-legal. ''Su ciudad'' conserva el poseedor del constructo y el marco de transacciones públicas.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo con el mismo encadenamiento de destinatario, posesión y publicidad legal que refleja la revisión inglesa más literalizada ('before' repetido). Se evitó añadir una coma innecesaria para mantener el flujo de la cláusula y se preservó el matiz de testimonio público en la fórmula de la puerta de la ciudad.
  spanish_consistency_notes:
  - Se usó 'hijos de Het' de forma literal y se señaló la alternativa contextual 'hititas' en nota.
  - '''Puerta de su ciudad'' mantiene el valor jurídico del hebreo, evitando modernizarlo a un sentido meramente arquitectónico.'
  - La repetición de 'ante' traduce la repetición preposicional del hebreo y de la revisión inglesa, en vez de suavizarla con 'en presencia de'.
