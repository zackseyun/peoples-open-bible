  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὗτος ἦν κατηχημένος τὴν ὁδὸν τοῦ κυρίου, καὶ ζέων τῷ πνεύματι ἐλάλει καὶ ἐδίδασκεν ἀκριβῶς τὰ περὶ τοῦ ⸀Ἰησοῦ, ἐπιστάμενος μόνον τὸ βάπτισμα Ἰωάννου.
base_translation:
  language: en
  yaml_path: translation/nt/acts/018/025.yaml
  text: This man had been instructed in the way of the Lord[a], and being fervent in spirit, he was speaking and teaching accurately the things concerning Jesus, knowing only the baptism of John.
  footnotes:
  - marker: a
    text: Or, 'fervent in the Spirit,' which may be understood as a reference to the Holy Spirit rather than to Apollos's own spirit.
    reason: alternative_reading
translation:
  language: ko
  text: 그는 주의 도(道)를 배운 사람이었으며, 영으로 뜨거워 예수에 관한 일을 정확히 말하고 가르치되, 다만 요한의 세례만을 알고 있었습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὴν ὁδὸν τοῦ κυρίου
  english_pob_choice: the way of the Lord
  chosen_korean: 주의 도(道)
  alternatives_korean:
  - 주의 길
  lexicon: BDAG
  rationale: 사도행전에서 「ἡ ὁδός」는 그리스도인의 길/가르침을 가리키는 정형 어구. 한국 전통 번역의 「도(道)」가 그 의미 두께를 가장 잘 살린다.
