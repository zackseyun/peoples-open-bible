  glossary_alignment: 'No hay conflicto con la terminología troncal del proyecto (no aparecen Yahvé, Mesías, etc.). Las decisiones léxicas principales son compatibles con el expediente inglés. La excepción importante es técnica: la nota del verbo נדח debe anclarse al verbo español final, no a «burla».'
