base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/015/017.yaml
  text: So the Levites appointed Heman son of Joel[a], and from his brothers Asaph son of Berechiah, and from the sons of Merari, their brothers[b], Ethan son of Kushaiah.
  footnotes:
  - marker: a
    text: Or 'set in place' / 'stationed'; the Hebrew verb can denote causing someone to stand in an assigned role.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the sons of Merari'; that is, from the Merarite clan.
    reason: cultural_note
