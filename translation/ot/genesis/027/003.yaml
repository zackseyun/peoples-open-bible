id: GEN.27.3
reference: Genesis 27:3
source:
  edition: WLC
  text: וְ/עַתָּה֙ שָׂא נָ֣א כֵלֶ֔י/ךָ תֶּלְיְ/ךָ֖ וְ/קַשְׁתֶּ֑/ךָ וְ/צֵא֙ הַ/שָּׂדֶ֔ה וְ/צ֥וּדָ/ה לִּ֖/י צידה־׃
translation:
  text: Now then[b][a], please take your equipment—your quiver and your bow—and go out to the field and hunt game for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your equipment' for the broader term introducing the more specific 'your quiver and your bow.'
    reason: lexical_alternative
  - marker: b
    text: Or 'wild game.' The Hebrew refers to hunted food obtained from the field.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now then
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces the next instruction with a natural discourse transition. 'Now then' captures both the conjunctive force and the immediacy of the command in readable English.
- source_word: שָׂא נָא
  chosen: please take
  alternatives:
  - take, please
  - lift up, please
  - carry, please
  lexicon: HALOT
  rationale: The verb literally means 'lift/carry,' but with objects like weapons or equipment in an imperative context it idiomatically means 'take.' נָא adds politeness or urgency, best reflected by 'please'.
- source_word: כֵלֶיךָ
  chosen: your gear
  alternatives:
  - your equipment
  - your weapons
  - your implements
  lexicon: HALOT
  rationale: כְּלִי is a broad term for article, vessel, implement, or weapon. Here it is immediately specified by 'your quiver and your bow,' so 'gear' works as a natural umbrella term without over-specifying beyond the Hebrew.
- source_word: תֶּלְיְךָ
  chosen: your quiver
  alternatives:
  - your hanging case
  - your arrows
  lexicon: HALOT
  rationale: The noun refers to a quiver or arrow-case. 'Quiver' is the standard and clearest English equivalent in this hunting context.
- source_word: וְקַשְׁתֶּךָ
  chosen: and your bow
  lexicon: HALOT
  rationale: Straightforward rendering of the common Hebrew term for bow.
- source_word: וְצֵא הַשָּׂדֶה
  chosen: and go out to the field
  alternatives:
  - and go out into the open country
  - and go to the countryside
  lexicon: HALOT
  rationale: שָׂדֶה commonly means 'field/open country.' 'Go out to the field' preserves the concrete image and fits the hunting setting.
- source_word: וְצוּדָה
  chosen: and hunt
  alternatives:
  - and catch
  - and trap
  lexicon: HALOT
  rationale: The verb means to hunt or catch game. 'Hunt' best matches the use of bow and quiver in context.
- source_word: לִּי
  chosen: for me
  lexicon: HALOT
  rationale: 'Simple dative of advantage: Esau is to obtain the game for Isaac.'
- source_word: צידה
  chosen: game
  alternatives:
  - venison
  - provision
  - wild game
  lexicon: HALOT
  rationale: In this context the noun refers to hunted food. 'Game' is accurate and natural modern English. 'Venison' is too specific, and 'provision' is too broad.
