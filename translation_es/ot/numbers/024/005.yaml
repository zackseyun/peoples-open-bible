translation:
  language: es
  text: ¡Qué buenas son tus tiendas[a], oh Jacob, tus moradas, oh Israel!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Qué hermosas/agradables son tus tiendas … tus moradas!». La exclamación hebrea expresa admiración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: How
  chosen_spanish: ¡Qué...!
  alternatives_spanish:
  - ¡Cuán...!
  - ¡Cómo...!
  lexicon: HALOT
  rationale: La partícula exclamativa introduce admiración, no una pregunta. En español, «¡Qué...!» expresa con naturalidad esa admiración poética y mantiene la fuerza exclamativa del hebreo.
- source_word: טֹּבוּ
  english_pob_choice: good
  chosen_spanish: buenos
  alternatives_spanish:
  - buenas
  - agradables
  - hermosas
  lexicon: HALOT
  rationale: 'טוֹב tiene un rango amplio: bueno, agradable, bello. «Buenos» conserva esa amplitud sin forzar una lectura meramente estética, y concuerda con el sustantivo plural implícito en el miembro poético.'
- source_word: אֹהָלֶיךָ
  english_pob_choice: your tents
  chosen_spanish: tus tiendas
  alternatives_spanish:
  - tus tiendas de campaña
  - tus tabernáculos
  lexicon: HALOT
  rationale: אֹהֶל significa propiamente «tienda». «Tiendas» es la equivalencia más directa y evita la carga cultual de «tabernáculos», que el contexto no requiere.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  lexicon: onomastic transliteration
  rationale: Se conserva el nombre propio como designación poética del pueblo de Israel, siguiendo la práctica del texto fuente.
- source_word: מִשְׁכְּנֹתֶיךָ
  english_pob_choice: your dwellings
  chosen_spanish: tus moradas
  alternatives_spanish:
  - tus habitaciones
  - tus lugares de morada
  - tus tabernáculos
  lexicon: HALOT
  rationale: מִשְׁכָּן/Mִשְׁכְּנֹת puede referirse a morada o habitación. «Moradas» mantiene el paralelismo con «tiendas» sin introducir el sentido específico del santuario que tendría «tabernáculos» en español eclesial tradicional.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: onomastic transliteration
  rationale: Nombre colectivo/pactual conservado como en el original y en el audit trail inglés.
theological_decisions:
- issue: Evitar «tabernáculos» en ambos miembros del paralelismo
  english_pob_reading: Use 'tents' and 'dwellings' rather than 'tabernacles'
  chosen_spanish_reading: Usar «tiendas» y «moradas» en lugar de «tabernáculos»
  alternative_spanish_readings:
  - ¿Qué buenos son tus tabernáculos, oh Jacob, tus tabernáculos, oh Israel?
  - ¡Qué buenas son tus cabañas, oh Jacob, tus pabellones, oh Israel!
  rationale: El hebreo describe el campamento y las viviendas de Israel; no alude específicamente al tabernáculo/santuario. Mantener «tiendas/moradas» evita cargar el texto con asociaciones cultuales ajenas al contexto, respetando la primacía del original.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto inglés revisado termina en signo de exclamación para reflejar mejor el valor exclamativo de מַה; la versión española lo sigue. También se preserva la decisión del audit trail de evitar «tabernáculos» por su carga cultual no exigida por el contexto.
  spanish_consistency_notes:
  - Se mantiene la distinción poética entre «tiendas» y «moradas», evitando repetir el mismo sustantivo en ambos hemistiquios.
  - «Oh» se usa como vocativo poético natural en español bíblico, sin convertirlo en una interjección moderna.
  - La puntuación exclamativa al inicio y al final refuerza el tono admirativo del hebreo.
