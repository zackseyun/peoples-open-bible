translation:
  language: es
  text: Algunos de ellos estaban a cargo de los utensilios[a] del servicio, porque los introducían contados y los sacaban contados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «los artículos del servicio» o «los implementos usados en el servicio». El término hebreo es amplio y puede abarcar recipientes, utensilios o instrumentos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵהֶם
  english_pob_choice: Some of them
  chosen_spanish: Algunos de ellos
  alternatives_spanish:
  - Y de ellos
  - Y algunos de ellos
  lexicon: HALOT
  rationale: 'El hebreo expresa un sentido partitivo: un subgrupo tomado de un conjunto previo. En español, «Algunos de ellos» comunica con naturalidad esa selección sin añadir elementos no presentes en el texto.'
- source_word: עַל
  english_pob_choice: were in charge of
  chosen_spanish: estaban a cargo de
  alternatives_spanish:
  - estaban sobre
  - tenían supervisión de
  lexicon: HALOT
  rationale: Con una función o responsabilidad, עַל indica supervisión o cargo. «Estaban a cargo de» conserva bien la relación administrativa y resulta idiomático en español.
- source_word: כְּלֵי הָעֲבוֹדָה
  english_pob_choice: the vessels of service
  chosen_spanish: los utensilios de servicio
  alternatives_spanish:
  - los vasos de servicio
  - los artículos del servicio
  - los implementos del servicio
  lexicon: HALOT
  rationale: כְּלִי puede abarcar vasos, utensilios o implementos. En contexto del templo, «utensilios» es un equivalente amplio y claro en español. «De servicio» conserva la construcción formal del hebreo y del audit trail inglés.
- source_word: בְמִסְפָּר
  english_pob_choice: by count
  chosen_spanish: por número
  alternatives_spanish:
  - contados
  - según el número
  - por conteo
  lexicon: HALOT
  rationale: La expresión apunta a un control numérico exacto. «Por número» refleja de manera directa la repetición enfática del hebreo; aunque es ligeramente más literal que natural, aquí preserva el patrón del verso.
- source_word: יְבִיאוּם
  english_pob_choice: they brought them in
  chosen_spanish: los entraban
  alternatives_spanish:
  - los metían
  - los introducían
  - los llevaban adentro
  lexicon: HALOT
  rationale: El verbo en hifil de בוא significa hacer entrar/traer adentro. En español, «los entraban» conserva la direccionalidad y la idea de movimiento hacia dentro; aunque menos usual que «los introducían», mantiene el paralelismo breve del hebreo.
- source_word: יוֹצִיאוּם
  english_pob_choice: took them out
  chosen_spanish: los sacaban
  alternatives_spanish:
  - los extraían
  - los llevaban fuera
  lexicon: HALOT
  rationale: El hifil de יצא significa hacer salir/sacar. «Los sacaban» empareja naturalmente con «los entraban» y preserva el uso habitual e iterativo de la acción administrativa.
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión más literal del audit trail inglés («vessels of service») y conserva el paralelismo administrativo de «por número» para reflejar la doble mención hebrea de inventario. Se evitó ampliar el sentido con explicaciones no presentes en el verso.
  spanish_consistency_notes:
  - Se mantuvo «utensilios» para un término hebreo amplio, evitando restringirlo indebidamente a «vasos».
  - Se conservó la repetición de «por número» para reflejar el énfasis contable del hebreo.
  - 'El orden general sigue el flujo del original: sujeto partitivo, cargo, objeto cultual, razón y doble acción de entrar/sacar.'
