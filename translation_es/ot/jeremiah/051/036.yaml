review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: mantiene לָכֵן como «Por tanto», la fórmula profética con «Yahvé», el modismo jurídico רָב אֶת רִיבֵךְ como defensa de la causa, y el paralelismo de secar las aguas. Sin embargo, omite las alternativas significativas preservadas en la auditoría inglesa, especialmente el matiz forense alternativo de «contender por tu causa» y la personificación femenina en «su mar / su fuente», que en español queda ambigua sin nota.'
  spanish_quality_summary: 'El español es claro y digno, pero «He aquí, yo defenderé» suena algo más pesado de lo necesario; aun así es aceptable. El mayor problema no es de fluidez sino de documentación: faltan notas para preservar alternativas léxicas relevantes y para evitar que «su» pierda la personificación femenina que el inglés decidió conservar expresamente.'
  glossary_alignment: Alineado con la terminología del proyecto en el uso de «Yahvé». No hay conflicto con otros términos clave. La elección «fuente» es defendible para מְקוֹרָהּ, aunque conviene documentar la alternativa «manantial / fuente / origen» mediante nota, en continuidad con el audit trail inglés.
  issues:
  - severity: medium
    issue: Faltan notas al pie para alternativas léxicas conservadas en la auditoría inglesa.
    rationale: El registro inglés preserva explícitamente alternativas para el modismo jurídico («contend for your cause») y para «her sea / her fountain». El español no debe perder esa información cuando sigue siendo relevante.
  - severity: medium
    issue: La personificación femenina de Babilonia queda neutralizada en español por el posesivo «su».
    rationale: Aunque «su mar / su fuente» es una traducción natural, en español no se percibe el femenino como en inglés «her». Una nota breve ayuda a conservar la decisión exegética documentada.
  - severity: low
    issue: «He aquí, yo defenderé» es algo rígido.
    rationale: No es incorrecto, pero «He aquí, defenderé» fluye mejor y sigue reflejando הִנְנִי sin sobrecargar el español.
  revised_spanish_text: 'Por tanto, así dice Yahvé: He aquí, defenderé tu causa[a] y tomaré venganza por ti; secaré su mar[b] y secaré su fuente[c].'
  revised_footnotes:
  - marker: a
    text: 'O «contenderé por tu causa». El hebreo usa un modismo jurídico de litigio: «defenderé tu causa».'
    reason: lexical_alternative
  - marker: b
    text: 'O «su mar». El hebreo personifica a Babilonia en femenino: literalmente, «su mar» = «el mar de ella».'
    reason: lexical_alternative
  - marker: c
    text: O «su manantial» o «su origen».
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido principal del borrador, pero se añaden notas necesarias para reflejar la auditoría inglesa y la personificación femenina del hebreo, y se hace un ajuste menor de fluidez eliminando el «yo» enfático no necesario.
