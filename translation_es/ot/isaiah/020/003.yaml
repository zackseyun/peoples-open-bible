base_translation:
  language: en
  yaml_path: translation/ot/isaiah/020/003.yaml
  text: Then Yahweh said[b][a], “Just as my servant Isaiah has walked naked and barefoot for three years as a sign and a portent against Egypt and Cush,”
  footnotes:
  - marker: a
    text: Or possibly 'stripped'—that is, wearing only a loincloth or undergarment rather than being completely nude.
    reason: lexical_alternative
  - marker: b
    text: Cush refers to the region south of Egypt, often associated with Nubia; some English versions render it 'Ethiopia.'
    reason: cultural_note
