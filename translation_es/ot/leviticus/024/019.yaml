    text: Literalmente, «da un defecto/lesión a su compañero».
    reason: lexical_alternative
  - marker: b
    text: O «vecino» o «compañero» para «semejante».
    reason: lexical_alternative
  revision_rationale: Se ajusta יִתֵּן מוּם a «causa una lesión» para reflejar mejor el daño corporal en registro legal, y se añaden notas que preservan tanto la literalidad principal documentada por el POB como la alternativa léxica para עָמִית. «Semejante» mantiene mejor el matiz interpersonal-comunitario sin las connotaciones más cargadas de «prójimo».
