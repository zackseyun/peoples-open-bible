review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés: mantiene la estructura en dos miembros, conserva la ambigüedad de עוּזָּה con nota, y refleja correctamente el relativo זוּ como cláusula dirigida a Dios. Sin embargo, la primera cláusula en español suena algo dura con «ha mandado tu fuerza», y «por nosotros» puede leerse como sustitución vicaria más que benefactiva; «a favor de nosotros» o «en favor nuestro» expresa mejor לָנוּ.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor para mayor naturalidad y precisión semántica. «Ha ordenado» encaja mejor que «ha mandado» en registro bíblico moderno, y «ha obrado en favor nuestro» suena más idiomático y más claramente benefactivo que «por nosotros». También conviene omitir el pronombre explícito «tú» antes de «que» para evitar pesadez innecesaria.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» está bien; no hay ocurrencias de Yahvé, Mesías, Espíritu, etc. La decisión «fuerza» para עֹז/עוּזָּה es defendible y coherente con el POB inglés.
  issues:
  - severity: medium
    issue: «ha mandado tu fuerza» suena poco natural en español bíblico actual
    rationale: Aunque es semánticamente posible, «mandar» con objeto abstracto aquí resulta más tosco que «ordenar» o «decretar». El inglés auditado enfatiza decreto autoritativo; «ha ordenado» preserva eso con mejor legibilidad.
  - severity: medium
    issue: «por nosotros» no expresa con suficiente claridad el valor benefactivo de לָנוּ
    rationale: En español, «obrar por nosotros» puede entenderse como 'en nuestro lugar' o sonar menos natural. El contexto y la decisión léxica inglesa apuntan a 'for our benefit'; «en favor nuestro» lo comunica mejor.
  - severity: low
    issue: «oh Dios, tú que» es ligeramente pesado
    rationale: El relativo directo puede expresarse con más fluidez como «oh Dios, que has obrado…» sin perder la fuerza vocativa ni el sentido de זוּ como cláusula relativa en segunda persona implícita.
  revised_spanish_text: Tu Dios ha ordenado tu fuerza. Muestra fuerza[a], oh Dios, que has obrado en favor nuestro.
  revised_footnotes:
  - marker: a
    text: El hebreo עוּזָה es difícil. También puede entenderse como «Sé fuerte, oh Dios» o, en relación con el versículo siguiente, «Fortalece, oh Dios, lo que has obrado en favor nuestro».
    reason: alternative_reading
