    rationale: La nota inglesa ofrece como alternativa 'extends to heaven'. En español conviene conservar esa posibilidad ('hasta el cielo') o una formulación equivalente, además de la explicación literal 'hasta altura/lugar alto'.
  revised_spanish_text: Y tu rectitud[a], oh, Dios, llega hasta las alturas[b]—tú que has hecho grandes cosas. Oh, Dios, ¿quién como tú?
  revised_footnotes:
  - marker: a
    text: O “justicia”. El hebreo צדקה puede denotar rectitud o justicia según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O “se extiende hasta el cielo”. El hebreo literalmente significa “hasta altura/lugar alto”.
    reason: lexical_alternative
