review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: Mattatías hace un llamado público, dirigido a quienes muestran celo por la ley y permanecen fieles a la alianza, para que salgan tras él. Sin embargo, dos elecciones atenúan la fuerza o naturalidad del original: «exclamó» es menos enérgico que ἀνέκραξεν («clamó»/«gritó»/«lanzó un grito»), y «salga detrás de mí» suena menos idiomático en español que una formulación como «salga en pos de mí» o «venga detrás de mí», además de poder sugerir mera posición física.'
  spanish_quality_summary: El español es claro y mayormente digno, pero «con voz fuerte» y sobre todo «salga detrás de mí» suenan algo rígidos. «Con voz potente» o «a gran voz» serían más naturales; aun así, el punto principal que conviene reparar es la cláusula final para lograr mejor legibilidad e intensidad narrativa. «Todo el que tenga celo por la ley» es aceptable, aunque «Todo el que sienta celo por la ley» o «Todo el que sea celoso de la ley» tendrían matices distintos; el borrador actual es comprensible.
  glossary_alignment: 'La terminología principal está bien alineada con el proyecto: «ley» para νόμος y «alianza» para διαθήκη son adecuadas en este contexto. No hay conflicto con los defaults mayores del glosario. La decisión de usar «alianza» preserva correctamente el peso teológico documentado para διαθήκη.'
  issues:
  - severity: medium
    issue: «exclamó» debilita la fuerza de ἀνέκραξεν
    rationale: El verbo griego describe un clamor público y fuerte. «Exclamó» puede sonar más puntual o menos intenso que el llamado enérgico del contexto narrativo. «Clamó» preserva mejor tanto la solemnidad como la fuerza.
  - severity: medium
    issue: «salga detrás de mí» es poco idiomático y algo ambiguo
    rationale: Aunque intenta reflejar ἐξελθέτω ὀπίσω μου, en español suena rígido y puede entenderse solo espacialmente. «Salga en pos de mí» conserva la idea de salir físicamente y seguirlo, con mejor registro bíblico y mayor naturalidad.
  - severity: low
    issue: «con voz fuerte» es comprensible pero menos natural que otras opciones
    rationale: La frase reproduce el griego de forma bastante literal, pero en español bíblico legible suele sonar mejor «a gran voz» o «con voz potente». No obstante, no impide la comprensión.
  revised_spanish_text: 'Y Mattatías clamó en la ciudad a gran voz, diciendo: «Todo el que tenga celo por la ley y sostenga la alianza, salga en pos de mí».'
  revision_rationale: Se ajusta «exclamó» a «clamó» para reflejar mejor la intensidad de ἀνέκραξεν; «con voz fuerte» a «a gran voz» para una expresión más natural y digna; y «salga detrás de mí» a «salga en pos de mí» para conservar tanto la salida física de ἐξελθέτω como el seguimiento implicado por ὀπίσω μου en un español más idiomático.
