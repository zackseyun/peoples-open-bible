translation:
  language: es
  text: Cuando Aram[a] vio que habían sido derrotados delante de Israel, envió mensajeros y sacó a los arameos de más allá del Río[b], con Sobac, comandante del ejército de Hadadézer, delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente, 'Siria/sirios'; hebreo 'Aram/arameos'.
    reason: lexical_alternative
  - marker: b
    text: O 'de más allá del Éufrates'; el hebreo dice simplemente 'de más allá del Río'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרָם
  english_pob_choice: Aram / the Arameans
  chosen_spanish: Aram / los arameos
  alternatives_spanish:
  - Siria / los sirios
  lexicon: HALOT
  rationale: Se conserva el nombre propio hebreo Aram para el territorio y el etnónimo arameos para las tropas o el pueblo. Esto sigue la decisión auditada en inglés de evitar la sustitución tradicional por Siria, que es menos directa respecto del hebreo.
- source_word: נִגְּפוּ
  english_pob_choice: had been defeated
  chosen_spanish: habían sido derrotados
  alternatives_spanish:
  - habían sido abatidos
  - habían sido vencidos
  lexicon: HALOT
  rationale: El nifal expresa haber sufrido derrota en combate. 'Derrotados' comunica bien la fuerza militar sin exagerar hasta 'aniquilados' o 'aplastados'.
- source_word: לִפְנֵי יִשְׂרָאֵל
  english_pob_choice: before Israel
  chosen_spanish: delante de Israel
  alternatives_spanish:
  - ante Israel
  - en presencia de Israel
  lexicon: HALOT
  rationale: '''Delante de'' preserva la imagen literal del hebreo y su valor idiomático de derrota frente al enemigo. En español suena natural y mantiene la tensión de la expresión fuente.'
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - emisarios
  - enviados
  lexicon: HALOT
  rationale: En este contexto político-militar se trata de enviados humanos, no de ángeles. 'Mensajeros' es el equivalente directo y claro.
- source_word: וַיּוֹצִיאוּ אֶת אֲרָם
  english_pob_choice: brought out the Arameans
  chosen_spanish: sacaron a los arameos
  alternatives_spanish:
  - trajeron a los arameos
  - movilizaron a los arameos
  lexicon: HALOT
  rationale: El hiphil de יצא implica hacer salir o traer fuera. 'Sacaron' conserva la imagen de extracción/movilización militar y concuerda con la lectura auditada en inglés.
- source_word: מֵעֵבֶר הַנָּהָר
  english_pob_choice: from beyond the River
  chosen_spanish: de más allá del Río
  alternatives_spanish:
  - de allende el Río
  - de más allá del Eufrates
  lexicon: HALOT
  rationale: Se mantiene la ambigüedad del hebreo, que dice solo 'el Río'. 'Río' con mayúscula funciona como nombre geográfico y deja abierta la referencia tradicional al Éufrates sin introducirla en el texto principal.
- source_word: וְשׁוֹפַךְ
  english_pob_choice: with Shophach
  chosen_spanish: con Sobac
  alternatives_spanish:
  - y Sobac
  lexicon: HALOT
  rationale: La conjunción funciona aquí de modo acompañante. En español 'con' expresa mejor la inclusión de Sobac en el grupo que marcha con las tropas, siguiendo la revisión inglesa que evitó un simple 'y'.
- source_word: שַׂר צְבָא הֲדַדְעֶזֶר
  english_pob_choice: the commander of Hadadezer’s army
  chosen_spanish: comandante del ejército de Hadadézer
  alternatives_spanish:
  - jefe del ejército de Hadadézer
  - capitán del ejército de Hadadézer
  lexicon: HALOT
  rationale: '''Comandante del ejército'' transmite el rango militar con claridad moderna. Se conserva Hadadézer como nombre propio y se usa la forma española habitual Sobac para el nombre personal.'
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - a la cabeza de ellos
  lexicon: HALOT
  rationale: Se refleja la colocación espacial literal 'delante de ellos', que en el contexto militar indica ir al frente. Así se mantiene la cercanía con el texto fuente sin convertirlo en una paráfrasis interpretativa.
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente al preferir una formulación más cercana al hebreo en el tramo final ('delante de ellos') en lugar de una paráfrasis como 'a la cabeza de ellos'. También mantiene la distinción auditada entre Aram/los arameos y evita reemplazar 'el Río' por 'el Éufrates' en el texto principal, dejando esa precisión para una nota.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como estándar del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se empleó 'arameos' en el objeto directo plural y 'Aram' como nombre territorial, conforme al patrón auditado.
  - '''Delante de'' se usa de manera consistente para reflejar לִפְנֵי en sentido espacial/militar.'
  - '''Mensajeros'' y no ''ángeles'' preserva el sentido contextual humano del término מַלְאָכִים.'
