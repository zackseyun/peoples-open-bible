id: 1CLEM.28
reference: 1 Clement 28
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Πάντων οὖν βλεπομένων καὶ ἀκουομένων, φοβηθῶμεν αὐτὸν καὶ ἀπολίπωμεν φαύλων ἔργων μιαρὰς ἐπιθυμίας, ἵνα τῷ ἐλέει αὐτοῦ σκεπασθῶμεν ἀπὸ τῶν μελλόντων κριμάτων. 2. ποῦ γάρ τις ἡμῶν δύναται φυγεῖν ἀπὸ τῆς κραταιᾶς χειρὸς αὐτοῦ; ποῖος δὲ κόσμος δέξεταί τινα τῶν αὐτομολούντων ἀπ᾿ αὐτοῦ; λέγει γάρ που τὸ γραφεῖον· 3. Ποῦ ἀφίξω καὶ ποῦ κρυβήσομαι ἀπὸ τοῦ προσώπου σου; Ἐὰν ἀναβῶ εἰς τὸν οὐρανόν, σὺ ἐκεῖ εἰ· ἐὰν ἀπέλθω εἰς τὰ ἔσχατα τῆς γῆς, ἐκεῖ ἡ δεξιά σου· ἐὰν καταστρωθῶ εἰς τὰς ἀβύσσους, ἐκεῖ τὸ πνεῦμά σου. 4. ποῖ οὖν τις ἀπέλθῃ ἢ ποῦ ἀποδράσῃ ἀπὸ τοῦ τὰ πάντα ἐμπεριέχοντος;
  language: Greek
  pages:
  - 297
  - 299
  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: 'Therefore[a], since all things are seen and heard, let us fear him and leave behind the impure desires of evil deeds, so that by his mercy we may be sheltered from the judgments that are about to come.


    2 For where can any one of us flee from his mighty hand? And what world will receive one of those who desert from him? For the Scripture says somewhere,


    3 “Where shall I go, and where shall I hide from your face? If I go up into heaven, you are there; if I depart to the farthest parts of the earth, there is your right hand; if I make my bed in the depths[a], there is your Spirit.”


    4 Where, then, can anyone go away, or where can he flee[b][c][d], from the One who encompasses all things?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'those who desert from him' renders a term used for defectors or deserters, giving the warning a sharper force than a simple 'those who depart.'
    reason: lexical_alternative
    anchor_ref: '28:2'
  - marker: a
    text: '''The Scripture says somewhere'' introduces a citation echoing Psalm 139:7–10 (LXX 138:7–10), though Clement''s wording is adapted rather than identical.'
    reason: cross_reference
    anchor_ref: '28:2'
  - marker: d
    text: '''From your face'' is a literal rendering of a biblical idiom often translated ''from your presence.'''
    reason: lexical_alternative
    anchor_ref: '28:3'
  - marker: c
    text: Or 'from the One who contains all things.' The Greek participle stresses God's all-encompassing presence.
    reason: lexical_alternative
    anchor_ref: '28:4'
  - marker: b
    text: Or 'go away, or where can he run off to, from'.
    reason: previous_rendering
lexical_decisions:
- source_word: βλεπομένων καὶ ἀκουομένων
  chosen: are seen and heard
  alternatives:
  - are watched and listened to
  - are visible and audible
  lexicon: LSJ
  rationale: A concise passive rendering preserves the sense that all things lie open before God without over-interpreting the implied subject.
- source_word: φοβηθῶμεν
  chosen: let us fear
  alternatives:
  - let us be afraid of
  - let us stand in awe of
  lexicon: BDAG
  rationale: The paraenetic force here includes reverent fear before divine judgment; 'fear' preserves that weight better than the softer 'stand in awe.'
- source_word: ἀπολίπωμεν
  chosen: leave behind
  alternatives:
  - forsake
  - abandon
  lexicon: LSJ
  rationale: '''Leave behind'' is idiomatic modern English while still conveying decisive renunciation.'
- source_word: φαύλων ἔργων μιαρὰς ἐπιθυμίας
  chosen: the foul desires that belong to wicked deeds
  alternatives:
  - the defiling desires of evil works
  - the vile lusts of base deeds
  lexicon: LSJ
  rationale: The Greek links 'foul/defiling desires' with 'wicked deeds.' This rendering keeps both elements and avoids reducing ἐπιθυμίαι to merely sexual lusts.
- source_word: σκεπασθῶμεν
  chosen: we may be sheltered
  alternatives:
  - we may be covered
  - we may be protected
  lexicon: LSJ
  rationale: The passive evokes being covered over or sheltered by divine mercy; 'sheltered' communicates protection while retaining the metaphorical sense.
- source_word: τῶν μελλόντων κριμάτων
  chosen: the judgments that are about to come
  alternatives:
  - the coming judgments
  - the impending judgments
  lexicon: BDAG
  rationale: This preserves the eschatological force of μέλλω without sounding wooden.
- source_word: κραταιᾶς χειρός
  chosen: mighty hand
  alternatives:
  - strong hand
  - powerful hand
  lexicon: LSJ
  rationale: A biblically resonant phrase in English that matches the idiom of divine power.
- source_word: κόσμος
  chosen: world
  alternatives:
  - order
  - cosmos
  lexicon: BDAG
  rationale: In context the rhetorical question asks what realm or world could receive a deserter from God; 'world' is natural and sufficiently broad.
- source_word: αὐτομολούντων
  chosen: those who desert from him
  alternatives:
  - those who defect from him
  - runaways from him
  lexicon: LSJ
  rationale: The military-political sense of desertion/defection is important and should not be flattened into generic departure.
- source_word: τὸ γραφεῖον
  chosen: the Scripture
  alternatives:
  - the writing
  - the written text
  lexicon: LSJ
  rationale: Although literally 'the writing/document,' in this citation formula it functions much like 'Scripture says,' which best conveys the ecclesial use.
- source_word: ἀφίξω
  chosen: shall I arrive
  alternatives:
  - shall I go
  - shall I come
  lexicon: LSJ
  rationale: The verb is not the common 'go'; 'arrive' preserves the distinct lexical choice, though the line remains idiomatic in English.
- source_word: ἀπὸ τοῦ προσώπου σου
  chosen: from your face
  alternatives:
  - from your presence
  lexicon: BDAG
  rationale: '''Face'' is more literal and preserves biblical anthropomorphic diction; the idiomatic sense of presence remains clear.'
- source_word: τὰ ἔσχατα τῆς γῆς
  chosen: the farthest parts of the earth
  alternatives:
  - the ends of the earth
  - earth's remotest bounds
  lexicon: LSJ
  rationale: This keeps the superlative sense explicit while remaining readable.
- source_word: καταστρωθῶ
  chosen: I make my bed
  alternatives:
  - I lie down
  - I spread out my couch
  lexicon: LSJ
  rationale: This is the most natural English equivalent for the bedding/resting idiom in the cited scriptural line.
- source_word: ἀβύσσους
  chosen: the depths
  alternatives:
  - the abysses
  - the deep
  lexicon: BDAG
  rationale: Plural 'abysses' is awkward in English here; 'the depths' preserves the sense of the deep underworld/abyss.
- source_word: τὸ τὰ πάντα ἐμπεριέχοντος
  chosen: the One who encompasses all things
  alternatives:
  - the One who contains all things
  - the One who surrounds all things
  lexicon: LSJ
  rationale: The participle expresses God's all-encompassing reality; this rendering is clear, elevated, and theologically fitting.
theological_decisions:
- issue: Divine omnipresence and judgment emphasis
  chosen_reading: Retain both the warning of coming judgments and the impossibility of escape from God's presence without softening either theme.
  alternative_readings:
  - Emphasize only reverent awe and omit fear/judgment sharpness
  - Render the passage primarily as comfort about omnipresence
  rationale: The chapter is paraenetic and admonitory. Clement uses God's universal knowledge and presence as grounds for repentance and holy fear, not merely consolation.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Gendered indefinite τις / τινα
  chosen_reading: Use 'any one of us' and 'anyone' in general statements, but retain singular 'he' in the final rhetorical question for gender-accurate representative force.
  alternative_readings:
  - Use fully gender-neutral singular throughout
  - Use 'man' throughout
  rationale: The Greek uses indefinite singular forms with representative force. This mixed approach preserves natural English while respecting the project's gender-accurate policy.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
