- from: Y puse mi corazón[a] en conocer la sabiduría, y en conocer la locura y la necedad; comprendí que también esto es un afán tras el viento[b].
  to: Y puse mi corazón[a] en conocer la sabiduría, y en conocer la locura y la necedad; llegué a saber que también esto es un afán tras el viento[b].
