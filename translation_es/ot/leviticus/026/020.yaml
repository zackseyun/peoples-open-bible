    rationale: Aunque el hebreo repite el verbo «dar», el español gana claridad si distingue «dará su producto» para la tierra y «darán su fruto» para los árboles, preservando tanto el paralelismo como la diferencia semántica.
  revised_spanish_text: Y vuestra fuerza se gastará en vano[a], y vuestra tierra no dará su producto, y los árboles de la tierra no darán su fruto.
