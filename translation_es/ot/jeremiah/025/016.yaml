review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia fuente: beber, tambalear/reelar, y comportarse como locos, con causa explícita en la espada enviada por Dios entre las naciones. Preserva la imaginería concreta del juicio y la fuerza causal de מִפְּנֵי. La única corrección necesaria es estilística/lexical menor en la nota, no en el cuerpo principal.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español ampliamente eclesial. «Beberán, tambalearán y actuarán como locos» lee bien y conserva el matiz conductual. «A causa de la espada que yo envío entre ellos» es fiel e inteligible. La nota al pie necesita mejor español: «volverse enajenado» suena poco natural y además cambia de adjetivo singular a un verbo impersonal menos claro; conviene «volverse loco» o «enloquecer».'
  glossary_alignment: 'No hay términos del glosario de proyecto en tensión aquí. «Dios/Yahvé/Mesías» no aparecen. Las decisiones léxicas principales concuerdan con el audit trail inglés: «tambalearán» por וְהִתְגֹּעֲשׁוּ, «actuarán como locos» por וְהִתְהֹלָלוּ, y «a causa de la espada» por מִפְּנֵי הַחֶרֶב.'
  issues:
  - severity: low
    issue: Redacción poco natural en la nota al pie
    rationale: «Volverse enajenado» no suena idiomático en español moderno neutral y no comunica mejor que «enloquecer» o «volverse loco». La alternativa debe sonar natural y reflejar la opción inglesa «go mad».
  revised_spanish_text: Beberán, tambalearán y actuarán como locos[a] a causa de la espada que yo envío entre ellos.
  revised_footnotes:
  - marker: a
    text: O «enloquecerán». El verbo hebreo puede denotar comportarse de manera irracional o volverse loco.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al hebreo y al audit trail inglés. Solo se corrige la nota para mejorar la naturalidad y precisión del español, preservando la alternativa léxica documentada.
