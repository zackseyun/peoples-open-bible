translation:
  language: es
  text: Y aconteció que, mientras estaban sentados a la mesa, la palabra de Yahvé llegó al profeta que lo había hecho regresar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y pasó
  - Y sucedió
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce un nuevo evento en secuencia. «Aconteció» conserva ese valor discursivo con un tono natural y digno en español.
- source_word: הֵם יֹשְׁבִים
  english_pob_choice: as they were sitting
  chosen_spanish: mientras ellos estaban sentados
  alternatives_spanish:
  - así que estaban sentados
  - cuando estaban sentados
  lexicon: HALOT
  rationale: El pronombre más participio expresa estado/acción en curso. «Mientras ellos estaban sentados» transmite la simultaneidad y el carácter durativo sin forzar el español.
- source_word: אֶל הַשֻּׁלְחָן
  english_pob_choice: at the table
  chosen_spanish: a la mesa
  alternatives_spanish:
  - en la mesa
  - junto a la mesa
  lexicon: HALOT
  rationale: Con ישב y una comida, אֶל funciona idiomáticamente como una referencia a la mesa de comida. En español, «a la mesa» comunica bien esa escena de banquete/fellowship sin sonar artificial.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - la palabra de YHWH
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: Se sigue el nombre divino Yahvé según el criterio del proyecto. «Palabra» mantiene la fórmula profética estándar y la relación revelatoria del hebreo.
- source_word: אֶל הַנָּבִיא
  english_pob_choice: to the prophet
  chosen_spanish: al profeta
  alternatives_spanish:
  - sobre el profeta
  - hacia el profeta
  lexicon: HALOT
  rationale: אֶל marca al receptor del mensaje divino. «Al profeta» es la equivalencia directa y natural en español.
- source_word: אֲשֶׁר הֱשִׁיבוֹ
  english_pob_choice: who had brought him back
  chosen_spanish: que lo había hecho volver
  alternatives_spanish:
  - que lo había traído de vuelta
  - que lo había hecho regresar
  lexicon: HALOT
  rationale: 'El hiphil de שוב con sufijo indica acción causativa: alguien hizo que el otro volviera. «Lo había hecho volver» preserva esa causatividad y evita perder la tensión del verbo hebreo.'
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrammaton directamente. Siguiendo el criterio del proyecto, se conserva el nombre propio del pacto en español como «Yahvé», no una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés y el hebreo: se conservan la secuencia narrativa, la simultaneidad del participio y la causatividad de שוב sin introducir paráfrasis adicionales. No se detectaron revisiones previas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se evitó «SEÑOR» para no ocultar el nombre divino.
  - «Lo había hecho volver» mantiene la fuerza causativa del hebreo mejor que un simple «había vuelto».
  - La preposición «a la mesa» se eligió por idiomaticidad española en contexto de comida, equivalente funcional de אֶל הַשֻּׁלְחָן.
