review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: consecuencia profética, exilio por falta de conocimiento, élites consumidas por hambre y la multitud agotada por sed. También conserva adecuadamente la decisión del audit trail de entender כְבוֹדוֹ como personas prominentes y no como un abstracto literal. Sin embargo, dos giros españoles debilitan la fidelidad estilística y semántica: ''hombres honorables'' suena poco idiomático y puede sugerir carácter moral más que estatus social, y ''está reseca de sed'' resulta algo forzado para un colectivo humano.'
  spanish_quality_summary: El texto es claro, pero necesita una reparación menor para sonar más natural y eclesialmente legible en español neutral. 'Va al destierro' es aceptable, aunque 'va al exilio' también sería natural; no exige cambio. El principal ajuste de calidad es reemplazar 'sus hombres honorables' por 'sus nobles' o 'sus hombres distinguidos'; dado que la nota ya preserva 'sus nobles' como alternativa, conviene usarlo en el texto principal por naturalidad y precisión social. Además, 'su multitud está reseca de sed' suena rígido; 'su multitud está seca de sed' o 'su multitud está consumida de sed' fluye mejor. La opción 'seca de sed' mantiene la imagen de desecación sin artificio.
  glossary_alignment: No hay conflictos con los términos base del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La decisión de mantener 'conocimiento' está bien alineada con la nota teológica. La nota léxica sobre כְבוֹדוֹ debe mantenerse, aunque el texto principal cambie a una opción más idiomática.
  issues:
  - severity: medium
    issue: '''sus hombres honorables'' es poco idiomático y semánticamente impreciso'
    rationale: En español, 'honorables' suele evocar respetabilidad moral o tratamiento protocolario, no necesariamente la clase prominente/noble que el audit trail documenta. 'Sus nobles' comunica mejor el referente social implícito en כְבוֹדוֹ + מתי רעב.
  - severity: low
    issue: '''está reseca de sed'' suena forzado para personas/colectivo'
    rationale: Aunque intenta reflejar צִחֵה, 'reseca' aplicado a una multitud humana no es la opción más natural en español bíblico moderno. 'seca de sed' conserva la imagen y mejora la legibilidad.
  revised_spanish_text: Por tanto, mi pueblo va al destierro por falta de conocimiento; sus nobles[a] mueren de hambre, y su multitud está seca de sed.
  revised_footnotes:
  - marker: a
    text: O 'sus hombres distinguidos'; el hebreo literalmente dice 'su gloria, hombres de hambre', probablemente refiriéndose a las personas distinguidas o prominentes de la nación.
    reason: lexical_alternative
  revision_rationale: Se hizo una reparación menor para mejorar la naturalidad y precisión del español sin alterar la decisión exegética del audit trail. 'Sus nobles' expresa mejor la referencia a personas prominentes que 'sus hombres honorables', y 'está seca de sed' suena más natural que 'está reseca de sed' mientras mantiene la imagen hebrea. La nota se ajusta para preservar la alternativa cercana al borrador original.
