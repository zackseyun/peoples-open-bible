translation:
  language: es
  text: Los descendientes[a] de sus siervos la heredarán[b], y los que aman su nombre habitarán en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la descendencia». El hebreo זֶרַע es un singular colectivo que aquí se refiere a la posteridad o descendientes.
    reason: lexical_alternative
  - marker: b
    text: El pronombre femenino («la/ella») remite a Sion, la ciudad restaurada, en el contexto inmediato; más ampliamente, algunos lo entienden como la tierra o Jerusalén.
    reason: cross_reference
lexical_decisions:
- source_word: זֶרַע
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - posteridad
  - hijos
  lexicon: HALOT
  rationale: En este contexto colectivo, זֶרַע designa la línea de posteridad. "Descendencia" conserva la idea colectiva y natural en español, sin forzar una imagen exclusivamente biológica ni volverla demasiado explicativa.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus esclavos
  - sus servidores
  lexicon: HALOT
  rationale: Aunque עֶבֶד puede ser "esclavo" o "siervo", aquí el contexto salmódico y de pertenencia a Dios favorece "siervos" como término bíblico claro en español. "Esclavos" sería posible lexicalmente, pero sonaría más duro de lo que exige este verso.
- source_word: יִנְחָלוּהָ
  english_pob_choice: will inherit it
  chosen_spanish: la heredará
  alternatives_spanish:
  - la poseerá
  - la recibirá como herencia
  - tomará posesión de ella
  lexicon: HALOT
  rationale: El verbo נחל en este uso apunta a recibir como herencia. "Heredará" preserva la metáfora hereditaria y el matiz futuro. Se eligió el femenino singular "la" porque el referente implícito es una entidad femenina en español, correspondiente al antecedente del contexto.
- source_word: אֹהֲבֵי שְׁמוֹ
  english_pob_choice: those who love his name
  chosen_spanish: los que aman su nombre
  alternatives_spanish:
  - los amantes de su nombre
  - los que aman a él
  lexicon: HALOT
  rationale: La construcción participial se conserva de forma natural con "los que aman su nombre". Esto mantiene el idiomatismo bíblico de amar el nombre de Dios sin reducirlo a una mera paráfrasis personal.
- source_word: יִשְׁכְּנוּ בָהּ
  english_pob_choice: will dwell in it
  chosen_spanish: habitarán en ella
  alternatives_spanish:
  - morarán en ella
  - vivirán en ella
  - se establecerán en ella
  lexicon: HALOT
  rationale: שכן significa habitar/residir. "Habitarán" conserva el tono bíblico y digno del hebreo, mientras "en ella" refleja el sufijo femenino singular del original y mantiene el referente implícito del contexto.
theological_decisions:
- issue: Referente del pronombre femenino singular en ambos verbos
  english_pob_reading: The pronoun 'it' refers to Zion/the restored city in the preceding context; more broadly, some understand it as the land or Jerusalem.
  chosen_spanish_reading: El pronombre se traduce con "la/ella" y remite a Sion/la ciudad restaurada en el contexto inmediato; de manera más amplia, puede entenderse también como la tierra o Jerusalén.
  alternative_spanish_readings:
  - la tierra
  - Jerusalén
  rationale: El contexto cercano habla de Sion y de las ciudades de Judá, por lo que ese antecedente es el más probable. La formulación española conserva la ambigüedad del hebreo sin sobreespecificar un referente único más allá del contexto.
  doctrine_reference: Contexto literario inmediato de Salmos 69:35-37
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios en la última pasada; la versión española sigue esa lectura de alta concordancia y conserva las decisiones léxicas y referenciales principales sin introducir ampliaciones.
  spanish_consistency_notes:
  - Se mantuvo la terminología POB de «Yahvé» cuando el nombre divino esté implicado en el contexto, aunque en este versículo no aparece explícito.
  - «Siervos» se usó de forma coherente con el valor bíblico de עֶבֶד en un contexto devocional.
  - Se preservó la ambigüedad del referente femenino con «la/ella», sin sustituirla por un nombre interpretativo en el cuerpo principal.
  - El paralelismo poético quedó reflejado con dos miembros coordinados por «y».
