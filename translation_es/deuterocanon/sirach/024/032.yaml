translation:
  language: es
  text: Otra vez haré que la instrucción brille como el alba, y haré manifiestas[a] estas cosas hasta muy lejos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la daré a conocer hasta muy lejos». El griego cambia de «instrucción» en singular a αὐτά, plural neutro («estas cosas/ellas»), probablemente refiriéndose al contenido de la enseñanza de la Sabiduría.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι
  english_pob_choice: again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - todavía
  - aún
  - de nuevo
  lexicon: LSJ
  rationale: ἔτι aquí es continuativo o reiterativo, no adversativo. «Otra vez» comunica repetición en español natural sin introducir contraste indebido.
- source_word: παιδείαν
  english_pob_choice: instruction
  chosen_spanish: la instrucción
  alternatives_spanish:
  - la disciplina
  - la enseñanza
  - la formación
  lexicon: LSJ
  rationale: En Sirácides, παιδεία abarca enseñanza formativa; «instrucción» preserva ese valor didáctico mejor que «disciplina», que en español puede sonar punitivo.
- source_word: ὡς ὄρθρον
  english_pob_choice: like the dawn
  chosen_spanish: como el alba
  alternatives_spanish:
  - como la mañana
  - como el amanecer
  - como la aurora
  lexicon: LSJ
  rationale: ὄρθρος designa el inicio de la mañana. «Como el alba» mantiene la imagen de luz naciente con buena naturalidad en español.
- source_word: φωτιῶ
  english_pob_choice: I will make ... shine
  chosen_spanish: haré que ... brille
  alternatives_spanish:
  - iluminaré
  - haré que ... resplandezca
  - daré luz a
  lexicon: LSJ
  rationale: El futuro de φωτίζω conserva la metáfora de luz. En español, «haré que la instrucción brille» reproduce la fuerza causativa sin sonar forzado.
- source_word: ἐκφανῶ
  english_pob_choice: I will make it known
  chosen_spanish: la daré a conocer
  alternatives_spanish:
  - la revelaré
  - la haré manifiesta
  - la pondré en claro
  lexicon: LSJ
  rationale: ἐκφαίνω puede significar revelar o hacer manifiesto. «Daré a conocer» es una opción idiomática que conserva la idea de manifestación pública y amplia.
- source_word: αὐτά
  english_pob_choice: these things
  chosen_spanish: la
  alternatives_spanish:
  - los
  - estas cosas
  - ello
  lexicon: LSJ
  rationale: Aunque αὐτά es neutro plural, el contexto inmediato de παιδείαν favorece referirlo a «la instrucción» de manera singular en español, como también permitió la revisión inglesa más reciente. No se explicita el plural para no sobrecargar la frase.
- source_word: ἕως εἰς μακράν
  english_pob_choice: far into the distance
  chosen_spanish: muy lejos
  alternatives_spanish:
  - hasta lejos
  - a gran distancia
  - lejos
  lexicon: LSJ
  rationale: La expresión es espacial/metafórica y apunta a amplia difusión. «Muy lejos» es natural y preserva el alcance sin introducir una estructura pesada.
theological_decisions:
- issue: Valor de αὐτά tras un singular en la primera mitad del verso
  english_pob_reading: The Greek shifts from singular 'instruction' to plural 'these things/them,' likely referring to the contents of Wisdom's teaching.
  chosen_spanish_reading: 'Se mantiene la referencia singular implícita en el verbo pronominal: «la daré a conocer».'
  alternative_spanish_readings:
  - «las daré a conocer»
  - «haré estas cosas conocidas»
  rationale: El griego presenta una tensión real entre παιδείαν singular y αὐτά plural. En español, la frase más natural y fiel al flujo poético es conservar el referente singular inmediato y no forzar un plural que sonaría menos claro. La tensión queda respetada sin anular la posibilidad plural del original.
  doctrine_reference: Preservar la tensión léxica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó ἐκφανῶ a un sentido más natural de «make it known» y prefirió un referente singular en la segunda cláusula. La versión española sigue esa decisión, pero conserva la imagen de luz con «brille» y la amplitud espacial con «muy lejos».
  spanish_consistency_notes:
  - Se mantiene «instrucción» para παιδεία en consonancia con el uso auditado del proyecto.
  - Se evita «Cristo»/«Mesías» porque no aplican a este versículo.
  - Se conserva la metáfora de luz en ambas cláusulas para reflejar φωτιῶ y ἐκφανῶ.
  - «Otra vez» reproduce mejor la continuidad de ἔτι que un contraste como «pero» o «sin embargo».
