translation:
  language: es
  text: 'Y aconteció aquel día que los siervos de Isaac[b] vinieron y le informaron acerca del pozo que habían cavado[a], y le dijeron: «Hemos hallado agua».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «en el mismo día», subrayando que el informe llegó precisamente el día de los eventos del pacto anteriores.'
    reason: lexical_alternative
  - marker: b
    text: «Siervos» también podría traducirse «esclavos», ya que el término hebreo puede referirse a trabajadores domésticos en condición de servidumbre; aquí el contexto no pone ese matiz social en primer plano.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce un nuevo evento en secuencia. «Aconteció» conserva el tono narrativo sin volverse arcaico en exceso.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - ese mismo día
  lexicon: HALOT
  rationale: «Aquel» mantiene la referencia demostrativa al día inmediatamente previo y es natural en español bíblico contemporáneo.
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  lexicon: HALOT
  rationale: «Vinieron» reproduce el movimiento hacia el hablante o el centro narrativo, de manera cercana al verbo hebreo בוא en contexto narrativo.
- source_word: עַבְדֵי יִצְחָק
  english_pob_choice: Isaac’s servants
  chosen_spanish: los esclavos de Isaac
  alternatives_spanish:
  - los siervos de Isaac
  - los servidores de Isaac
  lexicon: HALOT
  rationale: Se mantiene la fuerza léxica de עבד como término de dependencia laboral/bondad. Aunque «siervos» sería más tradicional, «esclavos» conserva mejor la amplitud semántica que la POB inglesa deja abierta con la nota textual.
- source_word: וַיַּגִּדוּ ל֔וֹ
  english_pob_choice: told him
  chosen_spanish: le informaron
  alternatives_spanish:
  - le contaron
  - le dieron cuenta
  lexicon: HALOT
  rationale: נגד en hiphil puede significar comunicar o informar. «Le informaron» refleja mejor el reporte formal de sus hallazgos que «le dijeron», sin perder naturalidad.
- source_word: עַל אֹדוֹת הַבְּאֵר
  english_pob_choice: about the well
  chosen_spanish: acerca del pozo
  alternatives_spanish:
  - sobre el pozo
  - con respecto al pozo
  lexicon: HALOT
  rationale: La expresión idiomática עַל אֹדוֹת se vierte de forma natural como «acerca de». «Pozo» es el equivalente usual y claro para הַבְּאֵר.
- source_word: אֲשֶׁר חָפָרוּ
  english_pob_choice: that they had dug
  chosen_spanish: que habían cavado
  alternatives_spanish:
  - que cavaron
  - que habían excavado
  lexicon: HALOT
  rationale: El pluscuamperfecto en español expresa con claridad que la excavación precedió al informe. «Cavado» es el verbo más natural y directo.
- source_word: וַיֹּאמְרוּ ל֖וֹ
  english_pob_choice: and they said to him
  chosen_spanish: y le dijeron
  alternatives_spanish:
  - y le dijeron a él
  lexicon: HALOT
  rationale: Se conserva la introducción explícita del discurso. En español, «le dijeron» fluye mejor y mantiene el destinatario indirecto.
- source_word: מָצָאנוּ מָֽיִם
  english_pob_choice: We have found water
  chosen_spanish: Hemos hallado agua
  alternatives_spanish:
  - Hemos encontrado agua
  - Encontramos agua
  lexicon: HALOT
  rationale: «Hallar» reproduce con dignidad el resultado encontrado; en español bíblico suena natural. El presente perfecto comunica la relevancia inmediata del hallazgo.
theological_decisions:
- issue: Valor de עַבְדֵי יִצְחָק
  english_pob_reading: Servants could also be rendered slaves, since the Hebrew term can denote bonded household laborers; here the context does not foreground that social nuance.
  chosen_spanish_reading: «Esclavos» mantiene abierta la posibilidad de dependencia servil real, sin suavizar el término a «siervos».
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: En este versículo no hay indicios de un matiz honorífico; por eso se preserva la tensión léxica del hebreo con una opción más fuerte que la POB inglesa admite como posible.
  doctrine_reference: Lexical semantics of Hebrew עבד in narrative context; no doctrinal issue.
translation_notes:
  revision_awareness: Se revisó el estado más reciente del pasaje, con acuerdo alto y sin cambios aplicados; la presente redacción sigue de cerca el trazado inglés auditado, pero vuelve al hebreo para decidir entre «servants/servants-slaves» y la fuerza de עבד, además de mantener la secuencia narrativa y la relación temporal de בַּיּוֹם הַהוּא.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general cuando aparezca el nombre divino; este versículo no contiene el tetragrámaton.
  - Se mantiene «agua» sin especificadores, porque el hebreo no marca cantidad.
  - La puntuación de cita directa sigue el uso editorial español con comillas angulares no requeridas; se opta por comillas inglesas simples en esta interfaz por compatibilidad técnica.
