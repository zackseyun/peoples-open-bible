translation:
  language: es
  text: y el territorio de Og, rey de Basán, del remanente de los refaítas[a], que habitaba en Astarot y en Edrei.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los gigantes». El hebreo refaím puede referirse a un pueblo antiguo recordado como de estatura inusualmente grande.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/גְב֗וּל
  english_pob_choice: and the territory of
  chosen_spanish: y el territorio de
  alternatives_spanish:
  - y el límite de
  - y la región de
  lexicon: HALOT
  rationale: En este contexto de resumen de conquista, גְבוּל expresa el ámbito territorial asociado al reino de Og, no solo una línea fronteriza. «Territorio» conserva el sentido geográfico y suena natural en español.
- source_word: ע֚וֹג
  english_pob_choice: Og
  chosen_spanish: Og
  lexicon: Nombre propio
  rationale: Nombre propio transliterado de manera directa.
- source_word: מֶ֣לֶךְ הַ/בָּשָׁ֔ן
  english_pob_choice: king of Bashan
  chosen_spanish: rey de Basán
  alternatives_spanish:
  - rey de Bashán
  lexicon: HALOT
  rationale: La cadena constructa identifica a Og como rey de Basán. «Basán» sigue la forma española establecida para el topónimo; «rey de Basán» es la equivalencia natural y fiel.
- source_word: מִ/יֶּ֖תֶר
  english_pob_choice: from the remnant of
  chosen_spanish: de entre el remanente de
  alternatives_spanish:
  - del resto de
  - de lo que quedó de
  lexicon: HALOT
  rationale: יֶתֶר comunica lo que quedó o permaneció. «Remanente» preserva ese valor residual y, con «de entre», expresa mejor en español la idea de pertenencia/origen dentro de un grupo superviviente.
- source_word: הָ/רְפָאִ֑ים
  english_pob_choice: the Rephaim
  chosen_spanish: los refaítas
  alternatives_spanish:
  - los Refaím
  - los gigantes
  lexicon: HALOT
  rationale: Se conserva el nombre del grupo en transliteración española. En el texto principal no se interpreta como «gigantes» para no introducir una glosa; esa lectura queda como alternativa léxica implícita por el trasfondo del término.
- source_word: הַ/יּוֹשֵׁ֥ב
  english_pob_choice: who lived
  chosen_spanish: que habitaba
  alternatives_spanish:
  - que vivía
  - que residía
  lexicon: HALOT
  rationale: El participio de ישב expresa residir/habitar. «Habitaba» es natural en español bíblico contemporáneo y mantiene el valor durativo de residencia.
- source_word: בְּ/עַשְׁתָּר֖וֹת
  english_pob_choice: in Ashtaroth
  chosen_spanish: en Astarot
  alternatives_spanish:
  - en Ashtarot
  lexicon: Nombre propio
  rationale: Topónimo transliterado a una forma española legible y reconocible. Se usa «en» para la localización.
- source_word: וּ/בְ/אֶדְרֶֽעִי
  english_pob_choice: and in Edrei
  chosen_spanish: y en Edrei
  lexicon: Nombre propio
  rationale: Se conserva el topónimo y la coordinación con «y en» para reflejar ambos elementos del hebreo.
theological_decisions:
- issue: 'Rephaim: etnónimo frente a glosa interpretativa'
  english_pob_reading: the Rephaim, with a footnote noting that the Hebrew can refer to giants
  chosen_spanish_reading: los refaítas
  alternative_spanish_readings:
  - los gigantes
  rationale: El texto base conserva el etnónimo en la línea principal. En español, «refaítas» evita convertir una identificación histórica en una interpretación, manteniendo la tensión semántica documentada por el POB inglés.
  doctrine_reference: No aplica; decisión léxica-histórica sobre un grupo antiguo.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin cambios de revisión pendientes; la decisión principal afectada es la conservación del etnónimo Refaím en el texto y la posible glosa alternativa en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el hebreo original lo exige; este versículo no lo contiene.
  - Se usó «Basán» y «Edrei/Astarot» como topónimos transliterados con forma española legible.
  - Se prefirió «habitaba» para conservar el matiz de residencia continua del participio hebreo.
  - Se evitó «gigantes» en el cuerpo del texto para no borrar la ambigüedad/documentación del término Refaím.
