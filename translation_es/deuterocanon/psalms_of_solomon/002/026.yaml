translation:
  language: es
  text: Y serán llevados a su fin[a], a menos que tú, Señor[b], los reprendas en tu ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serán consumados» o «serán destruidos» para «serán llevados a su fin» (συντελεσθήσονται).'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Y serán llevados a su fin, a menos que tú, Señor, los reprendas».'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  lexicon: LSJ
  rationale: Conserva la unión discursiva simple del griego sin añadir matiz temporal ni explicativo.
- source_word: συντελεσθήσονται
  english_pob_choice: will be brought to an end
  chosen_spanish: serán llevados a su fin
  alternatives_spanish:
  - serán acabados
  - serán destruidos
  - serán consumados
  lexicon: LSJ
  rationale: El futuro pasivo pide una construcción pasiva en español. 'Serán llevados a su fin' preserva la idea de terminación sin forzar más de lo que el griego exige en este contexto.
- source_word: ἐὰν μὴ
  english_pob_choice: unless
  chosen_spanish: si no
  alternatives_spanish:
  - a menos que
  - salvo que
  lexicon: LSJ
  rationale: '''Si no'' reproduce con naturalidad la excepción condicional; evita añadir una formulación más interpretativa.'
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - ¡Señor!
  - O Señor
  lexicon: LSJ
  rationale: Tratamiento directo de κύριε en vocativo; 'Señor' es la forma natural y reverente en español para la oración.
- source_word: ἐπιτιμήσεις
  english_pob_choice: rebuke
  chosen_spanish: reprendas
  alternatives_spanish:
  - reproches
  - corrijas con severidad
  - censures
  lexicon: LSJ
  rationale: '''Reprender'' expresa la reprensión autoritativa de ἐπιτιμάω; ''reprendas'' mantiene el tono directo con el subjuntivo esperado en la subordinada condicional.'
- source_word: ἐν ὀργῇ σου
  english_pob_choice: in your wrath
  chosen_spanish: en tu ira
  alternatives_spanish:
  - en tu furor
  - con tu ira
  lexicon: LSJ
  rationale: ὀργή tiene fuerza judicial/severa; 'ira' es fiel y natural en español, sin suavizar el matiz.
theological_decisions:
- issue: Sujeto implícito de la cláusula pasiva
  english_pob_reading: And they will be brought to an end, unless you, Lord, rebuke them in your wrath.
  chosen_spanish_reading: Y serán llevados a su fin, si no eres tú, Señor, quien los reprenda en tu ira.
  alternative_spanish_readings:
  - Y Israel será llevado a su fin, si no eres tú, Señor, quien los reprenda en tu ira.
  - Y serán llevados a su fin, si no eres tú, Señor, quien los reprenda en tu ira.
  rationale: El griego no expone el sujeto, pero el contexto previo de la composición permite oír a los destinatarios perseguidos como referente implícito. En español, mantengo la impersonalidad pasiva para no introducir un sujeto no expresado por el texto, aunque la referencia contextual siga siendo necesaria para la comprensión.
  doctrine_reference: Contexto literario inmediato; antecedente anafórico
- issue: Alcance de ὀργή aplicado a Dios
  english_pob_reading: in your wrath
  chosen_spanish_reading: en tu ira
  alternative_spanish_readings:
  - en tu furor
  - en tu indignación
  rationale: Conservo la fuerza judicial del término sin cargarlo con un registro excesivamente técnico. 'Ira' comunica bien el juicio severo implícito en el griego.
  doctrine_reference: Lenguaje bíblico de juicio divino
translation_notes:
  revision_awareness: El audit trail inglés pasó de una lectura con 'Israel' como sujeto explícito a una revisión que volvió al 'they' impersonal por ausencia de sujeto explícito en el griego. La versión española sigue esa revisión reciente, conservando la pasiva y evitando suplir 'Israel' en el texto principal.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para Κύριε, conforme al tratamiento vocativo reverente y el estilo bíblico en español.
  - '''Ira'' se usa para ὀργή, sin suavizarla a ''enojo'', por la carga judicial del contexto.'
  - La pasiva 'serán llevados a su fin' preserva el aspecto impersonal del griego mejor que una construcción activa en español.
