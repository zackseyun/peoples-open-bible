    rationale: La nota puede afinarse para decir «para que lo oyéramos / para que lo oyeran» o «para que lo oigamos / lo oigan». Esto mejora la precisión interna respecto a las dos mitades del versículo.
  revised_spanish_text: 'Y ellos le dijeron[a]: «Por favor, siéntate y léelo para que lo oigamos». Entonces Baruc lo leyó para que lo oyeran.'
