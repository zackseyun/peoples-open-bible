review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la auditoría inglesa en los puntos principales: la maldición recae sobre la ira/furor, mantiene la causalidad de כִּי, y conserva el paralelismo ''en Jacob / en Israel''. Sin embargo, ''es duro'' suena poco natural en español cuando califica ''furor'' y debilita la claridad del juicio; una forma como ''es violento'' o ''es severo'' comunica mejor la dureza del hebreo en contexto. Además, la nota al pie quedó sin traducir al español.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero necesita un ajuste menor de naturalidad y una corrección de localización. 'Maldita sea su ira' funciona bien; 'su furor' también es aceptable. El principal problema de legibilidad es 'su furor, porque es duro', que en español moderno eclesial resulta extraño. La nota al pie en inglés desentona con el resto del registro y debe ponerse en español.
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La distinción teológica documentada —maldecida la ira, no directamente las personas— se preserva correctamente en español.
  issues:
