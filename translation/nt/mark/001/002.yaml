id: MRK.1.2
reference: Mark 1:2
source:
  edition: SBLGNT
  text: ⸀Καθὼς γέγραπται ἐν ⸂τῷ Ἠσαΐᾳ τῷ προφήτῃ⸃· ⸀Ἰδοὺ ἀποστέλλω τὸν ἄγγελόν μου πρὸ προσώπου σου, ὃς κατασκευάσει τὴν ὁδόν ⸀σου·
translation:
  text: 'Just as it is written in Isaiah the prophet: ‘Behold[a], I send my messenger before your face[c][b], who will prepare your way.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read “in the prophets” instead of “in Isaiah the prophet.”
    reason: textual_variant
  - marker: b
    text: The quotation combines wording from Malachi 3:1 and Isaiah 40:3.
    reason: cross_reference
  - marker: c
    text: Or “before you.” Literally, “before your face.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Καθὼς
  chosen: Just as
  alternatives:
  - As
  - Even as
  lexicon: BDAG
  rationale: Introduces correspondence with what follows. 'Just as' is natural modern English and preserves the comparative force.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: Perfect passive formula commonly used for Scripture citation. English idiom favors 'it is written' as a present authoritative written state.
- source_word: ἐν τῷ Ἠσαΐᾳ τῷ προφήτῃ
  chosen: in Isaiah the prophet
  alternatives:
  - in the prophet Isaiah
  - in Isaiah the prophet's book
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase naming the prophetic source. 'In Isaiah the prophet' reflects the Greek order and common citation style.
- source_word: Ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Retains the prophetic, attention-calling force of the citation. Though slightly elevated, it remains recognizable and preserves the solemn scriptural tone better than the more colloquial 'Look.'
- source_word: ἀποστέλλω
  chosen: I am sending
  alternatives:
  - I send
  lexicon: BDAG
  rationale: The present tense in a prophetic citation can be rendered as a vivid present. 'I am sending' sounds natural in English while preserving immediacy.
- source_word: ἄγγελόν
  chosen: messenger
  alternatives:
  - angel
  lexicon: BDAG
  rationale: In this context the referent is a human forerunner, not a heavenly being, and the quotation background (Mal 3:1) supports 'messenger' as the plain sense.
- source_word: πρὸ προσώπου σου
  chosen: ahead of you
  alternatives:
  - before your face
  - before you
  lexicon: BDAG
  rationale: The idiom means 'before' or 'in front of.' 'Ahead of you' is clear modern English and preserves the directional sense without wooden literalism.
- source_word: κατασκευάσει
  chosen: will prepare
  alternatives:
  - will make ready
  - will make ready for
  lexicon: BDAG
  rationale: The verb means to prepare or make ready. 'Will prepare' is concise and idiomatic in English.
- source_word: τὴν ὁδόν σου
  chosen: your way
  alternatives:
  - your road
  - the way before you
  lexicon: BDAG
  rationale: In prophetic and metaphorical usage ὁδός commonly denotes a way or path. 'Your way' preserves both the literal image and its figurative force.
