translation:
  language: es
  text: Las ramas inacabadas[a] serán desgajadas, y su fruto será inútil, inmaduro para comer[b] y no apto para nada;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ramas inmaduras» para «ramas inacabadas»; el adjetivo griego puede denotar lo que aún no ha llegado a su completitud.
    reason: lexical_alternative
  - marker: b
    text: O «prematuro para comer» en lugar de «inmaduro para comer». En este contexto de fruto, «inmaduro» expresa mejor la imagen.
    reason: lexical_alternative
lexical_decisions:
- source_word: περικλασθήσονται
  english_pob_choice: will be broken off
  chosen_spanish: serán quebradas
  alternatives_spanish:
  - serán rotas
  - serán desgajadas
  - serán arrancadas
  lexicon: LSJ
  rationale: El futuro pasivo exige una acción futura sufrida por las ramas. «Serán quebradas» conserva la pasividad y la imagen de quiebre/separación sin endurecerla en una forma demasiado técnica o demasiado libre.
- source_word: κλῶνες
  english_pob_choice: branches
  chosen_spanish: ramas
  alternatives_spanish:
  - ramas
  - brazos
  - vástagos
  lexicon: LSJ
  rationale: «Ramas» es el equivalente botánico más natural en español y mantiene la metáfora agrícola de manera clara y digna.
- source_word: ἀτέλεστοι
  english_pob_choice: unfinished
  chosen_spanish: inacabadas
  alternatives_spanish:
  - incompletas
  - no llevadas a término
  - inmaduras
  lexicon: LSJ
  rationale: El adjetivo indica algo no llevado a su culminación. «Inacabadas» preserva la idea de falta de completitud. Se añade como nota la alternativa de «inmaduras» porque el campo semántico puede sugerir desarrollo insuficiente, pero el contexto principal es de completitud.
- source_word: καρπός
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruto
  - producto
  - cosecha
  lexicon: LSJ
  rationale: «Fruto» reproduce el término agrícola literal y mantiene la coherencia de la imagen.
- source_word: ἄχρηστος
  english_pob_choice: useless
  chosen_spanish: inútil
  alternatives_spanish:
  - inútil
  - sin valor
  - inservible
  lexicon: LSJ
  rationale: «Inútil» comunica con claridad la falta de utilidad/valor práctica que expresa el adjetivo griego, sin cargarlo de matices más fuertes de los necesarios.
- source_word: ἄωρος
  english_pob_choice: unripe
  chosen_spanish: verde
  alternatives_spanish:
  - verde
  - inmaduro
  - prematuro
  lexicon: LSJ
  rationale: En español, aplicado al fruto, «verde» es una forma natural y comprensible de expresar que todavía no está maduro. Mantiene la imagen agrícola y evita una perícopa demasiado explicativa.
- source_word: εἰς βρῶσιν
  english_pob_choice: for eating
  chosen_spanish: para comer
  alternatives_spanish:
  - para comer
  - para alimento
  - para ser comido
  lexicon: LSJ
  rationale: «Para comer» transmite la aptitud para el consumo de manera directa y natural en español, en línea con el valor funcional de la frase.
- source_word: ἐπιτήδειος
  english_pob_choice: fit
  chosen_spanish: apto
  alternatives_spanish:
  - apto
  - adecuado
  - útil
  lexicon: LSJ
  rationale: «Apto» conserva la idea de aptitud/suitability. La construcción «para nada apto» refleja con naturalidad el griego εἰς οὐδὲν ἐπιτήδειος, sin diluir la fuerza negativa.
theological_decisions:
- issue: Mantener la metáfora agrícola sin explicitar el referente moral en la línea
  english_pob_reading: Retain the literal image of branches and fruit without making the implied moral referent explicit in the translation.
  chosen_spanish_reading: Conservar la imagen literal de ramas y fruto, sin introducir aquí la interpretación moral del pasaje.
  alternative_spanish_readings:
  - 'Explicitar el referente: ‘su descendencia fallará’'
  - Parafrasear como juicio moral directo
  rationale: El contexto cercano da la interpretación, pero este versículo en sí presenta la imagen agrícola. La traducción española conserva esa tensión para no sobreinterpretar el texto ni perder la fuerza figurativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La base auditada en inglés se mantuvo estable en la revisión más reciente; no hubo cambios sustantivos tras el último pase. Se respetó el acuerdo alto del control cruzado y se conservaron las dos alternativas léxicas documentadas para ἀτέλεστοι y ἄωρος.
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ y otros términos de sustitución porque este versículo no contiene el Tetragrámaton ni un equivalente contextual.
  - Se eligió ‘fruto’ y ‘ramas’ por su transparencia agrícola y por su correspondencia directa con el griego.
  - La pareja ‘verde para comer’ / ‘para nada apto’ intenta preservar tanto la imagen natural como la fuerza negativa final del griego.
