  rationale: Se reubicaron las notas en las palabras correctas y se sustituyó «estaban siendo cambiadas a muerte» por «estaban siendo entregadas a la muerte» para conservar la fuerza metafórica del griego con un español más natural y comprensible. También se movió la nota sobre «el lugar» a su referente real.
