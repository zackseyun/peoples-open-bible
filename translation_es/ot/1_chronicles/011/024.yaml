  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Valientes» para הַגִּבֹּרִים es aceptable en este contexto de Crónicas y coincide con la justificación documentada. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc.
