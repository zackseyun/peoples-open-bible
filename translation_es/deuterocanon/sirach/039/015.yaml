translation:
  language: es
  text: Con la música del arpa[a] y de instrumentos[c], así dirán con un grito[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lira» para el instrumento hebreo נבל; el nombre exacto del instrumento antiguo es incierto.
    reason: lexical_alternative
  - marker: b
    text: O «aclamación» o «clamor»; תרועה puede expresar un grito festivo, y en algunos contextos también un toque de trompeta.
    reason: lexical_alternative
  - marker: c
    text: El paralelo griego de este versículo es considerablemente más extenso y llama explícitamente a bendecir al Señor y a dar grandeza a su nombre; el testimonio hebreo aquí conserva solo la porción musical y aclamatoria.
    reason: textual_variant
lexical_decisions:
- source_word: בשירות
  english_pob_choice: With the music of
  chosen_spanish: Con la música de
  alternatives_spanish:
  - Con el servicio de
  - En el acompañamiento de
  - Con canciones de
  lexicon: HALOT
  rationale: El hebreo es breve y en este contexto introduce un marco musical para la acción final. «Música de» transmite el valor de acompañamiento musical que el audit trail inglés alcanzó con «music», sin forzar «servicio» en español, que sonaría demasiado abstracto o litúrgico.
- source_word: נבל
  english_pob_choice: harp
  chosen_spanish: arpa[a]
  alternatives_spanish:
  - lira
  - laúd
  lexicon: HALOT
  rationale: נבל designa un instrumento de cuerdas antiguo; «arpa» es una equivalencia inteligible y tradicional en español. Mantengo la posibilidad alternativa en nota porque la identificación exacta del instrumento antiguo sigue siendo incierta.
- source_word: כלי מינים
  english_pob_choice: instruments
  chosen_spanish: instrumentos
  alternatives_spanish:
  - instrumentos de música
  - instrumentos varios
  - instrumentos de cuerdas
  lexicon: HALOT
  rationale: La expresión hebrea apunta a instrumentos de diversas clases. El texto revisado inglés simplifica a «instruments», y en español «instrumentos» conserva esa concisión sin añadir una especificación no explícita.
- source_word: וכן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - y así
  - entonces
  - de este modo
  lexicon: HALOT
  rationale: '«Así» reproduce la función de transición modal: introduce la manera en que hablarán. Es natural en español y mantiene la relación con la cláusula anterior.'
- source_word: תאמרו
  english_pob_choice: you shall speak
  chosen_spanish: hablarán
  alternatives_spanish:
  - dirán
  - ustedes hablarán
  - pronunciarán
  lexicon: HALOT
  rationale: Aunque el hebreo puede leerse como segunda persona plural, el flujo español queda más natural con una forma verbal de futuro que expresa la exhortación/prescripción del pasaje. «Hablarán» preserva el acto verbal sin añadir un objeto no explícito.
- source_word: בתרועה
  english_pob_choice: with a shout
  chosen_spanish: con un grito[b]
  alternatives_spanish:
  - con una aclamación
  - con un clamor
  - con un toque de trompeta
  lexicon: HALOT
  rationale: תרועה puede abarcar grito, clamor o aclamación, e incluso un toque festivo. «Grito» es la opción más sobria y directa para el hebreo, y la nota conserva la alternativa de «aclamación» y la posible intensidad litúrgica del término.
theological_decisions:
- issue: Ajuste entre el hebreo conservado y el paralelo griego más pleno
  english_pob_reading: Translate primarily from the Hebrew line as preserved, while allowing the Greek to inform the praise-context and the nuance of the final acclamation.
  chosen_spanish_reading: Traducir primariamente el hebreo conservado, dejando que el paralelo griego ilumine el marco de alabanza sin importar sus cláusulas adicionales al texto español.
  alternative_spanish_readings:
  - Una reconstrucción más cercana al griego con bendición explícita del Señor y confesión/alabanza
  - Una versión que introduzca el contenido amplio del paralelo griego
  rationale: El testimonio hebreo aquí es el que el proyecto toma como texto principal, aunque esté abreviado frente al griego. Para no borrar la tensión documentada entre los testigos, el español sigue el hebreo conservado y no importa las cláusulas ausentes del griego. A la vez, la cadencia musical y celebrativa de la línea queda compatible con el sentido general del paralelo griego.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como apoyo, no como sustituto del testimonio principal.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del expediente, que prefirió «music» sobre «service», simplificó «instruments of music» a «instruments» y eliminó «of praise» por no estar explícito en el hebreo. La versión española refleja esas decisiones: usa un marco musical directo, evita equivalentes demasiado técnicos para «שירות», y conserva la sobriedad de תרועה como «grito».'
  spanish_consistency_notes:
  - He usado «arpa» como equivalente estándar y he dejado en nota la alternativa «lira» por la incertidumbre del instrumento.
  - He evitado «SEÑOR» y otras sustituciones devocionales; el verso no contiene aquí el Tetragrámaton en el hebreo conservado.
  - He mantenido un registro bíblico moderno y claro, sin añadir explicaciones interpretativas dentro del texto principal.
