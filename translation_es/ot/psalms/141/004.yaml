base_translation:
  language: en
  yaml_path: translation/ot/psalms/141/004.yaml
  text: Do not incline my heart to any evil thing[a], to practice wicked deeds with men who work iniquity[c][b]; and let me not eat of their delicacies.
  footnotes:
  - marker: a
    text: Or 'to an evil matter' or 'to an evil word'; the Hebrew davar can mean 'thing,' 'matter,' or 'word.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with evildoers.' Literally, 'with men who work iniquity.'
    reason: lexical_alternative
  - marker: c
    text: That is, their choice foods or pleasant things; the phrase may also imply sharing in their sinful pleasures.
    reason: lexical_alternative
