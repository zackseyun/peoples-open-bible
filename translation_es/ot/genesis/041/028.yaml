    issue: «la cosa» para הַדָּבָר
    rationale: 'Aunque דָּבָר puede significar «cosa», aquí el sentido es explicativo: el contenido o asunto del sueño. «La cosa» suena coloquial y menos preciso que «el asunto», apartándose de la rationale del POB inglés («the matter»).'
  - severity: medium
    issue: «que hablé a Faraón»
    rationale: Es una construcción poco natural en español moderno neutral. El hebreo דִּבַּרְתִּי אֶל puede expresarse de forma más idiomática como «que le dije a Faraón» sin pérdida semántica, y evita un calco innecesario.
  revised_spanish_text: 'Este es el asunto que le dije a Faraón: lo que Dios está haciendo se lo ha mostrado a Faraón[a].'
