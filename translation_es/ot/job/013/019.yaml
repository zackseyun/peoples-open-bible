translation:
  language: es
  text: ¿Quién es el que contenderá conmigo? Pues entonces callaría y moriría[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Entonces» refleja el uso contextual de עַתָּה en la secuencia argumentativa; el hebreo también puede leerse «ahora», de modo que la frase podría entenderse: «Pues ahora callaría y moriría».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי ה֭וּא
  english_pob_choice: Who is it
  chosen_spanish: ¿Quién es el que
  alternatives_spanish:
  - ¿Quién es?
  - ¿Quién es él que
  lexicon: HALOT
  rationale: El hebreo usa la interrogativa con pronombre independiente para dar énfasis. En español, «¿Quién es el que» conserva ese tono enfático y suena más natural que una traducción literal como «¿Quién es él».
- source_word: יָרִ֣יב
  english_pob_choice: will contend
  chosen_spanish: contenderá
  alternatives_spanish:
  - disputará
  - litigará
  - pleiteará
  lexicon: HALOT
  rationale: ריב tiene fuerza forense y adversarial. «Contenderá» mantiene el matiz de disputa/contienda sin especificar innecesariamente el marco jurídico de forma más fuerte que el hebreo.
- source_word: עִמָּדִי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - contra mí
  lexicon: HALOT
  rationale: Aunque la relación es hostil por el contexto, el hebreo dice literalmente «conmigo». «Conmigo» conserva la base léxica; la oposición ya queda clara por «contenderá».
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la pregunta desafiante de Job. «Porque» expresa bien la conexión argumentativa en español.
- source_word: עַתָּה
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - ahora
  lexicon: HALOT
  rationale: 'Aunque normalmente significa «ahora», en este contexto el sentido idiomático dentro del argumento de Job es resultativo/condicional: «entonces».'
- source_word: אַחֲרִישׁ
  english_pob_choice: I would be silent
  chosen_spanish: callaría
  alternatives_spanish:
  - me callaría
  - estaría en silencio
  lexicon: HALOT
  rationale: El verbo en hifil expresa guardar silencio. «Callaría» es breve, idiomático y preserva el valor de consecuencia hipotética.
- source_word: וְאֶגְוָע
  english_pob_choice: and die
  chosen_spanish: y moriría
  alternatives_spanish:
  - y expiraría
  - y exhalaría mi último aliento
  lexicon: HALOT
  rationale: גוע designa morir/expirar. «Moriría» comunica con claridad la fuerza sobria y tajante del hebreo en este contexto.
translation_notes:
  revision_awareness: El hebreo y el POB inglés coinciden en el sentido contextual de עַתָּה como resultado («then»), no en su valor más común («now»). Se conserva esta decisión con una nota de alternativa porque el hebreo admite ambas lecturas y el contexto favorece la resultativa.
  spanish_consistency_notes:
  - Se prefirió un registro sobrio y poético, adecuado para Job.
  - «Contenderá» preserva el tono forense sin forzar «litigará» o «pleiteará».
  - La nota mantiene visible la ambigüedad de עַתָּה, siguiendo el audit trail inglés.
