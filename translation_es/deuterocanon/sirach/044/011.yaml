translation:
  language: es
  text: Pero estos son hombres de amor fiel[b][a], y su esperanza no cesará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Con su descendencia permanece una buena herencia, sus descendientes». El texto hebreo de Cairo Geniza aquí en cambio dice: «estos son hombres de amor fiel, y su esperanza no cesará». Masada también refleja una redacción circundante diferente, centrada en la descendencia y la perduración.'
    reason: textual_variant
  - marker: b
    text: O «amor constante», «misericordia» o «lealtad» para el hebreo חסד.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y sin embargo
  - Mas
  - No obstante
  lexicon: HALOT
  rationale: La conjunción adversativa introduce contraste de forma natural en español sin perder la fuerza del giro respecto al contexto anterior.
- source_word: אֵלֶּה
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - estos mismos
  - tales
  lexicon: HALOT
  rationale: El demostrativo plural cercano conserva la referencia directa a los antepasados ejemplares del contexto.
- source_word: אַנְשֵׁי
  english_pob_choice: men of
  chosen_spanish: hombres de
  alternatives_spanish:
  - personas de
  - gente de
  lexicon: HALOT
  rationale: El hebreo usa un plural masculino; se mantiene la forma marcada del original, como en el audit trail inglés.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor constante
  alternatives_spanish:
  - amor leal
  - amor fiel
  - misericordia
  - lealtad
  lexicon: HALOT
  rationale: חסד combina amor, fidelidad y lealtad de pacto. 'Amor constante' comunica esa estabilidad relacional en español sin reducir el término a una sola virtud ni imponer de entrada un matiz exclusivamente cultual.
- source_word: וְתִקְוָתָם
  english_pob_choice: and their hope
  chosen_spanish: y su esperanza
  alternatives_spanish:
  - y su expectativa
  - y lo que esperaban
  lexicon: HALOT
  rationale: '''Esperanza'' es la equivalencia más directa y natural para תקוה; el posesivo conserva el sentido de pertenencia del sufijo.'
- source_word: לֹא תִשְׁבֹּת
  english_pob_choice: will not cease
  chosen_spanish: no cesará
  alternatives_spanish:
  - no terminará
  - no faltará
  - no será cortada
  lexicon: HALOT
  rationale: '''Cesará'' mantiene el valor verbal de cesar/detenerse y suena idiomático en español bíblico contemporáneo.'
theological_decisions:
- issue: Divergencia textual entre el hebreo de Kahana/Cairo Geniza y el paralelo griego
  english_pob_reading: 'The English audit trail preserves the Hebrew line as primary: ''these are men of steadfast love, and their hope will not cease,'' while footnoting the Greek offspring/inheritance reading.'
  chosen_spanish_reading: 'Se traduce la línea hebrea principal: ''estos son hombres de amor constante, y su esperanza no cesará'', conservando la variante griega en nota.'
  alternative_spanish_readings:
  - '''Con sus descendientes permanecerá una buena herencia, sus hijos'''
  - '''Con su descendencia quedará una excelente herencia, sus descendientes'''
  rationale: La política del proyecto da prioridad al hebreo donde está preservado. Sin armonizar silenciosamente, se mantiene la lectura hebrea en el cuerpo principal y se documenta explícitamente la tradición griega divergente.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa, que actualizó ''faithful love'' a ''steadfast love'' por ser una forma más natural y estándar para חסד. En español se adoptó una equivalencia igualmente natural y sobria: ''amor constante''.'
  spanish_consistency_notes:
  - Se conserva el tono formal y bíblico sin recurrir a mayúsculas litúrgicas innecesarias.
  - '''Amor constante'' evita empobrecer חסד como mera ''bondad'' o ''misericordia'' y mantiene la tensión de amor leal/paciente.'
  - La variante griega no se fusiona con el texto principal para no borrar la discrepancia textual documentada.
