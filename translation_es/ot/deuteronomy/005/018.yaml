review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la prohibición hebrea וְ/לֹא תִּנְאָף y conserva tanto la conjunción inicial como la fuerza legal solemne de la segunda persona singular. Sin embargo, la nota al pie no preserva fielmente la lógica del original inglés: presenta como alternativa una redacción idéntica al texto principal, cuando la alternativa documentada es la forma más escueta sin la conjunción.'
  spanish_quality_summary: 'El español principal es claro, natural y digno: «Y no cometerás adulterio» funciona bien en el registro del Decálogo. La única reparación necesaria es la nota, que actualmente está mal formulada y además suprime el contraste entre la opción tersa y la forma con «Y».'
  glossary_alignment: No hay términos del glosario general en disputa aquí. «cometerás adulterio» refleja bien תִּנְאָף; mantener «Y» para וְ/לֹא concuerda con la rationale auditada. No hay conflicto terminológico teológico.
  issues:
  - severity: medium
    issue: La nota al pie reproduce erróneamente la alternativa inglesa.
    rationale: 'El inglés dice: «Or, more tersely, ''You shall not commit adultery.''» La nota española actual dice «O, más literalmente: “Y no cometerás adulterio”», que no solo cambia «more tersely» por «más literalmente», sino que además repite el texto principal en vez de dar la alternativa sin «Y». Eso desajusta la evidencia auditada.'
  revised_spanish_text: Y no cometerás adulterio[a].
  revised_footnotes:
  - marker: a
    text: 'O, más brevemente: «No cometerás adulterio». El hebreo incluye una conjunción («y») que enlaza este mandamiento con los anteriores.'
    reason: lexical_alternative
  revision_rationale: 'Se mantiene intacto el texto principal porque es fiel al hebreo y al POB inglés. Se corrige únicamente la nota para reflejar con precisión la alternativa documentada: una formulación más breve sin la conjunción inicial, no una opción «más literal».'
