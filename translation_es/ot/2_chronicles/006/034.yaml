translation:
  language: es
  text: Si tu pueblo sale a la guerra contra sus enemigos, por el camino que les envíes, y oran a ti hacia[a] esta ciudad que has escogido y la casa que he edificado para tu nombre[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en dirección de esta ciudad”; el hebreo usa literalmente lenguaje de “camino/dirección” para la oración orientada hacia Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: “La casa” se refiere al templo que Salomón edificó para el nombre de Yahvé.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Porque
  lexicon: HALOT
  rationale: En este contexto de petición condicional, כִּי introduce una protasis; “Si” conserva con claridad la estructura condicional del original y suena natural en español.
- source_word: יֵצֵא
  english_pob_choice: go out
  chosen_spanish: sale
  alternatives_spanish:
  - sale en campaña
  - marcha
  lexicon: HALOT
  rationale: יצא significa literalmente “salir”; “sale” conserva esa base verbal sin perder naturalidad en español, y permite que el contexto militar quede marcado por “a la guerra”.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu pueblo
  lexicon: HALOT
  rationale: “Pueblo” es la manera más directa y bíblica de expresar עם en este marco de alianza; mantiene el referente colectivo del pueblo de Yahvé.
- source_word: לַמִּלְחָמָה
  english_pob_choice: to battle
  chosen_spanish: a la guerra
  alternatives_spanish:
  - para la guerra
  - a la batalla
  lexicon: HALOT
  rationale: La expresión hebrea es militar e idiomática; “a la guerra” es transparente y conserva la fuerza del sustantivo מלחמה. “Batalla” podría sonar más puntual que el alcance amplio del término hebreo.
- source_word: עַל אֹיְבָיו
  english_pob_choice: against their enemies
  chosen_spanish: contra sus enemigos
  alternatives_spanish:
  - contra sus adversarios
  - contra sus enemigos
  lexicon: HALOT
  rationale: “Contra” expresa היטב la oposición del hebreo עַל en este contexto de conflicto. Se mantiene el plural natural en español, aunque el sufijo hebreo sea singular en forma, porque el sentido colectivo recae sobre el pueblo.
- source_word: בַּדֶּרֶךְ אֲשֶׁר תִּשְׁלָחֵם
  english_pob_choice: by the way that you send them
  chosen_spanish: por el camino que tú los envías
  alternatives_spanish:
  - por el camino que tú los mandas
  - en la dirección que tú los envías
  lexicon: HALOT
  rationale: דרך aquí conserva un valor concreto de “camino/ruta”; “por el camino” sigue de cerca la imagen espacial del original. “Envías” refleja la idea de comisión divina que aporta שלח.
- source_word: וְהִתְפַּלְלוּ אֵלֶיךָ
  english_pob_choice: and they pray to you
  chosen_spanish: y oran a ti
  alternatives_spanish:
  - y te oran
  - y oran hacia ti
  lexicon: HALOT
  rationale: El hitpael de פלל con אֶל indica oración dirigida a Dios. “Oran a ti” preserva la dirección de la oración y mantiene el registro litúrgico sin introducir una glosa interpretativa.
- source_word: דֶּרֶךְ הָעִיר הַזֹּאת
  english_pob_choice: toward this city
  chosen_spanish: en dirección de esta ciudad
  alternatives_spanish:
  - hacia esta ciudad
  - en la dirección de esta ciudad
  lexicon: HALOT
  rationale: Con oración, דרך expresa orientación espacial. “En dirección de” conserva el matiz concreto de orientación sin sobreinterpretar como simple referencia mental.
- source_word: אֲשֶׁר בָּחַרְתָּ בָּהּ
  english_pob_choice: that you have chosen
  chosen_spanish: que tú has escogido
  alternatives_spanish:
  - que tú elegiste
  - que has elegido
  lexicon: HALOT
  rationale: בחר expresa la elección divina de Jerusalén; “has escogido” mantiene el efecto durativo/presente del acto ya cumplido, como en la POB inglesa.
- source_word: וְהַבַּיִת
  english_pob_choice: and the house
  chosen_spanish: y de la casa
  alternatives_spanish:
  - y la casa
  - y del templo
  lexicon: HALOT
  rationale: “Casa” reproduce בית con transparencia y deja visible la imagen teológica del templo como casa para el nombre de Yahvé. La preposición “de” se ajusta a la coordinación española con “de esta ciudad ... y de la casa”.
- source_word: אֲשֶׁר בָּנִיתִי
  english_pob_choice: that I have built
  chosen_spanish: que he edificado
  alternatives_spanish:
  - que he construido
  - que edifiqué
  lexicon: HALOT
  rationale: “He edificado” conserva el tono solemne del lenguaje cultual y es más adecuado para el templo que un verbo más neutro como “construido”.
- source_word: לִשְׁמֶךָ
  english_pob_choice: for your name
  chosen_spanish: para tu nombre
  alternatives_spanish:
  - para tu nombre
  - en honor de tu nombre
  - para el honor de tu nombre
  lexicon: HALOT
  rationale: La fórmula del templo apunta a dedicación al nombre divino; “para tu nombre” sigue de cerca el hebreo y preserva la referencia cultual sin añadir explicaciones en el texto principal.
theological_decisions:
- issue: Orientación espacial de la oración hacia Jerusalén y el templo
  english_pob_reading: Retained the concrete spatial language 'toward this city ... and the house' without spiritualizing it.
  chosen_spanish_reading: 'Se mantiene el lenguaje espacial concreto: “en dirección de esta ciudad ... y de la casa”, sin espiritualizarlo.'
  alternative_spanish_readings:
  - “con la mirada puesta en esta ciudad”
  - “orando por esta ciudad”
  rationale: El hebreo enfatiza una orientación real de la oración en el marco de la teología del templo de Salomón. La traducción conserva ese trasfondo histórico-teológico y evita suavizar la imagen espacial que el texto sí presenta.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Coincide con el último pase revisado del texto fuente inglés, que permaneció sin cambios y fue calificado con alta concordancia; no se requieren ajustes adicionales respecto al audit trail proporcionado.
  spanish_consistency_notes:
  - Se usa “Yahvé” en coherencia con el estándar del proyecto para el nombre divino cuando corresponde al trasfondo del templo.
  - Se conserva “casa” para בית en vez de “templo” en el texto principal para mantener la transparencia léxica; la aclaración queda en nota.
  - Se mantiene el tono solemne pero natural del español moderno, evitando calcos innecesarios como “camino” donde una preposición direccional sería menos fiel al matiz espacial.
