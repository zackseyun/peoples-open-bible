translation:
  language: es
  text: David tenía treinta años cuando comenzó a reinar[a][b], y reinó cuarenta años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “hijo de treinta años”. Es una expresión hebrea idiomática de edad.
    reason: lexical_alternative
  - marker: b
    text: O “cuando llegó a ser rey”.
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן שְׁלֹשִׁ֥ים שָׁנָ֛ה
  english_pob_choice: was thirty years old
  chosen_spanish: tenía treinta años
  alternatives_spanish:
  - era un hijo de treinta años
  lexicon: HALOT
  rationale: El hebreo expresa una idiomática de edad, literalmente “hijo de treinta años”. En español, “tenía treinta años” comunica de forma natural y fiel el sentido, sin forzar un calco innecesario.
- source_word: דָּוִ֖ד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: N/A (nombre propio)
  rationale: Se conserva el nombre propio en su forma habitual en español.
- source_word: בְּמָלְכ֑וֹ
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando llegó a ser rey
  - en su reinado
  lexicon: HALOT
  rationale: La preposición con infinitivo y sufijo indica marco temporal de entronización/reinado. “Comenzó a reinar” preserva bien la fuerza temporal y el sentido regnal de la fórmula.
- source_word: מָלָךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  lexicon: HALOT
  rationale: El verbo מלך denota ejercer la realeza. “Reinó” es el equivalente más preciso y natural en español para un resumen regnal.
- source_word: אַרְבָּעִ֥ים שָׁנָ֖ה
  english_pob_choice: forty years
  chosen_spanish: cuarenta años
  lexicon: HALOT
  rationale: La expresión numérica es directa y se traduce de modo literal y transparente.
