translation:
  language: es
  text: Entonces me hizo volver por el camino de la puerta exterior[a] del santuario, la que mira al oriente, y estaba cerrada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces me hizo volver por el camino de la puerta exterior del santuario». El hebreo puede traducirse más literalmente como «me volvió» o «me hizo regresar», pero el sentido narrativo es que el guía hizo que Ezequiel regresara hasta esta puerta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׁב
  english_pob_choice: brought me back
  chosen_spanish: me hizo volver
  alternatives_spanish:
  - me volvió
  - me hizo regresar
  - me condujo de vuelta
  lexicon: HALOT
  rationale: 'El hebreo hifil de שוב expresa causación: alguien hace que otro retorne. En español, "me hizo volver" conserva claramente ese valor causativo y suena natural; evita la ambigüedad de un simple "volvió".'
- source_word: דֶּרֶךְ
  english_pob_choice: by way of
  chosen_spanish: por el camino de
  alternatives_spanish:
  - por la vía de
  - a través de
  - por medio de
  lexicon: HALOT
  rationale: Aquí דֶּרֶךְ marca la ruta seguida. "Por el camino de" refleja bien el recorrido sin sugerir necesariamente que atravesó físicamente la puerta como un umbral interno.
- source_word: שַׁעַר
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portón
  - portal
  - puerta de acceso
  lexicon: HALOT
  rationale: En este contexto arquitectónico podría decirse "puerta" o "portón". Se eligió "puerta" por ser clara y natural en español; el conjunto del templo ya da el sentido de una entrada monumental.
- source_word: הַמִּקְדָּשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: del santuario
  alternatives_spanish:
  - del templo
  - del recinto sagrado
  - del lugar santo
  lexicon: HALOT
  rationale: '"Santuario" es el equivalente más directo para מִקְדָּשׁ y evita reducir el término a un solo edificio interno. Mantiene el carácter sagrado del complejo descrito por Ezequiel.'
- source_word: הַחִיצוֹן
  english_pob_choice: outer
  chosen_spanish: exterior
  alternatives_spanish:
  - de afuera
  - externa
  - exterior
  lexicon: HALOT
  rationale: En español, "puerta exterior" reproduce la oposición arquitectónica con las puertas interiores y conserva la distinción funcional del texto.
- source_word: הַפֹּנֶה קָדִים
  english_pob_choice: the one facing east
  chosen_spanish: la que mira al oriente
  alternatives_spanish:
  - la que da al oriente
  - la que está orientada al oriente
  - la que enfrenta al oriente
  lexicon: HALOT
  rationale: El participio indica orientación fija. "Mira al oriente" es natural y preciso; "oriente" es un registro bíblico claro para קָדִים y mantiene la referencia direccional.
- source_word: וְהוּא סָגוּר
  english_pob_choice: and it was shut
  chosen_spanish: y estaba cerrada
  alternatives_spanish:
  - y estaba cerrada con llave
  - y estaba clausurada
  - y estaba tapiada
  lexicon: HALOT
  rationale: סָגוּר describe un estado de cierre. "Estaba cerrada" comunica bien el estado resultante en español; no añade mecanismos que el hebreo no especifica.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios y que hay alto acuerdo con la lectura anterior; por eso se mantiene la misma solución semántica, con solo ajustes naturales de español para publicar una redacción fluida y fiel.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usa "santuario" para מִקְדָּשׁ conforme al audit trail inglés.
  - Se usa "oriente" para קָדִים, un equivalente bíblico natural y consistente con el registro del pasaje.
  - La nota al pie conserva la alternativa causal/literal de וַיָּשֶׁב sin desplazar la lectura principal.
