translation:
  language: es
  text: Porque tú eres mi roca y mi fortaleza[b][a]; por causa de tu nombre, me guiarás y me conducirás[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Pues». El hebreo כִּי puede introducir causa («porque») o explicación.
    reason: lexical_alternative
  - marker: b
    text: O «mi baluarte» para «mi fortaleza».
    reason: lexical_alternative
  - marker: c
    text: Los dos verbos hebreos son casi sinónimos en poesía; en español se distinguen ligeramente para conservar el paralelismo sin reducirlos a un solo término.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: El hebreo כִּי puede introducir razón o explicación. Aquí, el contexto de oración favorece una causal explicativa en español; «Porque» conserva bien ese vínculo sin sonar arcaico.
- source_word: סַלְעִי
  english_pob_choice: my rock
  chosen_spanish: mi roca
  alternatives_spanish:
  - mi peñasco
  - mi peña
  lexicon: HALOT
  rationale: El término designa una roca/promontorio rocoso y funciona metafóricamente como refugio seguro. «Mi roca» es la equivalencia española más natural y fiel para la imagen.
- source_word: מְצוּדָתִי
  english_pob_choice: my fortress
  chosen_spanish: mi fortaleza
  alternatives_spanish:
  - mi baluarte
  - mi alcázar
  - mi refugio fortificado
  lexicon: HALOT
  rationale: El hebreo apunta a un lugar fortificado o plaza fuerte. «Fortaleza» mantiene la imagen defensiva y el paralelismo con «roca»; «baluarte» sería viable, pero menos directo para lectura amplia.
- source_word: שִׁמְךָ
  english_pob_choice: your name’s sake
  chosen_spanish: por amor de tu nombre
  alternatives_spanish:
  - por causa de tu nombre
  - por el bien de tu nombre
  lexicon: HALOT
  rationale: La expresión hebrea fundamenta la acción divina en el nombre, es decir, en el carácter y la fama/reputación revelada de Dios. «Por amor de tu nombre» mantiene el idiomatismo y comunica bien la base relacional del motivo.
- source_word: תַּנְחֵנִי
  english_pob_choice: you will lead me
  chosen_spanish: tú me guiarás
  alternatives_spanish:
  - tú me llevarás
  - tú me conducirás
  lexicon: HALOT
  rationale: El verbo hiphil de נחה suele significar conducir o guiar. En español, «guiarás» comunica bien la dirección providente y puede sostener el tono de confianza del salmo.
- source_word: וּתְנַהֲלֵנִי
  english_pob_choice: and guide me
  chosen_spanish: y me conducirás
  alternatives_spanish:
  - y me guiarás
  - y me dirigirás
  lexicon: HALOT
  rationale: Este verbo conserva la idea de conducir/cuidar el trayecto; diferenciarlo de «guiarás» ayuda a preservar el paralelismo poético que la POB inglesa también conservó con dos verbos cercanos pero no idénticos.
theological_decisions:
- issue: Sentido de «por amor de tu nombre»
  english_pob_reading: God's guidance is grounded in his own name—his revealed character, honor, and covenant faithfulness—without expanding the phrase beyond the text.
  chosen_spanish_reading: 'La guía de Dios se funda en su nombre: su carácter revelado, su honra y su fidelidad pactal, sin ampliar la frase más allá del texto.'
  alternative_spanish_readings:
  - Un sentido restringido solo a la reputación pública
  - Una paráfrasis explícita sobre la gloria de Dios
  rationale: La frase hebrea es una fórmula estable que apela al «nombre» como base de la acción divina. La redacción española conserva el giro idiomático y permite la carga teológica sin explicitarla en exceso en el texto principal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de los imperfectos verbales
  english_pob_reading: 'Future-like confidence: ''you will lead me and guide me'''
  chosen_spanish_reading: 'Futuro de confianza: «tú me guiarás y me conducirás»'
  alternative_spanish_readings:
  - 'Imperativo o ruego: «guíame y condúceme»'
  - 'Presente: «tú me guías y me conduces»'
  rationale: En el contexto del salmo, los imperfectos pueden expresar una confianza anticipada, no solo una petición. El futuro en español preserva esa seguridad confesional y mantiene la fluidez poética.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético y el trazado auditado de la POB inglesa. Se conserva el paralelismo de «roca / fortaleza» y de los dos verbos de dirección, y se refleja la lectura futura de los imperfectos como confianza esperanzada. No se detectaron revisiones aplicadas en la fuente inglesa reciente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; este versículo no contiene el tetragrámaton explícito.
  - Se evitó «SEÑOR» como sustituto automático, de acuerdo con la política del proyecto.
  - «Fortaleza» mantiene mejor el registro bíblico que «castillo» o «refugio», y conserva la simetría con «roca».
  - «Guiar» y «conducir» se alternan para reproducir el paralelismo y evitar una repetición plana.
  - La formulación «por amor de tu nombre» es idiomática y fiel al hebreo sin convertirla en comentario interpretativo dentro del texto principal.
