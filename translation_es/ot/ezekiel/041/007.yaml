base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/041/007.yaml
  text: And the side chambers became wider as they went upward[a], because the structure around the temple went upward and upward all around the temple. Therefore the temple had greater width upward[c][b], and so one went up from the lowest story to the highest by way of the middle story.
  footnotes:
  - marker: a
    text: Or 'the side rooms.' The Hebrew term can denote side structures or chambers attached to the main building.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase rendered 'the structure of the temple went around' is architecturally difficult; some understand it as an encircling ledge, gallery, or offset in the wall.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''from the lowest to the highest, to the middle.'' The clause is compressed; the sense is ascent from the lower level to the upper by passing through the middle level.'
    reason: lexical_alternative
