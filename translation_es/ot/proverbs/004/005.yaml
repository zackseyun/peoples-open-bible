translation:
  language: es
  text: Adquiere[a] sabiduría; adquiere entendimiento. No olvides[b], y no te apartes de las palabras de mi boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Obtén sabiduría; obtén entendimiento». El verbo hebreo puede significar obtener, adquirir o comprar, según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no te apartes» o «no te desvíes» de las palabras de mi boca.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קְנֵה
  english_pob_choice: Acquire
  chosen_spanish: Adquiere
  alternatives_spanish:
  - Obtén
  - Compra
  - Consigue
  lexicon: HALOT
  rationale: El imperativo קנה puede abarcar obtener, adquirir o comprar. En español, "adquiere" conserva la idea de procurar intencionalmente algo valioso sin reducirlo a una compra comercial, y funciona bien en ambas repeticiones retóricas.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  lexicon: HALOT
  rationale: '"Sabiduría" es el equivalente natural y estable en Proverbios para חכמה. Mantiene el paralelismo con "entendimiento" sin cargar el término con un matiz más limitado como "prudencia".'
- source_word: בִינָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - comprensión
  lexicon: HALOT
  rationale: בינה puede significar entendimiento o discernimiento. "Entendimiento" preserva el par semántico con "sabiduría" y suena natural en español bíblico contemporáneo.
- source_word: אַל תִּשְׁכַּח
  english_pob_choice: Do not forget
  chosen_spanish: No olvides
  alternatives_spanish:
  - No descuides
  - No dejes de recordar
  lexicon: HALOT
  rationale: 'La raíz שכח significa primariamente "olvidar". Aunque el contexto exhortativo implica no descuidar, la forma principal en español debe conservar el valor léxico directo: "no olvides".'
- source_word: וְאַל תֵּט
  english_pob_choice: and do not turn away
  chosen_spanish: y no te apartes
  alternatives_spanish:
  - y no te desvíes
  - y no te vuelvas aparte
  lexicon: HALOT
  rationale: נטה puede significar apartarse o desviarse. "No te apartes" expresa bien la advertencia contra desviarse de la instrucción y resulta idiomático en español, sin perder la fuerza direccional del hebreo.
- source_word: מֵאִמְרֵי פִי
  english_pob_choice: from the words of my mouth
  chosen_spanish: de las palabras de mi boca
  alternatives_spanish:
  - de mis dichos
  - de las expresiones de mi boca
  lexicon: HALOT
  rationale: אִמְרֵי son palabras o dichos pronunciados; el giro constructo con "mi boca" enfatiza instrucción hablada. "Las palabras de mi boca" preserva la imagen hebrea y el paralelismo sin sobreinterpretar.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requieren cambios; este borrador sigue el texto hebreo de forma cercana y conserva las alternativas léxicas documentadas en la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantiene el paralelo imperativo con dos repeticiones de "adquiere" para reflejar la estructura hebrea.
  - '"sabiduría / entendimiento" conserva el binomio semántico del original sin fusionarlo.'
  - Se preserva "palabras de mi boca" como calco idiomático transparente, acorde con el audit trail inglés.
  - Las notas al pie recogen las alternativas léxicas documentadas sin añadir interpretaciones no atestiguadas.
