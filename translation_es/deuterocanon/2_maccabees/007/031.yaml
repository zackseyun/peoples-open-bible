translation:
  language: es
  text: Pero tú[a], habiéndote convertido en el inventor de todo mal contra los hebreos, ciertamente no escaparás de las manos de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el devisador» o «el autor» de todo mal.
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ δὲ
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Mas tú
  lexicon: LSJ
  rationale: δέ introduce contraste directo con lo anterior; «Pero tú» conserva el giro confrontativo de forma natural en español.
- source_word: πάσης κακίας
  english_pob_choice: of every evil
  chosen_spanish: de todo mal
  alternatives_spanish:
  - de toda maldad
  - de toda perversidad
  lexicon: LSJ
  rationale: κακία abarca mal, maldad o perversidad; «todo mal» mantiene el alcance general sin estrecharlo demasiado.
- source_word: εὑρετὴς γενόμενος
  english_pob_choice: having become the inventor
  chosen_spanish: habiéndote convertido en el inventor
  alternatives_spanish:
  - habiéndote convertido en el autor
  - habiéndote convertido en el devisador
  lexicon: LSJ
  rationale: εὑρετής puede ser hallador, inventor, ideador o autor. En este contexto acusatorio, «inventor» conserva la idea de origen activo de males; «habiéndote convertido» refleja γενόμενος.
- source_word: εἰς τοὺς Ἑβραίους
  english_pob_choice: against the Hebrews
  chosen_spanish: contra los hebreos
  alternatives_spanish:
  - hacia los hebreos
  - respecto a los hebreos
  lexicon: LSJ
  rationale: En contexto hostil, εἰς funciona idiomáticamente como dirección adversarial; «contra» expresa mejor la fuerza del reproche. «Hebreos» reproduce Ἑβραίους.
- source_word: οὐ μὴ διαφύγῃς
  english_pob_choice: will certainly not escape
  chosen_spanish: ciertamente no escaparás
  alternatives_spanish:
  - de ningún modo escaparás
  - seguramente no escaparás
  lexicon: LSJ
  rationale: La negación enfática οὐ μή con subjuntivo aoristo exige una negativa fuerte; «ciertamente no escaparás» preserva la certeza y suena natural en español.
- source_word: τὰς χεῖρας τοῦ θεοῦ
  english_pob_choice: the hands of God
  chosen_spanish: de las manos de Dios
  alternatives_spanish:
  - de la mano de Dios
  - del poder de Dios
  lexicon: LSJ
  rationale: Se conserva la imagen concreta y plural de χεῖρας; «las manos de Dios» mantiene el lenguaje antropomórfico y el matiz de juicio divino.
theological_decisions:
- issue: Expresión antropomórfica para el juicio divino
  english_pob_reading: the hands of God
  chosen_spanish_reading: las manos de Dios
  alternative_spanish_readings:
  - el poder de Dios
  - el juicio de Dios
  rationale: La imagen corporal es parte del texto griego y tiene fuerza teológica. Mantenerla evita abstraer el juicio divino y preserva el giro bíblico.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Designación étnica Ἑβραίους
  english_pob_reading: the Hebrews
  chosen_spanish_reading: los hebreos
  alternative_spanish_readings:
  - los judíos
  rationale: El griego dice específicamente Ἑβραίους; la traducción debe conservar esa designación en lugar de sustituirla por un término más común pero distinto.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden estrechamente; no se detectaron revisiones aplicadas ni variantes textuales relevantes. Se mantuvo la negación enfática y la imagen antropomórfica de «las manos de Dios».
  spanish_consistency_notes:
  - Se usa «hebreos» para Ἑβραίους, no «judíos», por fidelidad al término del original.
  - Se conserva «las manos de Dios» en plural para reflejar la metáfora concreta del griego.
  - «Inventor» se entiende en sentido de originador/ideador de males, no de invento neutral moderno.
