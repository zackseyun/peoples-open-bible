translation:
  language: es
  text: Y el segundo se sentará junto a Darío[a], por causa de su sabiduría, y será llamado pariente de Darío[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será sentado junto a» o «se sentará junto a». El verbo griego puede referirse simplemente a ser puesto o a tomar asiento; el matiz exacto de rango o cercanía se infiere del contexto real.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pariente» puede designar un familiar, o bien un apelativo de cercanía y asociación honorable con Darío.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δεύτερος
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - segundo
  - el segundo entre ellos
  lexicon: LSJ
  rationale: El griego usa el ordinal con valor sustantivo. En español, «el segundo» conserva ese uso titular y resulta natural en un contexto cortesano.
- source_word: καθιεῖται
  english_pob_choice: will sit beside
  chosen_spanish: se sentará junto a
  alternatives_spanish:
  - será sentado junto a
  - se sentará al lado de
  - será colocado junto a
  lexicon: LSJ
  rationale: El verbo puede referirse a ser sentado o a tomar asiento. En este contexto de honor ante el rey, «se sentará junto a» conserva la imagen de cercanía sin introducir más de lo que el griego garantiza.
- source_word: διὰ τὴν σοφίαν αὐτοῦ
  english_pob_choice: because of his wisdom
  chosen_spanish: por causa de su sabiduría
  alternatives_spanish:
  - a causa de su sabiduría
  - por su sabiduría
  lexicon: LSJ
  rationale: La construcción causal con διά + acusativo se expresa de forma directa. «Sabiduría» es el equivalente natural de σοφία y preserva el motivo del honor.
- source_word: συγγενής
  english_pob_choice: kinsman
  chosen_spanish: pariente
  alternatives_spanish:
  - familiar
  - deudos
  - consanguíneo
  lexicon: LSJ
  rationale: El término puede denotar un pariente o una relación de parentesco/afinidad. «Pariente» es claro en español y evita precisar más de lo que el griego afirma. La nota conserva la posible resonancia honorífica del término.
- source_word: κληθήσεται
  english_pob_choice: will be called
  chosen_spanish: será llamado
  alternatives_spanish:
  - será nombrado
  - será tenido por
  - será conocido como
  lexicon: LSJ
  rationale: El futuro pasivo de llamar/nombrar se traslada de manera transparente con «será llamado», manteniendo abierta la posibilidad de un título formal u honorífico.
translation_notes:
  revision_awareness: 'El borrador sigue la lectura estable del texto griego de Swete 1909 y conserva las dos ambigüedades señaladas en el audit trail inglés: el matiz de καθιεῖται y el alcance de συγγενής. No se introdujeron cambios textuales ni doctrinales respecto del análisis recibido.'
  spanish_consistency_notes:
  - Se mantiene «Darío» para Δαρείου en ambos casos.
  - Se conserva un registro sobrio y bíblico, sin sustituir el parentesco por un título eclesiástico ni suavizar el lenguaje de honor cortesano.
  - La puntuación y el orden sintáctico buscan claridad en español sin desplazar la relación causal del griego.
