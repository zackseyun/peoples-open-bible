translation:
  language: es
  text: Edificó altares para todo el ejército del cielo en los dos atrios de la casa de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para todo el ejército celestial». El hebreo «ejército del cielo» designa al conjunto celestial y, en este contexto, probablemente a cuerpos celestes o poderes venerados en el culto astral.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: He built
  chosen_spanish: Y edificó
  alternatives_spanish:
  - Y construyó
  - Entonces edificó
  lexicon: HALOT
  rationale: El verbo בנה en qal wayyiqtol expresa una acción narrativa pasada. «Edificó» conserva el valor de construir/levantar estructuras y mantiene el tono bíblico natural en español. Se conserva la conjunción «Y» para reflejar la secuencia narrativa del hebreo.
- source_word: מִזְבְּחוֹת
  english_pob_choice: altars
  chosen_spanish: altares
  alternatives_spanish:
  - sacrificios
  - lugares de sacrificio
  lexicon: HALOT
  rationale: El sustantivo plural significa literalmente «altares». No hay razón contextual para suavizarlo o expandirlo.
- source_word: לְכָל צְבָא הַשָּׁמַיִם
  english_pob_choice: for all the host of heaven
  chosen_spanish: para todo el ejército del cielo
  alternatives_spanish:
  - para todo el hoste del cielo
  - para todo el ejército celestial
  - para todo el ejército de los cielos
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de צָבָא como «ejército», que en este contexto se refiere al conjunto celestial venerado en el culto astral. «Del cielo» conserva el vínculo con הַשָּׁמַיִם y evita interpretar de antemano si el referente son astros, seres celestiales o poderes celestiales.
- source_word: בִּשְׁתֵּי
  english_pob_choice: in the two
  chosen_spanish: en los dos
  alternatives_spanish:
  - en ambos
  - en las dos
  lexicon: HALOT
  rationale: El numeral dual indica de manera concreta dos atrios. «En los dos» preserva el número explícito y suena natural en español.
- source_word: חַצְרוֹת
  english_pob_choice: courts
  chosen_spanish: atrios
  alternatives_spanish:
  - patios
  - cortes
  lexicon: HALOT
  rationale: En contexto del templo, «atrios» es el equivalente más claro y tradicional en español para חַצְרוֹת. Evita la ambigüedad de «patios» y conserva la referencia arquitectónica cultual.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahveh
  lexicon: HALOT
  rationale: 'Se sigue la directriz del proyecto para יהוה: «Yahvé» en el texto principal. «Casa» reproduce בית con fidelidad, y se evita sustituirlo por «templo» para no borrar el eco hebreo de la expresión.'
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El audit trail inglés ya identifica la decisión teológica/textual de no enmascarar el nombre divino. En español, la forma adoptada por el proyecto es «Yahvé», que preserva el nombre pactal sin recurrir al sustituto litúrgico «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de צְבָא הַשָּׁמַיִם
  english_pob_reading: the host of heaven / the whole heavenly host
  chosen_spanish_reading: el ejército del cielo
  alternative_spanish_readings:
  - el ejército celestial
  - la hueste del cielo
  - las estrellas del cielo
  rationale: El inglés POB conserva la ambigüedad entre host celestial y objetos/poderes astrales venerados. «Ejército del cielo» mantiene esa tensión semántica sin reducir prematuramente el referente a «estrellas» ni a una sola interpretación doctrinal.
  doctrine_reference: HALOT; nota lexical del POB inglés sobre el uso idiomático de צָבָא
translation_notes:
  revision_awareness: El pasaje muestra acuerdo alto entre las revisiones disponibles; no hubo cambios sustantivos en el pase más reciente. La versión española sigue de cerca el hebreo y conserva la decisión del POB inglés de mantener la imagen idiomática de «host/ejército del cielo» sin explicarla dentro del texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - «Atrios» se emplea para el espacio del templo, en lugar de «patios», por claridad cultual.
  - Se mantiene la estructura narrativa simple del hebreo con una coordinación inicial («Y») para conservar la secuencia de acción.
