translation:
  language: es
  text: Y la noticia llegó a Joab[a], porque Joab se había vuelto tras Adonías, aunque no se había vuelto tras Absalón. Entonces Joab huyó a la tienda de Yahvé y se aferró a los cuernos[b] del altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se había puesto de parte de Adonías ... no se había puesto de parte de Absalón». El hebreo dice literalmente «se había vuelto tras».'
    reason: lexical_alternative
  - marker: b
    text: Los «cuernos» eran las proyecciones con forma de cuerno en las esquinas del altar; aferrarse a ellos era una apelación a refugio o misericordia.
    reason: cultural_note
lexical_decisions:
- source_word: הַשְּׁמֻעָה
  english_pob_choice: the report
  chosen_spanish: el informe
  alternatives_spanish:
  - la noticia
  - el reporte
  lexicon: HALOT
  rationale: El sustantivo comunica una comunicación o información que llega a alguien. 'Informe' funciona en español como término formal y natural en un contexto narrativo; 'noticia' también es posible, pero puede sonar más periodístico, y 'reporte' es menos usual en registro bíblico.
- source_word: בָּאָה עַד
  english_pob_choice: came to
  chosen_spanish: llegó hasta
  alternatives_spanish:
  - llegó a
  - alcanzó a
  lexicon: HALOT
  rationale: La expresión conserva el movimiento y la idea de que la noticia se extendió hasta Joab. 'Llegó hasta' mantiene la imagen idiomática hebrea con naturalidad en español.
- source_word: נָטָה אַחֲרֵי
  english_pob_choice: had turned after
  chosen_spanish: se había inclinado tras
  alternatives_spanish:
  - había seguido a
  - se había puesto de parte de
  - había apoyado a
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'inclinarse/volverse tras'. En español, 'se había inclinado tras' conserva esa metáfora y la repetición del verbo en ambas cláusulas, evitando resolver demasiado pronto el matiz político. 'Ponerse de parte de' o 'apoyar' explicitan la alianza, pero ya interpretan más de lo que el hebreo dice.
- source_word: אֲדֹנִיָּה
  english_pob_choice: Adonijah
  chosen_spanish: Adonías
  alternatives_spanish:
  - Adonijah
  lexicon: Nombre propio
  rationale: Se usa la forma castellana usual del nombre bíblico para mayor legibilidad, sin alterar la identidad del personaje.
- source_word: וְאַחֲרֵי אַבְשָׁלֹם לֹא נָטָה
  english_pob_choice: though he had not turned after Absalom
  chosen_spanish: aunque no se había inclinado tras Absalón
  alternatives_spanish:
  - pero no se había inclinado tras Absalón
  - y no se había inclinado tras Absalón
  lexicon: HALOT
  rationale: '''Aunque'' expresa bien el valor concesivo de la cláusula y preserva la explicación narrativa. Se mantiene el mismo giro verbal para conservar la paralelismo del texto fuente.'
- source_word: וַיָּנָס
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió huyendo
  lexicon: HALOT
  rationale: '''Huyó'' es el equivalente natural y directo en español para el verbo narrativo de fuga urgente.'
- source_word: אֹהֶל יְהוָה
  english_pob_choice: the tent of Yahweh
  chosen_spanish: el tabernáculo de Yahvé
  alternatives_spanish:
  - la tienda de Yahvé
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'tienda de Yahvé', en este contexto español 'tabernáculo' comunica mejor el espacio sagrado reconocido por el lector bíblico. Se conserva Yahvé para el nombre divino según el criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre propio divino como 'Yahvé', conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: בְּקַרְנוֹת הַמִּזְבֵּחַ
  english_pob_choice: the horns of the altar
  chosen_spanish: de los cuernos del altar
  alternatives_spanish:
  - de las astas del altar
  - de los cuernos del altar
  lexicon: HALOT
  rationale: '''Cuernos'' reproduce literalmente la imagen cultual del altar. En español, ''astas'' es posible, pero menos común; se conserva la expresión tradicional y transparente.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Se preserva como nombre propio divino en español, siguiendo la decisión doctrinal del proyecto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Preservación del giro idiomático נָטָה אַחֲרֵי
  english_pob_reading: had turned after
  chosen_spanish_reading: se había inclinado tras
  alternative_spanish_readings:
  - se había puesto de parte de
  - había seguido a
  rationale: La repetición del mismo giro en ambas cláusulas tiene valor retórico y narrativo. 'Se había inclinado tras' conserva la metáfora original sin borrar la tensión entre adherirse políticamente y seguir literalmente detrás.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; consistency of key terms, or documented exception'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios aplicados y el consenso de cotejo es alto. Se ha conservado la repetición del idiomático hebreo y se ha aplicado la terminología del proyecto para el nombre divino.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה de forma consistente con el estándar del proyecto.
  - Se conserva el paralelismo verbal ('se había inclinado tras') para Adonías y Absalón.
  - '''Tabernáculo'' se emplea como término español reconocido para אֹהֶל יְהוָה en contexto cultual.'
  - '''Cuernos del altar'' mantiene la imagen literal y permite la nota cultural correspondiente.'
