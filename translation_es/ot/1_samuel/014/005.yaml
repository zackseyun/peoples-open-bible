translation:
  language: es
  text: Una peña estaba al norte[a], frente a Micmas, y la otra al sur[b], frente a Geba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente «el diente», una metáfora para una protrusión rocosa aguda; por eso se traduce «peña».
    reason: lexical_alternative
  - marker: b
    text: Algunas traducciones leen «Gibea» aquí, pero el nombre hebreo del lugar es «Geba».
    reason: alternative_reading
lexical_decisions:
- source_word: הַשֵּׁן
  english_pob_choice: crag
  chosen_spanish: peña
  alternatives_spanish:
  - roca
  - peñasco
  - promontorio rocoso
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el diente», con valor metafórico topográfico para una protuberancia rocosa aguda. «Peña» comunica una formación rocosa prominente y natural en español sin perder del todo la imagen geográfica.
- source_word: הָאֶחָד
  english_pob_choice: one
  chosen_spanish: una
  alternatives_spanish:
  - la una
  - una de ellas
  lexicon: HALOT
  rationale: La forma distributiva se expresa naturalmente en español con «una ... y la otra». Mantiene la oposición entre las dos elevaciones.
- source_word: מָצוּק
  english_pob_choice: stood
  chosen_spanish: estaba
  alternatives_spanish:
  - se alzaba
  - era escarpada
  - estaba erguida
  lexicon: HALOT
  rationale: El término describe la posición o carácter del accidente rocoso. En español, «estaba» conserva la descripción espacial sin forzar un verbo de existencia más interpretativo.
- source_word: מִצָּפוֹן
  english_pob_choice: on the north
  chosen_spanish: al norte
  alternatives_spanish:
  - desde el norte
  - en el norte
  - hacia el norte
  lexicon: HALOT
  rationale: La preposición marca ubicación relativa. «Al norte» es la manera más natural y precisa de indicar el lado correspondiente.
- source_word: מוּל
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - enfrente de
  lexicon: HALOT
  rationale: El hebreo señala correspondencia espacial o enfrentamiento geográfico. «Frente a» conserva la relación visual y topográfica en español.
- source_word: מִכְמָשׂ
  english_pob_choice: Michmash
  chosen_spanish: Micmas
  alternatives_spanish:
  - Micmás
  lexicon: transliteración estándar
  rationale: Se adopta la forma castellana habitual del topónimo, sin añadir vocalización innecesaria.
- source_word: וְהָאֶחָד
  english_pob_choice: and the other
  chosen_spanish: y la otra
  alternatives_spanish:
  - y una
  - y la una
  lexicon: HALOT
  rationale: La estructura distributiva pide en español «la otra» para evitar una repetición poco idiomática y mantener el paralelismo.
- source_word: מִנֶּגֶב
  english_pob_choice: on the south
  chosen_spanish: al sur
  alternatives_spanish:
  - desde el sur
  - en el sur
  - hacia el sur
  lexicon: HALOT
  rationale: El término indica el lado meridional en contraste con el norte. «Al sur» es natural y fiel al sentido locativo.
- source_word: גָּבַע
  english_pob_choice: Geba
  chosen_spanish: Gueba
  alternatives_spanish:
  - Geba
  lexicon: transliteración estándar
  rationale: Se mantiene el nombre del lugar con grafía castellana; la POB en inglés distinguió este topónimo de «Gibeah», y en español conviene no confundirlo con formas tradicionales menos precisas.
translation_notes:
  revision_awareness: El texto sigue el estado revisado más reciente del POB en inglés, que no introdujo cambios sustantivos; por eso la versión española conserva la misma solución geográfica y lexical, adaptada a un español natural y auditable.
  spanish_consistency_notes:
  - Se conserva la distinción topográfica entre las dos formaciones rocosas con estructura paralela.
  - Se evita «SEÑOR» u այլ masking convencionales porque el versículo no contiene el nombre divino.
  - Se mantiene la diferencia entre Micmas y Gueba, siguiendo la evidencia consonántica y el audit trail en inglés.
