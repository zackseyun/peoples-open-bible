    reason: lexical_alternative
  - marker: c
    text: O «cuatro bases» en lugar de «cuatro basas».
    reason: lexical_alternative
  revision_rationale: La revisión corrige un matiz léxico importante al cambiar «velo» por «cortina», que comunica mejor la función de מָסָךְ en la entrada del atrio. También añade «de largo» para una lectura española más clara y conserva en notas las alternativas significativas documentadas por el audit trail inglés, incluyendo la opción menos técnica «bases».
