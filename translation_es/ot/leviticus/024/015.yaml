translation:
  language: es
  text: 'Y hablarás a los hijos de Israel[a], diciendo: «Cualquier hombre[b] que maldiga a su Dios cargará con su pecado[c].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel». La expresión designa al pueblo de Israel como colectivo, manteniendo la forma familiar masculina del original.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «quienquiera». El hebreo repite «hombre» para dar énfasis distributivo: «hombre, hombre».'
    reason: lexical_alternative
  - marker: c
    text: «Cargará con su pecado» refleja el modismo hebreo de «llevar su pecado», es decir, asumir culpa o responsabilidad por la ofensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל
  english_pob_choice: And ... to
  chosen_spanish: Y ... a
  alternatives_spanish:
  - Y ... para
  - Entonces ... a
  lexicon: HALOT
  rationale: La conjunción introductoria y la preposición de dirección se expresan de manera natural con «Y ... a» en español legal y narrativo, manteniendo el arranque de mandato sin recargarlo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión familiar masculina del hebreo. «Hijos de Israel» sigue de cerca la forma fuente y evita neutralizar una formulación que el POB inglés preservó como «sons of Israel».
- source_word: תְּדַבֵּר
  english_pob_choice: you shall speak
  chosen_spanish: hablarás
  alternatives_spanish:
  - dirás
  - tú hablarás
  lexicon: HALOT
  rationale: En instrucción legal dirigida a Moisés, el futuro directo en español comunica bien el mandato formal. «Hablarás» preserva el tono legislativo sin añadir perífrasis innecesarias.
- source_word: לֵ/אמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y dirás
  lexicon: HALOT
  rationale: Como partícula introductoria de cita, «diciendo» es la equivalencia más transparente y mantiene la función quotativa del infinitivo hebreo.
- source_word: אִ֥ישׁ אִ֛ישׁ
  english_pob_choice: any man
  chosen_spanish: cualquier hombre
  alternatives_spanish:
  - todo hombre
  - quienquiera
  lexicon: HALOT
  rationale: La repetición hebrea tiene fuerza distributiva. «Cualquier hombre» conserva el singular masculino y expresa bien el valor de «man, man» sin volverlo opaco o excesivamente literal.
- source_word: יְקַלֵּ֥ל
  english_pob_choice: curses
  chosen_spanish: maldiga
  alternatives_spanish:
  - maldice
  - insulte
  lexicon: HALOT
  rationale: En este contexto legal, «maldiga» comunica la acción de קלל con la gravedad requerida. Aunque «curse» puede ser «maldice», el subjuntivo relativo en español fluye mejor con la estructura condicional implícita.
- source_word: אֱלֹהָ֖יו
  english_pob_choice: his God
  chosen_spanish: a su Dios
  alternatives_spanish:
  - a su dios
  - a su Dios
  lexicon: HALOT
  rationale: Se mantiene el posesivo y el referente singular como en el hebreo. «Su Dios» es la lectura más natural en español y evita restringir el texto a «Yahvé» donde el hebreo no lo nombra explícitamente.
- source_word: וְ/נָשָׂ֥א חֶטְאֽ/וֹ
  english_pob_choice: then he shall bear his sin
  chosen_spanish: será culpable de su pecado
  alternatives_spanish:
  - llevará su pecado
  - cargará con su pecado
  lexicon: HALOT
  rationale: El hebreo usa el modismo de «llevar/bear su pecado» para expresar culpa o responsabilidad. En español, «será culpable de su pecado» explicita la carga jurídica sin perder el valor punitivo del modismo; se preserva la tensión semántica entre culpa y pena.
theological_decisions:
- issue: Alcance de אֱלֹהָיו frente a una formulación más específica del nombre divino
  english_pob_reading: Rendered 'his God' rather than 'the LORD' or 'God' without possessive.
  chosen_spanish_reading: «su Dios» en vez de «Yahvé» o una forma impersonal sin posesivo.
  alternative_spanish_readings:
  - Yahvé
  - Dios
  rationale: El hebreo no nombra aquí a Yahvé; mantener el posesivo respeta el alcance abierto del texto y evita importar una precisión teológica que pertenece más al contexto que a la forma de esta línea.
  doctrine_reference: Trasparencia léxica y distinción contextual entre nombre divino y referencia genérica a Dios
- issue: Ímpetu distributivo de אִישׁ אִישׁ en estilo legal
  english_pob_reading: Rendered 'any man.'
  chosen_spanish_reading: «Cualquier hombre»
  alternative_spanish_readings:
  - quienquiera
  - todo hombre
  rationale: La repetición hebrea tiene valor distributivo e inclusivo dentro del marco masculino gramatical. «Cualquier hombre» conserva ese carácter legal sin convertirlo en una paráfrasis indefinida más amplia de lo que el hebreo sostiene.
  doctrine_reference: Preservación del sujeto masculino gramatical y del estilo jurídico del Pentateuco
- issue: Modismo hebreo de 'llevar el pecado'
  english_pob_reading: '''Bear his sin'' is a Hebrew idiom meaning to bear guilt or liability for the offense.'
  chosen_spanish_reading: «será culpable de su pecado»
  alternative_spanish_readings:
  - llevará su pecado
  - cargará con su pecado
  - llevará la culpa de su pecado
  rationale: El modismo puede sonar oscuro en español si se traslada de forma demasiado literal. La formulación elegida explicita la responsabilidad sin borrar la relación semántica entre pecado, culpa y carga penal que el POB inglés anotó.
  doctrine_reference: Equivalencia óptima con preservación del sentido forense del hebreo
translation_notes:
  revision_awareness: 'La versión inglesa más reciente sustituyó «If any man» por «Any man who» para reflejar con más naturalidad la condición implícita del hebreo y eliminó «then». Esta línea española sigue esa misma lectura sintáctica: integra la condición dentro del relativo «que» y evita un marcador equivalente a «entonces». También conserva el tono legal y la referencia poseída «su Dios», en línea con el audit trail.'
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» para reflejar la formulación familiar masculina del hebreo y la decisión inglesa de conservar «sons of Israel».
  - No se sustituye «su Dios» por «Yahvé», porque en este versículo el hebreo usa אֱלֹהָיו y no el nombre divino.
  - La frase final se vierte como responsabilidad culpable («será culpable de su pecado») para hacer audible el modismo hebreo sin perder su fuerza forense.
  - Se conserva un estilo legal sobrio, apto para lectura pública y consistente con la línea POB de equivalencia óptima.
