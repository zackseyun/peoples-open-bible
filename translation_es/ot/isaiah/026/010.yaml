translation:
  language: es
  text: Aunque se le muestra favor al impío[a], no aprende justicia[b]; en una tierra de rectitud[c] actúa injustamente, y no ve[d] la majestad[e] de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si se le muestra favor al impío». El hebreo inicial puede leerse de manera condicional en vez de concesiva.'
    reason: alternative_reading
  - marker: b
    text: «Justicia» también puede traducirse «rectitud».
    reason: lexical_alternative
  - marker: c
    text: 'O: «en una tierra recta» o «en una tierra de equidad».'
    reason: lexical_alternative
  - marker: d
    text: «Ve» aquí lleva el sentido de percibir o reconocer.
    reason: lexical_alternative
  - marker: e
    text: 'O: «la exaltación» o «la altivez» de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֻחַן
  english_pob_choice: Though favor is shown
  chosen_spanish: Aunque se muestra favor
  alternatives_spanish:
  - Si se muestra favor
  - Aunque se le muestra gracia
  - Aunque se le trata con favor
  lexicon: HALOT
  rationale: El hophal de חנן expresa que alguien recibe favor. En español, «se muestra favor» conserva el pasivo impersonal y suena natural; «aunque» refleja la fuerza concesiva que la auditoría inglesa privilegia.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - la persona impía
  - el injusto
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado en singular funciona de manera representativa. «El impío» es breve, bíblico y conserva el matiz moral-religioso sin especificar género.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - lo correcto
  - justicia/rectitud
  lexicon: HALOT
  rationale: Aquí el paralelismo con «actúa injustamente» hace que «justicia» sea la mejor pareja en español. Mantiene la amplitud moral/jurídica que el inglés reconoce en nota, sin reducir el término a una sola esfera.
- source_word: בְּאֶרֶץ נְכֹחוֹת
  english_pob_choice: in a land of uprightness
  chosen_spanish: en una tierra de rectitud
  alternatives_spanish:
  - en una tierra recta
  - en una tierra de equidad
  - en una tierra de uprightness
  lexicon: HALOT
  rationale: נְכֹחוֹת expresa idea de rectitud, firmeza o orden correcto. «Tierra de rectitud» conserva la imagen y la cualidad moral mejor que una paráfrasis geográfica.
- source_word: יְעַוֵּל
  english_pob_choice: he acts unjustly
  chosen_spanish: actúa injustamente
  alternatives_spanish:
  - obra perversamente
  - hace el mal
  - obra torcidamente
  lexicon: HALOT
  rationale: El piel de עול apunta a actuar de manera torcida/injusta. «Actúa injustamente» mantiene el contraste directo con «justicia» y la fuerza ética-jurídica del verbo.
- source_word: וּבַל יִרְאֶה
  english_pob_choice: and he does not see
  chosen_spanish: y no ve
  alternatives_spanish:
  - y no percibe
  - y no reconoce
  - y no contempla
  lexicon: HALOT
  rationale: «Ver» conserva la transparencia literal del hebreo, mientras que en el contexto incluye percepción moral. La nota inglesa sobre el sentido de percibir/recognizar se puede inferir sin sobrecargar el texto principal.
- source_word: גֵּאוּת
  english_pob_choice: the majesty
  chosen_spanish: la majestad
  alternatives_spanish:
  - la exaltación
  - la elevación
  - la altura
  lexicon: HALOT
  rationale: גֵּאוּת designa exaltación, majestad o elevación. «Majestad» es la opción más idiomática en español para un referente divino y preserva el tono reverente del verso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la terminología del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre divino revelado, en vez de sustituirlo por una convención litúrgica.
theological_decisions:
- issue: Valor concesivo o condicional del inicio
  english_pob_reading: 'Concessive: ''Though favor is shown to the wicked'''
  chosen_spanish_reading: 'Concesivo: «Aunque se muestra favor al impío»'
  alternative_spanish_readings:
  - 'Condicional: «Si se muestra favor al impío»'
  rationale: El contexto presenta el favor divino y, sin embargo, la persistencia del impío en no aprender justicia. La forma concesiva refleja mejor esa tensión retórica y coincide con la lectura auditada en inglés.
  doctrine_reference: Isaías 26:10; contraste entre favor recibido y endurecimiento moral
- issue: ¿Cómo traducir el nombre divino en גֵּאוּת יְהוָה?
  english_pob_reading: the majesty of Yahweh
  chosen_spanish_reading: la majestad de Yahvé
  alternative_spanish_readings:
  - la exaltación de Yahvé
  - la altura de Yahvé
  rationale: La traducción conserva el nombre propio divino y el sustantivo de grandeza sin suavizarlo a un título anónimo. En español, «majestad» comunica reverencia y el sentido de exaltación divina.
  doctrine_reference: Tetragrámaton en la traducción POB; teología del nombre divino
translation_notes:
  revision_awareness: El pasaje coincide con la última revisión auditada (sin cambios necesarios) y con el alto grado de acuerdo entre evaluaciones. La versión española mantiene la misma decisión concesiva, el contraste justicia/injusticia y la referencia directa a Yahvé, sin introducir expansiones interpretativas nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa «impío» para רָשָׁע como sustantivo moral breve y natural en español.
  - «Justicia» se eligió como término principal, dejando «rectitud» en nota por la alternancia semántica documentada.
  - La secuencia «actúa injustamente» conserva el paralelismo con «no aprende justicia».
  - No se añadió nota sobre «ver» en el texto principal; la ambigüedad perceptiva queda explicada en nota.
