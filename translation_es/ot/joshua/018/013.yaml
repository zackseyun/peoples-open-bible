base_translation:
  language: en
  yaml_path: translation/ot/joshua/018/013.yaml
  text: From there the border passed to Luz[a], to the southern slope of Luz (that is, Bethel), and the border went down to Atroth-addar[c][b], on the mountain that is south of Lower Beth-horon.
  footnotes:
  - marker: a
    text: Luz is identified here with Bethel.
    reason: cross_reference
  - marker: b
