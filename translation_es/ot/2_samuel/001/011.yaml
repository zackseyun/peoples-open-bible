  rationale: Se ajusta el verbo inicial para reflejar mejor el modismo hebreo de aferrar la prenda antes de rasgarla; se cambia a singular colectivo («su ropa ... la rasgó») para concordar naturalmente en español con el hebreo singular idiomático; y se explicita la elipsis de la segunda cláusula con «lo mismo hicieron» para una lectura más natural y fiel.
