review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo base: presenta a una persona genérica que se afana, se fatiga y corre, pero termina atrasándose. También conserva correctamente en nota la fuerte divergencia del paralelo griego. Sin embargo, el anclaje de la nota está mal colocado: la nota textual corresponde al segmento final hebreo מִתְאַחֵר (''se retrasa / queda atrás''), no a ''corre de aquí para allá''.'
  spanish_quality_summary: 'El español es claro y natural. ''Hay quien se afana y se fatiga, y corre de aquí para allá'' fluye bien. El principal problema es de edición y precisión: la nota debe ir anclada al resultado final, no a la acción de correr. Además, ''se retrasa más'' suena algo comparativo sin referente explícito; ''queda más rezagado'' o ''se queda más atrás'' expresa mejor la ironía intensificadora de וּכְדֵי כֵן.'
  glossary_alignment: 'No hay términos de glosario teológico principales en este versículo. Las decisiones léxicas son en general acertadas: ''Hay quien'' para יֵשׁ, ''se afana'' / ''se fatiga'' para la duplicación intensiva, y ''corre de aquí para allá'' para וָרָץ. Recomiendo ajustar la clausula final a ''queda más rezagado'' para reflejar mejor הוּא מִתְאַחֵר y el matiz adversativo-intensivo.'
  issues:
  - severity: medium
    issue: Anclaje incorrecto de la nota textual
    rationale: La nota explica la variante sobre 'he is delayed / lags behind' frente al griego alternativo, por lo que debe marcar el verbo final, no la frase 'corre de aquí para allá'.
  - severity: low
    issue: '''Se retrasa más'' suena menos idiomático y algo ambiguo'
    rationale: En español puede leerse como comparación abierta ('más' que quién/qué). 'Queda más rezagado' o 'se queda aún más atrás' transmite mejor el contraste sapiencial de esfuerzo frenético pero menor avance.
  revised_spanish_text: Hay quien se afana y se fatiga, y corre de aquí para allá; aun así, queda más rezagado[a].
