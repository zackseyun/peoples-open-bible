translation:
  language: es
  text: Hizo cincuenta corchetes de bronce para unir la tienda[a], de modo que fuera una sola.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el tabernáculo», pues aquí «tienda» se refiere a la estructura del tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Entonces hizo
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración con pasado simple; en español, «hizo» conserva esa fluidez sin añadir una conjunción innecesaria.
- source_word: קַרְסֵי
  english_pob_choice: clasps
  chosen_spanish: broches
  alternatives_spanish:
  - ganchos
  - abrazaderas
  - broches de unión
  lexicon: HALOT
  rationale: El término designa piezas de unión de la estructura. «Broches» comunica bien la función de sujetar y unir en un español natural; se evita «ganchos» por su ambigüedad y «abrazaderas» por sonar demasiado técnico o moderno para el contexto.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: de bronce
  alternatives_spanish:
  - de cobre
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, el metal trabajado suele entenderse como bronce. «De bronce» sigue la decisión léxica auditada y es el equivalente bíblico más reconocible.
- source_word: חֲמִשִּׁים
  english_pob_choice: fifty
  chosen_spanish: cincuenta
  lexicon: HALOT
  rationale: Numeral cardinal directo; no presenta dificultad semántica.
- source_word: לְחַבֵּר
  english_pob_choice: to join
  chosen_spanish: para unir
  alternatives_spanish:
  - para juntar
  - para conectar
  lexicon: HALOT
  rationale: 'El infinitivo expresa finalidad: las piezas se hicieron para unir las secciones de la tienda. «Unir» es la opción más clara y natural en español para esta relación estructural.'
- source_word: אֶת הָאֹהֶל
  english_pob_choice: the tent
  chosen_spanish: la tienda
  alternatives_spanish:
  - el tabernáculo
  - la carpa
  lexicon: HALOT
  rationale: Se preserva el sustantivo literal אֹהֶל como «tienda», siguiendo la decisión auditada de no sustituirlo directamente por la interpretación «tabernáculo». En este contexto, «tienda» mantiene el vínculo con el hebreo y sigue siendo comprensible en español bíblico.
- source_word: לִהְיוֹת אֶחָד
  english_pob_choice: so that it would be one
  chosen_spanish: de modo que fuera una sola
  alternatives_spanish:
  - para que fuera una sola
  - así quedara en una sola unidad
  lexicon: HALOT
  rationale: La construcción expresa resultado/finalidad y unidad del conjunto. «De modo que fuera una sola» conserva el sentido de una sola entidad sin añadir explicaciones ajenas al texto.
translation_notes:
  revision_awareness: La revisión inglesa añadió una coma tras «tent» por fluidez; en español la pausa queda bien resuelta con la coma antes de «de modo que», sin necesidad de señalar un cambio textual. No hay variaciones sustantivas del sentido en el pasaje revisado.
  spanish_consistency_notes:
  - Se mantiene «bronce» para נְחֹשֶׁת, conforme al uso estándar en contextos del tabernáculo.
  - Se preserva «tienda» como traducción literal de אֹהֶל, con nota alternativa para el sentido contextual de «tabernáculo».
  - «De modo que fuera una sola» refleja la unidad estructural del objeto, sin forzar una lectura doctrinal adicional.
