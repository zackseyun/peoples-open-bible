translation:
  language: es
  text: Entonces tomé a su padre Abraham de más allá del Río[a], y lo llevé por toda la tierra de Canaán, y multipliqué su descendencia[b] y le di Isaac.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El Río» probablemente se refiere al Éufrates.
    reason: cultural_note
  - marker: b
    text: 'O: «su simiente»; el hebreo usa un singular colectivo que puede entenderse como descendencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶקַּח
  english_pob_choice: Then I took
  chosen_spanish: Entonces tomé
  alternatives_spanish:
  - Y tomé
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se expresa de forma natural en español con un conector temporal como «Entonces», conservando la secuencia de la acción divina sin forzar un calco.
- source_word: אֲבִיכֶם
  english_pob_choice: your father
  chosen_spanish: su padre
  alternatives_spanish:
  - su antepasado
  lexicon: HALOT
  rationale: Se mantiene el idiomatismo familiar-covenantal de «padre»; en este contexto el singular se entiende como ancestro del pueblo, sin suavizarlo a un término más genérico.
- source_word: מֵעֵבֶר הַנָּהָר
  english_pob_choice: from beyond the River
  chosen_spanish: de más allá del Río
  alternatives_spanish:
  - del otro lado del Río
  - de más allá del río
  lexicon: HALOT
  rationale: La construcción expresa ubicación al otro lado de un curso de agua conocido. Se conserva «Río» con mayúscula porque el hebreo tiene expresión definida y el contexto apunta al Éufrates, aunque sin introducir el nombre en el texto principal.
- source_word: הַנָּהָר
  english_pob_choice: the River
  chosen_spanish: el Río
  alternatives_spanish:
  - el Éufrates
  lexicon: HALOT
  rationale: Se respeta el sustantivo definido del hebreo en el texto principal. La identificación geográfica puede quedar implícita o explicarse en nota, sin sustituir la forma del original.
- source_word: וָאוֹלֵךְ אֹתוֹ
  english_pob_choice: and I led him
  chosen_spanish: y lo llevé
  alternatives_spanish:
  - y lo conduje
  - y lo hice ir
  lexicon: HALOT
  rationale: El causativo de הלך se vierte de manera idiomática con «llevar», que conserva la idea de acompañar/dirigir el movimiento sin sonar artificial en español.
- source_word: בְּכָל אֶרֶץ כְּנָעַן
  english_pob_choice: through all the land of Canaan
  chosen_spanish: por toda la tierra de Canaán
  alternatives_spanish:
  - a través de toda la tierra de Canaán
  - por toda la tierra de Canaán
  lexicon: HALOT
  rationale: La preposición en este contexto de desplazamiento se expresa naturalmente con «por», manteniendo la idea de recorrido a través de la tierra.
- source_word: וָאַרְבֶּה
  english_pob_choice: and I multiplied
  chosen_spanish: y multipliqué
  alternatives_spanish:
  - y hice numerosa
  - y aumenté
  lexicon: HALOT
  rationale: El hifil de רבה se conserva con el verbo simple «multipliqué», claro y fiel al crecimiento otorgado por Dios.
- source_word: זַרְעוֹ
  english_pob_choice: his offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su linaje
  - su simiente
  lexicon: HALOT
  rationale: «Descendencia» reproduce bien el valor colectivo singular de זֶרַע en español moderno. Se evita «simiente» por sonar más marcado y menos transparente.
- source_word: וָאֶתֶּן לוֹ אֶת יִצְחָק
  english_pob_choice: and gave him Isaac
  chosen_spanish: y le di a Isaac
  alternatives_spanish:
  - y le entregué a Isaac
  - y di a Isaac a él
  lexicon: HALOT
  rationale: La construcción dativa se mantiene con «le di a Isaac», que preserva el sentido de Isaac como don otorgado a Abraham.
theological_decisions:
- issue: Identificación de «el Río»
  english_pob_reading: the River
  chosen_spanish_reading: el Río
  alternative_spanish_readings:
  - el Éufrates
  rationale: Se conserva la forma indefinida/descrita del hebreo en el cuerpo del texto, evitando reemplazarla por una identificación explícita que el original no formula aquí. La nota permite aclarar la referencia probable sin alterar la redacción base.
  doctrine_reference: Translation philosophy §1
- issue: Modo de referirse a Abraham
  english_pob_reading: your father Abraham
  chosen_spanish_reading: su padre Abraham
  alternative_spanish_readings:
  - su antepasado Abraham
  rationale: Mantener «padre» preserva el lenguaje pactual y la dirección retórica de Josué al pueblo. Traducirlo como «antepasado» suavizaría un matiz intencional del texto.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el pasaje base; la redacción inglesa final quedó sin cambios tras la revisión, con acuerdo alto entre evaluadores. La versión española sigue esa lectura estable sin introducir variantes no sustentadas.
  spanish_consistency_notes:
  - Se mantiene Yahvé como nombre divino por norma del proyecto, aunque este versículo no lo contiene explícitamente.
  - «Río» va con mayúscula por corresponder al uso definido y a la identificación contextual con un nombre geográfico conocido.
  - «Descendencia» se usa como singular colectivo para reflejar זֶרַע sin perder naturalidad en español.
