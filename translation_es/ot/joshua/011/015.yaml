translation:
  language: es
  text: Así como Yahvé había mandado a Moisés su siervo[a], así mandó Moisés a Josué, y así hizo Josué. No omitió nada de todo lo que Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "su esclavo". El hebreo עבד puede significar "esclavo" o "siervo"; aquí "siervo" encaja mejor con el uso honorífico y de pacto aplicado a Moisés.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del tetragrámaton, conforme al criterio del POB en inglés. 'Yahvé' es la forma española coherente con ese auditable decisión léxica y evita la sustitución por un título.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su esclavo
  alternatives_spanish:
  - su siervo
  - su servidor
  lexicon: HALOT
  rationale: Aunque en español eclesiástico 'siervo' suena natural, el POB inglés eligió 'servant' por una razón léxica de alcance amplio; aquí se preserva la fuerza de עבד con 'esclavo', mientras que 'su' mantiene la relación posesiva del hebreo.
- source_word: צִוָּה
  english_pob_choice: had commanded / commanded
  chosen_spanish: había mandado / mandó
  alternatives_spanish:
  - había ordenado / ordenó
  - había instruido / instruyó
  lexicon: HALOT
  rationale: '''Mandar'' expresa con claridad la autoridad del acto y funciona bien en la cadena de obediencia del versículo. El primer perfecto se vuelve pluscuamperfecto en español para reflejar la anterioridad relativa respecto de la orden de Moisés a Josué.'
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - de ese modo
  lexicon: HALOT
  rationale: El adverbio hebreo marca correspondencia. 'Así' reproduce bien la repetición estructural del texto y su paralelismo.
- source_word: עָשָׂה
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - lo llevó a cabo
  lexicon: HALOT
  rationale: El verbo es amplio y aquí se refiere a la ejecución obediente de Josué. 'Hizo' conserva la brevedad del hebreo y permite que la cláusula siguiente precise el alcance de la obediencia.
- source_word: לֹא הֵסִיר דָּבָר
  english_pob_choice: He left nothing undone
  chosen_spanish: No omitió nada
  alternatives_spanish:
  - No retiró ninguna palabra
  - No apartó nada
  - No dejó cosa alguna sin hacer
  lexicon: HALOT
  rationale: 'El hebreo es idiomático: literalmente ''no apartó/quitó una cosa''. En español, ''No omitió nada'' comunica con fidelidad la totalidad de la obediencia sin perder el sentido de la expresión.'
- source_word: דָּבָר
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - ningún דבר/ninguna palabra
  lexicon: HALOT
  rationale: Dentro de la negación idiomática, דָּבָר funciona como 'cosa / elemento'. En español, 'nada' expresa de forma natural la exhaustividad negativa del enunciado.
- source_word: מִכֹּל אֲשֶׁר
  english_pob_choice: of all that
  chosen_spanish: de todo lo que
  alternatives_spanish:
  - de todo cuanto
  - de todas las cosas que
  lexicon: HALOT
  rationale: La frase delimita el conjunto total de lo mandado. 'De todo lo que' es español claro y conserva el valor totalizador del hebreo.
- source_word: אֶת
  english_pob_choice: '[not translated]'
  chosen_spanish: '[no se traduce]'
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Marcador de objeto directo sin equivalente léxico independiente en español.
theological_decisions:
- issue: Nombre divino יְהוָה en un versículo de obediencia de pacto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio del pacto, no un sustituto titular. Esto preserva la decisión doctrinal y lexical del POB inglés y hace explícita la referencia al Dios que comisiona a Moisés y a Josué.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Terminología para עבד aplicado a Moisés
  english_pob_reading: his servant
  chosen_spanish_reading: su esclavo
  alternative_spanish_readings:
  - su siervo
  - su servidor
  rationale: La elección española intenta no suavizar la relación de dependencia/propiedad que עבד puede llevar. Dado que el inglés POB ya señaló una preferencia léxica por 'servant' en su tradición, se explicita aquí la tensión entre naturalidad e intensidad semántica.
  doctrine_reference: 'DOCTRINE.md: Lexical force and covenant roles'
- issue: Expresión idiomática de obediencia total
  english_pob_reading: He left nothing undone
  chosen_spanish_reading: No omitió nada
  alternative_spanish_readings:
  - No dejó nada sin hacer
  - No apartó nada
  rationale: El hebreo enfatiza que Josué no retiró ni una sola cosa de lo mandado. 'No omitió nada' preserva el sentido total sin diluir la fuerza del hebraísmo.
  doctrine_reference: 'DOCTRINE.md: Fidelity to source idioms'
translation_notes:
  revision_awareness: El expediente inglés indica acuerdo alto y sin revisiones aplicadas; por eso la versión española sigue de cerca la estructura del hebreo y mantiene las decisiones doctrinales y léxicas ya auditadas, especialmente el nombre divino y la equivalencia idiomática de la frase final.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se mantiene el paralelismo 'Así... así... y así...' del hebreo.
  - Se conserva el tiempo relativo con 'había mandado' en la primera cláusula.
  - La frase final evita una calca como 'no quitó una cosa' para no volver opaco el español, pero sin perder la totalidad de la obediencia.
  - No se usa 'SEÑOR' como sustituto del nombre divino.
