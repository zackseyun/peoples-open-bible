translation:
  language: es
  text: 'Le dijeron: «¿Dónde quieres que la preparemos[a]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más formal, «¿Dónde quieres que hagamos los preparativos?». El pronombre «la» se refiere a la cena de Pascua implícita en el contexto anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: They
  chosen_spanish: Ellos
  alternatives_spanish:
  - Y ellos
  - Pero ellos
  lexicon: BDAG
  rationale: El artículo nominativo sustantivado se refiere a los discípulos en el contexto, y en español puede expresarse naturalmente con un pronombre explícito. Se omite δέ como conector leve, igual que el inglés POB lo absorbe.
- source_word: εἶπαν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - preguntaron
  - les dijeron
  lexicon: BDAG
  rationale: λέγω en aoristo se traduce de forma directa como «dijeron». Aunque el contenido es una pregunta, el verbo de decir conserva mejor la correspondencia con el griego que sustituirlo por «preguntaron».
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: 'El dativo con verbo de decir se expresa naturalmente en español con objeto indirecto clítico: «le». El referente es Jesús por el contexto, pero no es necesario explicitarlo en el texto.'
- source_word: Ποῦ
  english_pob_choice: Where
  chosen_spanish: ¿Dónde
  alternatives_spanish:
  - ¿En qué lugar?
  lexicon: BDAG
  rationale: Interrogativo de lugar, con equivalencia idiomática directa en español.
- source_word: θέλεις
  english_pob_choice: do you want
  chosen_spanish: quieres
  alternatives_spanish:
  - deseas
  - quisieras
  lexicon: BDAG
  rationale: θέλω expresa voluntad o deseo; en español, «quieres» es claro, natural y suficientemente fiel sin aumentar el nivel de formalidad.
- source_word: ἑτοιμάσωμεν
  english_pob_choice: us to prepare it
  chosen_spanish: que preparemos
  alternatives_spanish:
  - que hagamos los preparativos
  - que lo preparemos
  lexicon: BDAG
  rationale: El subjuntivo aoristo de primera plural después de θέλεις se expresa con naturalidad como «que preparemos». El objeto implícito se mantiene implícito en español, como en el griego, porque el contexto inmediato ya lo determina.
translation_notes:
  revision_awareness: 'El texto griego y el contexto inmediato coinciden con el archivo inglés POB: no se requieren revisiones textuales ni cambios de lectura. La única decisión sensible es la manera de expresar ἑτοιμάσωμεν en español sin sobreexplicitar el objeto implícito.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento pronominal simple y directo («le») para αὐτῷ, coherente con un diálogo cercano.
  - Se usa «quieres» en lugar de una forma más formal para conservar naturalidad conversacional.
  - Se evita introducir «Cristo», «Señor» u այլ terminología ajena al versículo, porque el texto no la contiene.
