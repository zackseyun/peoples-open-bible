translation:
  language: es
  text: El sonido de una gran multitud era como un viento muy fuerte[a], como una tormenta de gran fuego que barría el desierto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «voz».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como una tormenta de mucho fuego siendo llevada por el desierto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνὴ
  english_pob_choice: sound
  chosen_spanish: sonido
  alternatives_spanish:
  - voz
  - ruido
  lexicon: LSJ
  rationale: En este símil, el término describe el efecto audible de la multitud más que una voz articulada; por eso 'sonido' transmite mejor la percepción acústica sin imponer un contenido hablado.
- source_word: λαοῦ πολλοῦ
  english_pob_choice: of a great multitude
  chosen_spanish: de una gran multitud
  alternatives_spanish:
  - de mucha gente
  - de un gran pueblo
  - de una gran muchedumbre
  lexicon: LSJ
  rationale: La expresión subraya la masa numerosa que produce el sonido. 'Gran multitud' conserva el valor colectivo de λαός y la idea de cantidad de πολλοῦ.
- source_word: ἀνέμου πολλοῦ σφόδρα
  english_pob_choice: a very strong wind
  chosen_spanish: un viento muy fuerte
  alternatives_spanish:
  - un viento muy grande
  - un viento excesivamente poderoso
  - un viento fuertísimo
  lexicon: LSJ
  rationale: La doble intensificación del griego queda bien en español con 'muy fuerte', una fórmula natural y fiel al sentido de fuerza e intensidad.
- source_word: καταιγὶς
  english_pob_choice: storm
  chosen_spanish: tormenta
  alternatives_spanish:
  - tempestad
  - súbita tormenta
  - sacudida
  lexicon: LSJ
  rationale: '''Tormenta'' es el equivalente moderno más claro y natural; mantiene la imagen de violencia atmosférica sin volver el verso demasiado literario.'
- source_word: πυρὸς πολλοῦ
  english_pob_choice: of great fire
  chosen_spanish: de gran fuego
  alternatives_spanish:
  - de mucho fuego
  - de fuego abundante
  - de un gran incendio
  lexicon: LSJ
  rationale: El griego dice literalmente 'de mucho fuego'. 'De gran fuego' conserva la magnitud de la imagen sin convertirla en una interpretación demasiado específica como 'incendio'.
- source_word: φερομένου διʼ ἐρήμου
  english_pob_choice: sweeping through the wilderness
  chosen_spanish: que se abatía por el desierto
  alternatives_spanish:
  - que era llevado por el desierto
  - que se arrastraba por el desierto
  - que se desplazaba por el desierto
  lexicon: LSJ
  rationale: φέρομαι indica movimiento impulsado o llevado. 'Se abatía' comunica una fuerza que avanza con ímpetu; 'desierto' es una alternativa española legítima para ἔρημος, aunque 'desierto' suena más natural aquí que 'wilderness' traducido literalmente.
theological_decisions:
- issue: Valor de la voz sonora frente a una voz hablada
  english_pob_reading: The sound of a great multitude
  chosen_spanish_reading: El sonido de una gran multitud
  alternative_spanish_readings:
  - La voz de una gran multitud
  - El ruido de una gran multitud
  rationale: El griego φωνὴ en este contexto describe el fenómeno audible general, no necesariamente una locución. 'Sonido' evita restringirlo a habla explícita y mantiene abierta la imagen poética, como en la lectura inglesa.
  doctrine_reference: No aplica; decisión lexical/poética.
- issue: Mantenimiento de la violencia imagética del símil
  english_pob_reading: like a storm of great fire sweeping through the wilderness
  chosen_spanish_reading: como una tormenta de gran fuego que se abatía por el desierto
  alternative_spanish_readings:
  - como una tempestad de gran fuego que avanzaba por el desierto
  - como una tormenta de mucho fuego que era llevada por el desierto
  rationale: La construcción debe conservar la fuerza acumulativa del griego sin suavizarla. 'Se abatía' refleja el movimiento impetuoso sugerido por φερομένου y preserva la tensión de la imagen original.
  doctrine_reference: No aplica; imagen poética apocalíptica.
translation_notes:
  revision_awareness: El texto inglés revisado añadió 'was' para reflejar el cambio gramatical del nominativo en el griego; en español se mantuvo el verbo copulativo en pretérito imperfecto ('era') para expresar esa cláusula independiente de manera natural y fiel. También se conservó la fuerza de la cadena de comparaciones y la intensificación doble del original.
  spanish_consistency_notes:
  - Se usa 'multitud' para λαός en este verso, coherente con el énfasis en cantidad y aglomeración.
  - Se evita 'SEÑOR' u otras convenciones de ocultamiento divino porque el verso no contiene el nombre divino.
  - Se mantiene una traducción directa y sobria, sin suavizar la imagen de fuego y desierto.
  - '''Desierto'' se elige como equivalente natural de ἔρημος en español bíblico contemporáneo.'
