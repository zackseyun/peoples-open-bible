    text: Or, more idiomatically, 'wept over him.' The Hebrew reads literally, 'wept over his face.'
    reason: lexical_alternative
  - marker: b
    text: This cry echoes 2 Kings 2:12, where Elisha used the same words for Elijah.
    reason: cross_reference
