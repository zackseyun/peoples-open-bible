lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y habló
  - Y dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; en español, «Entonces» comunica bien la secuencia sin sonar arcaico. «Habló» conserva el valor de una fórmula de habla más formal que «dijo», y encaja con la frase introductoria que sigue.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino del Tetragrámaton se translitera como «Yahvé» en el texto principal, siguiendo la decisión del proyecto de preservar el nombre propio de Dios en lugar de sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición direccional se expresa naturalmente en español con «a» en este marco verbal de habla.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio según la convención estándar en español bíblico.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como fórmula introductoria del discurso; «diciendo» preserva esa función y mantiene abierta la cita que continúa en el versículo siguiente.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La fuente hebrea contiene explícitamente el Tetragrámaton. Se conserva como nombre propio en español, no como título sustitutivo, para mantener la transparencia respecto del texto original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y confirmado sin cambios en el último pase; no se registran revisiones que alteren la lectura léxica o teológica de este versículo.
  spanish_consistency_notes:
  - Se mantiene el nombre divino «Yahvé» de forma consistente con el estándar del proyecto.
  - La fórmula de habla se conserva con «diciendo» para reflejar la apertura de discurso sin anticipar el contenido.
  - El registro es formal y publicable, evitando calcos innecesarios pero sin añadir información ausente del hebreo.
