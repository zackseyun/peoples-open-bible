revisions:
- from: No se derramará sobre carne humana[a], y conforme a su composición no haréis otro igual. Es santo; santo será para ustedes.
  to: No lo derramarán sobre carne humana[a], y según su composición no harán nada igual. Es santo; será santo para ustedes.
  rationale: Se ajusta la primera cláusula para expresar la prohibición de manera más natural en español normativo y bíblico contemporáneo. También se reemplaza «otro igual» por «nada igual» para evitar añadir un matiz no explícito y mantener la fuerza comparativa del hebreo. El resto se conserva con ligerísimo pulido idiomático.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:03:12Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: prohibición de verter el aceite sobre carne humana, prohibición de hacer uno igual según su composición, y afirmación de su santidad. Sin embargo, «No se derramará» en español suena más descriptivo/futuro que prohibitivo; en contexto legal-cultual conviene una forma de mandato negativo más natural. También «otro igual» añade explícitamente «otro», no presente en el hebreo, aunque el sentido general se mantiene.'
  spanish_quality_summary: El español es claro y mayormente natural. No obstante, «No se derramará sobre carne humana» resulta menos idiomático que una prohibición directa como «No lo derramarán» o «No será derramado». Además, «conforme a su composición» funciona, pero «según su composición» o «según su fórmula» suena un poco más natural; aun así no es necesario cambiarlo si se preserva la precisión. La frase final es legible y digna.
  glossary_alignment: 'Alinea bien con las decisiones del POB: «carne humana» preserva בָּשָׂר + uso genérico de אָדָם; «santo» mantiene קֹדֶשׁ. No hay conflicto con terminología base del proyecto. La nota al pie preserva correctamente la alternativa más literal.'
  issues:
  - severity: medium
    issue: La forma verbal «No se derramará» suena poco natural como prohibición directa.
    rationale: El hebreo expresa una prohibición legal. En español bíblico moderno, «No lo derramarán sobre carne humana» comunica mejor la fuerza normativa que un futuro pasivo/reflexivo impersonal, que puede oírse como simple predicción.
  - severity: low
    issue: «Otro igual» introduce un matiz no explícito.
    rationale: לֹא תַעֲשׂוּ כָּמֹהוּ prohíbe hacer algo como ello. «Otro igual» no distorsiona gravemente, pero «nada igual» o «uno igual» evita añadir un referente extra.
  revised_spanish_text: No lo derramarán sobre carne humana[a], y según su composición no harán nada igual. Es santo; será santo para ustedes.
  revised_footnotes:
  - marker: a
    text: O «sobre la carne del hombre». El hebreo «carne de אָדָם» usa אָדָם con sentido genérico para seres humanos.
    reason: lexical_alternative
  revision_rationale: Se ajusta la primera cláusula para expresar la prohibición de manera más natural en español normativo y bíblico contemporáneo. También se reemplaza «otro igual» por «nada igual» para evitar añadir un matiz no explícito y mantener la fuerza comparativa del hebreo. El resto se conserva con ligerísimo pulido idiomático.
