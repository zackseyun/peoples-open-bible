id: 2TI.2.24
reference: 2 Timothy 2:24
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: δοῦλον δὲ κυρίου οὐ δεῖ μάχεσθαι, ἀλλὰ ἤπιον εἶναι πρὸς πάντας, διδακτικόν, ἀνεξίκακον,
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/024.yaml
  text: And the Lord’s servant must not quarrel, but must be gentle toward everyone, able to teach, patient when wronged,
translation:
  language: ko
  text: 주의 종은 다투지 말아야 합니다. 도리어 모든 이에게 온유하고, 가르칠 만하며, 부당함을 잘 견뎌야 합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοῦλον κυρίου
  english_pob_choice: the Lord's servant
  chosen_korean: 주의 종
  alternatives_korean:
  - 주의 노예
  - 주께 매인 자
  lexicon: BDAG
  rationale: 본 절의 δοῦλος는 「주께 속한 사역자」를 가리키는 비유적·기능적 자기 칭호이며, 빌립보서 1:1처럼 「매임의 신학적 무게」를 의도적으로 드러내는 본문이 아니다. 한국 성서 전통의 「주의 종」이 본문 흐름(목회적 자질 권면)에 자연스럽다.
- source_word: ἤπιον εἶναι πρὸς πάντας
  english_pob_choice: be gentle toward everyone
  chosen_korean: 모든 이에게 온유하고
  alternatives_korean:
  - 모든 사람에게 부드럽고
  - 모두에게 자상하며
  lexicon: BDAG
  rationale: ἤπιος는 「부드러운·온유한」. 「온유하다」가 신약 전반의 미덕 어휘로 자연스럽다.
- source_word: διδακτικόν
  english_pob_choice: able to teach
  chosen_korean: 가르칠 만하며
  alternatives_korean:
  - 가르치기에 능하며
  - 가르치는 능력이 있고
  lexicon: BDAG
  rationale: 디모데전서 3:2의 「가르치기를 잘하며」와 통하는 자질. 「가르칠 만하다」가 자연스럽다.
- source_word: ἀνεξίκακον
  english_pob_choice: patient when wronged
  chosen_korean: 부당함을 잘 견뎌야
  alternatives_korean:
  - 잘못한 사람도 참아주어야
  - 악을 참아 견디며
  lexicon: BDAG
  rationale: ἀνεξίκακος는 「악(부당함)을 참아 견딤」을 뜻한다. 「부당함을 잘 견디다」가 자연스럽다.
