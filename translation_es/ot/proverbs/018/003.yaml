translation:
  language: es
  text: Cuando viene la maldad[a], viene también el desprecio; y con deshonra, la afrenta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando viene el impío, viene también el desprecio; y con deshonra, la afrenta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבוֹא
  english_pob_choice: When ... comes
  chosen_spanish: Cuando viene ...
  alternatives_spanish:
  - Al venir ...
  - Con la llegada de ...
  lexicon: HALOT
  rationale: La construcción con ב + infinitivo de בוא introduce una circunstancia temporal; en español, «Cuando viene ...» conserva ese valor sin sonar forzado.
- source_word: רָשָׁע
  english_pob_choice: wickedness
  chosen_spanish: la maldad
  alternatives_spanish:
  - el impío
  - el malvado
  - el perverso
  lexicon: HALOT
  rationale: Aunque el hebreo puede referirse a una persona inicua, el historial de revisión en inglés optó por el valor abstracto «wickedness». «La maldad» refleja mejor ese giro abstracto y mantiene el paralelismo proverbial.
- source_word: בּוּז
  english_pob_choice: contempt
  chosen_spanish: el desprecio
  alternatives_spanish:
  - el escarnio
  - la burla
  lexicon: HALOT
  rationale: בּוּז expresa desprecio o menosprecio; «desprecio» es el equivalente más directo y conserva el sustantivo abstracto del hebreo.
- source_word: קָלוֹן
  english_pob_choice: dishonor
  chosen_spanish: deshonra
  alternatives_spanish:
  - vergüenza
  - afrenta
  lexicon: HALOT
  rationale: קָלוֹן suele expresar deshonra pública o vergüenza. «Deshonra» conserva bien ese campo semántico y el tono del proverbio.
- source_word: חֶרְפָּה
  english_pob_choice: reproach
  chosen_spanish: la afrenta
  alternatives_spanish:
  - el oprobio
  - el reproche
  lexicon: HALOT
  rationale: חֶרְפָּה puede referirse a oprobio, afrenta o reproche. En español, «afrenta» mantiene la idea de vergüenza pública y evita duplicar demasiado el sentido de «deshonra».
- source_word: גַם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - igualmente
  - asimismo
  lexicon: HALOT
  rationale: «También» reproduce el valor aditivo de גַם con naturalidad en español y conserva el paralelismo del verso.
- source_word: וְעִם
  english_pob_choice: and with
  chosen_spanish: y con
  alternatives_spanish:
  - junto con
  - con
  lexicon: HALOT
  rationale: La secuencia hebrea une la coordinación con la preposición de acompañamiento; «y con» preserva esa relación de manera clara y directa.
translation_notes:
  revision_awareness: 'El texto inglés de referencia pasó por una revisión que releyó רָשָׁע como un valor abstracto («wickedness») en vez de personal («a wicked man»). La versión española sigue esa revisión para evitar introducir una persona específica donde el poema sapiencial puede funcionar de modo general y abstracto. También conserva el paralelismo doble: maldad/desprecio y deshonra/afrenta.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «maldad» frente a un sujeto personal para alinearse con la revisión más reciente del audit trail.
  - Se mantuvo un registro breve y proverbial, con dos miembros paralelos claramente marcados por puntuación española.
