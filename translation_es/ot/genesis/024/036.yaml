    issue: La nota al pie repite exactamente la redacción del texto principal
    rationale: Una nota de alternativa léxica debe preservar una variante significativa; aquí «O, más literalmente, “después de su vejez”» no aporta nada porque el texto ya dice «después de su vejez».
  - severity: low
    issue: Anclaje de nota mal ubicado en el nombre propio
    rationale: '«Sar[a]» es una colocación poco natural en español; el marcador debe ir después de la palabra completa: «Sara[a]».'
  - severity: medium
    issue: La cláusula temporal principal suena algo forzada en español
    rationale: Aunque es cercana al hebreo, «después de su vejez» resulta rígida. Una redacción principal más natural como «cuando ya era anciana» puede llevar la nota con la alternativa más literal, preservando tanto fidelidad como legibilidad.
  revised_spanish_text: Y Sara[a], la mujer de mi señor, dio a luz un hijo a mi señor cuando ya era anciana, y le dio todo cuanto tenía.
