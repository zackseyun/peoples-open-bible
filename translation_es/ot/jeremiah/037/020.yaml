translation:
  language: es
  text: Y ahora[a], escucha, por favor, mi señor el rey; por favor, que mi súplica caiga delante de ti, y no me hagas volver a la casa de Jehonatán el escriba, para que no muera allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «por favor, que mi petición llegue delante de ti». El hebreo dice literalmente: «que mi súplica caiga delante de ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora pues
  lexicon: HALOT
  rationale: Marca discursiva de transición urgente; "así que" conserva la conexión del וְ inicial y "ahora" reproduce la inmediatez de la súplica sin sonar forzado en español.
- source_word: שְׁמַע נָא
  english_pob_choice: please hear
  chosen_spanish: por favor, oye
  alternatives_spanish:
  - por favor, escucha
  - oye, por favor
  lexicon: HALOT
  rationale: El imperativo de שׁמע con נָא expresa una petición urgente y respetuosa. "Oye" es breve y directo; "por favor" mantiene el tono cortés del ruego.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, oh rey
  - mi dueño el rey
  lexicon: HALOT
  rationale: Se conserva el trato cortesano al rey. "Señor" refleja bien el honorífico de אֲדֹנִי en este contexto regnal, y "rey" traduce el título sin recargar la frase con formas arcaicas.
- source_word: תִּפָּל נָא תְחִנָּתִי לְפָנֶיךָ
  english_pob_choice: please let my plea fall before you
  chosen_spanish: por favor, que mi súplica caiga delante de ti
  alternatives_spanish:
  - por favor, que mi petición llegue delante de ti
  - por favor, que mi súplica sea presentada delante de ti
  lexicon: HALOT
  rationale: Se mantiene la metáfora hebrea de "caer delante de" para no borrar la imagen idiomática. "Súplica" traduce תְחִנָּה con tono más solemne que "petición".
- source_word: תְחִנָּתִי
  english_pob_choice: my plea
  chosen_spanish: mi súplica
  alternatives_spanish:
  - mi ruego
  - mi petición
  lexicon: HALOT
  rationale: '"Súplica" conserva el matiz de ruego intenso y reverente que pide audiencia ante una autoridad.'
- source_word: וְאַל תְּשִׁבֵנִי
  english_pob_choice: and do not send me back
  chosen_spanish: y no me hagas volver
  alternatives_spanish:
  - y no me devuelvas
  - y no me mandes de vuelta
  lexicon: HALOT
  rationale: El hiphil de שוב tiene fuerza causativa. "Hacer volver" refleja esa causación con naturalidad en español, sin perder el sentido custodial del contexto.
- source_word: בֵּית יְהוֹנָתָן הַסֹּפֵר
  english_pob_choice: the house of Jehonathan the scribe
  chosen_spanish: la casa de Jehonatán el escriba
  alternatives_spanish:
  - la casa de Jonatán el escriba
  lexicon: HALOT
  rationale: '"Casa" conserva la literalidad del hebreo y puede implicar el lugar de confinamiento. Se mantiene "Jehonatán" para reflejar la forma hebrea יְהוֹנָתָן, en vez de normalizarla a una forma más común.'
- source_word: וְלֹא אָמוּת שָׁם
  english_pob_choice: lest I die there
  chosen_spanish: para que no muera allí
  alternatives_spanish:
  - y no muera allí
  - para no morir allí
  lexicon: HALOT
  rationale: La cláusula expresa el resultado temido de la petición. "Para que no muera allí" comunica con claridad el objetivo preventivo sin introducir una lectura más fuerte que el hebreo.
translation_notes:
  revision_awareness: La redacción sigue el impulso de la revisión inglesa que prefirió "hear" a "listen" para acercarse más al imperativo hebreo. En español, "oye" conserva esa cercanía verbal y mantiene la súplica directa. También se preserva la metáfora de "caer delante de ti" por ser parte del entramado idiomático del verso.
  spanish_consistency_notes:
  - Se usa "Yahvé" como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene "Jehonatán" como transliteración coherente con la forma hebrea documentada.
  - '"Súplica" conserva el registro reverente de תְחִנָּה y evita el rebajamiento a un ruego demasiado coloquial.'
