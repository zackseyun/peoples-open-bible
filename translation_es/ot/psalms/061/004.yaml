translation:
  language: es
  text: Porque tú has sido un refugio para mí[a], una torre fuerte[b] del enemigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque tú eras un refugio para mí, una torre de fortaleza del enemigo».
    reason: alternative_reading
  - marker: b
    text: O «torre de fortaleza».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La conjunción introduce aquí la base o motivo de la afirmación anterior. En español, «Porque» conserva bien ese valor explicativo-causal sin sonar forzado.
- source_word: הָיִיתָ
  english_pob_choice: have been
  chosen_spanish: has sido
  alternatives_spanish:
  - eras
  - fuiste
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una experiencia pasada que sigue siendo válida; «has sido» comunica continuidad mejor que un pasado simple.
- source_word: מַחְסֶה
  english_pob_choice: a refuge
  chosen_spanish: un refugio
  alternatives_spanish:
  - amparo
  - asilo
  lexicon: HALOT
  rationale: «Refugio» es el equivalente más natural y fiel para el valor protector de מַחְסֶה, y mantiene la imagen poética sin explicarla de más.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - por mí
  lexicon: HALOT
  rationale: Con «refugio», la relación de beneficio se expresa de manera natural en español con «para mí».
- source_word: מִגְדַּל עֹז
  english_pob_choice: a strong tower
  chosen_spanish: una torre fuerte
  alternatives_spanish:
  - una torre de fortaleza
  - una torre poderosa
  - una torre segura
  lexicon: HALOT
  rationale: La construcción nominal transmite la imagen de una torre caracterizada por la fuerza. «Torre fuerte» preserva el paralelismo poético y evita ampliar la metáfora a «fortaleza», que sería menos literal.
- source_word: מִפְּנֵי
  english_pob_choice: from the enemy
  chosen_spanish: frente al enemigo
  alternatives_spanish:
  - ante el enemigo
  - del enemigo
  - a causa del enemigo
  lexicon: HALOT
  rationale: La expresión hebrea literalmente alude a «delante de / de la presencia de». En español, «frente al enemigo» comunica mejor la relación espacial y defensiva de la imagen, sin convertirla en una lectura interpretativa de mera causalidad.
- source_word: אוֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: el enemigo
  alternatives_spanish:
  - un enemigo
  - el adversario
  lexicon: HALOT
  rationale: El singular genérico se traduce de forma natural como «el enemigo», conservando el valor colectivo/representativo del término hebreo.
theological_decisions:
- issue: Retención de la metáfora protectora
  english_pob_reading: Retain the metaphors 'refuge' and 'strong tower' as poetic descriptions of God's protection rather than flattening them into abstract language.
  chosen_spanish_reading: Conservar las metáforas «refugio» y «torre fuerte» como descripciones poéticas de la protección de Dios, sin reducirlas a fórmulas abstractas.
  alternative_spanish_readings:
  - Tú me proteges
  - Eres mi defensa
  rationale: El hebreo usa imágenes concretas que forman parte del valor devocional y literario del salmo. Mantenerlas en español preserva ese peso teológico y poético.
  doctrine_reference: Poética bíblica y equivalencia óptima; no neutralizar la imaginería del texto.
translation_notes:
  revision_awareness: La versión inglesa auditada revisó «against the enemy» a «from the enemy» para reflejar más de cerca מִפְּנֵי. En español, opté por «frente al enemigo» para conservar la noción espacial de presencia/oposición sin imponer una preposición demasiado abstracta.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo explicita el nombre divino; en este versículo no aparece.
  - «Torre fuerte» se usa aquí como calco semánticamente transparente de מִגְדַּל עֹז, en línea con la metáfora conservada en la auditoría inglesa.
  - El cierre «frente al enemigo» refleja el valor relacional de מִפְּנֵי sin perder la imagen defensiva.
