translation:
  language: es
  text: Y los hijos de Israel hicieron así, tal como Josué había mandado, y cargaron doce piedras de en medio del Jordán[a], tal como Yahvé había hablado a Josué, según el número de las tribus de los hijos de Israel; y las llevaron con ellos al lugar de alojamiento[b] y las pusieron allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde en medio del Jordán».
    reason: lexical_alternative
  - marker: b
    text: O «el campamento»; el hebreo indica más específicamente un lugar de alojamiento o pernocta.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Mantiene la expresión hebrea familiar y paralela al texto fuente. 'Hijos de Israel' conserva la transparencia del original mejor que 'israelitas', sin forzar un calco poco natural en español.
- source_word: וַיַּעֲשׂוּ כֵן
  english_pob_choice: did so
  chosen_spanish: hicieron así
  alternatives_spanish:
  - obraron así
  - lo hicieron así
  lexicon: HALOT
  rationale: Expresa la respuesta obediente de forma natural en español y conserva el valor de conformidad de la fórmula hebrea.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había instruido
  lexicon: HALOT
  rationale: '''Mandar'' comunica con claridad la autoridad de la instrucción de Josué. El pluscuamperfecto refleja la relación temporal en la narración retrospectiva.'
- source_word: וַיִּשְׂאוּ
  english_pob_choice: they carried
  chosen_spanish: tomaron
  alternatives_spanish:
  - llevaron
  - cargaron
  lexicon: HALOT
  rationale: En este contexto, 'tomaron' introduce de manera natural el acto de recoger las piedras, evitando una posible pesadez de 'cargaron' en español; el verbo posterior 'llevaron' completa el movimiento.
- source_word: שְׁתֵּי עֶשְׂרֵה אֲבָנִים
  english_pob_choice: twelve stones
  chosen_spanish: doce piedras
  alternatives_spanish:
  - doce piedras de memorial
  - doce piedras
  lexicon: HALOT
  rationale: '''Piedras'' es el equivalente directo y natural de אֲבָנִים. No se añade ''de memorial'' porque eso no aparece en este versículo.'
- source_word: מִתּוֹךְ הַיַּרְדֵּן
  english_pob_choice: from the midst of the Jordan
  chosen_spanish: de en medio del Jordán
  alternatives_spanish:
  - del centro del Jordán
  - desde en medio del Jordán
  lexicon: HALOT
  rationale: '''De en medio'' reproduce la imagen espacial del hebreo con naturalidad en español y mantiene la referencia al cauce o lecho del río.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se conserva el nombre divino revelado, conforme al criterio del proyecto, y se adapta a la forma española establecida como 'Yahvé'.
- source_word: דִּבֶּר ... אֶל יְהוֹשֻׁעַ
  english_pob_choice: had spoken to Joshua
  chosen_spanish: había hablado a Josué
  alternatives_spanish:
  - había dicho a Josué
  - habló a Josué
  lexicon: HALOT
  rationale: '''Había hablado'' respeta el verbo de comunicación del hebreo y el pluscuamperfecto mantiene la relación temporal con ''tal como''.'
- source_word: לְמִסְפַּר
  english_pob_choice: according to the number of
  chosen_spanish: según el número de
  alternatives_spanish:
  - de acuerdo con el número de
  - conforme al número de
  lexicon: HALOT
  rationale: '''Según el número de'' expresa bien la correspondencia cuantitativa y conserva el paralelo del hebreo.'
- source_word: שִׁבְטֵי בְנֵי יִשְׂרָאֵל
  english_pob_choice: the tribes of the sons of Israel
  chosen_spanish: las tribus de los hijos de Israel
  alternatives_spanish:
  - las tribus de Israel
  - las tribus de los israelitas
  lexicon: HALOT
  rationale: Mantiene la estructura plena del hebreo, que enlaza 'tribus' con 'hijos de Israel' y preserva la simetría del versículo.
- source_word: וַיַּעֲבִרוּם
  english_pob_choice: they brought them over
  chosen_spanish: las llevaron
  alternatives_spanish:
  - las pasaron
  - las trajeron
  lexicon: HALOT
  rationale: En español, 'las llevaron' comunica el traslado efectivo de las piedras hacia el otro lado sin forzar un calco del aspecto causativo.
- source_word: עִמָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  - conforme a ellos
  lexicon: HALOT
  rationale: Equivale de manera directa a la idea de acompañamiento y movimiento conjunto.
- source_word: הַמָּלוֹן
  english_pob_choice: the lodging place
  chosen_spanish: el lugar de alojamiento
  alternatives_spanish:
  - el campamento
  - el sitio donde acamparon
  lexicon: HALOT
  rationale: '''Lugar de alojamiento'' preserva el sentido específico de מָלוֹן como sitio para pasar la noche, sin reducirlo automáticamente a ''campamento''.'
- source_word: וַיַּנִּחוּם שָׁם
  english_pob_choice: set them down there
  chosen_spanish: las dejaron allí
  alternatives_spanish:
  - las pusieron allí
  - las colocaron allí
  lexicon: HALOT
  rationale: '''Dejaron allí'' expresa con naturalidad la acción de depositar las piedras en el lugar de alojamiento, conservando el resultado físico del verbo.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La tradición del proyecto exige no enmascararlo con 'SEÑOR'; en español, 'Yahvé' es la forma establecida para mantener el nombre del pacto de manera legible.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Expresión de filiación ישראל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se conserva la formulación genealógica del hebreo, coherente con el valor lexical que el audit trail protege y sin neutralizarla en una abreviación moderna.
  doctrine_reference: POB lexical policy on gender-accurate rendering of בְּנֵי יִשְׂרָאֵל
- issue: Referencia espacial de מִתּוֹךְ הַיַּרְדֵּן
  english_pob_reading: from the midst of the Jordan
  chosen_spanish_reading: de en medio del Jordán
  alternative_spanish_readings:
  - del medio del Jordán
  - desde en medio del Jordán
  rationale: Se mantiene la concreción espacial del hebreo, que probablemente alude al lecho del río donde se encontraban las piedras.
  doctrine_reference: POB source-grounded spatial rendering principle
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior anclando todas las notas a marcadores visibles en el texto: [a], [b] y [c]. La redacción final conserva la estructura del hebreo y la decisión terminológica del audit trail inglés, especialmente en el nombre divino y en la expresión «hijos de Israel».'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene 'hijos de Israel' para בְּנֵי יִשְׂרָאֵל, evitando la neutralización a 'israelitas' salvo que el contexto lo exigiera.
  - '''Lugar de alojamiento'' conserva el matiz de מָלוֹן sin imponer ''campamento'' como traducción principal.'
  - La secuencia verbal en pluscuamperfecto ('había mandado', 'había hablado') sigue la relación temporal del original y del audit trail inglés.
