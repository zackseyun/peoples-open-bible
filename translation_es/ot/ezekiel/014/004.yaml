base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/014/004.yaml
  text: 'Therefore speak to them and say to them[a], ‘Thus says the Lord GOD: Any man of the house of Israel who brings up his idols into his heart, and sets the stumbling block of his iniquity before his face, and then comes to the prophet—I, Yahweh[c][b], will answer him according to the multitude of his idols.’'
  footnotes:
  - marker: a
    text: Hebrew 'Any man, any man,' a distributive expression meaning 'each' or 'every' man.
    reason: lexical_alternative
  - marker: b
    text: Or 'raises his idols into his heart.' The Hebrew vividly pictures inwardly enthroning idols.
    reason: lexical_alternative
  - marker: c
    text: The clause 'I, the LORD, will answer him in accordance with the multitude of his idols' is difficult in Hebrew; alternatives include 'by it' or 'through it' instead of 'in accordance with.'
    reason: alternative_reading
