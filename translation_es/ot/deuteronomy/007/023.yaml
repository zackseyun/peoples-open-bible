translation:
  language: es
  text: Pero Yahvé tu Dios los entregará delante de ti[a] y los sumirá en gran confusión[b], hasta que sean destruidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'delante de ti'. La expresión indica aquí que Yahvé pondrá a esos enemigos bajo tu poder.
    reason: lexical_alternative
  - marker: b
    text: O 'gran pánico' o 'gran tumulto'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתָנָם
  english_pob_choice: will give them over
  chosen_spanish: los entregará
  alternatives_spanish:
  - los dará
  - los pondrá en tus manos
  lexicon: HALOT
  rationale: El hebreo con objeto directo y el complemento 'delante de ti' expresa una entrega de los enemigos al poder de Israel. 'Entregará' conserva esa fuerza militar y suena natural en español bíblico actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrama, conforme a la convención del proyecto. 'Yahvé' comunica el nombre de pacto sin sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - Dios tuyo
  lexicon: HALOT
  rationale: La construcción con sufijo posesivo de segunda persona masculina singular se traduce de manera directa y natural como 'tu Dios'.
- source_word: לְפָנֶיךָ
  english_pob_choice: to you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: HALOT
  rationale: La expresión es literalmente 'delante de ti', y en este contexto militar indica que los enemigos quedan puestos bajo tu poder. Se preserva la imagen espacial del hebreo, que además funciona bien en español.
- source_word: וְהָמָם
  english_pob_choice: throw them into great confusion
  chosen_spanish: los llenará de gran confusión
  alternatives_spanish:
  - los arrojará a gran confusión
  - los desbaratará con gran pánico
  lexicon: HALOT
  rationale: El verbo המם denota causar pánico, confusión o desbandada. 'Llenará de gran confusión' mantiene el efecto resultante sobre ellos y evita una formulación demasiado idiomática que borraría el paralelismo con el sustantivo siguiente.
- source_word: מְהוּמָה גְדֹלָה
  english_pob_choice: great confusion
  chosen_spanish: gran confusión
  alternatives_spanish:
  - gran pánico
  - gran tumulto
  lexicon: HALOT
  rationale: El sustantivo admite 'confusión', 'pánico' o 'tumulto'. 'Gran confusión' enlaza de manera directa con el verbo previo y conserva la amplitud semántica sin cargar el texto con una tonalidad exclusivamente emocional.
- source_word: הִשָּׁמְדָם
  english_pob_choice: until they are destroyed
  chosen_spanish: hasta que sean destruidos
  alternatives_spanish:
  - hasta su destrucción
  - hasta que perezcan
  lexicon: HALOT
  rationale: El infinitivo con sufijo expresa el punto final del proceso. La forma pasiva 'sean destruidos' mantiene el sentido resultativo y es clara en español.
theological_decisions:
- issue: Nombre divino YHWH en la traducción española
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Siguiendo la política del proyecto, se conserva el nombre personal de Dios en vez de ocultarlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre 'delante de ti' y la entrega militar de los enemigos
  english_pob_reading: Literally, 'before you.' The phrase here means that the LORD will place these enemies into your power.
  chosen_spanish_reading: '''delante de ti'' como imagen literal con valor de entrega al poder de Israel'
  alternative_spanish_readings:
  - '''ante ti'' como simple localización'
  - '''en tu presencia'''
  rationale: Se conserva la metáfora espacial del hebreo, pero se lee dentro del contexto bélico. El resultado no es mera ubicación, sino sometimiento efectivo de los enemigos.
  doctrine_reference: HALOT; contexto narrativo de conquista
- issue: Matiz de המם / מְהוּמָה en contexto de guerra
  english_pob_reading: throw them into great confusion
  chosen_spanish_reading: los llenará de gran confusión
  alternative_spanish_readings:
  - los desbaratará con gran pánico
  - los sumirá en gran tumulto
  rationale: No se reduce el término a un solo matiz. 'Confusión' funciona como término inclusivo que puede abarcar pánico, desorden y desbandada, manteniendo la tensión semántica del original.
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: El audit trail inglés muestra acuerdo alto y sin cambios en la última revisión; la propuesta española sigue esa lectura, conservando el nombre divino, el valor militar de לְפָנֶיךָ y la amplitud semántica de המם / מְהוּמָה sin introducir paráfrasis ajenas al hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - '''Entregará'' conserva el sentido de entrega militar, no simple dar.'
  - '''Gran confusión'' mantiene el paralelismo con el hebreo y con el sustantivo מְהוּמָה.'
  - No se usa 'SEÑOR' como sustituto del nombre divino.
  - La pasiva 'sean destruidos' refleja el cierre resultativo del hebreo.
