review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca la fórmula censal hebrea y refleja bien las decisiones del POB en casi todos los sintagmas: «hijos de Aser», «por sus generaciones», «por sus clanes», «por las casas de sus padres» y «según el número de nombres» son fieles al origen. La principal desviación está en כֹּל יֹצֵא צָבָא, donde el inglés auditado explicitó «every man» por el contexto censal masculino; «todo el que sale a la guerra» pierde esa explicitación. También «de veinte años arriba» es entendible, pero «de veinte años y arriba» o «de veinte años en adelante» refleja mejor וָמַעְלָה en español actual.'
  spanish_quality_summary: El texto es legible y digno, pero «de veinte años arriba» suena algo incompleto en español moderno neutro, y «todo el que» puede percibirse como genérico más que masculino en un contexto donde el censo enumera varones aptos para servicio militar. Una pequeña revisión mejora claridad y alineación sin volverlo rígido.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la consistencia de fórmulas censales. «Clanes» para מִשְׁפְּחֹתָם está bien; «casas de sus padres» preserva correctamente בֵית־אָבוֹת. La nota debe ajustarse si se explicita «varón» en el texto principal, para no presentar como literal exacto lo que ya fue parcialmente interpretado en la traducción.
  issues:
  - severity: medium
    issue: Falta explicitación masculina en «todo el que sale a la guerra».
    rationale: El hebreo כֹּל יֹצֵא צָבָא es idiomático, pero en este contexto de censo masculino el POB inglés documentó la explicitación «every man». En español, «todo el que» puede sonar inclusivo/genérico y debilita el marco del pasaje.
  - severity: low
    issue: «De veinte años arriba» suena menos natural que otras opciones actuales.
    rationale: Aunque comprensible, la expresión queda algo abreviada en español neutro. «De veinte años en adelante» mantiene el sentido de וָמַעְלָה con mejor fluidez.
  - severity: low
    issue: La nota actual repite literalmente la frase del texto sin reflejar la posible explicitación contextual.
    rationale: Si el texto principal se ajusta a «todo varón que sale a la guerra», la nota debe reservar lo literal hebreo y explicar el modismo de elegibilidad militar con precisión.
  revised_spanish_text: 'Para los hijos de Aser,[a] por sus generaciones, por sus clanes, por las casas de sus padres, según el número de nombres, de veinte años en adelante, todo varón que sale a la guerra:'
  revised_footnotes:
