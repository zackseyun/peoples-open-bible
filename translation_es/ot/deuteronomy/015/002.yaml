revisions:
- from: 'Y esta es la disposición de la remisión[a]: todo acreedor remitirá lo que haya prestado a su prójimo. No apremiará a su prójimo ni a su hermano[b], porque ha sido proclamada una remisión para Yahvé.'
  to: 'Y este es el asunto de la remisión[a]: todo acreedor remitirá lo que haya prestado a su prójimo. No apremiará a su prójimo ni a su hermano[b], porque ha sido proclamada una remisión a Yahvé.'
  rationale: Se corrige la nota b para que quede enteramente en español, se ajusta «disposición» a «asunto» para reflejar mejor דְּבַר / 'matter' en una introducción legal, y se cambia «para Yahvé» por «a Yahvé» para acercarse más a לַיהוָה y al rastro auditado sin alterar el sentido.
