translation:
  language: es
  text: Y la suerte[a] fue para la tribu de los hijos de Judá[b], según sus clanes, hasta la frontera de Edom, hasta el desierto de Zin, hacia el sur, en el extremo más al sur[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y fue la suerte para la tribu de los hijos de Judá, según sus clanes, hasta la frontera de Edom...»'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de Judá»; aquí se refiere a los descendientes tribales de Judá.'
    reason: cultural_note
  - marker: c
    text: 'O: «en el extremo más meridional». El hebreo también puede entenderse más literalmente como «desde la extremidad de Temán/sur».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... was
  chosen_spanish: fue
  alternatives_spanish:
  - estuvo
  - resultó ser
  lexicon: HALOT
  rationale: En este contexto de reparto territorial, la forma narrativa introduce el resultado del sorteo; en español, 'fue' conserva la relación de estado/resultación sin forzar una perífrasis ajena al hebreo.
- source_word: הַגּוֹרָל
  english_pob_choice: the lot
  chosen_spanish: la suerte
  alternatives_spanish:
  - el sorteo
  - la porción asignada por sorteo
  lexicon: HALOT
  rationale: '''גוֹרָל'' es el lote/suerte por el cual se asigna la heredad. ''Suerte'' es una opción natural en español bíblico y conserva el mecanismo concreto de asignación.'
- source_word: לְמַטֵּה
  english_pob_choice: for the tribe of
  chosen_spanish: para la tribu de
  alternatives_spanish:
  - a la tribu de
  - para el linaje de
  lexicon: HALOT
  rationale: En contexto administrativo tribal, מַטֶּה significa 'tribu'. 'Para la tribu de' expresa adecuadamente la asignación territorial.
- source_word: בְּנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - los descendientes de Judá
  - la casa de Judá
  lexicon: HALOT
  rationale: Se conserva la expresión filial del hebreo. 'Hijos de Judá' mantiene la transparencia formal; el contexto de clanes y tribu aclara que se trata de los descendientes tribales.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: En repartos tribales, מִשְׁפָּחָה designa una subdivisión tribal; 'clanes' es más preciso que 'familias' y preserva la estructura administrativa.
- source_word: אֶל גְּבוּל אֱדוֹם
  english_pob_choice: to the border of Edom
  chosen_spanish: hasta el borde de Edom
  alternatives_spanish:
  - hasta la frontera de Edom
  - hacia el límite de Edom
  lexicon: HALOT
  rationale: '''גְּבוּל'' puede ser ''borde'', ''límite'' o ''frontera''. ''Hasta el borde de Edom'' refleja el límite territorial de manera clara y natural en español.'
- source_word: מִדְבַּר צִן
  english_pob_choice: the wilderness of Zin
  chosen_spanish: el desierto de Zin
  alternatives_spanish:
  - el desierto/tierral seca de Zin
  - la estepa de Zin
  lexicon: HALOT
  rationale: Aunque 'wilderness' puede ser 'desierto' o 'yermo', 'desierto de Zin' es la forma geográfica más inteligible en español y mantiene el topónimo tradicional.
- source_word: נֶגְבָּה
  english_pob_choice: southward
  chosen_spanish: hacia el sur
  alternatives_spanish:
  - al sur
  - en dirección al sur
  lexicon: HALOT
  rationale: La forma funciona adverbialmente como dirección. 'Hacia el sur' conserva esa fuerza direccional sin convertirla en nombre propio regional.
- source_word: מִקְצֵה תֵימָן
  english_pob_choice: at the farthest south
  chosen_spanish: en la extremidad más austral
  alternatives_spanish:
  - en el extremo más meridional
  - en el punto más al sur
  lexicon: HALOT
  rationale: La frase expresa el límite extremo del sur. 'Extremidad más austral' reproduce el sentido de terminación geográfica con registro bíblico sobrio, sin perder la tensión entre 'Temán/sur' y la lectura direccional.
theological_decisions:
- issue: Lectura de תֵימָן como dirección regional más que como nombre propio
  english_pob_reading: The Hebrew may also be understood more literally as 'from the extremity of Teman/south.'
  chosen_spanish_reading: en la extremidad más austral
  alternative_spanish_readings:
  - desde la extremidad de Temán
  - en el extremo de Temán/sur
  rationale: El contexto inmediato repite una indicación direccional ('hacia el sur') y favorece entender תֵימָן como 'sur'. Para no borrar la ambigüedad documentada, la redacción española conserva un cierre geográfico extremo sin fijarlo innecesariamente como topónimo.
  doctrine_reference: Sin implicación doctrinal; decisión geográfico-lexical.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: cambió ''came to'' por ''was to'' para reflejar mejor el hebreo, y ''at the far end of the south'' por ''at the farthest south''. La versión española sigue esa decisión con una construcción estática (''fue para'') y un cierre geográfico extremo (''en la extremidad más austral'').'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto no aplicable aquí porque no aparece el Tetragrámaton en el versículo.
  - '''Hijos de Judá'' se conservó en el texto principal por transparencia formal; la nota explica el valor tribal.'
  - '''Desierto de Zin'' se eligió por claridad geográfica, sin introducir ''yermo'' o ''estepa'' que podrían oscurecer el toponímico.'
  - Las notas con [a], [b] y [c] corresponden a alternativas o aclaraciones ya presentes en el aparato inglés, adaptadas al español sin añadir contenido extra.
