  yaml_path: translation/ot/2_samuel/020/012.yaml
  text: Now Amasa was wallowing in blood in the middle of the highway. When the man saw that all the people were stopping[a], he moved Amasa from the highway into the field and threw a garment over him, because he saw that everyone who came upon him stopped.
  footnotes:
