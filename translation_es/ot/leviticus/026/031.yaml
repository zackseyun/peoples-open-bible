translation:
  language: es
  text: Y haré de sus ciudades una ruina[a], y asolaré sus santuarios, y no oleré el aroma grato de sus ofrendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «no oleré su aroma grato». La frase es un modismo sacrificial estándar que indica que Dios no acepta la ofrenda; «de sus ofrendas» se añade para claridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will make
  chosen_spanish: Y pondré
  alternatives_spanish:
  - Y haré
  - Y dejaré
  - Y estableceré
  lexicon: HALOT
  rationale: נתן literalmente significa 'dar/poner'; con el complemento 'sus ciudades' y el predicativo 'ruina', el sentido en español debe expresar una acción causativa natural. 'Pondré' conserva mejor la construcción básica sin perder la fuerza de causar el estado de ruina.
- source_word: עָרֵיכֶם
  english_pob_choice: your cities
  chosen_spanish: sus ciudades
  alternatives_spanish:
  - sus pueblos
  - sus urbes
  lexicon: HALOT
  rationale: עיר designa una ciudad o poblado; 'ciudades' es la equivalencia más directa y comprensible en español bíblico moderno.
- source_word: חָרְבָּה
  english_pob_choice: a ruin
  chosen_spanish: en ruina
  alternatives_spanish:
  - en ruina total
  - en desolación
  - en desperdicio
  lexicon: HALOT
  rationale: El sustantivo describe un estado devastado. En español, la construcción 'poner en ruina' comunica bien el resultado del verbo hebreo y evita una formulación demasiado abstracta.
- source_word: וַהֲשִׁמּוֹתִי
  english_pob_choice: and I will lay waste
  chosen_spanish: y asolaré
  alternatives_spanish:
  - y devastaré
  - y desolaré
  - y arrasaré
  lexicon: HALOT
  rationale: El hifil de שמם expresa hacer desolado. 'Asolar' es un verbo bíblico y actual a la vez, suficientemente fuerte y muy cercano al valor causativo del hebreo.
- source_word: מִקְדְּשֵׁיכֶם
  english_pob_choice: your sanctuaries
  chosen_spanish: sus santuarios
  alternatives_spanish:
  - sus lugares santos
  - sus lugares sagrados
  lexicon: HALOT
  rationale: El plural de מקדש apunta a espacios cultuales/sagrados. 'Santuarios' preserva ese sentido técnico mejor que una expresión más general.
- source_word: וְלֹא אָרִיחַ
  english_pob_choice: and I will not smell
  chosen_spanish: y no oleré
  alternatives_spanish:
  - y no percibiré
  - y no aspiraré
  lexicon: HALOT
  rationale: ריח en esta forma verbal significa literalmente 'oler'. Se mantiene el verbo sensorial para conservar la imagen antropomórfica e idiomática del hebreo, en lugar de reemplazarla por una interpretación como 'aceptar'.
- source_word: בְּרֵיחַ נִיחֹחֲכֶם
  english_pob_choice: the pleasing aroma of your offerings
  chosen_spanish: el aroma grato de sus ofrendas
  alternatives_spanish:
  - el olor grato de sus ofrendas
  - el aroma agradable de sus sacrificios
  - su aroma grato
  lexicon: HALOT
  rationale: La expresión ריח ניחח es una fórmula sacrificial fija. 'Aroma grato' conserva el matiz cultual y literal. 'De sus ofrendas' explicita el referente sacrificial que en hebreo está implícito en la fórmula y en el contexto, como hizo la versión inglesa POB.
theological_decisions:
- issue: Si la última cláusula debe interpretarse como rechazo sacrificial o conservar lenguaje sensorial literal
  english_pob_reading: Retain the anthropomorphic language 'I will not smell the pleasing aroma of your offerings'
  chosen_spanish_reading: 'Conservar el lenguaje antropomórfico: ''no oleré el aroma grato de sus ofrendas'''
  alternative_spanish_readings:
  - no aceptaré el aroma grato de sus ofrendas
  - no tendré en cuenta sus ofrendas
  - no me agradará el aroma de sus ofrendas
  rationale: El hebreo usa explícitamente el verbo 'oler' junto con la fórmula sacrificial tradicional. Mantener esa imagen conserva la textura cultual y teológica del texto; el sentido de rechazo se deja implícito sin sustituirlo por una paráfrasis interpretativa que atenúe la literalidad del original.
  doctrine_reference: Principio de primacía del idioma original y preservación de la tensión teológica sin resolverla por traducción
- issue: Cómo reflejar el plural de 'sanctuaries' en un contexto legal-cultual
  english_pob_reading: your sanctuaries
  chosen_spanish_reading: sus santuarios
  alternative_spanish_readings:
  - su santuario
  - sus lugares santos
  rationale: El plural debe conservarse porque el hebreo utiliza un plural posesivo. En español, 'santuarios' mantiene la amplitud cultual sin forzar una singularización que no está en el texto.
  doctrine_reference: Respeto a la forma gramatical y semántica del original
- issue: Si 'of your offerings' debe explicitarse o dejarse implícito
  english_pob_reading: '''of your offerings'' is supplied for clarity'
  chosen_spanish_reading: '''de sus ofrendas'' se explicita para claridad'
  alternative_spanish_readings:
  - de ustedes
  - de sus sacrificios
  - de su aroma grato
  rationale: La fórmula hebrea puede sonar ambigua en español si se deja literalmente 'su aroma grato'. Añadir 'de sus ofrendas' evita que parezca una cualidad de las personas y mantiene la referencia sacrificial prevista por el contexto y por la POB inglesa.
  doctrine_reference: Clarificación referencial sin sobreinterpretación
translation_notes:
  revision_awareness: 'Coincide con el tramo revisado más reciente: no se registraron cambios aplicados y la evaluación cruzada indica alto acuerdo. La redacción española sigue la decisión inglesa de preservar el verbo sensorial final y explicitar el referente sacrificial por claridad.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no porque no aparezca en este versículo, sino por la norma general del proyecto cuando corresponda.
  - Se usa 'santuarios' en plural para reflejar el plural hebreo.
  - Se conserva el lenguaje cultual concreto ('aroma grato', 'ofrendas') sin sustituirlo por una paráfrasis doctrinal.
  - El tono es bíblico pero en español contemporáneo, evitando calcos duros como 'oleré el olor' o 'sabor agradable'.
