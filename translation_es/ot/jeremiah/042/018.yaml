translation:
  language: es
  text: 'Porque así dice Yahvé de los ejércitos, Dios de Israel: así como mi ira y mi furor se derramaron sobre los habitantes de Jerusalén, así se derramará mi furor sobre ustedes cuando vayan a Egipto; y llegarán a ser objeto de maldición[a], de horror, de imprecación y de afrenta, y no volverán a ver este lugar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juramento de maldición»; el hebreo puede referirse a una fórmula o juramento que invoca maldición.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el nombre divino con la forma usada por defecto en el proyecto en español. No se sustituye por una convención de máscara litúrgica, porque el expediente pide transparencia textual.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de las huestes
  - de los ejércitos celestiales
  lexicon: HALOT
  rationale: El título combina bien con el nombre divino en español y conserva la idea de poder militar/cósmico sin estrecharla demasiado.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Construcción directa y natural en español para el genitivo en constructo.
- source_word: נִתַּךְ ... תִּתַּךְ
  english_pob_choice: were poured out ... will be poured out
  chosen_spanish: se derramaron ... se derramará
  alternatives_spanish:
  - fueron derramadas ... será derramada
  - se descargaron ... se descargará
  lexicon: HALOT
  rationale: «Derramar» preserva la metáfora de líquido descargado aplicada a la ira/furor y permite mantener el paralelo pasado/futuro del hebreo.
- source_word: אַפִּי
  english_pob_choice: my anger
  chosen_spanish: mi ira
  alternatives_spanish:
  - mi enojo
  - mi nariz
  lexicon: HALOT
  rationale: En español, «ira» comunica mejor el matiz idiomático divino y funciona en paralelo con «furor». Se evita la literalidad de «nariz», que no sería transparente para el lector.
- source_word: וַחֲמָתִי
  english_pob_choice: my wrath
  chosen_spanish: mi furor
  alternatives_spanish:
  - mi ira
  - mi indignación
  lexicon: HALOT
  rationale: Se conserva la segunda intensidad semántica con un término distinto de «ira», para no borrar la duplicación retórica del hebreo.
- source_word: יֹשְׁבֵי יְרוּשָׁלִַם
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - los moradores de Jerusalén
  - los residentes de Jerusalén
  lexicon: HALOT
  rationale: Equivalente idiomático exacto y claro para el participio sustantivado.
- source_word: בְּבֹאֲכֶם מִצְרָיִם
  english_pob_choice: when you go into Egypt
  chosen_spanish: cuando entren en Egipto
  alternatives_spanish:
  - cuando vayan a Egipto
  - al entrar en Egipto
  lexicon: HALOT
  rationale: Se mantiene la relación temporal de la construcción hebrea con un español natural. «Entren» refleja el movimiento hacia Egipto y conserva el registro solemne.
- source_word: לְאָלָה
  english_pob_choice: an object of cursing
  chosen_spanish: para maldición
  alternatives_spanish:
  - como maldición
  - para objeto de maldición
  lexicon: HALOT
  rationale: La nota inglesa reconoce la ambigüedad entre maldición y fórmula juratoria. En español, «para maldición» deja abierta esa tensión sin sobreexplicar ni perder la fuerza del contexto.
- source_word: לְשַׁמָּה
  english_pob_choice: of horror
  chosen_spanish: para horror
  alternatives_spanish:
  - para espanto
  - para desolación
  lexicon: HALOT
  rationale: «Horror» sigue el valor de reacción de asombro aterrorizado que registró la tradición auditada en inglés y encaja con la enumeración.
- source_word: לִקְלָלָה
  english_pob_choice: of curse
  chosen_spanish: para imprecación
  alternatives_spanish:
  - para maldición
  - para execración
  lexicon: HALOT
  rationale: Se diferencia de לְאָלָה para preservar la acumulación de términos afines sin volverlos idénticos. «Imprecación» recoge el acto de maldecir con mayor precisión formal.
- source_word: לְחֶרְפָּה
  english_pob_choice: of reproach
  chosen_spanish: para afrenta
  alternatives_spanish:
  - para oprobio
  - para vergüenza
  lexicon: HALOT
  rationale: «Afrenta» expresa el escarnio público y la deshonra, manteniendo un registro bíblico claro en español.
- source_word: וְלֹא תִרְאוּ עוֹד אֶת הַמָּקוֹם הַזֶּה
  english_pob_choice: and you will never again see this place
  chosen_spanish: y no verán más este lugar
  alternatives_spanish:
  - y no volverán a ver este lugar
  - y no verán de nuevo este lugar
  lexicon: HALOT
  rationale: «No verán más» comunica bien la fuerza de לֹא ... עוֹד sin añadir más de lo que el hebreo dice. Se mantiene el futuro para el tono profético.
theological_decisions:
- issue: 'Términos gemelos de juicio divino: אַף y חֲמָה'
  english_pob_reading: my anger and my wrath
  chosen_spanish_reading: mi ira y mi furor
  alternative_spanish_readings:
  - mi ira y mi ira
  - mi enojo y mi furor
  - mi cólera y mi furor
  rationale: El hebreo acumula dos términos cercanos para intensificar el juicio. Se distinguen en español para no aplanar la reiteración retórica ni borrar la progresión de intensidad.
  doctrine_reference: Judgment language in prophetic discourse; anthropomorphic idiom for divine wrath without literalizing the body-part image.
- issue: Valor de לְאָלָה en la lista final
  english_pob_reading: an object of cursing / a curse-oath
  chosen_spanish_reading: para maldición
  alternative_spanish_readings:
  - para objeto de maldición
  - para juramento de maldición
  - para fórmula de maldición
  rationale: La fuente inglesa mantiene abierta la tensión entre ‘maldición’ y ‘juramento/maldición’. En español, una formulación breve conserva esa ambigüedad sin introducir una explicación ajena al verso.
  doctrine_reference: Lexical ambiguity in curse-language; do not over-resolve where the source preserves range.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último pase revisado en inglés, pero ajusta el orden y la dicción para que el castellano suene natural sin perder el paralelismo hebreo: «se derramaron / se derramará», la serie final con cuatro miembros y la clausura negativa «no verán más». También se conserva la tensión léxica de לְאָלָה en vez de resolverla de manera demasiado específica.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «SEÑOR» para coherencia con el estándar del proyecto.
  - Se diferencia «ira» de «furor» para reflejar los dos sustantivos hebreos.
  - La lista final conserva cuatro sustantivos coordinados con «para» para reproducir la acumulación de prefijos.
  - Se usa «Egipto» sin artículo, conforme al español bíblico natural.
  - La nota al pie se ancla en «de los ejércitos» porque ese título admite una alternativa legítima sin afectar el sentido principal.
