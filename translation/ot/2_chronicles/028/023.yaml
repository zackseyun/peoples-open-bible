id: 2CH.28.23
reference: 2 Chronicles 28:23
source:
  edition: WLC
  text: וַ/יִּזְבַּ֗ח לֵֽ/אלֹהֵ֣י דַרְמֶשֶׂק֮ הַ/מַּכִּ֣ים בּ/וֹ֒ וַ/יֹּ֗אמֶר כִּ֠י אֱלֹהֵ֤י מַלְכֵֽי אֲרָם֙ הֵ֚ם מַעְזְרִ֣ים אוֹתָ֔/ם לָ/הֶ֥ם אֲזַבֵּ֖חַ וְ/יַעְזְר֑וּ/נִי וְ/הֵ֛ם הָֽיוּ ל֥/וֹ לְ/הַכְשִׁיל֖/וֹ וּ/לְ/כָל יִשְׂרָאֵֽל־־־׃
translation:
  text: And he sacrificed to the gods of Damascus that had struck him[a], and he said, “Because the gods of the kings of Aram help them, I will sacrifice to them[c][b], so that they may help me.” But they became the downfall of him and of all Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that were defeating him.' The Hebrew participle may be rendered as ongoing or characteristic action.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the gods of the kings of Aram,' preserving the plural 'kings.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and they were for his ruin and for all Israel.' The Hebrew literally says 'they were to him for causing him to stumble, and to all Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבַּח
  chosen: he sacrificed
  alternatives:
  - he offered sacrifices
  lexicon: HALOT
  rationale: The verb זבח denotes offering a sacrifice. 'He sacrificed' is concise and natural English while preserving the cultic action.
- source_word: לֵאלֹהֵי דַרְמֶשֶׂק
  chosen: to the gods of Damascus
  alternatives:
  - to the gods of Dammesek
  - to the god(s) of Damascus
  lexicon: HALOT
  rationale: אֱלֹהֵי is plural construct and in this idolatrous context is best rendered 'gods.' 'Damascus' is the standard English transliteration of the place name.
- source_word: הַמַּכִּים בּוֹ
  chosen: that had struck him
  alternatives:
  - who were striking him
  - that were defeating him
  lexicon: HALOT
  rationale: 'The participle with article functions attributively, describing the gods as those associated with striking him. English past perfect fits the narrative sense: these are the gods of Damascus, the ones that had struck him through Aram''s victory.'
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  - Surely
  lexicon: HALOT
  rationale: Introduces Ahaz's rationale for his action. 'Because' makes the causal logic explicit in idiomatic English.
- source_word: אֱלֹהֵי מַלְכֵי אֲרָם
  chosen: the gods of the kings of Aram
  alternatives:
  - the gods of Aram's kings
  - the gods of the king of Aram
  lexicon: HALOT
  rationale: The Hebrew has plural 'kings,' and the translation preserves that form rather than smoothing it to singular.
- source_word: מַעְזְרִים אוֹתָם
  chosen: help them
  alternatives:
  - are helping them
  - give them help
  lexicon: HALOT
  rationale: The participle expresses characteristic or ongoing action. Simple present 'help them' is idiomatic in English and conveys Ahaz's reasoning.
- source_word: לָהֶם אֲזַבֵּחַ
  chosen: I will sacrifice to them
  alternatives:
  - to them I will sacrifice
  lexicon: HALOT
  rationale: Preserves the future/intention sense of the imperfect and keeps the dative pronoun explicit.
- source_word: וְיַעְזְרוּנִי
  chosen: so that they may help me
  alternatives:
  - and they will help me
  - that they might help me
  lexicon: HALOT
  rationale: Following the volitional logic of Ahaz's statement, this is best rendered as purpose/result rather than a flat prediction. 'So that they may help me' captures his intent.
- source_word: וְהֵם הָיוּ לוֹ לְהַכְשִׁילוֹ
  chosen: But they became the downfall of him
  alternatives:
  - and they were for his ruin
  - and they caused him to stumble
  - and they became a stumbling block to him
  lexicon: HALOT
  rationale: הכשיל in the Hiphil means cause to stumble, bring to ruin. In this historical judgment context, 'became the downfall of him' communicates the result clearly and forcefully. 'But' brings out the adversative sense in context, though the Hebrew conjunction is simply waw.
- source_word: וּלְכָל יִשְׂרָאֵל
  chosen: and of all Israel
  alternatives:
  - and to all Israel
  lexicon: HALOT
  rationale: The phrase is coordinated with the previous clause and shares the sense of ruin/downfall. 'Of all Israel' reads naturally with 'the downfall of him and of all Israel.'
