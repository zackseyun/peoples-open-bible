translation:
  language: es
  text: Entonces los hombres de Judá[a] lanzaron un grito; y cuando los hombres de Judá gritaron, Dios hirió a Jeroboam y a todo Israel delante de Abías y Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hombres de Judá» traduce el colectivo hebreo אִישׁ יְהוּדָה; aunque la forma es singular, el contexto y el verbo plural exigen un sentido grupal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרִיעוּ
  english_pob_choice: raised a shout
  chosen_spanish: levantaron un grito
  alternatives_spanish:
  - alzaron un clamor
  - dieron un grito de guerra
  - gritaron
  lexicon: HALOT
  rationale: El verbo hebreo comunica la acción de emitir un gran grito, con posible matiz bélico. «Levantaron un grito» conserva el dinamismo y el tono de batalla sin forzar una frase demasiado interpretativa como «grito de guerra».},{
theological_decisions:
- issue: Agencia divina en el resultado de la batalla
  english_pob_reading: God struck Jeroboam and all Israel before Abijah and Judah
  chosen_spanish_reading: Dios hirió a Jeroboam y a todo Israel delante de Abías y Judá
  alternative_spanish_readings:
  - Judá derrotó a Jeroboam y a todo Israel
  - Dios permitió que Judá venciera a Jeroboam y a todo Israel
  rationale: El hebreo pone a Dios como sujeto de נָגַף, por lo que la traducción mantiene explícita la acción divina. «Hirió» reproduce mejor el golpe directo del verbo que una paráfrasis de victoria militar.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «struck down» a «struck» para reflejar con mayor literalidad נָגַף; la española sigue esa línea con «hirió», evitando añadir «derrotó» como interpretación principal.
  spanish_consistency_notes:
  - Se mantiene «Dios» para וְהָאֱלֹהִים, como en el contexto narrativo de intervención divina.
  - «Abías» conserva la forma habitual española del nombre propio.
  - «Judá» se usa como colectivo territorial/nacional según el paralelismo hebreo y la pauta del POB en inglés.
