translation:
  language: es
  text: 'Y dijo[a]: «Si Yahvé no te ayuda, ¿de dónde podré ayudarte yo? ¿De la era o del lagar?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si Yahvé no te salva, ¿de dónde podré salvarte yo?». El verbo hebreo en ambas cláusulas puede significar ayudar, salvar o librar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Y habló
  lexicon: HALOT
  rationale: El hebreo avanza la narración con una forma consecutiva simple. En español, «Y dijo» conserva el flujo narrativo breve y natural sin añadir énfasis no presente en el texto.
- source_word: אַל
  english_pob_choice: If ... does not
  chosen_spanish: Si ... no
  alternatives_spanish:
  - 'No'
  - A menos que
  lexicon: HALOT
  rationale: En este giro idiomático, la partícula funciona como premisa condicional o retórica; por eso «Si ... no» reproduce mejor el sentido que una negación aislada.
- source_word: יוֹשִׁעֵךְ / אֹשִׁיעֵךְ
  english_pob_choice: help you / help you
  chosen_spanish: te ayuda / ayudarte
  alternatives_spanish:
  - te salva / salvarte
  - te libra / librarte
  lexicon: HALOT
  rationale: El verbo ישׁע puede significar ayudar, salvar o librar. Aquí el contexto es la imposibilidad práctica de socorro en una hambruna, así que «ayudar» es la opción más natural en español y mantiene el paralelismo de las dos cláusulas.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton, de acuerdo con la política del proyecto. «Yahvé» es la forma española coherente con esa decisión y evita la sustitución por un título.
- source_word: מֵאַיִן
  english_pob_choice: from where
  chosen_spanish: ¿de dónde
  alternatives_spanish:
  - ¿desde dónde?
  - ¿de qué fuente?
  lexicon: HALOT
  rationale: La pregunta busca origen o fuente. «¿De dónde» es el equivalente español más claro y natural, manteniendo la fuerza retórica.
- source_word: הֲמִן הַגֹּרֶן
  english_pob_choice: From the threshing floor
  chosen_spanish: ¿Del era
  alternatives_spanish:
  - ¿De la era
  - ¿Del piso de trillar
  lexicon: HALOT
  rationale: גֹּרֶן designa el lugar de trilla, no una noción abstracta. «Era» es el término tradicional y preciso en español bíblico; se conserva la referencia concreta a un lugar del que podría provenir alimento.
- source_word: הַיָּקֶב
  english_pob_choice: the winepress
  chosen_spanish: del lagar
  alternatives_spanish:
  - de la prensa
  - del estanque de vino
  lexicon: HALOT
  rationale: יָקֶב se refiere al lagar o prensa de vino. «Lagar» es el equivalente español más asentado y concreto, y hace buen par con «era» como fuentes de provisión agrícola.
theological_decisions:
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del POB en español debe reflejar el nombre propio divino, no sustituirlo por un título. «Yahvé» mantiene la decisión teológica y audit trail del original inglés, con una forma idiomática para español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido del verbo ישׁע en un contexto de escasez
  english_pob_reading: help / save / deliver
  chosen_spanish_reading: ayuda
  alternative_spanish_readings:
  - salva
  - libra
  rationale: En esta escena el rey habla de recursos imposibles en una hambruna; el matiz principal es el socorro práctico. «Ayuda» conserva el campo semántico amplio sin forzar un lenguaje de salvación espiritual que el contexto no exige.
  doctrine_reference: HALOT; contexto narrativo de 2 Reyes 6:27
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la elección condicional de אַל, el valor semántico amplio de ישׁע, y la transliteración doctrinal del nombre divino. La formulación española mantiene el paralelismo y no introduce explicaciones ajenas al versículo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme a la política del proyecto.
  - «Ayudar» se emplea para reflejar el sentido amplio de ישׁע en este contexto de provisión material.
  - «Era» y «lagar» conservan el paralelismo agrícola del hebreo sin expansión interpretativa.
