translation:
  language: es
  text: Entonces los descendientes de Israel se separaron de todos los extranjeros[a], y se pusieron de pie y confesaron sus pecados y las iniquidades de sus padres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la semilla de Israel» o «la descendencia de Israel».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «las iniquidades de sus padres»; esto puede referirse a un reconocimiento corporativo de faltas ancestrales.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּבָּדְלוּ
  english_pob_choice: separated themselves
  chosen_spanish: se separaron
  alternatives_spanish:
  - se apartaron
  - se separaron por sí mismos
  - se pusieron aparte
  lexicon: HALOT
  rationale: El nifal de בדל aquí expresa una separación deliberada del pueblo; en español, «se separaron» comunica con naturalidad tanto la acción como el matiz reflexivo sin añadir más de lo que el hebreo permite.
- source_word: זֶרַע יִשְׂרָאֵל
  english_pob_choice: the offspring of Israel
  chosen_spanish: los descendientes de Israel
  alternatives_spanish:
  - la descendencia de Israel
  - la semilla de Israel
  - los hijos de Israel
  lexicon: HALOT
  rationale: זֶרַע conserva la idea de linaje/descentencia. «Descendientes» es una equivalencia clara en español y mantiene el sentido genealógico sin sonar forzado como «semilla».
- source_word: מִכֹּל בְּנֵי נֵכָר
  english_pob_choice: from all foreigners
  chosen_spanish: de todos los extranjeros
  alternatives_spanish:
  - de todos los pueblos extranjeros
  - de todos los de origen extranjero
  - de todos los hijos de tierra extraña
  lexicon: HALOT
  rationale: La expresión idiomática בְּנֵי נֵכָר se refiere a extranjeros, no a hijos en sentido literal. «Extranjeros» es la forma más natural en español y conserva la separación étnico-covenantal del contexto.
- source_word: וַיַּעַמְדוּ
  english_pob_choice: they stood
  chosen_spanish: se pusieron de pie
  alternatives_spanish:
  - estuvieron de pie
  - tomaron postura
  - se mantuvieron de pie
  lexicon: HALOT
  rationale: El hebreo describe la postura acompañante de la confesión. En español, «se pusieron de pie» es idiomático y concreto, y comunica la acción corporal sin sobrerinterpretarla.
- source_word: וַיִּתְוַדּוּ
  english_pob_choice: confessed
  chosen_spanish: confesaron
  alternatives_spanish:
  - hicieron confesión
  - se confesaron
  - confesaron abiertamente
  lexicon: HALOT
  rationale: El hitpael de ידה en este contexto significa confesar. «Confesaron» reproduce de modo directo la acción verbal sin añadir explicaciones de manera o intensidad.
- source_word: חַטֹּאתֵיהֶם
  english_pob_choice: their sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - sus faltas
  - sus ofensas
  lexicon: HALOT
  rationale: חטאת en plural designa pecados. «Pecados» es el equivalente más claro y estable en español e identifica correctamente la culpa confesada.
- source_word: עֲוֺנוֹת אֲבֹתֵיהֶם
  english_pob_choice: the iniquities of their fathers
  chosen_spanish: las iniquidades de sus padres
  alternatives_spanish:
  - las culpas de sus padres
  - los pecados de sus padres
  - la iniquidad de sus padres
  lexicon: HALOT
  rationale: עון puede expresar iniquidad, culpa o responsabilidad moral. «Iniquidades» preserva la distinción léxica frente a «pecados» y mantiene el peso moral del hebreo, en línea con la lectura auditada de la POB.
theological_decisions:
- issue: Confesión corporativa que incluye pecado propio y el de los padres
  english_pob_reading: the people confessed both their own sins and the iniquities of their fathers
  chosen_spanish_reading: el pueblo confesó sus propios pecados y las iniquidades de sus padres
  alternative_spanish_readings:
  - el pueblo reconoció solo las consecuencias de la culpa de sus padres
  - la frase alude únicamente a una memoria histórica, no a confesión
  rationale: La sintaxis hebrea coordina dos objetos de la confesión. La traducción mantiene esa confesión corporativa sin resolver la tensión teológica sobre culpabilidad heredada; simplemente deja que el texto diga que se confesaron también las iniquidades de sus padres.
  doctrine_reference: Preservar la tensión teológica sin imponer una doctrina que el versículo no formula explícitamente.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado auditado coincide con el texto fuente y con la evaluación de alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» donde no aplica en este versículo, por no aparecer el nombre divino en el hebreo.
  - Se evitó «Cristo»/«Mesías» porque el versículo no contiene esa referencia.
  - Se conservó el paralelismo entre «pecados» e «iniquidades» para no neutralizar la distinción léxica del hebreo.
  - La frase «se pusieron de pie» traduce el gesto físico de עמד sin convertirlo en un modismo interpretativo.
