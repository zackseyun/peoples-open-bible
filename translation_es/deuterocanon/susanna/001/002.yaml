lexical_decisions:
- source_word: ἔλαβε
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se casó con
  - tomó por esposa
  lexicon: BDAG
  rationale: El griego literalmente dice 'tomó'; en contexto matrimonial, puede significar 'tomó como esposa' o 'se casó con'. 'Tomó' conserva la forma del original, y la expresión inmediata 'por esposa' aclara el sentido matrimonial sin perder la concisión griega.
- source_word: γυναῖκα
  english_pob_choice: a wife
  chosen_spanish: por esposa
  alternatives_spanish:
  - una mujer
  - una esposa
  lexicon: BDAG
  rationale: Aquí γυναῖκα señala el estado matrimonial, no solo 'mujer'. 'Por esposa' comunica el valor relacional y evita la ambigüedad de 'una mujer' en español.
- source_word: ᾗ ὄνομα Σουσάννα
  english_pob_choice: whose name was Susanna
  chosen_spanish: llamada Susana
  alternatives_spanish:
  - cuyo nombre era Susana
  - nombrada Susana
  lexicon: BDAG
  rationale: La construcción relativa griega identifica a la mujer por su nombre. En español, 'llamada Susana' suena natural y conserva el dato identificatorio sin sobrecargar la frase.
- source_word: θυγάτηρ Χελκίου
  english_pob_choice: the daughter of Hilkiah
  chosen_spanish: hija de Helcías
  alternatives_spanish:
  - hija de Hilcías
  - hija de Chelcías
  lexicon: BDAG
  rationale: Es un patronímico directo. 'Helcías' sigue la transliteración tradicional en español bíblico para este nombre, con una forma inteligible y estable.
- source_word: καλή
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bella
  - bonita
  - de hermosa apariencia
  lexicon: BDAG
  rationale: καλή describe aquí atractivo físico. 'Hermosa' es natural en español bíblico moderno y refleja bien el matiz elogioso del griego.
translation_notes:
  revision_awareness: 'El texto griego es breve y altamente comprimido; el inglés POB mantuvo ''took a wife'' para preservar esa compacidad, con nota de alternativa idiomática. La versión española sigue el mismo equilibrio: conserva la secuencia verbal del original (''tomó'') y explicita el sentido matrimonial (''por esposa'') sin añadir contenido no respaldado.'
  spanish_consistency_notes:
  - Se mantiene 'Susana' como forma bíblica estándar en español.
  - Se usa 'Helcías' para el nombre propio siguiendo transliteración tradicional española.
  - La puntuación final con coma refleja la apertura de la cláusula y la continuidad descriptiva del verso.
