translation:
  language: es
  text: Nebuzaradán, el capitán de la guardia[a], los tomó y los llevó al rey de Babilonia en Ribla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «jefe de los matadores/degolladores»; probablemente un título militar o de seguridad real, tradicionalmente vertido como «capitán de la guardia».
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: los llevó
  alternatives_spanish:
  - los tomó
  - los apresó
  lexicon: HALOT
  rationale: En este contexto narrativo, לקח expresa la acción de tomar/trasladar a personas ya bajo control. En español, «los llevó» comunica mejor el movimiento resultante sin añadir la fuerza de «apresó» ni la ambigüedad de «los tomó».
- source_word: נְבוּזַרְאֲדָן
  english_pob_choice: Nebuzaradan
  chosen_spanish: Nebuzaradán
  alternatives_spanish:
  - Nebuzaradán
  lexicon: Transliteración estándar
  rationale: Se conserva el nombre propio con acento gráfico español para la pronunciación natural en español, sin alterar la forma básica del nombre.
- source_word: רַב טַבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el jefe de los verdugos
  - el capitán de la escolta
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «jefe de los matadores/degolladores», pero en el contexto neo-babilónico designa un cargo oficial. «Capitán de la guardia» conserva la función administrativa y militar que documenta la POB inglesa, sin forzar una traducción demasiado literal.
- source_word: וַיֹּלֶךְ
  english_pob_choice: brought
  chosen_spanish: los llevó
  alternatives_spanish:
  - los condujo
  - los trajo
  lexicon: HALOT
  rationale: El verbo causativo de הלך, con objeto directo y destino, se expresa naturalmente en español con «llevar» o «conducir». Se prefirió «los llevó» por su claridad y cercanía al movimiento hacia el destino indicado.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: ante
  alternatives_spanish:
  - a
  - delante de
  lexicon: HALOT
  rationale: Aquí על funciona idiomáticamente como acceso a la presencia de una autoridad. «Ante» preserva mejor la matiz de comparecencia/jurídico-audiencial que el inglés POB resguardó con la nota «before».
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey babilónico
  lexicon: HALOT
  rationale: Se mantiene la construcción nominal directa y natural en español, sin convertirla en adjetivo étnico, para conservar la referencia histórica concreta.
- source_word: רִבְלָתָה
  english_pob_choice: at Riblah
  chosen_spanish: en Ribla
  alternatives_spanish:
  - a Ribla
  - en Riblatá
  lexicon: Topónimo bíblico
  rationale: El lugar se expresa con la forma española habitual del topónimo, «Ribla». La preposición «en» refleja bien la localización del rey al momento de la comparecencia.
theological_decisions:
- issue: Movimiento hacia la presencia del rey vs. simple destino geográfico
  english_pob_reading: brought them to the king of Babylon at Riblah; footnote preserves 'before the king of Babylon at Riblah'
  chosen_spanish_reading: los llevó ante el rey de Babilonia, en Ribla
  alternative_spanish_readings:
  - los llevó a el rey de Babilonia en Ribla
  - los condujo al rey de Babilonia en Ribla
  rationale: El hebreo על con un destinatario personal suele implicar comparecencia ante una autoridad. «Ante» mantiene esa lectura, mientras «en Ribla» sitúa el escenario sin diluir el componente judicial/audiencial.
  doctrine_reference: Uso narrativo y jurídico del hebreo bíblico; no implica una afirmación doctrinal específica.
translation_notes:
  revision_awareness: La revisión más reciente del inglés indicó que no había cambios necesarios y el cotejo final mostró alta concordancia; por eso el español sigue de cerca la lectura auditada, conservando la nota alternativa sobre el matiz de comparecencia ante el rey.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo exige; este versículo no contiene el nombre divino.
  - Se mantiene «el rey de Babilonia» como giro histórico directo, coherente con el POB inglés.
  - «Ante» en la frase verbal responde a la nota inglesa 'before' y evita perder el matiz de audiencia ante autoridad.
  - La puntuación española y el acento de Nebuzaradán/Ribla se ajustan al uso editorial en español.
