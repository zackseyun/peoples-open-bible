id: ACT.13.41
reference: Acts 13:41
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἴδετε, οἱ καταφρονηταί, καὶ θαυμάσατε καὶ ἀφανίσθητε, ὅτι ἔργον ⸂ἐργάζομαι ἐγὼ⸃ ἐν ταῖς ἡμέραις ὑμῶν, ⸀ἔργον ὃ οὐ μὴ πιστεύσητε ἐάν τις ἐκδιηγῆται ὑμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/013/041.yaml
  text: Look[a], you scoffers, and marvel, and perish; for I am doing a work in your days[c][b], a work that you will certainly not believe if someone tells it to you.
  footnotes:
  - marker: a
    text: Or 'despisers.' The Greek term can denote those who treat something with contempt; 'scoffers' brings out the derisive force in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'vanish' or 'be destroyed.' The quotation echoes Habakkuk 1:5 in Greek and carries a strong warning of ruin.
    reason: alternative_reading
  - marker: c
    text: The verb can mean 'recount fully' or 'tell in detail.'
    reason: lexical_alternative
translation:
  language: ko
  text: 「보라, 너희 비웃는 자들아, 놀라며 멸망하여라. 내가 너희 시대에 한 일을 행하노니, 그것은 누가 너희에게 자세히 말해 주어도 너희가 결코 믿지 않을 일이다.」」
  philosophy: optimal-equivalence
theological_decisions:
- issue: 하박국 1:5 LXX 인용 — 심판 예고의 무게
  chosen_reading: 보라, 너희 비웃는 자들아, 놀라며 멸망하여라. 내가 너희 시대에 한 일을 행하노니, 그것은 누가 너희에게 자세히 말해 주어도 너희가 결코 믿지 않을 일이다.
  alternative_readings:
  - 보라 멸시하는 자들아 너희는 놀라고 멸망하라…
  rationale: LXX 하박국 1:5(MT의 「열방을 보라」가 LXX에서 「멸시하는 자들아」로 바뀐 본문)을 인용하며, ἀφανίσθητε의 명령형(「멸망하여라」)을 누그러뜨리지 않고 직역해 심판 선언의 무게를 보존한다.
  doctrine_reference: 'DOCTRINE.md: OT citation; prophetic-judgment cadence'
