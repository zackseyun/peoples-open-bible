revisions:
- from: Cuando vayan[a], llegarán a un pueblo seguro, y la tierra es ancha[b]; porque Dios la ha entregado en su mano, un lugar donde no falta nada de todo lo que hay en la tierra.
  to: Cuando lleguen[a], llegarán a un pueblo seguro, y la tierra es amplia[b]; porque Dios la ha entregado en sus manos, un lugar donde no falta nada de todo lo que hay en la tierra.
  rationale: Se corrige el giro no idiomático «en su mano» a «en sus manos», que es la forma natural y fiel en español para בְּיֶדְכֶם. También se mejora la entrada temporal a «Cuando lleguen» para reflejar mejor el valor de llegada del hebreo, y se ajusta «ancha» a «amplia» por mayor naturalidad sin alterar el sentido.
