translation:
  language: es
  text: Entonces Yahvé hizo venir contra ellos a los jefes del ejército del rey de Asiria, y capturaron a Manasés con ganchos[a], lo ataron con cadenas de bronce y lo llevaron a Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con un gancho»; el término hebreo puede denotar ganchos o espinas, y algunos lo entienden de manera más general como una sujeción colocada sobre un cautivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como transliteración reverente y auditable, siguiendo el criterio del POB en inglés. «Yahvé» evita la sustitución por un título y es la forma preferida en el proyecto en español.
- source_word: וַיָּבֵא
  english_pob_choice: brought against them
  chosen_spanish: hizo venir contra ellos
  alternatives_spanish:
  - trajo contra ellos
  - hizo venir sobre ellos
  lexicon: HALOT
  rationale: 'El hiphil de בוא expresa acción causativa: hacer venir. «Hizo venir contra ellos» conserva la causatividad y la hostilidad del contexto militar sin perder naturalidad en español.'
- source_word: עֲלֵיהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - contra ellos mismos
  lexicon: HALOT
  rationale: En contexto bélico, עַל adquiere sentido adversativo. «Contra ellos» reproduce bien la fuerza hostil que el inglés POB expresó con «against them».
- source_word: שָׂרֵי הַצָּבָא
  english_pob_choice: the commanders of the army
  chosen_spanish: los jefes del ejército
  alternatives_spanish:
  - los comandantes del ejército
  - los capitanes del ejército
  lexicon: HALOT
  rationale: שָׂרִים son dirigentes o jefes; en este contexto militar, «jefes» comunica la función de mando con claridad. «Ejército» corresponde a הַצָּבָא en español bíblico comprensible.
- source_word: אֲשֶׁר לְמֶלֶךְ אַשּׁוּר
  english_pob_choice: of the king of Assyria
  chosen_spanish: del rey de Asiria
  alternatives_spanish:
  - que pertenecían al rey de Asiria
  - que servían al rey de Asiria
  lexicon: HALOT
  rationale: La frase marca pertenencia/relación. En español, el genitivo simple «del rey de Asiria» es conciso, natural y fiel al vínculo indicado por el hebreo y por el POB en inglés.
- source_word: וַיִּלְכְּדוּ
  english_pob_choice: captured
  chosen_spanish: capturaron
  alternatives_spanish:
  - aprendieron
  - tomaron prisionero
  lexicon: HALOT
  rationale: לכד es capturar o apresar en contexto militar. «Capturaron» mantiene la fuerza del verbo sin añadir matices no presentes.
- source_word: בַּחֹחִים
  english_pob_choice: with hooks
  chosen_spanish: con ganchos
  alternatives_spanish:
  - con ganchos
  - con un gancho
  - con espinas
  lexicon: HALOT
  rationale: El término puede referirse a ganchos, y el POB en inglés preserva esa imagen concreta con una nota alternativa. En español, «ganchos» es una opción clara y literal que mantiene la tensión léxica; la nota recoge la posibilidad de una lectura más general o distinta.
- source_word: וַיַּאַסְרֻהוּ
  english_pob_choice: bound him
  chosen_spanish: lo ataron
  alternatives_spanish:
  - lo sujetaron
  - lo encadenaron
  lexicon: HALOT
  rationale: אסר significa atar, sujetar o aprisionar. Aquí la acción inmediata se concreta en las «cadenas de bronce», por lo que «lo ataron» expresa bien el acto de inmovilizarlo.
- source_word: בַּנְחֻשְׁתַּיִם
  english_pob_choice: with bronze chains
  chosen_spanish: con cadenas de bronce
  alternatives_spanish:
  - con grilletes de bronce
  - con cadenas de cobre
  lexicon: HALOT
  rationale: La forma dual/plural señala un tipo de sujeción metálica. «Cadenas de bronce» conserva el material y resulta idiomático en español; se evita «latón» porque no refleja con fidelidad la base léxica tradicional del texto.
- source_word: וַיּוֹלִיכֻהוּ
  english_pob_choice: took him
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo trajeron
  lexicon: HALOT
  rationale: El verbo en hiphil implica hacer ir o conducir. En una transferencia de cautivo, «lo llevaron» es natural en español y conserva el movimiento forzado hacia el destino final.
- source_word: בָּבֶלָה
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hacia Babilonia
  - hasta Babilonia
  lexicon: HALOT
  rationale: La terminación direccional indica movimiento hacia un lugar. «A Babilonia» es la forma más natural y directa en español.
theological_decisions:
- issue: Agencia divina en la invasión asiria
  english_pob_reading: Yahweh brought against them the commanders of the army of the king of Assyria.
  chosen_spanish_reading: Yahvé hizo venir contra ellos a los jefes del ejército del rey de Asiria.
  alternative_spanish_readings:
  - Yahvé permitió que vinieran contra ellos los jefes del ejército del rey de Asiria
  - Yahvé trajo contra ellos a los jefes del ejército del rey de Asiria
  rationale: El hebreo atribuye la acción directamente a Yahvé mediante un verbo causativo. La traducción conserva esa afirmación explícita de juicio soberano, sin suavizarla a mera permisión.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El contexto inglés muestra acuerdo alto entre revisiones y ninguna modificación reciente en el pasaje. La versión española se alinea con ese estado estable, conservando la lectura principal y la nota alternativa sobre חֹחִים documentada en el audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se usa «Babilonia» y «Asiria» como topónimos bíblicos regulares en español.
  - «Ganchos» se conserva con nota porque el hebreo admite una alternativa semántica relevante.
  - El tono es formal y readable para uso eclesial, sin calcos innecesarios.
