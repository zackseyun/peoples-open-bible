base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/030/009.yaml
  text: On that day messengers will go out from before me in ships to terrify Cush[a], secure as she is, and trembling will come upon them on the day of Egypt, for behold[c][b], it is coming.
  footnotes:
  - marker: a
    text: Or 'envoys'; the Hebrew word can also mean 'angels,' but in this context it most likely refers to human messengers sent with news of Egypt's fall.
    reason: lexical_alternative
