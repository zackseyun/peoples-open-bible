translation:
  language: es
  text: Por favor, que se traiga un poco de agua, y lávense los pies, y recuéstense[a] bajo el árbol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «descansen». El verbo hebreo también puede significar más literalmente «inclínense» o «reclínense», aquí con la idea de descansar a la sombra como gesto de hospitalidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֻקַּח
  english_pob_choice: be brought
  chosen_spanish: que traigan
  alternatives_spanish:
  - que sea traída
  - que lleven
  lexicon: HALOT
  rationale: La forma pasiva/jusiva de לקח en un ruego de hospitalidad pide una solución natural en español. «Que traigan» conserva el sentido de solicitud y evita una pasiva pesada, mientras mantiene la referencia a que el agua sea llevada hasta allí.
- source_word: נָא
  english_pob_choice: Please let
  chosen_spanish: Por favor
  alternatives_spanish:
  - te ruego
  - por favor, pues
  lexicon: HALOT
  rationale: La partícula de ruego/politeza se expresa con un apelativo breve y natural en español. «Por favor» funciona con el tono de súplica respetuosa del contexto.
- source_word: מְעַט מַיִם
  english_pob_choice: a little water
  chosen_spanish: un poco de agua
  alternatives_spanish:
  - algo de agua
  - una poca de agua
  lexicon: HALOT
  rationale: El hebreo indica una cantidad pequeña. «Un poco de agua» es idiomático en español y preserva la modestia de la oferta.
- source_word: וְרַחֲצוּ
  english_pob_choice: and wash
  chosen_spanish: y lávense
  alternatives_spanish:
  - y laven
  - y laven sus pies
  lexicon: HALOT
  rationale: El imperativo plural en este contexto de hospitalidad se entiende como una acción que los visitantes realizan por sí mismos. En español, el reflexivo «lávense» comunica mejor esa lectura que un simple «laven».
- source_word: רַגְלֵיכֶם
  english_pob_choice: your feet
  chosen_spanish: los pies
  alternatives_spanish:
  - sus pies
  - vuestros pies
  lexicon: HALOT
  rationale: El sufijo de segunda persona plural queda implicado por el verbo reflexivo en español. «Los pies» evita redundancia y mantiene la claridad.
- source_word: וְהִשָּׁעֲנ֖וּ
  english_pob_choice: and rest yourselves
  chosen_spanish: y recuéstense
  alternatives_spanish:
  - y apóyense
  - y descansen
  lexicon: HALOT
  rationale: El niphal de שׁען significa literalmente «inclinarse/apoyarse/reclinarse». «Recuéstense» conserva el valor corporal de recostarse o reclinarse bajo sombra; «descansen» sería más interpretativo.
- source_word: תַּ֥חַת הָעֵץ
  english_pob_choice: under the tree
  chosen_spanish: bajo el árbol
  alternatives_spanish:
  - debajo del árbol
  - a la sombra del árbol
  lexicon: HALOT
  rationale: La preposición indica ubicación debajo de un árbol específico. «Bajo el árbol» es natural y fiel; «a la sombra» explicita una implicación contextual, pero añade interpretación.
translation_notes:
  revision_awareness: La traducción inglesa auditada pasó por una revisión que alternó entre «rest» y «rest yourselves» para reflejar mejor el matiz reflexivo de שׁען. En español se ha conservado ese matiz con un verbo pronominal («recuéstense») que resulta natural y mantiene la idea de apoyo/reclinación bajo el árbol.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en todo el proyecto cuando aparezca; este versículo no lo incluye.
  - Se usa un español neutral y reverente, evitando calcos innecesarios.
  - Se conserva la modestia de la oferta («un poco de agua») y el contexto de hospitalidad antigua.
  - El reflexivo español en «lávense» y «recuéstense» ayuda a reflejar la acción sobre los propios invitados, sin añadir contenido ajeno al hebreo.
