translation:
  language: es
  text: Y entonces el Señor revelará estas cosas[a], y aparecerán la gloria del Señor y la nube[b], como fue mostrado en el caso de Moisés[c], y como también lo pidió Salomón[d], para que el lugar fuera santificado grandemente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dará a conocer estas cosas». El verbo griego puede significar revelar, hacer visible o sacar a la luz.
    reason: lexical_alternative
  - marker: b
    text: «La nube» alude probablemente a la nube familiar de la presencia divina asociada con Moisés y las tradiciones del santuario.
    reason: cross_reference
  - marker: c
    text: O «como fue hecho manifiesto con Moisés». La frase griega compara esta futura manifestación con el precedente mosaico.
    reason: lexical_alternative
  - marker: d
    text: O «como también lo oró Salomón, para que el lugar fuera consagrado grandemente».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναδείξει
  english_pob_choice: will reveal
  chosen_spanish: revelará
  alternatives_spanish:
  - dará a conocer
  - manifestará
  - pondrá de manifiesto
  lexicon: LSJ
  rationale: El verbo griego puede significar revelar, dar a conocer o poner a la luz. «Revelará» conserva el valor de hacer patente algo antes oculto y suena natural en español bíblico moderno.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas
  - ellas
  lexicon: LSJ
  rationale: El demostrativo explícito se mantiene sin interpretar de más el referente. «Estas cosas» preserva la apertura referencial del griego.
- source_word: ὀφθήσεται
  english_pob_choice: will appear
  chosen_spanish: se aparecerán
  alternatives_spanish:
  - aparecerán
  - serán vistas
  - se harán visibles
  lexicon: LSJ
  rationale: El pasivo de ὁράω funciona aquí como manifestación visible. En español, el plural coordinado con «la gloria ... y la nube» se expresa mejor con «se aparecerán», manteniendo la idea de aparición pública.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - majestad
  lexicon: LSJ
  rationale: «Gloria» es el equivalente bíblico estándar y conserva la resonancia teofánica del texto griego.
- source_word: νεφέλη
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - nube
  lexicon: LSJ
  rationale: Se conserva el artículo definido implícito en el inglés POB y la referencia a la nube conocida de la tradición teofánica.
- source_word: ἐπὶ Μωσῇ
  english_pob_choice: in the case of Moses
  chosen_spanish: en el caso de Moisés
  alternatives_spanish:
  - con Moisés
  - como en Moisés
  - respecto de Moisés
  lexicon: LSJ
  rationale: La preposición ἐπί con dativo aquí marca comparación o precedente, no ubicación. «En el caso de Moisés» comunica bien el paralelo histórico sin sobreinterpretarlo.
- source_word: ἐδηλοῦτο
  english_pob_choice: it was shown
  chosen_spanish: fue mostrado
  alternatives_spanish:
  - fue manifestado
  - se dio a conocer
  - fue revelado
  lexicon: LSJ
  rationale: El imperfecto pasivo remite a una manifestación previa. «Fue mostrado» es fiel y no añade matices no explicitados por el griego.
- source_word: ἠξίωσεν
  english_pob_choice: asked
  chosen_spanish: lo pidió
  alternatives_spanish:
  - lo solicitó
  - rogó
  - pidió
  lexicon: LSJ
  rationale: El verbo puede traducirse como pedir o solicitar; en el contexto de Salomón, «lo pidió» mantiene el tono de petición sin convertirlo necesariamente en una oración explícita.
- source_word: ὁ τόπος
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - el lugar santo
  lexicon: LSJ
  rationale: El griego dice simplemente «el lugar». Se conserva la literalidad sobria y se deja que el contexto identifique el lugar del templo.
- source_word: καταγιασθῇ
  english_pob_choice: might be sanctified
  chosen_spanish: fuera santificado
  alternatives_spanish:
  - fuera consagrado
  - fuera hecho santo
  lexicon: LSJ
  rationale: «Santificar» reproduce la fuerza cultual del verbo y su registro bíblico. El subjuntivo en cláusula final se vierte naturalmente con «fuera santificado».
- source_word: μεγάλως
  english_pob_choice: greatly
  chosen_spanish: grandemente
  alternatives_spanish:
  - grandemente y mucho
  - en gran manera
  - muchísimo
  lexicon: LSJ
  rationale: El adverbio intensifica la santificación. «Grandemente» mantiene el sentido intensivo y el tono solemne del original.
theological_decisions:
- issue: Rendering of κύριος in a theophanic Greek context
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  - Dueño
  rationale: El texto griego usa κύριος, y el audit trail inglés también opta por «Lord». En español, «Señor» conserva el valor reverente sin imponer una sustitución de tetragrámaton que no está en el griego inmediato.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Theophany language linking Moses and Solomon without doctrinal expansion
  english_pob_reading: Retain the text's historical-theophanic claim without expanding it doctrinally
  chosen_spanish_reading: Conservar la comparación histórica y teofánica sin expandirla doctrinalmente
  alternative_spanish_readings:
  - Explicar la nube como símbolo solamente
  - Identificarla dogmáticamente con una presencia posterior
  rationale: La frase mantiene el paralelo con Moisés y Salomón tal como aparece en el griego. No se atenúa la tensión teofánica ni se añade una interpretación posterior que el texto no formula.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB que cambió 'disclose' por 'reveal'; por eso se eligió «revelará» como equivalente natural y formal de ἀναδείξει. También se mantuvo la comparación teofánica y cultual sin resolverla teológicamente.
  spanish_consistency_notes:
  - Se respetó el término «Señor» para κύριος, conforme al audit trail inglés y a la política de términos controvertidos.
  - «Gloria» y «nube» se conservaron como lenguaje teofánico bíblico estándar.
  - No se sustituyó «santificado» por «consagrado» para preservar el registro cultual y la cercanía al verbo griego.
  - Se evitó interpretar «el lugar» más allá del contexto inmediato, dejando abierta su identificación con el sitio del templo.
