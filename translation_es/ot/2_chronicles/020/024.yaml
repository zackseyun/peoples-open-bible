translation:
  language: es
  text: Cuando Judá llegó al mirador sobre el desierto, se volvieron hacia la multitud, y he aquí, allí había cadáveres[a] tendidos en tierra, y no había ningún sobreviviente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa más literal: «cadáveres, caídos en tierra»; el hebreo dice más literalmente «cadáveres, caídos a la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - el pueblo de Judá
  lexicon: HALOT
  rationale: Se conserva el nombre propio con valor colectivo, como en la auditoría inglesa. En español, 'Judá' es la forma natural y fiel para el conjunto de la fuerza judeana, mientras el verbo plural sigue expresando el sentido colectivo.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: El hebreo indica movimiento de llegada a un lugar concreto. 'Llegó' suena natural en español narrativo y mantiene el valor direccional sin forzar un calco con 'vino'.
- source_word: עַל הַמִּצְפֶּה לַמִּדְבָּר
  english_pob_choice: to the lookout over the wilderness
  chosen_spanish: al mirador sobre el desierto
  alternatives_spanish:
  - a la atalaya del desierto
  - al punto de observación sobre el desierto
  lexicon: HALOT
  rationale: מִצְפֶּה es un puesto de observación; 'mirador' comunica bien la función espacial en español. 'Sobre el desierto' refleja la relación topográfica del hebreo y la opción inglesa 'over the wilderness'.
- source_word: וַיִּפְנוּ
  english_pob_choice: they turned
  chosen_spanish: se volvieron
  alternatives_spanish:
  - se giraron
  - se dirigieron
  lexicon: HALOT
  rationale: El verbo פנה conserva la idea concreta de volverse físicamente. 'Se volvieron' mantiene ese giro corporal y deja claro el cambio de dirección de la mirada hacia el ejército enemigo.
- source_word: אֶל הֶהָמוֹן
  english_pob_choice: toward the multitude
  chosen_spanish: hacia la multitud
  alternatives_spanish:
  - hacia la muchedumbre
  - hacia la multitud reunida
  lexicon: HALOT
  rationale: הָמוֹן puede significar multitud, muchedumbre o masa. 'Multitud' preserva la amplitud del término sin introducir por sí solo un matiz militar que el hebreo no explicita en esta palabra.
- source_word: וְהִנָּם
  english_pob_choice: and behold, there were
  chosen_spanish: y he aquí que eran
  alternatives_spanish:
  - y he aquí, había
  - y he aquí que estaban
  lexicon: HALOT
  rationale: La partícula deíctica introduce una sorpresa visible. 'Y he aquí que' mantiene el énfasis abrupto; el verbo copulativo ayuda a enlazar naturalmente con el predicado nominal en español.
- source_word: פְּגָרִים
  english_pob_choice: corpses
  chosen_spanish: cadáveres
  alternatives_spanish:
  - cuerpos muertos
  - cuerpos sin vida
  lexicon: HALOT
  rationale: פֶּגֶר designa un cadáver o cuerpo muerto. 'Cadáveres' es una equivalencia directa, sobria y suficientemente fuerte para la escena de batalla.
- source_word: נֹפְלִים אַרְצָה
  english_pob_choice: lying on the ground
  chosen_spanish: tendidos en tierra
  alternatives_spanish:
  - caídos en tierra
  - tirados en el suelo
  lexicon: HALOT
  rationale: La construcción participial describe el estado resultante de los cuerpos. 'Tendidos en tierra' preserva la imagen de cuerpos caídos y evita debilitar el hebreo con una expresión demasiado genérica.
- source_word: וְאֵין פְּלֵיטָה
  english_pob_choice: and there was no survivor
  chosen_spanish: y no había sobreviviente
  alternatives_spanish:
  - y no quedó nadie que escapara
  - y no había escape
  lexicon: HALOT
  rationale: פְּלֵיטָה puede referir a escape o sobreviviente. En este contexto narrativo, 'sobreviviente' comunica de forma natural que no quedó nadie con vida por haber escapado, manteniendo la fuerza total del enunciado.
translation_notes:
  revision_awareness: La redacción sigue de cerca el testimonio hebreo y la auditoría inglesa, sin cambios revisados aplicados en la pasada más reciente; se mantiene la misma lectura de sentido general con ajuste natural al español.
  spanish_consistency_notes:
  - Se conserva el nombre divino no pertinente en este versículo, por lo que no hay decisión sobre Yahvé.
  - Se mantiene el tono narrativo sobrio y el registro bíblico contemporáneo.
  - La partícula de sorpresa se traduce con 'he aquí' para reflejar el impacto de la escena.
  - El sustantivo colectivo 'multitud' preserva la ambigüedad entre masa y tropa enemiga sin sobreespecificar.
