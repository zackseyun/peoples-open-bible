translation:
  language: es
  text: Y los hijos de Elifaz fueron Temán, Omar, Zefo[a], Gatam y Kenaz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas versiones leen «Zepo» en lugar de «Zefo». La vocalización masorética aquí favorece la forma «Zefo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - resultaron ser
  lexicon: HALOT
  rationale: En una lista genealógica, el verbo hebreo funciona de manera copulativa/existencial para introducir descendientes. «Fueron» comunica de forma natural esa relación de pertenencia sin sugerir desarrollo narrativo.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los hijos varones de
  - los descendientes de
  lexicon: HALOT
  rationale: El hebreo usa el constructo masculino plural. En español, «hijos de» mantiene la relación genealógica y la precisión de género mejor que una neutralización a «descendientes».
- source_word: אֱלִיפָז
  english_pob_choice: Eliphaz
  chosen_spanish: Elifaz
  alternatives_spanish:
  - Eliphaz
  lexicon: transliteración onomástica
  rationale: Se translitera el nombre propio al español bíblico común como «Elifaz», forma clara y reconocible en español; se evita una transliteración demasiado inglesa.
- source_word: תֵּימָן
  english_pob_choice: Teman
  chosen_spanish: Temán
  alternatives_spanish:
  - Teman
  lexicon: transliteración onomástica
  rationale: Nombre propio transliterado al español con acento ortográfico para reflejar la acentuación natural y facilitar la lectura.
- source_word: אוֹמָר
  english_pob_choice: Omar
  chosen_spanish: Omar
  lexicon: transliteración onomástica
  rationale: Nombre propio mantenido en su forma más reconocible en español.
- source_word: צְפוֹ
  english_pob_choice: Zepho
  chosen_spanish: Zefo
  alternatives_spanish:
  - Zepo
  - Zefo
  lexicon: HALOT / tradición de transliteración
  rationale: La tradición inglesa POB conserva «Zepho» frente a variantes como «Zepo», apoyándose en la vocalización masorética. En español, «Zefo» conserva la base consonántica y la pronunciación probable sin depender de la grafía inglesa final -pho, que sería menos natural en español.
- source_word: וְגַעְתָּם
  english_pob_choice: Gatam
  chosen_spanish: Gatam
  lexicon: transliteración onomástica
  rationale: Nombre propio transliterado de manera estándar y legible en español.
- source_word: וּקְנַז
  english_pob_choice: Kenaz
  chosen_spanish: Quenaz
  alternatives_spanish:
  - Kenaz
  - Qenaz
  lexicon: transliteración onomástica
  rationale: Se elige «Quenaz» para acomodar la ortografía española del sonido /k/ ante e, evitando una lectura inglesa de la K. Mantiene el nombre propio sin añadir interpretación.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden en una simple lista genealógica sin variantes sintácticas relevantes. La única decisión sensible es la transliteración de צְפוֹ, donde el inglés POB documenta la alternativa «Zepo» y prefiere la vocalización masorética «Zepho»; en español se refleja esa decisión como «Zefo» con nota.
  spanish_consistency_notes:
  - 'Se mantiene el orden y la estructura genealógica del hebreo: introducción con «Y», sujeto plural y lista simple de nombres.'
  - Se evita «SEÑOR» u otra terminología teológica porque el versículo no contiene lenguaje divino.
  - La forma «hijos de» conserva el masculino plural del constructo hebreo sin sobreexplicar.
  - Los nombres propios se transliteran de manera consistente y legible para español bíblico.
  - La nota al pie solo aborda la variante documentada del nombre final y no introduce especulación adicional.
