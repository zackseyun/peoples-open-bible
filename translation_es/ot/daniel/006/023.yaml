    text: Or 'his messenger.' The Aramaic term can denote either a messenger or an angel; here the miraculous context favors 'angel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'blamelessness' or 'purity was found in me before him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I did no wrong before you, O king.'
    reason: lexical_alternative
