    rationale: Aunque «inmutable» sigue la morfología visible, en contexto de ira suena antinatural en español. El inglés POB ya preserva la alternativa contextual «implacable»; usarla en el texto principal mejora fidelidad funcional y legibilidad, mientras la nota conserva la cautela textual.
  - severity: low
