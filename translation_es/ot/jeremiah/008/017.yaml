review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: כִּי como enlace causal («Porque»), הִנְנִי + participio como acción inminente («he aquí, estoy enviando»), בָּכֶם con sentido espacial («entre ustedes»), la doble referencia a serpientes venenosas («serpientes, víboras»), la incapacidad de ser encantadas, y el cierre profético «declara Yahvé». Sin embargo, el objeto de «morderán» está mal resuelto en español: אֶתְכֶם es segunda persona plural («a ustedes»), no femenino plural referido a las serpientes.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «y las morderán» introduce una discordancia de referente y crea confusión sintáctica, porque parece que las víboras morderán a otras entidades femeninas. En español neutral y natural, debe decir «y las morderán a ustedes» o mejor «y los morderán», según el público implícito. Dado que el texto ya usa «ustedes», la formulación más clara es «y las morderán a ustedes» no; eso sigue siendo incorrecto por género. La mejor reparación es «y los morderán» o «y los morderán a ustedes».
  glossary_alignment: Se alinea bien con la terminología del proyecto en «Yahvé». «Víboras» corresponde adecuadamente a צִפְעֹנִים. «Encantadas» es defendible para לָחַשׁ en contexto de encantamiento de serpientes, con nota aclaratoria útil. La única desalineación importante es pronominal y gramatical en «las morderán».
  issues:
  - severity: high
    issue: Pronombre de objeto incorrecto en «y las morderán»
    rationale: El hebreo וְנִשְּׁכוּ אֶתְכֶם significa «y los/les morderán a ustedes». El borrador usa un pronombre femenino plural que no corresponde a אֶתְכֶם y distorsiona el sentido.
  - severity: medium
    issue: La nota c justifica una lectura errónea
    rationale: La alternancia no depende de un «referente colectivo de las serpientes», sino del modo de expresar en español el objeto de segunda persona plural. La nota introduce confusión y no preserva una alternativa significativa del original.
  revised_spanish_text: Porque, he aquí, estoy enviando entre ustedes serpientes, víboras[a] que no pueden ser encantadas[b], y los morderán, declara Yahvé.
