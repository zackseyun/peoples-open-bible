translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «¿Por qué clamas a mí? Habla a los hijos de Israel[a] para que se pongan en marcha[b].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas».
    reason: lexical_alternative
  - marker: b
    text: O «para que avancen».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el principio del proyecto para el Nombre divino: transliterarlo en lugar de sustituirlo por un título. «Yahvé» conserva el nombre propio del pacto y es la forma establecida para el texto español del POB.'
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y dijo
  lexicon: HALOT
  rationale: La waw consecutiva marca avance narrativo; «Entonces» reproduce bien la secuencia en español sin perder la continuidad del relato.
- source_word: מַה תִּצְעַק אֵלַי
  english_pob_choice: Why are you crying out to me
  chosen_spanish: ¿Por qué clamas a mí?
  alternatives_spanish:
  - ¿Por qué estás clamando a mí?
  - ¿Por qué me invocas?
  lexicon: HALOT
  rationale: Aquí מַה introduce una reprensión interrogativa, por lo que «¿Por qué» es natural y fiel. צעק expresa clamar/gritar en una apelación intensa; «clamas» preserva esa fuerza mejor que una paráfrasis más débil.
- source_word: דַּבֵּר
  english_pob_choice: Tell
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Dile
  lexicon: HALOT
  rationale: Con אֶל, דבר es literalmente «hablar a». En español, «Habla a» conserva la fuerza imperativa sin sobretraducir como «manda» o «ordena».
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene el sintagma formal y covenantal del hebreo, respetando la forma masculina plural del original. «Los israelitas» sería más idiomático, pero atenúa la correspondencia léxica.
- source_word: וְיִסָּעוּ
  english_pob_choice: to set out
  chosen_spanish: para que se pongan en marcha
  alternatives_spanish:
  - para que partan
  - para que avancen
  - para que se pongan a caminar
  lexicon: HALOT
  rationale: נסע en contexto de viaje/campamento significa partir o ponerse en camino. «Se pongan en marcha» comunica bien la idea de abandonar la posición actual y comenzar el desplazamiento; también deja abierta la alternativa inglesa «to go forward» sin volverla mecánica.
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio de Dios según la política del proyecto, evitando la sustitución litúrgica por un título. Esto mantiene la distinción entre el Nombre revelado y otras designaciones divinas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Forma de בני ישראל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: El hebreo usa un plural masculino formal. En consonancia con la preferencia por conservar la forma gramatical del original cuando no exige una neutralización por claridad, se mantiene «hijos» en el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El texto sigue el paquete fuente original hebreo (WLC) y concuerda con la auditoría inglesa: se mantiene Yahvé para יְהוָה, se conserva el valor rebuking/interrogative de מַה תִּצְעַק אֵלַי con una pregunta directa en español, y se refleja נסע con una expresión natural de partida. No se requieren revisiones adicionales según el historial provisto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con el estándar del proyecto para el Tetragrammaton.
  - «Hijos de Israel» conserva la forma formal del hebreo; la alternativa idiomática queda en nota.
  - «Ponerse en marcha» es una solución natural para נסע en contexto de salida/campamento, sin perder el matiz de movimiento ordenado.
