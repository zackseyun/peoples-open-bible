translation:
  language: es
  text: Pero los que lo recogen lo comerán y alabarán a Yahvé[a]; y los que lo recolectan lo beberán en los atrios[b] de mi santuario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque los que lo recogen lo comerán». El hebreo כִּי también puede traducirse «porque» o «ciertamente»; aquí se entiende con valor adversativo por contraste con el versículo anterior.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en los patios de mi lugar santo». La expresión hebrea también puede traducirse «courtyards / patios»; se prefiere «atrios» por su naturalidad en lenguaje cultual español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Porque
  - Pues
  - Ciertamente
  lexicon: HALOT
  rationale: En contexto contrasta con la amenaza del versículo anterior, así que 'Pero' transmite mejor el giro adversativo que 'Porque'.
- source_word: מְאַסְפָיו
  english_pob_choice: those who gather it
  chosen_spanish: los que lo recogen
  alternatives_spanish:
  - los que lo juntan
  - sus recolectores
  - los que lo juntan en
  lexicon: HALOT
  rationale: El participio plural con sufijo retoma el producto agrícola. 'Recogen' es natural en español y conserva el sentido agente.
- source_word: יֹאכְלֻהוּ
  english_pob_choice: will eat it
  chosen_spanish: lo comerán
  alternatives_spanish:
  - lo comerán
  - lo comerán ellos
  - lo consumirán
  lexicon: HALOT
  rationale: El verbo básico אכל es 'comer'; el futuro español conserva el valor verbal del imperfecto hebreo en contexto.
- source_word: וְהִלְלוּ אֶת־יְהוָה
  english_pob_choice: and praise Yahweh
  chosen_spanish: y alabarán a Yahvé
  alternatives_spanish:
  - y alabarán a Yahvé
  - y alabarán a Yahweh
  - y lo alabarán a Yahvé
  lexicon: HALOT
  rationale: הלל en piel es 'alabar'. Se mantiene el nombre divino 'Yahvé' según el estándar del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton, evitando el sustituto litúrgico 'SEÑOR'.
- source_word: וּמְקַבְּצָיו
  english_pob_choice: those who collect it
  chosen_spanish: los que lo juntan
  alternatives_spanish:
  - los que lo recogen
  - sus juntadores
  - los que lo recolectan
  lexicon: HALOT
  rationale: קבץ expresa reunir/juntar; se usa 'juntan' para conservar el paralelismo con 'recogen' sin cargarlo de tecnicismo.
- source_word: יִשְׁתֻּהוּ
  english_pob_choice: will drink it
  chosen_spanish: lo beberán
  alternatives_spanish:
  - lo beberán
  - lo tomarán
  lexicon: HALOT
  rationale: שתה es 'beber'. 'Beberán' es la equivalencia directa y clara en español.
- source_word: בְּחַצְרוֹת
  english_pob_choice: in the courts
  chosen_spanish: en los atrios
  alternatives_spanish:
  - en las cortes
  - en los patios
  lexicon: HALOT
  rationale: En contexto cultual, 'atrios' es la forma más natural y clara en español para el espacio del templo.
- source_word: קָדְשִׁי
  english_pob_choice: my sanctuary
  chosen_spanish: de mi santuario
  alternatives_spanish:
  - de mi lugar santo
  - de mi lugar sagrado
  - de mi santidad
  lexicon: HALOT
  rationale: Con 'atrios', el sustantivo se entiende concretamente como el santuario/espacio santo de Yahvé. 'Santuario' conserva el valor cultual sin volverlo abstracto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se adopta la forma española establecida por el proyecto para el nombre del pacto, preservando su presencia explícita en el texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Espacio cultual de חצרות קדשי
  english_pob_reading: the courts of my sanctuary
  chosen_spanish_reading: los atrios de mi santuario
  alternative_spanish_readings:
  - los patios de mi santuario
  - los atrios de mi lugar santo
  rationale: La frase preserva la imagen del templo y evita reducir קדש a una noción abstracta. 'Atrios' comunica bien el entorno litúrgico en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el análisis cruzado indicó acuerdo alto (1.0) y no se requirieron ajustes textuales.
  spanish_consistency_notes:
  - Se mantiene un español público, claro y reverente, sin sustituir el nombre divino por una máscara litúrgica.
  - 'Se conserva el paralelismo verbal y sintáctico del hebreo: comerán / alabarán / beberán.'
  - '''Atrios'' y ''santuario'' sostienen el marco templario sin sobreexplicar el hebreo.'
  - Los sufijos pronominales se reflejan con 'lo' para el producto agrícola mencionado en el contexto inmediato.
