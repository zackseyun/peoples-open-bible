review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la estructura paralela, la literalidad de «carne», y el carácter predictivo del juicio. Sin embargo, cambia indebidamente la persona posesiva del hebreo y del inglés auditado: בְּנֵיכֶם / בְּנֹתֵיכֶם es «sus hijos / sus hijas» solo si el verbo también estuviera en tercera persona, pero el hebreo está en segunda persona plural («ustedes»). En español bíblico natural y neutral, debe conservarse la segunda persona plural posesiva: «sus propios» no corresponde; lo más fiel y legible es «sus hijos ... sus hijas» solo con «ustedes» explícito, o mejor «sus» avoided? Since verb is third plural, draft mismatches. The correct repair is to use «ustedes comerán ... de sus hijos», or preferably a voseo/plural-neutral construction? For broad neutral LatAm readability, explicit «ustedes» with third plural verb preserves the source person.'
  spanish_quality_summary: El español es claro y digno, pero presenta una inconsistencia gramatical importante entre el verbo en tercera persona plural sin sujeto expreso («comerán») y la referencia de segunda persona del original. Añadir «ustedes» resta ambigüedad y alinea el texto con la fuente sin volverlo arcaico. El resto del verso suena natural y conserva bien la dureza del pasaje.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Carne» refleja bien בָּשָׂר y evita eufemismo. El problema principal no es léxico sino de persona gramatical: el original exige segunda persona plural.'
  issues:
  - severity: high
    issue: Cambio de segunda persona plural a una forma verbal española ambigua/tercera plural
    rationale: וַאֲכַלְתֶּם y תֹּאכֵלוּ son 2mp. «Comerán» sin «ustedes» se lee naturalmente como tercera persona plural («ellos/ellas comerán»), lo que altera el destinatario de la maldición.
  - severity: medium
    issue: La decisión léxica sobre «de sus hijos» justifica insuficientemente la especificidad masculina
    rationale: Aunque «hijos» puede funcionar, la nota dice que «puede abarcar» el masculino específico; aquí conviene aclarar que, en español, «hijos» puede representar correctamente «sons» por contraste explícito con «hijas» en la cláusula siguiente.
  revised_spanish_text: Y ustedes comerán la carne de sus hijos, y comerán la carne de sus hijas.
  revision_rationale: Se añade «ustedes» para preservar explícitamente la segunda persona plural del hebreo en un español latinoamericano natural, evitando que «comerán» se entienda como tercera persona plural. Se mantiene la repetición de «comerán» y «la carne» para conservar el paralelismo y la fuerza del juicio.
