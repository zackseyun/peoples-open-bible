theological_decisions:
- issue: Portrayal of divine anger
  chosen_reading: Retained both terms for God's anger without softening or systematizing them.
  alternative_readings:
  - Collapsing both into a single term such as 'anger'
  - Reducing the language to mere human feeling
  rationale: The Hebrew uses two overlapping but distinct terms for divine displeasure. The translation preserves the intensity and poetic parallelism without importing a broader doctrinal explanation of wrath beyond what the verse states.
  doctrine_reference: Preserve theological tension rather than resolve it.
