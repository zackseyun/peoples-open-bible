translation:
  language: es
  text: En el año treinta y nueve de su reinado[a], Asa se enfermó de los pies; su enfermedad llegó a ser muy grave. Sin embargo, aun en su enfermedad no buscó a Yahvé, sino a los médicos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no consultó a Yahvé, sino a los médicos». El hebreo es elíptico y contrasta la búsqueda de Yahvé con el recurso a los médicos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחֱלֶא
  english_pob_choice: became diseased
  chosen_spanish: se enfermó
  alternatives_spanish:
  - cayó enfermo
  - llegó a estar enfermo
  lexicon: HALOT
  rationale: חלה puede expresar enfermar o debilitarse. En español, «se enfermó» es natural y conserva la idea de un estado de enfermedad sin introducir una connotación técnica innecesaria.
- source_word: בְּרַגְלָיו
  english_pob_choice: in his feet
  chosen_spanish: de los pies
  alternatives_spanish:
  - en sus pies
  - en las piernas
  lexicon: HALOT
  rationale: רֶגֶל puede significar pie o pierna. Aquí «de los pies» fluye bien en español y refleja el foco corporal de la dolencia.
- source_word: עַד לְמַעְלָה
  english_pob_choice: very severe
  chosen_spanish: muy grave
  alternatives_spanish:
  - sumamente grave
  - extremadamente grave
  lexicon: HALOT
  rationale: La expresión intensifica la enfermedad más que indicar dirección. «Muy grave» comunica con claridad ese valor intensivo en español moderno.
- source_word: חָלְיוֹ / בְּחָלְיוֹ
  english_pob_choice: his disease / in his disease
  chosen_spanish: su enfermedad / en su enfermedad
  alternatives_spanish:
  - su dolencia / en su dolencia
  - su mal / en su mal
  lexicon: HALOT
  rationale: Se mantiene la repetición léxica del hebreo con «enfermedad» para preservar la cohesión del versículo y la relación entre la afección y la falta de búsqueda de Yahvé.
- source_word: דָרַשׁ אֶת יְהוָה
  english_pob_choice: did not seek Yahweh
  chosen_spanish: no buscó a Yahvé
  alternatives_spanish:
  - no consultó a Yahvé
  - no acudió a Yahvé
  lexicon: HALOT
  rationale: דרש con Dios expresa buscar/consultar en sentido religioso y de dependencia. «No buscó a Yahvé» conserva el alcance covenantal del verbo sin reducirlo a pedir información.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se usa la forma recomendada por el proyecto para el nombre divino, manteniendo la referencia directa al Tetragrámaton sin sustituirlo por un título.
- source_word: כִּי בָּרֹפְאִים
  english_pob_choice: but the physicians
  chosen_spanish: sino a los médicos
  alternatives_spanish:
  - sino los médicos
  - sino en los médicos
  - pero a los médicos
  lexicon: HALOT
  rationale: El hebreo es elíptico y contrapone buscar a Yahvé con acudir a los médicos. «Sino a los médicos» hace explícita la oposición sin condenar la medicina como tal.
theological_decisions:
- issue: Contraste entre buscar a Yahvé y recurrir a médicos
  english_pob_reading: The verse preserves the contrast that Asa did not seek the LORD, but instead turned to physicians, without implying that physicians are inherently illegitimate.
  chosen_spanish_reading: El versículo conserva el contraste entre no buscar a Yahvé y acudir a los médicos, sin implicar que la atención médica sea ilegítima por sí misma.
  alternative_spanish_readings:
  - El versículo condena todo uso de médicos.
  - El versículo solo informa que consultó a los médicos, sin contraste teológico.
  rationale: La sintaxis hebrea opone explícitamente la falta de búsqueda de Yahvé al recurso a los médicos. La traducción debe retener esa tensión teológica y no convertirla en una prohibición general de la medicina.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto sigue de cerca el análisis léxico y teológico del inglés POB, manteniendo la repetición de «enfermedad» y el contraste entre Yahvé y los médicos, sin cambios respecto al estado de revisión más reciente.
  spanish_consistency_notes:
  - Se emplea «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «enfermedad» en ambas apariciones para reflejar la repetición del hebreo.
  - «Médicos» traduce el cierre elíptico sin sobrecargarlo con una condena explícita de la medicina.
