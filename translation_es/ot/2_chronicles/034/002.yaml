translation:
  language: es
  text: Hizo lo recto a los ojos de Yahvé[a], y anduvo en los caminos de David, su padre[b]; no se desvió ni a la derecha ni a la izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ante Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: '«Su padre» tiene sentido dinástico: antepasado o antecesor real.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Habló
  - Actuó
  lexicon: HALOT
  rationale: עשה es amplio (‘hacer/hacer obra’). En una fórmula valorativa real, “hizo” transmite bien la acción resumida y suena natural en español sin perder el carácter evaluativo.
- source_word: הַיָּשָׁר
  english_pob_choice: what was right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo justo
  - lo correcto
  - lo que era recto
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado evalúa la conducta moral. “Lo recto” conserva la idea de rectitud/recto obrar con un español sobrio y bíblico.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - a la vista de Yahvé
  - en los ojos de Yahvé
  lexicon: HALOT
  rationale: La imagen idiomática hebrea expresa evaluación divina. “Ante Yahvé” mantiene la referencia relacional y evita un giro demasiado calcado; es una equivalencia idiomática legítima en español bíblico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el defecto del proyecto para el Tetragrámaton: “Yahvé”, no un sustituto en mayúsculas. Esto preserva el nombre del pacto con claridad en español.'
- source_word: וַיֵּלֶךְ
  english_pob_choice: walked
  chosen_spanish: anduvo
  alternatives_spanish:
  - caminó
  - vivió
  - anduvo conforme a
  lexicon: HALOT
  rationale: הלך en contexto ético describe conducta habitual. “Anduvo” conserva la metáfora de conducta/andar y es plenamente idiomático en español bíblico actual.
- source_word: בְּדַרְכֵי
  english_pob_choice: in the ways of
  chosen_spanish: en los caminos de
  alternatives_spanish:
  - en las sendas de
  - según los caminos de
  - conforme a los caminos de
  lexicon: HALOT
  rationale: דרך se expresa de manera natural con “caminos” en español, manteniendo la metáfora moral sin forzar un calco.
- source_word: דָּוִיד אָבִיו
  english_pob_choice: David his father
  chosen_spanish: David, su padre
  alternatives_spanish:
  - su padre David
  - David su padre
  - David, su antepasado
  lexicon: HALOT
  rationale: La aposición hebrea puede leerse en sentido dinástico. “Su padre” respeta la forma del texto y, en contexto real, puede entenderse como antepasado/antecesor dinástico sin añadir explicación al cuerpo del versículo.
- source_word: וְלֹא סָר
  english_pob_choice: he did not turn aside
  chosen_spanish: no se desvió
  alternatives_spanish:
  - no se apartó
  - no viró
  - no se desvió de
  lexicon: HALOT
  rationale: סור significa apartarse/torcerse del camino. “No se desvió” mantiene la metáfora vial ya introducida por “caminos” y es claro en español.
- source_word: יָמִין וּשְׂמֹאול
  english_pob_choice: to the right or to the left
  chosen_spanish: ni a derecha ni a izquierda
  alternatives_spanish:
  - ni a la derecha ni a la izquierda
  - ni hacia la derecha ni hacia la izquierda
  - ni a diestra ni a siniestra
  lexicon: HALOT
  rationale: La fórmula fija expresa no desviarse en ningún sentido. “Ni a derecha ni a izquierda” es breve, natural y conserva la polaridad del hebreo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene la política del proyecto de traducirlo como “Yahvé”, preservando el nombre del pacto en español y evitando el sustituto litúrgico “SEÑOR”.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Dynastic sense of “father” in David his father
  english_pob_reading: David his father uses father in the dynastic sense of ancestor.
  chosen_spanish_reading: David, su padre, con sentido dinástico
  alternative_spanish_readings:
  - David, su antepasado
  - David, su ancestro
  - David, su padre literal
  rationale: En contexto real, ‘padre’ puede señalar al antecesor dinástico y no solo al padre biológico. La traducción principal mantiene “su padre” por fidelidad formal, y la nota aclara el valor dinástico para evitar una lectura estrecha.
  doctrine_reference: Principio de genealogía/dinastía en textos históricos del AT
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: no hubo revisiones aplicadas y el control cruzado informó alta concordancia. La versión española conserva la estructura evaluativa del hebreo, la metáfora de caminar/andar, la fórmula de no desviarse y el nombre divino según la política del proyecto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene la metáfora de camino/andar para la conducta moral.
  - «Su padre» se conserva en forma breve, con aclaración en nota sobre el uso dinástico.
  - La polaridad «derecha/izquierda» reproduce la fórmula hebrea sin explicitar más de lo necesario.
