review_pass:
  verdict: revise
  source_alignment_summary: El hebreo expresa que Dios hará manifiesta la צדק del destinatario 'como la luz' y su משפט 'como el mediodía'. El borrador capta bien וְהוֹצִיא, כָאוֹר y כַצָּהֳרָיִם, pero desplaza innecesariamente el paralelismo semántico al poner 'tu justicia ... y tu causa'. El rastro POB en inglés conserva 'righteousness' y 'justice' en el texto principal, con 'vindication' y 'cause' solo como alternativas. En español conviene mantener igualmente el campo léxico principal en el texto y relegar las alternativas a notas.
  spanish_quality_summary: El español es claro y natural, pero la nota [a] introduce una alternativa débil ('como la luz del día') que no corresponde al aparato inglés ni mejora la claridad. Además, la nota [b] está mal alineada con el anclaje, porque el texto principal dice 'tu causa' mientras la nota habla de alternativa para 'tu justicia'. Una revisión mínima produce un verso más fiel y con notas coherentes.
  glossary_alignment: '''Justicia'' es la mejor opción principal tanto para צִדְקֶךָ como para מִשְׁפָּטֶךָ en este contexto poético-forense, con alternativas en nota: ''vindicación'' para el primero y ''causa'' para el segundo. Esto respeta la racionalidad léxica documentada y evita sobrecargar el texto principal con una interpretación secundaria.'
  issues:
  - severity: high
    issue: El texto principal cambia וּמִשְׁפָּטֶךָ de 'tu justicia' a 'tu causa' sin necesidad.
    rationale: El inglés auditado eligió 'your justice' como principal y reservó 'your cause' como alternativa. En español, 'causa' es posible, pero como matiz secundario; usarla en el texto principal altera el equilibrio léxico del original y del POB.
  - severity: medium
    issue: La nota [b] no corresponde al texto anclado.
    rationale: La nota dice 'O “tu vindicación” para “tu justicia”', pero el texto en ese punto dice 'tu causa'. Esto crea confusión editorial.
  - severity: low
    issue: La nota [a] no refleja una alternativa significativa documentada.
    rationale: '''Como la luz del día'' no es la alternativa preservada en el rastro inglés y añade poco valor. La alternativa relevante está asociada a los sustantivos, no a ''la luz''.'
  revised_spanish_text: Él hará salir tu justicia[a] como la luz, y tu justicia[b] como el mediodía.
