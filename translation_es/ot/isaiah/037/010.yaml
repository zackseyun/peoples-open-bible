base_translation:
  language: en
  yaml_path: translation/ot/isaiah/037/010.yaml
  text: 'Thus you shall say to Hezekiah king of Judah: ‘Do not let your God[a], in whom you trust, deceive you, saying[b], “Jerusalem will not be given into the hand of the king of Assyria.”’'
  footnotes:
  - marker: a
    text: Or “mislead you.” The Hebrew verb can mean “deceive” or “lead astray.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “into the hand of,” an idiom meaning “into the power of.”
    reason: lexical_alternative
