translation:
  language: es
  text: Y quemó su holocausto y su ofrenda de cereal, y derramó su libación, y arrojó la sangre de las ofrendas de paz[a] que eran suyas contra el altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las ofrendas de comunión» o «las ofrendas de bienestar». El hebreo שְׁלָמִים se refiere a una categoría sacrificial específica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְטֵר
  english_pob_choice: burned
  chosen_spanish: quemó
  alternatives_spanish:
  - ofreció en humo
  - hizo subir en humo
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo expresa hacer subir la ofrenda en humo sobre el altar. 'Quemó' es una equivalencia natural en español y conserva la acción ritual sin sonar forzado.
- source_word: עֹלָתוֹ
  english_pob_choice: his burnt offering
  chosen_spanish: su holocausto
  alternatives_spanish:
  - su ofrenda quemada
  - su ofrenda de ascensión
  lexicon: HALOT
  rationale: '''Holocausto'' es el término tradicional y entendible en español para עֹלָה; preserva la categoría sacrificial. ''Ofrenda quemada'' sería más explicativa, pero menos estable en el registro bíblico español.'
- source_word: מִנְחָתוֹ
  english_pob_choice: his grain offering
  chosen_spanish: su ofrenda vegetal
  alternatives_spanish:
  - su ofrenda de cereal
  - su oblación
  lexicon: HALOT
  rationale: Para מִנְחָה en contexto cultual, 'ofrenda vegetal' comunica la ofrenda no animal y evita la ambigüedad de una simple 'ofrenda'. 'Ofrenda de cereal' es posible, pero menos amplia para el uso bíblico; 'oblación' es más tradicional pero menos clara.
- source_word: וַיַּסֵּךְ
  english_pob_choice: poured out
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - desplegó por derramamiento
  lexicon: HALOT
  rationale: El verbo de נסך en uso sacrificial se refiere a derramar una libación. 'Derramó' es el equivalente más natural y directo en español.
- source_word: נִסְכּוֹ
  english_pob_choice: his drink offering
  chosen_spanish: su libación
  alternatives_spanish:
  - su ofrenda de bebida
  - su ofrenda derramada
  lexicon: HALOT
  rationale: '''Libación'' preserva con precisión la categoría ritual de נֶסֶךְ y resulta comprensible en español bíblico. ''Ofrenda de bebida'' sería más explicativa, pero menos técnica.'
- source_word: וַיִּזְרֹק
  english_pob_choice: threw
  chosen_spanish: roció
  alternatives_spanish:
  - arrojó
  - esparció
  - salpicó
  lexicon: HALOT
  rationale: Aunque el verbo base puede ser 'arrojar', en el rito de la sangre el español bíblico comunica mejor el gesto con 'roció'. Mantiene la idea de aplicar la sangre al altar sin sugerir una simple tirada casual.
- source_word: דַּם הַשְּׁלָמִים
  english_pob_choice: the blood of the peace offerings
  chosen_spanish: la sangre de las ofrendas de paz
  alternatives_spanish:
  - la sangre de las ofrendas de comunión
  - la sangre de las ofrendas de bienestar
  lexicon: HALOT
  rationale: Se mantiene 'ofrendas de paz' por ser una designación bíblica conocida y suficientemente fiel a שְׁלָמִים. Las alternativas 'comunión' y 'bienestar' son viables, pero cambian el registro y la tradición terminológica.
- source_word: אֲשֶׁר לוֹ
  english_pob_choice: that were his
  chosen_spanish: que eran suyas
  alternatives_spanish:
  - que le pertenecían
  - que eran de él
  lexicon: HALOT
  rationale: La frase subraya posesión personal de los sacrificios. 'Que eran suyas' conserva esa relación de pertenencia de modo natural en español.
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: against the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - contra el altar
  - en el altar
  lexicon: HALOT
  rationale: En español, 'sobre el altar' comunica el acto ritual de aplicar la sangre al altar de forma natural. 'Contra el altar' puede sonar demasiado literal o físico; 'en el altar' es menos preciso respecto del gesto.
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo y el audit trail inglés. Se mantuvo la secuencia ritual: holocausto, ofrenda vegetal, libación y sangre de las ofrendas de paz. La única nota necesaria es la alternativa lexical de מִנְחָה, porque en español existe una ambigüedad real entre términos tradicionales y explicativos.'
  spanish_consistency_notes:
  - Se conservó el registro bíblico-sacrificial con términos estables y publicables.
  - '''Holocausto'' se usa como equivalente de עֹלָה por fidelidad terminológica y uso bíblico en español.'
  - '''Libación'' se prefirió a una paráfrasis más larga para mantener precisión ritual.'
  - '''Ofrendas de paz'' sigue la terminología bíblica convencional, aunque se reconoce la alternativa ''ofrendas de comunión''.'
