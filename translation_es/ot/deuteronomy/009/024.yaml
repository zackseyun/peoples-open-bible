translation:
  language: es
  text: Han sido rebeldes contra Yahvé[a] desde el día en que los conocí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con Yahvé»; en este contexto la expresión implica oposición a él, por eso se traduce «contra Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַמְרִים
  english_pob_choice: rebellious
  chosen_spanish: rebeldes
  alternatives_spanish:
  - rebeldes
  - refractarios
  - obstinadamente rebeldes
  lexicon: HALOT
  rationale: El participio adjetival expresa un estado o carácter continuo. En español, «rebeldes» comunica con naturalidad la resistencia al mandato divino, manteniendo el sentido de oposición pactal sin endurecer innecesariamente la frase.
- source_word: הֱיִיתֶם
  english_pob_choice: have been
  chosen_spanish: han sido
  alternatives_spanish:
  - han estado
  - fueron
  lexicon: HALOT
  rationale: El perfecto hebreo en una afirmación retrospectiva sobre el carácter de Israel se expresa bien con presente perfecto en español. «Han sido» conserva la continuidad hasta el presente discursivo.
- source_word: עִם
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - con
  - hacia
  lexicon: HALOT
  rationale: Aunque la preposición es literalmente «con», el contexto con ממרים exige una relación de oposición. «Contra» reproduce el valor adversativo que la POB inglesa explicitó con «against».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio mediante «Yahvé», de acuerdo con la convención del proyecto para יְהוָה. No se sustituye por un título para mantener la transparencia del texto fuente.
- source_word: מִיּוֹם
  english_pob_choice: from the day
  chosen_spanish: desde el día
  alternatives_spanish:
  - desde el momento
  - desde que
  lexicon: HALOT
  rationale: La expresión temporal de inicio se vierte con la estructura idiomática española «desde el día», que mantiene el punto de partida cronológico.
- source_word: דַּעְתִּי
  english_pob_choice: I knew
  chosen_spanish: en que te conocí
  alternatives_spanish:
  - en que os conocí
  - desde que te conocí
  lexicon: HALOT
  rationale: El verbo ידע aquí señala el comienzo del conocimiento relacional de Moisés respecto de Israel. «Te conocí» refleja esa relación personal en forma natural en español, y la subordinada con «en que» integra bien la marca temporal.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - os
  - los
  lexicon: HALOT
  rationale: El hebreo usa segunda persona plural, pero el discurso directo en español puede oscilar entre singular y plural según el receptor implícito. Aquí se privilegia la fluidez del reproche oracular; aun así, el plural se preserva en el verbo «han sido».
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La POB inglesa evita la sustitución por un título. En español, «Yahvé» transmite el nombre pactal revelado, preservando la decisión teológica y la transparencia auditiva del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de עִם con ממרים
  english_pob_reading: against
  chosen_spanish_reading: contra
  alternative_spanish_readings:
  - con
  - en oposición a
  rationale: La preposición literal «con» no comunica adecuadamente la fuerza del hebreo en esta construcción. «Contra» mantiene la tensión relacional y evita suavizar la acusación de rebelión.
  doctrine_reference: HALOT, entrada de מרה en construcción adversativa con עִם
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la auditoría inglesa y no requiere cambios textuales. La única tensión relevante es la preposición עִם, donde el hebreo dice literalmente «con», pero el contexto y la propia decisión inglesa justifican «contra» en la traducción española.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrammatón, en línea con el estándar del proyecto.
  - Se conserva el matiz relacional y acusatorio de la frase sin añadir contenido inexistente en el hebreo.
  - La segunda persona se adapta de forma natural al español, sin perder el carácter corporativo del reproche.
