base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/061.yaml
  text: 'Jesus said, "Two will rest on a couch; one will die, one will live."


    Salome said, "Who are you, man? As from one, you have gotten up onto my couch and eaten from my table."


    Jesus said to her, "I am he who exists from the Equal. I was given from the things of my Father."


    [Salome said,] "I am your disciple."


    [Jesus said,] "Because of this I say: whenever one becomes empty, he will be filled with light; but whenever one becomes divided, he will be filled with darkness."'
  footnotes:
  - marker: As from one
    text: Literally 'as from one' (ϩⲱⲥ ⲉⲃⲟⲗ ϩⲛ̄ⲟⲩⲁ). This could mean 'as if from someone [special]' or 'as from the One', reflecting Thomas's theology of unity.
    reason: lexical_alternative
  - marker: the Equal
    text: Coptic ⲡⲉⲧϣⲏϣ, 'that which is equal' or 'the Equal' (from ϣⲓϣ, 'to be equal, level').
    reason: theological_note
  - marker: '[Salome said,] ... [Jesus said,]'
    text: The Coptic text does not include speaker tags for the final two sentences. They are supplied here for clarity.
    reason: textual_variant
  - marker: empty
    text: The manuscript reads ϣⲏϥ (stative of ϣⲱϥ, 'to be empty, desolate'), which creates a wordplay with 'filled' (ⲙⲟⲩϩ). Many scholars emend this to ϣⲏϣ ('equal') to match 'the Equal' (ⲡⲉⲧϣⲏϣ) earlier in the saying and to contrast directly with 'divided' (ⲡⲏϣ).
    reason: textual_variant
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:48Z'
    unchanged: false
    changes_summary: Removed the bracketed gloss from Jesus’ opening saying and the stray bracketed/corrupted insertions in the final line, while retaining the established renderings 'couch,' 'gotten up,' 'the Equal,' 'empty,' and 'divided.'
translation:
  language: es
  text: 'Jesús dijo: “Dos descansarán en un lecho; uno morirá, uno vivirá.


    Salomé dijo: “¿Quién eres tú, hombre? Como de uno,[a] has subido a mi lecho y has comido de mi mesa.”


    Jesús le dijo: “Yo soy el que existe desde el Igual.[b] Me fue dado de lo que es de mi Padre.[c]”


    [Salomé dijo:] “Yo soy tu discípula.”


    [Jesús dijo:] “Por eso digo: cuando uno llegue a estar vacío,[d] será llenado de luz; pero cuando llegue a estar dividido, será llenado de oscuridad.”'
  philosophy: formal
  footnotes:
  - marker: a
    text: La expresión copta literalmente dice ‘como de uno’. Puede entenderse como ‘como si vinieras de alguien [especial]’ o como una alusión al Uno, manteniendo la ambigüedad teológica del dicho.
    reason: lexical_alternative
  - marker: b
    text: El copto ⲡⲉⲧϣⲏϣ significa ‘lo que es igual’ o ‘el Igual’. Se mantiene aquí una substantivación que deja abierta su carga conceptual y teológica.
    reason: theological_note
  - marker: c
    text: El copto usa una forma posesiva plural que puede leerse literalmente como ‘las cosas de mi Padre’ o, de manera más natural en español, ‘lo que es de mi Padre’ o ‘lo que pertenece a mi Padre’.
    reason: lexical_alternative
  - marker: d
    text: La lectura manuscrita es ‘vacío’; algunos estudios proponen emendarla a ‘igual’ para armonizarla con la frase anterior. Aquí se conserva el testimonio manuscrito y su contraste con ‘llenado’.
    reason: textual_variant
lexical_decisions:
- source_word: ⲛⲁⲙⲧⲟⲛ
  english_pob_choice: will rest
  chosen_spanish: descansarán
  alternatives_spanish:
  - reposarán
  - se tenderán
  lexicon: Crum 220b, ⲙⲧⲟⲛ
  rationale: La forma futura expresa acción venidera; en español, ‘descansarán’ comunica bien el sentido de reposo sobre un lecho sin introducir una lectura más específica que el copto no exige.
- source_word: ⲟⲩϭⲗⲟϭ
  english_pob_choice: couch
  chosen_spanish: lecho
  alternatives_spanish:
  - cama
  - diván
  lexicon: Crum 811b, ϭⲗⲟϭ
  rationale: ‘Lecho’ es natural en español para un lugar donde alguien se recuesta o duerme, y mantiene dignidad literaria. ‘Cama’ es posible, pero menos neutra para este contexto de comida y recostarse.
- source_word: ϩⲱⲥ ⲉⲃⲟⲗ ϩⲛ̄ⲟⲩⲁ
  english_pob_choice: As from one
  chosen_spanish: Como de uno
  alternatives_spanish:
  - Como de alguien
  - Como desde el Uno
  lexicon: Crum 540a, ϩⲱⲥ; Crum 516a, ⲟⲩⲁ
  rationale: 'Se conserva la ambigüedad documentada: puede sonar como ‘desde uno/alguien’ o sugerir una referencia al Uno. ‘Como de uno’ deja abierta esa tensión sin resolverla artificialmente.'
- source_word: ⲧⲉⲗⲟ / ⲧⲁⲗⲟ
  english_pob_choice: gotten up
  chosen_spanish: has subido
  alternatives_spanish:
  - has montado
  - te has levantado
  lexicon: Crum 408a, ⲧⲁⲗⲟ
  rationale: ‘Has subido’ refleja el movimiento ascendente hacia el lecho y funciona naturalmente en español. ‘Levantarte’ perdería el matiz de subir/posarse sobre el lecho.
- source_word: ⲧⲣⲁⲡⲉⲍⲁ
  english_pob_choice: table
  chosen_spanish: mesa
  alternatives_spanish:
  - tabla
  - banquete
  lexicon: Crum 414b, ⲧⲣⲁⲡⲉⲍⲁ
  rationale: ‘Mesa’ es la equivalencia directa y la más clara en español; conserva el contraste con el lecho y con el acto de comer.
- source_word: ⲡⲉⲧϣⲏϣ
  english_pob_choice: the Equal
  chosen_spanish: el Igual
  alternatives_spanish:
  - el Igualado
  - lo Igual
  lexicon: Crum 595b, ϣⲓϣ
  rationale: Se mantiene la substantivación con artículo masculino ‘el Igual’ para reflejar el uso nominal del copto. ‘Lo Igual’ sería más abstracto, pero menos cercano a la forma personal/substantiva que el POB inglés preserva.
- source_word: ⲛⲁⲡⲁⲉⲓⲱⲧ
  english_pob_choice: from the things of my Father
  chosen_spanish: de las cosas de mi Padre
  alternatives_spanish:
  - de lo que pertenece a mi Padre
  - de los bienes de mi Padre
  lexicon: Crum 231b, ⲛⲁ- + ⲡⲁⲉⲓⲱⲧ
  rationale: El plural posesivo copto pide una formulación plural o de pertenencia. ‘Las cosas de mi Padre’ conserva la literalidad y la amplitud semántica sin reducirlo a ‘bienes’.
- source_word: ϣⲏϥ
  english_pob_choice: empty
  chosen_spanish: vacío
  alternatives_spanish:
  - desierto
  - desolado
  lexicon: Crum 593a, ϣⲱϥ
  rationale: El copto presenta el estado de vaciedad; ‘vacío’ es la opción más natural y fiel en español. ‘Desolado’ sería posible, pero cargado de un matiz menos directo.
- source_word: ⲡⲏϣ
  english_pob_choice: divided
  chosen_spanish: dividido
  alternatives_spanish:
  - partido
  - separado
  lexicon: Crum 276b, ⲡⲱϣ
  rationale: ‘Dividido’ reproduce bien la oposición con unidad/plenitud y mantiene el carácter pasivo o resultativo del estado copto.
- source_word: ⲙⲟⲩϩ
  english_pob_choice: filled
  chosen_spanish: será llenado
  alternatives_spanish:
  - será colmado
  - será lleno
  lexicon: Crum 177b, ⲙⲟⲩϩ
  rationale: ‘Será llenado’ expresa claramente la pasiva y conserva el paralelo repetido del pasaje. ‘Colmado’ intensifica, pero no es necesario.
theological_decisions:
- issue: ⲡⲉⲧϣⲏϣ como título o sustantivo metafísico
  english_pob_reading: the Equal
  chosen_spanish_reading: el Igual
  alternative_spanish_readings:
  - lo Igual
  - el Igualado
  rationale: Se preserva la substantivación singular con artículo para no diluir el sentido teológico del término. En español, ‘el Igual’ conserva la extrañeza del copto y permite al lector percibir una referencia conceptual o personal sin forzar una paráfrasis doctrinal.
  doctrine_reference: Thomasine unity motif; lexical theology of ϣⲓϣ/ⲡⲱϣ
- issue: ϣⲏϥ como lectura manuscrita frente a emendación a ϣⲏϣ
  english_pob_reading: empty
  chosen_spanish_reading: vacío
  alternative_spanish_readings:
  - igual
  - sin dividir
  rationale: 'Se conserva la lectura manuscrita ‘vacío’ para respetar la tensión textual documentada: vaciado/llenura frente a división/llenura. Esto evita suavizar el juego verbal que el testimonio copto permite.'
  doctrine_reference: Manuscript reading versus emendation noted in audit trail
- issue: 'Expresión de origen: ‘from the Equal’ y ‘from the things of my Father’'
  english_pob_reading: I am he who exists from the Equal. I was given from the things of my Father.
  chosen_spanish_reading: Yo soy el que existe desde el Igual. Me fue dado de las cosas de mi Padre.
  alternative_spanish_readings:
  - Yo soy el que existe del Igual
  - Yo soy el que procede del Igual
  rationale: ‘Desde’ mantiene el valor de procedencia/origen sin fijar una metafísica más fuerte que la del texto. ‘De las cosas de mi Padre’ preserva la relación de procedencia material o patrimonial indicada por el plural copto.
  doctrine_reference: Thomasine origin language; plural possessive construction
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió ‘Two will rest on a couch’ por la presencia explícita del verbo de reposo y que restableció ‘the things of my Father’ y ‘divided’ en el final. La versión española refleja esas correcciones y evita insertar glosas no presentes en el texto revisado.
  spanish_consistency_notes:
  - Se mantiene ‘el Igual’ para ⲡⲉⲧϣⲏϣ de modo coherente en todo el registro.
  - ‘Vacío’ se conserva para ϣⲏϥ, en paralelo con ‘será llenado’.
  - Se usa ‘dividido’ para ⲡⲏϣ y no ‘dos’, conforme al análisis léxico auditado.
  - Se traduce la forma de procedencia con ‘de’/‘desde’ según el contexto para no oscurecer la ambigüedad del original.
  - Se preservan los tags editoriales entre corchetes para las dos intervenciones finales, siguiendo el contexto auditado.
