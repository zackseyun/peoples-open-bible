translation:
  language: es
  text: Ella entró en el alma de un siervo del Señor[a], y se enfrentó a reyes temibles con prodigios y señales[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El «siervo del Señor» se entiende por el contexto como Moisés.
    reason: cross_reference
  - marker: b
    text: O «mediante prodigios y señales». La frase griega puede expresar medio o circunstancia acompañante.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - ingresó
  - penetró
  lexicon: LSJ
  rationale: εἰσέρχομαι expresa entrada concreta; «entró» es natural en español y conserva la imagen de ingreso al interior de una persona.
- source_word: ψυχὴν
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser interior
  - mente
  lexicon: LSJ
  rationale: ψυχή puede ser vida o interioridad; aquí, en un contexto de inhabitación sapiencial, «alma» mantiene el sentido antropológico y espiritual sin reducirlo a psicología moderna.
- source_word: θεράποντος
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  - criado
  lexicon: LSJ
  rationale: θεράπων designa un sirviente o atendiente con dignidad. Sin embargo, el marco de este proyecto favorece «esclavo» cuando la fuerza léxica de un término de servidumbre debe mantenerse; aquí se conserva la dependencia plena respecto del Señor.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor Dios
  lexicon: LSJ
  rationale: El genitivo κύριος se refleja naturalmente como «del Señor» en esta construcción; el texto griego no usa aquí el tetragrámaton directamente, sino el título κύριος.
- source_word: ἀντέστη
  english_pob_choice: stood against
  chosen_spanish: se enfrentó a
  alternatives_spanish:
  - se opuso a
  - resistió a
  - se mantuvo contra
  lexicon: LSJ
  rationale: ἀνθίστημι significa ponerse en contra o resistir. «Se enfrentó a» transmite la oposición activa con fluidez española, sin perder el matiz de resistencia.
- source_word: βασιλεῦσι
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - gobernantes
  - monarcas
  lexicon: LSJ
  rationale: El dativo plural se refiere específicamente a reyes; «reyes» es exacto y no amplía indebidamente el referente.
- source_word: φοβεροῖς
  english_pob_choice: fearsome
  chosen_spanish: temibles
  alternatives_spanish:
  - terribles
  - espantosos
  - formidables
  lexicon: LSJ
  rationale: φοβερός denota aquello que causa temor. «Temibles» expresa bien ese valor en español contemporáneo y evita la posible ambigüedad de «temerosos».
- source_word: ἐν τέρασι καὶ σημείοις
  english_pob_choice: with wonders and signs
  chosen_spanish: con prodigios y señales
  alternatives_spanish:
  - con maravillas y señales
  - mediante prodigios y señales
  - en prodigios y señales
  lexicon: LSJ
  rationale: ἐν puede ser instrumental o circunstancial. «Con prodigios y señales» mantiene la relación asociativa del griego y usa un binomio bíblico claro en español. «Prodigios» conserva el matiz de τέρατα mejor que «maravillas» en este contexto.
theological_decisions:
- issue: Sujeto implícito femenino de la acción
  english_pob_reading: Use 'She' for the implied subject, referring to Wisdom.
  chosen_spanish_reading: Conservar «Ella» para la Sabiduría personificada.
  alternative_spanish_readings:
  - La Sabiduría entró...
  - Entró...
  rationale: El griego no explicita sujeto, pero el contexto inmediato personifica a la Sabiduría en femenino. «Ella» preserva esa continuidad literaria sin añadir un sustantivo ausente del verso.
  doctrine_reference: Preservar la tensión literaria y teológica del texto; no resolverla con una explicación ausente del original.
- issue: Identidad del 'servant of the Lord'
  english_pob_reading: Leave the phrase untranslated as a common noun rather than naming Moses.
  chosen_spanish_reading: Mantener el sintagma común «un esclavo del Señor» sin nombrar a Moisés en el texto principal.
  alternative_spanish_readings:
  - un siervo del Señor
  - Moisés
  rationale: Aunque el contexto amplio apunta a Moisés, el griego dice literalmente «de un servidor/esclavo del Señor». Nombrar a Moisés en la línea principal iría más allá del alcance explícito del verso.
  doctrine_reference: Primacía del texto original sobre la identificación tradicional cuando esta no está formulada en el versículo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que ajustó el orden de «with wonders and signs» para reflejar más naturalmente el griego; por eso el español coloca «con prodigios y señales» al final de la cláusula, donde funciona de manera más fluida y cercana al original.
  spanish_consistency_notes:
  - Se conserva el sujeto femenino implícito en armonía con la personificación de la Sabiduría.
  - Se mantiene el título «Señor» para κύριος, coherente con el uso POB, sin introducir «Yahvé» donde el griego no lo explicita.
  - «Prodigios y señales» refleja el par semántico del griego y evita diluir τέρατα en un término demasiado genérico.
