    text: O «fleco». El término hebreo se refiere a la borla o franja con flecos adherida a la prenda.
    reason: lexical_alternative
  - marker: b
    text: O «irán tras su corazón y tras sus ojos». El verbo hebreo sugiere perseguir o ir en pos de esos impulsos.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice «después de los cuales ustedes se prostituyen», usando la imagen de infidelidad sexual como metáfora de deslealtad al pacto; alternativamente, «en pos de los cuales ustedes se desvían».
    reason: lexical_alternative
  revision_rationale: 'La revisión hace un ajuste pequeño pero importante: expresa la relación temporal de «al verla/cuando la vean» mejor documentada en la auditoría inglesa, y pule las notas para que describan con más precisión el referente de צִיצִת y las alternativas de תָתֻרוּ y זֹנִים. Se conserva el nombre divino «Yahvé», la fuerza legal de «mandamientos», y la metáfora sexual fuerte de «se prostituyen».'
