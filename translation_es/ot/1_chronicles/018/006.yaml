translation:
  language: es
  text: Y David puso guarniciones en Aram de Damasco[a], y los arameos[b] llegaron a ser siervos de David, trayendo tributo. Y Yahvé dio victoria[c] a David dondequiera que iba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'estableció fuerzas' o, más literalmente, 'puso' en Aram de Damasco; el verbo hebreo es simplemente 'puso/colocó', y 'guarniciones' se entiende por el contexto militar.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'Aram'; tradicionalmente 'Siria' o 'los sirios'.
    reason: alternative_reading
  - marker: c
    text: O 'salvó a David' o 'libró a David'; en este contexto de batalla, 'dio victoria' expresa mejor el sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: placed garrisons
  chosen_spanish: puso guarniciones
  alternatives_spanish:
  - estableció tropas
  - colocó fuerzas
  - puso
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'puso/colocó', pero en este contexto militar el sentido implícito es el de instalar destacamentos o guarniciones. 'Puso guarniciones' conserva la base verbal y hace explícita la lectura contextual sin ir más allá del texto.
- source_word: בַּאֲרָם דַּרְמֶשֶׂק
  english_pob_choice: in Aram of Damascus
  chosen_spanish: en Aram de Damasco
  alternatives_spanish:
  - en Damasco
  - entre los arameos de Damasco
  lexicon: HALOT
  rationale: La expresión hebrea nombra el territorio/entidad 'Aram' unido a Damasco. 'Aram de Damasco' preserva mejor la designación hebrea que simplemente 'Damasco' y sigue siendo inteligible en español.
- source_word: אֲרָם
  english_pob_choice: the Arameans
  chosen_spanish: los arameos
  alternatives_spanish:
  - Aram
  - los sirios
  lexicon: HALOT
  rationale: Aquí el término se refiere al pueblo sometido a David. 'Los arameos' refleja el etnónimo hebreo directamente; 'los sirios' sería la versión tradicional, pero borra la referencia étnica más precisa.
- source_word: עֲבָדִים
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - esclavos
  - súbditos
  lexicon: HALOT
  rationale: En este contexto político, el término comunica sujeción y vasallaje. 'Siervos' mantiene la relación de subordinación sin imponer necesariamente esclavitud chattel; 'súbditos' sería más interpretativo.
- source_word: נֹשְׂאֵי מִנְחָה
  english_pob_choice: bringing tribute
  chosen_spanish: trayendo tributo
  alternatives_spanish:
  - portando tributo
  - llevando ofrendas
  - trayendo regalos
  lexicon: HALOT
  rationale: El participio con מִנְחָה expresa la acción continua de presentar un tributo a un soberano. 'Trayendo tributo' es natural en español y conserva el valor político del término mejor que 'regalos'.
- source_word: וַיּוֹשַׁע
  english_pob_choice: gave victory
  chosen_spanish: dio victoria
  alternatives_spanish:
  - salvó
  - libró
  - dio liberación
  lexicon: HALOT
  rationale: El verbo puede significar 'salvar/deliver', pero en narrativa bélica su fuerza idiomática apunta al éxito militar concedido por Yahvé. 'Dio victoria' expresa esa fuerza contextual en español con claridad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El tetragrámaton se vierte como 'Yahvé' en el texto español para preservar el nombre divino personal sin la sustitución tradicional por un título. 'Yahvé' es la forma adoptada de manera consistente en este proyecto.
- source_word: בְּכֹל אֲשֶׁר הָלָךְ
  english_pob_choice: wherever he went
  chosen_spanish: dondequiera que iba
  alternatives_spanish:
  - en todo lo que iba
  - dondequiera que marchaba
  - por donde iba
  lexicon: HALOT
  rationale: La expresión idiomática comunica la totalidad del recorrido o campaña de David. 'Dondequiera que iba' es natural en español y mantiene el alcance amplio del hebreo sin restringirlo solo a acciones militares.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre propio del pacto en lugar de sustituirlo por un título. La forma española 'Yahvé' sigue la convención editorial del proyecto y mantiene visible la decisión teológica de no ocultar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Sentido de וַיּוֹשַׁע en contexto bélico
  english_pob_reading: gave victory
  chosen_spanish_reading: dio victoria
  alternative_spanish_readings:
  - salvó
  - libró
  - dio liberación
  rationale: En un contexto de campaña militar, el verbo de 'salvar' se entiende como conceder éxito o victoria. 'Dio victoria' preserva la tensión entre salvación y triunfo militar sin reducirlo a una sola formulación teológica.
  doctrine_reference: 'DOCTRINE.md: lectura contextual de verbos de salvación en narrativas de guerra'
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y ningún cambio necesario; se mantiene la solución auditada del inglés POB, con adaptación natural al español y preservación de las ambigüedades documentadas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, coherente con la terminología del proyecto.
  - Se usa 'arameos' para אֲרָם cuando designa al pueblo, evitando 'sirios' salvo nota textual.
  - '''Siervos'' conserva el matiz de vasallaje político sin forzar ''esclavos''.'
  - '''Dio victoria'' refleja la lectura bélica de וַיּוֹשַׁע sin borrar la base semántica de ''salvar''.'
