base_translation:
  language: en
  yaml_path: translation/ot/job/013/004.yaml
  text: But you are plasterers of lies[b][a]; all of you are worthless physicians.
  footnotes:
  - marker: a
    text: Or 'smearers of falsehood' or 'forgers of lies.' The Hebrew verb behind 'plasterers' evokes spreading or coating over, likely preserving the metaphor of covering reality with falsehood.
    reason: lexical_alternative
  - marker: b
    text: Or 'physicians of no value.' The Hebrew expression describes them as useless healers; 'idol-physicians' is a less likely alternative based on another sense of the noun.
    reason: lexical_alternative
