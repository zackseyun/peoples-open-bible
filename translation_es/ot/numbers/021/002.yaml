translation:
  language: es
  text: 'Entonces Israel hizo un voto a Yahvé y dijo: «Si en verdad[a] entregas a este pueblo en mi mano, entonces dedicaré sus ciudades a la destrucción[b]» .'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si ciertamente entregas a este pueblo en mi mano». La construcción hebrea intensifica el verbo: «entregando, entregarás».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pondré sus ciudades bajo el anatema». El hebreo se refiere a dedicar algo de manera irrevocable a destrucción como acto de ḥerem.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּדַּר ... נֶדֶר
  english_pob_choice: made a vow
  chosen_spanish: hizo un voto
  alternatives_spanish:
  - votó un voto
  - pronunció un voto
  lexicon: HALOT
  rationale: El hebreo usa una construcción idiomática intensiva con verbo y sustantivo de la misma raíz. En español, “hizo un voto” comunica el acto solemne sin sonar forzado, y conserva el carácter formal del compromiso.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto de traducir יהוה como “Yahvé”, manteniendo explícito el nombre divino en lugar de enmascararlo con un título.
- source_word: אִם נָתֹן תִּתֵּן
  english_pob_choice: If you indeed give
  chosen_spanish: Si en verdad entregas
  alternatives_spanish:
  - Si ciertamente entregas
  - Si entregas, sí entregas
  lexicon: HALOT
  rationale: La infinitiva absoluta con verbo finito intensifica la acción. “En verdad” transmite esa fuerza en español natural, sin perder el énfasis del hebreo.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: a este pueblo
  alternatives_spanish:
  - a esta gente
  - a este pueblo
  lexicon: HALOT
  rationale: El sustantivo colectivo עָם se mantiene como “pueblo”, y el demostrativo se conserva con cercanía al hebreo. En contexto, el singular colectivo es más fiel que pluralizarlo.
- source_word: בְּיָדִי
  english_pob_choice: into my hand
  chosen_spanish: en mi mano
  alternatives_spanish:
  - en mi poder
  - bajo mi control
  lexicon: HALOT
  rationale: La imagen corporal hebrea se preserva literalmente porque es una expresión bíblica estable de entrega o dominio. “En mi mano” es comprensible en español y mantiene la metáfora.
- source_word: וְהַחֲרַמְתִּי
  english_pob_choice: I will devote ... to destruction
  chosen_spanish: dedicaré ... a la destrucción
  alternatives_spanish:
  - consagraré ... a la destrucción
  - lo destruiré por completo
  - lo pondré bajo el anatema
  lexicon: HALOT
  rationale: חרם implica dedicar irrevocablemente algo a destrucción en un marco ritual y militar. “Dedicaré ... a la destrucción” preserva mejor esa carga que un simple “destruiré”, y evita introducir lenguaje eclesiástico no atestiguado por el hebreo.
- source_word: עָרֵיהֶם
  english_pob_choice: their cities
  chosen_spanish: sus ciudades
  alternatives_spanish:
  - sus poblados
  - sus ciudades
  lexicon: HALOT
  rationale: עִיר se traduce de manera directa como “ciudad”; el plural “ciudades” sigue el sentido del hebreo y el contexto de conquista.
theological_decisions:
- issue: Cómo expresar el voto guerrero ligado a ḥerem
  english_pob_reading: devote their cities to destruction
  chosen_spanish_reading: dedicaré sus ciudades a la destrucción
  alternative_spanish_readings:
  - las destruiré por completo
  - las pondré bajo el anatema
  rationale: El texto no describe solo aniquilación militar, sino un acto formal de ḥerem con dimensión votiva. La frase elegida conserva esa tensión entre voto y destrucción sin suavizarla ni explicarla más allá de lo que el versículo dice.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético y el audit trail inglés, manteniendo la intensificación verbal de אִם נָתֹן תִּתֵּן, la metáfora de בְּיָדִי y el valor técnico de חרם sin suavizarlo. No se requieren revisiones adicionales con base en el paquete de revisión más reciente, que coincide plenamente.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” según el estándar del proyecto para יהוה.
  - Se prefirió “pueblo” como singular colectivo para הָעָם.
  - Se conservó la metáfora “en mi mano” por coherencia bíblica y transparencia textual.
  - Se empleó “dedicaré ... a la destrucción” para reflejar ḥerem sin sustituirlo por vocabulario eclesiástico tradicional.
  - La puntuación y las comillas siguen normas del español editorial moderno.
