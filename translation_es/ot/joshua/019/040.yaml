review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido general del hebreo: asignación a la tribu de Dan, según sus clanes, y la salida del séptimo lote. Sin embargo, «la séptima suerte» no preserva tan fielmente el referente de הַגּוֹרָל («el lote/la suerte» como sustantivo de sorteo) porque en español la colocación más natural y precisa en este contexto de repartos territoriales es «el séptimo lote» o «la séptima suerte echada», no «salió la séptima suerte».'
  spanish_quality_summary: El español es claro y legible, pero «salió la séptima suerte» suena algo poco idiomático en contexto de reparto de tierras y puede sugerir fortuna más que lote sorteado. «Lote» mejora la precisión semántica y la naturalidad en una narración de asignación territorial.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. «los hijos de Dan» y «según sus clanes» concuerdan bien con las decisiones del POB. El único ajuste recomendado es גּוֹרָל: en este contexto de Josué, «lote» alinea mejor con el campo semántico de reparto por sorteo que «suerte».'
  issues:
  - severity: medium
    issue: «la séptima suerte» para הַגּוֹרָל הַשְּׁבִיעִי
    rationale: Aunque «suerte» puede usarse en español bíblico, en este pasaje de asignación territorial «lote» comunica mejor el objeto/resultante del sorteo y evita una lectura de 'fortuna'. Además, «salió el séptimo lote» suena más natural y preciso.
  revised_spanish_text: A la tribu de los hijos de Dan, según sus clanes, salió el séptimo lote.
  revision_rationale: Se conserva la sintaxis y el contenido del original, pero se reemplaza «la séptima suerte» por «el séptimo lote» para representar mejor גּוֹרָל en un contexto de reparto territorial y mejorar la naturalidad del español.
