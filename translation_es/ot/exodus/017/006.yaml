  to: He aquí[a], yo estaré delante de ti allí, sobre la roca en Horeb; y golpearás la roca, y de ella saldrá agua, y el pueblo beberá. Y Moisés hizo así, en presencia de los ancianos de Israel.
  rationale: 'Se ajusta el texto para reflejar con mayor fidelidad y naturalidad las decisiones auditadas: «roca» en lugar de «peña» por claridad, «agua» en lugar de «aguas» para no añadir matiz no explicitado, «yo estaré delante de ti» para un español más fluido, y «Moisés hizo así» como fórmula narrativa más idiomática. Se conserva la nota sobre la posible lectura presente del participio.'
