translation:
  language: es
  text: Y le arrojó piedras[a] a David y a todos los servidores del rey David, mientras todo el pueblo y todos los valientes estaban a su derecha y a su izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «apedreó a David y a todos los servidores del rey David». El verbo hebreo puede expresarse de manera más literal así, pero en español esa redacción puede sugerir una lapidación formal como ejecución, en vez de un ataque hostil con piedras.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְסַקֵּל
  english_pob_choice: he threw stones at
  chosen_spanish: le arrojó piedras
  alternatives_spanish:
  - lo apedreó
  - le tiró piedras
  lexicon: HALOT
  rationale: El piel de סקל admite la idea de lanzar piedras contra alguien. En español, «apedrear» puede sugerir ejecución judicial por lapidación; aquí el contexto es una agresión hostil, no una ejecución. «Le arrojó piedras» conserva el acto concreto y evita esa ambigüedad.
- source_word: בָּאֲבָנִים
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - con piedras
  lexicon: HALOT
  rationale: El hebreo expresa el instrumento con la preposición y el sustantivo. En español, el complemento se integra naturalmente con el verbo «arrojar», manteniendo el sentido instrumental sin forzar una construcción literal.
- source_word: עַבְדֵי
  english_pob_choice: servants
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - sirvientes
  lexicon: HALOT
  rationale: El proyecto POB suele preferir «esclavo» cuando el hebreo עבד conserva fuerza léxica de dependencia o servidumbre. Aunque aquí el contexto es cortesano, el texto habla de los hombres que pertenecen al servicio del rey; «esclavos» preserva mejor esa relación de sujeción que «sirvientes» o «siervos».
- source_word: הַמֶּלֶךְ דָּוִד
  english_pob_choice: King David
  chosen_spanish: el rey David
  alternatives_spanish:
  - David, el rey
  - el rey, David
  lexicon: HALOT
  rationale: La construcción identifica a David por su título real. En español, «el rey David» es natural y mantiene tanto el título como el nombre propio.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todo el pueblo de guerra
  lexicon: HALOT
  rationale: עָם designa aquí al grupo que acompaña a David. «Todo el pueblo» conserva el alcance amplio del hebreo sin reducirlo innecesariamente a tropas o soldados.
- source_word: הַגִּבֹּרִים
  english_pob_choice: the mighty men
  chosen_spanish: todos los valientes
  alternatives_spanish:
  - todos los hombres fuertes
  - los guerreros
  lexicon: HALOT
  rationale: גִּבּוֹרִים puede referirse a guerreros de élite, pero el español idiomático y transparente aquí es «valientes». Mantiene la fuerza y el valor militar implícitos sin añadir una terminología más técnica de la que exige el hebreo.
- source_word: מִימִינוֹ וּמִשְּׂמֹאלוֹ
  english_pob_choice: at his right hand and at his left
  chosen_spanish: a su derecha y a su izquierda
  alternatives_spanish:
  - a su lado derecho y a su lado izquierdo
  - a su diestra y a su siniestra
  lexicon: HALOT
  rationale: La expresión indica posición a ambos lados de alguien. En español, «a su derecha y a su izquierda» comunica claramente la ubicación alrededor de David sin recurrir a formulaciones más arcaicas.
translation_notes:
  revision_awareness: La versión en inglés del POB optó por «he threw stones at» para evitar que «stoned» sugiriera ejecución formal; esta versión española sigue la misma decisión auditada con «le arrojó piedras» y preserva en nota la alternativa literal «apedreó», explicando la posible ambigüedad. El resto del verso mantiene correspondencia estrecha con el hebreo sin añadir información.
  spanish_consistency_notes:
  - Se mantiene «piedras» como sustantivo concreto para בָּאֲבָנִים, en paralelo con el inglés auditado.
  - Se usa «rey David» / «el rey David» de manera consistente con la identificación titulada del texto fuente.
  - «Valientes» conserva el matiz de guerreros de élite sin introducir una glosa interpretativa más fuerte.
  - La posición «a su derecha y a su izquierda» refleja el sufijo de 3ms en el hebreo y la imagen de acompañamiento alrededor de David.
