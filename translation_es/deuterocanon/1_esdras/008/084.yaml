translation:
  language: es
  text: Y todo lo que nos acontece viene a causa de nuestras malas obras y de nuestros grandes pecados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo lo que nos sobreviene ocurre a causa de nuestras malas obras y de nuestros grandes pecados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ συμβαίνοντα πάντα
  english_pob_choice: everything that happens
  chosen_spanish: todo lo que nos acontece
  alternatives_spanish:
  - todo lo que sucede
  - todo lo que nos pasa
  lexicon: LSJ
  rationale: El participio sustantivado con πάντα expresa la totalidad de los acontecimientos que sobrevienen. «Nos acontece» conserva el matiz de sucederle algo a alguien y evita una repetición inmediata con el verbo principal.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  - sobre nosotros
  lexicon: BDAG
  rationale: El dativo marca a los afectados por los acontecimientos. En español, el pronombre átono «nos» es natural y fiel al valor relacional del dativo en este contexto.
- source_word: γίνεται
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - acontece
  - se produce
  - ocurre
  lexicon: BDAG
  rationale: Aquí γίνεται expresa que lo que ocurre a la comunidad tiene una procedencia causal. «Viene» reproduce de manera sobria esa relación de resultado sin forzar una repetición de «acontece».
- source_word: διὰ
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  - por causa de
  lexicon: BDAG
  rationale: Con acusativo, διά expresa causa. «A causa de» es claro, actual y preserva la atribución causal explícita del texto.
- source_word: τὰ ἔργα ἡμῶν τὰ πονηρὰ
  english_pob_choice: our evil deeds
  chosen_spanish: nuestras malas obras
  alternatives_spanish:
  - nuestras obras malas
  - nuestras obras perversas
  - nuestras malas acciones
  lexicon: BDAG
  rationale: ἔργα puede rendirse como «obras» o «hechos». «Malas obras» mantiene la fuerza ética de πονηρά y conserva un registro bíblico natural en español, sin suavizar el juicio moral.
- source_word: τὰς μεγάλας ἁμαρτίας
  english_pob_choice: our great sins
  chosen_spanish: nuestros grandes pecados
  alternatives_spanish:
  - nuestros graves pecados
  - nuestros pecados grandes
  - nuestros muchos pecados
  lexicon: BDAG
  rationale: μεγάλας significa literalmente «grandes», subrayando magnitud o gravedad. «Grandes pecados» sigue de cerca el adjetivo del griego y conserva la intensidad sin interpretarlo como «muchos».
theological_decisions:
- issue: Causal attribution of national suffering
  english_pob_reading: The verse states that what has happened to the people is because of their evil deeds and great sins.
  chosen_spanish_reading: El versículo afirma que todo lo que nos acontece viene a causa de nuestras malas obras y de nuestros grandes pecados.
  alternative_spanish_readings:
  - El versículo dice que lo que nos pasa es por nuestros pecados.
  - El versículo deja implícita la causa de lo que ocurre al pueblo.
  rationale: El griego usa διά con acusativo para expresar causa de manera explícita. La traducción debe conservar esa confesión de culpabilidad colectiva sin atenuarla ni convertirla en una formulación más vaga.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: No se aplicaron revisiones adicionales; la versión sigue de cerca el griego de Swete y mantiene la lectura causal explícita indicada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Dios»/«Yahvé» fuera del versículo porque no aparecen en el texto fuente.
  - Se prefirió «malas obras» para ἔργα πονηρά, en línea con una equivalencia bíblica natural en español.
  - Se conservó «grandes pecados» para μεγάλας ἁμαρτίας, evitando reinterpretar el adjetivo como «muchos» sin base textual.
  - La nota al pie ofrece una alternativa cercana al inglés auditado sin introducir una paráfrasis más libre.
