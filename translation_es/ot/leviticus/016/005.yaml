translation:
  language: es
  text: Y de la congregación de los hijos de Israel tomará dos machos cabríos como ofrenda por el pecado[a][b], y un carnero para holocausto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «los israelitas» / «el pueblo de Israel». Hebreo: «los hijos de Israel».'
    reason: lexical_alternative
  - marker: b
    text: O «como ofrenda de purificación». El término hebreo חַטָּאת en Levítico puede denotar la ofrenda que trata con el pecado y la impureza ritual.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמֵאֵת
  english_pob_choice: And from
  chosen_spanish: Y de
  alternatives_spanish:
  - Y desde
  - Y de parte de
  lexicon: HALOT
  rationale: La preposición compuesta expresa procedencia y continuación discursiva; «Y de» conserva esa relación de origen de manera natural en español bíblico moderno.
- source_word: עֲדַת
  english_pob_choice: congregation
  chosen_spanish: congregación
  alternatives_spanish:
  - asamblea
  - comunidad
  lexicon: HALOT
  rationale: En este contexto levítico, «congregación» comunica bien al pueblo reunido para el culto y mantiene el registro técnico del pasaje.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión literal del hebreo. Aunque refiere corporativamente al pueblo, «hijos de Israel» refleja con mayor fidelidad la forma del original.
- source_word: יִקַּח
  english_pob_choice: he shall take
  chosen_spanish: tomará
  alternatives_spanish:
  - deberá tomar
  - ha de tomar
  lexicon: HALOT
  rationale: El imperfecto en legislación ritual funciona como instrucción; «tomará» transmite bien el valor prescriptivo sin recargar el español.
- source_word: שְׁנֵי
  english_pob_choice: two
  chosen_spanish: dos
  lexicon: HALOT
  rationale: Numeral cardinal directo y sin ambigüedad.
- source_word: שְׂעִירֵי עִזִּים
  english_pob_choice: male goats
  chosen_spanish: machos cabríos
  alternatives_spanish:
  - cabras macho
  - dos cabríos
  lexicon: HALOT
  rationale: La expresión designa machos de la especie caprina; «machos cabríos» es preciso, natural y conserva el rasgo sexual requerido para la ofrenda.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para expiación
  alternatives_spanish:
  - para una ofrenda por el pecado
  - como ofrenda por el pecado
  lexicon: HALOT
  rationale: En español, «expiación» puede comunicar mejor la función ritual de la חַטָּאת sin perder el vínculo con el tratamiento del pecado/impureza. Se mantiene la tensión semántica sin imponer una sola glosa interpretativa.
- source_word: וְאַיִל אֶחָד
  english_pob_choice: and one ram
  chosen_spanish: y un carnero
  alternatives_spanish:
  - y un solo carnero
  - y un macho carnero
  lexicon: HALOT
  rationale: «Carnero» es el equivalente natural y claro de אַיִל en este contexto sacrificial; el numeral se sobreentiende con precisión en español.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - para un holocausto
  - para ofrenda quemada
  lexicon: HALOT
  rationale: «Holocausto» es el término tradicional y todavía inteligible para עֹלָה; en español conserva la idea de ofrenda totalmente consumida, sin necesidad de parafrasear.
theological_decisions:
- issue: Sentido de חַטָּאת en contexto sacrificial
  english_pob_reading: sin offering; the offering that deals with sin and ritual impurity
  chosen_spanish_reading: expiación
  alternative_spanish_readings:
  - ofrenda por el pecado
  - purificación
  rationale: La POB inglesa preserva la doble posibilidad semántica. En español, «expiación» permite reflejar la función ritual amplia de la ofrenda sin cerrar la discusión entre pecado e impureza; la alternativa tradicional queda reconocible por contexto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: Expresión masculina corporativa בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se preserva la formulación masculina del hebreo como expresión colectiva del pueblo del pacto, siguiendo la política de fidelidad formal cuando el texto la usa de manera estable.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto inglés auditado no muestra cambios sustantivos en la revisión más reciente; se mantiene la misma línea de lectura y las notas alternativas relevantes se conservan en español de forma equivalente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva el registro sacrificial técnico con «holocausto» y «expiación», evitando modernizaciones que borrarían la terminología cultual.
  - «Hijos de Israel» se traduce de forma literal por consistencia con la política de fidelidad al hebreo, mientras que la nota ofrece la opción idiomática «israelitas».
