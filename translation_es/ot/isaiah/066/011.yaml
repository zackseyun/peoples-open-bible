translation:
  language: es
  text: para que mamen y queden satisfechos del pecho consolador[a][b] de ella, para que beban profundamente y se deleiten de la abundancia[c] de su gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'del pecho de sus consolaciones'; el hebreo es más literalmente 'del pecho de sus consuelos/consolaciones'.
    reason: lexical_alternative
  - marker: b
    text: O 'saquen' o 'chupen'; el verbo hebreo es muy vívido y continúa la imaginería de lactancia.
    reason: lexical_alternative
  - marker: c
    text: El sustantivo hebreo aquí también puede entenderse como 'plenitud' o 'desborde'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: Expresa con naturalidad el valor final/purpose del hebreo en ambos miembros y es idiomático en español actual.
- source_word: תִּינְקוּ
  english_pob_choice: you may nurse
  chosen_spanish: maman
  alternatives_spanish:
  - mamen
  - chupen del pecho
  - amamanten
  lexicon: HALOT
  rationale: El verbo hebreo es vívido y conserva la imagen de alimentación al pecho; 'maman' mantiene esa fuerza sin volverse demasiado técnico.
- source_word: וּשְׂבַעְתֶּם
  english_pob_choice: and be satisfied
  chosen_spanish: queden satisfechos
  alternatives_spanish:
  - se sacien
  - queden saciados
  - se llenen
  lexicon: HALOT
  rationale: '''Queden satisfechos'' comunica plenitud recibida por nutrición y suena natural en español, preservando el matiz de saciedad.'
- source_word: מִשֹּׁד
  english_pob_choice: from her breast
  chosen_spanish: de sus pechos
  alternatives_spanish:
  - de su pecho
  - del pecho de ella
  - de los pechos
  lexicon: HALOT
  rationale: El contexto materno de Sion/Jerusalén admite el plural español para reflejar la imagen de amamantar sin perder la referencia corporal.
- source_word: תַּנְחֻמֶיהָ
  english_pob_choice: comforting
  chosen_spanish: consoladores
  alternatives_spanish:
  - de sus consolaciones
  - de su consuelo
  - que consuelan
  lexicon: HALOT
  rationale: La forma hebrea plural ligada al pecho funciona adjetivalmente; 'consoladores' conserva el sentido de consuelo sin la rigidez de una construcción literal.
- source_word: תָּמֹצּוּ
  english_pob_choice: you may drink deeply
  chosen_spanish: chupen profundamente
  alternatives_spanish:
  - saquen hasta el fondo
  - mamen profundamente
  - beban a fondo
  lexicon: HALOT
  rationale: El verbo es intenso y continúa la imaginería de lactancia; 'chupen profundamente' preserva la fuerza del hebreo mejor que 'beber', que suavizaría la metáfora.
- source_word: וְהִתְעַנַּגְתֶּם
  english_pob_choice: and delight yourselves
  chosen_spanish: se deleiten
  alternatives_spanish:
  - se deleiten a sí mismos
  - gocen
  - se regocijen
  lexicon: HALOT
  rationale: El hitpael expresa participación/reflexividad en el gozo; 'se deleiten' mantiene el matiz de disfrute intenso y es claro en español.
- source_word: מִזִּיז
  english_pob_choice: in the abundance of
  chosen_spanish: de la abundancia
  alternatives_spanish:
  - de la plenitud
  - del desborde
  - del exceso
  lexicon: HALOT
  rationale: El sustantivo es difícil; la tradición auditada en inglés lo toma como 'abundance/fullness/overflow'. 'Abundancia' es la opción más sobria y fiel en español.
- source_word: כְּבוֹדָהּ
  english_pob_choice: her glory
  chosen_spanish: de su gloria
  alternatives_spanish:
  - de su esplendor
  - de su honra
  lexicon: HALOT
  rationale: '''Gloria'' es la correspondencia más estable en Isaías para כבוד y conserva la elevación teológica y literaria del pasaje.'
theological_decisions:
- issue: Imaginería maternal de Jerusalén/Sion
  english_pob_reading: Retain the maternal nursing imagery straightforwardly as referring to Jerusalem/Zion in context, without allegorizing beyond the text.
  chosen_spanish_reading: Mantener la imagen maternal de Sion/Jerusalén de forma directa, sin abstraerla ni suavizarla.
  alternative_spanish_readings:
  - Reducirla a una imagen general de consuelo divino
  - Volverla una paráfrasis menos corporal
  rationale: El texto continúa la personificación de Jerusalén como madre que alimenta y consuela; la traducción debe preservar esa tensión imaginativa y corporal.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión literaria y teológica en lugar de resolverla
- issue: 'Sentido de la segunda cola: nutrición intensa versus bebida'
  english_pob_reading: you may drink deeply / draw out / suck out
  chosen_spanish_reading: chupen profundamente
  alternative_spanish_readings:
  - beban profundamente
  - saquen profundamente
  - mamen profundamente
  rationale: El hebreo continúa la metáfora de lactancia y extracción; 'chupen profundamente' conserva la fuerza verbal y evita diluir la imagen en una bebida genérica.
  doctrine_reference: Fidelidad semántica al campo léxico de ינק/מוץ y a la continuidad imagética del verso
- issue: מִזִּיז como abundancia/plenitud/overflow
  english_pob_reading: abundance / fullness / overflow
  chosen_spanish_reading: abundancia
  alternative_spanish_readings:
  - plenitud
  - desborde
  - derrame
  rationale: Dado el acuerdo auditado del inglés y la rareza del término, 'abundancia' es la solución más prudente y publicable en español.
  doctrine_reference: Principio de traducción con control de ambigüedad léxica sin exceder la evidencia
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada que corrigió la segunda preposición para reflejar el repetido מִן ('de') en la cola final. En español se mantuvo 'de la abundancia de su gloria' para conservar la correspondencia con el hebreo y la revisión más reciente. Además, se decidió no traducir el segundo miembro con 'beban' para no borrar la continuidad de la metáfora de lactancia, aunque el inglés haya optado por 'drink deeply' como equivalencia dinámica.
  spanish_consistency_notes:
  - Se usa 'gloria' para כבוד conforme al uso estable en Isaías.
  - Se usa 'abundancia' para מִזִּיז por ser la opción más sobria frente a alternativas como 'plenitud' o 'desborde'.
  - Se preserva la imaginería corporal de amamantamiento en ambos hemistiquios, coherente con la lectura auditada del inglés.
  - Los marcadores de nota se colocan solo en el sintagma que admite alternativas léxicas reales en español.
