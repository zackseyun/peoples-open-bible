id: COL.2.2
reference: Colossians 2:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἵνα παρακληθῶσιν αἱ καρδίαι αὐτῶν, ⸀συμβιβασθέντες ἐν ἀγάπῃ καὶ εἰς ⸂πᾶν πλοῦτος⸃ τῆς πληροφορίας τῆς συνέσεως, εἰς ἐπίγνωσιν τοῦ μυστηρίου τοῦ ⸀θεοῦ, Χριστοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/002.yaml
  text: so that their hearts may be encouraged, having been knit together in love and unto all the riches of the full assurance of understanding, unto the knowledge of the mystery of God, Messiah,
translation:
  language: ko
  text: 이는 그들의 마음이 격려를 받고, 사랑 안에서 함께 엮여, 깨달음의 충만한 확신의 모든 풍성함에 이르며, 하나님의 비밀, 곧 메시아[a]를 아는 지식[b]에 이르게 하려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 본문은 「하나님의 비밀, 메시아」로 짧고 압축적이다. 「메시아」를 동격으로 본 번역에 따른다. 즉 하나님의 비밀이 곧 메시아이심을 가리킨다.
    reason: alternative_reading
  - marker: b
    text: 또는 「온전한 앎」. 헬라어 ἐπίγνωσις는 깊은 인식의 어감을 담을 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακληθῶσιν
  english_pob_choice: may be encouraged
  chosen_korean: 격려를 받고
  alternatives_korean:
  - 위로를 받고
  - 강건하게 되고
  lexicon: BDAG
  rationale: 본 문맥은 신자들 마음의 내적 강건과 위로를 가리킨다. 「격려」가 가장 포괄적이다.
- source_word: καρδίαι
  english_pob_choice: hearts
  chosen_korean: 마음
  alternatives_korean:
  - 심정
  - 내면
  lexicon: BDAG
  rationale: 성경 인간학의 표준 어휘.
- source_word: συμβιβασθέντες ἐν ἀγάπῃ
  english_pob_choice: having been knit together in love
  chosen_korean: 사랑 안에서 함께 엮여
  alternatives_korean:
  - 사랑으로 하나 되어
  - 사랑 안에서 결속되어
  lexicon: BDAG
  rationale: 부정과거 수동 분사. 영어 POB의 「knit together」의 관계적 결속 이미지를 살린다.
- source_word: εἰς πᾶν πλοῦτος τῆς πληροφορίας τῆς συνέσεως
  english_pob_choice: unto all the riches of the full assurance of understanding
  chosen_korean: 깨달음의 충만한 확신의 모든 풍성함에 이르며
  alternatives_korean:
  - 통찰의 온전한 확신의 모든 풍요에
  - 이해의 충만한 확신의 풍성함에 이르며
  lexicon: BDAG
  rationale: 반복되는 εἰς를 「~에 이르며」로 옮긴다. πληροφορία는 「충만한 확신」으로 정립된 표현.
- source_word: εἰς ἐπίγνωσιν τοῦ μυστηρίου τοῦ θεοῦ, Χριστοῦ
  english_pob_choice: unto the knowledge of the mystery of God, Messiah
  chosen_korean: 하나님의 비밀, 곧 메시아를 아는 지식에 이르게
  alternatives_korean:
  - 하나님의 비밀의 앎에 이르게, 곧 메시아
  - 하나님의 비밀 — 메시아 — 의 지식에
  lexicon: BDAG
  rationale: 동격적 「곧 메시아」로 압축 구문을 풀어 옮긴다. Χριστοῦ는 칭호로 「메시아」.
theological_decisions:
- issue: 「하나님의 비밀, 메시아」의 동격 관계
  chosen_reading: 하나님의 비밀이 곧 메시아이심
  alternative_readings:
  - 하나님과 메시아의 비밀(연결 구조로 해석)
  - 사본의 긴 이독을 따른 「하나님 곧 아버지와 메시아의」
  rationale: 제공된 SBLGNT 본문은 짧은 이독을 지지하며, Χριστοῦ가 μυστηρίου/θεοῦ에 동격적으로 붙는다. 한국어로는 「곧」으로 동격을 명시한다.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy; Affirmations'
