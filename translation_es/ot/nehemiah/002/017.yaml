translation:
  language: es
  text: 'Entonces les dije: «Ustedes ven la calamidad[a] en que estamos[b]: Jerusalén está en ruinas, y sus puertas han sido quemadas con fuego. Vengan, reconstruyamos la muralla de Jerusalén, para que ya no seamos un oprobio[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la aflicción» o «la desgracia» para «la calamidad». El término hebreo puede denotar adversidad o ruina, no maldad moral en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «en la cual estamos» o «que estamos padeciendo». El hebreo expresa la condición en que se encuentra la comunidad.
    reason: lexical_alternative
  - marker: c
    text: O «una vergüenza» o «una deshonra». El hebreo puede referirse a oprobio público, deshonra o motivo de burla.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרָעָה
  english_pob_choice: the trouble
  chosen_spanish: la calamidad
  alternatives_spanish:
  - la aflicción
  - la desgracia
  - el mal
  lexicon: HALOT
  rationale: En este contexto, רָעָה no señala maldad moral sino una situación adversa y devastada. «Calamidad» comunica con naturalidad el estado lamentable del pueblo sin sugerir pecado como idea principal.
- source_word: אֲשֶׁר אֲנַחְנוּ בָהּ
  english_pob_choice: we are in
  chosen_spanish: en que estamos
  alternatives_spanish:
  - en la cual estamos
  - que estamos padeciendo
  - en la que nos hallamos
  lexicon: HALOT
  rationale: La expresión hebrea describe la condición presente en que se encuentra la comunidad. «En que estamos» conserva la idea de situación actual y suena natural en español.
- source_word: חֲרֵבָה
  english_pob_choice: lies in ruins
  chosen_spanish: está en ruinas
  alternatives_spanish:
  - está desolada
  - está destruida
  lexicon: HALOT
  rationale: El adjetivo describe la ciudad devastada físicamente. «Está en ruinas» reproduce bien el estado visible de Jerusalén y mantiene el tono idiomático.
- source_word: וּשְׁעָרֶיהָ נִצְּתוּ בָאֵשׁ
  english_pob_choice: have been burned with fire
  chosen_spanish: sus puertas han sido quemadas con fuego
  alternatives_spanish:
  - sus puertas fueron quemadas
  - sus puertas han ardido en fuego
  - sus puertas han sido incendiadas
  lexicon: HALOT
  rationale: Se preserva el énfasis del hebreo en el fuego como agente de destrucción. «Quemadas con fuego» es más literal que solo «quemadas» y refleja bien la construcción original.
- source_word: לְכוּ
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vayan
  - Vamos
  - Acérquense
  lexicon: HALOT
  rationale: Aunque el verbo básico puede ser «ir», aquí funciona como exhortación a actuar. En español, «Vengan» transmite mejor la invitación colectiva y el llamado inmediato.
- source_word: וְנִבְנֶה
  english_pob_choice: let us rebuild
  chosen_spanish: reconstruyamos
  alternatives_spanish:
  - edifiquemos de nuevo
  - levantemos otra vez
  - construyamos
  lexicon: HALOT
  rationale: La forma cohortativa expresa resolución compartida, y el contexto requiere restauración de una estructura ya existente. «Reconstruyamos» comunica esa idea de restaurar la muralla.
- source_word: חוֹמַת יְרוּשָׁלִַם
  english_pob_choice: the wall of Jerusalem
  chosen_spanish: la muralla de Jerusalén
  alternatives_spanish:
  - el muro de Jerusalén
  - la muralla de la ciudad de Jerusalén
  lexicon: HALOT
  rationale: «Muralla» es un término natural y preciso para una fortificación urbana. Mantiene el sentido defensivo del constructo hebreo sin sonar arcaico.
- source_word: וְלֹא נִהְיֶה עוֹד חֶרְפָּה
  english_pob_choice: so that we may no longer be a reproach
  chosen_spanish: para que ya no seamos más un oprobio
  alternatives_spanish:
  - para que ya no seamos más una vergüenza
  - para que ya no seamos más objeto de burla
  - y no sigamos siendo una deshonra
  lexicon: HALOT
  rationale: חֶרְפָּה denota vergüenza pública, reproche o deshonra. «Oprobio» conserva ese peso comunitario y público; se eligió una formulación que mantiene la fuerza del término sin suavizarla demasiado.
theological_decisions:
- issue: El sentido de הָרָעָה en un contexto de devastación comunitaria
  english_pob_reading: the trouble; possible nuance of distress or misery rather than moral evil
  chosen_spanish_reading: la calamidad; entendido como desgracia o aflicción, no como mal moral
  alternative_spanish_readings:
  - el mal
  - la desgracia
  - la aflicción
  rationale: La escena trata de la ruina de Jerusalén y la vulnerabilidad del pueblo. Por eso la traducción española evita «mal» como si señalara maldad ética, y conserva el sentido de desgracia histórica y comunitaria.
  doctrine_reference: Sentido léxico-contextual; no afecta una doctrina específica.
- issue: La carga pública de חֶרְפָּה
  english_pob_reading: reproach / disgrace / object of scorn
  chosen_spanish_reading: oprobio
  alternative_spanish_readings:
  - vergüenza
  - deshonra
  - escarnio
  rationale: El término hebreo expresa vergüenza pública y deshonra comunitaria. «Oprobio» conserva esa fuerza y permite mantener la resonancia social del reproche, sin reducirla solo a emoción interna.
  doctrine_reference: Honor/vergüenza en el marco del pueblo del pacto; no implica una doctrina dogmática específica.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo de Nehemías 2:17 y el expediente auditado en inglés. Se mantuvieron las decisiones clave del POB en cuanto a רָעָה como calamidad/trouble, חֲרֵבָה como ruinas, נִצְּתוּ בָאֵשׁ como quemadas con fuego, לְכוּ como exhortación («Vengan»), וְנִבְנֶה como reconstrucción conjunta, y חֶרְפָּה como vergüenza pública/oprobio. No hubo revisiones previas aplicadas en el registro base.
  spanish_consistency_notes:
  - Se usa puntuación y comillas españolas.
  - Se prefirió «muralla» por claridad en español contemporáneo, manteniendo la referencia a fortificación.
  - Se conservó la fórmula exhortativa en plural para reflejar el llamado colectivo del hebreo.
  - Se evitó «SEÑOR» y otros términos no presentes en este versículo.
  - El estilo es formal y apto para lectura eclesial sin recurrir a calcos innecesarios.
