translation:
  language: es
  text: Moisés[a] lo ordenó y lo ungió con aceite santo. Fue para él un pacto eterno, y para su descendencia[c][b], mientras duren los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «llenó su mano», un modismo sacerdotal para instalar u ordenar a alguien en el oficio; el griego también dice «llenó las manos».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «como los días del cielo»; la frase expresa duración indefinida y cósmica.'
    reason: lexical_alternative
  - marker: c
    text: 'El paralelo griego continúa más allá del hebreo conservado aquí: «para servirle y ejercer el sacerdocio, y para bendecir a su pueblo en su nombre». La traducción principal sigue el hebreo conservado como testigo primario.'
    reason: alternative_reading
lexical_decisions:
- source_word: וימלא משה את ידו / ἐπλήρωσεν Μωυσῆς τὰς χεῖρας
  english_pob_choice: ordained him
  chosen_spanish: lo ordenó
  alternatives_spanish:
  - le llenó la mano
  - lo instaló
  - lo consagró
  lexicon: HALOT; LXX parallel confirms the priestly idiom
  rationale: La expresión hebrea «llenar la mano» es un modismo técnico de investidura sacerdotal. En español, «lo ordenó» comunica de forma natural la instalación en el oficio sin perder el sentido cultual, y evita una literalidad opaca. El paralelo griego también apoya el trasfondo del modismo.
- source_word: וימשחהו / ἔχρισεν αὐτόν
  english_pob_choice: anointed him
  chosen_spanish: lo ungió
  alternatives_spanish:
  - lo consagró por unción
  - lo aplicó con aceite
  lexicon: HALOT
  rationale: El verbo hebreo משח y el griego ἔχρισεν significan ungir. «Lo ungió» preserva directamente la acción ritual y es claro en español eclesial contemporáneo.
- source_word: בשמן הקדש / ἐν ἐλαίῳ ἁγίῳ
  english_pob_choice: with holy oil
  chosen_spanish: con aceite santo
  alternatives_spanish:
  - con el aceite santo
  - con aceite sagrado
  lexicon: HALOT
  rationale: «Aceite santo» refleja con precisión el adjetivo de santidad del hebreo y del griego. Se evita «sagrado» porque aquí el lenguaje bíblico de santidad es más directo y consistente con la terminología del texto.
- source_word: ברית עולם / διαθήκην αἰώνιον
  english_pob_choice: an everlasting covenant
  chosen_spanish: un pacto eterno
  alternatives_spanish:
  - un pacto perpetuo
  - un pacto para siempre
  lexicon: HALOT
  rationale: «Pacto» es una opción válida en español para ברית/διαθήκη y mantiene el registro bíblico sin oscurecer el sentido. «Eterno» conserva la fuerza durativa de αἰώνιον y del hebreo עולם. Se prefiere «pacto» frente a «alianza» por la continuidad terminológica bíblica y por la cercanía al uso de la POB.
- source_word: ולזרעו / τῷ σπέρματι αὐτοῦ
  english_pob_choice: and for his offspring
  chosen_spanish: y para su descendencia
  alternatives_spanish:
  - y para su linaje
  - y para su simiente
  lexicon: HALOT
  rationale: «Descendencia» comunica en español el sentido colectivo de זרע / σπέρμα sin la ambigüedad o el arcaísmo de «simiente». Mantiene el alcance genealógico del texto.
- source_word: כימי שמים / ἐν ἡμέραις οὐρανοῦ
  english_pob_choice: for as long as the heavens endure
  chosen_spanish: por todos los días del cielo
  alternatives_spanish:
  - mientras duren los cielos
  - como los días del cielo
  lexicon: HALOT
  rationale: 'La frase hebrea es literalmente idiomática: «como los días del cielo». Se conserva la imagen cósmica con una formulación idiomática en español que suena natural. «Por todos los días del cielo» sigue de cerca la estructura semítica sin borrar la duración indefinida que expresa.'
theological_decisions:
- issue: Alcance del pacto sacerdotal
  english_pob_reading: The covenant is stated as belonging to Aaron and his offspring in enduring terms, without importing later doctrinal claims about unconditional perpetuity beyond the verse's wording.
  chosen_spanish_reading: El pacto se presenta como concedido a Aarón/Moisés en términos duraderos y extendido a su descendencia, sin añadir afirmaciones doctrinales posteriores sobre una perpetuidad absoluta fuera de lo que el versículo dice.
  alternative_spanish_readings:
  - Un sacerdocio absolutamente perpetuo sin matiz
  - Una vigencia solo limitada a la vida de Aaron/Moisés
  rationale: El texto afirma duración real y ligada al linaje, pero no obliga a resolver de antemano tensiones canónicas o históricas. La traducción preserva ese alcance sin ampliarlo ni reducirlo.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica; no resolverla por adelantado ni importar afirmaciones ajenas al versículo.'
- issue: Uso de un verbo dinámico para el modismo sacerdotal
  english_pob_reading: Translate the idiom as 'ordained him' in the main text.
  chosen_spanish_reading: Se traduce el modismo como «lo ordenó» en el texto principal, con el sentido técnico de investidura sacerdotal.
  alternative_spanish_readings:
  - le llenó la mano
  - lo instaló
  - lo consagró
  rationale: En español, «ordenar» comunica bien la instalación en un oficio. El modismo literal se preserva implícitamente por el trasfondo hebreo y griego, pero no se fuerza en la línea principal porque sería poco natural.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima; claridad sin borrar el modismo fuente.'
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del expediente inglés: mantiene el modismo sacerdotal con una traducción funcional en el texto principal, conserva la unción con aceite santo, y expresa la duración del pacto y de la descendencia con una formulación natural en español sin perder la imagen semítica. No se incorporó la expansión griega sobre «ministrar» y «bendecir» porque el hebreo conservado no la incluye.'
  spanish_consistency_notes:
  - Se mantiene «aceite santo» y no «aceite sagrado» para conservar la santidad ritual como término bíblico recurrente.
  - Se usa «pacto» para ברית/διαθήκη por consistencia bíblica y por cercanía al registro de la POB.
  - «Descendencia» traduce tanto el hebreo זרע como el griego σπέρμα sin introducir connotaciones modernas ajenas.
  - La imagen final «días del cielo» queda explicada en nota para evitar que el lector la tome literalmente como cronología astronómica.
