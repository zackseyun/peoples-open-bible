review_pass:
  verdict: revise
  source_alignment_summary: El borrador transmite correctamente el contraste adversativo, el nombre divino Yahvé, la relación de pacto en «su Dios», y la comparación «tal como lo han hecho hasta este día». Sin embargo, «deben adherirse» desplaza innecesariamente la fuerza verbal de תִּדְבָּקוּ, que en este contexto exhortativo y de lealtad de pacto se expresa mejor como «aferrarse» o «mantenerse unidos a».
  spanish_quality_summary: El español es claro y digno, pero «adherirse a Yahvé» suena algo abstracto e institucional en contexto bíblico. «Aferrarse a Yahvé» es más natural, más idiomático y preserva mejor la fuerza relacional/covenantal destacada en la nota inglesa. También conviene evitar la coma entre «Yahvé» y «su Dios», ya que no es estrictamente aposición explicativa sino una sola frase nominal.
  glossary_alignment: 'Alinea bien con la terminología del proyecto al usar «Yahvé» para יְהוָה y «Dios» para אֱלֹהֵיכֶם. La principal mejora es léxica: para דבק el proyecto inglés privilegia «cling», y en español «aferrarse a» refleja mejor esa cercanía firme que «adherirse a».'
  issues:
  - severity: medium
    issue: «deben adherirse» debilita y abstrae el sentido de דבק
    rationale: El verbo hebreo en contexto de pacto expresa apego firme, lealtad exclusiva y cercanía. «Adherirse» en español puede sonar conceptual o administrativo; «aferrarse» conserva mejor la imagen y la fuerza exhortativa.
  - severity: low
    issue: Coma innecesaria en «Yahvé, su Dios»
    rationale: En español fluye mejor «Yahvé su Dios» como sintagma continuo. La coma hace sonar «su Dios» como inciso explicativo, menos natural aquí.
  - severity: low
    issue: La nota léxica no coincide del todo con la mejor opción española
    rationale: Si se revisa el verbo principal a «aferrarse», la nota debe reflejar primero esa alternativa y mantener «adherirse» como opción secundaria.
  revised_spanish_text: Pero ustedes deben aferrarse a Yahvé su Dios[a], tal como lo han hecho hasta este día.
  revised_footnotes:
