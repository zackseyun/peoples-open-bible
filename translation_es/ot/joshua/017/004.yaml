revisions:
- from: 'Entonces ellas se acercaron[a] delante de Eleazar el sacerdote, delante de Josué hijo de Nun y delante de los líderes, diciendo: «Yahvé mandó a Moisés darnos una herencia[b] entre nuestros hermanos[c]». Así les dio, conforme al mandato de Yahvé, una herencia entre los hermanos de su padre[d].'
  to: 'Entonces ellas se acercaron delante de Eleazar el sacerdote, delante de Josué hijo de Nun y delante de los líderes, diciendo: «Yahvé mandó a Moisés darnos una herencia entre nuestros hermanos[a]». Así les dio, conforme al mandato de Yahvé[b], una herencia entre los hermanos de su padre[c].'
  rationale: Se conserva casi todo el texto por su buena fidelidad y legibilidad, pero se reorganizan las notas para ajustarlas mejor a la evidencia fuente y a la auditoría inglesa. Se elimina la nota circular sobre «se acercaron», se suprime la nota no esencial sobre «herencia», y se añade la nota necesaria sobre el modismo «conforme al mandato de Yahvé» = «según la boca de Yahvé».
  reviewer_model: gpt-5.4
