revisions:
- from: porque no les salieron al encuentro con pan y con agua por el camino, cuando salían de Egipto, y porque alquiló contra ti[a] a Balaam hijo de Beor, de Petor, de Aram-Naharaim, para maldecirte.
  to: porque no les salieron al encuentro con pan y agua por el camino, cuando salieron de Egipto, y porque contrató a Balaam hijo de Beor, de Petor, de Aram-Naharaim[a], contra ti para maldecirte.
  rationale: Se ajusta «alquiló» a «contrató» por naturalidad y precisión en español; se cambia «cuando salían» por «cuando salieron» para reflejar mejor el valor temporal del hebreo; y se simplifica «con pan y con agua» a «con pan y agua» para mejorar fluidez sin pérdida semántica. También se reubica el marcador de nota para anclarlo directamente al topónimo relevante.
  reviewer_model: gpt-5.4
