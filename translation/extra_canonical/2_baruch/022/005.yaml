  from: unless he loses instead of its fruits, is he afterward ruined by famine?
  to: unless he loses the seed in the earth, how does he afterward receive its fruits?
  rationale: The current translation severely misreads the Syriac text. The Syriac
    reads 'en la mawbed l-zar'a b-ar'a, aykana b-harta mqabbel pere' ('if he does
    not lose the seed in the earth, how in the end does he receive fruits?'). The
    draft hallucinates 'instead of its fruits' and 'ruined by famine', completely
    losing the agricultural metaphor of a seed dying to produce fruit.
