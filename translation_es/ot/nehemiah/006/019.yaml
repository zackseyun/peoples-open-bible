base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/006/019.yaml
  text: Also they kept speaking of his good deeds in my presence[a], and they kept reporting my words to him[b]. Tobiah sent letters to frighten me.
  footnotes:
  - marker: a
    text: Or 'his good qualities' or 'the good things about him'; the Hebrew phrase is broader than deeds alone, but here it refers to favorable commendation of Tobiah before Nehemiah.
    reason: lexical_alternative
  - marker: b
    text: Literally 'they were bringing out my words to him,' an idiom for relaying or reporting Nehemiah's words to Tobiah.
    reason: lexical_alternative
