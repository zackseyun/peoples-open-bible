review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: David habla a toda la asamblea, condiciona la acción al parecer del pueblo y a la aprobación divina, propone enviar aviso a los israelitas restantes en todas las tierras de Israel, incluyendo a sacerdotes y levitas, para que se reúnan. Sin embargo, hay dos puntos a corregir: (1) la nota al pie actual se ancla a «Israel» pero explica la expresión אִם עֲלֵיכֶם טוֹב, por lo que está mal ubicada; (2) «ejidos» no es la mejor opción para מִגְרְשֵׁיהֶם en un español latinoamericano amplio y eclesial, porque puede sonar demasiado local o sociopolíticamente cargado. «Tierras de pastoreo» o equivalente preserva mejor el sentido documentado de pasturelands/open lands.'
  spanish_quality_summary: El español es claro y digno, pero la nota al pie necesita recolocación y el término «ejidos» reduce la transparencia panhispánica. «Enviemos mensaje» es aceptable, aunque «enviemos aviso» o «mandemos aviso» suena un poco más natural; no obstante, no es un error. «Que quedan» también es entendible, pero «que permanecen» fluye mejor en este contexto. La revisión propuesta mejora naturalidad sin apartarse del sentido fuente.
  glossary_alignment: 'Se respeta correctamente «Yahvé» para יְהוָה y «asamblea» para קְהַל. «Hermanos» conserva bien אַחֵינוּ. No hay conflicto doctrinal relevante. La principal desalineación terminológica está en מִגְרְשֵׁיהֶם: el proyecto documenta «pasturelands / open lands», y «ejidos» no comunica de forma suficientemente amplia ese valor en español general.'
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada en «Israel» pero explica «Si les parece bien».
    rationale: Los marcadores deben aparecer en la palabra o frase pertinente. La ubicación actual induce a error editorial y rompe la trazabilidad entre nota y texto.
  - severity: medium
    issue: «Ejidos» para מִגְרְשֵׁיהֶם no es suficientemente claro ni neutral en español amplio.
    rationale: Aunque puede acercarse al sentido de tierras anexas/comunes, en gran parte del mundo hispano tiene asociaciones locales específicas. «Tierras de pastoreo» comunica mejor el valor léxico documentado.
  - severity: low
    issue: «Que quedan» y «enviemos mensaje» son aceptables pero algo menos naturales que alternativas cercanas.
    rationale: No distorsionan el sentido, pero «que permanecen» y «enviemos aviso» suenan más fluidos en español bíblico moderno.
