base_translation:
  language: en
  yaml_path: translation/ot/judges/009/049.yaml
  text: So all the people also cut down a branch each[a], and they went after Abimelech and piled them against the inner chamber, and set the inner chamber on fire over them, so that all the people of the tower of Shechem also died[b], about a thousand men and women.
  footnotes:
  - marker: a
    text: Or 'stronghold' for 'inner chamber'; the Hebrew term likely refers to the enclosed refuge within the tower rather than the tower itself.
    reason: lexical_alternative
  - marker: b
    text: Literally 'each man his branch.'
    reason: lexical_alternative
