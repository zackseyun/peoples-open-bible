review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y sigue de cerca las decisiones auditadas en inglés: mantiene la metáfora de «corazón», expresa la finalidad con «para que sepas», y conserva el alcance universal de «en toda la tierra». Sin embargo, el primer conector discursivo del hebreo/POB («For») queda mejor como «Pues» o «Porque» según el flujo; aquí «Porque» es posible, pero el problema principal está en la nota b, que no preserva correctamente la alternativa inglesa entre «earth» y «land», ya que repite «tierra» para ambas lecturas y pierde el contraste local/universal.'
  spanish_quality_summary: El español es claro, digno y muy legible. «En esta ocasión» y «yo envío» son naturales, aunque «esta vez» sería algo más conciso; no hace falta cambiarlo. La sintaxis con repetición de «contra» es aceptable y enfática. La calidad general es buena, pero la nota b necesita reparación para evitar confusión semántica.
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparece el nombre divino en el texto principal, pero la nota teológica usa correctamente «Yahvé». «Siervos» es contextual y está bien justificado frente a «esclavos».
  issues:
  - severity: medium
    issue: La nota b no conserva la alternativa léxica auditada entre sentido universal y sentido local de הָאָרֶץ.
    rationale: El inglés contrasta «in all the earth» con «in all the land». El borrador español dice «O “en toda la tierra” ... aquí se traduce “en toda la tierra”», repitiendo la misma formulación para ambas opciones y anulando la diferencia exegética. Debe contrastarse con «en toda la tierra» vs. «en toda la región» o «en todo el país».
  - severity: low
    issue: La nota b explica bien la universalidad, pero puede formularse con mayor precisión respecto a la alternativa local.
    rationale: Una formulación como «en todo el país» o «en toda la región» comunica mejor la lectura local de אֶרֶץ en español y evita ambigüedad para el lector.
  revised_spanish_text: Porque en esta ocasión yo envío todas mis plagas contra tu corazón[a], y contra tus siervos y contra tu pueblo[b], para que sepas que no hay nadie como yo en toda la tierra.
  revised_footnotes:
  - marker: a
    text: O «a tu corazón». El hebreo puede indicar que las plagas están dirigidas al propio Faraón, al centro de su ser.
    reason: lexical_alternative
  - marker: b
    text: O «en todo el país» o «en toda la región», si la frase se entiende de modo más local; aquí se traduce «en toda la tierra» porque el contexto subraya la unicidad incomparable de Yahvé de manera universal.
    reason: alternative_reading
  revision_rationale: El texto principal puede mantenerse. La única corrección necesaria es reparar la nota b para que preserve de verdad la alternativa entre lectura local y lectura universal de הָאָרֶץ, tal como la documenta el audit trail inglés.
