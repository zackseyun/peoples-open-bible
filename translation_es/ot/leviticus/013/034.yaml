translation:
  language: es
  text: Entonces el sacerdote examinará[a] la afección escamosa el séptimo día, y si resulta que la afección escamosa no se ha extendido en la piel y su aspecto no es más profundo que la piel, el sacerdote lo declarará limpio[c][b]. Lavará sus vestiduras y quedará limpio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tiña' o la tradicional 'escali[o]' para la afección específica denotada por el hebreo neṭeq.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'no más profundo que la piel'; un criterio sacerdotal estándar que indica que la zona afectada no parece hundida por debajo de la piel circundante.
    reason: cultural_note
  - marker: c
    text: 'Hebreo: ''el sacerdote lo hace limpio''; aquí significa una declaración oficial de estado limpio, no que el sacerdote cure médicamente la afección.'
    reason: alternative_reading
lexical_decisions:
- source_word: נֶתֶק
  english_pob_choice: scaly infection
  chosen_spanish: neṭeq
  alternatives_spanish:
  - infección descamativa
  - tiña
  - enfermedad de la piel
  lexicon: HALOT
  rationale: El término hebreo designa una afección ritual específica de Levítico 13. Mantener el término transliterado conserva la tensión léxica documentada por la POB inglesa, que evita identificarla con un diagnóstico moderno preciso o con un equivalente tradicional demasiado interpretativo.
- source_word: וְרָאָה
  english_pob_choice: shall examine
  chosen_spanish: examinará
  alternatives_spanish:
  - verá
  - inspeccionará
  lexicon: HALOT
  rationale: En este contexto el sacerdote realiza una inspección oficial, no una mera observación casual. 'Examinará' expresa bien el acto procedimental y mantiene la función jurídica-ritual.
- source_word: פָשָׂה
  english_pob_choice: has not spread
  chosen_spanish: se ha extendido
  alternatives_spanish:
  - ha avanzado
  - se ha propagado
  lexicon: HALOT
  rationale: El verbo describe la propagación visible de la afección sobre la piel. 'Se ha extendido' es natural en español y comunica el sentido diagnóstico sin exagerarlo.
- source_word: בָּעוֹר
  english_pob_choice: in the skin
  chosen_spanish: en la piel
  alternatives_spanish:
  - sobre la piel
  lexicon: HALOT
  rationale: La preposición con עור en este pasaje forma parte del lenguaje técnico de inspección. 'En la piel' sigue de cerca el hebreo y conserva el marco descriptivo del texto.
- source_word: מַרְאֵהוּ
  english_pob_choice: its appearance
  chosen_spanish: su aspecto
  alternatives_spanish:
  - su apariencia
  - su apariencia visible
  lexicon: HALOT
  rationale: '''Aspecto'' es una forma natural y formal en español para el rasgo visible de la lesión, equivalente al valor perceptible de מַרְאֵהוּ.'
- source_word: עָמֹק מִן הָעוֹר
  english_pob_choice: deeper than the skin
  chosen_spanish: más profundo que la piel
  alternatives_spanish:
  - más hondo que la piel
  - hundido por debajo de la piel
  lexicon: HALOT
  rationale: La expresión indica que la lesión no parece hundida por debajo del nivel de la piel circundante. 'Más profundo que la piel' reproduce la comparación estándar del criterio priestly sin volverla más técnica de lo necesario.
- source_word: וְטִהַר אֹתוֹ הַכֹּהֵן
  english_pob_choice: the priest shall pronounce him clean
  chosen_spanish: el sacerdote lo declarará limpio
  alternatives_spanish:
  - el sacerdote lo purificará
  - el sacerdote dará por limpio
  lexicon: HALOT
  rationale: En la legislación de pureza, טהר aquí es una declaración oficial de estado limpio, no una curación médica o sacramental. 'Declarará limpio' preserva ese valor judicial/ritual.
- source_word: וְכִבֶּס בְּגָדָיו
  english_pob_choice: He shall wash his clothes
  chosen_spanish: Lavará sus vestiduras
  alternatives_spanish:
  - Lavará su ropa
  - Lavarán sus vestidos
  lexicon: HALOT
  rationale: בגדיו puede traducirse por 'vestiduras' en un registro bíblico digno, aunque 'ropa' también sería posible. Se conserva la imagen ritual de lavado de prendas.
- source_word: וְטָהֵר
  english_pob_choice: and be clean
  chosen_spanish: y quedará limpio
  alternatives_spanish:
  - y estará limpio
  - y será limpio
  lexicon: HALOT
  rationale: La frase final expresa el resultado de estado después del lavado. 'Quedará limpio' comunica el cambio de condición de manera natural en español y mantiene el sentido ritual.
- source_word: וְהִנֵּה
  english_pob_choice: and if
  chosen_spanish: y he aquí, si
  alternatives_spanish:
  - y resulta que
  - y entonces, si
  lexicon: HALOT
  rationale: La partícula introduce lo observado en la inspección. Se conserva la nota de descubrimiento con 'he aquí' y se explicita la condicionalidad con 'si', evitando un calco rígido.
theological_decisions:
- issue: Función de טהר en la sentencia sacerdotal
  english_pob_reading: The priest officially declares the person clean rather than effecting cleansing by sacramental action.
  chosen_spanish_reading: El sacerdote lo declara limpio, no lo 'purifica' en sentido médico o sacramental.
  alternative_spanish_readings:
  - el sacerdote lo purifica
  - el sacerdote lo limpia
  rationale: En Levítico 13, el sacerdote dicta un veredicto ritual sobre el estado de la persona. 'Declarará limpio' preserva la función adjudicativa y evita sugerir que el sacerdote realiza una curación física o un acto sacramental.
  doctrine_reference: Levítico 13:34; filosofía de traducción §1, §3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el control cruzado indicó alta concordancia con solo observaciones menores. Esta versión mantiene la decisión léxica central de no traducir neṭeq con un término médico moderno inequívoco, y conserva el valor declarativo de טהר.
  spanish_consistency_notes:
  - Se usa 'sacerdote' de forma consistente para הכהן, siguiendo el registro bíblico y evitando variantes innecesarias.
  - '''Limpio'' se reserva para el estado ritual; no se emplea ''purificado'' como verbo principal para no diluir la lectura judicial.'
  - Se mantiene 'piel' para עור conforme al lenguaje técnico del pasaje.
  - Se conserva la transliteración 'neṭeq' en el texto principal para respetar la tensión léxica documentada y permitir la nota alternativa en español.
