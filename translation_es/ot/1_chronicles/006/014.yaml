lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En una lista genealógica, בְּנֵי introduce la línea de descendencia. «Hijos de» es la forma más directa y natural en español para conservar el patrón genealógico; «descendientes de» es posible, pero es más amplio y menos preciso en este contexto inmediato.
- source_word: מְרָרִי
  english_pob_choice: Merari
  chosen_spanish: Merari
  lexicon: nombre propio
  rationale: Nombre propio transliterado de manera estándar en español.
- source_word: מַחְלִי
  english_pob_choice: Mahli
  chosen_spanish: Mahli
  lexicon: nombre propio
  rationale: Nombre propio transliterado de manera estándar en español.
- source_word: לִבְנִי
  english_pob_choice: Libni
  chosen_spanish: Libni
  lexicon: nombre propio
  rationale: Nombre propio transliterado de manera estándar en español.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  lexicon: HALOT
  rationale: El sufijo pronominal de tercera persona masculina singular expresa filiación. En español, después de un nombre propio, «su hijo» comunica con claridad la relación genealógica y suena natural; «hijo de él» sería más literal, pero menos idiomático.
- source_word: שִׁמְעִי
  english_pob_choice: Shimei
  chosen_spanish: Simei
  alternatives_spanish:
  - Shimei
  lexicon: nombre propio
  rationale: Se usa «Simei» como transliteración española clara y reconocible; mantiene el nombre propio sin añadir interpretación.
- source_word: עֻזָּה
  english_pob_choice: Uzzah
  chosen_spanish: Uzza
  alternatives_spanish:
  - Uzzá
  - Uzzah
  lexicon: nombre propio
  rationale: Nombre propio transliterado al español. «Uzza» conserva la forma breve y evita forzar una grafía inglesa cuando el objetivo es una redacción española directa.
translation_notes:
  revision_awareness: Se mantiene la estructura genealógica breve del texto hebreo y la nota alternativa de la tradición POB en inglés sobre בְּנֵי, sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se conserva el orden genealógico y el uso de dos puntos para introducir la lista, acorde con el registro bíblico en español.
  - Se opta por «Simei» y «Uzza» como transliteraciones españolas consistentes, evitando mezclar grafías inglesas y españolas en la misma línea.
  - La nota [a] preserva la alternativa semántica documentada para בְּנֵי sin desplazar el sentido principal de «hijos de».
