translation:
  language: es
  text: 'Moisés ordenó a los levitas que llevaban el arca de la alianza de Yahvé[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los levitas, portadores del arca de la alianza de Yahvé». El participio hebreo también puede entenderse de manera más formal, como una descripción casi titular.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - encargó
  lexicon: HALOT
  rationale: El hebreo expresa la acción de dar una orden o encargo. En español, «mandó» transmite ese valor de forma natural y directa, sin subir el registro más de lo necesario.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíticos
  - los varones levitas
  lexicon: HALOT
  rationale: Es el nombre tribal establecido en español bíblico y conserva con claridad la referencia al grupo sacerdotal/tribal.
- source_word: נֹשְׂאֵי
  english_pob_choice: who carried
  chosen_spanish: los que llevaban
  alternatives_spanish:
  - portadores de
  - los que portaban
  lexicon: HALOT
  rationale: El participio funciona de manera atributiva y describe a los levitas por su función. «Los que llevaban» expresa bien esa idea en español vivo y conserva el sentido participial.
- source_word: אֲרוֹן
  english_pob_choice: ark
  chosen_spanish: arca
  alternatives_spanish:
  - arca sagrada
  - arca
  lexicon: HALOT
  rationale: En este contexto cultual, «arca» es el equivalente estándar y suficiente en español; el contexto de la alianza ya especifica de cuál arca se trata.
- source_word: בְּרִית
  english_pob_choice: of the covenant
  chosen_spanish: del pacto
  alternatives_spanish:
  - de la alianza
  - del convenio
  lexicon: HALOT
  rationale: El hebreo forma la expresión técnica de la «ark of the covenant». En español, «pacto» comunica bien el valor bíblico y mantiene la fórmula reconocible.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración, conforme a la norma del proyecto, en lugar de sustituirlo por un título.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - así
  lexicon: HALOT
  rationale: La fórmula introductoria se vierte de modo transparente con un gerundio en español, manteniendo el enlace con el discurso siguiente.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La línea editorial del proyecto pide reproducir el nombre divino como transliteración. «Yahvé» preserva la referencia personal del Tetragrámaton sin ocultarla bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El contexto auditado en inglés coincide con la lectura principal: el verbo expresa una orden; el participio admite una traducción atributiva o más titular; y el nombre divino debe mantenerse como transliteración. No se requiere revisión adicional respecto del pasaje base.'
  spanish_consistency_notes:
  - 'Se mantuvo un orden natural en español: sujeto verbal inicial, complemento directo con participio descriptivo y fórmula introductoria final.'
  - «Pacto» se eligió por su claridad bíblica y su correspondencia estable con בְּרִית en este contexto.
  - La nota al pie conserva la alternativa formal documentada por el inglés, sin introducir una paráfrasis ajena al hebreo.
