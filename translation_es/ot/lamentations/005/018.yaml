translation:
  language: es
  text: porque el monte Sion está desolado[a]; los zorros andan sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «chacales» para «zorros»; el término hebreo puede entenderse de manera más amplia en algunos contextos, aunque «zorros» es aquí la traducción por defecto.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - sobre
  - en
  - a causa de
  lexicon: HALOT
  rationale: Aunque עַל suele significar 'sobre/en', aquí introduce la base del lamento anterior; en español 'porque' comunica mejor la relación causal que el inglés POB ya explicitó.
- source_word: הַר צִיּוֹן
  english_pob_choice: Mount Zion
  chosen_spanish: el monte de Sion
  alternatives_spanish:
  - el monte Sión
  - la montaña de Sion
  lexicon: HALOT
  rationale: '''Monte de Sion'' conserva el sustantivo geográfico y el nombre propio, con un registro natural y reverente en español bíblico.'
- source_word: שֶׁשָּׁמֵם
  english_pob_choice: lies desolate
  chosen_spanish: está desolado
  alternatives_spanish:
  - yace desolado
  - está en ruinas
  - ha quedado desolado
  lexicon: HALOT
  rationale: El hebreo describe un estado ruinoso continuo; 'está desolado' expresa ese estado de manera clara y sobria en español.
- source_word: שׁוּעָלִים
  english_pob_choice: foxes
  chosen_spanish: los zorros
  alternatives_spanish:
  - los chacales
  lexicon: HALOT
  rationale: El POB inglés retuvo 'foxes' como opción por defecto; en español 'zorros' sigue esa elección directa, dejando 'chacales' como alternativa léxica posible según contexto.
- source_word: הִלְּכוּ
  english_pob_choice: walk
  chosen_spanish: andan
  alternatives_spanish:
  - caminan
  - deambulan
  - merodean
  lexicon: HALOT
  rationale: '''Andan'' comunica el movimiento habitual o deambulante sin añadir la carga interpretativa de ''merodean''.'
- source_word: בּוֹ
  english_pob_choice: on it
  chosen_spanish: por él
  alternatives_spanish:
  - sobre él
  - en él
  - a través de él
  lexicon: HALOT
  rationale: Con un monte como antecedente, 'por él' resulta idiomático en español y conserva la idea de desplazamiento sobre la zona devastada sin forzar una preposición demasiado rígida.
translation_notes:
  revision_awareness: La revisión inglesa cambió la puntuación de coma a punto y coma para reflejar mejor la estructura hebrea; en español se conserva ese cierre con punto y coma entre las dos proposiciones.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otra sustitución reverencial porque el versículo no contiene el tetragrámaton.
  - '''Sion'' se mantuvo sin tilde para respetar la forma habitual de nombre propio en español bíblico, aunque ''Sión'' también sería comprensible; aquí se prefirió uniformidad editorial.'
  - La puntuación con punto y coma reproduce la separación del hebreo y del POB inglés revisado.
