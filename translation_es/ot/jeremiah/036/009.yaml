translation:
  language: es
  text: Y aconteció en el quinto año de Joacim, hijo de Josías, rey de Judá, en el noveno mes, que proclamaron un ayuno ante Yahvé[a] para todo el pueblo en Jerusalén y para todo el pueblo que venía de las ciudades de Judá a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa el nombre divino יהוה, aquí traducido como «Yahvé» conforme al criterio del proyecto.
    reason: theological_explanation
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y fue
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce un nuevo acontecimiento; «aconteció» preserva ese valor discursivo con un registro digno y natural en español.
- source_word: בַשָּׁנָה הַחֲמִשִׁית
  english_pob_choice: in the fifth year
  chosen_spanish: en el quinto año
  alternatives_spanish:
  - durante el quinto año
  lexicon: HALOT
  rationale: Es una datación estándar con valor temporal directo; la traducción simple mantiene la fórmula sin añadir información.
- source_word: לִיהוֹיָקִים בֶּן יֹאשִׁיָּהוּ מֶלֶךְ יְהוּדָה
  english_pob_choice: of Jehoiakim son of Josiah, king of Judah
  chosen_spanish: de Joacim, hijo de Josías, rey de Judá
  alternatives_spanish:
  - perteneciente a Joacim, hijo de Josías, rey de Judá
  lexicon: HALOT
  rationale: La secuencia funciona como fórmula de datación; en español se expresa naturalmente con «de». Se transliteran los nombres bíblicos con formas usuarias en español.
- source_word: בַּחֹדֶשׁ הַתְּשִׁעִי
  english_pob_choice: in the ninth month
  chosen_spanish: en el mes noveno
  alternatives_spanish:
  - en el noveno mes
  lexicon: HALOT
  rationale: Conserva el orden y la concisión de la fórmula calendárica; «mes noveno» es claro y bíblicamente sobrio.
- source_word: קָרְאוּ צ֜וֹם
  english_pob_choice: they proclaimed a fast
  chosen_spanish: proclamaron un ayuno
  alternatives_spanish:
  - declararon un ayuno
  - convocaron un ayuno
  lexicon: HALOT
  rationale: קרא con צוֹם expresa la convocatoria pública de un ayuno; «proclamaron» conserva el carácter formal y público mejor que una mera referencia a ayunar.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: ante Yahvé[a]
  alternatives_spanish:
  - delante de Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del texto hebreo como «Yahvé», según el criterio del proyecto. «Ante» reproduce bien לִפְנֵי como orientación cultual o ceremonial.
- source_word: כָּל הָעָם בִּירוּשָׁלָם
  english_pob_choice: all the people in Jerusalem
  chosen_spanish: todo el pueblo en Jerusalén
  alternatives_spanish:
  - todo el pueblo de Jerusalén
  lexicon: HALOT
  rationale: El hebreo señala ubicación; «en Jerusalén» evita convertirlo en un genitivo de pertenencia y mantiene la referencia espacial.
- source_word: הַבָּאִים מֵעָרֵי יְהוּדָה בִּירוּשָׁלָם
  english_pob_choice: the people coming from the cities of Judah into Jerusalem
  chosen_spanish: todo el pueblo que venía de las ciudades de Judá a Jerusalén
  alternatives_spanish:
  - todo el pueblo que llegaba de las ciudades de Judá a Jerusalén
  - todo el pueblo procedente de las ciudades de Judá que venía a Jerusalén
  lexicon: HALOT
  rationale: El participio expresa movimiento hacia Jerusalén; «que venía» conserva ese aspecto continuo, y «a Jerusalén» refleja el desplazamiento indicado por el contexto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: before Yahweh / the LORD in some project contexts
  chosen_spanish_reading: ante Yahvé
  alternative_spanish_readings:
  - ante el Señor
  - delante del Señor
  rationale: El texto hebreo usa el Tetragrámaton directamente; conforme al criterio del proyecto, se preserva el nombre divino en español en lugar de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sujeto de קָרְאוּ en la construcción con צום
  english_pob_reading: they proclaimed a fast
  chosen_spanish_reading: ellos proclamaron un ayuno
  alternative_spanish_readings:
  - se proclamó un ayuno
  - se convocó un ayuno
  rationale: El hebreo usa plural verbal sin explicitar sujeto léxico. El español mantiene un sujeto implícito/plural con «ellos» para no atribuir indebidamente la acción al pueblo mencionado inmediatamente y conservar la impersonalidad relativa del original, en línea con la revisión inglesa.
  doctrine_reference: Sintaxis narrativa hebrea y revisión auditada de JER.36.9
translation_notes:
  revision_awareness: La revisión inglesa ajustó el sujeto de «proclaimed» a un indefinido «they», evitando convertir al pueblo reunido en el sujeto explícito de la convocatoria. Esta versión española refleja esa cautela con «ellos proclamaron» y conserva la relación espacial de los dos grupos («en Jerusalén» y «que venía de las ciudades de Judá a Jerusalén»), sin añadir elementos no presentes en el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - «Proclamaron un ayuno» reproduce el valor público de קרא + צום.
  - «Todo el pueblo» traduce כָּל הָעָם de manera consistente en ambos miembros del verso.
  - 'Los nombres propios siguen la forma habitual en español bíblico: Joacim, Josías, Judá, Jerusalén.'
