translation:
  language: es
  text: 'Y aun estos se tambalean con vino y vacilan por la bebida fuerte: sacerdote y profeta se tambalean con bebida fuerte, son tragados por el vino, vacilan por la bebida fuerte; se tambalean en la visión[a], vacilan en el juicio[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se extravían en la visión»; el hebreo puede referirse de manera específica a la percepción profética, no solo a la vista ordinaria.
    reason: lexical_alternative
  - marker: b
    text: O «tropiezan al dar juicio» o «en la decisión judicial».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם אֵלֶּה
  english_pob_choice: And even these
  chosen_spanish: Y aun estos
  alternatives_spanish:
  - Y también estos
  - Pero aun estos
  lexicon: HALOT
  rationale: וְגַם añade énfasis; אֵלֶּה señala a un grupo ya bajo acusación. «Aun estos» conserva el golpe retórico y el enlace con el contexto previo.
- source_word: בַּיַּיִן
  english_pob_choice: with wine
  chosen_spanish: con vino
  alternatives_spanish:
  - en vino
  - por vino
  lexicon: HALOT
  rationale: La preposición ב aquí expresa asociación/instrumento de intoxicación. «Con vino» es natural en español y conserva la causa inmediata.
- source_word: שָׁגוּ
  english_pob_choice: reel
  chosen_spanish: se tambalean
  alternatives_spanish:
  - se desvían
  - erran
  - reel
  lexicon: HALOT
  rationale: En el contexto de embriaguez, el verbo comunica inestabilidad física; «se tambalean» es la forma más clara en español y mantiene también el trasfondo de desorientación.
- source_word: שֵּׁכָר
  english_pob_choice: strong drink
  chosen_spanish: bebida fuerte
  alternatives_spanish:
  - licor fuerte
  - bebida embriagante
  - sider
  lexicon: HALOT
  rationale: שֵׁכָר designa una bebida alcohólica distinta del vino. «Bebida fuerte» sigue la tradición de traducción y permanece suficientemente amplia.
- source_word: תָּעוּ
  english_pob_choice: stagger
  chosen_spanish: se desvían
  alternatives_spanish:
  - vacilan
  - se tambalean
  - se extravían
  lexicon: HALOT
  rationale: El verbo puede significar errar o desviarse, pero aquí la embriaguez sugiere desorientación visible. «Se desvían» preserva la tensión entre lo físico y lo moral.
- source_word: כֹּהֵן וְנָבִיא
  english_pob_choice: priest and prophet
  chosen_spanish: sacerdote y profeta
  alternatives_spanish:
  - el sacerdote y el profeta
  - sacerdotes y profetas
  lexicon: HALOT
  rationale: Los sustantivos singulares funcionan de modo colectivo para señalar clases dirigentes. En español, la forma sin artículos es la más fluida y fiel al paralelismo.
- source_word: נִבְלְעוּ
  english_pob_choice: they are swallowed up by wine
  chosen_spanish: quedan absorbidos por el vino
  alternatives_spanish:
  - son tragados por el vino
  - son engullidos por el vino
  - quedan devorados por el vino
  lexicon: HALOT
  rationale: El niphal de בלע dice literalmente «ser tragados/engullidos». «Quedan absorbidos» conserva la idea de quedar completamente dominados sin volver demasiado abrupta la imagen en español.
- source_word: מִן הַיַּיִן / מִן הַשֵּׁכָר
  english_pob_choice: by wine / from strong drink
  chosen_spanish: con vino / con bebida fuerte
  alternatives_spanish:
  - por vino / por bebida fuerte
  - a causa del vino / a causa de la bebida fuerte
  - del vino / de la bebida fuerte
  lexicon: HALOT
  rationale: מִן marca origen o causa. En español, «con» mantiene la relación causal-intoxicante y evita una repetición mecánica de «de» o «por».
- source_word: בָּרֹאֶה
  english_pob_choice: in vision
  chosen_spanish: en la visión
  alternatives_spanish:
  - en visión
  - en ver
  - en el ver profético
  lexicon: HALOT
  rationale: Aquí el ámbito de רֹאֶה apunta al ver visionario/profético. «En la visión» conserva la posibilidad de percepción profética sin explicitar más de lo que el hebreo exige.
- source_word: פָּקוּ
  english_pob_choice: they totter
  chosen_spanish: vacilan
  alternatives_spanish:
  - tambalean
  - vacilan
  - pierden firmeza
  lexicon: HALOT
  rationale: El verbo expresa inestabilidad o titubeo. «Vacilan» funciona bien con el paralelismo final y evita repetir el mismo verbo de la línea anterior.
- source_word: פְּלִילִיָּה
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - decisión judicial
  - justicia
  lexicon: HALOT
  rationale: El sustantivo remite a la adjudicación o decisión judicial. «Juicio» es breve, claro y conserva el campo semántico legal.
theological_decisions:
- issue: Cómo reflejar la doble dimensión física y moral de la embriaguez en los verbos hebreos
  english_pob_reading: Reel / stagger / totter preserve the physical image while allowing moral disorientation
  chosen_spanish_reading: Se tambalean / se desvían / vacilan preserve la imagen física sin borrar la culpa moral implícita
  alternative_spanish_readings:
  - erran / se extravían / fallan
  - reel / stagger / totter
  rationale: El hebreo usa verbos que pueden significar tanto perder el equilibrio como errar moralmente. La versión española conserva esa tensión en vez de resolverla por completo hacia uno solo de los sentidos.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión léxica y teológica'
- issue: Si explicitar o no que el verso habla de visión profética y decisión legal
  english_pob_reading: 'Retain somewhat literal wording: they reel in vision, they totter in judgment'
  chosen_spanish_reading: se tambalean en la visión, vacilan en el juicio
  alternative_spanish_readings:
  - se desvían en visión, vacilan en el juicio
  - fallan en la visión profética, fallan en el juicio legal
  rationale: El hebreo es breve y algo ambiguo. Mantener «visión» y «juicio» sin expandirlos demasiado preserva la referencia a la función profética y judicial, dejando visible la ambigüedad del texto.
  doctrine_reference: 'Translation philosophy §3: no resolver la ambigüedad más allá de la evidencia'
translation_notes:
  revision_awareness: 'El contexto inglés auditado fue revisado una vez para acercar el final a «in vision» y mantener la ambigüedad del hebreo. La presente versión española sigue esa línea: preserva el paralelismo, evita explicaciones excesivas y conserva el doble campo semántico de embriaguez física y falla profético-judicial.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino explícito; este versículo no lo contiene.
  - Se mantiene «bebida fuerte» para שֵׁכָר por consistencia con el vocabulario POB.
  - «Juicio» se usa en sentido de decisión legal, no como condena general.
  - 'La secuencia verbal intenta variar sin perder el paralelismo: «se tambalean / se desvían / se tambalean / vacilan».'
