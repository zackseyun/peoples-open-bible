translation:
  language: es
  text: lo que pueda costear[a], una como ofrenda por el pecado y una como holocausto, junto con la ofrenda de grano[b]. Así el sacerdote hará expiación por el que está siendo purificado delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «lo que su mano alcanza»; es decir, lo que puede costear.'
    reason: lexical_alternative
  - marker: b
    text: O «una como ofrenda de purificación».
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר תַּשִּׂיג יָדוֹ
  english_pob_choice: whatever his means can afford
  chosen_spanish: lo que sus medios alcancen
  alternatives_spanish:
  - lo que su mano alcance
  - lo que pueda costear
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude a capacidad económica, no a la mano literal. En español, «lo que sus medios alcancen» conserva esa idea de suficiencia/posibilidad sin volverlo demasiado técnico o interpretativo.
- source_word: חַטָּאת
  english_pob_choice: sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - ofrenda de purificación
  - ofrenda por el pecado
  lexicon: HALOT
  rationale: En contexto levítico, el término sacrificial tiene un valor cultual tradicional. «Ofrenda por el pecado» sigue de cerca la lectura del POB inglés y mantiene la tensión entre pecado y purificación sin resolverla en una sola dirección.
- source_word: עֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda totalmente quemada
  lexicon: HALOT
  rationale: «Holocausto» es un equivalente español asentado para la ofrenda que se eleva en humo. Aunque «ofrenda quemada» sería más descriptivo, «holocausto» es más natural y reverente en español bíblico.
- source_word: עַל הַמִּנְחָה
  english_pob_choice: along with the grain offering
  chosen_spanish: junto con la ofrenda de grano
  alternatives_spanish:
  - con la ofrenda de grano
  - además de la ofrenda de grano
  lexicon: HALOT
  rationale: Aquí עַל expresa acompañamiento/adición ritual, no ubicación espacial. «Junto con» comunica bien la relación de inclusión en la secuencia del rito. Se opta por «ofrenda de grano» para mantener la referencia material de מִנְחָה.
- source_word: וְכִפֶּר
  english_pob_choice: shall make atonement
  chosen_spanish: hará expiación
  alternatives_spanish:
  - hará propiciación
  - hará atonación
  lexicon: HALOT
  rationale: «Hará expiación» reproduce con precisión el lenguaje cultual del hebreo y evita sobrerresolver la teoría detrás del acto. Es una fórmula ya reconocible en castellano bíblico, aunque menos cotidiana.
- source_word: הַמִּטַּהֵר
  english_pob_choice: the one being cleansed
  chosen_spanish: el que está siendo purificado
  alternatives_spanish:
  - el que se está limpiando
  - el que está siendo limpiado
  lexicon: HALOT
  rationale: El participio refleja a la persona en proceso de limpieza ritual. «Purificado» permite un español fluido y respeta la ambigüedad cultual entre limpieza ritual y purificación moral, sin cerrarla de más.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» según el criterio del proyecto. «Delante de» reproduce bien לִפְנֵי en un registro bíblico natural en español.
theological_decisions:
- issue: Terminología sacrificial y fuerza expiatoria
  english_pob_reading: Use traditional cultic terms 'sin offering,' 'burnt offering,' and 'make atonement'
  chosen_spanish_reading: Conservar «ofrenda por el pecado», «holocausto» y «hará expiación»
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda quemada
  - hará propiciación
  rationale: La frase describe un procedimiento ritual levítico. La elección mantiene el vocabulario cultual sin introducir una explicación doctrinal más específica que la que el verso exige.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Nombre divino en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se sigue el estándar del proyecto para יְהוָה. «Yahvé» preserva el nombre personal de Dios en lugar de sustituirlo por un título.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo masorético y el hilo de decisión del POB inglés sin cambios relevantes en la pasada de revisión más reciente; se conserva la lectura ritual estándar y la referencia al nombre divino según la política del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de una sustitución reverencial por «SEÑOR».
  - 'Se conserva el paralelismo de dos ofrendas: una por el pecado y una holocausto, con la ofrenda de grano añadida por acompañamiento ritual.'
  - «Expiación» se usa como término cultual; no se reemplaza por una paráfrasis doctrinal.
  - La nota alternativa sobre חַטָּאת se mantiene para reflejar la tensión entre pecado y purificación en el término hebreo.
