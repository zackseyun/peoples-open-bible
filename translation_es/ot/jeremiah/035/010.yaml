translation:
  language: es
  text: Así hemos vivido en tiendas, y hemos obedecido[a] y hecho todo lo que Jonadab nuestro padre nos mandó[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hemos escuchado y hecho»; el hebreo «oír» suele llevar aquí la idea de responder con obediencia.
    reason: lexical_alternative
  - marker: b
    text: Jonadab también puede escribirse «Jehonadab».
    reason: alternative_reading
lexical_decisions:
- source_word: וַנֵּשֶׁב
  english_pob_choice: we have lived
  chosen_spanish: hemos vivido
  alternatives_spanish:
  - hemos morado
  - hemos habitado
  - hemos estado viviendo
  lexicon: HALOT
  rationale: El verbo ישׁב en este contexto expresa residencia o modo de vida, no simplemente sentarse. El perfecto español «hemos vivido» reproduce bien la continuidad resumida de la acción y es natural en una declaración retrospectiva.
- source_word: בָּאֳהָלִים
  english_pob_choice: in tents
  chosen_spanish: en tiendas
  alternatives_spanish:
  - en las tiendas
  - en carpas
  lexicon: HALOT
  rationale: 'El plural anartro indica un sentido genérico: vida en tiendas como forma de residencia. «Tiendas» es el equivalente bíblico natural en español; «carpas» suena más moderno pero menos bíblico.'
- source_word: וַנִּשְׁמַע
  english_pob_choice: we have obeyed
  chosen_spanish: hemos escuchado
  alternatives_spanish:
  - hemos obedecido
  - hemos oído
  - hemos atendido
  lexicon: HALOT
  rationale: שׁמע puede incluir la idea de obedecer, pero en español «obedecer» ya interpreta de manera fuerte la relación entre oír y responder. Aquí se conserva la metáfora verbal en el texto principal con «hemos escuchado», y se deja explícita la lectura obediencial en la nota.
- source_word: וַנַּעַשׂ
  english_pob_choice: and done
  chosen_spanish: y hemos hecho
  alternatives_spanish:
  - y hemos obrado
  - y hemos cumplido
  - y hemos ejecutado
  lexicon: HALOT
  rationale: עשה completa el par hebreo de oír/obedecer y hacer. «Hemos hecho» mantiene la sencillez y la correspondencia directa sin añadir matiz interpretativo excesivo.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - según todo lo que
  - conforme a todo lo que
  - todo cuanto
  lexicon: HALOT
  rationale: La expresión idiomática indica totalidad de conformidad con la orden. «Todo lo que» es natural en español y conserva la amplitud del hebreo.
- source_word: צִוָּנוּ
  english_pob_choice: commanded us
  chosen_spanish: nos mandó
  alternatives_spanish:
  - nos ordenó
  - nos instruyó
  - nos dio mandato
  lexicon: HALOT
  rationale: צוה expresa mandato/orden con autoridad. «Mandó» es claro, directo y usual en español bíblico contemporáneo; evita una redundancia pesada con «hecho/obedecido».
- source_word: יוֹנָדָב
  english_pob_choice: Jonadab
  chosen_spanish: Jonadab
  alternatives_spanish:
  - Jehonadab
  lexicon: transliteration
  rationale: Se conserva la forma base «Jonadab» en español. La variante inglesa «Jehonadab» no se adopta en el texto principal porque no es la forma preferente aquí y podría introducir inestabilidad nominal.
- source_word: אָבִינוּ
  english_pob_choice: our father
  chosen_spanish: nuestro padre
  alternatives_spanish:
  - nuestro antepasado
  - nuestro ancestro
  lexicon: HALOT
  rationale: Aunque el referente funciona como antepasado de clan, el hebreo dice literalmente «nuestro padre». «Nuestro padre» preserva la forma y la autoridad familiar del texto.
theological_decisions:
- issue: Sentido de שׁמע frente a mandamiento
  english_pob_reading: we have obeyed
  chosen_spanish_reading: hemos escuchado
  alternative_spanish_readings:
  - hemos obedecido
  - hemos oído
  rationale: El hebreo permite entender שׁמע como respuesta obediente a una orden, y el English POB lo explicita como «obeyed». En español, para no borrar la tensión entre oír y obedecer, se mantiene «hemos escuchado» en el texto y se explica en la nota que el hebreo también puede significar obediencia efectiva.
  doctrine_reference: No doctrinal issue; lexical-contextual nuance in obedience language.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin traducirlo mecánicamente: se preservó la pareja hebrea «escuchado y hecho» en el texto principal para no ocultar la tensión léxica de שׁמע, y se trasladó a una nota la lectura obediencial que el English POB hace explícita. No hubo revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usó «tiendas» como término bíblico natural para בָּאֳהָלִים.
  - Se conservó «Jonadab» por consistencia onomástica.
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton ni una cita directa relevante.
  - El texto principal mantiene una sintaxis fluida y públicamente legible en español, sin perder la correspondencia con el hebreo.
