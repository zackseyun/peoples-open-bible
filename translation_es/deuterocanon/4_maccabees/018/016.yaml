translation:
  language: es
  text: 'Puso a Salomón delante de nosotros como proverbio, como el que dice[a]: «Árbol de vida es para todos los que hacen su voluntad[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase evoca Proverbios 3:18, pero en forma adaptada.
    reason: cross_reference
  - marker: b
    text: 'O: «para todos los que hacen su voluntad». El pronombre griego puede entenderse con un referente impersonal, aunque el contexto favorece la referencia a Dios.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπαροιμίαζεν
  english_pob_choice: set ... before us as a proverb
  chosen_spanish: Puso ... delante de nosotros como proverbio
  alternatives_spanish:
  - lo citó proverbialmente
  - lo presentó como proverbio
  - lo puso como dicho proverbial
  lexicon: LSJ
  rationale: El verbo expresa la acción de citar o presentar de manera proverbial. «Puso ... delante de nosotros» conserva la escena retórica del auditorio; «como proverbio» mantiene el matiz de formulación proverbial sin sobreparafrasear.
- source_word: τὸν Σαλομῶντα
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - el mismo Salomón
  lexicon: LSJ
  rationale: El nombre propio se translitera al español de forma estándar. El acusativo funciona como objeto del verbo de citar proverbialmente, no como sujeto de una nueva cláusula.
- source_word: ἡμῖν
  english_pob_choice: before us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - para nosotros
  - a nosotros
  lexicon: LSJ
  rationale: La dativa marca el auditorio receptor de la cita proverbial. «Delante de nosotros» comunica mejor en español la idea de presentación pública o retórica que un simple «a nosotros».
- source_word: τὸν λέγοντα
  english_pob_choice: the one who says
  chosen_spanish: al que dice
  alternatives_spanish:
  - el que dice
  - quien dice
  lexicon: LSJ
  rationale: El participio con artículo identifica a Salomón como el hablante de la sentencia citada. «Al que dice» conserva la función atributiva y se integra bien en la sintaxis española.
- source_word: Ξύλον ζωῆς
  english_pob_choice: a tree of life
  chosen_spanish: Árbol de vida
  alternatives_spanish:
  - un árbol de vida
  - árbol de la vida
  lexicon: LSJ
  rationale: La expresión reproduce el eco sapiencial de Proverbios 3:18. En español, la forma sin artículo es natural en una sentencia nominal; se evita añadir «la» porque el griego no la explicita aquí.
- source_word: πᾶσιν τοῖς ποιοῦσιν
  english_pob_choice: to all who do
  chosen_spanish: para todos los que hacen
  alternatives_spanish:
  - a todos los que hacen
  - para todos los que practican
  lexicon: LSJ
  rationale: «Hacen» es la traducción más directa y natural de ποιεῖν en este contexto. «Para» refleja el valor beneficiario/destinal de πᾶσιν mejor que una mera referencia espacial.
- source_word: αὐτοῦ τὸ θέλημα
  english_pob_choice: his will
  chosen_spanish: su voluntad
  alternatives_spanish:
  - su querer
  - la voluntad de él
  - su querer hacer
  lexicon: LSJ
  rationale: El pronombre griego es ambiguo entre un referente personal y uno impersonal. En español, «su voluntad» conserva esa ambigüedad mejor que explicitar «de Dios»; el contexto permite leerlo como la voluntad de Dios, sin resolverla en el texto principal.
theological_decisions:
- issue: Referente de αὐτοῦ en la frase final
  english_pob_reading: his will
  chosen_spanish_reading: su voluntad
  alternative_spanish_readings:
  - su voluntad (de Dios)
  - su voluntad / la de él
  rationale: 'La lectura inglesa opta por un referente personal en contexto teológico, pero documenta la posibilidad impersonal. En español, «su voluntad» preserva la tensión: puede leerse como la voluntad de Dios o, gramáticamente, como la del antecedente cercano. No se añade una aclaración intratextual para no cerrar una ambigüedad que el griego permite.'
  doctrine_reference: Preservar la ambigüedad documentada; no resolverla de manera dogmática en la línea principal.
- issue: Eco de Proverbios 3:18
  english_pob_reading: The saying echoes Proverbs 3:18 in adapted form.
  chosen_spanish_reading: La frase evoca Proverbios 3:18 en forma adaptada.
  alternative_spanish_readings:
  - La sentencia alude a Proverbios 3:18.
  - La expresión hace eco de Proverbios 3:18.
  rationale: El texto griego reproduce claramente el motivo sapiencial de Proverbios, pero en forma adaptada. La formulación española debe conservar esa relación intertextual sin convertirla en cita exacta.
  doctrine_reference: Mantener la intertextualidad sapiencial y su adaptación en el contexto martirial.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se prefirió una formulación formal y natural para ἐπαροιμίαζεν y una correspondencia más literal de πᾶσιν τοῖς. La versión española sigue esa orientación, pero adapta la sintaxis para que resulte idiomática y mantiene la ambigüedad de αὐτοῦ en «su voluntad».'
  spanish_consistency_notes:
  - Se usa «Salomón» para el nombre propio y «voluntad» para θέλημα, conforme al registro bíblico estándar en español.
  - Se evita «SEÑOR» u otras mayúsculas de sustitución porque el versículo no contiene el Tetragrámaton ni κύριος explícito.
  - Se mantiene el estilo solemne y no se introduce una paráfrasis interpretativa que cierre la referencia de la última cláusula.
