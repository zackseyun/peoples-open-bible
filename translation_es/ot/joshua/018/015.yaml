revisions:
- from: Y el lado sur estaba desde el extremo de Quiriat-jearim[a], y el límite se extendía hacia el oeste[b] y se extendía hasta la fuente de las aguas de Nephtoaj.
  to: Y el lado sur era desde el extremo de Quiriat-jearim[a], y el límite se extendía hacia el oeste[b] y se extendía hasta el manantial de las aguas de Nephtoa[c].
  rationale: Se corrigió el topónimo final a «Nephtoa» para ajustarlo mejor al nombre fuente auditado, se añadió la nota léxica faltante sobre la construcción «de las aguas de», y se mejoró la naturalidad y precisión geográfica con «era desde» y «manantial».
