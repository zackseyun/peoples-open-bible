translation:
  language: es
  text: Él vendrá sobre ustedes terriblemente[a] y con rapidez, porque un juicio severo cae sobre quienes ocupan puestos elevados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de manera temible y rápidamente vendrá sobre ustedes, porque un juicio abrupto viene para los exaltados'.
    reason: lexical_alternative
lexical_decisions:
- source_word: φρικτῶς
  english_pob_choice: terribly
  chosen_spanish: de manera terrible
  alternatives_spanish:
  - de forma temible
  - de manera aterradora
  - con terror
  lexicon: LSJ
  rationale: El adverbio expresa algo que causa temor o pavor. 'De manera terrible' conserva la fuerza solemne sin sonar demasiado mecánico.
- source_word: ταχέως
  english_pob_choice: swiftly
  chosen_spanish: veloz
  alternatives_spanish:
  - rápidamente
  - pronto
  - con rapidez
  lexicon: LSJ
  rationale: Se trata de rapidez en la acción de la visita/jucio. 'Veloz' mantiene un tono más solemne que 'rápidamente'.
- source_word: ἐπιστήσεται
  english_pob_choice: will come upon
  chosen_spanish: vendrá sobre ustedes
  alternatives_spanish:
  - se les presentará
  - los confrontará
  - caerá sobre ustedes
  lexicon: LSJ
  rationale: El futuro medio de ἐφίστημι puede significar acercarse o sobrevenir. En este contexto de advertencia judicial, 'vendrá sobre ustedes' comunica la irrupción inminente sin especificar más de lo que el griego exige.
- source_word: κρίσις
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - justicia
  - decisión
  lexicon: LSJ
  rationale: Aquí el sustantivo apunta a una acción judicial contra los poderosos. 'Juicio' es natural en español y conserva el sentido forense.
- source_word: ἀπότομος
  english_pob_choice: severe
  chosen_spanish: severo
  alternatives_spanish:
  - abrupto
  - duro
  - áspero
  lexicon: LSJ
  rationale: Como 'veloz' ya expresa la rapidez, 'severo' evita redundancia y destaca la dureza del juicio.
- source_word: ἐν τοῖς ὑπερέχουσιν
  english_pob_choice: upon those in high places
  chosen_spanish: sobre los que están en altos puestos
  alternatives_spanish:
  - entre los encumbrados
  - sobre los que sobresalen
  - para los que están en autoridad
  lexicon: LSJ
  rationale: La expresión refiere a personas elevadas en rango o estatus. 'Altos puestos' preserva la imagen de elevación y resulta claro para lectores de español.
- source_word: γίνεται
  english_pob_choice: comes upon
  chosen_spanish: cae
  alternatives_spanish:
  - ocurre
  - se produce
  - acontece
  lexicon: LSJ
  rationale: Con 'juicio' como sujeto, 'cae' expresa el efecto de sobrevenir de forma natural en español y refleja el valor eventivo del verbo en el contexto.
theological_decisions:
- issue: Naturaleza de la amenaza dirigida a los poderosos
  english_pob_reading: The verse speaks of divine judgment suddenly and dreadfully overtaking powerful rulers.
  chosen_spanish_reading: El versículo presenta una advertencia de juicio divino que irrumpe con terror y rapidez sobre quienes ocupan posiciones elevadas.
  alternative_spanish_readings:
  - El versículo puede leerse como una afirmación general de que el juicio severo sucede para los exaltados.
  - El versículo habla de una confrontación personal más que de un juicio impersonal.
  rationale: El contexto inmediato dirige la advertencia a personas en posiciones altas; por eso conviene mantener el carácter de amenaza judicial y no suavizarlo en un principio genérico.
  doctrine_reference: Preservar la tensión teológica del texto fuente; primacía del griego sobre una armonización interpretativa.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; la redacción sigue el sentido del griego Swete 1909 y el rastro auditado en inglés, con ajuste natural al español.
  spanish_consistency_notes:
  - Se mantiene 'juicio' para κρίσις, coherente con un contexto forense.
  - '''Altos puestos'' conserva la metáfora de elevación social/política sin imponer una lectura eclesiástica.'
  - '''Terrible'' y ''veloz'' reproducen la doble carga adverbial sin diluir la advertencia.'
  - Se evita 'Señor' u otra sustitución no indicada, porque el texto no contiene el Tetragrámaton ni una cita de κύριος.
