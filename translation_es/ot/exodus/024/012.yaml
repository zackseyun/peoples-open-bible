translation:
  language: es
  text: 'Entonces Yahvé le dijo a Moisés: «Sube hacia mí al monte y permanece allí, y te daré las tablas de piedra, y la ley[a] y el mandamiento[b], que he escrito para su instrucción».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la instrucción y el mandamiento». La palabra hebrea torah suele significar «instrucción» o «enseñanza», no solo estatuto legal.
    reason: lexical_alternative
  - marker: b
    text: La expresión «la ley y el mandamiento» puede entenderse como instrucción del pacto adicional a las tablas de piedra, o como una descripción de lo que está escrito en ellas.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del tetragrámaton como transliteración reconocible en español, siguiendo el principio del proyecto de no sustituirlo por un título. «Yahvé» es la forma de uso más extendido y clara para lectores bíblicos en español.
- source_word: עֲלֵה אֵלַי הָהָרָה
  english_pob_choice: Come up to me on the mountain
  chosen_spanish: Sube a mí al monte
  alternatives_spanish:
  - Ven a mí al monte
  - Sube hacia mí al monte
  lexicon: HALOT
  rationale: El imperativo עלה conserva el movimiento ascendente; en español «sube» es natural y fiel. Se mantiene la dirección a la persona de Dios con «a mí», y «al monte» refleja la referencia locativa sin forzar un giro más literal de la forma direccional hebrea.
- source_word: וֶהְיֵה שָׁם
  english_pob_choice: and remain there
  chosen_spanish: y permanece allí
  alternatives_spanish:
  - y quédate allí
  - y estate allí
  lexicon: HALOT
  rationale: El verbo היה con שָׁם expresa permanencia continuada; «permanece allí» comunica bien la idea sin perder el valor imperativo ni sonar arcaico.
- source_word: וְאֶתְּנָה לְךָ
  english_pob_choice: and I will give you
  chosen_spanish: y te daré
  alternatives_spanish:
  - y yo te daré
  - y he de darte
  lexicon: HALOT
  rationale: La cohortativa de primera persona se traduce de forma natural como promesa futura en español. «Te daré» mantiene la intención divina con fluidez.
- source_word: לֻחֹת הָאֶבֶן
  english_pob_choice: the stone tablets
  chosen_spanish: las tablas de piedra
  alternatives_spanish:
  - las tablas de piedra tallada
  - las tablas de piedra
  lexicon: HALOT
  rationale: «Tablas de piedra» reproduce con transparencia el constructo hebreo y el referente de las tablas del pacto. Se prefiere «tablas» frente a «tablillas» por el uso bíblico más habitual y por el tamaño implícito del objeto.
- source_word: וְהַתּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la enseñanza
  lexicon: HALOT
  rationale: Aunque תּוֹרָה puede significar «instrucción/enseñanza», en este contexto sinaítico el POB inglés optó por «law». En español, «ley» conserva esa lectura jurídica-covenantal sin eliminar la posibilidad de sentido instruccional, que se explica en nota.
- source_word: וְהַמִּצְוָה
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el mandato
  - el precepto
  lexicon: HALOT
  rationale: Se preserva el singular explícito del hebreo con «el mandamiento». «Mandato» o «precepto» serían posibles, pero «mandamiento» corresponde mejor al campo bíblico y a la elección inglesa.
- source_word: אֲשֶׁר כָּתַבְתִּי
  english_pob_choice: which I have written
  chosen_spanish: que he escrito
  alternatives_spanish:
  - que escribí
  - que yo he escrito
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completada con vigencia actual. En español, el pretérito perfecto compuesto «he escrito» mantiene bien ese valor.
- source_word: לְהוֹרֹתָם
  english_pob_choice: for their instruction
  chosen_spanish: para instruirlos
  alternatives_spanish:
  - para su instrucción
  - para enseñarles
  lexicon: HALOT
  rationale: El infinitivo hifil de ירה significa «instruir/enseñar». Se elige «para instruirlos» porque expresa el propósito de forma directa y conserva el pronombre plural del sufijo hebreo.
theological_decisions:
- issue: Alcance de «la ley y el mandamiento» con relación a «las tablas de piedra»
  english_pob_reading: 'The sequence is kept as a list: ''the stone tablets, and the law and the commandment,'' without collapsing the nouns into a single paraphrase.'
  chosen_spanish_reading: 'Se mantiene la enumeración: «las tablas de piedra, y la ley y el mandamiento», sin convertirla en una sola explicación.'
  alternative_spanish_readings:
  - «las tablas de piedra, es decir, la ley y el mandamiento»
  - «las tablas de piedra, que contienen la ley y el mandamiento»
  rationale: El hebreo coordina los sustantivos, y la traducción debe respetar esa estructura sin decidir de antemano si «la ley y el mandamiento» explican el contenido de las tablas o si añaden otra referencia del pacto. Se preserva así la tensión interpretativa documentada por el POB inglés.
  doctrine_reference: Preservar la tensión teológica/interpretativa sin resolverla prematuramente.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés más reciente; el estado indica alta concordancia y sin cambios necesarios. La redacción española sigue de cerca las decisiones auditadas del POB inglés, conservando las tensiones léxicas e interpretativas documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa «monte» en singular para הָהָרָה, con artículo implícito natural en español.
  - Se conserva la distinción entre «ley» y «mandamiento» en la lista principal.
  - Los pies de nota usan letras únicas y aparecen anclados solo donde corresponde.
  - La voz verbal es formal pero natural para una cita bíblica pública.
