translation:
  language: es
  text: Así los judíos aceptaron[a] lo que habían comenzado a hacer, y lo que Mardoqueo les había escrito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tomaron sobre sí lo que habían comenzado a hacer». El verbo hebreo puede expresar aceptar o asumir algo como obligación o compromiso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקִבֵּל
  english_pob_choice: accepted
  chosen_spanish: aceptaron
  alternatives_spanish:
  - tomaron sobre sí
  - recibieron
  - asumieron
  lexicon: HALOT
  rationale: קבל en este contexto no es solo 'recibir' pasivamente, sino aceptar o asumir formalmente una práctica/obligación. 'Aceptaron' conserva bien esa fuerza en español natural y refleja la decisión auditada en inglés.
- source_word: הַיְּהוּדִים
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - el pueblo judío
  lexicon: HALOT
  rationale: La referencia étnico-religiosa es directa y el artículo definido se conserva de manera natural en español.
- source_word: אֵת אֲשֶׁר הֵחֵלּוּ לַעֲשׂוֹת
  english_pob_choice: what they had begun to do
  chosen_spanish: lo que habían comenzado a hacer
  alternatives_spanish:
  - lo que habían empezado a hacer
  - aquello que habían iniciado a hacer
  - lo que habían emprendido hacer
  lexicon: HALOT
  rationale: El verbo החל indica inicio de una acción. 'Habían comenzado a hacer' transmite con claridad el carácter preliminar de esa práctica y sigue de cerca la secuencia narrativa evidenciada en el hebreo.
- source_word: וְאֵת אֲשֶׁר
  english_pob_choice: and what
  chosen_spanish: y lo que
  alternatives_spanish:
  - y aquello que
  - y lo cual
  lexicon: HALOT
  rationale: La repetición de la construcción de objeto directo con relativo se expresa en español de forma idiomática como 'y lo que', manteniendo el paralelismo del texto hebreo.
- source_word: כָּתַב
  english_pob_choice: had written
  chosen_spanish: había escrito
  alternatives_spanish:
  - escribió
  - había redactado
  lexicon: HALOT
  rationale: El pluscuamperfecto en español aclara que la carta de Mardoqueo precede a la aceptación de los judíos en la secuencia narrativa, como en la lectura auditada inglesa.
- source_word: מָרְדֳּכַי
  english_pob_choice: Mordecai
  chosen_spanish: Mardoqueo
  alternatives_spanish:
  - Mordecai
  lexicon: Transliteración estándar bíblica en español
  rationale: '''Mardoqueo'' es la forma bíblica establecida y más reconocible en español; conserva la identidad del nombre propio sin alterar el referente.'
- source_word: אֲלֵי/הֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: HALOT
  rationale: El dativo de destinatario se vuelve más natural en español con el pronombre clítico 'les'. El sentido de dirección comunicativa del hebreo queda preservado sin sobrecargar la frase.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo directamente, usando la versión inglesa auditada solo como apoyo de decisiones léxicas y de secuencia verbal. No se detectaron revisiones posteriores que alteren el sentido base; la concordancia del revisor fue alta.
  spanish_consistency_notes:
  - Se mantuvo 'Mardoqueo' como forma bíblica habitual en español.
  - Se conservó el matiz de aceptación formal de קבל con 'aceptaron', no con 'recibieron'.
  - La relación temporal entre la acción iniciada y la carta se expresó con pluscuamperfecto en español para reflejar la secuencia narrativa.
  - La nota al pie se ancló en 'aceptaron' para preservar la alternativa léxica documentada en el audit trail.
