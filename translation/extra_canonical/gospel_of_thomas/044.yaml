translation:
  text: Jesus said, "Whoever blasphemes against the Father will be forgiven, and whoever
    blasphemes against the Son will be forgiven. But whoever blasphemes against the
    Holy Spirit will not be forgiven, neither on earth nor in heaven."
  philosophy: optimal-equivalence
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:42:00Z'
  footnotes:
  - marker: blasphemes
    text: The Coptic spelling ⲡⲉⲧⲁϫⲉⲟⲩⲁ is a reduced form of the future relative ⲡⲉⲧⲛⲁϫⲓⲟⲩⲁ
      ('the one who will blaspheme').
    reason: dialect_note
  - marker: will be forgiven
    text: The Coptic uses the active third-person plural ('they will forgive him')
      as a standard circumlocution for the passive.
    reason: register_note
  - marker: neither on earth nor in heaven
    text: Thomas replaces the temporal/eschatological framework of the synoptic parallel
      (Matthew 12:32, 'neither in this age nor in the age to come') with a spatial/cosmic
      framework ('neither on earth nor in heaven'), reflecting its realized, non-apocalyptic
      theology.
    reason: theological_note
lexical_decisions:
- source_word: ϫⲓⲟⲩⲁ
  chosen: blasphemes
  rationale: The Coptic verb ϫⲓⲟⲩⲁ means 'to blaspheme' or 'to curse'. The manuscript
    spells it ϫⲉⲟⲩⲁ here.
  lexicon: Crum 794a
  alternatives:
  - curses
  - speaks against
- source_word: ⲕⲱ ⲉⲃⲟⲗ
  chosen: will be forgiven
  rationale: The Coptic uses the third-person plural active (ⲥⲉⲛⲁⲕⲱ ⲉⲃⲟⲗ ⲛⲁϥ, 'they
    will forgive him') as a standard circumlocution for the passive ('he will be forgiven').
  lexicon: Crum 96b
  alternatives:
  - it will be forgiven him
  - they will forgive him
- source_word: ⲡⲕⲁϩ
  chosen: earth
  rationale: Standard translation for ⲕⲁϩ in a cosmic pairing with heaven.
  lexicon: Crum 131a
- source_word: ⲧⲡⲉ
  chosen: heaven
  rationale: Standard translation for ⲡⲉ.
  lexicon: Crum 259a
theological_decisions:
- issue: Spatial vs. temporal eschatology
  chosen_reading: neither on earth nor in heaven
  rationale: Preserved exactly as in Coptic, noting the divergence from Matthew's
    'this age / age to come'. This highlights Thomas's spatial rather than temporal
    eschatology.
  alternatives_noted: []
drafter_notes: The translation preserves Thomas's distinct spatial framing ('neither
  on earth nor in heaven') which diverges from the temporal framing of the synoptic
  parallels. The English passive 'will be forgiven' accurately renders the Coptic
  impersonal third-person plural.
