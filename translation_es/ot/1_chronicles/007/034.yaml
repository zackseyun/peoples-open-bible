  - marker: b
    text: El nombre hebreo admite distintas transliteraciones; algunas versiones lo escriben ‘Jehubbah’ y otras ‘Hubbah’.
    reason: lexical_alternative
  revision_rationale: Se hizo una corrección menor de puntuación para ajustarla al español natural y se refinó la redacción de la nota lexical sin alterar el sentido ni las decisiones auditadas.
