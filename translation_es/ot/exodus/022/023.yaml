review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: ira divina que se enciende, muerte por espada, esposas viudas e hijos privados de padre. Sin embargo, no preserva plenamente una decisión clave del rastro POB en וּבְנֵיכֶם, porque el hebreo dice específicamente ''sus hijos varones/sus hijos'' y el inglés auditado retuvo ''your sons''. En español, ''sus hijos'' puede funcionar genéricamente, pero aquí conviene mantener la especificidad masculina con ''sus hijos varones'' o ''sus hijos'' solo si se justifica mejor; además el inglés preservó ''fatherless'' como matiz principal. También hay un desajuste de notas: la nota [a] en español comenta ''mi furor se encenderá'', pero la nota alternativa documentada en el inglés para [a] corresponde a בֶּחָרֶב (''by the sword''), mientras la nota [b] inglesa corresponde a ''orphans''.'
  spanish_quality_summary: El español es claro y natural, con buen registro bíblico moderno. 'Mi ira se encenderá' y 'los mataré a espada' son idiomáticos y dignos. 'Sus esposas quedarán viudas' es correcto. La principal mejora necesaria es alinear mejor las notas y reforzar la precisión de 'יְתֹמִים' con una nota léxica, ya que 'quedarán sin padre' comunica bien el sentido pero deja sin reflejar la alternativa 'huérfanos'.
  glossary_alignment: No hay términos del glosario mayor en disputa en este versículo. Las decisiones léxicas sobre ira divina, matar, espada, viudas y padreless son mayormente coherentes con la filosofía POB. La cuestión principal es la precisión de género en בנים y la conservación de la alternativa léxica de יְתֹמִים.
  issues:
  - severity: high
    issue: Las notas al pie no siguen el contenido ni la asignación del audit trail inglés.
    rationale: En el inglés, la nota a corresponde a 'by the sword' para בֶּחָרֶב, y la nota b corresponde a 'orphans' como alternativa a 'fatherless'. En el borrador español, [a] se aplica a 'se encenderá' y [b] a 'a espada', omitiendo la alternativa para 'sin padre'.
  - severity: medium
    issue: La especificidad masculina de וּבְנֵיכֶם queda algo atenuada con 'sus hijos'.
    rationale: Aunque 'hijos' puede incluir descendencia en español, el hebreo usa 'sons'. Dado que el POB inglés retuvo esa especificidad, conviene reflejarla mejor en español con 'sus hijos varones' para máxima fidelidad.
  - severity: low
    issue: Punto y coma innecesario donde la coordinación simple fluye mejor.
    rationale: El hebreo encadena las consecuencias con waw; en español funciona mejor una coma antes de la última cláusula en este versículo.
  revised_spanish_text: Entonces mi ira se encenderá, y los mataré a espada[a]; sus esposas quedarán viudas y sus hijos varones quedarán sin padre[b].
