revisions:
- from: Pero ahora está muerto. ¿Por qué habría de ayunar más? ¿Puedo hacerlo volver de nuevo? Yo voy hacia él[a], pero él no volverá a mí.
  to: Pero ahora está muerto. ¿Por qué habría de ayunar más? ¿Puedo traerlo de vuelta de nuevo? Yo voy a él[a], pero él no volverá a mí.
  rationale: Se ajusta 'voy hacia él' a 'voy a él' por naturalidad y mejor equivalencia idiomática con אֵלָיו, sin resolver de más la tensión teológica. También se cambia 'hacerlo volver' por 'traerlo de vuelta' para un español más fluido en este contexto, manteniendo la idea causativa de 'hacer regresar'. La nota se conserva, simplificada para alinearse con el texto revisado.
