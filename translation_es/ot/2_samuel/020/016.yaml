translation:
  language: es
  text: 'Entonces una mujer sabia llamó en voz alta desde la ciudad: «¡Escuchen, escuchen! Por favor, díganle a Joab: “Acércate hasta aquí[a], para que yo hable contigo”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Ven aquí, para que yo te hable». El hebreo, más literalmente, dice: «Acércate hasta aquí, y déjame hablar contigo / hablarte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְרָא
  english_pob_choice: called out
  chosen_spanish: llamó
  alternatives_spanish:
  - clamó
  - llamó en voz alta
  lexicon: HALOT
  rationale: El verbo introduce una acción pública y audible; en español, «llamó» mantiene la idea básica de קרא sin volver el texto innecesariamente enfático. El contexto de la ciudad ya comunica la alzada de voz.
- source_word: אִשָּׁה חֲכָמָה
  english_pob_choice: a wise woman
  chosen_spanish: una mujer sabia
  alternatives_spanish:
  - una mujer prudente
  - una mujer de sabiduría
  lexicon: HALOT
  rationale: «Sabia» reproduce naturalmente el valor adjetival de חכמה y conserva la caracterización del personaje sin ampliar el sentido.
- source_word: מִן הָעִיר
  english_pob_choice: from the city
  chosen_spanish: desde la ciudad
  alternatives_spanish:
  - de la ciudad
  - fuera de la ciudad
  lexicon: HALOT
  rationale: «Desde» expresa bien el punto de procedencia del llamado y suena más natural que un calco rígido, sin perder la fuente espacial.
- source_word: שִׁמְעוּ שִׁמְעוּ
  english_pob_choice: Listen, listen!
  chosen_spanish: ¡Escuchen, escuchen!
  alternatives_spanish:
  - ¡Oigan, oigan!
  - ¡Escuchen! ¡Escuchen!
  lexicon: HALOT
  rationale: La repetición imperativa se conserva para mantener la urgencia y la intensidad del hebreo. «Escuchen» es claro y solemne en español bíblico contemporáneo.
- source_word: אִמְרוּ נָא
  english_pob_choice: Please say
  chosen_spanish: Por favor, digan
  alternatives_spanish:
  - Les ruego, digan
  - Digan, por favor
  lexicon: HALOT
  rationale: El plural imperativo se mantiene con «digan», y נא se refleja con «por favor». En español, esta combinación expresa adecuadamente la petición cortés.
- source_word: אֶל יוֹאָב
  english_pob_choice: to Joab
  chosen_spanish: a Joab
  alternatives_spanish:
  - para Joab
  - ante Joab
  lexicon: HALOT
  rationale: El español natural con el verbo «decir» usa «a» para el destinatario del mensaje. No hace falta sobrecargar la frase con una preposición más literal.
- source_word: קְרַב עַד הֵנָּה
  english_pob_choice: Come near here
  chosen_spanish: Acércate hasta aquí
  alternatives_spanish:
  - Acércate aquí
  - Ven hasta aquí
  - Acércate a este lugar
  lexicon: HALOT
  rationale: «Acércate» conserva קרב como aproximación; «hasta aquí» refleja la fuerza de עַד הֵנָּה, literalmente el movimiento “hasta este punto”. La opción mantiene la tensión espacial del hebreo.
- source_word: וַאֲדַבְּרָה אֵלֶיךָ
  english_pob_choice: so that I may speak with you
  chosen_spanish: para que yo hable contigo
  alternatives_spanish:
  - y hablaré contigo
  - para hablar contigo
  lexicon: HALOT
  rationale: El cohortativo expresa intención o propósito; «para que yo hable contigo» reproduce bien esa finalidad en español. «Contigo» preserva el matiz conversacional del encuentro.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y la auditoría inglesa: conserva la repetición enfática de «Escuchen, escuchen», refleja la cortesía de נא con «por favor», y mantiene el valor direccional de קְרַב עַד הֵנָּה con «Acércate hasta aquí».'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando aparezca el tetragrámaton; aquí no aplica.
  - Se mantuvo el tratamiento verbal plural «digan» para reflejar el imperativo plural hebreo.
  - La construcción «para que yo hable contigo» evita una paráfrasis excesiva y conserva la intención del cohortativo.
