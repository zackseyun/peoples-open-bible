translation:
  language: es
  text: Entonces Mardoqueo escribió estas cosas[a] y envió cartas a todos los judíos que estaban en todas las provincias del rey Asuero, tanto cerca como lejos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estas palabras». El hebreo puede referirse tanto a los asuntos o acontecimientos recién descritos como a las palabras que Mardoqueo escribió acerca de ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתֹּב
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - redactó
  - escribió por escrito
  lexicon: HALOT
  rationale: El verbo כתב en esta secuencia narrativa expresa acción de escribir de forma directa. «Escribió» es natural en español y conserva el sentido básico sin sobrecargarlo.
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas palabras
  - estos asuntos
  lexicon: HALOT
  rationale: דְּבָרִים puede significar «palabras», «asuntos» o «cosas». Aquí el hebreo deja abierta la referencia entre lo narrado y lo que Mardoqueo puso por escrito; «estas cosas» preserva esa amplitud. La nota[a] recoge la alternativa «estas palabras».
- source_word: וַיִּשְׁלַח סְפָרִים
  english_pob_choice: sent letters
  chosen_spanish: envió cartas
  alternatives_spanish:
  - envió escritos
  - envió documentos
  lexicon: HALOT
  rationale: סְפָרִים en este contexto administrativo se refiere a comunicaciones escritas. «Cartas» es idiomático en español y mantiene bien el marco cortesano persa.
- source_word: כָּל הַיְּהוּדִים
  english_pob_choice: all the Jews
  chosen_spanish: a todos los judíos
  alternatives_spanish:
  - a todo el pueblo judío
  lexicon: HALOT
  rationale: La expresión designa a la comunidad judía extendida por el imperio. «Judíos» es directo y fiel al sustantivo del hebreo.
- source_word: בְּכָל מְדִינוֹת
  english_pob_choice: in all the provinces
  chosen_spanish: en todas las provincias
  alternatives_spanish:
  - por todas las provincias
  - en todas las jurisdicciones
  lexicon: HALOT
  rationale: מְדִינוֹת remite a divisiones administrativas imperiales. «Provincias» es la equivalencia más clara y estándar en español.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: of King Ahasuerus
  chosen_spanish: del rey Asuero
  alternatives_spanish:
  - del rey Ahasuero
  - del rey Jerjes
  lexicon: HALOT
  rationale: Se mantiene la transliteración tradicional «Asuero» como nombre propio en español bíblico, sin sustituirlo por una identificación histórica interpretativa.
- source_word: הַקְּרוֹבִים וְהָרְחוֹקִים
  english_pob_choice: both near and far
  chosen_spanish: tanto cerca como lejos
  alternatives_spanish:
  - los cercanos y los lejanos
  - ya fueran cercanos o lejanos
  lexicon: HALOT
  rationale: Los adjetivos funcionan de modo colectivo y forman una merismo que abarca a todos los judíos del imperio. «Tanto cerca como lejos» conserva bien el paralelismo y la amplitud.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece explícitamente en el texto principal junto a la frase correspondiente.'
  spanish_consistency_notes:
  - Se conservó el nombre propio «Mardoqueo» y la transliteración bíblica tradicional «Asuero».
  - Se mantuvo la secuencia narrativa con «Entonces» para reflejar el waw consecutivo inicial.
  - «Cartas» se usó para סְפָרִים por ser la opción idiomática y coherente con el contexto administrativo persa.
  - La nota [a] está anclada exactamente en «estas cosas» para reflejar la ambigüedad hebrea sin duplicar marcadores.
