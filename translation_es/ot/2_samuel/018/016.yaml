  text: וַ/יִּתְקַ֤ע יוֹאָב֙ בַּ/שֹּׁפָ֔ר וַ/יָּ֣שָׁב הָ/עָ֔ם מִ/רְדֹ֖ף אַחֲרֵ֣י יִשְׂרָאֵ֑ל כִּֽי חָשַׂ֥ךְ יוֹאָ֖ב אֶת הָ/עָֽם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/018/016.yaml
  text: Then Joab blew the trumpet[a], and the people turned back from pursuing Israel[c][b], because Joab restrained the people.
  footnotes:
  - marker: a
    text: Or 'the horn.' Hebrew shofar refers to a signaling horn, often a ram's horn; 'trumpet' is the idiomatic military rendering here.
    reason: lexical_alternative
  - marker: b
    text: That is, the forces of Israel aligned with Absalom.
    reason: cultural_note
  - marker: c
    text: Or 'restrained the people' or 'spared the people.' The Hebrew verb can carry the sense of withholding or restraining; here it most likely means Joab stopped his men from continuing the pursuit.
    reason: lexical_alternative
