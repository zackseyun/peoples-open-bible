base_translation:
  language: en
  yaml_path: translation/ot/exodus/010/012.yaml
  text: Then Yahweh said to Moses[a], “Stretch out your hand over the land of Egypt for the locusts, so that they may come up over the land of Egypt and eat every plant of the land[b], everything that the hail has left.”
  footnotes:
  - marker: a
    text: Hebrew 'for/with regard to the locust'; the preposition is difficult, and more literal renderings such as 'against the locusts' or 'over the locusts' are possible.
    reason: lexical_alternative
  - marker: b
    text: Hebrew singular 'locust' with singular verbs, used collectively for the swarm; English renders the sense with the plural 'locusts' / 'they.'
