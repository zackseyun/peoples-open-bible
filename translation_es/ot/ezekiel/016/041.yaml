  glossary_alignment: No hay conflictos con la terminología del proyecto. Se conserva explícitamente la metáfora de prostitución, conforme a la decisión teológica auditada. 'Pago' para אֶתְנַן es aceptable y moderno, aunque la frase completa necesita ajuste idiomático.
