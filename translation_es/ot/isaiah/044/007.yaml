translation:
  language: es
  text: ¿Y quién es como yo? Que llame y lo declare, y lo ponga en orden para mí, desde que yo dispuse un pueblo de antaño[a]. Que les declaren las cosas por venir[b], y lo que sucederá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde el tiempo en que yo establecí al pueblo de antaño». La frase hebrea también puede leerse temporalmente, y «un pueblo de antaño» también puede traducirse «el pueblo de antaño».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las señales y las cosas que vendrán». La palabra hebrea también puede entenderse como «señales» o «signos», aunque aquí el contexto favorece acontecimientos futuros.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִי כָמוֹנִי
  english_pob_choice: And who is like me?
  chosen_spanish: ¿Y quién es como yo?
  alternatives_spanish:
  - ¿Quién, entonces, es como yo?
  - ¿Y quién hay como yo?
  lexicon: HALOT
  rationale: Se conserva el desafío retórico y la continuidad discursiva del ו inicial con «Y». «Quién es como yo» es la forma más natural y fiel en español.
- source_word: יִקְרָא
  english_pob_choice: let him call
  chosen_spanish: Que llame
  alternatives_spanish:
  - Que proclame
  - Que invoque
  lexicon: HALOT
  rationale: En este contexto de desafío, el imperfecto funciona con fuerza exhortativa/jusiva; «que llame» comunica bien la invitación irónica a presentarse.
- source_word: וְיַגִּידֶהָ
  english_pob_choice: and declare it
  chosen_spanish: y lo declare
  alternatives_spanish:
  - y lo diga
  - y lo anuncie
  lexicon: HALOT
  rationale: נגד en hifil expresa dar a conocer o declarar. Se mantiene el objeto implícito con «lo», como en el inglés auditado.
- source_word: וְיַעְרְכֶהָ לִי
  english_pob_choice: and set it in order for me
  chosen_spanish: y lo ponga en orden para mí
  alternatives_spanish:
  - y lo ordene para mí
  - y lo presente en orden para mí
  lexicon: HALOT
  rationale: עָרַך/ערך conserva la idea de ordenar o disponer metódicamente. «Poner en orden» es idiomático en español y preserva la imagen de organizar el argumento o la evidencia.
- source_word: מִשּׂוּמִי עַם עוֹלָם
  english_pob_choice: since I appointed an ancient people
  chosen_spanish: desde que yo establecí un pueblo antiguo
  alternatives_spanish:
  - desde que yo dispuse un pueblo antiguo
  - desde el tiempo en que yo establecí al pueblo de antaño
  lexicon: HALOT
  rationale: Se sigue la lectura temporal de מִן + infinitivo, reflejada en el audit trail. «Establecí» recoge bien שׂוּם en español bíblico moderno, y «pueblo antiguo» conserva el valor temporal de עוֹלָם sin forzar «eterno».
- source_word: עַם עוֹלָם
  english_pob_choice: an ancient people
  chosen_spanish: un pueblo antiguo
  alternatives_spanish:
  - el pueblo de antaño
  - un pueblo de los tiempos antiguos
  lexicon: HALOT
  rationale: En este contexto histórico-retórico, עוֹלָם se entiende mejor como antigüedad/antaño que como perpetuidad doctrinal. «Pueblo antiguo» es claro y fiel.
- source_word: וְאֹתִיּוֹת
  english_pob_choice: the things to come
  chosen_spanish: las cosas por venir
  alternatives_spanish:
  - las señales
  - los signos
  lexicon: HALOT
  rationale: Se mantiene la decisión del audit trail de no restringir el término a «signos»; el paralelo con la cláusula siguiente favorece eventos futuros. «Cosas por venir» es natural y suficientemente amplio.
- source_word: וַאֲשֶׁר תָּבֹאנָה
  english_pob_choice: and what will happen
  chosen_spanish: y lo que sucederá
  alternatives_spanish:
  - y lo que vendrá
  - y las cosas que vendrán
  lexicon: HALOT
  rationale: La cláusula relativa apunta a futuros acontecimientos. «Lo que sucederá» evita redundancia excesiva y comunica el valor prospectivo del hebreo.
- source_word: יַגִּידוּ לָמוֹ
  english_pob_choice: let them declare to them
  chosen_spanish: Que les declaren
  alternatives_spanish:
  - Que se lo declaren a ellos
  - Que les anuncien
  lexicon: HALOT
  rationale: Se conserva el plural y el destinatario implícito del hebreo. La forma española se vuelve más fluida sin perder el sentido de desafío a los supuestos testigos o anunciadores.
theological_decisions:
- issue: Sentido de עַם עוֹלָם
  english_pob_reading: historical 'an ancient people' rather than doctrinal 'an everlasting people'
  chosen_spanish_reading: un pueblo antiguo, entendido como referencia temporal e histórica
  alternative_spanish_readings:
  - un pueblo eterno
  - el pueblo de antaño
  rationale: La disputa del pasaje trata de la singular capacidad de Yahvé para ordenar la historia y anunciar el futuro. Traducir con antigüedad histórica evita importar una afirmación doctrinal que el sintagma no exige.
  doctrine_reference: 'Principio POB: preferir la evidencia contextual del hebreo antes que una formulación tradicional más cargada teológicamente.'
- issue: Valor de וְאֹתִיּוֹת
  english_pob_reading: future events/things rather than miraculous signs
  chosen_spanish_reading: las cosas por venir, no restringidas a ‘señales’ milagrosas
  alternative_spanish_readings:
  - las señales
  - los signos
  rationale: La línea paralela con «lo que sucederá» favorece un sentido amplio de acontecimientos futuros. Así se preserva el énfasis profético del versículo.
  doctrine_reference: 'Principio POB: mantener la tensión léxica del original cuando varias posibilidades son reales, escogiendo la que mejor encaja en el contexto inmediato.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: ‘appointed’ se refleja como «establecí» por afinidad léxica con שׂוּם, y la clausula final se simplifica en español con un binomio natural («las cosas por venir» / «lo que sucederá») que preserva el paralelismo profético.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la terminología base del proyecto, aunque este versículo no lo nombra explícitamente en la superficie española.
  - Se evita «Cristo» o vocabulario eclesial ajeno al hebreo.
  - «Pueblo antiguo» conserva la lectura histórica de עוֹלָם sin convertirla en afirmación doctrinal.
  - «Las cosas por venir» y «lo que sucederá» preservan el doble matiz del final hebreo sin endurecerlo en una sola opción.
