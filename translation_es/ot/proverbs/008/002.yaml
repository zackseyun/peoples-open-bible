translation:
  language: es
  text: En las alturas, junto al camino, en la encrucijada[a] toma su puesto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “la casa de senderos”, es decir, el lugar donde se encuentran los caminos.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/רֹאשׁ
  english_pob_choice: On the heights
  chosen_spanish: En la cima
  alternatives_spanish:
  - En lo alto
  - En la cumbre
  lexicon: HALOT
  rationale: רֹאשׁ significa literalmente 'cabeza' o 'parte superior'. En este contexto locativo con מְרוֹמִים, la idea es la parte más alta o prominente. 'En la cima' comunica bien esa ubicación elevada en español natural.
- source_word: מְרוֹמִים
  english_pob_choice: heights
  chosen_spanish: las alturas
  alternatives_spanish:
  - los lugares altos
  - las elevaciones
  lexicon: HALOT
  rationale: El sustantivo designa lugares altos o elevados. 'Las alturas' conserva la imagen poética y es idiomático en español bíblico contemporáneo.
- source_word: עֲלֵי דָרֶךְ
  english_pob_choice: beside the road
  chosen_spanish: junto al camino
  alternatives_spanish:
  - al lado del camino
  - a la vera del camino
  lexicon: HALOT
  rationale: La preposición con דָרֶךְ expresa ubicación relativa a un camino o vía. 'Junto al camino' mantiene el sentido de presencia pública y accesible sin sonar arcaico.
- source_word: בֵּית נְתִיבוֹת
  english_pob_choice: at the crossroads
  chosen_spanish: en la encrucijada
  alternatives_spanish:
  - donde se juntan los senderos
  - en el cruce de caminos
  lexicon: HALOT
  rationale: Literalmente es 'casa de senderos', un modismo para el lugar donde convergen caminos. 'Encrucijada' transmite con claridad esa convergencia en español, aunque deja implícita la imagen literal; por eso se conserva en notas la lectura alternativa literal.
- source_word: נִצָּבָה
  english_pob_choice: she takes her stand
  chosen_spanish: se detiene
  alternatives_spanish:
  - se pone de pie
  - toma su puesto
  lexicon: HALOT
  rationale: La forma nifal comunica una postura deliberada de colocarse/ponerse firme. En español, 'se detiene' conserva la idea de posicionarse en un lugar visible y público, aunque no reproduce toda la fuerza activa de 'toma su lugar'; por eso se registra la alternativa más literal entre las opciones.
theological_decisions:
- issue: Personificación femenina de la Sabiduría
  english_pob_reading: Retain feminine pronoun 'she' for Wisdom
  chosen_spanish_reading: Mantener el sujeto femenino implícito en el verbo y en el contexto personificado de la Sabiduría
  alternative_spanish_readings:
  - Repetir 'la Sabiduría' sin pronombre
  - Usar una formulación impersonal
  rationale: El hebreo usa un verbo femenino singular, coherente con la Sabiduría personificada del contexto inmediato. El español puede omitir el pronombre y conservar la referencia femenina sin forzar repeticiones innecesarias.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de fuente; esta propuesta sigue el estado más reciente, que fue marcado como sin cambios y con alto acuerdo entre revisores.
  spanish_consistency_notes:
  - Se usa 'camino' para דָרֶךְ y 'senderos' en la nota para reflejar el modismo literal de נְתִיבוֹת sin sobrecargar el texto principal.
  - Se evita 'SEÑOR' o terminología añadida no presente en el versículo.
  - La personificación de la Sabiduría se conserva de forma natural en español sin introducir elementos doctrinales ajenos al pasaje.
