base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/005/049.yaml
  text: And they were gathered to them from the other nations of the land[a], and they were established at the altar in its place; for they were in hostility to them. All the nations on the land prevailed against them, and they offered sacrifices at the appointed time and whole burnt offerings to the Lord[c][b], morning and evening.
  footnotes:
  - marker: a
    text: Or 'joined them.' The Greek verb can suggest that people from the other nations attached themselves to the returned community.
    reason: lexical_alternative
  - marker: b
    text: The Greek here is fuller than the approximate Hebrew parallel in Ezra 3:2, adding references to hostility from the nations of the land and to the regular offering of sacrifices morning and evening.
    reason: cross_reference
  - marker: c
    text: Or 'burnt offerings.' The Greek term can specifically denote offerings wholly consumed by fire.
    reason: lexical_alternative
