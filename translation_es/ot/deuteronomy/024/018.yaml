translation:
  language: es
  text: Y recuerda que fuiste esclavo en Egipto, y Yahvé tu Dios te redimió de allí; por tanto, yo te mando que hagas esto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְזָכַרְתָּ
  english_pob_choice: And remember
  chosen_spanish: Y recuerda
  alternatives_spanish:
  - Y acuérdate
  - Así que recuerda
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal con valor exhortativo en contexto; en español, el imperativo es natural y fiel. Mantengo la simple conjunción inicial para no sobredeterminar la relación discursiva.
- source_word: עֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: HALOT
  rationale: En el recuerdo de la opresión en Egipto, el término expresa estatus de subordinación forzada; 'esclavo' preserva mejor esa fuerza que 'siervo'.
- source_word: בְּמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: El hebreo es breve y directo; no se añade 'la tierra de' porque no aparece en el texto y no aporta precisión necesaria.
- source_word: וַיִּפְדְּךָ
  english_pob_choice: redeemed you
  chosen_spanish: te redimió
  alternatives_spanish:
  - te rescató
  - te rescató con rescate
  lexicon: HALOT
  rationale: '''Redimió'' conserva el matiz de liberación con valor de rescate/compra propia de פדה, y mantiene resonancia teológica sin suavizar el verbo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Siguiendo el criterio del proyecto, el Tetragrámaton se translitera como 'Yahvé' en el texto principal, en lugar de sustituirse por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el Dios tuyo
  lexicon: HALOT
  rationale: La construcción posesiva es directa y natural en español; 'tu Dios' conserva la relación de pacto sin añadir énfasis innecesario.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - de ese lugar
  - desde allí
  lexicon: HALOT
  rationale: '''De allí'' es una equivalencia breve y idiomática para el adverbio de origen que remite a Egipto.'
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - así que
  lexicon: HALOT
  rationale: La expresión introduce la inferencia ética; 'por tanto' conserva el vínculo lógico y el tono formal del mandato.
- source_word: אָנֹכִי מְצַוְּךָ
  english_pob_choice: I am commanding you
  chosen_spanish: yo te estoy mandando
  alternatives_spanish:
  - yo te mando
  - yo te ordeno
  lexicon: HALOT
  rationale: El participio con pronombre enfático expresa acción presente y continua; 'te estoy mandando' reproduce ese valor y mantiene el énfasis personal.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: que hagas
  alternatives_spanish:
  - a hacer
  - que cumplas
  lexicon: HALOT
  rationale: En español, la subordinada final con subjuntivo resulta más natural que un infinitivo desnudo y conserva la función de propósito/mandato.
- source_word: אֶת הַדָּבָר הַזֶּה
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - este asunto
  lexicon: HALOT
  rationale: Siguiendo la revisión inglesa que evitó 'this thing', 'esto' preserva la referencia anafórica sin introducir un sustantivo interpretativo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Nombre divino; la política del proyecto exige transliterarlo en vez de sustituirlo por un título. 'Yahvé' es la forma adoptada en español para ese Nombre.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de עֶבֶד al recordar la esclavitud en Egipto
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - servidor
  rationale: La motivación ética del versículo depende de la memoria de una condición de servidumbre forzada. 'Esclavo' mantiene esa tensión mejor que 'siervo', que la suaviza.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogously on bonded-status language
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se sustituyó ''this thing'' por ''this'' para evitar una formulación pesada. Por eso el español usa ''esto'' y no un sustantivo como ''cosa'' o ''asunto''. También se respetó la decisión auditada de mantener el Nombre divino como transliteración y no como sustitución por título.'
  spanish_consistency_notes:
  - '''Yahvé'' se usa para יְהוָה de forma consistente con el criterio del proyecto.'
  - '''esclavo'' conserva el valor de estatus oprimido del hebreo עֶבֶד.'
  - '''redimió'' mantiene el matiz de rescate/liberación inherente a פדה.'
  - '''esto'' refleja con naturalidad el referente final sin sobreespecificarlo.'
