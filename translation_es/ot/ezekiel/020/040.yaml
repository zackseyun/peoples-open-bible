base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/020/040.yaml
  text: For on my holy mountain[a], on the high mountain of Israel, declares the Lord GOD, there all the house of Israel, all of them in the land, will serve me. There I will accept them, and there I will require your contributions and the firstfruits of your offerings[c][b], with all your holy things.
  footnotes:
  - marker: a
    text: Or 'your offerings' for 'your contributions'; the Hebrew term refers to portions set apart and presented to God.
    reason: lexical_alternative
  - marker: b
    text: Or 'the first of your offerings' for 'the firstfruits of your gifts.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with all your sacred offerings' for 'with all your holy things.'
    reason: lexical_alternative
