    changes_summary: Revised 'the land whose two kings you dread' to 'the land before whose two kings you dread' to account for מִפְּנֵי ('before/because of') and more closely reflect the Hebrew syntax.
translation:
  language: es
  text: Porque antes de que el muchacho sepa rechazar lo malo y escoger lo bueno, la tierra ante cuyos dos reyes temes[b] será abandonada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘será dejada’, o ‘quedará desierta’. El pasivo hebreo puede indicar que la tierra quede abandonada o vacía.
    reason: lexical_alternative
  - marker: b
    text: O ‘cuyos dos reyes aborreces por temor’ / ‘ante cuyos dos reyes estás lleno de espanto’. El verbo hebreo puede llevar un sentido de repulsión que en este contexto probablemente refleja temor ante los dos reyes.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטֶרֶם
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes de
  - previo a que
  lexicon: HALOT
  rationale: Expresa con naturalidad el valor temporal previo y mantiene el inicio prospectivo del hebreo.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el joven
  lexicon: HALOT
  rationale: ‘Muchacho’ conserva el sentido de varón joven en un contexto de desarrollo aún inmaduro, sin forzar ‘niño’ ni ‘joven’.
- source_word: יֵדַע ... מָאֹס ... וּבָחֹר
  english_pob_choice: knows to refuse ... and choose
  chosen_spanish: sepa rechazar ... y escoger
  alternatives_spanish:
  - aprenda a rechazar ... y escoger
  - conozca cómo rechazar ... y escoger
  lexicon: HALOT
  rationale: El hebreo expresa llegar a la capacidad/discernimiento de distinguir moralmente; ‘sepa’ preserva esa habilidad adquirida sin volverla demasiado explicativa.
- source_word: מָאֹס
  english_pob_choice: refuse
  chosen_spanish: rechazar
  alternatives_spanish:
  - negarse a
  - despreciar
  lexicon: HALOT
  rationale: En este par antitético con ‘escoger’, ‘rechazar’ suena natural en español y conserva la oposición moral del texto.
- source_word: בָּרָע
  english_pob_choice: the evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo malo
  lexicon: HALOT
  rationale: El hebreo articula un contraste moral genérico; ‘lo malo’ evita una abstracción rígida y suena idiomático en español, sin perder la referencia ética.
- source_word: וּבָחֹר
  english_pob_choice: choose
  chosen_spanish: escoger
  alternatives_spanish:
  - elegir
  - seleccionar
  lexicon: HALOT
  rationale: ‘Escoger’ mantiene el paralelismo directo con ‘rechazar’ y resulta claro y natural en español bíblico contemporáneo.
- source_word: בַּטּוֹב
  english_pob_choice: the good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - el bien
  - lo bueno
  lexicon: HALOT
  rationale: Conserva el contraste moral con ‘lo malo’ y refleja el artículo hebreo sin sobrerreificar ‘el bien’.
- source_word: תֵּעָזֵב
  english_pob_choice: will be forsaken
  chosen_spanish: será abandonada
  alternatives_spanish:
  - será desierta
  - quedará abandonada
  - será dejada
  lexicon: HALOT
  rationale: El pasivo niphal permite ‘abandonada’ o ‘desierta’; ‘será abandonada’ sigue de cerca el valor básico sin perder la posibilidad de despoblación implícita.
- source_word: הָאֲדָמָה
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En el contexto de reyes y amenaza política, ‘tierra’ funciona de modo natural en español y conserva la extensión geográfica del término.
- source_word: אֲשֶׁר אַתָּה קָץ מִפְּנֵי
  english_pob_choice: whose ... you dread
  chosen_spanish: ante cuyos ... tú tienes temor
  alternatives_spanish:
  - cuyos ... tú temes
  - delante de cuyos ... te estremeces
  lexicon: HALOT
  rationale: קוץ puede sugerir aversión o temor; aquí el contexto de los dos reyes favorece ‘tienes temor’. ‘Ante cuyos’ refleja bien מִפְּנֵי y la relación sintáctica con los reyes.
- source_word: שְׁנֵי מְלָכֶיהָ
  english_pob_choice: whose two kings
  chosen_spanish: cuyos dos reyes
  alternatives_spanish:
  - sus dos reyes
  - los dos reyes de ella
  lexicon: HALOT
  rationale: La sufijación femenina remite a ‘la tierra’; ‘cuyos dos reyes’ es la forma española más transparente para ese enlace.
theological_decisions:
- issue: Identidad del muchacho
  english_pob_reading: Render neutrally as 'the boy' without specifying whether this refers immediately to Maher-shalal-hash-baz, the child of Isaiah 7:14, or typological/messianic fulfillment.
  chosen_spanish_reading: Traducir de manera neutral como 'el muchacho' sin identificarlo con un niño concreto ni resolver su alcance profético.
  alternative_spanish_readings:
  - el niño
  - el hijo
  rationale: El versículo no nombra al sujeto más allá del sustantivo común; la traducción debe preservar esa tensión interpretativa sin añadir una identificación no explicitada por el texto.
  doctrine_reference: Preservar la tensión teológica e interpretativa sin resolverla en el texto principal.
translation_notes:
  revision_awareness: La redacción incorpora la revisión del equipo de auditoría que ajustó la sintaxis para reflejar מִפְּנֵי ('ante/cerca de' o 'por causa de') en la relación con los dos reyes, evitando una construcción posesiva demasiado libre.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como terminología por defecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió ‘la tierra’ por consistencia con un referente geopolítico, no ‘el suelo’.
  - Se evitó ‘Cristo/Mesías’ porque el verso no los menciona y la decisión teológica relevante aquí es la identidad no especificada del muchacho.
  - La nota de pie de página preserva la ambigüedad del pasivo hebreo entre ‘abandonada’ y ‘desierta’.
