    reason: alternative_reading
  - marker: b
    text: El hebreo probablemente alude a prestar y tomar prestado en un contexto de deuda; Jeremías dice que no ha dado motivo social ordinario para tal hostilidad.
    reason: cultural_note
  revision_rationale: 'Se corrige el punto principal de alineación con el audit trail: el texto base ahora refleja «to all the land» mediante «para toda la tierra», entendido territorialmente, y la nota preserva la alternativa más amplia. También se mueve la nota [a] al lugar correcto, donde realmente aplica. Se normaliza «ni me han prestado» para un español natural sin perder el paralelismo de deuda. Se pule además el vocativo a «mi madre» y la puntuación.'
