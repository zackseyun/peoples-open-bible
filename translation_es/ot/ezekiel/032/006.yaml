  to: Saturaré la tierra con tu sangre hasta las montañas, y los barrancos[a] se llenarán de ti[b].
  rationale: Se ajusta una expresión poco natural en español («serán llenados contigo») a una formulación más idiomática y más cercana al valor literal de מִמֶּךָּ («de ti»), manteniendo la ambigüedad macabra del original. También se simplifican las notas para evitar redundancia y alinear mejor texto y explicación.
