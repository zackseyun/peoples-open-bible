    rationale: La nota inglesa y la evidencia léxica se refieren a הֵיכָל («templo/palacio»), no a כְּלֵי («utensilios/vasijas/objetos»). Dejarla en «utensilios» induce al lector a pensar que la alternativa afecta al sustantivo equivocado.
  revised_spanish_text: Nabucodonosor también llevó algunos de los utensilios de la casa de Yahvé a Babilonia, y los puso en su templo[a] en Babilonia.
