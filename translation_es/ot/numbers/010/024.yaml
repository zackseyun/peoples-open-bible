translation:
  language: es
  text: Y sobre la compañía de la tribu de los hijos de Benjamín estaba Abidán hijo de Gideoní[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hoste» o «división» para «compañía»; el término hebreo puede denotar una formación militar organizada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  english_pob_choice: And over
  chosen_spanish: Y sobre
  alternatives_spanish:
  - Y encima de
  - Y sobre la
  lexicon: HALOT
  rationale: La combinación de la conjunción y la preposición conserva la continuidad de la lista de marcha y el sentido de supervisión. En español, «sobre» expresa de manera natural la relación de autoridad u organización sin forzar una construcción más pesada.
- source_word: צְבָא
  english_pob_choice: company
  chosen_spanish: compañía
  alternatives_spanish:
  - host
  - división
  - cuerpo
  lexicon: HALOT
  rationale: En este contexto de Números 10 la palabra designa una formación ordenada de marcha, no necesariamente un ejército en sentido bélico estricto. «Compañía» mantiene el valor de grupo organizado y es comprensible en español moderno.
- source_word: מַטֶּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - cetro
  - vara
  - linaje tribal
  lexicon: HALOT
  rationale: Aquí el término tiene su sentido administrativo y censal de unidad tribal. «Tribu» es el equivalente español más directo y fiel al uso del pasaje.
- source_word: בְּנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los hijos de Benjamin
  - los benjaminitas
  - la gente de Benjamín
  lexicon: HALOT
  rationale: Se preserva la fórmula hebrea de filiación y el tono genealógico repetido en la sección. «Hijos de Benjamín» es más literal y más transparente que una etnónima interpretativa.
- source_word: אֲבִידָן
  english_pob_choice: Abidan
  chosen_spanish: Abidán
  alternatives_spanish:
  - Abidán
  lexicon: transliteration
  rationale: Nombre propio transliterado con acentuación española para facilitar la lectura sin alterar la forma del nombre.
- source_word: בֶּן גִּדְעוֹנִי
  english_pob_choice: son of Gideoni
  chosen_spanish: hijo de Guidoní
  alternatives_spanish:
  - hijo de Gideoní
  - hijo de Gidoni
  lexicon: HALOT
  rationale: «Hijo de» reproduce el patronímico בן de manera natural. «Guidoní» conserva de forma suficientemente transparente el nombre propio hebreo, con adaptación gráfica española para la pronunciación.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa están en acuerdo alto y no requieren cambios sustanciales. La única decisión relevante es mantener el valor organizativo de צְבָא con una solución española natural, junto con la transliteración consistente de los nombres propios.
  spanish_consistency_notes:
  - Se conserva la estructura paralela de la lista tribal de Números 10.
  - Se usa «tribu» para מַטֶּה por su valor administrativo en este contexto.
  - Se mantiene «hijos de» para בְּנֵי para reflejar la fórmula hebrea.
  - La nota al pie acompaña la elección de «compañía» sin introducir una glosa doctrinal.
