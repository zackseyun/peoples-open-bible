translation:
  language: es
  text: Porque yo conozco tu rebelión y tu cerviz dura[a]. Mira, mientras aún estoy vivo con ustedes hoy, han sido rebeldes contra Yahvé[b]; ¡cuánto más después de mi muerte!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tu cerviz dura», un modismo para terquedad u obstinación.'
    reason: lexical_alternative
  - marker: b
    text: O «con Yahvé»; aquí el contexto de rebelión exige la idea de oposición, por eso se traduce «contra Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶרְיְךָ
  english_pob_choice: your rebellion
  chosen_spanish: tu rebelión
  alternatives_spanish:
  - tu rebeldía
  - tu defiance
  lexicon: HALOT
  rationale: מֶרִי expresa rebelión o resistencia obstinada, especialmente en un marco de pacto. «Rebelión» mantiene el sustantivo y la fuerza relacional del término sin diluirlo en una mera cualidad moral.
- source_word: עָרְפְּךָ הַקָּשֶׁה
  english_pob_choice: your stiff neck
  chosen_spanish: tu duro cerviz
  alternatives_spanish:
  - tu cerviz obstinada
  - tu cuello rígido
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «cuello/nuca endurecida», un modismo para terquedad. En español, «cerviz» conserva mejor el rasgo metafórico que «cuello», aunque requiere una construcción no completamente literal para sonar natural. La nota preserva la tensión entre imagen e interpretación.
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: הֵן introduce atención enfática. «Mira» mantiene el giro discursivo en español moderno y evita una solemnidad excesivamente arcaica.
- source_word: בְּעוֹדֶנִּי חַי
  english_pob_choice: while I am still alive
  chosen_spanish: mientras aún estoy vivo
  alternatives_spanish:
  - mientras todavía vivo
  - estando yo todavía vivo
  lexicon: HALOT
  rationale: La frase indica simultaneidad temporal con el estado de vida del hablante. «Mientras aún estoy vivo» es natural y conserva la fuerza temporal.
- source_word: מַמְרִים הֱיִתֶם
  english_pob_choice: you have been rebellious
  chosen_spanish: han sido rebeldes
  alternatives_spanish:
  - han estado rebeldes
  - han sido desobedientes
  lexicon: HALOT
  rationale: El participio con היה expresa un estado continuado. «Han sido rebeldes» conserva ese carácter durativo mejor que un pasado simple.
- source_word: עִם יְהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - frente a Yahvé
  - en oposición a Yahvé
  lexicon: HALOT
  rationale: Aunque עִם suele significar «con», aquí el contexto de rebeldía exige una relación de oposición. En español, «contra» comunica esa oposición sin perder la referencia directa al nombre divino. Se mantiene «Yahvé» según el criterio del proyecto para יהוה.
- source_word: וְאַף כִּי
  english_pob_choice: and how much more
  chosen_spanish: ¡cuánto más!
  alternatives_spanish:
  - y mucho más
  - y con mayor razón
  lexicon: HALOT
  rationale: 'La secuencia intensifica la conclusión: si la rebelión ya es real ahora, lo será aún más después. «¡Cuánto más!» comunica en español la escalada retórica.'
- source_word: אַחֲרֵי מוֹתִי
  english_pob_choice: after my death
  chosen_spanish: después de mi muerte
  alternatives_spanish:
  - tras mi muerte
  - cuando haya muerto
  lexicon: HALOT
  rationale: La construcción nominal se vierte con una frase temporal directa y formal. «Después de mi muerte» conserva el valor temporal sin añadir interpretación.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el criterio del proyecto para renderizar el nombre divino como «Yahvé», preservando el nombre propio del pacto en lugar de sustituirlo por un título. En este versículo, el contexto de oposición hace que la referencia al nombre divino sea directa y personal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se ha seguido el sentido ya auditado como de alta concordancia: rebelión/rigidez de nuca, contraste temporal «mientras aún estoy vivo», oposición implícita en עִם con lenguaje de rebeldía, e intensificación final «cuánto más». No se detectaron revisiones textuales adicionales en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al criterio del proyecto.
  - Se conserva la imagen corporal de «cerviz» en vez de neutralizarla como mera «obstinación», para no perder el modismo hebreo.
  - Se optó por una sintaxis española natural, pero sin desplazar la carga semántica del paralelo entre rebelión presente y mayor rebelión futura.
  - La puntuación exclamativa en la cláusula final refleja la intensificación retórica del hebreo.
