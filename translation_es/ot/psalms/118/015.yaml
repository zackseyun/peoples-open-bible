translation:
  language: es
  text: 'El sonido de júbilo y salvación está en las tiendas de los justos: «¡La diestra de Yahvé hace proezas!»[a][b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «victoria» o «liberación» para «salvación».
    reason: lexical_alternative
  - marker: b
    text: 'Modismo hebreo: «hace proezas»; también puede expresarse como «actúa con poder» o «hace cosas poderosas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֤וֹל
  english_pob_choice: The sound of
  chosen_spanish: El sonido de
  alternatives_spanish:
  - Una voz de
  - El clamor de
  lexicon: HALOT
  rationale: קוֹל puede significar sonido, voz o ruido. Aquí introduce algo audible presente en las tiendas, por lo que «El sonido de» conserva el valor auditivo sin forzar una abstracción.
- source_word: רִנָּ֬ה
  english_pob_choice: joyful shouting
  chosen_spanish: grito jubiloso
  alternatives_spanish:
  - júbilo
  - alegría
  - canto de gozo
  lexicon: HALOT
  rationale: רִנָּה es un grito o clamor de alegría, no solo un estado interno. «Grito jubiloso» mantiene el carácter vocal y celebrativo del término.
- source_word: וִישׁוּעָ֗ה
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - victoria
  - liberación
  lexicon: HALOT
  rationale: יׁשׁוּעָה puede referirse a salvación, liberación o victoria. «Salvación» preserva el sentido amplio y teológico, mientras las alternativas quedan como matices posibles.
- source_word: בְּאָהֳלֵ֥י
  english_pob_choice: in the tents of
  chosen_spanish: en las tiendas de
  alternatives_spanish:
  - en las moradas de
  - entre las tiendas de
  lexicon: HALOT
  rationale: El hebreo conserva la imagen concreta de tiendas; en español «tiendas» comunica bien esa imagen y sigue siendo natural.
- source_word: צַדִּיקִ֑ים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los rectos de corazón
  lexicon: HALOT
  rationale: צַדִּיקִים es un sustantivo-adjetivo plural. «Los justos» es idiomático en español y conserva la categoría ética/covenantal.
- source_word: יְמִ֥ין יְהוָה
  english_pob_choice: The right hand of Yahweh
  chosen_spanish: La diestra de Yahvé
  alternatives_spanish:
  - La mano derecha de Yahvé
  - La diestra de Yahvé
  lexicon: HALOT
  rationale: «Diestra» es la forma bíblica natural en español para la «mano derecha» cuando la expresión funciona también metafóricamente como acción poderosa de Dios. Se mantiene «Yahvé» para el Nombre divino, conforme al criterio del proyecto.
- source_word: עֹ֣שָׂה
  english_pob_choice: does
  chosen_spanish: hace
  alternatives_spanish:
  - obra
  - actúa
  lexicon: HALOT
  rationale: El participio funciona verbalmente en una proclamación. «Hace» es breve, claro y compatible con el giro idiomático siguiente.
- source_word: חָֽיִל
  english_pob_choice: valiantly
  chosen_spanish: proezas
  alternatives_spanish:
  - con valor
  - con poder
  - hazañas
  lexicon: HALOT
  rationale: En la expresión idiomática עשה חָיִל, el sustantivo puede implicar fuerza, valentía o hazañas. «Hace proezas» comunica el efecto idiomático en español sin perder el matiz de acción poderosa; la ambigüedad entre valor, poder y éxito queda reflejada en las alternativas.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene directamente el Tetragrámaton. Se preserva el Nombre en la forma del proyecto, «Yahvé», en lugar de reemplazarlo por un título impersonal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de יְשׁוּעָה en un salmo de celebración
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - victoria
  - liberación
  rationale: El contexto festivo y de rescate admite un matiz militar de victoria, pero «salvación» conserva el alcance más amplio y la tensión teológica del término. Las alternativas se dejan visibles para no cerrar el sentido.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: No se requirieron revisiones finales según el registro más reciente; la concordancia con la auditoría inglesa es alta y estable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de forma consistente con el criterio del proyecto.
  - Se conserva la imagen concreta de «tiendas» en vez de abstraer a «moradas» o «hogares».
  - Se usa «los justos» como equivalente natural de צַדִּיקִים.
  - La expresión idiomática final se vierte como «hace proezas» para conservar la fuerza de עשה חָיִל en español.
  - Las notas a y b están ancladas al término «salvación» y a la cláusula final, respectivamente.
