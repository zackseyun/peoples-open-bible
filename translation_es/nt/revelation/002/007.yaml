translation:
  language: es
  text: El que tiene oído[a], oiga lo que el Espíritu dice a las iglesias. Al que vence le daré a comer del árbol de la vida, que está en el paraíso de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Al que salga vencedor».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἔχων οὖς
  english_pob_choice: The one who has an ear
  chosen_spanish: El que tiene oído
  alternatives_spanish:
  - Quien tiene oído
  - El que tenga oído
  lexicon: BDAG
  rationale: Conserva la forma singular e idiomática del llamado exhortativo sin volverla pesada en español. ‘Oído’ en singular reproduce el singular griego y funciona naturalmente en este contexto formulístico.
- source_word: ἀκουσάτω
  english_pob_choice: let him hear
  chosen_spanish: oiga
  alternatives_spanish:
  - que oiga
  - escuche
  lexicon: BDAG
  rationale: El imperativo exhortativo de tercera persona se vierte con ‘oiga’, que preserva la fuerza directa del mandato. ‘Escuche’ es posible, pero ‘oiga’ sigue más de cerca el verbo griego y el tono bíblico.
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  lexicon: BDAG
  rationale: Aquí el referente es el Espíritu Santo dentro de la fórmula recurrente de Apocalipsis 2–3. La mayúscula en español señala esa identificación contextual sin añadir contenido ajeno al pasaje.
- source_word: λέγει ταῖς ἐκκλησίαις
  english_pob_choice: says to the churches
  chosen_spanish: dice a las iglesias
  alternatives_spanish:
  - está diciendo a las iglesias
  - dice a las congregaciones
  lexicon: BDAG
  rationale: ‘Iglesias’ es la equivalencia más estable y fiel para ἐκκλησίαις en este marco apocalíptico. ‘Congregaciones’ sería posible, pero menos consagrado en este ciclo de cartas.
- source_word: τῷ νικῶντι
  english_pob_choice: To the one who conquers
  chosen_spanish: Al que vence
  alternatives_spanish:
  - Al que conquista
  - Al que sobrevive vencedor
  lexicon: BDAG
  rationale: ‘Vence’ preserva la fuerza verbal de νικάω en una forma breve y natural en español. ‘Conquista’ suena más bélico y menos idiomático aquí; ‘vence’ mantiene el motivo de victoria de Apocalipsis.
- source_word: δώσω αὐτῷ φαγεῖν
  english_pob_choice: I will give to eat
  chosen_spanish: le daré a comer
  alternatives_spanish:
  - le daré que coma
  - le concederé comer
  lexicon: BDAG
  rationale: La construcción griega ‘daré a comer’ se puede reproducir en español con naturalidad. ‘Le daré a comer’ conserva la relación entre dar y comer sin añadir un objeto implícito inexistente.
- source_word: ἐκ τοῦ ξύλου τῆς ζωῆς
  english_pob_choice: from the tree of life
  chosen_spanish: del árbol de la vida
  alternatives_spanish:
  - del árbol de vida
  - de la madera de la vida
  lexicon: BDAG
  rationale: ‘Árbol’ es la traducción correcta de ξύλον en este eco de Génesis y Apocalipsis. ‘Del árbol de la vida’ mantiene la intertextualidad y la formulación tradicional sin depender de una paráfrasis.
- source_word: παραδείσῳ
  english_pob_choice: paradise
  chosen_spanish: paraíso
  alternatives_spanish:
  - jardín
  - paraíso celestial
  lexicon: BDAG
  rationale: ‘Paraíso’ preserva el peso teológico y escatológico de παράδεισος mejor que ‘jardín’. En español, ‘paraíso’ comunica bien el lugar bendecido y no trivializa el término.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - perteneciente a Dios
  - de parte de Dios
  lexicon: BDAG
  rationale: El genitivo simple se vierte de forma directa con ‘de Dios’. Es la solución más concisa y fiel al valor posesivo/asociativo del griego.
theological_decisions:
- issue: Referencia de τὸ πνεῦμα
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - un espíritu genérico
  rationale: En la serie de mensajes de Apocalipsis 2–3, la fórmula apunta al Espíritu Santo como portavoz divino. La traducción conserva el referente por contexto sin expandirlo doctrinalmente.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Valor de νικάω en la promesa
  english_pob_reading: conquers
  chosen_spanish_reading: vence
  alternative_spanish_readings:
  - sobreviene vencedor
  - conquista
  rationale: ‘Vence’ mantiene la imagen de victoria presente en Apocalipsis y evita un matiz demasiado militar de ‘conquista’. También suena más natural en la fórmula repetida de las cartas.
  doctrine_reference: Translation philosophy §1; §5
- issue: Imperativo de tercera persona con sujeto representativo
  english_pob_reading: let him hear
  chosen_spanish_reading: oiga
  alternative_spanish_readings:
  - que oiga
  - que escuche
  rationale: El español no requiere un pronombre masculino explícito para conservar el valor representativo del singular. ‘Oiga’ mantiene la fuerza exhortativa sin sobrecargar la frase.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se ajustó la nota al texto español y se ancló explícitamente el marcador [a] en la frase inicial para evitar la validación fallida previa. La redacción general sigue de cerca el griego y el audit trail inglés, manteniendo la fórmula exhortativa, el dative de beneficio y la imagen del árbol de la vida en el paraíso de Dios.
  spanish_consistency_notes:
  - Se usó ‘Espíritu’ con mayúscula por el referente contextual al Espíritu Santo en Apocalipsis 2–3.
  - Se eligió ‘iglesias’ para ἐκκλησίαις por consistencia con el ciclo de cartas y uso eclesial natural en español.
  - Se mantuvo ‘árbol’ para ξύλον en este pasaje por el eco claro con el árbol de la vida.
  - Se prefirió ‘paraíso’ para παράδεισος para conservar el peso escatológico del término.
  - El marcador [a] aparece exactamente en el lugar correspondiente en el texto español.
