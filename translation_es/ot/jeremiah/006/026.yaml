  text: בַּת עַמִּ֤/י חִגְרִי שָׂק֙ וְ/הִתְפַּלְּשִׁ֣י בָ/אֵ֔פֶר אֵ֤בֶל יָחִיד֙ עֲשִׂ֣י לָ֔/ךְ מִסְפַּ֖ד תַּמְרוּרִ֑ים כִּ֣י פִתְאֹ֔ם יָבֹ֥א הַ/שֹּׁדֵ֖ד עָלֵֽי/נוּ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/006/026.yaml
  text: Daughter of my people[a], put on sackcloth and roll in ashes; make mourning as for an only son, a most bitter lamentation[c][b], for suddenly the destroyer will come upon us.
  footnotes:
  - marker: a
    text: Or 'and wallow in ashes' or 'cover yourself with ashes.' The Hebrew verb depicts a physical act of mourning in ashes.
    reason: lexical_alternative
  - marker: b
    text: Literally 'mourning of an only one'; idiomatically, mourning as for an only son.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew reads 'upon us,' preserving the prophet's identification with the people; some translations smooth this to 'upon you.'
    reason: alternative_reading
