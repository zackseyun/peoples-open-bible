translation:
  language: es
  text: Y dieron su cuerno[a][b] a otros, y su gloria a una nación extranjera necia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo transmitido presenta una forma inusual aquí; el paralelo griego apoya el sentido 'a otros'.
    reason: textual_variant
  - marker: b
    text: O 'su fuerza' para 'su cuerno'; se conserva la metáfora del cuerno para no perder su valor simbólico.
    reason: lexical_alternative
lexical_decisions:
- source_word: קרנם / κέρας
  english_pob_choice: their horn
  chosen_spanish: su cuerno
  alternatives_spanish:
  - su fuerza
  - su poder
  lexicon: HALOT; LXX κέρας
  rationale: Conservo la metáfora bíblica de 'cuerno' para mantener la imagen de fuerza y poder sin interpretarla de forma plana. El paralelo griego confirma el mismo campo imagístico.
- source_word: לאחור / ἑτέροις (parallel sense issue)
  english_pob_choice: to others
  chosen_spanish: a otros
  alternatives_spanish:
  - hacia atrás
  - al reverso
  lexicon: HALOT; Greek parallel
  rationale: Aunque el hebreo transmitido es irregular, el paralelo griego apoya la idea de entregar 'a otros'. En español, 'a otros' expresa ese sentido con naturalidad y sigue la decisión de la auditoría inglesa antes de la revisión literalizante.
- source_word: כבודם / δόξαν
  english_pob_choice: their glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su honor
  lexicon: HALOT
  rationale: '''Gloria'' conserva el registro elevado del término y corresponde bien al griego δόξα.'
- source_word: גוי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - nación gentil
  lexicon: HALOT
  rationale: '''Nación'' preserva el sentido colectivo-político del término en este contexto.'
- source_word: נבל
  english_pob_choice: foolish
  chosen_spanish: necia
  alternatives_spanish:
  - insensata
  - foolish
  lexicon: HALOT
  rationale: '''Necia'' transmite la evaluación moral de forma natural en español y mantiene el tono sapiencial/profético del hebreo.'
- source_word: נכרי
  english_pob_choice: foreign
  chosen_spanish: extranjera
  alternatives_spanish:
  - foránea
  - ajena
  lexicon: HALOT
  rationale: '''Extranjera'' es la opción más natural en español moderno y coincide con el griego ἀλλότριος (''ajeno/extraño'').'
theological_decisions:
- issue: Preservación de la metáfora del 'cuerno'
  english_pob_reading: Retain 'horn' in the main text rather than interpretively rendering it as 'power.'
  chosen_spanish_reading: Conservar 'cuerno' en el texto principal, no reemplazarlo por 'poder'.
  alternative_spanish_readings:
  - su poder
  - su fuerza
  rationale: La metáfora es parte del sentido literario y teológico del pasaje; traducirla interpretativamente borraría la imagen bíblica de fuerza/autoridad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Tensión textual en לאחור frente al paralelo griego
  english_pob_reading: 'Translate according to the sense supported by the Greek parallel: ''to others.'''
  chosen_spanish_reading: 'Traducir según el sentido apoyado por el paralelo griego: ''a otros''.'
  alternative_spanish_readings:
  - hacia atrás
  - al revés
  rationale: El hebreo transmitido presenta una lectura irregular; el griego confirma que el sentido recuperable es de transferencia a otros, no una mera dirección espacial.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach translated from Hebrew where it survives, with Greek kept in view; user task requirement on parallel source'
translation_notes:
  revision_awareness: La auditoría inglesa revisó una versión previa que decía 'a otros' y luego corrigió demasiado hacia 'backward' para seguir el hebreo literal. En esta entrega se vuelve al sentido recuperable por el paralelo griego, manteniendo a la vez la imagen de 'cuerno' y el tono elevado de 'gloria'.
  spanish_consistency_notes:
  - 'He evitado ''SEÑOR'' o formas litúrgicas ajenas: no aplica el tetragrámaton en este versículo.'
  - '''extranjera'' concuerda con ''nación'' y mantiene el matiz de ajenidad del hebreo/griego.'
  - '''necia'' es preferible a ''foolish'' calco; suena natural y conserva el juicio moral.'
  - Los marcadores [a] y [b] aparecen exactamente en el texto principal, sin notas huérfanas.
