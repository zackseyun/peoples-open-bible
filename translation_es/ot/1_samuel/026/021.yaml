review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue las decisiones clave del POB: «He pecado», «mi vida» por נֶפֶשׁ, y la confesión final de necedad y extravío. Sin embargo, hay varios detalles mejorables frente a la evidencia fuente y al rastro de auditoría inglés: el vocativo omite la fuerza directa de «mi hijo David» al reordenarlo como «David, hijo mío»; «mi vida fue preciosa a tus ojos hoy» suena menos natural y menos fiel al modismo que «tuvo valor a tus ojos en este día» o «fue preciosa ante tus ojos en este día»; y «me he extraviado mucho» atenúa el intensificador de הַרְבֵּה מְאֹד respecto a «muy lejos» / «en gran manera».'
  spanish_quality_summary: 'El español es claro y legible, pero presenta pequeñas asperezas: «Vuélvete» puede sonar reflexivo o algo arcaizante en español general; «Vuelve» es más natural y suficiente. La colocación de las notas al final de toda la cita no cumple la disciplina requerida; deben anclarse en las palabras pertinentes dentro del texto. La nota a contiene texto hebreo («כאן») innecesario y poco apropiado para una nota española de lectura general. También conviene evitar «a tus ojos» con «preciosa» si se puede expresar mejor el modismo sin perder dignidad.'
  glossary_alignment: No hay conflicto con la terminología de proyecto. Se mantiene correctamente «vida» en lugar de «alma» para נֶפֶשׁ. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La principal alineación pendiente es estilística y de precisión semántica, no de glosario doctrinal.
  issues:
  - severity: medium
    issue: Las notas [a] y [b] están colocadas al final de la cita en vez de anclarse en las frases relevantes.
    rationale: La instrucción del proyecto exige que cada marcador aparezca exactamente en el punto pertinente dentro de `spanish_text`.
  - severity: low
    issue: La nota [a] incluye «כאן», hebreo metalingüístico impropio para una nota española de lectura general.
    rationale: La nota debe ser clara y natural en español, y basta explicar que נֶפֶשׁ se refiere a la vida o persona de Saúl en contexto.
  - severity: medium
    issue: «Vuélvete» suena menos natural en español general que «Vuelve».
    rationale: El imperativo de שוב no requiere un reflexivo en español; «Vuelve» conserva el sentido y mejora la legibilidad amplia.
  - severity: low
    issue: «David, hijo mío» es aceptable, pero atenúa la cercanía formal de «mi hijo David».
    rationale: La secuencia fuente y la decisión inglesa preservan el apelativo relacional unido al nombre; «mi hijo David» lo refleja mejor en español.
  - severity: medium
    issue: «mi vida fue preciosa a tus ojos hoy» resulta algo tieso y menos idiomático.
    rationale: El modismo hebreo puede mantenerse mejor con «mi vida tuvo valor ante tus ojos en este día», que suena natural y conserva la solemnidad.
  - severity: medium
    issue: «me he extraviado mucho» debilita הַרְבֵּה מְאֹד frente al audit trail inglés revisado («very far astray»).
    rationale: Conviene una formulación más fuerte, como «me he desviado muchísimo» o «me he extraviado en gran manera». Para neutralidad y claridad, «me he desviado muchísimo» comunica mejor la intensidad.
  revised_spanish_text: 'Entonces Saúl dijo: «He pecado. Vuelve, mi hijo David, porque no te haré daño otra vez, ya que mi vida[a] tuvo valor ante tus ojos en este día. Mira, he obrado neciamente y me he desviado muchísimo[b]».'
