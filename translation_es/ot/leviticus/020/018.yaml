translation:
  language: es
  text: Si un hombre se acuesta con una mujer durante su impureza menstrual y descubre su desnudez—ha puesto al descubierto su flujo[b][a], y ella ha descubierto el flujo de su sangre—ambos serán cortados[c] de entre su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras ella está menstruando». El hebreo también puede señalar el estado de impureza ritual asociado con la menstruación en Levítico.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «ha puesto al desnudo su fuente, y ella ha puesto al desnudo la fuente de su sangre». «Fuente» es un eufemismo hebreo para el flujo corporal.'
    reason: lexical_alternative
  - marker: c
    text: «Serán cortados» es una fórmula legal estándar en la Torá; el texto no especifica aquí cómo se lleva a cabo esa remoción.
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  - una persona
  lexicon: HALOT
  rationale: El sujeto masculino singular está marcado en el hebreo legal y corresponde al contexto sexual; «un hombre» mantiene la referencia precisa sin volverla genérica.
- source_word: יִשְׁכַּב אֶת אִשָּׁה
  english_pob_choice: lies with a woman
  chosen_spanish: se acuesta con una mujer
  alternatives_spanish:
  - tiene relaciones sexuales con una mujer
  - duerme con una mujer
  lexicon: HALOT
  rationale: La locución hebrea es un eufemismo legal para la relación sexual. «Se acuesta con» conserva ese registro sin volverse excesivamente clínico ni demasiado explicativo.
- source_word: דָּוָה
  english_pob_choice: during her menstrual impurity
  chosen_spanish: durante su impureza menstrual
  alternatives_spanish:
  - mientras está menstruando
  - en su impureza/afección
  lexicon: HALOT
  rationale: En Levítico el término apunta al estado ritual asociado con la menstruación. «Impureza menstrual» hace explícito el aspecto cultual que el pasaje presupone.
- source_word: גִלָּה אֶת עֶרְוָתָהּ
  english_pob_choice: uncovers her nakedness
  chosen_spanish: descubre su desnudez
  alternatives_spanish:
  - revela su desnudez
  - descubre su vergüenza
  lexicon: HALOT
  rationale: El hebreo usa una fórmula levemente idiomática en Levítico para una exposición sexual ilícita. «Descubre su desnudez» conserva la forma legal tradicional sin calcar de manera torpe.
- source_word: מְקֹרָהּ הֶעֱרָה
  english_pob_choice: he has laid bare her flow
  chosen_spanish: ha puesto al descubierto su flujo
  alternatives_spanish:
  - ha dejado al desnudo su fuente
  - ha revelado su fuente
  lexicon: HALOT
  rationale: מָקוֹר es un eufemismo de «fuente/manantial» aplicado al flujo corporal. En español, «puesto al descubierto su flujo» comunica el sentido sin perder la imagen corporal ni introducir una lectura más específica que la del hebreo.
- source_word: וְהִיא גִּלְּתָה אֶת מְקוֹר דָּמֶיהָ
  english_pob_choice: and she has uncovered the flow of her blood
  chosen_spanish: y ella ha descubierto el flujo de su sangre
  alternatives_spanish:
  - y ella ha revelado la fuente de su sangre
  - y ella ha puesto al descubierto su flujo de sangre
  lexicon: HALOT
  rationale: Se mantiene la simetría con la primera cláusula y el paralelismo del hebreo. «Flujo de su sangre» preserva la referencia corporal y evita suavizar el lenguaje a una paráfrasis más general.
- source_word: וְנִכְרְתוּ
  english_pob_choice: shall be cut off
  chosen_spanish: serán eliminados
  alternatives_spanish:
  - serán cortados
  - serán excluidos
  lexicon: HALOT
  rationale: La fórmula hebrea es una pena legal técnica con alcance no especificado. «Serán eliminados» busca ser inteligible en español, pero mantiene la ambigüedad del mecanismo sin definirlo como ejecución, expulsión o muerte.
- source_word: מִקֶּרֶב עַמָּם
  english_pob_choice: from among their people
  chosen_spanish: de entre su pueblo
  alternatives_spanish:
  - del medio de su pueblo
  - de entre su comunidad
  lexicon: HALOT
  rationale: Conserva el valor comunitario-covenantal de la expresión hebrea con una construcción natural en español.
theological_decisions:
- issue: Naturaleza de דָּוָה en el marco levítico
  english_pob_reading: Rendered as 'menstrual impurity' to reflect ritual status rather than mere illness.
  chosen_spanish_reading: Se traduce como «impureza menstrual» para reflejar un estado ritual, no una enfermedad genérica.
  alternative_spanish_readings:
  - mientras menstrúa
  - en su impureza/afección
  rationale: En Levítico el énfasis recae en la condición ritual asociada a la menstruación. La traducción explicita ese trasfondo sin añadir una interpretación doctrinal ajena al texto.
  doctrine_reference: Levítico 15; filosofía de traducción §1, §6
- issue: Fórmula penal וְנִכְרְתוּ
  english_pob_reading: Retained the formal phrase 'shall be cut off' without specifying death, excommunication, or childlessness.
  chosen_spanish_reading: 'Se mantiene una fórmula abierta: «serán eliminados», sin especificar muerte, expulsión o esterilidad.'
  alternative_spanish_readings:
  - serán cortados
  - serán excluidos de la comunidad
  rationale: El hebreo no precisa aquí el modo de la sanción. Conviene preservar esa indeterminación para no imponer una conclusión legal o doctrinal no explicitada por el texto.
  doctrine_reference: Fórmulas penales del Pentateuco; filosofía de traducción §3
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que ajustó la primera cláusula a «laid bare her flow» para acercarse más al hebreo y evitar repeticiones innecesarias. En español se reflejó ese ajuste con «ha puesto al descubierto su flujo», manteniendo la segunda cláusula más literal con «el flujo de su sangre».
  spanish_consistency_notes:
  - Se conserva el registro legal y sexual de Levítico sin sustituirlo por paráfrasis moralizantes.
  - «Impureza menstrual» mantiene explícito el marco ritual del pasaje.
  - Se preserva la fórmula penal ambigua sin decidir su mecanismo.
  - Se usó «descubre» para mantener paralelismo con «ha puesto al descubierto» y con el idiomatismo levítico de «descubrir la desnudez».
