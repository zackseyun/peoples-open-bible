translation:
  language: es
  text: 'Y cualquiera que mate a un animal hará restitución: vida por vida[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «vida por vida». En este contexto de restitución por un animal, la expresión comunica compensación equivalente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מַכֵּה
  english_pob_choice: And whoever strikes down
  chosen_spanish: Y cualquiera que hiera
  alternatives_spanish:
  - Y quien golpee
  - Y cualquiera que hiera de muerte
  lexicon: HALOT
  rationale: El participio causal en contexto legal introduce un sujeto general; en español, 'cualquiera que' expresa bien ese valor. 'Hiera' conserva el sentido de causar daño o abatir sin volver la frase demasiado explicativa.
- source_word: בְּהֵמָה
  english_pob_choice: an animal
  chosen_spanish: un animal
  alternatives_spanish:
  - una bestia
  - ganado
  lexicon: HALOT
  rationale: '''Animal'' es el equivalente más claro y amplio en español moderno. ''Ganado'' estrecha demasiado el término, y ''bestia'' suena más marcado o arcaico.'
- source_word: יְשַׁלְּמֶנָּה
  english_pob_choice: shall make restitution for it
  chosen_spanish: hará restitución por él
  alternatives_spanish:
  - lo pagará
  - lo compensará
  lexicon: HALOT
  rationale: El piel de שלם aquí expresa compensación o restitución. 'Hará restitución' mantiene el matiz jurídico y evita reducirlo solo a pago monetario. El pronombre masculino concuerda naturalmente en español con 'animal'.
- source_word: נֶפֶשׁ תַּחַת נָפֶשׁ
  english_pob_choice: life for life
  chosen_spanish: vida por vida
  alternatives_spanish:
  - una vida por una vida
  - vida en lugar de vida
  lexicon: HALOT
  rationale: La fórmula hebrea expresa equivalencia de compensación. 'Vida por vida' conserva la paralelismo breve del original y, en este contexto de restitución por un animal, no fuerza un mecanismo legal más específico del que el texto da.
theological_decisions:
- issue: Sentido de la fórmula de talión en un contexto de restitución por un animal
  english_pob_reading: The verse requires equivalent restitution for killing an animal, rendered 'life for life,' without specifying the exact mechanism beyond compensation.
  chosen_spanish_reading: El versículo exige una restitución equivalente por matar a un animal, expresada como 'vida por vida', sin precisar más el mecanismo que la compensación.
  alternative_spanish_readings:
  - La fórmula podría leerse de manera más literal como intercambio de una vida por otra.
  - También podría entenderse como una equivalencia material o económica dentro del marco legal.
  rationale: El verbo 'hará restitución' gobierna la lectura de la fórmula final. La traducción conserva la expresión hebrea sin imponer si la compensación es monetaria, material o de otra clase; así se preserva la tensión legal del texto.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail al reflejar directamente que el sujeto legal es quien hiere a un animal, sin añadir 'la vida de'; se mantiene la fórmula final 'vida por vida' para preservar el cierre hebreo y su valor legal de equivalencia.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no lo contiene.
  - '''Restitución'' se mantiene para conservar el registro jurídico del POB.'
  - '''Vida'' traduce נֶפֶשׁ aquí por la decisión auditada de evitar ''alma'' y por el contexto de equivalencia legal.'
