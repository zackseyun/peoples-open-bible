revisions:
- from: Y junto al límite de Gad, en el lado del sur, hacia el sur, el límite estará desde Tamar hasta las aguas de Meribat-cades[a], el torrente[b], hasta el Mar Grande.
  to: Y a lo largo del límite de Gad, en el lado del sur, hacia el sur, el límite será desde Tamar hasta las aguas de Meribat-cades[a], hasta el wadi[b], hasta el Mar Grande.
  rationale: Se ajusta la preposición inicial para expresar el trazado del lindero en vez de mera proximidad, se mejora la naturalidad de la fórmula de delimitación con «será desde», y se alinea נַחֲלָה con la decisión auditada usando «wadi» con nota explicativa.
