review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del hebreo: fórmula profética, nombre divino «Yahvé», alcance de los grupos mencionados y la imagen concreta de «embriaguez». Sin embargo, hay un problema de anclaje de notas: la nota [a] está colocada sobre «les dirás», pero su contenido no corresponde a una variante significativa que deba mantenerse en nota, mientras que falta una nota sobre la alternativa más relevante documentada en el rastro POB: el giro dinástico «los reyes que se sientan sobre el trono de David», donde el hebreo literalmente incluye לְדָוִד. También conviene anclar la nota sobre «embriaguez» directamente a esa palabra, no a «esta tierra».'
  spanish_quality_summary: El español es claro, natural y de registro digno. «Entonces les dirás» y «Así dice Yahvé» funcionan bien. «Miren, estoy por» es aceptable, aunque algo más coloquial que «He aquí»; no exige cambio. La puntuación con comillas es legible. El principal ajuste necesario es de notas y anclajes para que correspondan al lugar correcto y preserven la racionalidad léxica del audit trail.
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יְהוָה → «Yahvé»; הַכֹּהֲנִים → «sacerdotes»; הַנְּבִיאִים → «profetas»; שִׁכָּרוֹן → «embriaguez». La decisión «trono de David» sigue la revisión inglesa aplicada y es adecuada en español. No hay conflictos terminológicos mayores.'
  issues:
  - severity: medium
    issue: La nota [a] no preserva una alternativa léxica significativa y resulta innecesaria.
    rationale: El hebreo אֲלֵיהֶם significa sencillamente «a ellos / a ellos mismos» como complemento de destinatario; «les dirás» ya lo expresa naturalmente en español. La nota consume un marcador sin aportar una decisión importante del source evidence.
  - severity: medium
    issue: Falta una nota sobre el giro «los reyes que se sientan sobre el trono de David».
    rationale: El audit trail inglés preserva como alternativa relevante la literalidad «para David sobre su trono», que subraya la sucesión dinástica. Aunque el texto principal español puede mantenerse natural, la nota debe trasladarse a este punto si se conservan notas léxicas significativas.
  - severity: medium
    issue: La nota sobre «embriaguez» está mal anclada a «esta tierra».
    rationale: Según las instrucciones del proyecto, el marcador debe aparecer exactamente en la palabra o frase pertinente. La explicación teológica/lexical corresponde a «embriaguez», no a «esta tierra».
