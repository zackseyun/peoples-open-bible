revisions:
- from: Y tomaste tus hijos y tus hijas, que habías dado a luz para mí, y los sacrificaste a ellos para que fueran devorados. ¿Fue demasiado poca cosa tu prostitución[a]?
  to: Y tomaste tus hijos y tus hijas, que me habías dado a luz, y los sacrificaste a ellos[a] para que fueran devorados. ¿Acaso fue poca cosa tu prostitución[b]?
  rationale: Se reubicó la nota [a] en «a ellos» para que corresponda a לָהֶם, y se añadió una nota [b] para preservar las alternativas léxicas de מִתַּזְנוּתֵךְ. También se ajustó «que habías dado a luz para mí» a «que me habías dado a luz» por mayor naturalidad en español, y se suavizó la pregunta retórica final a una formulación más idiomática sin alterar el sentido.
