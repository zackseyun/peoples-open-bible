translation:
  language: es
  text: De los hijos de Judá, los que portaban escudo y lanza, eran 6.800, equipados para la batalla[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “armados para la guerra”. La expresión hebrea חֲלוּצֵי צָבָא puede referirse a hombres equipados o preparados para el combate militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יְהוּדָה
  english_pob_choice: From the sons of Judah
  chosen_spanish: De los hijos de Judá
  alternatives_spanish:
  - Los hijos de Judá
  - Los hombres de Judá
  lexicon: HALOT
  rationale: El hebreo nombra a los integrantes de la tribu/linaje de Judá. En español, "hijos de Judá" conserva la forma tribal y la relación genealógica sin forzar una expresión más explicativa que el texto no exige.
- source_word: נֹשְׂאֵי
  english_pob_choice: carrying
  chosen_spanish: los que portaban
  alternatives_spanish:
  - los que llevaban
  - portadores de
  lexicon: HALOT
  rationale: El participio describe a los que llevan equipo militar. "Portaban" suena natural y digno en español, y mantiene la idea de portar armas sin reducirla a una mera descripción estática.
- source_word: צִנָּה
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - escudo grande
  - broquel
  lexicon: HALOT
  rationale: El término designa un escudo; el detalle de tamaño no es imprescindible en esta línea. "Escudo" es claro y fiel para el lector moderno.
- source_word: וָרֹמַח
  english_pob_choice: and spear
  chosen_spanish: lanza
  alternatives_spanish:
  - lanza y
  - arma arrojadiza
  lexicon: HALOT
  rationale: רֹמַח puede ser lanza o jabalina/lanza. "Lanza" es el equivalente más natural en español y conserva el paralelismo con el escudo.
- source_word: שֵׁשֶׁת אֲלָפִים וּשְׁמוֹנֶה מֵאוֹת
  english_pob_choice: 6,800
  chosen_spanish: '6.800'
  alternatives_spanish:
  - seis mil ochocientos
  lexicon: transcription/numbering
  rationale: Se mantiene el valor numérico en cifra, como en el audit trail inglés, pero con la convención tipográfica española (punto para miles).
- source_word: חֲלוּצֵי צָבָא
  english_pob_choice: equipped for battle
  chosen_spanish: preparados para la batalla
  alternatives_spanish:
  - equipados para la batalla
  - armados para la guerra
  lexicon: HALOT
  rationale: La expresión hebrea apunta a hombres dispuestos y equipados para combate militar. "Preparados para la batalla" conserva la idea de disposición/equipamiento sin imponer un matiz demasiado técnico o bélico en español.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el sentido del hebreo WLC y concuerda con el audit trail inglés: lista tribal de combatientes de Judá, armados y contados con cifra exacta. No se detectaron revisiones aplicadas en el paquete de referencia.'
  spanish_consistency_notes:
  - Se usa "hijos de Judá" para preservar la formulación tribal del hebreo.
  - Se evita "SEÑOR" porque no aparece aquí el tetragrámaton ni una cita del nombre divino.
  - La cifra se adapta a la puntuación española como 6.800.
  - La nota conserva la alternativa semántica relevante de חֲלוּצֵי צָבָא sin exagerar el matiz.
