review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: partícula inferencial, fórmula profética, agresor singular, cerco de la tierra, abatimiento de la fuerza y saqueo de las residencias fortificadas. Sin embargo, hay dos desajustes importantes con la evidencia y con el rastro POB: la nota [a] introduce una alternativa que no corresponde al inglés auditado, y la nota [b] está anclada en «fuerza» aunque la alternativa documentada en el POB recae sobre אַרְמְנוֹתָיִךְ (‘citadels/palaces’), no sobre עֻזֵּךְ.'
  spanish_quality_summary: El español es generalmente claro, pero «él derribará de ti tu fuerza» suena innecesariamente calcado y poco natural. Puede mejorarse a «te quitará tu fuerza» o «hará caer tu fuerza»; la primera es la más idiomática y conserva la idea de remoción. «La tierra» es posible, aunque aquí «el país» o «la tierra» ambos caben; no exige cambio. «Tus fortalezas» es legible, pero conviene preservar la amplitud semántica con una nota correcta sobre ‘palacios’.
  glossary_alignment: Bien en «Yahvé» para יְהוָה y aceptable «el Señor Yahvé» para אֲדֹנָי יְהוִה en español. «Adversario» refleja bien צַר. «Fortalezas» para אַרְמְנוֹתָיִךְ funciona contextualmente, siempre que la nota recoja la alternativa «palacios». No hay problema terminológico doctrinal que requiera adjudicación mayor.
  issues:
  - severity: high
    issue: La nota [b] está puesta en el lugar equivocado y explica la palabra equivocada.
    rationale: En el POB inglés, la nota b acompaña «citadels» y dice que el hebreo puede referirse a ‘palaces’ o ‘fortified strongholds’. El borrador español la ancla en «fuerza» y comenta עֹז, lo cual altera el audit trail.
  - severity: medium
    issue: La nota [a] no refleja la alternativa documentada en el POB inglés.
    rationale: La nota inglesa [a] ofrece ‘enemy’ como alternativa de ‘adversary’. La nota española habla de la fórmula divina «Así dice Yahvé», que no corresponde a esa variante léxica.
  - severity: medium
    issue: «él derribará de ti tu fuerza» es poco natural en español.
    rationale: Aunque intenta seguir de cerca מִמֵּךְ עֻזֵּךְ, el resultado suena forzado. Una formulación como «te quitará tu fuerza» comunica mejor la remoción de poder sin perder el sentido fuente.
  revised_spanish_text: 'Por tanto, así dice el Señor Yahvé: Un adversario[a] rodeará la tierra, te quitará tu fuerza, y tus fortalezas[b] serán saqueadas.'
  revised_footnotes:
  - marker: a
    text: O «enemigo».
    reason: lexical_alternative
  - marker: b
    text: O «tus palacios». El hebreo puede referirse a palacios o a fortalezas fortificadas.
    reason: lexical_alternative
  revision_rationale: 'Se corrigen las notas para alinearlas exactamente con las alternativas léxicas documentadas por el POB inglés: [a] ahora corresponde a צַר (‘adversario/enemigo’) y [b] a אַרְמְנוֹתָיִךְ (‘fortalezas/palacios’). También se mejora la naturalidad del español reemplazando «él derribará de ti tu fuerza» por «te quitará tu fuerza», que preserva la idea de remoción de poder expresada por וְהוֹרִיד מִמֵּךְ עֻזֵּךְ sin sonar calcado.'
