lexical_decisions:
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una cadena genealógica breve, בֶּן señala filiación directa y la fórmula española más natural y fiel es «hijo de». Conserva la estructura repetitiva del hebreo sin ampliar innecesariamente el sentido a «descendiente de».
- source_word: מִיכָאֵל
  english_pob_choice: Michael
  chosen_spanish: Micael
  alternatives_spanish:
  - Miguel
  lexicon: convención de transliteración española
  rationale: Se preserva el nombre propio como transliteración transparente del hebreo. «Micael» refleja mejor la forma מקורית que «Miguel», que ya es una adaptación tradicional distinta y menos auditable para este texto.
- source_word: בַּעֲשֵׂיָה
  english_pob_choice: Baaseiah
  chosen_spanish: Baaseías
  alternatives_spanish:
  - Maaseías
  lexicon: convención de transliteración española
  rationale: La consonantización del hebreo recibido apoya una transliteración cercana a «Baaseiah»; en español, «Baaseías» mantiene esa forma de modo reconocible y evita sustituirla por el nombre más familiar «Maaseías», que el audit trail señala como posible confusión con otras tradiciones o genealogías.
- source_word: מַלְכִּיָּה
  english_pob_choice: Malkijah
  chosen_spanish: Malkías
  alternatives_spanish:
  - Malquías
  lexicon: convención de transliteración española
  rationale: Se conserva la raíz consonántica del nombre con una transliteración española sencilla y auditable. «Malkías» reproduce mejor la forma hebrea que la variante tradicional «Malquías», más castellanizada y menos transparente.
theological_decisions:
