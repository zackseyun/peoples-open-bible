translation:
  language: es
  text: 'Pero el ángel le dijo: «Agarra[a] el pez». Entonces el muchacho agarró el pez y lo sacó a tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Toma el pez». El imperativo griego también puede traducirse de forma más formal como «Toma el pez» o «Toma el pez en la mano».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελος
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: En Tobit la figura es claramente celestial, así que «ángel» conserva mejor el contexto narrativo que el término más general «mensajero».
- source_word: Ἐπιλαβοῦ
  english_pob_choice: Take hold of
  chosen_spanish: Toma
  alternatives_spanish:
  - Toma el pez
  - Toma el control de
  - Agarra
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción inmediata. En español, «Toma el pez» mantiene la fuerza del mandato sin caer en una formulación demasiado coloquial como «Agarra».
- source_word: ἰχθύος / ἰχθύν
  english_pob_choice: fish
  chosen_spanish: pez
  alternatives_spanish:
  - pez
  - pescado
  lexicon: BDAG
  rationale: «Pez» es el equivalente natural y preciso en español para el animal vivo que Tobías manipula; «pescado» sería inadecuado aquí.
- source_word: ἐκράτησεν
  english_pob_choice: seized
  chosen_spanish: tomó
  alternatives_spanish:
  - se apoderó de
  - agarró
  - sujetó
  lexicon: BDAG
  rationale: El verbo expresa que el muchacho obtuvo un control firme sobre el pez. En español, el contexto inmediato ya está marcado por el mandato del ángel, de modo que «tomó» comunica la acción con naturalidad y sin sobrecargarla.
- source_word: τὸ παιδάριον
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el joven
  - el muchacho
  lexicon: BDAG
  rationale: «Muchacho» conserva el tono narrativo y la referencia juvenil de Tobías mejor que «niño», que podría sonar demasiado pequeño en español.
- source_word: ἀνέβαλεν
  english_pob_choice: pulled it up
  chosen_spanish: lo alzó
  alternatives_spanish:
  - lo levantó
  - lo sacó
  - lo subió
  lexicon: BDAG
  rationale: El verbo describe el movimiento hacia arriba y fuera del agua. «Lo alzó» refleja ese ascenso sin sugerir necesariamente un lanzamiento, en línea con la revisión inglesa que evitó «threw».
- source_word: ἐπὶ τὴν γῆν
  english_pob_choice: onto the land
  chosen_spanish: hasta la tierra
  alternatives_spanish:
  - a tierra
  - a la tierra
  - sobre la tierra
  lexicon: BDAG
  rationale: «Hasta la tierra» conserva el sentido direccional de movimiento hacia la orilla o tierra firme. «Tierra» funciona aquí como la superficie seca frente al agua.
translation_notes:
  revision_awareness: La revisión inglesa pasó de un verbo más coloquial y potencialmente más fuerte («Grab») a una forma más formal («Take hold of»), y también ajustó la acción final desde una imagen de arrojar hacia una de levantar o tirar hacia arriba. El español sigue esa línea con un mandato sobrio y con «lo alzó», evitando cualquier idea de lanzamiento violento.
  spanish_consistency_notes:
  - Se mantiene «ángel» para la figura celestial, coherente con el contexto de Tobit.
  - Se elige «pez» y no «pescado» por precisión semántica.
  - El cierre «hasta la tierra» conserva la dirección del movimiento sin introducir un matiz ajeno al texto griego.
  - No se añaden notas teológicas porque el versículo es narrativo y no presenta una tensión doctrinal específica.
