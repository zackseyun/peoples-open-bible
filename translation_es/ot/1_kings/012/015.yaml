translation:
  language: es
  text: Así que el rey no escuchó[a] al pueblo, porque fue un giro de los acontecimientos[b] de Yahvé, para establecer su palabra que Yahvé había hablado por medio de Ahías el silonita a Jeroboam hijo de Nabat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prestó atención a». El verbo hebreo שָׁמַע puede significar oír, atender u obedecer; aquí expresa que el rey no hizo caso a la petición del pueblo.
    reason: lexical_alternative
  - marker: b
    text: O «causa» o «razón». El hebreo סִבָּה puede referirse a la causa de un hecho o a un giro en los acontecimientos.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַע
  english_pob_choice: listen to
  chosen_spanish: escuchó
  alternatives_spanish:
  - oyó
  - prestó atención a
  - obedeció
  lexicon: HALOT
  rationale: Con אֶל + objeto personal, el verbo expresa atender la petición del pueblo, no solo percibir sonido. «Escuchó» es natural en español y conserva la idea de rechazar su ruego.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la población
  lexicon: HALOT
  rationale: Aquí designa a la asamblea de Israel. «El pueblo» mantiene el referente colectivo y el registro bíblico.
- source_word: סִבָּה
  english_pob_choice: turn of events
  chosen_spanish: giro de circunstancias
  alternatives_spanish:
  - causa
  - razón
  - circunstancia
  lexicon: HALOT
  rationale: El sustantivo puede significar causa, razón o un giro en los acontecimientos. «Giro de circunstancias» preserva el matiz narrativo y la ambigüedad entre causa y desarrollo providencial sin reducirlo a una explicación meramente abstracta.
- source_word: מֵעִם יְהוָה
  english_pob_choice: from the LORD
  chosen_spanish: de parte de Yahvé
  alternatives_spanish:
  - de Yahvé
  - procedente de Yahvé
  - de junto a Yahvé
  lexicon: HALOT
  rationale: La expresión indica procedencia/origen. Se usa «Yahvé» según la norma del proyecto, y «de parte de» comunica origen y agencia sin sonar forzado en español.
- source_word: לְמַעַן הָקִים
  english_pob_choice: in order to establish
  chosen_spanish: para establecer
  alternatives_spanish:
  - para पुष्टि?
  - para confirmar
  - para cumplir
  lexicon: HALOT
  rationale: La cláusula expresa finalidad; con דְּבָרוֹ, הֵקִים puede significar establecer o confirmar una palabra pronunciada. «Para establecer» conserva el vínculo formal con el cumplimiento profético.
- source_word: דְּבָרוֹ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su dicho
  - su promesa
  - su mensaje
  lexicon: HALOT
  rationale: «Palabra» reproduce el hebraísmo y mantiene la referencia a la declaración divina sin estrecharla indebidamente a «promesa».
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - mediante
  - a través de
  lexicon: HALOT
  rationale: Es un modismo de mediación profética. «Por medio de» es idiomático en español y preserva la agencia indirecta de Ahías.
- source_word: הַשִּׁילֹנִי
  english_pob_choice: the Shilonite
  chosen_spanish: el silonita
  alternatives_spanish:
  - el de Silo
  - el shilonita
  lexicon: HALOT
  rationale: El gentilicio se vierte con la forma española establecida «silonita», que comunica la procedencia de Silo sin calco crudo.
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam hijo de Nabat
  alternatives_spanish:
  - Jeroboam, hijo de Nabat
  - Jeroboam, hijo de Nebat
  lexicon: HALOT
  rationale: Se mantiene el patrón onomástico hebreo. «Hijo de» es claro en español; «Nabat» sigue la transliteración habitual del nombre del padre en la tradición hispana bíblica.
theological_decisions:
- issue: Causación divina y acción humana
  english_pob_reading: The king's refusal occurred because the outcome was from the LORD, with the purpose of establishing the LORD's prior word.
  chosen_spanish_reading: El rey no escuchó al pueblo porque el giro de circunstancias era de parte de Yahvé, con el fin de establecer la palabra ya hablada por Yahvé.
  alternative_spanish_readings:
  - El rey no escuchó al pueblo, pues Yahvé lo hizo así.
  - El rey no escuchó al pueblo, porque Yahvé así lo determinó.
  rationale: 'La traducción conserva la tensión del texto: la negativa del rey y la procedencia del acontecimiento se afirman juntos, sin diluir la soberanía divina ni volverla una causalidad mecánica que el hebreo no explicita.'
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla'
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo y refleja la revisión inglesa más reciente, que prefirió una formulación más directa («it was a turn of events from the LORD») sin perder la relación de causalidad providencial. En español se adoptó una solución igualmente directa pero idiomática, manteniendo el paralelismo entre la negativa del rey y la finalidad de la palabra profética.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva «el pueblo» para עָם y «su palabra» para דְּבָרוֹ.
  - «Silonita» se usa como gentilicio español natural para הַשִּׁילֹנִי.
  - Se evita sustituir la mediación profética por una explicación causal más fuerte que la del hebreo.
