review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: flor marchita, valle fértil, visión inmediata y consumo rápido. Sin embargo, hay un desajuste importante en כְּבִכּוּרָהּ בְּטֶרֶם קַיִץ: el texto compara con un fruto temprano/primerizo, no con una higuera (árbol). También la nota b introduce «rincones fértiles», que no corresponde a גֵּיא שְׁמָנִים.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «una higuera temprana» suena incorrecto en contexto porque el objeto visto, tenido en la palma y tragado debe ser un fruto, no un árbol. «Su hermosa gloria» es comprensible, aunque «su gloriosa hermosura» suena algo más natural; no es necesario forzar ese cambio. «En su palma» es aceptable y fiel a כף.
  glossary_alignment: No hay términos teológicos de proyecto en juego. La alineación léxica es en general buena, salvo בִּכּוּרָהּ, que debe reflejar fruto primerizo/temprano, idealmente «higo temprano» o «fruto primerizo», conforme a la evidencia y a la nota inglesa. La nota cultural sobre גֵּיא שְׁמָנִים debe ceñirse a «valle de abundancia/grasura/fertilidad», no «rincones».
  issues:
  - severity: high
    issue: «como una higuera temprana antes del verano» traduce mal בִּכּוּרָהּ
    rationale: בִּכּוּרָה denota fruto primerizo/temprano; en este contexto se entiende comúnmente como higo temprano. El símil exige algo que se ve, se tiene en la palma y se traga, por lo que «higuera» (árbol) es incompatible con el contexto inmediato.
  - severity: medium
    issue: La nota b incluye «rincones fértiles», ajeno al hebreo
    rationale: גֵּיא significa valle, no rincón. La glosa debe limitarse a la literalidad de «valle de grasas/abundancia» y su sentido idiomático de fertilidad.
  - severity: low
    issue: La nota a no preserva la alternativa documentada sobre בִּכּוּרָה
    rationale: La nota inglesa conserva la posibilidad más general de «fruto primerizo». En español conviene mantener esa alternativa para reflejar la decisión léxica auditada.
