translation:
  language: es
  text: El grillo[a] tomará posesión de todos tus árboles y del fruto de tu tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «langosta», «saltamontes» o, más ampliamente, «un insecto zumbador»; la identificación exacta del hebreo צְלָצַל es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - todo
  lexicon: HALOT
  rationale: El cuantificador expresa totalidad; en español, «todos» fluye naturalmente con el sustantivo plural «árboles» y mantiene el alcance total de la frase.
- source_word: עֵצְךָ
  english_pob_choice: your trees
  chosen_spanish: tus árboles
  alternatives_spanish:
  - todos tus árboles
  - los árboles tuyos
  lexicon: HALOT
  rationale: En contexto agrícola, עֵץ se refiere a árboles; el posesivo de segunda persona singular se conserva con «tus».
- source_word: וּפְרִי אַדְמָתֶךָ
  english_pob_choice: and the fruit of your ground
  chosen_spanish: y del fruto de tu tierra
  alternatives_spanish:
  - y del fruto de tu suelo
  - y del producto de tu tierra
  lexicon: HALOT
  rationale: פְּרִי puede ser «fruto» o, por extensión, «producción»; אַדָמָה es «tierra/suelo». «Fruto de tu tierra» conserva la imagen agrícola y suena natural en español.
- source_word: יְיָרֵשׁ
  english_pob_choice: shall take possession of
  chosen_spanish: tomará posesión de
  alternatives_spanish:
  - desposeerá
  - heredará
  - se apoderará de
  lexicon: HALOT
  rationale: El verbo ירשׁ conserva la idea de tomar posesión/despojar. En español, «tomará posesión de» reproduce esa fuerza sin reducirlo a un mero acto de consumir.
- source_word: הַצְּלָצַל
  english_pob_choice: the cricket
  chosen_spanish: Un insecto
  alternatives_spanish:
  - el grillo
  - la langosta
  - el saltamontes
  - un insecto zumbador
  lexicon: HALOT
  rationale: La identificación zoológica exacta es incierta en hebreo. Dado que el inglés POB preserva la incertidumbre con una nota y evita fijar demasiado la especie, el texto español usa una designación genérica; la nota recoge las posibilidades léxicas.
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo masorético citado en el paquete de fuente y con la traducción inglesa auditada; no se observan revisiones aplicadas en el expediente reciente, y la decisión principal en español es cómo reflejar la incertidumbre léxica de צְלָצַל sin forzar una especie concreta.
  spanish_consistency_notes:
  - Se mantiene «tus» en segunda persona singular, coherente con el hebreo sufijado.
  - «Tomará posesión de» preserva la fuerza verbal del hebreo y el criterio de la POB inglesa.
  - La nota al pie acompaña el término genérico «insecto» para no ocultar la incertidumbre léxica.
