translation:
  language: es
  text: Había una brasa[a] delante de él; sopló sobre ella, y se encendió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Si soplas una chispa, se encenderá; y si escupes sobre ella, se apagará; y ambas salen de tu boca». El testimonio hebreo es más breve y dice: «Había una brasa delante de él; sopló sobre ella, y se encendió».'
    reason: alternative_reading
lexical_decisions:
- source_word: הָיְתָה
  english_pob_choice: There was
  chosen_spanish: Había
  alternatives_spanish:
  - Había allí
  - Existía
  lexicon: HALOT
  rationale: La cláusula hebrea es existencial; en español, «Había» expresa de forma natural la simple presencia del objeto sin forzar una estructura más interpretativa.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - frente a él
  - ante él
  lexicon: HALOT
  rationale: «Delante de él» conserva la relación espacial directa del hebreo y suena natural en español contemporáneo y reverente.
- source_word: גַחֶלֶת
  english_pob_choice: a coal
  chosen_spanish: un carbón
  alternatives_spanish:
  - una brasa
  - un ascua
  lexicon: HALOT
  rationale: El hebreo nombra un objeto ardiente concreto; «carbón» es el equivalente directo y mantiene la imagen del texto hebreo mejor que una paráfrasis más interpretativa.
- source_word: נָפַח
  english_pob_choice: he blew on it
  chosen_spanish: lo sopló
  alternatives_spanish:
  - sopló sobre él
  - le dio soplo
  lexicon: HALOT
  rationale: El verbo indica soplar para avivar el fuego. «Lo sopló» es breve, idiomático y conserva la acción física del original.
- source_word: וּבָעֲרָה
  english_pob_choice: and it blazed up
  chosen_spanish: y se encendió
  alternatives_spanish:
  - y ardió
  - y prendió
  lexicon: HALOT
  rationale: El hebreo describe el resultado de avivarse el fuego; «se encendió» comunica bien el inicio de la combustión sin exagerar la intensidad.
- source_word: ἐὰν φυσήσῃς σπινθῆρα ἐκκαήσεται
  english_pob_choice: kept in view but not followed in main text
  chosen_spanish: mantenido en cuenta, pero no seguido en el texto principal
  alternatives_spanish:
  - si soplas una chispa, se encenderá
  - si soplas sobre una chispa, arderá
  lexicon: BDAG
  rationale: La tradición griega presenta una expansión proverbial con segunda persona y «chispa»; como el hebreo es más breve y directo, el texto principal sigue al hebreo y no a la expansión griega.
translation_notes:
  revision_awareness: Se siguió la lectura hebrea principal del testimonio base, manteniendo en nota la expansión del paralelo griego y sin forzar la imagen hacia «chispa» en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y sobrio, con puntuación española estándar.
  - No se usó «SEÑOR» ni terminología teológica ajena al versículo.
  - La nota al pie conserva la tensión textual entre la forma hebrea breve y la expansión griega sin resolverla artificialmente.
