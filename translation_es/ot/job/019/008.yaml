revisions:
- from: Él ha cercado mi camino, de modo que no pueda pasar[a], y ha puesto tinieblas sobre mis senderos.
  to: Ha cercado mi camino, de modo que no puedo pasar[a], y ha puesto tinieblas sobre mis senderos.
  rationale: Se elimina «Él» para reflejar mejor el sujeto implícito del hebreo en un español natural, y se ajusta «no pueda pasar» a «no puedo pasar» para una expresión más idiomática y directa del resultado de la obstrucción. Se conserva el resto del verso porque transmite fielmente la imaginería y las decisiones léxicas del original y del POB inglés.
