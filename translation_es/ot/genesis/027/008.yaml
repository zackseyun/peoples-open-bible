translation:
  language: es
  text: Ahora[a], hijo mío[b], escucha mi voz respecto a lo que te mando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y ahora, hijo mío, oye mi voz según lo que te mando».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «escucha mi voz —lo que te estoy mandando».'
    reason: previous_rendering
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Marca temporal y discursiva que introduce la instrucción. «Ahora» suena natural en español y conserva la inmediatez; «Y ahora» también es posible, pero el conector inicial puede quedar absorbido en español sin perder sentido.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  lexicon: HALOT
  rationale: Es un vocativo con sufijo de primera persona. En español, «hijo mío» suena más natural en una exhortación directa y conserva la relación afectiva del vocativo.
- source_word: שְׁמַע
  english_pob_choice: listen
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - escucha atentamente
  - oye y obedece
  lexicon: HALOT
  rationale: El imperativo expresa atención auditiva con implicación de respuesta. «Escucha» mantiene el sentido inmediato sin sobreinterpretar con «obedece», aunque la obediencia queda implícita por el contexto.
- source_word: בְּקֹלִי
  english_pob_choice: to my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - a mi voz
  - a lo que digo
  - a mi palabra
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática con «voz» para indicar atención a lo que se dice. En español, «escucha mi voz» conserva la imagen concreta y suena natural; la preposición se entiende por el verbo.
- source_word: לַאֲשֶׁר
  english_pob_choice: as to what
  chosen_spanish: en lo que
  alternatives_spanish:
  - según lo que
  - respecto de lo que
  - conforme a lo que
  lexicon: HALOT
  rationale: Introduce el contenido o la esfera de la orden. «En lo que te mando» preserva la relación explicativa y la fluidez del español sin desdibujar la conexión entre la voz y el mandato.
- source_word: מְצַוָּה
  english_pob_choice: am commanding
  chosen_spanish: te mando
  alternatives_spanish:
  - te ordeno
  - te estoy mandando
  - te estoy ordenando
  lexicon: HALOT
  rationale: El participio tiene fuerza de acción presente e inmediata. «Te mando» comunica con naturalidad la autoridad del mandato; «ordeno» sería más fuerte en español, pero «mandar» corresponde bien al verbo hebreo צוה.
- source_word: אֹתָךְ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: HALOT
  rationale: Pronombre de objeto directo en segunda persona. En español, el clítico «te» expresa con naturalidad el objeto del mandato.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: se conservó la relación idiomática entre «my voice» y la cláusula explicativa de la orden, evitando un calco extraño pero manteniendo la cercanía formal del hebreo. La revisión inglesa hacia una formulación más natural con «as to what I command you» se reflejó en español con «en lo que te mando», que preserva el valor explicativo sin añadir interpretación.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evitó «obedecer» porque el hebreo dice literalmente «escucha», aunque la obediencia esté implicada.
  - Se mantuvo «mando» para צוה por consistencia con el valor de mandato directo; «ordeno» se reservó como alternativa más enfática.
