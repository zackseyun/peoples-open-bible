  revision_rationale: Se corrige el término cultual principal para reflejar mejor משמרת como encargo prescrito que debe guardarse, y se reubica la nota al verbo correspondiente para alinearla con el audit trail y evitar ambigüedad. El resto del versículo puede mantenerse.
