translation:
  language: es
  text: Y se agradaron de Alejandro[a], porque él había llegado a ser para ellos el promotor de propuestas de paz, y combatieron junto a él todos los días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el líder en palabras de paz»; o «el iniciador de palabras de paz». La expresión griega es condensada y probablemente se refiere a Alejandro como quien tomó la iniciativa en negociaciones conciliadoras.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐδόκησαν
  english_pob_choice: were pleased with
  chosen_spanish: quedaron complacidos con
  alternatives_spanish:
  - aprobaron a
  - estuvieron bien dispuestos hacia
  - tuvieron agrado en
  lexicon: LSJ
  rationale: El verbo expresa aprobación o satisfacción favorable. «Quedaron complacidos con» mantiene la disposición positiva sin convertirla en una aprobación formal más fuerte de la que exige el griego.
- source_word: ἐν Ἀλεξάνδρῳ
  english_pob_choice: with Alexander
  chosen_spanish: con Alejandro
  alternatives_spanish:
  - en Alejandro
  - hacia Alejandro
  lexicon: LSJ
  rationale: Aunque el griego usa ἐν, en este giro con εὐδοκέω el sentido apunta al objeto de la complacencia. En español, «con Alejandro» es la forma natural y fiel al valor idiomático.
- source_word: ἐγένετο
  english_pob_choice: had become
  chosen_spanish: había sido
  alternatives_spanish:
  - había llegado a ser
  - se había hecho
  - llegó a ser
  lexicon: LSJ
  rationale: El aoristo presenta el hecho de llegar a ser. En español, «había sido» funciona bien dentro de la cláusula causal introducida por «porque» y conserva la relación previa al momento de la reacción de los otros.
- source_word: ἀρχηγὸς
  english_pob_choice: leader
  chosen_spanish: iniciador
  alternatives_spanish:
  - líder
  - autor
  - originador
  - promotor
  lexicon: LSJ
  rationale: En combinación con «palabras/medidas de paz», el término apunta a quien toma la iniciativa de la negociación. «Iniciador» evita sobredeterminar el cargo o la autoridad y refleja mejor la función diplomática.
- source_word: λόγων εἰρηνικῶν
  english_pob_choice: words of peace
  chosen_spanish: palabras de paz
  alternatives_spanish:
  - términos de paz
  - propuestas de paz
  - palabras pacíficas
  lexicon: LSJ
  rationale: La expresión griega es compacta y, en contexto político, alude a iniciativas conciliadoras. «Palabras de paz» conserva la metáfora verbal sin borrar la tensión entre literalidad y sentido diplomático que el inglés también dejó abierta.
- source_word: συνεμάχουν
  english_pob_choice: fought alongside
  chosen_spanish: combatieron junto a
  alternatives_spanish:
  - pelearon junto a
  - lucharon al lado de
  - se aliaron con
  lexicon: LSJ
  rationale: El compuesto indica lucha conjunta como aliados. «Combatieron junto a» conserva el matiz militar explícito y evita reducirlo a una mera alianza política.
- source_word: πάσας τὰς ἡμέρας
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - todo el tiempo
  - constantemente
  - durante todos los días
  lexicon: LSJ
  rationale: La frase expresa continuidad durativa. En español, «todos los días» comunica de forma idiomática esa persistencia, aunque suene algo más natural que la calca literal.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden sustancialmente. Se mantuvo la ambigüedad controlada de ἀρχηγός λόγων εἰρηνικῶν mediante «iniciador de palabras de paz», con una nota alternativa que preserva las opciones señaladas en el inglés POB. También se conservó el valor durativo de πάσας τὰς ἡμέρας con una solución española natural.
  spanish_consistency_notes:
  - Se usa «Alejandro» como forma estándar del nombre propio.
  - Se prefirió «combatieron junto a» para conservar el sentido de cooperación militar explícita.
  - No se introdujo terminología eclesiástica ajena al contexto histórico del pasaje.
  - La nota al pie se ancla en «Alejandro[a]» porque la ambigüedad léxica afecta a la cláusula entera, no solo al sintagma nominal final.
