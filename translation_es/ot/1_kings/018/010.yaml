translation:
  language: es
  text: 'Tan cierto como vive Yahvé tu Dios, no hay nación ni reino donde mi señor no haya enviado a buscarte. Cuando dijeron: «No está aquí», hizo jurar al reino y a la nación que no podían hallarte.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: חַי יְהוָה אֱלֹהֶיךָ
  english_pob_choice: As Yahweh your God lives
  chosen_spanish: Vive Yahvé, tu Dios
  alternatives_spanish:
  - Vive Yahvé, tu Dios;
  - Por la vida de Yahvé, tu Dios
  - Tan cierto como vive Yahvé, tu Dios
  lexicon: HALOT
  rationale: El hebreo formula un juramento apelando a la vida de Yahvé. En español, «Vive Yahvé, tu Dios» conserva la fuerza del juramento con una estructura natural y digna; «Por la vida de Yahvé» explicita más la fórmula, pero resulta menos directa en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se adopta «Yahvé» como forma española establecida en el proyecto para el Tetragrama, manteniendo el nombre divino sin sustituirlo por un título. «Yahweh» sería posible como transliteración más cercana al inglés, pero no es la forma preferida del español del proyecto.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  - tu Dios
  lexicon: HALOT
  rationale: «Dios» transmite con claridad el sustantivo singular y el vínculo posesivo de segunda persona masculina singular. No hace falta marcar un matiz adicional en español.
- source_word: אִם יֶשׁ גּוֹי וּמַמְלָכָה אֲשֶׁר לֹא
  english_pob_choice: there is no nation or kingdom where ... not
  chosen_spanish: no hay nación ni reino a donde
  alternatives_spanish:
  - no hay nación ni reino donde
  - no existe nación ni reino a donde
  - no hay nación ni reino en que
  lexicon: HALOT
  rationale: En el contexto de juramento, אִם funciona con fuerza enfática y no como condición simple. En español, la negación expletiva «no hay» comunica mejor la afirmación global de búsqueda exhaustiva. «A donde» respeta el sentido de desplazamiento/búsqueda hacia cada lugar.
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gente
  lexicon: HALOT
  rationale: Aquí el paralelismo con «reino» pide un término político-geográfico. «Nación» es el equivalente más natural y preciso.
- source_word: וּמַמְלָכָה
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reino
  - monarquía
  - territorio
  lexicon: HALOT
  rationale: «Reino» mantiene el campo semántico político y el paralelismo con «nación» sin sonar arcaico.
- source_word: שָׁלַח ... לְבַקֶּשְׁךָ
  english_pob_choice: has not sent to seek you
  chosen_spanish: mi señor no haya enviado para buscarte
  alternatives_spanish:
  - mi señor no haya enviado a buscarte
  - mi señor no haya mandado a buscarte
  - mi señor no haya enviado para buscarte
  lexicon: HALOT
  rationale: Se conserva la secuencia verbal «enviar ... buscar» y se evita añadir un objeto explícito no presente en el hebreo. «Buscarte» reproduce el destinatario directo de la búsqueda.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señor
  - mi amo
  - mi maestro
  lexicon: HALOT
  rationale: En el habla cortesana dirigida a un rey, «mi señor» es la equivalencia española más natural y fiel. «Mi amo» sugeriría esclavitud y alteraría el tono.
- source_word: שָׁם
  english_pob_choice: where
  chosen_spanish: a donde
  alternatives_spanish:
  - donde
  - allí donde
  - en donde
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «allí», en español el valor locativo dinámico se expresa mejor con «a donde» después de «enviar para buscarte».
- source_word: וְאָמְרוּ אָיִן
  english_pob_choice: When they said, ‘He is not here,’
  chosen_spanish: 'Cuando dijeron: «No está aquí»,'
  alternatives_spanish:
  - 'Y dijeron: «No está aquí»'
  - 'Cuando dijeron: «No lo hay»'
  - 'Cuando dijeron: «No está allá»'
  lexicon: HALOT
  rationale: אָיִן aquí expresa ausencia. En español, «No está aquí» hace explícito el referente implícito de la búsqueda y suena natural; «No lo hay» sería menos claro en este contexto.
- source_word: וְהִשְׁבִּיעַ
  english_pob_choice: he made ... swear
  chosen_spanish: hizo jurar
  alternatives_spanish:
  - obligó a jurar
  - puso bajo juramento
  - hizo que juraran
  lexicon: HALOT
  rationale: El hifil de שבע indica causar un juramento. «Hizo jurar» mantiene la fuerza causal sin recargar la frase.
- source_word: אֶת הַמַּמְלָכָה וְאֶת הַגּוֹי
  english_pob_choice: the kingdom and the nation
  chosen_spanish: al reino y a la nación
  alternatives_spanish:
  - al reino y a la nación
  - a la nación y al reino
  - a ese reino y a esa nación
  lexicon: HALOT
  rationale: Se preserva el paralelismo hebreo con artículos definidos y complemento directo personalizado en español. El orden «reino y nación» mantiene la secuencia del original.
- source_word: כִּי לֹא יִמְצָאֶךָ
  english_pob_choice: that they could not find you
  chosen_spanish: que no podían hallarte
  alternatives_spanish:
  - que no podían encontrarte
  - que no podían hallarte
  - que no te hallarían
  lexicon: HALOT
  rationale: Tras un verbo de jurar, כִּי introduce el contenido del juramento. «Podían hallarte» recoge el matiz de imposibilidad o resultado frustrado; «hallar» preserva mejor el registro bíblico y el paralelismo verbal con la búsqueda.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Yahweh
  - SEÑOR
  rationale: El texto es un juramento explícito invocando el nombre propio de Dios. Se mantiene ese nombre en forma española del proyecto para no ocultarlo detrás de un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de אִם en fórmula de juramento
  english_pob_reading: there is no nation or kingdom where ... not
  chosen_spanish_reading: no hay nación ni reino a donde
  alternative_spanish_readings:
  - si hay nación ni reino...
  - si alguna nación o reino...
  - no existe nación ni reino a donde
  rationale: En este contexto, el hebreo usa una construcción enfática que expresa afirmación amplia, no condición hipotética. El español adopta una negación idiomática para conservar esa fuerza.
  doctrine_reference: HALOT; sintaxis de juramento en hebreo bíblico
- issue: Identificación del sujeto implícito de «no está aquí»
  english_pob_reading: He is not here
  chosen_spanish_reading: No está aquí
  alternative_spanish_readings:
  - No lo han hallado
  - No se encuentra aquí
  - No está allá
  rationale: El referente implícito es la persona buscada; en español conviene dejarlo implícito como en el original, pero la frase requiere un sujeto tácito claro y natural.
  doctrine_reference: Contexto narrativo de 1 Reyes 18:10
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del POB inglés: no se registran cambios aplicados y el acuerdo de revisión fue alto. La presente versión española sigue ese mismo análisis: juramento idiomático, nombre divino preservado y secuencia verbal de enviar/buscar sin añadir elementos ajenos al hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «mi señor» como tratamiento cortesano para אֲדֹנִי.
  - «Nación» y «reino» conservan el paralelismo político del original.
  - «Hallar» se elige por registro bíblico compatible con «buscar» y «no podían».
