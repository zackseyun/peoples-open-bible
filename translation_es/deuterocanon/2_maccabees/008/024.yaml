  revised_spanish_text: Pero, con el Todopoderoso como su aliado, masacraron a más de nueve mil enemigos, y dejaron herida y lisiada a la mayor parte del ejército de Nicanor, y obligaron a todos a huir.
  revision_rationale: Se fortalece κατέσφαξαν con «masacraron» para reflejar la violencia del original y del audit trail inglés. También se mejora ligeramente la concordancia y naturalidad de la frase sobre el ejército («dejaron herida y lisiada a la mayor parte del ejército»). No hacen falta notas.
