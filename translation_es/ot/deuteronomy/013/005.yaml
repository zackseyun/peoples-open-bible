translation:
  language: es
  text: Andarán tras Yahvé su Dios[a], y le temerán; guardarán sus mandamientos, escucharán su voz[b], le servirán y se apegarán a él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''seguirán a Yahvé su Dios''. El hebreo dice literalmente: ''andarán tras Yahvé su Dios''.'
    reason: lexical_alternative
  - marker: b
    text: '''Escucharán su voz'' también puede llevar el sentido de ''obedecerán su voz'' o ''lo obedecerán''.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''se aferrarán a él''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: Seguirán a
  alternatives_spanish:
  - irán tras
  - caminarán tras
  lexicon: HALOT
  rationale: En español, 'seguir tras' comunica con naturalidad el hebraísmo de caminar en lealtad. 'Seguirán a' conserva la dirección relacional del original sin sonar mecánico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Según la terminología del proyecto, el Tetragrámaton se vierte como 'Yahvé' en el texto principal para preservar el nombre divino personal, no una sustitución titulada.
- source_word: תֵּלֵכוּ
  english_pob_choice: you shall walk
  chosen_spanish: Seguirán a
  alternatives_spanish:
  - caminarán
  - andarán
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es literalmente 'caminar', en español 'seguir a' expresa mejor el sentido covenantal de adhesión y evita una calca pesada junto con 'tras'.
- source_word: תִירָאוּ
  english_pob_choice: fear him
  chosen_spanish: le temerán
  alternatives_spanish:
  - le reverenciarán
  lexicon: HALOT
  rationale: '''Temer'' conserva el peso teológico del término y no atenúa la reverencia/awe que el hebreo incluye.'
- source_word: מִצְוֺתָיו
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus mandatos
  - sus órdenes
  lexicon: HALOT
  rationale: '''Mandamientos'' mantiene el registro formal y pactual de מִצְוָה mejor que opciones más generales.'
- source_word: תִּשְׁמֹרוּ
  english_pob_choice: keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - observarán
  - cumplirán
  lexicon: HALOT
  rationale: '''Guardar'' refleja היטב la idea de custodiar/observar un mandato y suena natural en español bíblico contemporáneo.'
- source_word: וּבְקֹלֹו תִשְׁמָעוּ
  english_pob_choice: listen to his voice
  chosen_spanish: escucharán su voz
  alternatives_spanish:
  - obedecerán su voz
  - escucharán a su voz
  lexicon: HALOT
  rationale: Se conserva la imagen literal de 'su voz'. 'Escucharán' evita sobreinterpretar el valor obediencial como única opción, aunque ese matiz permanece en contexto.
- source_word: תַעֲבֹדוּ
  english_pob_choice: serve him
  chosen_spanish: le servirán
  alternatives_spanish:
  - lo adorarán
  - lo honrarán en servicio
  lexicon: HALOT
  rationale: '''Servir'' mantiene la amplitud cultual y relacional del verbo עבד sin restringirlo a ''adorar''.'
- source_word: תִדְבָּקוּן
  english_pob_choice: cling to him
  chosen_spanish: se apegarán a él
  alternatives_spanish:
  - se adherirán a él
  - se unirán a él
  lexicon: HALOT
  rationale: '''Apegarse'' comunica la cercanía y lealtad intensa de דבק en un español natural y claro; ''se apegarán a él'' evita una expresión extraña para lectores amplios.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Nombre divino directamente. La convención del proyecto en español es 'Yahvé', que preserva el nombre del pacto sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of שׁמע בְּקוֹלֹו
  english_pob_reading: listen to his voice
  chosen_spanish_reading: escucharán su voz
  alternative_spanish_readings:
  - obedecerán su voz
  - le obedecerán
  rationale: La frase hebrea dice literalmente 'escuchar su voz'. Se mantiene esa forma para preservar la tensión entre oír y obedecer, dejando que el contexto aporte la implicación de obediencia.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La validación anterior falló porque el marcador [c] aparecía en la estructura de la respuesta anterior sin estar anclado en el texto. En esta versión se eliminó cualquier referencia a [c] y solo se dejaron notas [a] y [b], ambas presentes exactamente en el español principal.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se evitó 'SEÑOR' por respeto a la política de nombre divino.
  - '''Escucharán su voz'' conserva la ambigüedad oír/obedecer que el audit trail documenta.'
  - '''Se apegarán a él'' traduce דבק con un español natural y fiel a la idea de adhesión leal.'
