base_translation:
  language: en
  yaml_path: translation/ot/1_kings/021/026.yaml
  text: He acted very abominably by going after idols[a], according to all that the Amorites had done[b], whom Yahweh drove out before the sons of Israel.
  footnotes:
  - marker: a
    text: Hebrew גִּלֻּלִים is a strongly contemptuous term for idols; alternatively, 'detestable idols' or more literally 'dung-idols.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' for 'the sons of Israel.'
    reason: lexical_alternative
