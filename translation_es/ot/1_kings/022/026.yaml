translation:
  language: es
  text: 'Entonces el rey de Israel dijo[a]: «Toma a Micaías y devuélvelo a Amón, el gobernador de la ciudad, y a Joás, hijo del rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el comandante de la ciudad» o «el principal oficial de la ciudad». El título hebreo puede designar a un funcionario cívico o militar de alto rango.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la secuencia narrativa con fluidez natural en español sin perder el valor progresivo del hebreo.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - Israel, su rey
  lexicon: HALOT
  rationale: Se mantiene la cadena constructa de forma directa y natural en español. El texto hebreo identifica al hablante por título, no por nombre propio.
- source_word: קַח
  english_pob_choice: Take
  chosen_spanish: Tomen
  alternatives_spanish:
  - Toma
  - Agarren
  lexicon: HALOT
  rationale: El imperativo singular hebreo se dirige al grupo de servidores implícitos en el contexto. En español, el plural de mandato resulta más natural y transparente al receptor sin cambiar la fuerza imperativa.
- source_word: מִיכָיְהוּ
  english_pob_choice: Micaiah
  chosen_spanish: Micaías
  alternatives_spanish:
  - Micaía
  - Miqueas
  lexicon: Conventional Spanish biblical onomastics
  rationale: Se usa la forma española bíblica más reconocible y estable para el nombre propio.
- source_word: וַהֲשִׁיבֵהוּ
  english_pob_choice: return him
  chosen_spanish: devuélvanlo
  alternatives_spanish:
  - háganlo volver
  - tráiganlo de vuelta
  lexicon: HALOT
  rationale: 'El hiphil de שוב tiene valor causativo: hacer volver o devolver. «Devuélvanlo» comunica bien la acción de remitirlo de nuevo bajo custodia, con una naturalidad verbal adecuada al español.'
- source_word: אֶל אָמֹן
  english_pob_choice: to Amon
  chosen_spanish: a Amón
  alternatives_spanish:
  - ante Amón
  - junto a Amón
  lexicon: HALOT
  rationale: La preposición de dirección se expresa de manera directa con «a». Se conserva el nombre propio con acentuación española habitual.
- source_word: שַׂר הָעִיר
  english_pob_choice: the governor of the city
  chosen_spanish: el gobernador de la ciudad
  alternatives_spanish:
  - el comandante de la ciudad
  - el principal oficial de la ciudad
  lexicon: HALOT
  rationale: El término שַׂר puede abarcar oficial, jefe o comandante. Se adopta «gobernador» siguiendo el audit trail inglés por su claridad administrativa en español, sin forzar un sentido militar no explícito en el hebreo.
- source_word: וְאֶל יוֹאָשׁ
  english_pob_choice: and to Joash
  chosen_spanish: y a Joás
  alternatives_spanish:
  - y ante Joás
  - y junto a Joás
  lexicon: HALOT
  rationale: Se mantiene la coordinación con la segunda preposición de dirección y se conserva la forma española usual del nombre.
- source_word: בֶּן הַמֶּלֶךְ
  english_pob_choice: the king’s son
  chosen_spanish: hijo del rey
  alternatives_spanish:
  - el hijo del rey
  - el príncipe
  lexicon: HALOT
  rationale: La expresión constructa se vierte de forma idiomática y fiel. «Príncipe» sería interpretativo y añade un título no presente en el hebreo.
translation_notes:
  revision_awareness: Coincide con el testimonio textual base (WLC) y con el audit trail inglés de alta concordancia; no se registran revisiones aplicadas en el pasaje. La única decisión destacable es la elección española de «gobernador» para שַׂר הָעִיר, con nota alternativa para reflejar su amplitud semántica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando el texto lo requiera, pero este versículo no contiene el nombre divino.
  - 'Se conserva la onomástica bíblica en forma española estable: Micaías, Amón, Joás.'
  - Se usa el imperativo plural por adecuación sintáctica al destinatario implícito en español.
  - No se añade puntuación interpretativa que altere el encadenamiento narrativo del hebreo.
