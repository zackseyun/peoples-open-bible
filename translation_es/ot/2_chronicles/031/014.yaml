translation:
  language: es
  text: Y Core[a] hijo de Imna, el levita, el portero del oriente, estaba a cargo de las ofrendas voluntarias de Dios[b], para distribuir la contribución de Yahvé y las cosas santísimas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Core»; se conserva el nombre propio del hebreo sin añadir la conjunción.
    reason: lexical_alternative
  - marker: b
    text: O «las ofrendas libres de Dios»; la expresión hebrea indica ofrendas dadas voluntariamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקוֹרֵא
  english_pob_choice: Kore
  chosen_spanish: Core
  alternatives_spanish:
  - Y Core
  lexicon: HALOT
  rationale: Es nombre propio; en español se adapta a la forma tradicional transliterada Core. Se conserva la conjunción inicial con «Y» porque el hebreo abre la frase con וְ y el contexto narrativo la admite naturalmente.
- source_word: בֶן יִמְנָה
  english_pob_choice: son of Imnah
  chosen_spanish: hijo de Imna
  alternatives_spanish:
  - hijo de Imena
  lexicon: HALOT
  rationale: Se mantiene la relación filial de modo formal y claro. «Imna» sigue de cerca la forma hebrea y resulta legible en español.
- source_word: הַלֵּוִי
  english_pob_choice: the Levite
  chosen_spanish: el levita
  alternatives_spanish:
  - un levita
  lexicon: HALOT
  rationale: El artículo definido del hebreo identifica su pertenencia tribal específica; «el levita» preserva ese matiz mejor que «un levita».
- source_word: הַשּׁוֹעֵר
  english_pob_choice: the gatekeeper
  chosen_spanish: el portero
  alternatives_spanish:
  - el guardián de la puerta
  lexicon: HALOT
  rationale: En español eclesial, «portero» comunica el oficio de manera natural. «Guardián de la puerta» sería más descriptivo pero menos fluido. Se evita «doorkeeper» calco por poca naturalidad.
- source_word: לַמִּזְרָחָה
  english_pob_choice: on the east
  chosen_spanish: del oriente
  alternatives_spanish:
  - en el oriente
  - hacia el oriente
  lexicon: HALOT
  rationale: El hebreo indica ubicación hacia el lado oriental; «del oriente» funciona idiomáticamente con el oficio mencionado y conserva la referencia espacial sin añadir «puerta» que no está explícita.
- source_word: עַל
  english_pob_choice: was in charge of
  chosen_spanish: estaba a cargo de
  alternatives_spanish:
  - estaba sobre
  - tenía la supervisión de
  lexicon: HALOT
  rationale: La preposición expresa responsabilidad administrativa. «Estaba a cargo de» reproduce bien la relación de supervisión en español moderno sin perder el valor funcional.
- source_word: נִדְבוֹת הָאֱלֹהִים
  english_pob_choice: the freewill offerings of God
  chosen_spanish: las ofrendas voluntarias de Dios
  alternatives_spanish:
  - las ofrendas libres de Dios
  - las ofrendas de libre voluntad de Dios
  lexicon: HALOT
  rationale: «נדבות» comunica ofrendas dadas voluntariamente; «ofrendas voluntarias» es la equivalencia cultual más clara. Se conserva el genitivo «de Dios» siguiendo la lectura auditada.
- source_word: לָתֵת
  english_pob_choice: to distribute
  chosen_spanish: para distribuir
  alternatives_spanish:
  - para dar
  - para repartir
  lexicon: HALOT
  rationale: Aunque literalmente es «dar», el contexto administrativo exige la función de repartir lo dedicado. «Distribuir» explicita esa función sin exceder el sentido del pasaje.
- source_word: תְּרוּמַת יְהוָה
  english_pob_choice: the contribution of Yahweh
  chosen_spanish: la contribución de Yahvé
  alternatives_spanish:
  - la ofrenda de Yahvé
  - la porción consagrada a Yahvé
  lexicon: HALOT
  rationale: «תרומה» es una contribución/porción apartada. «Contribución» es fiel y transparente; se conserva «Yahvé» conforme al criterio del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la decisión doctrinal y editorial del proyecto: el Tetragrámaton se vierte como «Yahvé», preservando el nombre propio del pacto y evitando la sustitución por un título.'
- source_word: וְקָדְשֵׁי הַקֳּדָשִׁים
  english_pob_choice: and the most holy things
  chosen_spanish: y las cosas santísimas
  alternatives_spanish:
  - y las ofrendas santísimas
  - y las cosas más santas
  lexicon: HALOT
  rationale: La expresión hebrea denota elementos de santidad superlativa, no el lugar llamado «Santísimo». «Cosas santísimas» conserva la fuerza intensiva y evita confundirla con el Santo de los Santos.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton; el proyecto exige transliterarlo como nombre propio. «Yahvé» mantiene la referencia personal al Dios del pacto y no la oculta bajo una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de וְקָדְשֵׁי הַקֳּדָשִׁים
  english_pob_reading: the most holy things
  chosen_spanish_reading: las cosas santísimas
  alternative_spanish_readings:
  - las ofrendas santísimas
  - el Santo de los santos
  rationale: La frase hebrea caracteriza cosas de santidad máxima; en este contexto no designa un recinto arquitectónico. «Cosas santísimas» conserva la tensión lexical sin trasladarla indebidamente al espacio del santuario.
  doctrine_reference: HALOT / uso cultual del hebreo bíblico
translation_notes:
  revision_awareness: 'El texto inglés auditado fue revisado en un punto: se corrigió la relación constructa de תְּרוּמַת יְהוָה de «for the LORD» a «of the LORD». La versión española sigue esa lectura posesiva/constructa con «de Yahvé», manteniendo además la distinción entre las ofrendas voluntarias, la contribución dedicada y las cosas santísimas. También se preserva la decisión estable del proyecto de renderizar יְהוָה como «Yahvé».'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y publicable, evitando arcaísmos innecesarios.
  - «Portero» se usa como equivalente funcional de הַשּׁוֹעֵר en un contexto levítico-templo.
  - «Cosas santísimas» evita la confusión con el «Santísimo» como lugar.
  - La conjunción inicial «Y» refleja el וְ hebreo sin forzar el español, y es aceptable en un encabezado narrativo breve.
