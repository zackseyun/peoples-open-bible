revisions:
- from: Por tu salvación espero[a], Yahvé.
  to: Tu salvación espero[a], oh Yahvé.
  rationale: 'Se ajusta el orden para un español más natural y poético, se añade «oh» para reflejar la invocación directa entendida por la audit trail inglesa, y se corrige la tipografía de la nota. Se preservan las decisiones léxicas principales del proyecto: «salvación», «espero» y «Yahvé».'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:24:30Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien los tres elementos del hebreo: לישועתך = «tu salvación», קויתי = espera confiada, y יְהוָה = «Yahvé». Sin embargo, omite el vocativo explícito reflejado en el inglés POB («O Yahweh») y usa una construcción menos natural en español para la exclamación poética.'
  spanish_quality_summary: «Por tu salvación espero, Yahvé» es comprensible, pero suena algo rígido y menos idiomático que «Tu salvación espero, oh Yahvé». Además, falta el vocativo interjectivo «oh», que ayuda a representar la apelación directa del original tal como la audit trail inglesa la entiende. La nota al pie tiene una apertura tipográfica defectuosa («'O:»).
  glossary_alignment: 'Alineado en lo esencial: יְהוָה se traduce correctamente como «Yahvé» según la política del proyecto; ישועה como «salvación» preserva el valor amplio; קוה como «espero» es aceptable. La única corrección importante es reflejar mejor el valor apelativo con «oh Yahvé» y pulir la formulación española.'
  issues:
  - severity: medium
    issue: Falta el vocativo explícito en la dirección a Yahvé.
    rationale: Aunque el hebreo no tiene partícula vocativa separada, la audit trail inglesa adoptó «O Yahweh» para representar la invocación directa. En español bíblico legible, «oh Yahvé» preserva mejor esa fuerza que una simple aposición final con coma.
  - severity: medium
    issue: El orden «Por tu salvación espero» suena algo forzado en español.
    rationale: La preposición «por» no es imposible, pero en esta exclamación poética «Tu salvación espero» reproduce mejor el énfasis del hebreo y suena más digno y natural en español eclesial moderno.
  - severity: low
    issue: La nota al pie tiene una incorrección tipográfica inicial.
    rationale: Empieza con «'O:» en vez de «O:», lo que debe corregirse para claridad editorial.
  revised_spanish_text: Tu salvación espero[a], oh Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O: «he esperado». El verbo hebreo puede expresar espera continua o anterior; el sustantivo también puede entenderse como «liberación».'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el orden para un español más natural y poético, se añade «oh» para reflejar la invocación directa entendida por la audit trail inglesa, y se corrige la tipografía de la nota. Se preservan las decisiones léxicas principales del proyecto: «salvación», «espero» y «Yahvé».'
