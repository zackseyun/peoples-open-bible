translation:
  language: es
  text: De la hija de Sion se ha ido[a] todo su esplendor; sus príncipes[b] han llegado a ser como ciervos que no hallan pasto; fueron sin fuerza ante el perseguidor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "todo su esplendor ha salido de la hija de Sion" o "todo su esplendor se ha apartado de la hija de Sion".
    reason: lexical_alternative
  - marker: b
    text: O "sus oficiales" o "sus gobernantes".
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: has departed
  chosen_spanish: se ha ido
  alternatives_spanish:
  - ha salido
  - se ha alejado
  - ha partido
  lexicon: HALOT
  rationale: El hebreo expresa salida/partida desde Sion; en español, "se ha ido" comunica la pérdida y el alejamiento del esplendor sin volverlo demasiado literal o estático.
- source_word: מִן בַּת־צִיּוֹן
  english_pob_choice: From daughter Zion
  chosen_spanish: De la hija de Sion
  alternatives_spanish:
  - De la hija de Sión
  - Desde la hija de Sion
  lexicon: HALOT
  rationale: Conservo la personificación poética de Sion como hija, en una construcción natural en español. "De" refleja bien el origen/separación del verso.
- source_word: כָּל הֲדָרָהּ
  english_pob_choice: all her splendor
  chosen_spanish: todo su esplendor
  alternatives_spanish:
  - toda su majestad
  - toda su belleza
  - toda su gloria
  lexicon: HALOT
  rationale: '"Esplendor" recoge el valor de ador n/adornment/majesty sin cargar el término con un matiz demasiado técnico o doctrinal. El posesivo se mantiene por la referencia a la ciudad.'
- source_word: שָׂרֶיהָ
  english_pob_choice: her princes
  chosen_spanish: sus príncipes
  alternatives_spanish:
  - sus gobernantes
  - sus oficiales
  - sus jefes
  lexicon: HALOT
  rationale: '"Príncipes" conserva el paralelismo poético y el registro regio del texto, más fiel al tono lamentoso que opciones más generales.'
- source_word: כְּאַיָּלִים
  english_pob_choice: like deer
  chosen_spanish: como ciervos
  alternatives_spanish:
  - como venados
  - como venados machos
  - como ciervos machos
  lexicon: HALOT
  rationale: '"Ciervos" es un equivalente natural y sobrio en español para la comparación animal. Evita una especificación innecesaria y mantiene la imagen de fragilidad.'
- source_word: לֹא מָצְאוּ מִרְעֶה
  english_pob_choice: that find no pasture
  chosen_spanish: que no hallan pasto
  alternatives_spanish:
  - que no encuentran pasto
  - que no hallan pastura
  - sin hallar pasto
  lexicon: HALOT
  rationale: '"Pasto" reproduce de forma breve y clara la idea de forraje/pastura. Mantiene la imagen de escasez que subyace a la comparación con los ciervos.'
- source_word: וַיֵּלְכ֥וּ בְ/לֹא כֹ֖חַ
  english_pob_choice: they went without strength
  chosen_spanish: fueron sin fuerza
  alternatives_spanish:
  - anduvieron sin fuerza
  - se fueron sin fuerza
  - caminaron sin fuerzas
  lexicon: HALOT
  rationale: '"Fueron" conserva el verbo básico de movimiento de הלך; "sin fuerza" mantiene la debilidad física y anímica. Prefiero la forma simple para no añadir una dirección explícita que el hebreo no marca.'
- source_word: לִפְנֵי רוֹדֵף
  english_pob_choice: before the pursuer
  chosen_spanish: delante del perseguidor
  alternatives_spanish:
  - ante el perseguidor
  - frente al perseguidor
  - a causa del perseguidor
  lexicon: HALOT
  rationale: '"Delante de" refleja la presión de alguien que acosa/da caza. "Perseguidor" conserva el participio singular como figura representativa sin introducir pluralidad que el texto no dice.'
theological_decisions:
- issue: Personificación de Sion como hija
  english_pob_reading: daughter Zion
  chosen_spanish_reading: hija de Sion
  alternative_spanish_readings:
  - Hija de Sion
  - la hija de Sion
  rationale: Se preserva la imagen profética y luctuosa de la ciudad personificada. No se suaviza a un nombre propio ni se convierte en título eclesiástico.
  doctrine_reference: Poética profética / personificación de Jerusalén
- issue: Valor de הֲדָרָהּ
  english_pob_reading: all her splendor
  chosen_spanish_reading: todo su esplendor
  alternative_spanish_readings:
  - toda su majestad
  - toda su gloria
  rationale: Se evita leer el término como un tecnicismo litúrgico o teológico; aquí describe el lustre, dignidad y belleza cívica perdidos por Sion.
  doctrine_reference: Lamentación histórica-poética
- issue: Imagen de los príncipes como ciervos
  english_pob_reading: like deer that find no pasture
  chosen_spanish_reading: como ciervos que no hallan pasto
  alternative_spanish_readings:
  - como ciervos que no encuentran pasto
  - como venados que no hallan pastura
  rationale: La comparación subraya desamparo, desnutrición y huida. No se transforma en símbolo espiritual; se mantiene el cuadro concreto de la ruina nacional.
  doctrine_reference: Poética sapiencial y lamentación nacional
translation_notes:
  revision_awareness: Se siguió el audit trail en alta concordancia con el inglés POB; no hubo revisiones aplicadas adicionales en esta pasada, y se mantuvieron las decisiones léxicas y figurativas principales.
  spanish_consistency_notes:
  - Se usó "Sion" sin tilde en consonancia con el uso bíblico editorial más común en español, manteniendo consistencia interna.
  - Se prefirió "ciervos" para la imagen animal por naturalidad y registro bíblico sobrio.
  - Se mantuvo el singular "perseguidor" como equivalente del participio hebreo, sin convertirlo en plural ni en un concepto abstracto.
