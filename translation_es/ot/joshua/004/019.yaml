- from: Y el pueblo subió del Jordán el día diez del primer mes[a], y acamparon en Gilgal, en la frontera oriental de Jericó[b].
  to: Y el pueblo subió del Jordán el día diez del primer mes[a], y acampó en Gilgal, en el límite oriental de Jericó[b].
  rationale: Se corrigió la gramática y la naturalidad del español, manteniendo el sentido fuente. Se ajustó la primera nota para que realmente exprese una alternativa léxica. Se cambió «frontera oriental» por «límite oriental» para un matiz geográfico más idiomático en español.
