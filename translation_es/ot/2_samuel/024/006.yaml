translation:
  language: es
  text: Llegaron a Galaad, y a la tierra de Tahtim-Hodshi[a]; llegaron a Dan-jaan[b], y siguieron alrededor hasta Sidón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo Tahtim-Hodshi es oscuro; algunas versiones lo enmiendan o lo interpretan como «la tierra de los hititas en Cades» u otra propuesta semejante, pero el topónimo subyacente es incierto.
    reason: alternative_reading
  - marker: b
    text: Dan-jaan probablemente es un nombre de lugar; su identificación exacta es incierta.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - fueron llegando
  lexicon: HALOT
  rationale: En un relato de itinerario, el wayyiqtol de בוא puede expresarse naturalmente en español como movimiento con llegada. «Llegaron» conserva la secuencia narrativa y la idea de arribo sin sonar mecánico.
- source_word: הַגִּלְעָדָה
  english_pob_choice: to Gilead
  chosen_spanish: a Galaad
  alternatives_spanish:
  - hacia Galaad
  - a la región de Galaad
  lexicon: HALOT
  rationale: La he direccional se refleja de forma natural con «a» en español. Se conserva el nombre geográfico tradicionalmente reconocible en español como «Galaad».
- source_word: אֶרֶץ
  english_pob_choice: the land of
  chosen_spanish: la tierra de
  alternatives_spanish:
  - el territorio de
  - la región de
  lexicon: HALOT
  rationale: Aquí אֶרֶץ indica una zona geográfica. «La tierra de» sigue de cerca el valor del sustantivo sin forzar una interpretación más técnica como «territorio».
- source_word: תַּחְתִּים חָדְשִׁי
  english_pob_choice: Tahtim-hodshi
  chosen_spanish: Tahtim-Hodsi
  alternatives_spanish:
  - Tahtim-Hodshi
  - Tahtim-Hadsi
  - la tierra de los hititas en Cades
  lexicon: HALOT
  rationale: El hebreo es oscuro y probablemente conserva un topónimo compuesto incierto. Se mantiene la transliteración en el texto principal para no introducir una identificación conjetural; la forma española adapta la grafía al sistema usual de transliteración, conservando la opacidad del original.
- source_word: דָּנָה יַּעַן
  english_pob_choice: Dan-jaan
  chosen_spanish: Dan-jaan
  alternatives_spanish:
  - Dan-yaán
  - a Dan-jaan
  lexicon: HALOT
  rationale: La POB inglesa lo trata como nombre de lugar incierto. Se conserva la transliteración, ya que en español también sería injustificado resolver el topónimo con una identificación no demostrada.
- source_word: וְסָבִיב
  english_pob_choice: and around
  chosen_spanish: y alrededor
  alternatives_spanish:
  - y en derredor
  - y alrededor de
  lexicon: HALOT
  rationale: סָבִיב expresa movimiento circular o rodeo. «Y alrededor» reproduce la concisión del hebreo y su sentido de recorrido en torno a una zona.
- source_word: אֶל צִידוֹן
  english_pob_choice: to Sidon
  chosen_spanish: hacia Sidón
  alternatives_spanish:
  - a Sidón
  - hasta Sidón
  lexicon: HALOT
  rationale: El destino se expresa de manera natural con «hacia» en un contexto de trayecto que continúa. «Sidón» es la forma estándar en español.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente sin cambios sustanciales: mantiene la transliteración de los topónimos oscuros, conserva el paralelismo de los dos verbos de movimiento y refleja la secuencia itineraria del hebreo con una equivalencia natural en español.'
  spanish_consistency_notes:
  - Se usa «Galaad» como forma española habitual del topónimo.
  - Se preserva la transliteración de los nombres oscuros para no ocultar la incertidumbre textual.
  - «Hacia Sidón» mantiene el matiz direccional del cierre del versículo sin añadir información no presente en el hebreo.
