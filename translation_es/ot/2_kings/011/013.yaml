  to: Cuando Atalía oyó el ruido de los guardias y del pueblo[a][b], fue hacia el pueblo en la casa de Yahvé[c].
  rationale: 'Se ajusta únicamente la expresión verbal principal de movimiento: ''vino al pueblo'' se cambia a ''fue hacia el pueblo'' para lograr un español más natural y fiel al sentido de aproximación de אֶל sin perder la sobriedad del original. Se conservan las notas y la terminología clave del proyecto.'
