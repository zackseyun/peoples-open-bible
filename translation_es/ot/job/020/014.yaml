translation:
  language: es
  text: Su comida en su vientre se vuelve[a] veneno; es veneno de cobras dentro de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su pan en sus entrañas es cambiado; es la hiel de áspides dentro de él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַחְמוֹ
  english_pob_choice: his food
  chosen_spanish: su pan
  alternatives_spanish:
  - su comida
  - su alimento
  lexicon: HALOT
  rationale: La imagen hebrea parte de לֶחֶם, literalmente 'pan', pero el contexto es lo que el hombre ha consumido. En español, 'pan' conserva mejor la concreción de la metáfora y permite la alusión tradicional que el propio aparato inglés preserva como alternativa.
- source_word: בְּמֵעָיו
  english_pob_choice: in his belly
  chosen_spanish: en sus entrañas
  alternatives_spanish:
  - en su vientre
  - en sus interioridades
  lexicon: HALOT
  rationale: El término apunta a los órganos internos, con fuerza corporal e idiomática. 'En sus entrañas' comunica esa interioridad visceral en español y mantiene el registro bíblico sin volverlo arcaico en exceso.
- source_word: נֶהְפָּךְ
  english_pob_choice: is turned
  chosen_spanish: se vuelve
  alternatives_spanish:
  - es transformado
  - se convierte
  lexicon: HALOT
  rationale: El nifal de הפך expresa un cambio de estado. 'Se vuelve' reproduce bien esa mutación interna sin exagerar el matiz ni desplazar la metáfora alimentaria.
- source_word: מְרוֹרַת
  english_pob_choice: the venom of
  chosen_spanish: veneno de
  alternatives_spanish:
  - hiel de
  - amargura de
  lexicon: HALOT
  rationale: Aunque la raíz está ligada a 'amargura/hiel', en esta combinación con פְּתָנִים el sentido apunta a sustancia tóxica. 'Veneno de' expresa mejor la imagen en español moderno y preserva la tensión lexical con la alternativa tradicional 'hiel'.
- source_word: פְּתָנִים
  english_pob_choice: cobras
  chosen_spanish: serpientes
  alternatives_spanish:
  - áspides
  - víboras
  - cobras
  lexicon: HALOT
  rationale: El hebreo designa serpientes venenosas, pero en español 'cobra' puede sonar demasiado específico o regional. 'Serpientes' mantiene el género correcto y la carga venenosa del contexto; se conservan alternativas más específicas en el aparato.
- source_word: בְּקִרְבּוֹ
  english_pob_choice: within him
  chosen_spanish: dentro de él
  alternatives_spanish:
  - en su interior
  - en su seno
  lexicon: HALOT
  rationale: La frase indica interioridad espacial. 'Dentro de él' es claro y natural en español, y evita perder la referencia corporal del verso.
translation_notes:
  revision_awareness: El inglés POB optó por 'food', 'belly', 'turned', 'venom of cobras' y 'within him', con nota alternativa tradicional 'bread/inward parts/gall of asps'. La presente versión sigue la misma lectura de fondo, pero en español conserva de modo más transparente la imagen corporal y el binomio pan/veneno, evitando un calco demasiado anglicado.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como terminología por defecto del proyecto, pero este versículo no contiene el nombre divino.
  - '''Entrañas'' se eligió por su valor bíblico-corpóreo; no se usó ''vientre'' porque en español puede sonar menos preciso para el registro poético.'
  - La nota al pie preserva la alternativa tradicional 'hiel de áspides' porque el inglés POB documenta explícitamente esa opción léxica.
