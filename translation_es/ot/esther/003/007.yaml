translation:
  language: es
  text: En el primer mes[a], es decir, el mes de Nisán, en el año duodécimo del rey Asuero, se echó Pur, esto es, la suerte, delante de Amán, de día en día y de mes en mes, hasta el mes duodécimo, es decir, el mes de Adar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «de día en día y de mes en mes, doce, es decir, el mes de Adar». El sentido es que el echar suertes se extendió a través del calendario hasta el mes duodécimo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: In the first month
  chosen_spanish: En el mes primero
  alternatives_spanish:
  - En el primer mes
  - Durante el mes primero
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula calendárica temporal; en español, «en el mes primero» conserva el orden y el valor de localización temporal sin sonar excesivamente rígida.
- source_word: הוּא חֹדֶשׁ נִיסָן
  english_pob_choice: that is, the month of Nisan
  chosen_spanish: es decir, el mes de Nisán
  alternatives_spanish:
  - esto es, el mes de Nisán
  - o sea, Nisán
  lexicon: HALOT
  rationale: El pronombre hebreo introduce una glosa explicativa; «es decir» refleja bien esa apposición, y «Nisán» reproduce el nombre propio del mes.
- source_word: בִּשְׁנַת שְׁתֵּים עֶשְׂרֵה
  english_pob_choice: in the twelfth year
  chosen_spanish: en el año duodécimo
  alternatives_spanish:
  - en el año doce
  - durante el año duodécimo
  lexicon: HALOT
  rationale: 'La fórmula de datación regnal en español suena natural con ordinal: «año duodécimo». Conserva el dato cronológico sin añadir matices.'
- source_word: לַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: of King Ahasuerus
  chosen_spanish: del rey Asuero
  alternatives_spanish:
  - del rey Jerjes
  - del rey Ahasuero
  lexicon: HALOT
  rationale: Se mantiene el nombre tradicional usado en español bíblico para Ahasuerus, «Asuero», por ser claro y reconocible en la recepción hispana.
- source_word: הִפִּיל פּוּר
  english_pob_choice: Pur ... was cast
  chosen_spanish: se echó Pur
  alternatives_spanish:
  - se echó la suerte llamada Pur
  - se lanzó Pur
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático para el echar suertes; «se echó» conserva la pasiva impersonal y el acto ritual sin introducir un sujeto no expresado.
- source_word: פּוּר
  english_pob_choice: Pur
  chosen_spanish: Pur
  alternatives_spanish:
  - pur
  lexicon: HALOT
  rationale: Se conserva el préstamo persa como nombre propio/terminológico, en línea con el texto fuente y la glosa inmediata que lo explica.
- source_word: הוּא הַגּוֹרָל
  english_pob_choice: that is, the lot
  chosen_spanish: esto es, la suerte
  alternatives_spanish:
  - es decir, el sorteo
  - o sea, la suerte
  lexicon: HALOT
  rationale: «גּוֹרָל» se vierte aquí como «suerte», la equivalencia más directa y natural en español para el acto de echar suertes.
- source_word: לִפְנֵי הָמָן
  english_pob_choice: before Haman
  chosen_spanish: delante de Amán
  alternatives_spanish:
  - ante Amán
  - en presencia de Amán
  lexicon: HALOT
  rationale: «Delante de» reproduce bien la idea espacial/ceremonial de «לפני». Se usa «Amán» como forma habitual en español bíblico.
- source_word: מִיּוֹם לְיוֹם
  english_pob_choice: from day to day
  chosen_spanish: de día en día
  alternatives_spanish:
  - día tras día
  - de un día a otro
  lexicon: HALOT
  rationale: La repetición temporal hebrea se preserva con una fórmula idiomática española equivalente, sin perder la secuencia prolongada.
- source_word: וּמֵחֹדֶשׁ לְחֹדֶשׁ
  english_pob_choice: and from month to month
  chosen_spanish: y de mes en mes
  alternatives_spanish:
  - y mes tras mes
  - y de un mes a otro
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la frase anterior y el valor distributivo de la preposición repetida.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: the twelfth month
  chosen_spanish: hasta el mes duodécimo
  alternatives_spanish:
  - hasta el duodécimo mes
  - hasta el mes doce
  lexicon: HALOT
  rationale: El hebreo expresa el punto final de la secuencia; en español, «hasta el mes duodécimo» transmite la culminación cronológica con claridad.
- source_word: הוּא חֹדֶשׁ אֲדָר
  english_pob_choice: that is, the month of Adar
  chosen_spanish: es decir, el mes de Adar
  alternatives_spanish:
  - esto es, Adar
  - o sea, Adar
  lexicon: HALOT
  rationale: Como antes en el versículo, la partícula explicativa se traduce con una glosa clara, y «Adar» se conserva como nombre propio del mes.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios respecto del estado anterior; el pasaje permanece en alto acuerdo con la fuente y la evaluación de revisión final. No se requirieron ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé»/«Mesías» como política general del proyecto, aunque no aparecen en este versículo.
  - Se conserva la distinción entre el nombre extranjero Pur y su glosa explicativa «la suerte» mediante una estructura bilingüe breve.
  - Se usa «Asuero» y «Amán», formas asentadas en español bíblico, por ser las más reconocibles y consistentes con la tradición de recepción en este relato.
