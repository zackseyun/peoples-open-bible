translation:
  language: es
  text: El temor de Yahvé[a] es instrucción en sabiduría, y la humildad precede al honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «la disciplina de la sabiduría». El término hebreo también puede llevar la idea de corrección disciplinaria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאַת יְהוָה
  english_pob_choice: the fear of Yahweh / the LORD
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - el miedo de Yahvé
  - la reverencia por Yahvé
  lexicon: HALOT
  rationale: En el contexto sapiencial, יִרְאָה conserva el sentido pleno de temor reverente y sobrecogido, no solo 'reverencia'. Se mantiene Yahvé, conforme al criterio del proyecto para el nombre divino.
- source_word: מוּסַר
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - corrección
  lexicon: HALOT
  rationale: El sustantivo abarca instrucción formativa y también disciplina correctiva. 'Instrucción' funciona bien como predicado nominal en español y deja abierto el matiz disciplinario documentado por la nota inglesa.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: HALOT
  rationale: Es la equivalencia natural y estable en Proverbios; no hay razón contextual para variar el término.
- source_word: וְלִפְנֵי
  english_pob_choice: and before
  chosen_spanish: y precede a
  alternatives_spanish:
  - y antes de
  - y delante de
  lexicon: HALOT
  rationale: La expresión marca prioridad lógica o temporal. En español, 'precede a' expresa con claridad la relación del segundo miembro del proverbio sin perder el orden del hebreo.
- source_word: כָבוֹד
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - gloria
  - estima
  lexicon: HALOT
  rationale: En este contexto sapiencial se trata de elevación social o reconocimiento; 'honor' es la opción más idiomática y fiel.
- source_word: עֲנָוָה
  english_pob_choice: humility comes
  chosen_spanish: la humildad
  alternatives_spanish:
  - la mansedumbre
  - la bajeza
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo sin verbo expreso en la segunda cola. En español, 'la humildad precede al honor' reproduce con naturalidad la relación sentenciosa sin añadir contenido no justificado.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh / the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton; el estándar del proyecto exige transliterarlo como 'Yahvé' en el cuerpo principal, preservando el nombre propio del pacto en lugar de ocultarlo tras una convención de sustitución.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de מוּסַר en un proverbio sapiencial
  english_pob_reading: instruction / discipline
  chosen_spanish_reading: instrucción
  alternative_spanish_readings:
  - disciplina
  - corrección
  rationale: La nota inglesa reconoce la tensión semántica entre instrucción y disciplina correctiva. En español, 'instrucción' es la opción base, mientras que la nota permite conservar el matiz disciplinario sin forzarlo en la línea principal.
  doctrine_reference: POB lexical policy for wisdom literature
translation_notes:
  revision_awareness: El paquete de referencia muestra alta concordancia y ningún cambio aplicado en la revisión más reciente; la formulación española sigue la decisión auditada de mantener el sentido sapiencial de מוּסַר con una nota que preserve el matiz alternativo.
  spanish_consistency_notes:
  - Se preserva Yahvé como forma principal del nombre divino, en coherencia con la terminología del proyecto.
  - Se evita 'Cristo' u otra terminología no pertinente; el versículo pertenece a literatura sapiencial y no requiere cristología.
  - La segunda cola se vierte como una relación proverbial de precedencia ('la humildad precede al honor') para respetar el hebreo sin añadir un verbo ajeno al contenido.
