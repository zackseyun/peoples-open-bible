translation:
  language: es
  text: Los caldeos[b] quemaron la casa del rey[a] y las casas del pueblo con fuego, y derribaron los muros de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "el palacio" para "la casa del rey".
    reason: lexical_alternative
  - marker: b
    text: '"Caldeos" se refiere a las fuerzas babilonias.'
    reason: cultural_note
lexical_decisions:
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king’s house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio
  - la casa real
  lexicon: HALOT
  rationale: El hebreo dice literalmente "casa del rey"; en español, "la casa del rey" conserva la imagen directa sin forzar el sentido a "palacio". "Palacio" es posible como equivalencia contextual, pero suaviza la expresión original.
- source_word: בֵּית הָעָם
  english_pob_choice: the houses of the people
  chosen_spanish: las casas del pueblo
  alternatives_spanish:
  - las casas de la gente
  - las casas del común
  lexicon: HALOT
  rationale: 'El plural español expresa con naturalidad el sentido distributivo del constructo hebreo: las viviendas pertenecientes al pueblo. "Las casas de la gente" es más coloquial; "las casas del común" introduce un matiz social no explícito.'
- source_word: שָׂרְפוּ
  english_pob_choice: burned
  chosen_spanish: quemaron
  alternatives_spanish:
  - incendiaron
  - prendieron fuego a
  lexicon: HALOT
  rationale: '"Quemaron" es la traducción directa y natural del verbo. "Incendiaron" enfatiza el acto devastador, pero puede sonar más técnico; "prendieron fuego a" es más explicativo que el hebreo.'
- source_word: הַכַּשְׂדִּים
  english_pob_choice: The Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se conserva el etnónimo del hebreo, como en la traducción inglesa POB. "Los babilonios" aclara la referencia histórica, pero deja de reflejar el término textual.
- source_word: בָּאֵשׁ
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - por fuego
  - en el fuego
  lexicon: HALOT
  rationale: '"Con fuego" reproduce de forma natural el valor instrumental del hebreo. "Por fuego" suena menos idiomático aquí; "en el fuego" podría sugerir ubicación más que medio.'
- source_word: חֹמ֥וֹת יְרוּשָׁלִַ֖ם
  english_pob_choice: the walls of Jerusalem
  chosen_spanish: los muros de Jerusalén
  alternatives_spanish:
  - las murallas de Jerusalén
  - los muros de la ciudad de Jerusalén
  lexicon: HALOT
  rationale: '"Muros" sigue de cerca el sustantivo hebreo y es plenamente comprensible. "Murallas" es igualmente válido, pero añade una preferencia estilística moderna; "muros de la ciudad de Jerusalén" explicita sin necesidad el contexto.'
- source_word: נָתָצוּ
  english_pob_choice: they tore down
  chosen_spanish: derribaron
  alternatives_spanish:
  - destruyeron
  - demolieron
  lexicon: HALOT
  rationale: El verbo hebreo expresa el derribo de estructuras; "derribaron" conserva esa fuerza concreta. "Destruyeron" es más general y puede perder la imagen arquitectónica; "demolieron" es correcto, pero más técnico.
theological_decisions:
- issue: Identificación de los caldeos
  english_pob_reading: '''Chaldeans'' refers to the Babylonian forces.'
  chosen_spanish_reading: Se conserva "los caldeos" en el texto principal, con la referencia histórica implícita.
  alternative_spanish_readings:
  - '"los babilonios" en el texto principal'
  - nota explicativa histórica
  rationale: 'La decisión sigue el criterio del POB inglés: mantener el término fuente y no sustituirlo por un equivalente interpretativo en el cuerpo del texto. En español, esto preserva la conexión con el hebreo sin negar la identificación histórica con Babilonia.'
  doctrine_reference: Histórico-lexical, no doctrinal
- issue: Posible sentido de בֵּית הַמֶּלֶךְ
  english_pob_reading: '''the king’s house'' with footnoted alternative ''the palace'''
  chosen_spanish_reading: '"la casa del rey" en el texto principal, con nota que admite "el palacio"'
  alternative_spanish_readings:
  - '"el palacio" en el texto principal'
  - '"la casa real"'
  rationale: Se mantiene la expresión más literal, porque el hebreo permite tanto la referencia a una residencia real como a un palacio. La nota preserva la alternativa documentada sin borrar la ambigüedad léxica.
  doctrine_reference: Ninguna; decisión léxica contextual
translation_notes:
  revision_awareness: El texto inglés final y su auditoría muestran acuerdo alto y sin revisiones aplicadas; por eso la versión española sigue de cerca las decisiones léxicas ya asentadas, sin introducir expansiones interpretativas nuevas.
  spanish_consistency_notes:
  - Usé "caldeos" para mantener la correspondencia con el hebreo y con la decisión inglesa documentada.
  - Opté por "casas del pueblo" y no "casas de la gente" para un registro bíblico claro y natural.
  - 'Conservé la estructura narrativa simple del hebreo: sujeto implícito, verbo principal, complemento de medio, y segundo verbo coordinado.'
  - Preferí "muros" en lugar de "murallas" para seguir más de cerca la terminología del original, aunque ambas son posibles en español.
