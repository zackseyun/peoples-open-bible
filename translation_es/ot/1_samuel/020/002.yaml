translation:
  language: es
  text: 'Y le dijo: «¡De ninguna manera! No morirás. Mira, mi padre no hace nada, grande o pequeño, sin revelármelo[a]. ¿Por qué, entonces, mi padre me ocultaría este asunto? No es así».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «no descubre mi oído», modismo que significa «no me lo revela».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלִילָה
  english_pob_choice: Far from it!
  chosen_spanish: ¡De ninguna manera!
  alternatives_spanish:
  - ¡Lejos de eso!
  - ¡No faltaba más!
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula fuerte de rechazo o repudio. En español, «¡De ninguna manera!» transmite bien esa negativa enfática sin introducir una referencia explícita a Dios que el hebreo aquí no expresa de forma directa.
- source_word: לֹא תָמוּת
  english_pob_choice: You will not die
  chosen_spanish: No morirás
  alternatives_spanish:
  - No vas a morir
  - No has de morir
  lexicon: HALOT
  rationale: Es una seguridad directa en segunda persona. «No morirás» conserva la fuerza profética y suena natural en español bíblico contemporáneo.
- source_word: הִנֵּה
  english_pob_choice: Look,
  chosen_spanish: Mira,
  alternatives_spanish:
  - Mira bien,
  - Observa,
  lexicon: HALOT
  rationale: La partícula llama la atención sobre la explicación que sigue. «Mira» mantiene la función discursiva con naturalidad en español.
- source_word: דָּבָר גָּדוֹל א֚וֹ דָּבָר קָטֹן
  english_pob_choice: nothing, great or small
  chosen_spanish: nada, grande o pequeño
  alternatives_spanish:
  - alguna cosa, grande o pequeña
  - ningún asunto, grande o pequeño
  lexicon: HALOT
  rationale: 'El hebreo usa un merismo para expresar totalidad: nada queda fuera. En español, «nada, grande o pequeño» conserva el alcance total y la repetición enfática del original.'
- source_word: וְלֹא יִגְלֶה אֶת אָזְנִי
  english_pob_choice: without revealing it to me
  chosen_spanish: sin revelármelo
  alternatives_spanish:
  - y no me lo revela
  - sin descubrirme el oído
  lexicon: HALOT
  rationale: Se traduce el sentido idiomático de «descubrir el oído» como «revelar»; la forma pronominal «revelármelo» mantiene el referente implícito al asunto comunicado.
- source_word: יַסְתִּיר
  english_pob_choice: hide
  chosen_spanish: ocultaría
  alternatives_spanish:
  - escondería
  - cubriría
  lexicon: HALOT
  rationale: En la pregunta retórica, «ocultaría» es la manera natural de expresar el hebreo en español. Conserva el contraste con «revelar» del hemistiquio anterior.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this matter
  chosen_spanish: este asunto
  alternatives_spanish:
  - esta cosa
  - esta palabra
  lexicon: HALOT
  rationale: Aquí דָּבָר se refiere al plan o asunto en discusión, no solo a una palabra dicha. «Asunto» es el término español más preciso y claro.
- source_word: אָבִי
  english_pob_choice: my father
  chosen_spanish: mi padre
  alternatives_spanish:
  - mi papá
  lexicon: HALOT
  rationale: Se conserva la relación filial repetida en el hebreo para dar énfasis y claridad. «Mi padre» es más solemne y adecuado al registro del pasaje.
- source_word: אֵין זֹאת
  english_pob_choice: It is not so
  chosen_spanish: No es así
  alternatives_spanish:
  - No es cierto
  - No puede ser
  lexicon: HALOT
  rationale: La frase final es una negación conclusiva. «No es así» reproduce su brevedad y fuerza sin añadir matices ajenos.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la lectura auditada del POB en inglés y mantiene sus decisiones clave: rechazo enfático en חָלִילָה, sentido idiomático de «descubrir el oído», merismo totalizante en «grande o pequeño», y cierre de negación breve. No se detectaron revisiones aplicadas en el expediente inglés; por eso no se incorporan variantes textuales ni notas de corrección.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «mi padre» de forma repetida para conservar la reiteración retórica del hebreo.
  - «Asunto» se emplea para דָּבָר en sentido de plan/tema, no como «palabra».
  - El registro es bíblico contemporáneo, no arcaizante, y evita calcos como «descubrir el oído» en el texto principal.
