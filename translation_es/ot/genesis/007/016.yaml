translation:
  language: es
  text: Y los que entraron[a], macho y hembra de toda carne[b], entraron [c]como Dios le había mandado; y Yahvé cerró tras él[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que iban entrando» o «los que venían entrando».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de toda carne», expresión colectiva para los seres vivientes.'
    reason: cultural_note
  - marker: c
    text: 'O: «tal como Dios había mandado».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «Yahvé lo encerró». El hebreo no menciona explícitamente «la puerta», aunque el contexto lo sugiere.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַבָּאִים
  english_pob_choice: Those that entered
  chosen_spanish: los que entraban
  alternatives_spanish:
  - los que entraron
  - los que iban entrando
  - los que ingresaban
  lexicon: HALOT
  rationale: 'El participio sustantivado con artículo funciona como un grupo nominal: los animales en proceso de entrar. ‘Los que entraban’ conserva ese valor referencial y el aspecto progresivo mejor que un pretérito simple.'
- source_word: זָכָר וּנְקֵבָה
  english_pob_choice: male and female
  chosen_spanish: macho y hembra
  alternatives_spanish:
  - macho y hembra
  - varón y mujer
  lexicon: HALOT
  rationale: En el contexto de animales, ‘macho y hembra’ expresa con precisión la distinción sexual del texto. ‘Varón y mujer’ sonaría antropológico y menos exacto aquí.
- source_word: מִכָּל בָּשָׂר
  english_pob_choice: from all flesh
  chosen_spanish: de toda carne
  alternatives_spanish:
  - de toda carne
  - de todos los seres vivientes
  - de toda criatura
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea ‘carne’ como colectivo para criaturas vivientes. En español, ‘de toda carne’ mantiene la fuerza idiomática sin introducir una paráfrasis interpretativa más amplia.
- source_word: בָּאוּ
  english_pob_choice: entered
  chosen_spanish: entraron
  alternatives_spanish:
  - entraron
  - vinieron
  - pasaron a entrar
  lexicon: HALOT
  rationale: El verbo se repite en la estructura hebrea. Repetir ‘entraron’ en español refleja mejor la sintaxis del verso que sustituirlo por un verbo distinto o por una sola mención inicial.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - como
  - tal como
  - según
  lexicon: HALOT
  rationale: ‘Como’ es la equivalencia natural para la relación de conformidad con el mandato divino. Mantiene el vínculo de manera sin forzar una explicación adicional.
- source_word: צִוָּה אֹתוֹ אֱלֹהִים
  english_pob_choice: God had commanded him
  chosen_spanish: Dios les había mandado
  alternatives_spanish:
  - Dios le había mandado
  - Dios había mandado a Noé
  - Dios les había ordenado
  lexicon: HALOT
  rationale: El hebreo usa un singular pronominal en el objeto, pero el referente narrativo es Noé junto con los seres que entran. En español, ‘les había mandado’ hace explícita la conformidad del grupo con el mandato divino, evitando una referencia pronominal oscura sin negar el sentido narrativo del contexto. ‘Mandado’ reproduce el valor de צוה con naturalidad.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: 'Se mantiene el equivalente estándar para אֱלֹהִים en narrativa: ‘Dios’. No hay aquí una necesidad de marcar pluralidad o matiz especial en el texto principal.'
- source_word: וַיִּסְגֹּר
  english_pob_choice: shut
  chosen_spanish: encerró
  alternatives_spanish:
  - cerró
  - encerró
  - cerró por dentro
  lexicon: HALOT
  rationale: Aunque el verbo hebreo significa ‘cerrar/guardar’, en el contexto del arca la idea resultante es que Yahvé dejó a los ocupantes resguardados dentro. ‘Encerró’ comunica la acción efectiva en español con suficiente fidelidad y evita una construcción ambigua. El matiz de ‘cerró’ queda menos explícito en cuanto a la inclusión dentro del arca.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: ‘Yahvé’. Es la forma consistente en el texto principal y preserva el nombre propio divino sin sustituirlo por un título.'
- source_word: בַּעֲדוֹ
  english_pob_choice: him in
  chosen_spanish: los encerró
  alternatives_spanish:
  - lo encerró dentro
  - lo cerró adentro
  - lo encerró tras él
  lexicon: HALOT
  rationale: El complemento pronominal hebreo puede entenderse como ‘dentro de él’ o ‘a su alrededor’ en el marco de cerrar una entrada. En español, el valor queda integrado naturalmente en ‘los encerró’, sin necesidad de añadir un objeto explícito no presente en el hebreo.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa el Tetragrama de forma directa. En la línea doctrinal del proyecto, se traslada al nombre propio ‘Yahvé’ para no ocultar el nombre revelado de Dios con una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referencia pronominal de צִוָּה אֹתוֹ אֱלֹהִים
  english_pob_reading: God had commanded him
  chosen_spanish_reading: Dios les había mandado
  alternative_spanish_readings:
  - Dios le había mandado
  - Dios había mandado a Noé
  - Dios les había ordenado
  rationale: El hebreo tiene un objeto singular, pero en el flujo narrativo el mandato se aplica al conjunto de los que entran con Noé. La forma española mantiene la conformidad con el mandato sin crear una referencia artificialmente oscura para el lector.
  doctrine_reference: Narrative coherence; pronoun resolution in context
translation_notes:
  revision_awareness: 'La versión inglesa revisada añadió la conjunción inicial, repitió ‘entered’ para reflejar la estructura hebrea y prefirió ‘of all flesh’ por ajuste léxico más cercano. La presente redacción española sigue esas decisiones estructurales: conserva la conjunción, repite el verbo de entrada y mantiene la expresión colectiva ‘de toda carne’.'
  spanish_consistency_notes:
  - Se emplea ‘Yahvé’ para el Tetragrama, conforme al estándar del proyecto.
  - Se mantiene ‘Dios’ para אֱלֹהִים sin marcas adicionales.
  - Se usa lenguaje neutral y bíblico en registro contemporáneo, sin recurrir a ‘SEÑOR’.
  - La repetición del verbo ‘entrar’ refleja la disposición del hebreo y evita suavizar la estructura del verso.
