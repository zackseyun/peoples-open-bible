translation:
  language: es
  text: 'Y al volverse el Señor, miró a Pedro[a], y Pedro se acordó de la palabra del Señor, de cómo le había dicho: «Antes de que un gallo cante hoy, me negarás tres veces».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «miró atentamente a Pedro»; el verbo griego puede sugerir una mirada fija o directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: στραφεὶς
  english_pob_choice: turned
  chosen_spanish: al volverse
  alternatives_spanish:
  - cuando se volvió
  - y se volvió
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción previa del Señor antes de mirar a Pedro. «Al volverse» conserva esa secuencia de manera natural en español sin perder el valor participial.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: 'DOCTRINE.md Contested terms: κύριος → Lord'
  rationale: La referencia es a Jesús y la decisión doctrinal del POB para κύριος es «Lord». En español, «el Señor» preserva el título cristológico de forma idiomática y readable, sin reducirlo a «Maestro».
- source_word: ἐνέβλεψεν
  english_pob_choice: looked at
  chosen_spanish: miró fijamente
  alternatives_spanish:
  - miró
  - lo observó
  lexicon: BDAG
  rationale: El verbo puede implicar una mirada directa e intensa. «Miró fijamente» expresa esa fuerza mejor que un simple «miró», y corresponde al matiz auditado en la nota inglesa.
- source_word: ὑπεμνήσθη
  english_pob_choice: remembered
  chosen_spanish: se acordó
  alternatives_spanish:
  - recordó
  - fue recordado
  lexicon: BDAG
  rationale: Aunque la forma puede sugerir un matiz pasivo/medio de «ser traído a la memoria», el punto narrativo es que Pedro recordó. «Se acordó» es idiomático y fiel al resultado.
- source_word: λόγου
  english_pob_choice: word
  chosen_spanish: de la palabra
  alternatives_spanish:
  - del dicho
  - del mensaje
  lexicon: BDAG
  rationale: Aquí λόγος se refiere a la declaración concreta de Jesús. «La palabra» mantiene la correspondencia con el audit trail inglés y funciona bien en la expresión «la palabra del Señor».
- source_word: ὡς
  english_pob_choice: how
  chosen_spanish: de lo que le había dicho
  alternatives_spanish:
  - como le había dicho
  - cómo le había dicho
  lexicon: BDAG
  rationale: En este contexto ὡς introduce el contenido de lo que Pedro recordó. En español, «de lo que le había dicho» evita una construcción artificial y conserva el sentido de la frase explicativa.
- source_word: Πρὶν ἀλέκτορα φωνῆσαι
  english_pob_choice: Before a rooster crows
  chosen_spanish: Antes que un gallo cante
  alternatives_spanish:
  - Antes de que un gallo cante
  - Antes que cante un gallo
  lexicon: BDAG
  rationale: El griego usa un sustantivo indefinido sin artículo, y la traducción auditada en inglés escogió «a rooster». En español, «un gallo» preserva esa indefinición y «cante» expresa naturalmente φωνῆσαι en este contexto.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: BDAG
  rationale: σήμερον significa de modo directo «hoy». Se conserva la inmediatez de la predicción.
- source_word: ἀπαρνήσῃ
  english_pob_choice: you will deny
  chosen_spanish: me negarás
  alternatives_spanish:
  - me repudiarás
  - me rechazarás
  lexicon: BDAG
  rationale: El futuro de ἀπαρνέομαι en este contexto pasional se traduce con el verbo usual «negar». «Me negarás» es claro, preciso y mantiene la repetición sinóptica.
- source_word: τρίς
  english_pob_choice: three times
  chosen_spanish: tres veces
  alternatives_spanish:
  - tres ocasiones
  - tríes
  lexicon: BDAG
  rationale: «Tres veces» es la forma natural y exacta en español; evita el arcaísmo «tríes» y conserva la repetición enfática.
theological_decisions:
- issue: Título cristológico κύριος aplicado a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  rationale: Se mantiene el valor cristológico de κύριος sin sustituirlo por un término que rebaje su peso teológico. «El Señor» es la forma española más fiel y recibible para esta designación de Jesús.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Intensidad de la mirada de Jesús
  english_pob_reading: looked at; looked intently at Peter
  chosen_spanish_reading: miró fijamente a Pedro
  alternative_spanish_readings:
  - miró a Pedro
  - lo miró atentamente
  rationale: La nota inglesa preserva la posibilidad de una mirada fija o intensa. «Miró fijamente» deja visible esa tensión lexical sin convertirla en una afirmación más fuerte que el griego justifica.
  doctrine_reference: BDAG ἐμβλέπω
- issue: Relación entre el recuerdo de Pedro y la palabra previa de Jesús
  english_pob_reading: Peter remembered the word of the Lord
  chosen_spanish_reading: Pedro se acordó de la palabra del Señor
  alternative_spanish_readings:
  - Pedro recordó la palabra del Señor
  - a Pedro le vino a la memoria la palabra del Señor
  rationale: La pasiva/middle griega permite un matiz de ser traído a la memoria, pero la narración destaca el acto de recordar de Pedro. «Se acordó» conserva ese resultado sin forzar una pasiva artificial en español.
  doctrine_reference: BDAG ὑπομιμνῄσκω
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios necesarios respecto del pasaje inglés de referencia; la versión española sigue la misma solución de equivalencia óptima y conserva la nota de la mirada intensa en forma adaptada al español.'
  spanish_consistency_notes:
  - Se usa «el Señor» para κύριος en coherencia con el tratamiento cristológico del proyecto.
  - Se evita el calco mecánico del participio inicial mediante «al volverse», que mantiene el orden narrativo.
  - «Un gallo» reproduce la indefinición del griego y la decisión auditada en inglés.
  - Se mantiene «tres veces» como forma natural y precisa en español.
  - La nota al pie conserva la alternativa de intensidad verbal sin duplicar marcadores.
