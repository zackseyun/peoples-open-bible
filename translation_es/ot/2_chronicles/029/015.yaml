revisions:
- from: Ellos reunieron a sus hermanos[a], se consagraron, y entraron, conforme al mandamiento del rey, por las palabras de Yahvé[b][c], para limpiar la casa de Yahvé.
  to: Ellos reunieron a sus hermanos[a], se consagraron y vinieron, conforme al mandamiento del rey, por las palabras de Yahvé[b], para purificar la casa de Yahvé[c].
  rationale: Se corrige «entraron» a «vinieron» para no añadir una idea no explícita en וַיָּבֹאוּ; se cambia «limpiar» por «purificar» para reflejar mejor לְטַהֵר en contexto cultual; y se reubica la nota sobre «la casa de Yahvé» al sintagma correspondiente. También se suaviza la puntuación para un español más natural.
