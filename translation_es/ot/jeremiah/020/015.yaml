translation:
  language: es
  text: '¡Maldito sea el hombre que trajo a mi padre la noticia, diciendo: «Te ha nacido un hijo[a]», alegrándolo mucho[b]!'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «un hijo, un varón».'
    reason: lexical_alternative
  - marker: b
    text: 'La expresión hebrea repite la raíz de «alegrar» para intensificar el sentido: «alegrándolo mucho» o «llenándolo de gran alegría».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed be
  chosen_spanish: ¡Maldito el hombre!
  alternatives_spanish:
  - ¡Maldito sea el hombre!
  - ¡Cursado sea el hombre!
  lexicon: HALOT
  rationale: El hebreo es un adjetivo en sentido imprecativo. En español, 'maldito' expresa con naturalidad la maldición oracular; se mantiene la fuerza de denuncia sin volverlo mecánico.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - ese hombre
  - aquel hombre
  lexicon: HALOT
  rationale: Es un singular definido y específico, referido al mensajero mencionado en la cláusula. 'El hombre' es directo y fiel.
- source_word: בִּשַּׂר
  english_pob_choice: brought ... the news
  chosen_spanish: trajo ... la noticia
  alternatives_spanish:
  - anunció
  - trajo el mensaje
  lexicon: HALOT
  rationale: El verbo puede significar llevar noticias; en español 'trajo la noticia' conserva el sentido de comunicar un hecho sin añadir una tonalidad técnica innecesaria.
- source_word: אֶת אָבִי
  english_pob_choice: my father
  chosen_spanish: a mi padre
  alternatives_spanish:
  - a mi padre de parte de
  - a mi padre
  lexicon: HALOT
  rationale: La construcción señala el objeto directo con el destinatario afectado por la noticia; 'a mi padre' reproduce el dato relacional con claridad.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  - y le dijo
  lexicon: HALOT
  rationale: Funciona como introducción de cita; 'diciendo' es literal y natural en español.
- source_word: יֻלַּד לְךָ
  english_pob_choice: has been born to you
  chosen_spanish: Te ha nacido
  alternatives_spanish:
  - te nació
  - ha nacido para ti
  lexicon: HALOT
  rationale: 'El pasivo hebreo con dativo se expresa bien en español con una construcción intransitiva/medial: ''te ha nacido''. Preserva la noticia de un nacimiento ya ocurrido con relevancia presente.'
- source_word: בֵּן זָכָר
  english_pob_choice: a son
  chosen_spanish: un hijo varón
  alternatives_spanish:
  - un hijo, un varón
  - un niño varón
  lexicon: HALOT
  rationale: El hebreo acumula 'hijo' + 'varón' para énfasis. En español, 'hijo varón' transmite esa doblez de forma clara; se evita reducirlo solo a 'un hijo'.
- source_word: שַׂמֵּחַ שִׂמֳּחָהוּ
  english_pob_choice: making him very glad
  chosen_spanish: alegrándolo mucho
  alternatives_spanish:
  - llenándolo de alegría
  - haciéndolo muy feliz
  lexicon: HALOT
  rationale: La infinitiva absoluta con verbo cognado intensifica la alegría. 'Alegrándolo mucho' comunica bien la intensificación sin sonar pesado; el objeto implícito es el padre.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando las notas [a] y [b] directamente en el texto español y manteniendo una traducción natural que conserva la intensificación hebrea.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - Se evita 'SEÑOR' porque no corresponde al contenido de esta línea.
  - Se conserva el tono de maldición imprecativa del hebreo con una forma española idiomática.
  - La duplicación verbal de alegría se refleja con una nota léxica para no perder la intensidad del original.
