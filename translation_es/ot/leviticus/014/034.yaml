translation:
  language: es
  text: Cuando entren en la tierra de Canaán que yo les estoy dando como posesión[a], y yo ponga una plaga de lepra[b] en una casa en la tierra de su posesión,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo אֲחֻזָּה designa una tenencia o propiedad de tierra; aquí se traduce 'posesión' para mantener la conexión con la tenencia territorial del pasaje.
    reason: lexical_explanation
  - marker: b
    text: O 'lepra'. El término hebreo abarca más ampliamente ciertas afecciones o brotes contaminantes, no solo la lepra en el sentido médico moderno.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  - Porque
  lexicon: HALOT
  rationale: En un contexto legal y prospectivo, el valor temporal de כִּי se expresa naturalmente en español con 'Cuando'. Mantiene el marco de disposición futura sin convertir la frase en causal ni condicional.
- source_word: תָבֹאוּ
  english_pob_choice: you enter
  chosen_spanish: entren
  alternatives_spanish:
  - vengan
  - entren ustedes
  lexicon: HALOT
  rationale: El verbo de movimiento a la tierra se traduce con 'entren', que es natural en español para ingreso a un territorio y preserva el valor plural de la segunda persona.
- source_word: אֶל אֶרֶץ כְּנַעַן
  english_pob_choice: the land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - la tierra de Canaán
  - la tierra cananea
  lexicon: HALOT
  rationale: '''Tierra de Canaán'' reproduce el referente territorial con claridad y sin añadir matices ajenos.'
- source_word: אֲשֶׁר אֲנִי נֹתֵן לָכֶם
  english_pob_choice: that I am giving you
  chosen_spanish: que yo les estoy dando
  alternatives_spanish:
  - que yo les doy
  - que yo les doy en este momento
  lexicon: HALOT
  rationale: El participio נֹתֵן sugiere acción en curso o inminente; 'les estoy dando' conserva ese aspecto mejor que un presente simple y mantiene la iniciativa divina explícita.
- source_word: לַאֲחֻזָּה
  english_pob_choice: as a possession
  chosen_spanish: como posesión
  alternatives_spanish:
  - como propiedad
  - como heredad
  lexicon: HALOT
  rationale: '''Posesión'' es una equivalencia sobria para אֲחֻזָּה y conserva el sentido de tenencia de tierra sin forzar la categoría de ''heredad''.'
- source_word: וְנָתַתִּי
  english_pob_choice: and I put
  chosen_spanish: y ponga
  alternatives_spanish:
  - y pondré
  - y yo pondré
  - y colocaré
  lexicon: HALOT
  rationale: En español, mantener una forma de primera persona con subjuntivo futuro dependiente de 'cuando' comunica bien la acción divina anunciada. 'Ponga' evita la rigidez de 'dar' y conserva la causalidad divina del hebreo.
- source_word: נֶגַע
  english_pob_choice: a plague
  chosen_spanish: una plaga
  alternatives_spanish:
  - un mal
  - una aflicción
  - un golpe
  lexicon: HALOT
  rationale: '''Plaga'' corresponde al alcance de נֶגַע en este pasaje y refleja un daño o afectación visible sin limitarlo a una categoría médica moderna.'
- source_word: צָרַעַת
  english_pob_choice: leprosy
  chosen_spanish: lepra
  alternatives_spanish:
  - enfermedad de la piel
  - afección cutánea
  - lepra ritual
  lexicon: HALOT
  rationale: Aunque el término bíblico abarca más que la lepra moderna, el texto base auditado optó por 'leprosy'. En español, 'lepra' conserva esa tradición y el registro formal, mientras la nota puede advertir la amplitud del término hebreo.
- source_word: בְּבֵית
  english_pob_choice: in a house
  chosen_spanish: en una casa
  alternatives_spanish:
  - dentro de una casa
  - sobre una casa
  lexicon: HALOT
  rationale: '''En una casa'' es la equivalencia más natural y directa para el contexto de infestación/aflicción doméstica.'
- source_word: אֶרֶץ אֲחֻזַּתְכֶם
  english_pob_choice: the land of your possession
  chosen_spanish: la tierra de su posesión
  alternatives_spanish:
  - la tierra que poseen
  - la tierra de su heredad
  lexicon: HALOT
  rationale: Se conserva la repetición léxica de posesión para mantener el vínculo con לַאֲחֻזָּה. 'Su' evita una repetición incómoda de 'de ustedes' y funciona bien en español bíblico neutro.
theological_decisions:
- issue: Agencia divina en la aflicción de la casa
  english_pob_reading: 'Retain explicit first-person divine action: ''and I put a plague of leprosy in a house...'''
  chosen_spanish_reading: y ponga una plaga de lepra en una casa...
  alternative_spanish_readings:
  - y aparezca una plaga de lepra en una casa...
  - y haya una plaga de lepra en una casa...
  rationale: El hebreo atribuye explícitamente la ocurrencia a Dios (וְנָתַתִּי). La redacción española conserva esa tensión teológica sin impersonalizar el evento ni suavizar la agencia divina.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla'
- issue: Alcance de צָרַעַת
  english_pob_reading: The Hebrew term refers more broadly to a range of diseased conditions or contaminating outbreaks, not only what is called leprosy in modern usage.
  chosen_spanish_reading: lepra
  alternative_spanish_readings:
  - enfermedad de la piel
  - afección cutánea
  - contaminación de la casa
  rationale: El texto principal sigue la decisión formal del POB en inglés para mantener la correspondencia visible con la tradición textual, mientras que la amplitud semántica del hebreo queda resguardada en la nota. Así se evita borrar la tensión entre el término tradicional y su alcance real.
  doctrine_reference: Principio POB de transparencia lexical y nota de alternativa semántica
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del audit trail inglés, que ajustó la frase a un registro más formal con 'a plague of leprosy' y preservó la agencia divina explícita. La versión española sigue esa decisión de registro, pero explica en nota la amplitud de צָרַעַת para no ocultar la tensión léxica documentada.
  spanish_consistency_notes:
  - Se mantiene 'posesión' para אֲחֻזָּה de manera consistente con el campo semántico de tenencia territorial.
  - Se usa 'lepra' en el texto principal por continuidad con el audit trail inglés, pero la nota aclara que el hebreo es más amplio.
  - Se conserva la referencia territorial 'tierra de Canaán' sin expansiones interpretativas.
  - Se mantiene el tono legal/prospectivo con 'Cuando' y el futuro subordinado apropiado en español.
