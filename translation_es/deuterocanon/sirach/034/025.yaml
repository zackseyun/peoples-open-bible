  source_alignment_summary: El borrador capta correctamente el contraste entre dos personas, una que ora y otra que maldice, y preserva bien «voz» y la distinción léxica de ὁ δεσπότης como «el Maestro». También conserva adecuadamente la nota sobre εἰσακούσεται y sobre δεσπότης. Sin embargo, la formulación interrogativa «¿de cuál voz escuchará...?» no refleja un español natural ni fiel al sentido idiomático del griego; el contraste pedido por τίνος/which voice se expresa mejor como «¿cuál voz escuchará...?» o «¿a cuál voz escuchará...?».
  spanish_quality_summary: 'El texto actual suena forzado en dos puntos: «Uno ... y uno ...» es comprensible pero poco idiomático, y «de cuál voz» resulta antinatural en español. Una reparación menor mejora mucho la legibilidad sin perder paralelismo ni precisión. «Uno está orando y otro está maldiciendo; ¿a cuál voz escuchará el Maestro?» mantiene el sentido, suena natural y conserva el tono digno.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «el Maestro» distingue δεσπότης de κύριος, y no hay conflicto con otros términos clave. «Orando» y «maldiciendo» son adecuados. La única excepción necesaria es pasar de «uno ... y uno ...» a «uno ... y otro ...» por naturalidad española, sin alterar el contraste del griego.'
  issues:
  - severity: medium
    issue: «¿de cuál voz escuchará el Maestro?» es español antinatural
    rationale: Aunque intenta reflejar el cambio inglés a «which voice», en español «de cuál voz» no es una construcción natural. El griego se puede representar con «¿cuál voz...?» o mejor «¿a cuál voz...?» sin pérdida semántica.
  - severity: low
    issue: «Uno ... y uno ...» suena rígido en español
    rationale: La repetición literal preserva el paralelismo, pero en español bíblico fluido «uno ... y otro ...» comunica el mismo contraste con mejor legibilidad.
