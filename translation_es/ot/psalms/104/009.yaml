  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones 'límite', 'pusiste', 'no pasarán', 'no volverán', 'cubrir', 'la tierra' concuerdan con la evidencia fuente y con el rastro léxico del POB. La excepción es solo documental en la nota [a], no terminológica en el texto principal.
