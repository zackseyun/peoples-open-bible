revisions:
- from: porque desde mi juventud me crió[a] como a un padre, y desde el seno de mi madre yo la guiaba.
  to: porque desde mi juventud él creció conmigo como con un padre[a], y desde el seno de mi madre la guié[b].
  rationale: Se corrige la primera cola para seguir la revisión inglesa auditada y preservar la tensión del hebreo sin resolverla indebidamente. Se reemplaza «como a un padre» por «como con un padre» para expresar mejor la comparación. Se añade la nota contextual sobre el referente femenino y se ajusta «la guiaba» a «la guié» para una representación más neutral y fiel.
