  text: ἄρα οὖν ὡς καιρὸν ⸀ἔχομεν, ἐργαζώμεθα τὸ ἀγαθὸν πρὸς πάντας, μάλιστα δὲ πρὸς τοὺς οἰκείους τῆς πίστεως.
base_translation:
  language: en
  yaml_path: translation/nt/galatians/006/010.yaml
  text: So then[a], as we have opportunity, let us do what is good toward everyone[c][b], and especially toward those who are of the household of faith.
  footnotes:
  - marker: a
    text: 'Or ''while we have time.'' The Greek καιρός emphasizes an opportune or fitting time, not merely time in general.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''the family of faith'' or ''members of the household of faith.'' The Greek uses household language for those who belong to the believing community.'
    reason: lexical_alternative
  - marker: c
    text: '''Faith'' could also be understood as ''the faith'' in the sense of the shared Christian confession.'
    reason: alternative_reading
