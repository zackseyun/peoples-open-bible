  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ley», «amante del dinero», «sin interés» y «deuda» están bien encaminados. La principal mejora es estilística/idiomática en βιάζεται τὸν ἑαυτοῦ τρόπον y técnica en la ubicación de las notas.
