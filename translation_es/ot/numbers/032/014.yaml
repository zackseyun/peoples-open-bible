translation:
  language: es
  text: Y he aquí, ustedes se han levantado en lugar de sus padres, una prole[a] de hombres pecadores, para añadir todavía más al ardor de la ira[b] de Yahvé contra Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una descendencia de hombres pecadores» o «un aumento de hombres pecadores». El hebreo תַּרְבּוּת puede denotar aumento o progenie; se escogió «prole» para conservar el tono de reprensión del contexto.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre el ardor de la nariz de Yahvé», un modismo hebreo para una ira intensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y miren
  - Ahora bien, he aquí
  lexicon: HALOT
  rationale: Conserva la fuerza deíctica e interjectiva del hebreo, y mantiene el tono exhortativo y de advertencia que el POB marcó con 'And behold'.
- source_word: קַמְתֶּם
  english_pob_choice: you have risen up
  chosen_spanish: se han levantado
  alternatives_spanish:
  - han surgido
  - se han alzado
  lexicon: HALOT
  rationale: En este contexto no es simple acción física; expresa que han aparecido en la posición/continuidad de la generación anterior. 'Se han levantado' conserva esa imagen y el matiz acusatorio.
- source_word: תַּחַת אֲבֹתֵיכֶם
  english_pob_choice: in your fathers’ place
  chosen_spanish: en lugar de sus padres
  alternatives_spanish:
  - en vez de sus padres
  - bajo sus padres
  lexicon: HALOT
  rationale: תחת indica sustitución o sucesión. 'En lugar de' es la equivalencia natural en español y preserva el contraste generacional.
- source_word: תַּרְבּוּת
  english_pob_choice: a brood
  chosen_spanish: una prole
  alternatives_spanish:
  - un aumento
  - una descendencia
  - una multiplicación
  lexicon: HALOT
  rationale: El término puede expresar aumento, descendencia o progenie. 'Una prole' comunica la idea de origen/generación y permite mantener el tono de reprensión sin volver el texto mecánico.
- source_word: אֲנָשִׁים חַטָּאִים
  english_pob_choice: of sinful men
  chosen_spanish: de hombres pecadores
  alternatives_spanish:
  - de personas pecadoras
  - de pecadores
  lexicon: HALOT
  rationale: El hebreo es masculino plural explícito. Se conserva 'hombres' para respetar la forma del original, y 'pecadores' mantiene el cariz moral directo del sustantivo/adjetivo.
- source_word: לִסְפּוֹת
  english_pob_choice: to add
  chosen_spanish: para añadir
  alternatives_spanish:
  - para aumentar
  - para sumar
  lexicon: HALOT
  rationale: En esta construcción el sentido es incrementar lo que ya existe. 'Añadir' es breve y natural en español, y sigue de cerca la decisión auditada del POB.
- source_word: עוֹד
  english_pob_choice: still more
  chosen_spanish: todavía más
  alternatives_spanish:
  - aún más
  - más todavía
  lexicon: HALOT
  rationale: Refuerza la idea de intensificación y continuidad del agravio, con una colocación natural junto a 'añadir'.
- source_word: עַל חֲרֹן אַף
  english_pob_choice: to the burning anger
  chosen_spanish: al ardor de la ira
  alternatives_spanish:
  - al fuego de la ira
  - al furor encendido
  lexicon: HALOT
  rationale: Preserva la metáfora de calor/ardor del hebreo sin forzar una calca extraña. 'Ira' comunica el sentido idiomático y 'ardor' mantiene el color literal de חֲרֹן אַף.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton, usando 'Yahvé' como forma española principal, en lugar de sustituir por 'SEÑOR'.
- source_word: אֶל יִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - hacia Israel
  - sobre Israel
  lexicon: HALOT
  rationale: Con lenguaje de ira, la preposición marca dirección hostil. 'Contra Israel' expresa mejor esa orientación que una traducción literal no idiomática.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al marco del proyecto, se traduce con el nombre divino en español 'Yahvé' para no ocultar el nombre pactal de Dios mediante una sustitución titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lenguaje de género en אֲנָשִׁים חַטָּאִים
  english_pob_reading: sinful men
  chosen_spanish_reading: hombres pecadores
  alternative_spanish_readings:
  - personas pecadoras
  - pecadores
  rationale: El plural masculino del hebreo se conserva, porque aquí forma parte del reproche dirigido a los varones responsables. No se neutraliza el género sin una razón textual.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'La revisión más reciente no indicó cambios, y el cotejo final mostró alto acuerdo. Se conservó la línea principal del POB, ajustando el español a la terminología del proyecto: YHWH → Yahvé, con equivalencias naturales para la imagen de sucesión («en lugar de») y la metáfora de ira («ardor de la ira»).'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma española principal para יְהוָה, según el estándar del proyecto.
  - Se preservó la fuerza de acusación del hebreo con «se han levantado» y «hombres pecadores».
  - «Ardor de la ira» conserva la imagen idiomática de חֲרוֹן אַף sin reducirla a una mera abstracción.
  - La puntuación y el registro buscan ser publicables y eclesialmente legibles en español neutro de América Latina.
