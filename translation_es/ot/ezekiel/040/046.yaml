translation:
  language: es
  text: Y la cámara cuya frente mira hacia el norte es para los sacerdotes que tienen a su cargo el altar. Ellos son los hijos de Sadoc[a], los que de entre los hijos de Leví se acercan a Yahvé para ministrarle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que se acercan de entre los hijos de Leví a Yahvé para servirle».'
    reason: alternative_reading
lexical_decisions:
- source_word: לִּשְׁכָּה
  english_pob_choice: chamber
  chosen_spanish: cámara
  alternatives_spanish:
  - cuarto
  - recinto
  lexicon: HALOT
  rationale: En el contexto de la visión del templo, לִשְׁכָּה designa un espacio arquitectónico funcional dentro del complejo. 'Cámara' conserva el valor técnico y formal mejor que 'cuarto', que suena demasiado general, y más que 'recinto', que sería menos preciso aquí.
- source_word: פָּנֶיהָ דֶּרֶךְ הַצָּפוֹן
  english_pob_choice: whose front faces north
  chosen_spanish: cuya frente mira hacia el norte
  alternatives_spanish:
  - cuyo frente da al norte
  - que mira al norte
  lexicon: HALOT
  rationale: פָּנִים aplicado a una construcción expresa su orientación o parte frontal. 'Cuya frente mira hacia el norte' conserva la imagen arquitectónica y resulta natural en español.
- source_word: לַכֹּהֲנִים
  english_pob_choice: is for the priests
  chosen_spanish: es para los sacerdotes
  alternatives_spanish:
  - pertenece a los sacerdotes
  - está destinada a los sacerdotes
  lexicon: HALOT
  rationale: El lamed indica asignación o destino. 'Es para los sacerdotes' comunica esa función de manera clara y fluida en español. Se usa 'sacerdotes' como equivalente idiomático de כֹּהֲנִים en este contexto cultual.
- source_word: שֹׁמְרֵי מִשְׁמֶרֶת הַמִּזְבֵּחַ
  english_pob_choice: who keep charge of the altar
  chosen_spanish: que guardan el encargo del altar
  alternatives_spanish:
  - que tienen a su cargo el altar
  - que custodian la responsabilidad del altar
  - que guardan la responsabilidad del altar
  lexicon: HALOT
  rationale: El idioma hebreo expresa una obligación o encargo cultual; 'encargo' permite conservar esa idea de responsabilidad asignada sin reducirla solo a vigilancia física. 'Guardar' mantiene la fuerza de שׁמר. Se evita 'custodiar' por sonar más interpretativo y 'cargo' puede ser demasiado administrativo en español.
- source_word: בְנֵי צָדוֹק
  english_pob_choice: the sons of Zadok
  chosen_spanish: los hijos de Zadoc
  alternatives_spanish:
  - los descendientes de Zadoc
  - la casa de Zadoc
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica literal. 'Hijos de Zadoc' reproduce mejor la forma del original que 'descendientes', y 'Zadoc' sigue la transliteración usual en español bíblico para este nombre.
- source_word: הַקְּרֵבִים
  english_pob_choice: who ... come near
  chosen_spanish: los que se acercan
  alternatives_spanish:
  - los que se aproximan
  - los que se allegan
  lexicon: HALOT
  rationale: En contextos sacerdotales, קרב denota acercarse para servicio sagrado. 'Los que se acercan' conserva esa cercanía cultual con naturalidad en español. Se evita una versión más técnica que sonaría menos idiomática.
- source_word: מִבְּנֵי לֵוִי
  english_pob_choice: from among the sons of Levi
  chosen_spanish: de entre los hijos de Leví
  alternatives_spanish:
  - de entre los levitas
  - de los hijos de Leví
  lexicon: HALOT
  rationale: '''De entre'' preserva el matiz partitivo de מִן, indicando selección dentro de un grupo mayor. Se mantiene la forma genealógica ''hijos de Leví'' para ser fiel al hebreo y transparente.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrama: ''Yahvé''. Esto preserva el nombre divino en lugar de sustituirlo por un título, conforme a la política terminológica indicada.'
- source_word: לְשָׁרְתוֹ
  english_pob_choice: to minister to him
  chosen_spanish: para ministrarle
  alternatives_spanish:
  - para servirle
  - para prestarle servicio
  lexicon: HALOT
  rationale: שׁרת en contexto sacerdotal se refiere al servicio litúrgico. 'Ministrarle' conserva ese matiz reverencial y cultual; 'servirle' sería más general y menos específico del lenguaje del templo.
theological_decisions:
- issue: Distinción sacerdotal dentro de la tribu de Leví
  english_pob_reading: The verse identifies a subset of Levites, the sons of Zadok, as those who approach Yahweh for altar service.
  chosen_spanish_reading: 'El versículo identifica a un grupo particular dentro de los hijos de Leví: los hijos de Zadoc, que se acercan a Yahvé para el servicio del altar.'
  alternative_spanish_readings:
  - Una referencia general a todos los levitas sin distinción
  - Una formulación que diluya la elección específica de los hijos de Zadoc
  rationale: El hebreo restringe explícitamente el referente. La traducción mantiene esa distinción sin añadir explicaciones teológicas externas al pasaje.
  doctrine_reference: Priesthood and cultic office in Ezekiel 40
- issue: Nombre divino en contexto de acceso sacerdotal
  english_pob_reading: to Yahweh to minister to him
  chosen_spanish_reading: a Yahvé para ministrarle
  alternative_spanish_readings:
  - al SEÑOR para servirle
  - a Yahvé para servirle
  rationale: Se conserva el nombre propio divino y el verbo de ministerio cultual para reflejar el lenguaje sacerdotal del texto, evitando sustituir el Tetragrama por un título.
  doctrine_reference: Tetragrammaton rendering policy
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura auditada en inglés, especialmente en la distinción entre la cámara, su orientación, la función sacerdotal y la identificación de los hijos de Zadoc. No se detectaron revisiones posteriores que exigieran cambios adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme a la terminología del proyecto.
  - Se traduce כֹּהֲנִים como 'sacerdotes' y שָׁרַת con el verbo reverencial 'ministrar', para preservar el matiz cultual.
  - '''Hijos de Leví'' conserva la forma genealógica del hebreo y el matiz partitivo de ''de entre''.'
  - La nota al pie ofrece la alternativa léxica principal preservada en el audit trail inglés, ajustada al español natural.
