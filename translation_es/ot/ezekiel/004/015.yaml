translation:
  language: es
  text: 'Entonces me dijo[a]: «Mira, te he dado boñiga de vaca en lugar de excremento humano, y prepararás tu pan sobre ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «excremento humano» / «boñiga humana». El hebreo usa literalmente un término para estiércol o excremento y dice «el אָדָם», aquí con sentido genérico de seres humanos, en contraste con el ganado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: Then he said to me
  chosen_spanish: Entonces me dijo
  alternatives_spanish:
  - Y me dijo
  - Luego me dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva esa secuencia con fluidez natural en español. «Me dijo» mantiene la referencia al interlocutor implícita del contexto.
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Mira, pues
  lexicon: HALOT
  rationale: Es un imperativo de atención. «Mira» es natural y directo en español contemporáneo, sin perder el valor exhortativo de la forma hebrea.
- source_word: נָתַתִּי לְךָ
  english_pob_choice: I have given you
  chosen_spanish: te he dado
  alternatives_spanish:
  - te doy
  - te he permitido
  lexicon: HALOT
  rationale: El perfecto expresa una concesión ya establecida en el acto divino. «Te he dado» reproduce bien la idea de provisión o asignación.
- source_word: צפועי הַבָּקָר
  english_pob_choice: cow dung
  chosen_spanish: boñiga de vaca
  alternatives_spanish:
  - estiércol de vaca
  - excremento de vaca
  lexicon: HALOT
  rationale: El término alude a excremento bovino usado como combustible. «Boñiga de vaca» es concreto y corresponde al registro directo de la POB inglesa; «estiércol» puede sonar más técnico o eufemístico.
- source_word: תַּחַת
  english_pob_choice: instead of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en sustitución de
  lexicon: HALOT
  rationale: Aquí la preposición marca sustitución, no ubicación. «En lugar de» transmite con claridad el intercambio concedido.
- source_word: גֶּלְלֵי הָאָדָם
  english_pob_choice: human dung
  chosen_spanish: boñiga humana
  alternatives_spanish:
  - boñiga de humano
  - estiércol humano
  - excremento humano
  lexicon: HALOT
  rationale: La POB inglesa opta por una equivalencia directa y luego aclara la ambigüedad de הָאָדָם como humanidad en general. En español, «boñiga humana» mantiene la correspondencia léxica con «boñiga de vaca» y preserva la crudeza del contraste.
- source_word: וְעָשִׂיתָ אֶת לַחְמְךָ
  english_pob_choice: and you shall prepare your bread
  chosen_spanish: y prepararás tu pan
  alternatives_spanish:
  - y harás tu pan
  - y cocerás tu pan
  - y hornearás tu pan
  lexicon: HALOT
  rationale: עשה es amplio; en este contexto culinario «prepararás» conserva la generalidad sin especificar más de lo que el hebreo exige. «Pan» sigue la referencia del texto sin ampliar el sentido.
- source_word: עֲלֵיהֶם
  english_pob_choice: over it
  chosen_spanish: sobre ella
  alternatives_spanish:
  - sobre eso
  - encima de ello
  - sobre ellas
  lexicon: HALOT
  rationale: El sufijo plural se refiere gramaticalmente a los trozos de boñiga, pero en español el antecedente natural inmediato es el sustantivo colectivo «boñiga», que es femenino singular. «Sobre ella» evita una construcción torpe y mantiene el uso como combustible.
theological_decisions:
- issue: Renderización de הָאָדָם como término genérico
  english_pob_reading: human dung
  chosen_spanish_reading: boñiga humana
  alternative_spanish_readings:
  - boñiga de hombre
  - boñiga de la gente
  - excremento humano
  rationale: El contexto contrasta claramente con el ganado, y אָדָם funciona aquí de manera genérica. «Boñiga humana» conserva la tensión léxica y no introduce una restricción de sexo que el hebreo no pide.
  doctrine_reference: 'DOCTRINE.md: אָדָם = ''man / humankind (context)''; Translation philosophy §4'
translation_notes:
  revision_awareness: El texto sigue de cerca la revisión final del inglés POB, que sustituyó «human excrement» por «human dung» para mantener mayor correspondencia léxica con «cow dung». En español se preservó esa cercanía mediante «boñiga humana», con una nota alternativa para explicitar opciones más literales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando el nombre divino aparezca; en este versículo no está explícito.
  - Se ha evitado «SEÑOR» por ser un caso directo de discurso narrativo sin ocultamiento del nombre divino.
  - «Boñiga» se usa de forma consistente para conservar la crudeza concreta del hebreo y de la POB inglesa.
  - El pronombre femenino singular en «sobre ella» responde al español idiomático con antecedente colectivo, sin pretender alterar el plural hebreo subyacente.
