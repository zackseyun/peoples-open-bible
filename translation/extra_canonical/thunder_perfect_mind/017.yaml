translation:
  text: I am the servant of the one who prepared me[a]. I am the ruler of my offspring[d][c][b].
    But he is the one who begot me before the day of my birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Head can also be read as a leadership title (“ruler”).
    reason: lexical_alternative
  - marker: b
    text: ‘Brought me forth’ renders ⲉⲓⲛⲉ idiomatically to preserve the birth paradox;
      a non‑generative ‘bring/cause to come’ is possible.
    reason: lexical_alternative
  - marker: c
    text: The temporal particle ⲉⲗⲗⲱ is read here as ‘before’; other values like ‘formerly’
      are attested in dialectal usage.
    reason: alignment_note
  - marker: d
    text: Or 'I am the servant of the one who commands me. I am the head of my offspring—who
      brought me forth before the day of my birth.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲉⲧⲕⲉⲗⲉⲩⲉ
  chosen: the one who commands
  alternatives:
  - the commander
  - the one who orders
  lexicon: Greek loan in Coptic from κελεύω; relative form with ⲡⲉⲧ- marks “the one
    who …”
  rationale: The relative participle ⲡⲉⲧ- + ⲕⲉⲗⲉⲩⲉ yields “the one who commands.”
    This captures the authority relationship implied in the clause.
- source_word: ⲡⲧⲥⲉⲣ
  chosen: servant
  alternatives:
  - slave
  - attendant
  lexicon: Crum; form likely denotes one in service; exact nuance dependent on dialect/context
  rationale: Given the nearby ⲡⲉⲧⲕⲉⲗⲉⲩⲉ (“the one who commands”), a service role is
    in view. “Servant” preserves the relation without over‑specifying legal bondage
    where the form is uncertain.
- source_word: ⲡⲕⲁⲣⲱϥ
  chosen: head
  alternatives:
  - chief
  - ruler
  lexicon: Coptic karōf “head”; common metaphor for authority/leadership
  rationale: Rendering the literal “head” preserves the image and its leadership connotation;
    “ruler” is an interpretive alternative noted in footnotes.
- source_word: ⲙⲛⲧϣⲏⲣⲉ
  chosen: offspring
  alternatives:
  - child
  - progeny
  lexicon: Coptic ⲙⲛⲧ‑ nominalizer + ϣⲏⲣⲉ (“child”); abstract/collective sense
  rationale: “Offspring” captures the collective/abstract sense and fits the paradoxical
    kinship claims in Thunder.
- source_word: ⲉⲗⲗⲱ
  chosen: before
  alternatives:
  - formerly
  - already
  lexicon: Dial. particle/preposition with temporal force; readings vary
  rationale: The context “before the day …” calls for a temporal ‘before’; uncertainty
    noted under alignment risk.
- source_word: ⲉⲓⲛⲉ
  chosen: brought forth
  alternatives:
  - bring
  - cause to come
  - lead
  lexicon: Coptic ⲉⲓⲛⲉ “to bring (cause to come)”; idiomatically used for generative/causal
    bringing
  rationale: To preserve the paradox (“my offspring … brought me forth”), ‘brought
    forth’ fits the generative nuance while acknowledging the verb’s broader range.
parallelism_check: This block preserves the twofold “I am … / I am …” pattern followed
  by a relative clause modifying the second predicate. The parallelism of roles (servant
  vs. head) remains sharp and paradoxical.
voice_check: First-person declarative voice is retained with explicit “I am” statements.
  The paradox of being both subordinate (servant) and supreme (head) over kin (“my
  offspring”) is left intact without smoothing.
