base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/089.yaml
  text: Jesus said[3][2][1], "Why do you wash the outside of the cup?[1] Do you not know[2] that the one who made[3] the inside is also the one who made[3] the outside?"
  footnotes:
  - marker: '1'
    text: Literally, ‘the side outside of the cup’ (ⲡⲥⲁ ⲛⲃⲟⲗ ⲛⲡⲡⲟⲧⲏⲣⲓⲟⲛ). A matched phrase occurs for ‘the inside’ (ⲡⲥⲁ ⲛϩⲟⲩⲛ).
    reason: dialect_note
  - marker: '2'
    text: Coptic ⲛⲟⲉⲓ can also mean ‘understand’ or ‘realize’. ‘Know’ is kept here to maintain the straightforward cognitive sense.
    reason: lexical_alternative
  - marker: '3'
    text: Coptic ⲧⲁⲙⲓⲟ in the relative clause means ‘make, fashion’; alternatives include ‘fashioned’ or ‘formed’. It does not repeat the earlier verb for ‘wash/cleanse,’ preserving the contrast between washing and making.
    reason: lexical_alternative
