  rationale: Es un nombre propio hebreo; se conserva por transliteración, no por traducción. En español, la forma sin acento mantiene la correspondencia con el nombre auditado en inglés y resulta natural en listas genealógicas.
- source_word: הַשִּׁשִּׁי
  english_pob_choice: the sixth
  chosen_spanish: el sexto
  alternatives_spanish:
  - sexto
  lexicon: HALOT
  rationale: El adjetivo ordinal con artículo señala posición en la secuencia genealógica. En español, 'el sexto' preserva la estructura enumerativa y evita la elipsis excesiva.
- source_word: דָּוִיד
