    text: O, más literalmente, 'si no se venga de' o 'a menos que se vengue de'; en esta fórmula de juramento, el griego expresa una resolución jurada enfática más que una simple condición negativa.
    reason: lexical_alternative
  - marker: b
    text: '''Los dos mares'' probablemente se refiere a la extensión completa de la región en vista, señalada por sus mares limítrofes.'
    reason: cultural_note
  revision_rationale: Se corrigió el uso incorrecto y duplicado del marcador [a], se reubicó la nota léxica para que explique la fórmula de juramento εἰ μὴ ἐκδικήσει conforme al audit trail inglés, y se pulió ligeramente la sintaxis de la enumeración para mejorar la legibilidad en español sin cambiar el sentido fuente.
