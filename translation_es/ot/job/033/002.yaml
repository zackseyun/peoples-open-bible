    rationale: '«¡Mira ahora[a], he abierto mi boca...» no es incorrecto, pero el signo exclamativo da un tono más enfático de lo necesario y rompe la fluidez. «Mira ahora[a]: he abierto mi boca...» o con coma sin exclamación se ajusta mejor al valor deíctico y discursivo.'
  - severity: low
