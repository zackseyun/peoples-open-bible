base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/007/007.yaml
  text: In all the places where I have walked among all the sons of Israel[a], did I ever speak a word to one of the tribes of Israel, whom I commanded to shepherd my people Israel, saying, ‘Why have you not built me a house of cedar?’
