translation:
  language: es
  text: 'Él le dijo: «¿Cuál es su apariencia?» Y ella dijo: «Un hombre anciano está subiendo[a], y está envuelto en un manto[b]». Entonces Saúl supo que era Samuel, y se inclinó con el rostro a tierra y se postró[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «está ascendiendo» / «va subiendo». El participio hebreo enfatiza el movimiento hacia arriba.
    reason: lexical_alternative
  - marker: b
    text: O «lleva un manto». El hebreo sugiere más vívidamente que va envuelto o cubierto con él.
    reason: lexical_alternative
  - marker: c
    text: O «se inclinó profundamente»; en algunos contextos, también puede traducirse «adoró». Aquí denota un acto de profunda postración ante la figura identificada como Samuel.
    reason: alternative_reading
lexical_decisions:
- source_word: תָּאֳרוֹ
  english_pob_choice: his appearance
  chosen_spanish: su apariencia
  alternatives_spanish:
  - su forma
  - su aspecto
  lexicon: HALOT
  rationale: תֹּאַר se refiere a la forma visible o al aspecto de una persona. «Apariencia» es natural en español moderno y conserva el sentido de identificación física que pide Saúl.
- source_word: אִישׁ זָקֵן
  english_pob_choice: an old man
  chosen_spanish: un hombre anciano
  alternatives_spanish:
  - un viejo
  - un hombre de edad avanzada
  lexicon: HALOT
  rationale: La expresión denota simplemente a un varón de edad avanzada. «Hombre anciano» es claro, digno y evita el matiz coloquial de «viejo».
- source_word: עֹלֶה
  english_pob_choice: is coming up
  chosen_spanish: sube
  alternatives_spanish:
  - está subiendo
  - está ascendiendo
  lexicon: HALOT
  rationale: El participio comunica movimiento en curso. «Sube» preserva el movimiento ascendente del contexto sin perder naturalidad en español.
- source_word: עֹטֶה מְעִיל
  english_pob_choice: is wrapped in a robe
  chosen_spanish: está envuelto en un manto
  alternatives_spanish:
  - está cubierto con un manto
  - está envuelto en una túnica
  - lleva un manto
  lexicon: HALOT
  rationale: עֹטֶה implica envolverse o cubrirse, más fuerte que «vestir». מְעִיל puede ser «manto» o «ropa exterior». «Envuelto en un manto» conserva la fuerza descriptiva y la imagen reconocible del texto, sin reducirla a un simple «lleva».
- source_word: וַיֵּדַע
  english_pob_choice: Saul knew
  chosen_spanish: Saúl entendió
  alternatives_spanish:
  - Saúl supo
  - Saúl reconoció
  lexicon: HALOT
  rationale: Aquí ידע expresa reconocimiento a partir de la descripción. «Entendió» transmite la inferencia de Saúl en español natural; «reconoció» también sería posible, pero «entendió» mantiene el matiz de conclusión mental.
- source_word: כִּי שְׁמוּאֵל הוּא
  english_pob_choice: that it was Samuel
  chosen_spanish: que era Samuel
  alternatives_spanish:
  - que se trataba de Samuel
  - que él era Samuel
  lexicon: HALOT
  rationale: El español idiomático pide «era Samuel» tras una identificación. El pronombre hebreo se conserva implícitamente sin forzar una construcción menos natural.
- source_word: וַיִּקֹּד אַפַּיִם אַרְצָה
  english_pob_choice: he bowed with his face to the ground
  chosen_spanish: se inclinó rostro en tierra
  alternatives_spanish:
  - se inclinó con el rostro a tierra
  - se postró con el rostro en tierra
  - se inclinó hasta tocar el suelo con el rostro
  lexicon: HALOT
  rationale: El hebreo describe una inclinación con el rostro hacia la tierra. «Rostro en tierra» mantiene la imagen corporal sin alargar innecesariamente la frase; refleja bien el gesto de profunda reverencia.
- source_word: וַיִּשְׁתָּחוּ
  english_pob_choice: and prostrated himself
  chosen_spanish: y se postró
  alternatives_spanish:
  - y se inclinó
  - y rindió homenaje
  - y se prosternó
  lexicon: HALOT
  rationale: El verbo indica postración o reverencia profunda. «Se postró» es el equivalente más directo y conserva la intensidad del gesto sin resolverlo explícitamente como «adoró».
theological_decisions:
- issue: Si la última acción de Saúl debe leerse como adoración o como postración reverente
  english_pob_reading: Rendered the final verb as 'prostrated himself' rather than 'worshiped.'
  chosen_spanish_reading: Se traduce «se postró», no «adoró».
  alternative_spanish_readings:
  - adoró
  - se inclinó en adoración
  - rindió culto
  rationale: El hebreo שׁחה puede significar adoración o simple postración reverente según el contexto. Aquí la escena describe una respuesta corporal ante la figura identificada como Samuel; «se postró» preserva la tensión y evita afirmar más de lo que el texto exige.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Coincide con la última revisión inglesa: no se introdujeron cambios de fondo respecto del sentido auditado. Se mantuvo la distinción entre la inclinación del rostro y la postración final, y se preservó la tensión sobre la identidad/estatus de la figura al no añadir lenguaje de adoración.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma de proyecto, aunque este versículo no contiene el nombre divino.
  - Se eligió «manto» para מְעִיל por ser más natural en español bíblico y coherente con la vestimenta distintiva de Samuel.
  - Se evitó «adoró» para no resolver una ambigüedad que el audit trail inglés preserva explícitamente.
