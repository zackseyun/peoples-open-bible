translation:
  language: es
  text: 'Alza tus ojos a las alturas desnudas y mira: ¿en dónde no se han acostado contigo[a]? Junto a los caminos te sentaste esperándolos, como un árabe en el desierto[b], y has contaminado la tierra con tu prostitución y con tu maldad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿en dónde no han yacido contigo?». El hebreo usa un verbo sexual crudo en una metáfora de infidelidad del pacto.'
    reason: lexical_alternative
  - marker: b
    text: «Como un árabe en el desierto» probablemente evoca a alguien que acecha junto a rutas desérticas, subrayando una búsqueda deliberada y pública más que la etnicidad en sí.
    reason: cultural_note
lexical_decisions:
- source_word: שְׂאִי
  english_pob_choice: Lift up
  chosen_spanish: Alza
  alternatives_spanish:
  - Levanta
  - Sube
  lexicon: HALOT
  rationale: Imperativo femenino singular de נשׂא; en español, «alza» comunica con naturalidad la acción idiomática de dirigir la mirada hacia arriba.
- source_word: עֵינַיִךְ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - tus ojos
  lexicon: HALOT
  rationale: Se conserva la imagen corporal directa del hebreo, vinculada al imperativo anterior.
- source_word: שְׁפָיִם
  english_pob_choice: the bare heights
  chosen_spanish: las alturas desnudas
  alternatives_spanish:
  - los lugares altos
  - las alturas áridas
  lexicon: HALOT
  rationale: «Alturas desnudas» mantiene el sentido topográfico de lomas/cumbres sin árboles y conserva la resonancia profética sin suavizarla con «lugares altos».
- source_word: וּרְאִי
  english_pob_choice: and see
  chosen_spanish: y mira
  alternatives_spanish:
  - y ve
  lexicon: HALOT
  rationale: Imperativo simple de ראה; «mira» suena natural en español junto a la exhortación anterior.
- source_word: אֵיפֹה
  english_pob_choice: where
  chosen_spanish: ¿en dónde
  alternatives_spanish:
  - ¿dónde
  lexicon: HALOT
  rationale: Interrogativo locativo que introduce la pregunta retórica; «en dónde» refuerza el matiz de ubicación del hebreo.
- source_word: שגלת
  english_pob_choice: been lain with
  chosen_spanish: has sido acostada
  alternatives_spanish:
  - has sido yacida con
  - has sido poseída sexualmente
  - has sido violada
  lexicon: HALOT
  rationale: El verbo hebreo es crudo y sexual. «Acostada» preserva la referencia corporal/sexual en español sin añadir la coerción específica de «violada»; la nota mantiene abierta la alternativa más literal.
- source_word: עַל דְּרָכִים
  english_pob_choice: By the roads
  chosen_spanish: Junto a los caminos
  alternatives_spanish:
  - A la orilla de los caminos
  - Por los caminos
  lexicon: HALOT
  rationale: La preposición y el plural espacial indican proximidad a los caminos; «junto a» expresa bien el escenario de exposición pública.
- source_word: יָשַׁבְתְּ לָהֶם
  english_pob_choice: you sat waiting for them
  chosen_spanish: te sentaste esperándolos
  alternatives_spanish:
  - te sentaste para ellos
  - te sentaste aguardándolos
  lexicon: HALOT
  rationale: El dativo pronominal implica esperar/presentarse para ellos; en español se explicita con «esperándolos».
- source_word: כַּעֲרָבִי בַּמִּדְבָּר
  english_pob_choice: like an Arab in the wilderness
  chosen_spanish: como un árabe en el desierto
  alternatives_spanish:
  - como un nómada en el desierto
  - como un árabe en la estepa
  lexicon: HALOT
  rationale: Se conserva el sentido lexical llano de ערבי, tal como el POB inglés lo retuvo, y la nota explica la probable alusión cultural a alguien al acecho en rutas desérticas.
- source_word: וַתַּחֲנִיפִי אֶרֶץ
  english_pob_choice: and you have polluted the land
  chosen_spanish: y has contaminado la tierra
  alternatives_spanish:
  - y has profanado la tierra
  - y has manchado la tierra
  lexicon: HALOT
  rationale: El Hifil de חנף expresa profanación/contaminación moral; «contaminado» conserva el efecto sobre la tierra sin perder la carga ritual-moral.
- source_word: בִּזְנוּתַיִךְ
  english_pob_choice: with your prostitution
  chosen_spanish: con tu prostitución
  alternatives_spanish:
  - con tu fornicación
  - con tu prostitución ritual
  lexicon: HALOT
  rationale: «Prostitución» preserva el campo semántico sexual y metafórico del hebreo y mantiene la fuerza profética.
- source_word: וּבְרָעָתֵךְ
  english_pob_choice: and with your wickedness
  chosen_spanish: y con tu maldad
  alternatives_spanish:
  - y con tu malicia
  - y con tu perversidad
  lexicon: HALOT
  rationale: רעה es un término amplio de mal moral; «maldad» es la equivalencia más directa y sobria en español.
theological_decisions:
- issue: Metáfora sexual profética para la infidelidad del pacto
  english_pob_reading: Retain the sexualized imagery in the main text rather than flattening it into explicit 'idolatry' language.
  chosen_spanish_reading: Mantener la imaginería sexual en el texto principal, sin convertirla en una explicación explícita de 'idolatría'.
  alternative_spanish_readings:
  - Interpretar directamente como idolatría sin lenguaje sexual
  - Suavizar el texto con una formulación menos cruda
  rationale: El hebreo usa un término sexual brusco para describir la infidelidad del pacto. La traducción debe conservar esa tensión retórica para no diluir el impacto profético ni añadir una glosa interpretativa.
  doctrine_reference: 'Principios de traducción del POB: fidelidad semántica, preservación de tensión léxica y retórica profética.'
translation_notes:
  revision_awareness: Este borrador sigue la revisión más reciente del POB inglés, que prefirió «been lain with» en lugar de «been violated» para reflejar con mayor precisión el sentido sexual del hebreo sin introducir la idea específica de coerción. En español se reflejó esa decisión con «has sido acostada», manteniendo la crudeza del pasaje y la ambigüedad controlada del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el tetragrámaton.
  - Se mantiene «prostitución» para זנות y «maldad» para רעה, en coherencia con el registro profético del POB.
  - «Árabe» se conserva como decisión lexical, con explicación cultural en nota, en lugar de sustituirlo por una paráfrasis etnográfica.
