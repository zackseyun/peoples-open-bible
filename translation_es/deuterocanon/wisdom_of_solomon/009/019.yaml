lexical_decisions:
- source_word: σοφίᾳ
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - entendimiento
  lexicon: LSJ
  rationale: La dativa σοφίᾳ se traduce de forma natural y fiel como «sabiduría», que además conserva el tema rector del libro. «Entendimiento» es posible, pero en español estrecha demasiado el alcance del término y no refleja bien su peso sapiencial.
- source_word: ἐσώθησαν
  english_pob_choice: were saved
  chosen_spanish: fueron salvados
  alternatives_spanish:
  - fueron librados
  - fueron preservados
  lexicon: LSJ
  rationale: El aoristo pasivo de σῴζω admite «salvar», «librar» o «preservar». En español, «fueron salvados» mantiene la amplitud semántica y conserva la tensión entre rescate histórico y lenguaje de salvación, sin reducirlo a una sola idea.
theological_decisions:
- issue: Alcance de la terminología de salvación en σῴζω
  english_pob_reading: were saved
  chosen_spanish_reading: fueron salvados
  alternative_spanish_readings:
  - fueron librados
  - fueron preservados
  rationale: La frase es una síntesis breve de la acción divina en la historia. «Fueron salvados» preserva la amplitud teológica del griego y deja abierta la posibilidad de rescate, preservación o salvación, en lugar de fijar prematuramente un matiz único.
  doctrine_reference: Translation philosophy §3; preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente sin cambios necesarios; se mantiene la lectura breve del griego: καὶ τῇ σοφίᾳ ἐσώθησαν.'
  spanish_consistency_notes:
  - Se usa «sabiduría» como equivalente estable de σοφία en contexto sapiencial.
  - Se evita «SEÑOR» u otra sustitución, pues no aparece el nombre divino en este versículo.
  - «Fueron salvados» conserva la amplitud del griego σῴζω y mantiene la transparencia auditiva del texto.
