translation:
  language: es
  text: Recuerda que fuiste esclavo en Egipto[a], y guarda y pon en práctica estos estatutos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo». El hebreo עֶבֶד puede significar siervo o esclavo, pero aquí «esclavo» refleja mejor la condición de servidumbre de Israel en Egipto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכַרְתָּ
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Y recordarás
  - Así que recuerda
  lexicon: HALOT
  rationale: El hebreo funciona aquí con fuerza exhortativa en contexto instructivo; en español, el imperativo «Recuerda» comunica bien esa fuerza sin volver la frase rígida.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que debe recordarse; «que» es la opción natural en español después de «Recuerda».
- source_word: עֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: HALOT
  rationale: En este contexto el término señala la condición de servidumbre forzada en Egipto. «Esclavo» conserva mejor esa fuerza que «siervo».
- source_word: הָיִיתָ
  english_pob_choice: you were
  chosen_spanish: fuiste
  alternatives_spanish:
  - eras
  - habías sido
  lexicon: HALOT
  rationale: El verbo hebreo expresa una condición pasada real; «fuiste» resulta natural y mantiene la referencia histórica.
- source_word: בְּמִצְרָיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: La preposición y el nombre propio se traducen de manera directa; no hace falta añadir «la tierra» porque no aparece en el hebreo.
- source_word: וְשָׁמַרְתָּ
  english_pob_choice: keep
  chosen_spanish: guarda
  alternatives_spanish:
  - observa
  - cumple
  lexicon: HALOT
  rationale: En contextos pactales y legales, שׁמר puede rendirse como «guardar» u «observar». «Guarda» conserva bien el paralelo con el mandato siguiente.
- source_word: וְעָשִׂיתָ
  english_pob_choice: do
  chosen_spanish: cumple
  alternatives_spanish:
  - haz
  - practica
  lexicon: HALOT
  rationale: En la pareja «guardar y hacer», «cumple» expresa con claridad la ejecución efectiva de los mandamientos o estatutos. Se evita repetir «haz» para no sonar demasiado mecánico en español.
- source_word: הַחֻקִּים
  english_pob_choice: statutes
  chosen_spanish: estatutos
  alternatives_spanish:
  - decretos
  - ordenanzas
  lexicon: HALOT
  rationale: «Estatutos» es un equivalente jurídico-bíblico preciso para חֻקִּים y mantiene el registro legal del pasaje.
- source_word: הָאֵלֶּה
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - estos mismos
  lexicon: HALOT
  rationale: 'El demostrativo se traduce de forma directa en español: «estos».'
theological_decisions:
- issue: Conservar la fuerza de עֶבֶד en la memoria de Egipto
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - servidor
  rationale: La referencia es a la opresión histórica de Israel en Egipto, no a un servicio voluntario. «Esclavo» preserva esa tensión social y teológica mejor que una opción suavizada.
  doctrine_reference: Principio de equivalencia óptima; decisión lexical sobre términos de servidumbre
- issue: Pareja legal «keep and do»
  english_pob_reading: keep and do
  chosen_spanish_reading: guarda y cumple
  alternative_spanish_readings:
  - guarda y haz
  - observa y practica
  rationale: 'La combinación hebrea expresa obediencia completa: atender a la norma y ejecutarla. «Guarda y cumple» conserva la doble idea sin perder naturalidad en español.'
  doctrine_reference: Principio de equivalencia óptima; sintaxis legal-pactual
- issue: Demostrativo final sin ampliación interpretativa
  english_pob_reading: these statutes
  chosen_spanish_reading: estos estatutos
  alternative_spanish_readings:
  - estos mismos estatutos
  - tales estatutos
  rationale: No se añade glosa; el hebreo sólo señala proximidad textual y especificidad. «Estos estatutos» basta y evita sobretraducir.
  doctrine_reference: Principio de literalidad controlada
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo de Deuteronomio 16:12 y el criterio auditado de la POB en inglés, manteniendo la decisión lexical de עֶבֶד como «esclavo» por el contexto de opresión en Egipto. No se detectaron cambios revisionales en el pasaje base.
  spanish_consistency_notes:
  - 'Se conservó el orden semántico básico: recordar → condición pasada → ubicación → obedecer la ley.'
  - Se prefirió vocabulario jurídico-bíblico estable («estatutos», «cumple») sin caer en arcaísmos innecesarios.
  - El pie de nota marca la alternativa «siervo» sólo donde la ambigüedad lexical es real y relevante.
