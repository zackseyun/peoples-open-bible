theological_decisions:
- issue: Nature of the nations' response
  chosen_reading: The verse describes fearful reaction by distant nations to YHWH's evident action, without specifying repentance or worship.
  alternative_readings:
  - The nations respond with reverent awe
  - The nations gather in hostile solidarity
  rationale: The lexical data support fear and trembling, but the verse itself does not explicitly resolve whether the approach is submissive, merely alarmed, or preparatory to the idol-making scene that follows. The translation preserves the tension and avoids importing a fuller interpretation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
