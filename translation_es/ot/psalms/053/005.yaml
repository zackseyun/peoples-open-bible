translation:
  language: es
  text: ¿No saben los que hacen iniquidad, los que devoran a mi pueblo como comen pan? No invocan a Dios[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que hacen el mal» para «los que hacen iniquidad».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los que comen a mi pueblo; comen pan». El sentido es que consumen a mi pueblo con la misma facilidad con que se come el pan cotidiano.
    reason: lexical_alternative
  - marker: c
    text: «Mi pueblo» puede oírse como voz de Dios o del salmista; el hebreo no identifica explícitamente al hablante en esta línea.
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Do not
  chosen_spanish: ¿No saben…?
  alternatives_spanish:
  - ¿Acaso no saben…?
  - ¿No es verdad que saben…?
  lexicon: HALOT
  rationale: La partícula abre una pregunta retórica que espera una respuesta afirmativa. En español, «¿No saben…?» conserva ese valor retórico de forma natural y publicable.
- source_word: יָדְעוּ
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - conocen
  - entienden
  lexicon: HALOT
  rationale: El perfecto hebreo funciona aquí como caracterización general. «Saben» comunica el valor gnómico sin forzar un pasado en español.
- source_word: פֹּעֲלֵי אָוֶן
  english_pob_choice: the workers of wickedness
  chosen_spanish: los que hacen iniquidad
  alternatives_spanish:
  - los trabajadores de iniquidad
  - los hacedores de maldad
  - los malhechores
  lexicon: HALOT
  rationale: La imagen literal de «los que trabajan/hacen» el mal se puede preservar en español con una construcción verbal natural. «Iniquidad» mantiene el registro moral y bíblico del término אָוֶן sin caer en una formulación demasiado arcaica.
- source_word: אֹכְלֵי עַמִּי
  english_pob_choice: those who eat up my people
  chosen_spanish: los que devoran a mi pueblo
  alternatives_spanish:
  - los que comen a mi pueblo
  - los que consumen a mi pueblo
  lexicon: HALOT
  rationale: «Devoran» reproduce el carácter figurado y depredador del hebreo mejor que un simple «comen». Mantiene la violencia de la imagen y resulta idiomático en español.
- source_word: אָכְלוּ לֶחֶם
  english_pob_choice: as they eat bread
  chosen_spanish: como si comieran pan
  alternatives_spanish:
  - como comen pan
  - como quien come pan
  lexicon: HALOT
  rationale: La comparación hebrea contrapone el devorar al pueblo con comer pan, es decir, con una acción ordinaria y cotidiana. «Como si comieran pan» hace explícita la comparación sin eliminar la tensión metafórica.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: Aquí el plural morfológico refiere al Dios único en sentido contextualmente singular. «Dios» es la equivalencia natural en español y mantiene el referente teológico.
- source_word: לֹא קָרָאוּ
  english_pob_choice: They do not call on
  chosen_spanish: No invocan
  alternatives_spanish:
  - No llaman a
  - No claman a
  lexicon: HALOT
  rationale: Con Dios, קרא significa llamar/invocar. «Invocan» es una buena solución española para la acción cultual y relacional implicada por el texto.
theological_decisions:
- issue: Referencia de «mi pueblo»
  english_pob_reading: Retain 'my people' without specifying whether the speaker is God or the psalmist
  chosen_spanish_reading: Conservar «mi pueblo» sin resolver si habla Dios o el salmista
  alternative_spanish_readings:
  - «mi pueblo» como habla directa de Dios
  - «mi pueblo» como voz del salmista en nombre de los justos
  rationale: El hebreo deja explícita la posesión de primera persona, pero no identifica de manera inequívoca al hablante en la línea. La traducción española conserva esa ambigüedad en vez de aclararla artificialmente.
  doctrine_reference: Preservar la tensión textual y no sobreinterpretar la voz hablante.
- issue: Valor de אָוֶן en פֹּעֲלֵי אָוֶן
  english_pob_reading: workers of wickedness
  chosen_spanish_reading: los que hacen iniquidad
  alternative_spanish_readings:
  - hacedores de mal
  - obreros de maldad
  rationale: «Iniquidad» conserva el peso moral y literario del término sin convertirlo en un término doctrinal técnico que el español moderno no usa con la misma naturalidad.
  doctrine_reference: Mantener el tono de juicio moral del salmo sin reducirlo a una mera acusación genérica.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del estado auditado más reciente, y se conserva la alta concordancia con la evaluación de revisión.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים según la norma del proyecto.
  - Se evitó «SEÑOR» porque el hebreo aquí no contiene el Tetragrámaton.
  - Se preservó la metáfora alimentaria con «devoran» / «como si comieran pan», en línea con el audit trail inglés.
  - Se conservó la ambigüedad de «mi pueblo» sin añadir sujeto explícito.
