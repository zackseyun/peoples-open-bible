translation:
  language: es
  text: entonces escucha desde el cielo, desde el lugar donde habitas, su oración y sus súplicas, y hazles justicia[a], y perdona a tu pueblo que han pecado contra ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'defiende su causa'. El hebreo dice literalmente 'haz su juicio/caso'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַעְתָּ
  english_pob_choice: then hear
  chosen_spanish: entonces escucha
  alternatives_spanish:
  - y escucha
  - escucha
  lexicon: HALOT
  rationale: En el contexto de súplica a Dios, el perfecto funciona con valor petitorio; en español, 'entonces' conserva la continuidad discursiva y 'escucha' expresa la petición de manera natural y reverente.
- source_word: מִן הַשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde los cielos
  alternatives_spanish:
  - desde el cielo
  - desde los cielos
  lexicon: HALOT
  rationale: El hebreo usa plural formal; 'los cielos' preserva mejor esa forma que un singular neutralizante, sin perder inteligibilidad en español.
- source_word: מִמְּכוֹן שִׁבְתְּךָ
  english_pob_choice: from the place where you dwell
  chosen_spanish: desde el lugar donde habitas
  alternatives_spanish:
  - desde tu lugar de morada
  - desde tu morada
  lexicon: HALOT
  rationale: מָכוֹן y שִׁבְתְּךָ expresan un lugar fijo de residencia; 'donde habitas' evita arcaísmo y conserva la idea locativa de la frase.
- source_word: תְּפִלָּתָם
  english_pob_choice: their prayer
  chosen_spanish: su oración
  alternatives_spanish:
  - su plegaria
  - su oración
  lexicon: HALOT
  rationale: El término estándar תְּפִלָּה se rinde naturalmente como 'oración'; el singular colectivo refleja bien el hebreo.
- source_word: תְּחִנֹּתֵיהֶם
  english_pob_choice: their pleas
  chosen_spanish: sus súplicas
  alternatives_spanish:
  - sus ruegos
  - sus súplicas
  lexicon: HALOT
  rationale: Para distinguirlo de תְּפִלָּה, 'súplicas' comunica el matiz de petición ferviente o insistente que el hebreo marca.
- source_word: מִשְׁפָּטָם
  english_pob_choice: maintain their cause
  chosen_spanish: mantén su causa
  alternatives_spanish:
  - hazles justicia
  - defiende su causa
  - atiende su causa
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'haz su juicio/caso'; en este contexto judicial de vindicación, 'mantén su causa' preserva el sentido de actuar a favor de ellos sin reducirlo solo a un veredicto penal. En español, 'causa' transmite bien el expediente o la reclamación.
- source_word: וְסָלַחְתָּ
  english_pob_choice: and forgive
  chosen_spanish: y perdona
  alternatives_spanish:
  - y perdona
  - y absuelve
  lexicon: HALOT
  rationale: '''Perdona'' es la equivalencia más clara y estable para el perdón divino en este contexto.'
- source_word: לְעַמְּךָ
  english_pob_choice: your people
  chosen_spanish: a tu pueblo
  alternatives_spanish:
  - a tu pueblo
  - tu pueblo
  lexicon: HALOT
  rationale: El dativo hebreo se expresa de forma idiomática con 'a tu pueblo' al depender de 'perdonar' en español.
- source_word: אֲשֶׁר חָטְאוּ לָךְ
  english_pob_choice: who have sinned against you
  chosen_spanish: que ha pecado contra ti
  alternatives_spanish:
  - que han pecado contra ti
  - que han pecado contra ti
  lexicon: HALOT
  rationale: El hebreo habla de haber pecado 'contra' Dios; en español, el singular colectivo 'ha pecado' puede concordar con 'pueblo' como colectivo, aunque 'han pecado' también sería posible si se enfatiza a los individuos. Se mantiene la relación ofensa-dirigida a Dios.
theological_decisions:
- issue: Lectura judicial de מִשְׁפָּטָם
  english_pob_reading: 'The phrase is rendered as God’s vindicating or justly handling the people’s case: ''maintain their cause.'''
  chosen_spanish_reading: Dios actúa a favor de su causa, sosteniendo su reclamo o vindicándolos justamente.
  alternative_spanish_readings:
  - hazles justicia
  - defiende su causa
  - atiende su causa
  rationale: La expresión hebrea combina oír, juzgar y perdonar. 'Mantén su causa' evita sugerir una condena y conserva la dimensión forense/vindicadora del texto, que es importante en una oración por restauración.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que cambió 'uphold their cause' por 'maintain their cause' para conservar un registro más formal sin alterar el sentido jurídico-vindicador del hebreo. En español se reflejó ese ajuste con 'mantén su causa'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' según la terminología del proyecto solo cuando aparezca el Tetragrámaton; en este versículo no ocurre.
  - '''cielos'' conserva el plural hebreo formal de שָׁמַיִם sin forzar una lectura cosmológica distinta.'
  - Se prefirió 'oración' / 'súplicas' para distinguir los dos sustantivos hebreos correlativos.
  - '''mantén su causa'' intenta conservar la tensión entre justicia judicial y vindicación, sin reducirla a una simple absolución.'
