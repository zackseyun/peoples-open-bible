    text: Or 'against Babylon, against the land of the Chaldeans.' The Hebrew preposition can introduce an oracle directed against a nation, though here it is rendered more broadly as 'concerning' in the heading.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'by the hand of Jeremiah,' an idiom meaning 'through Jeremiah' or 'by Jeremiah as the agent.'
