translation:
  language: es
  text: ¿O ha intentado alguna vez algún dios ir y tomar para sí una nación de en medio de otra nación, con pruebas, con señales, con prodigios, con guerra, con mano poderosa, con brazo extendido y con grandes cosas que inspiran temor[a], según todo lo que Yahvé su Dios hizo por ustedes en Egipto, ante tus ojos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grandes terrores» o «grandes actos temibles». La expresión hebrea puede referirse a hechos que inspiran temor y asombro.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲנִסָּה
  english_pob_choice: has ... ever attempted
  chosen_spanish: ha intentado alguna vez
  alternatives_spanish:
  - ha tratado alguna vez
  - ha osado alguna vez
  - ha procurado alguna vez
  lexicon: HALOT
  rationale: נסה en esta forma expresa intento/ensayo. En español, «ha intentado alguna vez» reproduce bien la pregunta retórica sobre una acción inédita sin cargarla con la idea de prueba/probación que no es primaria aquí.
- source_word: אֱלֹהִים
  english_pob_choice: any god
  chosen_spanish: Dios
  alternatives_spanish:
  - algún dios
  - un dios
  - Dios
  lexicon: HALOT
  rationale: El hebreo usa אֱלֹהִים sin artículo en una comparación retórica. En español, «Dios» puede sonar demasiado definido; por eso se documenta la tensión. Sin embargo, el contexto polemiza sobre la acción divina única y la formulación retórica funciona con mayúscula en español, mientras la nota preserva la alternativa indefinida.
- source_word: לָבוֹא לָקַחַת
  english_pob_choice: to go and take
  chosen_spanish: ir y tomar
  alternatives_spanish:
  - ir y לקחת/recoger
  - venir y tomar
  - entrar y tomar
  lexicon: HALOT
  rationale: La secuencia infinitiva expresa desplazamiento intencional seguido de toma/liberación. «Ir y tomar» es natural en español y conserva la progresión verbal sin introducir un punto de vista no explícito.
- source_word: גּוֹי מִקֶּרֶב גּוֹי
  english_pob_choice: a nation from the midst of another nation
  chosen_spanish: una nación de en medio de otra nación
  alternatives_spanish:
  - una nación del medio de otra nación
  - una nación dentro de otra nación
  - una nación de entre otra nación
  lexicon: HALOT
  rationale: La frase hebrea es enfática y repite «nación». «De en medio de otra nación» conserva la imagen de extracción desde dentro de una entidad mayor, como en el audit trail inglés.
- source_word: בְּמַסֹּת
  english_pob_choice: by trials
  chosen_spanish: con pruebas
  alternatives_spanish:
  - con pruebas y aflicciones
  - mediante pruebas
  - por pruebas
  lexicon: HALOT
  rationale: En este contexto las מַסּוֹת se relacionan con eventos de prueba o demostración en el éxodo. «Con pruebas» suena natural en español y mantiene la amplitud semántica sin restringirlo a «tentaciones».
- source_word: בְּאֹתֹת
  english_pob_choice: by signs
  chosen_spanish: con señales
  alternatives_spanish:
  - mediante señales
  - por señales
  lexicon: HALOT
  rationale: «Señales» es el equivalente estándar en contextos de actos portentosos; con «con» se conserva el instrumento implícito del hebreo בְּ.
- source_word: וּבְמוֹפְתִים
  english_pob_choice: and by wonders
  chosen_spanish: con prodigios
  alternatives_spanish:
  - con maravillas
  - con portentos
  lexicon: HALOT
  rationale: «Prodigios» comunica bien el carácter extraordinario y reverente de מוֹפְתִים. Es una alternativa digna a «maravillas» y evita estrechar el término a un tecnicismo.
- source_word: וּבְמִלְחָמָה
  english_pob_choice: and by war
  chosen_spanish: con guerra
  alternatives_spanish:
  - en guerra
  - mediante guerra
  - con combate
  lexicon: HALOT
  rationale: El singular debe conservarse. «Con guerra» mantiene el paralelismo instrumental del hebreo y la fuerza bélica del relato.
- source_word: וּבְיָד חֲזָקָה
  english_pob_choice: and by a mighty hand
  chosen_spanish: con mano poderosa
  alternatives_spanish:
  - con mano fuerte
  - con una mano poderosa
  lexicon: HALOT
  rationale: Es una expresión fija del éxodo. «Mano poderosa» reproduce con fidelidad y naturalidad la fuerza divina que el hebreo comunica.
- source_word: וּבִזְרֹעַ נְטוּיָה
  english_pob_choice: and by an outstretched arm
  chosen_spanish: con brazo extendido
  alternatives_spanish:
  - con brazo alargado
  - con brazo tendido
  lexicon: HALOT
  rationale: También es una fórmula exódica estable. «Brazo extendido»/«brazo extendido» conserva la imagen corporal de poder desplegado; aquí se prefiere «extendido» por su idiomaticidad en español bíblico actual.
- source_word: וּבְמוֹרָאִים גְּדֹלִים
  english_pob_choice: and by great terrors
  chosen_spanish: y con grandes cosas que inspiran temor
  alternatives_spanish:
  - y con grandes terrores
  - y con grandes actos temibles
  - y con grandes hechos espantosos
  lexicon: HALOT
  rationale: El hebreo admite la referencia a actos/realidades que producen temor y asombro. Se evita reducirlo solo a «terrores» para no perder la ambigüedad documentada; la frase elegida preserva el efecto temible y reverente.
- source_word: כְּכֹל אֲשֶׁר עָשָׂה
  english_pob_choice: according to all that ... did
  chosen_spanish: como todo lo que ... hizo
  alternatives_spanish:
  - según todo lo que ... hizo
  - tal como ... hizo
  - como todo cuanto ... hizo
  lexicon: HALOT
  rationale: La comparación totalizante queda más natural en español con «como todo lo que...». Mantiene la plenitud del hebreo כְּכֹל sin añadir matices interpretativos.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre divino revelado, en lugar de sustituirlo por un título.
- source_word: לְעֵינֶיךָ
  english_pob_choice: before your eyes
  chosen_spanish: ante tus ojos
  alternatives_spanish:
  - a la vista de ti
  - en tus ojos
  - delante de tus ojos
  lexicon: HALOT
  rationale: El modismo subraya que los actos fueron observados directamente. «Ante tus ojos» / «ante tus ojos» es claro y solemne en español; la segunda persona singular se conserva en el final del verso como en el hebreo.
theological_decisions:
- issue: Valor de אֱלֹהִים en la pregunta retórica
  english_pob_reading: any god
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - algún dios
  - un dios
  rationale: 'El hebreo plantea una comparación polémica: ningún dios ha hecho esto. En español, la mayúscula de «Dios» puede sonar más definida, pero se mantiene porque la frase final nombra a Yahvé explícitamente y el contraste ya queda establecido en la oración. La nota de alternativa preserva la fuerza indefinida del original.'
  doctrine_reference: Contexto monoteísta y retórico del Deuteronomio; contraste entre Yahvé y las naciones
- issue: Expresión final de מוראים גדולים
  english_pob_reading: great terrors
  chosen_spanish_reading: grandes cosas que inspiran temor
  alternative_spanish_readings:
  - grandes terrores
  - grandes actos temibles
  - grandes maravillas temibles
  rationale: La expresión hebrea puede entenderse como actos que causan temor y asombro. En español, «terrores» podría sonar demasiado psicológico; la formulación elegida conserva la ambivalencia entre hechos aterradores y prodigios sobrecogedores, sin cerrar prematuramente el sentido.
  doctrine_reference: Éxodo como acto salvador que también produce temor reverente
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue la norma del proyecto de transliterar el Tetragrámaton como nombre propio. Esto evita la sustitución por título y mantiene la trazabilidad del nombre en el texto bíblico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se revisó el contexto inglés auditado y no se detectaron cambios posteriores aplicados; la redacción española sigue la lectura aprobada de alta concordancia. Se conservan la pregunta retórica, la serie instrumental de medios exódicos y el cierre con el nombre divino Yahvé.
  spanish_consistency_notes:
  - Se mantiene el paralelismo instrumental con «con» para reflejar el בְ repetido del hebreo.
  - Se conserva la segunda persona singular al final («tus ojos») como reflejo del hebreo, aunque el inicio del verso usa una formulación general; esto refleja la oscilación del original y se deja sin nivelar artificialmente.
  - Se usa «Yahvé» consistentemente para יְהוָה conforme a la norma del proyecto.
  - «Señales / prodigios / guerra / mano poderosa / brazo extendido» siguen el orden y la cadencia del texto fuente.
  - Se preserva la tensión semántica de מוֹרָאִים גְּדֹלִים con una nota alternativa, sin eliminar el matiz de temor reverente.
