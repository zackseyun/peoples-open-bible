translation:
  language: es
  text: Y sucedió[a], después que Amasías vino[c] de herir a los edomitas, que trajo los dioses de los hijos de Seír[b] y los puso para sí como dioses; y delante de ellos se inclinó[d], y a ellos quemó incienso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: ''Entonces sucedió''.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''los dioses del pueblo de Seír''. El hebreo dice literalmente ''los dioses de los hijos de Seír''.'
    reason: lexical_alternative
  - marker: c
    text: 'También posible: ''regresó'' o ''volvió''; el hebreo dice literalmente ''vino''.'
    reason: lexical_alternative
  - marker: d
    text: 'O: ''se postró delante de ellos''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now it happened
  chosen_spanish: Entonces sucedió
  alternatives_spanish:
  - Y sucedió
  - Ahora bien, sucedió
  lexicon: HALOT
  rationale: La fórmula narrativa introduce un nuevo episodio. ‘Entonces sucedió’ mantiene el valor secuencial del wayyiqtol y suena natural en español sin perder solemnidad.
- source_word: אַחֲרֵי בּוֹא
  english_pob_choice: after ... came
  chosen_spanish: después de que ... vino
  alternatives_spanish:
  - después de que ... llegó
  - tras la venida de
  lexicon: HALOT
  rationale: La construcción marca posterioridad temporal. ‘Después de que ... vino’ conserva el movimiento de בוא sin imponer ‘regresó’ como algo que el hebreo no dice explícitamente.
- source_word: מֵהַכּוֹת אֶת אֲדוֹמִים
  english_pob_choice: from striking down the Edomites
  chosen_spanish: de derrotar a los edomitas
  alternatives_spanish:
  - de golpear a los edomitas
  - después de haber derrotado a los edomitas
  lexicon: HALOT
  rationale: נכה puede significar ‘golpear’ o ‘derrotar’; en este contexto narrativo ‘derrotar’ comunica el resultado militar con naturalidad en español, sin exagerar más allá del texto.
- source_word: אֱלֹהֵי בְּנֵי שֵׂעִיר
  english_pob_choice: the gods of the sons of Seir
  chosen_spanish: los dioses de los hijos de Seír
  alternatives_spanish:
  - los dioses del pueblo de Seír
  - los dioses de la gente de Seír
  lexicon: HALOT
  rationale: Se mantiene la expresión filial del hebreo, ya que el texto la usa de forma concreta. ‘Hijos de Seír’ preserva la forma y la referencia a deidades paganas mediante ‘dioses’.
- source_word: וַיַּעֲמִידֵם לוֹ לֵאלֹהִים
  english_pob_choice: set them up for himself as gods
  chosen_spanish: los puso para sí como dioses
  alternatives_spanish:
  - los estableció para sí como dioses
  - los hizo sus dioses
  lexicon: HALOT
  rationale: עָמַד en Hiphil aquí expresa poner/establecer. ‘Los puso para sí como dioses’ conserva la instalación de los ídolos y el matiz de apropiación personal sin volverlo demasiado interpretativo.
- source_word: וְלִפְנֵיהֶם יִשְׁתַּחֲוֶה
  english_pob_choice: before them he bowed down
  chosen_spanish: delante de ellos se inclinaba
  alternatives_spanish:
  - delante de ellos se postraba
  - delante de ellos se arrodillaba
  lexicon: HALOT
  rationale: השתחוה implica inclinarse/prosternarse en acto de adoración. ‘Se inclinaba’ preserva el gesto físico; el contexto ya deja claro su sentido idolátrico.
- source_word: וְלָהֶם יְקַטֵּר
  english_pob_choice: to them he burned incense
  chosen_spanish: y para ellos quemaba incienso
  alternatives_spanish:
  - y a ellos ofrecía incienso
  - y para ellos ofrecía incienso
  lexicon: HALOT
  rationale: קטר denota quemar incienso. ‘Quemaba incienso’ es directo y fiel; ‘para ellos’ refleja el dativo del hebreo y su orientación cultual.
theological_decisions:
- issue: Tratamiento de אֱלֹהִים cuando se refiere a deidades paganas
  english_pob_reading: gods
  chosen_spanish_reading: dioses
  alternative_spanish_readings:
  - seres divinos
  - divinidades
  rationale: Aquí el texto describe ídolos/deidades ajenas a Yahvé; ‘dioses’ conserva la ironía y la apostasía del relato sin suavizar el choque teológico.
  doctrine_reference: Monoteísmo bíblico; denuncia de idolatría
- issue: Sentido de la secuencia narrativa en וַיְהִי אַחֲרֵי
  english_pob_reading: Now it happened, after ...
  chosen_spanish_reading: Entonces sucedió, después de que ...
  alternative_spanish_readings:
  - Y aconteció, después de que ...
  - Y sucedió, después de que ...
  rationale: La combinación mantiene la marca narrativa y la relación temporal sin forzar un giro litúrgico o arcaizante en español.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés, que prefirió ‘came’ frente a ‘returned’ para una mayor correspondencia léxica con el hebreo. En español se eligió ‘vino’ para mantener esa correspondencia, aunque ‘regresó’ sería más idiomático; se evita imponer un matiz de retorno no expresado explícitamente por el verbo.
  spanish_consistency_notes:
  - Se mantuvo ‘dioses’ para אֱלֹהִים en sentido pagano, coherente con el tratamiento proyectado para deidades ajenas.
  - Se conservó ‘incienso’ para קטר, en línea con el valor cultual del verbo.
  - Se usó ‘Seír’ con tilde según ortografía española habitual en nombres propios bíblicos adaptados.
  - No se introdujo ‘SEÑOR’ ni ‘Cristo’, ya que el versículo no los contiene.
