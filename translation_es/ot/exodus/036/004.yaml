translation:
  language: es
  text: Entonces vinieron todos los hombres hábiles[a] que estaban haciendo toda la obra del santuario, cada uno de la obra que hacía,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literal: «hombre, hombre de su obra que ellos estaban haciendo», una expresión distributiva que significa «cada uno de la obra que hacía».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - entraron
  lexicon: HALOT
  rationale: El wayyiqtol de בוא marca avance narrativo; «vinieron» conserva el movimiento y funciona bien en español para una secuencia histórica.
- source_word: כָּל הַחֲכָמִים
  english_pob_choice: all the skilled men
  chosen_spanish: todos los hombres hábiles
  alternatives_spanish:
  - todos los hombres sabios
  - todos los artesanos
  lexicon: HALOT
  rationale: חכמים aquí se refiere a destreza para la obra del tabernáculo, no solo a sabiduría intelectual. «Hábiles» preserva ese sentido vocacional y mantiene el masculino del hebreo.
- source_word: הָעֹשִׂים
  english_pob_choice: who were doing
  chosen_spanish: que estaban haciendo
  alternatives_spanish:
  - que hacían
  - que trabajaban en
  lexicon: HALOT
  rationale: El participio expresa acción en curso; «estaban haciendo» refleja bien la continuidad sin perder la cercanía semántica con עשה.
- source_word: אֵת כָּל מְלֶאכֶת הַקֹּדֶשׁ
  english_pob_choice: all the work of the sanctuary
  chosen_spanish: toda la obra del santuario
  alternatives_spanish:
  - todo el trabajo del santuario
  - toda la obra sagrada
  lexicon: HALOT
  rationale: מְלָאכָה/מְלֶאכֶת es trabajo de elaboración u oficio; en este contexto cultual, «obra» suena natural en español y «del santuario» expresa el ámbito sagrado concreto.
- source_word: אִישׁ אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - uno por uno
  - cada hombre
  lexicon: HALOT
  rationale: La repetición distributiva se vierte naturalmente como «cada uno». En español evita una redundancia dura y conserva el valor distributivo del hebreo.
- source_word: מִמְּלַאכְתּוֹ
  english_pob_choice: from the work
  chosen_spanish: desde la obra
  alternatives_spanish:
  - de su obra
  - de su trabajo
  lexicon: HALOT
  rationale: La partícula מן indica separación o salida desde la tarea en la que estaba ocupado; «desde la obra» mantiene ese matiz de apartarse de su labor en curso.
- source_word: אֲשֶׁר הֵמָּה עֹשִׂים
  english_pob_choice: that he was doing
  chosen_spanish: que hacía
  alternatives_spanish:
  - que estaban haciendo
  - que él hacía
  lexicon: HALOT
  rationale: Aunque el hebreo tiene plural, la construcción distributiva «cada uno» hace que el sentido sea individual. El singular español refleja ese efecto distributivo, como en la decisión inglesa auditada.
translation_notes:
  revision_awareness: 'Traducción alineada con el último pase auditado: no se detectaron revisiones posteriores ni cambios de sentido relevantes; se conserva la lectura distributiva y el léxico cultual del texto fuente.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque aquí no aparece el nombre divino ni una cita de κύριος; el verso habla del santuario/obra cultual.
  - «Santuario» se usa para מְלֶאכֶת הַקֹּדֶשׁ por su contexto tabernacular, manteniendo la referencia concreta al ámbito sagrado.
  - La nota [a] preserva la tensión distributiva del hebreo sin forzar una traducción rígida de «hombre, hombre».
