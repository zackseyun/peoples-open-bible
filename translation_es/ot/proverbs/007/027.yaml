    text: Seol es el ámbito de los muertos; alternativamente, ‘el sepulcro’.
    reason: lexical_alternative
  revision_rationale: Se revisa para reflejar más directamente el plural hebreo דַּרְכֵי y el participio plural יֹרְדוֹת, evitando la sintaxis algo forzada y ambigua de ‘Su casa es el camino… que desciende’. La nueva redacción conserva la nota alternativa singular auditada por la POB inglesa, mantiene ‘Seol’ por precisión teológica, y usa ‘aposentos’ para una expresión más natural y solemne en español.
