translation:
  language: es
  text: Aún el que es flojo en su trabajo es hermano de uno dado a la destrucción[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es hermano de un destructor». El hebreo puede señalar tanto a una persona caracterizada por la destrucción como, más concretamente, a alguien que destruye.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Aun
  alternatives_spanish:
  - También
  - Incluso
  lexicon: HALOT
  rationale: La partícula introduce una comparación enfática; «Aun» conserva ese matiz de sorpresa y equivalencia proverbial sin volver la frase pesada.
- source_word: מִתְרַפֶּה
  english_pob_choice: one who is slack
  chosen_spanish: el que es flojo
  alternatives_spanish:
  - el que es perezoso
  - el negligente
  - el que se afloja
  lexicon: HALOT
  rationale: El participio hitpael expresa a alguien que se vuelve flojo o descuida su tarea. «El que es flojo» mantiene el rasgo caracterizador y suena natural en español; se evita suavizarlo a una mera incapacidad.
- source_word: בִמְלַאכְתּוֹ
  english_pob_choice: in his work
  chosen_spanish: en su trabajo
  alternatives_spanish:
  - en su labor
  - en su tarea
  - en su oficio
  lexicon: HALOT
  rationale: מְלָאכָה puede referirse a trabajo, labor o tarea. «Trabajo» es claro y fiel al ámbito donde se manifiesta la negligencia.
- source_word: אָח הוּא
  english_pob_choice: is brother to
  chosen_spanish: es hermano de
  alternatives_spanish:
  - es semejante a
  - está emparentado con
  - es como
  lexicon: HALOT
  rationale: Se conserva la metáfora de parentesco sin convertirla en una comparación abstracta. «Hermano de» reproduce el paralelo concreto del hebreo.
- source_word: לְבַעַל
  english_pob_choice: to a master of
  chosen_spanish: de un maestro de
  alternatives_spanish:
  - de un dueño de
  - de uno dado a
  - de un poseedor de
  lexicon: HALOT
  rationale: בעל aquí caracteriza a una persona marcada por la cualidad siguiente. «Maestro de» mantiene la fuerza personal del término sin cambiarlo por un giro menos preciso.
- source_word: מַשְׁחִית
  english_pob_choice: destruction
  chosen_spanish: la destrucción
  alternatives_spanish:
  - el ruin
  - la ruina
  - la devastación
  - el destruir
  lexicon: HALOT
  rationale: El sustantivo puede apuntar a destrucción como cualidad o a quien destruye. «La destrucción» conserva la ambigüedad potencial del hebreo, en línea con el margen inglés que ofrece la alternativa concreta.
theological_decisions:
- issue: Metáfora de parentesco aplicada a la conducta destructiva
  english_pob_reading: is brother to a master of destruction
  chosen_spanish_reading: es hermano de un maestro de la destrucción
  alternative_spanish_readings:
  - es hermano de un destructor
  - es semejante a uno que destruye
  rationale: No se diluye la imagen de parentesco en una simple equivalencia lógica. La metáfora bíblica presenta afinidad moral y práctica entre la negligencia y la destrucción activa.
  doctrine_reference: Sabiduría proverbial; antropología moral implícita
- issue: Ambigüedad de מַשְׁחִית
  english_pob_reading: master of destruction / destroyer
  chosen_spanish_reading: maestro de la destrucción
  alternative_spanish_readings:
  - destructor
  - el que destruye
  rationale: La POB inglesa preserva la tensión entre cualidad y agente. En español, «maestro de la destrucción» mantiene una formulación nominal que no cierra la lectura a solo una de las dos posibilidades.
  doctrine_reference: Principio de fidelidad a la ambigüedad léxica del texto
translation_notes:
  revision_awareness: Se siguió la lectura inglesa auditada y se mantuvo la ambigüedad de מַשְׁחִית documentada en el margen, sin endurecerla innecesariamente en una sola opción española.
  spanish_consistency_notes:
  - Se usó «Aun» para reflejar el valor enfático de גַּם.
  - Se prefirió «trabajo» por naturalidad moderna y fidelidad semántica.
  - Se conservó el paralelo proverbial con «es hermano de» para no desactivar la metáfora hebrea.
  - Se evitó «SEÑOR» u այլ terminología no pertinente; no hay nombres divinos en este versículo.
  - «Maestro de la destrucción» reproduce la construcción del inglés POB y deja abierta la alternativa agentiva en nota.
