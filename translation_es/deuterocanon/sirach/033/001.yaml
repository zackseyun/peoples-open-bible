translation:
  language: es
  text: El que teme a Yahvé no encontrará el mal[a], pero en la prueba volverá a escapar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo de esta línea es difícil, sobre todo en la expresión que aquí se vierte como "en la prueba". La lectura griega ofrecida en el paquete es un paralelo no pertinente para este versículo, por lo que la traducción sigue el testimonio hebreo con cautela. Otra posibilidad sería: "pero en su prueba volverá a ser librado".'
    reason: alternative_reading
lexical_decisions:
- source_word: יְרֵא יְהֹוָה
  english_pob_choice: One who fears Yahweh
  chosen_spanish: El que teme a Yahvé
  alternatives_spanish:
  - Quien teme a Yahvé
  - El que reverencia a Yahvé
  lexicon: HALOT
  rationale: El participio hebreo describe a la persona caracterizada por temor reverente hacia YHWH. En español, "el que teme a Yahvé" conserva bien la fuerza representativa y sigue la terminología del proyecto para el nombre divino.
- source_word: לֹא יִפְגַּע רָע
  english_pob_choice: will not meet with evil
  chosen_spanish: no encontrará el mal
  alternatives_spanish:
  - no se encontrará con el mal
  - no le sobrevendrá mal
  lexicon: HALOT
  rationale: פגע aquí transmite la idea de toparse o verse alcanzado por algo adverso. "Encontrará el mal" comunica ese encuentro y mantiene abierto el valor amplio de רָע, sin reducirlo solo a daño físico.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino que
  - aunque
  lexicon: HALOT
  rationale: El giro introduce contraste o restricción; en español, "pero" reproduce con naturalidad la transición hacia la cláusula de prueba y rescate, sin forzar una explicación causal que el hebreo no requiere.
- source_word: בְּנוּסוֹ
  english_pob_choice: in trial
  chosen_spanish: en la prueba
  alternatives_spanish:
  - cuando es probado
  - en su prueba
  lexicon: HALOT
  rationale: La forma es difícil y admite incertidumbre. Siguiendo la opción del POB inglés, "en la prueba" preserva la idea de prueba o puesta a examen, sin decidir más de lo que el texto permite.
- source_word: שָׁב
  english_pob_choice: he will again escape
  chosen_spanish: volverá a escapar
  alternatives_spanish:
  - volverá
  - regresará
  lexicon: HALOT
  rationale: Aunque שׁוב puede significar volver/retornar, en esta construcción el sentido global apunta a una nueva salida o liberación tras la prueba. "Volverá a escapar" conserva la dinámica del rescate sin introducir una paráfrasis teológica.
- source_word: וְנִמְלָט
  english_pob_choice: and escape
  chosen_spanish: escapar
  alternatives_spanish:
  - será librado
  - saldrá a salvo
  lexicon: HALOT
  rationale: נמלט tiene el sentido concreto de escapar o ser librado. En español, "escapar" es breve y fiel; el matiz de liberación queda implícito por el contexto sapiencial.
theological_decisions:
- issue: Tratamiento del nombre divino יְהֹוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la norma del proyecto, se traduce como "Yahvé" y no se oculta tras una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de la afirmación sobre el mal
  english_pob_reading: will not meet with evil
  chosen_spanish_reading: no encontrará el mal
  alternative_spanish_readings:
  - no sufrirá ningún daño
  - el mal no le ocurrirá
  rationale: La segunda cola permite prueba y escape, así que la primera no debe prometer inmunidad absoluta. "No encontrará el mal" preserva la confianza proverbial sin borrar la tensión del dicho.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que ajustó כִּי אִם a un contraste más natural con "but" y simplificó la cláusula final para representar שָׁב וְנִמְלָט sin literalismo pesado. La propuesta española refleja ese ajuste, manteniendo la ambigüedad de la línea hebrea y su tensión sapiencial.
  spanish_consistency_notes:
  - Se usa "Yahvé" de manera consistente para el Tetragrámaton, conforme al marco del proyecto.
  - Se mantiene "mal" en vez de estrechar a "daño" para conservar el alcance amplio de רָע.
  - '"Prueba" se usa con cautela para reflejar la incertidumbre del hebreo y la nota de auditoría.'
  - La construcción "volverá a escapar" intenta reproducir la secuencia verbal sin imponer una interpretación doctrinal adicional.
