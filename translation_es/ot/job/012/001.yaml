lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: El hebreo usa la fórmula narrativa de respuesta en wayyiqtol. En español, «respondió» comunica con naturalidad la secuencia de diálogo y conserva la función formulaica sin añadir contenido interpretativo.
- source_word: אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: Job
  alternatives_spanish:
  - Ijob
  lexicon: nombre propio convencional
  rationale: Se mantiene el nombre propio en su forma usual en español bíblico, ya que no hay base textual para otra transliteración.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - y habló diciendo
  lexicon: HALOT
  rationale: «Y dijo» reproduce la fórmula hebrea estándar de introducción de discurso con máxima fidelidad y claridad en español.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  lexicon: conjunción narrativa
  rationale: La waw narrativa marca continuidad secuencial; «Entonces» ofrece en español una transición natural al inicio de la respuesta, equivalente al valor discursivo que el POB inglés expresó con «Then».
translation_notes:
