review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: el pueblo acampado oye el reporte, se cita la conspiración de Zimri y luego todo Israel hace rey a Omri en el campamento. Sin embargo, hay dos desajustes importantes: «ha derribado al rey» no transmite con suficiente naturalidad en español el valor de נכה en este contexto narrativo, y la secuencia «hizo rey sobre Israel a Omri» suena forzada. Además, falta la nota equivalente a la nota inglesa sobre «struck down».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta giros poco naturales: «derribado al rey» suena físico pero no idiomático para una muerte regia, y «hizo rey sobre Israel a Omri» es sintácticamente torpe. Una leve reordenación mejora mucho la legibilidad sin apartarse del hebreo. También conviene conservar la aclaración lexical en nota para el verbo de matar.'
  glossary_alignment: 'No hay conflictos con los términos globales del proyecto. Los nombres propios están bien. «Todo Israel», «Omri» y «campamento» están bien alineados. La principal cuestión es léxica: para וְגַם הִכָּה אֶת־הַמֶּלֶךְ conviene «ha abatido al rey» con nota, mejor que «ha derribado al rey».'
  issues:
  - severity: medium
    issue: «ha derribado al rey» es poco natural y puede sonar no fatal
    rationale: נכה literalmente es «golpear/herir», pero aquí implica la muerte del rey. «Derribar» en español no comunica bien ese valor en este contexto histórico; «abatir» preserva mejor la fuerza verbal y la implicación de muerte sin irse directamente a «matar».
  - severity: medium
    issue: Falta la nota lexical para el verbo que implica la muerte del rey
    rationale: La auditoría inglesa preserva una nota explicando que «struck down» traduce un verbo hebreo que literalmente significa «golpear» y que en contexto implica matar. Esa información debe mantenerse también en español.
  - severity: low
    issue: «hizo rey sobre Israel a Omri» suena forzado
    rationale: Aunque intenta reflejar la sintaxis hebrea, en español natural y fiel es mejor «hizo rey a Omri sobre Israel» o «proclamó rey a Omri sobre Israel». Dado el criterio POB, «hizo rey a Omri sobre Israel» conserva mejor el valor causativo.
