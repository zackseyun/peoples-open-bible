  - severity: low
    issue: «que se sacude» suena algo tosco aplicado a «yugo»
    rationale: No es incorrecto, pero en español bíblico fluido puede sonar mecánico. Aun así, dado que la imagen es difícil y la nota ya explica la metáfora, no hace falta una reescritura mayor; basta con pulir lo demás.
