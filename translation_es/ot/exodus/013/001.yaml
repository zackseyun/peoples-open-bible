review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja fielmente la fórmula hebrea: וַיְדַבֵּר = «Entonces ... habló», יְהוָה = «Yahvé», אֶל = «a», מֹשֶׁה = «Moisés», לֵּאמֹר = «diciendo». La secuencia narrativa y la introducción del discurso directo están bien preservadas.'
  spanish_quality_summary: 'El español principal es natural, claro y digno: «Entonces Yahvé habló a Moisés, diciendo,». Sin embargo, la nota al pie es internamente inconsistente porque presenta «YHWH» como si «Yahvé» fuera una alternativa, cuando el texto principal ya usa «Yahvé» para representar ese hebreo. Conviene ajustar la nota para evitar redundancia y confusión.'
  glossary_alignment: El borrador sigue correctamente la política del proyecto al usar «Yahvé» para יהוה, no «SEÑOR». «Moisés» y «diciendo» son adecuados y legibles en español bíblico moderno.
  issues:
  - severity: medium
    issue: La nota al pie ofrece «Yahvé» como alternativa a «YHWH», aunque «Yahvé» ya es la forma elegida en el texto principal.
    rationale: La nota inglesa explica que el hebreo subyacente es «YHWH» y menciona otras formas usadas en traducciones. En español, mantener «Yahvé» como alternativa crea una nota confusa y poco informativa. Debe indicar el hebreo y dejar como alternativas solo otras formas de representación, por ejemplo «Yahveh» o «Jehová».
  revised_spanish_text: Entonces Yahvé habló a Moisés[a], diciendo,
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; también se vierte como «Yahveh» o «Jehová» en algunas traducciones.'
    reason: alternative_reading
  revision_rationale: Se conserva intacto el texto principal porque es fiel al hebreo y suena natural en español. Solo se corrige la nota para que informe con precisión sobre el Tetragrámaton sin presentar «Yahvé» como una alternativa a la propia elección del texto.
