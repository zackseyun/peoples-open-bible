translation:
  language: es
  text: Hombres[a], ¿no prevalecen los hombres, pues dominan la tierra y el mar y todo lo que hay en ellos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Hombres, ¿no prevalecen los hombres, dominando la tierra y el mar y todo lo que hay en ellos?». El griego usa una pregunta retórica que espera la respuesta sí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ ἄνδρες
  english_pob_choice: O men
  chosen_spanish: ¡Oh hombres!
  alternatives_spanish:
  - Hombres
  - Varones
  lexicon: LSJ
  rationale: El vocativo plural exige una interpelación directa. «¡Oh hombres!» conserva el tono retórico y el valor masculino del griego, en línea con la decisión inglesa de mantener la forma masculina sin neutralizarla.
- source_word: οὐχ ὑπερισχύουσιν
  english_pob_choice: do not ... prevail
  chosen_spanish: ¿No prevalecen?
  alternatives_spanish:
  - ¿No son más fuertes?
  - ¿No dominan?
  lexicon: LSJ
  rationale: «Prevalecer» reproduce bien ὑπερισχύω sin forzar una imagen física específica. En español, la forma interrogativa retórica mantiene el sentido esperado de respuesta afirmativa.
- source_word: οἱ ἄνθρωποι
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los seres humanos
  lexicon: LSJ
  rationale: Aquí ἄνθρωποι funciona en sentido general para la humanidad, pero el POB inglés conserva «men» por transparencia textual. «Los hombres» refleja esa elección y mantiene la correspondencia con el vocativo inicial.
- source_word: κατακρατοῦντες
  english_pob_choice: since they rule over
  chosen_spanish: pues dominan
  alternatives_spanish:
  - pues gobiernan sobre
  - pues tienen dominio sobre
  lexicon: LSJ
  rationale: El participio explica la base de la afirmación. «Dominar» comunica la idea de ejercer dominio sobre la tierra y el mar de manera natural en español y sin añadir matices demasiado técnicos.
- source_word: τὴν γῆν καὶ τὴν θάλασσαν
  english_pob_choice: the earth and the sea
  chosen_spanish: la tierra y el mar
  alternatives_spanish:
  - la tierra y el océano
  - la tierra y la mar
  lexicon: LSJ
  rationale: Aunque el inglés eligió «earth», en español «la tierra» es más idiomática que «la tierra/la tierra y el mar» y conserva el merismo con «el mar».
- source_word: πάντα τὰ ἐν αὐτοῖς
  english_pob_choice: everything in them
  chosen_spanish: todo lo que hay en ellos
  alternatives_spanish:
  - todo cuanto hay en ellos
  - todas las cosas en ellos
  lexicon: LSJ
  rationale: La expresión abarca de manera totalizante todo lo contenido en la tierra y el mar. «Todo lo que hay en ellos» es natural y fiel al alcance comprehensivo de πάντα.
theological_decisions:
- issue: Pregunta retórica con expectativa de respuesta afirmativa
  english_pob_reading: The Greek uses a rhetorical question expecting the answer yes.
  chosen_spanish_reading: Se mantiene la pregunta retórica con expectativa de respuesta afirmativa.
  alternative_spanish_readings:
  - ¿No prevalecen los hombres...?
  - Los hombres prevalecen, pues dominan...
  rationale: El griego οὐχ en este tipo de construcción sugiere una pregunta retórica, no una negación simple. La puntuación interrogativa en español preserva esa fuerza discursiva.
  doctrine_reference: Retórica bíblica / pragmática del griego koiné
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete (1909) y el audit trail inglés; no se detectaron cambios revisionales aplicables. Se mantuvo la estructura retórica del verso y la correspondencia entre el vocativo inicial y el sujeto general «los hombres».
  spanish_consistency_notes:
  - Se mantuvo «hombres» para conservar la forma masculina del vocativo y del sujeto general, como en el inglés auditado.
  - Se prefirió «la tierra y el mar» por naturalidad idiomática en español, sin perder el merismo cósmico.
  - La nota reproduce la alternativa más literal documentada en el POB inglés para la construcción participial.
