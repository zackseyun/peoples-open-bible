translation:
  language: es
  text: Antes de que se acostaran, los hombres de la ciudad, los hombres de Sodoma, rodearon la casa[a], desde jóvenes hasta viejos[b], todo el pueblo de todos los rincones[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''cercaron la casa'' o ''se agruparon alrededor de la casa''. El verbo hebreo puede denotar rodear o reunirse en torno, con el contexto sugiriendo una multitud que la cercaba.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'desde joven hasta viejo'; es un merismo que indica personas de todo el rango de edades.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'desde el extremo'; idiomáticamente, 'de todos los rincones' o 'de todas partes' de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: טֶרֶם
  english_pob_choice: Before
  chosen_spanish: Antes de que
  alternatives_spanish:
  - Antes
  - Antes de
  lexicon: HALOT
  rationale: Introduce la acción anterior de manera natural en español y conserva el valor temporal inmediato del hebreo sin añadir interpretación.
- source_word: יִשְׁכָּבוּ
  english_pob_choice: they lay down
  chosen_spanish: se acostaran
  alternatives_spanish:
  - se hubieran acostado
  - se acostasen
  - se echaran
  lexicon: HALOT
  rationale: En este contexto nocturno, 'acostarse' comunica con claridad el acto de ponerse a dormir y evita una traducción demasiado literal o pesada.
- source_word: אַנְשֵׁי הָעִיר
  english_pob_choice: the men of the city
  chosen_spanish: los hombres de la ciudad
  alternatives_spanish:
  - los hombres de la ciudadela
  - la gente de la ciudad
  lexicon: HALOT
  rationale: אַנְשֵׁי es específicamente masculino; se mantiene 'hombres' para conservar la referencia marcada del hebreo, como en el audit trail inglés.
- source_word: אַנְשֵׁי סְדֹם
  english_pob_choice: the men of Sodom
  chosen_spanish: los hombres de Sodoma
  alternatives_spanish:
  - los sodomitas
  - los hombres de esa ciudad
  lexicon: HALOT
  rationale: La frase funciona como reidentificación appositiva; 'los hombres de Sodoma' es la forma más directa y fiel en español.
- source_word: נָסַבּוּ עַל הַבַּיִת
  english_pob_choice: surrounded the house
  chosen_spanish: rodearon la casa
  alternatives_spanish:
  - encirclaron la casa
  - se reunieron alrededor de la casa
  lexicon: HALOT
  rationale: נָסַבּוּ puede implicar rodear o agruparse en torno. 'Rodearon' conserva bien el sentido de cerco hostil y es idiomático en español.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el hogar
  lexicon: HALOT
  rationale: Se mantiene el sustantivo concreto y neutral del original; 'casa' es más literal que 'hogar'.
- source_word: מִנַּעַר וְעַד זָקֵן
  english_pob_choice: from young to old
  chosen_spanish: desde el joven hasta el viejo
  alternatives_spanish:
  - de joven a viejo
  - desde los jóvenes hasta los ancianos
  lexicon: HALOT
  rationale: Se conserva el merismo de edad con una formulación natural en español; 'joven' y 'viejo' reflejan el contraste total sin sobreexplicar.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - toda la población
  lexicon: HALOT
  rationale: עָם abarca a la colectividad. 'Todo el pueblo' reproduce bien el alcance comunitario sin restringirlo a varones, como en el texto fuente.
- source_word: מִקָּצֶה
  english_pob_choice: from every quarter
  chosen_spanish: desde cada extremo
  alternatives_spanish:
  - desde todos los rincones
  - desde cada parte
  lexicon: HALOT
  rationale: La imagen literal de 'extremo' se conserva en español; 'desde cada extremo' deja abierta la fuerza idiomática de cobertura total que el audit trail inglés expresa como 'from every quarter'.
theological_decisions:
- issue: Marcado masculino inicial frente a colectividad amplia final
  english_pob_reading: Retain 'men of the city' and 'men of Sodom' in the main text, while rendering כָּל הָעָם as 'all the people.'
  chosen_spanish_reading: Mantener 'los hombres de la ciudad' y 'los hombres de Sodoma', pero traducir כָּל הָעָם como 'todo el pueblo'.
  alternative_spanish_readings:
  - '''la gente de la ciudad'' y ''la gente de Sodoma'''
  - '''todos los habitantes'' en todo el versículo'
  rationale: El hebreo distingue entre la designación masculina explícita y el sustantivo colectivo general. La traducción conserva esa tensión sin neutralizarla ni borrarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La formulación española sigue la revisión más reciente del audit trail inglés, que ajustó la cláusula final a 'from every quarter' para reflejar con mayor precisión מִקָּצֶה sin perder naturalidad. Se mantuvo la estructura general, el valor aspectual de la secuencia temporal y la distinción entre las expresiones masculinas iniciales y la colectividad final.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; en este versículo no aparece.
  - Se preserva 'los hombres' para אַנְשֵׁי, en coherencia con la política de precisión de género del proyecto.
  - '''Todo el pueblo'' traduce עָם sin restringir artificialmente el colectivo a un solo sexo.'
  - '''Desde cada extremo'' conserva la imagen espacial de מִקָּצֶה y permite la lectura idiomática de cobertura total.'
