  text: 남편들은 아내를 사랑하십시오. 메시아께서 교회를 사랑하사 그녀를 위하여 자기 자신을 내어 주신 것 같이 그렇게 하십시오—
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: παρέδωκεν ἑαυτὸν ὑπὲρ αὐτῆς
  english_pob_choice: gave himself up for her
  chosen_korean: 그녀를 위하여 자기 자신을 내어 주신
  alternatives_korean:
  - 그녀를 위하여 자기 몸을 바친
  lexicon: BDAG
  rationale: παραδίδωμι의 「넘겨줌」 무게를 「내어 주신」으로 보존.
theological_decisions:
- issue: 남편-아내 단락에서 사랑의 무게 균형
  chosen_reading: 남편에게는 「자기 목숨을 내어 줄 사랑」이, 아내에게는 「교회의 복종」이 각각 명령됨을 본 번역은 어느 한쪽도 약화시키지 않고 본문 그대로 보존한다.
  alternative_readings:
  - 남편 사랑을 「돌봄」 정도로 약화
  - 아내 복종을 「존경」 정도로 약화
  rationale: 본 단락의 신학적 핵심은 남편의 사랑이 메시아의 자기희생적 사랑을 본받는 것이며, 아내의 복종이 교회가 메시아께 복종함과 같다는 점이다. 한국어 본문에서 이 두 무게를 동일하게 보존해야 본문이 가진 도전성과 위로가 둘 다 살아난다.
  doctrine_reference: 'PHILOSOPHY.md: Translate with author intent + true and powerful meaning, not domesticated tradition.'
