translation:
  language: es
  text: Multiplicaste tu prostitución a la tierra de Canaán[a], a Caldea; pero aun con esto no te saciaste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la tierra de Canaán, a los caldeos», o «a la tierra de Canaán—Caldea». La sintaxis hebrea es comprimida, y la frase puede identificar a Canaán figurativamente con Caldea/Babilonia, o describir una extensión desde Canaán hasta Caldea.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתַּרְבִּי
  english_pob_choice: You multiplied
  chosen_spanish: Multiplicaste
  alternatives_spanish:
  - Aumentaste
  - Hiciste crecer
  lexicon: HALOT
  rationale: El Hifil de רבה es causativo/intensivo. «Multiplicaste» conserva con fuerza idiomática la idea de incremento reiterado del pecado, sin suavizarla a un simple «aumentaste».
- source_word: תַּזְנוּתֵךְ
  english_pob_choice: your prostitution
  chosen_spanish: tu prostitución
  alternatives_spanish:
  - tu fornicación
  - tu prostitución sexual
  - tu infidelidad
  lexicon: HALOT
  rationale: En Ezequiel la metáfora sexual expresa infidelidad de pacto de manera deliberadamente chocante. «Prostitución» mantiene ese filo metafórico mejor que un término más general como «infidelidad».
- source_word: אֶל
  english_pob_choice: to/toward
  chosen_spanish: hacia
  alternatives_spanish:
  - a
  - hacia la
  lexicon: HALOT
  rationale: El hebreo marca dirección/extensión en una sintaxis comprimida. «Hacia» conserva el matiz direccional y deja abierta la ambigüedad del encadenamiento geográfico que refleja la nota inglesa.
- source_word: אֶרֶץ כְּנַעַן
  english_pob_choice: the land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - Canaán
  - el país de Canaán
  lexicon: HALOT
  rationale: Se mantiene explícito אֶרֶץ con «la tierra», reflejando el giro hebreo y la forma usual de la expresión geográfica.
- source_word: כַּשְׂדִּימָה
  english_pob_choice: to Chaldea
  chosen_spanish: a Caldea
  alternatives_spanish:
  - hacia los caldeos
  - a la tierra de los caldeos
  - hasta Caldea
  lexicon: HALOT
  rationale: «Caldea» es el equivalente natural de Chaldea en español bíblico y conserva la referencia territorial. Dado que el hebreo es comprimido, se deja la relación exacta abierta como en el audit trail inglés.
- source_word: וְגַם
  english_pob_choice: yet even with this
  chosen_spanish: y aun con esto
  alternatives_spanish:
  - y aun así
  - y además con esto
  - pero aun con esto
  lexicon: HALOT
  rationale: La partícula añade intensidad concesiva, no mera coordinación. «Y aun con esto» reproduce el valor enfático y el giro adversativo implícito.
- source_word: בְּזֹאת
  english_pob_choice: with this
  chosen_spanish: con esto
  alternatives_spanish:
  - en esto
  - por esto
  - aun con esto
  lexicon: HALOT
  rationale: La referencia remite a la ampliación ya descrita. «Con esto» funciona de manera natural en español y preserva la idea de acompañamiento/concesión.
- source_word: לֹא שָׂבָעַתְּ
  english_pob_choice: you were not satisfied
  chosen_spanish: no quedaste satisfecha
  alternatives_spanish:
  - no te saciaste
  - no te bastó
  - no quedaste saciada
  lexicon: HALOT
  rationale: שׂבע expresa saciedad/satisfacción. «No quedaste satisfecha» suena natural en español y conserva la idea de insaciabilidad; se evita una paráfrasis moralizante como «no te bastó».
theological_decisions:
- issue: Metáfora sexual profética para la infidelidad de Jerusalén
  english_pob_reading: Retain the explicit metaphor as 'prostitution' rather than softening it to a generic moral term.
  chosen_spanish_reading: Conservar «prostitución» en lugar de neutralizarla como «infidelidad» o «inmoralidad sexual».
  alternative_spanish_readings:
  - tu infidelidad
  - tu inmoralidad sexual
  - tu deslealtad
  rationale: Ezequiel usa intencionalmente una imagen sexual dura para describir la idolatría y las alianzas infieles de Jerusalén. Traducirla con un término genérico rebajaría la fuerza retórica y borraría la tensión lexical documentada.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se siguió la revisión inglesa que prefiere una formulación más fluida sin perder el sentido direccional. En español, «hacia» conserva esa direccionalidad mientras la nota explica la compresión sintáctica y las alternativas de lectura.
  spanish_consistency_notes:
  - Se usó «Caldea» para Chaldea, consistente con el español bíblico y con el carácter geográfico del término.
  - Se mantuvo «prostitución» para reflejar la metáfora profética sin suavizarla.
  - Se evitó «SEÑOR» u այլ sustituto de nombre divino porque el versículo no contiene el Tetragrámaton.
  - Se preservó la ambigüedad geográfica mediante nota, siguiendo la POB inglesa.
