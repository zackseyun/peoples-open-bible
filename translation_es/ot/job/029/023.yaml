    issue: לִי se representó como objeto directo en 'lo esperaban'
    rationale: El hebreo dice literalmente 'para mí/por mí', y el English POB conservó 'for me'. En español, 'me esperaban' preserva mejor la referencia explícita a la persona sin introducir un objeto directo masculino ambiguo.
  - severity: medium
    issue: וּפִיהֶם plural se redujo a 'la boca'
    rationale: Aunque el singular puede sonar idiomático en español, aquí no es necesario perder el posesivo/plural del hebreo. 'Su boca' con sujeto plural mantiene naturalidad y refleja mejor el original.
  - severity: medium
    issue: La nota [a] está anclada en el primer 'lluvia' pero explica מַלְקוֹשׁ del segundo hemistiquio
    rationale: Las alternativas 'lluvia de primavera' y 'lluvia tardía' corresponden a לְמַלְקוֹשׁ, no a כַמָּטָר. El marcador debe colocarse junto a 'lluvia tardía'.
  revised_spanish_text: Me esperaban como a la lluvia, y abrían su boca de par en par para la lluvia tardía[a].
  revised_footnotes:
