translation:
  language: es
  text: Como cuando Dios[a] destruyó a Sodoma, a Gomorra y a sus ciudades vecinas, declara Yahvé, no vivirá allí ningún hombre[b], ni morará en ella ningún hijo de hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus vecinas»; es decir, las ciudades o asentamientos vecinos asociados con Sodoma y Gomorra.'
    reason: lexical_alternative
  - marker: b
    text: 'O «ni morará en ella ningún ser humano». Hebreo: «ni morará en ella ningún hijo de hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/מַהְפֵּכַת
  english_pob_choice: As when ... overthrew
  chosen_spanish: Como cuando ... destruyó
  alternatives_spanish:
  - Como en la destrucción de
  - Como el derrocamiento de
  lexicon: HALOT
  rationale: La partícula comparativa כְּ pide una comparación introducida naturalmente por «como cuando». מַהְפֵּכָה expresa una catástrofe de destrucción/derrocamiento; en español, «destruyó» comunica con claridad el acto devastador sin perder la fuerza del sustantivo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים es sujeto del juicio sobre Sodoma y Gomorra, por lo que «Dios» es la traducción directa y natural en español.
- source_word: שְׁכֵנֶיהָ
  english_pob_choice: their neighboring towns
  chosen_spanish: sus ciudades vecinas
  alternatives_spanish:
  - sus vecinas
  - los pueblos vecinos
  lexicon: HALOT
  rationale: La forma hebrea significa literalmente «sus vecinos» o «las cosas vecinas de ella»; en contexto se refiere a asentamientos/ciudades colindantes. «Ciudades vecinas» explicita el referente colectivo que la audiencia entiende por el contexto de juicio regional.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética breve y solemne. El nombre divino se vierte como «Yahvé» conforme al estándar del proyecto, sin sustituirlo por una máscara litúrgica.
- source_word: יֵשֵׁב
  english_pob_choice: will live
  chosen_spanish: vivirá
  alternatives_spanish:
  - se asentará
  - habitará
  lexicon: HALOT
  rationale: En fórmulas de desolación, יֵשֵׁב puede significar habitar o vivir en un lugar. «Vivirá allí» mantiene el sentido idiomático y el paralelismo con la segunda cola.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: ningún hombre
  alternatives_spanish:
  - nadie
  - ninguna persona
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino representativo. Se conserva esa fuerza con «ningún hombre», en lugar de neutralizarla sin necesidad.
- source_word: יָגוּר
  english_pob_choice: will dwell
  chosen_spanish: morará
  alternatives_spanish:
  - habitará
  - residirá
  lexicon: HALOT
  rationale: La raíz גור puede significar morar, habitar o residir. «Morará» conserva el valor de residencia y el tono bíblico sin sonar arcaico en exceso.
- source_word: בֶּן אָדָם
  english_pob_choice: son of man
  chosen_spanish: ningún ser humano
  alternatives_spanish:
  - ningún hijo de hombre
  - ningún mortal
  lexicon: HALOT
  rationale: Aunque la expresión es literalmente «hijo de hombre», aquí funciona en paralelo con אִישׁ y como designación genérica de un humano. En español, «ser humano» comunica ese valor referencial sin introducir una expresión extraña; se mantiene la tensión semántica en la nota.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo emplea directamente el Tetragrámaton. Conforme al estándar del proyecto, se traduce con el nombre propio «Yahvé», preservando la referencia al nombre de pacto y evitando la máscara reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance de la desolación y del paralelismo final
  english_pob_reading: no man will live there, and no son of man will dwell in her
  chosen_spanish_reading: no vivirá allí ningún hombre, ni morará allí ningún ser humano
  alternative_spanish_readings:
  - nadie vivirá allí, ni residirá allí ningún mortal
  - no habitará allí ningún hombre, ni ningún hijo de hombre
  rationale: 'El hebreo usa dos miembros paralelos con matices distintos: אִישׁ y בֶּן אָדָם. La versión española conserva el paralelismo semántico sin forzar una repetición idéntica, y mantiene la intensidad de la profecía de desolación.'
  doctrine_reference: Poética profética / paralelismo hebreo
