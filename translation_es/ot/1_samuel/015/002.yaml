translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: «He tomado nota[a] de lo que Amalec hizo a Israel, de cómo se le opuso[b][c] en el camino cuando subía de Egipto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He castigado por lo que Amalec hizo a Israel», o «He recordado lo que Amalec hizo a Israel». El verbo hebreo puede abarcar la idea de atender a algo, recordarlo o visitarlo con juicio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se puso contra él en el camino»; posiblemente, «le tendió una emboscada en el camino». La expresión hebrea se refiere a la acción hostil de Amalec contra Israel durante el éxodo.'
    reason: lexical_alternative
  - marker: c
    text: «Le» se refiere a Israel como singular colectivo.
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética se conserva con una expresión natural en español que mantiene el tono solemne sin volverse arcaica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino, no sustitución por un título.'
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: En español, «de los ejércitos» comunica con claridad el título divino y evita un calco menos natural como «de los hosts».
- source_word: פָּקַדְתִּי
  english_pob_choice: I have taken note of
  chosen_spanish: He tomado nota de
  alternatives_spanish:
  - He recordado
  - He visitado con juicio
  - He castigado por
  lexicon: HALOT
  rationale: פקד puede implicar recordar, atender o visitar con juicio. «He tomado nota de» preserva la atención divina al hecho y deja intacta la tensión hacia el juicio inmediato del contexto.
- source_word: אֵת אֲשֶׁר עָשָׂה עֲמָלֵק לְיִשְׂרָאֵל
  english_pob_choice: what Amalek did to Israel
  chosen_spanish: lo que Amalec hizo a Israel
  alternatives_spanish:
  - lo que Amalec hizo contra Israel
  - lo que Amalec le hizo a Israel
  lexicon: HALOT
  rationale: «Hizo a Israel» reproduce de modo directo la amplitud del hebreo y evita introducir una paráfrasis más interpretativa en el texto principal.
- source_word: אֲשֶׁר שָׂם ל/וֹ בַּ/דֶּרֶךְ
  english_pob_choice: how he opposed him on the way
  chosen_spanish: de cómo lo hostigó en el camino
  alternatives_spanish:
  - de cómo lo opuso en el camino
  - de cómo le tendió una emboscada en el camino
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y hostil. «Hostigó» conserva la idea de agresión/oposición durante el trayecto sin forzar el texto a una imagen militar más específica que la evidencia no exige.
- source_word: לוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - le
  lexicon: HALOT
  rationale: Aunque el referente es colectivo («Israel»), el hebreo usa pronombre singular masculino; en español se mantiene la referencia con objeto directo singular por concordancia con el verbo transitivo.
- source_word: בַּעֲלֹתוֹ מִמִּצְרַיִם
  english_pob_choice: when he came up from Egypt
  chosen_spanish: cuando subía de Egipto
  alternatives_spanish:
  - cuando salió de Egipto
  - cuando Israel subía de Egipto
  lexicon: HALOT
  rationale: «Subía de Egipto» reproduce el verbo de ascenso como idiomático bíblico y conserva el valor colectivo singular del antecedente sin sobreespecificar.
theological_decisions:
- issue: Título divino יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  rationale: Se preserva el nombre divino y se traduce el título con una expresión española clara y reverente. «Ejércitos» mantiene la amplitud del hebreo sin restringirlo solo a tropas humanas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of divine remembrance/judgment in פָּקַדְתִּי
  english_pob_reading: I have taken note of
  chosen_spanish_reading: He tomado nota de
  alternative_spanish_readings:
  - He castigado por
  - He recordado
  rationale: La forma elegida conserva la tensión entre memoria divina y juicio inminente. No adelanta en el verbo principal lo que el contexto narrativo desplegará enseguida.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se mantuvo la fórmula profética, el nombre divino Yahweh/Yahvé, el título ''of hosts''/''de los ejércitos'', y la tensión semántica de פָּקַדְתִּי. La decisión sobre אֲשֶׁר שָׂם לוֹ בַּדֶּרֶךְ priorizó una opción española natural (''hostigó'') sin perder el sentido de oposición hostil; se conservó el referente singular colectivo en el pronombre.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se usa «Amalec» como forma española estable del nombre propio.
  - Se mantiene el pronombre singular «lo» para Israel como colectivo, coherente con el hebreo y con el audit trail inglés.
  - «Ejércitos» se escogió para צְבָאוֹת por claridad y naturalidad en español bíblico contemporáneo.
