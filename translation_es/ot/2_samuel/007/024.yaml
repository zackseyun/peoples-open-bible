translation:
  language: es
  text: Y tú estableciste a tu pueblo Israel para ti, para ser tu pueblo para siempre, y tú, Yahvé[b], llegaste a ser su Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fuiste su Dios». El hebreo puede traducirse de manera estativa, pero «llegaste a ser su Dios» refleja mejor el sentido de constitución pactal en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «YHWH». El nombre divino se rinde aquí como «Yahvé» para preservar el Tetragrámaton.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתְּכ֣וֹנֵֽן
  english_pob_choice: established
  chosen_spanish: estableciste
  alternatives_spanish:
  - confirmaste
  - afianzaste
  lexicon: HALOT
  rationale: La forma verbal comunica la acción de fijar o consolidar a Israel en su identidad pactal. "Estableciste" es natural en español y conserva la fuerza de hacer firme o instituir.
- source_word: לְךָ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - para tu propio uso
  lexicon: HALOT
  rationale: El dativo expresa pertenencia y destinación pactal. En español, "para ti" mantiene esa relación sin volverse artificial.
- source_word: עַמְּךָ יִשְׂרָאֵל
  english_pob_choice: your people Israel
  chosen_spanish: a tu pueblo Israel
  alternatives_spanish:
  - tu pueblo Israel
  - Israel, tu pueblo
  lexicon: HALOT
  rationale: Se conserva la aposición entre "tu pueblo" e "Israel". El acusativo puede reproducirse con "a" para dar fluidez en español sin perder el valor de objeto directo.
- source_word: לְךָ לְעָם
  english_pob_choice: to be your people
  chosen_spanish: para ser tu pueblo
  alternatives_spanish:
  - como tu pueblo
  - para constituir tu pueblo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática de identidad pactal, no solo clasificación social. "Para ser tu pueblo" refleja esa finalidad constitutiva.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: La frase indica permanencia duradera. "Para siempre" es claro, natural y suficientemente fuerte en español contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de rendir el Tetragrámaton con el nombre propio "Yahvé", preservando la referencia directa al nombre divino revelado.
- source_word: הָיִיתָ לָהֶם לֵאלֹהִים
  english_pob_choice: became their God
  chosen_spanish: llegaste a ser su Dios
  alternatives_spanish:
  - fuiste su Dios
  - eras su Dios
  lexicon: HALOT
  rationale: El hebreo con היה + ל expresa una relación pactal constituida o asumida en contexto. "Llegaste a ser" preserva el matiz verbal que el audit trail inglés defendió frente al simple estado "eras".
theological_decisions:
- issue: Relación de pacto entre Yahvé e Israel
  english_pob_reading: you established your people Israel for yourself to be your people forever, and you, Yahweh, became their God
  chosen_spanish_reading: y tú estableciste a tu pueblo Israel para ti, para ser tu pueblo para siempre, y tú, Yahvé, llegaste a ser su Dios
  alternative_spanish_readings:
  - y tú estableciste a tu pueblo Israel para ti, para que fuera tu pueblo para siempre, y tú, Yahvé, fuiste su Dios
  - y tú confirmaste a tu pueblo Israel para ti, para ser tu pueblo para siempre, y tú, Yahvé, eras su Dios
  rationale: 'El versículo formula la reciprocidad clásica del pacto: Israel como pueblo de Yahvé y Yahvé como Dios de Israel. "Llegaste a ser" respeta la fuerza de constitución relacional destacada por el audit trail inglés sin convertirla en una simple copula estática.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Nombre divino en el vocativo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: Se evita la sustitución tradicional por un título, siguiendo la política del proyecto de transliterar el nombre divino. En este contexto, la vocación directa a Yahvé debe conservarse como nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado mantuvo la decisión de traducir יהוה como «Yahweh» y de preferir «became their God» frente a «were their God» por el matiz de constitución pactal. La versión española sigue esas dos decisiones, adaptándolas a «Yahvé» y «llegaste a ser su Dios», con ajuste natural de la sintaxis española. No se introdujeron variantes textuales ni cambios doctrinales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conserva la reciprocidad pactal sin reemplazarla por fórmulas eclesiales tradicionales.
  - «pueblo» se usa para עַם con sentido corporativo y pactal, no como simple masa social.
  - La puntuación conserva una cadencia solemne y publicable en español bíblico moderno.
