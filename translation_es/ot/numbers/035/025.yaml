base_translation:
  language: en
  yaml_path: translation/ot/numbers/035/025.yaml
  text: Then the congregation shall rescue the manslayer from the hand of the avenger of blood[a], and the congregation shall return him to his city of refuge, to which he fled; and he shall live in it until the death of the high priest[c][b], whom he was anointed with the holy oil.
  footnotes:
  - marker: a
    text: Or 'the blood avenger.' The Hebrew phrase refers to the person with legal responsibility to avenge the shedding of blood, often a near kinsman.
    reason: lexical_alternative
  - marker: b
    text: Or 'he shall remain in it' or 'he shall dwell in it.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'whom he anointed with the holy oil.' The subject of 'anointed' is not stated explicitly here; many translations smooth this to 'who had been anointed.'
    reason: alternative_reading
