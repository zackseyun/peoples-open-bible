revisions:
- from: 'Y de los hijos de Mani: Olamo[a], Mamucus, Jedaeo, Jasubus, Asael[b] y Jeremot.'
  to: 'Y de los hijos de Mani[a]: Olamo, Mamucus, Jedaeo, Jasubus, Asael[b] y Jeremoth.'
  rationale: Se corrige el anclaje de la nota [a] para que recaiga sobre «Mani», que es el nombre al que la nota se refiere. Se mantiene la estructura y el español natural del versículo. Se ajusta «Jeremot» a «Jeremoth» para reflejar mejor la forma griega documentada en la auditoría. Aunque «Mamucus» podría también revisarse a «Mamuchus» para una fidelidad transliterativa más estricta, el cambio indispensable aquí es el anclaje de nota y la forma final de «Jeremoth»; el resto del texto sigue siendo comprensible y sustancialmente fiel.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:24:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura de lista y la prioridad de la forma griega de 1 Esdras sobre la armonización con Esdras hebreo. Sin embargo, varias transliteraciones de nombres fueron adaptadas de manera innecesaria o inconsistente con la evidencia griega y con la auditoría inglesa: «Mamucus» omite la h/ch de Μάμουχος, y «Jeremot» simplifica de más Ἰερεμώθ frente a la forma auditada «Jeremoth». «Olamo» y «Jedaeo» son más defendibles como adaptaciones españolas, pero conviene uniformar el criterio de transliteración para no mezclar castellanización parcial con formas casi inglesas/griegas.'
  spanish_quality_summary: 'El español es legible y natural en la fórmula introductoria: «Y de los hijos de Mani». La puntuación de la lista final también es aceptable en español. La principal mejora necesaria es la consistencia y fidelidad de los nombres propios. También hay un problema de anclaje de nota: la nota [a] trata sobre «Mani», pero el marcador está puesto en «Olamo», lo cual debe corregirse.'
  glossary_alignment: 'No hay términos teológicos de alto impacto aquí. El tratamiento de nombres propios debe seguir la política del proyecto: fuente griega primaria en el texto principal, con alternativas hebreas solo en nota cuando corresponda. La nota sobre Mani/Bani está bien en contenido, pero debe anclarse a «Mani». La nota general sobre formas hebreas paralelas también es apropiada.'
  issues:
  - severity: high
    issue: La nota [a] está anclada al nombre equivocado.
    rationale: El contenido de la nota [a] explica «Mani» frente a «Bani», pero en el texto actual el marcador aparece en «Olamo[a]». Esto crea un desajuste factual entre texto y nota.
  - severity: medium
    issue: «Mamucus» no refleja bien la forma griega Μάμουχος.
    rationale: La auditoría inglesa documenta «Mamuchus» como transliteración principal. «Mamucus» elimina el elemento representado por χ de manera injustificada y se aleja del criterio fuente-céntrico.
  - severity: medium
    issue: «Jeremot» probablemente adapta en exceso Ἰερεμώθ.
    rationale: La forma inglesa auditada «Jeremoth» preserva mejor la consonante final representada en la transliteración. En español bíblico legible, «Jeremot» puede sonar truncado y menos fiel al nombre de la fuente.
  - severity: low
    issue: Las transliteraciones están aplicadas con criterio desigual.
    rationale: El borrador mezcla formas parcialmente castellanizadas («Olamo», «Jedaeo») con otras casi calcadas del inglés/griego («Jasubus», «Asael»). Aunque no todo requiere cambio, una revisión mínima debe priorizar consistencia en los casos más problemáticos.
  revised_spanish_text: 'Y de los hijos de Mani[a]: Olamo, Mamucus, Jedaeo, Jasubus, Asael[b] y Jeremoth.'
  revised_footnotes:
