translation:
  language: es
  text: Así, estas naciones temían a Yahvé[a], pero servían a sus imágenes talladas. Sus hijos también, y los hijos de sus hijos, como hicieron sus padres, así lo hacen hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ídolos» para «sus imágenes talladas». El hebreo se refiere específicamente a imágenes hechas por talla.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: So ... were
  chosen_spanish: Así ...
  alternatives_spanish:
  - Entonces ...
  - De modo que ...
  lexicon: HALOT
  rationale: La forma narrativa conclusiva del waw consecutivo se expresa bien con «Así», que mantiene el valor de resumen y enlace sin sonar mecánico.
- source_word: הַגּוֹיִם הָאֵלֶּה
  english_pob_choice: these nations
  chosen_spanish: estas naciones
  alternatives_spanish:
  - estos pueblos
  - estos gentiles
  lexicon: HALOT
  rationale: En este contexto se refiere a los grupos extranjeros asentados en Samaria; «naciones» conserva esa referencia étnica de manera natural en español.
- source_word: יְרֵאִים אֶת־יְהוָה
  english_pob_choice: feared Yahweh
  chosen_spanish: temían a Yahvé
  alternatives_spanish:
  - reverenciaban a Yahvé
  - temían reverentemente a Yahvé
  lexicon: HALOT
  rationale: El giro hebreo ירא את־יהוה se vierte con el verbo «temer» para conservar el modismo bíblico y su fuerza religiosa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, manteniendo el nombre divino en vez de sustituirlo por un título.
- source_word: וְאֶת פְּסִילֵיהֶם
  english_pob_choice: their carved images
  chosen_spanish: sus imágenes talladas
  alternatives_spanish:
  - sus ídolos
  - sus imágenes esculpidas
  lexicon: HALOT
  rationale: פְּסִילִים son imágenes hechas por talla; «imágenes talladas» conserva la concreción material del hebreo sin perder claridad.
- source_word: הָיוּ עֹבְדִים
  english_pob_choice: they were serving
  chosen_spanish: estaban sirviendo
  alternatives_spanish:
  - servían
  - estaban rindiendo culto
  lexicon: HALOT
  rationale: La construcción perífrastica transmite la acción habitual o continua del hebreo y «servir» mantiene la amplitud cultual de עבד.
- source_word: גַּם בְּנֵיהֶם וּבְנֵי בְנֵיהֶם
  english_pob_choice: Their children also, and their children's children
  chosen_spanish: También sus hijos y los hijos de sus hijos
  alternatives_spanish:
  - También sus hijos y sus nietos
  - También sus descendientes y los descendientes de sus hijos
  lexicon: HALOT
  rationale: Se conserva la cadena generacional con un español natural. «Hijos» puede abarcar descendencia masculina o, por extensión, la posteridad en este contexto genealógico.
- source_word: כַּאֲשֶׁר עָשׂוּ אֲבֹתָם
  english_pob_choice: as their fathers did
  chosen_spanish: como hicieron sus padres
  alternatives_spanish:
  - tal como hicieron sus padres
  - según hicieron sus padres
  lexicon: HALOT
  rationale: «Padres» reproduce el término ancestral del hebreo y mantiene el paralelismo comparativo de forma transparente.
- source_word: הֵם עֹשִׂים
  english_pob_choice: so they are doing
  chosen_spanish: así están haciendo
  alternatives_spanish:
  - así lo hacen
  - así siguen haciendo
  lexicon: HALOT
  rationale: La forma participial indica práctica vigente; «están haciendo» conserva esa continuidad sin forzar una traducción demasiado idiomática.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Es la equivalencia idiomática directa y solemne del hebreo temporal.
theological_decisions:
- issue: Tensión entre temor a Yahvé y servicio idólatra
  english_pob_reading: 'The verse is translated to preserve the tension: they ''feared Yahweh, yet they were serving their carved images.'''
  chosen_spanish_reading: 'Se conserva la tensión: «temían a Yahvé, pero estaban sirviendo a sus imágenes talladas».'
  alternative_spanish_readings:
  - temían a Yahvé y, aun así, servían a sus ídolos
  - fingían temer a Yahvé mientras servían a sus imágenes
  rationale: El hebreo afirma ambas realidades sin resolver si ese temor era sincero, sincrético o meramente externo. El español debe mantener esa coexistencia sin añadir juicio interpretativo.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Se ha tenido en cuenta que la revisión más reciente no requirió cambios y que el pasaje mantiene el mismo planteamiento de la edición inglesa: conservar la tensión entre el temor a Yahvé y la práctica idolátrica, además de la referencia concreta a imágenes talladas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se opta por «imágenes talladas» para פְּסִילִים, preservando la concreción material del hebreo.
  - «Temían» y «estaban sirviendo» mantienen el contraste y el aspecto continuo del original.
  - «Hasta el día de hoy» conserva la fórmula temporal hebrea sin necesidad de explicación adicional en el texto principal.
