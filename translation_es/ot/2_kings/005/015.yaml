translation:
  language: es
  text: 'Entonces volvió al hombre de Dios[a], él y todo su séquito; llegó, se presentó ante él y dijo: «Ahora veo que no hay Dios en toda la tierra sino en Israel. Y ahora, por favor, acepta un regalo de parte de tu siervo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más literalmente, «una bendición». Aquí el término hebreo se refiere a un regalo o presente.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta de Dios
  lexicon: HALOT
  rationale: Conservo el título idiomático hebreo en vez de explicarlo como 'profeta', porque el sustantivo 'hombre de Dios' reproduce mejor la fórmula narrativa y su resonancia literaria.
- source_word: מַחֲנֵהוּ
  english_pob_choice: his company
  chosen_spanish: todo su séquito
  alternatives_spanish:
  - todo su campamento
  - su comitiva
  lexicon: HALOT
  rationale: En este contexto narrativo no se trata de un campamento militar literal, sino de la gente que lo acompaña. 'Séquito' comunica el grupo acompañante de forma natural en español.
- source_word: וַיַּעֲמֹד לְפָנָיו
  english_pob_choice: stood before him
  chosen_spanish: se puso delante de él
  alternatives_spanish:
  - se presentó delante de él
  - estuvo de pie delante de él
  lexicon: HALOT
  rationale: La expresión hebrea describe comparecer en la presencia de alguien. 'Se puso delante de él' conserva la escena sin sonar forzado en español.
- source_word: הִנֵּה נָא
  english_pob_choice: See now
  chosen_spanish: Mira, ahora
  alternatives_spanish:
  - Mira, por favor
  - He aquí, ahora
  lexicon: HALOT
  rationale: La combinación expresa atención enfática; 'Mira, ahora' mantiene esa fuerza con un giro natural y no arcaico.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - he llegado a saber
  - he reconocido
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un conocimiento adquirido que ya se asume como estado presente. 'Sé' transmite bien ese resultado en español.
- source_word: אֵין אֱלֹהִים בְּכָל הָאָרֶץ כִּי אִם בְּיִשְׂרָאֵל
  english_pob_choice: there is no God in all the earth except in Israel
  chosen_spanish: no hay Dios en toda la tierra sino en Israel
  alternatives_spanish:
  - no hay dios en toda la tierra excepto en Israel
  - no hay Dios en toda la tierra, salvo en Israel
  lexicon: HALOT
  rationale: Sigo la fuerza exclusiva del hebreo sin expandir el sentido. 'Dios' con mayúscula expresa el referente verdadero en el marco narrativo; 'sino en Israel' conserva la localización del texto sin añadir palabras ajenas.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - en medio de Israel
  lexicon: HALOT
  rationale: El hebreo sitúa la presencia/conocimiento de Dios 'en Israel'; no se amplía a 'el Dios de Israel' porque eso añade contenido no dicho en la cláusula.
- source_word: בְרָכָה
  english_pob_choice: a gift
  chosen_spanish: un regalo
  alternatives_spanish:
  - una bendición
  - un presente
  lexicon: HALOT
  rationale: Aunque literalmente significa 'bendición', aquí funciona como dádiva entregada. 'Regalo' comunica con claridad el valor idiomático y evita una lectura engañosa.
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En esta fórmula de cortesía directa, 'siervo' preserva la deferencia personal. No empleo 'esclavo' porque aquí el punto no es el estatus jurídico sino el registro reverencial del hablante.
- source_word: קַח נָא
  english_pob_choice: please accept
  chosen_spanish: por favor, acepta
  alternatives_spanish:
  - recibe, por favor
  - te ruego que aceptes
  lexicon: HALOT
  rationale: El imperativo hebreo más la partícula de ruego expresan una petición cortés. 'Por favor, acepta' conserva la fuerza interpersonal de la oferta en español.
theological_decisions:
- issue: Confesión de unicidad divina en boca de Naamán
  english_pob_reading: Render as a straightforward confession of the uniqueness of Israel's God without softening or systematizing it.
  chosen_spanish_reading: Se presenta como una confesión directa de que no hay Dios en toda la tierra sino en Israel, sin suavizarla ni reformularla teológicamente.
  alternative_spanish_readings:
  - no hay dios en toda la tierra...
  - no hay Dios, excepto el Dios de Israel, en Israel
  rationale: El hebreo expresa una declaración fuerte y exclusiva. Mantengo esa fuerza en español y no la amplío con una paráfrasis doctrinal que vaya más allá del texto.
  doctrine_reference: Afirmación de la unicidad de Dios; filosofía de traducción §§1, 3, 6
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del inglés al usar 'Y ahora' en vez de una transición más conclusiva, y mantiene la secuencia narrativa sin repetir innecesariamente el sujeto. También refleja la decisión auditada de reservar 'bendición' como alternativa literal en nota y de traducir el título hebreo idiomáticamente como 'el hombre de Dios'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' con mayúscula para el referente verdadero en el contexto narrativo.
  - '''Siervo'' se usa como fórmula deferencial, no como sustituto general de ''esclavo''.'
  - '''Séquito'' evita sugerir un campamento militar literal.'
  - La nota al pie conserva la tensión léxica entre 'regalo' y 'bendición' sin borrar ninguna de las dos posibilidades.
