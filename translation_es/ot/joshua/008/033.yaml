revisions:
- from: Y todo Israel[a], con sus ancianos, oficiales y jueces, estaba de este lado y de aquel lado del arca, frente a los sacerdotes levitas que llevaban el arca del pacto de Yahvé, tanto el forastero residente[b] como el nativo por igual. La mitad de ellos estaba delante del monte Gerizim y la otra mitad delante del monte Ebal, tal como Moisés, siervo de Yahvé, había mandado al principio, para bendecir al pueblo de Israel.
  to: Y todo Israel[a], con sus ancianos, oficiales y jueces, estaba de este lado y de aquel lado del arca, frente a los sacerdotes levitas llevando el arca del pacto de Yahvé, tanto el forastero residente[b] como el nativo por igual. La mitad de ellos estaba delante del monte Gerizim y la otra mitad delante del monte Ebal, tal como Moisés, siervo de Yahvé, había mandado al principio[c], para bendecir al pueblo de Israel.
  rationale: Se ajusta 'que llevaban' a 'llevando' para seguir más de cerca el participio hebreo y la decisión revisada del inglés POB, y se añade la nota faltante sobre 'al principio' para preservar la ambigüedad lexical documentada de בָּרִאשֹׁנָה.
