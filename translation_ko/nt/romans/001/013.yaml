source:
  edition: SBLGNT
  text: οὐ θέλω δὲ ὑμᾶς ἀγνοεῖν, ἀδελφοί, ὅτι πολλάκις προεθέμην ἐλθεῖν πρὸς ὑμᾶς, καὶ ἐκωλύθην ἄχρι τοῦ δεῦρο, ἵνα τινὰ καρπὸν σχῶ καὶ ἐν ὑμῖν καθὼς καὶ ἐν τοῖς λοιποῖς ἔθνεσιν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/001/013.yaml
  text: Now I do not want you to be unaware[a], brothers, that I have often planned to come to you—but have been prevented until now—so that I might have some fruit among you also[c][b], just as among the rest of the Gentiles.
  footnotes:
  - marker: a
    text: Or 'brothers and sisters.'
    reason: lexical_alternative
  - marker: b
    text: '''Fruit'' here refers to the results of Paul''s ministry among them.'
    reason: cultural_note
  - marker: c
    text: Or 'the other nations.'
    reason: lexical_alternative
translation:
  language: ko
  text: 형제들이여[a], 나는 여러분이 모르고 있기를 원하지 않습니다. 내가 여러 번 여러분에게 가려고 계획했으나 지금까지 막혔습니다 — 이는 다른 이방인들 가운데서와 같이 여러분 가운데서도 어떤 열매를 거두기 위함이었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「형제자매 여러분」. 헬라어 ἀδελφοί는 남성 복수형이나 회중 전체를 가리키는 포괄 용법이다.
    reason: lexical_alternative
