translation:
  language: es
  text: Traigan un manto real, que el rey ha usado, y un caballo en el que el rey ha montado, y sobre cuya cabeza[a] se ha puesto una corona real.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y sobre su cabeza fue puesta una corona real». El pronombre se entiende más naturalmente como referido al caballo, aunque algunos lectores lo han entendido como referido al rey.
    reason: alternative_reading
lexical_decisions:
- source_word: יָבִיאוּ
  english_pob_choice: Let them bring
  chosen_spanish: Traigan
  alternatives_spanish:
  - Que traigan
  - Lleven
  lexicon: HALOT
  rationale: El imperfecto causativo en este contexto funciona como instrucción dentro del discurso directo; el imperativo plural español expresa con naturalidad esa fuerza volitiva sin añadir contenido.
- source_word: לְבוּשׁ מַלְכ֔וּת
  english_pob_choice: a royal robe
  chosen_spanish: un manto real
  alternatives_spanish:
  - una vestidura real
  - un traje real
  lexicon: HALOT
  rationale: El sintagma denota una prenda asociada con la realeza. «Manto» comunica bien una pieza distintiva y ceremonial en español, sin volverla demasiado moderna ni demasiado técnica.
- source_word: אֲשֶׁ֥ר לָֽבַשׁ בּ֖וֹ הַמֶּלֶךְ
  english_pob_choice: that the king has worn
  chosen_spanish: que el rey ha usado
  alternatives_spanish:
  - que el rey llevó
  - que el rey se puso
  lexicon: HALOT
  rationale: La cláusula relativa identifica la prenda como una que realmente estuvo sobre el rey. «Ha usado» evita un calco torpe de «vestir en él» y conserva el sentido de uso real y verificable.
- source_word: וְסוּס
  english_pob_choice: and a horse
  chosen_spanish: y un caballo
  alternatives_spanish:
  - y el caballo
  - y un corcel
  lexicon: HALOT
  rationale: El sustantivo introduce un segundo elemento del desfile. «Un caballo» es el equivalente natural e inequívoco; «corcel» sería más literario pero menos neutro.
- source_word: אֲשֶׁ֨ר רָכַ֤ב עָלָי/ו֙ הַמֶּ֔לֶךְ
  english_pob_choice: on which the king has ridden
  chosen_spanish: en el que el rey ha montado
  alternatives_spanish:
  - sobre el que el rey cabalgó
  - que el rey montó
  lexicon: HALOT
  rationale: La preposición עַל pide una formulación que conserve la relación espacial. «Montar en» es el giro natural en español para un caballo y mantiene la referencia a un caballo efectivamente usado por el rey.
- source_word: וַאֲשֶׁ֥ר נִתַּ֛ן
  english_pob_choice: and on whose ... has been placed
  chosen_spanish: y sobre cuya cabeza se ha puesto
  alternatives_spanish:
  - y sobre la cual se ha puesto
  - y a cuya cabeza se ha puesto
  lexicon: HALOT
  rationale: La construcción pasiva introduce una descripción adicional del caballo. Reordenar como «sobre cuya cabeza se ha puesto» suena natural en español y preserva la idea de colocación encima.
- source_word: כֶּ֥תֶר מַלְכ֖וּת
  english_pob_choice: a royal crown
  chosen_spanish: una corona real
  alternatives_spanish:
  - la corona real
  - una corona de realeza
  lexicon: HALOT
  rationale: La expresión indica una corona vinculada a la realeza. Como el hebreo no lleva artículo, «una corona real» corresponde mejor que «la corona real» y es la opción más idiomática.
- source_word: בְּרֹאשֽׁוֹ
  english_pob_choice: on whose head
  chosen_spanish: sobre cuya cabeza
  alternatives_spanish:
  - en su cabeza
  - sobre su cabeza
  lexicon: HALOT
  rationale: El sufijo de tercera persona singular se entiende más naturalmente referido al caballo en el contexto inmediato. «Sobre cuya cabeza» evita la ambigüedad de género y conserva la relación gramatical con la cláusula relativa.
theological_decisions:
- issue: 'Referente del pronombre final («su cabeza»): caballo o rey'
  english_pob_reading: The pronoun most naturally refers to the horse, though some readers have understood it to refer to the king.
  chosen_spanish_reading: El pronombre se entiende más naturalmente del caballo.
  alternative_spanish_readings:
  - Puede entenderse del rey.
  - Algunos lo toman como referencia al rey.
  rationale: La sintaxis inmediata y el encadenamiento de las cláusulas relativas favorecen que el pronombre final retome al caballo. Mantener esa lectura conserva la observación auditada del texto inglés sin eliminar la ambigüedad histórica de algunos lectores.
  doctrine_reference: N/A (observación exegética, no doctrinal)
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo masorético de Ester 6:8 y el audit trail inglés. No se detectaron revisiones textuales o cambios de edición relevantes en el contexto proporcionado; la redacción española mantiene la ambigüedad señalada en la nota inglesa sobre el referente del pronombre final.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - «Manto real» y «corona real» preservan el campo semántico de realeza sin introducir terminología eclesiástica ajena.
  - Se mantuvo el tono imperativo del hebreo con «Traigan».
  - La nota al pie marca la alternativa exegética sin sobrecargar el texto principal.
