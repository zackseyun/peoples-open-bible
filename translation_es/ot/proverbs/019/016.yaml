translation:
  language: es
  text: Quien guarda el mandamiento guarda su vida[a]; el que desprecia sus caminos[b] morirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo נֶפֶשׁ; según el contexto puede significar «vida», «ser» o «alma».
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus caminos» como «su conducta»; algunos entienden también «sus caminos» como «los caminos de Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: שֹׁמֵר
  english_pob_choice: keeps
  chosen_spanish: guarda
  alternatives_spanish:
  - observa
  - mantiene
  lexicon: HALOT
  rationale: El participio expresa una acción continua de guardar/cuidar/observar. «Guarda» comunica bien en español la idea de atención fiel al mandamiento sin perder la fuerza de vigilancia del hebreo.
- source_word: מִצְוָה
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - un mandamiento
  - el precepto
  lexicon: HALOT
  rationale: El singular proverbial se mantiene con artículo definido para reflejar el valor general y normativo del hebreo. «Mandamiento» conserva mejor el peso concreto del término que una formulación más abstracta.
- source_word: נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - sí mismo
  lexicon: HALOT
  rationale: En Proverbios, נֶפֶשׁ suele referirse a la vida o al ser de la persona; «su vida» encaja con el paralelismo vida/muerte del verso y evita cargar el texto con una antropología posterior.
- source_word: בּוֹזֵה
  english_pob_choice: despises
  chosen_spanish: desprecia
  alternatives_spanish:
  - desprecia con soberbia
  - menosprecia
  - desafía
  lexicon: HALOT
  rationale: «Desprecia» comunica con claridad el matiz de desdén y rechazo moral del participio, en un registro natural para sabiduría bíblica en español.
- source_word: דְרָכָיו
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - su conducta
  - su manera de vivir
  lexicon: HALOT
  rationale: «Caminos» conserva la metáfora hebrea y la pluralidad del original. El sufijo posesivo se entiende aquí de manera natural como referencia a los propios caminos del sujeto, sin introducir un referente divino que no está explícito en el hebreo.
- source_word: יומת
  english_pob_choice: will die
  chosen_spanish: morirá
  alternatives_spanish:
  - será muerto
  - será puesto a muerte
  lexicon: HALOT
  rationale: Aunque la forma hebrea es pasiva, la redacción proverbial puede expresarse de modo directo en español con «morirá», tal como refleja la revisión auditada del inglés POB, sin añadir un agente no explicitado.
theological_decisions:
- issue: Referente de «sus caminos»
  english_pob_reading: refers to the subject's own ways/conduct, with possible ambiguity about God's ways noted in a footnote
  chosen_spanish_reading: se refiere de manera natural a los propios caminos o conducta del sujeto; queda abierta la posibilidad de entenderlo de otro modo
  alternative_spanish_readings:
  - sus caminos podrían entenderse como los caminos de Dios
  - sus caminos como el camino del mandamiento
  rationale: El posesivo hebreo apunta más naturalmente al sujeto inmediato y el paralelismo del proverbio contrasta guardar el mandamiento con despreciar la propia conducta. No obstante, la ambigüedad tradicional se preserva en nota, sin forzar un referente no explícito.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de נֶפֶשׁ
  english_pob_reading: life rather than soul/self in a later technical sense
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  - ser
  rationale: «Vida» evita importar una lectura doctrinal ajena al género sapiencial y corresponde al contraste inmediato con «morirá».
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La base inglesa fue revisada desde una formulación más literal («será puesto a muerte») a una más directa («morirá») para no sugerir un agente explícito no presente en el hebreo. La versión española sigue esa revisión y mantiene el paralelismo proverbial natural entre guardar/vida y despreciar/muerte.
  spanish_consistency_notes:
  - Se usa «mandamiento» en singular, como en el hebreo, para conservar el carácter genérico del proverbio.
  - «Vida» se mantiene para נֶפֶשׁ por coherencia con el campo semántico de Proverbios y el contraste con «morirá».
  - Se evita «SEÑOR» o «Cristo» porque el versículo no contiene un nombre divino ni un título mesiánico.
  - «Caminos» conserva la metáfora hebrea y no se sustituye por una glosa explicativa en el texto principal.
