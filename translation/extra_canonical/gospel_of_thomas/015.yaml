translation:
  text: Jesus said[a], "When you see the one who was not born from a woman, throw
    yourselves down upon your faces and worship him[d][c][b]. That one is your Father."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Not born from a woman" evokes biblical idiom (cf. Matt 11:11; Job 14:1)
      but the identification with "your Father" is distinctive to Thomas.'
    reason: cross_reference
  - marker: b
    text: The idiom could be rendered "prostrate yourselves" for a more conventional
      liturgical tone, but "throw yourselves down" preserves Thomas’s stark diction.
    reason: lexical_alternative
  - marker: c
    text: ⲣⲉⲙⲙⲁⲩ is a deictic "that one," strengthening the demonstrative force rather
      than a simple "he."
    reason: dialect_note
  - marker: d
    text: Or 'upon your face'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  chosen: Jesus said
  alternatives:
  - Jesus speaks
  lexicon: Layton, Grammar of Sahidic Coptic (copular clause with ⲡⲉϫⲉ + subject)
  rationale: ⲡⲉϫⲉ introduces direct speech; standard English "said" keeps Thomas’s
    terse cadence.
- source_word: ϩⲟⲧⲁⲛ
  chosen: when
  alternatives:
  - whenever
  lexicon: Crum, Coptic Dictionary (loan from Greek ὅταν)
  rationale: Temporal conjunction; plain "when" retains sharpness without adding modal
    nuance.
- source_word: ⲉⲣϣⲁⲛ_ⲛⲧⲱⲧⲛⲛⲁⲩ
  chosen: you see
  alternatives:
  - you will see
  - you come to see
  lexicon: Layton, Grammar (er-šan construction for prospective/future-like sense)
  rationale: The eršan construction often carries prospective aspect; in this context
    the temporal ϩⲟⲧⲁⲛ makes simple "see" natural in English while preserving the
    prospective sense.
- source_word: ⲡⲉⲧⲉ
  chosen: the one who
  alternatives:
  - whoever
  lexicon: Layton, Grammar (relative clause marker)
  rationale: Introduces a definite relative clause; Thomas’s specificity is preserved
    by "the one who" rather than open-ended "whoever."
- source_word: ⲙⲡⲉⲛⲧⲟⲟⲩϫⲡⲟⲛⲧⲟϥ
  chosen: was not born
  alternatives:
  - did not come into being
  - was not begotten
  lexicon: Crum, entries for ⲛⲧⲟⲟⲩ (beget/be born) and related birth/begetting idioms;
    Layton on first preterite negative ⲙⲡ-
  rationale: The clause describes origin; paired with ⲉⲃⲟⲗ ϩⲛ ⲡⲥϩⲓⲙⲉ, the idiom clearly
    targets birth from a woman. "Was not born" optimally balances literal and idiomatic
    English.
- source_word: ⲉⲃⲟⲗ ϩⲛⲡⲥϩⲓⲙⲉ
  chosen: from a woman
  alternatives:
  - out of woman
  - out from a woman
  lexicon: Crum, ⲥϩⲓⲙⲉ (woman); prepositional phrase ⲉⲃⲟⲗ ϩⲛ (out from) per Layton
  rationale: Standard birth idiom; "from a woman" is direct and keeps Thomas’s compact
    wording.
- source_word: ⲡⲱϩⲧ
  chosen: throw down / fall
  alternatives:
  - prostrate
  lexicon: Crum, ⲡⲱϩⲧ (to throw, cast down; fall)
  rationale: Imperative force toward bodily lowering; rendering as "throw yourselves
    down" keeps the vividness and strangeness.
- source_word: ⲧⲱⲧⲛ
  chosen: yourselves
  alternatives:
  - your own selves
  lexicon: Layton, reflexive use of ⲧⲱⲧ with pronominal suffix
  rationale: Marks reflexive action, intensifying the command.
- source_word: ⲉϫⲛⲡⲉⲧⲛϩⲟ
  chosen: upon your face
  alternatives:
  - on your faces
  lexicon: Crum, ⲛϩⲟ (face)
  rationale: Literal prepositional phrase; singular "face" with plural possessive
    is typical in Coptic; preserving singular keeps Thomas’s feel.
- source_word: ⲟⲩⲱϣⲧ
  chosen: worship
  alternatives:
  - make obeisance
  - revere
  lexicon: Crum, ⲟⲩⲱϣⲧ (worship, adore)
  rationale: Cultic posture fits the context following prostration; "worship" is the
    concise English equivalent.
- source_word: ⲛⲁⲛⲧⲟϥ
  chosen: him
  alternatives:
  - to him
  - toward him
  lexicon: Layton, prepositional ⲛⲁ + object pronoun
  rationale: Object of worship; English can drop the preposition without loss.
- source_word: ⲡⲉⲧⲉⲣⲉⲙⲙⲁⲩ
  chosen: that one
  alternatives:
  - that person
  - that one there
  lexicon: Crum, ⲣⲉⲙⲙⲁⲩ (that one)
  rationale: Deictic emphasis; "that one" retains Thomas’s pointed demonstrative.
- source_word: ⲡⲉ
  chosen: is
  alternatives:
  - is indeed
  lexicon: Layton, nominal sentence with ⲡⲉ copula
  rationale: Simple identification; no need to intensify.
- source_word: ⲡⲉⲧⲛⲉⲓⲱⲧ
  chosen: your Father
  alternatives:
  - your father
  lexicon: Crum, ⲉⲓⲱⲧ (father)
  rationale: Capitalization reflects divine reference without altering sense; possessive
    plural is retained.
textual_note: 'Dialect: Sahidic with common Greek loans (e.g., ϩⲟⲧⲁⲛ). Morphosyntax:
  er-šan prospective construction in ⲉⲣϣⲁⲛ_ⲛⲧⲱⲧⲛⲛⲁⲩ under the temporal ϩⲟⲧⲁⲛ; reflexive
  emphasis with ⲧⲱⲧⲛ and the prepositional ⲉϫⲛ ⲡⲉⲧⲛϩⲟ (singular "face" with plural
  possessive). Orthography: Dilley’s printed segmentation shows an odd agglutination
  (e.g., ⲡⲉⲧⲉⲙ̄ⲡⲟⲩϫⲡⲟϥ) that is normalized as ⲡⲉⲧⲉ ⲙⲡⲉⲛⲧⲟⲟⲩ ϫⲡⲟⲛⲧⲟϥ; the sense is
  birth/begetting negated, paired with ⲉⲃⲟⲗ ϩⲛ ⲡⲥϩⲓⲙⲉ. No lacunae or conjectural restorations
  are indicated by Dilley for this saying.'
