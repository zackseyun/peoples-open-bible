translation:
  language: es
  text: 'Elías respondió y dijo al capitán de cincuenta: “Si yo soy un hombre de Dios, que descienda[a] fuego del cielo y te consuma a ti y a tus cincuenta.” Entonces descendió fuego del cielo y lo consumió a él y a sus cincuenta.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «descenderá fuego del cielo y te consumirá a ti y a tus cincuenta». El hebreo puede leerse como una afirmación predictiva, aunque el texto principal lo vierte como una invocación jussiva.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲנֶה
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - dio respuesta
  lexicon: HALOT
  rationale: ענה introduce una réplica narrativa; en español, 'respondió' conserva el ritmo formal del diálogo sin forzar una repetición de 'y dijo' demasiado pesada.
- source_word: וַיְדַבֵּר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  lexicon: HALOT
  rationale: La combinación hebrea ענה...וידבר funciona idiomáticamente como introducción al discurso. 'Y dijo' es natural en español y mantiene la estructura directa del texto.
- source_word: שַׂר הַחֲמִשִּׁים
  english_pob_choice: the captain of fifty
  chosen_spanish: el capitán de cincuenta
  alternatives_spanish:
  - el comandante de cincuenta
  - el capitán de los cincuenta
  lexicon: HALOT
  rationale: '''Capitán de cincuenta'' reproduce el cargo militar sin añadir elementos que el hebreo no explicita; en español, ''capitán'' es claro y digno para este contexto.'
- source_word: וְאִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Y si
  - Pero si
  lexicon: HALOT
  rationale: El hebreo aquí introduce una condición directa sin necesidad de adversativo añadido. 'Si' preserva el valor condicional que el POB inglés finalmente adoptó.
- source_word: אִישׁ אֱלֹהִים
  english_pob_choice: a man of God
  chosen_spanish: un hombre de Dios
  alternatives_spanish:
  - un varón de Dios
  lexicon: HALOT
  rationale: '''Hombre de Dios'' es la equivalencia directa y estable del título profético; evita reemplazarlo por una paráfrasis menos transparente.'
- source_word: תֵּרֶד אֵשׁ מִן הַשָּׁמַיִם
  english_pob_choice: let fire come down from heaven
  chosen_spanish: que descienda fuego del cielo[a]
  alternatives_spanish:
  - que baje fuego del cielo
  - que caiga fuego del cielo
  lexicon: HALOT
  rationale: 'El verbo jussivo se expresa en español con una subordinada de mandato/deseo: ''que descienda''. ''Del cielo'' conserva el origen celestial sin sobreexplicar. La nota a mantiene la alternativa entre lectura jussiva e interpretativa futura, como en el POB inglés.'
- source_word: וְתֹאכַל
  english_pob_choice: and consume
  chosen_spanish: y te consuma
  alternatives_spanish:
  - y te devore
  - y te destruya
  lexicon: HALOT
  rationale: Con fuego, אכל conserva fuerza destructiva. 'Consuma' preserva ese valor idiomático en español y mantiene la correspondencia con el inglés POB.
- source_word: חֲמִשֶּׁיךָ
  english_pob_choice: your fifty
  chosen_spanish: a ti y a tus cincuenta
  alternatives_spanish:
  - a ti y a tu cincuenta hombres
  - a ti y a tu compañía de cincuenta
  lexicon: HALOT
  rationale: La expresión hebrea alude a la tropa del capitán; 'tus cincuenta' sigue de cerca el hebreo y funciona bien porque el contexto ya identifica la unidad militar.
- source_word: וַתֵּרֶד אֵשׁ מִן הַשָּׁמַיִם
  english_pob_choice: Then fire came down from heaven
  chosen_spanish: Entonces descendió fuego del cielo
  alternatives_spanish:
  - Y descendió fuego del cielo
  - Luego descendió fuego del cielo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol avanza la acción; 'Entonces' ayuda a marcar secuencia en español sin añadir interpretación.
- source_word: וַתֹּאכַל
  english_pob_choice: and consumed
  chosen_spanish: y lo consumió
  alternatives_spanish:
  - y lo devoró
  - y lo destruyó
  lexicon: HALOT
  rationale: Se conserva el mismo verbo de consumo destructivo para mantener la cohesión léxica del pasaje.
- source_word: אֹתוֹ וְאֶת חֲמִשָּׁיו
  english_pob_choice: him and his fifty
  chosen_spanish: a él y a sus cincuenta
  alternatives_spanish:
  - a él y a sus cincuenta hombres
  - a él y a su compañía
  lexicon: HALOT
  rationale: La referencia incluye al capitán y a su unidad. 'A él y a sus cincuenta' sigue el hebreo sin expandir innecesariamente el contenido.
theological_decisions:
- issue: 'Fuerza del primer verbo: jussivo o futuro'
  english_pob_reading: 'Rendered as an invocation/jussive: ''let fire come down from heaven'''
  chosen_spanish_reading: 'Se vierte como mandato o invocación: ''que descienda fuego del cielo'''
  alternative_spanish_readings:
  - '''descenderá fuego del cielo'' como futuro predictivo'
  - '''baje fuego del cielo'' como subjuntivo más coloquial'
  rationale: El hebreo permite una lectura jussiva en contexto, y el POB inglés eligió mantener esa fuerza. En español, la subordinada con 'que' comunica mejor la invocación/proclamación sin resolver la tensión del original.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al texto con [a] en 'cielo[a]'. Se mantuvo la decisión auditada del POB inglés de preservar la tensión entre lectura jussiva e interpretativa futura, ahora expresada de forma natural en español.
  spanish_consistency_notes:
  - Se mantiene 'cincuenta' para el contingente militar, coherente con 'capitán de cincuenta'.
  - Se conserva 'consumir' para el fuego destructivo, evitando alternar con 'destruir' o 'devorar' sin necesidad.
  - '''Dios'' y ''hombre de Dios'' siguen la terminología POB estable para אֱלֹהִים y אִישׁ אֱלֹהִים.'
  - La puntuación del discurso directo respeta el estilo bíblico en español y la economía del hebreo.
