    rationale: El inglés documenta un sentido resultativo/comparativo («is made like»). «Será hecho como la hierba» preserva mejor ese matiz; además, «hierba» encaja mejor que «pasto» en imaginería profética de fragilidad.
  revised_spanish_text: Yo, yo soy el que los consuela. ¿Quién eres tú para que temas al hombre que muere, y al hijo del hombre[a], que será hecho como la hierba?
