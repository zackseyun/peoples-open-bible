translation:
  language: es
  text: La palabra que vino a Yirmeyahu acerca de[a] todo el pueblo de Judá, en el cuarto año de Joacim, hijo de Josías, rey de Judá—era el primer año de Nabucodonosor, rey de Babilonia—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra todo el pueblo de Judá». La preposición hebrea puede tener sentido referencial o adversativo en contextos proféticos.
    reason: alternative_reading
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: The word
  chosen_spanish: La palabra
  alternatives_spanish:
  - El mensaje
  - La cosa
  - El asunto
  lexicon: HALOT
  rationale: En los encabezados proféticos, דבר introduce una comunicación divina; «la palabra» conserva el giro profético normal en español sin añadir interpretación.
- source_word: אֲשֶׁר הָיָה עַל
  english_pob_choice: that came to
  chosen_spanish: que vino a
  alternatives_spanish:
  - que vino sobre
  - que estuvo sobre
  - que llegó a
  lexicon: HALOT
  rationale: La fórmula hebrea con היה על, aplicada a un profeta, se expresa naturalmente en español como «vino a». Mantiene la idea de recepción de un mensaje sin sonar forzada.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Yirmeyahu
  chosen_spanish: Yirmeyahu
  alternatives_spanish:
  - Jeremías
  lexicon: onamástica
  rationale: Se conserva la transliteración del POB inglés para reflejar el nombre hebreo con mayor cercanía al original, siguiendo la política de nombres propios del proyecto.
- source_word: עַל כָּל עַם יְהוּדָה
  english_pob_choice: concerning all the people of Judah
  chosen_spanish: acerca de todo el pueblo de Judá
  alternatives_spanish:
  - contra todo el pueblo de Judá
  - sobre todo el pueblo de Judá
  lexicon: HALOT
  rationale: «עַל» en este contexto admite tanto valor de referencia como de hostilidad. «Acerca de» preserva el alcance del oráculo sin decidir prematuramente entre referencia general y sentido adversativo.
- source_word: בַּשָּׁנָה הָרְבִעִית
  english_pob_choice: in the fourth year
  chosen_spanish: en el cuarto año
  alternatives_spanish:
  - durante el cuarto año
  lexicon: HALOT
  rationale: Fecha regnal directa; la equivalencia idiomática en español es transparente y precisa.
- source_word: לִיהוֹיָקִים
  english_pob_choice: of Jehoiakim
  chosen_spanish: de Joacim
  alternatives_spanish:
  - de Jehoiaquim
  lexicon: tradicional hispánica
  rationale: Para un texto bíblico en español de lectura eclesial, «Joacim» es la forma tradicional y reconocible; conserva la referencia histórica sin sacrificar inteligibilidad.
- source_word: בֶּן יֹאשִׁיָּהוּ
  english_pob_choice: son of Josiah
  chosen_spanish: hijo de Josías
  alternatives_spanish:
  - descendiente de Josías
  lexicon: HALOT
  rationale: La relación genealógica es directa y standard; «hijo de» es la forma más fiel e idiomática.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: Título real estándar; «rey de Judá» preserva el paralelismo histórico del versículo.
- source_word: הִיא הַשָּׁנָה הָרִאשֹׁנִית
  english_pob_choice: it was the first year
  chosen_spanish: era el primer año
  alternatives_spanish:
  - fue el primer año
  - ese era el primer año
  lexicon: HALOT
  rationale: El pronombre resume e identifica el año ya mencionado. «Era» funciona bien en español narrativo y conserva la relación de equivalencia temporal.
- source_word: לִנְבוּכַדְרֶאצַּר
  english_pob_choice: of Nebuchadnezzar
  chosen_spanish: de Nabucodonosor
  alternatives_spanish:
  - de Nabucodonosor
  lexicon: tradicional hispánica
  rationale: Se usa la forma castellana ampliamente reconocida en Biblias en español, equivalente al nombre convencional inglés, para claridad litúrgica y lectora.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - soberano de Babilonia
  lexicon: HALOT
  rationale: Título real estándar con el topónimo histórico usual en español.
theological_decisions:
- issue: Valor de עַל en relación con «todo el pueblo de Judá»
  english_pob_reading: concerning all the people of Judah
  chosen_spanish_reading: acerca de todo el pueblo de Judá
  alternative_spanish_readings:
  - contra todo el pueblo de Judá
  rationale: El encabezado introduce la palabra profética sin obligar todavía a una lectura de juicio exclusivamente adversativa. «Acerca de» preserva la tensión semántica y deja que el desarrollo inmediato del contexto determine el tono.
  doctrine_reference: Preservar la tensión textual en vez de resolverla anticipadamente.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el audit trail inglés: conserva la fórmula profética, la ambigüedad de עַל, y la datación regnal sin añadir interpretaciones. No se aplicaron revisiones previas.'
  spanish_consistency_notes:
  - Se mantiene «Yirmeyahu» para coherencia con el POB inglés en nombres propios hebreos.
  - Se usa «Judá» y «Babilonia» con las formas españolas habituales y sin mayúsculas especiales no requeridas.
  - El guion final reproduce el cierre abrupto del versículo fuente.
