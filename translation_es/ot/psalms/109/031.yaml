translation:
  language: es
  text: Porque él está a la derecha del pobre, para salvarlo de quienes juzgan su alma[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su vida» o «a él mismo»; el hebreo néfesh puede significar «alma», «vida» o la persona misma, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la base o razón del enunciado anterior; en español, «Porque» conserva ese valor explicativo sin sonar rígido.
- source_word: יַעֲמֹד
  english_pob_choice: he stands
  chosen_spanish: se pone
  alternatives_spanish:
  - está
  - permanece
  - se coloca
  lexicon: HALOT
  rationale: El imperfecto hebreo puede expresar una acción estable o característica. «Se pone» comunica presencia activa y postura de apoyo en un español natural, manteniendo la imagen de estar al lado.
- source_word: לִימִין
  english_pob_choice: at the right hand of
  chosen_spanish: a la diestra de
  alternatives_spanish:
  - a la derecha de
  - al lado derecho de
  lexicon: HALOT
  rationale: «A la diestra de» reproduce la metáfora bíblica de apoyo, defensa y favor. Es más tradicional que «a la derecha de», pero sigue siendo claro y fiel al giro del hebreo.
- source_word: אֶבְיוֹן
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el necesitado
  - el afligido
  lexicon: HALOT
  rationale: La forma hebrea describe a la persona pobre y vulnerable. En singular definido, «el pobre» conserva concisión y el matiz social del término.
- source_word: לְהוֹשִׁיעַ
  english_pob_choice: to save
  chosen_spanish: para salvarlo
  alternatives_spanish:
  - para librarlo
  - para rescatarlo
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. «Salvarlo» es un equivalente amplio y natural, adecuado tanto a rescate judicial como existencial.
- source_word: מִשֹּׁפְטֵי
  english_pob_choice: from those who judge
  chosen_spanish: de quienes juzgan
  alternatives_spanish:
  - de sus jueces
  - de quienes lo condenan
  - de los que dictan juicio
  lexicon: HALOT
  rationale: El participio puede referirse a quienes actúan como jueces o a quienes pronuncian juicio. «Quienes juzgan» mantiene la ambigüedad útil del hebreo y no introduce de forma explícita «condenar».
- source_word: נַפְשׁוֹ
  english_pob_choice: his soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - a él
  lexicon: HALOT
  rationale: Siguiendo la revisión más reciente del POB en inglés, se mantiene «alma» para reflejar más directamente נֶפֶשׁ y preservar la tensión antropológica. En español, «alma» comunica el término tradicional sin cerrar indebidamente su alcance semántico.
theological_decisions:
- issue: Sentido antropológico de נֶפֶשׁ
  english_pob_reading: his soul
  chosen_spanish_reading: su alma
  alternative_spanish_readings:
  - su vida
  - su ser
  rationale: La auditoría inglesa revisó la traducción desde «life» a «soul» para reflejar más directamente נַפְשׁוֹ. En español, «alma» conserva esa correspondencia formal y deja abierta la gama semántica hebrea sin reducirla solo a una dimensión inmortal o solo biológica.
  doctrine_reference: Preservar la tensión semántica original; no resolverla con categorías posteriores.
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que cambió the sense of נַפְשׁוֹ de «life» a «soul». La redacción española sigue esa decisión revisada, reflejando «alma» en vez de «vida», y conserva la ambigüedad de מִשֹּׁפְטֵי con «quienes juzgan».
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió un registro bíblico natural en español sin calco mecánico.
  - Se mantuvo la relación imagen-judicial del hebreo mediante «a la diestra» y «juzgan».
  - La puntuación sigue el flujo poético de una sola línea con coma interna.
