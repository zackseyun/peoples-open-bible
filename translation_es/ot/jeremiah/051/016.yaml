revisions:
- from: Al sonido de su voz, hay un tumulto de aguas en los cielos; hace subir nubes[a] desde los confines de la tierra; hace relámpagos para la lluvia, y saca el viento de sus depósitos[b].
  to: Al sonido de su voz, hay un tumulto de aguas en los cielos; hace subir nubes[a] desde los confines de la tierra; hace relámpagos para la lluvia, y saca el viento de sus almacenes[b].
  rationale: Se mantiene la traducción general por ser fiel al hebreo y al POB, pero se reemplaza «depósitos» por «almacenes» para una imagen más natural y bíblicamente idiomática en español. Se conservan las notas léxicas con anclaje correcto en el texto revisado.
  reviewer_model: gpt-5.4
