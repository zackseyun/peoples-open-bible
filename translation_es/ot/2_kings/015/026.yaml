- from: Ahora, el resto de los hechos de Pekaía[a], y todo lo que hizo, están escritos en el libro de los Anales de los reyes de Israel.
  to: Y el resto de los hechos de Pekaía[a], y todo lo que hizo, he aquí, están escritos en el libro de los anales de los reyes de Israel.
