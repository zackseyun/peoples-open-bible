translation:
  language: es
  text: 'Y la cuarta fila: berilo[a], ónice y jaspe; estarán engastados en oro en sus engastes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación exacta de varias gemas del pectoral sacerdotal es incierta; se conserva 'berilo' como equivalente tradicional para תַּרְשִׁישׁ, aunque también se han propuesto otras piedras.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַטּוּר
  english_pob_choice: And the ... row
  chosen_spanish: Y la ... fila
  alternatives_spanish:
  - Y la ... hilera
  - Y la ... fila de piedras
  lexicon: HALOT
  rationale: En este contexto de piedras del pectoral, טּוּר designa una disposición lineal de gemas. 'Fila' es natural en español y conserva la imagen de una serie ordenada, como el inglés POB 'row'.
- source_word: הָרְבִיעִי
  english_pob_choice: fourth
  chosen_spanish: cuarta
  alternatives_spanish:
  - cuarto
  lexicon: HALOT
  rationale: Adjetivo ordinal directo que modifica 'fila'.
- source_word: תַּרְשִׁישׁ
  english_pob_choice: beryl
  chosen_spanish: berilo
  alternatives_spanish:
  - crisólito
  - topacio
  - piedra de Tarshish
  lexicon: HALOT
  rationale: La identificación exacta de la gema es incierta, pero 'berilo' es una equivalencia tradicional y clara en español para este contexto sacerdotal. Mantiene la prudencia del POB inglés sin forzar una identificación más precisa de la que el hebreo garantiza.
- source_word: וְשֹׁהַם
  english_pob_choice: onyx
  chosen_spanish: ónice
  alternatives_spanish:
  - ónix
  - piedra de ónice
  - lapislázuli
  lexicon: HALOT
  rationale: '''Ónice'' es la forma asentada en español bíblico y comunica la gema tradicional asociada a שֹׁהַם, sin afirmar más certeza mineralógica de la que ofrece la fuente.'
- source_word: וְיָשְׁפֵה
  english_pob_choice: jasper
  chosen_spanish: jaspe
  alternatives_spanish:
  - jaspis
  lexicon: HALOT
  rationale: Correspondencia directa y estable en español; conserva el valor de nombre de piedra preciosa.
- source_word: מְשֻׁבָּצִים
  english_pob_choice: set
  chosen_spanish: engastados
  alternatives_spanish:
  - montados
  - colocados
  - incrustados
  lexicon: HALOT
  rationale: El participio pasivo describe piedras fijadas en una pieza de joyería. 'Engastados' expresa con precisión técnica y natural en español la idea de gemas asentadas en metal.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - de oro
  - oro fino
  lexicon: HALOT
  rationale: Material precioso directo; 'oro' es natural en español y mantiene el sustantivo como en la imagen del texto fuente.
- source_word: יִהְיוּ
  english_pob_choice: they shall be
  chosen_spanish: estarán
  alternatives_spanish:
  - serán
  - deberán estar
  lexicon: HALOT
  rationale: En español, el futuro simple comunica bien la especificación constructiva del hebreo imperfecto en un pasaje de instrucciones; preserva el tono prescriptivo del POB inglés.
- source_word: בְּמִלּוּאֹתָם
  english_pob_choice: in their settings
  chosen_spanish: en sus engastes
  alternatives_spanish:
  - en sus engastes
  - en sus monturas
  - en sus incrustaciones
  lexicon: HALOT
  rationale: En este contexto de trabajo en metal y joyería, מִלּוּאִים se refiere a las cavidades o alojamientos donde se asientan las piedras. 'Engastes' es el equivalente español más natural y preciso; conserva la relación funcional que el inglés POB expresó como 'settings'.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el ajuste auditado del POB inglés: se mantuvo la lista de piedras y la estructura prescriptiva, y se reflejó la revisión de ''settings'' como el término más natural para בְּמִלּוּאֹתָם. La principal decisión española fue usar vocabulario de joyería claro y estándar (''engastados'', ''engastes'') sin sobreinterpretar la mineralogía incierta.'
  spanish_consistency_notes:
  - Se conservó el paralelismo enumerativo del hebreo y del POB inglés.
  - 'Se mantuvo una terminología de joyería consistente: ''engastados'' / ''engastes''.'
  - Los nombres de piedras se dieron en formas españolas usuales y legibles para iglesia amplia.
  - No se añadieron notas teológicas porque el versículo es principalmente descriptivo y artesanal.
