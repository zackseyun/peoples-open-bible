translation:
  language: es
  text: Y en aquel día,[a] declara Yahvé, cortaré tus caballos de entre ti, y destruiré tus carros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de en medio de ti»; también, «de tu medio».'
    reason: alternativa léxica para מִקִּרְבֶּךָ, preservando la opción más literal recogida en el audit trail y evitando rigidez en el texto principal
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And in that day
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y será
  - Y acontecerá
  lexicon: HALOT
  rationale: En español, el verbo de enlace hebreo se naturaliza como una fórmula futura de evento; 'sucederá' conserva el valor prospectivo sin sonar rígido.
- source_word: בַיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  lexicon: HALOT
  rationale: '''Aquel día'' reproduce la fórmula profética fija con tono solemne y temporalidad escatológica o de juicio.'
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética de declaración divina, y se conserva el nombre propio Yahvé según el criterio del proyecto.
- source_word: וְהִכְרַתִּי
  english_pob_choice: I will cut off
  chosen_spanish: cortaré
  alternatives_spanish:
  - eliminaré
  - extirparé
  lexicon: HALOT
  rationale: El verbo hebreo conserva una imagen concreta de cortar o quitar de raíz; 'cortaré' preserva esa fuerza mejor que un verbo más abstracto.
- source_word: סוּסֶיךָ
  english_pob_choice: your horses
  chosen_spanish: tus caballos
  alternatives_spanish:
  - tus corceles
  lexicon: HALOT
  rationale: Traducción directa y natural del sustantivo plural con sufijo de segunda persona.
- source_word: מִקִּרְבֶּךָ
  english_pob_choice: from among you
  chosen_spanish: de en medio de ti
  alternatives_spanish:
  - de tu medio
  - de tu interior
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente 'de tu medio'; 'de en medio de ti' conserva la imagen espacial y la idea de remoción desde el centro de la comunidad. La nota recoge la alternativa literal que el audit trail preservó.
- source_word: וְהַאֲבַדְתִּי
  english_pob_choice: I will destroy
  chosen_spanish: destruiré
  alternatives_spanish:
  - haré perecer
  - anularé
  lexicon: HALOT
  rationale: El hifil de אבד expresa causar la ruina o la pérdida total; 'destruiré' es el equivalente más claro y directo en este contexto.
- source_word: מַרְכְּבֹתֶיךָ
  english_pob_choice: your chariots
  chosen_spanish: tus carros
  alternatives_spanish:
  - tus carros de guerra
  - tus carrozas
  lexicon: HALOT
  rationale: '''Carros'' es una equivalencia natural en español para el vehículo de guerra del texto; el contexto bélico hace innecesario añadir ''de guerra'' en el cuerpo principal.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, manteniendo el nombre de pacto en lugar de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza de la eliminación de caballos y carros
  english_pob_reading: A straightforward statement of the LORD's removal of military assets
  chosen_spanish_reading: Una afirmación directa de la remoción de recursos militares por Yahvé
  alternative_spanish_readings:
  - Un juicio implícito contra la confianza en la fuerza militar
  - Una purificación del pueblo de su dependencia bélica
  rationale: La redacción principal se mantiene concreta y no introduce interpretación adicional en el texto; la tensión teológica queda abierta como en el hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se corrigió la validación anterior integrando el marcador [a] directamente en el texto español, anclado a la frase que admite la alternativa literal 'from your midst / de tu medio'. No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantiene Yahvé de forma consistente con el criterio del proyecto para יהוה.
  - '''Caballos'' y ''carros'' conservan el valor concreto del texto sin espiritualizarlo.'
  - La sintaxis conserva la cadencia profética y la primera persona divina.
  - La nota [a] se ancla solo a 'de en medio de ti', donde existe la alternativa literal relevante.
