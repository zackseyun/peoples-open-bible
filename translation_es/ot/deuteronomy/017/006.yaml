translation:
  language: es
  text: Por el testimonio de dos testigos o de tres testigos[a], se le dará muerte al que ha de morir[b]; no se le dará muerte por el testimonio de un solo testigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, ‘por boca de dos testigos o de tres testigos’. El hebreo usa un modismo jurídico para indicar testimonio o evidencia.
    reason: lexical_alternative
  - marker: b
    text: O, ‘el que ha de ser ejecutado’; es decir, la persona sujeta a la pena capital.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל־פִּי
  english_pob_choice: on the testimony of
  chosen_spanish: sobre la base del testimonio de
  alternatives_spanish:
  - por boca de
  - según el testimonio de
  - sobre el testimonio de
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática literal, ‘sobre la boca de’, con sentido jurídico de testimonio o evidencia. En español, ‘sobre la base del testimonio de’ conserva el valor forense y suena natural sin ocultar el matiz jurídico.
- source_word: שְׁנַיִם עֵדִים ... שְׁלֹשָׁה עֵדִים
  english_pob_choice: two witnesses or three witnesses
  chosen_spanish: dos testigos o de tres testigos
  alternatives_spanish:
  - dos o tres testigos
  - dos testigos o tres testigos
  lexicon: HALOT
  rationale: El hebreo repite ‘testigos’ después de ambos numerales. Se mantiene la repetición para reflejar el estilo legal formal del original, aunque el español podría compactarlo.
- source_word: יוּמַת
  english_pob_choice: shall be put to death
  chosen_spanish: será muerto
  alternatives_spanish:
  - será puesto a muerte
  - será ejecutado
  lexicon: HALOT
  rationale: La forma causativa/pasiva pide un sentido de muerte infligida por autoridad. ‘Será muerto’ es una solución breve y formal que conserva la fuerza judicial del hebreo sin introducir una expansión interpretativa excesiva.
- source_word: הַמֵּת
  english_pob_choice: the one to die
  chosen_spanish: el que ha de morir
  alternatives_spanish:
  - el condenado
  - el que está para morir
  lexicon: HALOT
  rationale: El participio con artículo es elíptico. ‘El que ha de morir’ refleja esa forma sin convertirla en ‘el condenado’, que explicita más de lo que dice el hebreo, y evita entenderlo como ‘el muerto’.
- source_word: לֹא יוּמַת
  english_pob_choice: he shall not be put to death
  chosen_spanish: no será muerto
  alternatives_spanish:
  - no deberá ser muerto
  - no será puesto a muerte
  lexicon: HALOT
  rationale: Se conserva la misma raíz verbal y el registro legal del primer miembro. ‘No será muerto’ mantiene la simetría del hebreo y la prohibición jurídica.
- source_word: עֵד אֶחָד
  english_pob_choice: one witness
  chosen_spanish: un solo testigo
  alternatives_spanish:
  - un testigo
  - un único testigo
  lexicon: HALOT
  rationale: ‘Un solo testigo’ hace explícita la exclusión de otros testigos y reproduce el paralelismo con ‘dos testigos’ y ‘tres testigos’.
theological_decisions:
- issue: Sentido de הַמֵּת en contexto de pena capital
  english_pob_reading: It refers to the accused person who is liable to execution, rendered 'the one to die,' not a person already dead.
  chosen_spanish_reading: Se refiere a la persona acusada que está sujeta a la pena de muerte, expresada como ‘el que ha de morir’, no a alguien ya muerto.
  alternative_spanish_readings:
  - el condenado
  - el muerto
  rationale: El contexto regula el estándar probatorio para aplicar la pena capital. ‘El muerto’ sería incompatible con la escena jurídica; ‘el condenado’ aclara, pero añade una conclusión judicial más fuerte que la forma hebrea.
  doctrine_reference: Derecho penal/cúltico bíblico; debido proceso en la Ley mosaica
translation_notes:
  revision_awareness: El texto español sigue de cerca la decisión inglesa auditada y no requiere cambios textuales respecto del enfoque aprobado; se preserva el paralelismo legal y la ambigüedad controlada de הַמֵּת.
  spanish_consistency_notes:
  - Se mantiene ‘testigo(s)’ para עֵד/עֵדִים en coherencia con la terminología jurídica del pasaje.
  - Se usa ‘será muerto’ como equivalente formal de la construcción causativa/pasiva, en línea con el tono legal del hebreo.
  - ‘Sobre la base del testimonio de’ evita el calco opaco y conserva el sentido idiomático del hebreo.
  - La redacción evita términos eclesiásticos ajenos al contexto legal y penal del versículo.
