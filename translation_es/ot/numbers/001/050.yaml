translation:
  language: es
  text: Pero tú, pon a los levitas a cargo del tabernáculo[a] del testimonio, y de todos sus utensilios, y de todo lo que le pertenece. Ellos llevarán el tabernáculo y todos sus utensilios, y ministrarán en él[b], y acamparán alrededor del tabernáculo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tienda del testimonio». El hebreo מִשְׁכָּן puede referirse a una morada o tabernáculo, y algunas traducciones lo hacen más explícito como «tienda» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «lo servirán» o «lo atenderán». El verbo hebreo tiene un matiz de servicio sagrado en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Ahora tú
  lexicon: HALOT
  rationale: El contraste inicial en el hebreo justifica un marcador adversativo. «Pero tú» conserva esa oposición sin añadir contenido ajeno al verso.
- source_word: הַפְקֵד
  english_pob_choice: appoint
  chosen_spanish: pon a cargo / pon sobre
  alternatives_spanish:
  - asigna
  - nombra
  lexicon: HALOT
  rationale: El imperativo en hifil expresa comisión o asignación de responsabilidad. «Pon ... sobre» mantiene la idea de encargo con naturalidad en español y sigue la estructura de עַל.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíes
  lexicon: HALOT
  rationale: El etnónimo bíblico normal en español es «levitas»; es claro y fiel al grupo designado.
- source_word: מִשְׁכַּן הָעֵדֻת
  english_pob_choice: the tabernacle of the testimony
  chosen_spanish: el tabernáculo del testimonio
  alternatives_spanish:
  - la morada del testimonio
  - la tienda del testimonio
  lexicon: HALOT
  rationale: «Tabernáculo» conserva el término técnico cultual para מִשְׁכָּן. «Del testimonio» sigue la construcción genitiva sin resolverla interpretativamente; mantiene la referencia al testimonio depositado allí.
- source_word: כָּל כֵּלָיו
  english_pob_choice: all its furnishings
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus muebles
  - todos sus objetos
  lexicon: HALOT
  rationale: כֵּלִים en contexto del santuario designa implementos/objetos cultuales. «Utensilios» es amplio, digno y abarca el sentido de implements/furnishings sin reducirlo a «muebles».
- source_word: כָּל אֲשֶׁר לוֹ
  english_pob_choice: all that belongs to it
  chosen_spanish: todo lo que le pertenece
  alternatives_spanish:
  - todo lo que es suyo
  - todo lo que corresponde a él
  lexicon: HALOT
  rationale: La frase indica pertenencia o conjunto asociado al tabernáculo. «Le pertenece» conserva la amplitud sin especificar de más.
- source_word: יִשְׂאוּ
  english_pob_choice: carry
  chosen_spanish: llevarán
  alternatives_spanish:
  - cargarán
  - portarán
  lexicon: HALOT
  rationale: En este contexto de traslado físico, «llevarán» es el equivalente natural y directo para la acción de transportar el tabernáculo y sus objetos.
- source_word: יְשָׁרְתֻהוּ
  english_pob_choice: minister to it
  chosen_spanish: ministrarán a él
  alternatives_spanish:
  - servirán a él
  - atenderán a él
  lexicon: HALOT
  rationale: Conservo el verbo de servicio sacro con «ministrarán», porque el contexto es cultual y el hebreo no se agota en un simple servicio doméstico. El complemento «a él» mantiene el objeto directo pronominal del hebreo con suficiente literalidad.
- source_word: סָבִיב לַמִּשְׁכָּן
  english_pob_choice: around the tabernacle
  chosen_spanish: alrededor del tabernáculo
  alternatives_spanish:
  - en torno al tabernáculo
  - rodeando el tabernáculo
  lexicon: HALOT
  rationale: La frase indica el perímetro de campamento en torno al santuario. «Alrededor» es claro y transmite la disposición espacial requerida.
- source_word: יַחֲנוּ
  english_pob_choice: they are to camp
  chosen_spanish: acamparán
  alternatives_spanish:
  - acamparán allí
  - deben acampar
  lexicon: HALOT
  rationale: El imperfecto tiene fuerza directiva en este mandato. En español, el futuro puede expresar orden/instrucción de manera natural y sobria.
theological_decisions:
- issue: Término cultual para מִשְׁכָּן
  english_pob_reading: tabernacle
  chosen_spanish_reading: tabernáculo
  alternative_spanish_readings:
  - morada
  - tienda
  rationale: «Tabernáculo» es el término técnico más reconocible y exacto para el santuario portátil. No se sustituye por una paráfrasis más explicativa que diluya el carácter cultual del texto.
  doctrine_reference: Éxodo/Números, terminología del santuario
- issue: Sentido de יְשָׁרְתֻהוּ en contexto sagrado
  english_pob_reading: minister to it
  chosen_spanish_reading: ministrarán a él
  alternative_spanish_readings:
  - servirán a él
  - atenderán a él
  rationale: La raíz sugiere servicio ritual/ministerial, no solo asistencia general. «Ministrarán» conserva esa tensión cultual sin importar una teología posterior ajena al contexto inmediato.
  doctrine_reference: Servicio levítico en el Pentateuco
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el tramo inglés auditado, conservando la estructura de contraste inicial, la serie de preposiciones sobre responsabilidad y el paralelismo entre llevar y ministrar. Se optó por «ministrarán a él» para reflejar la fuerza cultual del verbo, en continuidad con la lectura inglesa revisada que mantuvo el servicio dirigido al tabernáculo.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto lo exija explícitamente; aquí no aparece el Tetragrámaton.
  - «Tabernáculo» se mantiene como término técnico consistente para מִשְׁכָּן.
  - «Levitas» se usa como etnónimo estable y natural en español.
  - «Utensilios» se usa de manera amplia para כֵּלִים en contexto del santuario.
  - La puntuación sigue el orden lógico del hebreo con una sintaxis fluida en español.
  - Se preserva la referencia cultual del verbo de servicio sin sustituirla por una expresión demasiado general.
