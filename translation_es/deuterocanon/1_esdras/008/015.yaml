review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego principal: ὥστε = «para», προσενεγκεῖν θυσίας = «ofrecer sacrificios», ἐπὶ τὸ θυσιαστήριον = «sobre el altar», y conserva «su Señor» en vez de importar «su Dios» del paralelo hebreo. Sin embargo, la nota al pie desfigura el griego al hacer que «el que está en Jerusalén» modifique a «su Señor», cuando en el original modifica al altar.'
  spanish_quality_summary: 'El español es claro y digno. La línea principal es legible y natural. El problema principal está en la nota: la cita final «su Señor, el que está en Jerusalén» induce una lectura sintáctica incorrecta. Conviene además reflejar con precisión que el griego dice «el altar de su Señor, el que está en Jerusalén».'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: κύριος → «Señor», θυσίας → «sacrificios». No hay conflicto con Yahvé, Mesías, etc. La decisión de no sustituir «Señor» por «Dios» en el texto principal es correcta según la primacía del griego.'
  issues:
  - severity: medium
    issue: La nota al pie atribuye erróneamente «el que está en Jerusalén» a «su Señor».
    rationale: En el griego, τὸ ἐν Ἰερουσαλήμ restringe «altar», no «Señor». La nota actual dice que el griego dice «su Señor, el que está en Jerusalén», lo cual altera el sentido fuente y puede sugerir una localización impropia del referente divino.
  revised_spanish_text: para ofrecer sacrificios sobre el altar de su Señor[a], el que está en Jerusalén.
  revised_footnotes:
  - marker: a
    text: El paralelo hebreo del contexto cercano lee «la casa de su Dios que está en Jerusalén», lo que apoya que el referente sea el Dios de Israel; aquí, sin embargo, el griego dice específicamente «el altar de su Señor, el que está en Jerusalén».
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal porque refleja fielmente el griego y suena natural en español. Solo se corrige la nota para que describa con precisión la sintaxis griega y no traslade erróneamente «el que está en Jerusalén» a «su Señor».
