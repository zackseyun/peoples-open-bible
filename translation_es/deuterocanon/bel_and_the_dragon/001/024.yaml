translation:
  language: es
  text: 'Y el rey dijo a Daniel[a]: «No puedes decir que este no es un dios viviente; y póstrate ante él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adóralo». El verbo griego puede referirse a postrarse en homenaje o a adorar, especialmente cuando se dirige a una deidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ εἶπεν ὁ βασιλεὺς
  english_pob_choice: And the king said
  chosen_spanish: Y el rey dijo
  alternatives_spanish:
  - Y dijo el rey
  - Entonces el rey dijo
  lexicon: BDAG
  rationale: El griego usa una coordinación simple con καὶ; en español, «Y el rey dijo» conserva la secuencia narrativa sin añadir una relación causal o temporal no explicitada. Se mantiene «rey» con artículo implícito por naturalidad estilística.
- source_word: τῷ Δανιήλ
  english_pob_choice: to Daniel
  chosen_spanish: a Daniel
  alternatives_spanish:
  - para Daniel
  lexicon: BDAG
  rationale: La dativa de destinatario se expresa naturalmente con «a Daniel». «Para Daniel» sería menos directo y no corresponde al valor normal del dativo aquí.
- source_word: Οὐ δύνασαι εἰπεῖν
  english_pob_choice: You cannot say
  chosen_spanish: No puedes decir
  alternatives_spanish:
  - No eres capaz de decir
  - No puedes afirmar
  lexicon: BDAG
  rationale: «No puedes decir» reproduce de manera directa la negación con δύναμαι + infinitivo y conserva el tono de desafío del rey sin sobreinterpretar si la fuerza es incapacidad, permiso o imposibilidad retórica. «Afirmar» sería más interpretativo que el griego.
- source_word: οὐκ ἔστιν οὗτος θεὸς ζῶν
  english_pob_choice: this is not a living god
  chosen_spanish: este no es un dios viviente
  alternatives_spanish:
  - este no es un dios que vive
  - este no es un dios vivo
  lexicon: BDAG
  rationale: Se conserva el sustantivo común «dios» en minúscula, porque el hablante pagano se refiere a Bel y no está haciendo una confesión sobre el Dios de Israel. «Dios viviente» capitalizado introduciría una lectura teológica ajena al punto del texto. «Viviente» comunica bien ζῶν y mantiene el contraste narrativo.
- source_word: προσκύνησον αὐτῷ
  english_pob_choice: bow down to him
  chosen_spanish: postrarte ante él
  alternatives_spanish:
  - inclinarte ante él
  - adorarlo
  - adorarle
  lexicon: BDAG
  rationale: 'Se opta por una expresión física y reverencial que preserve el valor concreto de προσκυνέω sin forzar de entrada el matiz de «adorar». «Postrarte ante él» mantiene la ambigüedad útil: el acto corporal y su posible sentido de homenaje o culto en el contexto.'
theological_decisions:
- issue: Cómo representar θεὸς ζῶν sin importar la fórmula bíblica confesional «el Dios viviente»
  english_pob_reading: living god
  chosen_spanish_reading: un dios viviente
  alternative_spanish_readings:
  - el Dios viviente
  - un dios vivo
  rationale: El rey habla de Bel como una deidad pagana. Traducir con mayúscula o con la fórmula tradicional «el Dios viviente» borraría la tensión narrativa y haría sonar la frase como una confesión ortodoxa. La minúscula conserva el punto de vista del hablante y la ironía del relato.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
- issue: 'Cómo traducir προσκύνησον: gesto físico o adoración explícita'
  english_pob_reading: bow down to him
  chosen_spanish_reading: postrarte ante él
  alternative_spanish_readings:
  - adorarlo
  - rendirle culto
  - inclinarte ante él
  rationale: El griego admite tanto postración como adoración. Dado que el objeto es tratado como deidad, el contexto permite un matiz religioso; sin embargo, la forma más concreta evita añadir una glosa más teológica que la del texto y deja que el propio relato determine la fuerza del mandato.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not paraphrase beyond what the source warrants.'
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés POB, que cambió «so bow down to him» por «and bow down to him» para reflejar más directamente la simple conjunción καὶ. Por eso se usa «y» sin valor inferencial. También se preserva la elección no confesional de «living god» con minúscula, para no convertir la frase del rey pagano en una fórmula sobre el Dios de Israel.
  spanish_consistency_notes:
  - Se mantiene «Dios» con mayúscula solo cuando el contexto lo exija explícitamente; aquí el referente es un ídolo/deidad pagana, por lo que va en minúscula.
  - Se conserva la distinción entre postración física y adoración religiosa mediante la nota textual, sin borrar la ambigüedad del verbo προσκυνέω.
  - Se usa «Y» inicial para reflejar la coordinación simple del griego y la corrección auditada del inglés POB.
