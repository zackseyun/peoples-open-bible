  to: 'Y Josué dijo: «Hagan rodar piedras grandes hasta la boca de la cueva[a], y asignen hombres sobre ella para custodiarla[b]».'
  rationale: Se ajusta el verbo principal a «asignen» para reflejar mejor וְהַפְקִידוּ ('comisionar/asignar') y se mejora la fluidez de la cláusula final con «custodiarla». Se conserva «boca de la cueva» con su nota. La nota [b] se corrige para describir con precisión el plural hebreo y la decisión editorial de traducir en singular.
