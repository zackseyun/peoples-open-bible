translation:
  language: es
  text: 'Habla: Así dice Yahvé: «El cadáver del hombre[a] caerá como estiércol sobre la superficie del campo, y como una gavilla detrás del segador, sin nadie que lo recoja».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cadáver de la humanidad» o «el cadáver humano». El hebreo tiene el singular אָדָם, que puede funcionar de manera genérica.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla tú
  lexicon: HALOT
  rationale: Imperativo masculino singular que introduce una proclamación profética. «Habla» mantiene la fuerza directiva con español natural y solemne.
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - De esta manera
  lexicon: HALOT
  rationale: La partícula formula el deíctico profético. «Así» reproduce bien la fórmula oracular en español actual.
- source_word: נְאֻם יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino según el estándar del proyecto. «Dice» es la equivalencia más directa y natural para la fórmula profética נְאֻם.
- source_word: נִבְלַת הָאָדָם
  english_pob_choice: the corpse of man
  chosen_spanish: el cadáver del hombre
  alternatives_spanish:
  - el cadáver de la humanidad
  - el cuerpo muerto del hombre
  lexicon: HALOT
  rationale: נִבְלָה designa un cadáver/cuerpo muerto; «cadáver» es claro y fuerte en español. Se conserva el singular genérico הָאָדָם con «del hombre», siguiendo la decisión de mantener la forma singular representativa.
- source_word: כְּדֹמֶן
  english_pob_choice: like dung
  chosen_spanish: como estiércol
  alternatives_spanish:
  - como boñiga
  - como abono
  lexicon: HALOT
  rationale: El paralelo agrario y despectivo requiere una palabra fuerte. «Estiércol» conserva la imagen degradante y es plenamente comprensible; «abono» suavizaría indebidamente el golpe retórico.
- source_word: עַל פְּנֵי הַשָּׂדֶה
  english_pob_choice: on the face of the field
  chosen_spanish: sobre la superficie del campo
  alternatives_spanish:
  - sobre la faz del campo
  - en el campo
  lexicon: HALOT
  rationale: Se preserva el sentido idiomático de «face of the field» sin forzar una construcción extraña en español. «Superficie» transmite la imagen de exposición a la vista.
- source_word: וּכְעָמִיר
  english_pob_choice: and like a sheaf
  chosen_spanish: y como una gavilla
  alternatives_spanish:
  - y como una parva
  - y como una hilera de mies
  lexicon: HALOT
  rationale: עָמִיר corresponde a una gavilla/atado de cereal. «Gavilla» es el término más exacto y tradicional para la imagen de la cosecha.
- source_word: מֵאַחֲרֵי הַקֹּצֵר
  english_pob_choice: behind the reaper
  chosen_spanish: detrás del segador
  alternatives_spanish:
  - tras el segador
  - después del segador
  lexicon: HALOT
  rationale: La preposición expresa ubicación espacial en la escena de cosecha. «Detrás del segador» conserva el orden visual del original.
- source_word: וְאֵין מְאַסֵּף
  english_pob_choice: with no one to gather it
  chosen_spanish: sin nadie que lo recoja
  alternatives_spanish:
  - y no hay quien lo recoja
  - sin que nadie lo recoja
  lexicon: HALOT
  rationale: En español, un sujeto explícito evita aspereza sintáctica. «Lo» retoma tanto la gavilla como el cadáver en la imaginería final, preservando la idea de abandono.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton. «Yahvé» mantiene el nombre del pacto y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Generic singular אָדָם
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - la gente
  - el ser humano
  rationale: El hebreo usa singular genérico; se conserva esa forma con «el hombre» para no diluir el paralelismo ni neutralizar la imagen de juicio individual y representativo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם adam → man / humankind (context)'
- issue: Harshness of the corpse-and-dung imagery
  english_pob_reading: corpse ... like dung ... like a sheaf
  chosen_spanish_reading: cadáver ... como estiércol ... como una gavilla
  alternative_spanish_readings:
  - cuerpo muerto ... como basura ... como una gavilla
  - carroña ... como estiércol ... como una gavilla
  rationale: La metáfora busca humillación extrema y exposición. Se mantiene la crudeza sin suavizarla con eufemismos, para respetar el tono profético de juicio.
  doctrine_reference: Poética profética y retórica de juicio en Jeremías 9:21
translation_notes:
  revision_awareness: Se cotejó el hebreo masorético con la traducción inglesa auditada. No se requieren correcciones respecto del último pase revisado; la versión española conserva la fórmula profética, el singular genérico אָדָם y la imaginería degradante de cadáver/estiércol/gavilla sin añadir explicaciones no presentes en el texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - Se conserva el singular genérico «el hombre» para אָדָם, sin pluralizar ni abstraer a «humanidad» en el texto principal.
  - Se elige «cadáver» en lugar de «cuerpo» para reflejar la fuerza de נִבְלָה.
  - Se usa «estiércol» y «gavilla» por su valor imagístico y su correspondencia con el hebreo.
  - La partícula final queda como «sin nadie que lo recoja» para fluidez en español y para mantener el sentido de abandono total.
