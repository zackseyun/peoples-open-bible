revisions:
- from: Entonces Gaal hijo de Ebed vino con sus hermanos y pasó por Siquem, y los señores de Siquem confiaron en él.
  to: Entonces Gaal hijo de Ebed vino con sus hermanos[a] y entraron en Siquem[b], y los líderes[c] de Siquem confiaron en él.
  rationale: Se ajusta el verbo de movimiento para respetar mejor el plural hebreo y evitar la sugerencia de mero tránsito; se adopta 'líderes' para reflejar la preferencia auditada del POB para בַּעֲלֵי שְׁכֶם en español claro y moderno; y se restauran en notas las alternativas léxicas significativas preservadas por el rastro inglés.
