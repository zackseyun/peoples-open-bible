  spanish_quality_summary: El español es claro y legible, con puntuación adecuada para una lista genealógica. La única reparación necesaria es la forma del nombre propio «Jaref», que suena adaptada de manera innecesaria y se aparta tanto del hebreo como de la auditoría inglesa. «Haref» es más fiel y sigue siendo comprensible en español bíblico.
  glossary_alignment: No hay términos teológicos sensibles en el versículo. La traducción de אֲבִי como «el padre de» concuerda con la política del proyecto y conserva en nota las alternativas «fundador de» y «antepasado de». Los topónimos «Belén» y «Bet-gader» están bien manejados. La única desalineación léxica es חָרֵף -> «Jaref», que debe ajustarse a «Haref», manteniendo «Harif» como variante en nota.
  issues:
