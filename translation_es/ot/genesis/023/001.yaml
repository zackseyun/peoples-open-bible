translation:
  language: es
  text: Ahora la vida de Sara fue ciento veintisiete años[a]; estos fueron los años de la vida de Sara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cien años y veinte años y siete años», una manera estilizada de expresar el total de la vida de Sara.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: was / lived
  chosen_spanish: fue
  alternatives_spanish:
  - vivió
  - eran
  lexicon: HALOT
  rationale: El hebreo funciona como fórmula idiomática de duración de vida con חַיֵּי; en español, «fue» mantiene la estructura nominal («la vida de Sara fue...») que refleja bien la revisión inglesa más cercana al hebreo, sin perder naturalidad.
- source_word: חַיֵּי
  english_pob_choice: life / years of life
  chosen_spanish: la vida
  alternatives_spanish:
  - la duración de la vida
  - los años de la vida
  lexicon: HALOT
  rationale: El constructo enfatiza la vida/lifetime de Sara. «La vida» reproduce la fuerza del hebreo y permite la repetición final «los años de la vida de Sara» para conservar el paralelismo resumitivo.
- source_word: מֵאָה שָׁנָה וְעֶשְׂרִים שָׁנָה וְשֶׁבַע שָׁנִים
  english_pob_choice: one hundred twenty-seven years
  chosen_spanish: ciento veintisiete años
  alternatives_spanish:
  - cien años y veinte años y siete años
  - ciento veintisiete años
  lexicon: HALOT
  rationale: En español, el total cardinal es la forma idiomática más clara. La nota conserva que el hebreo lo expresa distributivamente («cien años y veinte años y siete años»), sin ocultar la estilización del original.
- source_word: שְׁנֵי חַיֵּי שָׂרָה
  english_pob_choice: these were the years of Sarah’s life
  chosen_spanish: estos fueron los años de la vida de Sara
  alternatives_spanish:
  - estos son los años de la vida de Sara
  - los años de la vida de Sara
  lexicon: HALOT
  rationale: La frase final es una fórmula resumptiva/appositiva. «Estos fueron» conserva la completud de la cláusula y la repetición enfática del hebreo, de manera paralela al audit trail inglés.
- source_word: שָׂרָה
  english_pob_choice: Sarah
  chosen_spanish: Sara
  alternatives_spanish:
  - Sarah
  lexicon: transliteración estándar
  rationale: Se usa la forma española habitual del nombre bíblico, «Sara», por inteligibilidad y consistencia en una traducción en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que ajustó la apertura a una construcción nominal («the life of Sarah was») para acercarse más al hebreo. En español, se reflejó con «la vida de Sara fue», evitando una paráfrasis más libre como «Sara vivió».
  spanish_consistency_notes:
  - Se mantuvo «Sara» en lugar de «Sarah» para la forma española del nombre.
  - Se preservó el paralelismo final con una repetición explícita de «la vida de Sara».
  - La nota al pie conserva la estilización distributiva del hebreo y no la reduce a un cardinal sin comentario.
