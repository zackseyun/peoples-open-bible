  to: '“No es así. Más bien, un hombre de la región montañosa[a] de Efraín, Seba hijo de Bicri, de nombre, ha alzado su mano[b] contra el rey, contra David. Entréguenlo a él solo, y yo me retiraré de la ciudad.” Y la mujer dijo a Joab: “Mira, su cabeza te será arrojada por encima del muro.”'
  rationale: 'Se corrigió el anclaje de la nota geográfica para que corresponda a la frase pertinente, se añadió la nota lexical exigida para el modismo ''ha alzado su mano'', y se hicieron dos mejoras menores de estilo: ''No es así'' en lugar de ''Eso no es así'' y ''te será arrojada'' en lugar de ''será arrojada hacia ti''. También se ajustó ''por nombre'' a ''de nombre'' para un español más natural.'
