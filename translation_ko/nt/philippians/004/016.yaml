id: PHP.4.16
reference: Philippians 4:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι καὶ ἐν Θεσσαλονίκῃ καὶ ἅπαξ καὶ δὶς εἰς τὴν χρείαν μοι ἐπέμψατε.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/016.yaml
  text: because even in Thessalonica you sent for my need both once and twice.
translation:
  language: ko
  text: 내가 데살로니가에 있을 때에도 여러분은 한 번뿐 아니라 두 번이나[a] 나의 필요를 위하여 보내 주셨기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「한 번도 두 번도」(ἅπαξ καὶ δίς). 본문은 반복된 후원을 강조하는 관용 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_korean: 때문입니다
  alternatives_korean:
  - 왜냐하면
  - ~인 것은
  lexicon: BDAG
  rationale: 15절의 진술에 대한 이유를 도입한다. 한국어 자연 어순상 술어 끝의 「때문입니다」가 매끄럽다.
- source_word: καὶ ἐν Θεσσαλονίκῃ
  english_pob_choice: even in Thessalonica
  chosen_korean: 데살로니가에 있을 때에도
  alternatives_korean:
  - 데살로니가에서도
  - 데살로니가에 있을 적에도
  lexicon: BDAG
  rationale: καί의 「~까지도/조차도」 함의를 「~에도」로 살리고, 처소를 「있을 때에」로 자연스럽게 시간적 정황으로 풀어낸다. 「데살로니가」는 한국 교회 정착 표기.
- source_word: ἅπαξ καὶ δὶς
  english_pob_choice: both once and twice
  chosen_korean: 한 번뿐 아니라 두 번이나
  alternatives_korean:
  - 한 번도 두 번도
  - 한두 번
  - 거듭거듭
  lexicon: BDAG
  rationale: 헬라어 관용구의 반복 강조를 「한 번뿐 아니라 두 번이나」로 자연스럽게 풀어낸다. 직역 「한 번도 두 번도」는 어색하고, 「한두 번」은 강조의 폭을 약화시킨다.
- source_word: εἰς τὴν χρείαν μοι
  english_pob_choice: for my need
  chosen_korean: 나의 필요를 위하여
  alternatives_korean:
  - 나의 필요에 응하여
  - 나의 쓸 것을 위하여
  lexicon: BDAG
  rationale: χρεία 단수를 「필요」로 정확히 살리고 목적의 εἰς를 「~을 위하여」로 명시한다.
- source_word: ἐπέμψατε
  english_pob_choice: you sent
  chosen_korean: 보내 주셨습니다
  alternatives_korean:
  - 보냈습니다
  - 보내 주셨기
  lexicon: BDAG
  rationale: 합쇼체 경어 「보내 주셨」으로 빌립보 성도의 호의를 살린다. 헬라어가 명시하지 않은 보내진 대상(돈·물자)을 본문에 덧붙이지 않는다.
