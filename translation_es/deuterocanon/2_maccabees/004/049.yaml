translation:
  language: es
  text: Por tanto, los que habían hablado de antemano[a] acerca de la ciudad, del pueblo[b] y de los vasos sagrados, pronto sufrieron el castigo injusto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que habían hecho una denuncia previa acerca de la ciudad, del pueblo y de los vasos sagrados». El participio griego puede implicar acusación o denuncia según el contexto, aunque literalmente significa «haber hablado de antemano».'
    reason: lexical_alternative
  - marker: b
    text: «Pueblo» aquí traduce δῆμοι, que puede referirse a grupos cívicos, distritos o poblaciones; el matiz exacto no puede determinarse con total certeza solo a partir de este versículo.
    reason: lexical_alternative
  - marker: c
    text: «Castigo» también podría traducirse como «pena» o «pérdida»; el término griego puede abarcar tanto sentido punitivo como de daño.
    reason: lexical_alternative
lexical_decisions:
- source_word: ταχέως
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - de inmediato
  - enseguida
  lexicon: LSJ
  rationale: El adverbio expresa prontitud del resultado; 'pronto' es natural en español y conserva la idea de una consecuencia cercana en el tiempo sin sonar excesivamente mecánico.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - así que
  - entonces
  - por consiguiente
  lexicon: LSJ
  rationale: Marca relación inferencial con el contexto anterior; 'Por tanto' mantiene el valor resultativo con registro formal y publicación-readable.
- source_word: ἄδικον ζημίαν
  english_pob_choice: the unjust penalty
  chosen_spanish: el castigo injusto
  alternatives_spanish:
  - la pena injusta
  - el castigo inmerecido
  - el daño injusto
  lexicon: LSJ
  rationale: ζημία puede abarcar pérdida, daño o pena. En este contexto de retribución, 'castigo' comunica mejor la dimensión punitiva; 'injusto' conserva ἄδικον. 'Castigo' es más natural para el español que un calco como 'pena' en este verso.
- source_word: ὑπέσχον
  english_pob_choice: suffered
  chosen_spanish: sufrieron
  alternatives_spanish:
  - padecieron
  - soportaron
  - experimentaron
  lexicon: LSJ
  rationale: El verbo indica experimentar o padecer una sanción; 'sufrieron' es idiomático, breve y respeta el carácter negativo del complemento.
- source_word: οἱ ... προηγορήσαντες
  english_pob_choice: those who had spoken beforehand
  chosen_spanish: los que habían hablado de antemano
  alternatives_spanish:
  - los que habían hablado previamente
  - los que habían denunciado antes
  - los que habían hecho acusación previa
  lexicon: LSJ
  rationale: El participio puede significar 'hablar antes' o, por contexto, 'hacer una denuncia previa'. La elección conserva la ambigüedad documentada sin forzar una lectura más específica que el griego explícito.
- source_word: περὶ πόλεως καὶ δήμων καὶ τῶν ἱερῶν σκευῶν
  english_pob_choice: concerning the city, the people and the sacred vessels
  chosen_spanish: acerca de la ciudad, del pueblo y de los utensilios sagrados
  alternatives_spanish:
  - concerning la ciudad, los pueblos y los vasos sagrados
  - acerca de la ciudad, de las comunidades y de los vasos sagrados
  - sobre la ciudad, el pueblo y los vasos sagrados
  lexicon: LSJ
  rationale: περὶ introduce el asunto tratado. πόλις es 'ciudad'; δῆμοι tiene un campo semántico social/cívico plural, pero aquí 'pueblo' sigue la revisión inglesa que favorece un sentido colectivo. σκεύη son 'utensilios' o 'vasos'; 'utensilios sagrados' preserva el carácter sacro y evita restringir demasiado a 'vasos' en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió 'the people' para δῆμοι por su posible sentido colectivo y mantuvo la coordinación cercana al griego. En español se conserva esa línea, pero se deja explícita la alternativa de denuncia en nota para no borrar la tensión léxica de προηγορήσαντες.
  spanish_consistency_notes:
  - Se mantuvo 'Por tanto' para οὖν por su valor inferencial, en línea con el inglés 'therefore'.
  - Se evitó 'SEÑOR' u otras convenciones de sustitución, ya que el texto no contiene el Nombre divino.
  - '''Castigo injusto'' refleja la combinación de ἄδικον ζημίαν sin diluir la dimensión punitiva ni convertirla en mero ''daño''.'
  - La opción 'utensilios sagrados' prioriza claridad española sin abandonar la literalidad del objeto sacro del griego.
