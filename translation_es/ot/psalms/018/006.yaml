translation:
  language: es
  text: Las cuerdas de Seol me rodearon[a]; los lazos de la muerte me salieron al encuentro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Seol» conserva el término hebreo; también puede entenderse como «el sepulcro» o «el reino de los muertos».
    reason: lexical_alternative
  - marker: b
    text: 'O: «me precedieron» o «me encontraron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶבְלֵי
  english_pob_choice: cords of
  chosen_spanish: lazos de
  alternatives_spanish:
  - cuerdas de
  - cordones de
  - ligaduras de
  lexicon: HALOT
  rationale: חבל puede referirse a cuerdas, cordeles o lazos; en poesía de amenaza y cerco, «lazos» comunica bien la idea de constricción y mantiene naturalidad en español. Evita una literalidad dura como «cuerdas» si suena menos idiomática en este contexto.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - el sepulcro
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se conserva la forma transliterada para no reducir el término a «sepulcro» ni a una explicación interpretativa. Así se preserva la distinción poética entre Seol y muerte, como en el texto hebreo y en la POB inglesa.
- source_word: סְבָבוּנִי
  english_pob_choice: surrounded me
  chosen_spanish: me rodearon
  alternatives_spanish:
  - me cercaron
  - me envolvieron
  - me rodearon por completo
  lexicon: HALOT
  rationale: El verbo expresa rodear o cercar; «me rodearon» es claro, natural y mantiene la imagen de encierro sin añadir intensidad no exigida por el hebreo.
- source_word: קִדְּמוּנִי
  english_pob_choice: confronted me
  chosen_spanish: me salieron al encuentro
  alternatives_spanish:
  - me confrontaron
  - me encontraron
  - me precedieron
  lexicon: HALOT
  rationale: El hebreo puede significar venir delante, encontrar o salir al encuentro. En este contexto hostil, «me salieron al encuentro» conserva el valor básico del verbo sin forzar una lectura más interpretativa que la inglesa «confronted me».
- source_word: מוֹקְשֵׁי
  english_pob_choice: the snares of
  chosen_spanish: los lazos
  alternatives_spanish:
  - las trampas
  - las redes
  - las argollas
  lexicon: HALOT
  rationale: מוקש denota trampa o lazo. Aquí se traduce nuevamente con «lazos» para mantener el paralelismo semántico y sonoro con el primer hemistiquio, sin perder la idea de trampa mortal.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - mortal
  - de morir
  lexicon: HALOT
  rationale: Se conserva el sustantivo «muerte» como fuerza personificada o amenazante, conforme al paralelismo del verso y al uso poético hebreo.
theological_decisions:
- issue: Tratamiento de שְׁאוֹל en un salmo poético
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - el sepulcro
  - el reino de los muertos
  rationale: La transliteración evita imponer una equivalencia doctrinal o cosmológica. Mantiene la tensión entre Seol y muerte, que el verso distingue poéticamente, y deja abierto el rango semántico del hebreo.
  doctrine_reference: 'Translation philosophy: Original-language primacy; preserve theological tension rather than flattening distinctive Hebrew terms.'
translation_notes:
  revision_awareness: El texto inglés vigente lee «The cords of Sheol surrounded me; the snares of death confronted me», con nota para «Sheol» y para el verbo del segundo hemistiquio. La versión española conserva esa misma distinción y ajusta la imagen con una solución idiomática equivalente en español.
  spanish_consistency_notes:
  - Se mantiene «Seol» en transliteración, coherente con el criterio POB para términos hebreos no equivalentes.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes; el verso no contiene el nombre divino.
  - La duplicación de «lazos» en ambos hemistiquios busca reflejar la densidad poética del original sin añadir explicación al cuerpo del texto.
