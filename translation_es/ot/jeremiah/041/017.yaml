translation:
  language: es
  text: Entonces fueron y se alojaron en Gerut Cimhán[a][b], que está junto a Belén, para ir a Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el lugar de hospedaje de Cimhán». El hebreo בְּגֵרוּת probablemente funciona aquí como nombre de lugar («Gerut»), pero también puede denotar un lugar de alojamiento o estancia asociado con Cimhán.
    reason: lexical_alternative
  - marker: b
    text: La forma escrita en el texto provisto parece irregular; el contexto apoya el nombre propio «Cimhán», conocido por 2 Samuel 19:37–40 y asociado con un sitio cerca de Belén.
    reason: textual_variant
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: So they went
  chosen_spanish: Así que fueron
  alternatives_spanish:
  - Y fueron
  - Entonces fueron
  lexicon: HALOT
  rationale: El wayyiqtol marca secuencia narrativa; «Así que» conserva la relación consecutiva con un español natural y fiel al flujo del relato.
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: and stayed
  chosen_spanish: se quedaron
  alternatives_spanish:
  - y permanecieron
  - y habitaron
  - y se alojaron
  lexicon: HALOT
  rationale: En este contexto de viaje, ישב expresa permanecer o establecerse temporalmente; «se quedaron» comunica esa permanencia sin sugerir simplemente el acto de sentarse.
- source_word: בְּגֵרוּת
  english_pob_choice: Geruth
  chosen_spanish: Gerut
  alternatives_spanish:
  - el lugar de hospedaje
  - el lugar de peregrinación
  lexicon: HALOT
  rationale: La POB inglesa retiene el probable topónimo. En español, «Gerut» conserva el nombre propio y evita imponer una paráfrasis interpretativa del sustantivo.
- source_word: כמו/הם
  english_pob_choice: Chimham
  chosen_spanish: Cimhán
  alternatives_spanish:
  - Kimham
  - Quimhán
  lexicon: BDB
  rationale: El contexto y la nota inglesa apoyan leer el nombre propio Chimham. Se translitera al español como «Cimhán» para mantener el antropónimo y su relación con el sitio.
- source_word: אֲשֶׁר אֵצֶל בֵּית לָחֶם
  english_pob_choice: which is beside Bethlehem
  chosen_spanish: que está junto a Belén
  alternatives_spanish:
  - que está cerca de Belén
  - que está al lado de Belén
  lexicon: HALOT
  rationale: אצל expresa proximidad; «junto a» es conciso y natural en español, manteniendo la relación locativa sin exceso de expansión.
- source_word: לָלֶכֶת
  english_pob_choice: to go
  chosen_spanish: para ir
  alternatives_spanish:
  - con el fin de ir
  - a ir
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa propósito. «Para ir» reproduce de manera directa y clara esa finalidad.
- source_word: לָבוֹא מִצְרָיִם
  english_pob_choice: to go into Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - para entrar en Egipto
  - para ir a Egipto
  lexicon: HALOT
  rationale: El par de infinitivos conserva la idea de movimiento hacia la meta. En español, «para ir a Egipto» sería redundante; «para ir a Egipto» se ha condensado dentro de la frase final «para ir a Egipto» por fluidez, mientras que la dirección hacia la tierra queda clara por el contexto.
- source_word: מִצְרָיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: HALOT
  rationale: Nombre geográfico estándar en español.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que eliminó una expansión interpretativa («intending to go on into Egypt») y la redujo a la construcción más directa «to go into Egypt». La versión española conserva esa misma sobriedad y mantiene el topónimo probable junto con la nota textual sobre Cimhán.
  spanish_consistency_notes:
  - Se evita «Señor» o equivalentes no pertinentes; no hay términos teológicos que requieran normalización adicional.
  - «Gerut Cimhán» preserva la toponimia probable sin traducir el sustantivo a una paráfrasis.
  - «para ir a Egipto» refleja el infinitivo de propósito sin añadir intención explícita más allá del hebreo.
