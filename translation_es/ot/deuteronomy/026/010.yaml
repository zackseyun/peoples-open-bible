revisions:
- from: Y ahora, he aquí, he traído los primeros frutos de la tierra que tú me has dado, Yahvé. Y lo pondrás delante de Yahvé tu Dios, y te inclinarás delante de Yahvé tu Dios.
  to: Y ahora, he aquí, he traído las primicias[a] de la tierra que tú me has dado, Yahvé. Y la pondrás delante de Yahvé tu Dios, y te postrarás delante de Yahvé tu Dios.
  rationale: 'Se revisa para ajustar mejor el lenguaje ritual del hebreo y del POB auditado: «primicias» refleja mejor רֵאשִׁית פְּרִי הָאֲדָמָה que «primeros frutos»; se añade una nota con alternativas léxicas relevantes; y «te postrarás» expresa con mayor precisión el gesto corporal de השתחוה. No se requiere adjudicación adicional porque la corrección es directa y no doctrinalmente controvertida.'
  reviewer_model: gpt-5.4
