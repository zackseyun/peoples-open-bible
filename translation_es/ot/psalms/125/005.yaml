translation:
  language: es
  text: Pero en cuanto a los que se desvían por sus caminos torcidos[a], Yahvé los conducirá con los obreros de iniquidad[b]. Paz sobre Israel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a sus caminos torcidos» o «a sus sendas torcidas».
    reason: lexical_alternative
  - marker: b
    text: O «Yahvé los llevará junto con los obreros de iniquidad».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «Paz sobre Israel»; una bendición breve o una oración por la paz o el bienestar de Israel.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהַמַּטִּים
  english_pob_choice: But as for those who turn aside
  chosen_spanish: Pero en cuanto a los que se desvían
  alternatives_spanish:
  - Y los que se desvían
  - Pero los que se apartan
  lexicon: HALOT
  rationale: El participio de נטה expresa desviarse o apartarse. «Pero en cuanto a» conserva el contraste con el justo del verso anterior y el matiz tópico del participio con artículo; «se desvían» comunica bien la acción de apartarse del camino recto.
- source_word: עַקַלְקַלּוֹתָם
  english_pob_choice: to their crooked ways
  chosen_spanish: por sus caminos torcidos
  alternatives_spanish:
  - a sus caminos torcidos
  - por sus sendas torcidas
  lexicon: HALOT
  rationale: La expresión hebrea describe caminos retorcidos o desviados en sentido moral. «Caminos torcidos» mantiene la imagen y el valor ético; «por» refleja que la desviación caracteriza su andar.
- source_word: יוֹלִיכֵם
  english_pob_choice: will lead them away
  chosen_spanish: los hará irse
  alternatives_spanish:
  - los conducirá lejos
  - los llevará fuera
  lexicon: HALOT
  rationale: 'El hifil de הלך tiene valor causativo: hacer ir/dirigir. «Los hará irse» conserva la idea de moverlos o expulsarlos hacia fuera; en español suena natural y no añade una dirección explícita que el hebreo no exige necesariamente.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, conforme al criterio del proyecto. «Yahvé» es la forma establecida en la serie española y preserva el nombre personal de Dios.
- source_word: פֹּעֲלֵי הָאָוֶן
  english_pob_choice: the workers of iniquity
  chosen_spanish: los obreros de iniquidad
  alternatives_spanish:
  - los que practican la iniquidad
  - los hacedores de iniquidad
  lexicon: HALOT
  rationale: El sustantivo verbal con אָוֶן significa literalmente quienes trabajan/obran maldad o iniquidad. «Obreros de iniquidad» conserva la construcción nominal del hebreo y sigue la revisión inglesa reciente que prefirió «iniquity» frente a «wickedness».
- source_word: שָׁלוֹם
  english_pob_choice: Peace
  chosen_spanish: Paz
  alternatives_spanish:
  - Paz y bienestar
  - Bienestar
  lexicon: HALOT
  rationale: «Paz» es la traducción más natural y fiel; en hebreo incluye también la idea amplia de plenitud o bienestar, pero no conviene explicitarla en el texto principal sin necesidad.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: be upon Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - sobre Israel sea
  - para Israel
  lexicon: HALOT
  rationale: La preposición עַל se conserva literalmente como «sobre», porque la frase funciona como una bendición concisa. En español, «Paz sobre Israel» mantiene el tono declarativo y litúrgico del hebreo sin forzar una perífrasis.
theological_decisions:
- issue: Fuerza final de שָׁלוֹם עַל יִשְׂרָאֵל
  english_pob_reading: 'A benedictory/prayer-like declaration: ''Peace be upon Israel.'''
  chosen_spanish_reading: 'Una declaración breve de bendición: «Paz sobre Israel».'
  alternative_spanish_readings:
  - «Que la paz sea sobre Israel»
  - «Paz sea sobre Israel»
  rationale: El hebreo permite una formulación nominal muy concisa, y el POB inglés la entiende como bendición o cierre litúrgico. El español elegido conserva esa brevedad y la ambigüedad útil entre declaración y deseo, sin resolver en exceso el tiempo verbal.
  doctrine_reference: Preservar la tensión textual y el tono benedictivo del salmo.
translation_notes:
  revision_awareness: La base inglesa revisada cambió «wickedness» por «iniquity» para reflejar más directamente הָאָוֶן; la versión española sigue esa decisión con «iniquidad». También se mantuvo el cierre benedictivo breve de la tradición auditada, sin convertirlo en una explicación expansiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se mantiene «iniquidad» para הָאָוֶן, en línea con la revisión inglesa más reciente.
  - El cierre «Paz sobre Israel» conserva la concisión hebrea y el tono litúrgico.
  - «Se desvían» y «caminos torcidos» preservan la imagen moral de apartarse del camino recto.
