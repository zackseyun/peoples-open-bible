translation:
  language: es
  text: Faraón se enojó con sus servidores, y me puso bajo custodia[a] en la casa del capitán de la guardia[b], a mí y al jefe de los panaderos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bajo guardia»; el término hebreo denota un confinamiento vigilado y no exige especificar un edificio de prisión formal.
    reason: lexical_alternative
  - marker: b
    text: «Capitán de la guardia» traduce un título de corte que, de manera más literal, es «jefe de los matadores/ejecutores».
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּרְעֹה / Pharaoh
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el faraón
  lexicon: N/A
  rationale: Es el título propio convencional en español y comunica adecuadamente el referente histórico sin añadir interpretación.
- source_word: קָצַף
  english_pob_choice: was angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - estaba enojado
  - se enfureció
  lexicon: HALOT
  rationale: El hebreo expresa ira; «se enojó» es natural en español y mantiene una intensidad moderada, acorde con la elección inglesa de no sobredimensionar el verbo.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus esclavos
  lexicon: HALOT
  rationale: «Siervos» conserva la relación de dependencia respecto de Faraón. Se evita «esclavos» porque aquí la referencia contextual apunta a funcionarios de la corte, no a esclavitud en primer plano; «servidores» es posible, pero menos fiel al campo semántico de עבד.
- source_word: בְּמִשְׁמַר
  english_pob_choice: in custody
  chosen_spanish: bajo custodia
  alternatives_spanish:
  - en custodia
  - bajo guardia
  - en prisión
  lexicon: HALOT
  rationale: «Bajo custodia» refleja el encierro vigilado sin especificar indebidamente una prisión formal; mantiene la equivalencia funcional del sustantivo hebreo.
- source_word: בֵּית שַׂר הַטַּבָּחִים
  english_pob_choice: the house of the captain of the guard
  chosen_spanish: la casa del capitán de la guardia
  alternatives_spanish:
  - la casa del jefe de los verdugos
  - la casa del capitán de los guardias
  lexicon: HALOT
  rationale: Se conserva la forma idiomática ya asentada en la tradición inglesa de la POB. Aunque el hebreo puede aludir más literalmente al jefe de los ejecutores/guardia, «capitán de la guardia» comunica bien el título cortesano sin perder la referencia institucional.
- source_word: שַׂר הָאֹפִים
  english_pob_choice: the chief baker
  chosen_spanish: el jefe de los panaderos
  alternatives_spanish:
  - el panadero principal
  - el jefe de los panaderos de la corte
  lexicon: HALOT
  rationale: «Jefe de los panaderos» refleja la estructura de cargo del hebreo y mantiene la relación con el oficio colectivo; es una opción clara y natural en español.
- source_word: אֹתִי ... וְאֵת שַׂר הָאֹפִים
  english_pob_choice: me and the chief baker
  chosen_spanish: a mí y al jefe de los panaderos
  alternatives_spanish:
  - me puso bajo custodia, junto con el jefe de los panaderos
  - a mí, junto con el jefe de los panaderos
  lexicon: N/A
  rationale: El español requiere la preposición «a» con el objeto personal. Se mantiene la coordinación de ambos confinados, sin forzar una repetición artificial del objeto directo.
translation_notes:
  revision_awareness: 'Coincide con el control reciente de la fuente y con el alto grado de acuerdo del cotejo: no se requieren cambios sustanciales respecto del audit trail inglés. Se mantiene la tensión lexical de בְּמִשְׁמַר mediante una nota alternativa, y se preserva el título cortesano de שַׂר הַטַּבָּחִים en una forma española idiomática.'
  spanish_consistency_notes:
  - Se usa «Faraón» como nombre/título propio estable en español.
  - Se evita «prisión» para no sobredeterminar בְּמִשְׁמַר.
  - Se conserva «capitán de la guardia» en línea con la tradición POB, con nota sobre la literalidad hebrea.
  - «Jefe de los panaderos» traduce שַׂר הָאֹפִים con transparencia de cargo.
  - La estructura con «a mí» respeta la exigencia sintáctica del español para el objeto personal.
