translation:
  text: Do not trade away a friend for a price[c][b][a], or a brother who is worth the gold of Ophir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has a very different reading here: ''Remember that anger does not last long.'' The Hebrew witness preserved in the Cairo Geniza instead warns against trading away a friend or brother for wealth.'
    reason: textual_variant
  - marker: b
    text: Or 'exchange a friend for payment.'
    reason: lexical_alternative
  - marker: c
    text: '''Brother'' may refer to a literal brother or, more broadly, a close kinsman or companion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּמִיר
  chosen: trade away
  alternatives:
  - exchange
  - barter
  - replace
  lexicon: HALOT
  rationale: The Hiphil of מור here carries the sense of exchanging or substituting one thing for another. 'Trade away' communicates the commercial nuance created by the following phrase 'for a price' and fits the warning context better than the flatter 'replace'.
- source_word: אוֹהֵב
  chosen: friend
  alternatives:
  - one who loves
  - lover
  - beloved companion
  lexicon: HALOT
  rationale: Although literally 'one who loves,' in wisdom usage this commonly denotes a friend or loyal companion. 'Friend' is idiomatic English and matches the relational sense in context.
- source_word: בִּמְחִיר
  chosen: for a price
  alternatives:
  - for payment
  - for gain
  - for money
  lexicon: HALOT
  rationale: The noun denotes price or payment. 'For a price' preserves the mercenary/commercial force without over-specifying the medium.
- source_word: אָח
  chosen: brother
  alternatives:
  - kinsman
  - close companion
  lexicon: HALOT
  rationale: The Hebrew word is literally 'brother.' In wisdom literature it may extend beyond a biological sibling, but the concrete familial term should be preserved in the main text under the project's gender-accurate policy.
- source_word: תָּלוּי
  chosen: who is worth
  alternatives:
  - hanging
  - dependent
  - to be weighed against
  - to be valued at
  lexicon: HALOT
  rationale: The Hebrew form is difficult in isolation, but in this parallelism with 'for a price' and with 'gold of Ophir' it most naturally conveys valuation/comparison rather than literal suspension. 'Who is worth' gives clear English sense while reflecting the implied valuation. The wording also avoids forcing a more technical reconstruction than the surviving Hebrew warrants.
- source_word: בִּזְהַב אוֹפִיר
  chosen: the gold of Ophir
  alternatives:
  - Ophir gold
  - fine gold of Ophir
  lexicon: HALOT
  rationale: Ophir is a known biblical source of exceptionally precious gold. Retaining the place name preserves the cultural and literary resonance of supreme value.
