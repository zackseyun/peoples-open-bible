translation:
  language: es
  text: Y cuando todos habían hecho lo mismo juntos y habían implorado al Señor misericordioso con llanto, ayunos y postración durante tres días sin cesar, Judas los animó y les ordenó reunirse.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πάντων δὲ τὸ αὐτὸ ποιησάντων ὁμοῦ
  english_pob_choice: when all had done the same together
  chosen_spanish: cuando todos habían hecho lo mismo juntos
  alternatives_spanish:
  - después de que todos hubieron hecho lo mismo juntos
  - puesto que todos habían hecho lo mismo juntos
  lexicon: LSJ
  rationale: Mantiene la construcción de genitivo absoluto como circunstancia previa a la acción de Judas, y conserva la fuerza colectiva de πάντων y ὁμοῦ con una formulación natural en español.
- source_word: καταξιωσάντων τὸν ἐλεήμονα κύριον
  english_pob_choice: had implored the merciful Lord
  chosen_spanish: habían implorado al Señor misericordioso
  alternatives_spanish:
  - habían suplicado al Señor misericordioso
  - habían rogado al Señor misericordioso
  lexicon: LSJ
  rationale: En este contexto de oración insistente, ‘implorar’ expresa mejor la súplica intensa que un calco de ‘considerar digno’ y coincide con la lectura auditada del inglés POB.
- source_word: τὸν ἐλεήμονα κύριον
  english_pob_choice: the merciful Lord
  chosen_spanish: el Señor misericordioso
  alternatives_spanish:
  - el Señor compasivo
  lexicon: LSJ
  rationale: ‘Misericordioso’ y ‘compasivo’ son equivalentes posibles; se escogió ‘misericordioso’ por ser directo, bíblico y claro en español.
- source_word: μετὰ κλαυθμοῦ καὶ νηστειῶν καὶ προπτώσεως
  english_pob_choice: with weeping and fasting and prostration
  chosen_spanish: con llanto, ayunos y postración
  alternatives_spanish:
  - con llanto, ayuno y postración
  - con lágrimas, ayunos y postración
  lexicon: LSJ
  rationale: Se conserva la lista de actos de súplica. Se mantiene el plural ‘ayunos’ para reflejar la forma plural del griego y la persistencia del gesto durante el período descrito.
- source_word: ἐπὶ ἡμέρας τρεῖς ἀδιαλείπτως
  english_pob_choice: for three days without ceasing
  chosen_spanish: durante tres días sin cesar
  alternatives_spanish:
  - por tres días sin interrupción
  - durante tres días continuamente
  lexicon: LSJ
  rationale: ‘Sin cesar’ preserva ἀδιαλείπτως con naturalidad en español, y ‘durante tres días’ expresa correctamente la duración.
- source_word: παρακαλέσας αὐτοὺς
  english_pob_choice: Judas encouraged them
  chosen_spanish: Judas los animó
  alternatives_spanish:
  - Judas los exhortó
  - Judas los urgió
  lexicon: LSJ
  rationale: παρακαλέω puede abarcar animar, exhortar o urgir. ‘Los animó’ conserva el tono de estímulo y consuelo tras la oración común sin forzar un matiz más severo.
- source_word: ἐκέλευσεν παραγίνεσθαι
  english_pob_choice: ordered them to assemble
  chosen_spanish: les ordenó reunirse
  alternatives_spanish:
  - les ordenó presentarse
  - les ordenó acudir
  lexicon: LSJ
  rationale: Se sigue la revisión auditada del inglés POB que corrigió el sentido hacia ‘assemble’. En español, ‘reunirse’ transmite claramente la orden de congregarse/presentarse juntos, sin introducir un matiz técnico ajeno al contexto.
theological_decisions:
- issue: Rendering of κύριος in prayer context
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: Se conserva la equivalencia reverencial de κύριος en una oración dirigida a Dios. ‘Señor’ es la forma más estable y natural en español para este contexto.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El borrador sigue la última revisión auditada del inglés POB, que ajustó el cierre a ‘ordered them to assemble’ por mejor correspondencia con παραγίνεσθαι. También respeta la preferencia revisada por ‘fasting’ en singular en inglés; en español se mantuvo el plural ‘ayunos’ porque el griego plural νηστειῶν sugiere actos repetidos o prolongados, y el español lo expresa con naturalidad.
  spanish_consistency_notes:
  - Se mantiene ‘Señor’ para κύριος, conforme al criterio doctrinal del proyecto y al contexto de oración.
  - Se conserva ‘misericordioso’ para ἐλεήμονα, evitando sustituirlo por un término menos directo.
  - La secuencia ‘llanto, ayunos y postración’ refleja la lista del griego sin suavizar el carácter penitencial de la escena.
  - ‘Reunirse’ traduce la orden final de modo más coherente con la revisión auditada del inglés POB y el valor contextual de παραγίνεσθαι.
