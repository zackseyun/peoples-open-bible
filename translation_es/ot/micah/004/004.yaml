  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: el distributivo «cada uno», la imagen de paz «debajo de su vid y debajo de su higuera», la ausencia de un agente que infunda miedo y la fórmula de garantía «porque ... ha hablado». Sin embargo, la nota [b] no corresponde al rastro de auditoría inglés, que preserva como alternativa tradicional «the LORD of hosts» para צְבָאוֹת, no una reformulación de מַחֲרִיד.'
  spanish_quality_summary: El español es claro, natural y digno. «Cada uno se sentará debajo de su vid y debajo de su higuera» funciona bien. «No habrá quien los haga temer» es comprensible, pero «no habrá quien los atemorice» suena más idiomático y directo en español bíblico contemporáneo, manteniendo el agente causante. «La boca de Yahvé de los Ejércitos ha hablado» preserva correctamente el hebraísmo y la solemnidad.
  glossary_alignment: Alinea bien con la terminología del proyecto al usar «Yahvé» para יהוה. También traduce צְבָאוֹת como «de los Ejércitos», en línea con la preferencia por traducirlo. No hay conflicto doctrinal importante; la única corrección necesaria es ajustar la footnote para reflejar la alternativa tradicional vinculada a «Yahvé de los Ejércitos».
  issues:
  - severity: medium
    issue: La nota [b] está anclada a «temer» pero el rastro inglés usa la nota b para la alternativa tradicional de צְבָאוֹת.
    rationale: La evidencia auditada preserva una nota sobre «the LORD of hosts», no sobre מַחֲרִיד. La nota española actual altera la justificación documentada y desplaza la alternativa relevante.
  - severity: low
    issue: «No habrá quien los haga temer» es menos idiomático que una opción como «no habrá quien los atemorice».
    rationale: La redacción actual es fiel, pero algo más forzada en español. Puede mejorarse sin pérdida semántica y manteniendo la idea de un agente causante del miedo.
  revised_spanish_text: Cada uno[a] se sentará debajo de su vid y debajo de su higuera, y no habrá quien los atemorice, porque la boca de Yahvé de los Ejércitos[b] ha hablado.
  revised_footnotes:
  - marker: a
    text: 'O: «cada uno se sentará debajo de su vid y debajo de su higuera». El hebreo tiene «cada hombre», una forma singular masculina usada distributivamente.'
    reason: lexical_alternative
  - marker: b
    text: 'Traducción tradicional: «Yahvé de los ejércitos».'
    reason: alternative_reading
  revision_rationale: 'Se revisa para alinear las notas con el rastro de auditoría inglés: la nota [b] debe documentar la alternativa tradicional de צְבָאוֹת, no una glosa de «atemorizar». También se mejora levemente la naturalidad española cambiando «los haga temer» por «los atemorice», sin alterar el sentido del hebreo.'
