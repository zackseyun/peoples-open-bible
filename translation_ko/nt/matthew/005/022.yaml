id: MAT.5.22
reference: Matthew 5:22
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐγὼ δὲ λέγω ὑμῖν ὅτι πᾶς ὁ ὀργιζόμενος τῷ ἀδελφῷ ⸀αὐτοῦ ἔνοχος ἔσται τῇ κρίσει· ὃς δ’ ἂν εἴπῃ τῷ ἀδελφῷ αὐτοῦ· Ῥακά, ἔνοχος ἔσται τῷ συνεδρίῳ· ὃς δ’ ἂν εἴπῃ· Μωρέ, ἔνοχος ἔσται εἰς τὴν γέενναν τοῦ πυρός.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/005/022.yaml
  text: But I say to you that everyone who is angry with his brother will be liable to the judgment[a]; and whoever says to his brother, ‘Raca,’ will be liable to the council; and whoever says[e][d][c][b], ‘Fool,’ will be liable to the Gehenna of fire.
  footnotes:
  - marker: a
    text: Some manuscripts add 'without cause' after 'is angry with his brother.' The earliest and best-attested reading omits it.
    reason: textual_variant
  - marker: b
    text: '''Raca'' is an Aramaic term of contempt, roughly ''empty-head'' or ''good-for-nothing.'''
    reason: cultural_note
  - marker: c
    text: Or 'the Sanhedrin,' the Jewish ruling council.
    reason: alternative_reading
  - marker: d
    text: '''Brother'' translates a masculine singular term that can function representatively; the saying applies broadly, not only to male siblings.'
    reason: lexical_alternative
  - marker: e
    text: Or 'hell of fire'; 'Gehenna' preserves the specific term Jesus used, drawn from the Valley of Hinnom imagery associated with judgment.
    reason: alternative_reading
translation:
  language: ko
  text: 그러나 나는 여러분에게 말합니다. 자기 형제에게 화를 내는 사람은 누구든지 심판을 받을 것입니다. 자기 형제에게 『라가』라고 말하는 사람은 공의회에 회부될 것입니다. 그리고 『바보』라고 말하는 사람은 불 게헨나에 던져질 것입니다.
  philosophy: optimal-equivalence
