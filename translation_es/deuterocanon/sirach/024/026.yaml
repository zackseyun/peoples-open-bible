translation:
  language: es
  text: El que colma el entendimiento como el Éufrates[a], y como el Jordán en los días de la siega[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que colma el entendimiento como el Éufrates, y como el Jordán en tiempo de siega».'
    reason: alternative_reading
  - marker: b
    text: La imagen evoca ríos caudalosos en crecida, especialmente el Jordán cuando se desborda en la temporada de la siega.
    reason: cultural_note
  - marker: c
    text: 'O: «en tiempo de siega».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ἀναπληρῶν
  english_pob_choice: It fills up understanding / It overflows with understanding
  chosen_spanish: Él colma de entendimiento
  alternatives_spanish:
  - Él llena de entendimiento
  - Él rebosa de entendimiento
  lexicon: BDAG; LSJ
  rationale: El participio articular griego funciona aquí como sujeto caracterizador y expresa una acción abundante. «Colma» conserva la idea de llenar plenamente sin volver la frase torpe en español, y evita el matiz intransitivo de «rebosa de» que no refleja tan bien el objeto directo σύνεσιν.
- source_word: σύνεσιν
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - inteligencia
  - insight
  lexicon: BDAG
  rationale: «Entendimiento» es natural en español bíblico y conserva el sentido amplio de comprensión sapiencial. «Discernimiento» sería más específico, pero estrecha demasiado el término griego en este contexto.
- source_word: ὡς Εὐφράτης
  english_pob_choice: like the Euphrates
  chosen_spanish: como el Éufrates
  alternatives_spanish:
  - cual el Éufrates
  - como el río Éufrates
  lexicon: LSJ
  rationale: La comparación con el río se expresa de forma directa y natural en español. Se mantiene el nombre tradicional del río en castellano, sin añadir innecesariamente «río».
- source_word: Ἰορδάνης
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - Jordán
  lexicon: LSJ
  rationale: En español, los nombres de ríos normalmente llevan artículo. «El Jordán» conserva la referencia geográfica y la fluidez idiomática.
- source_word: ἐν ἡμέραις θερισμοῦ
  english_pob_choice: in the days of harvest
  chosen_spanish: en los días de la siega
  alternatives_spanish:
  - en los días de la cosecha
  - en tiempo de siega
  - en tiempo de cosecha
  lexicon: BDAG
  rationale: «Siega» refleja con más precisión el lenguaje agrícola concreto del griego y mantiene el tono poético de la frase. «Cosecha» es posible, pero más general.
translation_notes:
  revision_awareness: La versión inglesa revisada osciló entre «fills up understanding» y «overflows with understanding» para reflejar ἀναπληρόω. En español se optó por «colma de entendimiento», que preserva la transitividad del participio y la imagen de abundancia sin introducir un giro más interpretativo que el griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; aquí no aparece.
  - Se conserva un registro bíblico moderno y digno, evitando calcos innecesarios.
  - Se prefirió «entendimiento» por consistencia con literatura sapiencial y por su amplitud semántica.
