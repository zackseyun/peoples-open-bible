    rationale: 'El sujeto semántico y gramatical en la cadena narrativa es plural (''todo el pueblo'' entendido colectivamente con verbos plurales en hebreo), y el resto del versículo usa plural: ''fueron'', ''pusieron'', ''prendieron''. ''Cortó'' rompe la concordancia y suena incorrecto en español.'
  - severity: medium
