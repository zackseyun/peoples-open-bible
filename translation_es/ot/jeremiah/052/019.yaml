translation:
  language: es
  text: Y los cuencos[a], los braseros[b], las fuentes, las ollas, los candelabros, las copas, y los utensilios para derramar—todo lo que era oro, oro, y todo lo que era plata, plata[c]—lo tomó el capitán de la guardia[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las copas' para הַסִּפִּים; la distinción exacta entre varios términos de utensilios del templo en esta lista es incierta.
    reason: lexical_alternative
  - marker: b
    text: O 'los incensarios' para 'los braseros'.
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo repite ''oro, oro'' y ''plata, plata'' para énfasis: ''todo lo que era oro, oro, y todo lo que era plata, plata''.'
    reason: lexical_alternative
  - marker: d
    text: O 'el jefe de los ejecutores' para 'el capitán de la guardia'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסִּפִּים
  english_pob_choice: the bowls
  chosen_spanish: las vasijas
  alternatives_spanish:
  - los cuencos
  - las tazas
  lexicon: HALOT
  rationale: El término es incierto en este inventario de utensilios del templo. 'Vasijas' mantiene la idea de recipiente sin comprometer demasiado la forma exacta; se deja constancia de la alternativa 'cuencos' porque el POB inglés también reconoce la oscilación entre recipientes semejantes.
- source_word: הַמַּחְתּוֹת
  english_pob_choice: the firepans
  chosen_spanish: los incensarios
  alternatives_spanish:
  - los braseros
  lexicon: HALOT
  rationale: Aunque el inglés optó por 'firepans' para conservar concreción, en español 'incensarios' es el equivalente cultual más transparente para utensilios del santuario asociados con brasas e incienso. 'Braseros' es posible, pero menos preciso dentro de esta lista ritual.
- source_word: הַמִּזְרָקוֹת
  english_pob_choice: the basins
  chosen_spanish: las tazas
  alternatives_spanish:
  - las vasijas para aspersión
  - las fuentes
  lexicon: HALOT
  rationale: El inventario reúne varios tipos de recipientes pequeños y medianos; 'tazas' refleja un recipiente abierto y evita duplicar 'vasijas'. La función ritual exacta no se puede fijar con certeza solo por el término.
- source_word: הַסִּירוֹת
  english_pob_choice: the pots
  chosen_spanish: los pucheros
  alternatives_spanish:
  - las ollas
  - los recipientes
  lexicon: HALOT
  rationale: '''Pucheros'' comunica un utensilio de cocina o servicio de forma natural en español, acorde con el valor básico de ''pots''. ''Ollas'' también es viable; se eligió ''pucheros'' para distinguirlo de otros recipientes de la lista.'
- source_word: הַמְּנֹרוֹת
  english_pob_choice: the lampstands
  chosen_spanish: los candelabros
  alternatives_spanish:
  - los lampadarios
  - las lámparas
  lexicon: HALOT
  rationale: En español, 'candelabros' es el término más comprensible para el objeto cultual de soporte de luz. 'Lampadarios' es más técnico y 'lámparas' sería menos preciso, porque no nombra el soporte.
- source_word: הַכַּפּוֹת
  english_pob_choice: the cups
  chosen_spanish: los cuencos
  alternatives_spanish:
  - las copas
  - las cucharillas
  lexicon: HALOT
  rationale: Para mantener la serie de recipientes sin hacerla idéntica a otras entradas, 'cuencos' funciona como un objeto pequeño de mesa o culto. El término hebreo admite más de una concreción; se preserva esa amplitud.
- source_word: הַמְּנַקִיּוֹת
  english_pob_choice: the vessels for pouring
  chosen_spanish: los utensilios para derramar
  alternatives_spanish:
  - los vasos para libar
  - los recipientes de derramamiento
  lexicon: HALOT
  rationale: El hebreo es raro y el contexto apunta a utensilios del templo relacionados con el vertido. 'Utensilios para derramar' conserva la función sin imponer una identificación demasiado específica como 'flagones' o 'vasos para libar'.
- source_word: אֲשֶׁר זָהָב זָהָב וַאֲשֶׁר כֶּסֶף כָּסֶף
  english_pob_choice: whatever was gold, gold, and whatever was silver, silver
  chosen_spanish: todo lo que era de oro, oro, y todo lo que era de plata, plata
  alternatives_spanish:
  - todo lo que era oro, oro, y todo lo que era plata, plata
  - todo lo de oro, oro, y todo lo de plata, plata
  lexicon: HALOT
  rationale: 'Se conserva la repetición enfática del hebreo, como en el POB inglés. ''Era de oro / era de plata'' suena natural en español y mantiene el valor de inventario: se tomaron todas las piezas de esos metales, sin suavizar la duplicación.'
- source_word: לָקַח
  english_pob_choice: took
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo llevó
  - se lo llevó
  lexicon: HALOT
  rationale: '''Tomó'' sigue la simplicidad del verbo hebreo y mantiene el tono narrativo seco del texto. El objeto implícito se expresa naturalmente en español mediante ''lo'' para recoger la lista completa.'
- source_word: רַב טַבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el jefe de los ejecutores
  - el comandante de la guardia
  lexicon: HALOT
  rationale: Se conserva la lectura administrativa/militar establecida por el POB inglés. 'Capitán de la guardia' es idiomático y comunica bien el cargo de Nebuzaradán sin forzar el sentido literal de 'ejecutor'.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que ajustó la expresión a 'whatever was gold/silver' para acercarse más al hebreo manteniendo naturalidad. También se respetó el enfoque de inventario de utensilios y la incertidumbre léxica en varios nombres de recipientes del templo.
  spanish_consistency_notes:
  - Se mantuvo la secuencia enumerativa con polisíndeton moderado ('y... y...') para reflejar la acumulación del hebreo.
  - Se preservó la repetición enfática de 'oro, oro' y 'plata, plata' en lugar de normalizarla.
  - Se evitó 'SEÑOR' u otros reemplazos teológicos porque el verso no contiene el nombre divino.
  - '''Capitán de la guardia'' se conserva como título administrativo establecido por la tradición POB en inglés.'
