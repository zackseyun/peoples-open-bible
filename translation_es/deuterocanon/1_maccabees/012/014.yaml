translation:
  language: es
  text: Hemos intentado enviarles y renovar la hermandad y la amistad[a], para no quedar distanciados de ustedes; porque han pasado muchos años desde que ustedes enviaron a nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchos períodos han pasado» o «mucho tiempo ha pasado». El griego usa el plural καιροί, literalmente «tiempos» o «estaciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπειράθημεν
  english_pob_choice: We have tried
  chosen_spanish: Hemos intentado
  alternatives_spanish:
  - Hemos tratado
  - Hemos procurado
  lexicon: LSJ
  rationale: El aoristo con valor de esfuerzo deliberado se expresa de manera natural con «hemos intentado», que conserva la idea de tentativa sin añadir éxito implícito.
- source_word: ἀποστεῖλαι
  english_pob_choice: to send
  chosen_spanish: enviarles
  alternatives_spanish:
  - mandarles
  - despacharles
  lexicon: LSJ
  rationale: El sentido básico es «enviar». En español, el dativo directo «les» comunica claramente el destino de la acción sin sobrecargar el registro.
- source_word: τὴν πρὸς ὑμᾶς ἀδελφότητα καὶ φιλίαν
  english_pob_choice: the brotherhood and friendship
  chosen_spanish: la hermandad y la amistad
  alternatives_spanish:
  - la fraternidad y la amistad
  - el parentesco fraternal y la amistad
  lexicon: LSJ
  rationale: ἀδελφότης apunta a una relación de hermandad/fraternidad; «hermandad» mantiene ese campo semántico y suena natural en español bíblico. «Amistad» corresponde bien a φιλία.
- source_word: ἀνανεώσασθαι
  english_pob_choice: renew
  chosen_spanish: renovar
  alternatives_spanish:
  - restaurar
  - hacer nueva
  lexicon: LSJ
  rationale: El infinitivo expresa reactivar o renovar una relación ya existente. «Renovar» es el equivalente más directo y idiomático en español.
- source_word: πρὸς τὸ μὴ ἐξαλλοτριωθῆναι ὑμῶν
  english_pob_choice: so that we might not become estranged from you
  chosen_spanish: para no llegar a estar alejados de ustedes
  alternatives_spanish:
  - para no enajenarnos de ustedes
  - para no quedar separados de ustedes
  lexicon: LSJ
  rationale: ἐξαλλοτριωθῆναι expresa volverse ajeno o apartado. «Llegar a estar alejados» conserva el matiz relacional sin introducir un término excesivamente técnico como «enajenados».
- source_word: πολλοὶ γὰρ καιροὶ διῆλθον
  english_pob_choice: for many years have passed
  chosen_spanish: porque han pasado muchos años
  alternatives_spanish:
  - porque han pasado muchos períodos
  - pues han pasado muchas estaciones
  lexicon: LSJ
  rationale: Aunque καιροί puede significar «tiempos», «estaciones» o «períodos», el contexto epistolar-histórico favorece una expresión natural en español como «años», como refleja la revisión inglesa más reciente.
- source_word: ἀφʼ οὗ ἀπεστείλατε πρὸς ἡμᾶς
  english_pob_choice: since you sent to us
  chosen_spanish: desde que nos enviaron
  alternatives_spanish:
  - desde que nos mandaron
  - desde que enviaron a nosotros
  lexicon: LSJ
  rationale: El griego no especifica qué fue enviado; «nos enviaron» sigue de cerca la formulación sin introducir un objeto no explícito. Se conserva la sencillez del original.
theological_decisions:
- issue: Naturaleza de la relación entre los destinatarios y los hablantes
  english_pob_reading: brotherhood and friendship
  chosen_spanish_reading: hermandad y amistad
  alternative_spanish_readings:
  - fraternidad y amistad
  - parentesco y amistad
  rationale: El texto presenta una relación diplomática y fraterna, no una categoría eclesial posterior. «Hermandad» mantiene la fuerza relacional de ἀδελφότης sin forzar terminología confesional.
  doctrine_reference: Relaciones fraternas/diplomáticas en literatura deuterocanónica; no implica doctrina técnica
- issue: Matiz de ἐξαλλοτριωθῆναι
  english_pob_reading: become estranged from you
  chosen_spanish_reading: llegar a estar alejados de ustedes
  alternative_spanish_readings:
  - enajenarnos de ustedes
  - separarnos de ustedes
  rationale: Se preserva el sentido relacional de distanciamiento sin suavizarlo a simple separación física. «Alejados» conserva la tensión afectiva y diplomática del verbo griego.
  doctrine_reference: Lectura relacional del verbo de alienación/extrañamiento
- issue: Cantidad de χρόνος/καιρός en el contexto
  english_pob_reading: many years have passed
  chosen_spanish_reading: han pasado muchos años
  alternative_spanish_readings:
  - han pasado muchos tiempos
  - han pasado muchas estaciones
  rationale: La revisión inglesa decidió que «years» era más natural en este contexto. En español, «muchos años» comunica de modo claro y natural la larga demora epistolar sin perder la idea de lapso prolongado.
  doctrine_reference: Valor temporal de καιροί en contexto histórico-epistolar
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «many seasons» a «many years» por naturalidad contextual, pero el audit trail mantiene la observación sobre el plural καιροί. La versión española sigue esa decisión revisada con «muchos años» y conserva en nota la alternativa literal del plural griego para no perder la tensión lexical. También se evitó añadir «entre nosotros» u otra explicitación no presente en el griego para la hermandad y amistad.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general solo cuando aparezca el nombre divino; aquí no aplica.
  - Se prefirió «hermandad» sobre «fraternidad» por fluidez y cercanía al campo de ἀδελφότης.
  - «Alejados de ustedes» mantiene un registro bíblico sobrio sin calco duro.
  - No se añadió objeto explícito a «enviar» porque el griego tampoco lo especifica.
  - El tono es epistolar y diplomático, acorde con el contexto de 1 Macabeos.
