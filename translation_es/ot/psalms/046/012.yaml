translation:
  language: es
  text: Yahvé de los ejércitos está con nosotros[a]; el Dios de Jacob es una fortaleza para nosotros[b]. Selah[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé de las huestes está con nosotros». El hebreo צְבָאוֹת, traducido tradicionalmente «huestes», se refiere a ejércitos o compañías militares, a menudo con connotaciones celestiales.'
    reason: lexical_alternative
  - marker: b
    text: «Fortaleza» también puede traducirse «refugio» o «alto baluarte». El hebreo מִשְׂגָּב denota un lugar elevado, seguro y protegido.
    reason: lexical_alternative
  - marker: c
    text: «Selah» es un término hebreo litúrgico o musical de significado preciso incierto; muchas traducciones lo dejan sin traducir.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El hebreo contiene el Tetragrama, y el criterio del POB en inglés es transliterarlo como nombre propio. En español, 'Yahvé' preserva esa decisión de forma transparente y evita la sustitución por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los hosts
  - de las huestes
  - de los ejércitos celestiales
  lexicon: HALOT
  rationale: La idea básica es militar/organizativa. 'Ejércitos' comunica mejor en español moderno que el anglicismo tradicional 'hosts' y mantiene el sentido de poder soberano.
- source_word: עִמָּנוּ
  english_pob_choice: is with us
  chosen_spanish: está con nosotros
  alternatives_spanish:
  - está entre nosotros
  - está junto a nosotros
  lexicon: HALOT
  rationale: La construcción verbal implícita en español requiere 'está'. 'Con nosotros' reproduce el valor relacional del hebreo עִם.
- source_word: מִשְׂגָּב
  english_pob_choice: a stronghold
  chosen_spanish: nuestra fortaleza
  alternatives_spanish:
  - nuestro refugio
  - nuestro alto refugio
  - nuestro baluarte
  lexicon: HALOT
  rationale: מִשְׂגָּב designa un lugar elevado y seguro de protección. 'Fortaleza' conserva la imagen de defensa firme; se usa posesivamente por el orden natural del español en este sintagma.
- source_word: לָנוּ
  english_pob_choice: for us
  chosen_spanish: nuestra
  alternatives_spanish:
  - para nosotros
  - para nuestro bien
  lexicon: HALOT
  rationale: Aunque el hebreo expresa beneficio con ל, en español la relación se integra mejor en el posesivo que sigue a 'fortaleza'. El valor de provecho queda preservado en el conjunto 'nuestra fortaleza'.
- source_word: אֱלֹהֵי יַעֲקֹב
  english_pob_choice: the God of Jacob
  chosen_spanish: el Dios de Jacob
  alternatives_spanish:
  - el Dios de Yaacob
  - el Dios de Jacob,
  - el Dios de Jacob
  lexicon: HALOT
  rationale: La forma de constructo se expresa de manera idiomática como 'el Dios de Jacob', preservando la identificación pactual y el eco bíblico tradicional.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Pausa
  - Interludio
  - Selá
  lexicon: HALOT
  rationale: El término litúrgico es de significado incierto; transliterarlo evita imponer una interpretación no asegurada por el hebreo.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de los hosts
  - el SEÑOR de los ejércitos
  rationale: Se mantiene la decisión del POB de no ocultar el Nombre divino detrás de una sustitución. En español, 'Yahvé' refleja el mismo compromiso transliterado del Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imagen de protección en מִשְׂגָּב
  english_pob_reading: a stronghold for us
  chosen_spanish_reading: nuestra fortaleza
  alternative_spanish_readings:
  - nuestro refugio
  - nuestra ciudadela
  - nuestra alta fortaleza
  rationale: La metáfora hebrea combina altura y seguridad. 'Fortaleza' preserva la fuerza defensiva sin desdibujar el valor de protección; el posesivo español hace natural el complemento de beneficio.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; consistency of key terms unless documented.'
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del expediente: la versión auditada marcó high_agreement, sin cambios pendientes en la última revisión, y no se introdujeron modificaciones sustantivas respecto del análisis fuente-idioma.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrama, conforme al criterio POB.
  - Se prefirió «ejércitos» sobre «hosts» para un español natural y transparente.
  - Se conservó «Selah» sin traducir debido a su sentido incierto y litúrgico.
  - El complemento posesivo «nuestra fortaleza» se emplea para una sintaxis española más fluida sin perder el valor beneficiario de לָנוּ.
