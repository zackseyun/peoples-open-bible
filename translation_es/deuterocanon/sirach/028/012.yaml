- from: Había un carbón[a] delante de él; lo sopló, y se encendió.
  to: Había una brasa[a] delante de él; sopló sobre ella, y se encendió.
  rationale: Se ajusta «carbón» a «brasa» para reflejar mejor גחלת en español natural y evitar ambigüedad; y se cambia «lo sopló» por «sopló sobre ella» para una construcción más idiomática y precisa. Se conserva la estructura breve hebrea y la nota del paralelo griego.
