translation:
  language: es
  text: 'y Gederot, Bet-dagón[a], Naamah y Makkedah: dieciséis ciudades con sus aldeas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bet-dagón es literalmente «casa de Dagón», pero aquí funciona como nombre de lugar y por eso se translitera.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/גְדֵרוֹת
  english_pob_choice: and Gederoth
  chosen_spanish: y Gederot
  alternatives_spanish:
  - y Gederot
  - y Gederoth
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; por eso se translitera en vez de traducirse. Conservé la forma breve y reconocible en español, ajustando la terminación inglesa -th a una grafía más natural para el lector hispanohablante.
- source_word: בֵּית דָּג֥וֹן
  english_pob_choice: Beth-dagon
  chosen_spanish: Bet-dagón
  alternatives_spanish:
  - Bet-dagón
  - Casa de Dagón
  lexicon: HALOT
  rationale: El hebreo es literalmente 'casa de Dagón', pero aquí funciona como topónimo compuesto. Por eso se mantiene como nombre propio transliterado; uso 'Bet' como equivalente hispano de Beth y acentúo Dagón para claridad de lectura.
- source_word: וְ/נַעֲמָ֖ה
  english_pob_choice: Naamah
  chosen_spanish: Naamá
  alternatives_spanish:
  - Naamá
  - Naamá
  lexicon: HALOT
  rationale: Nombre propio de lugar, transliterado. La acentuación final ayuda a la pronunciación natural en español y conserva la identificación toponímica.
- source_word: וּ/מַקֵּדָ֑ה
  english_pob_choice: and Makkedah
  chosen_spanish: y Makedá
  alternatives_spanish:
  - y Makedá
  - y Makkedá
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera. Opté por una grafía hispana más fluida, sin duplicar innecesariamente consonantes, manteniendo el nombre como topónimo y no como sustantivo común.
- source_word: עָרִ֥ים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - ciudades
  - poblaciones
  - towns
  lexicon: HALOT
  rationale: En fórmulas territoriales, עִיר designa centros poblados; 'ciudades' es fiel y natural en español, y conserva el valor administrativo de la lista.
- source_word: שֵׁשׁ עֶשְׂרֵ֖ה
  english_pob_choice: sixteen
  chosen_spanish: dieciséis
  alternatives_spanish:
  - dieciséis
  - dieciséis en total
  lexicon: HALOT
  rationale: Número cardinal directo; no requiere expansión adicional. 'Dieciséis' reproduce con precisión el total de ciudades enumeradas.
- source_word: וְ/חַצְרֵי/הֶֽן
  english_pob_choice: with their villages
  chosen_spanish: con sus aldeas
  alternatives_spanish:
  - con sus aldeas
  - con sus poblados
  - y sus aldeas
  lexicon: HALOT
  rationale: חַצְרֵי en estas listas de heredad se refiere a asentamientos rurales dependientes. 'Aldeas' es un equivalente claro y digno en español, cercano al sentido administrativo y geográfico del hebreo.
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo recibido y con la auditoría inglesa; no se documentaron revisiones ni variantes que alteren el sentido. La decisión principal en español fue adaptar los topónimos al uso hispano sin perder su carácter transliterado.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - Se usó 'ciudades' para עָרִים, en coherencia con las listas de territorios de Josué.
  - La secuencia de nombres propios conserva la coordinación simple con 'y', sin añadir artículos.
  - '''Aldeas'' traduce el valor de חַצְרֵיהֶן como asentamientos dependientes, evitando un calco demasiado técnico.'
