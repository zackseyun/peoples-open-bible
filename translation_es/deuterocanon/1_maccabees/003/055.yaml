translation:
  language: es
  text: 'Y después de esto, Judas nombró líderes del pueblo: jefes de mil, de cien, de cincuenta y de diez.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jefes del pueblo»; el término griego es una palabra general para quienes dirigen, seguida por rangos militares específicos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ μετὰ τοῦτο
  english_pob_choice: And after this
  chosen_spanish: Y después de esto
  alternatives_spanish:
  - Y después de estas cosas
  - Entonces, después de esto
  lexicon: LSJ
  rationale: La expresión griega marca una transición temporal sencilla. «Y después de esto» conserva el orden narrativo sin volverla arcaica.
- source_word: κατέστησεν
  english_pob_choice: appointed
  chosen_spanish: nombró
  alternatives_spanish:
  - designó
  - estableció
  - puso
  lexicon: LSJ
  rationale: En este contexto de asignación de cargos militares, «nombró» comunica con naturalidad la instalación en funciones. Mantiene el valor de designación administrativa sin sobrecargar el español.
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: transliteration
  rationale: Se conserva la forma convencional del nombre propio en 1 Macabeos. «Judas» corresponde al uso establecido para Ἰούδας en este contexto histórico.
- source_word: ἡγουμένους τοῦ λαοῦ
  english_pob_choice: leaders of the people
  chosen_spanish: líderes del pueblo
  alternatives_spanish:
  - jefes del pueblo
  - gobernantes del pueblo
  - los que guiaban al pueblo
  lexicon: LSJ
  rationale: El participio sustantivado es amplio y no se limita por sí mismo a un rango estrictamente militar. «Líderes del pueblo» preserva esa generalidad, como en la auditoría inglesa, antes de pasar a los rangos específicos.
- source_word: χιλιάρχους
  english_pob_choice: commanders of thousands
  chosen_spanish: jefes de millares
  alternatives_spanish:
  - comandantes de millares
  - jefes de mil
  - tribunos
  lexicon: LSJ
  rationale: Se conserva la estructura numérica del griego. «Jefes de millares» evita el tecnicismo romano de «tribunos» y mantiene la transparencia del cargo en un contexto judío.
- source_word: ἑκατοντάρχους
  english_pob_choice: of hundreds
  chosen_spanish: de centenas
  alternatives_spanish:
  - jefes de centenas
  - centuriones
  lexicon: LSJ
  rationale: 'Como el español ya tiene «jefes» en el primer rango, la serie puede continuar elípticamente: «de centenas». Así se respeta el paralelo del griego sin introducir un término romano posterior.'
- source_word: πεντηκοντάρχους
  english_pob_choice: of fifties
  chosen_spanish: de cincuentas
  alternatives_spanish:
  - jefes de cincuentas
  lexicon: LSJ
  rationale: La forma paralela con el resto de la lista reproduce la organización escalonada del texto griego. «De cincuentas» es breve y suficientemente claro en español.
- source_word: δεκαδάρχους
  english_pob_choice: of tens
  chosen_spanish: de decenas
  alternatives_spanish:
  - jefes de decenas
  lexicon: LSJ
  rationale: Se mantiene la simetría de la enumeración. «De decenas» preserva la gradación militar-administrativa sin añadir contenido no explicitado por el griego.
translation_notes:
  revision_awareness: El testimonio griego coincide plenamente con la auditoría inglesa y no requiere cambios de sentido. La principal decisión española fue conservar la serie jerárquica con una formulación natural y transparente, evitando tecnicismos romanos y manteniendo la amplitud del primer sintagma.
  spanish_consistency_notes:
  - Se conservó «Judas» como forma tradicional del nombre propio en 1 Macabeos.
  - Se mantuvo la progresión numérica del griego con paralelismo sintáctico en español.
  - «Líderes del pueblo» se dejó amplio para no estrechar indebidamente el sentido antes de los rangos específicos.
