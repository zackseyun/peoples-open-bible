    issue: «a encontrarles» suena poco natural para לִקְרַאתְכֶם
    rationale: Aunque comprensible, en español neutro y de registro bíblico moderno resulta más idiomático «a su encuentro». Esto preserva mejor la idea de encuentro intencional sin un giro algo áspero.
  - severity: low
    issue: Redundancia entre las notas [a] y [b]
    rationale: Ambas notas explican la misma decisión léxica en torno a מִשְׁפַּט/«apariencia». Puede mantenerse una nota principal sobre la alternativa y otra más breve sobre el sentido léxico, pero conviene afinarlas para que no repitan demasiado.
