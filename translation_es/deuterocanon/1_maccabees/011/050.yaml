translation:
  language: es
  text: Dennos sus diestras[a], y que los judíos dejen de combatir contra nosotros y la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «dennos diestras» o «dennos manos derechas»; es un modismo para ofrecer una prenda de paz, alianza o buena fe.
    reason: cultural_note
lexical_decisions:
- source_word: Δὸς
  english_pob_choice: Give
  chosen_spanish: Dadnos
  alternatives_spanish:
  - Dad
  - Concedednos
  lexicon: LSJ
  rationale: El imperativo aoristo de δίδωμι expresa una petición/comando directo. «Dadnos» conserva la fuerza imperativa y el plural inclusivo del español sin añadir matices ajenos.
- source_word: δεξιάς
  english_pob_choice: your right hands
  chosen_spanish: vuestras manos derechas
  alternatives_spanish:
  - vuestras diestras
  - vuestras manos derechas en prenda
  - vuestros saludos de paz
  lexicon: LSJ
  rationale: La imagen concreta de «manos derechas» mantiene el giro idiomático literal del griego y evita reducirlo a «prenda», que sería más interpretativo. El posesivo plural se explicita naturalmente en español por el imperativo de segunda persona plural.
- source_word: παυσάσθωσαν
  english_pob_choice: let ... stop
  chosen_spanish: que ... dejen de
  alternatives_spanish:
  - que ... cesen
  - que ... se detengan
  lexicon: LSJ
  rationale: El imperativo aoristo medio/pasivo de παύω pide una orden de cese. «Que ... dejen de» suena natural en español y conserva la idea de interrupción de una acción en curso.
- source_word: πολεμοῦντες
  english_pob_choice: fighting against
  chosen_spanish: combatir contra
  alternatives_spanish:
  - guerrear contra
  - hacer guerra contra
  lexicon: LSJ
  rationale: El participio presente de πολεμέω indica hostilidad activa y continua. «Combatir contra» preserva el carácter verbal y el sentido adversativo sin sobretraducirlo.
- source_word: τὴν πόλιν
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - nuestra ciudad
  - esa ciudad
  lexicon: LSJ
  rationale: El griego no añade posesivo; por eso se mantiene «la ciudad» sin suplir «nuestra», conforme al criterio de no introducir información no explícita.
translation_notes:
  revision_awareness: El texto fuente griego y el audit trail inglés coinciden en un giro idiomático de alianza por medio de «manos derechas». No se requiere revisión textual; se conserva la literalidad suficiente para no borrar el modismo, pero se formula en español natural.
  spanish_consistency_notes:
  - Se mantuvo «judíos» en minúscula por tratarse de un etnónimo dentro de la oración, conforme al uso editorial habitual del proyecto.
  - Se evitó «SEÑOR» u այլ terminología no pertinente; el versículo no contiene vocabulario divino.
  - «Ciudad» se dejó sin posesivo porque el griego carece de él y el audit trail inglés lo destacó explícitamente.
