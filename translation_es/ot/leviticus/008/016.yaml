translation:
  language: es
  text: Tomó toda la grasa que estaba sobre las entrañas, el lóbulo del hígado[a], los dos riñones y su grasa, y Moisés los quemó[b] en el altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el apéndice del hígado'; el hebreo se refiere a una parte específica del hígado extraída en la preparación sacrificial.
    reason: lexical_alternative
  - marker: b
    text: El verbo puede significar más específicamente 'convertir en humo' u 'ofrecer en humo' en contextos sacrificiales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: He took
  chosen_spanish: Tomó
  alternatives_spanish:
  - Y tomó
  lexicon: HALOT
  rationale: El wayyiqtol narra acción sucesiva; en español, el pretérito simple comunica bien la secuencia sin añadir una conjunción inicial innecesaria.
- source_word: כָּל הַחֵלֶב
  english_pob_choice: all the fat
  chosen_spanish: toda la grasa
  alternatives_spanish:
  - todo el sebo
  - toda la gordura sacrificial
  lexicon: HALOT
  rationale: En contexto sacrificial, חֵלֶב se refiere a la porción grasa destinada al altar. 'Grasa' es el equivalente más natural y transparente en español; 'sebo' puede sonar más técnico o menos claro para lectores generales.
- source_word: אֲשֶׁר עַל הַקֶּרֶב
  english_pob_choice: that was on the entrails
  chosen_spanish: que estaba sobre las entrañas
  alternatives_spanish:
  - que estaba sobre los intestinos
  - que estaba sobre las vísceras
  lexicon: HALOT
  rationale: קֶרֶב alude a las partes internas/viscerales del animal. 'Entrañas' conserva esa concreción anatómica de forma idiomática en español, sin volverla demasiado técnica.
- source_word: יֹתֶרֶת הַכָּבֵד
  english_pob_choice: the lobe of the liver
  chosen_spanish: el lóbulo del hígado
  alternatives_spanish:
  - la apéndice del hígado
  - la porción del hígado
  lexicon: HALOT
  rationale: La expresión designa una parte específica del hígado extraída en la preparación sacrificial. 'Lóbulo del hígado' refleja bien la referencia anatómica y mantiene la claridad del inglés POB.
- source_word: שְׁתֵּי הַכְּלָיֹת
  english_pob_choice: the two kidneys
  chosen_spanish: los dos riñones
  alternatives_spanish:
  - las dos piedras
  lexicon: HALOT
  rationale: La referencia anatómica es directa; 'riñones' es la correspondencia natural en español.
- source_word: חֶלְבְּהֶן
  english_pob_choice: their fat
  chosen_spanish: su grasa
  alternatives_spanish:
  - la grasa de ellos
  - su sebo
  lexicon: HALOT
  rationale: El sufijo posesivo remite a los riñones. 'Su grasa' preserva la relación posesiva de manera fluida en español.
- source_word: וַיַּקְטֵר
  english_pob_choice: burned them
  chosen_spanish: los hizo humear
  alternatives_spanish:
  - los quemó
  - los ofreció en humo
  lexicon: HALOT
  rationale: En contexto sacrificial, קטר no es meramente 'quemar', sino quemar como ofrenda, con el sentido de producir humo. 'Los hizo humear' comunica ese valor sin perder naturalidad; 'quemó' sería más general y 'ofreció en humo' menos idiomático.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  lexicon: HALOT
  rationale: La terminación direccional indica el lugar de la acción. 'Sobre el altar' refleja mejor la colocación del sacrificio y suena natural en español.
theological_decisions:
- issue: Verbo sacrificial de וַיַּקְטֵר
  english_pob_reading: burned them on the altar
  chosen_spanish_reading: los hizo humear sobre el altar
  alternative_spanish_readings:
  - los quemó sobre el altar
  - los ofreció en humo sobre el altar
  rationale: El texto sacrificial sugiere no solo combustión, sino la acción cultual de hacer subir humo al altar. Mantener esa diferencia evita reducir el acto a una simple quema doméstica.
  doctrine_reference: Levítico 1–8; uso sacrificial de קטר
- issue: Terminología de חֵלֶב en ofrendas
  english_pob_reading: the fat
  chosen_spanish_reading: la grasa
  alternative_spanish_readings:
  - el sebo
  - la grasa sacrificial
  rationale: La elección conserva la identificación anatómica del pasaje y su función ritual. 'Grasa' es inteligible y no oculta el sentido sacrificial del término.
  doctrine_reference: Levítico 3; Levítico 7:22–25
translation_notes:
  revision_awareness: El auditor inglés no indicó cambios pendientes y el pasaje quedó en alta concordancia; por eso la redacción española sigue de cerca la segmentación y las decisiones léxicas del original hebreo, ajustando solo lo necesario para una lectura natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término de referencia del nombre divino en este proyecto, aunque este versículo no lo contiene.
  - Se conserva 'grasa' para חֵלֶב por consistencia con el valor sacrificial del término y para evitar una sustitución interpretativa excesiva.
  - '''Sobre el altar'' refleja mejor la dirección/localización cultual que una traducción más genérica como ''en el altar''.'
  - La nota [a] preserva la alternativa anatómica del hebreo para יֹתֶרֶת הַכָּבֵד.
  - La nota [b] preserva la tensión entre 'quemar' y 'hacer humo' propia del verbo sacrificial קטר.
