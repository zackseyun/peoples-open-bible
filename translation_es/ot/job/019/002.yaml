lexical_decisions:
- source_word: עַד אָ֭נָה
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo será esto?
  - ¿Hasta cuándo seguirán?
  lexicon: HALOT
  rationale: Es la fórmula idiomática de lamento temporal; en español, «¿Hasta cuándo?» conserva mejor la fuerza retórica que un giro más literal como «¿Hasta cuándo será esto?».
- source_word: תּוֹגְי֣וּ/ן
  english_pob_choice: will you torment
  chosen_spanish: los atormentarán
  alternatives_spanish:
  - los afligirán
  - los entristecerán
  - me causarán dolor
  lexicon: HALOT
  rationale: La POB inglesa opta por «torment» para reflejar el daño interior sostenido. En español, «atormentar» preserva esa intensidad y sigue siendo natural en registro bíblico y contemporáneo.
- source_word: נַפְשִׁ֑/י
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - mi alma
  - mi vida
  - a mí
  lexicon: HALOT
  rationale: Aunque נֶפֶשׁ puede ser «alma», «vida» o «ser», la POB inglesa opta por el pronombre personal porque Job habla de sí mismo en su interioridad. En español, «me» evita una dualidad innecesaria y mantiene la referencia personal directa.
- source_word: וּֽ/תְדַכְּאוּ/נַ֥נִי
  english_pob_choice: and crush me
  chosen_spanish: y me aplastarán
  alternatives_spanish:
  - y me quebrantarán
  - y me oprimirán
  - y me triturarán
  lexicon: HALOT
  rationale: «Aplastar» reproduce la metáfora de violencia del hebreo דכא con claridad y fuerza, y funciona bien en paralelo con el verbo anterior.
- source_word: בְ/מִלִּֽים־
  english_pob_choice: with words
  chosen_spanish: con palabras
  alternatives_spanish:
  - por medio de palabras
  - con discursos
  - con su hablar
  lexicon: HALOT
  rationale: La preposición instrumental se expresa naturalmente con «con». «Palabras» mantiene la concreción del hebreo y la acusación de daño verbal.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] en el texto y ajustando la puntuación para que el marcador aparezca exactamente en la frase traducida.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo verbal fuerte del hebreo con dos verbos en plural.
  - Se evitó «alma» en el texto principal por claridad moderna, pero se preservó como alternativa en la nota.
  - Se usó «palabras» para בְמִלִּים, manteniendo el valor instrumental de la preposición.
