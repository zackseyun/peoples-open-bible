    reason: lexical_alternative
  - marker: b
    text: La frase griega es condensada; aquí se entiende ἑπτακισχιλίοις como «siete mil quinientos».
    reason: alternative_reading
  revision_rationale: Se corrigen los anclajes de notas para que correspondan al contenido que explican, se actualiza la nota sobre la cifra final para alinearla con la revisión inglesa auditada, y se ajusta ligeramente la redacción del despliegue militar para evitar un matiz adversativo excesivo no sostenido por la versión final del audit trail.
