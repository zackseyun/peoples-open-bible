translation:
  language: es
  text: 'Entonces la palabra de Yahvé de los ejércitos vino a mí[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH de los ejércitos»; alternativamente, «Yahvé de los ejércitos».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y sucedió que ... vino
  - Y aconteció que ... vino
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce una secuencia narrativa/profética. «Entonces ... vino» conserva el valor de sucesión de manera natural en español sin recurrir a una fórmula arcaica.
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - un mensaje
  - la palabra
  lexicon: HALOT
  rationale: En la fórmula profética, el sustantivo designa comunicación divina concreta. «La palabra» mantiene el giro consagrado y sigue siendo claro en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término base del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre divino sin sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: El hebreo forma el título fijo יהוה צבאות. En español, «de los ejércitos» comunica el alcance de huestes celestiales y terrenales de manera transparente.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: La preposición indica destinatario del mensaje profético. «A mí» es la equivalencia directa y natural en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  - así
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el discurso directo. «Diciendo» mantiene la relación formal con la cita que sigue.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה en el título profético
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de los ejércitos
  - Jehová de los ejércitos
  rationale: Se preserva el nombre propio divino y el título צְבָאוֹת sin la sustitución tradicional por «SEÑOR». Esto mantiene la transparencia del texto hebreo y la coherencia con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el consenso fue de alta concordancia y no hubo observaciones textuales pendientes.
  spanish_consistency_notes:
  - Se mantiene la fórmula profética «la palabra de Yahvé» de forma consistente con la terminología del proyecto.
  - «de los ejércitos» reproduce el título hebreo צְבָאוֹת en un español bíblico claro, evitando la máscara litúrgica «SEÑOR».
  - El ancla de nota a[a] se coloca en el destinatario del verbo porque la nota trata del nombre divino en la frase completa.
