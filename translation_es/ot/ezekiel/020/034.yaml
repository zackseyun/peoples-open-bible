revisions:
- from: Yo los sacaré de entre los pueblos y los reuniré de entre las tierras[a] a las cuales fueron dispersados[b], con mano fuerte y con brazo extendido, y con furor derramado[c].
  to: Los sacaré de entre los pueblos y los reuniré de entre las tierras[a] donde han sido dispersados,[b] con mano fuerte y con brazo extendido, y con ira derramada.[c]
  rationale: Se revisa la relativa para reflejar de manera más natural y precisa «where/in which you have been scattered», se invierte la elección principal y alternativa en la cláusula final para usar el español más idiomático («ira derramada») mientras se conserva «furor» en nota, y se omite «Yo» por fluidez.
  reviewer_model: gpt-5.4
