review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego y del POB inglés: una señal identificadora para los pastores, con futuro predictivo, un bebé, envuelto y acostado en un pesebre. Sin embargo, una nota léxica importante no preserva fielmente la alternativa inglesa de ἐσπαργανωμένον.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español eclesial amplio. 'Señal', 'encontrarán', 'bebé', 'acostado' y 'pesebre' funcionan bien. La única reparación necesaria es en la nota [a], porque 'envuelto en paños' no comunica específicamente la idea de fajado/swaddling tan bien como la alternativa documentada en inglés.
  glossary_alignment: No hay conflictos con la terminología de proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. 'Pesebre' preserva correctamente φάτνη con una alternativa aclaratoria en nota.
  issues:
  - severity: medium
    issue: La nota [a] no preserva con suficiente precisión la alternativa inglesa 'wrapped in swaddling cloths.'
    rationale: El texto principal 'envuelto en pañales' es defendible y natural. Pero la nota española 'envuelto en paños' diluye el matiz específico de envolver a un recién nacido con fajas/paños de envolver. Una alternativa como 'envuelto en pañales de tela' o 'envuelto en fajas' conserva mejor la razón léxica documentada.
  - severity: low
    issue: La explicación teológica en metadatos contiene un error gramatical ('La versículo').
    rationale: No afecta el texto bíblico ni las notas, pero muestra un pequeño descuido editorial.
  revised_spanish_text: 'Y esta será la señal para ustedes: encontrarán un bebé envuelto en pañales y acostado en un pesebre[a][b].'
  revised_footnotes:
  - marker: a
    text: O «envuelto en pañales de tela».
    reason: lexical_alternative
  - marker: b
    text: O «en un comedero para animales».
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel, idiomático y claro. Solo se ajusta la nota [a] para reflejar mejor la alternativa léxica documentada para ἐσπαργανωμένον, preservando el matiz de swaddling sin introducir una expresión antinatural.
