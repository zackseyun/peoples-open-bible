  text: וְ/עַתָּ֗ה שְׁמַֽע נָ֤א גַם אַתָּה֙ בְּ/ק֣וֹל שִׁפְחָתֶ֔/ךָ וְ/אָשִׂ֧מָה לְ/פָנֶ֛י/ךָ פַּת לֶ֖חֶם וֶ/אֱכ֑וֹל וִ/יהִ֤י בְ/ךָ֙ כֹּ֔חַ כִּ֥י תֵלֵ֖ךְ בַּ/דָּֽרֶךְ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/028/022.yaml
  text: Now then[a], please listen, you also, to the voice of your female servant, and let me set a piece of bread before you. Eat, so that there may be strength in you[c][b], because you must go on your way.
  footnotes:
  - marker: a
    text: Or 'maidservant.' The Hebrew specifically uses a feminine term for servant.
    reason: lexical_alternative
  - marker: b
    text: Literally 'listen to the voice of your female servant,' a Hebrew idiom meaning 'heed your female servant.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a morsel of bread.'
    reason: lexical_alternative
