id: MRK.4.12
reference: Mark 4:12
source:
  edition: SBLGNT
  text: ἵνα βλέποντες βλέπωσι καὶ μὴ ἴδωσιν, καὶ ἀκούοντες ἀκούωσι καὶ μὴ συνιῶσιν, μήποτε ἐπιστρέψωσιν καὶ ἀφεθῇ ⸀αὐτοῖς.
translation:
  text: so that seeing they may see and not perceive[a], and hearing they may hear and not understand[c][b], lest they turn back and it be forgiven them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'see and not discern.'
    reason: lexical_alternative
  - marker: b
    text: '''Turn back'' may also be rendered ''turn'' or, in context, ''repent.'''
    reason: lexical_alternative
  - marker: c
    text: Jesus is echoing Isaiah 6:9–10, preserving its tension between divine judgment and the people's failure to respond.
    reason: cross_reference
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result language. 'So that' preserves the Greek conjunction naturally in English without overformal stiffness.
- source_word: βλέποντες βλέπωσι
  chosen: while seeing they may see
  alternatives:
  - seeing they may see
  - they may indeed look
  lexicon: BDAG
  rationale: The participle plus finite verb creates an emphatic, somewhat paradoxical expression. Rendering both elements preserves the rhetorical force rather than collapsing them into a single English verb.
- source_word: ἴδωσιν
  chosen: perceive
  alternatives:
  - see
  - discern
  lexicon: BDAG
  rationale: Using 'perceive' distinguishes ἴδωσιν from the repeated βλέπω and reflects the sense of truly seeing or grasping what is before them.
- source_word: ἀκούοντες ἀκούωσι
  chosen: while hearing they may hear
  alternatives:
  - hearing they may hear
  - they may indeed listen
  lexicon: BDAG
  rationale: As with the seeing clause, the doubled form is retained to preserve the Semitic-style emphasis echoed from Isaiah.
- source_word: συνιῶσιν
  chosen: understand
  alternatives:
  - comprehend
  - grasp
  lexicon: BDAG
  rationale: A standard rendering for συνίημι in contexts of mental/spiritual comprehension; clear and natural in modern English.
- source_word: μήποτε
  chosen: lest
  alternatives:
  - otherwise
  - so that not perhaps
  lexicon: BDAG
  rationale: '''Lest'' concisely preserves the negative prospective force of μήποτε in a solemn register fitting the citation/allusion.'
- source_word: ἐπιστρέψωσιν
  chosen: turn back
  alternatives:
  - turn
  - return
  - repent
  lexicon: BDAG
  rationale: ἐπιστρέφω can mean turn/return, and in prophetic contexts can imply repentance. 'Turn back' preserves the verbal image without importing a more explicit theological term than the Greek itself states.
- source_word: ἀφεθῇ αὐτοῖς
  chosen: it be forgiven them
  alternatives:
  - they be forgiven
  - forgiveness be granted to them
  lexicon: BDAG
  rationale: The passive singular verb with dative pronoun is rendered as an impersonal divine passive. 'It be forgiven them' preserves the passive form and the implied object of forgiveness without over-specifying.
