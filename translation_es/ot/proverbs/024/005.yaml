translation:
  language: es
  text: Un hombre sabio es fuerte[a], y un hombre de conocimiento fortalece su vigor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Un hombre sabio y fuerte»; también, más literalmente, «Un hombre sabio está en fuerza». La construcción hebrea con בַּעֹז es compacta y puede entenderse de modo atributivo o predicativo; el texto principal adopta la lectura predicativa por ser más natural en español.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «aumenta la fuerza». Se opta por «vigor» para distinguir mejor el segundo miembro del paralelismo y evitar una repetición demasiado literal en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גֶּבֶר
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - varón
  - hombre fuerte
  lexicon: HALOT
  rationale: גֶּבֶר es un masculino singular proverbial. «Hombre» preserva la referencia humana general sin cargar de antemano la idea de fuerza física; la fuerza queda expresada por el predicado y por el paralelismo.
- source_word: חָכָם
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - hábil
  lexicon: HALOT
  rationale: En Proverbios, חָכָם tiene el sentido sapiencial normal de alguien dotado de sabiduría moral y práctica. «Sabio» es la correspondencia directa y estable en español.
- source_word: בַּעֹז
  english_pob_choice: is strong
  chosen_spanish: es fuerte
  alternatives_spanish:
  - está en fuerza
  - es fuerte en fuerza
  lexicon: HALOT
  rationale: La construcción hebrea con ב + עֹז es compacta y admite lectura predicativa. «Es fuerte» comunica la fuerza resultante de la sabiduría con naturalidad en español, sin perder la tensión interpretativa registrada por la POB inglesa.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - uno
  lexicon: HALOT
  rationale: אִישׁ conserva el masculino representativo proverbial. «Un hombre» mantiene el paralelismo y la correspondencia de género gramatical del hebreo.
- source_word: דַּעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - discernimiento
  lexicon: HALOT
  rationale: דַּעַת en literatura sapiencial suele designar conocimiento con dimensión de discernimiento. «Conocimiento» es la opción más directa y amplia en español.
- source_word: מְאַמֶּץ
  english_pob_choice: strengthens
  chosen_spanish: fortalece
  alternatives_spanish:
  - refuerza
  - hace fuerte
  lexicon: HALOT
  rationale: El participio de אמץ expresa hacer fuerte, afirmar o fortalecer. «Fortalece» reproduce bien la acción verbal y se integra con fluidez al paralelismo.
- source_word: כֹּחַ
  english_pob_choice: might
  chosen_spanish: vigor
  alternatives_spanish:
  - fuerza
  - poder
  lexicon: HALOT
  rationale: כֹּחַ puede abarcar fuerza, capacidad o vigor. «Vigor» evita repetir mecánicamente «fuerte/fortalece» y conserva la idea de energía o capacidad personal reforzada por el conocimiento.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió el segundo miembro de «power» a «might» para una distinción más natural respecto de «strong». La redacción española toma en cuenta esa revisión y también la nota inglesa sobre la posible lectura atributiva/predicativa de בַּעֹז, manteniendo ambas posibilidades en nota.
  spanish_consistency_notes:
  - Se conservó un estilo proverbial breve y equilibrado, con paralelismo claro entre ambos miembros.
  - Se evitó «Señor» u otras sustituciones teológicas irrelevantes porque el verso no contiene nombres divinos.
  - «Sabio» y «conocimiento» se mantienen como vocabulario sapiencial estándar, coherente con Proverbios.
  - La solución «vigor» para כֹּחַ preserva la variación léxica frente a «fuerte/fortalece» y refleja la distinción observada en la revisión inglesa.
