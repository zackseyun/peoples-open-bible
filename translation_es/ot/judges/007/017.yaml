translation:
  language: es
  text: 'Y él les dijo[a]: «Mírenme y hagan lo mismo. Miren, cuando yo llegue al borde del campamento, entonces, como yo haga, así harán ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mírenme y hagan lo mismo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמֶּנִּי תִרְא֖וּ
  english_pob_choice: Watch me
  chosen_spanish: Mírenme
  alternatives_spanish:
  - Mirenme
  - Obsérvenme
  lexicon: HALOT
  rationale: La construcción no pide mirar desde Gideón, sino tomarlo como modelo visible. «Mírenme» comunica la instrucción de observar su acción de manera natural en español y conserva el valor directivo.
- source_word: וְכֵן תַּעֲשׂ֑וּ
  english_pob_choice: and do likewise
  chosen_spanish: y hagan lo mismo
  alternatives_spanish:
  - y hagan así
  - y obren de la misma manera
  lexicon: HALOT
  rationale: כֵן expresa modo e imitación. «Hagan lo mismo» mantiene el paralelo y el carácter ejemplar de la orden, con una formulación fluida en español.
- source_word: וְהִנֵּ֨ה
  english_pob_choice: Behold
  chosen_spanish: 'Y miren:'
  alternatives_spanish:
  - Y he aquí
  - Miren
  lexicon: HALOT
  rationale: La partícula introduce énfasis deíctico. «Y miren:» conserva la llamada de atención sin volver el español artificialmente solemne.
- source_word: בָא
  english_pob_choice: I come
  chosen_spanish: voy
  alternatives_spanish:
  - vengo
  - estoy llegando
  lexicon: HALOT
  rationale: En este contexto inmediato, el participio expresa acción inminente. En español, «voy» con complemento de dirección suena natural y mantiene la idea de desplazamiento hacia el punto indicado.
- source_word: בִּקְצֵה הַמַּחֲנֶה
  english_pob_choice: to the edge of the camp
  chosen_spanish: al extremo del campamento
  alternatives_spanish:
  - al borde del campamento
  - a la orilla del campamento
  lexicon: HALOT
  rationale: קצה denota extremo/límite. «Extremo» es una forma fiel y clara; «campamento» traduce de modo directo הַמַּחֲנֶה sin necesidad de explicarlo.
- source_word: וְהָיָה כַאֲשֶׁר
  english_pob_choice: then as
  chosen_spanish: y sucederá que, como
  alternatives_spanish:
  - y será que, como
  - y cuando
  lexicon: HALOT
  rationale: La secuencia hebrea introduce la condición o circunstancia para la acción posterior. «Y sucederá que, como» preserva el enlace narrativo y el matiz anticipatorio sin calcar una estructura poco natural.
- source_word: אֶעֱשֶׂה כֵּן תַּעֲשׂוּן
  english_pob_choice: as I do, so you shall do
  chosen_spanish: como yo haga, así harán ustedes
  alternatives_spanish:
  - como yo haga, así deberán hacer ustedes
  - así como yo haga, así harán ustedes
  lexicon: HALOT
  rationale: La fórmula expresa imitación directa. El subjuntivo «haga» refleja el valor prospectivo del hebreo, y «así harán ustedes» mantiene la correspondencia enfática entre la acción de Gideón y la de sus hombres.
theological_decisions:
- issue: Imitation command and direct model-following
  english_pob_reading: Watch me ... as I do, so you shall do
  chosen_spanish_reading: Mírenme ... como yo haga, así harán ustedes
  alternative_spanish_readings:
  - Obsérvenme ... hagan lo mismo que yo
  - Miren ... y actúen igual
  rationale: 'No hay una cuestión doctrinal polémica aquí, pero sí una decisión de tono: el texto presenta liderazgo ejemplar y obediencia mimética. La traducción preserva esa relación sin suavizarla ni añadir interpretación extra.'
  doctrine_reference: Narrative obedience / example language
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo con apoyo del audit trail inglés; no se detectaron revisiones aplicadas en la fuente inglesa, y la redacción española conserva la estructura imperativa y la secuencia narrativa sin añadir contenido.
  spanish_consistency_notes:
  - Se mantuvo «campamento» para הַמַּחֲנֶה de forma consistente con el campo semántico militar del pasaje.
  - Se usó «Yahvé» como terminología por defecto del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió «Mírenme» frente a una calca como «vigílenme», porque el contexto es imitativo y no de vigilancia formal.
