id: 2CO.8.8
reference: '2 Corinthians 8:8'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οὐ κατ’ ἐπιταγὴν λέγω ἀλλὰ διὰ τῆς ἑτέρων σπουδῆς καὶ τὸ τῆς ὑμετέρας ἀγάπης γνήσιον δοκιμάζων·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/008/008.yaml
  text: I am not saying this as a command[b][a], but through the earnestness of others I am also testing the genuineness of your love.
translation:
  language: ko
  text: 내가 명령으로[a] 말하는 것이 아닙니다. 다른 이들의 열심을 통해 여러분의 사랑이 참된지를 시험하려는[b] 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「지시로」. 헬라어 ἐπιταγή는 사도적 권위에 근거한 강제적 명령을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「입증하려」, 「시험에 부치려」. 헬라어 δοκιμάζω는 검증을 통해 참됨을 드러내는 행위이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιταγή
  english_pob_choice: command
  chosen_korean: 명령
  lexicon: BDAG
  rationale: 바울이 사도적 강제 명령이 아님을 명확히 한다. 「명령」이 한국어 등가어로 분명하다.
  alternatives_korean:
  - 지시
  - 강제
- source_word: σπουδή
  english_pob_choice: earnestness
  chosen_korean: 열심
  lexicon: BDAG
  rationale: 앞 절과 동일하게 「열심」으로 일관성 있게 옮긴다.
  alternatives_korean:
  - 진지함
  - 간절함
- source_word: γνήσιον
  english_pob_choice: genuineness
  chosen_korean: 참된지
  lexicon: BDAG
  rationale: 중성 관사 + 형용사 구조로 「참됨/진정성」을 가리킨다. 한국어에서는 「참된지」가 자연스럽다.
  alternatives_korean:
  - 진정성
  - 진실됨
- source_word: δοκιμάζων
  english_pob_choice: testing
  chosen_korean: 시험하려는
  lexicon: BDAG
  rationale: 현재 분사로서 주절의 목적·동시 행위를 가리킨다. 「시험하다」가 본문의 검증 모티프와 부합한다.
  alternatives_korean:
  - 입증하려는
  - 증명하려는
