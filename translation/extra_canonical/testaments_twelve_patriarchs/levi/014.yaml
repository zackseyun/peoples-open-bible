id: T12P.LEV.14
reference: Testament of Levi 14
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: XIV. Ἐγὼ¹ οὖν, τέκνα μου², ἔγνων³ ὅτι ἐπὶ τὰ τέλη τῶν αἰώνων ἀσεβήσετε⁴ *ἐπὶ Κυρίου, χεῖρας ἐπιβάλλοντες⁵ ἐν⁶ κακίᾳ [ἐπ᾿ αὐτὸν]⁷ καὶ ἐν⁸ πᾶσι τοῖς ἔθνεσιν γενήσεσθε⁹ χλευασμός. 2. Καὶ γὰρ ὁ πατὴρ ἡμῶν Ἰσραὴλ καθαρός ἐστιν¹⁸ ἀπὸ τῆς¹⁹ ἀσεβείας²⁰ τῶν ἀρχιερέων [οἵτινες ἐπιβαλοῦσι²¹ τὰς χεῖρας αὐτῶν ἐπὶ τὸν σωτῆρα τοῦ κόσμου]²². 3. Ὡς²³ γάρ ἐστιν ὁ †ἥλιος²⁴ καθαρὸς ἐνώπιον κυρίου †ἐπὶ τὴν γῆν²⁵, οὕτω καὶ ὑμεῖς ἐστε²⁸, οἱ φωστῆρες τοῦ Ἰσραήλ, παρὰ πάντα τὰ ἔθνη.
  language: Greek
  source_pages:
  - 122
  - 123
  - 124
translation:
  text: 1[a]. Therefore I, my children, have known that at the end of the ages you will act ungodly against the Lord, laying hands on him in wickedness, and among all the nations you will become a mockery[b]. 2. For our father Israel is pure from the ungodliness of the chief priests, who will lay their hands on the savior of the world. 3. For just as the sun is pure before the Lord upon the earth, so also...
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'who will lay their hands on the savior of the world' is bracketed in the source witness and may reflect a later expansion in transmission; it is translated here because it stands in the Greek text provided.
    reason: textual_variant
  - marker: b
    text: The chapter text in the provided witness breaks off after 'so also...'; the translation therefore preserves the extant wording only.
    reason: textual_variant
lexical_decisions:
- source_word: ἀσεβήσετε
  chosen: you will act ungodly
  alternatives:
  - you will be ungodly
  - you will commit impiety
  lexicon: LSJ
  rationale: Future verb of impious or ungodly conduct; 'act ungodly' preserves verbal force better than the flatter adjectival 'be ungodly.'
- source_word: ἐπὶ Κυρίου
  chosen: against the Lord
  alternatives:
  - toward the Lord
  - against the Lord God
  lexicon: LSJ
  rationale: With hostile context and the following 'laying hands on him,' ἐπί is adversative in sense; 'against the Lord' best conveys the offense.
- source_word: χεῖρας ἐπιβάλλοντες
  chosen: laying hands on him
  alternatives:
  - stretching out hands against him
  - seizing him
  lexicon: BDAG
  rationale: Idiomatic expression for hostile physical action; 'laying hands on' preserves the biblical register and ambiguity between arrest and violence.
- source_word: χλευασμός
  chosen: an object of mockery
  alternatives:
  - a mockery
  - a laughingstock
  lexicon: LSJ
  rationale: Predicate noun describing public derision among the nations; 'object of mockery' is clear and preserves the shame motif.
- source_word: καθαρός
  chosen: pure
  alternatives:
  - clean
  - innocent
  lexicon: LSJ
  rationale: The contrast is moral/religious purity over against ἀσέβεια; 'pure' keeps the cultic-ethical resonance.
- source_word: ἀσεβείας
  chosen: ungodliness
  alternatives:
  - impiety
  - wickedness
  lexicon: LSJ
  rationale: Maintains lexical consistency with ἀσεβήσετε in v. 1 and preserves the specifically irreligious dimension.
- source_word: ἀρχιερέων
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Plural in Greek and common Second Temple usage favors 'chief priests' rather than the more singular office-sounding 'high priests.'
- source_word: σωτῆρα τοῦ κόσμου
  chosen: savior of the world
  alternatives:
  - deliverer of the world
  lexicon: BDAG
  rationale: This is the plain sense of the Greek phrase in the witness text; it should be translated directly, with theological caution handled in notes rather than suppressed.
- source_word: ἥλιος
  chosen: sun
  alternatives: []
  lexicon: LSJ
  rationale: Straightforward lexical rendering; retained literally in the simile.
