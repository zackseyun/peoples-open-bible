translation:
  language: es
  text: Los hijos de Onam fueron Samai y Jada. Los hijos de Samai[a] fueron Nadab y Abishur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Y los hijos de Samai fueron Nadab y Abishur». El hebreo repite la fórmula genealógica con una conjunción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְי֥וּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - estaban
  lexicon: HALOT
  rationale: En fórmulas genealógicas, היה funciona como verbo copulativo/existencial que introduce descendencia; en español, «fueron» comunica de manera natural esa relación de filiación sin añadir matices de proceso.
- source_word: בְנֵי
  english_pob_choice: sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de varón de
  lexicon: HALOT
  rationale: Aquí la genealogía presenta la línea inmediata, y «los hijos de» conserva la precisión genealógica y la forma habitual del género en español bíblico.
- source_word: אוֹנָם
  english_pob_choice: Onam
  chosen_spanish: Onam
  alternatives_spanish:
  - Onán
  lexicon: transliteración convencional
  rationale: Se mantiene el nombre propio según la convención transliterada; «Onam» refleja la forma consonántica del hebreo y evita confundirlo con otro nombre bíblico parecido.
- source_word: שַׁמַּי
  english_pob_choice: Shammai
  chosen_spanish: Samai
  alternatives_spanish:
  - Sammai
  - Shammai
  lexicon: transliteración convencional
  rationale: Se adapta el nombre al uso castellano con grafía más natural para lectores hispanohablantes, conservando la identidad del nombre propio sin forzar una transliteración inglesa.
- source_word: יָדָע
  english_pob_choice: Jada
  chosen_spanish: Yadá
  alternatives_spanish:
  - Jadá
  - Jada
  lexicon: transliteración convencional
  rationale: El hebreo apunta a un nombre propio; «Yadá» conserva mejor la vocal final y la relación fonética con el hebreo que una forma más anglicizada.
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Y los descendientes de
  lexicon: HALOT
  rationale: La conjunción marca el siguiente ramal genealógico. En español puede omitirse el equivalente explícito de «and» para mantener fluidez, mientras se repite la fórmula genealógica con claridad.
- source_word: נָדָב
  english_pob_choice: Nadab
  chosen_spanish: Nadab
  alternatives_spanish:
  - Nadab
  lexicon: transliteración convencional
  rationale: Nombre propio conservado de manera estándar, sin traducción.
- source_word: אֲבִישׁוּר
  english_pob_choice: Abishur
  chosen_spanish: Abisur
  alternatives_spanish:
  - Abishur
  lexicon: transliteración convencional
  rationale: Se adapta al castellano la transliteración del nombre propio, manteniendo su identificación bíblica y evitando una grafía excesivamente anglicizada.
translation_notes:
  revision_awareness: 'La versión inglesa auditada revisó una formulación más corta («The sons of Shammai: Nadab and Abishur») para explicitar «were» en la segunda cláusula. La línea española refleja ese mismo cierre completo y mantiene la repetición genealógica del hebreo, usando una formulación fluida pero trazable al original.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o equivalentes por no haber vocabulario divino en el versículo.
  - Se mantuvo la secuencia genealógica con dos oraciones para reflejar la repetición del hebreo y la lectura auditada en inglés.
  - Se prefirió «Yadá» y «Abisur» por naturalidad castellana y consistencia transliterada en un registro bíblico moderno.
