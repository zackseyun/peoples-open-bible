translation:
  language: es
  text: 'Y estos eran los hijos de Benjamín: Sallu, hijo de Mesulam[a], hijo de Joed[b], hijo de Pedaía, hijo de Colaía, hijo de Maaseía, hijo de Ithiel, hijo de Jesaía.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘hijos de Benjamín’ también puede entenderse de modo más amplio como ‘descendientes de Benjamín’ o ‘benjamitas’.'
    reason: lexical_alternative
  - marker: b
    text: El nombre ‘Joed’ sigue aquí al Texto Masorético. Un paralelo genealógico en 1 Crónicas 9:7 lee ‘Hodavías’.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these were
  chosen_spanish: Y estos eran
  alternatives_spanish:
  - Y estos fueron
  - Y estos son
  lexicon: HALOT
  rationale: La fórmula introductoria de lista genealógica se expresa naturalmente en pasado en español; ‘eran’ conserva el valor narrativo de cierre de sección sin forzar un presente artificial.
- source_word: בְּנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los descendientes de Benjamín
  - los benjamitas
  lexicon: HALOT
  rationale: En una genealogía, ‘hijos de’ preserva la forma hebrea y la cadena de linaje; ‘descendientes’ o ‘benjamitas’ son posibles, pero suavizan la estructura genealógica explícita del texto.
- source_word: סַלֻּא
  english_pob_choice: Sallu
  chosen_spanish: Sallu
  alternatives_spanish:
  - Salo
  - Salú
  lexicon: Standard transliteration
  rationale: Se mantiene la transliteración habitual del nombre propio, sin castellanizarlo de manera no sustentada por el hebreo.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: ‘Hijo de’ es el equivalente genealógico directo y más transparente en español; ‘descendiente de’ amplía el sentido, pero no es necesario aquí.
- source_word: מְשֻׁלָּם
  english_pob_choice: Meshullam
  chosen_spanish: Mesulam
  alternatives_spanish:
  - Mesullam
  - Meshulam
  lexicon: Standard transliteration
  rationale: Se adapta la transliteración al español con ‘s’ para una pronunciación natural, manteniendo el nombre propio reconocible sin modificar su identidad hebrea.
- source_word: יוֹעֵד
  english_pob_choice: Joed
  chosen_spanish: Joed
  alternatives_spanish:
  - Joiada
  lexicon: Standard transliteration
  rationale: Se conserva la forma apoyada por el texto masorético y por la decisión inglesa auditada; se evita armonizar con otra tradición textual en el cuerpo principal.
- source_word: פְּדָיָה
  english_pob_choice: Pedaiah
  chosen_spanish: Pedaías
  alternatives_spanish:
  - Pedaía
  lexicon: Standard transliteration
  rationale: Se translitera el nombre propio con una forma castellana clara y suficientemente cercana al hebreo; el acento gráfico ayuda a la lectura en español.
- source_word: קוֹלָיָה
  english_pob_choice: Kolaiah
  chosen_spanish: Colaía
  alternatives_spanish:
  - Kolaía
  - Kolaya
  lexicon: Standard transliteration
  rationale: Se adapta la consonante inicial a la ortografía española (‘C’) y se conserva el valor vocálico del nombre con una transliteración legible.
- source_word: מַעֲשֵׂיָה
  english_pob_choice: Maaseiah
  chosen_spanish: Maaséías
  alternatives_spanish:
  - Maasías
  - Maaseía
  lexicon: Standard transliteration
  rationale: Se procura reflejar la vocalización del hebreo con una forma castellana legible; aunque el nombre admite variantes, esta opción conserva la secuencia del original sin volverlo opaco.
- source_word: אִיתִיאֵל
  english_pob_choice: Ithiel
  chosen_spanish: Ithiel
  alternatives_spanish:
  - Itiel
  lexicon: Standard transliteration
  rationale: Se mantiene la transliteración convencional, dado que el nombre ya es reconocible en español bíblico y la forma inglesa auditada la preserva.
- source_word: יְשַׁעְיָה
  english_pob_choice: Jeshaiah
  chosen_spanish: Jesaías
  alternatives_spanish:
  - Jesaia
  - Isaías
  lexicon: Standard transliteration
  rationale: Se distingue este nombre genealógico del profeta ‘Isaías’, siguiendo la decisión auditada de no nivelar ambos nombres; la forma española mantiene la cercanía al hebreo y evita confusión.
theological_decisions:
- issue: Valor de בְּנֵי בִנְיָמִן en una lista genealógica
  english_pob_reading: sons of Benjamin may also be understood more broadly as descendants of Benjamin or Benjamites.
  chosen_spanish_reading: hijos de Benjamín, con posibilidad implícita de linaje/tribu en el contexto
  alternative_spanish_readings:
  - descendientes de Benjamín
  - benjamitas
  rationale: 'No hay una controversia doctrinal, pero sí una tensión lexical relevante: la expresión hebrea puede ser más amplia que ‘hijos’ biológicos. Se mantiene la forma literal en el cuerpo del texto y se preserva la amplitud de sentido mediante la nota.'
  doctrine_reference: HALOT; genealogía tribal en Nehemías 11:7
translation_notes:
  revision_awareness: El pasaje no presenta revisiones aplicadas en el audit trail; se mantiene la lectura masorética y la lista genealógica sin cambios, con atención a la diferencia onomástica señalada para Joed en el paralelo de 1 Crónicas 9:7.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero en este versículo no aparece el nombre divino.
  - Se prefieren transliteraciones castellanas consistentes para nombres propios, evitando mezclar formas inglesas y españolas dentro de la lista.
  - Se conserva la estructura genealógica repetitiva ‘hijo de’ para reflejar con claridad la cadena de ascendencia del hebreo.
