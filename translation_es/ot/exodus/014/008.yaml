  text: וַ/יְחַזֵּ֣ק יְהֹוָ֗ה אֶת לֵ֤ב פַּרְעֹה֙ מֶ֣לֶךְ מִצְרַ֔יִם וַ/יִּרְדֹּ֕ף אַחֲרֵ֖י בְּנֵ֣י יִשְׂרָאֵ֑ל וּ/בְנֵ֣י יִשְׂרָאֵ֔ל יֹצְאִ֖ים בְּ/יָ֥ד רָמָֽה־׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/014/008.yaml
  text: And Yahweh hardened the heart of Pharaoh king of Egypt[a], and he pursued the sons of Israel[b], while the sons of Israel were going out with a high hand.
  footnotes:
