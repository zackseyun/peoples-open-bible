translation:
  language: es
  text: Antes del dolor hay temor; y después del dolor, tristeza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pena» para λύπη.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸ
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - previo a
  - antes
  lexicon: LSJ
  rationale: La preposición temporal indica lo que ocurre con anterioridad al dolor; «antes de» expresa de modo natural y fiel esa relación temporal en español.
- source_word: πόνου
  english_pob_choice: pain
  chosen_spanish: dolor
  alternatives_spanish:
  - pena
  - sufrimiento
  - fatiga
  lexicon: LSJ
  rationale: En este dicho aforístico, πόνoς funciona mejor como experiencia dolorosa o sufrimiento padecido, no como «fatiga»; «dolor» conserva la concisión y el paralelismo del griego.
- source_word: φόβος
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - pavor
  lexicon: LSJ
  rationale: φόβος puede ser «miedo» o «temor»; aquí «temor» mantiene un registro sobrio y amplio, sin intensificar indebidamente el sentido hacia «pavor».
- source_word: μετὰ
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - luego de
  lexicon: LSJ
  rationale: Con el acusativo, μετὰ señala sucesión temporal; «después de» reproduce esa relación con claridad y naturalidad en español.
- source_word: λύπη
  english_pob_choice: grief
  chosen_spanish: tristeza
  alternatives_spanish:
  - dolor
  - pena
  - aflicción
  lexicon: LSJ
  rationale: λύπη abarca tristeza, pena o aflicción. Frente al inglés POB «grief», «tristeza» ofrece la opción más natural en español para el efecto aforístico breve, sin cargar excesivamente el matiz funerario de «duelo».
translation_notes:
  revision_awareness: La revisión disponible indica que no hubo cambios recientes y que el texto griego y el audit trail inglés mantienen alta concordancia; por eso se conserva la estructura breve y paralela del original sin expansión interpretativa.
  spanish_consistency_notes:
  - 'Se mantiene la correspondencia temporal simple del griego: antes/después.'
  - Se conserva el paralelismo nominal entre temor y tristeza, evitando paráfrasis explicativas.
  - Se usa «dolor» para πόνου y no «fatiga», porque el contexto inmediato es emocional y experiencial.
  - La nota al pie preserva una alternativa léxica real para λύπη, alineada con el auditable English POB note.
