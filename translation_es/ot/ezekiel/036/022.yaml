translation:
  language: es
  text: 'Por tanto, di a la casa de Israel: «Así dice el Señor Yahvé: No lo hago por causa de ustedes, oh casa de Israel, sino por causa de mi santo nombre, que ustedes profanaron entre las naciones adonde fueron[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «adonde llegaron»; el hebreo literalmente usa un verbo de venir/entrar, pero en español de destino también puede expresarse como «fueron».'
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad la transición inferencial del hebreo y mantiene el tono profético formal sin sonar mecánico.
- source_word: אֱמֹר לְבֵית יִשְׂרָאֵל
  english_pob_choice: say to the house of Israel
  chosen_spanish: di a la casa de Israel
  alternatives_spanish:
  - di a Israel
  - háblale a la casa de Israel
  lexicon: HALOT
  rationale: Conserva la expresión corporativa 'casa de Israel' y el mandato profético directo, como en el hebreo.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Mantiene la fórmula profética solemne y reconocible, sin perder naturalidad en español.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para יְהוָה como 'Yahvé'. En la forma compuesta con אֲדֹנָי, 'el Señor Yahvé' conserva ambos elementos sin la convención inglesa de 'Lord GOD'.
- source_word: לֹא לְמַעַנְכֶם
  english_pob_choice: It is not for your sake
  chosen_spanish: No lo hago por causa de ustedes
  alternatives_spanish:
  - No es por ustedes
  - No es por su causa
  lexicon: HALOT
  rationale: El hebreo expresa motivo/finalidad; en español, la frase explícita con el verbo ayuda a reproducir el sentido de la acción divina sin añadir contenido ajeno.
- source_word: אֲנִי עֹשֶׂה
  english_pob_choice: I am acting
  chosen_spanish: lo hago
  alternatives_spanish:
  - estoy actuando
  - estoy haciendo esto
  lexicon: HALOT
  rationale: Dado que el contexto ya identifica la acción divina, el pronombre clítico 'lo' hace el español más fluido y sigue la lectura de acción presente/futura del participio.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - casa de Israel
  - Israel
  lexicon: HALOT
  rationale: Se conserva el valor corporativo y de alianza de la expresión, evitando reducirla a un simple nombre propio.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: HALOT
  rationale: Tras la negación, 'sino' reproduce de forma idiomática la fuerza adversativa del hebreo.
- source_word: לְשֵׁם קָדְשִׁי
  english_pob_choice: for my holy name
  chosen_spanish: por causa de mi santo nombre
  alternatives_spanish:
  - por mi santo nombre
  - para mi santo nombre
  lexicon: HALOT
  rationale: '''Nombre'' se mantiene como categoría teológica central; ''santo'' transmite la cualidad de קָדוֹשׁ y ''por causa de'' refleja bien el motivo divino.'
- source_word: אֲשֶׁר חִלַּלְתֶּם
  english_pob_choice: which you have profaned
  chosen_spanish: que ustedes profanaron
  alternatives_spanish:
  - que ustedes han profanado
  - que ustedes deshonraron
  lexicon: HALOT
  rationale: '''Profanar'' preserva el peso cultual y teológico de חלל mejor que alternativas más débiles como ''deshonrar''.'
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - among the nations
  lexicon: HALOT
  rationale: '''Entre las naciones'' comunica el valor colectivo de גוים en Ezequiel y mantiene la referencia geopolítica amplia del texto.'
- source_word: אֲשֶׁר בָּאתֶם שָׁם
  english_pob_choice: where you went
  chosen_spanish: a las que llegaron
  alternatives_spanish:
  - donde fueron
  - a donde llegaron
  lexicon: HALOT
  rationale: El verbo בוא puede expresar llegar/ir; 'a las que llegaron' suena natural en español y conserva la idea de destino y permanencia en exilio.
theological_decisions:
- issue: Render of the divine name יְהוָה within the compound address אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: Se aplica el estándar del proyecto para el Tetragrámaton como 'Yahvé'. En la fórmula compuesta, 'el Señor Yahvé' preserva tanto la reverencia como la identidad del nombre divino sin recurrir a un masking convention.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Divine motive in restoration
  english_pob_reading: It is not for your sake ... but for my holy name
  chosen_spanish_reading: No lo hago por causa de ustedes ... sino por causa de mi santo nombre
  alternative_spanish_readings:
  - No es por ustedes ... sino por mi santo nombre
  - No lo hago por ustedes ... sino por mi nombre santo
  rationale: 'La versión española mantiene la afirmación teológica central: la restauración no surge del mérito de Israel, sino del celo de Dios por su nombre santo. No se suaviza ni se amplía el motivo.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del POB inglés al conservar la dirección profética explícita a la casa de Israel y el tono formal del discurso. También refleja la decisión doctrinal actual de traducir יְהוָה como 'Yahvé' en lugar de una máscara como 'SEÑOR', y adapta a español la aclaración sobre el motivo divino sin perder la tensión semántica de לְמַעַן / לְשֵׁם.
  spanish_consistency_notes:
  - Se mantiene 'casa de Israel' para la expresión corporativa בֵּית יִשְׂרָאֵל.
  - '''Yahvé'' se usa para יְהוָה según la terminología del proyecto.'
  - '''santo nombre'' conserva el paralelismo teológico con el inglés ''holy name''.'
  - '''naciones'' se prefiere a ''gentiles'' por el contexto de Ezequiel.'
  - '''profanaron'' preserva el peso cultual de חלל.'
