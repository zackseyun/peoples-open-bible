translation:
  language: es
  text: y en mí mostrarás tu bondad[a]; porque me salvarás, aunque soy indigno, conforme a tu abundante misericordia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para mí» o «por medio de mí»; el griego dice literalmente «en mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: δείξεις
  english_pob_choice: you will show
  chosen_spanish: mostrarás
  alternatives_spanish:
  - manifestarás
  - harás ver
  lexicon: BDAG
  rationale: El futuro de δείκνυμι pide una acción de hacer visible o patente. En español, "mostrarás" conserva la fuerza directa y suena natural, sin añadir matices que no están en el griego.
- source_word: ἐν ἐμοί
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - para mí
  - por medio de mí
  lexicon: BDAG
  rationale: La preposición ἐν se traduce de manera más inmediata con "en". Mantener "en mí" preserva la formulación griega y la idea de que la bondad de Dios se ve en la propia situación del hablante.
- source_word: χρηστότητά
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - benignidad
  - amabilidad
  lexicon: BDAG
  rationale: χρηστότης puede expresarse como bondad o benevolencia; en este contexto penitencial, "bondad" es una opción natural en español y mantiene el vínculo temático con la cualidad divina que se pide y luego se muestra.
- source_word: ἀνάξιον ὄντα
  english_pob_choice: though I am unworthy
  chosen_spanish: al que era indigno
  alternatives_spanish:
  - aunque soy indigno
  - siendo indigno
  lexicon: BDAG
  rationale: La frase participial comunica indignidad del sujeto frente a la acción salvadora. En español, "al que era indigno" permite integrar la referencia al hablante sin forzar una construcción demasiado pesada; conserva el sentido concesivo implícito y la autodescalificación del penitente.
- source_word: σώσεις
  english_pob_choice: you will save
  chosen_spanish: salvarás
  alternatives_spanish:
  - rescatarás
  - librarás
  lexicon: BDAG
  rationale: σῴζω normalmente se traduce como "salvar"; en este contexto oracional mantiene tanto la idea de rescate como la resonancia soteriológica, sin estrechar el sentido.
- source_word: κατὰ τὸ πολὺ ἔλεός σου
  english_pob_choice: according to your abundant mercy
  chosen_spanish: conforme a tu abundante misericordia
  alternatives_spanish:
  - según tu gran misericordia
  - de acuerdo con tu inmensa misericordia
  lexicon: BDAG
  rationale: κατά con acusativo expresa medida o norma; "conforme a" refleja bien esa relación. πολὺ intensifica ἔλεος, y "abundante misericordia" mantiene la magnitud sin diluir el vínculo con el sustantivo griego.
theological_decisions:
- issue: Cómo reflejar ἐν ἐμοί sin suavizarlo a una preposición interpretativa
  english_pob_reading: in me
  chosen_spanish_reading: en mí
  alternative_spanish_readings:
  - para mí
  - por medio de mí
  - conmigo
  rationale: La elección conserva el valor preposicional de ἐν y evita perder la idea de que la bondad de Dios se manifiesta en la persona del orante. La opción es suficientemente natural en español y respeta la textura del griego.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Mantener la distinción entre χρηστότης y ἔλεος
  english_pob_reading: kindness ... abundant mercy
  chosen_spanish_reading: bondad ... abundante misericordia
  alternative_spanish_readings:
  - bondad ... gran misericordia
  - benignidad ... misericordia abundante
  rationale: 'El verso usa dos vocablos distintos: primero la cualidad divina que se mostrará, luego la base misericordiosa del rescate. Traducirlos con términos diferenciados evita fusionar dos ideas que el griego mantiene separadas.'
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente de ‘goodness’ a ‘kindness’ para mantener la relación temática con χρηστότης en el poema; en español se optó por «bondad», que sigue siendo un equivalente legítimo y natural para χρηστότης, mientras se preserva la distinción con «misericordia» para ἔλεος. No se detectaron cambios textuales posteriores que obliguen otra modificación.
  spanish_consistency_notes:
  - Se mantiene «en mí» para reflejar ἐν ἐμοί de forma auditable y sin reinterpretación excesiva.
  - Se traduce χρηστότης con «bondad» para un español transparente y coherente con la cualidad divina mostrada en el verso.
  - Se conserva la diferencia léxica entre la cualidad divina (bondad) y el fundamento salvífico (misericordia).
  - «Indigno» reproduce la autohumillación del hablante y evita suavizar ἀνάξιον.
  - El registro es reverente y publicable, con puntuación española y sin calcos innecesarios.
