translation:
  language: es
  text: porque llegamos a existir por mero acaso[a], y después de esto seremos como si no hubiéramos existido; porque el aliento en nuestras fosas nasales es humo, y el habla[b] es una chispa en el movimiento[c] de nuestro corazón,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espontáneamente» o «aleatoriamente» para «por mero acaso».
    reason: lexical_alternative
  - marker: b
    text: O «palabra» o «discurso»; el término griego puede significar palabra, habla o pensamiento verbalizado según el contexto.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «en el movimiento de nuestro corazón».
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοσχεδίως
  english_pob_choice: by mere chance
  chosen_spanish: por mero acaso
  alternatives_spanish:
  - espontáneamente
  - aleatoriamente
  - por accidente
  lexicon: LSJ
  rationale: El adverbio expresa algo que sucede de manera fortuita o sin propósito deliberado. En este contexto, la expresión impía niega un origen intencional; «por mero acaso» conserva esa fuerza y suena natural en español.
- source_word: ἐγενήθημεν
  english_pob_choice: we came into being
  chosen_spanish: llegamos a existir
  alternatives_spanish:
  - fuimos hechos
  - nacimos
  - vinimos a ser
  lexicon: BDAG
  rationale: El verbo comunica la entrada en existencia, no solo el nacimiento físico. «Llegamos a existir» preserva ese alcance ontológico en español.
- source_word: μετὰ τοῦτο ἐσόμεθα ὡς οὐχ ὑπάρξαντες
  english_pob_choice: after this we will be as though we had not existed
  chosen_spanish: después de esto seremos como si no hubiéramos existido
  alternatives_spanish:
  - después de esto seremos como si nunca hubiéramos sido
  - luego seremos como quienes no existen
  lexicon: BDAG
  rationale: La frase expresa la perspectiva de una inexistencia posterior a la muerte. La formulación elegida mantiene el paralelo y el valor comparativo de ὡς sin suavizarlo.
- source_word: καπνὸς
  english_pob_choice: smoke
  chosen_spanish: humo
  alternatives_spanish:
  - vapor
  lexicon: LSJ
  rationale: El sentido básico es «humo». «Humo» conserva la imagen de algo tenue, pasajero e inestable.
- source_word: πνοὴ
  english_pob_choice: the breath
  chosen_spanish: el aliento
  alternatives_spanish:
  - la respiración
  - el soplo
  - el hálito
  lexicon: BDAG
  rationale: πνοή denota respiración o aliento. «El aliento» es natural en español y mantiene la imagen concreta del cuerpo.
- source_word: ἐν ῥισὶν ἡμῶν
  english_pob_choice: in our nostrils
  chosen_spanish: en nuestras narices
  alternatives_spanish:
  - en nuestras fosas nasales
  - en nuestros orificios nasales
  lexicon: LSJ
  rationale: ῥίς significa nariz o narices/narinas. «Narices» reproduce de modo directo la imagen corpórea; aunque más sobrio sería «fosas nasales», aquí la literalidad pictórica es preferible.
- source_word: λόγος
  english_pob_choice: speech
  chosen_spanish: la palabra
  alternatives_spanish:
  - el habla
  - el discurso
  - la voz
  lexicon: BDAG
  rationale: 'La revisión inglesa pasó de «reason» a «speech» para reflejar más directamente λόγος en este contexto. En español, «la palabra» conserva esa amplitud semántica: puede ser habla, palabra o pensamiento verbalizado, sin imponer una sola lectura.'
- source_word: σπινθὴρ
  english_pob_choice: a spark
  chosen_spanish: una chispa
  alternatives_spanish:
  - una centella
  lexicon: LSJ
  rationale: El término designa una chispa de fuego de manera directa. «Una chispa» es la equivalencia normal y clara.
- source_word: ἐν κινήσει καρδίας ἡμῶν
  english_pob_choice: in the beating of our heart
  chosen_spanish: en el movimiento de nuestro corazón
  alternatives_spanish:
  - en el latir de nuestro corazón
  - en el palpitar de nuestro corazón
  lexicon: LSJ
  rationale: κίνησις significa movimiento o moción. «Movimiento» conserva el sentido literal del griego; en nota se puede observar que la imagen alude al latido del corazón.
theological_decisions:
- issue: Afirmación nihilista sobre el origen y el destino humano
  english_pob_reading: Render the statement straightforwardly as the speakers' nihilistic assertion without softening or endorsing it.
  chosen_spanish_reading: Traducir la afirmación de modo directo como la aseveración impía de los hablantes, sin suavizarla ni convertirla en doctrina del libro.
  alternative_spanish_readings:
  - Introducir una lectura más piadosa o genérica del destino humano
  - Mitigar «por mero acaso» para reducir la negación del propósito
  rationale: El versículo presenta la voz de los impíos en Wisdom 2. La traducción debe conservar la tensión teológica y el tono negador sin resolverlo a favor del texto.
  doctrine_reference: Mantener la tensión teológica y la primacía del sentido original; no armonizar prematuramente con lecturas doctrinales posteriores.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail, que sustituyó «reason» por «speech» para reflejar con mayor precisión ὁ λόγος. Por eso se prefirió en español «la palabra» con nota alternativa, manteniendo también la imagen física de «el movimiento de nuestro corazón» frente a una paráfrasis más interpretativa.
  spanish_consistency_notes:
  - Se mantiene Yahvé/Dios según corresponda; aquí no aparece un nombre divino explícito.
  - Se preserva el registro sapiencial y la imaginería corporal del griego sin elevar el tono a una formulación litúrgica.
  - «Por mero acaso» refleja la carga de contingencia del adverbio sin introducir una doctrina de casualidad moderna más fuerte de lo que el contexto exige.
