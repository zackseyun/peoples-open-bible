translation:
  language: es
  text: David vio que Saúl había salido a buscar su vida[a], mientras David estaba en el desierto de Zif, en Horesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «en el bosque» o «en el lugar arbolado». El hebreo puede entenderse como sustantivo común, pero aquí probablemente funciona como nombre de lugar: Horesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - percibió
  - se dio cuenta
  lexicon: HALOT
  rationale: ראייה física o perceptiva; «vio» conserva la percepción directa del hebreo y funciona con naturalidad en español.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - cuando
  lexicon: HALOT
  rationale: Introduce el contenido de lo que David percibió; en español «que» es la solución más natural y fiel a la función completiva.
- source_word: יָצָא
  english_pob_choice: had come out
  chosen_spanish: había salido
  alternatives_spanish:
  - salió
  - había ido
  lexicon: HALOT
  rationale: יצא puede ser «salir/ir salir»; el pluscuamperfecto refleja bien la anterioridad respecto de «vio» y mantiene el sentido narrativo de acción emprendida.
- source_word: לְבַקֵּשׁ אֶת נַפְשׁוֹ
  english_pob_choice: to seek his life
  chosen_spanish: a buscar su vida
  alternatives_spanish:
  - para buscar su vida
  - para quitarle la vida
  - para matarlo
  lexicon: HALOT
  rationale: Se conserva el giro idiomático hebreo «buscar la vida de». «A buscar su vida» mantiene la fuerza lexical sin cerrar interpretativamente la intención a «matarlo».
- source_word: נֶפֶשׁ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - vida/ser
  lexicon: HALOT
  rationale: En este modismo, נֶפֶשׁ se refiere a la vida de la persona; «vida» es la equivalencia española más clara y auditablesource-grounded.
- source_word: בְּמִדְבַּר זִיף
  english_pob_choice: in the wilderness of Ziph
  chosen_spanish: en el desierto de Zif
  alternatives_spanish:
  - en el desierto de Zif
  - en la estepa de Zif
  lexicon: HALOT
  rationale: מִדְבָּר admite «desierto» o «desierto/estepa»; aquí «desierto de Zif» suena natural en español bíblico y preserva el topónimo.
- source_word: בַּחֹרְשָׁה
  english_pob_choice: at Horesh
  chosen_spanish: en Horesha
  alternatives_spanish:
  - en el bosque
  - en el lugar arbolado
  - en Horesh
  lexicon: HALOT
  rationale: La forma puede leerse como nombre de lugar; al seguir la lectura toponímica del POB inglés, se conserva como topónimo transliterado. Se adapta a ortografía española con «Horesha» para mayor fluidez, sin decidir aquí por el sustantivo común.
- source_word: וְדָוִד
  english_pob_choice: while David was
  chosen_spanish: mientras David estaba
  alternatives_spanish:
  - y David estaba
  - y David se hallaba
  lexicon: HALOT
  rationale: La conjunción coordina una cláusula circunstancial de localización; «mientras David estaba» expresa bien la relación simultánea sin perder la coordinación hebrea.
theological_decisions:
- issue: El sintagma «buscar su vida» puede sonar ambiguo en español moderno entre «buscarlo» y «buscar matarlo».
  english_pob_reading: to seek his life
  chosen_spanish_reading: a buscar su vida
  alternative_spanish_readings:
  - para buscar su vida
  - para matarlo
  - a quitarle la vida
  rationale: Se preserva la tensión idiomática del hebreo sin explicitar de más la intención homicida. El contexto ya comunica la amenaza; el texto no la sustituye por una paráfrasis interpretativa.
  doctrine_reference: Lectura narrativa literal; preservación del modismo hebreo sin sobrerinterpretación
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del inglés POB, que no requirió cambios y fue confirmado con acuerdo alto. La traducción española mantiene la misma decisión clave sobre בַּחֹרְשָׁה como topónimo, pero ajusta la forma al español con «Horesha» en lugar de una transliteración inglesa.
  spanish_consistency_notes:
  - Mantengo «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Uso «desierto» para מִדְבָּר conforme al registro bíblico español, sin convertirlo en alegoría.
  - Conservo el orden narrativo básico del hebreo, pero adapto la subordinación para que el español sea fluido y claro.
