theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Naaman’s request for Israelite soil
  chosen_reading: translated straightforwardly as a request for transported soil without explaining motive in the main text
  alternative_readings:
  - interpreting it explicitly as creating an altar base
  - interpreting it as belief that worship must occur on Israelite land
  rationale: The verse states the request and its connection to exclusive worship of the LORD, but does not explicitly explain Naaman’s rationale. To preserve theological tension and avoid importing a specific ancient worldview explanation, the main text remains restrained; explanatory possibilities are suitable for a footnote rather than the translation itself.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
