translation:
  language: es
  text: Él envió su palabra y los sanó[a], y los libró de sus pozos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de sus destrucciones»; el hebreo puede referirse a pozos, tumbas o estados de destrucción o ruina.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - manda
  - enviará
  lexicon: HALOT
  rationale: El imperfecto poético hebreo, dentro del recuerdo de las acciones de Yahvé, se rinde bien en pasado narrativo en español. «Envió» conserva la fuerza directa de שלח sin introducir matices no presentes en el texto.
- source_word: דְּבָרוֹ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su mensaje
  - su mandato
  lexicon: HALOT
  rationale: «Palabra» mantiene la brevedad del hebreo דבר y permite el peso teológico de la palabra eficaz de Dios, sin precisar más de lo que el texto dice.
- source_word: וְיִרְפָּאֵם
  english_pob_choice: and healed them
  chosen_spanish: y los sanó
  alternatives_spanish:
  - y los curó
  - y los restauró
  lexicon: HALOT
  rationale: רפא en qal significa sanar. «Sanó» es la equivalencia más natural y fiel en español; «curó» es posible, pero «sanó» conserva mejor el registro bíblico.
- source_word: וִימַלֵּט
  english_pob_choice: and delivered
  chosen_spanish: y los libró
  alternatives_spanish:
  - y los rescató
  - y los salvó
  lexicon: HALOT
  rationale: El piel de מלט expresa hacer escapar o liberar. «Libró» es idiomático en español bíblico y preserva el sentido de liberación eficaz sin cargarlo de una lectura más específica de «salvación».
- source_word: מִשְּׁחִיתוֹתָם
  english_pob_choice: from their pits
  chosen_spanish: de sus fosos
  alternatives_spanish:
  - de sus pits
  - de la destrucción
  - de sus sepulcros
  lexicon: HALOT
  rationale: La forma plural con sufijo puede aludir a fosos/pits o, en sentido ampliado, a ruina/destrucción. «Fosos» reproduce la imagen concreta que el propio POB inglés fijó en la revisión, a la vez que deja abierta la metáfora de la caída mortal.
theological_decisions:
- issue: ¿«Su palabra» debe entenderse como una referencia cristológica o como el acto eficaz de Dios?
  english_pob_reading: Retain 'his word' as God's effective utterance without specifying a hypostatic or messianic referent.
  chosen_spanish_reading: Mantener «su palabra» como la palabra eficaz de Yahvé, sin identificarla explícitamente con una persona distinta.
  alternative_spanish_readings:
  - su Palabra (con mayúscula cristológica)
  - su mandato
  rationale: El hebreo habla de la acción de Dios mediante su palabra. La traducción no debe importar una lectura cristológica que el salmo no enuncia explícitamente, aunque pueda existir resonancia canónica posterior.
  doctrine_reference: Principio de primacía del idioma original; evitar sobrelectura doctrinal en traducción.
translation_notes:
  revision_awareness: La revisión inglesa más reciente optó por «from their pits» en lugar de «from their destructions» para reflejar mejor שְׁחִיתוֹתָם. La versión española sigue esa decisión con «de sus fosos», manteniendo la alternativa semántica amplia en la nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino donde corresponde; en este versículo el sujeto está pronominalizado, así que no se introduce el nombre explícitamente.
  - «Libró» se usa de forma consistente con el valor de liberación del piel de מלט en lenguaje bíblico español.
  - La nota conserva la ambigüedad lexical relevante entre foso literal y ruina/destrucción, sin borrar la imagen concreta adoptada en la revisión inglesa.
