translation:
  language: es
  text: 'Y los levitas seguían instruyendo a todo el pueblo, diciendo: «Este día es santo; no se entristezcan[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no se aflijan» o «no se pongan tristes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ Λευεῖται
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas cultuales
  - los hombres levitas
  lexicon: LSJ
  rationale: El nombre del grupo cultual se traduce de manera natural y reconocible en español bíblico como 'levitas'. Mantiene la identificación colectiva sin añadir matices no presentes en el griego.
- source_word: ἐκέλευον
  english_pob_choice: kept instructing
  chosen_spanish: seguían instruyendo
  alternatives_spanish:
  - seguían mandando
  - ordenaban
  - exhortaban
  lexicon: BDAG
  rationale: El imperfecto indica acción continua o repetida. 'Seguían instruyendo' conserva esa iteración y evita endurecer el tono más de lo que sugiere el contexto de exhortación pública.
- source_word: τῷ δήμῳ πάντα
  english_pob_choice: all the people
  chosen_spanish: a todo el pueblo
  alternatives_spanish:
  - a toda la gente
  - al pueblo entero
  - a toda la asamblea
  lexicon: LSJ
  rationale: δήμῳ designa al pueblo o multitud, y πάντα funciona distributivamente/comprensivamente. 'A todo el pueblo' reproduce bien el alcance colectivo sin forzar una lectura técnica de asamblea.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - declarando
  - mientras decían
  lexicon: BDAG
  rationale: Participio introductorio estándar para la cita directa; 'diciendo' es la equivalencia más directa y transparente en español.
- source_word: Ἡ ἡμέρα αὕτη ἁγία
  english_pob_choice: This day is holy
  chosen_spanish: Este día es santo
  alternatives_spanish:
  - Este día es sagrado
  - Hoy es santo
  lexicon: BDAG
  rationale: Se mantiene la deixis de αὕτη con 'este día'. 'Santo' es la equivalencia habitual de ἁγία; 'sagrado' es posible, pero 'santo' conserva mejor el lenguaje bíblico sin perder naturalidad.
- source_word: μὴ λυπεῖσθε
  english_pob_choice: do not grieve
  chosen_spanish: no se entristezcan
  alternatives_spanish:
  - no se aflijan
  - no se pongan tristes
  - no hagan duelo
  lexicon: BDAG
  rationale: λυπέω aquí expresa quedar o sentirse apenado/entristecido. En español, 'no se entristezcan' comunica el estado emocional con claridad; se evita 'hacer duelo' porque sería más específico de luto funerario.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incorporando el marcador [a] directamente en el texto de traducción, anclado a la cláusula final para que la nota quede referenciada de forma exacta.
  spanish_consistency_notes:
  - Se mantuvo 'levitas' como término bíblico estándar y transparente.
  - Se conservó el tiempo imperfecto con 'seguían instruyendo' para reflejar continuidad.
  - '''Pueblo'' traduce δήμῳ de forma inclusiva y natural en español.'
  - '''Santo'' se prefirió sobre ''sagrado'' por consistencia bíblica.'
  - La nota [a] está anclada en el punto exacto donde surgen las alternativas léxicas de λυπεῖσθε.
