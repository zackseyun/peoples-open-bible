  source_alignment_summary: 'El borrador español transmite bien la estructura general del griego: advertencia presente, propósito de evitar que «mi señor» quede excluido e ineficaz, anuncio de muerte sobre ellos, y afirmación de que el pecado ya los ha alcanzado mientras provocan a su Dios al cometer una acción impropia. Sin embargo, falta una nota que preserve la alternativa documentada para el modismo «death will fall upon their face», y «por el cual» suena menos natural en español que una formulación plural o más directa dada la referencia a «ellos».'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor de naturalidad y precisión editorial. «Mi señor», «expulsado e ineficaz», «la muerte caerá sobre ellos» y «el pecado los ha alcanzado» son adecuados. Conviene mejorar la cohesión de «por el cual provocan» a «con lo cual provocan» o equivalente, y añadir la nota omitida sobre el giro idiomático de «sobre su rostro».
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: κύριος social como «mi señor», ἁμάρτημα como «pecado», θεὸν como «Dios». No hay conflicto con Yahvé/Mesías u otros términos sensibles. La decisión «una falta» para ἀτοπίαν es aceptable dentro del rango documentado, aunque más débil que «impropiedad»; se puede mantener por legibilidad si se conserva la nota explicativa.'
  issues:
