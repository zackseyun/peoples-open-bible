translation:
  language: es
  text: Así que los ancianos de Moab y los ancianos de Madián partieron, con el pago por la adivinación[a] en sus manos, y llegaron a Balaam y le hablaron las palabras de Balac.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "con adivinaciones en sus manos"; la expresión hebrea puede referirse tanto a instrumentos o señales de adivinación como, más probablemente en este contexto, al pago llevado para realizarla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִקְנֵי
  english_pob_choice: elders of
  chosen_spanish: ancianos de
  alternatives_spanish:
  - líderes de
  - jefes de
  lexicon: HALOT
  rationale: El término hebreo en constructo con un pueblo designa normalmente a los ancianos o dirigentes reconocidos del grupo. 'Ancianos de' conserva la función social-política y es natural en español bíblico contemporáneo.
- source_word: וּקְסָמִים בְּיָדָם
  english_pob_choice: with divination fees in their hands
  chosen_spanish: con honorarios de adivinación en sus manos
  alternatives_spanish:
  - con adivinaciones en sus manos
  - con pago para adivinación en sus manos
  - con augurios en sus manos
  lexicon: HALOT
  rationale: קְסָמִים puede referirse a actos o medios de adivinación, pero en este contexto narrativo probablemente alude metonímicamente al pago llevado para contratar la adivinación. 'Honorarios de adivinación' comunica esa lectura sin perder la relación con la práctica adivinatoria. Se mantiene 'en sus manos' por ser la imagen literal del hebreo.
- source_word: וַיָּבֹאוּ אֶל
  english_pob_choice: they came to
  chosen_spanish: llegaron a
  alternatives_spanish:
  - vinieron a
  - fueron a
  lexicon: HALOT
  rationale: Con בוא + אֶל, la idea básica es llegar o venir a un lugar. 'Llegaron a' fluye bien en español y preserva la secuencia narrativa ya iniciada por el verbo anterior de movimiento.
- source_word: וַיְדַבְּרוּ אֵלָיו
  english_pob_choice: and spoke to him
  chosen_spanish: y le hablaron
  alternatives_spanish:
  - y le dijeron
  - y hablaron con él
  lexicon: HALOT
  rationale: דבר con אֶל significa 'hablar a/con'. 'Le hablaron' reproduce la relación verbal directa de forma natural y mantiene la cercanía semántica con el hebreo.
- source_word: דִּבְרֵי בָלָק
  english_pob_choice: the words of Balak
  chosen_spanish: las palabras de Balac
  alternatives_spanish:
  - el mensaje de Balac
  - las palabras de Balac
  lexicon: HALOT
  rationale: La construcción es literalmente 'las palabras de Balac'. Se conserva así para dejar abierta la posibilidad de que se trate de un mensaje comisionado, no necesariamente de una cita textual.
- source_word: וַיֵּלְכוּ
  english_pob_choice: So ... went
  chosen_spanish: Así que ... partieron
  alternatives_spanish:
  - Y ... fueron
  - Entonces ... partieron
  lexicon: HALOT
  rationale: La waw-consecutiva avanza la narración y sugiere consecuencia. 'Así que' expresa bien ese flujo en español, y 'partieron' da una imagen natural del desplazamiento del grupo.
translation_notes:
  revision_awareness: No se requieren cambios respecto al sentido del hebreo ni al audit trail inglés; la principal decisión interpretativa sigue siendo la lectura metonímica de קְסָמִים como honorarios o pago asociado a la adivinación, manteniendo a la vez la alternativa literal en nota.
  spanish_consistency_notes:
  - Se mantiene 'ancianos' para זִקְנֵי, coherente con el valor social del término.
  - Se usa 'Balac' como forma española usual del nombre propio.
  - Se conserva la literalidad de 'en sus manos' para reflejar el hebreo sin sobreinterpretar la imagen.
  - '''Palabras de Balac'' sigue la forma constructa y deja abierta la función del contenido como mensaje.'
