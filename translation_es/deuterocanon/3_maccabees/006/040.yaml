translation:
  language: es
  text: Y todos estuvieron de banquete[a], a expensas del rey, hasta el día catorce, día en que también presentaron su petición acerca de su liberación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «presentaron su solicitud por su liberación». La expresión griega puede denotar una petición formal o una apelación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐωχοῦντο
  english_pob_choice: feasted
  chosen_spanish: festinaban
  alternatives_spanish:
  - banqueteaban
  - hacían fiesta
  - se regocijaban con banquete
  lexicon: LSJ
  rationale: El verbo griego indica participar de un banquete o festejo. «Festinaban» conserva el sentido concreto de comer y celebrar en contexto cortesano, sin volverlo demasiado interpretativo.
- source_word: πάνθʼ
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos de ellos
  - cada uno
  lexicon: LSJ
  rationale: La forma elidida funciona de modo colectivo; «todos» es natural en español y mantiene el valor distributivo.
- source_word: ὑπὸ τοῦ βασιλέως χορηγούμενοι
  english_pob_choice: being supplied by the king
  chosen_spanish: siendo abastecidos por el rey
  alternatives_spanish:
  - siendo provistos por el rey
  - siendo mantenidos por el rey
  - a expensas del rey
  lexicon: LSJ
  rationale: χορ?ηγέω aquí expresa provisión de recursos. «Siendo abastecidos» conserva la relación participial y la idea de provisión real sin introducir matices ajenos.
- source_word: μέχρι τῆς τεσσαρεσκαιδεκάτης
  english_pob_choice: until the fourteenth day
  chosen_spanish: hasta el día catorce
  alternatives_spanish:
  - hasta el decimocuarto día
  - hasta el catorce
  lexicon: LSJ
  rationale: El ordinal femenino requiere suplir «día» por el contexto. «Hasta el día catorce» es claro y natural en español.
- source_word: ἐν ᾗ
  english_pob_choice: on which
  chosen_spanish: en el cual
  alternatives_spanish:
  - cuando
  - en ese día
  lexicon: LSJ
  rationale: La relativa remite al día catorce. «En el cual» preserva el enlace formal con el antecedente y es plenamente comprensible.
- source_word: τὴν ἐντυχίαν ἐποιήσαντο
  english_pob_choice: made their petition
  chosen_spanish: presentaron su petición
  alternatives_spanish:
  - hicieron su petición
  - presentaron su solicitud
  - hicieron su apelación
  lexicon: LSJ
  rationale: ἐντυχία puede significar una petición formal o apelación. «Presentaron su petición» refleja la acción formal sin ampliar el alcance del griego.
- source_word: περὶ τῆς ἀπολύσεως αὐτῶν
  english_pob_choice: concerning their release
  chosen_spanish: acerca de su liberación
  alternatives_spanish:
  - por su liberación
  - sobre su liberación
  - en cuanto a su liberación
  lexicon: LSJ
  rationale: ἀπόλυσις indica liberación o envío fuera. «Acerca de su liberación» sigue de cerca περί y mantiene el tono formal de la petición.
translation_notes:
  revision_awareness: Ajusté la traducción para que el marcador de nota [a] aparezca exactamente en el texto, corrigiendo la validación anterior. No se introdujeron cambios doctrinales; la revisión afecta solo la elección léxica y la ancladura de la nota.
  spanish_consistency_notes:
  - Mantengo «rey» sin mayúscula por ser un sustantivo común en español en este contexto.
  - Uso «liberación» para ἀπόλυσις, coherente con el valor de salida o puesta en libertad del término.
  - Conservo el tono narrativo formal y la secuencia temporal del griego sin añadir detalles externos.
