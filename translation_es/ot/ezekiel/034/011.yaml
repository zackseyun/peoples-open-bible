    issue: «y las haré volver» no traduce fielmente וּבִקַּרְתִּים
    rationale: El verbo בקר en este contexto denota atender, inspeccionar, cuidar o buscar personalmente a las ovejas. «Haré volver» añade el resultado de retorno/reunión, que corresponde a otra idea verbal y va más allá de la evidencia inmediata del texto fuente y de la auditoría inglesa.
  - severity: medium
    issue: La nota al pie actual está anclada en «He aquí» en vez de la principal ambigüedad léxica del versículo
    rationale: La auditoría inglesa conserva una nota sobre וּבִקַּרְתִּים, no sobre הִנְנִי. En español, la mayor necesidad interpretativa también recae en el segundo verbo pastoral.
