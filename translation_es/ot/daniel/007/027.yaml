    issue: La nota [a] está mal formulada y no preserva las alternativas del POB inglés.
    rationale: El inglés ofrece 'the people of the holy ones of the Most High' o 'the holy people of the Most High'. La nota española repite básicamente la lectura principal ('al pueblo de los santos del Altísimo') y no aporta una alternativa real.
  - severity: medium
