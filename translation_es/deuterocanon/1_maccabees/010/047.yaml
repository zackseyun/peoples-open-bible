  to: Y se agradaron de Alejandro[a], porque él había llegado a ser para ellos el promotor de propuestas de paz, y combatieron junto a él todos los días.
  rationale: Se reemplazó «quedaron complacidos con» por «se agradaron de» para expresar de manera más natural la aprobación favorable de εὐδόκησαν. Se cambió «había sido» por «había llegado a ser» para reflejar el matiz de devenir en ἐγένετο. En el texto principal, «promotor de propuestas de paz» comunica mejor en español el valor diplomático de ἀρχηγὸς λόγων εἰρηνικῶν, mientras la nota preserva las alternativas más literales documentadas en la auditoría inglesa.
