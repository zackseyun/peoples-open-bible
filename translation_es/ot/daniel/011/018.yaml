base_translation:
  language: en
  yaml_path: translation/ot/daniel/011/018.yaml
  text: Then he will turn his face to the coastlands and capture many[b][a]. But a commander will put an end to his reproach without his own reproach being turned back on him.
  footnotes:
  - marker: a
    text: Or 'to the islands.' The Hebrew term can refer either to islands or more broadly to coastlands/maritime regions.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of the final clauses is difficult. It may mean that a commander 'will put an end to his reproach against him' and 'will turn his reproach back on him,' that is, repay the insult.
    reason: alternative_reading
