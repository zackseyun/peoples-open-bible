translation:
  language: es
  text: Y quitaré de en medio las ciudades de tu tierra, y derribaré todas tus fortalezas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהִכְרַתִּי
  english_pob_choice: I will cut off
  chosen_spanish: derribaré
  alternatives_spanish:
  - cortaré de raíz
  - eliminaré
  - destruiré
  lexicon: HALOT
  rationale: El hebreo הִכְרַתִּי en este contexto profético expresa quitar de en medio o hacer desaparecer; en español, “derribaré” mantiene un tono concreto y activo cercano al paralelismo con la segunda cláusula. Se evitó “destruiré” por ser más general y perder la imagen verbal.
- source_word: עָרֵי
  english_pob_choice: the cities of
  chosen_spanish: las ciudades de
  alternatives_spanish:
  - las urbes de
  - los pueblos de
  lexicon: HALOT
  rationale: עִיר se traduce de forma directa como “ciudad”. “Ciudades” es la opción más natural y precisa en español, y conserva el plural del hebreo.
- source_word: אַרְצְךָ
  english_pob_choice: your land
  chosen_spanish: tu tierra
  alternatives_spanish:
  - tu país
  - tu territorio
  lexicon: HALOT
  rationale: אֶרֶץ en este marco territorial y de pacto se entiende mejor como “tierra”. “Tu tierra” conserva la relación posesiva y el sentido geográfico-covenantal sin sobrerrepresentar una noción política moderna.
- source_word: וְהָרַסְתִּי
  english_pob_choice: I will tear down
  chosen_spanish: derribaré
  alternatives_spanish:
  - demoleré
  - arrasaré
  lexicon: HALOT
  rationale: הָרַס significa derribar, demoler o echar abajo. “Derribaré” funciona bien en español para construcciones fortificadas y mantiene la imagen concreta de desmantelar defensas.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - cada una de
  - todas y cada una de
  lexicon: HALOT
  rationale: כָּל con sustantivo plural admite “todas” en español; aquí armoniza con “fortalezas” y evita una repetición excesiva de “todas” y “all” en una construcción menos natural.
- source_word: מִבְצָרֶיךָ
  english_pob_choice: your strongholds
  chosen_spanish: tus fortalezas
  alternatives_spanish:
  - tus fortalezas militares
  - tus bastiones
  - tus ciudades fortificadas
  lexicon: HALOT
  rationale: מִבְצָר designa un lugar fortificado o una fortaleza. “Fortalezas” es natural en español y conserva el sentido defensivo-militar. “Bastiones” sería posible, pero menos directo; “fortalezas” mantiene mejor la correspondencia léxica.
theological_decisions:
- issue: Imagen profética de juicio contra ciudades y defensas
  english_pob_reading: And I will cut off the cities of your land, and I will tear down all your strongholds.
  chosen_spanish_reading: Y derribaré las ciudades de tu tierra, y derribaré todas tus fortalezas.
  alternative_spanish_readings:
  - Y cortaré las ciudades de tu tierra, y derribaré todas tus fortalezas.
  - Y destruiré las ciudades de tu tierra, y destruiré todas tus fortalezas.
  rationale: El versículo usa lenguaje de juicio histórico concreto. Se preserva la repetición verbal para reflejar el paralelismo hebreo y la intensificación del ataque contra la infraestructura urbana y militar. No se espiritualiza el texto ni se suaviza el verbo.
  doctrine_reference: Juicio divino en contexto profético; paralelismo hebreo y lenguaje de desmantelamiento militar.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto se mantiene en alta concordancia con la fuente hebrea y la traducción inglesa auditada. No hay variantes textuales o decisiones revisadas que requieran notas adicionales.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo.
  - Se conservó el paralelismo verbal con dos ocurrencias de “derribaré” para reflejar la estructura del hebreo.
  - Se usó “tu tierra” y “tus fortalezas” de forma consistente con el valor territorial y militar del pasaje.
