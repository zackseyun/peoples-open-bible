translation:
  language: es
  text: Y celebró para ellos un banquete de bodas durante catorce días[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y celebró para ellos una boda durante catorce días». El griego γάμος puede denotar tanto la boda misma como la fiesta o celebración nupcial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν
  english_pob_choice: held
  chosen_spanish: celebró
  alternatives_spanish:
  - hizo
  - organizó
  - dio
  lexicon: BDAG
  rationale: Con γάμον como objeto, ποιέω funciona idiomáticamente como “celebrar/realizar” una boda o banquete. En español, “celebró” expresa con naturalidad la acción festiva sin perder el vínculo con el griego.
- source_word: αὐτοῖς
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - para los dos
  - para ambos
  lexicon: BDAG
  rationale: El dativo indica beneficiarios; “para ellos” mantiene la referencia al matrimonio recién unido y sigue de cerca el valor del original.
- source_word: γάμον
  english_pob_choice: a wedding feast
  chosen_spanish: un banquete de bodas
  alternatives_spanish:
  - una boda
  - una celebración de bodas
  - un festejo de bodas
  lexicon: BDAG
  rationale: γάμος puede referirse a la boda o a la celebración nupcial. En este contexto, el sentido festivo es el más probable; “banquete de bodas” conserva esa ambigüedad controlada, pero orientada a la celebración, como en la nota inglesa.
- source_word: ἡμερῶν δέκα τεσσάρων
  english_pob_choice: for fourteen days
  chosen_spanish: por catorce días
  alternatives_spanish:
  - durante catorce días
  - a lo largo de catorce días
  lexicon: BDAG
  rationale: El genitivo de duración se vierte naturalmente en español con “por catorce días”, manteniendo el valor temporal continuo del griego.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto griego de Swete 1909 y con el audit trail inglés; no se registran revisiones sustantivas ni tensiones textuales relevantes.
  spanish_consistency_notes:
  - Se prefiere «banquete de bodas» para reflejar el valor celebrativo de γάμος sin excluir del todo el sentido de boda.
  - Se evita «SEÑOR» u otras sustituciones porque no hay nombre divino en el versículo.
  - La construcción con «por catorce días» preserva la duración del evento sin añadir matices no presentes en el griego.
