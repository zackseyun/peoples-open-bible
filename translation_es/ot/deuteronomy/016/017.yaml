translation:
  language: es
  text: Cada hombre dará conforme al don de su mano[a], conforme a la bendición de Yahvé tu Dios, que él te ha dado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “el don de su mano”, un giro que se refiere a lo que cada uno tiene a su disposición para dar.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: Each man
  chosen_spanish: Cada hombre
  alternatives_spanish:
  - Cada uno
  - Cada persona
  lexicon: HALOT
  rationale: El sustantivo singular se entiende distributivamente. Se conserva el valor de 'hombre' para no neutralizar el referente, y 'cada' expresa la distribución en el contexto.
- source_word: כְּ/מַתְּנַת
  english_pob_choice: according to the gift
  chosen_spanish: conforme al don
  alternatives_spanish:
  - según el don
  - en proporción al don
  lexicon: HALOT
  rationale: La preposición כ expresa medida o proporción; 'conforme a' suena natural en español y mantiene la relación de correspondencia del hebreo.
- source_word: יָד/וֹ
  english_pob_choice: of his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - según sus recursos
  - de lo que tenga
  lexicon: HALOT
  rationale: Se conserva la imagen literal de 'mano', que en español también puede expresar capacidad o disponibilidad para dar. La nota aclara el sentido idiomático sin borrar la imagen.
- source_word: כְּ/בִרְכַּת
  english_pob_choice: according to the blessing
  chosen_spanish: conforme a la bendición
  alternatives_spanish:
  - según la bendición
  - en proporción a la bendición
  lexicon: HALOT
  rationale: Se mantiene la misma construcción proporcional que en la primera cláusula, reflejando la simetría del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se usa el nombre divino transliterado acostumbrado en español de este proyecto, en vez de sustituirlo por un título genérico. Esto preserva la identidad del nombre covenantal.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, Yahvé
  - el Dios tuyo
  lexicon: HALOT
  rationale: La construcción posesiva del hebreo se vierte de forma directa y natural en español. El vínculo con 'Yahvé' ya queda explícito en la cláusula anterior.
- source_word: אֲשֶׁר נָתַן לָךְ
  english_pob_choice: that he has given you
  chosen_spanish: que él te ha dado
  alternatives_spanish:
  - que te dio
  - que te ha concedido
  lexicon: HALOT
  rationale: El perfecto español comunica una dádiva ya otorgada con vigencia presente, en línea con el matiz del inglés POB. Se conserva el sujeto explícito 'él' para mantener la referencia a Yahvé/Dios.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo tiene el Tetragrámaton; el proyecto español lo rinde como 'Yahvé' para preservar el nombre propio de Dios en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El texto fuente y el contexto auditado en inglés presentan alto acuerdo; no se detectaron revisiones aplicadas. Se ha conservado la estructura paralela del hebreo y la elección terminológica central del nombre divino.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma regular para יְהוָה.
  - Se conserva 'mano' de forma literal con nota explicativa, siguiendo la transparencia del POB.
  - Se usa 'bendición' en paralelo con 'don' para reproducir la correspondencia del hebreo.
  - La sintaxis sigue de cerca la estructura distributiva del original sin sonar arcaizante.
