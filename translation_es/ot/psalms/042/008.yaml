- from: Lo profundo llama a lo profundo al sonido de tus cascadas[a]; todas tus olas rompientes y tus olas han pasado sobre mí[b].
  to: Lo profundo llama a lo profundo al sonido de tus cascadas[a]; todas tus rompientes y tus olas han pasado sobre mí[b].
  rationale: Se corrige la redundancia de 'olas rompientes y tus olas' para reflejar mejor los dos términos hebreos coordinados y mejorar la naturalidad del español. También se repara la nota con el anglicismo 'aguaspouts' y se ofrece una alternativa española legítima para la tradición de 'waterspouts'. La nota [b] se ajusta para ofrecer una variante real, no una simple repetición del texto principal.
