id: 1TI.2.6
reference: 1 Timothy 2:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ δοὺς ἑαυτὸν ἀντίλυτρον ὑπὲρ πάντων, τὸ μαρτύριον καιροῖς ἰδίοις·
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/002/006.yaml
  text: who gave himself as a ransom for all[c][b][a], the testimony at the proper times.
  footnotes:
  - marker: a
    text: Or 'on behalf of all.' The phrase 'for all' preserves the broad scope of the Greek without resolving debates about whether Paul means every individual or all kinds of people.
    reason: alternative_reading
  - marker: b
    text: Or 'the witness' or 'the testimony borne at the proper times.' The Greek phrase is compressed and may mean that Christ's self-giving is the testimony made known in God's appointed times.
    reason: lexical_alternative
  - marker: c
    text: Or 'the testimony at the proper times'.
    reason: previous_rendering
translation:
  language: ko
  text: 그분은 모든 사람을 위하여[a] 자신을 대속물[b]로 내어 주셨으니, 이것이 정한 때에 증언된[c] 그 증거입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「모든 사람을 대신하여」. 본 번역은 헬라어의 폭넓은 범위를 보존하며, 「모든 개인」인지 「모든 종류의 사람」인지 신학 논쟁을 본문 차원에서 풀지 않는다.
    reason: alternative_reading
  - marker: b
    text: 헬라어 ἀντίλυτρον은 「대신 치르는 몸값」을 가리키는 강조 합성어로, 자신을 다른 이의 자리에 대신 놓아 풀어 주는 행위를 명시한다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「제 때에 증언된 증거」 「하나님께서 정하신 시기에 드러난 증언」. 헬라어 구문은 압축되어 있어, 그리스도의 자기 내어 주심이 하나님의 정하신 때에 알려진 증언이라는 의미일 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δοὺς ἑαυτὸν
  english_pob_choice: who gave himself
  chosen_korean: 자신을 ~ 내어 주셨으니
  alternatives_korean:
  - 자기 자신을 주신
  - 스스로를 바치신
  lexicon: BDAG
  rationale: 자발적 자기 내어 주심을 「내어 주셨다」로 강하게 표현한다.
- source_word: ἀντίλυτρον
  english_pob_choice: a ransom
  chosen_korean: 대속물
  alternatives_korean:
  - 대속 값
  - 대신 치르는 몸값
  lexicon: BDAG
  rationale: ἀντί(대신) + λύτρον(몸값)의 강조 합성어. 한국 신학 정립 어휘 「대속물」이 그 의미를 가장 잘 담는다.
- source_word: ὑπὲρ πάντων
  english_pob_choice: for all
  chosen_korean: 모든 사람을 위하여
  alternatives_korean:
  - 모든 사람을 대신하여
  - 만인을 위해
  lexicon: BDAG
  rationale: 1, 4절과 일관되게 「모든 사람」 유지.
- source_word: τὸ μαρτύριον καιροῖς ἰδίοις
  english_pob_choice: the testimony at the proper times
  chosen_korean: 정한 때에 증언된 그 증거
  alternatives_korean:
  - 제 때에 증언된 그 증거
  - 정한 때마다 드러난 그 증언
  lexicon: BDAG
  rationale: 압축된 헬라어 구문을 풀어 「정한 때에 증언된」으로 옮긴다. καιροῖς ἰδίοις의 「하나님께서 정하신 시기」 어감을 「정한 때」로 살린다.
theological_decisions:
- issue: 2:6 핵심 기독론 — 대속물·만인의 구원
  chosen_reading: 「자신을 대속물로 모든 사람을 위하여 내어 주셨으니」
  alternative_readings:
  - 「자신을 모든 사람을 위한 속전으로 주셨다」
  - 「자신을 만인을 대신해 내어 주셨다」
  rationale: 2:5의 한 중보자 신학적 진술이 2:6에서 십자가의 대속적 자기 내어 주심으로 구체화된다. ἀντίλυτρον의 「대신함」 합성 어감을 「대속물」로 보존하며, ὑπὲρ πάντων의 폭(모든 사람)을 본문에서 좁히지 않는다(신학 논쟁은 본문 외 차원에 둠).
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; original-language primacy'
