translation:
  language: es
  text: 'Y ustedes refunfuñaron en sus tiendas y dijeron[a]: «Porque Yahvé nos odia, nos sacó de la tierra de Egipto para entregarnos en manos de los amorreos[b], para destruirnos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en el odio de Yahvé»; la expresión se vierte de manera idiomática como «Porque Yahvé nos odia».'
    reason: lexical_alternative
  - marker: b
    text: O «para entregarnos a los amorreos»; el hebreo dice literalmente «para darnos en la mano de los amorreos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרָגְנוּ
  english_pob_choice: you grumbled
  chosen_spanish: refunfuñaron
  alternatives_spanish:
  - murmuraron
  - se quejaron
  lexicon: HALOT
  rationale: El verbo hebreo רגן comunica quejas o protestas murmuradas y descontentas. «Refunfuñar» conserva bien el matiz de desagrado y murmuración, con un registro natural en español actual. No se suaviza a un simple «quejarse», que pierde parte del tono.
- source_word: בְאָהֳלֵיכֶם
  english_pob_choice: in your tents
  chosen_spanish: en sus tiendas
  alternatives_spanish:
  - en sus tiendas de campaña
  - "en sus tiendas de habitaci\0f3n"
  lexicon: HALOT
  rationale: "«Tiendas» reproduce la imagen concreta del desierto y sigue de cerca el hebreo. Se evita ampliar innecesariamente a «tiendas de campa\0f1a», porque el sustantivo ya comunica la escena con claridad."
- source_word: בְּשִׂנְאַת יְהוָה
  english_pob_choice: Because Yahweh hates us
  chosen_spanish: Porque Yahvé nos odia
  alternatives_spanish:
  - A causa del odio de Yahvé hacia nosotros
  - Porque Yahvé tiene odio contra nosotros
  lexicon: HALOT
  rationale: "La construcción hebrea con ב + «odio» funciona aqu\0ed de manera causal e idiom\0e1tica, como lo reconoci\0f3 el POB ingl\0e9s. Por eso se traduce con una causa expl\0edcita y natural en espa\0f1ol: «Porque Yahvé nos odia». Se preserva la fuerza acusatoria de la queja israelita sin volverla artificiosa."
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - "el SE\0d1OR"
  lexicon: HALOT
  rationale: "Se sigue el criterio del proyecto para el Nombre divino: transcribir el Tetragrámaton como «Yahvé» en el texto principal. Se evita la sustituci\0f3n lit\0fargica «SEÑOR», porque el audit trail ingl\0e9s documenta la decisi\0f3n de preservar el nombre propio."
- source_word: הוֹצִיאָנוּ מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: he brought us out of the land of Egypt
  chosen_spanish: nos sacó de la tierra de Egipto
  alternatives_spanish:
  - nos hizo salir de la tierra de Egipto
  - nos sacó de Egipto
  lexicon: HALOT
  rationale: «Sacar» reproduce con naturalidad el verbo de éxodo y mantiene el sentido de liberación desde un lugar concreto. «La tierra de Egipto» conserva la formulación explícita del hebreo y el tono bíblico sin volverse pesado.
- source_word: לָתֵת אֹתָנוּ בְּיַד הָאֱמֹרִי
  english_pob_choice: to give us into the hand of the Amorites
  chosen_spanish: para entregarnos en mano de los amorreos
  alternatives_spanish:
  - para darnos en mano de los amorreos
  - para ponernos en poder de los amorreos
  lexicon: HALOT
  rationale: Se conserva el idiomático «en mano de» porque el hebreo dice literalmente «en la mano de». «Entregarnos» expresa bien la idea de poner a alguien bajo el control de otro. «Amorreos» sigue el etnónimo plural natural en español.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - el amorreo
  - los amoritas
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular colectiva, el español bíblico natural prefiere el plural étnico «los amorreos». Esto coincide con el valor colectivo del término y evita una traducción demasiado literal pero poco idiomática.
- source_word: לְהַשְׁמִידֵנוּ
  english_pob_choice: to destroy us
  chosen_spanish: para destruirnos
  alternatives_spanish:
  - para aniquilarnos
  - para exterminarnos
  lexicon: HALOT
  rationale: «Destruirnos» es una traducción directa y fuerte del hifil de שׁמד, sin añadir una intensificación no requerida por el contexto. En español mantiene el peso de la amenaza que el pueblo atribuye a Yahvé.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El versículo usa directamente el Tetragrámaton. Siguiendo la línea doctrinal del proyecto y el audit trail inglés, se preserva el nombre propio de Dios como «Yahvé», en lugar de reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: The Israelites' claim that Yahweh 'hates us'
  english_pob_reading: Because Yahweh hates us
  chosen_spanish_reading: Porque Yahvé nos odia
  alternative_spanish_readings:
  - A causa del odio de Yahvé hacia nosotros
  - Porque Yahvé tiene odio contra nosotros
  rationale: La frase refleja la acusación de los israelitas, no una afirmación doctrinal sobre el carácter divino. La traducción mantiene la tensión retórica del texto y no la suaviza a una formulación abstracta que debilitaría la queja.
  doctrine_reference: Contexto narrativo de la acusación en Deuteronomio 1:27
translation_notes:
  revision_awareness: 'Se mantiene el acuerdo alto del audit trail inglés: no se introducen cambios de sentido sustanciales respecto de la decisión óptima ya revisada. La principal adaptación es idiomática al español, conservando el valor causal de בְּשִׂנְאַת יְהוָה, el Nombre divino y la imagen de «mano de los amorreos».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el plural étnico «amorreos» como equivalente natural de הָאֱמֹרִי.
  - La puntuación reproduce la cita directa y el giro causal con comillas abiertas/cerradas en estilo español.
  - El registro es solemne pero actual, acorde con una edición bíblica pública en español.
