translation:
  language: es
  text: 'Por mí mismo he jurado[a]; de mi boca ha salido en justicia una palabra que no volverá: ante mí toda rodilla se doblará, toda lengua jurará lealtad[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una palabra en justicia»; la frase hebrea puede enfatizar tanto la justicia de la palabra como que fue pronunciada en justicia.
    reason: lexical_alternative
  - marker: b
    text: O «toda lengua jurará» o «prestará juramento».
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּי
  english_pob_choice: By myself
  chosen_spanish: Por mí mismo
  alternatives_spanish:
  - Por mí
  - Yo mismo
  lexicon: HALOT
  rationale: La fórmula de juramento usa el sufijo de primera persona con fuerza enfática; en español, «por mí mismo» expresa de manera natural esa auto-referencia solemne sin perder el valor juramentario.
- source_word: נִשְׁבַּעְתִּי
  english_pob_choice: I have sworn
  chosen_spanish: he jurado
  alternatives_spanish:
  - juré
  - he prestado juramento
  lexicon: HALOT
  rationale: El perfecto hebreo en una proclamación profética se vierte bien con pretérito perfecto compuesto para expresar un juramento ya emitido con vigencia actual.
- source_word: יָצָא מִפִּי
  english_pob_choice: from my mouth has gone out
  chosen_spanish: de mi boca ha salido
  alternatives_spanish:
  - ha salido de mi boca
  - ha salido de mi boca y
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de algo que procede de la boca de Dios. «Ha salido» es idiomático en español y mantiene el movimiento del verbo hebreo.
- source_word: צְדָקָה דָּבָר
  english_pob_choice: a word in righteousness
  chosen_spanish: una palabra que ha salido en justicia
  alternatives_spanish:
  - una palabra justa
  - una palabra en justicia
  - una palabra de justicia
  lexicon: HALOT
  rationale: La construcción hebrea es compacta y admite la idea de que la palabra fue dicha «en justicia» o que tiene carácter justo. «En justicia» preserva la tensión sin convertirlo prematuramente en «decreto» ni en simple adjetivo.
- source_word: וְלֹא יָשׁוּב
  english_pob_choice: that will not return
  chosen_spanish: que no volverá
  alternatives_spanish:
  - que no regresará
  - que no será revocada
  lexicon: HALOT
  rationale: Se mantiene la imagen de la palabra que no «vuelve». «No volverá» es claro en español y conserva el sentido de irreversibilidad del dicho divino.
- source_word: כִּי
  english_pob_choice: ':'
  chosen_spanish: ':'
  alternatives_spanish:
  - porque
  - pues
  - que
  lexicon: HALOT
  rationale: Aquí introduce el contenido explicativo de la declaración irrevocable. Los dos puntos reflejan bien la función discursiva sin obligar a escoger una sola conjunción.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - ante mí
  lexicon: HALOT
  rationale: La preposición expresa dirección/relación personal; «a mí» es la forma más natural en español para la sumisión de la rodilla.
- source_word: תִּכְרַע כָּל בֶּרֶךְ
  english_pob_choice: every knee will bow
  chosen_spanish: se doblará toda rodilla
  alternatives_spanish:
  - se inclinará toda rodilla
  - toda rodilla se doblará
  lexicon: HALOT
  rationale: El hebreo usa el verbo de doblarse/inclinarse. «Se doblará» conserva la imagen corporal más de cerca que «se inclinará», aunque la segunda sigue siendo posible en español.
- source_word: תִּשָּׁבַע כָּל לָשׁוֹן
  english_pob_choice: every tongue will swear allegiance
  chosen_spanish: toda lengua jurará
  alternatives_spanish:
  - toda lengua prestará juramento
  - toda lengua jurará lealtad
  - toda lengua confesará
  lexicon: HALOT
  rationale: La forma verbal en hebreo remite al juramento. Se deja «jurará» sin explicitar el complemento para no sobretraducir, pero en contexto implica confesión pública de lealtad.
theological_decisions:
- issue: Alcance universal de la postración y del juramento final
  english_pob_reading: Render as universal homage/oath to the LORD without specifying whether the submission is willing or coerced.
  chosen_spanish_reading: Se conserva una sumisión y un juramento universales sin precisar si son voluntarios o forzados.
  alternative_spanish_readings:
  - toda lengua confesará
  - toda lengua jurará lealtad
  rationale: El hebreo presenta un reconocimiento universal de la soberanía de Yahvé. La traducción evita añadir matices doctrinales sobre la interioridad de esa sumisión y mantiene la tensión del texto.
  doctrine_reference: Preservar la tensión teológica del pasaje sin resolverla.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, especialmente la unión de la idea de «palabra» con el matiz de «en justicia», y conserva la estructura solemne de juramento y proclamación universal. Se evita convertir el cierre en una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma preferida del nombre divino en la serie POB, aunque en este versículo no aparezca explícitamente en el hebreo citado.
  - «Justicia» se usa para צְדָקָה sin forzar aquí la opción «rectitud», porque el contexto de juramento y palabra pronunciada favorece el matiz jurídico-moral.
  - «Rodilla» y «lengua» se conservan de forma literal por su peso idiomático y teológico.
