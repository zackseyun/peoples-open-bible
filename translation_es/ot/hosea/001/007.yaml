translation:
  language: es
  text: Pero tendré compasión de la casa de Judá[a], y los salvaré por Yahvé su Dios; no los salvaré por arco, ni por espada, ni por guerra, por caballos ni por jinetes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por medio de Yahvé su Dios»; el hebreo con ב puede expresar medio o agencia. El texto principal mantiene «por» para conservar el contraste con los medios militares de salvación.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אֶת
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: HALOT
  rationale: La conjunción aquí introduce contraste con el juicio previo; en español, «Pero» expresa mejor ese giro adversativo que un simple «Y».
- source_word: בֵּית יְהוּדָה
  english_pob_choice: the house of Judah
  chosen_spanish: la casa de Judá
  alternatives_spanish:
  - Judá
  - la casa/linaje de Judá
  lexicon: HALOT
  rationale: Conserva el giro idiomático hebreo y el registro profético; «casa de Judá» es más fiel que simplificar a «Judá».
- source_word: אֲרַחֵם
  english_pob_choice: I will have compassion
  chosen_spanish: tendré compasión
  alternatives_spanish:
  - mostraré misericordia
  - tendré misericordia
  lexicon: HALOT
  rationale: «Tener compasión» reproduce bien el matiz afectivo de רחם y suena natural en español contemporáneo sin perder solemnidad.
- source_word: וְהוֹשַׁעְתִּים
  english_pob_choice: and I will save them
  chosen_spanish: los salvaré
  alternatives_spanish:
  - los libraré
  - los rescataré
  lexicon: HALOT
  rationale: «Salvar» mantiene el valor amplio de ישׁע y conserva la repetición retórica del verbo con la negación posterior.
- source_word: בַּיהוָה אֱלֹהֵיהֶם
  english_pob_choice: by Yahweh their God
  chosen_spanish: por Yahvé, su Dios
  alternatives_spanish:
  - por medio de Yahvé, su Dios
  - en Yahvé, su Dios
  lexicon: HALOT
  rationale: El ב inicial puede ser instrumental; «por Yahvé» mantiene la fuerza de medio/agentivo sin sobreexplicar. Se conserva «Yahvé» según el nombre divino en el original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'El tetragrámaton se vierte según el término proyectado para español en el POB: «Yahvé», preservando el nombre propio divino.'
- source_word: וְלֹא אֽוֹשִׁיעֵם
  english_pob_choice: I will not save them
  chosen_spanish: no los salvaré
  alternatives_spanish:
  - no los libraré
  lexicon: HALOT
  rationale: Conserva la repetición del mismo campo verbal y la contraposición con el medio humano de guerra.
- source_word: בְּקֶשֶׁת
  english_pob_choice: by bow
  chosen_spanish: por arco
  alternatives_spanish:
  - con arco
  lexicon: HALOT
  rationale: «Arco» es más natural en español que «arco y flecha»; mantiene el instrumento de guerra de modo conciso.
- source_word: וּבְחֶרֶב
  english_pob_choice: or by sword
  chosen_spanish: ni por espada
  alternatives_spanish:
  - ni con espada
  lexicon: HALOT
  rationale: Se conserva el paralelismo de la lista bélica; «espada» es el equivalente estándar y claro.
- source_word: וּבְמִלְחָמָה
  english_pob_choice: or by war
  chosen_spanish: ni por guerra
  alternatives_spanish:
  - ni por batalla
  lexicon: HALOT
  rationale: «Guerra» traduce el término amplio y mantiene la acumulación de medios militares negados.
- source_word: בְּסוּסִים
  english_pob_choice: by horses
  chosen_spanish: por caballos
  alternatives_spanish:
  - por cabalgaduras
  lexicon: HALOT
  rationale: Se opta por la forma más directa y transparente; el referente militar queda claro en la enumeración.
- source_word: וּבְפָרָשִׁים
  english_pob_choice: or by horsemen
  chosen_spanish: ni por jinetes
  alternatives_spanish:
  - ni por caballeros
  - ni por caballería
  lexicon: HALOT
  rationale: «Jinetes» comunica de forma natural los guerreros montados; «caballería» sería más colectivo e interpretativo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se sigue la política del proyecto para el tetragrámaton: usar el nombre divino en transliteración española, no una sustitución reverencial ni la forma inglesa.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de בַּיהוָה אֱלֹהֵיהֶם
  english_pob_reading: 'instrumental: ''by the LORD their God'''
  chosen_spanish_reading: 'instrumental: ''por Yahvé, su Dios'''
  alternative_spanish_readings:
  - por medio de Yahvé, su Dios
  - en Yahvé, su Dios
  rationale: 'El contraste con los medios bélicos del versículo favorece un sentido instrumental/agentivo: la salvación vendrá mediante Yahvé mismo, no mediante recursos militares.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: mantiene la antítesis entre salvación divina y medios militares, conserva la repetición de «salvar», y actualiza el nombre divino a «Yahvé» según la revisión más reciente del POB inglés. Se evita suavizar el tono profético o resolver la ambigüedad del ב en una sola dirección sin nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el tetragrámaton.
  - «Salvar» se repite dos veces para reflejar el paralelismo del hebreo.
  - «Por» en la cláusula instrumental conserva la tensión semántica entre medio, agencia y contraste bélico.
  - 'La lista militar se traduce con equivalentes concretos y paralelos: arco, espada, guerra, caballos, jinetes.'
