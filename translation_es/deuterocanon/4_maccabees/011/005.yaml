revisions:
- from: ¿O no parece malo que adoremos al Creador de todas las cosas y vivamos conforme a su ley virtuosa[a][b]?
  to: ¿O no parece malo que adoramos al Creador de todas las cosas y vivimos conforme a su ley noble[a][b]?
  rationale: Se cambia «vivamos» por «vivimos» para reflejar el presente indicativo griego ζῶμεν, no un subjuntivo exhortativo. Se ajusta «su ley virtuosa» a «su ley noble» para una expresión más natural en español, manteniendo una alternativa documentada por el expediente inglés para ἔναρετον. Se conservan la estructura retórica, «Creador», y el sentido cultual de εὐσεβοῦμεν con «adoramos».
