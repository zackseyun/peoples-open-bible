translation:
  language: es
  text: Y estas salieron de la ciudad al encuentro de ellos, y quedaron en medio de Israel, estas por un lado[a] y aquellas por el otro; y los abatieron[b] hasta no dejarles ni sobreviviente ni fugitivo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘estas de este lado y aquellas de aquel lado’, un modismo que indica que Israel los cercó por ambos lados.'
    reason: lexical_alternative
  - marker: b
    text: 'O, más idiomáticamente: ‘hasta no dejarles ni sobreviviente ni fugitivo’, es decir, que no quedó nadie con vida ni nadie que pudiera escapar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these
  chosen_spanish: Y estas
  alternatives_spanish:
  - Y ellos
  - Entonces estas
  lexicon: HALOT
  rationale: El demostrativo mantiene la deixis explícita del hebreo. En español, ‘estas’ conserva mejor la referencia visible a la fuerza emboscada que un pronombre más general.
- source_word: יָצְאוּ מִן הָעִיר
  english_pob_choice: came out from the city
  chosen_spanish: salieron de la ciudad
  alternatives_spanish:
  - salieron desde la ciudad
  - salieron de dentro de la ciudad
  lexicon: HALOT
  rationale: ‘Salir de’ es la forma natural y fiel para יצא. ‘De la ciudad’ refleja bien el movimiento narrativo sin sobrecargar el español.
- source_word: לִקְרָאתָם
  english_pob_choice: to meet them
  chosen_spanish: para salir al encuentro de ellos
  alternatives_spanish:
  - para encontrarse con ellos
  - contra ellos
  lexicon: HALOT
  rationale: La frase conserva el valor relacional de לקראת y, por el contexto militar, deja implícita la confrontación sin imponer una traducción más interpretativa como ‘contra ellos’.
- source_word: וַיִּהְיוּ לְיִשְׂרָאֵל בַּתָּוֶךְ
  english_pob_choice: so that they were in the midst of Israel
  chosen_spanish: y quedaron en medio de Israel
  alternatives_spanish:
  - y estuvieron en medio de Israel
  - y llegaron a quedar en medio de Israel
  lexicon: HALOT
  rationale: ‘Quedaron’ expresa el resultado táctico del pasaje con naturalidad en español. Conserva la idea de encontrarse atrapados dentro del dispositivo israelita.
- source_word: בַּתָּוֶךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en el centro de
  - rodeados de
  lexicon: HALOT
  rationale: ‘En medio de’ es el equivalente más directo y comprensible para תוך. ‘Rodeados de’ explicita el sentido táctico, pero es más interpretativo.
- source_word: אֵלֶּה מִזֶּה וְאֵלֶּה מִזֶּה
  english_pob_choice: these on one side and those on the other
  chosen_spanish: unas de un lado y otras del otro
  alternatives_spanish:
  - unas de este lado y otras de aquel
  - unas por un lado y otras por el otro
  lexicon: HALOT
  rationale: La construcción española conserva el paralelismo de dos lados opuestos. La formulación evita calcar ‘this side/that side’ de modo duro, pero mantiene la imagen de cerco.
- source_word: וַיַּכּוּ אוֹתָם
  english_pob_choice: and they struck them down
  chosen_spanish: y los golpearon
  alternatives_spanish:
  - y los derribaron
  - y los atacaron
  lexicon: HALOT
  rationale: ‘Golpear’ reproduce el verbo básico נכה sin añadir por sí solo el matiz de ejecución total. El resultado letal queda indicado por la cláusula final, como en el hebreo y en la lectura auditada del inglés.
- source_word: עַד בִּלְתִּי הִשְׁאִיר ל֖וֹ
  english_pob_choice: until he left him neither
  chosen_spanish: hasta no dejarles
  alternatives_spanish:
  - hasta no dejarles nada
  - hasta no dejar a ninguno
  lexicon: HALOT
  rationale: El hebreo pasa a una construcción sintáctica concentrada. En español, ‘hasta no dejarles’ comunica la totalidad del exterminio sin perder el movimiento del original; el plural retoma el antecedente colectivo.
- source_word: שָׂרִיד וּפָלִיט
  english_pob_choice: neither survivor nor fugitive
  chosen_spanish: ni sobreviviente ni fugitivo
  alternatives_spanish:
  - ni remanente ni escapado
  - ni superviviente ni fugitivo
  lexicon: HALOT
  rationale: ‘Sobreviviente’ y ‘fugitivo’ preservan la pareja léxica con claridad en español. Se evita ‘remanente’ porque podría sonar más colectivo que personal; ‘fugitivo’ mantiene el sentido de quien logra escapar.
theological_decisions:
- issue: Extensión total de la derrota de Ai expresada por la fórmula final
  english_pob_reading: neither survivor nor fugitive
  chosen_spanish_reading: ni sobreviviente ni fugitivo
  alternative_spanish_readings:
  - ni superviviente ni fugitivo
  - sin que quedara nadie con vida ni nadie que escapara
  rationale: La fórmula conserva la tensión semántica entre no quedar vivo y no quedar alguien escapado. Se evita suavizarla con una paráfrasis totalizante que borraría la doble expresión del hebreo.
  doctrine_reference: N/A
- issue: Lectura del movimiento de cerco sin forzar una explicación explícita de la táctica
  english_pob_reading: these on one side and those on the other
  chosen_spanish_reading: unas de un lado y otras del otro
  alternative_spanish_readings:
  - unas de este lado y otras de aquel
  - unas a un lado y otras al otro
  rationale: Se conserva la imagen de encierro en dos flancos sin introducir glosas interpretativas dentro del texto principal. La nota puede aclarar el valor idiomático del hebreo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Tomé como base el texto hebreo de WLC y comprobé la solución inglesa auditada. La revisión inglesa reciente aclaró la clausula final a ‘neither survivor nor fugitive’; por eso el español evita una construcción torpe y reproduce esa duplicidad con ‘ni sobreviviente ni fugitivo’. También mantuve el paralelo de cerco de los dos hemistiquios iniciales sin exagerar la táctica más allá de lo que el hebreo expresa.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se mantuvo ‘en medio de’ para בַּתָּוֶךְ, en coherencia con el estilo POB de preservar imágenes espaciales.
  - Se evitó ‘siervo’ o ‘esclavo’ porque no aparece δοῦλος en este pasaje.
  - La puntuación reproduce la pausa del hebreo y la división inglesa en dos miembros principales.
