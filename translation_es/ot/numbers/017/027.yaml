review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura básica del hebreo y conserva la repetición enfática final, pero no preserva adecuadamente la distinción documentada entre גָּוַעְנוּ y אָבַדְנוּ. El primer verbo apunta a morir/expirar, mientras que el segundo expresa perderse/arruinarse/perecer; en el borrador, 'perecemos' para el primero y 'estamos arruinados' para el segundo invierten parcialmente la lógica del expediente inglés y debilitan el contraste verbal. Además, falta en español la nota que explica explícitamente el uso de dos verbos hebreos distintos.
  spanish_quality_summary: El español es legible, pero 'Y los hijos de Israel dijeron a Moisés, diciendo' suena algo rígido; aun así, es defendible dado el objetivo de transparencia formal. El mayor problema estilístico es '¡Mira!' dirigido a Moisés por una multitud, donde '¡Miren!' o una interjección no de segunda persona sería más natural. 'Estamos arruinados' funciona, pero 'estamos perdidos' suena más idiomático en un grito de pánico colectivo y preserva mejor la idea de perdición.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. 'Los hijos de Israel' está alineado con la decisión formal documentada, con alternativa en nota. Conviene mantener una nota para הֵן como 'He aquí' y añadir la nota sobre los dos verbos distintos, como en el rastro POB inglés.
  issues:
  - severity: high
    issue: No se conserva bien el contraste entre גָּוַעְנוּ y אָבַדְנוּ
    rationale: El expediente inglés distingue 'we perish / we are undone' para reflejar dos verbos hebreos distintos en secuencia. El español debería diferenciar más claramente 'morimos/estamos muriendo' frente a 'estamos perdidos' o equivalente.
  - severity: medium
    issue: Falta la nota equivalente a la nota inglesa sobre los dos verbos hebreos distintos
    rationale: La auditoría inglesa preserva explícitamente esta observación lexical; omitirla pierde una justificación importante del efecto retórico.
  - severity: medium
    issue: '''¡Mira!'' resulta menos natural que una forma plural o una interjección no personal'
    rationale: La frase representa el clamor de los israelitas a Moisés; en español, '¡Miren!' o '¡Ay!'/'¡He aquí!' evita una segunda persona singular extraña en boca de una multitud.
  revised_spanish_text: 'Y los hijos de Israel[a] dijeron a Moisés, diciendo: «¡Miren[b][c], morimos! ¡Estamos perdidos! ¡Todos nosotros estamos perdidos!»'
  revised_footnotes:
