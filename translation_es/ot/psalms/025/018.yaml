    rationale: Aunque fiel, en español suena más natural y digno en registro bíblico como 'Mira mi aflicción y mi sufrimiento' o 'Considera...'. La revisión mínima mantiene cercanía al hebreo y mejora legibilidad.
  - severity: medium
    issue: '''angustia'' estrecha demasiado וַעֲמָלִי'
    rationale: עָמָל abarca trabajo penoso, pena, sufrimiento o trouble; 'angustia' enfoca más el estado emocional. 'Sufrimiento' conserva mejor el alcance contextual de carga penosa.
  - severity: medium
    issue: Nota literal con 'levanta todos mis pecados' suena poco idiomática y algo confusa
    rationale: Para explicar נשׂא, una formulación como 'quita todos mis pecados' o 'llévate todos mis pecados' comunica mejor la imagen hebrea en español, mientras la nota ya aclara que funciona como modismo de perdón.
  revised_spanish_text: Mira mi aflicción y mi sufrimiento[a], y perdona todos mis pecados.
