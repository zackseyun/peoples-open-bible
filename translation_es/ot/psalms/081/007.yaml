revisions:
- from: Quité la carga[a] de su hombro; sus manos pasaron[b] del canasto[c].
  to: Quité la carga de su hombro[a]; sus manos se apartaron[b] del canasto[c].
  rationale: 'Se reemplaza «pasaron» por «se apartaron» para expresar en español claro el sentido de que las manos ya no estaban ocupadas con el recipiente de trabajo, sin sobreinterpretar como «fueron liberadas». Se corrigen las notas para alinearlas con el rastro auditado: se añade la alternativa sintáctica documentada para la primera cláusula y se conserva la literalidad de «pasaron» solo en nota. Se mantiene «canasto» como opción válida, junto con sus alternativas léxicas.'
