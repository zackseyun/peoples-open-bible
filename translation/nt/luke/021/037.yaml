id: LUK.21.37
reference: Luke 21:37
source:
  edition: SBLGNT
  text: Ἦν δὲ τὰς ἡμέρας ⸂ἐν τῷ ἱερῷ διδάσκων⸃, τὰς δὲ νύκτας ἐξερχόμενος ηὐλίζετο εἰς τὸ ὄρος τὸ καλούμενον Ἐλαιῶν·
translation:
  text: And during the days he was teaching in the temple[b][a], but at night he would go out and lodge on the mountain called the Mount of Olives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically the inner sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Or 'spend the night'; the verb can also suggest lodging in the open.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦν ... διδάσκων
  chosen: he was teaching
  alternatives:
  - he would be teaching
  - he spent the days teaching
  lexicon: BDAG
  rationale: The imperfect of εἰμί with the present participle διδάσκων expresses ongoing customary activity. 'He was teaching' preserves the durative sense in natural English without overparaphrasing.
- source_word: τὰς ἡμέρας
  chosen: during the days
  alternatives:
  - by day
  - in the daytime
  lexicon: BDAG
  rationale: The accusative of time conveys duration or time within which. 'During the days' is a close rendering that preserves the plural form and the day/night contrast of the verse.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than specifically the sanctuary proper. 'In the temple' is idiomatic and sufficient in English, while the broader sense can be preserved in a footnote.
- source_word: τὰς δὲ νύκτας
  chosen: but at night
  alternatives:
  - but during the nights
  - and the nights
  lexicon: BDAG
  rationale: The phrase contrasts Jesus' daytime and nighttime pattern. 'At night' is natural English for the repeated nighttime activity, while δέ is retained with 'but' to mark contrast.
- source_word: ἐξερχόμενος
  chosen: he would go out
  alternatives:
  - going out
  - departing
  lexicon: BDAG
  rationale: The participle is contemporaneous with the imperfect main verb and describes repeated action. 'He would go out' captures the customary sense in idiomatic English.
- source_word: ηὐλίζετο
  chosen: lodge
  alternatives:
  - spend the night
  - stay overnight
  - camp
  lexicon: BDAG
  rationale: αὐλίζομαι means to spend the night or lodge, often in the open or away from home. 'Lodge' is concise and readable; 'camp' may over-specify the manner, while 'spend the night' is slightly more paraphrastic.
- source_word: εἰς τὸ ὄρος
  chosen: on the mountain
  alternatives:
  - at the mountain
  - to the mountain
  lexicon: BDAG
  rationale: Although εἰς often means 'to,' with verbs of lodging the sense is effectively destination resulting in location. English idiom prefers 'lodge on the mountain' rather than 'to the mountain' in this context.
- source_word: τὸ καλούμενον Ἐλαιῶν
  chosen: called the Mount of Olives
  alternatives:
  - called Olives
  - called the mountain of Olives
  lexicon: BDAG
  rationale: The genitive Ἐλαιῶν means 'of olives/olive trees.' The established and clear English toponym is 'the Mount of Olives,' which accurately conveys the place name while keeping it translated rather than merely transliterated.
