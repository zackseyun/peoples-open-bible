translation:
  language: es
  text: Y vino la palabra de Yahvé a Salomón[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y aconteció que la palabra de Yahvé vino a Salomón, diciendo»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  - Y fue
  lexicon: HALOT
  rationale: El hebreo waw-consecutivo con היה introduce progreso narrativo. En español, «Y vino» conserva la fórmula profética natural de que la palabra llega al destinatario, sin forzar un calco como «y sucedió» que sonaría menos idiomático aquí.
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - un mensaje
  - el mensaje
  lexicon: HALOT
  rationale: En la expresión fija דְּבַר יְהוָה, «la palabra» reproduce el valor formulaico de una comunicación divina específica. «Mensaje» sería posible, pero debilita la conexión con la fórmula bíblica recurrente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración reverente del Tetragrámaton, de acuerdo con la norma del proyecto para יְהוָה. «Yahvé» es la forma más natural en español bíblico actual; no se sustituye por «SEÑOR» porque eso ocultaría el nombre propio.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición indica destinatario. «A» es la equivalencia natural en español para introducir el receptor de la palabra divina.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomón
  lexicon: HALOT
  rationale: Nombre propio en su forma española estándar.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y le dijo
  - para decir
  lexicon: HALOT
  rationale: La forma infinitiva introduce el contenido del discurso siguiente. «Diciendo» conserva la función de enlace formal con la cita subsiguiente y suena natural en español bíblico.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La POB en inglés documenta la decisión de usar el nombre divino transliterado. En español, «Yahvé» comunica ese mismo principio y evita la sustitución titulizante «SEÑOR», que borraría la forma del nombre revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una lectura óptima de la fórmula narrativa sin cambios en la revisión más reciente; la versión española conserva esa misma solución, adaptándola a una sintaxis natural en español y manteniendo el nombre divino transliterado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de forma consistente con el criterio del proyecto.
  - «La palabra» conserva el valor formulaico profético de דְּבַר יְהוָה.
  - «A Salomón» refleja el destinatario explícito del hebreo אֶל sin añadir contenido no presente.
  - «Diciendo» prepara la cita siguiente con una cadencia bíblica natural en español.
