review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: retribución (''mal por bien''), oposición del enemigo, y lectura causal de la segunda cláusula conforme al POB inglés. Sin embargo, dos elecciones debilitan la alineación fina con el original y con el audit trail: ''me son adversarios'' es menos directo que el verbal ''me oponen / se me oponen'', y ''yo sigo lo bueno'' atenúa demasiado רדף (''perseguir / ir tras con empeño'').'
  spanish_quality_summary: El texto es comprensible y digno, pero 'me son adversarios' suena algo calcado y menos natural en español bíblico actual que 'se me oponen'. Asimismo, la nota al pie actual ('en retorno por mi seguir lo bueno') no suena idiomática. Una pequeña revisión mejora naturalidad, fuerza poética y fidelidad léxica.
  glossary_alignment: No hay términos del glosario mayor en juego. 'Mal por bien' está bien logrado. Conviene acercar שטן a una forma verbal de oposición ('se me oponen') y רדף a 'persigo' o 'voy tras'; aquí 'persigo lo bueno' preserva mejor la decisión léxica documentada por el POB.
  issues:
  - severity: medium
    issue: '''me son adversarios'' debilita el valor verbal de יִשְׂטְנוּנִי'
    rationale: El hebreo usa un verbo finito ('me oponen / se me oponen'), y el POB inglés eligió 'oppose me'. La construcción nominal española expresa estado relacional más que acción hostil directa.
  - severity: medium
    issue: '''yo sigo lo bueno'' suaviza demasiado רדף'
    rationale: Aunque es legible, 'seguir' pierde la intensidad de 'pursue'. 'Persigo lo bueno' suena natural en español y conserva mejor la elección documentada.
  - severity: low
    issue: La nota al pie actual es poco idiomática en español
    rationale: '''En retorno por mi seguir lo bueno'' es torpe. Puede expresarse con naturalidad como ''se me oponen a cambio de que yo persiga lo bueno'' o ''en pago de mi perseguir lo bueno''.'
  revised_spanish_text: Y los que pagan mal por bien se me oponen[a], porque yo persigo lo bueno.
  revised_footnotes:
