translation:
  language: es
  text: 'Entonces el rey dio la orden, y trajeron a Daniel y lo arrojaron al foso de los leones[a]. El rey respondió y dijo a Daniel: «Tu Dios, a quien tú sirves continuamente, él te librará»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Tradicional: «al foso de los leones» también puede expresarse como «a la cueva de los leones» o, con orden más tradicional, «al foso de los leones»/«al lugar de los leones»; el arameo es literalmente «al foso de leones».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que él te libre». El arameo puede entenderse por algunos como expresión de deseo, aunque el texto principal sigue el sentido declarativo más directo: «él te librará».'
    reason: alternative_reading
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese momento
  - Luego
  lexicon: HALOT
  rationale: Marca de secuencia narrativa; “Entonces” es natural en español y conserva el avance temporal inmediato del relato.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: La forma determinada se expresa de manera natural como “el rey” en español.
- source_word: אֲמַר
  english_pob_choice: gave the command
  chosen_spanish: dio la orden
  alternatives_spanish:
  - dijo
  - ordenó
  lexicon: HALOT
  rationale: Aquí el verbo introduce una instrucción real seguida de ejecución; “dio la orden” conserva el valor directivo sin forzar una paráfrasis mayor.
- source_word: וְהַיְתִיו
  english_pob_choice: they brought
  chosen_spanish: trajeron
  alternatives_spanish:
  - lo llevaron
  - lo condujeron
  lexicon: HALOT
  rationale: La causativa de “venir” se entiende aquí como llevar a alguien adonde debe ir; “trajeron” es idiomático y fiel al movimiento impuesto por la orden.
- source_word: וּרְמוֹ
  english_pob_choice: threw
  chosen_spanish: lo arrojaron
  alternatives_spanish:
  - lo echaron
  - lo lanzaron
  lexicon: HALOT
  rationale: El verbo expresa echar/castar con fuerza; “lo arrojaron” preserva la violencia del acto y suena natural en español.
- source_word: לְגֻבָּא דִּי אַרְיָוָתָא
  english_pob_choice: into the den of lions
  chosen_spanish: al foso de los leones
  alternatives_spanish:
  - a la cueva de los leones
  - al foso/lugar de los leones
  lexicon: HALOT
  rationale: “Gubba” puede ser foso o hoyo; “foso” comunica bien el lugar de encierro y conserva el sentido tradicional sin ocultar la imagen concreta.
- source_word: עָנֵה ... וְאָמַר
  english_pob_choice: answered and said
  chosen_spanish: respondió y dijo
  alternatives_spanish:
  - respondió
  - contestó y dijo
  lexicon: HALOT
  rationale: La fórmula semítica se mantiene con dos verbos para reflejar la estructura del original; “respondió y dijo” es claro y sobrio en español.
- source_word: אֱלָהָךְ
  english_pob_choice: Your God
  chosen_spanish: Tu Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: Posesivo de segunda persona singular, sin necesidad de marcar formalidad adicional.
- source_word: דִּי אנתה פָּלַח לֵהּ
  english_pob_choice: whom you continually serve
  chosen_spanish: a quien tú sirves continuamente
  alternatives_spanish:
  - a quien sirves continuamente
  - a quien tú prestas servicio continuamente
  - a quien tú adoras continuamente
  lexicon: HALOT
  rationale: פָּלַח en arameo bíblico puede abarcar servicio rendido a una deidad; “sirves” mantiene esa amplitud mejor que “adoras”, y el complemento temporal conserva בִּתְדִירָא.
- source_word: בִּתְדִירָא
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - constantemente
  - regularmente
  lexicon: HALOT
  rationale: Expresa continuidad o regularidad persistente. “Continuamente” es directo y natural en español bíblico moderno.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre independiente enfatiza al sujeto; “él” conserva esa prominencia sin sobrecargar el español.
- source_word: יְשֵׁיזְבִנָּךְ
  english_pob_choice: will deliver you
  chosen_spanish: te librará
  alternatives_spanish:
  - te rescatará
  - te salvará
  lexicon: HALOT
  rationale: El verbo implica liberar/sacar de peligro. “Librará” comunica bien la liberación efectiva y mantiene un tono elevado sin rigidizar el sentido.
theological_decisions:
- issue: Fuerza de la declaración final del rey
  english_pob_reading: 'declarative confidence: ''he will deliver you'''
  chosen_spanish_reading: 'declaración de confianza: “él te librará”'
  alternative_spanish_readings:
  - “que él te libre”
  - “quizá él te librará”
  - “él te librará” como simple predicción sin matiz de esperanza
  rationale: La forma aramea puede leerse como declaración/confianza más que como petición. El español mantiene esa lectura directa con “él te librará”, sin convertirla en deseo litúrgico ni suavizar la seguridad expresada por el rey.
  doctrine_reference: Conservar la tensión del original; no resolverla según la tradición sino según el valor verbal del arameo.
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente WLC y la auditoría inglesa POB, manteniendo la secuencia narrativa, la fórmula semítica “respondió y dijo” y la decisión de leer el verbo final como declaración confiada (“él te librará”) en lugar de una súplica. No se introdujeron cambios textuales respecto al pasaje base.
  spanish_consistency_notes:
  - Se usa “Yahvé” por norma del proyecto solo cuando el texto lo requiera; aquí aparece “Dios” porque el arameo dice אֱלָהָךְ.
  - Se mantiene “foso de los leones” para reflejar el lugar de encierro sin imponer la forma tradicional inglesa o castellana como única posibilidad.
  - Se conserva “sirves” para פָּלַח, evitando reducirlo sin base a “adoras” y preservando su rango semántico.
  - La puntuación y el discurso directo siguen el español moderno de registro bíblico digno.
