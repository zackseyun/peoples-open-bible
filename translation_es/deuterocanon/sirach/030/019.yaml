translation:
  language: es
  text: ¿Qué valor hay en los ídolos de las naciones[a], que ni comen ni huelen?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego añade: «Así es el que es expulsado por el Señor».'
    reason: alternative_reading
lexical_decisions:
- source_word: מה יעריכו
  english_pob_choice: What value is there
  chosen_spanish: ¿Qué valor tiene...
  alternatives_spanish:
  - ¿Qué provecho tiene...
  - ¿Qué se puede valorar...
  - ¿Qué utilidad tiene...
  lexicon: HALOT
  rationale: El hebreo formula una pregunta retórica sobre valor o estimación; el paralelo griego τί συμφέρει refuerza la idea de utilidad/beneficio. En español, «¿Qué valor tiene...?» conserva la fuerza evaluativa sin sonar forzado.
- source_word: לאלילי הגוים
  english_pob_choice: in the idols of the nations
  chosen_spanish: a los ídolos de las naciones
  alternatives_spanish:
  - de los ídolos de las naciones
  - a los ídolos de los gentiles
  - a los ídolos paganos
  lexicon: HALOT
  rationale: El hebreo habla de los ídolos pertenecientes a las naciones. «Naciones» mantiene la cercanía al hebreo y evita un registro eclesiástico más cargado que «gentiles»; la preposición en español se adapta naturalmente con «tener valor a».
- source_word: אשר לא יאכלון
  english_pob_choice: which neither eat
  chosen_spanish: que ni comen
  alternatives_spanish:
  - que no comen
  - que no pueden comer
  lexicon: HALOT
  rationale: La cláusula relativa describe la impotencia de los ídolos. «Ni comen» conserva la negación coordinada y la brevedad del hebreo, y permite el paralelismo con «ni huelen».
- source_word: ולא יריחון
  english_pob_choice: nor smell
  chosen_spanish: ni huelen
  alternatives_spanish:
  - ni huelen ningún olor
  - ni perciben olor
  lexicon: HALOT
  rationale: El verbo hebreo significa oler/percibir olor. «Huelen» es la opción más natural y fiel en español; evita ampliar innecesariamente el sentido.
theological_decisions:
- issue: Extensión griega añadida en el paralelo de Sirácides
  english_pob_reading: Greek adds, 'So is the one driven away by the Lord.'
  chosen_spanish_reading: La cláusula principal se limita al dicho sobre los ídolos; la ampliación griega queda en nota.
  alternative_spanish_readings:
  - Así es el que es expulsado por el Señor.
  - Así es el que es echado fuera por el Señor.
  rationale: El testimonio hebreo conservado contiene solo la comparación sobre los ídolos, mientras que el griego añade una expansión comparativa. Siguiendo la primacía del hebreo donde existe, el texto principal no incorpora la ampliación, pero la preserva en nota para no ocultar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: El borrador sigue la lectura hebrea conservada en el texto principal, tal como indica el expediente. La ampliación griega se mantiene solo como nota alternativa, sin fusionarla con el versículo principal.
  spanish_consistency_notes:
  - Se usa «Dios»/«Señor» de forma contextual; aquí la nota conserva «Señor» porque refleja el griego Κυρίου.
  - Se mantiene «ídolos» para אלילי, conforme al sentido del hebreo y al paralelismo con el griego.
  - La redacción evita calcos como «en los ídolos» porque el español natural exige una formulación verbal distinta.
