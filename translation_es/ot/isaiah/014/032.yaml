translation:
  language: es
  text: ¿Y qué responderá a los mensajeros[a] de la nación? Que Yahvé ha fundado Sion, y en ella se refugiarán los afligidos[b] de su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "los enviados" o "los embajadores" de la nación. El término hebreo puede referirse a mensajeros diplomáticos.
    reason: lexical_alternative
  - marker: b
    text: O "los pobres de su pueblo" o "los humildes de su pueblo". El hebreo puede denotar pobreza económica, aflicción o condición humilde, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַה
  english_pob_choice: And what
  chosen_spanish: ¿Y qué
  alternatives_spanish:
  - ¿Qué
  - ¿Y cómo
  lexicon: HALOT
  rationale: El waw inicial y la interrogativa introducen la respuesta esperada; '¿Y qué?' conserva la conexión discursiva de forma natural en español.
- source_word: יַעֲנֶה
  english_pob_choice: will one answer
  chosen_spanish: responderá
  alternatives_spanish:
  - responderá uno
  - se responderá
  lexicon: HALOT
  rationale: El imperfecto qal funciona de modo genérico/indefinido. En español, una forma impersonal explícita suena forzada; 'responderá' mantiene la pregunta sobre la respuesta esperada sin imponer sujeto específico.
- source_word: מַלְאֲכֵי גוֹי
  english_pob_choice: the messengers of the nation
  chosen_spanish: los mensajeros de la nación
  alternatives_spanish:
  - los enviados de la nación
  - los embajadores de la nación
  - los mensajeros de una nación
  lexicon: HALOT
  rationale: '''Mensajeros'' conserva la amplitud semántica de מַלְאֲכֵי y permite la posibilidad diplomática documentada, sin estrechar indebidamente a ''embajadores''.'
- source_word: כִּי
  english_pob_choice: That
  chosen_spanish: Que
  alternatives_spanish:
  - Porque
  - Pues
  lexicon: HALOT
  rationale: Introduce el contenido de la respuesta, no una causalidad independiente. En español, 'Que' funciona como marcador de discurso reportado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Nombre divino: ''Yahvé''. Esto preserva el Tetragrámaton sin sustituirlo por un título.'
- source_word: יִסַּד
  english_pob_choice: has founded
  chosen_spanish: ha fundado
  alternatives_spanish:
  - ha establecido
  - fundó
  - ha puesto los cimientos de
  lexicon: HALOT
  rationale: יסד tiene sentido de fundar/establecer, con matiz arquitectónico. 'Ha fundado' reproduce bien el acto ya establecido con relevancia presente.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  lexicon: HALOT
  rationale: Se usa la forma española tradicional del topónimo bíblico ampliamente reconocible en lectores hispanos.
- source_word: וּבָהּ
  english_pob_choice: and in her
  chosen_spanish: y en ella
  alternatives_spanish:
  - y en ella misma
  - y dentro de ella
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a Sion. En español, 'ella' preserva la personificación de la ciudad sin introducir ambigüedad de género humano más allá de la figura literaria.
- source_word: יֶחֱסוּ
  english_pob_choice: will find refuge
  chosen_spanish: se refugiarán
  alternatives_spanish:
  - buscarán refugio
  - hallarán refugio
  lexicon: HALOT
  rationale: חסה expresa refugiarse/tomar refugio. 'Se refugiarán' es natural en español y conserva la idea de buscar protección en Sion.
- source_word: עֲנִיֵּי
  english_pob_choice: the afflicted
  chosen_spanish: los afligidos
  alternatives_spanish:
  - los pobres
  - los humildes
  - los necesitados
  lexicon: HALOT
  rationale: עֲנִיֵּי puede abarcar pobreza, aflicción o humildad según el contexto. Aquí 'afligidos' sigue la lectura inglesa 'afflicted' y preserva la vulnerabilidad sufriente sin reducir el término a mera pobreza económica.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: de su pueblo
  alternatives_spanish:
  - de su gente
  - de su nación
  lexicon: HALOT
  rationale: El sufijo posesivo masculino singular se conserva como 'su'. 'Pueblo' refleja el colectivo de alianza; 'gente' sería menos preciso teológicamente.
theological_decisions:
- issue: Nombre divino יהוה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se mantiene la decisión doctrinal del proyecto de transliterar el Nombre divino como 'Yahvé', evitando la sustitución por un título como 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Personificación de Sion mediante el sufijo femenino
  english_pob_reading: and in her
  chosen_spanish_reading: y en ella
  alternative_spanish_readings:
  - y en it
  - y en Sion
  rationale: La forma femenina del hebreo alude a Sion como ciudad personificada. 'Ella' conserva esa imagen literaria sin añadir contenido doctrinal.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando notas al pie no ancladas. La redacción mantiene la lectura auditada del original hebreo y el valor de los términos clave sin depender de marcadores de nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se usa 'Sion' como forma española estable del topónimo.
  - Se conserva el singular genérico de 'responderá' para יַעֲנֶה sin añadir un sujeto inexistente en el hebreo.
  - '''Afligidos'' reproduce la amplitud semántica de עֲנִיֵּי sin limitarse a pobreza económica.'
  - No se han incluido notas al pie, para evitar marcadores sin anclaje en el texto.
