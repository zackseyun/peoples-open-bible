translation:
  language: es
  text: Sadoc hijo de Ahitub y Abimélec hijo de Abiatar eran sacerdotes[a], y Shavsha era secretario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo en 2 Samuel 8:17 lee «Ahimelec hijo de Abiatar» en lugar de «Abimélec hijo de Abiatar». Aquí se sigue el texto hebreo de Crónicas.
    reason: textual_variant
lexical_decisions:
- source_word: צָדוֹק
  english_pob_choice: Zadok
  chosen_spanish: Sadoc
  alternatives_spanish:
  - Zadoc
  - Zadok
  lexicon: Nombre propio bíblico transliterado
  rationale: En español bíblico, Sadoc es la forma tradicional y reconocible del nombre hebreo צָדוֹק. Mantiene la referencia personal sin introducir un equivalente interpretativo.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En este listado genealógico-administrativo, el sentido inmediato de בן es filiación directa. 'Hijo de' es la correspondencia natural en español y evita ampliar innecesariamente a 'descendiente de'.
- source_word: אֲחִיטוּב
  english_pob_choice: Ahitub
  chosen_spanish: Ahitub
  alternatives_spanish:
  - Ajitub
  lexicon: Nombre propio bíblico transliterado
  rationale: Se conserva el nombre propio sin traducir. 'Ahitub' es una transliteración estable y clara en español.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimélec
  alternatives_spanish:
  - Abimelec
  lexicon: Nombre propio bíblico transliterado
  rationale: 'El nombre se translitera al español con acento prosódico natural: Abimélec. Se preserva así la forma del texto hebreo de Crónicas, sin armonizar con la variante de Samuel.'
- source_word: כֹּהֲנִים
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - sacerdotes cultuales
  - sacerdotes del templo
  lexicon: HALOT
  rationale: כֹּהֲנִים designa aquí a los sacerdotes en sentido cultual normal. 'Sacerdotes' es el equivalente español más directo y fiel; 'sacerdotes' también conserva mejor la función del término que una paráfrasis administrativa.
- source_word: שַׁוְשָׁא
  english_pob_choice: Shavsha
  chosen_spanish: Sava
  alternatives_spanish:
  - Savsa
  - Shavsha
  lexicon: Nombre propio bíblico transliterado
  rationale: El hebreo consonántico apunta a una forma que en español puede representarse de modo más natural como Sava. Se evita una transliteración excesivamente anglicada cuando el sonido y la lectura castellana pueden expresarse con mayor fluidez.
- source_word: סוֹפֵר
  english_pob_choice: secretary
  chosen_spanish: secretario
  alternatives_spanish:
  - escriba
  - cronista
  lexicon: HALOT
  rationale: En contexto de administración real, סוֹפֵר nombra un cargo oficial. 'Secretario' comunica bien esa función en español moderno sin perder el carácter institucional del puesto.
theological_decisions:
- issue: Oficio sacerdotal y traducción de כֹּהֲנִים
  english_pob_reading: The text identifies Zadok and Abimelech as priests, following the Hebrew of Chronicles.
  chosen_spanish_reading: El texto identifica a Sadoc y Abimélec como sacerdotes, siguiendo el hebreo de Crónicas.
  alternative_spanish_readings:
  - oficiaban como sacerdotes
  - eran ministros sacerdotales
  rationale: No hay una decisión doctrinal compleja, pero sí conviene conservar el oficio cultual sin diluirlo. 'Sacerdotes' mantiene el sentido histórico y religioso del hebreo y evita una explicación innecesaria.
  doctrine_reference: Oficio sacerdotal del Antiguo Testamento
translation_notes:
  revision_awareness: Se ha seguido la lectura hebrea de Crónicas tal como está atestiguada en WLC, conservando la variante textual respecto de 2 Samuel 8:17 en una nota. La redacción española prioriza claridad natural sin apartarse de los nombres propios y cargos del original.
  spanish_consistency_notes:
  - Se mantiene la forma española tradicional Sadoc para צָדוֹק, coherente con el uso bíblico en español.
  - Se conserva el oficio cultual 'sacerdotes' para כֹּהֲנִים y el cargo administrativo 'secretario' para סוֹפֵר.
  - La nota textual explica la variante de Abimélec sin mezclarla con una armonización a Samuel.
  - Los nombres propios se han transliterado de manera consistente y legible para el lector hispanohablante.
