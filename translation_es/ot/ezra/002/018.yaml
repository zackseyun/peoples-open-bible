  lexicon: HALOT
  rationale: En listas genealógicas y censales, בְּנֵי funciona como fórmula de pertenencia a un linaje o clan. En español, «los hijos de» reproduce el estilo formal del registro y mantiene la equivalencia estructural sin volverlo antinatural.
- source_word: יוֹרָה
  english_pob_choice: Jorah
  chosen_spanish: Jora
  alternatives_spanish:
  - Jorah
  lexicon: Transliteración según la forma hebrea en este versículo; cf. Nehemías 7:24
  rationale: La forma hebrea aquí es יוֹרָה, que corresponde más directamente a «Jora». Se prefiere la transliteración que refleja la forma del texto base; la variante «Jorah» queda registrada como forma relacionada en el paralelo.
- source_word: מֵאָה וּשְׁנֵים עָשָׂר
  english_pob_choice: one hundred and twelve
  chosen_spanish: ciento doce
  alternatives_spanish:
  - ciento y doce
  - ciento doce
  lexicon: HALOT
  rationale: El cardinal se expresa de manera natural y sobria en español. En un listado censal, «ciento doce» conserva el tono documental del original y evita una formulación innecesariamente pesada.
translation_notes:
  revision_awareness: No se aplicaron revisiones previas; se conserva el valor textual del listado censal con una transliteración ajustada a la forma hebrea de este versículo y con la variante paralela registrada en nota.
  spanish_consistency_notes:
  - Se mantiene el estilo enumerativo breve propio de genealogías y censos.
  - Se evitó «descendientes» porque el paralelo inglés POB opta por la fórmula genealógica formal y el hebreo permite esa lectura sin necesidad de ampliarla.
  - La nota de variante se ancla en el nombre propio para preservar la relación con el paralelo de Nehemías.
