translation:
  language: es
  text: El que anda con sabios se volverá sabio[a], pero el compañero de necios sufrirá daño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será dañado», «le irá mal» o «acabará arruinado». El verbo hebreo puede referirse a experimentar daño o un desenlace adverso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלוֹךְ
  english_pob_choice: walks
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - va
  lexicon: HALOT
  rationale: En español, «anda con» conserva la imagen proverbial de conducta y compañía mejor que un literal «camina»; además suena natural en un refrán sapiencial.
- source_word: אֶת
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - en compañía de
  lexicon: HALOT
  rationale: Aquí marca acompañamiento, no objeto directo. «Con» es la equivalencia más natural y transparente en español.
- source_word: חֲכָמִים
  english_pob_choice: the wise
  chosen_spanish: sabios
  alternatives_spanish:
  - los sabios
  - personas sabias
  lexicon: HALOT
  rationale: «Sabios» mantiene el valor colectivo y proverbial del término. El artículo puede quedar implícito en español sin perder el sentido general.
- source_word: וְחָכָם
  english_pob_choice: will become wise
  chosen_spanish: se volverá sabio
  alternatives_spanish:
  - será sabio
  - llegará a ser sabio
  lexicon: HALOT
  rationale: 'La construcción expresa resultado o proceso: la compañía de sabios produce sabiduría. «Se volverá sabio» reproduce mejor ese matiz que un simple estado.'
- source_word: וְרֹעֶה
  english_pob_choice: but a companion of
  chosen_spanish: el compañero de
  alternatives_spanish:
  - quien anda con
  - el que acompaña a
  lexicon: HALOT
  rationale: Aunque el verbo puede tener el sentido literal de pastorear, en este contexto sapiencial indica asociación o trato habitual. «El compañero de» preserva la idea relacional sin introducir una imagen extraña en español.
- source_word: כְסִילִים
  english_pob_choice: fools
  chosen_spanish: necios
  alternatives_spanish:
  - fatuos
  - insensatos
  lexicon: HALOT
  rationale: En Proverbios, el término designa una categoría moral y sapiencial más que una simple falta de inteligencia. «Necios» comunica bien esa carga sin sonar demasiado técnica.
- source_word: יֵרוֹעַ
  english_pob_choice: will suffer harm
  chosen_spanish: sufrirá daño
  alternatives_spanish:
  - será dañado
  - le irá mal
  - acabará arruinado
  lexicon: HALOT
  rationale: El verbo puede indicar daño, mal resultado o ruina. «Sufrirá daño» mantiene abierta la gama de consecuencias sin exagerar hasta «ruina».
translation_notes:
  revision_awareness: El texto hebreo y el aparato inglés están en alto acuerdo; no hay revisiones aplicadas en el pasaje auditado. La versión española conserva la metáfora de compañía/caminar y la ambigüedad del verbo final, sin forzar una intensificación no respaldada por la fuente.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología teológica ajena porque no aparece en el versículo.
  - «Sabios» y «necios» mantienen el registro proverbial de Proverbios con lenguaje natural en español.
  - La nota al pie se ancla en «daño» para reflejar la alternativa semántica del hebreo final.
