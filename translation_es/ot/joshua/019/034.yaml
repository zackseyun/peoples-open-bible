translation:
  language: es
  text: Entonces el límite giró hacia el oeste, hasta Aznot-tabor, y desde allí salió a Hucoc; y llegó hasta Zabulón por el sur, y llegó hasta Aser por el oeste, y hasta Judá[a], junto al Jordán, hacia el oriente, por donde sale el sol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y Judá, el Jordán, hacia el oriente». La geografía es difícil, porque Neftalí no colindaba directamente con el territorio de Judá en el sentido usual. Algunos entienden la expresión de otro modo o sospechan una dificultad textual, pero aquí se traduce el hebreo tal como está.'
    reason: textual_variant
lexical_decisions:
- source_word: וְשָׁב
  english_pob_choice: Then ... turned
  chosen_spanish: Entonces ... giró
  alternatives_spanish:
  - y giró
  - y volvió
  lexicon: HALOT
  rationale: En descripciones de fronteras, שוב expresa un cambio de dirección del límite. «Giró» comunica ese movimiento en español con naturalidad sin perder el valor direccional.
- source_word: הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el borde
  lexicon: HALOT
  rationale: En un contexto de repartos territoriales, «límite» transmite bien la línea demarcatoria y suena natural en español bíblico moderno.
- source_word: יָמָּה
  english_pob_choice: westward
  chosen_spanish: hacia el oeste
  alternatives_spanish:
  - hacia el mar
  - seaward
  lexicon: HALOT
  rationale: Aquí el hebreo usa una referencia direccional al mar para indicar el occidente. «Hacia el oeste» expresa con claridad el sentido geográfico en español.
- source_word: אַזְנוֹת תָּבוֹר
  english_pob_choice: Aznoth-tabor
  chosen_spanish: Aznót-tabór
  alternatives_spanish:
  - Aznot Tabor
  - Aznoth-tabor
  lexicon: HALOT
  rationale: Es un topónimo y debe transliterarse. Se conserva la forma compuesta con adaptación ortográfica mínima al español para lectura pública.
- source_word: וְיָצָא מִשָּׁם
  english_pob_choice: and from there it went out
  chosen_spanish: y desde allí salió
  alternatives_spanish:
  - y desde allí se extendió
  - y desde allí fue
  lexicon: HALOT
  rationale: En fórmulas de delimitación, יצא indica que el trazado continúa a partir de un punto. «Salió» mantiene esa fórmula sin sobreexplicarla.
- source_word: חוּקֹקָה
  english_pob_choice: Hukkok
  chosen_spanish: Jukkok
  alternatives_spanish:
  - Hukkok
  - Jucoc
  lexicon: HALOT
  rationale: Nombre de lugar transliterado. Se usa «Jukkok» para una pronunciación más natural en español, conservando la identidad del topónimo.
- source_word: וּפָגַע
  english_pob_choice: it reached
  chosen_spanish: tocó
  alternatives_spanish:
  - alcanzó
  - llegó a
  - colindó con
  lexicon: HALOT
  rationale: En límites territoriales, פגע describe contacto de la línea con otra región. «Tocó» reproduce bien ese contacto fronterizo sin introducir interpretación extra.
- source_word: בִּזְבֻלוּן
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulón
  - Zabulun
  lexicon: HALOT
  rationale: Nombre tribal en forma española tradicional y ampliamente reconocible, sin cambiar el referente del texto.
- source_word: מִנֶּגֶב
  english_pob_choice: on the south
  chosen_spanish: por el sur
  alternatives_spanish:
  - al sur
  - desde el sur
  lexicon: HALOT
  rationale: La construcción indica el lado sur del contacto fronterizo. «Por el sur» mantiene el valor relacional de la frase.
- source_word: וּבְאָשֵׁר פָּגַע מִיָּם
  english_pob_choice: and it reached Asher on the west
  chosen_spanish: y tocó a Aser por el oeste
  alternatives_spanish:
  - y tocó a Aser hacia el mar
  - y tocó a Aser al occidente
  lexicon: HALOT
  rationale: El hebreo usa una referencia al mar para señalar el oeste. «Por el oeste» conserva la orientación y evita una traducción demasiado literal que oscurezca el sentido.
- source_word: וּבִיהוּדָה
  english_pob_choice: and Judah
  chosen_spanish: y a Judá
  alternatives_spanish:
  - y Judá
  - y hacia Judá
  lexicon: HALOT
  rationale: Se preserva el nombre bíblico tal como aparece en el texto, sin resolver la dificultad geográfica en la traducción principal.
- source_word: הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  - el Jordán River
  lexicon: HALOT
  rationale: Forma normal y natural en español para el nombre del río en contextos bíblicos.
- source_word: מִזְרַח הַשָּׁמֶשׁ
  english_pob_choice: toward the east, where the sun rises
  chosen_spanish: hacia el oriente, por donde sale el sol
  alternatives_spanish:
  - hacia el este, donde sale el sol
  - hacia el nacimiento del sol
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hacia el naciente del sol». «Por donde sale el sol» conserva la imagen semítica y «hacia el oriente» mantiene la dirección en un español elegante.
theological_decisions:
- issue: La frase geográficamente difícil 'y a Judá, el Jordán, hacia el oriente'
  english_pob_reading: Retain the Masoretic wording in the main text without harmonizing or emending.
  chosen_spanish_reading: Mantener la mención de Judá y del Jordán en el texto principal sin armonizar ni corregir la geografía.
  alternative_spanish_readings:
  - suavizar la línea para evitar que parezca que Neftalí limita directamente con Judá
  - entender Judá como error textual o referencia indirecta a otro territorio
  rationale: No se trata de una cuestión doctrinal, sino de una dificultad textual y geográfica. La versión española conserva la forma recibida del hebreo y deja constancia de la tensión en nota, en vez de resolverla silenciosamente.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el análisis cruzado reportó alta concordancia y solo observaciones menores, por lo que se mantiene la estructura del texto fuente y la nota sobre la dificultad geográfica.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrama; este versículo no lo contiene.
  - Se transliteran los topónimos sin normalizarlos a formas eclesiásticas distintas del hebreo.
  - «Límite» y «tocó» mantienen el lenguaje técnico de descripciones territoriales.
  - Se preserva la dificultad de Judá/Jordán en el texto principal y se explica en nota.
  - Se mantiene la imaginería direccional «por donde sale el sol» para מִזְרַח הַשָּׁמֶשׁ.
