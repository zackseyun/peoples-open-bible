review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: בְּנֵי = «Los hijos de», שְׁבוּאֵל = «Sebuel», y הָרֹאשׁ se entiende correctamente como título de primacía/liderazgo. Sin embargo, גֵרְשׁוֹם en la evidencia fuente es específicamente «Gershom», y el propio audit trail inglés documenta que aquí no es «Gershon». Cambiarlo a «Gersón» borra una distinción de forma presente en el texto fuente.'
  spanish_quality_summary: 'El español es claro y natural. «Los hijos de Gershom: Sebuel, el jefe» suena bien en una lista genealógica/administrativa. La nota alternativa necesita mejora: «el cabeza» es poco idiomático; «la cabeza» tampoco encaja tan bien aquí como «el cabeza» literal, así que conviene seguir más de cerca la alternativa inglesa con «el jefe» / «la cabeza» explicada mejor como «la cabeza» o preferiblemente «la cabeza» solo si se busca literalidad. Para una nota breve, «O “la cabeza”» es aceptable aunque menos natural en texto principal.'
  glossary_alignment: 'No hay términos teológicos sensibles del glosario mayor en este versículo. La principal cuestión terminológica es onomástica: debe respetarse la forma personal «Gershom» según la fuente y la decisión auditada. «Sebuel» está bien como adaptación española. «El jefe» representa adecuadamente הָרֹאשׁ en español moderno.'
  issues:
  - severity: high
    issue: «Gersón» no preserva la forma específica del nombre hebreo גֵרְשׁוֹם en este versículo.
    rationale: La documentación inglesa distingue explícitamente «Gershom» de la alternativa «Gershon». La forma española «Gersón» acerca el nombre a «Gershon» y pierde la distinción textual que el audit trail quiso preservar.
  - severity: low
    issue: La nota «O «el cabeza»» es poco idiomática en español.
    rationale: Aunque busca reflejar la alternativa lexical «the head», en español suena forzada. Una nota como «O «la cabeza»» refleja mejor la literalidad alternativa, manteniéndola fuera del texto principal.
  revised_spanish_text: 'Los hijos de Gershom: Sebuel, el jefe[a].'
