translation:
  language: es
  text: Del aumento de la soberanía y de la paz no habrá fin, sobre el trono de David y sobre su reino, para afirmarlo y sostenerlo con justicia y con rectitud desde ahora y para siempre. El celo de Yahvé de los Ejércitos[a] hará esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «de las huestes».
    reason: lexical_alternative
lexical_decisions:
- source_word: למרבה
  english_pob_choice: Of the increase
  chosen_spanish: Del aumento
  alternatives_spanish:
  - Del crecimiento
  - De la expansión
  lexicon: HALOT
  rationale: El ל inicial con el sustantivo derivado de רבה introduce la idea de incremento continuo. «Del aumento» conserva esa fuerza nominal sin convertirla en una paráfrasis más libre.
- source_word: הַמִּשְׂרָה
  english_pob_choice: the dominion
  chosen_spanish: la soberanía
  alternatives_spanish:
  - el dominio
  - el gobierno
  lexicon: HALOT
  rationale: מִשְׂרָה denota gobierno o dominio real. En español, «soberanía» comunica bien el alcance regio y mantiene un tono digno, sin reducirlo a administración política.
- source_word: וּלְשָׁלוֹם
  english_pob_choice: and of peace
  chosen_spanish: y de la paz
  alternatives_spanish:
  - y paz
  - y de bienestar
  lexicon: HALOT
  rationale: שָׁלוֹם incluye paz, plenitud y bienestar. «Paz» es la equivalencia principal más clara; el artículo y la preposición se mantienen para reflejar la construcción hebrea.
- source_word: אֵין קֵץ
  english_pob_choice: there will be no end
  chosen_spanish: no habrá fin
  alternatives_spanish:
  - no tiene fin
  - será sin fin
  lexicon: HALOT
  rationale: La cláusula expresa ausencia de límite o término. «No habrá fin» comunica de forma natural la duración futura implícita en el contexto profético.
- source_word: עַל כִּסֵּא דָוִד
  english_pob_choice: on the throne of David
  chosen_spanish: sobre el trono de David
  alternatives_spanish:
  - en el trono de David
  - sobre el asiento real de David
  lexicon: HALOT
  rationale: «Trono» preserva la imagen monárquica y dinástica. «Sobre» reproduce bien עַל y evita suavizar la metáfora política.
- source_word: וְעַל מַמְלַכְתּוֹ
  english_pob_choice: and over his kingdom
  chosen_spanish: y sobre su reino
  alternatives_spanish:
  - y sobre su realeza
  - y sobre su dominio
  lexicon: HALOT
  rationale: מַמְלָכָה se traduce mejor como «reino» en este contexto davídico. El sufijo de tercera persona mantiene la referencia al poseedor del reino.
- source_word: לְהָכִין אֹתָהּ
  english_pob_choice: to establish it
  chosen_spanish: para afirmarlo
  alternatives_spanish:
  - para establecerlo
  - para hacerlo firme
  lexicon: HALOT
  rationale: כּוּן en hiphil puede significar establecer o hacer firme. «Afirmarlo» expresa bien la idea de dar estabilidad al reino y evita una repetición muy pesada de «establecer».
- source_word: וּלְסַעֲדָהּ
  english_pob_choice: and to uphold it
  chosen_spanish: y sostenerlo
  alternatives_spanish:
  - y apoyarlo
  - y sustentarlo
  lexicon: HALOT
  rationale: סעד significa apoyar, sostener o mantener firme. «Sostenerlo» continúa naturalmente el par con «afirmarlo» y refleja la idea de preservación activa.
- source_word: בְּמִשְׁפָּט
  english_pob_choice: with justice
  chosen_spanish: con justicia
  alternatives_spanish:
  - con juicio
  - mediante justicia
  lexicon: HALOT
  rationale: מִשְׁפָּט puede ser juicio o justicia; aquí el sentido gubernamental-ético favorece «justicia». La preposición «con» mantiene el carácter instrumental/mediante del hebreo.
- source_word: וּבִצְדָקָה
  english_pob_choice: and with righteousness
  chosen_spanish: y con rectitud
  alternatives_spanish:
  - y con justicia
  - y con justicia recta
  lexicon: HALOT
  rationale: Para distinguirlo de מִשְׁפָּט, צְדָקָה se vierte como «rectitud», que en español puede expresar tanto integridad moral como conformidad justa. Así se preserva la pareja conceptual sin colapsarla en un solo término.
- source_word: מֵעַתָּה וְעַד עוֹלָם
  english_pob_choice: from now on and forever
  chosen_spanish: desde ahora y para siempre
  alternatives_spanish:
  - desde este momento y para siempre
  - de ahora en adelante y para siempre
  lexicon: HALOT
  rationale: La expresión idiomática indica duración ilimitada que comienza en el presente profético. «Desde ahora y para siempre» es natural, solemne y fiel al valor temporal.
- source_word: קִנְאַת
  english_pob_choice: The zeal
  chosen_spanish: El celo
  alternatives_spanish:
  - El ardor
  - La pasión
  lexicon: HALOT
  rationale: קִנְאָה puede significar celo o celo celoso/jealousy. «Celo» evita la connotación negativa de envidia y conserva la idea de compromiso ferviente de Yahvé para cumplir su promesa.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé de los ejércitos
  lexicon: HALOT
  rationale: El nombre divino se mantiene como «Yahvé» según la terminología del proyecto. צְבָאוֹת se traduce por «los Ejércitos» para conservar el sentido del título y evitar una máscara reverencial; la mayúscula refleja el título divino.
- source_word: תַּעֲשֶׂה זֹּאת
  english_pob_choice: will do this
  chosen_spanish: hará esto
  alternatives_spanish:
  - realizará esto
  - llevará esto a cabo
  lexicon: HALOT
  rationale: עָשָׂה con זֹּאת expresa una acción divina concreta y efectiva. «Hará esto» es directo y reproduce la sencillez enfática del hebreo.
theological_decisions:
- issue: Cómo verter יהוה en un texto profético davídico sin perder el nombre propio divino
  english_pob_reading: The English audit trail renders יהוה as 'Yahweh' and keeps the title explicit in the main text.
  chosen_spanish_reading: Mantener «Yahvé» en el cuerpo principal, sin sustituirlo por una máscara genérica como «Señor».
  alternative_spanish_readings:
  - Señor
  - el SEÑOR
  rationale: 'El proyecto español sigue la misma política de transparencia que el inglés POB: el Tetragrámaton no se oculta. «Yahvé» conserva el nombre revelado y evita perder la referencia auditable.'
  doctrine_reference: 'Affirmations; Translation philosophy #6'
- issue: Si traducir צְבָאוֹת de forma literal o tradicional
  english_pob_reading: The English POB uses 'of Armies' in the main text and footnotes 'the LORD of hosts' as an alternative.
  chosen_spanish_reading: Traducirlo como «de los Ejércitos» y no como una fórmula eclesiástica tradicional fija.
  alternative_spanish_readings:
  - de los ejércitos
  - de las huestes
  - de los Ejércitos
  rationale: «Los Ejércitos» comunica el contenido del título divino de forma transparente. La mayúscula ayuda a reconocer que funciona como designación divina, no como simple referencia militar.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
- issue: Mantener la tensión entre justicia y rectitud en la pareja מִשְׁפָּט / צְדָקָה
  english_pob_reading: The English keeps 'justice' and 'righteousness' distinct.
  chosen_spanish_reading: 'Conservar dos términos diferenciados: «justicia» y «rectitud».'
  alternative_spanish_readings:
  - justicia y justicia
  - juicio y justicia
  - juicio y rectitud
  rationale: La profecía usa un paralelismo con matiz distinto en cada miembro. «Justicia» y «rectitud» preservan esa diferencia semántica sin volver opaca la frase en español.
  doctrine_reference: HALOT; parallelism in prophetic diction
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo base de Isaías 9:6 y el audit trail inglés de POB. No se observan cambios de revisión aplicados en la fuente; por tanto, la redacción española conserva la estructura y decisiones principales del inglés, ajustadas a una equivalencia óptima en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del nombre divino, coherente con el criterio del proyecto.
  - «Mesías» no aparece porque este verso, en el texto base y en el audit trail inglés, se formula en lenguaje dinástico davídico sin añadir un título cristológico explícito.
  - «Justicia» y «rectitud» se distinguen deliberadamente para reflejar el paralelismo hebreo.
  - El marcador de nota a se ancla en «Yahvé de los Ejércitos» para ofrecer la alternativa tradicional «de los Ejércitos» en la misma unidad léxica.
