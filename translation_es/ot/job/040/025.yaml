translation:
  language: es
  text: ¿Puedes sacar a Leviatán con un anzuelo[a], o hundir[b] su lengua con una cuerda?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sacar a Leviatán con un gancho».
    reason: lexical_alternative
  - marker: b
    text: O «hacer hundir su lengua con un cordel» o «sujetar su lengua con una cuerda». La imagen hebrea es difícil y puede referirse a someter a la criatura por la boca.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּמְשֹׁךְ
  english_pob_choice: draw out
  chosen_spanish: sacar
  alternatives_spanish:
  - arrastrar
  - jalar
  - sacar fuera
  lexicon: HALOT
  rationale: En este contexto de caza/captura, la idea es extraer o sacar al animal; «sacar» comunica con naturalidad la acción interrogativa sin volverla más mecánica que el hebreo.
- source_word: לִוְיָתָן
  english_pob_choice: Leviathan
  chosen_spanish: Leviatán
  alternatives_spanish:
  - el Leviatán
  lexicon: HALOT
  rationale: Es un nombre/designación propia y se translitera. Se omite el artículo porque el hebreo no lo lleva y el uso castellano puede funcionar de forma nominativa sin él.
- source_word: בְּחַכָּה
  english_pob_choice: with a fishhook
  chosen_spanish: con un anzuelo
  alternatives_spanish:
  - con un gancho
  - con un anzuelo de pesca
  lexicon: HALOT
  rationale: חכה es el útil de pesca, pero en español «anzuelo» es el término más natural y preciso; «gancho» sería más general y menos específico.
- source_word: וּבְחֶבֶל
  english_pob_choice: with a rope
  chosen_spanish: con una cuerda
  alternatives_spanish:
  - con una soga
  - con una cuerda gruesa
  - con una cuerda o soga
  lexicon: HALOT
  rationale: חבל abarca cuerda/cordel/soga. «Cuerda» es la opción clara y suficientemente amplia en español; evita cargar la imagen con una cuerda demasiado pesada que no exige el hebreo.
- source_word: תַּשְׁקִיעַ
  english_pob_choice: press down
  chosen_spanish: hundir
  alternatives_spanish:
  - bajar
  - aplastar
  - hacer bajar
  - presionar hacia abajo
  lexicon: HALOT
  rationale: El hiphil de שׁקע expresa causar que algo descienda o se hunda. En español, con «su lengua», «hundir» conserva el movimiento descendente y mantiene la rareza poética de la imagen sin explicarla en exceso.
- source_word: לְשֹׁנוֹ
  english_pob_choice: his tongue
  chosen_spanish: su lengua
  alternatives_spanish:
  - su lengua
  - la lengua de él
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su lengua», y en español es natural y fiel mantener esa concreción; «boca» sería una interpretación más amplia que el texto no dice.
translation_notes:
  revision_awareness: La versión española sigue el texto hebreo directamente y toma en cuenta la solución inglesa auditada, especialmente la concreción de חכה como instrumento de pesca y de תַּשְׁקִיעַ como una acción de hacer descender o hundir. No se introdujeron cambios textuales ni decisiones doctrinales adicionales; la única variación relevante es la preferencia natural del español por «sacar» y «hundir» en lugar de una calca como «extraer» o «presionar hacia abajo».
  spanish_consistency_notes:
  - Se mantiene «Leviatán» como transliteración estable del nombre/designación.
  - Se conserva el paralelismo interrogativo del hebreo con una sola oración coordinada por «o».
  - «Anzuelo» y «cuerda» reflejan bien el campo semántico de los utensilios de captura sin sobrerinterpretar la técnica.
  - «Su lengua» preserva la literalidad del hebreo y la imagen corporal concreta.
