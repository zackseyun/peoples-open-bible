translation:
  language: es
  text: Durante siete días comerás pan sin levadura[a], y el séptimo día habrá una fiesta[b] para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: la forma del Tetragrámaton יְהוָה; tradicionalmente se vierte “el SEÑOR”.'
    reason: alternative_reading
  - marker: b
    text: 'O: “una festividad para Yahvé”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: For seven days
  chosen_spanish: Durante siete días
  alternatives_spanish:
  - Por siete días
  - Siete días
  lexicon: HALOT
  rationale: La expresión hebrea indica duración; en español, “Durante siete días” comunica con naturalidad el valor durativo sin perder precisión.
- source_word: תֹּאכַל
  english_pob_choice: you shall eat
  chosen_spanish: comerás
  alternatives_spanish:
  - deberás comer
  - has de comer
  lexicon: HALOT
  rationale: El imperfecto 2ms en contexto instructivo/legal expresa mandato o instrucción. “Comerás” conserva ese tono directivo en español moderno sin volver la frase excesivamente enfática.
- source_word: מַצֹּת
  english_pob_choice: unleavened bread
  chosen_spanish: pan sin levadura
  alternatives_spanish:
  - pan ázimo
  - ázimos
  lexicon: HALOT
  rationale: El sustantivo designa el pan sin levadura en el contexto pascual. “Pan sin levadura” es claro y natural; “pan ázimo” sería más técnico, pero menos transparente para lectura pública.
- source_word: וּבַיּוֹם הַשְּׁבִיעִי
  english_pob_choice: and on the seventh day
  chosen_spanish: y el séptimo día
  alternatives_spanish:
  - pero el séptimo día
  - en el séptimo día
  lexicon: HALOT
  rationale: La conjunción simple se conserva con “y”. La frase temporal funciona naturalmente en español sin necesidad de añadir contraste.
- source_word: חַג
  english_pob_choice: a feast
  chosen_spanish: una fiesta
  alternatives_spanish:
  - un festival
  - una celebración
  lexicon: HALOT
  rationale: חַג puede referirse a una festividad/fiesta cultual. “Fiesta” mantiene la amplitud semántica y la naturalidad en español; “festival” sería posible, pero menos bíblico en registro.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: Según la norma terminológica del proyecto, יהוה se vierte “Yahvé” en el texto principal. La preposición ל expresa dedicación o relación, por lo que “para Yahvé” comunica bien una fiesta dedicada a él.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la directriz del proyecto para conservar el nombre del pacto en el texto principal. “Yahvé” evita el reemplazo por un título y mantiene la transparencia hacia el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de חַג לַיהוָה
  english_pob_reading: a feast to Yahweh
  chosen_spanish_reading: una fiesta para Yahvé
  alternative_spanish_readings:
  - una fiesta de Yahvé
  - una fiesta a Yahvé
  rationale: La frase hebrea puede expresar dedicación/relación. “Para Yahvé” conserva la idea de una festividad orientada a él sin forzar una lectura litúrgica más específica que la del hebreo.
  doctrine_reference: HALOT s.v. חַג; לְ + nombre divino
translation_notes:
  revision_awareness: 'El inglés POB mantiene dos decisiones auditadas relevantes: el nombre divino como Yahweh y la posibilidad léxica de traducir חַג como feast/festival. El español sigue la política del proyecto de usar Yahvé en el texto principal y conserva la alternativa semántica de la fiesta en nota. No se detectaron revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se usó “Yahvé” en el texto principal según la terminología española del proyecto, no “el SEÑOR”.
  - “Pan sin levadura” traduce el valor semántico de מַצּוֹת con claridad para lectura pública; no se transliteró.
  - La estructura permanece cercana al hebreo y al inglés auditado, sin añadir elementos interpretativos no sustentados por el מקור.
