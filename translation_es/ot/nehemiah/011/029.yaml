translation:
  language: es
  text: y en En-rimón[a], y en Zora[b], y en Jarmut.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede representarse como «Aín-rimón»; el hebreo admite más de una transliteración convencional del primer elemento del nombre.
    reason: lexical_alternative
  - marker: b
    text: La serie hebrea repite «y en» para marcar asentamientos sucesivos.
    reason: cultural_note
lexical_decisions:
- source_word: וּ/בְ/עֵין רִמּוֹן
  english_pob_choice: and in En-rimmon
  chosen_spanish: y en En-rimón
  alternatives_spanish:
  - y en Aín-rimón
  - y en En Rimón
  lexicon: HALOT
  rationale: Es un nombre de lugar; por eso se translitera en vez de traducirse. Conservo la preposición y la conjunción en español natural ('y en'). 'En-rimón' sigue de cerca la forma inglesa POB y mantiene el valor toponímico del hebreo.
- source_word: וּ/בְ/צָרְעָה
  english_pob_choice: and in Zorah
  chosen_spanish: y en Zora
  alternatives_spanish:
  - y en Zorá
  - y en Zoreá
  lexicon: HALOT
  rationale: גם aquí se trata de un topónimo en una lista de asentamientos. Opto por 'Zora' como forma breve y legible en español, correspondiente al inglés POB 'Zorah', sin añadir interpretación.
- source_word: וּ/בְ/יַרְמוּת
  english_pob_choice: and in Jarmuth
  chosen_spanish: y en Jarmut
  alternatives_spanish:
  - y en Yarmut
  lexicon: HALOT
  rationale: Es otro nombre de lugar; se conserva la transliteración de la forma inglesa POB con adaptación mínima al español. No se traduce ni se glosa, porque el contexto es una enumeración geográfica.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés muestran una lista geográfica sin cambios textuales ni tensiones teológicas. La versión española sigue el mismo contenido con transliteración sobria de topónimos y mantiene la repetición coordinada del hebreo.
  spanish_consistency_notes:
  - Conservo la secuencia coordinada 'y en' para reflejar la lista de localidades.
  - Uso formas toponímicas cortas y publicables, sin expandirlas con explicaciones en el cuerpo del versículo.
  - No se introduce terminología doctrinal, ya que el versículo solo enumera lugares.
