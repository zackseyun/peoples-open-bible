translation:
  language: es
  text: Cuando Abigail llegó a Nabal, vio que él tenía un banquete en su casa, como el banquete de un rey; y el corazón de Nabal estaba alegre, y él estaba muy ebrio. Así que no le dijo nada en absoluto, cosa pequeña ni grande[a], hasta la luz de la mañana[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “cosa pequeña ni grande”, un modismo que significa “nada en absoluto”.'
    reason: lexical_alternative
  - marker: b
    text: 'O “hasta el amanecer”. Hebreo: “hasta la luz de la mañana”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  english_pob_choice: When Abigail came
  chosen_spanish: Cuando Abigail llegó
  alternatives_spanish:
  - Entonces Abigail llegó
  - Y Abigail llegó
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; en español, 'Cuando' enlaza naturalmente la escena con lo que sigue sin perder la secuencia temporal.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí que
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: Conserva el valor deíctico y de escena del hebreo, con una fórmula natural y digna en español bíblico.
- source_word: מִשְׁתֶּה
  english_pob_choice: a feast
  chosen_spanish: un banquete
  alternatives_spanish:
  - una fiesta
  - un festín
  lexicon: HALOT
  rationale: '''Banquete'' comunica bien la comida festiva y el tono de abundancia del contexto; evita simplificar demasiado la escena.'
- source_word: בְּבֵיתוֹ
  english_pob_choice: in his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su hogar
  - en su morada
  lexicon: HALOT
  rationale: Es la equivalencia locativa directa y natural en español.
- source_word: כְּמִשְׁתֵּה הַמֶּלֶךְ
  english_pob_choice: like the feast of a king
  chosen_spanish: como banquete de rey
  alternatives_spanish:
  - como el banquete de un rey
  - como fiesta de rey
  lexicon: HALOT
  rationale: Mantiene la comparación y la sobriedad del hebreo sin añadir determinación innecesaria; 'de rey' refleja el carácter real/fastuoso del simile.
- source_word: לֵב נָבָל טוֹב עָלָיו
  english_pob_choice: Nabal’s heart was merry within him
  chosen_spanish: el corazón de Nabal estaba alegre dentro de él
  alternatives_spanish:
  - Nabal estaba de buen ánimo
  - el corazón de Nabal se alegraba en él
  lexicon: HALOT
  rationale: El hebreo expresa un estado interno del corazón; 'alegre dentro de él' conserva esa imagen mejor que una paráfrasis más general.
- source_word: שִׁכֹּר עַד מְאֹד
  english_pob_choice: he was very drunk
  chosen_spanish: estaba muy ebrio
  alternatives_spanish:
  - estaba muy borracho
  - estaba ebrio en extremo
  lexicon: HALOT
  rationale: '''Ebrio'' es un registro bíblico y digno para el estado de embriaguez intenso, equivalente al énfasis del hebreo.'
- source_word: וְלֹא הִגִּידָה לוֹ
  english_pob_choice: So she told him nothing
  chosen_spanish: Así que no le dijo nada
  alternatives_spanish:
  - y no le informó nada
  - no le comunicó nada
  lexicon: HALOT
  rationale: La negación resultante se expresa con naturalidad en español; 'decir' es el verbo más directo para este contexto narrativo.
- source_word: דָּבָר קָטֹן וְגָדוֹל
  english_pob_choice: nothing at all, small or great
  chosen_spanish: nada en absoluto, pequeño o grande
  alternatives_spanish:
  - nada, chico o grande
  - ninguna cosa, pequeña o grande
  lexicon: HALOT
  rationale: 'Se conserva el merismo hebreo y su fuerza intensiva: no dijo ''ni lo pequeño ni lo grande'', es decir, nada en absoluto.'
- source_word: עַד אוֹר הַבֹּקֶר
  english_pob_choice: until the light of morning
  chosen_spanish: hasta el resplandor de la mañana
  alternatives_spanish:
  - hasta la luz de la mañana
  - hasta que amaneció
  lexicon: HALOT
  rationale: '''Resplandor de la mañana'' mantiene la imaginería de אור sin reducirla a un mero ''amanecer''; conserva la luz como rasgo semántico principal.'
theological_decisions:
- issue: Merismo 'pequeño o grande' como negación total
  english_pob_reading: nothing at all, small or great
  chosen_spanish_reading: nada en absoluto, pequeño o grande
  alternative_spanish_readings:
  - ni pequeño ni grande
  - ninguna cosa, pequeña o grande
  rationale: El hebreo usa un merismo para expresar totalidad de la omisión; la versión principal lo deja visible para no borrar la forma idiomática ni su fuerza enfática.
  doctrine_reference: none
- issue: Imagen del 'corazón' como sede del estado interior
  english_pob_reading: Nabal’s heart was merry within him
  chosen_spanish_reading: el corazón de Nabal estaba alegre dentro de él
  alternative_spanish_readings:
  - Nabal estaba de buen ánimo
  - Nabal se sentía alegre
  rationale: Se mantiene la antropología bíblica del corazón como centro interior, en lugar de sustituirla por una simplificación psicológica.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'Se observó alta concordancia con el control inglés (0.95) y no hubo cambios sustantivos en la revisión más reciente; la redacción española sigue de cerca el trail auditado, con dos decisiones visibles: mantener el merismo hebreo y preservar la imagen de la luz matinal.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se conserva 'banquete' como equivalente de מִשְׁתֶּה en coherencia con el contexto de abundancia.
  - Se mantiene 'ebrio'/'ebria' como registro bíblico-digno para שִׁכֹּר, sin suavizar la intensidad.
  - Las notas al pie están ancladas en el texto español con marcadores únicos y en orden.
