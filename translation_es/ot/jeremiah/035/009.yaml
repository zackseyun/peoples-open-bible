translation:
  language: es
  text: y no para construir casas para habitar en ellas; y no hemos tenido viña, ni campo, ni semilla[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: “y viña y campo y semilla no han sido para nosotros”; la frase hebrea usa una construcción de posesión negativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְבִלְתִּי
  english_pob_choice: and not to
  chosen_spanish: y no para
  alternatives_spanish:
  - y no para que
  - y no a fin de
  lexicon: HALOT
  rationale: La construcción negativa de propósito se expresa con naturalidad en español como 'y no para'. Conserva el valor final sin volverla rígidamente literal.
- source_word: בְּנוֹת
  english_pob_choice: build
  chosen_spanish: construir
  alternatives_spanish:
  - edificar
  - levantar
  lexicon: HALOT
  rationale: El infinitivo de בנה pide un verbo directo. 'Construir' es claro, moderno y fiel.
- source_word: בָּתִּים
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  - viviendas
  lexicon: HALOT
  rationale: '''Casas'' preserva el referente concreto del plural hebreo sin pasar a una interpretación más abstracta como ''hogares''.'
- source_word: לְשִׁבְתֵּנוּ
  english_pob_choice: for us to live in
  chosen_spanish: para habitar en ellas
  alternatives_spanish:
  - para vivir en ellas
  - para nuestro habitar
  lexicon: HALOT
  rationale: 'El infinitivo con sufijo expresa finalidad: casas destinadas a ser habitadas. ''Habitar'' mantiene una cadencia digna y evita una ampliación excesiva.'
- source_word: וְכֶרֶם
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  - una viña
  lexicon: HALOT
  rationale: '''Viña'' es el equivalente natural y clásico para כֶרֶם en español bíblico, conservando el término agrícola concreto.'
- source_word: וְשָׂדֶה
  english_pob_choice: field
  chosen_spanish: campo
  alternatives_spanish:
  - terreno
  - campo de cultivo
  lexicon: HALOT
  rationale: Aunque 'field' puede ser 'campo', aquí la lista de posesiones agrícolas admite este término amplio y elegante; evita una duplicación forzada con 'viña'.
- source_word: וָזֶרַע
  english_pob_choice: seed
  chosen_spanish: semilla
  alternatives_spanish:
  - semilla para siembra
  - simiente
  lexicon: HALOT
  rationale: '''Semilla'' reproduce el sentido básico. Se prefirió esta forma moderna y clara frente a ''simiente'', menos transparente para lectores actuales.'
- source_word: לֹא יִהְיֶה לָּנוּ
  english_pob_choice: have not been ours
  chosen_spanish: han sido nuestros
  alternatives_spanish:
  - no han sido nuestros
  - no nos han pertenecido
  lexicon: HALOT
  rationale: 'El idiomático ''no hay para nosotros'' / ''no ha sido nuestro'' se vierte naturalmente como posesión negada en perfecto: ''han sido nuestros'' con negación en el contexto, para reflejar la condición continua de no posesión. Se evita un calco duro y se conserva la relación de pertenencia implícita.'
theological_decisions:
- issue: Valor del imperfecto hebreo en la cláusula posesiva negativa
  english_pob_reading: have not been ours
  chosen_spanish_reading: han sido nuestros
  alternative_spanish_readings:
  - no han sido nuestros
  - no nos han pertenecido
  rationale: El hebreo expresa una situación de posesión negada en la experiencia del grupo. El español puede reflejar mejor esa continuidad con un perfecto en contexto negativo. No hay afirmación doctrinal especial; la decisión es aspectual y idiomática.
  doctrine_reference: Aspecto verbal / posesión idiomática
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió una formulación más natural para la cláusula posesiva ('have not been ours'). La versión española sigue esa decisión con 'han sido nuestros' en contexto negativo, manteniendo la lista agrícola y la finalidad negativa del primer miembro.
  spanish_consistency_notes:
  - Se mantuvo la secuencia de dos miembros unidos por punto y coma, como en el registro inglés auditado.
  - Se prefirió 'viña' para כֶרֶם y 'campo' para שָׂדֶה, terminología agrícola natural y reconocible en español bíblico.
  - No se introdujo 'Cristo', 'SEÑOR' ni otras sustituciones ajenas al texto.
  - La nota al pie está anclada en el texto con [a], evitando marcadores huérfanos.
