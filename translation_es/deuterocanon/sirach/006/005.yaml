    issue: '''labios graciosos'' es ambiguo y poco idiomático en español bíblico neutral'
    rationale: En español contemporáneo 'gracioso' suele significar 'cómico' o 'chistoso'. Eso distorsiona el campo semántico de חֵן ('gracia', favor, amabilidad) y debilita la dignidad del proverbio.
  - severity: medium
    issue: La nota [a] no conserva la razón textual principal documentada en el POB inglés
    rationale: El expediente inglés marca que el hebreo 'multiplies one who loves' es difícil y que se sigue el griego 'his friends' por claridad. La nota española actual solo comenta 'paladar/garganta', pero no la decisión textual más importante del versículo.
  - severity: low
    issue: La nota [b] mezcla inglés dentro del español y queda estilísticamente torpe
    rationale: Incluye la frase 'lips of grace' en inglés, innecesaria en una edición española. Conviene expresarla enteramente en español y conectar mejor con la elección del texto principal.
  revised_spanish_text: Un paladar dulce[a] multiplica amigos, y labios amables[b] preguntan por la paz.
