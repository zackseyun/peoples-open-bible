translation:
  language: es
  text: Y cuando oyeron la voz de en medio de[a] la oscuridad, mientras el monte ardía en fuego, se acercaron a mí—todos los jefes de sus tribus y sus ancianos—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sonido»; el hebreo qol puede referirse tanto a voz como a sonido, pero aquí «voz» encaja mejor con el contexto de Dios hablando desde la oscuridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּשָׁמְעֲכֶם
  english_pob_choice: you heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - cuando oyeron
  - cuando escucharon
  lexicon: HALOT
  rationale: El hebreo introduce una circunstancia temporal con כְּ + verbo de oír; en español, la coordinación natural es «Y cuando oyeron». Mantiene el valor narrativo sin volverla rígidamente literal.
- source_word: הַקּוֹל
  english_pob_choice: the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - el sonido
  lexicon: HALOT
  rationale: Aunque קוֹל puede ser «voz» o «sonido», el contexto de la revelación divina favorece «voz», preservando el matiz personal del habla de Dios que también escogió la POB inglesa.
- source_word: מִתּוֹךְ הַחֹשֶׁךְ
  english_pob_choice: from the midst of the darkness
  chosen_spanish: desde en medio de la oscuridad
  alternatives_spanish:
  - desde la oscuridad
  - de en medio de la oscuridad
  lexicon: HALOT
  rationale: Se conserva la imagen de תּוֹךְ como «medio/midst». En español, «desde en medio de» reproduce la relación espacial sin sonar demasiado forzada; «oscuridad» expresa naturalmente הַחֹשֶׁךְ.
- source_word: וְהָהָר בֹּעֵר בָּאֵשׁ
  english_pob_choice: while the mountain was burning with fire
  chosen_spanish: mientras el monte ardía en fuego
  alternatives_spanish:
  - mientras el monte estaba ardiendo con fuego
  - y el monte ardía en fuego
  lexicon: HALOT
  rationale: La cláusula participial describe una circunstancia concurrente. «Mientras el monte ardía en fuego» comunica el cuadro con naturalidad en español y conserva el aspecto continuo del participio.
- source_word: וַתִּקְרְבוּן אֵלַי
  english_pob_choice: you came near to me
  chosen_spanish: se acercaron a mí
  alternatives_spanish:
  - vinieron a mí
  - se aproximaron a mí
  lexicon: HALOT
  rationale: קרב se rinde de forma idiomática como «se acercaron». En este contexto, la referencia a los representantes del pueblo permite el sujeto implícito plural en español, como en la construcción inglesa de la POB.
- source_word: כָּל רָאשֵׁי שִׁבְטֵיכֶם
  english_pob_choice: all the heads of your tribes
  chosen_spanish: todos los cabezas de sus tribus
  alternatives_spanish:
  - todos los jefes de sus tribus
  - todos los principales de sus tribus
  lexicon: HALOT
  rationale: רָאשֵׁי significa literalmente «cabezas» y la POB preserva esa metáfora. En español, «cabezas» es comprensible aunque algo marcado; se conserva para no perder la imagen hebrea de liderazgo tribal.
- source_word: וְזִקְנֵיכֶם
  english_pob_choice: and your elders
  chosen_spanish: y sus ancianos
  alternatives_spanish:
  - y sus mayores
  - y los ancianos de ustedes
  lexicon: HALOT
  rationale: זִקְנֵי refiere a los ancianos reconocidos de la comunidad. «Ancianos» es el término más directo y eclesialmente inteligible en español; se usa «sus» en coordinación con «tribus» para mantener coherencia referencial en la frase.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se identifican cambios necesarios respecto del texto fuente y la solución inglesa auditada. La versión española sigue la misma lectura de ‘voice’ y mantiene la imagen de la voz divina procedente de la oscuridad.'
  spanish_consistency_notes:
  - Se mantuvo la metáfora de «cabezas» para רָאשֵׁי, en continuidad con la POB inglesa.
  - Se tradujo יהוה no aparece en este versículo; no aplica la convención de «Yahvé».
  - Se mantuvo la distinción entre la voz y el fuego como elementos concurrentes del escenario revelatorio.
  - La puntuación con raya larga reproduce la pausa enfática del original inglés y la estructura narrativa hebrea.
