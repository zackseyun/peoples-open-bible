    rationale: חֲשֹׂךְ expresa retener/refrenar/impedir. En español bíblico natural, «aparta a tu siervo de…» o «refrena a tu siervo de…» representa mejor la idea de mantenerlo apartado de tales pecados.
  - severity: medium
    issue: «Quedaré limpio» puede inclinarse demasiado hacia imagen ritual frente al sentido de ser libre de culpa.
    rationale: El POB inglés eligió «be cleared» para destacar liberación de culpabilidad. En español, «quedaré libre de culpa» preserva esa amplitud mejor que «quedaré limpio», aunque esta última no sea incorrecta.
