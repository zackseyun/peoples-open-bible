translation:
  language: es
  text: Canten a Yahvé[a] con acción de gracias; toquen alabanzas a nuestro Dios con la lira[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Respondan a Yahvé con acción de gracias»; el verbo hebreo puede significar «responder», pero aquí probablemente expresa un canto responsivo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con un arpa»; כִּנּוֹר designa un instrumento de cuerdas, más precisamente una lira.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֱנוּ
  english_pob_choice: Sing
  chosen_spanish: Canten
  alternatives_spanish:
  - Respondan
  - Contesten
  - Canten en respuesta
  lexicon: HALOT
  rationale: En este contexto poético y de culto, ענה puede significar responder, pero en paralelo con זמר y con los instrumentos de alabanza transmite canto responsivo. En español, 'Canten' comunica esa función litúrgica con naturalidad; 'Respondan' sonaría demasiado prosaico y puede perder el matiz musical.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  - a Yahvé
  lexicon: HALOT
  rationale: La meta terminológica del proyecto para יְהוָה es 'Yahvé'. El dativo de dirección se expresa naturalmente con 'a' en español. Se evita el sustituto litúrgico 'SEÑOR' porque borraría el nombre divino que el texto hebreo usa explícitamente.
- source_word: בְּתוֹדָה
  english_pob_choice: with thanksgiving
  chosen_spanish: con acción de gracias
  alternatives_spanish:
  - con agradecimiento
  - en acción de gracias
  - con gratitud
  lexicon: HALOT
  rationale: תוֹדָה refiere agradecimiento/acción de gracias y a veces confesión de gratitud. 'Con acción de gracias' es la fórmula bíblica más clara en español y conserva el sentido de acompañamiento instrumental del prefijo ב.
- source_word: זַמְּרוּ
  english_pob_choice: make melody
  chosen_spanish: hagan melodía
  alternatives_spanish:
  - canten alabanzas
  - toquen y canten
  - hagan música
  lexicon: HALOT
  rationale: זמר implica hacer música o cantar alabanzas, a menudo con acompañamiento. Como el verso ya usa un primer imperativo de canto, 'hagan melodía' evita mera repetición y mantiene el matiz musical sin restringirlo solo a 'cantar'.
- source_word: לֵאלֹהֵינוּ
  english_pob_choice: to our God
  chosen_spanish: a nuestro Dios
  alternatives_spanish:
  - para nuestro Dios
  - a nuestro Dios
  lexicon: HALOT
  rationale: El ל indica el destinatario de la alabanza. 'Nuestro Dios' conserva la posesión comunitaria y el tono de pacto. En español, 'a nuestro Dios' refleja de forma directa la dirección del verbo.
- source_word: בְכִנּוֹר
  english_pob_choice: with the lyre
  chosen_spanish: con la lira
  alternatives_spanish:
  - con el arpa
  - con la cítara
  - con la lira
  lexicon: HALOT
  rationale: כִּנּוֹר es un instrumento de cuerdas; 'lira' es más precisa que 'arpa' y funciona bien en español bíblico contemporáneo. Se conserva la precisión lexical sin perder legibilidad.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El hebreo presenta el Tetragrámaton directamente. La política del proyecto para el español es usar 'Yahvé' como forma principal, evitando la máscara 'SEÑOR'. Esto preserva la transparencia textual y mantiene el nombre del pacto visible en la traducción.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de ענה en contexto de adoración
  english_pob_reading: Sing / Answer / Respond
  chosen_spanish_reading: Canten
  alternative_spanish_readings:
  - Respondan
  - Canten en respuesta
  rationale: 'No se elimina la tensión lexical: el verbo puede significar responder/contestar, pero el contexto de alabanza musical favorece el canto responsivo. ''Canten'' comunica el sentido idiomático que el audit trail ya privilegia.'
  doctrine_reference: HALOT; English POB lexical note on ענה
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente con resultado sin cambios; el control cruzado informó alta concordancia y acuerdo total. No se requieren correcciones textuales adicionales, y la redacción española sigue de cerca las decisiones léxicas auditadas del POB en inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma coherente con la política española del proyecto para יְהוָה.
  - Se usa 'acción de gracias' para תוֹדָה, en paralelo con el inglés auditado.
  - '''Lira'' se conserva como término técnico, con nota alternativa a ''arpa'' para reflejar la ambigüedad terminológica del instrumento.'
  - La construcción verbal en plural imperativo ('Canten', 'hagan') refleja el hebreo plural exhortativo.
  - No se introduce 'Cristo', 'SEÑOR' ni paráfrasis devocionales ajenas al hebreo del versículo.
