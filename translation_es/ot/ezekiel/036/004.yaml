review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo y la mayoría de las decisiones léxicas del POB: ''Por tanto'', ''montes de Israel'', ''oigan la palabra'', la fórmula profética ''Así dice'', la serie topográfica, ''ruinas desoladas'', ''ciudades abandonadas'', ''botín'' y ''remanente'' están bien encaminados. También respeta correctamente la política del proyecto al traducir אֲדֹנָי יְהוִה como ''Señor Yahvé''. Sin embargo, hay dos desajustes importantes con la evidencia fuente y el rastro de auditoría inglés: (1) אֲפִיקִים se documentó en inglés como ''ravines'', con nota alternativa para ''watercourses/channels''; el español principal puso ''cauces'', que corresponde más bien a una alternativa de nota que a la elección principal. (2) La nota [b] omite ''vecinas/circundantes'', aunque el texto principal sí incluye ese matiz para מִסָּבִיב; la nota debe reflejar con precisión la alternativa del sintagma completo en español.'
  spanish_quality_summary: 'El español es claro, moderno y de registro bíblico digno. ''Objeto de burla'' es natural, y la sintaxis general fluye bien. No obstante, ''Señor Yahvé'' suena más natural en español sin artículo dentro de esta fórmula titular repetida: ''oigan la palabra de Señor Yahvé. Así dice Señor Yahvé...'' pero por uso español estándar bíblico, la forma más natural y estable es ''oigan la palabra del Señor Yahvé. Así dice el Señor Yahvé...''; por tanto eso puede mantenerse. La reparación necesaria es principalmente léxica y de nota, no de estilo general. Para אֲפִיקִים, ''barrancos'' encaja mejor con el sentido topográfico del contexto que ''cauces'', y evita desplazar al texto principal una opción que el inglés relegó a nota.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> ''Yahvé'' está correctamente preservado; no hay problemas con términos doctrinales mayores. La principal falta de alineación es que el inglés auditado eligió el equivalente principal de אֲפִיקִים como accidente geográfico terrestre (''ravines''), mientras que el español usó una opción hidrológica (''cauces'') como texto principal. Además, la nota alternativa sobre שְׁאֵרִית הַגּוֹיִם debería conservar el matiz de ''naciones vecinas/circundantes''.'
  issues:
  - severity: medium
    issue: El texto principal traduce אֲפִיקִים como 'cauces' en lugar de un equivalente topográfico como 'barrancos'.
    rationale: El contexto enumera rasgos del terreno ('montes', 'colinas', 'valles'), y el POB inglés adoptó 'ravines' como lectura principal, dejando 'watercourses/channels' como alternativas en nota. 'Cauces' desplaza al texto principal una alternativa menos preferida y enfatiza más la hidrología que la topografía.
  - severity: low
    issue: La nota [b] no refleja completamente el sintagma alternativo al omitir 'vecinas/circundantes'.
    rationale: Si el texto principal dice 'las naciones vecinas' para מִסָּבִיב, la nota alternativa correspondiente a 'el resto de las naciones' debe mantener el mismo marco contextual, por ejemplo 'el resto de las naciones vecinas' o reformular toda la frase de manera exacta.
  - severity: low
    issue: 'Hay un error en las decisiones léxicas internas: alternativa ''a los ravines'' no está en español.'
    rationale: No afecta directamente el texto bíblico mostrado, pero revela descuido en la documentación léxica del borrador. No requiere adjudicación compleja, solo corrección editorial.
  revised_spanish_text: 'Por tanto, montes de Israel, oigan la palabra del Señor Yahvé. Así dice el Señor Yahvé a los montes y a las colinas, a los barrancos[a] y a los valles, a las ruinas desoladas y a las ciudades abandonadas, que han llegado a ser botín y objeto de burla para el remanente[b] de las naciones vecinas:'
  revised_footnotes:
  - marker: a
    text: O 'cauces de agua' o 'canales' para 'barrancos' (אֲפִיקִים).
    reason: lexical_alternative
  - marker: b
    text: O 'el resto de las naciones vecinas' para 'el remanente de las naciones vecinas'.
    reason: lexical_alternative
  revision_rationale: Se cambió 'cauces' por 'barrancos' para alinear el texto principal con la elección léxica principal del POB inglés para אֲפִיקִים en esta lista topográfica, conservando 'cauces de agua/canales' como alternativas de nota. También se ajustó la nota [b] para que refleje con precisión el sintagma completo incluyendo el valor de מִסָּבִיב ('vecinas'). No se requiere revisión doctrinal adicional; son reparaciones editoriales y léxicas menores.
