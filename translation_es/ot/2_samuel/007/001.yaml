translation:
  language: es
  text: Cuando el rey habitaba en su casa[a], y Yahvé le había dado descanso de todos sus enemigos de alrededor,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su palacio». El hebreo dice literalmente «en su casa»; se conserva «casa» aquí también para anticipar el juego de palabras posterior en el capítulo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּי
  english_pob_choice: Now when
  chosen_spanish: Entonces sucedió que, cuando
  alternatives_spanish:
  - Y aconteció que, cuando
  - Y pasó que, cuando
  lexicon: HALOT
  rationale: La fórmula narrativa introduce una nueva escena. «Entonces sucedió que, cuando» conserva la transición temporal y el tono narrativo sin sonar arcaico en español.
- source_word: יָשַׁב
  english_pob_choice: was living
  chosen_spanish: habitaba
  alternatives_spanish:
  - vivía
  - residía
  - estaba viviendo
  lexicon: HALOT
  rationale: En este contexto el verbo expresa residencia estable, no el acto físico de sentarse. «Habitaba» comunica una permanencia asentada y mantiene mejor el registro bíblico.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Se conserva el título definido del hebreo. El referente es David, pero el texto usa «el rey» y no el nombre propio.
- source_word: בְּבֵיתוֹ
  english_pob_choice: in his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su palacio
  - en su hogar
  lexicon: HALOT
  rationale: «Casa» sigue de cerca el hebreo בַּיִת y preserva el juego de palabras con «casa» en el capítulo; «palacio» sería interpretativo.
- source_word: וַיהוָה
  english_pob_choice: and Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: DOCTRINE.md contested terms
  rationale: Se mantiene el nombre divino explícito conforme a la terminología POB en español. Aquí no se usa máscara reverencial porque el hebreo presenta el Tetragrámaton directamente.
- source_word: הֵנִיחַ לוֹ
  english_pob_choice: had given him rest
  chosen_spanish: le había dado descanso
  alternatives_spanish:
  - le había hecho descansar
  - le había concedido reposo
  lexicon: HALOT
  rationale: El causativo de נוח expresa el acto de conceder descanso o alivio. «Le había dado descanso» es natural, preciso y conserva el sentido de cesación de conflicto.
- source_word: מִסָּבִיב
  english_pob_choice: on every side
  chosen_spanish: por todos lados
  alternatives_spanish:
  - en derredor
  - a su alrededor
  lexicon: HALOT
  rationale: La expresión describe seguridad circundante. «Por todos lados» transmite la idea de protección total con naturalidad en español.
- source_word: מִכָּל אֹיְבָיו
  english_pob_choice: from all his enemies
  chosen_spanish: de todos sus enemigos
  alternatives_spanish:
  - de todos los enemigos que lo rodeaban
  - de todos sus adversarios
  lexicon: HALOT
  rationale: 'Se mantiene la relación de origen/causa del descanso: proviene de la derrota o contención de los enemigos. «Enemigos» conserva la fuerza lexical del hebreo.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: El texto hebreo usa el Nombre propio, no un título genérico. En español se conserva la forma auditivamente reconocible y estándar del proyecto, «Yahvé», para no ocultar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Campo semántico de בַּיִת en un contexto real
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - palacio
  - residencia real
  rationale: Aunque el contexto es real, el hebreo dice literalmente «casa». Se preserva esa elección para mantener la textura verbal y la anticipación del motivo de la «casa» en el capítulo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor de הֵנִיחַ como acción concedida por Yahvé
  english_pob_reading: had given him rest
  chosen_spanish_reading: le había dado descanso
  alternative_spanish_readings:
  - le había concedido reposo
  - le había hecho descansar
  rationale: La frase no implica solo tranquilidad subjetiva, sino una situación objetiva de cese de hostilidad. «Descanso» expresa bien ese estado sin perder el componente causativo.
  doctrine_reference: HALOT / verbal causation in narrative context
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete fuente; el pasaje fue confirmado como estable en la última pasada de revisión y en la comprobación cruzada, con acuerdo alto y sin observaciones pendientes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Nombre divino, conforme al estándar del proyecto en español.
  - Se conserva «casa» y no «palacio» para respetar el lexema hebreo y el juego temático del capítulo.
  - «Descanso» traduce el causativo de נוח de manera idiomática y sin suavizar la idea de cese de enemigos.
  - El tono es narrativo, sobrio y publicable, sin arcaísmos innecesarios.
