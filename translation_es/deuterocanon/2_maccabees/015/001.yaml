translation:
  language: es
  text: Pero Nicanor, habiéndose enterado de que los que estaban con Judas se hallaban en las regiones de Samaria, resolvió atacarlos en el día de reposo[a] con completa seguridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, ‘el sábado’; el griego aquí dice literalmente ‘el día de reposo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταλαβών
  english_pob_choice: having learned
  chosen_spanish: habiendo sabido
  alternatives_spanish:
  - habiendo recibido noticia
  - habiéndose enterado
  lexicon: LSJ
  rationale: En este participio con la cláusula siguiente, el verbo expresa que Nicanor se informó o llegó a saber la noticia; no indica ‘tomar consigo’. ‘Habiendo sabido’ conserva el matiz de conocimiento adquirido y suena natural en español bíblico moderno.
- source_word: τοὺς περὶ τὸν Ἰούδαν ὄντας
  english_pob_choice: those with Judas
  chosen_spanish: los que estaban con Judas
  alternatives_spanish:
  - los hombres alrededor de Judas
  - los acompañantes de Judas
  lexicon: LSJ
  rationale: La expresión griega designa al grupo asociado con Judas. ‘Los que estaban con Judas’ mantiene la relación personal sin volverla excesivamente interpretativa.
- source_word: ἐν τοῖς κατὰ Σαμάρειαν τόποις
  english_pob_choice: in the regions of Samaria
  chosen_spanish: en las regiones de Samaria
  alternatives_spanish:
  - en los lugares de Samaria
  - en los distritos de Samaria
  lexicon: LSJ
  rationale: κατὰ con topónimo señala la zona vinculada con Samaria. ‘Regiones’ comunica bien ese valor geográfico sin añadir una precisión administrativa que el griego no exige.
- source_word: ἐβουλεύσατο
  english_pob_choice: he resolved
  chosen_spanish: resolvió
  alternatives_spanish:
  - decidió
  - se propuso
  - tomó la resolución de
  lexicon: LSJ
  rationale: El aoristo medio expresa deliberación que desemboca en una decisión firme. ‘Resolvió’ reproduce esa fuerza de propósito de manera breve y fiel.
- source_word: τῇ τῆς καταπαύσεως ἡμέρᾳ
  english_pob_choice: on the day of rest
  chosen_spanish: el día de descanso
  alternatives_spanish:
  - el día de reposo
  - el sábado
  lexicon: LSJ
  rationale: El griego dice literalmente ‘el día de la cesación/descanso’ y no usa aquí la forma habitual σάββατον. ‘Día de descanso’ conserva el sentido literal, dejando la identificación con el sábado para la nota.
- source_word: μετὰ πάσης ἀσφαλείας
  english_pob_choice: with complete security
  chosen_spanish: con completa seguridad
  alternatives_spanish:
  - sin riesgo alguno
  - con plena seguridad
  lexicon: LSJ
  rationale: La frase describe la expectativa de actuar sin peligro para sí mismo. ‘Con completa seguridad’ refleja esa idea de total ausencia de riesgo de forma clara y natural.
- source_word: ἐπιβαλεῖν
  english_pob_choice: to attack
  chosen_spanish: atacarlos
  alternatives_spanish:
  - caer sobre ellos
  - asaltarlos
  - lanzarse contra ellos
  lexicon: LSJ
  rationale: En contexto militar, el verbo significa acometer o atacar. ‘Atacarlos’ es directo y corresponde bien al valor narrativo del pasaje.
theological_decisions:
- issue: Identificación del ‘día de descanso’
  english_pob_reading: The main text keeps the literal phrase 'the day of rest,' with a footnote noting the likely sense 'Sabbath day.'
  chosen_spanish_reading: El texto principal conserva ‘el día de descanso’, con nota que aclara la probable identificación con el sábado.
  alternative_spanish_readings:
  - el sábado
  - el día de reposo
  rationale: El griego no emplea el término habitual para ‘sábado’, así que la traducción principal evita resolver de antemano una equivalencia más específica que el original no formula explícitamente. La nota preserva la tensión y la posible referencia tradicional.
  doctrine_reference: 'DOCTRINE.md: mantener la tensión textual cuando el original es transparente pero no idéntico a la tradición; prioridad del idioma fuente sobre la armonización tradicional.'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente al reflejar más directamente el participio μεταλαβών con ‘habiendo sabido’, en lugar de una construcción temporal más libre. También mantiene la decisión de traducir τῇ τῆς καταπαύσεως ἡμέρᾳ de manera literal y dejar la identificación con el sábado en nota.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ no aplica en este versículo.
  - Se prefiere ‘día de descanso’ como traducción literal consistente con el patrón POB para καταπαύσεως.
  - ‘Atacarlos’ conserva el tono militar del contexto sin sobrerregularizar con un tecnicismo.
  - La puntuación y el orden están ajustados a un español bíblico moderno, no a una calca inglesa.
