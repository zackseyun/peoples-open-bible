translation:
  language: es
  text: Yahvé es mi peñasco y mi fortaleza y mi libertador[a], mi Dios, mi roca, en quien me refugio[b], mi escudo y el cuerno de mi salvación[c], mi baluarte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mi roca' para סַלְעִי. El hebreo usa dos términos relacionados pero distintos aquí, סֶלַע y צוּר.
    reason: lexical_alternative
  - marker: b
    text: O 'en él me refugio'.
    reason: lexical_alternative
  - marker: c
    text: '''Cuerno'' es una metáfora de fuerza y de poder salvador victorioso.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton directamente; en español se conserva el nombre divino como 'Yahvé', de acuerdo con la decisión doctrinal del proyecto y sin sustituirlo por un título.
- source_word: סַלְעִי
  english_pob_choice: my crag
  chosen_spanish: mi peñasco
  alternatives_spanish:
  - mi roca
  - mi risco
  lexicon: HALOT
  rationale: סֶלַע designa un peñasco o risco rocoso. 'Peñasco' mantiene la imagen concreta y diferencia este término de צוּרִי, que sigue después como 'mi roca'.
- source_word: מְצוּדָתִי
  english_pob_choice: my fortress
  chosen_spanish: mi fortaleza
  alternatives_spanish:
  - mi fortín
  - mi refugio fortificado
  lexicon: HALOT
  rationale: El sustantivo apunta a un lugar fortificado de protección. 'Fortaleza' reproduce bien el campo semántico militar y es natural en español.
- source_word: מְפַלְטִי
  english_pob_choice: my deliverer
  chosen_spanish: mi libertador
  alternatives_spanish:
  - mi rescatador
  - el que me libra
  lexicon: HALOT
  rationale: 'El participio funciona como sustantivo: el que causa escape o rescate. ''Libertador'' conserva la fuerza salvadora y suena solemne en español bíblico.'
- source_word: אֵלִי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios poderoso
  lexicon: HALOT
  rationale: Aquí אֵל es la designación divina común con sufijo posesivo. 'Mi Dios' es la equivalencia directa y más clara.
- source_word: צוּרִי
  english_pob_choice: my rock
  chosen_spanish: mi roca
  alternatives_spanish:
  - mi peña
  - mi peñón
  lexicon: HALOT
  rationale: צוּר es la metáfora de una roca estable y protectora. Se traduce como 'mi roca' para mantener la imagen y diferenciarla de 'peñasco' en la primera cola.
- source_word: אֶחֱסֶה בּוֹ
  english_pob_choice: in whom I take refuge
  chosen_spanish: en quien me refugio
  alternatives_spanish:
  - en quien busco refugio
  - en quien hallo refugio
  lexicon: HALOT
  rationale: חסה expresa refugiarse bajo protección. 'En quien me refugio' conserva el sentido relacional y la imagen de amparo; en español resulta natural y fiel.
- source_word: מָגִנִּי
  english_pob_choice: my shield
  chosen_spanish: mi escudo
  alternatives_spanish:
  - mi defensa
  lexicon: HALOT
  rationale: Metáfora militar directa. 'Escudo' es la correspondencia usual y clara en español.
- source_word: קֶרֶן יִשְׁעִי
  english_pob_choice: the horn of my salvation
  chosen_spanish: el cuerno de mi salvación
  alternatives_spanish:
  - el cuerno de mi liberación
  - el cuerno de mi rescate
  lexicon: HALOT
  rationale: Se conserva la metáfora de 'cuerno' por su fuerza y poder victorioso, como en el hebreo. 'Salvación' mantiene el sustantivo del texto y la fórmula bíblica tradicional sin borrar la imagen.
- source_word: מִשְׂגַּבִּי
  english_pob_choice: my stronghold
  chosen_spanish: mi baluarte
  alternatives_spanish:
  - mi refugio elevado
  - mi fortaleza alta
  lexicon: HALOT
  rationale: El término denota una altura o lugar inaccesible de seguridad. 'Baluarte' comunica protección firme y permite distinguir este cierre de 'fortaleza' usado antes.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre propio del pacto en vez de una sustitución por título. 'Yahvé' sigue la política del proyecto y hace visible el Tetragrámaton del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Conservación de la cadena de metáforas protectoras
  english_pob_reading: Different English terms are used for סלע, צור, מצודה, and משגב
  chosen_spanish_reading: Se distinguen peñasco, fortaleza, roca y baluarte
  alternative_spanish_readings:
  - Repetir 'roca' o 'fortaleza'
  - Uniformar como 'refugio'
  rationale: El verso acumula imágenes distintas de protección. Mantenerlas diferenciadas en español respeta la textura poética y evita aplanar la variedad semántica del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (Consistency of key terms, or documented exception)'
- issue: La metáfora del 'cuerno'
  english_pob_reading: '''Horn'' is a metaphor for strength and victorious saving power.'
  chosen_spanish_reading: '''Cuerno'' se conserva como metáfora de poder victorioso y salvación'
  alternative_spanish_readings:
  - Parafrasear como 'poder'
  - Traducir como 'fuerza'
  rationale: No se explica ni se sustituye la imagen, porque el hebreo usa una metáfora convencional de fuerza exaltada. 'Cuerno' permanece transparente para el lector y fiel al original.
  doctrine_reference: Psalm 18:3 lexical/cultural metaphor
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente marcada como sin cambios y en alto acuerdo. Se preserva la distinción léxica de las imágenes de refugio, se mantiene Yahvé para el Tetragrámaton y se conserva la metáfora de 'cuerno' sin suavizarla.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente con la política del proyecto para יְהוָה.
  - Se diferenciaron 'peñasco', 'roca', 'fortaleza' y 'baluarte' para no fundir términos hebreos distintos.
  - '''me refugio'' refleja el valor reflexivo de חסה y queda como alternativa en nota.'
  - Se evitó 'SEÑOR' para no ocultar el nombre divino del texto fuente.
