translation:
  language: es
  text: Al que hizo las grandes luminarias,[a] porque su amor fiel[b] perdura para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'luces'. El hebreo se refiere a los grandes portadores celestes de luz.
    reason: lexical_alternative
  - marker: b
    text: O 'su misericordia perdura para siempre'. El hebreo חֶסֶד incluye el sentido de amor leal y duradero; también puede expresarse como fidelidad constante.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֹשֵׂה
  english_pob_choice: To him who made
  chosen_spanish: Al que hizo
  alternatives_spanish:
  - Al que hace
  - Al que está haciendo
  - Al que hizo
  lexicon: HALOT
  rationale: El prefijo לְ en esta fórmula litánica funciona como dativo de dirección/relación, de modo que en español resulta natural 'al que...'. El participio עֹשֵׂה, aunque formalmente puede ser presente, aquí sigue la serie de actos creados ya enumerados en el salmo; por eso 'hizo' conserva el valor retrospectivo que el POB inglés decidió expresar con 'made'.
- source_word: אוֹרִים
  english_pob_choice: lights
  chosen_spanish: luminarias
  alternatives_spanish:
  - luces
  - astros
  - luminares
  lexicon: HALOT
  rationale: El hebreo apunta a portadores de luz celestes, no solo a 'luces' abstractas. 'Luminarias' preserva mejor la referencia a cuerpos celestes de Génesis 1 y mantiene una dignidad estilística adecuada en español.
- source_word: גְּדֹלִים
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - grandes
  - mayores
  - enormes
  lexicon: HALOT
  rationale: El adjetivo significa simplemente 'grandes'. 'Grandes' es la equivalencia más directa y natural en español, sin introducir la comparación explícita de 'mayores' ni la exageración de 'enormes'.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: HALOT
  rationale: Aquí introduce la razón litúrgica del elogio. 'Porque' comunica bien el valor explicativo en español; aunque el inglés POB usa 'for' para conservar el tono de la fórmula, 'porque' es la opción más clara y fluida en esta oración.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por los siglos
  - para siempre
  lexicon: HALOT
  rationale: La raíz expresa duración perpetua. En español, el verbo de 'perdura' o 'permanece' suele estar implícito por la fórmula; por eso 'para siempre' mantiene el refrán sin forzar una verbalización extra que el hebreo no exige aquí.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su amor constante
  - su amor fiel
  - su misericordia
  lexicon: HALOT
  rationale: 'חֶסֶד es un término de amplio campo semántico: amor leal, bondad pactal, misericordia. En el marco de este refrán poético, ''misericordia'' es una opción española tradicional y reverente; sin embargo, se reconoce que no agota la dimensión de lealtad perseverante destacada por el POB inglés.'
theological_decisions:
- issue: Cómo rendir חֶסֶד en el refrán repetido
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: su misericordia
  alternative_spanish_readings:
  - su amor constante
  - su amor fiel
  - su misericordia
  - su fidelidad de pacto
  rationale: El POB inglés preserva la amplitud de חֶסֶד con 'steadfast love', evitando reducirlo solo a emoción o solo a lenguaje jurídico. En español, 'misericordia' es litúrgicamente reconocible y encaja con el tono del salmo, pero se mantiene la nota de alternativa para no borrar el trasfondo de amor leal y persistente.
  doctrine_reference: Translation philosophy §§5–6
translation_notes:
  revision_awareness: 'El pasaje coincide de cerca con el control inglés revisado: no hubo cambios aplicados en la última pasada, y el criterio general fue mantener la fórmula litánica breve y estable. La presente versión española sigue esa estabilidad, pero ajusta la elección de חֶסֶד a una opción española más tradicional, señalando la alternativa semántica para no perder la tensión lexical.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo breve propio del Salmo 136.
  - '''Al que'' conserva el tono responsorial y evita una paraphrasis más pesada.'
  - '''Luminarias'' distingue mejor los objetos celestes de una simple ''luces''.'
  - La nota de pie compensa que 'misericordia' no agota el valor de חֶסֶד.
  - Se evita capitalización innecesaria en un verso breve de alabanza.
