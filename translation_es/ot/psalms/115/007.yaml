translation:
  language: es
  text: Tienen manos[a], pero no pueden sentir; tienen pies, pero no pueden caminar; no hacen ningún sonido[b] en sus gargantas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tienen manos, pero no pueden tocar ... tienen pies, pero no pueden caminar».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no murmuran en sus gargantas»; el verbo hebreo puede referirse a una vocalización baja o a murmullo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְדֵיהֶם
  english_pob_choice: They have hands
  chosen_spanish: Tienen manos
  alternatives_spanish:
  - Sus manos
  - Tienen sus manos
  lexicon: HALOT
  rationale: El hebreo presenta un sintagma nominal posesivo dentro de una cláusula elíptica; en español, «Tienen manos» conserva la parataxis poética y expresa con naturalidad la posesión implícita sin volverlo demasiado pesado.
- source_word: יְמִישׁוּן
  english_pob_choice: cannot feel
  chosen_spanish: no pueden sentir
  alternatives_spanish:
  - no pueden tocar
  - no pueden palpar
  - no tocan
  lexicon: HALOT
  rationale: El verbo puede abarcar la acción manual de tocar o sentir. «No pueden sentir» transmite mejor en español la ironía de manos presentes pero inoperantes, y conserva el matiz de incapacidad, como en la lectura inglesa auditada.
- source_word: רַגְלֵיהֶם
  english_pob_choice: feet
  chosen_spanish: pies
  alternatives_spanish:
  - sus pies
  lexicon: HALOT
  rationale: El paralelo poético permite omitir el posesivo explícito en español. «Pies» mantiene la concisión y el equilibrio del verso.
- source_word: יְהַלֵּכוּ
  english_pob_choice: cannot walk
  chosen_spanish: no pueden caminar
  alternatives_spanish:
  - no caminan
  lexicon: HALOT
  rationale: Aunque el hebreo está formulado como negación verbal, el contexto de incapacidad idolátrica favorece una traducción de posibilidad/aptitud. «No pueden caminar» reproduce esa fuerza de imposibilidad en un español natural.
- source_word: יֶהְגּוּ
  english_pob_choice: do not make a sound
  chosen_spanish: no emiten sonido
  alternatives_spanish:
  - no murmuran
  - no hablan
  - no producen sonido
  lexicon: HALOT
  rationale: הגה puede referirse a vocalización baja, murmullo o sonido. Dado que el contexto menciona la garganta y la burla a los ídolos, «no emiten sonido» recoge la idea de ausencia de voz sin exagerar hacia el habla articulada.
- source_word: בִּגְרוֹנָם
  english_pob_choice: in their throat
  chosen_spanish: en su garganta
  alternatives_spanish:
  - de su garganta
  - en sus gargantas
  lexicon: HALOT
  rationale: «En su garganta» conserva la imagen corporal del hebreo. El singular posesivo español puede funcionar de forma genérica para el plural colectivo de los ídolos, aunque también podría usarse el plural si se privilegiara una concordancia más explícita.
theological_decisions:
- issue: Negaciones de capacidad frente a mera ausencia de acción
  english_pob_reading: Render the negatives as inability ('cannot feel,' 'cannot walk') where English idiom and context indicate impotence rather than mere inactivity.
  chosen_spanish_reading: 'Traducir las negaciones como incapacidad: «no pueden sentir», «no pueden caminar».'
  alternative_spanish_readings:
  - no sienten
  - no caminan
  rationale: El salmo no solo describe lo que los ídolos no hacen, sino su impotencia real. En español, las formas con «pueden» preservan esa lectura de incapacidad y mantienen el tono polémico del texto.
  doctrine_reference: La idolatría se ridiculiza como impotente; la traducción debe conservar el contraste entre apariencia corporal y falta de poder real.
- issue: 'Última cláusula: sonido, murmullo o habla'
  english_pob_reading: they do not make a sound in their throat / 'they do not mutter in their throat'
  chosen_spanish_reading: «no emiten sonido en su garganta».
  alternative_spanish_readings:
  - no murmuran en su garganta
  - no hablan en su garganta
  rationale: La evidencia hebrea permite una gama que va del murmullo a la simple emisión de sonido. «No emiten sonido» es suficientemente amplio para no cerrar indebidamente la ambigüedad, y «en su garganta» conserva la imaginería corporal original.
  doctrine_reference: El texto enfatiza la ausencia total de voz en los ídolos; la traducción no debe convertir esa imagen en una afirmación más específica de lo que el hebreo exige.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail en inglés: mantiene la lógica de incapacidad («no pueden»), conserva el paralelismo poético y deja abierta la ambigüedad de הגה mediante una formulación amplia («no emiten sonido»), equivalente al ajuste reciente del inglés hacia una negación más directa del verbo.'
  spanish_consistency_notes:
  - Se prefiere «manos/pies» sin posesivos redundantes para respetar el paralelismo hebreo.
  - Se conserva el registro poético y polémico del versículo sin añadir interpretaciones devocionales.
  - La alternancia entre singular posesivo («su garganta») y plural implícito sigue el uso colectivo genérico del español bíblico en versos breves.
