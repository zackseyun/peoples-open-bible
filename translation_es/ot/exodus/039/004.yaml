- from: Le hicieron hombreras[a], unidas a él; en sus dos extremos fue unido.
  to: Le hicieron hombreras[a], unidas al efod; en sus dos extremos quedó unido.
  rationale: Se conserva la elección acertada «hombreras» y la nota alternativa «tirantes», pero se reemplaza «a él» por «al efod» para evitar referencia personal impropia a un objeto y se cambia «fue unido» por «quedó unido» para un español más natural sin perder la fuerza pasiva/resultativa del hebreo.
