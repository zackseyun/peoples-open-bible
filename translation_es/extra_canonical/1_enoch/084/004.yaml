translation:
  language: es
  text: Y ahora los ángeles de tus cielos han transgredido[a], y tu ira está sobre la carne de los hombres[b] hasta el gran día de juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La traducción sigue la revisión inglesa más reciente, que entiende el verbo como 'han transgredido' y no como una súplica; la alternativa anterior en inglés fue descartada por graves errores de OCR en el texto etiópico (ge'ez).
    reason: textual_variant
  - marker: b
    text: '''Carne de los hombres'' conserva la imagen literal del original y su sentido colectivo para la humanidad mortal; también podría entenderse como ''carne humana''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: መላእክተ
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico, la referencia son seres celestiales; 'ángeles' conserva el valor del original y evita una lectura humana.
- source_word: ሰማያቲከ
  english_pob_choice: your heavens
  chosen_spanish: tus cielos
  alternatives_spanish:
  - tu cielo
  - los cielos que son tuyos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural se preserva naturalmente en español como 'cielos', y el posesivo se mantiene con 'tus'.
- source_word: ይጼብቡ
  english_pob_choice: have transgressed
  chosen_spanish: han transgredido
  alternatives_spanish:
  - han pecado
  - han faltado
  - han cometido pecado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa más reciente opta por un verbo de infracción directa. 'Han transgredido' mantiene el tono formal y el matiz de quebrantar un límite o mandato.
- source_word: ዲበ ሥጋ ሰብእ
  english_pob_choice: upon the flesh of man
  chosen_spanish: sobre la carne de los hombres
  alternatives_spanish:
  - sobre la carne del hombre
  - sobre la carne humana
  - sobre la humanidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen antropológica de 'carne' y el sentido colectivo señalado por la POB inglesa. En español, el plural 'los hombres' comunica mejor el referente colectivo sin borrar la literalidad básica.
- source_word: ትከውን መዐትከ
  english_pob_choice: your wrath is
  chosen_spanish: tu ira está
  alternatives_spanish:
  - tu ira será
  - permanece tu ira
  - tu furor está
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción copulativa transmite el estado/resultante continuo que exige el contexto. 'Ira' es el equivalente más natural y digno para መዐት en este pasaje.
- source_word: እስከ፡ ዕለት፡ ዐባይ
  english_pob_choice: until the great day
  chosen_spanish: hasta el gran día
  alternatives_spanish:
  - hasta el día grande
  - hasta aquel gran día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula apocalíptica se conserva de forma concisa; 'gran día' es la opción más idiomática y solemne en español.
- source_word: እንተ፡ ጽጌ
  english_pob_choice: of judgment
  chosen_spanish: de juicio
  alternatives_spanish:
  - de juicio y sentencia
  - de condena
  - de recompensas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado el estado textual incierto reflejado en la POB inglesa, se prefiere una solución sobria y semánticamente segura. 'De juicio' comunica el valor judicial/apocalíptico sin sobreinterpretar la forma problemática.
theological_decisions:
- issue: Interpretación de la acción de los ángeles
  english_pob_reading: The angels of your heavens have transgressed.
  chosen_spanish_reading: Los ángeles de tus cielos han transgredido.
  alternative_spanish_readings:
  - los ángeles de tus cielos han pecado
  - los ángeles de tus cielos son culpables de pecado
  rationale: Se preserva la afirmación histórica y acusatoria de la revisión inglesa más reciente, evitando la lectura de súplica descartada por la revisión textual. 'Transgredido' mantiene la tensión moral sin añadir especificación doctrinal no contenida explícitamente en la línea.
  doctrine_reference: Preservar la afirmación narrativa/judicial sin convertirla en oración imperativa.
- issue: Alcance de 'la carne de los hombres'
  english_pob_reading: your wrath is upon the flesh of men
  chosen_spanish_reading: tu ira está sobre la carne de los hombres
  alternative_spanish_readings:
  - tu ira está sobre la humanidad
  - tu ira está sobre la carne humana
  rationale: Se conserva la imaginería de 'carne' y su alcance colectivo, como indicó la POB inglesa. Esto mantiene la tensión antropológica y apocalíptica del texto.
  doctrine_reference: Consistencia con la antropología bíblica que usa 'carne' para la condición mortal humana.
translation_notes:
  revision_awareness: 'La base inglesa mostró una historia de revisión conflictiva: primero se leyó el pasaje como una petición/jussivo, pero una revisión posterior y el control textual identificaron errores graves de OCR y corrigieron el sentido a una afirmación histórica sobre la transgresión de los ángeles y la ira divina sobre la humanidad. La versión española adopta esa lectura revisada y evita la interpretación imperativa descartada.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando el texto lo requiera; aquí el pasaje se dirige a Dios en segunda persona, por lo que se usa simplemente 'tus/tu' sin introducir un nombre divino no presente en la línea.
  - Se conserva 'carne' por fidelidad antropológica, sin sustituirla por 'humanidad' en el texto principal.
  - '''Juicio'' se usa como equivalente sobrio para el final textual incierto, en línea con la revisión inglesa ''of judgment''.'
