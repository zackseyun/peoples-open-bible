base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/012/009.yaml
  text: Some of the Gadites separated themselves to David at the stronghold in the wilderness[a], mighty men of valor, men trained for battle, able to handle shield and spear, whose faces were like the faces of lions[c][b], and who were as swift as gazelles on the mountains.
  footnotes:
  - marker: a
    text: Or 'to the stronghold in the wilderness.' The Hebrew prepositional sequence can be understood as movement toward the stronghold or arrival at it.
    reason: alternative_reading
  - marker: b
    text: Literally, 'arranging shield and spear.' The expression refers to men prepared and skilled for combat.
    reason: lexical_alternative
  - marker: c
    text: Or 'like gazelles on the mountains, quick to move.'
    reason: lexical_alternative
