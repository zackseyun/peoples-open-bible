base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/032/022.yaml
  text: So Yahweh saved Hezekiah and the inhabitants of Jerusalem from the hand of Sennacherib king of Assyria and from the hand of all others[b][a], and he guided them on every side.
  footnotes:
  - marker: a
    text: Or, 'and from the hand of all'; the Hebrew leaves the object of 'all' unstated, likely meaning all other enemies or hostile powers.
    reason: lexical_alternative
  - marker: b
    text: Or, 'and he led them all around'; some understand the sense more broadly as granting security on every side.
    reason: alternative_reading
