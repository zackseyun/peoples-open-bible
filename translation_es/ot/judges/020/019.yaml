translation:
  language: es
  text: Entonces los hijos de Israel se levantaron por la mañana y acamparon contra Guibeá[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  english_pob_choice: rose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron en pie
  lexicon: HALOT
  rationale: El hebreo wayyiqtol de קום marca la siguiente acción narrativa. En español, «se levantaron» comunica el movimiento simple y natural, sin añadir la idea de salida que «se fueron» podría sugerir.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente filial y el POB inglés la conserva con transparencia. «Hijos de Israel» mantiene esa forma sin perder inteligibilidad en español.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - al amanecer
  lexicon: HALOT
  rationale: La preposición con el sustantivo definido expresa tiempo. «Por la mañana» es una equivalencia idiomática natural en español y mantiene el valor temporal del hebreo.
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - se acamparon
  - levantaron campamento
  lexicon: HALOT
  rationale: חנה indica hacer campamento. «Acamparon» es la forma más directa y clara en español, conservando el sentido narrativo militar del pasaje.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - frente a
  - junto a
  - ante
  lexicon: HALOT
  rationale: En este contexto militar, עַל no es mera ubicación; señala posicionamiento hostil hacia la ciudad. «Contra» reproduce mejor esa fuerza relacional que «junto a» o «ante».
- source_word: הַגִּבְעָה
  english_pob_choice: Gibeah
  chosen_spanish: Guibeá
  alternatives_spanish:
  - Gueba
  - la Guibeá
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se translitera como «Guibeá» para reflejar el hebreo גִּבְעָה; no se traduce el artículo como parte del topónimo en el texto principal.
translation_notes:
  revision_awareness: El texto base inglés se mantiene sin cambios relevantes en la revisión más reciente; la concordancia cruzada lo considera de alta armonía, por lo que no se introdujeron ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene el lenguaje narrativo sencillo y secuencial del hebreo.
  - Se preserva el valor militar de עַל con «contra».
  - Se elige «hijos de Israel» por transparencia al hebreo, con nota alternativa para «israelitas».
  - Se usa la transliteración «Guibeá» para el topónimo, consistente con una política de nombres propios basada en el hebreo.
