translation:
  language: es
  text: Mira los cielos y observa[a]; contempla las nubes; están más altas que tú.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira hacia los cielos»; שְׁחָקִים puede referirse también, en poesía, al cielo o a las alturas celestes.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבֵּט
  english_pob_choice: Look at
  chosen_spanish: Mira
  alternatives_spanish:
  - Observa
  - Mira atentamente
  - Contempla
  lexicon: HALOT
  rationale: El imperativo pide atención visual directa. «Mira» es natural en español moderno y conserva la fuerza exhortativa sin sobrecargar el tono.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  - las alturas
  lexicon: HALOT
  rationale: En plural poético, שָׁמַיִם puede referirse al ámbito celeste. «Los cielos» mantiene el plural y el registro elevado mejor que «el cielo».
- source_word: וּרְאֵה
  english_pob_choice: and see
  chosen_spanish: y ve
  alternatives_spanish:
  - y mira
  - y observa
  - y contempla
  lexicon: HALOT
  rationale: El paralelo imperativo requiere un verbo simple y directo. «Ve» conserva la brevedad y la secuencia retórica del hebreo.
- source_word: וְשׁוּר
  english_pob_choice: behold / gaze at
  chosen_spanish: contempla
  alternatives_spanish:
  - mira fijamente
  - observa
  - atiende a
  lexicon: HALOT
  rationale: שׁוּר intensifica la mirada; «contempla» comunica esa atención sostenida con un registro digno, evitando un calco mecánico.
- source_word: שְׁחָקִים
  english_pob_choice: the clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - los cielos
  - las alturas
  - las nubes
  lexicon: HALOT
  rationale: En este contexto poético, la referencia concreta a nubes es la lectura más probable y armoniza con el paralelismo de «los cielos».
- source_word: גָּבְהוּ
  english_pob_choice: they are higher
  chosen_spanish: están más altas
  alternatives_spanish:
  - son más altas
  - se alzan más alto
  - están elevadas
  lexicon: HALOT
  rationale: El perfecto plural funciona descriptivamente/comparativamente. «Están más altas» expresa de forma natural la comparación con el sujeto implícito del verso.
- source_word: מִמֶּךָּ
  english_pob_choice: than you
  chosen_spanish: que tú
  alternatives_spanish:
  - que tú
  - por encima de ti
  - más que tú
  lexicon: HALOT
  rationale: La comparación con מן y sufijo de 2ms se rinde con «que tú» en español idiomático; la idea completa de superioridad se mantiene por el adjetivo comparativo «más altas».
theological_decisions:
- issue: Registro poético y vocabulario celeste
  english_pob_reading: Look at the heavens ... behold the clouds
  chosen_spanish_reading: Mira los cielos ... contempla las nubes
  alternative_spanish_readings:
  - Mira el cielo ...
  - Mira los cielos ... mira las nubes
  rationale: 'No hay una decisión doctrinal específica, pero sí una opción de registro: conservar el plural elevado de «cielos» y la intensificación retórica de los dos imperativos.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El audit trail en inglés mantiene alta concordancia con el hebreo y fija un esquema de tres imperativos visuales. La revisión reciente cambió 'gaze at' por 'behold' por registro más formal; en español se refleja esa intensificación con «contempla» para וְשׁוּר, manteniendo la distinción entre los dos primeros mandatos y el tercero. La elección de «los cielos» y «las nubes» sigue la lectura más contextual, sin borrar la amplitud poética posible de שְׁחָקִים.
  spanish_consistency_notes:
  - Se conserva «cielos» en plural para reflejar שָׁמַיִם y el registro poético.
  - «Contempla» se usa para diferenciar el tercer imperativo de los dos anteriores y reproducir la intensificación del hebreo.
  - La nota [a] queda anclada en «cielos» porque en español también existe la amplitud semántica entre cielo, cielos y alturas celestes.
