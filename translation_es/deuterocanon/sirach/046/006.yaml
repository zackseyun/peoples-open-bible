translation:
  language: es
  text: Arrojó destrucción sobre una nación enemiga, y cuando huían los destruyó a todos, para que cada nación conociera el ban[a], porque Yahvé vigila su batalla[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo חרם es un término de guerra consagrada y destrucción bajo juicio divino; alternativamente, 'para que cada nación conociera su destrucción consagrada'.
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego difiere de manera notable: habla de traer guerra sobre una nación y de destruir a ''los que resistían'', añadiendo que la guerra estaba ''delante del Señor''.'
    reason: alternative_reading
lexical_decisions:
- source_word: השליך
  english_pob_choice: hurled
  chosen_spanish: Arrojó
  alternatives_spanish:
  - Lanzó
  - Echó
  lexicon: HALOT
  rationale: El verbo hebreo expresa un acto violento de arrojar o lanzar con fuerza. En español, 'arrojó' mantiene ese valor en un registro digno y natural, sin sobrecargarlo.
- source_word: גוי אויב
  english_pob_choice: an enemy nation
  chosen_spanish: una nación enemiga
  alternatives_spanish:
  - un pueblo enemigo
  - una nación hostil
  lexicon: HALOT
  rationale: גוי señala un colectivo nacional o étnico; con אויב, el sentido es corporativo y hostil. 'Nación enemiga' conserva esa fuerza colectiva y suena natural en español bíblico contemporáneo.
- source_word: ובנוסם
  english_pob_choice: as they fled
  chosen_spanish: cuando huían
  alternatives_spanish:
  - en su huida
  - al huir
  lexicon: HALOT
  rationale: La forma con preposición y infinitivo indica circunstancia temporal. 'Cuando huían' comunica la acción concurrente con claridad idiomática.
- source_word: האביד כולם
  english_pob_choice: he destroyed them all
  chosen_spanish: los destruyó a todos
  alternatives_spanish:
  - los hizo perecer a כולם
  - los destruyó por completo
  lexicon: HALOT
  rationale: אבד en causativo expresa hacer perecer o destruir. 'Los destruyó a todos' reproduce la totalidad de כולם y mantiene el tono militar sin suavizar el término.
- source_word: למען דעת
  english_pob_choice: so that ... might know
  chosen_spanish: para que ... conocieran
  alternatives_spanish:
  - a fin de que ... supieran
  - para que ... supiese
  lexicon: HALOT
  rationale: La cláusula final exige una construcción de propósito clara en español. 'Para que ... conocieran' es fluido y refleja el valor intencional del hebreo.
- source_word: כל גוי
  english_pob_choice: every nation
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - cada nación
  - todo pueblo
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular colectivo, el distributivo se expresa bien en plural español. 'Todas las naciones' conserva la amplitud del sujeto colectivo.
- source_word: חרם
  english_pob_choice: the ban
  chosen_spanish: el ban
  alternatives_spanish:
  - la destrucción consagrada
  - el anatema
  lexicon: HALOT
  rationale: '''Ban'' conserva el término técnico de guerra sacralizada sin sustituirlo por un vocablo eclesiástico tradicional que podría desdibujar su fuerza. Se mantiene la tensión semántica del concepto en lugar de resolverlo con paráfrasis.'
- source_word: כי צופה
  english_pob_choice: for ... watches over
  chosen_spanish: porque Yahvé vigila
  alternatives_spanish:
  - porque Yahvé vela
  - porque Yahvé observa
  lexicon: HALOT
  rationale: צפה implica vigilar o mantener la guardia. 'Vigila' refleja mejor el trasfondo militar del pasaje que un simple 've' u 'observa'.
- source_word: יהוה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: Según la política del proyecto, el Tetragrámaton se vierte como 'Yahvé' en el texto principal para hacer visible el nombre divino en lugar de ocultarlo con una convención tipográfica.
- source_word: מלחמתם
  english_pob_choice: their battle
  chosen_spanish: su batalla
  alternatives_spanish:
  - su guerra
  - su combate
  lexicon: HALOT
  rationale: El sufijo posesivo apunta a la batalla/combate de ellos; en español, 'su batalla' es breve y fiel al contexto inmediato. 'Guerra' sería posible, pero 'batalla' encaja mejor con la escena.
theological_decisions:
- issue: Sentido de חרם y su carga teológica de guerra bajo juicio
  english_pob_reading: Rendered as 'the ban' in the main text, with the fuller sense of devoted destruction preserved in a footnote.
  chosen_spanish_reading: Se traduce como 'el ban' en el cuerpo del texto, con nota que explicita 'destrucción consagrada' o 'devotamente destruido' como sentido subyacente.
  alternative_spanish_readings:
  - el anatema
  - la destrucción consagrada
  - la destrucción votiva
  rationale: El hebreo חרם es un término técnico cargado de juicio divino y guerra santa. Traducirlo solo por 'anatema' o por una paráfrasis lo apaga o lo cristianiza indebidamente; 'ban' preserva la rareza técnica y la nota explica su alcance.
  doctrine_reference: Mantener la tensión lexical y teológica; no neutralizar terminología de juicio por tradición eclesial.
- issue: 'Base textual principal: hebreo con paralelo griego divergente'
  english_pob_reading: Main translation follows the extant Hebrew, while noting the Greek's different wording in a footnote.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado, y la nota documenta que el griego habla de 'guerra', de 'los que resistían' y de que 'la guerra de él' estaba 'delante del Señor'.
  alternative_spanish_readings:
  - 'una versión basada en el griego: ''lanzó guerra sobre una nación...'''
  - una síntesis armonizada entre hebreo y griego
  rationale: Sirácida se traduce aquí desde el testimonio hebreo disponible, pero el paralelo griego aporta una variante significativa que no debe borrarse. La nota conserva esa alternativa sin fusionarla artificialmente con el hebreo.
  doctrine_reference: Primacía de la fuente original conservada, con preservación explícita de variantes textuales relevantes.
translation_notes:
  revision_awareness: La redacción sigue la última revisión del audit trail al preferir 'destruyó a todos' en lugar de una expresión más coloquial, manteniendo un registro formal y una correspondencia más estrecha con el hebreo. También conserva 'el ban' como término técnico sin reemplazarlo por una paráfrasis más explicativa en el texto principal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para יהוה, de acuerdo con la política del proyecto.
  - '''Ban'' se mantiene como término técnico no traducido para חרם, con explicación en nota.'
  - '''Naciones'' refleja el plural distributivo de כל גוי en español natural.'
  - La nota del griego se conserva porque la divergencia es sustancial y afecta el matiz de la escena.
  - El texto evita 'SEÑOR' para no ocultar el nombre divino en la traducción principal.
