base_translation:
  language: en
  yaml_path: translation/ot/judges/005/021.yaml
  text: The torrent of Kishon swept them away— the ancient torrent[a], the torrent of Kishon. March on, my soul[b], with strength!
  footnotes:
  - marker: a
    text: Or 'the torrent of old' or 'the primeval torrent' for 'the ancient torrent.' The Hebrew קְדוּמִים can carry the sense of antiquity, and some hear an intensified poetic description rather than a simple chronological label.
    reason: lexical_alternative
  - marker: b
    text: Or 'Tread on, my soul, in strength' or 'Trample, my soul, with might.' The Hebrew is terse and poetic, and the verb can suggest treading or trampling as well as marching.
    reason: lexical_alternative
