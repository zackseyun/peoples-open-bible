revisions:
- from: 'Y habló a la congregación[a], diciendo: «Apártense, por favor, de las tiendas de estos hombres malvados, y no toquen nada de lo que les pertenece, para que no sean arrastrados junto con todos sus pecados».'
  to: 'Y habló a la congregación, diciendo: «Apártense, por favor, de las tiendas de estos hombres malvados, y no toquen nada de lo que les pertenece, no sea que sean arrastrados en todos sus pecados[a]».'
  rationale: Se corrige la alineación con el audit trail inglés trasladando la nota al pie a la cláusula final, donde realmente está la alternativa léxica relevante. También se ajusta ‘para que no’ a ‘no sea que’ para reflejar mejor פֶּן, y se reemplaza ‘junto con’ por ‘en’ para conservar mejor la tensión del hebreo entre asociación y causalidad sin sobreinterpretar.
