lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y aconteció que ...
  - Y vino a ser ...
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutivo introduce un nuevo desarrollo profético; en español, 'Entonces' marca secuencia de manera natural y digna. 'Vino' conserva el movimiento de la fórmula profética 'la palabra ... vino' sin caer en arcaísmos excesivos.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - un mensaje
  - el mensaje
  lexicon: HALOT
  rationale: En la expresión fija דְבַר יְהוָה, 'la palabra' reproduce con precisión la fórmula profética estándar. 'Mensaje' explicita el sentido, pero pierde la conexión formal con el patrón bíblico recurrente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se adopta 'Yahvé' como forma española estándar del nombre divino, en continuidad con la política del proyecto de no sustituir el Tetragrámaton por 'SEÑOR'. 'Yahweh' es posible como transliteración más cercana al inglés auditado, pero 'Yahvé' resulta más natural en español. 'Jehová' se descarta por la elección doctrinal y filológica del proyecto.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona singular se expresa de forma directa con 'a mí'. Es la opción más natural y fiel en español moderno.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo introductorio se traduce con el gerundio 'diciendo', que mantiene la función fórmulaica de introducir el discurso. 'Para decir' suena menos idiomático; 'y dijo' altera la estructura de dependencia del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - SEÑOR
  rationale: El hebreo contiene explícitamente el Tetragrámaton, por lo que no se usa una sustitución como 'SEÑOR'. 'Yahvé' preserva el nombre personal de Dios en español y comunica la misma decisión teológica del POB de evitar la máscara tradicional. La forma 'Yahweh' sería más cercana al inglés auditado, pero menos natural para la lectura española.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El inglés auditado mantiene la fórmula profética estándar y la decisión doctrinal de representar el Tetragrámaton por un nombre transliterado. No se detectan revisiones aplicadas en el paquete fuente; la presente versión conserva esa lectura y la adapta a la norma española del proyecto.
  spanish_consistency_notes:
  - 'Se mantiene el orden fórmulaico del hebreo: introducción narrativa + sustantivo en constructo + nombre divino + complemento pronominal + marcador de habla.'
  - Se evita 'SEÑOR' para no ocultar el nombre divino revelado en el texto fuente.
  - '''Diciendo'' conserva la función de introducción del discurso sin añadir contenido interpretativo.'
