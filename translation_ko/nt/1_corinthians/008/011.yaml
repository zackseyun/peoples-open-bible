id: 1CO.8.11
reference: '1 Corinthians 8:11'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸂ἀπόλλυται γὰρ⸃ ὁ ἀσθενῶν ⸀ἐν τῇ σῇ γνώσει, ⸂ὁ ἀδελφὸς⸃ δι’ ὃν Χριστὸς ἀπέθανεν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/008/011.yaml
  text: For the weak one is destroyed by your knowledge—the brother for whom Messiah died[a][b][c].
  footnotes:
  - marker: a
    text: 'Or ''is destroyed'' or ''perishes.'' The Greek can express severe ruin or destruction; the main text avoids over-resolving whether Paul means temporal spiritual devastation, eschatological destruction, or both.'
    reason: alternative_reading
  - marker: b
    text: '''Brother'' here means a fellow believer; in context the application may include a brother or sister in the faith.'
    reason: lexical_alternative
  - marker: c
    text: 'Greek ''Christ''; rendered ''Messiah'' here because Χριστός functions as a title.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그래서 그 약한 자, 곧 메시아께서 그를 위하여 죽으신 그 형제가 그대의 지식으로 인하여 멸망합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπόλλυται
  english_pob_choice: is destroyed
  chosen_korean: 멸망합니다
  alternatives_korean:
  - 망합니다
  lexicon: BDAG
  rationale: '1:18의 「멸망하는 자」와 어휘 호응.'
- source_word: δι’ ὃν Χριστὸς ἀπέθανεν
  english_pob_choice: for whom Messiah died
  chosen_korean: 메시아께서 그를 위하여 죽으신
  alternatives_korean:
  - 그를 위해 메시아께서 죽으신
  lexicon: BDAG
  rationale: 대속의 무게를 살려 약자 보호의 신학적 근거를 분명히.
