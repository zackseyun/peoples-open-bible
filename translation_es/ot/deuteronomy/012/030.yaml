revisions:
- from: 'Ten cuidado, no sea que quedes atrapado siguiéndolos[a], después de que hayan sido destruidos de delante de ti, y no sea que preguntes acerca de sus dioses, diciendo: “¿Cómo servían estas naciones a sus dioses, para que yo también haga lo mismo?”.'
  to: 'Ten cuidado, no sea que quedes atrapado siguiéndolos, después de que hayan sido destruidos de delante de ti, y no sea que inquieras acerca de sus dioses, diciendo: “¿Cómo servían[a] estas naciones a sus dioses, y yo también haga lo mismo?”'
  rationale: Se corrige el anclaje de la nota para que recaiga sobre 'servían', donde corresponde la alternativa léxica documentada 'adoraban'. Se ajusta 'preguntes' a 'inquieras' para reflejar mejor דרש en un registro bíblico digno. También se cambia la cláusula final a 'y yo también haga lo mismo' para acercarla más al hebreo y evitar una finalidad demasiado explícita no necesaria en español.
  reviewer_model: gpt-5.4
