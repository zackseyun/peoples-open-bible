id: MIC.4.11
reference: Micah 4:11
source:
  edition: WLC
  text: וְ/עַתָּ֛ה נֶאֶסְפ֥וּ עָלַ֖יִ/ךְ גּוֹיִ֣ם רַבִּ֑ים הָ/אֹמְרִ֣ים תֶּחֱנָ֔ף וְ/תַ֥חַז בְּ/צִיּ֖וֹן עֵינֵֽי/נוּ׃
translation:
  text: And now many nations have gathered against you[a], saying, “Let her be defiled[b], and let our eyes look on Zion.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let her be polluted' or 'May she be profaned.' The Hebrew verb can denote becoming morally or ritually defiled.
    reason: lexical_alternative
  - marker: b
    text: Or 'let our eyes look on Zion' / 'may our eyes see Zion.' The expression conveys the nations' hostile desire to watch Zion's humiliation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Carries a discourse-shifting temporal sense; 'And now' preserves the connective ו plus the adverbial 'now.'
- source_word: נֶאֶסְפוּ
  chosen: have gathered
  alternatives:
  - are gathered
  - have assembled
  lexicon: HALOT
  rationale: Niphal perfect 3cp of אסף here denotes completed gathering with present relevance. 'Have gathered' is natural English and fits the prophetic scene.
- source_word: עָלַיִךְ
  chosen: against you
  alternatives:
  - upon you
  - over you
  lexicon: HALOT
  rationale: With hostile nations in context, על conveys opposition rather than mere location; 'against you' makes the adversative force explicit.
- source_word: גּוֹיִם רַבִּים
  chosen: many nations
  alternatives:
  - many peoples
  lexicon: HALOT
  rationale: גּוֹיִם normally means 'nations' or 'gentiles'; here geopolitical groups are in view, so 'many nations' is the most direct rendering.
- source_word: הָאֹמְרִים
  chosen: saying
  alternatives:
  - who are saying
  lexicon: HALOT
  rationale: The participle introduces the content of the nations' hostile speech; 'saying' is idiomatic and sufficiently formal.
- source_word: תֶּחֱנָף
  chosen: Let her be defiled
  alternatives:
  - Let her be polluted
  - May she be profaned
  lexicon: HALOT
  rationale: From חנף in a passive/intransitive sense of becoming polluted or profaned. Since Zion/Jerusalem is grammatically feminine, 'her' is appropriate. 'Defiled' best captures ritual-moral contamination in accessible English.
- source_word: וְתַחַז
  chosen: and let our eyes gaze
  alternatives:
  - and let our eyes look
  - and may our eyes see
  lexicon: HALOT
  rationale: The verb חזָה often carries the sense of seeing or gazing, sometimes with a savoring or contemplative nuance. Rendering the idiom with the explicit subject from the following noun phrase gives natural English while preserving the hostile desire to look upon Zion.
- source_word: בְּצִיּוֹן
  chosen: on Zion
  alternatives:
  - upon Zion
  - at Zion
  lexicon: HALOT
  rationale: With verbs of seeing, English idiom prefers 'gaze on.' 'Zion' is retained as the proper name, representing Jerusalem as the covenant city.
- source_word: עֵינֵינוּ
  chosen: our eyes
  alternatives:
  - we
  lexicon: HALOT
  rationale: The Hebrew explicitly uses the body-part idiom 'our eyes'; retaining it preserves the vividness and contemptuous tone of the nations' speech.
