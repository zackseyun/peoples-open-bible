  to: Pero cuando el príncipe haga una ofrenda voluntaria a Yahvé, ya sea un holocausto o sacrificios de paz[a], se le abrirá la puerta que mira al oriente, y ofrecerá su holocausto y sus sacrificios de paz, como hace en el día de reposo. Luego saldrá[b], y después de que él salga, se cerrará la puerta.
