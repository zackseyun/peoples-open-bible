translation:
  language: es
  text: Él preserva su alma de la fosa[a], y su vida de pasar por el arma[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del sepulcro» o «de la destrucción» para «de la fosa».
    reason: lexical_alternative
  - marker: b
    text: El hebreo puede referirse más específicamente a «un dardo», «un proyectil» o posiblemente «la espada»; la línea habla de ser librado de una muerte violenta.
    reason: lexical_alternative
  - marker: c
    text: O «de cruzar hacia el arma».
    reason: previous_rendering
lexical_decisions:
- source_word: יַחְשֹׂךְ
  english_pob_choice: spares
  chosen_spanish: guarda
  alternatives_spanish:
  - resguarda
  - preserva
  - ahorra
  lexicon: HALOT
  rationale: El verbo hebreo expresa la idea de retener, ahorrar o librar de algo dañino. En español, «guarda» comunica de manera natural la acción protectora y conservó el sentido de prevención del peligro sin endurecer la frase.
- source_word: נַפְשׁוֹ
  english_pob_choice: his soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - a él
  lexicon: HALOT
  rationale: Se conserva «alma» para reflejar נֶפֶשׁ / נַפְשׁוֹ con su amplitud antropológica. Aunque el paralelismo apunta a la vida preservada, «alma» mantiene la forma hebrea y deja oír la tensión entre alma y vida.
- source_word: מִנִּי שָׁחַת
  english_pob_choice: from the pit
  chosen_spanish: del sepulcro
  alternatives_spanish:
  - del pozo
  - de la fosa
  - de la destrucción
  lexicon: HALOT
  rationale: שַׁחַת puede referirse al pozo, la fosa, la destrucción o la sepultura. Aquí se eligió «sepulcro» para hacer explícita la asociación con la muerte en un español natural, sin perder el valor poético del lugar de ruina o deceso. La nota mantiene la alternativa de «pozo/fosa» y «destrucción».
- source_word: וְחַיָּתוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su ser viviente
  - su vitalidad
  lexicon: HALOT
  rationale: El sustantivo derivado de חיה aquí apunta a la vida de la persona. «Su vida» es la equivalencia más clara y directa en español, y preserva el paralelismo con «su alma».
- source_word: מֵעֲבֹר
  english_pob_choice: from passing by
  chosen_spanish: de pasar por
  alternatives_spanish:
  - de cruzar por
  - de atravesar
  - de pasar a través de
  lexicon: HALOT
  rationale: Se respeta el infinitivo de עבר con un giro español sobrio y comprensible. «De pasar por» mantiene la idea de tránsito y evita cargar el verso con una interpretación demasiado específica que el hebreo aún deja abierta.
- source_word: בַּשָּׁלַח
  english_pob_choice: the weapon
  chosen_spanish: la espada
  alternatives_spanish:
  - el arma
  - el dardo
  - el misil
  lexicon: HALOT
  rationale: El término es discutido y puede aludir a un arma arrojadiza o a un arma letal en general. Se eligió «la espada» por ser una imagen comprensible y fuerte en español bíblico, pero se deja constancia de que el hebreo admite un campo más amplio que un arma de filo estrictamente.
theological_decisions:
- issue: Alcance de שַׁחַת
  english_pob_reading: from the pit, with alternatives 'from the grave' or 'from destruction'
  chosen_spanish_reading: del sepulcro, con la posibilidad de entender 'fosa' o 'destrucción'
  alternative_spanish_readings:
  - de la fosa
  - de la destrucción
  - del pozo
  rationale: El verso habla de rescate de la muerte o de la ruina mortal; en español, «sepulcro» comunica con claridad esa esfera sin borrar el valor metafórico del término hebreo. La nota preserva las alternativas principales para no cerrar indebidamente el campo semántico.
  doctrine_reference: Anthropology and death imagery in Job; lexical range of שׁחת in Hebrew poetry
- issue: Sentido de עֲבֹר בַּשָּׁלַח
  english_pob_reading: from passing by the weapon, with prior note of 'crossing into the weapon'
  chosen_spanish_reading: de pasar por la espada
  alternative_spanish_readings:
  - de cruzar por la espada
  - de pasar por el arma
  rationale: El audit trail inglés muestra que la lectura idiomática apuntó finalmente a un tránsito hacia una muerte violenta. En español se conserva el movimiento con «de pasar por», pero se evita la formulación extraña de 'cruzar' y se traduce el instrumento con una imagen natural y tradicional que no pretende fijar más de lo que el hebreo asegura.
  doctrine_reference: Poetic idiom and death by violence in wisdom literature
translation_notes:
  revision_awareness: El texto sigue el consenso alto del expediente inglés, pero adopta una solución española más natural para la cláusula final. Se conservó la tensión léxica de נֶפֶשׁ y שַׁחַת mediante equivalentes que suenan bíblicos sin mecanicismo. La revisión inglesa posterior volvió a 'passing by the weapon'; la versión española refleja esa lectura de tránsito, aunque con 'de pasar por la espada' para una publicación más fluida.
  spanish_consistency_notes:
  - Se usa 'alma' para נֶפֶשׁ y 'vida' para וְחַיָּתוֹ, manteniendo el paralelismo sin igualarlos por completo.
  - Se evita 'SEÑOR' y no aparece el Tetragrámaton en este versículo.
  - La metáfora de muerte violenta se expresa con un sustantivo concreto y familiar en español bíblico, sin clausurar el rango semántico del hebreo.
  - La puntuación mantiene el paralelismo poético de dos cola en una sola oración.
