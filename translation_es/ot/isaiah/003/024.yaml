translation:
  language: es
  text: 'Y será así: en lugar de perfume, podredumbre; y en lugar de un cinturón, una cuerda[a]; y en lugar de cabello bien arreglado[b], calvicie; y en lugar de una rica vestidura, un ceñir de cilicio; marca[aquí no, c] en lugar de belleza[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘una soga’. El término hebreo es raro y puede referirse tanto a una cuerda que sustituye un cinturón ornamental como a una marca semejante a una cuerda de humillación.
    reason: lexical_alternative
  - marker: b
    text: La frase hebrea es difícil y puede aludir más ampliamente a adorno elaborado o a cabello arreglado con esmero; el paralelismo con ‘calvicie’ favorece la referencia al cabello peinado.
    reason: lexical_alternative
  - marker: c
    text: El final del versículo es textualmente y léxicamente difícil. Muchos entienden el sentido como ‘marca en lugar de belleza’ o ‘marca de hierro en lugar de belleza’, mientras que algunas traducciones prefieren expresiones más generales como ‘en lugar de belleza, vergüenza’.
    reason: textual_variant
lexical_decisions:
- source_word: בֹּשֶׂם
  english_pob_choice: perfume
  chosen_spanish: perfume
  alternatives_spanish:
  - fragancia
  - aroma
  lexicon: HALOT
  rationale: El hebreo se refiere a una sustancia aromática usada como adorno personal; ‘perfume’ es natural en español y conserva bien el contraste con la corrupción que lo reemplaza.
- source_word: מַק
  english_pob_choice: rottenness
  chosen_spanish: podredumbre
  alternatives_spanish:
  - corrupción
  - descomposición
  - pudrición
  lexicon: HALOT
  rationale: El término expresa deterioro o ruina concreta; ‘podredumbre’ comunica de manera clara la imagen física y despectiva que corresponde al contraste con perfume.
- source_word: חֲגוֹרָה
  english_pob_choice: belt
  chosen_spanish: cinturón
  alternatives_spanish:
  - cinto
  - faja
  - ceñidor
  lexicon: HALOT
  rationale: Es una prenda o banda para ceñir la cintura. ‘Cinturón’ es claro y natural en español contemporáneo sin perder el sentido funcional.
- source_word: נִקְפָּה
  english_pob_choice: a rope
  chosen_spanish: una cuerda
  alternatives_spanish:
  - una soga
  - un cordel
  - una cuerda de humillación
  lexicon: HALOT
  rationale: La forma es rara y el POB inglés preserva la alternativa lexical. ‘Cuerda’ mantiene la ambigüedad entre objeto literal y posible señal humillante, sin fijar más de lo que el hebreo permite.
- source_word: מַעֲשֶׂה מִקְשֶׁה
  english_pob_choice: well-set hair
  chosen_spanish: cabello bien arreglado
  alternatives_spanish:
  - peinado elaborado
  - cabello trenzado con esmero
  - arreglo de cabello
  lexicon: HALOT
  rationale: La frase es difícil; el contexto de adornos y el paralelo con ‘calvicie’ favorecen una referencia al cabello arreglado. ‘Cabello bien arreglado’ conserva la idea sin sobreespecificar peinado.
- source_word: קָרְחָה
  english_pob_choice: baldness
  chosen_spanish: calvicie
  alternatives_spanish:
  - una cabeza rapada
  - quedarse calva
  lexicon: HALOT
  rationale: Es el sustantivo común para la ausencia de cabello; ‘calvicie’ es la equivalencia natural en español y mantiene el fuerte contraste con el adorno capilar.
- source_word: פְּתִיגִיל
  english_pob_choice: a rich robe
  chosen_spanish: una rica vestidura
  alternatives_spanish:
  - un vestido precioso
  - un manto fino
  - una prenda de gala
  lexicon: HALOT
  rationale: El término apunta a una prenda costosa o vistosa. ‘Vestidura’ evita limitarla a una forma precisa y ‘rica’ reproduce el valor de lujo del original.
- source_word: מַחֲגֹרֶת שָׂק
  english_pob_choice: a girding of sackcloth
  chosen_spanish: un ceñir de cilicio
  alternatives_spanish:
  - un ceñidor de cilicio
  - un ceñirse de cilicio
  - una faja de cilicio
  lexicon: HALOT
  rationale: La expresión hebrea describe un acto o estado de ceñirse con tela de luto. ‘Ceñir de cilicio’ conserva el carácter nominal y la imagen de penitencia/aflicción, con un registro bíblico comprensible.
- source_word: כִּי תַחַת יֹפִי
  english_pob_choice: branding instead of beauty
  chosen_spanish: marca de deshonra en lugar de belleza
  alternatives_spanish:
  - deshonra en lugar de belleza
  - señal de vergüenza en lugar de belleza
  - marca en lugar de belleza
  lexicon: HALOT
  rationale: El cierre es difícil y el inglés POB documenta una lectura de ‘branding’ junto con alternativas más generales. En español, ‘marca de deshonra’ comunica la idea de una marca/estigma humillante sin afirmar de manera innecesaria un procedimiento específico que el texto consonántico no explicita.
theological_decisions:
- issue: Reversión de honor y belleza en juicio
  english_pob_reading: branding instead of beauty
  chosen_spanish_reading: marca de deshonra en lugar de belleza
  alternative_spanish_readings:
  - deshonra en lugar de belleza
  - señal de vergüenza en lugar de belleza
  rationale: 'El versículo presenta una serie de sustituciones degradantes como juicio. La formulación española preserva la tensión del cierre: una posible marca corporal o social de oprobio sustituyendo la belleza, sin deshacer la oscuridad del hebreo.'
  doctrine_reference: Isaías 3:24; juicio divino sobre el orgullo y el adorno humano
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado del POB inglés y su revisión reciente: se mantuvo la secuencia de contraste y la puntuación final sin cambio de sentido, pero se ajustó a español natural con equivalencias léxicas transparentes. La decisión sobre el cierre difícil preserva la ambigüedad documentada por el POB, y la nota a pie de página recoge la alternativa generalizante.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ no porque aparezca aquí, sino como norma del proyecto cuando corresponda; en este versículo no aplica.
  - 'Se prefirieron equivalencias léxicas transparentes y no eclesiásticas: ‘cinturón’, ‘cuerda’, ‘calvicie’, ‘cilicio’.'
  - Se evitó traducir mecánicamente ‘well-set hair’ con un calco rígido; la formulación española intenta sonar natural sin perder la referencia al arreglo capilar.
  - 'El marcador de notas respeta la secuencia única requerida: a, b, c.'
