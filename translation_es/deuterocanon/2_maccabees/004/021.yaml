  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: envío de Apolonio a Egipto, percepción de Antíoco de una desventaja respecto de sus propios asuntos, preocupación por su seguridad y viaje de Jope a Jerusalén. Sin embargo, la nota al pie actual no preserva correctamente la alternativa documentada en el rastro inglés: repite esencialmente la lectura principal en vez de reflejar la alternativa de que Antíoco estaba alienado/alejado de sus propios asuntos. Además, en español ''rey Filométor'' suena menos natural que ''rey Ptolomeo Filométor'', pero no es obligatorio añadir ''Ptolomeo'' si no está en la fuente ni en el POB inglés.'
  spanish_quality_summary: El español es claro, natural y digno. 'Fiestas de la subida al trono' funciona bien; 'al darse cuenta de que esto era ajeno a sus propios intereses' también es comprensible. 'Avanzó hasta Jerusalén' es aceptable, aunque 'continuó hasta Jerusalén' suena un poco más idiomático para movimiento ulterior. El principal problema de calidad está en la nota, no en la prosa principal.
  glossary_alignment: No hay términos teológicos sensibles del glosario principal en este versículo. La decisión de conservar Φιλομήτωρ como nombre/epíteto transliterado ('Filométor') es coherente con la pauta del proyecto. No hay conflictos con Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: La nota al pie no conserva la alternativa léxica documentada en el POB inglés.
    rationale: El texto inglés preserva como alternativa algo como 'que él estaba alejado/enajenado de sus propios asuntos'. La nota española actual ofrece 'al percibir que esto era ajeno a sus propios intereses', que básicamente duplica la lectura principal en lugar de registrar la alternativa significativa.
  - severity: low
    issue: '''Avanzó hasta Jerusalén'' es menos idiomático que ''continuó hasta Jerusalén''.'
    rationale: El verbo principal expresa movimiento ulterior después de llegar a Jope. 'Continuó hasta' o 'siguió hasta' suena más natural en español narrativo bíblico moderno, aunque 'avanzó hasta' no es incorrecto.
