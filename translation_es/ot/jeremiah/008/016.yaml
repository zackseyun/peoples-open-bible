base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/008/016.yaml
  text: From Dan is heard the snorting of his horses[a]; at the sound of the neighing of his stallions the whole land quakes. They come and devour the land and its fullness[c][b], the city and those who dwell in it.
  footnotes:
  - marker: a
    text: Or 'the whole earth trembles.' The Hebrew אֶרֶץ can mean either 'land' or 'earth'; here 'land' fits the immediate context of invasion and devastation.
    reason: lexical_alternative
  - marker: b
    text: Or 'the land and everything in it.' Hebrew 'its fullness' refers to all that fills the land.
    reason: lexical_alternative
  - marker: c
    text: Or 'his mighty horses' for 'his stallions.' The Hebrew term can denote strength or nobility; in this context it refers to powerful war-horses.
    reason: lexical_alternative
