review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea: coordinación inicial, dimensión del atrio, lado oriental, doble énfasis direccional y medida final. Sin embargo, «hacia el amanecer» suena temporal en español y no preserva con suficiente claridad el sentido espacial de מִזְרָחָה (‘hacia el oriente / hacia donde sale el sol’).'
  spanish_quality_summary: El texto es mayormente claro y digno, con buen uso de «atrio» y «codos». La principal mejora es reemplazar «hacia el amanecer» por una expresión espacial más natural y precisa en español bíblico moderno. También conviene alinear la nota alternativa con esa mejora.
  glossary_alignment: 'No hay términos del glosario mayor comprometidos aquí. «Atrio» para הֶחָצֵר y «codos» para אַמָּה están bien. La decisión clave es direccional: mantener la duplicación hebrea sin introducir una lectura temporal; por eso «hacia el oriente» encaja mejor que «hacia el amanecer».'
  issues:
  - severity: medium
    issue: «hacia el amanecer» introduce un matiz temporal poco natural
    rationale: מִזְרָחָה aquí funciona como designación espacial del este/levantamiento del sol. En español, «amanecer» se oye principalmente como tiempo del día, no como dirección geográfica, y puede distraer del sentido dimensional del pasaje.
  - severity: low
    issue: La nota alternativa reproduce la misma dificultad semántica
    rationale: Si el texto principal se corrige a una formulación espacial, la nota también debe reflejar alternativas españolas igualmente espaciales y fieles al hebreo.
  revised_spanish_text: Y el ancho del atrio, en el lado oriental[a], hacia el oriente, será de cincuenta codos.
