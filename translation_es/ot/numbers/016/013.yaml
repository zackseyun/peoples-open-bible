revisions:
- from: ¿Es poco que nos hayas sacado de una tierra que fluye leche y miel para matarnos en el desierto[a], que además quieras dominarnos[b] sobre nosotros?
  to: ¿Es poco que nos hayas sacado de una tierra que mana leche y miel para matarnos en el desierto[a], que además quieras hacerte gobernante sobre nosotros[b]?
  rationale: 'Se corrigió la cláusula final para reflejar con fidelidad el verbo hebreo intensificado y para producir un español natural: la acusación es que Moisés quiere erigirse como gobernante sobre ellos, no simplemente «dominarlos». También se ajustó «fluye» a «mana» por ser la fórmula idiomática española más clara y ampliamente reconocible para este giro bíblico, sin perder la ironía del original.'
