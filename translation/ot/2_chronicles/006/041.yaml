id: 2CH.6.41
reference: 2 Chronicles 6:41
source:
  edition: WLC
  text: וְ/עַתָּ֗ה קוּמָ֞/ה יְהוָ֤ה אֱלֹהִים֙ לְֽ/נוּחֶ֔/ךָ אַתָּ֖ה וַ/אֲר֣וֹן עֻזֶּ֑/ךָ כֹּהֲנֶ֜י/ךָ יְהוָ֤ה אֱלֹהִים֙ יִלְבְּשׁ֣וּ תְשׁוּעָ֔ה וַ/חֲסִידֶ֖י/ךָ יִשְׂמְח֥וּ בַ/טּֽוֹב׃
translation:
  text: And now arise[a], O Yahweh God, to your resting place, you and the ark of your strength. Let your priests, O Yahweh God, be clothed with salvation[c][b], and let your faithful ones rejoice in what is good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ark of your might' or 'the ark of your power.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your godly ones' or 'your saints.'
    reason: lexical_alternative
  - marker: c
    text: Or 'rejoice in your goodness.' The Hebrew reads simply 'in the good/goodness,' without an explicit possessive.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing the climactic petition. 'And now' preserves the connective force of ו plus the adverb עתה.
- source_word: קוּמָה
  chosen: arise
  alternatives:
  - rise up
  - stand up
  lexicon: HALOT
  rationale: Imperative of קום used in prayer language addressed to God. 'Arise' is idiomatic, dignified, and fits the liturgical setting without over-paraphrase.
- source_word: יְהוָה אֱלֹהִים
  chosen: O LORD God
  alternatives:
  - O Yahweh God
  lexicon: HALOT
  rationale: Direct address combining the divine name and 'God.' Per doctrine, יְהוָה is rendered 'the LORD.' 'O' reflects vocative force in English prayer style.
- source_word: לְנוּחֶךָ
  chosen: to your resting place
  alternatives:
  - to your rest
  - to your place of rest
  lexicon: HALOT
  rationale: The noun from נוח denotes rest/resting place. In context of temple/ark theology, 'resting place' best conveys destination and settled dwelling, not merely abstract rest.
- source_word: אַתָּה וַאֲרוֹן עֻזֶּךָ
  chosen: you and the ark of your strength
  alternatives:
  - you and the ark of your might
  - you and the ark of your power
  lexicon: HALOT
  rationale: Formal apposition after the petition to arise. עֹז commonly denotes strength/might. 'Strength' is retained in the main text to stay close to the Hebrew and to echo biblical idiom; alternatives are viable English glosses.
- source_word: כֹּהֲנֶיךָ
  chosen: your priests
  lexicon: HALOT
  rationale: Straightforward possessive plural; no reason to expand or paraphrase.
- source_word: יִלְבְּשׁוּ תְשׁוּעָה
  chosen: be clothed with salvation
  alternatives:
  - put on salvation
  - be clothed with deliverance
  lexicon: HALOT
  rationale: The clothing metaphor should be preserved. תְּשׁוּעָה can mean salvation/deliverance/victory; 'salvation' is the broadest and most theologically natural in English while remaining faithful to the Hebrew.
- source_word: חֲסִידֶיךָ
  chosen: your faithful ones
  alternatives:
  - your godly ones
  - your saints
  - your loyal ones
  lexicon: HALOT
  rationale: From חסיד, denoting those characterized by covenant loyalty/piety. 'Faithful ones' is readable modern English and avoids importing later ecclesiastical overtones of 'saints,' while preserving the relational sense better than the vaguer 'good people.'
- source_word: יִשְׂמְחוּ בַטּוֹב
  chosen: rejoice in goodness
  alternatives:
  - rejoice in what is good
  - rejoice in your goodness
  - be glad in prosperity
  lexicon: HALOT
  rationale: The phrase literally means 'rejoice in the good/goodness.' Because the Hebrew lacks an explicit possessive, 'in goodness' preserves the terseness and ambiguity better than 'in your goodness,' though that is a plausible interpretive alternative in context.
