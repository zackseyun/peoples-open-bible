translation:
  language: es
  text: Y salió un decreto a las ciudades griegas vecinas[a], por sugerencia de Ptolomeo, para que siguieran la misma política contra los judíos y los mataran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa un verbo más gráfico, literalmente relacionado con las entrañas; aquí indica una matanza brutal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ψήφισμα
  english_pob_choice: decree
  chosen_spanish: decreto
  alternatives_spanish:
  - resolución
  - edicto
  lexicon: LSJ
  rationale: ψήφισμα designa una decisión u orden formal de carácter público. En español, «decreto» comunica bien ese carácter oficial y promulgatorio sin sonar forzado.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue emitido
  - se promulgó
  lexicon: LSJ
  rationale: La imagen griega de una orden que ‘sale’ se conserva de forma natural con «salió», que en español puede expresar la difusión o promulgación de un decreto.
- source_word: ἀστυγείτονας
  english_pob_choice: neighboring
  chosen_spanish: vecinas
  alternatives_spanish:
  - próximas
  - cercanas
  lexicon: LSJ
  rationale: El compuesto indica ciudades en la región inmediata. «Vecinas» es conciso, idiomático y mantiene la relación espacial.
- source_word: Ἑλληνίδας πόλεις
  english_pob_choice: Greek cities
  chosen_spanish: ciudades griegas
  alternatives_spanish:
  - ciudades helénicas
  - ciudades de cultura griega
  lexicon: LSJ
  rationale: La referencia es a ciudades identificadas como griegas en sentido cultural/político. «Ciudades griegas» es claro y fiel al uso del inglés auditado.
- source_word: Πτολεμαίου ὑποθεμένου
  english_pob_choice: at the suggestion of Ptolemy
  chosen_spanish: por sugerencia de Ptolomeo
  alternatives_spanish:
  - a propuesta de Ptolomeo
  - con Ptolomeo como impulsor
  lexicon: LSJ
  rationale: El genitivo absoluto presenta a Ptolomeo como quien impulsa la medida. «Por sugerencia de Ptolomeo» transmite bien la iniciativa sin exceso de literalidad.
- source_word: τὴν αὐτὴν ἀγωγὴν
  english_pob_choice: the same policy
  chosen_spanish: la misma política
  alternatives_spanish:
  - la misma conducta
  - el mismo proceder
  lexicon: LSJ
  rationale: Aquí ἀγωγή se refiere a una línea de actuación o trato impuesto. «Política» funciona en el contexto administrativo y reproduce la decisión léxica del POB inglés.
- source_word: ἄγειν
  english_pob_choice: to follow
  chosen_spanish: siguieran
  alternatives_spanish:
  - aplicaran
  - llevaran a cabo
  lexicon: LSJ
  rationale: En combinación con ἀγωγή, el infinitivo expresa la ejecución de esa política. En español, «siguieran» conserva la idea de conformarse a una pauta impuesta.
- source_word: σπλαγχνίζειν
  english_pob_choice: to kill them
  chosen_spanish: los mataran
  alternatives_spanish:
  - los asesinaran
  - los exterminaran
  lexicon: LSJ
  rationale: El verbo griego es muy gráfico y violento, con una asociación corporal intensa. Siguiendo la revisión inglesa hacia un registro más neutral, «mataran» mantiene el sentido letal sin añadir matiz interpretativo excesivo.
theological_decisions:
- issue: Cómo reflejar la violencia de σπλαγχνίζειν sin sobretraducir el verbo
  english_pob_reading: to kill them
  chosen_spanish_reading: los mataran
  alternative_spanish_readings:
  - los asesinaran
  - los degollaran
  rationale: El griego es vívido y brutal, pero la revisión inglesa optó por un verbo más neutral en registro formal. En español, «los mataran» preserva la muerte intencional sin convertir el texto en una paráfrasis más gráfica que la lectura auditada.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que cambió «slaughter them» por «kill them» para un registro más neutro y formal. Por eso el español evita un término excesivamente plástico como «degollarlos» o «destriparlos», pero mantiene explícita la violencia en «los mataran» y la nota explica el matiz griego.
  spanish_consistency_notes:
  - Se mantuvo «Ptolomeo» como nombre propio en forma española estándar.
  - Se usó «judíos» para τῶν Ἰουδαίων, coherente con el inglés auditado y el uso bíblico normal en español.
  - Se prefirió «decreto» en vez de «edicto» por su resonancia administrativa general y su cercanía al valor del ψήφισμα griego.
  - La nota a pie de página se ancla en el tramo verbal violento para preservar la tensión lexical documentada.
