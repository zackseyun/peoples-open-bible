translation:
  language: es
  text: 'Y Rubén les dijo: «No derramen sangre. Arrójenlo en este pozo[a] que está en esta región desierta, pero no le pongan la mano encima»—para rescatarlo de la mano de ellos[b] y devolverlo a su padre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cisterna». El hebreo בּוֹר puede referirse a un pozo o a una cisterna.
    reason: lexical_alternative
  - marker: b
    text: O «de su mano». El hebreo dice literalmente «de la mano de ellos», conservando la imagen de poder o control.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Reuben
  alternatives_spanish:
  - Rubén
  lexicon: transliteración convencional
  rationale: Se mantiene el nombre propio en forma transliterada como en la tradición de la POB en inglés; 'Reuben' es reconocible en español bíblico y evita una normalización no atestiguada por la fuente auditada.
- source_word: אַל תִּשְׁפְּכוּ דָם
  english_pob_choice: Do not shed blood
  chosen_spanish: No derramen sangre
  alternatives_spanish:
  - No derramen la sangre
  - No lo maten
  lexicon: HALOT
  rationale: Se conserva el idiomático 'derramar sangre', que refleja el hebreo y mantiene la fuerza de violencia con culpa de sangre sin reducirlo a una mera orden de 'matar'.
- source_word: הַשְׁלִיכוּ אֹתוֹ
  english_pob_choice: Throw him
  chosen_spanish: Arrojenlo
  alternatives_spanish:
  - Échenlo
  - Tírenlo
  lexicon: HALOT
  rationale: '''Arrojenlo'' expresa bien el imperativo físico de השליך en español moderno y conserva el tono directo del mandato. ''Échenlo'' es posible, pero puede sonar menos preciso según el registro regional.'
- source_word: הַבּוֹר
  english_pob_choice: pit
  chosen_spanish: pozo
  alternatives_spanish:
  - foso
  - cisterna
  - hoyo
  lexicon: HALOT
  rationale: En español, 'pozo' puede abarcar el hueco profundo de la narración y resulta natural; no obstante, el hebreo admite 'cisterna', por lo que la equivalencia exacta queda abierta. Se evita fijar una lectura demasiado técnica en el texto principal.
- source_word: אֲשֶׁר בַּמִּדְבָּר
  english_pob_choice: that is in the wilderness
  chosen_spanish: que está en el desierto
  alternatives_spanish:
  - que está en el desierto/estepa
  - que está en el lugar desierto
  lexicon: HALOT
  rationale: '''Desierto'' es la forma más natural en español para traducir מִדְבָּר en este contexto narrativo; se conserva la relación explicativa con ''que está'' siguiendo la revisión inglesa que hizo explícito el vínculo relativo.'
- source_word: וְיָד אַל תִּשְׁלְחוּ ב֑וֹ
  english_pob_choice: do not lay a hand on him
  chosen_spanish: no extiendan la mano contra él
  alternatives_spanish:
  - no le echen mano
  - no pongan la mano sobre él
  lexicon: HALOT
  rationale: Se traduce la locución idiomática con una expresión natural en español que preserve la idea de agresión física. 'Contra él' explicita la dirección hostil implícita en el hebreo sin perder el paralelismo con la mano.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - para que
  - a fin de
  lexicon: HALOT
  rationale: Se usa 'para' en una cláusula de propósito compacta y natural. El valor final de לְמַעַן queda claro por el contexto, y la formulación mantiene la relación con el comentario narrativo posterior.
- source_word: הַצִּיל אֹתוֹ מִיָּדָם
  english_pob_choice: he might rescue him from their hand
  chosen_spanish: rescatarlo de la mano de ellos
  alternatives_spanish:
  - librarlo de la mano de ellos
  - salvarlo de su mano
  lexicon: HALOT
  rationale: '''Rescatarlo'' conserva היטב el sentido de נצל. Se mantiene ''de la mano de ellos'' para respetar el idiomático hebreo sobre poder/control; ''de su mano'' es posible, pero ''de ellos'' sigue de cerca el plural del original.'
- source_word: לַהֲשִׁיבוֹ אֶל אָבִיו
  english_pob_choice: to return him to his father
  chosen_spanish: y devolverlo a su padre
  alternatives_spanish:
  - y traerlo de vuelta a su padre
  - y hacer que volviera a su padre
  lexicon: HALOT
  rationale: '''Devolverlo'' reproduce el causativo de שוב de manera concisa y natural en español. Se añade ''y'' para reflejar la progresión narrativa del comentario de autor sobre la intención de Rubén.'
theological_decisions:
- issue: Expresión de la violencia prohibida en el mandato
  english_pob_reading: Do not shed blood
  chosen_spanish_reading: No derramen sangre
  alternative_spanish_readings:
  - No maten
  - No derramen la sangre
  rationale: Se preserva la carga moral y legal del hebreo sin convertirla en una mera equivalencia semántica general. 'Derramar sangre' deja visible la fórmula bíblica y su asociación con violencia culpable.
  doctrine_reference: Gn 9:6; cf. la prohibición de sangre inocente en la Torá
- issue: Relación entre el discurso de Rubén y el comentario narrativo de propósito
  english_pob_reading: —that he might rescue him...
  chosen_spanish_reading: —para rescatarlo... y devolverlo...
  alternative_spanish_readings:
  - —a fin de rescatarlo...
  - —para que lo rescatara...
  rationale: Se mantiene la distinción entre las palabras de Rubén y la explicación narrativa del narrador. El guion largo ayuda a mostrar que el propósito es un comentario autoral, no necesariamente parte de la cita directa.
  doctrine_reference: Principios de discurso narrativo en el Pentateuco
- issue: La mano como idiomático de poder o agresión
  english_pob_reading: from their hand
  chosen_spanish_reading: de la mano de ellos
  alternative_spanish_readings:
  - de su poder
  - de ellos
  rationale: Se conserva la metáfora hebrea de la 'mano' como poder/control, evitando una paráfrasis que borre la imagen. Esto mantiene la tensión textual y la transparencia frente al original.
  doctrine_reference: Usos idiomáticos hebreos de יָד
translation_notes:
  revision_awareness: La redacción española toma en cuenta la última revisión inglesa que hizo explícito 'that is' en 'this pit that is in the wilderness'. Por eso se traduce con 'este pozo que está en el desierto'. También se respeta la separación sintáctica del propósito con un guion largo, siguiendo el ajuste editorial que clarificó que el último segmento funciona como comentario narrativo. El texto principal evita añadir interpretaciones que no estén sustentadas por el hebreo.
  spanish_consistency_notes:
  - Se mantiene 'mano' en singular/ plural según el hebreo idiomático ('la mano de ellos').
  - Se usa 'pozo' en el texto principal, con nota de alternativa donde el hebreo permite 'cisterna'.
  - Se conserva el nombre 'Reuben' por coherencia con transliteración bíblica editorial; la alternativa 'Rubén' queda documentada en nota.
  - El registro es reverente pero contemporáneo, evitando arcaísmos innecesarios como 'no derramen sangre' sigue siendo transparente y bíblicamente reconocible.
