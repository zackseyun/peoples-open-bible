translation:
  language: es
  text: Declaré las cosas de antaño hace ya mucho tiempo[a]; salieron de mi boca, y las hice oír. De repente actué[b], y llegaron a cumplirse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las cosas primeras» o «las cosas anteriores». El hebreo puede referirse a hechos o anuncios previos; «las cosas de antaño» conserva esa referencia temporal remota.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo hice». El verbo hebreo es el común «hacer», aquí en un contexto donde Dios trae a cumplimiento lo que había declarado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִאשֹׁנוֹת
  english_pob_choice: the former things
  chosen_spanish: las cosas de antaño
  alternatives_spanish:
  - las cosas anteriores
  - las cosas primeras
  - las cosas de antes
  lexicon: HALOT
  rationale: La expresión hebrea substantivada se refiere a hechos o anuncios previos; en español, «las cosas de antaño» conserva la idea de anterioridad remota y suena natural en un contexto profético.
- source_word: מֵאָז
  english_pob_choice: long ago
  chosen_spanish: desde hace mucho tiempo
  alternatives_spanish:
  - desde entonces
  - desde antaño
  - de antiguo
  lexicon: HALOT
  rationale: El adverbio marca distancia temporal amplia. «Desde hace mucho tiempo» expresa mejor esa lejanía en español actual sin perder el sentido de remota declaración.
- source_word: הִגַּדְתִּי
  english_pob_choice: I declared
  chosen_spanish: yo declaré
  alternatives_spanish:
  - yo anuncié
  - yo dije
  - yo proclamé
  lexicon: HALOT
  rationale: El hifil de נגד implica dar a conocer formalmente. «Declaré» mantiene el tono solemne y profético mejor que un simple «dije».
- source_word: וּמִפִּי יָצְא֖וּ
  english_pob_choice: they went out from my mouth
  chosen_spanish: salieron de mi boca
  alternatives_spanish:
  - salieron de mi boca
  - procedieron de mi boca
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de palabras que salen de la boca de Dios. «Salieron de mi boca» es fiel y natural en español.
- source_word: וְאַשְׁמִיעֵם
  english_pob_choice: and I made them heard
  chosen_spanish: y yo las hice oír
  alternatives_spanish:
  - y las proclamé
  - y las hice conocer
  - y las hice ser oídas
  lexicon: HALOT
  rationale: 'El hifil de שמע tiene fuerza causativa: hacer que sean oídas. «Las hice oír» conserva esa causalidad sin sonar rígido en español.'
- source_word: פִּתְאֹם
  english_pob_choice: Suddenly
  chosen_spanish: De repente
  alternatives_spanish:
  - súbitamente
  - inesperadamente
  lexicon: HALOT
  rationale: El adverbio indica irrupción brusca de la acción divina. «De repente» es el equivalente más natural y directo.
- source_word: עָשִׂיתִי
  english_pob_choice: I acted
  chosen_spanish: actué
  alternatives_spanish:
  - lo hice
  - lo llevé a cabo
  - lo realicé
  lexicon: HALOT
  rationale: El verbo común עשׂה puede expresar hacer/obrar. Aquí, en el marco de cumplimiento profético, «actué» preserva la idea de intervención divina sin añadir más de lo que el hebreo dice.
- source_word: וַתָּבֹאנָה
  english_pob_choice: and they came to pass
  chosen_spanish: y sucedieron
  alternatives_spanish:
  - y llegaron a cumplirse
  - y vinieron a ser
  - y acontecieron
  lexicon: HALOT
  rationale: La forma femenina plural retoma «las cosas de antaño». En español, «sucedieron» comunica cumplimiento de acontecimientos de manera clara y menos arcaizante que «vinieron a pasar».
theological_decisions:
- issue: Relación entre profecía divina y cumplimiento histórico
  english_pob_reading: Dios anunció los acontecimientos y luego los llevó a cabo; la traducción mantiene tanto la declaración como la acción divina.
  chosen_spanish_reading: Dios los declaró de antemano, los hizo oír y luego actuó para que sucedieran.
  alternative_spanish_readings:
  - Solo los anunció y luego ocurrieron
  - Los predijo sin enfatizar que él mismo actuó
  rationale: El orden del verso presenta anuncio, comunicación y realización. Traducir «actué» conserva la afirmación de intervención divina sin convertirla en una explicación más fuerte que el texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa más reciente se mantiene sin cambios en la auditoría; esta propuesta sigue esa lectura y traslada al español las mismas decisiones léxicas y teológicas, con ajustes idiomáticos naturales.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por la primera persona divina del versículo, sin introducir «Yahvé» porque aquí el texto habla en voz directa de primera persona.
  - Se conserva la metáfora de la boca de Dios («salieron de mi boca») por su fuerza profética.
  - «Actué» intenta reflejar el valor de עָשִׂיתִי sin cerrarlo exclusivamente en «lo hice», dejando visible la relación entre acción divina y cumplimiento.
  - «Sucedieron» evita una paráfrasis excesiva y conserva el sentido de realización de hechos anunciados.
