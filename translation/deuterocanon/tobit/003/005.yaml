id: TOB.3.5
reference: Tobit 3:5
source:
  edition: lxx-swete-1909
  text: καὶ νῦν πολλαὶ αἱ κρίσεις σοῦ εἰσὶν ἀληθιναί, ἐξ ἐμοῦ ποιῆσαι περὶ τῶν ἁμαρτιῶν μου καὶ τῶν πατέρων μου, ὅτι οὐκ ἐποιήσαμεν τὰς ἐντολάς σου· οὐ γὰρ ἐπορεύθημεν ἐν ἀληθείᾳ ἐνώπιόν σου.
  language: Greek
  pages:
  - 832
  - 835
  - 836
  - 837
  - 838
  - 839
  - 840
  - 841
  confidence: high
  validation: agree
translation:
  text: And now your judgments are many and true in dealing with me concerning my sins and the sins of my fathers[a], because we did not keep your commandments[b]; for we did not walk in truth before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your judgments are many and just.' The Greek says 'true,' which in context affirms the rightness of God's judgments.
    reason: lexical_alternative
  - marker: b
    text: '''Walk in truth'' is a biblical idiom for living faithfully and truthfully before God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίσεις
  chosen: judgments
  alternatives:
  - judicial acts
  - sentences
  - decisions
  lexicon: LSJ
  rationale: κρίσεις in this penitential context refers to God's judicial dealings or judgments. 'Judgments' preserves the formal sense and fits the following infinitive phrase about what God does concerning sin.
- source_word: ἀληθιναί
  chosen: 'true'
  alternatives:
  - just
  - genuine
  lexicon: LSJ
  rationale: The adjective most directly means 'true.' In context it implies the rightness of God's judgments, but 'true' preserves the source wording without over-interpreting it as only 'just.'
- source_word: ἐξ ἐμοῦ ποιῆσαι
  chosen: in dealing with me
  alternatives:
  - to act against me
  - to do with me
  - to act concerning me
  lexicon: LSJ
  rationale: The Greek construction is awkward in English if rendered too literally. 'In dealing with me' captures the sense of God's action toward Tobit while remaining anchored to the wording. 'Against me' would overstate hostility not explicit in the phrase.
- source_word: περὶ τῶν ἁμαρτιῶν μου καὶ τῶν πατέρων μου
  chosen: concerning my sins and the sins of my fathers
  alternatives:
  - for my sins and my fathers' sins
  - with respect to my sins and my fathers' sins
  lexicon: LSJ
  rationale: περί here marks reference or basis. Expanding the ellipsis with the second 'sins' makes the English clear and reflects the genitive structure.
- source_word: ἐντολάς
  chosen: commandments
  alternatives:
  - commands
  lexicon: LSJ
  rationale: A standard rendering that preserves the covenantal and moral weight of the term.
- source_word: ἐπορεύθημεν ἐν ἀληθείᾳ
  chosen: we did not walk in truth
  alternatives:
  - we did not live faithfully
  - we did not walk faithfully
  - we did not conduct ourselves truthfully
  lexicon: LSJ
  rationale: The idiom 'walk' is biblically natural in English and preserves the metaphor of conduct. ἐν ἀληθείᾳ can suggest faithfulness or truthfulness; 'in truth' keeps the lexical link to ἀληθιναί earlier in the verse and preserves the theological breadth.
- source_word: ἐνώπιόν σου
  chosen: before you
  alternatives:
  - in your presence
  lexicon: LSJ
  rationale: '''Before you'' is concise, idiomatic, and preserves the relational and judicial sense of living under God''s sight.'
