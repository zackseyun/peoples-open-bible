base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/028/001.yaml
  text: Do not boast about tomorrow’s trouble[b][a], for you do not know what a day may bring forth.
  footnotes:
  - marker: a
    text: The extant Hebrew line supplied for this verse reads, 'Do not dread tomorrow's trouble, for you do not know what a day will bring forth,' which does not match the Greek Sirach text here and appears to reflect a different verse or a transmission mismatch. The translation therefore follows the Greek witness for Sirach 28:1.
    reason: textual_variant
  - marker: b
    text: Or 'he will keep his sins stored up.' The Greek repeats the same verb for emphasis.
    reason: lexical_alternative
