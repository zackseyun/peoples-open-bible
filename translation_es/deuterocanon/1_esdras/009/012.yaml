  to: ni siquiera en dos días[a], porque hemos pecado grandemente en estos asuntos. Pero que se pongan en pie los dirigentes[b] de la multitud, y que todos los de nuestras poblaciones[c] que tienen esposas extranjeras se presenten en un tiempo señalado[d].
  rationale: Se ajustó el texto para reflejar con más precisión el contexto matrimonial ('esposas extranjeras'), el sentido de procedencia de οἱ ἐκ τῶν κατοικιῶν ἡμῶν ('los de nuestras poblaciones') y una formulación española más natural para ἐν τούτοις ('en estos asuntos'). Se conservaron las demás decisiones porque representan fielmente el griego y la auditoría inglesa.
