base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/016/027.yaml
  text: And behold[a], I stretched out my hand against you, and I reduced your allotted portion, and gave you over to the desire of those who hate you, the daughters of the Philistines[c][b], who are ashamed of your lewd way.
  footnotes:
  - marker: a
    text: Or 'your due,' 'your allowance,' or 'your share' for 'your allotted portion.' The Hebrew term can denote what is prescribed or allotted.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the will of those who hate you.' The Hebrew expression literally includes 'soul,' here meaning desire, appetite, or will.
    reason: lexical_alternative
  - marker: c
    text: '''The daughters of the Philistines'' preserves the prophetic personification of peoples or cities as daughters.'
    reason: cultural_note
