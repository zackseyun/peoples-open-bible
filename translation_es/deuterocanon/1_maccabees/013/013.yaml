lexical_decisions:
- source_word: Σίμων
  english_pob_choice: Simon
  chosen_spanish: Simón
  alternatives_spanish:
  - Simon
  lexicon: nombre propio bíblico
  rationale: 'El nombre propio se adapta al uso español habitual con tilde: «Simón».'
- source_word: παρενέβαλεν
  english_pob_choice: encamped
  chosen_spanish: acampó
  alternatives_spanish:
  - acamparon
  - estableció su campamento
  lexicon: LSJ
  rationale: El verbo griego en contexto militar indica la acción de acampar. «Acampó» es natural en español y conserva el sentido militar sin añadir matices innecesarios.
- source_word: ἐν Ἀδείδοις
  english_pob_choice: at Adida
  chosen_spanish: en Adida
  alternatives_spanish:
  - a Adida
  - en la ciudad de Adida
  lexicon: LSJ
  rationale: Con ἐν + topónimo, el español puede reproducir la localización con «en». Se conserva la transliteración «Adida» para el nombre del lugar.
- source_word: κατὰ πρόσωπον
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - enfrente de
  - delante de
  lexicon: LSJ
  rationale: La expresión marca una posición espacial frontal u opuesta. «Frente a» es la opción más natural en español para una descripción geográfica o militar.
- source_word: τοῦ πεδίου
  english_pob_choice: the plain
  chosen_spanish: la llanura
  alternatives_spanish:
  - el llano
  - el campo
  lexicon: LSJ
  rationale: πέδιον designa una llanura o terreno llano. «La llanura» es preciso y más idiomático que «el campo» en este contexto.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: LSJ
  rationale: La partícula introduce una transición narrativa leve; «Pero» reproduce ese enlace discursivo en español, sin forzar una oposición fuerte.
