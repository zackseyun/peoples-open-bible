  yaml_path: translation/deuterocanon/wisdom_of_solomon/004/019.yaml
  text: And after this they will become a dishonored corpse and a reproach among the dead forever[a]. For he will dash them down headlong and speechless, and shake them from their foundations; they will be laid waste to the uttermost, and they will be in pain[b], and their memory will perish.
  footnotes:
  - marker: a
    text: Or 'a dishonored fallen body'; the Greek πτῶμα can denote a fallen body/corpse, emphasizing the shame of their end.
    reason: lexical_alternative
  - marker: b
    text: The subject of 'he will dash' and 'shake' is implicit in Greek; in context it refers to God’s judgment, though the verse does not repeat the divine name.
    reason: alternative_reading
