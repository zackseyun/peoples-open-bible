    reason: lexical_alternative
  revision_rationale: Se corrige la colocación verbal para que el español sea natural y fiel al modismo hebreo, sustituyendo «ruega/rogó el favor» por «implora/imploró el favor». También se mueve la nota al lugar correcto, junto a la referencia idiomática a Yahvé tu Dios, porque esa nota no explica «hombre de Dios» sino חלה את־פני יְהוָה.
