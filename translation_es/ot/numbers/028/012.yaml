  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y las medidas cultuales: ''tres/dos décimas de efa'', ''flor de harina'', y ''mezclada con aceite'' corresponden adecuadamente a עשרנים, סלת y בלולה בשמן. También conserva la relación distributiva con cada animal. Sin embargo, ''el único toro / el único carnero'' sobretraduce הָאֶחָד, sugiriendo exclusividad absoluta (''único'') en lugar de singular/distributivo (''un'' o ''cada'').'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'para el único toro' y 'para el único carnero' suenan poco naturales y semánticamente engañosos en español bíblico actual. 'Ofrenda vegetal' es comprensible, aunque en este contexto sacrificial 'ofrenda de grano' o 'ofrenda vegetal' ambas son defendibles; no exige cambio. La nota b es defectuosa porque repite exactamente la lectura principal en vez de ofrecer una alternativa real.
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. ''Flor de harina'' y ''ofrenda vegetal'' son aceptables para סלת y מנחה. La principal desalineación léxica está en הָאֶחָד: debe evitarse ''único'' y preferirse una formulación natural que preserve singularidad sin exclusividad, como ''para un toro ... para un carnero''.'
  issues:
  - severity: high
    issue: '''el único toro / el único carnero'' para הָאֶחָד'
    rationale: En español, 'único' comunica exclusividad absoluta, no simplemente singularidad distributiva. El hebreo no dice que sea el único toro existente, sino que prescribe la porción correspondiente a cada toro/carnero individual.
  - severity: medium
    issue: Nota b no aporta alternativa lexical real
    rationale: La nota dice 'O “mezclada con aceite”', idéntico al texto principal. Debe reflejar la alternativa documentada por el inglés, p. ej. 'O “mezclada/entremezclada con aceite”' o equivalente realmente distinto.
  revised_spanish_text: y tres décimas de efa de flor de harina como ofrenda vegetal[a], mezclada con aceite, para un toro, y dos décimas de efa de flor de harina como ofrenda vegetal, mezclada con aceite[b], para un carnero.
  revised_footnotes:
