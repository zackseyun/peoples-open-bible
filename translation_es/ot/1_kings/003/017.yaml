translation:
  language: es
  text: 'Entonces una mujer dijo[a]: «Por favor, mi señor, yo y esta mujer vivíamos en una sola casa, y di a luz mientras ella estaba en la casa conmigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «di a luz con ella en la casa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּי אֲדֹנִי
  english_pob_choice: Please, my lord
  chosen_spanish: Por favor, mi señor
  alternatives_spanish:
  - Ruego, mi señor
  - Por favor, señor mío
  lexicon: HALOT
  rationale: בִּי funciona aquí como una súplica o apelación cortés; en español, «Por favor» expresa bien esa petición. אֲדֹנִי se rinde como «mi señor» para conservar el matiz de respeto del hebreo.
- source_word: הָאִשָּׁה הָאַחַת
  english_pob_choice: one woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - la una mujer
  - una de las mujeres
  lexicon: HALOT
  rationale: La frase identifica a una de las dos mujeres del relato. En español, «una mujer» suena natural y evita una literalidad innecesaria.
- source_word: יֹשְׁבֹת
  english_pob_choice: were living
  chosen_spanish: vivíamos
  alternatives_spanish:
  - estábamos viviendo
  - habitábamos
  lexicon: HALOT
  rationale: El participio describe residencia continua en un contexto doméstico y narrativo pasado; «vivíamos» comunica esa situación de manera natural sin perder la idea de permanencia.
- source_word: בְּבַיִת אֶחָד
  english_pob_choice: in one house
  chosen_spanish: en una misma casa
  alternatives_spanish:
  - en una casa
  - en la misma casa
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en una casa». «Una misma casa» preserva la concreción y también deja claro que se trata del mismo lugar compartido por ambas mujeres.
- source_word: וָאֵלֵד
  english_pob_choice: I gave birth
  chosen_spanish: di a luz
  alternatives_spanish:
  - daba a luz
  - parí
  lexicon: HALOT
  rationale: En el qal, ילד aplicado a una mujer significa dar a luz. «Di a luz» es la forma española natural y digna para ese acto.
- source_word: עִמָּהּ
  english_pob_choice: while she was in the house with me
  chosen_spanish: mientras ella estaba en la casa conmigo
  alternatives_spanish:
  - con ella
  - junto a ella
  lexicon: HALOT
  rationale: El hebreo literalmente dice «con ella», pero en español esa reducción puede sonar ambigua. La expansión sigue de cerca el contexto de la casa compartida y hace explícita la relación espacial sin añadir información nueva.
- source_word: בַּבָּיִת
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - dentro de la casa
  - en esa casa
  lexicon: HALOT
  rationale: Se conserva la repetición concreta de la casa como escenario del nacimiento, igual que en el hebreo y en la solución inglesa auditada.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «live» a «were living» para reflejar mejor el contexto narrativo pasado; la traducción española adopta directamente ese valor de estado continuo en pasado con «vivíamos».
  spanish_consistency_notes:
  - Se mantuvo «mi señor» como tratamiento respetuoso, acorde con el valor de אֲדֹנִי en el contexto judicial.
  - Se evitó «SEÑOR» para no introducir una convención de máscara no presente en el hebreo de este versículo.
  - «Casa» se repite para conservar la concreción espacial del original y la relación entre el nacimiento y el mismo lugar compartido.
