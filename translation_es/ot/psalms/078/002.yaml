revisions:
- from: Abriré mi boca en una parábola[a][d][b][c]; pronunciaré enigmas desde hace mucho tiempo.
  to: Abriré mi boca en una parábola[a][d][b][c]; pronunciaré enigmas desde antiguo.
  rationale: Se conserva la elección principal del borrador, pero se ajusta la expresión temporal a 'desde antiguo' para reflejar mejor מִנִּי קֶדֶם y mantener un registro más poético y bíblico. También se corrige la nota alternativa de חִידוֹת para que la opción tradicional corresponda mejor al inglés auditado y al uso natural en español.
