translation:
  language: es
  text: Que viva, y que se le dé[a] oro de Sabá. Que se haga oración por él continuamente[b]; todo el día, que lo bendigan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «y que él le dé oro de Sabá». El verbo hebreo es activo, pero el sujeto no se especifica; el texto principal usa un pasivo español para expresar el sentido con naturalidad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y que uno ore por él» / «y que oren por él». El hebreo no explicita el sujeto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיחִי
  english_pob_choice: May he live
  chosen_spanish: Viva
  alternatives_spanish:
  - Que viva
  - Viva él
  lexicon: HALOT
  rationale: El jussivo expresa un deseo o bendición; en español, «Viva» comunica de forma natural y digna ese matiz volitivo sin volverlo simple futuro.
- source_word: וְיִתֶּן לוֹ
  english_pob_choice: may ... be given to him
  chosen_spanish: que se le dé
  alternatives_spanish:
  - y que él dé a él
  - y le dará
  lexicon: HALOT
  rationale: El hebreo está en forma activa, pero el sujeto queda implícito. El pasivo impersonal español conserva el sentido de tributo ofrecido al rey sin forzar un sujeto explícito.
- source_word: מִזְּהַב שְׁבָא
  english_pob_choice: gold from Sheba
  chosen_spanish: oro de Sabá
  alternatives_spanish:
  - oro de la tierra de Sabá
  - oro procedente de Sabá
  lexicon: HALOT
  rationale: La construcción indica procedencia o fuente. «Oro de Sabá» es breve, natural y fiel al vínculo geográfico del tributo.
- source_word: וְיִתְפַּלֵּל בַּעֲדוֹ
  english_pob_choice: May prayer be made for him
  chosen_spanish: Que se haga oración por él
  alternatives_spanish:
  - Que oren por él
  - Que uno ore por él
  lexicon: HALOT
  rationale: El hitpael con בעד expresa intercesión «por/en favor de». El español impersonal mantiene la indefinición del sujeto que el hebreo no especifica.
- source_word: תָמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - sin cesar
  - de continuo
  lexicon: HALOT
  rationale: «Continuamente» reproduce bien la regularidad ininterrumpida del adverbio en un registro elevado y claro.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - durante todo el día
  - a lo largo del día
  lexicon: HALOT
  rationale: La expresión temporal idiomática se vierte con una equivalencia natural en español, manteniendo el paralelismo poético.
- source_word: יְבָרֲכֶנְהוּ
  english_pob_choice: may they bless him
  chosen_spanish: que lo bendigan
  alternatives_spanish:
  - que uno lo bendiga
  - que ellos lo bendigan
  lexicon: HALOT
  rationale: El verbo permite un sujeto plural o indefinido. «Lo bendigan» preserva esa apertura y suena natural en el contexto de aclamación pública.
theological_decisions:
- issue: Referente real o mesiánico del salmo
  english_pob_reading: Retain the verse as a prayer/wish for the Davidic king without making an explicit messianic interpretation in the translation itself.
  chosen_spanish_reading: Conservar el verso como una oración o deseo por el rey davídico, sin fijar en la traducción una lectura mesiánica explícita.
  alternative_spanish_readings:
  - Leerlo directamente como profecía mesiánica
  - Traducirlo con lenguaje interpretativamente cristológico
  rationale: La traducción debe preservar el sentido inmediato del hebreo como petición real, pero sin cerrar la tensión canónica que permite una lectura mesiánica más amplia.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: 'La redacción sigue el flujo del texto hebreo y conserva las dos ambigüedades señaladas en el aparato inglés: el sujeto implícito de וְיִתֶּן לוֹ y el sujeto no explícito de וְיִתְפַּלֵּל בַּעֲדוֹ. Se evitó una formulación que haga de este versículo una paráfrasis más interpretativa que el original.'
  spanish_consistency_notes:
  - Se usó «Dios / Yahvé / Mesías» según las normas del proyecto, aunque en este versículo no aparecen.
  - Se mantuvo un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Las notas [a] y [b] están ancladas en el texto principal para reflejar las alternativas lexicográficas documentadas.
