    text: 'O: «guardan diligentemente». El hebreo intensifica el verbo con un infinitivo absoluto.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «todo este mandamiento» (singular), probablemente como expresión colectiva de la exigencia del pacto en su conjunto.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «aferrarse a él» o «mantenerse unidos a él».'
    reason: lexical_alternative
  revision_rationale: La revisión ajusta la intensificación verbal a una idea de diligencia/cuidado, separa con más naturalidad «les mando» de «cumplir», conserva el singular colectivo con una nota como en el POB inglés, y corrige la nota b eliminando el residuo inglés. También se prefiere «caminar» por mayor naturalidad moderna, sin perder la metáfora bíblica.
