review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y sigue de cerca las decisiones del POB en los puntos principales: posesión enfática («Mía es la venganza»), paralelismo con «retribución», la imagen de la caída («su pie»), la cercanía del día de calamidad y la idea concreta de «lo que les ha sido preparado». Sin embargo, requiere un ajuste menor de estilo y naturalidad: «al tiempo en que» y sobre todo «resbalará su pie» suenan algo rígidos en español bíblico actual; «cuando su pie resbale» preserva mejor la cláusula temporal hebrea y la imagen idiomática.'
  spanish_quality_summary: La redacción es generalmente digna y comprensible, pero presenta leve rigidez calcaica. «Mía es la venganza» funciona bien por solemnidad. «Porque cercano está» es aceptable aunque algo invertido; no necesita cambio. El principal problema de legibilidad es «resbalará su pie», menos natural que «su pie resbale» en una cláusula temporal introducida por «cuando». También conviene suavizar «al tiempo en que» a «cuando» para un español más claro sin pérdida semántica.
  glossary_alignment: 'Alineado con la terminología y la racionalidad del proyecto: «venganza» conserva el peso judicial de נָקָם; «retribución» representa bien וְשִׁלֵּם; «desastre» es válido para אֵיד; y «lo que les ha sido preparado» respeta la decisión teológica de no abstraer עֲתִדֹת לָמוֹ como «su condena» o «su destino». No hay conflictos con los glosarios de Yahvé/Mesías/etc. en este versículo.'
  issues:
  - severity: medium
    issue: La frase «al tiempo en que resbalará su pie» suena poco natural en español contemporáneo.
    rationale: Aunque es cercana al inglés auditado, en español la cláusula temporal se expresa mejor como «cuando su pie resbale», que preserva el valor temporal de לְעֵת y la imagen de תָּמוּט רַגְלָם sin rigidez innecesaria.
  - severity: low
    issue: La nota [c] usa «es comprimido», giro menos idiomático en español.
    rationale: En español suena mejor «el hebreo es conciso» o «el hebreo es condensado». Es un ajuste menor de calidad, no de sentido.
  revised_spanish_text: Mía es la venganza[a] y la retribución, cuando su pie resbale[b]; porque cercano está el día de su desastre, y se apresura lo que les ha sido preparado[c].
  revised_footnotes:
  - marker: a
    text: O «retribución» o «resarcimiento» para el sentido de «pago debido».
    reason: lexical_alternative
  - marker: b
    text: O «su pie da un traspié» o «su pie vacila».
    reason: lexical_alternative
  - marker: c
    text: O «las cosas destinadas para ellos se apresuran»; el hebreo es conciso.
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español sin alterar el sentido ni las decisiones léxicas del POB: «cuando su pie resbale» expresa mejor la cláusula temporal hebrea que «al tiempo en que resbalará su pie». También se pulió la redacción de la nota [c].'
