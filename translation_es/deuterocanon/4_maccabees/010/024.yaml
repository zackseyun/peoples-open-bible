translation:
  language: es
  text: ¡Oh, odioso y enemigo de la humanidad, qué haces al exponernos de esta manera![a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'al presentarnos de este modo'. El verbo griego puede significar 'poner delante' o 'exponer', y el contexto favorece la idea de presentar públicamente a los mártires al abuso o al castigo.
    reason: lexical_alternative
lexical_decisions:
- source_word: μισάρετε
  english_pob_choice: hateful
  chosen_spanish: aborrecedor
  alternatives_spanish:
  - odioso
  - detestable
  - el que aborrece
  lexicon: LSJ
  rationale: El vocativo expresa una invectiva fuerte. En español, 'aborrecedor' conserva el valor de insulto directo sin sonar tan abstracto como 'odioso' ni tan explicativo como una perífrasis.
- source_word: μισάνθρωπε
  english_pob_choice: misanthropic man
  chosen_spanish: enemigo de la humanidad
  alternatives_spanish:
  - misántropo
  - hombre que odia a la gente
  - enemigo de los hombres
  lexicon: LSJ
  rationale: El compuesto denota odio hacia las personas. 'Enemigo de la humanidad' mantiene el alcance colectivo del griego y su tono acusatorio, más naturalmente que un simple préstamo como 'misántropo'.
- source_word: τί δρῶντες
  english_pob_choice: what are you doing
  chosen_spanish: qué estás haciendo
  alternatives_spanish:
  - qué haces
  - qué estás actuando
  - qué estás realizando
  lexicon: LSJ
  rationale: El griego plantea una pregunta de acción. En español, la forma natural y fiel es la segunda persona singular 'qué estás haciendo', aunque el participio plural del griego no se reproduce literalmente.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: LSJ
  rationale: Es el objeto directo de la acción hostil. En español se expresa de manera natural con el clítico 'nos'.
- source_word: προθεῖς
  english_pob_choice: by exposing
  chosen_spanish: al exponernos
  alternatives_spanish:
  - al presentarnos
  - al poneros delante
  - al mostrarnos
  lexicon: LSJ
  rationale: La nota inglesa permite 'exposing' o 'setting forth'. En este contexto de maltrato público, 'exponernos' conserva la idea de poner a las víctimas al descubierto para abuso o castigo.
- source_word: τὸν τρόπον
  english_pob_choice: in this way
  chosen_spanish: de esta manera
  alternatives_spanish:
  - así
  - en esta forma
  - de este modo
  lexicon: LSJ
  rationale: La expresión idiomática se traduce de forma clara y natural en español con 'de esta manera'.
theological_decisions:
- issue: Tono de invectiva contra el persecutor
  english_pob_reading: O hateful and misanthropic man
  chosen_spanish_reading: ¡Oh, aborrecedor y enemigo de la humanidad!
  alternative_spanish_readings:
  - ¡Oh, odioso y misántropo!
  - ¡Oh, enemigo de los hombres!
  rationale: No hay aquí una afirmación doctrinal, sino un insulto martirial. Mantener el tono acusatorio preserva la fuerza retórica del pasaje sin suavizarlo con lenguaje piadoso.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: The English POB audit trail is stable and marked unchanged, but the cross-check summary flags major issues, so the Spanish draft preserves the lexical tension around προθεῖς by choosing a rendering that can still carry the alternative sense noted in the footnote.
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' fuera de este versículo porque no aparece lenguaje divino explícito.
  - Se evita 'Cristo' y terminología eclesial no presente en el griego.
  - La segunda persona singular en español refleja el ataque directo a un solo agresor, aunque el griego use un participio plural.
