translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: la ancha muralla de Babilonia[a] será derribada por completo[b], y sus puertas altas serán quemadas con fuego. Los pueblos trabajan para el vacío, y las naciones para el fuego, y se cansan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las anchas murallas de Babilonia»; el hebreo usa una forma plural, probablemente como colectivo para las fortificaciones de la ciudad.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «será totalmente desnudada»; «será derribada por completo» expresa el sentido en el contexto de una muralla de ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el nombre divino del proyecto en español, preservando el Tetragrámaton sin máscara litúrgica. 'Yahvé' es la forma base del POB y mantiene la correspondencia directa con el hebreo.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: En español, 'de los ejércitos' comunica bien el título divino y evita un calco menos natural como 'de los ejércitos' con sentido arcaizante; 'huestes' sería más tradicional pero menos claro para lectores amplios.
- source_word: חֹמוֹת בָּבֶל הָרְחָבָה
  english_pob_choice: Babylon’s broad wall
  chosen_spanish: los muros anchos de Babilonia
  alternatives_spanish:
  - el muro ancho de Babilonia
  - las murallas anchas de Babilonia
  lexicon: HALOT
  rationale: El hebreo usa plural, probablemente colectivo; por eso se conserva el plural 'muros'. 'Anchos' refleja הָרְחָבָה y mantiene el matiz de fortificación extensa. Se evita singularizar sin necesidad.
- source_word: עַרְעֵר תִּתְעַרְעָר
  english_pob_choice: shall be utterly razed
  chosen_spanish: serán derribados por completo
  alternatives_spanish:
  - serán completamente derruidos
  - serán arrasados por completo
  - serán totalmente desnudados
  lexicon: HALOT
  rationale: La duplicación verbal intensifica la destrucción. En español, 'derribados por completo' comunica el derrumbe total de las murallas en un registro natural, sin perder la fuerza del hebreo. Se evita 'desnudar' porque sería menos claro para el contexto de fortificaciones.
- source_word: שְׁעָרֶיהָ הַגְּבֹהִים
  english_pob_choice: her high gates
  chosen_spanish: sus puertas altas
  alternatives_spanish:
  - sus puertas elevadas
  - sus puertas magníficas
  lexicon: HALOT
  rationale: '''Altas'' reproduce de forma directa הַגְּבֹהִים. Se prefiere ''puertas'' en vez de ''portones'' para mantener la correspondencia simple con el hebreo y el paralelismo con los muros.'
- source_word: בָּאֵשׁ יִצַּתּוּ
  english_pob_choice: shall be burned with fire
  chosen_spanish: serán quemadas con fuego
  alternatives_spanish:
  - serán incendiadas
  - serán consumidas por el fuego
  - serán prendidas con fuego
  lexicon: HALOT
  rationale: La construcción se rinde de manera directa y solemne. 'Quemadas con fuego' conserva la fórmula bíblica y evita añadir matices no explícitos en el hebreo.
- source_word: וְיִגְעוּ
  english_pob_choice: and they grow weary
  chosen_spanish: Los pueblos se fatigan
  alternatives_spanish:
  - y se fatigan
  - y se cansan
  - y se agotan
  lexicon: HALOT
  rationale: El verbo expresa fatiga por esfuerzo; 'se fatigan' mantiene ese matiz de labor penosa mejor que un simple 'se cansan'. Se coordina con el paralelismo final del verso.
- source_word: עַמִּים
  english_pob_choice: Peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las gentes
  - las naciones
  lexicon: HALOT
  rationale: '''Pueblos'' conserva la distinción poética frente a ''naciones'' en la cola siguiente. Es natural en español y respeta el plural genérico del hebreo.'
- source_word: בְּדֵי רִיק
  english_pob_choice: for emptiness
  chosen_spanish: por lo vacío
  alternatives_spanish:
  - por la vaciedad
  - en vano
  - para nada
  lexicon: HALOT
  rationale: '''Por lo vacío'' traduce la idea de finalidad/resultado vacío sin sustituirla por una frase más interpretativa. Mantiene el paralelismo con el siguiente ''por el fuego''.'
- source_word: לְאֻמִּים
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las tribus
  lexicon: HALOT
  rationale: Se preserva la pareja poética 'pueblos / naciones' visible en el hebreo. 'Naciones' funciona bien como término político-ético distinto de 'pueblos'.
- source_word: בְּדֵי אֵשׁ
  english_pob_choice: for the fire
  chosen_spanish: por el fuego
  alternatives_spanish:
  - para el fuego
  - en el fuego
  lexicon: HALOT
  rationale: La frase es elíptica y poética; 'por el fuego' mantiene la idea de resultado o destino del trabajo. Se evita expandirla a 'combustible', que sería más explicativo que el hebreo.
- source_word: וְיָעֵפוּ
  english_pob_choice: and they grow weary
  chosen_spanish: y se cansan
  alternatives_spanish:
  - y desfallecen
  - y se agotan
  lexicon: HALOT
  rationale: Se conserva la progresión natural del cierre del verso. 'Se cansan' es simple y fiel, aunque 'se fatigan' podría servir también; aquí se eligió una cadencia más fluida en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El proyecto requiere no enmascarar el Tetragrámaton con 'SEÑOR'. 'Yahvé' es la forma estándar del POB en español y preserva la referencia directa al nombre pactal de Dios.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto inglés, que prefirió 'for emptiness' frente a 'for what is empty' para reflejar con más concisión el hebreo. En español se reflejó como 'por lo vacío', manteniendo esa condensación sin perder el paralelismo poético.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto en español.
  - Se conservaron los pares poéticos 'pueblos / naciones' y 'por lo vacío / por el fuego'.
  - Se prefirió un registro formal, claro y apto para lectura eclesial sin introducir lenguaje tradicional que oculte el hebreo.
