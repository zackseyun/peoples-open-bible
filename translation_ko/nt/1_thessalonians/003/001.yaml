id: 1TH.3.1
reference: 1 Thessalonians 3:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Διὸ μηκέτι στέγοντες εὐδοκήσαμεν καταλειφθῆναι ἐν Ἀθήναις μόνοι,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/003/001.yaml
  text: Therefore[a], when we could bear it no longer, we were pleased to be left alone in Athens[b],
  footnotes:
  - marker: a
    text: Or 'when we could endure it no longer.'
    reason: lexical_alternative
  - marker: b
    text: Or 'we thought it best to be left behind in Athens by ourselves.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 우리는 더 이상 참을 수 없어[a] 아테네에 홀로 남기로 결심하였습니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「견딜 수 없어」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「아테네에 우리만 남겨지는 것이 좋다고 여겼습니다」.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηκέτι στέγοντες
  english_pob_choice: when we could bear it no longer
  chosen_korean: 더 이상 참을 수 없어
  alternatives_korean:
  - 더는 견딜 수 없어
  - 그리움을 참지 못하여
  lexicon: BDAG
  rationale: στέγω의 「감당하다·참다」 의미. 그리움을 견딜 수 없는 정황. 「참다」가 가장 일상적이다.
- source_word: εὐδοκήσαμεν καταλειφθῆναι ... μόνοι
  english_pob_choice: were pleased to be left alone
  chosen_korean: 홀로 남기로 결심하였습니다
  alternatives_korean:
  - 홀로 남겨지는 것을 좋게 여겼습니다
  - 홀로 남기를 기꺼이 선택하였습니다
  lexicon: BDAG
  rationale: εὐδοκέω의 「좋게 여겨 결정함」을 한국어로 자연스럽게 「결심하다」로 옮긴다. 「우리」 1인칭 복수가 디모데를 보내기 위한 자발적 결정임을 분명히 한다.
- source_word: ἐν Ἀθήναις
  english_pob_choice: in Athens
  chosen_korean: 아테네에
  alternatives_korean:
  - 아테나에
  - 아덴에
  lexicon: BDAG
  rationale: 글로사리 정책에 따라 현대 표기 「아테네」를 채택한다. 한국 전통 「아덴」은 후대에 갱신된 표기로 대체되는 추세이다.
