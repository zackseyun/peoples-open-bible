translation:
  language: es
  text: Ahora bien, estas son las generaciones de Ismael[a], hijo de Abraham, a quien Hagar la egipcia, esclava de Sara[b], dio a luz a Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y estas son las generaciones de Ismael». La fórmula hebrea תּוֹלְדוֹת (toledot) reaparece como encabezado en Génesis y también puede traducirse «descendientes» o «linaje familiar».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sierva de Sara». El hebreo שִׁפְחָה se refiere a una mujer esclava o servidora; aquí se mantiene «esclava» para conservar con mayor claridad su condición de sujeción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: Now these are
  chosen_spanish: Ahora bien, estas son
  alternatives_spanish:
  - Y estas son
  - Estas son
  lexicon: HALOT
  rationale: La fórmula genealógica inicia una nueva sección; 'Ahora bien' conserva el enlace discursivo de וְ sin sonar rígidamente calcado, y 'estas son' mantiene el valor de encabezado.
- source_word: תֹּלְדֹת
  english_pob_choice: the generations
  chosen_spanish: las generaciones
  alternatives_spanish:
  - los descendientes
  - la línea familiar
  - el linaje
  lexicon: HALOT
  rationale: '''Generaciones'' preserva la fórmula recurrente de Génesis y su amplitud genealógica, tal como en la elección inglesa auditada.'
- source_word: יִשְׁמָעֵאל
  english_pob_choice: Ishmael
  chosen_spanish: Ismael
  lexicon: N/A
  rationale: Nombre propio en forma española habitual y reconocible.
- source_word: בֶּן אַבְרָהָם
  english_pob_choice: Abraham’s son
  chosen_spanish: hijo de Abraham
  alternatives_spanish:
  - el hijo de Abraham
  - Abraham, su hijo
  lexicon: HALOT
  rationale: En español, la relación constructa se expresa de modo natural como 'hijo de Abraham', manteniendo la filiación sin añadir énfasis innecesario.
- source_word: אֲשֶׁר יָלְדָה
  english_pob_choice: whom ... bore
  chosen_spanish: a quien ... dio a luz
  alternatives_spanish:
  - que ... dio a luz
  - a quien ... alumbró
  lexicon: HALOT
  rationale: Se conserva la cláusula relativa con el sujeto materno implícito en 'dio a luz', que en español comunica con naturalidad el acto de engendrar sin perder la referencia a Hagar como madre.
- source_word: הָגָר
  english_pob_choice: Hagar
  chosen_spanish: Hagar
  alternatives_spanish:
  - Agar
  lexicon: N/A
  rationale: Se mantiene la forma usada en la tradición bíblica hispana moderna y coherente con la transliteración del proyecto.
- source_word: הַמִּצְרִית
  english_pob_choice: the Egyptian
  chosen_spanish: la egipcia
  alternatives_spanish:
  - la mujer egipcia
  - la egipcia
  lexicon: HALOT
  rationale: 'El adjetivo gentilicio se vierte en aposición natural al nombre propio: ''la egipcia''.'
- source_word: שִׁפְחַת שָׂרָה
  english_pob_choice: Sarah’s slave woman
  chosen_spanish: esclava de Sara
  alternatives_spanish:
  - sierva de Sara
  - criada de Sara
  - sirvienta de Sara
  lexicon: HALOT
  rationale: Se preserva la fuerza social del término שִׁפְחָה con 'esclava', siguiendo la decisión inglesa de no suavizar el estatus ligado de la mujer.
- source_word: לְאַבְרָהָם
  english_pob_choice: to Abraham
  chosen_spanish: para Abraham
  alternatives_spanish:
  - a Abraham
  - de parte de Abraham
  lexicon: HALOT
  rationale: Aunque 'bore to Abraham' en inglés expresa la relación paterna, en español 'dio a luz para Abraham' reproduce la referencia relacional del texto sin forzar una construcción poco natural; 'a Abraham' podría sonar más directo pero menos fluido en esta cláusula.
theological_decisions:
- issue: Terminología genealógica de תֹּלְדֹת como encabezado estructural
  english_pob_reading: the generations
  chosen_spanish_reading: las generaciones
  alternative_spanish_readings:
  - los descendientes
  - el linaje
  rationale: Se conserva el valor estructurante del término en Génesis y su amplitud histórica/genealógica; no se reduce a 'descendientes' porque eso estrecha el alcance del encabezado.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se revisó la línea en diálogo con el audit trail inglés y no se detectaron cambios posteriores aplicados; la formulación española mantiene las decisiones nucleares: encabezado genealógico con תֹּלְדֹת, identificación de Hagar como egipcia y preservación de שִׁפְחָה con ''esclava''.'
  spanish_consistency_notes:
  - Se mantiene 'Ismael' y 'Abraham' conforme al uso bíblico hispano estándar.
  - Se conserva 'Hagar' sin adaptar a 'Agar' para alinearse con la convención transliterada del proyecto.
  - '''esclava'' se usa de forma consistente con la decisión léxica de preservar el estatus social del término hebreo.'
  - Las notas al pie siguen la alternativa textual/lexical documentada en el registro inglés.
