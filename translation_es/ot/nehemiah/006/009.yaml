translation:
  language: es
  text: 'Porque todos ellos trataban de atemorizarnos[a], diciendo: «Sus manos se debilitarán[b] de la obra, y no se hará». Pero ahora, fortalece mis manos[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trataban de intimidarnos». El hebreo expresa causar miedo de manera deliberada y sostenida.
    reason: lexical_alternative
  - marker: b
    text: O «se aflojarán». La expresión hebrea habla literalmente de manos que se aflojan; aquí se conserva el sentido idiomático de perder fuerza.
    reason: lexical_alternative
  - marker: c
    text: 'La última cláusula es una súplica breve: «Pero ahora, fortalece mis manos». La vocalización hebrea apoya una petición directa a Dios.'
    reason: theological_note
lexical_decisions:
- source_word: מְיָרְאִים
  english_pob_choice: were trying to frighten
  chosen_spanish: trataban de atemorizarnos
  alternatives_spanish:
  - querían asustarnos
  - intentaban intimidarnos
  lexicon: HALOT
  rationale: El participio causativo expresa una acción continua y con intención de producir temor. «Trataban de atemorizarnos» conserva ese matiz progresivo y la fuerza causal sin sonar demasiado rígido en español.
- source_word: אוֹתָנוּ
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - me
  lexicon: HALOT
  rationale: El texto hebreo usa la forma plural de primera persona, y la traducción debe conservar ese plural, aunque el final pase a una súplica en singular.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  - pensando
  lexicon: HALOT
  rationale: Es la fórmula quotativa normal que introduce el contenido de lo que decían o proyectaban.
- source_word: יִרְפּוּ יְדֵיהֶם
  english_pob_choice: Their hands will grow weak
  chosen_spanish: Sus manos se debilitarán
  alternatives_spanish:
  - sus manos se aflojarán
  - sus manos perderán fuerza
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente habla de manos que se aflojan o se debilitan. «Se debilitarán» preserva la imagen y es natural en español; mantengo la nota textual para no borrar la metáfora.
- source_word: מִן הַמְּלָאכָה
  english_pob_choice: from the work
  chosen_spanish: por la obra
  alternatives_spanish:
  - del trabajo
  - de la tarea
  lexicon: HALOT
  rationale: En este contexto se trata del proyecto de reconstrucción. «Obra» es suficientemente concreta, digna y bíblica en español, y comunica el proyecto sin perder la referencia al trabajo en curso.
- source_word: וְלֹא תֵעָשֶׂה
  english_pob_choice: and it will not be done
  chosen_spanish: y no se hará
  alternatives_spanish:
  - y no se completará
  - y no se llevará a cabo
  lexicon: HALOT
  rationale: El niphal expresa pasividad; «no se hará» es cercano al hebreo y mantiene la referencia general a la ejecución de la obra.
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Entonces ahora
  lexicon: HALOT
  rationale: La partícula marca un giro desde el reporte de la amenaza al clamor directo. «Pero ahora» hace explícito el contraste que el inglés POB también destacó.
- source_word: חַזֵּק אֶת יָדָי
  english_pob_choice: strengthen my hands
  chosen_spanish: fortalece mis manos
  alternatives_spanish:
  - haz fuertes mis manos
  - fortalece mi ánimo
  lexicon: HALOT
  rationale: Conservo la metáfora corporal y la lectura imperativa del texto masorético. «Mis manos» mantiene el enlace con las manos debilitadas de los adversarios y evita espiritualizar prematuramente la imagen.
theological_decisions:
- issue: Súplica directa al final del versículo
  english_pob_reading: 'Render the final clause as Nehemiah''s direct address to God: ''But now, strengthen my hands.'''
  chosen_spanish_reading: 'Traducir la cláusula final como una súplica directa: «Pero ahora, fortalece mis manos».'
  alternative_spanish_readings:
  - «Pero ahora, fortaléceme»
  - «Pero ahora, haz fuertes mis manos»
  rationale: La vocalización masorética favorece un imperativo dirigido a Dios, no una autoexhortación. Mantener la forma de súplica conserva la lectura del POB en inglés y el tono breve de oración de Nehemías.
  doctrine_reference: Nehemiah 6:9; POB audit trail on final clause as prayer
- issue: Metáfora de las manos en tensión con la amenaza de los enemigos
  english_pob_reading: Their hands will grow weak from the work, and it will not be done.
  chosen_spanish_reading: «Sus manos se debilitarán por la obra, y no se hará».
  alternative_spanish_readings:
  - «Sus manos se aflojarán por la obra, y no se hará»
  - «Perderán fuerza para la obra, y no se hará»
  rationale: No conviene borrar la metáfora. La oposición entre manos debilitadas y manos fortalecidas forma parte del efecto retórico del versículo; por eso se conserva la imaginería corporal y se aclara con una traducción natural.
  doctrine_reference: Nehemiah 6:9; lexical decision on יִרְפּוּ יְדֵיהֶם
translation_notes:
  revision_awareness: El POB en inglés pasó de «will drop from the work» a «will grow weak from the work» para reflejar mejor el hebreo יִרְפּוּ יְדֵיהֶם. Esta versión española sigue esa revisión y evita una traducción demasiado literal de «caerían/soltarían»; mantiene además la lectura final como oración directa, conforme al análisis masorético y al audit trail.
  spanish_consistency_notes:
  - He mantenido «Yahvé» fuera del texto porque este versículo no lo contiene explícitamente; la súplica final se deja implícita, como en el hebreo.
  - Usé un registro moderno y digno, evitando calcos demasiado rígidos.
  - Conservé la metáfora de las manos para respetar la relación interna entre la amenaza enemiga y la petición final.
  - «Obra» se usa como término natural para el proyecto de reconstrucción sin imponer vocabulario eclesiástico.
