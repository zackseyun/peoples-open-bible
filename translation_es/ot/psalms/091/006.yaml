translation:
  language: es
  text: ni la plaga que anda en tinieblas[a], ni la destrucción que asola al mediodía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pestilencia' por 'plaga', y posiblemente 'peste mortal' por 'destrucción'; el hebreo emplea términos poéticos paralelos para una amenaza destructiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדֶּבֶר
  english_pob_choice: plague
  chosen_spanish: plaga
  alternatives_spanish:
  - pestilencia
  - peste
  - enfermedad
  lexicon: HALOT
  rationale: דֶּבֶר designa un azote destructivo, a menudo entendido como peste o pestilencia. 'Plaga' en español es claro, natural y conserva el peso de una calamidad devastadora sin estrechar demasiado el término a una sola enfermedad.
- source_word: בָּאֹפֶל
  english_pob_choice: in darkness
  chosen_spanish: en tinieblas
  alternatives_spanish:
  - en oscuridad
  - en la oscuridad
  - en la sombra
  lexicon: HALOT
  rationale: אֹפֶל expresa oscuridad profunda o tinieblas. 'En tinieblas' mantiene el registro poético y la imagen de amenaza oculta, con buen equilibrio entre literalidad y naturalidad.
- source_word: יַהֲלֹךְ
  english_pob_choice: walks
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - va
  - se mueve
  lexicon: HALOT
  rationale: El verbo הלך significa ir/caminar. 'Anda' conserva la personificación del peligro que se desplaza, y suena natural en español poético sin perder el valor verbal básico.
- source_word: מִקֶּטֶב
  english_pob_choice: destruction
  chosen_spanish: la destrucción
  alternatives_spanish:
  - la ruina
  - la mortandad
  - la peste mortal
  lexicon: HALOT
  rationale: קֶטֶב puede denotar destrucción con matiz de azote mortal. 'La destrucción' sigue de cerca la decisión inglesa y preserva la amplitud del término, dejando abierta la posible resonancia pestilencial.
- source_word: יָשׁוּד
  english_pob_choice: devastates
  chosen_spanish: devasta
  alternatives_spanish:
  - arrastra
  - arrasala
  - asola
  lexicon: HALOT
  rationale: El verbo comunica arrasar o despojar violentamente. 'Devasta' reproduce bien la fuerza del hebreo y encaja con el paralelismo poético.
- source_word: צָהֳרָיִם
  english_pob_choice: at noon
  chosen_spanish: al mediodía
  alternatives_spanish:
  - a mediodía
  - al mediodía mismo
  - a la hora del mediodía
  lexicon: HALOT
  rationale: צָהֳרָיִם significa mediodía/noon. 'Al mediodía' es idiomático y conserva el contraste con 'en tinieblas'.
theological_decisions:
- issue: Paralelismo poético entre dos amenazas destructivas
  english_pob_reading: The Hebrew uses poetic parallel terms for destructive threat; 'plague' and 'destruction' are both retained with an explanatory footnote on alternative readings.
  chosen_spanish_reading: 'Se conservan dos términos distintos: ''plaga'' y ''destrucción'', con nota sobre alternativas léxicas y la posibilidad de un matiz de peste/mortandad en el segundo miembro.'
  alternative_spanish_readings:
  - '''pestilencia'' y ''ruina'''
  - '''peste'' y ''mortandad'''
  - unificar ambos miembros como 'peste'
  rationale: El hebreo mantiene una pareja poética de peligros. En español conviene conservar la diferencia semántica sin borrar la tensión entre un azote epidémico y una fuerza de devastación más amplia.
  doctrine_reference: Poética hebrea / paralelismo semántico
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el dossier inglés; la versión inglesa más reciente indica que no hubo cambios y coincide plenamente con el resumen de revisión y concordancia alta.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no aparece aquí un sustituto del nombre divino.
  - '''Plaga'' conserva el valor amplio de דֶּבֶר sin reducirlo a una enfermedad específica.'
  - '''En tinieblas'' y ''al mediodía'' mantienen el contraste temporal y visual del hebreo.'
  - Se usa 'destrucción' en lugar de 'ruina' para seguir de cerca la decisión auditada en inglés y preservar la amplitud del segundo término.
