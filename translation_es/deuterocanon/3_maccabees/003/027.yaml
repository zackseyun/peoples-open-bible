translation:
  language: es
  text: Pero cualquiera que oculte a alguno de los judíos, desde anciano hasta infante, aun a los lactantes[a], será golpeado hasta la muerte con las torturas más atroces[b], junto con toda su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «hasta los que están al pecho» o «hasta los niños de pecho», para el término raro que designa a los niños todavía amamantados.
    reason: lexical_alternative
  - marker: b
    text: El griego alude aquí a una ejecución brutal por golpes; algunas traducciones la expresan técnicamente como «apaleado hasta la muerte» o «torturado en la rueda».
    reason: lexical_alternative
lexical_decisions:
- source_word: σκεπάσῃ
  english_pob_choice: shelters
  chosen_spanish: oculte
  alternatives_spanish:
  - dé refugio
  - ampare
  - esconda
  lexicon: LSJ
  rationale: En este contexto legal de amenaza, el verbo griego puede implicar cubrir, esconder o dar refugio. Opté por «oculte» porque conserva la idea de esconder a alguien de las autoridades y funciona de manera natural en español sin perder la fuerza penal del pasaje.
- source_word: τινα τῶν Ἰουδαίων
  english_pob_choice: any of the Jews
  chosen_spanish: a alguno de los judíos
  alternatives_spanish:
  - a cualquier judío
  - a uno de los judíos
  lexicon: LSJ
  rationale: La construcción es partitiva e indefinida. «A alguno de los judíos» refleja que se trata de cualquier individuo dentro del grupo, manteniendo la proximidad al griego y la naturalidad en español.
- source_word: ἀπὸ γεραιοῦ μέχρι νηπίου
  english_pob_choice: from old man to infant
  chosen_spanish: desde anciano hasta infante
  alternatives_spanish:
  - desde viejo hasta niño
  - de anciano a infante
  lexicon: LSJ
  rationale: La expresión marca el rango completo de edad. «Anciano» traduce bien γεραιός en español bíblico contemporáneo, y «infante» mantiene la elevación de registro de νηπίον sin caer en un infantilismo moderno.
- source_word: καὶ μέχρι ὑπομαστιγίων
  english_pob_choice: even those at the breast
  chosen_spanish: incluso hasta los que están en el pecho
  alternatives_spanish:
  - incluso los que maman
  - aun los lactantes
  lexicon: LSJ
  rationale: El término raro alude a niños todavía amamantados. Elegí una frase descriptiva para preservar la imagen literal del griego y evitar una paráfrasis demasiado interpretativa; la alternativa más idiomática se documenta en la nota.
- source_word: ἐχθίσταις βασάνοις
  english_pob_choice: with the most grievous tortures
  chosen_spanish: con los castigos más terribles
  alternatives_spanish:
  - con los tormentos más graves
  - con las torturas más atroces
  lexicon: LSJ
  rationale: βάσανοι puede significar torturas o tormentos infligidos judicialmente, y el adjetivo intensifica su carácter odioso/grave. «Castigos más terribles» comunica la severidad del acto en un español claro y solemne, aunque deja abierta la referencia concreta al método de suplicio.
- source_word: ὑποτυμπανισθήσεται
  english_pob_choice: will be beaten to death
  chosen_spanish: será golpeado hasta la muerte
  alternatives_spanish:
  - será apaleado hasta morir
  - será ejecutado a golpes
  lexicon: LSJ
  rationale: El verbo describe una ejecución brutal por golpes. «Golpeado hasta la muerte» transmite el sentido básico con claridad y mantiene el carácter judicial/violento sin introducir un instrumento específico que el texto no nombra explícitamente.
- source_word: πανοικίᾳ
  english_pob_choice: together with his whole household
  chosen_spanish: junto con toda su casa
  alternatives_spanish:
  - junto con todo su hogar
  - con toda su familia
  lexicon: LSJ
  rationale: El término apunta al conjunto doméstico, no solo a parientes de sangre. «Toda su casa» es una forma breve y fiel al ámbito de household/casa, y preserva el alcance total de la sanción.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete (1909) y toma como guía la revisión inglesa más reciente, que ajustó la naturalidad de la frase sobre los lactantes y precisó el matiz de las torturas. En español, se preservó la amplitud de edad, la rareza del término para los niños al pecho y el carácter de ejecución violenta sin sobreespecificar el método.
  spanish_consistency_notes:
  - Se mantuvo «judíos» en minúscula conforme al uso normal en español.
  - «Casa» se usó para reproducir el alcance corporativo de πανοικίᾳ sin reducirlo a solo «familia».
  - No se introdujo terminología eclesiástica ajena al pasaje; el tono es legal y amenazante, como en el griego.
