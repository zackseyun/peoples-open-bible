translation:
  language: es
  text: Por tanto, un león del bosque los derriba; un lobo de las soledades[a] los devasta; un leopardo vigila sus ciudades. Todo el que salga de ellas será despedazado, porque sus rebeliones son muchas; sus apostasías[b] se han fortalecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un lobo de las tardes». La expresión hebrea זְאֵב עֲרָבוֹת también ha sido entendida en relación con la caza al atardecer; aquí se traduce «un lobo de las soledades» siguiendo el sentido más directo de la referencia geográfica.
    reason: lexical_alternative
  - marker: b
    text: O «sus apartamientos». El término hebreo alude a repetidos alejamientos de la fidelidad del pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכָּם
  english_pob_choice: strikes them down
  chosen_spanish: los hiere
  alternatives_spanish:
  - los golpea
  - los ataca
  - los hiere de muerte
  lexicon: HALOT
  rationale: El hebreo expresa un golpe violento dentro de un contexto de juicio. En español, «hiere» conserva la fuerza del ataque sin añadir explícitamente «de muerte», que no está en la forma verbal. «Golpea» es más débil; «ataca» pierde la imagen del golpe.
- source_word: אַרְיֵה מִיַּעַר
  english_pob_choice: a lion from the forest
  chosen_spanish: un león del bosque
  alternatives_spanish:
  - un león del bosque
  - un león que sale del bosque
  lexicon: HALOT
  rationale: «Del bosque» reproduce con naturalidad el origen espacial del animal y mantiene la imagen concreta de acecho desde un lugar silvestre. «Que sale del bosque» explicita más de lo que el hebreo exige.
- source_word: זְאֵב עֲרָבוֹת
  english_pob_choice: a wolf of the deserts
  chosen_spanish: un lobo de las soledades
  alternatives_spanish:
  - un lobo del desierto
  - un lobo de los desiertos
  - un lobo del páramo
  lexicon: HALOT
  rationale: El término עֲרָבוֹת puede referirse a regiones áridas, estepa o desierto. «De las soledades» conserva el plural y el matiz geográfico amplio del hebreo, con una resonancia natural en español bíblico; evita imponer sin necesidad una sola imagen como «desierto» o «páramo». La nota preserva la alternativa textual tradicional relacionada con «tardes».
- source_word: יְשָׁדְדֵם
  english_pob_choice: devastates them
  chosen_spanish: los devasta
  alternatives_spanish:
  - los despoja
  - los saquea
  - los arruina
  lexicon: HALOT
  rationale: El verbo שדד implica despojo violento y devastación. «Devasta» comunica bien la acción destructiva global; «saquea» estrecha el sentido hacia botín material, y «despoja» no refleja con tanta fuerza el daño total.
- source_word: נָמֵר
  english_pob_choice: a leopard
  chosen_spanish: un leopardo
  alternatives_spanish:
  - un pantera
  lexicon: HALOT
  rationale: Es la equivalencia zoológica estándar y transparente en español.
- source_word: שֹׁקֵד עַל
  english_pob_choice: keeps watch over
  chosen_spanish: acecha
  alternatives_spanish:
  - vigila
  - está al acecho de
  - vela sobre
  lexicon: HALOT
  rationale: Aunque שֹׁקֵד tiene la idea básica de vigilancia despierta, aquí el contexto predatorio exige un matiz de acecho. «Acecha» deja ver esa tensión sin perder la noción de vigilancia atenta; «vigila» suena demasiado neutro y «vela sobre» no corresponde al cuadro hostil.
- source_word: עָרֵיהֶם
  english_pob_choice: their cities
  chosen_spanish: sus ciudades
  alternatives_spanish:
  - sus poblaciones
  - sus pueblos
  lexicon: HALOT
  rationale: «Ciudades» es la correspondencia directa y mantiene el escenario de juicio nacional.
- source_word: כָּל הַיּוֹצֵא מֵהֵנָּה
  english_pob_choice: Everyone who goes out from them
  chosen_spanish: Todo el que salga de ellas
  alternatives_spanish:
  - Todo el que salga de allí
  - Quien salga de ellas
  - Todos los que salgan de ellas
  lexicon: HALOT
  rationale: La construcción distributiva se expresa de manera natural con «Todo el que...». «De ellas» concuerda con «ciudades» y conserva la referencia femenina plural del hebreo.
- source_word: יִטָּרֵף
  english_pob_choice: will be torn apart
  chosen_spanish: será despedazado
  alternatives_spanish:
  - será hecho pedazos
  - será devorado
  - será desgarrado
  lexicon: HALOT
  rationale: El nifal de טרף evoca la acción de ser presa de un animal. «Despedazado» transmite esa brutalidad de forma clara en español. «Desgarrado» puede sonar más físico que predatorio, y «devorado» añade una precisión no expresada por el verbo.
- source_word: פִּשְׁעֵיהֶם
  english_pob_choice: their transgressions
  chosen_spanish: sus rebeliones
  alternatives_spanish:
  - sus transgresiones
  - sus delitos
  - sus ofensas
  lexicon: HALOT
  rationale: פשע suele implicar rebelión contra autoridad legítima, especialmente en contexto de pacto. «Rebeliones» hace visible ese peso relacional y moral en español; «transgresiones» es correcto, pero menos incisivo para este contexto profético.
- source_word: רַבּוּ
  english_pob_choice: are many
  chosen_spanish: son muchas
  alternatives_spanish:
  - han aumentado
  - se han multiplicado
  - son numerosas
  lexicon: HALOT
  rationale: La copula española expresa con naturalidad el valor de abundancia del predicado hebreo, manteniendo el tono explicativo.
- source_word: עָצְמ֖וּ
  english_pob_choice: have grown strong
  chosen_spanish: se han fortalecido
  alternatives_spanish:
  - han crecido en fuerza
  - se han hecho fuertes
  - han aumentado
  lexicon: HALOT
  rationale: עצם comunica intensificación y consolidación. «Se han fortalecido» conserva el crecimiento en fuerza y la idea de una unfaithfulness ya arraigada. «Han aumentado» reduciría demasiado el sentido a cantidad.
- source_word: משבותיהם
  english_pob_choice: their apostasies
  chosen_spanish: sus apostasías
  alternatives_spanish:
  - sus apartamientos
  - sus retrocesos
  - sus desviaciones
  lexicon: HALOT
  rationale: El sustantivo, ligado a שוב en sentido de alejarse/volver atrás, refiere a deserciones de la fidelidad del pacto. «Apostasías» mantiene esa gravedad teológica y el paralelismo con «rebeliones». «Backslidings» se preserva en la nota como alternativa de tradición inglesa, pero en español «apostasías» comunica mejor el peso doctrinal.
theological_decisions:
- issue: Cómo traducir משבותיהם sin suavizar la culpa del pueblo
  english_pob_reading: their apostasies
  chosen_spanish_reading: sus apostasías
  alternative_spanish_readings:
  - sus retrocesos
  - sus apartamientos
  - sus desviaciones
  rationale: El versículo explica el juicio divino por la repetición de una infidelidad grave, no por simples fallas ocasionales. «Apostasías» conserva el carácter de ruptura pactal y religiosa. Las alternativas son comprensibles, pero rebajan la fuerza moral del término.
  doctrine_reference: Jeremías 5:6; Translation philosophy §§1, 5, 6
- issue: Cómo reflejar el doble cuadro de predadores sin diluir la imagen profética
  english_pob_reading: a lion from the forest ... a wolf of the deserts ... a leopard keeps watch over their cities
  chosen_spanish_reading: un león del bosque ... un lobo de las soledades ... un leopardo acecha sus ciudades
  alternative_spanish_readings:
  - un león del bosque ... un lobo del desierto ... un leopardo vigila sus ciudades
  - un león del bosque ... un lobo de los desiertos ... un leopardo vela sobre sus ciudades
  rationale: La línea hebrea acumula figuras de amenaza real y concreta. «Acecha» para el leopardo hace visible el carácter hostil del cuadro, mientras que la nota sobre «las soledades» preserva la posible lectura alternativa del hebreo sin imponerse como texto principal.
  doctrine_reference: Jeremías 5:6; HALOT; Translation philosophy §§1, 4
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el audit trail inglés: se mantiene el cuadro de juicio animal, se conserva la tensión lexical de זְאֵב עֲרָבוֹת con una nota alternativa, y משבותיהם se vierte con fuerza teológica como «apostasías», en paralelo con «rebeliones».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se usa «ciudades» para עָרֵיהֶם y el pronombre femenino plural «de ellas» para conservar la concordancia con el hebreo.
  - Se evita «SEÑOR» como sustituto del nombre divino, de acuerdo con la política del proyecto.
  - La cadencia busca ser bíblica pero natural en español contemporáneo, sin calco sintáctico innecesario.
