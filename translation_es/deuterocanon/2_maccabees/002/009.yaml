translation:
  language: es
  text: Como estamos a punto de celebrar la purificación del templo el día veinticinco de Quisleu[a], hemos considerado necesario explicarles esto con claridad, para que ustedes también celebren la fiesta de las enramadas y del fuego[b], cuando Nehemías, que edificó[c] el templo y el altar, ofreció sacrificios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la Fiesta de las Enramadas»; tradicionalmente, «Tabernáculos».
    reason: lexical_alternative
  - marker: b
    text: La frase «y del fuego» es breve y algo elíptica en griego, y probablemente se refiere a la observancia conmemorativa relacionada con la ofrenda de Nehemías y el relato del fuego que sigue en el contexto.
    reason: cultural_note
  - marker: c
    text: El griego dice simplemente «edificó»; algunos lectores podrían entender «reconstruyó» por el trasfondo histórico, pero el texto fuente no lo expresa explícitamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μέλλοντες ἄγειν
  english_pob_choice: we are about to celebrate
  chosen_spanish: vamos a celebrar
  alternatives_spanish:
  - estamos a punto de celebrar
  - vamos a conmemorar
  - vamos a celebrar solemnemente
  lexicon: LSJ
  rationale: ἄγω con objeto festivo suele significar celebrar o observar una fiesta; μέλλοντες añade inminencia. «Vamos a celebrar» conserva la cercanía temporal y el sentido festivo de modo natural en español.
- source_word: ἐν τῷ Χασελεὺ πέμπτῃ καὶ εἰκάδι
  english_pob_choice: on the twenty-fifth of Chislev
  chosen_spanish: el día veinticinco de Quisleu
  alternatives_spanish:
  - el veinticinco de Quisleu
  - en Quisleu, el día veinticinco
  - el vigésimo quinto día de Quisleu
  lexicon: LSJ
  rationale: La frase da una fecha dentro del mes de Quisleu; en español bíblico-actual es natural anteponer el día con «el día veinticinco de…». Mantuve «Quisleu» como forma castellana habitual del mes.
- source_word: τὸν καθαρισμὸν τοῦ ἱεροῦ
  english_pob_choice: the purification of the temple
  chosen_spanish: la purificación del templo
  alternatives_spanish:
  - la limpieza del santuario
  - la purificación del santuario
  - la dedicación-purificación del templo
  lexicon: LSJ
  rationale: καθαρισμός es «purificación/limpieza»; ἱερόν aquí se refiere al templo. «Purificación del templo» sigue de cerca el griego y resulta clara en español.
- source_word: δέον ἡγησάμεθα διασαφῆσαι ὑμῖν
  english_pob_choice: we thought it necessary to make this clear to you
  chosen_spanish: hemos pensado que era necesario hacéroslo saber claramente
  alternatives_spanish:
  - creímos necesario explicároslo
  - juzgamos necesario aclararlo para vosotros
  - consideramos necesario daros esta explicación
  lexicon: LSJ
  rationale: La construcción expresa un juicio de necesidad; διασαφῆσαι implica hacer claro o explicar con claridad. «Hacéroslo saber claramente» conserva el valor informativo y la claridad sin sonar rígido.
- source_word: ἵνα καὶ αὐτοὶ ἄγητε
  english_pob_choice: so that you also may celebrate
  chosen_spanish: para que también vosotros celebréis
  alternatives_spanish:
  - para que también vosotros observéis
  - a fin de que vosotros también celebréis
  - para que vosotros mismos también guardéis
  lexicon: LSJ
  rationale: ἄγω con sentido festivo se traduce mejor como celebrar/observar una fiesta. «También vosotros» conserva el énfasis de καὶ αὐτοί.
- source_word: σκηνοπηγίας
  english_pob_choice: the festival of booths
  chosen_spanish: la fiesta de las enramadas
  alternatives_spanish:
  - la fiesta de las chozas
  - la fiesta de las cabañas
  - la Fiesta de los Tabernáculos
  lexicon: LSJ
  rationale: El término designa la fiesta judía conocida como Booths/Tabernacles. «Enramadas» es una forma castellana tradicional y comprensible que conserva el sentido literal de la festividad sin depender de una fórmula eclesiástica fija.
- source_word: καὶ τοῦ πυρός
  english_pob_choice: and of the fire
  chosen_spanish: y del fuego
  alternatives_spanish:
  - y la fiesta del fuego
  - y del fuego sagrado
  - y de la llama
  lexicon: LSJ
  rationale: La expresión es breve y algo elíptica en griego. «Del fuego» mantiene la tersura del original y deja visible la ambigüedad histórica sin expandirla en paráfrasis.
- source_word: ὅτε Νεεμίας
  english_pob_choice: when Nehemiah
  chosen_spanish: cuando Nehemías
  alternatives_spanish:
  - en tiempos de Nehemías
  - cuando ocurrió con Nehemías
  lexicon: LSJ
  rationale: ὅτε introduce el momento histórico asociado a la celebración; «cuando Nehemías» es la correspondencia natural y fiel.
- source_word: ὁ οἰκοδομήσας τό τε ἱερὸν καὶ τὸ θυσιαστήριον
  english_pob_choice: who built the temple and the altar
  chosen_spanish: que edificó el templo y el altar
  alternatives_spanish:
  - que construyó el templo y el altar
  - que levantó el templo y el altar
  - que edificó tanto el templo como el altar
  lexicon: LSJ
  rationale: οἰκοδομέω significa «construir/edificar». «Edificó» es digno y preciso en español bíblico, y mantiene la afirmación simple del griego sin añadir «re-».
- source_word: ἀνήνεγκεν θυσίας
  english_pob_choice: offered sacrifices
  chosen_spanish: ofreció sacrificios
  alternatives_spanish:
  - presentó sacrificios
  - hizo sacrificios
  - ofreció víctimas
  lexicon: LSJ
  rationale: En contexto sacrificial, ἀναφέρω significa ofrecer en sacrificio. «Ofreció sacrificios» es la equivalencia natural y transparente.
theological_decisions:
- issue: Nombre de la fiesta σκηνοπηγίας
  english_pob_reading: the festival of booths
  chosen_spanish_reading: la fiesta de las enramadas
  alternative_spanish_readings:
  - la fiesta de las chozas
  - la fiesta de las cabañas
  - la Fiesta de los Tabernáculos
  rationale: Se eligió una forma literal y comunicativa que conserva el valor de la imagen sin convertir el nombre en una etiqueta litúrgica menos transparente. «Enramadas» permite reconocer la fiesta por su sentido visual y tradicional en español.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 2
- issue: La frase breve καὶ τοῦ πυρός
  english_pob_reading: and of the fire
  chosen_spanish_reading: y del fuego
  alternative_spanish_readings:
  - y la fiesta del fuego
  - y del fuego sagrado
  rationale: La expresión griega es comprimida y probablemente remite a una observancia conmemorativa ligada al relato siguiente. Se conserva la ambigüedad en vez de resolverla con una ampliación interpretativa no explicitada por el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 3
translation_notes:
  revision_awareness: El último pase de revisión indicó que no había cambios necesarios y el control cruzado mostró alta concordancia con observaciones menores. La presente versión mantiene el sentido del griego y la estrategia del POB inglés, con ajuste natural al español y sin expandir la ambigüedad de «del fuego».
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma estándar del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - «Mesías/Cristo» no interviene en este versículo.
  - 'Se conservan nombres propios y topónimos en formas castellanas usuales: Quisleu, Nehemías.'
  - La puntuación y el orden mantienen un registro bíblico claro en español, sin calcos rígidos.
