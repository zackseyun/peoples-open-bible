revisions:
- from: Entonces la congregación rescatará al homicida de la mano del vengador de la sangre[a], y la congregación lo devolverá a su ciudad de refugio, a la cual huyó; y vivirá en ella hasta la muerte del sumo sacerdote, a quien fue ungido con el aceite santo[c][b].
  to: Entonces la congregación rescatará al homicida de la mano del vengador de la sangre[a], y la congregación lo devolverá a su ciudad de refugio, a la cual huyó; y vivirá en ella hasta la muerte del sumo sacerdote, quien fue ungido con el aceite santo[c][b].
  rationale: 'Se hace una reparación mínima pero necesaria: ‘a quien fue ungido’ se corrige a ‘quien fue ungido’, que conserva el sentido pretendido y suena natural en español. También se ajusta la nota explicativa para que refleje con precisión la tensión entre la forma activa hebrea y la formulación española adoptada, sin introducir un agente no mencionado.'
