review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue correctamente la línea hebrea principal sobre modales en la mesa y conserva en nota la tradición griega divergente. Las decisiones léxicas clave (מקום, יביט, תושיט יד, עמו) están bien encaminadas. Sin embargo, «plato» puede sonar demasiado específico para בטנא, que en contexto apunta más bien a un recipiente compartido; «fuente» o «plato común» preserva mejor la escena de servicio compartido. Además, la nota española tiene un error gramatical en «Dichoso el alma».
  spanish_quality_summary: El español es claro y natural, pero «no metas la mano» añade explícitamente «la mano» aunque el texto solo dice «no reach» en la segunda cola; no es grave, pero «no metas la mano con él en la fuente» suena algo más idiomático para la imagen de etiqueta. La nota necesita corrección a «Dichosa el alma» o mejor «Dichosa es el alma».
  glossary_alignment: No hay conflictos relevantes con la terminología base del proyecto salvo que en la nota, dado que el griego tiene Κύριον, «Señor» es aceptable como parte de la lectura alternativa citada; no corresponde sustituir aquí por «Yahvé» sin evidencia de cita del nombre divino en esta variante. El resto del vocabulario está alineado con el enfoque del POB.
  issues:
  - severity: medium
    issue: «plato» estrecha demasiado el sentido de בטנא
    rationale: El inglés auditado eligió «dish» para un recipiente compartido de mesa. En español, «plato» suele evocar una porción individual; «fuente» comunica mejor el recipiente común sin forzar el hebreo.
  - severity: medium
    issue: La nota dice «Dichoso el alma»
    rationale: Hay discordancia de género y la frase resulta poco natural. Debe ser «Dichosa es el alma del que teme al Señor» o equivalente.
  - severity: low
    issue: «no metas la mano» es interpretativo
    rationale: Funciona en contexto, pero explicita «la mano» donde el segundo hemistiquio podría mantenerse más cercano a la idea general de alcanzar simultáneamente. Aun así, en español sigue siendo aceptable y claro.
  revised_spanish_text: Extiende tu mano hacia el lugar que él mira[a], y no metas la mano con él en la fuente.
  revised_footnotes:
  - marker: a
    text: 'La tradición griega lee: «Dichosa es el alma del que teme al Señor». El testimonio hebreo conservado en la Guenizá de El Cairo ofrece una línea distinta sobre modales en la mesa, y en este punto la tradición textual es incierta.'
    reason: alternative_reading
