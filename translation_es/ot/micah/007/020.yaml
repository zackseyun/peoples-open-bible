translation:
  language: es
  text: Mostrarás fidelidad a Jacob y amor leal[a] a Abraham, como juraste a nuestros padres[b] desde tiempos antiguos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'verdad'. Aquí 'fidelidad' refleja el sentido de pacto del término hebreo en paralelo con 'amor leal'.
    reason: lexical_alternative
  - marker: b
    text: O 'nuestros antepasados'. El hebreo dice literalmente 'nuestros padres'.
    reason: lexical_alternative
  - marker: c
    text: O 'desde los días de antaño' o 'desde mucho tiempo atrás'.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתֵּן
  english_pob_choice: You will show
  chosen_spanish: Tú mostrarás
  alternatives_spanish:
  - tú darás
  - darás
  lexicon: HALOT
  rationale: El hebreo literalmente significa 'dar', pero en este paralelismo resulta natural en español expresar la acción con un verbo que introduzca las cualidades abstractas; 'mostrarás' conserva el futuro y el sentido relacional de la frase.
- source_word: אֱמֶת
  english_pob_choice: faithfulness
  chosen_spanish: fidelidad
  alternatives_spanish:
  - verdad
  - lealtad
  - fiabilidad
  lexicon: HALOT
  rationale: 'En paralelo con חֶסֶד, el término tiene fuerza de pacto: no es solo ''verdad'' proposicional, sino fidelidad constante. ''Fidelidad'' comunica bien ese valor en español.'
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor leal
  alternatives_spanish:
  - amor constante
  - misericordia
  - amor fiel
  - lealtad de pacto
  lexicon: HALOT
  rationale: Busqué una expresión natural en español que preserve tanto la dimensión afectiva como la fidelidad de pacto. 'Amor leal' mantiene la tensión entre cariño y compromiso duradero sin volverlo demasiado técnico.
- source_word: לְיַעֲקֹב
  english_pob_choice: to Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - para Jacob
  lexicon: HALOT
  rationale: La preposición marca destinatario/beneficiario; 'a Jacob' conserva el paralelismo con 'a Abraham'.
- source_word: לְאַבְרָהָם
  english_pob_choice: to Abraham
  chosen_spanish: a Abraham
  alternatives_spanish:
  - para Abraham
  lexicon: HALOT
  rationale: Se mantiene el mismo patrón sintáctico del miembro anterior para preservar el paralelismo poético.
- source_word: נִשְׁבַּעְתָּ
  english_pob_choice: you swore
  chosen_spanish: juraste
  alternatives_spanish:
  - lo juraste
  - prestaste juramento
  lexicon: HALOT
  rationale: En español, 'jurar' transmite de forma directa la acción de hacer un juramento y suena natural en el contexto del recuerdo patriarcal.
- source_word: לַאֲבֹתֵינוּ
  english_pob_choice: to our fathers
  chosen_spanish: a nuestros padres
  alternatives_spanish:
  - a nuestros antepasados
  - a nuestros padres/fundadores
  lexicon: HALOT
  rationale: Se conserva el matiz masculino explícito del hebreo. 'Padres' refleja la formulación bíblica tradicional sin perder exactitud gramatical.
- source_word: מִימֵי קֶדֶם
  english_pob_choice: from days of old
  chosen_spanish: desde días de antaño
  alternatives_spanish:
  - desde tiempos antiguos
  - desde los días de antaño
  - desde tiempos de antaño
  lexicon: HALOT
  rationale: La expresión idiomática apunta a una antigüedad remota. 'Desde días de antaño' mantiene el registro poético y el sentido temporal sin sonar excesivamente arcaico.
theological_decisions:
- issue: 'Pacto: אֱמֶת + חֶסֶד'
  english_pob_reading: faithfulness + steadfast love
  chosen_spanish_reading: fidelidad + amor leal
  alternative_spanish_readings:
  - verdad + misericordia
  - fidelidad + misericordia
  - verdad + amor constante
  rationale: 'La pareja funciona aquí en sentido de alianza: constancia fiel y amor comprometido. ''Fidelidad'' y ''amor leal'' preservan esa textura teológica mejor que una traducción más abstracta o más devocional.'
  doctrine_reference: Translation philosophy §§1, 5
- issue: 'Referencia generacional: לַאֲבֹתֵינוּ'
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: El hebreo es masculino plural y evoca a los patriarcas. Se mantiene la precisión textual y la resonancia bíblica; 'antepasados' suavizaría esa forma concreta.
  doctrine_reference: Translation philosophy §4
- issue: Relativo final con אֲשֶׁר
  english_pob_reading: as you swore to our fathers from days of old
  chosen_spanish_reading: como juraste a nuestros padres desde días de antaño
  alternative_spanish_readings:
  - tal como juraste a nuestros padres desde días de antaño
  rationale: La cláusula relativa se entiende mejor en español con 'como', que refleja la relación entre la fidelidad prometida y el juramento previo sin introducir una subordinación artificial.
  doctrine_reference: 'Revision awareness: revision pass on ''which'' -> ''as'''
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó 'which' por 'as' para reflejar mejor la cláusula relativa hebrea que remite al juramento previo; la redacción española sigue esa decisión con 'como', manteniendo la relación entre la fidelidad prometida y el juramento de antaño.
  spanish_consistency_notes:
  - Se mantiene el paralelismo Jacob/Abraham con preposición única 'a'.
  - '''Fidelidad'' y ''amor leal'' se usan como par covenantal coherente, evitando ''verdad'' en el texto principal pero conservándolo en nota.'
  - '''Padres'' conserva la exactitud masculina del hebreo y la resonancia patriarcal del contexto bíblico.'
  - '''Desde días de antaño'' equilibra registro poético y claridad contemporánea.'
