translation:
  language: es
  text: 'Pero el Señor le respondió: «Marta, Marta, estás afanada y turbada[a] por muchas cosas»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «preocupada y alterada».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς ... εἶπεν
  english_pob_choice: answered
  chosen_spanish: le respondió
  alternatives_spanish:
  - respondió
  - le contestó
  - respondió y le dijo
  lexicon: BDAG; uso narrativo idiomático
  rationale: El griego une participio + verbo como fórmula narrativa. En español, «le respondió» comunica de forma natural la respuesta directa sin sobrecargar con una calca como «habiendo respondido».
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca transición contrastiva desde la queja previa de Marta hacia la respuesta de Jesús. «Pero» reproduce bien ese giro suave.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el maestro
  lexicon: BDAG; DOCTRINE.md Contested terms
  rationale: Se conserva el título cristológico/narrativo «el Señor», que en Lucas carga más fuerza que «el maestro». Además sigue la terminología POB para κύριος.
- source_word: Μάρθα Μάρθα
  english_pob_choice: Martha, Martha
  chosen_spanish: Marta, Marta
  alternatives_spanish:
  - Marta, Marta
  lexicon: BDAG
  rationale: Se mantiene la repetición vocativa para reflejar énfasis y ternura en la dirección personal.
- source_word: μεριμνᾷς
  english_pob_choice: you are anxious
  chosen_spanish: estás afanada
  alternatives_spanish:
  - estás ansiosa
  - te preocupas
  lexicon: BDAG
  rationale: «Afanada» expresa con buen registro bíblico la inquietud interna y el desasosiego que el inglés POB llevó a «anxious». Evita reducirlo solo a una preocupación mental leve.
- source_word: θορυβάζῃ
  english_pob_choice: troubled
  chosen_spanish: turbada
  alternatives_spanish:
  - perturbada
  - inquieta
  - alterada
  lexicon: BDAG
  rationale: «Turbada» conserva la idea de agitación o trastorno interior y distingue bien el segundo verbo del primero, tal como hace el inglés con «troubled».
- source_word: περὶ πολλά
  english_pob_choice: about many things
  chosen_spanish: por muchas cosas
  alternatives_spanish:
  - acerca de muchas cosas
  - con muchas ocupaciones
  lexicon: BDAG
  rationale: La preposición περί en este contexto se expresa naturalmente como «por» en español, manteniendo el alcance amplio de múltiples preocupaciones u զբաղos sin añadir interpretación excesiva.
theological_decisions:
- issue: Tratamiento de κύριος como título aplicado a Jesús
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el maestro
  rationale: Se mantiene el valor titular y cristológico de κύριος en la narración lucana. «El Señor» conserva la reverencia y el peso teológico que el POB documenta para este término.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El pasaje coincide con el último pase revisado como sin cambios y con alto acuerdo en la verificación cruzada; no se aplicaron revisiones posteriores al texto inglés de referencia.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en coherencia con el criterio POB.
  - Se evita mezclar «afanada» con «preocupada» en el texto principal para conservar la distinción léxica entre μεριμνᾷς y θορυβάζῃ.
  - La puntuación española coloca la coma vocativa y las comillas de cita según uso editorial moderno.
