translation:
  language: es
  text: Si un hombre peca contra su prójimo[a], y se le hace jurar un juramento, y el juramento viene delante de tu altar en esta casa,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "maldición"; el término hebreo puede referirse al juramento mismo o a la maldición invocada si se quebranta el juramento.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶחֱטָא
  english_pob_choice: sins
  chosen_spanish: peca
  alternatives_spanish:
  - hace mal
  - comete pecado
  lexicon: HALOT
  rationale: En este contexto judicial y moral, el verbo hebreo conserva fuerza de transgresión. 'Peca' mantiene el peso ético-religioso sin volver la frase excesivamente técnica.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo usa singular masculino representativo. 'Un hombre' refleja con fidelidad esa forma gramatical y el estilo sobrio del pasaje.
- source_word: לְרֵעֵהוּ
  english_pob_choice: against his neighbor
  chosen_spanish: contra su prójimo
  alternatives_spanish:
  - contra su vecino
  - contra su semejante
  lexicon: HALOT
  rationale: '''Prójimo'' comunica bien el valor de רֵעַ como el otro cercano o compañero, y conserva el tono ético relacional del hebreo. ''Contra'' expresa la dirección del daño.'
- source_word: וְנָשָׂא בוֹ אָלָה
  english_pob_choice: and is made to swear an oath
  chosen_spanish: y se le hace prestar juramento
  alternatives_spanish:
  - y se le impone un juramento
  - y se le pone bajo juramento
  lexicon: HALOT
  rationale: El hebreo describe a alguien sometido a una fórmula juramentaria en un marco judicial. 'Se le hace prestar juramento' es natural en español y conserva la idea de imponer el juramento sin borrar el término legal.
- source_word: לְהַאֲלֹתוֹ
  english_pob_choice: to make him swear
  chosen_spanish: prestar juramento
  alternatives_spanish:
  - jurar
  - ser juramentado
  lexicon: HALOT
  rationale: El infinitivo causativo señala la acción de hacer jurar a la persona. En español, esa idea queda expresada de forma idiomática por la frase completa 'se le hace prestar juramento'.
- source_word: וּבָא אָלָה
  english_pob_choice: and the oath comes
  chosen_spanish: y el juramento viene
  alternatives_spanish:
  - y el juramento llega
  - y la maldición viene
  lexicon: HALOT
  rationale: El sustantivo אָלָה puede abarcar el juramento o la maldición asociada. Aquí se mantiene 'juramento' en el texto principal por la lectura procedimental del contexto, sin eliminar la tensión léxica.
- source_word: לִפְנֵי מִזְבַּחֲךָ
  english_pob_choice: before your altar
  chosen_spanish: delante de tu altar
  alternatives_spanish:
  - ante tu altar
  - en presencia de tu altar
  lexicon: HALOT
  rationale: '''Delante de'' reproduce la relación espacial/judicial del hebreo con naturalidad en español y mantiene el paralelismo con la escena cultual.'
- source_word: בַּבַּיִת הַזֶּה
  english_pob_choice: in this house
  chosen_spanish: en esta casa
  alternatives_spanish:
  - en este templo
  - en este lugar
  lexicon: HALOT
  rationale: '''Casa'' traduce literalmente בַּיִת y conserva la resonancia teológica del edificio como morada dedicada a Yahvé.'
theological_decisions:
- issue: Alָה como 'juramento' o 'maldición' en un contexto judicial ante el altar
  english_pob_reading: oath
  chosen_spanish_reading: juramento
  alternative_spanish_readings:
  - maldición
  - juramento/maldición
  rationale: La escena trata de un acto judicial solemne ante el altar, por lo que 'juramento' es la lectura principal. Sin embargo, se preserva la tensión del término hebreo mediante la decisión lexical y la nota, ya que אָלָה también puede implicar la maldición invocada si se quebranta el juramento.
  doctrine_reference: Translation philosophy §3, preservar tensiones léxicas y teológicas del texto
- issue: La expresión cultual 'ante tu altar' dentro de la casa dedicada a Yahvé
  english_pob_reading: before your altar in this house
  chosen_spanish_reading: delante de tu altar en esta casa
  alternative_spanish_readings:
  - ante tu altar en esta casa
  - delante de tu altar en este templo
  rationale: Se conserva el lenguaje del santuario sin sustituir 'casa' por 'templo', porque el hebreo dice literalmente 'casa' y esa palabra forma parte de la teología del pasaje.
  doctrine_reference: Concordancia con el hebreo y preservación de la imagen del santuario
- issue: Pronombre posesivo divino en 'tu altar'
  english_pob_reading: your altar
  chosen_spanish_reading: tu altar
  alternative_spanish_readings:
  - el altar de Yahvé
  - su altar
  rationale: El texto hebreo se dirige directamente a Dios en segunda persona, por lo que el posesivo 'tu' refleja mejor la forma orante y evita ocultar la dirección del discurso.
  doctrine_reference: Uso reverente de la segunda persona en oración bíblica
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó la frase a 'is made to swear an oath' por considerarla más natural y directa. La redacción española sigue esa misma decisión al expresar la idea con 'se le hace prestar juramento', evitando una construcción forzada y manteniendo el marco judicial del hebreo. No se incorporaron cambios adicionales que alteren el sentido del versículo.
  spanish_consistency_notes:
  - Se mantuvo 'casa' en lugar de 'templo' para respetar בַּיִת y la terminología habitual del POB.
  - Se eligió 'prójimo' para רֵעַ por su valor ético-relacional y su buena inteligibilidad en español.
  - Se preservó 'juramento' como lectura principal de אָלָה, dejando la alternativa 'maldición' en nota para no borrar la ambigüedad léxica.
  - El registro es formal pero natural, apto para lectura pública y alineado con el estilo del proyecto.
