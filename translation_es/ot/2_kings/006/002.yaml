translation:
  language: es
  text: '«Por favor, vayamos al Jordán[a], y que cada uno tome de allí una viga[b], y hagamos allí un lugar para habitar[c].» Y él dijo: «Vayan.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Vengan, vayamos al Jordán».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cada hombre una viga», es decir, cada uno tomaría una sola pieza de madera.'
    reason: lexical_alternative
  - marker: c
    text: O «para morar allí».
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵלְכָה נָּא
  english_pob_choice: Please let us go
  chosen_spanish: Por favor, vamos
  alternatives_spanish:
  - Vamos, por favor
  - Por favor, vayamos
  lexicon: HALOT
  rationale: La forma cohortativa con נָא expresa una súplica o petición cortés; en español, «Por favor, vamos» conserva el tono de ruego sin sonar artificioso.
- source_word: עַד הַיַּרְדֵּן
  english_pob_choice: to the Jordan
  chosen_spanish: hasta el Jordán
  alternatives_spanish:
  - al Jordán
  - hasta el río Jordán
  lexicon: HALOT
  rationale: עַד marca destino o alcance; «hasta el Jordán» sigue el sentido espacial del hebreo y mantiene el nombre geográfico sin sobredeterminar con «río».
- source_word: וְנִקְחָה מִשָּׁם
  english_pob_choice: and let ... take from there
  chosen_spanish: y que cada hombre tome de allí
  alternatives_spanish:
  - y tomemos de allí
  - y que cada uno tome de allí
  lexicon: HALOT
  rationale: El distributivo del hebreo se expresa mejor en español con «cada hombre»; así se preserva que la acción es individual dentro del grupo.
- source_word: אִישׁ קוֹרָה אֶחָת
  english_pob_choice: each man ... one beam
  chosen_spanish: cada hombre ... una viga
  alternatives_spanish:
  - cada hombre ... un madero
  - cada uno ... una viga
  lexicon: HALOT
  rationale: קוֹרָה designa una pieza de madera para construcción; «viga» es natural y contextual. «Hombre» conserva el singular distributivo del hebreo, sin borrar el matiz representativo.
- source_word: וְנַעֲשֶׂה לָּנוּ שָׁם מָקוֹם
  english_pob_choice: and let us make a place for ourselves there
  chosen_spanish: y hagámonos allí un lugar
  alternatives_spanish:
  - y hagamos allí un lugar para nosotros
  - y hagámonos allí un sitio
  lexicon: HALOT
  rationale: עשה es amplio ('hacer'). «Hagámonos allí un lugar» comunica el beneficio reflexivo sin añadir la idea de construcción explícita que el hebreo no exige.
- source_word: לָשֶׁבֶת שָׁם
  english_pob_choice: to dwell there
  chosen_spanish: para vivir allí
  alternatives_spanish:
  - para morar allí
  - para habitar allí
  lexicon: HALOT
  rationale: ישב en contexto de asentamiento significa residir o morar. «Para vivir allí» es claro y natural en español moderno, aunque «morar/habitar» quedarían más solemnes.
- source_word: וַיֹּאמֶר לֵכוּ
  english_pob_choice: And he said, "Go."
  chosen_spanish: 'Y él dijo: “Vayan.”'
  alternatives_spanish:
  - 'Y dijo: “Vayan.”'
  - 'Entonces dijo: “Vayan.”'
  lexicon: HALOT
  rationale: La respuesta narrativa es breve y de permiso; «Vayan» reproduce la concisión del hebreo y el plural del mandato.
theological_decisions:
- issue: El valor del verbo לָשֶׁבֶת en un contexto de asentamiento
  english_pob_reading: to dwell there
  chosen_spanish_reading: para vivir allí
  alternative_spanish_readings:
  - para morar allí
  - para habitar allí
  rationale: No hay una carga doctrinal especial, pero sí una decisión de registro. «Vivir» comunica la idea de residencia estable a lectores modernos; las alternativas más tradicionales se conservan como posibles matices.
  doctrine_reference: None
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y la revisión reciente que prefirió un registro más formal con «dwell there». En español, se optó por «para vivir allí» por ser más natural y transparente, sin perder el sentido de residencia estable; se mantuvieron las alternativas tradicionales en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija explícitamente; este versículo no contiene el nombre divino.
  - Se mantuvo el distributivo singular del hebreo con «cada hombre» para no diluir la fuerza de אִישׁ קוֹרָה אֶחָת.
  - «Jordán» se entiende como el río por contexto, por lo que no se añadió «río» en el texto principal.
