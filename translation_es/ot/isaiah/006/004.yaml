translation:
  language: es
  text: Las bases de los umbrales[a] se estremecieron al sonido del que clamaba, y la casa[b] se llenó de humo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los postes de los umbrales» o «los soportes de los umbrales». La expresión hebrea se refiere a partes estructurales del área de la entrada.
    reason: lexical_alternative
  - marker: b
    text: O «el templo». Hebreo «la casa», una designación común del santuario del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּנֻעוּ
  english_pob_choice: shook
  chosen_spanish: se estremecieron
  alternatives_spanish:
  - temblaron
  - se sacudieron
  - se movieron
  lexicon: HALOT
  rationale: El hebreo expresa movimiento vibratorio o sacudida de una estructura; «se estremecieron» comunica bien el efecto físico intenso en español sin añadir una interpretación excesiva.
- source_word: אַמּוֹת
  english_pob_choice: foundations
  chosen_spanish: las bases
  alternatives_spanish:
  - los fundamentos
  - los soportes
  - los postes
  lexicon: HALOT
  rationale: En este contexto arquitectónico, la palabra puede referirse a elementos de soporte de la entrada. «Bases» conserva la idea estructural sin forzar «fundamentos» como si fueran cimientos generales.
- source_word: הַסִּפִּים
  english_pob_choice: the thresholds
  chosen_spanish: de los umbrales
  alternatives_spanish:
  - de los dinteles
  - de las puertas
  - de los postigos
  lexicon: HALOT
  rationale: סַף suele referirse al umbral o umbral/entrada. «Umbrales» es la correspondencia más directa y clara en español para esta imagen del templo.
- source_word: מִקּוֹל
  english_pob_choice: at the sound of
  chosen_spanish: al sonido de
  alternatives_spanish:
  - por el sonido de
  - ante el sonido de
  - a causa de la voz de
  lexicon: HALOT
  rationale: La construcción hebrea expresa causa mediante «de/desde el sonido». «Al sonido de» es una solución natural en español que conserva esa relación causal sin sobretraducir.
- source_word: הַקּוֹרֵא
  english_pob_choice: the one calling
  chosen_spanish: del que clamaba
  alternatives_spanish:
  - del que llamaba
  - del que estaba llamando
  - del que gritaba
  lexicon: HALOT
  rationale: El participio funciona como sustantivo verbal. «El que clamaba» mantiene la fuerza verbal y el tono solemne del contexto visionario mejor que un simple sustantivo como «el llamador».
- source_word: וְהַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la morada
  - el santuario
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la casa». En la visión se entiende como el templo, pero mantener «la casa» preserva la forma del texto fuente y deja la identificación al contexto.
- source_word: יִמָּלֵא
  english_pob_choice: was filled
  chosen_spanish: fue llena
  alternatives_spanish:
  - se llenó
  - quedó llena
  - estaba llena
  lexicon: HALOT
  rationale: El nifal en narrativa se traduce naturalmente en pasivo. «Fue llena» mantiene el registro bíblico y reproduce con fidelidad el valor pasivo del verbo.
- source_word: עָשָׁן
  english_pob_choice: smoke
  chosen_spanish: humo
  alternatives_spanish:
  - hollín
  - vapores
  - ahumado
  lexicon: HALOT
  rationale: Equivalente léxico directo y transparente; no hay motivo para variar el sentido básico.
theological_decisions:
- issue: Terminología del santuario en la visión
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  - el santuario
  rationale: Se conserva la expresión literal del hebreo, que en contexto apunta al templo sin necesidad de reemplazarla por un glosado interpretativo. Esto mantiene la transparencia del texto fuente y la tensión entre forma literal y sentido contextual.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referente del que clama
  english_pob_reading: the one calling
  chosen_spanish_reading: del que clamaba
  alternative_spanish_readings:
  - del que llamaba
  - del que gritaba
  rationale: La forma participial no se reduce a un título estático. «Clamaba» conserva la acción en curso y el tono solemne/visionario del pasaje, sin fijar indebidamente la identidad del referente más allá de lo que el hebreo explicita.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail inglés: se mantiene la decisión de traducir el sustantivo source-word «house» literalmente como «casa», y se preserva la imagen arquitectónica de «thresholds» con una nota alternativa sobre partes estructurales de la entrada. No se introdujeron revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en este proyecto cuando aparezca el nombre divino, pero en este versículo no ocurre.
  - 'Se mantuvo el tono bíblico sin calco excesivo: «se estremecieron», «al sonido de», «fue llena de humo».'
  - La nota [a] evita confundir «umbrales» con una estructura única en español, reflejando la ambigüedad arquitectónica documentada en el audit trail inglés.
