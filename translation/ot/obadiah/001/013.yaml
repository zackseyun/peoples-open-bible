id: OBA.1.13
reference: Obadiah 1:13
source:
  edition: WLC
  text: אַל תָּב֤וֹא בְ/שַֽׁעַר עַמִּ/י֙ בְּ/י֣וֹם אֵידָ֔/ם אַל תֵּ֧רֶא גַם אַתָּ֛ה בְּ/רָעָת֖/וֹ בְּ/י֣וֹם אֵיד֑/וֹ וְ/אַל תִּשְׁלַ֥חְנָה בְ/חֵיל֖/וֹ בְּ/י֥וֹם אֵידֽ/וֹ־־־־־׃
translation:
  text: Do not enter the gate of my people in the day of their disaster[a]; do not look on his calamity, even you, in the day of his disaster[b]; and do not lay hands on his wealth in the day of his disaster.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'look on'; the Hebrew verb is literally 'see,' but here likely carries the sense of looking with malicious satisfaction.
    reason: lexical_alternative
  - marker: b
    text: Or 'his army,' 'his strength,' or 'his resources'; the Hebrew word can denote military force or wealth. Here it is rendered 'wealth' because the context is plundering after disaster.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּב֤וֹא בְ/שַֽׁעַר עַמִּ/י
  chosen: enter the gate of my people
  alternatives:
  - come into the gate of my people
  - enter my people's gate
  lexicon: HALOT
  rationale: שַׁעַר ('gate') in prophetic literature often stands for the city entrance and, by extension, entry into the city/community. 'Enter the gate of my people' preserves the concrete image without over-paraphrasing to simply 'enter my people’s city.'
- source_word: בְּ/י֣וֹם אֵידָ֔/ם
  chosen: in the day of their disaster
  alternatives:
  - on the day of their calamity
  - in the day of their ruin
  lexicon: HALOT
  rationale: אֵיד denotes disaster/calamity. 'Disaster' is natural modern English and fits the repeated refrain. The 3mp suffix here is retained as 'their' because the referent is 'my people.'
- source_word: תֵּ֧רֶא
  chosen: gloat over
  alternatives:
  - look on
  - stare at
  - look with satisfaction at
  lexicon: HALOT
  rationale: Although ראה literally means 'see/look,' in this context of hostile behavior (parallel to entering opportunistically and seizing wealth) the sense is not neutral sight but malicious looking. 'Gloat over' brings out the contextual force in idiomatic English while remaining anchored in the discourse context.
- source_word: גַם אַתָּה
  chosen: even you
  alternatives:
  - you too
  - yes, you
  lexicon: HALOT
  rationale: The phrase adds emphasis and reproach toward Edom. 'Even you' preserves the pointed rhetorical force.
- source_word: בְ/רָעָת֖/וֹ
  chosen: his calamity
  alternatives:
  - his trouble
  - his evil
  - his misfortune
  lexicon: HALOT
  rationale: רָעָה here refers to experienced harm/disaster, not moral evil. 'Calamity' matches the context of national downfall. The singular suffix likely reflects the personified nation/brother Jacob; English can preserve this as 'his' without obscuring the collective referent.
- source_word: וְ/אַל תִּשְׁלַ֥חְנָה
  chosen: do not lay hands on
  alternatives:
  - do not send forth against
  - do not reach out for
  - do not seize
  lexicon: HALOT
  rationale: שׁלח with ב can idiomatically mean to stretch out one's hand against or onto something. Given the object 'his wealth/force,' the sense is plundering. 'Lay hands on' preserves the idiom and hostile action without over-specifying beyond the Hebrew.
- source_word: בְ/חֵיל֖/וֹ
  chosen: his wealth
  alternatives:
  - his army
  - his strength
  - his resources
  lexicon: HALOT
  rationale: חַיִל can mean strength, army, or wealth. In the context of looting after disaster, 'wealth' best fits the prohibition against opportunistic plunder. The military sense is possible but less likely with the idiom 'lay hands on' in this sequence.
- source_word: בְּ/י֥וֹם אֵידֽ/וֹ
  chosen: in the day of his disaster
  alternatives:
  - on the day of his calamity
  lexicon: HALOT
  rationale: The repeated refrain is preserved consistently for rhetorical effect. The singular suffix is maintained in English as 'his,' reflecting the Hebrew personification of the nation.
