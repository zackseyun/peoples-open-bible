translation:
  language: es
  text: 'Y le dirás: «Así dice Yahvé: ¿Has asesinado y además te has apoderado de ella?». Y le dirás: «Así dice Yahvé: En el lugar donde los perros lamieron la sangre de Nabot, los perros lamerán tu sangre, tú también[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu sangre, también tú». El hebreo añade una expresión enfática que subraya que la misma afrenta que cayó sobre Nabot recaerá sobre Ahab.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְדִבַּרְתָּ אֵלָיו לֵאמֹר
  english_pob_choice: And you shall speak to him, saying
  chosen_spanish: Y hablarás a él, diciendo
  alternatives_spanish:
  - Y le dirás
  - Entonces hablarás a él, diciendo
  lexicon: HALOT
  rationale: Se conserva la fórmula profética formal דבר + אל + לאמר con un giro natural en español. «Hablarás a él» refleja el mandato y mantiene la repetición retórica del hebreo mejor que una simplificación excesiva.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice el Señor
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: YHWH se traduce como «Yahvé» conforme a la guía del proyecto. «Así dice» reproduce la fórmula mensajera profética con naturalidad y fidelidad formal.
- source_word: הֲרָצַחְתָּ
  english_pob_choice: Have you murdered
  chosen_spanish: ¿Has asesinado
  alternatives_spanish:
  - ¿Has matado
  - ¿Has dado muerte a
  lexicon: HALOT
  rationale: El verbo רצח expresa homicidio ilícito; en este contexto la acusación profética tiene fuerza judicial y moral. «Asesinado» conserva mejor ese peso que el más amplio «matado».
- source_word: וְגַם יָרָשְׁתָּ
  english_pob_choice: and also taken possession
  chosen_spanish: y además tomado posesión
  alternatives_spanish:
  - y además heredado
  - y además apoderado de ello
  lexicon: HALOT
  rationale: ירש aquí apunta a la apropiación indebida tras la muerte de Nabot. «Tomado posesión» expresa la adquisición consumada sin introducir «herencia» donde el contexto inmediato no la exige de forma explícita.
- source_word: בִּמְקוֹם אֲשֶׁר
  english_pob_choice: In the place where
  chosen_spanish: En el lugar donde
  alternatives_spanish:
  - En el sitio donde
  - Allí donde
  lexicon: HALOT
  rationale: La construcción locativa se vierte de forma directa y clara. «En el lugar donde» preserva la concreción del escenario del juicio.
- source_word: לָקְקוּ ... יָלֹקּוּ
  english_pob_choice: licked ... shall lick
  chosen_spanish: lamieron ... lamerán
  alternatives_spanish:
  - lamieron ... lamerán
  - lamieron ... lamerán
  lexicon: HALOT
  rationale: Se repite el mismo verbo en pasado y futuro para conservar el paralelismo y la imagen gráfica del hebreo. «Lamer» es la equivalencia más directa y natural en español.
- source_word: הַכְּלָבִים
  english_pob_choice: the dogs
  chosen_spanish: los perros
  alternatives_spanish:
  - los perros
  - los canes
  lexicon: HALOT
  rationale: «Perros» es la forma natural en español y conserva la imagen concreta del juicio. «Canes» sería más elevado, pero menos idiomático para la mayoría de lectores.
- source_word: דַּם נָבוֹת
  english_pob_choice: the blood of Naboth
  chosen_spanish: la sangre de Nabot
  alternatives_spanish:
  - la sangre de Naboth
  - la sangre del Nabot
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera directa. Se translitera el nombre como «Nabot», forma breve y reconocible en español bíblico; «sangre» corresponde al hebreo דָּם en este contexto.
- source_word: אֶת דָּמְךָ גַּם אָתָּה
  english_pob_choice: your blood—you also
  chosen_spanish: tu sangre, tú también[a]
  alternatives_spanish:
  - tu sangre, también tú
  - tu sangre, sí, tú mismo
  lexicon: HALOT
  rationale: Se preserva el énfasis abrupto del hebreo con una posposición enfática en español. «Tú también» comunica la aplicación personal y el paralelo de juicio sin suavizar la clausura retórica.
theological_decisions:
- issue: Fuerza moral-jurídica de הֲרָצַחְתָּ
  english_pob_reading: Have you murdered rather than the broader 'Have you killed.'
  chosen_spanish_reading: ¿Has asesinado?
  alternative_spanish_readings:
  - ¿Has matado?
  - ¿Has dado muerte?
  rationale: El relato denuncia la responsabilidad de Ahab en la muerte injusta de Nabot. «Asesinado» preserva la gravedad legal y ética que exige el hebreo en este contexto.
  doctrine_reference: Translation philosophy §3, §5
- issue: Énfasis final de גַּם אָתָּה
  english_pob_reading: your blood—you also
  chosen_spanish_reading: tu sangre, tú también
  alternative_spanish_readings:
  - tu sangre, también tú
  - tu sangre, sí, tú mismo
  rationale: La frase final no es meramente redundante; subraya que el mismo destino recaerá sobre Ahab. Mantener esa reiteración evita suavizar la reprensión profética.
  doctrine_reference: Translation philosophy §3, §5
- issue: Uso del nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Se sigue la convención del proyecto de traducir el Tetragrámaton como «Yahvé» para no ocultar el nombre propio divino bajo un título.
  doctrine_reference: Guía terminológica del proyecto
translation_notes:
  revision_awareness: La base inglesa fue revisada para acercar «licked up»/«shall lick up» a «licked»/«shall lick» por mayor correspondencia léxica. En español se decidió mantener el paralelismo verbal con «lamieron/lamerán», sin añadir «arriba», porque el verbo simple ya reproduce con precisión la imagen del hebreo y suena más natural y publicable.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se translitera el nombre propio como «Nabot», coherente con uso bíblico español breve.
  - Se conserva el paralelismo verbal pasado/futuro («lamieron/lamerán») para reflejar el hebreo.
  - Se mantiene el orden enfático final con nota para no perder la fuerza de גַּם אָתָּה.
  - «Los perros» se prefiere por naturalidad frente a «canes» en una lectura pública.
