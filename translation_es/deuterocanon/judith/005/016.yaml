translation:
  language: es
  text: Y expulsaron de su presencia al cananeo, al ferezeo, al jebuseo, al siquemita[a] y a todos los girgaseos, y habitaron en ella por muchos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «el siquemita»; la forma puede reflejar a Siquem o al pueblo de Siquem más que un etnónimo más familiar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέβαλον
  english_pob_choice: drove out
  chosen_spanish: expulsaron
  alternatives_spanish:
  - arrojaron
  - sacaron
  lexicon: BDAG
  rationale: El verbo griego expresa remoción forzosa. En español, «expulsaron» comunica bien esa fuerza sin perder naturalidad en un contexto de conquista.
- source_word: ἐκ προσώπου αὐτῶν
  english_pob_choice: from before them
  chosen_spanish: de delante de ellos
  alternatives_spanish:
  - de su presencia
  - de ante ellos
  lexicon: LEH
  rationale: La locución semítica se conserva con una fórmula española natural. «De delante de ellos» mantiene la idea de alejamiento frontal sin sobretraducirla.
- source_word: Χαναναῖον
  english_pob_choice: the Canaanite
  chosen_spanish: el cananeo
  alternatives_spanish:
  - el cananeo (colectivo)
  - los cananeos
  lexicon: LEH
  rationale: Se preserva el singular colectivo del griego con un etnónimo singular español, como en la auditoría inglesa.
- source_word: Φερεζαῖον
  english_pob_choice: the Perizzite
  chosen_spanish: el ferezeo
  alternatives_spanish:
  - el perizita
  - los ferezeos
  lexicon: LEH
  rationale: Se sigue el etnónimo bíblico habitual en español («ferezeo»), manteniendo el singular colectivo del griego.
- source_word: Ἰεβουσαῖον
  english_pob_choice: the Jebusite
  chosen_spanish: el jebuseo
  alternatives_spanish:
  - los jebuseos
  lexicon: LEH
  rationale: Se conserva el etnónimo bíblico tradicional y el singular colectivo del griego.
- source_word: Συχέμ
  english_pob_choice: the Shechemite
  chosen_spanish: el siquemita
  alternatives_spanish:
  - Siquem
  - la gente de Siquem
  lexicon: LEH
  rationale: El griego parece usar una forma étnica ligada a Siquem, no simplemente el topónimo. «Siquemita» reproduce esa ambigüedad mejor que convertirlo sin más en nombre de lugar.
- source_word: πάντας τοὺς Γεργεσαίους
  english_pob_choice: all the Girgashites
  chosen_spanish: a todos los gergeseos
  alternatives_spanish:
  - a todos los gergeseos
  - a todos los girgaseos
  lexicon: LEH
  rationale: Se conserva el plural con cuantificador total, en forma de etnónimo bíblico reconocible en español.
- source_word: κατῴκησαν
  english_pob_choice: they lived
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - se establecieron
  lexicon: BDAG
  rationale: «Habitaron» refleja bien el valor de residir/establecerse y suena más bíblico sin perder claridad.
- source_word: ἐν αὐτῇ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - allí
  - en esa tierra
  lexicon: BDAG
  rationale: El pronombre femenino en español puede remitir naturalmente a la tierra o región implícita por el contexto. «En ella» preserva la referencia pronominal sin añadir sustantivos.
- source_word: ἡμέρας πολλάς
  english_pob_choice: for many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - durante muchos días
  - muchos días
  lexicon: BDAG
  rationale: La duración acusativa se vierte de manera directa con «por muchos días», una solución idiomática y fiel.
theological_decisions:
- issue: Mantener la fuerza histórica de la expulsión/conquista sin suavizarla
  english_pob_reading: And they drove out ... and they lived in it for many days.
  chosen_spanish_reading: Y expulsaron ... y habitaron en ella por muchos días.
  alternative_spanish_readings:
  - Y los echaron ... y vivieron allí mucho tiempo.
  - Y los removieron ... y se establecieron allí por mucho tiempo.
  rationale: La frase presenta un hecho histórico de desposesión y residencia posterior. Se conserva el tono directo y la fuerza del acto sin añadir eufemismos ni explicaciones interpretativas.
  doctrine_reference: 'DOCTRINE.md: Primacía del texto original; conservar tensiones históricas y teológicas sin resolverlas en la traducción.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del contexto en inglés: no se requieren cambios adicionales; se mantiene la equivalencia óptima con un español natural y auditable.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; este versículo no contiene el nombre divino.
  - Se mantiene la distinción entre etnónimos singulares colectivos y plurales, siguiendo el patrón del griego y la auditoría inglesa.
  - «Habitaron» evita una simplificación excesiva de κατῴκησαν y conserva un registro bíblico sin arcaísmo innecesario.
  - La nota sobre «siquemita» se conserva porque el español también puede generar la misma ambigüedad que el griego, y conviene explicitarla.
