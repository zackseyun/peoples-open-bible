    text: O «su papo», para «su buche».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «con sus plumas»; algunas traducciones lo interpretan como «con su suciedad».
    reason: alternative_reading
  revision_rationale: Se corrigió el texto para alinearlo con el hebreo y con el aparato auditado del POB inglés. Se restauró la nota léxica sobre מֻרְאָתוֹ en un español útil ('buche' / 'papo') y la nota sobre la lectura alternativa de בְּנֹצָתָהּ ('con su suciedad'). También se reemplazó 'al lado oriente' por 'en el lado oriental' por claridad y naturalidad, eliminando una nota estilística innecesaria. El resto del contenido se mantuvo fiel al sentido fuente.
