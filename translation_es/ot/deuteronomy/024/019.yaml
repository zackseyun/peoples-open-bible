translation:
  language: es
  text: Cuando siegues tu cosecha en tu campo y olvides una gavilla en el campo, no volverás para tomarla. Será para el extranjero residente[a], para el que no tiene padre[b] y para la viuda, para que Yahvé tu Dios te bendiga en toda la obra de tus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el forastero», «el residente extranjero» o «el extranjero». El término hebreo designa a una persona no nativa que vive entre Israel.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el huérfano». El hebreo expresa literalmente la categoría de quien no tiene padre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: Introduce una situación legal/casuística. En español, 'cuando' conserva bien el valor circunstancial sin volver la frase pesada.
- source_word: תִקְצֹר
  english_pob_choice: you reap
  chosen_spanish: siegues
  alternatives_spanish:
  - coseches
  - recojas
  lexicon: HALOT
  rationale: El verbo se refiere específicamente a segar el grano. 'Siegues' preserva mejor la imagen agrícola concreta que el más general 'coseches'.
- source_word: קְצִירְךָ
  english_pob_choice: your harvest
  chosen_spanish: tu cosecha
  alternatives_spanish:
  - tu siega
  - tu cosechado
  lexicon: HALOT
  rationale: Designa el producto de la siega/cosecha. 'Tu cosecha' es natural en español y comunica el conjunto de la recolección.
- source_word: בְשָׂדֶךָ
  english_pob_choice: in your field
  chosen_spanish: en tu campo
  alternatives_spanish:
  - en tu terreno
  lexicon: HALOT
  rationale: Equivale de manera directa al ámbito agrícola del texto.
- source_word: וְשָׁכַחְתָּ
  english_pob_choice: and forget
  chosen_spanish: y olvides
  alternatives_spanish:
  - y hayas olvidado
  lexicon: HALOT
  rationale: La forma simple en español expresa bien la circunstancia legal sin acumular tiempos verbales innecesarios.
- source_word: עֹמֶר
  english_pob_choice: a sheaf
  chosen_spanish: una gavilla
  alternatives_spanish:
  - un manojo
  - una atadura de espigas
  - una gavilla de grano
  lexicon: HALOT
  rationale: En este contexto agrícola, 'gavilla' es el equivalente más natural y preciso para un manojo de cereal cortado; 'omer' no se usa por su sentido metrológico posterior.
- source_word: לֹא תָשׁוּב לְקַחְתּוֹ
  english_pob_choice: you shall not go back to take it
  chosen_spanish: no volverás para tomarla
  alternatives_spanish:
  - no regresarás para recogerla
  - no volverás a tomarla
  lexicon: HALOT
  rationale: Conserva la prohibición y el movimiento de retorno. Se adapta el objeto femenino para concordar con 'gavilla' en español.
- source_word: לַגֵּר
  english_pob_choice: the sojourner
  chosen_spanish: el extranjero residente
  alternatives_spanish:
  - el forastero residente
  - el residente extranjero
  - el forastero
  lexicon: HALOT
  rationale: El término hebreo señala a un no nativo que vive entre Israel. 'Extranjero residente' comunica esa condición social sin perder la idea de permanencia entre la comunidad.
- source_word: לַיָּתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: el huérfano
  alternatives_spanish:
  - el desamparado
  - el niño sin padre
  lexicon: HALOT
  rationale: La POB inglesa opta por 'fatherless' para conservar la categoría social; en español, 'huérfano' es la forma natural y entendible, aunque también puede resonar más familiarmente como 'sin padre'.
- source_word: וְלָאַלְמָנָה
  english_pob_choice: the widow
  chosen_spanish: la viuda
  lexicon: HALOT
  rationale: Traducción directa y estable de la categoría social vulnerable.
- source_word: יִהְיֶה
  english_pob_choice: It shall be for
  chosen_spanish: Será para
  alternatives_spanish:
  - Le pertenecerá a
  - Quedará para
  lexicon: HALOT
  rationale: La expresión indica destinación/provisión, no necesariamente transferencia de título; 'será para' preserva esa ambigüedad funcional.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Introduce propósito de forma natural en español.
- source_word: יְבָרֶכְךָ
  english_pob_choice: may bless you
  chosen_spanish: te bendiga
  alternatives_spanish:
  - te pueda bendecir
  - te bendecirá
  lexicon: HALOT
  rationale: El yiqtol final expresa finalidad/resultados; en español, el subjuntivo 'te bendiga' mantiene bien ese matiz sin forzar certeza mecánica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ''Yahvé'' en el texto principal, manteniendo el nombre divino en lugar de una sustitución como ''SEÑOR''.'
- source_word: בְּכֹל מַעֲשֵׂה יָדֶיךָ
  english_pob_choice: in all the work of your hands
  chosen_spanish: en toda obra de tus manos
  alternatives_spanish:
  - en todo el trabajo de tus manos
  - en toda tu labor
  lexicon: HALOT
  rationale: Conserva la imagen hebrea de la obra hecha por las manos y su sentido idiomático de labor, emprendimientos y resultados.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente. La política del proyecto pide conservar el nombre divino en español como 'Yahvé' en el texto principal, evitando la sustitución titular 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Término social-legal גֵּר
  english_pob_reading: sojourner
  chosen_spanish_reading: extranjero residente
  alternative_spanish_readings:
  - sojourner
  - forastero residente
  - residente extranjero
  rationale: '''Extranjero residente'' expresa para el lector español la condición de no nativo que vive dentro de la comunidad de Israel. Mantiene el trasfondo legal y la relación de vulnerabilidad sin introducir tecnicismo innecesario en el texto principal.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se revisó el estado más reciente del expediente y no se detectaron cambios pendientes; la lectura sigue en alto acuerdo con el auditoría inglesa.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre lenguaje agrícola concreto ('siegues', 'gavilla', 'campo') y la designación social/legal ('extranjero residente', 'huérfano', 'viuda').
  - Se preservó el nombre divino como 'Yahvé' conforme al criterio del proyecto, sin sustituirlo por una abreviatura litúrgica.
  - Se eligió un español natural pero suficientemente cercano a la sintaxis casuística del hebreo, con una sola oración principal y finalidad explícita.
