  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos en este versículo. 'Un hombre pobre' refleja bien עני en singular masculino proverbial, y 'se afana' es aceptable para עמל. No hay conflicto con Yahvé/Mesías u otras convenciones mayores.
