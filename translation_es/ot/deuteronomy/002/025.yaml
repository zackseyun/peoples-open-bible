translation:
  language: es
  text: Hoy comenzaré a poner sobre los pueblos, bajo todos los cielos, el pavor y el temor que inspiras[a], los cuales oirán noticias de ti y temblarán y se retorcerán[b] por causa de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oirán tu fama» o «oirán noticias acerca de ti». El hebreo puede referirse a un informe que produce reputación.
    reason: lexical_alternative
  - marker: b
    text: O «estarán en angustia» o «se retorcerán como una mujer de parto». El verbo hebreo evoca una aflicción corporal intensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָחֵל תֵּת
  english_pob_choice: I will begin to put
  chosen_spanish: comenzaré a poner
  alternatives_spanish:
  - comenzaré a dar
  - empiezo a poner
  lexicon: HALOT
  rationale: El hebreo expresa el inicio de una acción mediante el causativo de חלל con el infinitivo de נתן. «Comenzaré a poner» mantiene el valor de inicio y la colocación natural con pavor/temor en español.
- source_word: פַּחְדְּךָ
  english_pob_choice: the dread of you
  chosen_spanish: el pavor de ti
  alternatives_spanish:
  - tu pavor
  - el terror de ti
  lexicon: HALOT
  rationale: 'פַּחַד denota temor intenso, pavor, terror. «El pavor de ti» conserva el sentido objetivo: el miedo causado por ti, no el que tú sientes.'
- source_word: וְיִרְאָתְךָ
  english_pob_choice: and fear of you
  chosen_spanish: y el temor de ti
  alternatives_spanish:
  - y tu temor
  - y el terror de ti
  lexicon: HALOT
  rationale: יראה paralela a פחד aquí. Mantener dos sustantivos distintos —«pavor» y «temor»— preserva la pareja hebrea sin fundirla en una sola palabra.
- source_word: עַל פְּנֵי הָעַמִּים
  english_pob_choice: upon the peoples
  chosen_spanish: sobre los pueblos
  alternatives_spanish:
  - delante de los pueblos
  - en la presencia de los pueblos
  lexicon: HALOT
  rationale: La imagen literal es «sobre la faz de los pueblos», pero en español «sobre los pueblos» reproduce la relación espacial sin sonar forzado. «Pueblos» conserva el plural colectivo del hebreo.
- source_word: תַּחַת כָּל הַשָּׁמָיִם
  english_pob_choice: under all the heavens
  chosen_spanish: debajo de todos los cielos
  alternatives_spanish:
  - bajo todos los cielos
  - debajo de todo el cielo
  lexicon: HALOT
  rationale: El plural hebreo «cielos» se conserva en español. «Debajo de todos los cielos» mantiene el alcance universal del giro idiomático.
- source_word: שִׁמְעֲךָ
  english_pob_choice: the report of you
  chosen_spanish: tu noticia
  alternatives_spanish:
  - tu fama
  - el informe sobre ti
  lexicon: HALOT
  rationale: שֵׁמַע puede significar noticia, reporte o fama. «Tu noticia» es suficientemente amplio en español para incluir la reputación que circula por lo que se oye de Israel, sin fijar demasiado el matiz.
- source_word: וְרָגְזוּ
  english_pob_choice: and will tremble
  chosen_spanish: y temblarán
  alternatives_spanish:
  - y se estremecerán
  - y se agitarán
  lexicon: HALOT
  rationale: El verbo expresa sacudida o conmoción por miedo. «Temblarán» es la equivalencia natural y transparente en español.
- source_word: וְחָלוּ
  english_pob_choice: and writhe
  chosen_spanish: y se retorcerán
  alternatives_spanish:
  - y estarán en angustia
  - y tendrán dolores
  lexicon: HALOT
  rationale: חול puede evocar retorcerse o sufrir como de dolores intensos. «Se retorcerán» conserva la imagen corporal vívida sin cerrar el sentido a un solo escenario.
- source_word: מִפָּנֶיךָ
  english_pob_choice: because of you
  chosen_spanish: por causa de ti
  alternatives_spanish:
  - a causa de ti
  - delante de ti
  lexicon: HALOT
  rationale: Aunque literalmente significa «desde delante de tu presencia», en contexto expresa la causa del temor. «Por causa de ti» comunica bien ese valor causal en español.
theological_decisions:
- issue: Intensificación del temor entre los pueblos como acción iniciada por Yahvé
  english_pob_reading: Today I will begin to put the dread and fear of you upon the peoples under all the heavens
  chosen_spanish_reading: Hoy comenzaré a poner el pavor y el temor de ti sobre los pueblos debajo de todos los cielos
  alternative_spanish_readings:
  - Hoy empezaré a poner...
  - Hoy comenzaré a dar...
  rationale: 'El texto atribuye a Yahvé el inicio de una acción histórica: infundir temor a las naciones. La traducción preserva ese sujeto divino y el carácter progresivo de «comenzaré».'
  doctrine_reference: Deuteronomio 2:25; cf. Éxodo 15:14-16
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés, pero la redacción española se ajustó directamente al hebreo: se conservaron el paralelismo פַּחַד/יִרְאָה, el alcance universal de תַּחַת כָּל הַשָּׁמָיִם y el valor causal de מִפָּנֶיךָ. También se respetó la imagen corporal de וְחָלוּ sin especificar «dolores de parto» en el texto principal.'
  spanish_consistency_notes:
  - Se usó «Yahvé» según la terminología del proyecto cuando aparezca el Nombre divino en el contexto canónico cercano, aunque este versículo no lo menciona explícitamente.
  - Se prefirió «pavor/temor» para mantener la distinción semántica del par hebreo, evitando colapsarlo en un solo término.
  - «Pueblos» traduce el colectivo hebreo הָעַמִּים con un registro bíblico claro y contemporáneo.
