translation:
  language: es
  text: Llévense tanto sus rebaños[a] como sus reses, tal como han dicho, y váyanse; y bendíganme también a mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “su ganado menor”. El hebreo צֹאן es un término colectivo que puede referirse a ovejas y cabras.
    reason: lexical_alternative
  - marker: b
    text: O “bendíganme incluso a mí”. La redacción de Faraón puede enfatizar que él también busca bendición mientras Israel se va.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹאנְכֶם
  english_pob_choice: your flocks
  chosen_spanish: sus ovejas
  alternatives_spanish:
  - sus rebaños
  - su ganado menor
  lexicon: HALOT
  rationale: צֹאן es un colectivo para ganado menor, especialmente ovejas y cabras. En español, en este contexto, 'ovejas' funciona como equivalente natural para la primera categoría de ganado; 'rebaños' sería más genérico y 'ganado menor' suena técnico.
- source_word: בְּקַרְכֶם
  english_pob_choice: your herds
  chosen_spanish: sus vacas
  alternatives_spanish:
  - su ganado vacuno
  - sus reses
  - sus hatos
  lexicon: HALOT
  rationale: בָּקָר refiere a ganado vacuno o grande. 'Vacas' mantiene el paralelismo inmediato con 'ovejas' en español y es suficientemente preciso en esta escena; 'ganado vacuno' sería más técnico y 'reses' más regional.
- source_word: קְחוּ
  english_pob_choice: Take
  chosen_spanish: Lleven
  alternatives_spanish:
  - Tomen
  - Ladren
  lexicon: HALOT
  rationale: El imperativo plural aquí ordena irse llevando el ganado. En español, 'lleven' preserva el sentido de tomar consigo en el contexto de partida mejor que un simple 'tomen'.
- source_word: כַּאֲשֶׁר דִּבַּרְתֶּם
  english_pob_choice: just as you have said
  chosen_spanish: como han dicho
  alternatives_spanish:
  - tal como han dicho
  - según han dicho
  lexicon: HALOT
  rationale: La frase alude a la petición ya expresada por Moisés y Aarón. 'Como han dicho' comunica la concesión de Faraón de forma natural y fiel; 'tal como' sería un poco más enfático.
- source_word: וָלֵכוּ
  english_pob_choice: and go
  chosen_spanish: y váyanse
  alternatives_spanish:
  - y vayan
  - y partan
  lexicon: HALOT
  rationale: Aquí הלך es un mandato de partida. 'Váyanse' expresa claramente la salida exigida por el contexto; 'partan' es posible, pero algo más formal y menos directo.
- source_word: וּבֵרַכְתֶּם
  english_pob_choice: and bless
  chosen_spanish: y bendíganme
  alternatives_spanish:
  - y bendigan también
  - y declaren bendición sobre mí
  lexicon: HALOT
  rationale: ברך en piel significa 'bendecir'. El español directo 'bendíganme' conserva la fuerza verbal sin añadir explicaciones que el texto no da.
- source_word: גַּם אֹתִי
  english_pob_choice: me also
  chosen_spanish: también a mí
  alternatives_spanish:
  - a mí también
  - incluso a mí
  lexicon: HALOT
  rationale: La partícula גַּם añade a Faraón como receptor de la bendición. 'También a mí' mantiene ese énfasis y suena natural en español.
theological_decisions:
- issue: Sentido de la petición de Faraón por bendición
  english_pob_reading: Render as a straightforward request for blessing without specifying whether Pharaoh seeks divine favor through Moses and Aaron or merely a polite farewell blessing.
  chosen_spanish_reading: Se traduce como una petición directa de bendición, sin precisar si Faraón busca favor divino por medio de Moisés y Aarón o solo una fórmula de despedida.
  alternative_spanish_readings:
  - una petición de favor intercesor del Dios de Israel
  - una fórmula convencional de despedida con buenos deseos
  rationale: El hebreo de ברך es claro, pero el texto no explicita el mecanismo exacto de la bendición. Conviene conservar la tensión narrativa sin resolverla con una explicación doctrinal o ceremonial ajena al verso.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso alto del expediente inglés y mantiene la tensión del pedido de bendición sin interpretarlo de más. No hay revisiones previas que requieran reflejo adicional.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque este versículo no contiene el nombre divino.
  - Se usa un registro digno y claro, sin calco mecánico.
  - '''Bendíganme'' conserva el valor directo de ברך sin convertirlo en una paráfrasis litúrgica.'
  - La primera categoría de ganado se vierte como 'ovejas' y se deja nota alternativa porque צֹאן puede ser más amplio que ese término.
