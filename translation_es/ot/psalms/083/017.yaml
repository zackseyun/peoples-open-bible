translation:
  language: es
  text: Llena sus rostros de vergüenza[a], para que busquen tu nombre, Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y busquen tu nombre»; el verbo hebreo también puede tomarse como continuación simple, aunque aquí probablemente expresa propósito o resultado.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַלֵּא
  english_pob_choice: Fill
  chosen_spanish: Llena
  alternatives_spanish:
  - Cubre
  - Haz lleno
  lexicon: HALOT
  rationale: El imperativo piel 2ms de מלא pide un verbo directo y natural en español. «Llena» conserva la imagen de plenitud aplicada al rostro y mantiene el carácter de petición dirigida a Dios.
- source_word: פְנֵיהֶם
  english_pob_choice: their faces
  chosen_spanish: el rostro de ellos
  alternatives_spanish:
  - sus rostros
  - su rostro
  - su presencia
  lexicon: HALOT
  rationale: En español, «el rostro de ellos» evita ambigüedad de posesivo y conserva la imagen corporal y pública del hebreo. Aunque «sus rostros» es posible, esta forma suena más sobria y transparente en un contexto litúrgico.
- source_word: קָלוֹן
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - desgracia
  - humillación
  lexicon: HALOT
  rationale: «Vergüenza» reproduce bien el campo semántico de קָלוֹן y funciona de manera natural con «llenar el rostro de». «Deshonra» y «desgracia» serían alternativas válidas, pero suenan más externas o menos idiomáticas aquí.
- source_word: וִיבַקְשׁוּ
  english_pob_choice: that they may seek
  chosen_spanish: para que busquen
  alternatives_spanish:
  - y que busquen
  - y busquen
  - para que puedan buscar
  lexicon: HALOT
  rationale: La forma con וְ + imperfecto puede expresar propósito o resultado. «Para que busquen» comunica esa relación final sin convertirla en mera secuencia, y evita cargar el texto con una interpretación más fuerte que la del hebreo.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu reputación
  - tu nombre y renombre
  lexicon: HALOT
  rationale: «Tu nombre» conserva la expresión bíblica estándar para la identidad revelada y el carácter manifiesto de Dios, sin explicarla en exceso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio del Tetragrama según la terminología proyectada para la POB en español. «Yahvé» evita la sustitución por un título y preserva la distinción del nombre personal de Dios.
theological_decisions:
- issue: Relación entre vergüenza y búsqueda del nombre divino
  english_pob_reading: The shame requested is rendered as serving the purpose that the enemies may seek the LORD's name.
  chosen_spanish_reading: La vergüenza se expresa como medio o resultado orientado a que busquen el nombre de Yahvé.
  alternative_spanish_readings:
  - y busquen tu nombre
  - de modo que busquen tu nombre
  rationale: 'El hebreo permite leer la segunda cláusula como propósito o resultado, no solo como simple sucesión. La traducción mantiene esa tensión: el juicio pedido no se reduce a destrucción, sino que queda abierto a una posible respuesta de reconocimiento.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó «so» para dar una formulación más formal de la cláusula de propósito; la versión española sigue esa decisión al usar «para que» sin introducir un adverbio adicional de consecuencia.
  spanish_consistency_notes:
  - Se conserva Yahvé para יְהוָה, conforme al criterio del proyecto.
  - Se optó por «nombre» en sentido bíblico-revelacional, no como mera etiqueta nominal.
  - La relación final de la segunda cláusula queda marcada con «para que», manteniendo la ambigüedad propósito/resultado señalada en el aparato inglés.
