    rationale: El hebreo solo presenta el nombre como llamado directo, sin marcar exclamación. En español bíblico legible y digno, «Jacob» o «Jacob,» dentro de comillas basta y evita añadir énfasis no explicitado por la fuente.
  revised_spanish_text: 'Entonces el ángel de Dios me dijo en el sueño[a]: «Jacob». Y yo dije: «Aquí estoy».'
  revised_footnotes:
