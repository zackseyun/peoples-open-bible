translation:
  language: es
  text: Y en el quinto mes, el séptimo día del mes —era el año diecinueve del rey Nabucodonosor, rey de Babilonia—, vino Nebuzaradán, el jefe de la guardia[a], servidor del rey de Babilonia, a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "jefe de los matadores"; el título probablemente se refiere al comandante de la guardia real o de los ejecutores.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/חֹדֶשׁ הַֽ/חֲמִישִׁי
  english_pob_choice: And in the fifth month
  chosen_spanish: Y en el mes quinto
  alternatives_spanish:
  - Y en el quinto mes
  - En el quinto mes
  lexicon: HALOT
  rationale: El hebreo introduce una continuidad narrativa con una fórmula calendárica. 'En el mes quinto' mantiene la estructura más directa; 'mes quinto' suena natural en español bíblico y conserva el orden del original sin forzar una paráfrasis.
- source_word: בְּ/שִׁבְעָ֣ה לַ/חֹ֔דֶשׁ
  english_pob_choice: on the seventh day of the month
  chosen_spanish: a siete del mes
  alternatives_spanish:
  - el siete del mes
  - el día siete del mes
  - el séptimo día del mes
  lexicon: HALOT
  rationale: La expresión hebrea es una fecha del calendario sin añadir 'día' de manera obligatoria. 'A siete del mes' reproduce de forma concisa la datación y evita introducir una formulación más explicativa que el hebreo no exige.
- source_word: הִ֗יא שְׁנַת֙ תְּשַֽׁע עֶשְׂרֵ֣ה שָׁנָ֔ה
  english_pob_choice: which was the nineteenth year
  chosen_spanish: era el año diecinueve
  alternatives_spanish:
  - que era el año diecinueve
  - era el año diecinueve de
  lexicon: HALOT
  rationale: El pronombre femenino y la cláusula explicativa funcionan como inciso de datación. En español, 'era el año diecinueve' conserva la referencia cronológica y la lectura parentética sin sobrecargar la frase.
- source_word: לַ/מֶּ֖לֶךְ נְבֻכַדְנֶאצַּ֣ר
  english_pob_choice: of King Nebuchadnezzar
  chosen_spanish: del rey Nabucodonosor
  alternatives_spanish:
  - para el rey Nabucodonosor
  - correspondiente al rey Nabucodonosor
  lexicon: HALOT
  rationale: El lamed marca la cuenta regnal; en español, 'del rey Nabucodonosor' expresa de manera idiomática esa relación de cronología sin perder el valor referencial.
- source_word: מֶֽלֶךְ בָּבֶ֑ל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - monarca de Babilonia
  lexicon: HALOT
  rationale: La cadena constructa se rinde de manera formal y estable con 'rey de Babilonia', que es clara, fiel y natural en español.
- source_word: בָּ֞א
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - acudió
  lexicon: HALOT
  rationale: '''Vino'' conserva el verbo narrativo simple del hebreo y encaja bien con la secuencia de movimiento hacia Jerusalén.'
- source_word: נְבוּזַרְאֲדָ֧ן
  english_pob_choice: Nebuzaradan
  chosen_spanish: Nebuzaradán
  alternatives_spanish:
  - Nebuzaradán
  lexicon: standard transliteration
  rationale: Se translitera el nombre propio al español con la acentuación habitual para facilitar la lectura y mantener la identificación del personaje.
- source_word: רַב טַבָּחִ֛ים
  english_pob_choice: the captain of the guard
  chosen_spanish: el jefe de la guardia
  alternatives_spanish:
  - el capitán de la guardia
  - el jefe de los verdugos
  lexicon: HALOT
  rationale: El hebreo literalmente alude al 'jefe de los matadores/carniceros', pero en el contexto cortesano designa una alta función militar o de custodia. 'Jefe de la guardia' comunica ese cargo con fidelidad contextual sin estrecharlo indebidamente.
- source_word: עֶ֥בֶד מֶֽלֶךְ בָּבֶ֖ל
  english_pob_choice: a servant of the king of Babylon
  chosen_spanish: servidor del rey de Babilonia
  alternatives_spanish:
  - siervo del rey de Babilonia
  - esclavo del rey de Babilonia
  lexicon: HALOT
  rationale: Aquí עֶבֶד describe subordinación o servicio a la corte, no necesariamente esclavitud literal. 'Servidor' preserva la relación de dependencia con un matiz adecuado al contexto oficial.
- source_word: יְרוּשָׁלִָֽם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: standard transliteration
  rationale: Se usa la forma española consagrada del topónimo.
theological_decisions:
- issue: Datación regnal en la cláusula temporal
  english_pob_reading: which was the nineteenth year of King Nebuchadnezzar, king of Babylon
  chosen_spanish_reading: era el año diecinueve del rey Nabucodonosor, rey de Babilonia
  alternative_spanish_readings:
  - que era el año diecinueve del rey Nabucodonosor
  - correspondía al año diecinueve del rey Nabucodonosor
  rationale: El texto ofrece un dato cronológico, no una afirmación doctrinal. La formulación elegida conserva el valor explicativo del inciso y la relación regnal sin añadir interpretaciones.
  doctrine_reference: none
translation_notes:
  revision_awareness: El texto sigue de cerca el consenso del audit trail inglés sin introducir cambios sustantivos. No hay revisiones aplicadas en la fuente inglesa; se conservó el mismo sentido narrativo, la datación regnal y el título de Nebuzaradán con una equivalencia contextual estable.
  spanish_consistency_notes:
  - Se preserva 'Yahvé' como norma del proyecto solo cuando aparece el nombre divino; en este versículo no ocurre.
  - '''Rey de Babilonia'' se mantiene de forma uniforme para la cadena constructa.'
  - '''Jefe de la guardia'' evita una literalidad excesiva en ''rabb tabbachim'' y corresponde al valor contextual documentado.'
  - Se eligió 'servidor' en lugar de 'esclavo' para עֶבֶד debido al contexto cortesano/oficial del pasaje.
