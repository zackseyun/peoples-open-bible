- from: 'Como con un quebrantamiento en mis huesos[a], mis adversarios me ultrajan, diciéndome todo el día: «¿Dónde está tu Dios?»'
  to: 'Como con un quebrantamiento en mis huesos[a], mis adversarios me reprochan, diciéndome todo el día: «¿Dónde está tu Dios?»'
  rationale: 'Se hizo una reparación pequeña para alinear mejor el español con el hebreo y el audit trail inglés: ''me reprochan'' refleja con más precisión la burla/reproche verbal de חרף en este contexto. También se suavizó la alternativa de la nota para que siga siendo fiel a la dificultad lexical sin producir una frase española innecesariamente extraña o forense. Se conservaron la estructura general, la imagen corporal y la tensión teológica del versículo.'
