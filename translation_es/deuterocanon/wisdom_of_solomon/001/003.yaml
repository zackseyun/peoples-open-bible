translation:
  language: es
  text: Porque los pensamientos torcidos separan de Dios[a], y cuando su poder es puesto a prueba[b], expone a los necios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los razonamientos perversos separan de Dios».
    reason: lexical_alternative
  - marker: b
    text: O «cuando el poder es puesto a prueba, convence a los necios».
    reason: lexical_alternative
lexical_decisions:
- source_word: σκολιοὶ
  english_pob_choice: crooked
  chosen_spanish: torcidos
  alternatives_spanish:
  - retorcidos
  - perversos
  lexicon: LSJ
  rationale: El adjetivo apunta a una desviación moral o de rectitud, no solo a un error intelectual. «Torcidos» conserva la imagen de desviación y suena natural en español sin perder la fuerza ética del término.
- source_word: λογισμοὶ
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - razonamientos
  - cavilaciones
  lexicon: LSJ
  rationale: El término puede abarcar pensamientos, cálculos o razonamientos. Aquí el contexto sapiencial permite una referencia amplia a la actividad interior; «pensamientos» es claro y no estrecha indebidamente el sentido.
- source_word: χωρίζουσιν ἀπὸ θεοῦ
  english_pob_choice: separate from God
  chosen_spanish: separan de Dios
  alternatives_spanish:
  - alejan de Dios
  - dividen de Dios
  lexicon: LSJ
  rationale: «Separan de Dios» sigue de cerca la fuerza del verbo χωρίζω sin introducir una noción más técnica de alienación que el griego no exige. Mantiene el vínculo directo entre la conducta interior y la separación resultante.
- source_word: δοκιμαζομένη
  english_pob_choice: when ... is tested
  chosen_spanish: cuando su poder es puesto a prueba
  alternatives_spanish:
  - cuando se prueba
  - cuando es probado
  lexicon: LSJ
  rationale: El participio expresa una situación de prueba o examen. La construcción española en pasiva refleja bien esa condición temporal y conserva la idea de poder sometido a prueba.
- source_word: ἡ δύναμις
  english_pob_choice: his power
  chosen_spanish: su poder
  alternatives_spanish:
  - el poder de Dios
  - su fuerza
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «el poder», el contexto inmediato remite a Dios. «Su poder» hace explícito el referente sin añadir un contenido nuevo y mantiene la naturalidad del español.
- source_word: ἐλέγχει
  english_pob_choice: exposes
  chosen_spanish: expone
  alternatives_spanish:
  - convence
  - reprende
  - pone en evidencia
  lexicon: LSJ
  rationale: El verbo puede significar exponer, convencer o reprender. «Expone» preserva la idea de dejar al descubierto la realidad de los necios sin forzar un matiz forense o disciplinario que el contexto no demanda de manera exclusiva.
- source_word: τοὺς ἄφρονας
  english_pob_choice: fools
  chosen_spanish: a los necios
  alternatives_spanish:
  - a los insensatos
  - a los necios e imprudentes
  lexicon: LSJ
  rationale: «ἄφρων» designa a quien carece de sabiduría o entendimiento. «Necios» es una equivalencia sobria y bíblicamente inteligible en español, y mantiene el tono sapiencial del pasaje.
theological_decisions:
- issue: Referencia de ἡ δύναμις
  english_pob_reading: God's power is intended, rendered as 'his power.'
  chosen_spanish_reading: Se entiende el poder de Dios y se expresa como «su poder».
  alternative_spanish_readings:
  - «el poder»
  - «el poder de Dios»
  rationale: La proximidad a «de Dios» hace claro el referente. Usar un posesivo evita ambigüedad en español sin convertir la frase en una paráfrasis explicativa.
  doctrine_reference: Principio de primacía del original y de claridad lectora, sin borrar la referencia teológica implícita.
- issue: Fuerza de ἐλέγχει en relación con la prueba
  english_pob_reading: Divine power, when tested, exposes the foolish.
  chosen_spanish_reading: El poder de Dios, al ser puesto a prueba, expone a los necios.
  alternative_spanish_readings:
  - convence a los necios
  - reprende a los necios
  rationale: El contexto subraya la manifestación de la necedad ante la prueba más que un juicio técnico formal. «Expone» preserva esa tensión teológica y deja abierta la forma exacta del desenmascaramiento.
  doctrine_reference: Traducir manteniendo la tensión teológica del texto, no resolviéndola prematuramente.
translation_notes:
  revision_awareness: La redacción sigue la revisión final inglesa que cambió «the foolish» por «fools», por lo que se usa «necios» en lugar de una expresión más perifrástica. También se conserva la relación sintáctica simple entre «separan de Dios» y «su poder es puesto a prueba», sin añadir glosas doctrinales.
  spanish_consistency_notes:
  - Se mantiene «Dios» como referencia de θεός y el posesivo «su» para ἡ δύναμις, coherente con la decisión inglesa de explicitar el referente divino.
  - «Necios» conserva el tono sapiencial y evita una paráfrasis moralizante más larga.
  - Se evita «Señor» o «Cristo» porque el pasaje no los contiene; no hay motivo para introducir terminología eclesial ajena al griego.
