id: PHP.2.2
reference: Philippians 2:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πληρώσατέ μου τὴν χαρὰν ἵνα τὸ αὐτὸ φρονῆτε, τὴν αὐτὴν ἀγάπην ἔχοντες, σύμψυχοι, τὸ ἓν φρονοῦντες,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/002.yaml
  text: 'complete my joy, so that you may think the same way, having the same love, being united in soul, thinking one thing.'
translation:
  language: ko
  text: 나의 기쁨을 채워 주십시오. 곧 같은 생각을 품고[a], 같은 사랑을 지니며, 한마음이 되어[b], 한 가지를 생각함으로써입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「같은 마음을 품으십시오」. 헬라어 φρονέω는 단순한 사고가 아니라 마음의 지향·태도를 가리키며, 빌립보서의 핵심 동사이다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「한 영혼이 되어」, 「한 뜻이 되어」. σύμψυχοι는 「영혼이 하나로 묶인」의 강한 함의를 가진다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πληρώσατέ
  english_pob_choice: complete
  chosen_korean: 채워 주십시오
  alternatives_korean:
  - 가득 채우십시오
  - 충만하게 하십시오
  lexicon: BDAG
  rationale: 부정과거 명령형. 합쇼체 경어로 「채워 주십시오」가 자연스러우며, 「가득함에 이르게 하라」는 비유를 보존한다.
- source_word: μου τὴν χαρὰν
  english_pob_choice: my joy
  chosen_korean: 나의 기쁨
  alternatives_korean:
  - 내 기쁨
  lexicon: BDAG
  rationale: 단순한 소유 구문. 「나의 기쁨」이 가장 명료하고 합쇼체 산문에 자연스럽다.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_korean: 곧 ~함으로써
  alternatives_korean:
  - ~하도록
  - ~하기 위하여
  lexicon: BDAG
  rationale: 여기서 ἵνα는 명령의 내용·방식을 도입한다. 한국어 「곧 ~함으로써」가 그 의미를 자연스럽게 풀어내며, 이어지는 분사 연쇄와 호응한다.
- source_word: τὸ αὐτὸ φρονῆτε
  english_pob_choice: you may think the same way
  chosen_korean: 같은 생각을 품다
  alternatives_korean:
  - 같은 마음을 가지다
  - 동일한 사고를 하다
  lexicon: BDAG
  rationale: φρονέω는 단순 인지가 아니라 지향·태도를 가리킨다. 「생각을 품다」가 한국어로 그 자세를 자연스럽게 담는다.
- source_word: τὴν αὐτὴν ἀγάπην ἔχοντες
  english_pob_choice: having the same love
  chosen_korean: 같은 사랑을 지니며
  alternatives_korean:
  - 같은 사랑을 가지고
  - 같은 사랑을 품고
  lexicon: BDAG
  rationale: 분사 구문을 한국어 연결 어미 「~며」로 자연스럽게 옮긴다.
- source_word: σύμψυχοι
  english_pob_choice: being united in soul
  chosen_korean: 한마음이 되어
  alternatives_korean:
  - 한 영혼이 되어
  - 영혼이 하나로 묶여
  lexicon: BDAG
  rationale: σύμψυχοι는 「영혼이 하나로 묶인」의 강한 함의를 가진다. 한국어 「한마음이 되어」가 가장 자연스러우면서도 내적 결속의 의미를 잘 전달한다. 직역의 「한 영혼이 되어」는 각주로 둔다.
- source_word: τὸ ἓν φρονοῦντες
  english_pob_choice: thinking one thing
  chosen_korean: 한 가지를 생각함
  alternatives_korean:
  - 하나를 생각하며
  - 한 가지 목적에 집중하며
  lexicon: BDAG
  rationale: φρονέω의 반복은 연합의 강조이므로, 한국어에서도 「생각하다」를 반복해 수사적 호응을 살린다.
theological_decisions:
- issue: 연합을 위한 φρονέω의 반복을 한국어에서 어떻게 보존할 것인가
  chosen_reading: 「같은 생각을 품고 … 한 가지를 생각함」으로 두 차례 「생각」 어휘를 반복
  alternative_readings:
  - 「같은 마음을 가지고 … 하나의 목적에 집중하며」로 의역
  rationale: 본문은 반복과 변주로 연합을 강화하므로, 한국어 번역도 「생각」 어휘의 반복을 유지해 수사 구조를 살린다.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, or documented exception.'
