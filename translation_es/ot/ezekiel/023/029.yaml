translation:
  language: es
  text: Te tratarán con odio[a], y tomarán toda tu riqueza, y te dejarán desnuda y expuesta; se descubrirá la desnudez de tus prostituciones[b], tu lascivia y tus actos de prostitución[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo lo que has ganado con tu trabajo». El hebreo «tu labor» puede referirse al fruto o ganancia de tu esfuerzo.
    reason: lexical_alternative
  - marker: b
    text: O «la vergüenza de tus prostituciones». Aquí «desnudez» conserva la imagen de exposición vergonzosa del hebreo.
    reason: lexical_alternative
  - marker: c
    text: 'La frase final funciona como aposición explicativa: «la desnudez de tus prostituciones», es decir, «tu lascivia y tus actos de prostitución».'
    reason: source_note
lexical_decisions:
- source_word: וְעָשׂוּ אֹתָךְ בְּשִׂנְאָה
  english_pob_choice: They will deal with you in hatred
  chosen_spanish: Te tratarán con odio
  alternatives_spanish:
  - Te actuarán con odio
  - Te tratarán odiosamente
  lexicon: HALOT
  rationale: El hebreo עשה + objeto + בְּ expresa la manera en que alguien es tratado. En español, «tratar con odio» comunica bien la hostilidad sin forzar una construcción poco natural.
- source_word: וְלָקְחוּ כָּל יְגִיעֵךְ
  english_pob_choice: they will take all your wealth
  chosen_spanish: tomarán toda tu riqueza
  alternatives_spanish:
  - tomarán todo tu trabajo
  - tomarán todo lo que has ganado con tu trabajo
  lexicon: HALOT
  rationale: יְגִיעַ puede significar el trabajo, la fatiga o el fruto de ese esfuerzo. Dado el contexto de despojo, «tu riqueza» recoge el valor resultante de ese laborar, como en la revisión inglesa más reciente.
- source_word: וַעֲזָבוּךְ עֵירֹם וְעֶרְיָה
  english_pob_choice: leave you naked and bare
  chosen_spanish: te dejarán desnuda y descubierta
  alternatives_spanish:
  - te dejarán desnuda y expuesta
  - te dejarán completamente desnuda
  lexicon: HALOT
  rationale: La doble expresión intensifica la idea de despojo y exposición. «Desnuda y descubierta» conserva el paralelismo y evita suavizar la imagen.
- source_word: וְנִגְלָה
  english_pob_choice: will be uncovered
  chosen_spanish: se descubrirá
  alternatives_spanish:
  - será descubierta
  - quedará al descubierto
  lexicon: HALOT
  rationale: El verbo en contexto sigue la secuencia futura y mantiene la imagen de exposición vergonzosa. En español, la pasiva refleja suena más natural y conserva el sentido de quedar al descubierto.
- source_word: עֶרְוַת זְנוּנַיִךְ
  english_pob_choice: the nakedness of your prostitutions
  chosen_spanish: la desnudez de tus prostituciones
  alternatives_spanish:
  - la vergüenza de tus prostituciones
  - la desnudez de tus fornicaciones
  lexicon: HALOT
  rationale: עֶרְוָה es literalmente «desnudez», con connotación de vergüenza/exposición. «Prostituciones» preserva el lenguaje sexual fuerte del hebreo y del POB inglés, sin hacerlo más débil con un abstracto general.
- source_word: זְנוּנַיִךְ
  english_pob_choice: prostitutions
  chosen_spanish: prostituciones
  alternatives_spanish:
  - fornicaciones
  - harloterías
  lexicon: HALOT
  rationale: Es un plural abstracto/intensivo. «Prostituciones» mantiene la fuerza del término y su conexión con la metáfora profética, sin recurrir a un vocablo arcaizante.
- source_word: וְזִמָּתֵךְ
  english_pob_choice: your lewdness
  chosen_spanish: tu lascivia
  alternatives_spanish:
  - tu lewdad
  - tu depravación
  lexicon: HALOT
  rationale: En este contexto זִמָּה designa conducta sexual depravada. «Lascivia» es un equivalente claro y culto en español que conserva el matiz moral y sexual.
- source_word: וְתַזְנוּתָיִךְ
  english_pob_choice: your acts of prostitution
  chosen_spanish: tus actos de prostitución
  alternatives_spanish:
  - tus fornicaciones
  - tus prostituciones
  lexicon: HALOT
  rationale: La forma repite y desarrolla la idea de זְנוּנִים, pero con un matiz de acción concreta. «Actos de prostitución» refleja bien esa acumulación de términos cercanos.
theological_decisions:
- issue: Metáfora sexual aplicada a Jerusalén/Samaria
  english_pob_reading: Retain the explicit prostitution imagery rather than softening it into generic 'unfaithfulness'.
  chosen_spanish_reading: Conservar la imaginería explícita de prostitución y desnudez, sin reducirla a «infidelidad» o «inmoralidad».
  alternative_spanish_readings:
  - Rebajarla a «infidelidad»
  - usar «inmoralidad» o «depravación» en lugar de la metáfora sexual
  rationale: Ezequiel usa un lenguaje intencionalmente fuerte para expresar traición de pacto y vergüenza pública. Traducirlo de forma más suave borraría parte del impacto profético y añadiría interpretación no exigida por el texto.
  doctrine_reference: Principio de primacía del texto original; preservar metáforas proféticas sin eufemismo.
- issue: Relación sintáctica de la frase final
  english_pob_reading: The final nouns function appositionally to the nakedness phrase rather than as a separate idea.
  chosen_spanish_reading: Mantener la cláusula final como aposición explicativa de «la desnudez de tus prostituciones», no como un añadido independiente.
  alternative_spanish_readings:
  - Separarla como una segunda acción autónoma
  - unirla con un conector expansivo como «junto con»
  rationale: El hebreo presenta una cadena que culmina en una exposición nominal explicativa. En español, el punto y coma ayuda a conservar la progresión verbal, y la coma introduce la aposición sin oscurecer la relación semántica.
  doctrine_reference: Respeto a la sintaxis fuente y a la estructura retórica del profeta.
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que ajustó יְגִיעֵךְ de «labor» a «wealth» para adecuarlo al contexto de despojo, y simplificó la puntuación final manteniendo la aposición. La redacción española sigue esa lectura contextual de pérdida de bienes y conserva la estructura explicativa del cierre.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo exige el nombre divino; aquí no aparece.
  - Se mantiene «prostituciones» para זְנוּנִים, siguiendo el tono explícito del POB inglés.
  - «Desnuda y descubierta» preserva el paralelismo enfático de עֵירֹם וְעֶרְיָה.
  - «Se descubrirá» reproduce la pasiva de exposición vergonzosa sin introducir un sujeto distinto.
