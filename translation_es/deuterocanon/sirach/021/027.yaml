translation:
  language: es
  text: Cuando el impío maldice al Adversario[a], él maldice su propia alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Satanás». El griego dice satanas, un término transliterado que significa «adversario».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τῷ καταρᾶσθαι
  english_pob_choice: When ... curses
  chosen_spanish: Cuando ... maldice
  alternatives_spanish:
  - Al maldecir
  - Mientras maldice
  lexicon: BDAG
  rationale: La construcción con infinitivo articular y ἐν expresa una circunstancia temporal. En español, «Cuando ...» comunica con naturalidad esa relación sin perder el valor de simultaneidad/ocasión.
- source_word: ἀσεβῆ
  english_pob_choice: the ungodly
  chosen_spanish: el impío
  alternatives_spanish:
  - el inicuo
  - el malvado
  - un impío
  lexicon: LSJ
  rationale: En este contexto moral-religioso, «impío» refleja bien ἀσεβής y conserva el matiz de irreverencia ante Dios. El singular genérico se mantiene con el artículo.
- source_word: τὸν σατανᾶ
  english_pob_choice: the Adversary
  chosen_spanish: el Adversario
  alternatives_spanish:
  - Satanás
  - el satán
  lexicon: LSJ
  rationale: El término griego es una transliteración con sentido léxico de «adversario/ acusador». Traducirlo como «Adversario» preserva la transparencia semántica y evita imponer de entrada el uso posterior de nombre propio, aunque la lectura tradicional permanece disponible en la nota.
- source_word: αὐτὸς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  - ese mismo
  lexicon: BDAG
  rationale: Aquí αὐτός retoma al sujeto con énfasis ligero. En español, «él» basta en una oración corta y paralela; añadir «mismo» haría la frase más pesada que el griego.
- source_word: καταρᾶται
  english_pob_choice: curses
  chosen_spanish: maldice
  alternatives_spanish:
  - lanza maldición contra
  - anatema
  lexicon: BDAG
  rationale: El verbo se repite en la línea; «maldice» conserva la repetición y el paralelo retórico. «Curse» puede sonar más literal en inglés, pero en español «maldice» es la equivalencia natural y fuerte.
- source_word: τὴν ἑαυτοῦ ψυχήν
  english_pob_choice: his own soul
  chosen_spanish: su propia alma
  alternatives_spanish:
  - a sí mismo
  - su propia vida
  lexicon: BDAG
  rationale: ψυχή puede significar vida, yo o alma; aquí la opción «alma» preserva el peso espiritual y moral del proverbio. «Propia» refleja ἑαυτοῦ y evita ambigüedad posesiva.
theological_decisions:
- issue: 'Cómo renderizar σατανᾶ: título común o nombre propio'
  english_pob_reading: the Adversary
  chosen_spanish_reading: el Adversario
  alternative_spanish_readings:
  - Satanás
  rationale: La evidencia griega favorece un sustantivo con sentido de «adversario/ acusador». En un dicho sapiencial, traducir el título mantiene la primacía del significado original y la transparencia lexical; la opción tradicional se conserva como posibilidad de lectura en nota.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres; primacía del idioma original sobre la tradición de traducción.'
translation_notes:
  revision_awareness: 'El borrador sigue el sentido ya validado con alta concordancia: estructura temporal, sujeto genérico singular, repetición de καταρᾶται y opción léxica transparente para σατανᾶ. No se introdujeron cambios sustantivos respecto del juicio auditado en inglés; solo se adaptó la equivalencia al español manteniendo la alternativa tradicional en nota.'
  spanish_consistency_notes:
  - Se mantiene «Adversario» con mayúscula inicial para señalar el referente personal sin convertirlo sin más en nombre propio.
  - «Impío» conserva el tono bíblico y la carga ética de ἀσεβής.
  - «Alma» se usa de forma consistente con la decisión inglesa de preservar ψυχή en su peso espiritual.
