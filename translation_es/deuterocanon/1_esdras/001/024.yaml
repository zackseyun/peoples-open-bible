translation:
  language: es
  text: 'Josías se encontró con él. Y el rey de Egipto le envió un mensaje, diciendo: «¿Qué hay entre tú y yo[a], oh rey de Judea[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «¿Qué tengo yo que ver contigo?»'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «rey de Judea»; el paralelo histórico en Crónicas correspondería a «rey de Judá».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπάντησιν
  english_pob_choice: met
  chosen_spanish: lo salió a recibir
  alternatives_spanish:
  - lo encontró
  - se encontró con él
  - salió a su encuentro
  lexicon: LSJ
  rationale: El sustantivo griego expresa una acción de encuentro; en español, “lo salió a recibir” conserva la iniciativa del encuentro y suena natural en un relato histórico. “Salió a su encuentro” también sería posible, pero la forma elegida mantiene mejor la vivacidad narrativa sin añadir elementos ajenos.
- source_word: διεπέμψατο
  english_pob_choice: sent word
  chosen_spanish: le envió un mensaje
  alternatives_spanish:
  - le mandó recado
  - le envió mensajeros
  - le hizo llegar palabra
  lexicon: LSJ
  rationale: El verbo implica enviar comunicación por medio de intermediarios. En español, “le envió un mensaje” comunica la acción de manera clara y digna sin forzar la mención de mensajeros que el griego no explicita aquí.
- source_word: Τί ἐμοὶ καὶ σοὶ ἐστίν
  english_pob_choice: What is there between me and you
  chosen_spanish: ¿Qué hay entre tú y yo?
  alternatives_spanish:
  - ¿Qué tengo yo que ver contigo?
  - ¿Qué hay entre nosotros?
  - ¿Qué tengo yo contigo?
  lexicon: LSJ
  rationale: La frase es un modismo semítico de distancia o rechazo. Se conserva la estructura básica en español para no resolver demasiado pronto su tono exacto. La alternativa más idiomática se preserva en la reflexión, pero la forma elegida mantiene la tensión del original.
- source_word: βασιλεῦ τῆς Ἰουδαίας
  english_pob_choice: king of Judea
  chosen_spanish: oh rey de Judea
  alternatives_spanish:
  - rey de Judea
  - oh rey de Judá
  - rey de Judá
  lexicon: LSJ
  rationale: Se traduce la forma territorial griega Ἰουδαίας como “Judea”, siguiendo la primacía del testimonio griego. Se conserva el vocativo con “oh” porque el griego lo marca directamente en el discurso.
theological_decisions:
- issue: 'Fórmula de separación o desafío: Τί ἐμοὶ καὶ σοὶ ἐστίν'
  english_pob_reading: What is there between me and you
  chosen_spanish_reading: ¿Qué hay entre tú y yo?
  alternative_spanish_readings:
  - ¿Qué tengo yo que ver contigo?
  - ¿Qué tengo yo contigo?
  rationale: La expresión puede comunicar distanciamiento, protesta o desafío. En vez de intensificarla con una equivalencia completamente idiomática, la redacción conserva la ambigüedad funcional del griego y evita resolver el grado de hostilidad.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: 'Título geográfico-político: Ἰουδαίας'
  english_pob_reading: king of Judea
  chosen_spanish_reading: rey de Judea
  alternative_spanish_readings:
  - rey de Judá
  rationale: Se mantiene “Judea” porque el texto griego usa la forma territorial helenizada y la traducción debe respetar el testimonio fuente. “Judá” queda como alternativa histórica, pero no desplaza el dato del griego.
  doctrine_reference: DOCTRINE.md §1 Original-language primacy over translation tradition
translation_notes:
  revision_awareness: El texto español sigue la revisión inglesa más reciente al conservar el vocativo explícito en la segunda parte (“oh rey de Judea”) y reflejar con claridad el paralelismo entre el encuentro de Josías y el mensaje del rey de Egipto. También se mantiene la preferencia del audit trail por una formulación que no aplane el modismo griego.
  spanish_consistency_notes:
  - Se usa “Judea” por la forma griega Ἰουδαίας, no “Judá”, aunque esta última es una alternativa histórica plausible.
  - Se conserva “oh” en el vocativo para reflejar el llamado directo del griego.
  - El pronombre de primera y segunda persona en la cita (“tú y yo”) mantiene la fuerza confrontativa sin exagerarla.
  - 'La sección narra dos movimientos distintos: el encuentro de Josías y el envío del mensaje por el rey de Egipto.'
