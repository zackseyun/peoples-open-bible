id: NUM.12.11
reference: Numbers 12:11
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אַהֲרֹ֖ן אֶל מֹשֶׁ֑ה בִּ֣י אֲדֹנִ֔/י אַל נָ֨א תָשֵׁ֤ת עָלֵ֨י/נוּ֙ חַטָּ֔את אֲשֶׁ֥ר נוֹאַ֖לְנוּ וַ/אֲשֶׁ֥ר חָטָֽאנוּ־־׃
translation:
  text: And Aaron said to Moses[a], “Please, my lord, do not lay sin on us, because we have acted foolishly and because we have sinned.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “do not lay guilt on us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּי אֲדֹנִי
  chosen: Please, my lord
  alternatives:
  - Oh, my lord
  - I beg you, my lord
  lexicon: HALOT
  rationale: בִּי functions as a polite entreaty ('please'/'I beg you'), not a literal 'in me.' אֲדֹנִי here is a respectful address to Moses, so 'my lord' preserves the interpersonal deference without implying divinity.
- source_word: אַל נָא
  chosen: do not
  alternatives:
  - please do not
  lexicon: HALOT
  rationale: The plea nuance of נָא is already conveyed by the opening 'Please,' so rendering אַל נָא simply as 'do not' avoids redundancy while preserving the prohibition.
- source_word: תָשֵׁת עָלֵינוּ חַטָּאת
  chosen: lay sin on us
  alternatives:
  - put sin on us
  - hold us guilty
  - lay guilt on us
  lexicon: HALOT
  rationale: שׂים + עַל commonly means 'put/place upon.' Retaining 'lay ... on us' preserves the metaphor. חַטָּאת can denote sin or guilt/sin-offering depending on context; here the sense is culpability for wrongdoing, so 'sin' is kept in the main text, with 'guilt' as a viable contextual alternative.
- source_word: חַטָּאת
  chosen: sin
  alternatives:
  - guilt
  lexicon: HALOT
  rationale: In this plea for mercy after wrongdoing, חַטָּאת refers to the offense and its liability. 'Sin' is the more direct and transparent rendering; 'guilt' is possible because the request concerns the burden or imputation of the offense.
- source_word: אֲשֶׁר נוֹאַלְנוּ
  chosen: because we have acted foolishly
  alternatives:
  - in which we have been foolish
  - because we have done foolishly
  lexicon: HALOT
  rationale: The verb יאל in the Niphal here conveys acting foolishly or senselessly. 'Acted foolishly' is idiomatic modern English and preserves the moral dimension of the confession.
- source_word: וַאֲשֶׁר חָטָאנוּ
  chosen: and because we have sinned
  alternatives:
  - and have sinned
  - in that we sinned
  lexicon: HALOT
  rationale: The second clause intensifies and clarifies the confession. Rendering both אֲשֶׁר clauses with 'because' gives coherent English while preserving the causal force in Aaron's plea.
