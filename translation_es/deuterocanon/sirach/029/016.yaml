revisions:
- from: El pecador trastornará los bienes de un fiador.[a]
  to: Un pecador arruinará los bienes de un fiador.[a]
  rationale: Se reemplaza «trastornará» por «arruinará» para lograr un español natural y claro en esta construcción, sin perder el sentido de daño que transmite ἀνατρέψει en contexto. Se cambia «El pecador» a «Un pecador» para reflejar más de cerca el valor genérico del singular anartro griego y el inglés auditado. La nota se ajusta para conservar la amplitud semántica de ἀγαθὰ.
