  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, Espíritu, esclavo, etc. La personificación del mar se conserva correctamente. «Orgullosas» para בִּגְאוֹן es defendible, aunque «altivas» también sería posible; no requiere cambio.
