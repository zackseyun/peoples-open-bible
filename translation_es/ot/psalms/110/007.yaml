  to: Beberá del arroyo[a] en el camino; por tanto, levantará la cabeza[b].
  rationale: Se corrige בַּדֶּרֶךְ a «en el camino» para expresar mejor la idea de ir marchando, no solo de estar al lado del camino. También se ajusta «alzará su cabeza» a «levantará la cabeza» por mayor naturalidad idiomática en español, manteniendo intacta la imagen hebrea y su ambigüedad poética.
