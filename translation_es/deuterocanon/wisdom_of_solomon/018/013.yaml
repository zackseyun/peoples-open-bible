- from: Pues aunque habían dejado de creer a causa de sus hechicerías[a], al exterminio de los primogénitos reconocieron que este pueblo era hijo de Dios[b].
  to: Pues, aunque no habían creído nada por causa de sus hechicerías[a], ante la destrucción de los primogénitos reconocieron que este pueblo era hijo de Dios[b].
