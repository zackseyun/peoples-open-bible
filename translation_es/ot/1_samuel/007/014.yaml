review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo y sigue de cerca el audit trail inglés: las ciudades fueron devueltas a Israel, se mantiene el rango geográfico de Ecrón a Gat, se conserva el etnónimo ''amorreos'' con nota alternativa, y ''su territorio'' sigue correctamente la revisión inglesa. Sin embargo, ''fueron restauradas a Israel'' suena calcado y menos natural en español para posesión territorial, y ''de mano de los filisteos'' omite el artículo idiomático esperado en español bíblico.'
  spanish_quality_summary: El texto es claro y mayormente fiel, pero necesita un ajuste de naturalidad y estilo bíblico legible. 'Fueron devueltas a Israel' comunica mejor la restitución de ciudades que cambiaron de control. 'De la mano de los filisteos' es la forma idiomática normal en español y preserva mejor el hebraísmo sin sonar defectuosa.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, Cristo, Espíritu, etc. 'Amorreos' está bien preservado en el texto principal con la alternativa 'cananeos' en nota, conforme a la decisión lexical y teológica documentada.
  issues:
  - severity: medium
    issue: Calco poco natural en 'fueron restauradas a Israel'
    rationale: Aunque comprensible, 'restauradas' aplicado a ciudades en este contexto suena técnico o forzado en español. El hebreo y el inglés auditado apuntan a restitución de posesión; 'fueron devueltas a Israel' expresa eso con mayor naturalidad y fidelidad funcional.
  - severity: low
    issue: Modismo incompleto en 'de mano de los filisteos'
    rationale: En español bíblico e idiomático lo normal es 'de la mano de'. La omisión del artículo hace la frase menos natural sin aportar precisión.
  revised_spanish_text: Y las ciudades que los filisteos habían tomado de Israel fueron devueltas a Israel, desde Ecrón hasta Gat; e Israel libró su territorio de la mano de los filisteos. Y hubo paz entre Israel y los amorreos[a].
  revised_footnotes:
  - marker: a
    text: 'O: «los cananeos», si aquí se entiende «amorreos» como un término más amplio para los pueblos de la tierra.'
    reason: alternative_reading
  revision_rationale: Se reemplaza 'fueron restauradas' por 'fueron devueltas' para un español más natural y preciso en contexto de restitución territorial, y se corrige 'de mano de' a 'de la mano de' para preservar el modismo de manera idiomática. La nota sobre 'amorreos/cananeos' se mantiene sin cambios sustanciales.
