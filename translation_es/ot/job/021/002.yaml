translation:
  language: es
  text: Escuchen atentamente[a] mis palabras, y que esto sea su consuelo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con atención»; el hebreo usa un infinitivo absoluto del mismo verbo para intensificar la exhortación.
    reason: lexical_alternative
  - marker: b
    text: O «su consolación»; el hebreo dice literalmente «sus consuelos» en plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Listen
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Escuchen atentamente
  lexicon: HALOT
  rationale: Es un imperativo plural que llama a los oyentes a prestar atención. «Escuchen» es el equivalente natural en español moderno y conserva el valor exhortativo directo.
- source_word: שָׁמוֹעַ
  english_pob_choice: carefully
  chosen_spanish: atentamente
  alternatives_spanish:
  - bien
  - con atención
  - cuidadosamente
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica el verbo principal. En español, el adverbio «atentamente» expresa mejor esa intensificación sin sonar forzado.
- source_word: מִלָּתִי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi palabra
  - mi discurso
  - lo que digo
  lexicon: HALOT
  rationale: Aunque el sustantivo hebreo es singular con sufijo, el propio registro inglés revisado optó por pluralizar naturalmente. En español, «mis palabras» comunica bien la referencia al contenido del discurso sin perder la concreción.
- source_word: וּתְהִי
  english_pob_choice: and let ... be
  chosen_spanish: y que sea
  alternatives_spanish:
  - y sea
  - y que esto llegue a ser
  - y pueda ser
  lexicon: HALOT
  rationale: El jussivo de היה introduce un ruego o deseo. «Y que sea» transmite con naturalidad esa fuerza volitiva en español.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - esta palabra
  - esto mismo
  lexicon: HALOT
  rationale: El demostrativo es deliberadamente breve y flexible. «Esto» conserva su ambigüedad referencial sin añadir interpretación excesiva.
- source_word: תַּנְחֻמוֹתֵיכֶם
  english_pob_choice: your consolation
  chosen_spanish: su consuelo
  alternatives_spanish:
  - su consolación
  - sus consuelos
  - su alivio
  lexicon: HALOT
  rationale: El hebreo es plural, pero el español suele preferir un sustantivo abstracto singular en este contexto. «Consuelo» es idiomático y mantiene la posibilidad de que el término sea irónico o serio según el contexto.
theological_decisions:
- issue: Valor del plural hebreo en «tus/ustedes consuelos»
  english_pob_reading: your consolation / your consolations
  chosen_spanish_reading: su consuelo
  alternative_spanish_readings:
  - sus consuelos
  - su consolación
  rationale: El hebreo usa un plural morfológico. El inglés POB preservó la tensión con una nota; en español, un singular abstracto es más natural, pero el plural semántico queda implícito en el trasfondo y puede explicarse en nota.
  doctrine_reference: N/A
- issue: Posible tono irónico de la declaración
  english_pob_reading: let this be your consolation
  chosen_spanish_reading: que esto sea su consuelo
  alternative_spanish_readings:
  - que esto les sirva de consuelo
  - que esto sea su consolación
  rationale: La frase puede funcionar como una petición sincera o con ironía leve. La redacción española mantiene esa ambigüedad sin añadir tono interpretativo no justificado.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El registro inglés revisado cambió «my word» por «my words» para reflejar mejor el sentido plural. La versión española sigue esa misma decisión naturalizando el plural como «mis palabras», sin perder el valor intensificador del hebreo ni introducir paráfrasis adicional.
  spanish_consistency_notes:
  - Se mantiene «consuelo» como sustantivo principal, coherente con la terminología POB y con el sentido del hebreo.
  - Se evita «SEÑOR» u այլ masking convention, irrelevante aquí, y no se introducen títulos teológicos ajenos al versículo.
  - La puntuación reproduce la coordinación breve del hebreo y conserva el paralelismo entre la orden y la petición final.
