    issue: «estás cayendo sobre tu rostro» es un calco poco natural
    rationale: Aunque נֹפֵל puede representarse con un valor progresivo, en este contexto describe la postura actual de Josué postrado ante Yahvé. En español, «estar cayendo» sugiere una acción accidental en desarrollo, no una postración reverente ya asumida.
  - severity: medium
    issue: La nota b está mal alineada con el audit trail inglés
    rationale: La nota inglesa b registra una formulación previa relacionada con לָמָּה זֶּה, no una alternativa de traducción para קֻם. Mantener «Ponte de pie» como nota b altera la justificación documental.
  - severity: low
