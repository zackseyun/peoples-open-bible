- from: Huyan de en medio de Babilonia, y que cada uno salve su vida. No perezcan[a] en su iniquidad, porque es tiempo de venganza para Yahvé; él le paga su merecido.
  to: Huyan de en medio de Babilonia, y que cada uno salve su vida. No perezcan[a] en su iniquidad, porque este es el tiempo de la venganza de Yahvé; él le paga su merecido.
  rationale: 'Se corrigió la cláusula sobre Yahvé para reflejar con fidelidad el sentido establecido en el audit trail: no «venganza para Yahvé», sino «la venganza de Yahvé». También se añadió el artículo para una expresión más natural y definida en español. La nota se mantuvo pero con puntuación pulida.'
