  text: שִׁ֤ירוּ לֵֽ/אלֹהִים֮ זַמְּר֪וּ שְׁ֫מ֥/וֹ סֹ֡לּוּ לָ/רֹכֵ֣ב בָּ֭/עֲרָבוֹת בְּ/יָ֥הּ שְׁמ֗/וֹ וְ/עִלְז֥וּ לְ/פָנָֽי/ו׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/068/005.yaml
  text: Sing to God[a]; sing praise to his name. Lift up a song for the one who rides through the deserts; Yah is his name[b]; exult before him.
  footnotes:
  - marker: a
    text: Or 'Prepare the way for him who rides through the steppes.' The Hebrew verb can mean 'build up/prepare a road,' and the phrase may evoke making a highway for God.
    reason: alternative_reading
  - marker: b
    text: Or 'who rides upon the clouds.' Some interpreters take the final noun in a more exalted, theophanic sense, though the usual Hebrew sense is 'deserts' or 'steppes.'
    reason: lexical_alternative
