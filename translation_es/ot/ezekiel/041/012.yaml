translation:
  language: es
  text: Y el edificio que estaba frente al área separada, en el lado hacia el oeste, tenía setenta codos de ancho[a], y el muro del edificio tenía cinco codos de ancho todo alrededor, y su longitud era de noventa codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «del lado del camino hacia el mar»; es decir, del lado occidental.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבִּנְיָן
  english_pob_choice: the building
  chosen_spanish: el edificio
  alternatives_spanish:
  - la construcción
  - la estructura
  lexicon: HALOT
  rationale: בִּנְיָן designa una edificación concreta. «Edificio» es natural en español y conserva el sentido arquitectónico preciso del pasaje.
- source_word: אֲשֶׁר אֶל־פְּנֵי הַגִּזְרָה
  english_pob_choice: that faced the separate area
  chosen_spanish: que estaba frente al área separada
  alternatives_spanish:
  - que estaba delante del área separada
  - que estaba opuesto al área separada
  lexicon: HALOT
  rationale: אֶל־פְּנֵי expresa orientación espacial de frente/opuesto. «Estaba frente a» mantiene esa relación sin forzar un calco duro.
- source_word: פְּאַת דֶּרֶךְ הַיָּם
  english_pob_choice: on the side toward the west
  chosen_spanish: en el lado hacia el oeste
  alternatives_spanish:
  - en el lado occidental
  - en el lado del camino del mar
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «el lado del camino del mar», pero en la geografía bíblica el mar señala el oeste. «Hacia el oeste» comunica el valor direccional que la POB ya documentó.
- source_word: רֹחַב שִׁבְעִים אַמָּה
  english_pob_choice: was seventy cubits wide
  chosen_spanish: tenía setenta codos de ancho
  alternatives_spanish:
  - medía setenta codos de ancho
  - tenía un ancho de setenta codos
  lexicon: HALOT
  rationale: רֹחַב es «anchura/ancho». «Tenía … de ancho» suena natural en español y conserva la medida arquitectónica.
- source_word: וְקִיר הַבִּנְיָן
  english_pob_choice: the wall of the building
  chosen_spanish: y el muro del edificio
  alternatives_spanish:
  - y la pared del edificio
  - y el muro de la construcción
  lexicon: HALOT
  rationale: קִיר es «muro» o «pared». En un contexto de arquitectura sagrada, «muro» es preciso y sobrio.
- source_word: חָמֵשׁ אַמּוֹת רֹחַב
  english_pob_choice: was five cubits wide
  chosen_spanish: tenía cinco codos de ancho
  alternatives_spanish:
  - medía cinco codos de ancho
  - era de cinco codos de ancho
  lexicon: HALOT
  rationale: La frase repite la medida de anchura; «tenía ... de ancho» evita una traducción mecánica y mantiene la simetría con la primera medida.
- source_word: סָבִיב סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - por todos lados
  - todo alrededor
  lexicon: HALOT
  rationale: La duplicación intensifica la idea de circunferencia completa. «Alrededor» es el equivalente más natural; la repetición se conserva implícitamente por el contexto.
- source_word: וְאָרְכּוֹ תִּשְׁעִים אַמָּה
  english_pob_choice: and its length was ninety cubits
  chosen_spanish: y su longitud era de noventa codos
  alternatives_spanish:
  - y medía noventa codos de largo
  - y era de noventa codos de longitud
  lexicon: HALOT
  rationale: אָרֶךְ es «longitud/largo». «Su longitud era de» preserva el registro técnico del pasaje y la relación con las medidas previas.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y el audit trail inglés de la POB. No se detectaron revisiones aplicadas en el expediente más reciente; el acuerdo de revisión fue alto y sin cambios.
  spanish_consistency_notes:
  - Se mantuvo «área separada» para גִּזְרָה, en continuidad con la POB inglesa.
  - Se prefirió «codos» para אַמָּה, como medida arquitectónica estándar en español bíblico.
  - Se usó «muro» para קִיר y «edificio» para בִּנְיָן, distinguiendo estructura general de pared perimetral.
  - La nota al pie explica la idiomática hebrea sobre «el mar» = oeste sin sustituirla en el cuerpo del texto.
