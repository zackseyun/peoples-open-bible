translation:
  language: es
  text: Porque ha derribado a muchos heridos[a], y todos sus muertos son poderosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Heridos» preserva la progresión poética con «sus muertos» en la línea siguiente; el término también puede entenderse como «muertos».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en verdad
  lexicon: HALOT
  rationale: En este contexto sapiencial introduce la razón del aviso previo; «Porque» conserva bien la fuerza explicativa de כִּי en un español natural.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - numerosos
  lexicon: HALOT
  rationale: «Muchos» es la equivalencia más directa y natural para el adjetivo cuantitativo, manteniendo la concisión poética.
- source_word: חֲלָלִים
  english_pob_choice: wounded
  chosen_spanish: heridos
  alternatives_spanish:
  - muertos
  - traspasados
  lexicon: HALOT
  rationale: 'Se conserva la tensión léxica del inglés POB: el término puede aludir a quienes han caído heridos o muertos. «Heridos» mantiene la progresión poética frente a «muertos» en la línea siguiente, sin borrar la posible lectura de fatalidad.'
- source_word: הִפִּילָה
  english_pob_choice: has cast down
  chosen_spanish: derribó
  alternatives_spanish:
  - ha derribado
  - hizo caer
  lexicon: HALOT
  rationale: El hiphil de נפל expresa hacer caer; «derribó» comunica con fuerza y naturalidad la imagen de abatimiento, coherente con el tono proverbial.
- source_word: עֲצֻמִים
  english_pob_choice: mighty
  chosen_spanish: poderosos
  alternatives_spanish:
  - fuertes
  - valerosos
  lexicon: HALOT
  rationale: «Poderosos» captura la idea de fuerza y peso social/físico con un registro elevado, cercano al valor proverbial del original.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos los
  lexicon: HALOT
  rationale: «Todos» reproduce la universalidad del hebreo de modo idiomático en español.
- source_word: הֲרֻגֶיהָ
  english_pob_choice: her slain
  chosen_spanish: sus muertos
  alternatives_spanish:
  - los matados por ella
  - sus víctimas
  lexicon: HALOT
  rationale: «Sus muertos» conserva la posesión femenina del sufijo y el sustantivo participial sin forzar una perífrasis. En español, «muertos» funciona como equivalente poético conciso para los caídos por su acción.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el audit trail; la presente redacción sigue la lectura aprobada con una sola nota para conservar la ambigüedad léxica de חֲלָלִים.
  spanish_consistency_notes:
  - Se mantiene el paralelismo poético con una primera línea más abierta semánticamente («heridos») y una segunda línea más explícita («sus muertos»).
  - Se evita introducir terminología eclesiástica ajena al hebreo; el verso conserva tono sapiencial y sobrio.
  - La puntuación reproduce una cadencia breve y proverbial adecuada para lectura pública.
