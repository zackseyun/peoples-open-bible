translation:
  language: es
  text: Cinco cortinas estarán unidas entre sí[a], y cinco cortinas estarán unidas entre sí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'una mujer a su hermana', un giro idiomático que expresa elementos correspondientes unidos entre sí.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְרִיעֹת
  english_pob_choice: curtains
  chosen_spanish: cortinas
  alternatives_spanish:
  - paneles
  - lonas
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, la palabra se refiere a piezas grandes de tela colgante; 'cortinas' es el equivalente natural y claro en español, sin volver demasiado técnico el texto.
- source_word: תִּהְיֶיןָ
  english_pob_choice: shall be
  chosen_spanish: serán
  alternatives_spanish:
  - estarán
  - han de ser
  lexicon: HALOT
  rationale: El imperfecto hebreo en instrucciones de construcción expresa una acción prescrita/futura. 'Serán' preserva bien ese valor directivo en español.
- source_word: חֹבְרֹת
  english_pob_choice: joined
  chosen_spanish: unidas
  alternatives_spanish:
  - juntadas
  - conectadas
  lexicon: HALOT
  rationale: '''Unidas'' comunica la idea de estar ensambladas o enlazadas de manera natural en español moderno, manteniendo el sentido de חבר sin forzar tecnicismos.'
- source_word: אִשָּׁה אֶל אֲחֹתָהּ
  english_pob_choice: to one another
  chosen_spanish: entre sí
  alternatives_spanish:
  - la una con la otra
  - una con otra
  - cada una con su hermana
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático literal 'mujer a su hermana' para elementos correspondientes. En español, 'entre sí' conserva la relación recíproca sin introducir una imagen extraña.
- source_word: חֲמֵשׁ ... וְחָמֵשׁ
  english_pob_choice: Five ... and five
  chosen_spanish: Cinco ... y cinco
  alternatives_spanish:
  - Cinco de ellas ... y cinco
  - Cinco cortinas ... y cinco cortinas
  lexicon: HALOT
  rationale: La repetición divide claramente las diez cortinas en dos grupos de cinco. La estructura se refleja de forma directa y sobria en español.
translation_notes:
  revision_awareness: La versión anterior falló porque el marcador [a] no aparecía en el texto principal. En esta corrección, el marcador se insertó en la frase correspondiente para anclar la nota correctamente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera del versículo porque no aparece en este pasaje.
  - Se evitó 'SEÑOR' y cualquier forma litúrgica no requerida por el hebreo.
  - '''Cortinas'' y ''unidas entre sí'' conservan el registro arquitectónico del contexto del tabernáculo.'
  - La nota reproduce la tensión idiomática del hebreo sin desplazar la lectura principal.
