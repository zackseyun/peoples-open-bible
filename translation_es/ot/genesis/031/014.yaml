translation:
  language: es
  text: 'Entonces Raquel y Lea respondieron y le dijeron[a]: «¿Todavía tenemos alguna parte[b] o herencia en la casa de nuestro padre[c]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo expresa explícitamente el destinatario («a él»); en español «le dijeron» lo conserva de forma natural.
    reason: lexical_alternative
  - marker: b
    text: O «porción».
    reason: lexical_alternative
  - marker: c
    text: «La casa de nuestro padre» puede referirse no solo al hogar físico, sino también a la familia, la hacienda o el patrimonio familiar.
    reason: cultural_note
lexical_decisions:
- source_word: וַתַּעַן
  english_pob_choice: Then ... answered
  chosen_spanish: Entonces ... le respondieron
  alternatives_spanish:
  - Y ... respondieron
  - Entonces ... contestaron
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva ese progreso en español y «respondieron» refleja con naturalidad la acción de contestar.
- source_word: רָחֵל וְלֵאָה
  english_pob_choice: Rachel and Leah
  chosen_spanish: Raquel y Lea
  alternatives_spanish:
  - Ráquel y Leá
  - Raquel y Lía
  lexicon: Convención bíblica estándar
  rationale: Se emplean los nombres bíblicos usuales en español, manteniendo la identificación propia de las personas.
- source_word: וַתֹּאמַרְנָה לוֹ
  english_pob_choice: and said to him
  chosen_spanish: y dijeron a él
  alternatives_spanish:
  - y le dijeron
  - y dijeron a Jacob
  lexicon: HALOT
  rationale: El hebreo expresa explícitamente el destinatario; se conserva con «a él» para no borrar el dato textual, aunque en español «le dijeron» sería más idiomático.
- source_word: הַעוֹד
  english_pob_choice: still
  chosen_spanish: Todavía
  alternatives_spanish:
  - Aún
  - ¿Queda todavía
  lexicon: HALOT
  rationale: «Todavía» reproduce la idea de continuidad o permanencia interrogada por el texto.
- source_word: לָנוּ
  english_pob_choice: do we ... have
  chosen_spanish: tenemos
  alternatives_spanish:
  - nos queda
  - hay para nosotros
  lexicon: HALOT
  rationale: En español, la posesión se expresa de forma natural con «tenemos», conservando el sentido de pertenencia implícito en la construcción hebrea.
- source_word: חֵלֶק
  english_pob_choice: share
  chosen_spanish: parte
  alternatives_spanish:
  - porción
  - participación
  lexicon: HALOT
  rationale: «Parte» mantiene el valor de una porción asignada y evita una sobreespecificación patrimonial innecesaria en español.
- source_word: וְנַחֲלָה
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - heredad
  - patrimonio
  lexicon: HALOT
  rationale: «Herencia» comunica el valor heredado o patrimonial del sustantivo en contexto familiar.
- source_word: בְּבֵית אָבִינוּ
  english_pob_choice: in our father’s house
  chosen_spanish: en la casa de nuestro padre
  alternatives_spanish:
  - en la casa paterna
  - en el hogar de nuestro padre
  lexicon: HALOT
  rationale: Se conserva la metáfora familiar literal del hebreo sin forzarla a un término más abstracto; «casa de nuestro padre» puede incluir hogar, patrimonio o esfera familiar.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: ahora cada nota al pie tiene un marcador presente exactamente en el texto español. También se evitó mezclar marcadores no anclados. La redacción conserva el destinatario explícito del hebreo y mantiene la pregunta patrimonial con tono natural en español.'
  spanish_consistency_notes:
  - Se mantuvo «casa de nuestro padre» para reflejar la expresión hebrea y su posible alcance familiar/patrimonial.
  - Se prefirió «herencia» para נחלה y «parte» para חלק, preservando la distinción léxica del original.
  - El orden español sigue la progresión narrativa del hebreo sin calco rígido.
  - Los marcadores de nota se insertaron en palabras/segmentos realmente presentes en el texto para cumplir la validación.
