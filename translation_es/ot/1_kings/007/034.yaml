- from: Y había cuatro soportes en las cuatro esquinas de cada base; sus soportes formaban parte de la base misma.
  to: Y había cuatro soportes[a] en las cuatro esquinas de cada base móvil; sus soportes formaban parte de la base móvil misma.
  rationale: Se ajusta מְכֹנָה a «base móvil» para reflejar mejor la decisión auditada «stand» en este contexto técnico y evitar vaguedad; se conserva «soportes» para כְּתֵפוֹת y se añade la nota léxica sobre el literal «hombros».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:23:00Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: ארבע כתפות = cuatro soportes, ארבע פנות = cuatro esquinas, הָאֶחָת con valor distributivo = cada, y מִן ... כתפיה = que los soportes eran parte integral de la estructura. Sin embargo, se aparta innecesariamente del término base del POB inglés para מְכֹנָה (''stand'') al usar «base».'
  spanish_quality_summary: El español es claro y natural, pero «base» puede sonar demasiado genérico en este contexto técnico y además rompe la correspondencia terminológica con la decisión auditada en inglés. «Soporte» sería ambiguo porque ya traduce כְּתֵפוֹת; por ello conviene «base móvil», que mantiene claridad contextual sin confundir con los soportes.
  glossary_alignment: 'No hay cuestiones teológicas. La principal cuestión léxica es מְכֹנָה: el rastro auditado favorece ''stand'', y en español «base móvil» refleja mejor la estructura fabricada de 1 Reyes 7 que el simple «base». La nota léxica inglesa sobre «shoulders» puede preservarse útilmente también en español.'
  issues:
  - severity: medium
    issue: מְכֹנָה fue traducido como «base» en vez de una expresión más cercana a «stand».
    rationale: Aunque «base» no es incorrecto, resulta más vago y pierde parte del matiz de una estructura elaborada que sirve de soporte al recipiente. «Base móvil» conserva mejor el referente del pasaje y evita confusión con «soportes».
  - severity: low
    issue: Falta la nota léxica sobre כְּתֵפוֹת ('hombros').
    rationale: El inglés preserva la alternativa literal por transparencia léxica. En español también ayuda a mostrar por qué se eligió «soportes» en un contexto arquitectónico.
  revised_spanish_text: Y había cuatro soportes[a] en las cuatro esquinas de cada base móvil; sus soportes formaban parte de la base móvil misma.
  revised_footnotes:
