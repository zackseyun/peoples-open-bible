lexical_decisions:
- source_word: χαλεπὴ
  english_pob_choice: harsh
  chosen_spanish: duro
  alternatives_spanish:
  - severo
  - áspero
  - penoso
  lexicon: LSJ
  rationale: El adjetivo expresa severidad o dureza de la situación. 'Duro' conserva la fuerza del término en español natural y combina bien con 'gravoso' sin duplicar exactamente la misma idea.
- source_word: δυσχερὴς
  english_pob_choice: grievous
  chosen_spanish: gravoso
  alternatives_spanish:
  - difícil de soportar
  - penoso
  - angustioso
  lexicon: LSJ
  rationale: El término sugiere algo opresivo, pesado o difícil de sobrellevar. 'Gravoso' transmite esa carga con un matiz formal y distingue el segundo adjetivo del primero.
- source_word: τοῖς ὅλοις
  english_pob_choice: for all
  chosen_spanish: para todos
  alternatives_spanish:
  - para todos en general
  - para el conjunto de ellos
  - universalmente
  lexicon: LSJ
  rationale: La frase es idiomática y señala una afectación general. 'Para todos' mantiene el alcance universal sin añadir explicaciones no presentes en el griego.
- source_word: ἡ ἐπίστασις
  english_pob_choice: the onset
  chosen_spanish: el comienzo
  alternatives_spanish:
  - la irrupción
  - la imposición
  - el avance
  lexicon: LSJ
  rationale: En este contexto, el sustantivo describe la entrada o llegada de ese mal, más que una idea abstracta de conocimiento. 'El comienzo' reproduce esa noción de irrupción inicial de forma clara en español.
- source_word: τῆς κακίας
  english_pob_choice: of this evil
  chosen_spanish: de este mal
  alternatives_spanish:
  - de esta maldad
  - de esta malicia
  - de esta perversidad
  lexicon: LSJ
  rationale: Aquí κακία remite concretamente a la opresión o perversión ya descrita por el contexto narrativo. 'Mal' es una forma natural en español para ese referente concreto y evita generalizar demasiado.
theological_decisions:
- issue: Alcance concreto de κακία
  english_pob_reading: A concrete reference to the wicked oppression/policy already being described
  chosen_spanish_reading: Referencia concreta al mal opresivo ya descrito en el contexto
  alternative_spanish_readings:
  - mal en sentido abstracto
  - maldad como rasgo moral personal
  - perversidad general
  rationale: El pasaje no funciona como sentencia moral general, sino como parte de una narración sobre presión y profanación impuestas. Por eso se conserva la referencia concreta al mal/opresión del contexto sin ampliarla indebidamente.
  doctrine_reference: Contextual narrative theology; lexical referent of κακία in 2 Maccabees 6
translation_notes:
  revision_awareness: La revisión inglesa pasó de 'pressure' a 'onset' para ἐπίστασις; por eso el español adopta 'comienzo' en vez de una imagen de presión. También se mantuvo la doble cualidad de χαλεπὴ ... δυσχερὴς con dos adjetivos distintos, 'duro' y 'gravoso', para no fundirlos en una sola idea.
  spanish_consistency_notes:
  - Se usa 'mal' para τῆς κακίας conforme al referente concreto del contexto.
  - Se evita 'opresión' en el texto principal porque el inglés auditado optó por 'onset', indicando irrupción/comienzo más que solo presión.
  - El registro es formal pero no arcaizante, en línea con un español bíblico público y legible.
