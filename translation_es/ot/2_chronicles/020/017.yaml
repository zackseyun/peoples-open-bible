translation:
  language: es
  text: No tienen que pelear en esta batalla[a]. Tomen sus posiciones, quédense quietos y vean la salvación de Yahvé con ustedes, oh Judá y Jerusalén. No teman ni se desalienten. Mañana salgan delante de ellos[b], y Yahvé está con ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la liberación de Yahvé». El término hebreo puede referirse al rescate en batalla y también a la salvación en sentido más amplio.
    reason: lexical_alternative
  - marker: b
    text: O «Yahvé estará con ustedes». La cláusula hebrea no tiene verbo explícito, y el español puede expresar esta seguridad en presente o en futuro.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא לָכֶם לְהִלָּחֵם בָּזֹאת
  english_pob_choice: You will not need to fight in this battle
  chosen_spanish: No les corresponde pelear en esta batalla
  alternatives_spanish:
  - No tienen que pelear en esta batalla
  - No les toca pelear en esta batalla
  lexicon: HALOT
  rationale: El hebreo expresa que la lucha no recae sobre ellos en esta ocasión. En español, 'no les corresponde' conserva la fuerza idiomática sin suavizar de más el mandato/aseveración.
- source_word: הִתְיַצְּבוּ
  english_pob_choice: Take your positions
  chosen_spanish: Tomen sus posiciones
  alternatives_spanish:
  - Pónganse en posición
  - Colóquense en sus puestos
  lexicon: HALOT
  rationale: El hitpael imperativo pide colocarse firmemente. 'Tomen sus posiciones' transmite el matiz militar de manera natural y fiel.
- source_word: עִמְדוּ
  english_pob_choice: stand still
  chosen_spanish: manténganse firmes
  alternatives_spanish:
  - permanezcan firmes
  - quédense quietos
  lexicon: HALOT
  rationale: Después de 'tomen sus posiciones', el segundo imperativo refuerza la idea de no moverse ni actuar por cuenta propia. 'Manténganse firmes' conserva esa intensidad mejor que un simple 'quédense'.
- source_word: וּרְאוּ אֶת יְשׁוּעַת יְהוָה
  english_pob_choice: and see the salvation of Yahweh
  chosen_spanish: y vean la salvación de Yahvé
  alternatives_spanish:
  - y vean la liberación de Yahvé
  - y vean el rescate de Yahvé
  lexicon: HALOT
  rationale: יְשׁוּעָה puede abarcar rescate militar y salvación en sentido más amplio. 'Salvación' preserva la amplitud teológica que el POB inglés retuvo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino transliterado, conforme al criterio del proyecto, y no la sustitución titular 'SEÑOR'.
- source_word: עִמָּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - a su lado
  - junto a ustedes
  lexicon: HALOT
  rationale: La preposición עִם expresa presencia y apoyo. En español, 'con ustedes' comunica esa cercanía y respaldo de manera directa.
- source_word: יְהוּדָה וִירוּשָׁלִַם
  english_pob_choice: O Judah and Jerusalem
  chosen_spanish: oh Judá y Jerusalén
  alternatives_spanish:
  - Judá y Jerusalén
  - Oh, Judá y Jerusalén
  lexicon: HALOT
  rationale: Se conserva la vocatividad del hebreo con 'oh', que suena natural en un discurso solemne y profético.
- source_word: אַל תִּירְאוּ
  english_pob_choice: Do not fear
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No se atemoricen
  lexicon: HALOT
  rationale: ירא en prohibición se traduce con el imperativo negativo simple. 'No teman' mantiene concisión y dignidad.
- source_word: וְאַל תֵּחַתּוּ
  english_pob_choice: and do not be dismayed
  chosen_spanish: ni se desalienten
  alternatives_spanish:
  - ni se amedrenten
  - ni se derrumben
  lexicon: HALOT
  rationale: חתת expresa quedar quebrantado o abatido. 'Desalienten' transmite bien el efecto emocional del mandato en español actual.
- source_word: מָחָר צְאוּ לִפְנֵיהֶם
  english_pob_choice: Tomorrow go out before them
  chosen_spanish: Mañana salgan delante de ellos
  alternatives_spanish:
  - Mañana salgan frente a ellos
  - Mañana salgan ante ellos
  lexicon: HALOT
  rationale: '''Delante de ellos'' sigue de cerca לִפְנֵי y conserva la imagen de salir al frente del enemigo sin introducir una interpretación excesiva.'
- source_word: וַיהוָה עִמָּכֶם
  english_pob_choice: and Yahweh is with you
  chosen_spanish: y Yahvé está con ustedes
  alternatives_spanish:
  - y Yahvé estará con ustedes
  - y Yahvé va con ustedes
  lexicon: HALOT
  rationale: El hebreo es una cláusula sin verbo explícito; en español, el presente 'está' expresa con naturalidad la certeza de la presencia divina, como en el POB inglés.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino en vez de una sustitución litúrgica. Esto mantiene la transparencia del texto y sigue la política del proyecto para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de יְשׁוּעַת יְהוָה
  english_pob_reading: the salvation of Yahweh
  chosen_spanish_reading: la salvación de Yahvé
  alternative_spanish_readings:
  - la liberación de Yahvé
  - el rescate de Yahvé
  rationale: '''Salvación'' conserva el alcance canónico y teológico del término, sin negar el rescate militar inmediato que el contexto sugiere.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Cláusula final sin verbo explícito
  english_pob_reading: the LORD is with you
  chosen_spanish_reading: Yahvé está con ustedes
  alternative_spanish_readings:
  - Yahvé estará con ustedes
  - Yahvé con ustedes
  rationale: El hebreo carece de verbo; el presente español expresa la certeza de la presencia divina. Se evita forzar un futuro que el texto no exige, aunque el contexto mire al combate venidero.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: El borrador sigue de cerca la última revisión inglesa, especialmente la coordinación negativa final ('ni') y la cláusula verbal implícita de cierre. También mantiene la decisión revisada de dar a יְשׁוּעָה el alcance de 'salvación' y no reducirla solo a 'liberación'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' en lugar de 'SEÑOR' para mantener la transparencia del nombre divino.
  - '''Con ustedes'' se mantuvo uniforme en ambas ocurrencias de עִמָּכֶם.'
  - La vocatividad de 'Judá y Jerusalén' se marcó con 'oh' para reflejar el discurso directo.
  - No se introdujo una glosa interpretativa como 'contra ellos'; se conservó 'delante de ellos' para respetar לִפְנֵיהֶם.
