translation:
  language: es
  text: 'El día veintiuno del séptimo mes, vino la palabra de Yahvé por mano de Hageo[a] el profeta, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por mano de Hageo», un idiomatismo que significa «por medio de Hageo» o «por intervención de Hageo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּשְּׁבִיעִי
  english_pob_choice: of the seventh
  chosen_spanish: del mes séptimo
  alternatives_spanish:
  - en el séptimo
  - del séptimo
  lexicon: HALOT
  rationale: En esta fórmula de fecha, el adjetivo ordinal no se refiere al séptimo día sino al séptimo mes. En español, «del mes séptimo» expresa de manera natural y fiel ese valor calendárico.
- source_word: בְּעֶשְׂרִים וְאֶחָד
  english_pob_choice: the twenty-first day
  chosen_spanish: El día veintiuno
  alternatives_spanish:
  - el veintiuno
  - veintiún días
  lexicon: HALOT
  rationale: La construcción funciona como fecha. El español requiere explicitar «día» para que la referencia calendárica sea clara y natural.
- source_word: לַחֹדֶשׁ
  english_pob_choice: of the ... month
  chosen_spanish: del mes
  alternatives_spanish:
  - del mes lunar
  - de la luna
  lexicon: HALOT
  rationale: En fórmulas de datación, חֹדֶשׁ significa «mes». «Del mes» conserva el sentido idiomático sin forzar una traducción más técnica.
- source_word: הָיָה דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh came
  chosen_spanish: vino la palabra de Yahvé
  alternatives_spanish:
  - fue la palabra de Yahvé
  - aconteció la palabra de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética hebrea expresa la llegada de una revelación. «Vino» reproduce bien ese valor eventivo en español y evita la rigidez de un simple «era» o «fue».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé», conforme al criterio del proyecto para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - por medio de la mano de
  lexicon: HALOT
  rationale: La locución hebrea es idiomática y denota agencia/instrumentalidad. En español, «por medio de» comunica con claridad que Yahvé habló mediante Hageo sin perder el valor mediador.
- source_word: חַגַּי
  english_pob_choice: Haggai
  chosen_spanish: Hageo
  alternatives_spanish:
  - Haggai
  lexicon: HALOT
  rationale: Se usa la forma española asentada del nombre propio, que es transparente y reconocible para lectores bíblicos en español.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  lexicon: HALOT
  rationale: El título profético se traduce de manera directa y natural como «el profeta».
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'como sigue:'
  lexicon: HALOT
  rationale: En español, «diciendo:» introduce correctamente el discurso siguiente como marcador de cita.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del Dios del pacto, en vez de ocultarlo bajo un título. Esto sigue la orientación del proyecto y mantiene la lectura auditable del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula profética «vino la palabra de Yahvé»
  english_pob_reading: the word of Yahweh came
  chosen_spanish_reading: vino la palabra de Yahvé
  alternative_spanish_readings:
  - la palabra de Yahvé fue
  - la palabra de Yahvé aconteció
  rationale: La expresión no describe solo existencia, sino un evento de revelación profética. «Vino» preserva ese matiz sin añadir contenido ajeno al hebreo.
  doctrine_reference: Uso profético estándar de הָיָה + דְבַר יְהוָה
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el texto hebreo, la traducción inglesa auditada y la revisión posterior; no se documentan cambios textuales o de sentido que requieran ajustes adicionales. Se ha mantenido la fórmula profética estándar y la datación calendárica con equivalencia natural en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al criterio del proyecto.
  - «Hageo» mantiene la forma española del nombre propio sin alterar la identificación del profeta.
  - La frase verbal «vino la palabra de Yahvé» conserva el valor eventivo de la fórmula hebrea y evita una traducción demasiado literal como «fue».
  - La nota al pie marca la expresión idiomática de agencia en «por medio de» para reflejar el hebreo בְּיַד.
