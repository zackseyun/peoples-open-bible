translation:
  language: es
  text: 'Entonces José ya no pudo contenerse delante de todos los que estaban junto a él[a], y exclamó: «¡Hagan salir a todos de mi presencia!» Y no quedó nadie con él[b] cuando José se dio a conocer a sus hermanos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «delante de todos los que estaban de pie junto a él».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «no quedó un hombre con él», es decir, nadie permaneció presente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָכֹל
  english_pob_choice: could
  chosen_spanish: pudo
  alternatives_spanish:
  - fue capaz de
  - podía
  lexicon: HALOT
  rationale: El verbo expresa capacidad o posibilidad negada por לֹא; en español, ‘pudo’ comunica bien la incapacidad resultante sin añadir matices ajenos.
- source_word: לְהִתְאַפֵּק
  english_pob_choice: restrain himself
  chosen_spanish: contenerse
  alternatives_spanish:
  - controlarse
  - reprimirse
  lexicon: HALOT
  rationale: El hitpael es reflexivo y aquí indica autodominio/emoción contenida. ‘Contenerse’ es natural en español y preserva el sentido de no poder seguir reteniéndose.
- source_word: לְכֹל הַנִּצָּבִים עָלָיו
  english_pob_choice: before all those standing by him
  chosen_spanish: delante de todos los que estaban junto a él
  alternatives_spanish:
  - en presencia de todos los que estaban junto a él
  - delante de todos los que estaban de pie junto a él
  lexicon: HALOT
  rationale: נצב alude a estar de pie/presente cerca de alguien. ‘Delante de’ expresa la relación espacial y social; ‘junto a él’ conserva la cercanía sin volver forzado el participio.
- source_word: וַיִּקְרָא
  english_pob_choice: he cried out
  chosen_spanish: exclamó
  alternatives_spanish:
  - gritó
  - clamó
  lexicon: HALOT
  rationale: El verbo implica llamar en voz alta. En esta escena dramática, ‘exclamó’ mantiene el tono fuerte sin exigir necesariamente un ‘grito’ en español.
- source_word: הוֹצִיאוּ כָל אִישׁ מֵעָלָי
  english_pob_choice: Have everyone go out from me
  chosen_spanish: ¡Hagan salir de mi presencia a todos!
  alternatives_spanish:
  - ¡Saquen a todos de mi presencia!
  - ¡Hagan salir a todos de aquí!
  lexicon: HALOT
  rationale: El hebreo usa un causativo plural dirigido a los presentes. ‘Hagan salir’ refleja bien esa causatividad; ‘de mi presencia’ preserva el valor relacional de מֵעָלָי sin sonar excesivamente literal.
- source_word: וְלֹא עָמַד אִישׁ אִתּוֹ
  english_pob_choice: And no one remained with him
  chosen_spanish: Y no quedó nadie con él
  alternatives_spanish:
  - Y ningún hombre permaneció con él
  - Y no se quedó nadie con él
  lexicon: HALOT
  rationale: עָמַד aquí significa permanecer o mantenerse presente, no solo ‘estar de pie’. ‘No quedó nadie con él’ comunica el sentido idiomático con claridad y naturalidad.
- source_word: בְּהִתְוַדַּע
  english_pob_choice: when Joseph made himself known
  chosen_spanish: cuando José se dio a conocer
  alternatives_spanish:
  - cuando José se hizo conocer
  - cuando José se reveló
  lexicon: HALOT
  rationale: El hitpael de ידע expresa hacerse conocer/revelarse. ‘Se dio a conocer’ es idiomático en español y conserva la auto-manifestación del sujeto.
- source_word: אֶל אֶחָיו
  english_pob_choice: to his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus hermanos
  lexicon: HALOT
  rationale: La referencia es directa a sus hermanos varones; no requiere ampliación. ‘A sus hermanos’ es la forma natural y precisa en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: se priorizó la fuerza del verbo causativo en el mandato, se naturalizó el idiomático עָמַד como ‘no quedó’, y se mantuvo el movimiento narrativo con una estructura española fluida pero transparente. También se reflejó la decisión revisada en inglés de evitar una fórmula demasiado literal para el mandato.'
  spanish_consistency_notes:
  - Se usa ‘José’ y ‘Yahvé’ conforme al estándar del proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva ‘hermanos’ para אֶחָיו, sin neutralización, porque el referente es masculino explícito.
  - ‘Contenerse’ y ‘no quedó nadie’ mantienen la tensión entre el sentido literal y el idiomático sin borrar la imagen hebrea de presencia/ausencia.
