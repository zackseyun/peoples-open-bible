id: 2TI.4.3
reference: 2 Timothy 4:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἔσται γὰρ καιρὸς ὅτε τῆς ὑγιαινούσης διδασκαλίας οὐκ ἀνέξονται, ἀλλὰ κατὰ τὰς ⸂ἰδίας ἐπιθυμίας⸃ ἑαυτοῖς ἐπισωρεύσουσιν διδασκάλους κνηθόμενοι τὴν ἀκοήν,
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/004/003.yaml
  text: For the time will come when they will not put up with sound teaching, but according to their own desires they will heap up teachers for themselves, having itching ears.
translation:
  language: ko
  text: 사람들이 건전한 가르침을 견디지 못할 때가 올 것이기 때문입니다. 그들은 자신의 욕망을 따라 귀를 즐겁게 해 줄 교사들을[a] 자기들 곁에 쌓아 놓을 것이며,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「귀를 긁어 주는」. 듣고 싶은 말만 들으려는 욕구를 비유적으로 표현한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῆς ὑγιαινούσης διδασκαλίας οὐκ ἀνέξονται
  english_pob_choice: will not put up with sound teaching
  chosen_korean: 건전한 가르침을 견디지 못할
  alternatives_korean:
  - 건전한 교훈을 참지 못할
  - 바른 가르침을 견디지 못할
  lexicon: BDAG
  rationale: 1:13의 「건전한 말씀」(ὑγιαινόντων λόγων)과 어휘 통일. ἀνέχομαι는 「참아 받음」.
- source_word: ἐπισωρεύσουσιν διδασκάλους
  english_pob_choice: will heap up teachers
  chosen_korean: 교사들을 자기들 곁에 쌓아 놓을 것이며
  alternatives_korean:
  - 자기들을 위해 교사들을 쌓아 둘 것이며
  - 자기 욕구에 맞는 교사들을 모아들일 것이며
  lexicon: BDAG
  rationale: ἐπισωρεύω는 「위로 쌓아 올림」. 「쌓아 놓다」가 비유의 풍자적 무게(많은 교사를 무더기로 쌓음)를 자연스럽게 담는다.
- source_word: κνηθόμενοι τὴν ἀκοήν
  english_pob_choice: having itching ears
  chosen_korean: 귀를 즐겁게 해 줄
  alternatives_korean:
  - 귀가 가려운
  - 귀를 간지럽혀 주는 말을 들으려는
  lexicon: BDAG
  rationale: 「귀를 긁다」(κνήθω)의 직역은 한국어에서 부자연스럽다. 본 비유의 의미(듣고 싶은 말만 듣고 싶어함)를 「귀를 즐겁게 해 줄」로 옮기되, 직역은 각주에 둔다.
