  text: 'Speak and say[a], ‘Thus says the Lord GOD: Behold, I am against you, Pharaoh king of Egypt, the great sea monster lying in the midst of his Nile channels, who says, “My Nile is mine[b], and I made myself.”’'
  footnotes:
