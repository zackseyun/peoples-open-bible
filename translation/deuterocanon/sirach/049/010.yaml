translation:
  text: And as for the twelve prophets[a], may their bones flourish from where they lie[c][b]; for they healed Jacob and delivered them by faithful hope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''may their bones flourish from their place.'' The Hebrew phrase is more difficult, literally something like ''flourish from beneath them.'''
    reason: textual_variant
  - marker: b
    text: Greek reads 'comforted Jacob' where the Hebrew reads 'healed Jacob.'
    reason: alternative_reading
  - marker: c
    text: The closing line differs between witnesses. Hebrew may suggest 'exalted him in faithful hope,' while Greek reads 'delivered them in faith of hope.'
    reason: textual_variant
lexical_decisions:
- source_word: שנים עשר הנביאים / τῶν ιβʹ προφητῶν
  chosen: the twelve prophets
  alternatives:
  - the twelve minor prophets
  lexicon: HALOT / LSJ
  rationale: The Hebrew and Greek both literally say 'the twelve prophets.' Although this refers to the Book/collection of the Twelve, 'minor' is an interpretive later label not present in the source.
- source_word: עצמתם / τὰ ὀστᾶ
  chosen: their bones
  alternatives:
  - their remains
  lexicon: HALOT / LSJ
  rationale: Both witnesses point to literal 'bones.' This preserves the concrete idiom of posthumous honor and remembrance.
- source_word: פרחת / ἀναθάλοι
  chosen: may ... flourish
  alternatives:
  - sprout
  - bloom again
  lexicon: HALOT / LSJ
  rationale: The Hebrew and Greek both evoke budding/flourishing. 'Flourish' communicates the idiom naturally in English while retaining the image of renewed life or honor.
- source_word: מתחתם / ἐκ τοῦ τόπου αὐτῶν
  chosen: from where they lie
  alternatives:
  - from their place
  - from beneath them
  lexicon: HALOT / LSJ
  rationale: The Hebrew reading is difficult ('from beneath them'), while the Greek gives the clearer sense 'from their place.' 'From where they lie' renders the funerary context idiomatically and reflects the likely sense shared by both witnesses.
- source_word: החלימו / παρεκάλεσεν
  chosen: healed
  alternatives:
  - comforted
  - restored
  lexicon: HALOT / LSJ
  rationale: The Hebrew verb most naturally means 'healed' or 'made whole,' while the Greek has 'comforted/encouraged.' Because the project prioritizes the surviving Hebrew for Sirach where extant, 'healed' is retained in the main text, with the Greek-based alternative preserved in a footnote due to the major mismatch.
- source_word: יעקב
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The source reads 'Jacob.' While it refers corporately to the people, the proper name should be preserved.
- source_word: וישגבהו / ἐλυτρώσατο αὐτοὺς
  chosen: delivered them
  alternatives:
  - exalted him
  - saved them
  - made him secure
  lexicon: HALOT / LSJ
  rationale: The Hebrew consonants as presented are difficult and may suggest 'raise/exalt him,' but the Greek clearly reads 'delivered them.' Given the source validation flag 'major_mismatch,' the translation adopts a rendering that best accounts for the line's sense in context while noting the alternative. 'Them' follows the Greek's plural object and the collective sense of Jacob/Israel.
- source_word: באמונת תקוה / ἐν πίστει ἐλπίδος
  chosen: by faithful hope
  alternatives:
  - in faith of hope
  - by hope-filled faith
  - by faith and hope
  lexicon: HALOT / LSJ / Louw-Nida
  rationale: The phrase is compressed in both witnesses. 'Faithful hope' preserves the close relation of faith/pistis and hope without over-expanding the syntax. Because πίστις can also be rendered 'faith,' the wording remains somewhat literal rather than interpretively smoothing it.
