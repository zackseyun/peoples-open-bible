revisions:
- from: Los barcos de Tarsis fueron tus transportadores de mercancías[a][b], y te llenaste y te volviste muy pesada en el corazón de los mares.
  to: Las naves de Tarsis eran tus portadoras[a][b], y te llenaste y te volviste muy pesada en el corazón de los mares.
  rationale: Se ajusta una frase española poco natural para expresar mejor la función comercial de שָׁרוֹתַיִךְ según el POB inglés revisado ('carriers'). 'Las naves de Tarsis eran tus portadoras' conserva el sentido de servicio/traslado sin el calco duro 'transportadores de mercancías'. Se mantiene intacta la imagen de llenura, peso y el modismo 'corazón de los mares'.
  reviewer_model: gpt-5.4
