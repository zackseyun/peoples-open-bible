translation:
  language: es
  text: 'Entonces todos los árboles dijeron al espino[a]: «Ven tú, reina sobre nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la zarza». El hebreo אָטָד se refiere a un arbusto espinoso; se eligió «espino» como una opción natural en español dentro de esta fábula.
