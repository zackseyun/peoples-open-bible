    text: Or 'the crooked place' for 'the uneven ground'; the Hebrew term can denote what is crooked or uneven.
    reason: lexical_alternative
  - marker: b
    text: Or 'the rough places' for 'the ridges'; the Hebrew noun is rare and may refer more generally to rugged terrain.
    reason: lexical_alternative
