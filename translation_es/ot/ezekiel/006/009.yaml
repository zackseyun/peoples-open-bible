revisions:
- from: Entonces tus sobrevivientes me recordarán entre las naciones donde fueron llevados cautivos[a], cuando yo haya quebrantado su corazón infiel, que se apartó de mí, y sus ojos infieles que siguieron a sus ídolos[b][c]; y se aborrecerán a sí mismos por las maldades que cometieron en todas sus abominaciones.
  to: Entonces tus sobrevivientes me recordarán entre las naciones donde fueron llevados cautivos, cuando yo haya quebrantado[a] su corazón que se prostituye[b], que se apartó de mí, y sus ojos que se prostituyen[b] tras sus ídolos[c]; y se aborrecerán a sí mismos por las maldades que cometieron en todas sus abominaciones.
  rationale: Se revisa para alinear mejor el español con el hebreo y con la decisión auditada del English POB de preservar la metáfora de prostitución en זנה. 'Que se prostituye' y 'se prostituyen tras' mantienen la fuerza profética sin volverse ininteligibles en español eclesial. Además, se corrige el anclaje de la nota alternativa, colocándola junto a 'haya quebrantado', que es el punto textual al que realmente corresponde. Las demás decisiones principales se conservan.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:41:27Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y la lectura principal del hebreo: recuerdo en el exilio, acción divina de quebrantar, apartarse de Yahvé, idolatría, y autoaborrecimiento por sus males. Sin embargo, atenúa en exceso la metáfora sexual de זנה en dos lugares clave (''corazón infiel'', ''ojos infieles''), mientras que el English POB documenta explícitamente la decisión de conservar ''whoring'' por su fuerza metafórica. También hay un desajuste de anclaje de notas: la nota [a] explica la alternativa de ''fui quebrantado'', pero está colocada tras ''cautivos'' en vez de junto a la cláusula verbal relevante.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorar en fidelidad y naturalidad bíblica. 'Entonces tus sobrevivientes' suena aceptable, aunque 'los sobrevivientes de ustedes' sería más neutral; no es imprescindible. La mayor mejora necesaria es restaurar la imaginería de prostitución de forma inteligible en español, por ejemplo con 'corazón que se prostituye' y 'ojos que se prostituyen', evitando tanto el calco tosco como la suavización teológica. También conviene reubicar las notas para que correspondan al lugar exacto del texto.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto (no aparecen Yahvé en el texto base ni Mesías/Cristo, etc.). ''Ídolos'' con nota sobre גלולים está bien alineado. El problema principal no es de glosario general sino de consistencia con la decisión léxica auditada sobre זנה: el español debería preservar más claramente la metáfora de prostitución/pacto.'
  issues:
  - severity: high
    issue: Atenuación excesiva de la metáfora de זנה en 'corazón infiel' y 'ojos infieles'.
    rationale: El hebreo y el English POB conservaron deliberadamente la imaginería de prostitución ('whoring heart', 'eyes that whored'). 'Infiel' comunica parte del sentido, pero borra la fuerza retórica y la coherencia metafórica central en Ezequiel.
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota alternativa explica אשר נשברתי ('cuando fui quebrantado...'), pero en el borrador aparece después de 'cautivos', lo que induce a pensar que comenta el cautiverio y no el verbo 'quebranté/fui quebrantado'.
  - severity: medium
    issue: La nota cultural sobre la imaginería sexual depende de un texto principal demasiado suavizado.
    rationale: Si el cuerpo del texto solo dice 'infiel', la nota corrige algo que el lector no percibe en la traducción principal. Es mejor que el texto y la nota trabajen juntos, no en tensión.
  revised_spanish_text: Entonces tus sobrevivientes me recordarán entre las naciones donde fueron llevados cautivos, cuando yo haya quebrantado[a] su corazón que se prostituye[b], que se apartó de mí, y sus ojos que se prostituyen[b] tras sus ídolos[c]; y se aborrecerán a sí mismos por las maldades que cometieron en todas sus abominaciones.
  revised_footnotes:
