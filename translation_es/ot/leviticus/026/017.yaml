    issue: «dominarán sobre ustedes» sobretraduce וְרָדוּ בָכֶם
    rationale: El expediente inglés justifica «rule over» precisamente para evitar una intensificación interpretativa. En español, «dominar» suele implicar sometimiento más fuerte que «gobernar/regir», por lo que conviene suavizar a una opción más neutra y fiel.
  - severity: medium
    issue: La nota [b] está asociada a la frase equivocada y no refleja la nota cultural del POB
