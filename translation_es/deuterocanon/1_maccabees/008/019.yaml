translation:
  language: es
  text: Y fueron a Roma —el viaje fue sumamente largo—, y entraron en la sala del consejo[a] y respondieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cámara del senado». El griego nombra el lugar donde se reunía el consejo; «sala del consejo» es una traducción menos interpretativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύθησαν
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - partieron
  - fueron de camino
  - viajaron
  lexicon: LSJ
  rationale: El verbo narra desplazamiento en secuencia histórica. 'Fueron' es natural en español narrativo y conserva la sencillez del griego sin añadir matices de duración o intención que no están explícitos.
- source_word: εἰς Ῥώμην
  english_pob_choice: to Rome
  chosen_spanish: a Roma
  alternatives_spanish:
  - hacia Roma
  - para Roma
  lexicon: LSJ
  rationale: La preposición direccional εἰς con nombre de lugar se expresa de forma natural en español con 'a Roma'.
- source_word: ἡ ὁδὸς πολλὴ σφόδρα
  english_pob_choice: the journey was very long indeed
  chosen_spanish: el viaje fue muy largo, de veras
  alternatives_spanish:
  - el camino fue muy largo
  - el trayecto fue larguísimo
  - el viaje fue sumamente largo
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente que 'el camino/road' era 'muy grande/excesivo', el sentido contextual es la duración del desplazamiento. 'Viaje' comunica mejor esa idea en español. 'De veras' ayuda a reflejar el énfasis de σφόδρα sin sobretraducir con un calco pesado.
- source_word: εἰσῆλθον
  english_pob_choice: entered
  chosen_spanish: entraron
  alternatives_spanish:
  - entraron en
  - ingresaron
  lexicon: LSJ
  rationale: En español, el verbo 'entrar' ya puede llevar el complemento de lugar; 'entraron' mantiene fluidez y la dirección del movimiento. Se evita una construcción más rígida que no aporta claridad.
- source_word: τὸ βουλευτήριον
  english_pob_choice: the council chamber
  chosen_spanish: la sala del consejo
  alternatives_spanish:
  - la cámara del consejo
  - la casa del senado
  - el salón del consejo
  lexicon: LSJ
  rationale: βουλευτήριον es el lugar donde delibera un consejo. 'Sala del consejo' es transparente en español y no fuerza una identificación histórica más específica que el griego no exige. Se conserva así la prudencia interpretativa del POB inglés.
- source_word: ἀπεκρίθησαν
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - replicaron
  - dieron respuesta
  lexicon: LSJ
  rationale: El verbo indica responder en secuencia narrativa, aun cuando el contenido se desarrollará después. 'Respondieron' es natural y refleja la relación con el discurso siguiente.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios; por eso se mantiene el sentido del audit trail inglés y se adapta con naturalidad al español sin introducir nuevas interpretaciones.
  spanish_consistency_notes:
