translation:
  language: es
  text: Los que le sobrevivan serán sepultados por la muerte[a], y sus viudas no llorarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serán sepultados en la muerte». La frase hebrea es condensada y puede expresar tanto el medio o destino del entierro como el hecho de ser sepultados en medio de la muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרִידוֹ
  english_pob_choice: those who survive him
  chosen_spanish: a los que le sobrevivan
  alternatives_spanish:
  - sus sobrevivientes
  - el remanente que le sobreviva
  lexicon: HALOT
  rationale: El sustantivo con sufijo posesivo expresa los que quedan o sobreviven respecto de él. En español, una construcción relativa plural comunica mejor el valor colectivo que un singular artificial.
- source_word: בַּמָּוֶת
  english_pob_choice: by death
  chosen_spanish: la muerte los enterrará
  alternatives_spanish:
  - en la muerte los enterrarán
  - por la muerte serán enterrados
  lexicon: HALOT
  rationale: La preposición hebrea con מָוֶת es compacta y puede sugerir medio, circunstancia o una relación casi agentiva. En español, 'la muerte los enterrará' conserva la fuerza extraña del hebreo sin volverlo opaco.
- source_word: יִקָּבֵרוּ
  english_pob_choice: will be buried
  chosen_spanish: los enterrará
  alternatives_spanish:
  - serán enterrados
  - serán sepultados
  lexicon: HALOT
  rationale: 'El nifal es pasivo: ''serán enterrados'' sería la equivalencia más directa. Sin embargo, por la proximidad con בַּמָּוֶת, el giro activo en español refleja mejor la formulación densa del verso.'
- source_word: וְאַלְמְנֹתָיו
  english_pob_choice: and his widows
  chosen_spanish: y sus viudas
  alternatives_spanish:
  - y las mujeres que queden viudas
  - y sus mujeres viudas
  lexicon: HALOT
  rationale: אַלְמָנָה significa 'viuda'; el plural con sufijo posesivo se expresa naturalmente como 'sus viudas'. Mantiene el sentido de mujeres dejadas viudas por las muertes en vista.
- source_word: לֹא תִבְכֶּינָה
  english_pob_choice: will not weep
  chosen_spanish: no llorarán
  alternatives_spanish:
  - no llorarán por él
  - no derramarán lágrimas
  lexicon: HALOT
  rationale: בכה es 'llorar/llorar de pena'. 'Llorarán' es la forma española más natural y precisa; 'mourn' sería más interpretativo que el hebreo aquí.
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; el texto en español mantiene la misma tensión interpretativa que el audit trail inglés señala en בַּמָּוֶת, evitando suavizarla.
  spanish_consistency_notes:
  - Se conserva 'viudas' en sentido literal del hebreo, sin convertirlo en una paráfrasis general sobre duelo.
  - Se eligió un verbo activo en español para reflejar la densidad de 'by death' y la voz pasiva hebrea sin perder naturalidad.
  - No se introdujo 'Mesías', 'SEÑOR' ni otros términos no presentes en el versículo.
