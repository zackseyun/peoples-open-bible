revisions:
- from: Y muchos del pueblo se reunieron con ellos, todos los que abandonaban la ley; e hicieron males en la tierra.
  to: Y muchos del pueblo se unieron a ellos, todos los que abandonaban la ley; e hicieron el mal en la tierra.
  rationale: Se cambia «se reunieron con ellos» por «se unieron a ellos» para reflejar mejor la adhesión implícita en πρὸς αὐτούς dentro del contexto narrativo. Se cambia «hicieron males» por «hicieron el mal», que es el equivalente español natural del idiomatismo ἐποίησαν κακὰ. Se conserva «la ley» y «en la tierra», que siguen siendo fieles y legibles.
