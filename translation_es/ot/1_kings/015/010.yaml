translation:
  language: es
  text: Reinó cuarenta y un años en Jerusalén, y el nombre de su madre era Maacá, hija de[a] Abishalom[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'hija de'; el término también puede usarse con un sentido más amplio para una descendiente femenina en contextos genealógicos.
    reason: alternative_reading
  - marker: b
    text: Hebreo Abishalom; muchas versiones en español usan 'Absalón'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַרְבָּעִים וְאַחַת שָׁנָה
  english_pob_choice: forty-one years
  chosen_spanish: cuarenta y un años
  alternatives_spanish:
  - cuarenta y uno años
  - cuarenta y un año
  lexicon: HALOT
  rationale: El hebreo expresa literalmente 'cuarenta y una año(s)' con construcción cardinal; en español bíblico natural y moderno, la forma idiomática para duración de reinado es 'cuarenta y un años'. Se mantiene el valor numérico sin calco innecesario.
- source_word: מָלַךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - llegó a reinar
  lexicon: HALOT
  rationale: El verbo señala el ejercicio del gobierno real durante un período, no el acceso al trono. 'Reinó' preserva con precisión ese valor durativo.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición marca localización; 'en Jerusalén' es la equivalencia natural y exacta en español.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: and his mother’s name was
  chosen_spanish: y el nombre de su madre era
  alternatives_spanish:
  - y se llamaba su madre
  - y el nombre de su madre fue
  lexicon: HALOT
  rationale: Se conserva la estructura informativa hebrea de presentación genealógica, pero con español fluido. La formulación mantiene el foco en el nombre sin forzar una parataxis extraña.
- source_word: מַעֲכָה
  english_pob_choice: Maacah
  chosen_spanish: Maacá
  alternatives_spanish:
  - Maaca
  lexicon: Transliteración estándar POB
  rationale: Se translitera el nombre propio siguiendo la práctica del proyecto; se usa acento gráfico para acomodar la pronunciación española y la lectura pública.
- source_word: בַּת
  english_pob_choice: daughter of
  chosen_spanish: hija de
  alternatives_spanish:
  - descendiente de
  - nieta de
  lexicon: HALOT
  rationale: El sentido básico del término es 'hija de'. Aunque el hebreo puede usarse para una descendiente femenina más remota, la decisión principal conserva la relación genealógica explícita sin resolverla interpretativamente.
- source_word: אֲבִישָׁלוֹם
  english_pob_choice: Abishalom
  chosen_spanish: Abishalom
  alternatives_spanish:
  - Absalón
  lexicon: Transliteración estándar POB
  rationale: Se conserva la forma hebrea transliterada 'Abishalom', como en el texto fuente auditado. Se deja constancia de la forma conocida 'Absalón' como alternativa contextual, pero no se sustituye en el texto principal.
theological_decisions:
- issue: Relación genealógica de Maacá con Abishalom
  english_pob_reading: Retain the literal genealogical expression 'daughter of Abishalom' in the main text.
  chosen_spanish_reading: Conservar la expresión genealógica literal 'hija de Abishalom' en el texto principal.
  alternative_spanish_readings:
  - nieta de Abishalom
  - descendiente de Abishalom
  rationale: El hebreo dice explícitamente 'hija de'. Aunque el trasfondo histórico puede sugerir una relación más amplia, la traducción no debe resolver esa tensión textual en el cuerpo principal. La nota preserva la alternativa sin desplazar el sentido lexical directo.
  doctrine_reference: Principio de primacía del texto original; preservar tensiones textuales sin armonización interpretativa.
translation_notes:
  revision_awareness: La versión inglesa auditada indica alta concordancia y ningún cambio en la última revisión; por ello no se incorporan revisiones adicionales ni ajustes de criterio fuera de la evidencia hebrea y del trazado inglés ya aprobado.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa 'reinó' como verbo de ejercicio real, no 'fue rey', por precisión semántica.
  - Se transliteran nombres propios con adaptación gráfica española cuando ayuda a la lectura pública.
  - Se conserva la tensión genealógica de 'hija de' sin ampliar el sentido en el texto principal.
