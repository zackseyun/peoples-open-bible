review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: contraste narrativo («Pero»), incapacidad («No puedes»), antropomorfismo concreto («mi rostro»), causalidad («porque»), principio general sobre la humanidad y consecuencia vital. Sin embargo, la colocación «no me verá el hombre y vivirá» suena algo forzada en español y deja menos clara la fuerza gnómica/resultativa del hebreo.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna. El punto mejorable es la cláusula final: en español bíblico natural, «ningún hombre puede verme y seguir con vida» o «el hombre no puede verme y vivir» evita una secuencia futura menos idiomática. Dado que el inglés POB preserva el singular genérico «man», conviene mantener «el hombre» y solo suavizar la sintaxis final.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «mi rostro» preserva correctamente el valor de פָּנַי y la nota con «mi presencia» está bien. «el hombre» concuerda con la decisión documentada para הָאָדָם como singular genérico, con nota aclaratoria apropiada.
  issues:
  - severity: medium
    issue: La secuencia «porque no me verá el hombre y vivirá» es poco natural en español
    rationale: Aunque es comprensible y formalmente cercana, en español suena rígida y puede leerse casi como dos futuros coordinados más que como principio general con consecuencia. «porque el hombre no puede verme y vivir» conserva mejor el sentido global y la fluidez.
  - severity: low
    issue: La nota [b] está anclada en «verá» en vez de en «el hombre»
    rationale: La explicación se refiere específicamente al alcance genérico de הָאָדָם. En español conviene anclar la nota al sustantivo relevante para mayor precisión editorial.
  revised_spanish_text: 'Pero él dijo: «No puedes ver mi rostro[a], porque el hombre[b] no puede verme y vivir».'
