base_translation:
  language: en
  yaml_path: translation/ot/jonah/002/007.yaml
  text: I went down to the roots of the mountains[a]; the earth with its bars was around me forever, but you brought up my life from the pit[c][b], O Yahweh my God.
  footnotes:
  - marker: a
    text: Or 'to the extremities/bases of the mountains.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the earth—its bars closed in behind me forever.' The Hebrew imagery is of imprisonment by the earth's bars or bolts.
    reason: lexical_alternative
  - marker: c
    text: Or 'from the grave' or 'from destruction' for 'from the pit.'
    reason: lexical_alternative
