base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/024/006.yaml
  text: 'Therefore thus says the Lord GOD: Woe to the city of bloodshed[a], the pot whose rust is in it, and whose rust has not gone out from it! Bring it out piece by piece[b]; no lot has fallen on it.'
  footnotes:
  - marker: a
    text: Or 'scum' for 'rust'; the Hebrew term refers to the foul deposit/corrosion clinging to the pot.
    reason: lexical_alternative
  - marker: b
    text: That is, the contents are to be taken out one by one, without selection by lot.
    reason: cultural_note
