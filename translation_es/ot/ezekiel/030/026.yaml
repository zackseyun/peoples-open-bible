translation:
  language: es
  text: Yo dispersaré a Egipto entre las naciones[a], y los esparciré por las tierras. Entonces sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo dispersaré a los egipcios entre las naciones, y los esparciré por las tierras». El hebreo menciona primero «Egipto» y luego usa un pronombre plural para sus habitantes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲפִצוֹתִי
  english_pob_choice: I will scatter
  chosen_spanish: dispersaré
  alternatives_spanish:
  - esparciré
  - diseminaré
  lexicon: HALOT
  rationale: El hebreo expresa la idea de dispersión judicial. En español, «dispersaré» comunica con naturalidad ese movimiento de separación y evita repetir exactamente el segundo verbo con la misma fuerza léxica.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - los egipcios
  lexicon: HALOT
  rationale: Como en el inglés POB, el nombre propio puede designar la nación/territorio y, por extensión, a su población. «Egipto» preserva esa amplitud y deja que el pronombre posterior retome a sus habitantes.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las gentes
  lexicon: HALOT
  rationale: גּוֹיִם suele significar «naciones». «Entre las naciones» es la equivalencia más directa y mantiene el marco de exilio y juicio.
- source_word: וְזֵרִיתִי
  english_pob_choice: I will disperse
  chosen_spanish: esparciré
  alternatives_spanish:
  - dispersaré
  - aventaré
  lexicon: HALOT
  rationale: זָרָה puede expresar esparcir o aventar. Aquí la POB inglesa distinguió este segundo verbo del primero; «esparciré» conserva esa diferencia sin forzar un tecnicismo agrícola.
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El hebreo pasa del nombre colectivo «Egipto» a un pronombre plural que apunta a su gente. En español, «los» mantiene esa referencia colectiva y fluida.
- source_word: בָּאֲרָצוֹת
  english_pob_choice: through the lands
  chosen_spanish: por las tierras
  alternatives_spanish:
  - por los países
  - en las tierras
  lexicon: HALOT
  rationale: אֲרָצוֹת es plural de «tierra/país». «Por las tierras» conserva la amplitud geográfica y suena natural en español bíblico contemporáneo.
- source_word: וְיָדְעוּ
  english_pob_choice: Then they will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - y sabrán
  - así sabrán
  lexicon: HALOT
  rationale: La partícula conjuntiva introduce resultado. «Entonces» hace explícita la consecuencia del juicio sin añadir interpretación ajena al texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se sigue el principio del proyecto de verter el nombre divino con una transliteración reconocible en español. «Yahvé» preserva el nombre personal de Dios y evita la sustitución por un título.
theological_decisions:
- issue: Nombre divino יְהוָה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - SEÑOR
  rationale: La línea doctrinal del POB evita la sustitución por «SEÑOR» y busca preservar el nombre propio divino. En español, «Yahvé» es la forma más asentada y legible para mantener ese valor de nombre personal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sujetos colectivos y pronombre plural
  english_pob_reading: Egypt ... them
  chosen_spanish_reading: Egipto ... los
  alternative_spanish_readings:
  - los egipcios
  - Egipto ... a ellos
  rationale: El hebreo nombra primero al país/nación y luego refiere a su población con un plural. La traducción conserva esa tensión colectiva sin resolverla demasiado temprano con una paráfrasis explicativa.
  doctrine_reference: Estrategia lexical del POB para nombres nacionales colectivos
translation_notes:
  revision_awareness: El contexto de revisión final indica alta concordancia y sin cambios necesarios. Se mantuvo la distinción verbal entre «dispersaré» y «esparciré», y la referencia colectiva de «Egipto» con pronombre plural, en línea con la auditoría inglesa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva la distinción entre ambos verbos hebreos de dispersión.
  - «Egipto» funciona como nombre colectivo; el pronombre plural posterior se mantiene en español.
  - La puntuación sigue un orden oracional natural en español sin añadir material interpretativo.
