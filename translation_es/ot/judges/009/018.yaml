review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del rastro de auditoría inglés: conserva la acusación hostil de קמתם על, el sentido dinástico de ''casa de mi padre'', el conteo ''setenta hombres'', la crudeza de ''sobre una sola piedra'', la causalidad de ''porque él es su hermano'', y la elección de ''sierva'' para אמה con nota alternativa. Sin embargo, añade una nota [a] innecesaria y mal motivada en ''hoy'': la nota explica ''casa'', no ''hoy'', y el inglés no la exige.'
  spanish_quality_summary: El texto es generalmente claro y digno. La sintaxis funciona, pero 'sobre los dirigentes de Siquem' suena algo calcada; 'como rey sobre los dirigentes de Siquem' mejora la naturalidad sin perder la fuerza causativa. También conviene eliminar la nota mal anclada para evitar confusión editorial.
  glossary_alignment: No hay términos de glosario sensibles en este versículo salvo el manejo de אמה, y 'sierva' es una excepción razonable y documentada frente a 'esclava/concubina'. Los demás términos clave están alineados con el proyecto.
  issues:
  - severity: medium
    issue: La nota [a] está anclada a 'hoy' pero su contenido explica 'la casa de mi padre'.
    rationale: Esto crea una incoherencia editorial y semántica. Además, el inglés auditado no preserva una nota para 'my father's house'; la nota inglesa existente trata solo 'female servant'.
  - severity: low
    issue: La presencia de la nota [a] sobre 'la casa de mi padre' es innecesaria en el texto español.
    rationale: '''La casa de mi padre'' ya es natural y suficientemente clara en español bíblico moderno; no hace falta una nota salvo si hubiera ambigüedad real.'
  - severity: low
    issue: La frase 'han hecho rey a Abimelec ... sobre los dirigentes de Siquem' puede sonar levemente forzada.
    rationale: 'Agregar ''como'' produce una construcción más natural en español: ''han hecho rey a Abimelec ... como rey sobre los dirigentes de Siquem'' o, más concisamente, ''han hecho a Abimelec rey sobre...''.'
  revised_spanish_text: Pero ustedes se han levantado contra la casa de mi padre hoy, y han matado a sus hijos, setenta hombres, sobre una sola piedra, y han hecho a Abimelec, el hijo de su sierva[a], rey sobre los dirigentes de Siquem, porque él es su hermano.
  revised_footnotes:
  - marker: a
    text: O «el hijo de su esclava», o más interpretativamente, «el hijo de su concubina». El hebreo dice «el hijo de su sierva».
    reason: lexical_alternative
  revision_rationale: Se elimina la nota mal anclada e innecesaria, se conserva la nota léxica importante sobre אֲמָתוֹ, y se suaviza la construcción de entronización para que suene más natural en español sin apartarse del hebreo ni del POB inglés.
