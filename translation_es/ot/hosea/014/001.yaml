review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del hebreo y la personificación de Samaria: culpa/juicio en singular y luego víctimas en plural. «Samaria cargará con su culpa», «se ha rebelado contra su Dios» y «caerán a espada» reflejan fielmente תֶּאְשַׁם, מָרְתָה, בֵּאלֹהֶיהָ y בַּחֶרֶב יִפֹּלוּ. También mantiene la nota alternativa de תֶּאְשַׁם y la de עֹלְלֵיהֶם. Sin embargo, el cierre «sus mujeres encinta serán abiertas» no preserva adecuadamente la fuerza léxica de יְבֻקָּעוּ (''ser abiertas de golpe/rajadas/ripped open'') y cae en un eufemismo impropio frente al criterio explícito del POB de no suavizar la violencia.'
  spanish_quality_summary: El español es generalmente claro y digno. «Caerán a espada» y «sus niños pequeños serán estrellados» son legibles, aunque «serán estrellados» puede sonar algo menos específico que «serán hechos pedazos» o «serán despedazados»; aun así sigue siendo aceptable y está respaldado por la nota. El principal problema de calidad es «serán abiertas», que en español suena antinatural y demasiado débil para el contexto. «Serán abiertas en canal» sería idiomática pero añade una locución más interpretativa; «serán desgarradas» o «serán rajadas» comunican mejor la violencia con naturalidad.
  glossary_alignment: No hay conflicto con los términos troncales del proyecto (Dios, Samaria, etc.). La decisión de «contra su Dios» está bien alineada. No aplica Yahvé en este versículo. La revisión necesaria es de fuerza léxica y legibilidad, no de glosario mayor.
  issues:
  - severity: high
    issue: «sus mujeres encinta serán abiertas» suaviza y debilita יְבֻקָּעוּ
    rationale: El hebreo describe una violencia extrema y el audit trail inglés exige retenerla sin eufemismo. «Serán abiertas» suena clínico/vago y no comunica 'ripped open'.
  - severity: medium
    issue: La justificación léxica de «serán abiertas» contradice la decisión teológica de no atenuar la violencia
    rationale: El borrador afirma conservar la crudeza del juicio, pero la formulación escogida precisamente la atenúa.
  revised_spanish_text: Samaria cargará con su culpa[a], porque se ha rebelado contra su Dios. Caerán a espada; sus niños pequeños serán estrellados[b], y sus mujeres encinta serán desgarradas.
  revised_footnotes:
  - marker: a
    text: O «Samaria será tenida por culpable» o «Samaria sufrirá por su culpa».
    reason: alternative_reading
  - marker: b
    text: O «sus infantes serán estrellados».
    reason: alternative_reading
  revision_rationale: 'Se requiere una reparación pequeña pero importante: sustituir «serán abiertas» por «serán desgarradas» para reflejar mejor יְבֻקָּעוּ y la decisión auditada de no suavizar la violencia del oráculo. El resto del versículo puede mantenerse.'
