translation:
  language: es
  text: 'Y dijo: «No extiendas tu mano contra el muchacho, ni le hagas nada; porque ahora sé que temes a Dios, pues no me has rehusado a tu hijo, tu hijo único[a].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tu hijo, tu único hijo»; es decir, tu hijo único en este contexto de pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁלַח יָדְךָ אֶל
  english_pob_choice: lay your hand on
  chosen_spanish: extiendas tu mano contra
  alternatives_spanish:
  - extiendas tu mano sobre
  - alargues tu mano contra
  - pongas tu mano sobre
  lexicon: HALOT
  rationale: El hebreo usa un modismo de agresión o acción física; en español, «extiendas tu mano contra» conserva el valor idiomático y la dirección hostil sin suavizar el mandato con una formulación demasiado general.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el joven
  - el niño
  - el muchacho
  lexicon: HALOT
  rationale: נַעַר puede abarcar varios rangos de edad. «Muchacho» encaja bien en el contexto narrativo de Génesis 22 y suena natural en español sin volverse arcaico.
- source_word: תַּעַשׂ ל֖וֹ מְא֑וּמָּה
  english_pob_choice: do anything to him
  chosen_spanish: le hagas nada
  alternatives_spanish:
  - le hagas algo
  - le hagas cualquier cosa
  - no le hagas absolutamente nada
  lexicon: HALOT
  rationale: Con la negación, מְאוּמָּה expresa una prohibición total. «No le hagas nada» transmite de manera natural y fiel la amplitud del hebreo sin introducir énfasis innecesario.
- source_word: עַתָּה יָדַעְתִּי
  english_pob_choice: now I know
  chosen_spanish: ahora sé
  alternatives_spanish:
  - ahora he sabido
  - ahora reconozco
  - ahora me consta
  lexicon: HALOT
  rationale: El hebreo preserva una afirmación directa del hablante divino. «Ahora sé» mantiene la fuerza inmediata del texto y evita resolver la tensión teológica mediante una paráfrasis explicativa.
- source_word: יְרֵא אֱלֹהִים
  english_pob_choice: you fear God
  chosen_spanish: temes a Dios
  alternatives_spanish:
  - eres temeroso de Dios
  - reverencias a Dios
  - eres piadoso
  lexicon: HALOT
  rationale: La construcción hebrea describe a quien teme a Dios. «Temes a Dios» es la forma más directa y transparente en español, y conserva el perfil relacional y reverencial del original.
- source_word: חָשַׂכְתָּ
  english_pob_choice: have not withheld
  chosen_spanish: no me has negado
  alternatives_spanish:
  - no me has retenido
  - no me has reservado
  - no me has escatimado
  lexicon: HALOT
  rationale: Aunque «has retenido» es más literal, en este contexto el sentido práctico es el de no reservar para uno mismo lo ofrecido. «No me has negado» comunica la exigencia del acto sin perder el valor de privación que el verbo sugiere. La relación con «has spared» se mantiene como posible matiz alternativo en la nota.
- source_word: בִּנְךָ אֶת יְחִידְךָ
  english_pob_choice: your son, your only son
  chosen_spanish: a tu hijo, tu hijo único
  alternatives_spanish:
  - a tu hijo, tu único hijo
  - a tu hijo, tu hijo único y único
  - a tu hijo, tu único e incomparable hijo
  lexicon: HALOT
  rationale: El hebreo repite «hijo» y añade יְחִידְךָ para intensificar la idea de exclusividad. «Tu hijo único» reproduce bien ese énfasis en español; además, la repetición «tu hijo, tu hijo único» preserva el peso retórico del original.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - desde mí
  - para mí
  - ante mí
  lexicon: HALOT
  rationale: La preposición מן con sufijo de primera persona se vierte de modo directo como «de mí». En español, esta forma conserva mejor el vínculo de procedencia o privación expresado por el hebreo.
theological_decisions:
- issue: 'Afirmación divina de conocimiento: «ahora sé»'
  english_pob_reading: Retain the direct wording 'now I know' without softening.
  chosen_spanish_reading: Conservar «ahora sé» sin atenuarla.
  alternative_spanish_readings:
  - ahora parece claro
  - ahora se manifiesta
  - ahora queda demostrado
  rationale: El texto hebreo dice explícitamente «ahora sé». Se preserva la tensión teológica y antropomórfica del enunciado en lugar de suavizarlo con una reformulación que diluya el testimonio del texto.
  doctrine_reference: 'Principio POB: preservar la tensión teológica en vez de resolverla.'
- issue: Valor de יְחִידְךָ en el contexto del pacto
  english_pob_reading: your son, your only son; that is, your one and only son in this covenantal context.
  chosen_spanish_reading: «tu hijo único» como énfasis de exclusividad covenantal.
  alternative_spanish_readings:
  - tu único hijo
  - tu hijo, tu único
  - tu hijo amado
  rationale: El contexto de pacto demanda preservar la singularidad del hijo ofrecido. «Hijo único» comunica con claridad la exclusividad, sin introducir el matiz afectivo de «amado» que el lexema no exige por sí solo.
  doctrine_reference: Lectura lexical de יְחִידְךָ en contexto de promesa y sacrificio.
translation_notes:
  revision_awareness: Se tomó como base la lectura auditada del POB en inglés. La versión española sigue la revisión más reciente que favorece «your only son» sobre «your only one», por lo que se optó por «tu hijo único» para reflejar con naturalidad el hebreo יְחִידְךָ en contexto. También se mantuvo la afirmación directa «ahora sé» conforme a la filosofía de preservar la tensión teológica. Se ajustó la idiomaticidad española en «extiendas tu mano contra» y «no le hagas nada» sin perder el paralelismo del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; aquí aparece אֱלֹהִים, por lo que corresponde «Dios».
  - Se emplea «muchacho» para נַעַר en consonancia con el tono narrativo de Génesis 22.
  - Se evitó «Señor» o «SEÑOR» porque el versículo no contiene יהוה.
  - Se conservó la repetición retórica del vínculo filial con «tu hijo, tu hijo único» para respetar la intensidad del hebreo.
