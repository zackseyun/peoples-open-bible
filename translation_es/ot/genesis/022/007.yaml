translation:
  language: es
  text: 'Y dijo Isaac a Abraham, su padre: «¡Padre mío!». Y él dijo: «Aquí estoy, hijo mío». Y él dijo: «Mira, el fuego y la leña; pero ¿dónde está la oveja[a] para el holocausto?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo שֶׂה puede referirse más ampliamente a un animal pequeño del rebaño, como un cordero o un cabrito.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר se expresa naturalmente en español con «dijo», que conserva el tono sobrio y directo del relato.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su papá
  lexicon: HALOT
  rationale: «Su padre» mantiene el registro formal y la relación de parentesco sin coloquializar la escena.
- source_word: אָבִי
  english_pob_choice: My father!
  chosen_spanish: ¡Padre mío!
  alternatives_spanish:
  - ¡Mi padre!
  - ¡Padre!
  lexicon: HALOT
  rationale: El vocativo con sufijo posesivo se refleja de forma natural y reverente con «Padre mío», preservando la fuerza afectiva del hebreo.
- source_word: הִנֶּנִי
  english_pob_choice: Here I am
  chosen_spanish: Heme aquí
  alternatives_spanish:
  - Aquí estoy
  - Aquí me tienes
  lexicon: HALOT
  rationale: La fórmula de autoprensentación hebrea se conserva mejor con «Heme aquí», que es idiomática en español bíblico y mantiene el valor literario de respuesta disponible.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  lexicon: HALOT
  rationale: «Hijo mío» refleja el sufijo posesivo y el tono afectuoso del hebreo sin perder claridad en español.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira bien
  lexicon: HALOT
  rationale: El deíctico se traduce con una forma natural de llamada de atención en español. «Mira» conserva inmediatez sin arcaísmo excesivo.
- source_word: הָאֵשׁ
  english_pob_choice: the fire
  chosen_spanish: el fuego
  alternatives_spanish:
  - fuego
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto con artículo, como en el hebreo, para mantener la lista visual de elementos.
- source_word: הָעֵצִים
  english_pob_choice: the wood
  chosen_spanish: la leña
  alternatives_spanish:
  - la madera
  - los leños
  lexicon: HALOT
  rationale: Aunque el hebreo es plural, en español «la leña» es la opción más natural para el material destinado al sacrificio y corresponde bien al contexto.
- source_word: אַיֵּה
  english_pob_choice: where is
  chosen_spanish: ¿dónde está?
  alternatives_spanish:
  - ¿dónde queda?
  lexicon: HALOT
  rationale: La interrogación locativa se expresa de manera directa y idiomática en español.
- source_word: הַשֶּׂה
  english_pob_choice: the sheep
  chosen_spanish: el animal
  alternatives_spanish:
  - la oveja
  - el cordero
  - el animal del rebaño
  lexicon: HALOT
  rationale: El hebreo שֶׂה puede referirse de manera amplia a una res pequeña del rebaño, no necesariamente a una oveja específica. Para no estrechar indebidamente el sentido, se usa una traducción amplia y se preserva la alternativa lexical en nota.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para un sacrificio consumido por el fuego
  lexicon: HALOT
  rationale: «Holocausto» es el término técnico bíblico en español para עֹלָה; conserva el valor sacrificial completo del hebreo y el contexto cultual.
theological_decisions:
- issue: Naturaleza del término sacrificial הַשֶּׂה
  english_pob_reading: the sheep
  chosen_spanish_reading: el animal
  alternative_spanish_readings:
  - la oveja
  - el cordero
  - el animal del rebaño
  rationale: El inglés auditado corrigió de «lamb» a «sheep» para acercarse al rango semántico más amplio de שֶׂה. En español, «el animal» evita restringirlo a una especie concreta y preserva esa amplitud léxica; la nota ofrece alternativas más específicas que también podrían encajar según contexto.
  doctrine_reference: Translation philosophy §3, §5
- issue: Término cultual לְעֹלָה
  english_pob_reading: for a burnt offering
  chosen_spanish_reading: para holocausto
  alternative_spanish_readings:
  - como holocausto
  - para un sacrificio consumido por el fuego
  rationale: Se opta por el término técnico tradicional «holocausto» porque en español bíblico designa con precisión la ofrenda completamente quemada. No se usa un giro explicativo más largo para no debilitar la fuerza cultual del texto.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió la traducción de שֶׂה de «lamb» a «sheep» para reflejar mejor su amplitud léxica. La presente propuesta sigue esa corrección semántica, pero en español evita tanto «oveja» como «cordero» para no estrechar el referente, y opta por «animal» con nota explicativa. Se mantiene además la terminología cultual «holocausto» por ser la equivalente española más estable para עֹלָה.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa «holocausto» como término técnico bíblico, no como referencia moderna al sentido extra-bíblico de la palabra.
  - La sintaxis narrativa sigue de cerca el hebreo sin forzar un calco inglés; se priorizan formas idiomáticas del español bíblico actual.
  - Se mantiene el tono reverente y familiar entre padre e hijo con «Padre mío» / «hijo mío».
