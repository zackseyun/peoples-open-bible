base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/006/018.yaml
  text: And you shall do what is right and good in the eyes of Yahweh[a], so that it may go well for you, and you may go in and take possession of the good land that Yahweh swore to your fathers.
