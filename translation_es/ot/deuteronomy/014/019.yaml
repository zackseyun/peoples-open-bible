translation:
  language: es
  text: Y todo ser que se enjambra y vuela es impuro para ustedes[a]; no se comerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''todo ser que se enjambra y vuela'' / ''todo ser alado que se enjambra''. La expresión hebrea combina שֶׁרֶץ (''ser que se enjambra'') con עוֹף (''criatura voladora''), y probablemente se refiere en especial a insectos voladores más que a aves en sentido ordinario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֹל
  english_pob_choice: And every
  chosen_spanish: Y todo
  alternatives_spanish:
  - Y cada
  - Y todo cuanto
  lexicon: HALOT
  rationale: כֹל expresa alcance distributivo; en español, 'todo' conserva la totalidad de manera natural. Se mantiene la conexión con la ley anterior mediante 'Y'.
- source_word: שֶׁרֶץ
  english_pob_choice: swarming thing
  chosen_spanish: insecto alado que se enjambra
  alternatives_spanish:
  - ser viviente que se enjambra
  - cosa que se enjambra
  lexicon: HALOT
  rationale: El hebreo señala criaturas pequeñas caracterizadas por movimiento de enjambre/teem. En este contexto, unido a עוֹף, la referencia probablemente apunta a insectos voladores; 'insecto alado' comunica ese valor probable sin perder el matiz de enjambre.
- source_word: הָ/ע֔וֹף
  english_pob_choice: that flies
  chosen_spanish: alado
  alternatives_spanish:
  - que vuela
  - de vuelo
  lexicon: HALOT
  rationale: עוֹף puede abarcar aves o criaturas voladoras. Dado el emparejamiento con שֶׁרֶץ y la nota auditada del inglés, 'alado' evita restringir indebidamente a aves y mantiene la clase de criaturas voladoras.
- source_word: טָמֵא
  english_pob_choice: unclean
  chosen_spanish: impuro
  alternatives_spanish:
  - inmundo
  - ritualmente impuro
  lexicon: HALOT
  rationale: Para español bíblico actual, 'impuro' comunica la categoría ritual sin la carga peyorativa de 'inmundo'. Aunque 'unclean' en inglés suele corresponder a 'impuro', aquí el contexto dietético permite ese equivalente claro.
- source_word: לָ/כֶם
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para vosotros
  - para ustedes mismos
  lexicon: HALOT
  rationale: El destinatario es plural e israelita; 'para ustedes' es natural en español latinoamericano y conserva la orientación covenantal de la prohibición.
- source_word: לֹא יֵאָכֵלוּ
  english_pob_choice: it shall not be eaten
  chosen_spanish: no se comerá
  alternatives_spanish:
  - no deberán comerlo
  - no serán comidos
  lexicon: HALOT
  rationale: El pasivo hebreo se refleja con una construcción impersonal/pasiva en español. 'No se comerá' preserva la forma pasiva y la generalidad legal mejor que una reformulación activa.
theological_decisions:
- issue: Alcance de la categoría dietética y pureza ritual
  english_pob_reading: unclean for you; it shall not be eaten
  chosen_spanish_reading: impuro para ustedes; no se comerá
  alternative_spanish_readings:
  - inmundo para ustedes; no se comerá
  - ritualmente impuro para ustedes; no se comerá
  rationale: El texto hebreo usa טָמֵא en un contexto alimentario/ritual. 'Impuro' conserva la categoría de pureza sin sobredeterminarla moralmente. La forma impersonal de la prohibición respeta que la norma se formula sobre la cosa, no directamente sobre el sujeto humano.
  doctrine_reference: Levítico 11; Deuteronomio 14 (leyes de pureza alimentaria)
- issue: Identificación de la criatura aludida por שֶׁרֶץ הָעוֹף
  english_pob_reading: every swarming thing that flies
  chosen_spanish_reading: todo insecto alado que se enjambra
  alternative_spanish_readings:
  - todo ser alado que se enjambra
  - toda criatura alada que se enjambra
  rationale: La nota auditada del inglés observa que la expresión hebrea combina 'swarming thing' con 'flying creature' y probablemente se refiere sobre todo a insectos voladores, no a aves ordinarias. 'Insecto alado' intenta conservar ese juicio contextual sin cerrar por completo la amplitud del hebreo.
  doctrine_reference: Deuteronomio 14:19; Levítico 11:20-23
translation_notes:
  revision_awareness: 'La versión inglesa revisó ''of the birds'' a ''that flies'' para reflejar mejor el hebreo y ajustó el singular (''it shall not be eaten''). El español sigue esa revisión: evita una lectura centrada en aves, mantiene la referencia a criaturas voladoras y usa una construcción impersonal singular (''no se comerá'') acorde con ''todo insecto alado''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' implícitamente ausente porque este versículo no contiene el Tetragrámaton.
  - Se preserva el tono legal con 'impuro' y 'no se comerá' en vez de una paráfrasis exhortativa.
  - '''para ustedes'' refleja el destinatario plural del mandato, con español neutral latinoamericano.'
