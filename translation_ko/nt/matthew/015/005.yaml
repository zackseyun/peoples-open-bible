id: MAT.15.5
reference: Matthew 15:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὑμεῖς δὲ λέγετε· Ὃς ἂν εἴπῃ τῷ πατρὶ ἢ τῇ μητρί· Δῶρον ὃ ἐὰν ἐξ ἐμοῦ ὠφεληθῇς,
base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/005.yaml
  text: 'But you say[a], ''Whoever says to his father or his mother, "Whatever you would have benefited from me is a gift,"'''
translation:
  language: ko
  text: '그러나 너희는 말한다. 「누구든지 자기 아버지나 어머니에게 ‘내가 당신에게 드려 유익하게 했을 것이 예물입니다’ 하고 말하면,」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「봉헌물」. 부모 부양에 쓰일 것을 하나님께 바친 것으로 선언하는 셈이다. 마가복음 7:11은 같은 관행을 「고르반(κορβᾶν)」으로 표기한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δῶρον
  english_pob_choice: a gift
  chosen_korean: 예물
  alternatives_korean:
  - 선물
  - 봉헌물
  - 고르반
  lexicon: BDAG
  rationale: δῶρον은 「선물·봉헌물」. 본문 맥락에서 하나님께 바쳐 부모 부양에서 제외시키는 종교적 봉헌이므로 「예물」로 옮긴다. 마태는 「고르반」을 쓰지 않으므로 본문에는 도입하지 않고 각주로 보존한다.
- source_word: Ὃς ἂν εἴπῃ
  english_pob_choice: Whoever says
  chosen_korean: 누구든지 ... 말하면
  lexicon: BDAG
  rationale: 관계대명사 + ἄν + 부정과거 가정법의 일반 조건. 한국어 「누구든지 ... 하면」 구조로 자연스럽게 옮긴다.
- source_word: ὃ ἐὰν ἐξ ἐμοῦ ὠφεληθῇς
  english_pob_choice: Whatever you would have benefited from me
  chosen_korean: 내가 당신에게 드려 유익하게 했을 것
  lexicon: BDAG
  rationale: 수동태 ὠφεληθῇς를 「내가 ... 유익하게 했을 것」으로 풀되, 원어의 미실현된 부모 부양의 함의를 살린다.
