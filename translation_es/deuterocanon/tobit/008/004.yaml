  - severity: low
    issue: «nos tenga misericordia» es una construcción poco natural
    rationale: La expresión bíblica y moderna más normal es «tenga misericordia de nosotros» o «nos muestre misericordia». Ambas preservan ἐλεήσῃ con mejor español.
