translation:
  language: es
  text: 'Entonces el muchacho le dijo al ángel: «Azarías, hermano, he oído que la muchacha ha sido dada a siete hombres[a], y que todos fueron impedidos en la cámara nupcial[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “a siete maridos”. En el contexto matrimonial, también puede entenderse así, pero el griego dice literalmente “a siete hombres”.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “todos fueron impedidos/retenidos en la cámara nupcial”. En contexto, esto se refiere a que los anteriores novios no pudieron consumar el matrimonio porque murieron allí.
    reason: alternative_reading
lexical_decisions:
- source_word: τὸ παιδάριον
  english_pob_choice: the young man
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el joven
  - el chico
  lexicon: LSJ
  rationale: El diminutivo griego παιδάριον puede sonar infantil, pero en el contexto narrativo Tobías habla como pretendiente de matrimonio; 'muchacho' conserva una referencia joven sin hacerlo sonar como un niño pequeño.
- source_word: τῷ ἀγγέλῳ
  english_pob_choice: to the angel
  chosen_spanish: al ángel
  alternatives_spanish:
  - al mensajero
  lexicon: LSJ
  rationale: En Tobit la figura es un ser angélico real; 'ángel' comunica el sentido contextual directo.
- source_word: Ἀζαρία ἀδελφέ
  english_pob_choice: Azariah, brother
  chosen_spanish: Azarías, hermano
  alternatives_spanish:
  - Azarías, amigo
  - Azarías, pariente
  lexicon: LSJ
  rationale: Se mantiene el vocativo fraterno 'hermano' para reflejar el griego ἀδελφέ sin suavizarlo a un apelativo menos visible.
- source_word: ἀκήκοα
  english_pob_choice: I have heard
  chosen_spanish: he oído
  alternatives_spanish:
  - oí
  - he escuchado
  lexicon: LSJ
  rationale: El perfecto expresa una noticia ya recibida con vigencia presente; 'he oído' preserva mejor ese matiz que un pasado simple.
- source_word: τὸ κοράσιον
  english_pob_choice: the girl
  chosen_spanish: la muchacha
  alternatives_spanish:
  - la joven
  - la chica
  - la muchacha
  lexicon: LSJ
  rationale: κοράσιον designa a una muchacha o joven mujer; 'muchacha' es natural en español y evita una lectura excesivamente infantil.
- source_word: δεδόσθαι
  english_pob_choice: has been given
  chosen_spanish: ha sido dada
  alternatives_spanish:
  - ha sido entregada
  - ha sido dada en matrimonio
  lexicon: LSJ
  rationale: La forma perfecta infinitiva de δίδωμι se conserva con una pasiva simple; el sentido matrimonial queda indicado por el contexto inmediato sin añadirlo en exceso al texto principal.
- source_word: ἑπτὰ ἀνδράσιν
  english_pob_choice: to seven men
  chosen_spanish: a siete hombres
  alternatives_spanish:
  - a siete maridos
  lexicon: LSJ
  rationale: ἀνήρ puede significar 'hombre' o 'marido'; se conserva 'hombres' para no resolver en el cuerpo del texto una precisión interpretativa que el griego no formula explícitamente.
- source_word: πάντας
  english_pob_choice: all of them
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - a todos
  lexicon: LSJ
  rationale: El referente inmediato son los siete hombres mencionados; 'todos' es breve, claro y mantiene la generalidad del griego.
- source_word: ἐν τῷ νυμφῶνι
  english_pob_choice: in the bridal chamber
  chosen_spanish: en la cámara nupcial
  alternatives_spanish:
  - en el tálamo
  - en la alcoba nupcial
  lexicon: LSJ
  rationale: νυμφών remite al cuarto o cámara nupcial; 'cámara nupcial' es transparente y digna en español bíblico moderno.
- source_word: ἀποκωλῦσαι
  english_pob_choice: were hindered
  chosen_spanish: fueron impedidos
  alternatives_spanish:
  - fueron estorbados
  - fueron detenidos
  - fueron impedidos de consumar el matrimonio
  lexicon: LSJ
  rationale: El verbo expresa obstaculizar o impedir; 'fueron impedidos' mantiene la restricción semántica del griego sin introducir en el texto principal una explicación causal que pertenece al contexto más amplio.
theological_decisions:
- issue: Cómo reflejar la consecuencia de ἀποκωλῦσαι sin añadir información no presente en la cláusula
  english_pob_reading: Render ἀποκωλῦσαι non-fatally as 'were hindered' in the main text; explain the contextual implication in a note.
  chosen_spanish_reading: fueron impedidos en la cámara nupcial
  alternative_spanish_readings:
  - fueron muertos en la cámara nupcial
  - fueron impedidos de acercarse a ella
  - fueron estorbados en la cámara nupcial
  rationale: El griego usa un verbo de impedimento, no un verbo explícito de muerte. La traducción principal conserva esa tensión; la nota puede aclarar que el relato más amplio entiende que el impedimento está ligado a su muerte allí mismo.
  doctrine_reference: 'Principio POB: preservar la tensión textual y no resolverla con información contextual que el verso no enuncia directamente.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del expediente inglés, que prefirió 'were hindered' para acercarse más a ἀποκωλῦσαι sin perder concisión. En español, 'fueron impedidos' reproduce esa misma decisión semántica y evita sobrerresolver el desenlace narrativo en el cuerpo del verso.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - 'Se prefiere un registro bíblico moderno y digno: ''muchacho'', ''muchacha'', ''cámara nupcial''.'
  - No se introduce 'Cristo' ni terminología eclesial ajena al pasaje.
  - La ambigüedad de ἀνήρ se conserva en el texto principal y se explica en nota, siguiendo el enfoque auditable del POB.
