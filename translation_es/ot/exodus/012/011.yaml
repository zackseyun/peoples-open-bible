translation:
  language: es
  text: 'Así lo comerán: con la cintura ceñida[a], las sandalias en los pies y el bastón en la mano. Lo comerán con prisa[b]. Es la Pascua de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ceñidos los lomos»; es un modismo de estar vestidos y listos para partir de inmediato.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Es la Pascua de Yahvé» también puede expresarse como «Es la Pascua de Yahvé» o «Es la Pascua de Yahvé» en otras lenguas; el sentido es que pertenece a Yahvé.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְכָכָה
  english_pob_choice: And this is how
  chosen_spanish: Así lo comerán
  alternatives_spanish:
  - Y así lo comerán
  - De esta manera lo comerán
  lexicon: HALOT
  rationale: La expresión introduce el modo de comerlo. «Así» conserva la fuerza adverbial e instructiva del hebreo con una formulación natural en español.
- source_word: תֹּאכְלוּ
  english_pob_choice: you shall eat
  chosen_spanish: lo comerán
  alternatives_spanish:
  - lo comerán ustedes
  - deben comerlo
  lexicon: HALOT
  rationale: En contexto de mandato ritual, el futuro de mandato comunica bien la instrucción sin perder solemnidad.
- source_word: מָתְנֵיכֶם חֲגֻרִים
  english_pob_choice: with your waist belted
  chosen_spanish: con la cintura ceñida
  alternatives_spanish:
  - con los lomos ceñidos
  - con el cinturón ajustado
  lexicon: HALOT
  rationale: Se conserva la imagen corporal de preparación para partir. «Cintura ceñida» evita el calco duro de «lomos» y mantiene el sentido idiomático de estar listo para salir.
- source_word: נַעֲלֵיכֶם בְּרַגְלֵיכֶם
  english_pob_choice: your sandals on your feet
  chosen_spanish: las sandalias en los pies
  alternatives_spanish:
  - con las sandalias puestas
  - sus sandalias en los pies
  lexicon: HALOT
  rationale: «Sandalias» es la equivalencia precisa del calzado antiguo; la construcción simple en español mantiene la imagen de preparación inmediata.
- source_word: וּמַקֶּלְכֶם בְּיֶדְכֶם
  english_pob_choice: and your staff in your hand
  chosen_spanish: y el bastón en la mano
  alternatives_spanish:
  - y su bastón en la mano
  - y el bastón en la mano
  lexicon: HALOT
  rationale: «מַקֵּל» puede ser bastón, vara o bastón de apoyo. Se eligió «bastón» por su claridad en español y por conservar el objeto de viaje sin añadir matices no presentes.
- source_word: בְּחִפָּזוֹן
  english_pob_choice: in haste
  chosen_spanish: apresuradamente
  alternatives_spanish:
  - con prisa
  - de prisa
  lexicon: HALOT
  rationale: El adverbio expresa urgencia y prontitud. «Apresuradamente» suena más formal y bíblico que «de prisa», sin abandonar la naturalidad.
- source_word: פֶּסַח
  english_pob_choice: Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - la Pascua de paso
  - la pascua
  lexicon: HALOT
  rationale: «Pascua» es el término asentado en español para el rito y la comida. Se mantiene por fidelidad terminológica y claridad eclesial.
- source_word: הוּא לַיהוָה
  english_pob_choice: it is the Passover of Yahweh
  chosen_spanish: Es la Pascua de Yahvé
  alternatives_spanish:
  - Es la Pascua para Yahvé
  - Es la Pascua de Yahvé
  lexicon: HALOT
  rationale: Se preserva la relación genitiva con Yahvé conforme al estándar del proyecto. La formulación breve reproduce la identificación del rito como perteneciente a Dios sin añadir una perífrasis innecesaria.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Yahweh
  lexicon: HALOT
  rationale: Se adopta el término base del proyecto en español para el Nombre divino, manteniendo la transliteración auditable y evitando la sustitución por un título.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Yahweh
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. En español, el proyecto pide Yahvé como forma principal para conservar el Nombre propio de Dios, no sustituirlo por un título como «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idiomatic readiness phrase מָתְנֵיכֶם חֲגֻרִים
  english_pob_reading: with your waist belted
  chosen_spanish_reading: con la cintura ceñida
  alternative_spanish_readings:
  - con los lomos ceñidos
  - con el cinturón ajustado
  rationale: La expresión no es técnica doctrinal, sino un modismo de disposición para partir. «Ceñida» conserva la imagen de preparación inmediata sin sonar arcaico para el lector moderno.
  doctrine_reference: DOCTRINE.md Translation philosophy §§5–6
- issue: Meaning of פֶּסַח
  english_pob_reading: Passover
  chosen_spanish_reading: Pascua
  alternative_spanish_readings:
  - Pascua
  - fiesta de la Pascua
  rationale: Aquí nombra el rito/comida instituidos en Éxodo. «Pascua» es la denominación establecida y evita explicaciones añadidas que el texto no exige.
  doctrine_reference: DOCTRINE.md lexical consistency — festival/rite terms
translation_notes:
  revision_awareness: El texto base inglés fue revisado y quedó sin cambios en la última pasada; la concordancia general con el original es alta. La presente redacción sigue ese estado estable, conservando la misma estructura imperativa y la nota alternativa sobre la pertenencia de la Pascua a Yahvé.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma principal del Nombre divino, conforme al estándar del proyecto en español.
  - Se traduce פֶּסַח como «Pascua» por consistencia terminológica en la sección del Éxodo.
  - Se conserva la imagen concreta de preparación para la salida mediante «cintura ceñida», «sandalias» y «bastón», sin explicitar más de lo que el hebreo dice.
  - El adverbio final se vierte con un español natural y solemne, evitando una paráfrasis interpretativa excesiva.
