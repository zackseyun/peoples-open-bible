translation:
  language: es
  text: Is-bóset hijo de Saúl tenía cuarenta años cuando comenzó a reinar sobre Israel, y reinó dos años[c][b]. Pero la casa de Judá[a] siguió a David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “la casa de Judá”, una expresión corporativa para la tribu o el reino de Judá.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “fue leal a David” / “estuvo del lado de David”. El hebreo “estuvo después de David” es un modismo de adhesión.'
    reason: lexical_alternative
  - marker: c
    text: El nombre aparece aquí en el Texto Masorético como Is-bóset; compárese la forma alternativa Es-baal en tradiciones afines.
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן אַרְבָּעִים שָׁנָה
  english_pob_choice: was forty years old
  chosen_spanish: tenía cuarenta años
  alternatives_spanish:
  - era un hijo de cuarenta años
  - tenía cuarenta años de edad
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de edad; en español, “tenía cuarenta años” comunica de forma natural el sentido sin perder fidelidad al dato cronológico.
- source_word: אִישׁ בֹּשֶׁת
  english_pob_choice: Ish-bosheth
  chosen_spanish: Is-bóset
  alternatives_spanish:
  - Is-boset
  - Ish-bóset
  lexicon: HALOT
  rationale: Se conserva el nombre de la tradición masorética en transliteración española. La adaptación con acento ayuda a la lectura en español sin cambiar la forma del nombre.
- source_word: בְּמָלְכ/וֹ
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando reinó
  - cuando llegó a reinar
  lexicon: HALOT
  rationale: El valor temporal de la construcción se expresa de manera natural con “cuando comenzó a reinar”, que reproduce el inicio del reinado sin añadir contenido extra.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - sobre el pueblo de Israel
  - sobre Israel
  lexicon: HALOT
  rationale: En contexto real, עַל marca dominio o gobierno. “Sobre Israel” mantiene ese sentido con una formulación idiomática en español.
- source_word: וּשְׁתַּיִם שָׁנִים מָלָךְ
  english_pob_choice: and he reigned two years
  chosen_spanish: y reinó dos años
  alternatives_spanish:
  - y su reinado duró dos años
  - y gobernó dos años
  lexicon: HALOT
  rationale: La frase regnal se conserva de forma directa y clara, manteniendo el estilo narrativo del hebreo.
- source_word: אַךְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  - Pero
  lexicon: HALOT
  rationale: El conector adversativo introduce contraste con la cláusula anterior; “Pero” es la opción más natural y transparente en español.
- source_word: בֵּית יְהוּדָה
  english_pob_choice: the house of Judah
  chosen_spanish: la casa de Judá
  alternatives_spanish:
  - la casa de Judá
  - la tribu de Judá
  - Judá
  lexicon: HALOT
  rationale: Se preserva “casa” para mantener el matiz corporativo/tribal del hebreo. En español sigue siendo comprensible y evita reducirlo sin base a “tribu” o simplemente “Judá”.
- source_word: הָי֖וּ אַחֲרֵ֥י דָוִד
  english_pob_choice: followed David
  chosen_spanish: siguió a David
  alternatives_spanish:
  - estuvo del lado de David
  - fue leal a David
  - estuvo con David
  lexicon: HALOT
  rationale: El hebreo “estar detrás de” expresa adhesión o lealtad; “siguió a David” conserva el idioma de seguimiento sin imponer una explicación interpretativa más fuerte que el texto.
theological_decisions:
- issue: La expresión corporativa “casa de Judá” frente a una traducción simplificada.
  english_pob_reading: Hebrew 'the house of Judah,' a corporate expression for the tribe/kingdom of Judah.
  chosen_spanish_reading: la casa de Judá como expresión corporativa de la tribu/reino de Judá
  alternative_spanish_readings:
  - la tribu de Judá
  - Judá
  rationale: Se retiene la imagen de “casa” para no aplanar la estructura tribal y dinástica que el hebreo comunica. Esto conserva la tensión entre unidad familiar y entidad política.
  doctrine_reference: N/A
- issue: El valor de alianza/lealtad en “estuvieron después de David”.
  english_pob_reading: Or 'were loyal to David' / 'were on David's side.' Hebrew 'were after David' is an idiom of allegiance.
  chosen_spanish_reading: “siguió a David” como idiomático de adhesión/lealtad
  alternative_spanish_readings:
  - fueron leales a David
  - estuvieron del lado de David
  - estuvieron con David
  rationale: La frase hebrea es idiomática y no debe leerse espacialmente. El español elegido transmite adhesión política sin explicitar más de lo que el texto exige.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se revisó el pasaje con el contexto auditado en inglés y el chequeo de alta concordancia. No se detectaron cambios sustanciales necesarios; la redacción española sigue de cerca la lectura masorética y conserva las decisiones léxicas y la nota sobre la lectura alternativa del nombre.
  spanish_consistency_notes:
  - Se mantuvo la terminología de nombre propio en transliteración española consistente con el texto fuente.
  - 'Se prefirió una equivalencia óptima: literal en los puntos de carga histórica y idiomática en los modismos hebreos.'
  - Se conservó el matiz corporativo de “casa de Judá” en lugar de sustituirlo por una simplificación.
  - Se evitó traducir la relación de lealtad de forma demasiado interpretativa, manteniendo el verbo “seguir” con nota aclaratoria.
