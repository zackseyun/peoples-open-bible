theological_decisions:
- issue: Retention of blessing language versus reducing it to material prosperity
  chosen_reading: You have blessed the work of his hands
  alternative_readings:
  - You have prospered the work of his hands
  rationale: The verse attributes Job's prosperity to God's blessing. Retaining 'blessed' preserves the theological claim rather than flattening it into mere economic success.
  doctrine_reference: Translation philosophy §1, §6
- issue: Preservation of the protective metaphor
  chosen_reading: put a hedge around
  alternative_readings:
  - protected
  - guarded
  rationale: The Hebrew uses a concrete image of encircling protection. Preserving the metaphor maintains the text's force and avoids over-interpretive abstraction.
  doctrine_reference: Translation philosophy §1, §5
