translation:
  language: es
  text: No comerás ningún animal muerto[a]. Se lo podrás dar al residente extranjero[b] que está dentro de tus puertas[c][d], y él podrá comerlo; o lo podrás vender a un extranjero. Porque tú eres un pueblo santo para Yahvé tu Dios. No cocerás un cabrito[e] en la leche de su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “cualquier cosa que muera de forma natural” o “cadáver de animal”. El hebreo נְבֵלָה se refiere a un animal muerto que no fue sacrificado de manera permitida.'
    reason: lexical_alternative
  - marker: b
    text: “Residente extranjero” traduce גֵּר, un extranjero que vive entre Israel con estatus reconocido; se distingue de “extranjero” (נָכְרִי) en la cláusula siguiente.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, “dentro de tus puertas”, un modismo hebreo para quienes viven dentro de tu comunidad o tus poblaciones.
    reason: cultural_note
  - marker: d
    text: 'O, más formalmente: “Se lo darás ... y él lo comerá; o lo venderás a un extranjero”. El estilo legal hebreo puede expresarse como permiso o como instrucción.'
    reason: alternative_reading
  - marker: e
    text: 'O, tradicionalmente: “No cocerás un chivo en la leche de su madre”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְבֵלָה
  english_pob_choice: carcass
  chosen_spanish: res
  alternatives_spanish:
  - cadáver
  - animal muerto
  - carroña
  lexicon: HALOT
  rationale: El hebreo designa un animal muerto no sacrificado conforme a la ley. En español, 'res' es más natural en registro jurídico-alimentario y puede abarcar el animal apto para consumo en contraste con el que no lo es; por eso se añade la nota para preservar el sentido técnico de la prohibición.
- source_word: גֵּר
  english_pob_choice: sojourner
  chosen_spanish: forastero
  alternatives_spanish:
  - residente extranjero
  - inmigrante
  - foráneo
  lexicon: HALOT
  rationale: POB distingue este término de נָכְרִי. 'Forastero' no es idéntico a 'extraño' ni a 'extranjero' y puede sugerir a alguien que vive entre el pueblo sin ser miembro nativo, aunque en español moderno no reproduce por sí solo el matiz legal; por eso se conserva la distinción en la nota.
- source_word: בִּשְׁעָרֶיךָ
  english_pob_choice: within your gates
  chosen_spanish: dentro de tus puertas
  alternatives_spanish:
  - en tus ciudades
  - dentro de tus poblaciones
  - en tu comunidad
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de 'gates' como marco jurisdiccional y comunitario. 'Puertas' es literal y bíblicamente reconocible en español, aunque suena algo más figurado; la nota ayuda a fijar el sentido social y legal.
- source_word: תִּתְּנֶנָּה וַאֲכָלָהּ
  english_pob_choice: You may give it ... and he may eat it
  chosen_spanish: La podrás dar ... y él la comerá
  alternatives_spanish:
  - Se la podrás dar ... y él la comerá
  - La darás ... y él la comerá
  lexicon: HALOT
  rationale: La forma legal permite entenderse como permiso. En español, 'la podrás dar' expresa mejor la autorización sin imponer un mandato, y 'él la comerá' mantiene la secuencia de permiso con referencia al receptor.
- source_word: נָכְרִי
  english_pob_choice: foreigner
  chosen_spanish: extranjero
  alternatives_spanish:
  - forastero
  - ajeno
  - no israelita
  lexicon: HALOT
  rationale: POB distingue este término del גֵּר. 'Extranjero' es el equivalente más claro y estándar en español para alguien de otra nación o pertenencia, manteniendo la oposición con 'forastero' en la línea anterior.
- source_word: עַם קָדוֹשׁ
  english_pob_choice: a holy people
  chosen_spanish: un pueblo santo
  alternatives_spanish:
  - un pueblo sagrado
  - un pueblo consagrado
  lexicon: HALOT
  rationale: '''Santo'' conserva el peso covenantal de קָדוֹשׁ y su uso bíblico en español. ''Consagrado'' explicaría la idea, pero debilita la fórmula estable; ''sagrado'' puede sonar menos relacional.'
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: El texto hebreo emplea el nombre divino YHWH directamente. Conforme al estándar del proyecto en español, se traduce como 'Yahvé' y no como una sustitución funcional tipo 'Señor', preservando el nombre de pacto.
- source_word: גְּדִי
  english_pob_choice: a young goat
  chosen_spanish: un cabrito
  alternatives_spanish:
  - un chivo joven
  - un cabrito joven
  lexicon: HALOT
  rationale: En español bíblico 'cabrito' es natural y preciso; además conserva la concisión del hebreo mejor que una perífrasis. El sentido de edad queda suficientemente implícito por el sustantivo.
- source_word: תְבַשֵּׁל
  english_pob_choice: boil
  chosen_spanish: cocer
  alternatives_spanish:
  - hervir
  - cocinar
  lexicon: HALOT
  rationale: '''Boil'' apunta a cocer en líquido. En español, ''cocer'' transmite el acto culinario sin restringir demasiado a una técnica moderna específica, y encaja bien con la formulación tradicional del precepto; la nota mantiene la precisión de la imagen prohibida.'
- source_word: בַּחֲלֵב אִמּוֹ
  english_pob_choice: in its mother's milk
  chosen_spanish: en la leche de su madre
  alternatives_spanish:
  - en la leche materna
  - en la leche de su madre
  lexicon: HALOT
  rationale: Se conserva la imagen concreta y relacional del hebreo. 'Leche de su madre' es directo y claro en español, y evita suavizar el vínculo madre-cría que el texto subraya.
theological_decisions:
- issue: Nombre divino YHWH en el texto español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: El versículo contiene el Tetragrama. En esta serie, el español debe preservar el nombre divino en forma explícita; 'Yahvé' es la forma normativa del proyecto y evita la sustitución por un título. La decisión mantiene el carácter de pacto de la cláusula 'pueblo santo para Yahvé tu Dios'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza legal de los verbos sobre dar/vender la res
  english_pob_reading: permissive ('may give ... may sell')
  chosen_spanish_reading: permisiva ('La podrás dar ... o la podrás vender')
  alternative_spanish_readings:
  - imperativa ('La darás ... o la venderás')
  - permisiva ('Puedes darla ... o venderla')
  rationale: La función del versículo es prohibir el consumo israelita y permitir la disposición del animal a no israelitas. El español con 'podrás' comunica permiso sin convertir la disposición en obligación; conserva la lógica legal del texto y evita endurecer el mandato.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
- issue: Prohibición final sobre el cabrito y la leche
  english_pob_reading: Or, traditionally, 'You shall not boil a kid in its mother's milk.'
  chosen_spanish_reading: No cocerás un cabrito en la leche de su madre
  alternative_spanish_readings:
  - No hervirás un cabrito en la leche de su madre
  - No cocinarás un cabrito en la leche de su madre
  rationale: La formulación mantiene el enlace intertextual y la tradición interpretativa, pero en español 'cocer' es suficientemente precisa y natural. Se conserva la literalidad necesaria para no diluir la prohibición ritual/alimentaria.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: El borrador sigue de cerca la evaluación auditada del inglés POB y el hebreo, con un ajuste principal en la elección léxica de נְבֵלָה para evitar una traducción demasiado técnica o poco natural en español. También se preserva la distinción גֵּר / נָכְרִי y el permiso legal implícito en dar o vender la res. No se detectaron revisiones textuales que alteren el contenido base.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה de manera consistente con el estándar del proyecto en español.
  - Se mantiene la distinción entre 'forastero' (גֵּר) y 'extranjero' (נָכְרִי).
  - Se conserva la imagen concreta de 'la leche de su madre' para el cierre del versículo.
  - El tono es jurídico y reverente, sin depender de fórmulas tradicionales de sustitución del nombre divino.
