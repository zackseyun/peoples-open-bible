translation:
  language: es
  text: Hace que la mente del rey y del huérfano sea una sola[a], y la del esclavo y la del libre, y la del pobre y la del rico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «hace que el rey y el huérfano piensen igual, y el esclavo y el libre, y el pobre y el rico».'
    reason: alternative_reading
lexical_decisions:
- source_word: ποιεῖ
  english_pob_choice: makes
  chosen_spanish: hace una
  alternatives_spanish:
  - hace
  - vuelve una
  - une
  lexicon: LSJ
  rationale: ποιεῖ expresa acción causativa simple; «hace una» conserva la fuerza de hacer/volver algo uno sin añadir explicación interpretativa.
- source_word: τὴν διάνοιαν μίαν
  english_pob_choice: the mind ... one
  chosen_spanish: la mente ... una
  alternatives_spanish:
  - la mente ... la misma
  - el pensamiento ... uno
  - la disposición ... una
  lexicon: LSJ
  rationale: διάνοια puede ser mente, pensamiento o disposición; «mente» es natural en español y «una» preserva el predicado de unidad que el griego pone sobre διάνοια.
- source_word: βασιλέως
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - gobernante
  lexicon: LSJ
  rationale: βασιλεύς aquí significa «rey» en sentido directo; no hay razón contextual para generalizarlo.
- source_word: ὀρφανοῦ
  english_pob_choice: orphan
  chosen_spanish: huérfano
  alternatives_spanish:
  - huérfano sin padre
  - desamparado
  lexicon: LSJ
  rationale: ὀρφανός puede ser «huérfano» o «huérfano de padre»; «huérfano» es el equivalente moderno más natural y conserva el contraste social.
- source_word: οἰκέτου
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado de casa
  - servidor doméstico
  lexicon: LSJ
  rationale: Aunque οἰκέτης puede referirse a un sirviente doméstico, el contraste con ἐλευθέρου exige la fuerza de estado social; por eso «esclavo» sigue la decisión auditable del POB inglés.
- source_word: ἐλευθέρου
  english_pob_choice: free
  chosen_spanish: libre
  alternatives_spanish:
  - hombre libre
  - persona libre
  lexicon: LSJ
  rationale: «Libre» reproduce de forma breve el antónimo de «esclavo» y mantiene el paralelismo retórico.
- source_word: πένητος
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - necesitado
  - paupérrimo
  lexicon: LSJ
  rationale: πένης designa a alguien pobre o necesitado; «pobre» es el equivalente más natural y sostiene el par con «rico».
- source_word: πλουσίου
  english_pob_choice: rich
  chosen_spanish: rico
  alternatives_spanish:
  - acaudalado
  - opulento
  lexicon: LSJ
  rationale: «Rico» es el antónimo idiomático y directo de «pobre» en esta secuencia paralela.
theological_decisions:
- issue: La frase describe la nivelación de disposiciones entre personas de distinto rango social, sin explicitar el mecanismo causal ni añadir una lectura moralizante.
  english_pob_reading: Render the status contrasts plainly without importing explanatory theology.
  chosen_spanish_reading: Presentar con claridad los contrastes de estatus y la unidad de mente, sin añadir una explicación que el versículo no da.
  alternative_spanish_readings:
  - 'Interpretar más libremente: «los pone a pensar igual»'
  - Añadir una glosa sobre igualdad interior
  rationale: El griego dice que «hace una» la διάνοια de pares opuestos; la traducción debe conservar ese enunciado sobrio. «Hace una la mente» mantiene la tensión entre diversidad social y unidad interior sin cerrar el sentido más de lo que el texto permite.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto inglés POB ya había quedado estable en el último pase y el control cruzado reportó alta concordancia; por eso la versión española sigue de cerca la estructura griega y la decisión léxica auditada sin introducir revisiones sustantivas.
  spanish_consistency_notes:
  - Se conserva «esclavo» en lugar de «siervo» por la oposición social explícita con «libre».
  - Se traduce διάνοια como «mente» para mantener naturalidad en español sin perder la idea de unidad interior.
  - Se mantiene el paralelismo acumulativo de pares opuestos para reflejar la sintaxis griega.
  - No se sustituye el contenido por una paráfrasis explicativa; la nota opcional recoge la alternativa idiomática documentada.
