theological_decisions:
- issue: 안티테제 정형의 한국어 재현 — 「옛 사람들에게 …라고 말한 것을 들었습니다」
  chosen_reading: 옛 사람들에게 『…』라고 말한 것을 들었습니다. 그러나 나는 여러분에게 말합니다 『…』
  alternative_readings:
  - …말한 것을 너희가 들었다. 그러나 나는 너희에게 말한다
  rationale: 5:21-48의 6대 안티테제(살인·간음·이혼·맹세·보복·원수)는 동일 정형의 반복으로 청각적·수사적 무게를 만든다. 한국어에서도 「옛 사람들에게 …라고 말한 것을 (여러분은) 들었습니다 — 그러나 나는 여러분에게 말합니다 …」를 일관되게 반복해 마태의 정형 반복을 살린다. 합쇼체 종결로 권위와 친밀을 함께 살린다.
  doctrine_reference: Preserve Matthew's antithesis formula; Korean register policy
