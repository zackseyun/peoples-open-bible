review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: hubo gran llanto, en medio de la asamblea, y clamaron a Dios. También preserva adecuadamente ἐκκλησία como «asamblea» y ἐβόησαν como «clamaron». Sin embargo, dos giros no representan de la manera más fiel ni natural los matices auditados: πάντων ὁμοθυμαδόν queda mejor como «todos juntos» o equivalente, no «todos unánimemente», y φωνῇ μεγάλῃ en español bíblico-natural pide «a gran voz» o «con voz fuerte», no «con gran voz».'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero «todos unánimemente» suena forzado y poco idiomático en español, y «con gran voz» resulta calcado. Una reparación pequeña mejora mucho la fluidez sin perder formalidad: «todos juntos» y «a gran voz».'
  glossary_alignment: Buena alineación con la terminología del proyecto en «asamblea» para ἐκκλησία. «Señor Dios» es aceptable aquí porque la fuente inmediata es κύριος τὸν θεόν, no el tetragrámaton hebreo explícito. No hay conflicto serio de glosario, pero sí una mejora estilístico-lexical necesaria en los modificadores comunitario y vocal.
  issues:
  - severity: medium
    issue: «todos unánimemente» es poco natural y sobretraduce el adverbio.
    rationale: πάντων ὁμοθυμαδόν expresa acción conjunta y de común ánimo; «todos juntos» o «todos de común acuerdo» suena más idiomático. «Unánimemente» en esta posición produce español rígido.
  - severity: medium
    issue: «con gran voz» es un calco poco idiomático.
    rationale: φωνῇ μεγάλῃ corresponde en español natural a «a gran voz», «en alta voz» o «con voz fuerte». «Con gran voz» no suena bien en registro bíblico contemporáneo.
  revised_spanish_text: Y hubo gran llanto en medio de toda la asamblea[a], todos juntos, y clamaron al Señor Dios a gran voz.
  revised_footnotes:
  - marker: a
    text: «Asamblea» también puede traducirse «congregación».
    reason: lexical_alternative
  revision_rationale: 'Se conserva el contenido y las decisiones léxicas principales del borrador, pero se corrigen dos expresiones para reflejar mejor el griego y sonar naturalmente en español: ὁμοθυμαδόν como «todos juntos» y φωνῇ μεγάλῃ como «a gran voz».'
