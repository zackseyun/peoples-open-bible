    text: Or 'laid snares.' The Hebrew verb carries the imagery of trapping or ensnaring.
    reason: lexical_alternative
  - marker: b
    text: Literally 'seek my soul,' an idiom here meaning 'seek my life.'
    reason: lexical_alternative
  - marker: c
    text: Or 'speak ruin' or 'utter destructive things.'
    reason: lexical_alternative
  - marker: d
    text: The verb can also mean 'murmur' or 'meditate'; here it refers to continual deceitful speech.
    reason: lexical_alternative
