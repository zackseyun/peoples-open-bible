review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: καὶ ἐγνώσθη αὐτῷ τὸ πρᾶγμα se transmite como una pasiva/impersonal natural en español, y Μή μοι δείξητε τὰ πρόσωπα αὐτῶν conserva la literalidad de «mostrar» y «rostros». También mantiene correctamente la conjunción simple «y». Sin embargo, la forma verbal «mostréis» introduce voseo/vosotros peninsular, contrario al estilo neutral latinoamericano solicitado.'
  spanish_quality_summary: El texto es claro, pero «No me mostréis» suena marcado regionalmente y menos natural para una Biblia de alcance panhispánico. Una forma neutral como «No me muestren» preserva el plural y la dignidad del registro. El resto del verso es legible y sobrio. La nota al pie también necesita ajustarse para concordar con la nueva forma verbal y conviene evitar el cambio de persona en «ante él», ya que la cita está en primera persona.
  glossary_alignment: 'No hay términos del glosario teológico principal en juego. La decisión de mantener «rostros» está bien alineada con la evidencia y con la nota léxica inglesa. La única desviación relevante es estilística: evitar «mostréis» por no corresponder al español neutral latinoamericano del proyecto.'
  issues:
  - severity: medium
    issue: Uso de «mostréis»
    rationale: Es comprensible, pero es una forma peninsular marcada y no encaja con el objetivo de español neutral latinoamericano/broadly church-readable.
  - severity: low
    issue: 'Redacción de la nota: «que no los traigáis ante él»'
    rationale: La explicación mezcla segunda persona plural peninsular con tercera persona («él»), cuando la cita está en primera persona. «Que no los traigan ante mí» o «que no los hagan comparecer ante mí» es más coherente.
