translation:
  language: es
  text: 'Entonces, el lugar que Yahvé su Dios escogerá para que su nombre habite allí[a], a ese lugar llevarán todo lo que yo les mando: sus holocaustos, sus sacrificios, sus diezmos, la contribución de su mano y todo lo mejor de sus votos, que le harán a Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «para hacer que su nombre habite allí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: Then ... will
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y sucederá
  - Y será
  lexicon: HALOT
  rationale: En español, 'Entonces' comunica bien la progresión discursiva y el valor futurizante de la construcción hebrea sin sonar forzado.
- source_word: הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  lexicon: HALOT
  rationale: '''Lugar'' es la equivalencia natural y directa para el espacio cultual central del pasaje.'
- source_word: אֲשֶׁר יִבְחַר יְהוָה
  english_pob_choice: that Yahweh ... will choose
  chosen_spanish: que Yahvé, su Dios, escogerá
  alternatives_spanish:
  - que Yahvé su Dios elegirá
  - que Yahvé, el Dios de ustedes, escogerá
  lexicon: HALOT
  rationale: '''Escogerá'' conserva el futuro volitivo del verbo; ''su Dios'' refleja el sufijo plural sin endurecer la sintaxis española. Se mantiene ''Yahvé'' conforme al criterio del proyecto.'
- source_word: לְשַׁכֵּן שְׁמוֹ שָׁם
  english_pob_choice: for his name to dwell there
  chosen_spanish: para hacer que allí habite su nombre
  alternatives_spanish:
  - para que su nombre habite allí
  - para hacer morar allí su nombre
  lexicon: HALOT
  rationale: '''Hacer que allí habite'' preserva el matiz causativo del hifil y la imagen de la ''teología del nombre'', sin reducirla a una mera localización.'
- source_word: תָבִיאוּ
  english_pob_choice: you shall bring
  chosen_spanish: llevarán
  alternatives_spanish:
  - traerán
  - ustedes llevarán
  lexicon: HALOT
  rationale: El plural imperativo/directivo se expresa de forma natural con 'llevarán' en este contexto de acceso al santuario; el destinatario se entiende por el contexto y por 'ustedes' en la cláusula final.
- source_word: עוֹלֹתֵיכֶם
  english_pob_choice: your burnt offerings
  chosen_spanish: sus holocaustos
  alternatives_spanish:
  - sus ofrendas quemadas
  - sus ofrendas totalmente quemadas
  lexicon: HALOT
  rationale: '''Holocaustos'' es el término cultual español tradicional y preciso para עוֹלָה; se conserva el valor técnico sacrificial.'
- source_word: וְזִבְחֵיכֶם
  english_pob_choice: your sacrifices
  chosen_spanish: sus sacrificios
  alternatives_spanish:
  - sus ofrendas sacrificadas
  lexicon: HALOT
  rationale: '''Sacrificios'' reproduce el campo semántico amplio del sustantivo sin estrecharlo a un tipo particular.'
- source_word: מַעְשְׂרֹתֵיכֶם
  english_pob_choice: your tithes
  chosen_spanish: sus diezmos
  alternatives_spanish:
  - sus décimas
  lexicon: HALOT
  rationale: '''Diezmos'' es el equivalente estándar y transparente en español bíblico.'
- source_word: וּתְרֻמַת יֶדְכֶם
  english_pob_choice: the contribution of your hand
  chosen_spanish: la contribución de su mano
  alternatives_spanish:
  - la ofrenda de su mano
  - la ofrenda hecha por su mano
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de la mano y el sentido de contribución personal. La forma en singular impersonal evita una acumulación excesiva de marcas pronominales en español.
- source_word: מִבְחַר נִדְרֵיכֶם
  english_pob_choice: all the choicest of your vows
  chosen_spanish: todo lo mejor de sus votos
  alternatives_spanish:
  - todo lo escogido de sus votos
  - lo más selecto de sus votos
  lexicon: HALOT
  rationale: '''Lo mejor'' expresa el valor selectivo de מִבְחַר sin añadir un sustantivo que no está explícito; ''votos'' mantiene el sustantivo base נדרים. Se evita ''ofrendas'' porque la revisión inglesa reciente destacó que no está explícito en el hebreo.'
- source_word: אֲשֶׁר תִּדְּרוּ לַיהוָה
  english_pob_choice: that you vow to Yahweh
  chosen_spanish: que ustedes harán a Yahvé
  alternatives_spanish:
  - que ustedes prometerán a Yahvé
  - que ustedes votarán a Yahvé
  lexicon: HALOT
  rationale: Se opta por 'harán' con 'votos' como antecedente inmediato para evitar una repetición pesada de 'votar'; el relativo conserva la orientación a Yahvé. 'Hacer votos' es idiomático, pero en esta línea el español fluye mejor con la clausula relativa.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El proyecto establece 'Yahvé' como forma principal en español para el Tetragrama. Se evita la sustitución por un título y se mantiene la distinción del nombre de pacto.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH → Yahvé'
- issue: Teología del nombre en לְשַׁכֵּן שְׁמוֹ שָׁם
  english_pob_reading: for his name to dwell there
  chosen_spanish_reading: para hacer que allí habite su nombre
  alternative_spanish_readings:
  - para que su nombre habite allí
  - para poner su nombre allí
  rationale: 'La traducción conserva la tensión teológica: no se habla de limitar a Dios a un sitio, sino de la presencia representada por su nombre en el lugar elegido. El causativo se mantiene explícito con ''hacer que habite''.'
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather than flatten it'
- issue: Campo sacrificial de עוֹלָה
  english_pob_reading: burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  rationale: '''Holocaustos'' es el término técnico asentado para la ofrenda totalmente consumida por el fuego; conserva la fuerza cultual del hebreo.'
  doctrine_reference: Lexical consistency for sacrificial terminology
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefirió 'the choicest of your vows' frente a 'vow offerings'. Por eso el español no añade 'ofrendas' en esa frase y conserva el matiz del hebreo נדרים como 'votos'. También se conservó la decisión auditada sobre la teología del nombre en 'לְשַׁכֵּן שְׁמוֹ שָׁם'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma uniforme del nombre divino.
  - Se usa 'sus' en la serie poseída para mantener concordancia con el plural de ustedes implícito por el contexto.
  - '''Holocaustos'' y ''sacrificios'' se distinguen para respetar el inventario sacrificial del versículo.'
  - '''Votos'' se conserva para נדרים sin añadir contenido sacrificial no explicitado.'
  - La nota al pie marca solo la alternativa formal sobre 'habite su nombre' y no duplica otras decisiones léxicas.
