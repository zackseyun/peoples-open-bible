translation:
  language: es
  text: Y los peces que están en el Nilo morirán[a], y el Nilo apestará, y los egipcios no podrán beber agua del Nilo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el río»; en el contexto se refiere específicamente al Nilo.'
    reason: lexical_alternative
  - marker: b
    text: O «los egipcios se cansarán tratando de beber agua del Nilo». El verbo hebreo puede expresar cansancio que lleva a la incapacidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּגָה
  english_pob_choice: the fish
  chosen_spanish: el pez
  alternatives_spanish:
  - los peces
  - la fauna acuática
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo. En español, «el pez» conserva la referencia colectiva de manera natural y no añade un plural no expresado en el texto. «Los peces» sería posible, pero desplaza el singular colectivo del hebreo.
- source_word: יְאֹר
  english_pob_choice: the Nile
  chosen_spanish: el Nilo
  alternatives_spanish:
  - el río
  lexicon: HALOT
  rationale: En Éxodo, יְאֹר se refiere específicamente al Nilo. Traducirlo como «el Nilo» evita ambigüedad y sigue la decisión auditada de la POB inglesa.
- source_word: תָּמוּת
  english_pob_choice: will die
  chosen_spanish: morirá
  alternatives_spanish:
  - perecerá
  lexicon: HALOT
  rationale: La forma verbal expresa futuro simple de morir. «Morirá» es directo y fiel; «perecerá» sería más interpretativo.
- source_word: וּבָאַשׁ
  english_pob_choice: will stink
  chosen_spanish: apestará
  alternatives_spanish:
  - hedirá
  - se volverá fétido
  lexicon: HALOT
  rationale: El verbo באש describe volverse maloliente. «Apestará» mantiene la fuerza olfativa del hebreo y es natural en español; «hedirá» también sería posible, pero suena algo más literario.
- source_word: וְנִלְאוּ
  english_pob_choice: will be unable
  chosen_spanish: no podrán
  alternatives_spanish:
  - se cansarán tratando de
  - estarán incapaces de
  lexicon: HALOT
  rationale: 'La POB inglesa opta por el resultado práctico de la expresión niphal de לאה: incapacidad por agotamiento. En español, «no podrán» comunica el resultado sin introducir una explicación más larga. Se conserva la tensión lexical entre incapacidad y cansancio en la nota.'
- source_word: לִשְׁתּוֹת מַיִם
  english_pob_choice: to drink water
  chosen_spanish: beber agua
  alternatives_spanish:
  - tomar agua
  lexicon: HALOT
  rationale: El infinitivo con objeto explícito se refleja de forma natural como «beber agua». «Tomar agua» es correcto en algunos registros, pero «beber» es más directo y más cercano al verbo hebreo.
- source_word: מִן הַיְאֹר
  english_pob_choice: from the Nile
  chosen_spanish: del Nilo
  alternatives_spanish:
  - desde el Nilo
  lexicon: HALOT
  rationale: La preposición מִן se expresa de manera natural con «de». «Del Nilo» conserva la sencillez del hebreo y la lectura auditada de la POB inglesa.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide sustancialmente con la POB inglesa auditada. Se mantuvo la referencia específica al Nilo, el singular colectivo de «el pez» y la tensión semántica de וְנִלְאוּ mediante una nota que conserva la alternativa de cansancio/incapacidad.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se mantuvo «Nilo» en todo el versículo para reflejar el referente contextual específico de יְאֹר.
  - La sintaxis usa futuro simple coherente en toda la cláusula narrativa.
  - La nota b preserva la alternativa lexical sin alterar la lectura principal en español.
