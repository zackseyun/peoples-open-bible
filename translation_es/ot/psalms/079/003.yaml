review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo: שָׁפְכוּ דָמָם = «han derramado su sangre», כַּמַּיִם = «como agua», סְבִיבוֹת יְרוּשָׁלִָם = «alrededor de Jerusalén», וְאֵין קוֹבֵר = «no hay quien los sepulte». Sin embargo, la nota al pie no preserva la alternativa inglesa documentada, porque repite esencialmente el mismo texto en vez de ofrecer la opción léxica «vertido/derramado» frente a «shed».'
  spanish_quality_summary: El español es claro, natural y de registro digno. «No hay quien los sepulte» suena bien y comunica correctamente el participio sustantivado. «Alrededor de Jerusalén» es plenamente legible; aunque «todo alrededor de» reflejaría más explícitamente el distributivo, no es necesario corregirlo. La única reparación necesaria es la nota al pie.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El verso no contiene términos sensibles del glosario mayor. Las decisiones léxicas principales son fieles y naturales en español.
  issues:
  - severity: medium
    issue: La nota al pie [a] no transmite la alternativa léxica auditada en inglés.
    rationale: El inglés conserva la variante «Or 'shed their blood like water.'». En español, la nota actual repite «han derramado su sangre como agua», que no añade una alternativa real. Debe ofrecer una opción como «Han vertido su sangre como agua» o, menos idealmente, «Han derramado su sangre como agua» si el texto principal cambiara.
  revised_spanish_text: Han derramado su sangre como agua alrededor de Jerusalén[a], y no hay quien los sepulte.
  revised_footnotes:
  - marker: a
    text: 'O: «Han vertido su sangre como agua».'
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel al hebreo y idiomático en español. Solo se corrige la nota para que preserve una alternativa léxica real, en línea con la auditoría inglesa de שָׁפְכוּ.
