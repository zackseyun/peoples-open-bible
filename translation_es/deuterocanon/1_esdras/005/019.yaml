translation:
  language: es
  text: los de Kartatheireios[a], veinticinco; los de Peiras y Berog, setecientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo difiere aquí, leyendo aproximadamente «los hombres de Netofá, cincuenta y seis». 1 Esdras parece conservar una forma griega divergente de esta lista, en vez de ese enunciado hebreo.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ ἐκ
  english_pob_choice: those from
  chosen_spanish: los de
  alternatives_spanish:
  - los que proceden de
  - los provenientes de
  - los de entre
  lexicon: LSJ
  rationale: La fórmula funciona como encabezado de lista de procedencia. En español, «los de» conserva la elipsis y suena natural en un registro de inventario sin añadir «hombres» u otro sustantivo no explícito.
- source_word: Καρταθειαρειός
  english_pob_choice: Kartatheireios
  chosen_spanish: Kartateireios
  alternatives_spanish:
  - Cartateireios
  - Karta-teireios
  lexicon: LSJ
  rationale: Se mantiene la transliteración del nombre propio griego de forma conservadora. Se ajusta mínimamente la grafía para lectura española, sin intentar identificarlo con el paralelo hebreo.
- source_word: εἴκοσι πέντε
  english_pob_choice: twenty-five
  chosen_spanish: veinticinco
  alternatives_spanish:
  - veinte y cinco
  lexicon: LSJ
  rationale: Número cardinal directo y sin ambigüedad; «veinticinco» es la forma española estándar y más fluida.
- source_word: Πείρας
  english_pob_choice: Peiras
  chosen_spanish: Peiras
  alternatives_spanish:
  - Piras
  - Pera
  lexicon: LSJ
  rationale: Nombre propio transliterado desde el griego. No se armoniza con el testimonio hebreo paralelo porque la base de traducción es el texto griego de 1 Esdras.
- source_word: Βηρόγ
  english_pob_choice: Berog
  chosen_spanish: Berog
  alternatives_spanish:
  - Berogh
  - Berogg
  lexicon: LSJ
  rationale: Nombre propio transliterado desde el griego con una grafía simple y legible en español.
- source_word: ἑπτακόσιοι
  english_pob_choice: seven hundred
  chosen_spanish: setecientos
  alternatives_spanish:
  - siete cientos
  lexicon: LSJ
  rationale: Número cardinal directo; «setecientos» es la forma normal y más idiomática en español.
theological_decisions:
- issue: Divergencia entre la lista griega de 1 Esdras y el paralelo hebreo masorético aproximado
  english_pob_reading: Translate the Greek place names and numbers as given in Swete, while preserving the Hebrew-parallel alternative in a footnote.
  chosen_spanish_reading: Traducir los nombres y números tal como aparecen en el griego, conservando en la nota la diferencia del paralelo hebreo.
  alternative_spanish_readings:
  - armonizar con el paralelo hebreo aproximado
  - sustituir por 'los hombres de Netofá, cincuenta y seis'
  rationale: Para 1 Esdras, el griego es el testimonio base. El expediente marca una discrepancia mayor con el paralelo hebreo, por lo que la traducción debe permanecer anclada en el griego y dejar constancia transparente de la alternativa sin mezclar tradiciones.
  doctrine_reference: 'PHILOSOPHY.md: primacía del griego para libros deuterocanónicos; mantener transparencia textual frente a paralelos divergentes.'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece explícitamente en el texto español junto al nombre correspondiente, y la nota preserva la alternativa paralela sin armonizarla.'
  spanish_consistency_notes:
  - Se mantuvo el estilo de lista censal con fórmulas breves y nombres transliterados.
  - No se introdujo 'SEÑOR' ni otras sustituciones teológicas ajenas al texto.
  - La puntuación española usa punto y coma para separar los miembros de la lista, siguiendo la estructura griega.
