translation:
  language: es
  text: Y en aquel día habrá entre ellos un gran pánico[a] de Yahvé, y cada hombre asirá la mano de su prójimo[b], y su mano se alzará contra la mano de su prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confusión» o «tumulto de Yahvé». El término hebreo puede denotar un estado de terror caótico causado divinamente.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «su mano se alzará contra la mano de su prójimo», una expresión vívida para indicar que se volverán violentamente unos contra otros.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְהוּמַת
  english_pob_choice: panic
  chosen_spanish: conmoción
  alternatives_spanish:
  - pánico
  - confusión
  - tumulto
  lexicon: HALOT
  rationale: El sustantivo puede expresar desorden, terror o agitación colectiva causada por intervención divina. «Conmoción» conserva la idea de trastorno intenso sin forzar un matiz psicológico demasiado moderno como «pánico», y deja abierta la amplitud semántica que el inglés POB señaló en su nota.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el criterio proyectual para el nombre divino en español. «Yahvé» mantiene la referencia directa al Tetragrámaton sin sustituirla por una máscara como «SEÑOR».
- source_word: רַבָּה
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - intensa
  lexicon: HALOT
  rationale: El adjetivo intensifica la magnitud de la conmoción. «Gran» es la forma natural en español antepuesta a un sustantivo y preserva el valor enfático del hebreo.
- source_word: בָּהֶם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en ellos
  lexicon: HALOT
  rationale: La preposición ב aquí describe la irrupción del trastorno dentro del grupo, con efecto interno. «Entre ellos» comunica mejor esa ubicación distributiva y prepara la violencia mutua que sigue.
- source_word: וְהֶחֱזִיקוּ
  english_pob_choice: will seize
  chosen_spanish: asirá
  alternatives_spanish:
  - agarrará
  - tomará por
  lexicon: HALOT
  rationale: El Hifil de חזק expresa una acción fuerte y física. «Asirá» es una opción digna y precisa en español bíblico; conserva la fuerza del gesto sin suavizarlo excesivamente.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: El hebreo es distributivo y masculinidad gramatical. «Cada hombre» refleja con claridad la forma del original y el valor representativo señalado por el POB en su política de precisión de género.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - su compañero
  - su semejante
  lexicon: HALOT
  rationale: En este contexto no se trata de un término afectivo de amistad, sino del otro miembro del grupo. «Prójimo» es una forma bíblica y comprensible en español; aunque puede sonar más tradicional, aquí comunica adecuadamente la relación recíproca sin introducir cercanía teológica ajena al pasaje.
- source_word: וְעָלְתָה יָדוֹ עַל יַד רֵעֵהוּ
  english_pob_choice: his hand will rise against the hand of his neighbor
  chosen_spanish: su mano se alzará contra la mano de su prójimo
  alternatives_spanish:
  - su mano se levantará contra la mano de su prójimo
  - su mano subirá contra la mano de su prójimo
  lexicon: HALOT
  rationale: El hebreo repite «mano» para enfatizar la agresión corporal directa. Se conserva la imagen literal de la mano que se alza «contra» otra mano, porque el POB mantiene esa tensión figurativa en inglés y el español la entiende de manera natural.
theological_decisions:
- issue: Origen divino del desorden
  english_pob_reading: The panic is presented as coming from the LORD and resulting in internal conflict among the hostile group.
  chosen_spanish_reading: La conmoción se presenta como proveniente de Yahvé y produciendo conflicto interno entre el grupo hostil.
  alternative_spanish_readings:
  - La conmoción llega de Yahvé y los deja en confusión
  - Yahvé provoca un tumulto entre ellos
  rationale: El constructo מְהוּמַת יְהוָה señala una perturbación enviada por Yahvé. Mantener ese origen divino es importante para no diluir el juicio en una mera descripción sociológica; al mismo tiempo, «conmoción» evita cerrar indebidamente el campo semántico entre terror, caos y agitación.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Lenguaje distributivo masculino
  english_pob_reading: each man
  chosen_spanish_reading: cada hombre
  alternative_spanish_readings:
  - cada uno
  - todos
  rationale: El hebreo emplea אִישׁ en forma singular distributiva. Se conserva el masculino gramatical porque corresponde al texto y mantiene la fuerza representativa que el POB ya documentó en inglés.
  doctrine_reference: Translation philosophy §4
