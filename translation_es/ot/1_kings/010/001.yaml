translation:
  language: es
  text: Ahora la reina de Saba oyó la fama de Salomón en relación con el nombre de Yahvé[a], y vino para ponerlo a prueba con enigmas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «acerca del nombre de Yahvé»; la frase hebrea es compacta y puede indicar que la fama de Salomón estaba conectada con el nombre o la reputación de Yahvé.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con preguntas difíciles»; el hebreo se refiere más literalmente a enigmas o acertijos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מַֽלְכַּת
  english_pob_choice: Now the queen of
  chosen_spanish: Ahora la reina de
  alternatives_spanish:
  - Y la reina de
  lexicon: HALOT
  rationale: El waw narrativo se refleja en español con un conector natural de avance discursivo. «Ahora» conserva el arranque de escena sin perder la continuidad narrativa.
- source_word: שְׁבָא
  english_pob_choice: Sheba
  chosen_spanish: Saba
  alternatives_spanish:
  - Sheba
  lexicon: HALOT
  rationale: Se translitera el nombre propio al uso hispano bíblico como «Saba», forma clara y reconocible en español.
- source_word: שֹׁמַעַת
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - estaba oyendo
  - había oído
  lexicon: HALOT
  rationale: El participio en contexto narrativo funciona como acción de fondo antecedente a la visita; «oyó» es natural y fiel en español.
- source_word: אֶת שֵׁ֥מַע שְׁלֹמֹה
  english_pob_choice: of Solomon’s fame
  chosen_spanish: la fama de Salomón
  alternatives_spanish:
  - el reporte acerca de Salomón
  - la reputación de Salomón
  lexicon: HALOT
  rationale: שֵׁמַע puede significar noticia, reporte o fama. Aquí «fama» reproduce bien la idea de reputación conocida a distancia que impulsa la visita.
- source_word: לְ/שֵׁ֣ם יְהוָ֑ה
  english_pob_choice: concerning the name of Yahweh
  chosen_spanish: relacionada con el nombre de Yahvé
  alternatives_spanish:
  - respecto del nombre de Yahvé
  - acerca del nombre de Yahvé
  - por causa del nombre de Yahvé
  lexicon: HALOT
  rationale: La frase hebrea es compacta y relacional. «Relacionada con» conserva la ambigüedad documentada entre referencia, conexión y posible causa sin imponer una lectura más específica de la que el hebreo exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton como «Yahvé», conforme a la terminología del proyecto y al valor del nombre propio en el texto original.
- source_word: וַ/תָּבֹ֥א
  english_pob_choice: and she came
  chosen_spanish: y vino
  alternatives_spanish:
  - y llegó
  - y se presentó
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «vino» es una forma breve y fiel que conserva el movimiento hacia Salomón.
- source_word: לְ/נַסֹּת֖/וֹ
  english_pob_choice: to test him
  chosen_spanish: para probarlo
  alternatives_spanish:
  - para testearlo
  - para examinarlo
  lexicon: HALOT
  rationale: נָסָה expresa probar, poner a prueba. «Probarlo» comunica bien la acción sin endurecerla en un tecnicismo moderno.
- source_word: בְּ/חִידֽוֹת
  english_pob_choice: with riddles
  chosen_spanish: con enigmas
  alternatives_spanish:
  - con acertijos
  - con adivinanzas
  - con preguntas difíciles
  lexicon: HALOT
  rationale: חִידוֹת refiere a acertijos, enigmas o dichos difíciles. «Enigmas» conserva el valor semántico amplio y solemne; en español permite la ambigüedad entre juego verbal y cuestionamiento difícil.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto en forma transliterada, en línea con la práctica del proyecto y con la decisión inglesa de no enmascarar el Tetragrámaton con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre la fama de Salomón y el nombre de Yahvé
  english_pob_reading: Solomon’s fame concerning the name of Yahweh
  chosen_spanish_reading: la fama de Salomón, relacionada con el nombre de Yahvé
  alternative_spanish_readings:
  - la fama de Salomón acerca del nombre de Yahvé
  - la fama de Salomón por causa del nombre de Yahvé
  rationale: El hebreo permite una relación compacta y algo abierta. La redacción española conserva esa tensión sin decidir indebidamente entre mera referencia, asociación o causalidad.
  doctrine_reference: Nota lexical sobre לְשֵׁם en el aparato inglés
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la lectura revisada del inglés POB y mantiene sus dos tensiones auditadas: la relación compacta de לְשֵׁם יְהוָה y el valor de חִידוֹת como «enigmas/riddles». No se requieren cambios textuales adicionales respecto del último pase revisado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se evita «SEÑOR» para no ocultar el nombre divino.
  - «Saba» se emplea como forma hispana estándar del topónimo.
  - «Enigmas» conserva una alternativa semántica amplia sin perder la nota explicativa.
  - La puntuación sigue el estilo español moderno y mantiene el flujo narrativo del versículo.
