    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «cuya lengua no conoces, y no entiendes lo que habla».'
    reason: lexical_alternative
  revision_rationale: Se corrige la concordancia al plural para armonizar con «ustedes» y con la lectura natural en español del referente colectivo. También se ajusta «cuyo hablar» a «cuya habla» para una expresión más idiomática sin apartarse del sentido del hebreo ni del POB inglés. El resto del verso puede conservarse.
