translation:
  language: es
  text: Y de la costilla[a] que Yahvé Dios había tomado del hombre, hizo una mujer[b], y la llevó al hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el lado'. El hebreo צֵלָע puede significar 'lado' además de 'costilla'.
    reason: lexical_alternative
  - marker: b
    text: O 'Yahvé Dios edificó la costilla que había tomado del hombre en una mujer'. El hebreo usa un verbo que literalmente puede expresarse como 'edificar' o 'construir'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - formó
  - hizo
  lexicon: HALOT
  rationale: El verbo בנה significa literalmente 'construir/edificar'. En español, 'edificar' conserva mejor la imagen concreta de construcción que un simple 'hacer', sin perder dignidad ni claridad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la convención POB para el Tetragrámaton como nombre propio divino. 'Yahvé' preserva el nombre personal revelado, en vez de sustituirlo por un título.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En la expresión fija יְהוָה אֱלֹהִים, 'Yahvé Dios' reproduce el valor del hebreo con naturalidad en español. No se añade artículo porque el nombre propio ya lleva la referencia definida.
- source_word: הַצֵּלָע
  english_pob_choice: the rib
  chosen_spanish: la costilla
  alternatives_spanish:
  - el lado
  lexicon: HALOT
  rationale: En este contexto narrativo inmediato, 'costilla' es la lectura contextual más específica y tradicional del elemento tomado del hombre. La alternativa más amplia 'lado' se conserva en nota porque el hebreo puede abarcar ese sentido.
- source_word: לָקַח מִן הָאָדָם
  english_pob_choice: had taken from the man
  chosen_spanish: había tomado del hombre
  alternatives_spanish:
  - tomó del hombre
  lexicon: HALOT
  rationale: El pluscuamperfecto en español marca con claridad que la toma ocurrió antes de la acción principal de edificar, respetando la secuencia narrativa del hebreo.
- source_word: הָאָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el humano
  lexicon: HALOT
  rationale: Aquí אָדָם se refiere al varón concreto del relato, en contraste con 'mujer'. 'El hombre' es la equivalencia más precisa y natural.
- source_word: לְאִשָּׁה
  english_pob_choice: into a woman
  chosen_spanish: en una mujer
  alternatives_spanish:
  - como mujer
  - para mujer
  lexicon: HALOT
  rationale: La preposición ל expresa resultado/transformación en esta construcción. En español, 'en una mujer' comunica ese cambio de estado sin forzar una paráfrasis.
- source_word: וַיְבִאֶהָ אֶל הָאָדָם
  english_pob_choice: and he brought her to the man
  chosen_spanish: y la llevó al hombre
  alternatives_spanish:
  - y la condujo al hombre
  - y la trajo al hombre
  lexicon: HALOT
  rationale: El hifil de בוא se expresa naturalmente como 'llevar' o 'traer'. 'Llevó' mantiene fluidez en español y conserva la acción narrativa de presentarla ante el hombre.
theological_decisions:
- issue: Nombre divino יְהוָה en la combinación יְהוָה אֱלֹהִים
  english_pob_reading: Yahweh God
  chosen_spanish_reading: Yahvé Dios
  alternative_spanish_readings:
  - Yahvé, Dios
  - el SEÑOR Dios
  rationale: Se mantiene el nombre propio divino y el sustantivo 'Dios' para reflejar la combinación hebrea sin la sustitución tradicional por un título. La puntuación no separa indebidamente la unidad nominal del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de אָדָם en este versículo
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - el ser humano
  - el humano
  rationale: El contexto inmediato contrasta a אָדָם con 'mujer', así que el referente es el varón individual del relato, no la humanidad en general. 'El hombre' preserva esa precisión contextual.
  doctrine_reference: 'DOCTRINE.md Contested terms: אָדָם adam → man / humankind (context)'
- issue: Valor de הַצֵּלָע
  english_pob_reading: the rib
  chosen_spanish_reading: la costilla
  alternative_spanish_readings:
  - el lado
  rationale: La opción principal sigue la lectura contextual específica; no se borra la amplitud léxica del hebreo porque la alternativa 'el lado' se documenta en nota. Así se conserva la tensión entre especificidad narrativa y potencial semántico.
  doctrine_reference: HALOT; English POB lexical note on צֵלָע
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente suavizó el orden sintáctico pero mantuvo la misma base léxica. En español, se opta por una estructura natural que conserva la secuencia hebrea: sujeto divino + objeto tomado previamente + transformación + traslado final. No se sigue mecánicamente el giro inglés final, sino el patrón hebreo y la decisión léxica auditada de ''built''/''made'' se resuelve aquí con ''edificó'' por fidelidad imagística.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - '''Hombre'' se mantiene para אָדָם en este contexto narrativo específico.'
  - '''Mujer'' traduce אִשָּׁה con el artículo indefinido implícito del resultado.'
  - La nota de pie de página usa el marcador [a] exactamente donde corresponde en el texto.
