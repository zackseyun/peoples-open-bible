translation:
  language: es
  text: El necio no se complace en el entendimiento[a], sino solo en revelar su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en exponer lo que hay en su corazón». Aquí «corazón» se refiere al centro interior de pensamientos e inclinaciones, no solo a las emociones.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְפֹּץ
  english_pob_choice: does not delight in
  chosen_spanish: no se complace en
  alternatives_spanish:
  - no tiene gusto por
  - no se deleita en
  - no desea
  lexicon: HALOT
  rationale: חפץ expresa agrado, complacencia o deseo. «No se complace en» conserva la idea volitiva de no hallar placer en algo, de manera natural en español y apta para el registro sapiencial.
- source_word: כְּסִיל
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - fool
  - insensato
  - estúpido
  lexicon: HALOT
  rationale: En Proverbios, כְּסִיל es un término sapiencial para la persona moralmente terca y espiritualmente torpe. «Necio» es un equivalente bíblico y natural en español, sin reducirlo a mera falta de capacidad intelectual.
- source_word: תְבוּנָה
  english_pob_choice: understanding
  chosen_spanish: el entendimiento
  alternatives_spanish:
  - la discernimiento
  - la comprensión
  - la perspicacia
  lexicon: HALOT
  rationale: תבונה en literatura sapiencial apunta a entendimiento o discernimiento. «El entendimiento» es claro, idiomático y mantiene el contraste esperado con el necio.
- source_word: כִּי אִם
  english_pob_choice: but only
  chosen_spanish: sino solo
  alternatives_spanish:
  - sino más bien
  - pero solo
  - excepto que
  lexicon: HALOT
  rationale: La construcción introduce contraste excluyente. «Sino solo» comunica la oposición y la exclusividad del segundo hemistiquio en español natural.
- source_word: בְּהִתְגַּלּוֹת
  english_pob_choice: in revealing
  chosen_spanish: en revelar
  alternatives_spanish:
  - en exponer
  - en dar a conocer
  - al revelar
  lexicon: HALOT
  rationale: El infinitivo de גלה conserva la metáfora de descubrir o sacar a la luz. «En revelar» sigue de cerca el valor verbal sin volverlo artificial.
- source_word: לִבּוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - lo que hay en su interior
  - su interior
  lexicon: HALOT
  rationale: לֵב designa el centro interior de pensamientos, intenciones y deseos. «Corazón» preserva el antropologismo hebreo; en una nota se aclara que no se limita a emociones.
translation_notes:
  revision_awareness: El texto base inglés y la revisión más reciente no introducen cambios; se mantiene el sentido del hebreo WLC. La única tensión a cuidar en español es que «entendimiento» requiere artículo definido para sonar natural, y la nota sobre «corazón» preserva el valor antropológico amplio de לֵב.
  spanish_consistency_notes:
  - Se mantuvo «necio» para כְּסִיל, en línea con la terminología sapiencial clásica y con el matiz moral del término.
  - Se prefirió «entendimiento» para תְבוּנָה, evitando «comprensión» o «discernimiento» como primeras opciones porque el paralelismo sapiencial con «necio» queda más directo.
  - Se usó «sino solo» para reproducir la exclusividad de כִּי אִם sin diluir el contraste.
  - La nota textual evita restringir «corazón» a sentimientos, conforme al uso hebreo de לֵב.
