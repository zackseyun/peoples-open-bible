id: GEN.40.23
reference: Genesis 40:23
source:
  edition: WLC
  text: וְ/לֹֽא זָכַ֧ר שַֽׂר הַ/מַּשְׁקִ֛ים אֶת יוֹסֵ֖ף וַ/יִּשְׁכָּחֵֽ/הוּ־־־׃פ
translation:
  text: But the chief cupbearer did not remember Joseph[a], but forgot him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And the chief cupbearer did not remember Joseph, but forgot him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֹא
  chosen: But ... not
  alternatives:
  - And ... not
  - Yet ... not
  lexicon: HALOT
  rationale: The conjunction with negation links this verse to the preceding fulfillment of Joseph's interpretation while marking a contrastive turn. 'But' captures the discourse contrast more naturally in English than a simple 'and'.
- source_word: זָכַר
  chosen: remember
  alternatives:
  - call to mind
  - mention
  lexicon: HALOT
  rationale: The verb commonly means 'remember.' In context it refers to the cupbearer's failure to keep Joseph in mind and act on his behalf, but 'remember' best preserves the lexical sense without over-interpreting.
- source_word: שַׂר הַמַּשְׁקִים
  chosen: the chief cupbearer
  alternatives:
  - the captain of the drinkers
  - the chief of the cupbearers
  lexicon: HALOT
  rationale: This court title refers to Pharaoh's high official responsible for drink service. 'Chief cupbearer' is idiomatic, concise, and consistent with the narrative context.
- source_word: אֶת יוֹסֵף
  chosen: Joseph
  rationale: Direct-object marking is not represented in English. The personal name is transliterated according to the project's policy.
- source_word: וַיִּשְׁכָּחֵהוּ
  chosen: he forgot him
  alternatives:
  - and forgot him
  - he neglected him
  lexicon: HALOT
  rationale: 'The verb means ''forget,'' with the 3ms suffix referring to Joseph. Rendering it as a new clause after a semicolon reflects the Hebrew sequence and preserves the emphatic restatement: not only did he fail to remember Joseph, he forgot him.'
