translation:
  language: es
  text: Y los vistió de fuerza[a], y los hizo conforme a su imagen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en su imagen». La frase griega evoca el lenguaje de la creación en Génesis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνέδυσεν
  english_pob_choice: clothed
  chosen_spanish: vistió
  alternatives_spanish:
  - los revistió
  - los cubrió
  lexicon: LSJ
  rationale: El griego ἐνέδυσεν conserva la metáfora de poner una prenda; en español, «vistió» reproduce de forma natural y transparente esa imagen. «Los revistió» sería más marcadamente bíblico, pero menos directo en el uso actual.
- source_word: ἰσχύν
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  lexicon: LSJ
  rationale: ἰσχύς puede significar fuerza o vigor. «Fuerza» es la equivalencia más clara y general en español; «fortaleza» puede sonar más abstracto o moral, y «poder» desplaza el matiz hacia autoridad o capacidad.
- source_word: κατ᾿ εἰκόνα αὐτοῦ
  english_pob_choice: according to his image
  chosen_spanish: conforme a su imagen
  alternatives_spanish:
  - a su imagen
  - en su imagen
  lexicon: LSJ
  rationale: La preposición κατά con acusativo expresa correspondencia. «Conforme a su imagen» preserva esa relación de conformidad y mantiene el eco de Génesis sin sustituirlo por una frase más interpretativa.
- source_word: ἐποίησεν
  english_pob_choice: made
  chosen_spanish: los hizo
  alternatives_spanish:
  - los creó
  - los formó
  lexicon: LSJ
  rationale: ποιέω es un verbo amplio, «hacer». «Los hizo» sigue de cerca el griego sin introducir el matiz más específico de «creó», que no es exigido por la forma verbal.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: LSJ
  rationale: El pronombre plural se refiere a la humanidad colectivamente. En español, el objeto directo plural se expresa naturalmente con «los».
theological_decisions:
- issue: Eco de la creación en κατ᾿ εἰκόνα αὐτοῦ
  english_pob_reading: according to his image
  chosen_spanish_reading: conforme a su imagen
  alternative_spanish_readings:
  - a su imagen
  - en su imagen
  rationale: La frase conserva el allusionamiento a la creación humana en relación con la imagen de Dios sin ampliar la afirmación más allá del texto. «Conforme a su imagen» mantiene el vínculo intertextual y, a la vez, refleja la estructura del griego.
  doctrine_reference: DOCTRINE.md §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue el testimonio griego de Swete 1909 y el audit trail inglés sin cambios sustantivos; se conserva la metáfora de vestir y el eco de Génesis en la expresión de la imagen.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en principio como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «fuerza» para ἰσχύν por claridad y naturalidad en español.
  - La nota[a] se ancla en «imagen» porque la alternativa relevante es preposicional, no léxica en sentido amplio.
