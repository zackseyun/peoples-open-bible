translation:
  language: es
  text: Son, en verdad, como una viga de una casa; pero dicen que se les van lamiendo los corazones[a]. Mientras los seres que se arrastran desde la tierra los devoran a ellos y también su ropa, no lo perciben.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se les va consumiendo el interior'. El griego dice 'sus corazones', conservando la imagen antropomórfica.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοκός
  english_pob_choice: beam
  chosen_spanish: viga
  alternatives_spanish:
  - madero
  - trabe
  lexicon: LSJ
  rationale: δοκός designa una pieza estructural de madera; 'viga' comunica mejor en español una madera de soporte de una casa que un simple palo o tronco.
- source_word: καρδίας
  english_pob_choice: hearts
  chosen_spanish: corazones
  alternatives_spanish:
  - interiores
  - entrañas
  - mente
  lexicon: LSJ
  rationale: Se conserva la imagen antropomórfica del griego. 'Corazones' mantiene la ironía del texto sobre ídolos de madera, sin neutralizarla con una paráfrasis interpretativa.
- source_word: ἐκλείχεσθαι
  english_pob_choice: are licked away
  chosen_spanish: son lamidos
  alternatives_spanish:
  - son lamidos y consumidos
  - son lamidos hasta desaparecer
  - son roídos
  lexicon: LSJ
  rationale: El verbo procede de λείχω, 'lamer'. 'Son lamidos' reproduce el gesto verbal básico sin añadir intensidad no explícita; en español conserva la extrañeza irónica del original.
- source_word: ἑρπετῶν
  english_pob_choice: creeping things
  chosen_spanish: cosas que reptan
  alternatives_spanish:
  - reptiles
  - seres que reptan
  - animales que reptan
  lexicon: LSJ
  rationale: ἑρπετά es más amplio que 'reptiles' en sentido taxonómico moderno. 'Cosas que reptan' preserva amplitud semántica y funciona en un contexto polémico bíblico.
- source_word: κατεσθιόντων
  english_pob_choice: devour
  chosen_spanish: devoran
  alternatives_spanish:
  - se comen
  - consumen
  - devoran por completo
  lexicon: LSJ
  rationale: '''Devoran'' conserva la fuerza del participio de consumo activo y encaja con el registro bíblico sin exagerar más allá del griego.'
- source_word: ἱματισμόν
  english_pob_choice: clothing
  chosen_spanish: ropa
  alternatives_spanish:
  - vestiduras
  - vestimenta
  - ropaje
  lexicon: LSJ
  rationale: '''Ropa'' es el equivalente natural y claro en español moderno; el término griego abarca aquello que cubre a las figuras, no requiere un término litúrgico.'
- source_word: οὐκ αἰσθάνονται
  english_pob_choice: they do not perceive it
  chosen_spanish: no lo perciben
  alternatives_spanish:
  - no se dan cuenta
  - no lo notan
  - no lo sienten
  lexicon: LSJ
  rationale: '''Percibir'' conserva el matiz sensorial de αἰσθάνομαι mejor que una simple negación de conocimiento; el pronombre ''lo'' refiere a lo que les sucede en la frase.'
theological_decisions:
- issue: Referente de los pronombres finales
  english_pob_reading: 'The idols themselves are the subject throughout: crawling things consume them and their clothing, and the idols do not perceive it.'
  chosen_spanish_reading: 'Los ídolos son el sujeto implícito de toda la oración: las cosas que reptan los devoran a ellos y su ropa, y ellos no lo perciben.'
  alternative_spanish_readings:
  - Los adoradores no lo perciben
  - no perciben que los devoran
  rationale: El contexto inmediato es una burla sostenida contra los ídolos como objetos sin sentido; por eso se mantiene a los ídolos como referentes de los pronombres, no a los adoradores.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Imagen de los 'corazones' de los ídolos
  english_pob_reading: Retain the anthropomorphic term 'hearts' in the main text.
  chosen_spanish_reading: Mantener 'corazones' en el texto principal.
  alternative_spanish_readings:
  - interiores
  - entrañas
  rationale: 'La imagen antropomórfica forma parte de la sátira: objetos de madera tratados como si tuvieran vida interior. Traducirlo como ''interiores'' suavizaría la fuerza retórica del griego.'
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente del inglés POB, que prefirió ''are licked away'' frente a ''are licked clean away'' para no añadir énfasis inexistente en el griego. Por eso elegí ''son lamidos'' y evité intensificadores como ''completamente'' o ''hasta desaparecer''. También mantuve la lectura revisada de la escena: ídolos como sujetos mudos, consumidos por criaturas que reptan, sin percibir lo que ocurre.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque no aparece aquí el Tetragrámaton ni una cita directa del nombre divino.
  - Se prefirió 'corazones' para conservar la ironía antropomórfica documentada en el audit trail.
  - '''Cosas que reptan'' se usó por amplitud semántica; no se redujo a ''reptiles'' por tratarse de ἑρπετά en sentido amplio.'
  - Se mantuvo un registro bíblico claro pero en español moderno, sin depender de formulaciones tradicionales si no eran necesarias.
