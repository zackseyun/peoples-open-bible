base_translation:
  language: en
  yaml_path: translation/ot/daniel/011/020.yaml
  text: Then one will arise in his place who will send an exactor through the splendor of the kingdom[a]; but within a few days he will be broken[c][b], though not in anger and not in battle.
  footnotes:
  - marker: a
    text: Or 'a tax collector' or 'an oppressor' for 'an exactor.' The Hebrew term denotes one who exacts tribute or payment.
    reason: lexical_alternative
  - marker: b
    text: Or 'the glory of the kingdom.' The phrase may refer to the most splendid part of the realm or to the kingdom's majesty more generally.
    reason: lexical_alternative
  - marker: c
    text: Or 'but not in anger' or 'not by wrath.' The Hebrew expression is somewhat compressed.
    reason: lexical_alternative
