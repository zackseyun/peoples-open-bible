source:
  edition: SBLGNT
  text: ἡγίασται γὰρ ὁ ἀνὴρ ὁ ἄπιστος ἐν τῇ γυναικί, καὶ ἡγίασται ἡ γυνὴ ἡ ἄπιστος ἐν τῷ ⸀ἀδελφῷ· ἐπεὶ ἄρα τὰ τέκνα ὑμῶν ἀκάθαρτά ἐστιν, νῦν δὲ ἅγιά ἐστιν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/007/014.yaml
  text: For the unbelieving husband has been made holy through his wife[a], and the unbelieving wife has been made holy through the brother; otherwise your children are unclean, but as it is[b], they are holy.
  footnotes:
  - marker: a
    text: 'Or, ''through the believing husband.'' Greek: ''through the brother,'' likely using ''brother'' in Paul''s customary sense for a fellow believer.'
    reason: lexical_alternative
  - marker: b
    text: '''Has been made holy'' here refers to a set-apart or consecrated status in relation to the believing spouse and the family, not necessarily to personal salvation.'
    reason: cultural_note
translation:
  language: ko
  text: 이는 믿지 않는 남편이 아내로 인해 거룩하게 되었고, 믿지 않는 아내도 그 형제로 인해 거룩하게 되었기 때문입니다. 그렇지 않다면 여러분의 자녀가 부정한 것이 될 것이나, 이제는 거룩합니다.
  philosophy: optimal-equivalence
