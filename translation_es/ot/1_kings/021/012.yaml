translation:
  language: es
  text: Proclamaron un ayuno y sentaron a Nabot al frente del pueblo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante el pueblo» o «en el lugar más prominente entre el pueblo». La expresión hebrea dice literalmente «en la cabeza del pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְאוּ
  english_pob_choice: They proclaimed
  chosen_spanish: Proclamaron
  alternatives_spanish:
  - Convocaron
  - Anunciaron
  lexicon: HALOT
  rationale: El verbo aquí rige 'ayuno' como algo que se hace público; en español, 'proclamar' conserva bien el carácter oficial y público de la acción, como en la elección inglesa.
- source_word: צ֑וֹם
  english_pob_choice: a fast
  chosen_spanish: un ayuno
  alternatives_spanish:
  - ayuno
  - una abstinencia
  lexicon: HALOT
  rationale: El sustantivo denota un ayuno formal o declarado; 'un ayuno' mantiene el sentido de una práctica concreta e institucional, no solo el proceso general de ayunar.
- source_word: וְהֹשִׁ֥יבוּ
  english_pob_choice: and seated
  chosen_spanish: y sentaron
  alternatives_spanish:
  - y colocaron
  - y pusieron
  lexicon: HALOT
  rationale: La forma causativa indica hacer que alguien se siente o situarlo en un puesto. 'Sentaron' reproduce la imagen de manera natural en español sin perder la idea de colocar a Nabot en una posición determinada.
- source_word: אֶת נָב֖וֹת
  english_pob_choice: Naboth
  chosen_spanish: a Nabot
  alternatives_spanish:
  - a Naboth
  lexicon: HALOT
  rationale: אֶת marca el objeto directo; en español se expresa con la preposición 'a'. Se mantiene el nombre propio con transliteración estándar en español bíblico.
- source_word: בְּרֹ֥אשׁ
  english_pob_choice: at the head of
  chosen_spanish: en cabeza de
  alternatives_spanish:
  - al frente de
  - delante de
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice 'en la cabeza de'. 'En cabeza de' conserva la imagen corporal y espacial del original mejor que una paráfrasis más interpretativa, y sigue siendo comprensible en español.
- source_word: הָעָֽם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la asamblea
  lexicon: HALOT
  rationale: עַם puede referirse al pueblo reunido o a la multitud presente. 'El pueblo' es la forma más directa y suficientemente amplia en este contexto de proclamación pública y juicio.
translation_notes:
  revision_awareness: Se siguió el testimonio hebreo WLC y el hilo de decisiones de la POB inglesa; no hay revisiones aplicadas y el acuerdo de auditoría es alto.
  spanish_consistency_notes:
  - Se preservó la imagen hebrea de 'cabeza' en lugar de suavizarla a 'delante de', porque la nota ya documenta la alternativa interpretativa.
  - Se usó 'ayuno' como sustantivo concreto, coherente con el valor institucional del acto público.
  - '''Nabot'' sigue la transliteración habitual en español bíblico y mantiene la referencia inequívoca al personaje.'
