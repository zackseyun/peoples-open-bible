translation:
  language: es
  text: Porque aunque tu pueblo, Israel, sea como la arena del mar, solo un remanente de ellos[a] volverá. Una destrucción decretada,[b] desbordante de rectitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «solo un remanente en él volverá»; el pronombre hebreo es singular y se refiere al pueblo como colectividad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Una destrucción decretada, desbordante de justicia».'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: For though
  chosen_spanish: Porque aunque
  alternatives_spanish:
  - Porque si
  - Aunque
  lexicon: HALOT
  rationale: La construcción introduce un matiz concesivo más que una condición simple. «Porque aunque» conserva el enlace discursivo y la oposición entre la multitud de Israel y la supervivencia de un remanente.
- source_word: עַמְּךָ יִשְׂרָאֵל
  english_pob_choice: your people, Israel
  chosen_spanish: tu pueblo, Israel
  alternatives_spanish:
  - tu pueblo Israel
  lexicon: HALOT
  rationale: Se conserva el posesivo de segunda persona y la aposición con el nombre propio. La coma facilita la lectura natural en español sin alterar la relación sintáctica.
- source_word: כְּחוֹל הַיָּם
  english_pob_choice: like the sand of the sea
  chosen_spanish: como la arena del mar
  alternatives_spanish:
  - como la arena del mar
  - como la arena de la mar
  lexicon: HALOT
  rationale: La imagen idiomática se expresa de manera natural en español con «arena del mar», manteniendo el valor de multitud innumerable.
- source_word: שְׁאָר
  english_pob_choice: a remnant
  chosen_spanish: un remanente
  alternatives_spanish:
  - el remanente
  - solo un remanente
  lexicon: HALOT
  rationale: «Remanente» comunica bien el resto sobreviviente sin añadir más de lo que el sustantivo hebreo exige. El carácter exclusivo queda sugerido por el contexto y el verbo singular posterior.
- source_word: יָשׁוּב
  english_pob_choice: will return
  chosen_spanish: volverá
  alternatives_spanish:
  - regresará
  - se volverá
  lexicon: HALOT
  rationale: El verbo שוב puede ser «volver/retornar» y también «arrepentirse» según contexto. Aquí, como en la auditoría inglesa, conviene mantener el sentido de regreso sin resolverlo como arrepentimiento interior.
- source_word: בּוֹ
  english_pob_choice: of them
  chosen_spanish: de él
  alternatives_spanish:
  - en él
  - de ellos
  lexicon: HALOT
  rationale: Aunque el pronombre es singular, en hebreo remite al colectivo «pueblo». En español puede conservarse la singularidad con «de él», dejando visible la tensión textual; la nota explica la alternativa partitiva.
- source_word: כִּלָּיוֹן
  english_pob_choice: destruction
  chosen_spanish: una destrucción
  alternatives_spanish:
  - un consumo
  - una aniquilación
  lexicon: HALOT
  rationale: «Destrucción» es claro y no fuerza la idea a una aniquilación total. El artículo indefinido respeta la construcción nominal del hebreo y el contraste con el remanente.
- source_word: חָרוּץ
  english_pob_choice: is decreed
  chosen_spanish: está decretada
  alternatives_spanish:
  - está determinada
  - está decidida
  lexicon: HALOT
  rationale: El participio comunica una decisión firme y judicial. «Está decretada» preserva ese carácter establecido y resonante con lenguaje profético-jurídico.
- source_word: שׁוֹטֵף
  english_pob_choice: overflowing
  chosen_spanish: que se desborda
  alternatives_spanish:
  - que fluye
  - que inunda
  lexicon: HALOT
  rationale: La imagen es de un derrame o inundación. «Que se desborda» reproduce el movimiento metafórico con naturalidad en español.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia
  lexicon: HALOT
  rationale: En este contexto profético, «justicia» comunica mejor el matiz judicial/moral del juicio decretado. Se preserva así la alternativa válida que la traducción inglesa dejó abierta entre «righteousness» y «justice».
theological_decisions:
- issue: Sentido del «volverá» del remanente
  english_pob_reading: physical/national return with theological resonance, rendered simply as 'will return'
  chosen_spanish_reading: regreso físico/nacional con resonancia teológica, expresado simplemente como «volverá»
  alternative_spanish_readings:
  - arrepentirse
  - regresará del exilio
  rationale: El hebreo permite un alcance amplio. Se conserva la tensión profética sin reducir el verbo a un acto meramente interior ni restringirlo a un evento histórico único.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla de forma prematura.
- issue: Valor de צְדָקָה en la cláusula final
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: Ambas opciones son defendibles. Aquí se elige «justicia» por su claridad en español y por el tono judicial del contexto, sin negar la cercanía semántica con «rectitud» o «justicia» en sentido moral.
  doctrine_reference: Mantener opciones semánticas abiertas cuando el texto las admite.
translation_notes:
  revision_awareness: 'La redacción sigue el consenso alto del control cruzado y conserva las tensiones ya documentadas en la auditoría inglesa: el matiz concesivo de כִּי אִם, el pronombre singular colectivo en בּוֹ, y la alternativa final entre justicia/rectitud. No se introdujeron cambios de fondo respecto de la revisión más reciente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto; en este versículo no aparece el Tetragrámaton.
  - «Remanente» y «volverá» conservan el lenguaje remanente de Isaías sin convertirlo en una paráfrasis de arrepentimiento.
  - La puntuación busca reflejar la aposición de «Israel» y la cadencia profética del hebreo sin calco rígido.
  - Se usó «justicia» en el texto principal y se preservó la alternativa «rectitud» en la nota para no perder la tensión léxica documentada.
