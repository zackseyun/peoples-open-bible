- from: Como vivo[a], declara el Señor Yahvé, ciertamente con mano fuerte, con brazo extendido y con furor derramado, reinaré sobre ustedes.
  to: Como vivo[a], declara el Señor Dios, Yahvé, ciertamente con mano fuerte, con brazo extendido y con furor derramado, reinaré[b] sobre ustedes.
  rationale: Se ajusta la representación de אֲדֹנָי יְהוִה para lograr un español más natural y a la vez preservar explícitamente «Yahvé» conforme al proyecto. Se mantiene el resto de la sintaxis e imaginería del borrador, y se añade la nota sobre «reinaré» para reflejar mejor la decisión lexical documentada en el audit trail inglés.
