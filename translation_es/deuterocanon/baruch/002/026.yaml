translation:
  language: es
  text: Y dejaste la casa sobre la cual fue llamado tu nombre[a], tal como está hoy, a causa de la maldad de la casa de Israel y de la casa de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «la casa que lleva tu nombre». El griego usa una fórmula semítica, literalmente «la casa sobre la cual fue llamado tu nombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθηκας
  english_pob_choice: you made
  chosen_spanish: pusiste
  alternatives_spanish:
  - hiciste
  - convertiste
  - dejaste
  lexicon: LSJ
  rationale: El aoristo de τίθημι aquí expresa una acción causante que lleva a la casa a su estado presente. En español, «pusiste» conserva la fuerza del acto realizado sin sobreespecificar el mecanismo y mantiene mejor la relación con la imagen de un estado resultante.
- source_word: τὸν οἶκον
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: LSJ
  rationale: «Casa» reproduce con mayor fidelidad el sustantivo griego y preserva el lenguaje bíblico-covenantal. Aunque el referente es el templo, traducir directamente «templo» eliminaría la formulación textual del original.
- source_word: οὗ ἐπεκλήθη τὸ ὄνομά σου ἐπ᾽ αὐτῷ
  english_pob_choice: over which your name was called
  chosen_spanish: sobre la cual fue llamado tu nombre
  alternatives_spanish:
  - que lleva tu nombre
  - sobre la cual se invocó tu nombre
  - sobre la cual fue llamado tu nombre sobre ella
  lexicon: LSJ
  rationale: El griego conserva una fórmula semítica de pertenencia o consagración. En español, «fue llamado tu nombre» mantiene esa estructura formal sin introducir una paráfrasis más interpretativa como «lleva tu nombre». Se omite el equivalente redundante de ἐπ᾽ αὐτῷ porque el español ya expresa la relación con «sobre la cual».
- source_word: ὡς ἡ ἡμέρα αὕτη
  english_pob_choice: as it is this day
  chosen_spanish: tal como está hoy
  alternatives_spanish:
  - como en este día
  - así como está hasta hoy
  lexicon: LSJ
  rationale: La frase es un modismo bíblico que señala el estado actual visible. «Tal como está hoy» transmite la idiomaticidad en español natural y conserva la referencia al presente sin volverlo explicativo en exceso.
- source_word: διὰ
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  - a causa de la
  lexicon: LSJ
  rationale: El valor causal del griego encaja bien con «a causa de», que expresa con claridad la relación entre la condición actual y la culpa mencionada.
- source_word: πονηρίαν
  english_pob_choice: wickedness
  chosen_spanish: perversidad
  alternatives_spanish:
  - maldad
  - maldad perversa
  - maldad moral
  lexicon: LSJ
  rationale: En este contexto penitencial, el término apunta a corrupción moral grave. «Perversidad» comunica esa intensidad en español sin diluirla en un término demasiado general como «maldad».
- source_word: οἴκου Ἰσραὴλ καὶ οἴκου Ἰούδα
  english_pob_choice: the house of Israel and the house of Judah
  chosen_spanish: la casa de Israel y de la casa de Judá
  alternatives_spanish:
  - la casa de Israel y la casa de Judá
  - Israel y Judá
  - la casa de Israel y Judá
  lexicon: LSJ
  rationale: Se conserva la fórmula corporativa «casa de» para reflejar el lenguaje de alianza del original. La repetición de «casa» en español mantiene la simetría del griego y evita reducir la expresión a una simple designación étnica.
theological_decisions:
- issue: Sentido de la «casa» y del nombre divino
  english_pob_reading: The verse refers to the Jerusalem temple as the house marked by God's name, now brought to its present condition because of covenant people's wickedness.
  chosen_spanish_reading: El versículo se refiere al templo de Jerusalén como la casa marcada por el nombre de Dios, ahora en su condición presente a causa de la perversidad del pueblo del pacto.
  alternative_spanish_readings:
  - El versículo se refiere al templo como la casa que lleva el nombre de Dios.
  - El versículo alude a la casa de Dios sin precisar el templo de Jerusalén.
  rationale: No hay un conflicto doctrinal mayor, pero la fórmula del nombre tiene peso teológico sobre pertenencia y consagración. Mantener «la casa» y «fue llamado tu nombre» preserva esa tensión sin resolverla en una paráfrasis más lisa.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve theological tension rather than smooth it out.'
translation_notes:
  revision_awareness: La redacción sigue el sentido del griego Swete 1909 y el flujo auditado de la POB en inglés, pero adapta la sintaxis al español natural. En particular, se evita el calco redundante de ἐπ᾽ αὐτῷ y se preserva la fórmula semítica del nombre sin convertirla en una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se usa «casa» de manera consistente para οἶκος, no «templo», para conservar la imagen textual y el lenguaje bíblico.
  - Se usa «Yahvé» cuando aparezca el tetragrámaton; en este versículo no aparece.
  - «Perversidad» se eligió por su fuerza moral y por coherencia con un contexto de confesión penitencial.
  - La construcción «la casa de Israel y de la casa de Judá» mantiene la repetición corporativa presente en el griego.
