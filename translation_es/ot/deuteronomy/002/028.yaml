review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: venta de comida y provisión de agua mediante pago, con cláusulas de finalidad (''para que yo coma... beba'') y una petición limitada de tránsito. Sin embargo, ''Tú venderás comida'' no representa bien תַּשְׁבִּרֵנִי, que incluye el pronombre de objeto de primera persona; en español debe expresarse ''me venderás'' o equivalente. También conviene mantener el matiz concreto de ''plata'' y la idiomaticidad de ''a pie''.'
  spanish_quality_summary: 'El español es claro y legible, pero suena algo rígido por el uso enfático de ''Tú venderás'' y ''me darás'' en paralelo. La frase mejora con ''me venderás comida... y me darás agua...''. ''Sólo déjame pasar a pie'' es natural; puede escribirse ''solo'' según norma actual, pero ''sólo'' sigue siendo comprensible y digna. La nota b necesita mejor formulación literal: ''sobre mis pies'' suena menos natural que ''en mis pies'' o ''sobre mis propios pies'', pero la opción idiomática principal ''a pie'' es correcta.'
  glossary_alignment: 'No hay términos del glosario teológicamente sensibles aquí. Las decisiones ''comida'', ''agua'', ''plata'' y ''a pie'' concuerdan con el rastro léxico del POB. La principal desviación está en la representación verbal de תַּשְׁבִּרֵנִי: el español debe incluir el objeto ''me''.'
  issues:
  - severity: medium
    issue: Falta el objeto de primera persona en 'Tú venderás comida'.
    rationale: El hebreo תַּשְׁבִּרֵנִי significa 'me venderás / me venderás a mí' en el sentido de venderme comida. Omitir 'me' debilita la correspondencia con el sufijo pronominal y produce una frase menos natural en español.
  - severity: low
    issue: La nota b puede formular mejor la literalidad hebrea.
    rationale: El hebreo בְרַגְלָי es literalmente 'en/con/sobre mis pies'. La nota actual 'sobre mis pies' es posible, pero conviene indicar la literalidad de manera más neutral y cercana al expediente inglés.
  revised_spanish_text: Me venderás comida por plata[a], para que yo coma, y me darás agua por plata, para que yo beba; solo déjame pasar a pie[b].
  revised_footnotes:
  - marker: a
    text: O 'con plata'. El hebreo dice literalmente 'por/con la plata'.
    reason: lexical_alternative
  - marker: b
    text: O 'en mis pies'. El hebreo dice literalmente 'sobre/en mis pies'.
    reason: lexical_alternative
  revision_rationale: Se corrigió 'Tú venderás comida' a 'Me venderás comida' para reflejar el sufijo pronominal de primera persona en תַּשְׁבִּרֵנִי y mejorar la naturalidad del español. Se mantuvo 'por plata' por fidelidad al término concreto del hebreo. Se conservó 'a pie' como español idiomático, con una nota literal ajustada. También se eliminó el pronombre explícito 'Tú', innecesario en español y algo torpe en este contexto.
