translation:
  language: es
  text: 'Pilato les respondió otra vez[a]: «Entonces, ¿qué quieren que haga con el que ustedes llaman el rey de los judíos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con aquel a quien ustedes llaman el rey de los judíos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: El adverbio marca que Pilato retoma la palabra en la misma escena. «Otra vez» conserva la repetición de forma natural en español y mantiene el flujo discursivo.
- source_word: ἀποκριθεὶς ἔλεγεν
  english_pob_choice: answered ...
  chosen_spanish: les respondió
  alternatives_spanish:
  - respondió y dijo
  - respondía
  lexicon: BDAG
  rationale: La construcción participio + imperfecto es una fórmula narrativa semítica. En español, «les respondió» comunica la acción sin la rigidez de «respondió y decía», y el contexto ya expresa la continuación del discurso.
- source_word: Τί οὖν
  english_pob_choice: Then what
  chosen_spanish: Entonces, ¿qué
  alternatives_spanish:
  - ¿Qué entonces?
  - Así que, ¿qué
  lexicon: BDAG
  rationale: «οὖν» introduce consecuencia o inferencia. «Entonces» preserva esa relación lógica de modo claro y natural en español.
- source_word: θέλετε
  english_pob_choice: do you want
  chosen_spanish: quieren
  alternatives_spanish:
  - desean
  - querrían
  lexicon: BDAG
  rationale: Aquí θέλω expresa deseo o preferencia. El español directo «quieren» reproduce la petición dirigida al grupo con naturalidad.
- source_word: ποιήσω
  english_pob_choice: me to do
  chosen_spanish: que haga
  alternatives_spanish:
  - que yo haga
  - que deba hacer
  lexicon: BDAG
  rationale: 'Tras θέλετε, el aoristo subjuntivo se vierte naturalmente con una subordinada final/completiva en español: «que haga». Mantiene el sentido de acción solicitada sin añadir elementos ajenos al griego.'
- source_word: ὃν λέγετε
  english_pob_choice: the one you call
  chosen_spanish: el que ustedes llaman
  alternatives_spanish:
  - a quien ustedes llaman
  - el hombre a quien ustedes llaman
  lexicon: BDAG
  rationale: El relativo identifica a Jesús desde la atribución verbal de los interlocutores. «El que ustedes llaman» conserva la fuerza de λέγετε sin insertar un «es» explícito que el griego no tiene.
- source_word: τὸν βασιλέα τῶν Ἰουδαίων
  english_pob_choice: the king of the Jews
  chosen_spanish: el rey de los judíos
  alternatives_spanish:
  - el Rey de los judíos
  lexicon: BDAG
  rationale: Se mantiene el título histórico y polémico tal como aparece en la escena. La minúscula en «rey» refleja su uso descriptivo/político en boca de los presentes, no necesariamente una confesión cristológica.
theological_decisions:
- issue: Si la frase de Pilato debe sonar como aprobación personal o como cita distanciada del título dado por la multitud
  english_pob_reading: Rendered 'the one you call the king of the Jews' to keep the title within the crowd's attribution.
  chosen_spanish_reading: «el que ustedes llaman el rey de los judíos» mantiene el título dentro de la atribución de los interlocutores.
  alternative_spanish_readings:
  - «a quien ustedes llaman el Rey de los judíos»
  - «el rey de los judíos, como ustedes lo llaman»
  rationale: El relativo griego ὃν λέγετε coloca el énfasis en lo que «ustedes» dicen de él. La traducción conserva esa distancia retórica y no resuelve la tensión teológica sobre si Pilato reconoce o no tal realeza.
  doctrine_reference: Preservar la tensión narrativa y teológica sin armonizarla artificialmente.
translation_notes:
  revision_awareness: 'Alineado con la revisión más reciente, que no requirió cambios, y con el alto acuerdo entre evaluaciones. Se conserva la misma decisión central: mantener la distancia retórica de ὃν λέγετε y el título «rey de los judíos» sin capitalización litúrgica.'
  spanish_consistency_notes:
  - Se usa «Jesús» implícitamente en la referencia del título, pero el versículo no lo nombra explícitamente; por eso se conserva la formulación indirecta.
  - Se prefirió «otra vez» frente a «nuevamente» por mayor naturalidad narrativa en español.
  - Se mantiene «rey» en minúscula por corresponder al uso contextual del título en la escena, no a un nombre propio.
