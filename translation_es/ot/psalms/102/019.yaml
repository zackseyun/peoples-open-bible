translation:
  language: es
  text: Esto será escrito para una generación venidera, y un pueblo aún por ser creado alabará a Yah[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yah», forma poética breve del nombre divino; muchas versiones lo suavizan como «el SEÑOR».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּכָּתֶב
  english_pob_choice: will be written
  chosen_spanish: será escrito
  alternatives_spanish:
  - se escribirá
  - estará escrito
  lexicon: HALOT
  rationale: El nifal imperfecto de כתב expresa pasividad futura o modal. En español, «será escrito» conserva bien la voz pasiva y el valor prospectivo sin añadir interpretación.
- source_word: זֹאת
  english_pob_choice: This
  chosen_spanish: Esto
  alternatives_spanish:
  - Esta cosa
  - Este testimonio
  lexicon: HALOT
  rationale: El demostrativo remite al contenido previo del salmo. «Esto» reproduce la deixis de forma natural en español sin forzar un sustantivo explicativo.
- source_word: לְדוֹר אַחֲרוֹן
  english_pob_choice: for a generation to come
  chosen_spanish: para una generación venidera
  alternatives_spanish:
  - para una generación futura
  - para una generación posterior
  lexicon: HALOT
  rationale: דור conserva el sentido de «generación» y אחרון aquí es temporal, no escatológico. «Venidera» expresa la orientación futura de manera idiomática.
- source_word: וְעַם
  english_pob_choice: and a people
  chosen_spanish: y un pueblo
  alternatives_spanish:
  - y un pueblo cualquiera
  - y una nación
  lexicon: HALOT
  rationale: עַם suele significar «pueblo». El artículo indefinido no identifica a un pueblo concreto, así que «un pueblo» mantiene ese valor abierto.
- source_word: נִבְרָא
  english_pob_choice: yet to be created
  chosen_spanish: aún por ser creado
  alternatives_spanish:
  - todavía no creado
  - por crear
  lexicon: HALOT
  rationale: La forma pasiva de ברא señala un pueblo todavía no existente. «Aún por ser creado» conserva la perspectiva prospectiva y evita un calco demasiado rígido.
- source_word: יְהַלֶּל
  english_pob_choice: will praise
  chosen_spanish: alabará
  alternatives_spanish:
  - pregonará la alabanza de
  - loará
  lexicon: HALOT
  rationale: הלל en piel es «alabar». «Alabará» es el equivalente natural en español y mantiene el futuro del verbo del paralelismo.
- source_word: יָהּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: El hebreo usa la forma breve poética del nombre divino, no יהוה. «Yah» preserva esa distinción y evita borrar una diferencia lexical documentada.
theological_decisions:
- issue: Nombre divino breve יָהּ
  english_pob_reading: Yah
  chosen_spanish_reading: Yah
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: La tradición POB distingue la forma breve poética יָהּ del nombre completo יהוה. Mantener «Yah» en el texto español conserva la tensión lexical y la fuerza poética del hebreo.
  doctrine_reference: Primacía del idioma original; distinción entre el nombre abreviado יָהּ y יהוה sin colapsarlos en una sola forma tradicional.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones últimas; se mantuvo el acuerdo alto entre evaluación y traducción. La versión española sigue esa línea, preservando la distinción de יָהּ y el sentido prospectivo de las dos cláusulas futuras.
  spanish_consistency_notes:
  - Se mantuvo «Yah» para יָהּ, en paralelo con la política POB de no ocultar formas breves del nombre divino.
  - «Generación venidera» y «pueblo aún por ser creado» conservan el orden y la progresión temporal del hebreo.
  - Se usó un español bíblico moderno, evitando arcaísmos innecesarios como «shall» o «loará».
