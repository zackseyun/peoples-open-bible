translation:
  language: es
  text: Para el director musical; según Jedutún[a]. Salmo de David[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para Jedutún» o «a Jedutún»; la preposición hebrea puede indicar distintas clases de asociación en los encabezados de salmos.
    reason: alternative_reading
  - marker: b
    text: O «por David»; el encabezado hebreo dice más literalmente «de David» y puede indicar autoría o asociación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director musical
  alternatives_spanish:
  - Para el director del coro
  - Para el maestro de canto
  - Para el principal músico
  lexicon: HALOT
  rationale: En los encabezados de salmos, la expresión señala al responsable de la ejecución musical o litúrgica. «Director musical» comunica bien esa función en español moderno sin introducir una terminología eclesiástica más cargada que el hebreo no exige.
- source_word: לִידוּתוּן
  english_pob_choice: according to Jeduthun
  chosen_spanish: según Jedutún
  alternatives_spanish:
  - para Jedutún
  - a Jedutún
  - de acuerdo con Jedutún
  lexicon: HALOT
  rationale: La preposición ל en estos encabezados puede indicar asociación, dedicación o relación con una melodía/estilo. «Según» preserva esa ambigüedad funcional sin afirmar más de lo que permite el hebreo.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canto
  - Poema
  - Melodía
  lexicon: HALOT
  rationale: Es el equivalente establecido y natural para el género poético-musical מִזְמוֹר. En español, «Salmo» mantiene tanto la forma literaria como la función devocional del término.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: «De David» conserva la amplitud semántica del hebreo, que puede señalar autoría, asociación o dedicación. Evita precisar indebidamente una sola relación.
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo con la revisión más reciente y no requiere cambios sustanciales; la redacción española sigue de cerca la estructura del encabezado hebreo y el criterio auditado del POB en inglés.
  spanish_consistency_notes:
  - Se mantuvo «Jedutún» como transliteración estable del nombre propio.
  - Se prefirió «director musical» frente a opciones más eclesiásticas como «maestro de coro» para conservar un registro claro y neutral.
  - Se usó «Salmo» con mayúscula inicial por tratarse del encabezado del género/título de la composición.
  - Se conservó la ambigüedad de לְדָוִד con «de David» sin resolverla en favor de autoría exclusiva.
