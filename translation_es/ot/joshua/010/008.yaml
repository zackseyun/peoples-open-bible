translation:
  language: es
  text: 'Yahvé dijo a Josué: «No temas a ellos, porque en tu mano los he entregado. Ningún hombre de ellos podrá mantenerse[a] delante de ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mantenerse» traduce el valor de resistir o sostenerse en pie ante Josué, conservando la imagen del hebreo «estar en pie» en contexto militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El hebreo usa el nombre propio divino, no un título. En español, la forma proyectada por la política del proyecto es «Yahvé», que preserva el nombre del pacto y evita la sustitución por un título.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: La forma narrativa introduce discurso directo; «dijo» es la equivalencia natural y precisa en español moderno.
- source_word: אַל תִּירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  lexicon: HALOT
  rationale: El prohibitivo de ירא se expresa de modo conciso con «No temas», que conserva el tono directo y solemne del hebreo.
- source_word: מֵהֶם
  english_pob_choice: them
  chosen_spanish: a ellos
  alternatives_spanish:
  - de ellos
  lexicon: HALOT
  rationale: Aunque la preposición hebrea marca el objeto/fuente del temor, en español la construcción natural con el verbo temer es «temer a». Por eso se expresa como «a ellos» para mantener la fuerza idiomática.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce el fundamento de la exhortación; «porque» comunica claramente la relación causal en español.
- source_word: בְיָדְךָ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu poder
  - en tu control
  lexicon: HALOT
  rationale: La imagen hebrea de entregar «en la mano» se conserva literalmente. En español bíblico, «en tu mano» mantiene la metáfora de poder y entrega sin perder inteligibilidad.
- source_word: נְתַתִּים
  english_pob_choice: I have given them
  chosen_spanish: los he entregado
  alternatives_spanish:
  - los he dado
  - los he puesto
  lexicon: HALOT
  rationale: En contexto militar, נָתַן con este complemento idiomático significa entregar/someter a poder ajeno. «He entregado» comunica mejor esa fuerza que un simple «he dado», sin borrar la imagen de dominio.
- source_word: לֹא יַעֲמֹד אִישׁ מֵהֶם
  english_pob_choice: Not a man among them will stand
  chosen_spanish: Ningún hombre de ellos podrá mantenerse
  alternatives_spanish:
  - Ninguno de ellos podrá resistir
  - No se mantendrá hombre alguno de ellos
  lexicon: HALOT
  rationale: Se conserva el singular masculino אִישׁ como «hombre», siguiendo la lectura de fuerza militar y la política de exactitud de género. «Podrá mantenerse» transmite el valor de יַעֲמֹד en el contexto de resistencia/contención ante Josué.
- source_word: בְּפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - frente a ti
  lexicon: HALOT
  rationale: En contexto militar, la locución indica sostenerse en presencia de alguien para resistirle. «Delante de ti» suena natural en español y conserva la imagen espacial del hebreo.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La traducción española adopta «Yahvé» para preservar el nombre del pacto y mantener coherencia con la política del proyecto, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lectura de יַעֲמֹד אִישׁ en contexto bélico
  english_pob_reading: Not a man among them will stand
  chosen_spanish_reading: Ningún hombre de ellos podrá mantenerse
  alternative_spanish_readings:
  - Ninguno de ellos podrá mantenerse
  - No resistirá ninguno de ellos
  rationale: El singular אִישׁ se conserva como «hombre» porque el contexto habla de combatientes enemigos varones; no se neutraliza a «nadie» para no borrar el matiz del hebreo y la decisión auditada del POB inglés.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'El borrador coincide con el criterio auditado del POB inglés y con la revisión más reciente: no se requieren cambios textuales adicionales respecto del sentido fuente. Se ha adaptado la idiomaticidad al español sin perder la metáfora hebrea de la mano y el estar-en-pie.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política terminológica del proyecto.
  - Se conserva la metáfora «en tu mano» para la entrega divina, en lugar de desactivarla como mero poder abstracto.
  - Se preserva el masculino singular «hombre» en concordancia con la decisión auditada sobre אִישׁ en contexto militar.
  - La puntuación de discurso directo sigue las normas del español y el tono bíblico sobrio.
