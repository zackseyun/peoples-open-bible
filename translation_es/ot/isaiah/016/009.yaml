  text: עַל כֵּ֡ן אֶבְכֶּ֞ה בִּ/בְכִ֤י יַעְזֵר֙ גֶּ֣פֶן שִׂבְמָ֔ה אֲרַיָּ֨וֶ/ךְ֙ דִּמְעָתִ֔/י חֶשְׁבּ֖וֹן וְ/אֶלְעָלֵ֑ה כִּ֧י עַל קֵיצֵ֛/ךְ וְ/עַל קְצִירֵ֖/ךְ הֵידָ֥ד נָפָֽל־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/016/009.yaml
  text: Therefore I weep with the weeping of Jazer for the vine of Sibmah[a]; I drench you with my tears, Heshbon and Elealeh[b], because over your summer fruit and over your harvest the battle shout has fallen.
  footnotes:
  - marker: a
    text: Or 'I water you with my tears.' The verb conveys saturating or drenching.
    reason: lexical_alternative
  - marker: b
    text: '''The shout has fallen'' may refer either to an invading battle cry falling upon the harvest or, by implication, to the joyful harvest shout having ceased.'
    reason: alternative_reading
