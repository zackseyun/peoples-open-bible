translation:
  language: es
  text: Un día de oscuridad y tinieblas, un día de nubes y densa oscuridad; como el alba[a] extendida sobre los montes, viene un pueblo[b] grande y poderoso. Nada como este ha habido desde tiempos antiguos, ni después de esto volverá a haberlo[c], por los años de generación en generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como la oscuridad extendida sobre los montes», si שַׁחַר se toma en un sentido menos común; más probablemente «como el alba», conforme al uso normal del hebreo y a la imagen de algo que se extiende con rapidez sobre las colinas.
    reason: lexical_alternative
  - marker: b
    text: «Un pueblo grande y poderoso» puede referirse a una plaga de langostas descrita en términos militares, a un ejército invasor, o a una imagen profética deliberadamente mezclada.
    reason: alternative_reading
  - marker: c
    text: 'Literalmente: «hasta los años de generación y generación», un modismo para una sucesión indefinida de generaciones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: י֧וֹם
  english_pob_choice: day
  chosen_spanish: día
  alternatives_spanish:
  - tiempo
  lexicon: HALOT
  rationale: Se conserva el sustantivo temporal básico y la repetición poética de «día» en ambas apariciones.
- source_word: חֹ֣שֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  lexicon: HALOT
  rationale: «Oscuridad» expresa bien la falta de luz y permite distinguirlo del segundo término intensificador.
- source_word: וַ/אֲפֵלָ֗ה
  english_pob_choice: gloom
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad profunda
  - penumbra
  lexicon: HALOT
  rationale: Se eligió «tinieblas» para intensificar naturalmente la primera palabra y mantener la pareja semítica de oscuridad reforzada.
- source_word: עָנָן֙
  english_pob_choice: clouds
  chosen_spanish: nubes
  alternatives_spanish:
  - nube
  lexicon: HALOT
  rationale: El plural es natural en español en descripciones atmosféricas y armoniza con el cuadro poético.
- source_word: וַ/עֲרָפֶ֔ל
  english_pob_choice: thick darkness
  chosen_spanish: densas tinieblas
  alternatives_spanish:
  - oscuro nubarrón
  - nube espesa
  lexicon: HALOT
  rationale: La expresión intenta conservar la densidad y el carácter obscurante del término sin perder fluidez en español.
- source_word: כְּ/שַׁ֖חַר
  english_pob_choice: like dawn
  chosen_spanish: como el alba
  alternatives_spanish:
  - como la aurora
  - como la oscuridad
  lexicon: HALOT
  rationale: Se sigue la lectura más común de שַׁחַר como inicio del día; «alba» es idiomático y digno en español.
- source_word: פָּרֻ֣שׂ
  english_pob_choice: spread
  chosen_spanish: extendida
  alternatives_spanish:
  - esparcida
  - tendida
  lexicon: HALOT
  rationale: El participio pasivo se vierte con un adjetivo verbal que conserva la imagen de algo que se despliega sobre el relieve.
- source_word: עַל הֶֽ/הָרִים
  english_pob_choice: over the mountains
  chosen_spanish: sobre los montes
  alternatives_spanish:
  - sobre las montañas
  - por encima de los montes
  lexicon: HALOT
  rationale: «Montes» mantiene un tono poético y bíblico sin sacrificar claridad.
- source_word: עַ֚ם
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  - ejército
  lexicon: HALOT
  rationale: Se preserva el valor genérico del sustantivo sin cerrarlo a «ejército», ya que el texto no lo especifica.
- source_word: רַ֣ב
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - numeroso
  - mucho
  lexicon: HALOT
  rationale: «Grande» mantiene la pareja natural con «fuerte» y puede sugerir tanto magnitud como multitud.
- source_word: וְ/עָצ֔וּם
  english_pob_choice: mighty
  chosen_spanish: fuerte
  alternatives_spanish:
  - poderoso
  - firme
  lexicon: HALOT
  rationale: «Fuerte» comunica vigor y capacidad formidable en un español claro y sobrio.
- source_word: כָּמֹ֗/הוּ
  english_pob_choice: like it
  chosen_spanish: como él
  alternatives_spanish:
  - como este
  - como eso
  lexicon: HALOT
  rationale: Se conserva la referencia pronominal colectiva/impersonal con una forma breve y natural; no se resuelve el referente más allá de lo que el hebreo permite.
- source_word: לֹ֤א נִֽהְיָה֙ מִן הָ֣/עוֹלָ֔ם
  english_pob_choice: has ever been from of old
  chosen_spanish: no ha habido desde los tiempos antiguos
  alternatives_spanish:
  - nunca ha ocurrido desde la antigüedad
  - no ha existido desde la eternidad
  lexicon: HALOT
  rationale: «Desde los tiempos antiguos» refleja el sentido temporal de עוֹלָם aquí, no una eternidad metafísica.
- source_word: וְ/אַֽחֲרָי/ו֙ לֹ֣א יוֹסֵ֔ף
  english_pob_choice: after it there will not again be any
  chosen_spanish: ni después de él habrá otro
  alternatives_spanish:
  - ni después de ello se repetirá
  - ni después de él volverá a haber
  lexicon: HALOT
  rationale: Se vierte el idiomático hebreo de no repetición con una fórmula natural que preserve la idea de que no se añadirá otro igual.
- source_word: עַד שְׁנֵ֖י דּ֥וֹר וָ/דֽוֹר
  english_pob_choice: through the years of generation after generation
  chosen_spanish: por los años de generación en generación
  alternatives_spanish:
  - hasta los años de generación y generación
  - a través de generaciones y generaciones
  lexicon: HALOT
  rationale: Se mantiene la referencia a «años» y la fórmula idiomática de sucesión indefinida de generaciones.
theological_decisions:
- issue: Identidad del «pueblo grande y fuerte»
  english_pob_reading: Render generically as 'a great and mighty people' without specifying whether they are locusts, a human army, or a blended prophetic image.
  chosen_spanish_reading: Traducir genéricamente como «un pueblo grande y fuerte» sin especificar si son langostas, un ejército humano o una imagen profética combinada.
  alternative_spanish_readings:
  - una langosta grande y fuerte
  - un ejército grande y fuerte
  - una multitud grande y fuerte
  rationale: El hebreo dice «pueblo» y el contexto no resuelve del todo la imagen; mantener la ambigüedad evita cerrar indebidamente la interpretación.
  doctrine_reference: Preservar la tensión interpretativa del texto.
translation_notes:
  revision_awareness: Coincide con la última pasada de revisión indicada como sin cambios necesarios; se mantuvo la tensión interpretativa sobre כָּמֹהוּ y sobre el referente de «pueblo», y se siguió la lectura más probable de שַׁחַר como «alba».
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantuvo «pueblo» en vez de «ejército» para no resolver la identidad del referente.
  - Se conservó la repetición de «día» para reflejar el paralelismo hebreo.
  - Se prefirió «alba»/«aurora» en el campo semántico de שַׁחַר por coherencia con la evidencia auditada.
