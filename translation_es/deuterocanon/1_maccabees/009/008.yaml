translation:
  language: es
  text: 'Y se desalentó[a], y dijo a los que habían quedado: «Levantémonos y subamos contra nuestros adversarios, si acaso podemos combatirlos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se debilitó», o «perdió el ánimo»; el verbo griego puede indicar quedar física o emocionalmente abatido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελύθη
  english_pob_choice: was dismayed
  chosen_spanish: se desalentó
  alternatives_spanish:
  - se desanimó
  - se acobardó
  - perdió el ánimo
  lexicon: LSJ
  rationale: El verbo griego puede expresar aflojamiento, debilitamiento o pérdida de ánimo. En este contexto de combate, la idea central es un colapso interior de resolución; "se desalentó" conserva ese sentido sin exigir más de lo que el griego afirma.
- source_word: τοῖς καταλειφθεῖσιν
  english_pob_choice: to those who were left
  chosen_spanish: a los que habían quedado
  alternatives_spanish:
  - a los que quedaron
  - a los restantes
  - a los sobrevivientes
  lexicon: LSJ
  rationale: El participio de καταλείπω indica los que quedaron o permanecieron. "Habían quedado" suena natural en español y mantiene la referencia al pequeño grupo remanente.
- source_word: Ἀναστῶμεν
  english_pob_choice: Let us rise
  chosen_spanish: Levantémonos
  alternatives_spanish:
  - Levantémonos de nuevo
  - Arremanguémonos y levantémonos
  - Alevantémonos
  lexicon: LSJ
  rationale: La forma exhortativa se conserva con un imperativo inclusivo en español. "Levantémonos" comunica la llamada a ponerse en acción con un tono digno y directo.
- source_word: ἀναβῶμεν
  english_pob_choice: go up
  chosen_spanish: subamos
  alternatives_spanish:
  - subamos arriba
  - avancemos
  - subamos contra
  lexicon: LSJ
  rationale: ἀναβαίνω significa literalmente subir o ir hacia arriba. "Subamos" conserva el movimiento ascendente sin añadir una táctica específica no explicitada por el griego.
- source_word: τοὺς ὑπεναντίους ἡμῶν
  english_pob_choice: our adversaries
  chosen_spanish: nuestros adversarios
  alternatives_spanish:
  - nuestros enemigos
  - los que se oponen a nosotros
  - nuestros contrarios
  lexicon: LSJ
  rationale: ὑπεναντίος denota oposición frontal, adversario o contrario. "Adversarios" mantiene mejor esa oposición que el más general "enemigos".
- source_word: ἐὰν ἄρα
  english_pob_choice: if perhaps
  chosen_spanish: si acaso
  alternatives_spanish:
  - si quizás
  - si tal vez
  - si de veras
  lexicon: LSJ
  rationale: La combinación expresa incertidumbre o esperanza tentativa. "Si acaso" reproduce bien en español ese matiz condicional e inseguro.
- source_word: δυνώμεθα
  english_pob_choice: we are able
  chosen_spanish: podemos
  alternatives_spanish:
  - seamos capaces
  - lleguemos a poder
  - estemos en condiciones de
  lexicon: LSJ
  rationale: Bajo la condición introducida por ἐὰν, el sentido de capacidad se expresa con naturalidad mediante "podemos" en español, sin perder la nota de posibilidad.
- source_word: πολεμῆσαι
  english_pob_choice: to fight
  chosen_spanish: combatirlos
  alternatives_spanish:
  - pelear contra ellos
  - hacerles guerra
  - luchar contra ellos
  lexicon: LSJ
  rationale: El infinitivo aoristo indica combatir o hacer guerra. "Combatirlos" es claro, directo y conserva el tono militar del pasaje.
translation_notes:
  revision_awareness: El texto griego y el contexto de la traducción inglesa concuerdan de manera alta; no se requieren revisiones sustanciales. Se mantuvo la tensión léxica de ἐξελύθη mediante una solución española que conserva la idea de abatimiento interior sin sobreinterpretar el grado físico o emocional.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma general del proyecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - Se prefirió un español natural y dignificado, evitando arcaísmos innecesarios.
  - '"Adversarios" se conserva como término relacional y militar, coherente con la pauta del POB para ὑπεναντίος.'
