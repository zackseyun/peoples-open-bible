base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/009/003.yaml
  text: And the glory of the God of Israel went up from above the cherub on which it had been[a], to the threshold of the house. And he called to the man clothed in linen[c][b], who had the scribe’s writing case at his waist.
  footnotes:
  - marker: a
    text: Or 'the threshold of the temple.' Hebrew 'house' here refers to the temple building in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the scribe’s ink case'; traditional English has 'inkhorn.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew could also be rendered 'it called,' referring back to 'the glory,' but the context suggests personal divine agency.
    reason: alternative_reading
