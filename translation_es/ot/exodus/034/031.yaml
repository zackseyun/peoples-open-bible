    issue: La nota textual está anclada en «llamó» aunque las alternativas se refieren a «jefes de la congregación/comunidad».
    rationale: No afecta la fidelidad del texto principal, pero el anclaje idealmente estaría en «jefes de la asamblea». Aun así, el contenido de la nota es correcto y no exige revisión obligatoria.
