revisions:
- from: Y cuando esto hubo sucedido, los exhortaba a que, habiéndose dado al banquete, dedicaran la parte presente del convite, largamente honrada, a la alegría.
  to: Y cuando esto hubo sucedido, los instó a que, habiéndose dado al banquete, dedicaran la parte actual de este banquete, honrada desde hace mucho, a la alegría.[a]
  rationale: Se ajustó el verbo principal a «los instó» para reflejar mejor el valor narrativo de παρῄνει; se reemplazó «convite» por «banquete» y «parte presente» por «parte actual de este banquete» para mejorar naturalidad y claridad sin perder μέρος ni τὸ παρόν; y se añadió la nota léxica requerida para el modismo καταθέσθαι μέρος.
