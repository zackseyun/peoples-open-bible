base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/004/011.yaml
  text: Your lips drip honeycomb[a], bride; honey and milk are under your tongue[b], and the fragrance of your garments is like the fragrance of Lebanon.
  footnotes:
