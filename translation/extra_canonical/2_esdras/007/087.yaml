  category: mistranslation
  tier: 2
  from: 'The seventh way, greater than all the ways mentioned above: they waste away in confusion and are consumed in shame and wither in fears, because they see the glory of the Most High, before whom they sinned while they lived, and before whom they are to be judged in the last times.'
  to: The seventh way is greater than all the ways mentioned above, because they will waste away in confusion and be consumed in horrors and wither in fears, seeing the glory of the Most High, before whom they sinned while they lived, and before whom they will begin to be judged in the last times.
  rationale: 'There are several compounding issues here: 1) ''horroribus'' means ''horrors'' or ''terrors'', not ''shame''. 2) The verbs ''detabescent'', ''consumentur'', and ''marcescent'' are explicitly future tense, not present. 3) ''quoniam'' (because) introduces the reason the seventh way is greatest (''because they will waste away''), whereas the draft moves ''because'' to translate the participle ''uidentes'' (seeing), breaking the causal logic. 4) ''incipient'' (will begin) is omitted from the final clause (''incipient... iudicari'').'
