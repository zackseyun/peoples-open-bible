translation:
  language: es
  text: 'Entonces dijo[a]: «Por favor, no se enoje, mi señor, y hablaré solo una vez más. Quizá se encuentren allí diez». Y dijo[b]: «No la destruiré por causa de los diez».[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por favor, mi señor, no se enoje, y déjeme hablar solo esta vez».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «No destruiré por causa de los diez», con el objeto entendido por el contexto.'
    reason: lexical_alternative
  - marker: c
    text: 'Otra posibilidad: «Por favor, no se enoje mi señor».'
    reason: previous_rendering
lexical_decisions:
- source_word: אַל נָא יִחַר
  english_pob_choice: Please do not let ... be angry
  chosen_spanish: Por favor, no se enoje
  alternatives_spanish:
  - Por favor, no se irrite
  - Por favor, no arda de ira
  lexicon: HALOT
  rationale: La expresión hebrea usa el modismo de la ira que “arde”; en español natural, la súplica se comunica con “no se enoje”, que conserva el sentido de apaciguamiento sin sonar forzado. “Por favor” representa נָא.
- source_word: לַאדֹנָי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - el Señor
  lexicon: HALOT
  rationale: Aquí es un trato respetuoso directo en diálogo. “Mi señor” preserva la relación de deferencia sin introducir la convención de mayúsculas asociada al nombre divino.
- source_word: וַאֲדַבְּרָה
  english_pob_choice: and I will speak
  chosen_spanish: y hablaré
  alternatives_spanish:
  - y déjeme hablar
  - y seguiré hablando
  lexicon: HALOT
  rationale: 'El cohortativo expresa intención/súplica de continuar la conversación. En español, el futuro simple funciona de manera natural en esta petición: “hablaré”.'
- source_word: אַךְ הַפַּעַם
  english_pob_choice: only this once more
  chosen_spanish: solo una vez más
  alternatives_spanish:
  - solo esta vez
  - nada más esta vez
  lexicon: HALOT
  rationale: La combinación limita la petición a una última intervención. “Solo una vez más” comunica bien el valor restrictivo y temporal.
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Quizá
  alternatives_spanish:
  - Tal vez
  - Acaso
  lexicon: HALOT
  rationale: Introduce posibilidad, no certeza. “Quizá” es un equivalente natural y sobrio en español.
- source_word: יִמָּצְאוּן שָׁם
  english_pob_choice: will be found there
  chosen_spanish: se encuentren allí
  alternatives_spanish:
  - se hallen allí
  - se encuentren allí
  lexicon: HALOT
  rationale: El niphal de מצא expresa “ser hallados/encontrados”. En español, “se encuentren allí” mantiene la pasividad/resultativo de manera fluida.
- source_word: עֲשָׂרָה
  english_pob_choice: ten
  chosen_spanish: diez
  alternatives_spanish:
  - diez
  lexicon: HALOT
  rationale: Número cardinal directo.
- source_word: לֹא אַשְׁחִית
  english_pob_choice: I will not destroy it
  chosen_spanish: No la destruiré
  alternatives_spanish:
  - No lo destruiré
  - No destruiré eso
  lexicon: HALOT
  rationale: שׁחת en hifil significa destruir. El objeto es implícito en hebreo; en español se puede suplir con el referente femenino de la ciudad/ciudadanía implícita, manteniendo la claridad narrativa. Se conserva la tensión del referente contextual sin explicitar de más.
- source_word: בַּעֲבוּר
  english_pob_choice: for the sake of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - por amor a
  lexicon: HALOT
  rationale: La preposición expresa motivo/consideración. “Por causa de” comunica la lógica intercesora del texto con un registro bíblico claro.
- source_word: הָעֲשָׂרָה
  english_pob_choice: the ten
  chosen_spanish: los diez
  alternatives_spanish:
  - esos diez
  - los diez mencionados
  lexicon: HALOT
  rationale: Retiene la referencia definida a los diez ya mencionados. En español, el artículo plural natural es “los diez”.
theological_decisions:
- issue: Referencia del destinatario en לַאדֹנָי
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - el Señor
  - mi amo
  rationale: El término es un trato respetuoso en la súplica de Abraham. Traducirlo como “mi señor” evita resolver innecesariamente la relación con el nombre divino y preserva la ambigüedad/documentada tensión del hebreo en el diálogo.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
- issue: Objeto implícito de אַשְׁחִית
  english_pob_reading: I will not destroy it
  chosen_spanish_reading: No la destruiré
  alternative_spanish_readings:
  - No lo destruiré
  - No destruiré
  rationale: El hebreo omite el objeto, entendido por contexto. En español, omitirlo aquí sería posible, pero “la” ayuda a enlazar con la ciudad de forma natural sin añadir contenido doctrinal nuevo. Se conserva el carácter contextual del referente implícito.
  doctrine_reference: Hebrew object ellipsis; contextually supplied referent.
translation_notes:
  revision_awareness: Se incorporó la revisión que favorece una formulación más directa y natural en el ruego, evitando construcciones demasiado indirectas. También se mantuvo la economía del hebreo al suplir el objeto implícito de manera sobria en español.
  spanish_consistency_notes:
  - Se usa “Yahvé” para el nombre divino cuando corresponde; aquí no aparece.
  - “mi señor” conserva el trato deferente y no introduce capitalización teológica indebida.
  - Se mantiene un registro formal y publicable, sin calco rígido.
  - Los números cardinales se expresan de forma natural en español.
  - El objeto implícito del último verbo se refleja con un referente contextual mínimo, sin sobreexplicar.
