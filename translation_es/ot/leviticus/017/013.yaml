review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro auditado en inglés: mantiene el valor distributivo de אִישׁ אִישׁ, conserva «hijos de Israel», refleja la categoría legal de גֵּר con una opción aceptable, traduce bien el contexto cinegético de יָצוּד צֵיד, y preserva correctamente que la sangre es el referente más natural de «cubrirlo». La instrucción legal con futuro también funciona bien en español.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero hay dos detalles que conviene reparar. Primero, la nota [b] está anclada en «que se pueda comer», pero su contenido trata principalmente del pronombre de «cubrirla», de modo que la ubicación de la nota no corresponde al punto realmente explicado. Segundo, «cace presa» suena algo menos idiomático en español bíblico general que «cace alguna pieza» o una formulación equivalente. El resto del verso lee con naturalidad.
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. «Forastero» para גֵּר es defendible, aunque «residente forastero»/«forastero residente» sería más explícito. «Hijos de Israel», «animal silvestre», «ave», «derramará su sangre» y «la cubrirá con tierra» están alineados con la evidencia y con las decisiones auditadas.
  issues:
  - severity: medium
    issue: La nota [b] está colocada sobre «que se pueda comer», pero explica el referente del pronombre de «la cubrirá».
    rationale: Las notas deben anclarse donde realmente aclaran una ambigüedad o alternativa. Aquí la explicación corresponde a «la cubrirá con tierra», no a «que se pueda comer».
  - severity: low
    issue: «cace presa» es comprensible, pero suena algo rígido y menos idiomático.
    rationale: Aunque refleja el cognado hebreo, en español general eclesial «cace alguna pieza» fluye mejor sin perder el sentido de caza de animales/comida.
  - severity: low
    issue: La nota [b] dice «Literalmente, “que se pueda comer”», pero luego comenta otro elemento del versículo.
    rationale: La primera parte de la nota no añade una alternativa útil, porque el texto principal ya dice esencialmente eso; conviene dedicar la nota solo al referente del pronombre en «la cubrirá».
  revised_spanish_text: Y cualquier hombre de los hijos de Israel[a], o del forastero que habita entre ellos, que cace alguna pieza, sea animal silvestre o ave, que se pueda comer, derramará su sangre y la cubrirá con tierra[b].
  revised_footnotes:
