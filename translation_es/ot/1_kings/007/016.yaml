review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Hiram hizo dos capiteles de bronce fundido para colocarlos sobre la parte superior de los pilares/columnas, y cada capitel medía cinco codos de altura. Conserva correctamente «capiteles», «bronce fundido» y «cinco codos». Sin embargo, «sobre las cabezas de las columnas» suena poco natural en español y no sigue la propia justificación del inglés POB, que evita el literalismo de «heads» en favor del sentido arquitectónico «tops».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «las cabezas de las columnas» resulta forzado en lectura pública. «La parte superior de las columnas» o «la parte de arriba de las columnas» comunica mejor el referente arquitectónico. Además, «La altura de un capitel» es aceptable, pero «La altura del primer capitel» introduciría un matiz no explícito; conviene mantener una formulación que preserve «uno» sin sonar extraña.
  glossary_alignment: No hay términos teológicos de proyecto en juego. La decisión «capitel» para כֹּתֶרֶת está bien alineada con el expediente POB, y la nota alternativa «coronas» está correctamente preservada. «Columnas» es aceptable como equivalente de «pillars» en este contexto arquitectónico.
  issues:
  - severity: medium
    issue: Literalismo poco natural en «las cabezas de las columnas»
    rationale: 'Aunque רָאשֵׁי significa literalmente «cabezas», el inglés POB documentó correctamente que aquí el sentido es arquitectónico: la parte superior. En español, «cabezas de las columnas» suena extraño y menos legible que «la parte superior de las columnas».'
  - severity: low
    issue: La formulación «un capitel» pierde levemente el matiz de «el uno»
    rationale: No es un error serio, porque el español evita «el uno» en este contexto; pero puede mejorarse con «del un capitel» no suena natural. La solución más idiomática sigue siendo «de un capitel», manteniendo el contraste con «del segundo capitel».
  revised_spanish_text: Hizo dos capiteles[a] de bronce fundido para poner sobre la parte superior de las columnas. La altura de un capitel era de cinco codos, y la altura del segundo capitel era de cinco codos.
  revised_footnotes:
  - marker: a
    text: O «coronas» para «capiteles»; el término hebreo designa la sección ornamental superior de una columna.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «las cabezas de las columnas» por «la parte superior de las columnas» para reflejar mejor el sentido arquitectónico de רָאשֵׁי הָעַמּוּדִים y la rationale del English POB, evitando un literalismo poco natural en español. Se mantienen «capiteles», «bronce fundido», «cinco codos» y la nota léxica sobre «coronas», que están bien justificadas por la evidencia fuente y el expediente POB.
