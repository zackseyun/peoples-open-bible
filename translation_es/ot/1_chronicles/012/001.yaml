revisions:
- from: Ahora bien, estos son los hombres que vinieron a David en Siclag, mientras aún estaba retenido[a] por causa de Saúl hijo de Cis; y ellos estaban entre los valientes[b], ayudantes en la guerra.
  to: Ahora bien, estos son los hombres que vinieron a David en Siclag, mientras aún estaba retenido[a] por causa de Saúl hijo de Cis; y ellos estaban entre los guerreros valientes[b], ayudantes en la guerra.
  rationale: Se ajusta la nota [a] para que ofrezca alternativas verdaderas y acordes con el rastro inglés, y se fortalece «gibbôrîm» en el texto principal como «guerreros valientes» para preservar mejor el sentido militar del hebreo. El resto del versículo se mantiene porque es fiel y natural en español.
