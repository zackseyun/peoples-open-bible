  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ γὰρ ἐν κυρίῳ κληθεὶς δοῦλος ἀπελεύθερος κυρίου ἐστίν· ⸀ὁμοίως ὁ ἐλεύθερος κληθεὶς δοῦλός ἐστιν Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/007/022.yaml
  text: For the slave who was called in the Lord is the Lord’s freedman[a]; likewise[b], the free man who was called is Messiah’s slave.
  footnotes:
  - marker: a
    text: 'Or ''the Lord’s free person.'' The Greek term refers specifically to someone freed from slavery, hence ''freedman.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''Christ’s slave.'' Greek Χριστοῦ is the title ''Messiah'' here.'
    reason: alternative_reading
translation:
  language: ko
  text: 이는 주 안에서 부르심을 받은 노예는 주의 자유인이기 때문입니다. 마찬가지로 자유인으로 부르심을 받은 자는 메시아의 노예입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοῦλος … ἀπελεύθερος
  english_pob_choice: slave … freedman
  chosen_korean: 노예 … 자유인
  alternatives_korean:
  - 종 … 해방된 자
  lexicon: BDAG
  rationale: ἀπελεύθερος는 「해방된 자(전 노예)」. 본 절은 두 신분의 영적 평준화를 노예 매매 어휘로 표현.
- source_word: δοῦλός … Χριστοῦ
  english_pob_choice: Messiah’s slave
  chosen_korean: 메시아의 노예
  alternatives_korean:
  - 메시아의 종
  lexicon: BDAG
  rationale: '빌 1:1과 동일한 매임의 무게 보존(글로사리·DOCTRINE.md).'
