review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura temporal («Cuando estaba…»), la invocación del nombre divino y la designación «Dios de Jacob». Sin embargo, «esperé ayuda del Dios de Jacob» suena menos natural y algo ambiguo en español; el sentido auditado en inglés y permitido por el griego se expresa mejor como «esperé ayuda de parte del Dios de Jacob». Además, «fui salvado» es comprensible, pero en español bíblico-natural «fui salvo» suele sonar más idiomático y cercano al valor resultativo de ἐσώθην.
  spanish_quality_summary: 'La redacción es generalmente clara y digna. Los principales ajustes son de naturalidad y precisión idiomática: «en angustia» puede mantenerse, aunque «angustiado» o «afligido» serían más fluidos; el cambio realmente necesario es la expresión de la esperanza/ayuda. «Invoqué el nombre del Señor» funciona bien. La nota b también conviene retocarla para que el alternativo suene natural en español.'
  glossary_alignment: La elección de «Señor» para Κυρίου está justificada por el texto griego inmediato y la nota teológica incluida; no hace falta imponer «Yahvé» aquí. «Dios», «Jacob» e «invoqué» están bien alineados con las pautas del proyecto. No hay conflicto terminológico mayor.
  issues:
  - severity: medium
    issue: «esperé ayuda del Dios de Jacob» es poco natural y puede leerse ambiguamente
    rationale: Aunque transmite el sentido general, en español suena más claro «esperé ayuda de parte del Dios de Jacob», que refleja mejor la procedencia del auxilio sin forzar la sintaxis griega.
  - severity: low
    issue: «fui salvado» es menos idiomático que «fui salvo» en este registro
    rationale: Ambas opciones son correctas, pero «fui salvo» suena más natural en español bíblico moderno y conserva bien el sentido de ἐσώθην.
  - severity: low
    issue: La nota alternativa b puede formularse con mejor español
    rationale: «esperé en el auxilio del Dios de Jacob» es entendible pero algo rígido; «puse mi esperanza en el auxilio del Dios de Jacob» expresa mejor la alternativa más literal.
  revised_spanish_text: Cuando estaba en angustia[a], invoqué el nombre del Señor; esperé ayuda de parte del Dios de Jacob[b], y fui salvo.
  revised_footnotes:
