  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura griega: Dios escoge la casa, su nombre es asociado con ella, y la casa existe como lugar de oración y petición para su pueblo. Sin embargo, «fuera invocado sobre ella» se aparta del matiz principal documentado por el POB inglés, que prioriza la fórmula bíblica de que el nombre de Dios es llamado/sobrepuesto sobre el templo, no primariamente el acto cultual de invocarlo. La nota ya conserva «invocado» como alternativa válida, pero el texto principal debería acercarse más a la fórmula fuente.'
  spanish_quality_summary: El español es claro y digno. No obstante, «para que tu nombre fuera invocado sobre ella» suena algo interpretativo y menos idiomáticamente ligado a la fórmula bíblica tradicional. «Sea llamado sobre ella» preserva mejor el giro, aunque conviene mantener un español natural. El resto del versículo es legible y fiel.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Casa», «oración», «petición» y «tu pueblo» están bien. El punto principal es alinear mejor la frase sobre el nombre divino con la decisión léxica y teológica auditada.
  issues:
