base_translation:
  language: en
  yaml_path: translation/ot/numbers/019/003.yaml
  text: You shall give it to Eleazar the priest[a], and he shall bring it outside the camp[b], and it shall be slaughtered before him.
  footnotes:
  - marker: a
    text: Or, 'and he shall slaughter it before him,' if the implicit subject is taken to remain Eleazar throughout the clause.
    reason: alternative_reading
  - marker: b
    text: The Hebrew feminine pronoun refers to the red heifer; English uses 'it' idiomatically for the animal.
    reason: lexical_alternative
