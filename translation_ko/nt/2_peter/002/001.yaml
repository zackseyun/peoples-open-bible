id: 2PE.2.1
reference: 2 Peter 2:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἐγένοντο δὲ καὶ ψευδοπροφῆται ἐν τῷ λαῷ, ὡς καὶ ἐν ὑμῖν ἔσονται ψευδοδιδάσκαλοι, οἵτινες παρεισάξουσιν αἱρέσεις ἀπωλείας, καὶ τὸν ἀγοράσαντα αὐτοὺς δεσπότην ἀρνούμενοι, ἐπάγοντες ἑαυτοῖς ταχινὴν ἀπώλειαν·
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/002/001.yaml
  text: But false prophets also arose among the people[a], just as there will also be false teachers among you, who will secretly bring in destructive heresies, even denying the Master who bought them[b], bringing swift destruction on themselves.
  footnotes:
  - marker: a
    text: Or 'destructive factions.' The Greek word can denote parties or sects, but here likely refers to teachings or movements that lead to destruction.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Lord who redeemed them.' The Greek says 'the Master who bought them,' preserving a purchase metaphor without resolving broader theological debates about its scope.
    reason: alternative_reading
translation:
  language: ko
  text: 그러나 백성 가운데 거짓 예언자들이 일어났던 것처럼, 여러분 가운데에도 거짓 선생들[a]이 있을 것입니다. 그들은 멸망에 이르게 하는 이단[b]들을 몰래 끌어들이며, 자기들을 사신 주권자[c]까지 부인하여, 자기들 위에 임박한 멸망을 끌어들입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ψευδοδιδάσκαλοι. 본 번역은 「거짓 선생들」로 옮겨 그 폭로적 어조를 보존한다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 αἱρέσεις는 「분파·교파」를 뜻할 수도 있으나, 여기서는 멸망을 가져오는 가르침을 가리킨다.
    reason: lexical_alternative
  - marker: c
    text: 헬라어 δεσπότης는 「주인·주권자」를 뜻하며, 매매·소유의 비유를 보존한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ψευδοδιδάσκαλοι
  english_pob_choice: false teachers
  chosen_korean: 거짓 선생들
  alternatives_korean:
  - 거짓 교사들
  - 거짓 가르치는 자들
  lexicon: BDAG
  rationale: 용어집 표준. 본문의 강한 폭로적 어조를 「거짓 선생」으로 살리고 약화시키지 않는다.
- source_word: αἱρέσεις ἀπωλείας
  english_pob_choice: destructive heresies
  chosen_korean: 멸망에 이르게 하는 이단
  alternatives_korean:
  - 파멸시키는 분파
  - 파괴적 이단
  lexicon: BDAG
  rationale: 베드로후서 문맥에서 αἵρεσις는 단순 분파가 아니라 멸망을 초래하는 그릇된 가르침이다. 한국어 「이단」이 그 함의를 명확히 전한다.
- source_word: δεσπότην
  english_pob_choice: Master
  chosen_korean: 주권자
  alternatives_korean:
  - 주인
  - 주재
  lexicon: BDAG
  rationale: δεσπότης는 소유주·절대 주권자를 뜻하며, κύριος보다 소유 관계를 강조한다. 「주권자」는 그 무게를 전한다.
- source_word: ἀγοράσαντα
  english_pob_choice: who bought them
  chosen_korean: 사신
  alternatives_korean:
  - 값 주고 사신
  - 대속하신
  lexicon: BDAG
  rationale: ἀγοράζω는 「시장에서 사다」의 매매 비유. 「대속」 등의 신학적 해석을 미리 끼워 넣지 않고 매매의 이미지를 보존.
