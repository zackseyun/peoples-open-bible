translation:
  language: es
  text: con Simón, el maldito, y con una fuerza[a] muy grande. Al presentarse, dijo que había venido por órdenes del rey, para tomar los fondos privados del tesoro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un ejército muy grande» o «una fuerza muy formidable»; el griego dice literalmente «una fuerza/ejército muy pesado», usando «pesado» metafóricamente para una fuerza militar opresiva o imponente.
    reason: lexical_alternative
  - marker: b
    text: La frase «los fondos privados del tesoro» probablemente se refiere a dineros considerados privados o depositados dentro del tesoro, no necesariamente al tesoro entero.
    reason: cultural_note
lexical_decisions:
- source_word: καταράτου
  english_pob_choice: accursed
  chosen_spanish: maldito
  alternatives_spanish:
  - maldito por una maldición
  - maldicho
  lexicon: LSJ
  rationale: El adjetivo expresa fuerte condena o estar bajo maldición. En español, «maldito» conserva esa fuerza sin sonar artificial. Se evita suavizarlo a «cursed» en sentido débil o convertirlo en un simple insulto.
- source_word: βαρυτάτου στρατοῦ
  english_pob_choice: a very large force
  chosen_spanish: un ejército muy numeroso
  alternatives_spanish:
  - una fuerza muy grande
  - un ejército muy formidable
  lexicon: LSJ
  rationale: βαρύς puede tener un matiz de peso/opresión o de imposición formidable; el audit trail inglés optó por «very large force» para naturalidad. En español, «ejército muy numeroso» comunica bien el tamaño del contingente sin perder el trasfondo militar.
- source_word: προσελθών
  english_pob_choice: After coming forward
  chosen_spanish: Al presentarse
  alternatives_spanish:
  - Después de acercarse
  - Cuando se adelantó
  lexicon: LSJ
  rationale: El participio indica acción previa y de aproximación/presentación. «Al presentarse» reproduce esa transición en un español natural y formal.
- source_word: ταῖς τοῦ βασιλέως ἐντολαῖς
  english_pob_choice: by the king’s commands
  chosen_spanish: por órdenes del rey
  alternatives_spanish:
  - bajo las órdenes del rey
  - con las órdenes del rey
  lexicon: LSJ
  rationale: El dativo es instrumental o asociativo. «Por órdenes del rey» expresa de manera clara que su llegada estaba autorizada u ocasionada por mandato real.
- source_word: ἥκειν
  english_pob_choice: he had come
  chosen_spanish: había venido
  alternatives_spanish:
  - había llegado
  - venía
  lexicon: LSJ
  rationale: ἥκω suele implicar venir/llegar con presencia resultante. «Había venido» encaja bien en el estilo indirecto y mantiene la neutralidad del verbo griego.
- source_word: ὅπως
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el propósito de
  lexicon: LSJ
  rationale: Introduce finalidad. En español, «para» es la opción más natural y fiel aquí; el contexto ya deja clara la intención.
- source_word: τὰ ἰδιωτικὰ
  english_pob_choice: the private funds
  chosen_spanish: el dinero privado
  alternatives_spanish:
  - los fondos privados
  - las pertenencias privadas
  lexicon: LSJ
  rationale: El adjetivo ἰδιωτικός contrasta lo privado con lo público o institucional. Dado que χρήματα apunta a recursos monetarios, «dinero privado» conserva la idea de fondos pertenecientes a particulares o depositados privadamente.
- source_word: τοῦ γαζοφυλακίου
  english_pob_choice: of the treasury
  chosen_spanish: del tesoro
  alternatives_spanish:
  - del tesoro del templo
  - de la tesorería
  lexicon: LSJ
  rationale: γαζοφυλάκιον designa un tesoro o cámara del tesoro. «Tesoro» es la equivalencia más directa y clara; se evita especificar «del templo» en el texto principal porque el griego aquí no lo dice explícitamente.
- source_word: λάβοι
  english_pob_choice: he might take
  chosen_spanish: tomar
  alternatives_spanish:
  - llevarse
  - apoderarse de
  lexicon: LSJ
  rationale: El aoristo subjuntivo bajo ὅπως expresa finalidad. «Tomar» es amplio y sobrio; «llevarse» o «apoderarse de» añadirían mayor agresividad que la forma griega por sí sola exige.
- source_word: χρήματα
  english_pob_choice: funds
  chosen_spanish: dinero
  alternatives_spanish:
  - fondos
  - riquezas
  lexicon: LSJ
  rationale: En contextos administrativos, χρήματα puede referirse a dinero o recursos monetarios. «Dinero» funciona bien con «privado» y mantiene el sentido financiero del pasaje.
theological_decisions:
- issue: Si traducir γαζοφυλακίου como «tesoro» o expandir a «tesoro del templo»
  english_pob_reading: of the treasury
  chosen_spanish_reading: del tesoro
  alternative_spanish_readings:
  - del tesoro del templo
  - de la tesorería del templo
  rationale: El contexto amplio del relato apunta al ámbito sagrado, pero el sintagma griego solo dice «del tesoro». La traducción principal conserva esa precisión y evita introducir un especificador no explicitado en la cláusula.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo reflejar βαρυτάτου στρατοῦ en español sin perder el matiz de peso/formidabilidad
  english_pob_reading: a very large force
  chosen_spanish_reading: un ejército muy numeroso
  alternative_spanish_readings:
  - una fuerza muy grande
  - un ejército muy formidable
  rationale: La solución española prioriza naturalidad y claridad, mientras mantiene el carácter imponente del contingente. No se fuerza el matiz metafórico de «pesado» en una expresión extraña para el español.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail inglés: «very heavy force» fue ajustado a una expresión más natural («very large force»), y «so that he might take» se volvió «in order to take». La versión española refleja esas decisiones con «un ejército muy numeroso» y una finalidad simple con «para».'
  spanish_consistency_notes:
  - Se mantiene «rey» sin mayúsculas para uso común en español, ya que no se trata de un título divino.
  - Se prefirió «tesoro» en lugar de «tesorería» para conservar la concisión del sustantivo griego γαζοφυλάκιον.
  - «Maldito» conserva la fuerza de καταράτου sin suavizarla a «cursed» en sentido débil.
  - Se eligió una sintaxis fluida en español moderno sin agregar contenido ausente en el griego.
