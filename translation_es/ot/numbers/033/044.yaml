lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Salieron
  - Se pusieron en camino
  lexicon: HALOT
  rationale: En la fórmula itinerante del desierto, נסע expresa la acción de levantar campamento y continuar el viaje. «Partieron» comunica ese movimiento de manera natural en español sin perder la secuencia narrativa.
- source_word: מֵאֹבֹת
  english_pob_choice: from Oboth
  chosen_spanish: de Obot
  alternatives_spanish:
  - desde Obot
  lexicon: HALOT
  rationale: El hebreo marca origen con la preposición מֵ. Se conserva el nombre propio transliterado y se usa «de» para reflejar el punto de salida.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y plantaron su campamento
  lexicon: HALOT
  rationale: חנה es el verbo técnico del itinerario del desierto para establecer campamento. «Acamparon» es claro y fiel en español moderno.
- source_word: בְּעִיֵּי הָעֲבָרִים
  english_pob_choice: at Iye-abarim
  chosen_spanish: en Iye-abarim
  alternatives_spanish:
  - en Iyye-abarim
  - en las ruinas de Abarim
  lexicon: HALOT
  rationale: En este contexto la expresión funciona como topónimo. Se mantiene la transliteración para no forzar una traducción etimológica que el texto usa aquí como nombre de lugar.
- source_word: בִּגְבוּל
  english_pob_choice: on the border of
  chosen_spanish: en la frontera de
  alternatives_spanish:
  - en el borde de
  - en el territorio de
  lexicon: HALOT
  rationale: גְּבוּל denota límite, frontera o borde territorial. «En la frontera de» transmite bien la ubicación sin sugerir que estuvieran dentro del territorio moabita.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Se conserva el nombre propio estándar sin adaptación adicional.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo con la auditoría inglesa es alto y no hay revisiones aplicadas.
