translation:
  language: es
  text: También lleva estas diez porciones de queso[a] al comandante de los mil, averigua por el bienestar de tus hermanos, y toma su prenda[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «diez quesos»; el hebreo se refiere a producto lácteo formado en porciones o piezas.
    reason: lexical_alternative
  - marker: b
    text: O «su garantía» o «su señal»; el hebreo puede referirse a una prenda, un objeto de confirmación o una garantía traída como prueba de la condición de los hermanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲרִצֵי הֶחָלָב
  english_pob_choice: cuts of cheese
  chosen_spanish: quesos
  alternatives_spanish:
  - pedazos de queso
  - porciones de queso
  - cuñas de queso
  lexicon: HALOT
  rationale: El hebreo alude a productos lácteos en porciones concretas; en español, «quesos» comunica naturalmente el alimento sin forzar una imagen demasiado técnica. Mantiene el referente material del texto con claridad pública.
- source_word: שַׂר הָאָלֶף
  english_pob_choice: commander of the thousand
  chosen_spanish: comandante de mil
  alternatives_spanish:
  - capitán de mil
  - jefe de mil
  - oficial de mil
  lexicon: HALOT
  rationale: שַׂר expresa autoridad militar o de mando, y הָאָלֶף señala una unidad de mil. «Comandante de mil» conserva la estructura militar y evita un arcaísmo innecesario.
- source_word: תִּפְקֹד לְשָׁלוֹם
  english_pob_choice: check on your brothers’ welfare
  chosen_spanish: averigua cómo están tus hermanos en paz
  alternatives_spanish:
  - visita a tus hermanos para ver si están bien
  - pregunta por el bienestar de tus hermanos
  - revisa cómo están tus hermanos
  lexicon: HALOT
  rationale: El verbo פקד aquí tiene el sentido de informarse o atender a la condición de alguien, y לְשָׁלוֹם apunta a su bienestar o estado de paz. «Averigua cómo están» conserva el valor de comprobar su situación; «en paz» refleja de modo sobrio el componente de bienestar sin reducirlo a una simple cortesía.
- source_word: עֲרֻבָּתָם
  english_pob_choice: take their pledge
  chosen_spanish: su prenda
  alternatives_spanish:
  - su garantía
  - su señal
  - su prenda de ellos
  lexicon: HALOT
  rationale: El sustantivo puede designar una prenda, garantía o señal tangible que certifique la condición de los hermanos. «Prenda» mantiene la ambigüedad lexical útil del hebreo y permite la lectura de ‘prenda/garantía’ sin sobreinterpretar el objeto concreto.
- source_word: וְאֵת
  english_pob_choice: also
  chosen_spanish: También
  alternatives_spanish:
  - Y
  - Además
  lexicon: HALOT
  rationale: La partícula introduce un elemento adicional en la serie de mandatos. «También» conserva el valor aditivo y suena natural en español.
- source_word: תָּבִיא
  english_pob_choice: bring
  chosen_spanish: lleva
  alternatives_spanish:
  - trae
  - conduce
  - transporta
  lexicon: HALOT
  rationale: En contexto de entregar provisiones, «lleva» es un equivalente idiomático adecuado desde la perspectiva del hablante y evita una literalidad rígida.
- source_word: תִּקָּח
  english_pob_choice: take
  chosen_spanish: toma
  alternatives_spanish:
  - lleva
  - recibe
  - trae de vuelta
  lexicon: HALOT
  rationale: לקח es literalmente «tomar», y aquí se refiere a tomar consigo la prenda al regresar. «Toma» refleja el valor verbal sin añadir direccionalidad que el hebreo no explicita.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido del hebreo con apoyo del auditorio inglés: se conservó la secuencia de mandatos, la referencia militar de שַׂר הָאָלֶף y la ambigüedad de עֲרֻבָּתָם, evitando tanto el calco duro como la paráfrasis excesiva. Se optó por una formulación publicable en español que mantiene la tensión léxica del pasaje.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparece; en este versículo no se presenta.
  - Se mantiene un registro bíblico moderno y claro, sin reemplazar términos concretos con equivalentes eclesiásticos más vagos.
  - «Prenda» preserva la ambigüedad textual importante de עֲרֻבָּתָם, en línea con la nota inglesa sobre posible lectura alternativa.
