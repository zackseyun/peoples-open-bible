    issue: Puntuación en 'Yahvé, su Dios'
    rationale: El hebreo presenta una relación directa 'Yahvé su Dios' / 'Yahvé, su Dios' en inglés, pero en español la coma suena más explicativa que restrictiva y puede leerse menos natural. 'Yahvé su Dios' expresa mejor la relación posesiva/covenantal sin pausa innecesaria.
  - severity: low
