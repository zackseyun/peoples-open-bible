revisions:
- from: Los primogénitos de los pobres pastarán[a], y los necesitados se recostarán con seguridad; y yo mataré tu raíz con hambre, y ella[b] matará tu remanente.
  to: Los primogénitos de los pobres pastarán[a], y los necesitados se recostarán en seguridad; y yo mataré tu raíz con hambruna, y matará[b] a tu remanente.
  rationale: Se corrige «con hambre» a «con hambruna» para reflejar mejor el instrumento de juicio expresado por בָרָעָב. Se elimina «ella» para no resolver la ambigüedad del sujeto de יַהֲרֹג, en línea con la evidencia hebrea y la decisión teológica auditada de preservar la tensión textual. También se ajusta la nota b para explicar la ambigüedad en vez de cancelarla. «En seguridad» encaja mejor con «se recostarán» y refleja bien לָבֶטַח.
