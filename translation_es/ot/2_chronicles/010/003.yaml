translation:
  language: es
  text: 'Así que enviaron y lo mandaron llamar[a]; y Jeroboam y todo Israel vinieron y hablaron a Roboam, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo mandaron llamar». El hebreo deja implícito el objeto de «enviaron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  english_pob_choice: they sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - despacharon mensajeros
  lexicon: HALOT
  rationale: El hebreo deja implícito el objeto de 'enviaron', como observa la POB en inglés. 'Enviaron' conserva esa elipsis sin especificar mensajeros de manera más interpretativa de lo que permite el texto.
- source_word: וַיִּקְרְאוּ לוֹ
  english_pob_choice: called for him
  chosen_spanish: lo mandaron llamar
  alternatives_spanish:
  - lo llamaron
  - lo convocaron
  - lo llamaron para sí
  lexicon: HALOT
  rationale: La construcción קרא + ל puede expresar llamar para que alguien se presente. 'Lo mandaron llamar' comunica el acto de requerir su presencia y mantiene la secuencia narrativa de dos acciones.
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vino
  - llegó
  lexicon: HALOT
  rationale: Aunque el verbo es singular con Jeroboam como sujeto principal, el grupo está coordinado como 'Jeroboam y todo Israel'. En español, el plural natural 'vinieron' puede reflejar la llegada del grupo sin forzar una construcción torpe.
- source_word: יָרָבְעָם וְכָל יִשְׂרָאֵל
  english_pob_choice: Jeroboam and all Israel
  chosen_spanish: Jeroboam y todo Israel
  alternatives_spanish:
  - Jeroboam y todos los israelitas
  - Jeroboam, con todo Israel
  lexicon: HALOT
  rationale: Se conserva la expresión nacional-covenantal 'todo Israel', que la POB en inglés preserva. 'Todo Israel' es más fiel y más sobrio que 'todos los israelitas' en este contexto narrativo.
- source_word: וַיְדַבְּרוּ אֶל
  english_pob_choice: spoke to
  chosen_spanish: hablaron a
  alternatives_spanish:
  - se dirigieron a
  - dijeron a
  lexicon: HALOT
  rationale: דבר אל se traduce de modo directo como 'hablaron a', manteniendo el estilo narrativo y evitando reducirlo a una simple fórmula de cita.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijeron:'
  - 'para decir:'
  lexicon: HALOT
  rationale: El infinitivo introduce el discurso que continúa en el siguiente versículo; 'diciendo' conserva esa apertura discursiva. Se usa dos puntos para la puntuación natural del español.
translation_notes:
  revision_awareness: El texto sigue el estado de revisión más reciente sin cambios sustantivos; se mantiene la alta concordancia con el audit trail en inglés y no se introducen ajustes textuales o teológicos adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Jeroboam' y 'Roboam' conforme a la transliteración estándar del proyecto.
  - Se conserva 'todo Israel' para respetar la expresión nacional del hebreo.
  - La puntuación en español adapta el 'saying' hebreo a una introducción de cita con dos puntos.
