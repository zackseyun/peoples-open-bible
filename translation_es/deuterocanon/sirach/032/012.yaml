translation:
  language: es
  text: Y cumple tu deseo en el temor de Dios[a], sin ninguna carencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Da al Altísimo según su dádiva, y con buen ojo según lo que halla tu mano». El testimonio griego refleja una forma del versículo sustancialmente distinta del hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: ושלם
  english_pob_choice: and fulfill
  chosen_spanish: y cumple
  alternatives_spanish:
  - y completa
  - y realiza
  - y lleva a cumplimiento
  lexicon: HALOT
  rationale: El hebreo ושלם expresa la idea de completar o llevar a término; en español, «cumple» comunica bien una exhortación activa y natural, sin perder la fuerza imperativa del texto.
- source_word: רצון
  english_pob_choice: your desire
  chosen_spanish: tu deseo
  alternatives_spanish:
  - tu voluntad
  - tu agrado
  - tu querer
  lexicon: HALOT
  rationale: רצון puede significar deseo, voluntad o favor. Aquí «tu deseo» mantiene el sentido personal y concreto que exige el contexto sapiencial, y suena más natural que «tu voluntad» en español.
- source_word: ביראת אל
  english_pob_choice: in the fear of God
  chosen_spanish: en el temor de Dios
  alternatives_spanish:
  - con el temor de Dios
  - por temor de Dios
  - en reverencia a Dios
  lexicon: HALOT
  rationale: La preposición ב con יראה permite un valor circunstancial o instrumental. «En el temor de Dios» conserva el giro idiomático bíblico y la categoría sapiencial de piedad reverente.
- source_word: אל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Poderoso
  - el Dios
  lexicon: HALOT
  rationale: אל es aquí una designación divina común; «Dios» es la forma más clara y natural en español.
- source_word: ולא בחסר כל
  english_pob_choice: and not with any lack
  chosen_spanish: y no con ninguna falta
  alternatives_spanish:
  - y no con carencia alguna
  - y no faltando en nada
  - y no con ninguna deficiencia
  lexicon: HALOT
  rationale: חסר denota falta o carencia, y כל intensifica el alcance. «Con ninguna falta» conserva la concisión del hebreo y evita explicar de más un enunciado comprimido.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el testimonio griego
  english_pob_reading: Follow the extant Hebrew as the main text while noting the Greek's substantially different wording in a footnote.
  chosen_spanish_reading: Seguir el hebreo conservado como texto principal y señalar en nota que el testimonio griego dice algo sustancialmente diferente.
  alternative_spanish_readings:
  - 'Armonizar el verso con el griego: «Da al Altísimo según su dádiva, y con buen ojo según lo que halla tu mano»'
  - Fusionar ambas formas en una redacción mixta
  rationale: En Sirácida, cuando el hebreo está conservado, el criterio del proyecto es traducir ese testimonio como texto principal y usar el griego como apoyo crítico. Aquí la diferencia es grande, así que no debe suavizarse ni armonizarse en el cuerpo del texto.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as input/check'
translation_notes:
  revision_awareness: No se registraron cambios en la revisión más reciente; el pasaje quedó estable y el borrador sigue el hebreo conservado como texto base, con la divergencia griega indicada en nota.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אל según el uso terminológico del proyecto.
  - Se conservó «temor de Dios» por ser una fórmula sapiencial estable y transparente en español.
  - La nota al pie marca una alternativa textual real, no una simple paráfrasis, y evita harmonizar las tradiciones hebrea y griega.
