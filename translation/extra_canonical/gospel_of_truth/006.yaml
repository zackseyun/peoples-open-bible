lexical_decisions:
- source_word: ⲥⲕⲉⲩⲟⲥ
  chosen: vessels (jars)
  alternatives:
  - containers
  - implements
  lexicon: Crum; Liddell-Scott (σκεῦος)
  rationale: The context is household jars; σκῦφος/σκεῦος family in Coptic ⲥⲕⲉⲩⲟⲥ
    typically denotes vessels. "Jars" makes the parable concrete while "vessels" preserves
    the technical register.
- source_word: ⲡⲥⲁⲁⲧⲡⲉ
  chosen: judgment
  alternatives:
  - decision
  - sifting
  lexicon: Coptic lexical tradition (Sahidic)
  rationale: Common Sahidic term for judicial evaluation; the context clearly matches
    the evaluative act that "came down from above."
- source_word: ⲙⲫⲟⲥⲛⲉⲩ
  chosen: two‑edged
  alternatives:
  - double‑edged
  - drawn and double
  lexicon: Loan from Gk. διστόμος via Coptic idiom; cf. parsings in NHS
  rationale: The image is a two‑edged sword that "cuts both ways"; "two‑edged" maintains
    the metaphor concisely.
- source_word: ⲡⲗⲟⲅⲟⲥ / ⲡⲓⲱⲉ (contrast)
  chosen: Word / sound
  alternatives:
  - speech / noise
  lexicon: Gospel of Truth usage; Crum
  rationale: The passage contrasts the appearing Word with a mere sound (ⲡⲓⲱⲉ). Rendering
    "Word" preserves the theological weight of Logos without flattening; "sound" conveys
    the lesser counterpart.
- source_word: ⲣⲟⲩⲥⲱⲙⲁ
  chosen: put on a body
  alternatives:
  - was embodied
  - became a body
  - took a body
  lexicon: Coptic verbal phrase (ⲣⲟⲩⲥⲱⲙⲁ)
  rationale: The idiom explicitly expresses incarnation/embodiment. "Put on a body"
    is literal yet intelligible and preserves the incarnational nuance.
- source_word: ⲁϩⲟⲩⲙⲁϩⲟⲩ / ⲥⲙⲏⲧⲟⲩ
  chosen: empty / filled
  alternatives:
  - void / full
  lexicon: Crum
  rationale: Paired antonyms driving the jar imagery; simple, transparent English.
- source_word: ⲡⲁⲛⲟⲩ / ⲡⲱϣⲉ
  chosen: provided for / broken
  alternatives:
  - supplied / shattered
  - poured out / smashed
  lexicon: Contextual; Crum
  rationale: 'Series of paired states: provision vs. loss, purification vs. breakage.
    "Broken" is certain for ⲡⲱϣⲉ; "provided for" captures ⲡⲁⲛⲟⲩ in distributive sense.'
- source_word: ⲧⲟⲩⲃⲁϥ
  chosen: purified
  alternatives:
  - cleansed
  lexicon: Crum
  rationale: Household vessel imagery favors purification/cleansing.
- source_word: ⲕⲓⲙ / ϣⲧⲁⲣⲧⲣ̄
  chosen: shaken / agitated
  alternatives:
  - staggered / disturbed
  lexicon: Crum; XII.2 overlap confirms shaking term
  rationale: Both verbs depict cosmic disturbance; pairing "shaken and agitated" reflects
    the Coptic coupling.
- source_word: ⲥⲧⲁⲥⲓⲥ
  chosen: stability
  alternatives:
  - steadfastness
  - standing
  lexicon: Greek loan (στάσις) via Coptic
  rationale: Fits the contrast with "order" and cosmic unrest.
- source_word: ⲧⲡⲗⲁⲛⲏ
  chosen: Error (personified)
  alternatives:
  - Wandering
  - Deception
  lexicon: Greek πλάνη; Valentinian technical term
  rationale: In Gospel of Truth, ⲡⲗⲁⲛⲏ functions as a reified power. "Error" preserves
    the technical, personified sense.
- source_word: ⲧⲙⲛⲧⲙⲏⲉ / ⲅⲛⲱⲥⲓⲥ (concept)
  chosen: Knowledge (Gnosis)
  alternatives:
  - understanding
  lexicon: Valentinian usage
  rationale: The text explicitly opposes Knowledge to Error. "Knowledge (Gnosis)"
    preserves the technical force.
- source_word: ⲙⲉⲧⲙⲁⲓⲉⲛ
  chosen: Truth
  alternatives:
  - reality
  lexicon: Crum
  rationale: Consistent with the treatise’s personification of Truth as a saving power.
- source_word: ⲡⲉⲣⲱϣ
  chosen: mouth
  alternatives: []
  lexicon: Crum
  rationale: Set parallel to tongue; maintains metaphor for revelation/utterance.
- source_word: ⲡⲛⲁ ⲉⲧⲟⲩⲁⲁⲃ
  chosen: the Holy Spirit
  alternatives:
  - the holy breath/spirit
  lexicon: Standard Coptic Christian usage
  rationale: Title usage; doctrinally and contextually established.
- source_word: ⲁⲓⲱⲛ
  chosen: aeon
  alternatives:
  - age
  lexicon: Greek loan; Valentinian cosmology
  rationale: Retains the technical cosmological term essential in this work.
- source_word: ⲡϭⲱⲗⲡ
  chosen: the All
  alternatives:
  - the totality
  lexicon: Crum; common Gnostic idiom
  rationale: Conventional rendering in Gnostic texts; preserves conceptual scope.
- source_word: ⲡⲉⲑⲏⲡ
  chosen: place
  alternatives:
  - seat
  - region
  lexicon: Crum
  rationale: Spatial metaphor for spheres/realms illumined by the revelation.
technical_vocabulary_note: 'Key Valentinian terms are retained as technical vocabulary:
  Error (ⲧⲡⲗⲁⲛⲏ) is personified as a reified power; Gnosis (ⲧⲙⲛⲧⲙⲏⲉ) is rendered as
  Knowledge with an explicit salvific/oppositional role; Aeon (ⲁⲓⲱⲛ) and the All (ⲡϭⲱⲗⲡ)
  preserve cosmological nuance. The incarnation phrase “put on a body” renders the
  Coptic idiom (ⲣⲟⲩⲥⲱⲙⲁ) transparently. Metaphors of mouth/tongue for the Father/Spirit
  are kept to reflect the text’s revelatory mechanics without smoothing into abstract
  paraphrase.'
textual_note: The English is drafted directly from the Codex I pages 26–27 OCR provided.
  The opening simile about householders discarding faulty jars precedes the preserved
  lines and likely closed just before “For this is the judgment that came down from
  above,” where this section picks up. The sequence of paired jar states (empty/filled;
  provided/poured out; purified/broken) is taken from the explicit ⲕⲁⲩⲉ … lines. The
  phrase about universal disturbance combines ⲁⲩⲕⲓⲙ (“were shaken”) and ⲁⲩϣⲧⲁⲣⲧⲣ̄
  (“were agitated/perturbed”), followed by denial of "order" and "stability" (ⲥⲧⲁⲥⲓⲥ),
  which appears in the line with mixed Greek capitals. The personified Error (ⲧⲡⲗⲁⲛⲏ)
  is described with a chain of emotions/actions (anxiety, not knowing what to do,
  grieving/mourning, self‑affliction), culminating in the approach of Knowledge (ⲧⲙⲛⲧⲙⲏⲉ)
  as its dissolution. The soteriological core—Truth’s advent, greeting of the Father,
  and the mouth/tongue metaphor identifying Truth and the Holy Spirit—follows plainly.
  The closing rhetorical question (“for who has anything, if not the Father alone?”)
  marks a natural cadence before the next thematic unit (Form and Name) begins on
  the following lines of p. 27; those subsequent lines are not translated here to
  keep the section boundary with the Parable of the Jars and its immediate theological
  resolution.
