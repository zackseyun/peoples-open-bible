translation:
  language: es
  text: el que fue designado para el tiempo señalado[a], para hacer cesar la ira antes del furor, para volver el corazón de los padres hacia los hijos[b], y para restablecer las tribus de Israel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice más plenamente: ''para hacer cesar la ira delante del ardor de Dios''. El griego lo expresa de modo más breve: ''para calmar la ira antes del furor''.'
    reason: alternative_reading
  - marker: b
    text: El hebreo transmite 'padres ... hijos' en plural; el griego tiene el singular, 'padre ... hijo'.
    reason: textual_variant
  - marker: c
    text: El griego lee 'las tribus de Jacob'; el hebreo dice 'las tribus de Israel'.
    reason: textual_variant
lexical_decisions:
- source_word: הכתוב נכון לעת / ὁ καταγραφεὶς ἐν ἐλεγμοῖς εἰς καιρούς
  english_pob_choice: who was appointed for the appointed time
  chosen_spanish: el que fue designado para el tiempo señalado
  alternatives_spanish:
  - el que fue escrito para el tiempo señalado
  - el que fue registrado para tiempos señalados
  - el que fue designado para tiempos venideros
  lexicon: HALOT; BDAG
  rationale: El hebreo y el griego coinciden en la idea de alguien marcado/registrado con referencia a un tiempo determinado. 'Designado' expresa esa noción sin forzar una imagen demasiado literal de 'escrito' ni introducir una paráfrasis más amplia de lo que el texto permite. 'Tiempo señalado' conserva el valor de עת / καιροί como momento fijado.
- source_word: להשבית אף / κοπάσαι ὀργήν
  english_pob_choice: to calm wrath
  chosen_spanish: para hacer cesar la ira
  alternatives_spanish:
  - para calmar la ira
  - para detener la ira
  - para aquietar la ira
  lexicon: HALOT; BDAG
  rationale: El verbo hebreo implica causar cese; el griego puede significar detener o calmar. 'Hacer cesar' mantiene con más precisión la fuerza verbal y evita suavizar demasiado el sentido de un freno efectivo sobre la ira.
- source_word: לפני חרון אל / πρὸ θυμοῦ
  english_pob_choice: before fury
  chosen_spanish: antes del furor
  alternatives_spanish:
  - antes de la furia
  - antes de la ira ardiente
  - antes del furor de Dios
  lexicon: HALOT; BDAG
  rationale: La línea hebrea menciona explícitamente el ardor de la ira divina, mientras que el griego abrevia a 'furor'. 'Antes del furor' reproduce la brevedad del paralelo griego y mantiene la relación temporal. La nota preserva la tensión con el hebreo más pleno.
- source_word: להשיב לב אבות על בנים / ἐπιστρέψαι καρδίαν πατρὸς πρὸς υἱὸν
  english_pob_choice: to turn the heart of fathers to sons
  chosen_spanish: para volver el corazón de los padres a los hijos
  alternatives_spanish:
  - para volver el corazón de los padres hacia los hijos
  - para reconciliar a padres e hijos
  - para volver el corazón de los padres a sus hijos
  lexicon: HALOT; BDAG
  rationale: Se conserva el giro bíblico 'volver el corazón' en lugar de sustituirlo por 'reconciliar', para no borrar el eco profético. El plural 'padres ... hijos' sigue el hebreo transmitido, aun cuando el griego singulariza.
- source_word: ולהכין שבטי ישראל / καταστῆσαι φυλὰς Ἰακώβ
  english_pob_choice: to restore the tribes of Israel
  chosen_spanish: para restablecer las tribus de Israel
  alternatives_spanish:
  - para restaurar las tribus de Israel
  - para poner en orden las tribus de Israel
  - para reestablecer las tribus de Israel
  lexicon: HALOT; BDAG
  rationale: '''Restablecer'' recoge la fuerza de להכין y καταστῆσαι en el contexto de renovación y orden restaurado. ''Israel'' sigue el hebreo, mientras que la variante griega ''Jacob'' queda registrada en nota.'
theological_decisions:
- issue: Uso conjunto de hebreo y griego en Sirácida 48:10, donde el hebreo está conservado con leve discrepancia
  english_pob_reading: The main line follows the sense of the surviving Hebrew, while footnotes preserve the Greek and Hebrew textual differences.
  chosen_spanish_reading: La línea principal sigue el sentido del hebreo conservado y las notas preservan las diferencias textuales con el griego.
  alternative_spanish_readings:
  - 'Una versión más griega: ''el que fue registrado para reprensiones en tiempos señalados'''
  - 'Una versión más hebrea: ''el que fue escrito/establecido para el tiempo'''
  rationale: Como el hebreo de Sirácida sobreviene aquí, conviene dejar que guíe la redacción principal; pero el paralelo griego no puede tratarse como mera glosa. La formulación española evita borrar la tensión textual y mantiene una traducción publicable y auditable.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach where it survives; Translation philosophy §1, §5'
- issue: Mantener el idioma profético de la restauración familiar sin convertirlo en una explicación completa
  english_pob_reading: to turn the heart of fathers to sons
  chosen_spanish_reading: volver el corazón de los padres a los hijos
  alternative_spanish_readings:
  - reconciliar a padres e hijos
  - hacer que padres e hijos se vuelvan unos a otros
  rationale: El texto evoca la fórmula profética asociada con Elías. Conservar 'volver el corazón' preserva la resonancia intertextual y evita añadir una interpretación social o psicológica más amplia que el verso no explicita.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que ajustó la cláusula inicial a 'for the appointed time' y el plural 'fathers ... sons'. La redacción española adopta también el sentido de designación temporal y el plural familiar, mientras conserva la tensión textual entre el hebreo más pleno y el griego más breve mediante notas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' cuando el texto lo requiera explícitamente en otras unidades, pero aquí el hebreo dice 'Dios' en la expansión nota; por eso no aparece en la línea principal.
  - Se mantiene 'Israel' en el cuerpo y 'Jacob' en nota conforme al testimonio griego.
  - '''Hacer cesar'' se prefiere a ''calmar'' para no diluir la fuerza del verbo causativo.'
  - La puntuación sigue normas españolas con comas seriales y sin calco innecesario del inglés.
