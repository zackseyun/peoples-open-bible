translation:
  language: es
  text: El favor del rey es para un siervo que actúa con sabiduría[a], pero su ira es contra el que trae vergüenza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «prudente» o «hábil». El participio puede expresar actuar con discernimiento, prudencia o destreza.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «su ira es/será para/contra el que trae vergüenza». El hebreo no añade futuridad explícita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְצוֹן
  english_pob_choice: favor
  chosen_spanish: benevolencia
  alternatives_spanish:
  - favor
  - agrado
  - buena disposición
  lexicon: HALOT
  rationale: En el contexto cortesano del proverbio, el término expresa la disposición favorable del rey. «Benevolencia» comunica esa actitud favorable con dignidad en español y evita un uso demasiado coloquial de «favor».
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  lexicon: HALOT
  rationale: Es la correspondencia directa y natural del sustantivo común hebreo.
- source_word: לְעֶבֶד
  english_pob_choice: for a servant / toward a servant
  chosen_spanish: hacia un esclavo
  alternatives_spanish:
  - hacia un siervo
  - para un esclavo
  - hacia un servidor
  lexicon: HALOT
  rationale: La preposición ל marca dirección o relación hacia la cual se orienta la benevolencia. Se mantiene la fuerza léxica de δοῦλος con «esclavo», ya que el texto hebreo usa עֶבֶד y el audit trail inglés preserva la fricción semántica al no suavizarla con «siervo».
- source_word: מַשְׂכִּיל
  english_pob_choice: who acts wisely
  chosen_spanish: que actúa con sabiduría
  alternatives_spanish:
  - prudente
  - hábil
  - que actúa con discernimiento
  - que tiene entendimiento
  lexicon: HALOT
  rationale: El participio hifil de שׂכל puede expresar actuar con entendimiento, prudencia o éxito. «Que actúa con sabiduría» conserva el valor verbal y encaja bien con la ética práctica de Proverbios.
- source_word: וְעֶבְרָתוֹ
  english_pob_choice: but his wrath
  chosen_spanish: pero su ira
  alternatives_spanish:
  - pero su furia
  - pero su cólera
  - y su ira
  lexicon: HALOT
  rationale: עֶבְרָה denota ira intensa o desbordada. En español, «ira» comunica el campo semántico con claridad y dignidad; la oposición adversativa con «pero» reproduce el contraste proverbial.
- source_word: תִּהְיֶה
  english_pob_choice: is / will be
  chosen_spanish: es
  alternatives_spanish:
  - será
  - está
  lexicon: HALOT
  rationale: El hebreo usa היה sin necesidad de marcar futuro explícito. «Es» sigue de cerca el valor aspectual del enunciado, como reflejó la revisión inglesa al retirar la futuridad añadida.
- source_word: מֵבִישׁ
  english_pob_choice: one who brings shame
  chosen_spanish: el que trae vergüenza
  alternatives_spanish:
  - el que causa vergüenza
  - el avergonzador
  - el que deshonra
  lexicon: HALOT
  rationale: El participio hifil de בוש tiene fuerza causativa. «El que trae vergüenza» preserva el sentido activo y resulta natural en español, manteniendo la relación verbal del original.
theological_decisions:
- issue: El alcance social de עֶבֶד en un contexto real/cortesano
  english_pob_reading: The proverb emphasizes court service and competence rather than bonded status; English chose 'servant' for readability.
  chosen_spanish_reading: «Esclavo» conserva la dureza del término hebreo, aunque en el contexto se entiende como servidor de corte.
  alternative_spanish_readings:
  - siervo
  - servidor
  - criado
  rationale: El audit trail inglés optó por suavizar a «servant» por fluidez, pero el proyecto pide no borrar tensiones léxicas documentadas. En español, «esclavo» mantiene la fuerza de עֶבֶד; la nota alternativa permite leerlo también como servidor de corte sin ocultar el léxico original.
  doctrine_reference: Lexical/theological tension in wisdom terminology; no doctrinal claim beyond the text.
translation_notes:
  revision_awareness: 'El inglés revisado cambió «is for» a «is toward» y ajustó «will be against» a «is against» para reflejar más directamente el hebreo. La versión española sigue esa línea: usa una relación direccional con «hacia» y evita añadir un futuro que el hebreo no exige.'
  spanish_consistency_notes:
  - Se mantiene «rey» para מֶלֶךְ en armonía con el uso bíblico habitual.
  - Se preserva la oposición proverbial con «pero» para reflejar el contraste entre benevolencia e ira.
  - «Benevolencia» se usa aquí como equivalente elegante de רְצוֹן, evitando reducirlo a un mero «favor» cuando el contexto cortesano permite un matiz más amplio.
