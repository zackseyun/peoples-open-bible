translation:
  language: es
  text: Pero ustedes son los que abandonan a Yahvé, los que olvidan mi monte santo, los que preparan una mesa para Gad[a] y los que llenan vino mezclado[c] para Meni[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gad probablemente era el nombre de una deidad asociada con la fortuna; alternativamente, «para Fortuna».
    reason: alternative_reading
  - marker: b
    text: Meni probablemente era el nombre de una deidad asociada con el destino; alternativamente, «para Destino».
    reason: alternative_reading
  - marker: c
    text: O «bebida mezclada»; la frase se refiere a una bebida preparada para una ofrenda de libación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתֶּם
  english_pob_choice: But you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Y ustedes
  - Pero en cuanto a ustedes
  lexicon: HALOT
  rationale: La partícula conjuntiva con el pronombre independiente marca contraste con el contexto anterior; «Pero ustedes» conserva ese giro adversativo de forma natural en español.
- source_word: עֹזְבֵי
  english_pob_choice: those who forsake
  chosen_spanish: los que abandonan
  alternatives_spanish:
  - los que forsiguen
  - los que dejan
  - abandonadores de
  lexicon: HALOT
  rationale: El participio describe al grupo de manera sustantiva. «Abandonan» transmite bien la fuerza relacional/covenantal de עזב sin sonar arcaico como «desamparar».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte por el nombre divino «Yahvé», conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: הַשְּׁכֵחִים
  english_pob_choice: who forget
  chosen_spanish: los que olvidan
  alternatives_spanish:
  - los que se olvidan de
  - los que descuidan
  lexicon: HALOT
  rationale: El participio sigue calificando al mismo grupo. «Olvidan» conserva la sencillez y la fuerza del hebreo; «descuidan» suavizaría el sentido.
- source_word: אֶת הַר קָדְשִׁי
  english_pob_choice: my holy mountain
  chosen_spanish: mi monte santo
  alternatives_spanish:
  - mi montaña santa
  - el monte de mi santidad
  lexicon: HALOT
  rationale: La expresión idiomática se refiere a Sion. «Monte santo» es la forma más natural y fiel en español para conservar el valor cultual y geográfico.
- source_word: הָעֹרְכִים לַגַּד שֻׁלְחָן
  english_pob_choice: who set a table for Gad
  chosen_spanish: los que preparan una mesa para Gad
  alternatives_spanish:
  - los que disponen una mesa para Gad
  - los que ponen una mesa para Gad
  lexicon: HALOT
  rationale: Con «mesa» como objeto, ערך significa disponer o preparar. «Preparan una mesa» reproduce bien la idea ritual sin forzar una modulación excesiva.
- source_word: לַגַּד
  english_pob_choice: for Gad
  chosen_spanish: para Gad
  alternatives_spanish:
  - para Fortuna
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado en el texto principal, siguiendo la práctica del proyecto para nombres de deidades o poderes personificados; el posible sentido se preserva en nota.
- source_word: וְהַמְמַלְאִים
  english_pob_choice: and who fill
  chosen_spanish: y los que llenan
  alternatives_spanish:
  - y los que colman
  - y los que echan
  lexicon: HALOT
  rationale: El verbo literalmente es «llenar». Mantenerlo evita adelantar una interpretación demasiado específica y permite que el contexto cultual indique la acción.
- source_word: לַמְנִי
  english_pob_choice: for Meni
  chosen_spanish: para Meni
  alternatives_spanish:
  - para Destino
  lexicon: HALOT
  rationale: Se translitera el nombre en el texto principal por tratarse probablemente de una deidad o poder personificado; la alternativa semántica queda registrada en nota.
- source_word: מִמְסָךְ
  english_pob_choice: mixed wine
  chosen_spanish: una libación
  alternatives_spanish:
  - vino mezclado
  - bebida mezclada
  - ofrenda de libación
  lexicon: HALOT
  rationale: En este contexto cultual, el término apunta a una bebida preparada para derramarse u ofrecerse. «Libación» comunica mejor el valor ritual en español, mientras que la variante literal se conserva en la nota.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El verso usa directamente el Tetragrámaton. Se mantiene el nombre divino en una forma española estable y reverente, sin sustituirlo por «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Tratamiento de Gad y Meni
  english_pob_reading: Transliterate as Gad and Meni in the main text
  chosen_spanish_reading: Transliterar como Gad y Meni en el texto principal
  alternative_spanish_readings:
  - Traducir como Fortuna y Destino
  rationale: El contexto sugiere nombres de deidades o poderes personificados. Se conserva esa lectura en el texto principal y se deja la alternativa semántica en nota para no borrar la tensión interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; §3
- issue: Valor de מִמְסָךְ
  english_pob_reading: mixed wine / prepared libation beverage
  chosen_spanish_reading: una libación
  alternative_spanish_readings:
  - vino mezclado
  - bebida mezclada
  - bebida para libación
  rationale: La imagen es cultual y apunta a una bebida preparada para el rito. «Libación» es la forma más clara y teológicamente transparente en español, sin perder la conexión con el preparado líquido del término hebreo.
  doctrine_reference: DOCTRINE.md lexical transparency and cultic-context rendering
translation_notes:
  revision_awareness: Se revisó el pasaje con base en el texto hebreo WLC, la traducción inglesa POB y su aparato crítico. No se requirieron cambios respecto de la última revisión; se mantuvo la lectura de nombres propios para Gad y Meni y la equivalencia cultual para מִמְסָךְ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יהוה en todo el texto principal.
  - Se conserva el paralelismo participial con «los que…» para reflejar la acumulación descriptiva del hebreo.
  - «Monte santo» se usa como equivalente idiomático de אֶת הַר קָדְשִׁי en lugar de una traducción demasiado literal.
  - Las notas distinguen entre traducción por nombre propio y lectura semántica alternativa sin borrar la ambigüedad documental del hebreo.
