review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la exclusividad de רַק, la transparencia léxica de יָדַעְתִּי como «he conocido», y «iniquidades» para עֲוֺנֹתֵיכֶם. Sin embargo, se aparta del audit trail inglés y del sentido más directo de אֶפְקֹד עֲלֵיכֶם al traducir «haré venir sobre ustedes el castigo», formulación que introduce «castigo» sin base léxica explícita y desplaza el objeto directo real del hebreo, que son «todas sus iniquidades».
  spanish_quality_summary: El español es mayormente claro y digno, pero «haré venir sobre ustedes el castigo por todas sus iniquidades» suena más perifrástico y menos natural que una forma judicial directa como «los castigaré por todas sus iniquidades». Además, falta en español una nota equivalente a la nota inglesa sobre la formulación más literal «visitaré sobre ustedes / haré rendir cuentas», que ayuda a documentar la decisión léxica.
  glossary_alignment: No hay conflictos con la terminología del proyecto en este versículo. «Conocido» respeta la decisión teológica documentada; «iniquidades» está bien alineado. El único ajuste necesario es hacer que פקד refleje mejor la decisión POB de traducirlo en texto principal como castigo, con nota para la alternativa más literal.
  issues:
  - severity: high
    issue: La traducción de אֶפְקֹד עֲלֵיכֶם como «haré venir sobre ustedes el castigo» no preserva con precisión la estructura ni la decisión auditada.
    rationale: El hebreo dice literalmente «visitaré sobre ustedes» con «todas sus iniquidades» como objeto; la opción española añade el sustantivo «castigo», no presente en el original, y debilita la correspondencia con la decisión inglesa principal «I will punish you».
  - severity: medium
    issue: Falta una nota española para la alternativa más literal de פקד.
    rationale: El audit trail inglés conserva en nota «I will visit upon you ... / call you to account». Como el texto español adopta una opción interpretativa en el cuerpo principal, conviene reflejar la alternativa literal en una nota anclada.
  - severity: low
    issue: La nota sobre «Solo» es aceptable pero no necesaria para la fidelidad principal.
    rationale: No es errónea, pero la alternativa «únicamente» no aporta una diferencia sustancial. Puede mantenerse o omitirse; no afecta la revisión principal.
  revised_spanish_text: Solo[a] a ustedes he conocido[b] de entre todas las familias de la tierra; por tanto, los castigaré[c] por todas sus iniquidades.
  revised_footnotes:
  - marker: a
    text: 'O: «únicamente». La partícula hebrea inicial expresa exclusividad enfática.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «he elegido» o «he reconocido». El hebreo «conocer» puede implicar relación de pacto.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «visitaré sobre ustedes todas sus iniquidades»; es decir, «les pediré cuentas por ellas».
    reason: lexical_alternative
  revision_rationale: 'Se corrige la cláusula final para alinearla con el hebreo y con la decisión POB auditada: en el texto principal se expresa el sentido judicial directo de פקד como «los castigaré», mientras que la formulación más literal se preserva en nota. Se mantienen «he conocido» e «iniquidades» por su fidelidad léxica y teológica.'
