translation:
  language: es
  text: Casa de Aarón, confíen en Yahvé; él es su ayuda y su escudo.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: בֵּית אַהֲרֹן
  english_pob_choice: House of Aaron
  chosen_spanish: Casa de Aarón
  alternatives_spanish:
  - hogar de Aarón
  - descendencia de Aarón
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «casa de Aarón» y funciona aquí como vocativo dirigido al linaje sacerdotal. «Casa de Aarón» conserva el idiomatismo y la forma breve del paralelismo del salmo sin volverlo explicativo en exceso.
- source_word: בִּטְח֣וּ
  english_pob_choice: trust
  chosen_spanish: confíen
  alternatives_spanish:
  - pongan su confianza
  - confíen ustedes
  lexicon: HALOT
  rationale: El verbo es un imperativo plural de confiar. En español, «confíen» expresa de manera natural la exhortación directa y mantiene el mandato colectivo del hebreo.
- source_word: בַ/יהוָ֑ה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  - en el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יהוה: «Yahvé». La preposición ב indica el objeto de la confianza, por lo que «en Yahvé» reproduce la relación verbal sin sustituir el nombre divino por una máscara tradicional.'
- source_word: עֶזְרָ֖/ם
  english_pob_choice: their help
  chosen_spanish: su ayuda
  alternatives_spanish:
  - su socorro
  - el que les ayuda
  lexicon: HALOT
  rationale: El sustantivo עֵזֶר con sufijo de tercera persona plural significa «su ayuda». En español, «su ayuda» conserva el sustantivo concreto y evita convertir la metáfora en una paráfrasis como «el que les ayuda».
- source_word: וּ/מָגִנָּ֣/ם
  english_pob_choice: and their shield
  chosen_spanish: y su escudo
  alternatives_spanish:
  - y su protector
  - y su defensa
  lexicon: HALOT
  rationale: מָגֵן significa literalmente «escudo». Se mantiene la imagen concreta, que es central en el lenguaje poético de los Salmos, en lugar de abstraerla a «protector».
- source_word: הֽוּא
  english_pob_choice: he is
  chosen_spanish: él es
  alternatives_spanish:
  - es él
  - es
  lexicon: HALOT
  rationale: El pronombre independiente marca una cláusula enfática. En español, «él es» conserva esa fuerza sin añadir exclusividad que no está en el hebreo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Conforme al criterio del proyecto, se translitera como «Yahvé» en el texto principal para mantener auditable el nombre del pacto y no ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Relación sintáctica entre el mandato y la cláusula descriptiva
  english_pob_reading: he is their help and their shield
  chosen_spanish_reading: él es su ayuda y su escudo
  alternative_spanish_readings:
  - él es vuestra ayuda y vuestro escudo
  - él es la ayuda y el escudo de ustedes
  rationale: El hebreo pasa del imperativo de segunda persona plural a una afirmación en tercera persona plural con sufijos posesivos. «Su ayuda y su escudo» conserva ese cambio de persona y evita suavizarlo a segunda persona, lo que borraría una decisión textual relevante.
  doctrine_reference: Gramática hebrea del versículo; concordancia de sufijos pronominales
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo directo y toma en cuenta la revisión reciente del audit trail: se preserva el vocativo («Casa de Aarón») y el giro en tercera persona plural («su ayuda y su escudo»), evitando la nivelación a segunda persona que apareció en una pasada intermedia del inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conserva el paralelismo breve y poético del verso sin añadir verbos o posesivos ajenos al hebreo.
  - «Casa de Aarón» se usa como vocativo, no como descripción institucional ampliada.
  - «Su ayuda y su escudo» refleja los sufijos plurales del hebreo y evita singularizar el referente.
