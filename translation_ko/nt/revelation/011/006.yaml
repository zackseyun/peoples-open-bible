  text: 이들은 그들의 예언의 날들 동안에 비가 내리지 못하도록 하늘을 닫을 권세를 가졌으며, 물을 다스려 피로 변하게 하고, 그들이 원할 때마다 모든 재앙으로 땅을 치는 권세를 가졌습니다.
