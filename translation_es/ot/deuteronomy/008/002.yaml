translation:
  language: es
  text: Y recordarás todo el camino por donde Yahvé tu Dios te ha conducido estos cuarenta años en el desierto[a], para humillarte, para probarte, para saber lo que había en tu corazón, si guardarías sus mandamientos o no.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para revelar lo que había en tu corazón». El hebreo dice literalmente «para saber lo que había en tu corazón», expresión conservada en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכַרְתָּ
  english_pob_choice: And you shall remember
  chosen_spanish: Y recordarás
  alternatives_spanish:
  - Y debes recordar
  - Y debes tener presente
  lexicon: HALOT
  rationale: El perfecto con waw en discurso exhortativo funciona como mandato/futuro en español; «recordarás» conserva el tono imperativo-promisorio sin sonar forzado.
- source_word: כָּל הַדֶּרֶךְ
  english_pob_choice: all the way
  chosen_spanish: todo el camino
  alternatives_spanish:
  - toda la travesía
  - todo el recorrido
  lexicon: HALOT
  rationale: «Camino» reproduce el sentido de trayectoria/curso de la experiencia en el desierto, y «todo» mantiene la totalidad del recorrido.
- source_word: הֹלִיכֲךָ
  english_pob_choice: has led you
  chosen_spanish: te ha conducido
  alternatives_spanish:
  - te ha guiado
  - te ha hecho andar
  lexicon: HALOT
  rationale: El hiphil de הלך es causativo; «ha conducido» expresa guía divina de forma natural y cercana al valor de «has led you».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino en vez de una sustitución titular.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: Es la forma posesiva estándar y conserva la relación pactual directa del hebreo.
- source_word: זֶה אַרְבָּעִים שָׁנָה
  english_pob_choice: these forty years
  chosen_spanish: estos cuarenta años
  alternatives_spanish:
  - por cuarenta años
  - durante cuarenta años
  lexicon: HALOT
  rationale: 'El español idiomático exige plural demostrativo: «estos cuarenta años», que mantiene la duración concreta y el carácter retrospectivo.'
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el yermo
  - en la estepa
  lexicon: HALOT
  rationale: «Desierto» comunica bien el entorno geográfico y resulta natural en español; aquí no hace falta la carga literaria específica de «wilderness».
- source_word: לְמַעַן
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el fin de
  lexicon: HALOT
  rationale: En español, «para» expresa finalidad de manera clara y suficiente sin añadir rigidez innecesaria.
- source_word: עַנֹּתְךָ
  english_pob_choice: to humble you
  chosen_spanish: para humillarte
  alternatives_spanish:
  - para afligirte
  - para abatirte
  lexicon: HALOT
  rationale: En este contexto, ענה apunta a rebajamiento/humillación mediante la experiencia del desierto; «humillarte» preserva ese valor sin convertirlo en mera aflicción física.
- source_word: לְנַסֹּתְךָ
  english_pob_choice: to test you
  chosen_spanish: para probarte
  alternatives_spanish:
  - para examinarte
  - para ponerte a prueba
  lexicon: HALOT
  rationale: «Probarte» es un equivalente natural de נסה y conserva el sentido evaluativo de la prueba divina.
- source_word: לָדַעַת
  english_pob_choice: to know
  chosen_spanish: para saber
  alternatives_spanish:
  - para conocer
  - para darte a conocer
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad; en español, «para saber» comunica de manera directa el propósito sin perder la formulación antropomórfica del hebreo.
- source_word: אֶת אֲשֶׁר בִּלְבָבְךָ
  english_pob_choice: what was in your heart
  chosen_spanish: lo que había en tu corazón
  alternatives_spanish:
  - lo que estaba en tu corazón
  - lo que había en tu interior
  lexicon: HALOT
  rationale: «Corazón» es el equivalente bíblico normal de לֵבָב y conserva la esfera interior de voluntad, pensamiento y deseo.
- source_word: הֲתִשְׁמֹר מִצְוֹתָיו אִם לֹא
  english_pob_choice: whether you would keep his commandments or not
  chosen_spanish: si guardarías sus mandamientos o no
  alternatives_spanish:
  - si obedecerías sus mandamientos o no
  - si observarías sus mandamientos o no
  lexicon: HALOT
  rationale: «Guardar» reproduce היטב el campo semántico de שמר aplicado a mandamientos y mantiene la idiomaticidad bíblica en español.
theological_decisions:
- issue: 'Lenguaje antropomórfico: «para saber lo que había en tu corazón»'
  english_pob_reading: Retain the direct wording 'to know' without softening or resolving the theological tension.
  chosen_spanish_reading: Mantener «para saber lo que había en tu corazón» sin explicarlo ni resolverlo.
  alternative_spanish_readings:
  - para revelar lo que había en tu corazón
  - para hacer manifiesto lo que había en tu corazón
  rationale: El hebreo dice literalmente «para saber»; la versión española conserva esa formulación para no diluir la tensión teológica presente en el texto, tal como hace la POB en inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no hubo cambios necesarios y el veredicto de control cruzado fue de alto acuerdo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según el estándar del proyecto para יהוה.
  - Se usa «mandamientos» para מצוות, siguiendo el valor pactual de obediencia.
  - «Corazón» conserva el sentido bíblico del centro interior de la persona.
  - No se neutraliza la formulación «para saber», a fin de preservar la tensión antropomórfica documentada en el audit trail.
