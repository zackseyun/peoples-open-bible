translation:
  language: es
  text: En Dios alabaré la palabra[a]; en Yahvé alabaré la palabra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «promesa» para «palabra» en ambas líneas; דָּבָר puede significar «palabra», «asunto» o «promesa» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאלֹהִים
  english_pob_choice: In God
  chosen_spanish: En Dios
  alternatives_spanish:
  - Por Dios
  - Con Dios
  lexicon: HALOT
  rationale: El hebreo con ב más אֱלֹהִים funciona de manera locativa o relacional; en español, «En Dios» conserva la relación y el paralelismo con la segunda cola, sin convertir a Dios en mero instrumento de la acción.
- source_word: אֲהַלֵּל
  english_pob_choice: I will praise
  chosen_spanish: alabaré
  alternatives_spanish:
  - praise
  - yo alabaré
  - quiero alabar
  lexicon: HALOT
  rationale: El imperfecto piel de הלל expresa aquí resolución futura en poesía. «Alabaré» es natural en español y mantiene el valor volitivo/futuro del texto.
- source_word: דָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - la palabra
  - el dicho
  - la promesa
  - el asunto
  lexicon: HALOT
  rationale: דָּבָר puede significar «palabra», «asunto» o «promesa». Se mantiene «la palabra» para conservar la forma léxica y la repetición poética, dejando abierta la posible referencia a la promesa divina sin decidirla en el cuerpo principal.
- source_word: בַּיהוָה
  english_pob_choice: in the LORD
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en el SEÑOR
  - en Yahvé
  - por Yahvé
  lexicon: HALOT
  rationale: Se traduce el Tetragrámaton como «Yahvé» según la norma del proyecto. Se conserva también la preposición relacional «en» para reproducir el paralelismo del versículo.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh rather than the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  - el SEÑOR
  rationale: El hebreo emplea יהוה directamente. En español del proyecto se mantiene el nombre del pacto como «Yahvé», evitando el sustituto litúrgico «SEÑOR» y conservando la referencia explícita al nombre divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Sentido de דָּבָר
  english_pob_reading: word / promise
  chosen_spanish_reading: la palabra
  alternative_spanish_readings:
  - la promesa
  - el dicho
  - el asunto
  rationale: La POB inglesa preserva la ambigüedad entre «word» y «promise». En español, «la palabra» conserva esa apertura semántica y suena natural en paralelo poético; una nota explica la alternativa de «promesa».
  doctrine_reference: HALOT entry for דבר; Psalm 56:10-11 context
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la audición inglesa actual; no se requieren cambios textuales adicionales. Se conserva la repetición paralela de «alabaré la palabra» en ambas colas, y el nombre divino se vierte consistentemente como «Yahvé».
  spanish_consistency_notes:
  - Se evita «SEÑOR» para יהוה según la política del proyecto.
  - «Alabaré» mantiene el tono vow-like del hebreo y del inglés POB.
  - La nota léxica sobre דָּבָר cubre la ambigüedad preservada en el texto inglés.
