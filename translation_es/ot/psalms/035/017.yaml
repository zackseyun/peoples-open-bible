  text: אֲדֹנָ/י֮ כַּ/מָּ֪ה תִּ֫רְאֶ֥ה הָשִׁ֣יבָ/ה נַ֭פְשִׁ/י מִ/שֹּׁאֵי/הֶ֑ם מִ֝/כְּפִירִ֗ים יְחִידָתִֽ/י׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/035/017.yaml
  text: Lord[a], how long will you look on? Restore my soul from their ravages[c][b], my only one from the young lions.
  footnotes:
  - marker: a
    text: Or 'Restore my soul' or 'Restore me.' The Hebrew nephesh often means 'life,' 'self,' or 'soul' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'from their destructions' or 'from those who ravage me.' The Hebrew expression is difficult and refers to the enemies' destructive attacks.
    reason: lexical_alternative
  - marker: c
    text: '''My only one'' likely means ''my precious life''—the one life I have.'
    reason: lexical_alternative
