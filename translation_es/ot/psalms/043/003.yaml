translation:
  language: es
  text: Envía tu luz y tu verdad[a]; que ellas me guíen; que me lleven a tu santo monte y a tus moradas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu fidelidad» para «tu verdad» (אֱמֶת), pues el término hebreo puede denotar verdad, confiabilidad o fidelidad.
    reason: lexical_alternative
  - marker: b
    text: «Tus moradas» refleja una forma plural hebrea; tradicionalmente, «tus tabernáculos».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלַח
  english_pob_choice: Send out
  chosen_spanish: Envía
  alternatives_spanish:
  - Manda
  - Envía afuera
  lexicon: HALOT
  rationale: El imperativo pide una acción dirigida hacia fuera o hacia adelante. En español, «envía» comunica bien el ruego poético sin la dureza de «manda» ni la rareza de «envía afuera».
- source_word: אוֹרְךָ
  english_pob_choice: your light
  chosen_spanish: tu luz
  alternatives_spanish:
  - tu resplandor
  - tu iluminación
  lexicon: HALOT
  rationale: אוֹר designa de manera directa «luz». Mantener «luz» conserva la imagen concreta y permite la carga de guía y salvación sin explicitarla en exceso.
- source_word: אֲמִתְּךָ
  english_pob_choice: your truth
  chosen_spanish: tu verdad
  alternatives_spanish:
  - tu fidelidad
  - tu fiabilidad
  lexicon: HALOT
  rationale: אֱמֶת puede abarcar verdad, fidelidad o confiabilidad. «Verdad» es la correspondencia más directa y preserva la amplitud semántica; la posible idea de fidelidad queda abierta en nota.
- source_word: הֵמָּה
  english_pob_choice: them
  chosen_spanish: ellas
  alternatives_spanish:
  - ellos
  - ellas mismas
  lexicon: HALOT
  rationale: El pronombre independiente retoma «luz» y «verdad», ambos femeninos en español. «Ellas» mantiene la referencia y suena natural, sin perder el énfasis del hebreo.
- source_word: יַנְח֑וּנִי
  english_pob_choice: let them lead me
  chosen_spanish: que ellas me guíen
  alternatives_spanish:
  - que me conduzcan
  - que me lleven
  lexicon: HALOT
  rationale: El imperfecto con valor jussivo se expresa de forma natural con «que + subjuntivo». «Guiar» conserva la imagen de dirección providencial mejor que un simple «llevar».
- source_word: יְבִיא֥וּנִי
  english_pob_choice: let them bring me
  chosen_spanish: que me lleven
  alternatives_spanish:
  - que me conduzcan
  - que me traigan
  lexicon: HALOT
  rationale: En este paralelo poético, «llevar» comunica el movimiento hacia el destino sagrado con claridad y fluidez. Se evita una repetición innecesaria de «traer» en español.
- source_word: הַר קָדְשְׁךָ
  english_pob_choice: your holy mountain
  chosen_spanish: tu santo monte
  alternatives_spanish:
  - tu monte santo
  - tu monte sagrado
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «monte de tu santidad», pero en español bíblico «santo monte» es natural y fiel. Se evita especificar Zion/templo, como en el audit trail inglés.
- source_word: מִשְׁכְּנוֹתֶיךָ
  english_pob_choice: your dwelling places
  chosen_spanish: tus moradas
  alternatives_spanish:
  - tus habitaciones
  - tus tabernáculos
  - tus lugares de morada
  lexicon: HALOT
  rationale: El plural hebreo se conserva mejor con «moradas», breve y poético. «Tabernáculos» sería más tradicional, pero en español puede sonar técnico o arcaico sin necesidad.
theological_decisions:
- issue: Cómo reflejar la relación entre «tu luz» y «tu verdad»
  english_pob_reading: 'Mantener la personificación poética con verbos plurales: «let them lead me; let them bring me.»'
  chosen_spanish_reading: 'Mantener la personificación poética: «que ellas me guíen; que me lleven».'
  alternative_spanish_readings:
  - que me guíen y me lleven
  - que tu luz y tu verdad me conduzcan
  rationale: El hebreo trata a «luz» y «verdad» como agentes poéticos reales en la sintaxis. El español conserva esa personificación sin convertirla en una paráfrasis explicativa que atenúe la fuerza del verso.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Si identificar en el texto principal el monte con Sion o las moradas con el templo
  english_pob_reading: 'Traducir de manera genérica: «your holy mountain» y «your dwelling places», sin añadir «Zion» o «temple».'
  chosen_spanish_reading: 'Traducir de manera genérica: «tu santo monte» y «tus moradas».'
  alternative_spanish_readings:
  - tu monte santo
  - tu santuario
  - tu templo
  rationale: El hebreo usa expresiones poéticas amplias. Traducirlas de modo genérico preserva la imagen y evita introducir una identificación más específica de la que el versículo formula explícitamente.
  doctrine_reference: Translation philosophy §1, §6
- issue: Cómo manejar la posible amplitud semántica de אֱמֶת
  english_pob_reading: «your truth», con nota alternativa «your faithfulness».
  chosen_spanish_reading: «tu verdad», con nota alternativa sobre «tu fidelidad».
  alternative_spanish_readings:
  - tu fidelidad
  - tu lealtad
  rationale: «Verdad» es la correspondencia más directa; la nota preserva la tensión lexical reconocida por la tradición de traducción sin imponer una sola matización.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la decisión auditada del POB inglés: conservar «luz» y «verdad» en el texto principal, mantener la personificación con verbos plurales, traducir el sintagma final de manera genérica sin añadir Sion ni templo, y reflejar el plural hebreo de מִשְׁכְּנוֹתֶיךָ mediante «moradas». No se detectaron revisiones posteriores que alteren estas decisiones.'
  spanish_consistency_notes:
  - Se mantiene un registro culto y claro, adecuado para lectura eclesial amplia.
  - Se evita el calco mecánico de «send out» mediante «envía», que en español sostiene el tono poético.
  - «Santo monte» y «moradas» preservan la imaginería bíblica sin sobrerinterpretación.
  - Las notas conservan la alternativa semántica de אֱמֶת y el valor plural de מִשְׁכְּנוֹתֶיךָ.
