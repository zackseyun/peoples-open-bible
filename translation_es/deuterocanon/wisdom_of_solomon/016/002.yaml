translation:
  language: es
  text: En lugar de este castigo[a], hiciste bien a tu pueblo; para un antojo extraño de sabor[b], preparaste codornices como alimento para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En vez de este castigo».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, algo como «para un extraño deseo del apetito, un gusto/sabor»; el griego es comprimido y destaca un deseo inusual de alimento.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθʼ ἧς κολάσεως
  english_pob_choice: Instead of this punishment
  chosen_spanish: En lugar de este castigo
  alternatives_spanish:
  - En vez de este castigo
  - En lugar de ese castigo
  lexicon: LSJ
  rationale: ἀντί con genitivo expresa sustitución o contraste. «Castigo» conserva el valor fuerte de κολάσεως y «en lugar de» reproduce bien la relación de contraste sin añadir interpretación.
- source_word: εὐεργετήσας
  english_pob_choice: you did good to
  chosen_spanish: hiciste bien a
  alternatives_spanish:
  - beneficiaste a
  - trataste con bondad a
  - hiciste el bien a
  lexicon: LSJ
  rationale: El participio indica hacer bien o dispensar beneficio. «Hiciste bien a» mantiene la acción directa y evita cargar la frase con matices litúrgicos que «bendijiste» podría sugerir.
- source_word: τὸν λαόν σου
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu pueblo-escogido
  - tu pueblo como nación
  lexicon: LSJ
  rationale: «Pueblo» es la equivalencia natural de λαός en contexto bíblico y conserva la referencia al pueblo de Dios sin sobreexplicarla.
- source_word: εἰς ἐπιθυμίαν ὀρέξεως
  english_pob_choice: a strange craving of appetite
  chosen_spanish: para un extraño antojo del apetito
  alternatives_spanish:
  - para un deseo extraño del apetito
  - para un apetito con extraño deseo
  - para una avidez extraña del apetito
  lexicon: LSJ
  rationale: La expresión griega es comprimida y enfática. «Antojo del apetito» conserva la redundancia semántica de deseo/craving y «extraño» refleja ξένην como algo fuera de lo habitual.
- source_word: ξένην
  english_pob_choice: strange
  chosen_spanish: extraño
  alternatives_spanish:
  - foráneo
  - inusual
  - ajeno
  lexicon: LSJ
  rationale: En este contexto modifica el deseo o gusto como algo fuera de lo común. «Extraño» suena natural en español y mantiene la idea de singularidad sin forzar un sentido geográfico.
- source_word: γεῦσιν
  english_pob_choice: taste
  chosen_spanish: antojo
  alternatives_spanish:
  - gusto
  - sabor
  - degustación
  lexicon: LSJ
  rationale: Aunque γεῦσιν apunta literalmente a «gusto» o «sabor», en español la frase queda más natural si la idea de experiencia de sabor se integra en «antojo del apetito», preservando el sentido comprimido del griego.
- source_word: τροφὴν ἡτοίμασας
  english_pob_choice: you prepared ... as food
  chosen_spanish: preparaste ... como alimento
  alternatives_spanish:
  - preparaste ... como comida
  - dispusiste ... como alimento
  - preparaste alimento
  lexicon: LSJ
  rationale: ἡτοίμασας es «preparaste» y τροφή es «alimento». «Como alimento» refleja la función del sustantivo sin añadir propósito no explícito en el griego.
- source_word: ὀρτυγομήτραν
  english_pob_choice: quail
  chosen_spanish: codornices
  alternatives_spanish:
  - codorniz
  - aves de codorniz
  lexicon: LSJ
  rationale: El compuesto designa codornices. En español, el plural «codornices» suena mejor como alimento provisto y coincide con el sentido colectivo del pasaje.
theological_decisions:
- issue: Contraste entre castigo y provisión divina
  english_pob_reading: 'The verse is rendered to emphasize contrast: instead of the punishment just mentioned, God did good to his own people by providing food.'
  chosen_spanish_reading: 'El versículo conserva el contraste: en lugar del castigo, Dios hace bien a su pueblo mediante la provisión de alimento.'
  alternative_spanish_readings:
  - Como respuesta a ese castigo, hiciste bien a tu pueblo
  - Frente a ese castigo, hiciste bien a tu pueblo
  rationale: La sintaxis con ἀνθʼ ἧς apunta naturalmente a sustitución o contraste. Mantener ese contraste preserva la tensión teológica sin suavizarla ni resolverla de más.
  doctrine_reference: Mantener la tensión teológica y la relación de contraste sin sobreinterpretar
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió «did good to» sobre «benefited» y eliminó una formulación de propósito demasiado explícita. Por eso el español evita añadir finalidad explicita más allá de la relación marcada por «para» y conserva el contraste directo entre castigo y provisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otros contextos del proyecto, pero en este versículo no aparece el nombre divino.
  - «codornices» se usa en plural por naturalidad española y por el sentido colectivo del alimento proporcionado.
  - Se evita «bendeciste» para no introducir un matiz no documentado en εὐεργετήσας.
