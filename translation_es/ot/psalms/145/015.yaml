translation:
  language: es
  text: Los ojos de todos miran[a] a ti, y tú les das su comida en su tiempo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esperan por ti», «te miran con expectación» o «esperan en ti». El verbo hebreo conlleva espera expectante.
    reason: lexical_alternative
  - marker: b
    text: O «en el momento debido» o «a su debido tiempo».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵי כֹל
  english_pob_choice: The eyes of all
  chosen_spanish: Los ojos de todos
  alternatives_spanish:
  - Los ojos de todas las criaturas
  - Los ojos de cada uno
  lexicon: HALOT
  rationale: Conservo la imagen antropomórfica directa del hebreo. «De todos» mantiene el alcance amplio sin especificar indebidamente el referente.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  lexicon: HALOT
  rationale: La preposición hebrea marca dirección hacia Dios; en español, «a ti» es natural y fiel en un paralelismo poético.
- source_word: יְשַׂבֵּרוּ
  english_pob_choice: look to you
  chosen_spanish: miran
  alternatives_spanish:
  - esperan en ti
  - te esperan
  - miran con expectación hacia ti
  lexicon: HALOT
  rationale: El verbo hebreo puede implicar mirar con expectativa o esperar. Dado que la revisión inglesa eliminó «with hope» por no estar explícito, el español conserva la imagen visual de «miran» y deja la expectativa sugerida por el contexto sin añadirla como glosa principal.
- source_word: נֹתֵן
  english_pob_choice: give
  chosen_spanish: das
  alternatives_spanish:
  - provees
  - entregas
  lexicon: HALOT
  rationale: El participio expresa acción característica o continua. «Das» mantiene cercanía verbal con נתן y suena natural en español bíblico contemporáneo.
- source_word: אָכְלָם
  english_pob_choice: their food
  chosen_spanish: su comida
  alternatives_spanish:
  - su alimento
  - lo que comen
  lexicon: HALOT
  rationale: El sustantivo denota alimento en general, no pan específicamente. «Comida» es claro y amplio en español; el singular posesivo reproduce el sentido colectivo del sufijo.
- source_word: בְּעִתּוֹ
  english_pob_choice: in its time
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su tiempo
  - en el tiempo debido
  lexicon: HALOT
  rationale: El sufijo singular se refiere al momento designado para dar la comida. «En su tiempo» conserva la cercanía formal y la referencia temporal singular.
theological_decisions:
- issue: Alcance de «todos» en la provisión divina
  english_pob_reading: The verse is rendered broadly as 'all' without narrowing the referent.
  chosen_spanish_reading: El verso mantiene «todos» sin restringir el referente.
  alternative_spanish_readings:
  - todos los seres humanos
  - todas las criaturas vivientes
  rationale: El hebreo no explicita si se trata de personas, criaturas o el conjunto de seres dependientes. Mantener la amplitud evita cerrar una tensión que el texto deja abierta y respeta la amplitud poética del salmo.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó la glosa explícita «with hope» porque no está formulada de manera directa en el hebreo. Por eso el español evita sobreinterpretar el verbo principal y conserva la imagen básica de mirar hacia Dios, dejando la expectativa implícita en el contexto.
  spanish_consistency_notes:
  - Se usa «Dios» implícito mediante el pronombre de segunda persona, coherente con el hebreo dirigido a Yahvé.
  - Se evita «SEÑOR» como sustituto del nombre divino, conforme al estándar del proyecto.
  - «Comida» traduce el campo semántico amplio de אָכְלָם sin estrecharlo a «pan».
  - La puntuación reproduce el paralelismo poético con una coma central.
  - No se añade una nota teológica sobre esperanza en el texto principal, para no exceder la evidencia explícita del hebreo.
