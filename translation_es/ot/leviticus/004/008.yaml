  text: וְ/אֶת כָּל חֵ֛לֶב פַּ֥ר הַֽ/חַטָּ֖את יָרִ֣ים מִמֶּ֑/נּוּ אֶת הַ/חֵ֨לֶב֙ הַֽ/מְכַסֶּ֣ה עַל הַ/קֶּ֔רֶב וְ/אֵת֙ כָּל הַ/חֵ֔לֶב אֲשֶׁ֖ר עַל הַ/קֶּֽרֶב־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/004/008.yaml
