translation:
  language: es
  text: Vuélvete a mí y sé bondadoso conmigo[a]; da tu fuerza a tu siervo[b], y salva al hijo de tu sierva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «muéstrame favor». El hebreo expresa la idea de mostrar gracia o favor.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y salva al hijo de tu sierva». El hebreo usa otra expresión paralela de humildad: literalmente, «el hijo de tu sierva».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּנֵה אֵלַי
  english_pob_choice: Turn to me
  chosen_spanish: Vuélvete a mí
  alternatives_spanish:
  - Mira hacia mí
  - Vuelve tu rostro hacia mí
  lexicon: HALOT
  rationale: El hebreo pide que Yahvé dirija su atención hacia el orante. En español, «vuélvete a mí» conserva esa dirección relacional y suena natural en una súplica poética sin perder el sentido imperativo.
- source_word: וְחָנֵּנִי
  english_pob_choice: be gracious to me
  chosen_spanish: ten piedad de mí
  alternatives_spanish:
  - sé gracioso conmigo
  - muéstrame favor
  lexicon: HALOT
  rationale: חנן expresa gracia/favor. Aquí elegí «ten piedad de mí» porque en español transmite de forma clara la súplica de benevolencia divina; sin embargo, se reconoce que desplaza un poco el matiz de favor/gracia hacia compasión.
- source_word: תְּנָה
  english_pob_choice: give
  chosen_spanish: da
  alternatives_spanish:
  - otorga
  - concede
  lexicon: HALOT
  rationale: La forma imperativa de נתן es directa. «Da» mantiene la sencillez y la inmediatez del hebreo.
- source_word: עֻזְּךָ
  english_pob_choice: your strength
  chosen_spanish: tu fuerza
  alternatives_spanish:
  - tu poder
  - tu vigor
  lexicon: HALOT
  rationale: עֹז puede ser fuerza, poder o vigor. «Tu fuerza» es la equivalencia más clara y amplia para el auxilio que el salmista pide.
- source_word: לְעַבְדֶּךָ
  english_pob_choice: to your servant
  chosen_spanish: a tu siervo
  alternatives_spanish:
  - para tu siervo
  - a tu esclavo
  lexicon: HALOT
  rationale: Aunque el campo léxico puede ser «esclavo», en este contexto de oración humilde el POB inglés opta por «servant». En español, «siervo» conserva esa relación de pertenencia y devoción sin introducir de forma innecesaria la dureza de «esclavo».
- source_word: וְהוֹשִׁיעָה
  english_pob_choice: and save
  chosen_spanish: y salva
  alternatives_spanish:
  - y rescata
  - y libra
  lexicon: HALOT
  rationale: ישׁע se traduce de manera directa como «salvar». Se mantiene la amplitud soteriológica del verbo sin especificar en exceso el tipo de rescate.
- source_word: לְבֶן אֲמָתֶךָ
  english_pob_choice: the son of your maidservant
  chosen_spanish: al hijo de tu sierva
  alternatives_spanish:
  - al hijo de tu esclava
  - al hijo de tu criada
  lexicon: HALOT
  rationale: El hebreo dice literalmente «al hijo de tu sierva/female servant». El POB inglés usa «maidservant» para preservar el tono humilde. En español, «sierva» mantiene la transparencia y la dignidad litúrgica; «criada» sería demasiado doméstico y «esclava» demasiado fuerte para el paralelismo poético.
theological_decisions:
- issue: Gracia frente a piedad en וְחָנֵּנִי
  english_pob_reading: be gracious to me
  chosen_spanish_reading: ten piedad de mí
  alternative_spanish_readings:
  - sé gracioso conmigo
  - muéstrame favor
  rationale: El hebreo enfatiza favor inmerecido. «Ten piedad» es una traducción española muy comprensible para una oración, pero suaviza el matiz técnico de gracia/favor. Se deja constancia para no borrar la tensión lexical.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Tratamiento de עבד y אמה como términos de humildad y pertenencia
  english_pob_reading: servant / maidservant
  chosen_spanish_reading: siervo / sierva
  alternative_spanish_readings:
  - esclavo / esclava
  - criado / criada
  rationale: La petición no gira principalmente alrededor de una institución social, sino de una relación de dependencia reverente ante Dios. «Siervo/sierva» conserva el registro bíblico y la humildad del hablante sin exagerar la carga social de esclavitud.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «maidservant» por ritmo y por el matiz de אמה como término de pertenencia doméstica/humilde. En español, «sierva» conserva la dignidad y la claridad sin necesidad de una distinción más arcaizante; la revisión no exige cambiar el núcleo semántico del versículo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el texto hebreo aquí no contiene יהוה ni un sustituto obligatorio; la súplica se dirige a Dios implícitamente por el contexto salmódico.
  - Se eligió un registro poético moderno, no arcaizante, pero compatible con lectura eclesial.
  - «Siervo/sierva» se mantiene como pareja consistente para עבד/אמה en este versículo.
