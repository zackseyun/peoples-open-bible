translation:
  language: es
  text: Y a lo largo del límite de Rubén, desde el lado del oriente hasta el lado del occidente[a], Judá[b], una porción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'lado del mar', que puede funcionar como término direccional con el sentido de 'lado del occidente'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'Judá, uno'. La palabra 'porción' está implícita por la fórmula de repartición de tierras en este capítulo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  english_pob_choice: And along
  chosen_spanish: Y junto a
  alternatives_spanish:
  - Y a lo largo de
  - Y al lado de
  lexicon: HALOT
  rationale: En este contexto de repartición territorial, la preposición expresa ubicación contigua al límite anterior. 'Junto a' comunica relación espacial sin sonar rígido en español.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  - límite territorial
  lexicon: HALOT
  rationale: En una distribución de tierras, 'límite' es natural y preciso para la línea divisoria de la porción tribal.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Rúben
  lexicon: transliteration
  rationale: Se usa la forma española habitual del nombre tribal.
- source_word: מִ/פְּאַת קָדִים
  english_pob_choice: from the eastern side
  chosen_spanish: desde el lado del oriente
  alternatives_spanish:
  - desde el lado oriental
  - desde el extremo oriental
  - desde el lado de oriente
  lexicon: HALOT
  rationale: פְּאָה denota lado/extremo. 'Lado del oriente' preserva la orientación espacial de la fórmula y suena idiomático en español.
- source_word: עַד פְּאַת יָמָּה
  english_pob_choice: to the western side
  chosen_spanish: hasta el lado del occidente
  alternatives_spanish:
  - hasta el lado occidental
  - hasta el lado del mar
  - hasta el occidente
  lexicon: HALOT
  rationale: יַמָּה puede funcionar direccionalmente como 'al occidente'. 'Occidente' conserva la referencia geográfica sin depender de la imagen de 'mar'.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: transliteration
  rationale: Se mantiene la forma española estándar del nombre tribal.
- source_word: אֶחָד
  english_pob_choice: one portion
  chosen_spanish: una porción
  alternatives_spanish:
  - una
  - una sola porción
  - un lote
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'uno', pero en la fórmula de reparto la unidad implícita es una porción de tierra. En español conviene explicitarlo para evitar oscuridad, sin ampliar más allá del marco del reparto.
translation_notes:
  revision_awareness: 'La redacción española sigue la estructura list-like del hebreo: una cláusula inicial de ubicación, luego el tramo direccional, y finalmente la asignación de Judá. No se introducen notas porque el texto puede leerse con claridad sin anclajes suplementarios en esta sección.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' según el estándar del proyecto, pero este versículo no contiene el nombre divino.
  - '''Judá'' y ''Rubén'' se conservan como nombres tribales propios con ortografía española estándar.'
  - '''Porción'' se explicita por el valor implícito de אֶחָד en la fórmula de reparto, siguiendo el sentido documentado en el audit trail inglés.'
