translation:
  language: es
  text: 'Pero él le respondió: «Hablas como habla una de las mujeres necias. ¿Aceptaremos el bien de parte de Dios, y no aceptaremos el mal[a]?». En todo esto Job no pecó con sus labios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adversidad»; tradicionalmente, «mal». El hebreo רָע aquí se refiere a circunstancias dañinas o desfavorables en contraste con «el bien».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּדַבֵּר אַחַת הַנְּבָלוֹת תְּדַבֵּרִי
  english_pob_choice: You speak as one of the foolish women speaks
  chosen_spanish: Hablas como habla una de las mujeres necias
  alternatives_spanish:
  - Hablas como habla una de las mujeres insensatas
  - Hablas como habla una de las mujeres infames
  lexicon: HALOT
  rationale: נְבָלוֹת expresa necedad con carga moral, no solo falta de inteligencia. «Necias» conserva ese peso ético en español de forma natural y fiel. Se añade «mujeres» porque el plural femenino está implicado por la forma del hebreo y por el contexto.
- source_word: גַּם אֶת הַטּוֹב נְקַבֵּל מֵאֵת הָאֱלֹהִים
  english_pob_choice: Shall we receive the good from God
  chosen_spanish: ¿Aceptaremos el bien de parte de Dios?
  alternatives_spanish:
  - ¿Recibiremos el bien de parte de Dios?
  - ¿Aceptaremos lo bueno de parte de Dios?
  lexicon: HALOT
  rationale: El verbo permite «recibir» o «aceptar», pero en español «aceptaremos» encaja mejor con la pregunta retórica y con el paralelismo del versículo. «El bien» conserva el sustantivo articulado del hebreo y su amplitud de bienes favorables.
- source_word: וְאֶת הָרָע לֹא נְקַבֵּל
  english_pob_choice: and shall we not receive the bad
  chosen_spanish: ¿y no aceptaremos el mal?
  alternatives_spanish:
  - ¿y no recibiremos la adversidad?
  - ¿y no aceptaremos lo malo?
  lexicon: HALOT
  rationale: רָע puede referirse a maldad moral o a circunstancias adversas. Aquí, por contraste con «el bien» y en el marco del sufrimiento permitido por Dios, conviene mantener la tensión semántica sin resolverla excesivamente. «El mal» preserva el paralelismo y deja abierta la alternativa contextual de «adversidad».
- source_word: בְּכָל זֹאת
  english_pob_choice: In all this
  chosen_spanish: En todo esto
  alternatives_spanish:
  - Con todo esto
  - En medio de todo esto
  lexicon: HALOT
  rationale: Expresión idiomática para introducir el juicio narrativo final. «En todo esto» suena natural y reproduce la función discursiva del hebreo.
- source_word: לֹא חָטָא אִיּוֹב בִּשְׂפָתָיו
  english_pob_choice: Job did not sin with his lips
  chosen_spanish: Job no pecó con sus labios
  alternatives_spanish:
  - Job no pecó con lo que dijo
  - Job no pecó en su խոսca
  lexicon: HALOT
  rationale: «Con sus labios» conserva la imagen corporal del hebreo y el alcance específico del habla. Se mantiene «pecó» para reflejar חָטָא con su peso moral.
theological_decisions:
- issue: Sentido de הָרָע en relación con Dios
  english_pob_reading: Rendered as 'the bad' to denote adverse circumstances received under God's sovereignty, not moral evil authored by God.
  chosen_spanish_reading: «el mal» como contraste con «el bien», sin afirmar que Dios sea autor de mal moral; el contexto apunta a adversidad o calamidad permitida bajo la soberanía divina.
  alternative_spanish_readings:
  - «la adversidad»
  - «lo malo»
  - «el mal»
  rationale: En español, «mal» puede sugerir tanto mal moral como desgracia. Dado el contraste con «el bien» y el marco del sufrimiento de Job, conviene dejar la tensión sin doctrinalizarla. La traducción principal conserva el paralelismo; la lectura de «adversidad» queda implícita como alternativa contextual.
  doctrine_reference: Soberanía de Dios; evitar atribuir a Dios mal moral mientras se preserva la ambigüedad del original.
translation_notes:
  revision_awareness: 'El pasaje sigue de cerca el audit trail inglés de la POB: se preserva el paralelismo bien/mal, la evaluación narrativa final y la expresión corporal «con sus labios». No se introdujeron cambios textuales respecto del sentido base; solo se ajustó la dicción al español natural y se mantuvo la tensión lexical de רָע mediante nota.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים conforme al estándar del proyecto.
  - Se mantiene el registro bíblico digno y contemporáneo, sin calco excesivo.
  - Se prefirió «aceptaremos» sobre «recibiremos» por fluidez retórica en español, sin cambiar el sentido del verbo hebreo en este contexto.
  - El marcador [a] aparece en el texto donde corresponde y solo una vez.
