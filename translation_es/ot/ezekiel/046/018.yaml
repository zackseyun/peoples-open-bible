translation:
  language: es
  text: El príncipe no tomará nada de la herencia del pueblo[a], despojándolos de su propiedad. De su propia propiedad dará herencia a sus hijos, para que mi pueblo no sea dispersado[b], cada hombre lejos de su propiedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haciéndoles injusticia» o «defraudándolos».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cada hombre»; la expresión es distributiva y se refiere a cada individuo entre el pueblo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנָּשִׂיא
  english_pob_choice: the prince
  chosen_spanish: el príncipe
  alternatives_spanish:
  - el gobernante
  - el líder
  lexicon: HALOT
  rationale: En Ezequiel, נָשִׂיא es un término técnico para el dirigente civil, no para un rey. «Príncipe» conserva ese matiz contextual y coincide con la decisión auditada en inglés.
- source_word: יִקַּח מִנַּחֲלַת הָעָם
  english_pob_choice: take any of the people's inheritance
  chosen_spanish: tomará ninguna de la herencia del pueblo
  alternatives_spanish:
  - tomará de la herencia del pueblo
  - se apoderará de alguna herencia del pueblo
  lexicon: HALOT
  rationale: לקח con מן aquí expresa tomar algo de lo que pertenece al pueblo. «Herencia» mantiene el campo legal y patrimonial de נַחֲלָה; «ninguna» refleja el valor distributivo y absoluto del mandato negativo.
- source_word: לְהוֹנֹתָם
  english_pob_choice: oppressing them / thrusting them out of their property
  chosen_spanish: despojándolos de su propiedad
  alternatives_spanish:
  - oprimiéndolos
  - expoliándolos
  - expulsándolos de su propiedad
  lexicon: HALOT
  rationale: El hifil de ינה puede expresar oprimir, explotar o desposeer mediante abuso. En este contexto de tierras y posesión, «despojándolos de su propiedad» recoge la fuerza de la revisión inglesa («thrusting them out») sin perder el componente de trato injusto.
- source_word: מֵאֲחֻזָּתָם
  english_pob_choice: out of their property
  chosen_spanish: de su propiedad
  alternatives_spanish:
  - de su posesión
  - de su tenencia
  - de su patrimonio
  lexicon: HALOT
  rationale: אֲחֻזָּה se refiere a propiedad/tenencia hereditaria. «Propiedad» es claro en español moderno y permite mantener la oposición con «su propia propiedad» en la segunda parte del versículo.
- source_word: מֵאֲחֻזָּתוֹ יַנְחִל אֶת בָּנָיו
  english_pob_choice: He shall give his sons an inheritance out of his own property
  chosen_spanish: De su propia propiedad dará herencia a sus hijos
  alternatives_spanish:
  - De su propia posesión heredará a sus hijos
  - Har&aacute; heredar a sus hijos de su propia propiedad
  lexicon: HALOT
  rationale: El hifil de נחל significa dar como herencia o hacer heredar. La formulación española preserva la contraposición entre los bienes del príncipe y los del pueblo, y evita una paráfrasis más libre.
- source_word: לְמַעַן אֲשֶׁר לֹא יָפֻצוּ
  english_pob_choice: so that ... may not be scattered
  chosen_spanish: para que ... no sea dispersado
  alternatives_spanish:
  - para que ... no se disperse
  - a fin de que ... no sean esparcidos
  lexicon: HALOT
  rationale: פּוּץ suele significar esparcir/dispersar. «Sea dispersado» mantiene la imagen de dispersión ligada a la pérdida de las porciones heredadas, como en el inglés auditado.
- source_word: עַמִּי אִישׁ מֵאֲחֻזָּתוֹ
  english_pob_choice: my people may not be scattered, each man from his property
  chosen_spanish: mi pueblo no sea dispersado, cada hombre de su propiedad
  alternatives_spanish:
  - mi pueblo no sea dispersado, cada uno de su propiedad
  - mi pueblo no sea dispersado, cada persona de su propiedad
  lexicon: HALOT
  rationale: אִישׁ conserva su valor distributivo masculino singular. Se mantiene «cada hombre» por fidelidad al hebreo y a la política de precisión de género; «de su propiedad» repite el término clave para conservar la coherencia léxica.
theological_decisions:
- issue: Expresión distributiva masculina אִישׁ
  english_pob_reading: each man
  chosen_spanish_reading: cada hombre
  alternative_spanish_readings:
  - cada uno
  - cualquiera
  rationale: El hebreo usa singular masculino de modo distributivo. Se conserva esa forma representativa en el texto principal, en vez de neutralizarla, conforme a la política de exactitud de género del proyecto.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La redacción refleja la revisión más reciente del audit trail inglés, que sustituyó «oppressing them» por una formulación más directa de desposesión («thrusting them out of their property»). En español se adoptó «despojándolos de su propiedad» para conservar esa intensificación sin perder el matiz de abuso inherente al verbo hebreo.
  spanish_consistency_notes:
  - Se mantiene «príncipe» para הַנָּשִׂיא, en continuidad con el uso técnico de Ezequiel.
  - Se usa «propiedad» para אֲחֻזָּה en ambas apariciones para conservar cohesión léxica.
  - Se conserva la relación causal final con «para que» para לְמַעַן אֲשֶׁר.
  - «Cada hombre» reproduce el distributivo masculino del hebreo; la nota explica su valor representativo.
