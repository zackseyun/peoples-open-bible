translation:
  language: es
  text: Porque he aquí[a], tus enemigos, oh Yahvé; porque he aquí, tus enemigos perecerán; todos los obradores de maldad serán dispersados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «todos los que hacen maldad serán dispersados»; el hebreo dice literalmente: «todos los obradores de maldad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ciertamente
  lexicon: HALOT
  rationale: Conserva la fuerza conectiva y explicativa del hebreo al introducir la afirmación como consecuencia o explicación, y suena natural en español bíblico contemporáneo.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - observa
  lexicon: HALOT
  rationale: Mantiene el valor demostrativo y enfático del hebreo con una fórmula solemne y reconocible en español, sin diluir el tono poético.
- source_word: אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - tus adversarios
  - los que te odian
  lexicon: HALOT
  rationale: Reproduce el plural con sufijo de segunda persona singular dirigido a Yahvé, con un equivalente directo y transparente en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Sigue el criterio del proyecto para el Tetragrámaton y conserva el nombre divino propio, en lugar de sustituirlo por un título genérico.
- source_word: יֹאבֵדוּ
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - desaparecerán
  lexicon: HALOT
  rationale: ‘Perecer’ comunica la idea de destrucción o ruina sin introducir un matiz mecanicista que el hebreo no exige.
- source_word: יִתְפָּרְדוּ
  english_pob_choice: will be scattered
  chosen_spanish: serán dispersados
  alternatives_spanish:
  - serán esparcidos
  - se separarán
  lexicon: HALOT
  rationale: El hitpael de פרד apunta a separación o dispersión; ‘serán dispersados’ conserva la pasiva y el efecto colectivo del juicio. Se prefirió esta forma a ‘esparcidos’ por ser más idiomática en español formal.
- source_word: פֹּעֲלֵי אָוֶן
  english_pob_choice: workers of wickedness
  chosen_spanish: los que hacen iniquidad
  alternatives_spanish:
  - obradores de maldad
  - obreros de perversidad
  lexicon: HALOT
  rationale: Se preserva la relación verbal-activadora del hebreo (‘los que hacen’) y se traduce אָוֶן con ‘iniquidad’ para mantener el peso moral del término. Esta opción evita reducir la frase a un mero sustantivo como ‘malvados’.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton de manera directa, y el proyecto POB lo rinde con el nombre propio ‘Yahweh’. En español, ‘Yahvé’ es la forma coherente con ese criterio y preserva la referencia covenantal sin usar una máscara titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el criterio auditado de la POB en inglés. Se preserva la repetición enfática de ‘Porque, he aquí’ y se mantiene la tensión léxica de פֹּעֲלֵי אָוֶן con una nota que refleja la alternativa semántica documentada en inglés. No se introdujeron cambios respecto del pasaje auditado más allá de la adaptación al español.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente con el estándar del proyecto para יְהוָה.
  - Se mantiene la estructura poética repetitiva del hebreo sin condensarla.
  - ‘Perecerán’ y ‘serán dispersados’ conservan el paralelismo del juicio.
  - ‘Los que hacen iniquidad’ preserva la construcción participial del original y evita una equivalencia demasiado libre.
