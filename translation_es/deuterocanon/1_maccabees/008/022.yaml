translation:
  language: es
  text: Y esta es la copia del documento que ellos copiaron en tablas de bronce y enviaron a Jerusalén, para que estuviera allí entre ellos como memorial de paz y alianza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀντίγραφον
  english_pob_choice: copy
  chosen_spanish: copia
  alternatives_spanish:
  - transcripción
  - duplicado
  lexicon: LSJ
  rationale: ἀντίγραφον designa un texto reproducido por escrito; «copia» expresa bien esa relación documental en español actual sin exagerar el matiz técnico.
- source_word: γραφῆς
  english_pob_choice: document
  chosen_spanish: documento
  alternatives_spanish:
  - escritura
  - registro
  lexicon: LSJ
  rationale: Aquí γραφή no significa «Escritura» bíblica, sino un escrito oficial. «Documento» conserva el valor administrativo del contexto.
- source_word: ἀντέγραψαν
  english_pob_choice: they copied
  chosen_spanish: ellos transcribieron
  alternatives_spanish:
  - ellos copiaron
  - ellos inscribieron como copia
  lexicon: LSJ
  rationale: El verbo está emparentado con ἀντίγραφον y expresa hacer una copia escrita. «Transcribieron» evita la repetición de «copia» sin perder el sentido de reproducción textual.
- source_word: ἐπὶ δέλτους χαλκαῖς
  english_pob_choice: onto bronze tablets
  chosen_spanish: en tablas de bronce
  alternatives_spanish:
  - sobre tablas de bronce
  - en placas de bronce
  lexicon: LSJ
  rationale: δέλτοι son tablillas o tablas para escribir; χαλκαῖς especifica el material. «Tablas de bronce» es natural en español y mantiene el carácter oficial de la inscripción.
- source_word: μνημόσυνον
  english_pob_choice: memorial
  chosen_spanish: memorial
  alternatives_spanish:
  - recordatorio
  - recuerdo
  lexicon: LSJ
  rationale: El término apunta a algo conservado para conmemoración. «Memorial» preserva el matiz formal y conmemorativo que pide este pasaje.
- source_word: εἰρήνης
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz de tratado
  - reconciliación
  lexicon: LSJ
  rationale: El sustantivo es simplemente «paz». Aunque el contexto es diplomático, el griego no añade explícitamente «tratado», por lo que «paz» es la opción más fiel.
- source_word: συμμαχίας
  english_pob_choice: alliance
  chosen_spanish: alianza
  alternatives_spanish:
  - tratado
  - alianza militar
  lexicon: LSJ
  rationale: συμμαχία suele referirse a una alianza política o militar. «Alianza» es la equivalencia más directa y deja el alcance preciso al contexto.
- source_word: παρ' αὐτοῖς
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - con ellos
  - en su poder
  lexicon: LSJ
  rationale: La frase indica que la copia debe permanecer en Jerusalén, en medio de la comunidad. «Entre ellos» transmite esa presencia y conservación comunitaria de manera natural.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden sustancialmente; no se documentan variantes textuales ni tensiones lexicoteológicas relevantes en este versículo. Se adoptó un español fluido que conserva la estructura administrativa del original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Escritura» para γραφή porque aquí no se trata de un texto bíblico sino de un documento diplomático.
  - «Alianza» conserva el sentido político-diplomático de συμμαχία sin añadir una precisión militar que el griego no explicita.
