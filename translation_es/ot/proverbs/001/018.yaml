translation:
  language: es
  text: Pero ellos acechan su propia sangre[a]; tienden una emboscada a sus propias vidas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se conserva «sangre» en vez de «derramamiento de sangre» o «muerte» para retener la imagen concreta del hebreo y la ironía de que la violencia vuelve sobre ellos mismos.
    reason: lexical_alternative
  - marker: b
    text: O «se esconden para sus propias vidas». El verbo hebreo puede significar más literalmente «esconderse/ocultarse», pero aquí probablemente se refiere a preparar una emboscada en secreto.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהֵם
  english_pob_choice: But they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Y ellos
  - Mas ellos
  lexicon: HALOT
  rationale: La conjunción con el pronombre independiente expresa contraste; «Pero» conserva el valor adversativo en el contexto, y «ellos» mantiene el énfasis explícito del hebreo sin volverla innecesariamente pesada.
- source_word: לְדָמָם
  english_pob_choice: for their own blood
  chosen_spanish: su propia sangre
  alternatives_spanish:
  - su sangre
  - para su propia sangre
  - contra su propia sangre
  lexicon: HALOT
  rationale: דָּם se conserva como «sangre» para mantener la imagen concreta y la ironía del hebreo. El posesivo «su propia» refleja el sufijo plural y el matiz reflexivo. Evito «sangre derramada» o «muerte» porque suavizarían la fuerza imagística del texto.
- source_word: יֶאֱרֹבוּ
  english_pob_choice: lie in wait
  chosen_spanish: acechan
  alternatives_spanish:
  - están al acecho
  - emboscan
  - se ocultan
  lexicon: HALOT
  rationale: ארב denota estar al acecho o tender una trampa. «Acechan» es un verbo natural en español que conserva la idea de vigilancia hostil y de espera predatoria.
- source_word: יִצְפְּנוּ
  english_pob_choice: ambush
  chosen_spanish: ponen emboscada
  alternatives_spanish:
  - se esconden
  - se ocultan
  - tienden una emboscada
  lexicon: HALOT
  rationale: צפן significa ocultar o esconder, pero en este paralelismo con «acechan» comunica la acción de preparar una emboscada desde la ocultación. «Ponen emboscada» conserva el sentido activo y la relación con la línea anterior; no simplifico a «se esconden» porque perdería la violencia del contexto.
- source_word: לְנַפְשֹׁתָם
  english_pob_choice: for their own lives
  chosen_spanish: a sus propias vidas
  alternatives_spanish:
  - para sus propias vidas
  - contra sus propias vidas
  - para sí mismos
  lexicon: HALOT
  rationale: נֶפֶשׁ puede ser vida, ser o alma; aquí el contexto de violencia favorece «vidas». «A» refleja bien la dirección del ataque en español y permite mantener el paralelismo con la primera cola. «Sus propias» reproduce la ironía reflexiva del hebreo.
translation_notes:
  revision_awareness: 'La audit trail inglesa retiene «blood» de forma concreta y luego ajusta la segunda cola para sonar más natural («ambush their own lives»). La versión española sigue esa misma línea: conserva la imagen de «sangre» y usa un verbo idiomático de acecho/emboscada para mantener el paralelismo sin volverlo mecánico.'
  spanish_consistency_notes:
  - Se mantiene la distinción semántica entre «sangre» y «vidas» como en el inglés auditado.
  - Se evita traducir נֶפֶשׁ por «alma» en este contexto, porque el foco es la vida amenazada por la violencia.
  - «Pero ellos» reproduce el contraste explícito del hebreo sin recurrir a una formulación eclesiástica fija.
  - La segunda cola usa un giro verbal idiomático en español para reflejar la idea de emboscada oculta presente en el hebreo y en la revisión inglesa.
