    issue: La nota al pie [a] está colocada en «azul» pero explica «cabras».
    rationale: El marcador debe aparecer exactamente en la palabra o frase pertinente. Tal como está, la nota induce a error y no cumple la disciplina requerida de anclaje.
  - severity: medium
    issue: «Carmesí» no preserva suficientemente la decisión auditada «scarlet yarn».
    rationale: Aunque «carmesí» es semánticamente cercano, el POB inglés escogió explícitamente un material textil, no solo un color. «Hilo escarlata» refleja mejor tanto scarlet como el contexto de textiles del tabernáculo.
