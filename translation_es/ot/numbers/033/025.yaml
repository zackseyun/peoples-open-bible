lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en marcha
  - Jornadaron
  lexicon: HALOT
  rationale: El verbo נסע en las fórmulas de itinerario del desierto expresa salir de un campamento o lugar anterior. «Partieron» conserva el valor de salida y suena natural en español; «se pusieron en marcha» también comunica movimiento, pero es menos directo en este tipo de registro.
- source_word: מֵחֲרָדָה
  english_pob_choice: from Haradah
  chosen_spanish: de Haradá
  alternatives_spanish:
  - desde Haradá
  lexicon: HALOT
  rationale: La preposición מִן/מֵ indica origen o separación. En español, «de» transmite de forma sobria y natural el punto de partida. El nombre propio se translitera como Haradá para respetar la referencia geográfica.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: y acamparon
  alternatives_spanish:
  - y acamparon allí
  - y acamparon
  lexicon: HALOT
  rationale: חנה en contextos de itinerario significa acampar o establecer campamento. «Acamparon» preserva esa fuerza sin añadir matices que el hebreo no exige. «Acamparon allí» sería más explícito de lo necesario.
- source_word: בְּמַקְהֵלֹת
  english_pob_choice: at Makheloth
  chosen_spanish: en Makelot
  alternatives_spanish:
  - en Makhelot
  - en Makhelot
  lexicon: HALOT
  rationale: La preposición בְ con nombres de lugar en estos registros puede equivaler a ubicación en un sitio de campamento; en español, «en» es la opción más natural. El topónimo se translitera como Makelot, siguiendo el criterio de nombres propios.
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa auditada coinciden en una fórmula itineraria sin variantes textuales relevantes. Se mantuvo la equivalencia de movimiento y campamento, con transliteración estable de los topónimos y una redacción española breve y publicable.
  spanish_consistency_notes:
  - Se mantiene la transliteración de nombres de lugares sin traducirlos.
  - «Partieron» y «acamparon» conservan el paralelismo del hebreo itinerario.
  - No se introdujo terminología teológica porque el versículo es puramente narrativo-geográfico.
