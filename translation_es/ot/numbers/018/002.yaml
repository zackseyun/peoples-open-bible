revisions:
- from: Y también acerca contigo a tus hermanos[a], la tribu de Leví, la tribu de tu padre, para que se unan a ti y te sirvan[b]; y tú y tus hijos contigo estaréis delante de la tienda del testimonio.
  to: Y también haz que se acerquen contigo tus hermanos[a], la tribu de Leví, la tribu de tu padre, para que se unan a ti y te sirvan; y tú y tus hijos contigo estaréis delante de la tienda del testimonio[b].
  rationale: Se reemplazó 'acerca contigo' por 'haz que se acerquen contigo' para lograr un español natural sin perder el matiz de 'bring near with you'. Se conservó el resto del sentido fuente, incluida la formulación 'la tienda del testimonio'. También se corrigió el anclaje de la nota [b] para que aparezca en la frase que realmente comenta.
