revisions:
- from: Y derribaré las ciudades de tu tierra, y derribaré todas tus fortalezas.
  to: Y quitaré de en medio las ciudades de tu tierra, y derribaré todas tus fortalezas.
  rationale: Se reemplaza el primer 'derribaré' por 'quitaré de en medio' para reflejar mejor הִכְרַתִּי ('cut off') sin caer en un calco poco natural como 'cortaré' con 'ciudades'. Se mantiene 'derribaré' para הָרַסְתִּי y 'fortalezas' para מִבְצָרֶיךָ, preservando la imagen concreta de desmantelar defensas.
