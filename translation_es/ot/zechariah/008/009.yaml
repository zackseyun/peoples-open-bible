translation:
  language: es
  text: 'Así dice Yahvé de los Ejércitos: Fortalezcan sus manos, ustedes que en estos días oyen estas palabras de la boca de los profetas[a], los cuales estaban presentes el día en que fue fundada la casa de Yahvé de los Ejércitos, para que el templo se construyera[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de la boca de los profetas», un giro idiomático para la recepción del mensaje profético hablado.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «para construir el templo» o «para que el templo fuera construido». La cláusula hebrea es breve y admite más de una formulación en español.'
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética se conserva con una introducción solemne y natural en español. 'Así dice' mantiene el tono oracular sin sonar forzado.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los Ejércitos celestiales
  - Yahvé de los ejércitos
  lexicon: HALOT
  rationale: Se conserva el nombre divino 'Yahvé' según el criterio del proyecto, y צְבָאוֹת se vierte como 'los Ejércitos' para mantener la imagen marcial y cósmica sin la máscara litúrgica 'Señor'.
- source_word: תֶּחֱזַקְנָה יְדֵיכֶם
  english_pob_choice: Let your hands be strong
  chosen_spanish: Fortalezcan sus manos
  alternatives_spanish:
  - Que sus manos sean fuertes
  - Tengan manos fuertes
  lexicon: HALOT
  rationale: El hebreo usa un modismo de fortaleza para ánimo y resolución. En español, 'Fortalezcan sus manos' conserva la fuerza exhortativa y el vínculo con el esfuerzo para la obra.
- source_word: הַשֹּׁמְעִים
  english_pob_choice: you who are hearing
  chosen_spanish: ustedes que ... oyen
  alternatives_spanish:
  - ustedes que escuchan
  - los que oyen
  lexicon: HALOT
  rationale: El participio señala a los destinatarios como oyentes en curso. 'Oyen' refleja bien esa acción continua; 'escuchan' también sería posible, pero 'oyen' sigue más de cerca el aspecto del verbo en este contexto.
- source_word: בַּיָּמִים הָאֵלֶּה
  english_pob_choice: in these days
  chosen_spanish: en estos días
  alternatives_spanish:
  - en estos tiempos
  - hoy en día
  lexicon: HALOT
  rationale: La expresión temporal se traduce de forma directa y natural.
- source_word: אֵת הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - estos mensajes
  lexicon: HALOT
  rationale: En el contexto de discurso profético, דְּבָרִים se entiende de manera más directa como 'palabras'. 'Mensajes' sería una interpretación más amplia de la que exige el hebreo.
- source_word: מִפִּי הַנְּבִיאִים
  english_pob_choice: from the mouth of the prophets
  chosen_spanish: de la boca de los profetas
  alternatives_spanish:
  - de los profetas
  - de los labios de los profetas
  lexicon: HALOT
  rationale: Se conserva el giro idiomático literal para mantener el color profético y la imagen de recepción oral del mensaje.
- source_word: אֲשֶׁר בְּיוֹם יֻסַּד
  english_pob_choice: who were present on the day ... was founded
  chosen_spanish: los cuales estaban presentes el día en que fue fundada
  alternatives_spanish:
  - que estuvieron presentes el día en que fue fundada
  - que hablaron el día en que fue fundada
  lexicon: HALOT
  rationale: El relativo hebreo es compacto; en español se explicita con naturalidad que los profetas estaban presentes en el momento fundacional. Se evita añadir la idea de 'hablaron' como contenido principal, aunque sigue implícita en el contexto.
- source_word: יֻסַּד
  english_pob_choice: was founded
  chosen_spanish: fue fundada
  alternatives_spanish:
  - fue establecida
  - se echó el cimiento
  lexicon: HALOT
  rationale: '''Fue fundada'' reproduce el pasivo de יסד y encaja bien con ''la casa''. La siguiente cláusula ya aclara el propósito constructivo del templo.'
- source_word: בֵּית יְהוָה צְבָאוֹת
  english_pob_choice: the house of Yahweh of Armies
  chosen_spanish: la casa de Yahvé de los Ejércitos
  alternatives_spanish:
  - el templo de Yahvé de los Ejércitos
  - la casa de Yahvé de los ejércitos
  lexicon: HALOT
  rationale: '''Casa'' conserva la imagen bíblica básica del santuario y permite distinguirla del ''templo'' de la siguiente frase, como en el hebreo y en la auditoría inglesa.'
- source_word: הַהֵיכָל
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el santuario
  - el palacio
  lexicon: HALOT
  rationale: En este contexto הֵיכָל designa claramente el edificio del templo; 'templo' es la equivalencia más clara y usual en español.
- source_word: לְהִבָּנוֹת
  english_pob_choice: for the temple to be built
  chosen_spanish: para que el templo fuera construido
  alternatives_spanish:
  - para construir el templo
  - para que se construyera el templo
  lexicon: HALOT
  rationale: La finalidad del infinitivo se expresa en español con una subordinada final natural. 'Fuera construido' refleja bien la pasiva sin perder el propósito del texto.
theological_decisions:
- issue: Renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El sistema del proyecto pide 'Yahvé' como forma principal en español para el Tetragrámaton. Se evita 'SEÑOR' porque oculta el nombre divino y no refleja la decisión auditada de la fuente inglesa.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de צְבָאוֹת
  english_pob_reading: Armies
  chosen_spanish_reading: los Ejércitos
  alternative_spanish_readings:
  - los Ejércitos celestiales
  - los ejércitos
  rationale: '''Los Ejércitos'' conserva la transparencia semántica y la imagen de soberanía militar/cósmica. Se mantiene el título divino como parte del nombre reverente.'
  doctrine_reference: HALOT / uso contextual del título divino
- issue: Relación sintáctica de la cláusula final
  english_pob_reading: for the temple to be built
  chosen_spanish_reading: para que el templo fuera construido
  alternative_spanish_readings:
  - para construir el templo
  - para que se construyera el templo
  rationale: La construcción hebrea es compacta y expresa propósito. En español se opta por una final con pasiva perifrástica para mantener el sentido de finalidad sin volverla demasiado rígida.
  doctrine_reference: Sintaxis del infinitivo de finalidad
translation_notes:
  revision_awareness: 'Se siguió de cerca la revisión más reciente del expediente inglés: se mantuvo la lectura de propósito en la cláusula final y se explicitó la presencia de los profetas en el día fundacional, evitando una paráfrasis más libre. También se preservó el paralelo entre ''la casa'' y ''el templo'' para reflejar la estructura del hebreo.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera uniforme para יְהוָה.
  - Se mantuvo 'Ejércitos' en vez de 'Hosts' o 'huestes' para seguir el valor transparente del título divino.
  - Se conservó el modismo 'de la boca de los profetas' por fidelidad al hebreo, aunque suene idiomático en español.
  - Se distinguió 'la casa' de 'el templo' para respetar la progresión del texto hebreo.
  - Se empleó una subordinada final en la última cláusula para expresar correctamente el infinitivo de finalidad.
