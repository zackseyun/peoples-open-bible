review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: futuro de εὐλογήσει, objeto «al pueblo», genitivo posesivo «del Señor», y los complementos «en sabiduría» y «con alegría». Sin embargo, la nota sobre Κυρίου introduce una opción («de Yahvé») que contradice la política terminológica por defecto del proyecto para el nombre divino y además es innecesaria aquí, porque la fuente inmediata griega dice Κυρίου y el inglés POB no preservó una alternativa de nombre divino en este lugar.'
  spanish_quality_summary: 'El español principal es claro y natural: «Él bendecirá al pueblo del Señor en sabiduría, con alegría». La sintaxis es digna y legible. El único problema de calidad/editorial está en las notas: la nota [c] no aporta una alternativa real distinta del texto, y la nota [a] crea confusión terminológica en vez de aclarar.'
  glossary_alignment: 'Hay una desalineación menor con el glosario/proyecto: aunque el texto principal usa «Señor» para κύριος, la nota [a] sugiere «Yahvé» por un supuesto nombre divino subyacente. En este versículo la fuente inmediata es κύριος, y no hay base auditada aquí para introducir esa alternativa como nota. El resto de las decisiones («bendecirá», «pueblo», «en sabiduría», «con alegría») están alineadas con la evidencia y con el estilo del proyecto.'
  issues:
  - severity: medium
    issue: La nota [a] propone «de Yahvé» para Κυρίου.
    rationale: La fuente inmediata es el griego Κυρίου, y el inglés POB eligió «the Lord's» sin nota sobre el nombre divino. Introducir «Yahvé» como alternativa aquí añade una cuestión teológica/textual no sustentada por el registro auditado y puede confundir la política del proyecto sobre cuándo usar «Yahvé».
  - severity: low
    issue: La nota [c] no ofrece una alternativa distinta del texto principal.
    rationale: Dice «siguiendo más literalmente la secuencia griega, “en sabiduría, con alegría”», que ya es exactamente la secuencia del texto español. La nota resulta redundante y no cumple una función útil para el lector.
  revised_spanish_text: Él bendecirá al pueblo del Señor en sabiduría, con alegría[a].
  revised_footnotes:
  - marker: a
    text: O «con gozo» / «con regocijo» para μετʼ εὐφροσύνης.
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal porque es fiel y natural. Se eliminan las notas problemáticas: [a] por introducir indebidamente «Yahvé» como alternativa para Κυρίου en este lugar, y [c] por ser redundante. Se mantiene solo la nota léxica útil sobre εὐφροσύνης.'
