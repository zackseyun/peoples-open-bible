translation:
  language: es
  text: El rey hizo que la plata fuera tan común como las piedras en Jerusalén, y que los cedros fueran tan abundantes como los sicómoros en las tierras bajas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la Sefelá», la región de laderas y colinas bajas al oeste de la zona montañosa central de Judá.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּתֵּן / נָתַן
  english_pob_choice: made
  chosen_spanish: hizo que... fuera / hizo que... fueran
  alternatives_spanish:
  - dio
  - puso
  - volvió... tan común / tan abundantes
  lexicon: HALOT
  rationale: 'El verbo hebreo literalmente es ''dar/poner'', pero aquí expresa una causación de abundancia: que algo llegara a ser como algo común. En español, ''hizo que'' conserva mejor ese valor causativo y el resultado descrito.'
- source_word: הַכֶּסֶף
  english_pob_choice: silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  - la plata
  lexicon: HALOT
  rationale: El término se refiere al metal precioso, no necesariamente a moneda. 'Plata' es la forma natural y precisa en español bíblico contemporáneo.
- source_word: כָּאֲבָנִים
  english_pob_choice: as common as stones
  chosen_spanish: tan común como las piedras
  alternatives_spanish:
  - como piedras
  - tan abundante como piedras
  lexicon: HALOT
  rationale: La comparación comunica abundancia generalizada, no solo semejanza visual. 'Tan común como las piedras' transmite ese sentido de modo natural en español.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en Jerusalén
  lexicon: HALOT
  rationale: Equivalencia locativa directa y estándar.
- source_word: הָאֲרָזִים
  english_pob_choice: cedars
  chosen_spanish: los cedros
  alternatives_spanish:
  - la madera de cedro
  - los cedros
  lexicon: HALOT
  rationale: El plural puede referirse al recurso arbóreo o al material de cedro. 'Cedros' preserva la imagen hebrea breve y funciona bien en español.
- source_word: כַּשִּׁקְמִים
  english_pob_choice: as plentiful as sycamore trees
  chosen_spanish: tan abundantes como los sicómoros
  alternatives_spanish:
  - como los sicómoros
  - tan abundantes como los sicómoros
  lexicon: HALOT
  rationale: La idea es de abundancia comparativa. 'Sicómoros' es el término español usual; se conserva el paralelo con los cedros sin añadir explicaciones al texto principal.
- source_word: אֲשֶׁר בַּשְּׁפֵלָה
  english_pob_choice: in the lowland
  chosen_spanish: en la llanura
  alternatives_spanish:
  - en la llanura
  - en la Sefelá
  - en las tierras bajas
  lexicon: HALOT
  rationale: La fuente alude a la región baja de Judá. 'Llanura' es una solución española natural y comprensible; la nota preserva la alternativa regional más técnica.
- source_word: לָרֹב
  english_pob_choice: plentiful
  chosen_spanish: abundantes
  alternatives_spanish:
  - en abundancia
  - muy numerosos
  lexicon: HALOT
  rationale: Refuerza la idea de gran cantidad y se integra con naturalidad al paralelo poético con 'la plata' y 'los cedros'.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó el artículo antes de 'sycamore trees' para dejar una comparación genérica más natural; en español se conserva ese mismo efecto con 'los sicómoros' sin artículo de especificación, manteniendo el paralelismo y la genericidad del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino en otros contextos, pero este versículo no lo contiene.
  - Se evita 'SEÑOR' como máscara del tetragrámaton, ya que no aparece aquí.
  - '''Plata'' y ''cedros'' siguen el valor material/commodity del hebreo sin sobreexplicar.'
  - La nota geográfica da la alternativa técnica 'Sefelá' para sostener la precisión auditada del término בַּשְּׁפֵלָה.
