base_translation:
  language: en
  yaml_path: translation/ot/esther/001/006.yaml
  text: There were hangings of white cotton and blue[a], fastened with cords of fine linen and purple to silver rings and marble pillars, and couches of gold and silver on a pavement of alabaster, marble, mother-of-pearl[c][b], and precious stones.
  footnotes:
  - marker: a
    text: The precise materials named in the flooring list are uncertain. 'Alabaster,' 'marble,' 'mother-of-pearl,' and 'precious stones' reflect common scholarly identifications, but some render the terms differently, such as 'porphyry,' 'white marble,' or 'dark stone.'
    reason: lexical_alternative
  - marker: b
    text: Or 'silver rods' for 'silver rings'; the Hebrew term may refer more generally to rounded or rolled silver fixtures.
    reason: lexical_alternative
  - marker: c
    text: '''Couches'' refers to banquet couches for reclining at a feast, not ordinary sleeping beds.'
    reason: cultural_note
