review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el sentido hebreo general y conserva la bisagra retórica final «Hoy, si…». También preserva la alternativa desiderativa en nota, en línea con el rastro de auditoría en inglés. Sin embargo, «el pueblo de su pasto» no representa bien en español bíblico natural la imagen de מַרְעִיתוֹ; aunque es formalmente cercano, suena impropio para personas y debilita la metáfora pastoral que el inglés auditado buscó conservar como «pasture».
  spanish_quality_summary: El texto es mayormente claro y digno, pero «pueblo de su pasto» resulta poco idiomático y puede distraer o sonar reductivo. «Pasto» en español se asocia más al forraje que al lugar/pastoreo, mientras «pastizal» sería demasiado concreto y «pastura» o «prado» serían más naturales dentro de la imagen. El resto del versículo lee bien; «las ovejas de su mano» es literal pero aceptable en poesía bíblica.
  glossary_alignment: 'No hay conflicto con los términos por defecto del proyecto: «Dios» está bien; no aparecen Yahvé/Mesías/Cristo u otros términos sensibles. La decisión de mantener «escuchan su voz» en vez de explicitar obediencia es coherente con el expediente inglés. La principal corrección léxica necesaria es ajustar מַרְעִיתוֹ a un español más fiel y legible, preferiblemente «pastura».'
  issues:
  - severity: medium
    issue: «el pueblo de su pasto» es poco natural en español
    rationale: Aunque intenta reflejar de cerca el hebreo, «pasto» en español moderno suele referirse al alimento de los animales más que al ámbito pastoral de cuidado/pastoreo. Para personas, «pueblo de su pastura» preserva mejor la imagen de ‘pasture’ sin sonar impropio.
  - severity: low
    issue: La nota usa «escucharan» como alternativa desiderativa
    rationale: Es comprensible, pero para corresponder mejor al español exhortativo actual también podría decir «escuchen». No es imprescindible; la nota ya comunica adecuadamente la alternativa hebrea.
  revised_spanish_text: Porque él es nuestro Dios[a], y nosotros somos el pueblo de su pastura, y las ovejas de su mano. Hoy, si escuchan su voz—
  revised_footnotes:
  - marker: a
    text: 'O: «Hoy, ¡ojalá que escucharan su voz!». La partícula hebrea puede introducir un deseo o una exhortación, no solo una condición simple.'
    reason: lexical_alternative
  revision_rationale: Se revisa únicamente «pasto» a «pastura» para conservar la metáfora pastoral de מַרְעִיתוֹ con mejor naturalidad y claridad en español ampliamente legible. Se mantiene «las ovejas de su mano» por fidelidad al ajuste final del POB en inglés y al paralelismo poético del hebreo. No se requiere adjudicación adicional.
