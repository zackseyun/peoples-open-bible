review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura básica del hebreo y preserva correctamente «Yahvé», «Dios de Israel», «casa» y la nota del modismo «descubrir el oído». Sin embargo, omite explícitamente el objeto implícito de la revelación («esto») y, sobre todo, la cláusula «ha hallado en su corazón[c] para orar» queda incompleta o poco natural en español; el hebreo expresa resolución para orar, pero en español necesita un verbo finito o una construcción más idiomática.
  spanish_quality_summary: El texto suena mayormente digno, pero «Una casa te edificaré» es demasiado forzado para español actual y la secuencia «ha hallado en su corazón[c] para orar» resulta gramaticalmente deficiente. «Orar ante ti» es aceptable, aunque «orarte» no lo es; mejor mantener «orarte» fuera y usar «dirigirte esta oración» o «orarte con esta oración» no sería natural. Una leve reestructuración produce un español claro y fiel.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: «Yahvé», «Dios», «siervo», «oración». La elección «de los ejércitos» es aceptable para צְבָאוֹת. Conviene ajustar «has revelado[a] a tu siervo» a «has revelado[a] esto a tu siervo» para corresponder mejor al sentido auditado, y suavizar la cita a «Te edificaré una casa» manteniendo el doble sentido de «casa».'
  issues:
  - severity: medium
    issue: Falta el objeto de «has revelado»
    rationale: El hebreo idiomático «descubrir el oído» implica revelar algo; el inglés auditado lo hace explícito con «this». En español, «has revelado a tu siervo» suena incompleto.
  - severity: high
    issue: 'Construcción defectuosa: «ha hallado en su corazón[c] para orar»'
    rationale: En español no funciona bien sin complemento verbal adecuado. Debe decirse algo como «ha hallado en su corazón el valor/la disposición de orar» o «ha hallado en su corazón dirigirte esta oración» para expresar correctamente el hebraísmo.
  - severity: low
    issue: «Una casa te edificaré» suena innecesariamente rígido
    rationale: Aunque intenta conservar solemnidad, en español neutral y legible «Te edificaré una casa» o «Edificaré una casa para ti» comunica mejor sin perder el doble sentido de «casa».
  revised_spanish_text: 'Porque tú, Yahvé de los ejércitos, Dios de Israel, has revelado[a] esto a tu siervo, diciendo[b]: «Te edificaré una casa». Por eso tu siervo ha hallado en su corazón[c] dirigirte esta oración.'
  revised_footnotes:
  - marker: a
    text: Literalmente, «has descubierto el oído de tu siervo», un hebraísmo que significa haberle revelado algo.
    reason: lexical_alternative
  - marker: b
    text: 'O: «Edificaré una casa para ti». «Casa» también conserva aquí el posible trasfondo de linaje o dinastía.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «ha hallado su corazón»; es decir, ha encontrado resolución o disposición interior para hacerlo.
    reason: lexical_alternative
  revision_rationale: La revisión corrige una omisión semántica («esto»), reemplaza una construcción española defectuosa por una formulación natural que conserva el hebraísmo de resolución interior, y suaviza el orden de la cita para mejor legibilidad sin perder solemnidad ni el doble sentido teológico de «casa».
