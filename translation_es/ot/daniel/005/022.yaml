translation:
  language: es
  text: Pero tú, Belsasar, su hijo[a], no has humillado tu corazón, aunque sabías todo esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El arameo «su hijo» también puede significar «su descendiente» o «su sucesor».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Sin embargo, tú
  lexicon: HALOT
  rationale: La partícula conjuntiva con pronombre independiente introduce contraste fuerte con el relato previo; «Pero tú» conserva ese valor adversativo en español natural.
- source_word: בְּרֵהּ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  - su sucesor
  lexicon: HALOT
  rationale: «Hijo» reproduce directamente la forma del arameo y mantiene abierta la posible amplitud dinástica sin resolverla en la traducción principal.
- source_word: בֵּלְשַׁאצַּר
  english_pob_choice: Belshazzar
  chosen_spanish: Beltsasar
  alternatives_spanish:
  - Belsasar
  - Belshazzar
  lexicon: Transliteración tradicional española del nombre propio
  rationale: En español bíblico es más natural y reconocible «Beltsasar», que refleja la adaptación ortográfica habitual sin alterar la identificación del personaje.
- source_word: לָא הַשְׁפֵּלְתְּ
  english_pob_choice: have not humbled
  chosen_spanish: no has humillado
  alternatives_spanish:
  - no has abatido
  - no has rebajado
  lexicon: HALOT
  rationale: El verbo expresa humillar o hacer bajar; «humillado» preserva la acusación moral dirigida al orgullo interior y funciona con el objeto «tu corazón».
- source_word: לִבְבָךְ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu ser interior
  lexicon: Uso bíblico antropológico de «corazón»
  rationale: «Corazón» conserva el sentido bíblico del centro de la persona, incluyendo voluntad e ինտención, igual que en el inglés POB.
- source_word: כָּל־קֳבֵל דִּי
  english_pob_choice: though
  chosen_spanish: aunque
  alternatives_spanish:
  - a pesar de que
  - si bien
  lexicon: HALOT
  rationale: La expresión es concesiva en este contexto; «aunque» transmite con claridad que, pese al conocimiento previo, Beltsasar no se humilló.
- source_word: כָל־דְּנָה
  english_pob_choice: all this
  chosen_spanish: todo esto
  alternatives_spanish:
  - todas estas cosas
  - todo ello
  lexicon: HALOT
  rationale: «Todo esto» es conciso y mantiene el deíctico que remite a los hechos narrados previamente.
- source_word: יְדַעְתָּ
  english_pob_choice: you knew
  chosen_spanish: sabías
  alternatives_spanish:
  - has sabido
  - conocías
  lexicon: HALOT
  rationale: El pasado simple en español es el más natural aquí y refleja un conocimiento previo ya establecido por la narración.
theological_decisions:
- issue: Relación de parentesco entre Nabucodonosor y Beltsasar
  english_pob_reading: Retain the dynastic expression 'his son' without resolving whether it means literal son or descendant/successor.
  chosen_spanish_reading: Mantener «su hijo» en el texto principal, sin decidir si se trata de hijo literal, descendiente o sucesor.
  alternative_spanish_readings:
  - su descendiente
  - su sucesor
  rationale: El arameo admite un uso dinástico amplio. La traducción española conserva la tensión del texto fuente y evita armonizar históricamente dentro del versículo.
  doctrine_reference: Primacía del texto original; preservar tensión lexical/histórica cuando el original la permite.
translation_notes:
  revision_awareness: La redacción sigue el pasaje revisado más reciente del POB en inglés, manteniendo la concesión con «though»/«aunque» y el valor directo de «his son»/«su hijo», sin introducir una armonización histórica.
  spanish_consistency_notes:
  - Se usó «corazón» para el antropónimo bíblico de la interioridad, coherente con la terminología POB.
  - Se mantuvo un tono acusatorio sobrio y directo, acorde con la evidencia aramea.
  - La transliteración «Beltsasar» se eligió por legibilidad y uso español bíblico, sin cambiar la referencia al mismo nombre propio.
