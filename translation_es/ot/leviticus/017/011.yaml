    text: Or, 'for the blood makes atonement by means of the life in it.'
    reason: alternative_reading
  - marker: b
    text: Hebrew nephesh, often 'life,' 'self,' or 'soul' depending on context; in this verse the sense is life.
    reason: lexical_alternative
