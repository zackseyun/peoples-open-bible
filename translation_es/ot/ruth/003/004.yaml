revisions:
- from: Entonces, cuando él se acueste, conocerás el lugar donde se acuesta. Entra, descubre sus pies[a] y acuéstate[b]; y él te dirá lo que debes hacer.
  to: Entonces, cuando él se acueste, fíjate en el lugar donde se acuesta. Luego ve, descubre sus pies[a] y acuéstate[b]; y él te dirá lo que debes hacer.
  rationale: Se ajusta «conocerás» a «fíjate en» para reflejar mejor la instrucción práctica de identificar el lugar; se cambia «Entra» por «Luego ve» para evitar añadir una noción espacial no explicitada en el hebreo; y se pule la nota textual para un español más natural sin alterar la información del expediente inglés.
