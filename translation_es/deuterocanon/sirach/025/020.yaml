revisions:
- from: Como una subida arenosa bajo los pies de un anciano[c][b][a], así es una esposa charlatana para un hombre tranquilo.
  to: Como una subida arenosa bajo los pies de un anciano[c][b][a], así es una esposa de lengua áspera para un hombre apacible.
  rationale: 'Se ajusta el texto para reflejar con más fidelidad las decisiones léxicas ya auditadas: ''de lengua áspera'' conserva el carácter negativo de אֵשֶׁת לָשׁוֹן mejor que ''charlatana'', y ''apacible'' reproduce mejor la preferencia documentada por ''gentle'' frente a la alternativa ''quiet''. Se mantienen la imagen principal, la sintaxis proverbial y las notas textuales del original auditado.'
