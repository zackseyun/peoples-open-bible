translation:
  language: es
  text: Así Jotam se fortaleció[a], porque dispuso su camino[b] delante de Yahvé su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se hizo fuerte». El hebreo indica que Jotam llegó a estar fortalecido o consolidado.
    reason: lexical_alternative
  - marker: b
    text: O «preparó sus caminos» o «dirigió sus caminos». La expresión hebrea se refiere a orientar deliberadamente el curso de la vida delante de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְחַזֵּק
  english_pob_choice: became strong
  chosen_spanish: se fortaleció
  alternatives_spanish:
  - se hizo fuerte
  - creció en fuerza
  - fue fortalecido
  lexicon: HALOT
  rationale: El hitpael expresa que Jotam llegó a estar fuerte o consolidado. «Se fortaleció» conserva ese resultado sin volver la frase mecánica ni imponer una lectura exclusivamente militar.
- source_word: יוֹתָם
  english_pob_choice: Jotham
  chosen_spanish: Jotam
  alternatives_spanish:
  - Jotán
  - Yotam
  lexicon: convención onomástica bíblica española
  rationale: Se translitera el nombre propio de forma natural en español bíblico. «Jotam» es claro y reconocible para lectores hispanohablantes.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa del fortalecimiento de Jotam. «Porque» expresa con claridad el valor causal del hebreo.
- source_word: הֵכִין
  english_pob_choice: prepared
  chosen_spanish: preparó
  alternatives_spanish:
  - ordenó
  - dispuso
  - estableció
  lexicon: HALOT
  rationale: Aunque el audit trail inglés también valora la idea de ordenar, el hebreo הֵכִין aquí puede referirse a preparar o disponer el rumbo de la vida. «Preparó» mantiene la imagen verbal y permite la interpretación ética sin forzar un término más abstracto.
- source_word: דְּרָכָיו
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - su conducta
  - sus sendas
  - su proceder
  lexicon: HALOT
  rationale: El plural hebreo «caminos» es idiomático para el curso de vida o conducta. «Sus caminos» conserva la metáfora bíblica y la conexión con el texto fuente.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: «Delante de» comunica de manera natural la orientación de la vida de Jotam en relación con Dios, sin perder la fuerza espacial/metafórica del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El nombre divino se rinde como «Yahvé», la forma usada en este proyecto para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios propio
  - su Dios personal
  lexicon: HALOT
  rationale: 'El sufijo posesivo es significativo: Yahvé es identificado como el Dios de Jotam. «Su Dios» preserva esa relación de pertenencia y pacto.'
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La fuente hebrea usa el nombre propio divino directamente. Se mantiene como «Yahvé» para preservar el dato textual y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de הֵכִין דְּרָכָיו
  english_pob_reading: prepared his ways
  chosen_spanish_reading: preparó sus caminos
  alternative_spanish_readings:
  - ordenó sus caminos
  - dispuso su conducta
  rationale: La expresión apunta a una disposición intencional del curso de vida delante de Dios. «Preparó sus caminos» conserva la imagen hebrea y deja abierta la tensión entre preparar, ordenar y dirigir, sin resolverla de forma excesiva.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El audit trail inglés pasó de «ordered his ways» a «prepared his ways» para acercarse más a הֵכִין, manteniendo el sentido moral. La versión española sigue esa revisión con «preparó sus caminos», evitando una paráfrasis que borre la imagen verbal del hebreo.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el Tetragrámaton, en coherencia con la terminología del proyecto.
  - Se conserva la metáfora de «caminos» para דְּרָכָיו, evitando una abstracción como «conducta» en el texto principal.
  - «Se fortaleció» reproduce el matiz resultativo de וַיִּתְחַזֵּק sin añadir contenido que no está en el verso.
