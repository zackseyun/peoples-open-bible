revisions:
- from: Se llevaron a Asahel y lo sepultaron en la tumba[a] de su padre, que estaba en Belén. Entonces Joab y sus hombres caminaron toda la noche[b], y al amanecer les llegó el día en Hebrón.
  to: Se llevaron a Asahel y lo sepultaron en la tumba[a] de su padre, que estaba en Belén. Entonces Joab y sus hombres viajaron toda la noche[b], y les amaneció en Hebrón.
  rationale: Se reemplaza «caminaron» por «viajaron» para reflejar mejor el sentido amplio de הלך en contexto narrativo. Se sustituye la frase final por «les amaneció en Hebrón», que vierte naturalmente el modismo hebreo ויאר להם y coincide con la alternativa ya reconocida en la auditoría. También se corrige la nota [a] para que preserve una alternativa real al término principal.
