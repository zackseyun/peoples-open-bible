translation:
  language: es
  text: 'Y dijo[a]: «¡Arrójenla abajo!». Entonces la arrojaron abajo; y parte de su sangre salpicó[b] sobre el muro y sobre los caballos, y él la pisoteó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y dijo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «salpicó de su sangre sobre el muro y sobre los caballos». El hebreo literalmente dice «y salpicó desde su sangre sobre el muro y sobre los caballos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שמטהו
  english_pob_choice: Throw her down!
  chosen_spanish: ¡Échenla abajo!
  alternatives_spanish:
  - ¡Arrójenla abajo!
  - ¡Tírenla abajo!
  - ¡Échenla al suelo!
  lexicon: HALOT
  rationale: El imperativo expresa una orden violenta para hacer caer a Jezabel desde la ventana. «Échenla abajo» conserva el tono enérgico y el movimiento descendente sin sonar tan arcaico como «arrójenla» ni menos natural que una calca más rígida.
- source_word: וישמטוה
  english_pob_choice: So they threw her down
  chosen_spanish: Entonces la arrojaron abajo
  alternatives_spanish:
  - Así que la arrojaron abajo
  - Entonces la echaron abajo
  - Y la arrojaron abajo
  lexicon: HALOT
  rationale: Se mantiene la conexión léxica con el mandato previo mediante «arrojaron abajo», reflejando la repetición del verbo de acción. «Entonces» reproduce el valor narrativo de respuesta inmediata.
- source_word: ויז
  english_pob_choice: some of her blood spattered
  chosen_spanish: parte de su sangre salpicó[b]
  alternatives_spanish:
  - algo de su sangre salpicó
  - su sangre salpicó
  - salpicó sangre de ella
  lexicon: HALOT
  rationale: El verbo describe una salpicadura/rocío. «Parte de su sangre» refleja el valor partitivo de מן sin forzar una estructura demasiado literal en español. Se añade la nota para conservar la alternativa de traducirlo de manera más literal como «de su sangre».
- source_word: מדמה
  english_pob_choice: of her blood
  chosen_spanish: de su sangre
  alternatives_spanish:
  - desde su sangre
  - de la sangre de ella
  lexicon: HALOT
  rationale: El hebreo usa מן con sangre en sentido partitivo. En español, «de su sangre» es la forma más natural y fiel para expresar ese origen parcial del líquido que salpica.
- source_word: הקיר
  english_pob_choice: the wall
  chosen_spanish: el muro
  alternatives_spanish:
  - la pared
  - el muro de la casa
  lexicon: HALOT
  rationale: «קיר» puede ser «pared» o «muro». Aquí «muro» comunica con claridad una superficie amplia y resistente, adecuada al cuadro narrativo, sin añadir información no presente.
- source_word: הסוסים
  english_pob_choice: the horses
  chosen_spanish: los caballos
  alternatives_spanish:
  - los caballos de Jeú
  - los caballos del carro
  lexicon: HALOT
  rationale: Se traduce de forma directa. En español bíblico «caballos» es claro y natural; el contexto sugiere la tropa o los caballos asociados a Jehú, pero eso no necesita explicitarse en el texto principal.
- source_word: וירמסנה
  english_pob_choice: and he trampled her
  chosen_spanish: y él la atropelló
  alternatives_spanish:
  - y él la pisoteó
  - y él la aplastó
  - y la atropelló
  lexicon: HALOT
  rationale: רמס denota pisotear/trample. «Atropelló» comunica la violencia corporal en español moderno y encaja con la imagen de caballos y movimiento. Se mantiene el sujeto singular implícito («él») como en el hebreo, donde la acción recae en Jehú.
theological_decisions:
- issue: Conservar el sujeto singular de la última acción pese a la presencia de los caballos
  english_pob_reading: and he trampled her
  chosen_spanish_reading: y él la atropelló
  alternative_spanish_readings:
  - y los caballos la atropellaron
  - y la atropellaron
  rationale: El hebreo lleva un verbo singular con sujeto implícito masculino, por lo que la traducción conserva a Jehú como agente principal de la acción final. Los caballos forman parte del contexto, pero no sustituyen al sujeto gramatical.
  doctrine_reference: Gramática del texto hebreo; coherencia narrativa del pasaje
translation_notes:
  revision_awareness: No hubo cambios en la revisión más reciente; el estado final mostró acuerdo alto y ninguna enmienda pendiente. La presente propuesta mantiene esa lectura estable, conservando la repetición del verbo de arrojar y la imagen partitiva de la sangre.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se preserva la diferencia entre el verbo de orden («Échenla abajo») y el narrativo («la arrojaron abajo») para mantener la conexión léxica del hebreo.
  - «Atropelló» se elige por naturalidad y fuerza en español moderno; no implica que los caballos sean el sujeto gramatical.
  - La puntuación y el uso de comillas siguen el estilo de publicación en español bíblico contemporáneo.
