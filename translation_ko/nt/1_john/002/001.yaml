id: 1JN.2.1
reference: 1 John 2:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τεκνία μου, ταῦτα γράφω ὑμῖν ἵνα μὴ ἁμάρτητε. καὶ ἐάν τις ἁμάρτῃ, παράκλητον ἔχομεν πρὸς τὸν πατέρα Ἰησοῦν Χριστὸν δίκαιον,
base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/001.yaml
  text: My little children[a], I write these things to you so that you may not sin. But if anyone does sin[b], we have an advocate with the Father—Jesus Messiah the Righteous One.
  footnotes:
  - marker: a
    text: Or 'advocate' may also be understood more broadly as 'helper,' 'counselor,' or 'comforter'; the Greek term is παράκλητος.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''Jesus Christ.'' The Greek title Χριστός can mean ''Messiah'' or function name-like as ''Christ.'''
    reason: alternative_reading
translation:
  language: ko
  text: 나의 자녀들이여, 내가 이것들을 여러분에게 쓰는 것은 여러분이 죄를 짓지 않게 하려 함입니다. 그러나 만일 누가 죄를 짓더라도, 우리에게는 아버지께 [b]대언자[a]가 계시니, 곧 의로우신 예수 메시아이십니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「변호자」, 「위로자」. 헬라어 παράκλητος는 법정에서 변호하는 자를 가리킨다. 한국 교회 전통은 요한복음 14–16장의 성령에 대해서는 「보혜사」로 옮기지만, 본 절에서는 부활하신 예수께서 아버지 앞에서 신자들을 위해 대언하시는 역할을 가리키므로 「대언자」로 옮긴다(「보혜사」는 본 절에 부적절).
    reason: lexical_alternative
  - marker: b
    text: 또는 「예수 그리스도 곧 의로우신 분」. δίκαιον은 「의로우신 분」이라는 칭호적 함의를 지닌다.
    reason: alternative_reading
lexical_decisions:
- source_word: Τεκνία μου
  english_pob_choice: My little children
  chosen_korean: 나의 자녀들이여
  alternatives_korean:
  - 나의 어린 자녀들이여
  - 내 자녀들아
  lexicon: BDAG
  rationale: τεκνίον은 τέκνον의 지소형으로 애정 어린 호칭. 합쇼체 권면 문맥에서 「나의 자녀들이여」가 친밀함과 권위를 함께 담는다.
- source_word: παράκλητον
  english_pob_choice: advocate
  chosen_korean: 대언자
  alternatives_korean:
  - 변호자
  - 위로자
  - 보혜사
  lexicon: BDAG
  rationale: παράκλητος는 「곁에 부름 받은 자」 — 변호자·옹호자. 한국 교회 전통은 요한복음의 성령을 「보혜사」로 굳혔으나 본 절은 부활 승천하신 예수께서 아버지 앞에서 행하시는 대언 사역을 가리킨다. 따라서 본 절에서는 「대언자」로 옮기고 「보혜사」는 사용하지 않는다.
- source_word: δίκαιον
  english_pob_choice: the Righteous One
  chosen_korean: 의로우신
  alternatives_korean:
  - 의로운 분
  lexicon: BDAG
  rationale: δίκαιος는 칭호적으로 기능 — 의로우신 분이신 예수. 한국어 관형형으로 자연스럽게 「의로우신 예수 메시아」로 옮긴다.
theological_decisions:
- issue: παράκλητος를 「보혜사」가 아닌 「대언자」로 옮김
  chosen_reading: 대언자
  alternative_readings:
  - 보혜사
  - 변호자
  - 위로자
  rationale: 한국 교회 전통에서 「보혜사」는 요한복음 14–16장의 성령을 가리키는 고정 칭호로 굳어졌다. 그러나 본 절 1 요한 2:1의 παράκλητος는 부활 승천하신 예수 자신이며, 아버지 앞에서 신자들을 위해 대언하시는 사역을 가리킨다. 한국어 「보혜사」를 본 절에 쓰면 성령의 칭호와 충돌되어 본문의 기독론적 정확성이 흐려진다. 따라서 본 절은 사역의 본질(법정적 옹호·대언)을 직접 드러내는 「대언자」로 옮기고, 「보혜사」는 요한복음의 성령에 한정한다.
  doctrine_reference: DOCTRINE.md §1 — 본문의 원의를 보존; ecclesial tradition 분리
