review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: sujeto colectivo, participio durativo, adverbio de modo, discurso directo, imperativos y el nombre divino «Yahvé». Sin embargo, en la cláusula final omite el objeto implícito que el inglés POB suple legítimamente («it») y produce una frase española incompleta o poco natural: «Yahvé entregará en mano del rey». El hebreo permite objeto implícito, pero en español aquí conviene explicitarlo para fidelidad comunicativa.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «Ramot-galaad» suena menos natural que la forma española común «Ramot de Galaad», y «entregará en mano del rey» resulta forzado e incompleto en español. «Ten éxito» es entendible, aunque «prospera» encaja mejor con el imperativo breve y con la alternativa documentada; no obstante, puede mantenerse con nota si se prefiere.
  glossary_alignment: 'Alinea bien con la política del proyecto en «Yahvé». No hay conflicto terminológico mayor. La principal corrección es estilístico-semántica: hacer explícito el objeto de «entregará» y usar una formulación española idiomática del modismo «en la mano de».'
  issues:
  - severity: medium
    issue: Objeto omitido en «Yahvé entregará en mano del rey»
    rationale: Aunque el hebreo no expresa el objeto de forma explícita, el inglés POB lo suple («it») por necesidad idiomática. En español, sin objeto, la cláusula queda anómala y puede sonar a traducción incompleta.
  - severity: medium
    issue: «en mano del rey» suena demasiado calcado
    rationale: El modismo hebreo בְּיַד se puede preservar con «en manos del rey» o «en la mano del rey». La forma singular sin artículo en español aquí no fluye bien.
  - severity: low
    issue: Topónimo «Ramot-galaad» menos natural en español
    rationale: «Ramot de Galaad» es más reconocible y legible en español eclesial general, sin pérdida de fidelidad.
  revised_spanish_text: 'Y todos los profetas estaban profetizando así, diciendo: «Sube a Ramot de Galaad y ten éxito[a], y Yahvé la entregará en manos del rey».

