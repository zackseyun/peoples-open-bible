    reason: lexical_alternative
  revision_rationale: 'Se corrigió la precisión léxica de יוֹקְשִׁים con «los que ponen lazos», que conserva mejor la imagen del hebreo y del inglés auditado. También se eliminó la nota [b] porque estaba anclada erróneamente: su contenido no correspondía a «está roto». Se mantuvo «nuestra alma» por fidelidad al texto inglés auditado y al registro poético, con la nota alternativa ya existente.'
