  rationale: Se corrige la ubicación y el contenido de la nota b para que corresponda al verbo hebreo וַיִּתְגַּל, como en la auditoría inglesa. También se ajusta 'se descubrió' a 'se dejó al descubierto' para expresar con más claridad en español el matiz reflexivo de autoexposición, sin añadir interpretación moral o sexual.
