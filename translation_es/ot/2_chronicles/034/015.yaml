translation:
  language: es
  text: 'Entonces Hilcías respondió y dijo a Safán, el escriba: «He hallado el Libro[a] de la Ley en la casa de Yahvé». Y Hilcías entregó el libro a Safán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el rollo de la Ley”; el hebreo sefer puede referirse a un libro, documento o rollo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: ענה en esta fórmula narrativa introduce una réplica. En español, 'respondió' comunica esa función con naturalidad y conserva el valor discursivo sin añadir matiz innecesario.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - dijo
  lexicon: HALOT
  rationale: אמר es el verbo ordinario de habla. 'Dijo' es la equivalencia más directa y clara en español bíblico moderno.
- source_word: הַסּוֹפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  - el cronista
  lexicon: HALOT
  rationale: סֹפֵר puede referirse a un funcionario escribal o secretario. 'Escriba' preserva la forma léxica y evita especificar en exceso su cargo.
- source_word: סֵפֶר הַתּוֹרָה
  english_pob_choice: the Book of the Law
  chosen_spanish: el Libro de la Ley
  alternatives_spanish:
  - el rollo de la ley
  - el libro de la instrucción
  lexicon: HALOT
  rationale: סֵפֶר abarca libro/documento/rollo. El inglés POB escogió 'Book'; en español, 'Libro' es idiomático y fiel. תּוֹרָה aquí se entiende mejor como 'Ley' en el corpus del pacto hallado en el templo.
- source_word: מָצָאתִי
  english_pob_choice: I have found
  chosen_spanish: He hallado
  alternatives_spanish:
  - He encontrado
  - Hallé
  lexicon: HALOT
  rationale: El perfecto hebreo presenta un hecho concluido con relevancia inmediata. 'He hallado' mantiene ese valor y suena digno y natural en español.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  - en la casa de Yahvé
  lexicon: HALOT
  rationale: בית es literalmente 'casa'. Se conserva la expresión del hebreo, y se usa 'Yahvé' según el estándar del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton. La política del proyecto exige 'Yahvé' como forma principal en español para mantener visible el nombre del pacto.
- source_word: וַיִּתֵּן ... אֶת הַסֵּפֶר אֶל שָׁפָן
  english_pob_choice: gave the book to Shaphan
  chosen_spanish: entregó el libro a Sefán
  alternatives_spanish:
  - dio el libro a Sefán
  - le dio el libro a Sefán
  lexicon: HALOT
  rationale: נתן es 'dar'. 'Entregó' funciona bien en español para el acto de pasar el documento a otra persona y evita repetición excesiva de 'dio'.
- source_word: שָׁפָן
  english_pob_choice: Shaphan
  chosen_spanish: Sefán
  alternatives_spanish:
  - Safán
  - Shafán
  lexicon: Transliteración tradicional adaptada
  rationale: Se adapta el nombre propio a una forma española legible. 'Sefán' refleja la consonancia hebrea de manera natural en español y distingue al personaje sin dependencia del inglés.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La edición inglesa ya decidió no ocultar el Tetragrámaton. En español, 'Yahvé' es la forma proyectada por la política terminológica del POB, manteniendo visible el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de תּוֹרָה en este contexto
  english_pob_reading: the Law
  chosen_spanish_reading: la Ley
  alternative_spanish_readings:
  - la instrucción
  - la enseñanza
  rationale: En 2 Crónicas 34:15 se trata del libro hallado en el templo, identificado por la tradición textual como la Ley. 'Ley' preserva ese valor legal-covenantal sin diluirlo en un sentido genérico.
  doctrine_reference: HALOT; uso contextual del Pentateuco/corpus del pacto
- issue: Función de סֵפֶר
  english_pob_reading: Book
  chosen_spanish_reading: Libro
  alternative_spanish_readings:
  - rollo
  - documento
  rationale: Aunque 'sefer' puede aludir a un rollo, el inglés POB optó por 'Book' por idiomaticidad. En español, 'Libro' conserva esa misma decisión sin obligar a precisar el formato material.
  doctrine_reference: HALOT; nota lexical del POB en inglés
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no había cambios necesarios y los controles cruzados reportaron alta concordancia. Este borrador mantiene esa línea: conserva el nombre divino visible, respeta el valor narrativo de los verbos hebreos y mantiene la ambigüedad material de sefer en nota, como en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme a la terminología del proyecto.
  - Se usa 'Libro de la Ley' en el cuerpo principal, con nota que conserva la alternativa 'rollo de la Ley'.
  - 'Los nombres propios se adaptan a una forma española estable: Hilcías, Sefán.'
  - El orden de las cláusulas sigue de cerca el hebreo, pero con sintaxis española fluida y publicable.
