  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι δέ ἐστε υἱοί, ἐξαπέστειλεν ὁ θεὸς τὸ πνεῦμα τοῦ υἱοῦ αὐτοῦ εἰς τὰς καρδίας ⸀ἡμῶν, κρᾶζον· Αββα ὁ πατήρ.
base_translation:
  language: en
  yaml_path: translation/nt/galatians/004/006.yaml
  text: And because you are sons[a], God sent the Spirit of his Son into our hearts, crying, “Abba[c][b], Father.”
  footnotes:
  - marker: a
    text: 'Some manuscripts read ''your hearts'' instead of ''our hearts.'''
    reason: textual_variant
  - marker: b
    text: '''Sons'' preserves Paul''s adoption-and-inheritance language here; the reference includes all believers, not males only.'
    reason: cultural_note
  - marker: c
    text: 'Abba is an Aramaic form of address for ''Father,'' retained here for its original emphasis and intimacy.'
    reason: lexical_alternative
translation:
  language: ko
  text: 여러분이 아들이므로, 하나님께서 자기 아들의 영을 우리[a] 마음속에 보내사 「아빠, 아버지」 하고 부르짖게 하셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 일부 사본은 「여러분의 마음」으로 읽는다.
    reason: textual_variant
lexical_decisions:
- source_word: τὸ πνεῦμα τοῦ υἱοῦ αὐτοῦ
  english_pob_choice: the Spirit of his Son
  chosen_korean: 자기 아들의 영
  alternatives_korean:
  - 그의 아들의 성령
  lexicon: BDAG
  rationale: 본문은 분명히 신적 영을 가리키지만, 「자기 아들의 영」 구문에서는 「영」이 자연스럽다.
- source_word: Αββα ὁ πατήρ
  english_pob_choice: Abba, Father
  chosen_korean: 아빠, 아버지
  alternatives_korean:
  - 아바, 아버지
  lexicon: BDAG
  rationale: 한국 성경 전통의 「아빠 아버지」 또는 「아바 아버지」를 따른다. 친밀성을 살리기 위해 「아빠」로 옮김.
