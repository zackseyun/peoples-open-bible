  yaml_path: translation/nt/john/017/024.yaml
  text: Father[a], I desire that those whom you have given me also may be with me where I am, so that they may see my glory that you have given me, because you loved me before the foundation of the world.
  footnotes:
  - marker: a
    text: Greek literally, 'what/that which you have given me'; the expression is collective and refers to the people the Father has given to the Son, hence 'those whom you have given me.'
    reason: lexical_alternative
translation:
  language: ko
  text: 아버지여, 아버지께서 내게 주신 자들도 내가 있는 곳에 나와 함께 있기를 원합니다. 그리하여 그들이 아버지께서 내게 주신 내 영광을 보게 하기 위함입니다. 아버지께서 창세 전부터 나를 사랑하셨기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어는 문자적으로 「아버지께서 내게 주신 것」이며, 본 집합적 표현은 아버지께서 아들에게 주신 사람들을 가리킨다.
    reason: lexical_alternative
