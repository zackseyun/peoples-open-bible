    rationale: El inglés POB conserva una alternativa para δικαίωμα; en español, si el texto principal usa «justicia», la nota no puede decir también «justicia». Debe ofrecer una alternativa semántica distinta, como «rectitud».
  - severity: low
    issue: La secuencia «de quienes el espíritu ha sido tomado de sus entrañas» es poco natural en español.
    rationale: Aunque es comprensible, el orden verbal resulta rígido. Reordenar a «de quienes ha sido tomado el espíritu de sus entrañas» mejora la fluidez sin apartarse del griego.
