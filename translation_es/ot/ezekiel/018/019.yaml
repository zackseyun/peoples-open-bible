translation:
  language: es
  text: 'Sin embargo, ustedes dicen[a]: “¿Por qué el hijo no lleva la iniquidad del padre?” Porque el hijo ha hecho justicia y rectitud, ha guardado todos mis estatutos y los ha puesto por obra; ciertamente vivirá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “la culpa del padre” o “el castigo por la iniquidad del padre”. El modismo hebreo “llevar iniquidad” puede incluir tanto la culpa como sus consecuencias.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲמַרְתֶּם
  english_pob_choice: Yet you say
  chosen_spanish: Sin embargo, ustedes dicen
  alternatives_spanish:
  - Y ustedes dicen
  - Pero ustedes dicen
  lexicon: HALOT
  rationale: La forma verbal introduce la objeción del pueblo en discurso directo. “Sin embargo” conserva bien el matiz adversativo de la respuesta divina frente a la queja anterior, sin sonar tan abrupto como “pero” en español.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿A causa de qué
  lexicon: HALOT
  rationale: Es la interrogativa natural y fiel al valor causal de מַדּוּעַ.
- source_word: לֹא נָשָׂא
  english_pob_choice: does ... not bear
  chosen_spanish: no lleva
  alternatives_spanish:
  - no carga
  - no soporta
  lexicon: HALOT
  rationale: Se mantiene el idiomático “llevar la iniquidad”, que en español comunica bien la noción bíblica de cargar con culpa o consecuencia sin resolverla demasiado pronto.
- source_word: הַבֵּן
  english_pob_choice: the son
  chosen_spanish: el hijo
  alternatives_spanish:
  - el hijo
  - el muchacho
  lexicon: HALOT
  rationale: “Hijo” es el equivalente más natural y neutral en español para la relación padre-hijo del texto.
- source_word: בַּעֲוֺן הָאָב
  english_pob_choice: the iniquity of the father
  chosen_spanish: la iniquidad del padre
  alternatives_spanish:
  - la culpa del padre
  - el castigo por la iniquidad del padre
  lexicon: HALOT
  rationale: Se conserva “iniquidad” para respetar el término hebreo עָוֹן y mantener la tensión semántica entre culpa y consecuencias. No se resuelve el giro a una sola interpretación.
- source_word: מִשְׁפָּט וּצְדָקָה
  english_pob_choice: justice and righteousness
  chosen_spanish: justicia y rectitud
  alternatives_spanish:
  - justicia y rectitud
  - lo justo y lo recto
  lexicon: HALOT
  rationale: “Rectitud” comunica de manera clara y digna el valor de צְדָקָה en español, sin perder el par legal-ético con מִשְׁפָּט. Se evita “justicia y justicia” o fórmulas demasiado abstractas.
- source_word: עָשָׂה
  english_pob_choice: has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - ha practicado
  - ha obrado
  lexicon: HALOT
  rationale: Mantiene el aspecto resultativo del perfecto y su sentido concreto de conducta realizada.
- source_word: חֻקּוֹתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis preceptos
  - mis decretos
  lexicon: HALOT
  rationale: “Estatutos” es el término jurídico-covenantal más estable en español para חֻקּוֹתַי y conserva la relación con la obediencia a la ley divina.
- source_word: שָׁמַר
  english_pob_choice: has kept
  chosen_spanish: ha guardado
  alternatives_spanish:
  - ha observado
  - ha cumplido
  lexicon: HALOT
  rationale: “Guardar” reproduce bien el valor covenantal de שָׁמַר y armoniza con “cumplido” en la cláusula siguiente.
- source_word: וַיַּעֲשֶׂה אֹתָם
  english_pob_choice: and has done them
  chosen_spanish: y los ha cumplido
  alternatives_spanish:
  - y los ha hecho
  - y los ha practicado
  lexicon: HALOT
  rationale: En español, “cumplir” expresa con mayor naturalidad la obediencia activa a estatutos que la repetición literal de “hacerlos”, sin perder el énfasis en la ejecución real de lo mandado.
- source_word: חָיֹה יִחְיֶה
  english_pob_choice: he shall surely live
  chosen_spanish: ciertamente vivirá
  alternatives_spanish:
  - vivirá seguramente
  - vivirá sin duda
  lexicon: HALOT
  rationale: La construcción enfática hebrea se refleja con “ciertamente” más el futuro, preservando la certeza y el peso solemne del oráculo.
theological_decisions:
- issue: Significado de “llevar la iniquidad del padre”
  english_pob_reading: Retain the idiom without specifying whether it refers primarily to inherited guilt or to punishment for the father's sin.
  chosen_spanish_reading: Mantener el modismo sin decidir si apunta sobre todo a culpa heredada o al castigo por el pecado del padre.
  alternative_spanish_readings:
  - llevar la culpa del padre
  - llevar el castigo por la iniquidad del padre
  rationale: El hebreo עָוֹן puede abarcar culpa y sus consecuencias. La traducción conserva la ambigüedad bíblica para no cerrar indebidamente la tensión teológica del pasaje.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it).
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del texto base, que cambió la conexión lógica de “But” a “Because” en la segunda cláusula. En español, esa relación se refleja mejor con “Porque” al inicio de la respuesta divina. Se mantiene además la decisión auditada de conservar la tensión del modismo “llevar la iniquidad”.
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el hebreo lo exige explícitamente; en este versículo no aparece el nombre divino, por lo que se conserva “mis estatutos” sin sustitución.
  - “Justicia y rectitud” mantiene el par ético-jurídico de מִשְׁפָּט וּצְדָקָה sin forzar un término eclesiástico.
  - Se evita “siervo” porque el hebreo aquí no contiene δοῦλος ni un equivalente conceptual que lo requiera.
  - El futuro “vivirá” conserva la fuerza exhortativa/promisoria del hebreo con el intensificador “ciertamente”.
