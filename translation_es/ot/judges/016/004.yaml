translation:
  language: es
  text: Después de esto[a], amó a una mujer en el Valle de Sorec, y su nombre era Dalila.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «junto al wadi de Sorec». El hebreo נַחַל puede referirse a un valle, un cauce o un curso de agua estacional.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Y sucedió después de esto
  - Después
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea marca secuencia temporal. «Después de esto» conserva esa relación sin añadir un giro más pesado como «y sucedió» cuando el español puede expresar la transición de forma natural.
- source_word: וַיֶּאֱהַב
  english_pob_choice: he loved
  chosen_spanish: amó
  alternatives_spanish:
  - se enamoró de
  - tuvo amor por
  lexicon: HALOT
  rationale: El verbo אָהַב significa simplemente «amar». «Amó» refleja ese valor directo sin introducir la intensificación romántica de «se enamoró de».
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: a una mujer
  alternatives_spanish:
  - a una esposa
  lexicon: HALOT
  rationale: Aquí no se explicita relación matrimonial; por eso «mujer» es más fiel y neutral que «esposa».
- source_word: בְּנַחַל שֹׂרֵק
  english_pob_choice: in the Valley of Sorek
  chosen_spanish: en el Valle de Sorec
  alternatives_spanish:
  - junto al wadi de Sorec
  - en el Wadi Sorec
  lexicon: HALOT
  rationale: נַחַל puede abarcar valle, cauce o wadi estacional. «Valle» es una equivalencia clara y natural en español, mientras que «Sorec» conserva el nombre propio transliterado.
- source_word: וּשְׁמָהּ
  english_pob_choice: and her name was
  chosen_spanish: y su nombre era
  alternatives_spanish:
  - y se llamaba
  - cuyo nombre era
  lexicon: HALOT
  rationale: La cláusula introduce el nombre de la mujer. «Y su nombre era» sigue de cerca la estructura hebrea y suena natural en español bíblico contemporáneo.
- source_word: דְּלִילָה
  english_pob_choice: Delilah
  chosen_spanish: Dalila
  alternatives_spanish:
  - Delila
  lexicon: convención onomástica bíblica en español
  rationale: Se usa la forma española establecida del nombre propio, «Dalila», para legibilidad y coherencia con el uso bíblico en español.
translation_notes:
  revision_awareness: El texto base inglés y la evaluación de revisión permanecen sin cambios relevantes; la presente versión sigue el mismo sentido y la misma decisión léxica central, ajustada al español natural y al valor amplio de נַחַל.
  spanish_consistency_notes:
  - Se mantuvo la secuencia narrativa breve del hebreo sin añadir explicaciones.
  - No se empleó «SEÑOR» ni terminología de ocultamiento del nombre divino, porque el versículo no contiene el Tetragrámaton.
  - Se prefirió «Dalila» como forma española estándar del nombre propio.
  - La nota al pie preserva la alternativa geográfica de נַחַל sin forzar una sola opción topográfica.
