theological_decisions:
- issue: Scope of ἐπὶ τὰ Ἑλληνικά
  chosen_reading: cultural-religious adoption of Greek customs
  alternative_readings:
  - become Greeks ethnically
  - adopt the Greek language only
  rationale: In the context of Antiochus's decrees, the phrase concerns conformity to Hellenistic practices and religion, not ethnic transformation. The translation avoids overstating it as formal apostasy while still reflecting the coercive cultural-religious shift in context.
