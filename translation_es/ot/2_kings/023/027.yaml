revisions:
- from: 'Y Yahvé dijo[a]: «También quitaré a Judá de delante de mí, así como quité a Israel; y rechazaré esta ciudad que escogí: Jerusalén, y la casa de la cual dije[b]: “Mi nombre estará allí”».'
  to: 'Y Yahvé dijo: «También quitaré a Judá de delante de mí, así como quité a Israel; y rechazaré[a] esta ciudad que escogí —Jerusalén—, y la casa[b] de la cual dije: “Mi nombre estará allí”».'
  rationale: 'Se corrigen los anclajes de las notas para que correspondan exactamente a los elementos que explican en el texto fuente y en la auditoría inglesa: la alternativa aspectual se ancla en «rechazaré», y la alternativa léxica se ancla en «la casa». También se mejora la puntuación de la aposición «Jerusalén» para un español más natural y una correspondencia más clara con la estructura identificativa del hebreo.'
