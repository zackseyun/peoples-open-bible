  lexicon: número cardinal
  rationale: Equivale al cardinal hebreo sin cambio de sentido.
- source_word: נָפֶשׁ
  english_pob_choice: persons
  chosen_spanish: personas
  alternatives_spanish:
  - almas
  - vidas
  lexicon: HALOT
  rationale: La repetición final vuelve a usar נֶפֶשׁ como unidad de conteo humano; «personas» conserva la claridad administrativa del pasaje.
