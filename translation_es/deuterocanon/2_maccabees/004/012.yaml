revisions:
- from: Pues él estableció con gusto un gimnasio[a] bajo la misma acrópolis, y, sometiendo a los más distinguidos de nuestros jóvenes, los iba conduciendo bajo el petaso.
  to: Pues él estableció con gusto un gimnasio bajo la misma acrópolis, y a los más distinguidos de nuestros jóvenes los iba poniendo bajo el petaso[a].
  rationale: 'Se reubica la nota al pie en la frase que realmente explica. También se ajusta la segunda mitad del versículo para reflejar con más claridad la construcción griega ὑποτάσσων ὑπὸ πέτασον ἦγεν: no solo los conducía, sino que los iba poniendo bajo ese distintivo helenístico. La revisión conserva el objeto cultural concreto, el imperfecto progresivo y la referencia histórica a la acrópolis.'
