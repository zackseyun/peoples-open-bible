  to: Hizo lazos de hilo azul en el borde de la primera cortina al extremo del primer conjunto unido[a]; de la misma manera los hizo en el borde de la cortina más exterior del segundo conjunto unido.
  rationale: 'Se hicieron ajustes menores para mejorar precisión léxica y naturalidad del español sin cambiar el sentido: «lazos» refleja mejor los loops textiles; se eliminó la coma innecesaria; se explicitó el objeto en «de la misma manera los hizo»; y «más exterior» transmite mejor la idea de la cortina extrema del conjunto. La nota al pie se conserva porque refleja una alternativa léxica documentada para מַחְבָּרֶת.'
