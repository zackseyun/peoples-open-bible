translation:
  language: es
  text: El que disciplina a su hijo sacará provecho de él, y entre sus conocidos se jactará por él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ παιδεύων
  english_pob_choice: He who disciplines
  chosen_spanish: El que disciplina
  alternatives_spanish:
  - El que تربa
  - El que instruye
  - El que corrige
  lexicon: BDAG
  rationale: παιδεύω abarca formación, instrucción y corrección disciplinaria. En este contexto sapiencial de crianza, «disciplina» conserva el matiz formativo y correctivo sin reducirlo a castigo ni suavizarlo a mera enseñanza.
- source_word: τὸν υἱὸν αὐτοῦ
  english_pob_choice: his son
  chosen_spanish: a su hijo
  alternatives_spanish:
  - a su niño
  - a su descendiente
  lexicon: BDAG
  rationale: El griego es masculino singular específico, por lo que se mantiene «su hijo» y no una forma neutral.
- source_word: ὀνήσεται
  english_pob_choice: will profit by
  chosen_spanish: se beneficiará de
  alternatives_spanish:
  - sacará provecho de
  - le será provechoso
  lexicon: BDAG
  rationale: El futuro medio expresa recibir ventaja o beneficio. En español, «se beneficiará de» comunica con naturalidad esa ganancia derivada del hijo formado.
- source_word: ἐπʼ αὐτῷ
  english_pob_choice: by him
  chosen_spanish: de él
  alternatives_spanish:
  - por él
  - a causa de él
  lexicon: BDAG
  rationale: Con ὀνήσεται, la preposición marca la base o fuente del beneficio. En español, «de él» funciona de manera idiomática y preserva la relación causal/beneficiosa.
- source_word: ἀνὰ μέσον γνωρίμων
  english_pob_choice: among his acquaintances
  chosen_spanish: entre sus conocidos
  alternatives_spanish:
  - en medio de sus conocidos
  - entre sus amigos
  lexicon: BDAG
  rationale: γνωρίμων designa personas conocidas o allegados; «conocidos» evita forzar una cercanía afectiva que el griego no exige.
- source_word: καυχήσεται
  english_pob_choice: he will boast
  chosen_spanish: se jactará
  alternatives_spanish:
  - se gloriará
  - se enorgullecerá
  lexicon: BDAG
  rationale: καυχάομαι puede ser jactarse o gloriarse. «Se jactará» conserva el valor directo del verbo sin importar una valoración moral que el verso no explicita.
- source_word: ἐπʼ αὐτῷ
  english_pob_choice: because of him
  chosen_spanish: por él
  alternatives_spanish:
  - a causa de él
  - por causa de él
  lexicon: BDAG
  rationale: En la cláusula final, la preposición expresa el motivo del orgullo/jactancia. «Por él» es breve y natural en español, manteniendo la idea de que el hijo es la razón del dicho.
theological_decisions:
- issue: Valence moral de la jactancia paterna
  english_pob_reading: Render καυχήσεται as 'will boast' without softening to 'take pride.'
  chosen_spanish_reading: Traducir con «se jactará» sin atenuarlo a «se enorgullecerá».
  alternative_spanish_readings:
  - se enorgullecerá
  - gloriará
  rationale: El texto describe el honor social que procede de un hijo bien disciplinado. No introduce una evaluación ética explícita del acto de jactarse; por eso se conserva el sentido llano del verbo y la tensión sapiencial del pasaje.
  doctrine_reference: Preservar la tensión textual sin resolverla prematuramente.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no hubo cambios sustantivos en el texto inglés de referencia ni en la lectura crítica principal.'
  spanish_consistency_notes:
  - Se mantiene «disciplina» para παιδεύω, en línea con el valor formativo-correctivo definido en la auditoría inglesa.
  - Se conserva la especificidad masculina de «su hijo».
  - Se traduce el beneficio con un verbo medio-reflexivo natural en español («se beneficiará de») para reflejar el medio griego.
  - Se evita «Cristo», «SEÑOR» u otra terminología ajena al pasaje; no intervienen aquí decisiones teológicas de nomenclatura.
  - «Se jactará» mantiene el carácter directo del original y la decisión inglesa de no suavizar el verbo.
