id: 2CH.15.15
reference: 2 Chronicles 15:15
source:
  edition: WLC
  text: וַ/יִּשְׂמְח֨וּ כָל יְהוּדָ֜ה עַל הַ/שְּׁבוּעָ֗ה כִּ֤י בְ/כָל לְבָבָ/ם֙ נִשְׁבָּ֔עוּ וּ/בְ/כָל רְצוֹנָ֣/ם בִּקְשֻׁ֔/הוּ וַ/יִּמָּצֵ֖א לָ/הֶ֑ם וַ/יָּ֧נַח יְהוָ֛ה לָ/הֶ֖ם מִ/סָּבִֽיב־־־־׃
translation:
  text: And all Judah rejoiced over the oath[a], because they had sworn with all their heart and sought him with all their will, and he let himself be found by them, and Yahweh gave them rest all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'he was found by them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂמְחוּ
  chosen: rejoiced
  alternatives:
  - were glad
  lexicon: HALOT
  rationale: The verb שמח denotes joy/rejoicing. 'Rejoiced' fits the covenantal and communal setting better than the flatter 'were glad.'
- source_word: כָל יְהוּדָה
  chosen: all Judah
  alternatives:
  - all the people of Judah
  - all Judea
  lexicon: HALOT
  rationale: A collective reference to the people/kingdom of Judah. 'All Judah' is idiomatic and concise; 'Judea' would be anachronistic here.
- source_word: עַל הַשְּׁבוּעָה
  chosen: over the oath
  alternatives:
  - because of the oath
  - concerning the oath
  lexicon: HALOT
  rationale: עַל with an emotion verb naturally conveys the object/cause of rejoicing. 'Over the oath' is natural English and preserves the focus on the sworn covenant.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for their rejoicing. 'Because' is clearer in modern English than 'for.'
- source_word: בְכָל לְבָבָם
  chosen: with all their heart
  alternatives:
  - with their whole heart
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the Hebrew expression for wholeheartedness.
- source_word: נִשְׁבָּעוּ
  chosen: had sworn
  alternatives:
  - swore
  lexicon: HALOT
  rationale: The perfect gives the ground for the rejoicing; English pluperfect smoothly reflects prior action relative to the main narrative verb.
- source_word: וּבְכָל רְצוֹנָם
  chosen: with all their desire
  alternatives:
  - with all their will
  - willingly
  - with all their pleasure
  lexicon: HALOT
  rationale: רָצוֹן here conveys willing desire/delight. 'With all their desire' preserves the noun and parallels 'with all their heart.' 'Willingly' is possible but compresses the expression too much.
- source_word: בִּקְשֻׁהוּ
  chosen: sought him
  alternatives:
  - sought the LORD
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the LORD from context. 'Sought him' preserves the Hebrew form without unnecessarily repeating the divine name.
- source_word: וַיִּמָּצֵא לָהֶם
  chosen: he let himself be found by them
  alternatives:
  - he was found by them
  - he was accessible to them
  lexicon: HALOT
  rationale: The Niphal of מצא in this theological context often means that God allowed himself to be found in response to seeking. 'He was found by them' is more literal, but 'he let himself be found by them' better communicates the relational nuance without overparaphrasing.
- source_word: וַיָּנַח יְהוָה לָהֶם
  chosen: the LORD gave them rest
  alternatives:
  - the LORD granted them rest
  - the LORD gave them relief
  lexicon: HALOT
  rationale: The Hiphil of נוח here means to give rest or cause to rest. 'Gave them rest' is standard and fits the Chronicler's covenant-rest theme.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִסָּבִיב
  chosen: all around
  alternatives:
  - on every side
  - from all around
  lexicon: HALOT
  rationale: Idiomatic expression indicating surrounding peace from enemies or disturbance. 'All around' is natural modern English.
