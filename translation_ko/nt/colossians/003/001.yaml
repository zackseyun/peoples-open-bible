id: COL.3.1
reference: Colossians 3:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εἰ οὖν συνηγέρθητε τῷ Χριστῷ, τὰ ἄνω ζητεῖτε, οὗ ὁ Χριστός ἐστιν ἐν δεξιᾷ τοῦ θεοῦ καθήμενος·
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/001.yaml
  text: If, then, you were raised with the Messiah, seek the things above, where the Messiah is, seated at the right hand of God.
translation:
  language: ko
  text: 그러므로 여러분이 메시아와 함께 살아났다면, 위에 있는 것들을 구하십시오. 거기 메시아께서 하나님의 오른편에 앉아 계십니다.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Εἰ οὖν
  english_pob_choice: If, then
  chosen_korean: 그러므로 ... 한다면
  alternatives_korean:
  - 그러면 ~한다면
  - 만일 그렇다면
  lexicon: BDAG
  rationale: 조건 εἰ와 추론적 οὖν를 「그러므로 ~한다면」으로 옮긴다. 문맥상 참으로 가정된 조건이나 형식은 보존.
- source_word: συνηγέρθητε τῷ Χριστῷ
  english_pob_choice: you were raised with the Messiah
  chosen_korean: 메시아와 함께 살아났다면
  alternatives_korean:
  - 그리스도와 함께 일으킴을 받았다면
  - 메시아와 함께 부활하였다면
  lexicon: BDAG
  rationale: συν- 접두사로 「함께」 보존. 「살아났다」가 부활 사건의 가장 자연스러운 한국어.
- source_word: τὰ ἄνω ζητεῖτε
  english_pob_choice: seek the things above
  chosen_korean: 위에 있는 것들을 구하십시오
  alternatives_korean:
  - 위의 것들을 추구하십시오
  - 하늘의 것들을 찾으십시오
  lexicon: BDAG
  rationale: 현재 명령. 「구하다」가 한국 교회의 정립된 표현으로 지속적 추구 함의도 담는다.
- source_word: οὗ
  english_pob_choice: where
  chosen_korean: 거기
  alternatives_korean:
  - 그 곳에
  lexicon: BDAG
  rationale: 처소 관계 부사. 「거기」로 자연스럽게 옮긴다.
- source_word: ὁ Χριστός
  english_pob_choice: the Messiah
  chosen_korean: 메시아께서
  alternatives_korean:
  - 그리스도께서
  lexicon: BDAG
  rationale: 정관사 Χριστός의 칭호성 보존.
- source_word: ἐν δεξιᾷ τοῦ θεοῦ καθήμενος
  english_pob_choice: seated at the right hand of God
  chosen_korean: 하나님의 오른편에 앉아 계십니다
  alternatives_korean:
  - 하나님 우편에 앉으셨습니다
  - 하나님의 오른편에 좌정해 계십니다
  lexicon: BDAG
  rationale: 한국 교회의 정립된 「하나님의 오른편에 앉아 계신다」 정형 표현 사용.
