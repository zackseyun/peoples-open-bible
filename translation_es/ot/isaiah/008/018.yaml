translation:
  language: es
  text: He aquí yo y los hijos que Yahvé me ha dado somos para señales y prodigios en Israel, de parte de Yahvé de los Ejércitos[a], que habita en el monte Sion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más tradicional, «el SEÑOR de los Ejércitos».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: HALOT
  rationale: La partícula deíctica introductoria pide una forma que convoque atención. «He aquí» conserva el tono profético y solemne sin sonar tan coloquial como «Miren» o «Vean».
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente tiene énfasis, pero en español la estructura con «He aquí» y la coordinación ya lo comunican. El sujeto explícito «yo» mantiene la naturalidad y el peso enfático.
- source_word: וְהַיְלָדִים
  english_pob_choice: and the children
  chosen_spanish: y los hijos
  alternatives_spanish:
  - y los niños
  - y los muchachos
  lexicon: HALOT
  rationale: En este contexto se trata de los descendientes de Isaías como don de Yahvé. «Hijos» es más natural en español bíblico para este vínculo familiar y evita la ambigüedad de edad de «niños» o la restricción de «muchachos».
- source_word: אֲשֶׁר נָתַן לִי יְהוָה
  english_pob_choice: whom the LORD has given me
  chosen_spanish: que Yahvé me ha dado
  alternatives_spanish:
  - que Yahvé me dio
  - a quienes Yahvé me ha dado
  lexicon: HALOT
  rationale: La relativa identifica a los hijos como regalo divino. El presente perfecto refleja bien la acción pasada con vigencia presente; «me dio» es posible, pero menos directo al énfasis actual del contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el hebreo, conforme a la política del proyecto. «Yahvé» es el equivalente español directo del transliterado usado en el texto inglés.
- source_word: לְאֹתוֹת
  english_pob_choice: for signs
  chosen_spanish: por señales
  alternatives_spanish:
  - para señales
  - como señales
  lexicon: HALOT
  rationale: El ל aquí expresa propósito/función. «Por» en español bíblico puede expresar finalidad funcional en una frase predicativa («ser por»), manteniendo la idea de función asignada. «Para» también es posible, pero «por» conserva mejor la construcción de estado/función.
- source_word: וּלְמוֹפְתִים
  english_pob_choice: and for wonders
  chosen_spanish: y prodigios
  alternatives_spanish:
  - y maravillas
  - y portentos
  lexicon: HALOT
  rationale: «מוֹפְתִים» refiere a hechos extraordinarios o señales portentosas. «Prodigios» mantiene dignidad bíblica y la relación semántica con «señales» sin forzar un tono demasiado moderno o interpretativo.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - para Israel
  lexicon: HALOT
  rationale: La preposición es locativa y la opción más directa en español es «en». «Entre» podría sugerir mediación social, y «para» desplaza el sentido.
- source_word: מֵעִם
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - de
  - desde
  lexicon: HALOT
  rationale: La construcción marca procedencia respecto de una persona. «De parte de» comunica origen y representación con mayor claridad en español que un simple «de», y evita sonar demasiado abstracto.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de las Huestes
  - Yahvé de los Ejércitos Celestiales
  lexicon: HALOT
  rationale: צְבָאוֹת se refiere a ejércitos/huestes. «De los Ejércitos» conserva la transparencia semántica del título divino y sigue la decisión del proyecto de no ocultar el nombre divino con sustituciones tradicionales.
- source_word: הַשֹּׁכֵן
  english_pob_choice: who dwells
  chosen_spanish: que habita
  alternatives_spanish:
  - que mora
  - que reside
  lexicon: HALOT
  rationale: El participio describe una acción característica y continua. «Habita» es natural en español bíblico y mantiene la idea estable de presencia residente.
- source_word: בְּהַר צִיּוֹן
  english_pob_choice: on Mount Zion
  chosen_spanish: en el monte Sion
  alternatives_spanish:
  - sobre el monte Sion
  - en el monte de Sion
  lexicon: HALOT
  rationale: En español, los nombres de montes suelen introducirse con «en el monte». «Sion» reproduce la forma tradicional castellana más reconocible, sin perder la referencia geográfica.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del proyecto exige transliterar el Tetragrámaton como nombre propio y no ocultarlo tras un título. «Yahvé» es la forma española establecida para ese nombre dentro del sistema POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Título יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de las Huestes
  - el SEÑOR de los Ejércitos
  rationale: Se traduce el título para mantener su sentido transparente y su fuerza militar/celestial. «Ejércitos» refleja bien צְבָאוֹת sin depender de la fórmula tradicional «huestes», que en español moderno puede sonar menos clara.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Función de «señales y prodigios»
  english_pob_reading: for signs and wonders
  chosen_spanish_reading: por señales y prodigios
  alternative_spanish_readings:
  - para señales y maravillas
  - como señales y prodigios
  rationale: La frase expresa función profética y valor de portento, no sólo comparación. «Por» permite mantener la fuerza de misión/señal asignada a Isaías y a sus hijos, mientras «prodigios» conserva la dimensión extraordinaria de מוֹפְתִים.
  doctrine_reference: Isaías 8:18; HALOT sobre אֹת / מוֹפֵת
translation_notes:
  revision_awareness: La redacción sigue de cerca la solución inglesa revisada, especialmente al unir «signs and wonders» sin duplicar la preposición equivalente a «for». Se ha mantenido la transparencia del nombre divino y del título con una opción española igualmente directa, adaptando la sintaxis para que suene natural en español sin perder la función profética del hebreo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יְהוָה en todo el versículo, conforme al estándar del proyecto.
  - Se traduce צְבָאוֹת con «los Ejércitos» para mantener transparencia semántica y uniformidad terminológica.
  - «He aquí» se usa como equivalente solemne de la apertura deíctica hebrea.
  - La pareja «señales y prodigios» evita suavizar el valor portentoso de מוֹפְתִים.
  - El orden final sigue la sintaxis española natural sin alterar las relaciones de origen, función y localización del hebreo.
