  text: καὶ εἶπεν αὐτοῖς ὁ Ἰησοῦς· Μὴ δύνανται οἱ υἱοὶ τοῦ νυμφῶνος πενθεῖν ἐφ’ ὅσον μετ’ αὐτῶν ἐστιν ὁ νυμφίος; ἐλεύσονται δὲ ἡμέραι ὅταν ἀπαρθῇ ἀπ’ αὐτῶν ὁ νυμφίος, καὶ τότε νηστεύσουσιν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/009/015.yaml
  text: 'And Jesus said to them[a], “The wedding attendants cannot mourn as long as the bridegroom is with them, can they? But days will come when the bridegroom is taken away from them[b], and then they will fast.”'
  footnotes:
  - marker: a
    text: Literally, 'the sons of the wedding hall,' an idiom for the bridegroom's companions or wedding attendants.
    reason: lexical_alternative
  - marker: b
    text: Or 'when the bridegroom is removed from them.' The passive wording suggests more than an ordinary departure.
    reason: lexical_alternative
translation:
  language: ko
  text: '예수님이 그들에게 말씀하셨습니다. 「혼인집 손님들이 신랑과 함께 있는 동안에 슬퍼할 수 있겠느냐? 그러나 신랑을 그들에게서 빼앗길 날이 올 것이며, 그때에 그들이 금식할 것이다.'
  philosophy: optimal-equivalence
