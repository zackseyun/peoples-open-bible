translation:
  language: es
  text: Yo también les escribiré palabras de aliento, honor[a] y presentes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «palabras de aliento, exaltación y presentes». El griego ὕψους significa literalmente «altura» o «elevación» y puede referirse a lenguaje de honra o de exaltación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γράψω
  english_pob_choice: I will write
  chosen_spanish: escribiré
  alternatives_spanish:
  - voy a escribir
  - les escribiré
  lexicon: LSJ
  rationale: El futuro activo indica una acción proyectada; el futuro simple español expresa con naturalidad esa intención sin añadir matices no presentes en el griego.
- source_word: κἀγώ
  english_pob_choice: I too
  chosen_spanish: Yo también
  alternatives_spanish:
  - Y yo
  - También yo
  lexicon: LSJ
  rationale: La crasis añade sentido enfático de inclusión; 'Yo también' conserva ese énfasis de manera natural en español.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: LSJ
  rationale: El dativo con γράψω se traduce idiomáticamente como complemento indirecto 'les' en español.
- source_word: λόγους
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - mensajes
  - declaraciones
  lexicon: LSJ
  rationale: '''Palabras'' conserva la amplitud del sustantivo griego y funciona bien como introducción al contenido del escrito.'
- source_word: παρακλήσεως
  english_pob_choice: encouragement
  chosen_spanish: aliento
  alternatives_spanish:
  - ánimo
  - exhortación
  - consuelo
  lexicon: LSJ
  rationale: En este contexto diplomático, el término apunta a un lenguaje favorable y alentador; 'aliento' transmite esa idea sin volverlo más técnico que el griego.
- source_word: ὕψους
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - exaltación
  - altura
  - elevación
  lexicon: LSJ
  rationale: Aunque literalmente significa 'altura' o 'elevación', el contexto de cartas y regalos sugiere lenguaje que confiere dignidad o estatus; 'honor' expresa bien ese valor social en español.
- source_word: δομάτων
  english_pob_choice: gifts
  chosen_spanish: regalos
  alternatives_spanish:
  - dones
  - presentes
  - obsequios
  lexicon: LSJ
  rationale: '''Regalos'' es una equivalencia clara y natural para el plural de objetos ofrecidos; evita una lectura demasiado técnica de ''dones'' y conserva el sentido material.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de Swete (γράψω κἀγὼ αὐτοῖς λόγους παρακλήσεως καὶ ὕψους καὶ δομάτων) y refleja la misma decisión interpretativa que la POB inglesa: tomar ὕψους en su posible sentido honorífico, no solo literal. No se introducen cambios textuales ni doctrinales, y se mantiene la ambigüedad léxica relevante mediante nota.'
  spanish_consistency_notes:
  - Se usa 'Yo también' para κἀγώ, manteniendo el énfasis aditivo.
  - '''Aliento'' traduce παρακλήσεως con un matiz positivo y diplomático, coherente con el contexto.'
  - '''Honor'' se conserva para ὕψους siguiendo la decisión auditada de la POB inglesa; la nota preserva la alternativa ''exaltación''.'
  - '''Regalos'' comunica δομάτων de forma directa y natural en español.'
  - No hay términos teológicos especiales en este versículo que requieran glosa doctrinal.
