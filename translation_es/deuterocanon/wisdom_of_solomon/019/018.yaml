translation:
  language: es
  text: Porque los elementos[a], al cambiar entre sí, como en un arpa las notas de la melodía alteran el nombre, aunque siempre permanecen en el mismo sonido, como puede inferirse con precisión por lo que se vio en lo sucedido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las notas de la medida alteran su designación». La expresión griega es condensada y algo difícil; se conserva «nombre» para mantener la imagen.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «al observar los acontecimientos». La cláusula final explica que la comparación se deduce de lo visto en los hechos narrados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στοιχεῖα
  english_pob_choice: elements
  chosen_spanish: los elementos
  alternatives_spanish:
  - los elementos básicos
  - las fuerzas elementales
  lexicon: LSJ
  rationale: En el contexto de Sabiduría 19, el referente es el orden creado y sus transformaciones en las plagas; «elementos» conserva esa referencia física sin cargar el término con una lectura filosófica posterior.
- source_word: μεθαρμοζόμενα
  english_pob_choice: changing among themselves
  chosen_spanish: al cambiar entre sí
  alternatives_spanish:
  - al ser reajustados entre sí
  - al transformarse unos en otros
  lexicon: LSJ
  rationale: El verbo sugiere una reconfiguración o reajuste mutuo. «Al cambiar entre sí» conserva esa reciprocidad y suena natural en español.
- source_word: ψαλτηρίῳ
  english_pob_choice: harp
  chosen_spanish: arpa
  alternatives_spanish:
  - salterio
  - instrumento de cuerdas
  lexicon: LSJ
  rationale: «Arpa» es el equivalente moderno más claro y concreto para el instrumento de cuerdas del símil, sin introducir una categoría demasiado técnica o poco familiar.
- source_word: φθόγγοι
  english_pob_choice: notes
  chosen_spanish: las notas
  alternatives_spanish:
  - los tonos
  - los sonidos
  lexicon: LSJ
  rationale: En el símil musical, «notas» expresa con mayor claridad las unidades sonoras diferenciadas que están en juego.
- source_word: τοῦ ῥυθμοῦ
  english_pob_choice: of the melody
  chosen_spanish: de la melodía
  alternatives_spanish:
  - del ritmo
  - de la medida
  lexicon: LSJ
  rationale: La revisión inglesa optó por «melody» por ser más natural. En español, «melodía» comunica mejor la idea de un patrón musical organizado que «ritmo» en este contexto, aunque el matiz antiguo pueda abarcar una disposición más amplia.
- source_word: τὸ ὄνομα διαλλάσσουσιν
  english_pob_choice: alter the name
  chosen_spanish: alteran el nombre
  alternatives_spanish:
  - cambian su designación
  - varían su denominación
  lexicon: LSJ
  rationale: Se conserva «nombre» para mantener la imagen comprimida y algo difícil del griego, tal como lo hace la POB inglesa. «Nombre» preserva la tensión lexical sin suavizarla en exceso.
- source_word: πάντοτε μένοντα ἤχῳ
  english_pob_choice: while always remaining in the sound
  chosen_spanish: mientras permanecen siempre en el sonido
  alternatives_spanish:
  - mientras siguen siempre en el sonido
  - aunque siempre permanecen en el tono
  lexicon: LSJ
  rationale: «En el sonido» retiene la continuidad auditiva de ἤχῳ sin forzar una paráfrasis interpretativa. «Permanecen siempre» refleja la permanencia a pesar del cambio.
- source_word: ὅπερ ἐστὶν εἰκάσαι
  english_pob_choice: as may be accurately inferred
  chosen_spanish: cosa que puede inferirse con precisión
  alternatives_spanish:
  - lo cual puede discernirse con precisión
  - como puede conjeturarse con exactitud
  lexicon: LSJ
  rationale: La cláusula final comenta que la analogía se capta por inferencia a partir de lo visto. «Puede inferirse con precisión» conserva el valor de ἀκριβῶς y el tono reflexivo del texto.
- source_word: ἐκ τῆς τῶν γεγονότων ὄψεως
  english_pob_choice: from the sight of what happened
  chosen_spanish: a partir de la vista de lo acontecido
  alternatives_spanish:
  - al observar lo sucedido
  - a partir de la observación de los hechos
  lexicon: LSJ
  rationale: «Vista» mantiene la imaginería visual de ὄψις y «lo acontecido» representa bien τῶν γεγονότων. La formulación conserva la base observacional del argumento.
theological_decisions:
- issue: Naturaleza de τα στοιχεῖα en el contexto de las plagas
  english_pob_reading: The verse describes natural elements being reconfigured, not personal cosmic powers or a later philosophical doctrine.
  chosen_spanish_reading: El versículo describe elementos naturales que se reconfiguran, no poderes cósmicos personales ni una doctrina filosófica posterior.
  alternative_spanish_readings:
  - elementos como fuerzas elementales
  - principios cósmicos reordenados
  rationale: La sección trata de transformaciones observables en la creación durante los eventos del éxodo. La traducción mantiene un registro concreto y fenoménico para no sobrecargar el texto con especulación metafísica.
  doctrine_reference: Principio de primacía del texto fuente; preservar la tensión interpretativa sin resolverla artificialmente
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del texto inglés, que favorece «melody» sobre «rhythm» para φθόγγοι τοῦ ῥυθμοῦ y enlaza con fluidez la cláusula final sin ruptura. La versión española refleja esa decisión con «melodía» y una subordinación natural.
  spanish_consistency_notes:
  - Se mantiene «elementos» como término físico-concreto, coherente con la política POB de evitar sobrerlecturas filosóficas cuando el contexto inmediato es narrativo y observable.
  - «Yahvé» no aparece en este versículo; por tanto, no hay sustitución de convenciones eclesiásticas que gestionar aquí.
  - «Nombre» se conserva deliberadamente para reproducir la dificultad del griego, tal como en la auditable decisión inglesa.
  - La traducción intenta ser publicable y clara, pero sin eliminar la rareza conceptual del original, especialmente en el símil musical.
