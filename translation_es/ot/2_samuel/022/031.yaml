  glossary_alignment: 'Alineación sólida con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; no hay conflictos con otros términos doctrinales. La decisión «probada» para צְרוּפָה es válida en español, y las alternativas «refinada» y «probada por el fuego» pueden mantenerse en nota. No hay razón documentada para una nota sobre «Yahvé» en este versículo.'
