revisions:
- from: También subió con ellos una multitud mezclada[a], y ovejas y vacas, un ganado[b] muy grande.
  to: También subió con ellos una multitud mezclada[a], y rebaños y manadas, muchísimo ganado.
  rationale: Se reemplazó «ovejas y vacas» por «rebaños y manadas» para reflejar mejor los colectivos hebreos צֹאן וּבָקָר sin sobreespecificar especies. Se cambió «un ganado muy grande» por «muchísimo ganado» para expresar de manera natural en español el sentido idiomático de מִקְנֶה כָּבֵד מְאֹד como gran abundancia de animales. Se eliminó la nota b por ser innecesaria una vez que el texto principal comunica bien el sentido.
