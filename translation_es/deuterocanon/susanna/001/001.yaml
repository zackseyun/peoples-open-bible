    issue: «Ahora bien» sobrerrepresenta el valor de καί inicial.
    rationale: El griego simplemente abre/continúa la narración. En español bíblico-natural, «Había» o «Y había» bastan; «Ahora bien» añade un matiz discursivo o de giro argumentativo no exigido por la fuente.
  - severity: medium
