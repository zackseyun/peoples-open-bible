revisions:
- from: Así que cumplirán mis estatutos[a] y guardarán mis juicios[a], y los pondrán por obra[b]; y habitarán en la tierra con seguridad[c].
  to: Por tanto, cumplirán mis estatutos[a] y guardarán mis juicios, y los pondrán por obra[b]; y habitarán en la tierra con seguridad[c].
  rationale: Se ajusta 'Así que' a 'Por tanto' para reflejar mejor el tono exhortativo-consecutivo del hebreo en español bíblico natural. Se simplifica el anclaje de la nota [a] a una sola aparición para evitar duplicación innecesaria, manteniendo la explicación de la distinción entre los dos términos legales. El resto del versículo preserva fielmente el sentido fuente, la repetición enfática de עשה y el marco pactal de habitar seguros en la tierra.
