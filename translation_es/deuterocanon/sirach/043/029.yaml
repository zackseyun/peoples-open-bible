translation:
  language: es
  text: Yahvé es sumamente sobrecogedor, y sus palabras son maravillosas.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «y su dominio es maravilloso» (o «su gobierno es maravilloso»), en lugar de «sus palabras son maravillosas», que sigue el hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: נורא / φοβερὸς
  english_pob_choice: awesome
  chosen_spanish: imponente
  alternatives_spanish:
  - temible
  - sobrecogedor
  - awe-inspiring
  lexicon: HALOT; LXX φοβερός
  rationale: El hebreo נורא y el griego φοβερὸς expresan algo que inspira temor reverente. En español, «imponente» comunica mejor esa mezcla de grandeza y sobrecogimiento que «terrible», sin sonar negativo o anticuado.
- source_word: ה' / Κύριος
  english_pob_choice: The Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Señor Dios
  lexicon: 'Proyecto POB: יְהוָה → Yahvé'
  rationale: El hebreo abreviado ה' remite al nombre divino; por norma del proyecto se traduce como «Yahvé». El paralelo griego Κύριος confirma que se trata del título divino, pero no obliga a ocultar el nombre en el texto español.
- source_word: מאד מאד / σφόδρα μέγας
  english_pob_choice: exceedingly
  chosen_spanish: sumamente
  alternatives_spanish:
  - en gran manera
  - sobremanera
  - excesivamente
  lexicon: HALOT; intensificación hebrea
  rationale: La duplicación de מאד intensifica fuertemente. «Sumamente» conserva la intensidad en un registro digno y fluido en español, sin la torpeza de una repetición literal.
- source_word: ונפלאות
  english_pob_choice: wondrous
  chosen_spanish: maravillosas
  alternatives_spanish:
  - admirables
  - extraordinarias
  - asombrosas
  lexicon: HALOT
  rationale: El término expresa lo extraordinario y digno de maravilla. «Maravillosas» es el equivalente más natural en español para mantener el tono elevado del hebreo.
- source_word: דבריו
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - sus hechos
  - sus actos
  - su dominio
  lexicon: HALOT
  rationale: El texto hebreo conservado dice literalmente «sus palabras». Se mantiene esa lectura como base principal, aun cuando el paralelo griego ofrezca una alternativa interpretativa distinta.
theological_decisions:
- issue: Nombre divino en Sirach 43:29
  english_pob_reading: The Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Señor (sin vocalizar el nombre)
  rationale: La política del proyecto para יהוה es traducir el nombre divino como «Yahvé». Aunque el griego usa Κύριος, aquí el hebreo extante proporciona base suficiente para conservar el nombre en el texto principal.
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé'
- issue: Tensión entre el hebreo extante y el paralelo griego en la segunda cola
  english_pob_reading: his words are wondrous
  chosen_spanish_reading: sus palabras son maravillosas
  alternative_spanish_readings:
  - su dominio es maravilloso
  - su gobierno es maravilloso
  rationale: Se mantiene el hebreo como lectura principal, porque es el testimonio extante del versículo. La variante griega, que habla del dominio o la soberanía, se conserva en nota para no borrar la tensión textual documentada.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail, que prefirió una forma natural de intensificación para מאד מאד en lugar de una repetición literal. La redacción española busca reflejar esa decisión con «sumamente», manteniendo la lectura hebrea principal y la variante griega en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se mantiene la fuerza reverencial de נורא/φοβερὸς sin caer en «terrible» como falso amigo.
  - «Sus palabras» sigue el hebreo extante; la nota preserva la divergencia del griego.
  - La puntuación y el orden sintáctico están ajustados a un español bíblico moderno y publicable.
