translation:
  language: es
  text: Y hubo alegría para todos sus hermanos en Nínive[a]. Y llegó Ahícar, y Nasbas su primo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''sus parientes'' o ''su familia''; el griego ''sus hermanos'' puede referirse de manera más amplia a los parientes.'
    reason: lexical_alternative
  - marker: b
    text: El griego de este versículo termina con 'y Nasbas su primo', continuando directamente en el siguiente versículo.
    reason: textual_variant
lexical_decisions:
- source_word: καὶ ἐγένετο
  english_pob_choice: there was
  chosen_spanish: y hubo
  alternatives_spanish:
  - y aconteció
  - y se produjo
  lexicon: BDAG
  rationale: En español, 'hubo' expresa con naturalidad el resultado o estado que se estableció, sin forzar una construcción mecánica de 'venir a ser'. Conserva el carácter narrativo y resumido del griego.
- source_word: χαρὰ
  english_pob_choice: joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: BDAG
  rationale: '''Alegría'' comunica bien el estado comunitario de felicidad en español actual y suena natural en un enunciado narrativo breve. ''Gozo'' sería también posible, pero puede sonar más marcado teológicamente en algunos registros.'
- source_word: πᾶσι
  english_pob_choice: all
  chosen_spanish: para todos
  alternatives_spanish:
  - a todos
  - para cada uno de
  lexicon: BDAG
  rationale: La secuencia española 'para todos' refleja con naturalidad el alcance total del dativo y reproduce la idea de beneficio o efecto experimentado por el grupo.
- source_word: τοῖς ἐν Νινευὴ
  english_pob_choice: in Nineveh
  chosen_spanish: en Nínive
  alternatives_spanish:
  - los que estaban en Nínive
  - los habitantes de Nínive
  lexicon: BDAG
  rationale: El valor locativo se conserva directamente con 'en Nínive', sin ampliar innecesariamente el texto.
- source_word: ἀδελφοῖς αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus familiares
  - sus deudos
  lexicon: BDAG
  rationale: La forma griega dice literalmente 'hermanos'. En este contexto puede abarcar parientes o correligionarios, pero el texto principal mantiene el plural masculino literal, y la nota conserva el matiz más amplio.
- source_word: παρεγένετο
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  - se presentó
  lexicon: BDAG
  rationale: '''Llegó'' es una opción narrativa natural en español para el verbo de llegada/presencia, especialmente en una secuencia de acciones.'
- source_word: Ἀχιάχαρος
  english_pob_choice: Ahikar
  chosen_spanish: Ahícar
  alternatives_spanish:
  - Ajícar
  - Ahicar
  lexicon: LSJ
  rationale: Se adopta una transliteración española transparente y reconocible en la tradición de Tobit, con acento gráfico para la pronunciación natural en español.
- source_word: Νασβὰς
  english_pob_choice: Nasbas
  chosen_spanish: Nasbas
  alternatives_spanish:
  - Nabas
  - Nadab
  lexicon: LSJ
  rationale: Se conserva la forma griega transmitida por Swete, siguiendo el criterio del texto base para el nombre propio.
- source_word: ὁ ἐξάδελφος αὐτοῦ
  english_pob_choice: his cousin
  chosen_spanish: su primo
  alternatives_spanish:
  - su pariente
  - su consanguíneo
  lexicon: BDAG
  rationale: ἐξάδελφος significa con precisión 'primo'; en español 'primo' reproduce bien la relación de parentesco indicada por el griego y evita una generalización innecesaria.
theological_decisions:
- issue: Alcance de ἀδελφοῖς αὐτοῦ
  english_pob_reading: Rendered literally as 'his brothers' with a note allowing the broader kinship sense
  chosen_spanish_reading: Traducido literalmente como 'sus hermanos', con nota que permite entender 'parientes' o 'familia' en sentido amplio
  alternative_spanish_readings:
  - sus parientes
  - sus familiares
  - su parentela
  rationale: No hay tensión doctrinal; la cuestión es semántica y de alcance referencial. El español principal conserva la literalidad del griego, mientras la nota preserva la posibilidad de un sentido más amplio, tal como lo hace el audit trail inglés.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Forma del nombre griego Ἀχιάχαρος
  english_pob_reading: Standard English transliteration of the proper name, avoiding an overly Greek-looking form while remaining recognizable in Tobit tradition
  chosen_spanish_reading: Se usa una transliteración española naturalizada ('Ahícar')
  alternative_spanish_readings:
  - Achiajaro
  - Ahiakar
  rationale: No afecta la doctrina, pero sí la legibilidad y la tradición literaria de Tobit en español. La forma elegida busca ser reconocible y pronunciable sin alejarse del nombre transmitido.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: El antecedente inglés revisó 'among all his brothers' a 'for all his brothers' para reflejar mejor el dativo; el español 'para todos sus hermanos' sigue esa decisión. También se preserva la terminación abierta del versículo con 'su primo', manteniendo la misma observación textual del audit trail.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' como norma del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton ni κύριος.
  - Se mantiene un registro moderadamente formal y bíblico, evitando arcaísmos innecesarios.
  - Los nombres propios se adaptan a una forma española legible, conservando la identificación con el texto griego.
