id: MAT.23.13
reference: Matthew 23:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οὐαὶ ⸀δὲ ὑμῖν, γραμματεῖς καὶ Φαρισαῖοι ὑποκριταί, ὅτι κλείετε τὴν βασιλείαν τῶν οὐρανῶν ἔμπροσθεν τῶν ἀνθρώπων· ὑμεῖς γὰρ οὐκ εἰσέρχεσθε, οὐδὲ τοὺς εἰσερχομένους ἀφίετε ⸀εἰσελθεῖν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/023/013.yaml
  text: But woe to you[a], scribes and Pharisees, hypocrites! For you shut the kingdom of heaven before people; for you do not enter[c][b], nor do you allow those who are entering to enter.
  footnotes:
  - marker: a
    text: Or 'the kingdom of the heavens.' Matthew regularly uses this expression where other contexts may say 'kingdom of God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'those trying to enter.' The Greek participle can denote those in the process of entering or seeking to enter.
    reason: lexical_alternative
  - marker: c
    text: Or 'allow those who are entering to enter'.
    reason: previous_rendering
translation:
  language: ko
  text: 그러나 너희에게 화가 있으리니, 서기관들과 바리새인들, 위선자들아! 너희가 사람들 앞에서 하늘 나라를 닫아 버리기 때문입니다. 너희도 들어가지 않고, 들어가려는 자들도 들어가지 못하게 합니다.
  philosophy: optimal-equivalence
theological_decisions:
- issue: 「화 있도다(οὐαὶ ὑμῖν)」를 완화 없이 보존
  chosen_reading: 「너희에게 화가 있으리니」 — 예언자적 진노 그대로
  alternative_readings:
  - 「너희에게 슬픔이 있으리라」 (완화)
  - 「너희에게 안된 일이 있으리라」
  rationale: 마태복음 23장의 일곱 가지 「화」 선언은 구약 예언자들이 외친 심판 신탁의 어조를 정확히 계승한다. 한국 전통 번역의 「화 있을진저」는 예스러우나 그 무게는 정확히 보존한다. 본 번역은 현대 합쇼체로 옮기되 그 예언자적 진노를 약화시키지 않으며, 동일한 어조를 23장 전체에서 일관되게 유지한다.
  doctrine_reference: 'DOCTRINE.md §5: render the source''s true and powerful meaning; do not soften prophetic indignation'
