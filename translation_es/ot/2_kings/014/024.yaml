translation:
  language: es
  text: Hizo lo malo a los ojos de Yahvé. No se apartó de ninguno de los pecados de Jeroboam hijo de Nebat[a], por los cuales hizo pecar a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que hizo pecar a Israel». El relativo hebreo puede entenderse como referido directamente a Jeroboam, más que instrumentalmente a sus pecados.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Y él hizo
  lexicon: HALOT
  rationale: El wayyiqtol introduce una acción narrativa. En español, el verbo simple en pasado mantiene la fuerza verbal sin sobrecargar la frase con una conjunción innecesaria.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: La expresión לעשות הרע es idiomática y señala evaluación moral. «Lo malo» conserva esa valoración sin volver la frase demasiado pesada en español.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: a los ojos de Yahvé
  alternatives_spanish:
  - a la vista de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: Se preserva el modismo hebreo de evaluación divina. «A los ojos de» es natural en español y sigue de cerca el original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención POB para el Tetragrámaton, conservando el nombre divino propio en lugar de sustituirlo por un título.
- source_word: לֹא סָר
  english_pob_choice: He did not turn away
  chosen_spanish: No se apartó
  alternatives_spanish:
  - No se desvió
  - No se volvió atrás
  lexicon: HALOT
  rationale: סור expresa apartarse o desviarse de un camino. «No se apartó» es una equivalencia natural y fiel al sentido moral del pasaje.
- source_word: מִכָּל
  english_pob_choice: from any of
  chosen_spanish: de ninguno de
  alternatives_spanish:
  - de cualquiera de
  - de alguno de
  lexicon: HALOT
  rationale: El hebreo con לֹא + מִכָּל comunica ausencia total de apartarse. En español, «de ninguno de» expresa bien esa totalidad negativa y suena más natural que una traducción literal rígida.
- source_word: חַטֹּאות
  english_pob_choice: the sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - las faltas
  - las iniquidades
  lexicon: HALOT
  rationale: El sustantivo plural refiere a actos pecaminosos concretos. «Pecados» es la opción más directa y estable en español bíblico contemporáneo.
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam hijo de Nabat
  alternatives_spanish:
  - Jeroboam, hijo de Nabat
  - Jeroboam, el hijo de Nabat
  lexicon: HALOT
  rationale: Se conserva la forma de parentesco con «hijo de» y la transliteración de los nombres propios en español, de manera consistente con la tradición de nombres bíblicos.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  english_pob_choice: which he caused Israel to commit
  chosen_spanish: con los cuales hizo pecar a Israel
  alternatives_spanish:
  - que hizo pecar a Israel
  - por los cuales hizo pecar a Israel
  lexicon: HALOT
  rationale: El causativo de חטא requiere una expresión que conserve la idea de inducir al pecado. «Hizo pecar a Israel» refleja con claridad esa causación; «con los cuales» mantiene la posibilidad instrumental del relativo en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto indica rendir el Tetragrámaton por el nombre propio divino. «Yahvé» preserva esa decisión y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación causal en la cláusula final
  english_pob_reading: which he caused Israel to commit
  chosen_spanish_reading: con los cuales hizo pecar a Israel
  alternative_spanish_readings:
  - que hizo pecar a Israel
  - por los cuales hizo pecar a Israel
  rationale: 'El hebreo permite entender la cláusula como referente a los pecados/prácticas de Jeroboam, mientras mantiene la causación sobre Israel. La forma elegida conserva la tensión: los pecados son el medio por el cual Israel fue llevado a pecar.'
  doctrine_reference: 'DOCTRINE.md: Source-anchored relative-clause handling and causative Hiphil of חטא'
translation_notes:
  revision_awareness: La versión inglesa auditada revisó «all» por «any» para לֹא סָר מִכָּל y afinó la cláusula final hacia una formulación más natural. En español se siguió ese ajuste semántico con «de ninguno de» y se optó por una redacción que conserve tanto el valor instrumental como el causativo del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en el texto principal.
  - Se usa «hizo pecar» para el causativo de חטא, en línea con la fuerza verbal del hebreo.
  - «Hijo de» se usa de manera consistente para la relación genealógica.
  - La negación con «ninguno de» refleja la totalidad negativa de לֹא סָר מִכָּל.
