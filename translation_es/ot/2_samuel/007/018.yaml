  to: 'Entonces el rey David entró y se sentó delante de Yahvé, y dijo[a]: «¿Quién soy yo, Señor Yahvé, y cuál es mi casa, que me hayas traído hasta aquí?»'
  rationale: Se corrige «para que» a «que» para reflejar con más fidelidad la función de כִּי en esta pregunta retórica y evitar un matiz de finalidad ajeno al hebreo. También se pule la nota para que la alternativa lexical suene más natural en español mientras conserva la explicación teológica sobre «casa».
