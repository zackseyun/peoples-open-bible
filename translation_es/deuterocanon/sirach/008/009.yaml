translation:
  language: es
  text: No te jactes[a] de alguien que se está muriendo; recuerda que todos nosotros estamos siendo reunidos.[b][c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «jactarse» o «gloriarse»; aquí se conserva el matiz de autoexaltación ante la muerte ajena.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo usa un eufemismo de muerte: literalmente, «estamos siendo reunidos». También puede entenderse como «todos nosotros moriremos».'
    reason: lexical_alternative
  - marker: c
    text: La tradición griega paralela de Sirácida 8:9 difiere considerablemente aquí y habla, en cambio, de aprender del discurso de los ancianos; por eso se sigue como texto principal el testimonio hebreo.
    reason: textual_variant
lexical_decisions:
- source_word: אַל תִּתְהַלֵּל
  english_pob_choice: Do not boast
  chosen_spanish: No te jactes
  alternatives_spanish:
  - No te gloríes
  - No te jactes de ti mismo
  - No te alabes
  lexicon: HALOT
  rationale: El hitpael de הלל puede expresar vanagloriarse o exultarse; en este contexto, con la persona que está muriendo, la idea es no triunfar ni gloriarse sobre su muerte. 'Jactarse' conserva bien ese matiz de autoexaltación o fanfarronería en español.
- source_word: גֹּוֵעַ
  english_pob_choice: one who is dying
  chosen_spanish: uno que está muriendo
  alternatives_spanish:
  - el que muere
  - el moribundo
  - uno que se está apagando
  lexicon: HALOT
  rationale: El participio señala un proceso en curso, no a alguien ya muerto. 'Uno que está muriendo' mantiene ese valor progresivo y resulta natural en español.
- source_word: זְכֹר
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - ten presente
  - acuérdate
  - haz memoria
  lexicon: HALOT
  rationale: Imperativo directo y idiomático. 'Recuerda' conserva la exhortación moral sin sobrecargar la frase.
- source_word: כֻּלָּנוּ
  english_pob_choice: all of us
  chosen_spanish: todos nosotros
  alternatives_spanish:
  - todos
  - nosotros todos
  lexicon: HALOT
  rationale: La forma pronominal es explícita e inclusiva; 'todos nosotros' mantiene esa fuerza personal en español.
- source_word: נֶאֱסָפִים
  english_pob_choice: are being gathered
  chosen_spanish: estamos siendo recogidos
  alternatives_spanish:
  - estamos siendo reunidos
  - seremos recogidos
  - somos recogidos
  lexicon: HALOT
  rationale: El nifal de אסף funciona como eufemismo para la muerte. 'Recogidos' conserva el campo semántico de reunión/recolección y la imagen velada del texto, sin explicitar de más 'morir'.
theological_decisions:
- issue: Eufemismo de muerte en נֶאֱסָפִים
  english_pob_reading: Retain the metaphor with 'are being gathered' rather than flattening to 'will die.'
  chosen_spanish_reading: Conservar la metáfora con 'estamos siendo recogidos' en vez de explicitar 'vamos a morir'.
  alternative_spanish_readings:
  - todos vamos a morir
  - estamos siendo reunidos con nuestros padres
  - somos llevados
  rationale: El hebreo usa un giro tradicional para la muerte. Mantener la imagen respeta el tono sapiencial y evita perder la textura literaria y teológica del verso.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Tensión textual con la tradición griega
  english_pob_reading: The Greek parallel tradition for Sirach 8:9 differs substantially here and speaks instead about learning from the discourse of elders; the Hebrew Cairo Geniza witness is therefore followed as the primary text for this verse.
  chosen_spanish_reading: Seguir el testimonio hebreo principal para esta forma del versículo, sin armonizarlo con el griego.
  alternative_spanish_readings:
  - 'armonizar con el griego: ''No te apartes del discurso de los ancianos'''
  - priorizar la tradición griega completa
  rationale: El paquete fuente indica una divergencia importante entre hebreo y griego. La redacción española debe reflejar la lectura hebrea base, porque es la que el audit trail establece como primaria para este registro.
  doctrine_reference: Source priority / textual criticism policy
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: se prefirió una equivalencia más cercana para תִּתְהַלֵּל y se mantuvo la forma participial de נֶאֱסָפִים sin añadir información no explícita. La traducción española refleja esa misma decisión de conservar el valor léxico y la metáfora.'
  spanish_consistency_notes:
  - Se emplea 'Yahvé' solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se evitó 'Cristo' y 'Señor' porque no corresponden al contenido del versículo.
  - '''Recogidos'' se usa como eufemismo sobrio y entendible para la muerte, coherente con el registro sapiencial.'
  - La puntuación separa la exhortación inicial de la cláusula motivadora, en paralelo con el hebreo.
