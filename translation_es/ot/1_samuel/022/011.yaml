translation:
  language: es
  text: Entonces el rey envió a llamar a Ahimelec hijo de Ahitub, el sacerdote[a], y a toda la casa de su padre, los sacerdotes que estaban en Nob; y todos ellos vinieron al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «toda la casa de su padre»; se trata del hogar o clan paterno en sentido amplio, no solo de la familia inmediata.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: mandó llamar
  alternatives_spanish:
  - envió a llamar
  - mandó traer
  lexicon: HALOT
  rationale: En este contexto real, שׁלח seguido de לִקְרֹא expresa una orden para hacer comparecer a alguien. En español, 'mandó llamar' comunica de forma natural la acción de enviar una convocatoria sin perder el matiz oficial del rey.
- source_word: לִקְרֹא
  english_pob_choice: to summon
  chosen_spanish: llamar
  alternatives_spanish:
  - convocar
  - hacer venir
  lexicon: HALOT
  rationale: El valor central es la citación oficial de una persona ante el rey. 'Llamar' funciona bien con 'mandó' y evita añadir más formalidad de la que el hebreo exige; 'convocar' sería posible, pero algo más técnico.
- source_word: אֲחִימֶלֶךְ בֶּן אֲחִיטוּב
  english_pob_choice: Ahimelech son of Ahitub
  chosen_spanish: Ahimelec hijo de Ahitub
  alternatives_spanish:
  - Ahimelec, hijo de Ahitub
  lexicon: transliteración propia del proyecto
  rationale: Se conservan los nombres propios con transliteración estándar al español y se mantiene la relación filial directa con 'hijo de' como en el hebreo y en la auditoría inglesa.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote principal
  - el clérigo
  lexicon: HALOT
  rationale: Aunque el inglés usa 'the priest', en español 'sacerdote' es la forma más natural y fiel para el oficio designado. 'Sacerdote' evita la rigidez de 'el sacerdote' repetido inmediatamente con el grupo sacerdotal posterior, pero conserva la función ministerial.
- source_word: כָּל בֵּית אָבִיו
  english_pob_choice: all his father's house
  chosen_spanish: toda la casa de su padre
  alternatives_spanish:
  - toda su casa paterna
  - toda la casa paterna
  lexicon: HALOT
  rationale: Se conserva el giro idiomático hebreo 'casa de su padre', que puede abarcar más que la familia inmediata. 'Toda la casa de su padre' sigue de cerca el hebreo y permite luego explicar el alcance colectivo mediante la nota.
- source_word: הַכֹּהֲנִים אֲשֶׁר בְּנֹב
  english_pob_choice: the priests who were at Nob
  chosen_spanish: los sacerdotes que estaban en Nob
  alternatives_spanish:
  - los sacerdotes que vivían en Nob
  - los sacerdotes de Nob
  lexicon: HALOT
  rationale: '''Estaban en Nob'' refleja la localización sin forzar una permanencia prolongada. ''De Nob'' sería más breve, pero puede borrar la información locativa explícita del hebreo.'
- source_word: וַיָּבֹאוּ כֻלָּם
  english_pob_choice: and they all came
  chosen_spanish: y todos ellos vinieron
  alternatives_spanish:
  - y todos llegaron
  - y vinieron todos
  lexicon: HALOT
  rationale: '''Todos ellos'' reproduce el énfasis totalizador de כֻּלָּם, y ''vinieron'' mantiene la dirección hacia el rey de manera sobria y natural en español.'
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - ante el rey
  - hacia el rey
  lexicon: HALOT
  rationale: La preposición אֶל expresa movimiento hacia el destinatario; 'al rey' es la equivalencia más directa y no añade la idea de audiencia formal que 'ante el rey' podría sugerir.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo de WLC y coincide con la solución auditada en inglés (sent to summon / all his father's house / the priests who were at Nob / they all came to the king), sin incorporar cambios posteriores en la revisión más reciente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'sacerdote(s)' para הַכֹּהֵן / הַכֹּהֲנִים por claridad y fidelidad contextual.
  - Se conserva la estructura narrativa simple con 'Entonces' para marcar la secuencia temporal del wayyiqtol.
  - La nota [a] preserva la tensión semántica de בֵּית אָבִיו al evitar reducirla a 'familia inmediata'.
