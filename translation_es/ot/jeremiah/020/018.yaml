revisions:
- from: ¿Por qué salí del vientre para ver calamidad y dolor[a], y para que mis días terminen en vergüenza[b]?
  to: ¿Por qué salí del vientre para ver aflicción y dolor[a], y que mis días terminen en vergüenza[b]?
  rationale: Se reemplaza «calamidad» por «aflicción» para representar mejor עָמָל en un lamento personal y alinearlo con el expediente inglés. Se corrige la nota [a] para reflejar una alternativa pareada, no solo del primer sustantivo. Se alisa ligeramente la sintaxis final con «y que mis días terminen», manteniendo el sentido de consumación/fin de los días. La nota [b] se conserva con ajuste mínimo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:31:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: pregunta retórica sobre salir del vientre, ver עָמָל וְיָגוֹן, y terminar los días en vergüenza. Sin embargo, «calamidad» para עָמָל estrecha y desplaza el matiz desde ''afán/trabajo penoso/miseria/trouble'' hacia desastre externo, y la nota [a] no preserva bien la alternativa inglesa «toil and grief», pues «afán» tampoco corresponde claramente a יָגוֹן. La cláusula final y la nota [b] sí representan adecuadamente la alternativa de consumo/consumación de los días.'
  spanish_quality_summary: El español es claro y digno, pero «calamidad y dolor» suena algo menos natural y menos preciso para un lamento existencial que «aflicción y dolor» o «trabajo penoso y dolor». «Para que mis días terminen» es aceptable, aunque «y que mis días terminen» fluye algo mejor tras la coordinación. «En vergüenza» es formalmente fiel y comprensible en español bíblico actual.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. La principal cuestión léxica es עָמָל: conviene evitar «calamidad» y optar por una palabra que conserve mejor la amplitud de sufrimiento/esfuerzo penoso documentada por el POB. Se mantienen «vientre», «salí», «ver», «mis días» y «vergüenza» en línea con el expediente inglés.'
  issues:
  - severity: medium
    issue: «Calamidad» para עָמָל es demasiado estrecho.
    rationale: El hebreo עָמָל aquí no se limita a un desastre o calamidad; abarca afán, miseria, trabajo penoso o sufrimiento. El inglés POB eligió «trouble» y preservó «toil» como alternativa. «Aflicción» o «trabajo penoso» preservan mejor ese campo semántico.
  - severity: medium
    issue: La nota [a] no refleja con precisión la alternativa documentada por el POB.
    rationale: La nota inglesa ofrece «toil and grief» como alternativa para la pareja עָמָל וְיָגוֹן. La nota española actual solo comenta el primer término y además propone «afán», que no corresponde al segundo término ni reproduce la alternativa pareada.
  - severity: low
    issue: La coordinación final puede sonar más natural en español.
    rationale: «y para que mis días terminen» es entendible, pero «y que mis días terminen» suena más idiomático tras «para ver...», sin perder fidelidad al sentido resultativo.
  revised_spanish_text: ¿Por qué salí del vientre para ver aflicción y dolor[a], y que mis días terminen en vergüenza[b]?
