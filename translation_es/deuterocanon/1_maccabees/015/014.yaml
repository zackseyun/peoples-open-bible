translation:
  language: es
  text: Y rodeó la ciudad[a], y las naves cerraron el cerco[b] desde el mar; y presionó la ciudad desde la tierra y desde el mar, y no permitió a nadie salir ni entrar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cercó la ciudad»; se conserva «rodeó» para mantener la imagen circular y militar del griego ἐκύκλωσεν.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego puede sugerir unión o cierre; aquí, con «las naves» como sujeto y «desde el mar», describe cómo la fuerza naval estrechó el sitio desde el mar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκύκλωσεν
  english_pob_choice: encircled
  chosen_spanish: rodeó
  alternatives_spanish:
  - encerró
  - cercó
  lexicon: LSJ
  rationale: El verbo expresa la acción concreta de poner la ciudad en un círculo de asedio. En español, «rodeó» conserva esa imagen visual y es natural; «cercó» también sería posible, pero puede sonar más técnico o militar que el griego por sí solo.
- source_word: συνῆψαν
  english_pob_choice: closed in
  chosen_spanish: se unieron
  alternatives_spanish:
  - se acercaron
  - cerraron filas
  - se juntaron
  lexicon: LSJ
  rationale: Con el sujeto «las naves» y la indicación «desde el mar», la idea es que la fuerza naval se juntó para cerrar el bloqueo. «Se unieron» refleja el valor de unión/adhesión del verbo sin sobreespecificar combate; el contexto de sitio ya da la carga militar.
- source_word: συνέθλιβεν
  english_pob_choice: pressed
  chosen_spanish: apretó
  alternatives_spanish:
  - oprimió
  - presionó
  - estrechó
  lexicon: LSJ
  rationale: El imperfecto presenta una presión continua sobre la ciudad. «Apretó» comunica bien esa fuerza sostenida en español y mantiene un tono más natural que una perífrasis progresiva, sin debilitar el verbo.
- source_word: ἀπὸ τῆς γῆς καὶ ἀπὸ τῆς θαλάσσης
  english_pob_choice: from the land and from the sea
  chosen_spanish: desde la tierra y desde el mar
  alternatives_spanish:
  - por tierra y por mar
  - de la tierra y del mar
  lexicon: LSJ
  rationale: Se conserva la repetición de ἀπό con «desde», para reflejar la estructura del griego y la presión ejercida desde dos frentes. «Por tierra y por mar» sería más idiomático, pero menos transparente respecto de la sintaxis del original.
- source_word: οὐκ εἴασεν
  english_pob_choice: he allowed no one
  chosen_spanish: no permitió a nadie
  alternatives_spanish:
  - no dejó a nadie
  - no dio permiso a nadie
  lexicon: LSJ
  rationale: «Permitir» reproduce con claridad el valor causativo-permisivo del verbo y funciona bien en español actual. La construcción impersonal con «a nadie» mantiene la universalidad de la prohibición.
- source_word: ἐκπορεύεσθαι καὶ εἰσπορεύεσθαι
  english_pob_choice: to go out or to come in
  chosen_spanish: salir ni entrar
  alternatives_spanish:
  - ir y venir
  - salir o entrar
  - salir ni volver a entrar
  lexicon: LSJ
  rationale: La pareja verbal expresa una clausura total del movimiento. En español, «salir ni entrar» es la formulación más breve y natural para una prohibición completa; la oposición de salida/entrada queda clara por el contexto y por el paralelismo del griego.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «pressed» frente a «was crushing» por naturalidad y adecuación contextual; en español se optó por «apretó» para reflejar esa presión continua del imperfecto. También se preservó la clausura total del asedio con una formulación española breve y transparente. El texto griego presenta un doble movimiento de tierra y mar, mantenido en la traducción mediante la repetición de «desde».
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece el Tetragrámaton ni un equivalente divino.
  - Se mantuvo un registro bíblico sobrio y moderno, evitando giros arcaizantes innecesarios.
  - Se conservaron las dos direcciones del bloqueo («desde la tierra» / «desde el mar») para no aplanar la estructura del griego.
