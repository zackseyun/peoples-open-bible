translation:
  language: es
  text: Pero tu providencia[a], Padre, la dirige, porque diste un camino aun en el mar, y una senda segura en las olas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la gobierna» o «la pilotea»; el verbo griego tiene un matiz náutico, apropiado a la imagen del barco en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: διακυβερνᾷ
  english_pob_choice: steers
  chosen_spanish: la gobierna
  alternatives_spanish:
  - la dirige
  - la pilotea
  - la gobierna como timón
  lexicon: LSJ
  rationale: El verbo griego tiene colorido náutico, pero en español “la gobierna” comunica el ejercicio de dirección providente sin introducir un calco extraño. “La dirige” sería posible, aunque pierde algo del matiz de pilotaje; “pilotea” suena demasiado técnico o coloquial.
- source_word: πρόνοια
  english_pob_choice: providence
  chosen_spanish: providencia
  alternatives_spanish:
  - previsión
  - cuidado
  - providencia divina
  lexicon: LSJ
  rationale: En la literatura sapiencial, el término mezcla previsión y cuidado activo de Dios. “Providencia” conserva bien esa carga teológica en español y corresponde al uso auditado en inglés.
- source_word: πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Oh Padre
  - Padre mío
  lexicon: LSJ
  rationale: Es vocativo directo a Dios. “Padre” es natural y fiel; añadir “Oh” o “mío” introduce coloración no exigida por el griego.
- source_word: ἔδωκας
  english_pob_choice: you gave
  chosen_spanish: diste
  alternatives_spanish:
  - diste provisión
  - proporcionaste
  - hiciste
  lexicon: LSJ
  rationale: El aoristo es un verbo simple de dar. “Diste” mantiene la relación con el griego mejor que una expansión interpretativa como “proporcionaste.”
- source_word: ὁδὸν
  english_pob_choice: a way
  chosen_spanish: un camino
  alternatives_spanish:
  - una vía
  - una senda
  - un paso
  lexicon: LSJ
  rationale: En el contexto marítimo, “camino” funciona bien en español bíblico y preserva la imagen de una vía abierta por Dios en el mar.
- source_word: τρίβον
  english_pob_choice: path
  chosen_spanish: una senda
  alternatives_spanish:
  - un sendero
  - una huella
  - un camino
  lexicon: LSJ
  rationale: Se distingue de ὁδόν con un segundo término paralelo. “Senda” mantiene esa distinción y suena natural en español literario.
- source_word: ἀσφαλῆ
  english_pob_choice: safe
  chosen_spanish: segura
  alternatives_spanish:
  - firme
  - resguardada
  - sin peligro
  lexicon: LSJ
  rationale: “Segura” traduce de manera directa la idea de protección frente al peligro y conserva la sencillez del griego.
- source_word: ἐν θαλάσσῃ
  english_pob_choice: in the sea
  chosen_spanish: en el mar
  alternatives_spanish:
  - en el mar profundo
  - a través del mar
  - sobre el mar
  lexicon: LSJ
  rationale: “Mar” es la opción más natural en español; la preposición “en” preserva el giro poético del griego, aunque en español también podría entenderse dinámicamente como “a través del mar.”
- source_word: ἐν κύμασι
  english_pob_choice: in the waves
  chosen_spanish: en las olas
  alternatives_spanish:
  - entre las olas
  - sobre las olas
  - en los olajes
  lexicon: LSJ
  rationale: “Olas” es claro y bíblicamente idiomático en español. Mantener “en” conserva el paralelismo con “en el mar” y el sentido de atravesar la peligrosidad del agua.
theological_decisions:
- issue: Cómo traducir πρόνοια sin diluir su peso teológico
  english_pob_reading: providence
  chosen_spanish_reading: providencia
  alternative_spanish_readings:
  - previsión
  - cuidado
  rationale: La frase atribuye a Dios una acción continua de gobierno salvador sobre la travesía. “Providencia” recoge tanto el cuidado como la dirección soberana sin reducirlo a mera anticipación mental.
  doctrine_reference: 'DOCTRINE.md: preserve theological weight while using readable modern Spanish.'
translation_notes:
  revision_awareness: 'El inglés auditado fue ajustado para el orden más natural (“a way even in the sea” / “a safe path in the waves”) sin cambiar el contenido. La versión española sigue ese mismo equilibrio: conserva el paralelismo marítimo y evita sobreinterpretar el verbo náutico.'
  spanish_consistency_notes:
  - Se conserva “providencia” como término teológico principal, en línea con el registro sapiencial del texto.
  - Se mantiene el paralelismo “en el mar / en las olas” para reproducir la imaginería griega.
  - No se usa “SEÑOR” ni “Cristo”, porque el texto no los contiene.
  - “Camino” y “senda” se distinguen para reflejar ὁδὸν y τρίβον sin forzar sinonimia total.
