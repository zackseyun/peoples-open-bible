revisions:
- from: Sin embargo, Dios es mi Rey desde antiguo[a], que realiza actos de salvación en medio de la tierra.
  to: Pero Dios es mi Rey desde antiguo, obrando actos de salvación en medio de la tierra entera[a].
  rationale: Se ajusta הָאָרֶץ a la preferencia auditada por alcance cósmico en el texto principal, preservando la alternativa local en nota. Se mejora además la fluidez poética del participio con «obrando» y se simplifica la conjunción adversativa a «Pero», que suena más natural en español sin perder el contraste contextual.
