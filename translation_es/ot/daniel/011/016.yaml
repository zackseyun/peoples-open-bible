revisions:
- from: Y hará el que viene contra él según su voluntad[a], y nadie se mantendrá delante de él. Se mantendrá en la Hermosa Tierra[b], y será consumida en su mano[c].
  to: Y el que viene contra él hará según su voluntad[a], y nadie se levantará delante de él. Se establecerá en la Tierra Hermosa[b], y será consumida en su mano[c].
  rationale: La revisión corrige principalmente cuestiones de naturalidad y precisión verbal en español. Se reordena la primera cláusula para evitar una sintaxis forzada, se reemplaza «se mantendrá» por soluciones más adecuadas para cada ocurrencia de עמד, y se ajusta el nombre territorial a una forma más idiomática. Se conserva la ambigüedad interpretativa de la cláusula final y las notas del aparato inglés.
