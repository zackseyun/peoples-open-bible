translation:
  language: es
  text: A un hombre ciego no podrán ponerlo en pie para ver[a], ni podrán rescatar a un hombre cuando está en angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para la vista». La frase griega es breve y puede entenderse de manera más amplia que una curación física explícita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - a alguien
  lexicon: BDAG
  rationale: ἄνθρωπον es singular y genérico; en español, «un hombre» conserva el referente humano individual y la forma masculina del original sin volverlo exclusivo. Se evita neutralizarlo a «persona» porque el audit trail inglés defendió la referencia masculina genérica.
- source_word: τυφλὸν
  english_pob_choice: blind
  chosen_spanish: ciego
  alternatives_spanish:
  - sin vista
  - invidente
  lexicon: BDAG
  rationale: Adjetivo físico y directo. «Ciego» es la equivalencia natural y digna en español contemporáneo.
- source_word: εἰς ὅρασιν
  english_pob_choice: for seeing
  chosen_spanish: para ver
  alternatives_spanish:
  - para la visión
  - para ver la vista
  lexicon: BDAG
  rationale: La frase compacta expresa finalidad o resultado. «Para ver» conserva esa función sin sobrecargarla con lenguaje de curación que el griego no explicita.
- source_word: οὐ μὴ
  english_pob_choice: certainly cannot
  chosen_spanish: no podrán
  alternatives_spanish:
  - de ningún modo podrán
  - ciertamente no podrán
  lexicon: BDAG
  rationale: La negación enfática se expresa de manera natural en futuro negativo. El contexto ya comunica imposibilidad total; no hace falta añadir una perífrasis más dura que suene forzada.
- source_word: περιστήσωσιν
  english_pob_choice: set ... upright
  chosen_spanish: ponerlo en pie
  alternatives_spanish:
  - hacerlo estar en pie
  - restaurarlo
  lexicon: LSJ
  rationale: La imagen física de poner en posición erguida encaja con el ciego y con la finalidad «para ver». «Ponerlo en pie» mantiene la concreción sin convertirlo en una afirmación más amplia de sanidad.
- source_word: ἐν ἀνάγκῃ
  english_pob_choice: when he is in distress
  chosen_spanish: cuando está en angustia
  alternatives_spanish:
  - cuando está en necesidad
  - cuando está en apuro
  lexicon: BDAG
  rationale: Ἀνάγκη aquí denota estado de presión o aflicción. «Angustia» comunica bien esa situación de necesidad apremiante en español bíblico actual.
- source_word: ὄντα
  english_pob_choice: when he is
  chosen_spanish: cuando está
  alternatives_spanish:
  - si está
  - al estar
  lexicon: BDAG
  rationale: El participio se resuelve naturalmente en una cláusula temporal de estado. «Cuando está» reproduce el valor circunstancial sin extraer más contenido del que ofrece el griego.
- source_word: ἐξέλωνται
  english_pob_choice: rescue
  chosen_spanish: rescatar
  alternatives_spanish:
  - librar
  - sacar
  lexicon: BDAG
  rationale: El verbo de entrega/salvación se vierte como «rescatar», claro y fiel al contexto de imposibilidad de ayuda. «Rescatar» preserva la idea de sacar de una situación peligrosa o apremiante.
theological_decisions:
- issue: Fuerza de la negación absoluta en una polémica contra los ídolos
  english_pob_reading: certainly cannot
  chosen_spanish_reading: no podrán
  alternative_spanish_readings:
  - de ningún modo podrán
  - ciertamente no podrán
  rationale: El verso afirma incapacidad total. En español, el futuro negativo simple ya expresa esa imposibilidad dentro del contexto polémico; no se suaviza el sentido ni se introduce una fórmula más interpretativa.
  doctrine_reference: DOCTRINE.md § Translation philosophy 6
- issue: Referencia humana genérica con forma masculina singular
  english_pob_reading: a man
  chosen_spanish_reading: a un hombre
  alternative_spanish_readings:
  - a una persona
  - a alguien
  rationale: Se conserva la forma masculina singular del original sin sugerir exclusividad masculina. La lectura sigue siendo representativa y genérica, acorde con el audit trail inglés.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto griego y del audit trail inglés. No se siguió una traducción mecánica; se ajustaron las opciones españolas para conservar la compacidad de εἰς ὅρασιν, la negación enfática de οὐ μή y el valor circunstancial de ἐν ἀνάγκῃ. El resultado se mantiene coherente con la lectura de que el verso describe la incapacidad de los ídolos para ayudar a un ciego o rescatar a alguien en aflicción.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u այլ terminología de máscara porque el verso no contiene el nombre divino.
  - «Hombre» se usa en sentido genérico y representa ἄνθρωπον; no se neutralizó a «persona» por coherencia con el audit trail.
  - «Angustia» se eligió para ἀνάγκη por su naturalidad y fuerza contextual en español, sin perder el matiz de necesidad apremiante.
