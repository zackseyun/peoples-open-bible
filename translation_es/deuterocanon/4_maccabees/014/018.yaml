translation:
  language: es
  text: ¿Y por qué es necesario señalar[a] la afectuosa ternura[b] de los animales irracionales[c] hacia sus hijos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mostrar» o «demostrar». El griego presenta aquí una apelación a ejemplo, no necesariamente una demostración lógica estricta.
    reason: lexical_alternative
  - marker: b
    text: O «afecto natural por sus crías». El término griego puede referirse al cariño parental o instintivo.
    reason: lexical_alternative
  - marker: c
    text: O «sin razón» o «brutos». El griego subraya la falta de razón de los animales, en contraste con la racionalidad humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί δεῖ
  english_pob_choice: why is it necessary
  chosen_spanish: ¿Y por qué es necesario... ?
  alternatives_spanish:
  - ¿Qué necesidad hay de... ?
  - ¿Y por qué debe uno... ?
  lexicon: LSJ
  rationale: La pregunta retórica expresa necesidad innecesaria o superflua. En español, «¿por qué es necesario...?» conserva bien ese matiz y suena natural en registro digno.
- source_word: ἐπιδεικνύναι
  english_pob_choice: to point out
  chosen_spanish: señalar
  alternatives_spanish:
  - mostrar
  - demostrar
  lexicon: LSJ
  rationale: El verbo aquí introduce una apelación a un ejemplo. «Señalar» comunica la acción de poner algo de relieve sin forzar una demostración formal.
- source_word: διὰ τῶν ἀλόγων ζῴων
  english_pob_choice: by means of the irrational animals
  chosen_spanish: de los animales irracionales
  alternatives_spanish:
  - por medio de los animales sin razón
  - a través de los animales brutos
  lexicon: LSJ
  rationale: «ἄλογος» resalta la falta de razón, en contraste con la racionalidad humana. «Animales irracionales» preserva ese contraste de manera clara y directa en español.
- source_word: συμπάθειαν
  english_pob_choice: affection
  chosen_spanish: afectuosa ternura
  alternatives_spanish:
  - afecto
  - natural cariño
  - simpatía
  lexicon: LSJ
  rationale: El contexto es parental y no meramente emocional. «Ternura» expresa la afección de padres hacia sus crías con más precisión que «simpatía», que en español moderno puede sonar desplazado.
- source_word: πρὸς τὰ τέκνα
  english_pob_choice: for their children
  chosen_spanish: hacia sus hijos
  alternatives_spanish:
  - para con sus hijos
  - hacia sus crías
  - para sus hijos
  lexicon: LSJ
  rationale: «Τέκνα» puede significar hijos o descendencia. Aquí, por el contexto de animales, «hijos» comunica la relación filial de forma comprensible, mientras «hacia» refleja la dirección afectiva del griego.
translation_notes:
  revision_awareness: 'El texto griego concuerda con la fuente base y el audit trail inglés; se conservó la estructura retórica y las dos ambigüedades léxicas principales: ἀλόγων ζῴων y συμπάθειαν. No se observaron revisiones aplicadas en el historial reciente.'
  spanish_consistency_notes:
  - Se mantuvo un español contemporáneo y reverente, sin recurrir a fórmulas eclesiásticas que oculten el matiz del griego.
  - «Animales irracionales» preserva el contraste filosófico documentado en el inglés POB.
  - «Afecuosa ternura» intenta reflejar el campo semántico de συμπάθεια sin reducirlo a «simpatía», que en español sería engañoso en este contexto.
  - La sintaxis reproduce la pregunta retórica del original sin añadir contenido interpretativo.
