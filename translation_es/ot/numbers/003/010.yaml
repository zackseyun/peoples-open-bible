    rationale: Aunque defendible, en español actual sugiere con más facilidad un extranjero o alguien desconocido. El contexto y la auditoría inglesa favorecen una expresión funcional como 'la persona no autorizada'.
  - severity: medium
    issue: Nota [a] innecesaria sobre 'sus hijos'
    rationale: No corresponde a una alternativa significativa del inglés POB ni a una ambigüedad creada por el español. Añade ruido editorial sin beneficio.
  - severity: low
    issue: '''Será muerto'' suena rígido en español moderno'
    rationale: Mantiene la pasiva penal, pero 'será puesto a muerte' expresa mejor la fuerza jurídica de יוּמָת con español más natural y claro.
