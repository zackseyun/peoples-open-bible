    issue: «su dicho» rebaja el registro de מְשָׁלוֹ en contexto profético-poético
    rationale: Aunque no es imposible, «dicho» en español puede sonar demasiado coloquial o sentencioso. El hebreo מָשָׁל aquí corresponde a una formulación elevada de Balaam; «declaración» o «discurso» conserva mejor ese peso literario.
  - severity: medium
    issue: «tu nido está en la roca» no refleja suficientemente el matiz de estar puesto/establecido
    rationale: La auditoría inglesa justificó «is set» para preservar el valor predicativo de וְשִׂים. En español, «está en la roca» comunica solo localización, mientras que «está puesto en la roca» o «está asentado en la roca» expresa mejor la seguridad intencional de la imagen.
  revised_spanish_text: 'Entonces vio al ceneo[a], y alzó su declaración y dijo: «Tu morada es firme, y tu nido está puesto en la roca».'
  revised_footnotes:
  - marker: a
    text: O «alzó su oráculo». מָשָׁל puede designar un proverbio, una burla o una declaración profética; aquí se refiere a la declaración poética de Balaam.
    reason: lexical_alternative
