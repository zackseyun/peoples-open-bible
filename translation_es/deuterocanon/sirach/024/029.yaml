translation:
  language: es
  text: Porque su entendimiento es más abundante que el mar, y su consejo que el gran abismo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διανόημα
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - pensamiento
  - mente
  - discernimiento
  - comprensión
  lexicon: LSJ
  rationale: El término griego puede referirse al acto o al resultado de pensar. En este contexto sapiencial, «entendimiento» comunica bien la capacidad y el contenido del pensar sin reducirlo a una sola ocurrencia mental.
- source_word: ἐπληθύνθη
  english_pob_choice: is more abundant
  chosen_spanish: es más abundante
  alternatives_spanish:
  - es mayor
  - se ha multiplicado
  - es más pleno
  lexicon: LSJ
  rationale: Aquí el verbo funciona en un giro comparativo idiomático. «Es más abundante» conserva la idea de excedencia frente al mar sin forzar una imagen de proceso literal.
- source_word: βουλή
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - plan
  - propósito
  - designio
  lexicon: LSJ
  rationale: En un texto sapiencial, «consejo» reproduce de manera natural el campo semántico de prudencia, designio y juicio deliberado que tiene βουλή.
- source_word: ἀβύσσου μεγάλης
  english_pob_choice: the great deep
  chosen_spanish: el gran abismo
  alternatives_spanish:
  - el gran profundo
  - la gran profundidad
  - el gran abismo
  lexicon: LSJ
  rationale: La expresión evoca las profundidades primordiales, no un pozo abstracto. «El gran abismo» mantiene la imaginería cósmica y el paralelismo con «el mar».
- source_word: αὐτῆς
  english_pob_choice: her
  chosen_spanish: su
  alternatives_spanish:
  - de ella
  lexicon: Greek grammar / context
  rationale: El antecedente es la Sabiduría personificada. En español, el posesivo «su» conserva la referencia femenina sin sobrecargar la línea con repeticiones innecesarias.
- source_word: ἀπὸ γὰρ θαλάσσης
  english_pob_choice: than the sea
  chosen_spanish: que el mar
  alternatives_spanish:
  - que el mar
  - más que el mar
  - que del mar
  lexicon: LSJ
  rationale: La preposición ἀπό sigue un giro comparativo semítico, por lo que debe leerse como comparación, no como fuente. «Que el mar» mantiene la equivalencia natural del paralelo español.
theological_decisions:
- issue: Personificación de la Sabiduría
  english_pob_reading: Retain feminine personal language ('her') for Wisdom.
  chosen_spanish_reading: Mantener el posesivo femenino implícito en «su», con Sabiduría entendida como figura personificada.
  alternative_spanish_readings:
  - usar un neutro impersonal
  - reformular como abstracción sin rasgo personal
  rationale: El griego usa formas femeninas y el contexto literario presenta a la Sabiduría como figura personificada. En español, «su» preserva esa personificación sin perder fluidez.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y literaria; preferir exactitud contextual sobre neutralización artificial.'
translation_notes:
  revision_awareness: 'El inglés auditado pasó de una lectura literal de ''from the sea'' a una comparación idiomática (''than the sea''), y luego se eliminó la repetición explícita del verbo en la segunda cláusula. La versión española sigue ese mismo ajuste: toma ἀπό como comparación y deja el paralelismo de la segunda cláusula sin añadir verbos ausentes.'
  spanish_consistency_notes:
  - He preferido «entendimiento» y «consejo» por coherencia con el registro sapiencial de Sabiduría/Sirácida.
  - He mantenido «mar» y «gran abismo» para conservar el contraste imagético del texto griego.
  - He evitado «SEÑOR» u otros equivalentes no pertinentes, ya que el versículo no contiene el Nombre divino.
