translation:
  language: es
  text: Los mercaderes de Saba y de Raamá eran tus mercaderes; con las mejores especias, con toda piedra preciosa y oro, pagaron por tus mercancías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “dieron por tus mercancías”. El verbo hebreo es literalmente “dieron”, pero aquí funciona en sentido comercial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹכְלֵי
  english_pob_choice: merchants of
  chosen_spanish: mercaderes de
  alternatives_spanish:
  - comerciantes de
  - trajinantes de
  lexicon: HALOT
  rationale: רֹכְלֵי designa personas dedicadas al comercio. 'Mercaderes' comunica bien esa función en español bíblico moderno y mantiene la naturalidad del pasaje.
- source_word: שְׁבָא
  english_pob_choice: Sheba
  chosen_spanish: Saba
  alternatives_spanish:
  - Sheba
  lexicon: nombre propio
  rationale: Se vierte el nombre propio según uso habitual en español bíblico, sin perder la identificación geográfica.
- source_word: וְרַעְמָה
  english_pob_choice: and Raamah
  chosen_spanish: Raamá
  alternatives_spanish:
  - Raama
  - Raamah
  lexicon: nombre propio
  rationale: Nombre propio transliterado de forma natural en español. Se conserva la referencia histórica sin añadir explicación innecesaria.
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis. En español puede reflejarse con 'ellos' y un guion enfático, sin sobrecargar el ritmo.
- source_word: רֹכְלָיִךְ
  english_pob_choice: your merchants
  chosen_spanish: tus mercaderes
  alternatives_spanish:
  - tus comerciantes
  - tus traficantes
  lexicon: HALOT
  rationale: Se conserva la relación con el destinatario femenino singular y la coherencia léxica con רֹכְלֵי.
- source_word: בְּרֹאשׁ כָּל בֹּשֶׂם
  english_pob_choice: with the finest of every spice
  chosen_spanish: con lo mejor de toda especia
  alternatives_spanish:
  - con lo más selecto de toda especia
  - con la flor de toda especia
  lexicon: HALOT
  rationale: רֹאשׁ funciona aquí idiomáticamente como 'lo mejor/lo principal', no como 'cabeza'. 'Especia' mantiene el campo comercial y aromático de בֹּשֶׂם.
- source_word: וּבְכָל אֶבֶן יְקָרָה
  english_pob_choice: with every precious stone
  chosen_spanish: con toda piedra preciosa
  alternatives_spanish:
  - con toda gema preciosa
  - con cada piedra de gran valor
  lexicon: HALOT
  rationale: La construcción singular colectiva se naturaliza en español con 'toda piedra preciosa', sin perder el sentido de clase de objetos valiosos.
- source_word: וְזָהָב
  english_pob_choice: and gold
  chosen_spanish: y oro
  alternatives_spanish:
  - y el oro
  lexicon: HALOT
  rationale: Término comercial directo y transparente.
- source_word: נָתְנוּ
  english_pob_choice: they paid
  chosen_spanish: pagaron
  alternatives_spanish:
  - dieron
  - entregaron
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es literalmente 'dar', en este contexto mercantil expresa una transacción. 'Pagaron' reproduce la fuerza comercial que el audit trail inglés documenta.
- source_word: עִזְבוֹנָיִךְ
  english_pob_choice: your wares
  chosen_spanish: tus mercancías
  alternatives_spanish:
  - tus bienes
  - tu mercadería
  lexicon: HALOT
  rationale: El sustantivo se refiere a bienes de comercio. 'Mercancías' es claro y consistente con el marco de compraventa del versículo.
translation_notes:
  revision_awareness: 'El texto español sigue el contexto comercial del hebreo y del audit trail inglés: רֹאשׁ se entiende idiomáticamente como ''lo mejor'', y נָתְנוּ se traduce con sentido transaccional (''pagaron'') en lugar de un ''dieron'' meramente literal. Se conservó el paralelismo de la lista de bienes y la aposición enfática con guion.'
  spanish_consistency_notes:
  - Se mantiene 'mercaderes' para רֹכְלֵי / רֹכְלָיִךְ por coherencia interna.
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no lo contiene.
  - '''Saba'' y ''Raamá'' siguen el criterio español de nombres propios bíblicos sin anglicizar.'
  - La puntuación con raya reproduce el énfasis del pronombre independiente הֵמָּה.
