translation:
  language: es
  text: Cuando ya se habían alejado un poco de la casa de Micaía, los hombres que estaban en las casas cerca de la casa de Micaía fueron convocados[a], y alcanzaron a los hijos de Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “alzaron la alarma” para נִזְעֲקוּ. El verbo hebreo puede sugerir tanto un grito de alarma como la reunión que de él resulta.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ya se habían alejado
  alternatives_spanish:
  - se habían alejado
  - ellos se habían alejado
  lexicon: HALOT
  rationale: El pronombre hebreo retoma a los danitas; en español queda más natural integrarlo en la forma verbal con sujeto implícito, sin perder la referencia narrativa.
- source_word: הִרְחִ֖יקוּ
  english_pob_choice: had gone some distance
  chosen_spanish: se habían alejado un poco
  alternatives_spanish:
  - se habían alejado bastante
  - habían ido lejos
  lexicon: HALOT
  rationale: La idea central es el alejamiento en el espacio. 'Un poco' refleja bien la vaguedad del hebreo y evita exagerar el grado de distancia.
- source_word: מִבֵּית מִיכָה
  english_pob_choice: from Micah’s house
  chosen_spanish: de la casa de Micaía
  alternatives_spanish:
  - desde la casa de Micaía
  - de la casa de Micah
  lexicon: HALOT
  rationale: Se conserva el sentido posesivo natural en español. 'Micaía' sigue la forma española del nombre propio.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - las personas
  lexicon: HALOT
  rationale: El hebreo usa un término masculino específico; 'hombres' mantiene la precisión de género y el tono narrativo.
- source_word: אֲשֶׁר בַּבָּתִּים אֲשֶׁר עִם בֵּית מִיכָה
  english_pob_choice: who were in the houses near Micah’s house
  chosen_spanish: que estaban en las casas junto a la casa de Micaía
  alternatives_spanish:
  - que estaban en las casas cerca de la casa de Micaía
  - que estaban en las casas alrededor de la casa de Micaía
  lexicon: HALOT
  rationale: El hebreo es algo torpe literalmente; 'junto a' expresa la cercanía implícita en עִם sin introducir una interpretación demasiado fuerte. Se mantiene 'las casas' para respetar la referencia plural.
- source_word: נִזְעֲקוּ
  english_pob_choice: were called together
  chosen_spanish: fueron convocados
  alternatives_spanish:
  - se reunieron al grito
  - alzaron la alarma y se reunieron
  lexicon: HALOT
  rationale: El niphal de זעק puede sugerir el llamamiento a reunirse tras un clamor de alarma. 'Fueron convocados' preserva la idea de reunión colectiva y deja abierta la alternativa de alarma documentada por la POB inglesa.
- source_word: וַיַּדְבִּיקוּ
  english_pob_choice: and they overtook
  chosen_spanish: y alcanzaron
  alternatives_spanish:
  - y alcanzaron a
  - y dieron alcance a
  lexicon: HALOT
  rationale: En español, 'alcanzaron' comunica el sentido de overtaking de manera natural y breve, adecuado al avance narrativo.
- source_word: אֶת בְּנֵי דָן
  english_pob_choice: the sons of Dan
  chosen_spanish: a los hijos de Dan
  alternatives_spanish:
  - a los danitas
  - a los hijos de Dan
  lexicon: HALOT
  rationale: Se conserva la forma formal de parentesco del hebreo. Aunque 'danitas' es idiomático, 'hijos de Dan' es más transparente al texto fuente.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no hubo revisiones aplicadas en la fuente auditada; la propuesta mantiene la ambigüedad lexical documentada para נִזְעֲקוּ y conserva el sentido narrativo de 'had gone some distance' mediante una formulación natural en español.
  spanish_consistency_notes:
  - Se usa 'Micaía' para el nombre propio conforme a la ortografía bíblica española habitual.
  - Se conservó 'hijos de Dan' para reflejar el hebreo formal, en línea con la decisión inglesa.
  - '''Convocados'' preserva la reunión resultante sin borrar la posible lectura de alarma del verbo hebreo.'
  - El texto evita 'SEÑOR' u otras sustituciones no pertinentes, ya que no aparece el tetragrámaton en este versículo.
