  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales concuerdan bien con el rastro inglés: βάλλων -> ''El que lanza''; ἐπὶ πετεινὰ -> ''contra los pájaros''; ἀποσοβεῖ -> ''los ahuyenta''; φίλον/φιλίαν -> ''un amigo''/''la amistad''. Para ὀνειδίζων, ''reprende'' es aceptable, aunque ''reprocha'' se acercaría más al matiz documentado; no es necesario forzar cambio si se conserva una nota de alternativa.'
  issues:
