translation:
  language: es
  text: Ordena a los hijos de Israel que saquen del campamento a toda persona con una enfermedad de la piel[a], a todo el que tenga una secreción y a todo el que esté impuro por un cadáver[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «todo leproso». El término hebreo abarca, en contextos de ley ritual, una afección grave de la piel, no necesariamente la lepra moderna.
    reason: lexical_alternative
  - marker: b
    text: Lit., «todo impuro por una persona/alma»; este modismo se refiere a la impureza causada por un cadáver.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַו
  english_pob_choice: Command
  chosen_spanish: Ordena
  alternatives_spanish:
  - Manda
  - Da la orden a
  lexicon: HALOT
  rationale: El imperativo transmite la fuerza directiva del hebreo; «ordena» conserva la autoridad sin sonar burocrático.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se preserva la formulación literal masculina plural del hebreo, como en el audit trail inglés, manteniendo el lenguaje pactual sin neutralizarlo.
- source_word: וִישַׁלְּחוּ
  english_pob_choice: that they send out
  chosen_spanish: que expulsen
  alternatives_spanish:
  - que saquen
  - que echen fuera
  lexicon: HALOT
  rationale: El sentido es hacer salir del campamento; «expulsen» comunica con claridad la acción de remover del recinto, sin añadir dureza extrabíblica excesiva.
- source_word: מִן הַמַּחֲנֶה
  english_pob_choice: out of the camp
  chosen_spanish: del campamento
  alternatives_spanish:
  - fuera del campamento
  - de en medio del campamento
  lexicon: HALOT
  rationale: «Del campamento» fluye naturalmente en español y conserva la idea de salida desde el ámbito campamental.
- source_word: כָּל צָרוּעַ
  english_pob_choice: everyone with a skin disease
  chosen_spanish: todo leproso
  alternatives_spanish:
  - toda persona con enfermedad de la piel
  - todo afligido de una enfermedad de la piel
  lexicon: HALOT
  rationale: Aquí se mantiene la equivalencia tradicional y breve que el español bíblico entiende bien, aun sabiendo que el término hebreo abarca una afección cutánea ritual más amplia que la lepra moderna; por eso la nota aclara el alcance.
- source_word: זָב
  english_pob_choice: everyone with a discharge
  chosen_spanish: todo el que tenga una secreción
  alternatives_spanish:
  - todo el que tenga flujo
  - todo el que tenga descarga
  lexicon: HALOT
  rationale: «Secreción» reproduce el carácter físico del término y resulta comprensible en español contemporáneo, sin especificar más de lo que el hebreo indica.
- source_word: טָמֵא לָנָפֶשׁ
  english_pob_choice: everyone unclean by a dead body
  chosen_spanish: todo el que esté impuro por un cadáver
  alternatives_spanish:
  - todo el que esté impuro por un muerto
  - todo el que tenga impureza por contacto con un cadáver
  lexicon: HALOT
  rationale: Se conserva la impureza ritual y se explicita el referente cadáver conforme al ajuste revisado del inglés. «Impuro» mantiene el valor cultual de טָמֵא sin moralizarlo.
theological_decisions:
- issue: Terminología de impureza ritual en contexto cultual
  english_pob_reading: Use 'unclean' in its cultic sense without moralizing it.
  chosen_spanish_reading: Usar «impuro» en sentido cultual, sin convertirlo en una valoración moral.
  alternative_spanish_readings:
  - inmundo
  - contaminado ritualmente
  rationale: En Números 5 la preocupación es la santidad del campamento y el estado ritual, no una condena ética de las personas. «Impuro» es claro y mantiene la distinción legal.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail inglés que precisó el último sintagma como referencia a un cadáver ('dead body'). La redacción española refleja esa precisión con «por un cadáver».
  spanish_consistency_notes:
  - Se preservó el patrón de repetición con «todo/a...» para reflejar el hebreo כָּל ... וְכָל ... וְכֹל.
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - Se mantuvo la distinción entre impureza ritual y pecado moral, coherente con el uso legal de טָמֵא.
  - La nota a traduce el alcance léxico de צָרוּעַ sin imponer una identificación médica moderna.
