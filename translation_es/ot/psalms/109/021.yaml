translation:
  language: es
  text: Pero tú[a], Yahvé, mi Señor, actúa por mí[b] por amor de tu nombre; porque es bueno tu amor fiel[c], líbrame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé mi Señor». El texto usa en secuencia dos títulos divinos: יְהוָה (YHWH) y אֲדֹנָי. Algunas traducciones lo vierten «Señor DIOS» o «Señor Yahvé».'
    reason: alternative_reading
  - marker: b
    text: O «trata conmigo»; más literalmente, «haz conmigo». La construcción hebrea עשה + אִתִּי en este contexto de súplica pide una intervención favorable de Dios.
    reason: lexical_alternative
  - marker: c
    text: 'חֶסֶד es un término de gran densidad semántica: amor leal, misericordia, bondad de pacto o fidelidad amorosa. «Amor fiel» intenta conservar juntos el afecto y la lealtad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino YHWH. En español, "Yahvé" conserva la referencia explícita al nombre propio sin recurrir a una máscara litúrgica.
- source_word: אֲדֹנָי
  english_pob_choice: my Lord
  chosen_spanish: Señor mío
  alternatives_spanish:
  - mi Señor
  - Señor
  lexicon: HALOT
  rationale: La secuencia con YHWH exige conservar el segundo título divino en forma de dirección personal. "Señor mío" mantiene la doble apelación sin fusionarla con Yahvé.
- source_word: עֲשֵׂה
  english_pob_choice: deal with me
  chosen_spanish: trátame
  alternatives_spanish:
  - haz con migo
  - actúa conmigo
  - trata conmigo
  lexicon: HALOT
  rationale: El verbo עשה es amplio, pero en esta súplica con אִתִּי pide una acción de Dios sobre el salmista. "Trátame" expresa bien la idea de intervención dirigida a la persona, con naturalidad en español.
- source_word: אִתִּי
  english_pob_choice: on my behalf
  chosen_spanish: conmigo
  alternatives_spanish:
  - para mí
  - a mi favor
  - por mí
  lexicon: HALOT
  rationale: Aunque literalmente significa "conmigo", en esta construcción de petición el sentido es que Dios actúe respecto de la situación del orante. En español, "trátame" ya incorpora el valor pragmático, por lo que no se explicita una paráfrasis más interpretativa en el texto principal.
- source_word: לְמַעַן שְׁמֶךָ
  english_pob_choice: for your name’s sake
  chosen_spanish: por amor de tu nombre
  alternatives_spanish:
  - por causa de tu nombre
  - por tu nombre
  - a causa de tu nombre
  lexicon: HALOT
  rationale: La fórmula hebrea apela al honor, reputación y carácter de Dios. "Por amor de tu nombre" es una equivalencia española tradicional pero todavía clara, y conserva el fundamento personal y relacional de la petición.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - benigno
  - grande
  lexicon: HALOT
  rationale: El adjetivo funciona predicativamente sobre חסד. "Bueno" mantiene la sencillez del hebreo y permite que la frase se lea con naturalidad en español.
- source_word: חַסְדְּךָ
  english_pob_choice: steadfast love
  chosen_spanish: amor fiel
  alternatives_spanish:
  - misericordia
  - bondad constante
  - leal amor
  lexicon: HALOT
  rationale: חֶסֶד contiene lealtad pactal, amor y compromiso. "Amor fiel" conserva la tensión entre afecto y fidelidad sin caer en una expresión arcaica o excesivamente técnica.
- source_word: הַצִּילֵנִי
  english_pob_choice: deliver me
  chosen_spanish: líbrame
  alternatives_spanish:
  - rescátame
  - sálvame
  - arráncame
  lexicon: HALOT
  rationale: El hifil de נצל implica sacar de peligro. "Líbrame" es un equivalente bíblico natural en español y no restringe indebidamente la clase de peligro.
theological_decisions:
- issue: La doble dirección divina יְהוָה אֲדֹנָי
  english_pob_reading: O Lord Yahweh / O Yahweh my Lord
  chosen_spanish_reading: Yahvé, Señor mío
  alternative_spanish_readings:
  - Señor Yahvé
  - Yahvé, mi Señor
  - Señor, Yahvé
  rationale: El hebreo conserva dos títulos distintos en serie. Se mantiene la distinción con "Yahvé, Señor mío" para no suavizar la tensión textual; el orden español respeta la apelación directa y evita fundir ambos nombres en una sola forma litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: El valor de חסד como amor leal o pactal
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor fiel
  alternative_spanish_readings:
  - misericordia
  - amor constante
  - bondad leal
  rationale: En este salmo, חסד no es solo afecto genérico; remite a la fidelidad relacional de Dios. "Amor fiel" mantiene el peso de lealtad pactal sin requerir una nota técnica en el cuerpo del texto.
  doctrine_reference: 'DOCTRINE.md: Covenant language / חֶסֶד'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés que ajustó "O LORD my Lord" a "O Lord Yahweh" y "act on my behalf" a "deal with me" para reflejar con mayor precisión el doble título divino y el valor más directo de עשה. La versión española conserva esa precisión textual sin calcar la sintaxis inglesa.
  spanish_consistency_notes:
  - Se mantiene el nombre divino explícito como Yahvé, conforme al estándar del proyecto.
  - Se conserva la secuencia de dos títulos divinos con coma en lugar de fusionarlos.
  - '"Líbrame" se usa para el valor de rescat e/salvar de הַצִּילֵנִי, en registro bíblico natural.'
  - No se introduce mayúscula teológica en "amor fiel" porque no funciona como nombre propio sino como cualidad divina en el verso.
