translation:
  language: es
  text: 'Entonces Yahvé dijo[b][a]: «Así como mi siervo Isaías ha andado desnudo y descalzo durante tres años, como señal y un prodigio contra Egipto y Cus»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente 'despojado'; es decir, vistiendo solo una prenda interior o un subvestido, más que completamente desnudo.
    reason: lexical_alternative
  - marker: b
    text: Cus se refiere a la región al sur de Egipto, a menudo asociada con Nubia; algunas versiones lo traducen 'Etiopía'.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el defecto del proyecto para el nombre divino: en español se mantiene el nombre propio Yahvé, en vez de ocultarlo con un sustituto litúrgico. Esto preserva la transparencia respecto del texto hebreo.'
- source_word: כַּאֲשֶׁר
  english_pob_choice: Just as
  chosen_spanish: Así como
  alternatives_spanish:
  - Como
  - Tal como
  lexicon: HALOT
  rationale: Expresa bien la comparación que introduce el hecho de Isaías como base del acto-símbolo, con español natural y sin perder la fuerza comparativa.
- source_word: הָלַךְ
  english_pob_choice: has walked
  chosen_spanish: ha andado
  alternatives_spanish:
  - anduvo
  - ha caminado
  lexicon: HALOT
  rationale: En español, 'ha andado' comunica una acción o estado prolongado a lo largo del período indicado. 'Anduvo' sonaría más puntual; 'ha caminado' es posible, pero menos idiomático aquí.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi esclavo
  - mi servidor
  lexicon: HALOT
  rationale: Aunque el término puede tener fuerza de esclavitud, en este contexto profético la relación de servicio/comisión hacia Dios está en primer plano. 'Siervo' conserva esa relación sin introducir una dureza no requerida por el contexto.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  lexicon: Standard proper name rendering
  rationale: Nombre propio estándar en español bíblico.
- source_word: עָרוֹם
  english_pob_choice: naked
  chosen_spanish: desnudo
  alternatives_spanish:
  - desnudo de cintura para abajo
  - despojado
  lexicon: HALOT
  rationale: Se conserva el sentido léxico primario del hebreo en el cuerpo del texto. La posible referencia a ir solo con una prenda interior queda reservada para la nota, sin atenuar el valor básico de la palabra.
- source_word: וְיָחֵף
  english_pob_choice: and barefoot
  chosen_spanish: y descalzo
  alternatives_spanish:
  - y sin calzado
  lexicon: HALOT
  rationale: '''Descalzo'' es la equivalencia natural y clara en español para la condición de ir sin zapatos.'
- source_word: שָׁלֹשׁ שָׁנִים
  english_pob_choice: for three years
  chosen_spanish: durante tres años
  alternatives_spanish:
  - por tres años
  lexicon: HALOT
  rationale: '''Durante'' expresa con naturalidad la duración del signo-acto en español. Mantiene la idea de período continuo sin añadir interpretación.'
- source_word: א֣וֹת
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - seña
  lexicon: HALOT
  rationale: '''Señal'' es natural en español y conserva el valor de acto simbólico que apunta más allá de sí mismo.'
- source_word: וּמוֹפֵת
  english_pob_choice: and a portent
  chosen_spanish: y prodigio
  alternatives_spanish:
  - y portent
  - y maravilla
  lexicon: HALOT
  rationale: El par 'señal y prodigio' reproduce la pareja hebrea sin neutralizar la distinción. 'Prodigio' mantiene la fuerza extraordinaria y profética de מוֹפֵת en un registro bíblico comprensible.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - respecto de
  lexicon: HALOT
  rationale: En contexto judicial/de advertencia, 'contra' comunica bien la dirección adversativa del gesto profético hacia Egipto y Cus.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: Standard geographic name
  rationale: Nombre geográfico estándar en español.
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Cush
  - Etiopía
  lexicon: HALOT
  rationale: Se prefiere 'Cus' como transliteración habitual en español para el antiguo territorio, evitando el anacronismo de identificarlo sin más con la Etiopía moderna.
theological_decisions:
- issue: Grado de desnudez en el acto simbólico de Isaías
  english_pob_reading: Render עָרוֹם as 'naked' in the main text while preserving the possibility of partial undress in a footnote.
  chosen_spanish_reading: Traducir עָרוֹם como 'desnudo' en el texto principal, conservando en nota la posibilidad de que signifique llevar solo una prenda interior o ir parcialmente desvestido.
  alternative_spanish_readings:
  - despojado
  - medio vestido
  rationale: El sentido léxico primario del hebreo es 'desnudo', y no debe suavizarse en el cuerpo del texto. A la vez, el contexto de un acto profético y las convenciones de vestimenta antigua permiten la posibilidad de una desnudez parcial; esa tensión se preserva en la nota sin borrar el valor básico del término.
  doctrine_reference: Principio de primacía del idioma original; preservar tensiones léxicas reales.
translation_notes:
  revision_awareness: 'No hay revisiones aplicadas en el historial más reciente; el pasaje muestra alto acuerdo en la auditoría, con una sola tensión léxica principal: עָרוֹם. La redacción española sigue la decisión auditada de conservar el sentido pleno de ''desnudo'' en el texto principal y matizar la posibilidad de desnudez parcial en nota.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se usa 'Mesías' solo cuando aparezca el título; aquí no aplica.
  - Se conserva 'Cus' para כּוּשׁ, evitando 'Etiopía' en el texto principal.
  - La puntuación y el uso de comillas siguen las convenciones del español moderno.
  - Las notas al pie están ancladas en el texto con los marcadores [a] y [b].
