  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: Yahvé habla a Jeremías; Israel, caracterizada como desleal/apóstata, resulta relativamente más justa que Judá, caracterizada por traición. La comparación y el matiz no absoluto de «más justa» están bien preservados. Sin embargo, la nota al pie no transmite la alternativa léxica documentada en el POB inglés para מְשֻׁבָה.'
  spanish_quality_summary: 'El texto principal es natural, claro y digno en español: «Yahvé», «me dijo», «Israel infiel», «se ha mostrado más justa», «la traicionera Judá» son formulaciones idiomáticas y fieles. La única reparación necesaria es corregir la nota, que actualmente repite el texto principal en vez de ofrecer la alternativa correspondiente.'
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יהוה -> «Yahvé»; יִשְׂרָאֵל -> «Israel»; יְהוּדָה -> «Judá». «Infiel» para מְשֻׁבָה y «traicionera» para בגדה concuerdan con la racionalidad léxica documentada. No hay conflicto teológico ni terminológico en el cuerpo del versículo.'
  issues:
  - severity: medium
    issue: La nota al pie [a] repite el texto principal en lugar de dar la alternativa léxica documentada.
    rationale: 'El POB inglés conserva una alternativa para מְשֻׁבָה: «Backsliding Israel...». En español, la nota debe reflejar una opción como «Israel descarriada» o «Israel apóstata», no repetir «Israel infiel». Esto afecta la trazabilidad del expediente léxico.'
  revised_spanish_text: 'Y Yahvé me dijo[a]: «Israel infiel se ha mostrado más justa que la traicionera Judá».'
  revised_footnotes:
