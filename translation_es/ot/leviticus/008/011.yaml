- from: Y esparció de ello sobre el altar siete veces[a], y ungió el altar y todos sus utensilios, y la batea y su soporte[b], para consagrarlos.
  to: Y roció con parte de ello sobre el altar siete veces[a], y ungió el altar y todos sus utensilios, y la fuente y su soporte[b], para consagrarlos.
  rationale: Se ajusta el verbo principal a «roció» para representar con mayor precisión el valor ritual de נזה. Se añade «con parte de ello» para expresar de forma natural en español el sentido de מִמֶּנּוּ sin perder la alternativa literal en nota. Se sustituye «batea» por «fuente» por mayor claridad y alcance panhispánico en contexto bíblico.
