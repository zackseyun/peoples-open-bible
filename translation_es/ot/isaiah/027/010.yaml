  text: כִּ֣י עִ֤יר בְּצוּרָה֙ בָּדָ֔ד נָוֶ֕ה מְשֻׁלָּ֥ח וְ/נֶעֱזָ֖ב כַּ/מִּדְבָּ֑ר שָׁ֣ם יִרְעֶ֥ה עֵ֛גֶל וְ/שָׁ֥ם יִרְבָּ֖ץ וְ/כִלָּ֥ה סְעִפֶֽי/הָ׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/027/010.yaml
  text: For the fortified city is solitary[a], a habitation deserted and abandoned like the wilderness; there a calf grazes[b], and there it lies down and strips its branches bare.
  footnotes:
  - marker: a
    text: Or 'a pasture' or 'a dwelling place' for 'a habitation.' The Hebrew נָוֶה can carry either residential or pastoral nuance.
    reason: lexical_alternative
  - marker: b
    text: Or 'consumes its boughs.' The Hebrew verb conveys complete consumption; 'strips its branches bare' makes the image explicit in natural English.
    reason: lexical_alternative
