translation:
  language: es
  text: Así que[a] comerán del fruto de su camino, y se saciarán[b] con sus propios consejos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y comerán del fruto de su camino».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «quedarán satisfechos con sus propios consejos» o «tendrán bastante de sus propios planes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֹאכְלוּ
  english_pob_choice: So they will eat
  chosen_spanish: Así que comerán
  alternatives_spanish:
  - Y comerán
  - Por tanto, comerán
  lexicon: HALOT
  rationale: El valor conjuntivo-consecutivo de וְ se expresa naturalmente en español con «Así que» para conservar la relación de consecuencia. El futuro verbal mantiene el sentido de resultado cierto.
- source_word: מִפְּרִי
  english_pob_choice: from the fruit
  chosen_spanish: del fruto
  alternatives_spanish:
  - del fruto de
  - a partir del fruto
  lexicon: HALOT
  rationale: La preposición מִן queda reflejada con «del / de», manteniendo la imagen metafórica de recibir el resultado producido.
- source_word: דַרְכָּם
  english_pob_choice: their way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su conducta
  lexicon: HALOT
  rationale: «Camino» conserva la metáfora sapiencial estándar de la vida y conducta moral, sin volverla más interpretativa que el hebreo.
- source_word: וּמִמֹּעֲצֹתֵיהֶם
  english_pob_choice: with their own counsels
  chosen_spanish: con sus propios consejos
  alternatives_spanish:
  - de sus propios consejos
  - con sus propios planes
  lexicon: HALOT
  rationale: מֹעֲצוֹת puede significar consejos, planes o resoluciones. En este contexto de juicio sapiencial, «consejos» mantiene el registro formal y refleja de modo directo el campo léxico elegido en la revisión inglesa; «propios» expresa el sufijo posesivo y el carácter auto-originado de esas deliberaciones.
- source_word: יִשְׂבָּעוּ
  english_pob_choice: be filled
  chosen_spanish: se saciarán
  alternatives_spanish:
  - se llenarán
  - quedarán satisfechos
  lexicon: HALOT
  rationale: 'El verbo significa ser saciado o llenado. «Se saciarán» preserva la imagen de plenitud y deja intacto el matiz irónico: la saciedad proviene de sus propias decisiones, no de bendición.'
theological_decisions:
- issue: Imagen de consecuencia moral en sabiduría
  english_pob_reading: 'The verse is rendered as a statement of fitting consequence: people experience the outcome of their own chosen course.'
  chosen_spanish_reading: 'El versículo presenta una consecuencia correspondiente: la persona recibe el resultado de su propio camino y de sus propias decisiones.'
  alternative_spanish_readings:
  - Una traducción más literal que deje la relación de consecuencia menos explícita
  - Una formulación más doctrinalizada sobre castigo o retribución
  rationale: El hebreo usa imágenes concretas de comer y saciarse para expresar el resultado moral de la conducta. La traducción conserva esa fuerza sapiencial sin importar categorías doctrinales posteriores ni suavizar la tensión retributiva.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «schemes» por «counsels» para reflejar más directamente מֹעֲצוֹתֵיהֶם y mantener un registro más formal. Por eso el español adopta «consejos» y evita opciones más cargadas como «planes» o «maquinaciones».
  spanish_consistency_notes:
  - Se mantiene «camino» para דֶּרֶךְ/דַרְכָּם en coherencia con la metáfora sapiencial habitual.
  - Se usa «Yahvé» como norma del proyecto solo cuando el texto lo exija; aquí no aparece.
  - Se conserva un registro formal y bíblico sin caer en arcaísmos innecesarios.
  - La puntuación con coma refleja la pausa retórica del paralelismo hebreo.
