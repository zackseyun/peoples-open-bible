translation:
  language: es
  text: Tú te encuentras con el que se alegra y hace justicia[a], con los que te recuerdan en tus caminos. He aquí, tú te enojaste, y pecamos; en ellos hemos estado por mucho tiempo[b], ¿y seremos salvos[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con el que se regocija y hace justicia». Los participios hebreos pueden tomarse juntos como descripción de la persona a quien Dios recibe favorablemente.'
    reason: lexical_alternative
  - marker: b
    text: 'La expresión «en ellos» es ambigua en hebreo: puede referirse a tus caminos o a las condiciones recién mencionadas; se conserva esa ambigüedad.'
    reason: alternative_reading
  - marker: c
    text: 'La cláusula «en ellos hemos estado por mucho tiempo, ¿y seremos salvos?» es textual y sintácticamente difícil. Otras posibilidades incluyen: «en ellos hay continuidad, y seremos salvos» o «hemos estado en ellos por mucho tiempo, ¿y seremos salvos?».'
    reason: alternative_reading
lexical_decisions:
- source_word: פָּגַעְתָּ
  english_pob_choice: you meet
  chosen_spanish: sales al encuentro
  alternatives_spanish:
  - te encuentras con
  - sales a recibir
  - sales al encuentro de
  lexicon: HALOT
  rationale: El verbo puede expresar ‘encontrarse con’ o ‘salir al encuentro’. En español, ‘sales al encuentro’ conserva el sentido relacional y evita una lectura demasiado técnica o interpretativa.
- source_word: שָׂשׂ
  english_pob_choice: the one who gladly
  chosen_spanish: del que se alegra
  alternatives_spanish:
  - del que se regocija
  - del que gozosamente
  - del que está gozoso
  lexicon: HALOT
  rationale: El participio describe a una persona caracterizada por el gozo. ‘Se alegra’ da un español natural y mantiene el rasgo de alegría sin forzar una paráfrasis.
- source_word: וְעֹשֵׂה צֶדֶק
  english_pob_choice: does righteousness
  chosen_spanish: practica la justicia
  alternatives_spanish:
  - hace justicia
  - obra justicia
  - practica rectitud
  lexicon: HALOT
  rationale: ‘צֶדֶק’ puede abarcar justicia o rectitud. ‘Practica la justicia’ refleja bien la acción habitual y mantiene el peso moral del hebreo sin volverlo abstracto.
- source_word: בִּדְרָכֶיךָ
  english_pob_choice: in your ways
  chosen_spanish: en tus caminos
  alternatives_spanish:
  - por tus caminos
  - según tus caminos
  lexicon: HALOT
  rationale: ‘Caminos’ es la metáfora bíblica habitual para la conducta y la dirección de Dios. ‘En tus caminos’ conserva la imagen y la relación de pacto.
- source_word: יִזְכְּרוּךָ
  english_pob_choice: those who remember you
  chosen_spanish: de los que te recuerdan
  alternatives_spanish:
  - los que te recuerdan
  - de quienes te tienen presente
  - de los que se acuerdan de ti
  lexicon: HALOT
  rationale: La forma verbal continúa la descripción de personas. ‘De los que te recuerdan’ conserva la dependencia del primer hemistiquio y suena natural en español.
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Mira, pues
  - Ciertamente
  lexicon: HALOT
  rationale: ‘He aquí’ preserva el valor discursivo de atención y se ajusta bien al registro solemne del pasaje.
- source_word: קָצַפְתָּ
  english_pob_choice: you were angry
  chosen_spanish: te enojaste
  alternatives_spanish:
  - estuviste airado
  - te airaste
  - ardiste en ira
  lexicon: HALOT
  rationale: El verbo expresa ira divina. ‘Te enojaste’ es claro y digno en español; ‘airado’ sería más elevado, pero también más marcado.
- source_word: וַנֶּחֱטָא
  english_pob_choice: and we sinned
  chosen_spanish: y pecamos
  alternatives_spanish:
  - y hemos pecado
  - entonces pecamos
  - y fuimos pecadores
  lexicon: HALOT
  rationale: El hebreo afirma el pecado de Israel de manera directa. ‘Pecamos’ es conciso y fiel al paralelismo penitencial.
- source_word: בָּהֶם
  english_pob_choice: in them
  chosen_spanish: en ellos
  alternatives_spanish:
  - en estas cosas
  - en esos caminos
  - por ellos
  lexicon: HALOT
  rationale: El antecedente es deliberadamente ambiguo. ‘En ellos’ preserva esa ambigüedad sin resolverla interpretativamente.
- source_word: עוֹלָם
  english_pob_choice: for a long time
  chosen_spanish: por mucho tiempo
  alternatives_spanish:
  - desde hace mucho
  - por largo tiempo
  - desde antiguo
  lexicon: HALOT
  rationale: En este contexto difícil, ‘עוֹלָם’ comunica duración prolongada más que eternidad absoluta. ‘Por mucho tiempo’ refleja esa extensión sin sobretraducir.
- source_word: וְנִוָּשֵׁעַ
  english_pob_choice: and shall we be saved?
  chosen_spanish: ¿y seremos salvados?
  alternatives_spanish:
  - ¿y podremos ser salvados?
  - ¿y podremos ser salvos?
  - y seremos salvados
  lexicon: HALOT
  rationale: Se mantiene la fuerza retórica de la cláusula difícil como pregunta. ‘Seremos salvados’ conserva el campo de ‘ישׁע’ y la tensión lamentativa del hebreo.
theological_decisions:
- issue: 'Cláusula final difícil: האם וְנִוָּשֵׁעַ es pregunta o afirmación'
  english_pob_reading: 'rendered as a rhetorical question: ''and shall we be saved?'''
  chosen_spanish_reading: 'se mantiene como pregunta retórica: ''¿y seremos salvados?'''
  alternative_spanish_readings:
  - y seremos salvados
  - ¿y podremos ser salvados?
  rationale: El hebreo de Isaías 64:4 es sintácticamente difícil. Mantener la pregunta preserva la tensión del lamento y evita resolver la frase con una seguridad no explicitada por el texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Referencia ambigua de 'en ellos'
  english_pob_reading: in them we have been a long time
  chosen_spanish_reading: en ellos hemos estado por mucho tiempo
  alternative_spanish_readings:
  - en ellos estuvimos por mucho tiempo
  - en esos caminos hemos estado por mucho tiempo
  rationale: La ambigüedad del antecedente se conserva, como en el inglés POB. No se identifica dogmáticamente si el referente son los caminos, las obras mencionadas o la situación histórica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se siguió el giro revisado del audit trail inglés: se prefirió una formulación más formal para הֵן (''He aquí''), se completó la idea verbal implícita de ''hemos estado'', y se mantuvo la clausula final difícil como pregunta retórica sin expandirla interpretativamente.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino explícito.
  - Se prefirió 'justicia' para צֶדֶק, en línea con el audit trail inglés y la cadencia del paralelismo.
  - Se mantuvo el registro solemne y bíblico sin caer en arcaísmo innecesario.
  - Se conservó la ambigüedad sintáctica relevante del hebreo, especialmente en 'en ellos' y en la pregunta final.
