translation:
  language: es
  text: Porque cuanto más débiles de espíritu[a] y más hijos tienen las madres, tanto más devotas de sus hijos[b] son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pusilánimes'. El griego ἀσθενόψυχοι designa literalmente a quienes tienen el alma o el espíritu débil; el matiz puede abarcar desde fragilidad emocional hasta falta de valor.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'más amantes de hijos' (φιλοτεκνώτεραι). También podría traducirse 'más amantes de sus hijos' o 'más afectuosas con sus hijos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσῳ ... τοσούτῳ μᾶλλον
  english_pob_choice: the more ... the more
  chosen_spanish: cuanto más ... tanto más
  alternatives_spanish:
  - entre más ... más
  - en cuanto ... en tanto
  - cuanto mayor ... mayor
  lexicon: LSJ
  rationale: La construcción correlativa comparativa griega ὅσῳ ... τοσούτῳ se traduce con toda naturalidad en español neutro como 'cuanto más ... tanto más', expresión que preserva la lógica proporcional del original sin arcaísmo. La variante regional 'entre más ... más' es válida en algunos países latinoamericanos pero menos neutra a nivel panhispánico.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: LSJ
  rationale: 'La partícula γὰρ tiene función explicativa-causal en este contexto: el versículo introduce una razón que sostiene la afirmación precedente. ''Porque'' es la conjunción causal-explicativa más natural en español moderno; ''pues'' sería igualmente válido en registro elevado.'
- source_word: ἀσθενόψυχοι
  english_pob_choice: weak in spirit
  chosen_spanish: débiles de espíritu
  alternatives_spanish:
  - pusilánimes
  - débiles de alma
  - faltas de valentía
  lexicon: LSJ
  rationale: El compuesto griego ἀσθενής (débil) + ψυχή (alma/espíritu) se traduce literalmente como 'débiles de espíritu', lo que preserva la metáfora sin interpretar en exceso si el sentido es cobardía, fragilidad emocional u otra forma de flaqueza anímica. 'Pusilánimes' (del latín pusillus animus, 'alma pequeña') sería una alternativa de registro culto que coincide con el uso de ἀσθενόψυχοι en la LXX (cf. Is 35:4; 1 Tes 5:14 donde designa a los de ánimo flaqueable), pero presupone una lectura más específica que el texto no impone aquí.
- source_word: πολυγονώτεραι
  english_pob_choice: have more children (revised from 'have many children')
  chosen_spanish: prolíficas
  alternatives_spanish:
  - más fecundas
  - tienen más hijos
  - más abundantes en descendencia
  lexicon: LSJ
  rationale: El comparativo πολυγονώτεραι proviene de πολύγονος ('de mucha descendencia'). La revisión del POB inglés prefirió 'have more children' para reflejar la fuerza comparativa. En español 'más prolíficas' condensa ese comparativo de manera natural y elegante; el prefijo 'pro-' ya contiene la idea de abundante generación. 'Más fecundas' es igualmente aceptable. Se evita la perífrasis 'tienen más hijos' que, aunque clara, reduce el peso del adjetivo predicativo griego.
- source_word: ὑπάρχουσιν
  english_pob_choice: are
  chosen_spanish: son
  alternatives_spanish:
  - resultan ser
  - se hallan siendo
  lexicon: LSJ
  rationale: El verbo ὑπάρχω funciona aquí como cópula de apoyo para los predicativos adjetivales; 'son' es la traducción copular estándar en español y no necesita expansión.
- source_word: αἱ μητέρες
  english_pob_choice: mothers
  chosen_spanish: las madres
  lexicon: LSJ
  rationale: Traducción directa del sustantivo con artículo definido plural; no presenta dificultad.
- source_word: φιλοτεκνώτεραι
  english_pob_choice: devoted to their children
  chosen_spanish: amantes de sus hijos
  alternatives_spanish:
  - devotas de sus hijos
  - más afectuosas con sus hijos
  - más entregadas a sus hijos
  lexicon: LSJ
  rationale: El comparativo φιλοτεκνώτεραι deriva de φιλότεκνος (φιλέω 'amar' + τέκνον 'hijo'). 'Amantes de sus hijos' conserva el radical de amor (φιλο-) y es fiel al compuesto griego, mientras que el POB inglés optó por 'devoted' para reflejar tanto el afecto como la adhesión. En español 'amantes de sus hijos' es igualmente cálido y no implica romanticismo en este contexto; 'devotas' se conserva como alternativa en nota. La fuerza comparativa queda cubierta por 'tanto más' en la correlativa.
translation_notes:
  revision_awareness: El POB inglés fue revisado (2026-04-23, gpt-5.4) de 'have many children' a 'have more children' para reflejar mejor la fuerza comparativa de πολυγονώτεραι. La traducción española adopta 'más prolíficas' como comparativo predicativo, incorporando así directamente esa corrección sin necesidad de perífrasis adicional. No hay revisiones pendientes que afecten la presente versión.
  spanish_consistency_notes:
  - No aparecen los teónimos Yahvé, Mesías, Jesús ni otros términos de la lista de defaults del proyecto en este versículo; las normas terminológicas del proyecto no inciden en esta perícopa.
  - La construcción correlativa 'cuanto más ... tanto más' es la forma canónica en español neutro y se usará de manera consistente para el par ὅσῳ ... τοσούτῳ siempre que aparezca en 4 Macabeos.
  - El campo semántico de φιλοτεκνία ('amor materno/filial') debe mantenerse diferenciado de φιλαδελφία ('amor fraternal') en los capítulos circundantes de 4 Macabeos.
