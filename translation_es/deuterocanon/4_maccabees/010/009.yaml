translation:
  language: es
  text: 'Y cuando estaba a punto de morir, dijo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μέλλων
  english_pob_choice: as he was about to
  chosen_spanish: cuando estaba a punto de
  alternatives_spanish:
  - estando por
  - al estar por
  - cuando iba a
  lexicon: BDAG
  rationale: El participio de μέλλω expresa inminencia. En español, «cuando estaba a punto de» conserva el valor circunstancial y la cercanía temporal sin sonar rígido ni forzado.
- source_word: ἀποθνήσκειν
  english_pob_choice: die
  chosen_spanish: morir
  alternatives_spanish:
  - perecer
  - ser ejecutado
  lexicon: BDAG
  rationale: El infinitivo significa «morir». Como el griego no explicita aquí la agencia de la muerte, «morir» es la opción más fiel y directa; «ser ejecutado» añadiría una precisión que no está en la cláusula.
- source_word: ἔφη
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - declaró
  - habló
  lexicon: BDAG
  rationale: Es una fórmula narrativa normal para introducir discurso. «Dijo» comunica el valor de ἔφη con naturalidad en español.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: δέ aquí solo avanza la narración; «Y» mantiene esa continuidad sin introducir contraste fuerte.
translation_notes:
  revision_awareness: El pasaje griego es breve y el cotejo de la revisión más reciente indica alta concordancia sin cambios necesarios. No se documentan variantes textuales ni tensiones léxicas adicionales en el expediente inglés.
  spanish_consistency_notes:
  - Se mantiene un español sobrio y narrativo, acorde con la brevedad del original.
  - No se añadió información sobre la causa de la muerte, porque el griego solo dice que estaba por morir.
  - Se evitó el calco «él dijo» porque en español el sujeto ya queda implícito en el verbo.
