translation:
  language: es
  text: 'Los judíos establecieron y aceptaron[a] para sí mismos, para su descendencia y para todos los que se unieron a ellos, que esto no se dejara de observar[b]: estos dos días conforme a lo que estaba escrito para ellos y en su tiempo señalado, año tras año.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los que se adhirieron a ellos». El hebreo puede referirse a quienes se unieron o se aliaron con los judíos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que no pasara» o «que no se descuidara». La cláusula expresa que la observancia no debía decaer ni omitirse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קִיְּמוּ
  english_pob_choice: established
  chosen_spanish: establecieron
  alternatives_spanish:
  - confirmaron
  - instituyeron
  lexicon: HALOT
  rationale: En este contexto jurídico-festivo, קִיְּמוּ expresa dar firmeza u ordenar una práctica. «Establecieron» conserva la fuerza institucional sin sonar forzado en español.
- source_word: וְקִבֵּל
  english_pob_choice: and accepted
  chosen_spanish: y aceptaron
  alternatives_spanish:
  - y asumieron
  - y recibieron
  lexicon: HALOT
  rationale: La POB entiende el segundo verbo como aceptación de la obligación. «Aceptaron» refleja bien esa toma voluntaria de la norma.
- source_word: עֲלֵיהֶם
  english_pob_choice: for themselves
  chosen_spanish: para sí mismos
  alternatives_spanish:
  - sobre sí mismos
  - encima de sí mismos
  lexicon: HALOT
  rationale: En español, «para sí mismos» expresa de modo natural la idea de asumir una obligación para su propio uso o conducta; evita el calco «sobre sí mismos».
- source_word: זַרְעָם
  english_pob_choice: their offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - sus hijos
  - su linaje
  lexicon: HALOT
  rationale: «Descendencia» mantiene el alcance generacional sin restringirlo solo a hijos inmediatos ni sonar demasiado literal como «semilla».
- source_word: כָּל הַנִּלְוִים עֲלֵיהֶם
  english_pob_choice: all who joined them
  chosen_spanish: todos los que se unieron a ellos
  alternatives_spanish:
  - todos los que se adhirieron a ellos
  - todos los que se aliaron con ellos
  lexicon: HALOT
  rationale: El participio de לוה comunica adherirse o unirse. «Se unieron a ellos» es claro y conserva la amplitud del grupo asociado con los judíos.
- source_word: וְלֹא יַעֲבוֹר
  english_pob_choice: that it should not fail
  chosen_spanish: que no dejaría de cumplirse
  alternatives_spanish:
  - que no pasaría
  - que no se omitiera
  lexicon: HALOT
  rationale: La POB toma la frase como no-lapse de la observancia. «No dejaría de cumplirse» preserva la idea de continuidad obligatoria sin perder el matiz de cumplimiento práctico.
- source_word: לִהְיוֹת עֹשִׂים
  english_pob_choice: to observe
  chosen_spanish: observar
  alternatives_spanish:
  - seguir celebrando
  - seguir haciendo
  lexicon: HALOT
  rationale: En un contexto de fiesta establecida, «observar» expresa la práctica ritual reiterada sin añadir contenido ajeno.
- source_word: שְׁנֵי הַיָּמִים הָאֵלֶּה
  english_pob_choice: these two days
  chosen_spanish: estos dos días
  alternatives_spanish:
  - los dos días estos
  - las dos jornadas
  lexicon: HALOT
  rationale: La frase es directa; «estos dos días» conserva la demonstración y es natural en español.
- source_word: כִּכְתָבָם
  english_pob_choice: according to what was written for them
  chosen_spanish: conforme a lo que estaba escrito para ellos
  alternatives_spanish:
  - según lo que se escribió para ellos
  - de acuerdo con su escrito
  lexicon: HALOT
  rationale: La POB mantiene la referencia a un estándar escrito para ellos. «Conforme a lo que estaba escrito para ellos» conserva esa pasividad normativa sin precisar más de lo que el texto da.
- source_word: וְכִזְמַנָּם
  english_pob_choice: at their appointed time
  chosen_spanish: en su tiempo señalado
  alternatives_spanish:
  - en su tiempo establecido
  - en el tiempo fijado para ellos
  lexicon: HALOT
  rationale: זמן aquí es tiempo fijado o designado. «Tiempo señalado» transmite la idea de fecha/ocasión determinada con dignidad y claridad.
- source_word: בְּכָל שָׁנָה וְשָׁנָה
  english_pob_choice: year after year
  chosen_spanish: año tras año
  alternatives_spanish:
  - cada año
  - año por año
  lexicon: HALOT
  rationale: La expresión hebrea es iterativa; «año tras año» conserva ese ritmo repetitivo mejor que una simple equivalencia plana.
translation_notes:
  revision_awareness: 'Se siguió el sentido jurídico-festivo del hebreo y la solución auditada de la POB en inglés: establecer/aceptar, grupo adherido, y la cláusula de no-lapse como obligación de observancia anual. No se detectaron revisiones textuales que obligaran a modificar la lectura base.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió un español formal y readable, evitando el calco «sobre ellos» para עֲלֵיהֶם.
  - «Observar» se usó como verbo ritual estable para לִהְיוֹת עֹשִׂים en lugar de «hacer», por claridad de contexto.
  - Se conservó la tensión semántica de וְלֹא יַעֲבוֹר mediante una nota alternativa en vez de suavizarla completamente.
