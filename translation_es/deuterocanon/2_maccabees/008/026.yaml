translation:
  language: es
  text: Porque era la víspera del sábado[a], y por esa razón no continuaron persiguiéndolos por mucho tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión griega de Swete, «ἡ πρὸ τοῦ σαββάτου δίκη», es difícil en sentido textual y léxico. Aquí se sigue el sentido contextual claro: la cercanía del sábado limitó cuánto tiempo continuaron persiguiéndolos.'
    reason: textual_variant
lexical_decisions:
- source_word: ἦν γὰρ
  english_pob_choice: For it was
  chosen_spanish: Porque era
  alternatives_spanish:
  - Pues era
  - Porque había
  lexicon: LSJ
  rationale: γάρ introduce la razón del contexto previo; en español, «porque» expresa con naturalidad esa relación causal. «Era» mantiene la referencia temporal sin añadir matices ajenos.
- source_word: ἡ πρὸ τοῦ σαββάτου δίκη
  english_pob_choice: the day before the Sabbath
  chosen_spanish: el día antes del sábado
  alternatives_spanish:
  - la víspera del sábado
  - la preparación antes del sábado
  lexicon: LSJ
  rationale: La secuencia griega es difícil si se toma δίκη en su sentido usual. Siguiendo la decisión auditable del inglés, el sentido contextual es temporal. «El día antes del sábado» conserva el valor temporal sin forzar una expresión más técnica.
- source_word: διʼ ἣν αἰτίαν
  english_pob_choice: and for that reason
  chosen_spanish: y por esa razón
  alternatives_spanish:
  - por lo cual
  - por esa causa
  lexicon: LSJ
  rationale: La frase es causal y explicativa; «y por esa razón» mantiene el enlace con la cláusula anterior en un español claro y fiel.
- source_word: οὐκ ἐμακροτόνησαν
  english_pob_choice: they did not continue ... for long
  chosen_spanish: no continuaron ... por mucho tiempo
  alternatives_spanish:
  - no tardaron mucho
  - no prolongaron ... por largo tiempo
  lexicon: LSJ
  rationale: El verbo comunica no prolongar una acción. En español, «no continuaron ... por mucho tiempo» reproduce esa idea de duración limitada sin añadir precisión que no está en el griego.
- source_word: κατατρέχοντες αὐτούς
  english_pob_choice: pursuing them
  chosen_spanish: persiguiéndolos
  alternatives_spanish:
  - corriendo tras ellos
  - dándoles alcance
  lexicon: LSJ
  rationale: El participio expresa persecución estrecha. «Persiguiéndolos» es la forma natural y exacta en español para ese contexto militar.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la decisión auditada del POB inglés: tomar la frase griega difícil de modo temporal, sin traducir mecánicamente δίκη con «justicia» o «juicio» porque el contexto inmediato exige una referencia al día previo al sábado y a la duración limitada de la persecución.'
  spanish_consistency_notes:
  - Se conserva «sábado» como equivalente directo de σαββάτου, siguiendo el uso bíblico corriente en español.
  - Se evita «SEÑOR» y otras convenciones no pertinentes; el versículo no contiene el nombre divino ni títulos cristológicos.
  - La puntuación separa la oración causal principal y mantiene el flujo de explicación del griego.
