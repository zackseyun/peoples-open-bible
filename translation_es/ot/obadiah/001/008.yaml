revisions:
- from: ¿No será en aquel día, dice Yahvé, que destruiré a los sabios de Edom y la inteligencia del monte de Esaú?[a]
  to: ¿No destruiré, en aquel día, declara Yahvé, a los sabios de Edom, y el entendimiento del monte de Esaú?[a]
  rationale: La revisión corrige la sintaxis para que la pregunta retórica recaiga directamente sobre «destruiré», como en el hebreo. También reemplaza «la inteligencia» por «el entendimiento» para una equivalencia más natural y sapiencial, y usa «declara Yahvé» como fórmula profética más idiomática. La nota léxica se conserva sin cambios sustanciales porque refleja bien las alternativas de הַר עֵשָׂו.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:41:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la mayor parte del sentido: pregunta retórica, referencia temporal, nombre divino Yahvé, juicio sobre los sabios de Edom y nota léxica sobre «monte de Esaú». Sin embargo, la sintaxis principal no refleja fielmente la estructura hebrea. «¿No será en aquel día... que destruiré...?» suena impropio en español y desplaza la fuerza verbal de הֲלֹוא + וְהַאֲבַדְתִּי, que se expresa mejor como una pregunta directa: «¿No destruiré...?» o «¿Acaso no destruiré...?». Además, «la inteligencia del monte de Esaú» omite el valor de procedencia/remoción de מִן en la segunda mitad; debe ser «el entendimiento de/desde el monte de Esaú» en el sentido de quitarlo de allí, no una inteligencia perteneciente al monte.'
  spanish_quality_summary: 'La redacción actual es comprensible pero poco natural y algo forzada: «¿No será ... que destruiré ...?» no es español bíblico claro ni español natural. También hay un paralelismo mejorable entre «los sabios» y «el entendimiento», que suena más idiomático y más cercano a «understanding» que «la inteligencia» en este contexto. Una revisión menor deja el versículo claro, solemne y fiel.'
  glossary_alignment: Alinea correctamente «Yahvé» para יְהוָה y conserva «Esaú». «Los sabios» es aceptable para חֲכָמִים. Recomiendo «entendimiento» para תְבוּנָה por mayor cercanía semántica y mejor registro bíblico. La nota de alternativa geográfica está bien y debe mantenerse con anclaje en «monte de Esaú».
  issues:
  - severity: high
    issue: La pregunta retórica inicial está mal formulada en español
    rationale: הֲלֹוא introduce una pregunta retórica vinculada al verbo principal «destruiré». «¿No será ... que destruiré ...?» no reproduce esa relación y resulta sintacticamente extraña. Debe decirse «¿No destruiré...?» o similar.
  - severity: high
    issue: Se pierde el valor de procedencia/remoción en «la inteligencia del monte de Esaú»
    rationale: מֵהַר עֵשָׂו significa «del/de desde el monte de Esaú» como origen del elemento removido, no una simple relación posesiva. En español, «del monte» tras «la inteligencia» suena atributivo; conviene reformular con «el entendimiento del monte de Esaú» dentro del paralelismo verbal o mantener la estructura que haga claro que se quita de allí.
  - severity: medium
    issue: «La inteligencia» no es la mejor equivalencia contextual para תְבוּנָה
    rationale: Aunque posible, «inteligencia» en español moderno puede sonar más a capacidad intelectual general o cociente mental. «Entendimiento» o «discernimiento» encajan mejor con el paralelismo sapiencial y el registro bíblico.
  - severity: low
    issue: La fórmula profética puede sonar más natural como «declara Yahvé»
    rationale: «Dice Yahvé» es aceptable, pero «declara Yahvé» refleja mejor נְאֻם en contexto profético solemne y armoniza con el estilo del proyecto.
  revised_spanish_text: ¿No destruiré, en aquel día, declara Yahvé, a los sabios de Edom, y el entendimiento del monte de Esaú?[a]
  revised_footnotes:
  - marker: a
    text: O «del monte Esaú» o «de la región montañosa de Esaú». El hebreo dice literalmente «del monte de Esaú».
    reason: lexical_alternative
  revision_rationale: La revisión corrige la sintaxis para que la pregunta retórica recaiga directamente sobre «destruiré», como en el hebreo. También reemplaza «la inteligencia» por «el entendimiento» para una equivalencia más natural y sapiencial, y usa «declara Yahvé» como fórmula profética más idiomática. La nota léxica se conserva sin cambios sustanciales porque refleja bien las alternativas de הַר עֵשָׂו.
