translation:
  language: es
  text: Porque han tomado algunas de sus hijas para sí y para sus hijos,[a] y la descendencia santa[b] se ha mezclado con los pueblos de las tierras.[c] Y la mano de los oficiales y de los diputados fue la principal en esta infidelidad.[d]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘han tomado de entre sus hijas’. El hebreo dice literalmente ‘han tomado de sus hijas’, con sentido de tomar en matrimonio.
    reason: lexical_alternative
  - marker: b
    text: Lit. ‘la semilla santa’. El hebreo conserva lenguaje de linaje de pacto; también puede traducirse ‘la descendencia santa’.
    reason: lexical_alternative
  - marker: c
    text: O ‘con los pueblos de las tierras’. La expresión hebrea mantiene el plural y el trasfondo postexílico de los pueblos circundantes.
    reason: lexical_alternative
  - marker: d
    text: O ‘fue la principal responsable en esta infidelidad’. El hebreo usa un modismo con ‘mano’ y ‘primera’ para indicar responsabilidad principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשְׂאוּ
  english_pob_choice: have taken
  chosen_spanish: han tomado
  alternatives_spanish:
  - han desposado
  - han tomado en matrimonio
  lexicon: HALOT
  rationale: El verbo hebreo literalmente es ‘tomar’, y en este contexto el sentido matrimonial se infiere por las ‘hijas’ y los ‘hijos’. ‘Han tomado’ preserva la forma del original sin perder el sentido contextual.
- source_word: מִבְּנֹתֵיהֶם
  english_pob_choice: some of their daughters
  chosen_spanish: algunas de sus hijas
  alternatives_spanish:
  - de sus hijas
  - de entre sus hijas
  lexicon: HALOT
  rationale: La preposición מִן tiene aquí valor partitivo. ‘Algunas de sus hijas’ comunica con naturalidad que tomaron mujeres de entre ellas, sin sobrecargar la frase.
- source_word: לָהֶם וְלִבְנֵיהֶם
  english_pob_choice: for themselves and for their sons
  chosen_spanish: para sí y para sus hijos
  alternatives_spanish:
  - para ellos y para sus hijos
  - para ellos mismos y para sus hijos
  lexicon: HALOT
  rationale: La lamed marca beneficio/recepción. ‘Para sí y para sus hijos’ conserva el doble destinatario y suena natural en español.
- source_word: וְהִתְעָרְבוּ
  english_pob_choice: has mixed itself
  chosen_spanish: se ha mezclado
  alternatives_spanish:
  - se ha intermezclado
  - se ha entremezclado
  lexicon: HALOT
  rationale: El hitpael expresa mezcla o intermingling. En español, ‘se ha mezclado’ transmite el sentido de manera clara y digna, manteniendo la idea de una mezcla real.
- source_word: זֶרַע הַקֹּדֶשׁ
  english_pob_choice: the holy seed
  chosen_spanish: la semilla santa
  alternatives_spanish:
  - la descendencia santa
  - la estirpe santa
  lexicon: HALOT
  rationale: Se conserva la imagen de ‘seed’ para mantener el lenguaje genealógico y de pacto. ‘Semilla santa’ es más literal; ‘descendencia santa’ es una alternativa posible, pero ‘semilla’ preserva mejor la tensión léxica del hebreo.
- source_word: בְּעַמֵּי הָאֲרָצוֹת
  english_pob_choice: with the peoples of the lands
  chosen_spanish: con los pueblos de las tierras
  alternatives_spanish:
  - entre los pueblos de las tierras
  - con los pueblos de los territorios
  lexicon: HALOT
  rationale: ‘Pueblos’ y ‘tierras’ conservan el plural del hebreo y el marco postexílico. ‘Con’ refleja la idea de mezcla/interacción que el verbo exige.
- source_word: וְיַד
  english_pob_choice: the hand
  chosen_spanish: la mano
  alternatives_spanish:
  - la influencia
  - la intervención
  lexicon: HALOT
  rationale: La metáfora hebrea de ‘mano’ para agencia o responsabilidad se mantiene en español, porque es comprensible y conserva el color idiomático del original.
- source_word: הַשָּׂרִים וְהַסְּגָנִים
  english_pob_choice: the officials and the deputies
  chosen_spanish: los oficiales y los jefes
  alternatives_spanish:
  - los oficiales y los gobernadores
  - los dirigentes y los prefectos
  lexicon: HALOT
  rationale: ‘Oficiales’ y ‘jefes’ expresa liderazgo administrativo sin imponer títulos más fuertes que los que sugiere el hebreo. ‘Jefes’ ayuda a reflejar el peso de responsabilidad del grupo.
- source_word: מַּעַל
  english_pob_choice: unfaithfulness
  chosen_spanish: infidelidad
  alternatives_spanish:
  - deslealtad
  - falta de fidelidad
  - traición
  lexicon: HALOT
  rationale: En este contexto, מַּעַל tiene fuerza de quebrantamiento de confianza/covenantal. ‘Infidelidad’ comunica bien esa carga moral y relacional en español.
- source_word: רִאשׁוֹנָה
  english_pob_choice: foremost
  chosen_spanish: la primera
  alternatives_spanish:
  - la principal
  - la más culpable
  - la que encabezó
  lexicon: HALOT
  rationale: El adjetivo funciona aquí con valor predicativo/adyacente para indicar primacía en responsabilidad. ‘La primera’ conserva la cercanía formal al hebreo; el sentido de liderazgo culpable queda por el contexto.
theological_decisions:
- issue: Lenguaje de pacto en ‘la semilla santa’
  english_pob_reading: Retain the covenantal expression 'the holy seed' without expanding it into an ethnic or racial theory.
  chosen_spanish_reading: Conservar ‘la semilla santa’ como expresión de linaje/pueblo de pacto, sin convertirla en una teoría racial.
  alternative_spanish_readings:
  - la descendencia santa
  - la estirpe santa
  rationale: El hebreo conserva lenguaje genealógico y de santidad comunitaria. La traducción debe dejar visible esa tensión sin redefinirla en categorías ajenas al texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Responsabilidad principal de los dirigentes
  english_pob_reading: '''Translate the idiom to show that the leaders bore primary responsibility: ''the hand of the officials and the deputies has been foremost.'''''
  chosen_spanish_reading: ‘La mano de los oficiales y de los jefes ha sido la primera’ conserva la metáfora y señala que ellos llevaron la delantera en la culpa.
  alternative_spanish_readings:
  - los oficiales y los jefes fueron los primeros en esta infidelidad
  - los dirigentes encabezaron esta infidelidad
  rationale: El hebreo usa ‘mano’ e idea de ‘primero’ para marcar agencia y primacía en el pecado. La versión española debe dejar visible ese énfasis sin borrar el giro idiomático.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se usa una coordinación simple equivalente al hebreo (''y'') en lugar de una expresión de finalidad, y se conserva la lectura de responsabilidad principal de los dirigentes sin diluir la metáfora de la ''mano''.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ solo cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se prefirió ‘infidelidad’ para מעל por su carga relacional y pactal, coherente con el audit trail en inglés.
  - Se conservó la metáfora de ‘mano’ para וְיַד por claridad idiomática y fidelidad formal.
  - ‘Semilla santa’ se mantuvo deliberadamente para reflejar el lenguaje genealógico del hebreo, con nota aclaratoria para lectores hispanos.
