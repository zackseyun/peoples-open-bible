  text: שָׁמְרֵ֤/נִי יְהוָ֨ה מִ֘/ידֵ֤י רָשָׁ֗ע מֵ/אִ֣ישׁ חֲמָסִ֣ים תִּנְצְרֵ֑/נִי אֲשֶׁ֥ר חָ֝שְׁב֗וּ לִ/דְח֥וֹת פְּעָמָֽ/י׀׃
