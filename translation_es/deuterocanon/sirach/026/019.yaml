- from: Pilares de oro sobre una base de plata[a], y pies hermosos sobre los pechos de uno que se mantiene firme.
  to: Pilares de oro sobre una base de plata[a], y pies hermosos sobre el pecho de uno que se mantiene firme.
  rationale: Se cambia «los pechos» por «el pecho» para conservar la imagen corporal del original en un español natural y ampliamente legible, en línea con la decisión auditada en inglés de usar una expresión colectiva idiomática. También se pule levemente la redacción de la nota al pie.
