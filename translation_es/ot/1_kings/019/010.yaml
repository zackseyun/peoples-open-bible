translation:
  language: es
  text: 'Y dijo[a]: «He tenido gran celo por Yahvé, el Dios de los ejércitos, porque los hijos de Israel[b] han abandonado tu pacto, han derribado tus altares y han matado a tus profetas a espada. Yo solo he quedado, y buscan mi vida[c], para quitármela».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He sido muy celoso por Yahvé». El hebreo usa una construcción intensiva que también puede expresarse como «He sentido un celo muy grande por Yahvé».
    reason: lexical_alternative
  - marker: b
    text: 'O «los israelitas». Hebreo: «los hijos de Israel».'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «mi vida». El hebreo usa נֶפֶשׁ, aquí en el sentido idiomático de vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַנֹּא קִנֵּאתִי
  english_pob_choice: I have been very zealous
  chosen_spanish: Muy celoso he sido
  alternatives_spanish:
  - He sido muy celoso
  - He tenido gran celo
  - He estado sumamente celoso
  lexicon: HALOT
  rationale: La construcción intensiva hebrea pide conservar el énfasis. «Muy celoso» mantiene la fuerza de celo por Yahvé sin perder el matiz de ardor covenantal; «celoso» aquí traduce el campo semántico de celo, no de envidia.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre divino directo. En español del proyecto, el nombre propio se rinde como «Yahvé», y la preposición «por» expresa mejor el objeto del celo en este contexto que «para».
- source_word: אֱלֹהֵי צְבָאוֹת
  english_pob_choice: the God of hosts
  chosen_spanish: el Dios de los ejércitos
  alternatives_spanish:
  - el Dios de los ejércitos celestiales
  - el Dios de las huestes
  lexicon: HALOT
  rationale: צְבָאוֹת puede referirse a huestes/ejércitos. En español, «Dios de los ejércitos» es claro y conserva la imagen bíblica sin importar otro título distinto.
- source_word: עָזְבוּ בְרִיתְךָ
  english_pob_choice: have forsaken your covenant
  chosen_spanish: han abandonado tu pacto
  alternatives_spanish:
  - han dejado tu pacto
  - han desertado de tu pacto
  lexicon: HALOT
  rationale: עָזַב admite «abandonar» o «dejar». «Abandonado» suena natural y conserva la gravedad del quebrantamiento del pacto; «pacto» es el equivalente directo de בְּרִית.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la formulación literal «hijos de Israel», como en el hebreo, y es idiomática en español bíblico sin borrar la forma de origen. La alternativa «israelitas» suaviza el eco textual.
- source_word: מִזְבְּחֹתֶיךָ הָרָסוּ
  english_pob_choice: torn down your altars
  chosen_spanish: han derribado tus altares
  alternatives_spanish:
  - han destruido tus altares
  - han demolido tus altares
  lexicon: HALOT
  rationale: הָרַס es «derribar/demoler». «Derribado» reproduce bien la imagen de destrucción estructural aplicada a altares.
- source_word: נְבִיאֶיךָ הָרְגוּ בֶחָרֶב
  english_pob_choice: killed your prophets with the sword
  chosen_spanish: han matado a tus profetas a espada
  alternatives_spanish:
  - han asesinado a tus profetas con la espada
  - han herido a tus profetas con espada
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula violenta e instrumental; «a espada» es la equivalencia española más natural y fiel, y mantiene la concreción del medio.
- source_word: וָאִוָּתֵר אֲנִי לְבַדִּי
  english_pob_choice: I alone am left
  chosen_spanish: Yo solo he quedado
  alternatives_spanish:
  - Yo solo quedo
  - Yo he quedado solo
  lexicon: HALOT
  rationale: La idea es de supervivencia/soledad. «He quedado» transmite el estado resultante; anteponer «Yo solo» preserva el énfasis de אֲנִי לְבַדִּי.
- source_word: וַיְבַקְשׁוּ אֶת נַפְשִׁי
  english_pob_choice: they seek my life
  chosen_spanish: procuran quitarme la vida
  alternatives_spanish:
  - buscan mi vida
  - quieren quitarme la vida
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí es «vida». «Procuran quitarme la vida» comunica el sentido idiomático de intento homicida y suena natural en español, sin desdibujar la intención del hebreo.
- source_word: לְקַחְתָּהּ
  english_pob_choice: to take it
  chosen_spanish: para tomarla
  alternatives_spanish:
  - para quitármela
  - para llevársela
  lexicon: HALOT
  rationale: El sufijo femenino retoma «vida». «Tomarla» conserva la referencia anafórica y la brevedad del hebreo; aquí el complemento de finalidad «para» aclara la cláusula final.
theological_decisions:
- issue: Nombre divino יְהוָה en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El proyecto español usa «Yahvé» como forma del nombre divino en el cuerpo del texto, siguiendo la política indicada de no enmascarar el Tetragrámaton. Se conserva así la referencia explícita al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de קַנֹּא קִנֵּאתִי
  english_pob_reading: I have been very zealous
  chosen_spanish_reading: Muy celoso he sido
  alternative_spanish_readings:
  - He sido muy celoso
  - He tenido gran celo
  rationale: Se evita reducirlo a «celoso» en sentido de envidia. El contexto es celo ferviente por la honra de Yahvé; la redacción preserva la intensidad sin eliminar la tensión semántica entre celo y celo fervoroso.
  doctrine_reference: HALOT 7065 / contexto narrativo de 1 Reyes 19
- issue: Referencia colectiva de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la forma masculina colectiva del hebreo. Esto preserva el eco textual y la formulación covenental, sin introducir una reinterpretación más abstracta.
  doctrine_reference: Principio de fidelidad formal a referentes colectivos del hebreo bíblico
translation_notes:
  revision_awareness: Se observó un alto grado de acuerdo en la revisión más reciente; la versión inglesa final no requirió cambios sustanciales. En español, la principal adaptación fue mantener el nombre divino como «Yahvé» según la política del proyecto y ajustar el orden para que la frase intensiva suene natural sin perder el énfasis hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה y «Dios de los ejércitos» para אֱלֹהֵי צְבָאוֹת.
  - Se tradujo נֶפֶשׁ como «vida» en el modismo «quitarme la vida», con nota explicativa.
  - Se conservó la estructura intensiva de קַנֹּא קִנֵּאתִי con una formulación española natural y enfática.
  - 'Se preservó el paralelismo de acciones violentas con verbos coordinados: «han abandonado... han derribado... han matado...».'
