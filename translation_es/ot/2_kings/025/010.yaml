- from: Y todo el ejército de los caldeos[a], que estaba con el capitán de la guardia, derribó las murallas de Jerusalén por todos lados.
  to: Y todo el ejército de los caldeos, que estaban con el capitán de la guardia[a], derribaron las murallas de Jerusalén por todos lados.
  rationale: Se corrige el anclaje de la nota para que recaiga sobre 'capitán de la guardia', que es el término explicado por la nota léxica. También se ajusta la concordancia a plural ('estaban', 'derribaron') para mejorar la naturalidad del español y reflejar más directamente el verbo hebreo plural y el referente personal del sujeto.
