review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido global del griego: exhortación a cobrar ánimo, vocativo «mujer», temor interiorizado «en tu corazón», afirmación de no haber dañado a nadie que escogiera servir a Nabucodonosor, y el título imperial «de toda la tierra». Sin embargo, presenta dos problemas de fidelidad/forma: «le dijo a ella» es innecesariamente calcado y poco natural para πρὸς αὐτήν, y «al rey Nabucodonosor, de toda la tierra» puntúa y adjunta mal el sintagma final, como si fuera aposición separada en vez de complemento de «rey».'
  spanish_quality_summary: El español es mayormente claro, pero hay detalles poco idiomáticos. «Le dijo a ella» suena redundante en español; «le dijo» basta. «Ten ánimo» es aceptable, aunque «Ten valor» o «Cobra ánimo» serían posibles; no exige cambio. La mayor falla de legibilidad es la coma antes de «de toda la tierra», que rompe la unidad del título y produce una lectura torpe. También conviene eliminar la nota b, porque el inglés no preservó alternativa para ἄνθρωπον en nota y aquí no hay nueva ambigüedad creada por el español.
  glossary_alignment: No hay términos del glosario mayor en juego. «Servir» para δουλεύειν está bien contextualizado. «Mujer» preserva adecuadamente γύναι. «De toda la tierra» sigue correctamente la decisión auditada sobre πάσης τῆς γῆς. La nota alternativa sobre «persona/ser humano» para ἄνθρωπον no está respaldada por la auditoría inglesa ni es necesaria en este versículo.
  issues:
  - severity: medium
    issue: Calco poco natural «le dijo a ella»
    rationale: El griego πρὸς αὐτήν simplemente introduce el destinatario; en español «le dijo» transmite el mismo sentido con mejor naturalidad. Mantener «a ella» suena enfático sin base contextual.
  - severity: high
    issue: Puntuación incorrecta en «al rey Nabucodonosor, de toda la tierra»
    rationale: La coma separa indebidamente «de toda la tierra» del título imperial y oscurece que modifica a «rey Nabucodonosor». Debe integrarse como «al rey Nabucodonosor de toda la tierra».
  - severity: medium
    issue: Nota b no justificada para «ningún hombre»
    rationale: La auditoría inglesa no incluyó nota para ἄνθρωπον, y el español no introduce una ambigüedad nueva que requiera preservar «persona/ser humano» como nota textual.
  revised_spanish_text: 'Y Holofernes le dijo: «Ten ánimo, mujer; no temas en tu corazón[a], porque yo no he hecho daño a ningún hombre que haya escogido[b] servir al rey Nabucodonosor de toda la tierra»[c].'
