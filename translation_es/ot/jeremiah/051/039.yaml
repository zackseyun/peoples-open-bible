translation:
  language: es
  text: Cuando estén acalorados, pondré su bebida[a] y los embriagaré, para que se regocijen y duerman un sueño eterno, y no despierten[b], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su fiesta’ o ‘su banquete’ para מִשְׁתֵּיהֶם; el término hebreo puede denotar una fiesta de bebida.
    reason: lexical_alternative
  - marker: b
    text: ‘Sueño eterno’ es una metáfora hebrea de muerte irreversible bajo juicio; literalmente, ‘sueño de perpetuidad’.
    reason: cultural_note
lexical_decisions:
- source_word: בְּחֻמָּם
  english_pob_choice: When they are heated
  chosen_spanish: Cuando estén calentados
  alternatives_spanish:
  - En su calor
  - Mientras estén inflamados
  lexicon: HALOT
  rationale: La construcción con ב + ‘calor’ y sufijo de 3.ª plural tiene un valor circunstancial/temporal. ‘Cuando estén calentados’ conserva esa idea de estado activado sin reducirlo a temperatura física ni forzar una interpretación demasiado específica.
- source_word: אָשִׁית
  english_pob_choice: I will set out
  chosen_spanish: pondré
  alternatives_spanish:
  - colocaré
  - dispondré
  lexicon: HALOT
  rationale: שׂים es ‘poner/colocar’. En español, ‘pondré’ comunica de forma natural la acción de disponer una bebida delante de ellos, sin alejarse del hebreo.
- source_word: מִשְׁתֵּיהֶם
  english_pob_choice: their drink
  chosen_spanish: su bebida
  alternatives_spanish:
  - su banquete
  - su fiesta
  lexicon: HALOT
  rationale: מִשְׁתֶּה puede significar banquete o fiesta de bebida, pero aquí el contexto inmediato de ‘los embriagaré’ favorece ‘bebida’. Mantiene mejor el juego semántico de la cláusula sin perder la posibilidad de la fiesta de bebida.
- source_word: וְהִשְׁכַּרְתִּים
  english_pob_choice: and make them drunk
  chosen_spanish: los embriagaré
  alternatives_spanish:
  - los intoxicaré
  - los emborracharé
  lexicon: HALOT
  rationale: El hiphil de שׁכר expresa causar embriaguez. ‘Los embriagaré’ es fiel, directo y suficientemente digno para el registro bíblico, sin sonar coloquial.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: HALOT
  rationale: La conjunción final expresa propósito. ‘Para que’ es la equivalencia más natural en español y conserva la relación causal-final del texto.
- source_word: יַעֲלֹזוּ
  english_pob_choice: they may exult
  chosen_spanish: se exulten
  alternatives_spanish:
  - se alegren
  - revelen
  lexicon: HALOT
  rationale: El verbo implica júbilo/exaltación. ‘Se exulten’ mantiene el tono elevado e irónico del pasaje; aunque es menos común, conserva mejor la fuerza del hebreo que ‘se alegren’.
- source_word: וְיָשְׁנוּ
  english_pob_choice: and sleep
  chosen_spanish: y duerman
  alternatives_spanish:
  - y luego duerman
  - y se echen a dormir
  lexicon: HALOT
  rationale: La waw enlaza el siguiente resultado sin exigir una secuencia temporal explícita añadida. ‘Y duerman’ respeta la coordinación simple del hebreo.
- source_word: שְׁנַת עוֹלָם
  english_pob_choice: an everlasting sleep
  chosen_spanish: un sueño eterno
  alternatives_spanish:
  - un sueño perpetuo
  - un sueño para siempre
  lexicon: HALOT
  rationale: Se conserva la metáfora de sueño sin resolverla en ‘muerte’ o ‘sepultura’. ‘Eterno’ mantiene el valor de עוֹלָם como duración irreversible en contexto de juicio, dejando visible la tensión poética del original.
- source_word: וְלֹא יָקִיצוּ
  english_pob_choice: and not wake up
  chosen_spanish: y no despierten
  alternatives_spanish:
  - y no vuelvan a despertar
  - y no despierten jamás
  lexicon: HALOT
  rationale: קיץ significa ‘despertar’. ‘No despierten’ conserva la imagen del sueño y evita añadir ‘jamás’, que haría explícita una idea ya implícita en el contexto.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como ‘Yahvé’, conforme al criterio del proyecto para יְהוָה. ‘Declara’ refleja bien la fórmula profética נְאֻם sin sonar demasiado coloquial.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - declara el SEÑOR
  - oráculo de Yahvé
  rationale: El texto hebreo usa el Tetragrámaton directamente. Según la política del proyecto, se evita enmascararlo con ‘SEÑOR’ y se conserva el nombre propio ‘Yahvé’ en el cuerpo del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metáfora de ‘sueño eterno’ en contexto de juicio
  english_pob_reading: an everlasting sleep ... not wake up
  chosen_spanish_reading: un sueño eterno ... y no despierten
  alternative_spanish_readings:
  - muerte eterna
  - sueño perpetuo
  - muerte sin despertar
  rationale: Se conserva la metáfora como metáfora, sin reducirla a ‘muerte’. Así se mantiene la imagen profética y la tensión teológica del juicio irreversible sin introducir más doctrina de la que el versículo expresa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que eliminó un ‘then’ añadido en inglés para no introducir una secuencia temporal no explícita. En español se evitó igualmente insertar un ‘entonces’ o ‘luego’ no requerido por el hebreo.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה.
  - Se conserva ‘sueño eterno’ como metáfora sin convertirla en paráfrasis doctrinal.
  - ‘Embriagaré’ mantiene la fuerza verbal del hiphil sin coloquializar el registro.
  - La nota a pie sobre מִשְׁתֵּיהֶם preserva la alternativa banquet/feast documentada en el audit trail.
