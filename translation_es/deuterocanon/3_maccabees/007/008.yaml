translation:
  language: es
  text: Y hemos ordenado que cada uno vuelva a su casa[a], sin que de ningún modo nadie les haga daño, ni los insulte por las cosas que sucedieron contrarias a la razón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a sus propios lugares». El griego εἰς τὰ ἴδια puede designar la casa, la propiedad o el lugar propio de alguien.
    reason: lexical_alternative
  - marker: b
    text: O «por lo que sucedió contra toda razón» / «por las cosas irrazonables que sucedieron». La expresión griega παρὰ λόγον significa literalmente «contrario a la razón».
    reason: lexical_alternative
lexical_decisions:
- source_word: προστετάχαμεν
  english_pob_choice: we have ordered
  chosen_spanish: hemos ordenado
  alternatives_spanish:
  - hemos mandado
  - hemos dado orden
  lexicon: LSJ
  rationale: El perfecto griego comunica una orden ya emitida con vigencia actual. «Hemos ordenado» conserva el tono oficial y la fuerza directiva sin caer en un arcaísmo rígido.
- source_word: ἑκάστῳ πάντας
  english_pob_choice: each and every one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada uno de ellos
  - todos, uno por uno
  lexicon: LSJ
  rationale: La construcción griega reparte la acción sobre cada individuo. «Cada uno» mantiene ese valor distributivo de forma natural en español; el resto de la frase ya expresa el retorno colectivo.
- source_word: εἰς τὰ ἴδια ἐπιστρέφειν
  english_pob_choice: return to his own home
  chosen_spanish: vuelva a lo suyo
  alternatives_spanish:
  - vuelva a su casa
  - regrese a su propio lugar
  - vuelva a sus bienes
  lexicon: LSJ
  rationale: τὰ ἴδια puede significar casa, posesión o lugar propio. Como en el contexto se trata de restitución y salida, «a lo suyo» preserva la amplitud del giro sin decidir en exceso por «casa» o «propiedad».
- source_word: ἐν παντὶ τρόπῳ
  english_pob_choice: in any way
  chosen_spanish: en absoluto
  alternatives_spanish:
  - de ningún modo
  - por ningún medio
  - en toda manera
  lexicon: LSJ
  rationale: La frase intensifica la prohibición total. En español, «sin que en absoluto» transmite bien esa negación enfática y fluida.
- source_word: μηθενὸς αὐτοὺς τὸ σύνολον καταβλάπτοντος
  english_pob_choice: with absolutely no one in any way harming them
  chosen_spanish: nadie les haga daño
  alternatives_spanish:
  - nadie los perjudique en nada
  - ninguna persona los dañe en absoluto
  - nadie los lesione
  lexicon: LSJ
  rationale: El griego prohíbe cualquier daño, con intensificación total mediante τὸ σύνολον. «Nadie les haga daño» es natural y conserva el alcance absoluto; «en absoluto» refuerza la totalidad.
- source_word: μήτε ὀνειδίζοντος
  english_pob_choice: nor insulting them
  chosen_spanish: ni los insulte
  alternatives_spanish:
  - ni los reproche
  - ni los ultraje
  - ni los afrente
  lexicon: LSJ
  rationale: ὀνειδίζω puede ser reprender, reprochar o insultar. Dado el contexto de hostilidad verbal tras los hechos, «insulte» comunica bien el agravio social sin perder la idea de reproche.
- source_word: περὶ τῶν γεγενημένων
  english_pob_choice: over the things that happened
  chosen_spanish: por las cosas que sucedieron
  alternatives_spanish:
  - acerca de lo sucedido
  - por lo que pasó
  - sobre los acontecimientos
  lexicon: LSJ
  rationale: El participio perfecto remite a hechos ya ocurridos. «Las cosas que sucedieron» es fiel y claro; «por» conserva la relación de motivo o referencia del reproche.
- source_word: παρὰ λόγον
  english_pob_choice: contrary to reason
  chosen_spanish: contra razón
  alternatives_spanish:
  - contrario a la razón
  - irracionalmente
  - contra todo razonamiento
  lexicon: LSJ
  rationale: La expresión literalmente significa «contra razón / contra el razonamiento». «Contra razón» es breve, fiel y mantiene la aspereza del original sin suavizarla.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que aclaró ἑκάστῳ πάντας como un mandato distributivo («each and every one») y reforzó el valor de τὰ ἴδια como referencia natural al propio lugar o pertenencia. La redacción española evita una paráfrasis excesiva y conserva la secuencia de prohibiciones del griego.
  spanish_consistency_notes:
  - Se mantiene un registro formal, claro y apto para lectura litúrgica o comunitaria.
  - Se preserva la tensión lexical de τὰ ἴδια con una nota alternativa en vez de fijarlo de modo indebido a «casa».
  - «Contra razón» conserva la dureza idiomática de παρὰ λόγον en vez de explicarla en exceso.
  - «Hemos ordenado» respeta el valor directivo oficial del perfecto griego sin forzar un tiempo futuro o un presente genérico.
