    rationale: 'El inglés POB incluye una nota: ''Literally, whether the truth is with you''. En español debe preservarse, especialmente porque el texto usa una formulación más idiomática (''a ver si'').'
  - severity: low
    issue: '''Y si no'' debilita el matiz adversativo de וְאִם לֹא'
    rationale: El rastro inglés optó por 'But if not'. 'Pero si no' transmite mejor el giro contrastivo en español.
  - severity: low
    issue: Las exclamaciones añaden énfasis retórico no presente en el original
    rationale: '''¡por la vida de Faraón!'' y ''¡Ciertamente ustedes son espías!'' son entendibles, pero el tono puede mantenerse sin signos de exclamación para reflejar mejor la formalidad sobria del original.'
