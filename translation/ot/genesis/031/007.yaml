id: GEN.31.7
reference: Genesis 31:7
source:
  edition: WLC
  text: וַ/אֲבִי/כֶן֙ הֵ֣תֶל בִּ֔/י וְ/הֶחֱלִ֥ף אֶת מַשְׂכֻּרְתִּ֖/י עֲשֶׂ֣רֶת מֹנִ֑ים וְ/לֹֽא נְתָנ֣/וֹ אֱלֹהִ֔ים לְ/הָרַ֖ע עִמָּדִֽ/י־־׃
translation:
  text: Yet your father has deceived me and changed my wages ten times[c][b][a], but God did not allow him to harm me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has deceived me' or 'has tricked me.' The Hebrew verb can denote deceptive or mocking treatment.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'ten times,' an idiom for repeated changes, possibly not meant as an exact count.
    reason: cultural_note
  - marker: c
    text: Literally, 'God did not give him to harm me,' meaning God did not permit him to do me harm.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵתֶל
  chosen: has mocked
  alternatives:
  - has deceived
  - has tricked
  lexicon: HALOT
  rationale: The Hiphil of התל conveys acting deceptively or mockingly toward someone. In this context Jacob is accusing Laban of abusive, dishonest treatment. 'Has mocked' preserves the personal affront and matches common English idiom, while the following clause specifies the concrete deception in changing wages.
- source_word: וְהֶחֱלִף
  chosen: changed
  alternatives:
  - altered
  - exchanged
  lexicon: HALOT
  rationale: The verb חלף in Hiphil here refers to repeatedly altering the agreed compensation. 'Changed' is natural modern English and fits the labor-contract context.
- source_word: מַשְׂכֻּרְתִּי
  chosen: my wages
  alternatives:
  - my pay
  - my compensation
  lexicon: HALOT
  rationale: The noun denotes wages or hire paid for labor. 'My wages' is the clearest idiomatic rendering in English for Jacob's earned compensation.
- source_word: עֲשֶׂרֶת מֹנִים
  chosen: ten times
  alternatives:
  - ten portions
  - ten counts
  lexicon: HALOT
  rationale: This idiom means 'ten times,' a conventional way of expressing repeated action, not necessarily a mathematically exact count. 'Ten times' is the standard and most transparent rendering.
- source_word: וְלֹא נְתָנוֹ אֱלֹהִים
  chosen: but God did not allow him
  alternatives:
  - and God did not give him
  - but God did not permit him
  lexicon: HALOT
  rationale: Literally, 'God did not give him,' with the sense of not granting opportunity or permission. English requires the implied object of permission to be made explicit. 'Did not allow him' communicates the idiom clearly while preserving divine restraint over Laban's intent.
- source_word: לְהָרַע עִמָּדִי
  chosen: to harm me
  alternatives:
  - to do evil with me
  - to do me harm
  lexicon: HALOT
  rationale: The infinitive of רעע with עִם can mean to act badly toward someone or do harm to them. 'To harm me' is concise, idiomatic, and faithful to the sense.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the true God in Jacob's speech, so 'God' is the appropriate English rendering.
