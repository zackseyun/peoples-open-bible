translation:
  language: es
  text: Y vieron la multitud de las fuerzas, que eran muchas, y tuvieron mucho miedo; y muchos huyeron[a] del campamento, y no quedaron de ellos sino ochocientos hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se escabulleron del campamento». El verbo griego puede sugerir tanto salir sigilosamente como huir fuera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ πλῆθος τῶν δυνάμεων
  english_pob_choice: the multitude of the forces
  chosen_spanish: la multitud de las fuerzas
  alternatives_spanish:
  - la masa de las tropas
  - el gran número del ejército
  - la multitud de los ejércitos
  lexicon: LSJ
  rationale: πλῆθος expresa abundancia o multitud, y δυνάμεις en contexto militar se refiere a fuerzas/tropas. «Las fuerzas» preserva el plural militar sin imponer un singular que el griego no usa.
- source_word: πολλοί εἰσιν
  english_pob_choice: they were many
  chosen_spanish: eran muchas
  alternatives_spanish:
  - eran numerosos
  - había muchos
  lexicon: LSJ
  rationale: La cláusula explica la causa del miedo. En español, «eran muchas» mantiene la referencia al sustantivo plural implícito y suena natural sin perder la sencillez del griego.
- source_word: ἐφοβήθησαν σφόδρα
  english_pob_choice: they were greatly afraid
  chosen_spanish: tuvieron mucho miedo
  alternatives_spanish:
  - temieron muchísimo
  - se aterrorizaron
  lexicon: LSJ
  rationale: El aoristo con σφόδρα intensifica el temor. «Tuvieron mucho miedo» es claro, natural y conserva la fuerza del énfasis sin añadir intensidad no atestiguada.
- source_word: ἐξερρύησαν
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - se escaparon
  - se deslizaron fuera
  - se fueron huyendo
  lexicon: LSJ
  rationale: El verbo puede sugerir salir o deslizarse fuera del grupo, pero en este contexto militar la revisión inglesa prefirió «fled». «Huyeron» recoge bien esa lectura formal y directa.
- source_word: παρεμβολῆς
  english_pob_choice: camp
  chosen_spanish: del campamento
  alternatives_spanish:
  - del campamento militar
  - del real
  lexicon: LSJ
  rationale: En contexto militar, παρεμβολή designa el campamento. «Campamento» es la equivalencia moderna más clara y fiel.
- source_word: οὐ κατελείφθησαν ἐξ αὐτῶν ἀλλʼ ἢ ὀκτακόσιοι ἄνδρες
  english_pob_choice: none of them were left except eight hundred men
  chosen_spanish: no quedaron de ellos sino ochocientos hombres
  alternatives_spanish:
  - solo quedaron de ellos ochocientos hombres
  - no les quedaron más que ochocientos hombres
  lexicon: LSJ
  rationale: La construcción griega expresa el remanente tras la huida de muchos. «No quedaron de ellos sino ochocientos hombres» sigue de cerca la estructura y conserva la cuantificación exacta.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «slipped away» por «fled» para hacer ἐξερρύησαν más exacto y formal; la redacción española sigue esa preferencia con «huyeron», manteniendo además la opción alternativa de salida sigilosa en nota.
  spanish_consistency_notes:
  - Se usa «campamento» para παρεμβολή, en línea con el valor militar del contexto.
  - Se conserva el plural «las fuerzas» para δυνάμεις, evitando reducirlo a un singular no presente en el griego.
  - Se mantiene un tono bíblico moderno y publicable, sin recurrir a SEÑOR/Cristo u այլ terminología no pertinente.
