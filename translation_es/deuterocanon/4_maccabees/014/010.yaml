translation:
  language: es
  text: ¿Qué podría ser más doloroso que estas cosas? Porque el poder del fuego, de acción aguda y breve, destruyó[a] rápidamente los cuerpos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «consumió rápidamente los cuerpos». El verbo griego διέλυσε puede significar «destruir», «deshacer» o «disolver»; aquí se traduce «destruyó» para seguir de cerca el griego sin añadir la idea específica de que el fuego los «consumió».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὧν τί γένοιτο ἐπαλγέστερον;
  english_pob_choice: What could be more painful than these things?
  chosen_spanish: ¿Qué podría ser más doloroso que estas cosas?
  alternatives_spanish:
  - ¿Qué podría ser más penoso que estas cosas?
  - ¿Qué podría ser más aflictivo que estas cosas?
  lexicon: LSJ
  rationale: ἐπαλγέστερον expresa una comparación de mayor dolor o sufrimiento. «Doloroso» conserva el sentido directo y natural en español, y mantiene la fuerza retórica de la pregunta.
- source_word: ὀξεῖα
  english_pob_choice: sharp
  chosen_spanish: agudo
  alternatives_spanish:
  - afilado
  - punzante
  lexicon: LSJ
  rationale: ὀξεῖα tiene el valor de «agudo, cortante, penetrante». «Agudo» comunica en español la imagen de una fuerza que hiere o corta sin forzar una paráfrasis.
- source_word: σύντομος
  english_pob_choice: brief
  chosen_spanish: breve
  alternatives_spanish:
  - corto
  - rápido
  lexicon: LSJ
  rationale: Aquí σύντομος modifica la acción eficaz del fuego y, según el rastro inglés, se entendió como «brief»; en español «breve» preserva esa brevedad/rapidez de modo natural.
- source_word: ἡ τοῦ πυρὸς οὖσα δύναμις
  english_pob_choice: the power of fire
  chosen_spanish: el poder del fuego
  alternatives_spanish:
  - la fuerza del fuego
  - la potencia del fuego
  lexicon: LSJ
  rationale: La frase nombra la capacidad activa y destructiva del fuego. «Poder» es fiel al sustantivo δύναμις y funciona bien en registro bíblico sin oscurecer el sentido.
- source_word: ταχέως διέλυσε τὰ σώματα
  english_pob_choice: quickly destroyed the bodies
  chosen_spanish: destruyó rápidamente los cuerpos
  alternatives_spanish:
  - consumió rápidamente los cuerpos
  - deshizo rápidamente los cuerpos
  lexicon: LSJ
  rationale: διέλυσε puede significar «destruir, deshacer, disolver». Dado el contexto del fuego y la revisión inglesa, «destruyó rápidamente» evita expandir el verbo más allá de lo que el griego garantiza.
theological_decisions:
- issue: La imagen del fuego como agente destructor
  english_pob_reading: The power of fire ... quickly destroyed the bodies.
  chosen_spanish_reading: El poder del fuego ... destruyó rápidamente los cuerpos.
  alternative_spanish_readings:
  - El poder del fuego ... consumió rápidamente los cuerpos.
  - La fuerza del fuego ... deshizo rápidamente los cuerpos.
  rationale: No se introduce una lectura doctrinal adicional; se mantiene la imagen literal de la destrucción por fuego, sin suavizarla ni moralizarla.
  doctrine_reference: No aplica; observación literaria y semántica del texto
translation_notes:
  revision_awareness: 'La redacción sigue el último pase de revisión del rastro inglés: se adoptó «breve» para σύντομος y «destruyó» para διέλυσε, evitando la opción previa «consumió» porque la revisión la corrigió a un equivalente más cercano al griego. La comparación inicial se tradujo como pregunta retórica natural en español.'
  spanish_consistency_notes:
  - Se conservó el paralelismo entre la pregunta retórica y la cláusula causal introducida por «Porque».
  - «Poder» se usa consistentemente para δύναμις, en línea con el valor de agencia efectiva del fuego.
  - No se empleó terminología eclesiástica tradicional que altere la imagen del pasaje.
  - El orden y la puntuación buscan sonar naturales en español sin perder la estructura del griego.
