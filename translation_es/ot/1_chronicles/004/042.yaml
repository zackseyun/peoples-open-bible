translation:
  language: es
  text: Y algunos de ellos[a], de entre los hijos de Simeón, fueron al monte Seír —quinientos hombres—, con Pelatías, Nearías, Refaías y Uziel, hijos de Isí, a la cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con Pelatías, Nearías, Refaías y Uziel, hijos de Isí, a la cabeza». La sintaxis hebrea coloca los nombres antes de «hijos de Isí, a la cabeza», lo que indica que esos hombres encabezaban el grupo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵהֶם
  english_pob_choice: And some of them
  chosen_spanish: Y algunos de ellos
  alternatives_spanish:
  - Y de ellos
  - Ahora algunos de ellos
  lexicon: HALOT
  rationale: El hebreo introduce un subconjunto del grupo ya mencionado. «Algunos de ellos» conserva el sentido partitivo de manera natural en español y evita una traducción demasiado literal como «de ellos».
- source_word: מִן בְּנֵי שִׁמְעוֹן
  english_pob_choice: from the sons of Simeon
  chosen_spanish: de entre los hijos de Simeón
  alternatives_spanish:
  - de los hijos de Simeón
  - de entre los simeonitas
  lexicon: HALOT
  rationale: Mantiene el tono genealógico del cronista. «De entre» expresa bien el matiz partitivo de מִן y su relación con el grupo de Simeón.
- source_word: הָלְכוּ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - fueron de viaje
  - marcharon
  lexicon: HALOT
  rationale: En español, «fueron» comunica el movimiento narrativo sin añadir una idea militar que no está explícita en el verbo.
- source_word: לְהַר שֵׂעִיר
  english_pob_choice: to Mount Seir
  chosen_spanish: al monte Seír
  alternatives_spanish:
  - al monte Seir
  - a la región montañosa de Seír
  lexicon: HALOT
  rationale: «Monte Seír» es el topónimo usual y claro en español bíblico. Se conserva el nombre propio del lugar sin ampliar el sentido geográfico más allá de lo que exige el texto.
- source_word: אֲנָשִׁים חֲמֵשׁ מֵאוֹת
  english_pob_choice: five hundred men
  chosen_spanish: quinientos hombres
  alternatives_spanish:
  - quinientos varones
  - un grupo de quinientos hombres
  lexicon: HALOT
  rationale: Es una apposición numérica directa. «Quinientos hombres» reproduce con claridad la cantidad sin introducir una carga militar ajena al hebreo.
- source_word: וּפְלַטְיָה וּנְעַרְיָה וּרְפָיָה וְעֻזִּיאֵל
  english_pob_choice: with Pelatiah, Neariah, Rephaiah, and Uzziel
  chosen_spanish: con Pelatías, Nearías, Refaías y Uziel
  alternatives_spanish:
  - y Pelatías, Nearías, Refaías y Uziel
  - junto con Pelatías, Nearías, Refaías y Uziel
  lexicon: HALOT
  rationale: El hebreo enumera nombres propios ligados al grupo y al cargo de liderazgo. «Con» mantiene la asociación natural en español, mientras la nota de pie explica la posible lectura alternativa de liderazgo implícito.
- source_word: בְּנֵי יִשְׁעִי
  english_pob_choice: sons of Ishi
  chosen_spanish: hijos de Isí
  alternatives_spanish:
  - hijos de Ishi
  - los hijos de Isí
  lexicon: HALOT
  rationale: Se conserva la relación genealógica. Se usa «Isí» como forma hispanizada del nombre propio para lectura fluida y consistente.
- source_word: בְּרֹאשָׁם
  english_pob_choice: at their head
  chosen_spanish: a la cabeza
  alternatives_spanish:
  - como sus líderes
  - encabezándolos
  lexicon: HALOT
  rationale: «A la cabeza» reproduce bien el idiomatismo hebreo y permite, en español, una referencia natural al liderazgo del grupo sin sobreexplicar.
theological_decisions:
- issue: Relación entre los nombres enumerados y su función de liderazgo
  english_pob_reading: The Hebrew syntax places the names before 'sons of Ishi, at their head,' indicating these men led the group.
  chosen_spanish_reading: Los nombres se entienden como los que iban a la cabeza del grupo, sin convertir la frase en una paráfrasis explícita de liderazgo en el texto principal.
  alternative_spanish_readings:
  - con Pelatías, Nearías, Refaías y Uziel, hijos de Isí, que iban a la cabeza
  - Pelatías, Nearías, Refaías y Uziel, hijos de Isí, a la cabeza del grupo
  rationale: El hebreo permite ver que los nombres están vinculados a la frase final sobre ir a la cabeza. En el cuerpo del texto se conserva la estructura sobria; la posible lectura de liderazgo se deja implícita en «a la cabeza» para no exceder el alcance del original.
  doctrine_reference: No aplica; decisión sintáctico-semántica sobre liderazgo implícito.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para estandarizar los nombres propios a Pelatiah y Rephaiah. La presente versión española sigue esa normalización con Pelatías y Refaías, manteniendo además la lectura sintáctica que permite entender a los nombrados como los que iban a la cabeza del grupo.
  spanish_consistency_notes:
  - Se mantiene «hijos de Simeón» y no un etnónimo más libre para conservar el estilo genealógico del cronista.
  - Se usa «a la cabeza» como equivalente idiomático de בְּרֹאשָׁם, sin imponer «líderes» en el texto principal.
  - 'Los nombres propios se hispanizan de manera consistente: Pelatías, Nearías, Refaías, Uziel e Isí.'
  - «Monte Seír» se conserva como topónimo, sin expandirlo a «región montañosa» en el texto principal.
