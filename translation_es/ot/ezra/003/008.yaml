    text: O «del exilio».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota al pie para que corresponda a מֵהַשְּׁבִי ('del cautiverio'), y se mejora la precisión léxica de וַיַּעֲמִידוּ con 'designaron'. También se aligera la puntuación para una lectura más natural en español, sin apartarse del orden y sentido del hebreo ni de la auditoría inglesa.
