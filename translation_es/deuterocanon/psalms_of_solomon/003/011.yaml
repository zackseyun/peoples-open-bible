translation:
  language: es
  text: Un pecador tropezó[a], y maldice su vida, el día de su nacimiento y los dolores de parto de su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vino a ruina» para «tropezó». El verbo griego puede sugerir tanto un tropiezo literal como una caída figurada en desastre.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέκοψεν
  english_pob_choice: stumbled
  chosen_spanish: tropezó
  alternatives_spanish:
  - cayó
  - se precipitó
  - vino a ruina
  lexicon: BDAG
  rationale: προσκόπτω puede expresar el acto literal de tropezar o chocar, y también un tropiezo figurado en la desgracia. «Tropezó» conserva la imagen concreta sin convertirla en una interpretación más fuerte como «vino a ruina».
- source_word: ἁμαρτωλός
  english_pob_choice: sinner
  chosen_spanish: pecador
  alternatives_spanish:
  - hombre pecador
  - malhechor
  - impío
  lexicon: BDAG
  rationale: El sustantivo denota de manera directa a una persona marcada por el pecado. «Pecador» es el equivalente español más natural y directo.
- source_word: καταρᾶται
  english_pob_choice: curses
  chosen_spanish: maldice
  alternatives_spanish:
  - lanza una maldición sobre
  - invoca maldición contra
  - pronuncia maldición sobre
  lexicon: BDAG
  rationale: El verbo significa maldecir. «Maldice» mantiene la fuerza verbal breve y directa del griego sin expandir innecesariamente la frase.
- source_word: ζωὴν αὐτοῦ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su propia vida
  - su existir
  lexicon: BDAG
  rationale: La vida misma es el objeto de la maldición. «Su vida» reproduce con claridad la referencia directa del griego.
- source_word: τὴν ἡμέραν γενέσεως αὐτοῦ
  english_pob_choice: the day of his birth
  chosen_spanish: el día de su nacimiento
  alternatives_spanish:
  - el día en que nació
  - su cumpleaños
  lexicon: BDAG
  rationale: La frase alude al día en que nació. «El día de su nacimiento» conserva el tono solemne y permanece cerca del griego.
- source_word: ὠδῖνας μητρός
  english_pob_choice: his mother’s labor pains
  chosen_spanish: los dolores de parto de su madre
  alternatives_spanish:
  - los dolores de alumbramiento de su madre
  - el trabajo de parto de su madre
  lexicon: BDAG
  rationale: ὠδῖνες son dolores de parto o contracciones de alumbramiento. «Dolores de parto» es claro en español y preserva la imaginería del nacimiento.
theological_decisions:
- issue: 'Alcance de προσέκοψεν: tropiezo literal o caída en desgracia'
  english_pob_reading: The Greek verb can suggest either literal stumbling or a figurative fall into disaster.
  chosen_spanish_reading: El verbo se deja como «tropezó», manteniendo abierta la posibilidad de un tropiezo físico o figurado.
  alternative_spanish_readings:
  - vino a ruina
  - cayó en desgracia
  rationale: La evidencia griega permite ambas lecturas; la traducción principal no debe resolver la tensión a favor de una sola interpretación. Por eso se conserva la imagen de tropiezo y se explicita la alternativa en nota.
  doctrine_reference: Principio de sobriedad semántica; mantener la ambigüedad léxica donde el texto la permite.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete 1909 y el auditor inglés POB con acuerdo alto. Se mantuvo la estructura simple del original y la nota léxica sobre προσέκοψεν, siguiendo la decisión inglesa de conservar la ambigüedad entre tropiezo literal y ruina figurada.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiere; aquí no aparece.
  - Se prefirió «pecador» por fidelidad directa a ἁμαρτωλός.
  - Se mantuvo un registro sobrio y bíblico, evitando arcaísmos innecesarios.
  - La puntuación sigue el orden del griego y del inglés auditado, con enumeración directa de los elementos maldecidos.
