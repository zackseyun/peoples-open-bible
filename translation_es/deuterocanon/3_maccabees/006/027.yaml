revisions:
- from: ¡Soltad, soltad las injustas cadenas[a]; enviadlos a sus propios hogares en paz[b], dejando a un lado lo que había sido ordenado.
  to: Liberen, liberen las injustas ataduras; envíenlos a sus propios hogares[a] en paz, dejando sin efecto lo que había sido ordenado.[b]
  rationale: Se corrigieron los anclajes de las notas para que correspondan a las expresiones pertinentes, se ajustó el registro a un español más neutro latinoamericano, se reemplazó «cadenas» por «ataduras» para preservar mejor el alcance de δεσμά, y se refinó la clausula final a «dejando sin efecto» para reflejar con mayor precisión el abandono formal de la orden previa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:53:42Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente el sentido básico del griego: doble imperativo de liberación, envío de los detenidos a lo suyo/en sus hogares, y abandono de la orden previa. Sin embargo, el anclaje de las notas está invertido respecto de las alternativas reales conservadas por la auditoría inglesa, y «cadenas» estrecha un poco el valor más amplio de δεσμά.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta un problema formal: falta el signo de cierre de exclamación y el registro peninsular de «soltad/enviad» no encaja del todo con el objetivo de español neutro latinoamericano. «Dejando a un lado» es natural, pero puede mejorarse con «dejando sin efecto» para reflejar mejor el abandono formal de una orden.'
  glossary_alignment: 'No hay términos teológicos sensibles aquí. Sí conviene alinear mejor las decisiones léxicas con la evidencia: δεσμά se expresa mejor como «ataduras» o «ligaduras» que como «cadenas» si se quiere preservar el rango de «bonds»; la nota sobre εἰς τὰ ἴδια debe ir anclada en «sus hogares», y la observación sobre la intensificación del doble imperativo no corresponde a una nota de alternativa textual en ese lugar.'
  issues:
  - severity: high
    issue: Las notas al pie están mal ancladas e intercambiadas respecto del contenido.
    rationale: La nota [a] habla de una alternativa para el doble imperativo, pero está puesta sobre «cadenas»; la nota [b] explica εἰς τὰ ἴδια, pero está anclada a «en paz». Esto incumple la disciplina requerida de marcadores exactos en la frase correspondiente.
  - severity: medium
    issue: «Cadenas» sobreespecifica δεσμά.
    rationale: El griego puede abarcar ataduras/restricciones en sentido más amplio. «Ataduras» preserva mejor el rango semántico y sigue de cerca la decisión inglesa «bonds».
  - severity: medium
    issue: Registro verbal no ideal para español neutro latinoamericano.
    rationale: «Soltad/enviad» es comprensible, pero suena marcadamente peninsular. «Suelten/envíen» o «Liberen/envíen» se ajusta mejor al estilo meta solicitado.
  - severity: low
    issue: Puntuación incompleta al inicio.
    rationale: Se abre exclamación con «¡» pero no se cierra con «!».
  - severity: low
    issue: «Dejando a un lado» puede sonar algo coloquial para una orden oficial previa.
    rationale: «Dejando sin efecto» representa mejor el matiz administrativo/jurídico de παραιτησάμενοι + τὰ προστεταγμένα en este contexto.
  revised_spanish_text: Liberen, liberen las injustas ataduras; envíenlos a sus propios hogares[a] en paz, dejando sin efecto lo que había sido ordenado.[b]
  revised_footnotes:
