theological_decisions:
- issue: Meaning of וַעֲנֹתְךָ in reference to God
  chosen_reading: your humility
  alternative_readings:
  - your gentleness
  - your condescension
  - your help
  rationale: The Hebrew permits more than one nuance, and the idea of God stooping low to raise the psalmist is the most contextually coherent reading. Rendering it 'humility' preserves the theological tension rather than smoothing it away; it does not imply creaturely deficiency in God, but his gracious lowliness toward the servant. Because this is a sensitive and debated expression, alternatives are preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
