id: MAT.6.2
reference: Matthew 6:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὅταν οὖν ποιῇς ἐλεημοσύνην, μὴ σαλπίσῃς ἔμπροσθέν σου, ὥσπερ οἱ ὑποκριταὶ ποιοῦσιν ἐν ταῖς συναγωγαῖς καὶ ἐν ταῖς ῥύμαις, ὅπως δοξασθῶσιν ὑπὸ τῶν ἀνθρώπων· ἀμὴν λέγω ὑμῖν, ἀπέχουσιν τὸν μισθὸν αὐτῶν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/006/002.yaml
  text: Therefore[a], whenever you give alms, do not sound a trumpet before you, as the hypocrites do in the synagogues and in the streets, so that they may be glorified by people. Truly I say to you[e][d][c][b], they have received their reward in full.
  footnotes:
  - marker: a
    text: Or 'when you give to the needy' or 'when you do acts of mercy.' The Greek expression ποιεῖν ἐλεημοσύνην refers to charitable giving.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not announce it with a trumpet.' The wording may be hyperbolic or metaphorical, but the Greek literally says 'do not sound a trumpet.'
    reason: lexical_alternative
  - marker: c
    text: Or 'so that they may be praised' or 'honored' by people. The Greek verb is literally 'be glorified.'
    reason: lexical_alternative
  - marker: d
    text: 'The expression ''they have received their reward in full'' reflects a commercial idiom: they already have all the reward they are going to get.'
    reason: cultural_note
  - marker: e
    text: Or 'before yourself'.
    reason: previous_rendering
translation:
  language: ko
  text: 그러므로 여러분이 구제할 때에, 위선자들이 사람들에게 영광을 받으려고 회당과 거리에서 하듯이 여러분 앞에 나팔을 불지 마십시오. 진실로 내가 여러분에게 말합니다. 그들은 이미 자기들의 상을 다 받았습니다.
  philosophy: optimal-equivalence
