base_translation:
  language: en
  yaml_path: translation/ot/numbers/007/089.yaml
  text: When Moses went into the tent of meeting to speak with him[a], he heard the voice speaking to him from above the mercy seat that was on the ark of the testimony, from between the two cherubim[c][b]; and he spoke to him.
  footnotes:
  - marker: a
    text: Or 'the voice being spoken to him'; the Hebrew participle may be understood in a slightly different nuance, though 'the voice speaking to him' is the most straightforward reading.
    reason: lexical_alternative
  - marker: b
    text: '''Mercy seat'' refers to the cover of the ark, the place from which the LORD spoke between the cherubim.'
    reason: cultural_note
  - marker: c
    text: The final clause could also be rendered more explicitly, 'and the LORD spoke to him,' or more formally, 'and it spoke to him,' with 'the voice' as the subject.
    reason: alternative_reading
