translation:
  language: es
  text: 'Abrí mi boca y hablé de ella: adquieran sabiduría para sí sin plata[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo y el griego usan aquí un pronombre femenino, probablemente referido a la sabiduría personificada; alternativamente, puede entenderse de manera más abstracta como ‘y hablé de eso’ o ‘de ello’.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּי פָתַחְתִּי / ἤνοιξα τὸ στόμα μου
  english_pob_choice: I opened my mouth
  chosen_spanish: Abrí mi boca
  alternatives_spanish:
  - Abrí mis labios
  - Hablé
  lexicon: HALOT; LXX Swete
  rationale: Es un modismo hebreo paralelo al griego que introduce el acto de hablar. ‘Abrí mi boca’ conserva la imagen concreta y la fuerza retórica mejor que una paráfrasis más abstracta.
- source_word: וְדִבַּרְתִּי בָהּ
  english_pob_choice: and spoke of her
  chosen_spanish: y hablé de ella
  alternatives_spanish:
  - y hablé acerca de ella
  - y hablé de eso
  lexicon: HALOT
  rationale: El sufijo femenino singular se entiende mejor como referencia a la sabiduría personificada. ‘De ella’ mantiene esa referencia femenina sin perder naturalidad en español.
- source_word: קְנוּ לָכֶם / Κτήσασθε
  english_pob_choice: acquire for yourselves
  chosen_spanish: adquieran para ustedes
  alternatives_spanish:
  - cómprenla para ustedes
  - obtengan para ustedes
  - consíganla para ustedes
  lexicon: HALOT; LSJ
  rationale: El verbo puede significar comprar o adquirir. ‘Adquieran’ conserva el sentido amplio y, en contexto, permite que el matiz comercial siga presente sin forzar ‘comprar’ como única opción.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría práctica
  lexicon: HALOT
  rationale: Es el sentido directo del sustantivo y corresponde al tema del libro y del verso.
- source_word: בְּלֹא כָסֶף / ἄνευ ἀργυρίου
  english_pob_choice: without silver
  chosen_spanish: sin plata
  alternatives_spanish:
  - sin dinero
  - sin pago
  lexicon: HALOT; LSJ
  rationale: Tanto el hebreo como el griego dicen literalmente ‘plata’. ‘Sin plata’ preserva la imagen económica concreta y evita aplanar el texto a un genérico.
theological_decisions:
- issue: Referente del femenino singular en ‘ella’
  english_pob_reading: The suffix refers to wisdom, personified as feminine.
  chosen_spanish_reading: El pronombre femenino se refiere a la sabiduría personificada.
  alternative_spanish_readings:
  - Puede entenderse de modo más abstracto como ‘de ello’, refiriéndose al tema de la instrucción.
  - Puede suavizarse como ‘hablé de eso’, perdiendo la personificación.
  rationale: El hebreo y el paralelo griego favorecen mantener el femenino. En español, ‘ella’ conserva la personificación de la sabiduría y respeta la tensión literaria sin neutralizarla.
  doctrine_reference: Preservar la personificación y la precisión gramatical; no resolver la tensión con lenguaje neutro cuando la fuente es femenina.
translation_notes:
  revision_awareness: La presente redacción sigue de cerca el texto hebreo de Kahana y confirma el paralelo griego de Swete. Se mantiene la personificación femenina de la sabiduría y la imagen concreta de ‘plata’, sin suavizarla a ‘dinero’.
  spanish_consistency_notes:
  - Se usa ‘sabiduría’ como traducción regular de חָכְמָה.
  - Se mantiene ‘plata’ para reflejar el valor concreto del hebreo y el griego.
  - Se evita ‘SEÑOR’ u otra sustitución porque no aparece el nombre divino en este verso.
  - El tono es sobrio y publicable en español latinoamericano, sin arcaísmos innecesarios.
