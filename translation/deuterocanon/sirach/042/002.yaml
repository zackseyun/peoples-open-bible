theological_decisions:
- issue: Forensic verb choice for צדק/δικαιόω language
  chosen_reading: vindicates
  alternative_readings:
  - justifies
  - declares righteous
  rationale: Although 'justify' is a valid formal equivalent, this wisdom-context line concerns legal judgment rather than developed Pauline theology. 'Vindicates' preserves the courtroom sense while avoiding importing later doctrinal freight. The alternative is preserved in a footnote for auditability.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern English, not archaic or academic.'
