    text: Or 'his great ones' or 'his chiefs.' The Hebrew form is difficult; 'his archers' fits the attack imagery of the verse and the wider context.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'my kidneys,' a literal expression for a person's inner organs and, by extension in Hebrew idiom, the innermost self.
    reason: cultural_note
  - marker: c
    text: Or 'my bile'; some take the term figuratively as 'my bitterness,' but the bodily sense suits the verse's violent imagery.
    reason: lexical_alternative
