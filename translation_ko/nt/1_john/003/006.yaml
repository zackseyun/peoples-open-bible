  lexicon: BDAG
  rationale: 현재 시제는 지속·습관적 행위를 함의 — 「계속 죄를 짓지 않는다」의 측면. 한국어 「죄를 짓지 않습니다」는 그 습관적 부정을 자연스럽게 담는다(3:9 신학적 결정 참조).
