translation:
  language: es
  text: La tierra es entregada en manos del inicuo[a]; cubre los rostros de sus jueces. Si no[b], ¿entonces quién es?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el país'. אֶרֶץ puede significar 'tierra' o 'país'. רָשָׁע puede leerse como 'un hombre inicuo' o más generalmente como 'el inicuo'.
    reason: lexical_alternative
  - marker: b
    text: El sujeto de 'cubre' queda implícito en hebreo. Puede referirse a Dios, al inicuo, o funcionar como un sujeto no especificado.
    reason: alternative_reading
lexical_decisions:
- source_word: אֶרֶץ
  english_pob_choice: The earth
  chosen_spanish: La tierra
  alternatives_spanish:
  - La tierra
  - El país
  lexicon: HALOT
  rationale: אֶרֶץ puede significar 'tierra' o 'país'. En este contexto poético, 'la tierra' mantiene el alcance amplio del mundo ordenado, como en la opción inglesa 'the earth'. 'El país' sería posible, pero restringe más el sentido.
- source_word: נִתְּנָה
  english_pob_choice: is given
  chosen_spanish: es entregada
  alternatives_spanish:
  - ha sido entregada
  - fue entregada
  lexicon: HALOT
  rationale: El nifal perfecto de נתן expresa una pasiva natural. 'Es entregada' comunica en español el estado resultante con tono sobrio y poético, cercano al inglés 'is given'.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - en poder de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para dominio o poder. 'En manos de' conserva la imagen concreta de 'mano' y su fuerza idiomática, sin sonar forzada en español.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el inicuo
  alternatives_spanish:
  - el malvado
  - el impío
  - un hombre inicuo
  lexicon: HALOT
  rationale: El adjetivo hebreo singular puede leerse colectivamente o como referencia representativa. 'El inicuo' preserva la concisión y la tensión del original sin decidir entre un individuo o el conjunto de los impíos.
- source_word: פְּנֵי שֹׁפְטֶיהָ
  english_pob_choice: the faces of its judges
  chosen_spanish: el rostro de sus jueces
  alternatives_spanish:
  - los rostros de sus jueces
  - la cara de sus jueces
  - el semblante de sus jueces
  lexicon: HALOT
  rationale: פָּנִים es literalmente 'rostro/rostros'. En español, 'el rostro de sus jueces' mantiene la imagen concreta y resulta más natural que una traducción demasiado literal con plural forzado. El posesivo 'sus' refleja el sufijo de tercera femenina singular.
- source_word: יְכַסֶּה
  english_pob_choice: he covers
  chosen_spanish: cubre
  alternatives_spanish:
  - lo cubre
  - cubrirá
  lexicon: HALOT
  rationale: El pi'el imperfecto 3ms se traduce con un verbo activo simple. Omitir el sujeto explícito en español ayuda a preservar la ambigüedad del hebreo, tal como hace el texto inglés.
- source_word: אִם לֹא אֵפוֹא מִי הוּא
  english_pob_choice: If not, then who is it?
  chosen_spanish: Si no, ¿entonces quién es?
  alternatives_spanish:
  - Si no, ¿quién es entonces?
  - Si no, ¿quién es él?
  - Si no, ¿entonces quién es él?
  lexicon: HALOT
  rationale: La cláusula es una pregunta retórica. 'Entonces' refleja el matiz de אֵפוֹא. Se evita añadir un antecedente explícito ('él') que el hebreo no expresa, preservando la indeterminación del sujeto.
theological_decisions:
- issue: Sujeto implícito de 'cubre' y del reto retórico final
  english_pob_reading: The translation preserves the Hebrew ambiguity rather than identifying the subject explicitly as God, the wicked ruler, or an impersonal force.
  chosen_spanish_reading: La traducción conserva la ambigüedad hebrea y no identifica explícitamente al sujeto de 'cubre' ni del reto final.
  alternative_spanish_readings:
  - Dios cubre el rostro de sus jueces
  - el inicuo cubre el rostro de sus jueces
  - el rostro de sus jueces es cubierto
  rationale: En el contexto del discurso de Job, la frase puede sugerir que Dios está detrás del desorden del mundo, pero el hebreo no lo dice de manera explícita. Para no resolver interpretativamente una tensión que el texto deja abierta, la versión española mantiene el sujeto implícito.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide con el paquete fuente y con la revisión más reciente: no se requieren cambios adicionales; se conserva la ambigüedad sintáctica y teológica documentada en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero aquí no aparece el tetragrámaton en el versículo.
  - '''Inicuo'' preserva la carga moral del hebreo רָשָׁע sin convertirla en una lectura más explícita de ''malvado'' o ''impío''.'
  - Se usa 'rostro' en singular para reflejar con naturalidad el hebreo פְּנֵי, sin perder la imagen corporal concreta.
  - La puntuación reproduce el carácter retórico del cierre y conserva el matiz de desafío del hebreo.
