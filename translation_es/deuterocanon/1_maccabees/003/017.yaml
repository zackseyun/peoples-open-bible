base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/003/017.yaml
  text: But when they saw the camp coming to meet him[a], they said to Judas, “How can we, being so few, fight against so great a multitude? And we are exhausted[c][b], having gone without food today.”
  footnotes:
  - marker: a
    text: Or “coming against him.” The Greek phrase can be rendered more neutrally as “coming to meet him,” but in this military context it implies hostile encounter.
    reason: lexical_alternative
  - marker: b
    text: Or “we are faint.” The Greek can denote a weakened or dispirited condition; here it is linked to having gone without food.
    reason: lexical_alternative
  - marker: c
    text: “Having gone without food” could also be rendered “fasting,” but the wording does not by itself require a formal religious fast.
    reason: lexical_alternative
