revisions:
- from: 'Por tanto[a], he aquí, vienen días, declara Yahvé, en que ya no dirán más: “¡Vive Yahvé, que hizo subir a los hijos de Israel[b] de la tierra de Egipto!”'
  to: 'Por tanto, he aquí, vienen días, declara Yahvé, en que ya no dirán: «Vive Yahvé, que hizo subir a los hijos de Israel[a] de la tierra de Egipto»'
  rationale: Se elimina la nota [a] defectuosa porque no corresponde al segmento marcado ni al precedente auditado; se conserva únicamente la nota válida sobre «los hijos de Israel». También se ajusta la fórmula de juramento a «Vive Yahvé» sin exclamación y se simplifica «ya no dirán más» a «ya no dirán» para mayor naturalidad sin alterar el sentido.
