translation:
  language: es
  text: 'Y ahora sépalo mi señor el rey: los judeanos que subieron de parte de ustedes a nosotros han llegado a Jerusalén y habitan en esa ciudad rebelde y perversa[a]; están restaurando sus calles y sus muros[c][b], y están poniendo los cimientos del templo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judíos». El griego Ἰουδαῖοι puede designar a los judeanos en sentido etnogeográfico o a los judíos en sentido más amplio.
    reason: lexical_alternative
  - marker: b
    text: O «mercados» o «plazas públicas». El griego ἀγοραί suele referirse a mercados o plazas públicas; algunas tradiciones paralelas de Esdras enfatizan más ampliamente la reconstrucción de la ciudad.
    reason: alternative_reading
  - marker: c
    text: O «están emprendiendo» o «reconstruyendo el templo». La frase griega es comprimida y puede aludir al inicio de la construcción del templo, especialmente a poner su subestructura.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνωστὸν ἔστω
  english_pob_choice: let it be known
  chosen_spanish: sea sabido
  alternatives_spanish:
  - hágase saber
  - sea conocido
  lexicon: LSJ
  rationale: La fórmula administrativa griega pide un giro impersonal y formal. 'Sea sabido' conserva el tono epistolar sin sonar forzado en español.
- source_word: τῷ κυρίῳ βασιλεῖ
  english_pob_choice: to my lord the king
  chosen_spanish: al señor el rey
  alternatives_spanish:
  - a mi señor el rey
  - al rey mi señor
  lexicon: LSJ
  rationale: Aquí κύριος funciona como título cortesano humano, no como título divino. En español, 'señor el rey' reproduce la deferencia oficial sin introducir una lectura teológica indebida.
- source_word: Ἰουδαῖοι
  english_pob_choice: the Judeans
  chosen_spanish: los judeanos
  alternatives_spanish:
  - los judíos
  lexicon: LSJ
  rationale: En este contexto persa/pos-exílico, el término es etnopolítico y geográfico. 'Judeanos' preserva mejor esa referencia histórica que 'judíos', que en español puede sonar más religioso o general.
- source_word: ἀναβάντες παρ' ὑμῶν πρὸς ἡμᾶς
  english_pob_choice: who came up from you to us
  chosen_spanish: que subieron de ustedes a nosotros
  alternatives_spanish:
  - que vinieron de ustedes a nosotros
  - que subieron de parte de ustedes hacia nosotros
  lexicon: LSJ
  rationale: '''Subieron'' conserva la dirección ascendente de ἀναβαίνω, y ''de ustedes a nosotros'' sigue de cerca la relación diplomática de la acusación.'
- source_word: τὴν πόλιν τὴν ἀποστάτιν καὶ πονηρὰν
  english_pob_choice: that rebellious and wicked city
  chosen_spanish: esa ciudad rebelde y perversa
  alternatives_spanish:
  - esa ciudad apóstata y mala
  - esa ciudad rebelde y mala
  lexicon: LSJ
  rationale: ἀποστάτις en este contexto es una acusación política de rebeldía, no necesariamente un tecnicismo doctrinal; 'rebelde' lo expresa bien. πονηρά tiene una carga moral fuerte, por eso 'perversa' conserva el tono hostil.
- source_word: οἰκοῦσιν
  english_pob_choice: are living
  chosen_spanish: habitan
  alternatives_spanish:
  - viven
  - residen
  lexicon: LSJ
  rationale: El verbo indica residencia estable. 'Habitan' suena natural y mantiene la idea de asentamiento permanente.
- source_word: τάς τε ἀγορὰς αὐτῆς
  english_pob_choice: are restoring its streets
  chosen_spanish: sus calles
  alternatives_spanish:
  - sus mercados
  - sus plazas
  lexicon: LSJ
  rationale: Aunque ἀγορά puede ser 'mercado' o 'plaza pública', la revisión inglesa favorece 'streets' por el contexto de reconstrucción urbana. 'Calles' sigue esa lectura contextual en español.
- source_word: θεραπεύουσιν
  english_pob_choice: are restoring
  chosen_spanish: están restaurando
  alternatives_spanish:
  - están reparando
  - están atendiendo a
  lexicon: LSJ
  rationale: El verbo puede abarcar atender, reparar o restaurar. En paralelo con muros y calles, 'restaurando' expresa adecuadamente la obra de rehabilitación urbana sin restringir indebidamente el alcance.
- source_word: τὰ τείχη
  english_pob_choice: walls
  chosen_spanish: sus muros
  alternatives_spanish:
  - sus murallas
  - las murallas
  lexicon: LSJ
  rationale: '''Muros'' es fiel y natural en español. ''Murallas'' sería posible, pero ''muros'' evita imponer un matiz más monumental que el griego no exige.'
- source_word: ναὸν ὑποβάλλονται
  english_pob_choice: are laying the foundation of the temple
  chosen_spanish: están poniendo los cimientos del templo
  alternatives_spanish:
  - están fundamentando el templo
  - están iniciando la construcción del templo
  lexicon: LSJ
  rationale: La frase comprimida apunta al arranque de la obra del templo, probablemente su cimentación/subestructura. 'Poniendo los cimientos' hace explícito ese sentido constructivo en español.
theological_decisions:
- issue: κύριος como título para un rey humano
  english_pob_reading: my lord the king
  chosen_spanish_reading: al señor el rey
  alternative_spanish_readings:
  - a mi señor el rey
  - al rey mi señor
  rationale: No se debe trasladar automáticamente el valor devocional de 'Señor' a este uso cortesano. El español debe reflejar que se trata de una fórmula de respeto ante un monarca humano.
  doctrine_reference: 'DOCTRINE.md: los títulos se traducen según el contexto; no se fuerza la lectura divina de κύριος.'
- issue: Ἰουδαῖοι en sentido etnogeográfico
  english_pob_reading: the Judeans
  chosen_spanish_reading: los judeanos
  alternative_spanish_readings:
  - los judíos
  rationale: La tensión entre 'judíos' y 'judeanos' se resuelve aquí a favor del valor histórico-administrativo del texto. Así se evita desplazar la escena hacia una categoría religiosa más amplia de la necesaria.
  doctrine_reference: 'DOCTRINE.md: conservar el sentido histórico del pueblo en su contexto cuando el pasaje lo exige.'
- issue: ἀποστάτιν como rebeldía política
  english_pob_reading: rebellious
  chosen_spanish_reading: rebelde
  alternative_spanish_readings:
  - apóstata
  - insurgente
  rationale: El pasaje es una denuncia imperial. 'Rebelde' mantiene la acusación política primaria sin convertir el término en un juicio doctrinal sobre apostasía religiosa.
  doctrine_reference: 'DOCTRINE.md: mantener la fuerza contextual y no sobre-teologizar vocablos políticos.'
translation_notes:
  revision_awareness: El texto español sigue la decisión revisada del audit trail inglés de leer ἀγοράς en clave urbana como 'calles' y ναόν como 'el templo' en contexto, en lugar de 'mercados' o 'un templo'. También conserva la tensión lexical de Ἰουδαῖοι con una nota alternativa y mantiene la acusación política de ἀποστάτιν sin suavizarla en exceso.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general cuando aparezca el nombre divino; aquí no aparece.
  - Se evita 'Señor' con mayúscula para κύριος porque el referente es el rey humano.
  - Se mantiene 'judeanos' para el etnónimo histórico, coherente con el estilo POB.
  - '''Restaurando'' y ''poniendo los cimientos'' preservan la naturaleza constructiva del pasaje sin exagerar la reconstrucción.'
  - Las notas a pie usan marcadores únicos y aparecen exactamente en el texto donde corresponde.
