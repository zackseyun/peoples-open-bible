review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia hebrea: mandato de llamar, ejecución del mandato, y la mujer tomando posición en el פתח. Sin embargo, «se quedó de pie» introduce ligeramente una idea resultativa/durativa no necesaria; el hebreo פשוטo עמד se refleja mejor con «se paró» o «estuvo de pie». Además, la nota al pie amplía más de lo que preserva el rastro inglés: el alternativo documentado es específicamente «entrada/área de entrada», no «puerta» como objeto físico.'
  spanish_quality_summary: El español es claro y natural, pero puede sonar más directo y digno con menos sujetos explícitos («él», «ella») y con una formulación verbal más sencilla. «En el umbral» es aceptable, aunque «en la entrada» debe mantenerse como alternativa documentada en nota.
  glossary_alignment: 'No hay términos del glosario mayor en juego. Las decisiones léxicas principales son adecuadas: קרא -> «llamar», פתח -> «umbral/entrada». Conviene ajustar עמד para evitar un matiz no expresado.'
  issues:
  - severity: medium
    issue: «se quedó de pie» añade un matiz aspectual no explícito
    rationale: וַתַּעֲמֹד significa sencillamente «se paró/estuvo de pie». «Se quedó de pie» puede sugerir permanencia o estado resultante más marcado de lo que dice el hebreo y de lo que el POB inglés quiso preservar al evitar añadir «vino».
  - severity: low
    issue: La nota al pie menciona «la puerta»
    rationale: El rastro inglés documenta «doorway» o «entrance/entrance area». «Puerta» puede desplazar el sentido hacia el objeto físico, no solo la abertura o acceso.
  - severity: low
    issue: Sujetos explícitos repetidos hacen el español un poco más pesado
    rationale: En narrativa española, «Entonces dijo… Así que la llamó… y ella se paró…» suena más natural sin pérdida de claridad.
  revised_spanish_text: 'Entonces dijo[a]: «Llámala». Así que la llamó, y ella se paró en el umbral.'
  revised_footnotes:
  - marker: a
    text: O «en la entrada». El término hebreo puede referirse al umbral o al área de entrada.
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo de עמד para reflejar con más precisión el hebreo sin añadir matiz aspectual; se aligera la sintaxis española eliminando sujetos redundantes; y se afina la nota para ceñirse mejor a la alternativa léxica documentada en el rastro inglés.
