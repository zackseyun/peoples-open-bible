translation:
  language: es
  text: para escuchar las palabras de mis siervos, los profetas, que yo les envío, madrugando y enviando[a], aunque no han escuchado,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «madrugando y enviando», un modismo hebreo para una acción persistente y repetida.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁמֹעַ
  english_pob_choice: to listen
  chosen_spanish: escuchar
  alternatives_spanish:
  - oír
  - prestar atención
  - obedecer
  lexicon: HALOT
  rationale: El infinitivo de propósito exige un verbo que exprese oír con atención y respuesta. 'Escuchar' comunica mejor el matiz de heeding que un simple 'oír', sin convertirlo en 'obedecer'.
- source_word: עַל דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - las palabras acerca de
  - el mensaje de
  lexicon: HALOT
  rationale: La combinación con שׁמע funciona idiomáticamente como objeto de atención auditiva. 'Las palabras de' es natural en español y conserva la concreción del plural constructo.
- source_word: עֲבָדַי
  english_pob_choice: my servants
  chosen_spanish: mis siervos
  alternatives_spanish:
  - mis esclavos
  lexicon: HALOT
  rationale: En este giro profético, el término señala a agentes comisionados por Dios. 'Siervos' preserva el valor funcional y reverencial que el POB inglés documenta como excepción contextual a 'slave'.
- source_word: הַנְּבִאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los profetas enviados
  lexicon: HALOT
  rationale: Equivalencia directa del sustantivo appositivo que identifica a los siervos.
- source_word: אֲשֶׁר אָנֹכִי שֹׁלֵחַ אֲלֵיכֶם
  english_pob_choice: whom I am sending to you
  chosen_spanish: que yo les envío
  alternatives_spanish:
  - a quienes yo envío a ustedes
  - que yo estoy enviando a ustedes
  lexicon: HALOT
  rationale: El participio expresa acción continua o repetida. En español, el presente 'envío' preserva esa vigencia sin sobrecargar con perífrasis, y el dativo 'les' mantiene el destinatario plural.
- source_word: וְהַשְׁכֵּם וְשָׁלֹחַ
  english_pob_choice: rising early and sending
  chosen_spanish: madrugando y enviando
  alternatives_spanish:
  - levantándome temprano y enviando
  - de madrugada y enviando
  - madrugando para enviar
  lexicon: HALOT
  rationale: Se conserva el sentido idiomático y la imaginería hebrea de forma suficientemente literal para la transparencia, pero con un giro español natural. El POB inglés retuvo la forma literal en la revisión; aquí se sigue esa completitud sin perder legibilidad.
- source_word: וְלֹא שְׁמַעְתֶּם
  english_pob_choice: though you have not listened
  chosen_spanish: y no han escuchado
  alternatives_spanish:
  - pero no han escuchado
  - y no escucharon
  lexicon: HALOT
  rationale: Se mantiene la acusación directa del cierre. El presente perfecto español conserva la relevancia continua del rechazo, alineándose con el valor discursivo que el POB inglés marcó con 'have not listened'.
theological_decisions:
- issue: El idiomático וְהַשְׁכֵּם וְשָׁלֹחַ
  english_pob_reading: rising early and sending
  chosen_spanish_reading: madrugando y enviando
  alternative_spanish_readings:
  - levantándome temprano y enviando
  - de madrugada y enviando
  - madrugando para enviar
  rationale: La expresión no describe primero un horario literal, sino la persistencia diligente de Yahvé en enviar profetas. En español conviene conservar la fuerza idiomática con un giro que suene natural y mantenga la repetición enfática.
  doctrine_reference: Translation philosophy §2, §6
- issue: עֲבָדַי como título profético
  english_pob_reading: my servants
  chosen_spanish_reading: mis siervos
  alternative_spanish_readings:
  - mis esclavos
  rationale: Aquí 'siervos' evita una lectura social impropia y conserva el valor teológico del envío profético. No se borra la tensión léxica del hebreo, pero se resuelve según el uso contextual documentado por el POB.
  doctrine_reference: 'Contested terms table: δοῦλος servant/slave (context-dependent); Translation philosophy §1, §5'
translation_notes:
  revision_awareness: La revisión inglesa reciente reemplazó una paráfrasis tipo 'again and again' por la forma más literal 'rising early and sending' para respetar el modismo hebreo. La versión española sigue esa corrección con 'madrugando y enviando', manteniendo a la vez la legibilidad pública.
  spanish_consistency_notes:
  - Se conservó 'Yahvé' implícito en la voz divina del contexto sin introducirlo artificialmente en el versículo, porque el hebreo aquí usa primera persona divina.
  - '''Escuchar'' se prefirió a ''oír'' para reflejar la demanda de atención obediente sin convertir el verbo en una glosa interpretativa.'
  - Se mantuvo el tiempo verbal español en presente para 'envío' y presente perfecto en 'no han escuchado' para reproducir la vigencia del reproche.
  - No se usó 'Cristo' ni vocabulario litúrgico ajeno al texto; el pasaje pertenece al registro profético y legal del hebreo.
