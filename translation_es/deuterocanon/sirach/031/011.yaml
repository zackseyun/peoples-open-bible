translation:
  language: es
  text: Y el que se apartó multiplicará la perversidad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ δὲ πεπλανημένος
  english_pob_choice: the one who was tested / the one who was able to turn aside and did not turn aside
  chosen_spanish: el que se apartó
  alternatives_spanish:
  - el extraviado
  - el que fue probado
  - el que se desvió
  lexicon: πλανάω
  rationale: El griego presenta a alguien en estado de extravío/desvío. Dado que el hebreo transmitido es oscuro y el inglés POB opta por una lectura ética de desviarse, en español conviene una formulación breve y natural que conserve la idea de apartarse del camino recto sin forzar una reconstrucción textual específica.
- source_word: πληθυνεῖ
  english_pob_choice: will multiply
  chosen_spanish: multiplicará
  alternatives_spanish:
  - aumentará
  - hará abundar
  - se multiplicará
  lexicon: HALOT / LSJ
  rationale: El verbo expresa aumento o multiplicación. En español, el futuro activo en tercera persona plural/individual es natural y mantiene el valor prospectivo del original.
- source_word: πανουργίαν
  english_pob_choice: evil / wrongdoing / harm
  chosen_spanish: la perversidad
  alternatives_spanish:
  - la maldad
  - la astucia
  - la malicia
  lexicon: πανουργία
  rationale: En este contexto moral, πανουργία no es simple habilidad sino astucia torcida o malicia activa. 'Perversidad' comunica bien la carga ética negativa sin diluirla en una noción neutra de astucia.
theological_decisions:
- issue: 'Base textual: griego frente al hebreo transmitido muy divergente'
  english_pob_reading: The English POB translates the difficult Hebrew with a contextual sense and notes the Greek parallel as a consistency check.
  chosen_spanish_reading: Se traduce directamente el griego paralelo conservado, porque ofrece un enunciado coherente y breve para esta sección.
  alternative_spanish_readings:
  - Traducir el hebreo como '¿Quién lo bendijo y quedó completo en su vida?'
  - Reproducir una paráfrasis híbrida que combine hebreo y griego
  rationale: El hebreo de este lugar presenta una discrepancia mayor y no ofrece una línea estable para una traducción española clara. El griego paralelo disponible proporciona un sentido textual compacto que puede renderizarse fielmente sin inventar reconstrucciones. Esto preserva la honestidad textual del pasaje.
  doctrine_reference: 'PHILOSOPHY.md: donde el hebreo es incierto o discordante en Sirácida, el paralelo griego puede guiar la lectura; preservar la tensión textual sin ocultarla.'
translation_notes:
  revision_awareness: Se corrige el fallo anterior eliminando toda nota sin anclaje. No se incluye ninguna nota al pie, por lo que no hay marcadores pendientes de aparición en el texto.
  spanish_consistency_notes:
  - Se usa 'perversidad' para mantener un registro moral fuerte y evitar banalizar πανουργία como mera 'astucia'.
  - Se evita 'SEÑOR' y otras convenciones de sustitución porque este versículo no contiene el Tetragrámaton.
  - No se añade puntuación explicativa ni glosas para no exceder el breve alcance del verso.
