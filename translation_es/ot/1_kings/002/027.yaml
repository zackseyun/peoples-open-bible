translation:
  language: es
  text: Así Salomón expulsó a Abiatar de ser sacerdote de Yahvé[a][b], cumpliendo la palabra de Yahvé que había hablado acerca de la casa de Elí en Siló.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para cumplir la palabra de Yahvé». El hebreo puede expresar propósito o resultado.'
    reason: alternative_reading
  - marker: b
    text: Véanse 1 Samuel 2:27–36 y 3:11–14 sobre la palabra pronunciada acerca de la casa de Elí.
    reason: cross_reference
lexical_decisions:
- source_word: וַיְגָרֶשׁ
  english_pob_choice: drove ... out
  chosen_spanish: expulsó
  alternatives_spanish:
  - echó
  - desterró
  - arrojó fuera
  lexicon: HALOT
  rationale: גרשׁ expresa expulsión o desalojo forzoso. En español, 'expulsó' comunica con naturalidad la fuerza del verbo sin suavizarla; 'echó' también sería posible, pero 'expulsó' es más preciso y digno para este contexto narrativo.
- source_word: מִהְיוֹת כֹּהֵן
  english_pob_choice: from being priest
  chosen_spanish: de ser sacerdote
  alternatives_spanish:
  - para que ya no fuera sacerdote
  - de servir como sacerdote
  lexicon: HALOT
  rationale: La construcción con מן + infinitivo de היה señala retiro de un estado o función. 'De ser sacerdote' conserva esa relación estructural de modo claro en español, sin añadir una explicación que el hebreo no exige.
- source_word: כֹּהֵן לַיהוָה
  english_pob_choice: priest to Yahweh
  chosen_spanish: sacerdote de Yahvé
  alternatives_spanish:
  - sacerdote para Yahvé
  - sacerdote al servicio de Yahvé
  lexicon: HALOT
  rationale: El ל aquí marca relación y servicio. En español, 'sacerdote de Yahvé' es la forma más natural y fiel para expresar pertenencia/relación cultual, manteniendo el nombre divino según la convención del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' siguiendo la terminología base del proyecto y evitando la sustitución litúrgica por un título. Esto preserva el nombre personal divino que el hebreo presenta.
- source_word: לְמַלֵּא
  english_pob_choice: fulfilling
  chosen_spanish: cumpliendo
  alternatives_spanish:
  - para cumplir
  - al cumplir
  lexicon: HALOT
  rationale: El infinitivo con ל puede expresar propósito o resultado. 'Cumpliendo' permite reflejar el vínculo narrativo entre la acción de Salomón y el cumplimiento de la palabra previa, sin fijar de manera exclusiva una lectura de propósito.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el dicho de Yahvé
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: '''Palabra de Yahvé'' es la equivalencia más estable para una declaración divina previa y solemne. ''Mensaje'' o ''dicho'' serían posibles, pero perderían la fórmula bíblica y su resonancia profética.'
- source_word: אֲשֶׁר דִּבֶּר
  english_pob_choice: that he had spoken
  chosen_spanish: que había hablado
  alternatives_spanish:
  - que habló
  - que había dicho
  lexicon: HALOT
  rationale: El pluscuamperfecto español ayuda a mostrar que la palabra divina precede a la acción de Salomón. 'Había hablado' conserva el valor de anterioridad sin alterar el contenido del original.
- source_word: עַל בֵּית עֵלִי
  english_pob_choice: concerning the house of Eli
  chosen_spanish: contra la casa de Elí
  alternatives_spanish:
  - acerca de la casa de Elí
  - sobre la casa de Elí
  lexicon: HALOT
  rationale: Aunque עַל puede ser 'concerning', en un contexto de juicio la carga natural es adversativa. 'Contra la casa de Elí' deja visible esa tensión judicial presente en el relato sin forzar una paráfrasis ajena al hebreo.
- source_word: בְּשִׁלֹה
  english_pob_choice: in Shiloh
  chosen_spanish: en Siló
  alternatives_spanish:
  - en Silo
  - en Shiloh
  lexicon: HALOT
  rationale: Para el topónimo, 'Siló' es la forma española tradicional y clara. Se conserva la referencia geográfica del original sin transliteración innecesaria.
theological_decisions:
- issue: Relación entre la acción de Salomón y el cumplimiento de la palabra divina
  english_pob_reading: Solomon's expulsion of Abiathar is presented as the fulfillment of a prior word from the LORD concerning Eli's house.
  chosen_spanish_reading: La expulsión de Abiatar se presenta como cumplimiento de la palabra previa de Yahvé acerca de la casa de Elí.
  alternative_spanish_readings:
  - La expulsión de Abiatar ocurrió para cumplir la palabra previa de Yahvé acerca de la casa de Elí.
  - La expulsión de Abiatar fue el cumplimiento de la palabra de Yahvé acerca de la casa de Elí.
  rationale: El hebreo permite una lectura de propósito o de resultado. 'Cumpliendo' mantiene abierta esa tensión y, a la vez, expresa con claridad la conexión teológica entre la acción real de Salomón y la palabra pronunciada por Yahvé sin atribuir más intención psicológica de la que el texto afirma.
  doctrine_reference: 'Translation philosophy §3: preservar tensiones teológicas y gramaticales sin resolverlas de manera prematura'
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se detectaron cambios necesarios en el análisis base, y la formulación española conserva la misma relación entre expulsión, sacerdocio y cumplimiento profético.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה, conforme al estándar del proyecto.
  - Se usa 'sacerdote' en lugar de 'sacerdote del Señor' o 'sacerdote de Yahvé' con artículo elidido, porque la construcción hebrea es relacional y el español natural favorece 'de Yahvé'.
  - Se eligió 'contra la casa de Elí' para no diluir la fuerza judicial del contexto narrativo.
  - '''Siló'' se conserva como topónimo español tradicional, evitando oscilación gráfica.'
