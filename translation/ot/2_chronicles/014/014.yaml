id: 2CH.14.14
reference: 2 Chronicles 14:14
source:
  edition: WLC
  text: וְ/גַם אָהֳלֵ֥י מִקְנֶ֖ה הִכּ֑וּ וַ/יִּשְׁבּ֨וּ צֹ֤אן לָ/רֹב֙ וּ/גְמַלִּ֔ים וַ/יָּשֻׁ֖בוּ יְרוּשָׁלִָֽם־׃ס
translation:
  text: They also struck the tents of livestock[a], and they carried off sheep in abundance and camels[c][b]. Then they returned to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the tents of livestock.' The phrase may refer to pastoral encampments or herdsmen's camps.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb can mean 'took captive'; with animals as the object, the sense is that they seized them as plunder.
    reason: lexical_alternative
  - marker: c
    text: '''Sheep'' may also be understood more broadly as ''flocks'' or ''small livestock.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: They also
  alternatives:
  - and also
  - also
  lexicon: HALOT
  rationale: Conveys additive force linking this action to the preceding narrative. Rendering with explicit subject in English improves readability though the Hebrew conjunction-plus-adverb is concise.
- source_word: אָהֳלֵי מִקְנֶה
  chosen: the livestock tents
  alternatives:
  - the tents of livestock
  - the shepherds' camps
  - the cattle enclosures
  lexicon: HALOT
  rationale: Literally 'tents of livestock.' This likely refers to encampments associated with herds rather than the animals themselves. 'Livestock tents' preserves the concrete image while remaining natural English.
- source_word: הִכּוּ
  chosen: struck
  alternatives:
  - attacked
  - smote
  lexicon: HALOT
  rationale: The verb נכה commonly means 'strike' and in military contexts can denote attacking or defeating. 'Struck' keeps the formal connection to the Hebrew while fitting the context of raiding camps.
- source_word: וַיִּשְׁבּוּ
  chosen: they carried off
  alternatives:
  - they took captive
  - they seized as plunder
  lexicon: HALOT
  rationale: From שבה, often 'take captive.' Here the direct objects are animals, so idiomatic English prefers 'carried off' or 'seized' rather than 'took captive,' while preserving the sense of capture as spoil.
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - flocks
  - small livestock
  lexicon: HALOT
  rationale: Though צאן can denote small livestock collectively (sheep and goats), 'sheep' is a common and sufficiently natural rendering here, especially since the verse emphasizes quantity of spoil rather than species precision.
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - in great numbers
  - abundantly
  lexicon: HALOT
  rationale: Expresses the idiomatic sense of large quantity. 'In abundance' is natural modern English and preserves the emphasis on the scale of the plunder.
- source_word: וּגְמַלִּים
  chosen: and camels
  lexicon: HALOT
  rationale: Straightforward nominal rendering.
- source_word: וַיָּשֻׁבוּ יְרוּשָׁלִָם
  chosen: Then they returned to Jerusalem
  alternatives:
  - and they returned to Jerusalem
  lexicon: HALOT
  rationale: The wayyiqtol advances the narrative sequence. 'Then' makes the progression clear in English without overtranslating.
