review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: el sacerdote da pan consagrado porque no había otro pan, sino el pan de la Presencia retirado de delante de Yahvé para poner pan caliente. La terminología clave —‘Yahvé’, ‘pan de la Presencia’, ‘de delante de’— está bien alineada con la evidencia fuente y con el rastro auditado. Sin embargo, la cláusula final ‘el día en que se lo quitaban’ no preserva con suficiente precisión el valor del hebreo בְּיוֹם הִלָּקְחוֹ ni del inglés auditado ‘on the day it was taken away’: introduce un sujeto humano indefinido y el pronombre ‘lo’, que en español puede referirse ambiguamente a David o al pan. Conviene una formulación pasiva o impersonal más clara.'
  spanish_quality_summary: El español es en general claro y digno, con buen nivel de legibilidad eclesial. ‘Pan santo’ es entendible, aunque algo menos idiomático que ‘pan sagrado’ o ‘pan consagrado’; no obstante, sigue siendo defendible por cercanía al inglés auditado y al referente contextual. La principal dificultad estilística es la ambigüedad de ‘se lo quitaban’, que suena menos natural y menos precisa en este contexto ritual. Una leve revisión mejora fidelidad y claridad sin alterar el resto.
  glossary_alignment: 'Buena alineación con la política del proyecto: יְהוָה → ‘Yahvé’; לֶחֶם הַפָּנִים → ‘el pan de la Presencia’ con nota para ‘pan de la proposición’; מִלִּפְנֵי יְהוָה → ‘de delante de Yahvé’. No hay conflictos doctrinales relevantes. La única corrección recomendada afecta la expresión temporal/pasiva de בְּיוֹם הִלָּקְחוֹ.'
  issues:
  - severity: medium
    issue: Ambigüedad y leve desalineación en ‘el día en que se lo quitaban’
    rationale: El hebreo הִלָּקְחוֹ y el inglés auditado expresan ‘cuando/fue retirado’ respecto del pan, no ‘se lo quitaban’, que introduce un agente humano implícito y un pronombre potencialmente ambiguo. ‘El día en que fue retirado’ o equivalente preserva mejor el pasivo y evita confusión.
  revised_spanish_text: Así que el sacerdote le dio pan santo[a], porque allí no había pan, sino solo el pan de la Presencia, que había sido retirado de delante de Yahvé, para poner allí pan caliente el día en que fue retirado.
  revised_footnotes:
