    issue: '''de una persona'' atenúa el valor de לְכָל'
    rationale: 'El hebreo expresa alcance general/intensivo: ''de cualquier persona/ser humano''. ''De una persona'' puede entenderse simplemente como indefinido singular, no como inclusivo exhaustivo.'
  - severity: low
    issue: '''por siete días'' es menos idiomático que ''durante siete días'' en este contexto'
    rationale: Ambas opciones son comprensibles, pero 'durante' expresa con más naturalidad la duración del estado de impureza ritual en español general.
  revised_spanish_text: Cualquiera que toque un cadáver[a] de cualquier persona[b] quedará impuro durante siete días.
