translation:
  language: es
  text: Ahora bien, cuando Abiatar hijo de Ahimelec huyó a David en Queila[a], descendió con un efod en su mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un efod descendió en su mano», una traducción más literal del orden de las palabras en hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: La forma narrativa introduce el episodio como transición discursiva. «Ahora bien» conserva ese arranque sin caer en un calco anticuado.
- source_word: בִּבְרֹחַ
  english_pob_choice: when ... fled
  chosen_spanish: cuando ... huyó
  alternatives_spanish:
  - al huir
  - mientras huía
  lexicon: HALOT
  rationale: La preposición con infinitivo expresa circunstancia temporal; en español la solución más natural y fiel es una subordinada temporal con «cuando».
- source_word: אֶבְיָתָר
  english_pob_choice: Abiathar
  chosen_spanish: Abiatar
  alternatives_spanish:
  - Abiathar
  lexicon: Transliteración estándar al español
  rationale: Se adapta el nombre a la forma habitual en español bíblico, manteniendo la identidad del personaje.
- source_word: בֶּן אֲחִימֶלֶךְ
  english_pob_choice: son of Ahimelech
  chosen_spanish: hijo de Ahimelec
  alternatives_spanish:
  - hijo de Ahimelech
  lexicon: Patronímico hebreo
  rationale: Se conserva la relación genealógica de modo directo y claro en español.
- source_word: אֶל דָּוִד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - hacia David
  - junto a David
  lexicon: HALOT
  rationale: אֶל indica movimiento hacia David; en español, «a David» es la equivalencia más directa y natural.
- source_word: קְעִילָה
  english_pob_choice: at Keilah
  chosen_spanish: en Queila
  alternatives_spanish:
  - a Queila
  lexicon: Topónimo hebreo
  rationale: Aunque el hebreo sigue a «a David», el lugar especifica la ubicación de David. En español, «en Queila» comunica la relación locativa con fluidez.
- source_word: אֵפוֹד
  english_pob_choice: an ephod
  chosen_spanish: un efod
  alternatives_spanish:
  - un vestido sacerdotal
  - una prenda sacerdotal
  lexicon: HALOT
  rationale: Se translitera el término técnico por su carga cultual específica y porque el texto no autoriza precisarlo más allá de «efod».
- source_word: יָרַד
  english_pob_choice: he came down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - vino
  lexicon: HALOT
  rationale: El verbo expresa movimiento hacia abajo; «descendió» conserva la dirección y el registro digno del relato.
- source_word: בְּיָדוֹ
  english_pob_choice: with an ephod in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - llevándolo en la mano
  - con él en la mano
  lexicon: HALOT
  rationale: La locución hebrea es literalmente «en su mano». En español, se mantiene la imagen concreta con una construcción breve y natural.
theological_decisions:
- issue: Sentido de אֵפוֹד en el contexto
  english_pob_reading: Retain 'ephod' as a transliterated cultic item without specifying more than the Hebrew states.
  chosen_spanish_reading: Mantener «efod» como objeto cultual transliterado, sin convertirlo en «vestidura sacerdotal» ni en otra precisión interpretativa.
  alternative_spanish_readings:
  - vestidura sacerdotal
  - prenda sagrada
  rationale: El hebreo nombra el objeto técnico y el contexto posterior le da importancia cultual, pero este versículo no define su forma ni función con suficiente detalle para ampliar el sentido. La transliteración preserva esa cautela.
  doctrine_reference: Principio POB de primacía del idioma original y de no sobreinterpretar más allá del texto base.
translation_notes:
  revision_awareness: El borrador sigue el sentido y la cautela del registro inglés auditado, pero ajusta la sintaxis al español para evitar calcos; se conserva la tensión entre la literalidad de «en su mano» y la fluidez narrativa mediante la nota textual.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no aplica.
  - Se mantiene «efod» como transliteración técnica, coherente con la política POB.
  - El topónimo se presenta como «Queila», forma española habitual y legible.
  - El orden narrativo español prioriza claridad sin perder la referencia a la mano como portadora del efod.
