translation:
  language: es
  text: Ahora bien, cuando Sanbalat oyó que estábamos edificando la muralla[a], se enojó y se indignó mucho, y se burló de los judíos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos». El término hebreo puede referirse al pueblo de Judá en sentido regional, así como a los judíos en un sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  english_pob_choice: Now when
  chosen_spanish: Ahora bien, cuando
  alternatives_spanish:
  - Y sucedió que cuando
  - Cuando
  lexicon: HALOT
  rationale: La fórmula narrativa introduce un nuevo desarrollo. «Ahora bien, cuando» conserva ese giro discursivo en español natural y digno, sin sonar mecánico.
- source_word: שָׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: HALOT
  rationale: El verbo puede expresar recibir noticias. «Oyó» sigue de cerca el sentido básico y funciona bien en español bíblico contemporáneo.
- source_word: כִּי אֲנַחְנוּ בוֹנִים
  english_pob_choice: that we were building
  chosen_spanish: que estábamos edificando
  alternatives_spanish:
  - que estábamos construyendo
  - que estábamos edificando de nuevo
  lexicon: HALOT
  rationale: בוֹנִים es participio de acción en curso. «Edificando» refleja el acto de levantar la muralla con un registro más sobrio que «construyendo» en este contexto histórico.
- source_word: הַחוֹמָה
  english_pob_choice: the wall
  chosen_spanish: la muralla
  alternatives_spanish:
  - el muro
  - la pared
  lexicon: HALOT
  rationale: En Nehemías se trata de la fortificación de Jerusalén; «muralla» comunica mejor esa función defensiva que «muro» o «pared» en español actual.
- source_word: וַיִּחַר לוֹ
  english_pob_choice: he became angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se encendió de ira
  - se irritó
  lexicon: HALOT
  rationale: El hebreo es una idiomática expresión de ira. «Se enojó» comunica claramente el sentido sin forzar una metáfora poco natural.
- source_word: וַיִּכְעַס הַרְבֵּה
  english_pob_choice: and very indignant
  chosen_spanish: y se irritó mucho
  alternatives_spanish:
  - y se indignó mucho
  - y se enfureció mucho
  lexicon: HALOT
  rationale: La segunda forma intensifica la primera. «Se irritó mucho» conserva la escalada emocional y evita repetir exactamente el mismo matiz de la frase anterior.
- source_word: וַיַּלְעֵג
  english_pob_choice: he mocked
  chosen_spanish: se burló
  alternatives_spanish:
  - se mofó
  - se escarneció
  lexicon: HALOT
  rationale: El verbo denota burla y desprecio. «Se burló» es natural, directo y suficientemente fuerte para el tono del pasaje.
- source_word: עַל הַיְּהוּדִים
  english_pob_choice: the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  - del pueblo de Judá
  lexicon: HALOT
  rationale: «יְהוּדִים» puede referirse al pueblo de Judá en sentido regional o a los judíos en sentido más amplio. Siguiendo la opción del POB inglés, se mantiene «judíos» y se preserva la alternativa contextual en nota.
theological_decisions:
- issue: Referencia étnica/regional de הַיְּהוּדִים
  english_pob_reading: The Jews, with note that the Hebrew can also mean the Judeans.
  chosen_spanish_reading: los judíos, con nota de que también puede entenderse como los judeanos / el pueblo de Judá
  alternative_spanish_readings:
  - los judeanos
  - el pueblo de Judá
  rationale: En Nehemías, el término puede tener matiz regional además de étnico-religioso. Se conserva la lectura más reconocible en el texto principal y se explicita la alternativa semántica sin borrar la tensión.
  doctrine_reference: Ninguna; decisión lexicográfica e histórica.
translation_notes:
  revision_awareness: La edición inglesa revisada sustituyó «rebuilding» por «building» y «very enraged» por «very indignant». La redacción española sigue esa revisión mediante «edificando» y «se irritó mucho», manteniendo la gradación de ira sin sobrerrecrear el matiz.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se eligió «muralla» para la fortificación de Jerusalén por claridad contextual en español.
  - La burla final se expresa con un verbo reflexivo natural («se burló») para evitar un calco pesado.
