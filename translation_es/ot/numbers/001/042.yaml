translation:
  language: es
  text: 'Los hijos de Neftalí[a], según sus generaciones, según sus clanes, según las casas de sus padres, según el número de nombres, desde los veinte años de edad en adelante, todo varón apto para salir a la guerra:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, “todo el que sale a la guerra” o “todo el que sale a la hueste/ejército”. El hebreo es una expresión idiomática para quienes eran aptos para el servicio militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי נַפְתָּלִי
  english_pob_choice: The sons of Naphtali
  chosen_spanish: Los hijos de Neftalí
  alternatives_spanish:
  - Los descendientes de Neftalí
  - Los niños de Neftalí
  lexicon: HALOT
  rationale: El hebreo dice literalmente “hijos de”. En este contexto censal tribal se refiere a los varones del linaje de Neftalí. “Hijos” conserva la fuerza genealógica y el rasgo masculino del término mejor que “descendientes” o “niños”.
- source_word: תּוֹלְדֹתָם
  english_pob_choice: by their generations
  chosen_spanish: según sus generaciones
  alternatives_spanish:
  - de acuerdo con sus generaciones
  - según su linaje
  lexicon: HALOT
  rationale: La expresión funciona como fórmula genealógica/censal. “Según sus generaciones” reproduce la forma recurrente del pasaje sin añadir explicación interpretativa excesiva.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - de acuerdo con sus familias
  lexicon: HALOT
  rationale: En contexto tribal, מִשְׁפָּחָה señala una unidad social más amplia que la familia nuclear. “Clanes” comunica bien esa estructura en español actual.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: según las casas de sus padres
  alternatives_spanish:
  - según sus casas paternas
  - según las casas de sus antepasados
  lexicon: HALOT
  rationale: La fórmula hebrea conserva la estructura patriarcal del censo. “Casas de sus padres” mantiene la transparencia literal y el sentido social del grupo doméstico/paternal.
- source_word: בְּמִסְפַּר שֵׁמֹת
  english_pob_choice: according to the number of names
  chosen_spanish: según el número de nombres
  alternatives_spanish:
  - por el número de nombres
  - según la cuenta de nombres
  lexicon: HALOT
  rationale: La frase indica un conteo nominal, es decir, personas enumeradas por nombre. “Número de nombres” preserva la fórmula del hebreo y el valor censal de la expresión.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: desde los veinte años de edad en adelante
  alternatives_spanish:
  - desde los veinte años y más
  - desde los veinte años cumplidos en adelante
  lexicon: HALOT
  rationale: Es la fórmula estándar de edad mínima para el censo. “En adelante” expresa bien la extensión inclusiva de וָמַעְלָה en español natural.
- source_word: כֹּל יֹצֵא צָבָא
  english_pob_choice: every male able to go out to war
  chosen_spanish: todo varón apto para salir a la guerra
  alternatives_spanish:
  - todo varón capaz de salir a la guerra
  - todo varón que sale a la guerra
  lexicon: HALOT
  rationale: El hebreo literalmente dice “todo el que sale al ejército/hueste”. En este contexto apunta a la aptitud para servicio militar. “Apto para salir a la guerra” conserva el sentido militar y evita suavizar la expresión.
theological_decisions:
- issue: Alcance del término צָבָא en el contexto del censo
  english_pob_reading: every male able to go out to war
  chosen_spanish_reading: todo varón apto para salir a la guerra
  alternative_spanish_readings:
  - todo varón apto para el servicio militar
  - todo varón que sale a la hueste
  rationale: 'No hay una carga doctrinal especial, pero sí una decisión semántica relevante: el hebreo usa un idioma de “salir al ejército/hueste”. Se eligió una formulación clara en español que preserve el referente militar sin borrar la imagen original.'
  doctrine_reference: No aplica; decisión léxica-contextual sobre vocabulario de censo militar.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó “every man” por “every male” para ajustarse mejor al hebreo del censo. En español se reflejó con “todo varón”, manteniendo la precisión de género/linaje del original.
  spanish_consistency_notes:
  - Se mantuvo “hijos” para בְּנֵי, en coherencia con el valor genealógico-masculino del censo.
  - Se evitó “SEÑOR” o equivalentes porque no aparece el nombre divino en este versículo.
  - Se conservó la fórmula censal repetitiva con “según...”, siguiendo el patrón del capítulo.
  - “Guerra” se usó para צָבָא porque el contexto inmediato es el registro de aptos para el servicio militar.
