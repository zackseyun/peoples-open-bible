translation:
  language: es
  text: y le dio fuerza para dominar todas las cosas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para ejercer dominio sobre todas las cosas». El verbo griego puede denotar ejercer poder o dominio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκέν
  english_pob_choice: gave
  chosen_spanish: le dio
  alternatives_spanish:
  - le concedió
  - le otorgó
  lexicon: δίδωμι
  rationale: El verbo griego es el aoristo de δίδωμι y expresa una acción simple de dar. En español, «le dio» es la forma más natural y directa; las alternativas «concedió» y «otorgó» sonarían más interpretativas o elevadas de lo necesario.
- source_word: τε
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  - entonces
  lexicon: LSJ
  rationale: La partícula enclítica τε enlaza esta cláusula con la anterior. «Y» conserva la conexión sin introducir matices que el griego no exige.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo singular se refleja naturalmente en español con clítico de objeto indirecto. «Le» es más fluido que repetir «a él».
- source_word: ἰσχὺν
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - fortaleza
  lexicon: BDAG
  rationale: ἰσχύς denota fuerza, poder, vigor. «Fuerza» conserva el sentido de capacidad efectiva y encaja bien con el infinitivo siguiente; «poder» podría sonar más abstracto, y «fortaleza» desplaza el matiz hacia una cualidad moral.
- source_word: κρατῆσαι
  english_pob_choice: to rule over
  chosen_spanish: reinar sobre
  alternatives_spanish:
  - dominar sobre
  - tener dominio sobre
  lexicon: LSJ
  rationale: κρατέω aquí expresa ejercer dominio o gobierno. Dado el trasfondo de autoridad sobre «todas las cosas», «reinar sobre» comunica bien la idea de gobierno efectivo en español bíblico sin estrechar demasiado el verbo. «Dominar sobre» y «tener dominio sobre» son posibles, pero suenan más pesados o más técnicos.
- source_word: ἁπάντων
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo
  lexicon: BDAG
  rationale: El genitivo plural de ἅπας tiene alcance total. «Todas las cosas» preserva la amplitud de la expresión y evita reducirla a una sola esfera.
theological_decisions:
- issue: Alcance de la dominación otorgada
  english_pob_reading: The clause is rendered broadly as a grant of strength 'to rule over all things' without specifying creation or creatures in the main text.
  chosen_spanish_reading: Se mantiene de forma amplia como una concesión de fuerza «para reinar sobre todas las cosas», sin añadir «creación» ni «seres vivientes».
  alternative_spanish_readings:
  - para dominar todo
  - para gobernar sobre todo lo creado
  rationale: El griego es amplio y no añade un objeto más específico. La traducción española conserva esa amplitud y evita resolver la tensión interpretativa que deja el texto fuente.
  doctrine_reference: Principio de primacía del original; conservar la amplitud semántica sin explicitar más de lo que el griego dice
translation_notes:
  revision_awareness: La base auditada pasó de 'to master all things' a 'to rule over all things' por preferencia de naturalidad y formalidad. En español se siguió esa línea con «reinar sobre», manteniendo el alcance total de ἁπάντων y la tensión entre fuerza concedida y ejercicio de dominio.
  spanish_consistency_notes:
  - Se usó «fuerza» para ἰσχύς, en armonía con el valor de capacidad efectiva del término.
  - Se evitó «Mesías», «Cristo» y terminología cristológica porque no aparecen en este verso.
  - Se preservó el plural neutro implícito en ἁπάντων con «todas las cosas», una fórmula idiomática y suficientemente amplia en español.
