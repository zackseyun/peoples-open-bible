  source_alignment_summary: 'Greek: ''Οὐκοῦν σύνετε τὴν δύναμιν τοῦ θυμοῦ ὅτι ματαία ἐστίν'' — Therefore understand the power of anger, that it is futile. The EN POB per-verse text for this unit is actually ''Therefore understand the power of anger, that it is futile.'' However, the Spanish draft bases itself on the chapter-level EN text ''For anger is blindness. It does not allow one to see the face of any man truly.'' This is because the per-verse EN text was derived from a different chapter section (the chapter-level YAML has verse 4:1 tagged as the blindness verse). The Spanish ''Pues la ira es ceguera. No permite ver el rostro de ningún hombre con verdad.'' translates the chapter-level content correctly for this verse unit. The ''con verdad'' rendering should follow the EN revision to ''truly'' → ''verdaderamente''.'
