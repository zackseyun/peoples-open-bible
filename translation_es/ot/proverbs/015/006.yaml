translation:
  language: es
  text: En la casa del justo hay gran riqueza[a], pero en el ingreso del malvado hay turbación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tesoro», «bienes» o «recursos» en la casa del justo; חֹסֶן puede abarcar más que riqueza en sentido estricto.
    reason: lexical_alternative
  - marker: b
    text: O «producción», «cosecha» o «rendimiento» del malvado. También, «se echa a perder» o «se arruina»; el verbo hebreo puede expresar turbación, disturbio o ruina.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - casa/estirpe
  - familia
  lexicon: HALOT
  rationale: En el paralelismo proverbial, בֵּית conserva una imagen concreta de la esfera doméstica y patrimonial del justo. «Casa» es la equivalencia más natural y fiel en español, y puede sugerir tanto el lugar como el conjunto doméstico.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - una persona justa
  lexicon: HALOT
  rationale: El adjetivo se usa sustantivamente para la persona justa en contraste con רָשָׁע. «El justo» mantiene la fuerza proverbial y la forma representativa singular sin sobrecargar el texto.
- source_word: חֹסֶן
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - tesoro
  - bienes
  - caudal
  lexicon: HALOT
  rationale: El sustantivo puede abarcar riqueza, tesoro o recursos. «Riqueza» comunica bien la abundancia material dentro del proverbio y mantiene el contraste con el segundo hemistiquio.
- source_word: רָב
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - abundante
  - mucha
  lexicon: HALOT
  rationale: Modifica חֹסֶן con el sentido de abundancia. En español, «gran riqueza» suena natural y conserva la idea de plenitud.
- source_word: וּ/בִ/תְבוּאַת
  english_pob_choice: but in the income of
  chosen_spanish: pero en el ingreso de
  alternatives_spanish:
  - pero en la producción de
  - pero en la cosecha de
  - pero en el rendimiento de
  lexicon: HALOT
  rationale: La forma permite una lectura contrastiva en el proverbio. «Ingreso» expresa el resultado económico de la producción en un español actual, mientras deja abierta la gama semántica de producto/rendimiento que el hebreo admite.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el perverso
  - el malvado
  lexicon: HALOT
  rationale: Como antónimo de צַדִּיק, el sustantivo-adjetivo designa a la persona caracterizada por la maldad. «El malvado» es claro y suficientemente fuerte en español; se evita «impío» por su sesgo más religioso-tradicional.
- source_word: נֶעְכָּרֶת
  english_pob_choice: there is trouble
  chosen_spanish: trae trouble
  alternatives_spanish:
  - hay turbación
  - se echa a perder
  - trae disturbio
  lexicon: HALOT
  rationale: El verbo עכר puede expresar turbación, disturbio o ruina. En este contexto se conserva la idea de que el ingreso del malvado no termina en estabilidad sino en trastorno; se evita suavizarlo demasiado. La forma final mantiene deliberadamente la tensión semántica del hebreo.
theological_decisions:
- issue: Lectura proverbial antitética de prosperidad del justo versus desorden del malvado
  english_pob_reading: In the house of the righteous there is great wealth, but in the income of the wicked there is trouble.
  chosen_spanish_reading: La casa del justo tiene gran riqueza, pero el ingreso del malvado trae trouble.
  alternative_spanish_readings:
  - La casa del justo tiene gran riqueza, pero el ingreso del malvado trae turbación.
  - La casa del justo tiene gran riqueza, pero el ingreso del malvado se ve trastornado.
  rationale: No hay afirmación doctrinal explícita, sino una sentencia sapiencial sobre el contraste moral de dos caminos. La traducción conserva ese contraste sin convertirlo en una promesa mecánica ni en una explicación causal adicional.
  doctrine_reference: Sabiduría proverbial / ética del justo y del malvado
translation_notes:
  revision_awareness: El contexto de auditoría en inglés muestra acuerdo alto y no registra revisiones aplicadas. Se mantuvo la estructura antitética, la lectura económica de תְבוּאָה y la amplitud semántica de עכר, procurando una solución española publicable sin neutralizar las tensiones léxicas del hebreo.
  spanish_consistency_notes:
  - Se usa «el justo» / «el malvado» de manera representativa y proverbial, en línea con el contraste צַדִּיק / רָשָׁע.
  - «Casa» conserva la imagen concreta de בֵּית y puede implicar el ámbito doméstico y patrimonial.
  - «Riqueza» traduce חֹסֶן con naturalidad; la nota preserva alternativas más cercanas a ‘tesoro’ o ‘bienes’.
  - La segunda mitad mantiene una formulación económica para תְבוּאָה, sin forzarla a un sentido exclusivamente agrícola.
  - Se conservó la ambigüedad de עכר mediante una nota, porque el español no tiene un equivalente único que reúna disturbio, turbación y ruina.
