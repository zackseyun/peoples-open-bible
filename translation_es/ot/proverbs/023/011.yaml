translation:
  language: es
  text: porque su Redentor[a] es fuerte; él pleiteará su causa contra ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su pariente redentor» o «su vindicador». El hebreo גֹאֵל se refiere a uno que actúa para rescatar, defender o vindicar a un miembro de la familia.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón de la advertencia anterior. En español, «porque» expresa con naturalidad esa relación causal sin perder el valor explicativo del hebreo.
- source_word: גֹאֲלָם
  english_pob_choice: their Redeemer
  chosen_spanish: su Redentor
  alternatives_spanish:
  - su pariente redentor
  - su vindicador
  lexicon: HALOT
  rationale: «גֹאֵל» puede abarcar redentor, defensor o vindicador. «Redentor» conserva la carga jurídica y teológica que el POB documenta, mientras que «pariente redentor» explicita una relación de parentesco que aquí no es la principal y «vindicador» suena más interpretativo.
- source_word: חָזָק
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - poderoso
  - mighty
  lexicon: HALOT
  rationale: El adjetivo destaca capacidad real de actuar en favor de los vulnerables. «Fuerte» es directo y fiel; «poderoso» también sería posible, pero añade un matiz más solemne que no es necesario.
- source_word: יָרִיב
  english_pob_choice: will plead
  chosen_spanish: pleiteará
  alternatives_spanish:
  - defenderá su causa
  - contenderá
  lexicon: HALOT
  rationale: 'El verbo de ריב conserva un trasfondo forense: disputar o litigar una causa. «Pleiteará» mantiene ese registro jurídico en español y enlaza bien con el sustantivo cognado siguiente.'
- source_word: אֶת רִיבָם
  english_pob_choice: their case
  chosen_spanish: su causa
  alternatives_spanish:
  - su pleito
  - su disputa
  lexicon: HALOT
  rationale: La construcción cognada intensifica el lenguaje legal. «Su causa» es una equivalencia natural y sobria que preserva el sentido de litigio/defensa sin volverla demasiado técnica.
- source_word: אִתָּךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - contigo
  lexicon: HALOT
  rationale: En este contexto adversarial, la preposición marca oposición legal. «Contra ti» hace explícita esa fuerza; «contigo» sería gramatical pero perdería el matiz contencioso.
theological_decisions:
- issue: Título גֹאֵל en un proverbio de sabiduría
  english_pob_reading: Redeemer
  chosen_spanish_reading: Redentor
  alternative_spanish_readings:
  - pariente redentor
  - vindicador
  rationale: Se preserva el peso teológico y jurídico del término sin sobreexplicar la relación familiar. En español, «Redentor» comunica de forma breve la función de rescate/defensa que el POB documenta para גֹאֵל.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological weight without paraphrase.'
translation_notes:
  revision_awareness: 'La versión española sigue el estado revisado sin cambios del archivo inglés: se conserva la lectura principal «Redeemer/Redentor» y la nota alternativa para גֹאֵל, manteniendo el tono jurídico del verbo ריב y del sustantivo cognado.'
  spanish_consistency_notes:
  - Se mantiene «Redentor» como término técnico-teológico consistente con el POB y con la terminología por defecto para גֹאֵל cuando el contexto enfatiza rescate/vindicación.
  - «Pleiteará» se eligió por su fuerza jurídica en español y por su compatibilidad con «su causa», evitando una paráfrasis más débil.
  - Se usa «contra ti» para reflejar la dirección adversarial explícita del hebreo.
  - La nota al pie se ancla en «Redentor[a]» y preserva las alternativas documentadas por el POB.
