translation:
  language: es
  text: Y además[a], porque Qohelet era sabio, aún enseñó al pueblo conocimiento; también ponderó, investigó y ordenó muchos proverbios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y además, porque Qohelet era sabio, también enseñó al pueblo conocimiento; ponderó, investigó y puso en orden muchos proverbios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֹתֵר
  english_pob_choice: And beyond that
  chosen_spanish: Y además
  alternatives_spanish:
  - Y más aún
  - Y además de esto
  lexicon: HALOT
  rationale: La idea es aditiva y conclusiva; "y además" conserva el valor de suma sin sonar forzado en español.
- source_word: שֶׁהָיָה
  english_pob_choice: because ... was
  chosen_spanish: porque ... fue
  alternatives_spanish:
  - ya que ... era
  - puesto que ... fue
  lexicon: HALOT
  rationale: Aquí la relación causal es la más natural en español y refleja bien que la sabiduría de Qohelet fundamenta lo que sigue.
- source_word: קֹהֶלֶת
  english_pob_choice: Qoheleth
  chosen_spanish: Qohelet
  alternatives_spanish:
  - el Qohelet
  - el Predicador
  lexicon: HALOT
  rationale: Se mantiene la forma nombre/título transliterada que el POB inglés preserva, evitando una domesticación interpretativa como "Predicador" o "Maestro".
- source_word: חָכָם
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - sabio/a
  - prudente
  lexicon: HALOT
  rationale: '"Sabio" reproduce el adjetivo sencillo del hebreo y mantiene la conexión con el tema sapiencial del libro.'
- source_word: עוֹד
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - además
  lexicon: HALOT
  rationale: '"Todavía" expresa continuidad temporal o aspectual: no solo fue sabio, sino que siguió enseñando.'
- source_word: לִמַּד דַּעַת אֶת הָעָם
  english_pob_choice: taught the people knowledge
  chosen_spanish: enseñó al pueblo conocimiento
  alternatives_spanish:
  - enseñó al pueblo sabiduría
  - instruyó al pueblo en conocimiento
  lexicon: HALOT
  rationale: Se conserva "conocimiento" y no "sabiduría" para respetar la distinción léxica con חָכָם; el dativo indirecto "al pueblo" suena natural en español.
- source_word: וְאִזֵּן
  english_pob_choice: weighed
  chosen_spanish: pesó
  alternatives_spanish:
  - ponderó
  - sopesó
  lexicon: HALOT
  rationale: El verbo mantiene la metáfora de pesar/evaluar; "pesó" es breve y fiel, aunque en español moderno puede sonar más metafórico que literal.
- source_word: וְחִקֵּר
  english_pob_choice: searched out
  chosen_spanish: investigó
  alternatives_spanish:
  - examinó
  - indagó
  lexicon: HALOT
  rationale: '"Investigó" transmite la búsqueda cuidadosa e ինտensional del hebreo con claridad contemporánea.'
- source_word: תִּקֵּן
  english_pob_choice: arranged
  chosen_spanish: ordenó
  alternatives_spanish:
  - puso en orden
  - dispuso
  lexicon: HALOT
  rationale: '"Ordenó" reproduce bien el sentido de organizar/componer en contexto de proverbios, sin añadir más que el texto.'
- source_word: מְשָׁלִים הַרְבֵּה
  english_pob_choice: many proverbs
  chosen_spanish: muchos proverbios
  alternatives_spanish:
  - gran cantidad de proverbios
  - muchísimos proverbios
  lexicon: HALOT
  rationale: Equivale de forma directa y natural a la cantidad expresada por הַרְבֵּה.
theological_decisions:
- issue: Uso de un nombre/título hebreo para קֹהֶלֶת
  english_pob_reading: Qoheleth as a distinctive designation/name-like title
  chosen_spanish_reading: Qohelet como designación transliterada
  alternative_spanish_readings:
  - el Predicador
  - el Maestro
  rationale: Se preserva el carácter especial del término sin imponer una equivalencia interpretativa que el POB inglés evita.
  doctrine_reference: Ecclesiastes title tradition / lexical transparency
- issue: Distinción entre חָכָם y דַּעַת
  english_pob_reading: wise ... taught the people knowledge
  chosen_spanish_reading: sabio ... enseñó al pueblo conocimiento
  alternative_spanish_readings:
  - sabio ... enseñó sabiduría
  - prudente ... enseñó saber
  rationale: La traducción mantiene separadas la cualidad del maestro y el contenido enseñado, evitando fusionar ambos conceptos.
  doctrine_reference: Wisdom literature lexical distinction
translation_notes:
  revision_awareness: Se siguió el sentido auditado del texto hebreo y la decisión inglesa de preservar Qoheleth como designación propia, manteniendo además la secuencia verbal de enseñar/pesar/investigar/ordenar sin suavizarla.
  spanish_consistency_notes:
  - Se usó «Qohelet» de manera consistente como transliteración del título.
  - Se prefirió «conocimiento» para דַּעַת, reservando «sabiduría» para חָכָם.
  - La serie verbal conserva el paralelismo del hebreo con verbos breves y sucesivos.
  - Se mantuvo una puntuación sobria y publicable en español bíblico contemporáneo.
