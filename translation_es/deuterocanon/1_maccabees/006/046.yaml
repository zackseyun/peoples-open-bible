translation:
  language: es
  text: Y se deslizó debajo del elefante[a], lo atacó desde abajo y lo mató; y cayó al suelo encima de él, y murió allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo hirió por debajo». El griego ὑπέθηκεν αὐτῷ es idiomático en este contexto; la redacción principal conserva el sentido de un ataque ejecutado desde abajo sin precisar más de lo que permite la frase.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσέδυσεν
  english_pob_choice: slipped in
  chosen_spanish: se deslizó
  alternatives_spanish:
  - entró sigilosamente
  - se metió
  - se introdujo deslizándose
  lexicon: LSJ
  rationale: El verbo griego sugiere un ingreso rápido y furtivo en una situación cerrada o comprometida. «Se deslizó» conserva la imagen dinámica y la maniobra táctica mejor que un simple «entró».
- source_word: ὑπὸ τὸν ἐλέφαντα
  english_pob_choice: under the elephant
  chosen_spanish: por debajo del elefante
  alternatives_spanish:
  - debajo del elefante
  - bajo el elefante
  lexicon: LSJ
  rationale: La frase espacial debe mantenerse concreta. «Por debajo del elefante» comunica con claridad la posición física y armoniza con el movimiento previo del verso.
- source_word: ὑπέθηκεν αὐτῷ
  english_pob_choice: struck it from beneath
  chosen_spanish: lo atacó desde abajo
  alternatives_spanish:
  - lo hirió desde abajo
  - lo apuñaló por debajo
  - le asestó un golpe desde abajo
  lexicon: LSJ
  rationale: El griego es idiomático y no precisa el instrumento. «Lo atacó desde abajo» conserva la dirección del ataque sin añadir una especificación del arma que el texto no exige.
- source_word: ἀνεῖλεν αὐτόν
  english_pob_choice: killed it
  chosen_spanish: lo mató
  alternatives_spanish:
  - lo mató de muerte
  - lo quitó de en medio
  - lo dio muerte
  lexicon: LSJ
  rationale: El verbo significa matar de manera directa. «Lo mató» es la forma más natural y fiel en español contemporáneo.
- source_word: ἔπεσεν ἐπὶ τὴν γῆν ἐπάνω αὐτοῦ
  english_pob_choice: it fell to the ground on top of him
  chosen_spanish: cayó al suelo encima de él
  alternatives_spanish:
  - cayó a tierra sobre él
  - se desplomó al suelo sobre él
  lexicon: LSJ
  rationale: 'La doble indicación espacial del griego debe conservarse: caída al suelo y caída sobre la persona. «Cayó al suelo encima de él» lo expresa de manera clara y directa.'
- source_word: ἀπέθανεν ἐκεῖ
  english_pob_choice: he died there
  chosen_spanish: murió allí
  alternatives_spanish:
  - murió allí mismo
  - falleció allí
  lexicon: LSJ
  rationale: El cierre es breve y factual. «Murió allí» mantiene la sobriedad del griego sin intensificar con una fórmula no presente en el texto.
translation_notes:
  revision_awareness: La traducción sigue de cerca el texto griego de Swete y el audit trail inglés. No se introdujeron cambios doctrinales ni ajustes textuales; se mantuvo la ambigüedad verbal de ὑπέθηκεν αὐτῷ mediante una formulación española igualmente abierta.
  spanish_consistency_notes:
  - Se evitó «dio muerte» o «dio muerte allí» por sonar más literario que el griego breve y narrativo.
  - Se prefirió «elefante» sin artículo adicional en la nota principal para respetar la concreción del relato.
  - 'La secuencia verbal conserva el paralelismo de acciones del original: entrada, ataque, muerte, caída, muerte final del protagonista.'
