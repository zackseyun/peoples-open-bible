revisions:
- from: No te justifiques delante de un rey, ni muestres entendimiento delante de un rey.[a]
  to: No te justifiques delante de un rey, ni hagas alarde de entendimiento delante de un rey.[a]
  rationale: Se conserva la fidelidad al hebreo y la nota sobre la variante griega, pero se sustituye «muestras entendimiento» por «hagas alarde de entendimiento» para lograr un español más natural y acorde con el matiz social de exhibir discernimiento ante un rey.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:32:41Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el hebreo como texto principal y preserva bien el paralelismo: prohibición de justificarse y de exhibir entendimiento ante un rey. También conserva adecuadamente la variante griega en nota. Sin embargo, «muestres entendimiento» suena algo calcado y menos natural en español que una formulación equivalente que mantenga el sentido social de exhibir discernimiento.'
  spanish_quality_summary: La redacción es clara y fiel, pero puede mejorarse en naturalidad y dignidad estilística. «No te justifiques delante de un rey» está bien. En la segunda cola, «ni muestres entendimiento» es comprensible, pero en español bíblico general suena poco idiomático; «ni hagas alarde de entendimiento» comunica mejor el matiz de presentarse como entendido ante el rey sin alejarse del sentido fuente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La nota textual está bien orientada, aunque «dominio del Señor» podría sonar algo menos natural que «dominio de parte del Señor» o «gobierno del Señor»; aun así, como es nota de variante, el punto principal es informar la divergencia.
  issues:
  - severity: medium
    issue: «muestres entendimiento» es poco idiomático en español
    rationale: Aunque reproduce de cerca el inglés auditado, en español suena forzado. El hebreo apunta a exhibir discernimiento o hacerse pasar por entendido en contexto cortesano; una formulación más natural mejora la legibilidad sin perder fidelidad.
  - severity: low
    issue: La nota está anclada al final del versículo en vez de junto al segmento afectado
    rationale: La variante griega afecta al versículo completo, así que el anclaje final no es incorrecto; no obstante, conviene mantenerlo claro y limpio en el texto revisado.
  revised_spanish_text: No te justifiques delante de un rey, ni hagas alarde de entendimiento delante de un rey.[a]
  revised_footnotes:
  - marker: a
    text: 'El griego dice: «No busques dominio del Señor, ni un asiento de gloria de parte de un rey». El testimonio hebreo seguido aquí difiere sustancialmente.'
    reason: textual_variant
  revision_rationale: Se conserva la fidelidad al hebreo y la nota sobre la variante griega, pero se sustituye «muestras entendimiento» por «hagas alarde de entendimiento» para lograr un español más natural y acorde con el matiz social de exhibir discernimiento ante un rey.
