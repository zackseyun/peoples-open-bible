theological_decisions:
- issue: Meaning of 'saved' in the Ahikar and Manasseh clauses
  chosen_reading: Temporal deliverance from mortal danger
  alternative_readings:
  - Spiritual salvation
  rationale: In this wisdom-narrative context, the repeated σῴζω language refers to rescue from plots and death rather than a developed doctrine of eternal salvation. The English keeps 'saved' as the lexical equivalent but the rationale clarifies the narrative sense.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
- issue: Rendering ἐλεημοσύνη
  chosen_reading: acts of mercy
  alternative_readings:
  - almsgiving
  rationale: Tobit strongly values charitable righteousness, and ἐλεημοσύνη can specifically denote almsgiving. Here 'acts of mercy' preserves the broader ethical sense while remaining compatible with almsgiving as a subset; the narrower alternative is preserved in a footnote.
  doctrine_reference: Consistency of key terms, or documented exception.
