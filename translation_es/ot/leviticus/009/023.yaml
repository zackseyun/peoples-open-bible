review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del hebreo: Moisés y Aarón entran en el אוהל מועד, salen, bendicen al pueblo, y la gloria de Yahvé se manifiesta a todo el pueblo. También acierta al usar "Yahvé" para יְהוָה y "tienda de reunión" para אֹהֶל מוֹעֵד. El único desajuste relevante es "se apareció", que en español suele requerir complemento indirecto personal y aquí suena menos natural y algo impropio para "la gloria"; "apareció" preserva mejor וַיֵּרָא.'
  spanish_quality_summary: La redacción es clara y digna, pero "la gloria de Yahvé se apareció a todo el pueblo" suena forzada en español general. "Apareció a todo el pueblo" es más natural, más literario en buen sentido, y mantiene el matiz teofánico sin añadir interpretación. También conviene mantener la coordinación con comas tal como está.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → "Yahvé", כְבוֹד → "gloria", הָעָם / כָּל הָעָם → "el pueblo / todo el pueblo". No hay conflicto terminológico salvo la elección verbal para וַיֵּרָא, donde "apareció" encaja mejor que "se apareció" en español bíblico-natural.'
  issues:
  - severity: medium
    issue: Uso de "se apareció" con sujeto "la gloria de Yahvé"
    rationale: Aunque intenta reflejar una manifestación visible, en español neutral y eclesial "la gloria de Yahvé apareció a todo el pueblo" suena más natural que "se apareció". La forma pronominal suele percibirse como más marcada o asociada a apariciones personales, mientras que aquí el sujeto es "la gloria".
  revised_spanish_text: Moisés y Aarón entraron en la tienda de reunión, salieron y bendijeron al pueblo, y la gloria de Yahvé apareció a todo el pueblo.
  revision_rationale: Se reemplaza "se apareció" por "apareció" para lograr un español más natural y fiel al valor de manifestación visible de וַיֵּרָא, sin cambiar el sentido ni la secuencia narrativa del hebreo.
