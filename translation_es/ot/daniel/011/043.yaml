  glossary_alignment: No hay términos del glosario base en conflicto directo. «Cusitas» alinea bien con la preferencia del proyecto por preservar Cush frente a «etíopes». No hay nombres divinos ni títulos mesiánicos implicados. La elección de «séquito» es compatible con la racionalidad documentada para בְּמִצְעָדָיו.
