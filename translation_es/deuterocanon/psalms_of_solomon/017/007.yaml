translation:
  language: es
  text: Y no glorificaron tu nombre honrado[a]; en gloria establecieron un reino en lugar de su exaltación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu nombre estimado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἐδόξασαν
  english_pob_choice: did not glorify
  chosen_spanish: no glorificaron
  alternatives_spanish:
  - no honraron
  - no dieron gloria a
  lexicon: LSJ
  rationale: δοξάζω expresa dar gloria u honra. «Glorificaron» conserva la fuerza verbal y mantiene el destinatario divino explícito, con un registro natural en español bíblico contemporáneo.
- source_word: τὸ ὄνομά σου τὸ ἔντιμον
  english_pob_choice: your honored name
  chosen_spanish: tu nombre honorable
  alternatives_spanish:
  - tu nombre honrado
  - tu nombre estimado
  lexicon: LSJ
  rationale: ἔντιμος significa digno de honor, honorable o estimado. «Nombre honorable» sigue de cerca la cualidad del nombre sin perder fluidez en español.
- source_word: ἐν δόξῃ
  english_pob_choice: in glory
  chosen_spanish: con gloria
  alternatives_spanish:
  - en gloria
  - en esplendor
  lexicon: LSJ
  rationale: δώξῃ puede llevar el matiz de gloria, honor o esplendor. «Con gloria» comunica el modo o marco de la acción con una sintaxis natural en español y sin cargarla de resonancias divinas no exigidas aquí.
- source_word: ἔθεντο
  english_pob_choice: they set
  chosen_spanish: establecieron
  alternatives_spanish:
  - pusieron
  - erigieron
  - instalaron
  lexicon: BDAG
  rationale: τίθημι aquí tiene el sentido de colocar o स्थापितablish. «Establecieron» refleja mejor la idea de instituir un reino que una mera colocación física.
- source_word: βασίλειον
  english_pob_choice: a kingdom
  chosen_spanish: un reino
  alternatives_spanish:
  - un reinado
  - una soberanía
  - una casa real
  lexicon: LSJ
  rationale: El sustantivo puede referirse a reino o dominio real. «Reino» es la opción más directa y comprensible en este contexto político.
- source_word: ἀντὶ ὕψους αὐτῶν
  english_pob_choice: in place of their own exaltation
  chosen_spanish: en lugar de su exaltación
  alternatives_spanish:
  - en vez de su altura
  - por su exaltación
  - a cambio de su exaltación
  lexicon: LSJ
  rationale: La frase griega es compacta y admite tensión entre «en lugar de» y un sentido causal en la recepción. La revisión más reciente del audit trail volvió al valor locativo/comparativo de ἀντί; en español conviene mantener esa relación sin introducir «arrogancia» que no está en el griego de forma explícita.
theological_decisions:
- issue: Tratamiento del nombre divino y la alabanza debida
  english_pob_reading: your honored name
  chosen_spanish_reading: tu nombre honorable
  alternative_spanish_readings:
  - tu nombre honrado
  - tu nombre estimado
  rationale: El texto se dirige a Dios y expresa la falta de glorificación de su nombre. «Honorable» conserva la idea de un nombre digno de honor sin reemplazarla por una fórmula eclesiástica más interpretativa.
  doctrine_reference: Nombre de Dios / reverencia al nombre divino
- issue: Sentido de ἀντὶ ὕψους αὐτῶν
  english_pob_reading: in place of their own exaltation
  chosen_spanish_reading: en lugar de su exaltación
  alternative_spanish_readings:
  - a cambio de su exaltación
  - por su exaltación
  rationale: Se preserva la tensión interpretativa del griego sin añadir una explicación moral como «arrogancia». El español deja abierta la relación exacta entre el reino establecido y la elevación de ellos, conforme al texto fuente y al historial de revisión.
  doctrine_reference: Humillación/exaltación; legitimidad del poder
translation_notes:
  revision_awareness: 'El audit trail muestra una oscilación importante en la última cola de la frase: una revisión interpretó ἀντὶ ὕψους αὐτῶν causalmente («por su arrogancia»), pero la revisión más reciente volvió a una lectura más cercana a la sintaxis griega («en lugar de su exaltación»). La redacción española sigue esta última decisión y evita importar «arrogancia» al texto principal.'
  spanish_consistency_notes:
  - Se mantiene «glorificaron» para δοξάζω, en línea con el valor verbal fuerte del griego.
  - Se traduce τὸ ἔντιμον con un adjetivo relacional («honorable») para conservar el matiz de honor.
  - «Reino» reproduce βασίλειον sin ampliar a «reinado» o «soberanía», que serían más interpretativos.
  - La preposición «con» en «con gloria» ofrece un equivalente idiomático de ἐν δόξῃ sin alterar el sentido.
  - Se conserva «en lugar de» para ἀντὶ, respetando la revisión final del expediente.
