    text: 'Paralelo griego: «Por tanto, avergüéncense ante mi palabra; porque no es bueno conservar toda vergüenza, y no todo es aprobado por todos en la fe». La cláusula final griega difiere de manera notable del hebreo conservado.'
    reason: alternative_reading
  - marker: b
    text: «Hijos» traduce el vocativo masculino hebreo y conserva la forma sapiencial del maestro que habla a sus oyentes.
    reason: cultural_note
  revision_rationale: Se reubicó la nota cultural en «hijos», donde realmente corresponde. Se ajustó «es buena para conservarla» a «conviene conservar» para reflejar mejor נאה como lo apropiado o conveniente. Se cambió «justamente elegida» por «digna de ser escogida» para conservar el matiz de נבחר con un español más natural y claro. También se movió la nota del paralelo griego al sintagma «mis juicios», que es el punto donde el griego diverge con «mi palabra».
