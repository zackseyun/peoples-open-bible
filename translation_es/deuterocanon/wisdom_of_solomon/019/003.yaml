translation:
  language: es
  text: Porque mientras todavía tenían su duelo en las manos y seguían lamentándose sobre las tumbas de los muertos[a], concibieron otro plan de necedad[b], y a aquellos a quienes habían expulsado con súplicas, a estos los perseguían como fugitivos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego, literalmente: «teniendo el duelo en las manos», un giro vívido que probablemente alude a seguir ocupados con ritos o señales de luto.'
    reason: cultural_note
  - marker: b
    text: 'O: «otro pensamiento de necedad» / «otro designio insensato».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, los mismos a quienes antes habían urgido a salir, después los perseguían como fugitivos.
    reason: cross_reference
lexical_decisions:
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía seguían
  lexicon: LSJ
  rationale: Expresa continuidad temporal de manera natural en español y conserva el matiz de acción en curso.
- source_word: ἐν χερσὶν ἔχοντες τὰ πένθη
  english_pob_choice: had their mourning in their hands
  chosen_spanish: tenían su duelo en las manos
  alternatives_spanish:
  - llevaban su duelo en las manos
  - tenían sus signos de duelo en las manos
  lexicon: LSJ
  rationale: Mantiene la imagen concreta del griego sin explicarla del todo, preservando el giro idiomático y su fuerza visual.
- source_word: πένθη
  english_pob_choice: mourning
  chosen_spanish: duelo
  alternatives_spanish:
  - luto
  - mourning
  lexicon: LSJ
  rationale: «Duelo» comunica el estado o expresión de luto en un español natural y solemne; conserva el sentido colectivo del plural griego.
- source_word: προσοδυρόμενοι
  english_pob_choice: were still lamenting
  chosen_spanish: seguían lamentándose
  alternatives_spanish:
  - seguían plañendo
  - seguían gimiendo
  lexicon: LSJ
  rationale: Reproduce la continuidad de la acción y el lamento audible o expresado, sin volverlo demasiado arcaico.
- source_word: τάφους νεκρῶν
  english_pob_choice: the graves of the dead
  chosen_spanish: las tumbas de los muertos
  alternatives_spanish:
  - los sepulcros de los muertos
  - las tumbas de los difuntos
  lexicon: LSJ
  rationale: «Tumbas» es claro y fiel; «muertos» sigue de cerca el genitivo del griego y conserva la sobriedad del enunciado.
- source_word: ἕτερον ἐπεσπάσαντο λογισμὸν ἀνοίας
  english_pob_choice: they conceived another plan of folly
  chosen_spanish: concibieron otro plan de necedad
  alternatives_spanish:
  - concibieron otro pensamiento de necedad
  - adoptaron otro plan necio
  lexicon: LSJ
  rationale: «Concibieron» refleja bien el surgimiento interno del designio; «plan de necedad» conserva la relación formal entre λογισμός y ἀνοίας sin suavizarla.
- source_word: ἐπεσπάσαντο
  english_pob_choice: they conceived / took up
  chosen_spanish: concibieron
  alternatives_spanish:
  - adoptaron
  - tomaron
  lexicon: LSJ
  rationale: En este contexto, el verbo medio apunta a asumir o formar un curso de pensamiento; «concibieron» expresa mejor el inicio mental del designio.
- source_word: λογισμὸν
  english_pob_choice: plan / thought
  chosen_spanish: plan
  alternatives_spanish:
  - pensamiento
  - designio
  lexicon: LSJ
  rationale: «Plan» es adecuado porque el contexto describe una decisión práctica; «pensamiento» sería más ambiguo para el lector español.
- source_word: ἀνοίας
  english_pob_choice: folly / senselessness
  chosen_spanish: necedad
  alternatives_spanish:
  - insensatez
  - locura
  lexicon: LSJ
  rationale: «Necedad» transmite bien la falta de juicio moral e intelectual y suena natural en español bíblico contemporáneo.
- source_word: οὓς ἱκετεύοντες ἐξέβαλον
  english_pob_choice: those whom they had cast out with entreaties
  chosen_spanish: a los mismos a quienes habían echado con ruegos
  alternatives_spanish:
  - a quienes habían expulsado con súplicas
  - a quienes habían sacado rogándoles
  lexicon: LSJ
  rationale: '«Echado con ruegos» conserva la tensión irónica del griego: expulsión acompañada de súplica, sin añadir detalles ajenos al texto.'
- source_word: ἱκετεύοντες
  english_pob_choice: with entreaties / pleading
  chosen_spanish: con ruegos
  alternatives_spanish:
  - con súplicas
  - rogándoles
  lexicon: LSJ
  rationale: «Ruegos» es idiomático y transmite la idea de entreaty o urgente petición con suficiente solemnidad.
- source_word: ἐξέβαλον
  english_pob_choice: cast out
  chosen_spanish: habían echado
  alternatives_spanish:
  - habían expulsado
  - habían arrojado
  lexicon: LSJ
  rationale: «Echar» es directo y natural en español; mantiene el sentido de expulsión sin sobreformalizarlo.
- source_word: τούτους ὡς φυγάδας ἐδίωκον
  english_pob_choice: these they pursued as fugitives
  chosen_spanish: a estos los perseguían como fugitivos
  alternatives_spanish:
  - a estos los perseguían como huidos
  - los perseguían como si fueran fugitivos
  lexicon: LSJ
  rationale: 'Conserva la ironía del contraste: quienes antes fueron echados son luego tratados como fugitivos.'
theological_decisions:
- issue: Ironía histórica en el reverso de la relación entre Egipto e Israel
  english_pob_reading: Render the contrast plainly without importing Exodus details beyond the Greek text.
  chosen_spanish_reading: Mantener la reversión irónica de expulsar y luego perseguir, sin ampliar el relato con datos externos.
  alternative_spanish_readings:
  - Explicar explícitamente que primero les rogaron salir y después los persiguieron al mar
  - Reforzar con una glosa narrativa el contexto del Éxodo
  rationale: El versículo ya contiene la ironía en la secuencia verbal; la traducción la conserva sin añadir información que el griego no dice aquí.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor semántico de λογισμὸν ἀνοίας
  english_pob_reading: another foolish plan / another thought of folly
  chosen_spanish_reading: otro plan de necedad
  alternative_spanish_readings:
  - otro pensamiento de necedad
  - otro designio insensato
  rationale: La combinación mantiene la fuerza moral del sustantivo abstracto sin diluirla en una simple calificación adjetival.
  doctrine_reference: Lexical precision and source transparency
translation_notes:
  revision_awareness: 'Se siguió la revisión final del inglés POB: se prefirió una formulación más formal para λογισμὸν ἀνοίας («plan de necedad») y se conservó la ironía de ἱκετεύοντες ἐξέβαλον con una frase española que mantenga expulsión + ruego, sin expandir el contexto narrativo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evitó «Cristo/Mesías» por no ser pertinente al texto.
  - Se mantuvo un registro bíblico moderno y solemne, evitando arcaísmos innecesarios.
  - «Duelo» y «tumbas» se eligieron por claridad y tono, sin perder la imaginería fúnebre del griego.
