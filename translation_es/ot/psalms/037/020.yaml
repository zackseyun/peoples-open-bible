translation:
  language: es
  text: Porque los impíos perecerán[a], y los enemigos de Yahvé, como la gloria de los pastos, se desvanecen; como humo se desvanecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo una interpretación tradicional: «como la grasa de los corderos». La frase hebrea es difícil.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, ya que
  lexicon: HALOT
  rationale: Introduce una explicación o razón para la afirmación anterior; en español, «Porque» conserva mejor el valor causal/explanatorio que una mera continuidad narrativa.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los culpables
  lexicon: HALOT
  rationale: «Impíos» es una opción natural en registro bíblico para רשעים y mantiene el sentido moral fuerte sin sonar excesivamente técnico.
- source_word: יֹאבֵדוּ
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - desaparecerán
  lexicon: HALOT
  rationale: El verbo expresa ruina o desaparición; «perecerán» conserva el futuro y la fuerza de ruina sin reducirlo a una sola modalidad de pérdida.
- source_word: וְאֹיְבֵי יְהוָה
  english_pob_choice: and the enemies of Yahweh
  chosen_spanish: y los enemigos de Yahvé
  alternatives_spanish:
  - y los enemigos de Yahvé
  - y los enemigos de Yahvé Dios
  lexicon: HALOT
  rationale: Se conserva la relación posesiva con el nombre divino. «Yahvé» sigue el criterio del proyecto para יְהוָה y evita la sustitución por un título.
- source_word: כִּיקַר כָּרִים
  english_pob_choice: like the glory of the pastures
  chosen_spanish: como la gloria de los pastos
  alternatives_spanish:
  - como el esplendor de los pastos
  - como la riqueza de los pastos
  lexicon: HALOT
  rationale: La frase hebrea es difícil; se mantiene el sentido MT-oriented de יקר como «gloria»/«esplendor» y כרים como «pastos». «Pastos» es más natural en español que «prados» y conserva la imagen poética del texto base.
- source_word: כָּלוּ
  english_pob_choice: they vanish
  chosen_spanish: se desvanecen
  alternatives_spanish:
  - desaparecen
  - se esfuman
  lexicon: HALOT
  rationale: Este verbo aparece dos veces y su valor es el de consumirse/desaparecer. «Se desvanecen» funciona bien con la metáfora del humo y permite preservar la repetición.
- source_word: בֶעָשָׁן
  english_pob_choice: like smoke
  chosen_spanish: como humo
  alternatives_spanish:
  - en humo
  - con humo
  lexicon: HALOT
  rationale: 'La preposición beth aquí se expresa naturalmente con un comparativo en español: «como humo». Mantiene el paralelismo con la imagen del desvanecerse.'
- source_word: כָּלוּ
  english_pob_choice: they vanish away
  chosen_spanish: se desvanecen
  alternatives_spanish:
  - se consumen
  - se acaban
  lexicon: HALOT
  rationale: La repetición del verbo se conserva en español para reflejar el énfasis poético de la desaparición total, evitando una paráfrasis más libre.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahvé
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Se sigue la norma del proyecto de no sustituir el nombre divino por un título, y se adapta a la forma española «Yahvé» como transliteración reverente y reconocible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretación de כִּיקַר כָּרִים
  english_pob_reading: like the glory of the pastures
  chosen_spanish_reading: como la gloria de los pastos
  alternative_spanish_readings:
  - como la grasa de los corderos
  - como el esplendor de los pastos
  rationale: La frase es semánticamente difícil y admite más de una lectura. Se preserva la opción orientada al texto consonántico y a la imagen poética, sin ocultar la interpretación tradicional alternativa que el inglés POB anotó.
  doctrine_reference: 'Translation philosophy #3: preserve theological/interpretive tension rather than resolve it silently'
translation_notes:
  revision_awareness: El borrador sigue de cerca el último pase revisionado, que no introdujo cambios, y mantiene la tensión interpretativa documentada para כִּיקַר כָּרִים en lugar de resolverla de forma silenciosa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al criterio del proyecto.
  - Se conserva la repetición de כָּלוּ con una misma raíz verbal en español para reflejar el paralelismo poético.
  - «Impíos» y «enemigos de Yahvé» mantienen un registro bíblico claro sin recurrir a un lenguaje eclesiástico más tradicional que el texto no exige.
