translation:
  language: es
  text: Y los egipcios nos trataron mal[a], nos afligieron[b], y nos impusieron una dura labor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'nos trataron con dureza' para 'nos trataron mal'.
    reason: lexical_alternative
  - marker: b
    text: O 'nos oprimieron' para 'nos afligieron'.
    reason: lexical_alternative
  - marker: c
    text: O 'nos impusieron una carga pesada' para 'nos impusieron una dura labor'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרֵעוּ
  english_pob_choice: treated us badly
  chosen_spanish: nos trataron mal
  alternatives_spanish:
  - nos trataron con dureza
  - nos hicieron daño
  - nos maltrataron
  lexicon: HALOT
  rationale: El verbo hebreo expresa hacer el mal o tratar de forma dañina. "Nos trataron mal" reproduce de manera natural y fiel la idea general de trato perjudicial sin añadir más violencia de la que el verbo exige.
- source_word: הַמִּצְרִים
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - egipcios
  lexicon: HALOT
  rationale: Es la designación étnica/nacional definida del grupo opresor. En español, el artículo definido conserva la referencia colectiva histórica.
- source_word: וַיְעַנּוּנוּ
  english_pob_choice: afflicted us
  chosen_spanish: nos afligieron
  alternatives_spanish:
  - nos oprimieron
  - nos humillaron
  - nos maltrataron
  lexicon: HALOT
  rationale: El piel de ענה abarca afligir, oprimir o humillar. "Nos afligieron" mantiene el sufrimiento impuesto y distingue este verbo del anterior sin reducirlo a una sola noción.
- source_word: וַיִּתְּנוּ עָלֵינוּ
  english_pob_choice: laid on us
  chosen_spanish: nos impusieron
  alternatives_spanish:
  - pusieron sobre nosotros
  - cargaron sobre nosotros
  - nos impusieron sobre
  lexicon: HALOT
  rationale: La construcción idiomática נתן על expresa colocar o imponer una carga. "Nos impusieron" comunica bien la idea de una carga obligada en español y prepara la expresión siguiente.
- source_word: עֲבֹדָה קָשָׁה
  english_pob_choice: hard labor
  chosen_spanish: una dura labor
  alternatives_spanish:
  - un trabajo duro
  - una labor severa
  - un duro servicio
  lexicon: HALOT
  rationale: עֲבֹדָה puede ser labor, trabajo o servicio, y קָשָׁה significa duro o severo. "Una dura labor" conserva el sentido de trabajo forzado y pesado sin sobrecargar el verso con una formulación más técnica.
theological_decisions:
- issue: Mantener los tres verbos de opresión como movimientos distintos
  english_pob_reading: 'Use three differentiated expressions: ''treated us badly,'' ''afflicted us,'' and ''laid hard labor on us.'''
  chosen_spanish_reading: 'Usar tres expresiones diferenciadas: "nos trataron mal", "nos afligieron" y "nos impusieron una dura labor".'
  alternative_spanish_readings:
  - Concentrar los dos primeros verbos en una sola idea de opresión
  - Reforzar cada cláusula con terminología más explícita de esclavitud
  rationale: El hebreo presenta una secuencia de verbos relacionados pero no idénticos para recordar la opresión en Egipto. Separarlos en español conserva la progresión retórica y evita borrar tensiones léxicas del texto fuente.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El contexto de auditoría inglesa muestra acuerdo alto y sin revisiones aplicadas; se preserva la diferenciación verbal del hebreo y se adapta a un español natural sin ampliar el contenido.
  spanish_consistency_notes:
  - Se mantiene el paralelismo verbal del original con tres cláusulas coordinadas.
  - '"Egipcios" se conserva con artículo definido por tratarse de un grupo histórico específico.'
  - '"Labor" se usa para reflejar el campo semántico de עֲבֹדָה sin convertirlo en una paráfrasis técnica.'
