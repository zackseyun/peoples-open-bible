translation:
  language: es
  text: acerca de la ley del Altísimo y del estatuto,[a] y acerca de quien justifica al impío.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo aquí dice «estatuto»; el paralelo griego dice «pacto».
    reason: alternative_reading
  - marker: b
    text: 'O: «acerca de un juicio para justificar al impío» o «acerca de un juicio que declara justo al impío». El hebreo להצדיק y el griego δικαιῶσαι son términos forenses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ περὶ τούτων αἰσχυνθῇς
  english_pob_choice: about these things do not be ashamed
  chosen_spanish: No te avergüences de estas cosas
  alternatives_spanish:
  - No te avergüences por estas cosas
  - No sientas vergüenza por estas cosas
  lexicon: LSJ / BDAG / HALOT context
  rationale: El imperativo negativo expresa una prohibición directa; «te avergüences» comunica bien αἰσχυνθῇς en español natural y mantiene el tono sapiencial.
- source_word: μὴ λάβῃς πρόσωπον τοῦ ἁμαρτάνειν
  english_pob_choice: do not take face of sinning
  chosen_spanish: ni tomes apariencia de pecar
  alternatives_spanish:
  - ni hagas acepción para pecar
  - ni adoptes apariencia de pecar
  lexicon: LSJ / BDAG
  rationale: La expresión griega es idiomática y difícil; «tomar apariencia» conserva la imagen de πρόσωπον/prosōpon sin suavizarla demasiado. Se entiende como asumir una apariencia o postura que conduce al pecado.
- source_word: νόμου Ὑψίστου
  english_pob_choice: the law of the Most High
  chosen_spanish: la ley del Altísimo
  alternatives_spanish:
  - la instrucción del Altísimo
  - la ley del Dios Altísimo
  lexicon: HALOT / LXX usage
  rationale: «Ley» preserva el valor jurídico de νόμος en este contexto de preceptos y juicio. «Altísimo» traduce Ὑψίστου de manera directa y reverente.
- source_word: διαθήκης
  english_pob_choice: the covenant
  chosen_spanish: del pacto
  alternatives_spanish:
  - de la alianza
  - del convenio
  lexicon: BDAG / LXX / biblical Spanish usage
  rationale: En registro bíblico español, «pacto» es la forma más amplia y reconocible para διαθήκη. Además armoniza con el paralelismo legal del versículo.
- source_word: κρίματος
  english_pob_choice: a judgment
  chosen_spanish: una sentencia
  alternatives_spanish:
  - un juicio
  - un fallo
  lexicon: BDAG / LSJ
  rationale: Aquí κρίμα tiene sentido forense; «sentencia» comunica el acto/judicio judicial con claridad en español y evita ambigüedad con el proceso de juzgar.
- source_word: δικαιῶσαι
  english_pob_choice: to justify
  chosen_spanish: justifica
  alternatives_spanish:
  - declara justo
  - vindica
  lexicon: BDAG / HALOT / jurisprudential usage
  rationale: Se conserva la fuerza forense de δικαιῶσαι. «Justifica» mantiene la tensión teológica documentada por el texto y el audit trail, sin introducir una paráfrasis devocional.
- source_word: τὸν ἀσεβῆ
  english_pob_choice: the wicked / the ungodly
  chosen_spanish: al impío
  alternatives_spanish:
  - al malvado
  - al injusto
  lexicon: BDAG / LXX usage
  rationale: «Impío» reproduce bien ἀσεβῆ, especialmente en un contexto de juicio y fidelidad al pacto; mantiene el matiz de irreverencia, no solo de maldad moral.
theological_decisions:
- issue: Mantener la tensión forense de δικαιῶσαι / להצדיק
  english_pob_reading: one who justifies the wicked
  chosen_spanish_reading: una sentencia que justifica al impío
  alternative_spanish_readings:
  - uno que justifica al impío
  - una sentencia que declara justo al impío
  - una sentencia que vindica al impío
  rationale: El texto hebreo y el griego apuntan a un lenguaje judicial. En español, «justifica» preserva esa fuerza y deja abierta la tensión teológica sin resolverla con un vocabulario más doctrinal que el del pasaje.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; keep forensic language where present.'
- issue: Tratamiento de διαθήκη en un contexto sapiencial/legal
  english_pob_reading: the covenant
  chosen_spanish_reading: el pacto
  alternative_spanish_readings:
  - la alianza
  - el convenio
  rationale: «Pacto» es el equivalente bíblico más estable en español y conserva el vínculo entre ley, relación y obligación. No se opta por «alianza» para evitar un desplazamiento estilístico no exigido por el contexto.
  doctrine_reference: Project Spanish terminology defaults for διαθήκη / covenant language.
translation_notes:
  revision_awareness: 'Se siguió el auditable del inglés POB, pero se ajustó la estructura al griego/hebreo: la cláusula final se conserva como forense («justifica al impío»), y se reflejó la variante textual entre el hebreo breve y el paralelo griego que añade «el pacto».'
  spanish_consistency_notes:
  - Se usó «Altísimo» como traducción estable de Ὑψίστου.
  - Se eligió «pacto» para διαθήκη según el uso bíblico español, manteniendo la alternativa «alianza» solo como posibilidad.
  - «Impío» conserva el matiz de ἀσεβῆ sin suavizarlo a una simple descripción moral.
  - La frase inicial intenta reflejar el modismo griego sin inventar una explicación interpretativa que el texto no da.
