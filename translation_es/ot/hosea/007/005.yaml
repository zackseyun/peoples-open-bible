base_translation:
  language: en
  yaml_path: translation/ot/hosea/007/005.yaml
  text: On the day of our king[a], the princes made themselves sick with the heat of wine[c][b]; he stretched out his hand with mockers.
  footnotes:
  - marker: a
    text: Or 'On our king's day'; some understand this as a royal feast day, but 'day of our king' is the more literal wording.
    reason: lexical_alternative
  - marker: b
    text: '''The heat of wine'' may also be understood as ''wine''s burning'' or, less likely, ''the poison of wine.'''
    reason: lexical_alternative
  - marker: c
    text: That is, he associated himself with scoffers by extending his hand to them.
    reason: cultural_note
