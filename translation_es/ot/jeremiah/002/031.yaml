translation:
  language: es
  text: '«¡Generación, ustedes mismos, vean la palabra de Yahvé! ¿Acaso he sido yo un desierto para Israel, o una tierra de profunda oscuridad? ¿Por qué ha dicho mi pueblo: “Somos señores[a]; no volveremos a ti”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Vagamos», «gobernamos» o «nos hemos soltado». El verbo hebreo es difícil, pero en este contexto expresa una afirmación de independencia frente a Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדּוֹר
  english_pob_choice: O generation
  chosen_spanish: Oh generación
  alternatives_spanish:
  - Ustedes, generación
  - Esta generación
  lexicon: HALOT
  rationale: Mantiene el vocativo profético directo. «Oh» conserva el tono de llamada solemne sin volver la frase forzada en español.
- source_word: אַתֶּם
  english_pob_choice: you yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - ustedes
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis; «ustedes mismos» refleja esa focalización en español de manera natural.
- source_word: רְאוּ
  english_pob_choice: see
  chosen_spanish: escuchen
  alternatives_spanish:
  - vean
  - consideren
  lexicon: HALOT
  rationale: Aquí el imperativo funciona como llamada a atender con seriedad la palabra profética. En español, «escuchen» comunica mejor ese acto de prestar atención que un simple «vean», aunque se conserva el impulso exhortativo del hebreo.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: «Palabra» mantiene el registro profético-covenantal; «Yahvé» sigue el estándar del proyecto para el nombre divino, evitando la sustitución por un título.
- source_word: הֲמִדְבָּר הָיִיתִי לְיִשְׂרָאֵל
  english_pob_choice: Have I been a wilderness to Israel
  chosen_spanish: ¿Acaso he sido yo un desierto para Israel?
  alternatives_spanish:
  - ¿He sido yo un desierto para Israel?
  - ¿Acaso fui un desierto para Israel?
  lexicon: HALOT
  rationale: «Desierto» conserva la imagen de un lugar inhóspito y desabastecido; la forma interrogativa mantiene la fuerza retórica del hebreo.
- source_word: אִם אֶרֶץ מַאְפֵּלְיָה
  english_pob_choice: or a land of deep darkness
  chosen_spanish: o una tierra de densa oscuridad
  alternatives_spanish:
  - o una tierra de profunda oscuridad
  - o una tierra de tinieblas
  lexicon: HALOT
  rationale: «Densa oscuridad» transmite bien la intensidad de מַאְפֵּלְיָה sin sonar demasiado literal o abstracto en español.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A causa de qué
  - ¿Por qué razón
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  lexicon: HALOT
  rationale: «Pueblo» conserva el tono de pertenencia del pacto y su resonancia bíblica.
- source_word: רַדְנוּ
  english_pob_choice: We are lords
  chosen_spanish: Somos señores
  alternatives_spanish:
  - Somos libres
  - Nos hemos soltado
  - Mandamos
  lexicon: HALOT
  rationale: El hebreo es difícil y la tradición de la POB documenta la tensión semántica con opciones de independencia o dominio. «Somos señores» conserva la fuerza de autonomía/autoafirmación sin borrar la ambigüedad del verbo.
- source_word: לֹא נָבוֹא עוֹד אֵלֶיךָ
  english_pob_choice: we will come to you no more
  chosen_spanish: no volveremos a ti
  alternatives_spanish:
  - no iremos más a ti
  - no volveremos hacia ti nunca más
  lexicon: HALOT
  rationale: «Volveremos» comunica la cesación de acercamiento o retorno. En español resulta más idiomático que una traducción demasiado literal de «vendremos».
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue el defecto del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre propio del Dios del pacto en vez de sustituirlo por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de רַדְנוּ en la protesta del pueblo
  english_pob_reading: We are lords
  chosen_spanish_reading: Somos señores
  alternative_spanish_readings:
  - Somos libres
  - Nos hemos soltado
  - Somos independientes
  rationale: La frase expresa una ruptura arrogante con Yahvé. «Somos señores» mantiene la nota de autoexaltación y autonomía que la auditoría inglesa decidió preservar, sin resolver de manera excesiva la ambigüedad verbal.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
translation_notes:
  revision_awareness: La auditoría inglesa muestra una revisión reciente de la interpretación de רַדְנוּ, pasando de una lectura de independencia («We are free to roam») a una formulación más cercana a dominio/autorreferencia («We are lords»). La redacción española adopta la lectura revisada y, a la vez, preserva la tensión semántica del verbo con una formulación que suena bíblica y no excesivamente interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se prefirió «pueblo» para עַמִּי por su carga de pacto.
  - «Desierto» y «densa oscuridad» mantienen las imágenes negativas del contraste retórico.
  - La frase final se traduce con negación de retorno para reflejar לֹא נָבוֹא עוֹד אֵלֶיךָ sin forzar el verbo en español.
