translation:
  language: es
  text: Llegó a Ptolemaida. Los habitantes de Ptolemaida estaban descontentos por los términos, porque estaban sumamente atemorizados[a]; querían dejar sin efecto las disposiciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto fuente de este versículo está marcado con desajuste de validación; esta traducción sigue el griego transmitido, aunque algunos detalles léxicos son menos seguros de lo habitual.
    reason: textual_variant
  - marker: b
    text: O «estipulaciones»; el sustantivo griego es poco común y probablemente se refiere a las disposiciones específicas del arreglo o acuerdo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν εἰς Πτολεμαΐδα
  english_pob_choice: He came to Ptolemais
  chosen_spanish: Él llegó a Ptolemaida
  alternatives_spanish:
  - Él fue a Ptolemaida
  - Llegó a Ptolemaida
  lexicon: N/A
  rationale: El verbo ἦλθεν admite la idea simple de llegar; en español, «llegó» suena natural y conserva el movimiento narrativo. Se mantiene el topónimo en forma castellana usual «Ptolemaida».
- source_word: ἐδυσφόρουν
  english_pob_choice: were displeased
  chosen_spanish: estaban descontentos
  alternatives_spanish:
  - estaban disgustados
  - estaban molestos
  - mostraban desagrado
  lexicon: LSJ
  rationale: El verbo expresa una reacción negativa ante las condiciones pactadas, pero sin exigir una ira fuerte. «Descontentos» comunica bien la insatisfacción política sin exagerar el tono.
- source_word: συνθηκῶν
  english_pob_choice: terms
  chosen_spanish: las condiciones
  alternatives_spanish:
  - los términos
  - las estipulaciones
  - las cláusulas
  lexicon: LSJ
  rationale: En contexto diplomático o de pacto, el plural se refiere a las condiciones negociadas. «Condiciones» es claro en español y evita la posible dureza de un calco como «términos».
- source_word: ἐδειλίαζον ὑπεράγαν
  english_pob_choice: were exceedingly fearful
  chosen_spanish: estaban excesivamente atemorizados
  alternatives_spanish:
  - estaban muy temerosos
  - estaban sumamente acobardados
  - sentían gran temor
  lexicon: LSJ
  rationale: Se conserva la intensificación de ὑπεράγαν con «excesivamente». «Atemorizados» refleja el campo semántico de miedo o timidez de ἐδειλίαζον sin introducir por sí solo un juicio moral más fuerte que el del griego.
- source_word: ἀθετεῖν
  english_pob_choice: set aside
  chosen_spanish: anular
  alternatives_spanish:
  - rechazar
  - invalidar
  - dejar sin efecto
  lexicon: LSJ
  rationale: En este contexto, ἀθετεῖν implica deshacer o invalidar lo acordado. «Anular» transmite bien la intención de cancelar las disposiciones del acuerdo en español actual.
- source_word: διαστάλσεις
  english_pob_choice: arrangements
  chosen_spanish: las estipulaciones
  alternatives_spanish:
  - las disposiciones
  - los arreglos
  - las condiciones
  lexicon: LSJ
  rationale: El sustantivo es raro y parece referirse a las provisiones concretas del acuerdo. «Estipulaciones» mantiene un registro formal y permite conservar la posible especificidad legal del término; por eso se prefiere aquí frente a un más genérico «arreglos».
theological_decisions:
- issue: El matiz de temor en ἐδειλίαζον frente a una posible censura moral
  english_pob_reading: were exceedingly fearful
  chosen_spanish_reading: estaban excesivamente atemorizados
  alternative_spanish_readings:
  - estaban cobardes en extremo
  - estaban muy asustados
  - estaban sumamente temerosos
  rationale: El griego puede expresar miedo intenso o timidez; el contexto explica su descontento, no necesariamente un juicio doctrinal sobre carácter. «Atemorizados» conserva la fuerza causal sin convertir el texto en una condena moral más fuerte de la que exige el original.
  doctrine_reference: Principio de fidelidad semántica y no sobredeterminación moral del texto narrativo
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego de Swete (1909) y reproduce la misma secuencia narrativa que el texto inglés auditado. Se mantienen las precauciones del aparato inglés: el valor exacto de διαστάλσεις es raro y el versículo está marcado con desajuste de validación, por lo que se conserva una alternativa formal en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando aparece el nombre divino, pero este versículo no lo contiene.
  - Se mantiene «Ptolemaida» como forma española estándar del topónimo, con nota sobre la variante «Ptolemais».
  - Se evita «señor» o vocabulario eclesiástico ajeno al contexto político del pasaje.
  - La puntuación sigue el español moderno con dos cláusulas principales separadas por punto y coma para reflejar la estructura del griego.
