review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura general del griego y del POB en inglés: personas designadas, trato privado, propuesta de traer carne permitida para él, y fingir comer la carne sacrificial ordenada por el rey. Sin embargo, varias elecciones españolas debilitan matices importantes: «ofrenda ilícita» no refleja tan bien el contexto de sacrificio/carne sacrificial como «sacrificio ilícito»; «antiguo conocimiento del hombre» suena poco natural y opaca γνῶσιν como conocimiento relacional; «lo llamaban aparte en privado» es redundante y no expresa tan bien el apartarlo privadamente; y «que fuera conveniente para que él la usara» resulta torpe en español aunque intenta preservar χρᾶσθαι.'
  spanish_quality_summary: 'El texto es comprensible, pero tiene giros poco idiomáticos o pesados para español bíblico legible: «antiguo conocimiento del hombre», «aparte en privado», y «para que él la usara». Una revisión ligera puede mantener la fidelidad y mejorar claramente la naturalidad. También conviene alinear mejor el registro cultual con «sacrificio» y simplificar la sintaxis.'
  glossary_alignment: 'No hay términos del glosario mayor directamente en juego como Yahvé/Mesías. En vocabulario contextual, la revisión propuesta mantiene mejor la decisión inglesa documentada: contexto sacrificial concreto, compasión preservada en nota, y carne procedente del sacrificio pagano. «Sacrificio ilícito» y «carne del sacrificio» encajan mejor que «ofrenda» para θυσία en este versículo.'
  issues:
  - severity: medium
    issue: «ofrenda ilícita» para πρὸς τὰ παράνομα
    rationale: Aunque posible, «ofrenda» diluye el marco de sacrificio y la relación con la carne sacrificial. El POB inglés revisó a «unlawful sacrifice»; en español «sacrificio ilícito» refleja mejor θυσία en este contexto.
  - severity: medium
    issue: «por su antiguo conocimiento del hombre» es poco natural
    rationale: γνῶσις aquí es conocimiento relacional o trato previo. «Antiguo conocimiento» suena calcado y poco claro en español. «Porque conocían al hombre desde hacía mucho tiempo» o equivalente comunica mejor el sentido.
  - severity: low
    issue: «lo llamaban aparte en privado» es redundante
    rationale: κατʼ ἰδίαν ya aporta la idea de privacidad. En español basta «lo tomaban aparte en privado» o «lo llevaban aparte privadamente»; además conviene reflejar ἀπολαμβάνοντες mejor como separarlo de otros.
  - severity: medium
    issue: «que fuera conveniente para que él la usara» suena forzado
    rationale: Intenta preservar χρᾶσθαι, pero el resultado es poco idiomático. «que le era lícito usar» o «que le estaba permitido comer» sería más natural; la primera conserva mejor la amplitud de ‘usar’ sin caer en torpeza.
  - severity: low
    issue: Nota b con «la carne de la ofrenda» no acompaña la mejor redacción del texto
    rationale: Si el texto se corrige a «carne del sacrificio», la nota debe ajustarse para coincidir exactamente con el anclaje y seguir explicando el trasfondo pagano.
