  text: And it is not beyond the sea[a], that you should say, ‘Who will cross over to the other side of the sea for us and get it for us and make us hear it[c][b], so that we may do it?’
  footnotes:
  - marker: a
    text: Or 'across the sea' / 'on the other side of the sea.'
    reason: lexical_alternative
  - marker: b
    text: Or 'bring it to us' for 'get it for us'; the Hebrew verb literally means 'take,' but in context it implies obtaining and bringing within reach.
    reason: lexical_alternative
  - marker: c
    text: Literally 'make us hear it,' a causative expression meaning to cause someone to hear, that is, to declare or explain it to them.
    reason: lexical_alternative
