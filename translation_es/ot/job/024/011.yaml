translation:
  language: es
  text: Entre sus filas[a] exprimen aceite[b]; pisan los lagares, pero tienen sed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus muros» o «sus hileras»; el hebreo probablemente se refiere a espacios cerrados o alineaciones agrícolas donde se realiza el trabajo.
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo es difícil; literalmente se relaciona con «aceite» o «brillo», pero en este contexto probablemente alude a la extracción de aceite de oliva.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּין
  english_pob_choice: Between
  chosen_spanish: Entre
  alternatives_spanish:
  - En medio de
  lexicon: HALOT
  rationale: La preposición espacial introduce el lugar de la labor; «entre» es la equivalencia directa y natural en español.
- source_word: שׁוּרוֹתָם
  english_pob_choice: their rows
  chosen_spanish: sus filas
  alternatives_spanish:
  - sus hileras
  - sus terrazas
  - sus muros
  lexicon: HALOT
  rationale: El término hebreo puede referirse a filas o alineaciones; en este contexto agrícola, «filas» conserva la imagen concreta sin imponer una interpretación más específica de terrazas o muros.
- source_word: יַצְהִירוּ
  english_pob_choice: they press out oil
  chosen_spanish: sacan aceite
  alternatives_spanish:
  - prensan aceite
  - hacen salir aceite
  - producen aceite
  lexicon: HALOT
  rationale: Aunque el verbo tiene dificultad léxica, el contexto de olivos favorece la idea de extraer aceite. «Sacan aceite» comunica la acción de manera idiomática sin perder la relación con la producción de aceite.
- source_word: יְקָבִים
  english_pob_choice: winepresses
  chosen_spanish: los lagares
  alternatives_spanish:
  - los pisaderos de vino
  - las cubas de vino
  lexicon: HALOT
  rationale: El término denota lagares o prensas/vats para vino; «lagares» es preciso y natural en español bíblico.
- source_word: דָּרְכוּ
  english_pob_choice: they tread
  chosen_spanish: pisan
  alternatives_spanish:
  - trituran
  - aplastan
  lexicon: HALOT
  rationale: Es el verbo habitual para pisar la uva en el lagar. «Pisan» mantiene la imagen física y el paralelismo con el hebreo.
- source_word: וַיִּצְמָאוּ
  english_pob_choice: yet they go thirsty
  chosen_spanish: y se quedan con sed
  alternatives_spanish:
  - y tienen sed
  - pero siguen sedientos
  lexicon: HALOT
  rationale: 'El waw consecutivo presenta el desenlace irónico: quienes trabajan con aceite y vino no los disfrutan. «Se quedan con sed» expresa esa ironía en español natural.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente que ajustó el inglés de «terraces» a «rows». Por eso se prefirió una solución española equivalente que refleje mejor la idea de hileras o filas, sin introducir una lectura demasiado interpretativa.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo verbal y el contraste irónico del cierre.
  - Se evitó «SEÑOR» u այլ terminología no pertinente, ya que este versículo no contiene el nombre divino.
  - «Lagares» conserva el registro bíblico sin resultar arcaizante en exceso.
