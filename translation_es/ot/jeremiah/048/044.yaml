translation:
  language: es
  text: El que huye del terror[a] caerá en el hoyo, y el que sube del hoyo será atrapado en la red; porque haré venir sobre ella, sobre Moab, el año de su castigo,[b] declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el miedo» o «el pavor». פַּחַד puede abarcar temor, pero aquí el contexto de juicio favorece «terror».
    reason: lexical_alternative
  - marker: b
    text: 'Lit. «el año de su castigo», con referencia plural: «de ellos». O «el año de su visitación» o «el año de su rendición de cuentas». פְּקֻדָּה posee un rango más amplio que «castigo», pero el contexto de juicio lo especifica aquí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הניס
  english_pob_choice: he who flees
  chosen_spanish: el que huye
  alternatives_spanish:
  - el que escapa
  - quien huye
  lexicon: HALOT
  rationale: El participio funciona de modo sustantivado y expresa una sentencia general. «El que huye» conserva el valor proverbial y la referencia singular genérica sin forzar una traducción mecánica.
- source_word: הפחד
  english_pob_choice: the terror
  chosen_spanish: el terror
  alternatives_spanish:
  - el miedo
  - el pavor
  lexicon: HALOT
  rationale: פַּחַד aquí denota un temor intenso, de juicio inminente. «Terror» transmite mejor esa fuerza que un simple «miedo».
- source_word: הפחת
  english_pob_choice: the pit
  chosen_spanish: el hoyo
  alternatives_spanish:
  - la fosa
  - el pozo
  lexicon: HALOT
  rationale: פַּחַת es un hoyo o fosa-trampa. «Hoyo» es natural en español y mantiene la imagen breve y paralela del texto.
- source_word: והעלה
  english_pob_choice: he who comes up
  chosen_spanish: el que sube
  alternatives_spanish:
  - el que sale
  - el que asciende
  lexicon: HALOT
  rationale: El participio sustantivado describe a quien sale hacia arriba desde la fosa. «El que sube» sigue de cerca el verbo עלה y suena natural en español.
- source_word: ילכד בפח
  english_pob_choice: will be caught in the snare
  chosen_spanish: será atrapado en la red
  alternatives_spanish:
  - será apresado en la trampa
  - caerá en la trampa
  lexicon: HALOT
  rationale: פָּח es una trampa o red de captura. «Red» mantiene la idea de lazo/trampa y evita repetir «hoyo»; «atrapado» refleja bien el pasivo de captura.
- source_word: כי אביא אליה
  english_pob_choice: for I will bring upon her
  chosen_spanish: porque haré venir sobre ella
  alternatives_spanish:
  - porque traeré sobre ella
  - porque pondré sobre ella
  lexicon: HALOT
  rationale: La construcción con בוא + אל expresa traer algo sobre alguien. «Haré venir sobre ella» preserva la acción causal de Yahvé sin perder el matiz idiomático.
- source_word: אל מואב
  english_pob_choice: upon Moab
  chosen_spanish: sobre Moab
  alternatives_spanish:
  - contra Moab
  - a Moab
  lexicon: HALOT
  rationale: En contexto de juicio, «sobre Moab» comunica el destino que recae sobre la nación, en continuidad con «sobre ella».
- source_word: שנת פקדתם
  english_pob_choice: the year of their punishment
  chosen_spanish: el año de su castigo
  alternatives_spanish:
  - el año de su visitación
  - el año de su recuento
  lexicon: HALOT
  rationale: פְּקֻדָּה en un oráculo de juicio puede ser visitación, inspección o castigo. «Castigo» expresa claramente el sentido punitivo del contexto sin borrar el trasfondo semántico; la alternativa más amplia queda preservada en nota.
- source_word: נאום יהוה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם יְהוָה se conserva con la forma de cierre solemne. Conforme al criterio del proyecto, el Tetragrámaton se vierte «Yahvé».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el Nombre divino. La convención del proyecto pide rendirlo como «Yahvé» en el texto principal para no ocultar el nombre del pacto y mantener trazabilidad auditable.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de פְּקֻדָּה en un oráculo de juicio
  english_pob_reading: their punishment
  chosen_spanish_reading: su castigo
  alternative_spanish_readings:
  - su visitación
  - su recuento
  - su rendición de cuentas
  rationale: El contexto es inequívocamente de juicio contra Moab. «Castigo» comunica el efecto punitivo sin negar que el término hebreo puede abarcar visitación o revisión; esas alternativas se preservan para no borrar la tensión léxica.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it; §5 Consistency of key terms, or documented exception
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios en el último pase; la presente propuesta sigue ese estado estable, manteniendo sus decisiones léxicas clave y su nota alternativa para פְּקֻדָּה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se evita «SEÑOR» para no enmascarar el nombre divino.
  - «Hoyo» y «red» preservan la triple imagen de terror/hoyo/trampa sin sobreexplicar.
  - El pronombre femenino «ella» se conserva para Moab, siguiendo el antecedente del hebreo y del audit trail en inglés.
  - La fórmula profética final conserva el registro solemne y breve del original.
