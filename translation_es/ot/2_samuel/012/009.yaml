translation:
  language: es
  text: ¿Por qué has despreciado la palabra de Yahvé[a], haciendo lo malo ante sus ojos? A Urías el hitita lo derribaste con la espada, y tomaste para ti a su mujer por mujer[b], y lo mataste con la espada de los amonitas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «has tratado la palabra de Yahvé con desprecio».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tomaste para ti a su mujer por mujer»; la expresión recalca la apropiación personal de la mujer de Urías.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «con la espada de los hijos de Amón», indicando que David causó la muerte de Urías por medio de agentes amonitas.'
    reason: cultural_note
lexical_decisions:
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué entonces
  - ¿Por qué motivo
  lexicon: HALOT
  rationale: La pregunta directa introduce la acusación profética con naturalidad en español y conserva el tono retórico breve del hebreo.
- source_word: בָּזִיתָ
  english_pob_choice: have you despised
  chosen_spanish: has despreciado
  alternatives_spanish:
  - has tratado con desprecio
  - has desdeñado
  lexicon: HALOT
  rationale: בזה comunica desprecio o desdén fuerte, no solo desobediencia. «Has despreciado» mantiene esa carga moral sin sonar forzado.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mandato de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: «Palabra» conserva la expresión hebrea y permite abarcar tanto mandamiento como voluntad revelada. Se mantiene «Yahvé» según la convención del proyecto para יְהוָה.
- source_word: לַעֲשׂוֹת הָרַע בְּעֵינָיו
  english_pob_choice: to do what is evil in his sight
  chosen_spanish: para hacer lo malo delante de él
  alternatives_spanish:
  - para hacer lo malo a sus ojos
  - para hacer el mal en su presencia
  lexicon: HALOT
  rationale: La fórmula idiomática se expresa de manera natural en español. «Delante de él» conserva la evaluación divina sin perder el matiz relacional del hebreo.
- source_word: הִכִּיתָ
  english_pob_choice: struck down
  chosen_spanish: lo heriste
  alternatives_spanish:
  - lo golpeaste
  - lo derribaste
  lexicon: HALOT
  rationale: El verbo hebreo puede significar herir/golpear mortalmente. En esta cláusula, «lo heriste» preserva el paralelismo con la sentencia posterior de muerte y evita adelantar demasiado la interpretación.
- source_word: בַחֶרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  lexicon: HALOT
  rationale: «Con la espada» reproduce el instrumento bélico de forma directa y repetible, como en el hebreo.
- source_word: לָקַחְתָּ לְּךָ לְאִשָּׁה
  english_pob_choice: took his wife for yourself as a wife
  chosen_spanish: tomaste para ti a su mujer como esposa
  alternatives_spanish:
  - tomaste a su mujer para ti como esposa
  - te apropiaste de su mujer como esposa
  lexicon: HALOT
  rationale: El hebreo es redundante y subraya la apropiación personal. «Para ti» y «como esposa» conservan esa fuerza sin volver la frase antinatural en español.
- source_word: הָרַגְתָּ
  english_pob_choice: killed
  chosen_spanish: lo mataste
  alternatives_spanish:
  - lo asesinaste
  - lo hiciste morir
  lexicon: HALOT
  rationale: הרג es el verbo común «matar». «Lo mataste» refleja el valor léxico sin introducir una intensificación no explícita en el término mismo.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Amón
  - los de Amón
  lexicon: HALOT
  rationale: La designación étnica estándar en español es «amonitas». Mantiene la referencia al agente instrumental a través de la batalla de los amonitas.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: Se sigue la convención del proyecto de rendir el Tetragrámaton como «Yahvé» en el texto principal, en vez de ocultarlo bajo una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre «espada de los amonitas» y la agencia de David
  english_pob_reading: indicating that David caused Uriah's death through Ammonite agency
  chosen_spanish_reading: lo mataste con la espada de los amonitas
  alternative_spanish_readings:
  - lo mataste por medio de los amonitas
  - lo mataste mediante la espada de los amonitas
  rationale: 'La frase preserva la agencia indirecta: David sigue siendo responsable, aunque la ejecución se realizó por medio de los amonitas. No se suaviza la acusación.'
  doctrine_reference: Narrative accountability in 2 Sam 12:9; cf. the verse's causal structure
translation_notes:
  revision_awareness: 'El texto sigue de cerca la revisión inglesa establecida en el expediente: mantiene la acusación retórica, conserva la duplicación expresiva de la toma de la mujer mediante una nota, y refleja la muerte indirecta por agencia amonita sin atenuar la responsabilidad de David. No se incorporaron cambios textuales recientes, pues el expediente indica que la última revisión quedó sin cambios.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma coherente con el estándar del proyecto para יְהוָה.
  - Se usa «amonitas» como etnónimo corriente en español y no «hijos de Amón» en el cuerpo principal, reservando la precisión estructural para la nota.
  - «Despreciado» reproduce mejor la carga de בזה que una simple idea de desobediencia.
  - Se conservó el paralelismo de «con la espada» en ambas menciones para reflejar la estructura del hebreo.
