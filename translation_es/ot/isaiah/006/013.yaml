  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto (Yahvé, Mesías, etc.). Sí hay un problema con la decisión léxica auditada para אֵלָה: debe mantenerse ''terebinto'' en vez de ''encina'' salvo razón fuerte, y aquí no la hay. ''La semilla santa'' y ''tocón'' concuerdan con la racionalidad documentada.'
