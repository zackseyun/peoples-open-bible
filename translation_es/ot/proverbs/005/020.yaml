translation:
  language: es
  text: ¿Por qué[a], hijo mío, te extravías con una mujer extraña y abrazas el seno de una mujer extranjera?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué habrías de...?» La pregunta es retórica y exhortativa.'
    reason: alternative_reading
lexical_decisions:
- source_word: לָמָה
  english_pob_choice: Why ... should you
  chosen_spanish: ¿Por qué ... te ...?
  alternatives_spanish:
  - ¿Por qué habrías de ...?
  - ¿Por qué ... habías de ...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica de admonición. En español, la forma natural y fiel es una interrogación directa con valor exhortativo; no hace falta añadir un auxiliar equivalente a 'should you' para conservar el tono.
- source_word: תִשְׁגֶּה
  english_pob_choice: go astray
  chosen_spanish: te extravías
  alternatives_spanish:
  - te desvías
  - andas errante
  - te dejas llevar
  lexicon: HALOT
  rationale: שׁגה puede expresar extraviarse o desviarse moralmente. 'Te extravías' conserva el matiz de apartarse del camino recto sin cargar demasiado la imagen ni volverla demasiado abstracta.
- source_word: בְנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo
  lexicon: HALOT
  rationale: El sufijo de primera persona exige expresar posesión. 'Hijo mío' mantiene el tono sapiencial y la relación exhortativa padre-hijo con naturalidad en español.
- source_word: בְּזָרָה
  english_pob_choice: strange woman
  chosen_spanish: una mujer extraña
  alternatives_spanish:
  - una mujer prohibida
  - una mujer ajena
  - una mujer infiel
  lexicon: HALOT
  rationale: En Proverbios, זָרָה no designa solo a una mujer étnicamente extranjera, sino a una mujer fuera de los límites matrimoniales y covenantales. 'Una mujer extraña' conserva el enlace con la tradición léxica de 'extraña' sin perder la carga moral que el contexto exige.
- source_word: תְחַבֵּק
  english_pob_choice: embrace
  chosen_spanish: abrazas
  alternatives_spanish:
  - te aferras a
  - ciñes
  - estrechas en un abrazo
  lexicon: HALOT
  rationale: חבק se expresa de manera directa con 'abrazas'. El presente del verbo en español corresponde bien a la pregunta retórica y mantiene el paralelismo con el hemistiquio anterior.
- source_word: חֵק
  english_pob_choice: bosom
  chosen_spanish: el seno
  alternatives_spanish:
  - el regazo
  - el pecho
  - la falda
  lexicon: HALOT
  rationale: חֵק puede referirse al pecho, seno o regazo en un contexto de cercanía íntima. 'El seno' preserva la imagen corporal concreta y el registro poético en español, y evita la posible ambigüedad de 'regazo' en este contexto sexual.
- source_word: נָכְרִיָּה
  english_pob_choice: foreign woman
  chosen_spanish: una mujer extranjera
  alternatives_spanish:
  - una mujer extraña
  - una mujer forastera
  - una mujer ajena
  lexicon: HALOT
  rationale: El término apunta a una mujer de fuera, ajena al ámbito propio; en este contexto se superpone semánticamente con זָרָה, pero permite mantener la distinción léxica con un matiz más externo. 'Extranjera' comunica esa alteridad sin depender solo del sentido moral.
theological_decisions:
- issue: Cómo reflejar la pareja זָרָה / נָכְרִיָּה sin borrar la tensión entre alteridad moral y social
  english_pob_reading: '''strange woman'' / ''foreign woman'''
  chosen_spanish_reading: '''mujer extraña'' / ''mujer extranjera'''
  alternative_spanish_readings:
  - '''mujer prohibida'' / ''mujer extranjera'''
  - '''mujer ajena'' / ''mujer forastera'''
  - '''adúltera'' / ''extranjera'''
  rationale: La advertencia trata de una relación sexual ilícita; no debe leerse como una descalificación étnica. Mantener 'extraña' y 'extranjera' conserva la distinción de los dos términos hebreos y deja que el contexto moral gobierne el sentido.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Cómo representar la imagen de חֵק en un contexto de intimidad prohibida
  english_pob_reading: '''bosom'''
  chosen_spanish_reading: '''el seno'''
  alternative_spanish_readings:
  - '''el regazo'''
  - '''el pecho'''
  - '''el abrazo'''
  rationale: La imagen es corporal y poética a la vez. 'El seno' reproduce la cercanía íntima sin diluir el componente físico del hebreo ni convertirlo en una abstracción.
  doctrine_reference: Translation philosophy §§2, 4
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail al conservar la distinción léxica entre זָרָה y נָכְרִיָּה, aquí rendida como 'mujer extraña' y 'mujer extranjera'. La formulación final busca equivalencia óptima con el hebreo, no una traducción mecánica del inglés, pero sí respeta la decisión revisada de mantener 'strange woman' para el primer miembro y 'foreign woman' para el segundo.
  spanish_consistency_notes:
  - 'Se preservó el paralelismo poético con dos sintagmas distintos: ''una mujer extraña'' y ''una mujer extranjera''.'
  - '''Hijo mío'' se colocó como vocativo en una construcción natural de español, manteniendo el valor del sufijo posesivo hebreo.'
  - '''El seno'' traduce el campo semántico de חֵק con un registro digno y corporal.'
  - La pregunta retórica se mantuvo abierta con '¿Por qué...?', sin añadir explicaciones implícitas no presentes en el hebreo.
