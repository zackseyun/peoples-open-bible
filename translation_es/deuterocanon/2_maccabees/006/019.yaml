revisions:
- from: Pero él, escogiendo la muerte con honor antes que una vida con mancha, se acercó de su propia voluntad al tímpano[a].
  to: Pero él, escogiendo la muerte con honor antes que una vida con impureza, se acercó de su propia voluntad al potro[a].
  rationale: Se sustituye «tímpano» por «potro» en el texto principal para comunicar con claridad la función del τύμπανον como instrumento de tortura, manteniendo en nota la literalidad griega y la incertidumbre histórica. Se cambia «mancha» por «impureza» para reflejar mejor la fuerza moral-ritual de μύσος en el contexto martirial. El resto del versículo conserva bien el sentido del griego y la auditoría inglesa.
