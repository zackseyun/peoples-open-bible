review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: propósito (''para que''), conocimiento de una generación futura, descendientes aún no nacidos, levantarse/surgir, y transmitirlo a sus propios descendientes. Sin embargo, ''hijos que aún no habrán nacido'' suena temporalmente torpe e idiomáticamente poco natural en español, y además se aparta de la decisión auditada en inglés de expresar el sentido genérico de בָּנִים como ''children'' más que ''sons''.'
  spanish_quality_summary: 'La frase es comprensible, pero ''hijos que aún no habrán nacido'' resulta forzada en español bíblico natural; ''que aún no han nacido'' o ''aún no nacidos'' sería más claro. También conviene ajustar la concordancia verbal a una serie subjuntiva más fluida: ''conozca ... nazcan ... se levanten y se lo cuenten''. El texto puede sonar más natural sin perder dignidad ni literalidad.'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé, Mesías, Espíritu, etc. La principal desalineación es con la política documentada de lenguaje generacional representativo: el inglés POB justificó ''children / their children''; en español, ''hijos / sus hijos'' puede funcionar genéricamente, pero aquí ''descendientes'' o ''hijos[a]'' ayuda a preservar mejor esa rationale. Dado que el inglés incluyó nota sobre el valor genérico de las formas masculinas, conviene conservar una nota equivalente en español.'
  issues:
  - severity: medium
    issue: 'Expresión temporal poco natural: ''hijos que aún no habrán nacido'''
    rationale: El futuro perfecto no es idiomático aquí; el hebreo expresa descendientes todavía no nacidos, no una perífrasis temporal compleja. En español natural y fiel conviene 'hijos[a] que aún no han nacido' o similar.
  - severity: medium
    issue: Desajuste con la decisión auditada sobre lenguaje genérico de descendencia
    rationale: El inglés POB añadió una nota explícita para aclarar que las formas masculinas hebreas se usan genéricamente. El borrador español usa 'hijos' sin nota, lo que puede estrechar innecesariamente el referente a varones.
  - severity: low
    issue: Fluidez sintáctica mejorable en la secuencia verbal
    rationale: '''conozca, hijos..., y se levanten y cuenten'' es entendible, pero una puntuación y formulación algo más natural mejora la lectura litúrgica sin alterar el sentido.'
  revised_spanish_text: para que una generación posterior conozca, hijos[a] que aún no han nacido, y se levanten y se lo cuenten a sus hijos[a].
