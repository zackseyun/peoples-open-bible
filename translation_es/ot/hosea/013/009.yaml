translation:
  language: es
  text: Te has destruido, Israel, porque en mí está tu ayuda[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Te has destruido, Israel, pues en mí está tu ayuda». El hebreo de este versículo es difícil, y algunos también lo entienden de manera más literal como: «Tu destrucción, Israel…»'
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁחֶתְךָ
  english_pob_choice: You have destroyed yourself
  chosen_spanish: Tú te has destruido
  alternatives_spanish:
  - Él te ha destruido
  - Tu destrucción
  lexicon: HALOT
  rationale: El hebreo es difícil y admite más de una resolución sintáctica. La revisión inglesa prefirió el valor reflexivo probable; en español, «te has destruido» comunica esa misma lectura sin añadir un sujeto explícito que el texto no da. Se evita una paráfrasis más fuerte que el hebreo no obliga a adoptar.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: nombre propio
  rationale: Se conserva el nombre propio sin adaptar, como en el original.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la base o explicación de la afirmación anterior; «porque» reproduce bien el valor causal en español natural.
- source_word: בִי
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - contra mí
  lexicon: HALOT
  rationale: 'El hebreo permite una lectura difícil, incluso adversativa en algunas interpretaciones. La lectura principal sigue el paralelo con la frase siguiente y mantiene el sentido de que la ayuda está localizada en Dios: «en mí».'
- source_word: בְעֶזְרֶךָ
  english_pob_choice: your help
  chosen_spanish: tu ayuda
  alternatives_spanish:
  - tu auxilio
  - tu ayudador
  lexicon: HALOT
  rationale: עֵזֶר designa ayuda o auxilio. «Tu ayuda» conserva el sustantivo y evita convertir la frase en una explicación más libre.
theological_decisions:
- issue: Resolución de la frase hebrea oscura sobre la ruina de Israel
  english_pob_reading: The verse is rendered as a statement that Israel has destroyed itself, with the explanatory clause that Israel's help is in God.
  chosen_spanish_reading: El verso se traduce como una afirmación directa de auto-destrucción de Israel, seguida por la explicación de que su ayuda está en Dios.
  alternative_spanish_readings:
  - Te has destruido, Israel, porque en mí está tu ayuda.
  - Tu destrucción es Israel, porque en mí está tu ayuda.
  rationale: El hebreo es sintácticamente comprimido y no permite una resolución totalmente segura. El español principal sigue la lectura reflexiva adoptada en la revisión inglesa, sin introducir más explicaciones de las que el texto exige. La nota preserva la alternativa importante para no ocultar la tensión del pasaje.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió de «He has destroyed you» a la lectura reflexiva «You have destroyed yourself». El español sigue esa revisión, pero conserva la ambigüedad del hebreo con una nota alternativa y evita resolver la frase más allá de lo que el texto sustenta.
  spanish_consistency_notes:
  - Se usa «Dios» implícito en la traducción sin añadirlo al texto, porque el hebreo dice literalmente «en mí».
  - Se mantiene «Israel» como nombre propio inalterado.
  - «Ayuda» se conserva como sustantivo; no se expande a una paráfrasis como «socorro» o «auxiliador» salvo como alternativa de nota.
