id: COL.1.21
reference: Colossians 1:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ὑμᾶς ποτε ὄντας ἀπηλλοτριωμένους καὶ ἐχθροὺς τῇ διανοίᾳ ἐν τοῖς ἔργοις τοῖς πονηροῖς—
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/021.yaml
  text: And you, who once were alienated and hostile in mind in evil deeds—
translation:
  language: ko
  text: 또한 여러분은 한때 멀어져 있었고, 악한 행실 가운데서 마음으로 적대하던 자들이었으나 —
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ποτε
  english_pob_choice: once
  chosen_korean: 한때
  alternatives_korean:
  - 이전에
  - 예전에
  lexicon: BDAG
  rationale: 시간 부사. 「한때」는 과거 상태와 현재의 화목 상태를 대조하기에 자연스럽다.
- source_word: ἀπηλλοτριωμένους
  english_pob_choice: alienated
  chosen_korean: 멀어져 있었고
  alternatives_korean:
  - 소외되어 있었고
  - 떨어져 있었고
  lexicon: BDAG
  rationale: 완료 수동 분사. 하나님에게서의 관계적 멀어짐을 「멀어져 있었고」로 옮긴다.
- source_word: ἐχθροὺς τῇ διανοίᾳ
  english_pob_choice: hostile in mind
  chosen_korean: 마음으로 적대하던 자들
  alternatives_korean:
  - 생각으로 원수 된 자들
  - 마음으로 미워하던 자들
  lexicon: BDAG
  rationale: ἐχθρός를 명사 「원수」 대신 동사적 「적대하던」으로 옮겨 한국어 자연성을 살린다. 여격 τῇ διανοίᾳ는 「마음으로」로 옮긴다.
- source_word: ἐν τοῖς ἔργοις τοῖς πονηροῖς
  english_pob_choice: in evil deeds
  chosen_korean: 악한 행실 가운데서
  alternatives_korean:
  - 악한 일 가운데서
  - 악한 행위들에 의해
  lexicon: BDAG
  rationale: 영어 POB의 「in evil deeds」 결정을 따라 「가운데서」로 옮긴다. 적대의 영역·표출을 가리킨다.
