translation:
  language: es
  text: Líbrame, por favor, de la mano de mi hermano, de la mano de Esaú, porque le tengo miedo; no sea que venga y me hiera, madre con hijos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «madre y hijos»; hebreo «madre sobre hijos», un modismo para herir o destruir a una madre junto con sus hijos.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצִּילֵנִי
  english_pob_choice: Please deliver me
  chosen_spanish: ¡Líbrame, por favor!
  alternatives_spanish:
  - Sálvame, por favor
  - Rescátame, por favor
  lexicon: HALOT
  rationale: El imperativo hiphil de נצל pide una liberación activa; en español, 'librar' comunica bien la idea de ser sacado de un peligro o poder ajeno. Se conserva el tono suplicante con 'por favor'.
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - ahora
  lexicon: HALOT
  rationale: La partícula de ruego se expresa de forma natural en español con 'por favor', que mantiene el matiz de súplica sin arcaísmo.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de
  lexicon: HALOT
  rationale: Se preserva el hebraísmo concreto 'mano' porque en español también puede expresar poder o dominio y mantiene la imagen bíblica de liberación.
- source_word: אָחִי
  english_pob_choice: my brother
  chosen_spanish: mi hermano
  alternatives_spanish:
  - mi hermano mayor
  - mi pariente
  lexicon: HALOT
  rationale: Término de parentesco directo; conservar 'hermano' retiene la tensión emocional de la amenaza entre hermanos.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esaú
  lexicon: transliteración convencional
  rationale: Nombre propio bíblico en forma usual en español.
- source_word: יָרֵא אָנֹכִי אֹתוֹ
  english_pob_choice: I am afraid of him
  chosen_spanish: le tengo miedo
  alternatives_spanish:
  - tengo temor de él
  - le temo
  lexicon: HALOT
  rationale: La construcción expresa un temor actual. 'Le tengo miedo' es natural en español y mantiene la relación personal con el objeto del miedo.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - por miedo a que
  lexicon: HALOT
  rationale: Introduce una posibilidad temida. 'No sea que' reproduce bien el valor preventivo/temoroso del hebreo en un registro bíblico claro.
- source_word: יָבֹא
  english_pob_choice: he come
  chosen_spanish: venga
  alternatives_spanish:
  - llegue
  - viniere
  lexicon: HALOT
  rationale: Después de una cláusula de temor, el subjuntivo español expresa adecuadamente la eventualidad temida.
- source_word: וְהִכַּנִי
  english_pob_choice: and strike me
  chosen_spanish: y me hiera
  alternatives_spanish:
  - y me golpee
  - y me mate
  lexicon: HALOT
  rationale: נכה puede abarcar golpear o herir; 'herir' conserva la amplitud semántica sin especificar más de lo que el texto afirma. 'Matar' sería demasiado preciso.
- source_word: אֵם עַל בָּנִים
  english_pob_choice: mother with the children
  chosen_spanish: madre con hijos
  alternatives_spanish:
  - madre y hijos
  - la madre con los hijos
  lexicon: HALOT
  rationale: Se preserva la idiomática hebrea de destrucción indiscriminada sin forzar un artículo que en español podría sonar más específico de lo necesario. 'Madre con hijos' mantiene la imagen de la violencia total y sigue de cerca la revisión inglesa más natural.
theological_decisions:
- issue: Tratamiento del nombre divino implícito en una oración de protección
  english_pob_reading: No explicit divine-name wording in the verse; the petition is addressed to God in context, but the line itself contains no YHWH term.
  chosen_spanish_reading: No se introduce ningún nombre divino en el versículo; se mantiene como súplica directa.
  alternative_spanish_readings:
  - Señor, líbrame
  - Yahvé, líbrame
  rationale: El hebreo del versículo no contiene una mención explícita de יהוה, así que no corresponde añadirla. La oración queda como petición directa sin ampliación devocional.
  doctrine_reference: Principio de sobriedad textual / no expansión del contenido explícito
- issue: Interpretación de אֵם עַל בָּנִים
  english_pob_reading: the mother with the children / mother with children
  chosen_spanish_reading: madre con hijos
  alternative_spanish_readings:
  - madre y hijos
  - la madre con los hijos
  rationale: La frase hebrea es un giro idiomático de violencia indiscriminada. En español, 'madre con hijos' conserva la imagen sin convertirla en una explicación interpretativa más amplia ni suavizar su crudeza.
  doctrine_reference: No doctrinal issue; lexical/idiomatic rendering
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefirió una formulación más natural del giro idiomático, así como la observación previa de que la frase hebrea es anartrosa y funciona como expresión de violencia total. En español se evitó 'la madre con los hijos' para no imponer un artículo que suene demasiado específico; se optó por 'madre con hijos' para mantener naturalidad y cercanía al hebreo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma general del proyecto, pero aquí no aparece porque el versículo no contiene el tetragrámaton.
  - '''Líbrame'' se eligió por su fuerza bíblica y porque comunica mejor el matiz de ser sacado de peligro que un simple ''sálvame''.'
  - Se mantuvo la imagen concreta de 'mano' para מִיַּד, siguiendo la equivalencia auditada.
  - '''Hiera'' conserva la amplitud de נכה sin decidir prematuramente entre herir, golpear o matar.'
  - La nota textual del hebreo 'madre sobre hijos' se trasladó como nota de alternativa idiomática en español.
