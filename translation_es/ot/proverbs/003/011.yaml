translation:
  language: es
  text: Hijo mío, no menosprecies la disciplina de Yahvé, ni te hastíes[a] de su reprensión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te canses de su reprensión». El verbo hebreo también puede expresar cansancio o impaciencia, no solo aversión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מוּסַר
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - corrección
  - castigo disciplinario
  lexicon: HALOT
  rationale: מוּסַר en literatura sapiencial suele referirse a formación correctiva, no solo a enseñanza abstracta. «Disciplina» conserva bien ese sentido formativo y correctivo en español, sin cargarlo hacia un castigo más duro.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: La consigna del proyecto pide traducir el nombre divino יְהוָה como «Yahvé». Esto preserva el nombre propio del pacto y evita la sustitución por un título.
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Mi hijo
  - Hijo mío
  lexicon: HALOT
  rationale: El hebreo es un vocativo singular masculino. «Hijo mío» mantiene el registro sapiencial directo y natural en español, sin neutralizar el matiz filial del original.
- source_word: אַל תִּמְאָס
  english_pob_choice: do not despise
  chosen_spanish: no menosprecies
  alternatives_spanish:
  - no desprecies
  - no rechaces
  - no desestimes
  lexicon: HALOT
  rationale: מָאַס expresa rechazo con desdén. «No menosprecies» comunica la actitud de desdén en un español digno y fluido; «no desprecies» también sería posible, pero aquí «menosprecies» encaja mejor con el paralelismo exhortativo.
- source_word: תָּקֹץ
  english_pob_choice: do not loathe
  chosen_spanish: no te hastíes
  alternatives_spanish:
  - no te repugnes de
  - no te hartes de
  - no te hastíes de
  lexicon: HALOT
  rationale: קוּץ puede denotar aversión, impaciencia o cansancio. La POB inglesa preserva esa tensión con una nota sobre 'be weary of'. En español, «no te hastíes de» mantiene tanto el posible cansancio como la repulsión sin volverlo demasiado técnico o arcaico.
- source_word: בְּתוֹכַחְתּוֹ
  english_pob_choice: his reproof
  chosen_spanish: su reprensión
  alternatives_spanish:
  - su reprobación
  - su corrección
  - su reprueba
  lexicon: HALOT
  rationale: תּוֹכַחַת puede ser reprensión, rebuke o corrección verbal. «Reprensión» conserva el carácter de corrección verbal y distingue bien este término de «disciplina».
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la política del proyecto, se conserva como nombre propio «Yahvé» en lugar de ocultarlo bajo un título como «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: The force of תָּקֹץ in parallel with אַל תִּמְאָס
  english_pob_reading: do not loathe / do not be weary of his rebuke
  chosen_spanish_reading: no te hastíes de su reprensión
  alternative_spanish_readings:
  - no lo detestes
  - no te repugnes de su reprensión
  - no te canses de su reprensión
  rationale: La POB inglesa retiene la tensión semántica entre aversión y cansancio. «No te hastíes de» conserva esa doble posibilidad en español y evita reducir el verbo a mera repugnancia.
  doctrine_reference: Lexical nuance in Wisdom literature; no doctrinal dispute, but preserves the admonitory force of the proverb.
translation_notes:
  revision_awareness: No se aplicaron revisiones previas; el veredicto de auditoría fue de alto acuerdo y el pasaje quedó sin cambios en la última revisión.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se evitó «SEÑOR» como sustituto del nombre divino.
  - «Disciplina» y «reprensión» preservan la distinción entre formación correctiva y corrección verbal.
  - La nota a pie de página marca la alternativa literal del vocativo hebreo sin cambiar el texto principal.
