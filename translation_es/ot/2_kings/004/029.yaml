translation:
  language: es
  text: 'Entonces dijo a Giehazí[a]: “Recoge tu manto, toma mi vara en tu mano y ve. Si encuentras a alguien, no lo saludes; y si alguien te saluda[b], no le respondas. Pon mi vara sobre el rostro del muchacho.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, 'Ciñe tus lomos', un modismo para prepararte con rapidez para actuar.
    reason: lexical_alternative
  - marker: b
    text: O 'no lo bendigas' / 'si alguien te bendice'; aquí el verbo probablemente se refiere a intercambiar saludos en el camino.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲגֹר מָתְנֶיךָ
  english_pob_choice: Tuck up your garment
  chosen_spanish: Recoge tu manto
  alternatives_spanish:
  - Ciñe tus lomos
  - Ajusta tu ropa para el camino
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo para prepararse con rapidez para una acción urgente. En español, 'Recoge tu manto' comunica de forma natural la idea de disponer la ropa para ir deprisa, sin perder el matiz de prontitud.
- source_word: מִשְׁעַנְתִּי
  english_pob_choice: my staff
  chosen_spanish: mi vara
  alternatives_spanish:
  - mi bastón
  - mi cayado
  lexicon: HALOT
  rationale: '''מִשְׁעֶנֶת'' designa un palo de apoyo, una vara o bastón. ''Vara'' mantiene el referente físico del objeto profético con estilo sobrio y bíblico en español, sin sobrecargarlo con connotaciones pastoriles que ''cayado'' podría sugerir.'
- source_word: וָלֵךְ
  english_pob_choice: and go
  chosen_spanish: y ve
  alternatives_spanish:
  - y anda
  - y marcha
  lexicon: HALOT
  rationale: Es una orden simple de movimiento. 'Y ve' conserva la concisión y la urgencia del imperativo hebreo.
- source_word: כִּי תִמְצָא אִישׁ
  english_pob_choice: If you meet anyone
  chosen_spanish: Si encuentras a alguien
  alternatives_spanish:
  - Si hallas a un hombre
  - Si te topas con alguien
  lexicon: HALOT
  rationale: אִישׁ funciona aquí con valor genérico, no restrictivamente como 'varón'. 'Alguien' refleja ese alcance genérico en español, como en la decisión inglesa, y evita endurecer el tono del mandato.
- source_word: לֹא תְבָרְכֶנּוּ
  english_pob_choice: do not greet him
  chosen_spanish: no lo saludes
  alternatives_spanish:
  - no lo bendigas
  - no lo felicites
  lexicon: HALOT
  rationale: En contexto de camino y encuentro, ברך puede referirse al saludo, no necesariamente a una bendición formal. 'No lo saludes' preserva la lectura contextual preferida por la POB inglesa y su urgencia narrativa.
- source_word: וְכִי יְבָרֶכְךָ אִישׁ
  english_pob_choice: and if anyone greets you
  chosen_spanish: y si alguien te saluda
  alternatives_spanish:
  - y si un hombre te bendice
  - y si alguien te da el saludo
  lexicon: HALOT
  rationale: Se mantiene la misma comprensión de ברך como fórmula de saludo en este intercambio breve y social en el camino. 'Alguien' conserva el valor genérico de אִישׁ.
- source_word: לֹא תַעֲנֶנּוּ
  english_pob_choice: do not answer him
  chosen_spanish: no le respondas
  alternatives_spanish:
  - no le contestes
  - no le des respuesta
  lexicon: HALOT
  rationale: ענה aquí significa responder o contestar. 'No le respondas' suena natural en español y reproduce la sequedad imperativa del hebreo.
- source_word: וְשַׂמְתָּ ... עַל פְּנֵי הַנָּעַר
  english_pob_choice: Place my staff on the boy’s face
  chosen_spanish: Pon mi vara sobre el rostro del muchacho
  alternatives_spanish:
  - Coloca mi vara sobre la cara del muchacho
  - Pon mi bastón sobre el rostro del niño
  lexicon: HALOT
  rationale: '''Pon'' refleja el verbo imperativo breve; ''sobre el rostro'' conserva el hebreo más literalmente, como hace la POB inglesa con ''face''; y ''muchacho'' representa bien נַעַר en este relato sin perder claridad.'
- source_word: הַנָּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el joven
  lexicon: HALOT
  rationale: נַעַר puede ser niño, joven o muchacho. Aquí, por el contexto narrativo del hijo de la sunamita, 'muchacho' es claro, natural y suficientemente preciso.
theological_decisions:
- issue: Sentido de ברך en dos cláusulas consecutivas
  english_pob_reading: do not greet him / if anyone greets you
  chosen_spanish_reading: no lo saludes / si alguien te saluda
  alternative_spanish_readings:
  - no lo bendigas / si alguien te bendice
  - no lo felicites / si alguien te felicita
  rationale: La POB inglesa documenta que ברך probablemente alude aquí a un saludo en el camino, aunque conserva la tensión con el sentido más literal 'bendecir' en nota. En español se preserva esa lectura contextual principal para que la orden de Eliseo suene urgente y coherente con la escena, sin borrar la posibilidad semántica del verbo en la anotación.
  doctrine_reference: Cortesía y saludo en el mundo bíblico; nota lexical, no doctrinal
- issue: Valor genérico de אִישׁ
  english_pob_reading: anyone
  chosen_spanish_reading: alguien
  alternative_spanish_readings:
  - un hombre
  - cualquier hombre
  rationale: Como en la traducción inglesa auditada, el sustantivo masculino hebreo funciona de manera genérica. 'Alguien' comunica en español esa amplitud sin masculinizar innecesariamente la referencia.
  doctrine_reference: Uso genérico del lenguaje humano en hebreo bíblico
- issue: Mantenimiento del objeto profético y su colocación sobre el niño
  english_pob_reading: Place my staff on the boy’s face
  chosen_spanish_reading: Pon mi vara sobre el rostro del muchacho
  alternative_spanish_readings:
  - Coloca mi bastón sobre la cara del muchacho
  - Pon mi vara sobre el rostro del niño
  rationale: Se conserva la colocación literal 'sobre el rostro' porque el texto hebreo y la POB inglesa mantienen la imagen concreta. No se suaviza a una paráfrasis como 'junto a él' o 'sobre su cuerpo', ya que la escena depende de la acción específica ordenada.
  doctrine_reference: Ninguna; fidelidad narrativa al objeto y a la acción
translation_notes:
  revision_awareness: 'La POB inglesa revisó la cláusula final para quitar un ''Then'' adicional y alinearse más de cerca con el hebreo, que continúa directamente con la orden de poner la vara sobre el muchacho. La versión española sigue esa revisión: usa una secuencia fluida de imperativos y conserva la última orden sin añadir un adverbio temporal extra antes de ''Pon mi vara''.'
  spanish_consistency_notes:
  - Se usa 'Giehazí' para seguir la transliteración española habitual del nombre hebreo, manteniendo la forma consistente en el texto.
  - Se prefiere 'vara' para מִשְׁעֶנֶת por claridad y por su adecuación a un objeto de autoridad/soporte en español bíblico, sin imponer 'cayado' o 'bastón' de manera automática.
  - '''Rostro'' conserva el nivel de literalidad del inglés ''face'' y del hebreo פָּנִים, evitando una domesticación innecesaria.'
  - El saludo negativo se expresa en presente de subjuntivo español ('no lo saludes', 'si alguien te saluda') para reflejar la prohibición y la eventualidad del hebreo.
