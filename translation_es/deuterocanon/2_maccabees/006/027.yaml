translation:
  language: es
  text: Por tanto[a], al dejar ahora esta vida valerosamente, me mostraré digno de mi vejez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «habiendo cambiado la vida» o «habiendo intercambiado la vida»; es un modismo que significa morir o dejar esta vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: διόπερ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por ello
  - Así que
  lexicon: LSJ
  rationale: Conserva la fuerza inferencial de la conjunción al unir esta afirmación con lo anterior; «Por tanto» suena natural y solemne en español bíblico sin volverla arcaica.
- source_word: ἀνδρείως
  english_pob_choice: bravely
  chosen_spanish: valerosamente
  alternatives_spanish:
  - con valentía
  - bravamente
  lexicon: LSJ
  rationale: El adverbio expresa valor/coraje frente al sufrimiento o la muerte. «Valerosamente» conserva ese matiz con un tono digno y claro en español.
- source_word: νῦν
  english_pob_choice: by now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - ya
  lexicon: LSJ
  rationale: Aquí modifica el participio para señalar el momento decisivo presente. En español, «ahora» comunica directamente la inminencia y el carácter actual de la acción sin forzar la sintaxis.
- source_word: ἀλλάξας τὸν βίον
  english_pob_choice: giving up my life
  chosen_spanish: dar mi vida
  alternatives_spanish:
  - dejar esta vida
  - cambiar mi vida
  - terminar mi vida
  lexicon: LSJ
  rationale: La expresión griega es un modismo de morir o dejar esta vida. «Dar mi vida» refleja bien el sentido de entrega/muerte en contexto de martirio sin sugerir suicidio ni perder la fuerza idiomática.
- source_word: φανήσομαι
  english_pob_choice: I will show myself
  chosen_spanish: me mostraré
  alternatives_spanish:
  - apareceré
  - seré visto
  lexicon: LSJ
  rationale: 'El futuro medio/passivo aquí funciona con sentido predicativo: no solo «aparecer», sino manifestarse como alguien. «Me mostraré» preserva ese valor de auto-manifestación ante el juicio moral del contexto.'
- source_word: γήρως
  english_pob_choice: old age
  chosen_spanish: vejez
  alternatives_spanish:
  - edad avanzada
  - ancianidad
  lexicon: LSJ
  rationale: El genitivo refiere a la edad avanzada del hablante. «Vejez» es breve, natural y mantiene el tono sobrio del texto.
- source_word: ἄξιος
  english_pob_choice: worthy
  chosen_spanish: digno
  alternatives_spanish:
  - merecedor
  - apto
  lexicon: LSJ
  rationale: «Digno» conserva la evaluación moral del término y enlaza de manera natural con «de mi vejez» en español.
theological_decisions:
- issue: Idiom of dying framed as courageous self-presentation in martyrdom context
  english_pob_reading: giving up my life
  chosen_spanish_reading: dar mi vida
  alternative_spanish_readings:
  - dejar esta vida
  - cambiar mi vida
  rationale: El griego ἀλλάξας τὸν βίον es un modismo de morir o abandonar esta vida. En español, «dar mi vida» comunica con precisión la entrega mortal implícita y encaja con el contexto martirial sin añadir material doctrinal ajeno al versículo.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Predicate of worthiness linked to old age
  english_pob_reading: worthy of my old age
  chosen_spanish_reading: digno de mi vejez
  alternative_spanish_readings:
  - merecedor de mi vejez
  - apto para mi vejez
  rationale: La construcción griega usa ἄξιος con genitivo; el sentido es que el hablante resultará «digno» en relación con su vejez. «Digno de mi vejez» mantiene la valoración y la referencia temporal/biográfica sin sobrerinterpretar.
  doctrine_reference: LSJ; Translation philosophy §§2, 4
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa que ajustó el orden de νῦν («bravely now») para que aparezca unido al participio. En español se resolvió como «valerosamente ahora» en la fluidez de la frase («al dar ahora valerosamente mi vida»), conservando la inmediatez temporal y el matiz de valor del original griego.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplica en este versículo; no hay sustituciones devocionales ajenas al texto.
  - Se eligieron formas sobrias y publicables en español latinoamericano, evitando calcos excesivamente literales.
  - «Me mostraré» conserva el valor predicativo de φανήσομαι mejor que un simple «apareceré» en este contexto.
