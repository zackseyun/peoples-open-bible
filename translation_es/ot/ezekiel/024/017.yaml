translation:
  language: es
  text: Gime en silencio; no hagas duelo por los muertos. Ponte el turbante y ponte las sandalias en los pies. No te cubras el bigote[a], y no comas el pan de los hombres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te cubras el labio superior». La expresión hebrea puede referirse específicamente al área del labio superior, más que al vello facial.'
    reason: lexical_alternative
  - marker: b
    text: «El pan de los hombres» probablemente se refiere al alimento provisto por otros para los dolientes; es decir, pan de duelo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵאָנֵק
  english_pob_choice: Groan
  chosen_spanish: Gime
  alternatives_spanish:
  - Gime con dolor
  - Suspira
  - Lamenta
  lexicon: HALOT
  rationale: El imperativo expresa un gemido audible de aflicción o dolor. «Gime» conserva ese peso emocional en español sin añadir más interpretación que la que permite el hebreo.
- source_word: דֹּם
  english_pob_choice: silently
  chosen_spanish: en silencio
  alternatives_spanish:
  - calladamente
  - silenciosamente
  lexicon: HALOT
  rationale: Como adverbio imperativo, דֹּם indica silencio o quietud. «En silencio» es natural en español y conserva la instrucción de no exteriorizar el lamento.
- source_word: מֵתִים אֵבֶל לֹא תַעֲשֶׂה
  english_pob_choice: do not make mourning for the dead
  chosen_spanish: no hagas duelo por el muerto
  alternatives_spanish:
  - no observes duelo por el muerto
  - no realices duelo por el muerto
  lexicon: HALOT
  rationale: La expresión hebrea describe la práctica de duelo. «Hacer duelo» transmite bien el acto ritual en español y mantiene la prohibición concreta sin ampliarla.
- source_word: פְאֵרְךָ
  english_pob_choice: your turban
  chosen_spanish: el turbante
  alternatives_spanish:
  - el tocado
  - el adorno para la cabeza
  lexicon: HALOT
  rationale: El término designa una prenda/adorno para la cabeza asociada con dignidad. «Turbante» es la equivalencia más clara y publicable en este contexto profético.
- source_word: חֲבוֹשׁ עָלֶיךָ
  english_pob_choice: Bind ... on yourself
  chosen_spanish: Ponte
  alternatives_spanish:
  - Átalo sobre ti
  - Envuélvetelo
  lexicon: HALOT
  rationale: El verbo implica atar o colocar algo sobre uno mismo. En español, «ponte» comunica de modo natural la acción corporal prescrita, manteniendo la idea de vestirse con esa prenda.
- source_word: וּנְעָלֶיךָ תָּשִׂים בְּרַגְלֶיךָ
  english_pob_choice: put your sandals on your feet
  chosen_spanish: colócate las sandalias en los pies
  alternatives_spanish:
  - ponte las sandalias en los pies
  - calza tus sandalias
  lexicon: HALOT
  rationale: La instrucción es explícita sobre no andar descalzo en señal de duelo. «Colócate las sandalias en los pies» sigue de cerca el hebreo y suena natural en español.
- source_word: וְלֹא תַעְטֶה עַל שָׂפָם
  english_pob_choice: Do not cover over your mustache
  chosen_spanish: No te cubras el bigote[b]
  alternatives_spanish:
  - No te cubras el labio superior
  - No te veles la parte superior del rostro
  lexicon: HALOT
  rationale: שָׂפָם puede referirse al bigote o al área del labio superior. «Bigote» conserva la lectura tradicional y comunica con claridad la acción, mientras la nota preserva la alternativa lexical «labio superior».
- source_word: וְלֶחֶם אֲנָשִׁים לֹא תֹאכֵל
  english_pob_choice: do not eat the bread of men
  chosen_spanish: no comas el pan de los hombres
  alternatives_spanish:
  - no comas el pan provisto por otros
  - no comas el pan de duelo
  lexicon: HALOT
  rationale: La frase es breve y probablemente alude al alimento provisto para los dolientes. Se mantiene la literalidad «pan de los hombres» para respetar la transparencia, sin perder legibilidad en español.
theological_decisions:
- issue: Presentación de las prácticas de duelo sin sobreinterpretación doctrinal
  english_pob_reading: Translate the commands as prohibitions against customary mourning acts, without importing later doctrinal or ritual explanations into the main text.
  chosen_spanish_reading: Traducir las órdenes como prohibiciones concretas de gestos de duelo, sin añadir explicaciones doctrinales o rituales que el versículo no desarrolla.
  alternative_spanish_readings:
  - Interpretar cada acción como una regulación sacerdotal
  - Entenderlas solo como señales generales de impureza
  rationale: El versículo enumera prácticas visibles de duelo que se le prohíben a Ezequiel. La traducción debe conservar ese carácter de acto-señal sin cargar el texto con explicaciones ajenas al enunciado.
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios; el borrador mantiene alta concordancia con el análisis auditado y conserva las dos ambigüedades léxicas principales: el gesto de cubrir el rostro y la expresión idiomática sobre el pan.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto en otros contextos del proyecto, pero este versículo no la contiene.
  - «Duelo» traduce de forma natural אבל y evita reducirlo a un mero sentimiento interior.
  - Se conserva la literalidad de «pan de los hombres» para reflejar la construcción compacta del hebreo.
  - Las notas usan marcadores únicos y anclados solo donde el texto muestra ambigüedad real.
