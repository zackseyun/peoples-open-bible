    text: O “reparó”; el verbo hebreo es literalmente “fortaleció”, pero en este capítulo se refiere al trabajo de reparación del muro y de las puertas.
    reason: lexical_alternative
  - marker: b
    text: O “enfrente de su casa” / “opuesto a su casa”.
    reason: lexical_alternative
  - marker: c
    text: O “guardia” de la Puerta Oriental.
    reason: lexical_alternative
