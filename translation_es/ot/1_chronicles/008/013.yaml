translation:
  language: es
  text: Y Bería y Sema eran cabezas de casas paternas[a] entre los habitantes de Ayalón; ellos fueron los que expulsaron[b] a los habitantes de Gat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cabezas de casas paternas», una expresión de liderazgo de clan o linaje.'
    reason: cultural_note
  - marker: b
    text: O «hicieron huir» o «pusieron en fuga». El verbo hebreo enfatiza causar que los habitantes de Gat huyeran; «expulsaron» expresa el resultado probable en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְרִעָה
  english_pob_choice: And Beriah
  chosen_spanish: Y Bería
  alternatives_spanish:
  - Bería
  - Ahora Bería
  lexicon: HALOT
  rationale: Nombre propio; se translitera al español como Bería. La conjunción inicial se conserva con «Y» para mantener el flujo genealógico del hebreo.
- source_word: וָשֶׁמַע
  english_pob_choice: and Shema
  chosen_spanish: y Sema
  alternatives_spanish:
  - y Shema
  - y Sama
  lexicon: HALOT
  rationale: Nombre propio; se translitera de forma natural al español como Sema, manteniendo el paralelismo con el hebreo y evitando una forma excesivamente inglesa.
- source_word: רָאשֵׁי הָאָבוֹת
  english_pob_choice: heads of fathers’ houses
  chosen_spanish: cabezas de casas paternas
  alternatives_spanish:
  - jefes de casas paternas
  - cabezas de familias
  lexicon: HALOT
  rationale: Se conserva la estructura social del hebreo. «Casas paternas» refleja la unidad de clan/familia sin diluir el matiz técnico genealógico.
- source_word: לְיוֹשְׁבֵי אַיָּלוֹן
  english_pob_choice: among the inhabitants of Aijalon
  chosen_spanish: entre los habitantes de Ayalón
  alternatives_spanish:
  - para los habitantes de Ayalón
  - de entre los habitantes de Ayalón
  lexicon: HALOT
  rationale: El valor de לְ aquí, según el análisis auditado, señala pertenencia o ubicación dentro del grupo, no mera beneficencia. «Entre» comunica bien ese sentido relacional en español.
- source_word: אַיָּלוֹן
  english_pob_choice: Aijalon
  chosen_spanish: Ayalón
  alternatives_spanish:
  - Aijalón
  lexicon: HALOT
  rationale: Topónimo transliterado con una forma española ampliamente inteligible. Se evita la adaptación inglesa del audit trail para ajustarse al español.
- source_word: הֵמָּה
  english_pob_choice: they were the ones
  chosen_spanish: ellos fueron los que
  alternatives_spanish:
  - fueron ellos quienes
  - ellos mismos
  lexicon: HALOT
  rationale: La repetición enfática del pronombre se vierte con una construcción enfática natural en español, preservando la focalización del hebreo.
- source_word: הִבְרִיחוּ
  english_pob_choice: drove out
  chosen_spanish: expulsaron
  alternatives_spanish:
  - hicieron huir
  - pusieron en fuga
  lexicon: HALOT
  rationale: El verbo causativo expresa que hicieron salir por la fuerza a los habitantes de Gat. «Expulsaron» comunica el resultado contextual con claridad en español, sin perder el valor causativo.
- source_word: אֶת יֹשְׁבֵי גַת
  english_pob_choice: the inhabitants of Gath
  chosen_spanish: a los habitantes de Gat
  alternatives_spanish:
  - a los residentes de Gat
  - a quienes habitaban en Gat
  lexicon: HALOT
  rationale: El objeto directo se expresa de modo natural en español con la marca «a». «Habitantes de Gat» reproduce de cerca la estructura nominal del hebreo.
theological_decisions:
- issue: La preposición לְ en «לְיוֹשְׁבֵי אַיָּלוֹן» puede entenderse como relación de pertenencia o ámbito, no solo como ‘para’.
  english_pob_reading: among the inhabitants of Aijalon
  chosen_spanish_reading: entre los habitantes de Ayalón
  alternative_spanish_readings:
  - para los habitantes de Ayalón
  - de los habitantes de Ayalón
  rationale: Sigo la revisión auditada del POB en inglés, que corrigió la lectura hacia una ubicación relacional dentro de la población. En español, «entre» preserva ese matiz mejor que una traducción benefactiva.
  doctrine_reference: Gramática hebrea; lectura contextual del sintagma preposicional.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «for the inhabitants of Aijalon» a «among the inhabitants of Aijalon» para reflejar mejor el valor de לְ. La versión española sigue esa revisión y evita interpretar el sintagma como una relación meramente benefactiva. También se conservó el énfasis del doble pronombre mediante una construcción natural en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma preferida para el nombre divino en el proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefiere «Ayalón» para el topónimo, en coherencia con una transliteración española estable.
  - Se mantiene «habitantes» para reproducir la consistencia léxica del pasaje y su relación con la versión inglesa auditada.
