translation:
  language: es
  text: Y las décimas aguas brillantes que viste son la pureza de la generación de Josías, rey de Judá, quien en aquel tiempo, él solo, fue hallado sin pecado, con la plenitud de su corazón y con toda su alma.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ܒ̈ܬܪ ܒܣܝ̈ܡܐ
  english_pob_choice: the bright tenth waters
  chosen_spanish: las décimas aguas brillantes
  alternatives_spanish:
  - las aguas brillantes décimas
  - las aguas claras de la décima
  lexicon: Payne Smith
  rationale: Conservo la estructura simbólica del pasaje y el orden de 'décimas' + 'aguas brillantes', porque la imagen forma parte del sistema visionario de la obra y no conviene diluirla. 'Brillantes' reproduce el valor de bright sin forzar una interpretación explicativa.
- source_word: ܕܫܘܝܐ
  english_pob_choice: the purity
  chosen_spanish: la pureza
  alternatives_spanish:
  - la rectitud
  - la limpieza
  lexicon: Payne Smith
  rationale: La serie de acciones de reforma y purificación cultual pide en español 'pureza', que mantiene tanto el matiz moral como el ritual. 'Rectitud' sería posible, pero reduce el componente de limpieza religiosa sugerido por el contexto.
- source_word: ܡ̇ܠܟܐ
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Poderoso Dios
  lexicon: Payne Smith
  rationale: Sigo la decisión inglesa reverencial para el título divino, pero en español prefiero 'el Poderoso' por ser natural, solemne y suficientemente equivalente. No uso 'rey' porque aquí el término se refiere al título divino, no al rey de Judá.
- source_word: ܡܢ ܡܠܝܘ ܠܒܗ
  english_pob_choice: with the fullness of his heart
  chosen_spanish: con la plenitud de su corazón
  alternatives_spanish:
  - desde la plenitud de su corazón
  - con todo su corazón
  lexicon: Payne Smith
  rationale: La revisión textual destacó que la expresión no equivale simplemente a 'con todo su corazón'; el syríaco distingue 'plenitud de su corazón' de 'toda su alma'. Por eso conservo 'plenitud' para no borrar la diferencia léxica.
- source_word: ܟܠܗ̇ ܢܦܫܗ
  english_pob_choice: with all his soul
  chosen_spanish: con toda su alma
  alternatives_spanish:
  - con toda su vida
  - con todo su ser
  lexicon: Payne Smith
  rationale: '''Alma'' conserva el paralelismo bíblico tradicional y refleja con claridad el alcance totalizante de la expresión. En español resulta más transparente que una paráfrasis como ''todo su ser''.'
- source_word: ܚܝܠܬܢܐ
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Valeroso
  lexicon: Payne Smith
  rationale: Aunque el texto base aquí no usa ܚܝܠܬܢܐ en la línea traducida, la auditoría inglesa señaló la tensión entre el título divino y el nombre del rey. Mantengo el equivalente divino estándar para preservar la lectura teológica correcta.
theological_decisions:
- issue: Identidad histórica del rey de Judá
  english_pob_reading: Josiah king of Judah
  chosen_spanish_reading: Josías, rey de Judá
  alternative_spanish_readings:
  - Amón, rey de Judá
  rationale: La secuencia contextual de reformas y purificación del pasaje corresponde a Josías, no a Amón. Sigo la lectura históricamente coherente ya adoptada por el audit trail inglés.
  doctrine_reference: 2 Reyes 22–23; 2 Crónicas 34–35
- issue: Título reverencial para la divinidad
  english_pob_reading: the Mighty One
  chosen_spanish_reading: el Poderoso
  alternative_spanish_readings:
  - el Fuerte
  rationale: El pasaje presenta una referencia reverencial a Dios en un marco apocalíptico. 'El Poderoso' preserva ese peso teológico sin convertirlo en un título eclesiástico tradicional que no está en el fuente.
  doctrine_reference: Deuteronomio 10:17; uso apocalíptico de títulos divinos
- issue: Relación entre 'corazón' y 'alma'
  english_pob_reading: with the fullness of his heart and with all his soul
  chosen_spanish_reading: con la plenitud de su corazón y con toda su alma
  alternative_spanish_readings:
  - con todo su corazón y con toda su alma
  - desde la plenitud de su corazón y con toda su alma
  rationale: La revisión detectó que el syríaco diferencia explícitamente las dos frases. En español mantengo la distinción para no aplanar la intensidad ni perder la tensión léxica entre plenitud del corazón y totalidad del alma.
  doctrine_reference: Deuteronomio 6:5
translation_notes:
  revision_awareness: 'La auditoría inglesa mostró una corrección importante: la línea no debe reducirse a ''con todo su corazón'', porque el syríaco distingue ''la plenitud de su corazón'' de ''toda su alma''. También hubo una tensión en los metadatos ingleses entre el título divino y el rey de Judá; la lectura textual y contextual favorece Josías, rey de Judá, y un título divino separado.'
  spanish_consistency_notes:
  - He mantenido 'aguas brillantes' para reflejar el símbolo apocalíptico recurrente.
  - '''Pureza'' conserva el sentido moral y cultual del pasaje.'
  - No sustituí 'Poderoso' por 'Señor' ni por 'SEÑOR', para respetar la política terminológica del proyecto.
  - La puntuación con raya ayuda a reproducir la estructura explicativa del versículo sin añadir contenido.
  - La nota al pie solo acompaña el título divino, porque la alternativa relevante en español es léxica y no textual.
