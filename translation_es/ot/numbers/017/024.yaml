translation:
  language: es
  text: Así Moisés sacó todas las varas de delante de Yahvé, a todos los hijos de Israel[a]; ellos vieron, y cada hombre tomó su vara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a todos los israelitas». El hebreo dice literalmente «a todos los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּצֵא
  english_pob_choice: brought out
  chosen_spanish: sacó
  alternatives_spanish:
  - trajo fuera
  - sacó afuera
  lexicon: HALOT
  rationale: 'El hebreo hiphil de יצא expresa acción causativa: Moisés hace salir los bastones de su lugar ante Yahvé. En español, «sacó» comunica de forma natural esa causatividad sin añadir matices ajenos.'
- source_word: הַמַּטֹּת
  english_pob_choice: the staffs
  chosen_spanish: los bastones
  alternatives_spanish:
  - las varas
  - los báculos
  lexicon: HALOT
  rationale: El objeto físico en contexto es un bastón/vara, no una «tribu». «Bastones» mantiene el referente concreto y es claro en español; «varas» también sería posible, pero «bastones» resulta más natural para una pieza sostenida o presentada como señal.
- source_word: מִלִּפְנֵי יְהוָה
  english_pob_choice: from before Yahweh
  chosen_spanish: de delante de Yahvé
  alternatives_spanish:
  - de la presencia de Yahvé
  - desde la presencia de Yahvé
  lexicon: HALOT
  rationale: Conservo la imagen espacial del hebreo «de delante de». No la convierto en una paráfrasis abstracta para preservar la relación cultual entre el lugar de los bastones y Yahvé.
- source_word: אֶל כָּל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: to all the sons of Israel
  chosen_spanish: a todos los hijos de Israel
  alternatives_spanish:
  - a todos los israelitas
  - a todos los descendientes de Israel
  lexicon: HALOT
  rationale: «Hijos de Israel» reproduce con transparencia la fórmula nacional hebrea בני ישראל. Se prefiere sobre «israelitas» porque conserva mejor la forma del original, sin perder inteligibilidad.
- source_word: וַיִּרְאוּ
  english_pob_choice: they saw
  chosen_spanish: ellos vieron
  alternatives_spanish:
  - vieron
  - ellos miraron
  lexicon: HALOT
  rationale: El audit trail revisó la lectura de «they looked» a «they saw» por mayor precisión lexical. En español, «vieron» expresa directamente ראה sin introducir una acción distinta como «miraron».
- source_word: וַיִּקְחוּ אִישׁ מַטֵּהוּ
  english_pob_choice: each man took his staff
  chosen_spanish: cada hombre tomó su bastón
  alternatives_spanish:
  - cada uno tomó su bastón
  - cada hombre tomó su vara
  lexicon: HALOT
  rationale: 'El distributivo אִישׁ requiere una traducción distributiva: «cada hombre». Mantengo «bastón» para continuidad léxica con el objeto anterior y por fidelidad al campo semántico de מַטֶּה en este contexto.'
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa explícitamente el Tetragrama. Conforme al estándar del proyecto, se conserva el nombre divino en forma auditable y no se lo sustituye por una máscara litúrgica. «Yahvé» es la forma establecida en el español del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «they looked» a «they saw» para ajustarse mejor al hebreo; la redacción española sigue esa revisión y evita una paráfrasis interpretativa. También se preservó la decisión de traducir el Tetragrama con nombre propio y no con una máscara como «el SEÑOR».
  spanish_consistency_notes:
  - Se mantiene «bastón» de manera uniforme para הַמַּטֹּת y מַטֵּהוּ, evitando alternar con «vara» sin necesidad contextual.
  - «Hijos de Israel» conserva la fórmula hebrea y su paralelo tradicional, mientras que la nota ofrece la alternativa más idiomática «israelitas».
  - La puntuación y el orden siguen una estructura narrativa simple, adecuada para una línea de relato breve en español bíblico moderno.
