  yaml_path: translation/ot/nehemiah/003/016.yaml
  text: After him Nehemiah son of Azbuk[a], ruler of half the district of Beth-zur, made repairs as far as opposite the tombs of David, and as far as the pool that was made[b], and as far as the house of the mighty men.
  footnotes:
