review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del griego y del POB inglés: φθαρτὸν σῶμα = «cuerpo perecedero», ψυχήν = «alma», νοῦν = «mente», y mantiene la distinción antropológica entre alma y mente. También conserva la metáfora de σκῆνος como «tienda». Sin embargo, la nota al pie no corresponde bien al texto griego ni al audit trail inglés: desplaza «hecho de tierra» al «cuerpo» en vez de la «tienda», y además cambia innecesariamente la estructura del verso. Conviene repararla para reflejar correctamente la alternativa documentada para γεῶδες σκῆνος / πολυφρόντιδα.'
  spanish_quality_summary: El español principal es claro, natural y digno. «Pesa sobre el alma» y «agobia una mente llena de cuidados» suenan bien en registro bíblico moderno. «Tienda terrenal» es fiel, aunque algo poco habitual; precisamente por eso la metáfora queda visible, lo cual es deseable aquí. El único problema real de calidad es la nota, que introduce una alternativa menos fiel y puede confundir al lector.
  glossary_alignment: No hay conflictos con la terminología por defecto del proyecto. «Alma» para ψυχή y «mente» para νοῦς coincide con la decisión teológica documentada. «Tienda» para σκῆνος preserva la metáfora mejor que opciones interpretativas como «morada» o «cuerpo».
  issues:
  - severity: medium
    issue: La nota al pie alternativa está mal alineada con el griego y con el POB inglés.
    rationale: El inglés documenta como alternativa «this body made of earth burdens the mind that is full of thoughts», que intenta reflejar «made of earth» como alternativa para γεῶδες, no para σῶμα en la primera cláusula. La nota española actual dice «un cuerpo hecho de tierra agobia la mente llena de pensamientos», moviendo «hecho de tierra» al antecedente equivocado y debilitando la relación con «tienda terrenal». Debe reformularse para que la alternativa recaiga sobre la segunda cláusula y/o sobre «tienda».
  revised_spanish_text: Porque un cuerpo perecedero[a] pesa sobre el alma, y la tienda terrenal agobia una mente llena de cuidados.
  revised_footnotes:
  - marker: a
    text: O «la tienda hecha de tierra agobia la mente llena de pensamientos».
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal, que es fiel y legible. Solo se corrige la nota al pie para que la alternativa léxica refleje adecuadamente el griego y el audit trail inglés: «hecha de tierra» corresponde a γεῶδες y debe modificar la imagen de la tienda/morada terrenal, no el «cuerpo» de la primera cláusula.'
