id: ISA.65.3
reference: Isaiah 65:3
source:
  edition: WLC
  text: הָ/עָ֗ם הַ/מַּכְעִיסִ֥ים אוֹתִ֛/י עַל פָּנַ֖/י תָּמִ֑יד זֹֽבְחִים֙ בַּ/גַּנּ֔וֹת וּֽ/מְקַטְּרִ֖ים עַל הַ/לְּבֵנִֽים־־׃
translation:
  text: the people who continually provoke me to my face[a], sacrificing in the gardens and burning incense on the bricks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''on the bricks.'' The phrase likely refers to brick-built cultic installations or altars used for illicit worship.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעָם
  chosen: the people
  alternatives:
  - a people
  - the nation
  lexicon: HALOT
  rationale: With the article, the phrase points to a definite group already in view. 'The people' is the most natural English rendering here and preserves the collective sense without over-specifying 'nation'.
- source_word: הַמַּכְעִיסִים
  chosen: who ... provoke
  alternatives:
  - who anger
  - who offend
  lexicon: HALOT
  rationale: 'From כעס in the Hiphil, the sense is causative: ''to provoke to anger.'' ''Provoke'' better captures the active, defiant nuance than the flatter ''anger''.'
- source_word: עַל־פָּנַי
  chosen: to my face
  alternatives:
  - before me
  - in my presence
  lexicon: HALOT
  rationale: Literally 'upon my face.' In this rebuke context, the idiom conveys brazen defiance in God's very presence. 'To my face' preserves that confrontational force better than the more neutral 'before me'.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - continually
  - always
  - constantly
  lexicon: HALOT
  rationale: The adverb marks ongoing, repeated action. 'Continually' fits idiomatic English and conveys persistent behavior.
- source_word: זֹבְחִים
  chosen: sacrificing
  alternatives:
  - offering sacrifices
  - slaughtering sacrifices
  lexicon: HALOT
  rationale: The participle denotes ongoing cultic activity. 'Sacrificing' is concise and preserves the ritual sense without unnecessary expansion.
- source_word: בַּגַּנּוֹת
  chosen: in the gardens
  alternatives:
  - among the gardens
  - in garden shrines
  lexicon: HALOT
  rationale: The phrase is locative and likely refers to illicit worship sites associated with gardens. The plain rendering 'in the gardens' keeps the imagery and lets the context signal the cultic impropriety.
- source_word: וּמְקַטְּרִים
  chosen: and burning incense
  alternatives:
  - and making offerings of smoke
  - and offering incense
  lexicon: HALOT
  rationale: The Piel of קטר commonly refers to burning incense or making a smoke offering. 'Burning incense' is the clearest idiomatic English expression in this context.
- source_word: עַל־הַלְּבֵנִים
  chosen: on the brick altars
  alternatives:
  - on the bricks
  - upon the brickwork
  lexicon: HALOT
  rationale: לְבֵנִים means 'bricks.' In this cultic context, the phrase likely refers to brick structures used for illicit worship. Supplying 'altars' in English makes the sense explicit and readable, while preserving the underlying material term in a footnote.
