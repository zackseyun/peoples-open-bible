translation:
  language: es
  text: Sus caminos están siempre delante de él[a]; no se ocultarán de sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su conducta está continuamente delante de él’; ‘caminos’ puede referirse al modo de vida de una persona, no solo a senderos literales.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἱ ὁδοὶ
  english_pob_choice: ways
  chosen_spanish: caminos
  alternatives_spanish:
  - conducta
  - sendas
  lexicon: LSJ
  rationale: ὁδοί puede significar literalmente ‘caminos’ y, en literatura sapiencial, también el modo de vivir. En español, ‘caminos’ conserva la metáfora sin volverla forzada; ‘conducta’ explicita el sentido, pero pierde la imagen del texto.
- source_word: ἐναντίον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: LSJ
  rationale: La expresión indica estar puesto ante alguien, a la vista o en presencia de esa persona. ‘Delante de él’ suena natural en español y mantiene la imagen visual/judicial sin añadir interpretación.
- source_word: διὰ παντός
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  - en todo tiempo
  lexicon: LSJ
  rationale: El giro idiomático expresa continuidad constante. ‘Siempre’ es la equivalencia más clara y natural en español moderno.
- source_word: οὐ κρυβήσονται
  english_pob_choice: will not be hidden
  chosen_spanish: no serán ocultados
  alternatives_spanish:
  - no se esconderán
  - no podrán ocultarse
  lexicon: LSJ
  rationale: El futuro pasivo pide una forma pasiva en español. ‘No serán ocultados’ refleja bien la forma verbal y conserva la afirmación sin convertirla en mera posibilidad.
- source_word: ἀπὸ τῶν ὀφθαλμῶν αὐτοῦ
  english_pob_choice: from his eyes
  chosen_spanish: de sus ojos
  alternatives_spanish:
  - de su vista
  - ante sus ojos
  lexicon: LSJ
  rationale: La imagen antropomórfica se mantiene de manera directa. ‘De sus ojos’ reproduce con fidelidad el concreto lenguaje visual del griego y preserva el tono sapiencial sobre el conocimiento divino.
theological_decisions:
- issue: Antropomorfismo para el conocimiento divino
  english_pob_reading: Retain 'before him' and 'from his eyes' as personal, visual language for God.
  chosen_spanish_reading: 'Conservar el lenguaje visual: ‘delante de él’ y ‘de sus ojos’.'
  alternative_spanish_readings:
  - ‘conocidos por él’
  - ‘no le estarán ocultos’
  rationale: El griego usa imágenes concretas de visión para expresar que Dios conoce continuamente la conducta humana. La traducción conserva esa imagen para no aplanar el valor teológico y sapiencial del versículo.
  doctrine_reference: DOCTRINE.md §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con el texto griego de Swete 1909 y con el audit trail inglés: se mantiene la metáfora de ‘ways/ὁδοί’, el valor de presencia de ἐναντίον, la continuidad de διὰ παντός y la imaginería visual de οὐ κρυβήσονται ἀπὸ τῶν ὀφθαλμῶν αὐτοῦ, sin cambios de revisión pendientes.'
  spanish_consistency_notes:
  - Se prefirió ‘caminos’ en lugar de ‘conducta’ en el texto principal para conservar la metáfora sapiencial; la nota aclara el sentido ampliado.
  - ‘Delante de él’ y ‘de sus ojos’ mantienen la imagen de vigilancia divina sin sustituirla por una abstracción.
  - La pasiva ‘no serán ocultados’ refleja el futuro pasivo del griego y evita introducir una modalidad no presente en el original.
