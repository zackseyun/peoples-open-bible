translation:
  language: es
  text: Porque la ira—cuidado, no sea que te incite al escarnio[a]—, y no dejes que un gran rescate[b][c] te desvíe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘cuidado, no sea que te incite con aplausos’; el término hebreo traducido ‘escarnio’ es difícil y puede referirse más literalmente a golpear las manos o aplaudir, posiblemente como gesto de burla.
    reason: lexical_alternative
  - marker: b
    text: O ‘un rescate grande’; el hebreo puede entenderse con ‘grande’ calificando directamente a ‘rescate’.
    reason: alternative_reading
  - marker: c
    text: ‘Rescate’ también puede entenderse como ‘precio de expiación’ o, en algunos contextos, ‘soborno’.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: HALOT
  rationale: Expresa la relación causal o motivadora del verso de manera natural en español, conservando el valor introductorio del hebreo.
- source_word: חֵמָה
  english_pob_choice: wrath
  chosen_spanish: la ira
  alternatives_spanish:
  - el furor
  - la indignación
  lexicon: HALOT
  rationale: ‘Ira’ comunica bien la intensidad del término sin fijar indebidamente si se trata de ira humana o divina; mantiene abierta la tensión interpretativa preservada por la POB inglesa.
- source_word: פֶּן
  english_pob_choice: beware lest
  chosen_spanish: cuidado, no sea que
  alternatives_spanish:
  - no sea que
  - teme que
  lexicon: HALOT
  rationale: Reproduce el matiz admonitorio del hebreo con una advertencia natural en español, sin perder la fuerza preventiva de la partícula.
- source_word: יְסִיתְךָ
  english_pob_choice: it entice you
  chosen_spanish: te seduzca
  alternatives_spanish:
  - te incite
  - te arrastre
  - te desvíe
  lexicon: HALOT
  rationale: El hiphil de סות puede implicar incitar o desviar; ‘seduzca’ refleja bien la idea de atraer a una respuesta equivocada en un contexto de advertencia, aunque no agota las otras posibilidades.
- source_word: בְסָפֶק
  english_pob_choice: into scoffing
  chosen_spanish: hacia el escarnio
  alternatives_spanish:
  - a la burla
  - hacia el desprecio
  - con aplausos
  lexicon: HALOT
  rationale: Se elige una expresión idiomática clara en español para el sentido probable de burla/escarnio. La opción más literal y debatida, ligada a ‘aplaudir’ o golpear las manos, se preserva como alternativa por la dificultad léxica del término.
- source_word: וְרָב
  english_pob_choice: a great
  chosen_spanish: un gran
  alternatives_spanish:
  - un rescate grande
  - un rescate abundante
  - la grandeza de un rescate
  lexicon: HALOT
  rationale: Siguiendo la revisión inglesa, ‘un gran rescate’ es más natural que una construcción nominal pesada, y conserva el valor de רָב como intensificación de כֹּפֶר.
- source_word: כֹּפֶר
  english_pob_choice: a ransom
  chosen_spanish: rescate
  alternatives_spanish:
  - precio de expiación
  - precio de rescate
  - soborno
  lexicon: HALOT
  rationale: ‘Rescate’ conserva el campo semántico de precio pagado para evitar consecuencias. Las alternativas mantienen abiertas las otras posibilidades documentadas por la POB inglesa sin cerrarlas prematuramente.
- source_word: אַל יַטֶּךָּ
  english_pob_choice: do not let ... turn you aside
  chosen_spanish: no dejes que ... te desvíe
  alternatives_spanish:
  - no dejes que ... te incline
  - no permitas que ... te aparte
  - no dejes que ... te vuelva atrás
  lexicon: HALOT
  rationale: ‘Desviar’ comunica la idea de apartarse del camino recto o justo con buena naturalidad en español y conserva la metáfora direccional del verbo.
theological_decisions:
- issue: Referente de la ira
  english_pob_reading: Render generically as 'wrath' without specifying whether it is Job's anger, divine wrath, or wrath in principle.
  chosen_spanish_reading: Traducir genéricamente como ‘la ira’, sin precisar si es la ira de Job, la ira divina o la ira en principio.
  alternative_spanish_readings:
  - la ira de Dios
  - tu ira
  - el enojo
  rationale: El hebreo no identifica de manera explícita el referente, y el contexto admite más de una lectura. La versión española conserva esa ambigüedad en lugar de resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Sentido de כֹּפֶר
  english_pob_reading: '''Ransom'' may also be understood as ''price of atonement'' or, in some contexts, ''bribe.'''
  chosen_spanish_reading: ‘Rescate’ en el texto principal, dejando abiertas ‘precio de expiación’ y ‘soborno’ como alternativas según contexto.
  alternative_spanish_readings:
  - precio de expiación
  - soborno
  - precio de rescate
  rationale: La POB inglesa documenta un rango semántico que no conviene cerrar. ‘Rescate’ es el término más neutral y amplio en español, pero las alternativas se mantienen para no borrar la tensión léxica.
  doctrine_reference: 'Translation philosophy §3: Preserve lexical tension rather than flatten semantic range.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente de la POB inglesa, que preferió ‘a great ransom’ frente a una construcción más nominal. En español se refleja esa naturalidad con ‘un gran rescate’, manteniendo la advertencia causal y la ambigüedad del referente de ‘ira’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como convención del proyecto cuando el hebreo lo exija explícitamente, pero este versículo no contiene el nombre divino.
  - Se evita ‘Mesías/Cristo’ porque no interviene en el texto.
  - Se conserva la distinción entre ‘ira’ y otras posibles intensidades afectivas sin añadir especificación doctrinal.
  - ‘Rescate’ se usa como término principal para כֹּפֶר, alineado con el rango semántico documentado y con la revisión inglesa más reciente.
