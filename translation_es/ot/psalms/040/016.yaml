translation:
  language: es
  text: 'Queden atónitos[a] por causa de[b] su vergüenza los que me dicen: “¡Ja! ¡Ja!”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como “queden desolados”, “queden pasmados” o “queden devastados”; el verbo hebreo admite la idea de ruina o asombro atónito.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “sobre el talón de su vergüenza”, un modismo que expresa consecuencia o causa.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשֹׁמּוּ
  english_pob_choice: be appalled
  chosen_spanish: queden atónitos
  alternatives_spanish:
  - queden desolados
  - queden pasmados
  - queden devastados
  lexicon: HALOT
  rationale: El verbo de שׁמם puede expresar desolación, asombro o devastación; en este contexto de burla y juicio, ‘queden atónitos’ comunica el golpe de sorpresa y ruina sin perder naturalidad en español. Mantiene la amplitud semántica reconocida por la POB inglesa.
- source_word: עַל עֵקֶב
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - en razón de
  - por motivo de
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y causal. ‘Por causa de’ expresa bien la relación de consecuencia sin forzar un calco demasiado literal del ‘sobre el talón de’.
- source_word: בָּשְׁתָּם
  english_pob_choice: their shame
  chosen_spanish: su vergüenza
  alternatives_spanish:
  - su deshonra
  - su oprobio
  - su humillación
  lexicon: HALOT
  rationale: ‘Vergüenza’ es la equivalencia más directa y mantiene el campo semántico de deshonra pública. ‘Deshonra’ u ‘oprobio’ serían posibles, pero ‘vergüenza’ conserva mejor la conexión léxica con el hebreo.
- source_word: הָאֹמְרִים לִי
  english_pob_choice: those who say to me
  chosen_spanish: los que me dicen
  alternatives_spanish:
  - los que me están diciendo
  - los que dicen a mí
  lexicon: HALOT
  rationale: El participio con artículo funciona de manera sustantiva. En español, ‘los que me dicen’ reproduce con claridad esa función sin añadir contenido aspectual innecesario.
- source_word: הֶאָח הֶאָח
  english_pob_choice: Aha, aha!
  chosen_spanish: ¡Ja, ja!
  alternatives_spanish:
  - ¡Ajá, ajá!
  - ¡Ja, ja, ja!
  - ¡Ah, ah!
  lexicon: HALOT
  rationale: El hebreo expresa burla o regocijo despectivo. En español, ‘¡Ja, ja!’ suena naturalmente a mofa y comunica el tono de gloating. ‘¡Ajá, ajá!’ podría sonar más a descubrimiento que a escarnio.
translation_notes:
  revision_awareness: Verso estable sin revisiones aplicadas en el paquete de auditoría; la redacción española busca equilibrio óptimo entre naturalidad y correspondencia semántica con el hebreo, manteniendo la ambigüedad léxica de שׁמם mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene ‘vergüenza’ para בָּשְׁתָּם, en línea con el campo léxico de deshonra pública.
  - Se evita ‘SEÑOR’ u otra sustitución teológica no presente en el hebreo; el verso no contiene el nombre divino.
  - ‘¡Ja, ja!’ preserva el tono de burla del doble הֶאָח sin añadir explicaciones al cuerpo del texto.
