review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: un hombre consagra a Yahvé parte del campo de su posesión hereditaria, y la tasación se fija según la cantidad de semilla necesaria para sembrarlo, a razón de cincuenta siclos de plata por un homer de cebada. También preserva correctamente el matiz partitivo de מִן en מִשְּׂדֵה אֲחֻזָּתוֹ y el nombre divino Yahvé.'
  spanish_quality_summary: 'El español es claro y mayormente natural, pero dos elecciones necesitan ajuste: «valuación» suena poco idiomático en español bíblico general frente a «tasación» o «valoración», y «conforme a su cantidad de semilla» es menos natural y menos preciso que una formulación como «según la semilla que requiera» o «según su requerimiento de semilla». Además, la nota al pie dice que el prefijo «de» sugiere parcialidad, cuando debería referirse al prefijo hebreo con sentido de «de/desde» o indicarse como prefijo partitivo.'
  glossary_alignment: Alinea bien con el glosario del proyecto en «Yahvé», «consagra», «un hombre» y «siclos de plata». La excepción principal es «valuación», que no contradice el glosario pero resulta menos adecuada para el registro español. «Tasación» comunica mejor el valor técnico de עֶרְכְּךָ en Levítico 27.
  issues:
  - severity: medium
    issue: «tu valuación» es poco idiomático en español
    rationale: Aunque comprensible, «valuación» suena técnica y ajena al registro bíblico común. עֶרְכְּךָ en este contexto legal-cultual se expresa mejor como «tu tasación» o «tu valoración». «Tasación» preserva bien el sentido de valoración fijada oficialmente.
  - severity: medium
    issue: «conforme a su cantidad de semilla» es menos natural y algo impreciso
    rationale: לְפִי זַרְעוֹ se refiere a la semilla requerida para sembrar el campo, no meramente a una cantidad abstracta de semilla. «Según la semilla que requiera» expresa mejor el sentido agrario y suena más natural en español.
  - severity: low
    issue: La nota al pie explica imprecisamente el prefijo hebreo
    rationale: Dice que el prefijo «de» sugiere parcialidad, pero conviene aclarar que se trata del prefijo hebreo con valor partitivo («de/desde», es decir, parte de), no de un mero «de» español.
  revised_spanish_text: 'Si un hombre consagra a Yahvé parte del campo de su posesión[a], entonces tu tasación será según la semilla que requiera: cincuenta siclos de plata por la semilla de un homer de cebada.'
