translation:
  language: es
  text: No lo sientes a tu derecha[a], no sea que busque tu asiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No lo pongas a tu derecha, no sea que busque tu lugar». El hebreo puede implicar no solo un asiento literal, sino también tu posición o estatus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל / Do not
  english_pob_choice: Do not
  chosen_spanish: No lo sientes
  alternatives_spanish:
  - No lo pongas
  - No permitas que se siente
  lexicon: HALOT
  rationale: La prohibición hebrea es directa; en español, una forma imperativa negativa con objeto expresa bien la acción causativa de תּוֹשִׁיבֵהוּ sin alargar la frase.
- source_word: תּוֹשִׁיבֵהוּ / seat him
  english_pob_choice: seat him
  chosen_spanish: lo sientes
  alternatives_spanish:
  - lo hagas sentar
  - le des asiento
  lexicon: HALOT
  rationale: El verbo causativo pide una traducción activa y concreta. 'Sentar' conserva la imagen de otorgarle un lugar, mejor que una paráfrasis abstracta.
- source_word: לִימִינֶךָ / at your right hand
  english_pob_choice: at your right hand
  chosen_spanish: a tu derecha
  alternatives_spanish:
  - a tu mano derecha
  - en tu derecha
  lexicon: HALOT
  rationale: En español, 'a tu derecha' suena natural y mantiene la imagen espacial y de honor implícita en el hebreo.
- source_word: לָמָּה / lest
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - porque podría
  lexicon: HALOT
  rationale: Aquí la partícula introduce la consecuencia indeseada; 'no sea que' comunica bien el matiz preventivo del hebreo y del paralelo griego.
- source_word: יְבַקֵּשׁ / he seek
  english_pob_choice: he seek
  chosen_spanish: busque
  alternatives_spanish:
  - trate de obtener
  - ande buscando
  lexicon: HALOT
  rationale: '''Buscar'' reproduce el valor amplio de בקש y en español puede abarcar tanto aspiración como intento de obtener.'
- source_word: מוֹשָׁבֶךָ / your seat
  english_pob_choice: your seat
  chosen_spanish: tu asiento
  alternatives_spanish:
  - tu lugar
  - tu puesto
  lexicon: HALOT
  rationale: '''Asiento'' conserva la metáfora concreta de silla o lugar ocupado, mientras deja abierta la posible extensión a posición o estatus que el hebreo permite.'
theological_decisions:
- issue: Relación entre el hebreo concreto y el paralelo griego sobre la cercanía a un pecador
  english_pob_reading: Translate the extant Hebrew directly, while allowing the Greek parallel to confirm that the warning concerns granting honor/proximity to a morally dangerous person.
  chosen_spanish_reading: Traducir el hebreo conservando la imagen concreta del asiento, sin explicitar en el texto principal la noción de honor o estatus, aunque queda implícita.
  alternative_spanish_readings:
  - No lo coloques a tu derecha, no sea que busque tu lugar.
  - No le concedas el puesto de honor a tu derecha, no sea que busque tu puesto.
  rationale: El hebreo es claro y debe gobernar la traducción; el paralelo griego apoya la advertencia general, pero no justifica desplazar la imagen original de sentarse. La redacción española mantiene esa tensión entre literalidad e implicación social.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva; usar el griego paralelo como apoyo sin desplazar el testimonio principal.'
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con la revisión más reciente; no se detectaron cambios sustanciales en el sentido base. La versión española sigue el hebreo conservado y toma el paralelo griego solo como confirmación del tono de advertencia.
  spanish_consistency_notes:
  - Se mantiene 'asiento' para preservar la imagen concreta del hebreo מוֹשָׁב, con la nota aclarando la posible extensión a 'lugar' o 'estatus'.
  - Se prefiere 'a tu derecha' en español natural, equivalente funcional de לִימִינֶךָ.
  - '''No sea que'' traduce el valor preventivo de לָמָּה en este contexto sapiencial.'
