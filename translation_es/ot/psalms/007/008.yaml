revisions:
- from: Y que la asamblea de los pueblos te rodee[a][b]; y sobre ella vuelve a lo alto.
  to: Y que la asamblea de los pueblos te rodee[a][b]; y sobre ellos vuelve a lo alto.
  rationale: Se restituye en el texto principal la lectura colectiva documentada por el POB para וְעָלֶיהָ ('sobre ellos'), mientras la nota conserva la alternativa singular formal ('sobre ella') que refleja el sufijo femenino singular referido a 'asamblea'. Así el español sigue mejor la evidencia fuente, el audit trail inglés y la naturalidad contextual.
