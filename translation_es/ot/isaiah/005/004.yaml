translation:
  language: es
  text: ¿Qué más había por hacer para mi viña que yo no haya hecho en ella? ¿Por qué, cuando esperaba que produjera uvas, produjo uvas silvestres[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uvas inútiles» o «fruto fétido»; el término hebreo se refiere a fruto malo, no apto para usar.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה לַּעֲשׂוֹת עוֹד
  english_pob_choice: What more was there to do
  chosen_spanish: ¿Qué más había por hacer?
  alternatives_spanish:
  - ¿Qué más se podía hacer?
  - ¿Qué más quedaba por hacer?
  lexicon: HALOT
  rationale: La expresión interrogativa con לַעֲשׂוֹת y עוֹד pide una pregunta retórica sobre acción restante o posible. «Había por hacer» mantiene la fuerza retórica sin volverla una paráfrasis demasiado libre.
- source_word: לְכַרְמִי
  english_pob_choice: for my vineyard
  chosen_spanish: por mi viña
  alternatives_spanish:
  - para mi viña
  - a mi viña
  lexicon: HALOT
  rationale: El לְ aquí expresa acción realizada en beneficio de la viña; en español, «por mi viña» comunica bien ese sentido. «Viña» es el equivalente natural de כֶּרֶם.
- source_word: וְלֹא עָשִׂיתִי בּוֹ
  english_pob_choice: that I have not done in it
  chosen_spanish: que yo no haya hecho en ella
  alternatives_spanish:
  - que no hice en ella
  - que no he hecho en ella
  lexicon: HALOT
  rationale: Se conserva el valor de completitud del hebreo con una construcción de relativo en español. «En ella» sigue de cerca el בּוֹ; usar «por ella» sería más idiomático pero menos cercano al texto.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿A qué se debe que
  lexicon: HALOT
  rationale: Interrogativo directo de causa; «¿Por qué» es natural y fiel.
- source_word: קִוֵּיתִי
  english_pob_choice: I expected
  chosen_spanish: esperaba
  alternatives_spanish:
  - confiaba
  - aguardaba
  lexicon: HALOT
  rationale: En este contexto agrícola, el verbo expresa expectativa del resultado. El imperfecto español «esperaba» reproduce bien la expectativa continua o anticipada, sin reducirlo a simple espera pasiva.
- source_word: לַעֲשׂוֹת עֲנָבִים
  english_pob_choice: it to produce grapes
  chosen_spanish: que produjera uvas
  alternatives_spanish:
  - que diera uvas
  - que rindiera uvas
  lexicon: HALOT
  rationale: עָשָׂה con fruto/produce puede significar «producir» o «dar». «Que produjera uvas» conserva el sentido agrícola y el paralelo con el hebreo, y evita una formulación mecánica como «hacer uvas».
- source_word: וַיַּעַשׂ
  english_pob_choice: did it produce
  chosen_spanish: produjo
  alternatives_spanish:
  - dio
  - rindió
  lexicon: HALOT
  rationale: 'La forma narrativa se adapta a la pregunta retórica en español con una pregunta directa: «produjo». Se mantiene la oposición con lo esperado, sin sobrecargar la sintaxis con auxiliares innecesarios.'
- source_word: בְּאֻשִׁים
  english_pob_choice: wild grapes
  chosen_spanish: uvas silvestres
  alternatives_spanish:
  - uvas agrias
  - uvas podridas
  - fruto inútil
  lexicon: HALOT
  rationale: El término hebreo designa fruto malo o inutilizable. «Uvas silvestres» sigue la opción tradicional del POB en inglés y preserva el contraste con las uvas esperadas, mientras que las alternativas más literales pueden resultar menos claras en español.
theological_decisions:
- issue: Metáfora de la viña
  english_pob_reading: Retain 'vineyard' literally in the main text without explicating its referent.
  chosen_spanish_reading: Conservar «mi viña» literalmente en el texto principal, sin explicar aquí que representa a Israel.
  alternative_spanish_readings:
  - «mi pueblo»
  - «Israel»
  rationale: La imagen pertenece al canto de la viña y su explicación aparece en el contexto cercano. Traducirla interpretativamente en este versículo borraría la metáfora que el texto mismo conserva.
  doctrine_reference: 'Principio de traducción: no incorporar en el versículo una interpretación que el pasaje aún no explicita.'
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas; el texto fuente inglés muestra alta concordancia y no hubo cambios posteriores relevantes en el pase más reciente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; en este versículo no está presente.
  - Se usa «viña» para כֶּרֶם, coherente con el registro bíblico y con el sentido agrícola del pasaje.
  - «Uvas silvestres» preserva la tensión léxica del hebreo entre la expectativa de fruto bueno y el resultado malo o inútil.
  - Se evitó sustituir la metáfora por una explicación teológica en el texto principal.
