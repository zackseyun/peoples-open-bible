lexical_decisions:
- source_word: ἔπαινον δόξης τῆς χάριτος αὐτοῦ
  english_pob_choice: the praise of the glory of his grace
  chosen_korean: 영광스러운 은혜를 찬송하게
  alternatives_korean:
  - 그분의 은혜의 영광을 찬송하게
  lexicon: BDAG
  rationale: 헬라어 중첩 속격을 한국어로 직역하면 무거우므로 「영광스러운 은혜」로 풀고 찬송의 목적성을 보존한다.
- source_word: ἐχαρίτωσεν
  english_pob_choice: favored
  chosen_korean: 베푸신
  alternatives_korean:
  - 은혜를 입히신
  - 은혜로 사로잡으신
  lexicon: BDAG
  rationale: χάρις 동족동사. 「은혜로 받아들이심」의 함의가 있으나 한국어 흐름상 「은혜는 … 우리에게 베푸신 것」 구조로 보존한다.
- source_word: ἐν τῷ ἠγαπημένῳ
  english_pob_choice: in the Beloved
  chosen_korean: 사랑하시는 자 안에서
  alternatives_korean:
  - 사랑받으신 분 안에서
  lexicon: BDAG
  rationale: 완료 수동분사로 메시아의 정형 칭호. 「사랑하시는 자 안에서」가 한국어로 자연스럽다.
