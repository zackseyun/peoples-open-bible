revisions:
- from: 'La porción del rey, tomada de sus propias posesiones, era para los holocaustos: los holocaustos de la mañana y de la tarde, y los holocaustos para los sábados, las lunas nuevas y las fiestas señaladas, conforme a lo que está escrito en la Ley de Yahvé.'
