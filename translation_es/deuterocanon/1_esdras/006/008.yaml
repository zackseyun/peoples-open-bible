translation:
  language: es
  text: 'Sea conocido todo a nuestro señor el rey: cuando llegamos a la tierra de Judea y a Jerusalén, la ciudad, hallamos a los ancianos del cautiverio de los judíos en Jerusalén, la ciudad, edificando una gran casa nueva para Yahvé[a],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Casa'' traduce literalmente οἶκος y mantiene la referencia al templo sin introducir un término interpretativo no presente en el griego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα γνωστὰ ἔστω
  english_pob_choice: Let everything be known
  chosen_spanish: Sea conocido todo
  alternatives_spanish:
  - Que todo sea conocido
  - Hágase conocido todo
  lexicon: LSJ
  rationale: La fórmula es epistolar y exhortativa. En español, 'Sea conocido todo' conserva el valor de deseo/mandato y la amplitud de πάντα sin volverse rígidamente literal.
- source_word: τῷ κυρίῳ ἡμῶν τῷ βασιλεῖ
  english_pob_choice: to our lord the king
  chosen_spanish: ante nuestro señor el rey
  alternatives_spanish:
  - a nuestro señor el rey
  - a nuestro soberano rey
  lexicon: LSJ
  rationale: Aquí κύριος es título cortesano del rey persa, no título divino. 'Señor' refleja el rango deferencial y 'nuestro' mantiene el tono oficial del informe; 'ante' comunica mejor el destinatario implícito del mensaje en español natural.
- source_word: παραγενόμενοι
  english_pob_choice: when we came
  chosen_spanish: cuando llegamos
  alternatives_spanish:
  - habiendo llegado
  - cuando vinimos
  lexicon: LSJ
  rationale: El participio es temporal en contexto. 'Cuando llegamos' es idiomático y fiel al marco narrativo.
- source_word: χώραν τῆς Ἰουδαίας
  english_pob_choice: the land of Judea
  chosen_spanish: la tierra de Judea
  alternatives_spanish:
  - la región de Judea
  - el territorio de Judea
  lexicon: LSJ
  rationale: χώρα puede ser tierra, región o territorio. 'Tierra de Judea' es amplio, natural y no sobredetermina una categoría administrativa.
- source_word: Ἰερουσαλὴμ τὴν πόλιν
  english_pob_choice: Jerusalem, the city
  chosen_spanish: a Jerusalén, la ciudad
  alternatives_spanish:
  - Jerusalén, la ciudad
  - la ciudad de Jerusalén
  lexicon: LSJ
  rationale: Se conserva la aposición repetitiva del griego con una ligera naturalización en español.
- source_word: κατελάβομεν
  english_pob_choice: we found
  chosen_spanish: hallamos
  alternatives_spanish:
  - encontramos
  - nos topamos con
  lexicon: LSJ
  rationale: En este contexto el verbo significa 'encontrar/descubrir', no 'apoderarse'. 'Hallamos' mantiene la sobriedad del informe.
- source_word: τῆς αἰχμαλωσίας
  english_pob_choice: of the Jewish exiles
  chosen_spanish: del cautiverio
  alternatives_spanish:
  - de la cautividad
  - de la deportación
  lexicon: LSJ
  rationale: La POB en inglés revisó el texto hacia una expresión más cercana a la fuente. En español, 'del cautiverio' reproduce bien el genitivo y conserva la dureza histórica del término.
- source_word: τοὺς πρεσβυτέρους τῶν Ἰουδαίων
  english_pob_choice: the elders of the captivity of the Jews
  chosen_spanish: a los ancianos ... de los judíos
  alternatives_spanish:
  - a los ancianos de los judíos del cautiverio
  - a los ancianos judíos del cautiverio
  lexicon: LSJ
  rationale: El griego es comprimido y vincula a los ancianos con la comunidad judía en condición de cautiverio/retorno. 'Ancianos' es el equivalente habitual de πρεσβυτέρους; la frase completa se integra en español con el genitivo posterior sin forzar interpretaciones adicionales.
- source_word: οἰκοδομοῦντας οἶκον
  english_pob_choice: building ... house
  chosen_spanish: edificando una gran casa nueva
  alternatives_spanish:
  - construyendo una gran casa nueva
  - levantando una gran casa nueva
  lexicon: LSJ
  rationale: '''Edificando'' conserva el registro solemne del texto. ''Casa'' reproduce οἶκος sin importar ''templo'' en el cuerpo del texto.'
- source_word: τῷ κυρίῳ
  english_pob_choice: for the Lord
  chosen_spanish: para el Señor
  alternatives_spanish:
  - para Yahvé
  - para el Señor Dios
  lexicon: LSJ
  rationale: Aquí κύριος se refiere al Dios de Israel. Conforme al contexto, se usa 'Señor' con mayúscula; el término es el referente divino del pasaje, y en español este uso es claro e inteligible.
- source_word: μέγαν καινόν
  english_pob_choice: a great new
  chosen_spanish: una gran casa nueva
  alternatives_spanish:
  - una casa grande y nueva
  - una casa nueva y grande
  lexicon: LSJ
  rationale: Ambos adjetivos califican a οἶκον. 'Gran casa nueva' preserva los dos rasgos sin inflar el sentido de μέγαν.
theological_decisions:
- issue: 'Doble uso de κύριος: rey persa y Dios de Israel'
  english_pob_reading: Use 'lord' for the kingly title in lowercase within the phrase 'our lord the king,' and 'Lord' for God in 'house for the Lord.'
  chosen_spanish_reading: Usar 'señor' para el título real y 'Señor' para Dios, distinguiendo por contexto y mayúscula.
  alternative_spanish_readings:
  - usar 'amo' para el rey y 'Señor' para Dios
  - usar 'soberano' para el rey y 'Señor' para Dios
  rationale: 'El mismo término griego se aplica a dos referentes distintos. En español, el contexto permite mantener la transparencia léxica sin confundir al lector: el rey recibe el tratamiento cortesano, mientras que Dios recibe el título reverencial tradicional.'
  doctrine_reference: 'DOCTRINE.md: κύριος default Spanish ''Señor''; distinguir por contexto cuando el referente no es divino'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail en cuanto a mantener el genitivo de 'cautiverio' con mayor cercanía al texto fuente, y se evitó la compresión interpretativa de 'exiliados' donde el griego conserva la expresión más dura de la condición de cautiverio. También se preservó la aposición repetitiva de Jerusalén y la distinción contextual entre el señorío del rey y el Señor divino.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para el referente divino y 'señor' para el rey persa, siguiendo el valor contextual de κύριος.
  - '''Cautiverio'' conserva mejor la dureza del genitivo τῆς αἰχμαλωσίας que una paráfrasis más suavizada.'
  - '''Casa'' se usa como equivalente de οἶκος, con la nota para explicitar la referencia al templo.'
  - La puntuación reproduce el tono de reporte oficial del original griego.
