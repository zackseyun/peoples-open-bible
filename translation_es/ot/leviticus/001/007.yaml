review_pass:
  verdict: approve
  source_alignment_summary: 'El borrador español refleja fielmente el hebreo: mantiene el sujeto «los hijos de Aarón», la aposición singular «el sacerdote» referida a Aarón, las dos acciones secuenciales («pondrán» / «dispondrán») y la repetición espacial «sobre el altar ... sobre el fuego». No añade ni omite contenido relevante del texto fuente.'
  spanish_quality_summary: El español es claro, natural y digno. «Leña» funciona muy bien en contexto sacrificial y «dispondrán» comunica adecuadamente la idea ritual de ordenar/colocar. La puntuación con comas para la aposición es correcta y legible.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. «Sacerdote», «altar», «fuego» y «leña» concuerdan con el contexto. La decisión de conservar «el sacerdote» en singular está bien alineada con la nota léxica inglesa sobre הַכֹּהֵן.
  issues:
  - severity: low
    issue: La nota al pie española no reproduce la alternativa completa del inglés sobre «los hijos de Aarón» / «la familia sacerdotal».
    rationale: No es necesario para la fidelidad del texto principal, porque la alternativa inglesa era opcional y el español principal ya refleja bien el hebreo. La nota actual preserva al menos la alternativa principal sobre ערך («prepararán ... en orden»).
