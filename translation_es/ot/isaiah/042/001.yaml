translation:
  language: es
  text: He aquí mi siervo, a quien sostengo; mi escogido, en quien se deleita mi alma[a]. He puesto mi Espíritu[c] sobre él; él sacará justicia[b] a las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con quien estoy complacido» para «en quien se deleita mi alma».'
    reason: lexical_alternative
  - marker: b
    text: «Justicia» también puede traducirse «juicio»; el hebreo mishpat puede denotar decisión judicial, justicia o un orden justo.
    reason: lexical_alternative
  - marker: c
    text: En el Nuevo Testamento, este versículo se aplica a Jesús el Mesías (véase Mt 12:18).
    reason: cross_reference
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  - Atiende
  lexicon: HALOT
  rationale: La partícula introduce la proclamación con fuerza deíctica. «Mira» conserva el llamado de atención en español moderno y mantiene un tono profético natural, sin volverlo arcaizante como «he aquí».
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi esclavo
  - mi servidor
  lexicon: HALOT
  rationale: En este contexto de vocación y misión del elegido, «siervo» comunica la relación de servicio sin imponer en español la dureza de «esclavo», que no es la opción contextual del POB inglés.
- source_word: אֶתְמָךְ בּוֹ
  english_pob_choice: whom I uphold
  chosen_spanish: a quien sostengo
  alternatives_spanish:
  - a quien yo apoyo
  - a quien sostengo con mi mano
  - a quien mantengo
  lexicon: HALOT
  rationale: El verbo implica sostén, apoyo firme o mantenimiento. «Sostengo» reproduce esa idea de apoyo continuo de manera natural en español, y la relativa evita una construcción forzada.
- source_word: בְּחִירִי
  english_pob_choice: my chosen one
  chosen_spanish: mi escogido
  alternatives_spanish:
  - mi elegido
  - mi escogido, mi elegido
  lexicon: HALOT
  rationale: El adjetivo sustantivado señala a uno escogido especialmente. «Mi escogido» conserva la personalización sin perder la concisión del hebreo; «elegido» es posible, pero en español suele sonar menos marcado como término de elección divina.
- source_word: רָצְתָה נַפְשִׁי
  english_pob_choice: in whom my soul delights
  chosen_spanish: en quien se deleita mi alma
  alternatives_spanish:
  - en quien se complace mi alma
  - con quien se agrada mi alma
  - quien agrada a mi alma
  lexicon: HALOT
  rationale: Se conserva la imagen intensiva de «mi alma», que refleja el hebreo con su fuerza antropomórfica. «Deleita» mantiene el matiz de gozo/aprobación que el POB preserva con «delights».
- source_word: נָתַתִּי רוּחִי עָלָיו
  english_pob_choice: I have put my Spirit upon him
  chosen_spanish: He puesto mi Espíritu sobre él
  alternatives_spanish:
  - He dado mi Espíritu sobre él
  - Puse mi Espíritu sobre él
  - He puesto mi espíritu sobre él
  lexicon: HALOT
  rationale: «Poner sobre» reproduce היטב la construcción hebrea נתן + רוח + על. Se capitaliza «Espíritu» porque el hablante es Dios y el contexto denota la presencia/empoderamiento divino, no mera disposición interior.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - sentencia
  - recto juicio
  lexicon: HALOT
  rationale: En este marco la palabra abarca más que un veredicto judicial; es la instauración o proclamación de justicia. «Justicia» es la opción más natural y fiel en español, aunque conserva la tensión con «juicio».
- source_word: לַגּוֹיִם
  english_pob_choice: to the nations
  chosen_spanish: para las naciones
  alternatives_spanish:
  - a las naciones
  - para los pueblos
  - a los gentiles
  lexicon: HALOT
  rationale: «Naciones» evita restringir el alcance por una carga cristiana posterior de «gentiles». Se eligió «para» porque el hebreo con ל puede expresar dirección o destinación de la misión de justicia.
- source_word: יוֹצִיא
  english_pob_choice: he will bring forth
  chosen_spanish: sacará
  alternatives_spanish:
  - hará salir
  - hará surgir
  - producirá
  lexicon: HALOT
  rationale: El hifil de יצא puede expresar traer fuera o hacer salir. «Sacará» es breve, fiel y idiomático en español; con «justicia» funciona como manifestación pública de esa realidad.
theological_decisions:
- issue: Identidad del siervo
  english_pob_reading: Render neutrally as 'my servant' without making the messianic identification explicit in the translation text.
  chosen_spanish_reading: 'Mantener una designación neutral: «mi siervo».'
  alternative_spanish_readings:
  - «mi Mesías»
  - «mi siervo, es decir, el Mesías»
  - «mi elegido»
  rationale: El hebreo nombra al personaje solo como siervo. Aunque el canon cristiano ve aquí cumplimiento en Jesús, la traducción principal no debe incorporar esa interpretación al texto base. La nota permite la conexión sin imponerla.
  doctrine_reference: Cristología canónica; filosofía de traducción §1 y §3
- issue: רוּחִי como Espíritu divino
  english_pob_reading: Capitalize 'Spirit' in 'my Spirit.'
  chosen_spanish_reading: Capitalizar «Espíritu» en «mi Espíritu».
  alternative_spanish_readings:
  - «mi espíritu»
  rationale: En boca de Dios, la expresión apunta al Espíritu divino capacitador. La mayúscula ayuda a distinguir este referente de «espíritu» humano sin añadir contenido ajeno al hebreo.
  doctrine_reference: Pneumatología; filosofía de traducción §6
translation_notes:
  revision_awareness: El último repaso indicó alta concordancia y no requirió cambios; esta versión sigue esa línea sin introducir revisiones textuales nuevas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero en este versículo el texto no contiene el tetragrámaton ni κύριος.
  - Se conservaron «siervo», «escogido», «Espíritu» y «justicia» como términos consistentes con los criterios léxicos del proyecto.
  - La puntuación y el orden reflejan una frase profética natural en español, sin suavizar las tensiones semánticas del hebreo.
