translation:
  language: es
  text: En el año del jubileo, el campo volverá a aquel de quien fue comprado[a], a aquel a quien pertenece la posesión de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a aquel de quien se lo compró». El hebreo identifica a la persona de la cual fue comprado el campo; la construcción puede expresarse de forma más pasiva o más relacional en español.'
    reason: alternative_reading
  - marker: b
    text: 'O: «aquel cuya heredad es la tierra». «אֲחֻזַּת הָאָרֶץ» designa una posesión o tenencia de tierra y, en este contexto, alude al lote familiar original.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנַת
  english_pob_choice: In the year of
  chosen_spanish: En el año de
  alternatives_spanish:
  - En el año
  lexicon: HALOT
  rationale: La construcción preposicional marca un valor temporal; en español, «en el año de» comunica de manera natural el marco cronológico sin forzar la sintaxis.
- source_word: הַיּוֹבֵל
  english_pob_choice: jubilee
  chosen_spanish: jubileo
  alternatives_spanish:
  - Jubileo
  lexicon: HALOT
  rationale: Se conserva el término técnico de la legislación levítica. En español, «jubileo» funciona como sustantivo común y mantiene la referencia al año legislativo específico.
- source_word: יָשׁוּב
  english_pob_choice: shall return
  chosen_spanish: volverá
  alternatives_spanish:
  - devolverá
  - retornará
  lexicon: HALOT
  rationale: El imperfecto hebreo en esta ley expresa consecuencia normativa. «Volverá» transmite bien la idea de retorno legal sin introducir un sujeto no expresado.
- source_word: הַשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - la parcela
  - la tierra
  lexicon: HALOT
  rationale: «שָׂדֶה» designa literalmente un campo; aunque el contexto es de tenencia de tierra, «campo» conserva el referente directo y evita sobreinterpretar el término.
- source_word: לַאֲשֶׁר קָנָהוּ מֵאִתּוֹ
  english_pob_choice: to the one from whom it was bought
  chosen_spanish: al que lo compró
  alternatives_spanish:
  - al que se lo compró
  - al que lo adquirió de él
  lexicon: HALOT
  rationale: El hebreo señala al anterior participante en la transacción, pero la segunda cláusula ya aclara la relación de pertenencia. En español, una formulación más breve y natural puede mantenerse fiel al sentido legal del pasaje. La nota al pie preserva la alternativa de lectura pasiva/relacional del original.
- source_word: לַאֲשֶׁר לוֹ אֲחֻזַּת הָאָרֶץ
  english_pob_choice: to the one to whom the possession of the land belongs
  chosen_spanish: al que tiene la posesión de la tierra
  alternatives_spanish:
  - al que posee la tierra como heredad
  - al que le pertenece la tierra como posesión
  lexicon: HALOT
  rationale: «אֲחֻזָּה» es una posesión o tenencia de tierra; se evita añadir «heredad» en el texto principal para no importar explícitamente un matiz no expresado por el sustantivo mismo. «La posesión de la tierra» conserva el sentido legal y permite que el contexto levítico aporte la dimensión ancestral.
theological_decisions:
- issue: Naturaleza de אֲחֻזַּת הָאָרֶץ en la legislación del jubileo
  english_pob_reading: Rendered as 'the possession of the land' rather than making hereditary status explicit in the main text.
  chosen_spanish_reading: Se traduce «la posesión de la tierra» sin explicitar «heredad» en el cuerpo principal.
  alternative_spanish_readings:
  - la heredad de la tierra
  - la posesión hereditaria de la tierra
  - la posesión ancestral de la tierra
  rationale: El contexto de Levítico trata del reparto y retorno de la tierra familiar, pero el sintagma hebreo en este versículo dice literalmente «posesión de la tierra». Mantener ese valor evita sobrecargar el texto con una explicación interpretativa y conserva la tensión entre la forma lexical y el trasfondo jurídico-covenantal.
  doctrine_reference: 'Principio de traducción: no introducir en el texto principal precisiones doctrinales o históricas que el término hebreo no formula de manera explícita.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del texto inglés, que prefirió la pasiva «was bought» para no introducir un sujeto ambiguo no expresado en el hebreo. En español, se optó por una forma activa breve («al que lo compró») solo en el cuerpo principal por fluidez, mientras la nota a conserva la posibilidad pasiva más cercana al hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se eligió «jubileo» en minúscula por tratarse aquí de un nombre común técnico de la ley, no de un título litúrgico.
  - «Tierra» se usa para הָאָרֶץ por su valor de posesión territorial; no se reemplaza por «país» o «suelo» para no perder la referencia jurídica.
