    rationale: Aunque ἐνέγκαι puede traducirse de manera amplia, al salir por puertas laterales con el propósito de volver con lo mandado, el español idiomático y el punto de referencia del relato favorecen «traer» o «ir a buscar ... y traer». «Llevar» puede sonar direccionalmente invertido.
