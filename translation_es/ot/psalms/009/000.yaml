translation:
  language: es
  text: 'Para el director del coro: según «Muerte del Hijo»[a]. Salmo de David.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo עַלְמוּת לַבֵּן (‘Alamot-labén’ en transliteración) es una expresión incierta. Probablemente es una indicación musical o nombre de melodía; tradicionalmente también se ha dejado sin traducir como una expresión de tipo propio.
    reason: alternative_reading
lexical_decisions:
- source_word: לַ֭/מְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Al director del coro
  - Para el maestro de coro
  lexicon: HALOT
  rationale: En los encabezados de los salmos, el participio con ל funciona como indicación de ejecución dirigida al responsable musical. «Director del coro» transmite bien esa función litúrgica en español, con un registro claro y natural.
- source_word: עַלְמוּת לַבֵּן
  english_pob_choice: according to “Death of the Son”
  chosen_spanish: según «Muerte del Hijo»
  alternatives_spanish:
  - según Alamot-labén
  - con la melodía «Muerte del Hijo»
  - según «Alamot-labén»
  lexicon: HALOT
  rationale: La expresión hebrea es oscura y el texto apunta probablemente a una designación musical o título de melodía. Mantengo en español una formulación de cita/título para conservar esa función encabezadora y reflejar la lectura léxica probable de מות + בן, sin ocultar la incertidumbre.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Cántico
  lexicon: HALOT
  rationale: El sustantivo marca el género del poema. «Salmo» es la correspondencia natural y fiel en español para los encabezados de este tipo.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en los títulos de salmos puede indicar autoría, dedicación o asociación. «De David» preserva mejor esa amplitud que una versión más específica como «por David».
translation_notes:
  revision_awareness: Se siguió la revisión del inglés POB que coloca la marca de nota inmediatamente después de la frase incierta «Death of the Son»; en español, la nota se ancla igualmente tras «Muerte del Hijo».
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando el texto explícitamente lo requiere; este versículo no contiene el tetragrámaton.
  - 'Se conserva el orden de encabezado poético típico en español: destinatario musical, indicación melódica y luego género/atribución.'
  - No se tradujo mecánicamente el título oscuro; se mantuvo su carácter incierto con una nota explicativa.
