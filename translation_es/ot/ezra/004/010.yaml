    reason: cross_reference
  - marker: b
    text: ‘Más Allá del Río’ traduce el término administrativo persa para la región al occidente del Éufrates.
    reason: cultural_note
  - marker: c
    text: Fórmula epistolar aramea; también puede entenderse como ‘y así sucesivamente’ o ‘en este momento’.
    reason: lexical_alternative
  revision_rationale: Se ajustó la frase para reflejar con más fidelidad y naturalidad el valor locativo del arameo en ‘el resto ... en Beyond the River’, evitando una construcción española demasiado elíptica. También se mejoró el honorífico a ‘gran y noble’. Además, se reubicó la nota de Osnappar al nombre correspondiente, ya que en el borrador estaba anclada a ‘Samaria’ pese a tratar sobre Osnappar.
