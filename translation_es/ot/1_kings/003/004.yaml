translation:
  language: es
  text: Y el rey fue a Gabaón para sacrificar allí, porque ese era el principal lugar alto[a]. Salomón ofreció mil holocaustos en aquel altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el gran lugar alto'. El adjetivo hebreo puede indicar grandeza en tamaño o prominencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - fue
  - se dirigió
  - viajó
  lexicon: HALOT
  rationale: El verbo narrativo de ir se expresa de forma natural en español con 'fue' aquí. 'Se dirigió' sería más explícito, pero el hebreo no exige esa expansión.
- source_word: גִּבְעֹנָה
  english_pob_choice: to Gibeon
  chosen_spanish: a Gabaón
  alternatives_spanish:
  - a Gibeón
  - a Gabaón
  lexicon: HALOT
  rationale: Se conserva el nombre propio bíblico en su forma castellana usual 'Gabaón', con la dirección marcada por 'a'.
- source_word: לִזְבֹּחַ
  english_pob_choice: to sacrifice
  chosen_spanish: para sacrificar
  alternatives_spanish:
  - para ofrecer sacrificio
  - para inmolar
  lexicon: HALOT
  rationale: '''Sacrificar'' reproduce con concisión el valor básico del infinitivo de זבח. ''Ofrecer sacrificio'' es posible, pero más pesado; ''inmolar'' sería demasiado estrecho.'
- source_word: כִּי הִיא הַבָּמָה הַגְּדוֹלָה
  english_pob_choice: for that was the great high place
  chosen_spanish: porque era el gran lugar alto
  alternatives_spanish:
  - porque era el lugar alto principal
  - porque era el gran alto lugar
  lexicon: HALOT
  rationale: Se mantiene 'lugar alto' para preservar el término cultual בָּמָה. 'Gran' traduce הַגְּדוֹלָה de modo directo; 'principal' es una alternativa interpretativa documentada en el audit trail, pero 'gran' conserva mejor la amplitud semántica de 'great'.
- source_word: אֶלֶף עֹלוֹת
  english_pob_choice: a thousand burnt offerings
  chosen_spanish: mil holocaustos
  alternatives_spanish:
  - mil ofrendas quemadas
  - mil holocaustos
  lexicon: HALOT
  rationale: '''Holocaustos'' es el equivalente bíblico habitual en español para עֹלוֹת, una ofrenda totalmente quemada. Aunque el término puede sonar tradicional, aquí es el más preciso para el género sacrificial específico.'
- source_word: יַעֲלֶה
  english_pob_choice: offered
  chosen_spanish: ofreció
  alternatives_spanish:
  - ofreció
  - ascendió
  lexicon: HALOT
  rationale: El verbal hifil de עלה con עֹלוֹת se vierte idiomáticamente como 'ofreció' (ofrecer holocaustos), tal como el inglés POB ajustó a un simple pasado. 'Ascendió' no comunica el sentido sacrificial en español.
- source_word: עַל הַמִּזְבֵּחַ הַהוּא
  english_pob_choice: on that altar
  chosen_spanish: sobre aquel altar
  alternatives_spanish:
  - sobre ese altar
  - en aquel altar
  lexicon: HALOT
  rationale: '''Sobre'' conserva la imagen espacial de un sacrificio colocado sobre el altar. ''Aquel'' refleja el demostrativo hebreo con distancia narrativa.'
theological_decisions:
- issue: Conservación del término cultual בָּמָה en un contexto de culto previo al templo
  english_pob_reading: high place
  chosen_spanish_reading: lugar alto
  alternative_spanish_readings:
  - alto lugar
  - santuario
  rationale: 'Se conserva la tensión histórica y teológica del texto: Gabaón era un sitio cultual reconocido antes del templo. ''Lugar alto'' mantiene el término técnico sin diluirlo en ''santuario'', que sería más genérico y menos auditable.'
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El audit trail inglés pasó de 'used to offer' a 'offered' para reflejar mejor el imperfecto hebreo como pasado simple en contexto. Por eso el español usa 'ofreció' y no una forma habitual como 'solía ofrecer'.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque aquí no aparece el nombre divino.
  - '''Holocaustos'' se usa como término técnico de sacrificio, coherente con la decisión inglesa ''burnt offerings''.'
  - La nota del 'gran lugar alto' preserva la ambigüedad lexical documentada entre grandeza física y prominencia cultual.
