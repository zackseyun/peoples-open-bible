lexical_decisions:
- source_word: לֹא
  english_pob_choice: not / shall not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no deberás
  - no has de
  lexicon: HALOT
  rationale: La partícula negativa hebrea se expresa naturalmente con «no» en español. El matiz prohibitivo ya queda claro por la forma verbal futura de segunda persona singular en un mandamiento.
- source_word: תִּרְצָח
  english_pob_choice: murder
  chosen_spanish: matarás
  alternatives_spanish:
  - asesinarás
  - cometerás homicidio
  lexicon: HALOT
  rationale: El hebreo רָצַח en este contexto del Decálogo señala muerte ilícita o asesinato, pero en español bíblico y jurídico breve la forma imperativa prohibitiva tradicional «No matarás» comunica con naturalidad el valor normativo del mandamiento sin forzar una frase demasiado técnica. Se preserva la tensión lexical mediante nota.
theological_decisions:
- issue: Alcance de la prohibición del sexto mandamiento
  english_pob_reading: The command forbids murder/unlawful killing, rendered 'You shall not murder.'
  chosen_spanish_reading: El mandamiento prohíbe el homicidio o la muerte ilícita, aunque la redacción española breve usa la forma tradicional «No matarás».
  alternative_spanish_readings:
  - No asesinarás.
  - No cometerás homicidio.
  rationale: La base hebrea favorece una prohibición más estrecha que «matar» en sentido absoluto. Sin embargo, en español la forma clásica «No matarás» es la manera más reconocible y litúrgicamente inteligible de expresar el mandamiento, mientras la nota conserva la precisión lexical de רָצַח.
  doctrine_reference: Translation philosophy §1 (primacía del idioma original) y §5 (consistencia de términos clave o excepción documentada)
translation_notes:
  revision_awareness: 'El original hebreo contiene una prohibición brevísima: לֹא תִּרְצָח. El audit trail inglés opta por «You shall not murder» para reflejar la precisión de רָצַח frente a un verbo general de matar. En español se conserva la forma breve y tradicional «No matarás», pero se documenta la restricción semántica en la nota para no perder la decisión lexical del POB.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología añadida porque este versículo no contiene el nombre divino ni otros términos que requieran ajuste.
  - «Matarás» se usa aquí por la fuerza idiomática del mandamiento en español, no como ampliación semántica; la nota mantiene la precisión de «homicidio/muerte ilícita».
  - El estilo es sobrio y bíblico, pero no arcaizante más allá de la fórmula tradicional del Decálogo.
