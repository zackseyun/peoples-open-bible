lexical_decisions:
- source_word: חַנּוּן
  english_pob_choice: Gracious
  chosen_spanish: ¡Gracioso!
  alternatives_spanish:
  - clemente
  - benigno
  - misericordioso
  lexicon: HALOT
  rationale: El adjetivo hebreo expresa una disposición favorable y bondadosa de Yahvé. En español, «gracioso» comunica de forma breve esa cualidad de favor/gracia, aunque es menos frecuente en estilo bíblico; se conserva la predicación del original sin cargarla con una sola idea de compasión.
- source_word: יְהֹוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El nombre divino aparece explícitamente en el hebreo; el estándar del proyecto en español es «Yahvé», no una máscara reverencial como «SEÑOR». Mantiene el valor de nombre propio del Tetragrámaton.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: HALOT
  rationale: Aunque la POB inglesa prefirió «righteous», en español «justo» es el equivalente más natural y fiel al campo semántico de justicia/moral rectitud. «Recto» es posible, pero aquí «justo» encaja mejor con el paralelismo poético.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  lexicon: HALOT
  rationale: El sufijo posesivo de primera persona plural se conserva para reflejar la relación de pertenencia/alianza. «Nuestro Dios» es la forma natural en español.
- source_word: מְרַחֵם
  english_pob_choice: is compassionate
  chosen_spanish: es compasivo
  alternatives_spanish:
  - muestra misericordia
  - es misericordioso
  - tiene compasión
  lexicon: HALOT
  rationale: El participio denota una cualidad continua. «Compasivo» preserva la predicación adjetival y el valor durativo sin convertirlo en una acción puntual; las alternativas verbalizan más el hebreo que la línea poética favorece.
theological_decisions:
- issue: Nombre divino YHWH en la traducción española
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La fuente hebrea usa directamente el Tetragrámaton. El texto español sigue la decisión editorial del proyecto de transparentar el nombre divino como «Yahvé», preservando su identidad pactual y evitando la sustitución litúrgica por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor semántico de צַדִּיק en paralelismo poético
  english_pob_reading: righteous / just
  chosen_spanish_reading: justo
  alternative_spanish_readings:
  - recto
  - righteous
  rationale: En este contexto doxológico, el adjetivo se entiende como rectitud moral y judicial. «Justo» es la opción española más clara y mantiene la posibilidad semántica de la POB inglesa («righteous» / «just»).
  doctrine_reference: HALOT s.v. צדיק; uso poético en alabanza divina
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del audit trail: no se registraron cambios en la línea inglesa y la evaluación cruzada informó alto acuerdo. La versión española mantiene ese consenso, ajustando solo la naturalidad idiomática necesaria para el español sin perder las opciones léxicas documentadas.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para el Nombre divino, conforme al estándar del proyecto.
  - 'Se conserva la estructura paralela breve del hebreo: predicado sobre Yahvé, predicado sobre su justicia y predicado sobre nuestro Dios.'
  - «Compasivo» se eligió por su carácter adjetival y durativo, paralelo a la forma participial hebrea.
  - Las notas al pie reflejan alternativas léxicas reales sin introducir interpretaciones ajenas al texto.
