revisions:
- from: Y Jacob levantó un pilar[a] sobre su sepultura. Ese es el pilar de la sepultura de Raquel hasta hoy.
  to: Y Jacob levantó una estela[a] sobre su sepultura. Esta es la estela de la sepultura de Raquel hasta hoy.
