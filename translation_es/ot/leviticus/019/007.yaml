  to: Pero si se come al tercer día[a], es una cosa contaminada[b]; no será aceptada.
  rationale: Se ajusta la frase temporal a un español más natural y se sustituye «profanada» por «contaminada» para reflejar mejor el sentido cultual de פִּגּוּל y la revisión inglesa a «defiled thing», manteniendo la no aceptación sacrificial del cierre.
