review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en gran parte el sentido del hebreo y la revisión inglesa: mantiene la doble invitación ‘conmigo… desde el Líbano’, el vocativo nupcial, el valor de תָּשׁוּרִי como ‘mira’, y la imaginería de cumbres, leones y leopardos. Sin embargo, los anclajes de notas están invertidos respecto al contenido: [a] en el texto está sobre ‘Líbano’ pero su nota explica la alternativa verbal ‘mira…’; [b] está sobre ‘Mira’ pero su nota trata de Senir/Hermón. Además, ‘las leopardas’ no refleja bien el plural genérico hebreo נְמֵרִים ni el inglés auditado ‘leopards’; en español suena marcado e innecesariamente femenino.'
  spanish_quality_summary: 'El español es claro y legible, con tono moderno y digno. ‘Ven conmigo desde el Líbano, mi novia’ fluye bien, aunque ‘amada’ o ‘novia’ podrían debatirse; ‘mi novia’ sigue siendo aceptable aquí. La principal reparación es técnica y de fidelidad léxica: corregir las notas y cambiar ‘leopardas’ por ‘leopardos’ o una forma no marcada. ‘Montes de los leopardos’ es natural y conserva la imagen.'
  glossary_alignment: 'No hay términos del glosario mayor en juego (Yahvé, Mesías, etc.). Las decisiones principales están alineadas con la auditoría POB: אִתִּי = ‘conmigo’, מִלְּבָנוֹן = ‘desde el Líbano’, תָּשׁוּרִי = ‘mira’, מֵרֹאשׁ = ‘desde la cima de’. La única desviación léxica relevante es נְמֵרִים, que debe mantenerse como plural genérico ‘leopardos’/‘leopardos’ y no ‘leopardas’.'
  issues:
  - severity: high
    issue: Los marcadores de notas [a] y [b] están colocados en frases equivocadas.
    rationale: La nota [a] explica una alternativa para תָּשׁוּרִי (‘mira desde la cima…’), por lo que debe anclarse en ‘Mira’, no en ‘Líbano’. La nota [b] trata sobre Senir como nombre antiguo de parte de Hermón, así que debe anclarse en ‘Senir’ o ‘Hermón’, no en ‘Mira’. Esto incumple la disciplina requerida de anclaje exacto.
  - severity: medium
    issue: ‘Las leopardas’ introduce un femenino no presente en el hebreo.
    rationale: נְמֵרִים es plural masculino/genérico ‘leopardos/leopardos como especie’. ‘Leopardas’ cambia el matiz sin base textual y suena menos natural en paralelo con ‘leones’.
  - severity: low
    issue: La razón de la nota [a] debería corresponder a alternativa léxica, no a variante textual.
    rationale: La nota no describe una variante textual sino una alternativa de interpretación/traducción del verbo difícil תָּשׁוּרִי. Aunque esto afecta más al metadato que al texto visible, conviene corregirlo para fidelidad editorial.
  revised_spanish_text: Ven conmigo desde el Líbano, mi novia; ven conmigo desde el Líbano. Mira[a] desde la cima de Amaná, desde la cima de Senir[b] y Hermón, desde las guaridas de los leones, desde los montes de los leopardos.
  revised_footnotes:
