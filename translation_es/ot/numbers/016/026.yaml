review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: Moisés habla a la comunidad reunida, ordena apartarse de las tiendas de esos hombres malvados, no tocar nada de sus pertenencias y advierte sobre ser alcanzados por el juicio ligado a sus pecados. Sin embargo, la nota al pie no corresponde a la nota del rastro POB en inglés: el inglés preserva una alternativa para la cláusula final, no para ‘congregación’. Además, la redacción final en español puede acercarse más al matiz hebreo y al audit trail si evita ‘para que no’, que suena más final que precautorio, y si conserva mejor la asociación de ‘en/con todos sus pecados’.'
  spanish_quality_summary: 'El español es claro, natural y de registro bíblico digno. ‘Apártense, por favor’ y ‘estos hombres malvados’ funcionan bien. La mejora principal es estilística y de precisión semántica: ‘no sea que sean arrastrados en todos sus pecados’ o una formulación similar refleja mejor el hebreo que ‘para que no sean arrastrados junto con todos sus pecados’. También conviene alinear las notas con el expediente inglés para no introducir una nota innecesaria sobre ‘congregación’.'
  glossary_alignment: No hay conflicto con la terminología global del proyecto. ‘Congregación’, ‘malvados’, ‘pecados’ y el registro general son adecuados. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión de mantener ‘congregación’ en el texto principal es aceptable, pero la alternativa documentada que debe preservarse en nota es la lectura causal de la cláusula final.
  issues:
  - severity: medium
    issue: La nota al pie actual está anclada en ‘congregación’, pero el audit trail inglés coloca la nota en la cláusula final como alternativa causal.
    rationale: Esto altera la documentación de alternativas preservadas por POB. La nota importante aquí no es ‘asamblea’, sino ‘no sea que sean destruidos por causa de todos sus pecados’.
  - severity: medium
    issue: ‘Para que no sean arrastrados’ introduce un matiz de finalidad/previsión menos directo que el precautorio de פֶּן.
    rationale: ‘No sea que’ o ‘para que no’ pueden ambos funcionar en español, pero ‘no sea que’ reproduce mejor la advertencia inmediata del hebreo y del inglés ‘lest’.
  - severity: low
    issue: ‘Junto con todos sus pecados’ es comprensible, pero no representa tan bien la tensión del hebreo como una formulación más cercana a ‘en/con todos sus pecados’.
    rationale: El inglés POB quiso preservar la ambigüedad asociativa/circunstancial; ‘junto con’ puede sonar algo más libre o explicativo.
  revised_spanish_text: 'Y habló a la congregación, diciendo: «Apártense, por favor, de las tiendas de estos hombres malvados, y no toquen nada de lo que les pertenece, no sea que sean arrastrados en todos sus pecados[a]».

    '
  revised_footnotes:
  - marker: a
    text: O ‘no sea que sean destruidos por causa de todos sus pecados’. El hebreo también puede entenderse con un matiz causal más explícito.
    reason: lexical_alternative
  revision_rationale: Se corrige la alineación con el audit trail inglés trasladando la nota al pie a la cláusula final, donde realmente está la alternativa léxica relevante. También se ajusta ‘para que no’ a ‘no sea que’ para reflejar mejor פֶּן, y se reemplaza ‘junto con’ por ‘en’ para conservar mejor la tensión del hebreo entre asociación y causalidad sin sobreinterpretar.
