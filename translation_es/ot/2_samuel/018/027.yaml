    text: 'O, más literalmente: «La carrera del primero es como la carrera de Ahimaaz».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «vendrá con buenas noticias»; el verbo hebreo puede entenderse en sentido futuro.'
    reason: lexical_alternative
  revision_rationale: 'La revisión realinea el texto principal y la nota [a] con la estructura hebrea y con la auditoría inglesa: el cuerpo ahora expresa explícitamente la comparación (''es como''), y la nota conserva la alternativa más literal sin ''Veo que''. Además, se mejora la naturalidad del español con ''buenas noticias'' y una formulación menos rígida de la valoración del rey.'
