translation:
  language: es
  text: 'Y de entre los hijos de los sacerdotes: los hijos de Hobaías[a], los hijos de Hocoz, los hijos de Barzilay, que había tomado por esposa a una de las hijas de Barzilay el galaadita, y fue llamado por el nombre de ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «y tomó el nombre de ellos». El hebreo dice literalmente «y fue llamado por el nombre de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבְּנֵי הַכֹּהֲנִים
  english_pob_choice: And from among the sons of the priests
  chosen_spanish: Y de entre los hijos de los sacerdotes
  alternatives_spanish:
  - Y de los hijos de los sacerdotes
  - Y entre los descendientes de los sacerdotes
  lexicon: HALOT
  rationale: La partícula prefijada con מן pide un valor partitivo; por eso «de entre» refleja bien «from among». «Hijos» conserva el registro genealógico y la transparencia del hebreo.
- source_word: בְּנֵי חֳבַיָּה ... בְּנֵי הַקּוֹץ ... בְּנֵי בַרְזִלַּי
  english_pob_choice: the sons of Hobaiah, the sons of Hakkoz, the sons of Barzillai
  chosen_spanish: los hijos de Hobaías, los hijos de Hocoz, los hijos de Barzilay
  alternatives_spanish:
  - los descendientes de Hobaías, los descendientes de Hocoz, los descendientes de Barzilay
  - la familia de Hobaías, la familia de Hocoz, la familia de Barzilay
  lexicon: HALOT
  rationale: Se mantiene la estructura repetida de constructo con «hijos de» para conservar la forma de lista y la correspondencia directa con el hebreo. Los nombres se transliteran con adaptación ortográfica natural al español.
- source_word: אֲשֶׁר לָקַח
  english_pob_choice: who had taken
  chosen_spanish: que había tomado
  alternatives_spanish:
  - que tomó
  - el cual había tomado
  lexicon: HALOT
  rationale: El pluscuamperfecto español expresa mejor la anterioridad relativa de la acción de tomar esposa respecto de la cláusula siguiente sobre el nombre.
- source_word: מִבְּנוֹת ... אִשָּׁה
  english_pob_choice: a wife from the daughters of
  chosen_spanish: por esposa a una de las hijas de
  alternatives_spanish:
  - como esposa a una de las hijas de
  - una mujer de entre las hijas de
  lexicon: HALOT
  rationale: El hebreo usa el giro idiomático «tomar... esposa». En español, «tomó por esposa» comunica ese idiomático con naturalidad, y «una de las hijas de» conserva el matiz partitivo de מן.
- source_word: בַּרְזִלַּי הַגִּלְעָדִי
  english_pob_choice: Barzillai the Gileadite
  chosen_spanish: Barzilay el galaadita
  alternatives_spanish:
  - Barzilay de Galaad
  lexicon: HALOT
  rationale: El gentilicio se vierte como adjetivo étnico-geográfico natural en español, «galaadita», conservando la identificación de procedencia.
- source_word: וַיִּקָּרֵא עַל שְׁמָם
  english_pob_choice: and was called by their name
  chosen_spanish: y fue llamado por su nombre
  alternatives_spanish:
  - y tomó su nombre
  - y fue llamado por su apellido
  lexicon: HALOT
  rationale: Se mantiene la literalidad básica del hebreo en la construcción pasiva. En español, el singular «su» puede referirse al linaje mencionado; la alternativa idiomática «tomó su nombre» queda documentada en nota.
theological_decisions:
- issue: Relación entre el linaje sacerdotal y el cambio de nombre
  english_pob_reading: and was called by their name
  chosen_spanish_reading: y fue llamado por su nombre
  alternative_spanish_readings:
  - y tomó su nombre
  - y fue llamado con el nombre de ellos
  rationale: La línea hebrea conserva una tensión entre la simple designación nominal y la posible adopción identitaria del linaje de las hijas. Se preserva esa ambigüedad sin resolverla interpretativamente en el cuerpo del texto.
  doctrine_reference: No aplica; decisión de traducción y semántica histórica, no doctrinal.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y el audit trail inglés sin introducir paráfrasis amplificadas. Se conserva la estructura partitiva inicial, la serie genealógica repetida y la cláusula relativa final con su ambigüedad de nombre/adopción de linaje.
  spanish_consistency_notes:
  - Se usó «Yahvé» según la pauta general del proyecto solo cuando el texto lo requiera; aquí no aparece el tetragrámaton ni una cita del nombre divino.
  - Se prefirió «hijos de» para mantener la forma genealógica constante en listas sacerdotales.
  - Se mantuvo «galaadita» como gentilicio natural en español.
  - La nota al pie marca la alternativa idiomática documentada por el POB inglés para עַל־שְׁמָם.
