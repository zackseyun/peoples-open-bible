    rationale: El inglés auditado preserva «caps» como principal y alternativas más generales. En español conviene que la nota explique que se trata de la cobertura de la cabeza de los sacerdotes ordinarios, distinta de la del sumo sacerdote, para justificar «turbantes» o «tocados».
