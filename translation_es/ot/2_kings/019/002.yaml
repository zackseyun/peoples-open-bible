revisions:
- from: Y envió a Eliaquim[a], que estaba sobre la casa, y a Sebná, el escriba, y a los ancianos de los sacerdotes, vestidos de cilicio, a Isaías el profeta[b], hijo de Amoz.
  to: Y envió a Eliaquim, que estaba a cargo de la casa real, y a Sebná, el escriba, y a los ancianos de los sacerdotes, vestidos de cilicio[a], a Isaías el profeta[b], hijo de Amoz.
  rationale: Se corrigió el anclaje de la nota lexical para que corresponda a la frase de cilicio, se mejoró la naturalidad de la expresión del cargo de Eliaquim sin perder el sentido del hebreo ni la explicación cultural del POB, y se ajustó la nota [a] para evitar discordancia gramatical.
