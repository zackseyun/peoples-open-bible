base_translation:
  language: en
  yaml_path: translation/ot/judges/016/030.yaml
  text: And Samson said[a], “Let me die with the Philistines.” Then he bent with all his strength, and the house fell on the rulers and on all the people who were in it[c][b]. So the dead whom he killed at his death were more than those whom he had killed during his life.
  footnotes:
  - marker: a
    text: Or, more literally, “Let my soul die with the Philistines.” Here “my soul” is an idiomatic way of referring to Samson himself.
    reason: lexical_alternative
  - marker: b
    text: Or “the lords” of the Philistines.
    reason: lexical_alternative
  - marker: c
    text: Or “the building”; the Hebrew is the ordinary word for “house.”
    reason: lexical_alternative
