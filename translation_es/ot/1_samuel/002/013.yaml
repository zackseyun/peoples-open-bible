translation:
  language: es
  text: 'Y esta era la costumbre de los sacerdotes con el pueblo: cuando algún hombre ofrecía un sacrificio, venía el sirviente del sacerdote mientras la carne estaba hirviendo, con el tenedor[a] de tres puntas en su mano.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tenedor de carne»; el hebreo alude a un utensilio semejante a un gancho o tenedor usado para sacar la carne de la olla.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִשְׁפַּט
  english_pob_choice: Now the custom
  chosen_spanish: Y el deber
  alternatives_spanish:
  - Y la costumbre
  - Y la norma
  - Y la disposición
  lexicon: HALOT
  rationale: מִשְׁפַּט puede referirse a norma, derecho debido o práctica establecida. Aquí el contexto describe una práctica habitual de los sacerdotes, pero en español “costumbre” puede sonar demasiado neutral o meramente cultural; “deber” conserva la idea de lo que les correspondía hacer, sin convertirlo en un juicio legal.
- source_word: הַכֹּהֲנִים אֶת־הָעָם
  english_pob_choice: of the priests with the people
  chosen_spanish: de los sacerdotes con el pueblo
  alternatives_spanish:
  - de los sacerdotes respecto del pueblo
  - de los sacerdotes hacia el pueblo
  lexicon: HALOT
  rationale: La construcción marca la relación de los sacerdotes con el pueblo en su práctica habitual. “Con el pueblo” reproduce de forma natural esa relación sin añadir un matiz hostil o técnico que el hebreo no exige.
- source_word: כָּל־אִישׁ
  english_pob_choice: any man
  chosen_spanish: algún hombre
  alternatives_spanish:
  - todo hombre
  - cualquier hombre
  - cada hombre
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino genérico con valor distributivo. “Algún hombre” mantiene la idea de indefinición dentro del caso repetido; “cualquier hombre” también sería posible, pero suena más generalizado que el contexto inmediato.
- source_word: זֹבֵחַ זֶבַח
  english_pob_choice: was sacrificing a sacrifice
  chosen_spanish: ofrecía un sacrificio
  alternatives_spanish:
  - estaba sacrificando un sacrificio
  - presentaba un sacrificio
  - ofrecía una ofrenda
  lexicon: HALOT
  rationale: Aunque el inglés conserva la construcción cognada, en español una repetición literal sonaría poco natural. “Ofrecía un sacrificio” transmite el acto sacrificial sin perder el énfasis ritual del hebreo.
- source_word: וּבָא
  english_pob_choice: would come
  chosen_spanish: venía
  alternatives_spanish:
  - venía entonces
  - solía venir
  - llegaba
  lexicon: HALOT
  rationale: El contexto describe una acción repetida o habitual. “Venía” expresa ese valor iterativo de manera fluida en español sin convertir el relato en un perfecto puntual.
- source_word: נַעַר הַכֹּהֵן
  english_pob_choice: the priest’s servant
  chosen_spanish: el joven del sacerdote
  alternatives_spanish:
  - el siervo del sacerdote
  - el servidor del sacerdote
  - el muchacho del sacerdote
  lexicon: HALOT
  rationale: נַעַר puede significar joven, servidor o ayudante. Dado que el texto lo presenta como asistente en el ritual, “el joven del sacerdote” conserva la ambigüedad funcional sin imponer “siervo”, que en español puede sonar más cargado teológicamente.
- source_word: כְּבַשֵּׁל הַבָּשָׂר
  english_pob_choice: while the meat was boiling
  chosen_spanish: mientras la carne estaba hirviendo
  alternatives_spanish:
  - cuando la carne estaba hirviendo
  - mientras se cocía la carne
  - cuando se cocía la carne
  lexicon: HALOT
  rationale: La preposición con infinitivo indica simultaneidad. “Carne” mantiene el valor concreto del hebreo בָּשָׂר; “estaba hirviendo” reproduce el estado durativo en curso.
- source_word: הַמַּזְלֵג
  english_pob_choice: the ... fork
  chosen_spanish: el tenedor
  alternatives_spanish:
  - el tenedor de carne
  - el garfio
  - el gancho
  lexicon: HALOT
  rationale: Se trata de un utensilio de tres dientes para sacar carne de la olla. “Tenedor” es el equivalente español más transparente; el contexto ritual evita confundirlo con un utensilio de mesa.
- source_word: שְׁלֹשׁ הַשִּׁנַּיִם
  english_pob_choice: three-pronged
  chosen_spanish: de tres puntas
  alternatives_spanish:
  - de tres dientes
  - de tres púas
  - tridente
  lexicon: HALOT
  rationale: Literalmente son “tres dientes”, pero en español “de tres puntas” comunica bien la forma del utensilio. “De tres dientes” sería más cercano al hebreo, aunque menos idiomático.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en la mano
  - con la mano
  lexicon: HALOT
  rationale: La expresión es concreta y simple. “En su mano” conserva la imagen del instrumento llevado por el muchacho sin sobreinterpretar el movimiento.
translation_notes:
  revision_awareness: Basado en el texto hebreo masorético (WLC) y en la solución inglesa auditada, con ajuste al español para evitar un calco poco natural de la construcción cognada “sacrificar un sacrificio” y para preservar la escena ritual y la repetición habitual del pasaje.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma del proyecto cuando corresponda; en este versículo no aparece el nombre divino.
  - Se evitó “siervo” para נַעַר porque aquí el énfasis recae en la función asistente dentro del rito y el español permite “joven” sin perder la referencia.
  - “Tenedor” traduce el implemento con claridad; la nota preserva la alternativa más técnica “tenedor de carne” para el trasfondo sacrificial.
