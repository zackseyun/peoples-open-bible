translation:
  language: es
  text: ¿Quién es ciego sino mi siervo, y sordo como mi mensajero que yo envío? ¿Quién es ciego como el que está en paz[a], y ciego como el siervo de Yahvé?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como el que es perfecto» o «intachable»; el hebreo מְשֻׁלָּם es difícil y puede comunicar la idea de ser completo, íntegro o estar en buena relación.
    reason: alternative_reading
lexical_decisions:
- source_word: עִוֵּר
  english_pob_choice: blind
  chosen_spanish: ciego
  alternatives_spanish:
  - invidente
  - no vidente
  lexicon: HALOT
  rationale: «Ciego» es el equivalente directo y más natural en español para mantener la repetición retórica de la acusación profética.
- source_word: חֵרֵשׁ
  english_pob_choice: deaf
  chosen_spanish: sordo
  alternatives_spanish:
  - que no oye
  - hipoacúsico
  lexicon: HALOT
  rationale: «Sordo» conserva la pareja antitética con «ciego» y el tono contundente del hebreo.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi esclavo
  - mi servidor
  lexicon: HALOT
  rationale: Se mantiene «siervo» como término consagrado en el contexto de Isaías, sin borrar la relación de pertenencia y servicio del hebreo.
- source_word: מַלְאָכִי
  english_pob_choice: my messenger
  chosen_spanish: mi mensajero
  alternatives_spanish:
  - mi enviado
  - mi ángel
  lexicon: HALOT
  rationale: «Mensajero» refleja el sentido de agente comisionado y evita la lectura angelical que el contexto no favorece.
- source_word: אֶשְׁלָח
  english_pob_choice: whom I send
  chosen_spanish: que yo envío
  alternatives_spanish:
  - a quien envío
  - que envío
  lexicon: HALOT
  rationale: La subordinada relativa es natural en español y conserva el valor presente/iterativo del imperfecto en el discurso directo de Yahvé.
- source_word: מְשֻׁלָּם
  english_pob_choice: the one who is at peace
  chosen_spanish: el que está en paz
  alternatives_spanish:
  - el íntegro
  - el perfecto
  - el íntegro y en paz
  lexicon: HALOT
  rationale: La forma es oscura; «el que está en paz» preserva la lectura relacional y el campo semántico de totalidad/armonía sin añadir «conmigo», que el hebreo no explicita. La nota conserva la alternativa de «perfecto/blameless» documentada en el POB inglés.
- source_word: עֶבֶד יְהוָה
  english_pob_choice: the servant of Yahweh
  chosen_spanish: el siervo de Yahvé
  alternatives_spanish:
  - el esclavo de Yahvé
  - el siervo del SEÑOR
  lexicon: HALOT
  rationale: Se sigue el uso del nombre divino «Yahvé» según la pauta del proyecto, y se mantiene «siervo» por coherencia terminológica con el resto de Isaías.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se aplica el default del proyecto para el nombre divino en el texto principal español.
- source_word: כִּי אִם
  english_pob_choice: but / except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - sino que
  lexicon: HALOT
  rationale: '«Sino» reproduce de forma idiomática la estructura exclusiva del interrogativo retórico: «¿Quién es ciego sino...?»'
theological_decisions:
- issue: Identidad del siervo y del mensajero en la reprensión profética
  english_pob_reading: Retained the direct address as a rebuke of the LORD's own commissioned servant/messenger without specifying a narrower referent in translation.
  chosen_spanish_reading: Se conserva la reprensión directa al siervo y al mensajero de Yahvé sin precisar en la traducción si se trata de Israel, del profeta o de una figura idealizada.
  alternative_spanish_readings:
  - Israel colectivo
  - el profeta
  - una figura ideal de siervo
  rationale: El hebreo no identifica de manera explícita un referente único; la traducción debe preservar esa tensión interpretativa en lugar de resolverla.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Sentido de מְשֻׁלָּם
  english_pob_reading: Translated as relational 'the one who is at peace' in the main text.
  chosen_spanish_reading: Se traduce en el texto principal como «el que está en paz».
  alternative_spanish_readings:
  - el perfecto
  - el íntegro
  - el recompensado
  rationale: La forma hebrea es difícil y admite varias lecturas. La versión relacional es la más fluida en español y mantiene la ironía del paralelismo, mientras la nota preserva la alternativa documentada de «perfecto/blameless».
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Esta versión sigue la última revisión inglesa, que ajustó la frase correspondiente a מְשֻׁלָּם de «the one at peace with me» a «the one who is at peace» porque el hebreo no explicita «conmigo». El español evita añadir ese complemento y conserva la ambigüedad lexical en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» conforme al estándar del proyecto.
  - Se mantiene «siervo» para עבד, coherente con el lenguaje de Isaías.
  - Se usa «mensajero» para מלאך por el contexto de comisión humana.
  - La repetición de «ciego» se conserva tres veces para reproducir el énfasis retórico del hebreo.
  - «Sino» reproduce la estructura exclusivista de כִּי אִם sin sobrerrepresentar el contraste.
