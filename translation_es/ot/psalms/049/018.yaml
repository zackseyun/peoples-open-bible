translation:
  language: es
  text: Porque al morir no se llevará nada[a]; su gloria[b] no descenderá tras él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no se llevará nada de ello»; literalmente, «no tomará el todo / lo todo».'
    reason: lexical_alternative
  - marker: b
    text: «Gloria» también puede implicar honor, esplendor o riqueza/estatus.
    reason: lexical_alternative
  - marker: c
    text: La frase «no descenderá tras él» puede aludir a la muerte, la tumba o el Seol, pero el hebreo deja implícito el destino.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o explicación del argumento previo. «Porque» mantiene el valor causal y funciona con naturalidad en español bíblico contemporáneo.
- source_word: בְמוֹתוֹ
  english_pob_choice: at his death
  chosen_spanish: en su muerte
  alternatives_spanish:
  - al morir
  - cuando muera
  lexicon: HALOT
  rationale: La preposición ב con sustantivo temporal expresa el marco de tiempo; «en su muerte» conserva la referencia temporal sin sobreexplicarla.
- source_word: יִקַּח
  english_pob_choice: he will take
  chosen_spanish: se llevará
  alternatives_spanish:
  - tomará
  - tomará consigo
  lexicon: HALOT
  rationale: En este contexto funerario, «llevarse» comunica mejor la idea de llevar consigo bienes al morir. El reflexivo evita una lectura meramente general de «tomar» y sigue la fuerza contextual del hebreo.
- source_word: הַכֹּל
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - todo
  - algo de ello
  lexicon: HALOT
  rationale: Aunque literalmente es «el todo / lo todo», bajo negación el sentido idiomático es que no se lleva nada de ello. «Nada» preserva la equivalencia funcional del énfasis negativo.
- source_word: יֵרֵד
  english_pob_choice: will go down
  chosen_spanish: descenderá
  alternatives_spanish:
  - bajará
  - irá abajo
  lexicon: HALOT
  rationale: «Descenderá» reproduce la imagen concreta del hebreo de ir hacia abajo, con un registro poético y sin precisar más de lo que el texto dice.
- source_word: אַחֲרָיו
  english_pob_choice: after him
  chosen_spanish: con él
  alternatives_spanish:
  - tras él
  - después de él
  lexicon: HALOT
  rationale: El sentido de seguimiento post mortem puede expresarse en español como compañía o acompañamiento. En esta cláusula, «con él» evita una repetición torpe y comunica la idea de que la gloria no acompaña al hombre en la muerte. Se mantiene la tensión sin fijar un destino explícito en el texto principal.
- source_word: כְּבוֹדוֹ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su honor
  - su esplendor
  - su riqueza
  lexicon: HALOT
  rationale: «Gloria» conserva la amplitud semántica de כבוד y coincide con la elección de la POB inglesa. Puede incluir honor, esplendor o estatus, sin reducir prematuramente el campo semántico.
theological_decisions:
- issue: Destino implícito en la imagen de descender
  english_pob_reading: Retain the imagery 'will go down' without specifying Sheol or the grave in the main text.
  chosen_spanish_reading: Mantener «descenderá» sin especificar sepulcro, sepultura ni Seol en el texto principal.
  alternative_spanish_readings:
  - su gloria no descenderá al Seol con él
  - su gloria no irá al sepulcro tras él
  - su gloria no bajará a la tumba con él
  rationale: El hebreo deja implícito el destino. La traducción debe conservar esa indeterminación para no resolver artificialmente una tensión poética y teológica que el texto no resuelve.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Revisión actual sin cambios sustantivos respecto del último pase; se mantiene el acuerdo alto con el control cruzado y no se introducen novedades textuales.
  spanish_consistency_notes:
  - Se preserva «gloria» para כְּבוֹדוֹ en coherencia con el valor amplio de כבוד y con la auditabilidad del texto.
  - Se evita sustituir la imagen de descenso por una explicación doctrinal explícita, para respetar la ambigüedad del hebreo.
  - Se usa «Porque» como equivalente natural de כִּי en apertura argumentativa.
  - 'La negación doble del hebreo se refleja en una sola negación natural en español: «no se llevará nada».'
