translation:
  language: es
  text: 'León rugiente y oso[a] que se lanza: así es un gobernante malvado sobre un pueblo pobre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «voraz» o «que arremete»; el participio hebreo aplicado al oso comunica una amenaza agresiva y puede enfatizar ya sea su movimiento violento o su hambre depredadora.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרִי
  english_pob_choice: lion
  chosen_spanish: león
  alternatives_spanish:
  - león joven
  lexicon: HALOT
  rationale: El sustantivo designa al león en general. En español, «león» es el equivalente natural y suficiente en la comparación proverbial; «león joven» no está exigido por esta forma.
- source_word: נֹהֵם
  english_pob_choice: roaring
  chosen_spanish: rugiente
  alternatives_spanish:
  - bramando
  - rugiendo
  lexicon: HALOT
  rationale: El participio describe el sonido del león. «Rugiente» conserva bien la imagen auditiva en español bíblico contemporáneo.
- source_word: דֹב
  english_pob_choice: bear
  chosen_spanish: oso
  lexicon: HALOT
  rationale: Término zoológico directo. «Oso» es el equivalente estándar en español.
- source_word: שׁוֹקֵק
  english_pob_choice: charging
  chosen_spanish: que se lanza
  alternatives_spanish:
  - avanzando con ímpetu
  - arremetiendo
  - voraz
  lexicon: HALOT
  rationale: El participio puede expresar movimiento violento o embestida agresiva. En español, «que se lanza» comunica el ímpetu peligroso sin perder la idea cinética; se deja constancia de la alternativa de matiz predatorio en la nota.
- source_word: מֹשֵׁל
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - el que gobierna
  - ruler
  lexicon: HALOT
  rationale: El participio funciona sustantivamente para una persona que ejerce autoridad. «Gobernante» es claro, conciso y natural en español.
- source_word: רָשָׁע
  english_pob_choice: wicked
  chosen_spanish: impío
  alternatives_spanish:
  - malvado
  - maligno
  lexicon: HALOT
  rationale: En literatura sapiencial, el adjetivo caracteriza moralmente al sujeto. «Impío» conserva el peso ético y religioso del término sin volverlo demasiado genérico.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por encima de
  lexicon: HALOT
  rationale: En contexto de gobierno, la preposición expresa dominio o autoridad. «Sobre» reproduce esa relación de superioridad/regencia en español.
- source_word: עַם
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  lexicon: HALOT
  rationale: El término se refiere a una colectividad bajo gobierno. «Pueblo» es más natural que «nación» para el foco social del proverbio.
- source_word: דָּל
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - débil
  - humilde
  - menesteroso
  lexicon: HALOT
  rationale: El adjetivo suele denotar pobreza o vulnerabilidad social. «Pobre» es la opción más clara y directa; en el contexto también sugiere indefensión.
translation_notes:
  revision_awareness: 'La traducción sigue el estado sin cambios del pasaje en el auditorial inglés: el paralelo de dos comparaciones zoológicas y la relación de dominio de un gobernante perverso sobre un pueblo vulnerable se mantienen intactos. Se incorporó una nota para reflejar la ambigüedad léxica de שׁוֹקֵק, tal como el inglés POB la documenta.'
  spanish_consistency_notes:
  - Se prefirió «impío» para רָשָׁע por tratarse de un proverbio sapiencial con carga moral-religiosa, manteniendo la fuerza ética del término.
  - Se evitó «SEÑOR» o fórmulas eclesiásticas ajenas al texto; no hay aquí términos divinos que requieran decisión especial.
  - «Pueblo pobre» conserva el paralelismo social del hebreo sin introducir una noción política más específica que la del original.
