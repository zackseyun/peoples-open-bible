  rationale: Se corrigió la preposición de destinatario a «a tus hermanos» para reflejar mejor לְאַחֶיךָ; se reubicó la nota léxica al término «grano tostado», que es donde corresponde según el hebreo y el audit trail; se mejoró la redacción de la nota cultural; y se usó «lleva» en lugar de «toma» porque en español, con complemento de destinatario explícito, expresa de manera más natural la acción pedida sin apartarse del sentido de קַח.
