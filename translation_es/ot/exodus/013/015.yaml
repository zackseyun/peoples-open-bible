revisions:
- from: Y cuando el faraón se endureció para no dejarnos ir, Yahvé mató a todo primogénito en la tierra de Egipto, desde el primogénito del hombre hasta el primogénito de la bestia. Por tanto, yo sacrifico a Yahvé todo el que abre el vientre, los varones, y todo primogénito de mis hijos yo lo redimo.
  to: Y cuando el faraón se negó obstinadamente a dejarnos ir, Yahvé mató a todo primogénito en la tierra de Egipto, desde el primogénito del hombre[a] hasta el primogénito de la bestia. Por tanto, yo sacrifico a Yahvé todo macho que abre el vientre, pero a todo primogénito de mis hijos varones lo redimo.
  rationale: Se revisa para reflejar con mayor fidelidad la negativa obstinada de Faraón, mejorar la naturalidad española de la fórmula sacrificial, y conservar la precisión de género en 'mis hijos varones', en línea con el hebreo y el audit trail inglés. Se mantiene una nota alternativa para el contraste 'hombre/bestia', siguiendo el precedente del inglés.
