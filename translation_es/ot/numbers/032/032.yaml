translation:
  language: es
  text: Nosotros mismos cruzaremos[a], armados, delante de Yahvé, a la tierra de Canaán, y con nosotros estará la posesión de nuestra heredad más allá del Jordán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al otro lado del Jordán»; la expresión hebrea depende de la perspectiva. Aquí se mantiene una forma relativamente neutral para no fijar una orientación que el contexto puede matizar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַ֣חְנוּ
  english_pob_choice: We ourselves
  chosen_spanish: Nosotros mismos
  alternatives_spanish:
  - Nosotros
  - Nosotros por nuestra parte
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis al verbo de 1ª persona plural; "nosotros mismos" conserva ese refuerzo de manera natural en español.
- source_word: נַעֲבֹ֧ר
  english_pob_choice: will cross over
  chosen_spanish: cruzaremos
  alternatives_spanish:
  - pasaremos
  - cruzaremos al otro lado
  lexicon: HALOT
  rationale: El verbo expresa el cruce futuro comprometido; "cruzaremos" es claro y fiel sin sobrecargar la frase.
- source_word: חֲלוּצִ֛ים
  english_pob_choice: armed
  chosen_spanish: armados
  alternatives_spanish:
  - equipados para la guerra
  - en orden de batalla
  lexicon: HALOT
  rationale: En contexto militar, el término indica preparación para guerra; "armados" comunica bien esa disposición en español contemporáneo.
- source_word: לִפְנֵ֥י יְהוָ֖ה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי conserva la idea espacial/relacional de estar "delante de"; se mantiene Yahvé por la convención del proyecto para el nombre divino.
- source_word: אֶ֣רֶץ כְּנָ֑עַן
  english_pob_choice: into the land of Canaan
  chosen_spanish: hacia la tierra de Canaán
  alternatives_spanish:
  - a la tierra de Canaán
  - en la tierra de Canaán
  lexicon: HALOT
  rationale: El hebreo no añade preposición explícita ante "tierra", pero el movimiento del verbo permite en español una dirección expresada con "hacia"; evita forzar "en" y mantiene el sentido de avance.
- source_word: וְאִתָּ֨נוּ֙
  english_pob_choice: and with us will be
  chosen_spanish: y con nosotros estará
  alternatives_spanish:
  - y con nosotros habrá
  - y junto a nosotros estará
  lexicon: HALOT
  rationale: La frase hebrea es nominal y requiere verbo suplido; "estará" reproduce el matiz prospectivo del juramento/compromiso.
- source_word: אֲחֻזַּ֣ת נַחֲלָתֵ֔נוּ
  english_pob_choice: the possession of our inheritance
  chosen_spanish: la posesión de nuestra heredad
  alternatives_spanish:
  - la posesión de nuestra herencia
  - nuestra posesión heredada
  lexicon: HALOT
  rationale: La cadena constructa combina la idea de tenencia con la de heredad recibida; "posesión de nuestra heredad" conserva ambos elementos sin fusionarlos indebidamente.
- source_word: מֵעֵ֖בֶר לַיַּרְדֵּֽן
  english_pob_choice: beyond the Jordan
  chosen_spanish: más allá del Jordán
  alternatives_spanish:
  - al otro lado del Jordán
  - del otro lado del Jordán
  lexicon: HALOT
  rationale: La expresión es deíctica y depende de la perspectiva; "más allá del Jordán" reproduce bien la ambigüedad relativa del hebreo sin imponer una orientación específica.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: transliteración del nombre propio divino y no una sustitución litúrgica. "Yahvé" es la forma usual del proyecto en español.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La base inglesa revisó su primera solución para מֵעֵבֶר לַיַּרְדֵּן, pasando de una perspectiva fija a una formulación más neutra ('beyond the Jordan'). La versión española sigue esa revisión con «más allá del Jordán», que preserva la indeterminación de perspectiva del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - «heredad» se usa para נַחֲלָה en coherencia con el valor de posesión heredada, no como mera «herencia» abstracta.
  - La construcción «delante de Yahvé» conserva el matiz relacional de לִפְנֵי sin convertirlo en simple ubicación espacial.
