translation:
  language: es
  text: 'Toma la comida[a] que Dios te ha enviado. Y Daniel dijo: «Porque te has acordado de mí, oh Dios, y no has abandonado a los que te aman».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la mejor porción» o «el mejor alimento»; el griego τὸ ἄριστον puede referirse a comida excelente o a la comida principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: λάβε
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Recibe
  lexicon: BDAG
  rationale: El imperativo aoristo de λαμβάνω pide una orden directa. «Toma» es natural en español y conserva el tono inmediato del mandato.
- source_word: τὸ ἄριστον
  english_pob_choice: the meal
  chosen_spanish: el banquete
  alternatives_spanish:
  - la comida
  - la mejor porción
  - el mejor alimento
  lexicon: LSJ
  rationale: ἄριστον puede referirse al plato principal o a la comida principal. En este contexto narrativo se trata de alimento enviado para ser comido; «banquete» comunica mejor la idea de un alimento ya preparado y digno, sin reducirlo a una mera cualidad abstracta.
- source_word: ἀπέστειλέν
  english_pob_choice: has sent
  chosen_spanish: te ha enviado
  alternatives_spanish:
  - te envió
  lexicon: BDAG
  rationale: 'El perfecto en español expresa bien la acción completada con relevancia presente: el alimento ya fue enviado y acaba de llegar a Daniel.'
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: «Dios» es la equivalencia estándar y natural para θεός en este contexto.
- source_word: Ἐμνήσθης
  english_pob_choice: you have remembered
  chosen_spanish: te has acordado
  alternatives_spanish:
  - te has acordado de mí
  - te has acordado de mí, oh Dios
  - has recordado de mí
  lexicon: BDAG
  rationale: El verbo μιμνῄσκομαι en lenguaje de oración expresa atención benevolente. «Te has acordado» mantiene esa fuerza relacional en español; con el complemento explícito se aclara el sentido devocional.
- source_word: ἐγκατέλιπες
  english_pob_choice: have not forsaken
  chosen_spanish: no has abandonado
  alternatives_spanish:
  - no me has abandonado
  - no has forsaken
  lexicon: BDAG
  rationale: «Abandonar» transmite bien el peso de εγκαταλείπω en español moderno. Se evita «desamparar» por sonar más tradicional y menos directo.
- source_word: τοὺς ἀγαπῶντάς
  english_pob_choice: those who love you
  chosen_spanish: a los que te aman
  alternatives_spanish:
  - a los que aman a ti
  - a los que te aman, Dios
  lexicon: BDAG
  rationale: El participio requiere completar el objeto implícito en español. Como Daniel se dirige a Dios, el sentido natural es «te aman», preservando la relación directa con el destinatario divino.
theological_decisions:
- issue: Objeto implícito de «los que aman»
  english_pob_reading: those who love you
  chosen_spanish_reading: a los que te aman
  alternative_spanish_readings:
  - a los que aman a Dios
  rationale: La apelación directa a Dios en la oración hace que el objeto implícito sea «te». No se introduce una expansión doctrinal; se explicita en español lo que el griego deja implícito.
  doctrine_reference: Translation philosophy §1, §3
- issue: Tono de la gratitud y memoria divina
  english_pob_reading: you have remembered me, O God, and have not forsaken those who love you
  chosen_spanish_reading: te has acordado de mí, oh Dios, y no has abandonado a los que te aman
  alternative_spanish_readings:
  - te has acordado de mí, Dios, y no has abandonado a los que te aman
  - te has acordado de mí, oh Dios, y no has dejado a los que te aman
  rationale: Se conserva el lenguaje devocional de reconocimiento a la fidelidad de Dios sin intensificarlo más allá del griego. «Acordarte» y «abandonar» mantienen la relación de cuidado y respuesta divina.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa coinciden en lo esencial. La única tensión léxica significativa es τὸ ἄριστον, donde la POB inglesa opta por «the meal»; en español se eligió «el banquete» por naturalidad narrativa, manteniendo en nota las alternativas principales. También se explicitó el objeto implícito de ἀγαπῶντάς como «te» según el discurso directo a Dios.
  spanish_consistency_notes:
  - Se preserva Yahvé como norma general del proyecto, pero aquí el testimonio del texto fuente y la auditoría inglesa usan θεός/ὁ θεός, por lo que corresponde «Dios».
  - Se mantuvo un registro digno y actual, evitando el calco arcaizante «no me desampares» porque el griego no exige esa formulación.
  - La puntuación y la cita directa siguen el estilo editorial del POB en español, con coma vocativa antes de «oh Dios».
