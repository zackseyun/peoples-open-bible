id: NUM.14.12
reference: Numbers 14:12
source:
  edition: WLC
  text: אַכֶּ֥/נּוּ בַ/דֶּ֖בֶר וְ/אוֹרִשֶׁ֑/נּוּ וְ/אֶֽעֱשֶׂה֙ אֹֽתְ/ךָ֔ לְ/גוֹי גָּד֥וֹל וְ/עָצ֖וּם מִמֶּֽ/נּוּ־׃
translation:
  text: I will strike him with the plague and dispossess him[a], and I will make you into a nation greater and mightier than he.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “and disinherit him.” The Hebrew verb can carry inheritance/removal-from-possession overtones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַכֶּנּוּ
  chosen: I will strike him
  alternatives:
  - I will smite him
  - I will strike it/them
  lexicon: HALOT
  rationale: Hiphil of נכה commonly means 'strike, smite.' 'Strike' is clear modern English and preserves the force without archaic diction. The 3ms suffix is rendered 'him,' referring collectively to Israel as a singular people, matching the Hebrew suffix.
- source_word: בַדֶּבֶר
  chosen: with the plague
  alternatives:
  - with pestilence
  - with disease
  lexicon: HALOT
  rationale: דֶּבֶר often denotes pestilence/plague in judgment contexts. 'Plague' is more natural contemporary English than 'pestilence' while retaining the sense of divinely sent epidemic judgment.
- source_word: וְאוֹרִשֶׁנּוּ
  chosen: and dispossess him
  alternatives:
  - and disinherit him
  - and drive him out
  lexicon: HALOT
  rationale: Hiphil of ירשׁ can mean 'dispossess' or 'disinherit.' In context, YHWH threatens to remove Israel from its inheritance/covenant standing as a nation and replace it through Moses. 'Dispossess' captures the loss of possession/inheritance without importing later legal nuance; 'disinherit' is a viable alternative preserved in a footnote because many English versions use it and it highlights inheritance imagery.
- source_word: וְאֶעֱשֶׂה אֹתְךָ
  chosen: and I will make you
  alternatives:
  - and I will make of you
  lexicon: HALOT
  rationale: עשה with object + לְ expresses making someone into something. 'Make you into' is idiomatic English and preserves the transformation sense.
- source_word: לְגוֹי
  chosen: into a nation
  alternatives:
  - into a people
  lexicon: HALOT
  rationale: גּוֹי most directly means 'nation.' Here it refers to a national entity descending from Moses, so 'nation' is the most precise rendering.
- source_word: גָּדוֹל
  chosen: greater
  alternatives:
  - great
  lexicon: HALOT
  rationale: 'Though formally positive (''great''), in English the following comparative phrase מִמֶּנּוּ naturally yields a comparative sense across the whole predicate: ''greater ... than he.'' This is smoother than ''a great and mightier nation than he.'''
- source_word: וְעָצוּם
  chosen: mightier
  alternatives:
  - stronger
  - more numerous
  - mighty
  lexicon: HALOT
  rationale: עָצוּם can denote strength, power, or greatness in number. In this threat/promise context, 'mightier' best complements 'greater' and reflects comparative force in English with the following מִמֶּנּוּ.
- source_word: מִמֶּנּוּ
  chosen: than he
  alternatives:
  - than him
  - than it
  - than they are
  lexicon: HALOT
  rationale: The preposition מן with 3ms suffix gives the comparison. Because the antecedent is the singular collective nation Israel, 'than he' preserves the singular collective grammar more closely than 'than them,' though English readers may understand it corporately.
