theological_decisions:
- issue: Rendering of the divine name יְהֹוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: How strongly to state protection from רָע
  chosen_reading: will not meet with evil
  alternative_readings:
  - will suffer no harm at all
  - evil will never happen to him
  rationale: The verse should not be made to promise absolute immunity from all suffering, since the second colon explicitly allows for a time of testing/trial followed by escape. The chosen wording preserves the proverb's confidence without flattening its tension.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
