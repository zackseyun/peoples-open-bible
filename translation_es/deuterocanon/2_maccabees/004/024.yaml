translation:
  language: es
  text: 'Pero, después de haber sido presentado al rey[a] y haberlo honrado por el despliegue de su autoridad[b], obtuvo para sí el sumo sacerdocio, ofreciendo más que Jasón: trescientos talentos de plata.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de haber sido introducido ante el rey». El griego puede sugerir una presentación formal o una recomendación en la corte.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «con el rostro/presencia de la autoridad», una expresión idiomática para un porte o despliegue imponente de autoridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: συσταθεὶς τῷ βασιλεῖ
  english_pob_choice: after being presented to the king
  chosen_spanish: después de haber sido presentado al rey
  alternatives_spanish:
  - después de haber sido introducido ante el rey
  - habiendo sido recomendado al rey
  lexicon: LSJ
  rationale: La forma pasiva sugiere acceso a la presencia real mediante presentación formal, introducción o recomendación. «Presentado al rey» es natural en español y conserva el marco cortesano sin especificar más de lo que el griego permite.
- source_word: δοξάσας αὐτόν
  english_pob_choice: magnifying him
  chosen_spanish: haberlo honrado
  alternatives_spanish:
  - haberlo glorificado
  - haberlo magnificado
  - haberlo adulado
  lexicon: LSJ
  rationale: En este contexto político, δοξάζω puede expresar honor o elogio. «Honrarlo» comunica el acto de elevar al rey sin cargar innecesariamente una valoración negativa que el verbo por sí solo no exige.
- source_word: τῷ προσώπῳ τῆς ἐξουσίας
  english_pob_choice: by the display of his authority
  chosen_spanish: con el despliegue de su autoridad
  alternatives_spanish:
  - por la presencia de su autoridad
  - con un porte de autoridad
  - con el rostro de la autoridad
  lexicon: LSJ
  rationale: La expresión es idiomática y compacta. «Con el despliegue de su autoridad» conserva la imagen de una presencia/imponencia oficial y resulta claro en español, sin caer en un literalismo opaco.
- source_word: εἰς ἑαυτὸν κατήντησεν ἀρχιερωσύνην
  english_pob_choice: he secured the high priesthood for himself
  chosen_spanish: obtuvo para sí el sumo sacerdocio
  alternatives_spanish:
  - consiguió para sí el sumo sacerdocio
  - hizo venir a sí el sumo sacerdocio
  lexicon: LSJ
  rationale: La construcción indica adquisición personal y auto-beneficio. «Obtuvo para sí» comunica la obtención de manera directa y mantiene el matiz de interés propio del griego.
- source_word: ὑπερβάλλων τὸν Ἰάσονα
  english_pob_choice: outbidding Jason
  chosen_spanish: superando a Jasón
  alternatives_spanish:
  - ofreciendo más que Jasón
  - sobrepujando a Jasón
  lexicon: LSJ
  rationale: En el contexto de la cantidad monetaria que sigue, el participio apunta a superar la oferta de Jasón. «Superando a Jasón» mantiene la relación con la suma posterior, y la nota aclara el matiz competitivo de puja.
- source_word: τάλαντα ἀργυρίου τριακόσια
  english_pob_choice: three hundred talents of silver
  chosen_spanish: trescientos talentos de plata
  alternatives_spanish:
  - trescientos talentos de plata
  lexicon: LSJ
  rationale: Se conserva la unidad antigua y el material de la ofrenda/pago sin convertirlo a moneda moderna, evitando una equivalencia especulativa y preservando el valor histórico del pasaje.
theological_decisions:
- issue: Valor moral de la acción de honrar al rey
  english_pob_reading: Render δοξάσας neutrally as 'magnifying him' rather than explicitly 'flattering him.'
  chosen_spanish_reading: Traducirlo de manera relativamente neutral como «haberlo honrado», no como «adularlo».
  alternative_spanish_readings:
  - haberlo adulado
  - haberlo halagado
  rationale: El contexto narrativo sugiere maniobra política, pero el verbo griego no obliga a un término abiertamente peyorativo. La neutralidad permite que la valoración moral venga del conjunto del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Naturaleza de τῷ προσώπῳ τῆς ἐξουσίας
  english_pob_reading: Interpret as an outward display or bearing of authority.
  chosen_spanish_reading: Entender la frase como un despliegue o porte visible de autoridad.
  alternative_spanish_readings:
  - con la cara de la autoridad
  - con el rostro de la autoridad
  - con apariencia de autoridad
  rationale: No se trata de una afirmación doctrinal, sino de una expresión idiomática comprimida. La traducción conserva la imagen de presencia imponente sin forzar una literalidad extraña para el español.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: He tenido en cuenta la última revisión del texto fuente inglés, que prefirió «by the display of his authority» frente a «with the display», y mantuve en español una solución natural que conserva ese valor instrumental/medial. También conservé el matiz transaccional final de la frase mediante «superando a Jasón» y la suma específica de «trescientos talentos de plata».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece el Tetragrámaton.
  - Se mantiene «Jasón» con ortografía española estándar.
  - «Sumo sacerdocio» se conserva por ser el equivalente institucional más claro para ἀρχιερωσύνην en este contexto.
  - La puntuación española sigue un esquema natural de una sola oración con dos segmentos participiales y una cláusula principal.
