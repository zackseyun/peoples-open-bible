translation:
  language: es
  text: Y cuando fuimos llevados cautivos a Nínive, todos mis hermanos y los de mi parentela comieron del pan de los gentiles[a];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la comida de los gentiles'. El griego dice literalmente 'los panes de los gentiles', un giro idiomático para las provisiones de comida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾐχμαλωτίσθημεν
  english_pob_choice: we were taken captive
  chosen_spanish: fuimos llevados cautivos
  alternatives_spanish:
  - fuimos hechos cautivos
  - fuimos apresados
  lexicon: BDAG
  rationale: 'El aoristo pasivo expresa una acción sufrida: ser llevados por fuerza al cautiverio. En español, ''fuimos llevados cautivos'' conserva esa pasividad y resulta natural y digno.'
- source_word: εἰς Νινευή
  english_pob_choice: to Nineveh
  chosen_spanish: a Nínive
  alternatives_spanish:
  - hacia Nínive
  - a la ciudad de Nínive
  lexicon: BDAG
  rationale: Con un verbo de movimiento, εἰς marca destino. 'A Nínive' reproduce bien esa función y es idiomático en español.
- source_word: πάντες οἱ ἀδελφοί μου
  english_pob_choice: all my brothers
  chosen_spanish: todos mis hermanos
  alternatives_spanish:
  - todos mis hermanos varones
  - todos mis hermanos de sangre
  lexicon: BDAG
  rationale: ἀδελφοί aquí se refiere de manera natural a hermanos dentro del ámbito familiar del relato. 'Hermanos' conserva el sentido directo y no añade matices innecesarios.
- source_word: οἱ ἐκ τοῦ γένους
  english_pob_choice: those of my kindred
  chosen_spanish: los de mi linaje
  alternatives_spanish:
  - los de mi familia
  - los de mi clan
  - los de mi parentela
  lexicon: BDAG
  rationale: γένος denota estirpe, linaje o grupo de parentesco. 'Linaje' mantiene el alcance genealógico y narrativo mejor que un término más estrecho como 'familia'.
- source_word: ἤσθιον
  english_pob_choice: ate
  chosen_spanish: comían
  alternatives_spanish:
  - comieron
  - solían comer
  lexicon: BDAG
  rationale: El imperfecto sugiere una acción habitual o continuada. 'Comían' conserva ese valor aspectual mejor que un pretérito simple.
- source_word: ἐκ τῶν ἄρτων τῶν ἐθνῶν
  english_pob_choice: from the bread of the Gentiles
  chosen_spanish: del pan de los gentiles
  alternatives_spanish:
  - de la comida de los gentiles
  - del pan de las naciones
  lexicon: BDAG
  rationale: ἄρτων significa literalmente 'panes' o 'breads', y el giro es idiomático para provisiones de comida. 'Pan de los gentiles' preserva la literalidad concreta sin importar una glosa interpretativa como 'impuro' que el griego no expresa aquí.
theological_decisions:
- issue: Sentido étnico-religioso de ἐθνῶν
  english_pob_reading: Gentiles
  chosen_spanish_reading: gentiles
  alternative_spanish_readings:
  - naciones
  - paganos
  rationale: En el contexto judío del exilio, el contraste es entre israelitas y no israelitas. 'Gentiles' comunica mejor esa carga identitaria y religiosa que 'naciones', que sería más abstracto.
  doctrine_reference: 'DOCTRINE.md: primacía del original; traducción clara y moderna'
- issue: Si explicitar la impureza alimentaria en el texto principal
  english_pob_reading: Keep the literal 'bread of the Gentiles' without adding 'unclean'
  chosen_spanish_reading: Mantener 'pan de los gentiles' sin añadir 'impuro'
  alternative_spanish_readings:
  - el alimento impuro de los gentiles
  - la comida de los gentiles
  rationale: El griego no añade el adjetivo 'impuro' en esta cláusula. La implicación dietética puede inferirse por el contexto, pero no debe trasladarse al texto principal sin base explícita.
  doctrine_reference: 'DOCTRINE.md: no importar al texto lo que el texto no dice'
translation_notes:
  revision_awareness: Se siguió el estado más reciente del audit trail en inglés, que mantiene la formulación literal de 'bread of the Gentiles' y la lectura de γένος como ámbito de parentesco/linaje. No se incorporó ninguna glosa doctrinal ajena al griego; la nota conserva la alternativa léxica reconocida por el POB inglés.
  spanish_consistency_notes:
  - Se emplea 'Nínive' con acentuación española estándar.
  - Se mantiene 'gentiles' en minúscula como sustantivo común de grupo étnico-religioso.
  - '''Linaje'' se usa para γένος por coherencia con un registro bíblico formal y por conservar el alcance genealógico.'
