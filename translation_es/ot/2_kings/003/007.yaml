base_translation:
  language: en
  yaml_path: translation/ot/2_kings/003/007.yaml
  text: So he went and sent word to Jehoshaphat king of Judah[a], saying, “The king of Moab has rebelled against me. Will you go with me against Moab for battle?” And he said, “I will go. I am as you are, my people as your people[b], my horses as your horses.”
  footnotes:
  - marker: a
    text: Or, “has broken away from me.” The Hebrew verb can denote political revolt or breach of allegiance; here it refers to Moab’s rebellion against Israelite rule.
    reason: lexical_alternative
  - marker: b
    text: Hebrew, “I will go up.” The verb often reflects movement into battle or toward higher terrain.
    reason: lexical_alternative
