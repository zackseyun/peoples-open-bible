translation:
  language: es
  text: Estas eran las ciudades designadas[a] para todos los hijos de Israel[b] y para el residente extranjero[c] que habitaba entre ellos, para que pudiera huir allí todo el que matara a una persona sin intención, y no muriera a manos del vengador de sangre hasta presentarse delante de la congregación[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las ciudades señaladas». El hebreo expresa algo designado o nombrado formalmente.
    reason: lexical_alternative
  - marker: b
    text: O, más idiomáticamente, «para todos los israelitas». El hebreo dice «para todos los hijos de Israel».
    reason: lexical_alternative
  - marker: c
    text: «Residente extranjero» traduce aquí la categoría legal de un no israelita que vive entre el pueblo bajo su orden comunitario.
    reason: cultural_note
  - marker: d
    text: O «ante la asamblea».
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרֵי הַמּוּעָדָה
  english_pob_choice: the appointed cities
  chosen_spanish: las ciudades designadas
  alternatives_spanish:
  - las ciudades señaladas
  - las ciudades nombradas para este fin
  - las ciudades de refugio designadas
  lexicon: HALOT
  rationale: מוּעָדָה expresa algo señalado o designado. «Designadas» conserva el valor de nombramiento formal sin añadir «refugio», que está implícito en el contexto pero no en esta frase.
- source_word: לְכֹל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: for all the sons of Israel
  chosen_spanish: para todos los hijos de Israel
  alternatives_spanish:
  - para todos los israelitas
  - para todos los hijos de Israel y las hijas de Israel
  lexicon: HALOT
  rationale: «Hijos de Israel» sigue de cerca la expresión hebrea בני ישראל y mantiene la forma representativa masculina del original, sin neutralizarla en el texto principal.
- source_word: וְלַגֵּר הַגָּר בְּתוֹכָם
  english_pob_choice: and for the sojourner residing among them
  chosen_spanish: y para el forastero que habitaba entre ellos
  alternatives_spanish:
  - y para el residente extranjero que habitaba entre ellos
  - y para el peregrino que habitaba entre ellos
  lexicon: HALOT
  rationale: גֵּר designa a un residente no israelita integrado en el orden comunitario. «Forastero» es una equivalencia natural en español; el relativo «que habitaba entre ellos» expresa el participio sin sobrecargar el verso.
- source_word: לָנוּס שָׁמָּה
  english_pob_choice: might flee there
  chosen_spanish: pudiera huir allí
  alternatives_spanish:
  - pudiera refugiarse allí
  - corriera allí para huir
  lexicon: HALOT
  rationale: נוּס es «huir». «Pudiera huir allí» reproduce el propósito legal de la cláusula con español natural y sin añadir «refugio» como si fuera el término explícito.
- source_word: כָּל מַכֵּה נֶפֶשׁ
  english_pob_choice: anyone who struck down a person
  chosen_spanish: todo el que hiriera a una persona
  alternatives_spanish:
  - todo el que matara a una persona
  - cualquiera que golpeara la vida de otro
  lexicon: HALOT
  rationale: La expresión hebrea es concreta y legal; «hiriera a una persona» conserva el valor de agresión causante de muerte o lesión fatal sin volver el idioma demasiado técnico ni perder el matiz del verbo «matar» si el contexto lo explicita.
- source_word: בִּשְׁגָגָה
  english_pob_choice: unintentionally
  chosen_spanish: sin intención
  alternatives_spanish:
  - por inadvertencia
  - por error
  - accidentalmente
  lexicon: HALOT
  rationale: El término señala falta de intención o inadvertencia. «Sin intención» es claro en español jurídico y mantiene el contraste con el homicidio deliberado.
- source_word: וְלֹא יָמוּת בְּיַד גֹּאֵל הַדָּם
  english_pob_choice: and not die by the hand of the avenger of blood
  chosen_spanish: y no muriera a manos del vengador de sangre
  alternatives_spanish:
  - y no muriera por mano del vengador de sangre
  - y no fuera muerto por el vengador de sangre
  lexicon: HALOT
  rationale: «Vengador de sangre» es el equivalente legal tradicional y preciso para גֹּאֵל הַדָּם. «A manos de» comunica la agencia de forma idiomática en español.
- source_word: עַד עָמְדוֹ
  english_pob_choice: until he stood
  chosen_spanish: hasta presentarse
  alternatives_spanish:
  - hasta que se presentara
  - hasta estar en pie
  lexicon: HALOT
  rationale: En este contexto legal, el punto de protección dura hasta que comparezca ante la asamblea. «Presentarse» comunica mejor la idea de comparecencia judicial que una traducción demasiado literal de «estar de pie».
- source_word: לִפְנֵי הָעֵדָה
  english_pob_choice: before the congregation
  chosen_spanish: delante de la congregación
  alternatives_spanish:
  - ante la asamblea
  - ante la comunidad
  lexicon: HALOT
  rationale: «Congregación» conserva el sentido formal y judicial de עֵדָה en este marco legal. «Delante de» mantiene el valor espacial/forense de la expresión.
theological_decisions:
- issue: Expresión masculina representativa בְּנֵי יִשְׂרָאֵל
  english_pob_reading: for all the sons of Israel
  chosen_spanish_reading: para todos los hijos de Israel
  alternative_spanish_readings:
  - para todos los israelitas
  - para todos los hijos de Israel y las hijas de Israel
  rationale: Se mantiene la forma masculina representativa del hebreo, como criterio de transparencia textual. No se neutraliza en el texto principal porque el original no lo hace; la alternativa idiomática queda reflejada en el aparato léxico implícito por la decisión de traducción.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Alcance legal del término גֵּר
  english_pob_reading: the sojourner residing among them
  chosen_spanish_reading: el forastero que habitaba entre ellos
  alternative_spanish_readings:
  - el residente extranjero que habitaba entre ellos
  - el extranjero residente entre ellos
  rationale: La ley extiende la protección también al no israelita residente dentro de la comunidad. «Forastero» evita modernizar indebidamente la categoría con nociones migratorias contemporáneas y conserva la amplitud legal del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo de Josué 20:9 y coincide con el dictamen de alta concordancia del repaso final inglés. Se conservan los elementos legales clave: ciudades designadas, protección para el gēr residente, huida por homicidio involuntario, exclusión de la venganza privada hasta la comparecencia ante la congregación.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - «Congregación» se mantuvo por su valor jurídico-solemne en este contexto.
  - No se usó «Cristo» ni «Señor»; no corresponde a este versículo.
  - Se preservó la distinción entre huir por intención no deliberada y la acción homicida deliberada.
  - La formulación «vengador de sangre» sigue la terminología POB ya documentada y evita sustituciones interpretativas.
