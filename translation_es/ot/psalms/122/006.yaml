translation:
  language: es
  text: 'Oren por la paz de Jerusalén[a]: que prosperen los que te aman[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pidan por la paz de Jerusalén» o «Busquen la paz de Jerusalén».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que prosperen los que te aman» o «los que te aman prosperarán».'
    reason: alternative_reading
lexical_decisions:
- source_word: שַׁ֭אֲלוּ
  english_pob_choice: Pray for
  chosen_spanish: Pidan por
  alternatives_spanish:
  - Rueguen por
  - Oren por
  - Pidan
  lexicon: HALOT
  rationale: El imperativo puede significar pedir o solicitar; en este contexto poético y litúrgico, "Pidan por" conserva la fuerza exhortativa y permite que el complemento "por la paz" exprese la intercesión por Jerusalén sin forzar una paráfrasis más larga.
- source_word: שְׁל֣וֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - prosperidad
  - bienestar integral
  lexicon: HALOT
  rationale: '"Shalom" abarca paz, bienestar y plenitud. "Paz" es la opción más natural en español y conserva el campo semántico básico, especialmente en contraste con el paralelismo del versículo.'
- source_word: יְרוּשָׁלִָ֑ם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Yerushalén
  lexicon: convención onomástica
  rationale: Es un nombre propio; "Jerusalén" es la forma establecida y plenamente inteligible en español bíblico.
- source_word: יִ֝שְׁלָ֗יוּ
  english_pob_choice: may those who love you prosper
  chosen_spanish: que prosperen
  alternatives_spanish:
  - que estén seguros
  - que vivan en paz
  - que estén en bienestar
  lexicon: HALOT
  rationale: El verbo puede expresar estar en paz, en calma, seguro o prosperar. En español, "que prosperen" refleja bien el sentido de bienestar/fluidez y conserva el eco con "paz" sin imponer una promesa materialista.
- source_word: אֹהֲבָֽיִ/ךְ
  english_pob_choice: those who love you
  chosen_spanish: los que te aman
  alternatives_spanish:
  - quienes te aman
  - tus amantes
  - tus amigos
  lexicon: HALOT
  rationale: El participio con sufijo femenino singular se refiere a quienes aman a Jerusalén. "Los que te aman" es idiomático en español y mantiene el trato directo a la ciudad.
theological_decisions:
- issue: Fuerza del segundo hemistiquio
  english_pob_reading: 'Rendered as a wish/prayer: ''may those who love you prosper.'''
  chosen_spanish_reading: 'Expresado como deseo/oración: ''que prosperen los que te aman''.'
  alternative_spanish_readings:
  - '''los que te aman prosperarán'''
  - '''los que te aman estén seguros'''
  rationale: El imperfecto poético puede funcionar como deseo o como afirmación. Dado el imperativo inicial, la lectura de oración/deseo encaja mejor con el tono litúrgico del salmo y evita convertir el verso en una promesa absoluta.
  doctrine_reference: Principio POB de preservar la tensión textual sin resolverla artificialmente
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que prefirió 'prosper' frente a 'be secure' para reflejar mejor יִשְׁלָיוּ y su relación con el juego de palabras con 'peace'. La redacción española adopta 'prosperen' como equivalente natural y mantiene el valor de deseo/oración indicado por el audit trail.
  spanish_consistency_notes:
  - Se usó 'paz' para שָׁלוֹם, coherente con el uso bíblico estándar y con la nota semántica de bienestar/plenitud.
  - Se mantuvo el trato directo a Jerusalén con 'te' para reflejar el sufijo femenino singular hebreo.
  - La nota al pie está anclada correctamente en 'prosperen[a]' para evitar desajustes de validación.
