translation:
  language: es
  text: 'Y Yahvé hará recaer su sangre sobre su propia cabeza[a], porque atacó a dos hombres más justos y mejores que él, y los mató a espada, sin que mi padre David lo supiera: Abner hijo de Ner, comandante del ejército de Israel, y Amasa hijo de Jeter, comandante del ejército de Judá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «su culpa de sangre sobre su cabeza». El hebreo usa un modismo que expresa responsabilidad por derramamiento de sangre que vuelve sobre el culpable.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵשִׁיב / יְהוָה
  english_pob_choice: will return / Yahweh
  chosen_spanish: hará volver / Yahvé
  alternatives_spanish:
  - hará recaer / Yahvé
  - devolverá / Yahvé
  lexicon: HALOT
  rationale: 'El hebreo usa el hifil de שוב con sentido de retribución: hacer que algo vuelva sobre el culpable. «Harás volver» conserva la imagen verbal; «Yahvé» sigue la política del POB para el nombre divino.'
- source_word: דָּמוֹ עַל רֹאשׁוֹ
  english_pob_choice: his blood on his own head
  chosen_spanish: su sangre sobre su propia cabeza
  alternatives_spanish:
  - su culpabilidad por sangre sobre su cabeza
  - la sangre que derramó sobre su cabeza
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y apunta a responsabilidad por derramamiento de sangre. «Su propia cabeza» preserva la imagen forense sin ocultar el vínculo con culpa y retribución.
- source_word: פָּגַע
  english_pob_choice: struck down
  chosen_spanish: atacó
  alternatives_spanish:
  - arremetió contra
  - se abalanzó contra
  lexicon: HALOT
  rationale: En este contexto violento, el verbo describe una agresión contra personas que termina en muerte; «atacó» es claro en español y mantiene el tono narrativo antes de «los mató a espada».
- source_word: צַדִּקִים וְטֹבִים מִמֶּנּוּ
  english_pob_choice: more righteous and better than he
  chosen_spanish: más justos y mejores que él
  alternatives_spanish:
  - más rectos y mejores que él
  - más inocentes y mejores que él
  lexicon: HALOT
  rationale: «צדיקים» aquí conserva el valor moral/legal de «justos», y «טובים» se traduce naturalmente como «mejores». El comparativo español mantiene la tensión valorativa del hebreo.
- source_word: וַיַּהַרְגֵם בַּחֶרֶב
  english_pob_choice: and killed them with the sword
  chosen_spanish: y los mató a espada
  alternatives_spanish:
  - y los mató con la espada
  - y los dio muerte a espada
  lexicon: HALOT
  rationale: La frase hebrea es breve y directa; «a espada» es una construcción española natural y fiel al instrumento de muerte.
- source_word: וְאָבִי דָוִד לֹא יָדָע
  english_pob_choice: while my father David did not know it
  chosen_spanish: sin que mi padre David lo supiera
  alternatives_spanish:
  - y mi padre David no lo supo
  - mientras mi padre David no lo sabía
  lexicon: HALOT
  rationale: 'La cláusula expresa circunstancia concurrente/atenuante: David no tuvo conocimiento del hecho. «Lo supiera» reproduce bien el valor de ignorancia respecto del acto específico.'
- source_word: שַׂר צְבָא יִשְׂרָאֵל / שַׂר צְבָא יְהוּדָה
  english_pob_choice: commander of Israel’s army / commander of Judah’s army
  chosen_spanish: comandante del ejército de Israel / comandante del ejército de Judá
  alternatives_spanish:
  - jefe del ejército de Israel / jefe del ejército de Judá
  - capitán del ejército de Israel / capitán del ejército de Judá
  lexicon: HALOT
  rationale: «שַׂר» denota una autoridad militar; «comandante» comunica bien el título sin arcaísmo. «Ejército» es la equivalencia natural de צבא en este contexto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton; la política del proyecto es transliterarlo como «Yahvé» en español, preservando el nombre propio del pacto en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idiom of blood on the head
  english_pob_reading: A statement of divinely requited bloodguilt returning upon the murderer
  chosen_spanish_reading: Una afirmación de culpa por sangre que vuelve sobre el culpable por juicio divino
  alternative_spanish_readings:
  - una imagen literal de sangre sobre la cabeza
  - una declaración de responsabilidad por derramamiento de sangre
  rationale: El hebreo no habla de sangre literal acumulada sobre la cabeza, sino de culpa y retribución. La traducción mantiene la imagen idiomática y su sentido judicial.
  doctrine_reference: Principios de equivalencia optimal y preservación del idiomatismo hebreo
translation_notes:
  revision_awareness: Revisé el paquete fuente hebreo, la traducción inglesa del POB y sus decisiones léxicas/teológicas. No hubo revisiones pendientes en el audit trail más reciente, y la versión inglesa final se mantiene sin cambios. La redacción española sigue la misma resolución idiomática para דָּם/רֹאשׁ y conserva el valor comparativo de צַדִּיקִים וְטֹבִים sin suavizar la acusación.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto para יהוה.
  - Se conserva «a espada» para בַּחֶרֶב por naturalidad y fidelidad.
  - «Comandante del ejército» mantiene el título militar de שַׂר צְבָא.
  - La nota al pie marca la alternativa idiomática de דָּמוֹ עַל רֹאשׁוֹ sin perder la lectura principal en el texto.
