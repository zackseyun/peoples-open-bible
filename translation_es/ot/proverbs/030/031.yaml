review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y la decisión auditada del POB inglés: tres figuras majestuosas, con la última cláusula entendida como ''contra quien no hay levantamiento''. También preserva la incertidumbre léxica de זַרְזִיר. Sin embargo, la redacción española de la última cláusula (''no hay alzarse'') no es gramatical ni idiomática, y la nota al pie omite la alternativa principal documentada por el POB inglés para toda la expresión difícil.'
  spanish_quality_summary: '''Un gallo erguido'' es legible y digno, aunque ''erguido'' no capta tan bien como ''altivo'' o ''de andar altivo'' el matiz de porte/andar; aun así es aceptable. ''Un macho cabrío'' es correcto. El problema principal es ''contra quien no hay alzarse'', que suena antinatural en español. Conviene una formulación clara y fiel como ''contra quien nadie se levanta''. La nota también debe normalizar los anglicismos o, mejor, explicar las alternativas en español.'
  glossary_alignment: No hay términos de glosario mayor implicados. La elección de 'rey' y 'macho cabrío' concuerda con la guía. La rareza de זַרְזִיר debe mantenerse en nota; idealmente la nota debe incluir también la otra lectura global documentada por el POB inglés para la cláusula difícil.
  issues:
  - severity: high
    issue: La frase 'contra quien no hay alzarse' es gramaticalmente defectuosa en español.
    rationale: Aunque intenta reflejar el giro impersonal, en español moderno no funciona como oración natural ni clara. Distorsiona la legibilidad sin ganar fidelidad. 'Contra quien nadie se levanta' o 'contra quien no hay quien se levante' preservan mejor el sentido.
  - severity: medium
    issue: La nota al pie a usa anglicismos ('greyhound', 'war-horse') en vez de equivalentes españoles.
    rationale: Las notas deben ser plenamente legibles en español. Corresponde decir 'galgo' y 'caballo de guerra'.
  - severity: medium
    issue: Falta en notas la alternativa principal documentada por el POB inglés para la expresión difícil del versículo.
    rationale: El POB inglés conserva en nota que la expresión hebrea difícil admite más de una interpretación, incluyendo una lectura alternativa de la cláusula. Dado que el español mantiene una de las lecturas, conviene preservar la existencia de la alternativa para transparencia exegética.
  revised_spanish_text: un gallo erguido[a], un macho cabrío, y un rey contra quien nadie se levanta.[b]
  revised_footnotes:
