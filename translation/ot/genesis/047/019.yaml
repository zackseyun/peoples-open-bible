id: GEN.47.19
reference: Genesis 47:19
source:
  edition: WLC
  text: לָ֧/מָּה נָמ֣וּת לְ/עֵינֶ֗י/ךָ גַּם אֲנַ֨חְנוּ֙ גַּ֣ם אַדְמָתֵ֔/נוּ קְנֵֽה אֹתָ֥/נוּ וְ/אֶת אַדְמָתֵ֖/נוּ בַּ/לָּ֑חֶם וְ/נִֽהְיֶ֞ה אֲנַ֤חְנוּ וְ/אַדְמָתֵ֨/נוּ֙ עֲבָדִ֣ים לְ/פַרְעֹ֔ה וְ/תֶן זֶ֗רַע וְ/נִֽחְיֶה֙ וְ/לֹ֣א נָמ֔וּת וְ/הָ/אֲדָמָ֖ה לֹ֥א תֵשָֽׁם־־־־׃
translation:
  text: Why should we die before your eyes[a], both we and our land? Buy us and our land for bread, and we and our land will be slaves to Pharaoh. Give seed, so that we may live and not die[e][d][c][b], and the land may not become desolate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your sight.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for food'; literally 'for bread.'
    reason: lexical_alternative
  - marker: c
    text: Or 'servants.' The Hebrew term can denote various forms of servitude, but here the bonded economic sense is prominent.
    reason: lexical_alternative
  - marker: d
    text: Or 'be laid waste.'
    reason: lexical_alternative
  - marker: e
    text: Or 'so that we may live and not die, and that the land may not become desolate'.
    reason: previous_rendering
lexical_decisions:
- source_word: לָמָּה
  chosen: Why should
  alternatives:
  - Why
  - For what reason should
  lexicon: HALOT
  rationale: Introduces a rhetorical plea. Rendering with 'Why should' fits the following imperfect 'we die' as an appeal rather than a bare question.
- source_word: נָמוּת
  chosen: we die
  alternatives:
  - we should die
  - we perish
  lexicon: HALOT
  rationale: Common verb for dying. In English, 'Why should we die' best captures the rhetorical force in context.
- source_word: לְעֵינֶיךָ
  chosen: before your eyes
  alternatives:
  - in your sight
  - before you
  lexicon: HALOT
  rationale: Literal idiom meaning in Joseph's presence/sight. 'Before your eyes' preserves the vividness of the Hebrew.
- source_word: גַּם ... גַּם
  chosen: both ... and
  alternatives:
  - also ... also
  - both we and also our land
  lexicon: HALOT
  rationale: 'The paired particles coordinate the two objects of concern: the people and their land.'
- source_word: אַדְמָתֵנוּ
  chosen: our land
  alternatives:
  - our ground
  - our farmland
  lexicon: HALOT
  rationale: Refers to arable land/property. 'Land' is natural English and suits the agricultural-economic context.
- source_word: קְנֵה אֹתָנוּ וְאֶת אַדְמָתֵנוּ
  chosen: Buy us and our land
  alternatives:
  - Acquire us and our land
  - Purchase us and our land
  lexicon: HALOT
  rationale: קנה here is commercial acquisition in famine conditions. 'Buy' is the plainest modern English equivalent.
- source_word: בַּלָּחֶם
  chosen: for bread
  alternatives:
  - with bread
  - in exchange for bread
  - for food
  lexicon: HALOT
  rationale: The beth marks the price or means of exchange. 'For bread' keeps the concrete Hebrew term while conveying barter.
- source_word: וְנִהְיֶה
  chosen: will become
  alternatives:
  - let us be
  - we shall be
  lexicon: HALOT
  rationale: 'The imperfect following the imperative expresses the result of Joseph''s purchase: they will come to be Pharaoh''s slaves.'
- source_word: עֲבָדִים
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: HALOT
  rationale: In this economic-legal context, bonded status is salient. Per translation philosophy, 'slaves' better reflects the loss of freedom than 'servants'.
- source_word: לְפַרְעֹה
  chosen: to Pharaoh
  alternatives:
  - for Pharaoh
  - belonging to Pharaoh
  lexicon: HALOT
  rationale: Marks the one to whom they will belong in servitude. 'To Pharaoh' is concise and idiomatic after 'become slaves.'
- source_word: וְתֶן זֶרַע
  chosen: Give seed
  alternatives:
  - Give us seed
  - Provide seed grain
  lexicon: HALOT
  rationale: The object 'seed' is explicit; 'us' is implied by context but not stated. 'Give seed' stays closer to the Hebrew while remaining clear.
- source_word: זֶרַע
  chosen: seed
  alternatives:
  - seed grain
  - grain for sowing
  lexicon: HALOT
  rationale: Likely seed for planting rather than offspring. 'Seed' is sufficiently clear in this agricultural setting.
- source_word: וְנִחְיֶה וְלֹא נָמוּת
  chosen: so that we may live and not die
  alternatives:
  - and we will live and not die
  - that we may survive and not perish
  lexicon: HALOT
  rationale: Expresses purpose/result of receiving seed. 'So that we may live and not die' captures the plea's logic and preserves the life/death contrast.
- source_word: וְהָאֲדָמָה לֹא תֵשָׁם
  chosen: and that the land may not become desolate
  alternatives:
  - and the land will not be laid waste
  - and the ground may not be desolated
  lexicon: HALOT
  rationale: The verb שמם denotes becoming desolate or devastated. 'Become desolate' is natural English and fits the agricultural context of uncultivated land.
