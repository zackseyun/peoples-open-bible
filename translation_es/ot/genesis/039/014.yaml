base_translation:
  language: en
  yaml_path: translation/ot/genesis/039/014.yaml
  text: Then she called the men of her household and said to them[a], “Look, he has brought a Hebrew man to us to mock us. He came in to me to lie with me[b], and I cried out with a loud voice.”
  footnotes:
  - marker: a
    text: Or “to laugh at us,” “to make sport of us.” The Hebrew verb can denote mocking or abusive sport; in this context it carries the sense of sexual humiliation in Potiphar’s wife’s accusation.
    reason: lexical_alternative
  - marker: b
    text: Or 'he has brought in to us a Hebrew man'.
    reason: previous_rendering
