translation:
  language: es
  text: Derribarás sus altares, quebrarás sus pilares sagrados, quemarás con fuego sus asheras[a], cortarás las imágenes talladas de sus dioses[b] y borrarás su nombre[c] de aquel lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: "sus aserim" o "sus postes sagrados". El término hebreo se refiere a objetos cultuales asociados con Aserá.'
    reason: lexical_alternative
  - marker: b
    text: 'También: "sus ídolos". El hebreo destaca que son imágenes talladas, es decir, objetos hechos por mano humana.'
    reason: lexical_alternative
  - marker: c
    text: Es decir, borrar su presencia y memoria cultual de ese lugar, no solo una inscripción literal.
    reason: cultural_note
lexical_decisions:
- source_word: נִתַּצְתֶּם
  english_pob_choice: tear down
  chosen_spanish: derribarás
  alternatives_spanish:
  - derribaréis
  - demolerás
  lexicon: HALOT
  rationale: El verbo denota derribar o demoler estructuras cultuales. En español, "derribar" comunica bien la acción física y solemne del mandato, con registro natural y digno.
- source_word: מִזְבּחֹתָם
  english_pob_choice: their altars
  chosen_spanish: sus altares
  alternatives_spanish:
  - sus sacrificios
  - sus lugares de sacrificio
  lexicon: HALOT
  rationale: '"Altares" es el equivalente directo y estable para מִזְבֵּחַ; el posesivo plural conserva la referencia a los altares de ellos.'
- source_word: שִׁבַּרְתֶּם
  english_pob_choice: shatter
  chosen_spanish: quebrarás
  alternatives_spanish:
  - romperás
  - harás pedazos
  lexicon: HALOT
  rationale: La forma intensiva expresa una ruptura fuerte y total. "Quebrar" mantiene la violencia del acto sin sonar excesivamente coloquial; el futuro se usa como mandato en español bíblico formal.
- source_word: מַצֵּבֹתָם
  english_pob_choice: their sacred pillars
  chosen_spanish: sus pilares sagrados
  alternatives_spanish:
  - sus pilares
  - sus piedras erguidas
  - sus estelas sagradas
  lexicon: HALOT
  rationale: '"Pilares sagrados" conserva la función cultual del objeto y evita una interpretación demasiado técnica o arqueológica. Es una solución transparente para lectores de español.'
- source_word: אֲשֵׁרֵיהֶם
  english_pob_choice: their Asherah poles
  chosen_spanish: sus asheras
  alternatives_spanish:
  - sus postes de Aserá
  - sus objetos de Aserá
  - sus postes rituales
  lexicon: HALOT
  rationale: El término tiene una carga cultural específica y no se resuelve bien con una paráfrasis genérica. Se conserva el nombre del objeto/culto en una forma reconocible en español, dejando visible la tensión lexical que el inglés también preserva con "Asherah poles".
- source_word: תִּשְׂרְפוּן בָּאֵשׁ
  english_pob_choice: burn ... with fire
  chosen_spanish: quemarás con fuego
  alternatives_spanish:
  - los quemarás en el fuego
  - los prenderás fuego
  lexicon: HALOT
  rationale: La preposición expresa medio/instrumento; "con fuego" refleja bien el hebreo. "Quemarás" mantiene la forma imperativa-futura coherente con el resto del versículo.
- source_word: פְסִילֵי אֱלֹהֵיהֶם
  english_pob_choice: the carved images of their gods
  chosen_spanish: las imágenes talladas de sus dioses
  alternatives_spanish:
  - los ídolos de sus dioses
  - las esculturas de sus dioses
  lexicon: HALOT
  rationale: El hebreo subraya el carácter fabricado y tallado de estos objetos. "Imágenes talladas" conserva ese rasgo mejor que el más general "ídolos", sin perder claridad.
- source_word: תְּגַדֵּעוּן
  english_pob_choice: cut down
  chosen_spanish: cortarás
  alternatives_spanish:
  - derribarás
  - talarás
  - cortarás de raíz
  lexicon: HALOT
  rationale: El verbo puede usarse para cortar o tronchar objetos, postes o imágenes. "Cortarás" es suficientemente amplio y directo en español; el contexto ya precisa el objeto a destruir.
- source_word: וְאִבַּדְתֶּם אֶת שְׁמָם
  english_pob_choice: destroy their name
  chosen_spanish: borrarás su nombre
  alternatives_spanish:
  - destruirás su nombre
  - eliminarás su nombre
  lexicon: HALOT
  rationale: En este contexto, "nombre" funciona como memoria o presencia cultual. "Borrar" comunica bien la idea de eliminar toda huella sin forzar una explicación interpretativa en el texto principal.
- source_word: מִן הַמָּקוֹם הַהוּא
  english_pob_choice: from that place
  chosen_spanish: de aquel lugar
  alternatives_spanish:
  - de ese lugar
  - de allí
  lexicon: HALOT
  rationale: La frase indica el sitio cultual previamente mencionado. "Aquel lugar" suena natural y conserva la distancia demostrativa del hebreo.
theological_decisions:
- issue: Rendering of אֲשֵׁרֵיהֶם in a Deuteronomic anti-idolatry command
  english_pob_reading: their Asherah poles
  chosen_spanish_reading: sus asheras
  alternative_spanish_readings:
  - sus postes de Aserá
  - sus objetos de Aserá
  - sus postes rituales
  rationale: El pasaje nombra un objeto/culto específico de la religión cananea. Mantener un término transparente y no totalmente neutralizado preserva la referencia histórica y la tensión antiidolátrica del texto. En español, "asheras" deja visible el préstamo cultural, de modo análogo a la decisión inglesa de no reducirlo a un término genérico.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve culturally specific cult terminology when the source text does.'
- issue: Force of the command sequence and Hebrew future-form imperatives
  english_pob_reading: You shall tear down...
  chosen_spanish_reading: Derribarás... quebrarás... quemarás... cortarás... borrarás...
  alternative_spanish_readings:
  - Derriben... rompan... quemen... corten... borren...
  - Debéis derribar...
  rationale: El hebreo usa formas con valor imperativo/exhortativo. El futuro exhortativo en español bíblico ofrece un mandato solemne y fluido, mientras mantiene la fuerza normativa del pasaje.
  doctrine_reference: 'Translation philosophy: formal equivalence with natural Spanish syntax for biblical commands.'
- issue: Meaning of 'destroy their name' as more than deleting a label
  english_pob_reading: destroy their name
  chosen_spanish_reading: borrar su nombre
  alternative_spanish_readings:
  - destruir su nombre
  - extinguir su memoria
  rationale: En contexto, el "nombre" es una metonimia de memoria, reputación y presencia cultual del sitio. "Borrar" conserva la imagen de eliminación total sin convertir el texto en una explicación extensa.
  doctrine_reference: 'Translation philosophy: preserve idiom and theological force rather than over-explicating the metonymy.'
translation_notes:
  revision_awareness: El borrador sigue la revisión final del auditorio inglés al preferir una fórmula más literal para el medio de combustión y un verbo formal para la eliminación de la memoria cultual. También conserva la especificidad de Asherah y de las imágenes talladas, evitando generalizaciones que suavicen el mandato.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y solemne, usando futuro exhortativo para reproducir el valor mandativo del hebreo.
  - Se evitó "SEÑOR" u otras sustituciones no presentes en este versículo; el texto no contiene el Tetragrámaton.
  - '"Asheras" se conservó como término cultural específico, coherente con la práctica de POB de no neutralizar tecnicismos religiosos cuando el contexto los hace significativos.'
  - Se eligió "borrar su nombre" para conservar la metonimia de memoria/presencia cultual sin perder claridad para lectores contemporáneos.
