translation:
  language: es
  text: '¿No es esta la palabra que te hablamos en Egipto[a], diciendo: «Déjanos[b], y sirvamos a los egipcios»? Porque mejor es para nosotros servir a los egipcios que morir en el desierto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Palabra» traduce דָּבָר; también puede significar «asunto» o «cosa». Aquí se conserva el matiz de algo dicho previamente.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo idiomático: literalmente, «desiste de nosotros» o «déjanos». El sentido natural en contexto es «déjanos» o «déjanos en paz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Is ... not
  chosen_spanish: ¿No es ...?
  alternatives_spanish:
  - ¿Acaso no es ...?
  - ¿No fue ...?
  lexicon: HALOT
  rationale: La pregunta retórica espera asentimiento. En español, «¿No es…?» conserva bien ese valor sin añadir interpretación temporal no exigida por el hebreo.
- source_word: זֶה הַדָּבָר
  english_pob_choice: this ... word
  chosen_spanish: esta ... palabra
  alternatives_spanish:
  - esta cuestión
  - esta cosa
  lexicon: HALOT
  rationale: דָּבָר puede ser «palabra», «asunto» o «cosa». Aquí se refiere a una declaración previa citada por el pueblo; «palabra» mantiene el vínculo con el habla y suena natural en español.
- source_word: דִּבַּרְנוּ אֵלֶיךָ
  english_pob_choice: we spoke to you
  chosen_spanish: les hablamos
  alternatives_spanish:
  - te hablamos
  - les dijimos
  lexicon: HALOT
  rationale: El plural hebreo incluye a los hablantes y el objeto indirecto singular masculino. En español, el tratamiento directo plural «les hablamos» comunica la referencia colectiva del pasaje y mantiene la naturalidad discursiva.
- source_word: בְמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  lexicon: HALOT
  rationale: El sentido locativo es directo y no presenta dificultad.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - cuando dijeron
  lexicon: HALOT
  rationale: Es la fórmula de introducción de cita. «Diciendo» conserva la función quotativa sin sobrecargar la frase.
- source_word: חֲדַל מִמֶּנּוּ
  english_pob_choice: Leave us alone
  chosen_spanish: Déjennos[b]
  alternatives_spanish:
  - Déjennos en paz
  - Dejen de molestarnos
  - Aléjense de nosotros
  lexicon: HALOT
  rationale: 'La expresión hebrea es un modismo: literalmente algo como «desiste de nosotros» o «apártate de nosotros». El español más natural y breve para este contexto es «Déjennos», y la nota explica el matiz idiomático.'
- source_word: וְנַעַבְדָה אֶת מִצְרַיִם
  english_pob_choice: and let us serve the Egyptians
  chosen_spanish: y sirvamos a los egipcios
  alternatives_spanish:
  - y que sirvamos a los egipcios
  - y trabajemos para los egipcios
  lexicon: HALOT
  rationale: El cohortativo expresa voluntad o propuesta conjunta. «Sirvamos» reproduce bien la fuerza exhortativa/volitiva y conserva «sirvar» en el sentido de servicio bajo dominio, no mero empleo.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la petición citada. «Porque» es la conexión causal más clara en español.
- source_word: טוֹב לָנוּ
  english_pob_choice: it is better for us
  chosen_spanish: mejor es para nosotros
  alternatives_spanish:
  - es mejor para nosotros
  - sería mejor para nosotros
  lexicon: HALOT
  rationale: El hebreo presenta la comparación de modo directo, sin auxiliar explícito. «Mejor es para nosotros» conserva ese valor proverbial o sentencioso sin forzar un pasado hipotético.
- source_word: עֲבֹד אֶת מִצְרַיִם
  english_pob_choice: to serve the Egyptians
  chosen_spanish: servir a los egipcios
  alternatives_spanish:
  - el servir a los egipcios
  - servir a Egipto
  lexicon: HALOT
  rationale: El infinitivo constructo expresa la acción preferida. Se conserva «servir» para reflejar la idea de servicio/bondad bajo opresión.
- source_word: מִמֻּתֵנוּ
  english_pob_choice: than to die
  chosen_spanish: que morir
  alternatives_spanish:
  - que el morir
  - en vez de morir
  lexicon: HALOT
  rationale: La partícula comparativa exige en español «que». «Morir» mantiene el contraste final con naturalidad.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - en el yermo
  lexicon: HALOT
  rationale: Aunque «wilderness» suele verterse «desierto» o «desierto/soledad», aquí «desierto» es claro y lectura común en español bíblico moderno.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el ajuste final del audit trail en inglés: mantiene la cita directa «y sirvamos a los egipcios» en lugar de una finalidad más explicativa, y conserva la comparación en presente general «mejor es» en vez de una forma hipotética del pasado. También evita mecanizar el modismo hebreo de חֲדַל מִמֶּנּוּ, optando por una solución española natural con nota explicativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se conserva «egipcios» en minúscula por ser gentilicio común.
  - Se mantiene «desierto» para בַּמִּדְבָּר, en armonía con el resto del proyecto.
  - Se prefiere «servir» para עבד, evitando «trabajar para», porque el contexto es servidumbre/opresión.
