id: ISA.66.23
reference: Isaiah 66:23
source:
  edition: WLC
  text: וְ/הָיָ֗ה מִֽ/דֵּי חֹ֨דֶשׁ֙ בְּ/חָדְשׁ֔/וֹ וּ/מִ/דֵּ֥י שַׁבָּ֖ת בְּ/שַׁבַּתּ֑/וֹ יָב֧וֹא כָל בָּשָׂ֛ר לְ/הִשְׁתַּחֲוֺ֥ת לְ/פָנַ֖/י אָמַ֥ר יְהוָֽה־־׃
translation:
  text: And it shall be[a], from new moon to its new moon and from Sabbath to its Sabbath, all flesh shall come to bow down before me[b], says Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from one new moon to another, and from one Sabbath to another.'
    reason: lexical_alternative
  - marker: b
    text: '''All flesh'' is a Hebrew idiom that can mean all humanity, while retaining the sense of creaturely embodied life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will happen
  - And it shall come to pass
  lexicon: HALOT
  rationale: Introduces a future state with a common prophetic formula. 'And it shall be' preserves the formal prophetic cadence without archaic excess.
- source_word: מִדֵּי ... בְּחָדְשׁוֹ
  chosen: from new moon to its new moon
  alternatives:
  - month by month
  - from one new moon to another
  lexicon: HALOT
  rationale: The idiom מִדֵּי ... בְּ marks regular recurrence. Because חֹדֶשׁ here refers specifically to the new-moon observance rather than merely a calendar month, 'new moon' is preferred. The suffix in 'its new moon' is retained to reflect the Hebrew form, though the idiom means recurring monthly observance.
- source_word: וּמִדֵּי שַׁבָּת בְּשַׁבַּתּוֹ
  chosen: and from Sabbath to its Sabbath
  alternatives:
  - and week by week
  - and from one Sabbath to another
  lexicon: HALOT
  rationale: Parallel to the previous phrase, expressing recurring weekly worship. 'Sabbath' preserves the cultic/theological term better than 'week.' The suffix is represented with 'its' to stay close to the Hebrew structure.
- source_word: יָבוֹא
  chosen: shall come
  alternatives:
  - will come
  - shall enter
  lexicon: HALOT
  rationale: Simple future of בוא. 'Shall come' fits the prophetic register and the movement toward worship in God's presence.
- source_word: כָל בָּשָׂר
  chosen: all flesh
  alternatives:
  - all people
  - all humankind
  lexicon: HALOT
  rationale: A significant biblical expression denoting all living humanity, and sometimes creaturely life more broadly. 'All flesh' preserves the idiom and its theological force of universal, embodied creatureliness better than a flattened 'all people.'
- source_word: לְהִשְׁתַּחֲוֺת
  chosen: to bow down
  alternatives:
  - to worship
  - to prostrate themselves
  lexicon: HALOT
  rationale: The verb denotes the physical act of prostration/bowing in worship. 'To bow down' preserves the concrete action while still implying worship in context; 'worship' alone would be interpretively broader and less vivid.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in my presence
  lexicon: HALOT
  rationale: Standard rendering of the prepositional phrase, indicating direct presence before the LORD.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and alignment with the doctrine guideline on contested terms.
