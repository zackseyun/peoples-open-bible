translation:
  language: es
  text: Porque, mientras hacía guerra en Egipto contra Ptolomeo, también oyó que, cuando se había difundido un reporte[a] de que había muerto, los habitantes de Jerusalén se alegraban lo más posible; por eso marchó rápidamente contra ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rumor». φήμη puede significar «reporte», «rumor» o «noticia pública»; se eligió «reporte» en el texto principal por ser la opción más neutral en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπειδὴ γὰρ
  english_pob_choice: For while
  chosen_spanish: Porque, mientras
  alternatives_spanish:
  - Pues, mientras
  - Ya que, mientras
  lexicon: LSJ
  rationale: La combinación griega introduce el trasfondo narrativo con valor explicativo y temporal. «Porque, mientras» conserva ambas fuerzas de manera natural en español.
- source_word: πολεμῶν ἦν
  english_pob_choice: he was waging war
  chosen_spanish: guerreaba
  alternatives_spanish:
  - hacía guerra
  - estaba en guerra
  lexicon: LSJ
  rationale: El participio perifrástico expresa acción continua. «Guerreaba» mantiene el carácter militar y el movimiento del contexto sin sonar demasiado pesado.
- source_word: κατʼ Αἴγυπτον
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - contra Egipto
  - por Egipto
  lexicon: LSJ
  rationale: Siguiendo el audit trail inglés, el referente geográfico principal es Egipto, mientras que el adversario personal se expresa con «contra Ptolomeo».
- source_word: Πτολεμαίῳ
  english_pob_choice: Ptolemy
  chosen_spanish: Ptolomeo
  alternatives_spanish:
  - Tolomeo
  lexicon: LSJ
  rationale: Nombre propio transliterado de forma estándar en español bíblico y académico.
- source_word: ἠκούσέν τε
  english_pob_choice: he also heard
  chosen_spanish: también oyó
  alternatives_spanish:
  - oyó además
  - y oyó
  lexicon: LSJ
  rationale: «También» reproduce el matiz aditivo de τε con fluidez en español.
- source_word: φήμης διαδοθείσης
  english_pob_choice: when a report had spread
  chosen_spanish: al haberse difundido un rumor
  alternatives_spanish:
  - cuando se difundió un rumor
  - al correrse la noticia
  lexicon: LSJ
  rationale: El griego señala una circulación pública previa al hecho principal. «Rumor» conserva la neutralidad contextual de la fuente, con una matiz natural en español; el infinitivo compuesto refleja la anterioridad del genitivo absoluto.
- source_word: περὶ τοῦ τεθνάναι αὐτόν
  english_pob_choice: that he was dead
  chosen_spanish: de que había muerto
  alternatives_spanish:
  - de que estaba muerto
  - sobre que había muerto
  lexicon: LSJ
  rationale: La construcción subordinada española expresa con claridad el contenido del rumor. «Había muerto» mantiene el valor de evento pasado comunicado por el rumor.
- source_word: ὡς ἔνι μάλιστα
  english_pob_choice: as much as possible
  chosen_spanish: lo más posible
  alternatives_spanish:
  - todo lo posible
  - en extremo
  lexicon: LSJ
  rationale: La frase intensifica el grado de la alegría. «Lo más posible» es una correspondencia directa y clara en español.
- source_word: χαίροιεν
  english_pob_choice: were rejoicing
  chosen_spanish: se alegraban
  alternatives_spanish:
  - estaban gozosos
  - se regocijaban
  lexicon: LSJ
  rationale: «Alegrarse» comunica el estado afectivo sin exigir una connotación litúrgica que el contexto no requiere. El optativo indirecto se vierte como imperfecto narrativo.
- source_word: οἱ Ἱεροσολυμεῖται
  english_pob_choice: the people of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - los jerusalemitas
  - la gente de Jerusalén
  lexicon: LSJ
  rationale: «Habitantes de Jerusalén» es claro y conserva la referencia étnico-urbana sin recurrir a un gentilicio menos transparente.
- source_word: ταχέως
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - de prisa
  - enseguida
  lexicon: LSJ
  rationale: Adverbio simple y natural que mantiene el ritmo narrativo.
- source_word: ἐπʼ αὐτοὺς ἀνέζευξεν
  english_pob_choice: marched up against them
  chosen_spanish: marchó rápidamente contra ellos
  alternatives_spanish:
  - avanzó contra ellos
  - se volvió contra ellos
  lexicon: LSJ
  rationale: El verbo es de desplazamiento militar hostil. «Marchó contra ellos» conserva el valor bélico y la dirección de ataque; «rápidamente» recoge tanto ταχέως como la urgencia implícita del contexto.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés y no hubo revisiones aplicadas en la pass más reciente; el ajuste principal fue españolizar con naturalidad la secuencia temporal del genitivo absoluto y mantener la ambigüedad lexical de φήμη sin sobrecargarla.
  spanish_consistency_notes:
  - Se mantuvo «Ptolomeo» como nombre propio transliterado, en coherencia con el criterio de transliteración del proyecto.
  - Se prefirió «había muerto» para el contenido del rumor, evitando una paráfrasis excesiva.
  - Se conservó el matiz militar de ἀνέζευξεν con «marchó ... contra ellos» en vez de un simple «fue» o «avanzó», para no perder la hostilidad del movimiento.
