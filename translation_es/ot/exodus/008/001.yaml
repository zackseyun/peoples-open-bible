translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés[a]: «Di a Aarón: “Extiende tu mano con tu vara sobre los ríos, sobre los canales y sobre los estanques, y haz subir las ranas sobre la tierra de Egipto”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los canales del Nilo” para “los canales”; el hebreo suele referirse a cursos de agua del Nilo en Egipto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino del Tetragrámaton se conserva como nombre propio en español. 'Yahvé' sigue la decisión auditada del POB en inglés de no sustituirlo por un título, y evita la convención de máscara litúrgica 'el SEÑOR'.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Yahvé dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; 'Entonces' reproduce bien ese avance discursivo en español sin volver mecánico el enlace.
- source_word: אֱמֹר
  english_pob_choice: Say
  chosen_spanish: Di
  alternatives_spanish:
  - Habla
  - Diles
  lexicon: HALOT
  rationale: El imperativo dirigido a Moisés para introducir discurso directo se expresa de forma breve y natural con 'Di'.
- source_word: נְטֵה
  english_pob_choice: Stretch out
  chosen_spanish: Extiende
  alternatives_spanish:
  - Tiende
  - Alarga
  lexicon: HALOT
  rationale: El verbo implica extender o alargar el gesto de la mano; 'Extiende' conserva el mandato físico sin sonar forzado en español.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu brazo
  lexicon: HALOT
  rationale: Se mantiene el sustantivo literal 'mano', que es suficiente y fiel al hebreo.
- source_word: בְּמַטֶּךָ
  english_pob_choice: with your staff
  chosen_spanish: con tu vara
  alternatives_spanish:
  - con tu bastón
  - con tu cayado
  lexicon: HALOT
  rationale: '''Vara'' comunica bien el objeto ritual/mandatado en este contexto y es natural en español bíblico sin perder concreción.'
- source_word: הַנְּהָרֹת
  english_pob_choice: the rivers
  chosen_spanish: los ríos
  alternatives_spanish:
  - los arroyos
  - los cauces
  lexicon: HALOT
  rationale: El término ordinario es 'ríos'; se conserva la primera parte de la serie hídrica distinta de los otros dos términos.
- source_word: הַיְאֹרִים
  english_pob_choice: the canals
  chosen_spanish: los canales
  alternatives_spanish:
  - los canales del Nilo
  - los brazos del Nilo
  - las acequias
  lexicon: HALOT
  rationale: Siguiendo la decisión auditada del POB, 'canales' expresa bien las vías acuáticas egipcias y mantiene la distinción con 'ríos' y 'estanques'. En nota puede explicarse la posible referencia a canales del Nilo.
- source_word: הָאֲגַמִּים
  english_pob_choice: the pools
  chosen_spanish: los estanques
  alternatives_spanish:
  - los estanques
  - las charcas
  - los pantanos
  lexicon: HALOT
  rationale: '''Estanques'' comunica el sentido de aguas reunidas y preserva la tercera categoría de la enumeración; es más claro que ''charcas'' en registro bíblico formal.'
- source_word: וְהַעַל
  english_pob_choice: bring up
  chosen_spanish: haz subir
  alternatives_spanish:
  - saca
  - haz salir
  lexicon: HALOT
  rationale: El hiphil de עלה conserva su fuerza causativa. 'Haz subir' reproduce esa causalidad de manera bastante literal y natural.
- source_word: הַצְפַרְדְּעִים
  english_pob_choice: the frogs
  chosen_spanish: las ranas
  alternatives_spanish:
  - las ranas
  - los sapos
  lexicon: HALOT
  rationale: Aunque el inglés POB traduce 'frogs', en español 'ranas' es el equivalente más común y digno para el animal de la plaga; 'sapos' sería un cambio injustificado de especie.
- source_word: עַל אֶרֶץ מִצְרָיִם
  english_pob_choice: over the land of Egypt
  chosen_spanish: sobre la tierra de Egipto
  alternatives_spanish:
  - sobre la tierra de Egipto
  - en toda la tierra de Egipto
  lexicon: HALOT
  rationale: Se conserva 'sobre' para reflejar el על repetido y el movimiento/proyección de la plaga sobre el territorio; 'tierra de Egipto' es una traducción directa y estable.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La línea doctrinal del POB en inglés preserva el nombre personal de Dios en vez de ocultarlo tras un título. En español, 'Yahvé' mantiene esa transparencia y es la forma reverente y reconocible del nombre en traducción bíblica contemporánea.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor semántico de הַיְאֹרִים
  english_pob_reading: the canals
  chosen_spanish_reading: los canales
  alternative_spanish_readings:
  - los canales del Nilo
  - los brazos del Nilo
  - las acequias
  rationale: El hebreo puede aludir específicamente a cursos de agua egipcios vinculados al Nilo. 'Canales' mantiene la decisión auditada del POB sin introducir una explicación interpretativa en el texto principal; la posible especificación egipcia queda mejor para nota.
  doctrine_reference: Lexical note from English POB footnote a
- issue: Elección de 'ranas' para הַצְפַרְדְּעִים
  english_pob_reading: the frogs
  chosen_spanish_reading: las ranas
  alternative_spanish_readings:
  - los sapos
  - las ranas
  rationale: En español, 'rana' es la equivalencia directa y más natural para el término genérico de la plaga. No hay razón textual suficiente para alterar la especie en la traducción principal.
  doctrine_reference: HALOT lexeme 6854
translation_notes:
  revision_awareness: Se integró la decisión revisada del POB de traducir el Tetragrámaton como 'Yahweh' en inglés; en español se usa consistentemente 'Yahvé' como equivalente funcional y reverente. También se atendió la nota léxica sobre הַיְאֹרִים mediante una nota breve sin sobreinterpretar el texto.
  spanish_consistency_notes:
  - 'Se mantuvo la serie triple de aguas con términos diferenciados: ríos / canales / estanques.'
  - Se conservó el mandato encadenado con comillas internas, apropiado para discurso directo en español.
  - La preposición 'sobre' se repite para reflejar el על hebreo en la secuencia de la plaga.
  - Se prefirió 'vara' por coherencia bíblica y claridad, sin desplazar el sentido instrumental de בְּ.
  - Se evitó introducir 'Nilo' en el texto principal para no exceder la evidencia, dejándolo como alternativa en nota.
