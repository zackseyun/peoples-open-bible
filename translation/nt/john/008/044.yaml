id: JHN.8.44
reference: John 8:44
source:
  edition: SBLGNT
  text: ὑμεῖς ἐκ τοῦ πατρὸς τοῦ διαβόλου ἐστὲ καὶ τὰς ἐπιθυμίας τοῦ πατρὸς ὑμῶν θέλετε ποιεῖν. ἐκεῖνος ἀνθρωποκτόνος ἦν ἀπ’ ἀρχῆς, καὶ ἐν τῇ ἀληθείᾳ ⸂οὐκ ἔστηκεν⸃, ὅτι οὐκ ἔστιν ἀλήθεια ἐν αὐτῷ. ὅταν λαλῇ τὸ ψεῦδος, ἐκ τῶν ἰδίων λαλεῖ, ὅτι ψεύστης ἐστὶν καὶ ὁ πατὴρ αὐτοῦ.
translation:
  text: You are from your father[a], the devil, and you want to do your father's desires. He was a murderer from the beginning, and he has not stood in the truth, because there is no truth in him. Whenever he speaks the lie, he speaks from his own nature[c][b], because he is a liar and the father of it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'Whenever he lies' or 'Whenever he speaks falsehood.' The Greek reads more literally, 'Whenever he speaks the lie.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'he speaks from his own'—that is, from what belongs to him by nature or character.
    reason: lexical_alternative
  - marker: c
    text: Or, 'and its father.' Some take this more generally as 'the father of lies.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ τοῦ πατρὸς τοῦ διαβόλου
  chosen: from your father, the devil
  alternatives:
  - of your father the devil
  - from the father, the devil
  lexicon: BDAG
  rationale: ἐκ with εἰμί here expresses source/origin or belonging. 'From your father, the devil' is idiomatic English and preserves the force that their spiritual origin/allegiance is the devil, without softening the confrontation.
- source_word: ἐπιθυμίας
  chosen: desires
  alternatives:
  - lusts
  - cravings
  lexicon: BDAG
  rationale: '''Desires'' is broad, natural English and fits both moral and volitional force here. ''Lusts'' is too narrow and overly sexualized in modern English.'
- source_word: θέλετε ποιεῖν
  chosen: you want to do
  alternatives:
  - you are willing to do
  - you desire to do
  lexicon: BDAG
  rationale: The construction conveys volition/intention. 'You want to do' is clear modern English and preserves culpable willingness.
- source_word: ἀνθρωποκτόνος
  chosen: murderer
  alternatives:
  - manslayer
  - killer of people
  lexicon: BDAG
  rationale: The term denotes one who kills human beings. 'Murderer' is the established and most natural rendering in this moral context, especially given the allusion to the devil's destructive role from the beginning.
- source_word: ἀπ’ ἀρχῆς
  chosen: from the beginning
  alternatives:
  - from the start
  lexicon: BDAG
  rationale: This preserves the temporal phrase straightforwardly and echoes Johannine diction elsewhere.
- source_word: ἐν τῇ ἀληθείᾳ οὐκ ἔστηκεν
  chosen: he has not stood in the truth
  alternatives:
  - he does not stand in the truth
  - he has not remained in the truth
  lexicon: BDAG
  rationale: The perfect-like force of ἔστηκεν can suggest a settled standing/state. 'Has not stood' preserves the verbal image closely. 'Remained' is interpretive and may imply prior presence in the truth more strongly than the Greek requires.
- source_word: ἀλήθεια
  chosen: truth
  lexicon: BDAG
  rationale: Standard Johannine usage; no contextual reason to vary.
- source_word: ὅταν λαλῇ τὸ ψεῦδος
  chosen: Whenever he speaks the lie
  alternatives:
  - When he lies
  - Whenever he speaks falsehood
  lexicon: BDAG
  rationale: The article with ψεῦδος is notable. 'Speaks the lie' preserves the Greek form and may suggest lying as his characteristic domain. A smoother alternative is worth preserving in a footnote.
- source_word: ἐκ τῶν ἰδίων λαλεῖ
  chosen: he speaks from his own nature
  alternatives:
  - he speaks from his own resources
  - he speaks from what is his own
  lexicon: BDAG
  rationale: The idiom means he speaks out of what belongs properly to himself. 'From his own nature' makes the sense explicit in idiomatic English, though it is slightly interpretive; the more literal alternative is preserved in a footnote.
- source_word: ψεύστης
  chosen: a liar
  alternatives:
  - false one
  lexicon: BDAG
  rationale: Direct and idiomatic rendering of the predicate noun.
- source_word: ὁ πατὴρ αὐτοῦ
  chosen: the father of it
  alternatives:
  - its father
  - the father of lies
  - his father
  lexicon: BDAG
  rationale: The pronoun most naturally refers back to τὸ ψεῦδος ('the lie/falsehood'), yielding the sense that the devil is the source/father of lying. 'The father of it' preserves the Greek compactly without importing the plural 'lies.' Because some readers take αὐτοῦ differently, that alternative is preserved in a footnote.
