translation:
  language: es
  text: 'Pero Dios vino a Labán el arameo en un sueño por la noche y le dijo: «Ten cuidado de no decirle[a] a Jacob nada, ni bueno ni malo[b]».[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otra posibilidad: «no hablar con Jacob».'
    reason: alternative_reading
  - marker: b
    text: Lit. «de bien a mal», un modismo que expresa cualquier clase de contenido, ya sea favorable o desfavorable.
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente, «Labán el sirio»; el etnónimo hebreo es «arameo».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se presentó
  lexicon: HALOT
  rationale: En español, "vino" reproduce de manera natural el movimiento narrativo de בוא con sujeto divino, sin añadir la idea interpretativa de una aparición explícita.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: La forma verbal singular y el contexto narrativo señalan al Dios único; en español corresponde "Dios".
- source_word: לָבָן הָאֲרַמִּי
  english_pob_choice: Laban the Aramean
  chosen_spanish: Labán el arameo
  alternatives_spanish:
  - Labán el sirio
  lexicon: HALOT
  rationale: Se conserva el etnónimo hebreo אֲרַמִּי con "arameo", como reflejo más directo del texto fuente; "sirio" sería una tradición posterior menos precisa respecto del hebreo.
- source_word: בַּחֲלֹם הַלָּיְלָה
  english_pob_choice: in a dream at night
  chosen_spanish: en un sueño por la noche
  alternatives_spanish:
  - en un sueño de noche
  - en el sueño de la noche
  lexicon: HALOT
  rationale: La frase combina sueño y noche; "por la noche" comunica la circunstancia temporal con naturalidad en español y mantiene el valor adverbial del hebreo.
- source_word: הִשָּׁמֶר לְךָ
  english_pob_choice: Be careful
  chosen_spanish: Ten cuidado
  alternatives_spanish:
  - Cuídate
  - Guárdate
  lexicon: HALOT
  rationale: El imperativo de advertencia se expresa de forma clara y natural con "Ten cuidado", preservando la fuerza exhortativa sin volverlo rígido.
- source_word: פֶּן תְּדַבֵּר
  english_pob_choice: not to speak
  chosen_spanish: de no hablar
  alternatives_spanish:
  - para no hablar
  - no hablar
  lexicon: HALOT
  rationale: La cláusula de prevención con פֶּן queda bien en español con una construcción infinitiva de cautela. "Hablar" conserva el valor verbal amplio sin forzar una equivalencia mecánica.
- source_word: עִם יַעֲקֹב
  english_pob_choice: to Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - con Jacob
  lexicon: HALOT
  rationale: Aunque עִם puede ser "con", con דּבר aquí el sentido idiomático es dirigirse a Jacob; por eso "a Jacob" resulta más natural en español.
- source_word: מִטּוֹב עַד רָע
  english_pob_choice: either good or bad
  chosen_spanish: ni bien ni mal
  alternatives_spanish:
  - de bien a mal
  - sea bueno o malo
  lexicon: HALOT
  rationale: La construcción hebrea es un modismo de totalidad, equivalente a no decir nada favorable ni desfavorable. "Ni bien ni mal" reproduce de forma breve y natural esa polaridad total.
theological_decisions:
- issue: Identidad de אֱלֹהִים en la escena
  english_pob_reading: the one true God addressed Laban in a dream
  chosen_spanish_reading: el único Dios habló a Labán en un sueño
  alternative_spanish_readings:
  - unos dioses hablaron
  - un ser divino habló
  rationale: La concordancia verbal singular y el contexto del relato excluyen un plural o una entidad indefinida; en español se mantiene la referencia al Dios único sin añadir doctrina ajena al texto.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la formulación a una redacción más natural sin cambiar el sentido. En español se reflejó con una construcción igualmente natural y con el mismo alcance semántico del hebreo.
  spanish_consistency_notes:
  - Se mantiene "Dios" para אֱלֹהִים en singular.
  - Se conserva el etnónimo "arameo" para אֲרַמִּי, evitando la equivalencia tradicional "sirio".
  - La advertencia final se expresa como modismo totalizador en español para reflejar מִטּוֹב עַד רָע.
