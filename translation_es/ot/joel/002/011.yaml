translation:
  language: es
  text: Yahvé da su voz delante de su ejército[a], porque muy grande es su campamento; porque poderoso es el que cumple su palabra[b]. Porque grande es el día de Yahvé, y muy terrible[c]; ¿quién lo podrá soportar?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «emite su voz». El hebreo dice literalmente: «da su voz».'
    reason: lexical_alternative
  - marker: b
    text: O «el que ejecuta su mandato». El hebreo «su palabra» puede implicar un mandato en este contexto.
    reason: lexical_alternative
  - marker: c
    text: O «muy temible».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  english_pob_choice: And Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino explícito conforme al criterio del proyecto para יְהוָה. Se evita la máscara litúrgica «SEÑOR» para conservar la referencia auditable al Tetragrama.
- source_word: נָתַן קוֹלוֹ
  english_pob_choice: gives his voice
  chosen_spanish: da su voz
  alternatives_spanish:
  - emite su voz
  - levanta su voz
  - hace oír su voz
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «dio/da su voz». «Da su voz» conserva la metáfora y suena natural en español profético; «emite» o «hace oír» serían más explicativos pero menos cercanos al hebreo.
- source_word: לִפְנֵי חֵילוֹ
  english_pob_choice: before his army
  chosen_spanish: delante de su ejército
  alternatives_spanish:
  - ante su ejército
  - frente a su ejército
  - delante de su fuerza
  lexicon: HALOT
  rationale: חֵיל aquí designa una fuerza militar organizada. «Ejército» comunica con claridad ese sentido en español moderno. «Delante de» conserva el valor espacial de לִפְנֵי.
- source_word: מַחֲנֵהוּ
  english_pob_choice: his camp
  chosen_spanish: su campamento
  alternatives_spanish:
  - su campamento militar
  - su encampamento
  - su real
  lexicon: HALOT
  rationale: מַחֲנֶה es «campamento/encampamento»; «campamento» es la opción más clara y digna en español. Se preserva la distinción respecto de «ejército».
- source_word: עָצוּם
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - fuerte
  - poderoso y vigoroso
  - valeroso
  lexicon: HALOT
  rationale: El adjetivo expresa fuerza o poder. «Poderoso» mantiene el registro elevado y funciona bien con la cláusula siguiente.
- source_word: עֹשֵׂה דְבָרוֹ
  english_pob_choice: does his word
  chosen_spanish: hace su palabra
  alternatives_spanish:
  - cumple su palabra
  - realiza su palabra
  - ejecuta su palabra
  lexicon: HALOT
  rationale: Se conserva la correspondencia formal con עֹשֵׂה דְבָרוֹ y la tensión del hebreo entre «palabra» y «mandato». «Hace su palabra» es menos idiomático que «cumple su palabra», pero refleja con más precisión la decisión auditada en la fuente inglesa.
- source_word: כִּי גָד֧וֹל יוֹם יְהוָ֛ה
  english_pob_choice: For the day of Yahweh is great
  chosen_spanish: Porque grande es el día de Yahvé
  alternatives_spanish:
  - Porque grande es el día de Yahvé
  - Porque el día de Yahvé es grande
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética «el día de Yahvé» y el orden enfático del predicado, muy cercano al hebreo y claro en español.
- source_word: וְנוֹרָ֥א מְאֹ֖ד
  english_pob_choice: and exceedingly dreadful
  chosen_spanish: y muy terrible
  alternatives_spanish:
  - y muy temible
  - y extremadamente terrible
  - y sumamente temible
  lexicon: HALOT
  rationale: נוֹרָא en contexto de juicio apunta a algo que infunde temor. «Terrible» conserva el peso semántico; «temible» es viable, pero puede sonar menos natural en este pasaje.
- source_word: וּמִי יְכִילֶנּוּ
  english_pob_choice: who can endure it?
  chosen_spanish: ¿quién lo podrá soportar?
  alternatives_spanish:
  - ¿quién podrá resistirlo?
  - ¿quién podrá soportarlo?
  - ¿quién lo podrá resistir?
  lexicon: HALOT
  rationale: יׄכִיל con sufijo refiere a la capacidad de soportar o resistir. «Soportar» expresa bien la imposibilidad de aguantar el día anunciado y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Traducción de יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'Se sigue el valor doctrinal y editorial del proyecto: nombre divino explícito, no sustituido por un título. «Yahvé» preserva la referencia covenantal sin ocultar la forma original.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre «su ejército», «su campamento» y el agente del juicio
  english_pob_reading: The invading force is presented as belonging to and being commanded by the LORD.
  chosen_spanish_reading: La fuerza invasora aparece como perteneciente a Yahvé y bajo su mando.
  alternative_spanish_readings:
  - Solo una plaga de langostas en sentido metafórico
  - Solo un ejército humano sin comisión divina explícita
  rationale: 'La fraseología posesiva y la cláusula sobre hacer su palabra mantienen la tensión: el texto no obliga a resolver si la imagen es de langostas, ejército humano o ambas. La traducción conserva esa ambigüedad funcional.'
  doctrine_reference: POB source note on divine-command imagery in Joel 2:11
- issue: Valor de נוֹרָא מְאֹד
  english_pob_reading: exceedingly dreadful
  chosen_spanish_reading: muy terrible
  alternative_spanish_readings:
  - muy temible
  - sumamente terrible
  - extremadamente temible
  rationale: En un contexto de juicio, el término expresa temor y amenaza, no admiración positiva. «Terrible» comunica mejor ese campo semántico que «asombroso» o «impresionante», que en español moderno pueden suavizarlo.
  doctrine_reference: Lexical note on judgment-language fear response
translation_notes:
  revision_awareness: Se integró la revisión auditada que ajustó la frase inglesa de 'carries out his word' a 'does his word' para mayor cercanía léxica al hebreo. En español se optó por 'hace su palabra' para reflejar esa correspondencia sin perder legibilidad; además, se mantuvo el valor temible de נוֹרָא מְאֹד con 'muy terrible'.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva la distinción entre «ejército» (חֵיל) y «campamento» (מַחֲנֶה).
  - Se mantiene la metáfora verbal «da su voz» y no una paráfrasis interpretativa en el texto principal.
  - «Hace su palabra» preserva la tensión entre palabra y mandato sin sustituirla por una explicación excesiva.
