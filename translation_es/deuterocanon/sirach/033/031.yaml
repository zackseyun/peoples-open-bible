base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/033/031.yaml
  text: If you have a slave[a], let him be as yourself[b], because you acquired him with blood.
  footnotes:
  - marker: a
    text: Or 'servant' or 'household servant'; the Greek οἰκέτης often refers to a member of the household staff, but here the context of acquisition makes the bonded sense prominent.
    reason: lexical_alternative
  - marker: b
    text: Literally 'because with blood you acquired him.' The phrase likely expresses costly acquisition rather than specifying whose blood is in view.
    reason: lexical_alternative
