translation:
  language: es
  text: 'Y llamó a sus hermanos junto a sí y dijo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκάλεσε
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - hizo venir
  lexicon: BDAG καλέω 1.a — llamar, convocar a alguien hacia un lugar o hacia uno mismo
  rationale: El aoristo ἐκάλεσε indica una acción puntual completa. 'Llamó' es la traducción más natural y directa en español narrativo. 'Convocó' añadiría un matiz de asamblea formal no presente en el griego; 'hizo venir' es perifrástico sin ganancia semántica.
- source_word: πρὸς αὐτόν
  english_pob_choice: to himself
  chosen_spanish: junto a sí
  alternatives_spanish:
  - hacia sí
  - a su lado
  - ante sí
  lexicon: BDAG πρός c.3 — movimiento hacia una persona, indicando proximidad resultante
  rationale: '''Junto a sí'' captura tanto el movimiento direccional como la proximidad resultante que implica πρὸς αὐτόν en contexto narrativo. ''Hacia sí'' enfatiza solo el vector sin la llegada; ''ante sí'' añade connotación de presentación formal ausente del original.'
- source_word: τοὺς ἀδελφοὺς αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos carnales
  lexicon: BDAG ἀδελφός 1 — hermano biológico o de la misma familia
  rationale: En el contexto de los Testamentos de los Doce Patriarcas, ἀδελφός designa los hermanos de sangre. 'Sus hermanos' es la única traducción apropiada; no se necesita la aclaración 'carnales'.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG λέγω 1 — decir, hablar; presente histórico con función narrativa de vivificación
  rationale: λέγει es un presente histórico que el griego usa para hacer más vívida la narración. El inglés POB lo rinde correctamente como 'said' (pasado). En español, el presente histórico ('dice') es posible en prosa narrativa, pero dado que el verbo anterior (ἐκάλεσε) es aoristo y el español narrativo moderno prefiere la coherencia temporal, se adopta 'dijo' para mantener el marco narrativo uniforme.
translation_notes:
  revision_awareness: Ninguna revisión aplicada. El paso del modelo gpt-5.4 (2026-04-23T14:54:03Z) confirmó que no se necesitaban cambios. El texto griego contiene marcadores de aparato textual ³² y ³³ de la edición Charles 1908, pero sus lecturas variantes no están documentadas en el rastro de auditoría del POB en inglés; por consiguiente, no se generan notas al pie para ellos en este registro.
  spanish_consistency_notes:
  - El presente histórico λέγει se traduce como 'dijo' (pretérito indefinido) en coherencia con el aoristo ἐκάλεσε y con las convenciones del español narrativo moderno; se descarta el presente histórico español ('dice') para mantener uniformidad temporal.
  - Los superíndices ³² y ³³ del texto fuente griego (Charles 1908) son marcadores del aparato textual crítico. Dado que el POB en inglés no los documentó como notas al pie y sus lecturas variantes no están disponibles en el paquete de fuentes, no se crean notas al pie correspondientes en el borrador español.
  - El versículo es una cláusula narrativa de introducción al discurso sin contenido doctrinal; no se requieren decisiones teológicas.
  - No aparece ningún término de la terminología por defecto del proyecto (Yahvé, Mesías, δοῦλος, σάρξ, etc.) en este versículo.
