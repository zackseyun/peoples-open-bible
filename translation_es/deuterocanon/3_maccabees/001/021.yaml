translation:
  language: es
  text: Y variada fue la súplica[a] de los que se habían reunido para esto, acerca de los que eran entregados impíamente[b] por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Súplica» también puede entenderse como «petición» o «ruego».
    reason: lexical_alternative
  - marker: b
    text: «Impíamente» conserva el matiz religioso de ἀνοσίως; también podría traducirse «malvadamente» o «iniquamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: ποικίλη
  english_pob_choice: varied
  chosen_spanish: variada
  alternatives_spanish:
  - diversa
  - múltiple
  - manifiesta en muchas formas
  lexicon: LSJ
  rationale: El adjetivo describe la diversidad de las peticiones; «variada» conserva esa multiplicidad de formas en un español natural y sobrio.
- source_word: δέησις
  english_pob_choice: plea
  chosen_spanish: súplica
  alternatives_spanish:
  - plegaria
  - ruego
  - petición
  lexicon: LSJ
  rationale: El término expresa una instancia o ruego intenso. «Súplica» mantiene el tono de ruego colectivo sin sugerir necesariamente oración litúrgica.
- source_word: συλλεγέντων
  english_pob_choice: had gathered
  chosen_spanish: se habían reunido
  alternatives_spanish:
  - habían sido reunidos
  - se habían congregado
  - habían sido convocados
  lexicon: LSJ
  rationale: El participio aoristo pasivo admite matiz de reunión/congregación. «Se habían reunido» fluye bien en español y no obliga a precisar el agente de la reunión.
- source_word: εἰς τοῦτο
  english_pob_choice: for this
  chosen_spanish: para esto
  alternatives_spanish:
  - con este fin
  - para este propósito
  - para ello
  lexicon: LSJ
  rationale: La expresión es breve y final; «para esto» conserva su concisión sin añadir un propósito no explicitado por el griego.
- source_word: ἀνοσίως
  english_pob_choice: impiously
  chosen_spanish: impíamente
  alternatives_spanish:
  - inicüamente
  - malvadamente
  - sin reverencia
  lexicon: LSJ
  rationale: El adverbio remite a una acción contraria a lo santo o reverente. «Impíamente» reproduce de forma directa la carga religiosa y moral que el inglés auditado finalmente privilegió.
- source_word: κατεγχειρουμένοις
  english_pob_choice: being handed over
  chosen_spanish: eran entregados
  alternatives_spanish:
  - eran puestos en manos de
  - eran entregados a
  - eran cedidos
  lexicon: LSJ
  rationale: El compuesto sugiere ser puesto en manos de otro o ser entregado. «Eran entregados» es fiel y evita sobreinterpretar el mecanismo exacto del acto.
- source_word: ὑπʼ ἐκείνου
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - por aquel
  - por ese hombre
  - por aquel hombre
  lexicon: LSJ
  rationale: El demostrativo remite a un varón ya identificado en el contexto. «Por él» es la forma anafórica más natural en español.
theological_decisions:
- issue: 'Matiz de ἀνοσίως: impío vs. meramente ilegal'
  english_pob_reading: impiously
  chosen_spanish_reading: impíamente
  alternative_spanish_readings:
  - inicüamente
  - malvadamente
  - sin reverencia
  rationale: El texto no sólo denuncia una irregularidad jurídica, sino una ofensa contra lo santo o reverente. «Impíamente» preserva esa tensión religiosa y moral sin reducirla a simple ilegalidad.
  doctrine_reference: Santidad / profanación; lenguaje bíblico de impiedad
- issue: Naturalidad española de δέησις sin perder intensidad
  english_pob_reading: plea
  chosen_spanish_reading: súplica
  alternative_spanish_readings:
  - plea
  - petición
  - ruego
  rationale: «Súplica» expresa bien una demanda insistente y respetuosa. Evita «plea», que no es idiomático en español, y no debilita el carácter serio del clamor colectivo.
  doctrine_reference: Oración y ruego en lenguaje bíblico
- issue: Dirección de la frase sobre los afectados
  english_pob_reading: concerning those who were being ... handed over
  chosen_spanish_reading: acerca de los que eran entregados
  alternative_spanish_readings:
  - sobre los que eran entregados
  - en favor de los que eran entregados
  - por los que eran entregados
  rationale: La preposición ἐπί con dativo puede marcar asunto u ocasión. «Acerca de» preserva la relación temática sin forzar un valor intercesor que el griego no explicita de manera inequívoca.
  doctrine_reference: Sintaxis griega de ἐπί + dativo
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «petition» a «plea» y de «lawlessly» a «impiously» para reflejar mejor el tono del griego; la versión española sigue esa última decisión, manteniendo la intensidad religiosa y el carácter de ruego colectivo sin introducir una lectura jurídica más fuerte de la necesaria.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no hay ocurrencia.
  - Se evita «Cristo»/«Mesías» porque el pasaje no los contiene.
  - «Impíamente» se conserva por coherencia con el registro bíblico de impiedad y por su correspondencia con el audit trail inglés.
  - «Súplica» se usa como equivalente natural de δέησις en un contexto de ruego colectivo.
