translation:
  language: es
  text: Si no va según tu mano[a], córtala[b] de tu carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «según tu mano», un modismo que indica actuar bajo tu dirección o autoridad.'
    reason: lexical_alternative
  - marker: b
    text: La imagen de «cortarla de tu carne» conserva el lenguaje corporal y enérgico del griego; el texto no usa aquí un término técnico explícito para «divorciar».
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ μὴ
  english_pob_choice: If ... not
  chosen_spanish: Si no
  alternatives_spanish:
  - a menos que
  - si... no
  lexicon: LSJ
  rationale: La cláusula griega introduce una condición negativa directa; «Si no» conserva esa estructura breve y contundente sin añadir explicaciones.
- source_word: πορεύεται
  english_pob_choice: goes
  chosen_spanish: va
  alternatives_spanish:
  - camina
  - procede
  - se conduce
  lexicon: LSJ
  rationale: El verbo básico de movimiento se puede expresar naturalmente con «va» en español, manteniendo la imagen concreta sin volverla moralizante.
- source_word: κατὰ χεῖρά σου
  english_pob_choice: according to your hand / as your hand directs
  chosen_spanish: según tu mano
  alternatives_spanish:
  - conforme a tu mano
  - bajo tu control
  - como tu mano dirige
  lexicon: LSJ
  rationale: Se conserva la imagen idiomática de la «mano» sin sustituirla por una explicación más interpretativa; «según tu mano» refleja mejor la literalidad griega que una paráfrasis.
- source_word: ἀπὸ τῶν σαρκῶν σου
  english_pob_choice: from your flesh
  chosen_spanish: de tus entrañas
  alternatives_spanish:
  - de tu carne
  - de tu propio cuerpo
  - de tu carne
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «de tus carnes», en español «entrañas» comunica de modo natural la imagen corporal intensa y relacional que el contexto sugiere, sin reducirla a un tecnicismo legal. Se evita «cuerpo» por ser más débil y «carne» por sonar menos idiomático aquí.
- source_word: ἀπότεμε
  english_pob_choice: cut ... away / cut off
  chosen_spanish: córtala
  alternatives_spanish:
  - córtala de ti
  - sepárala
  - córtala off
  lexicon: LSJ
  rationale: El imperativo pide una separación decisiva; «córtala» mantiene el golpe verbal y evita introducir explícitamente un término jurídico que el griego no usa.
- source_word: αὐτήν
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - her
  lexicon: LSJ
  rationale: El pronombre femenino se expresa de forma natural con el objeto directo «la» en español, manteniendo la referencia a la mujer en el contexto inmediato.
theological_decisions:
- issue: Fuerza ética e imagen corporal sin tecnicismo de divorcio
  english_pob_reading: Retain the stark imperative of separation without softening it into a modern explanatory paraphrase.
  chosen_spanish_reading: Conservar el mandato duro de separación corporal sin convertirlo en una explicación moderna ni en un término jurídico específico.
  alternative_spanish_readings:
  - Divórciala
  - sepárala de ella
  - aléjala de ti
  rationale: El griego emplea lenguaje corporal vívido («de tus carnes») y un imperativo de corte; por eso la traducción debe preservar la aspereza y la fuerza imagética, sin importar una categoría legal que el texto no explicita.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El inglés auditado pasó de una formulación más interpretativa («as your hand directs» / «away») a una más literal («according to your hand» / «off»). La propuesta española sigue esa tendencia: mantiene la estructura breve, la imagen idiomática de la mano y el corte decisivo, sin expandir el sentido.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige explícitamente; aquí no aparece.
  - Se evita «Cristo»/«Mesías» porque no hay referencia cristológica.
  - «Carne» se reserva para contextos donde la literalidad o la teología lo requieran; aquí se opta por la expresión española idiomática «entrañas» para reflejar la intensidad corporal del griego.
  - El pronombre femenino se mantiene claro en español con «la», acorde con el contexto de la mujer mencionada en la cláusula anterior.
