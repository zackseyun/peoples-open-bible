translation:
  language: es
  text: 'El anciano dijo: «Paz sea contigo. Solo, yo me haré cargo de todas tus necesidades; solo no pases la noche en la plaza pública[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la calle». El término hebreo se refiere más específicamente a un espacio público abierto o plaza dentro del pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִישׁ הַזָּקֵן
  english_pob_choice: The old man
  chosen_spanish: El anciano
  alternatives_spanish:
  - El viejo
  - El hombre anciano
  lexicon: HALOT
  rationale: En español, «anciano» transmite bien la combinación narrativa de «hombre + viejo» sin la posible aspereza de «el viejo». Mantiene la referencia a la edad del personaje con dignidad y naturalidad.
- source_word: שָׁלוֹם לָךְ
  english_pob_choice: Peace be to you
  chosen_spanish: Paz te sea
  alternatives_spanish:
  - Paz sea contigo
  - Paz a ti
  - Que tengas paz
  lexicon: HALOT
  rationale: La expresión hebrea funciona como saludo/reaseguro; «Paz te sea» conserva la forma breve y solemne, cercana al valor deseado sin convertirla en una paráfrasis amplia.
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solo que
  - Solamente
  - Tan solo
  lexicon: HALOT
  rationale: «Solo» reproduce la función limitativa/enfática de רַק en ambos casos y suena natural en español. En la primera cláusula, «solo que» ayuda a introducir la condición implícita.
- source_word: כָּל מַחְסוֹרְךָ
  english_pob_choice: all your needs
  chosen_spanish: toda tu necesidad
  alternatives_spanish:
  - todas tus necesidades
  - todo lo que te falta
  lexicon: HALOT
  rationale: מַחְסוֹר apunta a carencia o necesidad. «Toda tu necesidad» conserva el singular abstracto del hebreo y mantiene la amplitud de la provisión ofrecida, sin forzar una pluralización que no está explícita.
- source_word: עָלָי
  english_pob_choice: be my responsibility
  chosen_spanish: recaiga sobre mí
  alternatives_spanish:
  - esté sobre mí
  - sea mi responsabilidad
  lexicon: HALOT
  rationale: La imagen hebrea de «sobre mí» expresa asunción de carga/responsabilidad. «Recaiga sobre mí» conserva mejor la metáfora y la obligación personal que una formulación meramente explicativa.
- source_word: בָּרְחוֹב
  english_pob_choice: in the open square
  chosen_spanish: en la plaza abierta
  alternatives_spanish:
  - en la calle
  - en la plaza pública
  - en el espacio abierto
  lexicon: HALOT
  rationale: רְחוֹב designa aquí un área pública abierta, no simplemente una calle. «Plaza abierta» sigue la solución del POB inglés y comunica el carácter expuesto del lugar.
- source_word: אַל תָּלַן
  english_pob_choice: do not spend the night
  chosen_spanish: no pases la noche
  alternatives_spanish:
  - no te alojes
  - no permanezcas la noche
  lexicon: HALOT
  rationale: El verbo לון significa alojarse o pasar la noche. «No pases la noche» es natural en español y reproduce el aviso concreto de no quedar en un lugar expuesto.
translation_notes:
  revision_awareness: Se corrigió la validación asegurando que cada marcador de nota aparezca en el texto español. El marcador [a] ancla la fórmula de saludo y [b] ancla la alternativa léxica de בָּרְחוֹב, evitando notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el texto no contiene el nombre divino.
  - Se prefirió un español neutral y digno, con estructura breve y narrativa acorde al hebreo.
  - Se conservó la tensión semántica de רַק con «solo» en ambos miembros para reflejar el paralelismo.
  - No se introdujeron términos eclesiásticos que no estén sustentados por el texto fuente.
