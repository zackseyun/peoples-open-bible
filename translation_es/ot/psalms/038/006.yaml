review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien los dos verbos hebreos, el sustantivo principal y la relación causal: הִבְאִישׁוּ / נָמַקּוּ / חַבּוּרֹתַי / מִפְּנֵי אִוַּלְתִּי quedan sustancialmente preservados en «Mis heridas hieden y se pudren por mi insensatez». Sin embargo, la nota alternativa no corresponde con precisión al rastro auditado en inglés: el POB preserva la alternativa léxica de «bruises» y «become foul and rotten because of my folly», mientras que la nota española propuesta reformula sin mantener claramente esa alternativa específica.'
  spanish_quality_summary: El texto principal es natural, claro y digno en español. «Hieden» y «se pudren» son fuertes pero apropiados al hebreo. «Insensatez» es aceptable, aunque «necedad» también sería viable. El único ajuste necesario es reparar la nota para que conserve la alternativa léxica documentada y suene idiomática en español.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Las decisiones léxicas principales están alineadas con el hebreo y con la filosofía POB. La excepción es la conservación de la alternativa documentada: debe reflejar «mis moretones/magulladuras» o equivalente, no solo una paráfrasis de la línea principal.'
  issues:
  - severity: medium
    issue: La nota al pie no preserva fielmente la alternativa léxica auditada en inglés.
    rationale: La nota inglesa distingue explícitamente una alternativa con «My bruises have become foul and rotten because of my folly». La nota española actual repite básicamente el texto principal con variantes menores («huelen mal», «necedad/insensatez») y omite la alternativa relevante para חַבּוּרֹתַי y para el matiz verbal «have become foul and rotten».
  - severity: low
    issue: La formulación tipográfica de la nota comienza con comillas y barra innecesarias.
    rationale: '«''O: … necedad/insensatez''» se lee poco cuidada y menos usable editorialmente. Conviene una nota limpia y específica.'
  revised_spanish_text: Mis heridas hieden y se pudren[a] por mi insensatez.
  revised_footnotes:
  - marker: a
    text: 'O: «Mis moretones se han vuelto repugnantes y podridos por mi necedad»'
    reason: lexical_alternative
  revision_rationale: 'Se mantiene intacto el texto principal, que ya representa bien el hebreo y su tono. Solo se corrige la nota para reflejar la alternativa léxica realmente documentada en el POB auditado: «moretones» como alternativa a «heridas», y «se han vuelto repugnantes y podridos» como alternativa a «hieden y se pudren», además de «necedad» como equivalente de «folly».'
