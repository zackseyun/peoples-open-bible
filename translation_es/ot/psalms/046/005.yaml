review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: apertura nominal indefinida («Un río»), referencia posesiva («sus corrientes»), valor causativo de יְשַׂמְּחוּ («alegran»), y los títulos «Dios» y «Altísimo». Sin embargo, «el santo lugar de moradas del Altísimo» no representa bien la sintaxis appositiva ni la naturalidad del segmento קְדֹשׁ מִשְׁכְּנֵי עֶלְיוֹן. Introduce una construcción no atestiguada en el hebreo («lugar de moradas») y suena forzada en español. Además, la nota [a] no corresponde con la alternativa inglesa completa, que es «Hay un río cuyas corrientes alegran la ciudad de Dios».'
  spanish_quality_summary: El verso es mayormente legible y digno, pero «el santo lugar de moradas del Altísimo» es poco idiomático y torpe. Una solución más clara y fiel es «las santas moradas del Altísimo», que preserva el plural documentado y la aposición a «la ciudad de Dios». También conviene reubicar las notas para anclar [a] en «Un río» y [b] en «moradas».
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: «Dios» y «Altísimo» están bien. La principal cuestión léxica es מִשְׁכְּנֵי: el proyecto inglés documentó el plural como dato importante, aunque una revisión inglesa lo singularizó por naturalidad. En español, el plural «moradas» funciona bien y conserva mejor la evidencia fuente que «lugar de moradas».'
  issues:
  - severity: high
    issue: «el santo lugar de moradas del Altísimo» es una construcción española poco natural y sintácticamente desviada del hebreo.
    rationale: El hebreo presenta una aposición descriptiva a «la ciudad de Dios», con קְדֹשׁ calificando מִשְׁכְּנֵי עֶלְיוֹן. «Lugar de moradas» añade un sustantivo no presente y enturbia el sentido.
  - severity: medium
    issue: La nota [a] está incompleta respecto de la alternativa documentada.
    rationale: La alternativa no es solo «Hay un río», sino «Hay un río cuyas corrientes alegran la ciudad de Dios», ya que el español necesita completar la línea para reflejar la posibilidad sintáctica.
  - severity: low
    issue: El anclaje de las notas puede mejorarse.
    rationale: '[a] debe ir sobre «Un río» y [b] sobre «moradas» para que cada nota corresponda exactamente al elemento explicado.'
  revised_spanish_text: Un río[a]—sus corrientes alegran la ciudad de Dios, las santas moradas[b] del Altísimo.
