translation:
  language: es
  text: Y los hijos de Israel fueron movilizados y provistos[a][b], y salieron al encuentro de ellos. Los hijos de Israel acamparon frente a ellos como dos pequeños rebaños de cabras[c], mientras Aram llenó la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas'. El hebreo dice literalmente 'los hijos de Israel', designación colectiva tradicional del pueblo.
    reason: lexical_alternative
  - marker: b
    text: O 'abastecidos' o 'sustentados'. El verbo probablemente alude a que fueron abastecidos para la campaña.
    reason: lexical_alternative
  - marker: c
    text: La comparación hebrea es literalmente 'como dos חֲשִׂפֵי de cabras', una expresión poco usual que comunica grupos muy pequeños frente al enorme ejército arameo.
    reason: cultural_note
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Conservo la fórmula hebrea de parentesco y pertenencia colectiva, que mantiene el color del texto fuente y es natural en español bíblico. 'Los israelitas' sería válido, pero suaviza la textura del original.
- source_word: הָתְפָּקְדוּ
  english_pob_choice: were mustered
  chosen_spanish: fueron reunidos
  alternatives_spanish:
  - fueron musterados
  - fueron enrolados
  - fueron pasados revista
  lexicon: HALOT
  rationale: El verbo en este contexto militar apunta a ser convocados/organizados para la campaña. 'Fueron reunidos' comunica bien la idea en español sin una dureza técnica innecesaria; 'musterados' resulta menos idiomático para lectura pública.
- source_word: וְכָלְכְּלוּ
  english_pob_choice: provisioned
  chosen_spanish: provistos
  alternatives_spanish:
  - provisionados
  - sustentados
  - suministrados
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de una provisión para la campaña. 'Provistos' es conciso y digno; 'provisionados' sería más literal pero algo pesado, y 'sustentados' podría ampliar indebidamente el sentido.
- source_word: לִקְרָאתָם
  english_pob_choice: to meet them
  chosen_spanish: salieron al encuentro de ellos
  alternatives_spanish:
  - salieron a encontrarlos
  - fueron al encuentro de ellos
  - salieron a enfrentarlos
  lexicon: HALOT
  rationale: La construcción indica ir al encuentro, con trasfondo de choque militar. 'Salir al encuentro de ellos' preserva la ambigüedad controlada del hebreo y evita forzar 'enfrentarlos'.
- source_word: נֶגְדָּם
  english_pob_choice: opposite them
  chosen_spanish: frente a ellos
  alternatives_spanish:
  - enfrente de ellos
  - opuestos a ellos
  - delante de ellos
  lexicon: HALOT
  rationale: '''Frente a ellos'' transmite la posición de oposición/cara a cara en un español fluido. Mantiene la imagen espacial sin volverse demasiado literal o arcaico.'
- source_word: כִּשְׁנֵי חֲשִׂפֵי עִזִּים
  english_pob_choice: like two little flocks of goats
  chosen_spanish: como dos pequeños rebaños de cabras
  alternatives_spanish:
  - como dos pequeños rebaños de cabras
  - como dos manadas pequeñas de cabras
  - como dos grupitos de cabras
  lexicon: HALOT
  rationale: La imagen hebrea es inusual y subraya pequeñez extrema. 'Pequeños rebaños de cabras' mantiene la metáfora pastoral y su fuerza comparativa; 'cabras' es más claro para lectores contemporáneos que 'chivos' en este giro.
- source_word: וַאֲרָם מִלְאוּ אֶת הָאָרֶץ
  english_pob_choice: while Aram filled the land
  chosen_spanish: mientras Aram llenaba la tierra
  alternatives_spanish:
  - y Aram llenó la tierra
  - pero Aram llenó la tierra
  - mientras Aram cubría la tierra
  lexicon: HALOT
  rationale: '''Llenaba la tierra'' conserva la imagen de multitud y extensión territorial. ''Mientras'' refleja el contraste narrativo sin añadir una adversativa más fuerte que la hebrea.'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'supplied' a 'provisioned' para un registro más preciso, y de 'but' a 'while' para reflejar mejor el contraste sin exagerarlo. La traducción española sigue esa revisión con 'provistos' y 'mientras'.
  spanish_consistency_notes:
  - Se mantuvo 'Aram' como nombre propio geográfico/político, siguiendo el texto fuente.
  - Se evitó 'SEÑOR' u otros sustitutos teológicos porque este versículo no contiene el Tetragrámaton.
  - La imagen de pequeñez en la comparación final se preservó sin explicarla dentro del texto principal.
