translation:
  language: es
  text: Hablan puras palabras[a], haciendo juramentos falsos, haciendo pactos[b]; así el juicio brota como hierba venenosa[c] sobre los surcos del campo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juramentos falsos»; el hebreo también puede llevar el sentido de un juramento que invoca maldición.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cortando un pacto».
    reason: lexical_alternative
  - marker: c
    text: El hebreo רֹאשׁ se refiere a una planta amarga o venenosa; la identificación exacta es incierta. También puede traducirse «cicuta» o «hiel».
    reason: lexical_alternative
  - marker: d
    text: O «la justicia brota como hierba venenosa», si מִשְׁפָּט se toma con amarga ironía.
    reason: alternative_reading
lexical_decisions:
- source_word: דִּבְּרוּ דְבָרִים
  english_pob_choice: They speak mere words
  chosen_spanish: Hablan puras palabras
  alternatives_spanish:
  - Dicen meras palabras
  - Hablan solo palabras
  lexicon: HALOT
  rationale: El hebreo une el verbo 'hablar' con 'palabras' para intensificar una denuncia de habla vacía. 'Puras palabras' conserva la fuerza idiomática en español y suena natural sin diluir el reproche.
- source_word: אָלוֹת שָׁוְא
  english_pob_choice: swearing false oaths
  chosen_spanish: jurando falsos juramentos
  alternatives_spanish:
  - jurando juramentos falsos
  - haciendo juramentos vanos
  lexicon: HALOT
  rationale: אָלוֹת puede implicar juramentos con matiz de maldición, y שָׁוְא añade falsedad/vacuidad. 'Falsos juramentos' mantiene el valor lexical principal en español y deja abierta la tensión entre falsedad y vana solemnidad.
- source_word: כָּרֹת בְּרִית
  english_pob_choice: making covenants
  chosen_spanish: haciendo pactos
  alternatives_spanish:
  - cortando un pacto
  - haciendo alianzas
  - concertando pactos
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'cortar un pacto'. En español, 'hacer pactos' conserva el sentido relacional/político sin sonar artificial; 'pacto' comunica mejor que 'alianza' el valor de convenio solemne.
- source_word: וּפָרַח
  english_pob_choice: springs up
  chosen_spanish: brota
  alternatives_spanish:
  - florece
  - germina
  - se levanta
  lexicon: HALOT
  rationale: El verbo describe crecimiento o brote. 'Brota' reproduce la imagen vegetal con concisión y evita connotaciones positivas excesivas de 'florece'.
- source_word: כָּרֹאשׁ
  english_pob_choice: like poison weed
  chosen_spanish: como hierba venenosa
  alternatives_spanish:
  - como planta venenosa
  - como cicuta
  - como ajenjo
  lexicon: HALOT
  rationale: רֹאשׁ designa una planta amarga o venenosa de identificación incierta. 'Hierba venenosa' comunica el efecto tóxico sin forzar una identificación botánica que el hebreo no asegura.
- source_word: מִשְׁפָּט
  english_pob_choice: judgment
  chosen_spanish: el juicio
  alternatives_spanish:
  - la justicia
  - la sentencia
  - el derecho
  lexicon: HALOT
  rationale: 'En este contexto profético el término aparece con carga irónica y negativa: el resultado social/judicial que surge de la infidelidad. ''Juicio'' mantiene ese tono de acto o veredicto judicial sin sonar positivamente normativo como ''justicia''.'
- source_word: עַל תַּלְמֵי שָׂדָי
  english_pob_choice: on the furrows of the field
  chosen_spanish: sobre los surcos del campo
  alternatives_spanish:
  - en los surcos del campo
  - sobre los surcos del terreno
  - sobre los surcos de la tierra
  lexicon: HALOT
  rationale: תֶּלֶם es 'surco' abierto por el arado. 'Surcos del campo' conserva la imagen agrícola de forma clara y idiomática en español.
theological_decisions:
- issue: Valor negativo de מִשְׁפָּט en un contexto de denuncia
  english_pob_reading: judgment springs up like poison weed
  chosen_spanish_reading: el juicio brota como hierba venenosa
  alternative_spanish_readings:
  - la justicia brota como hierba venenosa
  - la sentencia brota como hierba venenosa
  rationale: 'El hebreo permite una lectura irónica: no ''justicia'' en sentido positivo, sino el juicio/veredicto resultante de la infidelidad, presentado como algo nocivo que invade la tierra. ''Juicio'' conserva esa ambigüedad sin suavizarla.'
  doctrine_reference: Principio POB de mantener la tensión léxica y el tono profético cuando el término puede ser irónico o condenatorio
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión más reciente del POB inglés, que prefirió 'false oaths' sobre 'empty oaths'. En español se reflejó esa precisión con 'falsos juramentos', conservando además la posibilidad léxica de un matiz de juramento invocando maldición en la nota.
  spanish_consistency_notes:
  - Se mantiene 'pacto' para בְּרִית por coherencia con el valor covenantal del hebreo.
  - Se usa 'juicio' para מִשְׁפָּט en línea con la lectura negativa documentada, sin sustituirlo por 'justicia' en el texto principal.
  - '''Hierba venenosa'' funciona como equivalente general de la planta tóxica incierta del hebreo, sin sobre-especificar la especie.'
  - 'La sintaxis española conserva la progresión de acusaciones: habla vacía, juramentos falsos, pactos, y resultado nocivo sobre la tierra.'
