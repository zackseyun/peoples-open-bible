translation:
  language: es
  text: No solo estaba abrasado[a] por libertinajes desvergonzados, sino que también avanzó hasta tal grado de audacia que se difundían calumnias en los lugares[b], y muchos de sus amigos, impulsando el propósito del rey, seguían ellos mismos su voluntad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Abrasado» busca reproducir la fuerza de ἐδηκέσθη sin caer en un calco como «mordido». Otras posibilidades: «consumido» o «inflamado».'
    reason: lexical_alternative
  - marker: b
    text: «En los lugares» puede entenderse también como «por los distritos» o «en las localidades»; el griego deja el alcance geográfico algo abierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδηκέσθη
  english_pob_choice: was inflamed
  chosen_spanish: estaba abrasado
  alternatives_spanish:
  - estaba consumido
  - estaba inflamado
  - era carcomido
  lexicon: LSJ
  rationale: El verbo griego, aunque literalmente se relaciona con morder o roer, aquí expresa una fuerza interior de pasión desordenada. «Estaba abrasado» conserva la imagen de ardor compulsivo y suena natural en español.
- source_word: ἀναισχύστοις
  english_pob_choice: shameless
  chosen_spanish: vergonzosos
  alternatives_spanish:
  - desvergonzados
  - impúdicos
  - sin vergüenza
  lexicon: LSJ
  rationale: El adjetivo denota ausencia de pudor. En español, «vergonzosos» aplicado a desórdenes mantiene el juicio moral sin volverse forzado; «desvergonzados» también sería posible, pero «vergonzosos» encaja mejor con el sustantivo modificado.
- source_word: ἀσελγείαις
  english_pob_choice: debaucheries
  chosen_spanish: desórdenes
  alternatives_spanish:
  - debaucherías
  - excesos sensuales
  - actos licenciosos
  lexicon: LSJ
  rationale: El término apunta a conducta sexual o moral sin freno. «Desórdenes» comunica la idea de conducta degradada en un español bíblico claro, aunque pierde algo de la especificidad sensual; por eso queda acompañado por «vergonzosos».
- source_word: ἐπὶ τοσοῦτον θράσους προῆλθεν
  english_pob_choice: advanced to such a degree of audacity
  chosen_spanish: avanzó hasta tal grado de audacia
  alternatives_spanish:
  - llegó a tal extremo de audacia
  - procedió con tanta insolencia
  - se encaminó hasta tanta osadía
  lexicon: LSJ
  rationale: La construcción griega marca escalamiento. «Avanzó hasta tal grado de audacia» preserva el movimiento figurado y el aumento de insolencia con registro elevado.
- source_word: δυσφημίας
  english_pob_choice: slanders
  chosen_spanish: calumnias
  alternatives_spanish:
  - malas versiones
  - difamaciones
  - murmuraciones
  lexicon: LSJ
  rationale: En este contexto de agitación hostil, el sustantivo se refiere a habla injuriosa o difamatoria. «Calumnias» es la equivalencia española más directa y natural para la carga social del término.
- source_word: ἐν τοῖς τόποις
  english_pob_choice: in the places
  chosen_spanish: en los lugares
  alternatives_spanish:
  - por los distritos
  - en las localidades
  - en las regiones
  lexicon: LSJ
  rationale: La expresión es general; «en los lugares» mantiene la cercanía al griego y deja abierto el alcance geográfico, como en el audit trail inglés.
- source_word: ἐντείνοντας
  english_pob_choice: urging on
  chosen_spanish: empujando
  alternatives_spanish:
  - instando
  - apremiando
  - impulsando
  lexicon: LSJ
  rationale: El participio sugiere un esfuerzo activo en dirección al propósito real. «Empujando» conserva la energía de presión y apoyo al plan del rey en un español comprensible.
- source_word: πρόθεσιν
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - plan
  - intención
  - designio
  lexicon: LSJ
  rationale: El sustantivo denota resolución o propósito fijado. «Propósito» es una solución natural y precisa en español.
- source_word: θελήσει
  english_pob_choice: will
  chosen_spanish: voluntad
  alternatives_spanish:
  - querer
  - deseo
  - voluntad real
  lexicon: LSJ
  rationale: El término indica aquello que alguien quiere o dispone. «Voluntad» conserva el valor de decisión y mandato personal, y funciona bien con el rey como antecedente.
theological_decisions:
- issue: Caracterización moral de la conducta del gobernante
  english_pob_reading: Rendered the vice terms in strong ethical language without softening them or importing later doctrinal categories.
  chosen_spanish_reading: Se mantuvo un lenguaje moral fuerte («desórdenes vergonzosos») sin eufemismos.
  alternative_spanish_readings:
  - conducta inmoral
  - excesos sensuales
  - actos deshonrosos
  rationale: El griego es intensamente evaluativo; la traducción debe conservar esa censura moral. No hay base para suavizarla ni para introducir categorías doctrinales ajenas al pasaje.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Relación de los amigos con la voluntad del rey
  english_pob_reading: Took the final pronoun to refer back to the same royal figure.
  chosen_spanish_reading: Se entendió que «su voluntad» se refiere al rey mencionado inmediatamente antes.
  alternative_spanish_readings:
  - la voluntad de aquel hombre
  - la voluntad de ese personaje
  rationale: El antecedente inmediato favorece al rey. En español, «su voluntad» es suficientemente claro y evita una explicación innecesaria.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La redacción sigue el estado revisado más reciente del texto inglés, manteniendo la estructura de dos miembros principales unidos por «sino que también», la referencia continua al rey en la cláusula final y la solución natural para δυσφημίας como habla injuriosa difundida. Se incorporó la preferencia revisada por una formulación más natural de la difusión de calumnias y por un verbo más activo para ἐντείνοντας.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, sin recurrir a fórmulas eclesiásticas tradicionales cuando no eran necesarias.
  - Se conservó la ambigüedad geográfica de ἐν τοῖς τόποις mediante una nota, en paralelo con el audit trail inglés.
  - No se introdujo «Cristo», «SEÑOR» ni otros términos de sustitución no apoyados por el texto griego de este versículo.
  - Se evitó traducir mecánicamente desde el inglés, priorizando la sintaxis natural del español y la fuerza moral del original.
