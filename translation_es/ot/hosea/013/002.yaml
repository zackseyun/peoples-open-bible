translation:
  language: es
  text: 'Y ahora siguen pecando y se hacen para sí imágenes fundidas de su plata, ídolos según su propia habilidad, obra enteramente de artesanos. De ellos dicen[a]: «Los que sacrifican hombres besan becerros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los que sacrifican seres humanos besan becerros», tomando «seres humanos» como objeto de «sacrifican» más que como una referencia general a los sacrificadores. Es decir, probablemente los ídolos de becerro vinculados con Betel y Samaria.
    reason: alternative_reading_and_cultural_note
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva el valor temporal y discursivo de ו + עתה al introducir la continuación presente del pecado de Israel.
- source_word: יוֹסִפוּ לַחֲטֹא
  english_pob_choice: they continue to sin
  chosen_spanish: siguen pecando
  alternatives_spanish:
  - continúan pecando
  - añaden pecado
  lexicon: HALOT
  rationale: יסף con infinitivo expresa continuación o aumento; en español, 'siguen pecando' comunica de modo natural la acción continua sin perder el matiz de incremento.
- source_word: וַיַּעְשׂוּ לָהֶם מַסֵּכָה
  english_pob_choice: make for themselves cast images
  chosen_spanish: se hacen para sí imágenes fundidas
  alternatives_spanish:
  - se hacen para sí una imagen fundida
  - se hacen para sí ídolos fundidos
  lexicon: HALOT
  rationale: מַסֵּכָה alude a una imagen/molde fundido o vaciado. 'Imágenes fundidas' mantiene la referencia material y suena natural en español bíblico contemporáneo.
- source_word: מִכַּסְפָּם
  english_pob_choice: from their silver
  chosen_spanish: de su plata
  alternatives_spanish:
  - con su plata
  - a partir de su plata
  lexicon: HALOT
  rationale: מן indica origen o material; 'de su plata' preserva la idea de fabricación a partir de su propio metal precioso.
- source_word: כִּתְבוּנָם
  english_pob_choice: according to their own skill
  chosen_spanish: según su propio entendimiento
  alternatives_spanish:
  - según su propia habilidad
  - según su propia destreza
  lexicon: HALOT
  rationale: תבונה puede denotar entendimiento, discernimiento o habilidad. En este contexto de fabricación de ídolos, 'entendimiento' conserva mejor la ironía profética del juicio humano que se toma por sabiduría.
- source_word: עֲצַבִּים
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - imágenes
  - dolos
  lexicon: HALOT
  rationale: Término profético estable para objetos de culto falso; 'ídolos' explicita el valor religioso que ya sugiere מַסֵּכָה.
- source_word: מַעֲשֵׂה חָרָשִׁים כֻּלֹּה
  english_pob_choice: all of it the work of craftsmen
  chosen_spanish: obra enteramente de artesanos
  alternatives_spanish:
  - todo ello, obra de artesanos
  - toda ella, obra de artesanos
  lexicon: HALOT
  rationale: La frase subraya que el objeto es solo manufactura humana. 'Enteramente' reproduce el énfasis de כֻּלֹּה sin hacer la sintaxis pesada.
- source_word: לָהֶם הֵם אֹמְרִים
  english_pob_choice: Of them they say
  chosen_spanish: De ellos dicen
  alternatives_spanish:
  - Acerca de ellos dicen
  - De estas imágenes dicen
  lexicon: HALOT
  rationale: Introduce una cita difícil sobre los ídolos; la versión breve conserva la brusquedad del hebreo.
- source_word: זֹבְחֵי אָדָם
  english_pob_choice: Those who sacrifice men
  chosen_spanish: Los que sacrifican hombres
  alternatives_spanish:
  - los que sacrifican seres humanos
  - los sacrificadores de hombres
  lexicon: HALOT
  rationale: La lectura adoptada sigue la opción principal del expediente inglés y toma אָדָם como objeto directo. En español, 'hombres' mantiene la literalidad y la dureza de la frase.
- source_word: עֲגָלִים
  english_pob_choice: calves
  chosen_spanish: becerros
  alternatives_spanish:
  - terneros
  - becerros
  lexicon: HALOT
  rationale: En el contexto profético de Betel/Samaria, 'becerros' es el equivalente más natural y reconocible para los ídolos de becerro.
- source_word: יִשָּׁקֽוּן
  english_pob_choice: kiss
  chosen_spanish: besan
  alternatives_spanish:
  - besarán
  - besen
  lexicon: HALOT
  rationale: נשק significa 'besar'. El presente mantiene el tono proverbial/tauntivo de la cita y funciona bien en español.
theological_decisions:
- issue: Ambigüedad de זֹבְחֵי אָדָם עֲגָלִים יִשָּׁקוּן
  english_pob_reading: Those who sacrifice men kiss calves.
  chosen_spanish_reading: Los que sacrifican hombres besan becerros.
  alternative_spanish_readings:
  - Los que sacrifican seres humanos besan becerros.
  - Los sacrificadores de hombres besan becerros.
  rationale: El hebreo es comprimido y admite más de una segmentación. Se conserva la lectura que entiende אָדָם como objeto de 'sacrificar', porque refleja la revisión más reciente del expediente inglés y mantiene visible la violencia del oráculo sin suavizarla. La alternativa sigue siendo plausible y debe permanecer accesible para el lector.
  doctrine_reference: Preservar la tensión textual y no resolver artificialmente la ambigüedad.
- issue: Referencia de los 'becerros' como objetos de culto
  english_pob_reading: likely referring to the cult images associated with Bethel and Samaria
  chosen_spanish_reading: probablemente aludiendo a las imágenes de culto asociadas con Betel y Samaria
  alternative_spanish_readings:
  - probablemente los becerros de Betel y Samaria
  - aludiendo a los ídolos del culto norteño
  rationale: La imagen del becerro en Oseas tiene un trasfondo cultual concreto. Mantener la alusión evita una lectura genérica y conserva la carga polémica del profeta.
  doctrine_reference: Retener la referencia histórica y cultual cuando el texto la presupone.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del expediente inglés, que prefirió 'skill' para כִּתְבוּנָם en una fase intermedia pero volvió a 'understanding' en la decisión final, y que resolvió la cláusula final como 'Those who sacrifice men kiss calves!'. La versión española sigue esa decisión última y conserva la ambigüedad/aspereza del hebreo sin suavizarla.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino; aquí no aparece.
  - '''Ídolos'' se emplea como término profético, mientras que ''imágenes fundidas'' conserva el material concreto de מַסֵּכָה.'
  - '''Becerros'' se prefiere aquí por el trasfondo de culto norteño y por ser más idiomático que ''terneros'' en español bíblico.'
  - La puntuación de cita mantiene el tono oracular y la sintaxis abrupta del hebreo.
