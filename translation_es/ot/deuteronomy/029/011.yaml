translation:
  language: es
  text: para que entres en el pacto de Yahvé tu Dios, y en su juramento[a], que Yahvé tu Dios hace contigo hoy[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''y en su maldición jurada''; el término hebreo puede denotar un juramento que incluye sanciones o maldiciones del pacto.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'corta contigo hoy', un modismo hebreo para hacer un pacto.
    reason: cultural_note
lexical_decisions:
- source_word: לְעָבְרְךָ
  english_pob_choice: so that you may enter
  chosen_spanish: para que entres
  alternatives_spanish:
  - para que pases
  - para que pases a
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad o resultado en este contexto; en español, ‘para que entres’ comunica con naturalidad la idea de ingresar en una relación/pacto, sin volver literal una imagen espacial que aquí ya está figurada.
- source_word: בִּבְרִית
  english_pob_choice: into the covenant
  chosen_spanish: en el pacto
  alternatives_spanish:
  - dentro del pacto
  - en la alianza
  lexicon: HALOT
  rationale: ‘Pacto’ es la equivalencia principal de בְּרִית en este proyecto. Con ‘entres’ el español admite ‘en’ de manera natural, evitando una construcción forzada. Se conserva el sentido relacional y formal del término.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención española del proyecto para el Tetragrámaton: ‘Yahvé’. Mantiene el nombre divino propio en vez de sustituirlo por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: La forma posesiva singular es directa y se traduce con el posesivo de segunda persona singular ‘tu’. No requiere matiz especial en español.
- source_word: וּבְאָלָתוֹ
  english_pob_choice: and into his oath
  chosen_spanish: y en su juramento
  alternatives_spanish:
  - y en su maldición jurada
  - y en su juramento con sanción
  lexicon: HALOT
  rationale: אָלָה puede abarcar el juramento y su dimensión sancionadora. El texto principal usa ‘juramento’ por fluidez y por ser un equivalente amplio; se preserva la tensión semántica en la nota, sin resolverla de forma reductiva.
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  lexicon: HALOT
  rationale: La cláusula relativa se expresa de forma natural en español con ‘que’. Mantiene la relación directa con el pacto/juramento sin sobrecargar el estilo.
- source_word: כֹּרֵת
  english_pob_choice: is making
  chosen_spanish: corta
  alternatives_spanish:
  - está haciendo
  - está estableciendo
  lexicon: HALOT
  rationale: El hebreo usa la expresión idiomática ‘cortar un pacto’. En español se conserva el verbo ‘corta’ para mantener la imagen semítica y el valor auditivo de la fórmula, aunque resulte menos idiomático que ‘hace’.
- source_word: עִמְּךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con ustedes
  - con vosotros
  lexicon: HALOT
  rationale: La segunda persona singular se traduce con ‘contigo’, que es natural en el registro bíblico y comunica la relación personal del pacto.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: ‘Hoy’ es la equivalencia más natural en español contemporáneo y conserva la deixis temporal inmediata del texto.
theological_decisions:
- issue: Tetragrámaton en el texto principal
  english_pob_reading: Yahweh your God
  chosen_spanish_reading: Yahvé tu Dios
  alternative_spanish_readings:
  - Yahvé, tu Dios
  rationale: Se preserva el nombre propio divino según la convención del proyecto y no se sustituye por un título genérico. Esto mantiene la referencia pactal y la transparencia frente al hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'Áלָה: juramento con posible carga de sanción o maldición'
  english_pob_reading: and into his oath
  chosen_spanish_reading: y en su juramento
  alternative_spanish_readings:
  - y en su maldición jurada
  - y en su juramento con maldición
  rationale: El término hebreo puede incluir la dimensión de sanción o maldición vinculada al juramento. El texto principal conserva un término amplio (‘juramento’) y la nota permite no perder la tensión lexical/theological del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve theological tension)
- issue: Idiomatismo hebreo de כרת ברית
  english_pob_reading: is making (a covenant)
  chosen_spanish_reading: corta
  alternative_spanish_readings:
  - hace
  - establece
  rationale: Aunque ‘corta’ es menos idiomático en español, conserva la metáfora semítica central de ‘cortar un pacto’, importante para la auditabilidad y la relación con el original.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (source transparency)
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no hubo cambios necesarios en el texto fuente inglés y el griego/hebreo relevante no presenta conflictos textuales en este versículo; se ha mantenido la tensión semántica de אָלָה y la metáfora de כרת ברית en español.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה.
  - Se usa ‘pacto’ para בְּרִית conforme al estándar del proyecto.
  - Se conserva ‘juramento’ como traducción principal de אָלָה, con nota para la posible carga de sanción.
  - Se mantiene el verbo ‘corta’ para reflejar el modismo hebreo, aun cuando el español natural preferiría ‘hace’ o ‘establece’.
