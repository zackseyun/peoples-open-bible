  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Otros dioses», «servirles», «postrarse ante ellos» y «no les haré daño» siguen bien las decisiones del POB. No aparece el nombre divino en este versículo. La distinción entre עבד y השתחוה se preserva correctamente.
