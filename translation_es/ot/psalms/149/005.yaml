revisions:
- from: Que los fieles exulten en gloria[a][c][b]; que canten de gozo sobre sus lechos.
  to: Que los fieles[a] se regocijen en gloria[b]; que canten con gozo sobre sus lechos[c].
  rationale: La revisión mantiene fielmente el hebreo y las decisiones del POB, pero mejora la naturalidad del español. «Se regocijen» comunica mejor el júbilo exhortativo de יַעְלְזוּ en español general que «exulten», y «canten con gozo» evita un giro algo calcado. También se reordenaron los marcadores de nota para corresponder de manera clara y secuencial a sus anclajes textuales.
