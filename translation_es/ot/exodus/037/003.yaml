translation:
  language: es
  text: Hizo para él cuatro anillos de oro en sus cuatro apoyos[a], con dos anillos en un lado y dos anillos en el otro lado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus cuatro pies», «sus cuatro esquinas» o «sus cuatro soportes»; el término hebreo puede referirse a pies o a puntos/extremidades inferiores de apoyo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en su un lado ... en su segundo lado»; es decir, dos anillos en cada lado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצֹק
  english_pob_choice: He cast
  chosen_spanish: fundió
  alternatives_spanish:
  - vertió
  - moldeó
  - fundió en molde
  lexicon: HALOT
  rationale: En contexto de metalurgia, יצק se refiere a trabajar metal fundido. En español, «fundió» comunica con naturalidad la idea de dar forma al oro fundido; «vertió» sería menos preciso y «moldeó» desplaza el foco del acto de fundición.
- source_word: ל֗וֹ
  english_pob_choice: for it
  chosen_spanish: para ello
  alternatives_spanish:
  - para él
  - para eso
  lexicon: HALOT
  rationale: El sufijo pronominal se refiere al objeto descrito en el contexto. En español, «para ello» mantiene la referencia impersonal y evita imponer género a un objeto inanimado.
- source_word: טַבְּעֹ֣ת זָהָ֔ב
  english_pob_choice: rings of gold
  chosen_spanish: anillos de oro
  alternatives_spanish:
  - aros de oro
  - anillos dorados
  lexicon: HALOT
  rationale: «Anillos de oro» reproduce con naturalidad la construcción de sustantivo + material. «Aros» es posible, pero «anillos» es más transparente para el mobiliario del tabernáculo.
- source_word: פַּעֲמֹתָיו
  english_pob_choice: its four feet
  chosen_spanish: sus cuatro apoyos
  alternatives_spanish:
  - sus cuatro pies
  - sus cuatro esquinas
  - sus cuatro soportes
  lexicon: HALOT
  rationale: La evidencia léxica admite «pies», «esquinas» o «soportes»; en este contexto de mobiliario sagrado, «apoyos» conserva la idea de puntos inferiores de sostén sin cerrar prematuramente la ambigüedad entre pies físicos y extremos de apoyo. Esto preserva la tensión documentada en el POB inglés.
- source_word: צַלְעוֹ
  english_pob_choice: its side
  chosen_spanish: un lado / el otro lado
  alternatives_spanish:
  - su lado
  - su flanco
  lexicon: HALOT
  rationale: «צלע» en descripciones arquitectónicas y de objetos significa «lado». En español, la repetición distributiva «un lado ... el otro lado» es natural y evita el calco pesado de «su uno lado / su segundo lado».
- source_word: הָאֶחָת
  english_pob_choice: its one side
  chosen_spanish: un lado
  alternatives_spanish:
  - el primer lado
  - el lado uno
  lexicon: HALOT
  rationale: El hebreo distingue el primero de dos lados. El español idiomático expresa esta relación con «un lado»; el valor ordinal queda implicado por el paralelo con «el otro lado».
- source_word: הַשֵּׁנִית
  english_pob_choice: its second side
  chosen_spanish: el otro lado
  alternatives_spanish:
  - su segundo lado
  - el segundo lado
  lexicon: HALOT
  rationale: La revisión inglesa ya resolvió la literalidad pesada de «second side» hacia «the other side». En español, «el otro lado» transmite el mismo sentido distributivo con mayor naturalidad.
translation_notes:
  revision_awareness: 'El POB inglés resolvió la secuencia final más pesada de forma idiomática: de «on its one side ... on its second side» a «on one side ... on the other side». La presente versión sigue esa decisión en español, manteniendo la distribución de dos anillos por lado y conservando la ambigüedad lexical de פַּעֲמֹתָיו con una nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - Se traduce el metalworking de יצק con un verbo de fundición, no con un verbo general de vertido.
  - Se evita «SEÑOR» y se preserva la materialidad del objeto con pronombres neutros como «ello».
  - La alternancia «un lado / el otro lado» refleja la lectura distributiva del hebreo y la revisión inglesa aprobada.
