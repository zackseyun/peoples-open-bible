translation:
  language: es
  text: 'Entonces David dijo[a]: «Esta es la casa de Yahvé Dios, y este es el altar para holocausto[b] para Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «Este es el templo de Yahvé Dios». El hebreo dice literalmente: «la casa de Yahvé Dios».'
    reason: alternative_reading
  - marker: b
    text: O, «para holocaustos para Israel». El singular hebreo «holocausto» puede entenderse de manera genérica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces ... dijo» conserva esa secuencia con fluidez natural en español.
- source_word: דָּוִיד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: HALOT
  rationale: Nombre propio estándar sin necesidad de adaptación.
- source_word: זֶה הוּא
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Aquí está
  - Este mismo es
  lexicon: HALOT
  rationale: La construcción enfática demostrativa + pronombre se refleja con «Este es», manteniendo la identificación directa sin añadir interpretación.
- source_word: בֵּית
  english_pob_choice: the house of
  chosen_spanish: la casa de
  alternatives_spanish:
  - el templo de
  lexicon: HALOT
  rationale: «Casa» reproduce el sustantivo hebreo de forma más directa que «templo», que ya interpreta el referente arquitectónico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, preservando el nombre divino personal y no sustituyéndolo por un título.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: En aposición al nombre divino, «Dios» es la forma natural y fiel en español; el hebreo permite la lectura «Yahvé Dios».
- source_word: מִּזְבֵּחַ
  english_pob_choice: altar
  chosen_spanish: altar
  lexicon: HALOT
  rationale: Término sacrificial estándar en español.
- source_word: לְעֹלָה
  english_pob_choice: for burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - para la ofrenda quemada
  - para el holocausto
  lexicon: HALOT
  rationale: En español bíblico, «holocausto» comunica la ofrenda totalmente quemada con mayor precisión y concisión que un calco menos idiomático. El singular hebreo puede entenderse genéricamente.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: for Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - para el pueblo de Israel
  - de Israel
  lexicon: HALOT
  rationale: «Para Israel» conserva la relación/propósito marcada por la preposición hebrea sin expansión innecesaria.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: La política del proyecto exige transliterar el Nombre divino en lugar de ocultarlo con «SEÑOR». «Yahvé» mantiene la referencia al nombre pactal de Dios y funciona bien en español bíblico contemporáneo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre בֵּית יְהוָה הָאֱלֹהִים y «templo»
  english_pob_reading: the house of Yahweh God
  chosen_spanish_reading: la casa de Yahvé Dios
  alternative_spanish_readings:
  - el templo de Yahvé Dios
  rationale: Se preserva la metáfora literal de «casa» porque el hebreo la usa explícitamente; «templo» sería más interpretativo, aunque válido como equivalencia contextual.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy over translation tradition'
- issue: Sentido de לְעֹלָה
  english_pob_reading: for burnt offering
  chosen_spanish_reading: para holocausto
  alternative_spanish_readings:
  - para holocausto[s]
  - para la ofrenda quemada
  rationale: «Holocausto» expresa la ofrenda completamente quemada y es un término bíblico reconocible en español. El singular puede leerse genéricamente, como en el inglés POB.
  doctrine_reference: HALOT / uso sacrificial del término עֹלָה
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio y el cotejo cruzado mostró alto acuerdo; por eso se conserva la lectura principal alineada con el texto hebreo y con la decisión inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «casa» en la línea principal y se reserva «templo» para la nota alternativa, en consonancia con la primacía del hebreo.
  - «Holocausto» traduce עֹלָה con valor sacrificial; la nota preserva la posible lectura genérica del singular.
  - La puntuación española emplea comillas angulares para el discurso directo y coloca los marcadores de nota donde corresponde.
