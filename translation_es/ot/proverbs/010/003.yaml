translation:
  language: es
  text: Yahvé no dejará pasar hambre al justo, pero frustra el anhelo[a] de los malvados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la ruina de los malvados» / «el deseo de los malvados». El hebreo puede entenderse como «anhelo/deseo» o como «ruina/calamidad».'
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא
  english_pob_choice: will not
  chosen_spanish: no dejará
  alternatives_spanish:
  - no deja
  - no dejará de
  lexicon: HALOT
  rationale: En un proverbio, el yiqtol expresa una afirmación general con valor futuro o habitual; «no dejará» comunica bien la negación sin forzar una lectura meramente puntual.
- source_word: יַרְעִיב
  english_pob_choice: let ... go hungry
  chosen_spanish: pasar hambre
  alternatives_spanish:
  - hacer pasar hambre
  - dejar con hambre
  - hambrear
  lexicon: HALOT
  rationale: El hiphil de רעב es causativo. «Pasar hambre» es una forma natural en español que conserva la idea de sufrir hambre sin intensificarla a «hambrear» o «matar de hambre».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto para YHWH, en vez de sustituirlo por un título.
- source_word: נֶפֶשׁ
  english_pob_choice: person
  chosen_spanish: el justo
  alternatives_spanish:
  - la persona justa
  - el alma del justo
  - la vida del justo
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ se refiere al ser humano concreto en su totalidad. En español, «el justo» reproduce de forma concisa y natural la sustantivación del adjetivo sin introducir una antropología ajena al contexto.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - los justos
  - la persona justa
  - el hombre justo
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. «El justo» es una equivalencia directa y suficientemente general para el proverbio.
- source_word: הַוַּת
  english_pob_choice: the craving
  chosen_spanish: el anhelo
  alternatives_spanish:
  - el deseo
  - la avidez
  - la ruina
  lexicon: HALOT
  rationale: El paralelismo con «hambre» favorece una lectura de deseo/apetito frustrado. «Anhelo» mantiene esa tensión y deja abierta la alternativa de «ruina» que la nota documenta.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  - los culpables
  lexicon: HALOT
  rationale: «Los malvados» es natural en español y conserva el sentido moral fuerte del plural sustantivado.
- source_word: יֶהְדֹּף
  english_pob_choice: he thwarts
  chosen_spanish: frustra
  alternatives_spanish:
  - rechaza
  - ahuyenta
  - repela
  lexicon: HALOT
  rationale: El verbo expresa empujar/repeler, y en este contexto la idea es impedir o desbaratar el deseo de los impíos. «Frustra» capta bien ese efecto causativo en español actual.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El hebreo usa יְהוָה directamente. La forma española del proyecto es «Yahvé», preservando el nombre propio de Dios en lugar de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé'
- issue: Sentido de נֶפֶשׁ en la sabiduría
  english_pob_reading: person
  chosen_spanish_reading: el justo
  alternative_spanish_readings:
  - la persona justa
  - el alma del justo
  - la vida del justo
  rationale: No se impone una lectura técnica de «alma». El proverbio habla del justo como sujeto íntegro de la provisión divina; «el justo» conserva la amplitud semítica sin sobreexplicar.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Sentido de הַוַּת רְשָׁעִים
  english_pob_reading: the craving of the wicked
  chosen_spanish_reading: el anhelo de los malvados
  alternative_spanish_readings:
  - el deseo de los malvados
  - la ruina de los malvados
  - la avidez de los malvados
  rationale: La antítesis con «hambre» favorece entender el sustantivo como deseo frustrado. Se conserva, sin embargo, la posibilidad alternativa de «ruina» en la nota para no borrar la ambigüedad documentada.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La revisión auditada del inglés pasó de «The LORD will not let the righteous person go hungry, but he drives away the craving of the wicked» a una redacción más breve y directa: «Yahweh will not let the righteous go hungry, but he thwarts the craving of the wicked». La presente versión española sigue esa línea revisada, evita añadir «persona» de forma innecesaria, y mantiene la tensión léxica de הַוַּת con una nota alternativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - «El justo» funciona como sustantivación natural de צַדִּיק y evita un calco innecesario.
  - «Frustra» mantiene el valor de repeler/impedir de יֶהְדֹּף en un español claro y publicable.
  - La nota conserva la alternativa «ruina/calamidad» para no borrar la ambigüedad lexical del hebreo.
