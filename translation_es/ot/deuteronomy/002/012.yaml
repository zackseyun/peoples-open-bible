base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/002/012.yaml
  text: And in Seir the Horites formerly lived[a], but the sons of Esau dispossessed them and destroyed them from before them, and settled in their place, just as Israel did to the land of his possession[c][b], which Yahweh gave to them.
  footnotes:
  - marker: a
    text: Or 'drove them out.' The Hebrew verb can denote taking possession by dispossessing prior inhabitants.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from before them,' an idiom meaning they removed them from their presence.
    reason: lexical_alternative
  - marker: c
    text: Or 'to the land of his inheritance.'
    reason: lexical_alternative
