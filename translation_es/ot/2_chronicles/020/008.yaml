translation:
  language: es
  text: 'Y vivieron en ella,[a] y edificaron para ti en ella un santuario para tu nombre,[b] diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «moraron en ella» o «se establecieron en ella».
    reason: lexical_alternative
  - marker: b
    text: «Santuario para tu nombre» alude a un lugar santo dedicado al nombre de Yahvé, es decir, a su presencia revelada y a su honor.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: they lived
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - se establecieron
  - moraron
  lexicon: HALOT
  rationale: El hebreo ישׁב aquí expresa residencia/establecimiento en la tierra. En español, «habitaron» conserva el sentido de residir sin sonar tan coloquial como «vivieron» ni tan específico de asentamiento inicial como «se establecieron».
- source_word: בָהּ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en eso
  - allí
  - en ella misma
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a la tierra. En español, «en ella» es la referencia natural y mantiene el antecedente implícito sin personificarla excesivamente.
- source_word: וַיִּבְנוּ
  english_pob_choice: built
  chosen_spanish: edificaron
  alternatives_spanish:
  - construyeron
  - levantaron
  lexicon: HALOT
  rationale: «Edificaron» reproduce bien el acto de construir una estructura sagrada y encaja con un registro bíblico digno. «Construyeron» es correcto, pero algo más general; «levantaron» enfatiza menos la obra terminada.
- source_word: לְךָ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - a ti
  - en tu honor
  lexicon: HALOT
  rationale: La preposición lamed expresa destino/dedicación. «Para ti» comunica mejor esa dedicación que «a ti», que podría sonar como dirección o destinatario inmediato.
- source_word: מִקְדָּשׁ
  english_pob_choice: a sanctuary
  chosen_spanish: un santuario
  alternatives_spanish:
  - un lugar santo
  - un templo
  lexicon: HALOT
  rationale: «Santuario» conserva el valor de lugar santo dedicado a Dios y evita reducir el término a una institución fija como «templo», aunque el referente concreto sea el templo.
- source_word: לְשִׁמְךָ
  english_pob_choice: for your name
  chosen_spanish: para tu nombre
  alternatives_spanish:
  - en tu nombre
  - para la honra de tu nombre
  - para tu fama
  lexicon: HALOT
  rationale: La expresión bíblica apunta a dedicación al nombre revelado de Dios, con su presencia y honor. «Para tu nombre» es la versión más directa y mantiene la tensión bíblica sin interpretarla en exceso.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: «Diciendo» conserva la fórmula introductoria del discurso siguiente y sigue de cerca la construcción hebrea.
theological_decisions:
- issue: Sentido de «un santuario para tu nombre»
  english_pob_reading: A sanctuary dedicated to God's name/presence
  chosen_spanish_reading: Un santuario dedicado al nombre de Dios, es decir, a su presencia revelada y a su honor
  alternative_spanish_readings:
  - Un templo para tu honor
  - Un lugar santo que lleva tu nombre
  rationale: La frase no sugiere que Dios quede contenido espacialmente, sino que el lugar queda consagrado a su nombre. «Para tu nombre» preserva la referencia bíblica a la presencia, reputación y honra divinas sin resolver la tensión teológica de forma excesiva.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo estable en la última revisión y no presenta cambios aplicados; la formulación española sigue de cerca la lectura aprobada, ajustando solo la naturalidad del español y preservando la tensión teológica de la expresión «para tu nombre».
  spanish_consistency_notes:
  - Se mantiene «santuario» para מִקְדָּשׁ en lugar de «templo», por consistencia con la decisión léxica inglesa y para no estrechar el campo semántico.
  - Se usa «Yahvé» en la explicación de la nota, pero el texto base del versículo aquí no nombra explícitamente al Tetragrámaton; la dedicatoria se entiende en referencia al Dios de Israel.
  - La puntuación con dos puntos después de «diciendo» prepara la cita siguiente y es natural en español bíblico contemporáneo.
