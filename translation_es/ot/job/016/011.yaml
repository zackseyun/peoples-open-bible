translation:
  language: es
  text: Dios me entrega al impío[a] y me arroja a manos de los malvados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me entrega al irreligioso».'
    reason: lexical_alternative
  - marker: b
    text: El verbo final es difícil; también puede entenderse como «me lanza» o «me echa» a manos de los malvados.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַסְגִּירֵנִי
  english_pob_choice: hands me over
  chosen_spanish: me entrega
  alternatives_spanish:
  - me entrega en manos de
  - me pone en poder de
  - me entrega a
  lexicon: HALOT
  rationale: El verbo hifil de סגר expresa entregar a alguien al poder de otro. En español, «me entrega» comunica bien esa acción hostil y judicial sin forzar una perífrasis demasiado pesada.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios fuerte
  - el Poderoso
  lexicon: HALOT
  rationale: Aquí אֵל funciona como nombre/título divino en el discurso de Job; «Dios» es la forma más clara y natural en español para conservar ese valor referencial.
- source_word: עֲוִיל
  english_pob_choice: the ungodly
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el irreligioso
  - el incrédulo
  lexicon: HALOT
  rationale: El término designa a una persona moral y religiosamente perversa, no simplemente a alguien poco sensato. «Impío» preserva mejor esa carga teológica que «fool» o una mera idea de torpeza.
- source_word: וְעַל יְדֵי
  english_pob_choice: into the hands of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en poder de
  - por mano de
  - a manos de
  lexicon: HALOT
  rationale: La expresión idiomática con «manos» comunica la idea de quedar bajo el control o la violencia de otros. «En manos de» es natural en español y mantiene la metáfora.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  - los perversos hombres
  lexicon: HALOT
  rationale: רְשָׁעִים es un plural moral estándar. «Malvados» conserva el carácter ético negativo y encaja bien con el paralelismo del verso.
- source_word: יִרְטֵנִי
  english_pob_choice: throws me into the hands of the wicked
  chosen_spanish: me arroja en manos de los malvados
  alternatives_spanish:
  - me lanza en manos de los malvados
  - me echa en manos de los malvados
  - me tira en manos de los malvados
  lexicon: HALOT
  rationale: El verbo final es difícil y connota un movimiento violento de arrojar/lanzar. «Me arroja» conserva esa fuerza sin especificar más de lo que el hebreo permite.
theological_decisions:
- issue: Referencia de אֵל en el lamento de Job
  english_pob_reading: God is the one who hands him over to the ungodly.
  chosen_spanish_reading: Dios es quien me entrega al impío.
  alternative_spanish_readings:
  - Un poderoso me entrega al impío
  - el Poderoso me entrega al impío
  rationale: En Job, אֵל normalmente remite a Dios, y el contexto del lamento apunta a que el propio Dios es el agente de la entrega. Esa lectura mantiene la fuerza teológica del reclamo de Job sin imponer una glosa innecesaria.
  doctrine_reference: Job 16:11; uso contextual de אֵל en Job
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «casts me» a «throws me» para reflejar con más precisión la fuerza del verbo final. La redacción española «me arroja» sigue esa revisión y preserva el matiz violento sin exceder la ambigüedad del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל según el contexto de Job y la auditoría inglesa.
  - Se usa «impío» para עֲוִיל por su carga moral-religiosa, no por simple necedad.
  - Se conserva la metáfora de las «manos» para la expresión idiomática de poder o control.
  - Se evita «SEÑOR» porque el texto hebreo no usa el tetragrámaton aquí.
