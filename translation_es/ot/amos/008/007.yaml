translation:
  language: es
  text: 'Yahvé ha jurado por la soberbia de Jacob[a]: «Ciertamente no olvidaré jamás ninguno de sus hechos[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «por la gloria de Jacob» o «por la excelencia de Jacob». La expresión hebrea puede referirse irónicamente a aquello en que Jacob se gloría, o posiblemente a Dios como la verdadera gloria de Jacob.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «si olvido para siempre alguno de sus hechos»; es una fórmula de juramento que significa «ciertamente no olvidaré jamás ninguno de sus hechos».
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁבַּע
  english_pob_choice: has sworn
  chosen_spanish: ha jurado
  alternatives_spanish:
  - jura
  - ha hecho un juramento
  lexicon: HALOT
  rationale: El nifal de שׁבע expresa la fórmula solemne de juramento. En español, «ha jurado» comunica con naturalidad el acto solemne ya pronunciado, manteniendo el valor perfecto del hebreo y el tono profético.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio según la convención del proyecto. «Yahvé» reproduce el Tetragrámaton sin sustituirlo por un título, y es publicable en español bíblico contemporáneo.
- source_word: בִּגְאוֹן
  english_pob_choice: by the pride of
  chosen_spanish: por la soberbia de
  alternatives_spanish:
  - por la gloria de
  - por la excelencia de
  - por la majestad de
  lexicon: HALOT
  rationale: «Soberbia» conserva el campo semántico de גָּאוֹן cuando puede denotar orgullo/exaltación, y en este contexto mantiene la posible ironía del hebreo. En español también permite oír la tensión entre autoexaltación humana y gloria verdadera, sin resolverla prematuramente.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Se conserva el nombre propio «Jacob», como en el texto hebreo y en el audit trail inglés, porque funciona aquí como nombre pactual de la nación.
- source_word: אִם
  english_pob_choice: Surely
  chosen_spanish: ¡Ciertamente
  alternatives_spanish:
  - si
  - de veras
  lexicon: HALOT
  rationale: Después de una fórmula de juramento, אִם introduce una construcción elíptica que no debe traducirse de forma literal como condicional. «¡Ciertamente» transmite en español la fuerza enfática e idiomática del juramento.
- source_word: אֶשְׁכַּח
  english_pob_choice: I will forget
  chosen_spanish: olvidaré
  alternatives_spanish:
  - me olvidaré
  - dejaré de recordar
  lexicon: HALOT
  rationale: El verbo en primera persona se integra naturalmente en la fórmula del juramento. En español, «olvidaré» comunica con claridad la acción negada por la expresión juramentaria.
- source_word: לָנֶצַח
  english_pob_choice: never
  chosen_spanish: para siempre
  alternatives_spanish:
  - jamás
  - eternamente
  lexicon: HALOT
  rationale: Aunque literalmente significa «para perpetuidad/para siempre», en español la negación con «olvidaré» admite bien esta forma. Se preserva así la amplitud temporal del hebreo sin endurecerlo innecesariamente con un adverbio más absoluto.
- source_word: כָּל
  english_pob_choice: any
  chosen_spanish: ninguno de
  alternatives_spanish:
  - ningún
  - cada uno de
  lexicon: HALOT
  rationale: El hebreo distributivo bajo negación requiere una equivalencia idiomática en español. «Ninguno de sus hechos» expresa mejor la totalidad negativa que un literal «todo».
- source_word: מַעֲשֵׂיהֶם
  english_pob_choice: their deeds
  chosen_spanish: sus hechos
  alternatives_spanish:
  - sus acciones
  - sus obras
  lexicon: HALOT
  rationale: «Hechos» es un equivalente natural de מַעֲשֶׂה y evita el posible matiz técnico o doctrinal de «obras». En un contexto de juicio, mantiene el peso moral del término sin sobreinterpretarlo.
theological_decisions:
- issue: Sentido de «la soberbia de Jacob»
  english_pob_reading: Retain the phrase 'the pride of Jacob' without interpretive expansion.
  chosen_spanish_reading: Retener «la soberbia de Jacob» sin explicarla dentro del texto.
  alternative_spanish_readings:
  - la gloria de Jacob
  - la excelencia de Jacob
  - la majestad de Jacob
  - la gloria de Dios de Jacob
  rationale: 'El hebreo admite ambigüedad: puede aludir al orgullo de Jacob, a su exaltación o incluso, según algunos intérpretes, a Dios como verdadera gloria de Jacob. La traducción conserva esa tensión al no resolverla en el cuerpo del texto. La nota en la edición española puede orientar al lector sin borrar la ambigüedad original.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue el último estado estable del audit trail, sin revisiones posteriores; se conserva la alta concordancia entre los controles y la decisión de no suavizar la ambigüedad de גָּאוֹן.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יהוה en el texto principal, conforme a la política del proyecto.
  - Se traduce אִם en contexto juramentario con una equivalencia idiomática («Ciertamente») en vez de una condicional literal.
  - Se conserva la tensión léxica de גָּאוֹן mediante «soberbia», con nota de alternativas legítimas en la nota a.
  - El distributivo hebreo bajo negación se vierte de manera natural en español con «ninguno de».
