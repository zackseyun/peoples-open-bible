review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: mantiene la pregunta retórica, «nombre», «clan», «hijo» y «hermanos». Sin embargo, «se disminuiría» suena poco natural para יִגָּרַע en este contexto; una forma como «quedaría disminuido» preserva mejor la idea de merma/pérdida del nombre dentro del clan. También la puntuación con coma antes de «porque» entorpece la lectura.'
  spanish_quality_summary: El texto es mayormente claro, pero «¿Por qué se disminuiría el nombre…?» resulta algo forzado en español. «Quedaría disminuido» o «sería disminuido» es más idiomático. «Danos una herencia» es legible, pero el inglés auditado y la nota cultural apuntan más específicamente a una posesión/propiedad territorial; «una posesión» suena legal y encaja mejor con אֲחֻזָּה, evitando que «herencia» sugiera solo el acto sucesorio.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. Se preservan correctamente «hijo» y «hermanos». La mejora principal es alinear אֲחֻזָּה con «posesión» según la decisión léxica auditada, apoyada por nota cultural.
  issues:
  - severity: medium
    issue: «se disminuiría» es poco idiomático en español para el nombre del padre
    rationale: Aunque refleja literalmente «be diminished», en español suena torpe. «quedaría disminuido» conserva la idea de merma sin perder fidelidad.
  - severity: low
    issue: Coma innecesaria antes de «porque»
    rationale: 'La pregunta fluye mejor sin esa pausa: «…de entre su clan porque no tiene hijo?».'
  - severity: medium
    issue: «herencia» estrecha o desplaza el sentido de אֲחֻזָּה
    rationale: El contexto es una porción territorial o posesión dentro del clan. «Posesión» refleja mejor la decisión auditada y la nota cultural puede aclarar el sentido de lote/inheritance allotment.
  revised_spanish_text: ¿Por qué quedaría disminuido el nombre de nuestro padre de entre su clan porque no tiene hijo? Danos una posesión[a][b] entre los hermanos de nuestro padre.
  revised_footnotes:
  - marker: a
    text: O «sería disminuido» o «se quitaría». El hebreo pregunta por la pérdida del «nombre» del padre dentro de su clan.
    reason: lexical_alternative
  - marker: b
    text: «Posesión» aquí se refiere a una propiedad territorial o lote de herencia asignado dentro del clan.
    reason: cultural_note
  revision_rationale: Se ajustó el verbo principal para un español más natural y fiel al matiz de merma de יִגָּרַע, se eliminó una coma innecesaria, y se cambió «herencia» por «posesión» para reflejar mejor אֲחֻזָּה según la auditoría inglesa y el contexto legal-territorial.
