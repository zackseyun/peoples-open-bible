translation:
  language: es
  text: Mis amigos son mis escarnecedores[a]; mi ojo derrama lágrimas a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis mediadores / mis intercesores»; el hebreo מְלִיצַי ha sido entendido por algunos en un sentido más positivo, pero en este contexto el sentido adversarial de «escarnecedores» encaja mejor con la queja de Job.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְלִיצַי
  english_pob_choice: my mockers
  chosen_spanish: mis escarnecedores
  alternatives_spanish:
  - mis burladores
  - mis mofadores
  - mis mediadores
  - mis intérpretes
  lexicon: HALOT
  rationale: El término hebreo puede relacionarse con la burla o el escarnio; en este contexto de lamento de Job, la lectura adversarial encaja mejor que la positiva. En español, «escarnecedores» comunica con fuerza esa hostilidad y mantiene el tono poético. Se conserva la alternativa de sentido mediador en nota, porque el hebreo ha sido entendido así por algunos.
- source_word: רֵעָי
  english_pob_choice: my friends
  chosen_spanish: mis amigos
  alternatives_spanish:
  - mis compañeros
  - mis allegados
  lexicon: HALOT
  rationale: 'רֵעַ significa con naturalidad «amigo» o «compañero». «Mis amigos» reproduce bien la ironía del verso: quienes deberían ser aliados resultan ser quienes lo escarnecen.'
- source_word: אֶל אֱלוֹהַ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - hacia Dios
  - para Dios
  lexicon: HALOT
  rationale: אֶל indica dirección hacia. En español, «a Dios» conserva esa dirección de manera idiomática y fiel; «hacia Dios» sería posible, pero más marcado y menos natural en este contexto poético.
- source_word: דָּלְפָה
  english_pob_choice: pours out tears
  chosen_spanish: derrama lágrimas
  alternatives_spanish:
  - chorrea
  - gotea
  - llora
  lexicon: HALOT
  rationale: El verbo literalmente sugiere gotear o escurrir. Con «mi ojo» como sujeto, «derrama lágrimas» mantiene la imagen de flujo continuo sin volver el español demasiado mecánico. «Llora» sería más general, pero perdería parte del matiz imagístico.
- source_word: עֵינִי
  english_pob_choice: my eye
  chosen_spanish: mi ojo
  alternatives_spanish:
  - mis ojos
  lexicon: HALOT
  rationale: El hebreo está en singular; se conserva el singular para respetar el efecto vívido del poema y la imagen concreta del llanto.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de Job 16:20 y la decisión léxica del POB en inglés. No se introdujeron revisiones textuales; se preservó la ambigüedad documentada para מְלִיצַי en una nota.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלוֹהַ en consonancia con el valor del sustantivo singular en Job.
  - Se mantuvo el singular «mi ojo» para respetar la imagen poética del original.
  - «Escarnecedores» se eligió como equivalente natural y fuerte para el contexto de reproche, sin neutralizar la tensión entre amistad y hostilidad.
