translation:
  language: es
  text: De fuerza en fuerza[a], como un cauce perenne[c], y de un cauce poderoso[b], con un estruendo de sonidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice: «La riqueza de los injustos se secará como un río, y resonará como un gran trueno en la lluvia». Esto refleja una forma textual marcadamente distinta del hebreo conservado.'
    reason: alternative_reading
  - marker: b
    text: El texto hebreo de esta línea es difícil, y el fragmento de Masada para este versículo está demasiado incompleto para fijar el texto con seguridad; la traducción sigue el hebreo de la Guenizá del Cairo, manteniendo a la vista el paralelo griego.
    reason: textual_variant
  - marker: c
    text: O «un torrente siempre caudaloso». El hebreo נחל suele referirse a un cauce o torrente estacional, y איתן sugiere un flujo duradero o permanente.
    reason: lexical_alternative
lexical_decisions:
- source_word: מחיל אל חיל
  english_pob_choice: from force to force
  chosen_spanish: de fuerza en fuerza
  alternatives_spanish:
  - de poder en poder
  - de fuerza en fuerza
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y el inglés POB opta por conservar la idea de impulso o vigor acumulado. En español, 'de fuerza en fuerza' mantiene la repetición y el movimiento ascendente sin forzar una lectura como 'ejércitos' o 'riquezas', que pertenecen a otras posibilidades léxicas pero no a la decisión principal del POB.
- source_word: נחל איתן
  english_pob_choice: a perennial wadi
  chosen_spanish: un cauce perenne
  alternatives_spanish:
  - un torrente perenne
  - un arroyo perenne
  - un cauce siempre caudaloso
  lexicon: HALOT
  rationale: '''Wadi'' no es de uso natural en español bíblico amplio; ''cauce perenne'' preserva la imagen topográfica de lecho/cauce y la cualidad de flujo duradero que el POB quiso conservar con ''perennial wadi''.'
- source_word: אפיק אדיר
  english_pob_choice: a mighty channel
  chosen_spanish: un canal poderoso
  alternatives_spanish:
  - un cauce poderoso
  - un lecho poderoso
  - un canal majestuoso
  lexicon: HALOT
  rationale: אפיק designa un canal, lecho o cauce; 'canal poderoso' conserva la imagen concreta y la fuerza del adjetivo אדיר. Se evita 'río' para no borrar la especificidad del término hebreo.
- source_word: בחזיז קולות
  english_pob_choice: with a crash of sounds
  chosen_spanish: con un estruendo de voces
  alternatives_spanish:
  - con un estruendo de sonidos
  - con un fragor de truenos
  - con un golpe de voces
  lexicon: HALOT
  rationale: La locución es rara y oscura; קולות puede significar voces, sonidos o truenos. 'Estruendo de voces' conserva la amplitud semántica y el carácter auditivo violento sin imponer de manera total la lectura del paralelo griego.
theological_decisions:
- issue: Desacuerdo textual entre el hebreo transmitido y el paralelo griego
  english_pob_reading: The Hebrew text of this line is difficult... the translation follows the Cairo Geniza Hebrew while keeping the Greek parallel in view.
  chosen_spanish_reading: El texto hebreo difícil se sigue en la línea principal, y el paralelo griego queda señalado como lectura alternativa.
  alternative_spanish_readings:
  - 'Una traducción basada principalmente en el griego: ''La riqueza de los injustos se secará como un río, y resonará como un gran trueno en la lluvia.'''
  rationale: El POB documenta que el griego refleja una forma textual marcadamente distinta. La línea principal en español debe seguir el hebreo de Kahana, pero la nota debe preservar la tensión textual en lugar de ocultarla.
  doctrine_reference: Crítica textual / variante textual
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó el punto y coma para hacer la frase más natural, sin cambiar el contenido ni el registro. En español se refleja con una coordinación fluida: ''..., y ...''.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque no aparece el Tetragrámaton en este versículo.
  - No se introdujo 'Cristo/Mesías' ni vocabulario doctrinal ajeno al texto.
  - Se mantuvo un registro bíblico moderno y digno, con sintaxis española natural.
  - Las notas preservan la tensión entre el hebreo transmitido y el paralelo griego sin fusionarlos.
