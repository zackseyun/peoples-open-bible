translation:
  language: es
  text: Y he aquí[a], aunque está plantada, ¿prosperará? ¿No se secará[b] del todo cuando la toque el viento del oriente[c]? Se secará en los canteros donde creció[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡mira!». El hebreo usa un marcador de atención que introduce la aplicación de la imagen.
    reason: alternative_reading
  - marker: b
    text: O «se secará por completo» / «se secará del todo». El hebreo usa un infinitivo absoluto con el verbo finito para intensificar la acción.
    reason: lexical_alternative
  - marker: c
    text: «Viento del oriente» se refiere al viento cálido y destructor que viene del desierto oriental, una imagen común de juicio que marchita.
    reason: cultural_note
  - marker: d
    text: O «en los lechos de su crecimiento». La expresión hebrea se refiere a las parcelas cultivadas donde la planta había crecido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y behold
  lexicon: n/a
  rationale: Como marcador discursivo de atención, «he aquí» conserva el tono solemne y deíctico del hebreo sin sonar forzado en español bíblico contemporáneo.
- source_word: שְׁתוּלָה
  english_pob_choice: planted
  chosen_spanish: plantada
  alternatives_spanish:
  - trasplantada
  - puesta
  lexicon: n/a
  rationale: El participio pasivo describe una planta colocada/plantada; «plantada» es la opción más natural y fiel, sin añadir la idea específica de trasplante que el hebreo no exige.
- source_word: הֲתִצְלָח
  english_pob_choice: will it prosper?
  chosen_spanish: ¿prosperará?
  alternatives_spanish:
  - ¿florecerá?
  - ¿tendrá éxito?
  lexicon: n/a
  rationale: En contexto vegetal, צלח expresa prosperar o salir bien. «Prosperará» mantiene la amplitud semántica entre crecimiento y éxito, como en el POB inglés.
- source_word: כְגַעַת בָּהּ
  english_pob_choice: when ... touches it
  chosen_spanish: cuando la toque
  alternatives_spanish:
  - al tocarla
  - en cuanto la toque
  lexicon: n/a
  rationale: La construcción indica el momento/circunstancia del contacto. «Cuando la toque» es idiomático en español y preserva el valor temporal-causal sin sobreexplicar.
- source_word: רוּחַ הַקָּדִים
  english_pob_choice: the east wind
  chosen_spanish: el viento del oriente
  alternatives_spanish:
  - el viento oriental
  - el viento de oriente
  lexicon: n/a
  rationale: La expresión nombra el viento destructivo del este. «Del oriente» suena natural y mantiene la referencia geográfica y la imagen tradicional sin depender de una fórmula eclesiástica fija.
- source_word: תִּיבַשׁ יָבֹשׁ
  english_pob_choice: will utterly wither / completely dry up
  chosen_spanish: se secará del todo
  alternatives_spanish:
  - se marchitará por completo
  - se secará completamente
  lexicon: n/a
  rationale: La forma finita con infinitivo absoluto intensifica la acción. «Del todo» comunica la fuerza enfática de manera sobria y mantiene la metáfora vegetal de secarse.
- source_word: עַל עֲרֻגֹת צִמְחָהּ
  english_pob_choice: on the beds where it grew
  chosen_spanish: en los canteros donde creció
  alternatives_spanish:
  - sobre los surcos donde creció
  - en los lechos de su crecimiento
  lexicon: n/a
  rationale: עֲרֻגוֹת alude a canteros o parcelas cultivadas. «Canteros» es claro en español y «donde creció» refleja que se trata del lugar mismo de su crecimiento, como en el POB inglés revisado.
- source_word: תִּיבָשׁ
  english_pob_choice: It will wither
  chosen_spanish: Se secará
  alternatives_spanish:
  - Se marchitará
  - Se desecará
  lexicon: n/a
  rationale: La repetición final de יבש retoma el mismo resultado. Se repite «se secará» para conservar la insistencia retórica del hebreo y el paralelismo del verso.
theological_decisions:
- issue: Imagen de juicio mediante el viento del oriente
  english_pob_reading: East wind refers to the hot, destructive wind from the eastern desert, a common image of withering judgment.
  chosen_spanish_reading: El viento del oriente se entiende como el viento cálido y destructor del desierto oriental, imagen de juicio que seca la planta.
  alternative_spanish_readings:
  - viento oriental
  - viento del este
  rationale: No se suaviza la imagen. La traducción conserva el valor destructivo y judicial del símbolo, coherente con la función profética del pasaje.
  doctrine_reference: Juicio profético y simbolismo del viento en Ezequiel 17:10
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se prefirió un registro formal tipo «behold», se mantuvo la intensificación del secarse y se entendió la última cláusula como referencia al lugar de crecimiento, no simplemente al momento de brotar.'
  spanish_consistency_notes:
  - Se mantuvo «viento del oriente» para preservar la imagen geográfica del hebreo y evitar una paráfrasis interpretativa excesiva.
  - Se usó «se secará» en ambas apariciones de יבש para reflejar la repetición enfática del original.
  - «Canteros» traduce la idea de parcelas o lechos cultivados sin introducir un matiz técnico ajeno al contexto agrícola.
  - No se añadió mayúscula a «viento del oriente» porque no designa un nombre propio sino una imagen descriptiva.
