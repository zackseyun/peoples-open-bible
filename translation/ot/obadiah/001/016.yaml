theological_decisions:
- issue: Nature of the 'drinking' imagery
  chosen_reading: Metaphor for the nations drinking the cup of divine judgment, in correspondence to Edom's prior revelry/profanation on Zion.
  alternative_readings:
  - Literal drinking on the holy mountain followed by literal drunken destruction
  - A broader image of violent consumption without specific cup-of-wrath overtones
  rationale: The immediate context of Obadiah's judgment against Edom and the wider prophetic use of drinking imagery support a metaphor of judgment. The translation keeps 'drink' literal in wording while allowing the metaphor to stand, avoiding over-interpretive expansion in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Referent of the second-person plural 'you'
  chosen_reading: Edom, representing those who exulted over Jerusalem's downfall.
  alternative_readings:
  - The nations collectively
  - Jerusalem/Judah ironically addressed
  rationale: The surrounding context addresses Edom directly for its conduct in the day of Jerusalem's calamity. This informs the comparison but is not imported into the main text beyond the pronoun already present.
