revisions:
- from: Tú destruyes a los que hablan mentira[a][b]; Yahvé aborrece al hombre de sangre y de engaño.
  to: Tú destruyes a los que hablan mentiras[a]; Yahvé aborrece a un hombre de derramamiento de sangre y engaño[b].
  rationale: Se corrige la ubicación de la nota [b] para que coincida con la expresión hebrea que comenta. Se ajusta 'hablan mentira' a 'hablan mentiras' para mejor español sin perder la fuerza verbal de דֹּבְרֵי כָזָב. Se aclara el idiomatismo אִישׁ דָּמִים con 'un hombre de derramamiento de sangre y engaño', manteniendo el singular masculino exigido por el rastro lexical y teológico.
