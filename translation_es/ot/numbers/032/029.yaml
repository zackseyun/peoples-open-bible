translation:
  language: es
  text: 'Y Moisés les dijo: «Si los hijos de Gad y los hijos de Rubén cruzan el Jordán con ustedes, todo hombre armado para la guerra delante de Yahvé, y la tierra queda sometida ante ustedes, entonces les darán la tierra de Galaad como posesión».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... les dijo
  alternatives_spanish:
  - Entonces ... les dijo
  - Y ... habló
  lexicon: HALOT
  rationale: La forma narrativa hebrea se conserva con una conjunción simple en español. «Les dijo» es natural y transparente para introducir el discurso directo de Moisés.
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: El texto presenta una condición real para la concesión de la tierra; «si» preserva mejor esa fuerza condicional que «cuando».
- source_word: בְנֵי גָד וּבְנֵי רְאוּבֵן
  english_pob_choice: the sons of Gad and the sons of Reuben
  chosen_spanish: los hijos de Gad y los hijos de Rubén
  alternatives_spanish:
  - los gaditas y los rubenitas
  - los descendientes de Gad y los descendientes de Rubén
  lexicon: HALOT
  rationale: Se mantiene la expresión genealógica del hebreo para hacer visible la identidad tribal y no suavizarla a una forma más interpretativa.
- source_word: יַעַבְרוּ ... אֶת הַיַּרְדֵּן
  english_pob_choice: cross the Jordan
  chosen_spanish: cruzan el Jordán
  alternatives_spanish:
  - pasan el Jordán
  - crucen el Jordán
  lexicon: HALOT
  rationale: «Cruzar el Jordán» es el equivalente natural en español y conserva el sentido espacial del verbo con el objeto directo.
- source_word: אִתְּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - con vosotros
  - junto con ustedes
  lexicon: HALOT
  rationale: Se usa un español amplio y neutral. «Con ustedes» mantiene la referencia al grupo sin añadir matiz innecesario.
- source_word: כָּל חָלוּץ
  english_pob_choice: every armed man
  chosen_spanish: todo hombre armado
  alternatives_spanish:
  - todo equipado
  - cada hombre preparado para la guerra
  lexicon: HALOT
  rationale: En contexto militar, חָלוּץ designa a quien está preparado/equipado para combate. «Hombre armado» comunica esa fuerza de manera clara en español sin perder el matiz bélico.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para la batalla
  - para combatir
  lexicon: HALOT
  rationale: El sustantivo hebreo es «guerra»; en español «para la guerra» refleja el alcance del término de modo directo. «Batalla» sería más estrecho.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» según el estándar del proyecto. «Delante de» reproduce el valor espacial/relacional del hebreo sin sustituirlo por un título.
- source_word: וְנִכְבְּשָׁה הָאָרֶץ
  english_pob_choice: and the land is subdued
  chosen_spanish: y la tierra es sometida
  alternatives_spanish:
  - y la tierra es conquistada
  - y la tierra queda sometida
  lexicon: HALOT
  rationale: El nifal de כבש expresa el quedar sometida o dominada. «Sometida» preserva esa pasividad y evita cargar el verbo con un matiz más agresivo que el hebreo.
- source_word: לִפְנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - en presencia de ustedes
  - ante ustedes
  lexicon: HALOT
  rationale: Se mantiene el mismo giro idiomático que en la primera aparición de לִפְנֵי, con una forma natural en español.
- source_word: וּנְתַתֶּם לָהֶם
  english_pob_choice: then you shall give them
  chosen_spanish: entonces les darán
  alternatives_spanish:
  - les darán
  - y ustedes les darán
  lexicon: HALOT
  rationale: El español explicita el resultado condicional con «entonces», como hace el audit trail inglés, y mantiene el sujeto plural del mandato.
- source_word: אֶרֶץ הַגִּלְעָד
  english_pob_choice: the land of Gilead
  chosen_spanish: la tierra de Galaad
  alternatives_spanish:
  - el territorio de Galaad
  - la tierra del Galaad
  lexicon: HALOT
  rationale: «Tierra de Galaad» reproduce de manera directa el sintagma geográfico hebreo. «Galaad» se adapta a la forma usual en español bíblico.
- source_word: לַאֲחֻזָּה
  english_pob_choice: as a possession
  chosen_spanish: como posesión
  alternatives_spanish:
  - como heredad
  - como propiedad
  lexicon: HALOT
  rationale: «Posesión» conserva el valor de tenencia/holding sin introducir por defecto la connotación hereditaria más fuerte que a veces lleva «heredad».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrámaton directamente. Conforme al marco del proyecto, se preserva el nombre propio divino en español como «Yahvé», evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa auditada está en alta concordancia y no muestra revisiones aplicadas; por tanto, el borrador español sigue de cerca la lectura estable, sin añadir alternativas textuales innecesarias.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, en consonancia con la terminología del proyecto.
  - Se tradujo חָלוּץ de forma funcional como «hombre armado» para conservar el valor militar.
  - Se mantuvo «la tierra» para הָאָרֶץ y «la tierra de Galaad» para אֶרֶץ הַגִּלְעָד, siguiendo el paralelismo del hebreo.
  - Se usó «delante de» para לִפְנֵי / לִפְנֵיכֶם para conservar el mismo giro relacional en ambas cláusulas.
