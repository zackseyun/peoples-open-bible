    text: Or 'dense water' or 'thick liquid.' The Greek wording is unusual and may intentionally stress the strange character of the substance.
    reason: lexical_alternative
  - marker: b
    text: The participle rendered 'after drawing some out' is difficult and uncommon in this form; the sense is that they were to take some of the liquid and bring it.
    reason: textual_variant
  - marker: c
    text: Or 'pour the water over both the wood and what was laid upon it.'
    reason: alternative_reading
