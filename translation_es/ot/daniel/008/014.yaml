translation:
  language: es
  text: 'Y me dijo: «Hasta 2.300 atardeceres y amaneceres[a]; entonces el santuario será restaurado[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Hasta tarde-mañana, 2.300»; la expresión puede referirse a 2.300 días completos o a 2.300 ofrendas vespertinas y matutinas (aproximadamente 1.150 días).
    reason: alternative_reading
  - marker: b
    text: O «entonces el santuario será limpiado», «vindicado» o «justificado». El verbo hebreo significa literalmente «ser puesto en orden» o «ser puesto en su estado correcto».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y me dijo
  alternatives_spanish:
  - Entonces me dijo
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce la respuesta en secuencia narrativa; en español, «Y me dijo» conserva el enlace simple sin forzar un matiz temporal adicional.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: El sufijo de primera persona singular se expresa naturalmente con el dativo enclítico «me» en español dentro del discurso directo.
- source_word: עַד
  english_pob_choice: Until
  chosen_spanish: Hasta
  alternatives_spanish:
  - Hasta que
  lexicon: HALOT
  rationale: Aquí עַד introduce el límite/duración de la respuesta a «¿Hasta cuándo?». «Hasta» comunica bien ese encuadre temporal sin decidir la cronología.
- source_word: עֶרֶב בֹּקֶר
  english_pob_choice: evenings and mornings
  chosen_spanish: tardes y mañanas
  alternatives_spanish:
  - tarde-mañana
  - tardes-mañanas
  lexicon: HALOT
  rationale: 'Se preserva la pareja nominal plural para mantener la ambigüedad textual: puede aludir a días completos o a ofrendas vespertinas y matutinas. «Tardes y mañanas» es natural en español y evita resolver la cuestión en la traducción principal.'
- source_word: אַלְפַּיִם וּשְׁלֹשׁ מֵאוֹת
  english_pob_choice: 2,300
  chosen_spanish: '2.300'
  alternatives_spanish:
  - dos mil trescientas
  lexicon: HALOT
  rationale: Se usa cifra moderna para legibilidad, manteniendo el valor cardinal del hebreo sin añadir interpretación.
- source_word: וְנִצְדַּק
  english_pob_choice: will be restored
  chosen_spanish: será restaurado
  alternatives_spanish:
  - será puesto en su lugar
  - será vindicado
  - será justificado
  - será limpiado
  lexicon: HALOT
  rationale: El nifal de צדק remite a ser puesto en lo recto o en su estado debido. «Será restaurado» preserva esa amplitud sin importar una lectura cultual más específica que el verbo no exige por sí mismo.
- source_word: קֹדֶשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - lo santo
  lexicon: HALOT
  rationale: En el contexto del capítulo, קֹדֶשׁ se refiere al ámbito sagrado/templo; «santuario» es claro, idiomático y ajustado al tema de profanación y restauración.
theological_decisions:
- issue: Sentido de וְנִצְדַּק קֹדֶשׁ en el contexto del templo
  english_pob_reading: the sanctuary will be restored
  chosen_spanish_reading: el santuario será restaurado
  alternative_spanish_readings:
  - el santuario será limpiado
  - el santuario será vindicado
  - el santuario será justificado
  rationale: La lectura principal conserva el sentido amplio de «ser puesto bien / restaurado» sin introducir una interpretación doctrinal o histórica más estrecha. Así se mantiene la tensión entre las alternativas tradicionales sin borrarlas.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Ambigüedad de עֶרֶב בֹּקֶר
  english_pob_reading: retain the literal phrase '2,300 evenings and mornings' without resolving the chronology
  chosen_spanish_reading: mantener «2.300 tardes y mañanas» sin resolver la cronología
  alternative_spanish_readings:
  - 2.300 días
  - 1.150 días si se cuentan como ofrendas diarias dobles
  rationale: La expresión hebrea admite más de una interpretación; la traducción debe conservar la ambigüedad del original en vez de decidirla en el texto principal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés al preferir «Hasta» para עַד y un verbo simple en la cláusula final, pero mantiene en español la amplitud semántica de וְנִצְדַּק mediante «será restaurado». También conserva la ambigüedad cronológica de עֶרֶב בֹּקֶר en la nota, como lo hace el aparato inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en este proyecto, pero aquí no aparece el Tetragrámaton.
  - Se mantiene «santuario» para קֹדֶשׁ, en coherencia con el contexto de Daniel 8.
  - 'Se traduce el número con cifra decimal española: «2.300».'
  - Se conserva un registro digno y publicable, sin resolver en el texto principal las tensiones interpretativas documentadas.
