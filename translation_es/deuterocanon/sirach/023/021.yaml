translation:
  language: es
  text: Este hombre será castigado[a] en las plazas de la ciudad, y donde no lo esperaba[b], será apresado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las calles de la ciudad»; el griego habla literalmente de los espacios anchos o abiertos de la ciudad, destacando la exposición pública.
    reason: lexical_alternative
  - marker: b
    text: O «donde no lo sospechó» o «donde no lo imaginó».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτος
  english_pob_choice: This man
  chosen_spanish: Éste
  alternatives_spanish:
  - Este hombre
  - Él
  lexicon: LSJ
  rationale: El demostrativo griego retoma al varón adúltero del contexto inmediato. En español, «éste» conserva la referencia anafórica y el matiz masculino sin añadir palabras innecesarias. «Este hombre» es más explícito, pero menos compacto; «él» pierde el énfasis demostrativo.
- source_word: ἐν πλατείαις πόλεως
  english_pob_choice: in the streets of the city
  chosen_spanish: en las plazas de la ciudad
  alternatives_spanish:
  - en las calles de la ciudad
  - en los lugares abiertos de la ciudad
  lexicon: LSJ
  rationale: πλατεῖαι se refiere literalmente a espacios anchos o abiertos; por eso «plazas» preserva mejor la imagen de exposición pública que «calles». «Calles» es natural, pero atenúa el matiz espacial del griego. «Lugares abiertos» es fiel, aunque menos idiomático.
- source_word: ἐκδικηθήσεται
  english_pob_choice: will be punished
  chosen_spanish: será castigado
  alternatives_spanish:
  - se le hará justicia
  - será vengado en su contra
  lexicon: LSJ
  rationale: El pasivo comunica retribución punitiva, no venganza personal. «Será castigado» expresa con claridad el juicio/retribución pública. «Se le hará justicia» puede sonar demasiado neutro o judicial; «será vengado en su contra» introduce un giro menos natural en español.
- source_word: οὗ
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en el lugar donde
  lexicon: LSJ
  rationale: La relativa locativa se traduce de forma natural con «donde», manteniendo la relación de lugar y el contraste con la sorpresa de la captura. «En el lugar donde» es más explícito, pero más pesado.
- source_word: οὐχ ὑπενόησεν
  english_pob_choice: he did not suspect it
  chosen_spanish: no lo sospechó
  alternatives_spanish:
  - no lo esperaba
  - no lo imaginó
  lexicon: LSJ
  rationale: ὑπονοέω expresa sospechar, conjeturar o prever. «No lo sospechó» conserva esa idea de no haberlo anticipado. «No lo esperaba» suaviza el matiz de sospecha; «no lo imaginó» se aleja hacia la imaginación.
- source_word: πιασθήσεται
  english_pob_choice: he will be caught
  chosen_spanish: será apresado
  alternatives_spanish:
  - será capturado
  - será tomado
  lexicon: LSJ
  rationale: El pasivo futuro indica ser prendido o aprehendido. «Será apresado» comunica bien la captura repentina y mantiene un tono algo más formal que «será atrapado». «Será capturado» es posible, pero algo más técnico; «será tomado» resulta menos natural.
theological_decisions:
- issue: Referencia masculina del sujeto
  english_pob_reading: The verse speaks specifically of the adulterous man from the immediate context, so masculine language is retained.
  chosen_spanish_reading: Se conserva el referente masculino del hombre adúltero del contexto inmediato.
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: El griego usa formas masculinas y el pasaje contrasta al varón adúltero con la mujer adúltera. Mantener la referencia masculina evita neutralizar indebidamente el texto.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Fuerza de ἐκδικηθήσεται
  english_pob_reading: Public punitive judgment ('will be punished') rather than a narrower sense of personal vengeance.
  chosen_spanish_reading: Se entiende como castigo/retribución pública, no como venganza privada.
  alternative_spanish_readings:
  - será vengado
  - se le tomará venganza
  rationale: El contexto pide una traducción que exprese juicio punitivo visible, sin cargar el verso con una idea de venganza interpersonal.
  doctrine_reference: DOCTRINE.md §1 Original-language primacy over translation tradition
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Sirácides 23:21 y mantiene la misma estructura: sujeto demostrativo, lugar público de castigo y captura inesperada. Se revisó la equivalencia con el texto inglés auditado; no se requieren cambios respecto del sentido base, solo ajustes naturales al español.'
  spanish_consistency_notes:
  - Se usa «plazas» para reflejar πλατεῖαι, preservando el sentido de espacios abiertos y públicos.
  - Se emplea «castigado» para ἐκδικηθήσεται, evitando una lectura de venganza personal.
  - Se mantiene el sujeto masculino implícito del demostrativo griego.
  - «Apresado» conserva el sentido de captura súbita de πιασθήσεται.
