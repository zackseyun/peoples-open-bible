translation:
  language: es
  text: 'Respondió y dijo a Arioc, el comandante del rey: «¿Por qué es tan severo[a] el decreto de parte[b] del rey?». Entonces Arioc dio a conocer el asunto a Daniel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tan duro», «tan apresurado» o «tan urgente»; el término arameo transmite severidad apremiante, y en este contexto resalta el rigor con que se ejecuta el decreto del rey.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de delante del rey»; es un modismo arameo que indica que el decreto procede de la presencia o autoridad del rey.
    reason: cultural_note
lexical_decisions:
- source_word: עָנֵה וְאָמַר
  english_pob_choice: He answered and said
  chosen_spanish: Respondió y dijo
  alternatives_spanish:
  - Respondió
  - Contestó y dijo
  lexicon: HALOT
  rationale: Conservo la pareja narrativa semítica sin volverla redundante en exceso. En español, «respondió y dijo» suena natural en un registro bíblico digno y refleja la secuencia del hebreo/arameo.
- source_word: שַׁלִּיטָא דִי מַלְכָּא
  english_pob_choice: the king’s commander
  chosen_spanish: el comandante del rey
  alternatives_spanish:
  - el oficial del rey
  - el capitán del rey
  - el encargado del rey
  lexicon: HALOT
  rationale: El contexto inmediato presenta a Arioc como el agente que ejecuta la orden real contra los sabios, por lo que «comandante» comunica bien una función de autoridad ejecutiva/militar. Evito «siervo» porque debilitaría la fuerza del cargo.
- source_word: עַל מָה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo?
  - ¿Por qué razón?
  lexicon: HALOT
  rationale: Es la equivalencia idiomática natural en español y mantiene el carácter interrogativo directo del texto.
- source_word: דָתָא
  english_pob_choice: the decree
  chosen_spanish: el decreto
  alternatives_spanish:
  - el edicto
  - la orden
  - la ley
  lexicon: HALOT
  rationale: En este contexto cortesano y legal, «decreto» comunica adecuadamente una orden real ya emitida. «Edicto» también sería posible, pero «decreto» es claro y ampliamente inteligible.
- source_word: מְהַחְצְפָה
  english_pob_choice: so harsh
  chosen_spanish: tan severo
  alternatives_spanish:
  - tan duro
  - tan apresurado
  - tan urgente
  lexicon: HALOT
  rationale: La nota inglesa indica la tensión entre severidad y prisa; aquí el contexto favorece la fuerza/rigor del decreto más que la mera urgencia. «Severo» preserva esa severidad sin perder fluidez en español.
- source_word: מִן קֳדָם מַלְכָּא
  english_pob_choice: from before the king
  chosen_spanish: de parte del rey
  alternatives_spanish:
  - de delante del rey
  - de la presencia del rey
  - desde la presencia del rey
  lexicon: HALOT
  rationale: La frase aramea es un modismo que señala procedencia desde la autoridad/presencia real. En español, «de parte del rey» comunica bien esa procedencia con naturalidad, sin ocultar que el mandato viene de su autoridad.
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Después
  - Luego
  lexicon: HALOT
  rationale: Conector narrativo estándar y natural en español.
- source_word: מִלְּתָא
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la cuestión
  - la cosa
  - el hecho
  lexicon: HALOT
  rationale: '«El asunto» es una forma amplia y sobria que recoge bien el alcance de la palabra aramea en este contexto: la situación o explicación que Arioc comunica a Daniel.'
- source_word: הוֹדַע
  english_pob_choice: made known
  chosen_spanish: dio a conocer
  alternatives_spanish:
  - hizo saber
  - informó
  - comunicó
  lexicon: HALOT
  rationale: Mantiene el valor causativo de «hacer saber» con una formulación natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «so urgent» por «so harsh» para reflejar mejor מְהַחְצְפָה como severidad/rigor y no solo prisa. La redacción española sigue esa decisión con «tan severo».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no la requiere.
  - Se usa «el rey» y no una mayúscula reverencial, siguiendo el sentido narrativo del pasaje.
  - «Arioc» se transcribe de forma hispanizada; se deja nota de variante de transliteración en la nota a.
  - No se introducen términos doctrinales ajenos al contexto legal-narrativo del versículo.
