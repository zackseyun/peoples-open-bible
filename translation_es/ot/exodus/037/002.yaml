translation:
  language: es
  text: Lo recubrió de oro puro, por dentro y por fuera, y le hizo un borde[a] de oro alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una moldura de oro todo alrededor» o «un borde de oro alrededor». El hebreo זֵר designa un adorno decorativo que rodea el objeto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַפֵּהוּ
  english_pob_choice: He overlaid it
  chosen_spanish: Lo recubrió
  alternatives_spanish:
  - Lo cubrió
  - Lo revestió
  - Lo plateó
  lexicon: HALOT
  rationale: El piel de צפה describe aquí cubrir/revestir una pieza con metal precioso. En español, «recubrió» comunica con naturalidad el trabajo artesanal y evita la ambigüedad de un simple «cubrió».
- source_word: זָהָב טָהוֹר
  english_pob_choice: with pure gold
  chosen_spanish: de oro puro
  alternatives_spanish:
  - de oro refinado
  - con oro puro
  lexicon: HALOT
  rationale: La secuencia expresa oro de pureza/calidad íntegra. «De oro puro» mantiene el sentido material y es la forma más natural en español para un objeto recubierto.
- source_word: מִבַּיִת וּמִחוּץ
  english_pob_choice: inside and outside
  chosen_spanish: por dentro y por fuera
  alternatives_spanish:
  - en el interior y en el exterior
  - adentro y afuera
  lexicon: HALOT
  rationale: La pareja señala las superficies interiores y exteriores. «Por dentro y por fuera» conserva la oposición espacial con buen ritmo en español.
- source_word: וַיַּעַשׂ לוֹ
  english_pob_choice: and made for it
  chosen_spanish: y le hizo
  alternatives_spanish:
  - y le hizo para él
  - y lo hizo
  lexicon: HALOT
  rationale: El לֹו marca destinatario indirecto. Como el objeto aludido ya está en el contexto, «le hizo» evita sobrecargar la frase y conserva la relación de beneficio/atribución.
- source_word: זֵר
  english_pob_choice: border
  chosen_spanish: borde
  alternatives_spanish:
  - moldura
  - ribete
  - corona
  lexicon: HALOT
  rationale: En el mobiliario del tabernáculo, זֵר designa un adorno perimetral. «Borde» es una solución clara y acorde con la revisión inglesa que prefirió «border» como término más estándar.
- source_word: זֵר זָהָב
  english_pob_choice: a surrounding border of gold
  chosen_spanish: un borde de oro
  alternatives_spanish:
  - un borde dorado
  - una moldura de oro
  lexicon: HALOT
  rationale: La construcción expresa materialidad del adorno. En español, «borde de oro» conserva la relación nominal sin forzar una imagen más técnica que la que exige el hebreo.
- source_word: סָבִיב
  english_pob_choice: surrounding
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - todo alrededor
  lexicon: HALOT
  rationale: El término enfatiza encierro completo. «Alrededor» integra de manera natural la idea de circunferencia en la frase española.
theological_decisions:
- issue: Referencia del pronombre y objeto implícito en la descripción de la pieza
  english_pob_reading: it / for it
  chosen_spanish_reading: lo / le
  alternative_spanish_readings:
  - la / le
  - lo / lo
  rationale: El texto describe un objeto del mobiliario del santuario ya identificado por el contexto. Se conserva la referencia pronominal sin añadir un sustantivo no presente en el versículo, para no exceder la evidencia del hebreo.
  doctrine_reference: Fidelidad contextual en traducción bíblica; precisión referencial sin expansión interpretativa.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «rim» a «border» en la revisión más reciente; por eso el español usa «borde» como equivalente principal, manteniendo el sentido de un adorno perimetral. También se conservó la doble localización «por dentro y por fuera» y la idea de un revestimiento de oro puro.
  spanish_consistency_notes:
  - Se mantuvo «oro puro» para זָהָב טָהוֹר, en consonancia con el uso técnico del tabernáculo.
  - «Borde» se eligió para זֵר siguiendo la revisión inglesa y evitando un término demasiado interpretativo como «corona».
  - La nota al pie preserva alternativas de traducción sin introducir una lectura doctrinal distinta.
