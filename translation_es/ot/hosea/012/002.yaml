base_translation:
  language: en
  yaml_path: translation/ot/hosea/012/002.yaml
  text: Ephraim feeds on wind and pursues the east wind all day long[a]; he multiplies lies and destruction. They make a covenant with Assyria[e][d][c][b], and oil is carried to Egypt.
  footnotes:
  - marker: a
    text: Or 'shepherds the wind'; the Hebrew verb is literally 'pastures/feeds/shepherds.'
    reason: lexical_alternative
  - marker: b
    text: The 'east wind' was associated with scorching, destructive force; the phrase can suggest both futility and harm.
    reason: cultural_note
  - marker: c
    text: Or 'falsehood and devastation' / 'deceit and destruction.'
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'cut a covenant,' a standard idiom for making a covenant or treaty.
    reason: lexical_alternative
  - marker: e
    text: Probably oil sent as tribute or diplomatic payment to Egypt.
    reason: cultural_note
