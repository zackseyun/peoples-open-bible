translation:
  language: es
  text: Los hijos de Rimón el beerotita[a], Recab y Baná, fueron y llegaron a la casa de Ish-bóset, en el calor del día, mientras él estaba acostado para su descanso del mediodía[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Recab y Baná», siguiendo una transliteración más cercana al hebreo del nombre de Recab.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el acostarse del mediodía»; es decir, un descanso del mediodía.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי רִמּוֹן הַבְּאֵרֹתִי
  english_pob_choice: The sons of Rimmon the Beerothite
  chosen_spanish: Los hijos de Rimón el beerotita
  alternatives_spanish:
  - Los hijos de Rimón el de Beerot
  - Los descendientes de Rimón el beerotita
  lexicon: HALOT
  rationale: בְּנֵי aquí funciona como filiación literal en el contexto inmediato, porque el versículo nombra enseguida a Recab y Baná como los dos hijos. Por eso se conserva «hijos» y no se generaliza a «descendientes»; el etnónimo se vierte con adjetivo relacional «beerotita» para mantener la forma del hebreo sin recargarla.
- source_word: רֵכָב
  english_pob_choice: Rekab
  chosen_spanish: Recab
  alternatives_spanish:
  - Rekab
  - Rechab
  lexicon: HALOT
  rationale: Se usa la forma castellana transliterada y más natural «Recab». La variante inglesa «Rekab» refleja cercanía al hebreo, pero en español la adaptación con c mantiene mejor la lectura y evita una grafía menos fluida.
- source_word: וּבַעֲנָה
  english_pob_choice: Baanah
  chosen_spanish: Baná
  alternatives_spanish:
  - Baaná
  - Baanah
  lexicon: HALOT
  rationale: El nombre propio se adapta a la ortografía española como «Baná», siguiendo una transliteración sobria y pronunciable. Se conserva el nombre sin traducir para no borrar la identidad del personaje.
- source_word: וַיֵּלְכוּ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - salieron
  - caminaron
  lexicon: HALOT
  rationale: El wayyiqtol de הלך expresa movimiento narrativo simple. «Fueron» mantiene la secuencia verbal breve y natural en español sin añadir matices no presentes en el hebreo.
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - entraron
  lexicon: HALOT
  rationale: Como la frase siguiente ya indica destino con אֶל בֵּית, «llegaron» reproduce bien el avance narrativo y resulta más idiomático en español que repetir «vinieron». No se fuerza «entraron», porque el hebreo destaca primero el arribo a la casa.
- source_word: כְּחֹם הַיּוֹם
  english_pob_choice: in the heat of the day
  chosen_spanish: en el calor del día
  alternatives_spanish:
  - a la hora más calurosa del día
  - al calor del día
  - al mediodía
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «como/en el calor del día» y alude al momento más caluroso, no necesariamente a una hora exacta. «En el calor del día» conserva la imagen original mejor que «al mediodía», que sería más interpretativo.
- source_word: בֵּית אִישׁ בֹּשֶׁת
  english_pob_choice: the house of Ish-bosheth
  chosen_spanish: la casa de Ish-boset
  alternatives_spanish:
  - la casa de Is-boset
  - la casa de Ish-bosheth
  lexicon: HALOT
  rationale: Se conserva el nombre propio como forma transliterada usual en español bíblico moderno, con el guion omitido por fluidez natural. «Casa de» mantiene el valor de residencia/linaje del hebreo sin añadir explicaciones ajenas al texto.
- source_word: וְהוּא שֹׁכֵב
  english_pob_choice: while he was lying down
  chosen_spanish: mientras él estaba acostado
  alternatives_spanish:
  - y él estaba acostado
  - mientras yacía
  lexicon: HALOT
  rationale: La cláusula expresa estado circunstancial contemporáneo a su llegada. «Mientras él estaba acostado» hace explícita esa simultaneidad en español sin introducir una interpretación ajena.
- source_word: אֵת מִשְׁכַּב הַצָּהֳרָיִם
  english_pob_choice: for his midday rest
  chosen_spanish: para su descanso del mediodía
  alternatives_spanish:
  - para su siesta del mediodía
  - para el reposo del mediodía
  - para su descanso de mediodía
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «el acostarse del mediodía», es decir, un descanso de mediodía. «Descanso del mediodía» preserva el sentido sin volverlo demasiado coloquial; «siesta» sería natural pero introduce una asociación cultural más específica.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el texto hebreo y el audit trail inglés. No se detectaron cambios sustantivos respecto de la revisión más reciente; la principal atención estuvo en la transliteración española de nombres propios y en conservar la imagen idiomática de כְּחֹם הַיּוֹם y מִשְׁכַּב הַצָּהֳרָיִם sin sobreinterpretación.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «hijos» por el valor filiativo inmediato del contexto.
  - Se usó un español bíblico moderno y claro, evitando tanto arcaísmos innecesarios como paráfrasis expansivas.
  - La transliteración de nombres se acomodó a una ortografía castellana legible, con nota para la variante tradicional de Recab.
