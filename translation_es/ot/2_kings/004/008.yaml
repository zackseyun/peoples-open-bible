    text: 'Hebreo: «una mujer grande». La expresión probablemente alude a prominencia social o recursos.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «comer pan», un modismo para tomar una comida.'
    reason: lexical_alternative
  revision_rationale: 'La revisión hace ajustes menores de naturalidad y precisión: “pasó por Sunem” refleja mejor el sentido de tránsito; “mujer distinguida” comunica con mejor español el valor de estatus de אִשָּׁה גְדוֹלָה; y se suaviza el inicio narrativo. Se mantiene “comer pan” con nota, en línea con el hebreo y el rastro de auditoría inglés.'
