translation:
  language: es
  text: Han abierto mucho la boca contra mí; con reproche han golpeado mi mejilla; juntos se agrupan contra mí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se reúnen contra mí» o «se llenan contra mí». El verbo final es idiomático y difícil; la idea es de fuerzas hostiles que se reúnen de común acuerdo.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּעֲרוּ
  english_pob_choice: have opened ... wide
  chosen_spanish: han abierto grande
  alternatives_spanish:
  - han abierto
  - han gapeado
  lexicon: HALOT
  rationale: El verbo expresa abrir la boca de manera amplia y hostil o burlona. En español, «han abierto grande» conserva la imagen sin caer en un arcaísmo, y mantiene la fuerza del gesto verbal.
- source_word: בְּפִי־הֶם
  english_pob_choice: their mouths
  chosen_spanish: su boca
  alternatives_spanish:
  - sus bocas
  - la boca de ellos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «con su boca», pero en español poético y natural «su boca» conserva la imagen corporal. El plural implícito ya queda claro por el sujeto plural del verbo.
- source_word: בְּחֶרְפָּה
  english_pob_choice: with reproach
  chosen_spanish: con reproche
  alternatives_spanish:
  - con burla
  - con desprecio
  - con insulto
  lexicon: HALOT
  rationale: חרפה puede abarcar reproche, insulto o vergüenza. «Con reproche» mantiene la forma nominal y la carga de afrenta verbal sin intensificar hacia una paráfrasis más libre.
- source_word: הִכּוּ
  english_pob_choice: have struck
  chosen_spanish: han golpeado
  alternatives_spanish:
  - han herido
  - han azotado
  - han dado
  lexicon: HALOT
  rationale: נכה es un verbo general de golpear o herir. «Han golpeado» es claro y poéticamente directo, y funciona bien con el objeto «mi mejilla».
- source_word: לְחָיָי
  english_pob_choice: my cheek
  chosen_spanish: mi mejilla
  alternatives_spanish:
  - mi mejilla
  - mi cara
  - mi quijada
  lexicon: HALOT
  rationale: לחי designa la mejilla o la mandíbula. «Mi mejilla» es la equivalencia más natural y mantiene la imagen de humillación física.
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en conjunto
  - a una
  - todos a una
  lexicon: HALOT
  rationale: יַחַד marca acción colectiva. «Juntos» es breve, idiomático y preserva la coordinación del ataque.
- source_word: יִתְמַלָּאוּן
  english_pob_choice: they gather themselves against me
  chosen_spanish: se agrupan contra mí
  alternatives_spanish:
  - se reúnen contra mí
  - se juntan contra mí
  - se amontonan contra mí
  lexicon: HALOT
  rationale: El hitpael de מלא aquí es idiomático y difícil. «Se agrupan» comunica la idea de concentrarse o amontonarse en actitud hostil sin forzar una explicación interpretativa más larga.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: mantiene el paralelismo de tres cola, conserva la imagen de la boca abierta, el golpe en la mejilla y la clausula final ambigua. Se prefirió un español natural y publicable, evitando arcaísmos como «escupir/cejar» o soluciones explicativas que borren la tensión del verbo final.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto en el proyecto, pero este versículo no contiene el tetragrámaton ni un aludido directo.
  - Se mantuvo el tono poético en tiempo perfecto compuesto («han abierto», «han golpeado») para reflejar el aspecto del hebreo en contexto de lamento.
  - La nota al pie se ancla solo en el verbo final, porque allí está la principal ambigüedad lexical y sintáctica del versículo.
