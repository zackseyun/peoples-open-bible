base_translation:
  language: en
  yaml_path: translation/ot/2_kings/009/001.yaml
  text: Then Elisha the prophet called one of the sons of the prophets and said to him[a], “Gird up your loins, take this flask of oil in your hand[b], and go to Ramoth-gilead.”
  footnotes:
  - marker: a
    text: Literally, “Gird up your loins,” an idiom meaning to prepare for action or travel by tucking up one’s garments.
    reason: lexical_alternative
  - marker: b
    text: “Sons of the prophets” refers to members of a prophetic group or guild, not necessarily biological sons.
    reason: cultural_note
