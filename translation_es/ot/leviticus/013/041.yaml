translation:
  language: es
  text: Y si queda calvo en la parte frontal de la cabeza[a], es calvo en la frente; es limpio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «calvicie frontal» o «tener calvicie en la parte frontal de la cabeza». El hebreo distingue esta condición de la calvicie en la parte posterior de la cabeza en el versículo anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפְּאַת פָּנָיו
  english_pob_choice: the front of his head
  chosen_spanish: de la parte frontal de la cabeza
  alternatives_spanish:
  - de la frente
  - de la parte delantera de su rostro
  - desde el borde de su cara
  lexicon: HALOT
  rationale: La expresión hebrea combina la idea de 'borde/extremo' con 'su rostro', pero en este contexto levítico se refiere a la región frontal del cuero cabelludo, no a la cara en sentido literal. 'Parte frontal de la cabeza' conserva el sentido anatómico y evita una interpretación facial impropia.
- source_word: יִמָּרֵט
  english_pob_choice: becomes bald
  chosen_spanish: se le cae el cabello
  alternatives_spanish:
  - se vuelve calvo
  - queda despoblado de cabello
  - se le arranca el cabello
  lexicon: HALOT
  rationale: El nifal expresa que el cabello queda desprendido o se va quedando sin pelo. En español, 'se le cae el cabello' comunica con naturalidad el proceso diagnóstico sin perder el matiz de pérdida capilar.
- source_word: רֹאשׁוֹ
  english_pob_choice: his head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - su cabeza
  - su cabeza
  lexicon: HALOT
  rationale: En español, la secuencia 'parte frontal de la cabeza' reproduce con claridad el referente anatómico del hebreo sin necesidad de repetir el posesivo de manera pesada.
- source_word: גִּבֵּחַ
  english_pob_choice: bald on the forehead
  chosen_spanish: calvo en la frente
  alternatives_spanish:
  - frontalmente calvo
  - con calvicie en la frente
  - calvo de frente
  lexicon: HALOT
  rationale: El término distingue esta condición de la calvicie descrita en el versículo anterior y señala específicamente la zona frontal. 'Calvo en la frente' conserva esa distinción de forma comprensible y suficientemente literal.
- source_word: טָהוֹר
  english_pob_choice: clean
  chosen_spanish: limpio
  alternatives_spanish:
  - puro
  lexicon: HALOT
  rationale: En Levítico 13 el término define estado ritual, no pureza moral. 'Limpio' mantiene la categoría levítica tradicional del español bíblico con el menor riesgo de moralizarla.
theological_decisions:
- issue: Estado ritual en la legislación de pureza
  english_pob_reading: clean
  chosen_spanish_reading: limpio
  alternative_spanish_readings:
  - puro
  rationale: La declaración final clasifica ritualmente la condición del hombre dentro del marco sacerdotal. 'Limpio' preserva la distinción levítica entre estados rituales y evita cargar el término con connotaciones éticas no presentes en el versículo.
  doctrine_reference: Translation philosophy §6; categoría levítica de pureza ritual.
translation_notes:
  revision_awareness: El texto inglés fue revisado y quedó sin cambios; el acuerdo de auditoría es alto. La presente redacción mantiene la distinción léxica entre la calvicie frontal de este versículo y la calvicie posterior del versículo previo, y conserva 'limpio' para el estado ritual.
  spanish_consistency_notes:
  - Se mantuvo 'limpio' como término ritual en Levítico, coherente con la serie de pureza ceremonial del libro.
  - Se evitó 'SEÑOR' u otra sustitución porque no aparece aquí el tetragrámaton ni una referencia directa al nombre divino.
  - Se preservó la distinción anatómica entre 'parte frontal de la cabeza' y 'frente' en nota, para no perder el matiz diagnóstico del hebreo.
