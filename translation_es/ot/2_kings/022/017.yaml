review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del English POB: causa del juicio («porque»), abandono de Dios, culto a otros dioses, provocación de la ira divina, metáfora de fuego para la ira, y juicio irreversible sobre «este lugar». También conserva correctamente la nota léxica sobre קטר como alternativa más específica «quemar incienso».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero hay dos ajustes importantes para mayor fidelidad y naturalidad: «provocarme a ira» suena forzado en español actual; «provocarme a ira/enojo» puede simplificarse mejor como «provocarme a ira» en registro bíblico, pero el segmento siguiente «por todo el trabajo de sus manos» queda menos natural y menos idiomático que «con toda la obra de sus manos». Además, «mi furor ha sido encendido» presenta desacuerdo de género con «furor» y rompe la imagen; debe ser «mi ira se ha encendido» o «mi furor se ha encendido».'
  glossary_alignment: No hay conflicto con las pautas terminológicas globales. «Dios»/«dioses» está bien. No aparece el nombre divino en este versículo. La decisión entre «ira» y «furor» es estilística, pero «ira» alinea mejor «provocarme a ira» y «mi ira se ha encendido» en una secuencia española más natural y coherente con חמה.
  issues:
  - severity: high
    issue: Desacuerdo gramatical en «mi furor ha sido encendido»
    rationale: «Furor» es masculino; «encendido» concuerda formalmente, pero la construcción pasiva resulta torpe y menos natural que «se ha encendido». Además, la propia decisión léxica listaba «ha sido encendida» como alternativa, mostrando vacilación por influencia de la imagen de fuego/ira. Conviene reparar la frase para español idiomático y fiel a la metáfora.
  - severity: medium
    issue: «por todo el trabajo de sus manos» suena poco idiomático y debilita el hebraísmo
    rationale: El hebreo מַעֲשֵׂה יְדֵיהֶם se refleja mejor como «la obra de sus manos». «Trabajo» no es incorrecto, pero en este contexto bíblico «obra» preserva mejor el modismo y su resonancia polémica contra la idolatría.
  - severity: medium
    issue: «provocarme a ira» es comprensible pero algo rígido
    rationale: La frase reproduce de cerca el inglés y el hebreo, pero en español más natural y digno funciona mejor «para provocarme a ira con toda la obra de sus manos» o «para hacerme enojar», siendo la primera la más formal y cercana al original. No es error grave, pero sí mejorable.
  revised_spanish_text: porque me han abandonado y han hecho ofrendas[a] a otros dioses, para provocarme a ira con toda la obra de sus manos. Por eso mi ira se ha encendido contra este lugar, y no se apagará.
  revised_footnotes:
  - marker: a
    text: O, más específicamente, «han quemado incienso a otros dioses».
    reason: lexical_alternative
  revision_rationale: 'Se hicieron reparaciones menores para mejorar fidelidad idiomática y corrección del español: «obra de sus manos» refleja mejor el hebreo que «trabajo de sus manos», y «mi ira se ha encendido» preserva con naturalidad la metáfora del fuego y evita una construcción pasiva torpe. Se mantuvo la nota sobre «quemado incienso» porque corresponde al rastro léxico documentado en el English POB.'
