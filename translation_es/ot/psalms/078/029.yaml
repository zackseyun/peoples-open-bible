- from: Así comieron y quedaron muy satisfechos[a], y él les llevó lo que anhelaban.
  to: Así comieron y quedaron muy saciados, y él les trajo lo que anhelaban[a].
  rationale: Se reemplaza «muy satisfechos» por «muy saciados» para conservar mejor la imagen concreta de abundante comida expresada por שׂבע מְאֹד. Se cambia «les llevó» por «les trajo» por mayor naturalidad idiomática en español para el hiphil de בוא. La nota se mantiene, pero se ancla directamente en «lo que anhelaban», donde surge la alternativa léxica.
