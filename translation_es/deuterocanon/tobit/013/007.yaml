translation:
  language: es
  text: Exalto a mi Dios[a], y mi alma se regocija en el Rey del cielo, y se alegrará en su grandeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego de la cláusula media es elíptico: literalmente, «y mi alma al Rey del cielo». La traducción suple «se regocija en» para expresar el sentido poético probable en contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὑψῶ
  english_pob_choice: I exalt
  chosen_spanish: Exalto
  alternatives_spanish:
  - Glorifico
  - Levanto en alto
  lexicon: BDAG
  rationale: El verbo griego expresa elevar o exaltar. «Exalto» conserva el lenguaje de alabanza con naturalidad en español y sin suavizar la fuerza del original.
- source_word: θεόν μου
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  lexicon: BDAG
  rationale: La posesión pronominal es explícita en el griego; «mi Dios» sigue de cerca la forma y mantiene el tono devocional.
- source_word: ψυχή
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi ser
  - mi vida
  - yo
  lexicon: BDAG
  rationale: «ψυχή» nombra el alma de manera directa. «Mi alma» preserva la imaginería poética y la distinción del sujeto sin reducirlo a un simple pronombre.
- source_word: βασιλεῖ τοῦ οὐρανοῦ
  english_pob_choice: the King of heaven
  chosen_spanish: el Rey del cielo
  alternatives_spanish:
  - el Rey celestial
  - el rey del cielo
  lexicon: BDAG
  rationale: La expresión funciona como título de Dios. «Rey del cielo» reproduce la relación genitiva y conserva el tono formal del título mejor que una paráfrasis más libre.
- source_word: ἀγαλλιάσεται
  english_pob_choice: will exult
  chosen_spanish: se alegrará
  alternatives_spanish:
  - exultará
  - se regocijará
  lexicon: BDAG
  rationale: En español, «exultar» puede sonar demasiado marcado o menos natural en una línea poética breve. «Se alegrará» comunica el gozo futuro del verbo, aunque con un matiz algo menos intenso que el griego; se prefiere por legibilidad pública.
- source_word: μεγαλοσύνην
  english_pob_choice: greatness
  chosen_spanish: grandeza
  alternatives_spanish:
  - majestad
  - magnificencia
  lexicon: BDAG
  rationale: «Grandeza» es el equivalente más directo y transparente para el sustantivo, y encaja bien con el contexto doxológico sin imponer un matiz más técnico que el griego no exige.
- source_word: καὶ ἡ ψυχή μου τῷ βασιλεῖ τοῦ οὐρανοῦ
  english_pob_choice: and my soul exults in the King of heaven
  chosen_spanish: y mi alma se exalta en el Rey del cielo
  alternatives_spanish:
  - y mi alma se alegra en el Rey del cielo
  - y mi alma está para el Rey del cielo
  lexicon: BDAG
  rationale: El griego conservado es elíptico en esta cláusula. Siguiendo la decisión inglesa de suplir un verbo de alabanza, «se exalta en» mantiene el paralelismo poético y la dirección hacia el Rey del cielo sin cerrar de forma excesiva la ambigüedad sintáctica.
theological_decisions:
- issue: Cláusula media elíptica sin verbo explícito
  english_pob_reading: Treat the clause as a poetic ellipsis expressing praise/rejoicing toward the King of heaven
  chosen_spanish_reading: Tratar la cláusula como una elipsis poética que expresa exaltación gozosa hacia el Rey del cielo
  alternative_spanish_readings:
  - 'Entenderla como una cláusula nominal: «y mi alma es para el Rey del cielo»'
  - 'Suplir otro verbo: «y mi alma alaba al Rey del cielo»'
  rationale: La sintaxis griega no da un verbo explícito en el segmento medio. En una traducción pública conviene conservar la elipsis de fondo y, al mismo tiempo, hacerla legible con una forma verbal que respete el contexto de alabanza. «Se exalta en» deja ver la tensión entre la construcción transmitida y el sentido probable, sin resolverla de manera artificial.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión textual y documentar la ambigüedad real'
translation_notes:
  revision_awareness: El texto inglés revisado cambió de «rejoices in» a «exults in» en la cláusula media y de una futura «it will exult» a «it will rejoice» para reflejar mejor el matiz verbal. En español se optó por mantener la intensidad del inicio y de la cláusula media con un verbo de exaltación, y por expresar el futuro final con una forma natural de gozo («se alegrará») que conserva el objeto «en su grandeza».
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y «Rey del cielo» como título formal de Dios, en armonía con el estilo del proyecto.
  - «Alma» conserva el registro poético de ψυχή sin sustituirlo por una paráfrasis antropológica.
  - «Grandeza» sigue el valor amplio de μεγαλοσύνην y evita cargar el término con una connotación litúrgica más fuerte que la del griego.
