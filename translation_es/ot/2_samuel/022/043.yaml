translation:
  language: es
  text: Los trituré como el polvo de la tierra; como el lodo de las calles los machaqué y los pisoteé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «los extendí» para el verbo final; el hebreo puede llevar el sentido de golpear hasta aplanar o extender.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶשְׁחָקֵם
  english_pob_choice: I crushed them
  chosen_spanish: Los trituré
  alternatives_spanish:
  - Los quebré
  - Los molí
  lexicon: HALOT
  rationale: El verbo שׁחק en este contexto expresa acción de pulverizar o aplastar con fuerza. «Los trituré» comunica bien esa violencia y mantiene una imagen natural en español sin suavizar el sentido.
- source_word: כַּעֲפַר אָרֶץ
  english_pob_choice: like the dust of the earth
  chosen_spanish: como el polvo de la tierra
  alternatives_spanish:
  - como el polvo del suelo
  - como el polvo de la tierra
  lexicon: HALOT
  rationale: עפר designa polvo o tierra suelta. «Polvo de la tierra» conserva la construcción genitiva del hebreo y suena bíblico pero claro en español.
- source_word: כְּטִיט חוּצוֹת
  english_pob_choice: like the mud of the streets
  chosen_spanish: como el lodo de las calles
  alternatives_spanish:
  - como el barro de las calles
  - como el fango de las calles
  lexicon: HALOT
  rationale: טיט es lodo/barro, y חוצות se refiere a calles o lugares públicos. «Lodo de las calles» es natural en español y mantiene la imagen urbana del texto.
- source_word: אֲדִקֵּם
  english_pob_choice: I pounded them
  chosen_spanish: los machaqué
  alternatives_spanish:
  - los aplasté
  - los pulvericé
  lexicon: HALOT
  rationale: El Hiphil de דקק tiene la idea de reducir a pedazos o machacar. En español, «machaqué» conserva la progresión de violencia del paralelismo y evita repetir exactamente «trituré».
- source_word: אֶרְקָעֵם
  english_pob_choice: trampled them down
  chosen_spanish: los pisoteé
  alternatives_spanish:
  - los aplasté bajo mis pies
  - los extendí
  lexicon: HALOT
  rationale: רקע puede aludir a golpear, apisonar o extender. En este contexto bélico, «los pisoteé» transmite la imagen de ser tratados como barro bajo los pies. La posibilidad de «los extendí» queda reflejada en la nota.
translation_notes:
  revision_awareness: El texto inglés POB se mantuvo estable en la última revisión y el control cruzado reporta alta concordancia; no se registraron cambios posteriores que requieran ajuste de esta propuesta española.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto, pero este versículo no lo contiene.
  - 'Se preserva el paralelismo verbal con tres acciones fuertes en español: «trituré», «machaqué» y «pisoteé».'
  - Se evita «SEÑOR» porque no aparece en el hebreo de este verso y no hay razón para enmascarar el léxico original.
  - La nota [a] se ancla en «pisoteé» para reflejar la ambigüedad del último verbo.
