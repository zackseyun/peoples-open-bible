translation:
  language: es
  text: Y los inicuos[a] fueron contenidos por temor a él, y todos los que trabajan la iniquidad[b] fueron confundidos, y la liberación[c] prosperó en su mano[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sin ley». El griego ἄνομοι se relaciona léxicamente con ἀνομία más adelante en el versículo; «los inicuos» busca conservar esa relación en español con un giro natural.
    reason: lexical_alternative
  - marker: b
    text: O «los que practican la iniquidad». La expresión griega conserva la imagen de quienes “trabajan” la iniquidad, no solo de malhechores en general.
    reason: lexical_alternative
  - marker: c
    text: O «la salvación». El griego σωτηρία puede significar «liberación» o «salvación»; aquí el contexto favorece el sentido de rescate o liberación.
    reason: lexical_alternative
  - marker: d
    text: 'Modismo bíblico: «en su mano» indica agencia, poder o medio de acción.'
    reason: cultural_note
lexical_decisions:
- source_word: οἱ ἄνομοι
  english_pob_choice: the lawless
  chosen_spanish: los impíos
  alternatives_spanish:
  - los sin ley
  - los inicuos
  lexicon: BDAG/LSJ
  rationale: ἄνομος y el grupo ἀνομία señalan a quienes viven sin sujeción a la ley divina; en español, 'impíos' comunica bien esa oposición moral y mantiene un registro bíblico natural. Se evita 'sin ley' por sonar demasiado literal y menos idiomático.
- source_word: συνεστάλησαν
  english_pob_choice: were restrained
  chosen_spanish: fueron contenidos
  alternatives_spanish:
  - fueron restringidos
  - fueron refrenados
  - fueron frenados
  lexicon: LSJ
  rationale: El verbo pasivo sugiere quedar contenido, reducido o refrenado por presión. 'Fueron contenidos' conserva la pasividad y el efecto de freno sin sonar mecánico en español.
- source_word: ἀπὸ τοῦ φόβου αὐτοῦ
  english_pob_choice: because of fear of him
  chosen_spanish: por el temor de él
  alternatives_spanish:
  - a causa del temor de él
  - porque le temieron
  lexicon: LSJ
  rationale: La construcción expresa causa. 'Por el temor de él' es breve y fiel, y mantiene el sustantivo 'temor' que refleja el sustantivo griego φόβος.
- source_word: οἱ ἐργάται τῆς ἀνομίας
  english_pob_choice: the workers of lawlessness
  chosen_spanish: los que trabajan la iniquidad
  alternatives_spanish:
  - los trabajadores de la iniquidad
  - los practicantes de la iniquidad
  lexicon: BDAG/LSJ
  rationale: Se conserva la imagen concreta de 'trabajar' y la raíz de ἀνομία con 'iniquidad' para dar una frase bíblica comprensible en español. 'Los trabajadores de la iniquidad' suena demasiado literal y menos natural; 'los que trabajan la iniquidad' reproduce mejor la construcción.
- source_word: συνεταράχθησαν
  english_pob_choice: were thrown into confusion
  chosen_spanish: fueron llenos de confusión
  alternatives_spanish:
  - fueron turbados
  - fueron agitados
  - fueron trastornados
  lexicon: LSJ
  rationale: El verbo indica agitación y desorden. 'Fueron llenos de confusión' expresa el resultado interno y narrativo de manera clara; se evita 'terror' porque el griego aquí apunta más a perturbación que a miedo puro.
- source_word: εὐωδώθη
  english_pob_choice: prospered
  chosen_spanish: prosperó
  alternatives_spanish:
  - tuvo éxito
  - avanzó
  - fue prosperada
  lexicon: LSJ
  rationale: El pasivo de εὐωδέω significa prosperar o tener éxito. 'Prosperó' coincide con la decisión inglesa y funciona bien en español bíblico.
- source_word: σωτηρία
  english_pob_choice: deliverance
  chosen_spanish: la salvación
  alternatives_spanish:
  - la liberación
  - el rescate
  - la salvación/liberación
  lexicon: BDAG/LSJ
  rationale: Aunque el contexto histórico-militar favorece la idea de rescate, en español 'salvación' permite conservar la amplitud semántica del término sin reducirlo de antemano a una victoria militar. Dado el ecosistema bíblico de la frase, se deja abierta la resonancia teológica y narrativa.
- source_word: ἐν χειρὶ αὐτοῦ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - por su mano
  - por medio de él
  lexicon: BDAG/LSJ
  rationale: Se mantiene el modismo hebraizante/griego 'en su mano', que comunica agencia y poder bajo un registro bíblico reconocible. No se reemplaza por una paráfrasis explicativa para no perder la textura del original.
theological_decisions:
- issue: σωτηρία en un contexto histórico-militar y su posible carga soteriológica
  english_pob_reading: deliverance
  chosen_spanish_reading: la salvación
  alternative_spanish_readings:
  - la liberación
  - el rescate
  rationale: El contexto inmediato habla del efecto de Judas sobre sus enemigos y del éxito que acompañó su acción; por eso el inglés optó por 'deliverance'. En español, 'salvación' conserva el campo semántico amplio y la posible resonancia bíblica, aunque aquí no se entiende como una doctrina abstracta separada del evento histórico.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve source sense in context'
- issue: La frase idiomática 'en su mano' como expresión de agencia
  english_pob_reading: The phrase 'in his hand' is a biblical idiom meaning that success came through his agency or power.
  chosen_spanish_reading: en su mano
  alternative_spanish_readings:
  - por su mano
  - por medio de él
  rationale: Se retiene el modismo para reflejar el texto fuente y su imaginería bíblica. En español, la expresión sigue siendo entendible y no requiere desambiguación en el cuerpo del texto, aunque la nota puede explicitar su sentido.
  doctrine_reference: 'Translation philosophy: preserve source texture while remaining intelligible'
translation_notes:
  revision_awareness: El borrador sigue la revisión final del audit trail inglés al reflejar συνεστάλησαν con un verbo de contención más que con una imagen de desplazamiento físico. También toma en cuenta que el inglés ajustó la primera cláusula desde 'driven back' a 'restrained', por lo que el español evita una lectura demasiado militarizada y prefiere 'fueron contenidos'.
  spanish_consistency_notes:
  - Se mantuvo la repetición léxica del campo ἀνομ- con 'impíos' / 'iniquidad' para no borrar la cohesión del verso, aunque en español no se puede reproducir exactamente la raíz.
  - Se usó 'salvación' en el texto principal y se dejó constancia de las alternativas 'liberación' y 'rescate' porque el contexto histórico inclina la lectura, pero la amplitud semántica del término merece quedar visible.
  - Se conservó el modismo 'en su mano' por fidelidad a la textura bíblica y para armonizar con el registro del resto del pasaje.
  - Se prefirió un español natural y publicable, evitando calcos como 'trabajadores de la iniquidad' que sonarían extraños en lectura pública.
