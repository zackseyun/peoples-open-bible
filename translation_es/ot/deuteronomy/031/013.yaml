revisions:
- from: Y sus hijos[a], que no han conocido[b], oirán y aprenderán a temer a Yahvé, su Dios, todos los días que vivan sobre la tierra que ustedes están cruzando el Jordán para tomar posesión de ella[c].
  to: Y sus hijos[a], que no han conocido, oirán y aprenderán a temer a Yahvé[b] su Dios, todos los días que vivan en la tierra que ustedes están cruzando el Jordán para tomar posesión de ella[c].
  rationale: 'Se corrige la documentación para que refleje el audit trail inglés: la nota sobre YHWH vuelve a anclarse en Yahvé, se elimina la nota impropia sobre "que no han conocido", se quita la coma en "Yahvé su Dios", y se mejora la naturalidad territorial con "en la tierra". Se mantiene el resto del sentido y la terminología clave del proyecto.'
  reviewer_model: gpt-5.4
