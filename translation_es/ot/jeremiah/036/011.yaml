translation:
  language: es
  text: Y Micaías, hijo de Gemarías, hijo de Safán, oyó todas las palabras de Yahvé[a] del rollo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  lexicon: HALOT
  rationale: El verbo hebreo indica la recepción de lo que se leía; en español, «oyó» conserva el hecho de percibir el contenido sin sugerir necesariamente atención prolongada como «escuchó».
- source_word: מִכָיְהוּ
  english_pob_choice: Micaiah
  chosen_spanish: Micaías
  alternatives_spanish:
  - Micaiah
  - Miqueas
  lexicon: Convención onomástica bíblica española
  rationale: Se adopta la forma española bíblica más reconocible y natural, manteniendo la identificación del nombre propio sin transliteración innecesaria.
- source_word: בֶן גְּמַרְיָהוּ בֶן שָׁפָן
  english_pob_choice: son of Gemariah, son of Shaphan
  chosen_spanish: hijo de Gemarías, hijo de Safán
  alternatives_spanish:
  - hijo de Gemarías, hijo de Sefán
  lexicon: Convención patronímica bíblica española
  rationale: Se conserva la cadena patronímica tal como aparece en el hebreo para mantener la identificación genealógica. «Safán» sigue la forma bíblica española habitual.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todos
  - el conjunto de
  lexicon: HALOT
  rationale: «Todas» concuerda con «las palabras» y refleja la fuerza de totalidad de כָּל sin volver la frase pesada.
- source_word: דִּבְרֵי יְהוָה
  english_pob_choice: the words of Yahweh
  chosen_spanish: las palabras de Yahvé
  alternatives_spanish:
  - las palabras de Yahweh
  - las palabras del Señor
  lexicon: HALOT
  rationale: Se traduce el Tetragrámaton como «Yahvé», conforme a la pauta del proyecto. «Palabras» conserva el valor concreto de דִּבְרֵי sin paráfrasis.
- source_word: מֵעַל הַסֵּפֶר
  english_pob_choice: from the scroll
  chosen_spanish: desde el rollo
  alternatives_spanish:
  - del rollo
  - desde el libro
  lexicon: HALOT
  rationale: El hebreo presenta la lectura desde un documento escrito; «rollo» refleja mejor el contexto antiguo que «libro». «Desde» reproduce de manera natural el origen de lo oído.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue la norma del proyecto de usar una transliteración del Nombre divino en el texto principal. En español, «Yahvé» ofrece una forma tradicional, legible y coherente con el valor del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto inglés fue revisado sin cambios sustanciales; la traducción española mantiene el sentido directo del hebreo y adapta únicamente la onomástica y el Nombre divino a la norma editorial española del proyecto.
  spanish_consistency_notes:
  - Se mantiene la coordinación entre «oyó» y «las palabras» para evitar una lectura demasiado interpretativa.
  - Se usa «rollo» en vez de «libro» por el contexto de lectura pública de un documento antiguo.
  - Se preserva la cadena genealógica completa, sin omitir el segundo «hijo de».
  - La nota [a] marca explícitamente la decisión sobre el Nombre divino para conservar la trazabilidad textual.
