translation:
  language: es
  text: Ahora ve[a], y yo estaré con tu boca y te enseñaré lo que has de hablar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «con tu boca».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Pues ahora
  lexicon: HALOT
  rationale: Conserva el valor discursivo-temporal de introducción inmediata; en español, «Ahora» suena natural y solemne sin añadir matiz causal no explícito.
- source_word: לֵךְ
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - vete
  - anda
  lexicon: HALOT
  rationale: Imperativo breve y directo, equivalente al mandato simple del hebreo. «Ve» mantiene la concisión del original mejor que una expansión.
- source_word: וְאָנֹכִי אֶהְיֶה
  english_pob_choice: and I will be
  chosen_spanish: y yo estaré
  alternatives_spanish:
  - y yo mismo estaré
  - y estaré
  lexicon: HALOT
  rationale: El pronombre independiente אנכי añade énfasis; «yo estaré» lo refleja mejor que una forma impersonal. «Estaré» conserva la promesa de presencia divina.
- source_word: עִם פִּיךָ
  english_pob_choice: with your mouth
  chosen_spanish: con tu boca
  alternatives_spanish:
  - con tu boca al hablar
  - con tu hablar
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de la boca, no una paráfrasis abstracta como «hablar». Esto preserva la fuerza corporal y el foco en la dificultad de habla de Moisés.
- source_word: וְהוֹרֵיתִיךָ
  english_pob_choice: and teach you
  chosen_spanish: y te enseñaré
  alternatives_spanish:
  - y te instruiré
  - y te mostraré
  lexicon: HALOT
  rationale: El hifil de ירה aquí expresa instrucción; «enseñar» es la equivalencia natural y clara en español, compatible con el contenido que sigue.
- source_word: אֲשֶׁר תְּדַבֵּר
  english_pob_choice: what you shall speak
  chosen_spanish: lo que has de hablar
  alternatives_spanish:
  - lo que hablarás
  - lo que debes hablar
  lexicon: HALOT
  rationale: «Has de hablar» comunica futuro con matiz de encargo/obligación, cercano al valor del hebreo y al registro formal de la revisión inglesa. «Hablar» conserva דבר mejor que «decir».
theological_decisions:
- issue: Presencia divina en el acto de hablar
  english_pob_reading: I will be with your mouth
  chosen_spanish_reading: yo estaré con tu boca
  alternative_spanish_readings:
  - estaré contigo al hablar
  - te ayudaré a hablar
  rationale: Se conserva la formulación concreta y algo tensa del hebreo, evitando suavizarla en una explicación dinámica. La promesa es de acompañamiento y habilitación divina en la misma facultad del habla.
  doctrine_reference: 'Translation philosophy #3, preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa pasó de «what you are to speak» a «what you shall speak» para un registro más formal; en español se reflejó esa formalidad con «lo que has de hablar», manteniendo además la concreción de «con tu boca» documentada en la nota. No se introdujeron lecturas doctrinales ajenas al hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma estándar del proyecto, pero este versículo no contiene el Tetragrámaton ni requiere explicitarlo.
  - Se prefirió «boca» en lugar de «habla» para sostener la imagen corporal del hebreo.
  - «Hablar» se mantuvo para respetar דבר y evitar la neutralización hacia «decir».
