lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo. «Entonces» conserva la secuencia del relato en un español natural, sin perder el valor progresivo del verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. En el proyecto español se preserva como «Yahvé» para mantener la transparencia textual y la coherencia con la política terminológica.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición en esta fórmula de introducción del discurso se expresa de manera directa y natural con «a» en español.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moysés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español, plenamente reconocible y fiel al referente original.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y dijo
  lexicon: HALOT
  rationale: Se conserva la función introductoria del infinitivo constructo como marcador explícito de habla. En español, «diciendo» reproduce esa señal sin omitirla, siguiendo la revisión inglesa que restauró «saying».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El versículo contiene el Tetragrama. Se mantiene el nombre divino personal en vez de sustituirlo por un título, de acuerdo con la lectura auditada del POB en inglés y la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió explícitamente «saying» para reflejar לֵאמֹר. En español se preserva esa misma transparencia mediante «diciendo», evitando omitir el marcador de habla. No hay variantes textuales; el pasaje está en alto acuerdo entre revisiones.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en el texto principal.
  - 'Se usa una estructura narrativa sobria y publicable: «Entonces Yahvé dijo a Moisés, diciendo:».'
  - No se agrega nota al pie porque no hay una alternativa semántica o textual que requiera anclaje en este versículo.
