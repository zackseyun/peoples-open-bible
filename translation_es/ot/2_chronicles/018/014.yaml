  yaml_path: translation/ot/2_chronicles/018/014.yaml
  text: So he came to the king[a], and the king said to him, “Micaiah, should we go to Ramoth-gilead for battle, or should I refrain?” And he said, “Go up and prosper, and they will be given into your hand.”
  footnotes:
