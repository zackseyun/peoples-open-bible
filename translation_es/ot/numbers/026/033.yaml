- from: Y Zelofehad hijo de Hefer no tuvo hijos[a], sino solo hijas; y los nombres de las hijas de Zelofehad fueron Mahlá, Noa, Joglá, Milcá[b] y Tirzá.
  to: Ahora Zelofehad hijo de Hefer no tuvo hijos varones[a], sino solo hijas; y los nombres de las hijas de Zelofehad fueron Mahlá, Noa, Hoglá, Milcá[b] y Tirsá.
  rationale: Se revisa 'no tuvo hijos' a 'no tuvo hijos varones' para preservar el contraste semántico del hebreo con 'hijas'. Se mejora la fluidez inicial con 'Ahora', en línea con el inglés POB 'Now'. Se corrige la nota literal para que sea español correcto. Se ajusta 'Joglá' a 'Hoglá' y 'Tirzá' a 'Tirsá' para una transliteración española más natural y reconocible, manteniendo la nota sobre Noa.
