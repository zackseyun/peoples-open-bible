translation:
  language: es
  text: Mantente en guardia y ten cuidado[a], y no andes con hombres violentos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «porque caminas con tu caída» o «con tu ruina». El testimonio hebreo, en cambio, dice: «no andes con hombres violentos».'
    reason: textual_variant
lexical_decisions:
- source_word: הִשָּׁמֵר
  english_pob_choice: Be on guard
  chosen_spanish: Mantente en guardia
  alternatives_spanish:
  - Estate alerta
  - Guárdate
  - Pon atención
  lexicon: HALOT
  rationale: El imperativo nifal de שמר expresa vigilancia sobre uno mismo. «Mantente en guardia» conserva la fuerza reflexiva y es natural en español contemporáneo.
- source_word: וֶהְיֵה זָהִיר
  english_pob_choice: and be careful
  chosen_spanish: y ten cuidado
  alternatives_spanish:
  - y sé cauteloso
  - y sé prudente
  - y mantente muy atento
  lexicon: HALOT
  rationale: זָהִיר apunta a cautela y cuidado. «Ten cuidado» comunica bien la advertencia sin añadir una intensificación no explícita en el hebreo, en línea con la revisión inglesa que eliminó «very».
- source_word: וְאַל תִּתְהַלֵּךְ
  english_pob_choice: and do not walk
  chosen_spanish: y no andes
  alternatives_spanish:
  - y no camines
  - y no te acompañes
  - y no vayas
  lexicon: HALOT
  rationale: El hitpael de הלך puede significar andar/conducirse. «No andes» conserva la metáfora de conducta y suena idiomático en español.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - entre
  - junto a
  lexicon: HALOT
  rationale: La preposición expresa compañía o asociación; «con» reproduce ese vínculo de manera directa.
- source_word: אַנְשֵׁי חָמָס
  english_pob_choice: violent men
  chosen_spanish: hombres violentos
  alternatives_spanish:
  - hombres de violencia
  - hombres injustos
  - malhechores
  lexicon: HALOT
  rationale: חָמָס denota violencia o injusticia violenta. «Hombres violentos» es la opción más directa y mantiene el término concreto del hebreo, con concordancia masculina explícita.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego en la segunda cola
  english_pob_reading: 'Follow the extant Hebrew: ''do not walk with violent men,'' while allowing the Greek parallel to sharpen the intensity of the warning in the first colon.'
  chosen_spanish_reading: 'Seguir el hebreo conservado: «y no andes con hombres violentos», dejando que el paralelo griego refuerce la seriedad de la advertencia en la primera mitad.'
  alternative_spanish_readings:
  - 'Según el griego: «porque caminas con tu caída» o «con tu ruina»'
  rationale: El testimonio hebreo disponible ofrece una admonición sapiencial completa y coherente. El griego difiere sustancialmente en la segunda cola, pero no debe desplazar al testimonio primario donde éste se conserva; sí puede influir en el tono intensivo del mandato inicial.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando Sirácida se conserva; usar el paralelo griego como insumo real sin sustituir la base principal.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail que eliminó un intensificador no explícito en זָהִיר; por eso se evita añadir «muy» y se mantiene un tono de cautela sobrio. Se conserva además la divergencia textual documentada entre el hebreo y el griego mediante nota.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo exige; aquí no aplica.
  - «Hombres violentos» preserva la concreción moral del hebreo y evita suavizar חָמָס.
  - La metáfora de andar/conducirse se mantiene con «no andes», sin convertirla en una paráfrasis abstracta.
