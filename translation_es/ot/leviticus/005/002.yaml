  to: O si alguna persona toca cualquier cosa inmunda—ya sea el cadáver de un animal silvestre inmundo, o el cadáver de ganado inmundo, o el cadáver de una criatura inmunda que pulula—y le está oculto[a], y él está inmundo y se hace culpable[b],
  rationale: Se corrige la categoría de שֶׁרֶץ para no reducirla a un mero animal rastrero, y se reubica la nota [a] al segmento donde el POB documentó la alternativa léxica principal ('le está oculto'). También se pule levemente la redacción para mayor naturalidad y precisión formal en español, sin apartarse del hebreo ni del razonamiento auditado en inglés.
