translation:
  language: es
  text: Porque muestras tu fuerza cuando no se cree en la plenitud de tu poder[a], y entre los que la conocen reprendes la audacia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando eres puesto en duda respecto de la plenitud de tu poder». El griego es compacto y puede apuntar tanto a incredulidad dirigida a Dios como a duda respecto de la plenitud de su poder.'
    reason: alternative_reading
  - marker: b
    text: '«Audacia» aquí tiene sentido negativo: insolencia o presunción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰσχὺν
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - fortaleza
  lexicon: LSJ
  rationale: ἰσχύς designa fuerza o vigor. 'Fuerza' es natural en español y ayuda a distinguirla de δύναμις, que aparece después en la frase.
- source_word: ἐνδείκνυσαι
  english_pob_choice: you show
  chosen_spanish: muestras
  alternatives_spanish:
  - demuestras
  - manifiestas
  lexicon: LSJ
  rationale: El verbo significa mostrar o demostrar. 'Muestras' conserva la acción directa y suena fluido en español sin perder el matiz declarativo.
- source_word: ἀπιστούμενος
  english_pob_choice: when your perfect power is disbelieved
  chosen_spanish: cuando se niega
  alternatives_spanish:
  - cuando se desconfía de
  - cuando no se cree en
  lexicon: LSJ
  rationale: El participio pasivo/comunicativo apunta a que la plenitud del poder divino no es creída. 'Se niega' mantiene la tensión del texto sin precisar demasiado si el sujeto de la incredulidad es Dios mismo o su poder.
- source_word: ἐπὶ δυνάμεως τελειότητι
  english_pob_choice: the perfection of your power
  chosen_spanish: la plenitud de tu poder
  alternatives_spanish:
  - la perfección de tu poder
  - el poder en su plenitud
  - el poder completo
  lexicon: LSJ
  rationale: La expresión griega habla de la perfección o plenitud del poder. 'Plenitud' comunica bien esa idea en español y evita una dureza excesiva de 'perfección' en este contexto poético.
- source_word: ἐν τοῖς εἰδόσι
  english_pob_choice: among those who know it
  chosen_spanish: entre los que la conocen
  alternatives_spanish:
  - entre los que lo conocen
  - en medio de los que saben
  lexicon: LSJ
  rationale: La construcción indica una esfera o grupo. 'Entre los que la conocen' hace explícito el objeto implícito conocido, es decir, esa plenitud/poder divino, y conserva el sentido de comunidad.
- source_word: τὸ θράσος
  english_pob_choice: boldness
  chosen_spanish: la audacia
  alternatives_spanish:
  - la insolencia
  - la temeridad
  - el atrevimiento
  lexicon: LSJ
  rationale: θράσος puede tener sentido negativo de audacia insolente. 'Audacia' funciona en español como término más formal y mantiene la carga negativa que exige el contexto de reprensión.
- source_word: ἐξελέγχεις
  english_pob_choice: you rebuke
  chosen_spanish: reprendes
  alternatives_spanish:
  - reprochas
  - expones
  - convences
  lexicon: LSJ
  rationale: El verbo puede significar reprender, rebatir o poner en evidencia. 'Reprendes' refleja bien el tono moral de corrección y se ajusta al paralelismo con 'la audacia'.
theological_decisions:
- issue: Referente y fuerza de la cláusula sobre la incredulidad y el poder divino
  english_pob_reading: God shows strength when the perfection of his power is disbelieved.
  chosen_spanish_reading: Dios muestra su fuerza cuando se niega la plenitud de su poder.
  alternative_spanish_readings:
  - Dios muestra su fuerza cuando no se cree en la plenitud de su poder.
  - Dios muestra su fuerza cuando él mismo es puesto en duda respecto de la plenitud de su poder.
  rationale: El griego es comprimido y puede leerse con el foco en la incredulidad hacia Dios o hacia la plenitud de su poder. La redacción española conserva esa tensión sin resolverla de forma interpretativa.
  doctrine_reference: Principio POB de preservar la tensión teológica cuando el original no la resuelve explícitamente.
- issue: Matiz negativo de θράσος
  english_pob_reading: Boldness here carries a negative sense such as audacity or insolence.
  chosen_spanish_reading: audacia
  alternative_spanish_readings:
  - insolencia
  - temeridad
  - atrevimiento
  rationale: En este contexto, θράσος no es valor positivo sino presunción que merece reprensión. 'Audacia' en español puede llevar ese matiz negativo y encaja con 'reprendes'.
  doctrine_reference: Uso contextual de léxico negativo para preservar la evaluación moral del texto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que acercó la frase al valor de ἐπὶ δυνάμεως τελειότητι como 'the perfection of your power' y prefirió un verbo de reprensión para ἐξελέγχεις. La versión española conserva esa dirección semántica con 'la plenitud de tu poder' y 'reprendes'.
  spanish_consistency_notes:
  - Se usó 'Dios' implícito por el discurso sapiencial, sin añadir un sujeto explícito no presente en el verso.
  - Se prefirió 'fuerza' para ἰσχύς y 'poder' para δύναμις, manteniendo la distinción léxica.
  - Se evitó 'Cristo/Mesías' porque no interviene en este pasaje.
  - Se mantuvo un español sobrio y litúrgicamente legible, sin calco rígido del griego.
