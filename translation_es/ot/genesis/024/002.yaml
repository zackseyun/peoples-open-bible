revisions:
- from: 'Y Abraham dijo a su esclavo[a], el mayor de su casa, que gobernaba sobre todo lo que era suyo[b]: «Te ruego que pongas tu mano debajo de mi muslo».'
  to: 'Y Abraham dijo a su siervo, el mayor de su casa, que gobernaba sobre todo lo que le pertenecía[b]: «Te ruego que pongas tu mano debajo de mi muslo[a]».'
  rationale: Se cambió «esclavo» por «siervo» para seguir la decisión contextual auditada del POB sobre עַבְדּוֹ en este pasaje. Se reubicó la nota cultural al gesto de la mano bajo el muslo, que es el elemento que explica. También se pulió «todo lo que era suyo» a «todo lo que le pertenecía» para un español más natural sin pérdida de sentido.
