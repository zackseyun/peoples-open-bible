lexical_decisions:
- source_word: יַסֹּר / יִסְּרַנִּי
  english_pob_choice: has surely disciplined me
  chosen_spanish: ciertamente me disciplinó
  alternatives_spanish:
  - me corrigió con firmeza
  - me castigó severamente
  - me disciplinó
  lexicon: HALOT
  rationale: La forma intensiva del verbo יסר pide en español un refuerzo adverbial que conserve la intensidad sin sonar mecánico. "Ciertamente" reproduce bien el énfasis del infinitivo absoluto y "disciplinó" conserva el matiz correctivo/formativo que el audit trail prefirió frente a un mero castigo.
- source_word: יָּהּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - el SEÑOR
  - Yahvé
  lexicon: HALOT
  rationale: El hebreo usa la forma poética breve del nombre divino, no el tetragrama completo. Por eso se conserva "Yah" en transliteración, distinguiéndolo de Yahvé y evitando nivelar el registro poético del texto.
- source_word: לַמָּוֶת
  english_pob_choice: to death
  chosen_spanish: a la muerte
  alternatives_spanish:
  - hasta la muerte
  - a muerte
  lexicon: HALOT
  rationale: La preposición con ל expresa dirección o entrega hacia la muerte. En español, "entregar a la muerte" comunica con claridad la idea de ser dejado en manos de la muerte, sin forzar una paráfrasis.
- source_word: נְתָנָנִי
  english_pob_choice: has not given me over
  chosen_spanish: no me entregó
  alternatives_spanish:
  - no me dio
  - no me entregó a
  lexicon: HALOT
  rationale: 'נתן con objeto personal y complemento con ל admite el sentido de "entregar/poner en manos de". "Entregó" preserva mejor esa fuerza que un simple "dio", y en la frase completa queda claro el complemento implícito: no me entregó a la muerte.'
theological_decisions:
- issue: La forma breve del nombre divino יָהּ en un salmo de alabanza/acción de gracias
  english_pob_reading: Yah ... The Hebrew uses the short poetic divine name 'Yah.'
  chosen_spanish_reading: Yah ... El hebreo usa la forma poética breve del nombre divino.
  alternative_spanish_readings:
  - el SEÑOR
  - Yahvé
  rationale: 'La decisión no es doctrinal sino lexical: la fuente hebrea distingue la forma breve poética de la forma plena del nombre divino. Mantener "Yah" en español preserva esa distinción y el tono del versículo.'
  doctrine_reference: 'DOCTRINE.md: Traducir títulos; transliterar nombres; tabla de términos controvertidos para יְהוָה'
translation_notes:
  revision_awareness: El pasaje fue revisado en la fuente inglesa sin cambios, y el control cruzado reporta alta concordancia; la versión española sigue esa lectura estable sin introducir decisiones no respaldadas por el hebreo o por el audit trail inglés.
  spanish_consistency_notes:
  - Se conserva la distinción entre la forma breve del nombre divino "Yah" y el nombre pleno "Yahvé".
  - '"Disciplinó" se usa en sentido correctivo, no meramente punitivo, en armonía con la decisión inglesa.'
  - '"Entregó a la muerte" expresa el valor de נתן + ל con complemento de destino.'
  - La puntuación mantiene un contraste claro entre disciplina y no ser entregado a la muerte.
