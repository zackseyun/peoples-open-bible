translation:
  language: es
  text: 'Así dice el Señor Yahvé: Ningún extranjero[a], incircunciso de corazón e incircunciso de carne, no entrará en mi santuario; ningún extranjero que esté entre los hijos de Israel[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ningún hijo de tierra extraña». El modismo hebreo significa «extranjero».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «entre los hijos de Israel»; es decir, entre el pueblo de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto es lo que dice
  - Así ha dicho
  lexicon: HALOT
  rationale: Fórmula profética estándar; «Así dice» conserva el tono solemne y directo sin volverlo demasiado arcaico.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Soberano Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la convención del proyecto, y «Señor» traduce אֲדֹנָי en una combinación natural en español. «Señor Yahvé» evita la duplicación «Señor SEÑOR» y mantiene la distinción reverencial del título compuesto.
- source_word: כָּל בֶּן נֵכָר
  english_pob_choice: No foreigner
  chosen_spanish: Ningún extranjero
  alternatives_spanish:
  - Ningún hijo de tierra extraña
  - Ningún forastero
  lexicon: HALOT
  rationale: El modismo hebreo designa a un extranjero/forastero, no literalmente a un hijo masculino de otra tierra. «Ningún extranjero» comunica con naturalidad el alcance negativo de כָּל con la prohibición.
- source_word: עֶרֶל לֵב
  english_pob_choice: uncircumcised in heart
  chosen_spanish: incircunciso de corazón
  alternatives_spanish:
  - incircunciso en el corazón
  - de corazón incircunciso
  lexicon: HALOT
  rationale: Se mantiene el valor idiomático y metafórico de la expresión. «De corazón» suena más natural en español que un calco rígido y conserva el contraste interior.
- source_word: וְעֶרֶל בָּשָׂר
  english_pob_choice: and uncircumcised in flesh
  chosen_spanish: e incircunciso de carne
  alternatives_spanish:
  - e incircunciso en la carne
  - e incircunciso en el cuerpo
  lexicon: HALOT
  rationale: «Carne» preserva el paralelo con «corazón» y refleja el referente corporal concreto de בָּשָׂר sin suavizarlo a «cuerpo». Se usa «e» por eufonía antes de «incircunciso».
- source_word: לֹא יָבֹוא
  english_pob_choice: shall enter
  chosen_spanish: entrará
  alternatives_spanish:
  - no entrará
  - no podrá entrar
  lexicon: HALOT
  rationale: En español, la prohibición legal se expresa de manera más natural con futuro simple. Mantiene el valor normativo y declarativo del hebreo.
- source_word: אֶל מִקְדָּשִׁי
  english_pob_choice: my sanctuary
  chosen_spanish: en mi santuario
  alternatives_spanish:
  - a mi santuario
  - dentro de mi santuario
  lexicon: HALOT
  rationale: מִקְדָּשׁ puede referirse al recinto sagrado; «en mi santuario» es claro y idiomático en español. El posesivo conserva la relación personal con Yahvé.
- source_word: לְכָל בֶּן נֵכָר אֲשֶׁר בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  english_pob_choice: of any foreigner who is among the sons of Israel
  chosen_spanish: ningún extranjero que esté entre los hijos de Israel
  alternatives_spanish:
  - de cualquier extranjero que esté entre los hijos de Israel
  - de todo extranjero que esté entre los hijos de Israel
  lexicon: HALOT
  rationale: 'La revisión inglesa resaltó la fuerza inclusiva de לְכָל; en español se vierte con una repetición enfática: «ningún extranjero... ningún extranjero». «Hijos de Israel» conserva la expresión corporativa del hebreo, y «que esté entre» refleja בְּתוֹךְ como pertenencia/midst sin sobreinterpretar.'
theological_decisions:
- issue: Renderización del nombre divino יְהוִה dentro del título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Soberano Yahvé
  rationale: El texto hebreo usa el Tetragrámaton, y la política del proyecto pide «Yahvé» como forma principal en español. Al combinarlo con אֲדֹנָי se evita una repetición poco natural y se preserva el peso reverencial del título compuesto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de la exclusión de «extranjero»
  english_pob_reading: The verse excludes foreigners characterized as uncircumcised in heart and flesh from entering the sanctuary.
  chosen_spanish_reading: El versículo excluye a extranjeros caracterizados como incircuncisos de corazón y de carne de entrar en el santuario.
  alternative_spanish_readings:
  - El versículo excluye a todos los extranjeros sin excepción
  - La frase se refiere solo a un grupo específico de residentes foráneos
  rationale: La sintaxis hebrea presenta las marcas de incircuncisión como una caracterización del extranjero en vista. La traducción conserva esa estructura sin ampliar ni restringir indebidamente el grupo excluido.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó la clausula final para reflejar mejor לְכָל בֶּן נֵכָר אֲשֶׁר בְּתוֹךְ בְּנֵי יִשְׂרָאֵל. Por eso el español evita una mera repetición appositiva y conserva el empuje inclusivo de la expresión final con «ningún extranjero que esté entre los hijos de Israel».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según la terminología base del proyecto.
  - Se tradujo בָּשָׂר con «carne» para conservar el paralelismo con «corazón».
  - Se evitó «Cristo» o vocabulario eclesiástico tradicional no presente en el hebreo.
  - Las comillas y el orden siguen un estilo publicable y sobrio, adecuado para lectura bíblica.
