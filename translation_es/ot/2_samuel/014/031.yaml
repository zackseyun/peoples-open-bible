translation:
  language: es
  text: 'Entonces Joab se levantó y fue a casa de Absalón, y le dijo[a]: «¿Por qué tus siervos han prendido fuego a mi parcela?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, más literalmente: «¿Por qué tus siervos prendieron fuego a la parcela que me pertenece, con fuego?». En español se expresa de forma idiomática como «prender fuego a mi parcela».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: Then Joab arose
  chosen_spanish: Entonces Joab se levantó
  alternatives_spanish:
  - Entonces Joab se alzó
  - Así que Joab se levantó
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol pide una sucesión temporal. «Se levantó» transmite con naturalidad el inicio de la acción; evita un calco innecesariamente rígido y conserva el avance narrativo de «Then ... arose».
- source_word: וַיָּבֹא אֶל אַבְשָׁלוֹם הַבָּיְתָה
  english_pob_choice: went to Absalom’s house
  chosen_spanish: fue a casa de Absalón
  alternatives_spanish:
  - fue a la casa de Absalón
  - llegó a la casa de Absalón
  lexicon: HALOT
  rationale: El directional he indica movimiento hacia la casa. «A casa de Absalón» es una equivalencia natural en español y conserva la meta del desplazamiento sin sobrerrepresentar detalles no explícitos en la sintaxis hebrea.
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué motivo
  - ¿Por qué razón
  lexicon: HALOT
  rationale: Interrogativo directo. «¿Por qué?» es la forma más natural y exacta en español.
- source_word: הִצִּיתוּ
  english_pob_choice: have ... set ... on fire
  chosen_spanish: han prendido fuego
  alternatives_spanish:
  - han incendiado
  - han quemado
  lexicon: HALOT
  rationale: El causativo de יצת expresa iniciar el fuego. «Prender fuego» preserva ese valor causativo mejor que «quemar», que en español puede sonar más resultativo que iniciador.
- source_word: עֲבָדֶךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus hombres
  lexicon: HALOT
  rationale: Aunque la forma es singular con sufijo, el verbo plural exige referente colectivo. «Siervos» mantiene la relación de subordinación y es un equivalente más cercano al campo semántico de עבד que «servidores»; evita suavizarlo en exceso con «hombres».
- source_word: הַחֶלְקָה
  english_pob_choice: my field
  chosen_spanish: mi parcela
  alternatives_spanish:
  - mi terreno
  - mi campo
  lexicon: HALOT
  rationale: חֶלְקָה designa una porción o parcela de tierra. «Parcela» conserva la idea de un lote definido; «campo» puede sonar más amplio de lo que exige el hebreo.
- source_word: אֲשֶׁר לִי
  english_pob_choice: my
  chosen_spanish: que es mía
  alternatives_spanish:
  - que me pertenece
  - que es de mí
  lexicon: HALOT
  rationale: La relativa marca posesión explícita. En español conviene mantenerla de modo claro con «que es mía», evitando perder el énfasis posesivo del hebreo.
- source_word: בָּאֵשׁ
  english_pob_choice: on fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - en fuego
  - ardiendo
  lexicon: HALOT
  rationale: El beth puede señalar medio o instrumento. Mantener «con fuego» conserva la nota semántica de medio; en esta cláusula se complementa con «han prendido fuego», para reflejar tanto la acción causativa como el medio.
translation_notes:
  revision_awareness: La versión inglesa POB fue revisada y se mantuvo sin cambios. El español sigue esa misma lectura de alta concordancia, conservando el valor narrativo de la secuencia verbal, la posesión explícita del terreno y la fuerza causativa del verbo hebreo para «prender fuego».
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se eligió «siervos» para reflejar el campo semántico de עבד sin forzar una lectura más fuerte que la del contexto cortesano.
  - Se prefirió una solución idiomática para el desplazamiento («fue a casa de Absalón») sin perder la referencia a la residencia.
  - La nota al pie marca la alternativa más literal del sintagma final, porque el español requiere ajustar el orden y la preposición para sonar natural.
