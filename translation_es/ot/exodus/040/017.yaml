  to: Y sucedió en el primer mes del segundo año, el primer día del mes[a], que el tabernáculo fue erigido[b].
  rationale: 'Se reubicaron y corrigieron las notas para alinearlas con el hebreo y con el rastro auditado en inglés: la alternativa de datación pertenece a בְּאֶחָד לַחֹדֶשׁ y la alternativa verbal a הוּקַם. También se ajustó el verbo principal a «fue erigido» para reflejar mejor la alternativa documentada del inglés («was erected»), manteniendo un español natural y digno.'
