translation:
  language: es
  text: Sabiduría escondida y tesoro oculto, ¿qué provecho hay en ambos[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de forma más idiomática, «¿qué provecho hay en cualquiera de los dos?». El griego ἐν ἀμφοτέροις se refiere formalmente a los dos elementos juntos; el texto principal conserva ese sentido colectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - conocimiento
  lexicon: LSJ
  rationale: En literatura sapiencial, σοφία se refiere de manera natural a la sabiduría; 'sabiduría' conserva el valor temático y la oposición con 'tesoro' sin rebajar el sentido.
- source_word: κεκρυμμένη
  english_pob_choice: hidden
  chosen_spanish: escondida
  alternatives_spanish:
  - oculta
  - encubierta
  lexicon: LSJ
  rationale: El participio perfecto pasivo indica algo que ha sido puesto fuera de vista. 'Escondida' es idiomático en español y mantiene la idea de una sabiduría no accesible.
- source_word: θησαυρός
  english_pob_choice: treasure
  chosen_spanish: tesoro
  alternatives_spanish:
  - riqueza
  - depósito de bienes
  lexicon: LSJ
  rationale: θῆσαυρός designa un tesoro o depósito valioso; 'tesoro' reproduce con naturalidad la imagen concreta del texto griego.
- source_word: ἀφανής
  english_pob_choice: unseen
  chosen_spanish: invisible
  alternatives_spanish:
  - no visto
  - oculto
  lexicon: LSJ
  rationale: Aquí ἀφανής contrasta con lo que no puede percibirse; 'invisible' expresa bien la falta de presencia a la vista y evita repetir exactamente la idea de 'escondida'.
- source_word: τίς ὠφέλεια
  english_pob_choice: what benefit is there
  chosen_spanish: ¿qué provecho hay?
  alternatives_spanish:
  - ¿qué beneficio hay?
  - ¿qué utilidad tiene?
  lexicon: LSJ
  rationale: ὠφέλεια pregunta por la utilidad o ganancia práctica. 'Provecho' comunica esa evaluación con tono bíblico y natural en español.
- source_word: ἐν ἀμφοτέροις
  english_pob_choice: in either of them
  chosen_spanish: en ambos
  alternatives_spanish:
  - en los dos
  - en cualquiera de los dos
  lexicon: LSJ
  rationale: El griego se refiere a los dos elementos considerados juntos. 'En ambos' conserva ese sentido y evita la pérdida que produciría una formulación meramente distributiva.
theological_decisions:
- issue: Valor retórico de la pregunta final
  english_pob_reading: The Greek ἐν ἀμφοτέροις refers to the two items together; the English main text uses idiomatic 'either of them' while the footnote preserves the more formal 'both'.
  chosen_spanish_reading: La traducción principal mantiene 'en ambos', porque el griego apunta a los dos elementos en conjunto.
  alternative_spanish_readings:
  - ¿qué provecho hay en cualquiera de los dos?
  - ¿qué provecho hay en uno u otro?
  rationale: 'No hay una tensión doctrinal, sino retórica: el proverbio pregunta por la utilidad de sabiduría y tesoro cuando permanecen inaccesibles. El español principal debe conservar el valor colectivo del dativo plural.'
  doctrine_reference: Sabiduría sapiencial; no aplica una doctrina específica
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés no introdujo cambios; el pasaje quedó con alta concordancia y sin ajustes adicionales. La versión española sigue de cerca el griego y el audit trail inglés, manteniendo el paralelismo entre sabiduría y tesoro y la pregunta final en sentido colectivo.
  spanish_consistency_notes:
  - Se usó 'sabiduría' para σοφία, en continuidad con la terminología sapiencial estable del proyecto.
  - Se eligió 'tesoro' para θησαυρός por su valor concreto y paralelo con 'sabiduría'.
  - Se evitó 'SEÑOR' o cualquier sustitución no pertinente, ya que no aparece el nombre divino en este versículo.
  - La nota al pie conserva la alternativa más literal sobre 'ambos' para transparentar la fuerza del griego.
