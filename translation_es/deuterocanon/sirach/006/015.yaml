translation:
  language: es
  text: No hay precio para un amigo fiel[a], y no hay manera de pesar su valor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «un amigo fiel»; el hebreo dice más literalmente «un amante de la fidelidad», pero en contexto probablemente se refiere a un amigo caracterizado por la fidelidad.'
    reason: alternative_reading
  - marker: b
    text: 'Griego: «no hay medida de su hermosura» (o «nobleza»). El texto principal sigue el hebreo, que aquí apunta a su valor o valía.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאוֹהֵב אֱמוּנָה / φίλου πιστοῦ
  english_pob_choice: for a faithful friend
  chosen_spanish: un amigo fiel
  alternatives_spanish:
  - uno que ama la fidelidad
  - un amigo digno de confianza
  lexicon: HALOT; LXX φίλου πιστοῦ
  rationale: El hebreo literal sería «para un amante de fidelidad», pero el paralelo griego explicita «amigo fiel». En español, «amigo fiel» conserva el sentido contextual de Sirácida 6:14–16 y suena natural y digno de publicación.
- source_word: אֵין מְחִיר / οὐκ ἔστιν ἀντάλλαγμα
  english_pob_choice: there is no price
  chosen_spanish: No hay precio
  alternatives_spanish:
  - no tiene precio
  - no hay equivalente
  - no hay intercambio
  lexicon: HALOT; BDAG
  rationale: «Precio» reproduce bien el valor de מְחִיר y el matiz de ἀντάλλαγμα como valor de intercambio o equivalente. La frase española mantiene la fuerza proverbial de incomparabilidad.
- source_word: מִשְׁקָל / σταθμός
  english_pob_choice: weighing
  chosen_spanish: medida
  alternatives_spanish:
  - pesaje
  - balanza
  - peso
  lexicon: HALOT; LSJ
  rationale: Para un texto fluido en español, «no hay medida» expresa la misma idea que no puede ser pesado o medido. Aunque el hebreo y el griego usan la imagen de pesar, «medida» comunica la imposibilidad de cuantificar su valor.
- source_word: לְטוֹבָתוֹ / τῆς καλλονῆς αὐτοῦ
  english_pob_choice: his worth
  chosen_spanish: su valor
  alternatives_spanish:
  - su worth
  - su bondad
  - su excelencia
  - su hermosura
  lexicon: HALOT; LSJ
  rationale: El pasaje hebreo apunta a su «bondad/beneficio», pero la revisión inglesa concluyó que el contexto favorece «worth». En español, «valor» conserva la idea de valía y permite abarcar tanto el hebreo como la sugerencia griega de belleza/nobleza sin perder el sentido principal.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al traducir לְטוֹבָתוֹ como «su valor»/«su valor» en lugar de «su bondad», manteniendo la estructura paralela y la lectura proverbial. La nota griega se preserva como alternativa léxica, no como corrección del texto principal.
  spanish_consistency_notes:
  - Se usó «amigo fiel» para armonizar con el paralelo griego y el contexto inmediato de amistad leal en Sirácida 6:14–16.
  - Se evitó «siervo» o terminología eclesiástica ajena al pasaje.
  - La construcción «No hay precio... / no hay medida...» conserva el paralelismo semítico sin sonar calcada.
  - «Valor» se eligió para abarcar la noción hebrea de beneficio/valía y la posibilidad griega de hermosura/nobleza.
