review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: Jacob da a aquel lugar el nombre Betel, en contraste con el nombre anterior de la ciudad, Luz. También preserva la nota léxica sobre el significado del topónimo. Sin embargo, la expresión principal «llamó el nombre de» suena poco natural en español y no cumple bien la meta de legibilidad, aunque intenta calcar la forma hebrea auditada.'
  spanish_quality_summary: El texto es claro en conjunto, pero «Y llamó el nombre de aquel lugar» resulta demasiado rígido y poco idiomático en español contemporáneo eclesial. Una formulación como «Y llamó a aquel lugar Betel» conserva fielmente el acto de nombrar y mejora notablemente la naturalidad. El resto del versículo lee bien; el punto y coma puede simplificarse con coma para flujo más natural.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Betel» y «Luz» están bien; la nota «casa de Dios» concuerda con la justificación léxica. No intervienen términos teológicos sensibles del glosario principal.
  issues:
  - severity: medium
    issue: Calco poco natural de la construcción hebrea en «llamó el nombre de aquel lugar»
    rationale: Aunque el hebreo dice literalmente «llamó el nombre de», en español esa estructura suena forzada. La instrucción del proyecto pide evitar calcos de madera cuando la gramática española se vuelve antinatural. «Llamó a aquel lugar Betel» preserva el mismo significado de nombrar.
  - severity: low
    issue: Puntuación algo pesada con punto y coma
    rationale: La relación contrastiva introducida por «pero» se entiende bien con coma en español. No es un error, pero una puntuación más ligera mejora la lectura.
  revised_spanish_text: Y llamó a aquel lugar Betel[a], pero antes el nombre de la ciudad era Luz.
  revised_footnotes:
  - marker: a
    text: Betel significa «casa de Dios».
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase principal para evitar un calco hebraizante poco natural en español, sin perder el sentido auditado de «nombrar». Se conserva el contraste temporal sobre Luz y la nota léxica del topónimo.
