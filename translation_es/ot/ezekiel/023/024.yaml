  text: וּ/בָ֣אוּ עָלַ֡יִ/ךְ הֹ֠צֶן רֶ֤כֶב וְ/גַלְגַּל֙ וּ/בִ/קְהַ֣ל עַמִּ֔ים צִנָּ֤ה וּ/מָגֵן֙ וְ/קוֹבַ֔ע יָשִׂ֥ימוּ עָלַ֖יִ/ךְ סָבִ֑יב וְ/נָתַתִּ֤י לִ/פְנֵי/הֶם֙ מִשְׁפָּ֔ט וּ/שְׁפָט֖וּ/ךְ בְּ/מִשְׁפְּטֵי/הֶֽם׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/023/024.yaml
  text: They will come against you with weapons[a], chariots, and wagons, and with an assembly of peoples. They will set shield and buckler and helmet against you on every side, and I will set judgment before them[d][c][b], and they will judge you by their judgments.
  footnotes:
  - marker: a
    text: The Hebrew term rendered 'troops' is rare and uncertain; it may also be understood as 'host,' 'army,' or possibly military equipment.
    reason: lexical_alternative
  - marker: b
    text: Or 'wheels'; the Hebrew likely refers to wheeled military vehicles, hence 'wagons.'
    reason: lexical_alternative
  - marker: c
    text: 'The two Hebrew shield terms are distinct: ''shield'' and ''buckler'' render different kinds of defensive gear.'
    reason: lexical_alternative
  - marker: d
    text: Or 'they will judge you according to their laws/standards.'
    reason: alternative_reading
  ai_draft:
