    rationale: 'El texto de la nota dice: «O: “por amor de su pueblo Israel”, si el posesivo “su” se toma como referido a David y no a Yahvé». Eso no presenta una alternativa distinta; la alternativa debe explicitar «del pueblo de David» o equivalente, como en el inglés auditado: «for the sake of David''s people Israel».'
  - severity: low
    issue: «Por amor de» es menos natural en español contemporáneo neutral.
    rationale: Aunque es posible y fiel en sentido amplio, «por el bien de» expresa más claramente el valor de beneficio/provecho de בַּעֲבוּר para una audiencia hispana moderna, sin introducir paráfrasis excesiva.
  revised_spanish_text: Y David supo que Yahvé lo había establecido como rey sobre Israel[a], y que había exaltado su reino por el bien de su pueblo Israel.
