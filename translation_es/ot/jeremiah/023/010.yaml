revisions:
- from: Porque la tierra está llena de adúlteros[a]; a causa de la maldición la tierra se lamenta, y los pastizales del desierto se secan. Su curso[b] es malo, y su poder no es así[c].
  to: Porque la tierra está llena de adúlteros; a causa de la maldición[a] la tierra se lamenta, y los pastizales del desierto se han secado. Su curso[b] es malo, y su poder no es recto[c].
  rationale: Se corrigió el anclaje de la nota sobre אָלָה para que aparezca en «maldición», donde realmente corresponde. Se cambió «se secan» por «se han secado» para reflejar mejor el valor resultativo de יָבְשׁוּ. Se sustituyó «su poder no es así» por «su poder no es recto» para hacer inteligible en español la negación moral y elíptica de לֹא כֵן, en línea con la decisión principal documentada por el POB, manteniendo la alternativa más literal en nota.
