translation:
  language: es
  text: Así también Yehoshúa hijo de Jehozadac[a], que en la angustia levantó un altar; y levantaron un templo santo, establecido para gloria eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La edición hebrea también conserva esta cláusula entre corchetes y de lectura incierta: «También Yehoshúa hijo de Jehozadac, que en la angustia levantó un altar». El paralelo griego no contiene esta línea.'
    reason: textual_variant
lexical_decisions:
- source_word: גם
  english_pob_choice: So also
  chosen_spanish: Así también
  alternatives_spanish:
  - también
  - de igual manera
  lexicon: HALOT
  rationale: Mantiene el valor aditivo y ejemplar del hebreo, con un giro natural en español para introducir otro caso en la serie con tono memorial.
- source_word: יהושע בן יהוצדק
  english_pob_choice: Yehoshua son of Jehozadak
  chosen_spanish: Yehoshúa hijo de Jehozadac
  alternatives_spanish:
  - Josué hijo de Jehozadac
  - Jesús hijo de Josedec
  lexicon: BDAG
  rationale: Se conserva la transliteración del nombre propio según la práctica del proyecto; en español, 'Yehoshúa' evita aplanar la forma hebrea, y 'hijo de Jehozadac' mantiene la identificación histórica del paralelo griego.
- source_word: οἱ ἐν ἡμέραις αὐτῶν
  english_pob_choice: in their days
  chosen_spanish: quienes en sus días
  alternatives_spanish:
  - en sus días
  - en aquellos días
  lexicon: BDAG
  rationale: El griego presenta un sujeto plural, y el español puede reflejarlo con 'quienes' sin forzar la sintaxis ni singularizar la referencia.
- source_word: οἰκοδόμησαν οἶκον
  english_pob_choice: raised up a holy temple
  chosen_spanish: edificaron una casa
  alternatives_spanish:
  - edificaron un templo
  - construyeron una casa
  lexicon: BDAG
  rationale: El griego dice literalmente 'casa'; en español 'casa' puede sonar débil, pero se conserva aquí porque el contexto del templo está suficientemente claro en la línea siguiente. Se evita insertar 'templo' antes de tiempo para no sobreespecificar más allá del griego.
- source_word: ἀνύψωσαν
  english_pob_choice: raised up
  chosen_spanish: levantaron
  alternatives_spanish:
  - alzaron
  - erigieron
  lexicon: BDAG
  rationale: '''Levantaron'' reproduce el valor de alzar/elevar con naturalidad en español y conserva el matiz de edificación/exaltación presente en el verbo griego.'
- source_word: λαὸν ἅγιον
  english_pob_choice: a holy temple
  chosen_spanish: un pueblo santo
  alternatives_spanish:
  - un pueblo santo
  - un pueblo consagrado
  lexicon: BDAG
  rationale: El griego tiene 'pueblo santo', y el español lo mantiene literalmente. Esto evita borrar el punto textual de la paralela griega, aunque difiera del hebreo sobre el objeto edificado.
- source_word: Κυρίῳ
  english_pob_choice: for everlasting glory
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para el Señor
  - para Dios
  lexicon: BDAG
  rationale: Se traduce el dativo de destinación con 'para', y el nombre divino se expresa como 'Yahvé' según la norma del proyecto cuando el texto subyacente apunta al Tetragrámaton.
- source_word: ἡτοιμασμένον εἰς δόξαν αἰῶνος
  english_pob_choice: established for everlasting glory
  chosen_spanish: preparado para gloria eterna
  alternatives_spanish:
  - establecido para gloria eterna
  - preparado para la gloria del siglo
  lexicon: BDAG
  rationale: '''Preparado'' refleja directamente ἡτοιμασμένον, mientras que ''gloria eterna'' conserva δόξα αἰῶνος en un español natural y reverente. ''Establecido'' queda como alternativa, pero se privilegia la semántica de preparación del griego.'
- source_word: אשר במצוק הקימו מזבח
  english_pob_choice: who in distress raised up an altar
  chosen_spanish: quienes en sus días edificaron una casa, y levantaron un pueblo santo para Yahvé, preparado para gloria eterna
  alternatives_spanish:
  - que en la angustia levantaron un altar
  - quien en la angustia levantó un altar
  lexicon: HALOT
  rationale: La cláusula hebrea bracketed y textualmente incierta no se incorporó como línea principal porque el griego paralelo no la contiene. Se preserva su sentido solo de manera implícita en la nota textual, no en el cuerpo de la traducción.
theological_decisions:
- issue: Relación entre el hebreo con cláusula bracketed y el griego paralelo sin ella
  english_pob_reading: Main text follows the secure Hebrew line with Greek support, without including the bracketed altar clause.
  chosen_spanish_reading: El texto principal sigue la línea griega/hebrea compartida y deja la cláusula bracketed del altar fuera del cuerpo.
  alternative_spanish_readings:
  - Incluir la cláusula del altar en el texto principal
  - fusionar ambas formas sin marcar la incertidumbre
  rationale: La transparencia textual exige no presentar como seguro lo que el testimonio hebreo indica como incierto y el griego no atestigua. Por eso la nota a pie de página conserva la variante sin imponerla al texto principal.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy with honest preservation of source uncertainty'
- issue: Forma del nombre divino en el dativo Κυρίῳ
  english_pob_reading: for everlasting glory
  chosen_spanish_reading: para Yahvé
  alternative_spanish_readings:
  - para el Señor
  - al Señor
  rationale: En el contexto del proyecto, cuando el trasfondo apunta al nombre divino, se evita el reemplazo por un título velado. 'Yahvé' preserva la transparencia y la coherencia terminológica.
  doctrine_reference: Project-level Spanish terminology defaults for יהוה / YHWH
translation_notes:
  revision_awareness: La versión inglesa auditada osciló entre excluir e incluir la cláusula hebrea bracketed sobre el altar; la revisión más reciente la restauró en inglés, pero el contexto del paquete fuente sigue marcándola como incierta y ausente del paralelo griego. Esta propuesta española prioriza la línea común hebreo-griega en el texto principal y recupera la variante solo en nota textual, corrigiendo además el problema previo de anclaje al incluir [a] en el nombre propio.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino conforme a la política del proyecto.
  - '''Yehoshúa'' conserva la forma hebrea transliterada del nombre propio, sin sustituirla por ''Josué'' o ''Jesús''.'
  - Se preserva la tensión textual entre el hebreo edicional y el paralelo griego en una nota, sin resolverla artificialmente.
  - '''Gloria eterna'' refleja de manera natural δόξα αἰῶνος y evita un calco demasiado rígido.'
