base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/040/042.yaml
  text: And four tables for the burnt offering were of cut stone[a], a cubit and a half long, a cubit and a half wide, and one cubit high[b]. On them they placed the implements with which they slaughtered the burnt offering and the sacrifice.
  footnotes:
