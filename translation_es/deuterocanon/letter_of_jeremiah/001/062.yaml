translation:
  language: es
  text: Y el fuego enviado desde arriba, para consumir montes y bosques, hace lo que le fue dispuesto[a]; pero estos no son comparables a él ni en apariencia ni en poder[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hace lo que le fue ordenado». La expresión griega puede indicar lo que ha sido dispuesto, arreglado o mandado.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no han sido hechos semejantes a él» o «no son asemejados a él», ni en apariencia ni en poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: πῦρ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  - incendio
  lexicon: LSJ
  rationale: «Fuego» es la correspondencia directa y natural para πῦρ, y conserva el contraste con los ídolos en el contexto.
- source_word: ἐξαποσταλὲν ἄνωθεν
  english_pob_choice: sent from above
  chosen_spanish: enviado desde arriba
  alternatives_spanish:
  - enviado desde lo alto
  - despachado desde arriba
  lexicon: LSJ
  rationale: «Desde arriba» reproduce ἄνωθεν sin añadir explícitamente «cielo» o «Dios», manteniendo la implicación de origen superior que el griego sugiere.
- source_word: ἐξαναλῶσαι
  english_pob_choice: to consume
  chosen_spanish: consumir
  alternatives_spanish:
  - destruir por completo
  - quemar
  lexicon: LSJ
  rationale: 'El infinitivo expresa propósito: el fuego actúa para consumir. «Consumir» conserva el matiz de destrucción por el fuego sin sobrerrepresentarlo.'
- source_word: ὄρη καὶ δρυμούς
  english_pob_choice: mountains and forests
  chosen_spanish: montes y bosques
  alternatives_spanish:
  - montañas y bosques
  - montes y selvas
  lexicon: LSJ
  rationale: «Montes» es un equivalente natural y amplio para ὄρη en español bíblico, y «bosques» traduce δρυμούς con claridad contemporánea sin perder la imagen de terreno arbolado.
- source_word: ποιεῖ τὸ συνταχθέν
  english_pob_choice: does what it was appointed to do
  chosen_spanish: hace lo que le fue asignado
  alternatives_spanish:
  - hace lo que le fue ordenado
  - cumple lo que fue dispuesto
  lexicon: LSJ
  rationale: τὸ συνταχθέν puede abarcar lo dispuesto/ordenado/nombrado. «Le fue asignado» mantiene la idea de tarea determinada sin forzar un registro burocrático y sin perder la agencia pasiva.
- source_word: οὔτε ταῖς ἰδέαις
  english_pob_choice: either in appearance
  chosen_spanish: ni en apariencia
  alternatives_spanish:
  - ni en forma
  - ni en aspecto
  lexicon: LSJ
  rationale: «Apariencia» refleja bien ἰδέα como aspecto visible, con un español claro y natural.
- source_word: οὔτε ταῖς δυνάμεσιν
  english_pob_choice: or in power
  chosen_spanish: ni en poder
  alternatives_spanish:
  - ni en fuerza
  - ni en capacidad
  lexicon: LSJ
  rationale: «Poder» es la equivalencia directa y mantiene el contraste de eficacia/energía activa frente a los ídolos.
- source_word: ἀφωμοιωμένα
  english_pob_choice: comparable
  chosen_spanish: se le asemejan
  alternatives_spanish:
  - son comparables a él
  - son semejantes a él
  lexicon: LSJ
  rationale: El participio pasivo perfecto expresa ser hecho semejante. En español, la construcción negativa «no se le asemejan» conserva la relación comparativa sin sonar forzada.
theological_decisions:
- issue: Origen implícito del fuego "desde arriba"
  english_pob_reading: Retain 'from above' without explicitly adding 'from heaven' or 'from God'.
  chosen_spanish_reading: Mantener «desde arriba» sin explicitar «del cielo» o «de Dios».
  alternative_spanish_readings:
  - desde el cielo
  - enviado por Dios
  rationale: El griego ἄνωθεν sugiere un origen superior, probablemente divino en el contexto, pero no lo nombra de manera explícita en esta cláusula. La traducción preserva esa reserva.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto sigue el pasaje griego de Swete (LXX 1909) y el audit trail inglés con su lectura óptima; no se requieren ajustes adicionales respecto de la revisión más reciente.
  spanish_consistency_notes:
  - Se prefirió el binomio «montes y bosques» por naturalidad en español bíblico y fidelidad a ὄρη καὶ δρυμούς.
  - Se evitó introducir «cielo» o «Dios» en el texto principal para respetar la cautela del griego y del POB inglés.
  - «Poder» mantiene el paralelismo con «apariencia» y refleja δύναμις en sentido de eficacia activa.
  - La construcción negativa con «no se le asemejan» preserva el valor comparativo de ἀφωμοιωμένα sin recurrir a un calco rígido.
