    rationale: La nota explica una alternativa para בְּתוֹךְ בְּנֵי יִשְׂרָאֵל («entre/en medio de los hijos de Israel»), pero actualmente aparece junto a «mujer israelita». Esto distorsiona la evidencia fuente y la documentación del POB.
  - severity: medium
    issue: «Riñeron» se aparta de la elección principal documentada «fought».
    rationale: Aunque el hebreo permite disputa o pelea, el POB inglés eligió «fought» por el contexto narrativo. En español, «pelearon» mantiene mejor esa fuerza y deja «riñeron» o «disputaron» como alternativas en nota.
  - severity: low
    issue: La nota [b] puede simplificarse para priorizar la alternativa semántica secundaria.
    rationale: Si el texto principal se corrige a «pelearon», la nota debe ofrecer alternativas reales al principal, por ejemplo «riñeron» o «disputaron», en vez de repetir la opción principal.
