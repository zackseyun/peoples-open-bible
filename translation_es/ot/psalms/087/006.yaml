translation:
  language: es
  text: 'Yahvé contará[a], cuando registre a los pueblos: «Este nació allí». Selah'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más contextualmente, «en ella», refiriéndose a Sion en los versículos circundantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton según la norma del proyecto. «Yahvé» reproduce la forma personal del nombre y evita sustituirlo por un título.
- source_word: יִסְפֹּר
  english_pob_choice: will count
  chosen_spanish: contará
  alternatives_spanish:
  - contará
  - enumerará
  - hará el conteo
  lexicon: HALOT
  rationale: El verbo ספר en qal significa básicamente «contar». En español, «contará» mantiene ese valor léxico y funciona con naturalidad en la construcción profética.
- source_word: בִּכְתוֹב
  english_pob_choice: when he records
  chosen_spanish: cuando registre
  alternatives_spanish:
  - cuando escriba
  - al registrar
  - cuando anote
  lexicon: HALOT
  rationale: La construcción con ב e infinitivo tiene valor temporal. «Cuando registre» conserva la idea de inscribir en un registro sin forzar una paráfrasis más amplia.
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: a los pueblos
  alternatives_spanish:
  - a las naciones
  - a los pueblos
  lexicon: HALOT
  rationale: El plural עמים se refiere a diversos pueblos. «Pueblos» es más amplio y menos cargado que «naciones» en español bíblico contemporáneo.
- source_word: זֶה
  english_pob_choice: This one
  chosen_spanish: Este
  alternatives_spanish:
  - Este
  - Esta persona
  - Este hombre
  lexicon: HALOT
  rationale: El demostrativo masculino singular se traduce con un simple «Este», que en español mantiene la deixis individual sin añadir un sustantivo inexistente en el hebreo.
- source_word: יֻלַּד
  english_pob_choice: was born
  chosen_spanish: nació
  alternatives_spanish:
  - nació
  - fue nacido
  lexicon: HALOT
  rationale: El pasivo de ילד se expresa de manera natural como «nació» en español. Evita una pasiva menos idiomática y conserva la afirmación de origen.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allí
  - ahí
  - en ella
  lexicon: HALOT
  rationale: Se mantiene el adverbio locativo del hebreo. «Allí» deja abierta la referencia contextual a Sion, como hace el texto fuente.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Selah
  lexicon: HALOT
  rationale: El término litúrgico se translitera porque su valor exacto es incierto y traducirlo excedería la evidencia.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue el default del proyecto para יהוה. «Yahvé» preserva el nombre pactual sin enmascararlo con una sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Referencia espacial de שָׁם
  english_pob_reading: there
  chosen_spanish_reading: allí
  alternative_spanish_readings:
  - en ella
  - en Sion
  rationale: El hebreo expresa un adverbio locativo, no una frase preposicional explícita. «Allí» preserva la tensión contextual sin resolver de más la referencia a Sion.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Alineado con la última revisión indicada como sin cambios; no se introducen modificaciones textuales respecto del audit trail base, solo su traslado a español con terminología consistente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se conservó «Selah» sin traducir por tratarse de un término litúrgico incierto.
  - «Pueblos» y no «naciones» refleja mejor el plural רחב de עמים en este contexto.
  - La nota de pie preserva la alternativa contextual de «en ella» sin borrar la literalidad del adverbio hebreo.
