    reason: lexical_alternative
translation:
  language: ko
  text: 베뢰아 사람들은 데살로니가 사람들보다 더 신실하여, 말씀을 모든 열심으로 받았으며, 이러한 일들이 그러한가 하여 날마다 성경을 살폈습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐγενέστεροι
  english_pob_choice: more noble-minded
  chosen_korean: 더 신실하여
  alternatives_korean:
  - 더 고결하여
  - 더 너그러워
  lexicon: BDAG
  rationale: εὐγενής는 본디 「귀족 출신」이나, 여기서는 비유적으로 「열린 마음·고결한 성품」을 가리킨다. 한국 전통 번역의 「신사적」 보다는 「신실하다(공정·진실)」가 본문의 「성경을 살피는」 행위와 잘 어울린다.
