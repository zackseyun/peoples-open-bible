    rationale: Aunque el borrador defiende «vuelve … sobre», en español la combinación con «oprobio» resulta algo dura. El hebreo expresa reversión/retorno; «Haz volver» conserva bien el valor causativo y mejora la legibilidad.
  - severity: medium
    issue: «sobre su propia cabeza» debería reflejar el plural «sobre sus propias cabezas».
    rationale: El hebreo tiene sufijo plural en רֹאשָׁם y el audit trail inglés explicitó «their own heads». El singular colectivo no es imposible, pero aquí reduce innecesariamente la imagen distributiva de retribución.
  - severity: low
    issue: La nota [b] ofrece «devuelve» y «haz volver», que son mejores opciones que la forma escogida en el texto principal.
    rationale: Hay una leve tensión entre la mejor solución idiomática reconocida en la nota y la forma principal menos natural. Conviene alinear nota y texto.
