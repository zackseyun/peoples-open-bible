translation:
  language: es
  text: 'He oído ciertamente a Efraín lamentándose: «Tú me disciplinaste[a], y fui disciplinado, como un becerro sin adiestrar. Hazme volver, y volveré[b], porque tú eres Yahvé mi Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lamentándose de sí mismo»; el participio hebreo puede sugerir un lamento audible y reflexivo.
    reason: lexical_alternative
  - marker: b
    text: O «Hazme volver, y me volveré». El hebreo repite el verbo «volver/retornar» en ambas cláusulas.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמ֣וֹעַ שָׁמַ֗עְתִּי
  english_pob_choice: I have surely heard
  chosen_spanish: He oído ciertamente
  alternatives_spanish:
  - He oído sin duda
  - Oí con certeza
  lexicon: HALOT
  rationale: La duplicación infinitivo absoluto + verbo finito intensifica la afirmación; en español, «ciertamente» transmite bien la certeza sin forzar una repetición mecánica.
- source_word: אֶפְרַ֨יִם֙
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Nombre propio transliterado según el uso bíblico en español; conserva la personificación del pueblo del norte.
- source_word: מִתְנוֹדֵ֔ד
  english_pob_choice: bemoaning himself
  chosen_spanish: bemoanándose
  alternatives_spanish:
  - lamentándose
  - quejándose
  lexicon: HALOT
  rationale: El participio hitpolel puede sugerir lamento audible y un matiz reflexivo. «Bemoanarse» mantiene ese aspecto reflexivo mejor que «lamentarse» en este contexto penitencial, aunque es menos común.
- source_word: יִסַּרְתַּ֨/נִי֙
  english_pob_choice: You disciplined me
  chosen_spanish: Tú me disciplinaste
  alternatives_spanish:
  - Tú me corregiste
  - Tú me castigaste
  lexicon: HALOT
  rationale: יַסר expresa corrección disciplinaria, a menudo con tono formativo. «Disciplinaste» conserva el sentido pedagógico y la relación verbal con la forma pasiva siguiente.
- source_word: וָֽ/אִוָּסֵ֔ר
  english_pob_choice: and I was disciplined
  chosen_spanish: y fui disciplinado
  alternatives_spanish:
  - y acepté la disciplina
  - y fui corregido
  lexicon: HALOT
  rationale: La forma nifal es más naturalmente pasiva; «fui disciplinado» mantiene el eco léxico con la cláusula anterior y el sentido correctivo.
- source_word: כְּ/עֵ֖גֶל לֹ֣א לֻמָּ֑ד
  english_pob_choice: like an untrained calf
  chosen_spanish: como un becerro sin adiestrar
  alternatives_spanish:
  - como un becerro no enseñado
  - como un becerro indócil
  lexicon: HALOT
  rationale: «Sin adiestrar» reproduce la idea de no haber sido entrenado para el yugo o la obediencia, con un español natural y concreto.
- source_word: הֲשִׁיבֵ֣/נִי
  english_pob_choice: Turn me back
  chosen_spanish: Devuélveme
  alternatives_spanish:
  - Hazme volver
  - Vuélveme
  lexicon: HALOT
  rationale: El hifil de שוב implica causar el retorno. «Devuélveme» mantiene la fuerza imperativa de ser traído de vuelta; «Hazme volver» sería más explícito, pero menos conciso.
- source_word: וְ/אָשׁ֔וּבָה
  english_pob_choice: and I will return
  chosen_spanish: y volveré
  alternatives_spanish:
  - y volveré a ti
  - y me volveré
  lexicon: HALOT
  rationale: La cohorte volitiva expresa resolución/resultad​o de retorno. «Volveré» es natural y conserva el vínculo semántico con «Devuélveme».
- source_word: כִּ֥י אַתָּ֖ה יְהוָ֥ה אֱלֹהָֽ/י
  english_pob_choice: for you are Yahweh my God
  chosen_spanish: porque tú eres Yahvé, mi Dios
  alternatives_spanish:
  - pues tú eres Yahvé, mi Dios
  - porque tú eres Yahvé mi Dios
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» conforme a la convención del proyecto; la coma antes de «mi Dios» refleja la aposición/confesión personal del hebreo.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre divino. En español, el proyecto adopta «Yahvé» como forma principal para preservar el nombre de pacto sin sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El borrador sigue el último pase de revisión del inglés POB en dos puntos clave: conserva el matiz reflexivo de מִתְנוֹדֵד con una forma española igualmente reflexiva, y prefiere una traducción más literal de הֲשִׁיבֵנִי / וְאָשׁוּבָה que preserve la repetición verbal. También mantiene la decisión doctrinal de renderizar יְהוָה como «Yahvé».'
  spanish_consistency_notes:
  - Se usa «Efraín» como nombre propio personificado, no como glosa explicativa.
  - «Disciplinaste / fui disciplinado» conserva el eco verbal del hebreo.
  - Se evita «SEÑOR» para el Tetragrámaton conforme al estándar del proyecto.
  - La puntuación con comillas angulares es adecuada para español bíblico moderno.
