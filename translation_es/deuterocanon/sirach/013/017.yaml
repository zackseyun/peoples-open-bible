translation:
  language: es
  text: ¿Qué paz puede haber entre una hiena y un perro? ¿Qué paz puede haber entre un hombre rico y un hombre pobre?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «¿Qué compartirá un lobo con un cordero? Así un pecador con un hombre piadoso». El testimonio hebreo conservado aquí dice «hiena ... perro» y «hombre rico ... hombre pobre».'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵאַיִן
  english_pob_choice: What ... can there be
  chosen_spanish: ¿Qué paz puede haber...
  alternatives_spanish:
  - ¿De dónde puede haber...
  - ¿Cómo puede haber...
  lexicon: HALOT
  rationale: La expresión introduce una negación retórica de la posibilidad; en español, la fórmula '¿Qué paz puede haber...?' conserva bien ese valor sin sonar forzada.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - armonía
  - amistad
  lexicon: HALOT
  rationale: '''Paz'' es la equivalencia más directa y natural para relaciones pacíficas u armoniosas en este dicho sapiencial.'
- source_word: צָבוּעַ
  english_pob_choice: hyena
  chosen_spanish: hiena
  alternatives_spanish:
  - chacal
  - animal salvaje
  lexicon: HALOT
  rationale: En hebreo tardío y en Ben Sira, צבוע suele referirse a la hiena. Como el testimonio hebreo conservado aquí usa este animal, se traduce desde ese testimonio.
- source_word: כָּלֶב
  english_pob_choice: dog
  chosen_spanish: perro
  alternatives_spanish:
  - can
  - perro doméstico
  lexicon: HALOT
  rationale: Equivalente léxico directo y claro en español.
- source_word: עָשִׁיר
  english_pob_choice: rich man
  chosen_spanish: un hombre rico
  alternatives_spanish:
  - una persona rica
  - un rico
  lexicon: HALOT
  rationale: El hebreo es masculino singular, en paralelo con רָשׁ; 'un hombre rico' conserva esa forma y mantiene la simetría del proverbio.
- source_word: רָשׁ
  english_pob_choice: poor man
  chosen_spanish: un hombre pobre
  alternatives_spanish:
  - una persona pobre
  - un pobre
  lexicon: HALOT
  rationale: Mantiene el paralelo masculino singular y la contraposición social del dicho.
theological_decisions:
- issue: Divergencia entre la imagen hebrea conservada y el paralelo griego
  english_pob_reading: Main text follows Hebrew 'hyena ... dog'; footnote preserves Greek 'wolf ... lamb' and the moral contrast 'sinner ... godly man.'
  chosen_spanish_reading: El texto principal sigue la imagen hebrea 'hiena ... perro'; la nota conserva la alternativa griega 'lobo ... cordero' y el contraste moral 'pecador ... piadoso'.
  alternative_spanish_readings:
  - '''¿Qué comparte un lobo con un cordero? Así un pecador con un hombre piadoso.'''
  - '''¿Qué paz puede haber entre una hiena y un perro? ¿Qué paz puede haber entre un pecador y un hombre piadoso?'''
  rationale: La prioridad recae en el hebreo disponible, pero el griego atestigua una forma sustancialmente distinta que modifica el alcance interpretativo de lo social/económico a lo moral. Por eso la tensión no se resuelve en silencio; se preserva en nota.
  doctrine_reference: Principio de primacía de la fuente original con preservación de tensiones textuales; no armonizar sin base.
translation_notes:
  revision_awareness: El texto sigue la última revisión que eliminó una paráfrasis tipo 'así también' y repitió la pregunta retórica para reflejar mejor el paralelismo. En español se reproduce esa repetición con dos preguntas paralelas.
  spanish_consistency_notes:
  - Se usa 'paz' para שָׁלוֹם, coherente con el registro sapiencial.
  - Se traduce el testimonio hebreo principal, dejando la variante griega en nota para no ocultar la discrepancia.
  - Se mantiene la correspondencia masculina singular en 'un hombre rico / un hombre pobre'.
