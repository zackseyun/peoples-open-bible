base_translation:
  language: en
  yaml_path: translation/ot/job/018/014.yaml
  text: He is torn from the security of his tent[b][a], and he is marched off to the king of terrors.
  footnotes:
  - marker: a
    text: Or 'He is torn from his tent, his security'; the Hebrew may mean either that he is removed from the secure place of his tent or that the tent itself was his security.
    reason: lexical_alternative
  - marker: b
    text: '''The king of terrors'' is a poetic expression, often understood as death personified.'
    reason: alternative_reading
