translation:
  language: es
  text: Y sus hijos se fortalecieron[a], cada uno en su propio lugar;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘cada uno en su región’ o ‘cada uno en su territorio’, pues ‘lugar’ aquí probablemente alude al ámbito bajo el control de cada hijo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεκράτησαν
  english_pob_choice: became strong
  chosen_spanish: cobraron fuerza
  alternatives_spanish:
  - se fortalecieron
  - prevalecieron
  - adquirieron poder
  lexicon: LSJ
  rationale: El griego puede expresar dominar, prevalecer o hacerse fuerte. Siguiendo la línea revisada del POB en inglés (‘became strong’), ‘cobraron fuerza’ conserva la idea de afirmarse con poder sin añadir explícitamente ‘gobernaron’, que sería más específico de lo que el verbo por sí solo exige.
- source_word: οἱ παῖδες αὐτοῦ
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: LSJ
  rationale: En este contexto histórico-dinástico, el referente son los descendientes varones. Sin embargo, en español ‘hijos’ comunica naturalmente el grupo filial heredero; ‘hijos varones’ sería más explicativo, pero añade una precisión no marcada explícitamente en el sintagma griego.
- source_word: ἕκαστος
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada cual
  - cada uno de ellos
  lexicon: LSJ
  rationale: Equivale al distributivo griego con claridad y naturalidad en español, manteniendo la distribución individual.
- source_word: ἐν τῷ τόπῳ αὐτοῦ
  english_pob_choice: in his own place
  chosen_spanish: en su propio lugar
  alternatives_spanish:
  - en su propia región
  - en su propio territorio
  - en su propia posición
  lexicon: LSJ
  rationale: '‘Lugar’ reproduce de forma cercana τόπος y preserva la posible amplitud semántica del texto: ubicación, esfera o ámbito bajo control. ‘Territorio’ interpretaría más de lo que el griego dice de manera explícita.'
theological_decisions:
- issue: Alcance de παῖδες en un contexto sucesorio
  english_pob_reading: his sons
  chosen_spanish_reading: sus hijos
  alternative_spanish_readings:
  - sus hijos varones
  - sus descendientes
  rationale: No se trata de un término teológico, pero sí de una decisión histórica importante. El contexto de sucesión dinástica favorece a los hijos como herederos; en español se evita sobrecargar la línea con una expansión interpretativa mayor.
  doctrine_reference: n/a
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió ‘gained power’ por ‘became strong’ para reflejar con más precisión ἐπεκράτησαν. La versión española sigue esa actualización con ‘cobraron fuerza’, manteniendo la misma relación de sentido y evitando un verbo excesivamente interpretativo como ‘reinaron’.
  spanish_consistency_notes:
  - Se conserva un registro bíblico moderno y sobrio, apto para lectura pública.
  - ‘Lugar’ se mantiene en el texto principal por fidelidad al griego y para conservar la ambigüedad semántica documentada en el aparato inglés.
  - No se introduce ‘Cristo’, ‘Señor’ ni otras equivalencias no pertinentes al versículo.
