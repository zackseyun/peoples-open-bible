translation:
  language: es
  text: Cuando los seres vivientes se movían[a], las ruedas se movían junto a ellos; y cuando los seres vivientes eran levantados[b] de la tierra, las ruedas eran levantadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «iban» en lugar de «se movían» para los seres vivientes y las ruedas; el hebreo usa el mismo verbo para su movimiento coordinado.
    reason: lexical_alternative
  - marker: b
    text: Más adelante Ezequiel identifica a estos «seres vivientes» como querubines; véase Ezequiel 10:20.
    reason: cross_reference
lexical_decisions:
- source_word: וּבְלֶכֶת
  english_pob_choice: When ... moved
  chosen_spanish: Cuando ... se movían
  alternatives_spanish:
  - cuando iban
  - al moverse
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo constructo de הלך pide una circunstancia temporal. «Cuando ... se movían» transmite con naturalidad el valor temporal y el movimiento coordinado sin volverlo demasiado literal.
- source_word: הַחַיּוֹת
  english_pob_choice: the living creatures
  chosen_spanish: los seres vivientes
  alternatives_spanish:
  - las criaturas vivientes
  - los animales
  lexicon: HALOT
  rationale: En Ezequiel 1 no se trata de animales comunes, sino de los seres visionarios del carro-trono. «Seres vivientes» conserva el sentido general sin introducir aún la identificación posterior con querubines.
- source_word: יֵלְכ֥וּ
  english_pob_choice: moved
  chosen_spanish: se movían
  alternatives_spanish:
  - iban
  - andaban
  lexicon: HALOT
  rationale: הלך puede significar «ir/caminar», pero en este contexto visionario describe el desplazamiento coordinado de los seres y las ruedas. «Se movían» es fluido en español y mantiene la relación verbal con las ruedas.
- source_word: הָאוֹפַנִּים
  english_pob_choice: the wheels
  chosen_spanish: las ruedas
  alternatives_spanish:
  - el conjunto de ruedas
  - las ruedes
  lexicon: HALOT
  rationale: אופן denota directamente «rueda». El plural se traduce de forma simple y transparente como «las ruedas».
- source_word: אֶצְלָם
  english_pob_choice: beside them
  chosen_spanish: junto a ellos
  alternatives_spanish:
  - al lado de ellos
  - junto a las criaturas
  lexicon: HALOT
  rationale: אצל expresa proximidad. «Junto a ellos» es idiomático y preserva la cercanía constante entre las ruedas y los seres vivientes.
- source_word: וּבְהִנָּשֵׂא
  english_pob_choice: when ... were lifted up
  chosen_spanish: cuando ... eran levantados
  alternatives_spanish:
  - cuando ... subían
  - cuando ... eran alzados
  lexicon: HALOT
  rationale: 'El infinitivo nifal de נשׂא tiene sentido pasivo: la acción les ocurre a los seres vivientes. «Eran levantados» conserva esa pasividad y el enlace verbal con la cláusula final.'
- source_word: מֵעַל הָאָרֶץ
  english_pob_choice: from the earth
  chosen_spanish: de sobre la tierra
  alternatives_spanish:
  - de la tierra
  - desde la tierra
  - por encima de la tierra
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «de sobre la tierra». «De sobre la tierra» conserva mejor la imagen espacial que un simple «de la tierra».
- source_word: יִנָּשְׂאוּ
  english_pob_choice: were lifted up
  chosen_spanish: eran levantadas
  alternatives_spanish:
  - subían
  - eran alzadas
  lexicon: HALOT
  rationale: Repetir «eran levantados/levantadas» mantiene la reiteración de נשׂא y la correspondencia entre seres vivientes y ruedas. Se usa «levantadas» para concordar con «las ruedas».
theological_decisions:
- issue: Identidad de los הַחַיּוֹת
  english_pob_reading: Render generically as 'the living creatures' without specifying cherubim in the main text
  chosen_spanish_reading: Traducir genéricamente como «los seres vivientes» sin identificar aquí a los querubines
  alternative_spanish_readings:
  - los querubines
  - las criaturas vivientes
  rationale: Aunque Ezequiel más adelante identifica estos seres como querubines, este versículo usa el término general חַיּוֹת. Para no anticipar una identificación posterior, el texto principal conserva la designación inmediata del hebreo.
  doctrine_reference: 'Translation philosophy: primacía del texto original y preservación de la tensión interpretativa.'
translation_notes:
  revision_awareness: El contexto auditado en inglés mantiene una equivalencia óptima y no introduce cambios revisionales; la versión española sigue ese mismo criterio, conservando la repetición verbal de נשׂא y la referencia genérica a הַחַיּוֹת.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo»/«Mesías» porque no hay terminología mesiánica en el pasaje.
  - Se conserva la coordinación verbal entre criaturas y ruedas para reflejar la repetición del hebreo.
  - Se usa lenguaje bíblico moderno y claro, sin depender de formulaciones tradicionales que oculten la semántica del original.
