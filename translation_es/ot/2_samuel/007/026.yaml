    text: 'O: «y sea hecho grande tu nombre para siempre».'
    reason: lexical_alternative
  - marker: b
    text: «Casa» aquí se refiere al hogar o dinastía de David, no solo a un edificio físico.
    reason: cultural_note
  revision_rationale: Se ajusta la segunda cláusula para preservar en español la fuerza desiderativa/oracional del hebreo y el paralelismo con «sea engrandecido». También se corrige la ubicación del marcador de nota para que ancle en «casa», que es el término explicado por la nota.
