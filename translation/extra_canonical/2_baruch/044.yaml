translation:
  text: '1 And I[a], Baruch, went from there and came to the people. And I called the firstborn of its mighty ones, and its nobles, and the lowly from the elders of the people, and I said to them,

    2 “Hear, I am with you[a], as a small one with a great people, though you know that I am about to leave you.

    3 But guard and watch over the people who remain[b][c][d][e], that they may not depart from the commandments of God.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Syriac description of those summoned is uncertain in this bucket and may preserve civic ranks rather than personal names. A later control-witness check could refine the line.
    reason: textual_variant
    anchor_ref: '44:1'
  - marker: a
    text: This chapter bucket still overlaps with the end of chapter 43 on the same Ceriani page. The translation begins only at the inline chapter marker “44.”
    reason: textual_variant
    anchor_ref: '44:1'
  - marker: e
    text: The surviving bucket breaks off mid-sentence after “for we also …”; the English therefore ends with suspension points rather than a falsely complete clause.
    reason: textual_variant
    anchor_ref: '44:3'
  - marker: d
    text: Or 'the leading ones among its inhabitants, and the elders of its great men, and the lowly from the elders of the people'.
    reason: previous_rendering
  - marker: c
    text: Or 'Hear me. I am one small among the people, not as a great man. You know that it is not my desire to leave you and so have it be.'.
    reason: previous_rendering
  - marker: b
    text: Or 'keep watch over the people who remain, that they may not depart from the commandments of God. Rejoice, for we also …'.
    reason: previous_rendering
lexical_decisions:
- source_word: ܒܘܟܪܝ
  chosen: the leading ones
  alternatives:
  - the firstborn
  - the foremost men
  lexicon: Payne Smith
  rationale: The form normally points to “firstborn,” but in this civic gathering context it likely refers to foremost or leading persons. Because the line is textually uncertain, I chose a restrained social rendering rather than importing proper names from secondary translations.
- source_word: ܡܟܝܟܐ
  chosen: the lowly
  alternatives:
  - the humble
  - the lesser
  lexicon: Payne Smith
  rationale: The word marks social lowliness or humility. “The lowly” preserves that register and balances the preceding references to prominent elders.
- source_word: ܢ̇ܛܪܘ
  chosen: keep watch over
  alternatives:
  - guard
  - keep
  lexicon: Payne Smith
  rationale: The imperative is stronger than simple observance; it calls for active guarding of the remnant community.
- source_word: ܥܡܐ ܕܐܫܬܚܪ
  chosen: the people who remain
  alternatives:
  - the remnant people
  - the people left behind
  lexicon: Payne Smith
  rationale: This keeps the remnant idea explicit without overloading the phrase with later theological terminology.
- source_word: ܦܘܩ̈ܕܢܘܗܝ ܕܐܠܗܐ
  chosen: the commandments of God
  alternatives:
  - God’s commands
  - the ordinances of God
  lexicon: Payne Smith
  rationale: A direct rendering fits the Syriac and preserves the covenantal force of Baruch’s exhortation.
