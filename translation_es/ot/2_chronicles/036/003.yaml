translation:
  language: es
  text: Y el rey de Egipto lo depuso en Jerusalén e impuso al país un tributo de cien talentos de plata y un talento de oro[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘lo destituyó’; el verbo hebreo puede significar quitar a alguien de un cargo o simplemente apartarlo.
    reason: alternative_reading
  - marker: b
    text: O ‘impuso una multa al país’; el verbo expresa la imposición de una pena monetaria.
    reason: lexical_alternative
  - marker: c
    text: Un talento era una unidad antigua de peso; se conserva la medida del texto en vez de convertirla.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְסִירֵהוּ
  english_pob_choice: deposed him
  chosen_spanish: lo depuso
  alternatives_spanish:
  - lo removió
  - lo quitó del cargo
  - lo apartó
  lexicon: HALOT
  rationale: El verbo causativo de סור admite la idea de quitar o remover. En este contexto real, la lectura de destitución política es la más natural; por eso ‘lo depuso’ preserva el matiz de remoción de oficio sin volverla más interpretativa de lo necesario.
- source_word: מֶלֶךְ מִצְרַיִם
  english_pob_choice: the king of Egypt
  chosen_spanish: el rey de Egipto
  alternatives_spanish:
  - el rey egipcio
  - el rey de Egipto
  lexicon: HALOT
  rationale: Se mantiene el título tal como aparece en hebreo, sin nombrar a Faraón Necao, porque el texto aquí usa la designación genérica. ‘El rey de Egipto’ es natural en español y conserva la referencia histórica.
- source_word: בִּירוּשָׁלָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  - allí en Jerusalén
  lexicon: HALOT
  rationale: La preposición de localización se expresa de forma directa y natural en español. No requiere nota especial.
- source_word: וַיַּעֲנֹשׁ
  english_pob_choice: imposed ... a tribute
  chosen_spanish: impuso sobre la tierra un tributo
  alternatives_spanish:
  - impuso una multa sobre la tierra
  - multó a la tierra
  - impuso una pena monetaria sobre la tierra
  lexicon: HALOT
  rationale: ענשׁ puede significar imponer una pena o una multa. Como el objeto es monetario y viene seguido por cantidades, ‘impuso ... un tributo’ comunica bien la exacción financiera en español, sin perder la fuerza punitiva del verbo.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra
  lexicon: HALOT
  rationale: Aquí puede referirse al territorio o reino de Judá. ‘La tierra’ conserva la amplitud semántica hebrea y es idiomática en narración histórica bíblica.
- source_word: מֵאָה כִכַּר כֶּסֶף
  english_pob_choice: a hundred talents of silver
  chosen_spanish: cien talentos de plata
  alternatives_spanish:
  - ciento de talentos de plata
  - cien talentos de plata
  lexicon: HALOT
  rationale: Se conserva la unidad antigua ‘talentos’ en lugar de convertirla a una medida moderna, para respetar la transparencia del texto fuente. El número se expresa de manera normal en español.
- source_word: וְכִכַּר זָהָב
  english_pob_choice: and a talent of gold
  chosen_spanish: y un talento de oro
  alternatives_spanish:
  - y un talento de oro
  - y un talento de oro fino
  lexicon: HALOT
  rationale: Se mantiene el singular explícito del hebreo y la misma unidad de peso. ‘Oro’ basta para זָהָב sin añadir precisión no contenida en el texto.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de ‘removed him’ a ‘deposed him’ por mayor precisión contextual; la redacción española sigue esa decisión con ‘lo depuso’, manteniendo además la exacción monetaria y la unidad antigua ‘talento’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparezca el nombre divino; aquí no aparece.
  - Se conserva ‘talento’ como medida antigua, en línea con la práctica del POB en el texto inglés.
  - ‘La tierra’ se mantiene por su amplitud semántica histórica, sin convertirla en ‘el país’ salvo necesidad de claridad.
