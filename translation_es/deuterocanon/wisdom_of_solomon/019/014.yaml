lexical_decisions:
- source_word: οἱ μὲν ... οὗτοι δὲ
  english_pob_choice: those ... but these
  chosen_spanish: ellos ... sino que estos
  alternatives_spanish:
  - unos ... pero otros
  - aquellos ... pero estos
  lexicon: LSJ
  rationale: Conserva el contraste binario del griego sin forzar una formulación demasiado solemne; «ellos... estos» mantiene la oposición entre dos grupos, y «sino que» expresa el contraste adversativo.
- source_word: τοὺς ἀγνοοῦντας
  english_pob_choice: strangers
  chosen_spanish: los desconocidos
  alternatives_spanish:
  - los que no conocían
  - los extraños
  - personas que no conocían
  lexicon: LSJ
  rationale: El participio significa literalmente «los que eran desconocidos»; «los desconocidos» conserva ese sentido básico y evita adelantar demasiado la interpretación social. La nota permite la alternativa contextual de «extraños».
- source_word: οὐκ ἐδέχοντο
  english_pob_choice: did not welcome
  chosen_spanish: no acogían
  alternatives_spanish:
  - no recibían
  - no daban acogida
  - no aceptaban
  lexicon: LSJ
  rationale: «Acoger» expresa con naturalidad la negativa de hospitalidad. En español suena más idiomático que «recibir» en este contexto, sin perder el valor de la acción.
- source_word: παρόντας
  english_pob_choice: when they were present and in need
  chosen_spanish: como presentes
  alternatives_spanish:
  - cuando estaban presentes
  - siendo presentes
  - al estar presentes
  lexicon: LSJ
  rationale: El participio indica presencia; «como presentes» refleja de manera compacta la idea de personas que estaban allí. Se evita añadir «y en necesidad», porque no está explícito en el griego de esta línea.
- source_word: εὐεργέτας
  english_pob_choice: benefactors
  chosen_spanish: benefactores
  alternatives_spanish:
  - bienhechores
  - los que les habían hecho bien
  lexicon: LSJ
  rationale: '«Benefactores» reproduce con precisión el sustantivo y mantiene la ironía del verso: tratar como esclavos a quienes habían hecho el bien.'
- source_word: ξένους
  english_pob_choice: foreign
  chosen_spanish: extranjeros
  alternatives_spanish:
  - forasteros
  - ajenos
  - extraños
  lexicon: LSJ
  rationale: En función adjetiva, ξένους marca a los benefactores como de fuera; «extranjeros» es claro en español y conserva el matiz de exterioridad.
- source_word: ἐδουλοῦντο
  english_pob_choice: enslaved
  chosen_spanish: esclavizaban
  alternatives_spanish:
  - hacían esclavos
  - reducían a esclavitud
  - trataban como esclavos
  lexicon: LSJ
  rationale: El verbo expresa la reducción a esclavitud. «Esclavizaban» conserva la fuerza del término y sigue la preferencia del proyecto por un lenguaje que no suavice la realidad del δουλόω.
theological_decisions:
- issue: Identidad de los dos grupos contrastados
  english_pob_reading: Leave the groups implicit in the main text rather than naming Egyptians and Sodomites.
  chosen_spanish_reading: Mantener los dos grupos implícitos en el texto principal.
  alternative_spanish_readings:
  - nombrar a los egipcios y a los sodomitas
  - identificar explícitamente a los dos pueblos en la traducción
  rationale: El griego sólo presenta pronombres contrastivos; nombrar a los grupos iría más allá de la forma del verso. La traducción conserva esa tensión y deja la identificación al contexto mayor.
  doctrine_reference: Primacía del texto original; no resolver en la traducción lo que el verso no explicita.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente: se corrigió el arranque gramatical, se evitó añadir información no explicitada como «y en necesidad», y se conservó el contraste pronominal del griego. La versión española mantiene ese mismo equilibrio entre literalidad y claridad.'
  spanish_consistency_notes:
  - Se usó «Dios/Yahvé» solo cuando corresponda; este versículo no contiene vocabulario divino.
  - Se evitó «siervo» para δουλόω; se prefirió un término de esclavitud explícita.
  - Se mantuvo una oposición directa entre los dos grupos con «ellos... sino que estos».
  - Las notas sólo se anclan en el texto donde aparecen exactamente los marcadores [a], [b] y [c].
