review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el sentido general del griego: acusación de coerción tiránica, doble infinitivo (''quebrantar la ley'' / ''comer''), propósito (''para que'') y burla adicional. Sin embargo, μιεροφαγίᾳ no está bien resuelto en español principal: ''defilección'' no es forma española natural ni clara, y ''de la comida'' desplaza el matiz de contaminación producida por el acto/comida hacia una relación posesiva confusa. También conviene reflejar mejor ἔτι como ''aún más'' o ''todavía más'' en relación con la burla añadida.'
  spanish_quality_summary: El texto es mayormente legible, pero 'defilección' resulta oscuro y poco idiomático, más allá de la rareza legítima del griego. La frase final suena más natural en español como 'con esta contaminación por la comida, tan odiosa' o similar. 'En tu tiranía' es aceptable, pero el inglés auditado prefirió el valor adverbial directo; en español 'tiránicamente' o 'de manera tiránica' sería posible, aunque no imprescindible. La revisión propuesta prioriza claridad eclesial sin perder el matiz ritual/moral.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. ''La ley'' preserva correctamente el alcance de παρανομεῖν sin añadir ''de Dios''. La decisión clave es μιεροφαγίᾳ: debe mantenerse la idea de comer + contaminación ritual/moral, pero en español conviene usar una expresión inteligible como ''contaminación por la comida'' y conservar las alternativas en nota.'
  issues:
  - severity: high
    issue: Uso de 'defilección' en el texto principal
    rationale: No es una forma española estándar ni suficientemente transparente para lectores generales; daña la legibilidad sin aportar fidelidad real.
  - severity: medium
    issue: '''defilección de la comida'' no expresa bien μιεροφαγίᾳ'
    rationale: El griego apunta a contaminación/profanación asociada al comer o a la comida ingerida, no simplemente a una 'defilección de la comida' como genitivo posesivo.
  - severity: low
    issue: La nota a conserva alternativas poco naturales en español
    rationale: '''defilección por la comida'' repite el problema; conviene ofrecer opciones españolas claras como ''comer contaminante'' o ''contaminación por la comida''.'
  - severity: low
    issue: Matiz de ἔτι podría expresarse con más claridad
    rationale: '''Todavía'' funciona, pero ''todavía más'' o ''aún más'' comunica mejor la idea de burla adicional intensificada.'
