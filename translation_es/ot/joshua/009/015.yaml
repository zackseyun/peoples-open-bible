    text: 'O «hizo un pacto con ellos». El hebreo dice literalmente: «cortó un pacto».'
    reason: lexical_alternative
  - marker: b
    text: O «para preservarles la vida» o «para perdonarles la vida».
    reason: lexical_alternative
  - marker: c
    text: O «los líderes de la asamblea» o «los jefes de la comunidad».
    reason: lexical_alternative
  revision_rationale: Se ajusta «hizo paz» a «hizo la paz» para un español más natural sin perder el sentido idiomático del hebreo. Se corrige la nota [a], que erróneamente cambiaba el sujeto a plural, y se mantiene la alternativa literal «cortó un pacto» conforme al rastro de auditoría inglés.
