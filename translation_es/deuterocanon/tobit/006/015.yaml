translation:
  language: es
  text: Y ahora yo soy el único hijo de mi padre, y temo que, si entro, moriré, como también los anteriores[a]; porque un demonio la ama[b], y no daña a nadie, salvo a los que vienen a ella. Y ahora temo morir y hacer que la vida de mi padre y de mi madre descienda con dolor, por causa de mí, a su sepulcro[c]; y no tienen otro hijo que los sepulte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los de antes'; la frase se refiere a los esposos o pretendientes previos de Sara.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'la ama'; el griego expresa el apego posesivo del demonio por Sara.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'hacer descender la vida de mi padre y de mi madre ... a su sepulcro'; es un modismo que expresa causarles la muerte con dolor por causa de él.
    reason: cultural_note
lexical_decisions:
- source_word: μόνος
  english_pob_choice: only son
  chosen_spanish: el único hijo
  alternatives_spanish:
  - el único
  - solamente hijo
  lexicon: LSJ
  rationale: En contexto con τῷ πατρί, la idea es que Tobías es el único hijo que le queda a su padre. En español, 'el único hijo' expresa mejor esa relación filial que un simple 'el único'.
- source_word: φοβοῦμαι μὴ εἰσελθὼν ἀποθάνω
  english_pob_choice: I am afraid that if I go in, I will die
  chosen_spanish: temo que, si entro, moriré
  alternatives_spanish:
  - tengo miedo de que, si entro, muera
  - temo morir si entro
  lexicon: BDAG
  rationale: La construcción con φοβοῦμαι μή se vierte de modo natural en español con 'temo que, si entro, moriré', preservando la idea condicional ligada a entrar.
- source_word: οἱ πρότεροι
  english_pob_choice: the former ones
  chosen_spanish: los anteriores
  alternatives_spanish:
  - los de antes
  - los primeros
  lexicon: LSJ
  rationale: La expresión refiere a los anteriores pretendientes/esposos de Sara. 'Los anteriores' mantiene la referencia abierta y comprensible sin añadir explicación no presente en el texto.
- source_word: δαιμόνιον
  english_pob_choice: a demon
  chosen_spanish: un demonio
  alternatives_spanish:
  - un espíritu maligno
  lexicon: BDAG
  rationale: El término griego nombra directamente a un ser demoníaco. 'Demonio' conserva con claridad esa fuerza léxica en español.
- source_word: φιλεῖ αὐτὴν
  english_pob_choice: loves her
  chosen_spanish: la ama
  alternatives_spanish:
  - está apegado a ella
  - la desea
  lexicon: LSJ
  rationale: Aunque el sentido contextual es posesivo y maligno, φιλέω significa 'amar/tener afecto por'. 'La ama' reproduce la lectura literal sin diluir la tensión del texto.
- source_word: ἀδικεῖ
  english_pob_choice: harms
  chosen_spanish: perjudica
  alternatives_spanish:
  - daña
  - hace daño
  lexicon: BDAG
  rationale: Aquí ἀδικέω expresa el efecto práctico sobre quienes se acercan a ella. 'Perjudica' comunica ese daño de forma natural en español.
- source_word: τῶν προσαγόντων αὐτῇ
  english_pob_choice: those who come to her
  chosen_spanish: a los que se acercan a ella
  alternatives_spanish:
  - a los que van a ella
  - a los que llegan a ella
  lexicon: LSJ
  rationale: La frase griega es amplia y no requiere restringirse a un único matiz. 'Se acercan a ella' conserva la proximidad relacional sugerida en el contexto narrativo.
- source_word: κατάξω τὴν ζωὴν ... εἰς τὸν τάφον αὐτῶν
  english_pob_choice: bring down the life of my father and my mother ... to their grave
  chosen_spanish: llevaré la vida de mi padre y de mi madre, en dolor a causa de mí, hasta su sepulcro
  alternatives_spanish:
  - haré descender la vida de mi padre y de mi madre al sepulcro, en dolor por mí
  - llevaré a la tumba la vida de mi padre y de mi madre, con dolor por mí
  lexicon: LSJ
  rationale: La imagen idiomática de 'hacer descender la vida... al sepulcro' se expresa de forma inteligible en español conservando el movimiento hacia la muerte y el dolor causado por el hablante.
- source_word: μετʼ ὀδύνης
  english_pob_choice: in grief
  chosen_spanish: en dolor
  alternatives_spanish:
  - con dolor
  - en tristeza
  lexicon: LSJ
  rationale: ὀδύνη señala dolor/pena intensa. 'En dolor' mantiene una cercanía semántica suficiente al griego y enlaza con la imagen funeraria del pasaje.
- source_word: υἱὸς ἕτερος οὐχ ὑπάρχει αὐτοῖς
  english_pob_choice: they have no other son
  chosen_spanish: no tienen otro hijo
  alternatives_spanish:
  - no les queda otro hijo
  - no hay otro hijo para ellos
  lexicon: BDAG
  rationale: 'El sentido existencial es claro y en español suena más natural como posesión relacional: ''no tienen otro hijo''.'
- source_word: ὃς θάψει αὐτούς
  english_pob_choice: who will bury them
  chosen_spanish: que los sepulte
  alternatives_spanish:
  - que los entierre
  - para sepultarlos
  lexicon: BDAG
  rationale: El futuro de θάψει expresa la función esperada de enterrar a los padres. 'Sepulte' es digno y preciso en español bíblico contemporáneo.
theological_decisions:
- issue: Naturaleza de δαιμόνιον en Tobit
  english_pob_reading: a personal demon that harms Sarah's prospective husbands
  chosen_spanish_reading: un demonio personal que ama de manera posesiva a Sara y daña a quienes se le acercan
  alternative_spanish_readings:
  - un espíritu maligno en sentido general
  - una influencia demoníaca impersonal
  rationale: La narración de Tobit presenta a δαιμόνιον como un agente espiritual personal y hostil. Por eso se conserva 'demonio' y no se suaviza la fuerza personal del relato.
  doctrine_reference: Primacía del sentido del texto fuente; preservación de la agencia demoníaca en el relato deuterocanónico.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: la lectura final inglesa corrigió ''only one'' a ''only son'' y ''approach her'' a ''come to her''. La versión española sigue esa decisión con ''el único hijo'' y ''los que se acercan a ella'', sin traducir mecánicamente desde el primer borrador.'
  spanish_consistency_notes:
  - Se mantiene 'demonio' para δαιμόνιον, conforme al valor personal del ser espiritual en el relato.
  - Se conserva el registro bíblico digno con verbos como 'sepulte' y sustantivos como 'sepulcro'.
  - No se ocultó la tensión del texto en 'la ama', dejando visible el matiz posesivo indicado por el audit trail.
  - Se usó 'Y ahora' para reflejar el doble inicio discursivo del griego y el énfasis narrativo del pasaje.
