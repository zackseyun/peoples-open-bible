translation:
  language: es
  text: Y muchos corrieron tras ellos[a], y al alcanzarlos, acamparon contra ellos y trabaron batalla con ellos en el sábado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en el día de los sábados», una expresión idiomática griega para referirse al sábado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδραμον ὀπίσω αὐτῶν
  english_pob_choice: ran after them
  chosen_spanish: corrieron tras ellos
  alternatives_spanish:
  - perseguieron tras ellos
  - corrieron detrás de ellos
  lexicon: LSJ
  rationale: La expresión griega es idiomática de persecución; en español, «corrieron tras ellos» conserva la imagen concreta y naturalidad narrativa sin volverse demasiado literal.
- source_word: πολλοί
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - una gran multitud
  - muchos de ellos
  lexicon: LSJ
  rationale: «Muchos» reproduce de forma directa la cantidad indefinida del original y coincide con la sencillez del contexto.
- source_word: καταλαβόντες αὐτούς
  english_pob_choice: when they caught up with them
  chosen_spanish: al alcanzarlos
  alternatives_spanish:
  - cuando los alcanzaron
  - habiéndolos alcanzado
  lexicon: LSJ
  rationale: Aquí καταλαμβάνω funciona en el sentido de alcanzar/overtake en un contexto de persecución. «Al alcanzarlos» mantiene el encadenamiento narrativo con fluidez en español.
- source_word: παρενέβαλον ἐπʼ αὐτούς
  english_pob_choice: they encamped against them
  chosen_spanish: acamparon contra ellos
  alternatives_spanish:
  - plantaron campamento contra ellos
  - se acamparon contra ellos
  lexicon: LSJ
  rationale: En uso militar, παρεμβάλλω puede significar acampar o establecer campamento. «Acamparon contra ellos» conserva el matiz bélico del griego y la dirección adversativa de ἐπʼ αὐτούς.
- source_word: συνεστείλαντο πρὸς αὐτοὺς πόλεμον
  english_pob_choice: joined battle with them
  chosen_spanish: trabaron batalla con ellos
  alternatives_spanish:
  - entablaron batalla con ellos
  - hicieron guerra contra ellos
  lexicon: LSJ
  rationale: La frase describe el inicio de una acción hostil concreta. «Trabaron batalla con ellos» expresa el choque militar inmediato mejor que una formulación más general como «hicieron guerra».
- source_word: ἐν τῇ ἡμέρᾳ τῶν σαββάτων
  english_pob_choice: on the Sabbath day
  chosen_spanish: en el día de reposo
  alternatives_spanish:
  - en el sábado
  - en el día del sábado
  lexicon: LSJ
  rationale: La construcción griega es literalmente «en el día de los sábados», pero el sentido idiomático es el día de reposo sabático. En español, «día de reposo» comunica el referente judío con claridad y evita una forma menos natural como «día de los sábados».
theological_decisions:
- issue: Expresión calendárica sabática plural en griego (τῶν σαββάτων)
  english_pob_reading: the Sabbath day
  chosen_spanish_reading: el día de reposo
  alternative_spanish_readings:
  - el sábado
  - el día del sábado
  - el día de los sábados
  rationale: El griego usa una pluralidad semítica que en contexto designa el Sabbath. En español, «día de reposo» preserva el sentido religioso judío y mantiene la inteligibilidad sin forzar el plural literal.
  doctrine_reference: Éxodo 20:8-11; uso judío del sábado como día santo
translation_notes:
  revision_awareness: 'El texto sigue el audit trail inglés de POB: conserva la secuencia de persecución, alcance, campamento militar y combate, y refleja el valor idiomático de τῶν σαββάτων con una solución española natural y transparente.'
  spanish_consistency_notes:
  - Se prefirió «acamparon» para mantener el matiz militar de παρενέβαλον.
  - «Trabar batalla» conserva el tono narrativo bélico sin elevar el registro.
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino; no se requiere ajuste terminológico teológico aquí.
  - La nota al pie marca la alternativa literal del griego para preservar la trazabilidad auditada.
