translation:
  language: es
  text: Porque tú eres el Dios de la rectitud[a], que juzgas a Israel con disciplina[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia» para «rectitud».
    reason: lexical_alternative
  - marker: b
    text: O «con corrección» / «mediante disciplina».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí introduce la base o razón de la afirmación precedente; «Porque» mantiene bien esa relación causal/explicativa en español natural sin forzar una causalidad más fuerte que la del griego.
- source_word: θεὸς τῆς δικαιοσύνης
  english_pob_choice: God of righteousness
  chosen_spanish: Dios de la justicia
  alternatives_spanish:
  - Dios de la rectitud
  - Dios de la justicia y la rectitud
  lexicon: BDAG
  rationale: Se sigue el sentido del genitivo atributivo con la opción española más idiomática. Aunque el inglés POB prefirió «righteousness», en español «justicia» comunica bien el campo semántico y conserva el posible matiz judicial/covenantal que el contexto sugiere.
- source_word: κρίνων
  english_pob_choice: judging
  chosen_spanish: que juzgas
  alternatives_spanish:
  - juzgando
  - el que juzga
  lexicon: BDAG
  rationale: El participio presente se vierte con una relativa verbal natural en español. «Que juzgas» preserva la acción continua/descrita de Dios y suena más fluido que un gerundio aislado.
- source_word: Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el Israel
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio estándar sin cambios.
- source_word: ἐν παιδείᾳ
  english_pob_choice: with discipline
  chosen_spanish: con disciplina
  alternatives_spanish:
  - con corrección
  - mediante disciplina
  - con castigo disciplinario
  lexicon: BDAG
  rationale: παιδεία aquí apunta a disciplina correctiva/chastening, no solo instrucción. «Con disciplina» refleja bien la fuerza instrumental de ἐν y mantiene abierta la tensión entre corrección y formación.
theological_decisions:
- issue: δικαιοσύνη aplicado a Dios
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rrectitud
  rationale: El griego puede expresar tanto la cualidad moral de Dios como su modo justo de gobernar y juzgar. En español, «justicia» comunica con claridad ese campo semántico y evita una formulación demasiado abstracta. La nota conserva la alternativa tradicional de «rectitud».
  doctrine_reference: Atributos divinos; justicia divina
- issue: παιδεία como disciplina correctiva
  english_pob_reading: with discipline / with correction
  chosen_spanish_reading: con disciplina
  alternative_spanish_readings:
  - con corrección
  - con castigo
  rationale: La forma elegida conserva el sentido de corrección formativa y disciplinaria sin reducirlo a castigo punitivo. Esto respeta la ambigüedad productiva del término griego y la lectura de la POB inglesa.
  doctrine_reference: Disciplina divina; corrección de Israel
translation_notes:
  revision_awareness: Se siguió el testimonio griego de Swete y el audit trail inglés sin cambios de revisión aplicados; la redacción española mantiene la estructura y las tensiones léxicas documentadas en la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεὸς conforme al estándar del proyecto.
  - Se usa «justicia» para δικαιοσύνη como decisión contextual en español, con nota de alternativa a «rectitud».
  - Se vierte el participio presente κρίνων mediante una relativa verbal para conservar la acción continua sin un calco duro.
  - Se conserva «Israel» sin artículo, conforme al uso bíblico habitual en español.
  - «Con disciplina» refleja el valor correctivo de παιδεία y mantiene abierta la posible lectura de corrección.
