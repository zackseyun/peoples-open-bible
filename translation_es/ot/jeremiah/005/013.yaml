translation:
  language: es
  text: Y los profetas se volverán viento[a], y la palabra no está en ellos; así se hará con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'espíritu' o 'aliento' para 'viento'. La palabra hebrea רוּחַ puede abarcar estos sentidos; aquí probablemente significa que los profetas son vacíos o insustanciales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנְּבִיאִים
  english_pob_choice: And the prophets
  chosen_spanish: Y los profetas
  alternatives_spanish:
  - Y los profetas mismos
  lexicon: HALOT
  rationale: El plural definido con conjunción se conserva de forma directa. No se añade énfasis reflexivo que el hebreo no expresa explícitamente.
- source_word: יִהְיוּ לְרוּחַ
  english_pob_choice: will become wind
  chosen_spanish: serán viento
  alternatives_spanish:
  - se convertirán en viento
  - serán espíritu
  - serán aliento
  lexicon: HALOT
  rationale: En este contexto polémico, רוּחַ comunica insustancialidad o vaciedad. En español, 'serán viento' mantiene la imagen breve y despectiva sin resolver indebidamente la polisemia hacia 'espíritu' en el texto principal.
- source_word: וְהַדִּבֵּר
  english_pob_choice: and the word
  chosen_spanish: y la palabra
  alternatives_spanish:
  - y el mensaje
  - y la declaración
  - y el hablar
  lexicon: HALOT
  rationale: El nominal de דבר aquí refiere al contenido dicho o proclamado. 'La palabra' reproduce la concisión del hebreo y encaja con la cláusula siguiente.
- source_word: אֵין בָּהֶם
  english_pob_choice: is not in them
  chosen_spanish: no está en ellos
  alternatives_spanish:
  - les falta
  - está ausente de ellos
  lexicon: HALOT
  rationale: La construcción existencial negativa se vierte de manera natural en español. 'No está en ellos' conserva la fuerza idiomática y deja abierta la implicación de falta de palabra verdadera.
- source_word: כֹּה יֵעָשֶׂה לָהֶם
  english_pob_choice: thus it will be done to them
  chosen_spanish: así se hará con ellos
  alternatives_spanish:
  - así será hecho con ellos
  - de este modo se hará con ellos
  lexicon: HALOT
  rationale: El nifal impersonal pide una pasiva natural en español. 'Así se hará con ellos' conserva el tono ominoso sin introducir un agente no expresado.
theological_decisions:
- issue: Valor de רוּחַ en la acusación contra los profetas
  english_pob_reading: wind
  chosen_spanish_reading: viento
  alternative_spanish_readings:
  - espíritu
  - aliento
  rationale: La línea paralela 'la palabra no está en ellos' muestra que el sentido es de vaciedad o insustancialidad. 'Viento' preserva esa burla profética sin insinuar una referencia al Espíritu Santo en este versículo.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión lexical y no resolverla en la traducción principal.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; se mantiene el acuerdo alto con el texto hebreo y el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'viento' en el texto principal para רוּחַ, reservando las alternativas semánticas en nota para no perder la polisemia documentada.
  - '''La palabra'' preserva el paralelismo breve del hebreo y evita expandir a ''mensaje'' sin necesidad textual.'
