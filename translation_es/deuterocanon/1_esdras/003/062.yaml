review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador reproduce bien la secuencia verbal y la personificación del griego: «la verdad» permanece, es fuerte, vive y prevalece. También mantiene la distinción entre ἰσχύει y κρατεῖ. Sin embargo, la colocación de notas no sigue bien el original ni la auditoría inglesa: la nota sobre la frase final está anclada en la primera ocurrencia de «para siempre», y la nota léxica de «permanece» no aporta una alternativa real en español.'
  spanish_quality_summary: El texto es claro y digno, pero «para siempre y para siempre» suena torpe en español y no refleja tan bien el intensificador idiomático como «por los siglos de los siglos», especialmente dado que la nota ya explica la literalidad griega. También conviene corregir la nota a para que no diga «O “permanece” para “remains”», lo cual es incorrecto en español.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Verdad», «permanece», «es fuerte», «vive» y «prevalece» están bien elegidos. La mejora principal es idiomática y de manejo de notas, no de glosario.
  issues:
  - severity: medium
    issue: La expresión «para siempre y para siempre» es poco natural en español.
    rationale: Aunque intenta reflejar la intensificación de εἰς τὸν αἰῶνα τοῦ αἰῶνος, en español suena forzada. «Por los siglos de los siglos» es la forma idiomática y fiel para este superlativo temporal.
  - severity: medium
    issue: La nota b está anclada en la primera frase temporal en vez de la frase final intensificada.
    rationale: La auditoría inglesa señala que la nota explica la frase final «εἰς τὸν αἰῶνα τοῦ αἰῶνος». En español debe marcarse donde aparece esa frase, no en «para siempre» de la primera cláusula.
  - severity: low
    issue: La nota a no ofrece una alternativa española real.
    rationale: Dice «O «permanece» para «remains»», repitiendo la misma palabra. Debe ofrecer una alternativa auténtica como «permanece»/«permanece firme» o, mejor, «O «permanece» también puede traducirse «permanece» no tiene sentido; la alternativa documentada es «permanece» frente a «habita/permanece», pero en español la mejor opción es «permanece» con alternativa «perdura» o «subsiste».
  revised_spanish_text: Y la verdad permanece[a] y es fuerte para siempre, y vive y prevalece por los siglos de los siglos[b].
  revised_footnotes:
  - marker: a
    text: O «perdura» para «permanece».
    reason: lexical_alternative
  - marker: b
    text: La frase griega es literalmente «hasta el siglo del siglo», un giro intensificado que significa «por los siglos de los siglos».
    reason: lexical_alternative
