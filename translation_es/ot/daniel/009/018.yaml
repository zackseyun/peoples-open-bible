translation:
  language: es
  text: Inclina tu oído, mi Dios, y escucha; abre tus ojos y mira nuestras desolaciones y la ciudad[a] que es llamada por tu nombre. Porque no estamos presentando nuestras súplicas delante de ti a causa de nuestras justicias[b], sino a causa de tus abundantes misericordias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Modismo hebreo: «la ciudad sobre la cual es llamado tu nombre».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «nuestras justicias»; el plural puede aludir a actos justos o pretensiones de justicia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַטֵּה
  english_pob_choice: Incline
  chosen_spanish: Inclina
  alternatives_spanish:
  - Vuelve
  - Baja
  lexicon: HALOT
  rationale: El imperativo con אָזְן es un modismo de atención; «inclina» conserva el gesto de escucha atenta sin volverlo artificial en español.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - oh, mi Dios
  lexicon: HALOT
  rationale: Es vocativo por contexto; «mi Dios» expresa la dirección de la oración de forma natural y fiel.
- source_word: אָזְנְךָ
  english_pob_choice: your ear
  chosen_spanish: tu oído
  alternatives_spanish:
  - tu oreja
  lexicon: HALOT
  rationale: En español, «oído» suena más digno y natural que «oreja» para este uso antropomórfico.
- source_word: וּשֲׁמָע
  english_pob_choice: and hear
  chosen_spanish: y escucha
  alternatives_spanish:
  - y oye
  lexicon: HALOT
  rationale: «Escucha» mantiene la relación con «inclina tu oído» y comunica mejor la atención activa que el mero oír.
- source_word: פְּקַחָה
  english_pob_choice: open
  chosen_spanish: abre
  alternatives_spanish:
  - despabila
  - descorre
  lexicon: HALOT
  rationale: Verbo directo y transparente para los ojos; conserva el paralelismo con «mira».
- source_word: עֵינֶיךָ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - tu vista
  lexicon: HALOT
  rationale: Se retiene el plural concreto del hebreo y el lenguaje antropomórfico de la súplica.
- source_word: וּרְאֵה
  english_pob_choice: and see
  chosen_spanish: y mira
  alternatives_spanish:
  - y ve
  lexicon: HALOT
  rationale: «Mira» en español comunica mejor la invitación a prestar atención visual; «ve» resultaría más neutro y menos expresivo en esta secuencia poética.
- source_word: שֹׁמְמֹתֵינוּ
  english_pob_choice: our desolations
  chosen_spanish: nuestras desolaciones
  alternatives_spanish:
  - nuestra ruina
  - nuestros desiertos
  lexicon: HALOT
  rationale: «Desolaciones» conserva el plural del hebreo y puede abarcar tanto las ruinas como el estado devastado del pueblo y del país.
- source_word: וְהָעִיר
  english_pob_choice: and the city
  chosen_spanish: y la ciudad
  alternatives_spanish:
  - y esa ciudad
  lexicon: HALOT
  rationale: Traducción directa del sustantivo con artículo; mantiene la coordinación con «nuestras desolaciones».
- source_word: אֲשֶׁר נִקְרָא שִׁמְךָ עָלֶיהָ
  english_pob_choice: that is called by your name
  chosen_spanish: que es llamada por tu nombre
  alternatives_spanish:
  - sobre la cual es invocado tu nombre
  - que lleva tu nombre
  lexicon: HALOT
  rationale: En español, la pasiva «es llamada por tu nombre» preserva el modismo hebreo de pertenencia/identidad sin perder claridad.
- source_word: צִדְקֹתֵינוּ
  english_pob_choice: our righteousnesses
  chosen_spanish: nuestras justicias
  alternatives_spanish:
  - nuestras rectitudes
  - nuestras obras justas
  lexicon: HALOT
  rationale: Se conserva el plural inusual del hebreo con un plural español igualmente marcado. «Justicias» permite al lector percibir la tensión lexical sin suavizarla demasiado; también puede sugerir actos o pretensiones de justicia.
- source_word: מַפִּילִים
  english_pob_choice: are presenting
  chosen_spanish: estamos presentando
  alternatives_spanish:
  - estamos echando
  - estamos poniendo delante
  lexicon: HALOT
  rationale: Sigue la decisión inglesa de reflejar el valor idiomático del participio en la expresión de petición; «presentando» funciona naturalmente con «súplicas delante de ti».
- source_word: תַּחֲנוּנֵינוּ
  english_pob_choice: our pleas
  chosen_spanish: nuestras súplicas
  alternatives_spanish:
  - nuestras peticiones
  - nuestros ruegos
  lexicon: HALOT
  rationale: «Súplicas» conserva el tono reverente y urgente del término hebreo mejor que alternativas más generales.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  lexicon: HALOT
  rationale: Expresión idiomática natural en español para introducir la presentación de una petición.
- source_word: רַחֲמֶיךָ הָרַבִּים
  english_pob_choice: your abundant mercies
  chosen_spanish: tus abundantes misericordias
  alternatives_spanish:
  - tus muchas misericordias
  - tu abundante compasión
  lexicon: HALOT
  rationale: «Abundantes misericordias» sigue de cerca el plural intensivo y la revisión inglesa final, preservando la idea de gran abundancia sin reescribirla como un concepto más genérico.
theological_decisions:
- issue: Lenguaje antropomórfico aplicado a Dios
  english_pob_reading: Retained as direct anthropomorphic prayer language
  chosen_spanish_reading: 'Se mantiene el lenguaje antropomórfico directo: oído, ojos, mirar, escuchar'
  alternative_spanish_readings:
  - parafrasear como «presta atención» o «toma en cuenta»
  rationale: El hebreo presenta una oración corporal y concreta; la versión española conserva esa retórica sin inferir limitaciones corporales en Dios.
  doctrine_reference: Principio de transparencia textual y de preservación del sentido llano del original.
- issue: Base de la súplica de Daniel
  english_pob_reading: The prayer explicitly denies appeal on the basis of Israel's righteousness and grounds it in God's mercies
  chosen_spanish_reading: La oración niega que el acceso dependa de nuestras justicias y lo fundamenta en las misericordias de Dios
  alternative_spanish_readings:
  - suavizar la oposición a una mera indignidad general
  - reducir el plural a «nuestra justicia»
  rationale: 'El plural hebreo y el contraste teológico deben permanecer visibles: no hay mérito humano como base, sino misericordia divina abundante.'
  doctrine_reference: Evitar borrar una tensión léxica y teológica documentada por el texto.
translation_notes:
  revision_awareness: La revisión inglesa final prefirió «abundant mercies» frente a «great mercies». Por eso se refleja aquí «tus abundantes misericordias». También se preservó el plural hebreo de צִדְקֹתֵינוּ con «nuestras justicias», siguiendo la decisión auditada de no suavizar la tensión lexical.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהַי, no «SEÑOR», conforme al nombre vocativo del texto.
  - Se mantiene «abundantes misericordias» para armonizar con la última revisión inglesa del POB.
  - «Desolaciones» conserva el plural del hebreo y puede abarcar ruinas y devastación.
  - «Que es llamada por tu nombre» conserva el modismo de pertenencia sin reemplazarlo por una explicación interpretativa.
