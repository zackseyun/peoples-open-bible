translation:
  language: es
  text: Hay un regalo[a] que no te aprovechará, y hay un regalo cuya retribución es doble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hay un dar que no te beneficiará, y hay un dar cuyo retorno es doble».'
