base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/022/007.yaml
  text: Now Ahaziah’s downfall[a], by his going to Joram, was from God; and when he came, he went out with Jehoram to Jehu son of Nimshi, whom Yahweh had anointed to cut off the house of Ahab.
  footnotes:
  - marker: a
    text: Or 'he went out with Jehoram against Jehu' or 'to meet Jehu'; the Hebrew says literally 'to Jehu,' though the context suggests a hostile encounter.
    reason: lexical_alternative
