base_translation:
  language: en
  yaml_path: translation/ot/joshua/018/007.yaml
  text: For there is no portion for the Levites among you[a], because the priesthood of Yahweh is their inheritance. And Gad, Reuben, and the half-tribe of Manasseh have received their inheritance beyond the Jordan eastward, which Moses the servant of Yahweh gave them.
  footnotes:
  - marker: a
    text: Hebrew literally, 'his inheritance'; the singular likely refers collectively to Levi/the Levites, hence 'their inheritance' in the main text.
    reason: lexical_alternative
