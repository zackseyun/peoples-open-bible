translation:
  language: ko
  text: 이제 믿음은 바라는 것들의 실상이며, 보지 못하는 것들의 증거입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ὑπόστασις는 본질·실체·확신을 모두 함의한다. 본문은 「믿음」을 정의하는 자리이며, 1:3의 ὑπόστασις(본질)와 같은 어휘이지만 여기서는 바라는 것들이 믿음 안에서 현재화되는 「실상」의 의미가 우세하다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπόστασις
  english_pob_choice: assurance
  chosen_korean: 실상
  alternatives_korean:
  - 본질
  - 확신
  - 근거
  lexicon: BDAG
  rationale: 11:1의 ὑπόστασις는 그리스도론적 1:3과 같은 어휘이지만 본문은 「믿음」의 정의이며, 한국 교회 전통의 「실상」이 본문 흐름에 가장 잘 맞는다.
- source_word: ἔλεγχος
