translation:
  language: es
  text: Los cielos son tuyos; la tierra también es tuya. El mundo y su plenitud[a]—tú los fundaste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo lo que lo llena»; es decir, todo lo que hay en él.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְךָ
  english_pob_choice: are yours / is yours
  chosen_spanish: te pertenecen
  alternatives_spanish:
  - son tuyos
  - son de ti
  - te son propios
  lexicon: HALOT
  rationale: El hebreo con ל + sufijo expresa posesión. En español, «te pertenecen» comunica esa posesión de manera natural y fiel, sin forzar una cláusula copulativa menos idiomática en el poema.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: Se preserva el plural poético del hebreo y el registro elevado. «Los cielos» es más fiel que el singular «el cielo» y más natural en español bíblico que «el firmamento» en este contexto.
- source_word: אַף
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  - sí
  lexicon: HALOT
  rationale: 'Aquí añade extensión y énfasis: no solo los cielos, sino también la tierra. «También» reproduce bien esa relación paralela en español.'
- source_word: אָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  - la región
  lexicon: HALOT
  rationale: En paralelo con «los cielos» y seguido de «el mundo», el sentido es cósmico, no territorial. «La tierra» conserva ese alcance mejor que «el país» o «la región».
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo habitable
  - la tierra habitada
  lexicon: HALOT
  rationale: תֵּבֵל apunta al mundo ordenado o habitado. «El mundo» es una equivalencia natural y suficientemente precisa en español, sin volver la línea innecesariamente pesada.
- source_word: מְלֹאָהּ
  english_pob_choice: its fullness
  chosen_spanish: su plenitud
  alternatives_spanish:
  - todo lo que lo llena
  - lo que lo llena
  - su lleno
  lexicon: HALOT
  rationale: La frase hebrea significa literalmente «su plenitud». «Su plenitud» conserva la forma nominal y la amplitud semántica; en español puede incluir todo lo que el mundo contiene, como en el audit trail inglés.
- source_word: יְסַדְתָּם
  english_pob_choice: you founded them
  chosen_spanish: tú los fundaste
  alternatives_spanish:
  - tú los estableciste
  - tú pusiste su fundamento
  - tú los cimentaste
  lexicon: HALOT
  rationale: ייסד expresa fundar o establecer con imagen de fundamento. «Fundaste» mantiene la fuerza creativa/fundacional y enlaza naturalmente con el plural de los elementos mencionados antes.
theological_decisions:
- issue: Posesión divina y acción creadora
  english_pob_reading: The verse affirms God's possession of heaven and earth and his founding of the world and its fullness, without importing later doctrinal formulations.
  chosen_spanish_reading: El versículo afirma que los cielos y la tierra pertenecen a Yahvé, y que él fundó el mundo y su plenitud, sin añadir formulaciones doctrinales posteriores.
  alternative_spanish_readings:
  - hacer explícita la creación de la nada
  - reducir el texto a mera soberanía real sin énfasis creador
  rationale: El hebreo afirma tanto posesión como acción fundacional. La traducción conserva ambos temas y evita añadir o reducir el alcance teológico del pasaje.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La versión española sigue de cerca la revisión final del inglés, que prefirió una formulación más literal de מְלֹאָהּ («its fullness»). Por eso se eligió «su plenitud» frente a paráfrasis más expansivas, manteniendo además el paralelismo poético del verso.
  spanish_consistency_notes:
  - Se usó «Yahvé» en lugar de una máscara reverencial, conforme a la política del proyecto.
  - Se mantuvo el plural poético «los cielos» para reflejar שָׁמַיִם.
  - «Fundaste» conserva el matiz de יסד sin introducir terminología doctrinal ajena al texto.
  - «Su plenitud» deja abierta la referencia a todo lo contenido en el mundo, en armonía con el audit trail inglés.
