base_translation:
  language: en
  yaml_path: translation/ot/hosea/008/007.yaml
  text: For they sow the wind[a], and they will reap the whirlwind. The standing grain has no head; it will yield no flour. Even if it should yield[c][b], strangers will swallow it up.
  footnotes:
  - marker: a
    text: Or 'storm' or 'tempest' for 'whirlwind.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'The standing grain has no צמח'; the noun can mean 'sprout' or 'growth,' but here likely refers to the grain head/ear needed to make flour.
    reason: lexical_alternative
  - marker: c
    text: Or 'Perhaps it may yield, but strangers will swallow it up.'
    reason: alternative_reading
