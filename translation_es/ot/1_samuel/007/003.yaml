revisions:
- from: 'Entonces Samuel dijo a toda la casa de Israel[a]: «Si ustedes se están volviendo a Yahvé con todo su corazón, quiten de en medio de ustedes los dioses extranjeros y las Astartés[b], y preparen su corazón para Yahvé[c], y sírvanle solo a él; y él los librará de la mano de los filisteos[d]».'
  to: 'Entonces Samuel dijo a toda la casa de Israel[a]: «Si ustedes están volviendo a Yahvé con todo su corazón, quiten los dioses extranjeros y las Astartés[b] de en medio de ustedes, y dirijan su corazón a Yahvé[c], y sírvanle solo a él, y él los librará de la mano de los filisteos[d]».'
  rationale: 'La revisión alinea mejor el español con la evidencia fuente y con la auditoría inglesa: restituye como lectura principal el sentido preferido de orientar el corazón a Yahvé, elimina una adición innecesaria en la nota [a], mejora el alcance sintáctico de «de en medio de ustedes» para incluir también «las Astartés», y pule la naturalidad del español sin perder precisión.'
