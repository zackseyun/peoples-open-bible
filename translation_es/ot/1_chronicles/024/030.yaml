    text: Jeremoth también puede escribirse «Jerimoth».
    reason: lexical_alternative
  revision_rationale: Se corrige la transliteración principal del nombre final para ajustarla a la decisión documentada del POB («Jeremoth») y se simplifica la nota para conservar únicamente la variante significativa («Jerimoth»). Se elimina el marcador de nota en «Mahli», ya que la nota en realidad corresponde al tercer nombre y los marcadores deben anclarse exactamente donde aplican.
