translation:
  language: es
  text: Y con ellos, por sus generaciones, según sus casas paternas, había 36.000 soldados del ejército para la guerra,[b] porque tenían muchas esposas[a] e hijos varones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mujeres»; el hebreo נָשִׁים puede tener ambos sentidos, pero aquí «esposas» encaja mejor con el contexto genealógico y doméstico.
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea «tropas del ejército para la guerra» es una formulación militar condensada; también puede traducirse como «divisiones militares para la batalla».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲלֵיהֶם
  english_pob_choice: And with them
  chosen_spanish: Y con ellos
  alternatives_spanish:
  - Y sobre ellos
  - Y junto a ellos
  lexicon: HALOT
  rationale: El hebreo עַל con sufijo pronominal aquí funciona en un listado genealógico de pertenencia o asociación, no de superioridad espacial. «Con ellos» comunica bien esa relación en español sin perder el valor del enlace introducido por el hebreo.
- source_word: לְתֹלְדוֹתָם
  english_pob_choice: by their generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - según sus generaciones
  - en sus genealogías
  lexicon: HALOT
  rationale: תּוֹלְדוֹת remite a generaciones o divisiones genealógicas. «Por sus generaciones» conserva la referencia a la línea de descendencia y resulta natural en español bíblico contemporáneo.
- source_word: לְבֵית אֲבוֹתָם
  english_pob_choice: according to their fathers' houses
  chosen_spanish: según sus casas paternas
  alternatives_spanish:
  - según sus casas de los padres
  - según sus casas ancestrales
  lexicon: HALOT
  rationale: La expresión técnica de clan/patrimonio paternal se expresa mejor en español con «casas paternas», que mantiene la estructura social del hebreo sin reemplazarla por una formulación más interpretativa.
- source_word: גְּדוּדֵי צְבָא מִלְחָמָה
  english_pob_choice: troops of the army for war
  chosen_spanish: tropas del ejército para la guerra
  alternatives_spanish:
  - bandas del ejército para la guerra
  - divisiones militares para la guerra
  - tropas de guerra
  lexicon: HALOT
  rationale: La cadena nominal hebrea es compacta y militar. «Tropas del ejército para la guerra» preserva los tres elementos léxicos principales sin borrar el matiz de organización militar; «ejército» rinde צְבָא y «tropas» rinde גְּדוּדֵי.
- source_word: שְׁלֹשִׁים וְשִׁשָּׁה אָלֶף
  english_pob_choice: 36,000
  chosen_spanish: '36.000'
  alternatives_spanish:
  - treinta y seis mil
  lexicon: HALOT
  rationale: Se conserva la cifra exacta en formato decimal español para legibilidad moderna, sin alterar el contenido cuantitativo del hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la cifra anterior. «Porque» expresa con claridad la explicación causal en español y evita ambigüedad en el flujo sintáctico.
- source_word: הִרְבּוּ
  english_pob_choice: had many
  chosen_spanish: habían tenido muchas
  alternatives_spanish:
  - habían multiplicado
  - habían aumentado mucho
  lexicon: HALOT
  rationale: El hifil de רבה expresa hacer abundante o aumentar. En este contexto familiar, «habían tenido muchas» refleja de forma idiomática la idea de gran fecundidad sin convertir el verbo en una paráfrasis excesiva.
- source_word: נָשִׁים
  english_pob_choice: wives
  chosen_spanish: esposas[a]
  alternatives_spanish:
  - mujeres
  lexicon: HALOT
  rationale: Aunque נָשִׁים puede significar «mujeres», el contexto genealógico y doméstico favorece «esposas». Se elige un término claro y eclesialmente comprensible en español, manteniendo la nota sobre la alternativa léxica documentada.
- source_word: וּבָנִים
  english_pob_choice: and sons
  chosen_spanish: e hijos
  alternatives_spanish:
  - e hijos varones
  - e hijos e hijas
  lexicon: HALOT
  rationale: בָּנִים es literalmente «hijos/varones»; en un contexto de casas paternas y crecimiento familiar, «hijos» resulta natural en español y evita una rigidez innecesaria. La coordinación con «esposas» mantiene el cuadro doméstico del versículo.
theological_decisions:
- issue: Sentido de נָשִׁים en un contexto genealógico
  english_pob_reading: wives, with a footnote noting 'women' as a lexical alternative
  chosen_spanish_reading: esposas, con nota sobre la alternativa 'mujeres'
  alternative_spanish_readings:
  - mujeres
  rationale: No hay una tensión doctrinal, pero sí una ambigüedad léxica relevante. En una enumeración de casas paternas y descendencia, «esposas» es el sentido más coherente con el contexto; la nota conserva la alternativa sin borrar la posibilidad semántica del hebreo.
  doctrine_reference: No doctrinal issue; lexical context only.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que ajustó la expresión militar a una forma más natural sin perder la construcción hebrea subyacente. En español se conservó esa naturalidad relativa con «tropas del ejército para la guerra», evitando una literalidad rígida como «tropas de guerra» si oscurecía el paralelismo nominal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «esposas» en lugar de «mujeres» por el contexto familiar; la nota conserva la alternativa léxica.
  - «Casas paternas» reproduce la fórmula tribal del hebreo sin sustituirla por una explicación interpretativa.
  - El formato numérico con punto decimal responde a la convención española y preserva la cifra exacta del original.
