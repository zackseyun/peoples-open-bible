translation:
  language: es
  text: 'Pero el hombre dijo a Joab[a]: «Aun si yo estuviera pesando sobre mis palmas mil piezas de plata, no alargaría mi mano contra el hijo del rey; porque el rey te ordenó a ti, a Abisai y a Itai, en nuestra presencia, diciendo[b]: “Guarden para mí al joven Absalón”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «pesando mil plata sobre mis palmas/manos». La expresión alude a recibir un gran pago por peso.'
    reason: lexical_alternative
  - marker: b
    text: 'El texto hebreo al final del versículo es difícil: literalmente, «Guarden מי al joven, Absalón». Muchos entienden el sentido, a la luz de 18:5, como: «Guarden para mí al joven Absalón».'
    reason: textual_variant
lexical_decisions:
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  lexicon: HALOT
  rationale: El artículo hebreo señala a un personaje ya identificado por el relato; en español, «el hombre» conserva esa referencia específica sin añadir interpretación.
- source_word: שֹׁקֵל עַל כַּפַּי אֶלֶף כֶּסֶף
  english_pob_choice: weighing out a thousand pieces of silver on my palms
  chosen_spanish: pesando en mis palmas mil piezas de plata
  alternatives_spanish:
  - pesando sobre mis palmas mil piezas de plata
  - recibiendo mil piezas de plata en mis manos
  lexicon: HALOT
  rationale: El hebreo usa una imagen de peso/entrega sobre las palmas. «Piezas de plata» es más natural y cauteloso que especificar una unidad no expresada en el texto; «mis palmas» preserva la imagen corporal que el contexto exige.
- source_word: לֹא אֶשְׁלַח יָדִי אֶל
  english_pob_choice: I would not put out my hand against
  chosen_spanish: no alargaría mi mano contra
  alternatives_spanish:
  - no extendería mi mano contra
  - no pondría mi mano contra
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para un acto violento o agresivo. «Alargar mi mano contra» conserva la imagen y su fuerza, con un español natural y solemne.
- source_word: בֶּן הַמֶּלֶךְ
  english_pob_choice: the king’s son
  chosen_spanish: el hijo del rey
  alternatives_spanish:
  - el hijo del monarca
  lexicon: HALOT
  rationale: La relación real es central y la traducción literal directa es clara y fiel en español.
- source_word: בְאָזְנֵינוּ
  english_pob_choice: in our hearing
  chosen_spanish: en nuestros oídos
  alternatives_spanish:
  - ante nosotros
  - en nuestra presencia
  - en nuestra audiencia
  lexicon: HALOT
  rationale: He mantenido la imagen más cercana al hebreo. Aunque «en nuestra presencia» sería más idiomático, «en nuestros oídos» preserva la metáfora auditiva del original y su énfasis en que el mandato fue oído directamente.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio la orden a
  lexicon: HALOT
  rationale: En contexto real y militar, «mandó» transmite la autoridad del rey con naturalidad en español, sin endurecer innecesariamente el tono.
- source_word: שִׁמְרוּ
  english_pob_choice: Guard
  chosen_spanish: Guarden
  alternatives_spanish:
  - Guarda
  - Protejan
  - Estén atentos a
  lexicon: HALOT
  rationale: El plural imperativo español corresponde a los tres destinatarios. «Guardar» conserva la noción de custodia/protección del verbo hebreo y funciona bien con una persona.
- source_word: מִי בַּנַּעַר בְּאַבְשָׁלוֹם
  english_pob_choice: for me the young man Absalom
  chosen_spanish: al joven Absalón
  alternatives_spanish:
  - al joven Absalón para mí
  - sobre el joven Absalón
  lexicon: HALOT
  rationale: El hebreo final es difícil y el POB inglés sigue la lectura contextual de 18:5. En español, «Guarden para mí al joven Absalón» reproduce esa comprensión de manera clara; el texto principal deja implícita la frase problemática preservando el sentido. La omisión del equivalente de מי refleja la dificultad textual sin forzar un español artificial.
translation_notes:
  revision_awareness: La redacción española sigue de cerca la revisión más reciente del POB en inglés, que afinó la imagen de «on my palms»; por eso se traduce con «en mis palmas» y no con una expresión más genérica. También se conserva la decisión editorial de resolver el final oscuro del versículo según el contexto de 2 Samuel 18:5, dejando constancia en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque aquí no aparece el nombre divino.
  - Se evitó «siervo» o lenguaje eclesiástico no solicitado; el registro es narrativo y militar.
  - Se preservó la tensión textual del cierre con una nota, en lugar de suavizarla por completo.
