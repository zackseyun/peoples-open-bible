translation:
  language: es
  text: Así cantaré alabanzas a tu nombre para siempre, para cumplir[a] mis votos día a día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pagar». El verbo hebreo puede significar tanto «pagar» como, más ampliamente, «cumplir» cuando se usa con votos.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - Entonces
  - De este modo
  lexicon: HALOT
  rationale: La partícula concluye o deduce a partir de la oración previa. «Así» transmite bien la consecuencia/resolución en un español natural y digno.
- source_word: אֲזַמְּרָה
  english_pob_choice: I will sing praise
  chosen_spanish: cantaré alabanzas
  alternatives_spanish:
  - cantaré
  - haré música de alabanza
  lexicon: HALOT
  rationale: El piel de זמר tiene sentido de cantar con alabanza. «Cantaré alabanzas» conserva el valor cultual sin sonar forzado.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu Nombre
  - tu reputación
  lexicon: HALOT
  rationale: Se mantiene la expresión directa del hebreo. En este contexto «tu nombre» comunica de forma transparente la referencia a la persona y su identidad revelada.
- source_word: לָעַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: Expresa continuidad sin ambigüedad y es la forma más natural en español bíblico contemporáneo.
- source_word: לְשַׁלְּמִי
  english_pob_choice: to fulfill
  chosen_spanish: para cumplir
  alternatives_spanish:
  - para pagar
  - para completar
  lexicon: HALOT
  rationale: Con votos, שלם en piel puede significar pagar o cumplir. «Cumplir» preserva la obligación votiva en español y evita reducir el sentido solo a una transacción económica.
- source_word: נְדָרַי
  english_pob_choice: my vows
  chosen_spanish: mis votos
  alternatives_spanish:
  - mis promesas votivas
  lexicon: HALOT
  rationale: «Votos» es el término estándar y fiel para נדרים en contexto cultual.
- source_word: יוֹם יוֹם
  english_pob_choice: day by day
  chosen_spanish: día tras día
  alternatives_spanish:
  - día por día
  - cada día
  lexicon: HALOT
  rationale: La repetición hebrea expresa continuidad regular. «Día tras día» reproduce bien esa reiteración en un registro natural.
theological_decisions:
- issue: 'Verbo con votos: ¿pagar o cumplir?'
  english_pob_reading: The Hebrew verb can mean either 'pay' or more broadly 'fulfill' when used of vows.
  chosen_spanish_reading: «Cumplir» en el texto principal, con la posibilidad de «pagar» preservada implícitamente.
  alternative_spanish_readings:
  - para pagar mis votos
  - para completar mis votos
  rationale: El hebreo שלם aplicado a votos admite la idea de pagar, pero en español «cumplir votos» comunica mejor la obligación y el acto de satisfacer lo prometido. Se conserva la tensión semántica mediante la nota.
  doctrine_reference: Salmo 61:8-9; vocabulario votivo en el AT
- issue: «Tu nombre» como referencia teológica
  english_pob_reading: your name
  chosen_spanish_reading: tu nombre
  alternative_spanish_readings:
  - tu Nombre
  rationale: Se conserva la formulación literal sin sustituirla por una paráfrasis teológica. En el Salterio, «nombre» puede implicar carácter, fama y presencia; el texto español deja abierta esa carga semántica.
  doctrine_reference: Salmos 61:8-9; uso bíblico del nombre de Dios
translation_notes:
  revision_awareness: La base inglesa fue revisada de «day after day» a «day by day» para mayor literalidad formal; por eso se optó por «día tras día», que conserva la repetición continua del hebreo יוֹם יוֹם con naturalidad en español.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» según el término fuente; aquí no aparece el tetragrámaton, por lo que no hay sustitución terminológica.
  - «Votos» se usa de manera consistente para נדרים, evitando «promesas» salvo en nota explicativa.
  - El paralelismo poético se conserva en una sola oración fluida, sin añadir contenido interpretativo ajeno al texto.
