id: ISA.41.29
reference: Isaiah 41:29
source:
  edition: WLC
  text: הֵ֣ן כֻּלָּ֔/ם אָ֥וֶן אֶ֖פֶס מַעֲשֵׂי/הֶ֑ם ר֥וּחַ וָ/תֹ֖הוּ נִסְכֵּי/הֶֽם׃פ
translation:
  text: Look[a], all of them are nothing; their works are nothing[b]. Their cast images are wind and emptiness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vanity' for 'nothingness' (אָוֶן); the Hebrew term can also carry senses such as trouble or wickedness, but here it emphasizes worthlessness.
    reason: lexical_alternative
  - marker: b
    text: Or 'their molten images.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection introducing an emphatic conclusion. 'Look' is natural modern English while preserving the force of drawing attention.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all of them together
  - all
  lexicon: HALOT
  rationale: Refers collectively to the idols and/or their makers just discussed; 'all of them' preserves the explicit pronominal force better than bare 'all'.
- source_word: אָוֶן
  chosen: nothingness
  alternatives:
  - vanity
  - trouble
  - wickedness
  lexicon: HALOT
  rationale: In this polemical context against idols, the sense is worthlessness/emptiness rather than moral evil alone. 'Nothingness' fits the parallel with אֶפֶס and avoids archaic 'vanity.'
- source_word: אֶפֶס
  chosen: nothing
  alternatives:
  - nonexistence
  - zero
  - nothingness
  lexicon: HALOT
  rationale: Used predicatively to intensify the claim of worthlessness. 'Nothing' is idiomatic and clear in English.
- source_word: מַעֲשֵׂיהֶם
  chosen: their works
  alternatives:
  - their deeds
  - what they make
  lexicon: HALOT
  rationale: Likely refers to the products/actions associated with idol-making. 'Works' preserves the broad sense and echoes prophetic critique of manufactured idols.
- source_word: רוּחַ
  chosen: wind
  alternatives:
  - breath
  - spirit
  lexicon: HALOT
  rationale: In parallel with תֹהוּ, the sense is insubstantiality. 'Wind' best conveys emptiness and transience here; 'spirit' would mislead theologically.
- source_word: תֹהוּ
  chosen: emptiness
  alternatives:
  - formlessness
  - waste
  - chaos
  lexicon: HALOT
  rationale: Here the word functions as a term of futility/void in idol polemic, not specifically primordial chaos. 'Emptiness' matches the rhetorical thrust and pairs well with 'wind.'
- source_word: נִסְכֵּיהֶם
  chosen: their cast images
  alternatives:
  - their molten images
  - their metal idols
  lexicon: HALOT
  rationale: From נסך in the noun form referring to cast/poured metal images. 'Cast images' is a clear, fairly formal rendering; 'molten images' is traditional but less natural in current English.
