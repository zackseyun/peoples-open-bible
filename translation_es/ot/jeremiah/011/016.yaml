translation:
  language: es
  text: 'Yahvé te dio el nombre[a]: «Un olivo verde, hermoso en fruto y forma». Al estruendo de un gran tumulto[b] le prendió fuego, y sus ramas[c] quedan arruinadas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Un olivo floreciente, hermoso en fruto y forma».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Al sonido de un gran tumulto».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «sus ramas están rotas/dañadas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זַיִת רַעֲנָן
  english_pob_choice: a green olive tree
  chosen_spanish: un olivo verde
  alternatives_spanish:
  - un olivo frondoso
  - un olivo floreciente
  lexicon: HALOT
  rationale: זַיִת nombra un olivo/olivo como árbol; רַעֲנָן expresa frescura, verdor o vitalidad. «Verde» es la solución española más natural y conserva la imagen de vitalidad sin perder la base léxica.
- source_word: יְפֵה פְרִי תֹאַר
  english_pob_choice: beautiful in fruit and form
  chosen_spanish: hermoso en fruto y forma
  alternatives_spanish:
  - hermoso en fruto y aspecto
  - hermoso con buen fruto y forma
  lexicon: HALOT
  rationale: 'La expresión acumula cualidades estéticas y productivas: יְפֵה («hermoso»), פְרִי («fruto») y תֹאַר («forma/aspecto»). «Hermoso en fruto y forma» preserva ambos polos sin diluir la estructura del hebreo.'
- source_word: קָרָא יְהוָה שְׁמֵךְ
  english_pob_choice: The LORD called your name
  chosen_spanish: Yahvé llamó tu nombre
  alternatives_spanish:
  - Yahvé te llamó por nombre
  - Yahvé te nombró
  lexicon: HALOT
  rationale: Se mantiene el giro hebreo de designación por nombre, pero en un español publicable se puede decir «llamó tu nombre» para conservar el eco del original. «Yahvé» sigue la política del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: El Tetragrama se rinde como «Yahvé» según la terminología del proyecto para preservar el nombre divino y evitar la sustitución por un título.
- source_word: לְקוֹל הֲמוּלָּה גְדֹלָה
  english_pob_choice: At the sound of a great tumult
  chosen_spanish: al sonido de un gran tumulto
  alternatives_spanish:
  - al oírse un gran tumulto
  - ante el estruendo de un gran tumulto
  lexicon: HALOT
  rationale: קוֹל es «sonido»; הֲמוּלָּה denota tumulto, agitación o conmoción. «Tumulto» preserva el campo semántico mejor que «ruido» y concuerda con la revisión auditada de la POB en inglés.
- source_word: הִצִּית אֵשׁ עָלֶיהָ
  english_pob_choice: he set fire to it
  chosen_spanish: le prendió fuego
  alternatives_spanish:
  - le encendió fuego
  - puso fuego sobre él
  lexicon: HALOT
  rationale: El hifil de יצת significa encender o poner en llamas. «Prender fuego» es idiomático en español y conserva el acto causativo sin añadir matices ajenos.
- source_word: וְרָעוּ
  english_pob_choice: are ruined
  chosen_spanish: quedan arruinadas
  alternatives_spanish:
  - están arruinadas
  - se han arruinado
  - están dañadas
  lexicon: HALOT
  rationale: La forma comunica resultado devastador sobre las ramas. «Quedan arruinadas» mantiene el estado resultante y reproduce bien el peso del pasivo/resultado del hebreo.
- source_word: דָּלִיּוֹתָיו
  english_pob_choice: its branches
  chosen_spanish: sus ramas
  alternatives_spanish:
  - sus sarmientos
  - sus bieldos
  lexicon: HALOT
  rationale: El término se refiere a ramas colgantes o boughs. «Ramas» es claro y natural en español, con la posibilidad de «sarmientos» si se quisiera un matiz más técnico, pero menos transparente.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se sigue la decisión doctrinal del proyecto de no ocultar el nombre del pacto. «Yahvé» es la forma española establecida en el marco POB, en lugar de la sustitución litúrgica por «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Imagen del olivo como símbolo de Israel/Judá bajo juicio
  english_pob_reading: A green olive tree, beautiful in fruit and form
  chosen_spanish_reading: Un olivo verde, hermoso en fruto y forma
  alternative_spanish_readings:
  - Un olivo frondoso, hermoso en fruto y forma
  - Un olivo floreciente, hermoso en fruto y forma
  rationale: La metáfora del olivo conserva la dignidad y la vitalidad del pueblo descrito. No se explicita alegóricamente más allá de lo que el texto presenta; la imagen queda abierta para el contexto profético inmediato.
  doctrine_reference: Contexto profético de Jeremías 11
- issue: Estado de las ramas tras el juicio
  english_pob_reading: its branches are ruined
  chosen_spanish_reading: sus ramas quedan arruinadas
  alternative_spanish_readings:
  - sus ramas están arruinadas
  - sus ramas se rompen
  rationale: «Quedan arruinadas» expresa tanto la ruina como el resultado visible del fuego, sin reducir indebidamente el hebreo a una sola lesión física.
  doctrine_reference: Lectura contextual de דָּלִיּוֹת
- issue: Tensión léxica entre 'tumulto' y 'sonido/estruendo'
  english_pob_reading: At the sound of a great tumult
  chosen_spanish_reading: al sonido de un gran tumulto
  alternative_spanish_readings:
  - al estruendo de un gran tumulto
  - ante el ruido de una gran conmoción
  rationale: Se conserva la combinación de 'sonido' con 'tumulto' para no borrar la acumulación semántica del hebreo, manteniendo además la revisión inglesa que prefirió 'tumult' por sobre 'roar'.
  doctrine_reference: HALOT; revisión auditada POB
translation_notes:
  revision_awareness: La redacción española sigue la revisión auditada más reciente del inglés POB, que ajustó la primera cláusula para incluir tanto פְרִי como תֹאַר («fruit and form») y prefirió «tumult» para הֲמוּלָּה en lugar de una imagen más sonora como «roar». También conserva la lectura del juicio sobre el árbol con un verbo resultativo («quedan arruinadas») que refleja el efecto del fuego sobre las ramas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה.
  - Se usó «olivo» en singular para reflejar el árbol como imagen colectiva.
  - «Tumulto» se reservó para הֲמוּלָּה y no se sustituyó por «ruido» para preservar la densidad semántica.
  - «Ramas» traduce דָּלִיּוֹתָיו con claridad pastoral y pública; el matiz técnico alternativo queda en nota.
  - La puntuación con dos puntos antes de la cita conserva el efecto de designación profética del hebreo.
