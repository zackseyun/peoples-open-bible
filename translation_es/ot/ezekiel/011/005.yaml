translation:
  language: es
  text: 'Y el Espíritu de Yahvé cayó sobre mí[a], y me dijo: «Di: “Así dice Yahvé: Así han dicho, casa de Israel, y yo conozco las cosas que suben en su espíritu[b]”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vino sobre mí».
    reason: lexical_alternative
  - marker: b
    text: 'O «lo que sube en su mente»; hebreo: «las cosas que suben en su espíritu».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּפֹּל עָלַי
  english_pob_choice: fell upon me
  chosen_spanish: cayó sobre mí
  alternatives_spanish:
  - vino sobre mí
  - se abatió sobre mí
  lexicon: HALOT
  rationale: El hebreo expresa el movimiento de ‘caer sobre’ con fuerza verbal; en español, ‘cayó sobre mí’ conserva esa imagen sin sonar forzado. ‘Vino sobre mí’ suaviza el énfasis; ‘se abatió sobre mí’ añade matiz no pedido por el texto.
- source_word: רוּחַ יְהוָה
  english_pob_choice: the Spirit of Yahweh
  chosen_spanish: el Espíritu de Yahvé
  alternatives_spanish:
  - el espíritu de Yahvé
  - el viento de Yahvé
  lexicon: HALOT
  rationale: En este contexto profético, רוּחַ designa el Espíritu divino que se apodera del profeta. Se capitaliza ‘Espíritu’ por tratarse del Espíritu de Dios, y se mantiene ‘Yahvé’ según el criterio del proyecto.
- source_word: אֱמֹר
  english_pob_choice: Say
  chosen_spanish: Di
  alternatives_spanish:
  - Dile
  - Habla
  lexicon: HALOT
  rationale: Es un imperativo directo al profeta. ‘Di’ es la equivalencia natural y precisa en español.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así ha dicho Yahvé
  alternatives_spanish:
  - Así dice Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: ‘Así ha dicho’ reproduce bien la fórmula profética fija del hebreo con tono solemne. ‘Así dice’ es posible, pero menos marcado como fórmula oracular; ‘Esto dice’ es más interpretativo.
- source_word: כֵּן אֲמַרְתֶּם
  english_pob_choice: So you have said
  chosen_spanish: Así han dicho ustedes
  alternatives_spanish:
  - Así ustedes han dicho
  - De este modo han dicho ustedes
  lexicon: HALOT
  rationale: El adverbio כֵּן pide una correlación con lo dicho por Israel. ‘Así han dicho ustedes’ conserva la referencia directa y el plural; ‘ustedes’ explicita el sujeto y hace fluida la frase en español.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - casa de Israel, O
  - Israel
  lexicon: HALOT
  rationale: Se conserva la expresión idiomática y covenantal ‘casa de Israel’, más fiel que reducirla a ‘Israel’.
- source_word: וּמַעֲלוֹת רוּחֲכֶם
  english_pob_choice: the things that come up in your spirit
  chosen_spanish: las cosas que suben en su espíritu
  alternatives_spanish:
  - lo que sube en su espíritu
  - los pensamientos que surgen en su espíritu
  lexicon: HALOT
  rationale: מַעֲלוֹת deriva de la idea de ‘subir/ascender’. Se mantiene la metáfora con ‘suben’ y ‘cosas’, evitando interpretar prematuramente como ‘pensamientos’. ‘Espíritu’ conserva el vocabulario hebreo de רוּחַ.
- source_word: רוּחֲכֶם
  english_pob_choice: your spirit
  chosen_spanish: su espíritu
  alternatives_spanish:
  - su mente
  - su corazón
  lexicon: HALOT
  rationale: En español se usa ‘su’ de cortesía dirigida al pueblo como colectivo. Se mantiene ‘espíritu’ para no desplazar el término hebreo por ‘mente’ o ‘corazón’, que serían más interpretativos.
- source_word: אֲנִי יְדַעְתִּיהָ
  english_pob_choice: I know
  chosen_spanish: yo conozco
  alternatives_spanish:
  - yo sé
  - yo he conocido
  lexicon: HALOT
  rationale: El hebreo expresa conocimiento presente y seguro; ‘yo conozco’ reproduce mejor esa fuerza que un simple ‘sé’. El objeto queda resumido por la frase anterior, como en la POB inglesa.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. El español del proyecto usa ‘Yahvé’ para preservar el nombre del pacto y evitar el ocultamiento con un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de רוּחַ en la primera cláusula
  english_pob_reading: Spirit
  chosen_spanish_reading: Espíritu
  alternative_spanish_readings:
  - viento
  - ánimo
  rationale: El contexto es profético y de investidura; por eso se entiende como el Espíritu de Dios que capacita al profeta, no como viento físico ni mera disposición interior.
  doctrine_reference: 'DOCTRINE.md: רוח / pneuma — context-sensitive rendering'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail al preferir una formulación directa para כֵּן אֲמַרְתֶּם y mantener la referencia al ‘espíritu’ en el segundo miembro. También se conservó la fórmula profética solemne con ‘Así ha dicho Yahvé’.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ conforme al criterio del proyecto para el nombre divino.
  - Se capitalizó ‘Espíritu’ al referirse al Espíritu de Yahvé.
  - Se preservó ‘casa de Israel’ como fórmula covenantal.
  - Se evitó traducir רוּחַ por ‘mente’ en el texto principal para no borrar la tensión lexical documentada.
