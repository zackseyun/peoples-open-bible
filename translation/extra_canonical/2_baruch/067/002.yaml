translation:
  text: Or do you think there is no grief, even for the angels before the Mighty One,
    because Zion was handed over in this way, and because, look, the nations boast
    in their hearts, and they gather before their idols and say, “She who long trampled
    others is trampled down; she who brought others into subjection has herself been
    subjected”?
