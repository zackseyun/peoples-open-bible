translation:
  language: es
  text: Entonces Moisés salió de la presencia de Faraón y de la ciudad, y extendió sus manos hacia Yahvé; y el trueno[a] y el granizo cesaron, y la lluvia ya no se derramó sobre la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «las voces»; en este contexto de tormenta, la expresión se refiere al trueno.
    reason: lexical_alternative
  - marker: b
    text: 'O: «ya no se derramó sobre el suelo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue
  - partió
  - se fue
  lexicon: HALOT
  rationale: El wayyiqtol de יצא expresa una salida física. En español, «salió» es natural y conserva el movimiento narrativo sin añadir matices no presentes en el hebreo.
- source_word: מֵעִם פַּרְעֹה
  english_pob_choice: from Pharaoh
  chosen_spanish: de junto a Faraón
  alternatives_spanish:
  - de Faraón
  - alejándose de Faraón
  - de la presencia de Faraón
  lexicon: HALOT
  rationale: La combinación de מן con עם indica separación de la presencia de Faraón. «De junto a» conserva mejor la cercanía relacional implícita que un simple «de Faraón».
- source_word: אֶת הָעִיר
  english_pob_choice: out of the city
  chosen_spanish: salió de la ciudad
  alternatives_spanish:
  - salió fuera de la ciudad
  - salió de la urbe
  lexicon: HALOT
  rationale: Aunque אֶת es marcador de objeto, aquí el contexto narrativo exige movimiento fuera de la ciudad. «Salió de la ciudad» es idiomático y fiel al sentido contextual.
- source_word: וַיִּפְרֹשׂ כַּפָּיו
  english_pob_choice: spread out his hands
  chosen_spanish: extendió sus manos
  alternatives_spanish:
  - abrió sus manos
  - desplegó sus manos
  - levantó sus manos
  lexicon: HALOT
  rationale: El hebreo describe un gesto de oración. «Extendió sus manos» preserva la imagen corporal sin sonar forzado en español.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: hacia Yahvé
  alternatives_spanish:
  - a Yahvé
  - ante Yahvé
  - al Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según la terminología del proyecto. «Hacia» refleja bien la orientación de אֶל en un gesto de oración, sin perder la dirección personal.
- source_word: הַקֹּלוֹת
  english_pob_choice: the thunder
  chosen_spanish: el trueno
  alternatives_spanish:
  - los truenos
  - las voces
  - los sonidos
  lexicon: HALOT
  rationale: En este contexto de tormenta, קולות se refiere al fenómeno meteorológico, no a «voces» literalmente. En español, el singular colectivo «el trueno» comunica con naturalidad el fenómeno en conjunto.
- source_word: וְהַבָּרָד
  english_pob_choice: the hail
  chosen_spanish: el granizo
  alternatives_spanish:
  - el granizo y la piedra
  - la granizada
  lexicon: HALOT
  rationale: El término designa la plaga del granizo. «Granizo» es la forma normal y precisa en español.
- source_word: וַיַּחְדְּלוּ
  english_pob_choice: ceased
  chosen_spanish: cesaron
  alternatives_spanish:
  - se detuvieron
  - terminaron
  - pararon
  lexicon: HALOT
  rationale: El verbo expresa cese o interrupción. «Cesaron» mantiene el tono narrativo elevado y la relación con los fenómenos climáticos.
- source_word: וּמָטָר
  english_pob_choice: and rain
  chosen_spanish: y la lluvia
  alternatives_spanish:
  - y lluvia
  - y el aguacero
  lexicon: HALOT
  rationale: El contexto habla de precipitación vinculada a la tormenta. «Lluvia» es natural en español y no introduce más carga que el término hebreo.
- source_word: לֹא נִתַּךְ
  english_pob_choice: was no longer poured down
  chosen_spanish: ya no fue derramada
  alternatives_spanish:
  - ya no cayó
  - ya no fue vertida
  - no se derramó más
  lexicon: HALOT
  rationale: נתך expresa ser vertido o derramado desde arriba. «Ya no fue derramada» conserva la imagen pasiva y el cese continuo indicado por el contexto.
- source_word: אָרְצָה
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el suelo
  - a la tierra
  - en la tierra
  lexicon: HALOT
  rationale: La forma direccional de ארץ señala el lugar de caída. «Sobre la tierra» es fiel, claro y compatible con el registro narrativo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrammaton. Siguiendo la terminología del proyecto, se translitera como «Yahvé» para preservar el nombre pactal en la superficie española.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: קֹּלוֹת en el contexto de la plaga
  english_pob_reading: the thunder
  chosen_spanish_reading: el trueno
  alternative_spanish_readings:
  - los truenos
  - las voces
  - los sonidos
  rationale: Aunque el hebreo dice literalmente «las voces/los sonidos», el contexto de tormenta exige el sentido meteorológico. En español, el singular colectivo «el trueno» evita una pluralidad menos natural sin perder el referente.
  doctrine_reference: 'DOCTRINE.md: Lexical-context sensitivity — meteorological senses in plague narratives'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail en inglés. Se conservan las dos tensiones léxicas principales documentadas: קולות como fenómeno de trueno y נתך como derramamiento pasivo de la lluvia. No se detectaron revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se evita el calco «SEÑOR» y se conserva el registro narrativo bíblico con verbos simples y directos.
  - Se distingue entre el gesto físico («extendió sus manos») y la dirección orante («hacia Yahvé»).
  - La nota de pie marca la ambigüedad de קולות sin neutralizarla en el texto principal.
