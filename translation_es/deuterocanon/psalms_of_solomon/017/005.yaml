translation:
  language: es
  text: Tú, Yahvé, escogiste a David como rey sobre Israel, y tú le juraste acerca de su descendencia[a] para siempre, que su reino no desaparecería ante ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «simiente», es decir, sus descendientes.
    reason: lexical_alternative
  - marker: b
    text: O «su dinastía no cesaría ante ti».
    reason: alternative_reading
lexical_decisions:
- source_word: ᾑρέτισω
  english_pob_choice: chose
  chosen_spanish: escogiste
  alternatives_spanish:
  - elegiste
  - seleccionaste
  lexicon: LSJ
  rationale: El verbo expresa la elección divina de David para el reinado. «Escogiste» es natural en español y conserva la idea de selección con énfasis electivo, sin añadir matices ajenos.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  lexicon: LSJ
  rationale: Aunque el inglés POB usa «Lord» para el vocativo divino, el estándar del proyecto pide «Yahvé» para el nombre divino en el texto principal. Aquí se trata de una dirección directa a Dios, no de un título humano.
- source_word: βασιλέα ἐπʼ Ἰσραήλ
  english_pob_choice: as king over Israel
  chosen_spanish: como rey sobre Israel
  alternatives_spanish:
  - rey sobre Israel
  - como rey para Israel
  lexicon: LSJ
  rationale: La construcción griega indica realeza ejercida sobre Israel. «Como rey sobre Israel» mantiene la relación de gobierno y suena natural en español.
- source_word: περὶ τοῦ σπέρματος
  english_pob_choice: concerning his offspring
  chosen_spanish: acerca de su descendencia
  alternatives_spanish:
  - acerca de su semilla
  - acerca de su linaje
  - acerca de su descendencia
  lexicon: LSJ
  rationale: σπέρμα aquí apunta a la línea familiar de David, no a una semilla literal. «Descendencia» comunica bien el valor genealógico y preserva la referencia al linaje.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la era
  - por siempre
  lexicon: LSJ
  rationale: En lenguaje de pacto la frase expresa duración continua. «Para siempre» es la equivalencia natural y fiel en español.
- source_word: τοῦ μὴ ἐκλείπειν
  english_pob_choice: would not fail
  chosen_spanish: no faltaría
  alternatives_spanish:
  - no cesaría
  - no desaparecería
  - no llegaría a su fin
  lexicon: LSJ
  rationale: El infinitivo con negación expresa que la monarquía de David no se extinguiría ni quedaría sin continuidad. «No faltaría» es fluido en español y mantiene la fuerza de no desaparecer.
- source_word: ἀπέναντί σου
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  lexicon: LSJ
  rationale: La frase ubica el reino en relación con Dios. «Delante de ti» conserva el sentido relacional y es idiomático en español bíblico contemporáneo.
- source_word: βασίλειον αὐτοῦ
  english_pob_choice: his kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su dinastía
  - su casa real
  - su realeza
  lexicon: LSJ
  rationale: βασίλειον puede referirse al reino o al gobierno dinástico. «Su reino» es la opción más directa; el contexto permite percibir la continuidad dinástica sin forzar una paráfrasis.
theological_decisions:
- issue: Lenguaje davídico de promesa y continuidad
  english_pob_reading: 'The oath is rendered as a promise concerning David''s continuing royal line: that his kingdom would not fail before you.'
  chosen_spanish_reading: 'El juramento se vierte como promesa sobre la continuidad del reinado de David: que su reino no faltaría delante de ti.'
  alternative_spanish_readings:
  - que su dinastía no cesaría delante de ti
  - que su casa real no desaparecería ante ti
  rationale: El griego combina σπέρμα (descendencia) con βασίλειον (reino). En español, «reino» preserva el vocabulario real y deja visible la implicación dinástica sin sustituirla por una interpretación más explícita de la necesaria.
  doctrine_reference: Pacto davídico / promesa mesiánica
translation_notes:
  revision_awareness: 'Revisado contra el griego de Swete y el audit trail inglés: se mantuvo la elección divina y el vocabulario de pacto; no hubo cambios necesarios respecto a la lectura de referencia.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para el nombre divino en el texto principal.
  - Se evitó «Cristo» porque este versículo habla de David y su descendencia/reino, no del título mesianico explícito.
  - Se mantuvo «descendencia» para σπέρμα, con nota alternativa para la lectura más literal «descendencia/semilla».
  - «Delante de ti» conserva la relación cultual/covenantal de ἀπέναντί σου sin introducir un giro interpretativo adicional.
