translation:
  language: es
  text: 'Yahvé te envió en una misión y dijo: «Ve y consagra a destrucción[a] a los pecadores, a Amalec[b] y pelea contra ellos hasta que sean consumidos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘destruye por completo’; el hebreo usa un verbo técnico de poner bajo anatema o dedicar a destrucción.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘los pecadores, Amalec’, donde ‘Amalec’ funciona como identificación en aposición de ‘los pecadores’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלָחֲךָ
  english_pob_choice: sent you
  chosen_spanish: te envió
  alternatives_spanish:
  - te mandó
  - te despachó
  lexicon: HALOT
  rationale: שלח en la forma narrativa indica envío/commission. «Te envió» conserva el valor básico y suena natural en español sin introducir matices excesivos.
- source_word: בְּדָרֶךְ
  english_pob_choice: on a mission
  chosen_spanish: en una misión
  alternatives_spanish:
  - en el camino
  - en un viaje
  - por un camino
  lexicon: HALOT
  rationale: Aquí דרך funciona idiomáticamente con el envío como esfera de comisión, no solo como trayecto físico. «En una misión» reproduce ese sentido de encargo o comisión.
- source_word: וְהַחֲרַמְתָּה
  english_pob_choice: devote ... to destruction
  chosen_spanish: consagra a destrucción
  alternatives_spanish:
  - consagra para destrucción
  - devota a destrucción
  - extermina
  lexicon: HALOT
  rationale: 'חרם en este contexto es técnico: poner bajo anatema o dedicación destructiva. «Consagra a destrucción» intenta preservar la fuerza cultual/jurídica sin suavizarla a un simple «matar» ni reemplazarla por un término tradicional opaco.'
- source_word: הַחַטָּאִים
  english_pob_choice: the sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los impíos
  - los culpables
  - los malvados
  lexicon: HALOT
  rationale: El sustantivo/adjetivo hebreo identifica moralmente al grupo. «Los pecadores» mantiene esa calificación explícita y sigue de cerca la elección auditada en inglés.
- source_word: אֶת עֲמָלֵק
  english_pob_choice: Amalek / the Amalekites
  chosen_spanish: a Amalec
  alternatives_spanish:
  - a los amalecitas
  - a Amalec
  lexicon: HALOT
  rationale: El hebreo nombra al colectivo como Amalec. En español, «Amalec» preserva la forma breve y la relación con el nombre colectivo; se mantiene sin expandirlo innecesariamente a una glosa interpretativa.
- source_word: וְנִלְחַמְתָּ בוֹ
  english_pob_choice: fight against them
  chosen_spanish: pelea contra ellos
  alternatives_spanish:
  - haz guerra contra él
  - combate contra Amalec
  lexicon: HALOT
  rationale: לְהִלָּחֵם בְּ indica combatir o hacer guerra contra. Aunque el sufijo singular puede referir al colectivo, el español requiere concordancia plural por el referente colectivo humano; «pelea contra ellos» comunica el sentido de manera clara.
- source_word: עַד כַּלּוֹתָם אֹתָם
  english_pob_choice: until they are consumed
  chosen_spanish: hasta que sean consumidos
  alternatives_spanish:
  - hasta que se consuman
  - hasta que queden destruidos
  - hasta que termines con ellos
  lexicon: HALOT
  rationale: כלה expresa llegar a un fin o consumirse completamente. «Sean consumidos» conserva la pasividad/resultativo del hebreo y evita ampliar el sentido a un acto más interpretativo como «termines con ellos».
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español, el estándar del proyecto es «Yahvé», que preserva el nombre del pacto y evita la convención de ocultarlo con un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: חרם as technical destruction under ban
  english_pob_reading: devote ... to destruction
  chosen_spanish_reading: consagra a destrucción
  alternative_spanish_readings:
  - consagra al anatema
  - dedica a destrucción
  - extermina
  rationale: La frase hebrea carga un sentido técnico de devoción al anatema. La elección española busca conservar esa tensión cultual y judicial sin borrar el matiz mediante una simplificación totalizante.
  doctrine_reference: 'DOCTRINE.md Contested terms: חרם'
translation_notes:
  revision_awareness: 'La redacción inglesa más reciente ajustó el nombre colectivo a «the Amalekites» y refinó el cierre a «until they are consumed». La versión española sigue ese mismo movimiento: mantiene el colectivo como referente plural en el combate y conserva el final pasivo «sean consumidos», sin introducir una paráfrasis más fuerte que el hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de acuerdo con la terminología del proyecto para יְהוָה.
  - Se conserva la distinción entre el acto técnico de חרם y el mero ‘matar’; por eso el texto evita «destruye» simple en favor de una fórmula marcada.
  - El referente colectivo de Amalec se expresa con plural en español por concordancia natural del pronombre y del verbo, sin perder la identidad colectiva del nombre.
  - «Pecadores» preserva el juicio moral explícito del hebreo y el audit trail inglés.
  - La cláusula final mantiene voz pasiva/resultativa («sean consumidos») para reflejar כַּלּוֹתָם sin sobreinterpretar el proceso.
