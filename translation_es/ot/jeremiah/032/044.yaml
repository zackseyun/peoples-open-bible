    reason: alternative_reading
  revision_rationale: La revisión corrige la principal desviación frente al expediente léxico-teológico del POB al traducir el modismo שְׁבוּתָם de manera idiomática en español («restauraré su fortuna»), preservando en nota las alternativas más literales. También mejora la naturalidad jurídica de la frase con «se escribirán escrituras» y «atestiguadas por testigos», sin perder la textura formal del original.
