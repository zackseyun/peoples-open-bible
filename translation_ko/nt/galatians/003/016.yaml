  - 자손
  rationale: 바울의 논증은 그리스어 σπέρμα의 단수 형태(복수 σπέρμασιν과의 대조)에 의존한다. 「후손」으로 옮기면 단·복수 구분이 약해져 논증의 결정적 근거가 흐려진다.
