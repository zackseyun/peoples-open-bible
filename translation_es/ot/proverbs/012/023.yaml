base_translation:
  language: en
  yaml_path: translation/ot/proverbs/012/023.yaml
  text: A prudent man conceals knowledge[b][a], but the heart of fools proclaims folly.
  footnotes:
  - marker: a
    text: Or 'A shrewd man covers knowledge.' The Hebrew adjective can carry the sense 'shrewd' as well as 'prudent,' and the verb literally means 'covers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the heart of fools calls out folly.'
    reason: lexical_alternative
