  revision_rationale: Se corrigen los anclajes de notas para que correspondan al texto pertinente. Se ajusta אֲדֹנִים a «jefe» para reflejar mejor el sentido colectivo-singular contextual documentado por la auditoría inglesa, preservando en nota la alternativa más literal plural. Se mantiene «Yahvé», «cada hombre» y «en paz» por fidelidad al hebreo y a la política del proyecto. «Por los montes» suena ligeramente más natural con «disperso/dispersado» en español sin alterar el valor locativo de la visión.
