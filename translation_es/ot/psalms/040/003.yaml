- from: Él me hizo subir del pozo de tumulto[a], del lodo cenagoso; puso mis pies sobre una roca, afirmando mis pasos.
  to: Me sacó del pozo de tumulto[a], del lodo cenagoso; puso mis pies sobre una roca, afirmando mis pasos.
  rationale: Se revisa solo el inicio para lograr un español más natural y fiel al sentido de rescate concreto del hebreo. «Me sacó» expresa mejor la extracción desde el pozo que «me hizo subir», sin introducir una paráfrasis interpretativa. Se conserva la nota léxica y el resto de la imaginería poética.
