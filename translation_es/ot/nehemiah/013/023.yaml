translation:
  language: es
  text: También en aquellos días vi a los judíos[a] que se habían casado[b] con mujeres asdoditas, amonitas y moabitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los judeanos'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'habían hecho habitar mujeres'; aquí el giro idiomático hebreo significa que se habían casado o que las habían tomado como esposas.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Igualmente
  lexicon: HALOT
  rationale: Conserva el valor aditivo de la partícula sin endurecer el español. 'También' es natural y fiel al enlace discursivo de Nehemías.
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquel tiempo
  lexicon: HALOT
  rationale: Mantiene la fórmula temporal idiomática y el tono narrativo del pasaje.
- source_word: רָאִיתִי
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - observé
  - yo vi
  lexicon: HALOT
  rationale: El verbo פשוט de ver se traduce de forma directa; el sujeto explícito no es necesario en español.
- source_word: הַיְּהוּדִים
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeos
  - los judeanos
  lexicon: HALOT
  rationale: Sigue la lectura comunitaria y etnorreligiosa adoptada por la POB inglesa. 'Judíos' es el equivalente natural en español bíblico actual; 'judeanos' sería más técnico pero menos idiomático aquí.
- source_word: הֹשִׁיבוּ נָשִׁים
  english_pob_choice: had married women
  chosen_spanish: habían tomado mujeres
  alternatives_spanish:
  - habían casado con mujeres
  - habían hecho habitar mujeres
  - habían traído mujeres como esposas
  lexicon: HALOT
  rationale: Refleja el hebraísmo de הֹשִׁיבוּ sin forzar una traducción mecánica. 'Habían tomado mujeres' conserva la literalidad básica y deja claro por contexto, como en la POB inglesa, que se trata de una unión matrimonial reprobada.
- source_word: אשדודיות
  english_pob_choice: women of Ashdod
  chosen_spanish: mujeres asdoditas
  alternatives_spanish:
  - mujeres de Asdod
  - asdoditas
  lexicon: HALOT
  rationale: La forma gentilicia en español resulta clara y compacta. 'Mujeres de Asdod' también sería válida, pero 'asdoditas' preserva mejor el matiz étnico-adjetival.
- source_word: עמוניות
  english_pob_choice: Ammonite women
  chosen_spanish: ammonitas
  alternatives_spanish:
  - mujeres ammonitas
  - mujeres de Amón
  lexicon: HALOT
  rationale: El adjetivo gentilicio puede funcionar sustantivado en español por concordancia con 'mujeres' ya implícitas. Se conserva la referencia étnica sin añadir una perífrasis innecesaria.
- source_word: מוֹאֲבִיּוֹת
  english_pob_choice: Moabite women
  chosen_spanish: moabitas
  alternatives_spanish:
  - mujeres moabitas
  - mujeres de Moab
  lexicon: HALOT
  rationale: Igual que con 'ammonitas', el gentilicio sustantivado es natural en español y corresponde al paralelismo del hebreo.
theological_decisions:
- issue: Rango de הַיְּהוּדִים dentro de la comunidad postexílica
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los judeanos
  rationale: La referencia es al pueblo-comunidad del periodo postexílico, no solo a una localización geográfica. 'Los judíos' comunica mejor ese referente en español sin perder el sentido histórico-covenantal.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido idiomático de הֹשִׁיבוּ נָשִׁים
  english_pob_reading: had married women
  chosen_spanish_reading: habían tomado mujeres
  alternative_spanish_readings:
  - habían casado con mujeres
  - habían hecho habitar mujeres
  rationale: El hebreo expresa la toma de esposas mediante un giro idiomático. En español, 'habían tomado mujeres' preserva la fricción textual y el lector entiende por contexto el acto matrimonial denunciado por Nehemías, sin sobreexplicar ni suavizar el problema.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto inglés revisado no recibió cambios sustantivos en la última pasada; la versión española sigue de cerca sus decisiones auditadas, especialmente la lectura etnocomunitaria de הַיְּהוּדִים y el valor idiomático de הֹשִׁיבוּ נָשִׁים.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general en el proyecto, pero este versículo no lo contiene.
  - Se prefirió 'judíos' por continuidad contextual con Ezra-Nehemías y por la lectura inglesa auditada; 'judeanos' queda documentado como alternativa.
  - Los gentilicios 'asdoditas', 'ammonitas' y 'moabitas' mantienen el paralelismo nominal del hebreo y evitan perífrasis innecesarias.
