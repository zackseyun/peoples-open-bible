  to: Que mi lengua se pegue a mi paladar[a] si no te recuerdo, si no exalto a Jerusalén por encima de mi mayor alegría[b].
  rationale: Se corrige el anglicismo no traducido 'May' con la autoimprecación natural española 'Que...'. Se reordenan y corrigen las notas para que sus marcadores aparezcan solo donde corresponden y aporten información real. También se ajusta el verbo principal a 'exalto' para alinearlo con la revisión inglesa auditada y reflejar mejor el matiz de elevación del hebreo, manteniendo un español claro y digno.
