  text: אָ֗ח נִפְשָׁ֥ע מִ/קִּרְיַת עֹ֑ז ו/מדונים כִּ/בְרִ֥יחַ אַרְמֽוֹן־׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/018/019.yaml
  text: A brother offended is harder to win than a fortified city[b][a], and quarrels are like the bars of a citadel.
  footnotes:
  - marker: a
    text: Or 'A brother wronged is harder to win than a fortified city.' The Hebrew participle can emphasize one who has been wronged/offended, leading to either 'offended' or 'wronged' in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'and disputes are like the bar of a citadel/palace.' The final noun can denote either a fortified residence ('citadel') or 'palace,' but the defensive context favors 'citadel.'
    reason: lexical_alternative
