translation:
  language: es
  text: Hizo el altar del holocausto de madera de acacia, de cinco codos de largo y de cinco codos de ancho, cuadrado[a], y de tres codos de alto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuadrangular».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Construyó
  - Fabricó
  lexicon: HALOT
  rationale: El verbo עשה en esta narración describe una acción pasada simple. «Hizo» conserva la inmediatez narrativa y evita añadir matices técnicos que el hebreo no exige.
- source_word: מִזְבַּח הָעֹלָה
  english_pob_choice: the altar of burnt offering
  chosen_spanish: el altar del holocausto
  alternatives_spanish:
  - el altar de la ofrenda quemada
  - el altar para el holocausto
  - el altar del sacrificio quemado
  lexicon: HALOT
  rationale: En español bíblico amplio, «holocausto» comunica la ofrenda totalmente consumida por fuego y mantiene la relación constructa con הָעֹלָה. «Del holocausto» es más natural que una paráfrasis explicativa y preserva la terminología ritual.
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: of acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de acacia
  - de madera de shittim
  - de madera de acacia
  lexicon: HALOT
  rationale: שִׁטִּים refiere a la acacia. «Madera de acacia» es la equivalencia clara y digna en español, mejor que la transliteración «shittim», que no comunica el referente botánico.
- source_word: חָמֵשׁ אַמּוֹת
  english_pob_choice: five cubits
  chosen_spanish: de cinco codos
  alternatives_spanish:
  - de cinco codos
  - cinco codos
  - de cinco medidas
  lexicon: HALOT
  rationale: Se conserva «codos» como unidad tradicional del texto tabernacular, sin convertirla. El giro con «de» mantiene naturalidad en español para expresar las dimensiones.
- source_word: אָרְכּוֹ
  english_pob_choice: its length
  chosen_spanish: de largo
  alternatives_spanish:
  - en su longitud
  - de longitud
  - largo
  lexicon: HALOT
  rationale: En una descripción dimensional, «de largo» es la forma más natural en español y corresponde a «its length» sin forzar un calco nominal.
- source_word: רָחְבּוֹ
  english_pob_choice: its width
  chosen_spanish: de ancho
  alternatives_spanish:
  - en su anchura
  - de anchura
  - ancho
  lexicon: HALOT
  rationale: «De ancho» es la equivalencia dimensional más idiomática en español contemporáneo y conserva el sentido de רחב en contexto arquitectónico.
- source_word: רָבוּעַ
  english_pob_choice: square
  chosen_spanish: cuadrado
  alternatives_spanish:
  - foursquare
  - de cuatro lados iguales
  lexicon: HALOT
  rationale: El adjetivo hebreo indica forma cuadrada o de cuatro lados iguales. «Cuadrado» es directo, claro y suficiente; se evita añadir una glosa innecesaria en el texto principal.
- source_word: קֹמָתוֹ
  english_pob_choice: its height
  chosen_spanish: de alto
  alternatives_spanish:
  - en altura
  - de altura
  - alto
  lexicon: HALOT
  rationale: En lenguaje arquitectónico español, «de alto» expresa la medida vertical con naturalidad y transmite el valor de קֹמָה sin elevar el registro más de lo necesario.
translation_notes:
  revision_awareness: 'El inglés POB mantiene una traducción sobria y literal-idiomática, con una sola nota para la alternativa lexical de רָבוּעַ («four-square»). La versión española sigue la misma línea: conserva la unidad de medida, traduce de manera natural las dimensiones, y mantiene «cuadrado» sin sobrecargar el texto principal con una glosa. No hay revisiones aplicadas en el pasaje fuente, y la concordancia general con el audit trail inglés es alta.'
  spanish_consistency_notes:
  - Se mantiene la terminología ritual «altar del holocausto» en lugar de una paráfrasis explicativa más larga.
  - Se conserva la unidad «codos» por coherencia con el texto tabernacular y con la práctica POB de no convertir medidas antiguas.
  - 'El orden de las dimensiones sigue el hebreo y el inglés auditado: largo, ancho, forma, altura.'
  - Se usa «madera de acacia» como español transparente para עֲצֵי שִׁטִּים.
  - No se introducen mayúsculas especiales ni términos eclesiásticos no justificados por el source packet.
