translation:
  language: es
  text: Y haré de la tierra una desolación, porque han obrado con infidelidad[a], declara el Señor Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «han cometido una brecha de fidelidad» o «han sido infieles». «Han obrado con infidelidad» mantiene la fuerza de la ruptura de pacto en un español natural.'
    reason: lexical_alternative
  - marker: b
    text: 'Título hebreo: «Señor Yahvé»; en inglés a menudo se traduce tradicionalmente «the Lord GOD» para reflejar la combinación de «Adonai» con el nombre divino YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will make
  chosen_spanish: Y haré
  alternatives_spanish:
  - Y pondré
  - Y dejaré
  lexicon: HALOT
  rationale: נתן puede significar dar, poner o establecer; aquí, con «la tierra» y el resultado «una desolación», la equivalencia natural en español es «haré», que expresa bien el efecto de convertirla en desolación sin añadir contenido ajeno.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: En este contexto profético de juicio, אֶרֶץ se refiere al territorio/ámbito juzgado. «La tierra» es idiomático en español bíblico y conserva ese sentido territorial.
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - desolada
  - un desierto
  - una devastación
  lexicon: HALOT
  rationale: El sustantivo hebreo denota un estado de ruina o desolación. «Una desolación» conserva el valor nominal mejor que un adjetivo como «desolada».
- source_word: יַעַן
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la razón del juicio; «porque» es la conexión causal más clara y natural en español.
- source_word: מָעֲלוּ מַעַל
  english_pob_choice: they have acted unfaithfully
  chosen_spanish: han obrado con infidelidad
  alternatives_spanish:
  - han sido infieles
  - han cometido una traición de pacto
  - han actuado con deslealtad
  lexicon: HALOT
  rationale: La combinación verbal-intensificadora expresa infidelidad de pacto o ruptura de confianza. «Han obrado con infidelidad» mantiene esa fuerza sin volverlo demasiado técnico; «infidelidad» preserva el matiz relacional y covenantal.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - oráculo de
  lexicon: HALOT
  rationale: Es la fórmula profética de declaración solemne. «Declara» conserva el registro formal y actual del oráculo divino.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: La política del proyecto pide Yahvé para יְהוָה; por eso se evita la sustitución tradicional por «SEÑOR». «Señor Yahvé» comunica la combinación de אֲדֹנָי + YHWH con naturalidad en español y mantiene el nombre divino auditable.
theological_decisions:
- issue: Representación del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahveh
  rationale: El texto hebreo usa el Tetragrámaton, y el marco del proyecto pide traducir יְהוָה como «Yahvé». En español, «el Señor Yahvé» conserva la fórmula compuesta sin enmascarar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se reportan cambios necesarios y el acuerdo de revisión fue alto. Se mantiene la lectura del juicio territorial, la infidelidad de pacto y la representación directa de YHWH como Yahvé.'
  spanish_consistency_notes:
  - Se usa «tierra» para אֶרֶץ en sentido territorial de juicio, no «mundo».
  - Se conserva la fuerza nominal de שְׁמָמָה mediante «desolación».
  - «Infidelidad» refleja el matiz covenantal de מָעַל sin caer en una traducción excesivamente arcaica.
  - «Yahvé» se usa conforme al estándar del proyecto para יְהוָה, incluso en la fórmula compuesta con אֲדֹנָי.
