theological_decisions:
- issue: Reference to God's wilderness provision from the exodus tradition
  chosen_reading: Translate the verse as a historical-poetic description of God causing water to come from the rock for Israel.
  alternative_readings:
  - Possible broader metaphor of divine provision
  rationale: The psalm rehearses Israel's history, so the main sense is the exodus event rather than an abstract metaphor. The translation keeps the historical image while allowing its theological resonance to remain implicit.
