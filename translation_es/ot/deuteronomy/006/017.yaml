    text: 'También: «de seguro guardarás» / «guardarás con diligencia»; el hebreo usa un infinitivo absoluto con el verbo finito para intensificar la exhortación.'
    reason: lexical_alternative
  - marker: b
    text: «Testimonios» también puede entenderse como «decretos» o «estipulaciones del pacto».
    reason: lexical_alternative
