translation:
  language: es
  text: Entonces el sacerdote pondrá a la mujer ante Yahvé, descubrirá la cabeza de la mujer[a] y pondrá en sus manos la ofrenda de grano de memorial; es una ofrenda de grano de celos, mientras en la mano del sacerdote estarán las aguas amargas que traen maldición[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dejará suelto el cabello de la mujer'. El giro hebreo dice literalmente 'soltar/desatar la cabeza de la mujer' y probablemente alude a desatarle el cabello como parte del rito.
    reason: lexical_alternative
  - marker: b
    text: O 'las aguas amargas que traen la maldición'. El participio hebreo puede entenderse como aguas que producen o acarrean una maldición.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעֱמִיד
  english_pob_choice: shall set
  chosen_spanish: hará que ... se presente
  alternatives_spanish:
  - pondrá de pie
  - hará estar en pie
  - presentará
  lexicon: HALOT
  rationale: El hiphil de עמד expresa causar que alguien quede de pie o sea colocado en una posición ritual ante una autoridad. En español, 'hacer que se presente' conserva el acto formal y ceremonial sin sonar forzado.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - delante de Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: La preposición cultual se expresa naturalmente con 'ante'. Se conserva el nombre divino 'Yahvé' por la norma del proyecto para יְהוָה.
- source_word: וּפָרַע אֶת רֹאשׁ הָאִשָּׁה
  english_pob_choice: uncover the woman's head
  chosen_spanish: descubrirá la cabeza de la mujer
  alternatives_spanish:
  - soltará el cabello de la mujer
  - dejará suelto el cabello de la mujer
  - descubrirá la cabeza de la mujer
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático que literalmente menciona la 'cabeza' de la mujer. 'Descubrirá la cabeza' sigue de cerca el texto y deja abierta la tensión con la posible referencia al cabello, como refleja el auditorio inglés.
- source_word: וְנָתַן עַל כַּפֶּיהָ
  english_pob_choice: place in her hands
  chosen_spanish: pondrá en sus manos
  alternatives_spanish:
  - pondrá sobre sus palmas
  - colocará en sus manos
  lexicon: HALOT
  rationale: La imagen concreta de poner sobre las palmas se comunica con naturalidad mediante 'poner en sus manos', expresión española idiomática para la acción ritual.
- source_word: מִנְחַת הַזִּכָּרוֹן
  english_pob_choice: the grain offering of remembrance
  chosen_spanish: la ofrenda de memorial
  alternatives_spanish:
  - la ofrenda para recordar
  - la ofrenda memorial
  - la ofrenda de recuerdo
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacerdotal es 'ofrenda', y זִכָּרוֹן tiene el valor de memorial/rememoración. 'Ofrenda de memorial' preserva el matiz litúrgico y evita una traducción demasiado explicativa.
- source_word: מִנְחַת קְנָאֹת הִוא
  english_pob_choice: it is a grain offering of jealousy
  chosen_spanish: es una ofrenda de celos
  alternatives_spanish:
  - es una ofrenda de celo
  - es una ofrenda de celos
  lexicon: HALOT
  rationale: קְנָאֹת expresa celos/celo en sentido relacional y de exclusividad. 'Celos' comunica mejor el contexto matrimonial y ritual en español; se mantiene el predicado breve del hebreo.
- source_word: וּבְיַד הַכֹּהֵן יִהְיוּ
  english_pob_choice: while in the priest's hand are
  chosen_spanish: pero en la mano del sacerdote estarán
  alternatives_spanish:
  - y en la mano del sacerdote estarán
  - mientras el sacerdote tiene en la mano
  lexicon: HALOT
  rationale: La construcción es circunstancial y describe el estado de los elementos durante el rito. 'Estarán' refleja el hebreo verbal y 'en la mano del sacerdote' conserva la concreción del original.
- source_word: מֵי הַמָּרִים
  english_pob_choice: the bitter waters
  chosen_spanish: las aguas amargas
  alternatives_spanish:
  - las aguas de amargura
  - el agua amarga
  lexicon: HALOT
  rationale: El plural hebreo 'aguas' se conserva. 'Amargas' es el equivalente directo y natural de מרים en este contexto.
- source_word: הַמְאָֽרֲרִים
  english_pob_choice: that bring a curse
  chosen_spanish: que traen maldición
  alternatives_spanish:
  - que acarrean maldición
  - que producen maldición
  - que traen la maldición
  lexicon: HALOT
  rationale: El participio describe aguas que efectúan una maldición. 'Traen maldición' conserva el valor causativo sin sobrecargar el español con una forma extraña.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo emplea el Tetragrámaton directamente. La política del proyecto pide 'Yahvé' en el texto principal, manteniendo el nombre del pacto en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido ritual de מִנְחַת הַזִּכָּרוֹן
  english_pob_reading: the grain offering of remembrance
  chosen_spanish_reading: la ofrenda de memorial
  alternative_spanish_readings:
  - la ofrenda de recuerdo
  - la ofrenda memorial
  - la ofrenda para recordar
  rationale: En contexto sacerdotal la ofrenda es un memorial litúrgico, no solo un 'recuerdo' subjetivo. 'Memorial' preserva mejor la función cultual y sugiere el vínculo con la ceremonia.
  doctrine_reference: Lexical theology of priestly offerings in Numbers 5
- issue: Sentido de מִנְחַת קְנָאֹת
  english_pob_reading: a grain offering of jealousy
  chosen_spanish_reading: una ofrenda de celos
  alternative_spanish_readings:
  - una ofrenda de celo
  - una ofrenda de celos
  rationale: El plural hebreo funciona de modo abstracto; en español, 'celos' expresa con más claridad la carga relacional del rito, que trata con fidelidad conyugal y exclusividad.
  doctrine_reference: Contextual semantics of קנאה in Numbers 5
translation_notes:
  revision_awareness: La redacción sigue de cerca el rastro auditado en inglés y recoge la revisión reciente que prefirió 'uncover the woman's head' sobre la paráfrasis anterior relacionada con el cabello. Por eso el español principal mantiene 'descubrirá la cabeza de la mujer' y la nota conserva la alternativa de dejar suelto el cabello como lectura posible. También se preserva la distinción entre 'memorial' y 'celos', así como el participio causal final.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme a la terminología base del proyecto para יְהוָה.
  - '''Ofrenda'' traduce מִנְחָה de forma consistente en contexto sacerdotal.'
  - '''Aguas amargas'' conserva el plural hebreo.'
  - No se introduce 'Cristo' ni otro vocabulario confesional ajeno al versículo.
  - La puntuación usa dos puntos para reproducir la aposición explicativa del hebreo sin volverla una glosa interpretativa excesiva.
