revisions:
- from: Y subió el límite a Debir desde el Valle de Ajor[a], y giró hacia el norte, hacia Gilgal, que está frente a la subida de Adumín, que queda al sur del wadi[b]. Luego el límite pasó a las aguas de En-shemesh, y sus salidas[c] llegaban hasta En-rogel.
  to: Y el límite subió a Debir desde el Valle de Acor, y giró hacia el norte, hacia Gilgal[a], que está frente al ascenso de Adummim, que está al sur del wadi[b]. Luego el límite pasó a las aguas de En-shemesh, y sus extremos[c] estaban en En-rogel.
  rationale: Se corrige la nota [a] para que refleje la alternativa real documentada en la auditoría inglesa sobre Gilgal, no una lectura errónea del Valle de Acor. Se ajustan topónimos a formas más fieles y reconocibles ('Acor', 'Adummim'), se conserva 'wadi' con nota cultural, y se mejora la frase final para mantener el plural hebreo de תֹצְאֹתָיו con mejor español.
