id: 1PE.1.1
reference: 1 Peter 1:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Πέτρος ἀπόστολος Ἰησοῦ Χριστοῦ ἐκλεκτοῖς παρεπιδήμοις διασπορᾶς Πόντου, Γαλατίας, Καππαδοκίας, Ἀσίας, καὶ Βιθυνίας,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/001.yaml
  text: 'Peter, an apostle of Jesus Messiah, to the chosen sojourners of the dispersion in Pontus, Galatia, Cappadocia, Asia, and Bithynia,'
translation:
  language: ko
  text: '메시아 예수의 사도인 베드로가, 본도와 갈라디아와 갑바도기아와 아시아와 비두니아에 흩어져 사는 택하심을 받은 나그네들[a]에게 편지합니다:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「거류민」. 헬라어 παρεπίδημος는 본향이 아닌 곳에 잠시 머무는 자, 사회적·정치적으로 뿌리를 박지 못한 외인을 가리킨다. 「나그네」는 한국어에서 그 정체성을 가장 자연스럽게 담는다. διασπορά는 흩어진 하나님 백성의 정체성을 함의하며, 여기서는 평어로 「흩어져 사는」으로 풀어냈다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πέτρος
  english_pob_choice: Peter
  chosen_korean: 베드로
  alternatives_korean:
  - 페트로스
  lexicon: BDAG
  rationale: 한국 성서 전통에서 확고히 굳은 표기 「베드로」를 따른다.
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_korean: 사도
  alternatives_korean:
  - 사신
  - 전달자
  lexicon: BDAG
  rationale: 신약 서신 인사 정식에서 ἀπόστολος는 단순 사절이 아닌 공인된 직책으로 기능하므로 「사도」로 옮긴다.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_korean: 메시아 예수
  alternatives_korean:
  - 예수 그리스도
  lexicon: BDAG
  rationale: 'Χριστός는 칭호로 기능하므로 「메시아」로 옮긴다. 한국어 어순상 칭호+이름(메시아 예수)이 자연스럽다.'
- source_word: ἐκλεκτοῖς
  english_pob_choice: chosen
  chosen_korean: 택하심을 받은 자들
  alternatives_korean:
  - 택함받은 자들
  - 선택된 자들
  lexicon: BDAG
  rationale: 신적 수동의 어감을 살려 「택하심을 받은」으로 옮기며, 후대 교리적 함의가 강한 「선택된」을 피한다.
- source_word: παρεπιδήμοις
  english_pob_choice: sojourners
  chosen_korean: 나그네
  alternatives_korean:
  - 거류민
  - 외인
  lexicon: BDAG
  rationale: 사회적 비소속·임시 거주의 정체성을 담는 한국어 「나그네」가 본문의 의미에 가장 가깝다. 「거류민」은 행정적 느낌이 강하다.
- source_word: διασπορᾶς
  english_pob_choice: of the dispersion
  chosen_korean: 흩어져 사는
  alternatives_korean:
  - 디아스포라의
  - 흩어진 자들 중의
  lexicon: BDAG
  rationale: 「흩어져 사는」으로 풀면 한국어 어순에 자연스럽고 본문이 가진 흩어진 하나님 백성 정체성의 함의도 살아 있다.
- source_word: Πόντου, Γαλατίας, Καππαδοκίας, Ἀσίας, καὶ Βιθυνίας
  english_pob_choice: in Pontus, Galatia, Cappadocia, Asia, and Bithynia
  chosen_korean: 본도와 갈라디아와 갑바도기아와 아시아와 비두니아
  alternatives_korean: []
  lexicon: BDAG
  rationale: 한국 성서 전통에서 굳은 표기를 따른다.
theological_decisions:
- issue: ἐκλεκτοῖς를 교리적 「선택」 어휘로 굳히지 않고 「택하심을 받은」으로 옮김
  chosen_reading: 택하심을 받은 자들
  alternative_readings:
  - 선택된 자들
  - 선민
  rationale: 본문 자체는 특정 교리 체계를 명시하지 않으므로, 신적 수동을 보존하면서 후대 교리 논쟁의 짐을 더하지 않는 어휘를 택한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension; original-language primacy'
