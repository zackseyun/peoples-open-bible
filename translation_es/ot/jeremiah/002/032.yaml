translation:
  language: es
  text: ¿Acaso una virgen olvida su adorno[a], o una novia sus adornos[b]? Sin embargo, mi pueblo me ha olvidado por días sin número.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su joya»; el hebreo también puede significar «su adorno».
    reason: lexical_alternative
  - marker: b
    text: El término hebreo puede referirse más específicamente a bandas nupciales, cintas o adornos atados.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/תִשְׁכַּ֤ח
  english_pob_choice: Does ... forget
  chosen_spanish: ¿Acaso ... olvida
  alternatives_spanish:
  - ¿Acaso ... olvidará
  - ¿Puede ... olvidar
  lexicon: HALOT
  rationale: La partícula הֲ introduce una pregunta retórica; en español, «¿Acaso...?» conserva bien ese valor sin forzar un futuro. El presente «olvida» expresa un valor general y proverbial equivalente al inglés auditado.
- source_word: בְּתוּלָה
  english_pob_choice: a virgin
  chosen_spanish: una virgen
  alternatives_spanish:
  - una joven
  - una doncella
  lexicon: HALOT
  rationale: «Virgen» preserva la fuerza léxica del término y mantiene el contraste con «novia» en el paralelismo. Se evita diluir la imagen con «joven».
- source_word: עֶדְיָהּ
  english_pob_choice: her jewelry
  chosen_spanish: su adorno
  alternatives_spanish:
  - sus joyas
  - su ornamento
  - su adornamiento
  lexicon: HALOT
  rationale: El hebreo puede referirse al adorno personal en sentido amplio. «Adorno» conserva la indeterminación léxica documentada por el POB inglés, sin especificar indebidamente el tipo de adorno. Se refleja la alternativa semántica preservada en la versión inglesa.
- source_word: כַּלָּה
  english_pob_choice: a bride
  chosen_spanish: una novia
  alternatives_spanish:
  - una desposada
  - la novia
  lexicon: HALOT
  rationale: «Novia» es natural y fiel al sentido de כַּלָּה en este contexto nupcial. «Desposada» sería más formal, pero menos transparente para el lector moderno.
- source_word: קִשֻּׁרֶיהָ
  english_pob_choice: her ornaments
  chosen_spanish: sus adornos
  alternatives_spanish:
  - sus cintas
  - sus bandas nupciales
  - sus ornamentos
  lexicon: HALOT
  rationale: El término puede aludir a adornos atados, cintas o accesorios nupciales; el inglés mantiene la amplitud con «ornaments». «Adornos» reproduce esa amplitud sin sobreespecificar.
- source_word: וְעַמִּי
  english_pob_choice: Yet my people
  chosen_spanish: Sin embargo, mi pueblo
  alternatives_spanish:
  - Pero mi pueblo
  - Y mi pueblo
  lexicon: HALOT
  rationale: La conjunción de contraste introduce una comparación reprochable entre la memoria esperable de una novia y el olvido real de Israel. «Sin embargo» comunica bien ese giro adversativo en español.
- source_word: שְׁכֵחוּנִי
  english_pob_choice: have forgotten me
  chosen_spanish: me ha olvidado
  alternatives_spanish:
  - me olvidó
  - se ha olvidado de mí
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte con presente perfecto español para expresar un estado continuado de olvido pactal, como en el audit trail inglés.
- source_word: יָמִים אֵין מִסְפָּר
  english_pob_choice: for days without number
  chosen_spanish: por días sin número
  alternatives_spanish:
  - por días incontables
  - por días sin cuenta
  - por días sin número
  lexicon: HALOT
  rationale: La expresión idiomática indica duración innumerable. «Sin número» conserva la cercanía formal con el hebreo y la lectura auditada del inglés.
theological_decisions:
- issue: El olvido de Dios en lenguaje de pacto
  english_pob_reading: Retained the relational covenant language without expanding it into explicit theological commentary.
  chosen_spanish_reading: 'Se mantiene el lenguaje relacional del pacto: «mi pueblo me ha olvidado», sin convertirlo en «me ha abandonado» u այլos equivalentes más fuertes.'
  alternative_spanish_readings:
  - mi pueblo me ha abandonado
  - mi pueblo se ha alejado de mí
  rationale: El versículo habla de olvido, no de abandono explícito. En el contexto sí hay infidelidad de pacto, pero la traducción debe preservar la tensión textual en vez de resolverla con una paráfrasis interpretativa.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se identificaron revisiones tardías que alteren el sentido; la traducción sigue el estado de alta concordancia del auditor inglés y conserva sus decisiones léxicas y la tensión retórica del pasaje.
  spanish_consistency_notes:
  - Se mantiene «virgen / novia» para reflejar el paralelismo hebreo y la elección inglesa.
  - Se usa «sin embargo» para el contraste fuerte que introduce el reproche divino.
  - «Adorno(s)» evita especificar indebidamente el objeto hebreo, respetando la ambigüedad documentada.
  - Se conserva el perfecto español («ha olvidado») para el estado durativo sugerido por el contexto.
