revisions:
- from: Así que, ya que los acontecimientos relativos a Nicanor resultaron de esta manera, y desde aquellos tiempos la ciudad quedó en poder de los hebreos[a], yo también pondré fin aquí a mi relato[b].
  to: Así que, ya que los acontecimientos relativos a Nicanor resultaron de esta manera, y desde aquellos tiempos la ciudad permaneció en poder de los Hebreos[a], yo también pondré fin aquí a mi relato[b].
  rationale: Se revisa solo lo necesario para reflejar mejor el aspecto continuado de κρατηθείσης con «permaneció en poder de», y para mejorar la consistencia formal del etnónimo «Hebreos». La nota léxica alternativa también se ajusta a un español más idiomático y más cercano a la alternativa inglesa auditada.
