    issue: «los hijos de la humanidad» no refleja fielmente בְּנֵי אָדָם
    rationale: El hebreo dice literalmente «los hijos del hombre / de Adán», una expresión estable para seres humanos. «Humanidad» cambia la imagen y debilita la decisión auditada de conservar el lenguaje masculino/genealógico en el texto principal.
  - severity: medium
    issue: Inconsistencia con la decisión teológica documentada sobre el paralelismo masculino
    rationale: El rastro inglés preserva «O men» y «the sons of man/mankind» en el texto principal. El borrador neutraliza en parte el segundo miembro, lo que reduce el paralelismo deliberado del hebreo.
  - severity: low
    issue: «oh varones» es comprensible pero menos natural que «oh hombres»
    rationale: «Varones» conserva género, pero en este contexto suena más forzado y menos fluido para una audiencia amplia latinoamericana. «Oh hombres» mantiene la vocación y el sentido sin rigidez innecesaria.
  revised_spanish_text: A ustedes[a], oh hombres, llamo, y mi voz es para los hijos del hombre.
