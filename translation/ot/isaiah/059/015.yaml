id: ISA.59.15
reference: Isaiah 59:15
source:
  edition: WLC
  text: וַ/תְּהִ֤י הָֽ/אֱמֶת֙ נֶעְדֶּ֔רֶת וְ/סָ֥ר מֵ/רָ֖ע מִשְׁתּוֹלֵ֑ל וַ/יַּ֧רְא יְהוָ֛ה וַ/יֵּ֥רַע בְּ/עֵינָ֖י/ו כִּֽי אֵ֥ין מִשְׁפָּֽט־׃
translation:
  text: So truth was missing[a], and whoever turned away from evil was plundered. Yahweh saw[b], and it was evil in his eyes that there was no justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made himself a prey' / 'was treated as prey.' The Hebrew term is rare and conveys that the one who turns from evil becomes a victim.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'it was evil in his eyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֱמֶת
  chosen: truth
  alternatives:
  - faithfulness
  lexicon: HALOT
  rationale: אֱמֶת commonly denotes 'truth' or 'faithfulness.' In this context of social and judicial collapse (vv. 14–15), 'truth' best matches the public, moral, and legal sense being lamented, while 'faithfulness' remains a viable nuance.
- source_word: נֶעְדֶּרֶת
  chosen: was missing
  alternatives:
  - was lacking
  - had disappeared
  lexicon: HALOT
  rationale: The Niphal participle from עדר conveys being absent, lacking, or missing. 'Was missing' is idiomatic modern English and preserves the sense of absence without overinterpreting the degree of disappearance.
- source_word: וְסָר מֵרָע
  chosen: whoever turned away from evil
  alternatives:
  - he who turned from evil
  - the one departing from evil
  lexicon: HALOT
  rationale: The masculine singular participle functions generically. 'Whoever turned away from evil' communicates the representative force naturally in English while preserving the active moral renunciation expressed by סור מן.
- source_word: מִשְׁתּוֹלֵל
  chosen: was plundered
  alternatives:
  - was despoiled
  - made himself a prey
  - was treated as prey
  lexicon: HALOT
  rationale: This rare Hitpolel form is traditionally understood as 'makes himself a prey' or 'is despoiled/plundered.' In context, the sense is that the person rejecting evil becomes victimized. 'Was plundered' is concise and readable, though the prey/victim nuance is preserved in a footnote.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֵּרַע בְּעֵינָיו
  chosen: it was evil in his eyes
  alternatives:
  - it displeased him
  - it was wrong in his sight
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'it was evil in his eyes.' Retaining this more formal expression preserves the moral evaluation in the source text better than the smoother but weaker 'it displeased him.'
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - justice and right order
  lexicon: HALOT
  rationale: In Isaiah's social-ethical context, מִשְׁפָּט refers to justice in the sense of proper legal and moral order. 'Justice' is the clearest modern rendering here.
