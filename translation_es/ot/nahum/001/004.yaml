translation:
  language: es
  text: Reprende al mar y lo seca; hace secar todos los ríos.[a] Basán y Carmelo se marchitan; la flor del Líbano se marchita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seca todos los ríos». El verbo hebreo también puede traducirse más directamente de esta manera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גּוֹעֵר
  english_pob_choice: rebukes
  chosen_spanish: reprende
  alternatives_spanish:
  - reprueba
  - reprende con dureza
  lexicon: HALOT
  rationale: El verbo comunica una reprensión enérgica con autoridad, especialmente en contexto de dominio divino sobre el mar y las fuerzas del caos. «Reprende» conserva esa fuerza personal mejor que una paráfrasis más débil.
- source_word: בַּיָּם
  english_pob_choice: the sea
  chosen_spanish: al mar
  alternatives_spanish:
  - al mar
  - al mar, al océano
  lexicon: HALOT
  rationale: En español, «mar» expresa naturalmente el objeto directo de la acción divina. No se capitaliza como nombre propio porque el hebreo no lo exige aquí.
- source_word: וַיַּבְּשֵׁהוּ
  english_pob_choice: dries it up
  chosen_spanish: lo seca
  alternatives_spanish:
  - lo seca por completo
  - lo deja seco
  lexicon: HALOT
  rationale: El sentido es causar que quede seco. «Lo seca» es natural en español y mantiene la relación pronominal con «el mar».
- source_word: וְכָל הַנְּהָרוֹת הֶחֱרִיב
  english_pob_choice: he makes all the rivers dry up
  chosen_spanish: hace secar todos los ríos
  alternatives_spanish:
  - seca todos los ríos
  - hace que todos los ríos se sequen
  lexicon: HALOT
  rationale: El hiphil de חרב expresa hacer que algo quede seco/arruinado. «Hace secar» conserva el valor causativo sin introducir una lectura de devastación no requerida por el contexto acuático.
- source_word: אֻמְלַל
  english_pob_choice: wither
  chosen_spanish: se marchitan
  alternatives_spanish:
  - se mustian
  - se agostan
  lexicon: HALOT
  rationale: El verbo describe vegetación que se debilita, se seca o se cae. «Se marchitan» es idiomático y adecuado para el paralelismo poético.
- source_word: בָּשָׁן
  english_pob_choice: Bashan
  chosen_spanish: Basán
  alternatives_spanish:
  - Basán
  lexicon: HALOT
  rationale: Nombre propio geográfico transliterado al español según la norma del proyecto.
- source_word: וְכַרְמֶל
  english_pob_choice: and Carmel
  chosen_spanish: y Carmelo
  alternatives_spanish:
  - y Carmelo
  lexicon: HALOT
  rationale: Nombre propio geográfico. «Carmelo» es la forma española habitual y clara.
- source_word: וּפֶרַח לְבָנוֹן
  english_pob_choice: the blossom of Lebanon
  chosen_spanish: el brote del Líbano
  alternatives_spanish:
  - la flor del Líbano
  - el florecer del Líbano
  lexicon: HALOT
  rationale: פֶרַח puede referir a brote, flor o floración. «Brote» mantiene la imagen vegetal en una forma breve y natural en español. Se evita «flor» porque el término puede sonar más estático que el hebreo en este paralelismo.
- source_word: אֻמְלָל
  english_pob_choice: withers
  chosen_spanish: se marchita
  alternatives_spanish:
  - se mustia
  - se agosta
  lexicon: HALOT
  rationale: La repetición del verbo en español preserva el paralelismo final y la progresión poética del verso.
theological_decisions:
- issue: Sujeto divino implícito en el verso
  english_pob_reading: Use 'He' to continue the subject from the immediate context, referring to the LORD.
  chosen_spanish_reading: 'Se mantiene el sujeto implícito por continuidad contextual: la acción corresponde a Yahvé.'
  alternative_spanish_readings:
  - Yahvé reprende al mar y lo seca; ...
  - Él reprende al mar y lo seca; ...
  rationale: El hebreo continúa con verbos en tercera persona masculina singular sin nombrar de nuevo al sujeto. En español puede mantenerse la continuidad con una forma verbal sin sujeto explícito; la referencia contextual a Yahvé queda clara por Nahúm 1:2-3.
  doctrine_reference: YHWH default rendering applies in context; the divine name is not repeated in this verse.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al preferir «seca»/«hace secar» para el valor lexical directo de los verbos y evitar añadidos como «en seco» o «se agota» que no están en el hebreo. También se evita introducir un equivalente de intensidad como «hasta» o «incluso», porque no está explícito en el texto fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término estándar del proyecto cuando el nombre divino aparece o está en contexto inmediato; aquí el verso depende del contexto anterior, por eso no se repite en el texto.
  - 'Se conserva un paralelismo verbal sencillo: «reprende / seca / hace secar / se marchitan / se marchita».'
  - 'Los nombres propios se transliteran en formas españolas corrientes: «Basán» y «Carmelo».'
