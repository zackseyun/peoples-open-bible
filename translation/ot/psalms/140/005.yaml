theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O Yahweh
  alternative_readings:
  - O Yahweh
  - O Jehovah
  rationale: Follows the project's stated default for YHWH, preserving reverential convention and broad Christian readability.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Number/generic force in רָשָׁע and אִישׁ חֲמָסִים
  chosen_reading: collective 'the wicked' alongside singular 'the man of violence'
  alternative_readings:
  - 'singular throughout: ''the wicked man ... the violent man'''
  - 'pluralized sense: ''wicked men ... violent men'''
  rationale: The Hebrew mixes singular forms that can function generically or representatively. The translation preserves the singular 'man' where explicit (איש) while allowing רָשָׁע to sound collective in idiomatic English, maintaining both readability and source sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (gender-accurate over gender-neutral)
