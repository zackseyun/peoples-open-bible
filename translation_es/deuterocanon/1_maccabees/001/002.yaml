  - Se mantuvo un registro militar directo y solemne acorde con la secuencia del griego.
  - No se introdujeron términos eclesiásticos o interpretativos ajenos al texto; 'reyes' y 'fortalezas' conservan la imaginería política y bélica del original.
  - La cadencia en tres miembros se preservó para reflejar la estructura coordinada del verso.
