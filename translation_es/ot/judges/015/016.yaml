translation:
  language: es
  text: 'Entonces Sansón dijo: «Con la quijada del asno, un montón, dos montones[a]; con la quijada del asno he derribado a mil hombres».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo emplea un juego de palabras: la misma secuencia consonántica detrás de «asno» suena de modo parecido al término vertido «montones». Por eso esta frase se traduce de manera semiliteral para conservar algo del efecto del original.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «entonces» reproduce bien esa progresión en español sin sonar excesivamente literal.
- source_word: שִׁמְשׁוֹן
  english_pob_choice: Samson
  chosen_spanish: Sansón
  alternatives_spanish:
  - Samson
  lexicon: transliteración estándar
  rationale: En español bíblico estándar, «Sansón» es la forma establecida y plenamente inteligible del nombre propio.
- source_word: בִּלְחִי הַחֲמוֹר
  english_pob_choice: With the jawbone of a donkey
  chosen_spanish: Con la quijada del asno
  alternatives_spanish:
  - Con la mandíbula del asno
  - Con la quijada de un asno
  lexicon: HALOT
  rationale: בְּ indica instrumento; por eso «con» es natural. לְחִי aquí alude a la parte del arma, mejor vertida como «quijada» o «mandíbula»; se eligió «quijada» por ser más idiomática y bíblicamente reconocible en español.
- source_word: חֲמוֹר
  english_pob_choice: donkey
  chosen_spanish: asno
  alternatives_spanish:
  - burro
  - burra
  lexicon: HALOT
  rationale: «Asno» es el equivalente más neutral y digno en español bíblico. Mantiene el registro de la escena y permite conservar el juego de palabras con el campo semántico de חֲמוֹר.
- source_word: חֲמוֹר חֲמֹרָתָיִם
  english_pob_choice: a heap, two heaps
  chosen_spanish: un montón, dos montones
  alternatives_spanish:
  - un montón, dos montones
  - montón sobre montón
  - un asno, dos asnos
  lexicon: HALOT
  rationale: 'La expresión hebrea preserva un juego fónico entre חֲמוֹר («asno») y una forma asociada con «montón/heaps». El español no puede reproducir el mismo sonido sin perder claridad, así que se conserva el paralelismo literal-semántico más cercano: «un montón, dos montones». Esto sigue la revisión más literal del POB inglés y mantiene la tensión del juego de palabras.'
- source_word: הִכֵּיתִי
  english_pob_choice: I have struck down
  chosen_spanish: he derribado
  alternatives_spanish:
  - he herido
  - he golpeado
  - he matado
  lexicon: HALOT
  rationale: נכה puede significar golpear, herir o abatir; en este contexto de victoria bélica, «he derribado» comunica el resultado sin ir más allá del verbo hebreo hacia una especificación excesiva. También suena natural en español en una exclamación triunfal.
- source_word: אֶלֶף אִישׁ
  english_pob_choice: a thousand men
  chosen_spanish: a mil hombres
  alternatives_spanish:
  - mil hombres
  - mil varones
  - mil personas
  lexicon: HALOT
  rationale: אִישׁ es masculino singular con valor colectivo; «hombres» conserva el matiz militar y la correspondencia de género, igual que en el POB inglés.
translation_notes:
  revision_awareness: La revisión inglesa reciente volvió la mitad central de una paráfrasis interpretativa («heaps upon heaps») a una forma más literal («a heap, two heaps»), con el fin de reflejar con mayor fidelidad el juego de palabras hebreo. La versión española sigue esa orientación y evita expandir el verso con una paráfrasis más libre.
  spanish_consistency_notes:
  - Se conservó el nombre bíblico estándar «Sansón» en lugar de transliteración directa.
  - Se mantuvo el registro narrativo-poético con puntuación que refleja la exclamación y el paralelismo hebreo.
  - «Asno» se eligió como término bíblico neutral; no se sustituyó por «burro» para conservar el tono y el campo léxico del pasaje.
