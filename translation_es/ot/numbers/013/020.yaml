  rationale: Se ajusta רָזָה a 'pobre' para evitar la sobreinterpretación de 'estéril'; se cambia a 'árboles' para español más natural y conforme a la decisión principal inglesa, preservando en nota la alternativa 'madera'; se reemplaza 'cobraos ánimo' por 'sed fuertes' para seguir la revisión auditada; y se suaviza la nota temporal a 'las primeras uvas' con una nota explicativa que conserva la transparencia del hebreo sin imponer en el texto principal un matiz cultual excesivo.
