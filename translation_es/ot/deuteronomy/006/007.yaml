translation:
  language: es
  text: Las inculcarás diligentemente[a] a tus hijos[b], y hablarás de ellas cuando te sientes en tu casa, cuando andes por el camino, cuando te acuestes y cuando te levantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''se las grabarás'' o ''se las imprimirás''. El verbo hebreo literalmente tiene el sentido de afilar, usado aquí metafóricamente para instrucción repetida y cuidadosa.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''tus hijos''. Por extensión, esta instrucción se aplica más ampliamente dentro del hogar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁנַּנְתָּם
  english_pob_choice: you shall teach them diligently
  chosen_spanish: Las enseñarás diligentemente
  alternatives_spanish:
  - Las grabarás en la mente
  - Las inculcarás repetidamente
  - Las afilarás
  lexicon: HALOT
  rationale: El verbo hebreo tiene el sentido básico de 'afilar', usado metafóricamente para instrucción repetida y cuidadosa. 'Enseñar diligentemente' comunica bien esa fuerza intensiva en español sin volver opaca la metáfora.
- source_word: לְבָנֶיךָ
  english_pob_choice: to your sons
  chosen_spanish: a tus hijos
  alternatives_spanish:
  - a tus hijos varones
  - a tus hijos, es decir, a tus hijos/hijas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'tus hijos/tu hijos varones' en forma masculina plural con sufijo de segunda persona masculina singular. En español, 'hijos' conserva la forma masculina del original y funciona de manera natural; la ampliación inclusiva queda mejor en nota que en el texto principal.
- source_word: וְדִבַּרְתָּ בָּם
  english_pob_choice: and you shall speak of them
  chosen_spanish: y hablarás de ellas
  alternatives_spanish:
  - y hablarás de ellos
  - y hablarás acerca de ellas
  lexicon: HALOT
  rationale: 'El hebreo con ב־ indica el contenido del habla: ''hablar de/acerca de''. En español, ''hablar de ellas'' es la forma más natural y fiel al registro. El pronombre femenino plural se ajusta al antecedente implícito de las palabras/mandamientos.'
- source_word: בְּשִׁבְתְּךָ בְּבֵיתֶךָ
  english_pob_choice: when you sit in your house
  chosen_spanish: cuando te sientes en tu casa
  alternatives_spanish:
  - mientras estás sentado en tu casa
  - cuando te sientas en tu casa
  lexicon: HALOT
  rationale: La construcción temporal describe la circunstancia habitual. 'Cuando te sientes en tu casa' suena natural en español y conserva el matiz de asentarse/sentarse como marco cotidiano.
- source_word: וּבְלֶכְתְּךָ בַדֶּרֶךְ
  english_pob_choice: and when you walk on the road
  chosen_spanish: cuando andes por el camino
  alternatives_spanish:
  - cuando camines por la senda
  - cuando vayas por el camino
  lexicon: HALOT
  rationale: דֶּרֶךְ puede ser 'camino/road/way'. 'Andar por el camino' preserva el ritmo bíblico en español y evita un tecnicismo innecesario. 'Camino' comunica bien la idea de viaje ordinario.
- source_word: וּבְשָׁכְבְּךָ
  english_pob_choice: and when you lie down
  chosen_spanish: cuando te acuestes
  alternatives_spanish:
  - cuando te acuestes a dormir
  - cuando te recuestes
  lexicon: HALOT
  rationale: La frase marca el tiempo de ir a dormir o reclinarse. 'Cuando te acuestes' es idiomático, breve y suficientemente preciso en español.
- source_word: וּבְקוּמֶךָ
  english_pob_choice: and when you rise
  chosen_spanish: y cuando te levantes
  alternatives_spanish:
  - y cuando te despiertes y te levantes
  - y cuando te pongas en pie
  lexicon: HALOT
  rationale: קוּם significa levantarse o ponerse en pie; en este contexto alude al momento de levantarse tras el descanso. 'Te levantes' encaja naturalmente con el paralelismo del versículo.
theological_decisions:
- issue: Alcance de לְבָנֶיךָ y aplicación doméstica
  english_pob_reading: your sons; by extension this instruction applies within the household more broadly.
  chosen_spanish_reading: tus hijos; por extensión, esta instrucción rige también para el hogar en general.
  alternative_spanish_readings:
  - tus hijos, y por extensión tus hijos e hijas
  - tus hijos, es decir, tu familia
  rationale: Se conserva la forma masculina explícita del hebreo en el texto principal, sin neutralizarla. La amplitud de aplicación doméstica puede señalarse en nota sin alterar el dato lexical del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Referente de 'ellas' en וְדִבַּרְתָּ בָּם
  english_pob_reading: speak of them
  chosen_spanish_reading: hablarás de ellas
  alternative_spanish_readings:
  - hablarás de ellos
  - hablarás de estas palabras
  rationale: El contexto inmediato apunta a las palabras/mandamientos que deben ser inculcados. En español, 'ellas' ayuda a mantener la referencia a esas palabras implícitas sin introducir un antecedente ajeno al versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: El texto hebreo y el audit trail en inglés muestran acuerdo alto y no registran revisiones textuales. Por eso la versión española sigue de cerca la estructura del hebreo, manteniendo el paralelismo temporal y la forma masculina explícita de לְבָנֶיךָ, con una sola nota para aclarar su alcance doméstico.
  spanish_consistency_notes:
  - Se mantiene 'camino' para דֶּרֶךְ en consonancia con un español bíblico claro y no arcaizante.
  - Se usa 'hijos' como equivalente formal de לְבָנֶיךָ, evitando neutralización no justificada en el texto principal.
  - '''Hablarás de ellas'' conserva el plural femenino natural del español para aludir a las palabras/mandamientos implícitos.'
  - El registro busca ser publicable y reverente sin depender de fórmulas eclesiásticas tradicionales que no aporta el hebreo.
