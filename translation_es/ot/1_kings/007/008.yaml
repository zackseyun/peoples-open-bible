translation:
  language: es
  text: Su casa, donde él debía vivir[a], en el otro patio, más hacia adentro respecto del Salón, era de la misma construcción. También hizo una casa como este Salón para la hija de Faraón[b], a quien Salomón había tomado por esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en otro patio, más hacia adentro respecto del Salón». El hebreo expresa una relación espacial difícil; las traducciones varían en cómo ubicar la residencia respecto del Salón.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «a quien Salomón había tomado»; es decir, tomado en matrimonio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֵיתוֹ
  english_pob_choice: His house
  chosen_spanish: Su casa
  alternatives_spanish:
  - Y su casa
  - La casa de él
  lexicon: HALOT
  rationale: El sustantivo con sufijo pronominal se refiere a la residencia real descrita. En español, "Su casa" mantiene la referencia posesiva sin forzar la conjunción inicial, que aquí fluye naturalmente en la oración.
- source_word: אֲשֶׁר יֵשֶׁב שָׁם
  english_pob_choice: where he was to live
  chosen_spanish: donde él debía vivir
  alternatives_spanish:
  - donde vivía
  - donde iba a vivir
  - donde él debía morar
  lexicon: HALOT
  rationale: El verbo ישב en este contexto arquitectónico expresa la función residencial prevista. "Debía vivir" conserva el sentido prospectivo/descriptivo de la POB inglesa y evita reducirlo a un pasado simple.
- source_word: חָצֵר הָאַחֶרֶת
  english_pob_choice: the other court
  chosen_spanish: en el otro patio
  alternatives_spanish:
  - en la otra corte
  - en el otro atrio
  lexicon: HALOT
  rationale: חָצֵר puede ser "patio", "atrio" o "corte". Aquí el contexto de arquitectura palaciega permite "patio" como término claro y natural en español, sin perder la idea de un recinto contiguo dentro del complejo.
- source_word: מִבֵּית לָאוּלָם
  english_pob_choice: farther back from the Hall
  chosen_spanish: más adentro que el Salón
  alternatives_spanish:
  - más adentro del Salón
  - más retirado del Salón
  - en el interior respecto del Salón
  lexicon: HALOT
  rationale: La frase espacial es difícil. La POB inglesa eligió una formulación prudente que expresa una ubicación interna o retirada con respecto al Hall. "Más adentro que el Salón" conserva esa relación espacial sin exagerar una reconstrucción técnica.
- source_word: כַּמַּעֲשֶׂה הַזֶּה הָיָה
  english_pob_choice: was of the same workmanship
  chosen_spanish: era de la misma hechura
  alternatives_spanish:
  - era de la misma obra
  - era de la misma construcción
  - tenía la misma hechura
  lexicon: HALOT
  rationale: מַעֲשֶׂה aquí apunta al trabajo hecho, a la hechura o factura de la edificación. "Hechura" transmite bien la idea de manufactura/ejecución y mantiene la comparación con lo descrito antes.
- source_word: וּבַיִת יַעֲשֶׂה
  english_pob_choice: He also made a house
  chosen_spanish: También hizo una casa
  alternatives_spanish:
  - Y hizo una casa
  - Además hizo una casa
  - Hizo también una casa
  lexicon: HALOT
  rationale: El yiqtol narrativo continúa la descripción de la obra real. "También hizo" reproduce la secuencia sin añadir un tiempo futuro o una perífrasis innecesaria.
- source_word: לְבַת פַּרְעֹה
  english_pob_choice: for Pharaoh’s daughter
  chosen_spanish: para la hija de Faraón
  alternatives_spanish:
  - para la hija del faraón
  - para la hija de Faraón
  lexicon: HALOT
  rationale: Se conserva la relación de pertenencia con el nombre propio "Faraón". "Hija de Faraón" es la forma natural y tradicionalmente inteligible en español bíblico.
- source_word: אֲשֶׁר לָקַח שְׁלֹמֹה
  english_pob_choice: whom Solomon had taken as wife
  chosen_spanish: a quien Salomón había tomado por esposa
  alternatives_spanish:
  - a quien Salomón había tomado
  - a quien Salomón había desposado
  - a quien Salomón había tomado en matrimonio
  lexicon: HALOT
  rationale: לקח con objeto femenino puede implicar tomar en matrimonio. "Había tomado por esposa" explicita el valor idiomático, como hace la POB inglesa con "as wife", sin añadir más contenido del que el hebreo permite.
- source_word: כָּאוּלָם הַזֶּה
  english_pob_choice: like this Hall
  chosen_spanish: como este Salón
  alternatives_spanish:
  - como este Hall
  - como este pórtico
  - igual que este Salón
  lexicon: HALOT
  rationale: אוּלָם designa una estructura arquitectónica del complejo palaciego. "Salón" conserva la referencia a un espacio amplio y elevado sin volverlo doméstico; se evita "pórtico" porque aquí la POB inglesa optó por "Hall".
theological_decisions:
- issue: Expresión del nombre divino y del título real
  english_pob_reading: The verse does not contain the divine name or Messiah language.
  chosen_spanish_reading: No aplica en este versículo; no se introduce terminología teológica adicional.
  alternative_spanish_readings:
  - No aplica
  rationale: El texto trata de arquitectura real y del matrimonio de Salomón, sin presencia de יהוה ni de mesianismo. Por eso no hay decisión teológica sustantiva que deba marcarse en la redacción española.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés, que ajustó la primera cláusula para reflejar con mayor precisión la relación espacial: "in the other court farther back from the Hall". La versión española conserva esa alineación con "en el otro patio, más adentro que el Salón" y mantiene el resto de la oración en correspondencia estrecha con la POB inglesa.'
  spanish_consistency_notes:
  - Se usa "Salón" para אוּלָם conforme a la decisión inglesa de "Hall" en este contexto palaciego.
  - '"Tomado por esposa" conserva el valor matrimonial de לקח sin sustituirlo por un verbo más interpretativo.'
  - '"Hechura" mantiene la idea de obra/factura arquitectónica sin perder la comparación con la construcción previa.'
  - Se evitó "SEÑOR" o cualquier máscara reverencial porque el versículo no contiene el nombre divino.
