translation:
  language: es
  text: 'Lo recubrió de oro puro: su parte superior, sus lados alrededor y sus cuernos; y le hizo una moldura[a] de oro alrededor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una corona de oro alrededor». El término hebreo se refiere a un borde o ribete ornamental que rodea el objeto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַף
  english_pob_choice: overlaid
  chosen_spanish: recubrió
  alternatives_spanish:
  - forró
  - sobrecubrió
  - revestió
  lexicon: HALOT
  rationale: En el contexto del mobiliario del tabernáculo, צפה describe aplicar una capa de metal sobre una base. En español, «recubrió» transmite bien esa acción sin sonar tan técnico como «revestió» ni tan ambiguo como «cubrió».
- source_word: זָהָב טָהוֹר
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro refinado
  - oro limpio
  lexicon: HALOT
  rationale: La expresión señala la calidad/pureza del material. «Oro puro» es natural en español y conserva el énfasis material sin añadir explicación.
- source_word: גַּגּוֹ
  english_pob_choice: its top
  chosen_spanish: su parte superior
  alternatives_spanish:
  - su techo
  - su superficie superior
  - su parte de arriba
  lexicon: HALOT
  rationale: Aunque גג puede significar «techo», aquí se trata de una pieza cultual portátil, no de una edificación. «Su parte superior» evita la imagen de un techo y mantiene la referencia a la superficie superior.
- source_word: קִירֹתָיו
  english_pob_choice: its sides
  chosen_spanish: sus lados
  alternatives_spanish:
  - sus paredes
  - sus costados
  lexicon: HALOT
  rationale: Literalmente el término puede ser «paredes», pero para un objeto ritual es más natural «lados», como en la decisión auditada del inglés.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - por todas partes
  - en derredor
  lexicon: HALOT
  rationale: La palabra marca extensión circular. «Alrededor» es claro y corresponde al uso repetido de la construcción en este versículo.
- source_word: קַרְנֹתָיו
  english_pob_choice: its horns
  chosen_spanish: sus cuernos
  alternatives_spanish:
  - sus cuernos sobresalientes
  lexicon: HALOT
  rationale: Se conserva el término técnico del mobiliario cultual. En español bíblico, «cuernos» es el equivalente directo y reconocido.
- source_word: זֵר
  english_pob_choice: molding
  chosen_spanish: moldura
  alternatives_spanish:
  - borde
  - cenefa
  - anillo decorativo
  lexicon: HALOT
  rationale: זֵר designa un borde ornamental o ribete. «Moldura» comunica una pieza decorativa de contorno en español moderno y evita la posible confusión de «corona» como objeto real.
theological_decisions:
- issue: Terminología del remate ornamental de oro
  english_pob_reading: molding all around
  chosen_spanish_reading: una moldura de oro alrededor
  alternative_spanish_readings:
  - una corona de oro alrededor
  - un borde de oro alrededor
  rationale: El inglés POB preserva la tensión lexical al evitar que 'crown' sea la lectura principal del texto, pero la deja como alternativa por tradición. En español, «moldura» mantiene el sentido ornamental y funcional del hebreo sin desplazarlo hacia una imagen regia que no corresponde al objeto.
  doctrine_reference: Ex 37:26; cf. terminology of tabernacle furnishings
translation_notes:
  revision_awareness: 'El texto sigue de cerca el inglés POB auditado y el hebreo WLC. Se conservan las decisiones ya estabilizadas: recubrir el objeto con oro puro, traducir גג como parte superior por tratarse de una pieza cultual, y verter זֵר como moldura con una nota alternativa para la tradición de «corona». No se requieren cambios por la revisión más reciente, que quedó sin modificaciones.'
  spanish_consistency_notes:
  - Se mantiene «oro puro» para זָהָב טָהוֹר en coherencia con otros pasajes del mobiliario del tabernáculo.
  - '«Sus lados alrededor» se evitó en favor de un español más natural: «sus lados alrededor» en sentido distributivo queda expresado por «sus lados alrededor»; no se eligió «paredes» para no sobredeterminar la forma del objeto.'
  - Se usa «moldura» y no «corona» en el cuerpo principal para preservar la precisión léxica del hebreo y del audit trail inglés.
