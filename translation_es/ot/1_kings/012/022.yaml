translation:
  language: es
  text: 'Y vino la palabra de Dios[a] a Semaías, el hombre de Dios, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la palabra de Dios». Muchas versiones en lenguas modernas armonizan esta fórmula con «la palabra del SEÑOR», pero aquí el texto dice explícitamente «Dios» (אֱלֹהִים), no el nombre divino YHWH.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - ocurrió
  lexicon: HALOT
  rationale: En la fórmula profética וַיְהִי ... אֶל, español natural y fiel al valor eventivo se expresa mejor con 'vino' que con un simple 'fue' o 'era'. Conserva la idea de que la comunicación divina irrumpe hacia su destinatario.
- source_word: דְּבַר
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - asunto
  lexicon: HALOT
  rationale: דְּבַר en esta fórmula revelatoria apunta a una comunicación verbal de Dios; 'palabra' preserva el giro bíblico y la resonancia teológica mejor que 'mensaje', sin perder claridad en español.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el SEÑOR
  - un dios
  lexicon: HALOT
  rationale: El hebreo dice אֱלֹהִים, no el nombre divino YHWH. Por primacía del original, corresponde traducir 'Dios' y no armonizarlo a 'el SEÑOR'.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca destino o receptor de la palabra divina; 'a' es la equivalencia natural en español.
- source_word: שְׁמַעְיָה
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Semaia
  - Shemaías
  lexicon: convención onomástica
  rationale: Se usa la forma hispana tradicional del nombre propio, adaptada a la ortografía del español, manteniendo la identificación referencial del personaje.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - un hombre de Dios
  - el varón de Dios
  lexicon: HALOT
  rationale: La construcción apposicional funciona aquí como título reconocido para un profeta. 'El hombre de Dios' conserva la fuerza titular y la definitez del hebreo mejor que 'un hombre de Dios'.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: Este infinitivo introduce el discurso que sigue; 'diciendo' preserva el enlace discursivo convencional en español bíblico y moderno.
theological_decisions:
- issue: Uso de אֱלֹהִים en la fórmula revelatoria
  english_pob_reading: the word of God
  chosen_spanish_reading: la palabra de Dios
  alternative_spanish_readings:
  - la palabra del SEÑOR
  rationale: 'Se mantiene la lectura del hebreo tal como está: אֱלֹהִים. Traducir ''del SEÑOR'' borraría una diferencia textual documentada entre esta fórmula y las más comunes con YHWH.'
  doctrine_reference: Original-language primacy; contested divine-name rendering
- issue: Título profético אִישׁ הָאֱלֹהִים
  english_pob_reading: the man of God
  chosen_spanish_reading: el hombre de Dios
  alternative_spanish_readings:
  - un hombre de Dios
  rationale: La frase funciona como designación honorífica y profética, no solo como descripción genérica de piedad. La forma definida en español refleja mejor el valor del título en este contexto.
  doctrine_reference: Profetic titles in narrative prose
translation_notes:
  revision_awareness: 'La revisión auditada coincide en no requerir cambios: el texto hebreo usa אֱלֹהִים, y la formulación española conserva ese dato sin armonizarlo a la expresión más común con YHWH.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' como sustituto de YHWH porque el hebreo aquí no lo emplea.
  - Se eligió 'vino' para reproducir la fórmula narrativa de llegada de la palabra divina sin calco rígido.
  - 'El nombre propio se adaptó a una forma española estable: Semaías.'
  - La puntuación mantiene la incipiente subordinación de discurso con coma antes de 'diciendo'.
