translation:
  language: es
  text: 'cuando vinieron los zifeos y dijeron a Saúl[a]: “¿No está David escondido entre nosotros?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “con nosotros”. El hebreo dice literalmente “con nosotros”, pero “entre nosotros” expresa mejor que David está oculto dentro del ámbito o compañía de los zifeos.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבוֹא
  english_pob_choice: when ... came
  chosen_spanish: cuando vinieron
  alternatives_spanish:
  - al venir
  - en el venir de
  lexicon: HALOT
  rationale: La construcción ב + infinitivo de בוא introduce una cláusula temporal. En español, “cuando vinieron” transmite de forma natural el valor temporal y la secuencia narrativa sin forzar una estructura nominal.
- source_word: הַזִּיפִים
  english_pob_choice: the Ziphites
  chosen_spanish: los zifeos
  alternatives_spanish:
  - los habitantes de Zif
  - los zifitas
  lexicon: HALOT
  rationale: Es un plural gentilicio referido a los habitantes de Zif. “Zifeos” conserva la identificación del grupo y evita una perífrasis más larga.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: and said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y dijeron ellos
  - y hablaron
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר expresa una acción simple en secuencia. “Y dijeron” es la equivalencia directa y natural en español.
- source_word: לְשָׁאוּל
  english_pob_choice: to Saul
  chosen_spanish: a Saúl
  alternatives_spanish:
  - para Saúl
  lexicon: HALOT
  rationale: La preposición ל marca el complemento indirecto del verbo “decir”. En español, “a Saúl” reproduce el valor relacional básico sin sobreinterpretar la dirección.
- source_word: הֲלֹא
  english_pob_choice: Is not
  chosen_spanish: ¿No está... ?
  alternatives_spanish:
  - ¿Acaso no está... ?
  - ¿No es verdad que... ?
  lexicon: HALOT
  rationale: La partícula interrogativa espera una respuesta afirmativa. En español, la pregunta retórica “¿No está...?” conserva ese efecto sin convertirla en mera afirmación.
- source_word: דָוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - David
  lexicon: HALOT
  rationale: Nombre propio estándar.
- source_word: מִסְתַּתֵּר
  english_pob_choice: hiding
  chosen_spanish: escondido
  alternatives_spanish:
  - oculto
  - escondiéndose
  lexicon: HALOT
  rationale: El hitpael participial de סתר comunica ocultamiento continuo. En esta pregunta, “escondido” expresa bien el estado resultante y mantiene el sentido de ocultación en curso.
- source_word: עִמָּנוּ
  english_pob_choice: among us
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - con nosotros
  lexicon: HALOT
  rationale: Aunque literalmente significa “con nosotros”, el contexto apunta a que David está oculto dentro del ámbito del grupo. “Entre nosotros” reproduce la equivalencia funcional que el inglés POB resolvió con “among us”.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el criterio del audit trail en inglés: cláusula temporal con ב + infinitivo, gentilicio plural para los zifeos, y pregunta retórica con הֲלֹא. Se conserva la tensión lexical de עִמָּנוּ mediante una nota, porque el hebreo literal “con nosotros” y la equivalencia contextual “entre nosotros” no coinciden exactamente.'
  spanish_consistency_notes:
  - Se usó “Saúl” con tilde según la ortografía española.
  - Se prefirió “zifeos” como gentilicio transparente y breve.
  - La puntuación de diálogo y la interrogación siguen la norma española.
  - No se sustituyó el nombre divino ni hubo decisiones teológicas explícitas en este versículo.
