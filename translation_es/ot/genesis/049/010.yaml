base_translation:
  language: en
  yaml_path: translation/ot/genesis/049/010.yaml
  text: The scepter will not depart from Judah[a], nor the ruler’s staff from between his feet, until Shiloh comes[b]; and to him will be the obedience of the peoples.
  footnotes:
