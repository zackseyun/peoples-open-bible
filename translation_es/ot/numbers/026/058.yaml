translation:
  language: es
  text: 'Estas fueron los clanes[a] de Leví: el clan de los libnitas, el clan de los hebronitas, el clan de los mahlitas, el clan de los musitas, el clan de los coraítas. Y Cohat engendró a Amram.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «familias» o «grupos familiares»; el hebreo מִשְׁפָּחָה designa una subdivisión de parentesco dentro de la tribu.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפְּחֹת / מִשְׁפַּחַת
  english_pob_choice: clans / the clan of
  chosen_spanish: familias / la familia de
  alternatives_spanish:
  - clanes / el clan de
  - grupos familiares / el grupo familiar de
  lexicon: HALOT
  rationale: En español, ‘familias’ conserva la idea de subdivisión de parentesco dentro de la tribu sin forzar un tecnicismo poco natural. ‘Clan’ sería más preciso sociológicamente, pero en español puede sonar más etnográfico y menos bíblico; aquí ‘familia’ sigue el valor genealógico del contexto censal, manteniendo la relación con el linaje.
- source_word: לֵוִי
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: HALOT
  rationale: Nombre propio del antepasado tribal. Se adapta a la forma española tradicional y ampliamente inteligible ‘Leví’.
- source_word: הַ/לִּבְנִי
  english_pob_choice: the Libnite
  chosen_spanish: los libnitas
  alternatives_spanish:
  - los libnitas de Libni
  - la familia libnita
  lexicon: HALOT
  rationale: El gentilicio hebreo designa al grupo descendiente de Libni. En español, el plural gentilicio ‘libnitas’ reproduce la referencia colectiva y evita una perífrasis más pesada.
- source_word: הַֽ/חֶבְרֹנִי
  english_pob_choice: the Hebronite
  chosen_spanish: los hebronitas
  alternatives_spanish:
  - la familia de Hebrón
  - la familia hebronita
  lexicon: HALOT
  rationale: Se mantiene el paralelismo de los demás gentilicios con una forma plural española que expresa el grupo descendiente de Hebrón.
- source_word: הַ/מַּחְלִי
  english_pob_choice: the Mahlite
  chosen_spanish: los mahlitas
  alternatives_spanish:
  - la familia de Mahli
  - la familia mahlita
  lexicon: HALOT
  rationale: Gentilicio derivado de Mahli. Se conserva la base nominal con adaptación española regular para grupos genealógicos.
- source_word: הַ/מּוּשִׁי
  english_pob_choice: the Mushite
  chosen_spanish: los musitas
  alternatives_spanish:
  - la familia de Mushi
  - la familia musita
  lexicon: HALOT
  rationale: Se vierte como gentilicio plural para mantener la serie de designaciones familiares/tribales y una lectura fluida en español.
- source_word: הַ/קָּרְחִי
  english_pob_choice: the Korahite
  chosen_spanish: los coraítas
  alternatives_spanish:
  - la familia de Coré
  - la familia coraíta
  lexicon: HALOT
  rationale: ‘Coraítas’ es el gentilicio natural en español para los descendientes de Coré. Se evita ‘Korahite’ por ser menos idiomático en español, aunque la relación onomástica permanece transparente.
- source_word: וּ/קְהָת
  english_pob_choice: And Kohath
  chosen_spanish: Y Cohat
  alternatives_spanish:
  - Y Quehat
  - Y Kohat
  lexicon: HALOT
  rationale: Nombre propio transliterado a una forma española reconocible. Se prefirió ‘Cohat’ por su tradición bíblica en español y por conservar la secuencia consonántica del hebreo sin calcar la grafía inglesa.
- source_word: הוֹלִ֥ד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: 'En fórmulas genealógicas, ‘engendró’ reproduce con precisión el valor de la raíz ילד en modo causativo: generación de descendencia masculina. Es más fiel que una paráfrasis como ‘fue padre de’ y más sobria que opciones explicativas.'
- source_word: אֶת עַמְרָֽם
  english_pob_choice: Amram
  chosen_spanish: a Amram
  alternatives_spanish:
  - Amram
  lexicon: HALOT
  rationale: El marcador de objeto directo no se traduce, pero en español la preposición ‘a’ es necesaria por la animacidad del complemento personal. ‘Amram’ se mantiene como nombre propio.
theological_decisions:
- issue: Naturaleza de מִשְׁפָּחָה en contexto censal/tribal
  english_pob_reading: clans
  chosen_spanish_reading: familias (subgrupos de linaje dentro de la tribu)
  alternative_spanish_readings:
  - clanes
  - grupos familiares
  rationale: 'La decisión evita reducir el término a una familia nuclear moderna y también evita introducir un tecnicismo excesivamente sociológico. ‘Familias’ deja visible la tensión: no son simples hogares, sino subdivisiones de parentesco en la organización tribal de Israel.'
  doctrine_reference: Números 1–4; 26 (organización tribal y censal de Israel)
- issue: Fórmula genealógica de הוֹלִד
  english_pob_reading: fathered
  chosen_spanish_reading: engendró
  alternative_spanish_readings:
  - fue padre de
  - tuvo como hijo a
  rationale: 'No hay tensión doctrinal, pero sí una decisión de registro: ‘engendró’ conserva el tono genealógico bíblico y la dirección masculina del verbo sin introducir una lectura más interpretativa.'
  doctrine_reference: Génesis 5; 10; Crónicas genealógicas
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios en el pase más reciente; la versión española sigue esa lectura estable sin introducir nuevas variantes textuales. La única nota del original en inglés es la alternativa léxica para מִשְׁפָּחָה, que aquí se mantiene como nota equivalente en español.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa ‘familias’ para מִשְׁפָּחָה de forma coherente con el contexto censal tribal de Números.
  - Se prefiere ‘engendró’ en genealogías para sostener un registro bíblico uniforme en toda la serie.
  - 'Los nombres propios se adaptan a formas españolas reconocibles cuando existe tradición estable: Leví, Cohat, Amram.'
