id: JHN.15.26
reference: 'John 15:26'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: ⸀Ὅταν ἔλθῃ ὁ παράκλητος ὃν ἐγὼ πέμψω ὑμῖν παρὰ τοῦ πατρός, τὸ πνεῦμα τῆς ἀληθείας ὃ παρὰ τοῦ πατρὸς ἐκπορεύεται, ἐκεῖνος μαρτυρήσει περὶ ἐμοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/john/015/026.yaml
  text: When the Advocate comes[a], whom I will send to you from the Father—the Spirit of truth[c][b], who proceeds from the Father—he will testify about me.
  footnotes:
  - marker: a
    text: Or 'Helper,' 'Counselor,' 'Comforter,' or transliterated 'Paraclete' for Greek παράκλητος.
    reason: lexical_alternative
  - marker: b
    text: Or 'will bear witness about me.'
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'proceeds from the Father,' a wording later significant in Trinitarian theology.
    reason: cross_reference
translation:
  language: ko
  text: 내가 아버지께로부터 여러분에게 보낼 보혜사, 곧 아버지로부터 나오시는 진리의 영이 오시면, 그분이 나에 대하여 증언하실 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「돕는 자」, 「위로자」, 「변호자」, 또는 헬라어를 음역한 「파라클레토스」. 한국 교회 전통은 요한복음 14-16장의 성령을 가리키는 παράκλητος를 「보혜사」로 옮겨 왔다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「나에 대해 증인이 되실 것이다」.
    reason: lexical_alternative
  - marker: c
    text: 헬라어 「아버지로부터 나오시다」는 후대 삼위일체 신학에서 중요해진 표현이다.
    reason: theological_clarification
lexical_decisions:
- source_word: παράκλητος
  english_pob_choice: Advocate
  chosen_korean: 보혜사
  alternatives_korean:
  - 돕는 자
  - 위로자
  - 변호자
  lexicon: BDAG
  rationale: '한국 교회 전통은 요한복음 14-16장의 성령을 가리키는 παράκλητος를 「보혜사」로 옮겨 왔으며, 본 글로사리도 이를 따른다. 요한일서 2:1의 동일 어휘(예수를 가리킴)는 「대언자」로 구별된다.'
- source_word: τὸ πνεῦμα τῆς ἀληθείας
  english_pob_choice: Spirit of truth
  chosen_korean: 진리의 영
  alternatives_korean:
  - 진리의 성령
  lexicon: BDAG
  rationale: 문자적·신학적 결을 살려 「진리의 영」으로 옮긴다.
- source_word: ἐκπορεύεται
  english_pob_choice: proceeds
  chosen_korean: 나오시다
  alternatives_korean:
  - 발하시다
  lexicon: BDAG
  rationale: 본동사의 자연스러운 옮김. 「발하시다」는 후대 신학 술어로 본문에 들이지 않는다.
- source_word: μαρτυρήσει
  english_pob_choice: will testify
  chosen_korean: 증언하시다
  alternatives_korean:
  - 증거하시다
  lexicon: BDAG
  rationale: 요한 신학의 「증언」 어휘를 일관되게 「증언하다」로 옮긴다.
