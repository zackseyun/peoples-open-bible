translation:
  language: es
  text: ¿Qué estás esperando[a], oh tirano? Pues estamos listos para morir antes que transgredir los mandamientos de nuestros padres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué vacilas, oh tirano?». El modismo griego también puede expresar demora o vacilación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «nuestros mandamientos ancestrales». La frase se refiere a los mandamientos heredados de la tradición judía.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί μέλλεις
  english_pob_choice: What are you waiting for
  chosen_spanish: ¿Qué estás esperando?
  alternatives_spanish:
  - ¿Por qué dudas?
  - ¿Qué retrasas?
  lexicon: LSJ
  rationale: La expresión griega con μέλλω comunica demora o vacilación ante una acción; en español, «¿Qué estás esperando?» reproduce bien el reto retórico con naturalidad y sin suavizar el tono.
- source_word: ὦ τύραννε
  english_pob_choice: O tyrant
  chosen_spanish: oh tirano
  alternatives_spanish:
  - oh gobernante
  - oh soberano
  lexicon: LSJ
  rationale: τύραννος es claramente peyorativo en este contexto; «oh tirano» conserva el matiz de acusación moral y la forma directa de invocación.
- source_word: ἑτοῖμοι
  english_pob_choice: ready
  chosen_spanish: listos
  alternatives_spanish:
  - preparados
  lexicon: LSJ
  rationale: ἑτοῖμοι expresa disposición inmediata; «listos» es la equivalencia más natural en español y mantiene la urgencia del martirio.
- source_word: ἀποθνήσκειν
  english_pob_choice: to die
  chosen_spanish: morir
  alternatives_spanish:
  - ser ejecutados
  lexicon: LSJ
  rationale: El infinitivo griego significa literalmente «morir»; aunque el contexto implica ejecución, el texto no la expresa de forma directa, así que se conserva el verbo simple.
- source_word: παραβαίνειν
  english_pob_choice: transgress
  chosen_spanish: transgredir
  alternatives_spanish:
  - violar
  - quebrantar
  lexicon: LSJ
  rationale: παραβαίνειν tiene fuerza normativa y religiosa; «transgredir» preserva ese registro formal mejor que opciones más coloquiales.
- source_word: τὰς πατρίους ἡμῶν ἐντολάς
  english_pob_choice: the commandments of our fathers
  chosen_spanish: los mandamientos de nuestros padres
  alternatives_spanish:
  - los mandamientos ancestrales
  - los mandatos transmitidos por nuestros padres
  lexicon: LSJ
  rationale: La frase griega usa lenguaje ancestral explícito con πατρίους y el genitivo plural ἡμῶν; «nuestros padres» mantiene de modo fiel el vínculo heredado y evita neutralizarlo.
theological_decisions:
- issue: Conservación del lenguaje ancestral masculino en πατρίους ἡμῶν
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: El griego usa una referencia masculina ancestral concreta. Se mantiene «nuestros padres» para respetar la forma del original y su referencia a la tradición heredada.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: This Spanish draft reflects the final English audit revision that preferred 'What are you waiting for' over 'Why do you hesitate,' while also preserving the Greek idiom’s sense of delay or hesitation in a natural Spanish challenge. No textual variants are introduced beyond the source-supported lexical choices.
  spanish_consistency_notes:
  - Se mantiene un registro formal y martirial, acorde al tono del pasaje.
  - «Tirano» se conserva como juicio pejorativo directo, no como título neutral.
  - «Mandamientos de nuestros padres» sigue de cerca la estructura del griego y el audit trail inglés, sin introducir una reinterpretación doctrinal.
