translation:
  language: es
  text: Cuando estés en angustia, y todas estas cosas te hayan sobrevenido, en los días postreros[a] volverás a Yahvé tu Dios y escucharás su voz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en tiempos futuros». La expresión hebrea «en los días postreros» puede referirse, de manera amplia, a un tiempo futuro y no necesariamente a un esquema específico de los últimos tiempos.'
    reason: alternative_reading
  - marker: b
    text: «Escucharás su voz» también puede entenderse como «obedecerás su voz», pues la expresión hebrea suele incluir el sentido de oír con obediencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּצַּר
  english_pob_choice: when you are in distress
  chosen_spanish: Cuando estés en angustia
  alternatives_spanish:
  - cuando estés en aflicción
  - cuando estés en distress
  lexicon: HALOT
  rationale: El sustantivo צַר con la preposición ב expresa un estado o circunstancia; en español, «estar en angustia» comunica bien ese estado de opresión o tribulación sin perder naturalidad. Se conserva el valor temporal de la cláusula inicial con «Cuando».
- source_word: וּמְצָאֻךָ
  english_pob_choice: come upon you
  chosen_spanish: te hayan sobrevenido
  alternatives_spanish:
  - te hayan alcanzado
  - te hayan encontrado
  lexicon: HALOT
  rationale: Aunque מצא literalmente es «hallar/encontrar», con calamidades como sujeto el sentido idiomático es que los acontecimientos alcanzan al destinatario. «Sobrevenir» transmite ese golpe de eventos adversos con buen español y sin suavizar la imagen.
- source_word: כֹּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todas estas palabras
  - todos estos acontecimientos
  lexicon: HALOT
  rationale: דְּבָרִים puede significar «palabras», «cosas» o «asuntos». Aquí remite a los eventos y juicios anunciados en el contexto, por lo que «cosas» es la opción más fiel y clara en español.
- source_word: בְּאַחֲרִית הַיָּמִים
  english_pob_choice: in the latter days
  chosen_spanish: en los días postreros
  alternatives_spanish:
  - en los días futuros
  - en el fin de los días
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula temporal reconocible. «Días postreros» mantiene el tono formal y la resonancia bíblica sin cerrar la frase en un esquema escatológico más específico que el que exige el hebreo.
- source_word: וְשַׁבְתָּ עַד
  english_pob_choice: you will return to
  chosen_spanish: volverás a
  alternatives_spanish:
  - te volverás a
  - te arrepentirás y volverás a
  lexicon: HALOT
  rationale: שׁוּב con עַד expresa retorno hacia alguien. «Volverás a» preserva la relación de regreso a Yahvé y evita introducir «arrepentirás», que sería una inferencia interpretativa no explícita en el verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton, según el criterio del proyecto. «Yahvé» mantiene la referencia personal al nombre revelado, sin sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - su Dios
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La construcción posesiva con sufijo de segunda persona masculina singular se vierte directamente como «tu Dios», manteniendo el tono de alianza y la dirección personal del discurso.
- source_word: וְשָׁמַעְתָּ בְּקֹלוֹ
  english_pob_choice: and listen to his voice
  chosen_spanish: y escucharás su voz
  alternatives_spanish:
  - y obedecerás su voz
  - y oirás su voz
  lexicon: HALOT
  rationale: שׁמע con בְּקוֹל puede incluir la idea de oír con obediencia. «Escucharás su voz» conserva la metáfora auditiva del hebreo y deja abierta la matiz de obedecer sin resolverla de forma reductiva.
theological_decisions:
- issue: El sentido de בְּאַחֲרִית הַיָּמִים y el posible sobrelectura escatológica
  english_pob_reading: in the latter days
  chosen_spanish_reading: en los días postreros
  alternative_spanish_readings:
  - en los días futuros
  - en el fin de los días
  rationale: La frase hebrea puede señalar un tiempo futuro amplio sin obligar a un sistema escatológico cerrado. La traducción conserva la expresión idiomática y la tensión interpretativa, en lugar de resolverla prematuramente.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: El lenguaje de regreso del pacto en וְשַׁבְתָּ עַד יְהוָה
  english_pob_reading: you will return to Yahweh your God
  chosen_spanish_reading: volverás a Yahvé tu Dios
  alternative_spanish_readings:
  - te volverás a Yahvé tu Dios
  - te arrepentirás y volverás a Yahvé tu Dios
  rationale: El verso habla del retorno relacional y de pacto hacia Dios. «Volverás» conserva ese movimiento sin añadir una formulación doctrinal de arrepentimiento que el verbo por sí solo no explicita.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not import doctrinal claims the text does not make'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; se mantiene la lectura de alta concordancia con el texto hebreo y el audit trail inglés. No se aplicaron revisiones adicionales.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יהוה conforme al criterio del proyecto.
  - Se evita «Cristo» y terminología eclesial no presente en el versículo.
  - «Angustia» y «sobrevenido» mantienen el valor de situación adversa sin mecanicismos.
  - «Escucharás su voz» preserva la tensión entre oír y obedecer sin resolverla en una sola acepción.
