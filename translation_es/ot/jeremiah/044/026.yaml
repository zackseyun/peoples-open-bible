  yaml_path: translation/ot/jeremiah/044/026.yaml
  text: 'Therefore hear the word of Yahweh[a], all Judah who dwell in the land of Egypt: Behold, I have sworn by my great name, says Yahweh, that my name shall no longer be called upon by the mouth of any man of Judah in all the land of Egypt, saying, ‘As the Lord GOD lives.’'
