  text: בְּ/סַּאסְּאָ֖ה בְּ/שַׁלְחָ֣/הּ תְּרִיבֶ֑/נָּה הָגָ֛ה בְּ/רוּח֥/וֹ הַ/קָּשָׁ֖ה בְּ/י֥וֹם קָדִֽים׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/027/008.yaml
  text: By measure[a], by sending her away, you contended with her[c][b]; he drove her away with his harsh wind on the day of the east wind.
  footnotes:
  - marker: a
    text: Or 'With restraint' or 'In exact measure'; the Hebrew term is rare and likely conveys that the judgment was limited rather than annihilating.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew keeps the feminine pronoun 'her,' likely personifying Zion/Israel/the people as a woman.
    reason: alternative_reading
  - marker: c
    text: The 'east wind' is a stock image for a scorching, destructive wind from the desert.
    reason: cultural_note
