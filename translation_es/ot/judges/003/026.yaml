translation:
  language: es
  text: Pero Ehud escapó[a] mientras ellos se demoraban, y pasó más allá de las imágenes talladas[b] y escapó a Seirá[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se deslizó» o «fue librado» para «escapó».
    reason: lexical_alternative
  - marker: b
    text: O «los ídolos» o «las imágenes esculpidas» para «las imágenes talladas».
    reason: lexical_alternative
  - marker: c
    text: También puede transliterarse «Seirath».
    reason: alternative_reading
lexical_decisions:
- source_word: נִמְלַט / וַיִּמָּלֵט
  english_pob_choice: escaped
  chosen_spanish: escapó
  alternatives_spanish:
  - se deslizó
  - huyó
  - fue librado
  lexicon: HALOT
  rationale: El nifal de מלט expresa una salida exitosa de peligro. «Escapó» es natural en español y conserva la repetición del verbo en la oración, como en el inglés POB.
- source_word: עַד הִתְמַהְמְהָם
  english_pob_choice: while they delayed
  chosen_spanish: mientras ellos se demoraban
  alternatives_spanish:
  - mientras ellos tardaban
  - mientras ellos vacilaban
  - hasta que ellos se demoraron
  lexicon: HALOT
  rationale: La construcción temporal marca el lapso durante el cual Ehud pudo salir. «Se demoraban» comunica la idea de retraso o tardanza sin perder la fluidez narrativa.
- source_word: עָבַר אֶת הַפְּסִילִים
  english_pob_choice: passed beyond the carved images
  chosen_spanish: pasó más allá de los ídolos
  alternatives_spanish:
  - pasó más allá de las imágenes talladas
  - pasó junto a los ídolos
  - pasó más allá de las imágenes esculpidas
  lexicon: HALOT
  rationale: פְּסִילִים puede referirse a imágenes esculpidas o ídolos. Aquí se conserva la lectura cultual probable con «ídolos», siguiendo la nota inglesa que reconoce esa alternativa, mientras «más allá de» reproduce el matiz espacial de עבר en contexto de desplazamiento.
- source_word: הַפְּסִילִים
  english_pob_choice: the carved images
  chosen_spanish: los ídolos
  alternatives_spanish:
  - las imágenes talladas
  - las imágenes esculpidas
  - las imágenes de talla
  lexicon: HALOT
  rationale: Aunque la forma literal apunta a objetos tallados, en español «ídolos» comunica el valor referencial probable y evita una expresión menos idiomática. La alternativa literal queda preservada en la nota.
- source_word: הַשְּׂעִירָתָה
  english_pob_choice: Seirah
  chosen_spanish: Seirá
  alternatives_spanish:
  - Seirat
  - Seirath
  lexicon: HALOT
  rationale: Es un nombre de lugar, por lo que se translitera. «Seirá» ofrece una forma española clara y readable; se mantiene la posibilidad de otra transliteración tradicional en nota.
- source_word: וְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: HALOT
  rationale: La conjunción introduce contraste narrativo con la demora de los siervos, por eso «Pero» expresa mejor la transición que un simple «Y».
translation_notes:
  revision_awareness: El texto inglés POB se mantiene sin cambios sustanciales en la revisión más reciente; la versión española sigue de cerca sus decisiones léxicas principales, pero adapta el objeto de הַפְּסִילִים a un español más natural («ídolos») sin perder la alternativa literal en nota.
  spanish_consistency_notes:
  - Se conserva la repetición de «escapó» para reflejar el doble נִמְלַט/וַיִּמָּלֵט.
  - Se usa «Seirá» como transliteración principal y se documenta «Seirath» como alternativa.
  - No se introduce terminología doctrinal; el verso es narrativo y no requiere decisiones teológicas explícitas.
