  glossary_alignment: No hay conflicto con la terminología base del proyecto. La decisión teológica clave de traducir ברך eufemísticamente como «maldecirá» está bien encaminada, pero la nota debe preservar explícitamente la alternativa literal «te bendecirá» y anclarse en esa frase, no en «tu mano».
