translation:
  language: es
  text: Y mientras dábamos vueltas por el jardín cerrado[a], vimos a esta mujer descansando[b] con un hombre y, de pie allí, los observábamos mientras hablaban entre sí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego στάδιον aquí se refiere al espacio cerrado o jardín cercado, no a un estadio atlético moderno.
    reason: cultural_note
  - marker: b
    text: O 'reclinada' o 'reposando' para ἀναπαυομένην. El griego por sí mismo no declara actividad sexual en esta cláusula.
    reason: lexical_alternative
lexical_decisions:
- source_word: κυκλοῦντες
  english_pob_choice: as we were going around
  chosen_spanish: mientras dábamos vueltas
  alternatives_spanish:
  - mientras recorríamos
  - mientras íbamos rodeando
  - mientras caminábamos alrededor
  lexicon: BDAG
  rationale: El participio circunstancial expresa movimiento en desarrollo alrededor del lugar; 'mientras dábamos vueltas' conserva ese valor progresivo sin sonar forzado en español.
- source_word: τὸ στάδιον
  english_pob_choice: the enclosed garden
  chosen_spanish: el jardín cerrado
  alternatives_spanish:
  - el recinto cerrado
  - los terrenos cerrados
  - el jardín cercado
  lexicon: LSJ
  rationale: En este contexto no se trata de un estadio atlético moderno, sino del espacio cerrado de la escena de Susana. 'Jardín cerrado' comunica con claridad el entorno y mantiene la nota de encierro del término griego.
- source_word: εἴδομεν
  english_pob_choice: we saw
  chosen_spanish: vimos
  alternatives_spanish:
  - observamos
  - nos fijamos y vimos
  - percibimos
  lexicon: BDAG
  rationale: El verbo de percepción es directo; 'vimos' preserva la sencillez del griego sin añadir matices interpretativos.
- source_word: ταύτην
  english_pob_choice: this woman
  chosen_spanish: a esta mujer
  alternatives_spanish:
  - a esta
  - a esta mujer aquella
  - a la mujer esta
  lexicon: BDAG
  rationale: El demostrativo tiene tono señalado o acusatorio. En español, 'a esta mujer' conserva la deixis y el objeto directo explícito.
- source_word: ἀναπαυομένην
  english_pob_choice: resting
  chosen_spanish: descansando
  alternatives_spanish:
  - reposando
  - descansando recostada
  - reclinada
  lexicon: BDAG
  rationale: El término puede significar descansar o recostarse. 'Descansando' es fiel y evita introducir la idea sexual que el griego no especifica en esta cláusula.
- source_word: μετὰ ἀνδρός
  english_pob_choice: with a man
  chosen_spanish: con un hombre
  alternatives_spanish:
  - en compañía de un hombre
  - junto a un hombre
  - al lado de un hombre
  lexicon: BDAG
  rationale: La frase señala compañía o presencia junto a un hombre, no una conducta ya explicitada como sexual; 'con un hombre' mantiene esa precisión.
- source_word: στάντες
  english_pob_choice: standing there
  chosen_spanish: de pie allí
  alternatives_spanish:
  - quedándonos de pie
  - detenidos allí
  - parados allí
  lexicon: BDAG
  rationale: El participio describe que se detuvieron y permanecieron allí. 'De pie allí' suena natural en español y conserva la escena inmóvil de la observación.
- source_word: ἐθεωροῦμεν
  english_pob_choice: we watched
  chosen_spanish: los observábamos
  alternatives_spanish:
  - los mirábamos
  - los estábamos observando
  - los contemplábamos
  lexicon: BDAG
  rationale: El imperfecto indica observación continuada. 'Los observábamos' expresa esa duración de forma clara en español.
- source_word: ὁμιλοῦντας ἀλλήλοις
  english_pob_choice: talking with one another
  chosen_spanish: mientras hablaban entre sí
  alternatives_spanish:
  - hablando entre sí
  - conversando uno con otro
  - hablándose mutuamente
  lexicon: BDAG
  rationale: La expresión describe conversación recíproca. 'Mientras hablaban entre sí' reproduce la relación mutua y encaja con el flujo narrativo del verso.
theological_decisions:
- issue: Grado de insinuación de conducta impropia en el testimonio
  english_pob_reading: Render the scene descriptively without importing explicit sexual language beyond the Greek.
  chosen_spanish_reading: Traducir la escena de manera descriptiva, sin añadir lenguaje sexual explícito que el griego de esta cláusula no expresa.
  alternative_spanish_readings:
  - con una redacción más sugestiva que insinúe adulterio con más fuerza
  - con 'reclinada con un hombre' para cargar más la escena
  rationale: La tensión narrativa debe preservarse sin resolverla artificialmente. El griego presenta a Susana con un hombre y luego hablando con él; la traducción no debe fortalecer la acusación más allá del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que corrigió la traducción de ἀναπαυομένην de una noción más fuerte ('lying') a una más precisa y menos interpretativa ('resting'). En español se reflejó ese ajuste con 'descansando', manteniendo además el resto de la secuencia narrativa sin sobreinterpretación.
  spanish_consistency_notes:
  - Se mantiene 'Dios' y no aplica aquí ninguna sustitución de nombres divinos.
  - Se evitó 'Cristo'/'Mesías' porque el verso no contiene esa terminología.
  - No se usó 'siervo' ni 'esclavo' porque no aparecen δοῦλος ni equivalentes.
  - Se conservó el valor narrativo y acusatorio del demostrativo 'esta mujer' sin intensificarlo con glosas innecesarias.
  - La elección de 'jardín cerrado' respeta el nota del POB inglés sobre στάδιον como recinto ajardinado, no como estadio moderno.
