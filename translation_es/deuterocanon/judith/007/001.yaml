  yaml_path: translation/deuterocanon/judith/007/001.yaml
  text: On the next day Holofernes ordered all his army and all his people who had come for his alliance to break camp for Bethulia[a], to seize the passes of the hill country in advance[b], and to make war against the sons of Israel.
  footnotes:
