translation:
  language: es
  text: No busques lo que es demasiado maravilloso para ti[a], ni investigues lo que está escondido de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo más de cerca el paralelo griego: “No busques lo que es más difícil que tú, ni examines lo que es más fuerte que tú”. El hebreo enfatiza lo demasiado maravilloso y lo escondido; el griego enfatiza lo que excede tu capacidad.'
    reason: alternative_reading
lexical_decisions:
- source_word: פְּלָאוֹת
  english_pob_choice: what is too wondrous for you
  chosen_spanish: lo que es demasiado admirable para ti
  alternatives_spanish:
  - maravillas
  - lo que es demasiado maravilloso para ti
  - cosas demasiado altas para ti
  lexicon: HALOT
  rationale: El hebreo apunta a cosas asombrosas o extraordinarias; en este contexto no se trata de “milagros” sino de realidades que exceden el alcance humano. “Demasiado admirable” conserva la idea de maravilla sin volverla un calco áspero.
- source_word: מִמְּךָ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - de ti
  - más allá de ti
  - por encima de ti
  lexicon: HALOT
  rationale: Aunque literalmente es “de ti”, aquí funciona de modo idiomático para marcar lo que rebasa tu esfera. “Para ti” es natural en español y mantiene la fuerza práctica del límite.
- source_word: אַל תִּדְרוֹשׁ
  english_pob_choice: do not seek
  chosen_spanish: No busques
  alternatives_spanish:
  - No indagues
  - No investigues
  - No persigas
  lexicon: HALOT
  rationale: דרש admite buscar, indagar o investigar. “Buscar” es breve y fiel al imperativo, mientras que el contexto ya delimita el tipo de búsqueda que se desaconseja.
- source_word: וּמְכֻסֶּה
  english_pob_choice: what is hidden
  chosen_spanish: lo que está oculto
  alternatives_spanish:
  - lo encubierto
  - lo secreto
  - lo cubierto
  lexicon: HALOT
  rationale: Desde כסה, la idea central es algo cubierto o velado. “Oculto” es la opción más natural en español y reproduce bien el paralelismo con la primera mitad del verso.
- source_word: אַל תַּחְקוֹר
  english_pob_choice: do not search out
  chosen_spanish: ni investigues
  alternatives_spanish:
  - ni examines
  - ni escudriñes
  - ni probees
  lexicon: HALOT
  rationale: חקר tiene el matiz de investigar, sondear o examinar a fondo. “Investigar” comunica una búsqueda más intensa que el simple “buscar” anterior.
- source_word: χαλεπότερά σου / ἰσχυρότερά σου
  english_pob_choice: used as semantic support for 'too wondrous for you' / 'hidden from you'
  chosen_spanish: apoya la idea de que hay cosas que exceden tu capacidad
  alternatives_spanish:
  - más difíciles que tú
  - más fuertes que tú
  - más allá de tu alcance
  lexicon: BDAG
  rationale: El paralelo griego no sustituye al hebreo, pero confirma que el dicho advierte contra perseguir lo que rebasa la capacidad humana. Por eso la versión española conserva la noción de límite, no solo de curiosidad.
theological_decisions:
- issue: Si el versículo prohíbe toda investigación sobre misterios divinos o solo la búsqueda de lo que excede la capacidad humana
  english_pob_reading: A wisdom warning against seeking matters beyond one's proper reach or disclosure
  chosen_spanish_reading: Una advertencia sapiencial contra buscar lo que rebasa tu alcance o tu medida
  alternative_spanish_readings:
  - Una prohibición total de toda investigación teológica
  - Una advertencia solo contra la especulación orgullosa
  rationale: 'Tanto el hebreo como el griego señalan límites reales: lo demasiado admirable, lo oculto, lo más difícil o más fuerte que uno. La formulación española debe dejar esa tensión sin convertir el texto en un veto absoluto a toda indagación.'
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con la revisión más reciente y no requiere cambios sustanciales; se mantiene la misma lectura de fondo con una formulación española natural y auditable.
  spanish_consistency_notes:
  - Se conserva el paralelismo de dos mandatos negativos.
  - “Oculto” evita precisar indebidamente si el énfasis es secreto, encubierto o velado.
  - La nota de pie de página mantiene la tensión entre hebreo y griego sin fusionarlos artificialmente.
  - “Investigar” reserva para el segundo miembro una intensidad mayor que “buscar”.
