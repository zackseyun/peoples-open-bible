lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then spoke
  chosen_spanish: Entonces habló
  alternatives_spanish:
  - Y habló
  - Y dijo
  lexicon: HALOT
  rationale: El wayyiqtol introduce la siguiente acción narrativa. En español, «Entonces habló» conserva la secuencia y la fórmula solemne sin volverla pesada; «Y dijo» sería posible, pero aquí «habló ... diciendo» refleja mejor la estructura hebrea con לֵאמֹר.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'El texto hebreo usa directamente el Nombre divino. Siguiendo el criterio del proyecto, se mantiene una transliteración del Tetragrámaton en español: «Yahvé», en vez de sustituirlo por un título como «SEÑOR».'
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La forma infinitiva funciona como fórmula de introducción del discurso. «Diciendo» preserva ese valor formal sin añadir contenido interpretativo.
theological_decisions:
- issue: Representación del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La decisión mantiene el Nombre propio del pacto visible en el texto base y evita la sustitución por un título. «Yahvé» es la forma coherente con el estándar del proyecto para YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El inglés POB usa «Then Yahweh spoke to Moses, saying,» con nota sobre el Tetragrámaton. La versión española sigue ese mismo perfil auditado: conserva el Nombre divino, mantiene la fórmula narrativa y no introduce cambios de sentido.'
  spanish_consistency_notes:
  - Se conserva la secuencia narrativa con «Entonces» para reproducir el valor de wayyiqtol.
  - Se usa «Yahvé» de manera consistente con la terminología española del proyecto para יְהוָה.
  - «Moisés» y «diciendo» mantienen registro bíblico claro y natural en español.
