translation:
  language: es
  text: A ti ofreceré un sacrificio de acción de gracias, e invocaré el nombre de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se vierte «el SEÑOR». Entre las transliteraciones posibles están «Yahvé» y «Jehová».'
    reason: alternative_reading
lexical_decisions:
- source_word: לְךָ
  english_pob_choice: To you
  chosen_spanish: A ti
  alternatives_spanish:
  - Para ti
  lexicon: HALOT
  rationale: El ל con sufijo de 2.ª persona masculina singular señala destinatario/dirección del acto sacrificial. En español, «a ti» conserva la dedicatoria directa a Dios de manera natural y solemne.
- source_word: אֶזְבַּח
  english_pob_choice: I will offer
  chosen_spanish: ofreceré
  alternatives_spanish:
  - sacrificaré
  - haré un sacrificio
  lexicon: HALOT
  rationale: En contexto cultual, זבח expresa la acción de presentar un sacrificio. «Ofreceré» es idiomático y preserva el sentido sacrificial sin cargar innecesariamente el verbo con el matiz de degüello.
- source_word: זֶבַח תּוֹדָה
  english_pob_choice: a sacrifice of thanksgiving
  chosen_spanish: un sacrificio de acción de gracias
  alternatives_spanish:
  - una ofrenda de acción de gracias
  - un sacrificio de agradecimiento
  lexicon: HALOT
  rationale: La construcción denota un sacrificio de agradecimiento. «Acción de gracias» mantiene el sustantivo cultual «sacrificio» y expresa con claridad el valor de gratitud; evita rebajar el término a una simple expresión emocional.
- source_word: וּבְשֵׁם
  english_pob_choice: and ... on the name
  chosen_spanish: e ... el nombre
  alternatives_spanish:
  - y ... en el nombre
  - y ... sobre el nombre
  lexicon: HALOT
  rationale: Con קרא בשם, el sentido es invocar o llamar sobre/upon el nombre. En español, la frase se integra de modo natural con «invocaré el nombre», que conserva el valor devocional del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio editorial del POB en español, para preservar el nombre personal de Dios y no sustituirlo por un título.
- source_word: אֶקְרָא
  english_pob_choice: I will call
  chosen_spanish: invocaré
  alternatives_spanish:
  - llamaré
  - clamaré
  lexicon: HALOT
  rationale: En el contexto de בשם יהוה, קרא significa invocar/callar sobre el nombre. «Invocaré» expresa mejor el uso oracional y evita la ambigüedad de un simple «llamaré».
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo emplea el Tetragrámaton directamente. La lectura española «Yahvé» preserva el nombre revelado de Dios sin la sustitución litúrgica por un título, en coherencia con el enfoque auditable del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El contexto auditado en inglés no presenta revisiones posteriores ni cambios pendientes; la lectura inglesa aprobada mantiene 'Yahweh' y 'a sacrifice of thanksgiving', y la versión española conserva esas decisiones con equivalentes naturales y transparentes.
  spanish_consistency_notes:
  - Se evita «SEÑOR» para el Tetragrámaton, siguiendo la política del proyecto.
  - «Sacrificio de acción de gracias» mantiene el valor cultual del sustantivo hebreo זֶבַח y la dimensión de gratitud de תּוֹדָה.
  - «Invocaré el nombre de Yahvé» reproduce el valor idiomático de קרא בשם sin introducir un matiz ajeno al hebreo.
