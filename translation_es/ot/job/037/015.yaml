translation:
  language: es
  text: ¿Sabes cómo Dios pone estas cosas sobre ellos[a] y hace resplandecer la luz de su nube[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando Dios las pone en su sitio» o «cómo Dios las dispone». La expresión hebrea es compacta y deja implícitos el objeto y el referente por el contexto cercano.
    reason: alternative_reading
  - marker: b
    text: O «hace que la luz de su nube relampaguee».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתֵדַע
  english_pob_choice: Do you know
  chosen_spanish: ¿Sabes
  alternatives_spanish:
  - ¿Conoces
  - ¿Entiendes
  lexicon: HALOT
  rationale: La forma verbal introduce una pregunta retórica dirigida a Job. «¿Sabes» conserva la fuerza directa y natural del hebreo en español.
- source_word: בְּשׂוּם
  english_pob_choice: how ... lays
  chosen_spanish: cómo Dios los coloca
  alternatives_spanish:
  - cuándo Dios los pone
  - al poner Dios
  lexicon: HALOT
  rationale: El giro con ב + infinitivo de שום puede expresar circunstancia o manera. En español, tras una pregunta retórica, «cómo ... coloca» comunica bien la acción sin volverla mecánica, y mantiene el objeto implícito que el hebreo no explicita.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: אֱלוֹהַּ es la forma poética singular de «Dios» en Job. No hay base contextual aquí para expandir el término.
- source_word: עֲלֵיהֶם
  english_pob_choice: upon them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - sobre estas cosas
  lexicon: HALOT
  rationale: La preposición על con sufijo plural se traduce de manera directa como «sobre ellos». Se preserva la referencia implícita, sin identificarla más allá de lo que el contexto exige.
- source_word: וְהוֹפִיעַ
  english_pob_choice: causes ... to shine
  chosen_spanish: hace resplandecer
  alternatives_spanish:
  - hace brillar
  - hace aparecer
  lexicon: HALOT
  rationale: El hifil de יפע expresa hacer que algo resplandezca o salga a la luz. «Hace resplandecer» es natural en español y conserva el matiz de brillo que el hebreo sugiere.
- source_word: אוֹר
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - la claridad
  - la brillantez
  lexicon: HALOT
  rationale: אוֹר se traduce aquí por «luz», el equivalente más directo y claro en español.
- source_word: עֲנָנוֹ
  english_pob_choice: his cloud
  chosen_spanish: su nube
  alternatives_spanish:
  - su nube de tormenta
  - su nube
  lexicon: HALOT
  rationale: El sustantivo singular con sufijo posesivo se refleja literalmente como «su nube». Se evita añadir «de tormenta» porque el hebreo no lo dice explícitamente.
theological_decisions:
- issue: Objeto implícito de «los coloca» y referente de «ellos»
  english_pob_reading: Preserve the Hebrew's ambiguity with 'lays these upon them' rather than specifying lightning, charge, or clouds.
  chosen_spanish_reading: Preservar la ambigüedad con «los coloca sobre ellos» sin identificar qué son «los» ni quiénes son exactamente «ellos».
  alternative_spanish_readings:
  - los pone sobre las nubes
  - pone sobre ellos estas cosas
  - les impone su decreto
  rationale: El hebreo omite un objeto explícito para שום y deja el referente de «ellos» dependiente del contexto cercano. El español mantiene esa apertura para no resolver prematuramente la imagen meteorológica o retóricamente precisa del versículo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Sentido de la imagen de la nube y su luz
  english_pob_reading: causes the light of his cloud to shine
  chosen_spanish_reading: hace resplandecer la luz de su nube
  alternative_spanish_readings:
  - hace brillar la claridad de su nube
  - hace relampaguear la luz de su nube
  rationale: El hebreo presenta una imagen de luminosidad asociada a la nube de Dios. «Resplandecer» conserva la fuerza visual sin imponer un término más específico como «relampaguear», que iría más allá del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió «causes ... to shine» sobre «makes ... shine». Por eso se eligió «hace resplandecer» como una opción ligeramente más formal, manteniendo la misma imagen de luz sin intensificarla indebidamente.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלוֹהַּ, conforme al patrón POB en este contexto poético.
  - Se preserva la ambigüedad del referente plural de עֲלֵיהֶם y del objeto implícito de בְּשׂוּם.
  - Se usa «nube» en singular para reflejar עֲנָנוֹ y no se amplía a «nubes» sin base textual.
  - Se evitó sustituir la imagen de brillo por una explicación interpretativa, para respetar el paralelismo del versículo.
