translation:
  language: es
  text: 'Keila[a], Aczib y Maresá: nueve ciudades con sus aldeas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus asentamientos». El término hebreo puede referirse a lugares rurales dependientes asociados con una ciudad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קְעִילָה
  english_pob_choice: Keilah
  chosen_spanish: Queila
  alternatives_spanish:
  - Queilá
  - Keila
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera al español para mantener la referencia geográfica y la transparencia con el hebreo.
- source_word: אַכְזִיב
  english_pob_choice: Achzib
  chosen_spanish: Aczib
  alternatives_spanish:
  - Ajzib
  - Akhzib
  lexicon: HALOT
  rationale: Nombre propio de lugar; se adapta a una transliteración española natural, conservando la forma del topónimo hebreo.
- source_word: מָרֵאשָׁה
  english_pob_choice: Mareshah
  chosen_spanish: Maresa
  alternatives_spanish:
  - Maresá
  - Maresha
  lexicon: HALOT
  rationale: Nombre propio de lugar; la forma española usual y legible conserva la identificación del topónimo sin anglicismo innecesario.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - towns
  - pueblos
  lexicon: HALOT
  rationale: Término administrativo-geográfico general. 'Ciudades' preserva el valor territorial de la lista mejor que opciones más pequeñas o vagas.
- source_word: תֵּשַׁע
  english_pob_choice: nine
  chosen_spanish: nueve
  alternatives_spanish:
  - '9'
  lexicon: HALOT
  rationale: Número cardinal que modifica 'ciudades'; se expresa con palabra en estilo bíblico de prosa continua.
- source_word: חַצְרֵיהֶן
  english_pob_choice: their villages
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus poblados
  - sus asentamientos
  lexicon: HALOT
  rationale: El término puede abarcar lugares rurales dependientes o satélites de una ciudad. 'Aldeas' comunica bien esa relación en español y sigue la decisión inglesa sin ocultar la amplitud del hebreo.
translation_notes:
  revision_awareness: La revisión más reciente indica que el texto fuente y la lectura inglesa están en alto acuerdo y no requieren cambios; por eso la versión española mantiene la lista simple y el matiz léxico en una nota breve.
  spanish_consistency_notes:
  - Se mantiene la transliteración de nombres propios de lugar sin traducirlos.
  - Se conserva la enumeración concisa del hebreo con dos puntos antes de la especificación numérica.
  - '''Aldeas'' refleja el sentido de חַצְרֵיהֶן sin perder la posibilidad alternativa documentada de ''asentamientos''.'
