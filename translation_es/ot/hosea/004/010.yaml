base_translation:
  language: en
  yaml_path: translation/ot/hosea/004/010.yaml
  text: They will eat[a], but not be satisfied; they will commit sexual immorality, but not increase, because they have abandoned Yahweh[c][b], to cherish prostitution.
  footnotes:
  - marker: a
    text: Or 'play the prostitute' / 'commit whoredom.' The Hebrew verb can denote prostitution specifically and, in Hosea, often carries overtones of covenant unfaithfulness.
    reason: lexical_alternative
  - marker: b
    text: Or 'multiply.' The Hebrew literally has 'break out,' here likely meaning increase in offspring or population.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew is terse: ''they have abandoned the LORD, to keep.'' The sense is likely that they have stopped giving heed to or observing the LORD; some understand an implied object such as ''his law'' or ''his ways.'''
    reason: alternative_reading
