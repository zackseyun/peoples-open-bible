translation:
  language: es
  text: Y si hoy[a] han actuado con verdad y con integridad[b] para con Jerubaal y para con su casa[c], regocíjense en Abimelec, y que él también se regocije en ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'este día' en vez de 'hoy'.
    reason: lexical_alternative
  - marker: b
    text: O 'han tratado a Jerubaal y a su casa con fidelidad y con integridad'.
    reason: lexical_alternative
  - marker: c
    text: El hebreo 'su casa' puede referirse a su hogar, familia o dinastía.
    reason: cultural_note
lexical_decisions:
- source_word: בֶּאֱמֶת
  english_pob_choice: in truth
  chosen_spanish: con verdad
  alternatives_spanish:
  - en verdad
  - verdaderamente
  lexicon: HALOT
  rationale: La expresión nominal hebrea enfatiza verdad/fiabilidad; en español, 'con verdad' conserva el valor adverbial relacional y suena natural unido a la cláusula anterior.
- source_word: וּבְתָמִים
  english_pob_choice: and integrity
  chosen_spanish: con integridad
  alternatives_spanish:
  - con sinceridad
  - con rectitud
  - con blamelessness
  lexicon: HALOT
  rationale: תָמִים comunica integridad moral o conducta íntegra. 'Con integridad' mantiene el tono ético y evita suavizar el matiz de totalidad moral.
- source_word: עֲשִׂיתֶם עִם
  english_pob_choice: you have acted toward
  chosen_spanish: han actuado para con
  alternatives_spanish:
  - han tratado a
  - han obrado con respecto a
  lexicon: HALOT
  rationale: El hebreo expresa una acción relacional hacia alguien. 'Para con' preserva esa dirección sin volverlo una paráfrasis demasiado libre.
- source_word: יְרֻבַּעַל
  english_pob_choice: Jerubbaal
  chosen_spanish: Jerubaal
  alternatives_spanish:
  - Jerubbaal
  lexicon: transliteración propia del POB
  rationale: Se mantiene el nombre propio con transliteración coherente al español, ajustando la grafía a una forma legible y estable en castellano.
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su casa / su familia
  - su casa / su linaje
  lexicon: HALOT
  rationale: '''Casa'' preserva el término hebreo y permite el sentido de casa, familia o dinastía. En el texto principal se deja abierto ese campo semántico sin estrecharlo a ''familia''.'
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: '''Hoy'' comunica de forma natural el valor temporal inmediato del hebreo sin perder el énfasis de actualidad.'
- source_word: שִׂמְחוּ
  english_pob_choice: rejoice
  chosen_spanish: regocíjense
  alternatives_spanish:
  - alégrense
  - celebren
  lexicon: HALOT
  rationale: El imperativo plural exhorta a una alegría marcada. 'Regocíjense' conserva el tono elevado de la orden y el paralelismo retórico.
- source_word: בַּאֲבִימֶלֶךְ
  english_pob_choice: in Abimelech
  chosen_spanish: en Abimelec
  alternatives_spanish:
  - sobre Abimelec
  - con Abimelec
  lexicon: HALOT
  rationale: La preposición ב con שׂמח permite 'en' o 'sobre'; 'en Abimelec' refleja de cerca la construcción hebrea y armoniza con el paralelismo del versículo.
- source_word: וְיִשְׂמַח גַּם הוּא בָּכֶם
  english_pob_choice: and let him also rejoice in you
  chosen_spanish: y que él también se regocije en ustedes
  alternatives_spanish:
  - y que él también se alegre de ustedes
  - y que él también se regocije por ustedes
  lexicon: HALOT
  rationale: El imperfecto con valor jussivo se vierte como deseo/exhortación. 'Que él también se regocije en ustedes' conserva el paralelismo con la primera mitad del verso.
theological_decisions:
- issue: Alcance de בֵּיתוֹ (“su casa”)
  english_pob_reading: '''His house'' may refer to his household, family, or dynasty.'
  chosen_spanish_reading: '''su casa'' mantiene deliberadamente la amplitud de hogar, familia o dinastía.'
  alternative_spanish_readings:
  - su familia
  - su linaje
  - su casa / su dinastía
  rationale: El contexto de violencia contra la línea de Jerubaal exige no reducir el término a un solo referente. 'Casa' es la opción más abierta y fiel al hebreo, dejando el alcance a la interpretación contextual.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El borrador sigue de cerca el packet hebreo y el audit trail inglés. No se aplicaron revisiones adicionales; se conserva el paralelismo, la fuerza condicional inicial y la forma jussiva del cierre.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Nombre divino cuando aparezca en el contexto inmediato, pero en este versículo no hay mención explícita.
  - '''Jerubaal'' se translitera de forma consistente al español, sin forzar la grafía inglesa.'
  - Se mantiene 'casa' como término abierto para בית, evitando estrechar el sentido a una sola opción interpretativa.
  - '''Regocíjense''/''se regocije'' preserva el tono exhortativo y el paralelismo del hebreo.'
