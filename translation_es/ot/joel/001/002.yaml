translation:
  language: es
  text: 'Oigan esto, ancianos, y presten atención, todos los habitantes del país[a]: ¿Ha sucedido esto en sus días, o en los días de sus padres[b]?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «todos los habitantes de la tierra». El hebreo puede significar «tierra» o «mundo»; aquí, «país» refleja mejor el contexto inmediato local.'
    reason: lexical_alternative
  - marker: b
    text: 'O «en los días de sus antepasados». El hebreo dice literalmente: «sus padres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oigan ustedes
  lexicon: HALOT
  rationale: El imperativo plural pide una llamada directa y natural en español. «Oigan» conserva la fuerza exhortativa de שׁמע sin sonar rígido; «Escuchen» también sería posible, pero aquí «oigan esto» sigue bien el demostrativo inmediato.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - tal cosa
  lexicon: HALOT
  rationale: El demostrativo neutro «esto» refleja el objeto directo inmediato del mandato y evita añadir sustantivos no presentes en el hebreo.
- source_word: הַזְּקֵנִים
  english_pob_choice: you elders
  chosen_spanish: ustedes, ancianos
  alternatives_spanish:
  - ancianos
  - ustedes, los ancianos
  lexicon: HALOT
  rationale: El vocativo requiere marcar la dirección del habla. «Ancianos» conserva el referente de edad y posible liderazgo; se añade «ustedes» para hacer explícita la apelación plural, como en el inglés auditado.
- source_word: וְהַאֲזִינוּ
  english_pob_choice: and give ear
  chosen_spanish: y presten atención
  alternatives_spanish:
  - y escuchen
  - y presten oído
  lexicon: HALOT
  rationale: האֲזִינוּ es un llamado más enfático que el primer verbo. «Presten atención» preserva esa intensificación y suena natural en español, sin borrar el paralelismo retórico.
- source_word: כֹּל יוֹשְׁבֵי הָאָרֶץ
  english_pob_choice: all inhabitants of the land
  chosen_spanish: todos los habitantes de la tierra
  alternatives_spanish:
  - todos los habitantes de la tierra/país
  - todos los habitantes del país
  lexicon: HALOT
  rationale: El inglés POB opta por «the land» en el contexto inmediato, pero en español «la tierra» puede conservar la misma ambigüedad entre territorio y mundo. Se mantiene «habitantes» para el sentido colectivo, sin imponer una localización más estrecha que el texto hebreo no exige de forma inequívoca.
- source_word: הֶהָיְתָה זֹּאת
  english_pob_choice: Has this happened
  chosen_spanish: ¿Ha sucedido esto?
  alternatives_spanish:
  - ¿Ha ocurrido esto?
  - ¿Ha pasado esto?
  lexicon: HALOT
  rationale: «Ha sucedido» expresa con naturalidad el valor perfectivo de הָיְתָה en una pregunta sobre un acontecimiento sin añadir matices extra.
- source_word: בִּימֵיכֶם
  english_pob_choice: in your days
  chosen_spanish: en sus días
  alternatives_spanish:
  - en sus tiempos
  - durante sus días
  lexicon: HALOT
  rationale: Se conserva la fórmula temporal hebrea. El pronombre de cortesía/plural «sus» comunica el destinatario plural sin forzar una forma demasiado literal como «vuestros».
- source_word: וְאִם
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o si
  - o bien
  lexicon: HALOT
  rationale: En esta pregunta comparativa, la conjunción funciona como alternativa; «o» reproduce el valor disyuntivo de manera idiomática en español.
- source_word: בִּימֵי אֲבֹתֵיכֶם
  english_pob_choice: in the days of your fathers
  chosen_spanish: en los días de sus padres
  alternatives_spanish:
  - en los días de sus antepasados
  - en tiempos de sus padres
  lexicon: HALOT
  rationale: Se conserva la referencia masculina plural del hebreo con «padres», siguiendo la precisión lexical del original y la lectura del inglés auditado; «antepasados» sería una neutralización menos exacta.
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra/territorio
  rationale: El contexto inmediato sugiere una audiencia local, pero el hebreo אֶרֶץ puede abarcar tanto territorio como tierra en sentido amplio. «La tierra» preserva esa tensión semántica en español sin fijarla de modo excesivamente restrictivo.
  doctrine_reference: Translation philosophy §3, §5
- issue: Referencia generacional de אֲבֹתֵיכֶם
  english_pob_reading: your fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  rationale: El hebreo es explícitamente masculino plural y el audit trail inglés mantiene «fathers». Se conserva esa precisión en español, evitando una neutralización que borre el rasgo lexical documentado.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue el estado más reciente del auditable inglés POB sin cambios sustanciales reportados; se mantiene la coherencia con la decisión lexicográfica y teológica ya revisada y aprobada.
  spanish_consistency_notes:
  - 'Se conservó el paralelismo de dos imperativos: «Oigan» / «presten atención».'
  - Se evitó «SEÑOR» u otra convención de reemplazo porque el versículo no contiene el tetragrámaton ni una cita directa de κύριος.
  - «Padres» se mantuvo como reflejo preciso de אֲבֹתֵיכֶם, con nota alternativa para «antepasados».
  - La opción «la tierra» deja abierta la ambigüedad semántica de אֶרֶץ sin fijarla a un sentido cosmológico que el contexto inmediato no exige.
