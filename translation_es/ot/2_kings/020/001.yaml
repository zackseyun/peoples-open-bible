translation:
  language: es
  text: 'En aquellos días, Ezequías enfermó y estaba a punto de morir[a]. Y el profeta Isaías, hijo de Amós, vino a él y le dijo: «Así dice Yahvé: Pon en orden tu casa, porque morirás; no vivirás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «para morir»; la expresión hebrea también puede entenderse como «estás muriendo» o «estás muerto» en el sentido de una muerte segura e inminente.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En ese tiempo
  - Por aquellos días
  lexicon: HALOT
  rationale: La locución temporal hebrea introduce el marco narrativo de manera idiomática; «En aquellos días» conserva el tono bíblico sin sonar arcaica en español.
- source_word: חָלָה
  english_pob_choice: became sick
  chosen_spanish: enfermó
  alternatives_spanish:
  - cayó enfermo
  - se puso enfermo
  lexicon: HALOT
  rationale: El verbo expresa el inicio de la enfermedad. «Enfermó» conserva el valor ingresivo con naturalidad en español.
- source_word: לָמוּת
  english_pob_choice: was at the point of death
  chosen_spanish: de muerte
  alternatives_spanish:
  - hasta morir
  - a punto de morir
  lexicon: HALOT
  rationale: La construcción con חלה intensifica la enfermedad hacia la muerte segura e inminente. «De muerte» en español resume ese matiz con concisión; la nota textual aclara la fuerza idiomática.
- source_word: יְשַׁעְיָהוּ בֶן אָמוֹץ הַנָּבִיא
  english_pob_choice: Isaiah the prophet, the son of Amoz
  chosen_spanish: el profeta Isaías, hijo de Amós
  alternatives_spanish:
  - Isaías el profeta, hijo de Amós
  - Isaías, hijo de Amós, el profeta
  lexicon: HALOT
  rationale: Se mantiene el orden appositivo claro y natural en español, conservando tanto el nombre como la filiación y el título profético.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Así dice el Señor
  lexicon: HALOT
  rationale: La fórmula profética se vierte de forma directa y solemne. Se conserva el nombre divino con la terminología proyectual «Yahvé».
- source_word: צַו לְבֵיתֶךָ
  english_pob_choice: Set your house in order
  chosen_spanish: Pon en orden tu casa
  alternatives_spanish:
  - Arregla tu casa
  - Da instrucciones a tu casa
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude a poner en orden los asuntos y la casa antes de morir. «Pon en orden tu casa» reproduce el sentido con claridad.
- source_word: כִּי מֵת אַתָּה
  english_pob_choice: for you shall die
  chosen_spanish: porque morirás
  alternatives_spanish:
  - porque vas a morir
  - porque estás por morir
  lexicon: HALOT
  rationale: El hebreo expresa muerte segura e inminente. «Morirás» mantiene el anuncio directo y formal sin suavizar la advertencia.
- source_word: וְלֹא תִחְיֶה
  english_pob_choice: you shall not live
  chosen_spanish: no vivirás
  alternatives_spanish:
  - no seguirás viviendo
  - no recobrarás la vida
  lexicon: HALOT
  rationale: La negación hebrea clausura toda expectativa de continuidad vital. «No vivirás» es fiel y natural en español.
theological_decisions:
- issue: Rendering of the Tetragrammaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Nombre divino directamente. En la política del proyecto español, se traslada como «Yahvé» para preservar el nombre personal del pacto, no una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Force of the death announcement in כִּי מֵת אַתָּה וְלֹא תִחְיֶה
  english_pob_reading: you shall die; you shall not live
  chosen_spanish_reading: morirás; no vivirás
  alternative_spanish_readings:
  - estás muriendo; no vivirás
  - estás muerto; no vivirás
  rationale: Se conserva la tensión del hebreo entre la inminencia segura de la muerte y la negación de la vida futura. No se reduce a una mera posibilidad ni se vuelve a un presente ya consumado.
  doctrine_reference: 'Hebreo narrativo profético: anuncio cierto e inminente de juicio/muerte'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó el matiz de la enfermedad hacia una muerte inminente y reordenó la aposición «el profeta Isaías, hijo de Amós». La versión española refleja ese estado final del audit trail y conserva la misma tensión semántica del hebreo, con una nota para la alternativa más literal del anuncio de muerte.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, conforme al criterio proyectual en español.
  - Se mantiene «Isaías, hijo de Amós» con orden natural en español y sin perder la aposición profética.
  - «Enfermó de muerte» se eligió por concisión y registro bíblico; la nota preserva la alternativa literal del hebreo.
  - «No vivirás» conserva la negación enfática de continuidad vital sin introducir una paráfrasis interpretativa.
