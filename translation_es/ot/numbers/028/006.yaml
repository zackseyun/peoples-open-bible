- from: Es el holocausto regular[a], hecho en el monte Sinaí[b] como olor agradable[c], ofrenda encendida[d] a Yahvé.
  to: Es el holocausto regular[a], hecho en el monte Sinaí[b] como olor agradable[c], una ofrenda de alimento[d] a Yahvé.
