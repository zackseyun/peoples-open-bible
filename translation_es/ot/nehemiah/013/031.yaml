translation:
  language: es
  text: 'Y para la ofrenda de leña[a], en tiempos señalados, y para las primicias: acuérdate de mí, Dios mío, para bien.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ofrenda de madera». El hebreo se refiere al suministro programado de madera para uso del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֻרְבַּן
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - presentación
  - oblación
  lexicon: HALOT
  rationale: El sustantivo cultual expresa algo que se acerca o se presenta a Dios. «Ofrenda» es la equivalencia natural en español y conserva el marco sacrificial sin arcaísmo excesivo.
- source_word: הָעֵצִים
  english_pob_choice: wood
  chosen_spanish: la madera
  alternatives_spanish:
  - la leña
  - la madera del templo
  lexicon: HALOT
  rationale: El contexto se refiere al suministro programado de madera para uso del templo/altar. «La madera» mantiene la concisión del hebreo; la nota aclara el sentido cultual.
- source_word: בְּעִתִּים מְזֻמָּנוֹת
  english_pob_choice: at appointed times
  chosen_spanish: en tiempos señalados
  alternatives_spanish:
  - en tiempos fijados
  - en tiempos designados
  lexicon: HALOT
  rationale: La frase indica ocasiones establecidas o programadas. «Tiempos señalados» suena natural en español y preserva la idea de una calendarización formal.
- source_word: בִּכּוּרִים
  english_pob_choice: firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - primeros frutos
  lexicon: HALOT
  rationale: «Primicias» es el término bíblico usual en español para los primeros frutos ofrecidos a Dios y conserva mejor el valor cultual del término.
- source_word: זָכְרָה לִּי
  english_pob_choice: remember me
  chosen_spanish: acuérdate de mí
  alternatives_spanish:
  - recuerda me
  - ten presente a mí
  lexicon: HALOT
  rationale: La fórmula es una súplica recurrente de Nehemías para que Dios lo recuerde con favor. «Acuérdate de mí» comunica de forma directa la petición personal.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: Dios mío
  alternatives_spanish:
  - mi Dios
  lexicon: HALOT
  rationale: Ambas opciones son correctas; «Dios mío» resulta más natural e igualmente fiel en la invocación íntima.
- source_word: לְטוֹבָה
  english_pob_choice: for good
  chosen_spanish: para bien
  alternatives_spanish:
  - para tu bien
  - favorablemente
  lexicon: HALOT
  rationale: La expresión es breve e idiomática. «Para bien» conserva la reserva semántica del hebreo sin especificar en exceso si se trata de favor, beneficio o resultado bueno.
theological_decisions:
- issue: קֻרְבַּן הָעֵצִים como expresión cultual específica
  english_pob_reading: the offering of wood
  chosen_spanish_reading: la ofrenda de la madera
  alternative_spanish_readings:
  - la ofrenda de leña
  - la ofrenda de madera
  rationale: La frase no describe una donación genérica de material, sino una provisión litúrgica programada para el templo. «La ofrenda de la madera» conserva el orden y el carácter cultual del original, mientras la nota explica su función.
  doctrine_reference: Neh 13:31; cf. suministro de leña para el altar/templo.
- issue: לְטוֹבָה como petición deliberadamente abierta
  english_pob_reading: for good
  chosen_spanish_reading: para bien
  alternative_spanish_readings:
  - para mi bien
  - favorablemente
  rationale: El hebreo es intencionalmente breve y no especifica si el bien es aprobación moral, bendición o resultado beneficioso. «Para bien» preserva esa tensión y evita una paráfrasis más interpretativa.
  doctrine_reference: Mantener la reserva semántica del hebreo; cf. principio de no resolver tensiones textuales sin necesidad.
translation_notes:
  revision_awareness: 'Se revisó el pasaje y no se requirieron cambios respecto del sentido base: la redacción española mantiene el marco cultual, la referencia a tiempos programados, y la petición final abierta de Nehemías.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparece el Tetragrámaton; aquí el hebreo tiene אֱלֹהַי, por lo que se traduce «Dios mío».
  - Se prefirió «ofrenda» por consistencia con el léxico cultual de POB y «primicias» como término bíblico asentado en español.
  - «Para bien» conserva la brevedad e indefinición del hebreo לְטוֹבָה.
