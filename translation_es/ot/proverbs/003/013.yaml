translation:
  language: es
  text: Bienaventurado es el hombre[a] que halla sabiduría, y el hombre que obtiene entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la persona que halla sabiduría, y la persona que obtiene entendimiento». El hebreo usa «hombre» en sentido representativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Dichoso
  - Feliz
  lexicon: HALOT
  rationale: La forma plural hebrea funciona como bienaventuranza proverbial. «Bienaventurado» conserva el tono elevado y sapiencial mejor que «feliz», y encaja con el valor de estado favorecido que el inglés POB expresa con “Blessed is”.
- source_word: אָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - uno
  - ser humano
  lexicon: HALOT
  rationale: En el hebreo es un singular genérico y representativo. Se mantiene «el hombre» para respetar la forma masculina del original, tal como la POB inglesa conserva “the man”, evitando neutralizar sin base textual.
- source_word: מָצָא
  english_pob_choice: finds
  chosen_spanish: halla
  alternatives_spanish:
  - encuentra
  - ha encontrado
  - descubre
  lexicon: HALOT
  rationale: En estilo proverbial, el qatal expresa una verdad general. «Halla» suena natural en español bíblico contemporáneo y reproduce bien el matiz de descubrimiento/obtención de sabiduría.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sapiencia
  - prudencia
  lexicon: HALOT
  rationale: Es el equivalente estándar del término sapiencial hebreo y mantiene la red de sentidos del libro de Proverbios.
- source_word: יָפִיק
  english_pob_choice: obtains
  chosen_spanish: obtiene
  alternatives_spanish:
  - consigue
  - adquiere
  - saca
  lexicon: HALOT
  rationale: El verbo puede implicar sacar, producir o adquirir. Aquí «obtiene» comunica adquisición exitosa de manera clara y paralela a «halla».
- source_word: תְּבוּנָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - perspicacia
  - inteligencia
  lexicon: HALOT
  rationale: «Entendimiento» es el equivalente sapiencial natural en español y mantiene el paralelismo con «sabiduría» sin cargar un matiz más técnico de discernimiento.
theological_decisions:
- issue: Masculino genérico representativo en אָדָם
  english_pob_reading: Retain 'the man' in the main text as representative/generic masculine
  chosen_spanish_reading: Conservar «el hombre» en el texto principal como masculino genérico representativo
  alternative_spanish_readings:
  - la persona
  - uno que
  - quien
  rationale: El hebreo usa masculino singular representativo; la POB inglesa mantiene esa forma. En español, conservar «el hombre» respeta la referencia formal del original y no borra una tensión documentada por una neutralización automática.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; table of contested terms for אָדָם
translation_notes:
  revision_awareness: La POB inglesa no aplicó revisiones al texto de esta unidad; el borrador español sigue el mismo estado estable, conservando la bienaventuranza proverbial, el masculino representativo y el paralelismo de ambos miembros.
  spanish_consistency_notes:
  - Se mantuvo «sabiduría / entendimiento» como par sapiencial consistente.
  - Se evitó «SEÑOR» o terminología no pertinente; no hay Tetragrámaton ni Cristo/Mesías en este versículo.
  - La puntuación conserva el paralelismo hebreo con coma antes de la segunda cola.
  - El anclaje del pie de página en [a] coincide con la alternativa inclusiva preservada por la POB inglesa.
