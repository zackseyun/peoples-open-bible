  to: Beba, y olvide su pobreza, y no recuerde más su sufrimiento[a].
  rationale: Se reubica la nota al término correcto (עֲמָלוֹ) y se reemplaza ‘afán’ por ‘sufrimiento’ para reflejar mejor el contexto de alivio de la miseria, conservando en la nota la alternativa ‘trabajo’ que el hebreo también permite.
