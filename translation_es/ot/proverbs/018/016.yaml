translation:
  language: es
  text: El regalo de un hombre[a] le abre camino[b], y lo lleva[c] delante de grandes hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de una persona»; el hebreo «hombre» está en singular y aquí es genérico.
    reason: lexical_alternative
  - marker: b
    text: O «le da lugar» o «le hace espacio».
    reason: lexical_alternative
  - marker: c
    text: O «lo conduce»; también puede entenderse «y lo conduce delante de hombres importantes».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַתָּן
  english_pob_choice: gift
  chosen_spanish: regalo
  alternatives_spanish:
  - don
  - obsequio
  lexicon: HALOT
  rationale: מַתָּן denota un presente o dádiva. «Regalo» es la opción más natural en español actual y conserva el sentido proverbial de una ofrenda que produce efecto social.
- source_word: אָדָם
  english_pob_choice: man's
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de una persona
  - del hombre
  lexicon: HALOT
  rationale: אָדָם aparece en singular y con valor genérico-individual. «De un hombre» refleja esa forma singular sin borrar el matiz proverbial masculino del hebreo.
- source_word: יַרְחִיב לוֹ
  english_pob_choice: makes room for him
  chosen_spanish: le da lugar
  alternatives_spanish:
  - le abre camino
  - le hace espacio
  lexicon: HALOT
  rationale: El verbo causativo de רחב mantiene la imagen de ensanchar o hacer espacio. «Le da lugar» comunica bien en español el resultado de obtener acceso u अवसर sin volverlo excesivamente explicativo.
- source_word: וְלִפְנֵי גְדֹלִים
  english_pob_choice: before great men
  chosen_spanish: delante de grandes hombres
  alternatives_spanish:
  - ante hombres importantes
  - en presencia de los grandes
  lexicon: HALOT
  rationale: לִפְנֵי expresa posición delante de o en presencia de. «Delante de grandes hombres» conserva la referencia social y la pluralidad masculina del hebreo.
- source_word: יַנְחֶנּוּ
  english_pob_choice: brings him
  chosen_spanish: lo lleva
  alternatives_spanish:
  - lo guía
  - lo conduce
  lexicon: HALOT
  rationale: La Hiphil de נחה suele significar guiar o conducir. En este contexto, «lo lleva» comunica de manera idiomática el ser conducido a la presencia de personas prominentes.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota al texto español con los marcadores exactos [a] y [b]. La redacción mantiene el paralelismo y el sentido proverbial del hebreo, sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se preservó el valor proverbial y breve del verso.
  - «Grandes hombres» mantiene la referencia social sin imponer una lectura moralizante.
  - Se evitó «SEÑOR» u otros sustitutos no presentes en el hebreo.
  - La opción «regalo» sigue el campo semántico de מַתָּן con registro natural en español.
