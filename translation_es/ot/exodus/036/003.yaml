revisions:
- from: Y tomaron de delante de Moisés toda la ofrenda[a] que los hijos de Israel habían traído para la obra del servicio del santuario, para hacerla[b]. Y seguían trayéndole todavía ofrenda voluntaria[c] mañana tras mañana[d].
  to: Y tomaron de delante de Moisés toda la contribución[a] que los hijos de Israel habían traído para la obra del servicio del santuario, para hacerla[b]. Y seguían trayéndole todavía ofrendas voluntarias[c] mañana tras mañana[d].
  rationale: Se revisa ‘ofrenda’ a ‘contribución’ para ajustarse mejor al sentido de תְּרוּמָה en este contexto de materiales aportados para la obra del tabernáculo y al razonamiento documentado en el expediente POB. Se pluraliza ‘ofrendas voluntarias’ para expresar con más naturalidad en español la acción repetida indicada por el contexto y por ‘mañana tras mañana’. Las notas se actualizan para corresponder exactamente al texto revisado.
  reviewer_model: gpt-5.4
