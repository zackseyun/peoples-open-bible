  yaml_path: translation/ot/1_chronicles/020/001.yaml
  text: And it happened at the time of the turning of the year[a], at the time when kings go out, that Joab led out the army and devastated the land of the Ammonites, and he came and besieged Rabbah. But David stayed in Jerusalem. And Joab struck Rabbah and tore it down.
