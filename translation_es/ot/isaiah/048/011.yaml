  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y la auditoría inglesa: preserva la repetición enfática de לְמַעֲנִי, la falta de objeto explícito con יֵחָל, y la declaración final sobre la gloria de Dios. Sin embargo, ''porque'' después de punto y coma suena menos natural que ''pues'' o ''porque'' sin pausa fuerte en este registro, y la nota al pie está mal puntuada/formateada en español y enreda la cita con una comilla inicial innecesaria.'
  spanish_quality_summary: 'El texto es claro y digno, pero ''Por mi propia causa'' suena algo calcado; ''Por mí mismo'' es más idiomático, aunque la opción actual aún es comprensible. El ajuste principal necesario es estilístico y de puntuación: ''pues'' encaja mejor como conector explicativo tras la pausa, y la nota debe normalizarse. El resto del verso es legible y fiel.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'gloria' para כָּבוֹד y 'profanado' para יֵחָל están bien alineados. No aparece el nombre divino ni otros términos de glosario sensible.
  issues:
  - severity: medium
    issue: Conector 'porque' tras punto y coma en una pregunta retórica solemne
    rationale: Aunque semánticamente correcto para כִּי, en español bíblico moderno 'pues' suena más natural y elevado en esta posición explicativa sin sonar coloquial ni forzado.
  - severity: medium
    issue: Nota al pie con formato deficiente
    rationale: 'La nota comienza con una comilla simple innecesaria antes de O y mezcla comillas de forma poco natural. Debe quedar en español limpio: ''O: «¿cómo debería ser profanado mi nombre?». El hebreo deja implícito el objeto.'''
  - severity: low
    issue: '''Por mi propia causa'' es algo rígido'
    rationale: Es fiel, pero suena más literal que idiomático. 'Por mí mismo' o 'por mi propio bien' serían opciones más naturales; sin embargo, no es un error de sentido y puede mantenerse si se prefiere la cercanía formal.
  revised_spanish_text: Por mi propia causa[a], por mi propia causa, actuaré; pues ¿cómo podría ser profanado? Y mi gloria no la daré a otro.
  revised_footnotes:
  - marker: a
    text: 'O: «¿cómo debería ser profanado mi nombre?». El hebreo deja implícito el objeto.'
    reason: alternative_reading
  revision_rationale: 'Se hace una reparación menor de estilo y puntuación: ''pues'' refleja mejor el valor explicativo de כִּי en esta construcción retórica, y la nota se normaliza para español natural y correcto. Se conserva la ambigüedad deliberada del hebreo en ''¿cómo podría ser profanado?'' y el resto del texto permanece fiel al original y a la auditoría inglesa.'
