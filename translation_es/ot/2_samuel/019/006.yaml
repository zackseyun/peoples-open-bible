translation:
  language: es
  text: 'Entonces Joab entró en la casa del rey[a] y dijo: «Hoy has avergonzado a todos tus siervos, que hoy salvaron tu vida[b], y las vidas de tus hijos y de tus hijas, y las vidas de tus esposas y de tus concubinas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Probablemente 'la casa' se refiere a la residencia real o al palacio.
    reason: cultural_note
  - marker: b
    text: Hebreo 'vida' / 'vidas' (nephesh), aquí con el sentido de vida física preservada del peligro, no de 'alma'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא ... וַיֹּאמֶר
  english_pob_choice: Then Joab came ... and said
  chosen_spanish: Entonces Joab vino ... y dijo
  alternatives_spanish:
  - Luego Joab entró ... y dijo
  - Así que Joab llegó ... y dijo
  lexicon: WLC/HALOT
  rationale: La secuencia narrativa wayyiqtol se conserva en español con 'Entonces ... y dijo', que mantiene el avance de la acción sin forzar un calco pesado.
- source_word: הַבָּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el palacio
  - la residencia real
  lexicon: HALOT
  rationale: Se conserva el sustantivo literal 'casa', como en el texto fuente. En el contexto real puede aludir a la residencia del rey, pero 'la casa' preserva mejor la forma hebrea sin explicitar más de lo que el verso dice.
- source_word: הֹבַשְׁתָּ
  english_pob_choice: you have put to shame
  chosen_spanish: has avergonzado
  alternatives_spanish:
  - has puesto en vergüenza
  - has deshonrado
  lexicon: HALOT
  rationale: El causativo de בוש expresa causar vergüenza pública. 'Has avergonzado' transmite con naturalidad el valor causativo y el peso honor/vergüenza del contexto.
- source_word: פְּנֵי
  english_pob_choice: the faces of
  chosen_spanish: —
  alternatives_spanish:
  - los rostros de
  - las caras de
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'las faces de', la POB inglesa ya optó por no mantenerlo de forma explícita en la línea principal. En español tampoco se introduce, porque la expresión natural es 'avergonzar a todos tus siervos'.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus servidores reales
  lexicon: HALOT
  rationale: '''Siervos'' conserva el valor relacional de עבד en contexto cortesano. ''Servidores'' suena menos marcado; ''siervos'' mantiene mejor la fuerza social del término.'
- source_word: הַמְמַלְּטִים
  english_pob_choice: who today saved
  chosen_spanish: que hoy salvaron
  alternatives_spanish:
  - que hoy rescataron
  - que hoy libraron
  lexicon: HALOT
  rationale: El participio מלט apunta a librar o salvar de peligro. 'Salvaron' es idiomático en español y preserva el sentido de rescate de la muerte.
- source_word: נַפְשְׁךָ
  english_pob_choice: your life
  chosen_spanish: tu vida
  alternatives_spanish:
  - tu alma
  - tu ser
  lexicon: HALOT
  rationale: Aquí נפש refiere a la vida física preservada del peligro, no a 'alma'. 'Vida' evita una carga doctrinal ajena al contexto.
- source_word: נֶפֶשׁ בָּנֶיךָ ... וּבְנֹתֶיךָ ... נָשֶׁיךָ ... פִּלַגְשֶׁיךָ
  english_pob_choice: the lives of your sons and your daughters, and the lives of your wives and your concubines
  chosen_spanish: las vidas de tus hijos y de tus hijas, y las vidas de tus mujeres y de tus concubinas
  alternatives_spanish:
  - la vida de tus hijos...
  - las personas de tus hijos...
  lexicon: HALOT
  rationale: Se conserva la repetición de נֶפֶשׁ con 'vidas' para reflejar el paralelo retórico del hebreo. 'Tus mujeres' traduce נָשֶׁיךָ de forma literal y comprensible, sin suavizar la categoría social del texto.
- source_word: פִּלַגְשֶׁיךָ
  english_pob_choice: your concubines
  chosen_spanish: tus concubinas
  alternatives_spanish:
  - tus mujeres secundarias
  - tus compañeras secundarias
  lexicon: HALOT
  rationale: '''Concubinas'' es el término preciso y estándar para פילגש, y preserva la distinción social/sexual que el hebreo establece.'
theological_decisions:
- issue: Reproche de Joab con lenguaje de honor/vergüenza
  english_pob_reading: Today you have put to shame all your servants
  chosen_spanish_reading: Hoy has avergonzado a todos tus siervos
  alternative_spanish_readings:
  - Hoy has deshonrado a todos tus siervos
  - Hoy has puesto en vergüenza a todos tus siervos
  rationale: El verso formula una censura pública dentro de la lógica de honor y vergüenza. 'Avergonzado' comunica esa dimensión sin añadir interpretación moral ajena.
  doctrine_reference: Contexto narrativo-histórico; semántica de honor/vergüenza en literatura bíblica
- issue: נֶפֶשׁ como vida física preservada de la muerte
  english_pob_reading: who today saved your life, and the lives of your sons and your daughters, and the lives of your wives and your concubines
  chosen_spanish_reading: que hoy salvaron tu vida, y las vidas de tus hijos y de tus hijas, y las vidas de tus mujeres y de tus concubinas
  alternative_spanish_readings:
  - que hoy salvaron tu alma...
  - que hoy salvaron tu persona...
  rationale: Siguiendo la auditoría inglesa, נֶפֶשׁ se entiende aquí como vida física. 'Vida/vidas' evita introducir 'alma', que en español suele sonar teológicamente cargado y no corresponde al contexto inmediato.
  doctrine_reference: Semántica hebrea de נֶפֶשׁ; distinción vida física/‘alma’
- issue: Casa del rey como residencia real
  english_pob_reading: the house likely refers to the royal residence or palace
  chosen_spanish_reading: la casa del rey
  alternative_spanish_readings:
  - el palacio del rey
  - la residencia del rey
  rationale: La formulación mantiene la literalidad del hebreo y deja implícito el referente cortesano. No se expande a 'palacio' en el texto principal, aunque el contexto lo sugiera.
  doctrine_reference: Precisión histórica y literalidad controlada
translation_notes:
  revision_awareness: 'He seguido la lectura revisada del POB inglés: en el texto principal no se conserva una mención explícita de ''las faces de'', pero sí se mantiene la fuerza de la reprensión. También se preserva la repetición de ''vidas'' para reflejar el hebreo נֶפֶשׁ en su sentido de vida física.'
  spanish_consistency_notes:
  - '''Siervos'' se usa consistentemente para עֲבָדֶיךָ en un contexto cortesano.'
  - '''Vida/vidas'' se usa para נֶפֶשׁ cuando el contexto es preservación de la vida física.'
  - '''Concubinas'' se conserva como término técnico estable.'
  - '''Casa del rey'' mantiene la referencia concreta sin sobreexplicar ''palacio''.'
