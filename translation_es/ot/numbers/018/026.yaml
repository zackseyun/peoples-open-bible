  text: וְ/אֶל הַ/לְוִיִּ֣ם תְּדַבֵּר֮ וְ/אָמַרְתָּ֣ אֲלֵ/הֶם֒ כִּֽי תִ֠קְחוּ מֵ/אֵ֨ת בְּנֵֽי יִשְׂרָאֵ֜ל אֶת הַֽ/מַּעֲשֵׂ֗ר אֲשֶׁ֨ר נָתַ֧תִּי לָ/כֶ֛ם מֵ/אִתָּ֖/ם בְּ/נַחֲלַתְ/כֶ֑ם וַ/הֲרֵמֹתֶ֤ם מִמֶּ֨/נּוּ֙ תְּרוּמַ֣ת יְהוָ֔ה מַעֲשֵׂ֖ר מִן הַֽ/מַּעֲשֵֽׂר־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/018/026.yaml
  text: 'And to the Levites you shall speak and say to them: When you take from the sons of Israel the tithe that I have given you from them as your inheritance[a], then you shall offer up from it Yahweh’s contribution[c][b], a tithe of the tithe.'
  footnotes:
  - marker: a
    text: Or “the Israelites” or “the people of Israel.” The Hebrew reads “the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “the contribution for the LORD”; traditionally, “the heave offering of the LORD.”
    reason: lexical_alternative
  - marker: c
    text: Literally, “a tithe from the tithe,” that is, a tenth of the tithe received by the Levites.
    reason: lexical_alternative
