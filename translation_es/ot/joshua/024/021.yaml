translation:
  language: es
  text: 'Pero el pueblo dijo a Josué: «No, más bien serviremos a Yahvé».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  lexicon: HALOT
  rationale: El wayyiqtol de אמר introduce discurso directo de forma narrativa estándar; en español, «dijo» es la equivalencia natural y precisa.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: Aquí עָם se refiere a la comunidad de Israel reunida; «el pueblo» conserva mejor el sentido colectivo y covenantal que «la gente».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca al destinatario del habla; en español, «a» es la forma natural para introducir el interlocutor.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  lexicon: standard Spanish biblical name
  rationale: Nombre propio según la convención bíblica habitual en español.
- source_word: לֹא
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - ¡No!
  - De ninguna manera
  lexicon: HALOT
  rationale: Funciona como rechazo enfático de la propuesta anterior; «No» reproduce con sobriedad esa negación inicial.
- source_word: כִּי
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - más bien
  lexicon: HALOT
  rationale: Después de una negación, כִּי introduce una corrección adversativa. En español, «sino que» expresa con más exactitud y naturalidad la oposición/corrección que un simple «pero».
- source_word: אֶת יְהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: DOCTRINE.md contested terms
  rationale: El texto hebreo usa explícitamente el Nombre divino יְהוָה. Siguiendo la directriz del proyecto, se conserva «Yahvé» en el texto principal, en vez de ocultarlo con un sustituto devocional.
- source_word: נַעֲבֹד
  english_pob_choice: we will serve
  chosen_spanish: serviremos
  alternatives_spanish:
  - serviremos a
  - le serviremos
  - adoraremos
  lexicon: HALOT
  rationale: El verbo עבד en este contexto de alianza expresa servicio/lealtad obediente; «serviremos» mantiene la amplitud semántica sin reducirlo solo a «adorar».
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El paquete de fuente y la directriz del proyecto indican que el Tetragrámaton debe mantenerse visible y no reemplazarse por una convención de máscara. «Yahvé» es la forma española establecida para el Nombre pactal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of the people's reply after a negation
  english_pob_reading: No, but we will serve Yahweh.
  chosen_spanish_reading: No, sino que serviremos a Yahvé.
  alternative_spanish_readings:
  - No, pero serviremos a Yahvé.
  - No, más bien serviremos a Yahvé.
  rationale: El כִּי hebreo, tras לֹא, tiene fuerza correctiva/adversativa. «Sino que» preserva esa tensión mejor que una traducción neutra o meramente coordinante.
  doctrine_reference: HALOT on כִּי in corrective contexts; English revision history corrected the earlier 'for' to 'but'
translation_notes:
  revision_awareness: El registro inglés pasó de «for» a «but» para reflejar mejor el valor adversativo de כִּי después de la negación. En español, esa revisión se refleja con «sino que», que conserva la corrección enfática sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene el nombre divino visible como «Yahvé», coherente con la directriz del proyecto y con el texto hebreo.
  - Se opta por «serviremos» en lugar de «adoraremos» para no estrechar indebidamente el alcance de עבד.
  - 'La estructura española reproduce la negación seguida de corrección: «No, sino que…»; así se preserva el matiz discursivo del hebreo.'
