translation:
  language: es
  text: 'Solo con esta condición los hombres nos aceptarán[a], para habitar con nosotros y llegar a ser un solo pueblo: que todo varón entre nosotros sea circuncidado, así como ellos están circuncidados.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «consentirán con nosotros» o «estarán dispuestos hacia nosotros»; el verbo hebreo expresa acuerdo, consentimiento o disposición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solo con
  - Únicamente
  lexicon: HALOT
  rationale: אַךְ restringe la propuesta a una sola condición. 'Solo' reproduce bien ese valor limitativo en español sin añadir contraste no explicitado.
- source_word: בְּזֹאת
  english_pob_choice: on this condition
  chosen_spanish: con esta condición
  alternatives_spanish:
  - en esto
  - por esto
  lexicon: HALOT
  rationale: La preposición con demostrativo introduce la condición bajo la cual habrá acuerdo. 'Con esta condición' es natural en español y conserva el sentido condicional.
- source_word: יֵאֹתוּ
  english_pob_choice: will ... agree
  chosen_spanish: se pondrán de acuerdo
  alternatives_spanish:
  - consentirán
  - estarán dispuestos
  lexicon: HALOT
  rationale: El nifal de אוה expresa aceptación o consentimiento. 'Se pondrán de acuerdo' comunica la idea de consentimiento mutuo en un registro claro y bíblico.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - estos hombres
  - los varones
  lexicon: HALOT
  rationale: El sustantivo es masculino plural y alude a los varones de Siquem. 'Los hombres' conserva la referencia concreta sin forzar un tecnicismo.
- source_word: לָשֶׁבֶת אִתָּנוּ
  english_pob_choice: to dwell with us
  chosen_spanish: para habitar con nosotros
  alternatives_spanish:
  - para vivir con nosotros
  - para asentarse con nosotros
  lexicon: HALOT
  rationale: ישב en este contexto significa residir o establecerse. 'Habitar' mantiene un tono formal y fiel al verbo hebreo.
- source_word: לִהְיוֹת לְעַם אֶחָד
  english_pob_choice: to become one people
  chosen_spanish: llegar a ser un solo pueblo
  alternatives_spanish:
  - ser un solo pueblo
  - convertirse en un solo pueblo
  lexicon: HALOT
  rationale: El infinitivo de היה con לְעַם אֶחָד expresa el resultado de una nueva identidad colectiva. 'Llegar a ser' conserva ese valor resultativo mejor que un simple 'ser'.
- source_word: בְּהִמּוֹל
  english_pob_choice: that ... be circumcised
  chosen_spanish: que todo varón... sea circuncidado
  alternatives_spanish:
  - al ser circuncidado
  - por circuncidarse
  lexicon: HALOT
  rationale: El infinitivo constructo con ב marca la condición requerida. En español, una subordinada con 'que... sea circuncidado' expresa con claridad la estipulación sin perder la fuerza condicional.
- source_word: לָנוּ כָּל זָכָר
  english_pob_choice: every male among us
  chosen_spanish: todo varón entre nosotros
  alternatives_spanish:
  - todo varón de nosotros
  - cada varón de entre nosotros
  lexicon: HALOT
  rationale: El pronombre con el sustantivo indica pertenencia o inclusión dentro del grupo. 'Entre nosotros' refleja bien la referencia comunitaria y evita una redacción dura.
- source_word: כָּל זָכָר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - cada varón
  - todo macho
  lexicon: HALOT
  rationale: זָכָר designa al sexo masculino en sentido amplio. 'Varón' mantiene precisión léxica y resulta digno en español bíblico.
- source_word: כַּאֲשֶׁר הֵם נִמֹּלִים
  english_pob_choice: just as they are circumcised
  chosen_spanish: como ellos están circuncidados
  alternatives_spanish:
  - tal como ellos son circuncidados
  - así como ellos están circuncidados
  lexicon: HALOT
  rationale: La cláusula comparativa apela al estado/práctica de ellos como modelo. 'Están circuncidados' conserva la comparación y el matiz pasivo sin sobrecargar la frase.
translation_notes:
  revision_awareness: Se corrigió el anclaje de la nota al incorporar [a] en el verbo de la primera cláusula, conforme al texto inglés auditado y a la exigencia de que todo marcador de nota aparezca en la traducción.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como convención general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se evitó 'circuncidarse' como pasiva reflexiva para no diluir la estructura comparativa del hebreo; 'están circuncidados' preserva mejor el paralelismo.
  - '''Varón'' se eligió para זָכָר por precisión léxica y coherencia con el contexto de circuncisión.'
