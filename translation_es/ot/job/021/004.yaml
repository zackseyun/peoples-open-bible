translation:
  language: es
  text: En cuanto a mí, ¿es mi queja contra un hombre[a]? ¿Y por qué no habría de estar impaciente mi espíritu[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a un hombre» o «con un hombre»; la frase hebrea puede entenderse en varios sentidos relacionales, pero el contexto favorece una queja no dirigida a un oyente meramente humano.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por qué no habría de ser corto mi espíritu?»; es un modismo hebreo para la impaciencia o la agitación interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאָנֹכִי
  english_pob_choice: As for me
  chosen_spanish: En cuanto a mí
  alternatives_spanish:
  - Yo
  - Por mi parte
  lexicon: HALOT
  rationale: El pronombre independiente es enfático y contrastivo. «En cuanto a mí» comunica esa focalización en español de forma natural, sin perder la estructura interrogativa del hebreo.
- source_word: לְאָדָם
  english_pob_choice: against man
  chosen_spanish: contra el hombre
  alternatives_spanish:
  - al hombre
  - con el hombre
  - contra la humanidad
  lexicon: HALOT
  rationale: Con ל, el hebreo puede entenderse en sentidos relacionales distintos. En el contexto, la frase contrasta una queja dirigida a un ser humano frente a Dios; «contra el hombre» preserva esa fuerza relacional en español.
- source_word: שִׂיחִי
  english_pob_choice: my complaint
  chosen_spanish: mi queja
  alternatives_spanish:
  - mi meditación
  - mi discurso
  - mi preocupación
  lexicon: HALOT
  rationale: En el marco de lamentación de Job, שִׂיחַ se ajusta mejor a una queja que a una simple meditación o discurso. «Queja» transmite bien el tono del pasaje.
- source_word: מַדּוּעַ
  english_pob_choice: why
  chosen_spanish: por qué
  alternatives_spanish:
  - con qué motivo
  - para qué
  lexicon: HALOT
  rationale: Es el equivalente interrogativo natural en español y conserva la fuerza retórica de la pregunta.
- source_word: תִקְצַר רוּחִי
  english_pob_choice: should my spirit not be impatient
  chosen_spanish: no habría de ser impaciente mi espíritu
  alternatives_spanish:
  - no se acortaría mi espíritu
  - no habría de faltarme la paciencia
  lexicon: HALOT
  rationale: El hebreo usa el modismo «ser corto el espíritu», que expresa impaciencia o exasperación. Mantener «mi espíritu» conserva la imagen; «impaciente» da el sentido idiomático de forma comprensible en español.
theological_decisions:
- issue: Si la queja está dirigida al ser humano o a Dios implícitamente
  english_pob_reading: against man
  chosen_spanish_reading: contra el hombre
  alternative_spanish_readings:
  - al hombre
  - con el hombre
  rationale: La lectura del POB inglés subraya que Job niega que su queja esté dirigida simplemente a un oyente humano. El español «contra el hombre» conserva ese contraste sin suavizarlo.
  doctrine_reference: Contexto literario de Job 21:4; discurso de lamentación
- issue: Modismo hebreo de «espíritu corto»
  english_pob_reading: my spirit not be impatient
  chosen_spanish_reading: no habría de ser impaciente mi espíritu
  alternative_spanish_readings:
  - no se acortaría mi espíritu
  - no habría de faltarme la paciencia
  rationale: No se elimina la tensión del modismo hebreo; se conserva la imagen de «espíritu» y se explica mediante una equivalencia idiomática reconocible en español.
  doctrine_reference: Antropología bíblica en lenguaje poético; modismos hebreos
translation_notes:
  revision_awareness: 'Se evitó depender mecánicamente de la redacción inglesa. La versión española sigue el hebreo: pronombre enfático, relación con לְאָדָם, sustantivo verbal de lamento y el modismo de רוח קצר. No se añadieron notas al pie porque no era necesario anclar lecturas alternativas en el texto final.'
  spanish_consistency_notes:
  - Se usó «Dios»/«Yahvé» según corresponda en otros contextos, pero en este verso no aparece ninguna forma divina explícita.
  - Se mantuvo un registro bíblico claro y moderno, evitando calcos innecesarios.
  - «Espíritu» se conservó literalmente para reflejar la imagen hebrea, con «impaciente» como sentido idiomático.
