lexical_decisions:
- source_word: וַֽ/חֲזָאֵל
  english_pob_choice: Now Hazael
  chosen_spanish: Ahora Hazael
  alternatives_spanish:
  - Y Hazael
  - Entonces Hazael
  lexicon: HALOT
  rationale: La waw narrativa se vierte con una transición natural en español. «Ahora» mantiene el avance del relato sin forzar una repetición de «y» al inicio.
- source_word: מֶ֣לֶךְ אֲרָ֔ם
  english_pob_choice: king of Aram
  chosen_spanish: rey de Aram
  alternatives_spanish:
  - el rey de Aram
  - rey de Siria
  lexicon: HALOT
  rationale: Se conserva el nombre propio hebreo «Aram» en lugar de «Siria», siguiendo la primacía del texto מקור y la decisión auditada del POB en inglés.
- source_word: לָחַ֖ץ
  english_pob_choice: oppressed
  chosen_spanish: oprimió
  alternatives_spanish:
  - apremió
  - afligió
  - hostigó
  lexicon: HALOT
  rationale: El verbo expresa presión dura y sostenida; «oprimió» comunica bien la carga político-militar del contexto y preserva la fuerza del término.
- source_word: כֹּ֖ל יְמֵ֥י
  english_pob_choice: all the days of
  chosen_spanish: todos los días de
  alternatives_spanish:
  - durante todos los días de
  - a lo largo de todos los días de
  lexicon: HALOT
  rationale: La expresión idiomática se traduce de forma directa y natural en español, indicando la totalidad de la duración señalada por el hebreo.
- source_word: יְהוֹאָחָֽז
  english_pob_choice: Jehoahaz
  chosen_spanish: Joacaz
  alternatives_spanish:
  - Jehoacaz
  - Yeoacaz
  lexicon: HALOT
  rationale: Se usa la forma española tradicional del nombre bíblico, más reconocible y estable en español, sin alterar la identidad del referente.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés concuerdan plenamente; no se requerían revisiones textuales ni cambios de sentido. La única nota conserva la alternativa léxica histórica entre «Aram» y «Syria».
  spanish_consistency_notes:
  - Se mantuvo «Aram» para concordar con la política del POB de priorizar el nombre hebreo.
  - Se evitó «SEÑOR» u otras convenciones no pertinentes porque el versículo no contiene el Tetragrámaton.
  - La puntuación sigue el uso estándar del español bíblico moderno, con una sola oración breve y directa.
