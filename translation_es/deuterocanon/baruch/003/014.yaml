translation:
  language: es
  text: Aprende dónde está la prudencia, dónde está la fuerza, dónde está el entendimiento, para que sepas al mismo tiempo dónde están la largura de días[a] y la vida, dónde está la luz para los ojos[b] y la paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «larga vida» para «largura de días». El griego μακροβίωσις denota longevidad; el texto principal conserva el giro bíblico.
    reason: lexical_alternative
  - marker: b
    text: «La luz para los ojos» es una metáfora literal que puede sugerir vitalidad, alegría o claridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: μάθε
  english_pob_choice: Learn
  chosen_spanish: Aprende
  alternatives_spanish:
  - Conoce
  - Averigua
  lexicon: BDAG
  rationale: El imperativo aoristo de μανθάνω pide una exhortación a adquirir conocimiento. «Aprende» conserva con naturalidad esa fuerza exhortativa en español y evita reducirlo a simple descubrimiento.
- source_word: φρόνησις
  english_pob_choice: prudence
  chosen_spanish: prudencia
  alternatives_spanish:
  - sabiduría
  - buen juicio
  - discernimiento
  lexicon: BDAG
  rationale: «Prudencia» expresa bien la sabiduría práctica o el juicio sano que suele implicar φρόνησις, y además la distingue de σύνεσις más adelante.
- source_word: ἰσχύς
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - fortaleza
  lexicon: BDAG
  rationale: El término denota fuerza o vigor. «Fuerza» es la equivalencia más natural y sobria en este contexto sapiencial.
- source_word: σύνεσις
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - inteligencia
  - discernimiento
  - comprensión
  lexicon: BDAG
  rationale: σύνεσις apunta a comprensión o entendimiento. «Entendimiento» es claro en español moderno y conserva la distinción con «prudencia».
- source_word: τοῦ γνῶναι
  english_pob_choice: so that you may know
  chosen_spanish: para que sepas
  alternatives_spanish:
  - para conocer
  - a fin de que sepas
  lexicon: BDAG
  rationale: El infinitivo articular puede expresar finalidad. En español, una cláusula final con subjuntivo comunica mejor el sentido de aprender con el fin de saber.
- source_word: ἅμα
  english_pob_choice: at the same time
  chosen_spanish: al mismo tiempo
  alternatives_spanish:
  - juntamente
  - a la vez
  lexicon: BDAG
  rationale: «Al mismo tiempo» conserva la idea de conocimiento conjunto, no de elementos separados.
- source_word: μακροβίωσις
  english_pob_choice: length of days
  chosen_spanish: longitud de días
  alternatives_spanish:
  - larga vida
  - longevidad
  lexicon: LSJ
  rationale: La expresión mantiene el giro bíblico y respeta el sustantivo derivado del griego. «Longitud de días» preserva el paralelismo idiomático, aunque suene menos usual que «larga vida».
- source_word: ζωή
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  lexicon: BDAG
  rationale: Es el equivalente estándar y no requiere matiz adicional en este verso.
- source_word: φῶς ὀφθαλμῶν
  english_pob_choice: light for the eyes
  chosen_spanish: la luz para los ojos
  alternatives_spanish:
  - la luz de los ojos
  - la claridad para los ojos
  lexicon: BDAG
  rationale: La metáfora se mantiene de forma literal para no perder su fuerza imagética; en español «luz para los ojos» resulta comprensible y transparente.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - bienestar
  - shalom
  lexicon: BDAG
  rationale: «Paz» es la traducción normal y mantiene la resonancia bíblica. «Bienestar» explicita el efecto, pero debilita la forma lexical del texto.
theological_decisions:
- issue: Mantener distinguidos varios bienes sapienciales
  english_pob_reading: The verse keeps φρόνησις, ἰσχύς, and σύνεσις distinct as prudence, strength, and understanding.
  chosen_spanish_reading: Se conservaron como prudencia, fuerza y entendimiento.
  alternative_spanish_readings:
  - sabiduría, poder y comprensión
  - entendimiento, fortaleza y sabiduría
  rationale: El verso enumera bienes diferentes y no repite una sola idea. Mantener la distinción refleja mejor la teología sapiencial y el paralelo griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Conservar el giro idiomático de vida prolongada sin añadir sentido no presente
  english_pob_reading: Rendered as length of days and life.
  chosen_spanish_reading: Se tradujo como longitud de días y la vida.
  alternative_spanish_readings:
  - larga vida y vida
  - longevidad y vida
  rationale: El griego menciona explícitamente la duración de la vida y la vida misma. «Longitud de días» preserva el idioma bíblico sin introducir «prosperidad» u otro contenido ajeno.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: Se revisó el pasaje frente al texto griego de Swete y el audit trail inglés. No se detectaron cambios sustanciales en la última pasada; la decisión principal fue preservar las distinciones léxicas y la metáfora de «luz para los ojos» en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde al tetragrámaton; este versículo no lo contiene.
  - Se mantuvo un registro sobrio y bíblico, evitando parafrasear los sustantivos sapienciales.
  - Se prefirió «entendimiento» frente a «comprensión» para armonizar con la distinción entre φρόνησις y σύνεσις.
  - Se conservó la metáfora corporal «luz para los ojos» en lugar de interpretarla como mero bienestar.
