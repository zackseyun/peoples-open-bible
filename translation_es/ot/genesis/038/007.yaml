revisions:
- from: Ahora Er[a], el primogénito de Judá, era malo a los ojos de Yahvé, y Yahvé lo hizo morir.
  to: Er[a], el primogénito de Judá, era malvado a los ojos de Yahvé, y Yahvé lo hizo morir.
  rationale: Se ajusta el inicio para un español narrativo más natural, se fortalece רַע con «malvado» por el contexto de juicio moral, y se corrige la nota al pie para que conserve una alternativa léxica real y útil en español. Se mantiene «Yahvé» conforme al proyecto y «lo hizo morir» como buena representación idiomática del hiphil causativo.
