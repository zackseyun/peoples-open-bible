  to: 'Entonces los hijos de José le hablaron a Josué, diciendo: «¿Por qué me has dado un solo lote y una sola porción[a] como herencia, aunque soy un pueblo numeroso, ya que Yahvé me ha bendecido hasta ahora?»'
