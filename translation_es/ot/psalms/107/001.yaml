revisions:
- from: Den gracias a Yahvé[a], porque es bueno[b], porque para siempre es su amor fiel.
  to: Den gracias a Yahvé, porque es bueno, porque su amor fiel[a] permanece para siempre.
  rationale: Se eliminó la nota innecesaria sobre «Yahvé», se reubicó la nota al término teológicamente cargado חֶסֶד, y se reformuló la cláusula final con «permanece para siempre» para reflejar con español natural el sentido durativo que el hebreo afirma y que el English POB explicitó.
  reviewer_model: gpt-5.4
