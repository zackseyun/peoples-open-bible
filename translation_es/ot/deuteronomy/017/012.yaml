base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/017/012.yaml
  text: But the man who acts presumptuously by not listening to the priest who stands there to minister before Yahweh your God[a], or to the judge—that man shall die[c][b]. So you shall purge the evil from Israel.
  footnotes:
  - marker: a
    text: Hebrew 'acts in presumptuousness'; also 'acts arrogantly' or 'acts willfully.' The phrase denotes deliberate, defiant refusal rather than accidental failure.
    reason: lexical_alternative
  - marker: b
    text: Or 'by not obeying.' Hebrew 'not listening' often carries the sense of refusing to heed or obey in legal contexts.
    reason: lexical_alternative
  - marker: c
    text: '''the LORD'' renders the divine name YHWH; alternatively transliterated ''Yahweh.'''
    reason: alternative_reading
