id: NUM.4.19
reference: Numbers 4:19
source:
  edition: WLC
  text: וְ/זֹ֣את עֲשׂ֣וּ לָ/הֶ֗ם וְ/חָיוּ֙ וְ/לֹ֣א יָמֻ֔תוּ בְּ/גִשְׁתָּ֖/ם אֶת קֹ֣דֶשׁ הַ/קֳּדָשִׁ֑ים אַהֲרֹ֤ן וּ/בָנָי/ו֙ יָבֹ֔אוּ וְ/שָׂמ֣וּ אוֹתָ֗/ם אִ֥ישׁ אִ֛ישׁ עַל עֲבֹדָת֖/וֹ וְ/אֶל מַשָּׂאֽ/וֹ׀־־־׃
translation:
  text: 'But do this for them[b][a], so that they may live and not die when they come near the most holy things: Aaron and his sons shall come and assign each man to his service and to his load.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Holy of Holies' / 'the most holy place.' Here the phrase likely refers to the holiest sacred objects rather than the inner sanctuary itself, given the context of carrying duties.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'man by man,' a distributive expression meaning each individual was assigned his own service and load.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֹאת
  chosen: But do this
  alternatives:
  - And this do
  - Now this do
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a contrastive/instructional transition from the prior warning. 'But do this' is natural English and preserves the directive force.
- source_word: עֲשׂוּ לָהֶם
  chosen: do this for them
  alternatives:
  - do this to them
  - deal thus with them
  lexicon: HALOT
  rationale: The verb עשה with ל marks action done on behalf of the Kohathites in context; 'for them' best captures the benefactive sense.
- source_word: וְחָיוּ וְלֹא יָמֻתוּ
  chosen: so that they may live and not die
  alternatives:
  - and they shall live and not die
  - that they may live and not die
  lexicon: HALOT
  rationale: The sequence expresses intended result of the commanded action. English idiom is clearer with 'so that they may live and not die' rather than a bare coordinate future.
- source_word: בְּגִשְׁתָּם
  chosen: when they come near
  alternatives:
  - in their approaching
  - when they approach
  lexicon: HALOT
  rationale: The infinitive construct with preposition ב conveys temporal circumstance here. 'Come near' preserves the cultic approach nuance of נגשׁ.
- source_word: אֶת קֹדֶשׁ הַקֳּדָשִׁים
  chosen: the most holy things
  alternatives:
  - the holy of holies
  - the most holy place
  lexicon: HALOT
  rationale: In this context the phrase refers to the holiest sacred objects handled by the Kohathites, not strictly the inner sanctuary as a location. 'The most holy things' fits the immediate context of assigning service and loads for transport.
- source_word: אַהֲרֹן וּבָנָיו
  chosen: Aaron and his sons
  alternatives:
  - Aaron and his descendants
  lexicon: HALOT
  rationale: Literal familial language is retained; in priestly context this refers to Aaron and his priestly sons.
- source_word: יָבֹאוּ
  chosen: shall come
  alternatives:
  - must come
  - are to come
  lexicon: HALOT
  rationale: Imperfect here carries directive/future force in legal instruction. 'Shall come' preserves the formal prescriptive sense.
- source_word: וְשָׂמוּ אוֹתָם
  chosen: and assign each man
  alternatives:
  - and set them
  - and appoint them
  lexicon: HALOT
  rationale: The idiom 'set them, each man...' means to place/appoint each individual in his specific role. 'Assign' communicates the administrative action clearly in English.
- source_word: אִישׁ אִישׁ
  chosen: each man
  alternatives:
  - man by man
  - each one
  lexicon: HALOT
  rationale: The distributive repetition indicates individual assignment. Per translation philosophy, the masculine form is retained as gender-accurate to the male Levitical context.
- source_word: עַל עֲבֹדָתוֹ
  chosen: to his service
  alternatives:
  - over his task
  - for his work
  lexicon: HALOT
  rationale: In priestly/Levitical context עֲבֹדָה denotes assigned service or duty. 'To his service' fits the assignment sense after 'assign each man.'
- source_word: וְאֶל מַשָּׂאוֹ
  chosen: and to his load
  alternatives:
  - and to his burden
  - and to what he must carry
  lexicon: HALOT
  rationale: מַשָּׂא in this transport context refers to the object/load to be carried. 'Load' is clear modern English without losing the concrete sense.
