translation:
  language: es
  text: Tienen orejas, pero no oyen; tienen narices, pero no huelen.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אָזְנַיִם
  english_pob_choice: ears
  chosen_spanish: orejas
  alternatives_spanish:
  - oídos
  lexicon: HALOT
  rationale: El hebreo nombra el órgano físico de la audición. En español, «orejas» mantiene el paralelismo corporal directo con «narices» y conserva el tono polémico contra los ídolos. «Oídos» también es posible, pero suena menos concreto como parte del cuerpo en esta serie.
- source_word: לָהֶם
  english_pob_choice: they have
  chosen_spanish: tienen
  alternatives_spanish:
  - les pertenecen
  - para ellos
  lexicon: HALOT
  rationale: La preposición con sufijo expresa posesión en una construcción sin verbo explícito. «Tienen» comunica naturalmente esa relación posesiva en español sin perder el sentido del hebreo.
- source_word: יִשְׁמָעוּ
  english_pob_choice: hear
  chosen_spanish: oyen
  alternatives_spanish:
  - escuchan
  lexicon: HALOT
  rationale: El verbo apunta aquí a la capacidad de oír, no a «obedecer». «Oyen» es la opción más directa y natural para el contraste físico del versículo.
- source_word: אַף
  english_pob_choice: noses
  chosen_spanish: narices
  alternatives_spanish:
  - nariz
  lexicon: HALOT
  rationale: Aunque el hebreo puede funcionar de manera colectiva, el español idiomático fluye mejor con el plural en paralelo a «orejas». Se conserva el referente corporal literal del texto.
- source_word: יְרִיחוּן
  english_pob_choice: smell
  chosen_spanish: huelen
  alternatives_spanish:
  - perciben olores
  lexicon: HALOT
  rationale: La forma verbal expresa oler / percibir olor. «Huelen» reproduce el paralelismo breve y claro de la línea hebrea sin añadir explicación interpretativa.
- source_word: וְלֹא
  english_pob_choice: but do not
  chosen_spanish: pero no
  alternatives_spanish:
  - y no
  lexicon: HALOT
  rationale: 'Aunque la conexión formal es «y no», en español el contraste irónico queda mejor con «pero no», que refleja la oposición retórica del hebreo: poseen órganos, pero carecen de función.'
theological_decisions:
- issue: Descripción antropomórfica de los ídolos
  english_pob_reading: A literal description of idols having sensory organs without sensory ability
  chosen_spanish_reading: Una descripción literal de ídolos con órganos sensoriales, pero sin capacidad real para usarlos
  alternative_spanish_readings:
  - Una formulación más interpretativa sobre la impotencia espiritual de los ídolos
  rationale: El hebreo usa imágenes corporales concretas para la burla antiidolátrica. La traducción española conserva esa literalidad para no diluir la fuerza retórica ni resolver la tensión del texto con una paráfrasis espiritualizante.
  doctrine_reference: Principio de primacía del texto fuente; mantener la tensión teológica sin explicarla en el cuerpo del versículo.
translation_notes:
  revision_awareness: El contexto inglés auditado no presenta notas, variantes textuales ni revisiones relevantes; la traducción española sigue de cerca la imagen corporal y el contraste adversativo del original hebreo, con ajustes mínimos de naturalidad idiomática.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - Se preserva el paralelismo corporal literal entre orejas / narices y oír / oler.
  - Se usa «pero no» para reflejar la oposición retórica del hebreo de manera natural en español.
