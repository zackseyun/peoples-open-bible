    reason: lexical_alternative
  - marker: b
    text: La tradición semítica paralela para esta escena es más amplia y desarrolla el episodio de la aplicación de la hiel a los ojos del padre; aquí se sigue el texto griego breve para el cuerpo principal.
    reason: alternative_reading
  revision_rationale: Se mantiene la traducción general, pero se corrige la última cláusula para evitar la redundancia de «los siguió detrás de ellos». «El perro iba detrás de ellos» preserva mejor el sentido narrativo de acompañamiento con posición posterior y suena natural en español.
