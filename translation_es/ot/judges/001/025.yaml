review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del hebreo: el hombre les mostró la entrada, ellos hirieron/tomaron la ciudad, y dejaron ir al hombre con toda su familia. Sin embargo, hay un desajuste importante en la colocación de las notas: la nota sobre el modismo hebreo לְפִי חָרֶב debe anclarse en la frase de la espada, no en «la entrada de la ciudad», mientras que la nota sobre «familia/casa/clan» debe anclarse en «familia», no en la espada. Además, «atacaron» debilita un poco el valor de וַיַּכּוּ, que en combinación con el modismo siguiente se expresa mejor como «hirieron» o «golpearon» en español bíblico natural.'
  spanish_quality_summary: El español es claro y legible, con tono moderno y digno. No obstante, «con filo de espada» suena algo incompleto; «a filo de espada» es una locución más idiomática, o bien «con el filo de la espada». Para conservar mejor la estructura del original y la decisión inglesa auditada, conviene usar «hirieron la ciudad a filo de espada».
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. Las decisiones léxicas principales son adecuadas salvo que «atacaron» no preserva tan bien como «hirieron» la combinación deliberada de וַיַּכּוּ + לְפִי חָרֶב. «Familia» sigue siendo una buena opción principal, con nota para «casa» o «clan».
  issues:
  - severity: high
    issue: Las notas al pie están intercambiadas de lugar
    rationale: La nota a explica el modismo «boca de la espada / filo de la espada», pero está anclada en «la entrada de la ciudad». La nota b trata de «familia / casa / clan», pero está anclada en la frase de la espada. Esto desinforma al lector y no sigue la disciplina de anclaje requerida.
  - severity: medium
    issue: «Atacaron» debilita el valor de וַיַּכּוּ
    rationale: El inglés auditado preserva «struck» para no absorber el modismo de la espada en el verbo. En español, «hirieron» conserva mejor ese reparto semántico que «atacaron».
  - severity: low
    issue: «con filo de espada» suena menos natural que alternativas disponibles
    rationale: La expresión española más estable es «a filo de espada» o «con el filo de la espada». La redacción actual es comprensible, pero ligeramente áspera.
  revised_spanish_text: Así les mostró la entrada de la ciudad, y hirieron la ciudad a filo de espada[a]; pero dejaron ir al hombre y a toda su familia[b].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «con la boca de la espada», un modismo que significa «con el filo de la espada».'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «a toda su casa» o «a todo su clan».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de las notas para que correspondan a las palabras correctas del texto, se ajusta «atacaron» a «hirieron» para reflejar mejor וַיַּכּוּ sin absorber el modismo siguiente, y se mejora la naturalidad de לְפִי חָרֶב con la locución española «a filo de espada».
