id: PSA.105.41
reference: Psalms 105:41
source:
  edition: WLC
  text: פָּ֣תַח צ֭וּר וַ/יָּז֣וּבוּ מָ֑יִם הָ֝לְכ֗וּ בַּ/צִּיּ֥וֹת נָהָֽר׃
translation:
  text: He opened the rock[a], and water gushed out; they flowed through the dry places like a river.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it flowed in the dry places, a river.' The Hebrew can be read more literally without the explicit 'like,' but the comparison is likely the sense in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּתַח
  chosen: opened
  alternatives:
  - split open
  - broke open
  lexicon: HALOT
  rationale: The verb plainly means 'open.' In context of a rock yielding water, English could specify 'split open,' but the Hebrew does not require that stronger image. 'Opened' preserves the source wording while remaining natural.
- source_word: צוּר
  chosen: the rock
  alternatives:
  - a rock
  - crag
  lexicon: HALOT
  rationale: With no article in Hebrew, the noun can still be definite in context, referring to the known wilderness rock episode. 'The rock' best reflects that contextual definiteness and the likely allusion to Israel's remembered provision.
- source_word: וַיָּזֻבוּ
  chosen: gushed out
  alternatives:
  - flowed out
  - poured out
  lexicon: HALOT
  rationale: The verb conveys flowing or issuing forth. 'Gushed out' captures the sudden, abundant emergence of water from the rock better than the flatter 'flowed out.'
- source_word: מָיִם
  chosen: water
  lexicon: HALOT
  rationale: Standard rendering of the plural-form mass noun in English singular.
- source_word: הָלְכוּ
  chosen: it flowed
  alternatives:
  - they went
  - they flowed
  lexicon: HALOT
  rationale: Literally 'they went,' with the subject being the waters. English idiom prefers singular mass-noun agreement, 'it flowed,' referring to the water collectively. This is an optimal-equivalence adjustment for readability.
- source_word: בַּצִּיּוֹת
  chosen: through the dry places
  alternatives:
  - in the dry places
  - through the deserts
  - in the parched regions
  lexicon: HALOT
  rationale: The noun refers to dry or parched places. 'Through the dry places' fits the image of water moving across arid terrain and avoids over-specifying as 'deserts' where the Hebrew is broader.
- source_word: נָהָר
  chosen: like a river
  alternatives:
  - a river
  lexicon: HALOT
  rationale: 'The final noun is appositional/predicative, describing the manner of the water''s movement. English idiom is clearer with an explicit comparison: ''like a river.'' This preserves the poetic force without implying a separate river subject.'
