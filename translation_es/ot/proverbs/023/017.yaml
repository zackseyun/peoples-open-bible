review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido básico del hebreo: prohibición de envidiar a los pecadores y contraste con vivir en el temor de Yahvé todo el día. También preserva correctamente «corazón», «pecadores», «temor de Yahvé» y el nombre divino «Yahvé». Sin embargo, la sintaxis española de la primera cláusula no es fiel ni natural: «No envidies tu corazón a los pecadores» hace que «tu corazón» funcione incorrectamente como objeto directo del verbo, cuando en hebreo לִבְּךָ es el sujeto interno de la prohibición (‘no tenga envidia tu corazón’ / ‘no dejes que tu corazón envidie’).'
  spanish_quality_summary: La legibilidad falla en la primera cláusula por una construcción antinatural en español. La nota al pie ya refleja una formulación mucho más correcta. La segunda cláusula, «sino mantente en el temor de Yahvé todo el día», es aceptable y natural, aunque algo más interpretativa que un más literal «sino que esté en el temor de Yahvé». En conjunto, el texto necesita una reparación menor para sonar idiomático y preservar la relación sintáctica del original.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Yahvé» para יהוה, «temor» para יִרְאָה, «pecadores» para חַטָּאִים, y conservación de «corazón». No hay conflicto terminológico mayor. La única corrección necesaria es gramatical/sintáctica, no glosarial.'
  issues:
  - severity: high
    issue: Construcción española incorrecta en «No envidies tu corazón[a] a los pecadores».
    rationale: En español esto significa que el hablante manda ‘envidiar tu corazón’, lo cual no corresponde al hebreo. El sujeto conceptual es «tu corazón», no el objeto. Debe reformularse como «No dejes que tu corazón envidie a los pecadores» o equivalente.
  - severity: medium
    issue: Desajuste entre texto principal y nota al pie.
    rationale: La nota ofrece una alternativa mucho más fiel («No tenga envidia tu corazón...»), lo que evidencia que el texto principal quedó mal construido. Conviene armonizar el principal con una redacción natural y dejar la nota como alternativa más literal.
  revised_spanish_text: No dejes que tu corazón envidie a los pecadores[a], sino mantente en el temor de Yahvé todo el día.
  revised_footnotes:
  - marker: a
    text: 'O: «No tenga envidia tu corazón de los pecadores, sino permanezca en el temor de Yahvé todo el día».'
    reason: lexical_alternative
  revision_rationale: Se corrige la primera cláusula para que «tu corazón» exprese correctamente el sujeto interno de la prohibición, en consonancia con el hebreo, y para producir un español natural y claro. Se conserva la segunda cláusula porque es fiel, inteligible y compatible con la decisión teológica documentada de expresar la elipsis con una exhortación explícita. La nota al pie se mantiene como alternativa más cercana a la estructura del original.
