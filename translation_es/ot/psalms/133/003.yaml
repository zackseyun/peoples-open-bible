translation:
  language: es
  text: como el rocío de Hermón[a], que desciende sobre los montes de Sion. Porque allí Yahvé mandó la bendición[b], vida para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'que cae sobre los montes de Sion.'
    reason: lexical_alternative
  - marker: b
    text: O 'vida por siempre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/טַל
  english_pob_choice: like the dew
  chosen_spanish: como el rocío
  alternatives_spanish:
  - cual el rocío
  - como el de rocío
  lexicon: HALOT
  rationale: כְּ marca comparación, y טַל significa 'rocío'. 'Como el rocío' es la equivalencia natural en español y conserva la imagen poética sin perder la comparación.
- source_word: חֶרְמוֹן
  english_pob_choice: Hermon
  chosen_spanish: Hermón
  alternatives_spanish:
  - Hermon
  lexicon: HALOT
  rationale: Es nombre propio geográfico; en español bíblico se adapta normalmente a 'Hermón' con acento gráfico para la pronunciación natural.
- source_word: שֶׁ/יֹּרֵד
  english_pob_choice: which falls
  chosen_spanish: que desciende
  alternatives_spanish:
  - que cae
  - que baja
  lexicon: HALOT
  rationale: ירד expresa 'descender/bajar'. 'Desciende' respeta mejor el movimiento vertical del hebreo que una opción más idiomática como 'cae', y encaja con el participio relativo.
- source_word: עַל הַרְרֵי צִיּוֹן
  english_pob_choice: on the mountains of Zion
  chosen_spanish: sobre los montes de Sion
  alternatives_spanish:
  - sobre las montañas de Sion
  - en los montes de Sion
  lexicon: HALOT
  rationale: הַרְרֵי es plural constructo, literalmente 'montes/montañas de'. 'Montes de Sion' conserva la pluralidad y suena natural en español bíblico.
- source_word: כִּי שָׁם
  english_pob_choice: For there
  chosen_spanish: Porque allí
  alternatives_spanish:
  - Pues allí
  - Porque en ese lugar
  lexicon: HALOT
  rationale: כִּי aquí introduce la razón del cuadro poético. 'Porque allí' mantiene la relación causal y deja abierto el referente de 'allí', como en el hebreo.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - decretó
  - dispuso
  lexicon: HALOT
  rationale: צִוָּה suele significar 'mandar/ordenar'. 'Mandó' conserva la fuerza verbal directa y es más natural que 'decretó' o 'dispuso' en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Según la convención del proyecto, el Tetragrámaton se vierte como 'Yahvé' en el texto principal para preservar el nombre divino.
- source_word: אֶת הַ/בְּרָכָה
  english_pob_choice: the blessing
  chosen_spanish: la bendición
  alternatives_spanish:
  - la bendición misma
  lexicon: HALOT
  rationale: El artículo definido y el objeto directo se traducen de forma simple como 'la bendición'. 'Bendición' es la equivalencia natural en español para ברכה en este contexto.
- source_word: חַיִּים עַד הָ/עוֹלָם
  english_pob_choice: life forever
  chosen_spanish: vida para siempre
  alternatives_spanish:
  - vida para siempre jamás
  - vida eterna
  lexicon: HALOT
  rationale: La frase funciona como aposición que especifica qué es la bendición. 'Vida para siempre' preserva el sentido durativo de עַד הָעוֹלָם sin introducir una formulación doctrinal más cargada como 'vida eterna'.
theological_decisions:
- issue: Valor de la frase final como aposición
  english_pob_reading: Treat 'life forever' as appositional, specifying what the blessing is.
  chosen_spanish_reading: Tratar 'vida para siempre' como aposición que especifica en qué consiste la bendición.
  alternative_spanish_readings:
  - 'Tomarla como una cláusula separada: ''y vida para siempre'''
  - Entenderla como exclamación independiente
  rationale: 'La secuencia hebrea admite naturalmente una lectura breve en aposición: ''la bendición, vida para siempre''. El español puede reproducir esa relación sin añadir conectores que suavicen la compacta formulación poética.'
  doctrine_reference: Preservar la tensión y la concisión poética del original; equivalencia óptima.
- issue: Referencia de 'allí'
  english_pob_reading: Leave 'there' untranslated beyond its adverbial force, allowing the poetic reference to Zion/the place of covenant unity to stand.
  chosen_spanish_reading: Dejar 'allí' con su fuerza adverbial, sin explicitar en el texto principal el referente.
  alternative_spanish_readings:
  - '''en Sion'''
  - '''entre los hermanos'''
  - '''en ese lugar'''
  rationale: El hebreo dice solo 'allí'. Explicitar el lugar o su significado teológico en el cuerpo principal iría más allá del texto. La traducción conserva la ambigüedad poética.
  doctrine_reference: Primacía del texto original; preservar la tensión interpretativa.
translation_notes:
  revision_awareness: 'El inglés auditado fue revisado para mantener la lectura appositiva final y una puntuación más natural: ''life forever'' quedó unido a ''the blessing'' con coma, no con dos puntos. La versión española sigue esa misma decisión y conserva la simetría poética del hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - '''Montes de Sion'' preserva el plural constructo del hebreo, evitando singularizarlo.'
  - '''Vida para siempre'' evita introducir ''vida eterna'' como término doctrinal más técnico donde el hebreo solo ofrece una expresión durativa.'
  - La nota a ofrece una alternativa verbal que refleja el valor de ירד sin alterar el texto principal.
