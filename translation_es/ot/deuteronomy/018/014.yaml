translation:
  language: es
  text: Porque estas naciones[a], que tú vas a desposeer, escuchan a los agoreros[b] y a los adivinos; pero en cuanto a ti[c], Yahvé tu Dios no te ha permitido hacer esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que tú vas expulsando» o «que tú vas tomando posesión de»; el verbo hebreo puede incluir tanto la toma de posesión como el despojo de los habitantes previos.
    reason: lexical_alternative
  - marker: b
    text: «Agoreros» traduce un término para practicantes de lectura de presagios o augurios.
    reason: cultural_note
  - marker: c
    text: 'Hebreo literalmente: «pero tú, no así te ha dado Yahvé tu Dios»; el objeto («esto», es decir, tales prácticas) queda implícito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento de la prohibición anterior; «Porque» mantiene el valor causal/explanatorio sin forzar una relación más fuerte de la que el hebreo exige.
- source_word: הַגּוֹיִם הָאֵלֶּה
  english_pob_choice: these nations
  chosen_spanish: estas naciones
  alternatives_spanish:
  - estos pueblos
  - estas naciones paganas
  lexicon: HALOT
  rationale: גּוֹיִם aquí designa a los pueblos no israelitas del entorno; «naciones» es natural en español y conserva el alcance colectivo.
- source_word: אֲשֶׁר אַתָּה יוֹרֵשׁ אֹתָם
  english_pob_choice: which you are dispossessing
  chosen_spanish: que tú vas a desposeer
  alternatives_spanish:
  - que estás desposeyendo
  - que estás expulsando
  - que vas a tomar posesión de
  lexicon: HALOT
  rationale: ירשׁ en Deuteronomio puede abarcar tomar posesión desplazando a los habitantes previos. «Desposeer» retiene esa fuerza sin reducirla a una sola imagen.
- source_word: אֶל מְעֹנְנִים
  english_pob_choice: to soothsayers
  chosen_spanish: a los adivinos
  alternatives_spanish:
  - a los agoreros
  - a los augures
  - a los soothsayers
  lexicon: HALOT
  rationale: El término apunta a practicantes de lectura de presagios/omens. «Adivinos» es comprensible en español y cubre el campo semántico sin sobreespecificar el método.
- source_word: וְאֶל קֹסְמִים
  english_pob_choice: and diviners
  chosen_spanish: y a los hechiceros
  alternatives_spanish:
  - y a los adivinos
  - y a los encantadores
  - y a los adivinos de presagios
  lexicon: HALOT
  rationale: קֹסְמִים se refiere a quienes practican adivinación. Se opta por «hechiceros» para diferenciarlo de מְעֹנְנִים en español, aunque la etiqueta es más amplia; se deja la alternativa «adivinos» por si se prefiere una correspondencia más directa y menos colorida.
- source_word: יִשְׁמָעוּ
  english_pob_choice: listen to
  chosen_spanish: escuchan a
  alternatives_spanish:
  - atienden a
  - hacen caso a
  - consultan a
  lexicon: HALOT
  rationale: שׁמע conserva el núcleo de oír/escuchar; en este contexto implica prestar atención o consultar. «Escuchan a» reproduce esa base verbal y mantiene la estructura simple del hebreo.
- source_word: וְאַתָּה לֹא כֵן
  english_pob_choice: but as for you, ... not
  chosen_spanish: pero a ti
  alternatives_spanish:
  - pero tú no
  - pero en cuanto a ti, no
  - pero tú, no así
  lexicon: HALOT
  rationale: 'El hebreo es elíptico: «pero tú, no así». El español necesita completar la contraposición; «pero a ti» abre la cláusula siguiente sin sobreexplicar y conserva la tensión textual.'
- source_word: נָתַן לְךָ יְהוָה אֱלֹהֶיךָ
  english_pob_choice: the LORD your God has not allowed you to do this
  chosen_spanish: Yahvé tu Dios no te ha permitido hacer así
  alternatives_spanish:
  - Yahvé tu Dios no te ha dado esto
  - Yahvé tu Dios no te ha permitido esto
  - Yahvé tu Dios no te ha dado tal cosa
  lexicon: HALOT
  rationale: נתן literalmente es «dar», pero el contexto exige una formulación idiomática que exprese la negativa divina respecto de esas prácticas. «No te ha permitido hacer así» sigue de cerca la revisión inglesa y preserva el objeto implícito sin resolverlo demasiado.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se conserva el nombre del pacto según la norma del proyecto en español, en lugar de la sustitución litúrgica por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Objeto implícito tras «no te ha permitido»
  english_pob_reading: has not allowed you to do this
  chosen_spanish_reading: no te ha permitido hacer así
  alternative_spanish_readings:
  - no te ha permitido esto
  - no te ha permitido hacerlo
  - no te ha dado esto
  rationale: El hebreo omite el objeto directo y el inglés POB lo resuelve con una formulación verbal. El español mantiene esa omisión con un giro natural, preservando la referencia implícita a tales prácticas.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Sentido de la prohibición contra prácticas de adivinación
  english_pob_reading: listen to soothsayers and diviners
  chosen_spanish_reading: escuchan a los adivinos y a los hechiceros
  alternative_spanish_readings:
  - consultan a los adivinos y a los hechiceros
  - hacen caso a los adivinos y a los hechiceros
  - escuchan a los agoreros y a los adivinos
  rationale: La línea describe la dependencia de esas naciones respecto de prácticas ocultistas para orientación. «Escuchan a» conserva la imagen de receptividad; no se introduce una condena más amplia que la del texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #2: Preserve lexical/theological tensions'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que pasó de «has not given this to you» a «has not allowed you to do this» para expresar mejor el sentido contextual. En español se refleja esa actualización con «no te ha permitido hacer así», manteniendo el objeto implícito y la contraposición con las naciones.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se prefieren equivalentes claros y contemporáneos («naciones», «desposeer», «escuchan a») sin perder la fuerza del hebreo.
  - La secuencia «adivinos y hechiceros» busca distinguir los dos términos hebreos, aunque ambos pertenecen al campo de la adivinación; se deja anotada la alternativa más literal en la nota.
  - El giro final evita convertir la elipsis hebrea en una formulación excesivamente explícita; la ambigüedad sobre «hacer así» se conserva de manera inteligible.
