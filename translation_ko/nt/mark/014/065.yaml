  text: 그리고 어떤 자들이 그분께 침을 뱉기 시작하였고, 그분의 얼굴을 가리고 주먹으로 치며 그분께 「예언해 보아라」 하고 말했습니다. 그리고 부하들이 손바닥으로 그분을 쳤습니다.
