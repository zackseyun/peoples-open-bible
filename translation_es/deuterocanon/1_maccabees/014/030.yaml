  to: Y Jonatán reunió a su nación[a], y llegó a ser su sumo sacerdote, y fue añadido a su pueblo.
  rationale: Se ajusta una sola frase para mejorar la naturalidad del español manteniendo intacto el sentido del griego y la decisión léxica del POB. También se simplifica levemente la redacción de la nota al pie.
