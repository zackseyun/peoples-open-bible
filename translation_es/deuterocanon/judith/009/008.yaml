translation:
  language: es
  text: Yahvé es tu nombre; tú, quebranta su fuerza en tu poder, y derriba su poderío en tu ira; porque se propusieron profanar tus cosas sagradas[b], contaminar el tabernáculo, el lugar de reposo de tu nombre glorioso, y derribar con la espada[a] el cuerno de tu altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «con hierro». El griego probablemente usa «hierro» como metonimia de un arma de hierro; por eso aquí se traduce «con la espada».
    reason: lexical_alternative
  - marker: b
    text: «Cosas sagradas» puede referirse de manera amplia a objetos sagrados, lugares santos o al ámbito del santuario, no solo al edificio del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  lexicon: BDAG / proyecto POB (nombre divino)
  rationale: Aunque el auditable inglés usa 'Lord' como título divino, el proyecto español pide revelar el nombre divino cuando el contexto lo permite. Aquí la frase nominal funciona como declaración sobre el nombre de Dios, por lo que 'Yahvé' evita el ocultamiento devocional de κύριος y mantiene la referencia al nombre propio divino.
- source_word: ὄνομά σοι
  english_pob_choice: is your name
  chosen_spanish: es tu nombre
  alternatives_spanish:
  - tu nombre es
  - es tu renombre
  lexicon: LSJ
  rationale: La predicación nominal se conserva de forma natural en español. 'Es tu nombre' mantiene el giro semítico sin añadir interpretación como 'renombre'.
- source_word: ῥάξον
  english_pob_choice: shatter
  chosen_spanish: quebranta
  alternatives_spanish:
  - destruye
  - hace pedazos
  - rompe
  lexicon: LSJ
  rationale: '''Quebranta'' transmite la fuerza violenta del imperativo aoristo y conserva una dicción bíblica natural en español, sin suavizar la imagen.'
- source_word: ἰσχὺν
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  lexicon: LSJ
  rationale: '''Fuerza'' reproduce bien la capacidad efectiva de resistencia y funciona en paralelo con ''poderío''.'
- source_word: ἐν δυνάμει σου
  english_pob_choice: in your power
  chosen_spanish: en tu poder
  alternatives_spanish:
  - con tu poder
  - por tu poder
  lexicon: LSJ
  rationale: '''En tu poder'' sigue de cerca la preposición y la imagen de agencia divina preservada por el inglés revisado.'
- source_word: κατάξον
  english_pob_choice: break down / cast down
  chosen_spanish: derriba
  alternatives_spanish:
  - abate
  - destruye
  - humilla
  lexicon: LSJ
  rationale: El verbo expresa una caída violenta; 'derriba' distingue este segundo mandato de ῥάξον y concuerda con la revisión inglesa más literal ('cast down').
- source_word: τὸ κράτος
  english_pob_choice: might
  chosen_spanish: poderío
  alternatives_spanish:
  - poder
  - mando
  - dominio
  lexicon: LSJ
  rationale: '''Poderío'' conserva el matiz de fuerza imponente y evita confundir el término con autoridad política, manteniendo el paralelismo con ''fuerza''.'
- source_word: ἐν τῷ θυμῷ σου
  english_pob_choice: in your wrath
  chosen_spanish: en tu ira
  alternatives_spanish:
  - en tu furor
  - en tu enojo
  lexicon: LSJ
  rationale: '''Ira'' expresa el juicio ardiente de Dios en un registro elevado y claro. Se mantiene la preposición para reflejar la construcción griega y la revisión inglesa.'
- source_word: βεβηλῶσαι
  english_pob_choice: to profane
  chosen_spanish: profanar
  alternatives_spanish:
  - desacralizar
  - desecrar
  lexicon: LSJ
  rationale: '''Profanar'' es el equivalente cultual más directo en español y conserva la oposición sagrado/común presente en el verbo.'
- source_word: τὰ ἅγιά σου
  english_pob_choice: your holy things
  chosen_spanish: tus cosas santas
  alternatives_spanish:
  - tus cosas sagradas
  - tus lugares santos
  - tu santuario
  lexicon: LSJ
  rationale: '''Cosas santas'' sigue de cerca el plural neutro y evita estrechar indebidamente la referencia; mantiene abierta la amplitud posible de objetos o ámbitos sagrados.'
- source_word: μιᾶναι
  english_pob_choice: to defile
  chosen_spanish: contaminar
  alternatives_spanish:
  - manchar
  - ensuciar ritualmente
  - profanar
  lexicon: LSJ
  rationale: '''Contaminar'' comunica la impureza cultual sin confundir el verbo con βεβηλῶσαι, que ya se traduce como ''profanar''.'
- source_word: τὸ σκήνωμα τῆς καταπαύσεως
  english_pob_choice: the tabernacle, the resting place
  chosen_spanish: el tabernáculo, el lugar de reposo
  alternatives_spanish:
  - la morada, el lugar de descanso
  - el tabernáculo, el lugar donde reposa
  lexicon: LSJ
  rationale: Se conserva la doble idea de tienda/tabernáculo y reposo sin forzar una paráfrasis. El appositive 'el lugar de reposo' sigue la revisión inglesa y preserva la relación sintáctica.
- source_word: τοῦ ὀνόματος τῆς δόξης σου
  english_pob_choice: of your glorious name
  chosen_spanish: de tu nombre glorioso
  alternatives_spanish:
  - de tu nombre de gloria
  - de tu nombre glorioso y digno
  lexicon: LSJ
  rationale: El genitivo compuesto se vierte de modo natural en español como 'tu nombre glorioso', conservando la asociación entre nombre y gloria divina.
- source_word: καταβαλεῖν
  english_pob_choice: to cast down
  chosen_spanish: derribar
  alternatives_spanish:
  - echar abajo
  - abatir
  - arrojar abajo
  lexicon: LSJ
  rationale: '''Derribar'' expresa la caída violenta y se acomoda al objeto concreto (''el cuerno del altar'').'
- source_word: σιδήρῳ
  english_pob_choice: with the sword / with iron
  chosen_spanish: con hierro
  alternatives_spanish:
  - con la espada
  - con arma de hierro
  lexicon: LSJ
  rationale: El texto griego dice literalmente 'con hierro'. Se preserva esa dureza material para no ocultar la metonimia ni resolverla interpretativamente como 'espada' sin una necesidad textual en español.
- source_word: κέρας θυσιαστηρίου σου
  english_pob_choice: the horn of your altar
  chosen_spanish: el cuerno de tu altar
  alternatives_spanish:
  - el cuerno de tu altar sacrificial
  - la protuberancia de tu altar
  lexicon: LSJ
  rationale: '''Cuerno'' mantiene el término técnico cultual y sigue de cerca el griego; no se generaliza el elemento ritual del altar.'
theological_decisions:
- issue: Uso del nombre divino frente a un título reverencial
  english_pob_reading: Lord is your name
  chosen_spanish_reading: Yahvé es tu nombre
  alternative_spanish_readings:
  - Señor es tu nombre
  - Tu nombre es Señor
  rationale: El inglés POB conserva un título divino por su tradición editorial, pero el proyecto español default requiere 'Yahvé' cuando la referencia es al nombre divino. Aquí la formulación poética y el contexto invocan directamente a Dios, por lo que el nombre propio es más transparente que el título.
  doctrine_reference: DOCTRINE.md §§1, 2
- issue: Amplitud de 'tus cosas santas'
  english_pob_reading: your holy things
  chosen_spanish_reading: tus cosas santas
  alternative_spanish_readings:
  - tu santuario
  - tus lugares santos
  rationale: El plural neutro griego puede abarcar objetos, espacios o ámbitos sagrados. 'Cosas santas' preserva la amplitud y evita limitar la acusación a un edificio concreto.
  doctrine_reference: DOCTRINE.md §§5, 6
- issue: Imagen cultual concreta del altar
  english_pob_reading: the horn of your altar
  chosen_spanish_reading: el cuerno de tu altar
  alternative_spanish_readings:
  - el cuerno de tu altar sacrificial
  - el cuerno del altar
  rationale: Se mantiene el rasgo ritual específico del altar sin despojarlo de su materialidad. Esto conserva la intensidad litúrgica y el gesto de profanación violenta presente en el verso.
  doctrine_reference: DOCTRINE.md §§5, 6
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa en dos puntos clave: conserva la relación preposicional de ''in your power'' con ''en tu poder'' y mantiene la apposición más literal de ''the tabernacle, the resting place of your glorious name'' como ''el tabernáculo, el lugar de reposo de tu nombre glorioso''. También respeta el giro final con ''derribar'' para καταβαλεῖν. A diferencia del inglés, aquí se recupera el nombre divino ''Yahvé'' por norma editorial del proyecto español.'
  spanish_consistency_notes:
  - Se usa 'profanar' para βεβηλῶσαι y 'contaminar' para μιᾶναι, manteniendo dos verbos distintos para dos acciones cultuales distintas.
  - '''Fuerza'' / ''poderío'' conservan el paralelismo de ἰσχύς / κράτος sin colapsarlos en un solo término.'
  - Se preserva 'con hierro' en el texto principal por fidelidad al griego y se explica la metonimia en nota.
  - La puntuación separa las dos cláusulas imperativas principales con coma y punto y coma, acorde al paralelismo poético del original.
