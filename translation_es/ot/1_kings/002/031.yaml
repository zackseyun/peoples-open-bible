base_translation:
  language: en
  yaml_path: translation/ot/1_kings/002/031.yaml
  text: Then the king said to him[a], “Do as he has said, and strike him down and bury him[b], and remove from me and from my father’s house the innocent blood that Joab shed.”
  footnotes:
  - marker: a
    text: Or “kill him”; the Hebrew idiom literally means “fall upon him” and in this context refers to executing him.
    reason: lexical_alternative
  - marker: b
    text: “Innocent blood” is a Hebrew legal-moral expression for bloodshed committed without just cause, carrying the sense of bloodguilt.
    reason: cultural_note
