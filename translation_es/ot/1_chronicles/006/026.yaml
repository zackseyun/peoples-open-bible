  spanish_quality_summary: La frase es clara y natural para una genealogía. No obstante, la consistencia onomástica mejora si se evita mezclar una forma inglesa sin adaptar («Ethni») con una forma acentuada («Zérah») y una castellanización más libre («Adaías»). Una línea genealógica tan breve se beneficia de nombres tratados de manera uniforme y conservadora.
