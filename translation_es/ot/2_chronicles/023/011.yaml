base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/023/011.yaml
  text: Then they brought out the king’s son[a], put the crown and the testimony on him, made him king, and anointed him; and Jehoiada and his sons said, “Long live the king!”
  footnotes:
