translation:
  language: es
  text: Quien se siente sobre el objeto[a] sobre el cual se sentó el hombre con la emisión lavará sus vestidos y se bañará en agua, y quedará impuro hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el recipiente» o «el utensilio»; el término hebreo es amplio para un artículo u objeto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַיֹּשֵׁב
  english_pob_choice: Whoever sits
  chosen_spanish: Quien se siente
  alternatives_spanish:
  - El que se sienta
  - Cualquiera que se siente
  lexicon: HALOT
  rationale: El participio sustantivado hebreo expresa a una persona en forma general. «Quien se siente» conserva el valor genérico y el registro legal, sin volver la frase innecesariamente pesada.
- source_word: הַכְּלִי
  english_pob_choice: the object
  chosen_spanish: el objeto
  alternatives_spanish:
  - el recipiente
  - el utensilio
  - la cosa
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para un artículo u objeto. Como aquí se trata de algo sobre lo cual uno se sienta, «objeto» preserva esa amplitud sin forzar la idea de un recipiente o utensilio específico.
- source_word: אֲשֶׁר יֵשֵׁב עָלָיו
  english_pob_choice: on which ... sat
  chosen_spanish: sobre el cual se sentó
  alternatives_spanish:
  - en el que se sentó
  - sobre el que se sentó
  lexicon: HALOT
  rationale: La cláusula relativa identifica el objeto por el contacto previo. «Sobre el cual se sentó» sigue de cerca la relación sintáctica y mantiene la referencia al asiento del hombre con la emisión.
- source_word: הַזָּב
  english_pob_choice: the man with the discharge
  chosen_spanish: el hombre con la emisión
  alternatives_spanish:
  - el que tiene la emisión
  - el hombre con flujo
  lexicon: HALOT
  rationale: El término es un participio sustantivado masculino para quien tiene la descarga. «La emisión» suena más natural en español bíblico actual que «flujo», y mantiene la neutralidad clínica del contexto ritual.
- source_word: יְכַבֵּס בְּגָדָיו
  english_pob_choice: shall wash his clothes
  chosen_spanish: lavará sus vestidos
  alternatives_spanish:
  - lavará su ropa
  - deberá lavar sus vestidos
  lexicon: HALOT
  rationale: כִּבֵּס se refiere al lavado de prendas. «Vestidos» conserva el registro bíblico y jurídico, mientras que «lavará» comunica la acción con sencillez; se evita «laudar» por ser menos transparente al español actual.
- source_word: וְרָחַץ בַּמַּיִם
  english_pob_choice: and bathe in water
  chosen_spanish: y se lavará con agua
  alternatives_spanish:
  - y se bañará con agua
  - y se lavará en agua
  lexicon: HALOT
  rationale: En contexto de pureza, רָחַץ indica lavado del cuerpo. «Se lavará con agua» es español natural y suficientemente amplio; «bañarse» podría sugerir una inmersión más específica de lo que el hebreo exige aquí.
- source_word: וְטָמֵא עַד הָעָרֶב
  english_pob_choice: and he shall be unclean until the evening
  chosen_spanish: y quedará impuro hasta el anochecer
  alternatives_spanish:
  - y será impuro hasta la tarde
  - y estará impuro hasta el anochecer
  lexicon: HALOT
  rationale: טָמֵא expresa estado de impureza ritual. «Quedará impuro» preserva la idea de estado resultante; «anochecer» traduce bien הָעָרֶב como el límite temporal del día, con tono natural en español.
theological_decisions:
- issue: Lenguaje de impureza ritual
  english_pob_reading: ritual impurity is expressed simply as 'unclean' without importing moral guilt
  chosen_spanish_reading: impuro, sin añadir culpa moral
  alternative_spanish_readings:
  - cerimonialmente impuro
  - contaminado ritualmente
  rationale: El contexto es la ley de pureza levítica, no una evaluación moral. «Impuro» conserva la fuerza del hebreo sin introducir una glosa interpretativa; la nota aclara que se trata de impureza ritual.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Referencia masculina del pasaje
  english_pob_reading: explicitly male referent in the relative clause and masculine singular pronouns retained as 'the man... he'
  chosen_spanish_reading: referente masculino explícito mantenido con «el hombre... se»
  alternative_spanish_readings:
  - quien... se
  - la persona... se
  rationale: La sección trata del varón con emisión y el hebreo usa formas masculinas singulares. Mantener «el hombre» evita neutralizar indebidamente el referente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El control cruzado reporta alta concordancia y no hubo revisiones aplicadas; esta propuesta sigue el texto hebreo masorético y el marco léxico/audit trail del inglés POB sin cambios sustantivos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el registro jurídico-ritual con verbos en futuro simple para el mandato.
  - «Impuro» se usa como término técnico de pureza ritual, no moral.
