translation:
  language: es
  text: ¡Bendigan al Señor, animales de cuatro patas y bestias de la tierra; cántenle alabanzas y enaltezcanlo por siempre![a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Enaltezcanlo» puede entenderse también como «exáltenlo grandemente»; se eligió una forma más fluida en español para conservar el tono doxológico.
    reason: spanish_style_note
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Bendecid
  - Alaben
  lexicon: BDAG
  rationale: El imperativo plural exhorta a las criaturas a bendecir al Señor; «bendigan» conserva la fórmula litúrgica y distingue este verbo del siguiente, que es claramente de alabanza cantada.
- source_word: τετράποδα
  english_pob_choice: four-footed animals
  chosen_spanish: animales de cuatro patas
  alternatives_spanish:
  - cuadrúpedos
  - cuatropatas
  lexicon: LSJ
  rationale: La expresión griega es literal; «animales de cuatro patas» es natural en español moderno y mantiene el sentido zoológico concreto sin tecnicismo innecesario.
- source_word: θηρία
  english_pob_choice: beasts
  chosen_spanish: bestias
  alternatives_spanish:
  - animales salvajes
  - animales
  lexicon: LSJ
  rationale: «Bestias» preserva el registro poético elevado y el contraste con «animales de cuatro patas», como en el griego.
- source_word: τῆς γῆς
  english_pob_choice: of the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra/land
  - sobre la tierra
  lexicon: LSJ
  rationale: El genitivo modifica a «bestias»; «de la tierra» reproduce la imagen cósmica y sigue de cerca la construcción del original.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Dueño
  - al Maestro
  lexicon: BDAG
  rationale: En este contexto himnódico judío, κύριος se refiere a Dios; en español «Señor» es la forma litúrgica natural y fiel al audit trail inglés.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cántenle alabanzas
  alternatives_spanish:
  - canten himnos
  - alábenlo
  lexicon: LSJ
  rationale: El verbo tiene matiz específicamente hímnico; «cántenle alabanzas» comunica esa idea en español de manera fluida y distingue esta acción de «bendigan».
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: enaltezcanlo
  alternatives_spanish:
  - exáltenlo grandemente
  - levántenlo en alto
  lexicon: LSJ
  rationale: El compuesto intensifica la exaltación; «enaltezcanlo» transmite la idea de elevar en grado sumo con un verbo digno y claro en español.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - por los siglos
  lexicon: BDAG
  rationale: El sentido idiomático es perpetuidad duradera; «por siempre» es natural en español moderno y conserva la fuerza doxológica.
theological_decisions:
- issue: Renderización de κύριος en un himno de alabanza a Dios
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Dueño
  - el Maestro
  rationale: Se mantiene la convención del proyecto para κύριος en contexto de culto a Dios; «Señor» es la opción reverente y claramente teológica en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: La versión inglesa auditada no requiere cambios; la traducción española sigue el mismo análisis léxico y la misma lectura teológica, preservando el paralelismo entre «bendigan», «canten alabanzas» y «enaltezcan».
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος, en coherencia con el estándar del proyecto y con el contexto himnódico.
  - Se distinguió entre alabanza verbal general («bendigan») y alabanza hímnica («cántenle alabanzas») para reflejar la diferencia entre εὐλογεῖτε y ὑμνεῖτε.
  - Se prefirió un español natural y litúrgicamente digno, sin ocultar la concreción zoológica de τετράποδα y θηρία.
