  to: y si derramas tu vida[a] para el hambriento y sacias al alma afligida[b], entonces tu luz surgirá en la oscuridad, y tu oscuridad profunda será como el mediodía.
  rationale: 'Se corrigen dos desajustes semánticos importantes: «surgirá» refleja mejor וְזָרַח que «brillará», y «oscuridad profunda» representa אֲפֵלָה sin introducir la imagen distinta de «sombra». También se reordenan y reescriben las notas para que coincidan con las dos ocurrencias de נֶפֶשׁ y con el rastro de auditoría del POB inglés: la primera nota para «tu vida/tu alma» y la segunda para «alma afligida/persona afligida».'
