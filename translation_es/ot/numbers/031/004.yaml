translation:
  language: es
  text: Mil de cada tribu[a], de entre todas las tribus de Israel, enviaréis al ejército.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para el servicio militar». El hebreo לַצָּבָא puede designar el servicio dentro de la fuerza militar, no solo el desplazamiento hacia un lugar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶלֶף
  english_pob_choice: a thousand
  chosen_spanish: mil
  alternatives_spanish:
  - mil uno
  - un millar
  lexicon: HALOT
  rationale: 'Es un cardinal simple; en español bíblico moderno, «mil» es la forma natural y fiel. No se añade «uno» porque el hebreo no lo expresa. '
- source_word: לַמַּטֶּה
  english_pob_choice: from each tribe
  chosen_spanish: de cada tribu
  alternatives_spanish:
  - para cada tribu
  - por tribu
  lexicon: HALOT
  rationale: En este contexto distributivo, el sentido es que sale una cuota de cada tribu. «De cada tribu» comunica mejor esa distribución que un «para» más ambiguo.
- source_word: אֶלֶף לַמַּטֶּה אֶלֶף לַמַּטֶּה
  english_pob_choice: A thousand from each tribe, from all the tribes of Israel
  chosen_spanish: Mil de cada tribu
  alternatives_spanish:
  - Mil de cada tribu, mil de cada tribu
  - Un millar de cada tribu
  lexicon: HALOT
  rationale: La repetición hebrea queda parcialmente absorbida en la frase española para conservar naturalidad, siguiendo la revisión inglesa que retiró la duplicación explícita pero mantuvo el sentido distributivo. El español puede sonar forzado si repite exactamente la misma secuencia dos veces.
- source_word: לְכֹל מַטּוֹת יִשְׂרָאֵל
  english_pob_choice: from all the tribes of Israel
  chosen_spanish: de todas las tribus de Israel
  alternatives_spanish:
  - de entre todas las tribus de Israel
  - para todas las tribus de Israel
  lexicon: HALOT
  rationale: El hebreo amplía el alcance distributivo. «De todas las tribus de Israel» funciona en español como aclaración global del reparto y evita una lectura finalista de «para».
- source_word: תִּשְׁלְחוּ
  english_pob_choice: you shall send
  chosen_spanish: enviaréis
  alternatives_spanish:
  - mandaréis
  - deberéis enviar
  lexicon: HALOT
  rationale: Es un imperfecto jussivo/plural en contexto imperativo. «Enviaréis» conserva la fuerza directiva sin sobrecargar con modales ajenos al texto.
- source_word: לַצָּבָא
  english_pob_choice: to the army
  chosen_spanish: al ejército
  alternatives_spanish:
  - a la tropa
  - para el servicio militar
  lexicon: HALOT
  rationale: צָבָא aquí designa la fuerza armada o la campaña militar. «Al ejército» es la opción más breve y natural en español. Se preserva la posibilidad de «servicio militar» en nota por la amplitud semántica del término.
theological_decisions:
- issue: 'Sentido de לַצָּבָא: fuerza militar vs. servicio militar'
  english_pob_reading: 'to the army; footnote: Or ''for military service.'' The Hebrew לַצָּבָא can denote service in the military force, not merely movement toward a location.'
  chosen_spanish_reading: 'al ejército; nota alternativa: «o: para el servicio militar»'
  alternative_spanish_readings:
  - al servicio militar
  - para el ejército
  rationale: El hebreo permite tanto una referencia al cuerpo militar como a la función/servicio. Como el contexto habla de enviar contingentes, la traducción principal «al ejército» es clara; la nota conserva la alternativa funcional sin borrar la amplitud semántica.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La revisión inglesa reciente redujo la duplicación explícita de la frase distributiva para hacerla más natural, pero mantuvo la fuerza distributiva del hebreo. La redacción española sigue esa línea: conserva el valor de distribución de אֶלֶף לַמַּטֶּה sin repetir mecánicamente la misma cláusula dos veces.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el tetragrámaton aparece; este versículo no lo contiene.
  - Se mantiene «tribu» para מַטֶּה en contexto censal/militar.
  - «Ejército» se eligió por naturalidad y por el campo semántico de צָבָא en este contexto.
  - La frase inicial queda compacta en español para evitar una repetición poco idiomática, sin perder el distributivo del hebreo.
