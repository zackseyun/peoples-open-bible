  text: Then she fastened it with the pin and said to him[a], “The Philistines are upon you[c][b], Samson!” And he awoke from his sleep and pulled away the pin of the loom and the web.
  footnotes:
  - marker: a
    text: Or 'with the peg.' The Hebrew term can denote a peg or pin; in this weaving context, 'pin' best fits the sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'pulled out' or 'tore away.' The Hebrew verb can denote forceful removal.
    reason: lexical_alternative
  - marker: c
    text: Or 'the woven fabric.' The Hebrew term refers to the woven material on the loom.
    reason: lexical_alternative
