translation:
  language: es
  text: Y cometió una gran traición[a], y devolvió mal por bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un gran quebrantamiento de la fe» o «gran infidelidad». El término griego puede denotar la violación de confianza u obligación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν
  english_pob_choice: committed
  chosen_spanish: cometió
  alternatives_spanish:
  - hizo
  - realizó
  - ejecutó
  lexicon: BDAG
  rationale: Con ἀθεσίαν como objeto, el verbo expresa la realización de un acto; en español, «cometió» transmite de manera natural la culpa moral y evita un calco como «hizo».
- source_word: ἀθεσίαν
  english_pob_choice: act of treachery
  chosen_spanish: traición
  alternatives_spanish:
  - acto de traición
  - quebrantamiento de la fe
  - infidelidad
  - deslealtad
  lexicon: LSJ
  rationale: El contexto narrativo apunta a una violación de confianza u obligación. «Traición» comunica bien esa ruptura relacional y moral en español; la nota conserva alternativas más cercanas al matiz griego.
- source_word: μεγάλην
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - grave
  - seria
  lexicon: BDAG
  rationale: «Grande» reproduce de forma directa la intensificación del adjetivo griego. El peso moral queda reforzado por el sustantivo «traición».
- source_word: ἀνταπέδωκεν
  english_pob_choice: repaid
  chosen_spanish: devolvió
  alternatives_spanish:
  - pagó
  - retribuyó
  - recompensó
  lexicon: BDAG
  rationale: El verbo expresa correspondencia o retribución. «Devolvió» preserva la idea de devolver en respuesta a algo recibido y funciona bien con el objeto «mal».
- source_word: κακὰ
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - daño
  - malos actos
  lexicon: BDAG
  rationale: El plural neutro puede referirse a hechos o trato malo. En español, «mal» mantiene la oposición moral con «bien» y suena más natural que «el mal» en esta construcción.
- source_word: ἀντὶ ἀγαθῶν
  english_pob_choice: for good
  chosen_spanish: por bien
  alternatives_spanish:
  - en vez de bien
  - a cambio de bien
  - en retorno de bien
  lexicon: BDAG
  rationale: La preposición marca intercambio o retribución. «Por bien» conserva la contraposición breve y clara del griego y evita sobreexplicar en el cuerpo del texto.
theological_decisions:
- issue: Alcance moral de ἀθεσία
  english_pob_reading: Rendered as relational betrayal ('act of treachery') rather than a more abstract 'lawlessness.'
  chosen_spanish_reading: Traducido como «traición» en vez de «ilegalidad» o «maldad» abstracta.
  alternative_spanish_readings:
  - gran acto de ilegalidad
  - gran infidelidad
  - gran quebrantamiento de la fe
  rationale: El griego describe una ruptura concreta de confianza u obligación. «Traición» preserva el carácter relacional y narrativo del juicio, sin convertir el término en una categoría teológica más abstracta.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto griego y la lectura inglesa están en alto acuerdo, por lo que no se requieren ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no interviene.
  - Se evita «Cristo»/«Mesías» porque el versículo no contiene lenguaje cristológico.
  - «Traición» se usa aquí por su fuerza contextual; la nota conserva el matiz alternativo de fidelidad/obligación del término griego.
  - «Mal» y «bien» reproducen la antítesis breve del griego y la equivalencia observada en la traducción inglesa.
