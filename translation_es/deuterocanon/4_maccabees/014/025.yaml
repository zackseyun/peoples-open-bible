translation:
  language: es
  text: Porque, cuanto más débiles de espíritu[a] y más prolíficas son las madres, tanto más aman a sus hijos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Débiles de espíritu» conserva la imagen del compuesto griego ἀσθενέψυχοι, literalmente “de alma/espíritu débil”; también podría entenderse como “de ánimo débil”.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, el griego dice “más amantes de los hijos” (φιλοτεκνότεραι).
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσῳ ... τοσούτῳ
  english_pob_choice: the more ... the more
  chosen_spanish: cuanto más ... tanto más
  alternatives_spanish:
  - mientras más ... más
  - a medida que ... tanto más
  lexicon: LSJ
  rationale: La correlación comparativa se expresa de modo natural en español con 'cuanto más ... tanto más', conservando la relación lógica sin volverla rígida.
- source_word: ἀσθενέψυχοι
  english_pob_choice: weak in spirit
  chosen_spanish: débiles de espíritu
  alternatives_spanish:
  - de ánimo débil
  - de espíritu débil
  - pusilánimes
  lexicon: LSJ
  rationale: El compuesto apunta a debilidad interior o del espíritu/ánimo. 'Débiles de espíritu' conserva el paralelismo con el griego y evita reducirlo a simple cobardía.
- source_word: πολυγονώτεραι
  english_pob_choice: more prolific
  chosen_spanish: más prolíficas
  alternatives_spanish:
  - más fecundas
  - que tienen más hijos
  - más fructíferas en la maternidad
  lexicon: LSJ
  rationale: El comparativo se refiere a madres que engendran o crían muchos hijos. 'Más prolíficas' es breve y fiel al valor comparativo del término.
- source_word: ὑπάρχουσιν
  english_pob_choice: are
  chosen_spanish: son
  alternatives_spanish:
  - existen como
  - se hallan
  lexicon: LSJ
  rationale: Aquí funciona como cópula simple; 'son' reproduce el valor sin sobrecargar la frase.
- source_word: φιλοτεκνότεραι
  english_pob_choice: love their children
  chosen_spanish: aman a sus hijos
  alternatives_spanish:
  - son más afectuosas con sus hijos
  - son más amantes de sus hijos
  - les tienen más amor a sus hijos
  lexicon: LSJ
  rationale: El adjetivo comparativo significa literalmente 'más amantes de los hijos'. En español, la forma verbal 'aman a sus hijos' sigue de cerca el sentido adoptado por el POB inglés revisado, sin sonar forzada.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que prefirió una expresión natural (‘love their children’) frente a una forma más literal (‘lovers of their children’), pero mantiene el comparativo y la imagen léxica de φιλοτεκνότεραι. También preserva la correlación comparativa intensiva de ὅσῳ ... τοσούτῳ.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, sin recurrir a calcos arcaizantes.
  - Se eligió 'espíritu' en vez de 'alma' en el texto principal para conservar la ambigüedad metafórica del compuesto griego.
  - '''Prolíficas'' se conserva como término comparativo natural; en nota se aclara que el griego alude a muchas maternidades/hijos.'
  - La nota sobre φιλοτεκνότεραι se deja en el texto para auditar la opción entre literalidad léxica y fluidez española.
