translation:
  language: es
  text: Ahora bien, las dos clases más abarcadoras de las pasiones son el placer y el dolor[a]; y cada una de estas también pertenece por naturaleza al alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las dos naturalezas más inclusivas de las pasiones». El griego es condensado y puede verterse de manera más formal con «naturalezas» en lugar de «clases».
    reason: lexical_alternative
lexical_decisions:
- source_word: παθῶν
  english_pob_choice: of passions
  chosen_spanish: de las pasiones
  alternatives_spanish:
  - de los sufrimientos
  - de las emociones
  - de las afecciones
  lexicon: LSJ
  rationale: En este contexto filosófico-moral, πάθος designa impulsos afectivos o pasiones, no simplemente sufrimientos. «Pasiones» conserva el marco conceptual del pasaje.
- source_word: φύσεις
  english_pob_choice: kinds
  chosen_spanish: clases
  alternatives_spanish:
  - naturalezas
  - géneros
  - especies
  lexicon: LSJ
  rationale: Aunque literalmente significa «naturalezas», aquí funciona como categoría clasificatoria. «Clases» comunica bien la idea taxonómica en español sin ocultar el matiz de φύσεις.
- source_word: περιεκτικώταται
  english_pob_choice: most comprehensive
  chosen_spanish: más comprehensivas
  alternatives_spanish:
  - más inclusivas
  - más abarcadoras
  - más comprensivas
  lexicon: LSJ
  rationale: El superlativo expresa que estas dos categorías abarcan el resto. «Más comprehensivas» conserva el valor de amplitud y suena natural en español culto.
- source_word: ἡδονή
  english_pob_choice: pleasure
  chosen_spanish: placer
  alternatives_spanish:
  - deleite
  lexicon: LSJ
  rationale: Es el equivalente estándar en discurso ético-filosófico y se ajusta al par antitético con πόνος.
- source_word: πόνος
  english_pob_choice: pain
  chosen_spanish: dolor
  alternatives_spanish:
  - aflicción
  - fatiga
  - penalidad
  lexicon: LSJ
  rationale: En contraste con ἡδονή, «dolor» es el antónimo más natural en español para el campo psicológico del pasaje.
- source_word: ἑκάτερον
  english_pob_choice: each of these
  chosen_spanish: cada una de estas
  alternatives_spanish:
  - cada uno de estos
  - cada una
  - cada uno
  lexicon: LSJ
  rationale: Se refiere distributivamente a los dos términos mencionados; el femenino concuerda con la serie «pasiones / clases».
- source_word: περὶ τὴν ψυχὴν
  english_pob_choice: connected with the soul
  chosen_spanish: pertenece... al alma
  alternatives_spanish:
  - está relacionado con el alma
  - atañe al alma
  - se refiere al alma
  lexicon: LSJ
  rationale: La expresión es idiomática y no conviene forzar un calco como «alrededor del alma». «Pertenece al alma» comunica la relación intrínseca o natural del texto con claridad.
- source_word: πέφυκεν
  english_pob_choice: is by nature
  chosen_spanish: por naturaleza
  alternatives_spanish:
  - es naturalmente
  - está por naturaleza
  - nace
  lexicon: LSJ
  rationale: El perfecto de φύω expresa una condición inherente. En español, «por naturaleza» preserva la idea de disposición natural sin recargar la frase.
theological_decisions:
- issue: ψυχή como término antropológico
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  - yo
  - ser interior
  rationale: En este contexto filosófico-antropológico, ψυχή apunta al principio interior de la persona. «Alma» reproduce bien el nivel conceptual del pasaje sin introducir precisiones doctrinales ajenas.
  doctrine_reference: Antropología bíblica / filosofía moral del texto
translation_notes:
  revision_awareness: 'Se siguió el corte textual y la valoración de la POB inglesa, pero se ajustó el español a una sintaxis más natural: «Ahora, las dos clases más comprehensivas...» mantiene el arranque inferencial y el orden lógico del original, mientras que «pertenece por naturaleza al alma» conserva el valor de πέφυκεν περὶ τὴν ψυχὴν sin calco incómodo. Se preservó la alternativa de «naturalezas» en nota, ya que el griego permite esa lectura y la POB inglesa la documenta.'
  spanish_consistency_notes:
  - Se mantuvo «alma» para ψυχή conforme al contexto filosófico-anthropológico.
  - Se evitó «SEÑOR» u otros equivalentes de ocultamiento porque el pasaje no contiene el Tetragrámaton ni κύριος en sentido divino.
  - Se eligió «pasiones» para πάθη, en continuidad con la decisión inglesa y con el registro moral del libro.
  - La nota a conserva la tensión entre traducción más idiomática («clases») y más literal («naturalezas»).
