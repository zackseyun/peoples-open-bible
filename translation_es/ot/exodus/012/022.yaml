review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia ritual del hebreo: tomar un manojo de hisopo, mojarlo en la sangre del סף, tocar el dintel y las dos jambas/postes, y no salir hasta la mañana. También preserva correctamente la alternativa léxica de סף en nota. Sin embargo, «cuenca» no es la mejor equivalencia para un recipiente en español bíblico general y puede sonar anatómica o geográfica; «vasija» expresa mejor la idea contextual de un contenedor. Además, «postes» solo es comprensible, pero «postes de la puerta» o «jambas» sería más preciso; conviene ajustar a «los dos postes de la puerta» para reflejar mejor מְזוּזוֹת.'
  spanish_quality_summary: El español es claro y digno, pero «cuenca» resulta poco natural en este contexto y puede distraer al lector. El resto es fluido. «Hasta la mañana» es aceptable, aunque «hasta la mañana» suena levemente menos idiomático que «hasta el amanecer»; no obstante, mantiene bien la cercanía formal. El uso de «su casa» preserva adecuadamente el distributivo singular.
  glossary_alignment: 'No hay términos de glosario mayor implicados como Yahvé/Mesías. Las decisiones léxicas principales están mayormente alineadas con la auditoría inglesa: «manojo de hisopo», «dintel», y el distributivo «ninguno de ustedes ... su casa». La principal desalineación práctica es «cuenca» para הַסַּף donde la decisión inglesa es ‘basin’ en sentido de recipiente; en español neutral y eclesial, «vasija» o «recipiente» alinean mejor que «cuenca».'
