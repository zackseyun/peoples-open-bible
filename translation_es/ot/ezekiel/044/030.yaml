revisions:
- from: Y el primogénito de todos los primeros frutos de todo[a], y toda contribución de todas sus contribuciones, pertenecerá a los sacerdotes. Darán al sacerdote la primicia de su masa[b], para hacer descansar una bendición[c] sobre tu casa.
  to: Y la primera porción de todos los primeros frutos de todo[a], y toda contribución de todas sus contribuciones, pertenecerá a los sacerdotes. Darán al sacerdote la primera porción de su masa[b], para hacer descansar una bendición[c] sobre tu casa.
  rationale: Se corrige el error principal de sentido reemplazando «primogénito» por «la primera porción», que sí refleja רֵאשִׁית en contexto cultual. También se armoniza la segunda aparición de רֵאשִׁית con la misma idea léxica, se conserva «contribución» para תְּרוּמָה, y se mantienen «masa», «bendición» y «casa» según el análisis del POB. Las notas se pulen para español más natural sin alterar la justificación documentada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:35:53Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en gran parte la estructura del hebreo y la línea del POB inglés: la doble referencia a רֵאשִׁית con בִּכּוּרֵי, la singular/plural de תְּרוּמָה/תְּרוּמוֹת, la asignación legal a los sacerdotes, la ofrenda de la masa al sacerdote, y el resultado de bendición sobre la casa. Sin embargo, hay un error léxico importante: רֵאשִׁית no significa «primogénito» aquí. El hebreo habla de la primera porción o primicia, no del primogénito. También hay inconsistencia pronominal: el texto fuente alterna 2mp («sus/vuestros») con 2ms («tu casa»), pero el español draft mezcla «sus» y «tu» de manera poco natural; conviene usar «ustedes/sus» para el plural y conservar «tu casa» según el singular hebreo final, o bien una estrategia más uniforme y legible. Además, «Darán» funciona, pero «darán» después de una cláusula nominal puede mejorarse con «Ustedes darán» o una construcción más fluida.'
  spanish_quality_summary: 'La redacción es mayormente comprensible, pero «el primogénito de todos los primeros frutos» suena incorrecto y confunde categorías cultuales con filiación/animal primogénito. «Primeros frutos» es aceptable, pero en combinación con רֵאשִׁית conviene una formulación que preserve el énfasis sin sonar extraña: «la primera porción de todos los primeros frutos de todo». También conviene ajustar la nota a y la referencia pronominal de «sus contribuciones» para mayor naturalidad. Las notas b y c son básicamente útiles; la nota a necesita quitar comillas y mejorar estilo. '
  glossary_alignment: No hay términos del glosario mayor comprometidos como Yahvé, Mesías, etc. El punto principal es la fidelidad léxica a רֵאשִׁית, que debe renderizarse como «primera porción», «lo primero» o «primicia», no «primogénito». «Contribución» para תְּרוּמָה está bien y sigue la decisión documentada. «Masa» para עֲרִסוֹתֵיכֶם es adecuada. «Bendición» y «casa» preservan bien la amplitud teológica.
  issues:
  - severity: high
    issue: «primogénito» traduce incorrectamente רֵאשִׁית en la primera cláusula
    rationale: רֵאשִׁית significa «lo primero», «primera porción», «primicia», no «primogénito». «Primogénito» introduce una idea ajena al texto y distorsiona el sentido cultual.
  - severity: medium
    issue: Mezcla pronominal poco natural entre «sus» y «tu»
    rationale: El hebreo tiene 2mp en varias expresiones y 2ms en «tu casa». En español, la mezcla sin explicación suena torpe. Puede mantenerse «tu casa» por fidelidad, pero el resto debe redactarse con más naturalidad.
  - severity: low
    issue: La nota a y su anclaje pueden expresarse con español más natural
    rationale: La nota actual conserva el contenido, pero el estilo con comillas iniciales y «cada ofrenda» suena menos natural que una formulación más limpia y paralela al texto principal.
  revised_spanish_text: Y la primera porción de todos los primeros frutos de todo[a], y toda contribución de todas sus contribuciones, pertenecerá a los sacerdotes. Darán al sacerdote la primera porción de su masa[b], para hacer descansar una bendición[c] sobre tu casa.
  revised_footnotes:
