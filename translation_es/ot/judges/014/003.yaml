translation:
  language: es
  text: 'Pero su padre y su madre le dijeron: «¿No hay mujer entre las hijas de tus hermanos[a] o entre todo mi pueblo, para que vayas a tomar mujer de los filisteos incircuncisos?» Pero Sansón dijo a su padre: «Tómala para mí, porque ella es recta a mis ojos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre las hijas de tus parientes» o «entre las mujeres de tu clan». El hebreo conserva la formulación literal «hijas de tus hermanos», que probablemente se refiere de modo amplio al grupo de parentesco.'
    reason: cultural_note
  - marker: b
    text: 'O: «ella es agradable a mis ojos» o «ella me parece adecuada». El hebreo puede expresar aprobación personal o atracción; la redacción principal conserva el eco de Jueces sobre lo que es recto a los propios ojos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֵין
  english_pob_choice: Is there not
  chosen_spanish: ¿No hay
  alternatives_spanish:
  - ¿No existe
  - ¿Acaso no hay
  lexicon: HALOT
  rationale: La pregunta retórica negativa se expresa de forma natural en español con «¿No hay…?», conservando el valor de cuestionamiento implícito del hebreo.
- source_word: בִּבְנוֹת אַחֶיךָ
  english_pob_choice: among the daughters of your brothers
  chosen_spanish: entre las hijas de tus hermanos
  alternatives_spanish:
  - entre las mujeres de tu parentela
  - entre las hijas de tus parientes
  lexicon: HALOT
  rationale: Se mantiene la imagen familiar literal del hebreo. «Hermanos» puede abarcar el grupo de parentesco, y el texto español conserva esa tensión sin explicarla en el cuerpo principal.
- source_word: וּבְכָל עַמִּי
  english_pob_choice: or among all my people
  chosen_spanish: o entre todo mi pueblo
  alternatives_spanish:
  - o entre todo nuestro pueblo
  - o entre todo mi clan
  lexicon: HALOT
  rationale: Se preserva el sufijo de primera persona singular del hebreo con «mi pueblo», en vez de armonizarlo a «nuestro pueblo».
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: mujer
  alternatives_spanish:
  - una mujer
  - una esposa
  lexicon: HALOT
  rationale: En la primera aparición, el sentido es una mujer disponible para el matrimonio; «mujer» funciona de manera natural en la pregunta retórica.
- source_word: הוֹלֵךְ לָקַחַת
  english_pob_choice: you are going to take
  chosen_spanish: vayas a tomar
  alternatives_spanish:
  - vas a tomar
  - vas a llevar
  lexicon: HALOT
  rationale: El español conserva la construcción verbal y el matiz de ir a tomar mujer sin parafrasear como «casarte», que explicitaría más de lo que el hebreo dice.
- source_word: אִשָּׁה
  english_pob_choice: a wife
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  - una mujer
  lexicon: HALOT
  rationale: Aunque el inglés distingue «wife», el hebreo repite el mismo sustantivo. En español, «tomar mujer» es una forma idiomática comprensible y fiel al paralelismo del verso.
- source_word: מִפְּלִשְׁתִּים הָעֲרֵלִים
  english_pob_choice: from the uncircumcised Philistines
  chosen_spanish: de los filisteos incircuncisos
  alternatives_spanish:
  - de los filisteos, los incircuncisos
  - de esos filisteos incircuncisos
  lexicon: HALOT
  rationale: Se conserva el epíteto cargado de sentido pactual sin suavizarlo. El orden español sigue la forma natural del nombre colectivo con adjetivo.
- source_word: אוֹתָהּ קַח לִי
  english_pob_choice: Get her for me
  chosen_spanish: Tómala para mí
  alternatives_spanish:
  - Tráela para mí
  - Consíguemela
  lexicon: HALOT
  rationale: «Tómala para mí» conserva el imperativo y la relación con el arreglo matrimonial. «Consíguemela» sería más idiomático, pero menos cercano al valor léxico de קַח.
- source_word: יָשְׁרָה בְעֵינַי
  english_pob_choice: she is right in my eyes
  chosen_spanish: ella es la que está recta a mis ojos
  alternatives_spanish:
  - ella es agradable a mis ojos
  - ella me parece adecuada
  lexicon: HALOT
  rationale: Se mantiene la frase idiomática «a mis ojos» para reflejar el hebreo y su eco temático en Jueces. «Recta» preserva la raíz de יָשָׁר sin borrar la ambigüedad entre agrado y juicio de conveniencia.
theological_decisions:
- issue: Eco temático de lo que es correcto según la propia evaluación en Jueces
  english_pob_reading: she is right in my eyes
  chosen_spanish_reading: ella es la que está recta a mis ojos
  alternative_spanish_readings:
  - ella me parece bien
  - ella es agradable a mis ojos
  - ella me parece correcta
  rationale: La formulación conserva la resonancia narrativa de Jueces sobre lo que parece «recto» a los propios ojos, sin reducir el sentido a mera atracción ni moralizarlo más allá del hebreo.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Alineado con el audit trail inglés: se conserva la interrogación retórica, el singular posesivo «mi pueblo», el epíteto «incircuncisos» y el valor idiomático de יָשְׁרָה בְעֵינַי, sin añadir interpretación ajena al hebreo. No hay revisiones aplicadas en el registro base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Filisteos incircuncisos» conserva el tono pactual del original.
  - «Mujer» se usa en la primera mitad y «Tómala para mí» en la segunda para reflejar el cambio de perspectiva entre el argumento de los padres y la petición de Sansón.
  - Las notas [a] y [b] están ancladas explícitamente en el texto para cumplir la trazabilidad editorial.
