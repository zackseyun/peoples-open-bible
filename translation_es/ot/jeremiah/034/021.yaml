base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/034/021.yaml
  text: And I will give Zedekiah king of Judah and his officials into the hand of their enemies[a], into the hand of those who seek their life, and into the hand of the army of the king of Babylon, which has withdrawn from you.
  footnotes:
  - marker: a
    text: Or 'which is withdrawing from you' / 'which has withdrawn from you.' The Hebrew literally says 'the ones going up from upon you,' an idiom for forces moving away from besieging the city.
    reason: lexical_alternative
