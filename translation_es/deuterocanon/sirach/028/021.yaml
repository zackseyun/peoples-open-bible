translation:
  language: es
  text: Su muerte es una muerte funesta[a], y su Hades[b] es más ventajoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la muerte de ella es una muerte funesta»; el pronombre femenino remite al antecedente femenino del contexto previo, probablemente la lengua o el habla calumniosa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Hades es mejor que eso» o «la región de los muertos es preferible a eso».'
    reason: alternative_reading
lexical_decisions:
- source_word: θάνατος
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - muerte
  - fallecimiento
  - fin
  lexicon: LSJ
  rationale: Se conserva la repetición enfática del sustantivo con una traducción directa y natural en español. «Muerte» mantiene la dureza retórica del griego.
- source_word: πονηρός
  english_pob_choice: evil
  chosen_spanish: malvada
  alternatives_spanish:
  - malvada
  - mala
  - perversa
  - funesta
  lexicon: LSJ
  rationale: En este contexto, el adjetivo califica la muerte como ruinosa y dañina. «Malvada» conserva la carga moral y el tono fuerte sin sonar tan plano como «mala».
- source_word: αὐτῆς
  english_pob_choice: its
  chosen_spanish: su
  alternatives_spanish:
  - su
  - de ella
  lexicon: LSJ
  rationale: El pronombre femenino remite al antecedente femenino del contexto previo. En español, el posesivo «su» permite mantener esa referencia sin forzar una personificación adicional en el texto principal.
- source_word: λυσιτελής
  english_pob_choice: more advantageous
  chosen_spanish: más ventajoso
  alternatives_spanish:
  - más ventajoso
  - más provechoso
  - más beneficioso
  lexicon: LSJ
  rationale: El término expresa ventaja o provecho comparativo. «Más ventajoso» refleja bien la comparación implícita y suena natural en español moderno.
- source_word: μᾶλλον
  english_pob_choice: more
  chosen_spanish: más
  alternatives_spanish:
  - más
  - antes
  - mejor
  lexicon: LSJ
  rationale: Se conserva el valor comparativo explícito del adverbio con «más».
- source_word: ᾅδης
  english_pob_choice: Hades
  chosen_spanish: Hades
  alternatives_spanish:
  - el sepulcro
  - la región de los muertos
  - el inframundo
  lexicon: LSJ
  rationale: Se preserva el término griego transliterado para no diluir el referente del texto en una palabra más interpretativa como «sepulcro» o «infierno».
theological_decisions:
- issue: Tratamiento de ᾅδης
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - el sepulcro
  - la región de los muertos
  - el inframundo
  rationale: El griego usa explícitamente ᾅδης. Mantener «Hades» sigue de cerca la fuente y evita confundir el término con categorías doctrinales posteriores o con un simple entierro físico.
  doctrine_reference: Translation philosophy §1, §6
- issue: Referencia femenina de αὐτῆς
  english_pob_reading: its / her, referring back to the feminine antecedent in context
  chosen_spanish_reading: su, referido al antecedente femenino del contexto
  alternative_spanish_readings:
  - de ella
  - su muerte
  rationale: El español puede conservar la ambigüedad controlada del pronombre posesivo, y la nota explica que remite al antecedente femenino del contexto previo, sin imponer más interpretación de la necesaria.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El borrador sigue la última revisión del audit trail al mantener la precisión de αὐτῆς como posesivo explícito en la segunda cláusula y usar un adjetivo comparativo que refleje λυσιτελής sin introducir un objeto de comparación no presente en el griego. También conserva la repetición de θάνατος y el término ᾅδης sin domesticarlo.
  spanish_consistency_notes:
  - Se usa «Hades» de forma consistente para ᾅδης, en línea con el criterio del proyecto para mantener el término griego cuando la fuente lo hace explícito.
  - «Malvada» se eligió para πονηρός por su fuerza semántica; en este verso no se suaviza a «mala» para conservar la dureza retórica.
  - La posesividad «su» deja abierta la referencia femenina del antecedente contextual, que queda explicada en la nota.
  - La cláusula comparativa se traduce como «más ventajoso» para evitar sobretraducciones del matiz de λυσιτελής.
