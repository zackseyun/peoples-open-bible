  text: וַ/עֲצַ֣ת אֲחִיתֹ֗פֶל אֲשֶׁ֤ר יָעַץ֙ בַּ/יָּמִ֣ים הָ/הֵ֔ם כַּ/אֲשֶׁ֥ר יִשְׁאַל בִּ/דְבַ֣ר הָ/אֱלֹהִ֑ים כֵּ֚ן כָּל עֲצַ֣ת אֲחִיתֹ֔פֶל גַּם לְ/דָוִ֖ד גַּ֥ם לְ/אַבְשָׁלֹֽם־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/016/023.yaml
  text: Now the counsel of Ahithophel that he gave in those days was as if one inquired of God[a]; so was all the counsel of Ahithophel both to David and to Absalom.
  footnotes:
  - marker: a
    text: Or 'as when one inquires of a word from God.' The Hebrew comparison emphasizes how highly Ahithophel’s counsel was regarded.
    reason: lexical_alternative
