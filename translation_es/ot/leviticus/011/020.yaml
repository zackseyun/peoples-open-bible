translation:
  language: es
  text: Toda criatura alada[a] que pulula y anda sobre cuatro patas[b] es detestable para ustedes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Toda criatura voladora que pulula». El hebreo עוֹף puede denotar criaturas voladoras en sentido amplio, no solo aves.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «anda sobre cuatro». Es un modismo de locomoción cuadrúpeda; los versículos siguientes introducen una excepción para ciertos insectos saltadores.'
    reason: cultural_note
  - marker: c
    text: O «es una abominación para ustedes». Aquí el término expresa detestabilidad ritual en el marco de las leyes alimentarias.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  english_pob_choice: Every
  chosen_spanish: Todo
  alternatives_spanish:
  - Cada
  - Todo ser
  lexicon: HALOT
  rationale: El distributivo hebreo abarca a cada miembro de la clase; en español, «Todo» mantiene esa generalidad legal sin sonar forzado.
- source_word: שֶׁרֶץ
  english_pob_choice: swarming creature
  chosen_spanish: ser que se arrastra
  alternatives_spanish:
  - criatura que pulula
  - animal que se arrastra
  lexicon: HALOT
  rationale: En este contexto de pureza ritual, שֶׁרֶץ apunta a criaturas pequeñas vinculadas con movimiento rastrero o abundante. «Se arrastra» conserva el campo semántico sin introducir una categoría zoológica demasiado estrecha.
- source_word: הָעוֹף
  english_pob_choice: winged
  chosen_spanish: alado
  alternatives_spanish:
  - con alas
  - volador
  lexicon: HALOT
  rationale: La POB inglesa prefirió «winged» para no restringir el término a «birds». «Alado» funciona de manera natural en español y preserva la amplitud posible del hebreo.
- source_word: הַהֹלֵךְ
  english_pob_choice: that walks
  chosen_spanish: que anda
  alternatives_spanish:
  - que camina
  - que se mueve
  lexicon: HALOT
  rationale: El participio describe locomoción habitual. «Anda» es idiomático en español y mantiene la idea de movimiento característico.
- source_word: עַל אַרְבַּע
  english_pob_choice: on four feet
  chosen_spanish: sobre cuatro patas
  alternatives_spanish:
  - en cuatro patas
  - sobre cuatro pies
  lexicon: HALOT
  rationale: La POB revisó el inglés hacia una correspondencia más cercana con el hebreo. En español, «sobre cuatro patas» comunica bien el modismo y evita una calca extraña de «pies» en animales.
- source_word: שֶׁקֶץ
  english_pob_choice: detestable
  chosen_spanish: repugnante
  alternatives_spanish:
  - detestable
  - abominable
  lexicon: HALOT
  rationale: El término marca repulsión ritual y tabú alimentario. «Repugnante» expresa esa fuerza en español sin cargar necesariamente con asociaciones morales posteriores de «abominable».
- source_word: לָכֶם
  english_pob_choice: to you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - a ustedes
  - para vosotros
  lexicon: HALOT
  rationale: El dativo de relación dentro de la ley mosaica se expresa naturalmente en español con «para ustedes», manteniendo el destinatario plural de la norma.
theological_decisions:
- issue: Valor ritual de שֶׁקֶץ en leyes alimentarias
  english_pob_reading: The term here denotes ritual detestability in the food laws.
  chosen_spanish_reading: El término aquí denota repulsión ritual dentro de las leyes alimentarias.
  alternative_spanish_readings:
  - abominación ritual
  - impureza ritual
  rationale: No se debe diluir ni moralizar el término. «Repulsión ritual» conserva la fuerza del tabú alimentario y deja abierta la distinción entre contaminación ritual y juicio ético general.
  doctrine_reference: Levítico 11; distinción entre puro/impuro en la Torá
- issue: Alcance de עוֹף
  english_pob_reading: The Hebrew עוֹף can denote flying creatures broadly, not only birds.
  chosen_spanish_reading: עוֹף se refleja con un término amplio que no limite el referente a aves únicamente.
  alternative_spanish_readings:
  - aves
  - pájaros
  rationale: «Alado» evita reducir el campo semántico a aves, siguiendo la nota auditada de la POB y respetando la amplitud del hebreo en este pasaje.
  doctrine_reference: Levítico 11:13-23; clasificación de criaturas voladoras
- issue: Modismo de locomoción en cuatro extremidades
  english_pob_reading: Hebrew 'walks on four'; this idiom refers to locomotion on four legs, though the following verses make an exception for certain hopping insects.
  chosen_spanish_reading: El hebreo dice literalmente que anda sobre cuatro patas, un modismo de locomoción cuadrúpeda, aunque los versículos siguientes distinguen ciertos insectos saltadores.
  alternative_spanish_readings:
  - sobre cuatro pies
  - en cuatro patas
  rationale: Conviene conservar el modismo sin hacerlo parecer una observación anatómica ingenua. La formulación española mantiene la relación con el texto y deja espacio para la excepción posterior.
  doctrine_reference: Levítico 11:21-23
translation_notes:
  revision_awareness: Se siguió la revisión auditada que afinó el inglés desde «on all fours» a «on four feet». En español se optó por «sobre cuatro patas», que mantiene la cercanía semántica con el hebreo y suena natural en una norma sobre criaturas animales/insectiles.
  spanish_consistency_notes:
  - Se preservó «Yahvé» como norma general solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» y también se evitó «abominación» para שֶׁקֶץ, a fin de no moralizar el término.
  - «Alado» mantiene la amplitud de עוֹף sin restringirlo a aves.
  - «Para ustedes» conserva el destinatario plural legal de לָכֶם.
