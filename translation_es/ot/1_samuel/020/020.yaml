translation:
  language: es
  text: Y yo tiraré las tres flechas hacia un lado[a], como si estuviera tirando al blanco[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea puede entenderse como «al lado de ella / de eso»; el sufijo probablemente remite a la piedra o marcador mencionado en el contexto inmediato.
    reason: cross_reference
  - marker: b
    text: 'La frase hebrea es idiomática: literalmente, «para enviar para mí a un blanco», es decir, para simular una práctica personal de tiro con arco.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - En cuanto a mí
  - Y por mi parte
  lexicon: HALOT
  rationale: El pronombre independiente marca el cambio a la acción de Jonatán; en español, «Y yo» conserva esa transición discursiva de forma natural.
- source_word: שְׁלֹשֶׁת הַחִצִּים
  english_pob_choice: the three arrows
  chosen_spanish: los tres flech[a]s
  alternatives_spanish:
  - las tres flechas
  - tres flechas
  lexicon: HALOT
  rationale: El numeral con el sustantivo definido apunta a unas flechas específicas ya acordadas en el contexto. En español, la forma normal es «las tres flechas»; se evita una literalidad artificial.
- source_word: צִדָּה
  english_pob_choice: to the side
  chosen_spanish: hacia un lado
  alternatives_spanish:
  - al lado
  - a un lado
  lexicon: HALOT
  rationale: La expresión indica dirección lateral. «Hacia un lado» comunica el movimiento sin sobreespecificar el referente del sufijo, que el contexto amplia.
- source_word: אוֹרֶה
  english_pob_choice: I will shoot
  chosen_spanish: arrojaré
  alternatives_spanish:
  - dispararé
  - tiraré
  lexicon: HALOT
  rationale: En contexto de arquería, el sentido es «shoot». «Dispararé» también es posible, pero «arrojaré» se eligió para mantener una imagen verbal simple y no introducir un matiz moderno excesivamente técnico; aun así, la opción es discutible y queda reflejada entre las alternativas.
- source_word: לְשַׁלַּח לִי
  english_pob_choice: as though I were shooting for myself
  chosen_spanish: como si estuviera tirando para mí mismo
  alternatives_spanish:
  - como si estuviera enviándolas para mí
  - como si fuera a lanzar para mí mismo
  lexicon: HALOT
  rationale: El infinitivo con לְ y el dativo «para mí» expresa una acción hecha con apariencia de práctica personal. «Tirando» reproduce la acción de lanzar/disparar flechas en español natural, evitando una traducción mecánica de «enviar» que oscurecería el sentido idiomático.
- source_word: לְמַטָּרָה
  english_pob_choice: at a target
  chosen_spanish: a un blanco
  alternatives_spanish:
  - a un objetivo
  - a un blanco de tiro
  lexicon: HALOT
  rationale: מַטָּרָה es el blanco o diana de arquería. «Blanco» es el término más idiomático en español para este contexto y conserva la imagen concreta del ejercicio de tiro.
translation_notes:
  revision_awareness: La traducción inglesa auditada pasó de «to the side of it» a «to the side» al eliminar un objeto no presente explícitamente en el hebreo. La versión española sigue esa decisión al no introducir un complemento inexistente y mantiene el valor idiomático del final con una construcción natural en español.
  spanish_consistency_notes:
  - Se usa «Y yo» para preservar el contraste discursivo del hebreo.
  - Se evita «Señor» o terminología teológica no pertinente; el versículo no contiene nombres divinos ni títulos cristológicos.
  - «Blanco» se usa en sentido de tiro con arco, no como «objetivo» abstracto.
  - La frase «como si estuviera tirando para mí mismo» intenta conservar la lectura aparente/performativa del hebreo sin volverla excesivamente literal.
