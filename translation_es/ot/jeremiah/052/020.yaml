revisions:
- from: En cuanto a las dos columnas[a], el único mar, y los doce bueyes de bronce que estaban debajo de los soportes[b], que el rey Salomón había hecho para la casa de Yahvé[c] — no había peso para el bronce de todos estos utensilios.
  to: En cuanto a las dos columnas[a], el Mar[b], y los doce bueyes de bronce que estaban debajo de los soportes, que el rey Salomón había hecho para la casa de Yahvé, no había peso[c] para el bronce de todos estos utensilios.
  rationale: Se corrigió «el único mar» a «el Mar» con nota para reflejar mejor el nombre técnico del objeto y el valor inventarial de אֶחָד sin crear una frase española extraña. Se reemplazó la nota [a] por una alternativa real («pilares»), se eliminó la nota innecesaria sobre «Yahvé», y se añadió una nota en «no había peso» para preservar la ambigüedad documentada en el POB inglés. El resto del texto se mantuvo porque es fiel y natural en español.
