translation:
  language: es
  text: Los objetos de madera y los recubiertos de oro y los recubiertos de plata son como piedras del monte, y los que los sirven[a] serán avergonzados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los que los adoran'. El verbo griego puede denotar servicio o adoración cultual.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς ἀπὸ τοῦ ὄρους λίθοις
  english_pob_choice: stones from the mountain
  chosen_spanish: piedras del monte
  alternatives_spanish:
  - piedras de la montaña
  - piedras sacadas del monte
  lexicon: LSJ
  rationale: La comparación no exige precisar cantería; 'piedras del monte' mantiene la imagen simple e inertemente material del griego y suena natural en español bíblico moderno.
- source_word: ὡμοιωμένοι εἰσὶν
  english_pob_choice: are like
  chosen_spanish: son como
  alternatives_spanish:
  - han sido hechas como
  - son comparables a
  lexicon: LSJ
  rationale: '''Son como'' expresa de manera idiomática el estado comparativo sin forzar una construcción demasiado literal en español.'
- source_word: τὰ ξύλινα
  english_pob_choice: the wooden things
  chosen_spanish: las cosas de madera
  alternatives_spanish:
  - los objetos de madera
  - los ídolos de madera
  lexicon: LSJ
  rationale: El sustantivo adjetival griego es literalmente 'las de madera'; 'cosas de madera' conserva la forma más cercana sin introducir 'ídolos' en el texto principal.
- source_word: τὰ περίχρυσα
  english_pob_choice: the gold-covered things
  chosen_spanish: las cosas cubiertas de oro
  alternatives_spanish:
  - las cosas doradas
  - las cosas revestidas de oro
  lexicon: LSJ
  rationale: '''Cubiertas de oro'' refleja el sentido de algo recubierto u overlayed con oro y mantiene el paralelismo con el término siguiente.'
- source_word: τὰ περιάργυρα
  english_pob_choice: the silver-covered things
  chosen_spanish: las cosas cubiertas de plata
  alternatives_spanish:
  - las cosas plateadas
  - las cosas revestidas de plata
  lexicon: LSJ
  rationale: Se conserva el paralelismo material con περίχρυσα y la referencia a objetos recubiertos de plata.
- source_word: οἱ δὲ θεραπεύοντες αὐτὰ
  english_pob_choice: those who serve them
  chosen_spanish: los que les sirven
  alternatives_spanish:
  - los que las sirven
  - los que las adoran
  lexicon: LSJ
  rationale: '''Servir'' preserva el rango de θεραπεύω y evita reducirlo automáticamente a ''adorar'', aunque el contexto sea idolátrico. El pronombre ''les'' refleja el objeto pronominal plural en español para seres/personas o entidades personificadas.'
- source_word: κατασχυνθήσονται
  english_pob_choice: will be put to shame
  chosen_spanish: serán avergonzados
  alternatives_spanish:
  - serán puestos en vergüenza
  - serán cubiertos de vergüenza
  lexicon: LSJ
  rationale: El futuro pasivo comunica la vergüenza judicial/profética; 'serán avergonzados' es natural en español y conserva la pasividad del griego.
theological_decisions:
- issue: θεραπεύοντες en contexto de idolatría
  english_pob_reading: those who serve them
  chosen_spanish_reading: los que les sirven
  alternative_spanish_readings:
  - los que las adoran
  rationale: El contexto claramente es cultual e idolátrico, pero el verbo griego puede significar tanto 'servir' como 'rendir culto'. Se conserva 'servir' en el texto principal para no estrechar innecesariamente el alcance léxico; 'adorar' queda como alternativa interpretativa válida.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador sigue esa lectura de alta concordancia y mantiene la decisión POB de conservar la amplitud de θεραπεύω con una nota alternativa.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o terminología de máscara porque el pasaje no contiene el nombre divino.
  - '''Monte'' se prefirió sobre ''montaña'' por fluidez y por mantener el tono bíblico sin añadir especificidad geográfica no presente en el griego.'
  - '''Cosas de madera/oro/plata'' conserva el sustantivo implícito del griego, en vez de insertar explícitamente ''ídolos'' en el texto principal.'
