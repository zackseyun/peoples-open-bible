translation:
  language: es
  text: Entonces sacrificaron el toro y llevaron al niño ante Elí[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mataron». El verbo hebreo puede traducirse de modo más general, pero «sacrificaron» refleja mejor el contexto sacrificial.
    reason: lexical_alternative
  - marker: b
    text: O «el muchacho». El hebreo naʿar puede referirse a un niño, muchacho o joven, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחֲטוּ
  english_pob_choice: Then they slaughtered
  chosen_spanish: Entonces sacrificaron
  alternatives_spanish:
  - entonces lo mataron
  - y sacrificaron
  lexicon: HALOT
  rationale: El hebreo describe una acción ritual de sacrificio; en español, «sacrificaron» comunica mejor ese contexto cultual que el más genérico «mataron». «Entonces» refleja la secuencia narrativa del wayyiqtol.
- source_word: הַפָּר
  english_pob_choice: the bull
  chosen_spanish: el toro
  alternatives_spanish:
  - el buey
  - el novillo
  lexicon: HALOT
  rationale: פָּר designa un toro/bull en contexto sacrificial. «Toro» es natural en español y conserva la fuerza del sustantivo sin sobreexplicar edad o tamaño que el versículo no especifica.
- source_word: וַיָּבִיאוּ
  english_pob_choice: and brought
  chosen_spanish: llevaron
  alternatives_spanish:
  - trajeron
  - y llevaron
  lexicon: HALOT
  rationale: En este contexto de acercar al muchacho a Eli, «llevaron» expresa adecuadamente el movimiento hacia una persona. Mantiene la fluidez narrativa del wayyiqtol.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el joven
  lexicon: HALOT
  rationale: נַעַר puede referirse a niño, muchacho o joven. Aquí Samuel sigue siendo pequeño, por lo que «muchacho» conserva el sentido de joven de corta edad sin forzar «niño» ni elevarlo a «joven».
- source_word: אֶל עֵלִי
  english_pob_choice: to Eli
  chosen_spanish: a Eli
  alternatives_spanish:
  - ante Eli
  - hacia Eli
  lexicon: HALOT
  rationale: La preposición אֶל indica dirección hacia una persona. En español, «a Eli» es la forma más directa y natural.
theological_decisions:
- issue: Matiz sacrificial del verbo
  english_pob_reading: Render the verb as 'slaughtered' to preserve the likely sacrificial setting without adding explanatory wording not present in the Hebrew.
  chosen_spanish_reading: Usar «sacrificaron» para mantener el marco cultual implícito en el contexto inmediato, sin añadir explicación extra al texto.
  alternative_spanish_readings:
  - mataron
  - degollaron
  rationale: El contexto de adoración y ofrenda en Silo favorece un verbo con resonancia ritual. «Sacrificaron» preserva esa tensión semántica de forma clara para el lector español.
  doctrine_reference: Sacrificial context of the tabernacle worship narrative in 1 Samuel 1
translation_notes:
  revision_awareness: 'Coincide con el auditorio inglés en la decisión principal: conservar el matiz sacrificial del verbo y la ambigüedad contextual de naʿar, sin cambios sustanciales respecto del último pase revisado.'
  spanish_consistency_notes:
  - Se mantiene la secuencia narrativa con «Entonces» para corresponder al valor consecutivo del wayyiqtol.
  - Se evita «SEÑOR» u otra sustitución teológica, porque aquí no aparece el nombre divino ni un equivalente a κύριος.
  - «Eli» se conserva como nombre propio sin adaptación ortográfica.
