translation:
  language: es
  text: Entonces Filopátor, habiendo sabido por los que habían regresado de la incautación de las regiones bajo su dominio por parte de Antíoco, dio órdenes a todas sus fuerzas de infantería y caballería, tomó consigo a su hermana Arsinoe y partió hasta la región de Rafía, donde los que estaban con Antíoco[a] habían acampado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego «los que estaban con Antíoco» es un giro idiomático para su partido o fuerzas; puede incluir al propio Antíoco.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ο ΔΕ
  english_pob_choice: Now
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: LSJ
  rationale: δέ marca avance narrativo más que contraste fuerte; «Entonces» suena natural en español y conserva la secuencia del relato.
- source_word: Φιλοπάτωρ
  english_pob_choice: Philopator
  chosen_spanish: Filopátor
  alternatives_spanish:
  - Filopator
  lexicon: Transliteración propia del nombre griego
  rationale: Se translitera el nombre/título personal para mantener el referente histórico y la forma de nombre propia del texto.
- source_word: παρὰ τῶν ἀνακομισθέντων
  english_pob_choice: from those who had returned
  chosen_spanish: por los que habían regresado
  alternatives_spanish:
  - de los que habían regresado
  - por los que habían vuelto
  lexicon: LSJ
  rationale: El participio indica personas que volvieron; «por los que habían regresado» mantiene la fuente de la información sin convertirlos explícitamente en mensajeros.
- source_word: μαθών
  english_pob_choice: learned
  chosen_spanish: habiendo sabido
  alternatives_spanish:
  - cuando supo
  - al enterarse
  lexicon: LSJ
  rationale: El participio aoristo introduce acción antecedente; «habiendo sabido» conserva la relación temporal y el matiz de recibir noticia.
- source_word: τὴν γινομένην ... ἀφαίρεσιν
  english_pob_choice: the seizure
  chosen_spanish: la desposesión
  alternatives_spanish:
  - el despojo
  - la toma
  lexicon: LSJ
  rationale: ἀφαίρεσις es «quitar, remover, despojar»; «desposesión» recoge el acto de retirar territorios y evita suavizar el hecho a una mera «toma».
- source_word: τῶν ἐπ᾽ αὐτοῦ κρατουμένων τόπων
  english_pob_choice: the regions under his rule
  chosen_spanish: de las regiones que estaban bajo su dominio
  alternatives_spanish:
  - de los territorios bajo su control
  - de las regiones que retenía
  lexicon: LSJ
  rationale: κρατουμένων expresa territorios mantenidos/controlados; «bajo su dominio» reproduce el sentido político con claridad en español.
- source_word: ὑπὸ Ἀντιόχου
  english_pob_choice: by Antiochus
  chosen_spanish: que Antíoco estaba haciendo
  alternatives_spanish:
  - por Antíoco
  - de parte de Antíoco
  lexicon: LSJ
  rationale: La construcción completa en español integra el agente dentro del sintagma nominal y mantiene la referencia a la acción de Antíoco sobre las regiones.
- source_word: παραγγείλας
  english_pob_choice: he gave orders to
  chosen_spanish: dio órdenes a
  alternatives_spanish:
  - ordenó a
  - mandó a
  lexicon: LSJ
  rationale: Verbo de mando militar; «dio órdenes a» es claro y fiel al tono de campaña.
- source_word: ταῖς πάσαις δυνάμεσιν πεζικαῖς καὶ ἱππικαῖς
  english_pob_choice: all his infantry and cavalry forces
  chosen_spanish: todas sus fuerzas de infantería y caballería
  alternatives_spanish:
  - toda su infantería y caballería
  - todas sus tropas de a pie y de a caballo
  lexicon: LSJ
  rationale: Los adjetivos militares griegos se rinden de forma directa con «infantería y caballería»; «fuerzas» mantiene el plural y el alcance total.
- source_word: καὶ τὴν ἀδελφὴν Ἀρσινόην συνπαραλαβών
  english_pob_choice: took along his sister Arsinoe
  chosen_spanish: tomó consigo a su hermana Arsinoe
  alternatives_spanish:
  - llevó también a su hermana Arsinoe
  - tomó con él a su hermana Arsinoe
  lexicon: LSJ
  rationale: συνπαραλαβών implica llevar consigo; «tomó consigo» suena natural y conserva el matiz de acompañamiento.
- source_word: ἐξώρμησεν
  english_pob_choice: set out
  chosen_spanish: avanzó
  alternatives_spanish:
  - partió
  - se puso en marcha
  lexicon: LSJ
  rationale: En contexto militar, «avanzó» comunica movimiento expedicionario sin añadir demasiado énfasis interpretativo.
- source_word: μέχρι τῶν κατὰ Ῥαφίαν τόπων
  english_pob_choice: as far as the region of Raphia
  chosen_spanish: hasta la región de Rafía
  alternatives_spanish:
  - hasta los lugares de Rafía
  - hasta los alrededores de Rafía
  lexicon: LSJ
  rationale: La preposición indica límite de avance; «hasta la región de Rafía» refleja el valor geográfico sin volverlo más específico de lo que el griego permite.
- source_word: ὅπου παρεμβεβλήκεισαν
  english_pob_choice: where ... had encamped
  chosen_spanish: donde ... habían acampado
  alternatives_spanish:
  - donde ... estaban acampados
  - donde ... habían levantado el campamento
  lexicon: LSJ
  rationale: El pluscuamperfecto señala un campamento previo al arribo de Filopátor; «habían acampado» preserva ese orden temporal.
- source_word: οἱ περὶ Ἀντίοχον
  english_pob_choice: those with Antiochus
  chosen_spanish: los que estaban con Antíoco
  alternatives_spanish:
  - la gente de Antíoco
  - los de Antíoco
  lexicon: LSJ
  rationale: Se mantiene la idiomática griega de compañía/partido sin decidir explícitamente si incluye solo tropas o también a Antíoco mismo.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del inglés POB: adopta una estructura participial equivalente a «having learned» y traduce ἀφαίρεσις como un sustantivo de desposesión/despojo, en lugar de una perífrasis verbal más débil. También conserva el cierre idiomático «los que estaban con Antíoco» para οἱ περὶ Ἀντίοχον.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma general solo cuando aparezca el tetragrámaton; aquí no aplica.
  - «Filopátor» se translitera de forma consistente con los nombres propios helenísticos del proyecto.
  - Se evita «Señor» como sustituto; el texto no contiene el nombre divino.
  - El registro es formal y narrativo, con vocabulario militar claro pero no excesivamente técnico.
