    issue: «enviaré palabra» es poco idiomático en español
    rationale: Aunque intenta reflejar «send word», en español neutro y digno suena forzado. El griego expresa enviar un mensaje/aviso; «le enviaré aviso» o «mandaré aviso» preserva el sentido de comunicación de manera natural.
  - severity: low
    issue: «lo que te concierne» suena abstracto y algo jurídico
    rationale: τὰ κατὰ σέ se refiere a las cosas relativas a Tobias, es decir, su situación o cómo está. Una formulación más natural como «cómo estás» comunica el sentido sin perder fidelidad.
