translation:
  language: es
  text: Descuidaste[a] la Roca que te engendró[b], y olvidaste al Dios que te dio a luz[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo hebreo es difícil; también puede traducirse ‘olvidaste’ o ‘no tuviste en cuenta’.
    reason: lexical_alternative
  - marker: b
    text: O ‘te hizo nacer’; el hebreo usa lenguaje de generación.
    reason: lexical_alternative
  - marker: c
    text: O ‘que te trajo al mundo’; el hebreo usa imaginería de parto.
    reason: lexical_alternative
lexical_decisions:
- source_word: צור
  english_pob_choice: the Rock
  chosen_spanish: la Roca
  alternatives_spanish:
  - la roca
  lexicon: HALOT
  rationale: צור es literalmente ‘roca’, pero en Deuteronomio funciona como título divino. Mayúscula inicial preserva el valor titular sin perder la metáfora.
- source_word: ילדך
  english_pob_choice: who fathered you
  chosen_spanish: que te engendró
  alternatives_spanish:
  - que te padreó
  - que te dio origen
  lexicon: HALOT
  rationale: El verbo hebreo expresa generación/procreación. ‘Engendró’ conserva la relación paterna del texto y su fuerza bíblica mejor que una formulación más genérica.
- source_word: תשי
  english_pob_choice: you neglected
  chosen_spanish: descuidaste
  alternatives_spanish:
  - olvidaste
  - no tuviste en cuenta
  - desatendiste
  lexicon: HALOT
  rationale: La forma es difícil y el audit trail inglés la toma como desprecio/descuido más que como ‘olvidar’ literal. ‘Descuidaste’ reproduce ese matiz de culpable desatención sin borrar la tensión semántica.
- source_word: ותשכח
  english_pob_choice: and forgot
  chosen_spanish: y olvidaste
  alternatives_spanish:
  - y te olvidaste
  - y desatendiste
  lexicon: HALOT
  rationale: Mantiene el paralelo directo con el verbo previo y es idiomático en español.
- source_word: אל
  english_pob_choice: the God
  chosen_spanish: al Dios
  alternatives_spanish:
  - a Dios
  - al Poderoso
  lexicon: HALOT
  rationale: Aquí אל refiere al Dios de Israel en paralelismo con ‘la Roca’; el artículo definido ayuda a conservar esa referencia concreta.
- source_word: מחללך
  english_pob_choice: who gave you birth
  chosen_spanish: que te dio a luz
  alternatives_spanish:
  - que te hizo nacer
  - que te trajo al mundo
  - que te dio nacimiento
  lexicon: HALOT
  rationale: El hebreo usa imaginería de parto. ‘Dio a luz’ preserva la imagen materna sin suavizarla hacia ‘crear’ o ‘formar’.
theological_decisions:
- issue: Juxtaposición de imaginería paterna y materna aplicada a Dios
  english_pob_reading: Retain both paternal ('fathered') and maternal ('gave you birth') metaphors in the main text.
  chosen_spanish_reading: Conservar tanto ‘engendró’ como ‘dio a luz’ en el texto principal.
  alternative_spanish_readings:
  - ‘que te creó’ / ‘que te formó’
  - ‘que te hizo nacer’
  rationale: El hebreo yuxtapone intencionalmente lenguaje de paternidad y de parto. La traducción española mantiene esa tensión en lugar de resolverla con lenguaje más abstracto.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje presenta un paralelismo con dos verbos difíciles y dos imágenes parentales complementarias. Se siguió la lectura auditada del POB inglés, conservando la tensión semántica y el valor titular de ‘Roca’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma predeterminada solo cuando aparece el Tetragrámaton; este versículo no lo contiene.
  - ‘Dios’ se mantiene con artículo definido para reflejar el referente concreto del hebreo.
  - La mayúscula en ‘Roca’ señala uso titular, coherente con el tratamiento POB del título divino.
