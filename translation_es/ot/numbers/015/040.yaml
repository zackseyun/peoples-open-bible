- from: para que recuerden y hagan todos mis mandamientos[a], y sean santos para su Dios.
  to: para que recuerden y hagan todos mis mandamientos[a], y sean santos para con su Dios.
  rationale: Se conserva el sentido completo del hebreo y de la traducción POB en inglés, pero se ajusta la preposición final para lograr un español más natural y más fiel a la relación expresada por לֵאלֹהֵיכֶם. 'Para con su Dios' evita la torpeza de 'para su Dios' y mantiene la idea de santidad en relación con Dios, sin reducirla a mera pertenencia o finalidad. La nota alternativa se armoniza con esa mejora.
