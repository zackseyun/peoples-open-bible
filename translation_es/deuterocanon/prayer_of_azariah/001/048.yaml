translation:
  language: es
  text: Bendigan al Señor, noches y días; canten alabanzas y exáltenlo sobremanera por siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Bendigan
  - Alabad
  lexicon: BDAG
  rationale: Conserva el imperativo plural y el valor litúrgico de εὐλογεῖτε. En español, 'bendecid' mantiene mejor la forma exhortativa solemne que 'alabad', que además duplicaría el matiz ya presente en ὑμνεῖτε.
- source_word: νύκτες καὶ ἡμέραι
  english_pob_choice: nights and days
  chosen_spanish: noches y días
  alternatives_spanish:
  - noche y día
  - las noches y los días
  lexicon: LSJ
  rationale: El plural personificado del griego se conserva mejor con 'noches y días'. 'Noche y día' suaviza la pluralidad y perdería parte del tono poético de convocatoria a la creación.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - al Dueño
  lexicon: BDAG
  rationale: El griego κύριος se vierte de manera natural como 'Señor' en este contexto doxológico. El artículo y la preposición se integran en español con 'al Señor'.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cantad alabanzas
  alternatives_spanish:
  - entonad himnos
  - alabad en canto
  lexicon: BDAG
  rationale: La acción incluye alabanza en forma musical; 'cantad alabanzas' comunica el matiz sin el anglicismo ni la rigidez de 'hymn'.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exaltadlo sobremanera
  alternatives_spanish:
  - exaltadlo en gran manera
  - levantadlo en extremo
  lexicon: BDAG
  rationale: El compuesto intensifica el verbo simple. 'Sobremanera' reproduce la intensificación de forma idiomática y solemne; el enclítico 'lo' refleja el objeto directo ya presente en griego.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: La frase griega expresa duración indefinida y solemne. 'Por los siglos' retiene el plural del griego y su cadencia doxológica, sin añadir la expansión litúrgica de 'de los siglos' que no está en el texto.
theological_decisions:
- issue: κύριος en una doxología griega deuterocanónica
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el SEÑOR
  - el Dueño
  rationale: El texto griego usa κύριος y no el tetragrámaton. Por eso se mantiene 'Señor' como equivalente natural y reverente, sin aplicar la convención tipográfica reservada para casos hebreos de YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Duplicación del objeto en los verbos de alabanza
  english_pob_reading: sing praise and highly exalt him forever
  chosen_spanish_reading: cantad alabanzas y exaltadlo sobremanera por los siglos
  alternative_spanish_readings:
  - cantad alabanzas y exaltad al Señor sobremanera por los siglos
  - cantad alabanzas y alzadlo muy alto por siempre
  rationale: Como en la revisión inglesa, el segundo verbo también gobierna al mismo objeto. Por eso se evita añadir un 'a él' o una repetición innecesaria del objeto, manteniendo la concisión del griego.
  doctrine_reference: Revisión auditada 2026-04-23T15:40:28Z
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó 'to him' para reflejar más de cerca el griego, porque ambos verbos tienen el mismo objeto directo ya expreso. La redacción española sigue esa decisión al usar 'exaltadlo' sin repetir el complemento.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος conforme al criterio POB en griego, sin usar 'Yahvé' porque aquí no aparece el nombre divino hebreo.
  - '''Bendecid'' se reserva para εὐλογεῖτε y ''cantad alabanzas'' para ὑμνεῖτε, de modo que no se aplaste la distinción entre bendecir y cantar alabanza.'
  - La estructura poética con vocativos plurales se conserva en español mediante 'noches y días'.
