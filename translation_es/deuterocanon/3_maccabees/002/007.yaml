translation:
  language: es
  text: Ellos también, al ver las obras de tu mano, te alabaron a ti, el Todopoderoso.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ καὶ
  english_pob_choice: They too
  chosen_spanish: Ellos también
  alternatives_spanish:
  - Y ellos
  - Esos también
  lexicon: LSJ
  rationale: El artículo con καί añade al grupo ya implícito; «ellos también» conserva el valor aditivo de manera natural en español y mantiene el énfasis resumptivo sin sobrecargar la frase.
- source_word: συνιδόντες
  english_pob_choice: seeing
  chosen_spanish: al ver
  alternatives_spanish:
  - viendo
  - habiendo visto
  - al percibir
  lexicon: LSJ
  rationale: El participio aoristo expresa relación temporal con la acción principal; «al ver» reproduce bien esa conexión en español y evita una paráfrasis interpretativa.
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - obras
  - hechos
  - actos
  lexicon: LSJ
  rationale: «Obras» es el equivalente bíblico más natural en español para ἔργα en este contexto y mantiene el tono escritural asociado a las acciones divinas.
- source_word: σῆς χειρός
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu poder
  - tu obra de tus manos
  - tu mano poderosa
  lexicon: LSJ
  rationale: Se conserva la metáfora antropomórfica de la mano divina. «Tu mano» es la correspondencia más directa y evita interpretar el giro como simple sinónimo de «poder».
- source_word: ἤνεσάν
  english_pob_choice: praised
  chosen_spanish: te alabaron
  alternatives_spanish:
  - te dieron alabanza
  - te exaltaron
  - te celebraron
  lexicon: LSJ
  rationale: El verbo αἰνέω se expresa de forma más idiomática en español bíblico con «alabar». El objeto directo de alabanza queda claro con el pronombre «te».
- source_word: τὸν παντοκράτορα
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - el Todo-poderoso
  lexicon: LSJ
  rationale: «Todopoderoso» es el equivalente bíblico tradicional y transparente para παντοκράτωρ en español. Conserva el título divino sin añadir contenido doctrinal extra.
theological_decisions:
- issue: Título divino παντοκράτωρ
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Todopoderoso
  alternative_spanish_readings:
  - el Omnipotente
  - el Todo-poderoso
  rationale: El texto griego emplea un título de soberanía universal. «Todopoderoso» comunica fielmente esa amplitud y es el uso más estable en español bíblico, sin sustituirlo por una forma más interpretativa.
  doctrine_reference: Consistencia de títulos divinos; fidelidad léxica al griego
- issue: Relación participial de συνιδόντες
  english_pob_reading: seeing
  chosen_spanish_reading: al ver
  alternative_spanish_readings:
  - viendo
  - habiendo visto
  rationale: El participio no introduce una acción nueva independiente, sino una circunstancia previa o concomitante a la alabanza. «Al ver» preserva esa relación sin forzar una subordinada más pesada.
  doctrine_reference: Equivalencia óptima; sintaxis participial griega
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que simplificó la relación participial a una forma más directa («seeing») sin perder los elementos del original. La versión española adopta la misma economía sintáctica con «al ver», manteniendo el registro formal y la metáfora de la mano divina.
  spanish_consistency_notes:
  - Se preservó «mano» para σῆς χειρός por coherencia con el antropomorfismo bíblico y para evitar una glosa interpretativa.
  - Se optó por «Todopoderoso» como equivalente establecido de παντοκράτωρ, en armonía con el uso bíblico español y con la decisión inglesa auditada.
  - El pronombre explícito «te» mantiene claro el destinatario de la alabanza, como en el griego y en la traducción inglesa auditada.
