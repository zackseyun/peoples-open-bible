translation:
  language: es
  text: 'Entonces fue y llegó al hombre de Dios en el monte Carmelo. Y cuando el hombre de Dios la vio[a] de lejos, dijo a Giezi su siervo: «Mira, aquella sunamita».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde lejos». La expresión hebrea indica que la vio cuando todavía estaba a cierta distancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶךְ
  english_pob_choice: So she went
  chosen_spanish: Así que ella fue
  alternatives_spanish:
  - Entonces ella fue
  - Y ella fue
  lexicon: WLC / HALOT
  rationale: El wayyiqtol avanza la narración con secuencia. «Así que» refleja bien el enlace narrativo del inglés POB y «fue» es natural en español para ir a un lugar, sin perder el movimiento.
- source_word: וַתָּבֹא
  english_pob_choice: and came
  chosen_spanish: y llegó
  alternatives_spanish:
  - y vino
  - y llegó hasta
  lexicon: WLC / HALOT
  rationale: בוא puede ser «venir/llegar». En este contexto, tras «fue», «llegó» comunica la culminación del movimiento de manera idiomática y fiel.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  - el profeta de Dios
  lexicon: WLC / HALOT
  rationale: Se conserva el título hebreo de modo directo. «Hombre de Dios» mantiene la designación tradicional bíblica sin sustituirla por «profeta», que interpretaría el término.
- source_word: אֶל הַר הַכַּרְמֶל
  english_pob_choice: at Mount Carmel
  chosen_spanish: en el monte Carmelo
  alternatives_spanish:
  - al monte Carmelo
  - en el monte del Carmelo
  lexicon: WLC / HALOT
  rationale: El segundo אֶל ubica al hombre de Dios en ese lugar. En español, «en el monte Carmelo» expresa la localización de forma natural, mientras «al» podría sonar más direccional que locativa aquí.
- source_word: מִנֶּגֶד
  english_pob_choice: from a distance
  chosen_spanish: de lejos
  alternatives_spanish:
  - a distancia
  - desde lejos
  lexicon: WLC / HALOT
  rationale: La expresión señala que él la vio cuando aún estaba separada por cierta distancia. «De lejos» es idiomático y conserva el valor espacial del hebreo sin añadir más precisión de la que el texto da.
- source_word: נַעֲרוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su servidor
  - su asistente
  lexicon: WLC / HALOT
  rationale: El término designa la función de Gehazi respecto de Elisha. «Siervo» conserva la fuerza de subordinación personal; se evita «asistente» por suavizar demasiado el término.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - Observa
  lexicon: WLC / HALOT
  rationale: «Mira» reproduce la llamada de atención inmediata de הִנֵּה con un registro natural en español contemporáneo.
- source_word: הַשּׁוּנַמִּית הַלָּז
  english_pob_choice: that Shunammite woman
  chosen_spanish: aquella sunamita
  alternatives_spanish:
  - esa sunamita
  - aquella mujer de Sunem
  lexicon: WLC / HALOT
  rationale: Se conserva la demostración distante del hebreo con «aquella». «Sunamita» funciona como gentilicio sustantivado en español bíblico y evita una expansión innecesaria como «mujer de Sunem».
translation_notes:
  revision_awareness: El texto castellano sigue de cerca el sentido y la secuencia del hebreo, en continuidad con el audit trail inglés. No se documentaron revisiones textuales ni cambios de lectura en el paquete fuente, y la traducción mantiene la misma lectura básica sin añadir interpretaciones.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en el título «hombre de Dios».
  - Se conserva la puntuación narrativa con dos oraciones unidas por punto y coma implícito en la cadencia del versículo, pero en español se normaliza con punto y comillas para el dicho directo.
  - «Sunamita» se usa como gentilicio bíblico natural y consistente con el registro eclesial en español.
  - La nota al pie marca la alternativa de sentido de מִנֶּגֶד sin debilitar el texto principal.
