translation:
  language: es
  text: después de que el rey Jeconías, la reina madre, los funcionarios de la corte[a], los oficiales de Judá y Jerusalén[b], y los artesanos y los trabajadores del metal[c] salieron de Jerusalén—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los eunucos»; el término hebreo puede referirse específicamente a eunucos o más ampliamente a funcionarios reales.
    reason: lexical_alternative
  - marker: b
    text: O «los príncipes de Judá y Jerusalén».
    reason: lexical_alternative
  - marker: c
    text: O «los herreros».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - luego de
  lexicon: HALOT
  rationale: La preposición temporal exige en español una fórmula natural; «después de» conserva el valor secuencial del hebreo sin añadir matices innecesarios.
- source_word: צֵאת
  english_pob_choice: had gone out
  chosen_spanish: la salida de
  alternatives_spanish:
  - que salió
  - tras haber salido
  lexicon: HALOT
  rationale: El infinitivo constructo puede expresarse en español como sustantivo verbal para mantener la estructura temporal del hebreo sin forzar un pretérito perfecto compuesto que suene menos natural en esta cláusula.
- source_word: יְכָנְיָה
  english_pob_choice: Jeconiah
  chosen_spanish: Jeconías
  alternatives_spanish:
  - Jeconías
  - Conías
  lexicon: HALOT
  rationale: Se conserva la forma tradicional española del nombre propio, manteniendo la identidad histórica del personaje sin armonizarlo con variantes de otros pasajes.
- source_word: הַמֶּלֶךְ
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: 'El título en aposición se vierte de manera directa y natural en español: «el rey».'
- source_word: הַגְּבִירָה
  english_pob_choice: the queen mother
  chosen_spanish: la reina madre
  alternatives_spanish:
  - la señora
  - la reina
  lexicon: HALOT
  rationale: En contexto real, גְּבִירָה designa la figura institucional de la madre del rey; «reina madre» comunica mejor esa función que un término más genérico como «señora».
- source_word: הַסָּרִיסִים
  english_pob_choice: the court officials
  chosen_spanish: los funcionarios de la corte
  alternatives_spanish:
  - los eunucos
  - los oficiales
  lexicon: HALOT
  rationale: La POB inglesa opta por una lectura funcional amplia; «funcionarios de la corte» preserva esa ambigüedad entre eunucos y funcionarios palatinos sin imponer una lectura biológica que el contexto no obliga a tomar.
- source_word: שָׂרֵי יְהוּדָה וִירוּשָׁלַם
  english_pob_choice: the officials of Judah and Jerusalem
  chosen_spanish: los oficiales de Judá y de Jerusalén
  alternatives_spanish:
  - los príncipes de Judá y de Jerusalén
  - los líderes de Judá y de Jerusalén
  lexicon: HALOT
  rationale: «שָׂרִים» puede referirse a jefes, líderes u oficiales; en un listado administrativo, «oficiales» refleja mejor la función gubernativa que «príncipes», que en español moderno suena demasiado aristocrático.
- source_word: וְהֶחָרָשׁ
  english_pob_choice: the craftsmen
  chosen_spanish: los artesanos
  alternatives_spanish:
  - los artesanos especializados
  - los herreros
  lexicon: HALOT
  rationale: «חרש» es un término amplio para trabajador hábil; «artesanos» mantiene esa amplitud y deja espacio para el término siguiente.
- source_word: וְהַמַּסְגֵּר
  english_pob_choice: the metalworkers
  chosen_spanish: los metalúrgicos
  alternatives_spanish:
  - los herreros
  - los metaltrabajadores
  lexicon: HALOT
  rationale: La pareja con «artesanos» sugiere una especialización en el trabajo del metal; «metalúrgicos» es una forma moderna y clara para ese campo semántico, equivalente funcional de «metalworkers».
- source_word: מִירוּשָׁלִָם
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  lexicon: HALOT
  rationale: La marca de procedencia final se traduce con la preposición simple «de», suficiente en español para indicar el lugar del que salieron los mencionados.
translation_notes:
  revision_awareness: 'Concordancia alta con el pasaje fuente y con la POB inglesa: se mantiene la lista de figuras y oficios, la ambigüedad controlada de סריסים y la posibilidad alternativa para הַמַּסְגֵּר. No se aplicaron revisiones posteriores porque el audit trail indica que no hubo cambios necesarios.'
  spanish_consistency_notes:
  - Se preserva «Yahvé» en el proyecto como norma general, pero este versículo no contiene el nombre divino.
  - Se evita «SEÑOR» para יהוה porque no aparece en este texto.
  - Se mantiene la distinción entre «oficiales» y «funcionarios de la corte» según el matiz administrativo del hebreo y la solución funcional de la POB inglesa.
  - La puntuación con raya final reproduce el cierre incompleto del versículo en el contexto narrativo.
