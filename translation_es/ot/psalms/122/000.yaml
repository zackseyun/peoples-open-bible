translation:
  language: es
  text: 'Cántico de subidas[a]. De David. Me alegré cuando me dijeron[b]: «Vayamos a la casa de Yahvé[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Encabezado hebreo: «Cántico de subidas»; probablemente indica una colección de peregrinación o litúrgica; alternativamente, «un cántico de ascensos».'
    reason: cultural_note
  - marker: b
    text: 'O: «Me alegré cuando me dijeron».'
    reason: lexical_alternative
  - marker: c
    text: «Yahvé» traduce el nombre divino YHWH; alternativamente, «Yahweh».
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de ascensos
  alternatives_spanish:
  - Cántico de peregrinación
  - Cántico de subidas
  - Cántico de grados
  lexicon: שִׁיר = cántico/canción; הַמַּעֲלוֹת = ascensos/subidas
  rationale: El hebreo del encabezado nombra un tipo de canto asociado a «ascensos»; «cántico de ascensos» conserva la forma breve del título y la imagen de subida sin imponer una interpretación más específica que el texto no exige.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  lexicon: לְ + nombre propio en encabezados poéticos
  rationale: La preposición del encabezado puede marcar autoría o dedicación. «De David» es la formulación española más neutral y fiel al encabezado breve.
- source_word: שָׂמַחְתִּי
  english_pob_choice: I rejoiced
  chosen_spanish: Me alegré
  alternatives_spanish:
  - Me regocijé
  - Estuve contento
  lexicon: שׂמח = alegrarse, regocijarse
  rationale: «Me alegré» comunica con naturalidad el valor verbal de שׂמח sin sonar forzado en español; mantiene el tono de gozo personal del hebreo.
- source_word: בְּאֹמְרִים לִי
  english_pob_choice: when they said to me
  chosen_spanish: cuando me dijeron
  alternatives_spanish:
  - al decirme
  - cuando decían para mí
  lexicon: אמר + ל + pronombre = decir a alguien
  rationale: La construcción hebrea introduce la causa o circunstancia del gozo. «Cuando me dijeron» reproduce el sentido relacional directo y es idiomático en español.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahweh
  - el templo de Yahvé
  lexicon: בַּיִת = casa; יְהוָה = Yahvé
  rationale: Se mantiene el término POB «Yahvé» para el nombre divino. «Casa» conserva la metáfora del lugar de presencia/culto sin adelantarse a una equivalencia interpretativa como «templo».
- source_word: נֵלֵךְ
  english_pob_choice: Let us go
  chosen_spanish: Vayamos
  alternatives_spanish:
  - Vamos a ir
  - Iremos
  lexicon: הלך en cohortativo = vayamos/andemos
  rationale: El cohortativo plural exhortativo en español se expresa de manera natural con «Vayamos», que conserva el valor de invitación compartida del hebreo.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: the house of Yahweh
  chosen_spanish_reading: la casa de Yahvé
  alternative_spanish_readings:
  - la casa del Señor
  - la casa de Yahweh
  rationale: El POB inglés ya decidió no ocultar el nombre divino tras una máscara reverencial. En español se mantiene el mismo principio con «Yahvé», evitando reemplazarlo por «Señor» sin base textual inmediata.
  doctrine_reference: Tetragrammaton / divine-name translation policy
- issue: Naturaleza del encabezado poético
  english_pob_reading: A Song of Ascents
  chosen_spanish_reading: Cántico de ascensos
  alternative_spanish_readings:
  - Cántico de peregrinación
  - Cántico de subidas
  rationale: No se fuerza una explicación litúrgica cerrada en el texto principal. El encabezado se traduce de modo transparente, dejando abierta la posible función cultual o peregrina señalada por el audit trail inglés.
  doctrine_reference: Superscription / liturgical heading
translation_notes:
  revision_awareness: 'El paso de revisión en el contexto inglés completó el encabezado con la cláusula principal y el discurso directo: «I rejoiced when they said to me, “Let us go to the house of Yahweh.”» Esta versión española sigue esa lectura completada y preserva el tratamiento explícito del nombre divino como Yahvé.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para YHWH, en lugar de una forma reverencial genérica.
  - «Cántico de ascensos» conserva el paralelismo con el encabezado del POB inglés y no añade una glosa interpretativa al cuerpo principal.
  - La puntuación reproduce la estructura poética y el discurso directo del hebreo sin expandir el texto.
