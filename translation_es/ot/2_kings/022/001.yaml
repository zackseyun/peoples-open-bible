translation:
  language: es
  text: Josías tenía ocho años cuando comenzó a reinar, y reinó treinta y un años en Jerusalén. Su madre se llamaba Jedidá, hija de Adaías, de Bozcat.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן שְׁמֹנֶה שָׁנָה
  english_pob_choice: was eight years old
  chosen_spanish: tenía ocho años
  alternatives_spanish:
  - era de ocho años
  - era un hijo de ocho años
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática de edad. En español, ‘tenía ocho años’ comunica con naturalidad la misma edad sin perder el valor literal del dato.
- source_word: בְמָלְכֹו
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando empezó a reinar
  - cuando fue hecho rey
  lexicon: HALOT
  rationale: La forma hebrea señala el momento de la entronización/inicio del reinado. ‘Comenzó a reinar’ reproduce bien la fórmula regnal sin añadir matices no explicitados.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: El verbo expresa el ejercicio del reinado; ‘reinó’ es el equivalente directo y más natural en una fórmula histórica.
- source_word: וּשְׁלֹשִׁים וְאַחַת שָׁנָה
  english_pob_choice: thirty-one years
  chosen_spanish: treinta y un años
  alternatives_spanish:
  - treinta y una años
  lexicon: HALOT
  rationale: Se conserva el conteo exacto del hebreo. En español, el sustantivo ‘años’ suele llevar el numeral invariable en este uso cronológico.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Correspondencia locativa directa; no requiere nota especial.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: El nombre de su madre era
  alternatives_spanish:
  - Su madre se llamaba
  lexicon: HALOT
  rationale: Se mantiene la fórmula genealógica hebrea de manera clara y reverente. ‘El nombre de su madre era’ refleja con fidelidad la estructura del original.
- source_word: יְדִידָה
  english_pob_choice: Jedidah
  chosen_spanish: Jedidá
  alternatives_spanish:
  - Yedidá
  lexicon: HALOT
  rationale: Nombre propio transliterado según la práctica del proyecto; se adapta la acentuación al español para facilitar la lectura.
- source_word: בַת עֲדָיָה
  english_pob_choice: daughter of Adaiah
  chosen_spanish: hija de Adaías
  alternatives_spanish:
  - hija de Adaia
  lexicon: HALOT
  rationale: La relación filial se expresa con ‘hija de’. Se conserva el nombre propio con forma española coherente con la transliteración bíblica.
- source_word: מִבָּצְקַת
  english_pob_choice: from Bozkath
  chosen_spanish: de Bozkat
  alternatives_spanish:
  - procedente de Bozkat
  - de la ciudad de Bozkat
  lexicon: HALOT
  rationale: La preposición hebrea marca origen/procedencia. En español, ‘de’ funciona de forma natural en esta identificación genealógica, manteniendo el sentido sin sobreexplicarlo.
theological_decisions:
- issue: Fórmula regnal sin tensión teológica específica
  english_pob_reading: Josiah’s age at accession and length of reign are reported straightforwardly.
  chosen_spanish_reading: Josías tenía ocho años cuando comenzó a reinar, y reinó treinta y un años en Jerusalén.
  alternative_spanish_readings:
  - Josías era de ocho años cuando comenzó a reinar
  - Josías fue rey a los ocho años
  rationale: No hay una dificultad doctrinal en el versículo; la tarea principal es preservar la precisión histórica y la fórmula regnal hebrea sin añadir interpretación.
  doctrine_reference: Narrativa histórica / cronología real
- issue: Genealogía materna como dato identificador
  english_pob_reading: His mother’s name was Jedidah daughter of Adaiah, from Bozkath.
  chosen_spanish_reading: El nombre de su madre era Jedidá, hija de Adaías, de Bozkat.
  alternative_spanish_readings:
  - Su madre se llamaba Jedidá, hija de Adaías, de Bozkat
  rationale: La línea materna funciona como identificación histórica, no como afirmación teológica. Se conserva sin comentario adicional.
  doctrine_reference: Genealogía / identificación histórica
translation_notes:
  revision_awareness: El texto base inglés y el control cruzado muestran alta concordancia y sin revisiones aplicadas; por ello la versión española sigue de cerca la lectura estable sin introducir variantes textuales.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el nombre divino solo cuando aparezca en el contexto; este versículo no lo contiene.
  - Se usa ‘reinar/reinó’ para la fórmula real, no ‘ser rey’, siguiendo el valor verbal del hebreo.
  - Los nombres propios se transliteran de manera consistente y con acentuación natural para el español.
  - No se añaden notas al pie porque el versículo no presenta variantes o ambigüedades que requieran anclaje textual.
