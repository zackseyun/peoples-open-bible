- from: Caigan sobre ellos carbones encendidos[a]; que él los arroje al fuego, a hondos pozos[b], para que nunca se levanten.
  to: Caigan sobre ellos brasas ardientes[a]; que él los arroje al fuego, a hondos pozos[b], para nunca volver a levantarse.
  rationale: Se ajusta la cláusula final para reflejar mejor la fuerza de irreversibilidad de בל יקומו sin introducir un propósito demasiado explícito. También se cambia «carbones encendidos» por «brasas ardientes» para una dicción más natural y poética en español, manteniendo el mismo sentido. La nota [a] se rehace para corresponder de manera más directa a la alternativa inglesa documentada («May coals rain down on them»).
