translation:
  language: es
  text: Por tanto, como la lengua de fuego consume la paja, y la hierba seca[a] se hunde ante la llama, así su raíz se volverá podredumbre[b], y su flor subirá como polvo; porque han rechazado la ley de Yahvé de los ejércitos, y han despreciado la palabra del Santo de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'paja seca' o 'rastrojo' para el término vegetal seco; el hebreo denota materia vegetal seca y combustible.
    reason: lexical_alternative
  - marker: b
    text: O 'su raíz se volverá como podredumbre'; la comparación hebrea puede entenderse como predicado ('se volverá podredumbre') o como símil explícito.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  - Por tanto
  lexicon: HALOT
  rationale: Introduce la conclusión profética con una transición natural en español; mantiene el valor consecutivo del hebreo sin debilitarlo.
- source_word: כֶּאֱכֹל
  english_pob_choice: as ... devours
  chosen_spanish: como ... consume
  alternatives_spanish:
  - como ... devora
  - cuando ... consume
  lexicon: HALOT
  rationale: La comparación de modo queda clara en español con 'como'; 'consume' comunica bien la acción del fuego sin volverla mecánica.
- source_word: קַשׁ
  english_pob_choice: stubble
  chosen_spanish: la paja
  alternatives_spanish:
  - la rastrojera
  - el rastrojo
  - la paja
  lexicon: HALOT
  rationale: En español, 'paja' es una imagen natural y comprensible para material vegetal seco y combustible; evita un tecnicismo agrícola innecesario.
- source_word: לְשׁוֹן אֵשׁ
  english_pob_choice: the tongue of fire
  chosen_spanish: la lengua de fuego
  alternatives_spanish:
  - la lengua ígnea
  - la llama
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea literalmente porque tiene fuerza poética y no crea dificultad en español.
- source_word: חֲשַׁשׁ
  english_pob_choice: dry grass
  chosen_spanish: la hierba seca
  alternatives_spanish:
  - el pasto seco
  - la vegetación seca
  - la hierba seca
  lexicon: HALOT
  rationale: El término apunta a materia vegetal seca y fácilmente combustible; 'hierba seca' transmite el sentido de forma natural y amplia.
- source_word: יִרְפֶּה
  english_pob_choice: sinks before
  chosen_spanish: se hunde ante
  alternatives_spanish:
  - se debilita ante
  - se encoge ante
  - se hunde ante
  lexicon: HALOT
  rationale: El verbo hebreo expresa aflojarse o decaer; 'se hunde ante' preserva la imagen de colapso bajo el fuego sin añadir una interpretación más fuerte que el texto.
- source_word: שָׁרְשָׁם
  english_pob_choice: their root
  chosen_spanish: su raíz
  alternatives_spanish:
  - sus raíces
  - su raíz
  lexicon: HALOT
  rationale: El singular colectivo funciona bien en español y mantiene la imagen de la fuente de vida como una unidad común.
- source_word: כַּמָּק
  english_pob_choice: rot
  chosen_spanish: podredumbre
  alternatives_spanish:
  - podredumbre
  - putrefacción
  - descomposición
  lexicon: HALOT
  rationale: '''Podredumbre'' expresa el estado de corrupción/putrefacción con un tono natural y bíblico en español.'
- source_word: וּפִרְחָם
  english_pob_choice: their blossom
  chosen_spanish: su flor
  alternatives_spanish:
  - su flor
  - su brote
  - su floración
  lexicon: HALOT
  rationale: '''Flor'' conserva la imagen vegetal del brote o la floración y suena más directo que una paráfrasis.'
- source_word: כָּאָבָק יַעֲלֶה
  english_pob_choice: will go up like dust
  chosen_spanish: subirá como polvo
  alternatives_spanish:
  - subirá como polvo
  - se elevará como polvo
  - será levantada como polvo
  lexicon: HALOT
  rationale: '''Subirá como polvo'' conserva el movimiento ascendente y la insustancialidad de la imagen hebrea.'
- source_word: מָאֲסוּ
  english_pob_choice: have rejected
  chosen_spanish: han rechazado
  alternatives_spanish:
  - han rechazado
  - han despreciado
  - han desdeñado
  lexicon: HALOT
  rationale: '''Rechazar'' recoge bien el acto de repudiar la ley en este contexto judicial; evita repetir ''despreciar'' del hemistiquio siguiente.'
- source_word: תּוֹרַת
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la ley
  - la instrucción
  - la enseñanza
  lexicon: HALOT
  rationale: En el contexto profético-covenantal, 'ley' preserva la fuerza normativa y pública de torá sin perder inteligibilidad.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - Yahvé de los ejércitos celestiales
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se conserva el nombre divino según la norma del proyecto, y 'de los ejércitos' traduce de forma transparente צְבָאוֹת sin recurrir a la máscara tradicional de 'SEÑOR'.
- source_word: אִמְרַת
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - la palabra
  - el dicho
  - la declaración
  lexicon: HALOT
  rationale: '''Palabra'' es la opción natural y solemne en español para la expresión profética divina.'
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  - el Santo de Israel
  lexicon: HALOT
  rationale: Es el título isaiano fijo y reconocido; 'Santo de Israel' mantiene la resonancia teológica y literaria.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El proyecto pide traducir יְהוָה como 'Yahvé' en el texto principal. Se evita 'SEÑOR' para no ocultar el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de תּוֹרָה en contexto de juicio profético
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la instrucción
  - la enseñanza
  rationale: Aquí torá aparece como objeto de rechazo en un contexto de alianza y juicio; 'la ley' conserva el peso normativo y judicial que exige el pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la decisión inglesa auditada; no se aplicaron revisiones posteriores porque el pass más reciente indicó que no había cambios necesarios.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente con la terminología del proyecto para יהוה.
  - Se evitó 'Cristo' porque no aparece en el verso y el título divino específico es 'Santo de Israel'.
  - Se mantuvo la metáfora vegetal ('raíz', 'flor', 'polvo') sin suavizarla para preservar la imaginería profética.
  - '''Ley'' y ''palabra'' se distinguieron para reflejar los dos sustantivos hebreos diferentes: תּוֹרַת e אִמְרַת.'
