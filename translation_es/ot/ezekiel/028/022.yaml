base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/028/022.yaml
  text: 'and say[a], ‘Thus says the Lord GOD: Behold, I am against you, Sidon, and I will be glorified in your midst[b]. And they will know that I am Yahweh when I execute judgments in her and show myself holy in her.’'
  footnotes:
  - marker: a
    text: Or 'I will gain glory in your midst.' The Hebrew verb can emphasize God’s being honored or his displaying his glory through judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'be sanctified in her' or 'manifest my holiness in her.' The expression means that the LORD’s holiness is publicly vindicated through his acts of judgment.
    reason: lexical_alternative
