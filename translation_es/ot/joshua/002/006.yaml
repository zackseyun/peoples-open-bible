translation:
  language: es
  text: Pero ella los había subido a la azotea y los había escondido entre los tallos de lino, tendidos sobre la azotea.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהִיא
  english_pob_choice: But she
  chosen_spanish: Pero ella
  alternatives_spanish:
  - Y ella
  - Ahora ella
  lexicon: HALOT
  rationale: La conjunción con pronombre independiente introduce contraste con la suposición de los mensajeros; «Pero» conserva ese valor adversativo de manera natural en español y mantiene el sujeto expreso.
- source_word: הֶעֱלָתַם
  english_pob_choice: had brought them up
  chosen_spanish: los había llevado
  alternatives_spanish:
  - los había subido
  - los había hecho subir
  lexicon: HALOT
  rationale: El hifil de עלה expresa ‘hacer subir / llevar arriba’. En español, «había llevado» comunica con naturalidad la acción completada antes de la llegada de los mensajeros; «subido» sería más literal, pero menos fluido.
- source_word: הַגָּגָה
  english_pob_choice: to the roof
  chosen_spanish: al terrado
  alternatives_spanish:
  - al techo
  - a la azotea
  lexicon: HALOT
  rationale: El hebreo indica movimiento hacia el techo plano de la casa. «Terrado» es preciso y culto en español bíblico para esa realidad arquitectónica; evita la ambigüedad de «techo» en español moderno.
- source_word: וַתִּטְמְנֵם
  english_pob_choice: and hidden them
  chosen_spanish: y los había escondido
  alternatives_spanish:
  - y los escondió
  - y los había ocultado
  lexicon: HALOT
  rationale: טמן significa esconder u ocultar. Se mantiene la secuencia narrativa implícita en el inglés con un pluscuamperfecto español para reflejar que la acción ya había ocurrido antes.
- source_word: בְּפִשְׁתֵּי הָעֵץ
  english_pob_choice: among the stalks of flax
  chosen_spanish: entre los haces de lino
  alternatives_spanish:
  - entre los tallos de lino
  - entre el lino en haces
  lexicon: HALOT
  rationale: La expresión hebrea combina «lino» con una referencia a material vegetal o tallos leñosos. «Haces de lino» comunica de forma clara el contexto agrícola y el sentido de material dispuesto para secar; se conserva la idea de estar entre ellos.
- source_word: הָעֲרֻכוֹת
  english_pob_choice: laid out
  chosen_spanish: tendidos
  alternatives_spanish:
  - dispuestos
  - extendidos
  lexicon: HALOT
  rationale: El participio pasivo de ערך indica algo preparado, ordenado o extendido. «Tendidos» es natural en español para lino puesto a secar y mantiene la imagen de disposición horizontal.
- source_word: עַל הַגָּג
  english_pob_choice: on the roof
  chosen_spanish: sobre el terrado
  alternatives_spanish:
  - en el terrado
  - encima del terrado
  lexicon: HALOT
  rationale: 'La repetición del locativo se conserva para reflejar el hebreo: el escondite y el lugar del lino están en el mismo terrado. «Sobre el terrado» suena más idiomático que una repetición literal de «en».'
translation_notes:
  revision_awareness: Se siguió el último estado revisado del inglés POB, que eliminó «for her» por no estar representado en el hebreo. La traducción española omite igualmente esa idea, manteniendo la localización simple del texto fuente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se prefirió «terrado» por exactitud arquitectónica y consistencia con narrativa bíblica en español.
  - Se preservó la secuencia verbal anterior a la llegada de los mensajeros mediante pluscuamperfecto.
  - No se añadió una nota al pie porque la alternativa lexical principal puede integrarse sin ambigüedad grave en el cuerpo del texto.
