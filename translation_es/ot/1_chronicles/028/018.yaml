review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del hebreo: asignación de materiales para el altar del incienso, luego para la תבנית de la מרכבה con los querubines de oro extendidos sobre el arca del pacto de Yahvé. También mantiene correctamente el nombre divino como ''Yahvé''. Sin embargo, hay dos desajustes relevantes con la evidencia fuente y con el rastro auditado en inglés: (1) las notas al pie están invertidas respecto de sus anclas; [a] aparece en ''altar del incienso'' pero el contenido de la nota [a] trata de ''plan/modelo del carro'', mientras [b] aparece en ''carro'' pero su nota trata de ''cubriendo/overshadowing''; (2) ''la figura del carro'' debilita el sentido de תַבְנִית como patrón/plan/modelo en contexto de diseño del templo. Además, ''cubriendo'' es aceptable, pero ''protegiendo por encima'' en la nota no refleja tan bien la alternativa inglesa ''overshadowing''.'
  spanish_quality_summary: El español es mayormente claro y legible, con tono digno y natural. 'El altar del incienso' y 'oro refinado por peso' funcionan bien. No obstante, 'la figura del carro' suena menos preciso que 'el modelo del carro' o 'el diseño del carro' en un contexto arquitectónico/cultual. También conviene hacer que la nota léxica de סֹכְכִים hable de 'cubriendo por encima' o 'haciendo sombra sobre' en vez de 'protegiendo por encima'.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> ''Yahvé'' está correcto; בְּרִית -> ''pacto'' es adecuado; הַכְּרֻבִים -> ''querubines'' es estándar; זָהָב מְזֻקָּק -> ''oro refinado'' es fiel. La principal desviación terminológica está en תַבְנִית, donde ''figura'' no representa tan bien el valor de plan/modelo/patrón documentado en el audit trail.'
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a los marcadores equivocados.
    rationale: La nota [a] explica la frase difícil 'plan/modelo del carro', pero [a] está colocada tras 'altar del incienso'. La nota [b] explica el hebreo 'cubriendo/overshadowing', pero [b] está colocada tras 'carro'. Esto rompe la trazabilidad del audit trail y confunde al lector.
  - severity: medium
    issue: '''La figura del carro'' no refleja bien תַבְנִית en este contexto.'
    rationale: תַבְנִית en 1 Crónicas 28 se mueve en el campo semántico de diseño, modelo o patrón cultual. 'Figura' tiende hacia apariencia o imagen visual, y debilita la relación con el lenguaje de planos/patrones del contexto inmediato.
  - severity: low
    issue: La nota léxica de סֹכְכִים puede mejorarse.
    rationale: El inglés auditado preserva la alternativa 'covering' / 'overshadowing'. 'Protegiendo por encima' suena más interpretativo y menos cercano a la imagen espacial de alas extendidas sobre el arca.
  revised_spanish_text: y para el altar del incienso, oro refinado por peso; y para el modelo del carro[a], los querubines de oro con las alas extendidas y cubriendo[b] el arca del pacto de Yahvé.
  revised_footnotes:
