translation:
  language: es
  text: 'Ellas dijeron: «Un hombre egipcio nos rescató de la mano de los pastores[a], y además sacó agua[b] para nosotras y dio de beber al rebaño».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «del poder de los pastores»; literalmente: «de la mano de los pastores».'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo intensifica el verbo: literalmente, «sacando sacó agua para nosotras», lo que subraya que él mismo la sacó.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמַרְןָ
  english_pob_choice: They said
  chosen_spanish: Ellas dijeron
  alternatives_spanish:
  - Y ellas dijeron
  - Dijeron
  lexicon: HALOT
  rationale: La forma hebrea es una 3fp en narración. En español, 'ellas' explicita con naturalidad que habla el grupo de mujeres, y 'dijeron' conserva el valor narrativo sin forzar un calco del waw.
- source_word: אִישׁ מִצְרִי
  english_pob_choice: An Egyptian man
  chosen_spanish: Un hombre egipcio
  alternatives_spanish:
  - Un egipcio
  - Un hombre, un egipcio
  lexicon: HALOT
  rationale: 'Se conservan ambos elementos semánticos: ''hombre'' + ''egipcio''. ''Un hombre egipcio'' suena natural en español y evita diluir la descripción nominal del hebreo.'
- source_word: הִצִּילָנוּ
  english_pob_choice: rescued us
  chosen_spanish: nos rescató
  alternatives_spanish:
  - nos libró
  - nos salvó
  lexicon: HALOT
  rationale: El hebreo expresa librar de peligro físico inmediato. 'Rescató' comunica bien ese matiz en español contemporáneo sin cargarlo innecesariamente con sentido soteriológico.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de 'mano' como poder o control. En español, 'de la mano de' mantiene la imagen y sigue siendo comprensible.
- source_word: הָרֹעִים
  english_pob_choice: the shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los ganaderos
  - los cuidadores de rebaños
  lexicon: HALOT
  rationale: '''Pastores'' es el equivalente directo y natural para רֹעִים en este contexto de hombres vinculados al cuidado de rebaños.'
- source_word: וְגַם
  english_pob_choice: and he even
  chosen_spanish: y además
  alternatives_spanish:
  - e incluso
  - y también
  lexicon: HALOT
  rationale: La idea intensiva del hebreo se conserva con 'además', que marca añadido enfático sin requerir una construcción extraña en español.
- source_word: דָּלֹה דָלָה
  english_pob_choice: drew water
  chosen_spanish: sacó agua
  alternatives_spanish:
  - extrajo agua
  - sacó y sacó agua
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto y verbo finito intensifica la acción. En español, 'sacó agua' es idiomático; el énfasis se refleja en el contexto con 'además'.
- source_word: לָנוּ
  english_pob_choice: for us
  chosen_spanish: para nosotras
  alternatives_spanish:
  - para nosotros
  - en favor de nosotras
  lexicon: HALOT
  rationale: El discurso está en boca de mujeres; por eso 'nosotras' refleja el referente femenino explícito del contexto inmediato.
- source_word: וַיַּשְׁקְ
  english_pob_choice: watered
  chosen_spanish: dio de beber
  alternatives_spanish:
  - abrevó
  - regó
  lexicon: HALOT
  rationale: Con objeto animal, 'dio de beber' expresa de forma clara y natural la idea de proporcionar agua al rebaño. 'Abrevó' sería también posible, pero menos transparente para lectores amplios.
- source_word: אֶת הַצֹּאן
  english_pob_choice: the flock
  chosen_spanish: al rebaño
  alternatives_spanish:
  - a las ovejas
  - al ganado menor
  lexicon: HALOT
  rationale: צֹאן es un colectivo de pequeños animales de pastoreo. 'Rebaño' preserva el sentido colectivo sin especificar innecesariamente la especie.
theological_decisions:
- issue: Preservación de la metáfora de 'la mano'
  english_pob_reading: from the hand of the shepherds
  chosen_spanish_reading: de la mano de los pastores
  alternative_spanish_readings:
  - del poder de los pastores
  - de los pastores
  rationale: La POB en inglés retiene la imagen hebrea y ofrece 'out of the power of' como alternativa. En español conviene mantener 'mano' para no perder la fuerza idiomática del מקור original, dejando la interpretación de poder implícita.
  doctrine_reference: Ex 2:19; uso idiomático hebreo de יָד como poder/control.
translation_notes:
  revision_awareness: Se ha mantenido el sentido general y las decisiones léxicas principales del POB en inglés, con adaptación natural al español. Se preserva la metáfora hebrea de 'la mano' y la intensificación verbal de דָּלֹה דָלָה mediante una nota. No se introducen cambios doctrinales ni se suaviza la escena.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantiene 'rebaño' como equivalente colectivo de צֹאן, coherente con el uso POB.
  - Se evita 'SEÑOR' por no corresponder al texto aquí.
  - Se conserva el referente femenino con 'ellas' y 'nosotras' por claridad contextual.
