translation:
  language: es
  text: porque desde mi juventud él creció conmigo como con un padre[a], y desde el seno de mi madre la guié[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él me hizo crecer como un padre» o «yo lo crié como un padre». El hebreo de esta línea es difícil, y algunos entienden que Job habla de su cuidado por el huérfano más que de haber sido criado.'
    reason: alternative_reading
  - marker: b
    text: El femenino «la» probablemente se refiere a la viuda del versículo anterior.
    reason: cross_reference
lexical_decisions:
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque, en efecto
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación anterior. En español, «porque» expresa con claridad esa función causal/explicativa sin forzar un matiz más enfático que el hebreo no exige aquí.
- source_word: מִנְּעוּרַי
  english_pob_choice: from my youth
  chosen_spanish: desde mi juventud
  alternatives_spanish:
  - desde mi niñez
  - desde joven
  - desde mi adolescencia
  lexicon: HALOT
  rationale: La expresión marca el punto inicial de una acción prolongada. «Desde mi juventud» conserva ese valor temporal de manera natural en español.
- source_word: גְּדֵלַנִי
  english_pob_choice: he grew up with me
  chosen_spanish: me crió
  alternatives_spanish:
  - me hizo crecer
  - me educó
  - me crió conmigo
  lexicon: HALOT
  rationale: El hebreo presenta una dificultad real por el sujeto implícito y la imagen de crianza. Dado el audit trail inglés, «me crió» comunica la idea de haber sido criado/reared desde la juventud sin resolver de forma indebida la tensión sintáctica. Se evita una paráfrasis más interpretativa.
- source_word: כְאָב
  english_pob_choice: like a father
  chosen_spanish: como a un padre
  alternatives_spanish:
  - como un padre
  - al modo de un padre
  lexicon: HALOT
  rationale: El prefijo כ expresa comparación. En español, «como a un padre» refleja bien la relación de trato/consideración que el texto sugiere, y suena natural en este contexto.
- source_word: וּמִבֶּטֶן אִמִּי
  english_pob_choice: and from my mother’s womb
  chosen_spanish: y desde el seno de mi madre
  alternatives_spanish:
  - y desde el vientre de mi madre
  - y desde el vientre materno
  lexicon: HALOT
  rationale: Es un modismo temporal para los comienzos más remotos de la vida. «Desde el seno de mi madre» es un equivalente sobrio y bíblicamente reconocible en español, sin volverse arcaizante.
- source_word: אַנְחֶנָּה
  english_pob_choice: I guided her
  chosen_spanish: yo la guiaba
  alternatives_spanish:
  - yo la conducía
  - yo la dirigía
  - yo la guié
  lexicon: HALOT
  rationale: El verbo en hifil con sufijo femenino singular pide un objeto femenino. «La guiaba» mantiene el valor de orientación continua y preserva el aspecto durativo que el imperfecto puede sugerir. El antecedente femenino queda abierto como en el texto fuente.
theological_decisions:
- issue: Referente femenino de la segunda cola
  english_pob_reading: The feminine 'her' likely refers to the widow from the previous verse.
  chosen_spanish_reading: El «la» de la segunda cola probablemente remite a la viuda mencionada en el versículo anterior.
  alternative_spanish_readings:
  - El «la» puede referirse a la misma figura vulnerable del contexto inmediato.
  - El femenino puede aludir de manera general a una persona necesitada, sin especificar antecedente.
  rationale: El hebreo conserva un sufijo femenino singular. La traducción española mantiene el referente abierto y una nota explica la probable referencia contextual, en lugar de ocultar la tensión del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: 'Primera cola: crianza desde la juventud'
  english_pob_reading: The first colon refers to the fatherless/orphan in masculine imagery ('he raised me like a father').
  chosen_spanish_reading: La primera cola conserva la idea de crianza desde la juventud sin concretar innecesariamente el sujeto implícito.
  alternative_spanish_readings:
  - El huérfano me crió como un padre.
  - Él me crió como un padre.
  rationale: El hebreo es difícil y admite más de una lectura. Dado que el propio audit trail inglés revisa la redacción hacia una idea de crianza más que de simple ‘alzarse’, el español evita cerrar el sentido con un sujeto demasiado definido y mantiene la ambigüedad responsablemente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente, que corrigió la primera cola desde una formulación demasiado literal hacia la idea de crianza desde la juventud. El español sigue esa dirección, pero mantiene la dificultad del hebreo: no resuelve el sujeto implícito de manera más específica de lo que permite el texto, y conserva el paralelo con el femenino de la segunda cola.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; en este versículo no aparece el tetragrámaton.
  - «Me crió» se eligió por su naturalidad y porque capta la idea de rearing/care sin introducir un significado ajeno.
  - «La guiaba» preserva el femenino singular del hebreo y deja abierto el antecedente, como en el audit trail.
  - Se evitó «señor» o «criaba» en sentido demasiado doméstico para no diluir la tensión poética del hebreo.
