translation:
  language: es
  text: 'Sin embargo, he aquí[a], quedará en ella un remanente[b]: los que serán sacados, hijos[c] e hijas. He aquí, ellos salen hacia ustedes, y verán su camino y sus hechos; y serán consolados acerca del desastre[d] que traje sobre Jerusalén, todo lo que traje sobre ella.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Y he aquí», «Pero he aquí» o «Miren».'
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «quedará en ella una escapatoria» o «quedarán sobrevivientes en ella».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «hijos e hijas»; el texto nombra explícitamente ambos, en lugar de usar un término más general.'
    reason: lexical_alternative
  - marker: d
    text: Aquí «desastre» se refiere a calamidad o juicio traído sobre Jerusalén, no a mal moral.
    reason: theological_note
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: Yet behold
  chosen_spanish: Sin embargo, he aquí
  alternatives_spanish:
  - Y he aquí
  - Pero he aquí
  - Miren
  lexicon: HALOT
  rationale: La combinación tiene fuerza adversativa y deíctica en contexto. «Sin embargo» recoge el giro tras el juicio previo; «he aquí» conserva la llamada enfática.
- source_word: נֽוֹתְרָה ... פְּלֵטָה
  english_pob_choice: a remnant will be left
  chosen_spanish: quedará en ella un remanente
  alternatives_spanish:
  - quedará en ella una escapatoria
  - quedarán sobrevivientes en ella
  lexicon: HALOT
  rationale: «Remanente» preserva el valor profético compacto de פְּלֵטָה con נותר/נותרָה. «Quedará» refleja el estado resultante/pasivo.
- source_word: בָּהּ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en ella misma
  - dentro de ella
  lexicon: HALOT
  rationale: El referente es Jerusalén, femenina en hebreo; «en ella» mantiene la referencia natural en español sin masculinizarla.
- source_word: הַמּוּצָאִים
  english_pob_choice: those brought out
  chosen_spanish: los sacados
  alternatives_spanish:
  - los que fueron sacados
  - los que son sacados
  lexicon: HALOT
  rationale: 'El participio hophal es causativo-pasivo: no solo «salen», sino que fueron hechos salir. «Los sacados» preserva esa pasividad breve y directa.'
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - niños y niñas
  - hijos, varones y mujeres
  lexicon: HALOT
  rationale: Se mantiene el binomio explícito masculino/femenino sin neutralizarlo en «hijos» genérico. En español, «hijos e hijas» transmite bien el paralelismo.
- source_word: הִנָּם יֹצְאִים אֲלֵיכֶם
  english_pob_choice: Behold, they are coming out to you
  chosen_spanish: He aquí, ellos salen hacia ustedes
  alternatives_spanish:
  - Miren, vienen hacia ustedes
  - He aquí, van saliendo hacia ustedes
  lexicon: HALOT
  rationale: «Salen hacia ustedes» conserva el movimiento del participio activo y la dirección al auditorio. «Hacia» expresa la orientación de אֲלֵיכֶם.
- source_word: דַּרְכָּם
  english_pob_choice: their way
  chosen_spanish: su camino
  alternatives_spanish:
  - su conducta
  - su manera de vivir
  lexicon: HALOT
  rationale: «Camino» mantiene la metáfora bíblica y deja espacio para el matiz moral de conducta que el contexto desarrollará.
- source_word: עֲלִילוֹתָם
  english_pob_choice: their deeds
  chosen_spanish: sus hechos
  alternatives_spanish:
  - sus obras
  - sus acciones
  lexicon: HALOT
  rationale: «Hechos» comunica actos concretos de forma sobria. En el paralelismo con «camino», evita un tono demasiado interpretativo.
- source_word: וְנִחַמְתֶּם
  english_pob_choice: you will be comforted
  chosen_spanish: serán consolados
  alternatives_spanish:
  - serán confortados
  - se consolarán
  lexicon: HALOT
  rationale: El nifal admite un sentido de consuelo/consolación. En español, la pasiva refleja o perifrástica permite mantener el valor receptivo del verbo.
- source_word: עַל הָרָעָה
  english_pob_choice: concerning the disaster
  chosen_spanish: acerca del desastre
  alternatives_spanish:
  - sobre la calamidad
  - en cuanto a la desgracia
  lexicon: HALOT
  rationale: «Desastre» conserva la referencia a juicio/calamidad y evita leer maldad moral. «Acerca de» expresa el alcance del consuelo.
- source_word: הֵבֵאתִי עַל יְרוּשָׁלִַם
  english_pob_choice: that I brought upon Jerusalem
  chosen_spanish: que traje sobre Jerusalén
  alternatives_spanish:
  - que hice venir sobre Jerusalén
  - que puse sobre Jerusalén
  lexicon: HALOT
  rationale: «Traje sobre» sigue el idiomático בוא על en contexto de juicio. «Jerusalén» se conserva como objeto directo del castigo divino.
- source_word: אֵת כָּל אֲשֶׁר הֵבֵאתִי עָלֶיהָ
  english_pob_choice: all that I brought upon it
  chosen_spanish: todo lo que traje sobre ella
  alternatives_spanish:
  - todo lo que puse sobre ella
  - todo cuanto traje sobre ella
  lexicon: HALOT
  rationale: Se conserva el énfasis resumptivo de la cláusula final y la referencia pronominal a Jerusalén mediante «ella».
theological_decisions:
- issue: Sentido de הָרָעָה aplicada a la acción divina
  english_pob_reading: disaster
  chosen_spanish_reading: desastre
  alternative_spanish_readings:
  - calamidad
  - maldad
  rationale: El versículo habla de lo que Yahvé trajo sobre Jerusalén como juicio. «Desastre» o «calamidad» mantienen el evento de juicio sin sugerir mal moral atribuido a Dios.
  doctrine_reference: Principio de fidelidad al texto original; distinción entre mal moral y calamidad judicial.
translation_notes:
  revision_awareness: Se revisó la lectura previa y no se requirieron cambios sustantivos; la versión mantiene alta concordancia con el auditor inglés, preservando el paralelismo y la distinción entre juicio calamitoso y mal moral.
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica aquí por ausencia del tetragrámaton en el versículo.
  - Se mantuvo «remanente» como término profético estable.
  - Se preservó el binomio «hijos e hijas» en lugar de generalizar a «hijos».
  - Se eligió «desastre» para la רָעָה del contexto judicial, evitando una lectura de maldad ética.
