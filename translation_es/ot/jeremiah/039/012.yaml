translation:
  language: es
  text: Tómalo, mantén tus ojos sobre él[a], y no le hagas ningún mal[b]; pero haz con él como él te diga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pon tus ojos sobre él», es decir, «vigílalo» o «cuida de él».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no le hagas nada malo o dañino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָחֶנּוּ
  english_pob_choice: Take him
  chosen_spanish: Tómalo
  alternatives_spanish:
  - Tómalo contigo
  - Recíbelo
  lexicon: HALOT
  rationale: El imperativo de לקח con sufijo de 3ms pide una orden directa de tomar/recibir a Jeremías bajo custodia. «Tómalo» conserva la fuerza breve y natural del mandato sin añadir matices no presentes.
- source_word: וְעֵינֶיךָ שִׂים עָלָיו
  english_pob_choice: keep your eyes on him
  chosen_spanish: pon tus ojos sobre él
  alternatives_spanish:
  - vigílalo
  - mantén tus ojos sobre él
  - cuida de él
  lexicon: HALOT
  rationale: 'La expresión es literalmente idiomática: «poner los ojos sobre alguien». En este contexto implica vigilancia protectora, no solo mirar. «Pon tus ojos sobre él» mantiene la imagen hebrea y permite la lectura de cuidado/atención.'
- source_word: וְאַל תַּעַשׂ לוֹ מְאוּמָה רָע
  english_pob_choice: do him no harm
  chosen_spanish: no le hagas ningún mal
  alternatives_spanish:
  - no le hagas nada malo
  - no le hagas ningún daño
  - no le hagas mal alguno
  lexicon: HALOT
  rationale: מְאוּמָה רָע equivale a «nada malo/dañino». En español, «no le hagas ningún mal» es una manera natural y fiel de expresar la prohibición de maltratarlo, sin suavizar la fuerza lexical de רָע.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - más bien
  - pero al contrario
  lexicon: HALOT
  rationale: Tras la negación, la frase introduce contraste/adversación. «Pero» refleja bien el cambio de instrucción en español y coincide con la revisión inglesa que prefirió una conjunción más natural sin perder el contraste.
- source_word: כַּאֲשֶׁר יְדַבֵּר אֵלֶיךָ
  english_pob_choice: just as he speaks to you
  chosen_spanish: tal como te diga
  alternatives_spanish:
  - según te hable
  - como él te diga
  - según lo que te diga
  lexicon: HALOT
  rationale: El verbo habla de lo que Jeremías comunica al destinatario; en contexto, puede ser su petición o instrucción. «Tal como te diga» conserva la dependencia de la palabra dicha, con un español natural y sin sobreinterpretar el contenido exacto.
- source_word: כֵּן עֲשֵׂה עִמּוֹ
  english_pob_choice: do with him
  chosen_spanish: haz con él
  alternatives_spanish:
  - trata con él
  - obra con él
  - actúa con él
  lexicon: HALOT
  rationale: עשה עם suele significar «hacer/tratar con». «Haz con él» mantiene la correspondencia verbal con la cláusula comparativa y sigue siendo idiomático en español; el sentido completo queda determinado por la frase siguiente.
translation_notes:
  revision_awareness: La redacción sigue el ajuste de la revisión inglesa que prefirió «but» frente a «rather» para marcar mejor el contraste de כִּי אִם. En español se reflejó con «pero», manteniendo el registro formal y el giro natural de la frase.
  spanish_consistency_notes:
  - Se mantiene «no le hagas ningún mal» como equivalente natural de la negación hebrea con מְאוּמָה רָע.
  - Se conserva la imagen corporal «pon tus ojos sobre él» y se explicita en nota la lectura idiomática de vigilancia/cuidado.
  - Se evita introducir «custodia» o «protección» en el cuerpo del texto para no ampliar más allá del hebreo, pero la nota recoge la posible implicación contextual.
  - Se usa tratamiento de segunda persona singular, coherente con el hebreo y con la dirección personal del mandato.
