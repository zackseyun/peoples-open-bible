  text: 'And the name of the star is called Wormwood[a]. And a third of the waters became wormwood, and many of the people died from the waters[b], because they had been made bitter.'
  footnotes:
  - marker: a
    text: Or 'Absinthe'; the Greek Ἄψινθος/ἄψινθον refers to wormwood, a bitter plant, and the repeated term links the star's name with the waters' bitterness.
    reason: lexical_alternative
  - marker: b
    text: The final clause may be rendered more explicitly, 'because the waters had been made bitter.'
    reason: alternative_reading
