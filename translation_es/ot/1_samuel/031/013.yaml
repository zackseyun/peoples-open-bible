translation:
  language: es
  text: Tomaron sus huesos y los sepultaron debajo del tamarisco en Jabes[a][b], y ayunaron siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O simplemente: «el tamarisco»; el hebreo nombra la especie de árbol con precisión.'
    reason: lexical_alternative
  - marker: b
    text: Jabes aquí abrevia Jabes de Galaad, como muestra el contexto inmediato.
    reason: cross_reference
lexical_decisions:
- source_word: עַצְמֹתֵיהֶם
  english_pob_choice: their bones
  chosen_spanish: sus huesos
  alternatives_spanish:
  - sus restos
  lexicon: HALOT
  rationale: עצם significa literalmente 'hueso'. Como el contexto inmediato ya habló de los cuerpos quemados, conservar 'huesos' mantiene la concreción del hebreo y evita suavizarlo a 'restos'.
- source_word: וַיִּקְבְּרוּ
  english_pob_choice: and buried
  chosen_spanish: los sepultaron
  alternatives_spanish:
  - los enterraron
  lexicon: HALOT
  rationale: '''Sepultar'' expresa con naturalidad el acto funerario y conserva el sentido formal de קבר. ''Enterrar'' también es posible, pero ''sepultar'' encaja mejor con el registro narrativo y solemne del versículo.'
- source_word: תַחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - bajo de
  lexicon: HALOT
  rationale: תחת indica ubicación inferior o subyacente. 'Debajo de' es claro en español moderno y mantiene la relación espacial sin sonar forzado.
- source_word: הָאֶשֶׁל
  english_pob_choice: the tamarisk tree
  chosen_spanish: el tamarisco
  alternatives_spanish:
  - el árbol de tamarisco
  - el tamarisco
  lexicon: HALOT
  rationale: אֶשֶׁל designa un tamarisco; en español, el nombre del árbol ya funciona como referente suficiente y natural. Se evita añadir 'árbol' por redundancia, aunque esa expansión es una alternativa válida para lectores que necesiten mayor explicitud.
- source_word: בְּיָבֵשָׁה
  english_pob_choice: in Jabesh
  chosen_spanish: en Jabes
  alternatives_spanish:
  - en Jabes de Galaad
  - en Jabes-galaad
  lexicon: HALOT
  rationale: El hebreo aquí abrevia el nombre del lugar, en continuidad con el contexto previo. 'Jabes' refleja esa abreviación; la forma completa queda como alternativa explicativa si se desea mayor claridad intertextual.
- source_word: וַיָּצֻמוּ
  english_pob_choice: and they fasted
  chosen_spanish: ayunaron
  alternatives_spanish:
  - guardaron ayuno
  lexicon: HALOT
  rationale: צום significa 'ayunar'. 'Ayunaron' es el equivalente directo y natural en español, sin añadir matices no presentes en el hebreo.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: siete días
  lexicon: HALOT
  rationale: La expresión numérica se traduce de manera directa y estándar como 'siete días'.
- source_word: וַיִּקְחוּ
  english_pob_choice: They took
  chosen_spanish: Tomaron
  alternatives_spanish:
  - Entonces tomaron
  lexicon: HALOT
  rationale: לקח es 'tomar'. El imperfecto conversivo narrativo se vierte con el pretérito simple 'tomaron', que suena natural en español y conserva la secuencia narrativa.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la puntuación narrativa del hebreo y concuerda con la línea editorial inglesa: mantiene la concreción de ''huesos'', traduce el árbol como ''tamarisco'' y conserva la abreviación del topónimo con nota aclaratoria. No se introdujeron cambios respecto al sentido auditado; solo se ajustó el registro al español natural.'
  spanish_consistency_notes:
  - 'Se preserva el orden narrativo simple del original: tomar, sepultar, ayunar.'
  - Se usó 'tamarisco' para הָאֶשֶׁל, coherente con la decisión inglesa de nombrar la especie.
  - '''Jabes'' se mantiene breve en el texto principal y se aclara por nota para evitar sobretraducir el topónimo.'
  - No se añadió ninguna formulación teológica ajena al versículo.
