translation:
  language: es
  text: Y ahora[a], si tu pueblo, que habita en la región montañosa, no me hubiera tratado con desprecio, no habría alzado mi lanza contra ellos; pero ellos mismos se han acarreado estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me hubiera menospreciado» o «me hubiera insultado». El verbo griego expresa tratar a alguien como de poco valor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λαός σου
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu nación
  lexicon: LSJ
  rationale: λαός designa al pueblo como colectivo; en español, «tu pueblo» conserva la referencia directa y natural en este discurso sin añadir una connotación política que «nación» podría intensificar.
- source_word: ὁ κατοικῶν τὴν ὀρεινήν
  english_pob_choice: who live in the hill country
  chosen_spanish: el que habita en la región montañosa
  alternatives_spanish:
  - los que habitan en la región montañosa
  - los que viven en la región montañosa
  - el que vive en la zona montañosa
  lexicon: LSJ
  rationale: El participio modifica a «pueblo» y la expresión sustantivada ὀρεινή se refiere a la zona montañosa. «El que habita» sigue de cerca la construcción griega y es idiomático en español; «región montañosa» comunica bien el sentido geográfico sin forzar un tecnicismo.
- source_word: ἐφαύλισάν με
  english_pob_choice: treated me with contempt
  chosen_spanish: me hubiera despreciado
  alternatives_spanish:
  - me hubiera tratado con desprecio
  - me hubiera menospreciado
  - me hubiera insultado
  lexicon: LSJ
  rationale: ἐφαυλίζω expresa tratar como de poco valor, despreciar o mostrar desprecio. «Despreciado» conserva esa carga de desdén; el perfecto compuesto en español ayuda a reproducir la condición contrafactual del griego.
- source_word: οὐκ ἂν ἦρα
  english_pob_choice: I would not have raised
  chosen_spanish: no habría alzado
  alternatives_spanish:
  - no habría levantado
  - no habría empuñado
  lexicon: LSJ
  rationale: αἴρω significa literalmente levantar/ alzar; en contexto bélico, «alzado» encaja con la acción de tomar o levantar un arma sin perder la fuerza del verbo original.
- source_word: τὸ δόρυ μου
  english_pob_choice: my spear
  chosen_spanish: mi lanza
  alternatives_spanish:
  - mi lanza de guerra
  - mi pica
  lexicon: LSJ
  rationale: δόρυ es el arma arrojadiza o de asta en contexto militar. Aunque «spear» puede traducirse como «lanza» o «lanza/lanza de guerra», «lanza» es la opción más natural y transparente en español para este pasaje.
- source_word: ἐπʼ αὐτούς
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  lexicon: LSJ
  rationale: Con un arma y una acción hostil, ἐπί con acusativo se expresa mejor como «contra» en español; «sobre» sería más literal pero menos claro en este contexto.
- source_word: ἑαυτοῖς
  english_pob_choice: on themselves
  chosen_spanish: sobre sí mismos
  alternatives_spanish:
  - a sí mismos
  - para sí mismos
  lexicon: LSJ
  rationale: El dativo reflexivo marca responsabilidad o consecuencia auto-incurrida. «Sobre sí mismos» preserva la imagen de carga o resultado recaído sobre ellos; «a sí mismos» es posible, pero menos expresivo del daño sufrido.
theological_decisions:
- issue: Culpa y responsabilidad en la clausula final
  english_pob_reading: they themselves have brought these things on themselves
  chosen_spanish_reading: ellos mismos se han acarreado estas cosas sobre sí mismos
  alternative_spanish_readings:
  - ellos mismos han hecho estas cosas a sí mismos
  - ellos mismos han causado esto para sí
  rationale: La frase griega atribuye responsabilidad directa sin añadir una explicación doctrinal sobre juicio divino o destino. «Se han acarreado» conserva la idea de consecuencia auto-incurrida y mantiene la tensión del texto sin resolverla teológicamente.
  doctrine_reference: Preservar la responsabilidad textual sin importar una explicación doctrinal no explicitada en el versículo.
translation_notes:
  revision_awareness: Se siguió el pasaje griego de Swete LXX con alta concordancia respecto del audit trail inglés. No se introdujeron cambios sustantivos; se optó por equivalencias españolas naturales que conservan la condición contrafactual, el tono hostil y la responsabilidad auto-incurrida del cierre.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el tetragrámaton ni κύριος en este texto.
  - Se prefirió «lanza» para δόρυ por ser el equivalente español más transparente en registro bíblico y militar.
  - Se conservó la ambigüedad causal del final sin introducir agentes externos; el sujeto reflexivo queda explícito en español con «se han acarreado».
