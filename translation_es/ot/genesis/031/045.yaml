- from: Entonces Jacob tomó una piedra y la levantó como una columna[a].
  to: Entonces Jacob tomó una piedra y la levantó como un pilar[a].
  rationale: Se revisa «columna» a «pilar» para reflejar mejor מַצֵּבָה, alinearse con la decisión del POB en inglés y evitar una connotación arquitectónica demasiado fuerte en español. Se conserva «la levantó» por ser fiel y natural, y se ajusta la nota para que suene más idiomática y precisa.
