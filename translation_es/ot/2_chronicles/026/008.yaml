translation:
  language: es
  text: Los amonitas le dieron tributo a Uzías[a], y su fama se extendió hasta la entrada de Egipto[b], porque se había hecho sumamente fuerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su nombre se extendió». El hebreo usa «nombre» en el sentido de reputación o fama.
    reason: lexical_alternative
  - marker: b
    text: «La entrada de Egipto» puede referirse a la aproximación a Egipto o a su región fronteriza.
    reason: cultural_note
lexical_decisions:
- source_word: הָעַמּוֹנִים
  english_pob_choice: The Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - el pueblo de Amón
  - los hijos de Amón
  lexicon: HALOT
  rationale: Es una designación étnico-política; en español, «amonitas» es el equivalente claro y estándar, conservando el referente nacional sin explicar de más.
- source_word: מִנְחָה
  english_pob_choice: tribute
  chosen_spanish: tributo
  alternatives_spanish:
  - regalo
  - ofrenda
  - presente
  lexicon: HALOT
  rationale: El contexto es político y de subordinación ante un rey, por lo que «tributo» expresa mejor el sentido que un regalo genérico u ofrenda cultual.
- source_word: וַיֵּלֶךְ שְׁמוֹ
  english_pob_choice: his fame spread
  chosen_spanish: su fama se extendió
  alternatives_spanish:
  - su nombre salió
  - su nombre se extendió
  lexicon: HALOT
  rationale: La expresión hebrea usa «nombre» en sentido idiomático de reputación. En español, «fama» comunica naturalmente esa reputación/renombre sin perder la idea de difusión.
- source_word: עַד לְבוֹא מִצְרַיִם
  english_pob_choice: as far as the entrance of Egypt
  chosen_spanish: hasta la entrada de Egipto
  alternatives_spanish:
  - hasta la frontera de Egipto
  - hasta la aproximación a Egipto
  lexicon: HALOT
  rationale: «Entrada» conserva la imagen hebrea con suficiente claridad en español. Se mantiene la posible referencia al área de acceso o región fronteriza sin cerrarla artificialmente.
- source_word: הֶחֱזִיק
  english_pob_choice: had become strong
  chosen_spanish: se había hecho extremadamente fuerte
  alternatives_spanish:
  - había crecido mucho en fuerza
  - se había fortalecido mucho
  lexicon: HALOT
  rationale: El verbo en este contexto expresa llegar a ser fuerte o mostrarse fuerte. «Se había hecho» refleja el proceso/resultante, y «extremadamente fuerte» recoge la intensificación del hebreo.
- source_word: עַד לְמַעְלָה
  english_pob_choice: exceedingly
  chosen_spanish: extremadamente
  alternatives_spanish:
  - en gran manera
  - sumamente
  - muchísimo
  lexicon: HALOT
  rationale: La frase idiomática intensifica la fuerza del verbo precedente. «Extremadamente» es natural en español moderno y preserva bien la fuerza del intensificador.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide en sentido con la auditoría inglesa aprobada sin cambios; se preserva la metáfora de «nombre/fama» y la imagen geográfica de «entrada de Egipto».
  spanish_consistency_notes:
  - Se usó «Yuzías»? No; se normalizó correctamente como «Uzías» para el nombre propio.
  - «Tributo» se mantiene para el valor político de מִנְחָה, no como ofrenda religiosa.
  - Se evitó «SEÑOR» o sustituciones reverenciales, porque el versículo no contiene el tetragrámaton.
  - La intensificación final se integró en el predicado para sonar natural en español sin perder el énfasis hebreo.
