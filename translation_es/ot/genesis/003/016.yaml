translation:
  language: es
  text: 'A la mujer le dijo[a]: «Multiplicaré grandemente tu dolor y tu concepción[b]; con dolor darás a luz hijos[c]. Tu deseo[d] será para tu esposo, y él gobernará sobre ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la esposa»; el hebreo puede significar tanto «mujer» como «esposa», pero aquí el contexto inmediato favorece «mujer».
    reason: lexical_alternative
  - marker: b
    text: O «tu embarazo». El hebreo puede denotar concepción o embarazo.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «hijos»; aquí probablemente significa hijos/descendencia en general.
    reason: lexical_alternative
  - marker: d
    text: O «anhelo». La rara palabra hebrea puede denotar deseo en sentido amplio; algunos la interpretan como deseo de controlar (compárese con Génesis 4:7), mientras que otros la entienden como anhelo relacional o sexual.
    reason: alternative_reading
lexical_decisions:
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: En este contexto de juicio y diálogo divino, el hebreo presenta a la femenina humana como tal. «La mujer» reproduce mejor la referencia inmediata; «esposa» sería más específico de la relación marital y no es el vocativo principal aquí.
- source_word: הַרְבָּה אַרְבֶּה
  english_pob_choice: I will greatly multiply
  chosen_spanish: Multiplicaré grandemente
  alternatives_spanish:
  - Multiplicaré mucho
  - Sin duda multiplicaré
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto + verbo finito intensifica la acción. «Multiplicaré grandemente» conserva esa fuerza enfática en español sin volverlo torpe.
- source_word: עִצְּבוֹנֵךְ
  english_pob_choice: your pain
  chosen_spanish: tu dolor
  alternatives_spanish:
  - tu pena
  - tu sufrimiento
  - tu trabajo penoso
  lexicon: HALOT
  rationale: El término puede abarcar dolor, pena o aflicción. En este pasaje, junto con el parto, «dolor» es la opción más clara y natural; «trabajo penoso» sería posible, pero aquí el foco inmediato es la experiencia dolorosa del alumbramiento.
- source_word: וְהֵרֹנֵךְ
  english_pob_choice: your conception
  chosen_spanish: tu concepción
  alternatives_spanish:
  - tu embarazo
  lexicon: HALOT
  rationale: El hebreo puede referirse a concepción o embarazo. «Concepción» sigue más de cerca la forma léxica y mantiene la distinción respecto al acto posterior de dar a luz; «embarazo» sería una paráfrasis algo más interpretativa.
- source_word: בְּעֶצֶב
  english_pob_choice: in pain
  chosen_spanish: con dolor
  alternatives_spanish:
  - en dolor
  - con pena
  - con sufrimiento
  lexicon: HALOT
  rationale: La preposición marca la circunstancia o manera del alumbramiento. «Con dolor» suena idiomático en español y conserva la relación con el sustantivo anterior.
- source_word: תֵּלְדִי בָנִים
  english_pob_choice: you will bear children
  chosen_spanish: darás a luz hijos
  alternatives_spanish:
  - parirás hijos
  - darás a luz niños
  lexicon: HALOT
  rationale: Aunque בָנִים es literalmente «hijos/varones», en hebreo puede funcionar de manera amplia para descendencia. «Darás a luz hijos» conserva el sentido de nacimiento sin restringirlo innecesariamente a sexo masculino; se mantiene la amplitud del POB en inglés, pero con una formulación más natural en español.
- source_word: אִישֵׁךְ
  english_pob_choice: your husband
  chosen_spanish: tu esposo
  alternatives_spanish:
  - tu marido
  - tu hombre
  lexicon: HALOT
  rationale: Aquí אִישׁ se refiere claramente al vínculo conyugal. «Esposo» es claro y digno en español; «marido» también sería posible, pero «esposo» encaja mejor con el registro de la versión.
- source_word: תְּשׁוּקָתֵךְ
  english_pob_choice: your desire will be for
  chosen_spanish: Tu deseo será para
  alternatives_spanish:
  - Tu anhelo será para
  - Tu inclinación será hacia
  lexicon: HALOT
  rationale: El sustantivo es raro y su sentido exacto se debate. «Deseo» preserva la ambigüedad interpretativa sin forzar una lectura sexual, relacional o de control; además, reproduce la solución del POB inglés con una forma natural en español.
- source_word: יִמְשָׁל בָּךְ
  english_pob_choice: he will rule over you
  chosen_spanish: él se enseñoreará de ti
  alternatives_spanish:
  - él te gobernará
  - él reinará sobre ti
  - él dominará sobre ti
  lexicon: HALOT
  rationale: El verbo significa regir, gobernar o ejercer dominio. Se eligió una forma tradicional y bíblica en español que expresa la relación de autoridad del texto; «dominará» sería más fuerte e interpretativo, mientras que «gobernará» es más directo pero menos idiomático en este registro.
theological_decisions:
- issue: Sentido de תְּשׁוּקָה en relación con el esposo
  english_pob_reading: Render 'desire' broadly, without specifying whether it is sexual desire, relational longing, or a desire to control.
  chosen_spanish_reading: Traducir «deseo» sin precisar si se trata de deseo sexual, anhelo relacional o impulso de control.
  alternative_spanish_readings:
  - anhelo
  - inclinación
  - deseo de control
  rationale: El hebreo es raro y el contexto no obliga a una única lectura. Mantener «deseo» preserva la tensión interpretativa documentada por el POB en inglés, en vez de resolverla dogmáticamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Carácter descriptivo del dominio masculino
  english_pob_reading: 'Translate as a description of the post-fall condition: ''he will rule over you.'''
  chosen_spanish_reading: 'Traducir como descripción de la condición posterior a la caída: «él se enseñoreará de ti».'
  alternative_spanish_readings:
  - él debería gobernar sobre ti
  - él tiene autoridad sobre ti
  rationale: La forma verbal hebrea describe lo que ocurrirá; no introduce por sí misma un mandato normativo. El español debe reflejar esa descripción sin convertirla en prescripción doctrinal.
  doctrine_reference: 'Affirmations: do not advocate denominational distinctives unless the Hebrew unambiguously supports one reading.'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el análisis permanece estable y con alta concordancia general, con solo observaciones menores.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» por defecto para el nombre divino en la versión española, pero este versículo no lo contiene.
  - Se conservó «deseo» para תְּשׁוּקָה, siguiendo la estrategia del POB de preservar la ambigüedad interpretativa.
  - Se evitó «SEÑOR» como sustituto teológico no presente en el hebreo.
  - Se usó un registro bíblico actual pero digno, evitando calcos innecesarios.
  - La referencia a los «hijos» conserva la amplitud semítica de בָנִים sin restringirla a varones.
