  text: לָ֤/מָּה נַחְבֵּ֨אתָ֙ לִ/בְרֹ֔חַ וַ/תִּגְנֹ֖ב אֹתִ֑/י וְ/לֹא הִגַּ֣דְתָּ לִּ֔/י וָֽ/אֲשַׁלֵּחֲ/ךָ֛ בְּ/שִׂמְחָ֥ה וּ/בְ/שִׁרִ֖ים בְּ/תֹ֥ף וּ/בְ/כִנּֽוֹר־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/031/027.yaml
  text: Why did you hide yourself to flee and steal away from me[a], and not tell me, so that I might have sent you away with joy and with songs[d][c][b], with tambourine and lyre?
  footnotes:
  - marker: a
    text: Literally, 'and you stole me.' The Hebrew idiom means to slip away from someone secretly or to steal away from them.
    reason: lexical_alternative
  - marker: b
    text: Or 'and with singing.'
    reason: lexical_alternative
  - marker: c
    text: Traditionally 'timbrel.'
    reason: lexical_alternative
  - marker: d
    text: Or 'harp,' though the Hebrew more specifically denotes a lyre-type instrument.
    reason: lexical_alternative
