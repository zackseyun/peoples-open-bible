id: T12P.LEV.16
reference: Testament of Levi 16
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: XVI. Καὶ νῦν *ἐγὼ ἔγνωκα¹ ὅτι ἑβδομήκοντα ἑβδομάδας² πλανηθήσεσθε³, καὶ τὴν ἱερωσύνην βεβηλώσετε⁴ καὶ *τὰ θυσιαστήρια⁵ μιανεῖτε⁶. 2. Καὶ τὸν νόμον ἀθετήσετε⁷ καὶ λόγους προφητῶν ἐξουδενώσετε⁸ *ἐν διαστροφῇ κακῇ⁹. *διώξετε δὲ¹⁰ ἄνδρας¹¹ δικαίους, καὶ εὐσεβεῖς μισήσετε¹², ἀληθινῶν¹³ λόγους βδελύξεσθε¹⁴. 3. [Καὶ ἄνδρα καινοποιοῦντα¹⁵ νόμον *ἐν δυνάμει ὑψίστου¹⁶ πλάνου¹⁷ προσαγορεύσετε, καὶ τέλος †ὁρμήσετε τοῦ ἀποκτεῖναι¹⁸ αὐτόν, οὐκ εἰδότες¹⁹ αὐτοῦ τὸ ἀνάστημα†²⁰, τὸ²¹ ἀθῷον αἷμα²² *ἐν κακίᾳ²³ ἐπὶ τῆς²⁴ κεφαλῆς²⁵ ὑμῶν ἀναδεχόμενοι²⁶.] 4. *Λέγω δὲ ὑμῖν ὅτι²⁷ δι᾽ αὐτὸν²⁸ ἔσονται²⁹ τὰ ἅγια ὑμῶν ἔρημα³⁰ ἕως ἐδάφους³¹. 5. Καὶ *τόπος ὑμῖν καθαρὸς οὐκ ἔσται³², ἀλλ᾽ ἔσεσθε³³ ἐν τοῖς ἔθνεσιν εἰς κατάραν καὶ *εἰς διασκορπισμόν³⁴, ἕως³⁵ *αὐτὸς πάλιν³⁶ ἐπισκέψηται³⁷ καὶ *οἰκτειρήσῃ καὶ³⁸ προσδέξηται³⁹.
  language: Greek
  source_pages:
  - 125
  - 126
  - 127
translation:
  text: 'And now I know that for seventy weeks you will go astray[a], and you will profane the priesthood and defile the altars. And you will set aside the law and treat the words of the prophets with contempt in evil perversity. You will persecute righteous men, and you will hate the godly; you will loathe the words of the truthful.


    And a man who renews the law in the power of the Most High you will call a deceiver, and at last you will rush to kill him, not knowing his stature, taking innocent blood upon your heads in wickedness.


    But I tell you that because of him your holy places will be laid waste to the ground. And no clean place will remain for you, but you will be among the nations of the earth for a curse and for scattering[b][a][a], until he himself visits again and shows compassion and receives you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text of this sentence is difficult and shows signs of textual disturbance. The translation follows the witness provided, but the wording may reflect expansion or later interpolation.
    reason: textual_variant
    anchor_ref: '16:3'
  - marker: a
    text: Or 'a man making the law new.' The phrase could be heard as hostile accusation against a reforming figure.
    reason: lexical_alternative
    anchor_ref: '16:3'
  - marker: a
    text: '''His stature'' is literal; the sense may be ''his true worth'' or ''his majesty.'''
    reason: lexical_alternative
    anchor_ref: '16:3'
  - marker: b
    text: The subject of 'he himself visits again' may be understood as God, or possibly as the previously mentioned figure; the Greek does not force a single interpretation.
    reason: alternative_reading
    anchor_ref: '16:5'
lexical_decisions:
- source_word: ἑβδομήκοντα ἑβδομάδας
  chosen: seventy weeks
  alternatives:
  - seventy sevens
  lexicon: LSJ
  rationale: Kept the literal temporal expression 'weeks' rather than interpretively expanding to 'sevens.' The phrase likely echoes apocalyptic periodization, and the more literal rendering preserves that resonance for readers and later annotation.
- source_word: πλανηθήσεσθε
  chosen: you will go astray
  alternatives:
  - you will be led astray
  - you will wander
  lexicon: LSJ
  rationale: '''Go astray'' preserves both moral deviation and passive susceptibility without overcommitting to either a purely active or purely passive nuance.'
- source_word: ἱερωσύνην βεβηλώσετε
  chosen: you will profane the priesthood
  alternatives:
  - you will desecrate the priesthood
  lexicon: LSJ
  rationale: '''Profane'' fits cultic violation language and keeps the priestly register of the chapter.'
- source_word: θυσιαστήρια μιανεῖτε
  chosen: defile the altars
  alternatives:
  - pollute the altars
  lexicon: LSJ
  rationale: '''Defile'' is strong but idiomatic in English for cultic contamination; plural ''altars'' follows the Greek.'
- source_word: τὸν νόμον ἀθετήσετε
  chosen: you will set aside the law
  alternatives:
  - you will reject the law
  - you will nullify the law
  lexicon: LSJ
  rationale: '''Set aside'' captures repudiation without importing later technical theological debates attached to ''nullify.'''
- source_word: λόγους προφητῶν ἐξουδενώσετε
  chosen: treat the words of the prophets with contempt
  alternatives:
  - despise the words of the prophets
  lexicon: LSJ
  rationale: This fuller English phrase conveys the force of contempt while remaining readable.
- source_word: ἐν διαστροφῇ κακῇ
  chosen: in evil perversity
  alternatives:
  - in wicked crookedness
  - with evil corruption
  lexicon: LSJ
  rationale: Retains the moral texture of distortion/perversion rather than smoothing to a generic adverb.
- source_word: διώξετε
  chosen: you will persecute
  alternatives:
  - you will pursue
  lexicon: LSJ
  rationale: In context of hostility toward righteous men, 'persecute' best expresses the adversarial force.
- source_word: εὐσεβεῖς
  chosen: the godly
  alternatives:
  - the devout
  - the pious
  lexicon: LSJ
  rationale: '''The godly'' is elevated but accessible English and suits paraenetic contrast language.'
- source_word: ἀληθινῶν λόγους βδελύξεσθε
  chosen: you will loathe the words of the truthful
  alternatives:
  - you will abhor true words
  - you will detest the words of truthful men
  lexicon: LSJ
  rationale: The Greek is somewhat compressed; this rendering preserves both the personal and verbal dimensions without overexpansion.
- source_word: ἄνδρα καινοποιοῦντα ... νόμον
  chosen: a man who renews the law
  alternatives:
  - a man making the law new
  - a reformer of the law
  lexicon: LSJ
  rationale: The phrase is textually difficult and likely loaded. 'Renews the law' reflects the verbal idea of making new while avoiding anachronistic doctrinal phrasing.
- source_word: ἐν δυνάμει ὑψίστου
  chosen: in the power of the Most High
  alternatives:
  - by the power of the Most High
  lexicon: LSJ
  rationale: A close rendering that preserves the exalted divine title and instrumental nuance.
- source_word: πλάνον προσαγορεύσετε
  chosen: you will call a deceiver
  alternatives:
  - you will label an impostor
  - you will name a wanderer/deceiver
  lexicon: LSJ
  rationale: '''Deceiver'' best fits hostile accusation in context.'
- source_word: ὁρμήσετε τοῦ ἀποκτεῖναι
  chosen: you will rush to kill
  alternatives:
  - you will set upon to kill
  - you will make a violent move to kill
  lexicon: LSJ
  rationale: Captures the violent impulsive force of the idiom.
- source_word: ἀνάστημα
  chosen: stature
  alternatives:
  - true worth
  - majesty
  lexicon: LSJ
  rationale: The transmitted text is difficult; 'stature' is the most literal option and leaves interpretive space, with note support.
- source_word: ἀθῷον αἷμα ... ἀναδεχόμενοι
  chosen: taking innocent blood upon your heads
  alternatives:
  - bringing innocent blood upon your heads
  - assuming guilt for innocent blood
  lexicon: LSJ
  rationale: This idiomatic rendering preserves the biblical guilt formula in natural English.
- source_word: τὰ ἅγια ὑμῶν
  chosen: your holy places
  alternatives:
  - your sanctuary things
  - your sanctuaries
  lexicon: LSJ
  rationale: Plural 'holy places' best fits the likely cultic reference while remaining intelligible.
- source_word: ἔρημα ἕως ἐδάφους
  chosen: laid waste to the ground
  alternatives:
  - desolate down to the ground
  lexicon: LSJ
  rationale: Idiomatic English that preserves the totality of devastation.
- source_word: τόπος ... καθαρὸς
  chosen: clean place
  alternatives:
  - pure place
  lexicon: LSJ
  rationale: '''Clean'' better matches cultic purity language in accessible English.'
- source_word: ἐν τοῖς ... ἔθνεσιν
  chosen: among the nations
  alternatives:
  - among the Gentiles
  lexicon: LSJ
  rationale: Given the broader Jewish testamentary setting, 'nations' preserves the literal sense without importing later Christian usage patterns of 'Gentiles'.
- source_word: εἰς κατάραν καὶ εἰς διασκορπισμόν
  chosen: for a curse and for scattering
  alternatives:
  - for cursing and dispersion
  - as an object of curse and dispersion
  lexicon: LSJ
  rationale: Keeps the stark prophetic cadence and the noun pair visible.
- source_word: ἐπισκέψηται
  chosen: visits again
  alternatives:
  - comes again to visit
  - looks upon again
  lexicon: LSJ
  rationale: Retains the biblical visitation motif without overinterpreting it as either judgment or mercy alone; the following verbs specify mercy.
- source_word: οἰκτειρήσῃ καὶ προσδέξηται
  chosen: shows compassion and receives you
  alternatives:
  - has mercy and accepts you
  lexicon: LSJ
  rationale: This pairing preserves both pity and restoration/acceptance in clear English.
