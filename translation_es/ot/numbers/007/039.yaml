translation:
  language: es
  text: un toro[a] del ganado, un carnero, un cordero macho[b] de un año, para holocausto;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «un toro, hijo del ganado», un idiomatismo para un toro del ganado o del hato.'
    reason: lexical_alternative
  - marker: b
    text: O simplemente «cordero»; el hebreo aquí se usa con frecuencia en contextos sacrificiales para un cordero macho.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּר
  english_pob_choice: bull
  chosen_spanish: novillo
  alternatives_spanish:
  - toro
  - buey joven
  lexicon: HALOT
  rationale: En español, 'novillo' comunica bien un animal bovino joven apto para sacrificio y evita la posible rigidez de 'toro' en este contexto. El hebreo designa un bovino sacrificial; la equivalencia debe ser natural pero precisa.
- source_word: בֶּן בָּקָר
  english_pob_choice: from the herd
  chosen_spanish: del ganado
  alternatives_spanish:
  - de la res
  - del hato
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática ('hijo de ganado'). 'Del ganado' conserva el sentido colectivo bovino sin sonar forzado en español y mantiene la referencia al tipo de animal, no a una relación filial literal.
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  - ram
  lexicon: HALOT
  rationale: '''Carnero'' es el equivalente español directo y claro para el macho adulto de la oveja en contexto sacrificial.'
- source_word: כֶּבֶשׂ
  english_pob_choice: male lamb
  chosen_spanish: cordero macho
  alternatives_spanish:
  - cordero
  - borrego macho
  lexicon: HALOT
  rationale: El hebreo puede funcionar de manera sacrificial para un cordero, con distinción de sexo implícita en este listado. 'Cordero macho' preserva esa fuerza distintiva que la POB inglesa explicita.
- source_word: בֶּן שְׁנָתוֹ
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - en su primer año
  lexicon: HALOT
  rationale: La expresión hebrea idiomática indica edad de un año. 'De un año' es la forma más natural y fiel en español.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para un holocausto
  lexicon: HALOT
  rationale: '''Holocausto'' es el término tradicional y técnico en español para עֹלָה, el sacrificio totalmente consumido por el fuego. Aquí se conserva el término cultual estándar por precisión bíblica y porque no hay motivo textual para sustituirlo por una paráfrasis más general.'
theological_decisions:
- issue: Terminología sacrificial de עֹלָה
  english_pob_reading: for a burnt offering
  chosen_spanish_reading: para holocausto
  alternative_spanish_readings:
  - como holocausto
  - para un holocausto
  rationale: 'No hay tensión doctrinal especial aquí, pero sí una decisión terminológica: ''holocausto'' es el equivalente técnico consagrado para el sacrificio completamente quemado. Se mantiene la referencia cultual precisa del texto hebreo.'
  doctrine_reference: Levítico 1; Números 28–29
translation_notes:
  revision_awareness: El registro inglés más reciente no requirió cambios; esta versión española sigue el mismo valor textual y las mismas alternativas léxicas documentadas, adaptándolas al español natural sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo enumerativo del hebreo con artículos indefinidos repetidos: ''un... un... un...''.'
  - Se evitó 'SEÑOR' porque el versículo no contiene el nombre divino.
  - '''Holocausto'' se usa como término técnico bíblico estándar, no como uso moderno ajeno al contexto cultual.'
  - '''Cordero macho'' conserva la distinción de sexo explicitada en la decisión inglesa, aunque en español litúrgico también podría decirse simplemente ''cordero''.'
