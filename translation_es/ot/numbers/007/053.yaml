translation:
  language: es
  text: 'y para el sacrificio de las ofrendas de paz[a]: dos reses[b], cinco carneros, cinco machos cabríos y cinco corderos de un año. Esta fue la ofrenda de Elishama hijo de Ammihud.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ofrendas de comunión' u 'ofrendas de bienestar' para el término hebreo que suele referirse a una comida sacrificial compartida que expresa paz o plenitud.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''dos reses''; algunas traducciones especifican ''dos bueyes''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  english_pob_choice: and for the sacrifice of
  chosen_spanish: y para el sacrificio de
  alternatives_spanish:
  - y para la ofrenda de
  - para el sacrificio de
  lexicon: HALOT
  rationale: Conserva la preposición añadida por el hebreo y mantiene el valor cultual de זֶבַח sin volverlo más genérico de lo que permite el texto.
- source_word: הַשְּׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: las ofrendas de paz
  alternatives_spanish:
  - las ofrendas de comunión
  - las ofrendas de bienestar
  lexicon: HALOT
  rationale: El POB inglés opta por 'peace offerings'; en español 'ofrendas de paz' preserva la terminología tradicional y el sentido sacrificial sin borrar la tensión de que no se trata simplemente de 'paz' en abstracto sino de una categoría ritual.
- source_word: בָּקָר
  english_pob_choice: two cattle
  chosen_spanish: dos reses
  alternatives_spanish:
  - dos cabezas de ganado
  - dos bueyes
  lexicon: HALOT
  rationale: בָּקָר es un colectivo para ganado vacuno. 'Reses' comunica el colectivo en español con naturalidad; evita especificar 'bueyes', que sería más estrecho que el hebreo.
- source_word: אֵילִם
  english_pob_choice: five rams
  chosen_spanish: cinco carneros
  alternatives_spanish:
  - cinco rams
  lexicon: HALOT
  rationale: Carneros es el equivalente natural y preciso en español para אֵילִם en listas sacrificiales.
- source_word: עַתֻּדִים
  english_pob_choice: five male goats
  chosen_spanish: cinco machos de cabra
  alternatives_spanish:
  - cinco cabritos machos
  - cinco machos cabríos
  lexicon: HALOT
  rationale: Conserva la especificación masculina que el término hebreo exige, evitando el más ambiguo 'cabras'.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה
  english_pob_choice: five lambs a year old
  chosen_spanish: cinco corderos de un año
  alternatives_spanish:
  - cinco corderos de un año de edad
  - cinco corderos en su primer año
  lexicon: HALOT
  rationale: 'La revisión inglesa corrigió la especificación de sexo: el hebreo dice simplemente ''corderos, hijos de un año''. ''Corderos de un año'' mantiene la edad sin añadir género no explícito.'
- source_word: זֶה קָרְבַּן
  english_pob_choice: This was the offering of
  chosen_spanish: Esta fue la ofrenda de
  alternatives_spanish:
  - Este fue el ofrecimiento de
  - Esta era la ofrenda de
  lexicon: HALOT
  rationale: Responde bien al cierre narrativo y a la identificación del don presentado por el jefe nombrado.
- source_word: אֱלִישָׁמָע בֶּן עַמִּיהוּד
  english_pob_choice: Elishama son of Ammihud
  chosen_spanish: Elishama hijo de Ammihud
  alternatives_spanish:
  - Elishama, hijo de Ammihud
  lexicon: HALOT
  rationale: Se conserva el patronímico estándar en español sin añadir artículo innecesario.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y la revisión auditada del POB en inglés. Se refleja la corrección importante de la revisión: ''corderos de un año'' sin añadir ''machos'', porque el hebreo no lo especifica en esta cláusula. También se preserva la enumeración sacrificial exacta y el cierre identificador del ofrenda del líder nombrado.'
  spanish_consistency_notes:
  - Se mantiene 'ofrendas de paz' como término cultual reconocible, en paralelo con el inglés POB 'peace offerings'.
  - Se evita traducir בָּקָר como 'bueyes' para no estrechar indebidamente el colectivo hebreo.
  - La edad se expresa de modo natural en español ('de un año') sin sobrecargar el sintagma.
  - Los nombres propios se transliteran de forma consistente con el proyecto.
