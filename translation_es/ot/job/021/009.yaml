translation:
  language: es
  text: Sus casas están a salvo del temor[a], y la vara[b] de Dios no está sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Sus hogares están seguros, sin temor".'
    reason: lexical_alternative
  - marker: b
    text: La "vara de Dios" es una imagen de golpe, disciplina o aflicción divina, sin precisar cuál de esas ideas se enfatiza aquí.
    reason: theological_note
lexical_decisions:
- source_word: בָּתֵּיהֶם
  english_pob_choice: their houses
  chosen_spanish: sus casas
  alternatives_spanish:
  - sus hogares
  - sus familias
  - sus casas y hogares
  lexicon: HALOT
  rationale: בַּיִת en plural constructo puede referirse literalmente a 'casas' o, por extensión, al ámbito del hogar. Mantengo 'casas' para conservar la imagen concreta del hebreo, como hace el POB inglés, sin perder naturalidad en español.
- source_word: שָׁלוֹם
  english_pob_choice: safe
  chosen_spanish: están seguras
  alternatives_spanish:
  - están en paz
  - están seguras y tranquilas
  - gozan de seguridad
  lexicon: HALOT
  rationale: Aquí שָׁלוֹם describe el estado de sus casas frente al peligro. 'Están seguras' transmite bien la idea de seguridad/bienestar y encaja de forma natural con la frase siguiente 'de temor'.
- source_word: מִפָּחַד
  english_pob_choice: from fear
  chosen_spanish: de temor
  alternatives_spanish:
  - sin temor
  - libres de temor
  - de miedo
  lexicon: HALOT
  rationale: La preposición מִן expresa separación o liberación de temor. 'De temor' mantiene esa relación de alejamiento y conserva el paralelismo con el inglés POB, aunque 'sin temor' también sería posible.
- source_word: שֵׁבֶט
  english_pob_choice: rod
  chosen_spanish: vara
  alternatives_spanish:
  - cetro
  - bastón
  - vara de castigo
  lexicon: HALOT
  rationale: '''Vara'' preserva la metáfora de instrumento que golpea o disciplina sin cerrar el sentido a castigo, disciplina o aflicción. En español, ''vara de Dios'' suena más natural y tan abierta como ''rod of God''.'
- source_word: אֱלֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: אֱלוֹהַּ es una forma poética singular para Dios en Job. 'Dios' es la equivalencia directa y no introduce matiz interpretativo adicional.
- source_word: עֲלֵיהֶם
  english_pob_choice: upon them
  chosen_spanish: sobre ellas
  alternatives_spanish:
  - sobre ellos
  - encima de ellos
  - sobre sus casas
  lexicon: HALOT
  rationale: En español, el antecedente cercano 'casas' es femenino plural, por eso traduzco 'sobre ellas' para concordancia natural. 'Sobre ellos' sería posible si se entendiera un colectivo personal, pero el hebreo mantiene el referente a las casas.
- source_word: וְלֹא
  english_pob_choice: and ... not
  chosen_spanish: y no
  alternatives_spanish:
  - ni
  - y no está
  lexicon: HALOT
  rationale: La coordinación negativa se expresa de modo directo con 'y no', manteniendo la estructura del hebreo y la del POB inglés.
theological_decisions:
- issue: El alcance de 'la vara de Dios'
  english_pob_reading: Retain the metaphor 'rod of God' without specifying whether it means punishment, discipline, or affliction.
  chosen_spanish_reading: Conservar 'la vara de Dios' sin precisar si se trata de castigo, disciplina o aflicción.
  alternative_spanish_readings:
  - el castigo de Dios
  - la disciplina de Dios
  - el azote de Dios
  rationale: El hebreo permite varias lecturas dentro de la misma imagen. Traducir con un término más específico resolvería una tensión que el texto no resuelve. 'Vara' mantiene abierta la referencia a golpe, corrección o aflicción, como en el POB inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje coincide con la revisión más reciente del POB inglés y no presenta cambios aplicados; la redacción española sigue de cerca esa decisión auditada, conservando las imágenes y la ambigüedad teológica del texto fuente.
  spanish_consistency_notes:
  - Usé 'Dios' para אֱלוֹהַּ conforme al estándar del proyecto.
  - Conservé el paralelismo entre seguridad y ausencia de temor.
  - Mantuve el lenguaje figurado de 'vara' para no cerrar la tensión semántica del hebreo.
  - Ajusté la concordancia de 'sobre ellas' con 'casas' para una lectura española natural.
