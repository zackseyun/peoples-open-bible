  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יְהוָה → ''Yahvé''; דְבַר יְהוָה → ''la palabra de Yahvé''; לֵאמֹר → ''diciendo''. No hay conflicto doctrinal. La única mejora es estilística y de naturalidad en la fórmula narrativa.'
