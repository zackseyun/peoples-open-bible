translation:
  language: es
  text: 'Y se presentará ante Eleazar el sacerdote[a], quien consultará por él mediante el juicio de los Urim ante Yahvé. Por su mandato saldrán, y por su mandato entrarán: él y todos los hijos de Israel con él[b], sí, toda la congregación.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la decisión de los Urim». La frase se refiere a la consulta sacerdotal ante Yahvé por medio de los Urim.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos de Israel»; es decir, los israelitas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  lexicon: HALOT
  rationale: En español, «delante de» expresa bien la relación espacial y relacional de estar ante una autoridad o representante cultual, sin sonar forzado.
- source_word: יַעֲמֹד
  english_pob_choice: he shall stand
  chosen_spanish: estará
  alternatives_spanish:
  - se pondrá de pie
  - deberá estar
  lexicon: HALOT
  rationale: El hebreo tiene fuerza directiva/futura en el contexto de instrucción. «Estará» conserva ese valor de mandato sin recargar la frase.
- source_word: וְשָׁאַל לוֹ
  english_pob_choice: who shall inquire for him
  chosen_spanish: quien consultará por él
  alternatives_spanish:
  - y preguntará por él
  - quien inquirirá por él
  lexicon: HALOT
  rationale: «Consultar» comunica de manera natural la acción sacerdotal de buscar respuesta divina. «Por él» preserva que la consulta es en favor de Josué.
- source_word: בְּמִשְׁפַּט הָאוּרִים
  english_pob_choice: by the judgment of the Urim
  chosen_spanish: mediante el juicio de los Urim
  alternatives_spanish:
  - por la decisión de los Urim
  - mediante el dictamen de los Urim
  lexicon: HALOT
  rationale: «Juicio» mantiene la carga formal, judicial y cultual de מִשְׁפָּט. Se deja «Urim» como término técnico transliterado, sin sustituirlo por una explicación dentro del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: «Yahvé» como forma del nombre divino, no la sustitución por título.'
- source_word: עַל פִּיו
  english_pob_choice: at his command
  chosen_spanish: por su mandato
  alternatives_spanish:
  - según su palabra
  - al decir de él
  lexicon: HALOT
  rationale: La expresión idiomática comunica autoridad directiva. «Por su mandato» transmite el sentido de dirección autorizada sin calcar literalmente «sobre su boca».
- source_word: יֵצְאוּ ... יָבֹאוּ
  english_pob_choice: they shall go out ... they shall come in
  chosen_spanish: saldrán ... entrarán
  alternatives_spanish:
  - irán ... volverán
  - saldrán ... volverán a entrar
  lexicon: HALOT
  rationale: En español, el par idiomático se expresa con naturalidad como «salir/entrar», manteniendo la secuencia de movimiento y la posible carga pública o militar del hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva el paralelo formal del hebreo. «Hijos de Israel» es transparente y fiel a la forma del original.
- source_word: הָעֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - la comunidad
  lexicon: HALOT
  rationale: En el uso pentateucal, «congregación» conserva el matiz corporativo y cultual que el término tiene en este contexto.
theological_decisions:
- issue: Referencia del posesivo en «por su mandato»
  english_pob_reading: The pronoun is rendered as singular 'his' and understood as the authoritative directive resulting from the Urim inquiry, mediated through Eleazar before the LORD.
  chosen_spanish_reading: Se mantiene el singular «su» sin precisar en exceso el referente en el texto principal; se entiende como la directiva autorizada resultante de la consulta por los Urim, mediada por Eleazar ante Yahvé.
  alternative_spanish_readings:
  - por el mandato de Eleazar
  - por el mandato de Josué
  rationale: El hebreo comprime la referencia y deja cierta tensión sobre el antecedente inmediato. El español conserva esa ambigüedad funcional sin resolverla de forma artificial en el cuerpo del verso.
  doctrine_reference: Preservar la tensión textual en lugar de sobreexplicarla.
translation_notes:
  revision_awareness: No se adoptaron revisiones posteriores al pasaje; el texto sigue el estado auditado de máxima concordancia, con la misma solución de equivalencia óptima y sin cambios requeridos por el control cruzado.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Tetragrama, conforme a la terminología estándar del proyecto.
  - Se mantuvo «Urim» como término técnico sin domesticación.
  - «Hijos de Israel» conserva la forma masculina plural del hebreo; la nota aclara el valor inclusivo en castellano.
  - Las notas a y b están ancladas en el texto mediante [a] y [b], respectivamente.
