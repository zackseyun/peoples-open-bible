translation:
  language: es
  text: Y de los levitas[a], Ahías estaba encargado de los tesoros de la casa de Dios y de los tesoros de las cosas consagradas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y los levitas: Ahías estaba encargado de ...». El hebreo inicial es algo elíptico y puede funcionar como transición de encabezamiento.'
    reason: alternative_reading
  - marker: b
    text: O «las cosas santas» o «las cosas dedicadas», refiriéndose a elementos apartados para uso sagrado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַלְוִיִּם
  english_pob_choice: And of the Levites
  chosen_spanish: Y de los levitas
  alternatives_spanish:
  - Y los levitas
  - En cuanto a los levitas
  lexicon: WLC / HALOT
  rationale: El hebreo tiene una apertura algo elíptica y de transición; en español, «Y de los levitas» conserva esa cualidad introductoria sin forzar una estructura más explícita de sujeto.
- source_word: אֲחִיָּה
  english_pob_choice: Ahijah
  chosen_spanish: Ahías
  alternatives_spanish:
  - Ahíah
  lexicon: HALOT
  rationale: Se translitera el nombre propio en forma natural para el español bíblico; «Ahías» es la adaptación más inteligible y estable en español.
- source_word: עַל
  english_pob_choice: was over
  chosen_spanish: estaba encargado de
  alternatives_spanish:
  - estaba sobre
  - era responsable de
  lexicon: HALOT
  rationale: En contexto administrativo, עַל expresa supervisión u ordenamiento. «Estaba encargado de» comunica bien la idea de autoridad funcional en español sin sonar demasiado literal ni rígido.
- source_word: אֹצְרוֹת
  english_pob_choice: treasuries
  chosen_spanish: tesoros
  alternatives_spanish:
  - depósitos
  - almacenes
  lexicon: HALOT
  rationale: Aunque puede referirse a depósitos físicos, en el contexto del templo el español «tesoros» transmite mejor el ámbito de bienes valiosos bajo custodia; así queda cercano al valor institucional de «treasuries».
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: Se conserva la expresión más literal y transparente del hebreo. «Casa de Dios» es clara en español y mantiene la forma idiomática de la fuente.
- source_word: וּלְאֹצְרוֹת
  english_pob_choice: and the treasuries of
  chosen_spanish: y de los tesoros de
  alternatives_spanish:
  - y sobre los tesoros de
  lexicon: HALOT
  rationale: La repetición del sustantivo en paralelo se mantiene en español para no ocultar la estructura hebrea. La relación de dependencia queda suficientemente clara por el contexto y por «estaba encargado de».
- source_word: הַקֳּדָשִׁים
  english_pob_choice: the holy things
  chosen_spanish: las cosas santas
  alternatives_spanish:
  - los objetos sagrados
  - las cosas consagradas
  lexicon: HALOT
  rationale: «Las cosas santas» preserva el sentido cultual sin decidir de antemano entre objetos, ofrendas o bienes dedicados. Mantiene la tensión semántica documentada por la nota inglesa entre lo «holy» y lo «dedicated/consecrated».
theological_decisions:
- issue: Sentido cultual de הַקֳּדָשִׁים
  english_pob_reading: '''Holy things'' may also be rendered ''dedicated things'' or ''consecrated things,'' referring to items set apart for sacred use.'
  chosen_spanish_reading: «Las cosas santas» connota elementos apartados para uso sagrado, sin reducirlos a una sola categoría material.
  alternative_spanish_readings:
  - las cosas dedicadas
  - las cosas consagradas
  - los objetos sagrados
  rationale: El texto no especifica si se trata de objetos, ofrendas o bienes; por eso conviene una traducción amplia que conserve la ambigüedad cultual presente en el hebreo y en la nota inglesa.
  doctrine_reference: Santificación / consagración de bienes para el culto
- issue: Función administrativa de עַל
  english_pob_reading: was over
  chosen_spanish_reading: estaba encargado de
  alternative_spanish_readings:
  - era responsable de
  - estaba sobre
  rationale: La frase describe una administración concreta del templo, no una idea doctrinal. «Encargado de» expresa supervisión institucional con naturalidad en español y evita una literalidad que sonaría extraña.
  doctrine_reference: Administración del culto y mayordomía levítica
translation_notes:
  revision_awareness: 'Se revisó la redacción a la luz del pasaje hebreo y del audit trail inglés. No se requieren cambios sustantivos respecto del sentido base: se conservó la apertura elíptica, el valor administrativo de עַל y la ambigüedad cultual de הַקֳּדָשִׁים.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para הָאֱלֹהִים, conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque el texto hebreo aquí dice «Dios», no el nombre divino.
  - «Tesoros» conserva la imaginería de custodia/inventario propia del contexto del templo.
  - La nota al pie solo marca la alternativa de lectura de la apertura hebrea; no se añaden otras notas porque no hay una variante textual adicional documentada.
