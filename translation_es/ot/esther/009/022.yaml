    reason: cultural_note
  revision_rationale: 'La revisión corrige el anclaje erróneo de la nota sobre «día bueno», añade la nota cultural documentada en la auditoría inglesa para «envío de porciones», y ajusta dos frases para mayor fidelidad al hebreo y mejor naturalidad en español: «para hacerlos» en vez de «para convertirlos», y «a un día bueno» en lugar de «a día bueno». No se requiere adjudicación adicional.'
