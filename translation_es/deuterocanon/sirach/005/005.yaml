translation:
  language: es
  text: 'No digas: «He pecado, y ¿qué se me ha hecho[a]? Nada», porque Dios es paciente[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La pasiva del hebreo también puede entenderse más literalmente como «¿qué será hecho conmigo?». El paralelo griego dice: «No seas sin temor respecto a la expiación, para añadir pecado sobre pecados». Ambos testigos advierten contra presumir de la misericordia divina.'
    reason: alternative_reading
  - marker: b
    text: O, más literalmente, «porque Dios es lento para la ira». El hebreo usa una expresión idiomática que literalmente significa «largo de narices/rostro», es decir, tardío para enojarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תֹּאמַר
  english_pob_choice: Do not say
  chosen_spanish: No digas
  alternatives_spanish:
  - No digas para ti
  - Nunca digas
  lexicon: HALOT
  rationale: Es un mandato prohibitivo directo; en español, la forma imperativa negativa conserva con naturalidad el tono exhortativo del hebreo.
- source_word: חָטָאתִי
  english_pob_choice: I have sinned
  chosen_spanish: He pecado
  alternatives_spanish:
  - Pecé
  - He cometido pecado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completa con relevancia presente; «He pecado» reproduce bien ese valor y es claro en español.
- source_word: וְמַה יֵעָשֶה לִי
  english_pob_choice: and what has been done to me?
  chosen_spanish: ¿y qué se ha hecho conmigo?
  alternatives_spanish:
  - ¿y qué me será hecho?
  - ¿y qué me harán?
  lexicon: HALOT
  rationale: Se conserva la pasiva del hebreo revisada en el audit trail inglés. «Se ha hecho conmigo» suena natural en español y mantiene el matiz de consecuencia/impunidad aparente.
- source_word: מְאוּמָה
  english_pob_choice: Nothing
  chosen_spanish: Nada
  alternatives_spanish:
  - En nada
  - Ni una cosa
  lexicon: HALOT
  rationale: Funciona como respuesta elíptica a la pregunta retórica; «Nada» es la equivalencia idiomática más directa.
- source_word: אֵל אֶרֶךְ אַפַּיִם הוּא
  english_pob_choice: for God is patient
  chosen_spanish: porque Dios es paciente
  alternatives_spanish:
  - porque Dios es lento para la ira
  - porque Dios es longánime
  lexicon: HALOT
  rationale: La idea de אֶרֶךְ אַפַּיִם se expresa de forma natural como «paciente», tal como en el inglés POB. Se preserva la posibilidad literal en nota porque la imagen bíblica tradicional es «lento para la ira».
theological_decisions:
- issue: Cómo rendir אֶרֶךְ אַפַּיִם sin neutralizar la advertencia moral
  english_pob_reading: God is patient
  chosen_spanish_reading: Dios es paciente
  alternative_spanish_readings:
  - Dios es lento para la ira
  - Dios es longánime
  rationale: La cláusula explica por qué no debe pensarse que el pecado queda sin efecto. «Paciente» comunica la forbearancia divina sin suavizar el aviso contra presumir de la misericordia de Dios; la forma más literal se conserva como alternativa.
  doctrine_reference: 'DOCTRINE.md: readable modern Spanish; preserve theological tension rather than resolving it'
translation_notes:
  revision_awareness: El texto inglés finalizó con «what has been done to me» para reflejar mejor la pasiva hebrea יֵעָשֶׂה; la versión española sigue ese ajuste con «¿qué se ha hecho conmigo?» y mantiene la tensión interpretativa entre el hebreo y el paralelo griego.
  spanish_consistency_notes:
  - Se usa «Dios» conforme al hebreo אֵל y la convención POB para el nombre común divino.
  - Se evita «Señor» para no introducir una convención de máscara no presente en el hebreo base.
  - Se mantiene el tono sapiencial breve y advertencial, sin expandir el sentido más allá del testimonio textual.
  - La nota alternativa preserva la fuerza idiomática de אֶרֶךְ אַפַּיִם sin sustituir el texto principal.
