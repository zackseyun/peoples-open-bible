translation:
  language: es
  text: entonces tus ancianos y tus jueces saldrán y medirán hasta las ciudades que están alrededor del hombre muerto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «medirán hasta las ciudades que están alrededor del caído».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצְאוּ
  english_pob_choice: then ... shall go out
  chosen_spanish: entonces ... saldrán
  alternatives_spanish:
  - y ... saldrán
  - y ... salgan
  lexicon: HALOT
  rationale: El waw consecutivo en este contexto legal expresa secuencia procedimental; «entonces» comunica bien ese avance en español sin perder la idea de salida física con «saldrán».
- source_word: זְקֵנֶיךָ
  english_pob_choice: your elders
  chosen_spanish: tus ancianos
  alternatives_spanish:
  - los ancianos de tu pueblo
  - tus mayores
  lexicon: HALOT
  rationale: La forma posesiva singular se conserva con «tus». «Ancianos» es el equivalente natural y directo de זְקֵנִים en un marco institucional.
- source_word: וְשֹׁפְטֶיךָ
  english_pob_choice: and your judges
  chosen_spanish: y tus jueces
  alternatives_spanish:
  - y tus magistrados
  - y tus oficiales
  lexicon: HALOT
  rationale: El término judicial del hebreo se refleja con «jueces», que es claro y preciso en este procedimiento legal.
- source_word: וּמָדְדוּ
  english_pob_choice: measure to the cities
  chosen_spanish: medirán hasta las ciudades
  alternatives_spanish:
  - medirán a las ciudades
  - tomarán medidas hasta las ciudades
  lexicon: HALOT
  rationale: El verbo mide una distancia o relación espacial hacia las ciudades; «hasta» expresa bien el término de la medición en español y evita añadir un objeto inexistente en el hebreo.
- source_word: אֶל הֶעָרִים
  english_pob_choice: to the cities
  chosen_spanish: hasta las ciudades
  alternatives_spanish:
  - a las ciudades
  - hacia las ciudades
  lexicon: HALOT
  rationale: Con el verbo medir, אֶל funciona de modo direccional/terminal; «hasta las ciudades» conserva ese valor mejor que un simple «a».
- source_word: אֲשֶׁר סְבִיבֹת
  english_pob_choice: that are around
  chosen_spanish: que están alrededor
  alternatives_spanish:
  - que rodean
  - que están en torno
  lexicon: HALOT
  rationale: La frase relativa identifica las ciudades circundantes al lugar del cadáver; «alrededor» transmite el sentido espacial de manera natural.
- source_word: הֶחָלָל
  english_pob_choice: the slain man
  chosen_spanish: el muerto
  alternatives_spanish:
  - el caído
  - el hombre muerto
  - el asesinado
  lexicon: HALOT
  rationale: Aunque el hebreo puede denotar al «caído/slain», en español «el muerto» evita introducir desde el inicio una especificación judicial que el contexto aún no formula. Mantiene la referencia a la víctima hallada sin sobretraducir.
translation_notes:
  revision_awareness: El borrador sigue la revisión auditada del inglés al no añadir «la distancia»; reproduce el valor procedimental de «medir» de forma concisa. También conserva la singularidad posesiva de la audiencia con «tus ancianos» y «tus jueces».
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras sustituciones porque no aparece el nombre divino en este versículo.
  - «Ancianos» y «jueces» mantienen el registro jurídico del pasaje.
  - La nota alternativa preserva la tensión léxica de הֶחָלָל entre «muerto» y «caído/slain» sin imponer una interpretación más fuerte.
