translation:
  language: es
  text: De su flor[a], como un racimo de uvas que madura, se alegró mi corazón en ella; mi pie pisó en rectitud[b]; desde mi juventud la rastreé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un racimo de uvas que enrojece»; el griego puede enfatizar el cambio de color al madurar.
    reason: lexical_alternative
  - marker: b
    text: O «mi pie anduvo en rectitud» o «en un camino recto»; el griego permite tanto la imagen literal del camino como la rectitud moral.
    reason: lexical_alternative
  - marker: c
    text: O «seguí sus huellas» o «la busqué»; el verbo griego evoca seguir huellas o rastros.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξ ἄνθους
  english_pob_choice: From her blossom
  chosen_spanish: Desde su flor
  alternatives_spanish:
  - Desde su floración
  - Desde su flor de ella
  lexicon: LSJ
  rationale: ἄνθος puede significar flor o floración. Como el contexto personifica a la sabiduría, «su flor» conserva la imagen de posesión y la metáfora floral sin sonar forzado en español.
- source_word: ὡς περκάζουσης σταφυλῆς
  english_pob_choice: like a ripening cluster of grapes
  chosen_spanish: como un racimo de uvas que madura
  alternatives_spanish:
  - como un racimo de uvas que enrojece
  - como un racimo de uvas que va madurando
  lexicon: LSJ
  rationale: El griego describe el racimo cuando toma color y llega a maduración. En español, «que madura» conserva la imagen agrícola y la idea de desarrollo visible.
- source_word: εὐφράνθη
  english_pob_choice: rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - fue alegrado
  lexicon: BDAG
  rationale: El verbo expresa gozo interior; «se alegró» es natural y fiel, sin perder la fuerza emocional del pasivo/deponente.
- source_word: ἡ καρδία μου
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi ser
  - mi interior
  lexicon: BDAG
  rationale: En el lenguaje bíblico el corazón designa la sede interior de afecto y voluntad; no requiere paráfrasis.
- source_word: ἐν αὐτῇ
  english_pob_choice: in her
  chosen_spanish: en ella
  alternatives_spanish:
  - por ella
  - con ella
  lexicon: BDAG
  rationale: Se mantiene el referente femenino de la sabiduría personificada y la preposición griega, que puede implicar participación o relación íntima.
- source_word: ἐπέβη ὁ πούς μου
  english_pob_choice: my foot trod
  chosen_spanish: mi pie anduvo
  alternatives_spanish:
  - mi pie pisó
  - mi pie caminó
  lexicon: LSJ
  rationale: ἐπέβη sugiere poner el pie o pisar; «anduvo» resulta claro en español y conserva la imagen del caminar, aunque es menos técnico que «pisó».
- source_word: ἐν εὐθύτητι
  english_pob_choice: in uprightness
  chosen_spanish: en rectitud
  alternatives_spanish:
  - en justicia
  - en línea recta
  lexicon: LSJ
  rationale: εὐθύτης puede significar rectitud moral y también lo recto de un camino. «Rectitud» preserva ambas capas sin imponer solo la imagen espacial.
- source_word: ἐκ νεότητός μου
  english_pob_choice: from my youth
  chosen_spanish: desde mi juventud
  alternatives_spanish:
  - desde joven
  - desde mi niñez
  lexicon: BDAG
  rationale: Expresión temporal directa y natural en español; mantiene la duración continua del seguimiento.
- source_word: ἴχνευον αὐτήν
  english_pob_choice: I tracked her down
  chosen_spanish: la seguí
  alternatives_spanish:
  - la rastreé
  - seguí sus huellas
  lexicon: LSJ
  rationale: El verbo evoca seguir rastros o huellas. «La seguí» es más sobrio y publicable en español; las alternativas conservan con mayor literalidad la metáfora del rastreo.
theological_decisions:
- issue: Personificación femenina de la sabiduría
  english_pob_reading: The pronouns refer to personified wisdom and are rendered 'her'.
  chosen_spanish_reading: Los pronombres se refieren a la sabiduría personificada y se traducen con femenino («su», «ella», «la»).
  alternative_spanish_readings:
  - Usar un neutro impersonal como «ello»
  - Neutralizar la personificación con sustantivos abstractos
  rationale: Sirácida personifica la sabiduría como femenina; conservar ese femenino evita borrar un rasgo literario y teológico del pasaje.
  doctrine_reference: Poética bíblica y personificación en literatura sapiencial
translation_notes:
  revision_awareness: El borrador español sigue de cerca la última revisión inglesa, especialmente en ἐπέβη, donde se prefirió un verbo de pisar/troder. Aquí se optó por «anduvo» por naturalidad publicable en español, pero se conservó la nota alternativa para no perder la imagen de paso/huella. También se mantuvo el valor figurado de «flor» y la personificación femenina de la sabiduría.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no la contiene.
  - Se conserva la personificación de la sabiduría en femenino para alinearse con el griego y con el audit trail inglés.
  - Se evita el calco excesivo en «desde su flor» al tiempo que se preserva la metáfora floral del original.
