    text: Literalmente, 'un buen día'; es decir, un día festivo o de celebración.
    reason: lexical_alternative
  - marker: b
    text: 'O: «se declaraban judíos» o «adoptaban identidad o práctica judía»; el verbo hebreo es raro y puede indicar identificación con los judíos más que una conversión formal en un sentido técnico posterior.'
    reason: alternative_reading
  revision_rationale: 'La revisión hace dos ajustes menores pero importantes: mejora la naturalidad española de יוֹם טוֹב con ''un buen día'' y añade la nota lexical correspondiente, y simplifica ''se estaban haciendo judíos'' a ''se hacían judíos'' sin perder la tensión procesual del hebreo. También se pule la nota alternativa para que suene más natural en español. No cambia el sentido global ni la decisión teológica auditada.'
