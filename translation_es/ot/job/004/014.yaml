translation:
  language: es
  text: El miedo me sobrevino, y temblor, e hizo temblar a todos mis huesos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea dice literalmente 'la multitud de mis huesos'; aquí se traduce 'todos mis huesos' para expresar con naturalidad el efecto corporal total, aunque la imagen original es una forma poética intensiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּחַד
  english_pob_choice: Fear
  chosen_spanish: miedo
  alternatives_spanish:
  - temor
  - terror
  - pavor
  lexicon: HALOT
  rationale: El sustantivo expresa miedo/dread. 'Miedo' es natural en español y conserva el sentido amplio sin intensificar indebidamente a 'terror' o 'pavor'.
- source_word: קְרָאַנִי
  english_pob_choice: came upon me
  chosen_spanish: me sobrevino
  alternatives_spanish:
  - me aconteció
  - me llegó
  - me acometió
  lexicon: HALOT
  rationale: El verbo קרא aquí tiene el sentido de 'suceder/venir sobre'. 'Me sobrevino' reproduce el impacto repentino y encaja con el paralelismo poético.
- source_word: וּרְעָדָה
  english_pob_choice: and trembling
  chosen_spanish: y temblor
  alternatives_spanish:
  - y tembloroso estremecimiento
  - y estremecimiento
  - y temblor y estremecimiento
  lexicon: HALOT
  rationale: El sustantivo nombra la reacción física acompañante del miedo. 'Temblor' es idiomático y mantiene la coordinación breve del hebreo.
- source_word: וְרֹב
  english_pob_choice: the multitude of
  chosen_spanish: todos mis
  alternatives_spanish:
  - la multitud de mis
  - la abundancia de mis
  - muchos de mis
  lexicon: HALOT
  rationale: Aunque רֹב literalmente significa 'multitud/abundancia', el contexto poético apunta a la totalidad afectada por el estremecimiento. 'Todos mis' sigue la revisión inglesa reciente y comunica con naturalidad el efecto corporal, sin perder que la imagen subyacente es intensiva.
- source_word: עַצְמוֹתַי
  english_pob_choice: my bones
  chosen_spanish: huesos
  alternatives_spanish:
  - huesos míos
  - osamenta
  - todo mi cuerpo
  lexicon: HALOT
  rationale: Se conserva el término corporal concreto 'huesos', fiel a la imaginería hebrea. El posesivo se expresa en 'mis' para fluidez en español.
- source_word: הִפְחִיד
  english_pob_choice: it made ... shake
  chosen_spanish: hizo que ... se sacudieran
  alternatives_spanish:
  - hizo temblar
  - los hizo temblar
  - los llenó de terror
  lexicon: HALOT
  rationale: 'El hifil de פחד es causativo: ''causar miedo''. En español, ''hizo que ... se sacudieran'' expresa el resultado corporal con naturalidad y preserva el carácter causativo del verbo.'
translation_notes:
  revision_awareness: He seguido el pasaje hebreo y el expediente inglés de POB, incluyendo la revisión más reciente que sustituyó una imagen más literal por una formulación más natural ('all my bones shake'). En español opté por una solución igualmente natural, pero conservando la fuerza poética y la causalidad del hifil.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y sobrio.
  - '''Miedo'' se usa como equivalente amplio de פחד en este contexto.'
  - Se preservó la imaginería corporal de 'huesos' sin convertirla en una paráfrasis abstracta.
  - La nota al pie marca la alternativa literal del hebreo y la decisión contextual tomada en español.
