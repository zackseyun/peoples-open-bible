translation:
  language: es
  text: Y la altura fortificada de tus murallas la ha abatido[a], la ha humillado, la ha echado por tierra, hasta el polvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la fortaleza, la altura de tus murallas». La cadena constructa hebrea está comprimida y puede traducirse de una manera más formal.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִבְצַר
  english_pob_choice: And the fortified
  chosen_spanish: Y la altura fortificada
  alternatives_spanish:
  - Y la fortaleza
  - Y la fortificación
  lexicon: HALOT
  rationale: מִבְצָר denota una fortaleza o fortificación. En esta cadena constructa, el inglés POB lo resolvió con un adjetivo ('fortified') para mantener naturalidad. En español, 'altura fortificada' conserva la idea defensiva sin añadir una posesión explícita que el hebreo no desarrolla por separado.
- source_word: מִשְׂגַּב
  english_pob_choice: height
  chosen_spanish: altura
  alternatives_spanish:
  - altura segura
  - altura inaccesible
  - bastión
  lexicon: HALOT
  rationale: מִשְׂגָּב suele referirse a un lugar alto y seguro. Como מִבְצָר ya aporta el sentido de fortificación, 'altura' evita redundancia y preserva el matiz de elevación.
- source_word: חוֹמֹתֶיךָ
  english_pob_choice: your walls
  chosen_spanish: tus murallas
  alternatives_spanish:
  - tus muros
  - las murallas de ti
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'tus muros/murallas'. En español, 'murallas' es más natural en un contexto fortificado y mantiene la fuerza defensiva del plural.
- source_word: הֵשַׁח
  english_pob_choice: has brought down
  chosen_spanish: la ha abatido
  alternatives_spanish:
  - la ha derribado
  - la ha bajado
  - la ha hecho caer
  lexicon: HALOT
  rationale: El verbo expresa hacer que algo elevado descienda o quede humillado. 'Abatir' conserva bien la imagen de derribo y también el matiz de humillación.
- source_word: הִשְׁפִּיל
  english_pob_choice: laid low
  chosen_spanish: la ha humillado
  alternatives_spanish:
  - la ha rebajado
  - la ha abatido
  - la ha puesto en lo bajo
  lexicon: HALOT
  rationale: El verbo significa hacer bajo o humillar. En español, 'humillar' comunica con claridad la deshonra y el abatimiento implícitos en la serie verbal.
- source_word: הִגִּיעַ לָאָרֶץ
  english_pob_choice: cast to the ground
  chosen_spanish: la ha hecho llegar a la tierra
  alternatives_spanish:
  - la ha arrojado al suelo
  - la ha llevado a la tierra
  - la ha echado por tierra
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'la hizo llegar a la tierra'. Se conserva de modo bastante cercano para no perder el encadenamiento verbal y la progresión del descenso.
- source_word: עַד עָפָר
  english_pob_choice: to the dust
  chosen_spanish: hasta el polvo
  alternatives_spanish:
  - al polvo
  - hasta el polvo del suelo
  lexicon: HALOT
  rationale: La expresión intensifica la caída total. 'Hasta el polvo' mantiene la fuerza idiomática y el movimiento descendente hacia la ruina completa.
theological_decisions:
- issue: Cadena verbal de humillación y destrucción
  english_pob_reading: has brought down, laid low, and cast to the ground, to the dust
  chosen_spanish_reading: la ha abatido, la ha humillado, la ha hecho llegar a la tierra, hasta el polvo
  alternative_spanish_readings:
  - la ha derribado, la ha rebajado, la ha echado por tierra, hasta el polvo
  - la ha abatido, la ha hecho caer, la ha reducido al polvo
  rationale: No se suaviza la serie de verbos. La acumulación expresa el derribo total de una fortificación soberbia; por eso se conserva la progresión descendente sin convertirla en una sola idea general.
  doctrine_reference: Isaías 25:12; juicio divino sobre la soberbia humana y la ruina de las fortalezas
- issue: Lectura constructa comprimida del hebreo
  english_pob_reading: The Hebrew construct chain is compressed and may be rendered more formally.
  chosen_spanish_reading: la altura fortificada de tus murallas
  alternative_spanish_readings:
  - la fortaleza, la altura de tus murallas
  - la fortaleza de la altura de tus murallas
  rationale: Se opta por una solución española fluida que refleja la cadena constructa sin introducir un giro explicativo excesivo. La nota preserva que también es posible una lectura más formal y segmentada.
  doctrine_reference: Nota textual/lexical de la cadena constructa hebrea
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y que el acuerdo con el texto fuente era alto. Se mantuvo esa línea, conservando la secuencia verbal y la ambigüedad de la cadena constructa en una nota alternativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió 'murallas' por su naturalidad en contexto fortificado; 'muros' queda como alternativa válida.
  - Se mantuvo el paralelismo verbal sin condensarlo en una sola expresión para no perder la gradación del descenso.
