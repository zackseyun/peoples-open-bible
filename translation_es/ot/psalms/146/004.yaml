review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: salida del aliento/espíritu, retorno del hombre a la tierra y desaparición inmediata de sus planes. Conserva correctamente la alternativa léxica de רוּחַ en nota. Sin embargo, «se va» para תֵּצֵא debilita la imagen concreta de ‘salir’, y «vuelve a su tierra» puede sonar más posesivo/territorial que el hebreo אַדְמָה en este contexto de mortalidad.'
  spanish_quality_summary: 'El español es claro y natural, con buen tono bíblico moderno. La frase funciona bien, pero puede mejorarse con una formulación más precisa y un poco más digna: «sale» preserva mejor la imaginería verbal, y «su suelo» evita la posible lectura de patria/propiedad asociada a «su tierra».'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Aliento» con nota «espíritu» sigue la decisión auditada. No aparecen términos sensibles como Yahvé/Mesías/etc. La revisión propuesta busca mayor fidelidad léxica, no un cambio teológico.
  issues:
  - severity: medium
    issue: «se va» para תֵּצֵא
    rationale: El hebreo יצא significa literalmente ‘salir’. «Se va» es comprensible, pero atenúa la imagen concreta de algo que sale de la persona al morir. «Sale» o «sale de él» preserva mejor la forma verbal sin sobreinterpretar.
  - severity: medium
    issue: «a su tierra» para לְאַדְמָתוֹ
    rationale: Aunque «tierra» es posible, en español puede sugerir patria, parcela o tierra natal. En este versículo el énfasis está en el retorno a la materia terrestre/soil. «A su suelo» conserva el posesivo y evita asociaciones menos precisas.
  - severity: low
    issue: Error menor en la justificación léxica
    rationale: La explicación dice «expresa el salida concreta»; debería ser «la salida concreta». No afecta el texto bíblico, pero muestra un pequeño descuido editorial.
  revised_spanish_text: Su aliento[a] sale; él vuelve a su suelo; ese mismo día perecen sus planes.
  revised_footnotes:
  - marker: a
    text: O «su espíritu». El hebreo רוּחַ puede significar «aliento» o «espíritu».
    reason: lexical_alternative
  revision_rationale: Se ajusta «se va» a «sale» para reflejar con más fidelidad el verbo hebreo ‘sale/va hacia afuera’. Se añade «él» para aclarar el cambio de sujeto, coherente con la decisión del POB en inglés. Se cambia «a su tierra» por «a su suelo» para expresar mejor אַדְמָה como suelo/tierra material en contexto de muerte, evitando una posible lectura de patria o posesión territorial. La nota se mantiene sin cambios porque preserva correctamente la alternativa semántica de רוּחַ.
