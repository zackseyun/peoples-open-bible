translation:
  language: es
  text: Pero, todavía respirando e inflamado[a] de ira, se levantó, aunque su sangre brotaba en torrentes y sus heridas eran graves, y, corriendo entre la muchedumbre, se puso de pie sobre una peña escarpada[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «encendido de ira» o «ardiendo de ira». El griego πεπυρωμένος conserva la imagen de algo puesto al fuego.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «roca escarpada» o «peñón abrupto». El adjetivo final describe una peña/roca de perfil muy abrupto o saliente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι δὲ ἔμπνους ὑπάρχων
  english_pob_choice: Yet still breathing
  chosen_spanish: Pero todavía respirando
  alternatives_spanish:
  - Pero aún con aliento
  - Todavía vivo
  lexicon: LSJ
  rationale: ἔμπνους denota literalmente estar con aliento o con vida. «Todavía respirando» conserva la imagen física y el valor narrativo de continuidad que el inglés POB mantuvo con «Yet still breathing». El «Pero» refleja el matiz discursivo de δέ en transición narrativa.
- source_word: πεπυρωμένος τοῖς θυμοῖς
  english_pob_choice: inflamed with rage
  chosen_spanish: encendido con ira
  alternatives_spanish:
  - inflamado con ira
  - ardiendo de ira
  lexicon: LSJ
  rationale: El participio perfecto expresa una condición resultante de estar «puesto al fuego», y θυμοί aquí refiere a pasiones/ira. «Encendido con ira» mantiene la metáfora de fuego sin volverla demasiado explicativa. «Inflamado» sería posible, pero en español «encendido» suena más natural y sigue la tensión imagética del griego.
- source_word: ἐξαναστὰς
  english_pob_choice: he rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: LSJ
  rationale: El aoristo participial indica una acción súbita después del derrumbe o la herida. «Se levantó» es la forma más natural en español y comunica el movimiento sin añadir dramatismo que el texto no exija.
- source_word: φερομένων κρουνηδὸν τῶν αἱμάτων
  english_pob_choice: his blood was pouring out in streams
  chosen_spanish: su sangre brotaba en torrentes
  alternatives_spanish:
  - su sangre salía a borbotones
  - su sangre manaba como de una fuente
  lexicon: LSJ
  rationale: κρουνηδόν sugiere un fluir como de fuente o manantial, con fuerza. «Brotaba en torrentes» transmite la imagen abundante y violenta en un español claro, sin perder la intensidad física. He evitado una paráfrasis demasiado interpretativa, pero también he evitado un calco torpe.
- source_word: δυσχερῶν τῶν τραυμάτων ὄντων
  english_pob_choice: his wounds were grievous
  chosen_spanish: sus heridas eran graves
  alternatives_spanish:
  - sus heridas eran penosas
  - sus heridas eran grievosas
  lexicon: LSJ
  rationale: δυσχερής puede significar penoso, difícil de soportar, grave o doloroso. En este contexto corporal, «graves» comunica la seriedad de las heridas de modo idiomático y digno en español, manteniendo el nivel formal del POB.
- source_word: δρόμῳ τοὺς ὄχλους διελθών
  english_pob_choice: running through the crowds
  chosen_spanish: corriendo entre la multitud
  alternatives_spanish:
  - pasando corriendo entre las multitudes
  - atravesando a la multitud a la carrera
  lexicon: LSJ
  rationale: 'El dativo δρόμῳ expresa modo: «corriendo / a la carrera». ὄχλοι está en plural, pero en español «la multitud» puede funcionar como colectivo más natural y publicable. La formulación conserva la urgencia del movimiento sin sonar artificial.'
- source_word: στὰς ἐπί τινος πέτρας ἀπορρώγος
  english_pob_choice: he stood upon a sheer rock
  chosen_spanish: se puso de pie sobre una peña escarpada
  alternatives_spanish:
  - se puso de pie sobre una roca escarpada
  - se detuvo sobre una peña abrupta
  lexicon: LSJ
  rationale: πέτρα puede ser roca o peña; ἀπορρώγος sugiere algo abrupto, escarpado o saliente. «Peña escarpada» mantiene la imagen topográfica fuerte y la aspereza del terreno, con un tono bíblico-natural en español contemporáneo. Elegí «peña» para no perder la sensación de risco/crag que el inglés POB expresó con «sheer rock».
translation_notes:
  revision_awareness: La versión española sigue de cerca la revisión auditada del inglés POB, pero ajusta la fuerza de πεπυρωμένος con una metáfora igualmente viva en español («encendido con ira») y conserva el carácter abrupto de ἀπορρώγος con «peña escarpada». Se mantuvo la estructura narrativa y la progresión corporal-espacial del original griego, sin suavizar el flujo de sangre ni la gravedad de las heridas.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé/Mesías» fuera de este versículo porque no aparecen en el pasaje.
  - Se prefirió un español formal y legible, con verbos concretos («respirando», «se levantó», «brotaba», «corriendo»).
  - La pluralidad de ὄχλοι se resolvió con el colectivo «la multitud» por naturalidad española, sin alterar el sentido.
  - La nota de pie de página conserva las alternativas relevantes del audit trail inglés para ἔμπνους/κρουνηδόν y ἀπορρώγος.
