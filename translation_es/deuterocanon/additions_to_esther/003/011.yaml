translation:
  language: es
  text: Y Ester la reina se refugió en Yahvé[a], presa de una lucha mortal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «huyó al Señor». El verbo griego puede expresar huir hacia alguien para buscar refugio.
    reason: lexical_alternative
  - marker: b
    text: O «sobrecogida por una lucha de muerte» o «en agonía de muerte». La expresión griega reúne la idea de lucha intensa y de muerte inminente.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέφυγεν
  english_pob_choice: fled to
  chosen_spanish: se refugió en
  alternatives_spanish:
  - corrió a refugiarse en
  - huyó hacia
  lexicon: BDAG
  rationale: El verbo griego expresa huir en busca de refugio, no solo desplazamiento físico. «Se refugió en» conserva la idea de buscar amparo y suena natural en español; evita perder el matiz de amparo que el contexto exige.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Soberano
  lexicon: BDAG
  rationale: Aunque el texto griego dice κύριον, el proyecto español exige «Yahvé» para la referencia divina cuando no hay motivo textual para ocultar el nombre. En este contexto de oración a Dios, «Yahvé» comunica con claridad la identidad del destinatario.
- source_word: ἐν ἀγῶνι
  english_pob_choice: by a struggle
  chosen_spanish: por una angustia
  alternatives_spanish:
  - en lucha
  - en combate
  - en una lucha
  lexicon: LSJ
  rationale: ἀγών puede abarcar lucha, conflicto intenso o agonía. En español, «angustia» transmite bien el estado de crisis extrema, aunque no reproduce por sí sola la imagen de contienda; por eso se combina con «mortal» para mantener la fuerza del pasaje.
- source_word: θανάτου
  english_pob_choice: of death
  chosen_spanish: mortal
  alternatives_spanish:
  - de muerte
  - de agonía
  - mortífera
  lexicon: BDAG
  rationale: El genitivo vincula la angustia con la muerte inminente. «Mortal» conserva esa relación de peligro de muerte con naturalidad en español y evita una construcción demasiado rígida.
- source_word: κατειλημμένη
  english_pob_choice: overtaken by
  chosen_spanish: sobrevenida por
  alternatives_spanish:
  - atrapada por
  - presa de
  - sorprendida por
  lexicon: BDAG
  rationale: El participio pasivo expresa estar alcanzada o presa de una condición. «Sobrevenida por» comunica el carácter repentino e invasivo de la crisis, manteniendo el tono solemne del relato.
theological_decisions:
- issue: Renderización de κύριος en un contexto de plegaria a Dios
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Señor Dios
  rationale: La tradición editorial del proyecto distingue el tetragrámaton de otros usos de κύριος. Aunque la base griega aquí dice κύριον, el contexto es una apelación a Dios; en español se prefiere «Yahvé» para no enmascarar la referencia divina y mantener la transparencia del texto.
  doctrine_reference: 'DOCTRINE.md: Tetragrammaton / κύριος en contextos de referencia al Dios de Israel'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «seized by a struggle of death» a «overtaken by a deadly struggle» para lograr mayor naturalidad sin perder la crisis mortal. La redacción española refleja esa revisión con una formulación igualmente natural y manteniendo la intensidad del griego.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - «Se refugió en» conserva el valor de búsqueda de amparo del verbo griego sin volverlo un simple movimiento físico.
  - «Angustia mortal» intenta equilibrar la imagen de ἀγών con la relación explícita con la muerte.
  - La puntuación separa las dos acciones/situaciones con coma, siguiendo la compacta sintaxis griega.
