review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura causal y la imaginería básica del hebreo: calzado/prenda ensangrentada destinados al fuego. También preserva la nota de alternativa para la frase rara סְאוֹן סֹאֵן. Sin embargo, dos giros no representan bien el sentido ni su naturalidad en español: «calzado del que pisa con estruendo» suena forzado y menos fiel al valor de un objeto concreto de guerra, y «será para ser quemada» es gramaticalmente torpe y no refleja bien el hebreo colectivo/plural implícito.'
  spanish_quality_summary: 'El texto es generalmente comprensible, pero tiene dos problemas de estilo importantes: «calzado» es demasiado genérico para una imagen militar concreta donde «bota» o similar funciona mejor en español; y «será para ser quemada» es poco idiomático. Además, conviene concordar en plural implícito al referirse a los dos elementos enumerados: «serán para ser quemados» o mejor una formulación más natural que mantenga el hebreo.'
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. La revisión propuesta sigue las decisiones léxicas del POB: mantiene «tumulto», «vestidura», «en sangre» y «fuego». Se aparta justificadamente de «calzado» a «bota» para representar mejor la imagen concreta documentada en el inglés («boot»).'
  issues:
  - severity: medium
    issue: «calzado» debilita la imagen concreta de «boot»
    rationale: Aunque el hebreo es raro, la decisión auditada en inglés favorece un objeto concreto de calzado militar. «Calzado» suena colectivo/genérico en español; «bota» transmite mejor la escena paralela a la vestidura ensangrentada.
  - severity: high
    issue: «será para ser quemada» es poco natural y con concordancia deficiente
    rationale: La frase resulta pesada en español y usa singular femenino tras una enumeración distributiva de dos elementos. El hebreo dice literalmente «será para quema/ardor», pero en español conviene una formulación natural como «serán para la quema» que preserve el destino sin caer en perífrasis artificial.
  - severity: low
    issue: «del que pisa con estruendo» suena rígido
    rationale: No es incorrecto, pero en español bíblico natural «del guerrero que avanza estruendosamente» o una estructura equivalente comunica mejor el participio sin rareza excesiva. Dado que el inglés ya explicitó «warrior», esa clarificación es admisible.
  revised_spanish_text: Porque toda bota del guerrero que avanza en el tumulto[a], y toda vestidura enrollada en sangre, serán para la quema, combustible para el fuego.
  revised_footnotes:
  - marker: a
    text: 'O: «toda bota que avanza en el tumulto». El hebreo es raro y difícil; también puede entenderse de modo más abstracto en términos del ruido de guerra, en lugar del calzado mismo.'
    reason: lexical_alternative
