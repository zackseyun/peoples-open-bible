translation:
  language: es
  text: Nos hemos vuelto como aquellos sobre quienes tú nunca has gobernado, como los que nunca fueron llamados por tu nombre. ¡Ojalá rasgaras los cielos y descendieras; delante de ti[a] las montañas temblarían[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'ante tu presencia' (lit. 'de delante de tu rostro/presencia').
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, 'las montañas fluirían' o 'se derretirían'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיִינוּ
  english_pob_choice: We have become
  chosen_spanish: Nos hemos vuelto
  alternatives_spanish:
  - Hemos sido
  - Nos hemos convertido
  lexicon: HALOT
  rationale: El perfecto qal de היה puede expresar un estado resultante; en español, "nos hemos vuelto" comunica mejor esa condición presente derivada que un pasado simple.
- source_word: לֹא מָשַׁלְתָּ בָּם
  english_pob_choice: over whom you have never ruled
  chosen_spanish: sobre quienes tú nunca has gobernado
  alternatives_spanish:
  - a quienes no has gobernado
  - sobre quienes no has reinado
  lexicon: HALOT
  rationale: מָשַׁל con ב expresa ejercer dominio/gobierno sobre personas. "Gobernado" mantiene el sentido amplio y natural en español, sin limitarlo innecesariamente a una imagen monárquica.
- source_word: לֹא נִקְרָא שִׁמְךָ עֲלֵיהֶם
  english_pob_choice: those who were never called by your name
  chosen_spanish: como los que nunca fueron llamados por tu nombre
  alternatives_spanish:
  - sobre quienes no fue invocado tu nombre
  - como aquellos sobre quienes no fue puesto tu nombre
  lexicon: HALOT
  rationale: La pasiva idiomática señala pertenencia/identificación de pacto. "Llamados por tu nombre" conserva esa fuerza relacional en español y sigue de cerca la formulación hebrea.
- source_word: לוּא
  english_pob_choice: If only
  chosen_spanish: ¡Ojalá
  alternatives_spanish:
  - Si tan solo
  - ¡Quién pudiera
  lexicon: HALOT
  rationale: לוּא introduce un deseo intenso. "Ojalá" es una equivalencia natural y solemne en español, adecuada para el tono de lamentación y súplica.
- source_word: קָרַעְתָּ שָׁמַיִם
  english_pob_choice: you would tear open the heavens
  chosen_spanish: rasgaras los cielos
  alternatives_spanish:
  - abrieras los cielos
  - rasgaras el firmamento
  lexicon: HALOT
  rationale: קָרַע es "rasgar/romper". "Rasgar" preserva la imagen violenta y poética del texto; "cielos" se mantiene para reflejar el plural hebreo y el registro bíblico.
- source_word: יָרַדְתָּ
  english_pob_choice: come down
  chosen_spanish: descendieras
  alternatives_spanish:
  - bajaras
  - vinieras
  lexicon: HALOT
  rationale: Con לוּא, el perfecto expresa un deseo hipotético; "descendieras" conserva el movimiento vertical y el tono elevado del texto.
- source_word: מִפָּנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: HALOT
  rationale: El hebreo literalmente remite a "de delante de tu rostro/presencia". "Delante de ti" es una solución natural en español que mantiene la escena sin forzar una expansión interpretativa.
- source_word: הָרִים נָזֹלּוּ
  english_pob_choice: the mountains would quake
  chosen_spanish: las montañas se conmoverían
  alternatives_spanish:
  - los montes se derritirían
  - las montañas fluirían
  lexicon: HALOT
  rationale: נזל literalmente connota "fluir" y, en contextos teofánicos, puede sugerir derretirse o deshacerse. "Se conmoverían" comunica el efecto de la teofanía en español actual, sin perder la nota de desestabilización; la alternativa más literal se preserva aparte.
theological_decisions:
- issue: Pertenencia de pacto en "tu nombre"
  english_pob_reading: those who were never called by your name
  chosen_spanish_reading: los que nunca fueron llamados por tu nombre
  alternative_spanish_readings:
  - sobre quienes no fue invocado tu nombre
  - los que no llevaban tu nombre
  rationale: La expresión no es solo una llamada verbal; implica identificación, pertenencia y relación de pacto. La forma elegida conserva esa carga teológica sin explicitarla en exceso.
  doctrine_reference: Translation philosophy §1, §3
- issue: Imágenes de teofanía y respuesta de la creación
  english_pob_reading: the mountains would quake
  chosen_spanish_reading: las montañas se conmoverían
  alternative_spanish_readings:
  - los montes fluirían
  - los montes se derretirían
  rationale: El texto describe la irrupción de Yahvé en la historia; la reacción de las montañas expresa el carácter temible de la teofanía. Se escogió una forma idiomática y reverente, mientras que la imaginería más literal queda preservada como alternativa.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión auditada del inglés POB: se mantiene la segunda persona directa, se evita añadir una causa explícita como "para que", y se conserva la clausula final como efecto inmediato de la presencia divina. También se reflejó el matiz optativo de לוּא con una exclamación de deseo en español.'
  spanish_consistency_notes:
  - Se usó "Yahvé" solo cuando el versículo lo requiera explícitamente; en este pasaje no aparece el nombre divino.
  - Se prefirió "cielos" en plural para respetar el hebreo שָׁמַיִם y el tono bíblico.
  - Se mantuvo "montañas" como equivalente idiomático de הָרִים, sin perder el eco poético del original.
