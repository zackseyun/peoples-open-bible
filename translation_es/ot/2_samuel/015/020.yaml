translation:
  language: es
  text: Ayer apenas viniste[a], y hoy, ¿he de hacerte vagar con nosotros, mientras yo voy adonde pueda ir? Vuélvete, y lleva de regreso contigo a tus hermanos[b]. Que el amor leal y la fidelidad estén contigo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «mientras yo voy adonde voy». El hebreo es idiomático y expresa la incertidumbre de la huida de David.'
    reason: lexical_alternative
  - marker: b
    text: «Tus hermanos» probablemente se refiere a los compañeros o parientes de Itai que vinieron con él.
    reason: cultural_note
  - marker: c
    text: 'Hebreo: «amor leal y fidelidad», una expresión habitual de amor comprometido y confiable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּמוֹל
  english_pob_choice: only yesterday
  chosen_spanish: Ayer apenas
  alternatives_spanish:
  - ayer
  - recientemente
  lexicon: HALOT
  rationale: El adverbio expresa una llegada muy reciente. «Ayer apenas» conserva esa fuerza temporal y el énfasis del contexto sin sonar tan interpretativo como «recientemente».
- source_word: בּוֹאֶךָ
  english_pob_choice: you came
  chosen_spanish: viniste
  alternatives_spanish:
  - llegaste
  - tu llegada
  lexicon: HALOT
  rationale: El infinitivo con sufijo funciona naturalmente como una cláusula verbal. «Viniste» comunica la acción concreta de llegada y mantiene el tono directo.
- source_word: אֲנוּעֲךָ
  english_pob_choice: should I make you wander
  chosen_spanish: he de hacerte vagar
  alternatives_spanish:
  - he de hacerte andar de un lado a otro
  - he de ponerte en movimiento
  lexicon: HALOT
  rationale: נוע sugiere moverse inestable o errante. «Hacerte vagar» conserva la idea de desplazamiento incierto que el contexto de la huida de David exige.
- source_word: עִמָּנוּ לָלֶכֶת
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - para que vayas con nosotros
  - a ir con nosotros
  lexicon: HALOT
  rationale: En español basta el complemento «con nosotros» tras «hacerte vagar»; el infinitivo queda implícito sin perder sentido.
- source_word: וַאֲנִי הוֹלֵךְ עַל אֲשֶׁר אֲנִי הוֹלֵךְ
  english_pob_choice: while I go wherever I can go
  chosen_spanish: mientras yo voy adonde tengo que ir
  alternatives_spanish:
  - mientras yo voy adonde voy
  - mientras yo voy donde tengo que ir
  lexicon: HALOT
  rationale: La frase hebrea es idiomática y algo elíptica. «Adonde tengo que ir» mantiene la incertidumbre y la inevitabilidad del camino de David sin volverlo torpe en español.
- source_word: שׁוּב
  english_pob_choice: Return
  chosen_spanish: Vuélvete
  alternatives_spanish:
  - Regresa
  - Vuelve
  lexicon: HALOT
  rationale: El imperativo de שוב puede expresarse como volver/regresar. «Vuélvete» preserva el valor direccional y suena natural como exhortación.
- source_word: וְהָשֵׁב
  english_pob_choice: take ... back
  chosen_spanish: lleva de regreso
  alternatives_spanish:
  - trae de vuelta
  - haz volver
  lexicon: HALOT
  rationale: El hifil es causativo. «Lleva de regreso» reproduce la idea de hacer volver a otros de forma idiomática en español.
- source_word: אַחֶיךָ
  english_pob_choice: your brothers
  chosen_spanish: tus hermanos
  alternatives_spanish:
  - tus parientes
  - tus compañeros
  lexicon: HALOT
  rationale: Se conserva el sustantivo relacional «hermanos», como en el hebreo, aun si probablemente se refiere a compañeros o allegados de Itai.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: misericordia leal
  alternatives_spanish:
  - amor leal
  - bondad leal
  - amor constante
  lexicon: HALOT
  rationale: חֶסֶד concentra lealtad pactal, bondad y amor comprometido. «Misericordia leal» intenta retener la tensión entre compasión y fidelidad sin usar un giro excesivamente eclesiástico.
- source_word: וֶאֱמֶת
  english_pob_choice: faithfulness
  chosen_spanish: fidelidad
  alternatives_spanish:
  - verdad
  - lealtad
  lexicon: HALOT
  rationale: אֱמֶת en esta pareja formula la idea de confiabilidad/verdad. «Fidelidad» es el correlato español más claro en la bendición final.
theological_decisions:
- issue: Naturaleza benedictoria de la cláusula final sin verbo explícito
  english_pob_reading: May steadfast love and faithfulness be with you
  chosen_spanish_reading: Que contigo estén la misericordia leal y la fidelidad
  alternative_spanish_readings:
  - Misericordia leal y fidelidad
  - Que estén contigo la lealtad amorosa y la fidelidad
  rationale: El hebreo presenta una fórmula nominal que funciona como deseo o bendición. En español conviene explicitarla con «Que... estén» para que se lea como bendición y no como fragmento sintáctico.
  doctrine_reference: Salmos 25:10; 2 Samuel 3:6
- issue: Tensión semántica de חֶסֶד entre amor, lealtad y misericordia
  english_pob_reading: steadfast love
  chosen_spanish_reading: misericordia leal
  alternative_spanish_readings:
  - amor leal
  - bondad leal
  - misericordia constante
  rationale: La tradición bíblica usa חֶסֶד para una lealtad afectiva y pactal. «Misericordia leal» mantiene el componente compasivo y el de fidelidad, evitando reducirlo solo a caridad o a afecto.
  doctrine_reference: Éxodo 34:6-7; Salmos 136
- issue: Preservación de la imagen de movimiento incierto en la huida de David
  english_pob_reading: while I go wherever I can go
  chosen_spanish_reading: mientras yo voy adonde tengo que ir
  alternative_spanish_readings:
  - mientras yo voy donde voy
  - mientras yo ando errante
  rationale: La expresión hebrea es idiomática y transmite desplazamiento no resuelto. La versión española conserva esa inestabilidad con una construcción natural, sin convertirla en mera repetición ni sobreexplicarla.
  doctrine_reference: 2 Samuel 15:14-30
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado del audit trail inglés: se mantiene la lectura revisada de la cláusula participial como un presente simple/natural («mientras yo voy») y se conserva la decisión de tratar la frase final como bendición. También se reflejan las notas culturales y léxicas preservadas por el POB inglés, con ajuste al español para evitar calcos duros.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene «hermanos» para אַחֶיךָ, aunque la nota aclara el posible sentido de compañeros/parientes.
  - «Misericordia leal» intenta cubrir חֶסֶד sin sustituirlo por una sola equivalencia tradicional que borre su carga pactal.
  - La puntuación y el orden de las cláusulas buscan reflejar la progresión del hebreo sin sacrificar naturalidad en español.
  - El marcador [a] se ancla en la cláusula idiomática del movimiento; [b] y [c] en los sintagmas correspondientes al final del versículo.
