  glossary_alignment: 'Buena alineación con la terminología del proyecto: no hay ocurrencia de Yahvé ni Mesías en este versículo; «casa» preserva בַּיִת correctamente; «mi pueblo Israel» mantiene la fórmula pactual; «un hombre» conserva אִישׁ; «gobernante» es aceptable para נָגִיד, con nota de alternativas ya bien documentada.'
