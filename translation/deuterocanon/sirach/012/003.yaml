translation:
  text: No good comes to one who persists in wickedness[b][a], nor to one who does not show mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'does not do ṣedaqah'; the Greek parallel reads 'does not grant almsgiving/mercy.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew wording behind 'persists in wickedness' is difficult; the Greek parallel supports the sense of continuing in evil.
    reason: alternative_reading
lexical_decisions:
- source_word: אֵין טוֹבָה
  chosen: No good comes
  alternatives:
  - There is no good
  - No benefit is
  lexicon: HALOT
  rationale: The Hebrew idiom literally states 'there is no good,' but in English 'No good comes' better conveys the predicative sense in context without over-paraphrasing. The Greek οὐκ ἔστιν ἀγαθὰ supports the basic sense of absence of good.
- source_word: לִמְנֹחַ
  chosen: to one who persists
  alternatives:
  - to the one at rest
  - to one who settles into
  - to one who continues
  lexicon: HALOT
  rationale: The Hebrew form is difficult in context and the source is marked minor_mismatch. Read woodenly, it could suggest 'to rest' or 'to settle,' but the Greek parallel τῷ ἐνδελεχίζοντι ('the one persisting/continuing') indicates the sense is durative persistence. 'Persists' captures that likely underlying meaning while remaining anchored to the Hebrew witness.
- source_word: רָשָׁע
  chosen: in wickedness
  alternatives:
  - for the wicked man
  - to the wicked
  - to an evil person
  lexicon: HALOT
  rationale: The Hebrew adjective/noun can denote 'wicked' as a person, but with the uncertain לִמְנֹחַ phrase and the Greek εἰς κακά ('in evils/into bad things'), rendering the clause verbally as 'persists in wickedness' best reflects the combined evidence.
- source_word: וְגַם
  chosen: nor
  alternatives:
  - and also
  - and even
  lexicon: HALOT
  rationale: Though literally additive ('and also'), in English the second negative clause is most naturally coordinated as 'nor,' preserving the parallel negation.
- source_word: צְדָקָה
  chosen: mercy
  alternatives:
  - charity
  - almsgiving
  - righteousness
  lexicon: HALOT
  rationale: In later Hebrew this term can mean charitable giving or benevolence, and the Greek parallel ἐλεημοσύνην strongly points to 'almsgiving/mercy' rather than abstract 'righteousness.' 'Mercy' is broader and more natural English here, while still matching the ethical sense.
- source_word: לֹא עָשָׂה
  chosen: does not show
  alternatives:
  - has not done
  - does not do
  - does not practice
  lexicon: HALOT
  rationale: The Hebrew literally says 'has not done,' but with 'mercy' as the object, idiomatic English prefers 'show' or 'practice.' 'Does not show' is clear and natural, and aligns with the Greek μὴ χαριζομένῳ ('not granting/showing').
