translation:
  language: es
  text: Cortad de Babilonia al sembrador, y al que maneja la hoz en el tiempo de la siega. A causa de la espada del opresor[a], cada hombre volverá a su propio pueblo, y cada hombre huirá a su propia tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la espada del que oprime». La expresión hebrea también se ha entendido por algunos como «la espada cruel» y, menos probablemente, de manera más literal, «la espada de la paloma».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּרְתוּ
  english_pob_choice: Cut off
  chosen_spanish: Cortad
  alternatives_spanish:
  - Cortad de raíz
  - Cortad fuera
  - Eliminad
  lexicon: HALOT
  rationale: El imperativo plural de כרת en un contexto de juicio expresa remover o eliminar. «Cortad» conserva la fuerza directa del mandato sin añadir una interpretación excesiva del medio.
- source_word: זוֹרֵעַ
  english_pob_choice: the sower
  chosen_spanish: al sembrador
  alternatives_spanish:
  - al que siembra
  - al sembrador de semillas
  lexicon: HALOT
  rationale: El participio funciona sustantivamente. «Sembrador» es natural en español y mantiene el sentido ocupacional.
- source_word: מִבָּבֶל
  english_pob_choice: from Babylon
  chosen_spanish: de Babilonia
  alternatives_spanish:
  - desde Babilonia
  - fuera de Babilonia
  lexicon: HALOT
  rationale: La preposición מן con כרת indica remoción de Babilonia; «de Babilonia» es la forma más directa y clara en español.
- source_word: וְתֹפֵשׂ מַגָּל
  english_pob_choice: the one who handles the sickle
  chosen_spanish: al que maneja la hoz
  alternatives_spanish:
  - al segador con la hoz
  - al que empuña la hoz
  lexicon: HALOT
  rationale: תפשׂ significa tomar/manejar. Con la hoz y el contexto de siega, se refiere al segador; «maneja la hoz» sigue de cerca el hebreo y suena natural.
- source_word: בְּעֵת קָצִיר
  english_pob_choice: at the time of harvest
  chosen_spanish: en el tiempo de la siega
  alternatives_spanish:
  - en tiempo de siega
  - al tiempo de la cosecha
  lexicon: HALOT
  rationale: «Siega» reproduce el campo agrícola de קָצִיר y mantiene el paralelismo con la hoz; «en el tiempo de» conserva la función temporal del hebreo.
- source_word: מִפְּנֵי
  english_pob_choice: Because of
  chosen_spanish: A causa de
  alternatives_spanish:
  - Por causa de
  - Debido a
  lexicon: HALOT
  rationale: En este contexto causal, מִפְּנֵי introduce el motivo de la huida. «A causa de» expresa bien el valor idiomático sin calco espacial.
- source_word: חֶרֶב הַיּוֹנָה
  english_pob_choice: the sword of the oppressor
  chosen_spanish: la espada del opresor
  alternatives_spanish:
  - la espada del que oprime
  - la espada cruel
  - la espada de la paloma
  lexicon: HALOT
  rationale: Siguiendo el análisis léxico del POB inglés, יונה se entiende mejor desde la raíz de oprimir y no como «paloma». «La espada del opresor» preserva la relación genitiva y el sentido contextual.
- source_word: אִישׁ אֶל עַמּוֹ יִפְנוּ
  english_pob_choice: each man will turn to his own people
  chosen_spanish: cada hombre volverá a su propio pueblo
  alternatives_spanish:
  - cada uno volverá a su pueblo
  - cada hombre se volverá hacia su pueblo
  lexicon: HALOT
  rationale: איש se usa distributivamente. «Cada hombre» mantiene el masculino gramatical del hebreo y «volverá» comunica el giro de retorno implícito en פנה en este contexto.
- source_word: וְאִישׁ לְאַרְצוֹ יָנֻסוּ
  english_pob_choice: and each will flee to his own land
  chosen_spanish: y cada uno huirá a su propia tierra
  alternatives_spanish:
  - y cada hombre huirá a su tierra
  - y cada uno escapará a su tierra
  lexicon: HALOT
  rationale: נוס significa huir/escapar. «Huirá» es la opción más directa; «tierra» corresponde bien a ארץ en referencia territorial bíblica.
theological_decisions:
- issue: Uso distributivo de אִישׁ con forma masculina
  english_pob_reading: each man
  chosen_spanish_reading: cada hombre / cada uno
  alternative_spanish_readings:
  - cada persona
  - todos
  rationale: El hebreo usa singular masculino con valor distributivo. Se conserva la referencia gramatical sin neutralizarla, mientras el contexto indica individuos en general.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sentido de חֶרֶב הַיּוֹנָה
  english_pob_reading: the sword of the oppressor
  chosen_spanish_reading: la espada del opresor
  alternative_spanish_readings:
  - la espada cruel
  - la espada de la paloma
  rationale: Se sigue la lectura contextual y léxica documentada en el audit trail, evitando la traducción literal «paloma» que no encaja con el pasaje de juicio contra Babilonia.
  doctrine_reference: Lexical decision audit trail for Jeremiah 50:16
translation_notes:
  revision_awareness: El inglés POB revisó la frase final de «oppressor’s sword» a «the sword of the oppressor» para reflejar con mayor formalidad la construcción genitiva. La versión española adopta esa misma relación nominal («la espada del opresor») y mantiene intacto el resto del sentido del verso, sin introducir cambios adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Babilonia» como nombre propio sin glosa, en línea con el original hebreo.
  - Se prefirió «siega/hoz» para conservar el paralelismo agrícola del texto.
  - «Tierra» traduce ארץ con su sentido territorial, no meramente geográfico abstracto.
  - Se evitó «Señor» o equivalentes porque el verso no contiene el Tetragrámaton ni κύριος.
  - El tono es imperativo y profético, por lo que se conservó una sintaxis directa y sobria.
