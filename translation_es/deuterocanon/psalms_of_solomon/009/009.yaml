revisions:
- from: El que hace justicia[a] atesora vida para sí con Yahvé[b], y el que hace injusticia es él mismo responsable de su alma[c] en destrucción[d].
  to: El que hace justicia[a] atesora vida para sí con Yahvé[b], y el que hace injusticia es él mismo responsable de su alma[c] para destrucción[d].
  rationale: Se conserva la traducción general, pero se ajusta la cláusula final para que el español sea comprensible y fiel sin añadir una interpretación más fuerte que la del griego. «Para destrucción» está respaldado por las alternativas documentadas para ἐν ἀπωλείᾳ y funciona mejor en español que «en destrucción». Además, se corrige la nota [a] para que presente una alternativa real.
  reviewer_model: gpt-5.4
