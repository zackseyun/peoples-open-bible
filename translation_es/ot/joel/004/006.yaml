translation:
  language: es
  text: Y a los hijos de Judá y a los hijos de Jerusalén ustedes los vendieron a los hijos de los griegos[a], para alejarlos de su frontera[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “a los hijos de los griegos”; también puede traducirse más idiomáticamente “a los griegos”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “de su territorio”, para גְּבוּלָם.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: and the sons of
  chosen_spanish: y a los hijos de
  alternatives_spanish:
  - y a los niños de
  - y a la gente de
  lexicon: HALOT
  rationale: בְּנֵי expresa literalmente filiación (“hijos de”) y en este contexto nombra al pueblo perteneciente a Judá y Jerusalén. En español, “hijos de” conserva mejor la estructura hebrea que una paráfrasis como “la gente de”, sin perder inteligibilidad.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judá
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: מְכַרְתֶּם
  english_pob_choice: you sold
  chosen_spanish: los vendieron
  alternatives_spanish:
  - ustedes los vendieron
  - los han vendido
  lexicon: HALOT
  rationale: El perfecto hebreo en esta acusación profética se vierte naturalmente en pasado simple en español. El sujeto implícito se sobreentiende por el contexto de acusación.
- source_word: לִבְנֵי הַיְּוָנִים
  english_pob_choice: to the sons of the Greeks
  chosen_spanish: a los hijos de los griegos
  alternatives_spanish:
  - a los griegos
  - a los hijos de Javán
  - a los jonios
  lexicon: HALOT
  rationale: “יוָנִים” puede significar griegos/ionios. Dado el uso español moderno y el probable referente histórico, “griegos” es más claro. Se mantiene “hijos de” para reflejar la construcción hebrea, aunque en español también podría omitirse.
- source_word: לְמַעַן
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el propósito de
  lexicon: HALOT
  rationale: La idea es de propósito. En español, “para” comunica con naturalidad la finalidad sin añadir solemnidad innecesaria.
- source_word: הַרְחִיקָם
  english_pob_choice: remove them far
  chosen_spanish: alejarlos
  alternatives_spanish:
  - apartarlos lejos
  - hacerlos ir lejos
  lexicon: HALOT
  rationale: El causativo de רחק expresa poner a distancia. “Alejarlos” preserva el valor causativo de forma natural; “alejarlos de” queda implícito por el complemento siguiente.
- source_word: מֵעַל גְּבוּלָם
  english_pob_choice: from their border
  chosen_spanish: de su territorio
  alternatives_spanish:
  - de su frontera
  - de su límite
  lexicon: HALOT
  rationale: גְּבוּל puede significar “frontera”, “límite” o “territorio”. Siguiendo la nota inglesa, se reconoce la alternativa “frontera”, pero “territorio” comunica mejor en español el efecto de expulsión/exilio implícito en el contexto.
translation_notes:
  revision_awareness: 'La versión inglesa auditada mantiene una equivalencia óptima con dos notas léxicas: la construcción hebrea “hijos de los griegos” y la alternativa de traducir גְּבוּלָם como “territorio”. La redacción española conserva ambas tensiones sin sobreinterpretar el verbo causativo ni suavizar la acusación profética.'
  spanish_consistency_notes:
  - Se mantiene “hijos de” para reflejar la estructura semítica, aunque el español permitiría omitirla en una versión más idiomática.
  - Se prefiere “griegos” frente a “jonios/Javán” por claridad histórica y recepción en español.
  - Se evita “SEÑOR” u otra sustitución teológica porque no aparece el tetragrámaton en este versículo.
  - “Territorio” se usa como alternativa contextual válida para גְּבוּל, sin excluir “frontera” en la nota.
