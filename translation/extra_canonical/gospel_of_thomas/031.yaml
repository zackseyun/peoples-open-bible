translation:
  text: Jesus said[1], "No prophet is acceptable in his village[3][2]; a physician
    does not heal those who know him."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:39:48Z'
  footnotes:
  - marker: '1'
    text: The Greek fragment P.Oxy. 1 reads 'in his hometown' (πατρίδι) rather than
      'village' (ϯⲙⲉ), and 'perform healings for' rather than 'heal'.
    reason: textual_variant
  - marker: '2'
    text: The Coptic prefix ⲙⲁⲣⲉ- (mare-) is used here as the negative aorist ('does
      not'), a regional dialect spelling of the standard Sahidic ⲙⲉⲣⲉ- (mere-). It
      should not be confused with the identical-looking jussive prefix ('let').
    reason: dialect_note
  - marker: '3'
    text: Compare Luke 4:24, 'no prophet is accepted in his hometown.' Thomas uniquely
      pairs this with the aphorism about the physician, though Luke 4:23 quotes the
      proverb 'Physician, heal yourself' immediately prior.
    reason: cross_reference
lexical_decisions:
- source_word: ⲙⲛ̄ⲡⲣⲟⲫⲏⲧⲏⲥ
  chosen: No prophet
  rationale: Negative existential ⲙⲛ̄ followed by the noun, functioning as a universal
    negative.
  lexicon: Crum 171a
  alternatives:
  - There is no prophet
- source_word: ϣⲏⲡ
  chosen: acceptable
  rationale: Qualitative of ϣⲱⲡ (to receive, accept). It aligns perfectly with the
    Greek δεκτός found in P.Oxy. 1 and Luke 4:24.
  lexicon: Crum 576a
  alternatives:
  - accepted
  - received
- source_word: ϯⲙⲉ
  chosen: village
  rationale: Standard term for village or town. The Greek fragment P.Oxy. 1 has πατρίδι
    ('hometown' or 'fatherland'), but the Coptic specifically uses 'village'.
  lexicon: Crum 414a
  alternatives:
  - town
- source_word: ⲙⲁⲣⲉⲥⲟⲉⲓⲛ
  chosen: a physician does not
  rationale: The prefix ⲙⲁⲣⲉ- here is the Lycopolitan/Subakhmimic spelling of the
    Sahidic negative aorist ⲙⲉⲣⲉ-, not the jussive ('let'). It expresses a general
    truth.
  lexicon: Crum 369b (for ⲥⲁⲉⲓⲛ/ⲥⲟⲉⲓⲛ)
  alternatives:
  - no physician
- source_word: ⲣ̄ⲑⲉⲣⲁⲡⲉⲩⲉ
  chosen: heal
  rationale: Greek loanword θεραπεύειν, functioning with the auxiliary ⲣ̄-.
  lexicon: BDAG 443
theological_decisions:
- issue: Harmonization with canonical parallels
  chosen_reading: village
  rationale: Avoided harmonizing to 'hometown' (Luke 4:24, Mark 6:4) because the Coptic
    specifically uses ϯⲙⲉ (village), despite the Greek P.Oxy. 1 having πατρίδι.
  alternatives_noted:
  - hometown
drafter_notes: The translation preserves the specific Coptic vocabulary ('village'
  instead of 'hometown') while maintaining the aphoristic punch of the saying. The
  dialectal spelling of the negative aorist is correctly parsed to avoid a mistranslation
  into the jussive.
