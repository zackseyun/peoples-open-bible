  text: מַה תִּשְׁתּ֬וֹחֲחִ֨י נַפְשִׁ/י֮ וּֽ/מַה תֶּהֱמִ֪י עָ֫לָ֥/י הוֹחִ֣ילִי לֵֽ֭/אלֹהִים כִּי ע֣וֹד אוֹדֶ֑/נּוּ יְשׁוּעֹ֥ת פָּ֝נַ֗/י וֵֽ/אלֹהָֽ/י־׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/043/005.yaml
  text: Why are you cast down[a], O my soul, and why are you in turmoil within me? Hope in God, for I will yet praise him[b], the salvation of my countenance and my God.
  footnotes:
  - marker: a
    text: Or 'the help of my countenance and my God'; the Hebrew is literally 'salvations of my face and my God,' an expression likely referring to God as the one who restores the psalmist's downcast face.
    reason: lexical_alternative
  - marker: b
    text: Or 'the salvation of my face'.
    reason: previous_rendering
