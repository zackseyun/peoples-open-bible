translation:
  language: es
  text: Y al tercer día hubo una boda en Caná de Galilea[a], y estaba allí la madre de Jesús[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una fiesta de boda'. El término griego puede referirse tanto a la celebración nupcial como al acto matrimonial.
    reason: lexical_alternative
  - marker: b
    text: O 'la madre de Jesús estaba allí'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y luego
  - Ahora bien
  lexicon: BDAG
  rationale: La conjunción simple conserva el flujo narrativo de Juan sin añadir matiz interpretativo. En español, 'Y' reproduce mejor la continuidad que 'Ahora bien'.
- source_word: τῇ ⸂ἡμέρᾳ τῇ τρίτῃ⸃
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - después de dos días
  lexicon: BDAG
  rationale: La construcción dativa temporal se expresa de forma natural en español como 'al tercer día'. Mantiene el valor cronológico sin cargar el texto con simbolismo que el contexto inmediato no exige.
- source_word: γάμος
  english_pob_choice: a wedding
  chosen_spanish: una boda
  alternatives_spanish:
  - una celebración de boda
  - un banquete de boda
  lexicon: BDAG
  rationale: '''Boda'' comunica de modo natural el evento matrimonial y puede abarcar la celebración. En esta escena funciona como equivalente amplio y fluido en español.'
- source_word: ἐγένετο
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - se realizó
  - tuvo lugar
  lexicon: BDAG
  rationale: '''Hubo'' es una forma breve y narrativa para introducir un acontecimiento. Evita sobreexplicar y mantiene el tono sobrio del original.'
- source_word: ἐν Κανὰ τῆς Γαλιλαίας
  english_pob_choice: in Cana of Galilee
  chosen_spanish: en Caná de Galilea
  alternatives_spanish:
  - en Caná, en Galilea
  lexicon: BDAG
  rationale: La transliteración 'Caná' se conserva por ser nombre propio; 'de Galilea' refleja la relación genitiva de manera natural en español.
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: estaba
  alternatives_spanish:
  - era
  - se encontraba
  lexicon: BDAG
  rationale: En este contexto localizador, 'estaba' comunica presencia concreta mejor que 'era'. Mantiene el carácter descriptivo del imperfecto.
- source_word: ἡ μήτηρ τοῦ Ἰησοῦ
  english_pob_choice: the mother of Jesus
  chosen_spanish: la madre de Jesús
  alternatives_spanish:
  - la madre de Jesús Jesús's mother
  - Jesús's mother
  lexicon: BDAG
  rationale: Se conserva la relación genitiva de forma directa y formal, como en la revisión inglesa final. 'La madre de Jesús' es más fiel al orden y registro del griego que una posesión más idiomática.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allí presente
  lexicon: BDAG
  rationale: '''Allí'' mantiene la referencia locativa simple. ''Allí presente'' añadiría una explicitación que el griego no necesita.'
theological_decisions:
- issue: Posible carga simbólica de 'al tercer día'
  english_pob_reading: Retained as a chronological notice without importing symbolic resurrection overtones into the translation.
  chosen_spanish_reading: Se conserva como un aviso cronológico, sin introducir en la traducción principal una alusión simbólica a la resurrección.
  alternative_spanish_readings:
  - al tercer día, con resonancias de resurrección
  - después, en el tercer día, como figura teológica
  rationale: El texto griego funciona primariamente como marcador temporal. La traducción no debe resolver una posible tensión interpretativa que el lector puede percibir, pero que no está explícitamente desarrollada en la frase.
  doctrine_reference: Preservar la tensión teológica sin resolverla en el cuerpo del texto.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió 'the mother of Jesus' por un registro más formal y una mayor cercanía al griego. La versión española sigue esa misma preferencia con 'la madre de Jesús', evitando una forma posesiva menos natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Caná' y no 'Cana' para respetar la transliteración estable del topónimo.
  - Se usa 'Y' inicial por continuidad narrativa, no por fuerza inferencial.
  - '''Madre de Jesús'' se conserva como término relacional exacto, alineado con la decisión revisada del texto inglés.'
  - No se introduce 'Cristo' ni 'Señor' porque el verso usa el nombre propio Jesús y no un título cristológico o divino.
