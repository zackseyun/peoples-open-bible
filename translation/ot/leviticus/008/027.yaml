  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton, preserving the traditional reverential substitution while remaining transparent about alternatives.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered familial term בָנָיו
  chosen_reading: his sons
  alternative_readings:
  - his children
  rationale: The Hebrew specifically names Aaron's male offspring serving in the priestly ordination rite. A gender-neutral rendering would lose source-text specificity.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
