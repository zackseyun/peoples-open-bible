revisions:
- from: En la plenitud de su abundancia, la angustia[a] le sobrevendrá; toda mano del miserable[b] se volverá contra él.
  to: En la plenitud de su abundancia, la angustia[a] le sobrevendrá; toda mano de los miserables[b] vendrá contra él.
  rationale: Se ajusta el colectivo «del miserable» a «de los miserables» para reflejar mejor la fuerza distributiva del hebreo en español natural. También se cambia «se volverá contra él» por «vendrá contra él» para acercarse más al verbo fuente «venir». La nota b se reescribe completamente para eliminar errores gramaticales y anglicismos, conservando las alternativas léxicas pertinentes.
