lexical_decisions:
- source_word: εὗρεν
  english_pob_choice: found
  chosen_spanish: halló
  alternatives_spanish:
  - encontró
  - se encontró con
  lexicon: BDAG
  rationale: 'El aoristo de εὑρίσκω expresa aquí una acción narrativa simple: llegó y los encontró en un estado dado. «Halló» conserva el sentido directo de encontrar y funciona con naturalidad en español bíblico sin sonar demasiado coloquial.'
- source_word: τοὺς δύο
  english_pob_choice: the two
  chosen_spanish: a los dos
  alternatives_spanish:
  - los dos
  - ambos
  lexicon: LSJ
  rationale: El artículo con numeral funciona sustantivamente y remite a las dos personas ya mencionadas. «A los dos» conserva la referencia compacta del griego y mantiene la relación verbal con «halló».
- source_word: καθεύδοντας
  english_pob_choice: sleeping
  chosen_spanish: durmiendo
  alternatives_spanish:
  - dormidos
  - asleep
  lexicon: BDAG
  rationale: El participio presente describe el estado en que los encontró. En español, «durmiendo» refleja de modo natural la acción/estado verbal del participio sin forzar una construcción adjetival; «dormidos» también sería posible, pero menos directamente verbal.
translation_notes:
  revision_awareness: El griego de Swete dice simplemente καὶ εὗρεν τοὺς δύο καθεύδοντας. La tradición inglesa del POB ajustó el participio entre «asleep» y «sleeping» para equilibrar naturalidad y fidelidad; la presente versión española sigue esa misma tensión, prefiriendo una forma verbal natural («durmiendo») sin añadir contenido ajeno al texto.
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otro término de sustitución porque no hay en este versículo un nombre divino ni un contexto de κύριος.
  - 'No se introduce ninguna ampliación interpretativa: solo se expresa que halló a las dos personas en estado de sueño.'
  - La puntuación reproduce una cláusula narrativa breve, acorde con el griego y con la economía del pasaje.
