translation:
  language: es
  text: Él convierte los ríos en un desierto, y los manantiales de agua en tierra sedienta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en tierra seca’. El sustantivo hebreo literalmente denota ‘sed’ o ‘sed extrema’, usado aquí para una condición seca y sin agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשֵׂם
  english_pob_choice: turns
  chosen_spanish: convierte
  alternatives_spanish:
  - hace
  - pone
  - vuelve
  lexicon: HALOT
  rationale: El hebreo שׂים puede significar 'poner/hacer', pero aquí expresa transformación de un estado a otro. 'Convierte' comunica ese cambio con naturalidad en español sin perder la fuerza del verbo.
- source_word: נְהָרוֹת
  english_pob_choice: rivers
  chosen_spanish: los ríos
  alternatives_spanish:
  - los arroyos
  - los cauces
  lexicon: HALOT
  rationale: El plural nominal designa ríos; 'ríos' es la correspondencia más directa y conserva el contraste poético con la sequedad posterior.
- source_word: לְמִדְבָּר
  english_pob_choice: into a wilderness
  chosen_spanish: en un desierto
  alternatives_spanish:
  - en un desierto yermo
  - en una tierra desierta
  - en un páramo
  lexicon: HALOT
  rationale: El término hebreo puede abarcar 'desierto' o 'tierra inhóspita'. En español, 'desierto' comunica bien la idea de región sin agua y mantiene un paralelo claro con 'manantiales de agua'.
- source_word: וּמֹצָאֵי מַיִם
  english_pob_choice: springs of water
  chosen_spanish: los manantiales de agua
  alternatives_spanish:
  - las fuentes de agua
  - los brotes de agua
  lexicon: HALOT
  rationale: מֹצָאֵי son literalmente 'salidas' o 'fuentes'; en esta construcción, 'manantiales de agua' preserva la imagen de lugares donde el agua brota y suena natural en español.
- source_word: לְצִמָּאוֹן
  english_pob_choice: into thirsty ground
  chosen_spanish: tierra sedienta
  alternatives_spanish:
  - tierra reseca
  - tierra de sed
  - tierra árida
  lexicon: HALOT
  rationale: El sustantivo hebreo denota 'sed' o 'sed extrema' y, por extensión, una condición seca y sin agua. 'Tierra sedienta' conserva el matiz literal de sed mejor que una paráfrasis más general.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo de WLC y el audit trail inglés: mantiene el paralelismo entre los ríos transformados en desierto y los manantiales convertidos en una condición de sed/sequedad, sin suavizar la imagen ni introducir elementos ajenos al texto.'
  spanish_consistency_notes:
  - Se usa 'desierto' para מִדְבָּר, coherente con el contraste poético del versículo.
  - Se mantiene 'manantiales de agua' para מֹצָאֵי מַיִם, evitando 'fuentes' si pudiera sonar menos concreto en español.
  - '''Tierra sedienta'' conserva el vínculo semántico con צִמָּאוֹן y permite la nota alternativa sobre ''tierra seca''.'
  - El marcador de nota [a] aparece en el lugar correspondiente del texto y se reserva para la alternativa léxica del final del versículo.
