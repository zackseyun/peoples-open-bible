translation:
  language: es
  text: Sin embargo[a], aunque había tantos impulsos de afecto maternal que atraían a la madre hacia la compasión, los tormentos de toda clase no pudieron, por ninguno de ellos, desviar su razón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No obstante».
    reason: lexical_alternative
  - marker: b
    text: O «su juicio racional»; el término griego destaca la facultad de la razón, tema central en 4 Macabeos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλʼ ὅμως
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Aun así
  lexicon: LSJ
  rationale: Expresa con naturalidad la transición concesiva fuerte del griego, manteniendo el contraste enfático sin volverse artificioso en español.
- source_word: καίπερ
  english_pob_choice: although
  chosen_spanish: aunque
  alternatives_spanish:
  - aun cuando
  - si bien
  lexicon: LSJ
  rationale: Introduce la concesiva de forma directa y fluida, en paralelo con el valor del griego.
- source_word: τοσούτων ὄντων τῶν περὶ φιλοτεκνίαν
  english_pob_choice: although so many impulses of motherly affection
  chosen_spanish: aunque había tantas cosas de afecto maternal
  alternatives_spanish:
  - aunque había tantos impulsos de amor por los hijos
  - aunque había tantos sentimientos maternales
  lexicon: LSJ
  rationale: φιλοτεκνία expresa afecto por los hijos; en este contexto la relación maternal es explícita, por lo que 'afecto maternal' conserva el sentido sin exagerar ni suavizar la fuerza emocional del original.
- source_word: εἰς συμπάθειαν ἑλκόντων
  english_pob_choice: were drawing ... toward sympathy
  chosen_spanish: que atraían ... hacia la compasión
  alternatives_spanish:
  - que la arrastraban ... hacia la compasión
  - que la llevaban ... al sentimiento compasivo
  lexicon: LSJ
  rationale: ἕλκω es 'atraer/dibujar'; συμπάθεια aquí apunta a compasión o fellow-feeling. 'Hacia la compasión' mantiene la dirección del movimiento y el matiz afectivo.
- source_word: τὴν μητέρα
  english_pob_choice: the mother
  chosen_spanish: la madre
  alternatives_spanish:
  - su madre
  lexicon: LSJ
  rationale: El griego usa artículo y no posesivo explícito; 'la madre' conserva esa forma más sobria y discursiva, como en el contexto narrativo-retórico del libro.
- source_word: ἐπʼ οὐδενὸς αὐτῶν
  english_pob_choice: by any of them
  chosen_spanish: por ninguno de ellos
  alternatives_spanish:
  - por ninguno de éstos
  - en ninguno de ellos
  lexicon: LSJ
  rationale: La frase señala que ninguno de los impulsos mencionados logró el efecto requerido. 'Por ninguno de ellos' conserva la relación instrumental/eficaz implícita.
- source_word: τὸν λογισμὸν αὐτῆς
  english_pob_choice: her reason
  chosen_spanish: su razonamiento[b]
  alternatives_spanish:
  - su razón
  - su juicio racional
  lexicon: LSJ
  rationale: En 4 Macabeos λογισμός es un término filosófico clave para la facultad racional. 'Razonamiento' comunica bien esa capacidad de deliberación; la nota preserva la alternativa más literal 'razón' y el matiz filosófico.
- source_word: αἱ παντοίκιλοι βάσανοι
  english_pob_choice: the all-varied tortures
  chosen_spanish: los tormentos de toda clase
  alternatives_spanish:
  - las torturas de toda variedad
  - los múltiples tormentos
  lexicon: LSJ
  rationale: παντοίκιλος subraya variedad extrema. En español, 'de toda clase' mantiene la amplitud y evita una expresión forzada como 'all-varied'; βάσανοι se traduce como 'tormentos' en un registro natural y apto para el martirio.
- source_word: ἴσχυσαν μετατρέψαι
  english_pob_choice: were not able ... to turn aside
  chosen_spanish: no pudieron torcer
  alternatives_spanish:
  - no fueron capaces de desviar
  - no lograron cambiar
  lexicon: LSJ
  rationale: ἰσχύω + infinitivo indica capacidad efectiva; μετατρέπω es desviar/volver aparte. 'No pudieron torcer' comunica la idea de revertir o alterar la firmeza interior en español actual, aunque la nota aclara que el objeto es el razonamiento.
theological_decisions:
- issue: λoγισμός como facultad racional en 4 Macabeos
  english_pob_reading: her reason
  chosen_spanish_reading: su razonamiento
  alternative_spanish_readings:
  - su razón
  - su juicio racional
  rationale: El capítulo subraya la supremacía de la razón frente a las pasiones. 'Razonamiento' mantiene esa dimensión intelectual y activa sin convertirla en una categoría doctrinal ajena al texto. La nota al pie permite ver la opción más literal, 'razón'.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden sustancialmente; no se registran revisiones posteriores que alteren la lectura. La redacción española sigue la misma estructura concesiva y conserva el énfasis filosófico en λογισμός.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió un español sobrio y retórico, acorde con el tono filosófico-martirial de 4 Macabeos.
  - «Compasión» se usa para συμπάθεια, evitando diluir el matiz afectivo de fellow-feeling.
  - «Tormentos» traduce βάσανοι en un registro natural y suficientemente fuerte para el contexto de tortura.
