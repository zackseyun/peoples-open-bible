translation:
  language: es
  text: Apartaré mi rostro de ellos, y profanarán mi lugar atesorado[a]; hombres violentos[b] entrarán en él y lo profanarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi tesoro», «mi lugar secreto» o «mi cosa atesorada». El hebreo probablemente alude a algo precioso y protegido, probablemente vinculado con el santuario.
    reason: lexical_alternative
  - marker: b
    text: O «hombres crueles» o «ladrones».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲסִבּוֹתִי
  english_pob_choice: I will turn
  chosen_spanish: Apartaré
  alternatives_spanish:
  - Volveré
  - Alejaré
  lexicon: HALOT
  rationale: El hebreo expresa una acción futura en discurso profético. En español, «apartaré» comunica de manera natural la idea de volver o retirar el rostro sin caer en un calco rígido.
- source_word: פָנַי
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi cara
  - mi presencia
  lexicon: HALOT
  rationale: Se conserva la imagen corporal del hebreo. «Rostro» es claro, digno y mantiene el valor relacional/teológico del idiom. «Presencia» explicita el sentido, pero suaviza la metáfora.
- source_word: מֵהֶם
  english_pob_choice: away from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - alejado de ellos
  - apartado de ellos
  lexicon: HALOT
  rationale: El movimiento se entiende por el verbo «apartar». En español no es necesario repetir «lejos» para mantener la naturalidad.
- source_word: וְחִלְּלוּ
  english_pob_choice: they will profane
  chosen_spanish: profanarán
  alternatives_spanish:
  - desecrarán
  - contaminarán
  lexicon: HALOT
  rationale: «Profanar» conserva con precisión la oposición entre lo santo y lo invadido, que es central en el hebreo. «Destezar/desecrar» son posibles, pero menos directos en español bíblico contemporáneo.
- source_word: צְפוּנִי
  english_pob_choice: my treasured place
  chosen_spanish: mi lugar atesorado
  alternatives_spanish:
  - mi tesoro
  - mi lugar secreto
  - mi cosa atesorada
  lexicon: HALOT
  rationale: El término hebreo puede referirse a algo escondido, guardado o precioso. «Lugar atesorado» mantiene la posible referencia espacial y el valor de lo protegido, sin resolver indebidamente la ambigüedad hacia un objeto o un lugar específico.
- source_word: וּבָאוּ בָהּ
  english_pob_choice: will enter it
  chosen_spanish: entrarán en él
  alternatives_spanish:
  - entrarán en ella
  - vendrán a él
  lexicon: HALOT
  rationale: El referente femenino singular del hebreo queda representado por «él» en español si se asume un lugar masculino («lugar atesorado»). Esto evita la discordancia y conserva la referencia abierta sin especificar más de lo que el texto exige.
- source_word: פָּרִיצִים
  english_pob_choice: violent men
  chosen_spanish: hombres violentos
  alternatives_spanish:
  - hombres brutales
  - hombres impíos
  - ladrones
  lexicon: HALOT
  rationale: «Violentos» reproduce bien la fuerza moral y física del término. No se estrecha a «ladrones», porque el contexto habla de profanación e invasión, no solo de robo.
- source_word: וְחִלְּלוּהָ
  english_pob_choice: and profane it
  chosen_spanish: y lo profanarán
  alternatives_spanish:
  - y lo desecrarán
  - y lo contaminarán
  lexicon: HALOT
  rationale: Se repite el mismo verbo español para conservar el paralelismo y la intensificación del hebreo. La repetición de «profanar» enmarca la acusación de sacrilegio.
theological_decisions:
- issue: Referencia de צְפוּנִי y del pronombre final
  english_pob_reading: A valued holy place associated with the sanctuary, rendered generally as 'my treasured place' and then 'it.'
  chosen_spanish_reading: Un lugar santo, precioso y protegido, relacionado con el santuario; se vierte como «mi lugar atesorado» y luego «él» por la concordancia del sustantivo en español.
  alternative_spanish_readings:
  - mi tesoro
  - mi lugar secreto
  - mi cosa atesorada
  rationale: El hebreo es deliberadamente breve y algo ambiguo. La traducción española mantiene esa tensión sin forzar una identificación cerrada entre santuario, tesoro o recinto concreto. El pronombre masculino responde al sustantivo español elegido y no pretende resolver la ambigüedad del referente hebreo.
  doctrine_reference: Preservar la tensión léxica y teológica del texto profético sin explicitar más de lo que el hebreo dice.
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso del registro inglés, sin cambios de revisión aplicados. Se mantuvo la ambigüedad de צְפוּנִי y la repetición de «profanar» para reflejar el paralelismo del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma preferida en el proyecto, pero este versículo no contiene el nombre divino explícito; por eso no aparece aquí.
  - Se eligió «profanar» para חלל en ambas ocurrencias, manteniendo consistencia lexical y la repetición enfática del original.
  - «Lugar atesorado» conserva la oscilación entre espacio sagrado y cosa preciosa sin imponer una identificación doctrinal cerrada.
  - El masculino singular en «en él» sigue al sustantivo español «lugar» y evita discordancia con el referente implícito.
