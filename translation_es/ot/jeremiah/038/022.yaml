  text: וְ/הִנֵּ֣ה כָל הַ/נָּשִׁ֗ים אֲשֶׁ֤ר נִשְׁאֲרוּ֙ בְּ/בֵ֣ית מֶֽלֶךְ יְהוּדָ֔ה מוּצָא֕וֹת אֶל שָׂרֵ֖י מֶ֣לֶךְ בָּבֶ֑ל וְ/הֵ֣נָּה אֹמְר֗וֹת הִסִּית֜וּ/ךָ וְ/יָכְל֤וּ לְ/ךָ֙ אַנְשֵׁ֣י שְׁלֹמֶ֔/ךָ הָטְבְּע֥וּ בַ/בֹּ֛ץ רַגְלֶ֖/ךָ נָסֹ֥גוּ אָחֽוֹר־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/038/022.yaml
  text: And behold[a], all the women who remain in the house of the king of Judah are being brought out to the officials of the king of Babylon, and they are saying, ‘The men at peace with you have deceived you and prevailed against you; your feet have sunk into the mud[b]; they have turned back.’
  footnotes:
  - marker: a
    text: 'Hebrew: ''the men of your peace,'' an idiom for those on friendly terms with you, that is, your allies or close associates.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your feet have sunk into the mire.'
    reason: lexical_alternative
