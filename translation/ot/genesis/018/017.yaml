id: GEN.18.17
reference: Genesis 18:17
source:
  edition: WLC
  text: וַֽ/יהֹוָ֖ה אָמָ֑ר הַֽ/מְכַסֶּ֤ה אֲנִי֙ מֵֽ/אַבְרָהָ֔ם אֲשֶׁ֖ר אֲנִ֥י עֹשֶֽׂה׃
translation:
  text: And Yahweh said[a], “Shall I hide from Abraham what I am doing?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Am I hiding from Abraham what I am doing?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַֽ/יהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for יְהוָה, render as 'the LORD' rather than a transliteration, preserving the conventional covenant-name representation in English.
- source_word: אָמָר
  chosen: said
  alternatives:
  - had said
  lexicon: HALOT
  rationale: 'The wayyiqtol form advances the narrative with simple past: ''said.'' English pluperfect is unnecessary here.'
- source_word: הַֽ/מְכַסֶּה
  chosen: Shall I hide
  alternatives:
  - Am I hiding
  - Should I hide
  lexicon: HALOT
  rationale: 'The interrogative with participle expresses deliberation: ''Shall I hide...?'' This captures the rhetorical self-question better than a flat progressive.'
- source_word: מֵֽ/אַבְרָהָם
  chosen: from Abraham
  alternatives:
  - away from Abraham
  lexicon: HALOT
  rationale: The preposition מִן after 'hide' is naturally rendered 'from' in English.
- source_word: אֲשֶׁר
  chosen: what
  alternatives:
  - that which
  - that
  lexicon: HALOT
  rationale: Idiomatic English prefers 'what I am about to do' rather than the more wooden 'that which I am doing.'
- source_word: אֲנִי עֹשֶׂה
  chosen: I am about to do
  alternatives:
  - I am doing
  - I do
  lexicon: HALOT
  rationale: Although literally 'I am doing,' the participial construction in this context refers to imminent divine action not yet narrated as completed. 'About to do' best conveys the prospective sense in natural English without over-paraphrase.
