translation:
  language: es
  text: Pero ahora te[a] viene, y te fatigas; te[b] toca, y te turbas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque ahora te viene». La partícula hebrea כִּי admite varias funciones; aquí se traduce con sentido adversativo para reflejar mejor el contraste del contexto.'
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo está en femenino singular («viene» / «toca»), probablemente con referencia implícita a la calamidad o aflicción.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Porque
  - Pues
  - Ciertamente
  lexicon: HALOT
  rationale: En el contexto, Elifaz contrapone la situación presente de Job con lo que antes enseñaba a otros. En español, «Pero ahora…» expresa bien el valor adversativo que el POB documenta para esta cláusula.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - en este tiempo
  lexicon: HALOT
  rationale: Marca el contraste temporal inmediato entre el pasado y la experiencia presente de Job.
- source_word: תָּבֹוא
  english_pob_choice: it comes
  chosen_spanish: te viene
  alternatives_spanish:
  - viene sobre ti
  - te llega
  - te alcanza
  lexicon: HALOT
  rationale: El verbo es femenino singular y probablemente tiene un sujeto implícito de calamidad o aflicción. En español, «te viene» conserva la idea de que algo se acerca y llega a Job sin forzar un sujeto explícito.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - hacia ti
  lexicon: HALOT
  rationale: Con el verbo de movimiento en español, el complemento dativo clítico expresa de manera natural la dirección hacia Job.
- source_word: וַתֵּלֶא
  english_pob_choice: you are weary
  chosen_spanish: te cansas
  alternatives_spanish:
  - te fatigas
  - te agotas
  - pierdes aliento
  lexicon: HALOT
  rationale: Procede de לאה, «estar cansado, agotado». «Te cansas» es una forma natural y fiel que mantiene la idea de desfallecimiento sin cargarla de una connotación moral que el hebreo no exige.
- source_word: תִּגַּע
  english_pob_choice: it touches
  chosen_spanish: te toca
  alternatives_spanish:
  - te alcanza
  - te hiere
  - te afecta
  lexicon: HALOT
  rationale: «Toca» conserva la imagen verbal de נגע y funciona bien en la progresión poética de acercamiento y contacto.
- source_word: עָדֶיךָ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - hasta ti
  lexicon: HALOT
  rationale: Después de «te toca», el español puede omitir la repetición de la preposición y expresar el complemento con clítico.
- source_word: וַתִּבָּהֵל
  english_pob_choice: you are dismayed
  chosen_spanish: te atemorizas
  alternatives_spanish:
  - te desalientas
  - te sobresaltas
  - te turbas
  lexicon: HALOT
  rationale: בהל implica alarma, sobresalto o desasosiego. «Te atemorizas» comunica el impacto emocional con intensidad suficiente, aunque se reconoce que el hebreo también puede abarcar desorientación o perturbación.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés, que opta por una lectura adversativa de כִּי y por un sujeto implícito femenino singular para la aflicción. La versión española conserva esa tensión y la expresa con verbos naturales en segunda persona.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento directo en segunda persona singular, como en el hebreo y el inglés POB.
  - Se evitó introducir 'SEÑOR' o una paráfrasis doctrinal; el verso no contiene nombre divino.
  - 'La progresión verbal se conservó: venir/llegar, cansarse, tocar, atemorizarse.'
  - El ritmo breve y encadenado respeta la poesía hebrea del versículo.
