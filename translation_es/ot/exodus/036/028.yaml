translation:
  language: es
  text: Y hizo dos tablones para las esquinas del tabernáculo, en la parte trasera[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para las piezas de esquina del tabernáculo, en los dos lados traseros». Los términos hebreos describen los extremos o esquinas posteriores de la estructura y pueden enfatizar ya sea la ubicación en la esquina o los tablones de esquina unidos de manera especial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁנֵי
  english_pob_choice: And ... two
  chosen_spanish: Y ... dos
  alternatives_spanish:
  - Y dos
  - Y luego dos
  lexicon: HALOT
  rationale: La conjunción coordina la serie de construcción, y el numeral debe quedar explícito. «Y» conserva la secuencia narrativa sin forzar un adverbio añadido.
- source_word: קְרָשִׁים
  english_pob_choice: boards
  chosen_spanish: tablones
  alternatives_spanish:
  - tablas
  - paneles
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, el término designa piezas estructurales de madera. «Tablones» comunica bien el carácter de elementos grandes y rectos, sin perder el sentido arquitectónico.
- source_word: עָשָׂה
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - preparó
  lexicon: HALOT
  rationale: El verbo hebreo es el hacer básico. «Hizo» es fiel, natural y suficientemente sobrio para esta instrucción narrativa.
- source_word: לִ/מְקֻצְעֹת
  english_pob_choice: for the corners
  chosen_spanish: para las esquinas
  alternatives_spanish:
  - para los ángulos
  - para las piezas de esquina
  lexicon: HALOT
  rationale: El término puede señalar tanto ubicación como piezas de unión en las esquinas. «Esquinas» es la forma más clara en español, y mantiene abierta la posibilidad arquitectónica.
- source_word: הַ/מִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda del tabernáculo
  lexicon: HALOT
  rationale: «Tabernáculo» es el equivalente establecido y preciso para מִשְׁכָּן en Éxodo, sin diluir su referencia cultual.
- source_word: בַּ/יַּרְכָתָיִם
  english_pob_choice: at the rear
  chosen_spanish: en la parte trasera
  alternatives_spanish:
  - al fondo
  - en el extremo posterior
  lexicon: HALOT
  rationale: La forma dual apunta a la parte posterior o los dos extremos traseros de la estructura. «En la parte trasera» evita una repetición pesada de «esquinas» y refleja el ajuste revisado en el texto inglés.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del texto inglés, que eliminó la redundancia de «corners» después de «rear» para reflejar mejor la dualidad hebrea. Por eso se optó por «en la parte trasera» en vez de repetir «esquinas traseras».
  spanish_consistency_notes:
  - Se mantuvo «tabernáculo» para מִשְׁכָּן, conforme al uso técnico estable en Éxodo.
  - Se eligió «tablones» como equivalente de las piezas estructurales, sin introducir un tecnicismo innecesario.
  - La nota conserva la ambigüedad arquitectónica documentada por la POB inglesa entre esquina y extremo posterior.
