  - severity: medium
    issue: '''Aromas'' no representa bien הַבְּשָׂמִים en un inventario de bienes'
    rationale: El hebreo apunta a sustancias aromáticas valiosas; 'aromas' describe cualidad sensorial más que objetos almacenados. 'Especias' preserva mejor el referente material y coincide con la decisión inglesa auditada.
  - severity: medium
    issue: '''Su casa de armas'' es poco natural en español actual'
    rationale: Aunque intenta conservar la imagen hebrea, en español suena forzado. 'Su armería' es más claro y sigue dentro de las alternativas ya documentadas por el audit trail.
  - severity: low
    issue: Conjunción inicial 'Y' innecesaria
    rationale: No es errónea, pero en español moderno y digno la oración fluye mejor sin ella; no afecta la fidelidad semántica.
