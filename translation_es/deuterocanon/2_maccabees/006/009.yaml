translation:
  language: es
  text: Pero los que no elegían adoptar las costumbres griegas[a] debían ser masacrados. Así se podía ver la miseria presente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pasarse a las cosas griegas»; la expresión griega es literalmente «a las cosas griegas», y se refiere en sentido amplio a modos de vida, costumbres y prácticas helenísticas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ προαιρουμένους
  english_pob_choice: did not choose
  chosen_spanish: no habían elegido
  alternatives_spanish:
  - no quisieron
  - no consentían
  - no preferían
  lexicon: LSJ
  rationale: προαιρέομαι expresa una elección deliberada; «no habían elegido» conserva el matiz volitivo sin añadir motivos no explicitados por el texto.
- source_word: μεταβαίνειν
  english_pob_choice: to adopt
  chosen_spanish: pasarse
  alternatives_spanish:
  - adoptar
  - cambiarse
  - pasar a
  lexicon: LSJ
  rationale: En combinación con ἐπὶ τὰ Ἑλληνικά, el verbo sugiere un cambio de pertenencia o adhesión a una forma de vida helenística. «Pasarse» mantiene el movimiento de cambio sin volverlo demasiado interpretativo; el complemento aclara el ámbito cultural.
- source_word: ἐπὶ τὰ Ἑλληνικά
  english_pob_choice: the Greek ways
  chosen_spanish: a las costumbres griegas
  alternatives_spanish:
  - a las cosas griegas
  - a las prácticas griegas
  - a la vida helénica
  lexicon: LSJ
  rationale: El neutro plural con artículo apunta a un conjunto amplio de prácticas y modos de vida griegos/helenísticos. «Costumbres griegas» es natural en español y conserva esa amplitud; «cosas griegas» resultaría menos idiomático.
- source_word: κατασφάζειν
  english_pob_choice: were to be slaughtered
  chosen_spanish: se les debía matar
  alternatives_spanish:
  - serían masacrados
  - habían de ser degollados
  - se les debía inmolar
  lexicon: LSJ
  rationale: El verbo es más fuerte que «matar», pero en español «se les debía matar» reproduce el mandato violento del decreto sin introducir una metáfora extra ni un arcaísmo. Se preserva la fuerza coercitiva del contexto.
- source_word: παρῆν οὖν ὁρᾶν
  english_pob_choice: Thus one could see
  chosen_spanish: Así se podía ver
  alternatives_spanish:
  - Por tanto, se podía ver
  - De modo que se podía ver
  - Así era posible ver
  lexicon: LSJ
  rationale: La construcción impersonal introduce lo observable públicamente. «Así se podía ver» es una formulación natural en español y mantiene el valor inferencial de οὖν.
- source_word: τὴν ἐνεστῶσαν ταλαιπωρίαν
  english_pob_choice: the present misery
  chosen_spanish: la aflicción presente
  alternatives_spanish:
  - la miseria presente
  - la angustia de entonces
  - la calamidad presente
  lexicon: LSJ
  rationale: ἐνεστῶσαν significa presente, actual o apremiante. «Aflicción presente» conserva el sentido temporal y el tono de padecimiento; «miseria» en español puede sonar a pobreza material y desviar el foco.
theological_decisions:
- issue: Alcance de ἐπὶ τὰ Ἑλληνικά
  english_pob_reading: cultural-religious adoption of Greek customs
  chosen_spanish_reading: adopción de costumbres griegas dentro de un contexto cultural y religioso
  alternative_spanish_readings:
  - volverse griego étnicamente
  - adoptar solo el idioma griego
  - asumir prácticas helenísticas sin dimensión religiosa
  rationale: En el contexto de 2 Macabeos 6, la expresión apunta a conformidad helenística impuesta por el poder, no a un cambio étnico. La traducción evita convertir el pasaje en una afirmación de apostasia explícita que el griego aquí no formula directamente, pero sí conserva la presión cultural-religiosa.
  doctrine_reference: Principio de primacía del original; preservar el alcance contextual sin añadir conclusiones doctrinales no explícitas.
translation_notes:
  revision_awareness: La versión inglesa auditada revisó el final de «had now come» a «present» por mayor precisión léxica respecto de ἐνεστῶσαν. En español se siguió esa corrección con «presente». También se conservó el valor observacional de παρῆν οὖν ὁρᾶν mediante una formulación impersonal natural.
  spanish_consistency_notes:
  - Se mantuvo «griegas» para Ἑλληνικά, en línea con el español bíblico contemporáneo claro; no se reemplazó por «helenísticas» porque el texto de referencia habla de prácticas griegas en sentido amplio.
  - «Aflicción» se prefirió a «miseria» para evitar una posible lectura de pobreza económica y conservar el campo semántico de sufrimiento/tribulación.
  - Se evitó «degollar» o «degollados» porque, aunque intensifica, podría fijar un modo de ejecución no expresado de manera necesaria por κατασφάζειν en este contexto de decreto general.
