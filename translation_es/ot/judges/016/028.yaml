translation:
  language: es
  text: 'Entonces Sansón llamó a Yahvé y dijo: «Señor Yahvé, por favor acuérdate de mí, y por favor fortaléceme solo esta vez, oh Dios, para que me vengue de los filisteos por mis dos ojos[a] con un solo acto de venganza».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por mis dos ojos», refiriéndose a que los filisteos habían cegado a Sansón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: clamó
  alternatives_spanish:
  - llamó
  - invocó
  lexicon: HALOT
  rationale: En este contexto de oración dirigida a Dios, «clamó» comunica la invocación ferviente sin volverlo excesivamente emotivo ni reducirlo a un simple llamado ordinario. Mantiene bien el valor de llamar a Yahvé en súplica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de transliterar el nombre divino, no sustituirlo por una mayúscula litúrgica. «Yahvé» es la forma española establecida dentro de la práctica del POB.
- source_word: אֲדֹנָי יֱהֹוִה
  english_pob_choice: Lord GOD
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Dios
  - Señor, Yahvé
  lexicon: HALOT
  rationale: 'La combinación reproduce dos niveles de dirección: el título «Adonai» y el nombre divino. En español, «Señor Yahvé» conserva esa doble referencia sin la repetición artificial de «Señor Señor».'
- source_word: זָכְרֵנִי נָא
  english_pob_choice: please remember me
  chosen_spanish: por favor acuérdate de mí
  alternatives_spanish:
  - recuérdame, por favor
  - te ruego que te acuerdes de mí
  lexicon: HALOT
  rationale: El imperativo con נָא expresa ruego. «Acuérdate de mí» es idiomático en español y conserva la petición personal y relacional del verbo זכר.
- source_word: וְחַזְּקֵנִי נָא
  english_pob_choice: and please strengthen me
  chosen_spanish: y por favor fortaléceme
  alternatives_spanish:
  - y por favor dame fuerzas
  - y fortaléceme, por favor
  lexicon: HALOT
  rationale: «Fortaléceme» traduce con precisión la petición de impartir fuerza. El orden con «por favor» mantiene la súplica y su tono reverente.
- source_word: אַךְ הַפַּעַם הַזֶּה
  english_pob_choice: just this once
  chosen_spanish: solo esta vez
  alternatives_spanish:
  - solamente esta vez
  - únicamente por esta vez
  lexicon: HALOT
  rationale: La frase limita la petición a una ocasión concreta. «Solo esta vez» es natural en español y reproduce bien la restricción enfática de אַךְ.
- source_word: הָאֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh, Dios
  lexicon: HALOT
  rationale: En vocativo, «oh Dios» refleja la dirección directa de la oración. No hace falta marcar un tratamiento más formal que el que exige el hebreo.
- source_word: וְאִנָּקְמָה
  english_pob_choice: so that I may take vengeance
  chosen_spanish: para que me vengue
  alternatives_spanish:
  - para que tome venganza
  - y me vengaré
  lexicon: HALOT
  rationale: El cohortativo expresa finalidad y deseo. «Para que me vengue» conserva la fuerza volitiva de la súplica sin perder la relación con el siguiente sustantivo de la misma raíz.
- source_word: נְקַם אַחַת
  english_pob_choice: with a single act of vengeance
  chosen_spanish: con una sola venganza
  alternatives_spanish:
  - con un solo acto de venganza
  - una venganza única
  lexicon: HALOT
  rationale: El hebreo usa una construcción enfática de la misma raíz. «Con una sola venganza» es fiel y reconocible; aunque suene algo intensa, preserva la reiteración semítica que la POB inglesa también destacó.
- source_word: מִשְּׁתֵי עֵינַי
  english_pob_choice: for my two eyes
  chosen_spanish: por mis dos ojos
  alternatives_spanish:
  - por la pérdida de mis dos ojos
  - a causa de mis dos ojos
  lexicon: HALOT
  rationale: Se mantiene la cercanía al hebreo. La frase alude al cegamiento de Sansón, pero la traducción no lo explicita en el cuerpo principal, para no ir más allá de lo que el texto dice directamente.
- source_word: מִפְּלִשְׁתִּים
  english_pob_choice: on the Philistines
  chosen_spanish: de los filisteos
  alternatives_spanish:
  - contra los filisteos
  - sobre los filisteos
  lexicon: HALOT
  rationale: Después de «me vengue», el complemento con «de» expresa bien el objeto de la venganza en español. Aunque «contra» también es posible, «de los filisteos» sigue de cerca la relación nominal del hebreo con נקם.
theological_decisions:
- issue: Tratamiento de los nombres divinos en la plegaria de Sansón
  english_pob_reading: Distinguish יְהוָה as 'Yahweh' and אֲדֹנָי יֱהֹוִה as 'Lord GOD.'
  chosen_spanish_reading: Distinguir «Yahvé» y «Señor Yahvé».
  alternative_spanish_readings:
  - Yahvé y Señor Dios
  - Señor Yahvé y Dios
  rationale: Se conserva la diferencia entre el nombre propio divino y el título reverente compuesto. «Señor Yahvé» evita ocultar el Tetragrámaton y, a la vez, mantiene el tono de oración del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre venganza y objeto gramatical en la última cláusula
  english_pob_reading: take vengeance on the Philistines for my two eyes, with one act of vengeance
  chosen_spanish_reading: me vengue de los filisteos por mis dos ojos, con una sola venganza
  alternative_spanish_readings:
  - me vengue contra los filisteos por mis dos ojos
  - tome venganza de los filisteos por mis dos ojos
  rationale: El hebreo vincula la venganza con los filisteos y con la razón de «mis dos ojos». La redacción española mantiene ambos elementos sin convertir el versículo en una paráfrasis explicativa.
  doctrine_reference: Principio POB de respetar la estructura semántica cuando el énfasis retórico depende de ella.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al colocar el motivo «por mis dos ojos» junto a «los filisteos» y reservar el énfasis final para «con una sola venganza». Se evitó una expansión interpretativa en el cuerpo principal y se añadió una nota breve para aclarar el sentido idiomático del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma española del nombre divino, en coherencia con el estándar del proyecto.
  - Se mantiene «filisteos» en minúscula como etnónimo normal en español.
  - «Una sola venganza» conserva la repetición enfática de la raíz hebrea; no se reemplazó por una expresión más suave.
  - El registro es oracional y formal, pero con sintaxis española natural.
