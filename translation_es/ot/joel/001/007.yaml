  to: Él ha convertido mi vid en una desolación y mi higuera en un tocón[a]; la ha despojado por completo y la ha arrojado; sus ramas se han vuelto blancas[b].
  rationale: Se ajusta «la ha echado» a «la ha arrojado» para reflejar mejor וְהִשְׁלִיךְ en español natural y formal. Se cambia «sus sarmientos» por «sus ramas» para evitar una especificación que puede confundir el referente inmediato, mientras la nota conserva alternativas más técnicas del hebreo. También se corrige «tentáculos» por «zarcillos» en la nota.
