translation:
  language: es
  text: ¡Ay del que obtiene ganancia injusta para su casa[a], para poner su nido en lo alto[b], para escapar del alcance de la calamidad[c]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ganancia injusta», «ganancia deshonesta» o «ganancia perversa». La expresión hebrea se refiere a provecho obtenido por medio de la maldad o la injusticia.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «su nido». La imagen es la de hacerse inalcanzable, como un ave que anida en lo alto, fuera de peligro.
    reason: cultural_note
  - marker: c
    text: Literalmente, «de la palma/mano del mal»; es decir, del alcance o poder de la calamidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay del que...!
  lexicon: HALOT
  rationale: En español, «¡Ay de!» es la exclamación profética más natural y solemne para introducir un oráculo de juicio; conserva el tono de denuncia de «Woe» sin sonar mecánico.
- source_word: בֹּצֵעַ בֶּצַע רָע
  english_pob_choice: gains evil profit
  chosen_spanish: acumula ganancia injusta
  alternatives_spanish:
  - gana ganancia mala
  - obtiene lucro perverso
  - consigue provecho injusto
  lexicon: HALOT
  rationale: La expresión hebrea apunta a lucro obtenido por medios torcidos. «Ganancia injusta» conserva el valor moral de la frase y evita traducir literalmente «evil» como si describiera solo una cualidad abstracta.
- source_word: לְבֵיתוֹ
  english_pob_choice: for his house
  chosen_spanish: para su casa
  alternatives_spanish:
  - para su hogar
  - para su familia
  - para su casa/linaje
  lexicon: HALOT
  rationale: «Casa» mantiene la amplitud semántica de בַּיִת y permite el doble eco de vivienda, familia y patrimonio sin imponer una restricción interpretativa.
- source_word: לָשׂוּם
  english_pob_choice: to set
  chosen_spanish: para poner
  alternatives_spanish:
  - para colocar
  - para establecer
  lexicon: HALOT
  rationale: En una construcción final de propósito, «para poner» es el equivalente más natural y directo en español, sin perder la idea de disposición intencional.
- source_word: בַּמָּרוֹם
  english_pob_choice: on high
  chosen_spanish: en lo alto
  alternatives_spanish:
  - en las alturas
  - en un lugar alto
  - arriba
  lexicon: HALOT
  rationale: «En lo alto» conserva la imagen de elevación protectora y suena idiomático en español bíblico contemporáneo.
- source_word: קִנּוֹ
  english_pob_choice: his nest
  chosen_spanish: su nido
  alternatives_spanish:
  - su nidal
  - su guarida
  - su morada
  lexicon: HALOT
  rationale: Se mantiene la metáfora ornitológica del hebreo («nido/nest»), que es central para la ironía del verso y no debe desdibujarse.
- source_word: לְהִנָּצֵל
  english_pob_choice: to escape
  chosen_spanish: para escaparse
  alternatives_spanish:
  - para librarse
  - para salvarse
  - para quedar a salvo
  lexicon: HALOT
  rationale: El nifal expresa finalidad de librarse de una amenaza. «Escaparse» conserva el movimiento de huida y encaja con la imagen de refugio ilusorio.
- source_word: מִכַּף
  english_pob_choice: from the grasp of
  chosen_spanish: del alcance de
  alternatives_spanish:
  - de la mano de
  - del poder de
  - del dominio de
  lexicon: HALOT
  rationale: Aunque literalmente es «de la palma/mano», en español «alcance» comunica bien la idea de poder o capacidad de daño sin sobrecargar la imagen.
- source_word: רָע
  english_pob_choice: disaster
  chosen_spanish: la calamidad
  alternatives_spanish:
  - el mal
  - la desgracia
  - el desastre
  lexicon: HALOT
  rationale: En este contexto profético la referencia es a una amenaza de juicio/castigo más que a maldad abstracta; «calamidad» recoge ese matiz y mantiene el tono solemne del pasaje.
theological_decisions:
- issue: Metáfora del nido
  english_pob_reading: Literally 'his nest.' The image is of making oneself unreachable, like a bird nesting high above danger.
  chosen_spanish_reading: Se preserva «su nido» como metáfora de falsa seguridad e inaccesibilidad.
  alternative_spanish_readings:
  - su casa en lo alto
  - su refugio elevado
  - su fortaleza en altura
  rationale: La fuerza del reproche profético está en la imagen concreta del ave que se cree fuera de peligro. Mantenerla ayuda a conservar la ironía y evita una paráfrasis que suavice el golpe retórico.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de בַּיִת
  english_pob_reading: Rendered 'house' rather than narrowing to 'household' or 'dynasty.'
  chosen_spanish_reading: Se mantiene «casa» sin especificar «familia» ni «dinastía».
  alternative_spanish_readings:
  - familia
  - hogar
  - linaje
  rationale: El hebreo permite un alcance amplio; «casa» deja abierta la referencia a patrimonio, esfera doméstica y proyecto de seguridad, sin decidir más de lo que el texto dice.
  doctrine_reference: Translation philosophy §5
- issue: Valor de רָע al final del verso
  english_pob_reading: Replaced 'harm' with 'disaster' to better reflect רָע in this context of impending calamity/judgment.
  chosen_spanish_reading: Se traduce como «calamidad».
  alternative_spanish_readings:
  - desastre
  - desgracia
  - mal
  rationale: En un oráculo de ay, el término apunta al desastre que amenaza al opresor. «Calamidad» conserva el peso judicial y evita reducir רָע a una abstracción moral.
  doctrine_reference: Translation philosophy §3, §7
translation_notes:
  revision_awareness: 'La base inglesa fue ajustada en revisión reciente: se conservó la estructura formal del verso y se reflejó el cambio de «harm» a «disaster» con «calamidad». También se mantuvo la decisión auditada de preservar la metáfora de «nest» y de traducir בַּיִת de forma amplia como «casa».'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto base lo requiera; en este versículo no aparece el nombre divino.
  - «Calamidad» se escogió para mantener la gravedad profética y la coherencia con la revisión inglesa más reciente.
  - 'La puntuación reproduce el tono de oráculo: exclamación inicial, comas internas y cierre enfático.'
