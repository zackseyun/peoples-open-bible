translation:
  language: es
  text: Yahvé abatió a Benjamín ante Israel, y los hijos de Israel destruyeron aquel día a veinticinco mil cien hombres de Benjamín, todos estos, hombres que sacaban espada.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּגֹּף / יְהוָה
  english_pob_choice: Yahweh struck down
  chosen_spanish: Yahvé hirió
  alternatives_spanish:
  - Yahvé derrotó
  - Yahvé golpeó
  lexicon: HALOT
  rationale: נָגַף en contexto militar expresa un golpe decisivo o derrota en batalla. «Hirió» comunica la acción dañina y el resultado bélico sin introducir un modismo ajeno. Se conserva «Yahvé» para el nombre divino, conforme al criterio del proyecto.
- source_word: לִפְנֵי יִשְׂרָאֵל
  english_pob_choice: before Israel
  chosen_spanish: delante de Israel
  alternatives_spanish:
  - ante Israel
  - frente a Israel
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y sitúa la derrota en presencia/ante el pueblo de Israel. «Delante de Israel» mantiene esa relación espacial e histórica con naturalidad en español.
- source_word: וַיַּשְׁחִיתוּ
  english_pob_choice: destroyed
  chosen_spanish: destruyeron
  alternatives_spanish:
  - mataron
  - arrasaron
  lexicon: HALOT
  rationale: שׁחת en hifil puede significar destruir, arruinar; en este informe de guerra el sentido es letal. «Destruyeron» conserva la severidad y el paralelismo con la cláusula anterior.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la forma formal del hebreo «los hijos de Israel», que el POB inglés también retuvo. Esto evita borrar la referencia textual explícita y mantiene la consistencia del registro bíblico.
- source_word: עֶשְׂרִים וַחֲמִשָּׁה אֶלֶף וּמֵאָה אִישׁ
  english_pob_choice: twenty-five thousand one hundred men
  chosen_spanish: veinticinco mil cien hombres
  alternatives_spanish:
  - veinticinco mil y cien hombres
  lexicon: HALOT
  rationale: La cifra se traduce de forma directa. «Hombres» responde a אִישׁ en una fórmula de recuento de combatientes y resulta idiomático en español.
- source_word: כָּל אֵלֶּה
  english_pob_choice: all these
  chosen_spanish: todos estos
  alternatives_spanish:
  - todos ellos
  - todos estos hombres
  lexicon: HALOT
  rationale: La frase resumptiva se conserva sin añadir elementos no presentes en el hebreo. «Todos estos» funciona bien como cierre enfático del recuento.
- source_word: שֹׁלֵף חָרֶב
  english_pob_choice: drawing the sword
  chosen_spanish: que empuñaban la espada
  alternatives_spanish:
  - desenvainando la espada
  - que sacaban la espada
  lexicon: HALOT
  rationale: El hebreo describe literalmente a los hombres «que sacan/desenvainan espada», un rasgo de guerreros armados. En español, «empuñaban la espada» comunica la condición de combatientes con naturalidad, aunque no reproduce mecánicamente la imagen de desenvainar.
theological_decisions:
- issue: Agencia divina y humana en la victoria
  english_pob_reading: The LORD struck Benjamin down, and the sons of Israel destroyed Benjamin's men.
  chosen_spanish_reading: Yahvé hirió a Benjamín, y los hijos de Israel destruyeron a los hombres de Benjamín.
  alternative_spanish_readings:
  - Solo la victoria humana de Israel
  - Solo la acción directa de Dios sin énfasis militar humano
  rationale: El hebreo coloca ambas acciones en secuencia sin anular una por la otra. La traducción mantiene explícitas la acción de Yahvé y la de Israel para no resolver la tensión teológica que el texto preserva entre soberanía divina y responsabilidad humana.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios en la última pasada; se conserva su lectura léxica principal y su decisión teológica sobre la doble agencia en la batalla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el Tetragrámaton.
  - Se conserva «los hijos de Israel» por fidelidad formal al hebreo y alineación con la decisión inglesa.
  - Se evita arcaísmo innecesario; la frase final usa un español natural pero suficientemente cercano a la imagen militar del original.
