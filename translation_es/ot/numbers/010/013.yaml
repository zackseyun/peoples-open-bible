translation:
  language: es
  text: Así partieron por primera vez, conforme al mandato de Yahvé, por medio de Moisés[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por la mano de Moisés», un modismo que significa por medio de Moisés como mediador o agente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: they set out
  chosen_spanish: salieron
  alternatives_spanish:
  - partieron
  - se pusieron en marcha
  lexicon: HALOT
  rationale: נסע en un contexto narrativo de desplazamiento indica la acción de levantar el campamento y avanzar. En español, 'salieron' es natural y comunica el inicio del movimiento sin volverlo demasiado técnico.
- source_word: בָּרִאשֹׁנָה
  english_pob_choice: for the first time
  chosen_spanish: en primer lugar
  alternatives_spanish:
  - por primera vez
  - primero
  lexicon: HALOT
  rationale: La forma adverbial aquí señala el carácter inicial de la partida. 'En primer lugar' conserva la idea de precedencia/inicialidad con buena naturalidad en español; 'por primera vez' también sería posible, pero puede sonar más interpretativo según el contexto.
- source_word: עַל פִּי
  english_pob_choice: at the command of
  chosen_spanish: conforme al mandato de
  alternatives_spanish:
  - según la orden de
  - por mandato de
  lexicon: HALOT
  rationale: La expresión idiomática significa literalmente 'según la boca de', es decir, de acuerdo con la orden/mandato. 'Conforme al mandato de' preserva el sentido de obediencia a una নির্দেশ/orden sin traducir mecánicamente el hebraísmo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
  rationale: El nombre divino se mantiene como transliteración del Tetragrámaton. En español, 'Yahvé' es la forma de uso más asentada y legible para lectores bíblicos, manteniendo la decisión del POB de no sustituir el nombre por un título.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: through Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por la mano de Moisés
  - mediante Moisés
  lexicon: HALOT
  rationale: El hebraísmo 'por la mano de' expresa mediación o agencia. 'Por medio de Moisés' comunica con claridad esa función mediadora en español actual sin perder el sentido literal de intermediación.
theological_decisions:
- issue: Cómo renderizar el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se conserva el nombre propio del pacto en lugar de una sustitución titulada. La forma 'Yahvé' es el equivalente español más reconocible y acorde con la práctica del POB de distinguir el nombre divino del título 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
translation_notes:
  revision_awareness: La versión anterior falló porque el marcador de nota [a] no aparecía en el texto español. Se corrigió anclando la nota directamente en la frase final «por medio de Moisés[a]». También se ajustó el orden para reflejar con naturalidad la secuencia narrativa y mantener la equivalencia óptima con el hebreo y la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el Tetragrámaton, coherente con la norma del proyecto para יְהוָה.
  - Se evitó 'SEÑOR' como sustitución del nombre divino.
  - '''por medio de Moisés'' conserva la mediación implícita del hebraísmo ''por la mano de Moisés''.'
  - El giro inicial 'en primer lugar' refleja el valor adverbial de בָּרִאשֹׁנָה sin introducir información nueva.
