review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: una bendición desiderativa dirigida a Judit, el ruego por el éxito/completamiento de su acción, el propósito en favor del honor de Israel y Jerusalén, y el gesto final de reverencia a Dios. Sin embargo, hay dos desajustes menores con el audit trail y la sintaxis española natural: el sujeto debe ser singular (''le dijeron''), no plural, porque αὐτῇ es singular; y ''lleve a cabo tus empresas'' suaviza demasiado τελειῶσαι con ἐπιτηδεύματα, donde conviene expresar más claramente la idea de llevar a término sus acciones/empeños.'
  spanish_quality_summary: El español es claro y digno, pero 'Y les dijeron' es incorrecto en concordancia y entorpece la lectura. 'Tus empresas' puede sonar algo comercial en español contemporáneo. 'Se postró ante Dios' es bueno, aunque para seguir más de cerca el griego y la decisión inglesa puede preferirse 'se postró ante Dios' o 'se postró delante de Dios'; el borrador ya es aceptable en ese punto.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Dios' y 'hijos de Israel' están bien. La decisión de no usar 'adoró' como texto principal concuerda con la política sobre προσκυνέω. 'Favor' sigue adecuadamente εἰς χάριν. La principal mejora léxica es cambiar 'empresas' por 'empeños' o 'planes' para evitar un matiz comercial ajeno al contexto.
  issues:
  - severity: high
    issue: Concordancia incorrecta en 'Y les dijeron'
    rationale: El griego καὶ εἶπαν αὐτῇ significa 'y le dijeron a ella'. El clítico plural 'les' cambia el referente y es gramaticalmente incorrecto en español para este contexto.
  - severity: medium
    issue: '''Tus empresas'' suena poco natural y demasiado comercial'
    rationale: τὰ ἐπιτηδεύματά σου se refiere al curso de acción o empeños de Judit. En español bíblico general, 'empresas' puede entenderse como negocios o compañías. 'Empeños' o 'planes' transmite mejor el sentido contextual.
  - severity: low
    issue: La nota c no refleja bien el valor de καύχημα
    rationale: La nota explica 'elevación u honor público', pero eso corresponde más directamente a ὕψωμα. Para καύχημα conviene hablar de 'motivo de gloria/jactancia/exultación' o base de honor público.
  revised_spanish_text: 'Y le dijeron: «Que el Dios de nuestros padres te conceda favor[a], y lleve tus empeños[b] a término para gloria[c] de los hijos de Israel y exaltación de Jerusalén». Y ella se postró ante Dios[d].'
