revisions:
- from: ¡Mira![a] Mi siervo actuará con sabiduría; será enaltecido, levantado y muy exaltado.
  to: He aquí[a], mi siervo actuará con sabiduría; será levantado, alzado y muy exaltado.
  rationale: Se ajusta הִנֵּה a «He aquí» para conservar mejor la solemnidad profética y la correspondencia con «Behold». Se corrige la puntuación/capitalización española y se afina la serie verbal de exaltación para mantener la progresión del hebreo con español natural sin alterar el sentido. La nota léxica sobre יַשְׂכִּיל se conserva sin cambios sustanciales.
