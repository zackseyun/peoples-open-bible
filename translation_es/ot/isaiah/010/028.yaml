revisions:
- from: Él ha llegado a Aiat; ha pasado por Migrón[a]. En Micmas pone en depósito sus pertenencias.
  to: Él ha llegado a Aiat; ha pasado por Migrón[a]. En Micmas deja su equipaje.
  rationale: Se mantiene la estructura y los topónimos del borrador, pero se ajusta la expresión final para reflejar mejor el contexto militar y sonar más natural en español. 'Equipaje' preserva mejor el valor contextual de כֵּלָיו que 'pertenencias', y 'deja' comunica de forma clara e idiomática la acción de יַפְקִיד en este contexto. La nota conserva la alternativa 'equipo' documentada por el inglés POB.
