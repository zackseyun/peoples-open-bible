base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/008/011.yaml
  text: Solomon had a vineyard at Baal-hamon[a]; he gave the vineyard to keepers[c][b]. Each man was to bring a thousand pieces of silver for its fruit.
  footnotes:
  - marker: a
    text: Or 'he gave the vineyard to the keepers'; the Hebrew verb is broadly 'gave,' but here likely implies entrusting or assigning it for management.
    reason: lexical_alternative
  - marker: b
    text: Or 'from its fruit' or 'with his fruit.' The Hebrew suffix in 'its/his fruit' may be understood with reference to the vineyard or distributively to each keeper's produce.
    reason: lexical_alternative
  - marker: c
    text: Literally 'a thousand silver'; the specific unit of silver is not stated in the Hebrew.
    reason: cultural_note
