translation:
  language: es
  text: Por esto nuestro corazón está enfermo[a]; por estas cosas nuestros ojos se han oscurecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por esto nuestro corazón estaba desfallecido; por estas cosas nuestros ojos se habían oscurecido».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל זֶה
  english_pob_choice: Because of this
  chosen_spanish: Por esto
  alternatives_spanish:
  - A causa de esto
  - Por esta razón
  lexicon: HALOT
  rationale: עַל con el demostrativo introduce causa o base; en español, «Por esto» expresa con naturalidad la relación causal sin añadir explicación interpretativa.
- source_word: הָיָה
  english_pob_choice: has become
  chosen_spanish: se ha enfermado
  alternatives_spanish:
  - estaba
  - se enfermó
  lexicon: HALOT
  rationale: El qatal con predicado adjetival expresa un estado resultante. «Se ha enfermado» comunica la condición actual surgida por la calamidad, manteniendo el valor de resultado.
- source_word: דָוֶה
  english_pob_choice: sick
  chosen_spanish: enfermado
  alternatives_spanish:
  - débil
  - desfallecido
  - lánguido
  lexicon: HALOT
  rationale: דָוֶה apunta a enfermedad, desfallecimiento o languidez. Con «corazón», «enfermado» conserva el impacto corporal-metafórico del hebreo sin reducirlo solo a tristeza emocional.
- source_word: לִבֵּנוּ
  english_pob_choice: our heart
  chosen_spanish: nuestro corazón
  alternatives_spanish:
  - nuestra mente
  - nuestro ser interior
  lexicon: HALOT
  rationale: «Corazón» es el equivalente transparente y fiel para לֵב, preservando la imagen poética del interior humano.
- source_word: עַל אֵלֶּה
  english_pob_choice: because of these things
  chosen_spanish: por estas cosas
  alternatives_spanish:
  - a causa de estas
  - por estas
  lexicon: HALOT
  rationale: La repetición de עַל vuelve a marcar causa. «Por estas cosas» es idiomático en español y mantiene el referente plural a las calamidades mencionadas.
- source_word: חָשְׁכוּ
  english_pob_choice: have grown dim
  chosen_spanish: se han oscurecido
  alternatives_spanish:
  - se han apagado
  - han quedado oscuras
  - se han nublado
  lexicon: HALOT
  rationale: Literalmente el verbo significa «se oscureció/se volvió oscuro». «Se han oscurecido» conserva la imagen de visión disminuida por duelo o agotamiento; en español permite mantener el paralelismo poético.
- source_word: עֵינֵינוּ
  english_pob_choice: our eyes
  chosen_spanish: nuestros ojos
  alternatives_spanish:
  - nuestra vista
  lexicon: HALOT
  rationale: Se mantiene el plural corporal del hebreo para preservar el paralelismo y la imaginería concreta del lamento.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español, anclado en la primera cláusula, y que la nota alternativa corresponda al valor léxico del hebreo y al auditorio español.
  spanish_consistency_notes:
  - Se mantiene el paralelismo causal de עַל ... עַל ... con dos cláusulas introducidas por «Por».
  - Se conserva la imaginería corporal («corazón», «ojos») sin sustituirla por abstracciones.
  - No se introduce terminología eclesiástica ajena al hebreo; el tono es bíblico, claro y contemporáneo.
