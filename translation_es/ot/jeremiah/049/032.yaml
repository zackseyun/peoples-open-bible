base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/049/032.yaml
  text: Their camels will become plunder[a], and their abundance of livestock spoil. I will scatter to every wind those who cut the corners of their hair, and from all sides I will bring their calamity upon them[b], declares Yahweh.
  footnotes:
  - marker: a
    text: Or 'those with clipped temples.' The Hebrew expression refers to people who cut the edge/corners of the hair, likely a distinctive grooming practice.
    reason: lexical_alternative
  - marker: b
    text: Or 'from every quarter' or 'from all around them.'
    reason: lexical_alternative
