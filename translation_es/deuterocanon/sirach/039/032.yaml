  to: Por tanto, desde el comienzo tomé mi posición[a], y consideré, y lo puse por escrito.
  rationale: 'Se ajustó la línea principal para reflejar con mayor precisión el hebreo primario y la revisión inglesa auditada: «tomé mi posición» expresa mejor la toma deliberada de postura que «me mantuve firme»; «consideré» sigue más de cerca la decisión léxica del POB; y «lo puse por escrito» es la opción española más natural y fiel a «set it down in writing». También se refinó la nota para corresponder exactamente con la nueva redacción principal.'
