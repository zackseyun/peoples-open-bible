translation:
  language: es
  text: Y harás lazadas de azul[a] en el borde de la una cortina, en el extremo del primer conjunto unido[b]; y así harás en el borde de la cortina exterior[c] del segundo conjunto unido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «violeta» o «azul violáceo»; el hebreo תְּכֵלֶת designa el tinte/material azul característico usado en el tabernáculo.
    reason: lexical_alternative
  - marker: b
    text: Los términos hebreos para «conjunto unido» (חֹבָרֶת / מַחְבֶּרֶת) se refieren a un grupo de cortinas unidas como una sola unidad; tradicionalmente también puede decirse «acoplamiento».
    reason: lexical_alternative
  - marker: c
    text: O «la cortina de más afuera» para «la cortina exterior».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֻלְאֹת
  english_pob_choice: loops
  chosen_spanish: lazadas
  alternatives_spanish:
  - bucles
  - anillos
  - lazos
  lexicon: HALOT
  rationale: En el contexto de textiles del tabernáculo, el hebreo designa elementos hechos para enlazar. «Lazadas» comunica la forma funcional sin sonar técnico en exceso, y evita un calco rígido.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul violáceo
  - violeta
  - azul púrpura
  lexicon: HALOT
  rationale: Sigo la decisión inglesa reciente de dejar el color como «blue». En español, «azul» es la opción más natural y responsable; las alternativas intentan aproximar el matiz del tinte antiguo, pero serían más especulativas.
- source_word: שְׂפַת
  english_pob_choice: edge
  chosen_spanish: borde
  alternatives_spanish:
  - orilla
  - extremo
  - labio
  lexicon: HALOT
  rationale: En tejido, «borde» es el equivalente más claro e idiomático para el límite de la cortina.
- source_word: יְרִיעָה
  english_pob_choice: curtain
  chosen_spanish: cortina
  alternatives_spanish:
  - panel
  - paño
  - lona
  lexicon: HALOT
  rationale: En Éxodo 26 la palabra se refiere a las piezas de tela del tabernáculo; «cortina» es comprensible y conserva el sentido de paño textil.
- source_word: הָאֶחָת
  english_pob_choice: the one
  chosen_spanish: la primera
  alternatives_spanish:
  - la una
  - la única
  - la una cortina
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la una», pero en español la referencia concreta dentro del par exige naturalidad. «La primera» expresa la contraposición con «la segunda» sin añadir un dato ajeno al contexto.
- source_word: מִקָּצָה
  english_pob_choice: at the end
  chosen_spanish: en el extremo
  alternatives_spanish:
  - al final
  - en el borde final
  - desde el extremo
  lexicon: HALOT
  rationale: La locución sitúa las lazadas en la parte terminal de la tela; «en el extremo» conserva la ubicación espacial con precisión.
- source_word: חֹבָרֶת / מַחְבֶּרֶת
  english_pob_choice: set joined together
  chosen_spanish: unión
  alternatives_spanish:
  - conjunto unido
  - sección unida
  - ensamble
  lexicon: HALOT
  rationale: La POB inglesa preserva la idea de un grupo de cortinas unidas como una unidad. «Unión» es breve, legible y deja visible la relación de ensamblaje sin forzar un tecnicismo innecesario. Mantengo el mismo término en ambos miembros para reflejar la correspondencia del hebreo.
- source_word: וְכֵן
  english_pob_choice: and so
  chosen_spanish: y así
  alternatives_spanish:
  - e igualmente
  - y de la misma manera
  - asimismo
  lexicon: HALOT
  rationale: La expresión introduce una instrucción paralela; «y así» es natural en español y conserva la simetría del mandato.
- source_word: הַקִּיצוֹנָה
  english_pob_choice: outermost
  chosen_spanish: exterior
  alternatives_spanish:
  - más externa
  - última
  - extrema
  lexicon: HALOT
  rationale: El adjetivo señala la cortina situada hacia afuera o en el borde externo del conjunto. «Exterior» comunica bien esa posición y mantiene el paralelismo con el primer miembro.
- source_word: הַשֵּׁנִית
  english_pob_choice: the second
  chosen_spanish: la segunda
  alternatives_spanish:
  - la otra
  - la segunda unión
  - la otra unión
  lexicon: HALOT
  rationale: Es la segunda de las dos uniones de cortinas; «la segunda» es directa y exacta.
theological_decisions:
- issue: Traducción de תְּכֵלֶת (color/material del tabernáculo) sin sobreinterpretar el matiz cromático
  english_pob_reading: The loops are of blue, with a note that 'blue' or 'violet' are possible; the term denotes the characteristic dyed material used in the tabernacle.
  chosen_spanish_reading: lazadas de azul
  alternative_spanish_readings:
  - lazadas de azul violáceo
  - lazadas de violeta
  - lazadas de azul púrpura
  rationale: No hay base suficiente en este verso para fijar un tono exacto más allá de un color azul antiguo o teñido. «Azul» conserva la lectura sobria de la POB inglesa reciente y evita imponer una precisión no requerida por el texto.
  doctrine_reference: Exodus 26:4; lexical note on תְּכֵלֶת
- issue: Cómo reflejar חֹבָרֶת / מַחְבֶּרֶת, manteniendo la idea de unidades unidas sin borrar la tensión terminológica
  english_pob_reading: set joined together / second set joined together, with a note that 'coupling' is also used.
  chosen_spanish_reading: primera unión / segunda unión
  alternative_spanish_readings:
  - primer conjunto unido / segundo conjunto unido
  - primera unión ensamblada / segunda unión ensamblada
  - primer acoplamiento / segundo acoplamiento
  rationale: El hebreo usa dos sustantivos relacionados para señalar una unidad de cortinas enlazadas. «Unión» es suficientemente amplio para abarcar la idea de conjunto cohesionado sin traducir de manera demasiado técnica ni perder la correspondencia entre ambas mitades del verso.
  doctrine_reference: Exodus 26:4; lexical note on חֹבָרֶת / מַחְבֶּרֶת
- issue: Relación entre 'la one curtain' y 'the outermost curtain' en español
  english_pob_reading: the one curtain ... the outermost curtain
  chosen_spanish_reading: la primera cortina ... la cortina exterior
  alternative_spanish_readings:
  - la una cortina ... la cortina más externa
  - la primera cortina ... la cortina más externa
  - la única cortina ... la cortina exterior
  rationale: El hebreo contrapone una cortina específica del primer conjunto con la cortina exterior del segundo. «Primera» y «exterior» hacen la sintaxis más natural en español y preservan la oposición estructural del versículo.
  doctrine_reference: Exodus 26:4
translation_notes:
  revision_awareness: 'La POB inglesa revisó recientemente la frase de presentación de תְּכֵלֶת eliminando «yarn» y dejando simplemente «blue», y ajustó la colocación de «at the end of» para sonar más natural. Esta versión española sigue esa revisión: evita añadir material textil inexistente y mantiene la localización espacial de manera idiomática.'
  spanish_consistency_notes:
  - He mantenido «unión» como término único para חֹבָרֶת / מַחְבֶּרֶת a fin de reflejar la correspondencia interna del hebreo.
  - He usado «cortina» en todo el verso para conservar consistencia con la unidad textil del contexto.
  - He evitado «SEÑOR» o terminología litúrgica no presente en el versículo.
  - La nota de color queda anclada en el término principal para conservar la alternativa lexical sin interrumpir la lectura.
