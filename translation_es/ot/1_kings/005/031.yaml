translation:
  language: es
  text: Entonces el rey dio la orden, y se extrajeron grandes piedras, piedras valiosas, piedras cortadas[a], para poner los cimientos de la casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «piedras labradas» o «piedras talladas».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, el templo; el hebreo dice «la casa».
    reason: cross_reference
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: Then ... commanded
  chosen_spanish: Entonces ... dio la orden
  alternatives_spanish:
  - Entonces ... mandó
  - Entonces ... ordenó
  lexicon: HALOT
  rationale: El verbo wayyiqtol marca secuencia narrativa; en español, «Entonces» expresa bien la progresión. «Dar la orden» conserva el sentido directivo de צוה con un giro natural y digno en español.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Término directo y estándar para el referente contextual, Salomón.
- source_word: וַיַּסִּעוּ
  english_pob_choice: they quarried
  chosen_spanish: se sacaron
  alternatives_spanish:
  - se extrajeron
  - se arrancaron
  lexicon: HALOT
  rationale: En este contexto de construcción, el verbo expresa la extracción/movimiento de piedras desde la cantera. «Se sacaron» mantiene el sujeto impersonal plural y evita un tecnicismo innecesario; el sentido de cantera queda implícito por el contexto.
- source_word: אֲבָנִים גְּדֹלֹות
  english_pob_choice: great stones
  chosen_spanish: grandes piedras
  alternatives_spanish:
  - piedras grandes
  - piedras enormes
  lexicon: HALOT
  rationale: «Grandes» reproduce el adjetivo sin exagerarlo. «Piedras» es el sustantivo más natural en español para materiales de construcción.
- source_word: אֲבָנִים יְקָרוֹת
  english_pob_choice: costly stones
  chosen_spanish: piedras valiosas
  alternatives_spanish:
  - piedras costosas
  - piedras preciosas
  lexicon: HALOT
  rationale: יָקָר puede indicar valor, precio alto o preciosidad. «Valiosas» comunica calidad y costo sin sugerir gemas; «costosas» es posible, pero puede sonar menos idiomático en este encadenamiento descriptivo.
- source_word: לְיַסֵּד
  english_pob_choice: to lay the foundation
  chosen_spanish: para poner los cimientos
  alternatives_spanish:
  - para echar los cimientos
  - para fundamentar
  lexicon: HALOT
  rationale: En lenguaje de construcción, יסד se expresa naturalmente como «poner los cimientos». Esto preserva la imagen de fundación sin sonar artificial.
- source_word: הַבָּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: La fuente hebrea dice «la casa». Mantener «casa» conserva la dicción original; el contexto permite entender que se trata del templo.
- source_word: אַבְנֵי גָזִית
  english_pob_choice: cut stones
  chosen_spanish: piedras cortadas
  alternatives_spanish:
  - piedras labradas
  - piedras talladas
  - piedras hewn
  lexicon: HALOT
  rationale: גָזִית indica piedra cortada o labrada. «Piedras cortadas» es transparente y fiel; «labradas» o «talladas» también serían posibles, pero «cortadas» sigue de cerca el valor básico del término.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa que reordenó la frase final para tratar «cut stones» como una tercera descripción apposicional de las piedras y no como un instrumento separado. Por eso el español mantiene la serie descriptiva: «grandes piedras, piedras valiosas, piedras cortadas».'
  spanish_consistency_notes:
  - Se preservó «la casa» para reflejar el hebreo, en consonancia con el criterio POB de mantener la dicción original cuando es inteligible.
  - Se evitó «SEÑOR» porque aquí no aparece el nombre divino.
  - Se eligió un registro bíblico moderno y claro, sin arcaísmos innecesarios.
