translation:
  language: es
  text: Miré, pero no había quien ayudara; quedé pasmado[a], pero no había quien me sostuviera. Así mi propio brazo me trajo salvación[b], y mi ira—esa me sostuvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quedé asombrado». El verbo hebreo puede denotar asombro atónito o desolación paralizante.
    reason: lexical_alternative
  - marker: b
    text: O «mi brazo me dio la victoria». El verbo hebreo procede de una raíz que a menudo se traduce «salvar» o «librar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַבִּיט
  english_pob_choice: I looked
  chosen_spanish: Miré
  alternatives_spanish:
  - Miré alrededor
  - Consideré
  lexicon: HALOT
  rationale: נבט en hifil expresa una mirada dirigida o de observación. «Miré» es natural en español y conserva el acto de fijar la vista sin añadir contenido inexistente.
- source_word: עֹזֵר
  english_pob_choice: to help
  chosen_spanish: ayudara
  alternatives_spanish:
  - auxiliara
  - socorriera
  lexicon: HALOT
  rationale: El participio de עזר designa al que ayuda; en español, después de «no había quien», el subjuntivo con infinitivo funciona de manera idiomática y mantiene el sentido de ausencia de auxilio.
- source_word: וְאֶשְׁתּוֹמֵם
  english_pob_choice: I was appalled
  chosen_spanish: quedé pasmado[a]
  alternatives_spanish:
  - quedé asombrado[a]
  - me horrorizé
  lexicon: HALOT
  rationale: שמם en esta forma reflexiva puede denotar asombro atónito o desolación paralizante. «Quedé pasmado[a]» conserva la idea de quedar aturdido por la escena; el marcador de alternancia reconoce que el sujeto implícito en español puede requerir ajuste gramatical según el contexto editorial.
- source_word: סוֹמֵךְ
  english_pob_choice: to support
  chosen_spanish: sostuviera
  alternatives_spanish:
  - apoyara
  - respaldara
  lexicon: HALOT
  rationale: סמך expresa sostener o apoyar. «Sostuviera» es claro en español y preserva el paralelo con «ayudara», sin anticipar el «sostuvo» del final.
- source_word: וַתּוֹשַׁע לִי זְרֹעִי
  english_pob_choice: my own arm brought me salvation
  chosen_spanish: mi propio brazo me trajo salvación
  alternatives_spanish:
  - mi brazo me salvó
  - mi brazo me trajo victoria
  lexicon: HALOT
  rationale: El verbo de ישׁע con לִי comunica que el brazo del hablante efectuó la liberación para él. «Trajo salvación» conserva el vínculo léxico con salvar/liberar y «mi propio brazo» refleja el énfasis posesivo.
- source_word: וַחֲמָתִי הִיא סְמָכָתְנִי
  english_pob_choice: and my wrath—it upheld me
  chosen_spanish: y mi ira—esa me sostuvo
  alternatives_spanish:
  - y mi furor me sostuvo
  - y mi ira me apoyó
  lexicon: HALOT
  rationale: חֵמָה se traduce con «ira» para mantener el registro profético. «Esa» retoma el antecedente femenino sin forzar una construcción marcada en español; «me sostuvo» preserva el eco de סמך con el mismo verbo de apoyo del contexto.
theological_decisions:
- issue: Imagen antropomórfica de autoliberación divina
  english_pob_reading: So my own arm brought me salvation
  chosen_spanish_reading: Así mi propio brazo me trajo salvación
  alternative_spanish_readings:
  - Así mi brazo me salvó
  - Así mi brazo me trajo victoria
  rationale: El texto presenta el brazo como medio de la acción salvadora sin introducir una explicación doctrinal adicional. La formulación española mantiene la imagen y el vínculo con la raíz de salvar/liberar.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Fuerza de la ira como sostén en juicio
  english_pob_reading: and my wrath—it upheld me
  chosen_spanish_reading: y mi ira—esa me sostuvo
  alternative_spanish_readings:
  - y mi furor me sostuvo
  - y mi ira me apoyó
  rationale: 'La traducción conserva la tensión del texto: la ira no se suaviza ni se reinterpreta, sino que aparece como aquello que sostuvo la acción de juicio.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el alto acuerdo del último pase de revisión y mantiene las dos tensiones léxicas documentadas: el valor de שמם como «pasmado/asombrado» y el valor de ישׁע como «salvación/victoria/liberación». No se aplicaron revisiones posteriores al texto de referencia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva el paralelismo de las dos cláusulas negativas con verbos naturales en español.
  - «Brazo» se conserva literalmente para mantener la imagen corporal y teológica del original.
  - «Ira» se usa en lugar de «furor» por claridad y registro bíblico formal, sin perder la fuerza del hebreo.
  - La nota a usa una forma inclusiva de sujeto implícito en español porque el verso no determina género del hablante en la traducción editorial.
