translation:
  language: es
  text: Así partieron del monte de Yahvé camino de tres días[a], y el arca del pacto de Yahvé marchaba delante de ellos camino de tres días[a], para buscar[b] para ellos un lugar de descanso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tres días de camino' en ambas ocurrencias de la frase.
    reason: lexical_alternative
  - marker: b
    text: O 'para explorar' o 'para reconocer' un lugar de descanso para ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: they set out
  chosen_spanish: partieron
  alternatives_spanish:
  - se pusieron en marcha
  - salieron
  lexicon: HALOT
  rationale: נסע en contexto de desplazamiento de campamento expresa iniciar la marcha. 'Partieron' comunica bien ese movimiento narrativo en español sin perder el sentido de salida.
- source_word: מֵהַר יְהוָה
  english_pob_choice: from the mountain of Yahweh
  chosen_spanish: del monte de Yahvé
  alternatives_spanish:
  - del monte de Yahweh
  - del monte de Yahvé
  lexicon: HALOT
  rationale: הַר puede traducirse como 'monte' o 'montaña'; aquí 'monte' conserva un registro bíblico natural en español. Se usa 'Yahvé' por la convención del proyecto para יְהוָה.
- source_word: דֶּרֶךְ שְׁלֹשֶׁת יָמִים
  english_pob_choice: for a journey of three days
  chosen_spanish: por un recorrido de tres días
  alternatives_spanish:
  - por tres días de camino
  - en una jornada de tres días
  lexicon: HALOT
  rationale: La expresión hebrea usa 'camino' como medida de trayecto. 'Recorrido de tres días' conserva la idea de extensión del viaje sin sonar rígidamente literal ni confundirlo con mera duración temporal.
- source_word: וַאֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahweh
  - el arca del pacto de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la cadena constructa de forma directa. 'Pacto' corresponde al valor de בְּרִית en este contexto; 'arca del pacto' es la forma más clara y estable en español bíblico.
- source_word: נֹסֵעַ
  english_pob_choice: set out
  chosen_spanish: iba delante
  alternatives_spanish:
  - partía
  - se ponía en marcha
  lexicon: HALOT
  rationale: El participio en contexto de acompañamiento y avance delante del pueblo expresa acción continua o concurrente. En español, 'iba delante' comunica ese movimiento de la arca sin forzar una repetición mecánica del verbo 'partir'.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - frente a ellos
  lexicon: HALOT
  rationale: La relación espacial es directa. 'Delante de ellos' es natural y fiel al sentido locativo del hebreo.
- source_word: לָתוּר
  english_pob_choice: to seek out
  chosen_spanish: para buscarles
  alternatives_spanish:
  - para explorarles
  - para reconocerles
  lexicon: HALOT
  rationale: תור puede incluir la idea de explorar o buscar. En este contexto el objeto es un lugar apropiado para detenerse; 'buscarles' mantiene el resultado práctico del verbo sin introducir un matiz militar de 'espiar'.
- source_word: מְנוּחָה
  english_pob_choice: a resting place
  chosen_spanish: un lugar de descanso
  alternatives_spanish:
  - un lugar de reposo
  - descanso
  lexicon: HALOT
  rationale: Aquí מְנוּחָה no es solo descanso abstracto, sino un sitio concreto donde detenerse. 'Lugar de descanso' mantiene esa concreción en español.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. Siguiendo la convención del proyecto, se preserva el nombre propio divino como 'Yahvé' en lugar de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Translation of בְּרִית in the fixed phrase 'ark of the covenant'
  english_pob_reading: ark of the covenant of Yahweh
  chosen_spanish_reading: arca del pacto de Yahvé
  alternative_spanish_readings:
  - arca de la alianza de Yahvé
  - arca del pacto del Yahvé
  rationale: En este contexto narrativo y cultual, בְּרִית conserva su valor pactual. 'Pacto' es el equivalente más directo y transparente en español, manteniendo la terminología auditada del proyecto.
  doctrine_reference: Uso contextual de בְּרִית como vínculo pactual, no como simple contrato humano
translation_notes:
  revision_awareness: La redacción española sigue el pasaje hebreo y toma en cuenta la revisión inglesa más reciente, que prefirió un verbo simple y directo para el avance del arca. Por eso la traducción española evita perífrasis excesivas y conserva el paralelismo entre ambas menciones del trayecto de tres días. También mantiene la decisión auditada de traducir el Nombre divino como Yahvé/Yahweh en vez de ocultarlo detrás de un título.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente para יְהוָה, siguiendo la política del proyecto.
  - '''Monte'' se eligió por fluidez bíblica en español, aunque ''montaña'' también sería posible.'
  - Se mantuvo el doble uso de 'por un recorrido de tres días' para reflejar el paralelismo del hebreo.
  - '''Lugar de descanso'' conserva la concreción espacial de מְנוּחָה.'
  - No se empleó 'Cristo' ni otra terminología no pertinente al versículo.
