translation:
  language: es
  text: Y los hirió cadera y muslo[a] con una gran matanza, y descendió y se quedó en la hendidura de la roca de Etam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cadera y muslo», probablemente una expresión idiomática para una derrota devastadora o completa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  english_pob_choice: he struck them
  chosen_spanish: los hirió
  alternatives_spanish:
  - los golpeó
  - los atacó
  - los golpeó y los venció
  lexicon: HALOT
  rationale: נכה expresa golpear, herir o abatir. En este contexto bélico, «hirió» comunica el golpe violento sin añadir la idea de exterminio total que el verbo por sí solo no exige.
- source_word: שׁוֹק עַל יָרֵךְ
  english_pob_choice: hip and thigh
  chosen_spanish: de pierna y muslo
  alternatives_spanish:
  - de cadera y muslo
  - hip y thigh
  - por completo
  lexicon: HALOT
  rationale: Mantengo la imagen corporal concreta del hebreo, pero en español «hip and thigh» literal sonaría antinatural. «Pierna y muslo» preserva la estructura idiomática y deja abierta la fuerza figurada.
- source_word: מַכָּה גְדוֹלָה
  english_pob_choice: with a great slaughter
  chosen_spanish: de gran manera
  alternatives_spanish:
  - con una gran matanza
  - con un gran golpe
  - con una severa derrota
  lexicon: HALOT
  rationale: מכה significa «golpe» o «herida», y en contexto militar puede describir una derrota contundente. Opto por «de gran manera» unido a «los hirió» para transmitir intensidad sin fijar indebidamente el resultado como «matanza» si el español pudiera sonar más interpretativo que el hebreo base.
- source_word: וַיֵּרֶד
  english_pob_choice: he went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - fue hacia abajo
  lexicon: HALOT
  rationale: «Descendió» conserva el valor direccional del verbo hebreo de forma natural y digna en español.
- source_word: וַיֵּשֶׁב
  english_pob_choice: stayed
  chosen_spanish: se quedó
  alternatives_spanish:
  - habitó
  - se sentó
  - permaneció
  lexicon: HALOT
  rationale: En este contexto narrativo, «se quedó» comunica residencia temporaria o permanencia sin la rigidez de «habitó» ni la ambigüedad de «se sentó».
- source_word: בִּסְעִיף
  english_pob_choice: in the cleft
  chosen_spanish: en la hendidura
  alternatives_spanish:
  - en la grieta
  - en el resquicio
  - en la fisura
  lexicon: HALOT
  rationale: El sustantivo designa una división o abertura en la roca. «Hendidura» es un equivalente claro y natural en español.
- source_word: סֶלַע
  english_pob_choice: the rock
  chosen_spanish: de la peña
  alternatives_spanish:
  - de la roca
  - del peñasco
  - del risco
  lexicon: HALOT
  rationale: «Peña» funciona bien en español bíblico para una formación rocosa prominente y preserva la concreción del término sin sonar mecánico.
- source_word: עֵיטָם
  english_pob_choice: Etam
  chosen_spanish: Etam
  alternatives_spanish:
  - Etán
  lexicon: transliteración propia
  rationale: Nombre propio de lugar; se conserva la transliteración tradicional aceptada en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y la audit trail inglesa: conserva la dificultad idiomática de שׁוֹק עַל יָרֵךְ sin suavizarla a un resumen interpretativo, mantiene la secuencia verbal narrativa y respeta el topónimo Etam. También evita añadir una partícula equivalente a «down» después de «hirió», en consonancia con la revisión inglesa que eliminó ese añadido por no estar en la fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto solo cuando el hebreo subyacente lo exige; aquí no aparece.
  - Se evita «SEÑOR» como sustituto y no hay término para traducir en este versículo.
  - «Hirió» conserva mejor la violencia del verbo que una opción más general como «golpeó».
  - La expresión idiomática queda marcada con nota para no borrar la tensión lexical del hebreo.
