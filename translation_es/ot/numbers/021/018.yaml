translation:
  language: es
  text: El pozo que cavaron los príncipes, que los nobles del pueblo excavaron con el cetro[a] del gobernante, con sus bastones. Y desde el desierto fueron a Matana.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con el legislador», si מְחֹקֵק se entiende como una persona en lugar del cetro o bastón del gobernante.
    reason: alternative_reading
  - marker: b
    text: El hebreo dice simplemente «y desde el desierto Matana»; probablemente introduce la siguiente etapa del itinerario, es decir, «y desde el desierto a Matana».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאֵר
  english_pob_choice: the well
  chosen_spanish: el pozo
  alternatives_spanish:
  - un pozo
  - el bien
  lexicon: HALOT
  rationale: En español, «pozo» es el equivalente natural de בְּאֵר en este contexto poético. Se usa con artículo definido porque la línea se refiere al pozo celebrado en el canto, no a uno cualquiera.
- source_word: חֲפָרוּהָ
  english_pob_choice: dug
  chosen_spanish: cavaron
  alternatives_spanish:
  - excavaron
  - abrieron
  lexicon: HALOT
  rationale: El verbo חפר significa «cavar». «Cavaron» conserva el sentido directo y el paralelismo con el segundo verbo de excavación sin volver la frase rígida.
- source_word: שָׂרִים
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - líderes
  - jefes
  - oficiales
  lexicon: HALOT
  rationale: «Príncipes» preserva el registro elevado y la referencia a personajes de alto rango que el hebreo sugiere en este canto.
- source_word: כָּרוּהָ
  english_pob_choice: hollowed out
  chosen_spanish: ahondaron
  alternatives_spanish:
  - cavaron
  - excavaron
  - horadaron
  lexicon: HALOT
  rationale: Para evitar repetir exactamente el mismo verbo que en la primera cola y conservar el paralelismo poético, «ahondaron» comunica bien la acción de profundizar o excavar el pozo.
- source_word: נְדִיבֵי הָעָם
  english_pob_choice: the nobles of the people
  chosen_spanish: los nobles del pueblo
  alternatives_spanish:
  - los nobles entre el pueblo
  - los generosos del pueblo
  lexicon: HALOT
  rationale: La construcción apunta aquí a personas de alto rango; «nobles del pueblo» reproduce de forma natural ese valor social y la relación posesiva del hebreo.
- source_word: בִּמְחֹקֵק
  english_pob_choice: with the ruler’s staff
  chosen_spanish: con el bastón del gobernante
  alternatives_spanish:
  - con el cetro del gobernante
  - con el legislador
  - con el bastón del príncipe
  lexicon: HALOT
  rationale: Sigo la lectura instrumental preferida en el audit trail. «Gobernante» mantiene la idea de autoridad y «bastón» funciona en español como implemento de apoyo o mando; evita introducir innecesariamente la traducción personal «legislador».
- source_word: בְּמִשְׁעֲנֹתָם
  english_pob_choice: with their staffs
  chosen_spanish: con sus bastones
  alternatives_spanish:
  - con sus varas
  - con sus báculos
  - con sus bastones de apoyo
  lexicon: HALOT
  rationale: מִשְׁעֵנָה es un apoyo o bastón. «Bastones» es claro y natural en español, y mantiene la imagen de instrumentos en mano en paralelo con la cola anterior.
- source_word: וּמִמִּדְבָּר מַתָּנָה
  english_pob_choice: And from the wilderness they went to Mattanah
  chosen_spanish: Y desde el desierto fueron a Matana
  alternatives_spanish:
  - Y desde el desierto, a Matana
  - Y desde el desierto llegaron a Matana
  - Y del desierto a Matana
  lexicon: HALOT
  rationale: El hebreo funciona como transición de itinerario; por eso se explicita el movimiento en español. «Desierto» conserva מִדְבָּר y «Matana» se translitera como nombre propio del lugar.
theological_decisions:
- issue: Lectura de בִּמְחֹקֵק
  english_pob_reading: 'instrumental: with the ruler’s staff'
  chosen_spanish_reading: 'instrumental: con el bastón del gobernante'
  alternative_spanish_readings:
  - con el legislador
  - por decreto
  rationale: La cercanía sintáctica con «con sus bastones» favorece un instrumento, no una persona ni un abstracto. La traducción española evita cargar el verso con una figura ajena al contexto poético del desierto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de וּמִמִּדְבָּר מַתָּנָה
  english_pob_reading: 'itinerary transition: and from the wilderness they went to Mattanah'
  chosen_spanish_reading: 'transición de itinerario: y desde el desierto fueron a Matana'
  alternative_spanish_readings:
  - y desde el desierto, Matana
  - y del desierto Matana
  rationale: El contexto inmediato enumera etapas de viaje; por eso la frase se entiende como avance de un lugar a otro. La adición de «fueron a» hace explícita en español la relación direccional que el hebreo deja implícita.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La versión inglesa revisada cerró la línea principal con punto y explicitó el movimiento itinerario; la propuesta española sigue esa decisión y la integra de modo natural con «Y desde el desierto fueron a Matana».
  spanish_consistency_notes:
  - Se mantuvo «Matana» como topónimo transliterado, en consonancia con el tratamiento de nombres propios del recorrido.
  - Se evitó «SEÑOR» o equivalentes de máscara, porque el versículo no contiene el nombre divino.
  - 'Se conservó el paralelismo poético con dos verbos distintos: «cavaron» / «ahondaron».'
