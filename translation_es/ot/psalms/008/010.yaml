translation:
  language: es
  text: ¡Oh Yahvé[a], nuestro Señor, cuán majestuoso es tu nombre en toda la tierra[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». Tradicionalmente se vierte «el SEÑOR»; aquí se translitera como «Yahvé» para conservar el nombre divino.'
    reason: alternative_reading
  - marker: b
    text: 'También: «cuán excelente es tu nombre en toda la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton como nombre propio transliterado en español. «Yahvé» sigue el criterio POB de no ocultar el nombre detrás de un título, y es la forma más estable y reconocible en español bíblico. «SEÑOR» se evita como convención de sustitución.
- source_word: אֲדֹנֵינוּ
  english_pob_choice: our Lord
  chosen_spanish: nuestro Señor
  alternatives_spanish:
  - nuestro amo
  - nuestro maestro
  lexicon: HALOT
  rationale: El sustantivo de autoridad se vierte como título reverencial dirigido a Dios. «Señor» es idiomático en español para esta relación; «amo» o «maestro» suenan menos naturales y no expresan tan bien la dignidad litúrgica del contexto.
- source_word: מָה
  english_pob_choice: how
  chosen_spanish: cuán
  alternatives_spanish:
  - qué
  lexicon: HALOT
  rationale: En exclamación admirativa, «cuán» reproduce mejor el valor retórico de admiración que «qué», y evita una construcción menos natural en español.
- source_word: אַדִּיר
  english_pob_choice: majestic
  chosen_spanish: majestuoso
  alternatives_spanish:
  - excelso
  - mighty
  - glorioso
  lexicon: HALOT
  rationale: «Majestuoso» comunica bien la idea de grandeza, esplendor y dignidad regia. «Excelso» o «glorioso» son posibles, pero pueden desplazar el matiz hacia elevación o gloria abstracta; «majestuoso» es más transparente en español actual.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu renombre
  lexicon: HALOT
  rationale: Se conserva la expresión literal «tu nombre», porque en hebreo el nombre representa identidad revelada, reputación y carácter. No se explicita más en el texto principal para no sobreinterpretar.
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: in all the earth
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - por toda la tierra
  - en toda la creación
  lexicon: HALOT
  rationale: «Tierra» mantiene el alcance cósmico del hebreo sin volverlo localista. «Toda la tierra» es la forma natural en español para expresar el ámbito universal del salmo.
theological_decisions:
- issue: Cómo representar el Tetragrámaton junto al título «nuestro Señor»
  english_pob_reading: O Yahweh, our Lord
  chosen_spanish_reading: ¡Oh Yahvé, nuestro Señor!
  alternative_spanish_readings:
  - ¡Oh Yahvé, nuestro Amo!
  - ¡Oh SEÑOR, nuestro Señor!
  rationale: La secuencia hebrea une el nombre divino con un título de soberanía. Se conserva la distinción entre nombre propio y título, evitando la sustitución por «SEÑOR» y manteniendo el nombre revelado de Dios en la línea principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor exclamativo de מָה en poesía
  english_pob_reading: how majestic is your name
  chosen_spanish_reading: cuán majestuoso es tu nombre
  alternative_spanish_readings:
  - qué majestuoso es tu nombre
  - cómo majestuoso es tu nombre
  rationale: La lectura poética pide admiración más que pregunta. «Cuán» expresa adecuadamente la alabanza y conserva el tono doxológico del verso.
  doctrine_reference: HALOT, uso exclamativo de מָה
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ninguna revisión aplicada; se mantiene la lectura principal del inglés POB, con ajuste natural al español y conservación explícita del nombre divino.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma principal para YHWH, en coherencia con la política del proyecto.
  - Se conserva «Señor» para אֲדֹנֵינוּ como título reverencial, distinguiéndolo del nombre divino.
  - Se emplea «toda la tierra» para reflejar el alcance universal del hebreo.
  - La exclamación se adapta a un español natural sin perder la admiración poética del original.
