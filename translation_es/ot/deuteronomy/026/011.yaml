    text: 'O: «el extranjero residente». El hebreo גֵּר designa a un no israelita que vive entre Israel bajo su protección.'
    reason: lexical_alternative
  revision_rationale: Se corrige «forastero» a «residente extranjero» para reflejar mejor el valor de גֵּר y conservar la alternativa léxica documentada por el POB inglés. Se elimina la nota sobre «te alegrarás» por innecesaria. Se ajusta «a tu casa» a «a tu hogar» para evitar una lectura demasiado física, aunque el sentido sigue siendo el de la unidad doméstica. También se pule la puntuación para mejorar la legibilidad en español sin apartarse del hebreo.
