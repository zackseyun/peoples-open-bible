  text: כִּֽי חֵ֭מָה פֶּן יְסִֽיתְ/ךָ֣ בְ/סָ֑פֶק וְ/רָב כֹּ֝֗פֶר אַל יַטֶּֽ/ךָּ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/job/036/018.yaml
  text: Because wrath—beware lest it entice you into scoffing[c][b][a], and do not let a great ransom turn you aside.
  footnotes:
  - marker: a
    text: Or 'lest it entice you with clapping'; the Hebrew term translated 'scoffing' is difficult and may refer more literally to striking the hands or clapping, possibly as a gesture of derision.
    reason: lexical_alternative
  - marker: b
    text: Or 'and do not let a great ransom sway you.' The Hebrew may be read with 'great' directly qualifying 'ransom.'
    reason: alternative_reading
  - marker: c
    text: '''Ransom'' may also be understood as ''price of atonement'' or, in some contexts, ''bribe.'''
    reason: lexical_alternative
