translation:
  language: es
  text: 'Él también escribió cartas para afrentar[a] a Yahvé, el Dios de Israel, y para hablar contra él, diciendo: «Así como los dioses de las naciones de las tierras no libraron a su pueblo de mi mano, así tampoco el Dios de Ezequías librará a su pueblo de mi mano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «reprochar» o «desafiar»; el verbo hebreo expresa afrenta, insulto o vituperio contra Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּסְפָרִים כָּתַב
  english_pob_choice: He also wrote letters
  chosen_spanish: Él también escribió cartas
  alternatives_spanish:
  - Y escribió cartas
  - También escribió cartas
  - Escribió documentos
  lexicon: HALOT
  rationale: סְפָרִים aquí designa escritos enviados; en este contexto narrativo, 'cartas' comunica con naturalidad el sentido de escritos dirigidos a otros. 'También' reproduce bien el valor continuativo de ו.
- source_word: לְחָרֵף
  english_pob_choice: to mock
  chosen_spanish: afrentar
  alternatives_spanish:
  - para reprochar
  - para desafiar
  - para burlarse de
  lexicon: HALOT
  rationale: El verbo חרף incluye la idea de insultar, afrentar o vituperar. 'Afrentar' conserva mejor la fuerza hostil y reverente del acto contra Yahvé que un simple 'burlarse de'.
- source_word: לַיהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ''Yahvé'' en el texto principal, preservando el nombre pactual y evitando el ocultamiento convencional.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa identifica a Yahvé como el Dios de Israel; 'el Dios de Israel' es la equivalencia directa y natural en español.
- source_word: וְלֵאמֹר עָלָיו
  english_pob_choice: and to speak against him
  chosen_spanish: y para hablar contra él
  alternatives_spanish:
  - y para decir contra él
  - y para hablar acerca de él
  lexicon: HALOT
  rationale: El valor adversativo de עַל en este contexto pide una forma explícita en español. 'Hablar contra él' mantiene la hostilidad del discurso.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: HALOT
  rationale: Introducción estándar de discurso directo; 'diciendo' es fluido y fiel.
- source_word: כֵּאלֹהֵי גּוֹיֵי הָאֲרָצוֹת
  english_pob_choice: Just as the gods of the nations of the lands
  chosen_spanish: Así como los dioses de las naciones de las tierras
  alternatives_spanish:
  - Como los dioses de las naciones de las tierras
  - Así como los dioses de los pueblos de las tierras
  lexicon: HALOT
  rationale: כֵּ introduce comparación, correctamente vertida como 'Así como'. גּוֹיֵי הָאֲרָצוֹת conserva el plural constructo con 'naciones de las tierras', sin suavizar innecesariamente la estructura hebrea.
- source_word: אֲשֶׁר לֹא הִצִּילוּ עַמָּם
  english_pob_choice: have not delivered their people
  chosen_spanish: no libraron a su pueblo
  alternatives_spanish:
  - no rescataron a su pueblo
  - no salvaron a su pueblo
  lexicon: HALOT
  rationale: נצל en hifil tiene sentido de librar/liberar/rescatar. 'Libraron' mantiene el registro bíblico y la idea de sacar del peligro.
- source_word: מִיָּדִי
  english_pob_choice: from my hand
  chosen_spanish: de mi mano
  alternatives_spanish:
  - de mi poder
  - fuera de mi mano
  lexicon: HALOT
  rationale: La expresión idiomática de poder/control se conserva de manera natural en español con 'de mi mano'.
- source_word: כֵּן לֹא יַצִּיל
  english_pob_choice: so ... will not deliver
  chosen_spanish: así tampoco ... librará
  alternatives_spanish:
  - así ... no librará
  - por tanto ... no rescatará
  lexicon: HALOT
  rationale: כֵּן funciona como apódosis comparativa; 'así tampoco' reproduce la estructura retórica y refuerza la negación correlativa.
- source_word: אֱלֹהֵי יְחִזְקִיָּהוּ
  english_pob_choice: the God of Hezekiah
  chosen_spanish: el Dios de Ezequías
  alternatives_spanish:
  - el Dios de Ezequías
  - el Dios de Hizquías
  lexicon: HALOT
  rationale: Se mantiene la forma usual en español bíblico para el nombre propio y la construcción posesiva del hebreo.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su pueblo
  - a su gente
  lexicon: HALOT
  rationale: El sufijo posesivo se refiere al pueblo perteneciente al Dios de Ezequías; 'a su pueblo' es natural y mantiene el paralelismo con la cláusula anterior.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: Se adopta la norma del proyecto para el nombre divino, preservando la identidad covenantal del texto. En esta sección, el uso de 'Yahvé' es directo y no depende de una cita griega o sustitución contextual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de לְחָרֵף en contexto de hostilidad contra Dios
  english_pob_reading: to mock / to reproach / to defy the LORD
  chosen_spanish_reading: afrentar a Yahvé
  alternative_spanish_readings:
  - reprochar a Yahvé
  - desafiar a Yahvé
  - burlarse de Yahvé
  rationale: El verbo expresa insulto y afrenta, no mera burla ligera. 'Afrentar' mantiene la carga de deshonra dirigida contra Yahvé y evita atenuar la intención del rey asirio.
  doctrine_reference: HALOT חרף; contexto narrativo de blasfemia en 2 Crónicas 32
translation_notes:
  revision_awareness: El registro sigue el último pass de revisión con alto acuerdo y sin cambios requeridos en el texto inglés POB. La versión española conserva la estructura comparativa, el paralelismo de 'de mi mano' y la tensión lexical de חרף con una solución que no suaviza la afrenta al nombre divino.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה según la terminología del proyecto.
  - '''Dios'' se mantiene para אֱלֹהים en la cadena constructa ''el Dios de Israel'' y ''el Dios de Ezequías''.'
  - '''Librar'' se usa consistentemente para נצל en ambas cláusulas, reflejando la elección inglesa ''deliver''.'
  - Se conserva la metáfora de poder 'de mi mano' para מִיָּדִי.
  - La cita directa mantiene una puntuación natural en español y respeta el paralelismo del hebreo.
