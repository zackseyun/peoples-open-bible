translation:
  language: es
  text: 'Y la tierra[b] se lamentará, familia por familia[a]: la familia de la casa de David por separado, y sus esposas por separado; la familia de la casa de Natán por separado, y sus esposas por separado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cada familia»; el hebreo repite «familias, familias» para expresar un sentido distributivo.
    reason: lexical_alternative
  - marker: b
    text: O «la tierra»; el hebreo también puede significar «la tierra» o «la tierra entera», aunque aquí el contexto favorece el sentido de la tierra del pueblo.
    reason: alternative_reading
lexical_decisions:
- source_word: וְסָפְדָה
  english_pob_choice: And the land will mourn
  chosen_spanish: hará duelo
  alternatives_spanish:
  - lamentará
  - estará de luto
  lexicon: HALOT
  rationale: ספד expresa lamento o duelo funerario/comunitario. En español, «hacer duelo» comunica bien el sentido de luto nacional sin sonar tan rígido como un calco de «mourn».
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: Aunque el inglés POB optó por «the land», en español «la tierra» conserva la amplitud del hebreo אֶרֶץ y funciona naturalmente en un contexto profético de alcance nacional. «El país» sería más interpretativo.
- source_word: מִשְׁפָּחוֹת מִשְׁפָּחוֹת
  english_pob_choice: each family
  chosen_spanish: familia por familia
  alternatives_spanish:
  - cada familia
  - familia tras familia
  lexicon: HALOT
  rationale: La repetición hebrea tiene fuerza distributiva. «Familia por familia» preserva esa distribución sin sonar extraña; además permite reflejar el énfasis separado del hebreo.
- source_word: לְבָד
  english_pob_choice: by itself / by themselves
  chosen_spanish: por separado
  alternatives_spanish:
  - sola
  - aparte
  lexicon: HALOT
  rationale: לבד subraya separación y distinción. «Por separado» transmite bien esa idea en español y evita que «sola» resulte ambiguo o demasiado coloquial.
- source_word: מִשְׁפַּחַת בֵּית דָּוִיד
  english_pob_choice: the family of the house of David
  chosen_spanish: la familia de la casa de David
  alternatives_spanish:
  - el clan de la casa de David
  - la familia de la casa davídica
  lexicon: HALOT
  rationale: La cadena constructa señala una línea familiar/dinástica. «La familia de la casa de David» preserva la estructura y la referencia dinástica sin reemplazarla por un término más eclesiástico o libre.
- source_word: וּנְשֵׁיהֶם
  english_pob_choice: and their wives
  chosen_spanish: y sus mujeres
  alternatives_spanish:
  - y sus esposas
  - y sus mujeres
  lexicon: HALOT
  rationale: El posesivo y el paralelismo social favorecen una lectura de mujeres vinculadas al grupo familiar. «Mujeres» mantiene mejor la amplitud del hebreo que «esposas», aunque esta última aclara el vínculo marital. Se conserva el mismo término que la estructura del verso permite sin forzar precisión no explicitada.
- source_word: מִשְׁפַּחַת בֵּית נָתָן
  english_pob_choice: the family of the house of Nathan
  chosen_spanish: la familia de la casa de Natán
  alternatives_spanish:
  - el clan de la casa de Natán
  - la familia de la casa de Nathan
  lexicon: HALOT
  rationale: Se translitera el nombre propio como Natán, forma natural en español bíblico, manteniendo la paralelidad con David y el carácter de linaje familiar.
theological_decisions:
- issue: Alcance de הָאָרֶץ en contexto profético
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el mundo
  - el país
  rationale: El contexto enumera familias de Israel/Judá, de modo que el duelo se presenta dentro del ámbito de la tierra del pacto, no como una referencia al planeta entero. «La tierra» conserva la ambigüedad contextual del hebreo sin imponer una lectura universal.
  doctrine_reference: Translation philosophy §1 (primacía del idioma original sobre la tradición de traducción)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail en inglés. Se mantuvieron: (1) el valor distributivo de la repetición de מִשְׁפָּחוֹת; (2) la separación enfática de לבד; (3) la estructura genealógica «la familia de la casa de…». Se eligió «la tierra» frente a «el país» para preservar la amplitud contextual del hebreo y la decisión ya documentada en el POB inglés. No se incorporan variantes textuales adicionales porque el pasaje mostrado no presenta una divergencia significativa en el paquete fuente.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otro sustituto reverencial porque aquí no aparece el Tetragrámaton.
  - Se mantiene «Natán» como forma española del nombre propio.
  - El registro es formal pero fluido, apto para publicación bíblica.
  - La nota al pie refleja la alternativa distributiva preservada por el POB inglés.
