    changes_summary: Replaced 'it marches him off' with 'he is marched off' to avoid the unclear subject in English while preserving the passive sense of the Hebrew. Kept 'security,' 'tent,' and 'king of terrors' as accurate and natural renderings.
translation:
  language: es
  text: Es arrancado de la seguridad de su tienda[a], y es conducido al rey de los terrores[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Es arrancado de su tienda, su seguridad». El hebreo puede indicar ya sea que es removido del lugar seguro de su tienda, o que la tienda misma era su seguridad.'
    reason: alternative_reading
  - marker: b
    text: «El rey de los terrores» es una expresión poética, a menudo entendida como una personificación de la muerte.
    reason: alternative_reading
lexical_decisions:
- source_word: יִנָּתֵ֣ק
  english_pob_choice: is torn
  chosen_spanish: es arrancado
  alternatives_spanish:
  - es desgarrado
  - es arrojado lejos
  - es arrancado de raíz
  lexicon: HALOT
  rationale: El nifal expresa ser separado con violencia o ser arrancado. «Es arrancado» conserva el matiz pasivo y la fuerza del verbo sin introducir una imagen ajena al hebreo.
- source_word: מֵאָהֳל/וֹ
  english_pob_choice: from ... his tent
  chosen_spanish: de su tienda
  alternatives_spanish:
  - desde su tienda
  - de su morada
  - de su campamento
  lexicon: HALOT
  rationale: «Tienda» reproduce la imagen concreta del hebreo y permite leerla también como vivienda o casa, como en el contexto poético de Job.
- source_word: מִבְטַח֑/וֹ
  english_pob_choice: the security
  chosen_spanish: la seguridad
  alternatives_spanish:
  - su confianza
  - su refugio
  - el lugar seguro
  lexicon: HALOT
  rationale: 'El sustantivo puede expresar seguridad, confianza o refugio. Aquí se mantiene «la seguridad» para conservar la ambigüedad: puede ser la seguridad asociada a la tienda o la tienda entendida como su seguridad.'
- source_word: וְתַצְעִדֵ֗/הוּ
  english_pob_choice: he is marched off
  chosen_spanish: es conducido
  alternatives_spanish:
  - es llevado
  - es guiado
  - es marchado
  lexicon: HALOT
  rationale: El piel/hiphil causativo sugiere hacer avanzar o hacer ir. «Es conducido» comunica el movimiento forzado en español natural sin especificar indebidamente el sujeto implícito.
- source_word: לְמֶ֣לֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - hacia el rey
  - ante el rey
  lexicon: HALOT
  rationale: La preposición marca dirección; «al rey» es la forma más directa y fluida en español.
- source_word: בַּלָּהוֹת
  english_pob_choice: of terrors
  chosen_spanish: de los terrores
  alternatives_spanish:
  - de los horrores
  - de los espantos
  - de los pavorosos
  lexicon: HALOT
  rationale: El plural intensifica el campo de lo terrible. «Terrores» es una equivalencia directa y solemne, y conserva la figura poética del título.
theological_decisions:
- issue: Identidad de «el rey de los terrores»
  english_pob_reading: Retain the poetic expression without identifying it explicitly; likely a personification of death or the realm of terror.
  chosen_spanish_reading: Conservar la expresión poética sin identificar explícitamente al referente; probablemente una personificación de la muerte o del ámbito del terror.
  alternative_spanish_readings:
  - la muerte personificada
  - el sepulcro/Seol
  - un soberano demoníaco de los terrores
  rationale: El hebreo no define de manera explícita el referente. Mantener el título evita resolver una tensión teológica y poética que el texto deja abierta.
  doctrine_reference: Preservar la tensión teológica y la ambigüedad poética del texto.
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo con alta concordancia y refleja la revisión del audit trail inglés: se mantiene la pasiva forzada, la imagen concreta de «tienda» y la expresión poética «rey de los terrores» sin explicitar indebidamente el referente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; en este versículo no aparece el tetragrámaton.
  - «Tienda» conserva la metáfora semítica de vivienda/seguridad.
  - «Terrores» mantiene el plural intensivo del hebreo y la ambigüedad interpretativa.
  - La pasiva española («es arrancado», «es conducido») preserva el sujeto implícito del hebreo sin añadir agente.
