translation:
  language: es
  text: Por la bendición de los rectos una ciudad se engrandece[a], pero por la boca de los malvados[b] es derribada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por la bendición de los rectos una ciudad se levanta».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «por la boca de los malvados»; la expresión destaca el poder destructivo del habla perversa.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּ/בִרְכַּת
  english_pob_choice: By the blessing of
  chosen_spanish: Por la bendición de
  alternatives_spanish:
  - Por medio de la bendición de
  - Mediante la bendición de
  lexicon: HALOT
  rationale: El בְ indica medio o instrumento aquí; en español, «por» expresa con naturalidad ese valor causal/instrumental sin perder la concisión proverbial. «Bendición» conserva el sustantivo de bendecir sin añadir matices no presentes.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los justos
  - los íntegros
  lexicon: HALOT
  rationale: יָׁשָׁר describe a quienes son moralmente rectos o ישרים; «rectos» comunica la imagen de rectitud ética de forma clara y breve. «Justos» sería posible, pero puede acercarse demasiado a un matiz forense que aquí no domina.
- source_word: תָּר֣וּם
  english_pob_choice: is exalted
  chosen_spanish: es exaltada
  alternatives_spanish:
  - se levanta
  - sube
  lexicon: HALOT
  rationale: El verbo רוּם en qal con sujeto femenino singular («ciudad») admite la idea de ser alzada/exaltada. «Es exaltada» mantiene el paralelismo formal con el hebreo y el valor de elevación/prosperidad que el POB inglés también preserva.
- source_word: קָ֑רֶת
  english_pob_choice: a city
  chosen_spanish: una ciudad
  alternatives_spanish:
  - una urbe
  - un poblado
  lexicon: HALOT
  rationale: קָרֶת denota una ciudad o centro urbano. «Ciudad» es el equivalente directo, amplio y natural para el lector hispanohablante.
- source_word: וּ/בְ/פִ֥י
  english_pob_choice: but by the mouth of
  chosen_spanish: pero por la boca de
  alternatives_spanish:
  - pero por la palabra de
  - pero por el hablar de
  lexicon: HALOT
  rationale: La partícula conjuntiva introduce contraste; «pero» lo expresa con claridad. Mantener «boca» conserva la imagen hebrea y el paralelismo con el texto fuente, sin sustituirla por una abstracción que diluya la fuerza proverbial.
- source_word: רְשָׁעִ֗ים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  lexicon: HALOT
  rationale: רָשָׁע en la literatura sapiencial designa a quienes actúan con maldad moral. «Malvados» es claro en español y evita la posible carga eclesiástica de «impíos»; conserva el contraste ético con «rectos».
- source_word: תֵּהָרֵֽס
  english_pob_choice: it is torn down
  chosen_spanish: es derribada
  alternatives_spanish:
  - es destruida
  - es demolida
  lexicon: HALOT
  rationale: El nifal de הרס expresa ser derribado/arruinado. «Es derribada» reproduce bien la imagen física de desmantelamiento y funciona naturalmente con «ciudad»; «destruida» es más general, pero menos imagística.
theological_decisions:
- issue: El valor de la bendición de los rectos como medio de estabilidad urbana
  english_pob_reading: By the blessing of the upright a city is exalted.
  chosen_spanish_reading: Por la bendición de los rectos una ciudad es exaltada.
  alternative_spanish_readings:
  - Por la bendición de los rectos una ciudad se levanta.
  - Mediante la bendición de los rectos una ciudad prospera.
  rationale: La línea sapiencial presenta la bendición de los rectos como instrumento real de bien público. «Es exaltada» conserva la elevación/promo ción de la ciudad sin convertirla en una paráfrasis socioeconómica más amplia que el hebreo no exige.
  doctrine_reference: Sabiduría bíblica; ética comunitaria en Proverbios
- issue: El poder destructivo del habla de los malvados
  english_pob_reading: Hebrew 'by the mouth of the wicked'; the phrase points to the destructive power of wicked speech.
  chosen_spanish_reading: pero por la boca de los malvados es derribada.
  alternative_spanish_readings:
  - pero por el habla de los malvados es derribada.
  - pero por las palabras de los malvados es derribada.
  rationale: Se conserva «boca» para no perder la metonimia hebrea, donde la boca representa el habla que actúa como instrumento de ruina. Así se mantiene la tensión entre el poder benéfico de la bendición y el poder dañino de la palabra perversa.
  doctrine_reference: Antropología moral bíblica; uso de la lengua en la literatura sapiencial
translation_notes:
  revision_awareness: Se siguió la lectura aprobada del POB inglés sin cambios sustanciales, conservando el paralelismo antitético, la metáfora de la «boca» y la opción léxica de elevación/derribo para la ciudad. No se detectaron revisiones aplicadas en el audit trail reciente.
  spanish_consistency_notes:
  - Se usó «rectos» para יְשָׁרִים en coherencia con el valor ético de ישר en literatura sapiencial.
  - Se evitó «SEÑOR» o sustituciones litúrgicas porque no hay Tetragrámaton en este versículo.
  - Se mantuvo «boca» en lugar de «habla» o «palabras» para reflejar la imagen hebrea documentada por el POB inglés.
  - «Derribada» conserva el sentido pasivo de תֵּהָרֵס y mantiene el contraste con «exaltada».
