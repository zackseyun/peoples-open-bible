theological_decisions:
- issue: Rendering ᾅδης
  chosen_reading: Hades
  alternative_readings:
  - the grave
  - hell
  - the underworld
  rationale: The Greek specifically uses ᾅδης. In this Second Temple Jewish testamentary setting, 'Hades' preserves the source-world imagery better than the more doctrinally loaded 'hell.'
  doctrine_reference: 'DOCTRINE.md §Translation philosophy: original-language primacy over translation tradition'
- issue: Moral-theological link between sexual immorality and idolatry
  chosen_reading: bringing it near to idols
  alternative_readings:
  - leading it into idolatry
  - making it serve idols
  rationale: The Greek expresses proximity rather than a fully developed doctrinal equation. The translation preserves the connection without overstating it.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy: preserve theological tension rather than resolve it'
- issue: Difficult phrase πρόςκομμα τῷ Βελίαρ
  chosen_reading: a stumbling block to Beliar
  alternative_readings:
  - an offense before Beliar
  - a cause of stumbling through Beliar
  rationale: The phrase is textually and semantically awkward. Rather than smoothing it into an interpretive paraphrase, the draft keeps the literal sense and flags it in a note.
  doctrine_reference: PHILOSOPHY.md §transparent reasoning and auditable decisions
