translation:
  language: es
  text: 'Pero el pueblo se negó a escuchar la voz de Samuel[a], y dijo: «No, sino que habrá un rey sobre nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea «escuchar la voz de» puede implicar también obedecer o hacer caso; aquí se conserva la imagen literal y la posible fuerza de obediencia queda implícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמָאֲנוּ
  english_pob_choice: refused
  chosen_spanish: se negó
  alternatives_spanish:
  - rehusó
  - se rehusó
  - se negó a
  lexicon: HALOT
  rationale: מאן expresa rechazo o negativa voluntaria. «Se negó» comunica bien la resistencia activa en un español natural y digno, sin perder el tono narrativo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo israelita
  lexicon: HALOT
  rationale: עָם aquí designa al colectivo de Israel. «El pueblo» es la forma más natural y reverente en español bíblico contemporáneo.
- source_word: לִשְׁמֹעַ בְּקוֹל
  english_pob_choice: to listen to the voice of
  chosen_spanish: escuchar la voz de
  alternatives_spanish:
  - obedecer a
  - hacer caso a
  lexicon: HALOT
  rationale: La idiomática hebrea שמע בקול puede implicar oír con obediencia. Se conserva la imagen de «la voz de Samuel» para no borrar la metáfora; la posible fuerza de obedecer queda implícita, como en el POB inglés.
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  lexicon: Nombre propio
  rationale: Nombre propio estándar en español bíblico.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: and they said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y respondieron
  lexicon: HALOT
  rationale: אָמַר es el verbo ordinario de decir. «Y dijeron» reproduce con naturalidad la secuencia narrativa.
- source_word: לֹא
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - ¡No!
  lexicon: HALOT
  rationale: La negación aislada funciona como rechazo enfático; «No» conserva esa fuerza de manera breve e idiomática.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - sino
  - más bien
  lexicon: HALOT
  rationale: La construcción introduce una oposición fuerte tras la negativa. «Sino que» es una equivalencia natural en español para ese contraste, sin suavizarlo.
- source_word: מֶלֶךְ יִהְיֶה עָלֵינוּ
  english_pob_choice: there shall be a king over us
  chosen_spanish: habrá un rey sobre nosotros
  alternatives_spanish:
  - tendrá que haber un rey sobre nosotros
  - será rey sobre nosotros
  lexicon: HALOT
  rationale: El hebreo expresa insistencia en la existencia y el dominio real. «Habrá un rey sobre nosotros» mantiene la fuerza futura/assertiva y la relación de autoridad de «sobre nosotros».
translation_notes:
  revision_awareness: Se incorporó la revisión del POB inglés que prefirió «the voice of Samuel» frente a una forma posesiva más libre; en español se siguió la misma línea literal con «la voz de Samuel».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece el Nombre divino en el texto base.
  - Se preservó la metáfora hebrea «voz de Samuel» en lugar de sustituirla por un mero «obedecer», siguiendo la auditoría inglesa.
  - El contraste final se resolvió con «sino que» para reflejar el fuerte rechazo de la negativa hebrea.
