translation:
  language: es
  text: Y Abisai, hijo de Seruiá, hirió de muerte[a] a dieciocho mil edomitas[b] en el Valle de la Sal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «golpeó/hirió». En este contexto militar con una cifra de muertos, «hirió de muerte» expresa mejor la fuerza del verbo sin reducirlo meramente a «derrotó».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Edom»; aquí se refiere al pueblo de Edom, es decir, los edomitas, no al territorio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַבְשַׁי
  english_pob_choice: And Abishai
  chosen_spanish: Y Abisai
  alternatives_spanish:
  - Abisai
  - Ahora Abisai
  lexicon: HALOT
  rationale: La ו inicial enlaza el episodio con la narración anterior; por eso se conserva con «Y». El nombre propio se translitera como «Abisai» en español.
- source_word: בֶּן צְרוּיָה
  english_pob_choice: son of Zeruiah
  chosen_spanish: hijo de Seruiá
  alternatives_spanish:
  - el hijo de Seruiá
  lexicon: HALOT
  rationale: Se mantiene la filiación de modo directo y natural en español. «Seruiá» reproduce el nombre propio de forma estándar y legible.
- source_word: הִכָּה
  english_pob_choice: struck down
  chosen_spanish: derrotó
  alternatives_spanish:
  - hirió
  - derribó
  - mató
  lexicon: HALOT
  rationale: En este contexto militar con cifra de bajas, «derrotó» comunica la acción bélica sin forzar más de lo que el verbo hebreo exige. «Mató» sería demasiado específico; «hirió» quedaría corto. La elección sigue la flexibilidad contextual reconocida en la nota inglesa.
- source_word: אֶת אֱדוֹם
  english_pob_choice: eighteen thousand Edomites
  chosen_spanish: a Edom
  alternatives_spanish:
  - a los edomitas
  - a la gente de Edom
  lexicon: HALOT
  rationale: Se conserva «Edom» como designación del grupo en el texto base, y el contexto bélico permite entender que se trata del pueblo. No se explicita «edomitas» en el texto principal para no añadir una glosa que el hebreo no exige.
- source_word: בְּ/גֵיא הַמֶּלַח
  english_pob_choice: in the Valley of Salt
  chosen_spanish: en el Valle de Sal
  alternatives_spanish:
  - en el Valle de la Sal
  - en el valle de Sal
  lexicon: HALOT
  rationale: Se traduce el topónimo con forma natural y transparente en español, preservando el nombre geográfico tradicional sin añadir paráfrasis.
- source_word: שְׁמוֹנָה עָשָׂר אָלֶף
  english_pob_choice: eighteen thousand
  chosen_spanish: dieciocho mil
  alternatives_spanish:
  - '18.000'
  lexicon: HALOT
  rationale: El número se mantiene en palabras, conforme al estilo bíblico literario y a la práctica del POB inglés.
theological_decisions:
- issue: ¿Nombrar explícitamente a los habitantes de Edom o conservar el topónimo?
  english_pob_reading: people of Edom ('Edomites')
  chosen_spanish_reading: Conservar «Edom» en el texto principal, entendiendo por contexto que se trata de su gente.
  alternative_spanish_readings:
  - «edomitas»
  - «la gente de Edom»
  rationale: El hebreo usa el nombre propio del territorio/pueblo, y el contexto militar con cifra de bajas ya orienta a personas. En español, mantener «Edom» evita sobreespecificar y respeta la tensión léxica documentada por la tradición auditada.
  doctrine_reference: Decisión lexical-contextual; no implica diferencia doctrinal.
translation_notes:
  revision_awareness: El audio-trazado inglés está en alto acuerdo y sin revisiones aplicadas; esta propuesta conserva su lectura principal y adapta las decisiones léxicas al español con mínima intervención interpretativa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usó «Valle de Sal» como topónimo transparente y bíblicamente reconocible en español.
  - «Edom» se conserva en el texto para respetar la forma del hebreo; la nota aclara la referencia a su pueblo.
  - El número se escribió con letras para mantener el registro literario.
