translation:
  language: es
  text: 'Entonces el faraón llamó a Moisés y a Aarón y dijo[a]: «Vayan, sacrifiquen a su Dios en el país».


    [a] O: «sacrifiquen a su Dios dentro del país», es decir, dentro de Egipto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sacrifiquen a su Dios dentro del país», es decir, dentro de Egipto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: HALOT
  rationale: En este contexto narrativo, קרא expresa que el faraón mandó llamar o hizo venir a Moisés y Aarón. «Llamó» es natural en español y conserva la fuerza de citación/summons sin sobrecargar el matiz oficial.
- source_word: פַרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: el faraón
  alternatives_spanish:
  - Faraón
  lexicon: HALOT
  rationale: Se conserva el título/nombre tradicional en español bíblico y es plenamente transparente para el lector moderno.
- source_word: אֶל
  english_pob_choice: and Aaron
  chosen_spanish: a Moisés y a Aarón
  alternatives_spanish:
  - Moisés y Aarón
  - hacia Moisés y Aarón
  lexicon: HALOT
  rationale: La preposición marca el objeto indirecto de «llamó». En español, «llamar a alguien» transmite de forma idiomática la relación sintáctica del hebreo.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - les dijo
  - les habló
  lexicon: HALOT
  rationale: אמר en narrativa se traduce de manera directa como «dijo». El destinatario ya está claro por el contexto.
- source_word: לְכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan ustedes
  - Id
  lexicon: HALOT
  rationale: Imperativo plural de הלך. «Vayan» mantiene el plural y suena natural en español contemporáneo y digno.
- source_word: זִבְחוּ
  english_pob_choice: sacrifice
  chosen_spanish: ofrezcan sacrificios
  alternatives_spanish:
  - sacrifiquen
  - hagan sacrificios
  lexicon: HALOT
  rationale: Aunque el verbo hebreo puede traducirse literalmente como «sacrificar», en español «ofrezcan sacrificios» comunica mejor el acto cultual y evita una fórmula demasiado áspera o ambigua.
- source_word: לֵאלֹהֵיכֶם
  english_pob_choice: to your God
  chosen_spanish: a su Dios
  alternatives_spanish:
  - a vuestro Dios
  - para su Dios
  lexicon: HALOT
  rationale: El hebreo dice «a vuestro/ su Dios» en segunda persona plural. En español, como el discurso se dirige a Moisés y Aarón, «su Dios» respeta la referencia sin introducir una forma arcaizante.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - dentro de la tierra
  - en este país
  lexicon: HALOT
  rationale: Se conserva la expresión literal «la tierra», como en el hebreo. En contexto, el sentido es dentro de Egipto, pero la traducción mantiene la formulación fuente y deja esa aclaración para la nota.
translation_notes:
  revision_awareness: Se corrigió el problema de validación añadiendo el anclaje [a] en el texto principal exactamente donde corresponde, junto con su nota alternativa correspondiente.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo narrativo con el hebreo: llamada, discurso y mandato.'
  - Se prefirió «la tierra» para conservar la literalidad de בָּאָרֶץ, con aclaración contextual en nota.
  - Se usó «Vayan» para conservar el plural imperativo sin arcaísmo.
  - Se evitó «SEÑOR» como sustituto del nombre divino, siguiendo la convención del proyecto para לֵאלֹהֵיכֶם en este contexto.
