translation:
  language: es
  text: Y aconteció que, cuando nuestros enemigos oyeron que se había sabido entre nosotros[a], y que Dios había frustrado su plan[b], todos nosotros volvimos a la muralla, cada hombre a su trabajo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que había llegado a nuestro conocimiento». El hebreo dice literalmente: «que se había hecho conocido para nosotros» o «que había llegado a ser conocido para nosotros».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «había desbaratado su consejo».'
    reason: lexical_alternative
  - marker: c
    text: 'Expresión distributiva hebrea: «cada hombre a su trabajo», es decir, cada trabajador individualmente.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce un nuevo desarrollo; «aconteció» conserva ese marcador discursivo con registro digno y natural en español bíblico contemporáneo.
- source_word: כַּאֲשֶׁר
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al
  - mientras
  lexicon: HALOT
  rationale: Aquí introduce la circunstancia temporal en que ocurrió lo siguiente; «cuando» es la equivalencia más clara y natural.
- source_word: אוֹיְבֵינוּ
  english_pob_choice: our enemies
  chosen_spanish: nuestros enemigos
  alternatives_spanish:
  - los que nos eran hostiles
  lexicon: HALOT
  rationale: El sustantivo אויב con sufijo de 1cp se traduce de modo directo como «enemigos»; el poseedor plural «nuestros» preserva la relación del texto.
- source_word: כִּי נוֹדַע לָנוּ
  english_pob_choice: that it had become known to us
  chosen_spanish: que se nos había hecho saber
  alternatives_spanish:
  - que había llegado a nuestro conocimiento
  - que lo habíamos sabido
  lexicon: HALOT
  rationale: 'El nifal de ידע expresa passividad: «llegó a ser conocido / se supo». En español, «se nos había hecho saber» mantiene la pasiva de sentido y evita convertirlo sin más en una activa interpretativa.'
- source_word: וַיָּפֶר
  english_pob_choice: had frustrated
  chosen_spanish: había frustrado
  alternatives_spanish:
  - había frustrado
  - había desbaratado
  - había anulado
  lexicon: HALOT
  rationale: הפר en este contexto refiere a frustrar o desbaratar un plan. «Había frustrado» sigue de cerca la lectura del POB inglés y su valor idiomático.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El artículo hebreo señala al Dios de Israel; en español, el nombre común «Dios» es la forma natural y auditivamente clara en este contexto.
- source_word: עֲצָתָם
  english_pob_choice: their plan
  chosen_spanish: su plan
  alternatives_spanish:
  - su consejo
  - su estrategia
  lexicon: HALOT
  rationale: עצה puede ser «consejo», «plan» o «propósito». Dado el contexto oposicional y militar, «plan» es claro sin añadir una carga pejorativa excesiva.
- source_word: וְנָשׁוּב
  english_pob_choice: we all returned
  chosen_spanish: volvimos
  alternatives_spanish:
  - regresamos
  - dimos la vuelta
  lexicon: HALOT
  rationale: שוב significa volver/retornar. En español, el verbo simple «volver» expresa bien el movimiento de regreso sin recargar la frase.
- source_word: הַחוֹמָה
  english_pob_choice: the wall
  chosen_spanish: la muralla
  alternatives_spanish:
  - el muro
  - la pared
  lexicon: HALOT
  rationale: Aunque el inglés POB dice «wall», en el contexto de Jerusalén en reconstrucción, «muralla» comunica mejor en español la obra defensiva urbana.
- source_word: אִישׁ אֶל מְלַאכְתּוֹ
  english_pob_choice: each man to his work
  chosen_spanish: cada uno a su trabajo
  alternatives_spanish:
  - cada hombre a su trabajo
  - cada cual a su labor
  lexicon: HALOT
  rationale: La expresión hebrea es distributiva. En español, «cada uno» preserva el sentido colectivo sin depender de una forma marcadamente masculina, y «trabajo» refleja de modo natural מלאכה.
theological_decisions:
- issue: Atribución directa a Dios del fracaso del plan enemigo
  english_pob_reading: God had frustrated their plan.
  chosen_spanish_reading: Dios había frustrado su plan.
  alternative_spanish_readings:
  - Dios había desbaratado su plan
  - Dios había anulado su consejo
  rationale: El hebreo atribuye explícitamente la frustración del proyecto enemigo a Dios; la traducción conserva esa causalidad teológica sin suavizarla en mera coincidencia providencial.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Expresión distributiva masculina אִישׁ
  english_pob_reading: each man to his work
  chosen_spanish_reading: cada uno a su trabajo
  alternative_spanish_readings:
  - cada hombre a su trabajo
  - cada persona a su trabajo
  rationale: Aunque el hebreo usa el singular masculino distributivo, en español la fórmula «cada uno» comunica el mismo reparto individual de la labor y evita una rigidez innecesaria; la referencia sigue siendo a los trabajadores individualmente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El borrador sigue el estado revisado de alta concordancia del POB inglés (0.98), sin cambios sustantivos respecto de la lectura auditada. Se preservan las tres tensiones relevantes: la pasiva de «se nos había hecho saber», la fuerza de הפר como frustración del plan, y la expresión distributiva final.'
  spanish_consistency_notes:
  - Se mantiene «Dios» en lugar de una sustitución reverencial por «Señor», conforme al texto fuente.
  - Se usa «muralla» por claridad contextual en Jerusalén; no altera el referente del hebreo.
  - La nota final conserva la tensión distributiva del hebreo sin neutralizarla por completo, pero la redacción principal prioriza fluidez natural en español.
