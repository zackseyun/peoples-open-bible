revisions:
- from: 'Entonces Balac le dijo: «Por favor, ven conmigo a otro lugar, desde donde lo puedas ver. Solo verás[a] sus alrededores, y no lo verás todo; y desde allí maldícemelo».'
  to: 'Entonces Balac le dijo: «Por favor, ven conmigo a otro lugar, desde donde lo puedas ver. Solo verás[a] el extremo de él, y no lo verás todo[b]; entonces maldícelo por mí desde allí».'
  rationale: 'Se reemplaza «sus alrededores» por «el extremo de él» para mantener el referente correcto: una parte periférica de Israel, no lo que está alrededor de Israel. Se añade la nota sobre el singular colectivo porque forma parte de la justificación documentada del POB. También se ajusta el mandato final a «entonces maldícelo por mí desde allí» para reflejar con mayor claridad la secuencia y la sintaxis del hebreo en español natural.'
