base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/024/012.yaml
  text: And the king and Jehoiada gave it to those doing the work of the service of the house of Yahweh[a], and they hired stonecutters and craftsmen to restore the house of Yahweh[c][b], and also craftsmen in iron and bronze to strengthen the house of Yahweh.
  footnotes:
  - marker: a
    text: Or 'delivered it' or 'handed it over'; the pronoun refers to the collected money in context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of the LORD'; that is, the temple.
    reason: lexical_alternative
  - marker: c
    text: Or 'smiths in iron and bronze.'
    reason: lexical_alternative
