base_translation:
  language: en
  yaml_path: translation/ot/exodus/014/002.yaml
  text: Speak to the sons of Israel[a], that they turn back and camp before Pi-hahiroth, between Migdol and the sea. Before Baal-zephon, opposite it[c][b], you shall camp by the sea.
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Pi-hahiroth, Migdol, and Baal-zephon are place names and are therefore transliterated rather than translated.
    reason: cultural_note
  - marker: c
    text: Or 'facing it.' The pronoun in 'opposite it' most likely refers to Baal-zephon.
    reason: lexical_alternative
