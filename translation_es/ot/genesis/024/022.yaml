translation:
  language: es
  text: Y cuando los camellos terminaron de beber[a], el hombre tomó un anillo de oro que pesaba un becá[b], y dos brazaletes para sus manos, que pesaban diez siclos de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente 'un anillo de oro para la nariz'; el término hebreo puede referirse a un anillo llevado en la nariz o en la oreja.
    reason: lexical_alternative
  - marker: b
    text: Un becá era una unidad de peso equivalente a medio siclo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר כִּלּוּ
  english_pob_choice: when ... had finished
  chosen_spanish: y cuando ... terminaron de beber
  alternatives_spanish:
  - y después de que ... terminaron de beber
  - y apenas ... terminaron de beber
  lexicon: HALOT
  rationale: La construcción marca el momento en que ocurre la acción siguiente. En español, 'y cuando' conserva la secuencia narrativa sin forzar una lectura más inmediata de la que exige el hebreo.
- source_word: הַגְּמַלִּים לִשְׁתּוֹת
  english_pob_choice: the camels had finished drinking
  chosen_spanish: los camellos terminaron de beber
  alternatives_spanish:
  - los camellos habían acabado de beber
  - los camellos concluyeron de beber
  lexicon: HALOT
  rationale: El hebreo expresa completitud de la acción de beber. 'Terminaron de beber' es natural en español y mantiene ese valor perfectivo.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el siervo
  - el criado
  lexicon: HALOT
  rationale: El texto hebreo dice simplemente 'el hombre'. Aunque el contexto inmediato identifica al siervo de Abraham, aquí no aparece un sustantivo para 'siervo', por lo que se conserva la designación literal.
- source_word: נֶזֶם זָהָב
  english_pob_choice: a gold ring
  chosen_spanish: un anillo de oro
  alternatives_spanish:
  - un aro de oro
  - un anillo de oro para la nariz
  lexicon: HALOT
  rationale: נזם puede referirse a un adorno circular para la nariz o la oreja. En el texto principal se mantiene la amplitud léxica con 'anillo'; la especificación tradicional se reserva para la nota textual.
- source_word: בֶּקַע מִשְׁקָלוֹ
  english_pob_choice: weighing a beka
  chosen_spanish: que pesaba un becá
  alternatives_spanish:
  - de peso de un becá
  - que tenía el peso de un becá
  lexicon: HALOT
  rationale: בקע es una unidad antigua de peso. Se translitera 'becá' para preservar la medida sin sustituirla por una equivalencia modernizada en el texto principal.
- source_word: וּשְׁנֵי צְמִידִים
  english_pob_choice: and two bracelets
  chosen_spanish: y dos brazaletes
  alternatives_spanish:
  - y dos pulseras
  - y dos ajorcas
  lexicon: HALOT
  rationale: צמידים son adornos para el brazo o la muñeca. 'Brazaletes' comunica el objeto en español bíblico actual sin perder precisión.
- source_word: עַל יָדֶיהָ
  english_pob_choice: for her hands
  chosen_spanish: para sus manos
  alternatives_spanish:
  - sobre sus manos
  - en sus manos
  - para sus muñecas
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente 'sobre sus manos'. En español, 'para sus manos' mantiene la referencia corporal y resulta más natural con el verbo implícito de destino del regalo, sin adelantar una identificación anatómica más precisa que el hebreo no explicita.
- source_word: עֲשָׂרָה זָהָב מִשְׁקָלָם
  english_pob_choice: weighing ten shekels of gold
  chosen_spanish: de diez siclos de oro de peso
  alternatives_spanish:
  - que pesaban diez siclos de oro
  - con peso de diez siclos de oro
  lexicon: HALOT
  rationale: La frase hebrea da el peso de los brazaletes. Se usa 'siclos' como equivalente castellano corriente de shekel en contexto bíblico, y se mantiene el orden 'de oro de peso' para reflejar la construcción nominal del original.
translation_notes:
  revision_awareness: 'Se mantiene el acuerdo alto del pasaje con la revisión más reciente: no se introducen cambios sustantivos respecto al sentido del hebreo ni de la POB inglesa; solo se ajusta la expresión al español natural y se conservan las dos alternativas léxicas documentadas en nota.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como convención del proyecto solo cuando el hebreo lo requiere; en este versículo no aparece el nombre divino.
  - '''anillo'' mantiene la amplitud de נזם, con la alternativa de ''anillo para la nariz'' en nota.'
  - '''becá'' y ''siclos'' se usan como unidades antiguas transliterada/equivalente tradicional para mantener transparencia y legibilidad.'
  - '''brazaletes'' evita ''pulseras'' por ser más amplio y acorde al registro bíblico.'
