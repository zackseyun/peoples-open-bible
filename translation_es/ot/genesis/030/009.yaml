    text: O 'había cesado de dar a luz'; el hebreo literalmente dice 'había dejado de dar a luz' o 'se había detenido de dar a luz'.
    reason: lexical_alternative
  - marker: b
    text: O 'su sierva' o 'su criada'.
    reason: lexical_alternative
  revision_rationale: 'La revisión es pequeña pero importante: ''su esclava'' preserva mejor el estatus subordinado de שִׁפְחָה conforme a la política léxica del proyecto, sin alterar el sentido narrativo. También se suaviza la nota literal para que el español sea más natural y editorialmente limpio.'
