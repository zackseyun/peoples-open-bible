review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura y el sentido básico del hebreo: «Mi Dios» mantiene correctamente אֱלֹהַי; «los rechazará» refleja bien יִמְאָסֵם; «porque no le han escuchado» preserva adecuadamente לֹא שָׁמְעוּ לוֹ con la nota alternativa de obediencia; y «entre las naciones» representa bien בַּגּוֹיִם. La principal desviación está en «vagabundos» para נֹדְדִים, que en español suele añadir connotaciones sociales/morales de mendicidad o indigencia no exigidas por el hebreo, mientras que el contexto apunta a errancia y dispersión/exilio.'
  spanish_quality_summary: El español es claro y legible, pero «serán vagabundos» suena menos digno y más cargado de connotaciones que el registro buscado para una Biblia de lectura eclesial. «Errantes» o «peregrinos errantes» serían más fieles al matiz de desplazamiento sin hogar; «errantes» es la opción más directa y natural aquí.
  glossary_alignment: 'No hay conflictos con los términos base del proyecto. «Mi Dios», «Dios» y la distinción escuchar/obedecer están bien manejadas. La revisión propuesta afecta solo נֹדְדִים: se prefiere «errantes» frente a «vagabundos» para preservar el valor léxico sin introducir matices extraños al contexto profético.'
  issues:
  - severity: medium
    issue: «Vagabundos» para נֹדְדִים introduce connotaciones no requeridas
    rationale: Aunque comunica errancia, en español contemporáneo «vagabundo» suele sugerir indigencia, ociosidad o marginalidad social. El hebreo participial se centra en ser gente que vaga/anda dispersa entre las naciones. «Errantes» preserva mejor la imagen de exilio y desarraigo.
  revised_spanish_text: Mi Dios los rechazará[a] porque no le han escuchado, y serán errantes entre las naciones.
