base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/017/045.yaml
  text: Then David said to the Philistine[a], “You come to me with a sword, with a spear, and with a javelin, but I come to you in the name of Yahweh of Armies, the God of the armies of Israel[c][b], whom you have defied.”
  footnotes:
  - marker: a
    text: Or “the LORD of hosts.”
    reason: lexical_alternative
  - marker: b
    text: Or “the God of the armies of Israel” or “the God of Israel’s battle lines.”
    reason: lexical_alternative
  - marker: c
    text: “Defied” may also be rendered “reproached” or “taunted,” but here it carries the sense of contemptuous challenge against the God of Israel.
    reason: lexical_alternative
