review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: clamor fuerte, mandato plural, agentes de juicio, y la imagen distributiva de cada uno con arma en mano. Sin embargo, no preserva del todo la decisión inglesa auditada para la nota textual sobre פְּקֻדּוֹת הָעִיר, y la expresión principal «con una gran voz» no corresponde bien al sentido idiomático de קוֹל גָּדוֹל.'
  spanish_quality_summary: El español es mayormente claro, pero «con una gran voz» suena calcado y poco natural; «con voz fuerte» o «con voz potente» sería mejor. Además, «Acercaos» introduce voseo peninsular y no encaja con el objetivo de español neutro latinoamericano; conviene «Acérquense». El resto es legible y digno.
  glossary_alignment: No hay conflicto con términos doctrinales del glosario principal. «Ejecutores de la ciudad» es aceptable para la decisión contextual de juicio. Se debe añadir la nota alternativa sobre «los designados/encargados de la ciudad» porque el English POB la conservó en nota para פְּקֻדּוֹת הָעִיר.
  issues:
  - severity: medium
    issue: «con una gran voz» es un calco poco natural de קוֹל גָּדוֹל
    rationale: El hebreo idiomático significa hablar fuertemente. El propio registro auditado inglés eligió «with a loud voice», no «with a great voice». En español neutro y digno, «con voz fuerte» comunica mejor el sentido.
  - severity: medium
    issue: «Acercaos» no sigue bien el objetivo de español neutro latinoamericano
    rationale: Aunque es gramaticalmente correcto, corresponde al voseo/vosotros peninsular. Para una audiencia ampliamente latinoamericana y eclesial, «Acérquense» mantiene el plural imperativo con tono digno y natural.
  - severity: medium
    issue: Falta la nota alternativa sobre פְּקֻדּוֹת הָעִיר preservada por el English POB
    rationale: La nota inglesa documenta la dificultad léxica y la alternativa «appointed ones/overseers/visitations». El borrador español solo conserva la literalidad de «y cada hombre...», pero omite esa alternativa importante del término difícil.
  revised_spanish_text: 'Entonces él gritó en mis oídos con voz fuerte, diciendo: «Acérquense, ejecutores[a] de la ciudad, cada uno con su arma de destrucción[b] en su mano».'
  revised_footnotes:
  - marker: a
    text: O «los designados de la ciudad»; el término hebreo también puede denotar a los nombrados para supervisión o para visitación/jucio.
    reason: alternative_reading
  - marker: b
    text: Hebreo literalmente «y cada hombre [con] su arma de destrucción en su mano».
    reason: lexical_alternative
  revision_rationale: Se ajusta el español para sonar natural y neutral («con voz fuerte», «Acérquense»), y se restaura la nota textual importante sobre el término difícil פְּקֻדּוֹת הָעִיר, en línea con el audit trail inglés. Se mantiene «ejecutores» como decisión principal contextual de juicio.
