translation:
  language: es
  text: Y los levitas bajaron el arca de Yahvé[c], y la caja que estaba con ella, en la que estaban los objetos de oro[a], y los pusieron sobre la gran piedra. Y los hombres de Bet-semes ofrecieron holocaustos y sacrificaron sacrificios[b] aquel día a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «utensilios/artículos de oro»; el término puede referirse ampliamente a implementos, artículos u objetos hechos de oro.'
    reason: lexical_alternative
  - marker: b
    text: 'O, de manera más fluida: «y ofrecieron sacrificios». El hebreo dice literalmente «y sacrificaron sacrificios», con una construcción cognada verbo-objeto.'
    reason: lexical_alternative
  - marker: c
    text: Hebreo YHWH, tradicionalmente traducido «el SEÑOR».
    reason: alternative_reading
lexical_decisions:
- source_word: וְהַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los hombres levitas
  - los levíticos
  lexicon: HALOT
  rationale: El término designa a los miembros de la tribu/clan de Leví. «Los levitas» es la forma clara y natural en español, y conserva la referencia grupal del hebreo.
- source_word: הוֹרִידוּ
  english_pob_choice: took down
  chosen_spanish: bajaron
  alternatives_spanish:
  - hicieron bajar
  - descendieron
  lexicon: HALOT
  rationale: En este contexto narrativo, el verbo indica retirar y hacer descender el arca y la caja desde el carro. «Bajaron» comunica la acción de forma concreta y natural en español.
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of Yahweh
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca de Yahweh
  - el arca del SEÑOR
  lexicon: HALOT
  rationale: «Arca» es el equivalente habitual para אֲרוֹן. Siguiendo el criterio del proyecto, יְהוָה se traduce como «Yahvé» y no se enmascara con «SEÑOR».
- source_word: הָאַרְגַּז
  english_pob_choice: the box
  chosen_spanish: la caja
  alternatives_spanish:
  - el cofre
  - el arca pequeña
  lexicon: HALOT
  rationale: El sustantivo se refiere al contenedor que iba con el arca. «Caja» es el término más natural en español actual y evita añadir precisión no garantizada por el texto.
- source_word: אֲשֶׁר אִתּוֹ
  english_pob_choice: that was with it
  chosen_spanish: que estaba con ella
  alternatives_spanish:
  - que iba con ella
  - que acompañaba al arca
  lexicon: HALOT
  rationale: La cláusula relativa identifica el contenedor que acompañaba al arca. «Estaba con ella» mantiene la relación simple del hebreo sin sobreinterpretar.
- source_word: אֲשֶׁר בּוֹ כְלֵי זָהָב
  english_pob_choice: in which were the gold objects
  chosen_spanish: en la que estaban los objetos de oro
  alternatives_spanish:
  - en la que estaban los utensilios de oro
  - en la que estaban los vasos de oro
  lexicon: HALOT
  rationale: כְלִים puede abarcar objetos, artículos o utensilios. «Objetos de oro» conserva la amplitud semántica sin especificar indebidamente la forma exacta.
- source_word: וַיָּשִׂמוּ אֶל הָאֶבֶן הַגְּדוֹלָה
  english_pob_choice: and set them on the great stone
  chosen_spanish: y los pusieron sobre la gran piedra
  alternatives_spanish:
  - y los colocaron sobre la piedra grande
  - y los pusieron junto a la gran piedra
  lexicon: HALOT
  rationale: Aunque אֶל puede significar «a/hacia», con שׂים aquí se entiende naturalmente como colocar sobre o en la piedra. «Sobre la gran piedra» expresa bien el resultado en español.
- source_word: וְאַנְשֵׁי בֵית שֶׁמֶשׁ
  english_pob_choice: And the men of Beth-shemesh
  chosen_spanish: Y los hombres de Bet-semes
  alternatives_spanish:
  - Y la gente de Bet-semes
  - Y los varones de Bet-semes
  lexicon: HALOT
  rationale: אַנְשֵׁי es masculino plural y el contexto narra la acción ritual de estos hombres. Se conserva la referencia masculina sin neutralizarla.
- source_word: הֶעֱלוּ עֹלוֹת
  english_pob_choice: offered burnt offerings
  chosen_spanish: ofrecieron holocaustos
  alternatives_spanish:
  - presentaron holocaustos
  - elevaron holocaustos
  lexicon: HALOT
  rationale: El giro sacrificial hebreo literalmente es «hacer subir holocaustos». «Ofrecieron holocaustos» es el equivalente tradicional y claro en español bíblico.
- source_word: וַיִּזְבְּחוּ זְבָחִים
  english_pob_choice: and sacrificed sacrifices
  chosen_spanish: y sacrificaron sacrificios
  alternatives_spanish:
  - y ofrecieron sacrificios
  - y inmolaron sacrificios
  lexicon: HALOT
  rationale: Se conserva deliberadamente la construcción cognada verbo-objeto para reflejar la intensidad y la forma del hebreo, como en el POB inglés.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese día
  - ese mismo día
  lexicon: HALOT
  rationale: La expresión temporal es directa; «en aquel día» suena natural y mantiene la deixis del hebreo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahweh
  lexicon: HALOT
  rationale: La preposición expresa dirección/recipiente de los sacrificios. Se mantiene el nombre divino «Yahvé» conforme al criterio del proyecto.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La política del proyecto pide conservar el nombre divino en forma explícita; en español, «Yahvé» es la forma asignada en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Mantenimiento del paralelismo sacrificial «sacrificaron sacrificios»
  english_pob_reading: and sacrificed sacrifices
  chosen_spanish_reading: y sacrificaron sacrificios
  alternative_spanish_readings:
  - y ofrecieron sacrificios
  - y sacrificaron ofrendas
  rationale: El hebreo usa una construcción cognada verbo-objeto que el POB inglés decidió conservar de manera transparente. En español, también puede preservarse para no perder la señal estilística del original, aunque exista una alternativa más fluida.
  doctrine_reference: 'POB translation philosophy: auditable lexical transparency'
- issue: Uso de «hombres» para אַנְשֵׁי בֵית שֶׁמֶשׁ
  english_pob_reading: men of Beth-shemesh
  chosen_spanish_reading: los hombres de Bet-semes
  alternative_spanish_readings:
  - la gente de Bet-semes
  - los habitantes de Bet-semes
  rationale: El hebreo es masculino plural y el proyecto privilegia la precisión gramatical cuando el contexto no exige neutralización. «Hombres» mantiene esa marca sin perder inteligibilidad.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El expediente de inglés indica alta concordancia, sin revisiones aplicadas y con la lectura final aprobada como equivalente óptimo. La versión española sigue esa misma decisión de fondo, preservando el nombre divino, la referencia masculina plural y la construcción sacrificial cognada, con ajustes naturales de español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «Bet-semes» conserva la transliteración estable del topónimo.
  - La puntuación reproduce la segmentación narrativa del original con dos miembros principales.
  - Las notas con corchetes se anclan solo donde hay una decisión léxica o de variante textual realmente relevante.
