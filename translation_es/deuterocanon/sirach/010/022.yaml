translation:
  language: es
  text: 'Un extranjero residente, un forastero, un extranjero y un hombre pobre: su gloria es el temor de Dios.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «No es justo deshonrar a un pobre inteligente, ni conviene glorificar a un hombre pecador». El hebreo y el griego difieren sustancialmente aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: גֵּר
  english_pob_choice: resident alien
  chosen_spanish: residente extranjero
  alternatives_spanish:
  - forastero residente
  - extranjero residente
  lexicon: HALOT
  rationale: גר designa a una persona no nativa que vive entre el pueblo con cierto estatuto estable; «residente extranjero» conserva esa noción social y legal mejor que un simple «forastero».
- source_word: וְזָר
  english_pob_choice: an outsider
  chosen_spanish: forastero
  alternatives_spanish:
  - extraño
  - ajeno
  lexicon: HALOT
  rationale: זר señala a quien está fuera del círculo normal de pertenencia. En español, «forastero» mantiene una distinción útil respecto de גֵּר y no se limita al sentido nacional de «extranjero».
- source_word: נָכְרִי
  english_pob_choice: a foreigner
  chosen_spanish: extranjero
  alternatives_spanish:
  - foráneo
  - de otro pueblo
  lexicon: HALOT
  rationale: נכרי suele indicar a alguien perteneciente a otro pueblo o nación. «Extranjero» es el equivalente moderno más claro y ayuda a distinguirlo de גֵּר.
- source_word: וָרָשׁ
  english_pob_choice: and a poor man
  chosen_spanish: un hombre pobre
  alternatives_spanish:
  - un necesitado
  - un pobre
  lexicon: HALOT
  rationale: רָשׁ es un pobre o menesteroso; en singular masculino, «un hombre pobre» conserva el paralelismo de la lista y su referencia personal.
- source_word: תִּפְאֶרֶת
  english_pob_choice: their glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su honor
  - su hermosura
  - su esplendor
  lexicon: HALOT
  rationale: En este dicho sapiencial, תִּפְאֶרֶת expresa aquello que da dignidad o honor. «Su gloria» mantiene la fuerza valorativa del hebreo y el sentido proverbial.
- source_word: יִרְאַת אֱלֹהִים
  english_pob_choice: the fear of God
  chosen_spanish: el temor de Dios
  alternatives_spanish:
  - la reverencia por Dios
  - el temor reverente de Dios
  lexicon: HALOT
  rationale: La expresión sapiencial fija «temor de Dios» como fórmula de piedad y reverencia. En español, esta forma preserva tanto la tradición semántica como la densidad del modismo.
theological_decisions:
- issue: Desajuste entre el hebreo conservado y el paralelo griego
  english_pob_reading: The Hebrew is translated as the primary text, with the Greek’s substantially different proverb preserved in a footnote.
  chosen_spanish_reading: Se traduce el hebreo como texto principal y se preserva en nota la lectura griega, que ofrece un dicho de sentido distinto.
  alternative_spanish_readings:
  - 'El texto principal podría seguir el griego: «No es justo deshonrar a un pobre inteligente, ni conviene glorificar a un hombre pecador».'
  - Podría intentarse una armonización entre ambos testigos, pero el contraste es demasiado fuerte.
  rationale: 'La política del proyecto da primacía al hebreo cuando está conservado en Sirácida, pero aquí el griego no es una simple variante: expresa otro proverbio. Para no borrar la tensión textual, el cuerpo sigue el hebreo y la nota conserva la diferencia griega.'
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; explicitar honestamente la incertidumbre de la fuente'
translation_notes:
  revision_awareness: La forma inglesa más reciente cambió «outsider» por «stranger» para נָכְרִי; en español se ajusta a una distinción estable entre «forastero» y «extranjero», manteniendo además «residente extranjero» para גֵּר según la precisión social-legal del hebreo. La nota preserva la gran divergencia del paralelo griego.
  spanish_consistency_notes:
  - 'Se mantuvo el orden acumulativo de la lista hebrea: גֵּר, וְזָר, נָכְרִי, וָרָשׁ.'
  - «Temor de Dios» se conservó como fórmula sapiencial, no como simple miedo.
  - Se evitó usar «SEÑOR» para el nombre divino, ya que el hebreo aquí dice אֱלֹהִים y la expresión fija es «temor de Dios».
