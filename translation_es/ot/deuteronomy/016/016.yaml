revisions:
- from: 'Tres veces al año todos tus varones[a] se presentarán ante Yahvé tu Dios[b], en el lugar que él escoja: en la fiesta de los Panes sin Levadura, en la fiesta de las Semanas y en la fiesta de las Cabañas[c]. No se presentarán ante Yahvé con las manos vacías.'
  to: 'Tres veces al año todos tus varones se presentarán[a] ante Yahvé tu Dios, en el lugar que él escoja: en la fiesta de los Panes sin Levadura, en la fiesta de las Semanas y en la fiesta de las Cabañas[b]. Ninguno se presentará ante Yahvé con las manos vacías[c].'
  rationale: 'Se hicieron reparaciones pequeñas para alinear mejor el español con la evidencia fuente y con las notas del POB inglés: se restauró la nota léxica sobre יֵרָאֶה, se añadió la nota cultural sobre «con las manos vacías», se mantuvo la alternativa tradicional para סֻכּוֹת y se suavizó la cláusula final a un singular impersonal más natural en español.'
