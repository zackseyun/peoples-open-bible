    text: 'O: «vino poderosamente sobre él» / «vino con gran poder sobre él».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «como se despedaza un cabrito»; es decir, un chivo o cabra joven.'
    reason: lexical_alternative
  revision_rationale: Se revisa la cláusula inicial para reflejar mejor el valor súbito y enérgico de וַתִּצְלַח עָלָיו, en línea con el expediente lexical del POB inglés. 'Irrumpió sobre él' preserva mejor la fuerza narrativa que 'vino con poder sobre él' sin volverse antinatural en español. Se mantienen el resto de las decisiones porque son fieles, claras y acordes con la terminología del proyecto.
