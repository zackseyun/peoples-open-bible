translation:
  language: es
  text: Y no se darán grano, armas ni plata a los aliados, como pareció bien a Roma; y guardarán estas disposiciones[a], y no con engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estas estipulaciones» o «estas provisiones». La frase griega es literalmente «estas cosas que han de guardarse», en contexto de tratado.
    reason: lexical_alternative
lexical_decisions:
- source_word: συμμάχοις
  english_pob_choice: allies
  chosen_spanish: aliados
  alternatives_spanish:
  - confederados
  - los que están en alianza
  lexicon: LSJ
  rationale: El dativo plural nombra a una parte aliada dentro de un contexto político-militar de tratado. «Aliados» comunica bien ese valor en español actual sin perder la relación diplomática.
- source_word: δοθήσεται
  english_pob_choice: shall not be given
  chosen_spanish: no se darán
  alternatives_spanish:
  - no serán dados
  - no se entregarán
  lexicon: BDAG
  rationale: El futuro pasivo impersonal se vierte naturalmente con «no se darán»; conserva la impersonalidad y la forma formal del convenio sin añadir sujeto.
- source_word: σῖτος
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - grano de cereal
  - trigo
  - alimento
  lexicon: LSJ
  rationale: El término es más amplio que «trigo» y se refiere al cereal en general; «grano» mantiene esa amplitud y suena natural en español.
- source_word: ὅπλα
  english_pob_choice: weapons
  chosen_spanish: armas
  alternatives_spanish:
  - armas de guerra
  - armamento
  - armas y pertrechos
  lexicon: LSJ
  rationale: En este contexto militar, «armas» es la equivalencia directa y clara en español para ὅπλα.
- source_word: ἀργύριον
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  - plata acuñada
  lexicon: LSJ
  rationale: El griego dice literalmente «plata». Aunque puede implicar dinero, la traducción conserva el sustantivo concreto y el tono diplomático del texto.
- source_word: ὡς ἔδοξεν Ῥώμῃ
  english_pob_choice: as it seemed good to Rome
  chosen_spanish: como pareció bien a Roma
  alternatives_spanish:
  - como decidió Roma
  - como resolvió Roma
  lexicon: LSJ
  rationale: La frase es lenguaje formal de decisión diplomática. «Como pareció bien a Roma» sigue de cerca el giro griego y mantiene el registro oficial.
- source_word: φυλάξονται
  english_pob_choice: they shall keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - observarán
  - cumplirán
  lexicon: BDAG
  rationale: En contextos legales o pactuales, φυλάσσω puede significar guardar/observar. «Guardarán» permite reproducir la idea de custodia y fidelidad al acuerdo.
- source_word: τὰ φυλάγματα ταῦτα
  english_pob_choice: these provisions
  chosen_spanish: estos preceptos
  alternatives_spanish:
  - estas disposiciones
  - estas estipulaciones
  - estas provisiones
  lexicon: LSJ
  rationale: La expresión literalmente alude a «cosas que han de guardarse». En este contexto de tratado, «preceptos» comunica el carácter vinculante de las cláusulas sin perder el sentido normativo.
- source_word: οὐ μετὰ δόλου
  english_pob_choice: and not with deceit
  chosen_spanish: y no con engaño
  alternatives_spanish:
  - y no con dolo
  - y sin engaño
  lexicon: LSJ
  rationale: La negación excluye una actuación fraudulenta o engañosa. «Engaño» es claro y fiel en español contemporáneo; mantiene el tono jurídico del cierre.
theological_decisions:
- issue: Lenguaje de tratado y obligación vinculante
  english_pob_reading: The clause uses formal diplomatic language about obligations/provisions to be kept, not ordinary narrative description.
  chosen_spanish_reading: 'La cláusula se vierte con un tono jurídico-diplomático: «guardarán estos preceptos».'
  alternative_spanish_readings:
  - cumplirán estas disposiciones
  - observarán estas estipulaciones
  rationale: No hay aquí un matiz doctrinal, sino una decisión de registro. Se preserva la fuerza de tratado del griego y la lectura POB de un lenguaje oficial de alianza.
  doctrine_reference: None
- issue: Sentido de la fórmula 'as it seemed good to Rome'
  english_pob_reading: The phrase is formal diplomatic language, effectively meaning 'as Rome decided/resolved.'
  chosen_spanish_reading: «Como pareció bien a Roma» conserva la forma del giro y su valor de decisión oficial.
  alternative_spanish_readings:
  - como decidió Roma
  - como resolvió Roma
  rationale: La redacción principal sigue el griego y la POB inglesa, sin ocultar que se trata de una fórmula de autoridad política.
  doctrine_reference: None
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al colocar primero los elementos negados («Y grano, armas o plata no se darán...»), y refleja el ajuste de τὰ φυλάγματα como términos/provisiones vinculantes. Se mantuvo el final «y no con engaño» como traducción cercana de οὐ μετὰ δόλου.
  spanish_consistency_notes:
  - Se usó «Roma» sin artículo para imitar la fórmula diplomática del griego y la POB inglesa.
  - Se prefirió «plata» para ἀργύριον, manteniendo el valor literal del texto.
  - Se evitó «SEÑOR» o equivalentes no pertinentes; no hay lenguaje divino en este versículo.
  - «Aliados» se mantiene como término político-militar estable y natural en español.
  - El orden inicial de la oración busca naturalidad en español sin perder el paralelismo con el griego.
