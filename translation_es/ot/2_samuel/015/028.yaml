translation:
  language: es
  text: Miren, yo esperaré en los vados[a] de la región despoblada[b] hasta que llegue una noticia de ustedes para informarme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los cruces».
    reason: lexical_alternative
  - marker: b
    text: O «del desierto».
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאוּ
  english_pob_choice: See
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Fíjense
  lexicon: HALOT
  rationale: El imperativo plural funciona como un llamado de atención directo. «Miren» comunica esa fuerza en español natural sin perder la inmediatez del original.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. En español, el sujeto explícito «yo» conserva ese énfasis de manera natural junto con el orden de la frase.
- source_word: מִתְמַהְמֵהַּ
  english_pob_choice: will wait
  chosen_spanish: estoy esperando
  alternatives_spanish:
  - me estoy demorando
  - me voy a quedar
  - estoy tardando
  lexicon: HALOT
  rationale: El participio hitpael expresa demorarse o permanecer. En contexto, David no describe una demora accidental sino una espera intencional; por eso «estoy esperando» comunica bien la acción continua y la situación narrativa.
- source_word: בְּעַבְרוֹת
  english_pob_choice: at the fords
  chosen_spanish: en los vados
  alternatives_spanish:
  - en los cruces
  - en los pasos
  lexicon: HALOT
  rationale: El sentido contextual apunta a lugares de paso en un río o terreno difícil. «Vados» es el equivalente más preciso y natural en español bíblico contemporáneo.
- source_word: הַמִּדְבָּר
  english_pob_choice: the wilderness
  chosen_spanish: del desierto
  alternatives_spanish:
  - del desierto abierto
  - de la estepa
  lexicon: HALOT
  rationale: Aunque el hebreo puede abarcar región agreste o despoblada, en esta escena de huida «desierto» comunica bien el lugar sin imponer un matiz geográfico más estrecho de lo que permite el texto.
- source_word: עַד בּוֹא דָבָר
  english_pob_choice: until word comes
  chosen_spanish: hasta que llegue una noticia
  alternatives_spanish:
  - hasta que venga un mensaje
  - hasta que llegue un aviso
  lexicon: HALOT
  rationale: דָבָר aquí significa un reporte o noticia concreta, no «palabra» abstracta. «Una noticia» mantiene el contenido comunicativo y suena natural en español.
- source_word: מֵעִמָּכֶם
  english_pob_choice: from you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - de parte de ustedes
  - desde ustedes
  lexicon: HALOT
  rationale: La expresión indica procedencia/origen del mensaje. «De ustedes» es la forma más simple y idiomática en español para conservar esa relación.
- source_word: לְהַגִּיד לִי
  english_pob_choice: to inform me
  chosen_spanish: para avisarme
  alternatives_spanish:
  - para informarme
  - para decírmelo
  lexicon: HALOT
  rationale: El hifil de נגד implica dar a conocer o comunicar un informe. «Avisarme» capta bien la función práctica del mensaje en este contexto de espera y aviso.
translation_notes:
  revision_awareness: 'El texto inglés auditado se mantiene en línea con la revisión más reciente (sin cambios requeridos) y con alta concordancia. La versión española preserva la misma lectura básica: David se coloca en los vados del desierto y espera un mensaje de sus acompañantes para ser avisado.'
  spanish_consistency_notes:
  - Se usó «Yahvé» únicamente cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo un registro bíblico claro y moderno, evitando arcaísmos innecesarios.
  - «Vados» conserva mejor la imagen topográfica que una paráfrasis general como «cruces».
  - «Avisarme» refleja el valor práctico de לְהַגִּיד לִי sin sobrecargar la frase.
