translation:
  language: es
  text: 'Y Salomón hizo subir a la hija de Faraón desde la ciudad de David a la casa que había construido para ella, porque dijo: «Mi esposa no habitará en la casa de David, rey de Israel, porque sagrados son los lugares[a] a los que ha llegado el arca de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «porque sagrados son ellos, a los cuales ha llegado el arca de Yahvé»; el español hace explícito el referente plural implícito como «los lugares».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעֱלָה
  english_pob_choice: brought ... up
  chosen_spanish: subió
  alternatives_spanish:
  - la llevó
  - hizo subir
  lexicon: HALOT
  rationale: El hifil de עלה expresa movimiento ascendente. En español, «subió» conserva la dirección sin añadir más explicación de la necesaria; el objeto directo explícito («a la hija de Faraón») hace natural la construcción.
- source_word: מֵעִיר דָּוִיד
  english_pob_choice: from the city of David
  chosen_spanish: desde la ciudad de David
  alternatives_spanish:
  - de la ciudad de David
  - fuera de la ciudad de David
  lexicon: HALOT
  rationale: «Desde» conserva mejor el punto de partida del traslado con tono natural en español, sin perder la referencia geográfica establecida por el texto.
- source_word: לַבַּיִת אֲשֶׁר בָּנָה לָהּ
  english_pob_choice: to the house that he had built for her
  chosen_spanish: a la casa que había construido para ella
  alternatives_spanish:
  - a la casa que le había construido
  - al palacio que había construido para ella
  lexicon: HALOT
  rationale: «Casa» mantiene la transparencia léxica de בַּיִת, aunque el contexto sea real. Se usa «había construido» para reflejar con naturalidad el valor anterior del acto respecto del traslado.
- source_word: אִשָּׁה לִי
  english_pob_choice: My wife shall not live
  chosen_spanish: Mi esposa no habitará
  alternatives_spanish:
  - Mi mujer no vivirá
  - No vivirá mi esposa
  lexicon: HALOT
  rationale: El hebreo permite «esposa» aquí por el contexto doméstico y regio, evitando el sentido demasiado general de «mujer». «Habitará» conserva mejor que «vivirá» la idea residencial de יָשַׁב en un registro digno.
- source_word: בְּבֵית דָּוִיד מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: in the house of David king of Israel
  chosen_spanish: en la casa de David, rey de Israel
  alternatives_spanish:
  - en la casa de David rey de Israel
  - en el palacio de David, rey de Israel
  lexicon: HALOT
  rationale: Se mantiene «casa» por transparencia frente a בַּיִת; la coma en español facilita la aposición «rey de Israel» sin alterar el contenido.
- source_word: קֹדֶשׁ הֵמָּה
  english_pob_choice: are holy
  chosen_spanish: sagrados son
  alternatives_spanish:
  - son santos
  - son cosas sagradas
  lexicon: HALOT
  rationale: El predicado plural hebreo requiere un plural o un adjetivo concordante; «sagrados» conserva la fuerza de קדש y resulta más natural que repetir «son» con un sustantivo explícito.
- source_word: אֲשֶׁר בָּאָה אֲלֵיהֶם אֲרוֹן יְהוָה
  english_pob_choice: the places to which the ark of Yahweh has come
  chosen_spanish: los lugares a los que ha llegado el arca de Yahvé
  alternatives_spanish:
  - los lugares adonde llegó el arca de Yahvé
  - aquellos a los que ha llegado el arca de Yahvé
  lexicon: HALOT
  rationale: Se explicita el referente plural implícito con «los lugares», tal como hace la POB inglesa, porque el pronombre plural hebreo no se refiere de manera natural a un solo sitio abstracto. «Ha llegado» preserva el sentido de llegada del arca.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre divino en transliteración. Esto evita la sustitución por un título y mantiene la distinción textual documentada.
theological_decisions:
- issue: Referente plural en la declaración de santidad
  english_pob_reading: The plural pronoun refers to the places/areas in David's house to which the ark had come, not to David's house in an abstract dynastic sense.
  chosen_spanish_reading: Los «sagrados» se entienden como los lugares a los que ha llegado el arca, no como una santidad genérica o abstracta de la dinastía de David.
  alternative_spanish_readings:
  - La casa de David es santa en sentido general
  - El texto se podría dejar más literal sin explicitar el plural
  rationale: El hebreo exige una referencia plural; por eso el español explicita «los lugares» para no borrar la tensión gramatical ni forzar una lectura singular. Esto preserva el razonamiento de Salomón sin añadir teología ajena al versículo.
  doctrine_reference: 'Translation philosophy #3 and #6'
- issue: Sentido de אִשָּׁה en la frase de Salomón
  english_pob_reading: '"wife" rather than the broader "woman"'
  chosen_spanish_reading: «Esposa» en vez de «mujer»
  alternative_spanish_readings:
  - mujer
  - esposa
  rationale: El contexto es la residencia de la hija de Faraón dentro del arreglo matrimonial y real de Salomón. «Esposa» evita una lectura demasiado amplia que sonaría como una prohibición general de mujeres.
  doctrine_reference: 'Translation philosophy #1 and #6'
- issue: Nombre divino en discurso citado
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El discurso citado termina con el nombre del arca de Yahvé; en español se mantiene el nombre propio para conservar la transparencia del hebreo y la coherencia del proyecto.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de «No wife of mine» a «My wife» para ajustar con mayor precisión אִשָּׁה לִי. En español se optó por «Mi esposa», que refleja esa misma restricción contextual y mantiene el tono natural de la frase. También se preservó la solución de la POB inglesa para el plural implícito de קֹדֶשׁ הֵמָּה mediante la explicitación de «los lugares».
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene «casa» para בַּיִת por transparencia léxica, aunque el referente sea una residencia real.
  - Se prefirió «esposa» en lugar de «mujer» para evitar una generalización indebida.
  - La puntuación reproduce una sola cita directa extensa, con comillas angulares acordes al español.
  - 'Las notas a pie de página se limitan a los dos puntos de mayor tensión: el plural implícito y la explicitación del referente.'
