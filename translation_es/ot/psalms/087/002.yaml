translation:
  language: es
  text: Yahvé ama las puertas de Sion más que todas las moradas de Jacob[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé ama las puertas de Sion por encima de todas las moradas de Jacob.»'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹהֵב
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - quiere
  - tiene afecto por
  lexicon: HALOT
  rationale: El participio qal expresa una acción verbal general y continua. En español, «ama» comunica con naturalidad ese sentido durativo y relacional sin volverlo más intenso de lo que el hebreo exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del Tetragrámaton con la forma estándar del proyecto en español, «Yahvé», en lugar de sustituirlo por un título. Esto mantiene la referencia directa al nombre divino revelado.
- source_word: שַׁעֲרֵי
  english_pob_choice: the gates of
  chosen_spanish: las puertas de
  alternatives_spanish:
  - los portones de
  - las entradas de
  lexicon: HALOT
  rationale: El constructo plural de שַׁעַר se vierte de forma concreta y natural en español como «puertas de». «Puertas» preserva la imagen urbana sin forzar una expresión más interpretativa.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Tsion
  lexicon: HALOT
  rationale: Se conserva el nombre propio bíblico en su forma castellana habitual «Sion», que es clara para lectores de iglesia y corresponde al topónimo transliterado.
- source_word: מִכֹּל
  english_pob_choice: more than all
  chosen_spanish: más que todas
  alternatives_spanish:
  - por encima de todas
  - antes que todas
  lexicon: HALOT
  rationale: La preposición comparativa מִן con כֹּל expresa preferencia/comparación. «Más que todas» reproduce de manera directa la fuerza comparativa sin ampliar el sentido.
- source_word: מִשְׁכְּנוֹת
  english_pob_choice: the dwellings
  chosen_spanish: las moradas
  alternatives_spanish:
  - las viviendas
  - las habitaciones
  - los tabernáculos
  lexicon: HALOT
  rationale: Se evita «tabernáculos» por su carga cultual en español y se opta por «moradas», que conserva el sentido de lugares de habitación y el tono poético del hebreo.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Se mantiene el nombre propio tal como está en el hebreo. Aunque refiere al pueblo del pacto, el texto no usa aquí «Israel», y la traducción no debe interpretar esa sustitución.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El verso usa directamente el Tetragrámaton. Siguiendo la convención doctrinal del proyecto, el nombre divino se vierte como «Yahvé» para preservar el nombre personal de Dios y no reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Comparative force of מִכֹּל
  english_pob_reading: The LORD loves the gates of Zion more than all the dwellings of Jacob.
  chosen_spanish_reading: Yahvé ama las puertas de Sion más que todas las moradas de Jacob.
  alternative_spanish_readings:
  - Yahvé ama las puertas de Sion por encima de todas las moradas de Jacob.
  rationale: El hebreo expresa comparación entre Sion y las demás moradas de Jacob. «Más que todas» mantiene explícita la preferencia sin añadir una lectura doctrinal distinta.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La última revisión indicó que no había cambios necesarios y el control cruzado mostró alto acuerdo; por eso se mantiene la decisión comparativa y el nombre divino conforme al audit trail, con una nota alternativa breve sólo para la fuerza comparativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - Se mantiene «Sion» como topónimo castellano estándar, sin reinterpretarlo como «Israel».
  - «Moradas» conserva el valor poético de מִשְׁכְּנוֹת sin introducir connotaciones cultuales ajenas al contexto.
  - La comparación se expresa con «más que», que es natural en español y fiel al hebreo.
