translation:
  language: es
  text: y a los de Horma, y a los de Bor-asán[a], y a los de Atac.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bor-asán es un nombre de lugar; literalmente, sus elementos podrían sugerir «pozo/foso de humo», pero aquí se translitera como topónimo en lugar de traducirse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלַאֲשֶׁר
  english_pob_choice: and to those
  chosen_spanish: y a los de
  alternatives_spanish:
  - y a aquellos que estaban en
  - y a los que estaban en
  lexicon: HALOT
  rationale: La construcción preposicional con relativo funciona distributivamente en esta lista de destinatarios. En español, «a los de» transmite de forma natural el sentido de pertenencia o localización sin forzar una cláusula relativa pesada.
- source_word: בְּחָרְמָה
  english_pob_choice: in Hormah
  chosen_spanish: Horma
  alternatives_spanish:
  - en Horma
  - a Horma
  lexicon: HALOT
  rationale: Se trata de un topónimo; se conserva como nombre propio. El español puede omitir la preposición locativa cuando la construcción «a los de X» ya expresa el grupo asociado al lugar.
- source_word: בְּבוֹר עָשָׁן
  english_pob_choice: in Bor-ashan
  chosen_spanish: Bor-asan
  alternatives_spanish:
  - Bor-ashan
  - Pozo de humo
  lexicon: HALOT
  rationale: El texto presenta un nombre de lugar. Se translitera como topónimo en español, sin traducir sus posibles elementos léxicos, para conservar el valor onomástico y no perder la decisión auditada de la POB inglesa.
- source_word: בַּעֲתָךְ
  english_pob_choice: in Athach
  chosen_spanish: Atac
  alternatives_spanish:
  - Ataj
  - Athach
  lexicon: HALOT
  rationale: También es un topónimo. Se adapta la transliteración a una forma española fluida, manteniendo el nombre propio y su identificación locativa.
theological_decisions:
- issue: Tratamiento de nombres de lugar con prefijo locativo
  english_pob_reading: The passage lists recipients by place names, with the locative sense preserved in English by 'in' / 'to those in'.
  chosen_spanish_reading: 'La lista se vierte con una construcción distributiva natural en español: «a los de ...», que mantiene la referencia local sin añadir interpretación teológica.'
  alternative_spanish_readings:
  - en Horma, y en Bor-asan, y en Atac
  - a los que estaban en Horma, y a los que estaban en Bor-asan, y a los que estaban en Atac
  rationale: No hay contenido doctrinal explícito en el versículo; la decisión principal es sintáctica y onomástica. Se conserva el sentido locativo/distributivo de los topónimos sin sobrerregularizar el texto con una paraphraseo innecesaria.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El registro en inglés quedó sin cambios en la última revisión y la concordancia general fue alta; la versión española sigue esa lectura estable, conservando el carácter de lista de topónimos sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene un español neutro y bíblico, evitando calcos rígidos.
  - Se transliteran los topónimos en lugar de traducir sus posibles significados internos.
  - La estructura «a los de» busca naturalidad en español sin perder el valor distributivo del hebreo.
