translation:
  language: es
  text: con reyes y consejeros de la tierra[a], que edificaron[b] lugares desolados para sí mismos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tierra» también puede entenderse aquí como «país» o «reino».
    reason: lexical_alternative
  - marker: b
    text: O «que reedificaron lugares desolados para sí mismos». El hebreo puede entenderse como la construcción de monumentos o sepulcros en ruinas, o como la reedificación de lugares devastados.
    reason: alternative_reading
lexical_decisions:
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - entre
  - junto a
  lexicon: HALOT
  rationale: La preposición expresa compañía directa. En español, «con» comunica la misma relación sin añadir matices no presentes en el hebreo.
- source_word: מְלָכִים
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  - soberanos
  lexicon: HALOT
  rationale: El sustantivo común designa gobernantes; «reyes» es el equivalente natural y más transparente en español.
- source_word: יֹעֲצֵי אָרֶץ
  english_pob_choice: counselors of the earth
  chosen_spanish: consejeros de la tierra
  alternatives_spanish:
  - consejeros del país
  - asesores del reino
  - consejeros de la región
  lexicon: HALOT
  rationale: Se conserva la estructura elevada del constructo. «Tierra» mantiene la amplitud semántica posible de אָרֶץ sin estrecharla indebidamente a un territorio moderno.
- source_word: הַבֹּנִים
  english_pob_choice: who built
  chosen_spanish: que edificaron
  alternatives_spanish:
  - que construyeron
  - los que edificaron
  lexicon: HALOT
  rationale: El participio funciona atributivamente; «que edificaron» suena natural y conserva el carácter descriptivo del hebreo. «Edificar» mantiene un registro algo más solemne adecuado al poema.
- source_word: חֳרָבוֹת
  english_pob_choice: desolate places
  chosen_spanish: lugares desolados
  alternatives_spanish:
  - ruinas
  - sitios desolados
  - lugares devastados
  lexicon: HALOT
  rationale: La POB inglesa revisó de «ruins» a «desolate places» para reflejar mejor la palabra hebrea y su posible referencia a lugares devastados o a monumentos en desolación. En español, «lugares desolados» conserva esa ambigüedad sin reducirla solo a «ruinas».
- source_word: לָמוֹ
  english_pob_choice: for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos mismos
  - para sí mismos
  lexicon: HALOT
  rationale: El valor reflexivo del sufijo pronominal se expresa con naturalidad en español como «para sí». Evita redundancia y mantiene la fuerza autocentrada del pasaje.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió «desolate places» en lugar de «ruins» para חֳרָבוֹת, sin perder la posibilidad de leer el pasaje como referencia a restos monumentales o a sitios devastados. La traducción española conserva esa apertura semántica con «lugares desolados».
  spanish_consistency_notes:
  - Se mantuvo «tierra» para אָרֶץ por coherencia con el audit trail, con nota para la alternativa «país/región».
  - Se eligió «edificaron» en lugar de un simple pasado neutro para reflejar el participio descriptivo del hebreo.
  - No se introdujo «Cristo», «SEÑOR» ni otra terminología no presente en el texto fuente.
  - «Para sí» preserva la lectura reflexiva señalada por el inglés POB sin sobreexplicarla en el cuerpo del verso.
