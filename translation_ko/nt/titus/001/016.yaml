id: TIT.1.16
reference: Titus 1:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: θεὸν ὁμολογοῦσιν εἰδέναι, τοῖς δὲ ἔργοις ἀρνοῦνται, βδελυκτοὶ ὄντες καὶ ἀπειθεῖς καὶ πρὸς πᾶν ἔργον ἀγαθὸν ἀδόκιμοι.
base_translation:
  language: en
  yaml_path: translation/nt/titus/001/016.yaml
  text: They profess to know God[a], but by their works they deny him[d][c][b], being detestable and disobedient and unfit for every good work.
  footnotes:
  - marker: a
    text: Or 'They claim to know God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by their deeds they deny him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'abominable.'
    reason: lexical_alternative
  - marker: d
    text: Or 'disqualified for every good work.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그들은 하나님을 안다고 고백하지만[a], 행위로는[b] 그분을 부인합니다. 가증한 자[c]요 불순종하는 자며, 어떤 선한 일에도 합당하지 않습니다[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「하나님을 안다고 주장하지만」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「그들의 행함으로」. 헬라어 ἔργοις는 단순한 행위·실천을 가리킨다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「혐오스러운 자」. βδελυκτός는 강한 혐오의 어감을 지닌다.
    reason: lexical_alternative
  - marker: d
    text: 또는 「어떤 선한 일에 대해서도 시험에 합격하지 못합니다」. ἀδόκιμος는 「검증을 통과하지 못한·자격이 없는」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμολογοῦσιν εἰδέναι
  english_pob_choice: profess to know
  chosen_korean: 안다고 고백하지만
  alternatives_korean:
  - 안다고 주장하지만
  - 알고 있다고 말하지만
  lexicon: BDAG
  rationale: ὁμολογέω는 공적 고백·시인. 「고백하다」가 정립된 한국어 등가어이며, 입과 행위의 대조를 살린다.
- source_word: τοῖς δὲ ἔργοις ἀρνοῦνται
  english_pob_choice: by their works they deny him
  chosen_korean: 행위로는 그분을 부인합니다
  alternatives_korean:
  - 행함으로는 그분을 부인합니다
  - 일로는 그분을 부인합니다
  lexicon: BDAG
  rationale: 「행위」가 ἔργοις의 정립된 한국어 등가어. 「부인하다」는 ἀρνέομαι의 표준 등가어.
- source_word: βδελυκτοὶ
  english_pob_choice: detestable
  chosen_korean: 가증한 자
  alternatives_korean:
  - 혐오스러운 자
  - 가증스러운 자
  lexicon: BDAG
  rationale: βδελυκτός는 강한 혐오. 70인역 전통에서 「가증」으로 정립.
- source_word: ἀπειθεῖς
  english_pob_choice: disobedient
  chosen_korean: 불순종하는 자
  alternatives_korean:
  - 순종치 않는 자
  - 거역하는 자
  lexicon: BDAG
  rationale: ἀπειθής는 「설득에 굴하지 않는」 → 「불순종하는」.
- source_word: πρὸς πᾶν ἔργον ἀγαθὸν ἀδόκιμοι
  english_pob_choice: unfit for every good work
  chosen_korean: 어떤 선한 일에도 합당하지 않습니다
  alternatives_korean:
  - 모든 선한 일에 부적합한 자
  - 어떤 선한 일에도 자격이 없는 자
  lexicon: BDAG
  rationale: ἀδόκιμος는 시금석을 통과하지 못해 「자격 없는」 상태. 「합당하지 않다」가 한국어로 자연스러우며, 각주로 「시험에 합격하지 못함」 어감을 둔다. πᾶν + 부정으로 「어떤 ~도」 옮긴다.
