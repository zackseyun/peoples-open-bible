  lexicon: HALOT
  rationale: En listas genealógicas y de retorno, בני introduce un grupo familiar/clánico vinculado a un antepasado. En español, «los hijos de» reproduce bien la relación de pertenencia y la estructura de lista sin sobreinterpretar el término como una simple descendencia biológica en cada caso.
- source_word: חָשֻׁם
  english_pob_choice: Hashum
  chosen_spanish: Hasum
  alternatives_spanish:
  - Hashum
  lexicon: transliteración estándar
  rationale: El nombre propio se translitera como «Hasum» para adaptar la grafía al español y mantener la forma reconocible del antropónimo hebreo.
- source_word: מָאתַיִם עֶשְׂרִים וּשְׁלֹשָׁה
  english_pob_choice: two hundred twenty-three
  chosen_spanish: doscientos veintitrés
  alternatives_spanish:
  - '223'
  - doscientos y veintitrés
  lexicon: HALOT
  rationale: La secuencia hebrea expresa literalmente 200 + 20 + 3. En español, «doscientos veintitrés» comunica el total con naturalidad y exactitud, preservando el valor numérico sin añadir elementos no presentes en el hebreo.
translation_notes:
