translation:
  language: es
  text: Entonces los altos oficiales y los sátrapas buscaban hallar una acusación[a] contra Daniel en asuntos del reino, pero no podían hallar ninguna acusación ni corrupción, porque él era fiel[b], y no se halló en él ninguna negligencia[c] ni corrupción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un motivo de acusación» para «acusación».
    reason: lexical_alternative
  - marker: b
    text: O «confiable» para «fiel».
    reason: lexical_alternative
  - marker: c
    text: O «error» o «descuido» para «negligencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Después
  - Luego
  lexicon: HALOT
  rationale: Marca el avance narrativo inmediato y suena natural en español sin añadir énfasis interpretativo.
- source_word: סָרְכַיָּא
  english_pob_choice: high officials
  chosen_spanish: los altos oficiales
  alternatives_spanish:
  - los funcionarios principales
  - los gobernadores
  lexicon: HALOT
  rationale: El título arameo designa dignatarios administrativos; 'altos oficiales' conserva la función sin forzar un cargo técnico demasiado específico.
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  english_pob_choice: satraps
  chosen_spanish: los sátrapas
  alternatives_spanish:
  - los gobernadores de provincia
  lexicon: HALOT
  rationale: Se conserva el término histórico reconocido en español para mantener el trasfondo persa del relato.
- source_word: בָעַיִן
  english_pob_choice: were seeking
  chosen_spanish: buscaban
  alternatives_spanish:
  - estaban buscando
  - procuraban
  lexicon: HALOT
  rationale: Expresa la búsqueda activa e iterativa del imperfectivo arameo en un español fluido.
- source_word: עִלָּה
  english_pob_choice: charge
  chosen_spanish: una acusación
  alternatives_spanish:
  - un cargo
  - un motivo de acusación
  lexicon: HALOT
  rationale: En contexto jurídico-administrativo, 'acusación' comunica bien la idea de base para inculpar; evita un calco rígido.
- source_word: לְהַשְׁכָּחָה
  english_pob_choice: to find
  chosen_spanish: hallar
  alternatives_spanish:
  - encontrar
  - descubrir
  lexicon: HALOT
  rationale: '''Hallar'' es un equivalente digno y preciso que conserva la acción de descubrir una base acusatoria.'
- source_word: מִצַּד מַלְכוּתָא
  english_pob_choice: in matters of the kingdom
  chosen_spanish: en asuntos del reino
  alternatives_spanish:
  - en lo relativo al reino
  - en materia del reino
  lexicon: HALOT
  rationale: La expresión delimita la esfera administrativa; 'asuntos del reino' es natural en español y mantiene el matiz oficial.
- source_word: שְׁחִיתָה
  english_pob_choice: corruption
  chosen_spanish: corrupción
  alternatives_spanish:
  - mala conducta
  - perversión
  lexicon: HALOT
  rationale: El término encaja con el ambiente de administración y con la pareja 'acusación ni corrupción' del texto fuente.
- source_word: מְהֵימַן
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - fidedigno
  - confiable
  - leal
  lexicon: HALOT
  rationale: '''Fiel'' preserva la idea de confiabilidad moral y administrativa sin reducirla solo a una categoría doctrinal.'
- source_word: שָׁלוּ
  english_pob_choice: negligence
  chosen_spanish: negligencia
  alternatives_spanish:
  - error
  - descuido
  - falta
  lexicon: HALOT
  rationale: En este contexto forense, 'negligencia' expresa bien la idea de omisión o descuido administrativo detectables.
- source_word: הִשְׁתְּכַחַת עֲלֹוהִי
  english_pob_choice: was found in him
  chosen_spanish: se halló en él
  alternatives_spanish:
  - se encontró en él
  - se halló contra él
  lexicon: HALOT
  rationale: Mantiene la pasiva impersonal y refleja que no apareció ningún defecto atribuible a Daniel.
theological_decisions:
- issue: La fidelidad de Daniel como rasgo ético y administrativo
  english_pob_reading: Rendered מְהֵימַן as 'faithful' in the sense of trustworthy in office.
  chosen_spanish_reading: Traducido como 'fiel' en el sentido de confiable e íntegro en su cargo.
  alternative_spanish_readings:
  - confiable
  - leal
  - fidedigno
  rationale: El versículo describe la integridad pública de Daniel ante autoridades paganas; 'fiel' conserva el peso moral sin introducir una lectura devocional excesiva.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: He seguido la revisión más reciente del POB inglés al reflejar explícitamente la construcción de infinitivo con 'buscaban hallar', y he conservado el doble paralelismo 'acusación ni corrupción' / 'negligencia ni corrupción' porque el texto arameo mantiene esa repetición con distinto matiz legal-moral.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva 'sátrapas' por ser un término histórico asentado y transparente en español.
  - '''Hallar'' y ''se halló'' reproducen de modo consistente לְהַשְׁכָּחָה / הִשְׁתְּכַחַת sin forzar una paráfrasis.'
