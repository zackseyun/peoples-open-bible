id: 2CH.14.5
reference: 2 Chronicles 14:5
source:
  edition: WLC
  text: וַ/יִּ֛בֶן עָרֵ֥י מְצוּרָ֖ה בִּ/יהוּדָ֑ה כִּֽי שָׁקְטָ֣ה הָ/אָ֗רֶץ וְ/אֵין עִמּ֤/וֹ מִלְחָמָה֙ בַּ/שָּׁנִ֣ים הָ/אֵ֔לֶּה כִּֽי הֵנִ֥יחַ יְהוָ֖ה לֽ/וֹ־־־׃
translation:
  text: He built fortified cities in Judah[a], because the land was quiet and there was no war with him in those years, because Yahweh gave him rest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there was no war with him.' The Hebrew idiom can be understood more generally as the absence of warfare involving Asa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: He built
  alternatives:
  - And he built
  lexicon: HALOT
  rationale: Wayyiqtol of בנה, narrating Asa's action. English omits the initial conjunction for natural narrative flow while preserving the past tense.
- source_word: עָרֵי מְצוּרָה
  chosen: fortified cities
  alternatives:
  - fortress cities
  - cities of fortification
  lexicon: HALOT
  rationale: Construct phrase meaning cities characterized by fortification/defense. 'Fortified cities' is the most natural and standard English rendering.
- source_word: בִּיהוּדָה
  chosen: in Judah
  lexicon: HALOT
  rationale: Locative preposition with the place name Judah.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for Asa's building activity.
- source_word: שָׁקְטָה הָאָרֶץ
  chosen: the land was quiet
  alternatives:
  - the land was at peace
  - the land was undisturbed
  lexicon: HALOT
  rationale: שקט denotes quietness, tranquility, or freedom from disturbance. 'The land was quiet' preserves the imagery and links well with the later statement about rest.
- source_word: וְאֵין עִמּוֹ מִלְחָמָה
  chosen: there was no war against him
  alternatives:
  - there was no war with him
  - he had no war
  lexicon: HALOT
  rationale: The idiom with אֵין + עִם can indicate that no war was occurring involving or confronting him. 'Against him' best fits the context of political-military security without overstating the Hebrew.
- source_word: בַּשָּׁנִים הָאֵלֶּה
  chosen: in those years
  alternatives:
  - during these years
  lexicon: HALOT
  rationale: Temporal phrase referring to the period under discussion. 'Those years' reads naturally in English historical narrative.
- source_word: הֵנִיחַ
  chosen: gave him rest
  alternatives:
  - granted him rest
  - gave him relief
  lexicon: HALOT
  rationale: Hiphil of נוח here means to cause someone to have rest or relief from conflict. 'Gave him rest' is idiomatic and preserves the theological motif of divinely granted peace.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לוֹ
  chosen: him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: Indirect object of הֵנִיחַ. English idiom prefers 'gave him rest' rather than the more wooden 'gave rest to him.'
