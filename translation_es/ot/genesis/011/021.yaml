translation:
  language: es
  text: Y Reú vivió después de engendrar a Serug doscientos siete años[a], y engendró hijos e hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Reú vivió, después de engendrar a Serug, doscientos siete años».'
    reason: alternative_punctuation
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - continuó viviendo
  lexicon: HALOT
  rationale: En fórmulas genealógicas, חיה se expresa de manera natural en español con «vivió». Mantiene el valor de duración vital sin sonar artificial.
- source_word: רְעוּ
  english_pob_choice: Reu
  chosen_spanish: Reú
  alternatives_spanish:
  - Reu
  lexicon: convención onomástica española
  rationale: Se conserva el nombre propio con transliteración habitual en español, con acento gráfico para reflejar la pronunciación llana en español.
- source_word: אַחֲרֵי הוֹלִידוֹ
  english_pob_choice: after he fathered
  chosen_spanish: después de haber engendrado a
  alternatives_spanish:
  - después de haber sido padre de
  - tras haber padreado a
  lexicon: HALOT
  rationale: La construcción indica posterioridad respecto del engendramiento. «Engendrar» preserva el sentido genealógico de ילד en hifil mejor que un genérico «tener» o una paráfrasis más débil.
- source_word: שֶׁבַע שָׁנִים וּמָאתַיִם שָׁנָה
  english_pob_choice: two hundred and seven years
  chosen_spanish: doscientos siete años
  alternatives_spanish:
  - siete años y doscientos años
  lexicon: HALOT
  rationale: Se sigue el orden idiomático español para los numerales compuestos, conservando el total exacto del hebreo.
- source_word: וַיּוֹלֶד
  english_pob_choice: he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - tuvo
  lexicon: HALOT
  rationale: En el contexto genealógico, ילד con sujeto masculino designa la paternidad biológica/ genealógica. «Engendró» es preciso y paralelo al uso de «fathered» en la POB inglesa.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - niños y niñas
  - descendientes
  lexicon: HALOT
  rationale: El hebreo distingue ambos sexos; en español, «hijos e hijas» mantiene esa precisión de manera natural y más cercana al registro bíblico que «descendientes».
theological_decisions:
- issue: Fórmula genealógica de longevidad y descendencia
  english_pob_reading: And Reu lived after he fathered Serug two hundred and seven years, and he fathered sons and daughters.
  chosen_spanish_reading: Y vivió Reú después de haber engendrado a Serug doscientos siete años[a], y engendró hijos e hijas.
  alternative_spanish_readings:
  - Y vivió Reú, después de engendrar a Serug, doscientos siete años, y engendró hijos e hijas.
  - Y Reú vivió luego de haber sido padre de Serug doscientos siete años, y tuvo hijos e hijas.
  rationale: No hay tensión doctrinal especial en el versículo; la decisión principal es preservar la fórmula genealógica con claridad. Se mantiene la secuencia de vida posterior al engendramiento y la mención explícita de descendencia masculina y femenina.
  doctrine_reference: Génesis 11:21; genealogías patriarcales como registro de continuidad familiar
- issue: Riesgo de ambigüedad sobre el alcance temporal de la frase
  english_pob_reading: two hundred and seven years
  chosen_spanish_reading: doscientos siete años[a]
  alternative_spanish_readings:
  - doscientos siete años después de haber engendrado a Serug
  - doscientos siete años, después de haber engendrado a Serug
  rationale: 'Se conserva la lectura principal de la POB inglesa: el periodo de 207 años es el tiempo vivido después del engendramiento. La nota ancla la alternativa de puntuación para reflejar la posibilidad sintáctica sin alterar el sentido.'
  doctrine_reference: Génesis 11:21; nota sintáctica de la fórmula genealógica
translation_notes:
  revision_awareness: La base inglesa fue revisada para mejorar la fluidez sintáctica sin cambiar el sentido; en español se refleja esa fluidez mediante una sola oración lineal. Se mantuvo la equivalencia numérica exacta y la fórmula genealógica estándar, evitando una traducción calcada del orden hebreo cuando resultaría menos natural en español.
  spanish_consistency_notes:
  - Se usa «Reú» como forma española convencional del nombre propio, coherente con transliteración bíblica en español.
  - Se mantiene «engendró» para ילד en contextos genealógicos, en paralelo al «fathered» inglés de la POB.
  - La referencia temporal se expresa con «después de haber engendrado» para conservar la relación aspectual del hebreo sin sobreexplicar.
  - «Hijos e hijas» traduce el binomio hebreo de manera precisa y no genérica.
