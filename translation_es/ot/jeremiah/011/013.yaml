base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/011/013.yaml
  text: For your gods[a], O Judah, have become as numerous as your cities; and as numerous as the streets of Jerusalem, you have set up altars to Shame[b], altars to burn incense to Baal.
  footnotes:
  - marker: a
    text: Hebrew 'to Shame,' a contemptuous substitute for a pagan deity, likely referring to Baal.
    reason: lexical_alternative
  - marker: b
    text: Or 'to burn incense to Baal.' The Hebrew verb often refers specifically to making a smoke offering.
    reason: lexical_alternative
