base_translation:
  language: en
  yaml_path: translation/ot/proverbs/008/006.yaml
  text: Listen[a], for I will speak noble things[b], and the opening of my lips will be upright things.
  footnotes:
  - marker: a
    text: Or 'excellent things' for 'noble things.' The Hebrew term is related to what is princely or noble, hence speech of high worth.
    reason: lexical_alternative
  - marker: b
    text: Or 'what is right' for 'upright things.' The Hebrew denotes straightness or uprightness in a moral sense.
    reason: lexical_alternative
