  text: וְ/לֹֽא עֲצָב֨/וֹ אָבִ֤י/ו מִ/יָּמָי/ו֙ לֵ/אמֹ֔ר מַדּ֖וּעַ כָּ֣כָה עָשִׂ֑יתָ וְ/גַם ה֤וּא טֽוֹב תֹּ֨אַר֙ מְאֹ֔ד וְ/אֹת֥/וֹ יָלְדָ֖ה אַחֲרֵ֥י אַבְשָׁלֽוֹם־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/001/006.yaml
  text: His father had never displeased him at any time by saying[a], “Why have you done thus?” He was also very handsome[b], and his mother had borne him after Absalom.
  footnotes:
  - marker: a
    text: Or “had never grieved him” or “had never rebuked him.” The Hebrew verb can denote causing pain or vexation; in context it refers to David’s failure to check or confront Adonijah.
    reason: lexical_alternative
  - marker: b
    text: Literally “from his days,” an idiom meaning “at any time in his life.”
    reason: lexical_alternative
