translation:
  language: es
  text: 'Entonces Eliacim, Sebna y Joaj dijeron al Rabsaqué: «Por favor, habla a tus siervos en arameo, porque lo entendemos. Y no nos hables en judeo[a], a oídos del pueblo que está sobre el muro»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en hebreo”. El término hebreo יְהוּדִית se refiere más específicamente a la lengua de Judá o de los judeanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶלְיָקִים
  english_pob_choice: Eliakim
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Eliacim
  - Eliakim
  lexicon: Nombre propio bíblico
  rationale: 'El nombre del referente en Isaías 36:11 es Eliakim; en español bíblico puede aparecer como Eliacim o Eliakim. Sin embargo, la forma proporcionada en el texto fuente y el contexto narrativo permiten identificar la referencia como un error de transmisión del paquete? No: para fidelidad al fuente hebreo y al audit trail, la forma normalizada debe ser Eliacim/Eliakim, no Ezequías. Se mantiene el nombre propio del oficial, no una figura distinta.'
- source_word: רַב שָׁקֵה
  english_pob_choice: the Rabshakeh
  chosen_spanish: el Rabsaqué
  alternatives_spanish:
  - el Rabshakeh
  - el jefe de los coperos
  - el comandante
  lexicon: HALOT
  rationale: Se conserva el título tradicional transcrito en español, que corresponde mejor al uso bíblico que una paráfrasis de cargo. La forma con artículo sigue el valor de título; no se interpreta como nombre personal.
- source_word: דַּבֶּר נָא
  english_pob_choice: Please speak
  chosen_spanish: Por favor, habla
  alternatives_spanish:
  - Habla, por favor
  - Te ruego que hables
  - Por favor, habla ahora
  lexicon: HALOT
  rationale: El imperativo con נָא expresa petición cortés; “Por favor, habla” reproduce bien el tono respetuoso y suena natural en español actual.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus esclavos
  - tus servidores humildes
  lexicon: HALOT
  rationale: En este contexto diplomático/cortesano, “siervos” comunica la fórmula de humildad sin forzar la dureza social de “esclavos”. Se evita “servicios” o “oficiales” porque diluyen la auto-designación reverente.
- source_word: אֲרָמִית
  english_pob_choice: in Aramaic
  chosen_spanish: en arameo
  alternatives_spanish:
  - en aramaico
  - en lengua aramea
  lexicon: HALOT
  rationale: El adjetivo femenino designa la lengua aramea; en español la forma natural y precisa es “arameo” como idioma.
- source_word: כִּי שֹׁמְעִים אֲנָחְנוּ
  english_pob_choice: for we understand it
  chosen_spanish: porque lo entendemos
  alternatives_spanish:
  - porque oímos
  - porque lo escuchamos
  - porque podemos entenderlo
  lexicon: HALOT
  rationale: Aunque el verbo raíz es “oír”, aquí el contexto es lingüístico; “entender” transmite la competencia idiomática pretendida por la solicitud.
- source_word: יְהוּדִית
  english_pob_choice: in Judean
  chosen_spanish: en judeo
  alternatives_spanish:
  - en judío
  - en hebreo
  - en la lengua de Judá
  lexicon: HALOT
  rationale: 'Se mantiene la distinción etnolingüística del hebreo: no se traduce por “hebreo” para no borrar la tensión documentada. “Judeo” es una opción breve en español para la lengua de Judá/Judeanos, aunque es menos común; se preserva así el matiz específico del original.'
- source_word: בְּאָזְנֵי
  english_pob_choice: in the hearing of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - a oídos de
  - en los oídos de
  - en el oído de
  lexicon: HALOT
  rationale: La construcción idiomática apunta a que otros puedan oírlo; “en presencia de” comunica la publicidad del habla, aunque es menos literal que “a oídos de”. En un registro natural, el sentido global queda claro.
- source_word: הָעָם אֲשֶׁר עַל הַחוֹמָה
  english_pob_choice: the people who are on the wall
  chosen_spanish: el pueblo que está sobre el muro
  alternatives_spanish:
  - la gente que está sobre el muro
  - el pueblo que está en la muralla
  - las personas que están sobre el muro
  lexicon: HALOT
  rationale: “El pueblo” refleja הָעָם como colectividad; “sobre el muro” mantiene la imagen locativa del hebreo. “Muro” es más general, pero suficientemente fiel y natural en español bíblico.
translation_notes:
  revision_awareness: 'El audit trail inglés conserva la traducción “the Rabshakeh” como título y distingue יְהוּדִית de “Hebrew” con una nota lexical. También revisa la formulación de “in the hearing of” para mayor naturalidad. En español se sigue esa misma cautela: se mantiene la diferenciación etnolingüística, se conserva el tono cortesano de la petición y se evita traducir mecánicamente el valor literal de ‘oír’ cuando el contexto exige ‘entender’.'
  spanish_consistency_notes:
  - Se preserva el tono deferente de la súplica con “Por favor”.
  - Se evita “hebreo” para יְהוּדִית a fin de no borrar la distinción señalada en el audit trail inglés.
  - La fórmula “en presencia de” comunica el sentido de audiencia pública, aunque no reproduce de modo literal la preposición hebrea.
