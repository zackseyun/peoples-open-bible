  spanish_quality_summary: 'El español es claro y natural. La sintaxis y el registro son apropiados. El único problema real es técnico-semántico: la nota al pie está anclada en el lugar equivocado, lo que confunde qué término recibe la alternativa. Conviene moverla a «ofrenda por el pecado».'
  glossary_alignment: No hay términos del glosario mayor en juego salvo חַטַּאת, y «ofrenda por el pecado» es aceptable como excepción documentada frente al inglés «sin offering», con la alternativa «ofrenda de purificación» preservada en nota. «Asamblea» para הַקָּהָל concuerda bien con el expediente inglés.
  issues:
