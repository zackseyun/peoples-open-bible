review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: el remanente de Jacob entre las naciones/pueblos, comparado con un león entre bestias y rebaños, con énfasis en su fuerza arrolladora y en la ausencia de rescatador. Sin embargo, hay dos desajustes notables con la evidencia fuente y el rastro POB: la nota [a] está anclada a «naciones» pero su contenido («O “bestias del bosque”») corresponde a otra expresión; y «pisa» debilita demasiado רמס, que en este contexto depredador pide algo como «pisotea» o «trampea/tritura».'
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico moderno. «Remanente», «en medio de muchos pueblos» y «no hay quien rescate» están bien logrados. No obstante, la nota [a] genera confusión textual al estar colocada en el lugar equivocado, y «como león» podría aceptarse, pero «como un león» suena algo más natural en prosa española sin perder dignidad. «Leoncillo» es defendible, aunque «león joven» sería más transparente; no es necesario cambiarlo.
  glossary_alignment: 'La terminología principal está alineada con las decisiones POB: «remanente», «naciones», «pueblos», «bestias», «rebaños de ovejas», «rescate». No hay conflictos con la glosa de nombres divinos o títulos. La principal corrección requerida es de fidelidad lexical en רמס («pisotea» mejor que «pisa») y de correspondencia exacta entre anclaje y nota al pie.'
  issues:
  - severity: high
    issue: La nota [a] está anclada a «naciones» pero el contenido de la nota se refiere a «bestias del bosque».
    rationale: Esto rompe la trazabilidad del aparato crítico y contradice la disciplina requerida de que cada nota aparezca exactamente en la frase pertinente del texto español.
  - severity: medium
    issue: «Pisa» para וְרָמַס atenúa la violencia del verbo.
    rationale: En la secuencia de depredación del hebreo, רמס comunica ‘pisotear/trampear bajo los pies’; «pisa» puede sonar demasiado neutro en español y pierde fuerza frente al inglés POB «tramples».
  - severity: low
    issue: La nota [b] omite «a pedazos» respecto de la alternativa inglesa documentada.
    rationale: No es un error grave, porque el texto principal usa «despedaza», pero la alternativa inglesa documentada era «tears to pieces»; en español conviene reflejar mejor esa expansión si se conserva la nota.
  revised_spanish_text: Y el remanente de Jacob estará entre las naciones, en medio de muchos pueblos, como un león entre las bestias del bosque[a], como leoncillo entre rebaños de ovejas, que, si pasa, pisotea y despedaza[b], y no hay quien rescate.
  revised_footnotes:
