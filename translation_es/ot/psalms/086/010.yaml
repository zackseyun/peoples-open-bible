lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación previa. En español, «Porque» conserva la fuerza causal y resulta natural en estilo poético bíblico.
- source_word: גָדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - poderoso
  - excelso
  lexicon: HALOT
  rationale: El adjetivo expresa grandeza general, de estatus o poder. «Grande» es la equivalencia más directa y transparente en español.
- source_word: וְעֹשֵׂה
  english_pob_choice: and do
  chosen_spanish: y haces
  alternatives_spanish:
  - y haces maravillas
  - y obras
  lexicon: HALOT
  rationale: El participio con vav expresa acción característica. «Haces» comunica en español una acción habitual y continua, sin volver la frase pesada.
- source_word: נִפְלָאוֹת
  english_pob_choice: wondrous things
  chosen_spanish: cosas maravillosas
  alternatives_spanish:
  - maravillas
  - obras maravillosas
  lexicon: HALOT
  rationale: El sustantivo plural describe actos extraordinarios que causan admiración. «Cosas maravillosas» mantiene el plural y el sentido de actos asombrosos sin imponer una terminología litúrgica fija.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  lexicon: HALOT
  rationale: Aunque la forma hebrea es morfológicamente plural, aquí se dirige al único Dios verdadero; por eso corresponde «Dios» en singular.
- source_word: לְבַדֶּךָ
  english_pob_choice: you alone
  chosen_spanish: tú solo
  alternatives_spanish:
  - solo tú
  - tú únicamente
  lexicon: HALOT
  rationale: La forma expresa exclusividad enfática con sufijo de segunda persona. «Tú solo» preserva esa prominencia en español y suena natural en la cláusula final.
theological_decisions:
- issue: Afirmación monoteísta exclusiva en la cláusula final
  english_pob_reading: you alone are God
  chosen_spanish_reading: tú solo eres Dios
  alternative_spanish_readings:
  - solo tú eres Dios
  - eres Dios tú solo
  rationale: Se conserva la exclusividad expresa de לְבַדֶּךָ sin añadir matices filosóficos. El orden «tú solo eres Dios» destaca la exclusión de cualquier otro ser como Dios.
  doctrine_reference: Afirmaciones; monoteísmo bíblico
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la lectura exclusiva «you alone are God» y ofrece como alternativa «you are God alone». La versión española refleja la lectura principal y conserva en nota la alternativa de orden más literal.
  spanish_consistency_notes:
  - Se mantiene «Dios» en singular para אֱלֹהִים por el contexto de adoración monoteísta.
  - Se evita «SEÑOR» porque el hebreo aquí usa אֱלֹהִים, no יהוה.
  - «Cosas maravillosas» preserva el plural de נִפְלָאוֹת y evita estrecharlo a un solo tipo de milagro.
