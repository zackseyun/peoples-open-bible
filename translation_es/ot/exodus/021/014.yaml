translation:
  language: es
  text: Pero si un hombre actúa deliberadamente[a] contra su prójimo para matarlo con engaño[b], lo quitarás de mi altar para que muera[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obra deliberadamente contra» o «actúa con presunción»; el verbo hebreo comunica acción voluntaria, intencional y culpable.
    reason: lexical_alternative
  - marker: b
    text: O «por perfidia» o «con astucia»; la expresión hebrea señala engaño, astucia y dolo.
    reason: lexical_alternative
  - marker: c
    text: Es decir, aun si busca refugio en el altar, debe ser retirado de allí para ejecución.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/כִי
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Mas si
  lexicon: HALOT
  rationale: La conjunción introduce un caso condicional contrastivo; «Pero si» reproduce bien la transición jurídica y el matiz adversativo sin sonar arcaico.
- source_word: יָזִד
  english_pob_choice: acts presumptuously against
  chosen_spanish: actúa con premeditación
  alternatives_spanish:
  - actúa con presunción
  - se ensoberbece contra
  - obra deliberadamente contra
  lexicon: HALOT
  rationale: El verbo expresa acción voluntaria, deliberada y culpable. En español legal y legible, «actúa con premeditación» comunica esa intención previa sin perder el peso del término.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: Se conserva el singular masculino del hebreo en estilo jurídico representativo. «Un hombre» mantiene la forma y funciona genéricamente en el contexto legal.
- source_word: עַל רֵעֵהוּ
  english_pob_choice: against his neighbor
  chosen_spanish: contra su prójimo
  alternatives_spanish:
  - contra su vecino
  - contra su semejante
  lexicon: HALOT
  rationale: «Prójimo» es la equivalencia española más natural para el valor comunitario de רֵעַ en un contexto ético-legal; conserva la relación interpersonal hostil sin trivializarla.
- source_word: לְהָרְגוֹ
  english_pob_choice: to kill him
  chosen_spanish: para matarlo
  alternatives_spanish:
  - para asesinarlo
  - para darle muerte
  lexicon: HALOT
  rationale: El infinitivo expresa la finalidad de matar; «para matarlo» sigue de cerca el valor básico de הרג sin importar prematuramente el veredicto jurídico de «asesinar».
- source_word: בְעָרְמָה
  english_pob_choice: by treachery
  chosen_spanish: por traición
  alternatives_spanish:
  - con engaño
  - con astucia
  - con dolo
  lexicon: HALOT
  rationale: La idea central es obrar con engaño, astucia o perfidia. «Por traición» transmite bien la carga moral y jurídica del acto en español, aunque «con engaño» queda como alternativa más literal.
- source_word: מֵעִם מִזְבְּחִי
  english_pob_choice: from my altar
  chosen_spanish: de mi altar
  alternatives_spanish:
  - de junto a mi altar
  - desde mi altar
  lexicon: HALOT
  rationale: El hebreo indica separación y alejamiento desde la cercanía del altar. «De mi altar» es breve, natural y fiel; la nota aclara el valor de refugio implícito en el contexto.
- source_word: תִּקָּחֶנּוּ
  english_pob_choice: you shall take him
  chosen_spanish: lo sacarás
  alternatives_spanish:
  - lo tomarás
  - lo quitarás
  - lo retirarás
  lexicon: HALOT
  rationale: En este contexto jurídico, el verbo implica retirar a la persona de la protección del altar. «Lo sacarás» expresa mejor la acción concreta requerida que un calco de «tomar».
- source_word: לָמוּת
  english_pob_choice: to die
  chosen_spanish: para morir
  alternatives_spanish:
  - para ser ejecutado
  - para que muera
  lexicon: HALOT
  rationale: El infinitivo marca resultado o destino; «para morir» conserva la forma y la sobriedad del mandato legal sin añadir especificaciones no presentes explícitamente en el hebreo.
theological_decisions:
- issue: Asilo en el altar para un homicida deliberado
  english_pob_reading: The verse denies sanctuary protection in cases of premeditated murder.
  chosen_spanish_reading: El altar no protege al que mata deliberadamente; debe ser retirado de allí para morir.
  alternative_spanish_readings:
  - El altar es simplemente el lugar desde donde se lo retira para juicio o ejecución.
  - El texto solo ordena sacar al culpable del altar, sin elaborar la doctrina del asilo.
  rationale: El contexto legal sugiere que el lugar sagrado no sirve de refugio para el homicida intencional. La redacción española conserva esa implicación sin sobreexplicarla.
  doctrine_reference: Éxodo 21:14; cf. el principio legal de que el santuario no anula la responsabilidad por homicidio premeditado.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión reciente del inglés POB: se prefirió una equivalencia española que refleje יָזִד como acción deliberada/premeditada, se evitó añadir énfasis no explicitado, y se mantuvo la idea de traición/engaño para בְעָרְמָה dentro de un registro jurídico sobrio.'
  spanish_consistency_notes:
  - Se preserva el tono legal del pasaje con verbos directos y una sintaxis clara.
  - «Prójimo» se usa para רֵעַ en sentido comunitario-ético, sin cambiar el referente.
  - «De mi altar» evita sobreinterpretar, pero la nota explica el trasfondo de refugio implícito.
  - No se introduce «Cristo», «Señor» ni otra terminología ajena al hebreo de este versículo.
  - Los marcadores [a], [b] y [c] aparecen exactamente en el texto y se corresponden uno a uno con sus notas.
