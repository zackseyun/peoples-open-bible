translation:
  language: es
  text: Los videntes serán avergonzados, y los adivinos serán humillados; todos ellos cubrirán su labio[a], porque no hay respuesta de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cubrirán su labio superior» o «cubrirán su bigote»; probablemente es un gesto de vergüenza, duelo o impureza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֹשׁוּ
  english_pob_choice: will be put to shame
  chosen_spanish: serán avergonzados
  alternatives_spanish:
  - se avergonzarán
  - serán puestos en vergüenza
  lexicon: HALOT
  rationale: בוש expresa vergüenza o ser avergonzado; en este juicio profético, el pasivo/resultativo español comunica bien el deshonor público sin volverlo una mera emoción interior.
- source_word: הַחֹזִים
  english_pob_choice: the seers
  chosen_spanish: los videntes
  alternatives_spanish:
  - los que ven visiones
  - los visionarios
  lexicon: HALOT
  rationale: חֹזִים designa a figuras visionarias. 'Videntes' conserva el valor técnico y suena natural en español bíblico contemporáneo.
- source_word: וְחָפְרוּ
  english_pob_choice: will be disgraced
  chosen_spanish: serán humillados
  alternatives_spanish:
  - serán avergonzados
  - serán deshonrados
  lexicon: HALOT
  rationale: חפר en este contexto puede expresar vergüenza o humillación pública. 'Humillados' mantiene el paralelo con la primera cláusula y el matiz de deshonra social.
- source_word: הַקֹּסְמִים
  english_pob_choice: the diviners
  chosen_spanish: los adivinos
  alternatives_spanish:
  - los que practican adivinación
  - los hechiceros
  lexicon: HALOT
  rationale: קסם se refiere específicamente a la adivinación. 'Adivinos' es directo y conserva la carga negativa del término en el contexto profético.
- source_word: וְעָטוּ עַל שָׂפָם
  english_pob_choice: will cover their lips
  chosen_spanish: cubrirán su labio
  alternatives_spanish:
  - cubrirán su labio superior
  - cubrirán su bigote
  lexicon: HALOT
  rationale: 'El hebreo es literalmente singular: ''su labio''. Mantener ''labio'' preserva la imagen; el gesto probable de duelo, vergüenza o impureza queda implícito sin resolverlo demasiado en el texto principal.'
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - cada uno de ellos
  lexicon: HALOT
  rationale: El sufijo pronominal refuerza la totalidad. 'Todos ellos' conserva esa énfasis de manera clara y natural.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: כִּי introduce la razón de la vergüenza. 'Porque' es el conector causal más claro en español moderno.
- source_word: אֵין מַעֲנֵה אֱלֹהִים
  english_pob_choice: there is no answer from God
  chosen_spanish: no hay respuesta de Dios
  alternatives_spanish:
  - no hay respuesta de parte de Dios
  - Dios no da respuesta
  lexicon: HALOT
  rationale: '''Respuesta'' traduce מַעֲנֵה de forma directa. ''De Dios'' mantiene la relación del constructo y evita suavizar la afirmación sobre el silencio divino.'
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  - lo divino
  lexicon: HALOT
  rationale: Aunque la forma es morfológicamente plural, aquí el sentido es singular y se refiere al Dios verdadero; 'Dios' es la equivalencia adecuada en español.
theological_decisions:
- issue: 'Cómo expresar el final de la frase: silencio divino o ausencia de una respuesta oracular válida'
  english_pob_reading: there is no answer from God
  chosen_spanish_reading: no hay respuesta de Dios
  alternative_spanish_readings:
  - Dios no da respuesta
  - no hay respuesta divina
  rationale: 'La formulación elegida preserva la tensión del hebreo: los practicantes son desenmascarados porque no reciben una respuesta real de Dios. No se añade explicación interpretativa al texto principal.'
  doctrine_reference: 'Translation philosophy: preservar la tensión teológica sin resolverla de más'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y coincide con la pauta auditada en inglés: vergüenza/deshonra para los videntes y adivinos, la imagen idiomática de cubrir el labio, y el cierre causal con la ausencia de respuesta de Dios. No se requirieron revisiones adicionales según el control cruzado.'
  spanish_consistency_notes:
  - Se usa 'Dios' en sentido singular conforme al contexto, aunque el hebreo tenga forma plural.
  - Se mantiene 'labio' en el texto principal para conservar la imagen hebrea; la nota recoge las alternativas anatómicas más precisas.
  - '''Videntes'' y ''adivinos'' conservan el registro bíblico y evitan sustituir el léxico profético por expresiones modernas menos exactas.'
