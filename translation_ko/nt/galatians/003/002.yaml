  text: 내가 여러분에게서 이것만은 알고 싶습니다. 여러분이 성령을 받은 것은 율법의 행위에 근거한 것입니까, 아니면 믿음으로 들음[a]에 근거한 것입니까?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「믿음의 들음」. 헬라어 ἀκοῆς πίστεως는 메시지를 믿음으로 받아들이는 행위를 가리킬 수 있다.
    reason: alternative_reading
