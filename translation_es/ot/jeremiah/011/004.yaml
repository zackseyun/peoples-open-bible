  to: 'que mandé a sus padres el día en que los saqué de la tierra de Egipto[a], del horno de hierro[c], diciendo: «Escuchen mi voz[b] y cumplan esas palabras, conforme a todo lo que les mando; y ustedes serán mi pueblo, y yo seré su Dios»'
