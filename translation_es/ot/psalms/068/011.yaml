revisions:
- from: Tus criaturas se establecieron en ella; en tu bondad[a], oh Dios, proveíste para el pobre.
  to: Tus criaturas se establecieron en ella; en tu bondad[a], Dios, preparaste provisión para el pobre.
  rationale: Se mantiene «tus criaturas» para conservar la ambigüedad del hebreo difícil, en línea con la revisión inglesa auditada. Se reemplaza «proveíste para el pobre» por «preparaste provisión para el pobre» para lograr un español natural y conservar mejor el trasfondo de כון (‘preparar/disponer’) junto con el sentido contextual de provisión. Se simplifica el vocativo a «Dios» para mayor fluidez en español.
