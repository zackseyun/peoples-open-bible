translation:
  language: es
  text: Y los persiguió hasta las ciudades de Ptolemaida; y cayeron de entre las naciones[b] unos tres mil hombres[a], y tomó sus despojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tres mil hombres», sin el matiz de aproximación; la construcción griega εἰς τρισχιλίους ἄνδρας puede leerse como total aproximado o como simple cuenta.
    reason: lexical_alternative
  - marker: b
    text: «De entre las naciones» alude a pueblos no israelitas en las fuerzas enemigas; algunas traducciones prefieren «de los gentiles».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδίωξεν
  english_pob_choice: pursued
  chosen_spanish: persiguió
  alternatives_spanish:
  - perseguió
  - dio caza a
  lexicon: BDAG
  rationale: En contexto militar, el verbo expresa la persecución del enemigo en retirada. «Persiguió» es natural en español y conserva la fuerza continua de la acción sin añadir interpretaciones.
- source_word: ἕως τῶν πόλεων Πτολεμαΐδος
  english_pob_choice: as far as the cities of Ptolemais
  chosen_spanish: hasta las ciudades de Ptolemaida
  alternatives_spanish:
  - hasta la ciudad de Ptolemaida
  - hasta las ciudades de Ptolemais
  lexicon: LSJ
  rationale: Se conserva el plural de πόλεων («ciudades») porque está explícito en el griego, aunque el referente geográfico exacto sea amplio o colectivo. «Ptolemaida» funciona como forma española del topónimo.
- source_word: ἔπεσον
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - cayeron en combate
  - murieron
  lexicon: BDAG
  rationale: En relato de batalla, el verbo se refiere a la caída de combatientes. «Cayeron» mantiene la imagen y el sobrio tono narrativo del griego.
- source_word: ἐκ τῶν ἐθνῶν
  english_pob_choice: from the nations
  chosen_spanish: de entre las naciones
  alternatives_spanish:
  - de las naciones
  - de entre los gentiles
  lexicon: BDAG
  rationale: La expresión señala procedencia o pertenencia dentro de los pueblos no israelitas. «De entre las naciones» preserva la referencia étnica amplia sin imponer una terminología eclesiástica posterior como «gentiles» en el texto principal.
- source_word: εἰς τρισχιλίους ἄνδρας
  english_pob_choice: about three thousand men
  chosen_spanish: unos tres mil hombres
  alternatives_spanish:
  - cerca de tres mil hombres
  - tres mil hombres
  lexicon: LSJ
  rationale: εἰς con numerales puede expresar total aproximado. «Unos tres mil hombres» transmite esa aproximación de manera natural en español y conserva el valor numérico del original.
- source_word: τὰ σκῦλα
  english_pob_choice: their spoils
  chosen_spanish: sus despojos
  alternatives_spanish:
  - el botín
  - sus botines
  lexicon: LSJ
  rationale: El término militar designa el botín tomado al enemigo. «Despojos» es un equivalente elevado y preciso; el posesivo refleja αὐτῶν.
theological_decisions:
- issue: Referencia étnica de ἐκ τῶν ἐθνῶν
  english_pob_reading: Refers to non-Israelite peoples in the opposing forces; some translations render this 'of the Gentiles.'
  chosen_spanish_reading: Se expresa como «de entre las naciones» para mantener el sentido étnico amplio.
  alternative_spanish_readings:
  - de los gentiles
  - de entre los pueblos
  rationale: En este versículo no hay una necesidad doctrinal especial, pero sí una carga histórica/étnica. La redacción evita trasladar automáticamente el lenguaje neotestamentario de «gentiles» a una forma que aquí puede ser más general y narrativa.
  doctrine_reference: No aplica una doctrina específica; decisión de precisión histórica y lexical.
translation_notes:
  revision_awareness: La versión inglesa auditada ajustó el orden de «about three thousand men from the nations fell» para reflejar mejor el griego sin perder naturalidad. La redacción española sigue esa decisión y mantiene el plural explícito de «ciudades de Ptolemaida», además de conservar el valor militar de «spoils/despojos».
  spanish_consistency_notes:
  - Se mantiene «Ptolemaida» como topónimo español, pero se preserva el plural «ciudades» por fidelidad al griego.
  - «Despojos» se usa en sentido bélico, no funerario.
  - «De entre las naciones» evita una equivalencia rígida con «gentiles» cuando el contexto histórico basta para la referencia.
