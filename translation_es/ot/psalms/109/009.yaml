review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido básico del hebreo: una imprecación/jussivo («Que ...») sobre los hijos y la esposa del hombre. También conserva adecuadamente el paralelismo entre «sin padre» y «viuda». Sin embargo, se aparta de la especificidad léxica documentada en el audit trail al traducir בָנָיו como «sus hijos» en vez de «sus hijos varones» o una solución que preserve mejor «sons».'
  spanish_quality_summary: El español es claro y digno, pero «sus hijos queden sin padre» puede leerse genéricamente y pierde la precisión masculina del hebreo subrayada por la POB inglesa. Además, «su esposa, viuda» es comprensible, pero «y su esposa quede viuda» suena más natural y mantiene mejor el paralelismo verbal con «queden».
  glossary_alignment: No hay términos del glosario mayor en juego salvo la necesidad de respetar la decisión léxica específica sobre בן = «sons». El borrador sigue bien la fuerza imprecatoria, pero no preserva del todo la especificidad de género documentada.
  issues:
  - severity: medium
    issue: בָנָיו se tradujo como «sus hijos» en vez de una forma que preserve «sons».
    rationale: El audit trail inglés decidió explícitamente «his sons» por precisión léxica y principio de exactitud de género. En español, «hijos» puede funcionar como genérico; por eso aquí conviene explicitar «hijos varones» en el texto o reconsiderar una alternativa igualmente precisa.
  - severity: low
    issue: «y su esposa, viuda» es menos natural que una construcción verbal paralela.
    rationale: Aunque no es incorrecto, «y su esposa quede viuda» suena más fluido y mantiene el paralelismo con «Que ... queden ...». También refleja mejor la fuerza jussiva sobre ambas cláusulas.
  revised_spanish_text: Que sus hijos varones queden sin padre[a], y su esposa quede viuda.
  revised_footnotes:
  - marker: a
    text: O «huérfanos». El hebreo puede denotar niños privados de padre; aquí «sin padre» encaja mejor con el paralelismo con «su esposa quede viuda».
    reason: lexical_alternative
