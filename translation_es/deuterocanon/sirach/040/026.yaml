translation:
  language: es
  text: La riqueza y la fuerza levantan el corazón[a], y por encima de ambas está el temor de Dios. En el temor de Dios no hay carencia, y no hay que buscar ayuda junto con él.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «más que ambas» o «mejor que ambas»; el hebreo dice literalmente «y de ambas», y en contexto expresa que el temor de Dios supera a la riqueza y la fuerza.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y no hay que buscar apoyo junto con él». El sentido es que el temor de Dios basta y no requiere un sostén añadido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חיל
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - riquezas
  - recursos
  lexicon: HALOT
  rationale: En este paralelismo con כח, el término apunta con naturalidad a medios materiales o posesiones. «Riqueza» conserva ese sentido y funciona bien junto a «fuerza» en español.
- source_word: כח
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - vigor
  - mighty
  lexicon: HALOT
  rationale: «Fuerza» es la equivalencia más directa y natural para ἰσχύς y para כח en este contexto sapiencial.
- source_word: יגדלו לב
  english_pob_choice: lift up the heart
  chosen_spanish: levantan el corazón
  alternatives_spanish:
  - ensanchan el corazón
  - engrandecen el corazón
  - exaltan el corazón
  lexicon: HALOT
  rationale: La imagen idiomática expresa elevación interior, ánimo o autosuficiencia. «Levantar el corazón» conserva la metáfora sin decidir excesivamente entre confianza legítima y orgullo.
- source_word: ומשניהם
  english_pob_choice: beyond both
  chosen_spanish: por encima de ambas
  alternatives_spanish:
  - más que ambas
  - mejor que ambas
  - por encima de las dos
  lexicon: HALOT
  rationale: La construcción comparativa hebrea y el paralelo griego expresan superioridad respecto de ambas realidades. «Por encima de ambas» es natural en español y mantiene el contraste.
- source_word: יראת אלהים
  english_pob_choice: the fear of God
  chosen_spanish: el temor de Dios
  alternatives_spanish:
  - el temor de Yahvé
  - la reverencia por Dios
  lexicon: HALOT
  rationale: El hebreo dice explícitamente «Dios», no el Nombre divino. «Temor de Dios» conserva el peso bíblico de la expresión; «reverencia» sería más débil y suavizaría la tensión sapiencial.
- source_word: מחסור
  english_pob_choice: lack
  chosen_spanish: carencia
  alternatives_spanish:
  - falta
  - deficiencia
  - necesidad
  lexicon: HALOT
  rationale: «Carencia» comunica bien el estado de insuficiencia o privación en español moderno y mantiene la fuerza de la afirmación negativa.
- source_word: ואין לבקש עמה משען
  english_pob_choice: and there is no need to seek support along with it
  chosen_spanish: y no hay que buscar con él ayuda
  alternatives_spanish:
  - y no hace falta buscar apoyo junto con él
  - y no es necesario buscar ayuda junto a él
  - y con él no se busca apoyo
  lexicon: HALOT
  rationale: La frase comunica que el temor de Dios basta por sí mismo y no requiere un sostén adicional. «Con él» reproduce bien la idea de עמה (‘con ella/con él’) sin volver la frase pesada.
theological_decisions:
- issue: יראת אלהים como categoría sapiencial de suficiencia y peso teológico
  english_pob_reading: the fear of God; in the fear of God there is no lack, and there is no need to seek support along with it
  chosen_spanish_reading: el temor de Dios; en el temor de Dios no hay carencia, y no hay que buscar con él ayuda
  alternative_spanish_readings:
  - la reverencia por Dios
  - el temor del Señor
  rationale: 'La expresión debe conservar su tensión bíblica: no es mero respeto, sino una disposición de awe, obediencia y dependencia reverente. También se mantiene la idea de suficiencia: el temor de Dios no necesita un apoyo añadido.'
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y no aplanar el lenguaje sapiencial.'
translation_notes:
  revision_awareness: 'La redacción sigue el hebreo base de Kahana y verifica con el paralelo griego: mantiene la coordinación «y», conserva la comparación de superioridad sobre riqueza y fuerza, y refleja la última cláusula como suficiencia sin introducir una oposición inexistente. La elección de «temor de Dios» responde al hebreo explícito אֱלֹהִים y al valor sapiencial del giro.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» en coherencia con el hebreo, no «Yahvé», porque el texto fuente dice אֱלֹהִים.
  - Se evitó «reverencia» como traducción principal para no debilitar la carga semántica de יראה en literatura sapiencial.
  - «Ayuda» se usa como equivalente natural de βοήθεια / משען, con nota para la lectura alternativa «apoyo».
  - La puntuación respeta la estructura de dos miembros del versículo y la relación aditiva, no adversativa, de la primera coordinación.
