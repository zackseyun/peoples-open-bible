revisions:
- from: ¡Mira![a] El guardián de Israel no dormita ni duerme.
  to: ¡Mira[a], el guardián de Israel no dormita ni duerme.
  rationale: Se hace una reparación menor de puntuación/registro para que la línea suene más natural en español digno y moderno sin perder la fuerza deíctica de הִנֵּה. Se conserva «guardián» y la distinción «dormita / duerme», y se normaliza la nota al pie.
