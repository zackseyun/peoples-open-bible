revisions:
- from: ¿Quién podrá contar la fuerza de su majestad? ¿Y quién podrá seguir[a] narrando plenamente sus misericordias?
  to: ¿Quién podrá contar el poderío de su majestad? ¿Y quién podrá relatar plenamente sus misericordias?[a]
  rationale: Se ajusta el texto principal para seguir mejor la decisión auditada del inglés («fully recount») y mejorar la naturalidad del español. Se conserva en nota el modismo griego de continuidad. También se cambia «fuerza» por «poderío» para reflejar mejor κράτος en un registro elevado y natural.
