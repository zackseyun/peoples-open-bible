translation:
  language: es
  text: Y ha perecido la escapatoria de los pastores[b], y la liberación de los señores[a] del rebaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y la escapatoria de los poderosos del rebaño».
    reason: lexical_alternative
  - marker: b
    text: «Pastores» y «rebaño» son metáforas proféticas para los líderes del pueblo y quienes están bajo su autoridad.
    reason: cultural_note
lexical_decisions:
- source_word: וְאָבַד
  english_pob_choice: has perished
  chosen_spanish: perecerá
  alternatives_spanish:
  - ha perecido
  - desaparecerá
  lexicon: HALOT
  rationale: El perfecto hebreo en este anuncio profético expresa una ruina cierta y presentada con fuerza de cumplimiento; en español, el futuro profético «perecerá» comunica esa certidumbre con naturalidad y solemnidad. «Ha perecido» sería más cercano al tiempo verbal, pero suena menos natural en este contexto oracular.
- source_word: מָנוֹס
  english_pob_choice: escape
  chosen_spanish: escape
  alternatives_spanish:
  - huida
  - refugio
  lexicon: HALOT
  rationale: «Escape» mantiene la abstracción del sustantivo hebreo y el paralelismo con «liberación». «Huida» introduce más la acción de huir que la posibilidad o salida de escape; «refugio» se aparta del sentido aquí.
- source_word: מִן הָרֹעִים
  english_pob_choice: from the shepherds
  chosen_spanish: de los pastores
  alternatives_spanish:
  - entre los pastores
  - de los dirigentes
  lexicon: HALOT
  rationale: Se conserva la metáfora pastoral del hebreo, como hace la POB inglesa. «De los pastores» reproduce la relación de origen/separación de מן. «Dirigentes» explicitaría la referencia, pero perdería la imagen profética.
- source_word: וּפְלֵיטָה
  english_pob_choice: deliverance
  chosen_spanish: la liberación
  alternatives_spanish:
  - escape
  - salvación
  lexicon: HALOT
  rationale: El sustantivo puede significar escape o liberación; aquí, en paralelo con מָנוֹס, conviene variar la expresión sin perder el sentido de no haber salida. «Liberación» comunica bien la ausencia de rescate posible. «Salvación» sería demasiado teológica y más amplia que el contexto inmediato.
- source_word: מֵאַדִּירֵי הַצֹּאן
  english_pob_choice: from the lords of the flock
  chosen_spanish: de los señores del rebaño
  alternatives_spanish:
  - de los poderosos del rebaño
  - de los nobles del rebaño
  lexicon: HALOT
  rationale: «Señores» refleja la idea de los poderosos/magnates implicada en אַדִּירִים y preserva el tono de jerarquía sin sustituir la metáfora. «Del rebaño» conserva צֹאן sin reinterpretarlo como pueblo en el texto principal. «Poderosos» o «nobles» son posibles, pero menos directos en español.
theological_decisions:
- issue: Preservación de la metáfora pastoral para líderes y subordinados
  english_pob_reading: Preserve the pastoral metaphor in the main text ('shepherds' ... 'lords of the flock')
  chosen_spanish_reading: Mantener «pastores» y «rebaño» en el texto principal
  alternative_spanish_readings:
  - Explicitar «gobernantes» y «pueblo» en el texto principal
  rationale: La línea hebrea usa imagen pastoral sostenida; la POB inglesa decidió no desglosarla en términos políticos. En español, conservar la metáfora evita introducir una glosa interpretativa y respeta la textura profética del pasaje.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se siguió el estado más reciente del texto fuente inglés, donde no hubo cambios en la revisión más reciente y el acuerdo de revisión fue alto. La versión española refleja esa estabilidad y conserva las decisiones léxicas auditadas sin añadir reinterpretaciones.
  spanish_consistency_notes:
  - Se evita «SEÑOR» y cualquier sustitución no motivada del léxico fuente; no aplica Yahvé en este versículo.
  - Se mantiene la paralelidad nominal con «escape / liberación» para reflejar los dos sustantivos hebreos.
  - La metáfora pastoral se conserva de forma consistente entre «pastores» y «rebaño».
