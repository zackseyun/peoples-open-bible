  yaml_path: translation/ot/psalms/106/043.yaml
  text: Many times he delivered them[b][a], but they rebelled in their counsel and were brought low by their iniquity.
  footnotes:
  - marker: a
    text: Or 'rebelled in their plan/counsel.' The Hebrew can emphasize either their rebellious action or their rebellious disposition, and עֵצָה may mean 'counsel,' 'plan,' or 'purpose.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they sank down' or 'they wasted away by their iniquity.' The Hebrew verb can denote being brought low, collapsing, or wasting away.
    reason: lexical_alternative
