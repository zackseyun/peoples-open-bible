translation:
  language: es
  text: Entonces José cayó sobre el rostro de su padre[a], lloró por él y lo besó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cayó sobre la faz de su padre», preservando de forma más literal la imagen física vívida del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֹּל
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - se lanzó
  - se desplomó
  lexicon: HALOT
  rationale: El hebreo narra una acción completa en pasado; «cayó» conserva la sencillez y la inmediatez del movimiento sin añadir intensidad interpretiva que el texto no exige.
- source_word: עַל פְּנֵי אָבִיו
  english_pob_choice: on his father's face
  chosen_spanish: sobre el rostro de su padre
  alternatives_spanish:
  - sobre la cara de su padre
  - sobre el rostro de su padre
  lexicon: HALOT
  rationale: «Rostro» mantiene la imagen concreta del hebreo y su dignidad formal. «Sobre» comunica bien la posición física sin suavizar la escena a una mera señal emocional.
- source_word: וַיֵּבְךְּ עָלָיו
  english_pob_choice: wept over him
  chosen_spanish: lloró sobre él
  alternatives_spanish:
  - lloró por él
  - lloró sobre su cuerpo
  lexicon: HALOT
  rationale: El verbo בכה es «llorar». En español, «lloró sobre él» conserva la cercanía física y la escena de duelo del hebreo; «por él» explicita el motivo pero pierde parte de la imagen espacial.
- source_word: וַיִּשַּׁק לוֹ
  english_pob_choice: kissed him
  chosen_spanish: lo besó
  alternatives_spanish:
  - le besó
  - lo besó
  lexicon: HALOT
  rationale: נשק se traduce naturalmente como «besar». «Lo besó» expresa el objeto directo más natural en español moderno y mantiene la sencillez del original.
translation_notes:
  revision_awareness: 'Coincide con el sentido y la imagen física del texto hebreo, en línea con la traducción inglesa auditada. La principal adaptación al español fue mantener la escena concreta con orden natural: sujeto-verbo-complementos, sin añadir explicaciones ni suavizar el duelo.'
  spanish_consistency_notes:
  - Se mantiene José como transliteración estándar del nombre propio.
  - 'Se conserva el paralelismo verbal de tres acciones consecutivas: cayó, lloró, besó.'
  - El marcador de nota al pie se ubica en el último verbo para señalar la alternativa formal sobre toda la imagen de la primera cláusula.
