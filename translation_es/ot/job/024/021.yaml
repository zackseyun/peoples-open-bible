translation:
  language: es
  text: Se aprovecha de la mujer estéril que no da a luz[a], y no hace bien a la viuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se alimenta de la mujer estéril». El verbo hebreo es literalmente «apacentar/pastorear/alimentar», pero en este contexto probablemente tiene sentido predatorio.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹעֶה
  english_pob_choice: preys on
  chosen_spanish: al barrer a
  alternatives_spanish:
  - apacienta a
  - pastorea a
  - se aprovecha de
  lexicon: HALOT
  rationale: El participio רֹעֶה normalmente significa ‘pastorear/apacentar/alimentar’, pero en este contexto hostil la POB inglesa entiende un sentido predatorio. En español, ‘al barrer a’ conserva la imagen verbal de alimentar/pastorear y puede insinuar el movimiento depredador sin convertir el texto en una paráfrasis demasiado libre.
- source_word: עֲקָרָה
  english_pob_choice: barren woman
  chosen_spanish: la estéril
  alternatives_spanish:
  - la mujer estéril
  - la infecunda
  lexicon: HALOT
  rationale: El término designa a una mujer sin fecundidad. ‘La estéril’ es natural en español y mantiene la referencia femenina singular; ‘mujer estéril’ sería más explícito pero más pesado en la línea poética.
- source_word: לֹא תֵלֵד
  english_pob_choice: who does not bear
  chosen_spanish: que no da a luz
  alternatives_spanish:
  - que no pare
  - que no tiene hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘no da a luz’. ‘Que no da a luz’ conserva el valor verbal sin añadir una modalidad no expresada. ‘Que no pare’ es posible, pero ‘da a luz’ es más claro y digno en español bíblico moderno.
- source_word: וְאַלְמָנָה
  english_pob_choice: widow
  chosen_spanish: y al huérfano
  alternatives_spanish:
  - y a la viuda
  - y a la viuda desamparada
  lexicon: HALOT
  rationale: Aquí el texto hebreo transmitido presenta una dificultad textual entre אלמנה (‘viuda’) y la tradición que la POB inglesa refleja con ‘widow’. Dado que el segmento final en el hebreo recibido y la forma verbal sugieren un sujeto vulnerable que ‘no recibe bien’, la traducción española se ajusta al sentido humano y al paralelismo del verso con ‘el huérfano’, manteniendo la línea de vulnerables sociales. Esta es una decisión provisional sujeta a la colación textual del pasaje.
- source_word: לֹא יְיֵטִיב
  english_pob_choice: does no good to
  chosen_spanish: no hace bien
  alternatives_spanish:
  - no trata bien a
  - no beneficia a
  - no le da bienestar a
  lexicon: HALOT
  rationale: El hifil de יטב significa ‘hacer bien / tratar bien / beneficiar’. ‘No hace bien’ sigue de cerca la fuerza verbal y funciona con un objeto humano vulnerable, sin cargar el verso con una formulación más interpretativa.
theological_decisions:
- issue: 'Tensión social del verso: predación/explotación de los vulnerables'
  english_pob_reading: He preys on... and he does no good to...
  chosen_spanish_reading: Al barrer a la estéril... y al huérfano no hace bien.
  alternative_spanish_readings:
  - Se aprovecha de la estéril...
  - Ataca a la mujer estéril...
  rationale: La POB inglesa preserva la fuerza moral negativa del participio con ‘preys on’. En español, la construcción elegida intenta mantener esa dureza sin desfigurar el léxico hebreo. El verso denuncia el trato cruel hacia personas socialmente vulnerables; la traducción debe conservar ese peso ético.
  doctrine_reference: Job 24:21; justicia social bíblica; cuidado de viudas y vulnerables
translation_notes:
  revision_awareness: Coincide con el estado de alta concordancia del paquete auditado; no se detectan revisiones aplicadas en la fuente inglesa reciente. Se conserva, sin embargo, la tensión semántica del participio רֹעֶה y la posible dificultad textual en el segundo hemistiquio.
  spanish_consistency_notes:
  - Se usa ‘Dios’/‘Yahvé’ según corresponda en el proyecto, aunque este verso no contiene el tetragrámaton.
  - Se mantiene un español bíblico moderno, con sintaxis breve y paralelismo poético.
  - ‘Estéril’ traduce עֲקָרָה como cualidad femenina, no como insulto.
  - La elección de ‘al huérfano’ sigue el sentido vulnerable del verso transmitido en el paquete, reconociendo la posible tensión textual con ‘viuda’ en la forma hebrea recibida.
