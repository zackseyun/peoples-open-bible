translation:
  language: es
  text: 'Diles: «Así dice el Señor Dios Yahvé: “Miren, yo estoy tomando el palo de José, el que está en la mano de Efraín, y las tribus de Israel unidas con él[a]; y las pondré con él[b], con el palo de Judá, y las haré un solo palo, y serán uno en mi mano”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las tribus de Israel, sus compañeras» o «las tribus de Israel asociadas con él». El hebreo probablemente se refiere a las tribus vinculadas con José/Efraín.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «las pondré sobre él, con el palo de Judá». La expresión describe simbólicamente la unión de los dos palos en uno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר אֲלֵהֶם
  english_pob_choice: tell them
  chosen_spanish: Habla a ellos
  alternatives_spanish:
  - Diles
  - Háblales
  lexicon: HALOT
  rationale: El imperativo profético de דבר con אל introduce un mandato de comunicación directa. 'Habla a ellos' conserva el tono de orden y evita una paráfrasis más interpretativa.
- source_word: כֹה אָמַר אֲדֹנָי יְהוִה
  english_pob_choice: Thus says the Lord GOD
  chosen_spanish: Así dice el Señor Yahvé
  alternatives_spanish:
  - Así dice el Señor Dios
  - Así habla el Señor Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética estándar y, conforme al criterio del proyecto, se usa 'Yahvé' para יְהוִה en el texto principal, en vez de la convención de ocultarlo como 'SEÑOR'.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - He aquí
  - Miren, pues
  lexicon: HALOT
  rationale: La interjección solemnemente deíctica se vuelve a un español natural y directo. 'Miren' conserva la función de llamar la atención sin sonar arcaico.
- source_word: לֹקֵחַ
  english_pob_choice: I am taking
  chosen_spanish: yo estoy tomando
  alternatives_spanish:
  - yo tomo
  - voy a tomar
  lexicon: HALOT
  rationale: El participio con הִנֵּה expresa acción viva e inminente; el presente progresivo comunica bien esa inmediatez en español.
- source_word: עֵץ
  english_pob_choice: stick
  chosen_spanish: palo
  alternatives_spanish:
  - vara
  - madero
  - pedazo de madera
  lexicon: HALOT
  rationale: En este signo simbólico no se trata de un árbol, sino de un objeto de madera. 'Palo' es claro en español y conserva la referencia material del signo; se evita 'árbol' por incorrecto y 'vara' por más marcado.
- source_word: עֵץ יוֹסֵף
  english_pob_choice: the stick of Joseph
  chosen_spanish: el palo de José
  alternatives_spanish:
  - el palo de Joséf
  - el palo que representa a José
  lexicon: HALOT
  rationale: Se traduce el sintagma constructo de manera simple y fiel. 'José' es el equivalente español de יוֹסֵף.
- source_word: אֲשֶׁר בְּיַד אֶפְרַיִם
  english_pob_choice: which is in the hand of Ephraim
  chosen_spanish: el que está en la mano de Efraín
  alternatives_spanish:
  - el que pertenece a Efraín
  - el que lleva Efraín
  lexicon: HALOT
  rationale: '''En la mano de'' conserva la imagen literal del hebreo y el vínculo con la repetición final de ''mi mano''.'
- source_word: וְשִׁבְטֵי יִשְׂרָאֵל חברו
  english_pob_choice: and the tribes of Israel associated with him
  chosen_spanish: las tribus de Israel unidas con él
  alternatives_spanish:
  - las tribus de Israel asociadas con él
  - las tribus de Israel, sus compañeras
  lexicon: HALOT
  rationale: La forma חברו es ambigua entre 'asociados' y 'unidos/juntos'. Se escoge 'unidas con él' para reflejar la relación tribal sin forzar una lectura demasiado técnica en español. Se conserva la tensión semántica con el origen hebreo.
- source_word: וְנָתַתִּי אוֹתָם עָלָיו
  english_pob_choice: and I will place them with it
  chosen_spanish: y las pondré con él
  alternatives_spanish:
  - y las pondré sobre él
  - y las uniré a él
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'poner sobre él'; en español, 'con él' comunica la acción de juntar los signos sin introducir una imagen menos natural. El referente plural se entiende por el contexto de las tribus.
- source_word: אֶת עֵץ יְהוּדָה
  english_pob_choice: with the stick of Judah
  chosen_spanish: con el palo de Judá
  alternatives_spanish:
  - con el palo de Judá, es decir
  - junto con el palo de Judá
  lexicon: HALOT
  rationale: Se mantiene la coordinación del gesto simbólico y el paralelismo con la primera vara.
- source_word: וַעֲשִׂיתִם לְעֵץ אֶחָד
  english_pob_choice: and make them one stick
  chosen_spanish: y las haré un solo palo
  alternatives_spanish:
  - y las convertiré en un solo palo
  - y las haré un palo solo
  lexicon: HALOT
  rationale: עשה + ל expresa 'hacer en/como'. 'Un solo palo' transmite el resultado unitario del acto simbólico en español natural.
- source_word: וְהָיוּ אֶחָד בְּיָדִי
  english_pob_choice: and they will be one in my hand
  chosen_spanish: y serán uno en mi mano
  alternatives_spanish:
  - y estarán unidos en mi mano
  - y llegarán a ser uno en mi mano
  lexicon: HALOT
  rationale: Se conserva la imagen final de la mano divina y la predicación de unidad en singular.
theological_decisions:
- issue: Renderizado del nombre divino יְהוִה en la fórmula profética
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - el Señor Yahvé
  rationale: Se sigue el principio del proyecto de traducir יְהוִה como 'Yahvé' en el texto principal. 'Señor Yahvé' mantiene la solemnidad de אֲדֹנָי y preserva el nombre propio divino sin la convención de enmascararlo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La versión inglesa auditada se mantuvo sin cambios en la última revisión; el presente borrador sigue esa línea, pero adapta la terminología al criterio español del proyecto: יְהוִה se vierte como ''Yahvé'' y עֵץ se conserva como un objeto de madera simbólico (''palo''), manteniendo la tensión literal del gesto y la repetición de ''mano''.'
  spanish_consistency_notes:
  - Se ha preferido 'Yahvé' en el texto principal para יְהוִה, conforme al estándar español del proyecto.
  - Se ha conservado 'palo' para עֵץ en este contexto simbólico, en coherencia con la imaginería de los dos signos unidos.
  - La cláusula de 'en la mano' se mantiene literal para conservar el paralelismo interno del versículo.
  - '''José'' y ''Judá'' se presentan en sus formas españolas usuales, sin glosas adicionales.'
  - La nota [a] recoge una alternativa natural ('Diles'/'Háblales') sin alterar el mandato profético.
