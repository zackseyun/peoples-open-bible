translation:
  language: es
  text: Y vio que la plata se había agotado en las tesorerías, y que los ingresos de la tierra eran pocos a causa de la disensión y de la calamidad que había traído sobre la tierra[a], al quitar las ordenanzas[b] que habían existido desde los días antiguos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que había infligido sobre la tierra». El griego también puede expresar con más fuerza la idea de una aflicción o daño impuesto sobre la tierra.
    reason: lexical_alternative
  - marker: b
    text: O «las leyes establecidas» o «las costumbres ancestrales». El griego se refiere a normas u ordenanzas de larga tradición que estaban en vigor desde tiempos anteriores.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέλιπεν
  english_pob_choice: had run out
  chosen_spanish: se había agotado
  alternatives_spanish:
  - se había acabado
  - se había extinguido
  - se había consumido
  lexicon: LSJ
  rationale: El verbo expresa agotamiento o falta consumada. «Se había agotado» comunica bien el aspecto perfecto y suena natural en español contemporáneo.
- source_word: τὸ ἀργύριον
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  - el metal precioso
  lexicon: LSJ
  rationale: La imagen literal es «plata»; en contexto alude a fondos del tesoro. Mantener la concreción del término preserva la fuerza del griego.
- source_word: τῶν θησαυρῶν
  english_pob_choice: the treasuries
  chosen_spanish: de los tesoros
  alternatives_spanish:
  - de los tesoros reales
  - de las arcas
  lexicon: LSJ
  rationale: El plural griego se conserva con una expresión natural. «Tesoros» comunica el sentido de depósitos de riqueza sin introducir especificación no explicitada.
- source_word: οἱ φόροι
  english_pob_choice: the revenues
  chosen_spanish: los ingresos
  alternatives_spanish:
  - los tributos
  - las rentas
  lexicon: LSJ
  rationale: φόροι puede abarcar ingresos fiscales; «ingresos» refleja el sentido amplio adoptado por la POB en inglés y evita reducirlo solo a «impuestos».
- source_word: ὀλίγοι
  english_pob_choice: were few
  chosen_spanish: eran pocos
  alternatives_spanish:
  - eran escasos
  - eran exiguos
  lexicon: LSJ
  rationale: La construcción predicativa se traduce de forma directa. «Eran pocos» mantiene la cuantificación reducida sin sobreinterpretar.
- source_word: χάριν τῆς διχοστασίας
  english_pob_choice: because of the dissension
  chosen_spanish: a causa de la disensión
  alternatives_spanish:
  - a causa de la división
  - por la discordia civil
  lexicon: LSJ
  rationale: χάριν con genitivo expresa causa. «Disensión» preserva el matiz de ruptura/discordia que la POB inglesa decidió explicitar.
- source_word: πληγῆς
  english_pob_choice: the calamity
  chosen_spanish: la calamidad
  alternatives_spanish:
  - el golpe
  - la plaga
  - la herida
  lexicon: LSJ
  rationale: En este contexto πληγή tiene el valor de aflicción o desastre. «Calamidad» refleja la decisión revisada de la POB inglesa y evita una imagen demasiado literal que sonaría extraña aquí.
- source_word: κατεσκεύασεν ἐπὶ τὴν γῆν
  english_pob_choice: had brought upon the land
  chosen_spanish: había traído sobre la tierra
  alternatives_spanish:
  - había infligido sobre la tierra
  - había causado a la tierra
  lexicon: LSJ
  rationale: La construcción expresa causar/traer algo sobre el territorio. «Había traído sobre la tierra» sigue de cerca la imagen del griego.
- source_word: τοῦ ἆραι
  english_pob_choice: by removing
  chosen_spanish: al quitar
  alternatives_spanish:
  - al remover
  - para quitar
  lexicon: LSJ
  rationale: El infinitivo articular explica el medio o la circunstancia del daño. «Al quitar» conserva la relación causal con un español fluido.
- source_word: τὰ νόμιμα
  english_pob_choice: the ordinances
  chosen_spanish: los ordenamientos
  alternatives_spanish:
  - las ordenanzas
  - las leyes establecidas
  - los decretos
  lexicon: LSJ
  rationale: El término puede referirse a normas establecidas o disposiciones legales/costumbristas. «Ordenamientos» mantiene dignidad y amplitud semántica, en línea con la revisión inglesa a «ordinances».
- source_word: ἀφʼ ἡμερῶν τῶν πρώτων
  english_pob_choice: from former days
  chosen_spanish: desde los días antiguos
  alternatives_spanish:
  - desde tiempos antiguos
  - desde los primeros días
  - desde antaño
  lexicon: LSJ
  rationale: La frase indica una antigüedad establecida. «Desde los días antiguos» es claro, reverente y fiel al sentido de larga tradición.
translation_notes:
  revision_awareness: He seguido la revisión más reciente del audit trail inglés, que prefiere «revenues»/«ingresos», «dissension»/«disensión», «calamity»/«calamidad» y «ordinances»/«ordenamientos». La versión española refleja esas decisiones sin perder la literalidad básica del griego.
  spanish_consistency_notes:
  - Se mantiene «plata» para ἀργύριον por consistencia con la imagen concreta del tesoro.
  - Se usa «la tierra» para χώρα, en vez de una paráfrasis geopolítica más explícita, porque el contexto permite un referente territorial amplio.
  - «Ordenamientos» conserva el rango semántico de νόμιμα sin borrar la tensión entre ley escrita y costumbre ancestral.
  - Las notas a pie distinguen entre una lectura causal amplia y una traducción más directa de la frase participial final.
