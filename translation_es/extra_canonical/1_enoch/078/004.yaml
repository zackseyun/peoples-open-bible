translation:
  language: es
  text: En el disco del sol hay siete porciones de luz que se le añaden más que a la luna[a][b], y en medida se añaden hasta que se completa la séptima porción del sol[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La sintaxis ge'ez es difícil. La línea puede entenderse como que el sol excede a la luna por siete porciones medidas de luz, aunque la cláusula final también puede leerse como «hasta que se completa la séptima porción» o «se supera».
    reason: textual_variant
  - marker: b
    text: 'O: «más allá de la luna».'
    reason: previous_rendering
  - marker: c
    text: El ge'ez usa un ordinal, «séptima», no una expresión fraccional como «una séptima parte».
    reason: lexical_note
lexical_decisions:
- source_word: በክበበ
  english_pob_choice: in the disk of
  chosen_spanish: en el disco de
  alternatives_spanish:
  - en el círculo de
  - en la órbita de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto astronómico, ክበብ puede referirse a la forma circular o al cuerpo redondo del luminar. «Disco» conserva la imagen física del sol como cuerpo circular y sigue la revisión auditada que corrigió la lectura meramente de trayectoria.
- source_word: ፀሐይ
  english_pob_choice: the sun
  chosen_spanish: el sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la equivalencia estándar y clara para el astro en este pasaje.
- source_word: ሰብዓቱ ክፍለ ብርሃን
  english_pob_choice: seven portions of light
  chosen_spanish: siete porciones de luz
  alternatives_spanish:
  - siete partes de luz
  - siete divisiones de luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Porciones» mantiene el valor cuantitativo y esquemático de ክፍል mejor que una paráfrasis más libre; «luz» corresponde directamente a ብርሃን.
- source_word: ዘይትዌሰክ ቦቱ
  english_pob_choice: which are added to it
  chosen_spanish: que se le añaden
  alternatives_spanish:
  - que se le aumentan
  - que se agregan a él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción expresa incremento/adición. En español, el dativo «se le añaden» conserva el movimiento de adición sin forzar la sintaxis.
- source_word: እምወርኅ
  english_pob_choice: beyond the moon
  chosen_spanish: más que a la luna
  alternatives_spanish:
  - más allá de la luna
  - por encima de la luna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada señaló que እም funciona aquí comparativamente, no espacialmente. En español, «más que a la luna» expresa con precisión la comparación de cantidad/luminosidad y evita una imagen espacial engañosa.
- source_word: መስፈርት
  english_pob_choice: in measure
  chosen_spanish: en medida
  alternatives_spanish:
  - por medida
  - según medida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «En medida» conserva el tono técnico y regulado del texto, indicando aumento ordenado y medido.
- source_word: ትትወደይ
  english_pob_choice: they are added
  chosen_spanish: se añaden
  alternatives_spanish:
  - aumentan
  - se incrementan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición de la idea de adición en el versículo se preserva con la misma raíz semántica en español para reflejar el estilo esquemático del original.
- source_word: እስከ የሐልፍ
  english_pob_choice: until ... is completed
  chosen_spanish: hasta que se completa
  alternatives_spanish:
  - hasta que se pasa
  - hasta que se supera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La decisión auditada favorece «is completed». En español, «se completa» comunica el cierre o culminación del séptimo tramo sin introducir una metáfora distinta.
- source_word: ሳብዕ ክፍለ ፀሐይ
  english_pob_choice: the seventh portion of the sun
  chosen_spanish: la séptima porción del sol
  alternatives_spanish:
  - la porción séptima del sol
  - la séptima parte del sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Séptima porción» refleja el ordinal, no una fracción matemática («a seventh»), siguiendo la corrección auditada sobre ሳብዕ.
theological_decisions:
- issue: Registro cosmológico antiguo
  english_pob_reading: Render the statement as an ancient schematic description of luminary brightness and measure, without modernizing or allegorizing it.
  chosen_spanish_reading: Mantener el pasaje como una descripción esquemática antigua de brillo y medida, sin modernizarla ni convertirla en alegoría.
  alternative_spanish_readings:
  - Leerlo como símbolo puro
  - Reformularlo en terminología astronómica moderna
  rationale: El Libro Astronómico presenta el orden de los cuerpos celestes en lenguaje apocalíptico medido. La traducción debe conservar ese registro y su precisión antigua.
  doctrine_reference: Poética cosmológica del texto; principio de preservar el mundo conceptual del original sin armonización moderna.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada más reciente: se prefirió una lectura comparativa de እም («más que a la luna») y se adoptó el ordinal «séptima» para ሳብዕ. También se atendió la corrección léxica que favorece el sentido físico de ክበብ como «disco» en este contexto.'
  spanish_consistency_notes:
  - Se mantiene «sol» y «luna» sin mayúsculas honoríficas, conforme al registro astronómico del pasaje.
  - Se conservó la repetición de «se añaden / se añaden» para reflejar el paralelismo y la estructura cuantitativa del original.
  - «Disco» se usa aquí en sentido geométrico/cósmico, no técnico moderno, para seguir el mundo conceptual del Libro Astronómico.
