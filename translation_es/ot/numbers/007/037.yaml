translation:
  language: es
  text: Su ofrenda fue un plato[a] de plata; su peso era de ciento treinta siclos; una vasija[b] de plata de setenta siclos, según el siclo del santuario[c]. Ambos estaban llenos de flor de harina mezclada con aceite, para una ofrenda de grano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuente» o «cuenco»; el hebreo קַעֲרָה puede referirse más ampliamente a un plato, cuenco o recipiente poco profundo.
    reason: lexical_alternative
  - marker: b
    text: O «cuenco de aspersión»; el hebreo מִזְרָק nombra una vasija cultual que en otros contextos se asocia con la aspersión.
    reason: lexical_alternative
  - marker: c
    text: Es decir, conforme al peso estándar del santuario.
    reason: cultural_note
lexical_decisions:
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su regalo
  - su oblación
  lexicon: HALOT
  rationale: קָרְבָּן es un término de ofrenda presentada en contexto cultual. «Ofrenda» es la equivalencia natural y fiel en español, conservando el sentido sacrificial sin volverlo técnico en exceso.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  english_pob_choice: one silver plate
  chosen_spanish: un plato de plata
  alternatives_spanish:
  - un plato de plata
  - un cuenco de plata
  - una vasija de plata
  lexicon: HALOT
  rationale: קַעֲרָה puede abarcar plato, dish o bowl. En español, «plato» comunica bien una pieza plana y dedicada al servicio; se conserva la apertura semántica sin fijar innecesariamente una forma más específica.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  english_pob_choice: its weight one hundred thirty shekels
  chosen_spanish: de peso de ciento treinta siclos
  alternatives_spanish:
  - su peso era de ciento treinta siclos
  - pesaba ciento treinta siclos
  lexicon: HALOT
  rationale: La construcción hebrea expresa el peso del recipiente. En español, «de peso de» mantiene la relación nominal de forma clara y natural, y «ciento treinta» refleja el orden idiomático correcto.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  english_pob_choice: one silver basin
  chosen_spanish: una vasija de plata
  alternatives_spanish:
  - un cuenco de plata
  - una vasija de plata
  - un recipiente de plata
  lexicon: HALOT
  rationale: מִזְרָק es un recipiente cultual cuyo uso puede ser de aspersión; el inglés POB optó por «basin» para no sobreespecificar. En español, «vasija» conserva esa amplitud sin perder la referencia a un objeto ritual de plata.
- source_word: שִׁבְעִים שֶׁקֶל
  english_pob_choice: of seventy shekels
  chosen_spanish: de setenta siclos
  alternatives_spanish:
  - de setenta siclos
  - con un peso de setenta siclos
  lexicon: HALOT
  rationale: La frase indica el peso del segundo recipiente. «De setenta siclos» es breve, idiomático y fiel al registro inventarial del texto.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: by the shekel of the sanctuary
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - según el siclo santo
  lexicon: HALOT
  rationale: La expresión señala el patrón de peso oficial del santuario. «Según» preserva la idea de estándar o norma de medida, y «santuario» mantiene la especificidad cultual del hebreo.
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - ambos
  - los dos
  lexicon: HALOT
  rationale: El dual hebreo se refiere a los dos objetos juntos. «Ambos» es la forma más natural en español y conserva la referencia conjunta sin redundancia.
- source_word: מְלֵאִים
  english_pob_choice: were full of
  chosen_spanish: estaban llenos de
  alternatives_spanish:
  - estaban llenos de
  - llenos de
  lexicon: HALOT
  rationale: El hebreo describe el estado de los recipientes. En español, la copulativa explícita hace la oración más clara y mantiene el valor descriptivo.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - flor de harina
  lexicon: HALOT
  rationale: «Flor de harina» es la equivalencia tradicional y precisa para סֹלֶת en contexto sacrificial, más idiomática que «harina fina» y ampliamente inteligible.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - mezclada con aceite
  - mecida con aceite
  lexicon: HALOT
  rationale: El verbo indica una mezcla real del grano con aceite. «Mezclada con aceite» preserva la acción sin introducir una connotación ceremonial no explícita en el hebreo.
- source_word: לְמִנְחָה
  english_pob_choice: for a grain offering
  chosen_spanish: para ofrenda vegetal
  alternatives_spanish:
  - para ofrenda vegetal
  - para ofrenda de cereal
  - para una ofrenda de grano
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacerdotal designa la ofrenda cereal/vegetal. «Ofrenda vegetal» conserva la categoría cultual y evita reducirla a una idea meramente agrícola; se usa el término POB para mantener consistencia terminológica.
theological_decisions:
- issue: Terminología de מִנְחָה en un contexto levítico/cultual
  english_pob_reading: for a grain offering
  chosen_spanish_reading: para ofrenda vegetal
  alternative_spanish_readings:
  - para ofrenda de cereal
  - para una ofrenda de grano
  - para ofrenda de harina
  rationale: El contexto de Números 7 es de ofrendas sacerdotales y mensuradas. «Ofrenda vegetal» sigue la decisión terminológica del POB y conserva la tensión entre lo vegetal/cereal y lo ritual, sin sustituirla por una paráfrasis general.
  doctrine_reference: Levítico 2; Números 7
translation_notes:
  revision_awareness: El texto inglés auditado presenta acuerdo alto y no mostró revisiones aplicadas; la redacción española sigue de cerca esa decisión estable, preservando el inventario de objetos, pesos y la fórmula cultual final sin introducir expansiones.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito fuera del versículo porque no aparece en este segmento.
  - Se conservó la terminología POB «ofrenda vegetal» para מִנְחָה, coherente con el uso cultual del libro.
  - Se evitó «SEÑOR» o «Cristo», que no corresponden a este texto.
  - Se prefirió «siclos» como unidad monetaria/peso, con el sentido metrológico del contexto.
  - La lista de recipientes refleja la diferencia entre קַעֲרָה y מִזְרָק sin forzar una homogeneización terminológica.
