translation:
  language: es
  text: Será como cuando un hombre huye de delante del león, y el oso lo encuentra[a]; luego entra en la casa y apoya su mano en la pared, y la serpiente[b] lo muerde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el oso lo encara» o «el oso cae sobre él». El verbo hebreo puede denotar encontrar, encontrarse con o atacar, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «culebra».
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: as when
  chosen_spanish: Será como cuando
  alternatives_spanish:
  - como cuando
  - tal como cuando
  lexicon: HALOT
  rationale: La comparación abre una símil en español con el mismo valor introductorio que el hebreo. «Como cuando» conserva la relación comparativa sin volverla explicativa ni paratáctica.
- source_word: יָנוּס
  english_pob_choice: flees
  chosen_spanish: huye
  alternatives_spanish:
  - escapa
  - corre
  lexicon: HALOT
  rationale: El verbo expresa fuga ante peligro; «huye» comunica mejor la urgencia y el matiz de retirada desesperada que «corre» o «escapa».
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  - una persona
  lexicon: HALOT
  rationale: El hebreo es singular masculino genérico. «Un hombre» refleja la forma del original y su valor representativo sin añadir especificación innecesaria.
- source_word: מִפְּנֵי
  english_pob_choice: from before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de
  - de la presencia de
  lexicon: HALOT
  rationale: «De delante de» conserva el hebraísmo espacial de «from before/from the presence of» y sigue siendo natural en español.
- source_word: הָאֲרִי
  english_pob_choice: the lion
  chosen_spanish: el león
  lexicon: HALOT
  rationale: Equivalencia directa y transparente.
- source_word: וּפְגָעוֹ
  english_pob_choice: the bear meets him
  chosen_spanish: el oso lo encuentra
  alternatives_spanish:
  - el oso lo encara
  - el oso da con él
  - el oso lo embiste
  lexicon: HALOT
  rationale: פגע puede significar «encontrar», «toparse con» o «caer sobre». La POB inglesa mantiene el término más abierto con una nota. En español, «lo encuentra» preserva la ambigüedad básica sin forzar una lectura más violenta de la que el verbo exige por sí mismo; la amenaza la aporta el contexto.
- source_word: הַדֹּב
  english_pob_choice: the bear
  chosen_spanish: el oso
  lexicon: HALOT
  rationale: Equivalencia directa y estándar en español.
- source_word: וּבָא הַבַּיִת
  english_pob_choice: then he enters the house
  chosen_spanish: luego entra en la casa
  alternatives_spanish:
  - y entra en la casa
  - entonces entra en la casa
  lexicon: HALOT
  rationale: בוא aquí es entrar. «Luego» refleja la secuencia narrativa del hebreo sin recargar la frase con un sujeto explícito ya implícito en el contexto.
- source_word: וְסָמַךְ יָדוֹ
  english_pob_choice: and leans his hand
  chosen_spanish: apoya su mano
  alternatives_spanish:
  - descansa su mano
  - se apoya con la mano
  lexicon: HALOT
  rationale: סמך expresa apoyarse o descansar sobre algo. En español, «apoya su mano» mantiene la imagen concreta de la mano posada sobre la pared sin añadir una inferencia de auto-soporte corporal que el hebreo no especifica aquí.
- source_word: עַל הַקִּיר
  english_pob_choice: on the wall
  chosen_spanish: en la pared
  alternatives_spanish:
  - sobre la pared
  - contra la pared
  lexicon: HALOT
  rationale: Aunque עַל puede ser «sobre» o «contra», en español «apoya su mano en la pared» suena más natural y conserva la escena de contacto físico inmediato. «Sobre» o «contra» son posibles, pero menos fluidas aquí.
- source_word: וּנְשָׁכוֹ
  english_pob_choice: and the snake bites him
  chosen_spanish: y la serpiente lo muerde
  alternatives_spanish:
  - y la serpiente lo pica
  - y la culebra lo muerde
  lexicon: HALOT
  rationale: El verbo significa «morder». «Lo muerde» reproduce con claridad la acción súbita y mantiene el paralelismo final del cuadro.
- source_word: הַנָּחָשׁ
  english_pob_choice: the snake
  chosen_spanish: la serpiente
  alternatives_spanish:
  - la culebra
  - la víbora
  lexicon: HALOT
  rationale: נחש puede ser «serpiente» o «serpiente/serpiente venenosa» según contexto. Dado el registro bíblico y la posibilidad tradicional de «serpent», se conserva «serpiente» como término amplio y digno, sin reducirlo a una especie específica.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el audit trail inglés de la POB, pero se ajusta a una sintaxis natural en español: se mantiene la secuencia de tres peligros crecientes, se conserva la ambigüedad de פגע con nota, y se evita introducir verbos o sujetos no requeridos por el hebreo. No hubo revisiones aplicadas en el pase más reciente del texto fuente inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece en este versículo ni en la línea inmediata de fuente.
  - Se usó «serpiente» como equivalente principal de נחש, con nota alternativa «serpiente», sin imponer «víbora» porque el hebreo es más amplio.
  - La construcción «de delante de» preserva el hebraísmo de מִפְּנֵי y su fuerza direccional.
  - «Lo encuentra» conserva la amplitud semántica de פגע documentada en el audit trail, sin resolverla prematuramente como ataque explícito.
