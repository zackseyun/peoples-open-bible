translation:
  language: es
  text: 'Pero si me dicen: «En Yahvé nuestro Dios hemos confiado», ¿no es él cuyos lugares altos y cuyos altares Ezequías ha quitado, y dijo a Judá y a Jerusalén: «Adoren[a] delante de este altar en Jerusalén»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «Póstrense delante de este altar en Jerusalén».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Mas si
  lexicon: HALOT
  rationale: En este contexto polémico, la partícula introduce una objeción condicional; en español, 'Pero si' conserva bien el matiz adversativo y condicional.
- source_word: תֹאמְרוּן אֵלַי
  english_pob_choice: you say to me
  chosen_spanish: me decís
  alternatives_spanish:
  - me dicen
  - me dirán
  lexicon: HALOT
  rationale: El hebreo expresa segunda persona plural dirigida al hablante. 'Me decís' suena natural en español y mantiene la interacción directa. Se adopta la forma de tratamiento en plural con tono oral/retórico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, preservando la forma auditable y evitando la sustitución por un título genérico.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: La posesión se conserva de forma directa; en español 'nuestro Dios' es claro y natural.
- source_word: בָּטָחְנוּ
  english_pob_choice: we trust
  chosen_spanish: hemos confiado
  alternatives_spanish:
  - confiamos
  - confiamos en
  lexicon: HALOT
  rationale: El perfecto hebreo puede reflejar un estado resultante; 'hemos confiado' mantiene esa fuerza y funciona bien dentro de la cita.
- source_word: הֲלוֹא הוּא
  english_pob_choice: is it not he
  chosen_spanish: ¿no es él
  alternatives_spanish:
  - ¿acaso no es él
  - ¿no es éste
  lexicon: HALOT
  rationale: La pregunta retórica pide asentimiento. '¿No es él' conserva el golpe argumentativo del hebreo.
- source_word: אֲשֶׁר הֵסִיר חִזְקִיָּהוּ
  english_pob_choice: whose ... Hezekiah has removed
  chosen_spanish: a quien Ezequías ha quitado
  alternatives_spanish:
  - que Ezequías ha quitado
  - cuyos ... Ezequías ha quitado
  lexicon: HALOT
  rationale: El antecedente es el referente al que el orador atribuye los santuarios como si le pertenecieran. 'A quien' permite mantener el flujo sintáctico español sin borrar la atribución retórica.
- source_word: בָּמֹתָיו
  english_pob_choice: his high places
  chosen_spanish: sus lugares altos
  alternatives_spanish:
  - sus altos
  - sus santuarios en las alturas
  lexicon: HALOT
  rationale: '''Lugares altos'' comunica el sentido cultual de בָּמֹת sin sonar extrañamente técnico; ''sus'' refleja la atribución polémica del hablante.'
- source_word: מִזְבְּחֹתָיו
  english_pob_choice: his altars
  chosen_spanish: sus altares
  alternatives_spanish:
  - sus altares de sacrificio
  lexicon: HALOT
  rationale: Traducción directa y transparente del sustantivo, conservando el paralelismo con 'lugares altos'.
- source_word: וַיֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - diciendo
  - y le dijo
  lexicon: HALOT
  rationale: La forma verbal narrativa se refleja con una coordinación simple, fiel al hebreo y adecuada al registro.
- source_word: לִיהוּדָה וְלִירוּשָׁלַם
  english_pob_choice: to Judah and to Jerusalem
  chosen_spanish: a Judá y a Jerusalén
  alternatives_spanish:
  - para Judá y para Jerusalén
  - a Judá y a la de Jerusalén
  lexicon: HALOT
  rationale: Se conserva la duplicación preposicional con naturalidad en español; 'Jerusalén' mantiene el valor metonímico del texto.
- source_word: לִפְנֵי הַמִּזְבֵּחַ הַזֶּה
  english_pob_choice: before this altar
  chosen_spanish: delante de este altar
  alternatives_spanish:
  - frente a este altar
  - ante este altar
  lexicon: HALOT
  rationale: '''Delante de'' es la forma más clara para la dirección espacial de לפני en este contexto cultual.'
- source_word: תִּשְׁתַּחֲוּוּ
  english_pob_choice: You shall worship
  chosen_spanish: adorarán[a]
  alternatives_spanish:
  - se postrarán
  - rendirán adoración
  lexicon: HALOT
  rationale: El verbo incluye postración/adoración; en español, 'adorarán' comunica bien el sentido cultual. Se marca la alternativa literal en nota porque el hebreo puede leerse más literalmente como postrarse.
- source_word: בִּירוּשָׁלָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - dentro de Jerusalén
  lexicon: HALOT
  rationale: Se mantiene la locución locativa simple y natural.
theological_decisions:
- issue: Retórica polémica del hablante asirio sobre los lugares de culto de Yahvé
  english_pob_reading: Translate the accusation as the speaker's polemical misunderstanding that the removed high places and altars belonged to the LORD.
  chosen_spanish_reading: Conservar la atribución retórica de 'sus lugares altos' y 'sus altares' sin corregirla en la traducción.
  alternative_spanish_readings:
  - Neutralizar la posesión y decir simplemente 'los lugares altos y los altares'
  - Explicar en el texto que el orador habla de forma acusatoria
  rationale: Los sufijos posesivos son significativos y muestran cómo el asirio arma su argumento. La traducción debe preservar esa tensión sin aprobar la acusación ni suavizarla.
  doctrine_reference: Preservar la tensión teológica y narrativa del texto.
translation_notes:
  revision_awareness: 'Se corrigió el problema anterior: el marcador de nota [a] aparece ahora exactamente en el texto español sobre la forma verbal correspondiente. La redacción también refleja mejor el flujo narrativo del hebreo, manteniendo la acusación polémica del hablante.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto.
  - Se conserva la posesión retórica ('sus lugares altos', 'sus altares') para no borrar el filo del discurso asirio.
  - Se eligió 'adorarán' con nota por la posible lectura más literal de postración; esto sigue la tensión lexical ya documentada en el audit trail en inglés.
  - La forma 'me decís' refleja el plural directo del hebreo y el tono retórico del pasaje.
