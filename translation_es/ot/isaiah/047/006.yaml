translation:
  language: es
  text: Me enojé[a] contra mi pueblo; profané mi heredad y los entregué en tu mano. No les mostraste misericordia[b]; sobre los ancianos hiciste muy pesado tu yugo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Me enardecí». El verbo hebreo también puede expresar ira intensa o enojo ardiente.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «No pusiste misericordias para ellos».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «sobre los ancianos hiciste extremadamente pesado tu yugo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָצַפְתִּי
  english_pob_choice: I was angry
  chosen_spanish: Me enojé
  alternatives_spanish:
  - Estuve airado
  - Estuve enojado
  lexicon: HALOT
  rationale: El verbo expresa ira o enojo divino. «Me enojé» comunica con naturalidad la reacción judicial de Dios sin suavizarla ni volverla más intensa de lo que permite el hebreo.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo propio
  lexicon: HALOT
  rationale: «Pueblo» conserva el sentido colectivo y de alianza del posesivo hebreo, y suena más idiomático en español que una calca menos natural.
- source_word: חִלַּלְתִּי
  english_pob_choice: I profaned
  chosen_spanish: profané
  alternatives_spanish:
  - desecré
  - traté como común
  lexicon: HALOT
  rationale: 'El piel de חלל tiene fuerza cultual y teológica: profanar, tratar como común, desconsagrar. «Profané» retiene esa carga fuerte, como en la lectura inglesa.'
- source_word: נַחֲלָתִי
  english_pob_choice: my inheritance
  chosen_spanish: mi heredad
  alternatives_spanish:
  - mi herencia
  - mi posesión
  lexicon: HALOT
  rationale: «Heredad» conserva el valor de posesión pactal y territorial, y en español bíblico comunica bien la relación de pertenencia sin perder claridad.
- source_word: וָאֶתְּנֵם בְּיָדֵךְ
  english_pob_choice: and gave them into your hand
  chosen_spanish: los entregué en tu mano
  alternatives_spanish:
  - los puse en tu mano
  - los di en tu mano
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se vierte naturalmente como «entregar en la mano». Mantiene la imagen de dominio y captura, como en el audit trail inglés.
- source_word: לֹא שַׂמְתְּ לָהֶם רַחֲמִים
  english_pob_choice: You showed them no mercy
  chosen_spanish: No les mostraste misericordia
  alternatives_spanish:
  - No les tuviste compasión
  - No pusiste misericordias para ellos
  lexicon: HALOT
  rationale: El hebreo dice literalmente que no se les «puso misericordias». En español, la equivalencia más clara y fiel es «mostrar misericordia», preservando la dureza del juicio contra Babilonia.
- source_word: רַחֲמִים
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - piedad
  lexicon: HALOT
  rationale: «Misericordia» es una opción bíblica y comprensible para רחמים; mantiene el registro solemne y no reduce el término a mera simpatía emocional.
- source_word: זָקֵן
  english_pob_choice: the aged
  chosen_spanish: el anciano
  alternatives_spanish:
  - los ancianos
  - el viejo
  lexicon: HALOT
  rationale: Aunque el inglés usa un colectivo, el singular hebreo puede funcionar genéricamente. En español, «el anciano» conserva la referencia a la persona de edad avanzada y encaja bien con el paralelismo del verso.
- source_word: הִכְבַּדְתְּ
  english_pob_choice: you made ... heavy
  chosen_spanish: hiciste muy pesado
  alternatives_spanish:
  - agravaste
  - volviste muy gravoso
  lexicon: HALOT
  rationale: El hiphil de כבד significa hacer pesado. «Hiciste muy pesado» preserva la metáfora del yugo y sigue de cerca la imagen hebrea sin sonar rígido.
- source_word: עֻלֵּךְ
  english_pob_choice: your yoke
  chosen_spanish: tu yugo
  alternatives_spanish:
  - tu carga
  - tu opresión
  lexicon: HALOT
  rationale: «Yugo» mantiene la imagen profética y opresiva del texto original. Es preferible a una paráfrasis que diluya la metáfora.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - en gran manera
  lexicon: HALOT
  rationale: Intensificador directo y natural en español; conserva el énfasis final del hebreo.
theological_decisions:
- issue: Dios como sujeto de «profané mi heredad»
  english_pob_reading: Retain the strong first-person statement that God himself 'profaned' or treated his inheritance as exposed to judgment.
  chosen_spanish_reading: 'Mantener el sujeto divino explícito: «profané mi heredad».'
  alternative_spanish_readings:
  - «abandoné mi heredad»
  - «permití que profanaran mi heredad»
  rationale: El hebreo está en primera persona activa y la lectura inglesa conserva esa fuerza. En español conviene no suavizarla con una pasiva o con una mera permisión, porque el verso presenta una acción judicial de Yahvé sin negar la culpa posterior de Babilonia.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en la última pasada; el estado más reciente indica alto acuerdo y sin cambios necesarios, por lo que se preservó la lectura base con ajustes de naturalidad en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la terminología del proyecto cuando el contexto requiere el nombre divino explícito; en este versículo el texto hebreo presenta primera persona divina y no necesita sustitución por un título ocultador.
  - Se usó «mi heredad» para נַחֲלָה por coherencia con la tradición POB de conservar el lenguaje pactal y posesivo, en vez de una paráfrasis más general.
  - «Misericordia» se eligió para רחמים por ser la equivalencia bíblica más transparente en español, y se dejó la alternativa literal en nota.
  - «Yugo» se conservó literalmente para no perder la imagen de opresión dominadora presente en el hebreo.
