translation:
  language: es
  text: Bienaventurado[a] el pueblo para quien esto es así; bienaventurado el pueblo cuyo Dios es Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Feliz el pueblo para quien esto es así».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed are
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Feliz
  - Dichoso
  lexicon: HALOT
  rationale: אַשְׁרֵי expresa una bienaventuranza, no solo un estado emocional. «Bienaventurado» conserva mejor el tono elevado y declarativo del hebreo poético que «Feliz».
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: עָם se refiere a un colectivo como pueblo. «Pueblo» es natural en español bíblico y mantiene el sentido relacional mejor que «nación», que sonaría más político.
- source_word: שֶׁכָּכָה לּוֹ
  english_pob_choice: for whom it is so
  chosen_spanish: al que le sucede así
  alternatives_spanish:
  - para quien es así
  - que así le ocurre
  lexicon: HALOT
  rationale: La construcción hebrea apunta a una condición que le corresponde a ese pueblo. En español, «al que le sucede así» comunica la idea sin volverla demasiado literal ni oscura.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El proyecto usa «Yahvé» para el nombre divino יְהוָה. Es una transliteración estable y readable en español, manteniendo el nombre personal del pacto en vez de sustituirlo por un título.
- source_word: אֱלֹהָיו
  english_pob_choice: whose God is
  chosen_spanish: cuyo Dios es
  alternatives_spanish:
  - de quien Dios es
  - cuyo dios es
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera masculina plural/collectiva se expresa naturalmente con «cuyo Dios es». Mantiene el sentido relacional y capitaliza «Dios» porque se refiere al Dios de Israel.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español se conserva el nombre propio divino como «Yahvé», evitando la sustitución por un título y preservando la referencia covenantal del pasaje.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de la primera bienaventuranza
  english_pob_reading: Blessed are the people for whom it is so
  chosen_spanish_reading: Bienaventurado el pueblo al que le sucede así
  alternative_spanish_readings:
  - Feliz el pueblo al que le sucede así
  - Dichoso el pueblo al que le sucede así
  rationale: La bienaventuranza hebrea es más que felicidad subjetiva. «Bienaventurado» conserva el matiz de estado favorecido/afortunado que el inglés POB también preserva con «Blessed».
  doctrine_reference: 'DOCTRINE.md: Beatitudes and evaluative blessings'
translation_notes:
  revision_awareness: El inglés POB mantiene una estructura de dos bienaventuranzas y distingue entre una cláusula relativa idiomática y la identificación del pueblo cuyo Dios es Yahweh/Yahvé. La revisión más reciente ajustó la concordancia al plural en inglés; en español se ha conservado la concordancia natural con «el pueblo» como singular colectivo y se ha mantenido el paralelismo poético del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - «Bienaventurado» se usa como término técnico-poético para אַשְׁרֵי.
  - «Dios» se capitaliza cuando el referente es el Dios de Israel.
  - La primera cláusula conserva una ambigüedad leve en una nota, porque el hebreo admite una lectura más idiomática sin perder fidelidad.
