translation:
  language: es
  text: Y aconteció que, cuando los hijos de Israel se fortalecieron, sometieron a los cananeos a trabajo forzado[b], pero no los expulsaron por completo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: 'También: «los sometieron a corvea» o «pusieron a los cananeos bajo tributo».'
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo intensifica el verbo: «no los expulsaron completamente / del todo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa וַיְהִי introduce un nuevo desarrollo. «Aconteció» conserva bien esa función de arranque narrativo en español bíblico sin sonar demasiado arcaico.
- source_word: כִּי
  english_pob_choice: that when
  chosen_spanish: que, cuando
  alternatives_spanish:
  - cuando
  - y cuando
  lexicon: HALOT
  rationale: Aquí כִּי introduce la circunstancia temporal del verbo principal. «Que, cuando» refleja la construcción hebrea de forma natural en español y mantiene la relación subordinada.
- source_word: חָזְקוּ
  english_pob_choice: became strong
  chosen_spanish: se fortalecieron
  alternatives_spanish:
  - se hicieron fuertes
  - crecieron en poder
  lexicon: HALOT
  rationale: El verbo expresa volverse fuertes, no solo estar fuertes. «Se fortalecieron» conserva el matiz ingresivo y funciona con naturalidad en español.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión filial del hebreo. «Hijos de Israel» es transparente, formal y mantiene la forma léxica del original sin neutralizarla.
- source_word: וַיִּתְּנוּ אֶת הַכְּנַעֲנִי לָמַס
  english_pob_choice: they put the Canaanites to forced labor
  chosen_spanish: pusieron a los cananeos a trabajo forzado
  alternatives_spanish:
  - los sujetaron a trabajo forzado
  - los pusieron bajo tributo
  - los sometieron a corvea
  lexicon: HALOT
  rationale: מַס en este contexto señala labor compulsoria, no solo tributo monetario. «Trabajo forzado» comunica la coerción de manera clara y digna en español moderno.
- source_word: וְהוֹרֵשׁ לֹא הוֹרִישׁוֹ
  english_pob_choice: but they did not completely drive them out
  chosen_spanish: pero no los expulsaron por completo
  alternatives_spanish:
  - pero no los desalojaron por completo
  - pero no los echaron totalmente
  - pero no los expulsaron del todo
  lexicon: HALOT
  rationale: 'La combinación infinitivo absoluto + verbo finito intensifica la acción: no hubo expulsión completa. «Por completo» preserva esa intensificación sin añadir más de lo que el hebreo expresa.'
theological_decisions:
- issue: Cómo traducir בני ישראל sin borrar la forma hebrea masculina
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos del pueblo de Israel
  rationale: Se mantiene la forma familiar/etnónima del hebreo, en consonancia con la precisión formal del proyecto y sin neutralizar innecesariamente el masculino plural del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de לָמַס en el contexto de conquista y asentamiento
  english_pob_reading: forced labor
  chosen_spanish_reading: trabajo forzado
  alternative_spanish_readings:
  - tributo
  - corvea laboral
  - servicio forzado
  rationale: El contexto no describe una carga fiscal abstracta sino subordinación laboral de los cananeos restantes. «Trabajo forzado» evita minimizar la coerción y conserva la fuerza social del texto.
  doctrine_reference: HALOT, entrada מַס; contexto narrativo de Josué 17:13
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto hebreo y coincide sustancialmente con la lectura auditada en inglés. Se preservan las decisiones clave ya validadas: arranque narrativo con וַיְהִי, subordinación temporal con כִּי, sentido ingresivo de חָזְקוּ, מַס como labor compulsoria y la intensidad del infinitivo absoluto de ירש. No se registran revisiones posteriores que alteren el sentido.'
  spanish_consistency_notes:
  - Se mantuvo «hijos de Israel» de forma consistente con el valor literal del hebreo, sin reemplazarlo por una forma neutralizadora.
  - «Trabajo forzado» se usa para מַס por su claridad moderna y porque evita restringir indebidamente el término a tributo monetario.
  - «Expulsaron por completo» refleja adecuadamente la intensificación hebrea sin sobretraducción.
  - La puntuación sigue el español moderno y conserva la cadencia narrativa bíblica.
