revisions:
- from: Más numerosos que los cabellos de mi cabeza[a] son los que me odian sin causa; se han fortalecido los que me destruyen, mis falsos enemigos. Lo que no robé[b], entonces tengo que restituirlo.
  to: Más numerosos que los cabellos de mi cabeza son los que me odian sin causa; se han fortalecido los que me destruyen, mis enemigos[a]. Lo que no robé[b], entonces tengo que restituirlo.
  rationale: Se retira la nota de la imagen hiperbólica, porque no corresponde al expediente inglés, y se reubica una nota lexicalmente relevante en «mis enemigos». En el texto principal se simplifica «mis falsos enemigos» a «mis enemigos» para evitar una lectura española engañosa, mientras la nota preserva las alternativas significativas documentadas para שֶׁקֶר. También se ajusta la nota final para reflejar primero la literalidad hebrea y luego la interpretación contextual de restitución forzada.
