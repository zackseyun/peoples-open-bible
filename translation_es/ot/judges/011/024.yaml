    reason: lexical_alternative
  - marker: c
    text: O «heredaremos» / «tomaremos posesión de» para el verbo hebreo repetido ירשׁ; el término se refiere a la posesión de territorio, a menudo mediante la desposesión de ocupantes previos.
    reason: lexical_alternative
  revision_rationale: La revisión conserva el sentido fuente y la terminología del proyecto, pero reemplaza una construcción española poco natural («ha desposeído de delante de nosotros») por «ha quitado de delante de nosotros», que comunica con claridad la remoción de ocupantes previos. Además, se añaden notas separadas para reflejar fielmente las dos decisiones léxicas documentadas en el expediente inglés sobre ירשׁ.
