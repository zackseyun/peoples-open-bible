translation:
  language: es
  text: Entonces David y todo Israel fueron a Jerusalén (es decir, Jebús), donde estaban los jebuseos[a], los habitantes de la región.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y allí el jebuseo, habitantes de la tierra»; «el jebuseo» es un singular colectivo, por eso en español se traduce naturalmente «los jebuseos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: Then ... went
  chosen_spanish: Entonces ... fueron
  alternatives_spanish:
  - Y ... fueron
  - Entonces ... fue
  lexicon: HALOT
  rationale: La forma consecutiva avanza la narración; en español, «Entonces» conserva el valor secuencial, y «fueron» concuerda naturalmente con el sujeto colectivo «David y todo Israel».
- source_word: דָּוִיד וְכָל יִשְׂרָאֵל
  english_pob_choice: David and all Israel
  chosen_spanish: David y todo Israel
  alternatives_spanish:
  - David con todo Israel
  - David y todo el Israel
  lexicon: HALOT
  rationale: El hebreo presenta un sujeto compuesto; «todo Israel» reproduce el designio colectivo habitual sin añadir explicaciones ajenas al texto.
- source_word: יְרוּשָׁלִַם הִיא יְבוּס
  english_pob_choice: Jerusalem—that is, Jebus
  chosen_spanish: Jerusalén —es decir, Jebús—
  alternatives_spanish:
  - Jerusalén, es decir, Jebús
  - Jerusalén (es decir, Jebús)
  lexicon: HALOT
  rationale: La frase apposicional identifica Jerusalén con su nombre anterior. «Es decir» mantiene la equivalencia explicativa sin sobreinterpretar la relación.
- source_word: וְשָׁם
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - y allí
  - y donde
  lexicon: HALOT
  rationale: El inglés POB opta por una clausula relativa idiomática; en español «donde» expresa de modo natural la localización de los habitantes sin perder el enlace narrativo.
- source_word: הַיְבוּסִי
  english_pob_choice: the Jebusites
  chosen_spanish: los jebuseos
  alternatives_spanish:
  - el jebuseo
  - los jebuseos
  lexicon: HALOT
  rationale: Aunque el hebreo es singular morfológico, el contexto colectivo y el paralelismo con el participio plural favorecen el plural en español. Se mantiene la etnónimo colectivo natural.
- source_word: יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: the inhabitants of the land
  chosen_spanish: los habitantes de la tierra
  alternatives_spanish:
  - los habitantes de la región
  - los moradores de la tierra
  lexicon: HALOT
  rationale: «Habitantes de la tierra» sigue de cerca la construcción participial hebrea y conserva el sentido local/regional de אָרֶץ sin convertirlo en una expresión más interpretativa.
translation_notes:
  revision_awareness: El pasaje se mantiene sin cambios respecto al control reciente de alta concordancia; la traducción española sigue la lectura ya establecida por el audit trail inglés, preservando la equivalencia explicativa de Jerusalén/Jebús y la decisión colectiva sobre «el jebuseo».
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no lo contiene.
  - Se evita «SEÑOR» y no hay términos que exijan una decisión sobre Mesías/Cristo.
  - El plural «jebuseos» refleja el valor colectivo del singular hebreo con apoyo del contexto sintáctico.
  - «Tierra» se deja sin expandir a «país» o «región» para no debilitar la correspondencia con אָרֶץ.
