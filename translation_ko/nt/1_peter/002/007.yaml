  text: ὑμῖν οὖν ἡ τιμὴ τοῖς πιστεύουσιν· ἀπιστοῦσιν δὲ λίθος ὃν ἀπεδοκίμασαν οἱ οἰκοδομοῦντες οὗτος ἐγενήθη εἰς κεφαλὴν γωνίας
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/007.yaml
  text: 'Therefore, for you who believe is the honor, but for those who do not believe, "The stone that the builders rejected—this one has become the head of the corner."'
translation:
  language: ko
  text: '그러므로 믿는 여러분에게는 그 보배로움이 있으나, 믿지 아니하는 자들에게는 「건축자들이 버린 돌이 도리어 모퉁이의 머릿돌이 되었다」[a] 함과 같습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 시편 118:22 인용.
    reason: ot_citation
lexical_decisions:
- source_word: ἡ τιμὴ
  english_pob_choice: the honor
  chosen_korean: 그 보배로움
  alternatives_korean:
  - 그 존귀함
  - 그 영광
  lexicon: BDAG
  rationale: 2:4·2:6의 ἔντιμον(보배로운)과 어휘 일관성을 위해 「보배로움」으로 옮긴다. 「존귀」도 가능.
- source_word: λίθος ὃν ἀπεδοκίμασαν οἱ οἰκοδομοῦντες
  english_pob_choice: The stone that the builders rejected
  chosen_korean: 건축자들이 버린 돌
  alternatives_korean:
  - 집 짓는 자들이 버린 돌
  lexicon: BDAG
  rationale: 시 118:22 인용. 한국 성서 전통의 표현 유지.
- source_word: κεφαλὴν γωνίας
  english_pob_choice: the head of the corner
  chosen_korean: 모퉁이의 머릿돌
  alternatives_korean:
  - 모퉁이 돌
  - 머릿돌
  lexicon: BDAG
  rationale: κεφαλὴ γωνίας(모퉁이의 머리)를 한국 성서 전통의 「모퉁이의 머릿돌」로 옮긴다. 2:6의 ἀκρογωνιαῖος(「모퉁이 돌」)와 어휘적으로 의도된 변주.
