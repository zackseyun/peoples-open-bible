  text: וְ/כִֽי יִהְיֶ֤ה בַ/קָּרַ֨חַת֙ א֣וֹ בַ/גַּבַּ֔חַת נֶ֖גַע לָבָ֣ן אֲדַמְדָּ֑ם צָרַ֤עַת פֹּרַ֨חַת֙ הִ֔וא בְּ/קָרַחְתּ֖/וֹ א֥וֹ בְ/גַבַּחְתּֽ/וֹ־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/013/042.yaml
  text: But if there is on the bald head or on the bald forehead a reddish-white infection[b][a], it is a leprous disease breaking out on his bald head or on his bald forehead.
  footnotes:
  - marker: a
    text: Or traditionally, 'leprosy.' The Hebrew term refers more broadly to a range of skin diseases or conditions and should not be equated strictly with modern Hansen's disease.
    reason: lexical_alternative
  - marker: b
    text: The two Hebrew terms distinguish baldness at the back of the head and baldness at the front of the head.
    reason: cultural_note
