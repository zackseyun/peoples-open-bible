translation:
  language: es
  text: 'Mi señor[a], escúchame: un terreno[b] que vale cuatrocientos siclos de plata—¿qué es eso entre tú y yo? Sepulta a tus muertos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Mi señor, escúchame: un terreno—cuatrocientos siclos de plata—¿qué es eso entre tú y yo?». El hebreo es elíptico y retórico; minimiza el precio durante la negociación.'
    reason: lexical_alternative
  - marker: b
    text: «Terreno» traduce aquí אֶרֶץ como un lote o propiedad concreta, no «tierra» en sentido abstracto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי
  english_pob_choice: My lord
  chosen_spanish: Mi señor
  alternatives_spanish:
  - Señor mío
  - Mi amo
  lexicon: HALOT
  rationale: Es un tratamiento respetuoso dirigido a un interlocutor humano, no un título divino. «Mi señor» preserva la deferencia social y suena natural en español contemporáneo.
- source_word: שְׁמָעֵנִי
  english_pob_choice: listen to me
  chosen_spanish: escúchame
  alternatives_spanish:
  - oye
  - escucha
  lexicon: HALOT
  rationale: El imperativo expresa una súplica cortés en medio de una negociación. «Escúchame» conserva la apelación directa con tono natural y digno.
- source_word: אֶרֶץ
  english_pob_choice: a piece of land
  chosen_spanish: un terreno
  alternatives_spanish:
  - una porción de tierra
  - una parcela
  lexicon: HALOT
  rationale: En este contexto de negociación se trata de un bien inmueble concreto, no de «tierra» en abstracto. «Terreno» comunica bien el parcelamiento discutido sin añadir interpretación extra.
- source_word: אַרְבַּע מֵאֹת שֶׁקֶל כֶּסֶף
  english_pob_choice: worth four hundred shekels of silver
  chosen_spanish: que vale cuatrocientos siclos de plata
  alternatives_spanish:
  - por cuatrocientos siclos de plata
  - valuado en cuatrocientos siclos de plata
  lexicon: HALOT
  rationale: El hebreo es elíptico y presenta el valor/precio del terreno. «Que vale» hace explícita la valoración implícita sin convertirla en una paráfrasis más libre; «siclos» conserva la unidad de peso/valor.
- source_word: בֵּינִי וּבֵינְךָ
  english_pob_choice: between me and you
  chosen_spanish: entre tú y yo
  alternatives_spanish:
  - entre nosotros
  - entre ti y mí
  lexicon: HALOT
  rationale: El hebreo conserva la primera y segunda persona singular; en español, la fórmula natural en este dicho es «entre tú y yo». Mantiene el contraste personal y la fuerza retórica de la negociación.
- source_word: מַה הִוא
  english_pob_choice: what is that
  chosen_spanish: ¿qué es eso?
  alternatives_spanish:
  - ¿qué importa?
  - ¿qué vale eso?
  lexicon: HALOT
  rationale: La pregunta es retórica y minimiza la suma en relación con las partes. «¿Qué es eso?» reproduce esa desvalorización sin explicitar más de lo que el hebreo exige.
- source_word: וְאֶת מֵתְךָ קְבֹר
  english_pob_choice: Bury your dead
  chosen_spanish: Entierra a tu muerto
  alternatives_spanish:
  - Y entierra a tu muerto
  - Sepulta a tu muerto
  lexicon: HALOT
  rationale: Se conserva el imperativo directo y la referencia singular con sentido colectivo. «Entierra» es claro y natural; «a tu muerto» refleja el posesivo singular del hebreo sin suavizarlo.
theological_decisions:
- issue: Tratamiento respetuoso a un interlocutor humano en אֲדֹנִי
  english_pob_reading: My lord
  chosen_spanish_reading: Mi señor
  alternative_spanish_readings:
  - Señor mío
  - Mi amo
  rationale: El hebreo aquí es un título de cortesía dirigido a un hombre en contexto de negociación, no una alusión al nombre divino. Por eso se evita «SEÑOR» como sustituto reverencial y se usa un tratamiento humano explícito.
  doctrine_reference: Uso diferenciado del tetragrámaton y de títulos humanos; distinción entre Yahvé y cortesía social.
- issue: Elasticidad retórica de la cifra en la negociación
  english_pob_reading: a piece of land worth four hundred shekels of silver—what is that between me and you?
  chosen_spanish_reading: un terreno que vale cuatrocientos siclos de plata—¿qué es eso entre tú y yo?
  alternative_spanish_readings:
  - un terreno por cuatrocientos siclos de plata—¿qué es eso entre tú y yo?
  - un terreno valuado en cuatrocientos siclos de plata—¿qué es eso entre tú y yo?
  rationale: La frase disminuye deliberadamente la magnitud del precio. La traducción mantiene el tono de minimización sin convertirla en una explicación interpretativa más allá del texto.
  doctrine_reference: Retórica narrativa y negociación de bienes en la historia patriarcal.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa que eliminó «So» al final para no añadir una conexión no explícita. En español se conserva la misma directez: el mandato final queda sin conector añadido («Entierra a tu muerto»).'
  spanish_consistency_notes:
  - Se usa «Mi señor» para un interlocutor humano, evitando confundirlo con tratamiento divino.
  - Se mantiene «siclos de plata» como medida de valor/peso, coherente con el registro bíblico.
  - La construcción «entre tú y yo» preserva la interacción personal del hebreo con naturalidad en español.
  - El cierre imperativo queda directo, sin conector inferido adicional.
