translation:
  language: es
  text: Anduvo en el camino de su padre Asa y no se apartó de él, haciendo lo recto[a] ante los ojos de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: “lo que era recto” o “lo correcto”; el hebreo usa un adjetivo sustantivado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: He walked
  chosen_spanish: Anduvo
  alternatives_spanish:
  - Fue
  - Caminó
  lexicon: HALOT
  rationale: הלך en fórmulas evaluativas de reyes describe la conducta o el modo de vivir. 'Anduvo' conserva la metáfora del camino y es natural en español bíblico actual.
- source_word: בְּדֶרֶךְ
  english_pob_choice: in the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la senda
  - en la manera de vivir
  lexicon: HALOT
  rationale: דֶּרֶךְ funciona aquí como metáfora de conducta. 'Camino' mantiene la imagen sin sonar forzado en español.
- source_word: אָבִיו אָסָא
  english_pob_choice: of his father Asa
  chosen_spanish: de su padre Asa
  alternatives_spanish:
  - de Asa, su padre
  lexicon: HALOT
  rationale: La construcción posesiva indica que Asa era su padre. 'De su padre Asa' comunica la relación de forma clara y natural.
- source_word: וְלֹא סָר מִמֶּנָּה
  english_pob_choice: and did not turn aside from it
  chosen_spanish: y no se apartó de él
  alternatives_spanish:
  - y no se desvió de él
  - y no se desvió de ella
  lexicon: HALOT
  rationale: סור con מן expresa apartarse/retirarse. El antecedente es 'camino', masculino en español; por eso se usa 'él' para evitar una traducción gramaticalmente confusa.
- source_word: לַעֲשׂוֹת
  english_pob_choice: doing
  chosen_spanish: haciendo
  alternatives_spanish:
  - para hacer
  - al hacer
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa aquí manera o resultado. 'Haciendo' enlaza de forma fluida con la cláusula anterior.
- source_word: הַיָּשָׁר
  english_pob_choice: what was right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo justo
  - lo correcto
  lexicon: HALOT
  rationale: יָשָׁר en este giro evaluativo apunta a rectitud moral. 'Lo recto' conserva bien la fuerza adjetival y evita una paráfrasis excesiva.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - a la vista de Yahvé
  lexicon: HALOT
  rationale: El hebreo usa un modismo de evaluación divina. 'Ante los ojos de Yahvé' preserva la imagen y el nombre divino conforme al criterio del proyecto.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo trae explícitamente el Tetragrámaton. Según la norma del proyecto en español, se traduce como 'Yahvé' para preservar el nombre del pacto y evitar el reemplazo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto en inglés fue revisado sin cambios sustanciales; la concordancia alta confirma que no se requieren ajustes textuales adicionales. La decisión principal en español es mantener la metáfora del camino y el nombre divino conforme a la norma del proyecto.
  spanish_consistency_notes:
  - Se mantiene la metáfora de conducta con 'anduvo' / 'camino'.
  - '''Yahvé'' se usa de forma consistente para יְהוָה.'
  - La referencia pronominal se adapta al género gramatical de 'camino' en español sin alterar el sentido hebreo.
  - '''Lo recto'' conserva la evaluación moral breve del hebreo.'
