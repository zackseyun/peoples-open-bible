  source_alignment_summary: 'El borrador sigue de cerca el griego y la auditoría inglesa en los elementos principales: duración limitada (πρὸς ὀλίγον), perturbación sufrida (ἐταράχθησαν), objeto representativo (σύμβολον), peso teológico de σωτηρίας y la función memorial de εἰς ἀνάμνησιν. Sin embargo, el texto español omitió en la línea principal la frase εἰς νουθεσίαν / ''as a warning'', aunque sí aparece documentada en las decisiones léxicas. Esa omisión afecta el sentido exhortativo del versículo y requiere corrección.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta dos problemas de naturalidad/fidelidad: 1) falta ''como advertencia'', y 2) la nota al pie usa el anglicismo ''token'', impropio para un texto bíblico en español. Además, ''fueron turbados'' es inteligible, pero ''fueron perturbados'' suena algo más natural en español actual sin perder el registro.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'salvación' está bien alineado con σωτηρίας. 'signo' es defendible para σύμβολον, aunque 'señal' también sería posible; no hace falta cambiarlo. No aparecen términos sensibles del glosario mayor como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: high
    issue: Omisión de 'como advertencia' en el texto español
    rationale: El griego abre con εἰς νουθεσίαν y la POB inglesa traduce 'as a warning[a]'. El borrador español no lo refleja en la línea principal, por lo que pierde una parte sustancial del propósito de la aflicción.
  - severity: medium
    issue: La nota al pie incluye el anglicismo 'token'
    rationale: Aunque proviene de la alternativa inglesa, en español bíblico general 'token' no es natural ni claro. Debe sustituirse por una opción española como 'señal', 'símbolo' o 'señal de liberación'.
  - severity: low
    issue: '''Fueron turbados'' suena algo menos natural que ''fueron perturbados'' o ''se turbaron'''
    rationale: '''Turbados'' es comprensible y bíblico, pero en registro español moderno amplio ''perturbados'' fluye mejor aquí. Es un ajuste estilístico menor, no una corrección obligatoria de sentido.'
  revised_spanish_text: Pero por un corto tiempo fueron perturbados como advertencia[a], teniendo un signo de salvación, como recordatorio del mandamiento de tu ley;
