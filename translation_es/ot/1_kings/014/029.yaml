translation:
  language: es
  text: Los demás hechos de Roboam[a], y todo lo que hizo, ¿no están escritos en el Libro de las Crónicas de los reyes de Judá?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los anales de los reyes de Judá». La expresión hebrea traducida «las Crónicas» se refiere a un registro real de acontecimientos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Los demás
  alternatives_spanish:
  - Y el resto de
  - El resto de
  lexicon: HALOT
  rationale: יֶתֶר expresa lo que queda o lo restante. En español, «Los demás» conserva la idea de lo restante de la narración sin introducir un «ahora» que no es necesario en la fórmula archivística.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - hechos y asuntos
  - palabras
  lexicon: HALOT
  rationale: En esta fórmula real, דִּבְרֵי no se refiere a «palabras» sino al registro de las acciones y asuntos del rey. «Hechos» comunica bien ese valor histórico y narrativo en español.
- source_word: רְחַבְעָם
  english_pob_choice: Rehoboam
  chosen_spanish: Roboam
  alternatives_spanish:
  - Rehoboam
  lexicon: Convención onomástica bíblica en español
  rationale: Se usa la forma bíblica española más establecida, «Roboam», que corresponde al nombre propio en tradición castellana y sigue siendo plenamente reconocible.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y todo cuanto hizo
  - y todo lo que realizó
  lexicon: HALOT
  rationale: La cláusula es directa y global. «Todo lo que hizo» preserva el alcance amplio de עָשָׂה sin añadir matices de logro o valoración.
- source_word: הֲלֹא
  english_pob_choice: are they not
  chosen_spanish: ¿no
  alternatives_spanish:
  - ¿acaso no
  - ¿no es cierto que
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera respuesta afirmativa. En español, «¿no...?» conserva esa fuerza interrogativa sin sobreexplicarla.
- source_word: הֵמָּה כְתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: están escritos
  alternatives_spanish:
  - están registrados
  - están consignados
  - están escritos
  lexicon: HALOT
  rationale: El participio pasivo כְתוּבִים se rinde con el pasivo «están escritos». Mantenerlo respeta la formulación documental del hebreo y la forma de cita historiográfica.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el rollo
  - en el libro
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sobre un libro/rollo», el español idiomático de la cita histórica es «en el Libro». Conserva la referencia documental sin sonar forzado.
- source_word: דִּבְרֵי הַיָּמִים
  english_pob_choice: the Chronicles
  chosen_spanish: las Crónicas
  alternatives_spanish:
  - los Anales
  - las crónicas
  lexicon: HALOT
  rationale: El contexto es un título de fuente real/annalística. «Las Crónicas» mantiene el sentido de registro histórico y sigue el valor documental que la POB documenta para esta expresión.
- source_word: לְמַלְכֵי יְהוּדָה
  english_pob_choice: of the Kings of Judah
  chosen_spanish: de los reyes de Judá
  alternatives_spanish:
  - de los monarcas de Judá
  - para los reyes de Judá
  lexicon: HALOT
  rationale: La preposición ל en esta fórmula funciona como complemento del título del registro. «De los reyes de Judá» reproduce la relación genitiva natural en español y mantiene la referencia al archivo real.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto fuente hebreo y con el audit trail inglés: la única decisión relevante es mantener la fórmula historiográfica en español con un equivalente natural («Las Crónicas») y conservar la pregunta retórica. No se documentan revisiones textuales ni variantes de sentido adicionales.'
  spanish_consistency_notes:
  - 'Se mantuvo el nombre propio bíblico en su forma española establecida: «Roboam».'
  - Se conservó el tono formular e historiográfico del versículo sin añadir elementos interpretativos.
  - La nota al pie preserva la alternativa documental («anales») que la POB inglesa documenta para el término fuente.
