review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura exhortativa del hebreo: cubrirse con saco, clamar a Dios con intensidad, y volverse del mal camino y de la violencia. Conserva correctamente ''Dios'' para אֱלֹהִים, ''violencia'' para חָמָס y la metáfora ética de ''camino'' para דֶּרֶךְ. Sin embargo, la cláusula inicial ''sean cubiertos de saco'' suena menos natural en español bíblico que ''se cubran con saco'', y la nota al pie está anclada en ''saco'' aunque la alternativa ''cilicio'' corresponde mejor a toda la expresión.'
  spanish_quality_summary: La redacción es clara y bastante legible, con tono digno. No obstante, 'sean cubiertos de saco' resulta algo forzado; 'se cubran con saco' es más idiomático y sigue siendo fiel al hitpael. El resto del verso fluye bien. La nota léxica puede mantenerse, pero conviene anclarla a la frase completa 'con saco' para que la alternativa 'cilicio' se entienda como sustituto de la expresión, no solo del sustantivo aislado.
  glossary_alignment: 'Alineación buena con las decisiones del POB: ''Dios'', ''bestia'', ''clamen'', ''se vuelva'', ''mal camino'', y ''violencia'' están bien encaminados. No hay conflicto con terminología doctrinal del proyecto. La principal mejora es estilística y de fidelidad idiomática al valor medio/reflexivo de וְיִתְכַּסּוּ.'
  issues:
  - severity: medium
    issue: 'Construcción inicial poco natural: ''sean cubiertos de saco'''
    rationale: Aunque posible, en español suena más torpe y menos idiomático que 'se cubran con saco'. El hebreo hitpael admite bien una formulación media/reflexiva en español, y el cambio mejora la legibilidad sin perder el tono de decreto.
  - severity: low
    issue: Anclaje de la nota léxica en 'saco' en vez de la expresión completa
    rationale: La alternativa 'cilicio' funciona como equivalente contextual de 'saco'/'vestirse de saco', pero en español se percibe mejor si la nota está ligada a 'con saco' dentro de la frase revisada.
  revised_spanish_text: Que tanto el hombre como la bestia se cubran con saco[a], y que clamen con fuerza a Dios, y que cada uno se vuelva de su mal camino y de la violencia que hay en sus manos.
  revised_footnotes:
