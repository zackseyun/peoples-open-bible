review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia hebrea y las decisiones auditadas en inglés: llegada de los dos ángeles a Sodoma al anochecer, Lot sentado en la puerta, reacción al verlos, levantarse para salir a su encuentro y gesto de profunda reverencia. Sin embargo, la cláusula final en español (''se inclinó rostro en tierra'') queda algo elíptica y menos natural que el hebreo/inglés, y ''para recibirlos'' atenúa levemente לִקְרָאתָם (''al encuentro de ellos'').'
  spanish_quality_summary: La redacción es mayormente clara y digna, con buen español bíblico contemporáneo. No obstante, 'se inclinó rostro en tierra' suena forzado por ausencia de preposición/artículo; 'con el rostro en tierra' o 'rostro a tierra' sería más natural. Además, 'se levantó para salir a su encuentro' refleja mejor el movimiento implícito que 'para recibirlos'.
  glossary_alignment: No hay términos del glosario principal en disputa aquí. 'Ángeles' para מַלְאָכִים y 'Sodoma' son correctos. La decisión de no traducir וַיִּשְׁתַּחוּ como 'adoró' está alineada con la justificación teológica auditada.
  issues:
  - severity: medium
    issue: La frase 'se inclinó rostro en tierra' es poco natural en español actual.
    rationale: Aunque intenta conservar la concisión solemne, omite un nexo esperado y suena demasiado abrupta. El hebreo expresa postración completa; en español 'se inclinó con el rostro en tierra' comunica eso con más claridad y dignidad.
  - severity: low
    issue: '''para recibirlos'' debilita ligeramente la idea de salir al encuentro.'
    rationale: לִקְרָאתָם indica ir al encuentro de ellos. 'Recibirlos' es posible por contexto de hospitalidad, pero 'salir a su encuentro' preserva mejor el matiz espacial y narrativo.
  - severity: low
    issue: La nota [c] usa 'inclinación/prostración', mezcla algo técnica y poco elegante.
    rationale: Puede expresarse de forma más natural como 'una reverencia o postración completa', manteniendo la intención lexical sin jerga innecesaria.
  revised_spanish_text: Los dos ángeles llegaron a Sodoma[a] al atardecer, y Lot estaba sentado a la puerta de Sodoma[b]. Cuando Lot los vio, se levantó para salir a su encuentro y se inclinó con el rostro en tierra[c].
  revised_footnotes:
  - marker: a
    text: O «por la tarde». El hebreo marca el momento de llegada con una expresión temporal que puede abarcar el atardecer o la tarde avanzada.
    reason: lexical_alternative
  - marker: b
    text: «La puerta de Sodoma» designa el área de la puerta de la ciudad, un lugar público asociado con la vida cívica y judicial.
    reason: cultural_note
  - marker: c
    text: O «se postró con el rostro en tierra». El hebreo describe una reverencia o postración completa.
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase final para un español más natural y fiel al modismo hebreo de postración completa, y se fortalece לִקְרָאתָם con 'salir a su encuentro'. Las notas se mantienen en línea con la auditoría inglesa, pero con formulación española más clara.
