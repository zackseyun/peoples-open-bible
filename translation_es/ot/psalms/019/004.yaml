translation:
  language: es
  text: No hay habla, ni hay palabras; no se oye su voz[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no se oye su sonido». El hebreo קוֹל puede significar «voz» o «sonido».'
