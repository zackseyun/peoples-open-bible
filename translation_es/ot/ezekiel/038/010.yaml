translation:
  language: es
  text: 'Así dice el Señor Yahvé: En aquel día, cosas[a] surgirán en tu corazón[b], y trazarás un plan malvado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asuntos». El hebreo דְבָרִים puede significar «palabras» o, de manera más amplia, «cosas/asuntos».
    reason: lexical_alternative
  - marker: b
    text: En la antropología hebrea, el corazón es el centro del pensamiento y de la intención, no solo de las emociones.
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética se conserva con un registro solemne y natural en español; «Así dice» reproduce bien el tono de mensajero sin sonar demasiado arcaico.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé Dios
  lexicon: HALOT
  rationale: Se preserva el nombre divino YHWH como «Yahvé» según la pauta del proyecto, y se mantiene «Señor» para אֲדֹנָי. La combinación evita la sustitución litúrgica por «SEÑOR» y hace auditable la distinción del título compuesto.
- source_word: וְהָיָה בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - Y será en aquel día
  - Ese día
  lexicon: HALOT
  rationale: La expresión temporal profética se vierte en una forma natural en español, conservando el valor deíctico y escatológico de la fórmula hebrea.
- source_word: יַעֲלוּ דְבָרִים
  english_pob_choice: things will come up
  chosen_spanish: cosas subirán
  alternatives_spanish:
  - asuntos subirán
  - palabras subirán
  - cosas vendrán a tu corazón
  lexicon: HALOT
  rationale: La imagen hebrea de «subir» junto con דְבָרִים admite «cosas/asuntos» además de «palabras». «Cosas subirán» conserva el movimiento metafórico y la amplitud semántica que la revisión inglesa prefirió con «things will come up».
- source_word: עַל לְבָבֶךָ
  english_pob_choice: in your heart
  chosen_spanish: a tu corazón
  alternatives_spanish:
  - en tu corazón
  - sobre tu corazón
  - en tu mente
  lexicon: HALOT
  rationale: «Corazón» mantiene la antropología hebrea como centro de pensamiento e intención. Se usa «a tu corazón» para reflejar el movimiento interno del hebreo עַל sin reducirlo a mera emoción o solo a mente.
- source_word: וְחָשַׁבְתָּ
  english_pob_choice: you will devise
  chosen_spanish: trazarás
  alternatives_spanish:
  - pensarás
  - maquinarás
  - planearás
  lexicon: HALOT
  rationale: El verbo aquí implica idear/planear con intención; «trazarás» comunica elaboración deliberada con un matiz sobrio, adecuado al contexto hostil sin volverlo demasiado coloquial.
- source_word: מַחֲשֶׁבֶת רָעָה
  english_pob_choice: an evil plan
  chosen_spanish: un plan malo
  alternatives_spanish:
  - un plan maligno
  - una mala intención
  - una mala estrategia
  lexicon: HALOT
  rationale: Se conserva el sustantivo «plan» para el valor calculado de מַחֲשֶׁבֶת. «Malo» mantiene la cualidad moral de רָעָה en un español claro; se evita intensificar injustificadamente a «maligno».
theological_decisions:
- issue: Rendering of the divine name in אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: La fuente hebrea contiene explícitamente YHWH. En la línea doctrinal del proyecto, se translitera como «Yahvé» en vez de ocultarlo tras un equivalente tradicional. «Señor» corresponde a אֲדֹנָי y evita perder el doble título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Hebrew idiom of cognitive interiority in לְבָבֶךָ
  english_pob_reading: in your heart
  chosen_spanish_reading: a tu corazón
  alternative_spanish_readings:
  - en tu corazón
  - en tu mente
  rationale: Se preserva la antropología bíblica de «corazón» como centro de pensamiento, intención y decisión, sin reducir el sentido a emoción ni sustituirlo por una psicología moderna.
  doctrine_reference: Hebrew anthropology / idiom note
- issue: Force of מַחֲשֶׁבֶת רָעָה
  english_pob_reading: an evil plan
  chosen_spanish_reading: un plan malo
  alternative_spanish_readings:
  - un plan maligno
  - una mala intención
  rationale: La construcción subraya intención calculada y moralmente mala. «Plan malo» conserva esa evaluación sin sobretraducir a una categoría demonológica no exigida por el hebreo.
  doctrine_reference: Lexical force of חשב / מחשבה
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en el texto español y manteniendo coherencia con la revisión inglesa que prefirió un equivalente más natural para דְבָרִים. La formulación final conserva el nombre divino como Yahvé y evita el ocultamiento del Tetragrama.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוִה conforme a la pauta del proyecto; no se sustituyó por «SEÑOR».
  - Se mantuvo «corazón» como sede de pensamiento e intención, en línea con la antropología hebrea.
  - «Cosas» en la nota [b] refleja la amplitud semántica de דְבָרִים y evita restringirlo a «palabras» únicamente.
  - El verbo «trazarás» busca conservar el matiz de plan deliberado sin introducir un coloquialismo excesivo.
