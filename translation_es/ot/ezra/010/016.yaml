    text: O 'los exiliados hicieron así'. El hebreo dice literalmente 'los hijos del exilio', una designación corporativa de la comunidad que regresó.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''jefes de casas paternas'', es decir, líderes de clanes o grupos familiares.'
    reason: cultural_note
  revision_rationale: Se elimina la nota [b] porque no corresponde a una decisión exegética o alternativa del original, se corrige la nota [c] para una redacción limpia, y se cambia 'se sentaron' por 'se reunieron' para lograr un español más natural en contexto administrativo mientras se preserva el sentido deliberativo del hebreo.
