base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/034/022.yaml
  text: Behold[a], I am commanding, declares Yahweh, and I will bring them back to this city, and they will fight against it and capture it and burn it with fire. And I will make the cities of Judah a desolation[b], without inhabitant.
  footnotes:
  - marker: a
    text: Or 'I will return them to this city.' The Hebrew verb is causative ('cause to return/bring back'). In context it refers to the enemy forces being brought back to Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: Or 'without anyone dwelling there.' The Hebrew idiom emphasizes complete desolation and depopulation.
    reason: lexical_alternative
