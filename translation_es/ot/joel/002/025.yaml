translation:
  language: es
  text: 'Yo les restauraré los años que devoró la langosta migratoria[a], el saltón, el devorador y el cortador: mi gran ejército que envié entre ustedes[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los cuatro términos hebreos probablemente se refieren a tipos o etapas de langosta. Sus distinciones zoológicas exactas son inciertas; otras posibilidades incluyen ‘langosta reptadora’, ‘devorador’ y ‘roedor’.
    reason: lexical_alternative
  - marker: b
    text: O ‘contra ustedes’. La preposición hebrea aquí puede entenderse de más de una manera.
    reason: alternative_reading
lexical_decisions:
- source_word: וְשִׁלַּמְתִּי
  english_pob_choice: I will restore
  chosen_spanish: restauraré
  alternatives_spanish:
  - restituiré
  - pagaré
  lexicon: HALOT
  rationale: El piel de שלם puede expresar compensar, retribuir o restaurar. En este contexto agrícola, ‘restauraré’ comunica mejor la idea de devolver lo perdido sin reducirla a un pago monetario.
- source_word: לָכֶם
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: HALOT
  rationale: El dativo español natural para los receptores directos de la promesa es ‘les’; mantiene la referencia comunitaria sin sobrecargar la frase.
- source_word: הַשָּׁנִים
  english_pob_choice: the years
  chosen_spanish: los años
  alternatives_spanish:
  - los años perdidos
  - los años de cosecha
  lexicon: HALOT
  rationale: Se conserva el objeto literal ‘los años’, como en hebreo, para mantener la imagen metonímica de los años arrasados por la plaga.
- source_word: אֲשֶׁר אָכַל
  english_pob_choice: that ... has eaten
  chosen_spanish: que devoró
  alternatives_spanish:
  - que comió
  - que consumió
  lexicon: HALOT
  rationale: ‘Devorar’ expresa bien la fuerza destructiva del verbo en este contexto y en español suena más natural que una traducción demasiado literal de ‘comer’.
- source_word: הָאַרְבֶּה
  english_pob_choice: the swarming locust
  chosen_spanish: la langosta enjambre
  alternatives_spanish:
  - la langosta migratoria
  - la langosta que enjambra
  lexicon: HALOT
  rationale: Se intenta distinguir este término de los siguientes con un equivalente descriptivo. ‘Langosta enjambre’ conserva el rasgo de abundancia/movimiento sin fingir una precisión zoológica que el texto no asegura.
- source_word: הַיֶּלֶק
  english_pob_choice: the hopper
  chosen_spanish: el saltón
  alternatives_spanish:
  - la langosta saltadora
  - el salteador
  lexicon: HALOT
  rationale: ‘Saltón’ refleja una forma/etapa de langosta y diferencia este término de los otros. Es una solución breve y comprensible en español.
- source_word: וְהֶחָסִיל
  english_pob_choice: the destroyer
  chosen_spanish: el devorador
  alternatives_spanish:
  - el destructor
  - la langosta devoradora
  lexicon: HALOT
  rationale: Como el inglés POB eligió un término de fuerza destructiva, ‘devorador’ preserva el matiz de consumo/ruina y mantiene el paralelismo con la serie.
- source_word: וְהַגָּזָם
  english_pob_choice: the cutter
  chosen_spanish: el cortador
  alternatives_spanish:
  - el cortante
  - la langosta cortadora
  lexicon: HALOT
  rationale: ‘Cortador’ reproduce el valor distintivo y compacto del término, sin introducir una clasificación entomológica excesiva.
- source_word: חֵילִי הַגָּדוֹל
  english_pob_choice: my great army
  chosen_spanish: mi gran ejército
  alternatives_spanish:
  - mi gran fuerza
  - mi gran hueste
  lexicon: HALOT
  rationale: חיל aquí conserva la metáfora militar aplicada a la plaga. ‘Ejército’ mantiene la personificación bélica y la afirmación teológica de la soberanía divina.
- source_word: אֲשֶׁר שִׁלַּחְתִּי בָּכֶם
  english_pob_choice: that I sent among you
  chosen_spanish: que envié entre ustedes
  alternatives_spanish:
  - que envié contra ustedes
  - que envié en medio de ustedes
  lexicon: HALOT
  rationale: ‘Entre ustedes’ traduce de forma natural el valor espacial de ב en este contexto. Permite conservar la lectura del POB (‘among you’) sin convertirla de inmediato en una hostilidad explícita no exigida por la preposición misma.
theological_decisions:
- issue: Cómo reflejar la responsabilidad divina en la plaga
  english_pob_reading: God explicitly claims responsibility for sending the plague
  chosen_spanish_reading: Dios la envió entre ustedes
  alternative_spanish_readings:
  - Dios la permitió entre ustedes
  - Dios la envió contra ustedes
  rationale: 'El hebreo usa la primera persona directa: ‘yo envié’. La traducción no suaviza esa afirmación, aunque ‘entre ustedes’ deja abierta la carga espacial que también ofrece el texto.'
  doctrine_reference: Soberanía divina en Joel 2:25
- issue: Si la serie de términos describe insectos reales o una metáfora puramente militar
  english_pob_reading: Literal locust plague described with military imagery
  chosen_spanish_reading: Una plaga de langostas descrita con lenguaje militar
  alternative_spanish_readings:
  - Un ejército humano simbólico
  - Solo una imagen metafórica
  rationale: Se preserva la serie concreta de cuatro términos y, a la vez, la apposición ‘mi gran ejército’, sin colapsar la plaga en una alegoría meramente humana.
  doctrine_reference: Lectura literal-metafórica conservando ambos niveles
translation_notes:
  revision_awareness: Se siguió el último pase de revisión sin cambios sustanciales; se conservaron las decisiones óptimas del audit trail en torno a שלם, la serie de términos para la plaga y el valor espacial de ב. La redacción española ajusta la naturalidad sintáctica sin añadir contenido no sustentado por el hebreo.
  spanish_consistency_notes:
  - Se usa ‘Y yo’ para reflejar la continuidad enfática del hebreo con וְ.
  - Se mantiene ‘Yahvé’ solo cuando el texto lo requiera explícitamente; aquí no aparece el Tetragrámaton.
  - ‘Entre ustedes’ conserva el alcance comunitario de בָּכֶם sin forzar ‘contra ustedes’.
  - La serie ‘langosta enjambre / saltón / devorador / cortador’ busca distinguir los cuatro términos sin pretender taxonomía definitiva.
