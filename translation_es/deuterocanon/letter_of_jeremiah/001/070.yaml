  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Dioses' aquí refiere a ídolos, no al Dios de Israel. 'Espantapájaros' para βάμψῳ concuerda con la decisión POB y la nota conserva la alternativa más literal. 'Cadáver', 'madera', 'oro y plata' están bien resueltos.
