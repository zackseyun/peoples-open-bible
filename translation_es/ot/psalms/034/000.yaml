revisions:
- from: De David[a], cuando cambió su manera de comportarse delante de Abimelec, y lo expulsó, y él se fue.
  to: De David[a], cuando cambió su comportamiento delante de Abimelec, y Abimelec lo expulsó, y él se fue.
  rationale: Se hizo una reparación menor para explicitar el sujeto de 'expulsó' y así preservar con claridad la relación referencial documentada en el expediente POB. También se simplificó 'su manera de comportarse' a 'su comportamiento' por mayor naturalidad en español, sin pérdida de sentido. La nota se conserva intacta en contenido, con comillas tipográficas españolas.
