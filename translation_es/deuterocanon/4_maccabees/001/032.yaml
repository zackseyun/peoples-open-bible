translation:
  language: es
  text: Ahora, entre los deseos[a], unos son del alma y otros del cuerpo; y sobre ambos, la razón evidentemente prevalece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la razón evidentemente prevalece sobre ambos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιθυμιῶν
  english_pob_choice: desires
  chosen_spanish: deseos
  alternatives_spanish:
  - apetitos
  - ansias
  - pasiones
  lexicon: BDAG
  rationale: ἐπιθυμία designa aquí una categoría amplia de impulso o deseo. «Deseos» es la opción más natural y neutra en español para este marco filosófico, sin cargar el término con un matiz moral negativo que el griego no exige.
- source_word: ψυχικαί
  english_pob_choice: of the soul
  chosen_spanish: del alma
  alternatives_spanish:
  - psíquicos
  - mentales
  - del espíritu
  lexicon: LSJ
  rationale: La oposición es con σωματικαί. «Del alma» conserva la distinción antropológica del texto fuente y evita «psíquicos», que en español puede sonar técnico o confuso. «Del espíritu» introduciría otra categoría no presente en el griego.
- source_word: σωματικαί
  english_pob_choice: of the body
  chosen_spanish: del cuerpo
  alternatives_spanish:
  - corporales
  - físicos
  lexicon: LSJ
  rationale: Es el contrapeso natural de ψυχικαί. «Del cuerpo» mantiene el paralelismo directo y resulta más claro que «corporales» o «físicos» en este contexto.
- source_word: λογισμός
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el razonamiento
  - el juicio racional
  - la mente
  lexicon: LSJ
  rationale: En 4 Macabeos λογισμός es la facultad racional que gobierna el impulso. «La razón» es breve, idiomática y fiel al valor filosófico del término.
- source_word: ἐπικρατεῖ
  english_pob_choice: prevails
  chosen_spanish: prevalece
  alternatives_spanish:
  - domina
  - se impone
  - es superior
  lexicon: LSJ
  rationale: El verbo expresa predominio o superioridad efectiva. «Prevalece» refleja bien ese valor sin añadir una imagen demasiado dura como «domina», y encaja con el ajuste auditado de la versión inglesa.
- source_word: φαίνεται
  english_pob_choice: evidently
  chosen_spanish: evidentemente
  alternatives_spanish:
  - claramente
  - manifiestamente
  - se ve
  lexicon: LSJ
  rationale: φαίνεται marca lo que se percibe como evidente a partir del argumento. «Evidentemente» reproduce esa fuerza inferencial de modo natural en español.
theological_decisions:
- issue: Distinción antropológica entre alma y cuerpo
  english_pob_reading: some are of the soul and others are of the body
  chosen_spanish_reading: unos son del alma y otros del cuerpo
  alternative_spanish_readings:
  - unos son mentales y otros corporales
  - unos son psíquicos y otros físicos
  rationale: El pasaje clasifica los deseos en dos ámbitos antropológicos sin desarrollar una doctrina dualista. La traducción conserva las categorías del texto sin resolver la tensión interpretativa ni modernizarla en exceso.
  doctrine_reference: Preservar la tensión antropológica del texto fuente; no imponer una antropología sistemática posterior.
- issue: Fuerza de λογισμός ἐπικρατεῖ φαίνεται
  english_pob_reading: reason evidently prevails
  chosen_spanish_reading: la razón evidentemente prevalece
  alternative_spanish_readings:
  - la razón evidentemente domina
  - la razón se impone claramente
  rationale: La idea central es la supremacía de la razón sobre ambos tipos de deseos. «Prevalece» transmite esa superioridad de forma fiel y sobria, sin introducir terminología moral o escolástica ajena al pasaje.
  doctrine_reference: Primacía del sentido fuente; conservar el matiz de predominio racional sin exagerarlo.
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó «is evidently master» por «evidently prevails» para ajustar mejor ἐπικρατεῖ φαίνεται. La versión española sigue esa misma decisión revisada con «la razón evidentemente prevalece», manteniendo el paralelismo y el tono filosófico del original griego.
  spanish_consistency_notes:
  - Se mantiene «alma» / «cuerpo» para ψυχικαί / σωματικαί, evitando términos técnicos que alteren la clasificación del pasaje.
  - «Razón» traduce λογισμός en su sentido filosófico y no como mera «mente».
  - «Prevalece» conserva la fuerza de ἐπικρατεῖ sin sobrecargarla con una imagen de dominación más fuerte que la del texto.
  - La nota al pie recoge la alternativa sintáctica posible, análoga a la observación auditada en inglés sobre el alcance de «over both of these».
