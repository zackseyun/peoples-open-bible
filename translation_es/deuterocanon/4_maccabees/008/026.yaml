revisions:
- from: ¿Por qué se nos ha infundido tal [a] contienda, y por qué nos agrada una resistencia mortal, cuando es posible vivir en tranquilidad, obedeciendo al rey, después de habernos atemorizado con los tormentos que llevan a la muerte?
  to: ¿Por qué se nos ha infundido tal contienda[a], y por qué nos agrada una resistencia mortal, cuando es posible vivir en tranquilidad obedeciendo al rey, después de haber llegado a temer los tormentos que llevan a la muerte?
  rationale: 'Se conserva la traducción principal del borrador porque representa bien el sentido y el tono hostil del discurso del rey. Se hacen dos ajustes menores: mover la nota textual a una posición natural y reemplazar «después de habernos atemorizado con los tormentos» por «después de haber llegado a temer los tormentos», que refleja mejor el valor de φοβηθέντας según la auditoría inglesa y mejora la naturalidad del español.'
