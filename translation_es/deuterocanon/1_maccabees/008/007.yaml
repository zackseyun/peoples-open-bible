translation:
  language: es
  text: y lo tomaron vivo[a], y les impusieron que tanto él como los que reinarían después de él pagaran un gran tributo, y dieran rehenes y una cesión de territorio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo capturaron vivo».'
    reason: lexical_alternative
  - marker: b
    text: El término griego traducido aquí como «cesión de territorio» (διαστολήν) es difícil y puede denotar una división territorial, demarcación o concesión de tierra dentro del arreglo impuesto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβον αὐτὸν ζῶντα
  english_pob_choice: they took him alive
  chosen_spanish: lo tomaron vivo
  alternatives_spanish:
  - lo capturaron vivo
  - lo apresaron vivo
  lexicon: LSJ
  rationale: ζῶντα especifica que fue tomado con vida, no muerto. «Lo tomaron vivo» conserva la concisión y el valor factual del griego, en línea con la opción inglesa auditada.
- source_word: ἔστησαν αὐτοῖς διδόναι
  english_pob_choice: imposed on them that ... should pay / give
  chosen_spanish: impusieron sobre ellos que ... pagaran / dieran
  alternatives_spanish:
  - les exigieron que ... dieran
  - los obligaron a ... pagar / dar
  lexicon: LSJ
  rationale: La construcción expresa establecimiento de una obligación en contexto político-jurídico. «Impusieron sobre ellos» mantiene el matiz de imposición y el alcance legal del griego.
- source_word: φόρον μέγαν
  english_pob_choice: a great tribute
  chosen_spanish: un gran tributo
  alternatives_spanish:
  - un tributo pesado
  - un gran impuesto
  lexicon: LSJ
  rationale: φόρος en este contexto es tributo político, no simplemente impuesto. «Gran» sigue de cerca μέγαν; «pesado» sería posible, pero más interpretativo.
- source_word: ὅμηρα
  english_pob_choice: hostages
  chosen_spanish: rehenes
  alternatives_spanish:
  - hostajes
  - garantes
  lexicon: LSJ
  rationale: ὅμηρα designa personas entregadas como garantía política. «Rehenes» es la equivalencia natural y precisa en español.
- source_word: διαστολήν
  english_pob_choice: a cession of territory
  chosen_spanish: una cesión de territorio
  alternatives_spanish:
  - una división del territorio
  - una delimitación territorial
  - una concesión de tierras
  lexicon: LSJ
  rationale: El término griego es oscuro; en este acuerdo político probablemente alude a una concesión o cesión territorial. «Cesión de territorio» refleja esa lectura sin sobreexplicarla.
- source_word: τοὺς βασιλεύοντας μετʼ αὐτόν
  english_pob_choice: those reigning after him
  chosen_spanish: los que reinarían después de él
  alternatives_spanish:
  - sus sucesores en el trono
  - los que reinasen después de él
  lexicon: LSJ
  rationale: El participio βασιλεύοντας refiere a quienes ejercen realeza, y μετʼ αὐτόν marca sucesión. «Los que reinarían después de él» mantiene la cercanía al griego y fluye naturalmente en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete 1909 y la decisión inglesa auditada de distinguir entre «take/capture alive», la imposición de una obligación política y la dificultad léxica de διαστολήν. Se incorporó la relación coordinada αὐτὸν τε καὶ mediante «tanto él como» para reflejar que la obligación alcanza al rey y a sus sucesores.
  spanish_consistency_notes:
  - Se usa «tributo» para φόρος en un contexto político de sujeción.
  - Se mantiene «rehenes» como término técnico para ὅμηρα.
  - Se conserva la ambigüedad de διαστολήν con una nota, en vez de fijar una interpretación excesivamente específica.
  - Se prefiere «reinarían» para βασιλεύοντας, evitando sustituirlo por una perífrasis menos directa.
