  to: Entonces Belsasar dio la orden, y vistieron a Daniel de púrpura[a], le pusieron una cadena de oro alrededor de su cuello, y proclamaron acerca de él que sería el tercer gobernante en el reino[b].
  rationale: La revisión conserva el texto español natural del borrador, pero repara el aparato crítico para que siga fielmente la auditoría inglesa y la evidencia fuente. Se mueve [a] al segmento de la púrpura con una alternativa correspondiente, se recoloca [b] en la frase de rango, y se ajusta «collar» a «cadena» para una mejor correspondencia léxica.
