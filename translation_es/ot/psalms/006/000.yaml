translation:
  language: es
  text: 'Al director musical: con instrumentos de cuerda, según la Sheminith[a]. Salmo de David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Sheminith; posiblemente «la octava», un ajuste en octava, o un instrumento de ocho cuerdas.
    reason: lexical_alternative
  - marker: b
    text: O «por David» o «para David»; el hebreo puede indicar autoría o asociación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Al director musical
  alternatives_spanish:
  - Al director
  - Al maestro del coro
  - Al jefe de música
  lexicon: HALOT
  rationale: En los encabezados de salmos, esta forma designa al responsable de la ejecución musical. «Director musical» comunica la función sin recurrir a una expresión demasiado eclesiástica o arcaica.
- source_word: בִּנְגִינוֹת
  english_pob_choice: with stringed instruments
  chosen_spanish: con instrumentos de cuerda
  alternatives_spanish:
  - con música de cuerda
  - sobre instrumentos de cuerda
  lexicon: HALOT
  rationale: La expresión apunta al acompañamiento con instrumentos de cuerda. «Con instrumentos de cuerda» es natural en español y conserva el sentido instrumental.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - sobre
  - para
  - conforme a
  lexicon: HALOT
  rationale: En este tipo de encabezamiento, la preposición puede introducir una indicación de melodía, estilo o ajuste musical. «Según» conserva esa relación sin decidir indebidamente si se trata de un instrumento, una melodía o un modo.
- source_word: הַשְּׁמִינִית
  english_pob_choice: the Sheminith
  chosen_spanish: la Sheminit
  alternatives_spanish:
  - la octava
  - el octavo tono
  - la Sheminith
  lexicon: HALOT
  rationale: El referente técnico es incierto. La transliteración «Sheminit» preserva la transparencia del término hebreo y evita una precisión falsa en el texto principal.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Salmo cantado
  lexicon: HALOT
  rationale: Es el equivalente establecido y fiel del término hebreo en encabezamientos salmódicos.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - de parte de David
  lexicon: HALOT
  rationale: «De David» conserva la ambigüedad del hebreo, que puede señalar autoría, asociación o dedicación, sin imponer una lectura más específica.
theological_decisions:
- issue: Ambigüedad de לְדָוִד en el encabezamiento
  english_pob_reading: Rendered 'of David' to preserve the Hebrew's ambiguity.
  chosen_spanish_reading: «de David» para preservar la ambigüedad del hebreo.
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El texto no obliga a decidir entre autoría directa, asociación o dedicación. Mantener la ambigüedad respeta la tensión documentada por el POB en inglés.
  doctrine_reference: 'Principio de traducción: preservar la ambigüedad del original cuando el hebreo no exige una resolución.'
translation_notes:
  revision_awareness: 'La revisión de auditoría en inglés corrigió la ubicación de las notas: la nota sobre Sheminith corresponde a «Sheminit» y la nota sobre David corresponde a «de David». La presente redacción sigue esa distribución correcta.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «Salmo» en lugar de una paráfrasis, por tratarse de un encabezamiento técnico estable.
  - La transliteración «Sheminit» evita una falsa certeza semántica en el texto principal y deja la aclaración en nota.
