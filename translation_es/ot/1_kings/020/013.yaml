    issue: נָבִיא אֶחָד se traduce como «un profeta» en vez de reflejar la indefinición introductoria.
    rationale: El hebreo literalmente «un profeta, uno» funciona idiomáticamente como introducción de un personaje no especificado. «Un cierto profeta» o «cierto profeta» preserva mejor ese matiz que el simple «un profeta».
  - severity: medium
    issue: La nota al pie está anclada en «he aquí» en lugar de conservar la alternativa léxica principal de הֶהָמוֹן.
    rationale: El English POB documenta la amplitud semántica de הֶהָמוֹן en contexto militar («multitude / vast army / horde»). En español, «multitud» es válida, pero la nota debe explicar alternativas como «ejército» o «muchedumbre»; la nota sobre וְהִנֵּה no es necesaria aquí.
  - severity: low
    issue: «Y he aquí» es comprensible pero algo rígido en español contemporáneo.
    rationale: No es incorrecto, pero suena más calcado que natural. Aun así, puede mantenerse por su tono bíblico y por corresponder al valor discursivo de וְהִנֵּה.
