  text: καὶ μεταστήσας αὐτὸν ἤγειρεν ⸂τὸν Δαυὶδ αὐτοῖς⸃ εἰς βασιλέα, ᾧ καὶ εἶπεν μαρτυρήσας· Εὗρον Δαυὶδ τὸν τοῦ Ἰεσσαί, ἄνδρα κατὰ τὴν καρδίαν μου, ὃς ποιήσει πάντα τὰ θελήματά μου.
base_translation:
  language: en
  yaml_path: translation/nt/acts/013/022.yaml
  text: And after removing him[a], he raised up David for them as king, to whom he also bore witness and said, ‘I have found David the son of Jesse, a man according to my heart[b], who will do all my will.’
  footnotes:
  - marker: a
    text: Or, more traditionally, “a man after my own heart.” The Greek more literally says “according to my heart.”
    reason: lexical_alternative
  - marker: b
    text: Greek “all my wills,” with the noun in the plural; many English translations smooth this to “all my will.”
    reason: lexical_alternative
translation:
  language: ko
  text: 그를 폐하신 뒤에, 다윗을 세워 그들의 왕으로 삼으셨고, 그에 대하여 증언하시며 이렇게 말씀하셨습니다. 「내가 이새의 아들 다윗을 만났으니, 내 마음에 맞는 사람이라. 그가 내 모든 뜻을 이루리라.」
  philosophy: optimal-equivalence
