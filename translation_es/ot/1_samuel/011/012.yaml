revisions:
- from: 'Entonces el pueblo dijo a Samuel: “¿Quién es el que dijo: ‘¿Reinará Saul sobre nosotros?’ Entreguen a esos hombres, y los mataremos[a]”'
  to: 'Entonces el pueblo dijo a Samuel: «¿Quién es el que dijo: “¿Reinará Saúl sobre nosotros?”[a] Entreguen a los hombres, y los ejecutaremos»'
  rationale: 'Se hicieron correcciones menores para alinear mejor el español con el hebreo y con la rationale ya documentada por la POB inglesa: ''Saúl'' con ortografía española estándar; ''los hombres'' en vez de ''esos hombres'' para no añadir deixis innecesaria; y ''los ejecutaremos'' para reflejar mejor el valor judicial de וּנְמִיתֵם. También se aclaró la nota al pie para que preserve la alternativa afirmativa del imperfecto en vez de repetir la lectura principal.'
