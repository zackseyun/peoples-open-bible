review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: primero se hace una morada apta para el ídolo, luego se lo coloca en un muro y se lo asegura con hierro. Sin embargo, en la redacción española actual hay un problema referencial serio: «la puso» y «asegurándola» hacen que el objeto colocado parezca ser «la morada», cuando el griego αὐτό se refiere al ídolo/objeto fabricado. Eso altera la relación sintáctica y el sentido inmediato del versículo.'
  spanish_quality_summary: El español suena generalmente natural y digno, pero la concordancia pronominal femenina introduce ambigüedad y lectura incorrecta. También la nota al pie usa «ello», que en este contexto suena algo torpe; «él» o una reformulación sin pronombre sería más idiomática en español, aunque el texto principal debe evitar personificar al ídolo en la medida posible.
  glossary_alignment: No hay términos de glosario mayor en juego. La decisión de no personificar el ídolo es correcta en principio, pero el borrador no la ejecuta bien porque los pronombres femeninos remiten a «morada» en vez de al ídolo. «Morada» para οἴκημα, «en un muro» para ἐν τοίχῳ, y «con hierro» para σιδήρῳ están alineados con el expediente inglés.
  issues:
  - severity: high
    issue: Pronombres de objeto equivocados en «la puso» y «asegurándola»
    rationale: El griego ἔθηκεν αὐτό y ἀσφαλισάμενος se refieren al ídolo/objeto fabricado, no a «morada». La forma femenina singular en español desplaza el referente y hace que parezca que se coloca y asegura la morada.
  - severity: medium
    issue: La nota al pie con «ello» suena poco natural
    rationale: Aunque intenta conservar neutralidad, «casa digna de ello» y «morada adecuada para ello» resultan menos idiomáticas en español bíblico claro. Puede mantenerse la alternativa léxica con una formulación más natural.
  revised_spanish_text: Y después de hacerle una morada[a] adecuada, puso el ídolo en un muro, asegurándolo con hierro.
  revised_footnotes:
  - marker: a
    text: O «una casa digna de él» o «una morada adecuada para él».
    reason: lexical_alternative
