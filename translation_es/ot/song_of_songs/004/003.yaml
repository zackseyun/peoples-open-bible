translation:
  language: es
  text: Tus labios son como un hilo de escarlata, y tu boca es hermosa[a]. Tus sienes son como una rodaja de granada detrás de tu velo[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu habla es hermosa»; el término hebreo puede referirse al hablar o al discurso, aunque aquí probablemente apunta a la boca dentro de la secuencia poética de rasgos físicos.
    reason: lexical_alternative
  - marker: b
    text: O «a través de tu velo»; la expresión hebrea sugiere algo visto a través de un cubrimiento o desde detrás de él.
    reason: lexical_alternative
  - marker: c
    text: O «tu cabello» o «tus trenzas» para el término traducido aquí como «velo»; el hebreo es debatido en este contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּ/ח֤וּט
  english_pob_choice: are like a ... thread
  chosen_spanish: son como un hilo
  alternatives_spanish:
  - son como una cuerda
  - son como una hebra
  lexicon: HALOT
  rationale: חוּט puede significar hilo, cuerda o cordón. «Hilo» reproduce bien la imagen delicada del símil y suena natural en español poético.
- source_word: הַ/שָּׁנִי
  english_pob_choice: scarlet
  chosen_spanish: escarlata
  alternatives_spanish:
  - carmesí
  lexicon: HALOT
  rationale: שָׁנִי se refiere al tinte escarlata/carmesí. «Escarlata» conserva el color vivo y la cadencia poética del original.
- source_word: שִׂפְתֹתַיִךְ
  english_pob_choice: your lips
  chosen_spanish: tus labios
  alternatives_spanish:
  - tus bocas
  - tus labios
  lexicon: HALOT
  rationale: El plural/doble hebreo de «labio» se expresa naturalmente en español como «labios».
- source_word: וּ/מִדְבָּרֵיךְ
  english_pob_choice: your mouth
  chosen_spanish: tu boca
  alternatives_spanish:
  - tu hablar
  - tus palabras
  lexicon: HALOT
  rationale: Aunque el término puede relacionarse con hablar o discurso, en este paralelo de rasgos físicos conviene una referencia metonímica a la boca. «Tu boca es hermosa» mantiene el paralelo con los labios y el tono sensual del poema.
- source_word: נָאוֶה
  english_pob_choice: lovely
  chosen_spanish: hermosa
  alternatives_spanish:
  - linda
  - bella
  lexicon: HALOT
  rationale: נָאוֶה significa hermoso, bello, apropiado o encantador. «Hermosa» es claro y digno en español contemporáneo.
- source_word: כְּ/פֶלַח
  english_pob_choice: like a slice of
  chosen_spanish: como una rodaja
  alternatives_spanish:
  - como un gajo
  - como una tajada
  lexicon: HALOT
  rationale: פֶּלַח denota una porción o corte. «Rodaja» transmite con claridad la imagen de un fruto cortado en sección.
- source_word: הָֽ/רִמּוֹן
  english_pob_choice: pomegranate
  chosen_spanish: granada
  alternatives_spanish:
  - granado
  lexicon: HALOT
  rationale: רִמּוֹן es la granada (fruto). En español «granada» es la equivalencia estándar y natural.
- source_word: רַקָּתֵךְ
  english_pob_choice: your temples
  chosen_spanish: tus sienes
  alternatives_spanish:
  - tus mejillas
  lexicon: HALOT
  rationale: רַקָּה designa la sien, el costado de la cabeza. «Sienes» es la forma precisa en español.
- source_word: מִ/בַּ֖עַד
  english_pob_choice: behind
  chosen_spanish: detrás de
  alternatives_spanish:
  - a través de
  - desde detrás de
  lexicon: HALOT
  rationale: La preposición sugiere algo visto desde detrás o a través de un cubrimiento. «Detrás de» es conciso y fiel; la nota preserva la alternativa «a través de».
- source_word: לְ/צַמָּתֵךְ
  english_pob_choice: your veil
  chosen_spanish: tu velo
  alternatives_spanish:
  - tus trenzas
  - tu cabello
  lexicon: HALOT
  rationale: צַמָּה en este contexto se entiende mejor como velo o cobertura, aunque existe debate con cabello/trenzas. «Velo» encaja con la imagen de las sienes parcialmente ocultas.
translation_notes:
  revision_awareness: 'Se mantuvo la alta concordancia con la revisión más reciente: no se requirieron cambios respecto del sentido auditado en el texto inglés POB. La traducción sigue la misma lectura optimal-equivalence, conservando el paralelismo físico y las alternativas léxicas documentadas.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando el texto lo exige; este versículo no contiene el nombre divino.
  - Se eligieron términos transparentes y modernos («hilo», «escarlata», «sienes», «velo») para conservar el registro poético sin caer en calcos rígidos.
  - Se mantuvo la ambigüedad de צַמָּה mediante nota, porque el audit trail inglés documenta una lectura disputada entre velo y cabello/trenzas.
