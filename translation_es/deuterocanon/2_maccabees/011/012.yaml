  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del griego: la mayoría escapa herida y desnuda, y Lisias también escapa huyendo de manera vergonzosa. Sin embargo, la concordancia singular en «escapó herida y desnuda» distorsiona el referente plural implícito de τραυματίαι γυμνοὶ διεσώθησαν y suena como si «la mayoría» fuera una entidad femenina singular, cuando el griego describe a las personas como plural: heridos y desnudos.'
  spanish_quality_summary: El español es entendible, pero la secuencia «la mayoría de ellos escapó herida y desnuda» resulta poco natural y estilísticamente torpe en español bíblico claro. Conviene reformular para mantener la cuantificación singular («la mayoría») sin perder los predicativos plurales que describen a los individuos. «La mayoría de ellos escaparon heridos y desnudos» también sería discutible por mezcla de concordancia; la solución más limpia es «La mayoría de ellos lograron escapar heridos y desnudos[a]».
  glossary_alignment: 'No hay términos del glosario doctrinal principal en juego. La nota léxica sobre γυμνοὶ está bien encaminada, pero en español la alternativa debe concordar en plural con el referente humano: «despojados».'
  issues:
  - severity: high
    issue: Concordancia incorrecta en «escapó herida y desnuda»
    rationale: El griego tiene sujeto plural semántico («la mayoría de ellos») descrito por dos predicativos plurales, τραυματίαι γυμνοὶ. En español, el singular femenino «herida y desnuda» aplicado a «la mayoría» borra que se habla de las personas y no del colectivo abstracto.
  - severity: medium
    issue: Nota al pie con número/plural inconsistente
    rationale: La nota ofrece «despojados», pero el texto ancla «desnuda[a]» en singular. Al corregir el texto, la nota debe corresponder exactamente con el término plural anclado.
  - severity: low
    issue: «también Lisias mismo» suena algo rígido
    rationale: Aunque no es incorrecto, «y el mismo Lisias» o «y Lisias mismo» fluye mejor. Se puede conservar el énfasis sin calco innecesario.
  revised_spanish_text: Pero la mayoría de ellos lograron escapar heridos y desnudos[a]; y Lisias mismo también escapó al huir vergonzosamente.
  revised_footnotes:
  - marker: a
    text: O «despojados», si γυμνοὶ se entiende como que fueron despojados durante la huida y no completamente desnudos.
