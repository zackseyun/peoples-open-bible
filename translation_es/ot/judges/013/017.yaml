review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: Manoaj habla al ángel de Yahvé, pregunta por su nombre, expresa propósito con «para que», y mantiene la idea de honrarlo cuando se cumpla el anuncio. Sin embargo, «tu palabra» reduce un plural hebreo explícito (דבריך, «tus palabras») que el inglés POB decidió preservar; en español puede mantenerse naturalmente como «tus palabras».'
  spanish_quality_summary: El español es claro, natural y digno. «¿Cuál es tu nombre?» y «te honremos» son buenas elecciones. La frase mejora ligeramente al cambiar «se cumpla tu palabra» por «se cumplan tus palabras», que suena natural y sigue más de cerca el número del original y la auditoría inglesa.
  glossary_alignment: El uso de «Yahvé» concuerda con la política del proyecto para יהוה. «Ángel» con nota alternativa «mensajero» también concuerda con la decisión léxica documentada. No hay conflicto terminológico adicional.
  issues:
  - severity: medium
    issue: Número de דְבָרֶיךָ no preservado en el texto principal
    rationale: El hebreo tiene plural («tus palabras»), y el inglés POB lo mantuvo deliberadamente como «your words come to pass». El español borrador usa singular («tu palabra»), que es inteligible pero no reproduce esa decisión auditada ni el número fuente cuando una opción plural natural está disponible.
  revised_spanish_text: 'Entonces Manoaj dijo al ángel de Yahvé[a]: «¿Cuál es tu nombre, para que, cuando se cumplan tus palabras, te honremos?»'
  revised_footnotes:
