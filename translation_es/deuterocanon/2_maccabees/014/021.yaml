revisions:
- from: Así fijaron un día en el que vendrían en privado[a] y, de cada lado, se adelantó un dífrax, y se colocaron asientos.
  to: Así fijaron un día en el que se reunirían en privado; y de cada lado fue sacada una silla de manos[a], y se colocaron asientos.
  rationale: Se reemplaza «vendrían» por «se reunirían» para reflejar ἥξουσιν εἰς τὸ αὐτό. Se sustituye la transliteración opaca «dífrax» por «silla de manos», una opción comprensible y suficientemente cercana al valor probable, manteniendo la incertidumbre exacta en la nota. También se cambia «se adelantó» por «fue sacada» para expresar de modo natural la preparación ceremonial implícita en προῆλθε dentro del contexto.
