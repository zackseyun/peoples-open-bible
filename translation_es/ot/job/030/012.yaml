  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales están alineadas con el rastro inglés. «Turba» es aceptable para פִּרְחַח, aunque menos matizado que «brood/rabble»; sigue siendo defendible. El único desajuste serio es la formulación española de רַגְלַי שִׁלֵּחוּ, que debe reflejar mejor el valor de apartar/desplazar los pies.
