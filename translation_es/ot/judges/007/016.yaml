translation:
  language: es
  text: Entonces dividió a los trescientos hombres en tres compañías[a], y puso trompetas[b] en las manos de todos ellos, y cántaros vacíos[c], con antorchas dentro de los cántaros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «tres cabezas», un modismo que significa tres grupos o compañías.
    reason: lexical_alternative
  - marker: b
    text: O «cuernos de carnero» para «trompetas» (heb. shofarot).
    reason: lexical_alternative
  - marker: c
    text: O «jarros vacíos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחַץ
  english_pob_choice: divided
  chosen_spanish: dividió
  alternatives_spanish:
  - partió
  - separó
  - distribuyó
  lexicon: HALOT
  rationale: El verbo hebreo indica una división organizativa del grupo. «Dividió» conserva ese sentido militar de manera natural en español sin añadir un matiz innecesario de reparto físico.
- source_word: שְׁלֹשׁ מֵאוֹת הָאִישׁ
  english_pob_choice: the three hundred men
  chosen_spanish: los trescientos hombres
  alternatives_spanish:
  - los trescientos soldados
  - los trescientos varones
  lexicon: HALOT
  rationale: «Hombres» reproduce bien אִישׁ y mantiene el referente humano sin sobreinterpretar como «soldados», que sería más explícito de lo que pide el hebreo.
- source_word: שְׁלֹשָׁה רָאשִׁים
  english_pob_choice: three companies
  chosen_spanish: tres compañías
  alternatives_spanish:
  - tres grupos
  - tres divisiones
  - tres cabezas
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente «tres cabezas», pero aquí significa unidades o divisiones. «Compañías» es una equivalencia militar natural en español y conserva el valor organizativo.'
- source_word: וַיִּתֵּן
  english_pob_choice: put
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - dio
  - metió
  lexicon: HALOT
  rationale: En español, con objetos en las manos de una persona, «puso» expresa bien la acción concreta de distribuirlos. Evita la ambigüedad de «dio» y el exceso de detalle de «metió».
- source_word: שׁוֹפָרוֹת
  english_pob_choice: trumpets
  chosen_spanish: trompetas
  alternatives_spanish:
  - cuernos
  - cuernos de carnero
  lexicon: HALOT
  rationale: El hebreo שׁוֹפָר designa un cuerno de señal; el POB inglés eligió «trumpets» como equivalente funcional. En español, «trompetas» comunica bien el instrumento de señal y preserva la lectura de uso militar.
- source_word: בְּיַד כֻּלָּם
  english_pob_choice: into the hands of all of them
  chosen_spanish: en las manos de todos ellos
  alternatives_spanish:
  - en la mano de cada uno
  - a todos ellos
  lexicon: HALOT
  rationale: La frase hebrea es concreta y distributiva. «En las manos de todos ellos» conserva esa imagen sin volverla abstracta.
- source_word: כַדִּים רֵקִים
  english_pob_choice: empty jars
  chosen_spanish: cántaros vacíos
  alternatives_spanish:
  - jarros vacíos
  - vasijas vacías
  - cántaros o jarros vacíos
  lexicon: HALOT
  rationale: כַּד puede referirse a un recipiente de barro o a un cántaro/jarro. «Cántaros» es una opción natural y bíblicamente sobria en español; «vacíos» mantiene רֵקִים.
- source_word: לַפִּדִים
  english_pob_choice: torches
  chosen_spanish: antorchas
  alternatives_spanish:
  - tea de fuego
  - brasas encendidas
  - antorchas encendidas
  lexicon: HALOT
  rationale: לַפִּיד puede ser antorcha o tea encendida. «Antorchas» es el equivalente claro y estándar en español, suficientemente cercano al uso de señal o fuego portátil.
- source_word: בְּתוֹךְ הַכַּדִּים
  english_pob_choice: inside the jars
  chosen_spanish: dentro de los cántaros
  alternatives_spanish:
  - en medio de los cántaros
  - dentro de las vasijas
  lexicon: HALOT
  rationale: La frase indica ubicación interna y ocultamiento. «Dentro de los cántaros» respeta la imagen y sugiere el encierro de las antorchas.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el consenso del POB inglés y conserva sus tres alternativas léxicas documentadas: el modismo «tres cabezas» como «tres compañías», שׁוֹפָרוֹת como «trompetas» con alternativa de «cuernos de carnero», y כַדִּים como «cántaros/jarros vacíos». No se registran revisiones posteriores en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se usa vocabulario militar natural en español («compañías») para el modismo hebreo sin perder la literalidad de fondo.
  - Las notas al pie preservan las alternativas relevantes del audit trail inglés y adaptan la forma al español.
