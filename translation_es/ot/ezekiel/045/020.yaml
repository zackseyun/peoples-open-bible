translation:
  language: es
  text: Y así harás el séptimo día del mes, por cualquiera que peque por error o por simplicidad[a]; así haréis expiación por el templo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el que yerra y por el simple». El hebreo puede distinguir dos clases de personas, y פֶּתִי también puede traducirse «ingenuo» o «inexperto».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la casa», refiriéndose aquí al templo/santuario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֵן
  english_pob_choice: And so
  chosen_spanish: Y así
  alternatives_spanish:
  - Y de esta manera
  - Así
  lexicon: HALOT
  rationale: El conector retoma la instrucción precedente y enlaza esta acción ritual con la anterior. «Y así» conserva la relación discursiva de forma natural en español.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall do
  chosen_spanish: harás
  alternatives_spanish:
  - deberás hacer
  - realizarás
  lexicon: HALOT
  rationale: El verbo עשה aquí indica ejecutar la acción prescrita. El futuro simple en español comunica mandato/instrucción de manera fluida y fiel.
- source_word: בְּשִׁבְעָה בַחֹדֶשׁ
  english_pob_choice: on the seventh day of the month
  chosen_spanish: en el séptimo día del mes
  alternatives_spanish:
  - el día siete del mes
  - en el día séptimo del mes
  lexicon: HALOT
  rationale: La expresión hebrea es elíptica, pero en el contexto cultual se entiende como el séptimo día del mes. En español conviene explicitar «día» para evitar ambigüedad.
- source_word: מֵאִישׁ
  english_pob_choice: for anyone
  chosen_spanish: por cualquiera
  alternatives_spanish:
  - por una persona
  - por alguien
  lexicon: HALOT
  rationale: Aunque אִישׁ es formalmente masculino singular, el sentido es genérico. «Por cualquiera» conserva la amplitud de referencia sin restringirla a varones.
- source_word: שֹׁגֶה
  english_pob_choice: who sins unintentionally
  chosen_spanish: que peca por error
  alternatives_spanish:
  - que peca involuntariamente
  - que yerra sin darse cuenta
  lexicon: HALOT
  rationale: El participio señala el error o desvío, especialmente no intencional. «Peca por error» mantiene la relación entre errar y pecar sin sobreexplicar más de lo que exige el hebreo.
- source_word: וּמִפֶּתִי
  english_pob_choice: or through simplicity
  chosen_spanish: o por simplicidad
  alternatives_spanish:
  - o por ingenuidad
  - o por ignorancia
  lexicon: HALOT
  rationale: פֶּתִי puede aludir al simple, ingenuo o inexperto. «Simplicidad» conserva la tensión léxica y evita resolverla demasiado pronto hacia «ignorancia».
- source_word: וְכִפַּרְתֶּם
  english_pob_choice: thus you shall make atonement
  chosen_spanish: así harás expiación
  alternatives_spanish:
  - así haréis expiación
  - y harás expiación
  lexicon: HALOT
  rationale: כפר en contexto sacerdotal es «hacer expiación». «Expiación» mantiene el término técnico en español y preserva el matiz ritual sin suavizarlo a una expresión más general.
- source_word: הַבָּיִת
  english_pob_choice: the temple
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - el santuario
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la casa». Dado el contexto de la visión de Ezequiel, la referencia es al complejo del templo, pero aquí se conserva la forma original y se deja abierta la equivalencia interpretativa en la nota.
theological_decisions:
- issue: 'Objeto de la expiación: la casa/templo'
  english_pob_reading: The verse prescribes atonement for the temple in relation to persons who sin unintentionally or in simplicity/naivety.
  chosen_spanish_reading: La expiación se hace por la casa, en relación con personas que pecan por error o por simplicidad.
  alternative_spanish_readings:
  - La expiación se hace directamente por esas personas
  - La expiación se hace para purificar el templo a causa de esos pecados
  rationale: 'El objeto directo de כפר es «la casa», no la persona. La redacción española preserva esa tensión: los pecados humanos motivan el rito, pero el destinatario inmediato de la expiación es la casa/templo.'
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather than resolve it'
- issue: Valor de אִישׁ como genérico
  english_pob_reading: for anyone
  chosen_spanish_reading: por cualquiera
  alternative_spanish_readings:
  - por un hombre
  - por cualquier persona
  rationale: El hebreo usa masculino singular, pero con fuerza genérica. «Por cualquiera» conserva el alcance inclusivo sin imponer un masculino restrictivo que el contexto no exige.
  doctrine_reference: 'Translation philosophy #4: gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'El texto sigue la última pasada revisada sin cambios sustantivos respecto del audit trail inglés: mantiene la distinción entre el pecador inadvertido/ingenuo y el objeto de la expiación como «la casa». Se evitó resolver la ambigüedad de פֶּתִי y se preservó la referencia cultual de הַבָּיִת.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Expiación» se conserva como término técnico sacerdotal para כפר.
  - «Casa» se mantiene con nota porque el hebreo dice literalmente הַבָּיִת y el contexto determina que se refiere al templo.
  - La colocación de los marcadores [a] y [b] sigue el orden del texto español y no reutiliza marcas.
