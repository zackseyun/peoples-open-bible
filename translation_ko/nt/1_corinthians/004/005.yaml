  text: ὥστε μὴ πρὸ καιροῦ τι κρίνετε, ἕως ἂν ἔλθῃ ὁ κύριος, ὃς καὶ φωτίσει τὰ κρυπτὰ τοῦ σκότους καὶ φανερώσει τὰς βουλὰς τῶν καρδιῶν, καὶ τότε ὁ ἔπαινος γενήσεται ἑκάστῳ ἀπὸ τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/004/005.yaml
  text: Therefore[a], do not judge anything before the time, until the Lord comes, who will also bring to light the hidden things of darkness and reveal the purposes of the hearts[c][b]. Then each one’s praise will come from God.
  footnotes:
  - marker: a
    text: 'Or ''before the time'' or ''prematurely''; the Greek phrase can denote acting before the proper or appointed time.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''the intentions of the hearts'' or ''the motives of the hearts.'''
    reason: lexical_alternative
  - marker: c
    text: That is, from the Lord’s final evaluation when he comes and reveals what is hidden.
    reason: cross_reference
translation:
  language: ko
  text: 그러므로 때가 되기 전에 아무것도 판단하지 마십시오. 주께서 오실 때까지 그러하니, 그분께서 어둠 속에 감추인 것들을 빛 가운데로 드러내시고 마음의 의도를 나타내실 것입니다. 그때에 각 사람에게 하나님께로부터 칭찬이 임할 것입니다.
  philosophy: optimal-equivalence
