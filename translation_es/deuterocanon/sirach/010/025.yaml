translation:
  language: es
  text: No te hagas sabio[a] al realizar tu trabajo, y no te jactes en tiempo de angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Testimonio alternativo importante: «Un esclavo prudente es exaltado, y un esclavo necio no se quejará»; el verbo final también puede llevar un matiz como «murmurar» o «buscar pretexto».'
    reason: textual_variant
lexical_decisions:
- source_word: Μὴ σοφίζου
  english_pob_choice: Do not act wisely
  chosen_spanish: No te hagas sabio
  alternatives_spanish:
  - No te muestres sabio
  - No presumas de sabio
  - No actúes como sabio
  lexicon: LSJ
  rationale: La forma griega es un imperativo medio con sentido exhortativo negativo; en este contexto advierte contra una autoexaltación o pretensión de sabiduría. «No te hagas sabio» conserva el matiz verbal y evita convertir la frase en una simple afirmación de prudencia.
- source_word: ποιῆσαι τὸ ἔργον σου
  english_pob_choice: in doing your work
  chosen_spanish: al realizar tu trabajo
  alternatives_spanish:
  - al hacer tu obra
  - al cumplir tu tarea
  - en tu trabajo
  lexicon: LSJ
  rationale: La frase funciona como el marco de la acción en cuestión. «Al realizar tu trabajo» suena natural en español y mantiene la referencia a la labor o tarea propia sin añadir elementos ajenos.
- source_word: μὴ δοξάζου
  english_pob_choice: do not boast
  chosen_spanish: no te jactes
  alternatives_spanish:
  - no te gloríes
  - no te engrías
  - no te vanaglories
  lexicon: LSJ
  rationale: En este contexto admonitorio, δοξάζου tiene una fuerza cercana a autoexaltarse o jactarse. «No te jactes» comunica bien esa actitud sin perder la carga reflexiva del verbo.
- source_word: ἐν καιρῷ στενοχωρίας σου
  english_pob_choice: in a time of distress
  chosen_spanish: en tiempo de angustia
  alternatives_spanish:
  - en un tiempo de aflicción
  - en tiempo de dificultad
  - cuando estés en angustia
  lexicon: LSJ
  rationale: στενοχωρία expresa angustia, aflicción o estrechez. «Angustia» es una equivalencia clara y digna en español, y «en tiempo de» preserva el valor temporal de καιρός.
theological_decisions:
- issue: Tensión entre la fuente griega y el testimonio hebreo suministrado
  english_pob_reading: The main text follows the Greek admonition about not acting wisely or boasting in distress; the Hebrew witness is documented as a major variant.
  chosen_spanish_reading: 'El texto principal sigue la admonición griega: no hacerse sabio al hacer el propio trabajo, ni jactarse en tiempo de angustia.'
  alternative_spanish_readings:
  - «Un esclavo prudente es exaltado, y un esclavo necio no se quejará»
  - «Un siervo prudente será exaltado, y un necio no protestará»
  rationale: Se trata de un problema textual, no doctrinal. Dado que el paquete de fuente indica una fuerte discrepancia entre el hebreo y el griego, el texto español principal sigue la línea griega y deja constancia de la otra tradición en una nota. Así se evita fundir dos lecturas incompatibles en una sola frase.
  doctrine_reference: 'PHILOSOPHY.md: el texto griego es la base para Sirácides/Ben Sira en esta edición, preservando en nota los testimonios hebreos relevantes cuando difieren de manera importante.'
translation_notes:
  revision_awareness: El borrador anterior se corrigió para alinearse con el testimonio griego proporcionado y con la nota de variación textual; la versión española ahora refleja la advertencia de no autoexaltarse ni jactarse, en vez de seguir el giro hebreo sustancialmente distinto.
  spanish_consistency_notes:
  - Se mantiene «angustia» para στενοχωρία, en coherencia con el registro bíblico y con el valor de presión/aflicción del término.
  - Se usa un tono admonitorio directo y sobrio, apropiado para Sirácides.
  - La nota [a] está anclada explícitamente en el texto principal para cumplir la documentación de la variante textual.
