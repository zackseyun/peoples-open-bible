translation:
  language: es
  text: El temor de Dios es como un jardín de bendición[a], y da refugio[b] más que cualquier gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «como un Edén de bendición»; el griego paralelo lee «como un paraíso de bendición». Se eligió «jardín» para comunicar con claridad la imagen edénica en español.'
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final es difícil en el hebreo breve. El paralelo griego apoya la idea de cobertura protectora: «y lo cubrió más que cualquier gloria». Aquí se traduce «da refugio» para expresar con claridad esa protección en español, sin forzar un objeto explícito.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִרְאַת אֱלֹהִים / φόβος Κυρίου
  english_pob_choice: the fear of God
  chosen_spanish: el temor de Dios
  alternatives_spanish:
  - el temor del Señor
  - la reverencia por Dios
  lexicon: HALOT
  rationale: El hebreo conservado en esta perícopa dice אֱלֹהִים, por lo que en español se mantiene 'Dios' como término primario. Se preserva el idiomabíblico 'temor' para no debilitar la fuerza del sustantivo, aunque implica reverencia y awe; 'reverencia' sería una explicitación interpretativa menos directa.
- source_word: כְּעֵדֶן בְּרָכָה / ὡς παράδεισος εὐλογίας
  english_pob_choice: like a garden of blessing
  chosen_spanish: como un jardín de bendición
  alternatives_spanish:
  - como un Edén de bendición
  - como un paraíso de bendición
  lexicon: HALOT
  rationale: El hebreo evoca Edén/delicia, y el griego confirma la imagen de παράδεισος. En español, 'jardín' comunica con claridad la imagen edénica sin depender de un nombre propio para entender el símil. 'Paraíso' sería también posible, pero el hebreo favorece una imagen concreta más que una terminología ya teológica.
- source_word: וְעַל כָּל כָּבוֹד / ὑπὲρ πᾶσαν δόξαν
  english_pob_choice: more than any glory
  chosen_spanish: más que cualquier gloria
  alternatives_spanish:
  - por encima de toda gloria
  - más allá de toda gloria
  lexicon: HALOT
  rationale: La comparación es explícita en hebreo y griego. 'Más que cualquier gloria' mantiene el valor comparativo natural en español y conserva 'gloria' como equivalente de כָּבוֹד / δόξα.
- source_word: חָפְתָה / ἐκάλυψαν αὐτόν
  english_pob_choice: it shelters more than any glory
  chosen_spanish: lo cubre
  alternatives_spanish:
  - lo protege
  - lo cobija
  - lo ampara
  lexicon: HALOT
  rationale: El hebreo y el griego apuntan a la metáfora de cubrir/proteger. 'Lo cubre' mantiene la imagen verbal de forma breve y fiel. Se prefirió no insertar un sujeto más desarrollado en español porque el hebreo aquí presenta un verbo femenino singular con sentido proverbial, mientras que el griego ofrece un objeto masculino singular; la formulación española conserva la ambigüedad sin forzarla.
theological_decisions:
- issue: 'Título divino: אֱלֹהִים frente a κύριος'
  english_pob_reading: the fear of God
  chosen_spanish_reading: el temor de Dios
  alternative_spanish_readings:
  - el temor del Señor
  rationale: Se sigue el testimonio hebreo disponible para Sirácides en este lugar, donde el sustantivo es אֱלֹהִים. Aunque el paralelo griego tiene κύριος, la pauta del POB en Sirácides da primacía al hebreo cuando está preservado. Por eso no se adopta 'Señor' como sustituto litúrgico automático.
  doctrine_reference: Translation philosophy; Contested terms table (κύριος / YHWH)
- issue: Imagen final de cobertura protectora
  english_pob_reading: it shelters more than any glory
  chosen_spanish_reading: lo cubre más que cualquier gloria
  alternative_spanish_readings:
  - lo protege más que cualquier gloria
  - lo cobija más que cualquier gloria
  rationale: La lectura auditada entiende el cierre como cobertura/protección, no como mera ornamentación. 'Lo cubre' conserva la metáfora primaria del hebreo y del griego sin añadir una interpretación demasiado explicativa.
  doctrine_reference: Sirach 40:27 source comparison
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del POB en inglés, que prefirió un verbo de protección (''shelters'') para expresar la cobertura del hebreo y evitar una formulación incómoda. La versión española adopta ''lo cubre'' por la misma razón: conserva la imagen de cobertura y evita añadir un objeto genérico impreciso. También se mantuvo la decisión del audit trail de privilegiar el hebreo para el título divino y de usar el paralelo griego como confirmación de la imagen de paraíso/jardín y del cierre protector.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים, no 'Señor', conforme al testimonio hebreo primario.
  - '''Temor'' conserva la fuerza idiomática bíblica; no se suaviza a ''reverencia''.'
  - '''Gloria'' traduce כָּבוֹד / δόξα de manera consistente con el resto del proyecto.'
  - La metáfora vegetal se resuelve como 'jardín' en español para conservar claridad sin perder la alusión a Edén/paraíso.
  - Se evita introducir un sujeto explícito o una paráfrasis extensa en la cláusula final para respetar la tensión textual del hebreo y del griego.
