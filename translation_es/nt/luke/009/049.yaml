translation:
  language: es
  text: 'Entonces Juan respondió[a]: «Maestro, vimos a alguien que expulsaba demonios en tu nombre, y tratamos de impedírselo porque no sigue con nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «porque no nos sigue». El griego dice más literalmente «con nosotros», lo cual puede enfatizar que no formaba parte del grupo de los discípulos.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀποκριθεὶς δὲ
  english_pob_choice: Then ... answered
  chosen_spanish: Entonces ... respondió
  alternatives_spanish:
  - Y ... respondió
  - Pero ... respondió
  lexicon: BDAG
  rationale: La combinación introductoria Ἀποκριθεὶς δὲ funciona como transición narrativa. «Entonces ... respondió» conserva el avance del relato y el matiz de respuesta directa sin sonar artificial en español.
- source_word: Ἐπιστάτα
  english_pob_choice: Master
  chosen_spanish: Maestro
  alternatives_spanish:
  - Jefe
  - Señor
  lexicon: BDAG
  rationale: En Lucas, Ἐπιστάτα es un vocativo de los discípulos dirigido a Jesús con tono de autoridad y reconocimiento. «Maestro» es una forma natural en español y mantiene el sentido de liderazgo/autoridad sin reducirlo solo a función didáctica.
- source_word: εἴδομέν τινα
  english_pob_choice: we saw someone
  chosen_spanish: vimos a alguien
  alternatives_spanish:
  - vimos a cierto hombre
  - notamos a alguien
  lexicon: BDAG
  rationale: τινα es indefinido; en español «alguien» expresa adecuadamente la indefinición sin añadir sexo o precisión que el griego no exige aquí.
- source_word: ἐν τῷ ὀνόματί σου
  english_pob_choice: in your name
  chosen_spanish: en tu nombre
  alternatives_spanish:
  - por tu nombre
  - usando tu nombre
  lexicon: BDAG
  rationale: La expresión conserva en español su valor idiomático de actuar bajo la autoridad de Jesús. «En tu nombre» es la equivalencia más natural y teológicamente transparente.
- source_word: ἐκβάλλοντα δαιμόνια
  english_pob_choice: casting out demons
  chosen_spanish: que expulsaba demonios
  alternatives_spanish:
  - que echaba demonios
  - que sacaba demonios
  lexicon: BDAG
  rationale: «Expulsar demonios» preserva el sentido exorcístico de ἐκβάλλω y suena claro en español moderno. La construcción relativa fluye mejor que un gerundio literal sin perder contenido.
- source_word: ἐκωλύομεν
  english_pob_choice: we tried to stop him
  chosen_spanish: tratamos de impedírselo
  alternatives_spanish:
  - intentamos detenerlo
  - lo estorbamos
  lexicon: BDAG
  rationale: El imperfecto griego sugiere acción intentada o en curso en el pasado. «Tratamos de impedirle/impedírselo» comunica ese matiz mejor que un simple pretérito puntual. Se usa la forma pronominal porque el objeto implícito es la acción de expulsar demonios.
- source_word: ὅτι οὐκ ἀκολουθεῖ μεθ’ ἡμῶν
  english_pob_choice: because he does not follow with us
  chosen_spanish: porque no sigue con nosotros
  alternatives_spanish:
  - porque no nos sigue
  - porque no acompaña con nosotros
  lexicon: BDAG
  rationale: «Seguir con nosotros» preserva el μετά con genitivo («con nosotros») y evita suavizar la queja hacia una mera falta de seguimiento personal a Jesús. En español suena natural y mantiene la tensión del texto.
theological_decisions:
- issue: La queja sobre pertenencia al grupo de discípulos
  english_pob_reading: he does not follow with us
  chosen_spanish_reading: no sigue con nosotros
  alternative_spanish_readings:
  - no nos sigue
  - no va con nosotros
  rationale: El griego enfatiza μεθ’ ἡμῶν, «con nosotros», lo que sugiere que la objeción está en no pertenecer al círculo de los discípulos, no necesariamente en rechazar a Jesús en sí. La traducción conserva esa tensión y evita sobredeterminar la acusación.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Se revisó el orden narrativo y la relación entre el imperativo implícito de la queja y el imperfecto ἐκωλύομεν. La redacción final mantiene el sentido aspectual y la referencia grupal de μεθ’ ἡμῶν, en línea con el audit trail inglés y sin introducir explicaciones no respaldadas por el texto.
  spanish_consistency_notes:
  - Se mantiene «Maestro» para Ἐπιστάτα en coherencia con el uso lucano de un vocativo de autoridad.
  - Se usa «demonios» y «expulsaba» para conservar el registro exorcístico estándar sin calco excesivo.
  - «Con nosotros» se preserva de forma explícita para reflejar el matiz relacional del griego.
  - Se evita «SEÑOR» para no ocultar el vocativo específico ni desplazar el tono de discípulos hacia una fórmula litúrgica.
