review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia imperativa del hebreo y la revisión del POB en inglés: sacudirse, levantarse, sentarse, y soltarse de las ataduras. Sin embargo, hay dos desajustes menores pero importantes: (1) la nota [a] presenta «del polvo» como alternativa más literal cuando en realidad el hebreo sí expresa separación con מִן, de modo que esa idea pertenece mejor al texto principal; y (2) falta en español la alternativa inglesa documentada para «hija de Sion / hija de Zion».'
  spanish_quality_summary: El español es claro, natural y digno. «Sacúdete», «levántate», «siéntate» y «ataduras de tu cuello» son legibles y fieles. Aun así, «Sacúdete del polvo» suena más completo y más alineado con la imagen hebrea que «Sacúdete el polvo». También conviene conservar la nota alternativa sobre «hija de Sion», ya que el POB inglés la preserva explícitamente.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Jerusalén», «Sion», «cautiva» e «hija de Sion» son apropiados. No hay nombres divinos ni términos cristológicos en juego. La decisión «hija de Sion» encaja bien en español y la alternativa «hija de Zion/Sion» debe mantenerse en nota por transparencia lexical.
  issues:
  - severity: medium
    issue: El texto principal omite explícitamente la preposición de separación en מֵעָפָר.
    rationale: El hebreo dice «del polvo / desde el polvo», no solo «el polvo». Aunque «sacudirse el polvo» es idiomático, aquí la separación del estado de humillación está codificada en el texto fuente y conviene preservarla en el principal.
  - severity: medium
    issue: La nota [a] trata «del polvo» como si fuera solo una alternativa literal, cuando es parte del sentido básico del hebreo.
    rationale: Esto invierte la prioridad entre fuente y nota. La literalidad/separación debe quedar en el texto principal, y la nota puede explicar la imagen si se desea.
  - severity: low
    issue: Falta la nota léxica equivalente a la alternativa inglesa «daughter of Zion».
    rationale: Aunque «hija de Sion» es una excelente elección principal, el rastro de auditoría inglés preserva una alternativa para transparencia, y debe reflejarse también en español.
  revised_spanish_text: Sacúdete del polvo; levántate, siéntate[a], Jerusalén. Suelta las ataduras de tu cuello[b], cautiva hija de Sion[c].
  revised_footnotes:
