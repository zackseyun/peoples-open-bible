translation:
  language: es
  text: para que una generación posterior conozca, hijos[a] que aún no han nacido, y se levanten y se lo cuenten a sus hijos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'hijos ... sus hijos'; aquí las formas masculinas se refieren genéricamente a los descendientes, por eso 'hijos' se entiende en sentido inclusivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Expresa con naturalidad el valor de propósito/resulto del hebreo sin añadir matiz innecesario.
- source_word: יֵדְעוּ
  english_pob_choice: might know
  chosen_spanish: conozca
  alternatives_spanish:
  - sepa
  - llegue a conocer
  lexicon: HALOT
  rationale: El subjuntivo tras 'para que' comunica bien el propósito. 'Conozca' mantiene un tono sobrio y directo.
- source_word: דּוֹר אַחֲרוֹן
  english_pob_choice: a later generation
  chosen_spanish: una generación posterior
  alternatives_spanish:
  - una generación futura
  - la generación siguiente
  lexicon: HALOT
  rationale: '''Posterior'' refleja la sucesión temporal sin cargar el sentido con matices escatológicos que el hebreo aquí no exige.'
- source_word: בָּנִים יִוָּלֵדוּ
  english_pob_choice: children yet to be born
  chosen_spanish: hijos que aún no habrán nacido
  alternatives_spanish:
  - hijos por nacer
  - descendientes que aún no habrán nacido
  lexicon: HALOT
  rationale: '''Hijos'' conserva el paralelismo familiar del hebreo; la perífrasis futura expresa bien la pasiva de ''nacer'' y evita una traducción demasiado literal o extraña en español.'
- source_word: יָקֻמוּ
  english_pob_choice: might arise
  chosen_spanish: se levanten
  alternatives_spanish:
  - se alcen
  - surjan
  lexicon: HALOT
  rationale: '''Levantarse'' en español comunica el surgir para actuar o tomar la siguiente etapa de transmisión, no solo ponerse de pie.'
- source_word: וִיסַפְּרוּ
  english_pob_choice: and tell
  chosen_spanish: y cuenten
  alternatives_spanish:
  - y narren
  - y relaten
  lexicon: HALOT
  rationale: '''Contar'' es la opción más natural y fiel para la transmisión oral de una generación a otra.'
- source_word: לִבְנֵיהֶם
  english_pob_choice: their children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus descendientes
  - a sus niños
  lexicon: HALOT
  rationale: El posesivo plural mantiene la cadena generacional. 'Hijos' aquí funciona de forma representativa para descendencia, como en el hebreo.
theological_decisions:
- issue: Lenguaje generacional masculino plural con sentido representativo
  english_pob_reading: Render generically as 'children' / 'their children'
  chosen_spanish_reading: Usar 'hijos' / 'sus hijos' como lenguaje representativo de descendencia
  alternative_spanish_readings:
  - hijos e hijas
  - descendientes
  rationale: El hebreo usa formas masculinas plurales que en este contexto señalan la sucesión de descendencia. 'Hijos' preserva la relación familiar y el paralelismo del versículo sin perder el sentido representativo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: 'Seguí el estado revisado del texto inglés: mantuve la puntuación formal con comas y preservé la progresión sintáctica sin incisos tipográficos. También tomé en cuenta la decisión final de formular el movimiento de sucesión con un verbo sobrio y la transmisión a la siguiente generación con un verbo natural en español.'
  spanish_consistency_notes:
  - Usé 'generación posterior' para דּוֹר אַחֲרוֹן, evitando 'última generación' para no insinuar un sentido escatológico no indicado.
  - Mantuve la cadena generacional con 'hijos' y 'sus hijos' porque el hebreo masculino plural es representativo, no restringido al sexo masculino.
  - No añadí notas al texto porque ninguna alternativa exigía un ancla textual obligatoria y el verso puede leerse fluidamente en español.
