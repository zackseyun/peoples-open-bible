    rationale: πενθέω denota luto o duelo, especialmente por los muertos. “Lloraron” puede ser cierto, pero es más estrecho y menos solemne que el griego y que la decisión inglesa ‘mourned’.
  - severity: high
    issue: La nota al pie [a] está anclada en “Judá” pero comenta la cláusula final sobre el duelo de Israel
    rationale: El contenido de la nota explica la construcción enfática de ἐπένθησεν Ἰσραὴλ πένθος μέγα; por tanto, debe señalar el sintagma final correspondiente en el texto español.
